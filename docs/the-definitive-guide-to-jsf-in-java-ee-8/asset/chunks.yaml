    而 Person 实体类的代码如下所示：


    ```

    public class Person {


    private Long id;

        private String name;

        private String email;


    // 添加/生成 getter 和 setter 方法。

    }

    ```


    请注意，为了清晰起见，此处省略了任何持久化框架特定的注解（例如 JPA 的 `@Entity` 和 `@Id`）以及 `PersonService` 的实际实现。这些内容与任何前端框架（如
    JSF）均无关。


    回到可用的命令组件，不言而喻，`<h:commandScript>` 仅用于能够通过原生 JavaScript 调用 JSF 托管 Bean 的操作方法，通常是在特定的
    HTML DOM（文档对象模型）事件期间。然而，`<h:commandLink>` 和 `<h:commandButton>` 似乎执行完全相同的操作；只是视觉呈现不同。一个渲染为链接，另一个渲染为按钮。用户体验（UX）的共识是：按钮应用于提交表单，而链接应用于导航到另一个页面或跳转到锚点。因此，使用链接提交表单并不总被认为是最佳实践。它仅在你希望使用图标或图像提交
    HTML 表单时才有用。对于所有其他情况，请使用普通按钮。以下示例展示了如何在 Font Awesome 图标上使用命令链接：


    ```

    <h:commandLink id="delete" action="#{bean.delete}">

        <i class="fa fa-trash" />

    </h:commandLink>

    ```


    ## 导航


    有时，当某个表单成功提交后，你可能希望导航到另一个 JSF 页面——例如，从登录页面导航到用户主页（如“标签和消息组件”一节所示），或者从详情页面返回主页面。


    从历史上看，导航目标必须在 `faces-config.xml` 的 `<navigation-rule>` 条目中单独定义，然后根据 `UICommand`
    组件的操作方法返回的字符串值来执行导航。从长远来看，这种方法相当繁琐，并且对于基于 HTML 的 Web 应用程序来说并不十分有用。这个想法或多或少源自桌面应用程序。因此，JSF
    2.0 引入了“隐式导航”功能，允许你直接在字符串返回值本身中定义导航目标。换句话说，不再使用以下操作方法：


    ```

    public String someActionMethod() {

        // ...

        return "someOutcome";

    }

    ```


    以及以下 `faces-config.xml` 条目：


    ```

    <navigation-rule>

        <navigation-case>

            <from-outcome>someOutcome</from-outcome>

            <to-view-id>/otherview.xhtml</to-view-id>

        </navigation-case>

    </navigation-rule>

    ```


    你可以直接在操作方法中这样写：


    ```

    public String someActionMethod() {

        // ...

        return "/otherview.xhtml";

    }

    ```


    你甚至可以省略所使用的视图技术的默认后缀。


    ```

    public String someActionMethod() {

        // ...

        return "/otherview";

    }

    ```


    你可以通过附加 `faces-redirect=true` 查询参数来强制重定向。


    ```

    public String someActionMethod() {

        // ...

        return "/otherview?faces-redirect=true";

    }

    ```


    返回 `null` 将返回到提交表单的同一个视图。换句话说，最终用户将停留在同一页面。然而，将操作方法声明为 `void` 更为简洁。


    ```

    public void someActionMethod() {

        // ...

    }

    ```


    回到重定向方法，这也被称为“Post-Redirect-Get”模式 ²，它在可书签化和避免重复提交方面有着显著的区别。如果在 JSF 表单的 POST 请求之后没有重定向，Web
    浏览器地址栏中的 URL（统一资源定位符）不会更改为目标页面的 URL，而是保持不变。这是由“回发”的本质造成的：将表单提交回提供该表单页面的同一个 URL。当
    JSF 被指示在没有重定向的情况下导航到不同视图时，它基本上会构建目标页面并将其直接渲染到当前回发请求的响应中。


    这种方法有缺点。一是刷新 Web 浏览器中的页面会导致 POST 请求被重新执行，从而执行所谓的重复提交。这可能会用重复条目污染后端的数据存储，特别是当涉及的关系表没有定义适当的唯一约束时。另一个缺点是目标页面不可书签化。浏览器地址栏中当前的
    URL 基本上代表的是前一个页面。你无法通过书签、复制/粘贴和/或共享该 URL 然后在新浏览器窗口中打开它来回到目标页面。


    当 JSF 被指示通过重定向导航到不同视图时，它基本上会返回一个非常小的 HTTP 响应，状态码为 302，并在其中包含一个带有目标页面 URL 的 `Location`
    标头。当 Web 浏览器检索到这样的响应时，它会立即对 `Location` 标头中指定的 URL 发起一个全新的 GET 请求。此 URL 会反映在 Web
    浏览器的地址栏中，因此是可书签化的。此外，刷新页面只会刷新 GET 请求，因此不会导致重复提交。

    '
- fmt: "# Ajaxifying Components\n\nAs you have noticed in `<h:commandScript>` in the\
    \ section “Command Components,” JSF is capable of firing Ajax requests and performing\
    \ partial rendering as well. This capability was introduced in JSF 2.0 for the\
    \ first time with the `<f:ajax>` tag. This tag can be nested in any component\
    \ implementing `ClientBehaviorHolder` interface, or it can be wrapped around a\
    \ group of components implementing this interface. In the standard JSF component\
    \ set, almost all HTML components implement `ClientBehaviorHolder` as well. If\
    \ you consult the `ClientBehaviorHolder` Javadoc, then you’ll find the following\
    \ list:\n\n**All Known Implementing Classes:**\n\n```\nHtmlBody, HtmlCommandButton,\
    \ HtmlCommandLink, HtmlDataTable, HtmlForm, HtmlGraphicImage, HtmlInputFile, HtmlInputSecret,\
    \ HtmlInputText, HtmlInputTextarea, HtmlOutcomeTargetButton, HtmlOutcomeTargetLink,\
    \ HtmlOutputLabel, HtmlOutputLink, HtmlPanelGrid, HtmlPanelGroup, HtmlSelectBooleanCheckbox,\
    \ HtmlSelectManyCheckbox, HtmlSelectManyListbox, HtmlSelectManyMenu, HtmlSelectOneListbox,\
    \ HtmlSelectOneMenu, HtmlSelectOneRadio, UIWebsocket\n```\n\nThat are thus the\
    \ `<h:body>`, `<h:commandButton>`, `<h:commandLink>`, `<h:dataTable>`, `<h:form>`,\
    \ `<h:graphicImage>`, `<h:inputFile>`, `<h:inputSecret>`, `<h:inputText>`, `<h:inputTextarea>`,\
    \ `<h:button>`, `<h:link>`, `<h:outputLabel>`, `<h:outputLink>`, `<h:panelGrid>`,\
    \ `<h:panelGroup>`, `<h:selectBooleanCheckbox>`, `<h:selectManyCheckbox>`, `<h:selectManyListbox>`,\
    \ `<h:selectManyMenu>`, `<h:selectOneListbox>`, `<h:selectOneMenu>`, `<h:selectOneRadio>`\
    \ and `<f:websocket>`.\n\nYou’ll see that all visible input, select, and command\
    \ components are covered as well.\n\nA requirement of the `<f:ajax>` is that the\
    \ `ClientBehaviorHolder` component is nested in `<h:form>`, and that `<h:head>`\
    \ is being used in the template. The `<h:form>` basically enables JavaScript to\
    \ perform a postback request with the right JSF view state associated. The `<h:head>`\
    \ basically enables `<f:ajax>` to automatically include the necessary `jsf.js`\
    \ JavaScript file which contains, among others, the mandatory `jsf.ajax.request()`\
    \ function.\n\n```\n<h:head id=\"head\">\n    <title>f:ajax demo</title>\n</h:head>\n\
    <h:body>\n    <h:form id=\"form\">\n        <h:inputText id=\"text\" value=\"\
    #{bean.text}\">\n            <f:ajax />\n        </h:inputText>\n        <h:commandButton\
    \ id=\"submit\" value=\"Submit\"\n            action=\"#{bean.submit}\">\n   \
    \         <f:ajax execute=\"@form\" />\n        </h:commandButton>\n    </h:form>\n\
    </h:body>\n```\n\nGenerated HTML output:\n\n```\n<head id=\"head\">\n    <title>f:ajax\
    \ demo</title>\n    <script type=\"text/javascript\"\n        src=\"/project/javax.faces.resource/jsf.js.xhtml?ln=javax.faces\"\
    >\n    </script>\n</head>\n<body>\n    <form id=\"form\" name=\"form\" method=\"\
    post\"\n        action=\"/project/test.xhtml\"\n        enctype=\"application/x-www-form-urlencoded\"\
    >\n        <input type=\"hidden\" name=\"form\" value=\"form\" />\n        <input\
    \ id=\"form:text\" type=\"text\" name=\"form:text\"\n            onchange=\"mojarra.ab(this,event,'valueChange',0,0)\"\
    \ />\n        <input id=\"form:submit\" type=\"submit\" name=\"form:submit\"\n\
    \            value=\"Submit\" onclick=\"mojarra.ab(\n                this,event,'action','@form',0);return\
    \ false;\" />\n        <input type=\"hidden\" name=\"javax.faces.ViewState\"\n\
    \            id=\"j_id1:javax.faces.ViewState:0\"\n            value=\"6345708413515990903:-8460061657159853996\"\
    \n            autocomplete=\"off\" />\n    </form>\n</body>\n```\n\nRendering\
    \ in Chrome browser (with newlines added) is identical as without Ajax:\n\n![A454457_1_En_4_Figl_HTML.jpg](OEBPS/Images/A454457_1_En_4_Figl_HTML.jpg)\n\
    \nIn the generated HTML output, you’ll see that the `jsf.js` JavaScript file containing\
    \ the necessary JSF Ajax API is auto-included in the HTML head. You’ll also notice\
    \ that `<f:ajax>` in `<h:inputText>` has generated an additional `onchange` attribute,\
    \ and in `<h:commandButton>` an additional `onclick` attribute, both defining\
    \ some JSF implementation-specific JavaScript code responsible for performing\
    \ the Ajax request.\n\nJSF specifies two internal Ajax event types: `valueChange`\
    \ and `action`. Those are the default event types in case `<f:ajax>` doesn’t have\
    \ the `event` attribute specified. When `<f:ajax>` is attached to a component\
    \ implementing the `EditableValueHolder` interface, then the default event type\
    \ becomes `valueChange`. For components implementing the `ActionSource` interface,\
    \ this is `action`. For all other `ClientBehaviorHolder` components, the default\
    \ event is `click`. The actual generated HTML DOM event type for those internal\
    \ event types depends on the component and the associated renderer.\n\nIn case\
    \ of text-based input components and drop-down- and list box-based selection components,\
    \ the default HTML DOM event type for `<f:ajax>` is `\"change\"`. In case of radio-\
    \ and check box-based selection components and command components, this is `\"\
    click\"`. You can see this in the generated HTML output, which can be overridden\
    \ by explicitly specifying the `event` attribute on the `<f:ajax>` tag.\n\n```\n\
    <h:inputText ...>\n    <f:ajax event=\"blur\" />\n</h:inputText>\n```\n\nThe above\
    \ example will generate the JavaScript code in the `onblur` attribute instead\
    \ of the `onclick` attribute. The supported values for the `event` attribute depend\
    \ on the target `ClientBehaviorHolder` component. They can be found in the VDL\
    \ documentation of the component of interest. All `on[event]` attributes are defined\
    \ over there. When you remove the “on” prefix on them, then you have a list of\
    \ supported event types. For example, the VDL documentation of `<h:inputText>`\
    \ indicates that the following event types are supported:\n\n*   `blur`, `change`,\
    \ `click`, `dblclick`, `focus`, `keydown`, `keypress`, `keyup`, `mousedown`, `mousemove`,\
    \ `mouseout`, `mouseover`, `mouseup`, `select`\n\nWhen the desired DOM event type\
    \ occurs on the client side and triggers the associated JSF implementation-specific\
    \ JavaScript code defined in the `on[event]` attribute, then ultimately the `jsf.ajax.request()`\
    \ function of the standard JSF JavaScript API will be invoked. It will prepare\
    \ a bunch of predefined postback parameters of which `javax.faces.source` and\
    \ `javax.faces.behavior.event` are the most important ones. The former specifies\
    \ the client ID of the source component, essentially the value of `this.id` in\
    \ JavaScript context. The latter specifies the event type, essentially the value\
    \ of `event.type` in JavaScript context. You’ll have guessed that they are derived\
    \ from the first two arguments passed to the Mojarra-specific `mojarra.ab()` function\
    \ as visible in the generated HTML output.\n\nOnce fired, the Ajax request will\
    \ run through the JSF life cycle almost the same way as a non-Ajax request. The\
    \ restore view phase (first phase), process validations phase (third phase), update\
    \ model values phase (fourth phase), and invoke application phase (fifth phase)\
    \ are identical. The apply request values phase (second phase) is slightly different.\
    \ It will only decode the components that are covered by the `execute` attribute\
    \ of the `<f:ajax>` tag, which defaults to `@this` (“the current component”).\
    \ The render response phase (sixth phase) is completely different. Instead of\
    \ generating a whole HTML document, it generates a special XML document which\
    \ contains only the generated HTML output of components which are covered by the\
    \ `render` attribute of the `<f:ajax>` tag, which defaults to `@none` (“no one\
    \ component”).\n\nThe `execute` and `render` attributes accept a space-separated\
    \ collection of component search expressions. This can represent a client ID relative\
    \ to the closest `NamingContainer` parent, or an absolute client ID which is always\
    \ relative to the `UIViewRoot`, or standard or custom search keywords, or chained\
    \ combinations thereof. See Chapter 12 for an in-depth explanation of them. For\
    \ now, we only need to know about the standard search keywords `@this`, `@form`,\
    \ and `@none`. As its name suggests, the `@form` keyword refers to the closest\
    \ parent component of the `UIForm` type, such as `<h:form>`."
  raw: '## Ajaxifying Components


    As you have noticed in <h:commandScript> in the section “Command Components,”
    JSF is capable of firing Ajax requests and performing partial rendering as well.
    This capability was introduced in JSF 2.0 for the first time with the <f:ajax>
    tag. This tag can be nested in any component implementing ClientBehaviorHolder
    interface, or it can be wrapped around a group of components implementing this
    interface. In the standard JSF component set, almost all HTML components implement
    ClientBehaviorHolder as well. If you consult the ClientBehaviorHolder Javadoc,[³](#A454457_1_En_4_Chapter.xhtml#Fn3)
    then you’ll find the following list:


    **All Known** **Implementing Classes** **:**


    ```

    HtmlBody, HtmlCommandButton, HtmlCommandLink, HtmlDataTable, HtmlForm, HtmlGraphicImage,
    HtmlInputFile, HtmlInputSecret, HtmlInputText, HtmlInputTextarea, HtmlOutcomeTargetButton,
    HtmlOutcomeTargetLink, HtmlOutputLabel, HtmlOutputLink, HtmlPanelGrid, HtmlPanelGroup,
    HtmlSelectBooleanCheckbox, HtmlSelectManyCheckbox, HtmlSelectManyListbox, HtmlSelectManyMenu,
    HtmlSelectOneListbox, HtmlSelectOneMenu, HtmlSelectOneRadio, UIWebsocket

    ```


    That are thus the <h:body>, <h:commandButton>, <h:commandLink>, <h:dataTable>,
    <h:form>, <h:graphicImage>, <h:inputFile>, <h:inputSecret>, <h:inputText>, <h:inputTextarea>,
    <h:button>, <h:link>, <h:outputLabel>, <h:outputLink>, <h:panelGrid>, <h:panelGroup>,
    <h:selectBooleanCheckbox>, <h:selectManyCheckbox>, <h:selectManyListbox>, <h:selectManyMenu>,
    <h:selectOneListbox>, <h:selectOneMenu>, <h:selectOneRadio> and <f:websocket>.


    You’ll see that all visible input , select, and command components are covered
    as well.


    A requirement of the <f:ajax> is that the ClientBehaviorHolder component is nested
    in <h:form>, and that <h:head> is being used in the template. The <h:form> basically
    enables JavaScript to perform a postback request with the right JSF view state
    associated. The <h:head> basically enables <f:ajax> to automatically include the
    necessary jsf.js JavaScript file which contains, among others, the mandatory jsf.ajax.request()
    function .


    ```

    <h:head id="head">

        <title>f:ajax demo</title>

    </h:head>

    <h:body>

        <h:form id="form">

            <h:inputText id="text" value="#{bean.text}">

                <f:ajax />

            </h:inputText>

            <h:commandButton id="submit" value="Submit"

                action="#{bean.submit}">

                <f:ajax execute="@form" />

            </h:commandButton>

        </h:form>

    </h:body>

    ```


    Generated HTML output:


    ```

    <head id="head">

        <title>f:ajax demo</title>

        <script type="text/javascript"

            src="/project/javax.faces.resource/jsf.js.xhtml?ln=javax.faces">

        </script>

    </head>

    <body>

        <form id="form" name="form" method="post"

            action="/project/test.xhtml"

            enctype="application/x-www-form-urlencoded">

            <input type="hidden" name="form" value="form" />

            <input id="form:text" type="text" name="form:text"

                onchange="mojarra.ab(this,event,''valueChange'',0,0)" />

            <input id="form:submit" type="submit" name="form:submit"

                value="Submit" onclick="mojarra.ab(

                    this,event,''action'',''@form'',0);return false;" />

            <input type="hidden" name="javax.faces.ViewState"

                id="j_id1:javax.faces.ViewState:0"

                value="6345708413515990903:-8460061657159853996"

                autocomplete="off" />

        </form>

    </body>

    ```


    Rendering in Chrome browser (with newlines added) is identical as without Ajax:


    ![A454457_1_En_4_Figl_HTML.jpg](OEBPS/Images/A454457_1_En_4_Figl_HTML.jpg)


    In the generated HTML output, you’ll see that the jsf.js JavaScript file containing
    the necessary JSF Ajax API is auto-included in the HTML head. You’ll also notice
    that <f:ajax> in <h:inputText> has generated an additional onchange attribute,
    and in <h:commandButton> an additional onclick attribute, both defining some JSF
    implementation-specific JavaScript code responsible for performing the Ajax request.


    JSF specifies two internal Ajax event types: valueChange and action. Those are
    the default event types in case <f:ajax> doesn’t have the event attribute specified.
    When <f:ajax> is attached to a component implementing the EditableValueHolder
    interface, then the default event type becomes valueChange. For components implementing
    the ActionSource interface, this is action. For all other ClientBehaviorHolder
    components, the default event is click. The actual generated HTML DOM event type
    for those internal event types depends on the component and the associated renderer.


    In case of text-based input components and drop-down- and list box-based selection
    components, the default HTML DOM event type for <f:ajax> is "change". In case
    of radio- and check box-based selection components and command components, this
    is "click". You can see this in the generated HTML output, which can be overridden
    by explicitly specifying the event attribute on the <f: ajax> tag .


    ```

    <h:inputText ...>

        <f:ajax event="blur" />

    </h:inputText>

    ```


    The above example will generate the JavaScript code in the onblur attribute instead
    of the onclick attribute. The supported values for the event attribute depend
    on the target ClientBehaviorHolder component. They can be found in the VDL documentation
    of the component of interest. All on[event] attributes are defined over there.
    When you remove the “on” prefix on them, then you have a list of supported event
    types. For example, the VDL documentation of <h:inputText> [⁴](#A454457_1_En_4_Chapter.xhtml#Fn4)
    indicates that the following event types are supported:


    *   blur, change, click, dblclick, focus, keydown, keypress, keyup, mousedown,
    mousemove, mouseout, mouseover, mouseup, select


    When the desired DOM event type occurs on the client side and triggers the associated
    JSF implementation-specific JavaScript code defined in the on[event] attribute
    , then ultimately the jsf.ajax.request() function of the standard JSF JavaScript
    API will be invoked. It will prepare a bunch of predefined postback parameters
    of which javax.faces.source and javax.faces.behavior.event are the most important
    ones. The former specifies the client ID of the source component, essentially
    the value of this.id in JavaScript context. The latter specifies the event type,
    essentially the value of event.type in JavaScript context. You’ll have guessed
    that they are derived from the first two arguments passed to the Mojarra-specific
    mojarra.ab() function as visible in the generated HTML output.


    Once fired, the Ajax request will run through the JSF life cycle almost the same
    way as a non-Ajax request. The restore view phase (first phase), process validations
    phase (third phase), update model values phase (fourth phase), and invoke application
    phase (fifth phase) are identical. The apply request values phase (second phase)
    is slightly different. It will only decode the components that are covered by
    the execute attribute of the <f:ajax> tag, which defaults to @this (“the current
    component”). The render response phase (sixth phase) is completely different.
    Instead of generating a whole HTML document, it generates a special XML document
    which contains only the generated HTML output of components which are covered
    by the render attribute of the <f:ajax> tag, which defaults to @none (“no one
    component”).


    The execute and render attributes accept a space-separated collection of component
    search expressions. This can represent a client ID relative to the closest NamingContainer
    parent, or an absolute client ID which is always relative to the UIViewRoot, or
    standard or custom search keywords, or chained combinations thereof. See Chapter
    [12](#A454457_1_En_12_Chapter.xhtml) for an in-depth explanation of them. For
    now, we only need to know about the standard search keywords @this, @form, and
    @none. As its name suggests, the @form keyword refers to the closest parent component
    of the UIForm type, such as <h:form>.'
  trans: '

    ## 为组件添加 Ajax 功能


    正如你在“命令组件”一节中关于 `<h:commandScript>` 所注意到的，JSF 能够发起 Ajax 请求并执行部分渲染。这一能力首次在 JSF
    2.0 中通过 `<f:ajax>` 标签引入。该标签可以嵌套在任何实现了 `ClientBehaviorHolder` 接口的组件中，也可以包裹在一组实现了该接口的组件外部。在标准的
    JSF 组件集中，几乎所有 HTML 组件也都实现了 `ClientBehaviorHolder`。如果你查阅 `ClientBehaviorHolder`
    的 Javadoc，³ 会发现以下列表：


    **所有已知的实现类：**


    ```

    HtmlBody, HtmlCommandButton, HtmlCommandLink, HtmlDataTable, HtmlForm, HtmlGraphicImage,
    HtmlInputFile, HtmlInputSecret, HtmlInputText, HtmlInputTextarea, HtmlOutcomeTargetButton,
    HtmlOutcomeTargetLink, HtmlOutputLabel, HtmlOutputLink, HtmlPanelGrid, HtmlPanelGroup,
    HtmlSelectBooleanCheckbox, HtmlSelectManyCheckbox, HtmlSelectManyListbox, HtmlSelectManyMenu,
    HtmlSelectOneListbox, HtmlSelectOneMenu, HtmlSelectOneRadio, UIWebsocket

    ```


    这些对应的就是 `<h:body>`、`<h:commandButton>`、`<h:commandLink>`、`<h:dataTable>`、`<h:form>`、`<h:graphicImage>`、`<h:inputFile>`、`<h:inputSecret>`、`<h:inputText>`、`<h:inputTextarea>`、`<h:button>`、`<h:link>`、`<h:outputLabel>`、`<h:outputLink>`、`<h:panelGrid>`、`<h:panelGroup>`、`<h:selectBooleanCheckbox>`、`<h:selectManyCheckbox>`、`<h:selectManyListbox>`、`<h:selectManyMenu>`、`<h:selectOneListbox>`、`<h:selectOneMenu>`、`<h:selectOneRadio>`
    和 `<f:websocket>`。


    你会看到所有可见的输入、选择和命令组件也都包含在内。


    `<f:ajax>` 的一个要求是 `ClientBehaviorHolder` 组件必须嵌套在 `<h:form>` 中，并且模板中使用了 `<h:head>`。`<h:form>`
    基本上使得 JavaScript 能够以正确的 JSF 视图状态关联来执行回发请求。`<h:head>` 则使得 `<f:ajax>` 能够自动包含必要的
    `jsf.js` JavaScript 文件，该文件包含了（除其他内容外）强制性的 `jsf.ajax.request()` 函数。


    ```

    <h:head id="head">

        <title>f:ajax 演示</title>

    </h:head>

    <h:body>

        <h:form id="form">

            <h:inputText id="text" value="#{bean.text}">

                <f:ajax />

            </h:inputText>

            <h:commandButton id="submit" value="提交"

                action="#{bean.submit}">

                <f:ajax execute="@form" />

            </h:commandButton>

        </h:form>

    </h:body>

    ```


    生成的 HTML 输出：


    ```

    <head id="head">

        <title>f:ajax 演示</title>

        <script type="text/javascript"

            src="/project/javax.faces.resource/jsf.js.xhtml?ln=javax.faces">

        </script>

    </head>

    <body>

        <form id="form" name="form" method="post"

            action="/project/test.xhtml"

            enctype="application/x-www-form-urlencoded">

            <input type="hidden" name="form" value="form" />

            <input id="form:text" type="text" name="form:text"

                onchange="mojarra.ab(this,event,''valueChange'',0,0)" />

            <input id="form:submit" type="submit" name="form:submit"

                value="提交" onclick="mojarra.ab(

                    this,event,''action'',''@form'',0);return false;" />

            <input type="hidden" name="javax.faces.ViewState"

                id="j_id1:javax.faces.ViewState:0"

                value="6345708413515990903:-8460061657159853996"

                autocomplete="off" />

        </form>

    </body>

    ```


    在 Chrome 浏览器中的渲染效果（已添加换行）与不使用 Ajax 时相同：


    ![A454457_1_En_4_Figl_HTML.jpg](img/A454457_1_En_4_Figl_HTML.jpg)


    在生成的 HTML 输出中，你会看到包含必要 JSF Ajax API 的 `jsf.js` JavaScript 文件被自动包含在 HTML 的 head
    部分。你还会注意到，`<h:inputText>` 中的 `<f:ajax>` 生成了一个额外的 `onchange` 属性，而 `<h:commandButton>`
    中生成了一个额外的 `onclick` 属性，两者都定义了一些特定于 JSF 实现的、负责执行 Ajax 请求的 JavaScript 代码。


    JSF 指定了两种内部 Ajax 事件类型：`valueChange` 和 `action`。当 `<f:ajax>` 没有指定 `event` 属性时，这些是默认的事件类型。当
    `<f:ajax>` 附加到实现了 `EditableValueHolder` 接口的组件上时，默认事件类型变为 `valueChange`。对于实现了 `ActionSource`
    接口的组件，默认事件类型是 `action`。对于所有其他 `ClientBehaviorHolder` 组件，默认事件是 `click`。这些内部事件类型实际生成的
    HTML DOM 事件类型取决于组件及其关联的渲染器。


    对于基于文本的输入组件以及基于下拉列表和列表框的选择组件，`<f:ajax>` 的默认 HTML DOM 事件类型是 `"change"`。对于基于单选按钮和复选框的选择组件以及命令组件，默认事件类型是
    `"click"`。你可以在生成的 HTML 输出中看到这一点，这可以通过在 `<f:ajax>` 标签上显式指定 `event` 属性来覆盖。


    ```

    <h:inputText ...>

        <f:ajax event="blur" />

    </h:inputText>

    ```


    上面的示例将在 `onblur` 属性中生成 JavaScript 代码，而不是在 `onclick` 属性中。`event` 属性支持的值取决于目标 `ClientBehaviorHolder`
    组件。这些值可以在相关组件的 VDL 文档中找到。所有 `on[event]` 属性都在那里定义。当你移除它们前面的 `"on"` 前缀时，就得到了支持的事件类型列表。例如，`<h:inputText>`
    的 VDL 文档 ⁴ 指出支持以下事件类型：


    *   blur, change, click, dblclick, focus, keydown, keypress, keyup, mousedown,
    mousemove, mouseout, mouseover, mouseup, select


    当所需的 DOM 事件类型在客户端发生并触发了 `on[event]` 属性中定义的、与 JSF 实现相关的特定 JavaScript 代码时，最终会调用标准
    JSF JavaScript API 的 `jsf.ajax.request()` 函数。它将准备一组预定义的回发参数，其中 `javax.faces.source`
    和 `javax.faces.behavior.event` 是最重要的。前者指定源组件的客户端 ID，本质上是 JavaScript 上下文中 `this.id`
    的值。后者指定事件类型，本质上是 JavaScript 上下文中 `event.type` 的值。你可能已经猜到，它们是从传递给 Mojarra 特定的 `mojarra.ab()`
    函数的前两个参数派生出来的，正如在生成的 HTML 输出中看到的那样。


    一旦触发，Ajax 请求将几乎以与非 Ajax 请求相同的方式贯穿 JSF 生命周期。恢复视图阶段（第一阶段）、处理验证阶段（第三阶段）、更新模型值阶段（第四阶段）和调用应用程序阶段（第五阶段）是相同的。应用请求值阶段（第二阶段）略有不同。它只会解码
    `<f:ajax>` 标签的 `execute` 属性所覆盖的组件，该属性默认为 `@this`（“当前组件”）。渲染响应阶段（第六阶段）则完全不同。它不会生成整个
    HTML 文档，而是生成一个特殊的 XML 文档，该文档仅包含 `<f:ajax>` 标签的 `render` 属性所覆盖的组件的生成 HTML 输出，该属性默认为
    `@none`（“没有组件”）。


    `execute` 和 `render` 属性接受一个由空格分隔的组件搜索表达式集合。这可以表示相对于最近的 `NamingContainer` 父组件的客户端
    ID，或者始终相对于 `UIViewRoot` 的绝对客户端 ID，或者标准或自定义的搜索关键字，或者它们的链式组合。有关它们的深入解释，请参见第 12 章。目前，我们只需要了解标准搜索关键字
    `@this`、`@form` 和 `@none`。顾名思义，`@form` 关键字指的是 `UIForm` 类型（例如 `<h:form>`）的最近父组件。

