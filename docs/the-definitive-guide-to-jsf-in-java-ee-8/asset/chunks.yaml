    现在，文件的 content type 属性在客户端进行过滤，并在服务器端进行验证。这固然很好，但这当然只是基于文件名验证文件的 content type，而不是文件的实际内容。想象一下，有人创建了一个
    ZIP 文件，然后简单地将文件扩展名重命名为图像文件，甚至是一个带有恶意软件的可执行文件。它仍然会通过客户端和服务器端的文件类型验证。坦率地说，这个责任不在于组件本身，而在于你，JSF
    开发者。正确的解决方案是创建一个自定义验证器并将其附加到组件上。以下是一个图像文件验证器的示例，它借助了能够解析图像文件的 Java2D API。如果它抛出异常或返回
    null，那么它肯定不是图像文件。


    ```

    @FacesValidator("project.ImageFileValidator")

    public class ImageFileValidator implements Validator<Part> {


    @Override

        public void validate

            (FacesContext context, UIComponent component, Part value)

                throws ValidatorException

        {

            if (value == null) {

                return; // 让 @NotNull 或 required="true" 处理。

            }


    try {

                ImageIO.read(value.getInputStream()).toString();

            }

            catch (Exception e) {

                String message = "Not an image file";

                throw new ValidatorException(new FacesMessage(message), e);

            }

        }

    }

    ```


    为了使其运行，将其声明为组件标签的 validator 属性。


    ```

    <my:inputFile ... validator="project.ImageFileValidator" />

    ```


    它运行得很好。现在，当验证也通过时，将调用后端 bean 的动作方法，你可以在其中将上传的文件保存到所需位置。这可以按如下方式实现：


    ```

    public void upload() {

        Path folder = Paths.get("/path/to/uploads");

        String fileName = Paths.get(photo.getSubmittedFileName())

            .getFileName().toString();

        int indexOfLastDot = fileName.lastIndexOf(''.'');

        String name = fileName.substring(0, indexOfLastDot);

        String extension = fileName.substring(indexOfLastDot);

        FacesMessage message = new FacesMessage();


    try (InputStream contents = photo.getInputStream()) {

            Path file = Files.createTempFile(folder, name + "-", extension);

            Files.copy(contents, file, StandardCopyOption.REPLACE_EXISTING);

            message.setSummary("Uploaded file successfully saved.");

        }

        catch (IOException e) {

            message.setSummary("Could not save uploaded file, try again.");

            message.setSeverity(FacesMessage.SEVERITY_ERROR);

            e.printStackTrace();

        }


    FacesContext.getCurrentInstance().addMessage(null, message);

    }

    ```


    你可能会疑惑为什么它似乎将上传的文件保存为临时文件。实际上并非如此。我们只是利用 `Files#createTempFile()` 工具来保证保存文件文件名的唯一性。它会在文件名和文件扩展名之间自动包含一个唯一的随机字符串。否则，当多人上传恰好同名的不同文件时，他们可能会相互覆盖，从而导致信息丢失。


    ## 扩展现有渲染器


    假设有一个现有的渲染器存在逻辑错误或缺陷，你想通过扩展它而不是从头重写来快速修补它。不幸的是，这听起来比实际要容易得多。也就是说，标准的渲染器实现不是标准
    JSF API 的一部分，这与 `javax.faces.component.html` 包中可用的标准 HTML 组件实现相反。实际的标准 HTML 渲染器实现由
    JSF 实现本身提供。Mojarra 将它们放在 `com.sun.faces.renderkit.html_basic` 包中，而 MyFaces 将它们放在
    `org.apache.myfaces.renderkit.html` 包中。


    这些标准 HTML 渲染器的另一个问题是代码的抽象性相对较差。基本上，所有这些标准 HTML 渲染器都没有抽象出那些仅用于发出 HTML 标记的代码片段，使其与逻辑完全分离。换句话说，当你需要修复某些逻辑时，你几乎总是还必须编写或复制/粘贴所有负责发出
    HTML 的代码。


    一个常见的现实世界示例是希望让 `<h:message>` 或 `<h:messages>` 以未转义的方式渲染 faces 消息，这样你就可以在 faces
    消息中嵌入一些 HTML 代码，通常是提供一个指向所需目标页面的链接（例如，“未知用户，也许你想<a href="login">登录</a>？”）。标准的
    `<h:message>` 组件不支持这种功能，并且 HTML 转义由其渲染器控制，而渲染器又依赖于 JSF 实现。这种 JSF 内置的 HTML 转义随处可见，并且当你即将在网页中嵌入用户控制的数据时，它是防止可能的
    XSS 攻击漏洞的非常重要的屏障。有一些组件具有显式属性来关闭此 HTML 转义，例如带有 `escape` 属性的 `<h:outputText>`、带有
    `itemEscaped` 属性的 `<f:selectItem>` 以及带有 `itemLabelEscaped` 属性的 `<f:selectItems>`。然而，`<h:message>`
    和 `<h:messages>` 中缺少这样的属性。另请参阅 JSF 规范问题 634。⁹ 也许它会在 JSF.next 中添加，但目前你无法绕过第三方组件库或扩展现有的标准
    HTML 渲染器。


    我们将以此为例，为 `<h:message>` 扩展现有的标准 HTML 渲染器。第一步是查看 `<h:message>` 组件当前具体使用哪个渲染器。在表
    11-1 中，你将看到此组件由 `HtmlMessage` 类支持。当前使用的渲染器实现可以通过编程方式确定，如下所示：


    ```

    String componentFamily = HtmlMessage.COMPONENT_FAMILY;

    String rendererType = new HtmlMessage().getRendererType();

    Renderer renderer = FacesContext.getCurrentInstance().getRenderKit()

        .getRenderer(componentFamily, rendererType);

    System.out.println(renderer.getClass());

    ```


    如果你使用 Mojarra 作为 JSF 实现，它将打印如下内容：


    ```

    class com.sun.faces.renderkit.html_basic.MessageRenderer

    ```


    这正好是我们想要扩展的渲染器类。Mojarra 是开源的，其源代码目前可在 [`github.com/javaserverfaces/mojarra`](https://github.com/javaserverfaces/mojarra)
    获取。一旦你掌握了 `MessageRenderer` 的源代码，下一步就是找出 `FacesMessage` 的摘要和详细信息具体在哪里渲染，以及我们如何用最少的代码覆盖它。我们可以在源代码中看到，这发生在
    `encodeEnd()` 方法中，在当前 Mojarra 2.3.3 版本中，该方法已经有 182 行代码。它使用 `ResponseWriter#writeText()`
    ¹⁰ 来渲染摘要和详细信息。我们希望将其替换为 `ResponseWriter#write()`，这样它就不会执行任何转义。

