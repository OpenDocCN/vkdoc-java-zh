- fmt: "# Source Exposure Protection\n\nSource exposure in the context of server-side\
    \ web applications refers to the unwanted disclosure of parts of the web application’s\
    \ source. This is a security risk, not only because of the exposure of the source\
    \ itself (which may be a trade secret) but also because it may give an attacker\
    \ insight on which to base follow-up attacks (the source may contain references\
    \ to other systems, beans, or even comments with passwords, although those kinds\
    \ of comments should of course not be there to begin with).\n\nDue to a number\
    \ of somewhat perhaps unfortunate design choices in the past, JSF has some specific\
    \ vulnerabilities here, which mostly concern how URL mapping is done but also\
    \ concern the location of resource files. To understand this vulnerability we\
    \ first explain how JSF mapping and the `FacesServlet` work.\n\nThe main entry\
    \ into every JSF application is the `FacesServlet`. This is a Servlet provided\
    \ by the JSF framework that acts as a so-called front controller through which\
    \ all JSF requests are routed.\n\nA request to a JSF view such as `foo.jsf` will\
    \ thus first need to go through this Servlet, which will then in some way locate\
    \ the definition of the tree of components that represent the view `foo.jsf`.\
    \ We’ll call this actual definition the “physical resource.” Out of the box, JSF\
    \ supports two types of physical resources: Facelets and JSP files with the extension\
    \ `.xhtml`, `.view.xml`, and `.jsp`. Note that JSP files are largely deprecated.\n\
    \nIn order for the `FacesServlet` to be able to handle all these requests it has\
    \ to be mapped to one or more URL patterns that capture them. To be able to do\
    \ this, JSF supports prefix, suffix, and exact mapping.\n\nIf no explicit mapping\
    \ in `web.xml` is specified and a recognized JSF artifact is found in the application\
    \ (such as an empty `faces-config.xml` or the `@FacesConfig` annotation) then\
    \ the `FacesServlet` is automatically mapped. Since JSF 2.1 and Servlet 3.0 this\
    \ automatic mapping is to the following patterns:\n\n*   `/faces/*` (prefix mapping)\n\
    *   `*.jsf` (suffix mapping)\n*   `*.faces` (suffix mapping)\n\nSince JSF 2.3\
    \ this also includes:\n\n*   `*.xhtml` (suffix mapping)\n\nEspecially older (existing)\
    \ JSF applications still explicitly map the `FacesServlet` in `web.xml`, which\
    \ then looks for example as follows:\n\n```\n<servlet>\n    <servlet-name>facesServlet</servlet-name>\n\
    \    <servlet-class>javax.faces.webapp.FacesServlet</servlet-class>\n</servlet>\n\
    <servlet-mapping>\n    <servlet-name>facesServlet</servlet-name>\n    <url-pattern>/faces/*</url-pattern>\n\
    \    <url-pattern>*.jsf</url-pattern>\n</servlet-mapping>\n```\n\nIn suffix mapping\
    \ and when using Facelets, the `FacesServlet` will first try to locate the physical\
    \ resource with the same path and name as the requested resource, but with the\
    \ suffix replaced by `.xhtml`. For example, a request for `/path/foo.jsf` will\
    \ result in a lookup for the file `/path/foo.xhtml`.\n\nWith prefix mapping, the\
    \ `FacesServlet` will try to locate the physical resource with the same name and\
    \ path as the requested resource, but minus the prefix path. For example, a request\
    \ for `/faces/path/foo.xhtml` will result in a lookup for the file `/path/foo.xhtml`.\n\
    \nThis, however, may introduce a security issue that will result in exposure of\
    \ the Facelet source code. Namely, the lookup for `/path/foo.xhtml` is done in\
    \ the web root of the WAR in which the `FacesServlet` resides. Unless otherwise\
    \ (implicitly) mapped, every file in the web root is directly accessible for download.\
    \ In this case, if `/path/foo.xhtml` is directly requested instead of `/path/foo.jsf`\
    \ or `/faces/path/foo.xhtml` this request will not go through the `FacesServlet`\
    \ and returns the bare Facelets source code of that page instead of the rendered\
    \ markup.\n\nThere are two ways to prevent this exposure of source code.\n\n1.\
    \  Map the `FacesServlet` directly to `*.xhtml`\n2.  Add a security constraint\
    \ to `web.xml`\n\nMapping the `FacesServlet` directly to `*.xhtml` may be the\
    \ most natural solution. With this mapping, the requested resource is identical\
    \ to the physical resource. If `/path/foo.xhtml` is requested, then the `FacesServlet`\
    \ will try to locate `/path/foo.xhtml`. Via this mapping, there is no second path\
    \ to reach the Facelets source and hence no risk of exposing it.\n\nSide note:\
    \ being able to use `*.xhtml` mapping was a new feature in JSF 2.0. Doing this\
    \ in JSF 1.x resulted in an infinite loop.\n\nTo map the `FacesServlet` to `*.xhtml`,\
    \ the easiest way is to rely on the default mapping of JSF 2.3 as explained above.\
    \ If this is not possible for some reason, add the mapping to the `FacesServlet`\
    \ mapping in `web.xml` as shown in the following code:\n\n```\n<servlet-mapping>\n\
    \    <servlet-name>facesServlet</servlet-name>\n    <url-pattern>/faces/*</url-pattern>\n\
    \    <url-pattern>*.jsf</url-pattern>\n    <url-pattern>*.xhtml</url-pattern>\n\
    </servlet-mapping>\n```\n\nAs an alternative, a security constraint can be defined\
    \ that prevents access to `*.xhtml` resources. There is rarely a good reason to\
    \ prefer this over the simpler `*.xhtml` to `*.xhtml` mapping, but for completeness,\
    \ this can be done as follows:\n\n```\n<security-constraint>\n    <display-name>No\
    \ access to Facelets source</display-name>\n    <web-resource-collection>\n  \
    \      <web-resource-name>XHTML</web-resource-name>\n        <url-pattern>*.xhtml</url-pattern>\n\
    \    </web-resource-collection>\n    <auth-constraint />\n</security-constraint>\n\
    ```\n\nA special case of exposing Facelets source code happens with composite\
    \ components. Composite components are components that are implemented via a Facelet\
    \ instead of a Java class. By convention, they have to be placed in a directory\
    \ inside a directory named `/resources` that resides in the web root—for instance,\
    \ `/resources/bar/foo.xhtml`. This will make a component “foo” available in the\
    \ namespace `http://xmlns.jcp.org/jsf/composite/bar`.\n\nComponents are of course\
    \ not views and the user should not be able to request those directly. Unfortunately,\
    \ `/resources` is not in any way a special directory to Java EE. JSF assigns a\
    \ special meaning to it by convention, but to the Servlet container it’s a directory\
    \ like any other. This specifically means there’s no protection applied to this\
    \ and any user can directly request resources from it. In other words, this directory\
    \ is “world readable.” Even with an `*.xhtml` mapping, this not only allows the\
    \ user to guess which components we have but lets the user attempt to execute\
    \ those as well. Clearly this is not what we want.\n\nThere are again two solutions\
    \ for this:\n\n1.  Configure another directory to be the JSF resources directory\n\
    2.  Add a security constraint to `web.xml`\n\nIn JSF 2.2 a method was introduced\
    \ to address this security vulnerability. Namely, via the `javax.faces.WEBAPP_RESOURCES_DIRECTORY`\
    \ context parameter another directory can be configured to be the JSF resources\
    \ directory instead of `/resources`. For example,\n\n```\n<context-param>\n  \
    \  <param-name>javax.faces.WEBAPP_RESOURCES_DIRECTORY</param-name>\n    <param-value>WEB-INF/resources</param-value>\n\
    </context-param>\n```\n\nNote that the path is relative to the web root and may\
    \ not begin with a “/”.\n\nAlternatively, or for JSF 2.0/2.1, a security constraint\
    \ can be configured in `web.xml` again that prohibits caller access to `/resources`.\
    \ This can be done in a similar way as protecting for `*.xhtml` access.\n\n```\n\
    <security-constraint>\n    <web-resource-collection>\n        <web-resource-name>resources</web-resource-name>\n\
    \        <description>The resources directory</description>\n        <url-pattern>/resources/*</url-pattern>\n\
    \    </web-resource-collection>\n    <auth-constraint />\n</security-constraint>\n\
    ```\n\n© Bauke Scholtz, Arjan Tijms 2018\n\nBauke Scholtz and Arjan Tijms, The\
    \ Definitive Guide to JSF in Java EE 8, [https://doi.org/10.1007/978-1-4842-3387-0_14](https://doi.org/10.1007/978-1-4842-3387-0_14)"
  raw: '## Source Exposure Protection


    Source exposure in the context of server-side web applications refers to the unwanted
    disclosure of parts of the web application’s source. This is a security risk,
    not only because of the exposure of the source itself (which may be a trade secret)
    but also because it may give an attacker insight on which to base follow-up attacks
    (the source may contain references to other systems, beans, or even comments with
    passwords, although those kinds of comments should of course not be there to begin
    with).


    Due to a number of somewhat perhaps unfortunate design choices in the past, JSF
    has some specific vulnerabilities here, which mostly concern how URL mapping is
    done but also concern the location of resource files. To understand this vulnerability
    we first explain how JSF mapping and the FacesServlet work.


    The main entry into every JSF application is the FacesServlet. This is a Servlet
    provided by the JSF framework that acts as a so-called front controller through
    which all JSF requests are routed.


    A request to a JSF view such as foo.jsf will thus first need to go through this
    Servlet, which will then in some way locate the definition of the tree of components
    that represent the view foo.jsf. We’ll call this actual definition the “physical
    resource.” Out of the box, JSF supports two types of physical resources: Facelets
    and JSP files with the extension .xhtml, .view.xml, and .jsp. Note that JSP files
    are largely deprecated.


    In order for the FacesServlet to be able to handle all these requests it has to
    be mapped to one or more URL patterns that capture them. To be able to do this,
    JSF supports prefix, suffix, and exact mapping.


    If no explicit mapping in web.xml is specified and a recognized JSF artifact is
    found in the application (such as an empty faces-config,xml or the @FacesConfig
    annotation) then the FacesServlet is automatically mapped. Since JSF 2.1 and Servlet
    3.0 this automatic mapping is to the following patterns:


    *   /faces/* (prefix mapping)


    *   *.jsf (suffix mapping)


    *   *.faces (suffix mapping)


    Since JSF 2.3 this also includes:


    *   *.xhtml (suffix mapping)


    Especially older (existing) JSF applications still explicitly map the FacesServlet
    in web.xml, which then looks for example as follows:


    ```

    <servlet>

        <servlet-name>facesServlet</servlet-name>

        <servlet-class>javax.faces.webapp.FacesServlet</servlet-class>

    </servlet>

    <servlet-mapping>

        <servlet-name>facesServlet</servlet-name>

        <url-pattern>/faces/*</url-pattern>

        <url-pattern>*.jsf</url-pattern>

    </servlet-mapping>

    ```


    In suffix mapping and when using Facelets, the FacesServlet will first try to
    locate the physical resource with the same path and name as the requested resource,
    but with the suffix replaced by .xhtml. For example, a request for /path/foo.jsf
    will result in a lookup for the file /path/foo.xhtml.


    With prefix mapping, the FacesServlet will try to locate the physical resource
    with the same name and path as the requested resource, but minus the prefix path.
    For example, a request for /faces/path/foo.xhtml will result in a lookup for the
    file /path/foo.xhtml.


    This, however, may introduce a security issue that will result in exposure of
    the Facelet source code. Namely, the lookup for /path/foo.xhtml is done in the
    web root of the WAR in which the FacesServlet resides. Unless otherwise (implicitly)
    mapped, every file in the web root is directly accessible for download. In this
    case, if /path/foo.xhtml is directly requested instead of /path/foo.jsf or /faces/path/foo.xhtml
    this request will not go through the FacesServlet and returns the bare Facelets
    source code of that page instead of the rendered markup.


    There are two ways to prevent this exposure of source code .


    1.  Map the FacesServlet directly to *.xhtml


    2.  Add a security constraint to web.xml


    Mapping the FacesServlet directly to *.xhtml may be the most natural solution.
    With this mapping, the requested resource is identical to the physical resource.
    If /path/foo.xhtml is requested, then the FacesServlet will try to locate /path/foo.xhtml.
    Via this mapping, there is no second path to reach the Facelets source and hence
    no risk of exposing it.


    Side note: being able to use *.xhtml mapping was a new feature in JSF 2.0\. Doing
    this in JSF 1.x resulted in an infinite loop.


    To map the FacesServlet to *.xhtml, the easiest way is to rely on the default
    mapping of JSF 2.3 as explained above. If this is not possible for some reason,
    add the mapping to the FacesServlet mapping in web.xml as shown in the following
    code:


    ```

    <servlet-mapping>

        <servlet-name>facesServlet</servlet-name>

        <url-pattern>/faces/*</url-pattern

        <url-pattern>*.jsf</url-pattern>

        <url-pattern>*.xhtml</url-pattern>

    </servlet-mapping>

    ```


    As an alternative, a security constraint can be defined that prevents access to
    *.xhtml resources. There is rarely a good reason to prefer this over the simpler
    *.xhtml to *.xhtml mapping, but for completeness, this can be done as follows:


    ```

    <security-constraint>

        <display-name>No access to Facelets source</display-name>

        <web-resource-collection>

            <web-resource-name>XHTML</web-resource-name>

            <url-pattern>*.xhtml</url-pattern>

        </web-resource-collection>

        <auth-constraint />

    </security-constraint>

    ```


    A special case of exposing Facelets source code happens with composite components.
    Composite components are components that are implemented via a Facelet instead
    of a Java class. By convention, they have to be placed in a directory inside a
    directory named /resources that resides in the web root—for instance, /resources/bar/foo.xhtml.
    This will make a component “foo” available in the namespace “ [http://xmlns.jcp.org/jsf/composite/bar](http://xmlns.jcp.org/jsf/composite/bar)
    ”.


    Components are of course not views and the user should not be able to request
    those directly. Unfortunately, /resources is not in any way a special directory
    to Java EE. JSF assigns a special meaning to it by convention, but to the Servlet
    container it’s a directory like any other. This specifically means there’s no
    protection applied to this and any user can directly request resources from it.
    In other words, this directory is “world readable.” Even with an *.xhtml mapping,
    this not only allows the user to guess which components we have but lets the user
    attempt to execute those as well. Clearly this is not what we want.


    There are again two solutions for this:


    1.  Configure another directory to be the JSF resources directory


    2.  Add a security constraint to web.xml


    In JSF 2.2 a method was introduced to address this security vulnerability. Namely,
    via the javax.faces.WEBAPP_RESOURCES_DIRECTORY context parameter another directory
    can be configured to be the JSF resources directory instead of /resources. For
    example,


    ```

    <context-param>

        <param-name>javax.faces.WEBAPP_RESOURCES_DIRECTORY</param-name>

        <param-value>WEB-INF/resources</param-value>

    </context-param>

    ```


    Note that the path is relative to the web root and may not begin with a “/”.


    Alternatively, or for JSF 2.0/2.1, a security constraint can be configured in
    web.xml again that prohibits caller access to /resources. This can be done in
    a similar way as protecting for *.xhtml access.


    ```

    <security-constraint>

        <web-resource-collection>

            <web-resource-name>resources</web-resource-name>

            <description>The resources directory</description>

            <url-pattern>/resources/*</url-pattern>

        </web-resource-collection>

        <auth-constraint />

    </security-constraint>

    ```


    © Bauke Scholtz, Arjan Tijms 2018


    Bauke Scholtz and Arjan Tijms, The Definitive Guide to JSF in Java EE 8, [https://doi.org/10.1007/978-1-4842-3387-0_14](#A454457_1_En_14_Chapter.xhtml)'
  trans: '

    ## 源代码暴露防护


    在服务端 Web 应用的语境下，源代码暴露指的是 Web 应用部分源代码的非预期泄露。这是一种安全风险，不仅因为源代码本身（可能构成商业秘密）的泄露，还因为它可能为攻击者提供后续攻击的线索（源代码可能包含对其他系统、Bean
    的引用，甚至包含密码的注释，尽管这类注释一开始就不应该存在）。


    由于过去一些可能不太理想的设计选择，JSF 在这方面存在一些特定的漏洞，主要涉及 URL 映射方式以及资源文件的位置。为了理解这个漏洞，我们首先解释 JSF
    映射和 `FacesServlet` 的工作原理。


    每个 JSF 应用的主要入口是 `FacesServlet`。这是由 JSF 框架提供的一个 Servlet，充当所谓的前端控制器，所有 JSF 请求都通过它进行路由。


    因此，对 `foo.jsf` 这样的 JSF 视图的请求首先需要经过这个 Servlet，然后它会以某种方式定位代表 `foo.jsf` 视图的组件树定义。我们将这个实际定义称为“物理资源”。开箱即用，JSF
    支持两种类型的物理资源：Facelets 和扩展名为 `.xhtml`、`.view.xml` 和 `.jsp` 的 JSP 文件。请注意，JSP 文件已基本被弃用。


    为了让 `FacesServlet` 能够处理所有这些请求，它必须映射到一个或多个能够捕获这些请求的 URL 模式。为此，JSF 支持前缀、后缀和精确映射。


    如果在 `web.xml` 中没有指定显式映射，并且在应用中找到了可识别的 JSF 工件（例如空的 `faces-config.xml` 或 `@FacesConfig`
    注解），那么 `FacesServlet` 会被自动映射。从 JSF 2.1 和 Servlet 3.0 开始，此自动映射针对以下模式：


    *   `/faces/*`（前缀映射）

    *   `*.jsf`（后缀映射）

    *   `*.faces`（后缀映射）


    从 JSF 2.3 开始，还包括：


    *   `*.xhtml`（后缀映射）


    特别是较旧的（现有的）JSF 应用仍然会在 `web.xml` 中显式映射 `FacesServlet`，示例如下：


    ```

    <servlet>

        <servlet-name>facesServlet</servlet-name>

        <servlet-class>javax.faces.webapp.FacesServlet</servlet-class>

    </servlet>

    <servlet-mapping>

        <servlet-name>facesServlet</servlet-name>

        <url-pattern>/faces/*</url-pattern>

        <url-pattern>*.jsf</url-pattern>

    </servlet-mapping>

    ```


    在后缀映射并使用 Facelets 时，`FacesServlet` 会首先尝试定位与请求资源路径和名称相同、但后缀替换为 `.xhtml` 的物理资源。例如，对
    `/path/foo.jsf` 的请求将导致查找文件 `/path/foo.xhtml`。


    在前缀映射中，`FacesServlet` 会尝试定位与请求资源名称和路径相同、但减去前缀路径的物理资源。例如，对 `/faces/path/foo.xhtml`
    的请求将导致查找文件 `/path/foo.xhtml`。


    然而，这可能会引入一个安全问题，导致 Facelet 源代码泄露。也就是说，对 `/path/foo.xhtml` 的查找是在 `FacesServlet`
    所在的 WAR 的 Web 根目录中进行的。除非另有（隐式）映射，Web 根目录中的每个文件都可以直接下载。在这种情况下，如果直接请求 `/path/foo.xhtml`
    而不是 `/path/foo.jsf` 或 `/faces/path/foo.xhtml`，该请求将不会经过 `FacesServlet`，并返回该页面的纯
    Facelets 源代码，而不是渲染后的标记。


    有两种方法可以防止这种源代码泄露。


    1.  将 `FacesServlet` 直接映射到 `*.xhtml`

    2.  向 `web.xml` 添加安全约束


    将 `FacesServlet` 直接映射到 `*.xhtml` 可能是最自然的解决方案。通过这种映射，请求的资源与物理资源完全相同。如果请求 `/path/foo.xhtml`，那么
    `FacesServlet` 将尝试定位 `/path/foo.xhtml`。通过这种映射，没有第二条路径可以访问 Facelets 源代码，因此不存在泄露风险。


    附注：能够使用 `*.xhtml` 映射是 JSF 2.0 中的一个新特性。在 JSF 1.x 中这样做会导致无限循环。


    要将 `FacesServlet` 映射到 `*.xhtml`，最简单的方法是依赖上面解释的 JSF 2.3 的默认映射。如果由于某种原因无法做到这一点，请将映射添加到
    `web.xml` 中的 `FacesServlet` 映射中，如下代码所示：


    ```

    <servlet-mapping>

        <servlet-name>facesServlet</servlet-name>

        <url-pattern>/faces/*</url-pattern

        <url-pattern>*.jsf</url-pattern>

        <url-pattern>*.xhtml</url-pattern>

    </servlet-mapping>

    ```


    作为替代方案，可以定义一个安全约束来阻止对 `*.xhtml` 资源的访问。通常没有充分的理由选择此方法而不是更简单的 `*.xhtml` 到 `*.xhtml`
    映射，但为了完整性，可以按如下方式操作：


    ```

    <security-constraint>

        <display-name>禁止访问 Facelets 源代码</display-name>

        <web-resource-collection>

            <web-resource-name>XHTML</web-resource-name>

            <url-pattern>*.xhtml</url-pattern>

        </web-resource-collection>

        <auth-constraint />

    </security-constraint>

    ```


    Facelets 源代码泄露的一个特殊情况发生在复合组件上。复合组件是通过 Facelet 而非 Java 类实现的组件。按照惯例，它们必须放置在 Web
    根目录下名为 `/resources` 的目录内的一个子目录中——例如 `/resources/bar/foo.xhtml`。这将使组件“foo”在命名空间
    `http://xmlns.jcp.org/jsf/composite/bar` 中可用。


    组件当然不是视图，用户不应该能够直接请求它们。不幸的是，`/resources` 对于 Java EE 来说并不是一个特殊的目录。JSF 通过约定赋予了它特殊含义，但对于
    Servlet 容器来说，它和其他目录一样。这特别意味着对此没有应用任何保护，任何用户都可以直接从中请求资源。换句话说，这个目录是“世界可读的”。即使使用
    `*.xhtml` 映射，这不仅允许用户猜测我们有哪些组件，还允许用户尝试执行这些组件。显然，这不是我们想要的。


    对此同样有两种解决方案：


    1.  配置另一个目录作为 JSF 资源目录

    2.  向 `web.xml` 添加安全约束


    在 JSF 2.2 中，引入了一种解决此安全漏洞的方法。即，通过 `javax.faces.WEBAPP_RESOURCES_DIRECTORY` 上下文参数，可以将另一个目录配置为
    JSF 资源目录，而不是 `/resources`。例如：


    ```

    <context-param>

        <param-name>javax.faces.WEBAPP_RESOURCES_DIRECTORY</param-name>

        <param-value>WEB-INF/resources</param-value>

    </context-param>

    ```


    请注意，该路径是相对于 Web 根目录的，并且不能以“/”开头。


    或者，对于 JSF 2.0/2.1，可以在 `web.xml` 中再次配置一个安全约束，以禁止调用者访问 `/resources`。这可以通过类似于保护 `*.xhtml`
    访问的方式来完成。


    ```

    <security-constraint>

        <web-resource-collection>

            <web-resource-name>resources</web-resource-name>

            <description>资源目录</description>

            <url-pattern>/resources/*</url-pattern>

        </web-resource-collection>

        <auth-constraint />

    </security-constraint>

    ```


    © Bauke Scholtz, Arjan Tijms 2018


    Bauke Scholtz 和 Arjan Tijms，《Java EE 8 中 JSF 的权威指南》，`doi.org/10.1007/978-1-4842-3387-0_14`

