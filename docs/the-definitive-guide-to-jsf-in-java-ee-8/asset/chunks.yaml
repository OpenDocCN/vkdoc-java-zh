        xmlns:t="http://example.com/tags"

    >

        <ui:param name="title" value="Log In" />


    <ui:define name="content">

            <h:form>

                <fieldset>

                    <header>

                        <h1>Log In</h1>

                    </header>

                    <t:field type="email" id="email" label="Email"

                        value="#{login.email}">

                    </t:field>

                    <t:field type="password" id="password" label="Password"

                        value="#{login.password}">

                    </t:field>

                    <footer>

                        <t:button id="submit" label="Log In"

                             action="#{login.submit()}">

                        </t:button>

                    </footer>

                </fieldset>

            </h:form>

        </ui:define>

    </ui:composition>

    ```


    Do note that the type="email" of the e-mail field thus ends up in <c:otherwise>
    of the tag file implementation wherein it gets passed through the a:type="#{type}"
    attribute of <h:inputText>. This allows you to easily use HTML5 input fields,
    such as type="email", type="number", type="tel", etc. The type attribute being
    defined as a pass-through attribute a:type is mandatory, because the <h:inputText>
    by default ignores any custom type attribute and stubbornly renders type="text".


    You might also have noticed another custom tag, <t:button>. Here’s how it is implemented
    in /WEB-INF/tags/button.xhtml.


    ```

    <ui:composition

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:jsf="http://xmlns.jcp.org/jsf"

        xmlns:f="http://xmlns.jcp.org/jsf/core"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"

    >

        <div class="button" jsf:rendered="#{rendered ne false}">

            <h:commandButton id="#{id}" value="#{label}">

                <f:actionListener binding="#{action}" />

                <f:ajax execute="@form" render="@form" />

            </h:commandButton>

            <h:messages id="#{id}_m" globalOnly="true" redisplay="false" />

        </div>

    </ui:composition>

    ```


    It’s registered in example.taglib.xml nearly the same way as <t:field>, with one
    exception for the action attribute. Technically, you need to specify a <method-signature>
    instead of a (property) <type>:


    ```

    <attribute>

        <description>

            Action method of the button.

            NOTE: must include method parenthesis.

        </description>

        <name>action</name>

        <required>true</required>

        <method-signature>void action()</method-signature>

    </attribute>

    ```


    You might have noticed that the actual tag implementation uses <f:actionListener
    binding="#{action}"> instead of action="#{action}". This is actually a necessary
    trick in order to get it to properly invoke the method. That is, the <method-signature>
    was initially intended for UI components, not for tag files. It’s ignored in tag
    files. This may be worked on for JSF.next. For now, you can get away with the
    <f:actionListener binding> trick. This has only one additional requirement: you
    need to explicitly include the method parenthesis in the tag file client as in
    <t:button action="#{login.submit()}">.<t:button action="{login.submit}"> will
    otherwise fail with *javax.el.PropertyNotFoundException: The class ‘com.example.project.view.Login’
    does not have the property ‘submit’*.


    In case you would like to customize tag files from the tag file client side on,
    e.g., by adding more specific input attributes, or nesting core tags, or by prepending
    or appending content to the label or message, then you can use <ui:define> and
    <ui:insert> the same way you’re used to doing with master template files and decorate
    files. The following example demonstrates how you can enhance the /WEB-INF/tags/field.xhtml
    on this with a bunch of new <ui:insert> tags:'
  trans: '

    <tag>

            <description>渲染标签、输入框和消息字段。</description>

            <tag-name>field</tag-name>

            <source>tags/field.xhtml</source>

            <attribute>

                <description>输入组件的类型。</description>

                <name>type</name>

                <required>false</required>

                <type>java.lang.String</type>

            </attribute>

            <attribute>

                <description>输入组件的 ID。</description>

                <name>id</name>

                <required>true</required>

                <type>java.lang.String</type>

            </attribute>

            <attribute>

                <description>输入组件的标签。</description>

                <name>label</name>

                <required>true</required>

                <type>java.lang.String</type>

            </attribute>

            <attribute>

                <description>输入组件的值。</description>

                <name>value</name>

                <required>false</required>

                <type>java.lang.Object</type>

            </attribute>

            <attribute>

                <description>字段是否被渲染。</description>

                <name>rendered</name>

                <required>false</required>

                <type>boolean</type>

            </attribute>

        </tag>

    </facelet-taglib>


    不可否认，这确实是相当多的样板代码。但了解以下内容很有帮助：`<attribute>` 元素对于标签文件的技术运行并非强制要求。你甚至可以完全省略它们。但这样一来，IDE
    在尝试自动补全自定义标签时，就无法将这些属性加载到自动建议框中。这对开发者来说并不友好。因此，最好还是保留它们。顺便提一下，标签属性的 `<required>`
    属性仅在 JSF 项目阶段设置为 Development 时才会导致运行时错误。在其他 JSF 项目阶段，它会被忽略。而且，大多数 IDE 在自动补全标签时会立即提示这些必需属性。


    文件名 `example.taglib.xml` 可以自由选择。为了让 JSF 在应用启动时自动识别标签库文件，只有两个要求：文件扩展名必须是 `.taglib.xml`，并且必须放置在
    `/WEB-INF` 文件夹中（如果是最终位于 `/WEB-INF/lib` 的 JAR 文件，则放置在该 JAR 文件的 `/META-INF` 文件夹中）。不幸的是，在某些服务器（如
    GlassFish/Payara）上，将文件放在 `/WEB-INF` 中并不总是能正常工作。在这种情况下，你需要通过 `web.xml` 中的以下上下文参数显式注册它，该参数的值表示从
    Web 根目录到 `*.taglib.xml` 文件的完整路径。


    ```

    <context-param>

        <param-name>javax.faces.FACELETS_LIBRARIES</param-name>

        <param-value>/WEB-INF/example.taglib.xml</param-value>

    </context-param>

    ```


    为了使用 `*.taglib.xml` 中定义的任何标签，你首先必须在你的 Facelet 中精确声明标签库的 `<namespace>` URI，以及一个任意的
    XML 命名空间前缀。为了提高代码的可维护性，建议选择标签库在其 `<short-name>` 中指定的首选 XML 命名空间前缀，在我们的 `example.taglib.xml`
    中，这个前缀是 "t"。


    ```

    <ui:composition template="/WEB-INF/templates/layout.xhtml"

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"

        xmlns:t="http://example.com/tags"

    >

        <ui:param name="title" value="登录" />


    <ui:define name="content">

            <h:form>

                <fieldset>

                    <header>

                        <h1>登录</h1>

                    </header>

                    <t:field type="email" id="email" label="邮箱"

                        value="#{login.email}">

                    </t:field>

                    <t:field type="password" id="password" label="密码"

                        value="#{login.password}">

                    </t:field>

                    <footer>

                        <t:button id="submit" label="登录"

                             action="#{login.submit()}">

                        </t:button>

                    </footer>

                </fieldset>

            </h:form>

        </ui:define>

    </ui:composition>

    ```


    请注意，电子邮件字段的 `type="email"` 最终会进入标签文件实现中的 `<c:otherwise>`，并通过 `<h:inputText>` 的
    `a:type="#{type}"` 属性传递。这允许你轻松使用 HTML5 输入字段，例如 `type="email"`、`type="number"`、`type="tel"`
    等。将 `type` 属性定义为透传属性 `a:type` 是强制性的，因为 `<h:inputText>` 默认会忽略任何自定义的 `type` 属性，并固执地渲染为
    `type="text"`。


    你可能还注意到了另一个自定义标签 `<t:button>`。以下是它在 `/WEB-INF/tags/button.xhtml` 中的实现方式。


    ```

    <ui:composition

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:jsf="http://xmlns.jcp.org/jsf"

        xmlns:f="http://xmlns.jcp.org/jsf/core"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"

    >

        <div class="button" jsf:rendered="#{rendered ne false}">

            <h:commandButton id="#{id}" value="#{label}">

                <f:actionListener binding="#{action}" />

                <f:ajax execute="@form" render="@form" />

            </h:commandButton>

            <h:messages id="#{id}_m" globalOnly="true" redisplay="false" />

        </div>

    </ui:composition>

    ```


    它在 `example.taglib.xml` 中的注册方式与 `<t:field>` 几乎相同，但 `action` 属性是个例外。从技术上讲，你需要指定一个
    `<method-signature>` 而不是（属性）`<type>`：


    ```

    <attribute>

        <description>

            按钮的动作方法。

            注意：必须包含方法括号。

        </description>

        <name>action</name>

        <required>true</required>

        <method-signature>void action()</method-signature>

    </attribute>

    ```


    你可能已经注意到，实际的标签实现使用了 `<f:actionListener binding="#{action}">` 而不是 `action="#{action}"`。这实际上是一个必要的技巧，以便正确调用该方法。也就是说，`<method-signature>`
    最初是为 UI 组件设计的，而不是为标签文件设计的。它在标签文件中会被忽略。这个问题可能会在 JSF.next 中得到解决。目前，你可以通过 `<f:actionListener
    binding>` 这个技巧来规避。这只有一个额外要求：你需要在标签文件客户端显式包含方法括号，例如 `<t:button action="#{login.submit()}">`。否则，`<t:button
    action="{login.submit}">` 会失败，并抛出 *javax.el.PropertyNotFoundException: The class
    ‘com.example.project.view.Login’ does not have the property ‘submit’*。


    如果你希望从标签文件客户端开始自定义标签文件，例如，通过添加更具体的输入属性、嵌套核心标签，或者在标签或消息前/后追加内容，那么你可以像使用主模板文件和装饰文件一样，使用
    `<ui:define>` 和 `<ui:insert>`。以下示例演示了如何通过添加一组新的 `<ui:insert>` 标签来增强 `/WEB-INF/tags/field.xhtml`：

