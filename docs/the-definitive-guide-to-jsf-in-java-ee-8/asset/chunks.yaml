    ### 应用请求值阶段（第二阶段）


    `UIComponent#processDecodes()` 将在 `UIViewRoot` 上被调用。`processDecodes()` 方法首先会在每个子组件和
    facet 上调用 `processDecodes()`，然后在其自身上调用 `UIComponent#decode()`。最后，调用 `UIViewRoot#broadCastEvents()`
    来触发为当前阶段排队的任何 `FacesEvent`。默认的 JSF API（应用程序编程接口）不提供此类事件，但开发者可以创建并排队自己的事件。


    `decode()` 方法的默认实现将委托给 `Renderer#decode()` 方法。在组件或渲染器的 `decode()` 方法中，实现有机会从请求参数中提取提交的值，并将其设置为内部属性。在标准
    HTML 组件集中，唯一执行此操作的组件是派生自 `UIForm`、`UIInput` 和 `UICommand` 的基于 HTML 表单的组件。`UIForm`
    组件将调用 `UIForm#setSubmitted()` 并传入 `true`。`UIInput` 组件将调用 `UIInput#setSubmittedValue()`
    并传入请求参数的值。`UICommand` 组件将为调用应用阶段（第五阶段）排队 `ActionEvent`。


    ### 处理验证阶段（第三阶段）


    `UIComponent#processValidators()` 将在 `UIViewRoot` 上被调用。`processValidators()` 方法基本上会首先为当前组件触发
    `PreValidateEvent`，然后在每个子组件和 facet 上调用 `processValidators()`，接着为当前组件触发 `PostValidateEvent`。最后，它将调用
    `UIViewRoot#broadCastEvents()` 来触发为当前阶段排队的任何 `FacesEvent`，这通常是 `ValueChangeEvent`
    的一个实例。


    在标准 HTML 组件集中，只有 `UIInput` 组件在此处行为不同。在调用每个子组件和 facet 的 `processValidators()` 之前，它们会首先在其自身上调用
    `UIInput#validate()`。如果在应用请求值阶段（第二阶段）设置了提交的值，那么它们会首先在任何附加的 `Converter` 上调用 `Converter#getAsObject()`。当它没有抛出
    `ConverterException` 时，它们会在所有附加的 `Validator` 实例上调用 `Validator#validate()`，无论其中是否有任何一个抛出了
    `ValidatorException`。


    当没有抛出 `ConverterException` 或 `ValidatorException` 时，将使用转换并验证后的值调用 `UIInput#setValue()`，并且
    `UIInput#isLocalValueSet()` 标志将返回 `true`，同时将使用 `null` 调用 `UIInput#setSubmittedValue()`。


    当抛出了任何 `ConverterException` 或 `ValidatorException` 时，将使用 `false` 调用 `UIInput#setValid()`，并且异常的消息将通过
    `FacesContext#addMessage()` 添加到 faces 上下文中。最后，当 `UIInput#isValid()` 返回 `false`
    时，将使用 `true` 调用 `FacesContext#setValidationFailed()`。


    在该阶段结束时，当 `FacesContext#isValidationFailed()` 返回 `true` 时，立即前进到渲染响应阶段（第六阶段），从而跳过中间的任何阶段。


    ### 更新模型值阶段（第四阶段）


    `UIComponent#processUpdates()` 将在 `UIViewRoot` 上被调用。`processUpdates()` 方法将依次在每个子组件和
    facet 上调用 `processUpdates()` 方法。最后，它将调用 `UIViewRoot#broadCastEvents()` 来触发为当前阶段排队的任何
    `FacesEvent`。默认的 JSF API 不提供此类事件，但开发者可以创建并排队自己的事件。


    同样在此阶段，在标准 HTML 组件集中，只有 `UIInput` 组件在此处有一个钩子。在调用每个子组件和 facet 的 `processUpdates()`
    之后，它们会在其自身上调用 `UIInput#updateModel()`。当 `UIInput#isValid()` 和 `UIInput#isLocalValueSet()`
    都返回 `true` 时，它们将使用 `getLocalValue()` 作为参数调用值属性背后的 setter 方法，并立即使用 `null` 调用 `UIInput#setValue()`，同时清除
    `UIInput#isLocalValueSet()` 标志。


    当在此处抛出 `RuntimeException`（通常由 setter 方法本身的错误引起）时，它将使用 `false` 调用 `UIInput#setValid()`，并排队
    `UpdateModelException`，然后立即前进到渲染响应阶段（第六阶段），从而跳过中间的任何阶段。


    ### 调用应用阶段（第五阶段）


    将调用 `UIViewRoot#processApplication()`。此方法将依次调用 `UIViewRoot#broadCastEvents()`
    来触发为当前阶段排队的任何 `FacesEvent`，这通常是 `AjaxBehaviorEvent` 或 `ActionEvent` 的实例。请注意，`processApplication()`
    方法仅在 `UIViewRoot` 类上定义，并且不会遍历组件树。


    ### 渲染响应阶段（第六阶段）


    当组件树仍然为空时，即当请求不是回发请求，或者视图没有包含子组件的 `<f:metadata>`，或者开发者在此期间使用自己的实例显式调用了 `FacesContext#setViewRoot()`
    时，则基于视图定义构建完整的组件树。当组件树存在时，首先为 `UIViewRoot` 触发 `PreRenderViewEvent`，然后在 `UIViewRoot`
    上调用 `UIComponent#encodeAll()`，接着为 `UIViewRoot` 触发 `PostRenderViewEvent`。


    `UIComponent#encodeAll()` 方法基本上会首先在其自身上调用 `encodeBegin()`，然后如果 `UIComponent#getRendersChildren()`
    返回 `true`，则在其自身上调用 `encodeChildren()`，否则在每个子组件上调用 `UIComponent#encodeAll()`，然后在其自身上调用
    `encodeEnd()`。所有这些仅在 `UIComponent#isRendered()` 返回 `true` 时发生——也就是说，当组件标签的 `rendered`
    属性计算结果不为 `false` 时。


    `encodeBegin()` 方法的默认实现会首先为当前组件触发 `PreRenderComponentEvent`，然后委托给 `Renderer#encodeBegin()`。`encodeChildren()`
    方法的默认实现会委托给 `Renderer#encodeChildren()`。`encodeEnd()` 方法的默认实现会委托给 `Renderer#encodeEnd()`。如果组件没有附加渲染器，即当
    `UIComponent#getRendererType()` 返回 `null` 时，则不会向响应中渲染任何 HTML 输出。


    在 `encodeBegin()` 方法中，组件或渲染器实现有机会将开头的 HTML 元素及其所有属性写入响应。在 `encodeChildren()` 方法中，组件或渲染器实现有机会在必要时装饰或覆盖子组件的渲染。在
    `encodeEnd()` 方法中，组件或渲染器实现有机会写入结尾的 HTML 标签。向响应写入内容是通过 `FacesContext#getResponseWriter()`
    可用的响应写入器完成的。


    对于在任何阶段触发的任何提到的 `XxxEvent` 类，如果任何监听器方法抛出 `javax.faces.event.AbortProcessingException`，¹
    则当前正在运行的阶段将立即中止，并且生命周期将立即前进到渲染响应阶段（第六阶段），从而跳过中间的任何阶段。

    '
- fmt: "# Ajax Life Cycle\n\nThe life cycle is almost identical during Ajax requests.\
    \ Only the second, third, fourth, and sixth phases are slightly different. The\
    \ `processDecodes()`, `processValidators()`, and `processUpdates()` methods will\
    \ only be invoked on the `UIViewRoot` itself and any component covered by the\
    \ component search expression specified in `<f:ajax execute>`. And, the `encodeAll()`\
    \ method will only be invoked on the `UIViewRoot` itself and any component covered\
    \ by the component search expression specified in `<f:ajax render>`. Read more\
    \ on search expressions in Chapter [12](#A454457_1_En_12_Chapter.xhtml).\n\nNote\
    \ thus that there would be no difference in the Ajax life cycle when the component\
    \ search expression contains the `\"@all\"` keyword. In other words, use `\"@all\"\
    ` with care. There are no sensible real-world use cases for `<f:ajax execute=\"\
    @all\">`. On the HTML side, it’s not possible to submit multiple forms at once.\
    \ Only the enclosing form is submitted. The biggest value is thus `<f:ajax execute=\"\
    @form\">`. However, there is one sensible real-world use case for `<f:ajax render=\"\
    @all\">`, namely, rendering a full error page in case an exception is thrown during\
    \ an Ajax request. Even then, this can only be programmatically triggered via\
    \ `PartialViewContext#setRenderAll()`. For more detail, see Chapter [9](#A454457_1_En_9_Chapter.xhtml).\n\
    \n# View Build Time\n\nThe “view build time” is not tied to a particular phase\
    \ of the JSF life cycle. The view build time is that moment when the physical\
    \ `UIViewRoot` instance is populated with all of its children based on the view\
    \ definition.\n\nWhen JSF is about to create an `UIComponent` instance based on\
    \ the view definition, it will first check whether the `binding` attribute of\
    \ the component representation returns a concrete `UIComponent` instance and,\
    \ if so, then continue using it instead, or else create the `UIComponent` instance\
    \ based on the “component type” associated with it and then invoke the setter\
    \ behind the `binding` attribute, if any, with it. If the `id` attribute of the\
    \ component representation in the view definition is specified, then `UIComponent#setId()`\
    \ will be invoked with it. Finally, `UIComponent#setParent()` will be invoked\
    \ with the parent component and then the component instance becomes physically\
    \ part of the component tree. This tree will exist until the end of the render\
    \ response phase (sixth phase). Then it becomes eligible for the garbage collector,\
    \ along with the released faces context instance.\n\nEffectively, `UIComponent`\
    \ instances are thus request scoped. The `binding` attribute can refer a managed\
    \ bean property, but as `UIComponent` instances are inherently request scoped,\
    \ the target managed bean must be request scoped and may not be in a broader scope.\
    \ This won’t be checked by the JSF API, so you as the developer should make absolutely\
    \ sure that you don’t reference a broader scoped managed bean in the `binding`\
    \ attribute of any component.\n\nHowever, when the `binding` attribute references\
    \ a managed bean in a broader scope than the request scope, then you’re not only\
    \ basically saving the entire component tree in the HTTP session in case the bean\
    \ is view or session scoped, but you’re also essentially sharing the entire component\
    \ tree across multiple HTTP requests which are concurrently accessing the very\
    \ same managed bean instance—very inefficient and thus dangerous.\n\nThe view\
    \ build time can technically happen during any JSF life cycle phase. Generally,\
    \ that’s the restore view phase (first phase), particularly during a postback\
    \ request, or when the view has `<f:metadata>` with children. It can also happen\
    \ during the render response phase (sixth phase), particularly during a GET request\
    \ when the view has no `<f:metadata>` with children, or when a non-redirect navigation\
    \ has taken place during a postback. It will also happen when the developer programmatically\
    \ invokes `ViewDeclarationLanguage#buildView()`, which can be implicitly done\
    \ via, among others, `ViewHandler#createView()` as shown in the following action\
    \ method code example which forces us to fully rebuild the current view from scratch:\n\
    \n```\npublic void rebuildCurrentView() {\n    FacesContext context = FacesContext.getCurrentInstance();\n\
    \    UIViewRoot currentView = context.getViewRoot();\n    String viewId = currentView.getViewId();\n\
    \    ViewHandler viewHandler = context.getApplication.getViewHandler();\n    UIViewRoot\
    \ newView = viewHandler.createView(context, viewId);\n    context.setViewRoot(newView);\n\
    }\n```\n\nDo note that the view state is not per definition during the view build\
    \ time restored into the component tree. The view state is only restored into\
    \ the component tree during the restore view phase (first phase), and that happens\
    \ after it has executed the view build time by itself. In other words, the above\
    \ shown `rebuildCurrentView()` method does not restore the current view state\
    \ into the newly created component tree. Programmatically restoring the view state\
    \ is generally not recommended when programmatically rebuilding the view as above,\
    \ as in a real-world JSF application the sole reason to rebuild the current view\
    \ is usually to get rid of any changes caused by the persistent view state, and/or\
    \ to re-execute any JSTL tags based on the freshly changed values in the managed\
    \ bean.\n\n# View Render Time\n\nThe “view render time” is also not tied to a\
    \ particular phase of the JSF life cycle. The view render time is that moment\
    \ when `UIComponent#encodeAll()` of a particular component is invoked.\n\nTrue,\
    \ it’s by default always executed on the `UIViewRoot` during the render response\
    \ phase (sixth phase), but this doesn’t stop you from programmatically invoking\
    \ it during a different phase, such as the invoke application phase (fifth phase),\
    \ for example, in order to obtain the generated HTML output of an arbitrary component\
    \ as a `String` variable."
  raw: '## Ajax Life Cycle


    The life cycle is almost identical during Ajax requests. Only the second, third,
    fourth, and sixth phases are slightly different. The processDecodes(), processValidators(),
    and processUpdates() methods will only be invoked on the UIViewRoot itself and
    any component covered by the component search expression specified in <f:ajax
    execute>. And, the encodeAll() method will only be invoked on the UIViewRoot itself
    and any component covered by the component search expression specified in <f:ajax
    render>. Read more on search expressions in Chapter [12](#A454457_1_En_12_Chapter.xhtml).


    Note thus that there would be no difference in the Ajax life cycle when the component
    search expression contains the "@all" keyword. In other words, use "@all" with
    care. There are no sensible real-world use cases for <f:ajax execute="@all">.
    On the HTML side, it’s not possible to submit multiple forms at once. Only the
    enclosing form is submitted. The biggest value is thus <f:ajax execute="@form">.
    However, there is one sensible real-world use case for <f:ajax render="@all">,
    namely, rendering a full error page in case an exception is thrown during an Ajax
    request . Even then, this can only be programmatically triggered via PartialViewContext#setRenderAll().
    For more detail, see Chapter [9](#A454457_1_En_9_Chapter.xhtml).


    ## View Build Time


    The “view build time ” is not tied to a particular phase of the JSF life cycle.
    The view build time is that moment when the physical UIViewRoot instance is populated
    with all of its children based on the view definition.


    When JSF is about to create an UIComponent instance based on the view definition,
    it will first check whether the binding attribute of the component representation
    returns a concrete UIComponent instance and, if so, then continue using it instead,
    or else create the UIComponent instance based on the “component type” associated
    with it and then invoke the setter behind the binding attribute, if any, with
    it. If the id attribute of the component representation in the view definition
    is specified, then UIComponent#setId() will be invoked with it. Finally, UIComponent#setParent()
    will be invoked with the parent component and then the component instance becomes
    physically part of the component tree. This tree will exist until the end of the
    render response phase (sixth phase). Then it becomes eligible for the garbage
    collector, along with the released faces context instance.


    Effectively, UIComponent instances are thus request scoped. The binding attribute
    can refer a managed bean property, but as UIComponent instances are inherently
    request scoped, the target managed bean must be request scoped and may not be
    in a broader scope. This won’t be checked by the JSF API, so you as the developer
    should make absolutely sure that you don’t reference a broader scoped managed
    bean in the binding attribute of any component .


    However, when the binding attribute references a managed bean in a broader scope
    than the request scope, then you’re not only basically saving the entire component
    tree in the HTTP session in case the bean is view or session scoped, but you’re
    also essentially sharing the entire component tree across multiple HTTP requests
    which are concurrently accessing the very same managed bean instance—very inefficient
    and thus dangerous.


    The view build time can technically happen during any JSF life cycle phase. Generally,
    that’s the restore view phase (first phase), particularly during a postback request,
    or when the view has <f:metadata> with children. It can also happen during the
    render response phase (sixth phase), particularly during a GET request when the
    view has no <f:metadata> with children, or when a non-redirect navigation has
    taken place during a postback. It will also happen when the developer programmatically
    invokes ViewDeclarationLanguage#buildView(), which can be implicitly done via,
    among others, ViewHandler#createView() as shown in the following action method
    code example which forces us to fully rebuild the current view from scratch:


    ```

    public void rebuildCurrentView() {

        FacesContext context = FacesContext.getCurrentInstance();

        UIViewRoot currentView = context.getViewRoot();

        String viewId = currentView.getViewId();

        ViewHandler viewHandler = context.getApplication.getViewHandler();

        UIViewRoot newView = viewHandler.createView(context, viewId);

        context.setViewRoot(newView);

    }

    ```


    Do note that the view state is not per definition during the view build time restored
    into the component tree. The view state is only restored into the component tree
    during the restore view phase (first phase), and that happens after it has executed
    the view build time by itself. In other words, the above shown rebuildCurrentView()
    method does not restore the current view state into the newly created component
    tree. Programmatically restoring the view state is generally not recommended when
    programmatically rebuilding the view as above, as in a real-world JSF application
    the sole reason to rebuild the current view is usually to get rid of any changes
    caused by the persistent view state, and/or to re-execute any JSTL tags based
    on the freshly changed values in the managed bean.


    ## View Render Time


    The “view render time ” is also not tied to a particular phase of the JSF life
    cycle. The view render time is that moment when UIComponent#encodeAll() of a particular
    component is invoked.


    True, it’s by default always executed on the UIViewRoot during the render response
    phase (sixth phase), but this doesn’t stop you from programmatically invoking
    it during a different phase, such as the invoke application phase (fifth phase),
    for example, in order to obtain the generated HTML output of an arbitrary component
    as a String variable.'
  trans: '

    ## Ajax 生命周期


    Ajax 请求期间的生命周期几乎相同。只有第二、三、四和第六阶段略有不同。`processDecodes()`、`processValidators()`
    和 `processUpdates()` 方法仅会在 `UIViewRoot` 本身以及 `<f:ajax execute>` 中指定的组件搜索表达式所覆盖的任何组件上被调用。而
    `encodeAll()` 方法仅会在 `UIViewRoot` 本身以及 `<f:ajax render>` 中指定的组件搜索表达式所覆盖的任何组件上被调用。更多关于搜索表达式的内容，请参阅第
    12 章。


    因此请注意，当组件搜索表达式包含 `"@all"` 关键字时，Ajax 生命周期不会有任何区别。换句话说，请谨慎使用 `"@all"`。在实际应用场景中，使用
    `<f:ajax execute="@all">` 并不合理。在 HTML 端，不可能同时提交多个表单。只有包含该组件的表单会被提交。因此，最大的价值在于
    `<f:ajax execute="@form">`。然而，对于 `<f:ajax render="@all">` 有一个合理的实际用例，即在 Ajax 请求期间抛出异常时渲染完整的错误页面。即便如此，这也只能通过
    `PartialViewContext#setRenderAll()` 以编程方式触发。更多细节，请参阅第 9 章。


    ## 视图构建时间


    “视图构建时间”并不与 JSF 生命周期的某个特定阶段绑定。视图构建时间是指根据视图定义，用其所有子节点填充物理 `UIViewRoot` 实例的时刻。


    当 JSF 准备根据视图定义创建一个 `UIComponent` 实例时，它会首先检查组件表示的 `binding` 属性是否返回一个具体的 `UIComponent`
    实例，如果是，则继续使用该实例；否则，根据与之关联的“组件类型”创建 `UIComponent` 实例，然后（如果存在）调用 `binding` 属性对应的
    setter 方法。如果视图定义中指定了组件表示的 `id` 属性，则会调用 `UIComponent#setId()`。最后，会调用 `UIComponent#setParent()`
    设置父组件，然后该组件实例就成为组件树的一部分。这个树将一直存在，直到渲染响应阶段（第六阶段）结束。之后，它连同已释放的 `FacesContext` 实例一起，成为垃圾回收器的候选对象。


    因此，`UIComponent` 实例本质上是请求作用域的。`binding` 属性可以引用一个受管 bean 属性，但由于 `UIComponent` 实例本质上是请求作用域的，目标受管
    bean 也必须是请求作用域的，而不能是更宽的作用域。JSF API 不会检查这一点，因此作为开发者，你必须绝对确保在任何组件的 `binding` 属性中，不要引用更宽作用域的受管
    bean。


    然而，当 `binding` 属性引用了比请求作用域更宽的受管 bean 时，你不仅基本上是在将整个组件树保存到 HTTP 会话中（如果 bean 是视图或会话作用域），而且你还在本质上跨多个并发访问同一个受管
    bean 实例的 HTTP 请求共享整个组件树——这非常低效且危险。


    从技术上讲，视图构建时间可以发生在任何 JSF 生命周期阶段。通常，它发生在恢复视图阶段（第一阶段），特别是在回传请求期间，或者当视图包含带有子元素的 `<f:metadata>`
    时。它也可能发生在渲染响应阶段（第六阶段），特别是在 GET 请求期间，当视图没有包含子元素的 `<f:metadata>` 时，或者在回传期间发生了非重定向导航时。当开发者以编程方式调用
    `ViewDeclarationLanguage#buildView()` 时也会发生，这可以通过 `ViewHandler#createView()` 等方式隐式完成，如下面的操作方法代码示例所示，该示例强制我们从零开始完全重建当前视图：


    ```

    public void rebuildCurrentView() {

        FacesContext context = FacesContext.getCurrentInstance();

        UIViewRoot currentView = context.getViewRoot();

        String viewId = currentView.getViewId();

        ViewHandler viewHandler = context.getApplication.getViewHandler();

        UIViewRoot newView = viewHandler.createView(context, viewId);

        context.setViewRoot(newView);

    }

    ```


    请注意，视图状态并不一定在视图构建期间被恢复到组件树中。视图状态仅在恢复视图阶段（第一阶段）被恢复到组件树中，并且这发生在该阶段自身执行完视图构建之后。换句话说，上面展示的
    `rebuildCurrentView()` 方法并不会将当前视图状态恢复到新创建的组件树中。当像上面那样以编程方式重建视图时，通常不建议以编程方式恢复视图状态，因为在实际的
    JSF 应用程序中，重建当前视图的唯一原因通常是摆脱持久化视图状态引起的任何更改，和/或基于受管 bean 中新更改的值重新执行任何 JSTL 标签。


    ## 视图渲染时间


    “视图渲染时间”也不与 JSF 生命周期的某个特定阶段绑定。视图渲染时间是指调用特定组件的 `UIComponent#encodeAll()` 的时刻。


    诚然，默认情况下它总是在渲染响应阶段（第六阶段）在 `UIViewRoot` 上执行，但这并不妨碍你在其他阶段（例如调用应用程序阶段（第五阶段））以编程方式调用它，例如，为了获取任意组件生成的
    HTML 输出作为字符串变量。

