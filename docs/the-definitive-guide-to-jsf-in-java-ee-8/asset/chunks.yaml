    ```


    Finally, adjust the <resource-bundle><base-name> entry in faces-config.xml to
    specify the fully qualified name of the custom ResourceBundle as follows:


    ```

    <base-name>com.example.project.i18n.DatabaseResourceBundle</base-name>

    ```


    The actual implementation of this ResourceBundle is frankly somewhat hacky, only
    and only because of the following limitations:


    1.  JSF doesn’t allow defining a custom ResourceBundle.Control via faces-config.xml.


    2.  Providing a custom ResourceBundle.Control via SPI (Serial Peripheral Interface)
    as java.util.spi.ResourceBundleControlProvider doesn’t work from WAR on.


    3.  Create multiple separate DatabaseResourceBundle subclasses for each single
    locale registered in faces-config.xml, such as DatabaseResourceBundle_en, DatabaseResourceBundle_pt_BR,
    and DataBaseResourceBundle_hi, in order to satisfy the default ResourceBundle.Control
    behavior is not maintenance friendly in long term.


    An additional advantage of this approach is that it allows you to programmatically
    clear out any database bundles in the cache by simply calling ResourceBundle#clearCache().
    Namely, the JSF implementation may in turn cache it in its Application implementation,
    causing the ResourceBundle#clearCache() to seem to have no effect at all. Mojarra
    is known to do that.[⁹](#A454457_1_En_14_Chapter.xhtml#Fn9)


    ## HTML in ResourceBundle


    This is a bad practice. It adds a maintenance burden. For large sections of content
    you’d better pick a more lightweight markup language than HTML , such as Markdown.[^(10)](#A454457_1_En_14_Chapter.xhtml#Fn10)
    This is not only safer as to XSS (cross-site scripting) risks but also easier
    for the user to edit via a text area in some Content Management System (CMS) screens.
    This is best to implement in combination with a database-based resource bundle.
    You could add an extra boolean flag to the Translation model indicating whether
    the value should be parsed as Markdown.


    ```

    @Column(nullable = false)

    private boolean markdown;

    ```


    Then, inside TranslationService#getContents(), select it as the third column.


    ```

    "SELECT t1.key, COALESCE(t2.value, t1.value), t1.markdown"

    ```


    And, finally, in the DatabaseControl#newBundle() method, after retrieving the
    contents, you could postprocess them based on the boolean . You could use any
    Java-based Markdown library for this, such as CommonMark.[^(11)](#A454457_1_En_14_Chapter.xhtml#Fn11)


    ```

    static final Parser PARSER = Parser.builder().build();

    static final HtmlRenderer RENDERER = HtmlRenderer.builder().build();

    ...

    for (Object[] translation : contents) {

        if ((boolean) translation[2]) {

            translation[1] = RENDERER.render(PARSER.parse(translation[1]));

        }

    }

    ```


