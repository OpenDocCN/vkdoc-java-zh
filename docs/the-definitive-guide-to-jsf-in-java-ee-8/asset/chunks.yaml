- fmt: "###### Figure 4-1 Chrome Developer Tools—Network—Headers—Form Data\n\nThe\
    \ hidden input field with the name representing the ID of the `<h:form>` will\
    \ signal JSF which form exactly was submitted during the postback request. That\
    \ is, a single HTML document can have multiple form elements. This way JSF can,\
    \ during the apply request values phase (second phase), determine whether the\
    \ current form component was actually submitted. It will cause the `UIForm#isSubmitted()`\
    \ of the form component to return `true`. The hidden input field with the name\
    \ `javax.faces.ViewState` represents the unique identifier referring the serialized\
    \ view state object which is stored in the session. Both hidden input fields are\
    \ automatically included by the renderer associated with the `UIForm` component.\
    \ The `autocomplete=\"off\"` on the view state hidden input field is, by the way,\
    \ not a technical requirement but just a work-around against some browsers overriding\
    \ it with the last known value when the back button is pressed, which may not\
    \ be the correct value per se.\n\nOur example hidden input field has an empty\
    \ value. It’s effectively useless in this form. Such a hidden input field is generally\
    \ only useful when its value is being set by some JavaScript code which you’d\
    \ like to capture in the managed bean. There’s generally no point to “transferring”\
    \ managed bean properties from one to the next request using hidden input fields.\
    \ Instead, such properties should be assigned to a managed bean which is declared\
    \ to be in a broader scope than the request scope, such as the view, flow, or\
    \ session scope. This saves the effort of hassling with hidden input fields. The\
    \ bean scopes will be detailed in Chapter [8](#A454457_1_En_8_Chapter.xhtml).\n\
    \nThe other request parameters should speak for themselves if you’re familiar\
    \ with basic HTML. They represent the name/value pairs of the involved input elements.\
    \ You should be able to determine which values were actually entered in the form\
    \ prior to submitting. JSF will also be able to do the same. It will traverse\
    \ the component tree and use the “client ID” of the component as request parameter\
    \ name to obtain the value from the request parameter map. Basically, the following\
    \ code will under the hood be executed for each input component during apply request\
    \ values phase (second phase). This happens in the `UIInput#decode()` method.\n\
    \n```\nFacesContext context = FacesContext.getCurrentInstance();\nExternalContext\
    \ externalContext = context.getExternalContext();\nMap<String, String> formData\
    \ = externalContext.getRequestParameterMap();\n\nString clientId = component.getClientId(context);\n\
    String submittedValue = formData.get(clientId);\ncomponent.setSubmittedValue(submittedValue);\n\
    ```\n\nAnd, during the same phase, the following code is basically executed for\
    \ each command component in the decode method of the renderer associated with\
    \ the component:\n\n```\nif (formData.get(clientId) != null) {\n    component.queueEvent(new\
    \ ActionEvent(context, component));\n}\n```\n\nDuring the process validations\
    \ phase (third phase), JSF will set the submitted value of every involved input\
    \ component as “local value” after performing the necessary conversion and validation\
    \ if any converter or validator is registered on the component or associated bean\
    \ property and has executed without errors. This happens in the `UIInput#validate()`\
    \ method whose core logic is shown in the following code in a (very!) simplified\
    \ form:\n\n```\nString submittedValue = component.getSubmittedValue();\ntry {\n\
    \    Converter converter = component.getConverter();\n    Object newValue = component.getConvertedValue(submittedValue);\n\
    \    for (Validator validator : component.getValidators()) {\n        validator.validate(context,\
    \ component, newValue);\n    }\n    component.setValue(newValue);\n    component.setSubmittedValue(null);\n\
    }\ncatch (ConverterException | ValidatorException e) {\n    context.addMessage(clientId,\
    \ e.getFacesMessage());\n    context.validationFailed(); // Skips phases 4 and\
    \ 5.\n    component.setValid(false);\n}\n```\n\nWhen there are no validation errors\
    \ and the `FacesContext#isValidationFailed()` thus returns `false`, then JSF will\
    \ advance to the update model values phase (fourth phase). During this phase,\
    \ the “local value” of the input components will ultimately be set as managed\
    \ bean properties associated with the `value` attribute of the input components.\
    \ This will happen in the `UIInput#updateModel()` method which is simplified as\
    \ follows:\n\n```\nValueExpression el = component.getValueExpression(\"value\"\
    );\nif (el != null) {\n    el.setValue(context.getELContext(), component.getValue());\n\
    \    component.setValue(null);\n}\n```\n\nThe `el` variable basically represents\
    \ the Expression Language (EL) statement as defined in the `value` attribute,\
    \ which is, in case of our `<h:inputText>` example, thus `#{bean.text}`. The `ValueExpression#setValue()`\
    \ will basically trigger the setter method behind this expression with the component’s\
    \ value. So, effectively it will execute `bean.setText(component.getValue())`.\n\
    \nOnce all model values have been updated, JSF will advance to the invoke application\
    \ phase (fifth phase). Any `ActionEvent` which is, during the apply request values\
    \ phase (second phase), queued in a command component will be broadcasted. It\
    \ will ultimately invoke all methods associated with the command component. In\
    \ the case of our `<h:commandButton>` example, which has `#{bean.submit}` defined\
    \ as an action attribute, it will invoke the `Bean#submit()` method. Finally,\
    \ JSF will advance to the last phase, the render response phase (sixth phase),\
    \ generating the HTML output and thereby invoking the getter methods in order\
    \ to obtain the model values to be embedded in the HTML output."
