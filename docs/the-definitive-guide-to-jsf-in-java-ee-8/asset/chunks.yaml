- fmt: "#### Figure 2-14 The JPA Facet configuration\n\nNote that configuring a database\
    \ connection is not necessary for now as we’re going to use an embedded database.\n\
    \nIn the next step of the *Modify Faceted Project* wizard, we can configure the\
    \ JSF capabilities (see Figure [2-15](#A454457_1_En_2_Chapter.xhtml#Fig15)). Also\
    \ here, we need to make sure that Eclipse is being instructed that the JSF implementation\
    \ is already provided by the target runtime and thus Eclipse doesn’t need to include\
    \ any libraries. This can be achieved by choosing the “Disable Library Configuration”\
    \ option in the *JSF Implementation Library* field. Further, we need to rename\
    \ the servlet name of the `FacesServlet` to match the fictive instance variable\
    \ name: `facesServlet`. Last but not least, we need to change the URL mapping\
    \ pattern from the Jurassic `/faces/*` to the modern `*.xhtml`.\n\n![A454457_1_En_2_Fig15_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig15_HTML.jpg)\n\
    \n#### Figure 2-15 The JSF Capabilities configuration\n\nActually, the entire\
    \ registration of the `FacesServlet` in `web.xml` is, since JSF 2.2, not strictly\
    \ necessary any more; you could even uncheck the *Configure JSF servlet in deployment\
    \ descriptor* option and rely on the default auto-registered mappings of `/faces/*`,\
    \ `*.faces`, `*.jsf` and `*.xhtml`. However, as this allows end users and even\
    \ search bots to open the very same JSF page by different URLs, and thus causes\
    \ confusion among end users and duplicate content penalties among search bots,\
    \ we’d better restrict to only one explicitly configured URL pattern.\n\nNow,\
    \ finish and apply all the wizards and dialogs. The JPA plug-in only puts the\
    \ generated `persistence.xml` at the wrong place. You need to manually move it\
    \ into `src/main/resources/META-INF`. Figure [2-16](#A454457_1_En_2_Chapter.xhtml#Fig16)\
    \ shows us how the workbench looks now.\n\n![A454457_1_En_2_Fig16_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig16_HTML.jpg)\n\
    \n#### Figure 2-16 Correctly configured Java EE 8 Maven project in Eclipse\n\n\
    We only need to adjust all the deployment descriptors to catch up to the actually\
    \ used Servlet, JSF, JPA, and CDI versions. This is normally done by adjusting\
    \ the root element of the deployment descriptor XML file to set the desired XML\
    \ schemas and the version.\n\nYou can find all Java EE 8 schemas at [http://xmlns.jcp.org/xml/ns/javaee](http://xmlns.jcp.org/xml/ns/javaee),\
    \ which is an actual web page which currently redirects to some landing page at\
    \ Oracle.com. This may change in the future given that Java EE 8 is currently\
    \ in the process of being transferred from Oracle to Eclipse. You can open the\
    \ deployment descriptor XML file for editing by double-clicking it and then selecting\
    \ the *Source* tab in the editor. The correct root element declarations for Java\
    \ EE 8 compatible deployment descriptors are thus as follows:\n\n```\nsrc/main/webapp/WEB-INF/web.xml\
    \ for Servlet 4.0:\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<web-app\n   \
    \ xmlns:=\"http://xmlns.jcp.org/xml/ns/javaee\"\n    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
    \n    xsi:schemaLocation=\"http://xmlns.jcp.org/xml/ns/javaee\n        http://xmlns.jcp.org/xml/ns/javaee/web-app_4_0.xsd\"\
    \n    version=\"4.0\"\n>\n    <!-- Servlet configuration here. -->\n</web-app>\n\
    src/main/webapp/WEB-INF/faces-config.xml for JSF 2.3:\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<faces-config\n    xmlns:=\"http://xmlns.jcp.org/xml/ns/javaee\"\n\
    \    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n    xsi:schemaLocation=\"\
    http://xmlns.jcp.org/xml/ns/javaee\n        http://xmlns.jcp.org/xml/ns/javaee/web-facesconfig_2_3.xsd\"\
    \n    version=\"2.3\"\n>\n    <!-- JSF configuration here. -->\n</faces-config>\n\
    src/main/resources/META-INF/persistence.xml for JPA 2.2:\n<?xml version=\"1.0\"\
    \ encoding=\"UTF-8\"?>\n<persistence\n    xmlns:=\"http://xmlns.jcp.org/xml/ns/persistence\"\
    \n    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n    xsi:schemaLocation=\"\
    http://xmlns.jcp.org/xml/ns/persistence\n        http://xmlns.jcp.org/xml/ns/persistence/persistence_2_2.xsd\"\
    \n    version=\"2.2\"\n>\n    <!-- JPA configuration here. -->\n</persistence>\n\
    ```\n\nOnly the currently available JPA plug-in of Eclipse will show an error\
    \ on this. You could ignore this by disabling the JPA validator in the project’s\
    \ properties, but you can also just step back to a JPA 2.1 compatible `persistence.xml`\
    \ for the time being.\n\nFinally, for sake of completeness we need to create one\
    \ more deployment descriptor file, the one for CDI 2.0. This isn’t automatically\
    \ generated as it’s not required. CDI is by default always enabled in any Java\
    \ EE 8 compatible web application. It’s even mandatory for the functioning of\
    \ JSF. Among others the new `<f:websocket>` relies fully on CDI. Right-click the\
    \ `/WEB-INF` folder of the project and choose *New ➤ beans.xml File*. The *New\
    \ beans.xml File* wizard which appears now is part of the JBoss Tools plug-in.\
    \ Just keep all options default and finish the wizard. It’ll generate the file\
    \ as follows:\n\n```\nsrc/main/webapp/WEB-INF/beans.xml for CDI 2.0:\n<?xml version=\"\
    1.0\" encoding=\"UTF-8\"?>\n<beans\n    xmlns:=\"http://xmlns.jcp.org/xml/ns/javaee\"\
    \n    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n    xsi:schemaLocation=\"\
    http://xmlns.jcp.org/xml/ns/javaee\n        http://xmlns.jcp.org/xml/ns/javaee/beans_2_0.xsd\"\
    \n    version=\"2.0\" bean-discovery-mode=\"annotated\"\n>\n    <!-- CDI configuration\
    \ here. -->\n</beans>\n```\n\n### Creating the Backing Bean Class\n\nWith the\
    \ project now correctly configured we can start with developing the actual MVC\
    \ application. The Controller part of MVC is already configured as `FacesServlet`\
    \ in `web.xml`. The Model part of MVC is what we’re going to create now. It’s\
    \ basically just a simple Java class which is by JSF convention called a *Backing\
    \ Bean* since it “backs” a View.\n\nRight-click the `src/main/java` folder of\
    \ the project and choose *New ➤ Bean*. The *New CDI Bean* wizard which appears\
    \ now is also part of the JBoss Tools plug-in (see Figure [2-17](#A454457_1_En_2_Chapter.xhtml#Fig17)).\
    \ In this wizard, set the *Package* to `com.example.project.view`, set the *Name*\
    \ to `HelloWorld`, tick the *Add @Named* checkbox, and finally set the *Scope*\
    \ to `@RequestScoped`. The rest of the fields can be kept default or empty.\n\n\
    ![A454457_1_En_2_Fig17_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig17_HTML.jpg)"
  raw: '###### Figure 2-14 The JPA Facet configuration


    Note that configuring a database connection is not necessary for now as we’re
    going to use an embedded database.


    In the next step of the *Modify Faceted Project* wizard, we can configure the
    JSF capabilities (see Figure [2-15](#A454457_1_En_2_Chapter.xhtml#Fig15)). Also
    here, we need to make sure that Eclipse is being instructed that the JSF implementation
    is already provided by the target runtime and thus Eclipse doesn’t need to include
    any libraries. This can be achieved by choosing the “Disable Library Configuration”
    option in the *JSF Implementation Library* field. Further, we need to rename the
    servlet name of the FacesServlet to match the fictive instance variable name:
    facesServlet. Last but not least, we need to change the URL mapping pattern from
    the Jurassic /faces/* to the modern *.xhtml.


    ![A454457_1_En_2_Fig15_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig15_HTML.jpg)


    ###### Figure 2-15 The JSF Capabilities configuration


    Actually, the entire registration of the FacesServlet in web.xml is, since JSF
    2.2, not strictly necessary any more; you could even uncheck the *Configure JSF
    servlet in deployment descriptor* option and rely on the default auto-registered
    mappings of /faces/*, *.faces, *.jsf and *.xhtml. However, as this allows end
    users and even search bots to open the very same JSF page by different URLs, and
    thus causes confusion among end users and duplicate content penalties among search
    bots, we’d better restrict to only one explicitly configured URL pattern.


    Now, finish and apply all the wizards and dialogs. The JPA plug-in only puts the
    generated persistence. xml at the wrong place. You need to manually move it into
    src/main/resources/META-INF. Figure [2-16](#A454457_1_En_2_Chapter.xhtml#Fig16)
    shows us how the workbench looks now.


    ![A454457_1_En_2_Fig16_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig16_HTML.jpg)


    ###### Figure 2-16 Correctly configured Java EE 8 Maven project in Eclipse


    We only need to adjust all the deployment descriptors to catch up to the actually
    used Servlet, JSF, JPA, and CDI versions. This is normally done by adjusting the
    root element of the deployment descriptor XML file to set the desired XML schemas
    and the version.


    You can find all Java EE 8 schemas at [http://xmlns.jcp.org/xml/ns/javaee](http://xmlns.jcp.org/xml/ns/javaee)
    , which is an actual web page which currently redirects to some landing page at
    Oracle.com. This may change in the future given that Java EE 8 is currently in
    the process of being transferred from Oracle to Eclipse. You can open the deployment
    descriptor XML file for editing by double-clicking it and then selecting the *Source*
    tab in the editor. The correct root element declarations for Java EE 8 compatible
    deployment descriptors are thus as follows:


    ```

    src/main/webapp/WEB-INF/web.xml for Servlet 4.0:

    <?xml version="1.0" encoding="UTF-8"?>

    <web-app

        xmlns:="http://xmlns.jcp.org/xml/ns/javaee"

        xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

        xsi:schemaLocation="http://xmlns.jcp.org/xml/ns/javaee

            http://xmlns.jcp.org/xml/ns/javaee/web-app_4_0.xsd"

        version="4.0"

    >

        <!-- Servlet configuration here. -->

    </web-app>

    src/main/webapp/WEB-INF/faces-config.xml for JSF 2.3:

    <?xml version="1.0" encoding="UTF-8"?>

    <faces-config

        xmlns:="http://xmlns.jcp.org/xml/ns/javaee"

        xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

        xsi:schemaLocation="http://xmlns.jcp.org/xml/ns/javaee

            http://xmlns.jcp.org/xml/ns/javaee/web-facesconfig_2_3.xsd"

        version="2.3"

    >

        <!-- JSF configuration here. -->

    </faces-config>

    src/main/resources/META-INF/persistence.xml for JPA 2.2:

    <?xml version="1.0" encoding="UTF-8"?>

    <persistence

        xmlns:="http://xmlns.jcp.org/xml/ns/persistence"

        xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

        xsi:schemaLocation="http://xmlns.jcp.org/xml/ns/persistence

            http://xmlns.jcp.org/xml/ns/persistence/persistence_2_2.xsd"

        version="2.2"

    >

        <!-- JPA configuration here. -->

    </persistence>

    ```


    Only the currently available JPA plug-in of Eclipse will show an error on this.
    You could ignore this by disabling the JPA validator in the project’s properties,
    but you can also just step back to a JPA 2.1 compatible persistence.xml for the
    time being.


    Finally, for sake of completeness we need to create one more deployment descriptor
    file, the one for CDI 2.0\. This isn’t automatically generated as it’s not required.
    CDI is by default always enabled in any Java EE 8 compatible web application .
    It’s even mandatory for the functioning of JSF. Among others the new <f:websocket>
    relies fully on CDI. Right-click the /WEB-INF folder of the project and choose
    *New ➤ beans.xml File*. The *New beans.xml File* wizard which appears now is part
    of the JBoss Tools plug-in . Just keep all options default and finish the wizard.
    It’ll generate the file as follows:


    ```

    src/main/webapp/WEB-INF/beans.xml for CDI 2.0:

    <?xml version="1.0" encoding="UTF-8"?>

    <beans

        xmlns:="http://xmlns.jcp.org/xml/ns/javaee"

        xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

        xsi:schemaLocation="http://xmlns.jcp.org/xml/ns/javaee

            http://xmlns.jcp.org/xml/ns/javaee/beans_2_0.xsd"

        version="2.0" bean-discovery-mode="annotated"

    >

        <!-- CDI configuration here. -->

    </beans>

    ```


    ### Creating the Backing Bean Class


    With the project now correctly configured we can start with developing the actual
    MVC application . The Controller part of MVC is already configured as FacesServlet
    in web.xml. The Model part of MVC is what we’re going to create now. It’s basically
    just a simple Java class which is by JSF convention called a *Backing Bean* since
    it “backs” a View.


    Right-click the src/main/java folder of the project and choose *New ➤ Bean*. The
    *New CDI Bean* wizard which appears now is also part of the JBoss Tools plug-in
    (see Figure [2-17](#A454457_1_En_2_Chapter.xhtml#Fig17)). In this wizard, set
    the *Package* to com.example.project.view, set the *Name* to HelloWorld, tick
    the *Add @Named* chec kbox, and finally set the *Scope* to @RequestScoped. The
    rest of the fields can be kept default or empty.


    ![A454457_1_En_2_Fig17_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig17_HTML.jpg)'
  trans: '

    ###### 图 2-14 JPA 方面配置


    请注意，目前无需配置数据库连接，因为我们将使用嵌入式数据库。


    在*修改方面项目*向导的下一步中，我们可以配置 JSF 功能（见图 2-15）。同样，我们需要确保 Eclipse 被告知 JSF 实现已由目标运行时提供，因此
    Eclipse 无需包含任何库。这可以通过在*JSF 实现库*字段中选择“禁用库配置”选项来实现。此外，我们需要将 FacesServlet 的 Servlet
    名称重命名为与虚构的实例变量名称一致：facesServlet。最后但同样重要的是，我们需要将 URL 映射模式从古老的 /faces/* 更改为现代的 *.xhtml。


    ![A454457_1_En_2_Fig15_HTML.jpg](img/A454457_1_En_2_Fig15_HTML.jpg)


    ###### 图 2-15 JSF 功能配置


    实际上，自 JSF 2.2 起，在 web.xml 中注册 FacesServlet 已不再是严格必需的；你甚至可以取消选中*在部署描述符中配置 JSF servlet*
    选项，并依赖默认的自动注册映射 /faces/*、*.faces、*.jsf 和 *.xhtml。然而，由于这允许最终用户甚至搜索引擎爬虫通过不同的 URL
    打开同一个 JSF 页面，从而在用户中造成混淆，并在搜索引擎爬虫中导致重复内容惩罚，我们最好只限制使用一个显式配置的 URL 模式。


    现在，完成并应用所有向导和对话框。JPA 插件仅将生成的 persistence.xml 放在了错误的位置。你需要手动将其移动到 src/main/resources/META-INF。图
    2-16 展示了工作台现在的样子。


    ![A454457_1_En_2_Fig16_HTML.jpg](img/A454457_1_En_2_Fig16_HTML.jpg)


    ###### 图 2-16 在 Eclipse 中正确配置的 Java EE 8 Maven 项目


    我们只需要调整所有部署描述符，使其与实际使用的 Servlet、JSF、JPA 和 CDI 版本保持一致。这通常通过调整部署描述符 XML 文件的根元素来设置所需的
    XML 模式和版本完成。


    你可以在 [`xmlns.jcp.org/xml/ns/javaee`](http://xmlns.jcp.org/xml/ns/javaee) 找到所有
    Java EE 8 模式，这是一个实际的网页，目前会重定向到 Oracle.com 的某个登录页面。鉴于 Java EE 8 目前正从 Oracle 转移到
    Eclipse，这种情况未来可能会改变。你可以通过双击部署描述符 XML 文件，然后在编辑器中选择*源*选项卡来打开它进行编辑。兼容 Java EE 8 的部署描述符的正确根元素声明如下：


    ```

    src/main/webapp/WEB-INF/web.xml for Servlet 4.0:

    <?xml version="1.0" encoding="UTF-8"?>

    <web-app

        xmlns:="http://xmlns.jcp.org/xml/ns/javaee"

        xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

        xsi:schemaLocation="http://xmlns.jcp.org/xml/ns/javaee

            http://xmlns.jcp.org/xml/ns/javaee/web-app_4_0.xsd"

        version="4.0"

    >

        <!-- Servlet configuration here. -->

    </web-app>

    src/main/webapp/WEB-INF/faces-config.xml for JSF 2.3:

    <?xml version="1.0" encoding="UTF-8"?>

    <faces-config

        xmlns:="http://xmlns.jcp.org/xml/ns/javaee"

        xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

        xsi:schemaLocation="http://xmlns.jcp.org/xml/ns/javaee

            http://xmlns.jcp.org/xml/ns/javaee/web-facesconfig_2_3.xsd"

        version="2.3"

    >

        <!-- JSF configuration here. -->

    </faces-config>

    src/main/resources/META-INF/persistence.xml for JPA 2.2:

    <?xml version="1.0" encoding="UTF-8"?>

    <persistence

        xmlns:="http://xmlns.jcp.org/xml/ns/persistence"

        xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

        xsi:schemaLocation="http://xmlns.jcp.org/xml/ns/persistence

            http://xmlns.jcp.org/xml/ns/persistence/persistence_2_2.xsd"

        version="2.2"

    >

        <!-- JPA configuration here. -->

    </persistence>

    ```


    只有 Eclipse 当前可用的 JPA 插件会对此显示错误。你可以通过在项目属性中禁用 JPA 验证器来忽略此错误，但也可以暂时回退到使用兼容 JPA 2.1
    的 persistence.xml。


    最后，为了完整性，我们需要再创建一个部署描述符文件，即用于 CDI 2.0 的文件。这个文件不会自动生成，因为它不是必需的。CDI 在任何兼容 Java EE
    8 的 Web 应用程序中默认都是启用的。它甚至是 JSF 正常运行所必需的。例如，新的 `<f:websocket>` 完全依赖于 CDI。右键单击项目的
    /WEB-INF 文件夹，选择*新建 ➤ beans.xml 文件*。现在出现的*新建 beans.xml 文件*向导是 JBoss Tools 插件的一部分。保持所有选项为默认值，完成向导。它将生成如下文件：


    ```

    src/main/webapp/WEB-INF/beans.xml for CDI 2.0:

    <?xml version="1.0" encoding="UTF-8"?>

    <beans

        xmlns:="http://xmlns.jcp.org/xml/ns/javaee"

        xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

        xsi:schemaLocation="http://xmlns.jcp.org/xml/ns/javaee

