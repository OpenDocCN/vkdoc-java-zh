    Bauke Scholtz 和 Arjan Tijms，《Java EE 8 中 JSF 权威指南》，`doi.org/10.1007/978-1-4842-3387-0_6`


    # 6. 输出组件


    Bauke Scholtz^(1 ) 和 Arjan Tijms²


    (1)库拉索岛威廉斯塔德


    (2)荷兰北荷兰省阿姆斯特丹


    从技术上讲，第 4 章中描述的输入组件也是输出组件。它们不仅能够处理任何提交的输入值，还能够在渲染响应阶段（第六阶段）输出模型值。这一点在 JSF（JavaServer
    Faces）API（应用程序编程接口）中也很明显：`UIInput` 超类继承自 `UIOutput` 超类。


    还有一组组件仅输出其模型值，甚至仅输出一个 HTML 元素。这些是纯输出组件。它们不参与 JSF 生命周期的所有阶段。有时它们会在恢复视图阶段（第一阶段）参与，如果它们是动态创建或操作的话，但它们的大部分工作是在渲染响应阶段（第六阶段）生成
    HTML 输出时执行的。在其他阶段，它们不会执行太多额外任务。

