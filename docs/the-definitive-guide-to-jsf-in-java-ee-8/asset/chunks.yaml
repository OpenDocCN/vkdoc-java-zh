    ## 跨站请求伪造保护


    跨站请求伪造（CSRF）是一种攻击方式，它使用户在未经同意甚至不知情的情况下，向某个他们可能已登录的站点发送请求。此类请求随后会产生某种副作用，这些副作用可能以特定方式对攻击者有利。


    例如，假设你的银行有一个形如 `https:/example.com/transferAmount=4000&targetAccount=7836` 的 URL，其含义是“从我的账户向
    ID 为 7836 的账户转账 4000 欧元。”在此语句中，“我的账户”是通过你与银行之间的登录会话（通常是一个 cookie）来确定的。现在，攻击者可能无法获取你的会话
    cookie，但在这个例子中，只要你的浏览器在你登录银行账户的同时，在另一个标签页或窗口中访问了其他网站，并被诱骗发送了 `https:/example.com/transferAmount=4000&targetAccount=7836`
    这个请求（其中 `targetAccount` 参数被设置为攻击者控制的账户 ID），那么攻击者就无需获取 cookie 也能得逞。请注意，在实践中，不太可能使用
    GET 请求和请求参数，而是会使用 POST 请求和 POST 参数。然而，对于这两种方式，都存在相同的基本漏洞。


    如果我们想保护应用程序免受此类恶意请求的攻击，其中一种方法是在请求中包含“某种东西”（即一个令牌），该令牌需要满足以下条件：


    1.  特定于某个调用者。

    2.  在一段时间后过期。

    3.  难以被猜测。


    恰好 JSF 已经拥有满足这三项要求的东西，那就是在 JSF 表单中可以找到的 `javax.faces.ViewState` 隐藏参数。


    ###### 注意


    不过这里有一个注意事项：只有在使用回发、服务器端状态保存，并且相关视图不是无状态的情况下，该参数才能完全满足这些要求。只有在这种情况下，`javax.faces.ViewState`
    的值才真正是一个令牌。由于这是默认设置，JSF 在这方面开箱即用相对安全，但一旦我们偏离这些默认设置（例如，通过使用无状态视图），这种保护就会受到损害。另请参阅第
    4 章中的“无状态表单”一节。


    除了这种隐式的 CSRF 保护之外，JSF 还提供了显式的 CSRF 保护。这种显式的 CSRF 保护会为所有情况添加一个令牌，并且额外增加了对“referer”和“origin”HTTP
    头的检查。请注意，对于传入的请求，通常不应信任 HTTP 头，因为它们很容易被伪造。然而，对于这种特定的攻击，我们试图防御的并非任意随机的 HTTP 请求，而是专门针对从受信任浏览器发送的请求。头部检查是在令牌检查之外的附加检查，并且令牌检查必须始终首先通过。


    定义哪些视图应受 CSRF 令牌和额外头部检查保护的方式，与我们为视图定义角色的方式有些相似——即在部署描述符中定义一组 URL 模式。不过，这次使用的部署描述符是
    `faces-config.xml`，而不是 `web.xml`。以下是在 `faces-config.xml` 中这些条目的示例：


    ```

    <protected-views>

        <url-pattern>/bar.xhtml</url-pattern>

        <url-pattern>/foo.xhtml</url-pattern>

        <url-pattern>/baz.xhtml</url-pattern>

    </protected-views>

    ```


    请注意，这里的 `url-pattern` 与 `web.xml` 中使用的模式完全相同。这里需要注意的一点是，尽管 `faces-config.xml`
    是 JSF 特定的部署描述符，但这里的 `url-pattern` 仍然是相对于应用程序根目录的完整 URL，这意味着它必须包含所有使用的映射，例如 `/faces/`
    和 `.xhtml`。


    将包含上述 `protected-views` 片段的 `faces-config.xml` 添加到我们本章一直在处理的示例应用程序代码中，将会在 `index.xhtml`
    上渲染指向例如 `/bar.xhtml` 的链接，其形式如下：


    ```

    /bar.xhtml?javax.faces.Token=gdMoNbfOycv2v80gr

    ```


    可以看到，`javax.faces.Token` 请求参数已由 JSF 添加。该令牌与用户的 HTTP 会话绑定，因此如果 HTTP 会话过期，令牌也会过期。该令牌在密码学上是强壮的，这意味着它满足了上述
    CSRF 保护令牌的所有三项要求。


    如果令牌被篡改（例如，我们使用 `xxMoNbfOycv2v80gr` 而不是 `gdMoNbfOycv2v80gr`），或者完全缺失（即我们请求 `/bar.xhtml`），JSF
    将抛出 `javax.faces.application.ProtectedViewException`。如果链接来自无状态页面，JSF 应用程序可以通过通知用户并允许重新渲染原始页面来处理此异常。在上面的例子中，这意味着重新渲染
    `index.xhtml`。这样，真正的用户将获得一个新的 CSRF 保护令牌，而攻击者则无法从原始请求中获得预期的副作用。


    如前所述，还有 referer 和 origin 头部检查。对于此检查，JSF 会检查 referer 头部（如果可用）是否设置为源自同一应用程序的 URL。为了演示这一点，考虑第二个
    JSF 应用程序，它只有一个空的 `faces-config.xml` 和以下视图：


    ```

    <!DOCTYPE html>

    <html lang="en"

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

    >

        <h:head />

        <h:body>

            <h:outputLink value="http://localhost:8080/project/bar.xhtml?javax.faces.Token=gdMhNbfOycv2v80gr">

                测试

            </h:outputLink>

        </h:body>

    </html>

    ```

