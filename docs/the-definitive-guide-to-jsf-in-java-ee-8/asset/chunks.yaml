    is returned when the authentication mechanism successfully validated the credentials
    provided. It’s only after this status is returned that HttpServletRequest#getUserPrincipal(),
    SecurityContext#getCallerPrincipal(), etc., return non-null values to indicate
    the current caller is authenticated. A JSF backing bean can respond to this in
    various ways (e.g., by setting a faces message and continuing to render the view,
    or issuing a redirect of itself).


    The fourth and final status is NOT_DONE, which is returned when the authentication
    mechanism chooses to not authenticate at all. This happens, for instance, when
    the authentication mechanism is pre-emptively called but authentication appeared
    not to be necessary. Typically, a JSF backing bean would not need to take any
    special action here.


    ## Caller-Initiated Authentication


    The previous code discussed the situation where an unauthenticated caller tries
    to access a protected resource (URL/page) and the authentication dialog is automatically
    started. Since this authentication dialog is started by the container, we call
    this “container-initiated authentication .”


    Another case is where a caller explicitly starts the authentication dialog (e.g.,
    by clicking on a “login” button). Because the caller starts this dialog we call
    it “caller-initiated authentication.”


    In case of caller-initiated authentication, the core authentication mechanism
    is effectively directly invoked and the platform-provided login-to-continue functionality
    is skipped. This means that if an authentication mechanism depends on login-to-continue
    to redirect to a login page and after authentication to redirect back to the protected
    resource, neither of these two actions will happen when the application programmatically
    triggers authentication.


    The CustomFormAuthenticationMechanism that we defined earlier via an annotation
    is indeed a mechanism that uses the platform’s login-to-continue service , so
    we’ll start the authentication dialog by directing to the same login view we used
    before. To indicate this is a new login, an extra request parameter is provided.
    The view from which we start looks as follows:


    ```

    <!DOCTYPE html>

    <html lang="en"

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:f="http://xmlns.jcp.org/jsf/core"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

        xmlns:c="http://xmlns.jcp.org/jsp/jstl/core"

    >

        <h:head>

            <title>Welcome</title>

        <h:head>

        <h:body>

            <c:if test="#{not empty request.userPrincipal}">

                <p>Logged-in as #{request.userPrincipal}</p>

            </c:if>

            <c:if test="#{empty request.userPrincipal}">

                <h:form>

                    <h:button value="Login" outcome="/login">

                        <f:param name="new" value="true" />

                    </h:button>

                </h:form>

            </c:if>

        </h:body>

    </html>

    ```


    In the backing bean we’ll inject two additional objects: an instance to obtain
    and store the mentioned request parameter and a reference to the Flash, which
    we’ll use later.


    ```

    @Inject

    private Flash flash;


    @Inject @ManagedProperty("#{param.new}")

    private boolean isNew;

    ```


    The managed bean’s scope needs to be changed to @ViewScoped, so we can retain
    the value of the isNew instance variable after the login form’s postback.


    An important addition is to the SecurityContext#authenticate() method where we’ll
    now provide an extra parameter: newAuthentication*.* The authentication mechanism
    does not strictly need this though, and it’s just smart enough to distinguish
    between an initial new authentication and continuing an authentication dialog
    that’s in progress. However, things get more difficult when a caller is in the
    midst of an authentication dialog and then navigates away, only to explicitly
    click a login button later. If the state associated with said dialog hasn’t expired
    at that point, the authentication mechanism doesn’t know a new authentication
    is required and will likely continue the aborted but still valid dialog .


    To prevent this, we can force a new authentication by setting newAuthentication
    to true. This will discard all existing states. The modified continueAuthentication()
    method looks as follows:


    ```

    private AuthenticationStatus continueAuthentication() {

        return securityContext.authenticate(

            (HttpServletRequest) externalContext.getRequest(),

            (HttpServletResponse) externalContext.getResponse(),

            AuthenticationParameters.withParams()

               .newAuthentication(isNew).credential(

                   new UsernamePasswordCredential(email, password))

        );

    }

    ```


    Note that this version can be used for the case where we continue the dialog as
    well as to start a new one. When we continue the dialog, isNew will simply be
    false, which also happens to be the default when the parameter is not specified
    at all.


    When using the CustomFormAuthenticationMechanism we know there will not be any
    redirects or other writes to the response after we provide the credentials in
    caller-initiated authentication, so that gives us a convenient location to handle
    the redirect to a landing page after the caller authenticates: the SUCCESS case
    .


    ```

    case SUCCESS:

        flash.setKeepMessages(true);

        facesContext.addMessage(null, new FacesMessage(

            FacesMessage.SEVERITY_INFO, "Login succeed", null));

        externalContext.redirect(

            externalContext.getRequestContextPath() + "/index.xhtml");

        break;

    ```


    We’re redirecting the caller here to the index.xhtml landing page . Note that
    this is also the view where the caller initiated the authentication dialog, but
    that’s just a coincidence in this example. In general, the view or even URL where
    we redirect the caller to is completely free for the application developer to
    choose. Typically, a landing page of some sort is chosen, which could be the index
    of the application or a dashboard corresponding to the main role the caller is
    in. As we mentioned above, when SUCCESS is returned the caller is fully authenticated.
    This means we can query the caller’s roles and use these in our decision where
    to redirect to.


    Outlook: a future version of Java EE Security may introduce a hybrid option where
    caller-initiated authentication can still start with the same redirect as container-initiated
    authentication and allows for the redirect-back URL to be provided by the application.'
  trans: '

    第三个状态是 SUCCESS，表示“身份验证成功”。当身份验证机制成功验证所提供的凭证时，会返回此状态。只有在返回此状态后，`HttpServletRequest#getUserPrincipal()`、`SecurityContext#getCallerPrincipal()`
    等方法才会返回非空值，以表明当前调用者已通过身份验证。JSF 后台 bean 可以通过多种方式对此做出响应（例如，设置 faces 消息并继续渲染视图，或自行发起重定向）。


    第四个也是最后一个状态是 NOT_DONE，当身份验证机制选择完全不进行身份验证时返回此状态。例如，当身份验证机制被预先调用，但身份验证似乎并非必要时，就会发生这种情况。通常，JSF
    后台 bean 在此处无需采取任何特殊操作。


    ## 调用者发起的身份验证


    之前的代码讨论了未经验证的调用者尝试访问受保护资源（URL/页面）时，身份验证对话框自动启动的情况。由于此身份验证对话框由容器启动，我们称之为“容器发起的身份验证”。


    另一种情况是调用者显式启动身份验证对话框（例如，通过点击“登录”按钮）。由于调用者启动此对话框，我们称之为“调用者发起的身份验证”。


    在调用者发起的身份验证情况下，核心身份验证机制被直接调用，并且平台提供的“登录以继续”功能被跳过。这意味着，如果身份验证机制依赖于“登录以继续”来重定向到登录页面，并在身份验证后重定向回受保护资源，那么当应用程序以编程方式触发身份验证时，这两个操作都不会发生。


    我们之前通过注解定义的 `CustomFormAuthenticationMechanism` 确实是一种使用平台“登录以继续”服务的机制，因此我们将通过导航到之前使用的同一个登录视图来启动身份验证对话框。为了表明这是一个新的登录，提供了一个额外的请求参数。我们启动的视图如下所示：


    ```

    <!DOCTYPE html>

    <html lang="en"

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:f="http://xmlns.jcp.org/jsf/core"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

        xmlns:c="http://xmlns.jcp.org/jsp/jstl/core"

    >

        <h:head>

            <title>欢迎</title>

        <h:head>

        <h:body>

            <c:if test="#{not empty request.userPrincipal}">

                <p>已登录为 #{request.userPrincipal}</p>

            </c:if>

            <c:if test="#{empty request.userPrincipal}">

                <h:form>

                    <h:button value="登录" outcome="/login">

                        <f:param name="new" value="true" />

                    </h:button>

                </h:form>

            </c:if>

        </h:body>

    </html>

    ```


    在后台 bean 中，我们将注入两个额外的对象：一个用于获取和存储上述请求参数的实例，以及一个对 Flash 的引用，我们稍后将使用它。


    ```

    @Inject

    private Flash flash;


    @Inject @ManagedProperty("#{param.new}")

    private boolean isNew;

    ```


    托管 bean 的作用域需要更改为 `@ViewScoped`，这样我们就能在登录表单回发后保留 `isNew` 实例变量的值。


    一个重要的补充是在 `SecurityContext#authenticate()` 方法中，我们现在将提供一个额外的参数：`newAuthentication`。不过，身份验证机制严格来说并不需要这个参数，它只是足够智能，能够区分初始的新身份验证和继续正在进行的身份验证对话框。然而，当调用者处于身份验证对话框中间，然后导航离开，稍后又显式点击登录按钮时，事情就变得复杂了。如果与该对话框关联的状态在那时尚未过期，身份验证机制将不知道需要一个新的身份验证，并且很可能会继续那个已中止但仍然有效的对话框。


    为了防止这种情况，我们可以通过将 `newAuthentication` 设置为 `true` 来强制进行新的身份验证。这将丢弃所有现有状态。修改后的 `continueAuthentication()`
    方法如下所示：


    ```

    private AuthenticationStatus continueAuthentication() {

        return securityContext.authenticate(

            (HttpServletRequest) externalContext.getRequest(),

            (HttpServletResponse) externalContext.getResponse(),

            AuthenticationParameters.withParams()

               .newAuthentication(isNew).credential(

                   new UsernamePasswordCredential(email, password))

        );

    }

    ```


    请注意，此版本既可用于继续对话框的情况，也可用于启动新对话框的情况。当我们继续对话框时，`isNew` 将简单地设为 `false`，这恰好也是未指定该参数时的默认值。


    当使用 `CustomFormAuthenticationMechanism` 时，我们知道在调用者发起的身份验证中提供凭证后，不会发生任何重定向或其他对响应的写入操作，因此这为我们提供了一个方便的位置来处理调用者通过身份验证后重定向到登录后页面的操作：即
    SUCCESS 情况。


    ```

    case SUCCESS:

        flash.setKeepMessages(true);

        facesContext.addMessage(null, new FacesMessage(

            FacesMessage.SEVERITY_INFO, "登录成功", null));

        externalContext.redirect(

            externalContext.getRequestContextPath() + "/index.xhtml");

        break;

    ```


    我们在此处将调用者重定向到 `index.xhtml` 登录后页面。请注意，这也是调用者发起身份验证对话框的视图，但这在本例中只是巧合。通常，应用程序开发者可以完全自由地选择将调用者重定向到的视图甚至
    URL。通常，会选择某种登录后页面，它可以是应用程序的首页，也可以是调用者主要角色对应的仪表板。正如我们上面提到的，当返回 SUCCESS 时，调用者已完全通过身份验证。这意味着我们可以查询调用者的角色，并利用这些角色来决定重定向到何处。


    展望：未来版本的 Java EE Security 可能会引入一种混合选项，其中调用者发起的身份验证仍然可以像容器发起的身份验证一样以相同的重定向开始，并允许应用程序提供重定向回的
    URL。

