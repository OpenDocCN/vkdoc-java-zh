        </h:commandButton>

    </h:form>

    ```


    修改后的操作方法如下所示：


    ```

    public void submit(Integer id) {

        System.out.println("Submitted ID: " + id);

    }

    ```


    对于 `<h:commandButton>` 来说，这不会生成任何 JavaScript，因此它看起来与你不使用任何操作方法参数时完全相同。这也就意味着 `#{otherBean.id}`
    的值不会通过 HTML 源代码作为请求参数传回服务器。这反过来意味着它只在 JSF 即将调用操作方法时的回发请求期间被评估。这又意味着 `#{otherBean.id}`
    至少必须是 `@ViewScoped` 的，才能在回发请求中仍然可用。换句话说，这种参数传递方法绝对不能与 `<f:param>` 标签方法互换，在后一种方法中，两个
    bean 都可以只是 `@RequestScoped` 的。


