    显然，迫切需要一种面向 JSF 的新视图技术来取代 JSP，并解决其与 JSF 生命周期相关的所有问题。于是，Facelets 在 2006 年被引入。它可以为
    JSF 1.1 和 1.2 单独安装，并内置于 JSF 2.0 中。它成为了 JSF 的默认视图技术，而 JSP 作为 JSF 的视图技术已被弃用。JSF
    2.0 中引入的新标签，例如 `<f:ajax>`、`<h:head>`、`<h:body>`、`<h:outputScript>` 和 `<h:outputStylesheet>`，仅适用于
    Facelets，不适用于 JSP。JSF 2.0 还引入了一个新接口，以便更轻松地插入自定义视图声明语言（VDL）作为 JSP 甚至 Facelets 的替代方案，即
    `ViewDeclarationLanguage` API。通过这种方式，人们可以创建例如纯 Java 的 JSF VDL。³


    ## XHTML


    Facelets VDL 规定视图在基于 XML 的文件中定义，这些文件使用 SAX 解析器编译并保存在内存中。自 JSF 2.1 起，此内存缓存可通过自定义的
    `FaceletCacheFactory` 进行配置。当 JSF 项目阶段设置为 Development 时，Facelets 文件的 SAX 编译表示默认不会被缓存。这使得在已运行的服务器上进行开发更加容易，只需在支持将本地更改热发布到目标运行时的
    IDE（集成开发环境）中编辑 Facelets 文件即可。


    Facelets 文件本身通常使用 `.xhtml` 扩展名，因此初学者常称其为“XHTML”而非“Facelets”。在 JSF 上下文中讨论时这没问题，但“XHTML”一词在
    Web 开发领域还有另一层含义。其核心是，XHTML 是一种用于 HTML 页面的标记语言，这些页面需要使用基于 XML 的工具进行编译。换句话说，开发者基本上创建的是包含
    HTML 标记和 Web 框架特定 XML 标签的 XML 文件，然后 Web 框架会将其解析为 XML 树，生成该 XML 树的某种 Web 框架特定表示（在
    JSF 中为 `UIViewRoot`），并最终根据框架对该 XML 树的内部表示生成所需的 HTML 输出。


    但在 2006 年 Facelets 引入前后，XHTML 被另一群 Web 开发者过度炒作，他们基本上是因为看到 W3 验证器使其 HTML4 文档无效而感到失望——通常是因为希望显式关闭所有标签以保持一致性，包括那些根据
    HTML4 规范实际上不应关闭的标签，例如 `<link>`、`<meta>`、`<br>` 和 `<hr>`——有时还因为希望指定自定义标签属性，以便某些
    JavaScript 插件能与 HTML 文档更清晰地交互，而这也是 HTML4 规范所不允许的。


    尽管世界上几乎每个 Web 浏览器（包括史前级别的 IE6）都宽容地接受了这一点，但这些开发者不希望看到他们精心制作的 HTML4 文档被 W3 验证器判定为无效，于是他们将
    HTML 文档类型声明更改为使用 XHTML DTD，这是 HTML 的一个扩展，要求每个标签都必须关闭，并允许在现有标签上指定自定义属性。然而，这本质上是对
    XHTML 的滥用，因为他们实际上根本没有使用任何 XML 工具来编译文档并生成所需的 HTML 输出。这仅仅是为了让 W3 验证器满意。


    巧合的是，也大约在同一时期，HTML5 刚刚开始起草。本质上，开发者只需从 HTML 文档类型声明中移除任何 DTD，就能得到一个允许基于 XML 语法的
    HTML 文档，其中所有标签始终关闭，并允许自定义元素和属性，而且重要的是，能在 W3 验证器中正确验证。换句话说，`<!DOCTYPE html>` 对这些开发者来说已经足够了，即使在
    IE6 中也是如此。不幸的是，HTML5 正式完成花费了很长时间，因此开发者在能够切换回 HTML 文档类型之前，一直滥用 XHTML 文档类型。当与这些开发者讨论
    Facelets 时，不要称其为“XHTML”，而应直接称为“Facelets”；否则会引起混淆。


    ## 模板组合


    Facelets 提供了用于基于单个主模板文件轻松创建模板组合的标签。这应该能减少整个网站中重复出现的部分（如页眉、导航菜单和页脚）的代码重复。主模板文件应表示一个完整的网页布局，包含所有网站范围的区域，并使用
    `<ui:insert>` 标签来表示可以插入页面特定区域的位置。以下是此类主模板文件 `/WEB-INF/templates/layout.xhtml`
    的基本示例：


    ```

    <!DOCTYPE html>

    <html lang="en"

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"

    >

        <h:head>

            <title>#{title}</title>

        </h:head>

        <h:body>

            <header>

                <ui:include src="/WEB-INF/includes/layout/header.xhtml" />

            </header>

            <main>

                <ui:insert name="content" />

            </main>

            <footer>

                <ui:include src="/WEB-INF/includes/layout/footer.xhtml" />

            </footer>

        </h:body>

    </html>

    ```


    请注意，主模板文件和包含文件被明确放置在 `/WEB-INF` 文件夹中。这样做是为了防止用户通过猜测 URL 路径来直接访问。另请注意，页面标题被声明为一个简单的
    EL（表达式语言）表达式 `#{title}`，而不是 `<ui:insert>`。`<title>` 元素中不允许有任何标记。


    `xmlns` 属性基本上通过 URI（统一资源标识符）定义了可以在声明的 XML 命名空间中使用哪些标签。根 XML 命名空间指定了 W3 XHTML 标准
    [`www.w3.org/1999/xhtml`](http://www.w3.org/1999/xhtml) 的 URI，因此它定义了“任何 XHTML
    和 HTML5+ 标签”，例如上例中的 `<html>`、`<title>`、`<header>`、`<main>` 和 `<footer>`。Facelets
    编译器知道这个标准 XML 命名空间，并将所有元素作为“通用 UI 指令”传递。`h` XML 命名空间指定了 JSF HTML 标签库 URI，而 `ui`
    XML 命名空间指定了 JSF Facelets 标签库 URI，这两个 URI 都存在于 JSF 实现 JAR 文件中，并在 Web 应用程序启动时注册到
    Facelets。这样，Facelets 编译器就能找到相关的标签处理器、组件和复合组件，它们负责完成构建视图、解码 HTTP 请求和编码 HTTP 响应的繁重工作。因此，这些
    URI 并不一定是有效的互联网地址。您甚至可以通过 `*.taglib.xml` 文件指定自己的 URI。这将在后面的“标签文件”部分进一步展开。


    以下是包含文件 `/WEB-INF/includes/layout/header.xhtml` 的内容：


    ```

    <ui:composition

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"

    >

        <a href="#{request.contextPath}/">

            <h:graphicImage name="images/layout/logo.svg" />

        </a>

        <nav>

            <ul>

                <li><h:link outcome="/about" value="关于" /></li>

                <li><h:link outcome="/help" value="帮助" /></li>

                <li><h:link outcome="/contact" value="联系" /></li>

            </ul>

        </nav>

    </ui:composition>

    ```


    请注意徽标周围的链接。它指向 `#{request.contextPath}/`。这基本上会打印出相对于域名的应用程序根目录 URL。`#{request}`
    是一个隐式 EL 对象，引用当前的 `HttpServletRequest` 实例。`contextPath` 指的是其属性之一，由 `getContextPath()`
    方法隐含。


    以下是包含文件 `/WEB-INF/includes/layout/footer.xhtml` 的内容：

