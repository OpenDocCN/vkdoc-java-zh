- fmt: "###### Figure 2-12 The newly created Maven project in Eclipse\n\nUnfortunately,\
    \ the Eclipse-generated `pom.xml`, which is the main indicator of the project\
    \ being a Maven project and containing its configuration, is less than ideal.\
    \ It’s not current any more, even when generated by the latest Eclipse, the Oxygen\
    \ 2 (December 2017). You can already see that by the `pom.xml` file which is marked\
    \ with an alarming red cross and an error message in the *Markers* view. Any project\
    \ that has at least one such red cross cannot be built and won’t be deployable.\
    \ The error message literally says “`web.xml` is missing and `<failOnMissingWebXml>`\
    \ is set to true.” In other words, Maven somehow thinks that it’s still a pre-Java\
    \ EE 6 project, when this was indeed disallowed.\n\nIn order to solve this problem\
    \ and to catch up the Eclipse-generated `pom.xml` with the current standards,\
    \ we need to open `pom.xml` for editing and adjust it as shown in the following\
    \ code:\n\n```\n<project\n    xmlns:=\"http://maven.apache.org/POM/4.0.0\"\n \
    \   xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n    xsi:schemaLocation=\"\
    http://maven.apache.org/POM/4.0.0\n        http://maven.apache.org/xsd/maven-4.0.0.xsd\"\
    \n>\n    <modelVersion>4.0.0</modelVersion>\n\n    <groupId>com.example</groupId>\n\
    \    <artifactId>project</artifactId>\n    <version>0.0.1-SNAPSHOT</version>\n\
    \    <packaging>war</packaging>\n\n    <properties>\n        <project.build.sourceEncoding>\n\
    \            UTF-8\n        </project.build.sourceEncoding>\n        <project.reporting.outputEncoding>\n\
    \            UTF-8\n        </project.reporting.outputEncoding>\n        <maven.compiler.source>1.8</maven.compiler.source>\n\
    \        <maven.compiler.target>1.8</maven.compiler.target>\n        <failOnMissingWebXml>false</failOnMissingWebXml>\n\
    \    </properties>\n\n    <dependencies>\n        <dependency>\n            <groupId>javax</groupId>\n\
    \            <artifactId>javaee-api</artifactId>\n            <version>8.0</version>\n\
    \            <scope>provided</scope>\n        </dependency>\n    </dependencies>\n\
    </project>\n```\n\nOnce you save this file, Eclipse will automatically sort it\
    \ out by itself and clear out the alarming red cross. Now that looks much better.\
    \ We'll briefly go through the most important settings here.\n\n- **Packaging\
    \ `war`** — indicates the project is a “web” project, and that the project’s contents\
    \ will be assembled into a web archive.\n- **Encoding `UTF-8`** — sets the encoding\
    \ that the source files are in and with which the (reporting) output files should\
    \ be generated. This makes the build repeatable, as it otherwise would default\
    \ to the system default encoding (again, a rather bad default).\n- **Compiler\
    \ `1.8`** — sets both the version of Java used in the `.java` source files as\
    \ well as the byte code output in the `.class` files. Without setting this, Maven\
    \ defaults to the oldest version possible, and sometimes even a lower version\
    \ than that.\n- **`failOnMissingWebXml` `false`** — older versions of Java EE\
    \ required the `/WEB-INF/web.xml` to be present. Even though this has not been\
    \ required any more since Java EE 6, which was released in 2009, Maven still checks\
    \ for this file to be present. Setting this to `false` prevents this unnecessary\
    \ check.\n- **Dependency `javax:javaee-api:8.0 provided`** — this declares a dependency\
    \ on the Java EE 8 API, and makes sure all the Java EE types like `@Named` are\
    \ known to the compiler. This dependency is set to `provided` since those types\
    \ are already provided by the target runtime, which is in our case Payara. They\
    \ will then only be used to compile the source code against and won’t be included\
    \ in the generated `.war`. You need to make absolutely sure that any compile time\
    \ dependency which is already provided by the target runtime is set to `provided`;\
    \ otherwise it will eventually end up in the generated `.war` and you may run\
    \ into class loading trouble wherein duplicate different versioned libraries are\
    \ conflicting with each other. In case you’re actually not targeting a full-fledged\
    \ Java EE server but a barebones servlet container, you would need to adjust the\
    \ dependencies as instructed in the README of Mojarra,[³](#A454457_1_En_2_Chapter.xhtml#Fn3)\
    \ one of the available JSF implementations and actually the one used under the\
    \ cover of Payara.\n\nNow, in Eclipse’s *Markers* view, there’s only one warning\
    \ left which says “Build path specifies execution environment J2SE-1.5. There\
    \ are no JREs installed in the workspace that are strictly compatible with this\
    \ environment.” Well, that basically means that Eclipse recognizes this Maven\
    \ project as a Java 1.5-only project while we don’t actually have Java SE 5 installed,\
    \ and in spite of the compiler version in `pom.xml` being set to 1.8.\n\nIn order\
    \ to tell Eclipse that this is really a Java 1.8 project, we need to right-click\
    \ the project in *Project Explorer* view and choose *Properties*. In the *Project\
    \ Facets* section you should change the version of the *Java* facet from 1.5 to\
    \ 1.8 (or 9 if you have JDK 9 installed) (see Figure [2-13](#A454457_1_En_2_Chapter.xhtml#Fig13)).\
    \ While at it, we also need to update the Servlet API version and add the CDI,\
    \ JSF, and JPA facets. The Servlet API is represented by the “Dynamic Web Module”\
    \ entry. This needs to be set to version 4.0, which matches Java EE 8. Further\
    \ the “CDI,” “JavaServer Faces,” and “JPA” entries need to be selected. The “CDI”\
    \ facet is, by the way, only available after having installed the JBoss Tools\
    \ as instructed in the section “Installing JBoss Tools Plug-in.”\n\nUnfortunately,\
    \ in the latest available Eclipse version, Oxygen 2 from December 2017, there\
    \ isn’t a JSF 2.3 or JPA 2.2 version available yet in the dropdown. The highest\
    \ available versions are JSF 2.2 and JPA 2.1. This is not a big problem. Its only\
    \ influence is on the available code generators and wizards. We can always adjust\
    \ the Eclipse-generated `faces-config.xml` and `persistence.xml` files afterward\
    \ to match the Java EE 8 compatible versions.\n\n![A454457_1_En_2_Fig13_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig13_HTML.jpg)\n\
    \n###### Figure 2-13 The Project Facets section of the project properties (note\
    \ that the Servlet API version is represented by “Dynamic Web Module”)\n\nAs you\
    \ can see in the yellow warning bar, only Eclipse requires further configuration.\
    \ This concerns the newly selected JSF and JPA facets. When clicking the link,\
    \ we get to see the *Modify Faceted Project* wizard (see Figure [2-14](#A454457_1_En_2_Chapter.xhtml#Fig14)).\n\
    \nThe first step of the *Modify Faceted Project* wizard allows us to configure\
    \ the JPA facet. We need to make sure that Eclipse is being instructed that the\
    \ JPA implementation is already provided by the target runtime and thus Eclipse\
    \ doesn’t need to include any libraries. This can be achieved by choosing the\
    \ “Disable Library Configuration” option in the *JPA* *implementation* field.\
    \ As we’re going to use the Payara-provided Hibernate as the actual JPA implementation,\
    \ which automatically supports discovering of `@Entity` annotated classes, we’d\
    \ like to instruct Eclipse to do the same; otherwise it would automatically add\
    \ entities to the `persistence.xml` when going through the entity code generation\
    \ wizard, or show warnings when we create one manually and don’t add it to the\
    \ `persistence.xml`.\n\n![A454457_1_En_2_Fig14_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig14_HTML.jpg)"
  raw: '###### Figure 2-12 The newly created Maven project in Eclipse


    Unfortunately, the Eclipse-generated pom. xml, which is the main indicator of
    the project being a Maven project and containing its configuration, is less than
    ideal. It’s not current any more, even when generated by the latest Eclipse, the
    Oxygen 2 (December 2017). You can already see that by the pom.xml file which is
    marked with an alarming red cross and an error message in the *Markers* view.
    Any project that has at least one such red cross cannot be built and won’t be
    deployable. The error message literally says “web.xml is missing and <failOnMissingWebXml>
    is set to true.” In other words, Maven somehow thinks that it’s still a pre-Java
    EE 6 project, when this was indeed disallowed.


    In order to solve this problem and to catch up the Eclipse-generated pom.xml with
    the current standards, we need to open pom. xml for editing and adjust it as shown
    in the following code:


    ```

    <project

        xmlns:="http://maven.apache.org/POM/4.0.0"

        xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

        xsi:schemaLocation="http://maven.apache.org/POM/4.0.0

            http://maven.apache.org/xsd/maven-4.0.0.xsd"

    >

        <modelVersion>4.0.0</modelVersion>


    <groupId>com.example</groupId>

        <artifactId>project</artifactId>

        <version>0.0.1-SNAPSHOT</version>

        <packaging>war</packaging>


    <properties>

            <project.build.sourceEncoding>

                UTF-8

            </project.build.sourceEncoding>

            <project.reporting.outputEncoding>

                UTF-8

            </project.reporting.outputEncoding>

            <maven.compiler.source>1.8</maven.compiler.source>

            <maven.compiler.target>1.8</maven.compiler.target>

            <failOnMissingWebXml>false</failOnMissingWebXml>

        </properties>


    <dependencies>

            <dependency>

                <groupId>javax</groupId>

                <artifactId>javaee-api</artifactId>

                <version>8.0</version>

                <scope>provided</scope>

            </dependency>

        </dependencies>

    </project>

    ```


    Once you save this file, Eclipse will automatically sort it out by itself and
    clear out the alarming red cross. Now that looks much better. We''ll briefly go
    through the most important settings here.


    *   Packaging **war**—indicates the project is a “web” project, and that the project’s
    contents will be assembled into a web archive.


    *   Encoding **UTF-8**—sets the encoding that the source files are in and with
    which the (reporting) output files should be generated. This makes the build repeatable,
    as it otherwise would default to the system default encoding (again, a rather
    bad default).


    *   Compiler **1.8**—sets both the version of Java used in the .java source files
    as well as the byte code output in the .class files. Without setting this, Maven
    defaults to the oldest version possible, and sometimes even a lower version than
    that.


    *   failOnMissingWebXml **false**—older versions of Java EE required the /WEB-INF/web.xml
    to be present. Even though this has not been required any more since Java EE 6,
    which was released in 2009, Maven still checks for this file to be present. Setting
    this to false prevents this unnecessary check.


    *   Dependency **javax:javaee-api:8.0 provided**—this declares a dependency on
    the Java EE 8 API, and makes sure all the Java EE types like @Named are known
    to the compiler . This dependency is set to provided" since those types are already
    provided by the target runtime, which is in our case Payara. They will then only
    be used to compile the source code against and won’t be included in the generated
    .war. You need to make absolutely sure that any compile time dependency which
    is already provided by the target runtime is set to provided; otherwise it will
    eventually end up in the generated .war and you may run into class loading trouble
    wherein duplicate different versioned libraries are conflicting with each other.
    In case you’re actually not targeting a full-fledged Java EE server but a barebones
    servlet container, you would need to adjust the dependencies as instructed in
    the README of Mojarra,[³](#A454457_1_En_2_Chapter.xhtml#Fn3) one of the available
    JSF implementations and actually the one used under the cover of Payara.


    Now, in Eclipse’s *Markers* view , there’s only one warning left which says “Build
    path specifies execution environment J2SE-1.5\. There are no JREs installed in
    the workspace that are strictly compatible with this environment.” Well, that
    basically means that Eclipse recognizes this Maven project as a Java 1.5-only
    project while we don’t actually have Java SE 5 installed, and in spite of the
    compiler version in pom.xml being set to 1.8.


    In order to tell Eclipse that this is really a Java 1.8 project, we need to right-click
    the project in *Project Explorer* view and choose *Properties*. In the *Project
    Facets* section you should change the version of the *Java* facet from 1.5 to
    1.8 (or 9 if you have JDK 9 installed) (see Figure [2-13](#A454457_1_En_2_Chapter.xhtml#Fig13)).
    While at it, we also need to update the Servlet API version and add the CDI, JSF,
    and JPA facets. The Servlet API is represented by the “Dynamic Web Module” entry.
    This needs to be set to version 4.0, which matches Java EE 8\. Further the “CDI,”
    “JavaServer Faces,” and “JPA” entries need to be selected. The “CDI” facet is,
    by the way, only available after having installed the JBoss Tools as instructed
    in the section “Installing JBoss Tools Plug-in.”


    Unfortunately, in the latest available Eclipse version, Oxygen 2 from December
    2017, there isn’t a JSF 2.3 or JPA 2.2 version available yet in the dropdown.
    The highest available versions are JSF 2.2 and JPA 2.1\. This is not a big problem.
    Its only influence is on the available code generators and wizards. We can always
    adjust the Eclipse-generated faces-config.xml and persistence.xml files afterward
    to match the Java EE 8 compatible versions.


    ![A454457_1_En_2_Fig13_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig13_HTML.jpg)


    ###### Figure 2-13 The Project Facets section of the project properties (note
    that the Servlet API version is represented by “Dynamic Web Module”)


    As you can see in the yellow warning bar , only Eclipse requires further configuration.
    This concerns the newly selected JSF and JPA facets. When clicking the link, we
    get to see the *Modify Faceted Project* wizard (see Figure [2-14](#A454457_1_En_2_Chapter.xhtml#Fig14)).


    The first step of the *Modify Faceted Project* wizard allows us to configure the
    JPA facet. We need to make sure that Eclipse is being instructed that the JPA
    implementation is already provided by the target runtime and thus Eclipse doesn’t
    need to include any libraries. This can be achieved by choosing the “Disable Library
    Configuration” option in the *JPA* *implementation* field . As we’re going to
    use the Payara-provided Hibernate as the actual JPA implementation, which automatically
    supports discovering of @Entity annotated classes, we’d like to instruct Eclipse
    to do the same; otherwise it would automatically add entities to the persistence.xml
    when going through the entity code generation wizard , or show warnings when we
    create one manually and don’t add it to the persistence.xml.


    ![A454457_1_En_2_Fig14_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig14_HTML.jpg)'
  trans: '

    ###### 图 2-12 Eclipse 中新建的 Maven 项目


    遗憾的是，Eclipse 生成的 `pom.xml`（它是项目作为 Maven 项目并包含其配置的主要标志）并不理想。它已经过时了，即使是由最新的 Eclipse
    Oxygen 2（2017 年 12 月版）生成的也是如此。从 `pom.xml` 文件上标有令人警惕的红叉以及 *Markers* 视图中显示的错误消息，你就能看出这一点。任何至少有一个此类红叉的项目都无法构建，也无法部署。错误消息明确写着“web.xml
    is missing and <failOnMissingWebXml> is set to true.” 换句话说，Maven 不知何故认为这仍然是一个
    Java EE 6 之前的项目，而实际上这已经是不允许的了。


    为了解决这个问题，并使 Eclipse 生成的 `pom.xml` 符合当前标准，我们需要打开 `pom.xml` 进行编辑，并按照以下代码所示进行调整：


    ```

    <project

        xmlns:="http://maven.apache.org/POM/4.0.0"

        xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

        xsi:schemaLocation="http://maven.apache.org/POM/4.0.0

            http://maven.apache.org/xsd/maven-4.0.0.xsd"

    >

        <modelVersion>4.0.0</modelVersion>


    <groupId>com.example</groupId>

        <artifactId>project</artifactId>

        <version>0.0.1-SNAPSHOT</version>

        <packaging>war</packaging>


    <properties>

            <project.build.sourceEncoding>

                UTF-8

            </project.build.sourceEncoding>

            <project.reporting.outputEncoding>

                UTF-8

            </project.reporting.outputEncoding>

            <maven.compiler.source>1.8</maven.compiler.source>

            <maven.compiler.target>1.8</maven.compiler.target>

            <failOnMissingWebXml>false</failOnMissingWebXml>

        </properties>


    <dependencies>

            <dependency>

                <groupId>javax</groupId>

                <artifactId>javaee-api</artifactId>

                <version>8.0</version>

                <scope>provided</scope>

            </dependency>

        </dependencies>

    </project>

    ```


    保存此文件后，Eclipse 会自动处理并清除那个令人警惕的红叉。现在看起来好多了。我们将简要介绍这里最重要的设置。


    *   打包方式 **war**——表示该项目是一个“Web”项目，并且项目的内容将被组装成一个 Web 归档文件。

    *   编码 **UTF-8**——设置源文件所使用的编码，以及生成（报告）输出文件时应使用的编码。这使构建过程可重复，否则它将默认使用系统默认编码（同样，这是一个相当糟糕的默认设置）。

    *   编译器 **1.8**——同时设置 `.java` 源文件中使用的 Java 版本以及 `.class` 文件中的字节码输出版本。如果不设置此项，Maven
    会默认使用最旧的版本，有时甚至比最旧的版本还低。

    *   failOnMissingWebXml **false**——旧版本的 Java EE 要求必须存在 `/WEB-INF/web.xml` 文件。尽管自
    2009 年发布的 Java EE 6 以来，这已不再是必需项，但 Maven 仍然会检查此文件是否存在。将其设置为 `false` 可以避免这种不必要的检查。

    *   依赖 **javax:javaee-api:8.0 provided**——声明了对 Java EE 8 API 的依赖，并确保编译器能够识别所有
    Java EE 类型，例如 `@Named`。此依赖项被设置为 `provided`，因为这些类型已由目标运行时（在我们的例子中是 Payara）提供。因此，它们将仅用于编译源代码，而不会包含在生成的
    `.war` 文件中。你必须绝对确保任何由目标运行时提供的编译时依赖项都被设置为 `provided`；否则，它们最终会出现在生成的 `.war` 文件中，你可能会遇到类加载问题，其中不同版本的重复库会相互冲突。如果你实际的目标不是完整的
    Java EE 服务器，而是一个精简的 Servlet 容器，则需要按照 Mojarra 的 README 中的说明调整依赖项，³ Mojarra 是可用的
    JSF 实现之一，实际上也是 Payara 底层使用的实现。


    现在，在 Eclipse 的 *Markers* 视图中，只剩下一个警告，内容是“Build path specifies execution environment
    J2SE-1.5. There are no JREs installed in the workspace that are strictly compatible
    with this environment.” 嗯，这基本上意味着 Eclipse 将此 Maven 项目识别为仅支持 Java 1.5 的项目，而我们实际上并没有安装
    Java SE 5，尽管 `pom.xml` 中的编译器版本已设置为 1.8。


    为了告诉 Eclipse 这确实是一个 Java 1.8 项目，我们需要在 *Project Explorer* 视图中右键单击该项目，然后选择 *Properties*。在
    *Project Facets* 部分，你应该将 *Java* facet 的版本从 1.5 更改为 1.8（如果你安装了 JDK 9，则更改为 9）（参见图
    2-13）。同时，我们还需要更新 Servlet API 版本，并添加 CDI、JSF 和 JPA facet。Servlet API 由“Dynamic
    Web Module”条目表示。这需要设置为版本 4.0，以匹配 Java EE 8。此外，还需要选择“CDI”、“JavaServer Faces”和“JPA”条目。顺便提一下，“CDI”facet
    只有在按照“安装 JBoss Tools 插件”一节的说明安装了 JBoss Tools 后才可用。


    遗憾的是，在最新的可用 Eclipse 版本（2017 年 12 月的 Oxygen 2）中，下拉菜单中还没有 JSF 2.3 或 JPA 2.2 版本。可用的最高版本是
    JSF 2.2 和 JPA 2.1。这不是一个大问题。它唯一的影响在于可用的代码生成器和向导。我们之后可以随时调整 Eclipse 生成的 `faces-config.xml`
    和 `persistence.xml` 文件，以匹配 Java EE 8 兼容的版本。


    ![A454457_1_En_2_Fig13_HTML.jpg](img/A454457_1_En_2_Fig13_HTML.jpg)


    ###### 图 2-13 项目属性的 Project Facets 部分（注意，Servlet API 版本由“Dynamic Web Module”表示）


    正如你在黄色警告栏中所看到的，只有 Eclipse 需要进一步配置。这涉及到新选择的 JSF 和 JPA facet。点击该链接后，我们会看到 *Modify
    Faceted Project* 向导（参见图 2-14）。


    *Modify Faceted Project* 向导的第一步允许我们配置 JPA facet。我们需要确保指示 Eclipse，JPA 实现已由目标运行时提供，因此
    Eclipse 不需要包含任何库。这可以通过在 *JPA* *implementation* 字段中选择“Disable Library Configuration”选项来实现。由于我们将使用
    Payara 提供的 Hibernate 作为实际的 JPA 实现，它会自动支持发现带有 `@Entity` 注解的类，我们希望指示 Eclipse 也这样做；否则，当通过实体代码生成向导进行操作时，它会自动将实体添加到
    `persistence.xml` 中，或者当我们手动创建一个实体但未将其添加到 `persistence.xml` 时显示警告。


    ![A454457_1_En_2_Fig14_HTML.jpg](img/A454457_1_En_2_Fig14_HTML.jpg)

