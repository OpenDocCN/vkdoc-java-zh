    ### 可编辑的 <h:dataTable>


    对于嵌套在 <h:column> 中的表单组件，你可以按照以下方式用输入组件替换模板文本中的 EL 表达式：


    ```

    <h:form id="list">

        <h:dataTable id="products" value="#{products.list}" var="product">

            <h:column>

                <f:facet name="header">ID</f:facet>

                #{product.id}

            </h:column>

            <h:column>

                <f:facet name="header">名称</f:facet>

                <h:inputText id="name" value="#{product.name}" />

                <h:message for="name" />

            </h:column>

            <h:column>

                <f:facet name="header">描述</f:facet>

                <h:inputTextarea id="description"

                    value="#{product.description}">

                </h:inputTextarea>

                <h:message for="description" />

            </h:column>

        </h:dataTable>

        <h:commandButton id="save" value="保存" action="#{products.save}">

            <f:ajax execute="@form" render="@form" />

        </h:commandButton>

    </h:form>

    ```


    因此，在将支持 bean 类从 `@RequestScoped` 改为 `@ViewScoped` 后，其 `save()` 方法的基本形式如下：


    ```

    public void save() {

        productService.update(products);

    }

    ```


    而服务类的 `update()` 方法则如下所示：


    ```

    @TransactionAttribute(REQUIRED)

    public void update(Iterable<Product> products) {

        products.forEach(entityManager::merge);

    }

    ```


    请注意，你完全无需担心收集提交的值。JSF 已经为你完成了这项任务。同时，你也不必担心 `<h:dataTable>` 内组件 ID 的唯一性，因为该组件已经实现了
    `NamingContainer` 接口，并会将其自身的客户端 ID 和迭代索引添加到子组件的客户端 ID 之前，正如你在以下生成的 HTML 输出中所见：


    ```

    <table id="list:products">

        <thead>

            <tr>

                <th scope="col">ID</th>

                <th scope="col">名称</th>

                <th scope="col">描述</th>

            </tr>

        </thead>

        <tbody>

            <tr>

                <td>3</td>

                <td>

                    <input id="list:products:0:name" type="text"

                        name="list:products:0:name" value="Three">

                    </input>

                </td>

                <td>

                    <textarea id="list:products:0:description"

                        name="list:products:0:description"

                    >第三个产品</textarea>

                </td>

            </tr>

            <tr>

                <td>2</td>

                <td>

                    <input id="list:products:1:name" type="text"

                        name="list:products:1:name" value="Two">

                    </input>

                </td>

                <td>

                    <textarea id="list:products:1:description"

                        name="list:products:1:description"

                    >第二个产品</textarea>

                </td>

            </tr>

            <tr>

                <td>1</td>

                <td>

                    <input id="list:products:2:name" type="text"

                        name="list:products:2:name" value="One">

                    </input>

                </td>

                <td>

                    <textarea id="list:products:2:description"

                        name="list:products:2:description"

                    >第一个产品</textarea>

                </td>

            </tr>

        </tbody>

    </table>

    ```


    必须指出，拥有这样一个可编辑表格的效率并不高，尤其是当表格包含大量列和行时。JSF 可以很好地处理它；但普通的 Web 浏览器可能会难以应对，特别是当行数超过几千行时。更不用说最终用户可能因为需要不断滚动整个页面而抓狂，并且基本上无法获得清晰的概览。对此有几种解决方案：首先是分页；其次是过滤；第三是基于行的内联编辑和更新；第四是在对话框或详情页面中进行外部编辑。


    所有上述提到的表格特定性能和可用性解决方案，标准 `<h:dataTable>` 均未提供，因此需要编写大量自定义代码。强烈建议你寻找一个支持这些功能的现有
    JSF 组件库，以便让你的 JSF 开发更轻松，无需重复造轮子。目前最广泛使用的是 PrimeFaces 及其 `<p:dataTable>`。⁹ 这甚至可以通过
    OptimusFaces 的 `<op:dataTable>`¹⁰ 进一步简化，而后者又基于 `<p:dataTable>`。在详情页面中进行编辑只能通过标准
    JSF 实现，这在第 5 章的“自定义转换器”部分有演示。


    需要说明的是，在之前展示的 `List<String>` 示例中，将列从输出转换为输入并不像 `List<Product>` 示例那样容易。换句话说，以下示例根本不会起作用。


    ```

    <h:form>

        <h:dataTable value="#{bean.strings}" var="string">

            <h:column>

                <h:inputText value="#{string}" />

            </h:column>

        </h:dataTable>

        <h:commandButton value="保存" action="#{bean.save}">

            <f:ajax execute="@form" />

        </h:commandButton>

    </h:form>

    ```


    技术问题在于 `java.lang.String` 是不可变的，并且没有用于其内部值的公共 setter 方法。确实，它也没有 getter，但 EL 默认会使用
    `Object#toString()`，而对于 String 来说，该方法只是返回字符串本身。这可以通过按索引引用模型值来解决，如下所示：


    ```

    <h:form>

        <h:dataTable binding="#{table}" value="#{bean.strings}" var="string">

            <h:column>

                <h:inputText value="#{bean.strings[table.rowIndex]}" />

            </h:column>

        </h:dataTable>

        <h:commandButton value="保存" action="#{bean.save}">

            <f:ajax execute="@form" />

        </h:commandButton>

    </h:form>

    ```


    注意 `binding` 属性。基本上，在视图构建期间，这会将当前的 `UIComponent` 实例设置为由给定名称标识的 EL 变量。在这个特定的代码片段中，它将使
    `#{table}` 变量引用 `<h:dataTable>` 标签背后的具体 `HtmlDataTable` 实例。然后，`#{table}` 变量在视图构建期间只能在标签位置之后引用，而在视图渲染期间则可以在视图中的任何位置引用。通过这种方式，你可以像访问
    bean 一样访问其属性。`#{table.rowIndex}` 基本上引用了 `UIData#getRowIndex()` 方法，¹¹ 该方法返回当前的迭代索引。最后，这被用来引用列表中的目标项。在更新模型值阶段（第四阶段），JSF
    将简单地替换指定索引处的项。


    对于 `binding` 属性，非常重要的一点是变量名不应与现有的受管 bean 名称或隐式 EL 对象冲突，当然也不能与同一视图中的其他组件冲突。你也可以让
    `binding` 属性引用一个支持 bean 属性，如下所示：


    ```

    <h:dataTable binding="#{bean.table}" ...>

    ```


    配合：


    ```

    private UIData table; // +getter +setter

    ```

