    响应的 `<update>` 元素内容替换该元素的过程中被完全清除。


    缺失的 `javax.faces.ViewState` 隐藏输入元素最终会被附加到当前 `UIViewRoot` 的每个 `<form method="post">`
    中。这种方法实际上是设计使然，原因有二：（1）因为视图状态值可能在 Ajax 请求之间发生变化，因此必须更新 HTML 文档中现有的表单以跟上这一变化，以防这些表单未被
    `render` 属性覆盖；（2）因为当 JSF 状态保存方法显式设置为“client”时，`javax.faces.ViewState` 隐藏输入字段的值可能会变得非常大，因此如果
    `render` 属性恰好覆盖了多个表单，否则会生成低效的 Ajax 响应。


    ## Ajax 中的导航


    在具有正确定义的动作方法的 `UICommand` 组件中，情况并无不同。然而，有时你可能希望在附加到 `UIInput` 组件的 Ajax 监听器中执行导航。对此存在合理的实际用例。但是，`UIInput`
    类不支持定义动作方法，并且 `<f:ajax listener>` 不支持返回导航结果。因此，你唯一的选择是以编程方式执行导航。这可以通过两种方式实现。第一种方式是使用
    `javax.faces.application.NavigationHandler`。⁵


    ```

    public void ajaxListener(AjaxBehaviorEvent event) {

        // ...


        String outcome = "/otherview?faces-redirect=true";

        FacesContext context = FacesContext.getCurrentInstance();

        Application application = context.getApplication();

        NavigationHandler handler = application.getNavigationHandler();

        handler.handleNavigation(context, null, outcome);

    }

    ```


    第二种方式是使用 `javax.faces.context.ExternalContext#redirect()`。⁶


    ```

    public void ajaxListener(AjaxBehaviorEvent event) throws IOException {

        // ...


        String path = "/otherview.xhtml";

        FacesContext context = FacesContext.getCurrentInstance();

        ExternalContext externalContext = context.getExternalContext();

        String uri = externalContext.getRequestContextPath() + path;

        externalContext.redirect(uri);

    }

    ```


    两者之间存在若干差异。最重要的是，`NavigationHandler` 可以处理隐式导航结果值，而 `ExternalContext#redirect()`
    只能处理实际路径，并且在涉及 Web 应用程序资源时需要手动添加请求上下文路径前缀。然而，它基本上可以处理任何 URI，例如外部 URL，如 `externalContext.redirect("http://example.com")`，而
    `NavigationHandler` 则无法处理它们。

