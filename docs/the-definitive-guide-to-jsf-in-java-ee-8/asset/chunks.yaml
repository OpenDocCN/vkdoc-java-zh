    它们将按照在视图中声明的相同顺序进行渲染。仅当您使用无序的 Map 实现（例如 HashMap）作为值时，`<f:selectItems>` 提供的项目顺序才会是未定义的。因此，最好使用有序的
    Map 实现，例如 `TreeMap` 或 `LinkedHashMap`。当将可用项目填充为 Map 时，请记住，Map 的键代表项目标签，Map 的值代表项目值。您可能直观地期望它是相反的，但这是一个技术限制。也就是说，在
    Java 端，Map 的键强制唯一性，而值则不强制。而在 HTML 端，选项标签应该是唯一的，而选项值则不需要。以下是填充此类 Map 的方法：


    ```

    private Map<String, String> availableItems;


    @PostConstruct

    public void init() {

        availableItems = new LinkedHashMap<>();

        availableItems.put("First item", "one");

        availableItems.put("Second item", "two");

        availableItems.put("Third item", "three");

    }


    // 添加/生成 getter。注意，setter 不是必需的。

    ```


    如前所述，您也可以使用 `TreeMap` 或 `HashMap`，但此时项目标签将分别变为排序或未排序，而与插入顺序无关。


    如果您确实希望在视图端交换 Map 的键和值，您始终可以通过手动将 Map 条目值分配为项目标签，并将 Map 条目键分配为项目值来实现。您可以借助 `<f:selectItems>`
    的 `var` 属性来做到这一点，通过该属性您可以声明当前迭代项目的 EL 变量名。然后，可以在同一标签的 `itemValue` 和 `itemLabel`
    属性中访问该变量。当您将 `Map#entrySet()` 传递给 `<f:selectItems>` 的 `value` 属性时，每个迭代项目将代表一个
    `Map.Entry` 实例。该实例又具有 `getKey()` 和 `getValue()` 方法，这些方法完全可以作为 EL 属性使用。


    ```

    <f:selectItems value="#{bean.availableItems.entrySet()}" var="entry"

        itemValue="#{entry.key}" itemLabel="#{entry.value}">

    </f:selectItems>

    ```


    当使用 `Collection` 或数组作为可用项目时，这也适用。您不需要像上面演示的那样先显式地将其转换为 `Set`（更具体地说，是 `Iterable`）。当您拥有复杂对象的
    `Collection` 或数组作为可用项目（例如模型实体）时，这尤其有用。


    代表“国家”的模型实体：


    ```

    public class Country {


    private Long id;

        private String code;

        private String name;


    // 添加/生成 getter 和 setter。

    }

    ```


    支持 bean：


    ```

    @Named @RequestScoped

    public class Bean {


    private String countryCode;

        private List<Country> availableCountries;


    @Inject

        private CountryService countryService;


    @PostConstruct

        public void init() {

            availableCountries = countryService.getAll();

        }


    // 添加/生成 getter 和 setter。

        // 注意，availableCountries 的 setter 不是必需的。

    }

    ```


    视图：


    ```

    <h:selectOneMenu id="countryCode" value="#{bean.countryCode}">

        <f:selectItem itemValue="#{null}" itemLabel="-- 请选择 --" />

        <f:selectItems value="#{bean.availableCountries}" var="country">

            itemValue="#{country.code}" itemLabel="#{country.name}"

        </f:selectItems>

    </h:selectOneMenu>

    ```


    请注意，为了清晰起见，省略了任何特定于持久化框架的注解（例如 JPA 的 `@Entity` 和 `@Id`）以及 `CountryService` 的实际实现。这些与任何前端框架（如
    JSF）无关。


    通过上述结构，从 `Country#getCode()` 获取的值将最终成为生成的 HTML `<option>` 元素的值。现在，当表单提交时，它将作为选择组件的提交值，进而使用该值调用
    `#{bean.countryCode}` 属性背后的 setter 方法。当然，您也可以将整个 `Country` 对象用作选择组件的属性值，但这需要一个转换器，该转换器可以在复杂对象和适合嵌入到
    HTML 输出中并作为 HTTP 请求参数发送的唯一字符串之间进行转换。您可以在第 5 章中阅读更多内容。


    ## SelectItemGroup


    如果您想将一组选项分组在一个公共标签下，您可以使用 `javax.faces.model.SelectItemGroup`，然后在 `<f:selectItems>`
    的 `value` 属性中引用它。不幸的是，这不能在 Facelets 文件中以声明方式在自定义嵌套模型上完成。为此，您必须将您的模型映射到 JSF 提供的
    `javax.faces.model.SelectItem`。以下是一个入门示例：


    ```

    private List<SelectItem> availableItems;


    @PostConstruct

    public void init() {

        SelectItemGroup group1 = new SelectItemGroup("组 1");

        group1.setSelectItems(new SelectItem[] {

            new SelectItem("组 1 值 1", "组 1 标签 1"),

            new SelectItem("组 1 值 2", "组 1 标签 2"),

            new SelectItem("组 1 值 3", "组 1 标签 3")

        });

        SelectItemGroup group2 = new SelectItemGroup("组 2");

        group2.setSelectItems(new SelectItem[] {

            new SelectItem("组 2 值 1", "组 2 标签 1"),

            new SelectItem("组 2 值 2", "组 2 标签 2"),

            new SelectItem("组 2 值 3", "组 2 标签 3")

        });

        availableItems = Arrays.asList(group1, group2);


        // 为 availableItems 添加/生成 getter。

        // 注意，setter 不是必需的。

    }

    ```


    需要注意的是，自 JSF 1.0（2004 年）以来，这两个模型 API 基本上没有变化，这就是为什么您仍然看到 `SelectItemGroup#setSelectItems()`
    方法接受一个 `SelectItem[]` 数组而不是 `SelectItem...` 可变参数的原因。这肯定会在 JSF.next 中得到解决。在任何选择组件中将其引用为
    `<f:selectItems value="#{bean.availableItems}" />` 时，以下是每个组件的外观。


    `<h:selectOneMenu>` 会将每个组渲染为 HTML `<optgroup>`：


    ![A454457_1_En_4_Figf_HTML.jpg](img/A454457_1_En_4_Figf_HTML.jpg)


    `<h:selectOneRadio layout="pageDirection">` 会将其渲染为嵌套表格：


    ![A454457_1_En_4_Figg_HTML.jpg](img/A454457_1_En_4_Figg_HTML.jpg)


    `<h:selectManyListbox>` 会将每个组渲染为 HTML `<optgroup>`：


    ![A454457_1_En_4_Figh_HTML.jpg](img/A454457_1_En_4_Figh_HTML.jpg)


    `<h:selectManyCheckbox layout="pageDirection">` 会将其渲染为嵌套表格：


    ![A454457_1_En_4_Figi_HTML.jpg](img/A454457_1_En_4_Figi_HTML.jpg)


    请注意 `<h:selectOneRadio>` 和 `<h:selectManyCheckbox>` 中 `layout="pageDirection"`
    属性的重要性。这看起来会比默认的 `layout="lineDirection"`（将所有内容渲染在一个大的单行表格行中）好得多。

