- fmt: "### Excluded\n\n“**Excluded**,” aka “deny all,” means that no external caller\
    \ will be granted access to the resources covered by this constraint. One might\
    \ ask what the purpose of such a constraint is. If the resources can never be\
    \ accessed, why are those resources there in the first place?\n\nThe answer is\
    \ twofold. For one, a single application may be configured for different purposes.\
    \ An excluded security constraint is an easy way then to quickly disable a number\
    \ of resources that are not applicable to a certain configuration of the application.\
    \ A more important use case is to be able to make a distinction between external\
    \ use and internal use of a resource. The key insight here is that security constraints\
    \ are only applied to external requests for that resource, i.e., to a caller requesting\
    \ `https://example.com/resources/template.xhtml`, but **not** to internal requests\
    \ such as includes, forwards, and any of the methods to load a resource from the\
    \ classpath or file system.\n\nThis is specifically important for JSF because\
    \ of a somewhat unfortunate design choice regarding composite components. Composite\
    \ components are components that are implemented via a Facelet instead of a Java\
    \ class. By convention, they have to be placed in a directory inside a directory\
    \ named `/resources` that resides in the web root. For instance, `/resources/bar/foo.xhtml`.\
    \ This will make a composite component “foo” available in the namespace `http://xmlns.jcp.org/jsf/composite/bar`.\n\
    \nComponents are of course not views and the caller should not be able to request\
    \ those directly. Unfortunately, `/resources` is not in any way a special directory\
    \ to Java EE. JSF assigns a special meaning to it by convention, but to the Servlet\
    \ container it’s a directory like any other. This specifically means there’s no\
    \ protection applied to it and any caller can directly request resources from\
    \ it. In other words, this directory is “unchecked,” aka “world readable.” Even\
    \ with an `*.xhtml` mapping, this not only allows the user to guess which components\
    \ we have but lets the user attempt to execute those as well. Clearly this is\
    \ not what we want. There are two solutions for this:\n\n- Configure another directory\
    \ to be the JSF resources directory\n- Add the mentioned security constraint to\
    \ `web.xml`\n\nVia the `javax.faces.WEBAPP_RESOURCES_DIRECTORY` context parameter\
    \ another directory can be configured to be the JSF resources directory instead\
    \ of `/resources`. For example:\n\n```\n<context-param>\n   <param-name>javax.faces.WEBAPP_RESOURCES_DIRECTORY</param-name>\n\
    \   <param-value>WEB-INF/resources</param-value>\n</context-param>\n```\n\nNote\
    \ that the path is relative to the web root and must not begin with a “/.”\n\n\
    While this is a good default for our own applications, it still doesn’t totally\
    \ protect us. Namely, third-party jars can still provide their resources via `/resources`\
    \ and aren’t affected by that context parameter. For that reason, the aforementioned\
    \ “Excluded” constraint is needed. It looks as follows:\n\n```\n<security-constraint>\n\
    \    <web-resource-collection>\n        <web-resource-name>The /resources folder</web-resource-name>\n\
    \        <url-pattern>/resources/*</url-pattern>\n    </web-resource-collection>\n\
    </security-constraint>\n```\n\nAs can be seen, defining an *excluded* constraint\
    \ boils down to defining the URL pattern that we wish to constrain, without defining\
    \ any specific constraints.\n\n### Unchecked\n\n“**Unchecked**,” aka “permit all,”\
    \ “public,” and “world readable,” means that all callers, independent of whether\
    \ or not they are authenticated, have access to the resources covered by the “constraint.”\
    \ Internally an explicit constraint may exist for this, but in `web.xml` this\
    \ “constraint” is defined simply by not defining any constraint at all for a URL\
    \ pattern. In other words, every URL that’s not covered explicitly by any other\
    \ pattern is “unchecked.”\n\n### By Role\n\n“**By role**” means a so-called role\
    \ is associated with a URL pattern, and the authenticated caller must have that\
    \ role in order to access the resource. A role itself is frequently seen as a\
    \ concept with strict semantics, but it’s essentially little more than just an\
    \ opaque string that needs to match from the set of such strings associated with\
    \ an authenticated caller, and the set of strings associated with a URL pattern.\
    \ The content of that string is completely up to the application, meaning it could\
    \ be a “type of caller,” like “admin”, “user”, etc., but also something fine-grained\
    \ as “may_add_item”, or even tokens such as “AYUDE-OPWR-BM1OP”.\n\nThe following\
    \ gives an example:\n\n```\n<security-constraint>\n    <web-resource-collection>\n\
    \        <web-resource-name>User pages</web-resource-name>\n        <url-pattern>/user/*</url-pattern>\n\
    \    </web-resource-collection>\n    <auth-constraint>\n        <role-name>VIEW_USER_PAGES</role-name>\n\
    \    </auth-constraint>\n</security-constraint>\n\n<security-constraint>\n   \
    \ <web-resource-collection>\n        <web-resource-name>Admin pages</web-resource-name>\n\
    \        <url-pattern>/admin/*</url-pattern>\n    </web-resource-collection>\n\
    \    <auth-constraint>\n        <role-name>VIEW_ADMIN_PAGES</role-name>\n    </auth-constraint>\n\
    </security-constraint>\n\n<security-role>\n    <role-name>VIEW_USER_PAGES</role-name>\n\
    </security-role>\n<security-role>\n    <role-name>VIEW_ADMIN_PAGES</role-name>\n\
    </security-role>\n```\n\nIn the above fragment we define two security constraints—one\
    \ for the `/user/*` pattern, for which the caller needs to have the role `VIEW_USER_PAGES`,\
    \ and one for the `/admin/*` pattern, for which the caller needs the role `VIEW_ADMIN_PAGES`.\
    \ With the above constraints in place, a caller accessing, say, `/user/account.xhtml`\
    \ has to be authenticated and has to have the mentioned role.\n\nAn `auth-constraint`\
    \ can contain multiple roles, for which OR semantics are applied. This means the\
    \ authenticated caller only needs to have one of the roles in that constraint\
    \ in order to be granted access. Constraints can additionally be restricted to\
    \ a specific HTTP method (such as `GET` or `POST`). This does come with a caveat,\
    \ since by default all methods that are not specified will be unchecked (public).\
    \ This can be countered by using the top-level `<deny-uncovered-http-methods/>`\
    \ tag. The following gives an example of this:\n\n```\n<deny-uncovered-http-methods\
    \ />\n\n<security-constraint>\n    <web-resource-collection>\n        <web-resource-name>User\
    \ pages</web-resource-name>\n        <url-pattern>/user/*</url-pattern>\n    \
    \    <http-method>GET</http-method>\n        <http-method>POST</http-method>\n\
    \    </web-resource-collection>\n    <auth-constraint>\n        <role-name>VIEW_USER_PAGES</role-name>\n\
    \    </auth-constraint>\n</security-constraint>\n```"
  raw: '### Excluded


    “**Excluded,**” aka “deny all,” means that no external caller will be granted
    access to the resources covered by this constraint. One might ask what the purpose
    of such a constraint is. If the resources can never be accessed, why are those
    resources there in the first place?


    The answer is twofold. For one, a single application may be configured for different
    purposes. An excluded security constraint is an easy way then to quickly disable
    a number of resources that are not applicable to a certain configuration of the
    application. A more important use case is to be able to make a distinction between
    external use and internal use of a resource. The key insight here is that security
    constraints are only applied to external requests for that resource, i.e., to
    a caller requesting [https://example.com/resources/template.xhtml](https://example.com/resources/template.xhtml)
    , but **not** to internal requests such as includes, forwards, and any of the
    methods to load a resource from the classpath or file system.


    This is specifically important for JSF because of a somewhat unfortunate design
    choice regarding composite components. Composite components are components that
    are implemented via a Facelet instead of a Java class. By convention, they have
    to be placed in a directory inside a directory named /resources that resides in
    the web root. For instance, /resources/bar/foo.xhtml. This will make a composite
    component “foo” available in the namespace [http://xmlns.jcp.org/jsf/composite/bar](http://xmlns.jcp.org/jsf/composite/bar)
    .


    Components are of course not views and the caller should not be able to request
    those directly. Unfortunately, /resources is not in any way a special directory
    to Java EE. JSF assigns a special meaning to it by convention, but to the Servlet
    container it’s a directory like any other. This specifically means there’s no
    protection applied to it and any caller can directly request resources from it.
    In other words, this directory is “unchecked,” aka “world readable.” Even with
    an *.xhtml mapping, this not only allows the user to guess which components we
    have but lets the user attempt to execute those as well. Clearly this is not what
    we want. There are two solutions for this:


    *   Configure another directory to be the JSF resources directory


    *   Add the mentioned security constraint to web.xml


    Via the javax.faces.WEBAPP_RESOURCES_DIRECTORY context parameter another directory
    can be configured to be the JSF resources directory instead of /resources. For
    example,


    ```

    <context-param>

       <param-name>javax.faces.WEBAPP_RESOURCES_DIRECTORY</param-name>

       <param-value>WEB-INF/resources</param-value>

    </context-param>

    ```


    Note that the path is relative to the web root and must not begin with a “/.”


    While this is a good default for our own applications, it still doesn’t totally
    protect us. Namely, third-party jars can still provide their resources via /resources
    and aren’t affected by that context parameter. For that reason, the aforementioned
    “Excluded” constraint is needed. It looks as follows:


    ```

    <security-constraint>

        <web-resource-collection>

            <web-resource-name>The /resources folder</web-resource-name>

            <url-pattern>/resources/*</url-pattern>

        </web-resource-collection>

    </security-constraint>

    ```


    As can be seen, defining an *excluded* constraint boils down to defining the URL
    pattern that we wish to constrain, without defining any specific constraints.


    ### Unchecked


    “**Unchecked,”** aka “permit all,” “public,” and “world readable,” means that
    all callers , independent of whether or not they are authenticated, have access
    to the resources covered by the “constraint.” Internally an explicit constraint
    may exist for this, but in web.xml this “constraint” is defined simply by not
    defining any constraint at all for a URL pattern. In other words, every URL that’s
    not covered explicitly by any other pattern is “unchecked.”


    ### By Role


    “**By** **role** **”** means a so-called role is associated with a URL pattern,
    and the authenticated caller must have that role in order to access the resource.
    A role itself is frequently seen as a concept with strict semantics, but it’s
    essentially little more than just an opaque string that needs to match from the
    set of such strings associated with an authenticated caller, and the set of strings
    associated with a URL pattern. The content of that string is completely up to
    the application, meaning it could be a “type of caller,” like “admin”, “user”,
    etc., but also something fine-grained as “may_add_item”, or even tokens such as
    “AYUDE-OPWR-BM1OP”.


    The following gives an example:


    ```

    <security-constraint>

        <web-resource-collection>

            <web-resource-name>User pages</web-resource-name>

            <url-pattern>/user/*</url-pattern>

        </web-resource-collection>

        <auth-constraint>

            <role-name>VIEW_USER_PAGES</role-name>

        </auth-constraint>

    </security-constraint>


    <security-constraint>

        <web-resource-collection>

            <web-resource-name>Admin pages</web-resource-name>

            <url-pattern>/admin/*</url-pattern>

        </web-resource-collection>

        <auth-constraint>

            <role-name>VIEW_ADMIN_PAGES</role-name>

        </auth-constraint>

    </security-constraint>


    <security-role>

        <role-name>VIEW_USER_PAGES</role-name>

    </security-role>

    <security-role>

        <role-name>VIEW_ADMIN_PAGES</role-name>

    </security-role>

    ```


    In the above fragment we define two security constraints—one for the /user/* pattern,
    for which the caller needs to have the role “VIEW_USER_PAGES”, and one for the
    /admin/* pattern, for which the caller needs the role “VIEW_ADMIN_PAGES”. With
    the above constraints in place, a caller accessing, say, /user/account.xhtml has
    to be authenticated and has to have the mentioned role.


    An auth-constraint can contain multiple roles, for which OR semantics are applied.
    This means the authenticated caller only needs to have one of the roles in that
    constraint in order to be granted access. Constraints can additionally be restricted
    to a specific HTTP method (such as GET or POST). This does come with a caveat,
    since by default all methods that are not specified will be unchecked (public).
    This can be countered by using the top-level <deny-uncovered-http-methods/> tag.
    The following gives an example of this:


    ```

    <deny-uncovered-http-methods />


    <security-constraint>

        <web-resource-collection>

            <web-resource-name>User pages</web-resource-name>

            <url-pattern>/user/*</url-pattern>

            <http-method>GET</http-method>

            <http-method>POST</http-method>

        </web-resource-collection>

        <auth-constraint>

            <role-name>VIEW_USER_PAGES</role-name>

        </auth-constraint>

    </security-constraint>

    ```'
  trans: "\n### 排除\n\n“**排除**”，又称“全部拒绝”，意味着此约束所覆盖的资源将拒绝所有外部调用者的访问。有人可能会问，这种约束的目的是什么。如果资源永远无法被访问，那这些资源一开始为什么存在？\n\
    \n答案有两方面。一方面，单个应用程序可能为不同目的而配置。排除式安全约束是一种便捷方式，可以快速禁用那些不适用于应用程序特定配置的若干资源。一个更重要的用例是能够区分资源的外部使用和内部使用。这里的关键见解是，安全约束仅应用于对该资源的外部请求，即针对请求\
    \ [`example.com/resources/template.xhtml`](https://example.com/resources/template.xhtml)\
    \ 的调用者，但**不**应用于内部请求，例如包含、转发以及任何从类路径或文件系统加载资源的方法。\n\n这对于 JSF 来说尤其重要，因为复合组件存在一个不太理想的设计选择。复合组件是通过\
    \ Facelet 而非 Java 类实现的组件。按照惯例，它们必须放置在位于 Web 根目录下名为 /resources 的目录内的子目录中。例如，/resources/bar/foo.xhtml。这将使复合组件“foo”在命名空间\
    \ [`xmlns.jcp.org/jsf/composite/bar`](http://xmlns.jcp.org/jsf/composite/bar)\
    \ 中可用。\n\n组件当然不是视图，调用者不应能直接请求它们。不幸的是，/resources 对于 Java EE 来说并不是一个特殊目录。JSF 通过约定赋予了它特殊含义，但对于\
    \ Servlet 容器来说，它和其他目录一样。这尤其意味着它没有任何保护措施，任何调用者都可以直接请求其中的资源。换句话说，这个目录是“未检查的”，即“全局可读”。即使使用\
    \ *.xhtml 映射，这不仅允许用户猜测我们有哪些组件，还允许用户尝试执行这些组件。显然这不是我们想要的。对此有两种解决方案：\n\n*   配置另一个目录作为\
    \ JSF 资源目录\n*   在 web.xml 中添加上述安全约束\n\n通过 `javax.faces.WEBAPP_RESOURCES_DIRECTORY`\
    \ 上下文参数，可以将另一个目录配置为 JSF 资源目录，而不是 /resources。例如：\n\n```\n<context-param>\n   <param-name>javax.faces.WEBAPP_RESOURCES_DIRECTORY</param-name>\n\
    \   <param-value>WEB-INF/resources</param-value>\n</context-param>\n```\n\n注意，该路径是相对于\
    \ Web 根目录的，并且不能以“/”开头。\n\n虽然这对我们自己的应用程序来说是一个好的默认设置，但它仍然不能完全保护我们。也就是说，第三方 jar 包仍然可以通过\
    \ /resources 提供它们的资源，并且不受该上下文参数的影响。因此，前面提到的“排除”约束是必需的。它看起来如下：\n\n```\n<security-constraint>\n\
    \    <web-resource-collection>\n        <web-resource-name>The /resources folder</web-resource-name>\n\
    \        <url-pattern>/resources/*</url-pattern>\n    </web-resource-collection>\n\
    </security-constraint>\n```\n\n可以看出，定义一个*排除*约束归结为定义我们希望约束的 URL 模式，而不定义任何具体的约束。\n\
    \n### 未检查\n\n“**未检查**”，又称“全部允许”、“公开”和“全局可读”，意味着所有调用者，无论是否经过身份验证，都可以访问此“约束”所覆盖的资源。在内部，可能存在一个显式约束，但在\
    \ web.xml 中，这个“约束”的定义方式很简单，就是不为某个 URL 模式定义任何约束。换句话说，没有被任何其他模式显式覆盖的每个 URL 都是“未检查”的。\n\
    \n### 按角色\n\n“**按角色**”意味着一个所谓的角色与一个 URL 模式相关联，并且经过身份验证的调用者必须拥有该角色才能访问该资源。角色本身通常被视为具有严格语义的概念，但它本质上不过是一个不透明的字符串，需要与经过身份验证的调用者关联的一组此类字符串以及\
    \ URL 模式关联的一组字符串相匹配。该字符串的内容完全由应用程序决定，这意味着它可以是“调用者类型”，如“admin”、“user”等，也可以是更细粒度的内容，如“may_add_item”，甚至是像“AYUDE-OPWR-BM1OP”这样的令牌。\n\
    \n以下是一个示例：\n\n```\n<security-constraint>\n    <web-resource-collection>\n    \
    \    <web-resource-name>User pages</web-resource-name>\n        <url-pattern>/user/*</url-pattern>\n\
    \    </web-resource-collection>\n    <auth-constraint>\n        <role-name>VIEW_USER_PAGES</role-name>\n\
    \    </auth-constraint>\n</security-constraint>\n\n<security-constraint>\n   \
    \ <web-resource-collection>\n        <web-resource-name>Admin pages</web-resource-name>\n\
    \        <url-pattern>/admin/*</url-pattern>\n    </web-resource-collection>\n\
    \    <auth-constraint>\n        <role-name>VIEW_ADMIN_PAGES</role-name>\n    </auth-constraint>\n\
    </security-constraint>\n\n<security-role>\n    <role-name>VIEW_USER_PAGES</role-name>\n\
    </security-role>\n<security-role>\n    <role-name>VIEW_ADMIN_PAGES</role-name>\n\
    </security-role>\n```\n\n在上面的片段中，我们定义了两个安全约束——一个用于 /user/* 模式，调用者需要拥有角色“VIEW_USER_PAGES”；另一个用于\
    \ /admin/* 模式，调用者需要拥有角色“VIEW_ADMIN_PAGES”。有了上述约束，访问例如 /user/account.xhtml 的调用者必须经过身份验证，并且必须拥有提到的角色。\n\
    \n一个 `auth-constraint` 可以包含多个角色，这些角色之间应用“或”逻辑。这意味着经过身份验证的调用者只需要拥有该约束中的其中一个角色即可被授予访问权限。约束还可以进一步限制到特定的\
    \ HTTP 方法（例如 GET 或 POST）。但这有一个注意事项，因为默认情况下，所有未指定的方法都将被视为未检查（公开）。这可以通过使用顶级的 `<deny-uncovered-http-methods/>`\
    \ 标签来应对。以下是一个示例：\n\n```\n<deny-uncovered-http-methods />\n\n<security-constraint>\n\
    \    <web-resource-collection>\n        <web-resource-name>User pages</web-resource-name>\n\
    \        <url-pattern>/user/*</url-pattern>\n        <http-method>GET</http-method>\n\
    \        <http-method>POST</http-method>\n    </web-resource-collection>\n   \
    \ <auth-constraint>\n        <role-name>VIEW_USER_PAGES</role-name>\n    </auth-constraint>\n\
    </security-constraint>\n```\n"
- fmt: "# Setting the Authentication Mechanism\n\nAfter the security constraints have\
    \ been defined, we need to set how the caller will authenticate. The artifact\
    \ that handles the interaction with the caller (i.e., asks the caller for credentials\
    \ in a certain way) is called an “authentication mechanism.” Java EE provides\
    \ a number of these out of the box. The Servlet spec provides four, namely, `FORM`,\
    \ `BASIC`, `DIGEST`, and `CERT`, while Java EE Security provides `FORM` and `BASIC`\
    \ as well (with the difference that these correspond to CDI beans), but also a\
    \ variant of `FORM` called “Custom FORM”.\n\n`FORM` and `Custom FORM` are both\
    \ suitable for interactive web applications, such as the ones we would build primarily\
    \ with JSF. Contrary to, say, `BASIC`, the `FORM` authentication mechanisms call\
    \ back into the application and let it render the form that asks the caller for\
    \ credentials, hence, the name of these mechanisms.\n\nThe difference between\
    \ the two is mainly in how the mechanism requires the application to continue\
    \ the so-called authentication dialog after it has rendered the form. In `FORM`\
    \ this is done by letting the caller post the filled-out form to the virtual URL\
    \ `j_security_check`, while in `Custom FORM` this is done programmatically via\
    \ a call to the injected `SecurityContext`. This small difference makes all the\
    \ difference for JSF though. In JSF, a form view by default submits to the same\
    \ URL it was requested from, so posting back to a single mechanism mandated URL\
    \ is not at all natural. In addition to that, in JSF we often need to have server-side\
