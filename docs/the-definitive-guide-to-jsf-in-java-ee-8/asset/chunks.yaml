    ## 数据迭代组件


    是的，只有一个，即 `<h:dataTable>`，它继承自 `UIData` 超类，并基于可迭代的数据模型生成一个 HTML `<table>`，其中每个数据项表示为一行。JSF
    中另一个可用的数据迭代组件是 Facelets 的 `<ui:repeat>`，它不继承自 `UIData` 超类，也不生成任何 HTML 输出，因此严格来说不算作“输出组件”。此外，在标准
    JSF 组件集中，没有组件能生成 HTML `<ul>`、`<ol>` 或 `<dl>`，但通过继承 `UIData` 创建一个自定义组件相对容易实现。（另请参阅第
    11 章中的“创建新组件和渲染器”一节。）


    `UIData` 的 `value` 属性支持 `java.lang.Iterable`。换句话说，你可以提供任何 Java 集合作为模型值。由于 `UIData`
    中最常使用基于索引的访问，因此最高效的是 `java.util.ArrayList`，因为它提供了 O(1) 的索引访问。`<h:dataTable>` 组件的渲染器仅支持
    `<h:column>` 作为直接子组件，其他任何内容都会被忽略。顾名思义，`<h:column>` 代表单个列。每次对 `<h:dataTable>` 的
    `value` 进行迭代时，都会根据当前迭代项重新渲染所有列。与 `<c:forEach>` 和 `<ui:repeat>` 类似，当前迭代项通过 `var`
    属性暴露在 EL 作用域中。以下是一个基本示例，它迭代一个 `List<String>`。


    ```

    <h:dataTable id="strings" value="#{bean.strings}" var="string">

        <h:column>#{string}</h:column>

    </h:dataTable>

    ```


    后台 Bean 类 `com.example.project.view.Bean`：


    ```

    @Named @RequestScoped

    public class Bean {


    private List<String> strings;


    @PostConstruct

        public void init() {

            strings = Arrays.asList("one", "two", "three");

        }


    public List<String> getStrings() {

            return strings;

        }

    }

    ```


    生成的 HTML 输出：


    ```

    <table>

        <tbody>

            <tr><td>one</td></tr>

            <tr><td>two</td></tr>

            <tr><td>three</td></tr>

        </tbody>

    </table>

    ```


    在 Chrome 浏览器中的渲染效果：


    ![A454457_1_En_6_Figc_HTML.jpg](img/A454457_1_En_6_Figc_HTML.jpg)


    需要注意的是，由 `var` 属性指定的变量名不应与现有的受管 Bean 名称甚至隐式 EL 对象冲突。隐式 EL 对象在 EL 解析中具有更高的优先级。隐式
    EL 对象的一个例子是 `#{header}`，它引用 `ExternalContext#getRequestHeaderMap()`。⁷ 因此，如果你恰好有
    `#{bean.headers}` 并希望在一个迭代组件中呈现它，那么你不能使用 `var="header"`，最好想一个不同的名称，例如 `var="head"`。


    以下是一个更详细的示例，展示了产品列表。类似的表格在第 5 章中已经出现过。


    ```

    <h:dataTable id="products" value="#{products.list}" var="product">

        <h:column>

            <f:facet name="header">ID</f:facet>

            #{product.id}

        </h:column>

        <h:column>

            <f:facet name="header">名称</f:facet>

            #{product.name}

        </h:column>

        <h:column>

            <f:facet name="header">描述</f:facet>

            #{product.description}

        </h:column>

    </h:dataTable>

    ```


    后台 Bean 类 `com.example.project.view.Products`：


    ```

    @Named @RequestScoped

    public class Products {


    private List<Product> list;


    @Inject

        private ProductService productService;


    @PostConstruct

        public void init() {

            list = productService.list();

        }


    public List<Product> getList() {

            return list;

        }

    }

    ```


    产品实体：`com.example.project.model.Product`：


    ```

    @Entity

    public class Product {


    @Id @GeneratedValue(strategy=IDENTITY)

        private Long id;


    @Column(nullable = false)

        private @NotNull String name;


    @Column(nullable = false)

        private @NotNull String description;


    // 添加/生成 getter 和 setter 方法。

    }

    ```


    产品服务：`com.example.project.service.ProductService`：


    ```

    @Stateless

    public class ProductService {


    @PersistenceContext

        private EntityManager entityManager;


    @TransactionAttribute(SUPPORTS)

        public List<Product> list() {

            return entityManager

                .createQuery("FROM Product ORDER BY id DESC", Product.class)

                .getResultList();

        }

    }

    ```


    生成的 HTML 输出：


    ```

    <table>

        <thead>

            <tr>

                <th scope="col">ID</th>

                <th scope="col">名称</th>

                <th scope="col">描述</th>

            </tr>

        </thead>

        <tbody>

            <tr>

                <td>3</td>

                <td>Three</td>

                <td>第三个产品</td>

            </tr>

            <tr>

                <td>2</td>

                <td>Two</td>

                <td>第二个产品</td>

            </tr>

            <tr>

                <td>1</td>

                <td>One</td>

                <td>第一个产品</td>

            </tr>

        </tbody>

    </table>

    ```


    在 Chrome 浏览器中的渲染效果：


    ![A454457_1_En_6_Figd_HTML.jpg](img/A454457_1_En_6_Figd_HTML.jpg)


    需要注意的是，`<h:dataTable>` 的 `value` 属性背后的模型必须引用一个 Bean 属性，该属性应事先在一次性生命周期事件（如 `@PostConstruct`
    或 `<f:viewAction>`）中准备好。这并非专门适用于 `UIData` 组件，而是基本上适用于所有 JSF 组件。也就是说，getter 方法在
    JSF 生命周期中可能会被多次调用，尤其是在迭代组件的 `value` 属性或任何 JSF 组件的 `rendered` 属性中被引用时。


    技术原因是，任何 EL 值表达式在幕后都会被创建为一个 `javax.el.ValueExpression` 实例，该实例内部基本上只保存了 EL 字符串字面量（如
    `#{products.list}`），对其进行的任何 `ValueExpression#getValue()` 调用都只会根据提供的 EL 上下文重新计算该表达式。这通常是一个非常轻量级的操作，耗时在纳秒级别，但当
    getter 方法反过来执行一个相对昂贵的数据库查询（可能需要数十甚至数百毫秒）时，性能可能会急剧下降。


    当迭代组件中嵌套了表单组件时，迭代组件可能会在 JSF 生命周期的每个阶段调用 getter 方法。如果你在 getter 方法中通过从数据库获取列表来准备模型，这将导致每次调用
    getter 方法时都查询数据库，这显然是低效的。此外，关于根据迭代索引解析当前迭代项的问题也可能出现，正如上一节关于 `<h:panelGrid>` 与
    `<c:forEach>` 的最后一段所述。


    另一个需要注意的点是 `<f:facet name="header">`。这基本上会生成包含 `<th>` 内容的 `<thead>`。`<h:dataTable>`
    也支持 `<f:facet name="footer">`，它会生成包含 `<td>` 内容的 `<tfoot>`。你通常可以在标签文档以及 `<h:dataTable>`
    标签文档中找到所有支持的 `<f:facet>` 名称。⁸


    基本上，你可以在 `<h:column>` 内部放置任何内容来表示单元格内容，甚至可以是表单组件或嵌套的 `<h:dataTable>` 或 `<ui:repeat>`。以下是一个小示例，展示了在嵌套的
    `<ui:repeat>` 中呈现 `Product` 实体的虚构 `Set<Tag> tags` 属性。


    ```

    <h:dataTable id="products" value="#{products.list}" var="product">

        ...

        <h:column>

            <ui:repeat value="#{product.tags}" var="tag">

                #{tag.name}<br/>

            </ui:repeat>

        </h:column>

    </h:dataTable>

    ```

