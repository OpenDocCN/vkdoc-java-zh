    \ thing that you need to keep in mind is that they run during the view build time\
    \ and that they don’t participate in the JSF life cycle. Below I have demonstrated\
    \ the most important differences between a JSTL tag and its JSF/Facelets counterpart.\n\
    \n```\n<c:forEach> versus <ui:repeat>\n```\n\nFollowing is a <c:forEach> example\
    \ iterating over a List<Item> with three instances of an example Item entity having\
    \ id and value properties:\n\n```\n<c:forEach items=\"#{bean.items}\" var=\"item\"\
    >\n    <h:outputText id=\"item_#{item.id}\" value=\"#{item.value}\" />\n</c:forEach>\n\
    ```\n\nDuring the view build time , this creates three separate <h:outputText>\
    \ components in the component tree, roughly represented as follows:\n\n```\n<h:outputText\
    \ id=\"item_1\" value=\"#{bean.items[0].value}\" />\n<h:outputText id=\"item_2\"\
    \ value=\"#{bean.items[1].value}\" />\n<h:outputText id=\"item_3\" value=\"#{bean.items[2].value}\"\
    \ />\n```\n\nIn turn, they individually generate their HTML output during view\
    \ render time , as follows:\n\n```\n<span id=\"item_1\">one</span>\n<span id=\"\
    item_2\">two</span>\n<span id=\"item_3\">three</span>\n```\n\nDo note that the\
    \ id attribute of a JSF component is also evaluated during the view build time\
    \ and thus you need to manually ensure the uniqueness of the resulting component\
    \ ID. Otherwise JSF will throw an IllegalStateException with a message which goes\
    \ like this: “Duplicate component ID found in view.” The only other JSF component\
    \ attribute which is also evaluated during the view build time is the binding\
    \ attribute. If you absolutely need to bind a JSTL-generated component to a backing\
    \ bean property , which is rare, then you should be specifying a unique array\
    \ index, collection index, or map key. Following is an example provided that #{bean.components}\
    \ refers an already prepared UIComponent[], List<UIComponent>, or Map<Long, UIComponent>\
    \ property.\n\n```\n<c:forEach items=\"#{bean.items}\" var=\"item\">\n    <h:outputText\
    \ binding=\"#{bean.components[item.id]}\"\n        id=\"item_#{item.id}\" value=\"\
    #{item.value}\" />\n</c:forEach>\n```\n\nThe Facelets counterpart of the <c:forEach>\
    \ is the <ui:repeat>. This is in essence a UIComponent which doesn’t generate\
    \ any HTML output by itself. In other words, the <ui:repeat> itself also ends\
    \ up in the JSF component tree during the view build time, and only runs during\
    \ the view render time. It basically re-renders its children during every iteration\
    \ round against the currently iterated item as var attribute.\n\n```\n<ui:repeat\
    \ id=\"items\" value=\"#{bean.items}\" var=\"item\">\n    <h:outputText id=\"\
    item\" value=\"#{item.value}\" />\n</ui:repeat>\n```\n\nDuring the view build\
    \ time the above ends up exactly as is in the JSF component tree: a single UIRepeat\
    \ instance with one nested HtmlOutputText instance whereas the <c:forEach> creates\
    \ here three HtmlOutputText instances. Then, during the view render time, the\
    \ very same <h:outputText> component is being reused to generate its HTML output\
    \ based on current iteration round.\n\n```\n<span id=\"items:0:item\">one</span>\n\
    <span id=\"items:1:item\">two</span>\n<span id=\"items:2:item\">three</span>\n\
    ```\n\nDo note that the <ui:repeat> as a NamingContainer component already ensured\
    \ the uniqueness of the client ID based on the iteration index. It's technically\
    \ also not possible to reference its var attribute in the id attribute of any\
    \ child component as the var attribute is only set during view render time while\
    \ the id attribute is already set during view build time .\n\n```\n<c:if>/<c:choose>\
    \ versus rendered \n```\n\nImagine that we have a custom tag file which can be\
    \ used as follows:\n\n```\n<t:input type=\"email\" id=\"email\" label=\"Email\"\
    \ value=\"#{bean.email}\" />\n```\n\nAnd the input.xhtml tag file contains the\
    \ following Facelets markup conditionally adding different tags using a <c:choose>\
    \ (you can also use <c:if> for this):\n\n```\n<c:choose>\n    <c:when test=\"\
    #{type eq 'password'}\">\n        <h:inputSecret id=\"#{id}\" label=\"#{label}\"\
    \ value=\"#{value}\" />\n    </c:when>\n    <c:when test=\"#{type eq 'textarea'}\"\
    >\n         <h:inputTextarea id=\"#{id}\" label=\"#{label}\" value=\"#{value}\"\
    \ />\n    </c:when>\n    <c:otherwise>\n         <h:inputText id=\"#{id}\" label=\"\
    #{label}\" value=\"#{value}\"\n             a:type=\"#{type}\">\n         </h:inputText>\n\
        </c:otherwise>\n</c:choose>\n```\n\nNote that a more elaborate example can\
    \ be found in the section “Tag Files” in Chapter [7](#A454457_1_En_7_Chapter.xhtml).\
    \ This construct will then only create the <h:inputText> component in the component\
    \ tree , roughly represented as follows:\n\n```\n<h:inputText id=\"email\" label=\"\
    Email\" value=\"#{bean.email}\"\n    a:type=\"email\">\n</h:inputText>\n```\n\n\
    and when using the rendered attribute instead of <c:choose> as follows:\n\n```\n\
    <h:inputSecret id=\"#{id}_password\" rendered=\"#{type eq 'password'}\"\n    label=\"\
    #{label}\" value=\"#{value}\">\n</h:inputSecret>\n<h:inputTextarea id=\"#{id}_textarea\"\
    \ rendered=\"#{type eq 'textarea'}\"\n    label=\"#{label}\" value=\"#{value}\"\
    >\n</h:inputTextarea>\n<h:inputText id=\"#{id}_text\"\n    rendered=\"#{type ne\
    \ 'password' and type ne 'textarea'}\"\n    label=\"#{label}\" value=\"#{value}\"\
    >\n</h:inputText>\n```"
  trans: '

    ## JSTL 核心标签


    如果你曾经使用 JSP 进行开发，那么你很可能会遇到过 JSTL 标签。然而，在 Facelets 中，只有 JSTL 标签的一个有限子集被重新实现了。它们是
    `<c:if>`、`<c:choose><c:when><c:otherwise>`、`<c:forEach>`、`<c:set>` 和 `<c:catch>`。本质上，XML
    命名空间和标签名称与 JSP 中的相同，但它们是为 Facelets 完全重写的。


    这组标签的正式名称是“JSTL 核心 Facelets 标签库”，而不是“JSTL 核心 JSP 标签库”，并且其文档也与 JSP 分开记录。⁸ 这些 JSTL
    标签可在 [`xmlns.jcp.org/jsp/jstl/core`](http://xmlns.jcp.org/jsp/jstl/core) XML 命名空间
    URI 下找到，该 URI 应分配给 "c" XML 命名空间前缀。


    ```

    xmlns:c="http://xmlns.jcp.org/jsp/jstl/core"

    ```


    是的，令人惊讶的是，URI 中包含了 "/jsp" 路径。从历史上看，JSF 2.0 中 Facelets 的前身也实现了这些 JSTL 标签，但它没有使用较新的
    JSTL 1.1 规范中的命名空间 URI。相反，它使用了 JSTL 1.0 规范中的命名空间 URI：[`java.sun.com/jstl/core`](http://java.sun.com/jstl/core)。然而，这在
    JSF 2.0 的 Facelets 中得到了“纠正”。依我拙见，这非常令人困惑，因为 JSTL 1.1 XML 命名空间 URI 暗示这些实际上是 JSP
    标签，而不是 Facelets 标签。但事实就是如此。


    JSTL 命名空间 URI 最初变更的技术原因是 EL 从 JSTL 迁移到了 JSP。EL 在 JSTL 1.0 中引入，并且仅在 JSTL 标签内工作，因此在
    JSTL 标签之外无法使用。JSP 2.0 也希望利用 EL 的潜力，因此将其从 JSTL 迁移到了 JSP。因此，JSTL 1.1 发布时不再包含 EL，并且不再向后兼容
    JSTL 1.0——因此命名空间 URI 发生了变更以区分这一点。


    JSTL 标签的生命周期与 JSF 的标准 HTML 组件不同。JSTL 标签在视图构建期间直接运行，而 JSF 则忙于根据视图定义构建组件树。JSTL 标签不会出现在
    JSF 组件树中。换句话说，你可以使用 JSTL 标签来控制 JSF 组件树的构建流程。


    请注意，使用 JSTL 控制组件树构建并不像在 JSP 上使用 JSF 而不是 Facelets 那样容易实现。也就是说，用于 JSP 的 JSTL 标签只能识别
    JSP 特定的 `${}` 表达式，而不能识别 JSF 特定的 `#{}` 表达式。这意味着，如果 JSF 管理的 Bean 在那一刻尚未被 JSF 创建，那么
    JSP 中的 JSTL 标签就无法识别它们，并且 JSF 组件也无法访问 `<c:forEach>` 的 `var` 属性。在 Facelets 中，JSTL
    标签因此被改造，使其支持 `#{}` 表达式。这使得它们非常强大。


    在使用 JSTL 标签开发 JSF 页面时，你需要牢记的最重要的一点是，它们在视图构建期间运行，并且不参与 JSF 生命周期。下面我演示了 JSTL 标签与其
    JSF/Facelets 对应物之间最重要的区别。


    ```

    <c:forEach> 与 <ui:repeat>

    ```


    以下是一个 `<c:forEach>` 示例，它遍历一个 `List<Item>`，其中包含三个示例 Item 实体实例，这些实例具有 id 和 value
    属性：


    ```

    <c:forEach items="#{bean.items}" var="item">

        <h:outputText id="item_#{item.id}" value="#{item.value}" />

    </c:forEach>

    ```


    在视图构建期间，这会在组件树中创建三个独立的 `<h:outputText>` 组件，大致表示如下：


    ```

    <h:outputText id="item_1" value="#{bean.items[0].value}" />

    <h:outputText id="item_2" value="#{bean.items[1].value}" />

    <h:outputText id="item_3" value="#{bean.items[2].value}" />

    ```


    反过来，它们在视图渲染期间各自生成其 HTML 输出，如下所示：


    ```

    <span id="item_1">one</span>

    <span id="item_2">two</span>

    <span id="item_3">three</span>

    ```


    请注意，JSF 组件的 `id` 属性也是在视图构建期间评估的，因此你需要手动确保生成的组件 ID 的唯一性。否则，JSF 将抛出一个 `IllegalStateException`，其消息类似于：“在视图中发现重复的组件
    ID。” 另一个也在视图构建期间评估的 JSF 组件属性是 `binding` 属性。如果你绝对需要将 JSTL 生成的组件绑定到支持 Bean 属性（这种情况很少见），那么你应该指定一个唯一的数组索引、集合索引或映射键。以下是一个示例，前提是
    `#{bean.components}` 引用了一个已准备好的 `UIComponent[]`、`List<UIComponent>` 或 `Map<Long,
    UIComponent>` 属性。


    ```

    <c:forEach items="#{bean.items}" var="item">

        <h:outputText binding="#{bean.components[item.id]}"

            id="item_#{item.id}" value="#{item.value}" />

    </c:forEach>

    ```


    `<c:forEach>` 在 Facelets 中的对应物是 `<ui:repeat>`。这本质上是一个 UIComponent，它本身不生成任何 HTML
    输出。换句话说，`<ui:repeat>` 本身在视图构建期间也会出现在 JSF 组件树中，并且仅在视图渲染期间运行。它基本上在每次迭代轮次中，针对当前迭代的项（作为
    `var` 属性）重新渲染其子组件。


    ```

    <ui:repeat id="items" value="#{bean.items}" var="item">

        <h:outputText id="item" value="#{item.value}" />

    </ui:repeat>

    ```


    在视图构建期间，上述内容在 JSF 组件树中完全按原样存在：一个单独的 UIRepeat 实例，其中嵌套了一个 HtmlOutputText 实例，而 `<c:forEach>`
    在这里创建了三个 HtmlOutputText 实例。然后，在视图渲染期间，同一个 `<h:outputText>` 组件被重复使用，以基于当前迭代轮次生成其
    HTML 输出。


    ```

    <span id="items:0:item">one</span>

    <span id="items:1:item">two</span>

    <span id="items:2:item">three</span>

    ```


    请注意，作为 NamingContainer 组件的 `<ui:repeat>` 已经基于迭代索引确保了客户端 ID 的唯一性。从技术上讲，也不可能在其任何子组件的
    `id` 属性中引用其 `var` 属性，因为 `var` 属性仅在视图渲染期间设置，而 `id` 属性已在视图构建期间设置。


    ```

    <c:if>/<c:choose> 与 rendered

    ```


    假设我们有一个自定义标签文件，可以按如下方式使用：


    ```

    <t:input type="email" id="email" label="Email" value="#{bean.email}" />

    ```


    并且 `input.xhtml` 标签文件包含以下 Facelets 标记，使用 `<c:choose>` 有条件地添加不同的标签（你也可以使用 `<c:if>`
    来实现）：


    ```

    <c:choose>

        <c:when test="#{type eq ''password''}">

            <h:inputSecret id="#{id}" label="#{label}" value="#{value}" />

        </c:when>

        <c:when test="#{type eq ''textarea''}">

             <h:inputTextarea id="#{id}" label="#{label}" value="#{value}" />

        </c:when>

        <c:otherwise>

             <h:inputText id="#{id}" label="#{label}" value="#{value}"

                 a:type="#{type}">

             </h:inputText>

        </c:otherwise>

    </c:choose>

    ```


    请注意，更详细的示例可以在第 7 章的“标签文件”部分找到。这个构造将只在组件树中创建 `<h:inputText>` 组件，大致表示如下：


    ```

    <h:inputText id="email" label="Email" value="#{bean.email}"

        a:type="email">

    </h:inputText>

    ```


    而如果使用 `rendered` 属性代替 `<c:choose>`，如下所示：


    ```

    <h:inputSecret id="#{id}_password" rendered="#{type eq ''password''}"

        label="#{label}" value="#{value}">

    </h:inputSecret>

    <h:inputTextarea id="#{id}_textarea" rendered="#{type eq ''textarea''}"

        label="#{label}" value="#{value}">

    </h:inputTextarea>

    <h:inputText id="#{id}_text"

        rendered="#{type ne ''password'' and type ne ''textarea''}"

        label="#{label}" value="#{value}">

    </h:inputText>

    ```

    '
- fmt: "Then they will all end up in the component tree roughly as follows:\n\n```\n\
    <h:inputSecret id=\"email_password\" rendered=\"#{type eq 'password'}\"\n    label=\"\
    Email\" value=\"#{bean.email}\">\n</h:inputSecret>\n<h:inputTextarea id=\"email_textarea\"\
    \ rendered=\"#{type eq 'textarea'}\"\n    label=\"Email\" value=\"#{bean.email}\"\
    >\n</h:inputTextarea>\n<h:inputText id=\"email_text\"\n    rendered=\"#{type ne\
    \ 'password' and type ne 'textarea'}\"\n    label=\"Email\" value=\"#{bean.email}\"\
    >\n</h:inputText>\n```\n\nYou see, this will thus end up in an unnecessarily bloated\
    \ component tree with a lot of unused components when you have many of them, particularly\
    \ when the `type` attribute is actually static (i.e., it does not ever change,\
    \ at least during the view scope). Also note that the `id` attribute of each component\
    \ has a static suffix so that you don’t end up with “Duplicate component ID found\
    \ in view” exceptions.\n\n```\n<c:set> versus <ui:param> \n```\n\nThey are not\
    \ interchangeable. The `<c:set>` sets a variable in the EL scope, which is accessible\
    \ only after the tag location during the view build time, but anywhere else in\
    \ the view during the view render time. The `<ui:param>` should only be nested\
    \ in `<ui:include>`, `<ui:decorate template>`, or `<ui:composition template>`\
    \ and sets a variable in the EL scope of the Facelets template, which is accessible\
    \ only in the template itself. Older JSF versions had bugs whereby the `<ui:param>`\
    \ variable was also available outside the Facelets template in question. This\
    \ should never be relied upon.\n\nThe `<c:set>` without a `scope` attribute will\
    \ behave like an alias. It does not cache the result of the EL expression in any\
    \ scope. Its primary purpose is to be able to have a shortcut to a relatively\
    \ long EL expression which is repeated several times in the same Facelets file.\
    \ It can thus be used perfectly well inside, for example, iterating JSF components.\n\
    \n```\n<ui:repeat value=\"#{bean.products}\" var=\"product\">\n    <c:set var=\"\
    price\" value=\"#{product.price}\" />\n    #{price}\n</ui:repeat>\n```\n\nIt's\
    \ only not suitable, for example, for calculating the sum in a loop. The following\
    \ construct will never work:\n\n```\n<c:set var=\"total\" value=\"#{0}\" />\n\
    <ui:repeat value=\"#{bean.products}\" var=\"product\">\n    <c:set var=\"total\"\
    \ value=\"#{total = total + product.price}\" />\n    #{product.price}\n</ui:repeat>\n\
    Total price: #{total}\n```\n\nFor that, use EL 3.0 stream API instead.\n\n```\n\
    <ui:repeat value=\"#{bean.products}\" var=\"product\">\n    #{product.price}\n\
    </ui:repeat>\nTotal price: #{bean.products.stream().map(product->product.price).sum()}\n\
    ```\n\nHowever, when you set the `scope` attribute with one of allowable values\
    \ `request`, `view`, `session`, or `application`, then it will be evaluated immediately\
    \ during the view build time and stored in the specified scope.\n\n```\n<c:set\
    \ var=\"DEV\"\n    value=\"#{facesContext.application.projectStage eq 'Development'}\"\
    \n    scope=\"application\" />\n```\n\nThis will be evaluated only once during\
    \ the first time this view is being built and available as an EL variable `#{DEV}`\
    \ throughout the entire application. You’d best declare such `<c:set>` in the\
    \ master template file which is used by every single Facelets file in the entire\
    \ application. Note that the EL variable is capitalized to conform to Java naming\
    \ conventions for constants.\n\n## CAVEATS\n\nUsing JSTL tags will only lead to\
    \ unexpected results when a JSTL tag attribute references an EL variable which\
    \ is not available during view build time. Examples of such EL variables are those\
    \ defined by `var` attribute of iterating components such as `<h:dataTable>` and\
    \ `<ui:repeat>`, and those set in model by `<f:viewParam>`, `<f:viewAction>`,\
    \ and `<f:event type=\"preRenderView\">`.\n\nIn a nutshell, use JSTL tags only\
    \ to control flow of JSF component tree building and use JSF UI components only\
    \ to control flow of HTML output generation. In JSTL tags, do not rely on EL variables\
    \ which are not available during view build time.\n\n## Manipulating the Component\
    \ Tree\n\nThis can be done declaratively using JSTL tags as well as programmatically\
    \ using Java code. The JSTL approach has already been elaborated in the previous\
    \ section. It’s also possible to use Java code instead. As a precaution, this\
    \ generally ends up in very verbose and hard-to-maintain code. Tree-based hierarchies\
    \ in code are best readable and maintainable when using a hierarchical markup\
    \ language such as XML. Facelets itself is already XML based. JSTL is also XML\
    \ based and therefore seamlessly integrates in a Facelets file. JSTL is therefore\
    \ the recommended approach to dynamically manipulate the component tree, rather\
    \ than Java code.\n\nThe Javadoc of `javax.faces.component.UIComponent` [⁹](#A454457_1_En_3_Chapter.xhtml#Fn9)\
    \ specifies when you could safely manipulate the component tree:\n\n> *Dynamically\
    \ modifying the component tree can happen at any time, during and after restoring\
    \ the view, but not during state saving and needs to function properly with respect\
    \ to rendering and state saving.*\n\nIn other words, the earliest moment when\
    \ you can guarantee safely modifying the component tree is during the `PostAddToViewEvent`\
    \ and the latest moment when you can guarantee safely modifying the component\
    \ tree is during the `PreRenderViewEvent`. Any moment in between is thus also\
    \ possible. Before the `PostAddToViewEvent` there’s not necessarily a means of\
    \ a concrete `UIViewRoot` instance. After the `PreRenderViewEvent` there’s a risk\
    \ that the state is already saved and you’d rather not get trapped here. In other\
    \ words, manipulating the component tree during the render response phase (sixth\
    \ phase) is a bad idea.\n\nWhen you intend to manipulate the component tree by\
    \ means of adding new components based on a Java model which is at least view\
    \ scoped, then listen on the `PostAddToViewEvent` of the parent component of interest.\
    \ When you intend to manipulate the component tree based on the fully built component\
    \ tree by means of adding/moving/removing components, then listen on the `PreRenderViewEvent`\
    \ of the `UIViewRoot`.\n\nThe following example programmatically populates a dynamic\
    \ form based on a Java model during the `PostAddToViewEvent`:\n\n```\n<h:form\
    \ id=\"dynamicFormId\">\n    <f:event type=\"postAddToView\" listener=\"#{dynamicForm.populate}\"\
    \ />\n</h:form>\n```\n\nwherein the `#{dynamicForm}` looks something like the\
    \ following:\n\n```\n@Named @RequestScoped\npublic class DynamicForm {\n\nprivate\
    \ transient UIForm form;\n    private Map<String, Object> values = new HashMap<>();\n\
    \n@Inject\n    private FieldService fieldService;\n\npublic void populate(ComponentSystemEvent\
    \ event) {\n        form = (UIForm) event.getComponent();\n        List<Field>\
    \ fields = fieldService.list(form.getId());\n        fields.forEach(field -> field.populate(this));\n\
    \    }\n\npublic void createOutputLabel(Field field) {\n        HtmlOutputLabel\
    \ label = new HtmlOutputLabel();\n        label.setId(field.getName() + \"_l\"\
    );\n        label.setFor(field.getName());\n        label.setValue(field.getLabel());\n\
    \        form.getChildren().add(label);\n    }\n\npublic void createInputText(Field\
    \ field) {\n        HtmlInputText text = new HtmlInputText();\n        text.setId(field.getName());\
    \ // Explicit ID is required!\n        text.setLabel(field.getLabel());\n    \
    \    text.setValueExpression(\"value\", createValueExpression(field));\n     \
    \   form.getChildren().add(text);\n    }\n\npublic void createMessage(Field field)\
    \ {\n        HtmlMessage message = new HtmlMessage();\n        message.setId(field.getName()\
    \ + \"_m\");\n        message.setFor(field.getName());\n        form.getChildren().add(message);\n\
    \    }\n\npublic static ValueExpression createValueExpression(Field field) {\n\
    \        String el = \"#{dynamicForm.values['\" + field.getName() + \"']}\"\n\
    \        FacesContext context = FacesContext.getCurrentInstance();\n        ELContext\
    \ elContext = context.getELContext();\n        return context.getApplication().getExpressionFactory()\n\
    \            .createValueExpression(elContext, el, Object.class);\n    }\n```"
