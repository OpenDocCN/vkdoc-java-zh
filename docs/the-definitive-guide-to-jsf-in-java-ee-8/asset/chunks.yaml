  trans: '

    ### @FlowScoped


    流作用域托管 Bean 与 JSF 流的生命周期绑定。它遵循与会话作用域相同的原则，只是将会话进一步限定在隔离子文件夹中的一组特定 JSF 视图内。当最终用户点击导航到
    JSF 流特定入口页面的 JSF 链接或按钮组件时，流作用域将自动启动。如果未通过 JSF 组件导航而直接打开入口页面，则无法启动流作用域。也就是说，JSF
    将借助 ViewHandler 自动将预定义的 HTTP 请求参数 “jfwid”（“javax.faces Window ID”）附加到结果 URL 上，该参数的值代表
    JSF 客户端窗口 ID。而 JSF 客户端窗口 ID 又引用了当前 HTTP 会话中存储流作用域托管 Bean 的隔离映射。


    此外，特别是当使用 UIOutcomeTarget 组件而非 UICommand 组件进行导航时，查询字符串可能附带 “jffi”（javax.faces
    Flow ID）和 “jftfdi”（javax.faces To Flow Document ID）请求参数。实际上，这些参数仅在使用 GET 请求启动
    JSF 流时是必需的。从技术上讲，对于 JSF 流的其余部分，“jfwid” 参数就足够了。只要 “jfwid” 参数存在且仍然有效，JSF 流就是幂等的，并且可以通过
    GET 请求恢复。当您打开新的浏览器标签页并导航进入 JSF 流时，实际上会启动一个新的流作用域，该作用域独立于其他标签页中的 JSF 流。一旦 JSF 流内的回发请求导航到
    JSF 流外部的页面，流作用域将自动结束。当最终用户稍后重复使用 “jfwid” 请求参数，或将其值篡改为其自身浏览器会话中未启动的值，或直接进入流，或当底层
    HttpSession 实例被销毁时，CDI 将抛出 javax.enterprise.context.ContextNotActiveException。


    因此，流作用域与会话作用域的主要区别在于，JSF 流内的页面无法直接进入。当最终用户导航到 JSF 流的入口页面时，它们会自动启动；当回发导航到 JSF 流外部时，它们会自动结束。流作用域托管
    Bean 对于将会话隔离到一组特定的 JSF 页面非常有用。一个经典的现实世界示例是预订应用程序，它分布在物理上不同的多个表单页面中。


    有多种定义 JSF 流的方式。一种方式是通过约定，另一种方式是通过在 /[flowId]/[flowId]-flow.xml 文件中进行声明式配置，还有一种方式是通过使用
    javax.faces.flow.FlowBuilder API 进行编程式配置。⁷ 在本书中，我们将仅限于约定优于配置的方式。首先，创建以下文件夹结构：


    ![A454457_1_En_8_Figa_HTML.jpg](img/A454457_1_En_8_Figa_HTML.jpg)


    第一个约定是，流入口页面的名称必须与其所在的子文件夹名称完全相同。在本例中，即 “booking”。这被视为流 ID。第二个约定是，子文件夹中必须存在一个
    *-flow.xml 文件，其名称以流 ID 为前缀，即 booking-flow.xml。此 XML 配置文件目前可以保持为空。它仅在您想要精细调整 JSF
    流配置时才有用，例如，通过指定不同的入口页面。没有此文件，JSF 流作用域将不会被激活。然而，在 Web 应用程序中至少激活一个 JSF 流的一个缺点是，JSF
    客户端窗口 ID 参数 “jfwid” 将被附加到每一个导航 URL 上，即使它不指向 JSF 流。这种 URL 污染可能是一些开发者完全不使用 JSF 流作用域的主要原因。


    用于进入 JSF 流的导航组件必须放置在流子文件夹外部的 JSF 页面中。导航结果必须引用子文件夹名称，即流 ID。以下是 /home.xhtml 中的一个示例。


    ```

    <h:button value="开始预订" outcome="booking" />

    ```


    当然，这可以用 <h:link> 替代。建议仅为此使用 GET，以便预订页面的 URL 能够反映在浏览器的地址栏中。然后，在子文件夹内的所有页面中，您可以引用一个流作用域托管
    Bean，该 Bean 将在所有这些页面之间共享。您还可以在这些页面之间来回导航，同时保留流作用域托管 Bean 的实例。我们建议您为此使用带有重定向的 Ajax。Ajax
    提交将改善用户体验。重定向将确保各个页面仍然可以被添加书签。


    /booking/booking.xhtml：


    ```

    <h:form>

        <h:inputText value="#{booking.startDate}" />

        ...

        <h:commandButton value="下一步" action="persons?faces-redirect=true">

           <f:ajax execute="@form" render="@form" />

        </h:commandButton>

    </h:form>

    ```


    /booking/persons.xhtml：


    ```

    <h:form>

        <ui:repeat value="#{booking.persons}" var="person">

            <h:inputText value="#{person.name}" />

            ...

        </ui:repeat>

        ...

        <h:commandButton value="返回" action="booking?faces-redirect=true">

           <f:ajax execute="@form" render="@form" />

        </h:commandButton>

        <h:commandButton value="下一步" action="confirm?faces-redirect=true">

           <f:ajax execute="@form" render="@form" />

        </h:commandButton>

    </h:form>

    ```


    /booking/confirm.xhtml：


    ```

    <h:form>

        <h:outputText value="#{booking.startDate}" />

        ...

        <h:commandButton value="返回" action="persons?faces-redirect=true">

           <f:ajax execute="@form" render="@form" />

        </h:commandButton>

        <h:commandButton value="下一步" action="payment?faces-redirect=true">

           <f:ajax execute="@form" render="@form" />

        </h:commandButton>

    </h:form>

    ```


    /booking/payment.xhtml：


    ```

    <h:form>

        <h:selectOneMenu value="#{booking.paymentMethod}">

            ...

        </h:selectOneMenu

        ...

        <h:commandButton value="返回" action="confirm?faces-redirect=true">

           <f:ajax execute="@form" render="@form" />

        </h:commandButton>

        <h:commandButton value="提交" actionListener="#{booking.submit()}"

           action="/home?faces-redirect=true">

           <f:ajax execute="@form" render="@form" />

        </h:commandButton>

    </h:form>

    ```


    最后，是 #{booking} 背后的流作用域 Bean：


    ```

    @Named @FlowScoped("booking")

    public class Booking implements Serializable {


    private LocalDate startDate;

        private List<Person> persons;

        private PaymentMethod paymentMethod;

        // ...


    public void submit() {

            // ...

        }

    }

    ```


    您可以看到，大部分导航任务是由命令组件的 action 属性完成的。?faces-redirect=true 是一个特殊的请求参数，JSF 内部将其识别为在回发后执行重定向的指令，当然，在执行实际重定向之前会从目标
    URL 中剥离该参数。一旦回发离开该流，流作用域托管 Bean 就会被销毁，并且之前呈现的页面 URL 将不再可重用。

