    `handleAjaxException()` 方法首先会检查是否存在 faces 上下文、响应是否尚未提交、请求是否为 Ajax 请求，以及队列中是否有未处理的异常事件。如果这些条件均不满足，该方法将直接返回，让
    JSF 像往常一样继续执行。


    当响应或其部分内容已实际发送到客户端时，HTTP 响应即被视为已提交。这是一个不可逆的节点。你无法收回已发送的字节。这种情况可能发生在渲染响应阶段中途发生异常时。HTTP
    响应的前半部分可能已经发送给了客户端。此外，JSF 和服务器的默认异常处理器也无法处理这种情况。最终，客户端会收到一个不完整的 HTML 页面。为避免这种情况，你能做的最好是确保不在支持
    bean 的 getter 方法中执行业务逻辑（这本身始终是一个坏主意），并确保支持 bean 尽早被初始化。这可以通过在 `<f:viewAction>`
    中执行对异常敏感的业务逻辑来实现，而不是使用 `@PostConstruct`。另一种选择是增大 HTTP 响应缓冲区大小，使其与对异常最敏感的页面所生成的
    HTML 响应大小相匹配。假设该大小为 100 kB，则可以使用以下 `web.xml` 上下文参数。


    ```

    <context-param>

        <param-name>javax.faces.FACELETS_BUFFER_SIZE</param-name>

        <param-value>102400</param-value> <!-- 100 kB. -->

    </context-param>

    ```


    `handleAjaxException()` 的下一步是从未处理异常事件队列中提取我们关心的根本原因。在 JSF 生命周期处理过程中发生的任何异常都将被包装在
    `javax.faces.FacesException` 中。在 EL 表达式求值期间发生的任何异常都将被包装在 `javax.el.ELException`
    中。这些都不是我们关心的。


    接下来，将设置 `#{requestScope[''javax.servlet.error.request_uri'']}` 和 `#{requestScope[''javax.servlet.error.exception'']}`
    变量，以便错误页面可以访问它们。同时，将借助 `ViewHandler` 创建代表错误页面的 `UIViewRoot` 实例，并将其设置在 JSF 上下文中。如有必要，你可以根据异常的实际根本原因有条件地准备错误页面的视图
    ID。例如：


    ```

    String viewId;


    if (exception instanceof ViewExpiredException) {

        viewId = "/WEB-INF/errorpages/expired.xhtml";

    }

    else {

        viewId = "/WEB-INF/errorpages/500.xhtml";

    }

    ```


    回到 `handleAjaxException()`，在 try 块中，将清除 HTTP 响应缓冲区，用组件填充 `UIViewRoot`，指示 Ajax
    上下文渲染整个视图，渲染 `UIViewRoot`，指示 JSF 上下文响应已手动处理完毕，因此它不会执行任何导航，最后从请求作用域中移除该异常。在 finally
    块中移除异常并非强制要求，但存在一些 Servlet 容器（如 Tomcat）会将其视为触发向响应写入内部错误页面的信号。


    最后，将清空未处理异常事件的队列。这也不是强制性的，但这样做是为了与 `web.xml` 中配置的错误页面的默认行为保持一致，并防止链中的下一个 `ExceptionHandler`
    处理任何剩余的异常事件。


    为了使其运行起来，你实际上还需要创建一个工厂。与 JSF 中许多其他应用程序范围的定制一样，自定义异常处理器只能通过工厂注册。这看起来可能有些冗长，但这正是设计的一部分。在这种特定情况下，它允许你根据某些全局配置设置返回不同的异常处理器实现。你可以在前面展示的
    `AjaxExceptionHandler` 类的底部找到作为嵌套类的工厂。它继承自 `javax.faces.context.ExceptionHandlerFactory`
    ³，并可以在 `faces-config.xml` 中按如下方式注册：


    ```

    <factory>

        <exception-handler-factory>

            com.example.project.exceptionhandler.AjaxExceptionHandler$Factory

        </exception-handler-factory>

    </factory>

    ```


    顺便提一下，必须说明的是，这种异常处理器也适用于非 Ajax 请求。你只需移除 `PartialViewContext#isAjaxRequest()` 检查。你只需要记住，根据是否是
    Ajax 请求，手动将 HTTP 响应状态码设置为 500。在 `ExternalContext#responseReset()` 这行代码之后执行此操作。


    ```

    if (!context.getPartialViewContext().isAjaxRequest()) {

        external.setResponseStatus

            (HttpServletResponse.SC_INTERNAL_SERVER_ERROR);

    }

    ```


    如果你在 Ajax 请求上执行此操作，JSF Ajax 脚本将不会按预期处理 Ajax 响应。它不会显示错误页面，而是会触发 `onerror` 处理器。

