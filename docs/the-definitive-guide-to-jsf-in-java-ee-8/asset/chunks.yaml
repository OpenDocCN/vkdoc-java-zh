    \n[12](#A454457_1_En_11_Chapter.xhtml#Fn12_source) [https://javaee.github.io/javaee-spec/javadocs/javax/faces/application/ResourceDependency.html](https://javaee.github.io/javaee-spec/javadocs/javax/faces/application/ResourceDependency.html)\n\
    \n© Bauke Scholtz, Arjan Tijms 2018\n\nBauke Scholtz and Arjan Tijms, The Definitive\
    \ Guide to JSF in Java EE 8, [https://doi.org/10.1007/978-1-4842-3387-0_12](#A454457_1_En_12_Chapter.xhtml)\n\
    \n# 12. Search Expressions\n\nBauke Scholtz^(1) and Arjan Tijms²\n\n(1) Willemstad,\
    \ Curaçao\n\n(2) Amsterdam, Noord-Holland, The Netherlands\n\nAs stated in the\
    \ sections \"Ajax Life Cycle\" in Chapter [3](#A454457_1_En_3_Chapter.xhtml) and\
    \ \"Ajaxifying Components\" in Chapter [4](#A454457_1_En_4_Chapter.xhtml), the\
    \ `execute` and `render` attributes of `<f:ajax>` tag take a space-separated collection\
    \ of so-called component search expressions.\n\nThe search expressions have always\
    \ been part of JSF (JavaServer Faces) since the beginning as this is used in the\
    \ `for` attribute of `<h:outputLabel>`, `<h:message>`, and `<h:messages>`, but\
    \ they have only become essential knowledge for the JSF developer since the introduction\
    \ of `<f:ajax>` in JSF 2.0. Namely, labels and messages are in almost any case\
    \ already within the very same naming container parent as the target input component,\
    \ so simply specifying the ID of the target input component in the `for` attribute\
    \ already suffices, but this is not necessarily true for the `execute` and `render`\
    \ attributes of `<f:ajax>` as the target component may sit in a different naming\
    \ container context or even in a physically different Facelets file.\n\nTo overcome\
    \ these difficulties, JSF 2.0 introduced a few more abstract search expressions:\
    \ `\"@this\"`, `\"@form\"`, `\"@all\"`, and `\"@none\"`. Something like `\"@form\"\
    ` is particularly easy to use, as it just means target whatever the current form\
    \ is. If that current form is defined two parent templates up from the page where\
    \ it's referenced, this really makes referencing it much easier.\n\nAlthough they\
    \ made things much easier, these keywords were quite limited. Not only are there\
    \ just four of them, but they're also not extensible and the default JSF component\
    \ set only uses them internally in the `<f:ajax>` tag. Using them in other components,\
    \ even in JSF's own `<h:outputLabel>`, `<h:message>`, and `<h:messages>`, as well\
    \ as using them programmatically, was left out. Therefore, in JSF 2.3 a \"Component\
    \ Search Expression Framework\" was at the last moment introduced that greatly\
    \ expands upon those four keywords. It was largely based on a proven API (application\
    \ programming interface) of PrimeFaces.[¹](#A454457_1_En_12_Chapter.xhtml#Fn1)\n\
    \n## Relative Local IDs\n\nThis is the simplest form of a component search expression.\
    \ The most common use cases are found in the `for` attribute of `<h:outputLabel>`,\
    \ `<h:message>`, and `<h:messages>` components. It simply references the sole\
    \ ID of the target `UIInput` component.\n\n```\n<h:outputLabel for=\"email\" value=\"\
    Email address\" />\n<h:inputText id=\"email\" value=\"#{login.email}\" required=\"\
    true\" />\n<h:message for=\"email\" />\n```\n\nThis only prerequires that the\
    \ target component is also sitting within the very same naming container parent.\
    \ A naming container parent is a component that implements the `NamingContainer`\
    \ interface.[²](#A454457_1_En_12_Chapter.xhtml#Fn2) In standard JSF, only `<h:form>`,\
    \ `<h:dataTable>`, `<ui:repeat>`, and `<f:subview>` are an instance of `NamingContainer`.\
    \ All composite components are also an instance of `NamingContainer`, but tag\
    \ files are not.\n\nIn case you need to reference a specific `UIInput` component\
    \ within a naming container from `<h:outputLabel>` on, then you need to append\
    \ the so-called naming container separator character to the ID of the naming container\
    \ component and then the ID of the target `UIInput` component. The default naming\
    \ container separator character is a colon `\":\"`. The currently configured separator\
    \ character is programmatically available by `UINamingContainer#getSeparatorCharacter()`.[³](#A454457_1_En_12_Chapter.xhtml#Fn3)\n\
    \n```\nchar separatorCharacter = UINamingContainer\n    .getSeparatorCharacter(FacesContext.getCurrentInstance);\n\
    ```\n\nThis is configurable via the `javax.faces.SEPARATOR_CHAR` context parameter\
    \ in `web.xml`.\n\n```\n<context-param>\n    <param-name>javax.faces.SEPARATOR_CHAR</param-name>\n\
    \    <param-value>-</param-value>\n</context-param>\n```"
