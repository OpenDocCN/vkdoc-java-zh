    ## Custom Tag Handlers


    In Chapter [3](#A454457_1_En_3_Chapter.xhtml), you learned about the difference
    between the view build time and the view render time, and that tag handlers such
    as JSTL run while building the JSF component tree while JSF components run while
    processing the HTTP request and response through the JSF life cycle. Not only
    can JSF components be customized but also tag handlers. This is particularly useful
    when you want to control the building of the JSF component tree instead of processing
    the HTTP request and response.


    <f:viewParam> is useful on master-detail pages. From the master page, you can
    link to the detail page with the entity ID as the parameter. In the detail page,
    you can load the entity by ID via <f:viewParam>. It goes as follows:


    ```

    <f:metadata>

        <f:viewParam name="id" value="#{editItem.item}"

            converter="project.ItemConverter" converterMessage="Unknown item"

            required="true" requiredMessage="Bad request">

        </f:viewParam>

    </f:metadata>

    ```


    When conversion or validation fails, a faces message will be added to the faces
    context of the current page. However, more often you’d just like to directly redirect
    the user back to the master page. This is relatively trivial to implement with
    <f:event> on PostValidateEvent. No, <f:viewAction> won’t work as that wouldn’t
    be invoked in first place when there’s a conversion or validation error .


    ```

    <f:metadata>

        ...

        <f:event type="postValidate" listener="#{editItem.onload()}" />

    </f:metadata>

    ```


    Wherein the onload() method looks as follows:


    ```

    public void onload() throws IOException {

        FacesContext context = FacesContext.getCurrentInstance();

        if (context.isValidationFailed()) {

            ExternalContext ec = context.getExternalContext();

            ec.redirect(ec.getRequestContextPath() + "/items.xhtml");

        }

    }

    ```


    Okay, that works, but this will end up in boilerplate code when you have more
    of such pages. Ideally, you’d like to be able to declaratively register an event
    listener on <f:viewParam> itself in a self-documenting way like below so that
    you can keep the backing bean code free of manual request-response processing
    clutter.


    ```

    <f:metadata>

        <f:viewParam ...>

            <t:viewParamValidationFailed redirect="/items.xhtml" />

        </f:viewParam>

    </f:metadata>

    ```


    This can be achieved with a tag handler which basically registers a new system
    event listener on the UIViewParameter component represented by the <f:viewParam>
    tag. The tag handler class must extend from javax.faces.view.facelets.TagHandler.


    ```

    public class ViewParamValidationFailed extends TagHandler

        implements ComponentSystemEventListener

    {

        private String redirect;


    public ViewParamValidationFailed(TagConfig config) {

            super(config);

            redirect = getRequiredAttribute("redirect").getValue();

        }


    @Override

        public void apply(FaceletContext context, UIComponent parent)

            throws IOException

        {

            if (parent instanceof UIViewParameter

                && !context.getFacesContext().isPostback())

            {

                parent.subscribeToEvent(PostValidateEvent.class, this);

            }

        }


    @Override

        public void processEvent(ComponentSystemEvent event)

            throws AbortProcessingException

        {

            UIComponent parent = event.getComponent();

            parent.unsubscribeFromEvent(PostValidateEvent.class, this);

            FacesContext context = event.getFacesContext();


    if (context.isValidationFailed()) {

                try {

                    ExternalContext ec = context.getExternalContext();

                    ec.redirect(ec.getRequestContextPath() + redirect);

                }

                catch (IOException e) {

                    throw new AbortProcessingException(e);

                }

            }

        }

    }

