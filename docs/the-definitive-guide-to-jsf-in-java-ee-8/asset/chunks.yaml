    2\">\n    <ui:instructions>one</ui:instructions>\n    <h:outputText value=\"two\"\
    \ />\n    <ui:instructions>                                                  \
    \                                      \n        three\n        four\n    </ui:instructions>\n\
        <h:panelGroup>five</h:panelGroup>\n    <ui:instructions>\n        six\n        seven\n\
