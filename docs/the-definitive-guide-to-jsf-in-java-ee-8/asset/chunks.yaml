    ### @SessionScoped


    会话作用域的管理 Bean 实例与已建立的 HTTP 会话的生命周期绑定。它在底层表现为 `HttpSession` 的一个属性，该属性是为每个唯一客户端根据
    Web 应用程序代码的需求而创建的。当 Web 应用程序代码首次通过 `HttpServletRequest#getSession()` 直接或间接访问 `HttpSession`
    时，Servlet 容器会创建一个新的 `HttpSession` 实例，生成一个长且唯一的 ID，并将其存储在服务器内存中。Servlet 容器还会在 HTTP
    响应上设置一个会话 Cookie，其中 `JSESSIONID` 作为 Cookie 名称，唯一的会话 ID 作为 Cookie 值。“会话 Cookie”通过缺少“最大存活时间”属性来识别。


    根据 HTTP Cookie 规范，只要 Cookie 有效，客户端（Web 浏览器）就需要在后续请求的标头中将其发送回来。在任何主流的 Web 浏览器中，你都可以在
    Web 开发者工具集的“网络”部分检查请求和响应标头，该工具集可通过在浏览器中按 F12 键访问。Servlet 容器会检查每个传入的 HTTP 请求，查找名为
    `JSESSIONID` 的 Cookie，并使用其值（会话 ID）从服务器内存中获取关联的 `HttpSession` 实例。


    在服务器端，`HttpSession` 实例会一直保持活动状态，直到其未被访问的时间超过 `web.xml` 中 `<session-timeout>` 设置指定的超时值（在大多数（如果不是全部）Servlet
    容器中，该值默认为 30 分钟）。因此，当客户端访问 Web 应用程序的间隔时间超过指定时间时，Servlet 容器将销毁 `HttpSession` 实例。随后的每个
    HTTP 请求，即使带有指定的 Cookie，也无法再访问该 `HttpSession` 实例；Servlet 容器会创建一个新的 `HttpSession`
    实例，并用新的会话 ID 覆盖 Cookie 值。


    在客户端，默认情况下，所有会话 Cookie 在浏览器实例运行期间保持有效。因此，当客户端关闭浏览器实例时，客户端上的所有会话 Cookie 都会被销毁。在新的浏览器实例中，来自先前浏览器会话的会话
    Cookie 不再可用，因此浏览器不会发送任何 `JSESSIONID` Cookie。服务器随后会将其解释为一个全新的会话。与先前浏览器会话关联的 `HttpSession`
    实例将在服务器端静默过期。


    默认情况下，会话作用域的管理 Bean 实例会在 HTTP 会话生命周期内，当 Web 应用程序代码首次访问它时被创建。因此，它并非在 `HttpSession`
    实例创建时立即创建。然而，可以保证的是，当 `HttpSession` 实例被销毁时，它也会被销毁。会话作用域的管理 Bean 实际上在同一浏览器会话内的所有浏览器标签页之间共享。


    会话作用域的管理 Bean 对于跟踪客户端特定数据非常有用，例如代表当前登录用户的实体、所选语言以及其他与用户相关的偏好设置。以下示例计算当前区域设置，并为其提供
    getter/setter 方法，以便在视图中获取它，并通过 `UIInput` 组件进行修改。


    ```

    @Named @SessionScoped

    public class ActiveLocale implements Serializable {


    private Locale current;


    @PostConstruct

        public void init() {

            FacesContext context = FacesContext.getCurrentInstance();

            current = context.getApplication()

                .getViewHandler().calculateLocale(context);

        }


    // Getter+setter.

    }

    ```


    更详细的示例可以在第 14 章的“更改活动区域设置”部分找到。请注意，会话作用域的管理 Bean 必须实现 `Serializable`，因为存储这些 Bean
    的 `HttpSession` 实例本身可能会在服务器重启时被写入磁盘，甚至在具有可分发会话的服务器集群配置中通过网络传输到另一台服务器。


    另一个经典示例是“购物车”。


    ```

    @Named @SessionScoped

    public class Cart implements Serializable {


    private List<Product> products = new ArrayList<>();


    public void addProduct(Product product) {

            products.add(product);

        }


    // ...

    }

    ```

