- fmt: "# JSTL Core Tags\n\nIf you have ever developed with JSP, then you’ll most\
    \ likely have stumbled upon JSTL tags. In Facelets, however, only a limited subset\
    \ of JSTL tags is reincarnated. They are `<c:if>`, `<c:choose>`, `<c:when>`, `<c:otherwise>`,\
    \ `<c:forEach>`, `<c:set>`, and `<c:catch>`. Essentially, the XML namespace and\
    \ tag names are identical to those from JSP, but they are completely rewritten\
    \ for Facelets.\n\nThis group of tags is formally called “JSTL core Facelets tag\
    \ library” instead of “JSTL core JSP tag library” and is also documented separately\
    \ from JSP. Those JSTL tags are available under the `http://xmlns.jcp.org/jsp/jstl/core`\
    \ XML namespace URI which should be assigned to the `c` XML namespace prefix.\n\
    \n```\nxmlns:c=\"http://xmlns.jcp.org/jsp/jstl/core\"\n```\n\nYes, astonishingly\
    \ with `/jsp` path in the URI. Historically, the predecessor of Facelets in JSF\
    \ 2.0 had those JSTL tags also implemented, but it didn’t use the namespace URI\
    \ as in the more recent JSTL 1.1 specification. Instead, it used the namespace\
    \ URI as in the JSTL 1.0 specification: `http://java.sun.com/jstl/core`. However,\
    \ this was “rectified” for Facelets in JSF 2.0. In my humble opinion, this is\
    \ outright confusing as the JSTL 1.1 XML namespace URI suggests that those are\
    \ actually JSP tags and not Facelets tags. But it is what it is.\n\nThe technical\
    \ reason behind the original change of the JSTL namespace URI is the migration\
    \ of EL from JSTL to JSP. It was introduced in JSTL 1.0 and worked only in JSTL\
    \ tags and thus not outside JSTL tags. JSP 2.0 wanted to make use of the potential\
    \ of EL as well and so it was migrated from JSTL to JSP. JSTL 1.1 thus shipped\
    \ without EL and wasn’t backward-compatible with JSTL 1.0 any more—hence the namespace\
    \ URI change to distinguish this.\n\nJSTL tags have a different life cycle than\
    \ JSF’s standard HTML components. JSTL tags already run directly during the view\
    \ build time while JSF is busy building the component tree based on the view definition.\
    \ JSTL tags don’t end up in the JSF component tree. In other words, you can use\
    \ JSTL tags to control the flow of building of the JSF component tree.\n\nNote\
    \ that using JSTL to control the component tree building isn’t as easily possible\
    \ as using JSF on JSP instead of Facelets. That is, JSTL tags for JSP can only\
    \ recognize JSP-specific `${}` expressions and not JSF-specific `#{}` expressions.\
    \ This means that JSTL tags in JSP can’t recognize JSF managed beans if they aren’t\
    \ yet created by JSF at that moment, and that JSF components can’t access the\
    \ `var` attribute of a `<c:forEach>`. In Facelets, the JSTL tags are thus retrofitted\
    \ so that they support the `#{}` expressions. This makes them very powerful.\n\
    \nWhen developing JSF pages with JSTL tags the most important thing that you need\
    \ to keep in mind is that they run during the view build time and that they don’t\
    \ participate in the JSF life cycle. Below I have demonstrated the most important\
    \ differences between a JSTL tag and its JSF/Facelets counterpart.\n\n## `<c:forEach>`\
    \ versus `<ui:repeat>`\n\nFollowing is a `<c:forEach>` example iterating over\
    \ a `List<Item>` with three instances of an example `Item` entity having `id`\
    \ and `value` properties:\n\n```\n<c:forEach items=\"#{bean.items}\" var=\"item\"\
    >\n    <h:outputText id=\"item_#{item.id}\" value=\"#{item.value}\" />\n</c:forEach>\n\
    ```\n\nDuring the view build time, this creates three separate `<h:outputText>`\
    \ components in the component tree, roughly represented as follows:\n\n```\n<h:outputText\
    \ id=\"item_1\" value=\"#{bean.items[0].value}\" />\n<h:outputText id=\"item_2\"\
    \ value=\"#{bean.items[1].value}\" />\n<h:outputText id=\"item_3\" value=\"#{bean.items[2].value}\"\
    \ />\n```\n\nIn turn, they individually generate their HTML output during view\
    \ render time, as follows:\n\n```\n<span id=\"item_1\">one</span>\n<span id=\"\
    item_2\">two</span>\n<span id=\"item_3\">three</span>\n```\n\nDo note that the\
    \ `id` attribute of a JSF component is also evaluated during the view build time\
    \ and thus you need to manually ensure the uniqueness of the resulting component\
    \ ID. Otherwise JSF will throw an `IllegalStateException` with a message which\
    \ goes like this: “Duplicate component ID found in view.” The only other JSF component\
    \ attribute which is also evaluated during the view build time is the `binding`\
    \ attribute. If you absolutely need to bind a JSTL-generated component to a backing\
    \ bean property, which is rare, then you should be specifying a unique array index,\
    \ collection index, or map key. Following is an example provided that `#{bean.components}`\
    \ refers an already prepared `UIComponent[]`, `List<UIComponent>`, or `Map<Long,\
    \ UIComponent>` property.\n\n```\n<c:forEach items=\"#{bean.items}\" var=\"item\"\
    >\n    <h:outputText binding=\"#{bean.components[item.id]}\"\n        id=\"item_#{item.id}\"\
    \ value=\"#{item.value}\" />\n</c:forEach>\n```\n\nThe Facelets counterpart of\
    \ the `<c:forEach>` is the `<ui:repeat>`. This is in essence a `UIComponent` which\
    \ doesn’t generate any HTML output by itself. In other words, the `<ui:repeat>`\
    \ itself also ends up in the JSF component tree during the view build time, and\
    \ only runs during the view render time. It basically re-renders its children\
    \ during every iteration round against the currently iterated item as `var` attribute.\n\
    \n```\n<ui:repeat id=\"items\" value=\"#{bean.items}\" var=\"item\">\n    <h:outputText\
    \ id=\"item\" value=\"#{item.value}\" />\n</ui:repeat>\n```\n\nDuring the view\
    \ build time the above ends up exactly as is in the JSF component tree: a single\
    \ `UIRepeat` instance with one nested `HtmlOutputText` instance whereas the `<c:forEach>`\
    \ creates here three `HtmlOutputText` instances. Then, during the view render\
    \ time, the very same `<h:outputText>` component is being reused to generate its\
    \ HTML output based on current iteration round.\n\n```\n<span id=\"items:0:item\"\
    >one</span>\n<span id=\"items:1:item\">two</span>\n<span id=\"items:2:item\">three</span>\n\
    ```\n\nDo note that the `<ui:repeat>` as a `NamingContainer` component already\
    \ ensured the uniqueness of the client ID based on the iteration index. It's technically\
    \ also not possible to reference its `var` attribute in the `id` attribute of\
    \ any child component as the `var` attribute is only set during view render time\
    \ while the `id` attribute is already set during view build time.\n\n## `<c:if>`/`<c:choose>`\
    \ versus `rendered`\n\nImagine that we have a custom tag file which can be used\
    \ as follows:\n\n```\n<t:input type=\"email\" id=\"email\" label=\"Email\" value=\"\
    #{bean.email}\" />\n```\n\nAnd the `input.xhtml` tag file contains the following\
    \ Facelets markup conditionally adding different tags using a `<c:choose>` (you\
    \ can also use `<c:if>` for this):\n\n```\n<c:choose>\n    <c:when test=\"#{type\
    \ eq 'password'}\">\n        <h:inputSecret id=\"#{id}\" label=\"#{label}\" value=\"\
    #{value}\" />\n    </c:when>\n    <c:when test=\"#{type eq 'textarea'}\">\n  \
    \       <h:inputTextarea id=\"#{id}\" label=\"#{label}\" value=\"#{value}\" />\n\
    \    </c:when>\n    <c:otherwise>\n         <h:inputText id=\"#{id}\" label=\"\
    #{label}\" value=\"#{value}\"\n             a:type=\"#{type}\">\n         </h:inputText>\n\
    \    </c:otherwise>\n</c:choose>\n```\n\nNote that a more elaborate example can\
    \ be found in the section “Tag Files” in Chapter 7. This construct will then only\
    \ create the `<h:inputText>` component in the component tree, roughly represented\
    \ as follows:\n\n```\n<h:inputText id=\"email\" label=\"Email\" value=\"#{bean.email}\"\
    \n    a:type=\"email\">\n</h:inputText>\n```\n\nand when using the `rendered`\
    \ attribute instead of `<c:choose>` as follows:\n\n```\n<h:inputSecret id=\"#{id}_password\"\
    \ rendered=\"#{type eq 'password'}\"\n    label=\"#{label}\" value=\"#{value}\"\
    >\n</h:inputSecret>\n<h:inputTextarea id=\"#{id}_textarea\" rendered=\"#{type\
    \ eq 'textarea'}\"\n    label=\"#{label}\" value=\"#{value}\">\n</h:inputTextarea>\n\
    <h:inputText id=\"#{id}_text\"\n    rendered=\"#{type ne 'password' and type ne\
    \ 'textarea'}\"\n    label=\"#{label}\" value=\"#{value}\">\n</h:inputText>\n\
    ```"
