- fmt: "`handleAjaxException()`首先会检查是否存在`faces context`、响应是否尚未提交、请求是否为`Ajax`请求，以及队列中是否有未处理的异常事件。如果这些条件都不满足，它将返回并让`JSF`像往常一样继续执行。\n\
    \n当响应或其部分已物理发送到客户端时，`HTTP`响应被视为已提交。这是一个不可逆的点。你无法收回已发送的字节。当异常在渲染响应阶段中途发生时，可能会出现这种情况。`HTTP`响应的前半部分可能已发送到客户端。此外，`JSF`和服务器的默认异常处理器也无法处理它。实际上，客户端会得到一个不完整的`HTML`页面。为避免这种情况，最好的做法是确保不在支持`bean`的`getter`方法中执行业务逻辑（这本身总是一个坏主意），并确保支持`bean`尽早初始化。这可以通过在`<f:viewAction>`中执行对异常敏感的业务逻辑来实现，而不是在`@PostConstruct`中。另一种方法是增加`HTTP`响应缓冲区大小，以匹配对异常最敏感的页面生成的`HTML`响应大小。假设为`100\
    \ kB`，可以使用以下`web.xml`上下文参数。\n\n```\n<context-param>\n    <param-name>javax.faces.FACELETS_BUFFER_SIZE</param-name>\n\
    \    <param-value>102400</param-value> <!-- 100 kB. -->\n</context-param>\n```\n\
    \n`handleAjaxException()`中的下一步是从未处理的异常事件队列中提取感兴趣的根原因。在`JSF`生命周期处理期间发生的任何异常都将包装在`javax.faces.FacesException`中。在`EL`表达式求值期间发生的任何异常都将包装在`javax.el.ELException`中。这些不是我们关心的。\n\
    \n接下来，将设置`#{requestScope['javax.servlet.error.request_uri']}`和`#{requestScope['javax.servlet.error.exception']}`变量，以便错误页面可以访问它们。此外，将借助`ViewHandler`创建代表错误页面的`UIViewRoot`实例，并将其设置在`JSF`上下文中。如有必要，你可以根据异常的实际根原因有条件地准备错误页面的视图ID。例如：\n\
    \n```\nString viewId;\n\nif (exception instanceof ViewExpiredException) {\n  \
    \  viewId = \"/WEB-INF/errorpages/expired.xhtml\";\n}\nelse {\n    viewId = \"\
    /WEB-INF/errorpages/500.xhtml\";\n}\n```\n\n回到`handleAjaxException()`，在`try`块中，将清除`HTTP`响应缓冲区，用组件填充`UIViewRoot`，指示`Ajax`上下文渲染整个视图，渲染`UIViewRoot`，指示`JSF`上下文响应已手动处理，因此它不会执行任何导航，最后从请求作用域中移除异常。在`finally`块中移除异常不是强制性的，但存在一些`servlet`容器（如`Tomcat`）会将其视为触发器，从而向响应写入内部错误页面。\n\
    \n最后，将清空未处理异常事件的队列。这也不是强制性的，但这样做是为了匹配`web.xml`配置的错误页面的默认行为，并防止链中的任何下一个`ExceptionHandler`处理任何剩余的异常事件。\n\
    \n为了使其运行，你实际上还需要创建一个工厂。与`JSF`中的许多其他应用程序范围的自定义一样，自定义异常处理器只能通过工厂注册。这可能看起来冗长，但这只是设计的一部分。在这种特定情况下，它允许你根据某些全局配置设置返回不同的异常处理器实现。你可以在前面显示的`AjaxExceptionHandler`类的底部找到作为嵌套类的工厂。它继承自`javax.faces.context.ExceptionHandlerFactory`[³](#A454457_1_En_9_Chapter.xhtml#Fn3)，并可以在`faces-config.xml`中注册，如下所示：\n\
    \n```\n<factory>\n    <exception-handler-factory>\n        com.example.project.exceptionhandler.AjaxExceptionHandler$Factory\n\
    \    </exception-handler-factory>\n</factory>\n```\n\n顺便说一句，必须说明的是，这样的异常处理器也适用于非`Ajax`请求。你只需移除`PartialViewContext#isAjaxRequest()`检查。你只需要记住根据是否为`Ajax`请求手动将`HTTP`响应状态码设置为`500`。在`ExternalContext#responseReset()`行之后执行此操作。\n\
    \n```\nif (!context.getPartialViewContext().isAjaxRequest()) {\n    external.setResponseStatus\n\
    \        (HttpServletResponse.SC_INTERNAL_SERVER_ERROR);\n}\n```\n\n当你在`Ajax`请求上执行此操作时，`JSF`的`Ajax`脚本将不会按预期处理`Ajax`响应。它不会显示错误页面，而是会触发`onerror`处理器。"
  raw: 'The handleAjaxException() will first check if there is a faces context, if
    the response isn’t yet committed, if the request is an Ajax request, and if there’s
    any unhandled exception event in the queue. If none of those conditions matches,
    it will return and let JSF continue as usual.


    The HTTP response is considered committed when the response or a part thereof
    has physically already been sent to the client. This is a point of no return.
    You can’t take the already sent bytes back. This may happen when the exception
    occurs halfway during the render response phase. The first half of the HTTP response
    may already have been sent to the client. Also the default exception handler of
    JSF and the server can’t deal with it. Effectively, the client gets a half-baked
    HTML page. Best what you could do to avoid this is to make sure that you aren’t
    performing business logic in getter methods of backing beans, which on its own
    is always a bad idea, and that backing beans are initialized as soon as possible.
    That could be achieved by executing exception-sensitive business logic in <f:viewAction>
    instead of @PostConstruct. Another option is to increase the HTTP response buffer
    size to match the size of the generated HTML response of the largest exception-sensitive
    page. Assuming that it’s 100 kB, the following web.xml context parameter can be
    used.


    ```

    <context-param>

        <param-name>javax.faces.FACELETS_BUFFER_SIZE</param-name>

        <param-value>102400</param-value> <!-- 100 kB. -->

    </context-param>

    ```


    The next step in handleAjaxException() is extracting the root cause of interest
    from the unhandled exception events queue. Any exception that occurs during the
    processing of the JSF life cycle will be wrapped in javax.faces.FacesException.
    Any exception that occurs during the evaluation of an EL expression will be wrapped
    in javax.el.ELException. Those are not our interest.


    Next, the #{requestScope[''javax.servlet.error.request_uri'']} and #{requestScope[''javax.servlet.error.exception'']}
    variables will be set so that the error page can access them. Also the UIViewRoot
    instance representing the error page will be created with help of the ViewHandler
    and set in the JSF context. You could, if necessary, conditionally prepare the
    view ID of the error page based on the actual root cause of the exception. For
    example:


    ```

    String viewId;


    if (exception instanceof ViewExpiredException) {

        viewId = "/WEB-INF/errorpages/expired.xhtml";

    }

    else {

        viewId = "/WEB-INF/errorpages/500.xhtml";

    }

    ```


    Coming back to the handleAjaxException(), in the try block, the HTTP response
    buffer will be cleared, the UIViewRoot will be populated with components, the
    Ajax context will be instructed to render the entire view, the UIViewRoot will
    be rendered, the JSF context will be instructed that the response is already manually
    taken care of so that it won’t perform any navigation, and finally the exception
    will be removed from the request scope. The removal of the exception in the finally
    block is not mandatory, but servlet containers exist which consider this a trigger
    to write an internal error page to the response, such as Tomcat.


    Finally, the queue of unhandled exception events will be drained. This is also
    not mandatory but done on purpose so that it matches the default behavior of web.xml-configured
    error pages, and also to prevent any next ExceptionHandler in the chain from handling
    any remaining exception events.


    In order to get it to run, you actually need to create a factory as well. As many
    other application-wide customizations in JSF, custom exception handlers can only
    be registered through a factory. It might look verbose, but that’s just part of
    the design. In this specific case, it allows you to return a different exception
    handler implementation depending on some global configuration setting. You can
    find the Factory as a nested class in the bottom of the previously shown AjaxExceptionHandler
    class. It extends from javax.faces.context.ExceptionHandlerFactory [³](#A454457_1_En_9_Chapter.xhtml#Fn3)
    and can be registered in faces-config.xml as follows:


    ```

    <factory>

        <exception-handler-factory>

            com.example.project.exceptionhandler.AjaxExceptionHandler$Factory

        </exception-handler-factory>

    </factory>

    ```


    By the way, it must be said that such an exception handler is also suitable on
    non-Ajax requests. You just have to remove the PartialViewContext#isAjaxRequest()
    check. You only need to keep in mind to manually set the HTTP response status
    code to 500 depending on whether or not it’s an Ajax request. Do this after the
    ExternalContext#responseReset() line.


    ```

    if (!context.getPartialViewContext().isAjaxRequest()) {

        external.setResponseStatus

            (HttpServletResponse.SC_INTERNAL_SERVER_ERROR);

    }

    ```


    When you do so on an Ajax request , the JSF Ajax script won’t process the Ajax
    response as you’d expect. Instead of displaying the error page, it will trigger
    the onerror handler.'
