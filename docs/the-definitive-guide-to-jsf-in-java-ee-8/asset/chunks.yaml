    # 15. Extensions


    Bauke Scholtz^(1 ) and Arjan Tijms²


    (1)Willemstad, Curaçao


    (2)Amsterdam, Noord-Holland, The Netherlands


    If there is one single element or virtue of JSF (JavaServer Faces) to which we
    can attribute its lasting for so long, it’s probably its ability to be extended
    in a large variety of ways. From the onset JSF made it possibly to have most of
    its core elements replaced, decorated, or augmented.


    This gave rise to a large number of extension libraries and projects. In the very
    early days these were A4J (Ajax4JSF), Tomahawk, RichFaces, the stand-alone Facelets
    project, PrettyFaces, and many, many more. A4J was merged into RichFaces, and
    RichFaces itself was eventually sunset in 2016\. Facelets was incorporated into
    JSF itself, while PrettyFaces became part of the Rewrite framework. These days
    well-known and active extension libraries are PrimeFaces, OmniFaces, and BootsFaces,
    among others. While individual libraries have come and gone, the main constant
    is the extensibility of JSF from its first days until the present.


    It’s sometimes said that all those libraries address defects or omissions in JSF,
    but this is not entirely accurate. In fact, JSF was explicitly designed to make
    such extensions possible and therefore to allow, even stimulate, such extension
    libraries to appear. For instance, a contemporary peer technology of JSF, EJB
    (Enterprise JavaBeans), had few to no extension points and, thus, despite its
    many shortcomings, we never saw much of an ecosystem flourish around it.'
