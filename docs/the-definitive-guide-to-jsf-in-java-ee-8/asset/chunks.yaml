    since JSF 2.0 deprecated JSP (Java Server Pages) view technology and is hence
    also deprecated since JSF 2.0.


    The “Creates/handles” column specifies the thing which the core tag creates or
    handles on the specified target component.


    The “Target component” column specifies the target component superclass or interface
    supported by the core tag. You must interpret the specified class or interface
    to be from the javax.faces.component package. If the target component is optionally
    pluralized as in UIComponent(s), then it means that the core tag can either be
    nested in the target component or wrapped in one or more target components. If
    the target component is explicitly pluralized as in UIComponents, then it means
    that the core tag can only wrap one or more target components and thus not be
    nested.


    As to target component interfaces, the ActionSource interface is implemented by
    UICommand components. The ClientBehaviorHolder interface is implemented by UIForm,
    UIInput, UICommand, UIData, UIOutput, UIPanel, and UIOutcomeTarget components.
    The ValueHolder interface is implemented by UIOutput and UIInput components. The
    EditableValueHolder interface is implemented by UIInput components. Based on Table
    [3-1](#A454457_1_En_3_Chapter.xhtml#Tab1) you should be able to derive the actual
    HTML components from them.


    The “Since” column indicates the first JSF version the core tag was available
    in. At the time this book was written, the following JSF versions were available:
    1.0 (March 2004), 1.1 (May 2004), 1.2 (May 2006), 2.0 (July 2009), 2.1 (November
    2010), 2.2 (March 2013), and 2.3 (March 2017).


    Most of the individual core tags are detailed in separate chapters.


    ## Life Cycle


    JSF has a very well defined life cycle. It is broken down into six phases. Each
    of those phases runs the HTTP request through the component tree, performs operations
    on it, and fires component system events. A brief description was already given
    in the introduction of this chapter, along with a diagram (Figure [3-1](#A454457_1_En_3_Chapter.xhtml#Fig1)).
    The following sections describe each of the phases of the life cycle.


    ### Restore View Phase (First Phase)


    First create the UIViewRoot instance and set its properties such as locale from
    any <f:view> tag. The component tree is at that moment still empty. Only when
    the current request is a postback request, or when the view has a <f:metadata>
    with children, then build the full component tree based on the view definition.
    Basically, a specific UIComponent subclass will be instantiated based on the component
    tag defined in the view and populated with all attributes defined in the view
    and then UIComponent#setParent() will be invoked, passing the actual parent component.


    The UIComponent#setParent() method will first check if there isn’t already an
    existing parent, and if so, it will fire the PreRemoveFromViewEvent on the old
    parent. Then, when the new parent has been set, and thus the current component
    has become part of the component tree, it will fire the PostAddToViewEvent with
    the current component.


    If the current request is a postback request, then it will restore the “view state”
    identified by the javax.faces.ViewState request parameter into the freshly built
    component tree. After that, the PostRestoreStateEvent is explicitly fired for
    each component in the tree, even when the component tree has actually not been
    built or restored. In other words, even when it’s not a postback request, that
    event is fired. You’d better reinterpret that event as “PostRestoreViewPhase”.
    In case, during the PostRestoreStateEvent, you’re actually interested in whether
    it’s a postback request, you should consult the FacesContext#isPostback() as well.


    By the end of the phase, if the full component tree has actually not been built,
    then immediately advance to the render response phase (sixth phase), thereby skipping
    any phase in between.'
