    # 关于作者与技术审校者


    # 关于作者


    ![A454457_1_En_BookFrontmatter_Figb_HTML.jpg](img/A454457_1_En_BookFrontmatter_Figb_HTML.jpg)


    **鲍克·肖尔茨**（Bauke Scholtz）是 Oracle Java 冠军、JSF 2.3 专家组成员，以及 JSF 辅助库 OmniFaces 的主要创建者。在互联网上，他更广为人知的名字是
    BalusC，是 Stack Overflow 上的顶级用户和贡献者之一。鲍克已将多项 OmniFaces 解决方案集成到 JSF 2.3 中。他是一名 Web
    应用专家，曾为或正在为 Mercury1 Limited、MyTutor、Nava Finance、LinkPizza、ZEEF、M4N/Zanox、ITCA、RDC
    等来自金融科技、联盟营销、社交媒体等领域的客户提供咨询服务，拥有 17 年的从业经验。本书为鲍克提供了一个深入解答使用 JSF 时最常见问题，并正确解决最常见难题的机会。


    ![A454457_1_En_BookFrontmatter_Figc_HTML.jpg](img/A454457_1_En_BookFrontmatter_Figc_HTML.jpg)


    **阿尔扬·泰姆斯**（Arjan Tijms）就职于 Payara Services Ltd，是 JSF（JSR 372）和安全 API（JSR 375）专家组成员。他是广受欢迎的
    JSF 库 OmniFaces 的联合创建者（该库曾获 2015 年 Duke 选择奖），并且是一套被多家 Java EE 厂商使用的 Java EE 认证
    SPI（JASPIC）测试套件的主要创建者。阿尔扬拥有荷兰莱顿大学的计算机科学硕士学位。撰写本书主题对他而言是自然而然的选择；他已在博客上撰写了许多相关内容，并希望通过参与本书的编写来进一步拓展这些内容。


    # 关于技术审校者


    ![A454457_1_En_BookFrontmatter_Figd_HTML.jpg](img/A454457_1_En_BookFrontmatter_Figd_HTML.jpg)


    **查德（“肖德”）·达比**（Chád (“Shod”) Darby）是 Java 开发领域的作者、讲师和演讲者。作为 Java 应用与架构领域的公认权威，他曾在全球（美国、英国、印度、俄罗斯和澳大利亚）的软件开发大会上发表技术演讲。在
    15 年的专业软件架构师生涯中，他曾为 Blue Cross/Blue Shield、Merck、Boeing、Red Hat 以及多家初创公司工作。


    查德是多本 Java 书籍的合著者，包括 *Professional Java E-Commerce*（Wrox Press）、*Beginning Java
    Networking*（Wrox Press）以及 *XML and Web Services Unleashed*（Sams Publishing）。他拥有
    Sun Microsystems 和 IBM 的 Java 认证，并持有卡内基梅隆大学的计算机科学学士学位。您可以访问查德的博客 [www.luv2code.com](http://www.luv2code.com)
    观看他免费的 Java 视频教程。您也可以在 Twitter 上关注他：@darbyluvs2code。


    © Bauke Scholtz, Arjan Tijms 2018


    Bauke Scholtz 和 Arjan Tijms，《Java EE 8 中 JSF 的权威指南》，`doi.org/10.1007/978-1-4842-3387-0_1`


    # 1. 历史


    Bauke Scholtz^(1 ) 和 Arjan Tijms²


    (1) 威廉斯塔德，库拉索


    (2) 阿姆斯特丹，北荷兰省，荷兰


    本章描述了 JSF 的历史，从其早期构想开始，一直讲到我们撰写本书时的现状。我们将讨论 JSF API（应用程序编程接口）本身是如何演变的，在此演变过程中发生了哪些重要事件，以及参与其中的一些关键人物。


    这绝非完整的历史描述，读者应注意，实际发生的事件和参与的人员远多于我们在此所能提及的。


    ## 起初……


    JSF 的历史相当悠久。其最初的 JSR，即 JSR 127，始于 2001 年。当时，Struts Web 框架极为流行，尽管它本身发布的时间也不算太久远（大约在
    2000 年）。尽管 Struts 很受欢迎，但在 Java 领域仍有许多其他 Web 框架在使用，并且新的框架不断涌现。JavaServer Faces（JSF）的构想，是试图将标准化的
    MVC（模型-视图-控制器）Web 框架基础引入整个 Java EE 平台。


    在 Web 框架领域，争议屡见不鲜，JSF 也不例外。在其诞生之初就爆发了一场大争议：Apache 反对创建 JSF，理由是 Apache Struts 已经存在，而一个闭源的替代方案价值不大。因此，Apache
    投票反对创建 JSF，并发表了以下评论：


    > *此 JSR 与 Apache 开源项目 Struts 存在冲突。考虑到 Sun 当前不允许 JSR 在开源许可下独立实现的立场，我们认为在一个封闭环境中重新创建一项已在开放环境中可用的技术，价值甚微。*

    >

    > *就本 JSR 当前超越 Struts 的部分而言，我们鼓励提出此 JSR 的 Sun 开发者加入已经在领导 Struts 的 Sun 开发者行列，在
    Apache 创建一个开放的解决方案，这样完成后才能确保能够以开源方式实现。*


    最终，这场冲突得以解决。大约一年后，规范负责人艾米·福勒（Amy Fowler，曾因 Swing 闻名）被替换为克雷格·麦克拉纳汉（Craig McClanahan），他正是
    JSF 据称要与之竞争的 Struts 项目的创始人。开源限制也被解除，名为 MyFaces 的开源 JSF 实现与（当时尚未命名的）参考实现及规范本身并行开发。MyFaces
    最初于 2002 年 12 月在 sourceforge.net 上作为一个采用 LGPL 许可的项目启动，并于 2003 年 1 月发布了符合当时所谓“早期访问规范”的
    0.1 版本。


    开源实现是 Java EE 8 中最常见的实现方式，而在撰写本书时（2018 年），几乎没有任何 EE 规范仍以闭源方式实现。然而在 2001 年，这不仅是罕见的，对于新的
    JSR 来说实际上是不被允许的。因此，允许开源实现是一个相当大的变革，而 JSF 有幸成为首个获此许可的规范。


    尽管允许了开源实现，但规范的实际开发仍然秘密进行，不对外公开。没有公开的邮件列表，也没有供公众提交问题或表达愿望的跟踪系统（例如 JIRA 实例）。偶尔会有一些访谈，在
    2002 年秋季，时任前规范负责人的艾米·福勒确实透露了关于 JSF 的不少细节，但总体而言，该项目对公众来说仍笼罩在神秘之中。


    然而，JSF 背后的团队一直在努力工作。第一封发送到内部 JSR-127 列表的电子邮件是在 2001 年 8 月 17 日。与大多数项目一样，团队最初几个月用于收集需求并研究现有的竞争产品。同时，也选定了一个包名。最初的占位包名是
    "javax.servlet.ui"，最终选择了 "javax.faces" 作为实际使用的包。首先考虑的技术架构是组件模型。对于基于组件的 MVC 框架来说，这显然是最重要的方面之一。在
    2001 年的最后一个月和 2002 年的头两个月，团队研究了现在被称为托管 Bean（当时称为“对象管理器”）的概念。具有作用域、名称和依赖注入功能的托管
    Bean 显然是 JSF 框架的另一个基石。在此期间，事件及其背后的模型也受到了关注。

