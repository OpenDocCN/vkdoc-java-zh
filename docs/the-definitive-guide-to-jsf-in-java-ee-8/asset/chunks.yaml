                        value="#{login.password}" />

                    <h:message for="password" styleClass="message" />


    <h:commandButton id="submit" action="#{login.submit}"

                        value="#{text[''label.login'']}" />

                    <h:message for="login" styleClass="message" />

                </fieldset>

            </h:form>

        </ui:define>

    </ui:composition>

    ```


    Following is what the associated resource bundle entries look like:


    ```

    label.email = Email

    label.password = Password

    label.login = Log In

    ```


    Note: in case you find that the page looks crippled, simply add a CSS file with
    the following rule to start with:


    ```

    nav a, fieldset label, fieldset input {

        display: block;

    }

    ```


    ## Localizing Conversion/Validation Messages


    In case you have prepared a simple backing bean class Login with two string properties
    email and password and a method submit(), and submit the above shown login page
    without filling out the e-mail input field, then you’ll face a validation error
    in the following format:


    ```

    login:email: Validation Error: Value is required.

    ```


    When you switch the language to Portuguese and resubmit the empty form, then you’ll
    see that it’s also localized. However, when you switch the language further to
    Hindi, then you’ll notice that there’s no standard Hindi message bundle in the
    standard JSF implementation. You’d need to provide your own. There are several
    ways to achieve this.


    First, JSF input and select components support three attributes to override the
    default message : requiredMessage, validatorMessage, and converterMessage. The
    following example shows how to override the default required message:


    ```

    <h:inputText ... requiredMessage="#{text[''message.required'']}" />

    ```


    This is arguably the easiest approach. The major caveat is that you have to copy/paste
    it everywhere in case you haven’t wrapped it in a reusable tag file like <my:inputText>.
    This is not DRY.[⁶](#A454457_1_En_14_Chapter.xhtml#Fn6)


    Another way is to supply a custom message bundle which overrides all predefined
    bundle keys specific for JSF conversion/validation messages and register it as
    <message-bundle> in faces-config.xml. You can find the predefined bundle keys
    in chapter 2.5.2.4 “Localized Application Messages” of the JSF specification.[⁷](#A454457_1_En_14_Chapter.xhtml#Fn7)
    The bundle key of the default required message “Validation Error: Value is Required”
    is thus javax.faces.component.UIInput.REQUIRED. We can adjust it in new message
    bundle files as follows:


    ```

    main/java/resources/com/example/project/i18n/messages.properties

    javax.faces.component.UIInput.REQUIRED = {0} is required.

    main/java/resources/com/example/project/i18n/messages_pt_BR.properties

    javax.faces.component.UIInput.REQUIRED = {0} é obrigatório.

    main/java/resources/com/example/project/i18n/messages_hi.properties

    ```


    ![A454457_1_En_14_Figc_HTML.gif](OEBPS/Images/A454457_1_En_14_Figc_HTML.gif)


    Finally, configure it in the <application> element of the faces-config.xml file:


    ```

    <application>

        ...

        <message-bundle>com.example.project.i18n.messages</message-bundle>

    </application>

    ```


    You’ll perhaps have noticed the {0} placeholders in the messages. They represent
    the labels of the associated input and select components. The labels default to
    the component’s client ID, which is basically the ID of the JSF-generated HTML
    element as you can find in the browser’s page source. You can override it by explicitly
    setting the label attribute of the component.


    ```

    <h:inputText id="email" ... label="#{text[''label.email'']}" />

    <h:inputSecret id="password" ... label="#{text[''label.password'']}" />

    ```


    Note that putting the message bundle in a different file than the resource bundle
    is not strictly necessary. You can also just put the message bundle entries in
    text.properties files and adjust the <message-bundle> entry to point to the same
    FQN as <resource-bundle>.


    ## Obtaining Localized Message in a Custom Converter/Validator


    The value of the <message-bundle> entry can be obtained programmatically via Application#getMessageBundle().
    You can in turn use it to obtain the actual bundle via the java.util.ResourceBundle
    API, along with UIViewRoot#getLocale(). This allows you to obtain a localized
    message in a custom converter and validator. Following is an example of such a
    validator, which checks if the specified e-mail address is already in use:


    ```

    @FacesValidator(value = "duplicateEmailValidator", managed = true)

    public class DuplicateEmailValidator implements Validator<String> {


        @Inject

        private UserService userService;


        @Override

        public void validate

            (FacesContext context, UIComponent component, String value)

                throws ValidatorException

        {

            if (value == null) {

                return;

            }


            Optional<User> user = userService.findByEmail(value);


            if (user.isPresent()) {

                throw new ValidatorException(new FacesMessage(getMessage(

                    context, "message.duplicateEmailValidator")));

            }

        }


        public static String getMessage(FacesContext context, String key) {

            return ResourceBundle.getBundle(

                context.getApplication().getMessageBundle(),

                context.getViewRoot().getLocale()).getString(key);

        }

    }

    ```


    You might have noticed the new managed attribute of the @FacesValidator annotation
    . This will basically turn on CDI support on the validator instance and hence
    allow you to inject a business service into a validator. The same attribute is
    also available for @FacesConverter.


    The shown validator example assumes that the following entry is present in the
    resource bundle files as identified by <message-bundle>:


    ```

    message.duplicateEmailValidator = Email is already in use.

    ```'
