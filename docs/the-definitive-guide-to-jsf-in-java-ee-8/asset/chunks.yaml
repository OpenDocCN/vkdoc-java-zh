- fmt: '### `<f:validateBean>` / `<f:validateWholeBean>`


    When used, these tags have a required dependency on the Bean Validation API (application
    programming interface), previously more commonly known as “JSR 303.” Like JSF,
    Bean Validation is part of the Java EE API, already included in any Java EE application
    server. In Tomcat and other servlet containers, you’d need to install it separately.
    In Java code, Bean Validation is represented by annotations and interfaces of
    the `javax.validation.*` package, such as `@NotNull`, `@Size`, `@Pattern`, `ConstraintValidator`,
    etc. Currently the most popular implementation is Hibernate Validator.[^(18)](#A454457_1_En_5_Chapter.xhtml#Fn18)


    JSF automatically detects the presence of Bean Validation and will in such a case
    transparently process all Bean Validation constraints during the end of the process
    validations phase (third phase), regardless of the outcome of JSF’s own validators.
    If desired, this can be disabled application-wide with the following context parameter
    in `web.xml`:


    ```

    <context-param>

        <param-name>

            javax.faces.validator.DISABLE_DEFAULT_BEAN_VALIDATOR

        </param-name>

        <param-value>true</param-value>

    </context-param>

    ```


    Or, if this is a little too rough, you can fine-grain it with help of the `<f:validateBean>`
    tag wrapping a group of `UIInput` components, or nested in them. When the `disabled`
    attribute of the `<f:validateBean>` tag is set to `true`, then any Bean Validation
    will be disabled on the target `UIInput` components. The following code will disable
    any Bean Validation only on the parent `UIInput` component.


    ```

    <h:inputText ...>

        <f:validateBean disabled="true" />

    </h:inputText>

    ```


    And the following code will disable any Bean Validation only on `UIInput` components
    identified by `input3`, `input4`, and `input5`:


    ```

    <h:inputText id="input1" ... />

    <h:inputText id="input2" ... />

    <f:validateBean disabled="true">

        <h:inputText id="input3" ... />

        <h:inputText id="input4" ... />

        <h:inputText id="input5" ... />

    <f:validateBean>

    ```


    It is important to keep in mind is that this will only disable JSF-managed Bean
    Validation and thus not, for example, JPA-managed Bean Validation. So, if you
    happen to use JPA (Java Persistence API) to persist your entities which are filled
    out by JSF components with Bean Validation disabled, then JPA would still perform
    Bean Validation on its behalf, fully independently from JSF. In case you want
    to disable Bean Validation on the JPA side as well, you need to set the property
    `javax.persistence.validation.mode` to `NONE` in `persistence.xml` (see also the
    `javax.persistence.ValidationMode` Javadoc).[^(19)](#A454457_1_En_5_Chapter.xhtml#Fn19)


    ```

    <property name="javax.persistence.validation.mode">NONE</property>

    ```


    With the `validationGroups` attribute of the `<f:validateBean>` tag you can if
    necessary declare one or more validation groups. In such a case, only the Bean
    Validation constraints which are registered on the same group will be processed.
    Imagine the following model:


    ```

    @NotNull

    private String value1;


    @NotNull(groups=NotNull.class)

    private String value2;


    @NotNull(groups={NotNull.class, Default.class})

    private String value3;

    ```


    Note that the `groups` attribute of any Bean Validation constraint must reference
    an interface, but it may be any one you want. For simplicity, in the above example
    we’re just reusing the `javax.validation.constraints.NotNull` interface as a group
    identifier. The common practice is, however, to create your own marker interface
    for the desired group.


    Also not unimportant is that the `@NotNull` would only work when you’ve configured
    JSF to interpret empty string submitted values as `null`; otherwise it would pollute
    the model with empty strings instead of `null`s and cause the `@NotNull` not to
    be able to do its job because an empty string is not `null`. As a reminder, the
    `web.xml` context parameter of interest is as follows:


    ```

    <context-param>

        <param-name>

            javax.faces.INTERPRET_EMPTY_STRING_SUBMITTED_VALUES_AS_NULL

        </param-name>

        <param-value>true</param-value>

    </context-param>

    ```


    Now, when submitting an empty form while having those model properties referenced
    in the following input components, without any `<f:validateBean>` on them:


    ```

    <h:inputText value="#{bean.value1}" />

    <h:inputText value="#{bean.value2}" />

    <h:inputText value="#{bean.value3}" />

    ```


    you will receive a validation error on Bean Validation constraints belonging to
    the `javax.validation.groups.Default` group, which are thus the groupless `value1`
    and the explicitly grouped `value3`. The `value2` won’t be Bean-Validated as it
    doesn’t have the default group explicitly declared.


    And, when submitting an empty form while having `<f:validateBean>` with `validationGroups`
    set to `NotNull.class`:


    ```

    <f:validateBean validationGroups="javax.validation.constraints.NotNull">

        <h:inputText value="#{bean.value1}" />

        <h:inputText value="#{bean.value2}" />

        <h:inputText value="#{bean.value3}" />

    </f:validateBean>

    ```


    you will receive a validation error on Bean Validation constraints belonging to
    the `javax.validation.constraints.NotNull` group, which are thus the `value2`
    and `value3`, which explicitly have this group declared. The groupless `value1`
    won’t be Bean-Validated as it only implies the default group.


    Finally, when submitting an empty form while having a `<f:validateBean>` with
    both groups specified in `validationGroups` attribute as a comma separated string:


    ```

    <f:validateBean validationGroups="javax.validation.groups.Default,

                                      javax.validation.constraints.NotNull">

        <h:inputText value="#{bean.value1}" />

        <h:inputText value="#{bean.value2}" />

        <h:inputText value="#{bean.value3}" />

    </f:validateBean>

    ```


    you will receive a validation error on all inputs, because they all match at least
    one of the specified groups. In real-world applications, however, this grouping
    feature has very little use. It’s only really useful when the grouped fields can
    be validated at the same time by the same validator. With Bean Validation, the
    only way to achieve that is to put a custom `Constraint` annotation on the bean
    class itself, get an instance of that bean with the values populated, and then
    pass it to the custom `ConstraintValidator` associated with the custom `Constraint`
    annotation. Imagine a “period” entity having a “start date” property which should
    always be before the “end date” property. It would look something like the following:


    ```

    @PeriodConstraint

    public class Period implements Serializable {


    @NotNull

        private LocalDate startDate;


    @NotNull

        private LocalDate endDate;


    // Add/generate getters and setters.

    }

    ```


    With the following custom constraint annotation:


    ```

    @Constraint(validatedBy=PeriodValidator.class)

    @Target(TYPE)

    @Retention(RUNTIME)

    public @interface PeriodConstraint {

        String message() default "Start date must be before end date";

        Class<?>[] groups() default {};

        Class<?>[] payload() default {};

    }

    ```


    And the following custom constraint validator:


    ```

    public class PeriodValidator

        implements ConstraintValidator<PeriodConstraint, Period>

    {

        @Override

        public boolean isValid

            (Period period, ConstraintValidatorContext context)

        {

            return period.getStartDate().isBefore(period.getEndDate());

        }

    }

    ```


    You see, Bean Validation expects that the model values are present when performing
    the validation. In the JSF perspective, this means that the model values must
    be updated before processing the validations. However, this doesn’t fit into the
    JSF life cycle wherein the model values are only updated after the validations
    are successfully processed. Essentially, JSF would need to clone the bean instance,
    populate it with the desired model values, invoke Bean Validation on it, collect
    any validation errors, and then discard the cloned bean instance.'
