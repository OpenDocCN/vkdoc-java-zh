    # 12. 搜索表达式


    Bauke Scholtz^(1 ) 与 Arjan Tijms²


    (1) 库拉索岛威廉斯塔德


    (2) 荷兰北荷兰省阿姆斯特丹


    正如第 3 章“Ajax 生命周期”和第 4 章“Ajax 化组件”所述，`<f:ajax>` 标签的 `execute` 和 `render` 属性接受一组以空格分隔的所谓**组件搜索表达式**。


    搜索表达式自 JSF（JavaServer Faces）诞生之初就一直存在，因为它被用于 `<h:outputLabel>`、`<h:message>` 和
    `<h:messages>` 的 `for` 属性中。但直到 JSF 2.0 引入 `<f:ajax>` 后，它们才成为 JSF 开发者必须掌握的核心知识。这是因为，标签和消息在绝大多数情况下已经与目标输入组件位于同一个命名容器父组件中，因此在
    `for` 属性中直接指定目标输入组件的 ID 就已足够。但对于 `<f:ajax>` 的 `execute` 和 `render` 属性而言，情况未必如此，因为目标组件可能位于不同的命名容器上下文中，甚至位于物理上不同的
    Facelets 文件中。


    为了克服这些困难，JSF 2.0 引入了几个更抽象的搜索表达式：`"@this"`、`"@form"`、`"@all"` 和 `"@none"`。像 `"@form"`
    这样的表达式特别易于使用，因为它仅表示“以当前表单为目标”。如果该当前表单是在引用它的页面之上两个父模板中定义的，那么这确实使引用它变得容易得多。


    尽管这些关键字让事情变得简单了许多，但它们的功能相当有限。不仅只有四个关键字，而且它们不可扩展，并且默认的 JSF 组件集仅在 `<f:ajax>` 标签内部使用它们。在其他组件（甚至
    JSF 自带的 `<h:outputLabel>`、`<h:message>` 和 `<h:messages>`）中使用它们，以及以编程方式使用它们，都被忽略了。因此，在
    JSF 2.3 中，最后时刻引入了一个“组件搜索表达式框架”，极大地扩展了这四个关键字。它主要基于 PrimeFaces 中一个经过验证的 API（应用程序编程接口）。¹


    ## 相对本地 ID


    这是组件搜索表达式的最简单形式。最常见的用例出现在 `<h:outputLabel>`、`<h:message>` 和 `<h:messages>` 组件的
    `for` 属性中。它仅引用目标 `UIInput` 组件的唯一 ID。


    ```

    <h:outputLabel for="email" value="电子邮件地址" />

    <h:inputText id="email" value="#{login.email}" required="true" />

    <h:message for="email" />

    ```


    这仅要求目标组件也位于同一个命名容器父组件内。命名容器父组件是实现了 `NamingContainer` 接口的组件。² 在标准 JSF 中，只有 `<h:form>`、`<h:dataTable>`、`<ui:repeat>`
    和 `<f:subview>` 是 `NamingContainer` 的实例。所有复合组件也都是 `NamingContainer` 的实例，但标签文件不是。


    如果你需要从 `<h:outputLabel>` 引用命名容器内的特定 `UIInput` 组件，那么你需要将所谓的命名容器分隔符字符附加到命名容器组件的
    ID 之后，然后再附加目标 `UIInput` 组件的 ID。默认的命名容器分隔符字符是冒号“:”。当前配置的分隔符字符可以通过 `UINamingContainer#getSeparatorCharacter()`
    以编程方式获取。³


    ```

    char separatorCharacter = UINamingContainer

        .getSeparatorCharacter(FacesContext.getCurrentInstance);

    ```


    这可以通过 `web.xml` 中的 `javax.faces.SEPARATOR_CHAR` 上下文参数进行配置。


    ```

    <context-param>

        <param-name>javax.faces.SEPARATOR_CHAR</param-name>

        <param-value>-</param-value>

    </context-param>

    ```

