  trans: "\n```\n<render-kit>\n    <renderer>\n        <component-family>javax.faces.Output</component-family>\n\
            <renderer-type>javax.faces.Head</renderer-type>\n        <renderer-class>\n\
                com.sun.faces.renderkit.html_basic.HeadRenderer\n        </renderer-class>\n\
        </renderer>\n</render-kit>\n```\n\n如果你使用 MyFaces 而非 Mojarra 作为 JSF 实现，请改用\
    \ `org.apache.myfaces.renderkit.html.HtmlHeadRenderer` 作为渲染器类。\n\n如果你打算开发一个自动包含特定资源的\
    \ JSF 库，请记住使用 `@ResourceDependency` 或 `UIViewRoot#addComponentResource()`，而不是为了此目的替换\
    \ `<h:head>` 的默认渲染器。由于注解不允许指定动态值，任何动态资源最好在 `<h:head>` 的 `PostAddToView` 事件期间添加。这可以通过一个\
    \ `SystemEventListener` 在应用范围内实现，如下所示，假设 JSF 库的资源库名称为 \"foo\"：\n\n```\npublic\
    \ class DynamicResourceListener implements SystemEventListener {\n\nprivate static\
    \ final String LIBRARY = \"foo\";\n\n@Override\n    public boolean isListenerForSource(Object\
    \ source) {\n        UIOutput output = (UIOutput) source;\n        return \"javax.faces.Head\"\
    .equals(output.getRendererType());\n    }\n\n@Override\n    public void processEvent(SystemEvent\
    \ event) {\n        FacesContext context = event.getFacesContext();\n\nString\
    \ scriptName = \"foo.js\"; // 可以是动态的。\n        addResource(context, scriptName);\n\
    \nString stylesheetName = \"foo.css\"; // 可以是动态的。\n        addResource(context,\
    \ stylesheetName);\n    }\n\nprivate void addResource(FacesContext context, String\
    \ name) {\n        UIComponent resource = new UIOutput();\n        resource.getAttributes().put(\"\
    library\", LIBRARY);\n        resource.getAttributes().put(\"name\", name);\n\
            resource.setRendererType(context.getApplication()\n            .getResourceHandler().getRendererTypeForResourceName(name));\n\
            context.getViewRoot()\n            .addComponentResource(context, resource,\
    \ \"head\");\n    }\n}\n```\n\n该监听器在 `faces-config.xml` 中注册如下：\n\n```\n<system-event-listener>\
    \                                                    \n    <system-event-listener-class>\n\
            com.example.project.listener.DynamicResourceListener\n    </system-event-listener-class>\n\
        <system-event-class>\n        javax.faces.event.PostAddToViewEvent\n    </system-event-class>\n\
        <source-class>javax.faces.component.UIOutput</source-class>\n</system-event-listener>\n\
    ```\n\n请注意，`<source-class>` 最好应该是 `javax.faces.component.html.HtmlHead`，但这并不一定在所有\
    \ JSF 实现中都能正常工作。例如，在 Mojarra 中，`<h:head>` 会隐式创建 `UIOutput` 的实例，而不是 `HtmlHead`。\n\
    \n安装完成后，这个 `DynamicResourceListener` 将针对最后展示的包含 `style1.css`、`script1.js`、`script2.js`\
    \ 等的测试 Facelet 页面，生成如下的 HTML 输出（同样，为简洁起见，URL 已简化）。\n\n```\n<head>\n    <title>资源组件重定位演示。</title>\n\
        <script type=\"text/javascript\" src=\"script1.js\"></script>\n    <script\
    \ type=\"text/javascript\" src=\"foo.js\"></script>\n    <link type=\"text/css\"\
    \ rel=\"stylesheet\" href=\"foo.css\" />\n    <link type=\"text/css\" rel=\"stylesheet\"\
    \ href=\"style1.css\" />\n    <script type=\"text/javascript\" src=\"script2.js\"\
    ></script>\n    <link type=\"text/css\" rel=\"stylesheet\" href=\"style2.css\"\
    \ />\n    <script type=\"text/javascript\" src=\"script5.js\"></script>\n</head>\n\
    <body>\n    <p>段落 1</p>\n    <script type=\"text/javascript\" src=\"script4.js\"\
    ></script>\n    <p>段落 2</p>\n    <script type=\"text/javascript\" src=\"script3.js\"\
    ></script>\n    <script type=\"text/javascript\" src=\"script6.js\"></script>\n\
    </body>\n```\n\n因此，文档头部资源的渲染顺序如下：\n\n1.  来自 `<h:head>` 且未指定 target 的 `<h:outputScript>`。\n\
    2.  在 `PostAddToView` 期间添加到 head 的动态脚本。\n3.  在 `PostAddToView` 期间添加到 head 的动态样式表。\n\
    4.  来自 `<h:head>` 的 `<h:outputStylesheet>`。\n5.  来自 `<h:head>` 且 target 为 \"head\"\
    \ 的 `<h:outputScript>`。\n6.  来自 `<h:body>` 的 `<h:outputStylesheet>`。\n7.  来自 `<h:body>`\
    \ 且 target 为 \"head\" 的 `<h:outputScript>`。\n\n你看，这个顺序是相当可预测的。因此，没有必要重写 `<h:head>`\
    \ 的渲染器。此外，从 JSF 库中重写 `<h:head>` 的渲染器可能会导致它与任何其他恰好也重写了 `<h:head>` 渲染器的 JSF 库不兼容。你肯定希望避免这种情况。\n\
    \n使用资源组件的另一个优点是，JSF 会自动将所有与文档关联的资源推送到客户端，这样客户端就能比解析 HTML 文档并定位所有 `<link>`、`<script>`\
    \ 和 `<img>` 元素所需的时间更早地获取到这些资源。这是 JSF 2.3 的新特性。这仅要求 JSF 2.3 Web 应用部署到兼容 Servlet\
    \ 4.0 的容器（如 Payara 5、GlassFish 5、Tomcat 9、WildFly 12 等），并且使用 HTTPS 而非 HTTP，同时客户端支持\
    \ HTTP/2 协议。¹⁹ 这不需要在 JSF 端进行额外的配置。\n"
- fmt: "# Pass-Through Elements\n\nJSF also supports implicitly interpreting any arbitrary\
    \ HTML element as a full-fledged JSF component. This feature was introduced in\
    \ JSF 2.2 and is formally known as \"pass-through elements.\" This is particularly\
    \ useful when you want to use HTML5 elements such as `<main>`, `<article>`, `<section>`,\
    \ `<aside>`, `<nav>`, `<header>`, `<footer>`, etc. and want to be able to reference\
    \ them in `<f:ajax render>`. Previously, before JSF 2.2, those elements didn't\
    \ have a JSF component equivalent and you're therefore forced to wrap them in\
    \ `<h:panelGroup layout=\"block\">` which only makes the HTML less semantic. The\
    \ pass-through element trigger is available by the `http://xmlns.jcp.org/jsf`\
    \ namespace. All you need to do is to specify at least one attribute on this namespace.\
    \ The default namespace prefix is just `jsf`.\n\n```\n<!DOCTYPE html>\n<html lang=\"\
    en\"\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\n    xmlns:jsf=\"http://xmlns.jcp.org/jsf\"\
    \n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n>\n    <h:head>\n        <title>Title</title>\n\
    \    </h:head>\n    <h:body>\n        <header>\n            ...\n            <nav\
    \ jsf:id=\"menu\">\n                ...\n            </nav>\n        </header>\n\
    \        <main jsf:id=\"main\">\n            ...\n        </main>\n        <footer>\n\
    \            ...\n        </footer>\n    </h:body>\n</html>\n```\n\nUnder the\
    \ hood, in the JSF component tree, those HTML5 elements are turned into a `UIPanel`\
    \ component and are treated in the JSF component tree exactly like `<h:panelGroup>`.\
    \ This way you can cleanly keep using semantic HTML5 markup while still being\
    \ able to reference them via `<f:ajax render>`. In other words, the following\
    \ construct won't work:\n\n```\n<main id=\"main\">\n    ...\n    <h:form id=\"\
    form\">\n        ...\n        <h:commandButton id=\"submit\" ...>\n          \
    \  <f:ajax render=\":main\" />\n        </h:commandButton>\n    </h:form>\n</main>\n\
    ```\n\nIt fails because `UIViewRoot#findComponent()` doesn't return anything when\
    \ passing `main`. JSF can't find any component with the given ID. The `<main>`\
    \ element is here basically interpreted as template text. But the following construct\
    \ will work:\n\n```\n<main jsf:id=\"main\">\n    ...\n    <h:form id=\"form\"\
    >\n        ...\n        <h:commandButton id=\"submit\" ...>\n            <f:ajax\
    \ render=\":main\" />\n        </h:commandButton>\n    </h:form>\n</main>\n```\n\
    \n`UIViewRoot#findComponent()` on `main` will then return a `UIPanel` instance\
    \ representing the `<main>` element. JSF will then be able to render it into the\
    \ Ajax response. The pass-through element feature also works on other HTML elements,\
    \ only they don't necessarily turn into a `UIPanel` instance. Instead, they will\
    \ be turned into a JSF component whose generated HTML output matches the very\
    \ HTML element (see Table [6-1](#A454457_1_En_6_Chapter.xhtml#Tab1)). The following\
    \ construct is, under the hood, identical to the previous one:\n\n```\n<main jsf:id=\"\
    main\">\n    ...\n    <form jsf:id=\"form\">\n        ...\n        <input type=\"\
    submit\" jsf:id=\"submit\" ...>\n            <f:ajax render=\":main\" />\n   \
    \     </input>\n    </form>\n</main>\n```\n\n###### Table 6-1 Passthrough Elements\
    \ Recognized by JSF\n\n| Passthrough HTML element | Implied JSF component |\n\
    | --- | --- |\n| `<a jsf:action=\"…\">` | `<h:commandLink>` |\n| `<a jsf:actionListener=\"\
    …\">` | `<h:commandLink>` |\n| `<a jsf:value=\"…\">` | `<h:outputLink>` |\n| `<a\
    \ jsf:outcome=\"…\">` | `<h:link>` |\n| `<body jsf:id=\"…\">` | `<h:body>` |\n\
    | `<button jsf:id=\"…\">` | `<h:commandButton type=\"button\">` |\n| `<button\
    \ jsf:outcome=\"…\">` | `<h:button>` |\n| `<form jsf:id=\"…\">` | `<h:form>` |\n\
    | `<head jsf:id=\"…\">` | `<h:head>` |\n| `<img jsf:id=\"…\">` | `<h:graphicImage>`\
    \ |\n| `<input jsf:id=\"…\" type=\"button\">` | `<h:commandButton type=\"button\"\
    >` |\n| `<input jsf:id=\"…\" type=\"checkbox\">` | `<h:selectBooleanCheckbox>`\
    \ |\n| `<input jsf:id=\"…\" type=\"file\">` | `<h:inputFile>` |\n| `<input jsf:id=\"\
    …\" type=\"hidden\">` | `<h:inputHidden>` |\n| `<input jsf:id=\"…\" type=\"password\"\
    >` | `<h:inputSecret>` |\n| `<input jsf:id=\"…\" type=\"reset\">` | `<h:commandButton\
    \ type=\"reset\">` |\n| `<input jsf:id=\"…\" type=\"submit\">` | `<h:commandButton\
    \ type=\"submit\">` |\n| `<input jsf:id=\"…\" type=\"*\">` | `<h:inputText>` |\n\
    | `<label jsf:id=\"…\">` | `<h:outputLabel>` |\n| `<link jsf:id=\"…\">` | `<h:outputStylesheet>`\
    \ |\n| `<script jsf:id=\"…\">` | `<h:outputScript>` |\n| `<select jsf:id=\"…\"\
    >` | `<h:selectOneListbox>` |\n| `<select jsf:id=\"…\" multiple=\"*\">` | `<h:selectManyListbox>`\
    \ |\n| `<* jsf:id=\"…\">` | `<h:panelGroup>` |\n\nAny attribute specified on such\
    \ a pass-through element is implicitly mapped to the corresponding attribute of\
    \ the JSF component. In the following example, the JSF component and pass-through\
    \ element pairs are equivalent.\n\n```\n<h:graphicImage library=\"common\" name=\"\
    some.svg\" />\n<img jsf:library=\"common\" name=\"some.svg\" />\n\n<h:inputText\
    \ value=\"#{bean.name}\" />\n<input type=\"text\" jsf:value=\"#{bean.name}\" />\n\
    \n<h:inputText a:type=\"email\" value=\"#{bean.email}\" />\n<input type=\"email\"\
    \ jsf:value=\"#{bean.email}\" />\n\n<h:link outcome=\"contact\" value=\"Contact\"\
    \ />\n<a jsf:outcome=\"contact\">Contact</a>\n```\n\nNote that you don't necessarily\
    \ need to register every single attribute of a pass-through element on the `jsf`\
    \ namespace. Only one is sufficient to trigger the pass-through element feature,\
    \ preferably the first one. This keeps the code concise."
  raw: '## Pass-Through Elements


    JSF also supports implicitly interpreting any arbitrary HTML element as a full-fledged
    JSF component . This feature was introduced in JSF 2.2 and is formally known as
    “pass-through elements.” This is particularly useful when you want to use HTML5
    elements such as <main>, <article>, <section>, <aside>, <nav>, <header>, <footer>,
    etc. and want to be able to reference them in <f:ajax render>. Previously, before
    JSF 2.2, those elements didn’t have a JSF component equivalent and you’re therefore
    forced to wrap them in <h:panelGroup layout="block"> which only makes the HTML
    less semantic. The pass-through element trigger is available by the [http://xmlns.jcp.org/jsf](http://xmlns.jcp.org/jsf)
    namespace. All you need to do is to specify at least one attribute on this namespace.
    The default namespace prefix is just “jsf”.


    ```

    <!DOCTYPE html>

    <html lang="en"

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:jsf="http://xmlns.jcp.org/jsf"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

    >

        <h:head>

            <title>Title</title>

        </h:head>

        <h:body>

            <header>

                ...

                <nav jsf:id="menu">

                    ...

                </nav>

            </header>

            <main jsf:id="main">

                ...

            </main>

            <footer>

                ...

            </footer>

        </h:body>

    </html>

    ```


    Under the hood, in the JSF component tree, those HTML5 elements are turned into
    a UIPanel component and are treated in the JSF component tree exactly like <h:panelGroup>.
    This way you can cleanly keep using semantic HTML5 markup while still being able
    to reference them via <f:ajax render>. In other words, the following construct
    won’t work:


    ```

    <main id="main">

        ...

        <h:form id="form">

            ...

            <h:commandButton id="submit" ...>

                <f:ajax render=":main" />

            </h:commandButton>

        </h:form>

    </main>

    ```


    It fails because UIViewRoot#findComponent() doesn’t return anything when passing
    “main”. JSF can’t find any component with the given ID. The <main> element is
    here basically interpreted as template text. But the following construct will
    work:


    ```

    <main jsf:id="main">

        ...

        <h:form id="form">

            ...

            <h:commandButton id="submit" ...>

                <f:ajax render=":main" />

            </h:commandButton>

        </h:form>

    </main>

    ```


    UIViewRoot#findComponent() on “main” will then return a UIPanel instance representing
    the <main> element. JSF will then be able to render it into the Ajax response.
    The pass-through element feature also works on other HTML elements, only they
    don’t necessarily turn into a UIPanel instance. Instead, they will be turned into
    a JSF component whose generated HTML output matches the very HTML element (see
    Table [6-1](#A454457_1_En_6_Chapter.xhtml#Tab1)). The following construct is,
    under the hood, identical to the previous one:


    ```

    <main jsf:id="main">

        ...

        <form jsf:id="form">

            ...

            <input type="submit" jsf:id="submit" ...>

                <f:ajax render=":main" />

            </input>

        </form>

    </main>

    ```


    ###### Table 6-1 Passthrough Elements Recognized by JSF


    | Passthrough HTML element | Implied JSF component |

    | --- | --- |

    | <a jsf:action="…"> | <h:commandLink> |

    | <a jsf:actionListener="…"> | <h:commandLink> |

    | <a jsf:value="…"> | <h:outputLink> |

    | <a jsf:outcome="…"> | <h:link> |

    | <body jsf:id="…"> | <h:body> |

    | <button jsf:id="…"> | <h:commandButton type="button"> |

    | <button jsf:outcome="…"> | <h:button> |

    | <form jsf:id="…"> | <h:form> |

    | <head jsf:id="…"> | <h:head> |

    | <img jsf:id="…"> | <h:graphicImage> |

    | <input jsf:id="…" type="button"> | <h:commandButton type="button"> |

    | <input jsf:id="…" type="checkbox"> | <h:selectBooleanCheckbox> |

    | <input jsf:id="…" type="file"> | <h:inputFile> |

    | <input jsf:id="…" type="hidden"> | <h:inputHidden> |

    | <input jsf:id="…" type="password"> | <h:inputSecret> |

    | <input jsf:id="…" type="reset"> | <h:commandButton type="reset"> |

    | <input jsf:id="…" type="submit"> | <h:commandButton type="submit"> |

    | <input jsf:id="…" type="*"> | <h:inputText> |

    | <label jsf:id="…"> | <h:outputLabel> |

    | <link jsf:id="…"> | <h:outputStylesheet> |

    | <script jsf:id="…"> | <h:outputScript> |

    | <select jsf:id="…"> | <h:selectOneListbox> |

    | <select jsf:id="…" multiple="*"> | <h:selectManyListbox> |

    | <* jsf:id="…"> | <h:panelGroup> |


    Any attribute specified on such a pass-through element is implicitly mapped to
    the corresponding attribute of the JSF component. In the following example, the
    JSF component and pass-through element pairs are equivalent.


    ```

    <h:graphicImage library="common" name="some.svg" />

    <img jsf:library="common" name="some.svg" />


    <h:inputText value="#{bean.name}" />

    <input type="text" jsf:value="#{bean.name}" />


    <h:inputText a:type="email" value="#{bean.email}" />

    <input type="email" jsf:value="#{bean.email}" />


    <h:link outcome="contact" value="Contact" />

    <a jsf:outcome="contact">Contact</a>

    ```


    Note that you don’t necessarily need to register every single attribute of a pass-through
    element on the “jsf” namespace. Only one is sufficient to trigger the pass-through
    element feature , preferably the first one. This keeps the code concise.'
  trans: '

    ## 透传元素


    JSF 还支持隐式地将任意 HTML 元素解释为完整的 JSF 组件。此功能在 JSF 2.2 中引入，正式名称为“透传元素”。当你想要使用 HTML5 元素（如
    `<main>`、`<article>`、`<section>`、`<aside>`、`<nav>`、`<header>`、`<footer>` 等），并希望在
    `<f:ajax render>` 中引用它们时，此功能特别有用。在 JSF 2.2 之前，这些元素没有对应的 JSF 组件，因此你不得不将它们包裹在 `<h:panelGroup
    layout="block">` 中，这只会让 HTML 的语义性降低。透传元素的触发器可通过 [`xmlns.jcp.org/jsf`](http://xmlns.jcp.org/jsf)
    命名空间获得。你只需在此命名空间上指定至少一个属性即可。默认的命名空间前缀就是“jsf”。


    ```

    <!DOCTYPE html>

    <html lang="en"

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:jsf="http://xmlns.jcp.org/jsf"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

    >

        <h:head>

            <title>Title</title>

        </h:head>

        <h:body>

            <header>

                ...

                <nav jsf:id="menu">

                    ...

                </nav>

            </header>

            <main jsf:id="main">

                ...

            </main>

            <footer>

                ...

            </footer>

        </h:body>

    </html>

    ```


    在底层，JSF 组件树中，这些 HTML5 元素会被转换为 `UIPanel` 组件，并在 JSF 组件树中像 `<h:panelGroup>` 一样被处理。这样，你就可以干净地继续使用语义化的
    HTML5 标记，同时仍然能够通过 `<f:ajax render>` 引用它们。换句话说，以下结构将无法工作：


    ```

    <main id="main">

        ...

        <h:form id="form">

            ...

            <h:commandButton id="submit" ...>

                <f:ajax render=":main" />

            </h:commandButton>

        </h:form>

    </main>

    ```


    它会失败，因为当传递“main”时，`UIViewRoot#findComponent()` 不会返回任何内容。JSF 无法找到具有给定 ID 的组件。这里的
    `<main>` 元素基本上被解释为模板文本。但以下结构将正常工作：


    ```

    <main jsf:id="main">

        ...

        <h:form id="form">

            ...

            <h:commandButton id="submit" ...>

                <f:ajax render=":main" />

            </h:commandButton>

        </h:form>

    </main>

    ```


    对“main”调用 `UIViewRoot#findComponent()` 将返回一个代表 `<main>` 元素的 `UIPanel` 实例。然后 JSF
    将能够将其渲染到 Ajax 响应中。透传元素功能也适用于其他 HTML 元素，只是它们不一定都会转换为 `UIPanel` 实例。相反，它们会被转换为一个
    JSF 组件，该组件生成的 HTML 输出与原始 HTML 元素相匹配（参见表 6-1）。以下结构在底层与上一个结构相同：


    ```

    <main jsf:id="main">

        ...

        <form jsf:id="form">

            ...

            <input type="submit" jsf:id="submit" ...>

                <f:ajax render=":main" />

            </input>

        </form>

    </main>

    ```


    ###### 表 6-1 JSF 识别的透传元素


    | 透传 HTML 元素 | 隐含的 JSF 组件 |

    | --- | --- |

    | `<a jsf:action="…">` | `<h:commandLink>` |

    | `<a jsf:actionListener="…">` | `<h:commandLink>` |

    | `<a jsf:value="…">` | `<h:outputLink>` |

    | `<a jsf:outcome="…">` | `<h:link>` |

    | `<body jsf:id="…">` | `<h:body>` |

    | `<button jsf:id="…">` | `<h:commandButton type="button">` |

    | `<button jsf:outcome="…">` | `<h:button>` |

    | `<form jsf:id="…">` | `<h:form>` |

    | `<head jsf:id="…">` | `<h:head>` |

    | `<img jsf:id="…">` | `<h:graphicImage>` |

    | `<input jsf:id="…" type="button">` | `<h:commandButton type="button">` |

    | `<input jsf:id="…" type="checkbox">` | `<h:selectBooleanCheckbox>` |

    | `<input jsf:id="…" type="file">` | `<h:inputFile>` |

    | `<input jsf:id="…" type="hidden">` | `<h:inputHidden>` |

    | `<input jsf:id="…" type="password">` | `<h:inputSecret>` |

    | `<input jsf:id="…" type="reset">` | `<h:commandButton type="reset">` |

    | `<input jsf:id="…" type="submit">` | `<h:commandButton type="submit">` |

    | `<input jsf:id="…" type="*">` | `<h:inputText>` |

    | `<label jsf:id="…">` | `<h:outputLabel>` |

    | `<link jsf:id="…">` | `<h:outputStylesheet>` |

    | `<script jsf:id="…">` | `<h:outputScript>` |

    | `<select jsf:id="…">` | `<h:selectOneListbox>` |

    | `<select jsf:id="…" multiple="*">` | `<h:selectManyListbox>` |

    | `<* jsf:id="…">` | `<h:panelGroup>` |


    在此类透传元素上指定的任何属性都会隐式映射到 JSF 组件的相应属性。在以下示例中，JSF 组件和透传元素对是等价的。


    ```

    <h:graphicImage library="common" name="some.svg" />

    <img jsf:library="common" name="some.svg" />


    <h:inputText value="#{bean.name}" />

    <input type="text" jsf:value="#{bean.name}" />


    <h:inputText a:type="email" value="#{bean.email}" />

    <input type="email" jsf:value="#{bean.email}" />


    <h:link outcome="contact" value="Contact" />

    <a jsf:outcome="contact">Contact</a>

    ```


    请注意，你不需要在“jsf”命名空间上注册透传元素的每一个属性。只需一个属性（最好是第一个）就足以触发透传元素功能。这可以使代码保持简洁。

    '
