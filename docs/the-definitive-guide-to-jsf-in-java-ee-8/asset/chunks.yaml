- fmt: "###### Figure 2-24 The New JPA Entity wizard in Eclipse\n\nModify the new\
    \ entity class as follows:\n\n```\npackage com.example.project.model;\n\nimport\
    \ java.io.Serializable;\nimport javax.persistence.Column;\nimport javax.persistence.Entity;\n\
    import javax.persistence.GeneratedValue;\nimport javax.persistence.GenerationType;\n\
    import javax.persistence.Id;\nimport javax.persistence.Lob;\nimport javax.validation.constraints.NotNull;\n\
    \n@Entity\npublic class Message implements Serializable {\n\n    private static\
    \ final long serialVersionUID = 1L;\n\n    @Id @GeneratedValue(strategy=GenerationType.IDENTITY)\n\
    \    private Long id;\n\n    @Column(nullable = false) @Lob\n    private @NotNull\
    \ String text;\n\n    // Add/generate getters and setters.\n}\n```\n\nAs a reminder,\
    \ you can let Eclipse generate getters and setters by right-clicking anywhere\
    \ in the class editor and choosing *Source ➤ Generate Getters and Setters*.\n\n\
    We'll briefly go through the annotations that are used here.\n\n*   `@Entity`—marks\
    \ the bean as a JPA entity, so that the JPA implementation will automatically\
    \ collect database-related metadata based on all its properties.\n\n*   `@Id @GeneratedValue(strategy=IDENTITY)`—marks\
    \ a property to be mapped to a database column of SQL “IDENTITY” type. In MySQL\
    \ terms, that’s the equivalent of “AUTO_INCREMENT”. In PostgreSQL terms, that’s\
    \ the equivalent of “BIGSERIAL”.\n\n*   `@Column`—marks a property to be mapped\
    \ to a regular database column. The actual database column type depends on the\
    \ Java type being used. Without the additional `@Lob` annotation, that’s a `VARCHAR(255)`\
    \ whose length can be manipulated by `@Column(length=n)`. With the `@Lob` annotation,\
    \ however, the column type becomes `TEXT`.\n\n*   `@Lob`—marks a `String` property\
    \ to be mapped to a database column of type `TEXT` instead of a limited `VARCHAR`.\n\
    \n*   `@NotNull`—this is actually not part of JPA but of “Bean Validation.” To\
    \ the point, it ensures that the bean property is being validated never to be\
    \ null when submitting a JSF form and when persisting the JPA entity. (See Chapter\
    \ [5](#A454457_1_En_5_Chapter.xhtml).) Also note that this basically replicates\
    \ the `@Column(nullable=false)`, but that’s only because JPA doesn’t consider\
    \ any Bean Validation annotations as valid database metadata in order to generate\
    \ appropriate SQL tables.\n\n### Creating the EJB Service\n\nNext, we need to\
    \ create an EJB in order to be able to save an instance of the aforementioned\
    \ JPA entity in the database, and to obtain a list of JPA entities.\n\nRight-click\
    \ the `src/main/java` folder of the project and choose *New ➤ Class*. In the wizard,\
    \ set the *Package* to `com.example.project.service` and set the *Name* to `MessageService`\
    \ (see Figure [2-25](#A454457_1_En_2_Chapter.xhtml#Fig25)). The rest of the fields\
    \ can be kept default or empty.\n\n![A454457_1_En_2_Fig25_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig25_HTML.jpg)\n\
    \n###### Figure 2-25 The New Java Class wizard in Eclipse\n\nModify the new service\
    \ class as follows:\n\n```\npackage com.example.project.service;\n\nimport java.util.List;\n\
    import javax.ejb.Stateless;\nimport javax.persistence.EntityManager;\nimport javax.persistence.PersistenceContext;\n\
    \n@Stateless\npublic class MessageService {\n\n    @PersistenceContext\n    private\
    \ EntityManager entityManager;\n\n    public void create(Message message) {\n\
    \        entityManager.persist(message);\n    }\n\n    public List<Message> list()\
    \ {\n        return entityManager\n            .createQuery(\"FROM Message m\"\
    , Message.class)\n            .getResultList();\n    }\n}\n```\n\nThat’s basically\
    \ it. Let’s briefly go through the annotations.\n\n*   `@Stateless`—marks the\
    \ bean as a stateless EJB service, so that the application server knows whether\
    \ it should pool them and when to start and stop database transactions. The alternative\
    \ annotations are `@Stateful` and `@Singleton`. Note that a `@Stateless` does\
    \ not mean that the container will make sure that the class itself is stateless.\
    \ You as developer are still responsible to ensure that the class doesn’t contain\
    \ any shared and mutable instance variables. Otherwise, you’d better mark it as\
    \ either `@Stateful` or `@Singleton`, depending on its purpose.\n\n*   `@PersistenceContext`—basically\
    \ injects the JPA entity manager from the persistence unit as configured in the\
    \ project’s `persistence.xml`. The entity manager is, in turn, responsible for\
    \ mapping all JPA entities against a SQL database. It will, under cover, do all\
    \ the hard JDBC work.\n\n### Adjusting the Hello World\n\nNow we’re going to adjust\
    \ the earlier created `HelloWorld` backing bean in order to save the messages\
    \ in the database and display all of them in a table.\n\n```\n@Named @RequestScoped\n\
    public class HelloWorld {\n\n    private Message message = new Message();\n  \
    \  private List<Message> messages;\n\n    @Inject\n    private MessageService\
    \ messageService;\n\n    @PostConstruct\n    public void init() {\n        messages\
    \ = messageService.list();\n    }\n\n    public void submit() {\n        messageService.create(message);\n\
    \        messages.add(message);\n    }\n\n    public Message getMessage() {\n\
    \        return message;\n    }\n\n    public List<Message> getMessages() {\n\
    \        return messages;\n    }\n}\n```\n\nNote that you don’t need setters for\
    \ `message` and `messages`. We’re going to use the getters and setters of the\
    \ `Message` entity itself.\n\nFinally, adjust the `<h:body>` of `hello.xhtml`\
    \ as follows:\n\n```\n<h1>Hello World</h1>\n<h:form>\n    <h:outputLabel for=\"\
    input\" value=\"Input\" />\n    <h:inputText id=\"input\" value=\"#{helloWorld.message.text}\"\
    \ />\n    <h:commandButton value=\"Submit\"\n        action=\"#{helloWorld.submit}\"\
    >\n        <f:ajax execute=\"@form\" render=\":table\" />\n    </h:commandButton>\n\
    </h:form>\n<h:dataTable id=\"table\" value=\"#{helloWorld.messages}\" var=\"message\"\
    >\n    <h:column>#{message.id}</h:column>\n    <h:column>#{message.text}</h:column>\n\
    </h:dataTable>\n```\n\nNow reload the page in your favorite web browser and create\
    \ some messages (see Figure [2-26](#A454457_1_En_2_Chapter.xhtml#Fig26)).\n\n\
    ![A454457_1_En_2_Fig26_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig26_HTML.jpg)\n\
    \n###### Figure 2-26 The Hello World using JSF, CDI, EJB, and JPA\n\n# Footnotes\n\
    \n[1](#A454457_1_En_2_Chapter.xhtml#Fn1_source) [https://en.wikipedia.org/wiki/Mojibake](https://en.wikipedia.org/wiki/Mojibake).\n\
    \n[2](#A454457_1_En_2_Chapter.xhtml#Fn2_source) [http://tools.jboss.org/features/cdi.html](http://tools.jboss.org/features/cdi.html).\n\
