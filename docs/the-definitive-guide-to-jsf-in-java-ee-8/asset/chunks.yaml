    # 15. 扩展


    Bauke Scholtz^(1 ) 和 Arjan Tijms²


    (1) 威廉斯塔德，库拉索


    (2) 阿姆斯特丹，北荷兰省，荷兰


    如果说 JSF（JavaServer Faces）有一个单一的元素或优点可以归因于其如此长久的存在，那可能就是它能够以多种方式进行扩展。从一开始，JSF 就使得替换、装饰或增强其大部分核心元素成为可能。


    这催生了大量的扩展库和项目。在早期，这些包括 A4J（Ajax4JSF）、Tomahawk、RichFaces、独立的 Facelets 项目、PrettyFaces
    等等。A4J 被合并到 RichFaces 中，而 RichFaces 本身最终于 2016 年停止服务。Facelets 被整合到 JSF 本身中，而 PrettyFaces
    则成为 Rewrite 框架的一部分。如今，知名且活跃的扩展库包括 PrimeFaces、OmniFaces 和 BootsFaces 等。虽然个别库来了又去，但主要的常量是
    JSF 从其诞生之初至今的可扩展性。


    有时人们说所有这些库都是为了解决 JSF 的缺陷或遗漏，但这并不完全准确。事实上，JSF 被明确设计为使此类扩展成为可能，从而允许甚至刺激此类扩展库的出现。例如，与
    JSF 同时期的技术 EJB（企业 JavaBeans）几乎没有扩展点，因此，尽管它有许多缺点，我们从未看到围绕它形成丰富的生态系统。

