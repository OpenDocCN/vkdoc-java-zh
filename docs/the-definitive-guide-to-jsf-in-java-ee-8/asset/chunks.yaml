  trans: "\n## 内省\n\n能够正确扩展框架的一个重要方面，不仅在于能够利用扩展点，还在于能够内省框架并查询它有哪些工件或资源可用。\n\nJSF 提供内省支持的一个方面是，它能够揭示系统中存在哪些视图资源。请记住，在\
    \ JSF 中，像 Facelets 这样的视图被抽象在视图处理器之后，而视图处理器又管理着一个或多个视图声明语言（VDL）实例。VDL，也称为模板引擎，能够通过资源处理器读取其视图。正如我们在本章中所见，所有这些组件都可以被增强，甚至被完全替换。\n\
    \n这具体意味着视图可以来自任何地方（例如，最典型的是来自文件系统），但也可以在内存中生成、从数据库加载、通过网络获取等等。此外，像 Facelets 使用的简单物理文件到逻辑视图名称的映射，对于其他视图声明语言来说，也并非必须如此。\n\
    \n总而言之，这意味着如果没有一个明确的内省机制，使得我们可以询问视图处理器、VDL 和资源处理器它们有哪些视图/资源可用，我们就无法可靠地获取完整的视图列表。\n\
    \n例如，当我们想要使用所谓的无扩展名 URL 时，就需要这样的视图列表。无扩展名 URL 是指没有任何扩展名（如 `.xhtml` 或 `.jsf`），也没有任何额外路径映射（如\
    \ `/faces/**`）的 URL。由于 URL 本身缺乏任何提示，JSF 运行其上的 Servlet 容器必须通过其他方式知道某个请求必须被路由到 faces\
    \ servlet。\n\n一种特别优雅的方式是利用 Servlet 的“精确映射”功能，这是 URL 映射的一种变体，其中将精确的名称（而非模式）映射到给定的\
    \ servlet，在本例中就是 faces servlet。由于 Servlet 规范提供了动态添加 Servlet 映射的 API，并且 JSF 提供了动态内省哪些视图可用的\
    \ API，我们基本上只需要将这两者结合起来即可实现无扩展名 URL。\n\n以下是一个如何实现此功能的示例：\n\n```\n@WebListener\n\
    public class ExtensionLessURLs implements ServletContextListener {\n    @Override\n\
        public void contextInitialized(ServletContextEvent event) {\n        FacesContext\
    \ facesContext = FacesContext.getCurrentInstance();\n        event.getServletContext()\n\
                .getServletRegistrations()\n            .values()\n            .stream()\n\
                .filter(servlet -> servlet\n                .getClassName().equals(FacesServlet.class.getName()))\n\
                .findAny()\n            .ifPresent(facesServlet -> facesContext\n\
                    .getApplication()\n                .getViewHandler()\n                .getViews(facesContext,\
    \ \"/\",\n                    ViewVisitOption.RETURN_AS_MINIMAL_IMPLICIT_OUTCOME)\n\
                    .forEach(view -> facesServlet.addMapping(view)));\n    }\n}\n\
    ```\n\n这里发生的是，我们首先尝试找到 faces servlet，这恰好是内省的另一个例子，这次是在 Servlet 规范中。如果找到了，我们就向视图处理器请求所有视图。如上所述，这将在内部内省所有可用的视图声明实例，而这些实例又可能内省资源处理器。`RETURN_AS_MINIMAL_IMPLICIT_OUTCOME`\
    \ 参数用于确保所有视图都以最简形式返回，不附加任何文件扩展名或其他标记。这与例如操作方法返回或命令组件的 `action` 属性中使用的形式相同。\n\n\
    获得正确格式的视图流后，我们直接将每个视图作为精确映射添加到我们之前找到的 faces servlet 中。\n\n例如，假设我们在 Web 根目录下的 `/foo`\
    \ 文件夹中有一个名为 `bar.xhtml` 的 Facelet 视图。那么 `getViews()` 将返回一个包含字符串 `\"/foo/bar\"\
    ` 的流。当 faces servlet 被映射到这个 `\"/foo/bar\"` 时，并假设 JSF 应用程序部署在域 `localhost` 端口 `8080`\
    \ 的上下文路径 `/test` 下，我们可以请求 `http://localhost:8080/test/foo/bar` 来查看该 Facelet 的渲染响应。\n\
    \n请注意，尽管通过这种方式在 JSF 中实现无扩展名 URL 相对简单，但为每个应用程序都这样做仍然有些繁琐。预计 JSF 的下一个版本将通过单个设置来支持此功能。\n\
    \n# 索引\n\n# A\n\n1.  动作监听器方法\n\n2.  ADF Faces\n\n3.  Ajax\n\n    1.  action\n\n\
    \    2.  应用请求值阶段\n\n    3.  行为监听器方法\n\n    4.  ClientBehaviorHolder\n\n    5.\
    \  execute 和 render 属性\n\n    6.  `<f:ajax>` 标签\n\n    7.  `@form` 关键字\n\n   \
    \ 8.  `<h:form>`\n\n    9.  实现类\n\n    10. 调用应用程序阶段\n\n    11. javax.faces.ViewState\n\
    \n    12. JSF 生命周期\n\n    13. 生命周期\n\n    14. 消息组件\n\n    15. 导航\n\n    16. on[event]\
    \ 属性\n\n    17. 渲染响应阶段\n\n    18. 支持的事件类型\n\n    19. valueChange\n\n4.  Ajax 异常处理\n\
    \n    1.  Ajax 请求\n\n    2.  应用程序级自定义\n\n    3.  业务逻辑\n\n    4.  ExceptionHandler\n\
    \n    5.  handleAjaxException()\n\n    6.  HTTP 响应\n\n    7.  JavaScript 警告\n\n\
    \    8.  生产阶段\n\n    9.  UIViewRoot 实例\n\n    10. 未处理的异常事件\n\n5.  Alexander Smirnov\
    \ 的 Telamon 框架\n\n6.  应用程序编程接口 (API)\n\n7.  应用服务器\n\n8.  认证机制\n\n    1.  AuthenticationMechanismDefinition\
    \ 注解\n\n    2.  调用者发起的认证\n\n参见调用者发起的认证\n\n1.  自定义 FORM\n\n2.  @CustomFormAuthenticationMechanismDefinition\
    \ 注解\n\n3.  @FacesConfig 注解\n\n4.  FORM\n\n5.  自定义 JSF 代码\n\n    1.  动作方法\n\n\
    \    2.  支持 bean\n\n    3.  continueAuthentication() 方法\n\n    4.  登录页面\n\n6.\
    \  loginToContinue 属性\n\n# B\n\n1.  支持 bean\n\n    1.  类\n\n        1.  编辑\n\n\
    \        2.  JBoss Tools 插件\n\n    2.  注入 JSF 提供的类型\n\n    3.  层\n\n    4.  托管\
    \ bean\n\n参见托管 bean\n\n1.  MVC 框架\n\n2.  命名约定\n\n1.  BeanManager#fireEvent() 方法\n\
    \n2.  Bean Validation API\n\n    1.  逗号分隔的字符串\n\n    2.  上下文参数\n\n    3.  自定义约束注解\n\
    \n    4.  自定义消息\n\n    5.  groups 属性\n\n    6.  在 Java 代码中\n\n    7.  JPA 管理的\n\
    \n    8.  NotNull.class\n\n    9.  UIInput 组件\n\n    10. 验证错误\n\n    11. validationGroups\
    \ 属性\n\n    12. web.xml\n\n3.  绑定属性\n\n4.  按角色安全约束\n"
