    ###### 表 5-2 <f:convertDateTime type> 支持的值


    | 标签属性 | 值类型 | 实际格式化器 | 起始版本 |

    | --- | --- | --- | --- |

    | date（默认） | java.util.Date（零时间） | DateFormat#getDateInstance() | 1.0 |

    | time | java.util.Date（零日期） | DateFormat#getTimeInstance() | 1.0 |

    | both | java.util.Date | DateFormat#getDateTimeInstance() | 1.0 |

    | localDate | java.time.LocalDate | DateTimeFormatter#ofLocalizedDate() | 2.3
    |

    | localTime | java.time.LocalTime | DateTimeFormatter#ofLocalizedTime() | 2.3
    |

    | localDateTime | java.time.LocalDateTime | DateTimeFormatter#ofLocalizedDateTime()
    | 2.3 |

    | offsetTime | java.time.OffsetTime | DateTimeFormatter#ISO_OFFSET_TIME | 2.3
    |

    | offsetDateTime | java.time.OffsetDateTime | DateTimeFormatter#ISO_OFFSET_DATE_TIME
    | 2.3 |

    | zonedDateTime | java.time.ZonedDateTime | DateTimeFormatter#ISO_ZONED_DATE_TIME
    | 2.3 |


    除了 type 属性外，最好同时指定 pattern 属性，特别是在通过 UIInput 组件要求最终用户输入 java.util.Date 或 java.time.LocalXxx
    值时，因为实际的模式在不同区域设置中可能以不太自文档化的方式变化。java.time.OffSetXxx 和 ZonedDateTime 没有这个问题，因为它们默认使用通用的
    ISO 8601 格式。⁹


    <f:convertDateTime> 的 pattern 属性，对于 java.util.Date，遵循 java.text.SimpleDateFormat
    Javadoc 中指定的相同规则，¹⁰ 对于 java.time API，遵循 java.time.format.DateTimeFormatter Javadoc
    中指定的相同规则。¹¹ 它们大部分相同，但 java.time 格式支持更多模式。对于这两个 API，“月中的日”模式字符是“d”，“年中的月”模式字符是“M”，“年”模式字符是“y”，“24
    小时制”模式字符是“H”，“分钟”模式是“m”，“秒”模式是“s”。ISO 8601 日期格式是“yyyy-MM-dd”，ISO 8601 时间格式是“HH:mm:ss”。偏移时间和带时区时间需要在时间部分之后附加一个偏移量，由
    ISO 8601 时区模式字符“X”表示。有效值的示例包括 CET（欧洲中部时间）的“+01:00”、BRT（巴西利亚时间）的“-03:00”和 IST（印度标准时间）的“+5:30”。与之前一样，偏移日期时间和带时区日期时间需要用“T”字符而不是空格分隔。以下是所有可能的
    <f:convertDateTime> 类型的概述，其中本地化类型已明确指定了模式：


    ```

    <h:form id="form">

        <h:inputText id="date" value="#{bean.date}">

            <f:convertDateTime type="date" pattern="yyyy-MM-dd" />

        </h:inputText>

        <h:inputText id="time" value="#{bean.time}">

            <f:convertDateTime type="time" pattern="HH:mm:ss" />

        </h:inputText>

        <h:inputText id="both" value="#{bean.both}">

            <f:convertDateTime type="both" pattern="yyyy-MM-dd HH:mm:ss" />

        </h:inputText>

        <h:inputText id="localDate" value="#{bean.localDate}">

            <f:convertDateTime type="localDate" pattern="yyyy-MM-dd" />

        </h:inputText>

        <h:inputText id="localTime" value="#{bean.localTime}">

            <f:convertDateTime type="localTime" pattern="HH:mm:ss" />

        </h:inputText>

        <h:inputText id="localDateTime" value="#{bean.localDateTime}">

            <f:convertDateTime type="localDateTime"

                pattern="yyyy-MM-dd HH:mm:ss">

            </f:convertDateTime>

        </h:inputText>

        <h:inputText id="offsetTime" value="#{bean.offsetTime}">

            <f:convertDateTime type="offsetTime" />

        </h:inputText>

        <h:inputText id="offsetDateTime" value="#{bean.offsetDateTime}">

            <f:convertDateTime type="offsetDateTime" />

        </h:inputText>

        <h:inputText id="zonedDateTime" value="#{bean.zonedDateTime}">

            <f:convertDateTime type="zonedDateTime" />

        </h:inputText>

        <h:commandButton value="submit" action="#{bean.submit}" />

        <h:messages showSummary="false" showDetail="true"/>

    </h:form>

    ```


    请注意，此处将 <h:messages> 重新配置为显示详细信息而非仅显示摘要，因为日期时间转换错误的详细信息在标准 JSF 中会包含一个示例值，这对最终用户理解所需格式更为有用。以下是关联的后台
    bean 的样子：


    ```

    @Named @RequestScoped

    public class Bean {


    private Date date;

        private Date time;

        private Date both;

        private LocalDate localDate;

        private LocalTime localTime;

        private LocalDateTime localDateTime;

        private OffsetTime offsetTime;

        private OffsetDateTime offsetDateTime;

        private ZonedDateTime zonedDateTime;


    public void submit() {

            System.out.println("date: " + date);

            System.out.println("time: " + time);

            System.out.println("both: " + both);

            System.out.println("localDate: " + localDate);

            System.out.println("localTime: " + localTime);

            System.out.println("localDateTime: " + localDateTime);

            System.out.println("offsetTime: " + offsetTime);

            System.out.println("offsetDateTime: " + offsetDateTime);

            System.out.println("zonedDateTime: " + zonedDateTime);

        }


    // 添加/生成 getter 和 setter 方法。

    }

    ```


    如今 HTML5 已经推出了一段时间，越来越多的浏览器支持新的 HTML5 日期和时间输入，¹² 你最好默认启用它，因为它带有非常实用的内置日期选择器。Web
    浏览器可能会以本地化格式在日期选择器中显示日期模式，但它始终会以 ISO 8601 格式提交值。因此这非常有用。HTML5 日期和时间输入可以通过将输入文本字段的
    type 属性设置为“date”、¹³ “time”¹⁴ 或“datetime-local”¹⁵（而不是“datetime”，因为它已被弃用）来激活。使用
    JSF <h:inputText> 时，你需要将其设置为传递属性。以下是一些示例：


    ```

    <h:form id="form">

        <h:inputText id="localDate" a:type="date" value="#{bean.localDate}">

            <f:convertDateTime type="localDate" pattern="yyyy-MM-dd" />

        </h:inputText>

        <h:inputText id="localTime" a:type="time" value="#{bean.localTime}">

            <f:convertDateTime type="localTime" pattern="HH:mm" />

        </h:inputText>

        <h:inputText id="localDateTime" a:type="datetime-local"

            value="#{bean.localDateTime}">

            <f:convertDateTime type="localDateTime"

                pattern="yyyy-MM-dd''T''HH:mm">

            </f:convertDateTime>

        </h:inputText>

        <h:commandButton value="submit" action="#{bean.submit}" />

        <h:messages showSummary="false" showDetail="true"/>

    </h:form>

    ```


    以下是在 Chrome 浏览器中的渲染效果（已添加换行符）：


    ![A454457_1_En_5_Figa_HTML.jpg](img/A454457_1_En_5_Figa_HTML.jpg)


    ## 标准验证器


    当提交的值在流程验证阶段（第三阶段）成功转换后，JSF 将立即对转换后的值执行验证。JSF 已经提供了一些开箱即用的标准验证器。它们都位于 javax.faces.validator
    包中，¹⁶ 并且都实现了 Validator<T> 接口。表 5-3 提供了它们的概述。

    '
- fmt: "###### Table 5-3 Standard Validators Provided by JSF\n\n| Validator class\
    \ | Validator ID | Validator tag | Value type | Since |\n| --- | --- | --- | ---\
    \ | --- |\n| `LongRangeValidator` | `javax.faces.LongRange` | `<f:validateLongRange>`\
    \ | `java.lang.Number` | 1.0 |\n| `DoubleRangeValidator` | `javax.faces.DoubleRange`\
    \ | `<f:validateDoubleRange>` | `java.lang.Number` | 1.0 |\n| `LengthValidator`\
    \ | `javax.faces.Length` | `<f:validateLength>` | `java.lang.Object` | 1.0 |\n\
    | `RegexValidator` | `javax.faces.RegularExpression` | `<f:validateRegex>` | `java.lang.String`\
    \ | 2.0 |\n| `RequiredValidator` | `javax.faces.Required` | `<f:validateRequired>`\
    \ | `java.lang.Object` | 2.0 |\n| `BeanValidator` | `javax.faces.Bean` | `<f:validateBean>`\
    \ | `java.lang.Object` | 2.0 |\n| n/a | n/a | `<f:validateWholeBean>` | `java.lang.Object`\
    \ | 2.3 |\n\nThe “Validator ID” column basically specifies the validator identifier\
    \ as you could specify in the `validator` attribute of any `EditableValueHolder`\
    \ component, or the `validatorId` attribute of any nested `<f:validator>` tag\
    \ in order to activate the specific validator. Contrary to the converter, a single\
    \ `EditableValueHolder` component can have multiple validators attached. They\
    \ will all be executed regardless of each other’s outcome.\n\n### `<f:validateLongRange>`/`<f:validateDoubleRange>`\n\
    \nThese validators allow you to specify a minimum and/or maximum allowed number\
    \ value for an input component tied to a `java.lang.Number`-based property. Those\
    \ can be specified with the `minimum` and `maximum` attributes.\n\n```\n<h:inputText\
    \ value=\"#{bean.quantity}\">\n    <f:validateLongRange minimum=\"1\" maximum=\"\
    10\" />\n</h:inputText>\n```\n\nThis is, via pass-through attributes, also combinable\
    \ with the HTML5 input types “number” (spinner) and “range” (slider), which in\
    \ turn require `min`, `max`, and optionally `step` as pass-through attributes.\
    \ In this example, `#{bean.quantity}` is just an `Integer` and `#{bean.volume}`\
    \ is a `BigDecimal`.\n\n```\n<h:inputText value=\"#{bean.quantity}\"\n    a:type=\"\
    number\" a:min=\"1\" a:max=\"10\">\n    <f:validateLongRange minimum=\"1\" maximum=\"\
    10\" />\n</h:inputText>\n<h:inputText value=\"#{bean.volume}\"\n    a:type=\"\
    range\" a:min=\"1\" a:max=\"10\" a:step=\"0.1\">\n    <f:validateLongRange minimum=\"\
    1\" maximum=\"10\" />\n</h:inputText>\n```\n\nDo note that you can just use `<f:validateLongRange>`\
    \ on a `BigDecimal` property. It doesn’t care about the actual `java.lang.Number`\
    \ type of the property being a `Long` or not, but only the specified `minimum`\
    \ and `maximum` attributes being a `Long`. In case you want to specify a fractional-based\
    \ number as `minimum` and/or `maximum`, then use `<f:validateDoubleRange>` instead.\n\
    \n```\n<h:inputText value=\"#{bean.volume}\"\n    a:type=\"range\" a:min=\"0.1\"\
    \ a:max=\"10.0\" a:step=\"0.1\">\n    <f:validateDoubleRange minimum=\"0.1\" maximum=\"\
    10.0\" />\n</h:inputText>\n```\n\n### `<f:validateLength>`/`<f:validateRegex>`\n\
    \nThese validators are primarily designed for `java.lang.String`-based properties.\
    \ `<f:validateLength>` will first convert the submitted value to string by calling\
    \ `Object#toString()` on it and then validate the `String#length()` result based\
    \ on the specified `minimum` and/or `maximum` attributes. `<f:validateRegex>`\
    \ will cast the submitted value to `String` and then check if `String#matches()`\
    \ returns `true` for the specified `pattern` attribute. In other words, it doesn’t\
    \ accept any other property type than `java.lang.String`. Imagine that you want\
    \ to validate a value to be always three digits; thus there are three possible\
    \ ways:\n\n```\n<h:inputText value=\"#{bean.someStringOrInteger}\" maxlength=\"\
    3\">\n    <f:validateLength minimum=\"3\" maximum=\"3\" />\n</h:inputText>\n\n\
    <h:inputText value=\"#{bean.someString}\" maxlength=\"3\">\n    <f:validateRegex\
    \ pattern=\"[0-9]{3}\" />\n</h:inputText>\n\n<h:inputText value=\"#{bean.someInteger}\"\
    \ maxlength=\"3\">\n    <f:validateLongRange minimum=\"100\" maximum=\"999\" />\n\
    </h:inputText>\n```\n\nThe `maxlength=\"3\"` attribute is just there so that the\
    \ end user can’t enter more than three characters on the client side anyway. Storing\
    \ numbers as strings is plain nonsense, so the second way is scratched. That leaves\
    \ us with the first or third way. Technically it does not really matter which\
    \ one you pick. The first way is arguably more self-documenting because you actually\
    \ want to validate the length, not the range.\n\nComing back to `<f:validateRegex>`,\
    \ the `pattern` attribute follows exactly the same regular expression rules as\
    \ specified in `java.util.regex.Pattern`. However, there’s one potential caveat:\
    \ the necessary amount of escape backslashes depends on the currently used EL\
    \ implementation. In Oracle’s EL implementation (`com.sun.el.*`), you need two\
    \ backslashes, exactly as in a regular Java `String`, but in Apache’s EL implementation\
    \ (`org.apache.el.*`), you must use one backslash, otherwise it will error out\
    \ or it won’t match as you’d expect. As of now, Payara, WildFly, Liberty, and\
    \ WebLogic use Oracle’s EL implementation, and TomEE and Tomcat use Apache’s EL\
    \ implementation. In other words, the following example will work on servers using\
    \ Oracle EL but won’t work on servers using Apache EL.\n\n```\n<h:inputText value=\"\
    #{bean.someString}\" maxlength=\"3\">\n    <f:validateRegex pattern=\"\\\\d{3}\"\
    \ />\n</h:inputText>\n```\n\nWhen using Apache EL, you need `pattern=\"\\d{3}\"\
    ` instead. On the other hand, the regular expression pattern `\\d` actually means\
    \ “any digit” and thus matches not only the Latin digits but also the Hebrew,\
    \ Cyrillic, Arabic, Chinese, etc. If that was not your intent, you’d better use\
    \ the `[0-9]` pattern.\n\n### `<f:validateRequired>`\n\nThis is a slightly odd\
    \ beast. That is, all `UIInput` components already have a `required` attribute\
    \ offering exactly the desired functionality. Why would you then use a whole `<f:validateRequired>`\
    \ tag instead? It was added in JSF 2.0 specifically for “Composite Components”\
    \ (more on this later, in Chapter 7). More to the point, in some composite component\
    \ compositions the template client is given the opportunity to attach converters\
    \ and validators to a specific `EditableValueHolder` interface exposed by the\
    \ composite component, which in turn references one or more `UIInput` components\
    \ enclosed in the composite component implementation. Following is an example\
    \ of such a composite component:\n\n```\n<cc:interface>\n    ...\n    <cc:editableValueHolder\n\
    \        name=\"inputs\" targets=\"input1 input3\">\n    </cc:editableValueHolder>\n\
    </cc:interface>\n<cc:implementation>\n    ...\n    <h:inputText id=\"input1\"\
    \ ... />\n    <h:inputText id=\"input2\" ... />\n    <h:inputText id=\"input3\"\
    \ ... />\n    ...\n</cc:implementation>\n```\n\nAnd following is an example of\
    \ the template client:\n\n```\n<my:compositeComponent ...>\n    <f:validateRequired\
    \ for=\"inputs\" />\n</my:compositeComponent>\n```\n\nAs you might have guessed,\
    \ the `for` attribute must exactly match the `name` attribute of exposed `<cc:editableValueHolder>`\
    \ and this validator will basically target the enclosed input components identified\
    \ by `input1` and `input3` (and thus not `input2`) and thus effectively make them\
    \ `required=\"true\"`. This `for` attribute is, by the way, also present on all\
    \ other converter and validator tags."
