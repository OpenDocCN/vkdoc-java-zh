    ## Selection Components


    JSF offers a bunch of selection components of the UISelectBoolean, UISelectOne,
    and UISelectMany component families which all extend from UIInput. Except for
    the UISelectBoolean, they all expect the available items for selection to be provided
    via <f:selectItems> or <f:selectItem> tags nested in the selection component.
    The value attribute of a UISelectBoolean component can only be bound to a bean
    property of boolean or Boolean type and doesn’t support a converter, while others
    support a converter. The value attribute of a UISelectOne component has to be
    bound to a single-value property such as String, and the value attribute of a
    UISelectMany component can only be bound to a multi-value property such as Collection<String>
    or String[].


    In real-world HTML-based web applications, the <h:selectOneListbox> (single-select
    list box) and <h:selectManyMenu> (multi-select drop-down) aren’t terribly useful.
    Generally the <h:selectOneMenu> (single-select drop-down) and <h:selectManyListBox>
    (multi-select list box) are preferred as they are more user friendly. Following
    is a basic usage example which demonstrates all selection components except for
    the aforementioned least useful ones. In case you want to use them anyway, just
    follow the demonstrated approach with a different tag name.


    Facelets file /test.xhtml:


    ```

    <h:form id="form">

        <h:selectBooleanCheckbox id="checked" value="#{bean.checked}" />

        <h:selectOneMenu id="oneMenu" value="#{bean.oneMenu}">

            <f:selectItems value="#{bean.availableItems}" />

        </h:selectOneMenu>

        <h:selectOneRadio id="oneRadio" value="#{bean.oneRadio}">

            <f:selectItems value="#{bean.availableItems}" />

        </h:selectOneRadio>

        <h:selectManyListbox id="manyListbox" value="#{bean.manyListbox}">

            <f:selectItems value="#{bean.availableItems}" />

        </h:selectManyListbox>

        <h:selectManyCheckbox id="manyCheckbox" value="#{bean.manyCheckbox}">

            <f:selectItems value="#{bean.availableItems}" />

        </h:selectManyCheckbox>

        <h:commandButton id="submit" value="Submit"

            action="#{bean.submit}" />

    </h:form>

    ```


    Backing bean class com.example.project.view.Bean:


    ```

    @Named @RequestScoped

    public class Bean {


    private boolean checked;

        private String oneMenu;

        private String oneRadio;

        private List<String> manyListbox;

        private List<String> manyCheckbox;

        private List<String> availableItems;


    @PostConstruct

        public void init() {

            availableItems = Arrays.asList("one", "two", "three");

        }


    public void submit() {

            System.out.println("Form has been submitted!");

            System.out.println("checked: " + checked);

            System.out.println("oneMenu: " + oneMenu);

            System.out.println("oneRadio: " + oneRadio);

            System.out.println("manyListbox: " + manyListbox);

            System.out.println("manyCheckbox: " + manyCheckbox);

        }


    // Add/generate getters and setters for every property here.

        // Note that availableItems property doesn’t need a setter.

    }

    ```


