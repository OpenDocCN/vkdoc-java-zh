    ## Text-Based Output Components


    These components are <h:outputText>, <h:outputFormat>, <h:outputLabel>, and <h:outputLink>.
    They all extend from the UIOutput superclass and have a value attribute which
    can be bound to a managed bean property . During the view render time, the getter
    will be consulted to retrieve and display any preset value. These components will
    never invoke the setter method and therefore it could be safely left out of the
    managed bean class in order to reduce unused code.


    Historically, in JSF 1.x on JSP (Java Server Pages ), <h:outputText> was mandatory
    in order to output a bean property as text. JSP didn’t support JSF-style EL (Expression
    Language) #{...} in template text. Facelets supported JSF-style EL #{...} in template
    text and hence bean properties could be outputted directly in Facelets without
    the need for a whole JSF component. In other words , the following codes are equivalent
    in JSF on Facelets, <h:outputText>:


    ```

    <p>Welcome, <h:outputText value="#{user.name}" />!</p>

    ```


    And EL in template text:


    ```

    <p>Welcome, #{user.name}!</p>

    ```


    It doesn’t need explanation that the latter code snippet is more terse and readable.
    <h:outputText> has, however, not become useless in Facelets. It’s still useful
    for the following purposes:


