- fmt: "## Which scope to choose?\n\nWhich scope to choose depends solely on the data\
    \ (instance variables aka the state) the bean holds and represents. You should\
    \ strive to put the state in the shortest possible acceptable scope. Start with\
    \ a `@RequestScoped` bean. Once you notice that some state needs to be retained\
    \ after a postback on the same view, split that state exactly into a new `@ViewScoped`\
    \ bean which you, in turn, `@Inject` in the `@RequestScoped` bean. Once you notice\
    \ that some state needs to be retained on another GET request within the same\
    \ session, split that state exactly into a new `@ConversationScoped` bean which\
    \ you in turn `@Inject` in the `@RequestScoped` bean. And so on.\n\nAbusing an\
    \ `@ApplicationScoped` bean for session-, conversation-, flow-, view-, or request-scoped\
    \ data would make it to be shared among all users, so anyone else can see each\
    \ other’s data, which is just plain wrong. Abusing a `@SessionScoped` bean for\
    \ conversation-, flow-, view-, or request-scoped data would make it to be shared\
    \ among all browser tabs in the same session, so the end user may experience inconsistencies\
    \ when interacting with every view after switching between tabs, which is bad\
    \ for user experience. Abusing a `@RequestScoped` bean for view-, flow-, or conversation-scoped\
    \ data would make view-, flow-, or conversation-scoped data be reinitialized to\
    \ default on every single (Ajax) postback, causing possibly non-working forms.\
    \ Abusing a `@ViewScoped`, `@FlowScoped`, or `@ConversationScoped` bean for request-,\
    \ session-, or application-scoped data, and abusing a `@SessionScoped` bean for\
    \ application-scoped data doesn’t affect the end user, but it unnecessarily occupies\
    \ server memory and is plain inefficient.\n\nNote that the scope should rather\
    \ not be chosen based on performance implications, unless you really have a low\
    \ memory footprint and want to go completely stateless. You’d then need to exclusively\
    \ use stateless forms with `@RequestScoped` beans and fiddle with request parameters\
    \ to maintain any client’s state. In other words, you would possibly need to reinvent\
    \ whatever already is being done by the `javax.faces.ViewState` hidden input field.\n\
    \n## Where Is `@FlashScoped`?\n\nAt last, JSF also supports the flash scope. It\
    \ is backed by a short living cookie which is associated with a data entry in\
    \ the session scope. Before the redirect, a cookie will be set on the HTTP response\
    \ with a value which is uniquely associated with the data entry in the session\
    \ scope. After the redirect, the presence of the flash scope cookie will be checked\
    \ and the data entry associated with the cookie will be removed from the session\
    \ scope and be put in the request scope of the redirected request. Finally the\
    \ cookie will be removed from the HTTP response. This way the redirected request\
    \ has access to request-scoped data which was been prepared in the initial request.\n\
    \nThis is actually not available as a managed bean scope by standard JSF API.\
    \ In other words, there is no such thing as `@FlashScoped`. The flash scope is\
    \ only available as a map via `ExternalContext#getFlash()` in managed beans and\
    \ `#{flash}` in EL. Historically, the flash scope was primarily introduced in\
    \ order to be able to show a faces message set in the action method in the redirected\
    \ page. Imagine the use case of saving an edited product in a detail page and\
    \ redirecting back to the master page.\n\n```\npublic String save() {\n    FacesContext\
    \ context = FacesContext.getCurrentInstance();\n\n    try {\n        productService.update(product);\n\
    \        context.addMessage(null, new FacesMessage(\"Product saved!\"));\n   \
    \     return \"/products?faces-redirect=true\";\n    }\n    catch (Exception e)\
    \ {\n        context.addMessage(null, new FacesMessage(\n            \"Cannot\
    \ save product. Error: \" + e.getMessage()));\n        return null;\n    }\n}\n\
    ```\n\nThe faces message “Product saved!” wouldn’t show up in the `<h:messages\
    \ globalOnly>` of the redirected page because faces messages are inherently request\
    \ scoped (actually, “faces context scoped”). Historically, during the JSF 1.x\
    \ era, this problem was solved with a phase listener which copies after the render\
    \ response phase all undisplayed faces messages into the HTTP session and re-adds\
    \ after the restore view phase any of them back into the faces context. Since\
    \ the introduction of the flash scope in JSF 2.0, this problem could be solved\
    \ in an easier way by simply invoking `Flash#setKeepMessages()` [^(12)](#A454457_1_En_8_Chapter.xhtml#Fn12).\n\
    \n```\nproductService.update(product);\ncontext.addMessage(null, new FacesMessage(\"\
    Product saved!\"));\ncontext.getExternalContext().getFlash().setKeepMessages(true);\n\
    return \"/products?faces-redirect=true\";\n```\n\nThis way, the faces messages\
    \ are before redirect automatically stored in the flash scope and restored after\
    \ redirect.\n\nThe flash scope is not only useful for faces messages. It’s also\
    \ useful for passing entire objects while redirecting from one view to another\
    \ view, without needing to pass some object identifier as a request parameter.\
    \ Following is an example which prepares an entity for the next step without needing\
    \ to save it in the database first:\n\n```\n@Named @RequestScoped // or @ViewScoped\n\
    public class Home {\n\n    private Product product = new Product();\n\n    public\
    \ String prepareProduct() {\n        FacesContext context = FacesContext.getCurrentInstance();\n\
    \        context.getExternalContext().getFlash().put(\"product\", product);\n\
    \        return \"/next?faces-redirect=true\";\n    }\n\n    public Product getProduct()\
    \ {\n        return product;\n    }\n}\n```\n\nWhereby the bean of the next step\
    \ looks as follows:\n\n```\n@Named @ViewScoped\npublic class Next implements Serializable\
    \ {\n\n    @Inject @ManagedProperty(\"#{flash.product}\")\n    private Product\
    \ product;\n\n    public void save() {\n        // ...\n    }\n\n    public Product\
    \ getProduct() {\n        return product;\n    }\n}\n```\n\nAnd the `/next.xhtml`\
    \ redirects back to `/home.xhtml` when the entity is absent in the flash scope.\n\
    \n```\n<f:metadata>\n    <f:viewAction action=\"/home\" if=\"#{empty flash.product}\"\
    \ />\n</f:metadata>\n```\n\nNote that this redirect will take place when you open\
    \ `/next.xhtml` directly, or when you refresh the page in the web browser. In\
    \ case you’d like to avoid that, you can instruct the flash scope to keep the\
    \ entry value in the flash scope by prefixing the entry key with the predefined\
    \ “keep” key on the `#{flash}` map.\n\n```\n@Named @RequestScoped\npublic class\
    \ Next {\n\n    @Inject @ManagedProperty(\"#{flash.keep.product}\")\n    private\
    \ Product product;\n\n    // ...\n}\n```\n\nThis way, the lifetime of the flash\
    \ scope will expand until the end user closes the browser window, or when the\
    \ application navigates to a different view, or when the underlying HTTP session\
    \ expires. This way you can even make the managed bean request scoped instead\
    \ of view scoped and not lose the entity while submitting a form in the `/next.xhtml`\
    \ page or even refreshing the page. This is a relatively powerful feature of the\
    \ flash scope."
  raw: '## Which scope to choose?


    Which scope to choose depends solely on the data (instance variables aka the state)
    the bean holds and represents. You should strive to put the state in the shortest
    possible acceptable scope. Start with a @RequestScoped bean. Once you notice that
    some state needs to be retained after a postback on the same view, split that
    state exactly into a new @ViewScoped bean which you, in turn, @Inject in the @RequestScoped
    bean. Once you notice that some state needs to be retained on another GET request
    within the same session, split that state exactly into a new @ConversationScoped
    bean which you in turn @Inject in the @RequestScoped bean. And so on.


    Abusing an @ApplicationScoped bean for session-, conversation-, flow-, view-,
    or request-scoped data would make it to be shared among all users, so anyone else
    can see each other’s data, which is just plain wrong. Abusing a @SessionScoped
    bean for conversation-, flow-, view-, or request-scoped data would make it to
    be shared among all browser tabs in the same session, so the end user may experience
    inconsistencies when interacting with every view after switching between tabs,
    which is bad for user experience. Abusing a @RequestScoped bean for view-, flow-,
    or conversation-scoped data would make view-, flow-, or conversation-scoped data
    be reinitialized to default on every single (Ajax) postback, causing possibly
    non-working forms. Abusing a @ViewScoped, @FlowScoped, or @ConversationScoped
    bean for request-, session-, or application-scoped data, and abusing a @SessionScoped
    bean for application-scoped data doesn’t affect the end user, but it unnecessarily
    occupies server memory and is plain inefficient.


    Note that the scope should rather not be chosen based on performance implications,
    unless you really have a low memory footprint and want to go completely stateless.
    You’d then need to exclusively use stateless forms with @RequestScoped beans and
    fiddle with request parameters to maintain any client’s state. In other words,
    you would possibly need to reinvent whatever already is being done by the javax.faces.ViewState
    hidden input field.


    ## Where Is @FlashScoped?


    At last, JSF also supports the flash scope. It is backed by a short living cookie
    which is associated with a data entry in the session scope. Before the redirect,
    a cookie will be set on the HTTP response with a value which is uniquely associated
    with the data entry in the session scope. After the redirect, the presence of
    the flash scope cookie will be checked and the data entry associated with the
    cookie will be removed from the session scope and be put in the request scope
    of the redirected request. Finally the cookie will be removed from the HTTP response.
    This way the redirected request has access to request-scoped data which was been
    prepared in the initial request.


    This is actually not available as a managed bean scope by standard JSF API. In
    other words, there is no such thing as @FlashScoped. The flash scope is only available
    as a map via ExternalContext#getFlash() in managed beans and #{flash} in EL. Historically,
    the flash scope was primarily introduced in order to be able to show a faces message
    set in the action method in the redirected page. Imagine the use case of saving
    an edited product in a detail page and redirecting back to the master page.


    ```

    public String save() {

        FacesContext context = FacesContext.getCurrentInstance();


    try {

            productService.update(product);

            context.addMessage(null, new FacesMessage("Product saved!"));

            return "/products?faces-redrect=true";

        }

        catch (Exception e) {

            context.addMessage(null, new FacesMessage(

                "Cannot save product. Error: " + e.getMessage()));

            return null;

        }

    }

    ```


    The faces message “Product saved!” wouldn’t show up in the <h:messages globalOnly>
    of the redirected page because faces messages are inherently request scoped (actually,
    “faces context scoped”). Historically, during the JSF 1.x era, this problem was
    solved with a phase listener which copies after the render response phase all
    undisplayed faces messages into the HTTP session and re-adds after the restore
    view phase any of them back into the faces context. Since the introduction of
    the flash scope in JSF 2.0, this problem could be solved in an easier way by simply
    invoking Flash#setKeepMessages() [^(12)](#A454457_1_En_8_Chapter.xhtml#Fn12).


    ```

    productService.update(product);

    context.addMessage(null, new FacesMessage("Product saved!"));

    context.getExternalContext().getFlash().setKeepMessages(true);

    return "/products?faces-redrect=true";

    ```


    This way, the faces messages are before redirect automatically stored in the flash
    scope and restored after redirect.


    The flash scope is not only useful for faces messages. It’s also useful for passing
    entire objects while redirecting from one view to another view, without needing
    to pass some object identifier as a request parameter . Following is an example
    which prepares an entity for the next step without needing to save it in the database
    first:


    ```

    @Named @RequestScoped // or @ViewScoped

    public class Home {


    private Product product = new Product();


    public String prepareProduct() {

            FacesContext context = FacesContext.getCurrentInstance();

            context.getExternalContext().getFlash().put("product", product);

            return "/next?faces-redirect=true";

        }


    public Product getProduct() {

            return product;

        }

    }

    ```


    Whereby the bean of the next step looks as follows:


    ```

    @Named @ViewScoped

    public class Next implements Serializable {


    @Inject @ManagedProperty("#{flash.product}")

        private Product product;


    public void save() {

            // ...

        }


    public Product getProduct() {

            return product;

        }

    }

    ```


    And the /next.xhtml redirects back to /home.xhtml when the entity is absent in
    the flash scope.


    ```

    <f:metadata>

        <f:viewAction action="/home" if="#{empty flash.product}" />

    </f:metadata>

    ```


    Note that this redirect will take place when you open /next.xhtml directly, or
    when you refresh the page in the web browser. In case you’d like to avoid that,
    you can instruct the flash scope to keep the entry value in the flash scope by
    prefixing the entry key with the predefined “keep” key on the #{flash} map.


    ```

    @Named @RequestScoped

    public class Next {


    @Inject @ManagedProperty("#{flash.keep.product}")

        private Product product;


    // ...

    }

    ```


    This way, the lifetime of the flash scope will expand until the end user closes
    the browser window, or when the application navigates to a different view, or
    when the underlying HTTP session expires. This way you can even make the managed
    bean request scoped instead of view scoped and not lose the entity while submitting
    a form in the /next.xhtml page or even refreshing the page. This is a relatively
    powerful feature of the flash scope .'
  trans: '

    ## 该选择哪种作用域？


    选择哪种作用域完全取决于 Bean 所持有和表示的数据（即实例变量，也就是状态）。你应该尽量将状态置于可接受的最短作用域内。从 `@RequestScoped`
    Bean 开始。一旦发现某些状态需要在同一视图的回发后保留，就将这些状态精确地拆分到一个新的 `@ViewScoped` Bean 中，然后将其 `@Inject`
    到 `@RequestScoped` Bean 中。一旦发现某些状态需要在同一会话内的另一个 GET 请求中保留，就将这些状态精确地拆分到一个新的 `@ConversationScoped`
    Bean 中，然后将其 `@Inject` 到 `@RequestScoped` Bean 中。以此类推。


    将 `@ApplicationScoped` Bean 滥用于会话、对话、流程、视图或请求作用域的数据，会导致这些数据在所有用户之间共享，因此任何人都能看到彼此的数据，这显然是错误的。将
    `@SessionScoped` Bean 滥用于对话、流程、视图或请求作用域的数据，会导致这些数据在同一会话的所有浏览器标签页之间共享，因此最终用户在切换标签页后与每个视图交互时可能会遇到不一致的情况，这对用户体验不利。将
    `@RequestScoped` Bean 滥用于视图、流程或对话作用域的数据，会导致视图、流程或对话作用域的数据在每次（Ajax）回发时被重新初始化为默认值，可能导致表单无法正常工作。将
    `@ViewScoped`、`@FlowScoped` 或 `@ConversationScoped` Bean 滥用于请求、会话或应用作用域的数据，以及将
    `@SessionScoped` Bean 滥用于应用作用域的数据，虽然不会影响最终用户，但会不必要地占用服务器内存，并且效率低下。


    请注意，选择作用域不应基于性能影响，除非你确实内存占用很低并且希望完全无状态。在这种情况下，你需要专门使用带有 `@RequestScoped` Bean
    的无状态表单，并通过操作请求参数来维护任何客户端的状态。换句话说，你可能需要重新发明 `javax.faces.ViewState` 隐藏输入字段已经完成的功能。


    ## `@FlashScoped` 在哪里？


    最后，JSF 也支持 Flash 作用域。它由一个短期存在的 Cookie 支持，该 Cookie 与会话作用域中的一个数据条目相关联。在重定向前，会在 HTTP
    响应上设置一个 Cookie，其值与会话作用域中的数据条目唯一关联。重定向后，会检查 Flash 作用域 Cookie 的存在，并将与该 Cookie 关联的数据条目从会话作用域中移除，然后放入重定向请求的请求作用域中。最后，该
    Cookie 会从 HTTP 响应中移除。这样，重定向后的请求就可以访问在初始请求中准备好的请求作用域数据。


    实际上，标准的 JSF API 并没有将其作为受管 Bean 作用域提供。换句话说，不存在 `@FlashScoped` 这样的注解。Flash 作用域只能通过受管
    Bean 中的 `ExternalContext#getFlash()` 和 EL 中的 `#{flash}` 作为 Map 使用。从历史上看，引入 Flash
    作用域主要是为了能够在重定向后的页面中显示在操作方法中设置的 Faces 消息。想象一下这样一个用例：在详情页面保存编辑后的产品，然后重定向回主页面。


    ```

    public String save() {

        FacesContext context = FacesContext.getCurrentInstance();


    try {

            productService.update(product);

            context.addMessage(null, new FacesMessage("产品已保存！"));

            return "/products?faces-redrect=true";

        }

        catch (Exception e) {

            context.addMessage(null, new FacesMessage(

                "无法保存产品。错误：" + e.getMessage()));

            return null;

        }

    }

    ```


    Faces 消息“产品已保存！”不会显示在重定向页面的 `<h:messages globalOnly>` 中，因为 Faces 消息本质上是请求作用域的（实际上是“Faces
    上下文作用域”）。在 JSF 1.x 时代，这个问题是通过一个阶段监听器解决的，该监听器在渲染响应阶段之后将所有未显示的 Faces 消息复制到 HTTP
    会话中，并在恢复视图阶段之后将它们重新添加回 Faces 上下文。自从 JSF 2.0 引入 Flash 作用域以来，这个问题可以通过简单地调用 `Flash#setKeepMessages()`
    ¹² 以更简单的方式解决。


    ```

    productService.update(product);

    context.addMessage(null, new FacesMessage("产品已保存！"));

    context.getExternalContext().getFlash().setKeepMessages(true);

    return "/products?faces-redrect=true";

    ```


    这样，Faces 消息会在重定向前自动存储在 Flash 作用域中，并在重定向后恢复。


    Flash 作用域不仅对 Faces 消息有用。它对于在从一个视图重定向到另一个视图时传递整个对象也很有用，而无需将某个对象标识符作为请求参数传递。以下是一个示例，它为下一步准备了一个实体，而无需先将其保存到数据库中：


    ```

    @Named @RequestScoped // 或 @ViewScoped

    public class Home {


    private Product product = new Product();


    public String prepareProduct() {

            FacesContext context = FacesContext.getCurrentInstance();

            context.getExternalContext().getFlash().put("product", product);

            return "/next?faces-redirect=true";

        }


    public Product getProduct() {

            return product;

        }

    }

    ```


    下一步的 Bean 如下所示：


    ```

    @Named @ViewScoped

    public class Next implements Serializable {


    @Inject @ManagedProperty("#{flash.product}")

        private Product product;


    public void save() {

            // ...

        }


    public Product getProduct() {

            return product;

        }

    }

    ```


    并且，当 Flash 作用域中不存在该实体时，`/next.xhtml` 会重定向回 `/home.xhtml`。


    ```

    <f:metadata>

        <f:viewAction action="/home" if="#{empty flash.product}" />

    </f:metadata>

    ```


    请注意，当你直接打开 `/next.xhtml` 或在 Web 浏览器中刷新页面时，会发生此重定向。如果你想避免这种情况，可以通过在 `#{flash}`
    Map 上的条目键前加上预定义的“keep”键，来指示 Flash 作用域保留该条目的值。


    ```

    @Named @RequestScoped

    public class Next {


    @Inject @ManagedProperty("#{flash.keep.product}")

        private Product product;


    // ...

    }

    ```


    这样，Flash 作用域的生命周期将延长，直到最终用户关闭浏览器窗口、应用程序导航到不同视图或底层 HTTP 会话过期。这样，你甚至可以使受管 Bean 成为请求作用域而不是视图作用域，并且在
    `/next.xhtml` 页面中提交表单甚至刷新页面时不会丢失实体。这是 Flash 作用域一个相对强大的功能。

