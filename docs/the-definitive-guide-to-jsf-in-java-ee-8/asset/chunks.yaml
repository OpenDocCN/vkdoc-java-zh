        <web-resource-collection>

            <web-resource-name>Bar</web-resource-name>

            <url-pattern>/bar.xhtml</url-pattern>

        </web-resource-collection>

        <auth-constraint>

            <role-name>bar</role-name>

        </auth-constraint>

    </security-constraint>

    <security-constraint>

        <web-resource-collection>

            <web-resource-name>Foo</web-resource-name>

            <url-pattern>/foo.xhtml</url-pattern>

        </web-resource-collection>

