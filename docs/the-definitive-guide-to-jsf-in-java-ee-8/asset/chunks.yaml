    \ is filled with the text “some message” and the submit button has been pressed\n\
    \nComing back to the URL, the `localhost:8080` part is by convention the default\
    \ domain of any Java EE server which is running in development mode. The same\
    \ address is also used by, among others, WildFly and TomEE. The `/project` part\
    \ is by convention the name of the Eclipse project. This is in Servlet terms called\
    \ the “context path” and obtainable by `HttpServletRequest#getContextPath()` and\
    \ in JSF delegated by `ExternalContext#getRequestContextPath()`.\n\nThe context\
    \ path part can also be set to an empty string; the deployed web application will\
    \ then end up in the domain root. In Eclipse, this can be set in the project’s\
    \ properties as well. First remove the project from the deployment using the *Add\
    \ and Remove* wizard. Then right-click the project, choose *Properties*, and select\
    \ *Web Project Settings*. Then set the *Context root* field to a forward slash\
    \ “/” and close the properties. Finally, add the project back to the deployment\
    \ using *Add and Remove* wizard. Now it will be deployed to the domain root and\
    \ you can access the JSF page by `http://localhost:8080/hello.xhtml`. We can even\
    \ get a step further by making `hello.xhtml` the default landing file so that\
    \ this also doesn’t need to be specified in the URL. This can be achieved by adding\
    \ the following entry to the `web.xml`:\n\n```\n<welcome-file-list>\n    <welcome-file>hello.xhtml</welcome-file>\n\
    </welcome-file-list>\n```\n\nNote that Payara can be configured to automatically\
    \ publish changes to the deployment whenever a resource is changed in the project.\
    \ Before saving the edited `web.xml`, double-click the Payara server in *Servers*\
    \ view, unfold the *Publishing* section, and select *Automatically publish when\
    \ resource change* along with a low interval of like 0 seconds (see Figure [2-22](#A454457_1_En_2_Chapter.xhtml#Fig22)).\n\
    \n![A454457_1_En_2_Fig22_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig22_HTML.jpg)\n\
    \n### Figure 2-22 Payara server configuration in Eclipse with automatic publishing\
    \ enabled and interval set to 0 seconds\n\nNow, save the `web.xml` and you’ll\
    \ notice that Eclipse will immediately trigger Payara to publish the changes while\
    \ still running. Coming back to the web browser, you’ll notice that the JSF page\
    \ is now also accessible by just `http://localhost:8080` (see Figure [2-23](#A454457_1_En_2_Chapter.xhtml#Fig23)).\n\
    \n![A454457_1_En_2_Fig23_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig23_HTML.jpg)\n\
    \n### Figure 2-23 The Hello World page is now at the root\n\n## Installing H2\n\
    \nH2[⁴](#A454457_1_En_2_Chapter.xhtml#Fn4) is an in-memory SQL database. It’s\
    \ an embedded database useful for quickly modeling and testing JPA entities, certainly\
    \ in combination with autogenerated SQL tables based on JPA entities. Adding H2\
    \ to your web application project is a matter of adding the following dependency\
    \ to the `<dependencies>` section of the `pom.xml`:\n\n```\n<dependency>\n   \
    \ <groupId>com.h2database</groupId>\n    <artifactId>h2</artifactId>\n    <version>1.4.196</version>\n\
    </dependency>\n```\n\nThat’s basically it. The JDBC (Java Database Connectivity)\
    \ driver is already built in.\n\n### Configuring DataSource\n\nIn order to be\
    \ able to interact with a SQL database, we need to configure a so-called data\
    \ source in the web application project. This can be done by adding the following\
    \ section to the `web.xml`:\n\n```\n<data-source>\n    <name>java:global/DataSourceName</name>\n\
    \    <class-name>org.h2.jdbcx.JdbcDataSource</class-name>\n    <url>jdbc:h2:mem:test;DB_CLOSE_DELAY=-1</url>\n\
    </data-source>\n```\n\nThe data source name represents the JNDI (Java Naming and\
    \ Directory Interface) name. The class name represents the fully qualified name\
    \ of the `javax.sql.DataSource` implementation of the JDBC driver being used.\
    \ The URL represents the JDBC driver-specific URL format. The syntax is dependent\
    \ on the JDBC driver being used. For an in-memory H2 database with a database\
    \ name of “test,” that’s thus `jdbc:h2:mem:test`. The H2-specific `DB_CLOSE_DELAY=-1`\
    \ path parameter basically instructs its JDBC driver not to automatically shut\
    \ down the database when it hasn’t been accessed for some time, even though the\
    \ application server is still running.\n\nA concrete instance of the `DataSource`\
    \ can now be injected in any servlet container managed artifact such as a servlet\
    \ or filter as follows:\n\n```\n@Resource\nprivate DataSource dataSource;\n```\n\
    \nYou could get a SQL connection from it via `DataSource#getConnection()` for\
    \ the plain old JDBC work. However, as we’re going to use Java EE, it’s better\
    \ to use Java EE’s own JPA for this instead.\n\n### Configuring JPA\n\nIn order\
    \ to familiarize JPA with the newly added data source, we need to add a new persistence\
    \ unit to the `persistence.xml` which uses the data source as a JTA data source.\n\
    \n```\n<persistence-unit name=\"PersistenceUnitName\" transaction-type=\"JTA\"\
    >\n    <jta-data-source>java:global/DataSourceName</jta-data-source>\n\n    <properties>\n\
    \        <property\n            name=\"javax.persistence.schema-generation.database.action\"\
    \n            value=\"drop-and-create\" />\n    </properties>\n</persistence-unit>\n\
    ```\n\nYou see, the data source is identified by its JNDI name. You’ll also notice\
    \ a JPA-specific `javax.persistence.schema-generation.database.action` property\
    \ with a value of “drop-and-create” which basically means that the web application\
    \ should automatically drop and create all SQL tables based on JPA entities. This\
    \ is, of course, only useful for prototyping purposes, as we’re going to do with\
    \ this project in the rest of the book. For real-world applications, you’d better\
    \ pick either “create” or “none” (which is the default). The transaction type\
    \ being set to “JTA” basically means that the application server should automatically\
    \ manage database transactions. This way every method invocation on an EJB from\
    \ its client (usually, a JSF backing bean) transparently starts a new transaction\
    \ and when the EJB method returns to the client (usually, the calling backing\
    \ bean), the transaction is automatically committed and flushed. And, any runtime\
    \ exception from an EJB method automatically rolls back the transaction.\n\n###\
    \ Creating the JPA Entity\n\nNow we’re going to create a JPA entity. Basically,\
    \ it’s a JavaBean class which represents a single record of a database table.\
    \ Each bean property is mapped to a particular column of the database table. Normally,\
    \ JPA entities are modeled against existing database tables. But, as you’ve read\
    \ in the previous section, “Configuring JPA,” about the `persistence.xml`, it’s\
    \ also possible to do it the other way round: database tables are generated based\
    \ on JPA entities.\n\nRight-click the `src/main/java` folder of the project and\
    \ choose *New ➤ JPA Entity*. In the wizard, set the *Package* to `com.example.project.model`\
    \ and set the *Name* to `Message`. The rest of the fields can be kept default\
    \ or empty (see Figure [2-24](#A454457_1_En_2_Chapter.xhtml#Fig24)).\n\n![A454457_1_En_2_Fig24_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig24_HTML.jpg)"
