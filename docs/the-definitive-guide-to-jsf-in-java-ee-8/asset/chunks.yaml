    \ the `loginToContinue` attribute to use a redirect instead.\n\n```\n@CustomFormAuthenticationMechanismDefinition(\n\
    \    loginToContinue = @LoginToContinue(\n        loginPage = \"/login.xhtml\"\
    ,\n        useForwardToLogin = false,\n        errorPage = \"\"\n    )\n)\n@FacesConfig\
    \ @ApplicationScoped\npublic class ApplicationConfig {\n    // ...\n}\n```"
  raw: '## Setting the Authentication Mechanism


    After the security constraints have been defined, we need to set how the caller
    will authenticate. The artifact that handles the interaction with the caller (i.e.,
    asks the caller for credentials in a certain way) is called an “authentication
    mechanism.” Java EE provides a number of these out of the box. The Servlet spec
    provides four, namely, FORM, BASIC, DIGEST, and CERT, while Java EE Security provides
    FORM and BASIC as well (with the difference that these correspond to CDI beans),
    but also a variant of FORM called “Custom FORM”.


    FORM and Custom FORM are both suitable for interactive web applications, such
    as the ones we would build primarily with JSF. Contrary to, say, BASIC, the FORM
    authentication mechanisms call back into the application and let it render the
    form that asks the caller for credentials, hence, the name of these mechanisms.


    The difference between the two is mainly in how the mechanism requires the application
    to continue the so-called authentication dialog after it has rendered the form.
    In FORM this is done by letting the caller post the filled-out form to the virtual
    URL j_security_check, while in Custom FORM this is done programmatically via a
    call to the injected SecurityContext. This small difference makes all the difference
    for JSF though. In JSF, a form view by default submits to the same URL it was
    requested from, so posting back to a single mechanism mandated URL is not at all
    natural. In addition to that, in JSF we often need to have server-side code running
    after a postback; just think about converters and validators and the ability to
    emit a faces message. We can’t really do any of this if we have to post back to
    the virtual non-faces j_security_check URL, but it’s quite doable when we can
    continue the authentication dialog programmatically from the backing bean’s action
    method.


    We’ll first show you how to configure a web application to use the Custom FORM
    authentication mechanism. Later on, we’ll explain how to actually use JSF to fulfill
    the requirements this mechanism imposes on the application.


    All of the authentication mechanisms provided by Java EE Security are installed
    and configured via its own AuthenticationMechanismDefinition annotation . This
    annotation tells the container which type of authentication mechanism to install,
    and with which configuration. The annotation can be placed on pretty much every
    class on the classpath. Logically it fits in quite well with the @FacesConfig
    annotation . The following shows an example:


    ```

    @CustomFormAuthenticationMechanismDefinition(

        loginToContinue = @LoginToContinue(

            loginPage = "/login.xhtml",

            errorPage = ""

        )

    )

    @FacesConfig @ApplicationScoped

    public class ApplicationConfig {

        // ...

    }

    ```


    A perhaps somewhat unfortunate requirement here is that the errorPage attribute
    has to be specified and set to the empty string. This is needed since the *@LoginToContinue*
    element has a default value for an actual error page. In JSF we rarely use an
    explicit error page to display errors but instead redisplay the original page
    with the error messages rendered on it via faces messages.


    Do note that the current version of Java EE Security only allows one authentication
    mechanism to be active at the same time. Technically what happens when the container
    encounters the @CustomFormAuthenticationMechanismDefinition annotation is that
    it adds an enabled CDI bean to the system of type HttpAuthenticationMechanism.
    This is important to know, since its being a regular CDI bean means we can inject
    it, decorate it, intercept it, and basically do everything with it that we can
    normally do with CDI beans.


    The loginToContinue attribute is used to configure the view that the container
    forwards to whenever the caller tries to access a protected view. This is called
    “container initiated authentication”; the container starts the authentication
    dialog as opposed to the application.


    Note that the default is to *forward* to the login page, meaning that if the caller
    tries to access [https://example.com/foo.xhtml](https://example.com/foo.xhtml)
    , and /foo.xhtml is protected, the caller will still see /foo.xhtml in the address
    bar and not /login.xhtml. However, the postback is to /login.xhtml, so after entering
    credentials the caller would get to see this in the address bar. Alternatively
    we can configure the loginToContinue attribute to use a redirect instead.


    ```

    @CustomFormAuthenticationMechanismDefinition(

        loginToContinue = @LoginToContinue(

            loginPage = "/login.xhtml",

            useForwardToLogin = false,

            errorPage = ""

        )

    )

    @FacesConfig @ApplicationScoped

    public class ApplicationConfig {

        // ...

    }

    ```'
  trans: '

    ## 设置认证机制


    在定义安全约束之后，我们需要设置调用者如何进行认证。负责与调用者交互（即以特定方式要求调用者提供凭证）的组件被称为“认证机制”。Java EE 提供了多种现成的认证机制。Servlet
    规范提供了四种，即 FORM、BASIC、DIGEST 和 CERT，而 Java EE Security 也提供了 FORM 和 BASIC（区别在于它们对应的是
    CDI bean），同时还提供了一种名为“Custom FORM”的 FORM 变体。


    FORM 和 Custom FORM 都适用于交互式 Web 应用程序，例如我们主要使用 JSF 构建的那些应用。与 BASIC 等机制不同，FORM 认证机制会回调应用程序，让其渲染要求调用者提供凭证的表单，这也是这些机制名称的由来。


    两者之间的主要区别在于，机制在渲染表单后要求应用程序如何继续所谓的认证对话。在 FORM 中，这是通过让调用者将填写好的表单提交到虚拟 URL `j_security_check`
    来实现的；而在 Custom FORM 中，这是通过调用注入的 `SecurityContext` 以编程方式完成的。不过，这个微小的区别对 JSF 来说却至关重要。在
    JSF 中，表单视图默认会提交到其请求来源的同一 URL，因此回发到机制强制指定的单一 URL 并不自然。除此之外，在 JSF 中，我们经常需要在回发后运行服务器端代码；想想转换器、验证器以及显示
    faces 消息的能力。如果我们必须回发到虚拟的非 faces 的 `j_security_check` URL，这些功能几乎都无法实现，但当我们能够从后台
    bean 的动作方法中以编程方式继续认证对话时，这些就变得相当可行了。


    我们将首先向您展示如何配置 Web 应用程序以使用 Custom FORM 认证机制。之后，我们将解释如何实际使用 JSF 来满足该机制对应用程序提出的要求。


    Java EE Security 提供的所有认证机制都通过其自身的 `AuthenticationMechanismDefinition` 注解进行安装和配置。该注解告诉容器要安装哪种类型的认证机制以及使用何种配置。该注解可以放置在类路径上的几乎所有类上。从逻辑上讲，它与
    `@FacesConfig` 注解非常契合。以下是一个示例：


    ```

    @CustomFormAuthenticationMechanismDefinition(

        loginToContinue = @LoginToContinue(

            loginPage = "/login.xhtml",

            errorPage = ""

        )

    )

    @FacesConfig @ApplicationScoped

    public class ApplicationConfig {

        // ...

    }

    ```


    这里一个可能不太理想的要求是，必须指定 `errorPage` 属性并将其设置为空字符串。之所以需要这样，是因为 *@LoginToContinue* 元素为实际的错误页面提供了一个默认值。在
    JSF 中，我们很少使用显式的错误页面来显示错误，而是重新显示原始页面，并通过 faces 消息在其上渲染错误信息。


    请注意，当前版本的 Java EE Security 只允许同时激活一个认证机制。从技术上讲，当容器遇到 `@CustomFormAuthenticationMechanismDefinition`
    注解时，它会在系统中添加一个类型为 `HttpAuthenticationMechanism` 的已启用 CDI bean。了解这一点很重要，因为它是一个常规的
    CDI bean，意味着我们可以注入它、装饰它、拦截它，并且基本上可以对其执行我们通常对 CDI bean 能做的所有操作。


    `loginToContinue` 属性用于配置当调用者试图访问受保护视图时容器转发到的视图。这被称为“容器发起的认证”；由容器启动认证对话，而非应用程序。


    请注意，默认是*转发*到登录页面，这意味着如果调用者试图访问 [`example.com/foo.xhtml`](https://example.com/foo.xhtml)
    ，并且 `/foo.xhtml` 是受保护的，调用者地址栏中仍将显示 `/foo.xhtml`，而不是 `/login.xhtml`。然而，回发目标是 `/login.xhtml`，因此在输入凭证后，调用者会在地址栏中看到这个地址。或者，我们也可以配置
    `loginToContinue` 属性以使用重定向。


    ```

    @CustomFormAuthenticationMechanismDefinition(

        loginToContinue = @LoginToContinue(

            loginPage = "/login.xhtml",

            useForwardToLogin = false,

            errorPage = ""

        )

    )

    @FacesConfig @ApplicationScoped

    public class ApplicationConfig {

        // ...

    }

    ```

