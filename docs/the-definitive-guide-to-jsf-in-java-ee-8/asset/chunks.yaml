    \ you can substitute EL in template text with input components as follows:\n\n\
    ```\n<h:form id=\"list\">\n    <h:dataTable id=\"products\" value=\"#{products.list}\"\
    \ var=\"product\">\n        <h:column>\n            <f:facet name=\"header\">ID</f:facet>\n\
    \            #{product.id}\n        </h:column>\n        <h:column>\n        \
    \    <f:facet name=\"header\">Name</f:facet>\n            <h:inputText id=\"name\"\
    \ value=\"#{product.name}\" />\n            <h:message for=\"name\" />\n     \
    \   </h:column>\n        <h:column>\n            <f:facet name=\"header\">Description</f:facet>\n\
    \            <h:inputTextarea id=\"description\"\n                value=\"#{product.description}\"\
    >\n            </h:inputTextarea>\n            <h:message for=\"description\"\
    \ />\n        </h:column>\n    </h:dataTable>\n    <h:commandButton id=\"save\"\
    \ value=\"Save\" action=\"#{products.save}\">\n        <f:ajax execute=\"@form\"\
    \ render=\"@form\" />\n    </h:commandButton>\n</h:form>\n```\n\nWhereby the `save()`\
    \ method of the backing bean class basically looks as follows, after having changed\
    \ the backing bean class to be a `@ViewScoped` one instead of a `@RequestScoped`\
    \ one:\n\n```\npublic void save() {\n    productService.update(products);\n}\n\
    ```\n\nAnd the `update()` method of the service class in turn looks as follows:\n\
    \n```\n@TransactionAttribute(REQUIRED)\npublic void update(Iterable<Product> products)\
    \ {\n    products.forEach(entityManager::merge);\n}\n```\n\nNote that you don’t\
    \ need to worry at all about collecting the submitted values. JSF has already\
    \ done that task for you. Also note that you don’t need to worry about uniqueness\
    \ of the component IDs within `<h:dataTable>`, as that component already implements\
    \ the `NamingContainer` interface and prepends its own client ID and the iteration\
    \ index to the client ID of the child components, as you can see in the following\
    \ generated HTML output:\n\n```\n<table id=\"list:products\">\n    <thead>\n \
    \       <tr>\n            <th scope=\"col\">ID</th>\n            <th scope=\"\
    col\">Name</th>\n            <th scope=\"col\">Description</th>\n        </tr>\n\
    \    </thead>\n    <tbody>\n        <tr>\n            <td>3</td>\n           \
    \ <td>\n                <input id=\"list:products:0:name\" type=\"text\"\n   \
    \                 name=\"list:products:0:name\" value=\"Three\">\n           \
    \     </input>\n            </td>\n            <td>\n                <textarea\
    \ id=\"list:products:0:description\"\n                    name=\"list:products:0:description\"\
    \n                >The third product</textarea>\n            </td>\n        </tr>\n\
    \        <tr>\n            <td>2</td>\n            <td>\n                <input\
    \ id=\"list:products:1:name\" type=\"text\"\n                    name=\"list:products:1:name\"\
    \ value=\"Two\">\n                </input>\n            </td>\n            <td>\n\
    \                <textarea id=\"list:products:1:description\"\n              \
    \      name=\"list:products:1:description\"\n                >The second product</textarea>\n\
    \            </td>\n        </tr>\n        <tr>\n            <td>1</td>\n    \
    \        <td>\n                <input id=\"list:products:2:name\" type=\"text\"\
    \n                    name=\"list:products:2:name\" value=\"One\">\n         \
    \       </input>\n            </td>\n            <td>\n                <textarea\
    \ id=\"list:products:2:description\"\n                    name=\"list:products:2:description\"\
    \n                >The first product</textarea>\n            </td>\n        </tr>\n\
    \    </tbody>\n</table>\n```\n\nIt must be said that having an editable table\
    \ like this is not terribly efficient, certainly not when the table contains a\
    \ lot of columns and rows. JSF can handle it pretty well; only the average web\
    \ browser will have a hard time handling it, certainly when the number of rows\
    \ exceeds a few thousand. And then I’m not speaking about the end user potentially\
    \ going crazy from scrolling through the whole page all the time and basically\
    \ having no clear overview. There are several solutions to this: first and foremost\
    \ is pagination; second is filtering; third is row-based inline editing and updating;\
    \ and fourth is external editing in a dialog or detail page.\n\nAll the mentioned\
    \ table-specific performance and usability solutions are not offered by the standard\
    \ `<h:dataTable>` and therefore require quite an amount of custom code. It’s strongly\
    \ recommended that you look for an existing JSF component library supporting these\
    \ features in order to make your JSF life easier without the need to reinvent\
    \ the wheel. Currently the most widely used one is PrimeFaces with its `<p:dataTable>`.[⁹](#A454457_1_En_6_Chapter.xhtml#Fn9)\
    \ This can even be further simplified with `<op:dataTable>` of OptimusFaces,[^(10)](#A454457_1_En_6_Chapter.xhtml#Fn10)\
    \ which is in turn based on `<p:dataTable>`. Editing in a detail page is only\
    \ doable with standard JSF, and it’s demonstrated in the “Custom Converters” section\
    \ of Chapter [5](#A454457_1_En_5_Chapter.xhtml).\n\nIt should be said that in\
    \ the specific case of the previously shown `List<String>` example, turning the\
    \ column from output to input isn’t as easily done as with the `List<Product>`\
    \ example. In other words, the following example won’t work at all.\n\n```\n<h:form>\n\
    \    <h:dataTable value=\"#{bean.strings}\" var=\"string\">\n        <h:column>\n\
    \            <h:inputText value=\"#{string}\" />\n        </h:column>\n    </h:dataTable>\n\
    \    <h:commandButton value=\"Save\" action=\"#{bean.save}\">\n        <f:ajax\
    \ execute=\"@form\" />\n    </h:commandButton>\n</h:form>\n```\n\nThe technical\
    \ problem is that `java.lang.String` is immutable and doesn’t have a public setter\
    \ method for its internal value. True, it indeed also doesn’t have a getter, but\
    \ EL already defaults to `Object#toString()` which in case of `String` just returns\
    \ the very string itself. This can be solved by referencing the model value by\
    \ an index as follows:\n\n```\n<h:form>\n    <h:dataTable binding=\"#{table}\"\
    \ value=\"#{bean.strings}\" var=\"string\">\n        <h:column>\n            <h:inputText\
    \ value=\"#{bean.strings[table.rowIndex]}\" />\n        </h:column>\n    </h:dataTable>\n\
    \    <h:commandButton value=\"Save\" action=\"#{bean.save}\">\n        <f:ajax\
    \ execute=\"@form\" />\n    </h:commandButton>\n</h:form>\n```\n\nNote the `binding`\
    \ attribute. Basically, during the view build time, this sets the current `UIComponent`\
    \ instance as an EL variable identified by the given name. In this particular\
    \ snippet, it will thus make the `#{table}` variable to reference the concrete\
    \ `HtmlDataTable` instance behind the `<h:dataTable>` tag. The `#{table}` variable\
    \ is, then during the view build time, referenceable only after the tag location\
    \ in the view and during the view render time anywhere in the view. In this way,\
    \ you can access its properties as if it were a bean. `#{table.rowIndex}` basically\
    \ thus refers to the `UIData#getRowIndex()` method,[^(11)](#A454457_1_En_6_Chapter.xhtml#Fn11)\
    \ which returns the current iteration index. And, finally, this is used to reference\
    \ the item of interest in the list. During the update model values phase (fourth\
    \ phase) JSF will simply replace the item at the specified index.\n\nAlso for\
    \ the `binding` attribute it’s very important that the variable name shouldn’t\
    \ clash with existing managed bean names or implicit EL objects and for sure not\
    \ with other components in the same view. You can alternatively let the `binding`\
    \ attribute reference a backing bean property as follows:\n\n```\n<h:dataTable\
    \ binding=\"#{bean.table}\" ...>\n```\n\nWith:\n\n```\nprivate UIData table; //\
    \ +getter +setter\n```"
  raw: '### Editable <h:dataTable>


    As to form components nested inside <h:column>, you can substitute EL in template
    text with input components as follows:


    ```

    <h:form id="list">

        <h:dataTable id="products" value="#{products.list}" var="product">

            <h:column>

                <f:facet name="header">ID</f:facet>

                #{product.id}

            </h:column>

            <h:column>

                <f:facet name="header">Name</f:facet>

                <h:inputText id="name" value="#{product.name}" />

                <h:message for="name" />

            </h:column>

            <h:column>

                <f:facet name="header">Description</f:facet>

                <h:inputTextarea id="description"

                    value="#{product.description}">

                </h:inputTextarea>

                <h:message for="description" />

            </h:column>

        </h:dataTable>

        <h:commandButton id="save" value="Save" action="#{products.save}">

            <f:ajax execute="@form" render="@form" />

        </h:commandButton>

    </h:form>

    ```


    Whereby the save() method of the backing bean class basically looks as follows,
    after having changed the backing bean class to be a @ViewScoped one instead of
    a @RequestScoped one:


    ```

    public void save() {

        productService.update(products);

    }

    ```


    And the update() method of the service class in turn looks as follows:


    ```

    @TransactionAttribute(REQUIRED)

    public void update(Iterable<Product> products) {

        products.forEach(entityManager::merge);

    }

    ```


    Note that you don’t need to worry at all about collecting the submitted values.
    JSF has already done that task for you. Also note that you don’t need to worry
    about uniqueness of the component IDs within <h:dataTable>, as that component
    already implements the NamingContainer interface and prepends its own client ID
    and the iteration index to the client ID of the child components , as you can
    see in the following generated HTML output:


    ```

    <table id="list:products">

        <thead>

            <tr>

                <th scope="col">ID</th>

                <th scope="col">Name</th>

                <th scope="col">Description</th>

            </tr>

        </thead>

        <tbody>

            <tr>

                <td>3</td>

                <td>

                    <input id="list:products:0:name" type="text"

                        name="list:products:0:name" value="Three">

                    </input>

                </td>

                <td>

                    <textarea id="list:products:0:description"

                        name="list:products:0:description"

                    >The third product</textarea>

                </td>

            </tr>

            <tr>

                <td>2</td>

                <td>

                    <input id="list:products:1:name" type="text"

                        name="list:products:1:name" value="Two">

                    </input>

                </td>

                <td>

                    <textarea id="list:products:1:description"

                        name="list:products:1:description"

                    >The second product</textarea>

                </td>

            </tr>

            <tr>

                <td>1</td>

                <td>

                    <input id="list:products:2:name" type="text"

                        name="list:products:2:name" value="One">

                    </input>

                </td>

                <td>

                    <textarea id="list:products:2:description"

                        name="list:products:2:description"

                    >The first product</textarea>

                </td>

            </tr>

        </tbody>

    </table>

    ```


    It must be said that having an editable table like this is not terribly efficient,
    certainly not when the table contains a lot of columns and rows . JSF can handle
    it pretty well; only the average web browser will have a hard time handling it,
    certainly when the number of rows exceeds a few thousand. And then I’m not speaking
    about the end user potentially going crazy from scrolling through the whole page
    all the time and basically having no clear overview. There are several solutions
    to this: first and foremost is pagination; second is filtering; third is row-based
    inline editing and updating; and fourth is external editing in a dialog or detail
    page.


    All the mentioned table-specific performance and usability solutions are not offered
    by the standard <h:dataTable> and therefore require quite an amount of custom
    code. It’s strongly recommended that you look for an existing JSF component library
    supporting these features in order to make your JSF life easier without the need
    to reinvent the wheel. Currently the most widely used one is PrimeFaces with its
    <p:dataTable>.[⁹](#A454457_1_En_6_Chapter.xhtml#Fn9) This can even be further
    simplified with <op:dataTable> of OptimusFaces,[^(10)](#A454457_1_En_6_Chapter.xhtml#Fn10)
    which is in turn based on <p:dataTable>. Editing in a detail page is only doable
    with standard JSF, and it’s demonstrated in the “Custom Converters” section of
    Chapter [5](#A454457_1_En_5_Chapter.xhtml).


    It should be said that in the specific case of the previously shown List<String>
    example, turning the column from output to input isn’t as easily done as with
    the List<Product> example. In other words , the following example won’t work at
    all.


    ```

    <h:form>

        <h:dataTable value="#{bean.strings}" var="string">

            <h:column>

                <h:inputText value="#{string}" />

            </h:column>

        </h:dataTable>

        <h:commandButton value="Save" action="#{bean.save}">

            <f:ajax execute="@form" />

        </h:commandButton>

    </h:form>

    ```


    The technical problem is that java.lang.String is immutable and doesn’t have a
    public setter method for its internal value. True, it indeed also doesn’t have
    a getter, but EL already defaults to Object#toString() which in case of String
    just returns the very string itself. This can be solved by referencing the model
    value by an index as follows:


    ```

    <h:form>

        <h:dataTable binding="#{table}" value="#{bean.strings}" var="string">

            <h:column>

                <h:inputText value="#{bean.strings[table.rowIndex]}" />

            </h:column>

        </h:dataTable>

        <h:commandButton value="Save" action="#{bean.save}">

            <f:ajax execute="@form" />

        </h:commandButton>

    </h:form>

    ```


    Note the binding attribute. Basically, during the view build time, this sets the
    current UIComponent instance as an EL variable identified by the given name. In
    this particular snippet, it will thus make the #{table} variable to reference
    the concrete HtmlDataTable instance behind the <h:dataTable> tag. The #{table}
    variable is, then during the view build time, referenceable only after the tag
    location in the view and during the view render time anywhere in the view. In
    this way, you can access its properties as if it were a bean. #{table.rowIndex}
    basically thus refers to the UIData#getRowIndex() method,[^(11)](#A454457_1_En_6_Chapter.xhtml#Fn11)
    which returns the current iteration index. And, finally, this is used to reference
    the item of interest in the list. During the update model values phase (fourth
    phase) JSF will simply replace the item at the specified index.


    Also for the binding attribute it’s very important that the variable name shouldn’t
    clash with existing managed bean names or implicit EL objects and for sure not
    with other components in the same view. You can alternatively let the binding
    attribute reference a backing bean property as follows:


    ```

    <h:dataTable binding="#{bean.table}" ...>

    ```


    With:


    ```

    private UIData table; // +getter +setter

    ```'
