    # 8. 支持 Bean


    Bauke Scholtz^(1 ) 和 Arjan Tijms²


    (1)威廉斯塔德，库拉索


    (2)阿姆斯特丹，北荷兰省，荷兰


    “支持 bean”是一个 JSF 特有的概念。它代表最终用作“受管 bean”的单一 JavaBean 类，负责在 JSF 页面中提供数据、操作和/或 UI（用户界面）组件。


    ## 模型、视图还是控制器？


    JSF（JavaServer Faces）是一个 MVC（模型-视图-控制器）框架。这是一种广泛应用于软件应用程序的架构设计模式，其根源在于桌面应用程序开发。¹


    从 JSF 框架的角度来看，模型由支持 bean 表示，视图由组件树表示，而组件树通常定义在 Facelets 文件中，控制器由 JSF 已提供的 FacesServlet
    表示。然而，从 Java EE 应用服务器的角度来看，模型由服务层表示，服务层通常定义在 EJB（企业 JavaBeans）类和 JPA（Java 持久化
    API）实体中，视图由你所有基于 JSF 的代码表示，控制器是 FacesServlet。从 JSF 开发者的角度来看，模型由服务层表示，视图由 Facelets
    文件表示，控制器由支持 bean 表示。


    因此，支持 bean 类可以是模型、视图或控制器，具体取决于你的视角，而服务层始终是模型，Facelets 文件始终是视图，FacesServlet 始终是控制器。请注意，在此上下文中，“JSF
    开发者”就是你，你正在使用 JSF 框架为 Java EE 应用服务器开发 Web 应用程序。


    图 8-1 说明了支持 bean 在 JSF 的 MVC 范式中的位置。这是一个维恩图，其中控制器和视图的交集由 JSF 组件树表示，该组件树可以通过组件的
    `binding` 属性绑定到支持 bean。视图和模型的交集由 EL（表达式语言）值表达式的属性 getter 和 setter 表示，这些表达式通常通过组件的
    `value` 属性绑定到支持 bean。控制器和模型的交集由 EL 方法表达式的操作方法调用表示，这些表达式可以通过组件的 `action` 属性绑定到支持
    bean。最后，所有交集的交集由支持 bean 本身表示。


    ![A454457_1_En_8_Fig1_HTML.jpg](img/A454457_1_En_8_Fig1_HTML.jpg)

