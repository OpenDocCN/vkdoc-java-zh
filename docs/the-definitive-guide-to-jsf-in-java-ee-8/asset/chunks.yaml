  trans: '

    ## 深入解析 Mojarra 的 f:websocket 实现


    <f:websocket> API 规定了以下类和方法：


    *   `javax.faces.push.Push`，一个用于 `@Inject` 的 CDI 限定符。借助此限定符，可以指定套接字通道名称。


    *   `javax.faces.push.PushContext`，一个包含三个 `send()` 方法的接口：`send(String message)`、`send(String
    message, S user)` 和 `send(String message, Collection<S> users)`。所有这些方法都将推送消息作为
    `Object` 接收，并在 JavaScript 端将其转换为 JSON 字符串。每个消息都返回 `Future<Void>`。如果返回 `null`，则表示目标套接字根本未打开。如果在调用
    `Future#get()` 方法时未抛出 `ExecutionException`，则表示消息已成功送达。


    *   `javax.faces.component.UIWebsocket`，一个实现了 `ClientBehaviorHolder` 的组件，用于支持嵌套的
    `<f:ajax>`。从历史上看，原型标签使用的是 `TagHandler` 而非 `UIComponent`。后来决定让该标签支持 `<f:ajax>`，因为这会使复杂且有状态的
    UI 更新变得更加容易。然而，让 `TagHandler` 实现 `ClientBehaviorHolder` 并受益于所有内置的 Ajax 魔法是不可能的，因此才转换为了
    `UIComponent`。


    *   `ViewHandler#getWebsocketURL()` 方法，它接收一个通道名称，并借助 `ExternalContext#encodeWebsocketURL()`
    返回 `ws://host:port/context/javax.faces.push/channel` 形式的绝对 WebSocket URL。


    *   `ExternalContext#encodeWebsocketURL()` 方法，它基本上接收一个 `/context/javax.faces.push/channel`
    形式的相对 WebSocket URI，并返回绝对 WebSocket URL。


    实际的实现相当广泛。它直接基于 OmniFaces 的 `<o:socket>` ⁴，并在此处和彼处进行了一些调整，例如在 JavaScript API 函数中使用组件的客户端
    ID 而不是通道名称。


    *   `com.sun.faces.renderkit.html_basic.WebsocketRenderer`，一个 Faces 渲染器类，它在编码期间将套接字通道、作用域和用户注册到
    `WebsocketChannelManager`，并从中检索 WebSocket URL。然后，它会自动包含包含必要 `javax.push.*` 函数的
    `jsf.js` 脚本，并渲染 `jsf.push.init(...)` 内联脚本函数调用，其中将 WebSocket URL 作为参数之一。此函数应在 JavaScript
    中创建一个新的 `WebSocket(url)`。`WebsocketRenderer` 还会将 `WebsocketFacesListener` 订阅到当前视图。


    *   `com.sun.faces.push.WebsocketChannelManager`，一个会话作用域的 CDI 托管 Bean，它跟踪所有已注册的
    `<f:websocket>` 通道、作用域和用户，并确保每个套接字都有其唯一的通道标识符。它会将每个通道标识符注册到 `WebsocketSessionManager`，并将面向用户的套接字的通道标识符注册到
    `WebsocketUserManager`。


    *   `com.sun.faces.push.WebsocketFacesListener`，一个系统事件监听器，它监听 `PreRenderViewEvent`，并根据
    `connected` 属性是否表示在 Ajax 请求期间发生更改的动态 EL 表达式，在必要时渲染 `jsf.push.open(...)` 或 `jsf.push.close(...)`
    内联脚本函数调用。


    *   `com.sun.faces.push.WebsocketEndpoint`，一个实现了 JSR-356 `javax.websocket.Endpoint`
    的类，并监听 URI 模板 `/javax.faces.push/{channel}`。当在客户端 JavaScript 中创建并打开一个新的 `WebSocket(url)`
    时，会在服务器端 Java 中创建一个新的 `javax.websocket.Session`，并且 `WebsocketEndpoint` 会将此 `Session`
    添加到 `WebsocketSessionManager`。同样地，当套接字关闭时，`WebsocketEndpoint` 会将其从 `WebsocketSessionManager`
    中移除。


    *   `com.sun.faces.push.WebsocketSessionManager`，一个应用作用域的 CDI 托管 Bean，它收集所有已打开的套接字会话，并验证其唯一的
    WebSocket URL 是否已由 `WebsocketChannelManager` 注册。


    *   `com.sun.faces.push.WebsocketUserManager`，一个应用作用域的 CDI 托管 Bean，它收集所有已打开的面向用户的套接字的通道标识符。


    *   `com.sun.faces.push.WebsocketPushContext`，`PushContext` 接口的具体实现。它通过 `WebsocketSessionManager`
    发送推送消息，并在必要时通过 `WebsocketUserManager` 获取面向用户的通道。


    *   `com.sun.faces.push.WebsocketPushContextProducer`，CDI 生产者，它根据从 `@Push` 限定符、`WebsocketSessionManager`
    和 `WebsocketUserManager` 获取的通道名称创建 `WebsocketPushContext` 实例。


