- fmt: 'However, it still doesn’t work. Under the hood, inside the nested composite,
    when the EL evaluator comes to `#{cc.parent}` and attempts to evaluate `"attrs.value"`
    on it, then the parent composite component would return yet another EL expression
    in form of `#{cc.attrs.value}` which ultimately gets evaluated. However, the `#{cc}`
    part still gets interpreted as “current composite component,” which is inside
    the nested composite component and thus the nested composite itself.


    We could only solve it to let the parent composite component not return yet another
    EL expression but instead the already-evaluated value. This can be achieved by
    overriding `UIComponent#setValueExpression()` in the backing component where you
    check whether the `ValueExpression` representing `#{cc.attrs.value}` is about
    to be set on the component and then immediately evaluate it and store the result
    as a local variable of the composite component. This shouldn’t cause harm as it’s
    supposed to be a read-only attribute.


    ```

    @FacesComponent("messageComposite")

    public class MessageComposite extends UINamingContainer {


    private Message message;


    @Override

        public void setValueExpression

            (String attributeName, ValueExpression expression)

        {

            if ("value".equals(attributeName)) {

                ELContext elContext = getFacesContext().getELContext();

                message = (Message) expression.getValue(elContext);

            }

            else {

                super.setValueExpression(attributeName, expression);

            }

        }


    public Message getMessage() {

            return message;

        }

    }

    ```


    With this backing component in place, and replacing `"attrs.value"` by `"message"`,
    it finally works.


    ```

    <cc:interface componentType="messageComposite">

        <cc:attribute name="value" type="com.example.Message" />

    </cc:interface>

    <cc:implementation>

        #{cc.message.text}

        <c:if test="#{not empty cc.message.replies}">

            <ul>

                <c:forEach items="#{cc.message.replies}" varStatus="loop">

                    <li>

                        <t:message

                            value="#{cc.parent.message.replies[loop.index]}">

                        </t:message>

                    </li>

                </c:forEach>

            </ul>

        </c:if>

    </cc:implementation>

    ```


    ## Implicit EL Objects


    In Facelets files a bunch of implicit EL objects available. They are mainly shortcuts
    to important artifacts, scopes, maps, and components available in the current
    faces context. Table 7-1 provides an overview of them.


    ###### Table 7-1 Implicit EL Objects Available in EL Context of JSF


