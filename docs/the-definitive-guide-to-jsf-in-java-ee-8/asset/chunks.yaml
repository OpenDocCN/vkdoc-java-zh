    # 7. Facelets 模板


    Bauke Scholtz^(1 ) 和 Arjan Tijms²


    (1) 库拉索岛威廉斯塔德


    (2) 荷兰北荷兰省阿姆斯特丹


    当 JSF（JavaServer Faces）于 2004 年首次推出时，只有 JSP（Java Server Pages）拥有视图技术。人们很快意识到，对于使用
    JSF 进行 Web 开发来说，这是一种不合适的视图技术。JSP 的问题在于，一旦遇到模板文本，它就会立即写入 HTTP 响应，而 JSF 则希望首先基于视图声明创建一个组件树，以便能够在其上执行生命周期处理。例如，以下使用
    JSP 视图技术的 JSF 1.0/1.1 页面：


    ```

    <h:commandLink action="...">

        <strong>strong link text</strong>

    </h:commandLink>

    ```


    会产生以下 HTML 输出，其中模板文本由 JSP 在 JSF 组件生成的 HTML 输出之前发出¹：


    ```

    <strong>strong link text</strong>

    <a href="..." onclick="..."></a>

    ```


    “正确的方法”是将模板文本包裹在 `<f:verbatim>` 标签中：


    ```

    <h:commandLink action="...">

        <f:verbatim><strong>strong link text</strong><f:verbatim>

    </h:commandLink>

    ```


    这将产生以下 HTML 输出：


    ```

    <a href="..." onclick="...">  <strong>strong link text</strong></a>

    ```


    这显然受到了很多批评，现在普遍的建议是人们不应该将 JSF 与 HTML 混合使用。JSF 1.0/1.1 的另一个问题是，没有组件来表示 HTML `<div>`。那时正值“Web
    2.0”刚刚兴起，人们也开始不推荐使用 HTML 表格来布局网页。主流观点认为只应使用 div，这使得人们更加不喜欢 JSF 1.0/1.1。


    JSP 导致 HTML 输出混乱的奇特行为在仅两年后（2006 年）发布的 JSF 1.2 中得到了解决，而缺少表示 HTML `<div>` 组件的问题则通过为
    `<h:panelGroup>` 组件添加新的 `layout="block"` 属性来解决，使其渲染 `<div>` 而不是 `<span>`。因此，从
    JSF 1.2 开始，人们就可以安全地在 JSP 页面中将纯 HTML 与 JSF 组件混合使用，并继续以纯 HTML 和 JSF 两种方式使用 div。然而，在编写
    JSF 1.0/1.1 页面时避免使用纯 HTML 的建议计划，却变成了一个至今仍在某些人中流传的顽固误解。


    JSP 的另一个问题是，现有的 JSP 标签库（如 JSTL（JSP 标准标签库））和以 `${…}` 形式存在的现有 JSP 表达式，完全无法集成到 JSF
    生命周期中。因此，在 JSP 页面中将现有的 JSP 标签库和 JSP 表达式与 JSF 组件混合使用，会导致令人困惑且不直观的行为。人们无法使用 `<c:forEach>`
    来渲染 JSF 组件列表，因为这些组件看不到 `<c:forEach var>` 声明的变量。除了 `<h:dataTable>` 之外，没有专门的 JSF
    组件可以遍历列表，最终人们在 JSF 页面中创建列表时只能局限于使用表格。


    最后，JSP 提供的模板功能也非常有限，实际上只有一个“模板”标签 `<jsp:include>`；因此，使用 JSP 进行模板化需要一种相当复杂的方法，即为每个可重用模板部分的定义创建一堆自定义标签。²
    这与 JSF 的理念——拥有可重用组件以最小化代码重复——相矛盾。使用 JSP，你最终会重复 JSF 组件本身。现有的模板框架（如 Tiles 和 Thymeleaf）要么以
    JSP 为中心，要么根本不支持 JSF，因此无法使用。

