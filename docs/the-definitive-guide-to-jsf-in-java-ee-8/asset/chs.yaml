- "# 7. Facelets 模板\n\nBauke Scholtz^(1 ) 和 Arjan Tijms²\n\n(1) 库拉索岛威廉斯塔德\n\n(2) 荷兰北荷兰省阿姆斯特丹\n\
  \n当 JSF（JavaServer Faces）于 2004 年首次推出时，只有 JSP（Java Server Pages）拥有视图技术。人们很快意识到，对于使用\
  \ JSF 进行 Web 开发来说，这是一种不合适的视图技术。JSP 的问题在于，一旦遇到模板文本，它就会立即写入 HTTP 响应，而 JSF 则希望首先基于视图声明创建一个组件树，以便能够在其上执行生命周期处理。例如，以下使用\
  \ JSP 视图技术的 JSF 1.0/1.1 页面：\n\n```\n<h:commandLink action=\"...\">\n    <strong>strong\
  \ link text</strong>\n</h:commandLink>\n```\n\n会产生以下 HTML 输出，其中模板文本由 JSP 在 JSF 组件生成的\
  \ HTML 输出之前发出¹：\n\n```\n<strong>strong link text</strong>\n<a href=\"...\" onclick=\"\
  ...\"></a>\n```\n\n“正确的方法”是将模板文本包裹在 `<f:verbatim>` 标签中：\n\n```\n<h:commandLink action=\"\
  ...\">\n    <f:verbatim><strong>strong link text</strong><f:verbatim>\n</h:commandLink>\n\
  ```\n\n这将产生以下 HTML 输出：\n\n```\n<a href=\"...\" onclick=\"...\">  <strong>strong\
  \ link text</strong></a>\n```\n\n这显然受到了很多批评，现在普遍的建议是人们不应该将 JSF 与 HTML 混合使用。JSF 1.0/1.1\
  \ 的另一个问题是，没有组件来表示 HTML `<div>`。那时正值“Web 2.0”刚刚兴起，人们也开始不推荐使用 HTML 表格来布局网页。主流观点认为只应使用\
  \ div，这使得人们更加不喜欢 JSF 1.0/1.1。\n\nJSP 导致 HTML 输出混乱的奇特行为在仅两年后（2006 年）发布的 JSF 1.2 中得到了解决，而缺少表示\
  \ HTML `<div>` 组件的问题则通过为 `<h:panelGroup>` 组件添加新的 `layout=\"block\"` 属性来解决，使其渲染 `<div>`\
  \ 而不是 `<span>`。因此，从 JSF 1.2 开始，人们就可以安全地在 JSP 页面中将纯 HTML 与 JSF 组件混合使用，并继续以纯 HTML\
  \ 和 JSF 两种方式使用 div。然而，在编写 JSF 1.0/1.1 页面时避免使用纯 HTML 的建议计划，却变成了一个至今仍在某些人中流传的顽固误解。\n\
  \nJSP 的另一个问题是，现有的 JSP 标签库（如 JSTL（JSP 标准标签库））和以 `${…}` 形式存在的现有 JSP 表达式，完全无法集成到 JSF\
  \ 生命周期中。因此，在 JSP 页面中将现有的 JSP 标签库和 JSP 表达式与 JSF 组件混合使用，会导致令人困惑且不直观的行为。人们无法使用 `<c:forEach>`\
  \ 来渲染 JSF 组件列表，因为这些组件看不到 `<c:forEach var>` 声明的变量。除了 `<h:dataTable>` 之外，没有专门的 JSF\
  \ 组件可以遍历列表，最终人们在 JSF 页面中创建列表时只能局限于使用表格。\n\n最后，JSP 提供的模板功能也非常有限，实际上只有一个“模板”标签 `<jsp:include>`；因此，使用\
  \ JSP 进行模板化需要一种相当复杂的方法，即为每个可重用模板部分的定义创建一堆自定义标签。² 这与 JSF 的理念——拥有可重用组件以最小化代码重复——相矛盾。使用\
  \ JSP，你最终会重复 JSF 组件本身。现有的模板框架（如 Tiles 和 Thymeleaf）要么以 JSP 为中心，要么根本不支持 JSF，因此无法使用。\n\
  \n\n\n显然，迫切需要一种面向 JSF 的新视图技术来取代 JSP，并解决其与 JSF 生命周期相关的所有问题。于是，Facelets 在 2006 年被引入。它可以为\
  \ JSF 1.1 和 1.2 单独安装，并内置于 JSF 2.0 中。它成为了 JSF 的默认视图技术，而 JSP 作为 JSF 的视图技术已被弃用。JSF\
  \ 2.0 中引入的新标签，例如 `<f:ajax>`、`<h:head>`、`<h:body>`、`<h:outputScript>` 和 `<h:outputStylesheet>`，仅适用于\
  \ Facelets，不适用于 JSP。JSF 2.0 还引入了一个新接口，以便更轻松地插入自定义视图声明语言（VDL）作为 JSP 甚至 Facelets 的替代方案，即\
  \ `ViewDeclarationLanguage` API。通过这种方式，人们可以创建例如纯 Java 的 JSF VDL。³\n\n## XHTML\n\n\
  Facelets VDL 规定视图在基于 XML 的文件中定义，这些文件使用 SAX 解析器编译并保存在内存中。自 JSF 2.1 起，此内存缓存可通过自定义的\
  \ `FaceletCacheFactory` 进行配置。当 JSF 项目阶段设置为 Development 时，Facelets 文件的 SAX 编译表示默认不会被缓存。这使得在已运行的服务器上进行开发更加容易，只需在支持将本地更改热发布到目标运行时的\
  \ IDE（集成开发环境）中编辑 Facelets 文件即可。\n\nFacelets 文件本身通常使用 `.xhtml` 扩展名，因此初学者常称其为“XHTML”而非“Facelets”。在\
  \ JSF 上下文中讨论时这没问题，但“XHTML”一词在 Web 开发领域还有另一层含义。其核心是，XHTML 是一种用于 HTML 页面的标记语言，这些页面需要使用基于\
  \ XML 的工具进行编译。换句话说，开发者基本上创建的是包含 HTML 标记和 Web 框架特定 XML 标签的 XML 文件，然后 Web 框架会将其解析为\
  \ XML 树，生成该 XML 树的某种 Web 框架特定表示（在 JSF 中为 `UIViewRoot`），并最终根据框架对该 XML 树的内部表示生成所需的\
  \ HTML 输出。\n\n但在 2006 年 Facelets 引入前后，XHTML 被另一群 Web 开发者过度炒作，他们基本上是因为看到 W3 验证器使其\
  \ HTML4 文档无效而感到失望——通常是因为希望显式关闭所有标签以保持一致性，包括那些根据 HTML4 规范实际上不应关闭的标签，例如 `<link>`、`<meta>`、`<br>`\
  \ 和 `<hr>`——有时还因为希望指定自定义标签属性，以便某些 JavaScript 插件能与 HTML 文档更清晰地交互，而这也是 HTML4 规范所不允许的。\n\
  \n尽管世界上几乎每个 Web 浏览器（包括史前级别的 IE6）都宽容地接受了这一点，但这些开发者不希望看到他们精心制作的 HTML4 文档被 W3 验证器判定为无效，于是他们将\
  \ HTML 文档类型声明更改为使用 XHTML DTD，这是 HTML 的一个扩展，要求每个标签都必须关闭，并允许在现有标签上指定自定义属性。然而，这本质上是对\
  \ XHTML 的滥用，因为他们实际上根本没有使用任何 XML 工具来编译文档并生成所需的 HTML 输出。这仅仅是为了让 W3 验证器满意。\n\n巧合的是，也大约在同一时期，HTML5\
  \ 刚刚开始起草。本质上，开发者只需从 HTML 文档类型声明中移除任何 DTD，就能得到一个允许基于 XML 语法的 HTML 文档，其中所有标签始终关闭，并允许自定义元素和属性，而且重要的是，能在\
  \ W3 验证器中正确验证。换句话说，`<!DOCTYPE html>` 对这些开发者来说已经足够了，即使在 IE6 中也是如此。不幸的是，HTML5 正式完成花费了很长时间，因此开发者在能够切换回\
  \ HTML 文档类型之前，一直滥用 XHTML 文档类型。当与这些开发者讨论 Facelets 时，不要称其为“XHTML”，而应直接称为“Facelets”；否则会引起混淆。\n\
  \n## 模板组合\n\nFacelets 提供了用于基于单个主模板文件轻松创建模板组合的标签。这应该能减少整个网站中重复出现的部分（如页眉、导航菜单和页脚）的代码重复。主模板文件应表示一个完整的网页布局，包含所有网站范围的区域，并使用\
  \ `<ui:insert>` 标签来表示可以插入页面特定区域的位置。以下是此类主模板文件 `/WEB-INF/templates/layout.xhtml`\
  \ 的基本示例：\n\n```\n<!DOCTYPE html>\n<html lang=\"en\"\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\
  \n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n    xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\
  \n>\n    <h:head>\n        <title>#{title}</title>\n    </h:head>\n    <h:body>\n\
          <header>\n            <ui:include src=\"/WEB-INF/includes/layout/header.xhtml\"\
  \ />\n        </header>\n        <main>\n            <ui:insert name=\"content\"\
  \ />\n        </main>\n        <footer>\n            <ui:include src=\"/WEB-INF/includes/layout/footer.xhtml\"\
  \ />\n        </footer>\n    </h:body>\n</html>\n```\n\n请注意，主模板文件和包含文件被明确放置在 `/WEB-INF`\
  \ 文件夹中。这样做是为了防止用户通过猜测 URL 路径来直接访问。另请注意，页面标题被声明为一个简单的 EL（表达式语言）表达式 `#{title}`，而不是\
  \ `<ui:insert>`。`<title>` 元素中不允许有任何标记。\n\n`xmlns` 属性基本上通过 URI（统一资源标识符）定义了可以在声明的\
  \ XML 命名空间中使用哪些标签。根 XML 命名空间指定了 W3 XHTML 标准 [`www.w3.org/1999/xhtml`](http://www.w3.org/1999/xhtml)\
  \ 的 URI，因此它定义了“任何 XHTML 和 HTML5+ 标签”，例如上例中的 `<html>`、`<title>`、`<header>`、`<main>`\
  \ 和 `<footer>`。Facelets 编译器知道这个标准 XML 命名空间，并将所有元素作为“通用 UI 指令”传递。`h` XML 命名空间指定了\
  \ JSF HTML 标签库 URI，而 `ui` XML 命名空间指定了 JSF Facelets 标签库 URI，这两个 URI 都存在于 JSF 实现 JAR\
  \ 文件中，并在 Web 应用程序启动时注册到 Facelets。这样，Facelets 编译器就能找到相关的标签处理器、组件和复合组件，它们负责完成构建视图、解码\
  \ HTTP 请求和编码 HTTP 响应的繁重工作。因此，这些 URI 并不一定是有效的互联网地址。您甚至可以通过 `*.taglib.xml` 文件指定自己的\
  \ URI。这将在后面的“标签文件”部分进一步展开。\n\n以下是包含文件 `/WEB-INF/includes/layout/header.xhtml` 的内容：\n\
  \n```\n<ui:composition\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\n    xmlns:h=\"\
  http://xmlns.jcp.org/jsf/html\"\n    xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\
  \n>\n    <a href=\"#{request.contextPath}/\">\n        <h:graphicImage name=\"images/layout/logo.svg\"\
  \ />\n    </a>\n    <nav>\n        <ul>\n            <li><h:link outcome=\"/about\"\
  \ value=\"关于\" /></li>\n            <li><h:link outcome=\"/help\" value=\"帮助\" /></li>\n\
              <li><h:link outcome=\"/contact\" value=\"联系\" /></li>\n        </ul>\n\
      </nav>\n</ui:composition>\n```\n\n请注意徽标周围的链接。它指向 `#{request.contextPath}/`。这基本上会打印出相对于域名的应用程序根目录\
  \ URL。`#{request}` 是一个隐式 EL 对象，引用当前的 `HttpServletRequest` 实例。`contextPath` 指的是其属性之一，由\
  \ `getContextPath()` 方法隐含。\n\n以下是包含文件 `/WEB-INF/includes/layout/footer.xhtml` 的内容：\n\
  \n\n\n```\n<ui:composition\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\n    xmlns:h=\"\
  http://xmlns.jcp.org/jsf/html\"\n    xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\
  \n>\n    <nav>\n        <ul>\n            <li><h:link outcome=\"/terms-of-service\"\
  \n                        value=\"服务条款\" /></li>\n            <li><h:link outcome=\"\
  /privacy-policy\"\n                        value=\"隐私政策\" /></li>\n            <li><h:link\
  \ outcome=\"/cookie-policy\"\n                        value=\"Cookie 政策\" /></li>\n\
          </ul>\n    </nav>\n    <small>© 示例公司</small>                           \
  \                                           \n</ui:composition>\n```\n\n最后，模板客户端（例如\
  \ `/home.xhtml`）的代码示例如下：\n\n```\n<ui:composition template=\"/WEB-INF/templates/layout.xhtml\"\
  \n    xmlns:=\"http://www.w3.org/1999/xhtml\"\n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\
  \n    xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\n>\n    <ui:param name=\"title\"\
  \ value=\"欢迎！\" />\n\n<ui:define name=\"content\">\n        <h1>欢迎来到示例公司！</h1>\n\
          <p>Lorem ipsum dolor sit amet.</p>\n    </ui:define>\n</ui:composition>\n\
  ```\n\n请注意 `<ui:composition>` 中的 `template` 属性。该属性必须指向主模板的服务器端路径，最好使用绝对路径，即以“/”开头。\n\
  \n在模板客户端中，`<ui:param>` 允许你定义专用于主模板的简单参数。基本上，你可以使用任何参数名称，只要该参数被主模板支持，并且不与现有的受管 bean\
  \ 名称冲突。在此特定示例中，EL 变量 `#{title}` 的值被指定为“欢迎！”。该值最终会出现在主模板的 `<title>` 元素中。\n\n而 `<ui:define>`\
  \ 允许你定义专用于主模板的标记块。该标记块最终会出现在主模板中声明了同名 `<ui:insert>` 的位置。图 7-1 清晰地展示了所有这些元素是如何组合在一起的。\n\
  \n![A454457_1_En_7_Fig1_HTML.jpg](img/A454457_1_En_7_Fig1_HTML.jpg)\n\n###### 图\
  \ 7-1 主模板 layout.xhtml、包含文件 header.xhtml 和 footer.xhtml，以及模板客户端 home.xhtml 之间的关系。请注意，为简洁起见，省略了模板文件路径和部分标签属性。实际编码请参考前面展示的代码片段。\n\
  \n最后，打开 `/home.xhtml` 应生成最终的 HTML 输出，你可以通过在普通浏览器中右键单击*查看页面源代码*来检查该输出。\n\n## 单页应用\n\
  \n最近的一个趋势是所谓的单页应用（SPA）。这个概念本身并不新鲜；事实上，它比 JSF 本身还要古老，但在“Web 2.0”时代，随着基于 JavaScript\
  \ 的框架（如 Angular）的出现而广泛流行。基本上，SPA 通过在不同页面间导航时使用 Ajax 请求动态更改主要内容，而不是通过 GET 请求加载整个页面，从而使\
  \ Web 应用表现得像桌面应用一样。Gmail 就是 SPA 的一个知名例子。\n\n这种 SPA 也可以通过 JSF 实现，只需使用 `<ui:include>`，并通过\
  \ Ajax 动态更新其 `src` 属性即可。以下示例使用了与上一节相同的主模板 `/spa.xhtml`：\n\n```\n<ui:composition\
  \ template=\"/WEB-INF/templates/layout.xhtml\"\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\
  \n    xmlns:jsf=\"http://xmlns.jcp.org/jsf\"\n    xmlns:f=\"http://xmlns.jcp.org/jsf/core\"\
  \n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n    xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\
  \n>\n    <ui:param name=\"title\" value=\"单页应用\" />\n\n<ui:define name=\"content\"\
  >\n        <aside>\n            <nav>\n                <h:form>\n                    <f:ajax\
  \ render=\":content\">\n                        <ul>\n                            <li><h:commandLink\
  \ value=\"页面 1\"\n                                action=\"#{spa.set('page1')}\"\
  \ /></li>\n                            <li><h:commandLink value=\"页面 2\"\n                                action=\"\
  #{spa.set('page2')}\" /></li>\n                            <li><h:commandLink value=\"\
  页面 3\"\n                                action=\"#{spa.set('page3')}\" /></li>\n\
                          </ul>\n                    </f:ajax>\n                </h:form>\n\
              </nav>\n        </aside>\n        <article jsf:id=\"content\" data-page=\"\
  #{spa.page}\">\n            <ui:include src=\"/WEB-INF/includes/spa/#{spa.page}.xhtml\"\
  \ />\n        </article>\n    </ui:define>\n</ui:composition>\n```\n\n请注意，`<article>`\
  \ 元素通过显式指定 JSF 标识符 `jsf:id=\"…\"` 被声明为所谓的透传元素。此功能是在 JSF 2.2 中引入的。在底层，当以这种方式将没有对应\
  \ JSF 组件的 HTML 元素（例如 `<header>`、`<footer>`、`<main>`、`<article>`、`<section>` 等）声明为透传元素时，它会被转换为\
  \ `UIPanel` 组件，并在 JSF 组件树中像 `<h:panelGroup>` 一样被处理。这样，你既可以干净地继续使用语义化的 HTML5 标记，又能像引用\
  \ JSF 组件一样引用它，从而能够通过 Ajax 更新它。\n\n正如你可能从上面的 `/spa.xhtml` 示例中解读出的那样，有一个侧边导航菜单，它设置由\
  \ `#{spa}` 标识的受管 bean 中的当前页面，并通过 Ajax 更新由 `id=\"content\"` 标识的组件，而该组件又包含一个动态包含。上述示例期望在\
  \ `/WEB-INF/includes/spa` 文件夹中存在以下包含文件：`page1.xhtml`、`page2.xhtml` 和 `page3.xhtml`。每个文件都是一个简单的包含文件，内容如下：\n\
  \n```\n<ui:composition\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\n    xmlns:h=\"\
  http://xmlns.jcp.org/jsf/html\"\n    xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\
  \n>\n    <h1>第一页</h1>\n    <p>Lorem ipsum dolor sit amet.</p>\n</ui:composition>\n\
  ```\n\n与 `#{spa}` 受管 bean 关联的后台 bean 相当简单，如下所示：\n\n```\n@Named @ViewScoped\npublic\
  \ class Spa implements Serializable {\n\nprivate String page;\n\n@PostConstruct\n\
      public void init() {\n        page = \"page1\";\n    }\n\npublic void set(String\
  \ page) {\n        this.page = page;\n    }\n\npublic String getPage() {\n        return\
  \ page;\n    }\n}\n```\n\n默认页面在 `@PostConstruct` 中定义。否则，用户可能会看到一个错误页面，其中包含消息“无效路径：/WEB-INF/includes/spa/.xhtml”。\n\
  \n\n\n请注意，后台 Bean 声明为 `@ViewScoped`。这一点很重要，因为它需要在回传过程中记住当前打开的是哪个页面。如果它是 `@RequestScoped`，当用户导航到例如\
  \ page2 并提交其中的表单时，会创建一个新的 HTTP 请求，那么 `@RequestScoped` 管理的 Bean 将被重新创建，其页面值仍为 page1\
  \ 而非 page2。这会导致当 JSF 准备解码任何输入组件以处理回传请求中的表单提交时，`<ui:include>` 不会引用 page2.xhtml，因此\
  \ JSF 将无法找到在 page2.xhtml 中声明的输入组件。`@ViewScoped` Bean 的生命周期与用户回传到同一视图（本例中为 /spa.xhtml）的时间相同，因此它能正确记住当前选中的页面。\n\
  \n在尝试这个 SPA 示例时，您可能已经注意到一个缺点：页面无法添加书签。这是因为页面不是通过幂等的 GET 请求打开的。您可以通过使用 HTML5 的 `history.pushState`\
  \ API 来解决这个问题。⁴ 基本上，在 Ajax 请求完成后，您应该将目标 URL 推送到浏览器历史记录中，这将会反映在浏览器的地址栏中。并且，您应该修改\
  \ Spa 后台 Bean，使其检查是否有特定页面被打开，并相应地准备 `page` 变量。\n\n以下是一个入门示例，它仅附加了 `?page=xxx` 查询字符串参数。首先，调整\
  \ spa.xhtml 中的 `<f:ajax>`，指定 `onevent` 属性如下：\n\n```\n<f:ajax ... onevent=\"pageChangeListener\"\
  >\n```\n\n然后创建以下 JavaScript 函数：\n\n```\nfunction pageChangeListener(event) {\n    if\
  \ (event.status == \"success\") {\n        var page = document.getElementById(\"\
  content\").dataset.page;\n        var url = location.pathname + \"?page=\" + page;\n\
          history.pushState(null, document.title, url);\n    }\n}\n```\n\n最后，按如下方式调整\
  \ Spa 后台 Bean：\n\n```\n@Inject @ManagedProperty(\"#{param.page}\")\nPrivate String\
  \ page;\n\npublic void init() {\n    if (page == null) {\n        page = \"page1\"\
  ;\n    }\n}\n```\n\n###### 注意\n\n`@ManagedProperty` 目前有两种形式：已弃用的来自 `javax.faces.bean`\
  \ 包的形式，以及 JSF 2.3 引入的来自 `javax.faces.annotation` 包的形式。\n\n您需要后者。另外，请注意您可能想要验证提供的\
  \ `page` 参数。顺便说一句，黑客的路径探测是无害的，因为 JSF 本身已经不允许遍历到父路径，例如 `/spa.xhtml?page=../../templates/layout`。\n\
  \n## 模板装饰\n\n如果您希望拥有一个可重用的包含文件，它能够插入模板定义，就像使用 `<ui:include>` 来引用一个包含一个或多个 `<ui:insert>`\
  \ 部分的包含文件一样，那么您可以使用 `<ui:decorate>`。以下是一个示例，即 `/WEB-INF/decorations/contact.xhtml`：\n\
  \n```\n<ui:composition\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\n    xmlns:ui=\"\
  http://xmlns.jcp.org/jsf/facelets\"\n>\n    <section class=\"contact\">\n        <header><ui:insert\
  \ /></header>\n        <nav>\n            <ul>\n                <li>✆ <a href=\"\
  tel:+31612345678\"\n                    title=\"Phone\">+31 (0)6 1234 5678</a></li>\n\
                  <li>✉ <a href=\"mailto:info@example.com\"\n                    title=\"\
  Email\">info@example.com</a></li>\n            </ul>\n        </nav>\n    </section>\n\
  </ui:composition>\n```\n\n以下是它的使用方法，您可以将 `<ui:decorate>` 像 `<ui:include>` 一样放在模板客户端的任何位置：\n\
  \n```\n<ui:decorate template=\"/WEB-INF/decorations/contact.xhtml\">\n    <h2>有问题？联系我们！</h2>\n\
  </ui:decorate>\n```\n\n请注意，contact.xhtml 只有一个 `<ui:insert>`，并且它没有名称。这会将整个 `<ui:decorate>`\
  \ 标签体插入到 `<ui:insert>` 声明的位置。当然，您可以指定一个名称，但那样您就需要显式地使用 `<ui:define>` 并为其指定一个名称。只有当您有多个插入部分时，这才有用。\n\
  \n如有必要，您可以使用 `<ui:param>` 来传递参数。其工作方式与 `<ui:composition template>` 相同。以下示例将电子邮件用户名的\
  \ `/WEB-INF/decorations/contact.xhtml` 参数化，默认值为 \"info\"。\n\n```\n...\n<li>✉ <a\
  \ href=\"mailto: #{empty mailto ? 'info' : mailto}@example.com\"\n    title=\"Email\"\
  >#{empty mailto ? 'info' : mailto}@example.com</a></li>\n...\n```\n\n然后可以这样使用：\n\
  \n```\n<ui:decorate template=\"/WEB-INF/decorations/contact.xhtml\">\n    <ui:param\
  \ name=\"mailto\" value=\"press\" />\n    <h3>联系我们</h3>\n    <p>\n        如有媒体垂询，您可以通过以下电话号码和电子邮件地址联系我们。\n\
      </p>\n</ui:decorate>\n```\n\n## 标签文件\n\n与 `<ui:composition template>` 和 `<ui:decorate>`\
  \ 一样，您也可以在 `<ui:include>` 中使用 `<ui:param>`。但是，请注意不要过度使用。\n\n```\n<ui:include src=\"\
  /WEB-INF/includes/field.xhtml\">\n    <ui:param name=\"id\" value=\"firstName\"\
  \ />\n    <ui:param name=\"label\" value=\"名字\" />\n    <ui:param name=\"value\"\
  \ value=\"#{profile.user.firstName}\" />\n</ui:include>\n```\n\n其中 `/WEB-INF/includes/field.xhtml`\
  \ 的内容大致如下：\n\n```\n<ui:composition\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\n\
      xmlns:jsf=\"http://xmlns.jcp.org/jsf \"\n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\
  \n    xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\n    xmlns:a=\"http://xmlns.jcp.org/jsf/passthrough\"\
  \n    xmlns:c=\"http://xmlns.jcp.org/jsp/jstl/core\"\n>\n    <div class=\"field\"\
  \ jsf:rendered=\"#{rendered ne false}\">\n        <h:outputLabel id=\"#{id}_l\"\
  \ for=\"#{id}\" value=\"#{label}\" />\n        <c:choose>\n            <c:when test=\"\
  #{type eq 'password'}\">\n                <h:inputSecret id=\"#{id}\" label=\"#{label}\"\
  \n                    value=\"#{value}\">\n                </h:inputSecret>\n            </c:when>\n\
              <c:when test=\"#{type eq 'textarea'}\">\n                <h:inputTextarea\
  \ id=\"#{id}\" label=\"#{label}\"\n                    value=\"#{value}\">\n                </h:inputTextarea>\
  \                                                                              \
  \          \n            </c:when>\n            <!-- 更多类型可以在此处作为 c:when 添加 -->\n\
              <c:otherwise>\n                <h:inputText id=\"#{id}\" label=\"#{label}\"\
  \n                    value=\"#{value}\" a:type=\"#{type}\">\n                </h:inputText>\n\
              </c:otherwise>\n        </c:choose>\n        <h:messages id=\"#{id}_m\"\
  \ for=\"#{id}\" styleClass=\"messages\" />\n    </div>\n</ui:composition>\n```\n\
  \n在这种情况下，您可能更希望使用更简洁的方式，如下所示：\n\n```\n<t:field id=\"firstName\" label=\"名字\"\n    value=\"\
  #{profile.user.firstName}\">\n</t:field>\n```\n\n如果 `<ui:include>` 带有两个或更多 `<ui:param>`，这强烈表明该包含文件最好注册为标签文件，以便在\
  \ Facelet 中使用更少的样板代码。\n\n首先，将包含文件移动到不同的子文件夹 `/WEB-INF/tags/field.xhtml`。这不是技术上的要求。无论您将其放在哪里，它都能正常工作，但我们只是希望清晰地组织文件。主模板文件放在\
  \ `/WEB-INF/templates`，包含文件放在 `/WEB-INF/includes`，装饰文件放在 `/WEB-INF/decorations`，标签文件放在\
  \ `/WEB-INF/tags`。\n\n然后，创建以下 `/WEB-INF/example.taglib.xml`：\n\n```\n<?xml version=\"\
  1.0\" encoding=\"UTF-8\"?>\n<facelet-taglib\n    xmlns:=\"http://xmlns.jcp.org/xml/ns/javaee\"\
  \n    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n    xsi:schemaLocation=\"\
  http://xmlns.jcp.org/xml/ns/javaee\n      http://xmlns.jcp.org/xml/ns/javaee/web-facelettaglibrary_2_3.xsd\"\
  \n    version=\"2.3\"\n>\n    <namespace>http://example.com/tags</namespace>\n    <short-name>t</short-name>\n\
  \n\n\n<tag>\n        <description>渲染标签、输入框和消息字段。</description>\n        <tag-name>field</tag-name>\n\
          <source>tags/field.xhtml</source>\n        <attribute>\n            <description>输入组件的类型。</description>\n\
              <name>type</name>\n            <required>false</required>\n            <type>java.lang.String</type>\n\
          </attribute>\n        <attribute>\n            <description>输入组件的 ID。</description>\n\
              <name>id</name>\n            <required>true</required>\n            <type>java.lang.String</type>\n\
          </attribute>\n        <attribute>\n            <description>输入组件的标签。</description>\n\
              <name>label</name>\n            <required>true</required>\n            <type>java.lang.String</type>\n\
          </attribute>\n        <attribute>\n            <description>输入组件的值。</description>\n\
              <name>value</name>\n            <required>false</required>\n            <type>java.lang.Object</type>\n\
          </attribute>\n        <attribute>\n            <description>字段是否被渲染。</description>\n\
              <name>rendered</name>\n            <required>false</required>\n            <type>boolean</type>\n\
          </attribute>\n    </tag>\n</facelet-taglib>\n\n不可否认，这确实是相当多的样板代码。但了解以下内容很有帮助：`<attribute>`\
  \ 元素对于标签文件的技术运行并非强制要求。你甚至可以完全省略它们。但这样一来，IDE 在尝试自动补全自定义标签时，就无法将这些属性加载到自动建议框中。这对开发者来说并不友好。因此，最好还是保留它们。顺便提一下，标签属性的\
  \ `<required>` 属性仅在 JSF 项目阶段设置为 Development 时才会导致运行时错误。在其他 JSF 项目阶段，它会被忽略。而且，大多数\
  \ IDE 在自动补全标签时会立即提示这些必需属性。\n\n文件名 `example.taglib.xml` 可以自由选择。为了让 JSF 在应用启动时自动识别标签库文件，只有两个要求：文件扩展名必须是\
  \ `.taglib.xml`，并且必须放置在 `/WEB-INF` 文件夹中（如果是最终位于 `/WEB-INF/lib` 的 JAR 文件，则放置在该 JAR\
  \ 文件的 `/META-INF` 文件夹中）。不幸的是，在某些服务器（如 GlassFish/Payara）上，将文件放在 `/WEB-INF` 中并不总是能正常工作。在这种情况下，你需要通过\
  \ `web.xml` 中的以下上下文参数显式注册它，该参数的值表示从 Web 根目录到 `*.taglib.xml` 文件的完整路径。\n\n```\n<context-param>\n\
      <param-name>javax.faces.FACELETS_LIBRARIES</param-name>\n    <param-value>/WEB-INF/example.taglib.xml</param-value>\n\
  </context-param>\n```\n\n为了使用 `*.taglib.xml` 中定义的任何标签，你首先必须在你的 Facelet 中精确声明标签库的\
  \ `<namespace>` URI，以及一个任意的 XML 命名空间前缀。为了提高代码的可维护性，建议选择标签库在其 `<short-name>` 中指定的首选\
  \ XML 命名空间前缀，在我们的 `example.taglib.xml` 中，这个前缀是 \"t\"。\n\n```\n<ui:composition template=\"\
  /WEB-INF/templates/layout.xhtml\"\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\n\
      xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n    xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\
  \n    xmlns:t=\"http://example.com/tags\"\n>\n    <ui:param name=\"title\" value=\"\
  登录\" />\n\n<ui:define name=\"content\">\n        <h:form>\n            <fieldset>\n\
                  <header>\n                    <h1>登录</h1>\n                </header>\n\
                  <t:field type=\"email\" id=\"email\" label=\"邮箱\"\n                    value=\"\
  #{login.email}\">\n                </t:field>\n                <t:field type=\"\
  password\" id=\"password\" label=\"密码\"\n                    value=\"#{login.password}\"\
  >\n                </t:field>\n                <footer>\n                    <t:button\
  \ id=\"submit\" label=\"登录\"\n                         action=\"#{login.submit()}\"\
  >\n                    </t:button>\n                </footer>\n            </fieldset>\n\
          </h:form>\n    </ui:define>\n</ui:composition>\n```\n\n请注意，电子邮件字段的 `type=\"\
  email\"` 最终会进入标签文件实现中的 `<c:otherwise>`，并通过 `<h:inputText>` 的 `a:type=\"#{type}\"\
  ` 属性传递。这允许你轻松使用 HTML5 输入字段，例如 `type=\"email\"`、`type=\"number\"`、`type=\"tel\"`\
  \ 等。将 `type` 属性定义为透传属性 `a:type` 是强制性的，因为 `<h:inputText>` 默认会忽略任何自定义的 `type` 属性，并固执地渲染为\
  \ `type=\"text\"`。\n\n你可能还注意到了另一个自定义标签 `<t:button>`。以下是它在 `/WEB-INF/tags/button.xhtml`\
  \ 中的实现方式。\n\n```\n<ui:composition\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\n\
      xmlns:jsf=\"http://xmlns.jcp.org/jsf\"\n    xmlns:f=\"http://xmlns.jcp.org/jsf/core\"\
  \n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n    xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\
  \n>\n    <div class=\"button\" jsf:rendered=\"#{rendered ne false}\">\n        <h:commandButton\
  \ id=\"#{id}\" value=\"#{label}\">\n            <f:actionListener binding=\"#{action}\"\
  \ />\n            <f:ajax execute=\"@form\" render=\"@form\" />\n        </h:commandButton>\n\
          <h:messages id=\"#{id}_m\" globalOnly=\"true\" redisplay=\"false\" />\n\
      </div>\n</ui:composition>\n```\n\n它在 `example.taglib.xml` 中的注册方式与 `<t:field>`\
  \ 几乎相同，但 `action` 属性是个例外。从技术上讲，你需要指定一个 `<method-signature>` 而不是（属性）`<type>`：\n\n\
  ```\n<attribute>\n    <description>\n        按钮的动作方法。\n        注意：必须包含方法括号。\n    </description>\n\
      <name>action</name>\n    <required>true</required>\n    <method-signature>void\
  \ action()</method-signature>\n</attribute>\n```\n\n你可能已经注意到，实际的标签实现使用了 `<f:actionListener\
  \ binding=\"#{action}\">` 而不是 `action=\"#{action}\"`。这实际上是一个必要的技巧，以便正确调用该方法。也就是说，`<method-signature>`\
  \ 最初是为 UI 组件设计的，而不是为标签文件设计的。它在标签文件中会被忽略。这个问题可能会在 JSF.next 中得到解决。目前，你可以通过 `<f:actionListener\
  \ binding>` 这个技巧来规避。这只有一个额外要求：你需要在标签文件客户端显式包含方法括号，例如 `<t:button action=\"#{login.submit()}\"\
  >`。否则，`<t:button action=\"{login.submit}\">` 会失败，并抛出 *javax.el.PropertyNotFoundException:\
  \ The class ‘com.example.project.view.Login’ does not have the property ‘submit’*。\n\
  \n如果你希望从标签文件客户端开始自定义标签文件，例如，通过添加更具体的输入属性、嵌套核心标签，或者在标签或消息前/后追加内容，那么你可以像使用主模板文件和装饰文件一样，使用\
  \ `<ui:define>` 和 `<ui:insert>`。以下示例演示了如何通过添加一组新的 `<ui:insert>` 标签来增强 `/WEB-INF/tags/field.xhtml`：\n\
  \n\n\n```\n<ui:composition\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\n    xmlns:jsf=\"\
  http://xmlns.jcp.org/jsf \"\n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n    xmlns:ui=\"\
  http://xmlns.jcp.org/jsf/facelets\"\n    xmlns:a=\"http://xmlns.jcp.org/jsf/passthrough\"\
  \n    xmlns:c=\"http://xmlns.jcp.org/jsp/jstl/core\"\n>\n    <div class=\"field\"\
  \ jsf:rendered=\"#{rendered ne false}\">\n        <ui:insert name=\"beforeLabel\"\
  \ />\n        <ui:insert name=\"label\">\n            <h:outputLabel id=\"#{id}_l\"\
  \ for=\"#{id}\" value=\"#{label}\">\n                <span><ui:insert name=\"insideLabel\"\
  \ /></span>\n            </h:outputLabel>\n        </ui:insert>\n        <ui:insert\
  \ name=\"beforeInput\" />\n        <ui:insert name=\"input\">\n            <c:choose>\n\
                  <c:when test=\"#{type eq 'password'}\">\n                    <h:inputSecret\
  \ id=\"#{id}\" label=\"#{label}\"\n                        value=\"#{value}\">\n\
                          <ui:insert />\n                    </h:inputSecret>\n                </c:when>\n\
                  <c:when test=\"#{type eq 'textarea'}\">\n                    <h:inputTextarea\
  \ id=\"#{id}\" label=\"#{label}\"\n                        value=\"#{value}\">\n\
                          <ui:insert />\n                    </h:inputTextarea>\n\
                  </c:when>\n                <!-- 更多类型可在此处通过 c:when 添加 -->\n                <c:otherwise>\n\
                      <h:inputText id=\"#{id}\" label=\"#{label}\"\n                        value=\"\
  #{value}\" a:type=\"#{type}\">\n                        <ui:insert />\n                    </h:inputText>\n\
                  </c:otherwise>\n            </c:choose>\n        </ui:insert>\n\
          <ui:insert name=\"beforeMessages\" />\n        <ui:insert name=\"messages\"\
  >\n            <h:messages id=\"#{id}_m\" for=\"#{id}\" styleClass=\"messages\"\
  \ />\n        </ui:insert>\n    </div>\n</ui:composition>\n```\n\n现在，这真是极大的灵活性！在标签文件客户端中，你可以使用\
  \ `<ui:define name=\"beforeLabel\">` 来定义一些应在字段标签之前显示的内容。你也可以使用 `<ui:define name=\"\
  label\">` 来完全覆盖标签。你还可以使用 `<ui:define name=\"insideLabel\">` 在标签内部追加一些（HTML）内容，以此类推。下面的示例演示了如何使用\
  \ `insideLabel` 在密码字段的标签后追加一个“忘记密码？”链接：\n\n```\n<t:field ...>\n    <ui:define name=\"\
  insideLabel\">\n        <h:link outcome=\"/reset-password\" value=\"忘记密码？\" />\n\
      </ui:define>\n</t:field>\n```\n\n请注意，`<ui:insert name=\"insideLabel\">` 被包裹在一个\
  \ HTML `<span>` 标签中。这让你能够更轻松地通过 CSS 选择最终出现在该位置上的“任何内容”，例如，你可以仅通过 `.field label >\
  \ span { float: right; }` 让其中的内容向右浮动。\n\n标签文件客户端中任何不属于 `<ui:define>` 的内容，最终都会进入所选输入组件内部的无名\
  \ `<ui:insert>` 标签中。这让你能够轻松地为该输入组件嵌套任何特定的 `<f:xxx>` 核心标签：\n\n```\n<t:field ...>\n\
      <f:attribute name=\"onkeypress\" value=\"return event.key != 'Enter'\" />\n\
      <f:validateRegex pattern=\"[0-9]{4}\" />\n    <f:ajax render=\"otherField\"\
  \ />\n</t:field>\n```\n\n这个具体示例通过当 `KeyboardEvent.key` 等于“Enter”时返回 `false`，阻止了表单在按下*回车*键时提交；同时注册了一个正则表达式验证器，通过匹配正则表达式模式\
  \ `[0-9]{4}` 来仅接受四位数字的值；并指示 JSF 在值变更事件发生时，通过 Ajax 更新由“otherField”标识的组件。\n\n回到 `/WEB-INF/tags/field.xhtml`\
  \ 中的标签文件实现，你可能已经注意到，这里使用的是老牌的 JSTL，而不是 JSF 自身的 `rendered` 属性。这样做有优势，因为 JSTL 的生命周期与\
  \ JSF UI 组件不同。JSTL 在 JSF 组件树即将构建时（即视图构建阶段）执行。而 JSF 组件则在即将生成 HTML 输出时（即视图渲染阶段）执行。此外，如果你使用\
  \ JSF 自身的 `rendered` 属性，那么由于多个具有相同 ID 的组件会物理上存在于 JSF 组件树中，你将面临“重复组件 ID”的错误。\n\n\
  如果你正在考虑使用纯 Java 代码，基于至少一个视图作用域的模型来动态创建组件树，那么你绝对应该重新考虑，转而使用 JSTL。由于 JSTL 本身也是基于 XML\
  \ 的，因此你可以将所有内容整合到一个 XHTML 文件中，最终你将获得可读性和可维护性都更好的“动态”组件代码。\n\n\n\n## 复合组件\n\n有时，您希望将一组相关的输入组件组合起来，以表示单个模型值。一个经典的例子是使用三个\
  \ `<h:selectOneMenu>` 下拉菜单分别表示日、月、年，并最终绑定到后台 Bean 中的一个 `java.time.LocalDate` 属性。仅使用包含文件或标签文件来实现这一点并不简单。您需要一些额外的基于\
  \ Java 的逻辑，例如，确保日期的下拉菜单不会根据当前选择的月份显示 29、30 或 31 这些值，并且能够将提交的值转换为一个完整的 `LocalDate`\
  \ 实例，反之亦然。但是，您不能也不应该在任何 Facelet 中放入 Java 代码。\n\n您可能会想到为此创建一个专用的后台 Bean。但这也不够。它无法让您通过\
  \ JSF 生命周期干净地挂接到组件的生命周期：从多个组件收集各个提交的值，将它们转换为单个 `LocalDate` 实例，必要时在验证阶段抛出转换器异常，并让\
  \ JSF 生命周期自动跳过剩余阶段。后台 Bean 的 setter 方法或 action 方法远非放置该逻辑的正确位置。无论如何，它被调用时都太晚了。而且，能够通过\
  \ Facelet 中任意位置的 EL 表达式引用并可能操作同一个后台 Bean，会让人感觉很奇怪。\n\n这正是复合组件发挥作用的地方：将一堆现有的 JSF\
  \ 组件组合成一个虚拟的单个组件，该组件绑定到单个模型值，并且最终使用方式与使用普通的 `<h:inputText>` 完全相同。想象一个 `<t:inputLocalTime>`\
  \ 复合组件，它由两个 `<h:selectOneMenu>` 组件组成，并绑定到单个 `java.time.LocalTime` 模型值。您可以使用一个完整的\
  \ `UIComponent` 实例作为所谓的后台组件，而不是使用后台 Bean。\n\n首先，在 `main/webapp/resources` 文件夹（注意不是\
  \ `main/java/resources`！）中创建一个专用子文件夹，例如 `main/webapp/resources/components`。您可以在其中放置代表复合组件的\
  \ Facelets 文件。然后，该子文件夹将在 XML 命名空间 URI 中，位于 `http://xmlns.jcp.org/jsf/composite`\
  \ 之后使用，如下所示。\n\n```\nxmlns:t=\"http://xmlns.jcp.org/jsf/composite/components\"\n\
  ```\n\n请注意，XML 命名空间前缀 \"t\" 与我们之前为标签文件定义的那个冲突了。这当然不是本意。您可以为复合组件选择不同的 XML 命名空间。然而，也可以让它们共享同一个自定义\
  \ XML 命名空间 URI `http://example.com.tags`。这可以通过在 `*.taglib.xml` 中添加一个 `<composite-library-name>`\
  \ 来实现，该名称必须代表专用子文件夹的名称。\n\n```\n<composite-library-name>components</composite-library-name>\n\
  ```\n\n这样，所有复合组件也可以通过与标签文件相同的 XML 命名空间来使用。\n\n```\n<... xmlns:t=\"http://example.com/tags\"\
  >\n...\n<t:inputLocalTime ... />\n```\n\n代表复合组件的 Facelets 文件的文件名将成为标签名称。因此，为了拥有一个\
  \ `<t:inputLocalTime>`，我们需要在 `main/webapp/resources/components` 文件夹中有一个 `inputLocalTime.xhtml`\
  \ 文件。以下是一个入门示例，展示了它可能的样子：\n\n```\n<ui:component\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\
  \n    xmlns:f=\"http://xmlns.jcp.org/jsf/core\"\n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\
  \n    xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\n    xmlns:cc=\"http://xmlns.jcp.org/jsf/composite\"\
  \n>\n    <cc:interface componentType=\"inputLocalTime\">\n        <cc:attribute\
  \ name=\"value\" type=\"java.time.LocalTime\"\n            shortDescription=\"选定的时间。默认为\
  \ 00:00。\">\n        </cc:attribute>\n        <cc:attribute name=\"required\" type=\"\
  boolean\"\n            shortDescription=\"必填状态。默认为 false。\">\n        </cc:attribute>\n\
      </cc:interface>\n    <cc:implementation>\n        <span id=\"#{cc.clientId}\"\
  \ class=\"inputLocalTime\">\n            <h:selectOneMenu id=\"hour\" binding=\"\
  #{cc.hour}\"\n                required=\"#{cc.attrs.required}\">\n                <f:selectItem\
  \ itemValue=\"#{null}\" />\n                <f:selectItems value=\"#{cc.hours}\"\
  \ />\n            </h:selectOneMenu>\n            :\n            <h:selectOneMenu\
  \ id=\"minute\" binding=\"#{cc.minute}\"\n                required=\"#{cc.attrs.required}\"\
  >\n                <f:selectItem itemValue=\"#{null}\" />\n                <f:selectItems\
  \ value=\"#{cc.minutes}\" />\n            </h:selectOneMenu>\n        </span>\n\
      </cc:implementation>\n</ui:component>\n```\n\n这里有几件事需要注意，这使得复合组件与标签文件不同。首先，复合组件的主体始终分为两部分：接口和实现。\n\
  \n接口声明了一个 `componentType` 属性，该属性应引用 `UIComponent` 子类上的 `@FacesComponent` 注解的值，或者在\
  \ `faces-config.xml` 或 `*taglib.xml` 中声明的 `<component>` 的 `<component-type>` 条目。当\
  \ `componentType` 属性不存在时，它默认为 `UINamingContainer`。接口还声明了支持的属性。为简单起见，我们只限制为两个：`value`\
  \ 和 `required`。还有一些从 `UIComponent` 超类隐式继承的属性，我们不需要显式地将其定义为 `<cc:attribute>`：`id`、`binding`\
  \ 和 `rendered`。这使得总共五个属性可以在实现中使用。\n\n实现定义了复合组件的实际标记。在这里，您可以看到两个 `<h:selectOneMenu>`\
  \ 下拉菜单包裹在一个 `<span>` 元素中。在这里，您还可以看到特殊 EL 变量 `#{cc}` 的多次出现，它引用了复合组件背后的当前 `UIComponent`\
  \ 实例，因此它是 `componentType` 属性中声明的类型之一，或者，如果不存在，则是 `UINamingContainer`。`#{cc.attrs}`\
  \ 是组件属性映射的快捷方式，可通过 `UIComponent#getAttributes()` 获得。因此，在 `<t:inputLocalTime>` 中使用的\
  \ `#{cc.attrs.required}` 引用了 `<cc:attribute name=\"required\">`。\n\n`<span>` 元素中的\
  \ `#{cc.clientId}` 只是将复合组件的客户端 ID 打印为 `<span>` 的 `id` 属性。这实际上是一个技巧，以便能够使用来自模板客户端的客户端\
  \ ID 搜索表达式来引用“整个”复合组件。想象以下情况：\n\n```\n<h:inputText ...>\n    <f:ajax render=\"time\"\
  \ />\n</h:inputText>\n<t:inputLocalTime id=\"time\" ... />\n```\n\n如果没有将 `#{cc.clientId}`\
  \ 渲染为包裹 `<cc:implementation>` 整个主体的任何普通 HTML 元素（通常是 `<span>` 或 `<div>`）的 ID，这种情况将无法工作。技术问题是，虽然复合组件本身可以通过组件\
  \ ID 搜索表达式在 JSF 组件树中找到，但复合组件的 HTML 表示默认情况下无法通过 JavaScript 中的 `document.getElementById(clientId)`\
  \ 获得。换句话说，JSF Ajax 将无法更新它。因此，显式添加一个带有复合组件客户端 ID 的普通 HTML 元素可以解决这个问题。\n\n\n\n最后，还有一堆\
  \ #{cc} 表达式并未直接引用这些属性。两个 <h:selectOneMenu> 下拉菜单都直接绑定为所谓支持组件（即复合组件背后的具体 UIComponent\
  \ 实例）的属性。并且，两个 <f:selectItems> 选项也直接从支持组件获取其值。以下是支持组件类 `com.example.project.composite.InputLocalTime`。\n\
  \n```\n@FacesComponent(\"inputLocalTime\")\npublic class InputLocalTime extends\
  \ UIInput implements NamingContainer {\n\nprivate static final List<String> HOURS\
  \ =\n        IntStream.rangeClosed(0, 23).boxed()\n            .map(InputLocalTime::pad).collect(Collectors.toList());\n\
      private static final List<String> MINUTES =\n        IntStream.rangeClosed(0,\
  \ 59).boxed()\n            .map(InputLocalTime::pad).collect(Collectors.toList());\n\
  \nprivate UIInput hour;\n    private UIInput minute;\n\n@Override\n    public String\
  \ getFamily() {\n        return UINamingContainer.COMPONENT_FAMILY;\n    }\n\n@Override\n\
      public void encodeBegin(FacesContext context) throws IOException {         \
  \                                                 \n        LocalTime localTime\
  \ = (LocalTime) getValue();\n\nif (localTime != null) {\n            hour.setValue(pad(localTime.getHour()));\n\
              minute.setValue(pad(localTime.getMinute()));\n        }\n\nsuper.encodeBegin(context);\n\
      }\n\n@Override\n    public Object getSubmittedValue() {\n        String submittedHour\
  \ = (String) hour.getSubmittedValue();\n        String submittedMinute = (String)\
  \ minute.getSubmittedValue();\n\nif (submittedHour == null || submittedMinute ==\
  \ null) {\n            return null;\n        }\n        else if (submittedHour.isEmpty()\
  \ || submittedMinute.isEmpty()) {\n            return \"\";\n        }\n        else\
  \ {\n            return submittedHour + \":\" + submittedMinute;\n        }\n    }\n\
  \n@Override\n    protected Object getConvertedValue\n        (FacesContext context,\
  \ Object submittedValue)\n    {\n        String submittedTime = (String) submittedValue;\n\
  \nif (submittedTime == null || submittedTime.isEmpty()) {\n            return null;\n\
          }\n\ntry {\n            return LocalTime.parse(submittedTime,\n                DateTimeFormatter.ISO_LOCAL_TIME);\n\
          }\n        catch (DateTimeParseException e) {                          \
  \                                \n            throw new ConverterException(e);\n\
          }\n    }\n\nprivate static String pad(Integer value) {\n        return String.format(\"\
  %02d\", value);\n    }\n\npublic UIInput getHour() { return hour; }\n    public\
  \ void setHour(UIInput hour) { this.hour = hour; }\n    public UIInput getMinute()\
  \ { return minute; }\n       public void setMinute(UIInput minute) { this.minute\
  \ = minute; }\n    public List<String> getHours() { return HOURS; }\n    public\
  \ List<String> getMinutes() { return MINUTES; }\n}\n```\n\n现在，代码量有点大。你不仅会看到 getter\
  \ 和 setter 为了简洁而被折叠，还会看到我们的复合组件继承了 UIInput 并实现了 NamingContainer。继承 UIInput 的好处是，我们无需在支持组件中重复\
  \ UIInput 的大部分默认编码和解码行为，因此只需重写少数几个方法。实现 NamingContainer 是 `<cc:interface>` 的技术要求。这使您能够在同一上下文中使用复合组件的多个实例，而不会遇到“重复组件\
  \ ID”错误。此要求也体现在重写的 `getFamily()` 方法中，根据复合组件的约定，该方法必须返回 `UINamingContainer.COMPONENT_FAMILY`\
  \ 常量。\n\n构成复合组件的实际 UIInput 组件被声明为支持组件的属性。在本例中，它们都是通过 `binding` 属性绑定到这些属性的 `<h:selectOneMenu>`\
  \ 下拉菜单。这使我们能够在编码（即：处理 HTTP 响应）期间轻松设置它们的值，并在解码（即：处理 HTTP 请求）期间获取提交的值。你可以在重写的 `encodeBegin()`\
  \ 和 `getSubmittedValue()` 方法中找到相应的逻辑。\n\n因此，在 `encodeBegin()` 方法中，你有机会根据模型值（如果有）准备显示的值。`getValue()`\
  \ 方法继承自 UIInput 超类，并与 `value` 属性关联。你可以分解模型值，并在复合组件的各个 UIInput 组件中设置所需的值。`pad()`\
  \ 辅助方法只是在数字前补零，例如，将“1”显示为“01”。此辅助方法也用于专门为 `<f:selectItems>` 静态初始化可用小时和分钟列表。\n\n\
  在 `getSubmittedValue()` 方法中，你应该将各个 UIInput 组件的提交值组合成一个单独的字符串。在 `<t:inputLocalTime>`\
  \ 的具体情况下，我们按照 ISO 本地时间模式 `HH:mm` 组合成一个字符串。反过来，UIInput 超类将此值传递给 `getConvertedValue()`，我们在此有机会将组合后的字符串转换为具体的模型值，在本例中即\
  \ `LocalTime`。最终，UIInput 超类将确保在更新模型值阶段将其设置到支持 bean 中。现在你可以像下面这样使用它：\n\n```\n<ui:composition\
  \ template=\"/WEB-INF/templates/layout.xhtml\"\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\
  \n    xmlns:f=\"http://xmlns.jcp.org/jsf/core\"\n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\
  \n    xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\n    xmlns:cc=\"http://xmlns.jcp.org/jsf/composite/components\"\
  \n>\n    <ui:define name=\"content\">\n        <h:form>\n            <h:outputLabel\
  \ for=\"time:hour\" value=\"时间\" />\n            <t:inputLocalTime id=\"time\" value=\"\
  #{bean.time}\" />\n            <h:commandButton value=\"提交\" action=\"#{bean.submit}\"\
  >\n                <f:ajax execute=\"@form\" />\n            </h:commandButton>\n\
          </h:form>\n    </ui:define>\n</ui:composition>\n```\n\n其中由 `#{bean}` 表示的支持\
  \ bean 如下所示：\n\n```\n@Named @RequestScoped\npublic class Bean {\n\nprivate LocalTime\
  \ time;\n\npublic void submit() {\n        System.out.println(\"提交的本地时间: \" + time);\n\
      }\n\npublic LocalTime getTime() {\n        return time;\n    }\n\npublic void\
  \ setTime(LocalTime time) {\n        this.time = time;\n    }\n}\n```\n\n如果你需要在复合组件内部嵌套\
  \ `<f:ajax>`，以便在任何一个下拉菜单的更改事件期间运行某些 Ajax，那么你可以通过添加针对两个下拉菜单的 `<cc:clientBehavior>`\
  \ 来实现，如下所示：\n\n```\n<cc:interface ...>\n    ...\n    <cc:clientBehavior name=\"\
  change\" default=\"true\"\n        targets=\"hour minute\" event=\"change\">\n    </cc:clientBehavior>\n\
  </cc:interface>\n```\n\n`name` 属性表示事件名称，你需要在模板客户端中声明该名称以触发它。\n\n```\n<t:inputLocalTime\
  \ id=\"time\" ...>\n    <f:ajax event=\"change\" execute=\"time\" ... />\n</t:inputLocalTime>\n\
  ```\n\n`default=\"true\"` 表示这是默认事件，这意味着你可以省略它，就像你可以对现有的输入文本和下拉组件省略 `event=\"change\"\
  `，对现有的复选框和单选按钮组件省略 `event=\"click\"`，以及对现有的命令组件省略 `event=\"action\"` 一样。\n\n```\n\
  <t:inputLocalTime id=\"time\" ...>\n    <f:ajax execute=\"time\" ... />\n</t:inputLocalTime>\n\
  ```\n\n\n\n`targets` 属性必须定义一个以空格分隔的 ID 集合，这些 ID 对应着你希望触发 Ajax 事件的复合组件中的目标 UIInput\
  \ 组件；而 `event` 属性则必须定义实际要在目标 UIInput 组件上触发的事件名称。换句话说，在底层实现上，其效果等同于在复合组件中编写以下代码：\n\
  \n```\n<h:selectOneMenu id=\"hour\" ...>\n    <f:ajax event=\"change\" ... />\n\
  </h:selectOneMenu>\n<h:selectOneMenu id=\"minute\" ...>\n    <f:ajax event=\"change\"\
  \ ... />\n</h:selectOneMenu>\n```\n\n在这个具体示例中，`event` 属性恰好与 `name` 属性值相同。这起初可能会让人困惑，但它允许你轻松定义自定义事件名称。例如，以下代码用于仅在小时下拉框发生变更时触发事件：\n\
  \n```\n<cc:interface ...>\n    ...\n    <cc:clientBehavior name=\"hourChange\"\n\
          targets=\"hour\" event=\"change\">\n    </cc:clientBehavior>\n</cc:interface>\n\
  ```\n\n这样一来，只有当小时下拉框发生变更时，才会触发以下 Ajax 监听器，而分钟下拉框的变更则不会触发。\n\n```\n<t:inputLocalTime\
  \ id=\"time\" ...>\n    <f:ajax event=\"hourChange\" execute=\"time\"\n        listener=\"\
  #{bean.hourChanged}\">\n    </f:ajax>\n</t:inputLocalTime>\n```\n\n请注意，在给定的示例中始终明确指定了\
  \ `execute=\"time\"`。这是因为在当前 JSF 2.3 版本中，默认的 `execute=\"@this\"` 在复合组件实现上下文中仍然无法正常工作。JSF\
  \ 本可以从任何 `<cc:clientBehavior default=\"true\">` 中推导出目标组件，但目前尚未如此规定。\n\n总而言之，必须承认，复合组件在\
  \ JSF 2.0 首次引入后曾被过度炒作。人们开始使用它们来“组合”整个模板、包含文件、装饰文件，甚至多个标签，而无需使用任何后台组件。也就是说，与标签文件相比，其零配置的特性极具吸引力。所有内容都在复合组件文件中通过\
  \ `<cc:interface>` 声明。并且，只需遵循约定，无需在任何 XML 文件中进行配置，即可直接在模板客户端中使用它们。\n\n需要注意的是，由于复合组件的内部设计，在构建和恢复视图时，其开销相对较大，与普通的包含文件、装饰文件和标签文件相比尤其如此，特别是在深度嵌套的情况下。因此，最佳实践是：仅当你确实需要通过\
  \ `<cc:interface componentType>` 使用后台组件时，才使用复合组件。对于其他任何情况，请改用包含文件、装饰文件或标签文件。在前面的章节中，你可能已经了解到，借助\
  \ JSTL，标签文件可以变得非常强大。\n\n### 递归复合组件\n\n你可以安全地将复合组件相互嵌套。但是，当你将同一个复合组件递归地嵌套在自身内部时，当\
  \ EL 尝试解析 `#{cc}` 背后的具体复合组件实例时，将会因堆栈溢出错误而失败。⁵\n\n假设你有一个递归树模型，它代表了某种讨论线程，例如电子邮件及其所有回复，或博客评论及其所有回复，其中每条回复本身又可以包含另一组回复。这可以表示为如下所示的单个\
  \ JPA 实体：\n\n```\n@Entity\npublic class Message {\n\n@Id @GeneratedValue(strategy=IDENTITY)\n\
      private Long id;\n\n@Lob\n    @Column(nullable = false)\n    private @NotNull\
  \ String text;\n\n@ManyToOne\n    private Message replyTo;\n\n@OneToMany(mappedBy\
  \ = \"replyTo\")\n    private List<Message> replies = Collections.emptyList();\n\
  \n// 添加/生成其余的 getter 和 setter 方法。\n}\n```\n\n请注意，`replyTo` 属性表示当前消息所回复的父消息，而 `replies`\
  \ 属性表示对当前消息的所有回复。然后，可以在 `MessageService` 中按如下方式查询树结构：\n\n```\npublic List<Message>\
  \ tree() {\n    return entityManager.createQuery(\n        \"SELECT DISTINCT m FROM\
  \ Message m\"\n            + \" LEFT JOIN FETCH m.replies r\"\n            + \"\
  \ ORDER BY m.id ASC\", Message.class)\n        .getResultList().stream()\n        .filter(m\
  \ -> m.getReplyTo() == null)\n        .collect(toList());\n}\n```\n\n请注意，随后对结果列表进行过滤乍看之下效率不高，但实际上每条消息只被检索一次，并且仅在\
  \ `replies` 属性中被引用。\n\n现在，你可能会凭直觉将 `<t:message>` 复合组件实现为如下形式：\n\n```\n<cc:interface>\n\
      <cc:attribute name=\"value\" type=\"com.example.Message\" />\n</cc:interface>\n\
  <cc:implementation>\n    #{cc.attrs.value.text}\n    <c:if test=\"#{not empty cc.attrs.value.replies}\"\
  >\n        <ul>\n            <c:forEach items=\"#{cc.attrs.value.replies}\" var=\"\
  reply\">\n                <li>\n                    <t:message value=\"#{reply}\"\
  \ />\n                </li>\n            </c:forEach>\n        </ul>\n    </c:if>\n\
  </cc:implementation>\n```\n\n然后按如下方式使用：\n\n```\n<c:forEach items=\"#{messages.tree}\"\
  \ var=\"message\">\n    <t:message value=\"#{message}\" />\n</c:forEach>\n```\n\n\
  你或许会疑惑为什么使用 `<c:forEach>` 而不是 `<ui:repeat>`。解释相对简单：`<ui:repeat>` 在视图构建期间会被忽略。换句话说，`<t:message>`\
  \ 会陷入无限循环。如果你需要记住原因和方式，请回到第 3 章的“JSTL 核心标签”部分。\n\n但即使采用上述实现，你仍然会遇到无限循环。你知道 `#{cc}`\
  \ 引用的是当前复合组件的实例。在底层，当 `#{reply}` 被传递给嵌套的复合组件时，实际上传递的是对 `#{cc.attrs.value.replies[index]}`\
  \ 的引用。这本身没有问题。但是，当嵌套的复合组件反过来从这个别名中计算 `#{cc}` 部分时，它会引用自身而不是父复合组件。因此，导致了无限循环。\n\n\
  理论上，你可以通过将 `#{cc}` 替换为 `#{cc.parent}`（它返回 `UIComponent#getParent()`）来解决这个问题。\n\n\
  ```\n<c:forEach items=\"#{cc.attrs.value.replies}\" varStatus=\"loop\">\n    ...\n\
      <t:message value=\"#{cc.parent.attrs.value.replies[loop.index]}\" />\n    ...\n\
  </c:forEach>\n```\n\n\n\n然而，这仍然不起作用。在底层，嵌套的组合组件内部，当 EL 求值器遇到 `#{cc.parent}` 并尝试对其求值“attrs.value”时，父组合组件会返回另一个\
  \ EL 表达式，形式为 `#{cc.attrs.value}`，该表达式最终会被求值。但是，`#{cc}` 部分仍然被解释为“当前组合组件”，而它位于嵌套的组合组件内部，因此就是嵌套的组合组件本身。\n\
  \n我们只能通过让父组合组件不返回另一个 EL 表达式，而是返回已经求值后的值来解决这个问题。这可以通过在后台组件中重写 `UIComponent#setValueExpression()`\
  \ 来实现，在该方法中检查代表 `#{cc.attrs.value}` 的 `ValueExpression` 是否即将被设置到组件上，然后立即对其求值，并将结果存储为组合组件的局部变量。这不会造成损害，因为它本应是一个只读属性。\n\
  \n```\n@FacesComponent(\"messageComposite\")\npublic class MessageComposite extends\
  \ UINamingContainer {\n\nprivate Message message;\n\n@Override\n    public void\
  \ setValueExpression\n        (String attributeName, ValueExpression expression)\n\
      {\n        if (\"value\".equals(attributeName)) {\n            ELContext elContext\
  \ = getFacesContext().getELContext();\n            message = (Message) expression.getValue(elContext);\n\
          }\n        else {\n            super.setValueExpression(attributeName, expression);\n\
          }\n    }\n\npublic Message getMessage() {\n        return message;\n    }\n\
  }\n```\n\n有了这个后台组件，并将“attrs.value”替换为“message”，它终于可以工作了。\n\n```\n<cc:interface componentType=\"\
  messageComposite\">\n    <cc:attribute name=\"value\" type=\"com.example.Message\"\
  \ />\n</cc:interface>\n<cc:implementation>\n    #{cc.message.text}\n    <c:if test=\"\
  #{not empty cc.message.replies}\">\n        <ul>\n            <c:forEach items=\"\
  #{cc.message.replies}\" varStatus=\"loop\">\n                <li>\n                    <t:message\n\
                          value=\"#{cc.parent.message.replies[loop.index]}\">\n                    </t:message>\n\
                  </li>\n            </c:forEach>\n        </ul>\n    </c:if>\n</cc:implementation>\n\
  ```\n\n## 隐式 EL 对象\n\n在 Facelets 文件中，有一系列可用的隐式 EL 对象。它们主要是当前 faces 上下文中重要工件、作用域、映射和组件的快捷方式。表\
  \ 7-1 提供了它们的概览。\n\n###### 表 7-1 JSF 的 EL 上下文中可用的隐式 EL 对象\n\n| 隐式 EL 对象 | 解析为 | 返回类型\
  \ | 引入版本 |\n| --- | --- | --- | --- |\n| #{facesContext} | FacesContext#getCurrentInstance()\
  \ | FacesContext | 2.0 |\n| #{externalContext} | FacesContext#getExternalContext()\
  \ | ExternalContext | 2.3 |\n| #{view} | FacesContext#getViewRoot() | UIViewRoot\
  \ | 2.0 |\n| #{component} | UIComponent#getCurrentComponent() | UIComponent | 2.0\
  \ |\n| #{cc} | UIComponent#getCurrentCompositeComponent() | UIComponent | 2.0 |\n\
  | #{request} | ExternalContext#getRequest() | HttpServletRequest | 1.0 |\n| #{session}\
  \ | ExternalContext#getSession() | HttpSession | 1.0 |\n| #{application} | ExternalContext#getContext()\
  \ | ServletContext | 1.0 |\n| #{flash} | ExternalContext#getFlash() | Flash | 2.0\
  \ |\n| #{requestScope} | ExternalContext#getRequestMap() | Map<String, Object> |\
  \ 1.0 |\n| #{viewScope} | UIViewRoot#getViewMap() | Map<String, Object> | 2.0 |\n\
  | #{flowScope} | FlowHandler#getCurrentFlowScope() | Map<Object, Object> | 2.2 |\n\
  | #{sessionScope} | ExternalContext#getSessionMap() | Map<String, Object> | 1.0\
  \ |\n| #{applicationScope} | ExternalContext#getApplicationMap() | Map<String, Object>\
  \ | 1.0 |\n| #{initParam} | ExternalContext#getInitParameterMap() | Map<String,\
  \ String> | 1.0 |\n| #{param} | ExternalContext#getRequestParameterMap() | Map<String,\
  \ String> | 1.0 |\n| #{paramValues} | ExternalContext#getRequestParameterValuesMap()\
  \ | Map<String, String[]> | 1.0 |\n| #{header} | ExternalContext#getRequestHeaderMap()\
  \ | Map<String, String> | 1.0 |\n| #{headerValues} | ExternalContext#getRequestHeaderValuesMap()\
  \ | Map<String, String[]> | 1.0 |\n| #{cookie} | ExternalContext#getRequestCookieMap()\
  \ | Map<String, Cookie> | 1.0 |\n| #{resource} | ResourceHandler#createResource()\
  \ | Resource | 2.0 |\n\n对于 JSF 工件和组件，如果该类在某处指定了一个 getter 方法，例如 `HttpServletRequest#getContextPath()`，那么你当然可以像往常一样在\
  \ EL 中通过 `#{request.contextPath}` 访问它。\n\n对于作用域映射，任何属性都将被解释为映射键。如果该属性恰好包含句点字符，那么你可以使用花括号表示法，如\
  \ `#{map['key.with.periods']}`，来访问映射值。请注意，`#{flash}` 本质上继承自 `Map<String, Object>`，因此可以这样对待它。还应该提到的是，`#{flowScope}`\
  \ 确实与其他作用域映射不同，它接受 `Object` 而不是 `String` 作为映射键。这很可能是一个历史错误。访问作用域映射的规范方法是使用基于 `String`\
  \ 的键。\n\n`#{cookie}` 通过 cookie 名称进行映射，其值实际上返回一个 `javax.servlet.http.Cookie`，而该对象又有一个\
  \ `getValue()` 属性。因此，要访问 `JSESSIONID` cookie，你基本上需要 `#{cookie.JSESSIONID.value}`。当然，你也可以直接使用\
  \ `#{session.id}` 代替。\n\n`#{resource}` 实际上有自己的 EL 解析器，它将任何属性解释为“library:name”格式的资源标识符，然后将其传递给\
  \ `ResourceHandler#createResource()`，并最终通过 `Resource#getRequestPath()` 返回资源的 URL。这在\
  \ CSS 资源中非常有用，可以将 JSF 图像资源引用为 CSS 背景图像。以下示例将实际渲染 `src/main/webapp/resources/images/background.svg`\
  \ 的 URL。\n\n```\nbody {\n    background-image: url(\"#{resource['images/background.svg']}\"\
  );\n    background-size: cover;\n}\n```\n\n\n\n请注意，CSS 资源中的 EL 表达式解析仅在 CSS 资源本身通过\
  \ `<h:outputStylesheet>` 而非 `<link>` 引入时生效。另外还需注意，JSF 默认仅在首次请求 CSS 资源时记住该资源是否包含\
  \ EL 表达式。如果首次请求时未包含，则 JSF 在后续请求中不会重新检查，即使在开发阶段也是如此。因此，如果你发现现有 CSS 资源中的第一个 EL 表达式似乎不起作用，最好重启\
  \ Web 应用程序。CSS 资源中的 EL 解析功能实际上非常有用。如果 SCSS（Sassy CSS）对你来说过于复杂，那么你可以使用 EL 来参数化一些重复的\
  \ CSS 属性，例如颜色。\n\n```\n.color-gray {\n    color: #{applicationScope['gray']='#B8B8B8'};\n\
  }\n\n...\n\n.someSelector {\n    border: 1px solid #{gray};\n}\n.otherSelector {\n\
      color: #{gray};\n}\n\n...\n```\n\n不，CSS 资源中的 EL 解析功能在 JS 资源中不可用。为此，你需要在全局作用域中输出一个\
  \ JS 对象，并在必要时让你的 JS 资源拦截它。例如，\n\n```\n<h:outputScript>var config = #{configuration.script};</h:outputScript>\n\
  <h:outputScript name=\"scripts/some.js\" />\n```\n\n其中 `#{configuration.script}`\
  \ 只是从你的受管 bean 返回一个 JSON 对象字符串。或者，你可以让 EL 将其作为 HTML 元素的数据属性输出：\n\n```\n<html lang=\"\
  en\" data-baseuri=\"#{request.contextPath}/\">\n    ...\n</html>\n```\n\n然后在 JS\
  \ 中按如下方式访问：\n\n```\nvar baseuri = document.documentElement.dataset.baseuri;\n```\n\
  \n或者，如果你是 jQuery 爱好者：\n\n```\nvar baseuri = $   (\"html\").data(\"baseuri\");\n\
  ```\n\n话虽如此，当你在 Java 端创建受管 bean，或在 Facelets 端声明自定义 EL 变量（例如 `<h:dataTable var=\"\
  foo\">`、`<ui:repeat var=\"foo\">` 或 `<c:set var=\"foo\">`）时，你必须绝对确保不会显式或隐式地选择一个与前面列出的隐式\
  \ EL 对象冲突的受管 bean 名称或 EL 变量名称，因为隐式 EL 对象在 EL 解析中的优先级高于用户定义的名称。因此，例如，以下构造可能无法按预期工作：\n\
  \n```\n<ui:repeat value=\"#{bean.parameters}\" var=\"param\">\n    #{param}<br />\n\
  </ui:repeat>\n```\n\n它会在每次迭代时逐字打印“{}”，这基本上是空 Map 的默认 `Map#toString()` 格式。当你使用像 `?foo=bar`\
  \ 这样的查询字符串重新打开同一页面时，它会在每次迭代时逐字打印“{foo=bar}”。你最好将 `var=\"param\"` 重命名为其他名称。\n\n#\
  \ 脚注\n\n1 [www.onjava.com/pub/a/onjava/2004/06/09/jsf.html](http://www.onjava.com/pub/a/onjava/2004/06/09/jsf.html)\
  \ 。\n\n2 [`stackoverflow.com/q/1296235/157882.`](https://stackoverflow.com/q/1296235/157882)\
  \ 。\n\n3 [`arjan-tijms.omnifaces.org/2011/09/authoring-jsf-pages-in-pure-java.html`](http://arjan-tijms.omnifaces.org/2011/09/authoring-jsf-pages-in-pure-java.html)\
  \ 。\n\n4 [`developer.mozilla.org/en-US/docs/Web/API/History_API#Adding_and_modifying_history_entries.`](https://developer.mozilla.org/en-US/docs/Web/API/History_API%23Adding_and_modifying_history_entries)\
  \ 。\n\n5 [`balusc.omnifaces.org/2016/02/recursive-tree-of-composite-components.html.`](http://balusc.omnifaces.org/2016/02/recursive-tree-of-composite-components.html)\
  \ 。\n\n© Bauke Scholtz, Arjan Tijms 2018\n\nBauke Scholtz 和 Arjan Tijms，《Java EE\
  \ 8 中 JSF 权威指南》，`doi.org/10.1007/978-1-4842-3387-0_8`\n\n# 8. 支持 Bean\n\nBauke Scholtz^(1 )\
  \ 和 Arjan Tijms²\n\n(1)威廉斯塔德，库拉索\n\n(2)阿姆斯特丹，北荷兰省，荷兰\n\n“支持 bean”是一个 JSF 特有的概念。它代表最终用作“受管\
  \ bean”的单一 JavaBean 类，负责在 JSF 页面中提供数据、操作和/或 UI（用户界面）组件。\n\n## 模型、视图还是控制器？\n\nJSF（JavaServer\
  \ Faces）是一个 MVC（模型-视图-控制器）框架。这是一种广泛应用于软件应用程序的架构设计模式，其根源在于桌面应用程序开发。¹\n\n从 JSF 框架的角度来看，模型由支持\
  \ bean 表示，视图由组件树表示，而组件树通常定义在 Facelets 文件中，控制器由 JSF 已提供的 FacesServlet 表示。然而，从 Java\
  \ EE 应用服务器的角度来看，模型由服务层表示，服务层通常定义在 EJB（企业 JavaBeans）类和 JPA（Java 持久化 API）实体中，视图由你所有基于\
  \ JSF 的代码表示，控制器是 FacesServlet。从 JSF 开发者的角度来看，模型由服务层表示，视图由 Facelets 文件表示，控制器由支持 bean\
  \ 表示。\n\n因此，支持 bean 类可以是模型、视图或控制器，具体取决于你的视角，而服务层始终是模型，Facelets 文件始终是视图，FacesServlet\
  \ 始终是控制器。请注意，在此上下文中，“JSF 开发者”就是你，你正在使用 JSF 框架为 Java EE 应用服务器开发 Web 应用程序。\n\n图 8-1\
  \ 说明了支持 bean 在 JSF 的 MVC 范式中的位置。这是一个维恩图，其中控制器和视图的交集由 JSF 组件树表示，该组件树可以通过组件的 `binding`\
  \ 属性绑定到支持 bean。视图和模型的交集由 EL（表达式语言）值表达式的属性 getter 和 setter 表示，这些表达式通常通过组件的 `value`\
  \ 属性绑定到支持 bean。控制器和模型的交集由 EL 方法表达式的操作方法调用表示，这些表达式可以通过组件的 `action` 属性绑定到支持 bean。最后，所有交集的交集由支持\
  \ bean 本身表示。\n\n![A454457_1_En_8_Fig1_HTML.jpg](img/A454457_1_En_8_Fig1_HTML.jpg)\n\
  \n\n\n###### 图 8-1 支持 Bean 在 JSF 的 MVC 范式中的位置\n\n在这种 MVC 范式中，支持 Bean 因此占据了一个相当独特的位置。请注意，支持\
  \ Bean 不一定需要由单个类来表示。它甚至可以由多个类来表示，每个类都有自己的受管 Bean 作用域，就像视图可以由多个 Facelets 文件表示，模型可以由多个\
  \ EJB/JPA 类表示一样。\n\n回到 JSF 开发者的视角，我们甚至可以更进一步，根据你编写支持 Bean 类的方式，来考虑支持 Bean 是模型还是控制器。以下是一种方式：\n\
  \n```\n@Named @RequestScoped @Stateful\npublic class ProductBacking {\n\n    private\
  \ String productName;\n    private String productDescription;\n\n    @Inject\n    private\
  \ ActiveUser activeUser;\n\n    @PersistenceContext\n    private EntityManager entityManager;\n\
  \n    public void save() {\n        Product product = new Product();\n        product.setName(productName);\n\
          product.setDescription(productDescription);\n        product.setCreatedBy(activeUser.get());\n\
          entityManager.persist(product);\n        FacesContext.getCurrentInstance().addMessage(null,\n\
              new FacesMessage(\"Product created!\"));\n    }\n\n    // 为产品名称和描述添加/生成\
  \ getter 和 setter 方法\n}\n```\n\n在这种相当简单的方式中，实体的属性基本上在支持 Bean 类中被重复了，并且业务逻辑紧密耦合在支持\
  \ Bean 类中。换句话说，支持 Bean 类错误地接管了真实模型的职责。有人可能会错误地将这种支持 Bean 类解释为唯一的模型。当我们消除这种重复和不可重用性时，我们找到了另一种方式：\n\
  \n```\n@Named @RequestScoped\npublic class ProductBacking {\n\n    private Product\
  \ product = new Product();\n\n    @Inject\n    private ProductService productService;\n\
  \n    public void save() {\n        productService.create(product);\n        FacesContext.getCurrentInstance().addMessage(null,\n\
              new FacesMessage(\"Product created!\"));\n    }\n\n    public Product\
  \ getProduct() {\n        return product;\n    }\n}\n```\n\n其中 `ProductService`\
  \ 如下所示：\n\n```\n@Stateless\npublic class ProductService {\n\n    @PersistenceContext\n\
      private EntityManager entityManager;\n\n    @Inject\n    private ActiveUser\
  \ activeUser;\n\n    public Long create(Product product) {\n        product.setCreatedBy(activeUser.get());\n\
          entityManager.persist(product);\n        return product.getId();\n    }\n\
  }\n```\n\n这实际上是编写支持 Bean 的正确方式。与第一种方式相比，你可以认为，从 JSF 开发者的角度来看，支持 Bean 已经成为了 EJB/JPA\
  \ 模型的控制器。从 JSF 开发者的角度来看，支持 Bean 作为控制器并没有错，但从 JSF 框架的角度来看，这实际上并不正确，因为真正的控制器是`FacesServlet`。`FacesServlet`将支持\
  \ Bean 视为模型，因为它无法直接访问真正的模型，即服务层。当然，作为 JSF 开发者，你可以在自己的上下文中将支持 Bean 视为控制器，因为在编写 JSF\
  \ 代码时，你无需担心`FacesServlet`的工作，可以轻松忽略它的所有职责。在编写 JSF 代码时，你只需要关心视图、模型和支持 Bean。其余的工作都由\
  \ JSF 透明地完成。\n\n## 受管 Bean\n\n“支持 Bean”和“受管 Bean”之间的概念差异可以通过在 Bean 管理设施底层执行的以下几行代码来表示：\n\
  \n```\nBackingBeanClass managedBeanInstance = new BackingBeanClass();\nsomeContext.put(\"\
  managedBeanName\", managedBeanInstance, someScope);\n```\n\n换句话说，支持 Bean 是由你（JSF\
  \ 开发者）创建的具体类，并注册到某个 Bean 管理设施（如 CDI）中。Bean 管理设施将通过执行构造、依赖注入和在必要时进行销毁来自动管理 Bean 的生命周期，而无需你手动操作。如果你曾经使用\
  \ JSP/Servlet 进行开发，这基本上消除了手动实例化 Bean 并将其作为`ServletContext`、`HttpSession`或`ServletRequest`属性的需要。²\
  \ 要将支持 Bean 类注册为 JSF 视图的 CDI 受管 Bean，只需在类签名上添加`@javax.inject.Named`注解³。\n\n```\n\
  @Named\npublic class BackingBeanClass {\n    // ...\n}\n```\n\n然后它将立即在 EL 上下文中通过`#{backingBeanClass}`可用，并在所有其他受管\
  \ Bean 中通过`@Inject`可用。EL 上下文在 Facelets 文件中直接可用。默认情况下，受管 Bean 名称是通过将支持 Bean 类名的首字母小写派生而来的。这可以通过指定`@Named`注解的值来覆盖。\n\
  \n```\n@Named(\"managedBeanName\")\npublic class BackingBeanClass {\n    // ...\n\
  }\n```\n\n现在它在 EL 上下文中通过`#{managedBeanName}`可用。`@Inject`方法没有任何变化。一旦 JSF 支持 Bean\
  \ 成为受管 Bean，当它在与 Bean 作用域关联的上下文中首次被访问时，它将被自动实例化和初始化。当与 Bean 作用域关联的生命周期结束时，它将被自动销毁。下一节将详细介绍受管\
  \ Bean 作用域。\n\n历史上，JSF 提供了一种原生方式来将支持 Bean 类注册为受管 Bean：首先，在 JSF 1.x 中通过`faces-config.xml`中的`<managed-bean>`条目，自\
  \ JSF 2.0 起通过`@javax.faces.bean.ManagedBean`注解，该注解自 JSF 2.3 起已正式弃用，转而推荐使用 CDI 的`@Named`。CDI\
  \ 首次引入是在 Java EE 6 中，与 JSF 2.0 同时期，旨在统一上下文敏感实例的管理，并允许将当前可用的实例相互注入。不幸的是，JSF 2.0 的`@ManagedBean`在\
  \ CDI 完成之前就已经定型，因此这两种管理 Bean 的方式曾并行存在了一段时间。CDI Bean 管理设施相比 JSF Bean 管理设施有几个优势。\n\
  \n首先，使用 CDI 的`@Inject`将一个受管 Bean 注入到另一个受管 Bean 中，不需要在父支持 Bean 类中提供 getter/setter\
  \ 对，而 JSF 的`@javax.faces.bean.ManagedProperty`则需要 getter/setter 对，这被认为是一种不良实践，因为这会向外部暴露过多信息，可能造成混淆。我们应该通过`#{bean}`还是`#{parentBean.bean}`来访问注入的\
  \ Bean？\n\n其次，注入的 CDI 受管 Bean 的作用域可以比父受管 Bean 的作用域更窄。这是可能的，因为 CDI 的`@Inject`实际上注入的是一个代理实例，该代理实例再委托给当前可用的实例，而\
  \ JSF 的`@ManagedProperty`则是在父 Bean 构造后直接调用 setter 方法来“注入”实际实例。\n\n第三，CDI 受管 Bean\
  \ 可以在所有其他不由 JSF 直接管理的 Java EE 工件中访问，例如 Web Servlet、Web 过滤器、Web 监听器、Socket 端点、Web\
  \ 服务端点、企业 Bean 等。这使得在同一应用程序的不同层之间（尤其是在同一个 HTTP 会话内）交换数据变得非常容易。\n\n\n\n再次强调，自 JSF\
  \ 2.3 起，JSF 的 Bean 管理功能已正式弃用。在新的 JSF 应用程序中，你绝对不应再使用它。出于向后兼容的考虑，它仍会保留在 JSF API 中，但\
  \ `javax.faces.bean` 包很可能会在未来的某个 JSF 版本中被完全移除。现有的 JSF 应用程序应尽快迁移到 CDI。CDI 在普通的 Java\
  \ EE 应用服务器中原生可用，并且在功能精简的 Servlet 容器中也相对容易安装。例如，作为 CDI 实现之一的 JBoss Weld，只需在项目中添加一个依赖\
  \ `org.jboss.weld.servlet:weld-servlet-shaded` 即可安装在 Tomcat 中⁴，无需额外操作。\n\n## 作用域\n\
  \n受管 Bean 的作用域基本上代表了受管 Bean 的生命周期。如前一节所述，从纯 JSP/Servlet 的角度来看，作用域由作为 `ServletContext`、`HttpSession`\
  \ 或 `ServletRequest` 属性放入的对象来表示。这些对象将分别成为应用程序作用域、会话作用域和请求作用域。这也是 CDI 等技术的运作方式；它只是在其上增加了一个额外的抽象层，这样你就不再需要手动创建对象并将其放入特定的作用域中。\n\
  \n在标准 JSF 中，以下 CDI 受管 Bean 作用域可用于 JSF 的后台 Bean，按生命周期从长到短排列。\n\n1.  `@javax.enterprise.context.ApplicationScoped`\n\
  2.  `@javax.enterprise.context.SessionScoped`\n3.  `@javax.enterprise.context.ConversationScoped`\n\
  4.  `@javax.faces.flow.FlowScoped`\n5.  `@javax.faces.view.ViewScoped`\n6.  `@javax.enterprise.context.RequestScoped`\n\
  7.  `@javax.enterprise.context.Dependent`\n\n请注意，`javax.faces.bean` 包也定义了一组作用域，但它们仅适用于由\
  \ JSF 的 `@ManagedBean` 管理的 Bean，不适用于由 CDI 管理的 Bean。此外，自 JSF 2.3 起，`javax.faces.bean`\
  \ 包已被弃用，转而推荐使用 CDI。\n\n### @ApplicationScoped\n\n应用程序作用域的受管 Bean 实例与 Web 应用程序本身的生命周期绑定。它在底层表示为\
  \ `ServletContext` 的一个属性，该属性在 Web 应用程序部署时创建，在 Web 应用程序取消部署时销毁。请注意，这不等同于服务器的启动和关闭。Web\
  \ 应用程序可以在正在运行的服务器上进行部署和取消部署。\n\n换句话说，在整个 Web 应用程序的生命周期内，只有一个应用程序作用域的受管 Bean 实例，该实例在所有请求和会话之间共享。你可以认为它的行为类似于单例。然而，它实际上并未遵循单例设计模式。它遵循的是“仅创建一个”设计模式。⁵\
  \ 真正的单例没有任何公共构造函数，只有一个静态方法，该方法返回一个静态初始化的延迟加载实例。另一方面，一个真正的 JavaBean 需要一个默认构造函数的存在。\n\
  \n默认情况下，应用程序作用域的受管 Bean 实例是在 Web 应用程序的生命周期内，当 Web 应用程序的代码首次访问它时创建的。因此，它并非在 `ServletContext`\
  \ 实例创建时立即创建。但是，可以保证在 `ServletContext` 实例销毁时它会被销毁。\n\n应用程序作用域的受管 Bean 对于需要在应用程序生命周期内仅初始化一次的应用程序范围数据非常有用，或者需要提供委托给静态变量的非静态\
  \ getter 方法，或者需要提供用于 EL 表达式的函数。以下示例确保存储在数据库中的应用程序设置仅加载一次，并在应用程序的其余生命周期内通过 `#{settings}`\
  \ 以 `Map` 形式提供。\n\n```\n@ApplicationScoped\npublic class ApplicationSettingsProducer\
  \ {\n\n    private Map<String, String> settings;\n\n    @Inject\n    private ApplicationSettingsService\
  \ applicationSettingsService;\n\n    @PostConstruct\n    public void init() {\n\
  \        settings = applicationSettingsService.getAll();\n    }\n\n    @Produces\
  \ @Named\n    public Map<String, String> getSettings() {\n        return settings;\n\
  \    }\n}\n```\n\n请注意，`@Named` 注解放在 getter 方法上，这意味着受管 Bean 的名称与属性名称匹配：`#{settings}`。同时请注意，getter\
  \ 方法本身需要 `@Produces` 注解才能被识别为受管 Bean 生产者。以下是另一个提供文本格式化函数的示例。\n\n```\n@Named @ApplicationScoped\n\
  public class Format {\n\n    public String date(LocalDate localDate) {\n       \
  \ if (localDate != null) {\n            return localDate.format(DateTimeFormatter.ISO_LOCAL_DATE);\n\
  \        }\n        else {\n            return \"n/a\";\n        }\n    }\n\n  \
  \  public String currency(BigDecimal amount) {\n        if (amount != null) {\n\
  \            return NumberFormat.getCurrencyInstance(Locale.US)\n              \
  \  .format(amount);\n        }\n        else {\n            return \"n/a\";\n  \
  \      }\n    }\n}\n```\n\n这在例如数据表中保持 Facelets 代码简洁时非常有用。\n\n```\n<h:dataTable value=\"\
  #{cart.products}\" var=\"product\">\n    <h:column>#{format.date(product.lastModified)}</h:column>\n\
  \    <h:column>#{format.currency(product.discount)}</h:column>\n</h:dataTable>\n\
  ```\n\n当你需要在不允许嵌套 `<h:outputText><f:convertXxx>` 的属性中使用格式化值时，它也非常有用。\n\n```\n<h:commandLink\
  \ ... title=\"Last visited #{format.date(user.lastVisited)}\">\n```\n\n\n\n### @SessionScoped\n\
  \n会话作用域的管理 Bean 实例与已建立的 HTTP 会话的生命周期绑定。它在底层表现为 `HttpSession` 的一个属性，该属性是为每个唯一客户端根据\
  \ Web 应用程序代码的需求而创建的。当 Web 应用程序代码首次通过 `HttpServletRequest#getSession()` 直接或间接访问 `HttpSession`\
  \ 时，Servlet 容器会创建一个新的 `HttpSession` 实例，生成一个长且唯一的 ID，并将其存储在服务器内存中。Servlet 容器还会在 HTTP\
  \ 响应上设置一个会话 Cookie，其中 `JSESSIONID` 作为 Cookie 名称，唯一的会话 ID 作为 Cookie 值。“会话 Cookie”通过缺少“最大存活时间”属性来识别。\n\
  \n根据 HTTP Cookie 规范，只要 Cookie 有效，客户端（Web 浏览器）就需要在后续请求的标头中将其发送回来。在任何主流的 Web 浏览器中，你都可以在\
  \ Web 开发者工具集的“网络”部分检查请求和响应标头，该工具集可通过在浏览器中按 F12 键访问。Servlet 容器会检查每个传入的 HTTP 请求，查找名为\
  \ `JSESSIONID` 的 Cookie，并使用其值（会话 ID）从服务器内存中获取关联的 `HttpSession` 实例。\n\n在服务器端，`HttpSession`\
  \ 实例会一直保持活动状态，直到其未被访问的时间超过 `web.xml` 中 `<session-timeout>` 设置指定的超时值（在大多数（如果不是全部）Servlet\
  \ 容器中，该值默认为 30 分钟）。因此，当客户端访问 Web 应用程序的间隔时间超过指定时间时，Servlet 容器将销毁 `HttpSession` 实例。随后的每个\
  \ HTTP 请求，即使带有指定的 Cookie，也无法再访问该 `HttpSession` 实例；Servlet 容器会创建一个新的 `HttpSession`\
  \ 实例，并用新的会话 ID 覆盖 Cookie 值。\n\n在客户端，默认情况下，所有会话 Cookie 在浏览器实例运行期间保持有效。因此，当客户端关闭浏览器实例时，客户端上的所有会话\
  \ Cookie 都会被销毁。在新的浏览器实例中，来自先前浏览器会话的会话 Cookie 不再可用，因此浏览器不会发送任何 `JSESSIONID` Cookie。服务器随后会将其解释为一个全新的会话。与先前浏览器会话关联的\
  \ `HttpSession` 实例将在服务器端静默过期。\n\n默认情况下，会话作用域的管理 Bean 实例会在 HTTP 会话生命周期内，当 Web 应用程序代码首次访问它时被创建。因此，它并非在\
  \ `HttpSession` 实例创建时立即创建。然而，可以保证的是，当 `HttpSession` 实例被销毁时，它也会被销毁。会话作用域的管理 Bean\
  \ 实际上在同一浏览器会话内的所有浏览器标签页之间共享。\n\n会话作用域的管理 Bean 对于跟踪客户端特定数据非常有用，例如代表当前登录用户的实体、所选语言以及其他与用户相关的偏好设置。以下示例计算当前区域设置，并为其提供\
  \ getter/setter 方法，以便在视图中获取它，并通过 `UIInput` 组件进行修改。\n\n```\n@Named @SessionScoped\n\
  public class ActiveLocale implements Serializable {\n\nprivate Locale current;\n\
  \n@PostConstruct\n    public void init() {\n        FacesContext context = FacesContext.getCurrentInstance();\n\
          current = context.getApplication()\n            .getViewHandler().calculateLocale(context);\n\
      }\n\n// Getter+setter.\n}\n```\n\n更详细的示例可以在第 14 章的“更改活动区域设置”部分找到。请注意，会话作用域的管理\
  \ Bean 必须实现 `Serializable`，因为存储这些 Bean 的 `HttpSession` 实例本身可能会在服务器重启时被写入磁盘，甚至在具有可分发会话的服务器集群配置中通过网络传输到另一台服务器。\n\
  \n另一个经典示例是“购物车”。\n\n```\n@Named @SessionScoped\npublic class Cart implements Serializable\
  \ {\n\nprivate List<Product> products = new ArrayList<>();\n\npublic void addProduct(Product\
  \ product) {\n        products.add(product);\n    }\n\n// ...\n}\n```\n\n\n\n###\
  \ @ConversationScoped\n\n处于会话作用域的托管 Bean 的生命周期与注入的 `javax.enterprise.context.Conversation`\
  \ 实例绑定，该实例提供了 `begin()` 和 `end()` 方法，必须由 Web 应用程序代码显式调用，以指示会话作用域的开始和结束。会话作用域由一个预定义的\
  \ HTTP 请求参数表示，其默认名称为“cid”（“会话 ID”），该参数的值代表会话 ID。会话 ID 又引用了当前 HTTP 会话中的一个隔离映射，会话作用域的托管\
  \ Bean 实例将存储在该映射中。\n\n只要会话作用域尚未开始，会话作用域的托管 Bean 的行为就类似于请求作用域的托管 Bean。当应用程序代码显式调用\
  \ `Conversation#begin()` 时，会话作用域将开始，并且由 CDI 实现提供的自定义 `javax.faces.application.ViewHandler`\
  \ 将确保其所有 `getXxxURL()` 方法（例如 `getActionURL()` 和 `getBookmarkableURL()`）返回包含会话 ID\
  \ 参数的 URL（统一资源定位符）。以 Weld 为例，该 ViewHandler 是 `ConversationAwareViewHandler`。⁶ 所有\
  \ JSF 的 `UIForm` 和 `UIOutcomeTarget` 组件都从 ViewHandler 的这些方法派生其操作和目标 URL。因此，这些组件生成的\
  \ HTML 输出最终将在目标 URL 中包含会话 ID。\n\n在传入的 HTTP 请求中，当请求中存在会话 ID 参数且该参数仍然有效时，CDI 实现将从\
  \ HTTP 会话中获取关联的会话作用域，并确保所有会话作用域的托管 Bean 都从该由会话 ID 标识的会话作用域中获取。这适用于 GET 和 POST 请求。任何表单提交或指向包含会话\
  \ ID 的 URL 的链接/导航，只要该会话作用域仍然有效，都将提供对同一个会话作用域的访问。当应用程序代码显式调用 `Conversation#end()`\
  \ 时，会话作用域结束。当最终用户稍后重用“cid”请求参数，或将其值修改为在其自身浏览器会话中未启动的值，或当底层 `HttpSession` 实例被销毁时，CDI\
  \ 将抛出 `javax.enterprise.context.NonexistentConversationException`。\n\n会话作用域的托管 Bean\
  \ 特别有用，可以在同一浏览器会话中被重定向到别处后，能够返回到特定的有状态页面。一个经典的例子是第三方 Web 服务，它被包含在 HTML `<iframe>`\
  \ 中，或在新浏览器标签页中打开，甚至作为纯 HTML `<form>` 的 `action` 属性的目标，并且可以通过特定的请求参数配置为在完成服务后重定向回您的\
  \ Web 应用程序。当您在重定向 URL 中包含会话 ID 时，您将能够在重定向后的页面中，恢复使用与重定向之前完全相同的会话作用域托管 Bean 实例。这使您有机会完成并解锁任何待处理的事务，当然，也可以结束会话。\n\
  \n假设有一个如下所示的结账按钮：\n\n```\n<h:form>\n    ...\n    <ui:fragment rendered=\"#{empty\
  \ payment.url}\">\n        ...\n        <h:commandButton value=\"结账\" action=\"\
  #{payment.checkout}\">\n            <f:ajax render=\"@form\" />\n        </h:commandButton>\n\
      </ui:fragment>\n    <ui:fragment rendered=\"#{not empty payment.url}\">\n        <iframe\
  \ src=\"#{payment.url}\"></iframe>\n    </ui:fragment>\n</h:form>\n```\n\n以下是 `#{payment}`\
  \ 背后关联的会话作用域 Bean 的样子：\n\n```\n@Named @ConversationScoped\npublic class Payment\
  \ implements Serializable {\n\nprivate Order order;\n    private String url;\n\n\
  @Inject\n    private Cart cart;\n\n@Inject\n    private OrderService orderService;\n\
  \n@Inject\n    private Conversation conversation;\n\npublic void checkout() {\n\
          conversation.begin();\n        order = orderService.lockProductsAndPrepareOrder(cart);\n\
          url = \"http://third.party.com/pay?returnurl=\"\n            + URLEncoder.encode(\"\
  http://my.site.com/paid?cid=\"\n            + conversation.getId(), \"UTF-8\");\n\
      }\n\npublic void confirm() {                                               \
  \                                       \n        orderService.saveOrderAndCreateInvoice(order);\n\
          conversation.end();\n    }\n\n@PreDestroy\n    public void destroy() {\n\
          orderService.unlockProductsIfNecessary(order);\n    }\n\npublic String getUrl()\
  \ {\n        return url;\n    }\n}\n```\n\n基本上，结账按钮仅在未设置支付 URL 时渲染。一旦按下该按钮，购物车中的所有产品都会被锁定，并准备好订单。同时，根据第三方支付服务，需要准备引用该服务的\
  \ URL，其中将返回 URL 作为支付服务 URL 中的某个查询参数包含在内。返回 URL 又应包含代表会话 ID 的“cid”请求参数。在 `<iframe>`\
  \ 中实际加载的重定向页面中，您可以使用 `<f:viewAction>` 标记会话完成。\n\n```\n<f:metadata>\n    <f:viewAction\
  \ action=\"#{payment.confirm}\" />\n</f:metadata>\n```\n\n当然，一般的第三方支付服务应该提供更完善的\
  \ Java 甚至 JavaScript API，而不是 `<iframe>`；此外，应该能够为每种支付结果（例如支付失败和支付中止）提供不同的返回页面。以上示例仅用于说明总体思路。\n\
  \n\n\n### @FlowScoped\n\n流作用域托管 Bean 与 JSF 流的生命周期绑定。它遵循与会话作用域相同的原则，只是将会话进一步限定在隔离子文件夹中的一组特定\
  \ JSF 视图内。当最终用户点击导航到 JSF 流特定入口页面的 JSF 链接或按钮组件时，流作用域将自动启动。如果未通过 JSF 组件导航而直接打开入口页面，则无法启动流作用域。也就是说，JSF\
  \ 将借助 ViewHandler 自动将预定义的 HTTP 请求参数 “jfwid”（“javax.faces Window ID”）附加到结果 URL 上，该参数的值代表\
  \ JSF 客户端窗口 ID。而 JSF 客户端窗口 ID 又引用了当前 HTTP 会话中存储流作用域托管 Bean 的隔离映射。\n\n此外，特别是当使用 UIOutcomeTarget\
  \ 组件而非 UICommand 组件进行导航时，查询字符串可能附带 “jffi”（javax.faces Flow ID）和 “jftfdi”（javax.faces\
  \ To Flow Document ID）请求参数。实际上，这些参数仅在使用 GET 请求启动 JSF 流时是必需的。从技术上讲，对于 JSF 流的其余部分，“jfwid”\
  \ 参数就足够了。只要 “jfwid” 参数存在且仍然有效，JSF 流就是幂等的，并且可以通过 GET 请求恢复。当您打开新的浏览器标签页并导航进入 JSF 流时，实际上会启动一个新的流作用域，该作用域独立于其他标签页中的\
  \ JSF 流。一旦 JSF 流内的回发请求导航到 JSF 流外部的页面，流作用域将自动结束。当最终用户稍后重复使用 “jfwid” 请求参数，或将其值篡改为其自身浏览器会话中未启动的值，或直接进入流，或当底层\
  \ HttpSession 实例被销毁时，CDI 将抛出 javax.enterprise.context.ContextNotActiveException。\n\
  \n因此，流作用域与会话作用域的主要区别在于，JSF 流内的页面无法直接进入。当最终用户导航到 JSF 流的入口页面时，它们会自动启动；当回发导航到 JSF 流外部时，它们会自动结束。流作用域托管\
  \ Bean 对于将会话隔离到一组特定的 JSF 页面非常有用。一个经典的现实世界示例是预订应用程序，它分布在物理上不同的多个表单页面中。\n\n有多种定义 JSF\
  \ 流的方式。一种方式是通过约定，另一种方式是通过在 /[flowId]/[flowId]-flow.xml 文件中进行声明式配置，还有一种方式是通过使用 javax.faces.flow.FlowBuilder\
  \ API 进行编程式配置。⁷ 在本书中，我们将仅限于约定优于配置的方式。首先，创建以下文件夹结构：\n\n![A454457_1_En_8_Figa_HTML.jpg](img/A454457_1_En_8_Figa_HTML.jpg)\n\
  \n第一个约定是，流入口页面的名称必须与其所在的子文件夹名称完全相同。在本例中，即 “booking”。这被视为流 ID。第二个约定是，子文件夹中必须存在一个\
  \ *-flow.xml 文件，其名称以流 ID 为前缀，即 booking-flow.xml。此 XML 配置文件目前可以保持为空。它仅在您想要精细调整 JSF\
  \ 流配置时才有用，例如，通过指定不同的入口页面。没有此文件，JSF 流作用域将不会被激活。然而，在 Web 应用程序中至少激活一个 JSF 流的一个缺点是，JSF\
  \ 客户端窗口 ID 参数 “jfwid” 将被附加到每一个导航 URL 上，即使它不指向 JSF 流。这种 URL 污染可能是一些开发者完全不使用 JSF 流作用域的主要原因。\n\
  \n用于进入 JSF 流的导航组件必须放置在流子文件夹外部的 JSF 页面中。导航结果必须引用子文件夹名称，即流 ID。以下是 /home.xhtml 中的一个示例。\n\
  \n```\n<h:button value=\"开始预订\" outcome=\"booking\" />\n```\n\n当然，这可以用 <h:link>\
  \ 替代。建议仅为此使用 GET，以便预订页面的 URL 能够反映在浏览器的地址栏中。然后，在子文件夹内的所有页面中，您可以引用一个流作用域托管 Bean，该\
  \ Bean 将在所有这些页面之间共享。您还可以在这些页面之间来回导航，同时保留流作用域托管 Bean 的实例。我们建议您为此使用带有重定向的 Ajax。Ajax\
  \ 提交将改善用户体验。重定向将确保各个页面仍然可以被添加书签。\n\n/booking/booking.xhtml：\n\n```\n<h:form>\n    <h:inputText\
  \ value=\"#{booking.startDate}\" />\n    ...\n    <h:commandButton value=\"下一步\"\
  \ action=\"persons?faces-redirect=true\">\n       <f:ajax execute=\"@form\" render=\"\
  @form\" />\n    </h:commandButton>\n</h:form>\n```\n\n/booking/persons.xhtml：\n\n\
  ```\n<h:form>\n    <ui:repeat value=\"#{booking.persons}\" var=\"person\">\n        <h:inputText\
  \ value=\"#{person.name}\" />\n        ...\n    </ui:repeat>\n    ...\n    <h:commandButton\
  \ value=\"返回\" action=\"booking?faces-redirect=true\">\n       <f:ajax execute=\"\
  @form\" render=\"@form\" />\n    </h:commandButton>\n    <h:commandButton value=\"\
  下一步\" action=\"confirm?faces-redirect=true\">\n       <f:ajax execute=\"@form\"\
  \ render=\"@form\" />\n    </h:commandButton>\n</h:form>\n```\n\n/booking/confirm.xhtml：\n\
  \n```\n<h:form>\n    <h:outputText value=\"#{booking.startDate}\" />\n    ...\n\
      <h:commandButton value=\"返回\" action=\"persons?faces-redirect=true\">\n       <f:ajax\
  \ execute=\"@form\" render=\"@form\" />\n    </h:commandButton>\n    <h:commandButton\
  \ value=\"下一步\" action=\"payment?faces-redirect=true\">\n       <f:ajax execute=\"\
  @form\" render=\"@form\" />\n    </h:commandButton>\n</h:form>\n```\n\n/booking/payment.xhtml：\n\
  \n```\n<h:form>\n    <h:selectOneMenu value=\"#{booking.paymentMethod}\">\n        ...\n\
      </h:selectOneMenu\n    ...\n    <h:commandButton value=\"返回\" action=\"confirm?faces-redirect=true\"\
  >\n       <f:ajax execute=\"@form\" render=\"@form\" />\n    </h:commandButton>\n\
      <h:commandButton value=\"提交\" actionListener=\"#{booking.submit()}\"\n       action=\"\
  /home?faces-redirect=true\">\n       <f:ajax execute=\"@form\" render=\"@form\"\
  \ />\n    </h:commandButton>\n</h:form>\n```\n\n最后，是 #{booking} 背后的流作用域 Bean：\n\n\
  ```\n@Named @FlowScoped(\"booking\")\npublic class Booking implements Serializable\
  \ {\n\nprivate LocalDate startDate;\n    private List<Person> persons;\n    private\
  \ PaymentMethod paymentMethod;\n    // ...\n\npublic void submit() {\n        //\
  \ ...\n    }\n}\n```\n\n您可以看到，大部分导航任务是由命令组件的 action 属性完成的。?faces-redirect=true 是一个特殊的请求参数，JSF\
  \ 内部将其识别为在回发后执行重定向的指令，当然，在执行实际重定向之前会从目标 URL 中剥离该参数。一旦回发离开该流，流作用域托管 Bean 就会被销毁，并且之前呈现的页面\
  \ URL 将不再可重用。\n\n\n\n### @ViewScoped\n\n视图作用域托管 Bean 与 JSF 视图状态的生命周期绑定。JSF 视图状态在第\
  \ 3 章的“视图状态”一节中有详细阐述。简而言之，只要最终用户在同一个 JSF 视图上执行回发请求，并且所调用的操作方法持续返回 null 或 void，视图作用域托管\
  \ Bean 就会一直存在。一旦操作方法返回非 null 值（即使是空字符串或代表同一视图），视图作用域就会结束。视图作用域托管 Bean 在同一浏览器会话的不同标签页之间不共享，每个标签页都有自己唯一的实例。实际上，它们是通过\
  \ JSF 表单生成的 HTML 表示中的 `javax.faces.ViewState` 隐藏输入字段间接标识的。\n\n然而，视图作用域托管 Bean 并不存储在\
  \ JSF 视图状态中，即使启用了客户端状态保存也是如此。无论采用何种 JSF 状态保存方法，它们实际上都存储在 HTTP 会话中。当最终用户通过链接或书签执行\
  \ GET 请求、在浏览器地址栏中编辑 URL 或关闭浏览器标签页来卸载网页时，它们不会立即被销毁。它们会一直保留在 HTTP 会话中，直到 HTTP 会话过期才会被销毁。\n\
  \n由于最终用户理论上可以在同一会话中生成无限数量的浏览器标签页，从而也生成同样多的 JSF 视图状态和视图作用域托管 Bean，因此对于存储在 HTTP 会话中的\
  \ JSF 视图状态和视图作用域托管 Bean 的数量，存在一个可配置的最大限制。一旦达到此限制，最近最少使用的 JSF 视图状态和视图作用域托管 Bean 将过期并被销毁。当最终用户实际返回到最初引用现已过期的\
  \ JSF 视图状态的标签页，并对其执行回发请求时，JSF 将抛出 `ViewExpiredException`。JSF 视图状态数量的限制取决于所使用的 JSF\
  \ 实现。在 Mojarra 中，此限制可通过 `web.xml` 中的 `com.sun.faces.numberOfLogicalViews` 上下文参数进行配置，其默认值为\
  \ 15。⁸\n\n```\n<context-param>\n    <param-name>com.sun.faces.numberOfLogicalViews</param-name>\n\
      <param-value>25</param-value>\n</context-param>\n```\n\n但是，如果您的 Web 应用程序（例如讨论论坛或问答网站）允许用户在更多浏览器标签页中打开，那么最好切换到客户端状态保存。这样，JSF\
  \ 视图状态将不再存储在 HTTP 会话中，因此也永远不会过期。然而，关联的视图作用域托管 Bean 仍然存储在 HTTP 会话中，并且可能过期。当最终用户实际返回到最初引用现已过期的视图作用域托管\
  \ Bean 的标签页，并对其执行回发请求时，JSF 不会抛出 `ViewExpiredException`，而是会从头开始创建一个新的 Bean，从而丢失对原始托管\
  \ Bean 实例的所有状态更改。视图作用域托管 Bean 数量的限制也取决于所使用的 JSF 实现。在 Mojarra 中，此限制尚不能通过 `web.xml`\
  \ 上下文参数配置。只能通过显式设置名称为 `com.sun.faces.application.view.activeViewMapsSize` 的会话属性来配置，其默认值为\
  \ 25。这可以通过一个应用程序作用域的托管 Bean 来实现，如下所示，该 Bean 会观察会话作用域的初始化。\n\n```\n@ApplicationScoped\n\
  public class Config {\n\npublic void sessionCreated\n        (@Observes @Initialized(SessionScoped.class)\
  \ HttpSession session)\n    {\n        session.setAttribute\n            (\"com.sun.faces.application.view.activeViewMapsSize\"\
  , 15);\n    }\n}\n```\n\n此配置实际上将默认值降低到与会话中 JSF 视图状态的默认最大数量相等。当您使用服务器端状态保存，并且所有 JSF\
  \ 视图实际上只引用一个视图作用域托管 Bean 实例时，这样做是可以的。然而，在一个经过良好开发和重构的 JSF Web 应用程序中，平均每个 JSF 页面通常会引用多个视图作用域托管\
  \ Bean。例如，如果每个 JSF 视图最多有三个不同的视图作用域托管 Bean，那么最好将限制设置为 `com.sun.faces.numberOfLogicalViews`\
  \ 值的三倍。您只需要考虑可能的内存消耗。当视图作用域托管 Bean 本身持有相对大量的数据时，内存消耗会迅速失控。\n\n视图作用域托管 Bean 对于在同一个\
  \ JSF 视图上基于 Ajax 的回发之间保持状态非常有用，特别是当这些回发导致任何 `UIComponent` 的 `rendered` 属性、`UIInput`\
  \ 组件的 `disabled` 或 `readonly` 属性，或同一 JSF 视图中任何 `UICommand` 组件的 `disabled` 属性值发生变化时。也就是说，在后续的回发中，JSF\
  \ 作为防止篡改请求的安全措施的一部分，会在实际处理组件之前重新检查这些属性。如果保存状态的托管 Bean 是请求作用域而不是视图作用域，那么这些条件的变化将在后续回发中丢失，并且回发将无法按预期直观地处理。换句话说，视图作用域托管\
  \ Bean 在动态表单中特别有用。\n\n一个例子是下拉菜单，当选择“其他”选项时，它会条件性地渲染一个自由文本字段。\n\n```\n<f:metadata>\n\
      <f:importConstants type=\"com.example.project.model.Title\" />\n</f:metadata>\n\
  ...\n<h:form>\n    <h:selectOneMenu value=\"#{bean.customer.title}\">\n        <f:selectItems\
  \ value=\"#{Title}\" />\n        <f:ajax render=\"other\" />\n    </h:selectOneMenu>\n\
      <h:panelGroup id=\"other\">\n        <h:inputText rendered=\"#{bean.customer.title\
  \ eq 'OTHER'}\"\n            value=\"#{bean.customer.titleOther}\" required=\"true\"\
  \ />\n    </h:panelGroup>\n    ...\n    <h:commandButton value=\"Save\" action=\"\
  #{bean.save}\" />\n</h:form>\n```\n\n当托管 Bean 是请求作用域并且因此在每个请求上重新创建时，此构造将无法工作。当下拉菜单更改时，它会创建一个新的请求作用域\
  \ Bean 实例，在其中设置标题，渲染自由文本字段，最后请求作用域 Bean 实例被销毁。当表单提交时，它会创建一个新的请求作用域 Bean 实例，因此没有客户标题，当\
  \ JSF 在自由文本字段的应用请求值阶段（第二阶段）检查 `rendered` 属性并发现它为 false 时，最终它将根本不会处理该自由文本字段。只有当托管\
  \ Bean 是视图作用域时它才能工作，因为在下拉菜单更改期间设置的客户标题在表单提交的应用请求值阶段（第二阶段）仍然可用。\n\n然而，有一种变通方法。您可以让\
  \ `rendered` 属性检查 HTTP 请求参数而不是模型值。如第 4 章所述，HTTP 请求参数名称由组件的客户端 ID 指定。您可以将下拉菜单组件绑定到视图，然后使用其客户端\
  \ ID 来获取 HTTP 请求参数值。\n\n```\n<h:selectOneMenu binding=\"#{title}\" value=\"#{bean.customer.title}\"\
  >\n    <f:selectItems value=\"#{Title}\" />\n    <f:ajax render=\"other\" />\n</h:selectOneMenu>\n\
  <h:panelGroup id=\"other\">\n    <h:inputText rendered=\"#{param[title.clientId]\
  \ eq 'OTHER'}\"\n        value=\"#{bean.customer.titleOther}\" required=\"true\"\
  \ />\n</h:panelGroup>\n```\n\n\n\n这样一来，当 JSF 在表单提交的“应用请求值”阶段（第二阶段）检查 `rendered`\
  \ 属性时，它会发现该属性为 true，并继续处理自由文本字段，即使托管 bean 是请求作用域的，因此此时 `#{bean.customer.title}`\
  \ 仍然为 null。请注意，`binding` 属性并不引用托管 bean 的属性。这是不必要的，因为在那里不会用到它。所有这些同样适用于任何 `UIInput`\
  \ 组件的 `readonly` 属性以及任何 `UIInput` 和 `UICommand` 组件的 `disabled` 属性。\n\n在某些情况下，请求作用域的托管\
  \ bean 也能正常工作，但与视图作用域的托管 bean 相比，它存在状态损坏的风险，尤其是在依赖来自共享数据库（可能被其他用户修改）的数据时。这主要影响那些\
  \ `UIInput` 或 `UICommand` 组件嵌套在迭代组件（如 `<h:dataTable>`、`<ui:repeat>` 和 `<c:forEach>`）中的用例，这些迭代组件会遍历来自数据库的模型。这一点在第\
  \ 6 章中已经解释过，但为了温故知新，我们将再次说明。想象一个产品表格，其中一列包含删除按钮。\n\n```\n<f:form id=\"list\">\n\
      <h:dataTable id=\"products\" value=\"#{products.list}\" var=\"product\">\n        ...\n\
          <h:column>\n            <h:commandButton id=\"delete\" value=\"Delete\"\n\
                  action=\"#{products.delete(product)}\">\n                <f:ajax\
  \ render=\"@namingcontainer\" />\n            </h:commandButton>\n        </h:column>\n\
      </h:dataTable>\n</h:form>\n```\n\n对应的后台 bean 如下：\n\n```\n@Named @ViewScoped\n\
  public class Products implements Serializable {\n\nprivate List<Product> list;\n\
  \n@Inject\n    private ProductService productService;\n\n@PostConstruct\n    public\
  \ void init() {\n        list = productService.list();\n    }\n\npublic void delete(Product\
  \ product) {\n        productService.delete(product);\n        list.remove(product);\n\
      }\n\npublic List<Product> getList() {\n        return list;\n    }\n}\n```\n\
  \n提交的按钮在底层是通过迭代索引来标识的。当 JSF 准备处理表单提交时，如果在此期间有产品被添加、删除甚至重新排序，导致迭代索引发生变化，那么被调用的操作可能会针对当前位于最初已知索引处的错误项目执行。这对模型的完整性是危险的。在这种情况下，迭代组件的\
  \ `value` 必须引用一个视图作用域的模型。\n\n同样，这里也有一种变通方法。与其依赖迭代索引，不如依赖被迭代对象的唯一标识符，该标识符必须作为 HTTP\
  \ 请求参数传递，而不是作为 EL 方法参数传递。\n\n```\n<f:form id=\"list\">\n    <h:dataTable id=\"products\"\
  \ value=\"#{products.list}\" var=\"product\">\n        ...\n        <h:column>\n\
              <h:commandButton id=\"delete\" value=\"Delete\"\n                action=\"\
  #{products.delete}\">\n                <f:param name=\"id\" value=\"#{product.id}\"\
  \ />\n                <f:ajax render=\"@namingcontainer\" />\n            </h:commandButton>\n\
          </h:column>\n    </h:dataTable>\n</h:form>\n```\n\n后台 bean 相应调整如下：\n\n```\n\
  @Named @RequestScoped\npublic class Products {\n\nprivate List<Product> list;\n\n\
  @Inject @ManagedProperty(\"#{param.id}\")\n    private Long id;\n\n@Inject\n    private\
  \ ProductService productService;\n\n@PostConstruct\n    public void init() {\n        list\
  \ = productService.list();\n    }\n\npublic void delete() {\n        productService.delete(id);\n\
          list.removeIf(product -> product.getId().equals(id));\n    }\n\npublic List<Product>\
  \ getList() {\n        return list;\n    }\n}\n```\n\n不，使用 `action=\"#{products.delete(product.id)}\"\
  ` 而不是 `<f:param>` 是行不通的。技术原因是，`<f:param>` 在表单的“渲染响应”阶段（远在最终用户按下删除按钮之前）就会立即执行。因此，在最终用户按下删除按钮的那一刻，它能保证拥有正确的值。相反，EL\
  \ 方法参数只有在最终用户按下删除按钮之后才会被评估。如果在此期间模型发生了变化，那么当特定产品的迭代索引改变时，它就会评估出错误的 ID。\n\n正如本节开头所述，标准的\
  \ JSF 视图作用域 bean 管理机制有两个主要缺点：首先，当最终用户卸载网页时，实例不会立即过期，而是会滞留在 HTTP 会话中；其次，即使启用了客户端状态保存，它们也会存储在\
  \ HTTP 会话中。这些问题目前尚未在标准 JSF API 中得到解决。\n\n目前，JSF 实用工具库 OmniFaces 提供了一个增强的 `@ViewScoped`\
  \ 注解，解决了这两个缺点。⁹ 使用 `@org.omnifaces.cdi.ViewScoped` 注解的视图作用域托管 bean 在最终用户卸载页面时实际上会被销毁。这底层是通过\
  \ JavaScript 中的 `Navigator.sendBeacon` API¹⁰ 以及 OmniFaces 提供的、监听这些卸载请求的专用 `ViewHandler`\
  \ 实现来完成的。已有生产级应用程序大量使用视图作用域托管 bean，在从标准 JSF `@ViewScoped` 切换到 OmniFaces `@ViewScoped`\
  \ 后，内存使用量减少了高达 80%。这使得“卸载时销毁”功能成为未来版本标准 JSF API 中一个重要的候选特性。\n\n为了在启用客户端状态保存时将物理的视图作用域托管\
  \ bean 保存到 JSF 视图状态中，必须将 OmniFaces `@ViewScoped` 注解的 `saveInViewState` 属性设置为 true。你只需要记住，这些\
  \ bean 永远不会过期，即使页面被卸载或 HTTP 会话过期也不会。实际上，整个 bean 在物理上已经成为生成的 HTML 输出的一部分，位于 `javax.faces.ViewState`\
  \ 隐藏输入字段中。社区一直有请求让 JSF 状态管理更加灵活，例如在逐个视图（每个 `UIViewRoot`）甚至逐个表单（每个 `UIForm`）的基础上切换客户端和服务器端状态保存，并且能够将视图作用域的托管\
  \ bean 存储在实际的视图状态中，而不是 HTTP 会话中。这可能会在标准 JSF API 的未来版本中重新考虑。\n\n\n\n### @RequestScoped\n\
  \n请求作用域的托管 Bean 与 HTTP 请求的生命周期绑定，这对 JSF 来说是最重要的情况。其他情况包括 EJB 异步方法调用（使用 `@Asynchronous`\
  \ 注解的方法）、EJB 定时器超时方法或消息驱动 Bean（MDB）处理消息时的生命周期。请注意，Ajax 请求也计为一次单独的 HTTP 请求。\n\n当客户端向服务器发送\
  \ HTTP 请求时，Servlet 容器会创建代表 HTTP 请求和响应的 `HttpServletRequest` 和 `HttpServletResponse`\
  \ 实例，并将它们传递给认证模块、过滤器和 Servlet。在所有认证模块、过滤器和 Servlet 完成请求和响应的处理后，这些实例会立即被销毁。换句话说，每个\
  \ HTTP 请求都会创建一个新的请求作用域托管 Bean 实例，该实例仅在该请求期间可用，而不会在其他请求中共享。\n\n请求作用域的托管 Bean 适用于简单且静态的表单，这些表单没有任何基于\
  \ Ajax 的动态更新，对于这种情况，你更倾向于使用视图作用域的托管 Bean。可以想象一个登录表单或联系表单。\n\n```\n@Named @RequestScoped\n\
  public class Login {\n\nprivate String username;\n    private String password;\n\
  \n// ...\n}\n```\n\n当然，这些表单也可以绑定到视图作用域的托管 Bean 而不会出现问题，但这会浪费内存空间。请注意，你绝对不应该将 JPA\
  \ 实体本身作为托管 Bean。换句话说，以下方法实际上是错误的：\n\n```\n@Named @RequestScoped\n@Entity\npublic\
  \ class Product {\n    // ...\n}\n```\n\n这不仅违反了迪米特法则，¹¹ 而且存在 JPA 无法持久化它的风险，因为 CDI\
  \ 实际上将托管 Bean 包装在一个代理类中，当你试图将注入的实例传递给 JPA 时，JPA 将无法从中获取实体信息。在这种情况下，Hibernate 会抛出“Unknown\
  \ entity: com.example.Entity$Proxy$_$$_WeldClientProxy”，这实际上代表的是 CDI 代理类。\n\n此时你可能会好奇\
  \ CDI 究竟是如何工作的。首先，在 Web 应用程序启动期间，它会收集所有带有 CDI 兼容作用域注解的类。然后，它会为所有这些类生成代理类。最终，这些代理类的实例会被注入。给定一个示例\
  \ Bean 类 `com.example.Bean`，生成的 CDI 代理类可能如下所示：\n\n```\npublic class Bean$Proxy$_$$_CDI\
  \ extends Bean implements Serializable {\n\npublic String getSomeProperty() {\n\
          Bean actualInstance = CDI.resolveItSomehow();\n        return actualInstance.getSomeProperty();\n\
      }\n\npublic void setSomeProperty(String someProperty) {\n        Bean actualInstance\
  \ = CDI.resolveItSomehow();\n        actualInstance.setSomeProperty(someProperty);\n\
      }\n}\n```\n\n你看，它继承了 Bean 类，使其可序列化，并使用了一个“不可能冲突”的类名，并让所有方法委托给从 CDI 上下文中获取的实际实例。你可能也会立刻明白为什么\
  \ CDI Bean 管理设施要求 Bean 类必须是公共的，并且拥有一个公共的默认构造函数。你还会看到，当创建并注入这样一个代理类时，底层的实际实例不一定会被创建。它只会在虚构的\
  \ `CDI.resolveItSomehow()` 方法被调用时自动创建。在底层，它会从一个线程局部变量中获取上下文，这与 `FacesContext#getCurrentInstance()`\
  \ 的工作方式完全相同。\n\n顺便提一下，EJB 也以这种方式使用可序列化的代理。这就是为什么它能够看似神奇地完成启动或加入事务以及使用池化实例等所有繁重工作。然而，传统的\
  \ JSF `@ManagedBean` 设施根本不使用代理。这正是为什么无法在更广作用域的 JSF 托管 Bean 中注入更窄作用域的 JSF 托管 Bean\
  \ 的原因。而使用 CDI Bean 管理设施，这是可以做到的。\n\n请注意，CDI 还有一个 `@javax.enterprise.inject.Model`\
  \ 原型注解，它基本上将 `@Named` 和 `@RequestScoped` 捆绑到一个注解中。这与请求作用域的托管 Bean 没有任何区别。不幸的是，它并不代表一个非代理实例；否则，将其放在\
  \ `@Entity` 上会很好。`@Model` 注解的存在只是为了方便。\n\n### @Dependent\n\n依赖作用域的托管 Bean 与其首次被创建时所在的作用域的生命周期绑定。因此，如果你将其注入到\
  \ `@ApplicationScoped` 中，它也会变成应用程序作用域。如果你将其注入到 `@ViewScoped` 中，它也会变成视图作用域，以此类推。这是\
  \ CDI 的默认作用域。\n\n然而，这有一个陷阱。当你忘记在支持 Bean 上声明 CDI 作用域注解，或者从错误的包中导入了名称完全相同的作用域（例如，`javax.faces.bean.RequestScoped`\
  \ 而不是 `javax.enterprise.context.RequestScoped`），并且你在 EL 中直接引用它（如 `#{dependentScopedBean}`），而不是通过另一个托管\
  \ Bean 引用它（如 `#{requestScopedBean.dependentScopedBean}`），那么每次 EL 求值都会创建一个全新的实例，该实例仅存在于该\
  \ EL 上下文中。换句话说，想象一个包含两个输入字段和一个提交按钮的 JSF 表单，每个都绑定到一个依赖作用域的托管 Bean，那么你最终会得到三个独立的实例。一个用于设置第一个输入字段，一个用于设置第二个输入字段，一个用于调用动作方法。因此，如果你曾经观察到动作方法中提交的值为\
  \ null 的奇怪行为，即使必填验证已经通过，首先要检查的是实际使用的 CDI 托管 Bean 作用域。\n\n与其他作用域的主要技术区别在于，依赖作用域的托管\
  \ Bean 不会被代理。换句话说，被注入的是实际实例。\n\n```\n@Dependent\npublic class Entities {\n\n    @Produces\n\
      public Product getProduct() {\n        return new Product();\n    }\n}\n\n@Named\
  \ @RequestScoped\npublic class Products {\n\n    @Inject\n    private Product product;\n\
  \n    @Inject\n    Private ProductService productService;\n\n    public void add()\
  \ {\n        productService.create(product);\n    }\n\n    public Product getProduct()\
  \ {\n        return product;\n    }\n}\n```\n\n请注意，你仍然不能使用 `<h:inputText value=\"\
  #{product.name}\">`，因为它会获取自己的实例。你仍然需要使用 `#{products.product.name}`。正是由于这个原因，生产者没有使用\
  \ `@Named`。另外请注意，如果是视图作用域的托管 Bean，你需要通过从动作方法返回一个非 null 的结果来强制 JSF 重新启动视图作用域；否则，注入的\
  \ `Product` 实例将在下一个视图中被重用。\n\n\n\n## 该选择哪种作用域？\n\n选择哪种作用域完全取决于 Bean 所持有和表示的数据（即实例变量，也就是状态）。你应该尽量将状态置于可接受的最短作用域内。从\
  \ `@RequestScoped` Bean 开始。一旦发现某些状态需要在同一视图的回发后保留，就将这些状态精确地拆分到一个新的 `@ViewScoped`\
  \ Bean 中，然后将其 `@Inject` 到 `@RequestScoped` Bean 中。一旦发现某些状态需要在同一会话内的另一个 GET 请求中保留，就将这些状态精确地拆分到一个新的\
  \ `@ConversationScoped` Bean 中，然后将其 `@Inject` 到 `@RequestScoped` Bean 中。以此类推。\n\n\
  将 `@ApplicationScoped` Bean 滥用于会话、对话、流程、视图或请求作用域的数据，会导致这些数据在所有用户之间共享，因此任何人都能看到彼此的数据，这显然是错误的。将\
  \ `@SessionScoped` Bean 滥用于对话、流程、视图或请求作用域的数据，会导致这些数据在同一会话的所有浏览器标签页之间共享，因此最终用户在切换标签页后与每个视图交互时可能会遇到不一致的情况，这对用户体验不利。将\
  \ `@RequestScoped` Bean 滥用于视图、流程或对话作用域的数据，会导致视图、流程或对话作用域的数据在每次（Ajax）回发时被重新初始化为默认值，可能导致表单无法正常工作。将\
  \ `@ViewScoped`、`@FlowScoped` 或 `@ConversationScoped` Bean 滥用于请求、会话或应用作用域的数据，以及将\
  \ `@SessionScoped` Bean 滥用于应用作用域的数据，虽然不会影响最终用户，但会不必要地占用服务器内存，并且效率低下。\n\n请注意，选择作用域不应基于性能影响，除非你确实内存占用很低并且希望完全无状态。在这种情况下，你需要专门使用带有\
  \ `@RequestScoped` Bean 的无状态表单，并通过操作请求参数来维护任何客户端的状态。换句话说，你可能需要重新发明 `javax.faces.ViewState`\
  \ 隐藏输入字段已经完成的功能。\n\n## `@FlashScoped` 在哪里？\n\n最后，JSF 也支持 Flash 作用域。它由一个短期存在的 Cookie\
  \ 支持，该 Cookie 与会话作用域中的一个数据条目相关联。在重定向前，会在 HTTP 响应上设置一个 Cookie，其值与会话作用域中的数据条目唯一关联。重定向后，会检查\
  \ Flash 作用域 Cookie 的存在，并将与该 Cookie 关联的数据条目从会话作用域中移除，然后放入重定向请求的请求作用域中。最后，该 Cookie\
  \ 会从 HTTP 响应中移除。这样，重定向后的请求就可以访问在初始请求中准备好的请求作用域数据。\n\n实际上，标准的 JSF API 并没有将其作为受管 Bean\
  \ 作用域提供。换句话说，不存在 `@FlashScoped` 这样的注解。Flash 作用域只能通过受管 Bean 中的 `ExternalContext#getFlash()`\
  \ 和 EL 中的 `#{flash}` 作为 Map 使用。从历史上看，引入 Flash 作用域主要是为了能够在重定向后的页面中显示在操作方法中设置的 Faces\
  \ 消息。想象一下这样一个用例：在详情页面保存编辑后的产品，然后重定向回主页面。\n\n```\npublic String save() {\n    FacesContext\
  \ context = FacesContext.getCurrentInstance();\n\ntry {\n        productService.update(product);\n\
          context.addMessage(null, new FacesMessage(\"产品已保存！\"));\n        return\
  \ \"/products?faces-redrect=true\";\n    }\n    catch (Exception e) {\n        context.addMessage(null,\
  \ new FacesMessage(\n            \"无法保存产品。错误：\" + e.getMessage()));\n        return\
  \ null;\n    }\n}\n```\n\nFaces 消息“产品已保存！”不会显示在重定向页面的 `<h:messages globalOnly>`\
  \ 中，因为 Faces 消息本质上是请求作用域的（实际上是“Faces 上下文作用域”）。在 JSF 1.x 时代，这个问题是通过一个阶段监听器解决的，该监听器在渲染响应阶段之后将所有未显示的\
  \ Faces 消息复制到 HTTP 会话中，并在恢复视图阶段之后将它们重新添加回 Faces 上下文。自从 JSF 2.0 引入 Flash 作用域以来，这个问题可以通过简单地调用\
  \ `Flash#setKeepMessages()` ¹² 以更简单的方式解决。\n\n```\nproductService.update(product);\n\
  context.addMessage(null, new FacesMessage(\"产品已保存！\"));\ncontext.getExternalContext().getFlash().setKeepMessages(true);\n\
  return \"/products?faces-redrect=true\";\n```\n\n这样，Faces 消息会在重定向前自动存储在 Flash 作用域中，并在重定向后恢复。\n\
  \nFlash 作用域不仅对 Faces 消息有用。它对于在从一个视图重定向到另一个视图时传递整个对象也很有用，而无需将某个对象标识符作为请求参数传递。以下是一个示例，它为下一步准备了一个实体，而无需先将其保存到数据库中：\n\
  \n```\n@Named @RequestScoped // 或 @ViewScoped\npublic class Home {\n\nprivate Product\
  \ product = new Product();\n\npublic String prepareProduct() {\n        FacesContext\
  \ context = FacesContext.getCurrentInstance();\n        context.getExternalContext().getFlash().put(\"\
  product\", product);\n        return \"/next?faces-redirect=true\";\n    }\n\npublic\
  \ Product getProduct() {\n        return product;\n    }\n}\n```\n\n下一步的 Bean 如下所示：\n\
  \n```\n@Named @ViewScoped\npublic class Next implements Serializable {\n\n@Inject\
  \ @ManagedProperty(\"#{flash.product}\")\n    private Product product;\n\npublic\
  \ void save() {\n        // ...\n    }\n\npublic Product getProduct() {\n        return\
  \ product;\n    }\n}\n```\n\n并且，当 Flash 作用域中不存在该实体时，`/next.xhtml` 会重定向回 `/home.xhtml`。\n\
  \n```\n<f:metadata>\n    <f:viewAction action=\"/home\" if=\"#{empty flash.product}\"\
  \ />\n</f:metadata>\n```\n\n请注意，当你直接打开 `/next.xhtml` 或在 Web 浏览器中刷新页面时，会发生此重定向。如果你想避免这种情况，可以通过在\
  \ `#{flash}` Map 上的条目键前加上预定义的“keep”键，来指示 Flash 作用域保留该条目的值。\n\n```\n@Named @RequestScoped\n\
  public class Next {\n\n@Inject @ManagedProperty(\"#{flash.keep.product}\")\n    private\
  \ Product product;\n\n// ...\n}\n```\n\n这样，Flash 作用域的生命周期将延长，直到最终用户关闭浏览器窗口、应用程序导航到不同视图或底层\
  \ HTTP 会话过期。这样，你甚至可以使受管 Bean 成为请求作用域而不是视图作用域，并且在 `/next.xhtml` 页面中提交表单甚至刷新页面时不会丢失实体。这是\
  \ Flash 作用域一个相对强大的功能。\n\n\n\n## 托管 Bean 的初始化与销毁\n\n托管 Bean 实例可以在带有 `@PostConstruct`\
  \ 注解的方法中，基于注入的依赖进行初始化。托管 Bean 实例可以在带有 `@PreDestroy` 注解的方法中，挂载销毁事件。\n\n```\n@Named\n\
  public class Bean {\n\n    @PostConstruct\n    public void init() {\n        //\
  \ ...\n    }\n\n    @PreDestroy\n    public void destroy() {\n        // ...\n    }\n\
  }\n```\n\n方法名称并非预定义。`init()` 和 `destroy()` 这两个方法名基本上是从 `HttpServlet` 继承而来的。当然，你可以选择自己的名称，例如\
  \ `onload()` 和 `cleanup()`。了解这些注解是可继承的会很有用。换句话说，你可以将这些方法和注解放在一个抽象基类中。\n\n在 `@PostConstruct`\
  \ 方法中，你有机会基于注入的依赖执行初始化。这些依赖在构造函数中尚不可用。Bean 管理设施只能在构造完托管 Bean 实例之后才能注入依赖。然后它会立即调用带有\
  \ `@PostConstruct` 注解的方法。在 `@PreDestroy` 方法中，你有机会执行任何必要的清理工作，例如关闭资源、删除文件等。\n\n##\
  \ 注入 JSF 提供的类型\n\n显然，支持 Bean 可以被注入，正如上面示例中多次演示的那样。除了注入你自己的类型之外，各种 JSF 提供的类型也可以通过\
  \ CDI 进行注入。这些类型在很大程度上对应于我们在第 7 章的表 7-1 中看到的隐式 EL 对象。这并非巧合。在 JSF 内部，隐式对象是通过 CDI 中所谓的\
  \ `Bean<T>` 实例来实现的。这些 CDI `Bean<T>` 实例实际上是工厂对象，它们知道如何生成 Bean，以及使用什么类型、可选的限定符和/或什么名称。\n\
  \n当在表达式语言中使用隐式对象的名称时，CDI EL 解析器会按名称查找该对象，这会导致调用某个 `Bean<T>` 实例。当我们进行注入时，我们注入的类型，连同任何显式或隐式的限定符，构成了用于此查找的替代键。两种类型的键都会导致使用完全相同的\
  \ CDI `Bean<T>` 实例。\n\n需要注意的是，与表 8-1 中提到的隐式 EL 对象相比，对于可通过 CDI 注入的 JSF 提供类型，缺少了几个，即：\n\
  \n*   `#{component}`\n*   `#{cc}`\n*   `#{request}`\n*   `#{session}`\n*   `#{application}`\n\
  \n`#{component}` 和 `#{cc}` 都解析为 `UIComponent`，它是不可注入的，因为这需要一个特殊的代理或自定义作用域，其范围要足够窄，以便在访问注入类型时解析出它们的“当前”实例。由于\
  \ JSF 中尚不存在这样的作用域，并且完成 JSF 2.3 规范的时间和资源所剩无几，因此这些被排除在 CDI 注入之外。\n\n`#{request}`、`#{session}`\
  \ 和 `#{application}` 分别代表 Servlet 容器中的 `HttpServletRequest`、`HttpSession` 和 `ServletContext`，它们被省略了，因为这些类型不属于\
  \ JSF，因此 JSF 不应为它们提供 CDI 注入能力。JSF 确实为这些提供了隐式 EL 对象，这主要是历史原因。唯一应该为这些类型提供注入的规范是 Servlet\
  \ API，它直接拥有这些类型。\n\n表 8-1 显示了可通过 CDI 注入的 JSF 提供类型。\n\n###### 表 8-1 可注入的 JSF 提供类型，自\
  \ 2.3 版本起全部可用\n\n| 可注入的 JSF 类型 | 解析为 |\n| --- | --- |\n| javax.faces.context.FacesContext\
  \ | FacesContext#getCurrentInstance(  ) |\n| javax.faces.context.ExternalContext\
  \ | FacesContext#getExternalContext(  ) |\n| javax.faces.component.UIViewRoot |\
  \ FacesContext#getViewRoot(  ) |\n| javax.faces.context.Flash | ExternalContext#getFlash(  )\
  \ |\n| @RequestMap Map<String, Object> | ExternalContext#getRequestMap(  ) |\n|\
  \ @ViewMap Map<String, Object> | UIViewRoot#getViewMap(  ) |\n| @FlowMap Map<Object,\
  \ Object> | FlowHandler#getCurrentFlowScope(  ) |\n| @SessionMap Map<String, Object>\
  \ | ExternalContext#getSessionMap(  ) |\n| @ApplicationMap Map<String, Object> |\
  \ ExternalContext#getApplicationMap(  ) |\n| @InitParameterMap Map<String, String>\
  \ | ExternalContext#getInitParameterMap(  ) |\n| @RequestParameterMap Map<String,\
  \ String> | ExternalContext#getRequestParameterMap(  ) |\n| @RequestParameterValuesMap\
  \ Map<String, String[]> | ExternalContext#getRequestParameterValuesMap(  ) |\n|\
  \ @HeaderMap Map<String, String> | ExternalContext#getRequestHeaderMap(  ) |\n|\
  \ @HeaderValuesMap Map<String, String[]> | ExternalContext#getRequestHeaderValuesMap(  )\
  \ |\n| @RequestCookieMap Map<String, Cookie> | ExternalContext#getRequestCookieMap(  )\
  \ |\n| javax.faces.application.ResourceHandler | Application#getResourceHandler(  )\
  \ |\n\n从表 8-1 可以看出，对于只有一个实例且该实例由 JSF 提供（拥有）的对象，不需要限定符。当涉及更通用的类型（例如各种 Map）时，则需要限定符。所有这些限定符注解都可以从\
  \ `javax.faces.annotation` 包中获得。¹³\n\n需要注意的是，上述所有类型都是请求作用域的，但它们实际有效的时间更短，即从 `FacesServlet`\
  \ 的 `service()` 方法被调用后不久，直到该方法退出前不久。应注意不要在此时间范围之外注入和访问这些类型。预计未来版本的 JSF 规范将解决此问题。\n\
  \n以下展示了注入两种 JSF 提供类型的示例：\n\n```\n@Named @RequestScoped\npublic class Bean {\n\n\
      @Inject\n    private Flash flash;\n\n    @Inject @RequestParameterMap\n    private\
  \ Map<String, String> requestParameterMap;\n\n    public void someMethod() {\n        if\
  \ (requestParameterMap.containsKey(\"something\")) {\n             flash.put(\"\
  aKey\", \"aValue\");\n        }\n    }\n}\n```\n\n\n\n## 急切初始化\n\n默认情况下，托管 bean\
  \ 在首次被 EL 表达式引用或作为注入依赖项时才会进行懒加载。通过观察特定作用域初始化的观察者方法，可以使托管 bean 在任何作用域启动时进行急切初始化。之前在“@ViewScoped”部分曾给出过一个示例。方法模式如下：\n\
  \n```\npublic void startup(@Observes @Initialized(XxxScoped.class) S scope) {\n\
      // ...\n}\n```\n\n其中 `XxxScoped.class` 可以是任何兼容 CDI 的作用域，`S` 代表该作用域的所有者。对于以下作用域，对应关系如下：\n\
  \n*   `ApplicationScoped.class` – `javax.servlet.ServletContext`\n*   `SessionScoped.class`\
  \ – `javax.servlet.http.HttpSession`\n*   `ConversationScoped.class` – `javax.servlet.ServletRequest`\n\
  *   `FlowScoped.class` – `javax.faces.flow.Flow`\n*   `ViewScoped.class` – `javax.faces.component.UIViewRoot`\n\
  *   `RequestScoped.class` - `javax.servlet.ServletRequest`\n\n请注意，为了使 `@Observes\
  \ @Initialized` 生效，包含该方法的 bean 的作用域必须至少与观察的作用域相同。对于应用作用域的托管 bean，急切初始化的优势在于，你可以将其配置为“启动”bean，而无需在其他\
  \ bean 中引用它来触发初始化。\n\n```\n@ApplicationScoped\npublic class Startup {\n\npublic\
  \ void contextInitialized\n        (@Observes @Initialized(ApplicationScoped.class)\n\
              ServletContext context)\n    {\n        // ...\n    }\n}\n```\n\n对于请求作用域的\
  \ bean，急切初始化的优势在于，如有必要，你可以在 `FacesServlet` 被调用之前很久就发起异步数据库查询。\n\n```\n@Named @RequestScoped\n\
  public class EagerProducts {\n\nprivate Future<List<Product>> list;\n\n@Inject\n\
      private ProductService productService;\n\npublic void requestInitialized\n        (@Observes\
  \ @Initialized(RequestScoped.class)\n            HttpServletRequest request)\n    {\n\
          if (\"/products.xhtml\".equals(request.getServletPath())) {\n            list\
  \ = productService.asyncList();\n        }\n    }\n\npublic List<Product> getList()\
  \ {\n        try {\n            return list.get();\n        }\n        catch (InterruptedException\
  \ e) {\n            Thread.currentThread().interrupt();\n            throw new FacesException(e);\n\
          }\n        catch (ExecutionException e) {\n            throw new FacesException(e);\n\
          }\n    }\n}\n```\n\n其中 `ProductService` 的代码如下：\n\n```\n@Stateless\npublic\
  \ class ProductService {\n\n@TransactionAttribute(SUPPORTS)\n    public List<Product>\
  \ list() {\n        return entityManager\n            .createQuery(\"FROM Product\
  \ ORDER BY id DESC\", Product.class)\n            .getResultList();\n    }\n\n@Asynchronous\n\
      public Future<List<Product>> asyncList() {\n        return new AsyncResult<>(list());\n\
      }\n}\n```\n\n请特别注意 `requestInitialized()` 方法，它观察任何请求作用域的启动，因此需要预先确定实际路径，以避免不必要地访问业务服务。在这个具体示例中，只有当请求到达\
  \ `/products.xhtml` 时才会触发。该 JSF 页面可以像往常一样直接引用产品列表。\n\n```\n<h:dataTable value=\"\
  #{eagerProducts.list}\" var=\"product\">\n    ...\n</h:dataTable>\n```\n\n当打开这个\
  \ JSF 页面时，请求作用域的 bean 会在 `FacesServlet` 被调用之前初始化，并异步从数据库获取 `List<Products>`。根据所使用的服务器硬件、可用的服务器资源以及在第一个\
  \ Servlet 过滤器被调用到进入 JSF 渲染响应之间运行的所有代码，这种方法可能会为你提供 10ms ~ 500ms 的时间窗口（如果管道中存在低效代码，时间甚至可能更长），以便在与\
  \ HTTP 请求并行的不同线程中从数据库获取数据，从而获得与数据库获取数据所需时间相当的加速效果（这意味着该操作无需在与 HTTP 请求相同的线程中完成）。\n\
  \n## 分层\n\n在实现后台 bean 时，理解将 JSF 后台 bean 与 JPA 实体和 EJB 服务分离的重要性至关重要。换句话说，在开发后台 bean\
  \ 时，应确保后台 bean 尽可能精简，并将尽可能多的模型属性委托给 JPA 实体，将业务逻辑委托给 EJB 服务。你应该认识到，JPA 实体和 EJB 服务应该能够在完全不同的前端（例如\
  \ JAX-RS 甚至纯 JSP/Servlet）中完全重用。\n\n这同样意味着，你应该确保不会直接或间接地在 JPA 实体或 EJB 服务中包含 JSF 特定的依赖项。例如，以下方法实际上是错误的：\n\
  \n```\n@Entity\npublic class Product {\n\n    private String name;\n    private\
  \ String description;\n\n    public static Product of(ProductBacking backingBean)\
  \ {\n        Product product = new Product();\n        product.setName(backingBean.getName());\n\
          product.setDescription(backingBean.getDescription());\n        return product;\n\
      }\n\n    // ...\n}\n```\n\n在这里，JPA 实体与 JSF 后台 bean 紧密耦合。不仅实体的属性在后台 bean 中被重用，而且实体还依赖于后台\
  \ bean。这样就不可能将实体提取到一个可在不同 JSF Web 应用程序间重用的 JAR 模块中。\n\n以下方法实际上也是错误的：\n\n```\n@Stateless\n\
  public class ProductService {\n\n    @Inject\n    private EntityManager entityManager;\n\
  \n    public void create(Product product) {\n        entityManager.persist(product);\n\
          FacesContext.getCurrentInstance().addMessage(null,\n            new FacesMessage(\"\
  Product created!\"));\n    }\n}\n```\n\n在这里，EJB 直接操作 faces 上下文并设置消息。当从例如 JAX-RS\
  \ 服务或 Servlet 调用该 EJB 方法时，这将导致 `NullPointerException`，因为那里不存在 faces 上下文的实例。这个 UI\
  \ 消息传递任务不是后端代码的责任，而是前端代码的责任。换句话说，添加 faces 消息只应在 JSF 工件（例如后台 bean）中发生。\n\n正确的方法如下，正如之前在“模型、视图还是控制器？”部分中演示的那样：\n\
  \n```\n@Named @RequestScoped\npublic class ProductBacking {\n\n    private Product\
  \ product = new Product();\n\n    @Inject\n    private ProductService productService;\n\
  \n    public void save() {\n        productService.create(product);\n        FacesContext.getCurrentInstance().addMessage(null,\n\
              new FacesMessage(\"Product created!\"));\n    }\n\n    public Product\
  \ getProduct() {                                                          \n        return\
  \ product;\n    }\n}\n```\n\n\n\n## 命名约定\n\nJSF 本身并未规定严格的命名约定。我在各种 JSF 项目中见过以下约定：\n\
  \n*   Foo\n\n*   FooBean\n\n*   FooBacking\n\n*   FooBackingBean\n\n*   FooManager\n\
  \n*   FooManagedBean\n\n*   FooController\n\n其中，Foo 又可以代表以下内容之一：\n\n*   JSF 视图 ID，\n\
  \n    例如，`/edit/product.xhtml` 对应的 `EditProduct`\n\n*   JSF 视图名称，\n\n    例如，`/view/products.xhtml`\
  \ 对应的 `Products`\n\n*   JPA 实体名称，\n\n    例如，`@Entity` 类 `Product` 对应的 `Product`\n\
  \n*   JSF 表单 ID，\n\n    例如，`<h:form id=\"editProduct\">` 对应的 `EditProduct`\n\n首先，必须尽量避免使用以\
  \ Bean 结尾的名称，如 `FooBean`、`FooBackingBean` 和 `FooManagedBean`。“bean”后缀是多余的，而且过于模糊，因为\
  \ Java 中几乎任何类都可以被标记为 JavaBean。你不会立即为你的 JPA 实体使用“ProductBean”，或者为你的 EJB 服务使用“ProductServiceBean”，甚至“ProductServiceEnterpriseBean”，对吧？诚然，在博客、论坛、问答网站甚至本书中的通用代码示例中，经常使用\
  \ `#{bean}`、`#{myBean}` 甚至 `#{yourBean}` 来表示 JSF 或 CDI 管理的 bean。但这仅仅是为了代码片段的清晰和简洁。\n\
  \n这样，我们就剩下 `Foo`、`FooBacking`、`FooManager` 和 `FooController`。这些命名方式都是可以接受的。就我个人而言，我倾向于将\
  \ `FooBacking` 用于请求、视图、流程和会话作用域的 bean，而将 `FooManager` 用于会话和应用作用域的 bean。至于 `Foo`\
  \ 部分的命名约定，通常取决于该支持 bean 是与特定的 JSF 视图或 JSF 表单紧密绑定，还是通常可在引用特定实体的多个 JSF 视图或表单之间重用。\n\
  \n无论如何，这是一个相当主观的问题，很难客观地回答出“唯一且正确的”答案。你如何命名对我来说或对其他人来说真的不那么重要，只要你在整个项目中保持一致即可。\n\
