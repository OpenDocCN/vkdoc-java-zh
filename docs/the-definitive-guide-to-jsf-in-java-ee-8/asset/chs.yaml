  \ .\n\n6 [`github.com/weld/core/blob/master/modules/jsf/src/main/java/org/jboss/weld/module/jsf/\
  \ ConversationAwareViewHandler.java`](https://github.com/weld/core/blob/master/modules/jsf/src/main/java/org/jboss/weld/module/jsf/ConversationAwareViewHandler.java)\
  \ .\n\n7 [`javaee.github.io/javaee-spec/javadocs/javax/faces/flow/builder/FlowBuilder.html`](https://javaee.github.io/javaee-spec/javadocs/javax/faces/flow/builder/FlowBuilder.html)\
  \ .\n\n8 [`stackoverflow.com/q/4105439/157882`](https://stackoverflow.com/q/4105439/157882)\
  \ .\n\n9 [`showcase.omnifaces.org/cdi/ViewScoped`](http://showcase.omnifaces.org/cdi/ViewScoped)\
  \ .\n\n10 [`developer.mozilla.org/en-US/docs/Web/API/Navigator/sendBeacon`](https://developer.mozilla.org/en-US/docs/Web/API/Navigator/sendBeacon)\
  \ .\n\n11 [`en.wikipedia.org/wiki/Law_of_Demeter`](https://en.wikipedia.org/wiki/Law_of_Demeter)\
  \ .\n\n12 [`javaee.github.io/javaee-spec/javadocs/javax/faces/context/Flash.html#setKeepMessages-boolean-`](https://javaee.github.io/javaee-spec/javadocs/javax/faces/context/Flash.html%23setKeepMessages-boolean-)\
  \ .\n\n13 [`javaee.github.io/javaee-spec/javadocs/javax/faces/annotation/package-summary.html`](https://javaee.github.io/javaee-spec/javadocs/javax/faces/annotation/package-summary.html)\
  \ .\n\n© Bauke Scholtz, Arjan Tijms 2018\n\nBauke Scholtz 和 Arjan Tijms，《Java EE\
  \ 8 中 JSF 的权威指南》，`doi.org/10.1007/978-1-4842-3387-0_9`\n\n# 9. 异常处理\n\nBauke Scholtz^(1 )\
  \ 和 Arjan Tijms²\n\n(1) 库拉索岛威廉斯塔德\n\n(2) 荷兰北荷兰省阿姆斯特丹\n\n有时事情会意外出错。在 Java 中，这通常表现为抛出异常。在\
  \ Java EE 中，基本上也是如此。问题在于如何以及何时正确地处理它们。默认情况下，HTTP 请求期间任何未捕获的异常最终都会显示在应用服务器提供的默认错误页面上。图\
  \ 9-1 展示了 WildFly 默认的 HTTP 500 错误页面：\n\n![A454457_1_En_9_Fig1_HTML.jpg](img/A454457_1_En_9_Fig1_HTML.jpg)\n\
  \n###### 图 9-1 WildFly 11.0.0 的默认 HTTP 500 错误页面\n\n所使用的 JSF（JavaServer Faces）实现甚至可能提供自己的默认错误页面。Mojarra\
  \ 和 MyFaces 都提供了一个基于 `javax.faces.context.ExceptionHandler` API¹ 的内部默认实现，该实现仅在 JSF\
  \ 项目阶段设置为“开发”时才会显示。图 9-2 展示了 Mojarra 的该页面外观。\n\n![A454457_1_En_9_Fig2_HTML.jpg](img/A454457_1_En_9_Fig2_HTML.jpg)\n\
  \n###### 图 9-2 开发阶段 Mojarra 2.3.3 的默认 HTTP 500 错误页面\n\n它不仅包含堆栈跟踪，还包含 JSF 组件树和任何作用域变量的文本表示，这可能有助于查明根本原因，尽管实际上，仅凭堆栈跟踪以及使用调试器重新执行用例比这更有帮助。\n\
  \n\n\n## 自定义错误页面\n\n虽然默认的错误页面对于普通 Web 开发者来说很有用，但坦率地说，它们对普通最终用户来说相当吓人。其“外观与感觉”与网站其他部分完全脱节，文本对普通最终用户而言如同天书。这样的错误页面甚至没有为最终用户提供退出途径。不满的最终用户无法快速找到返回首页或联系页面的路径。幸运的是，对于最终用户而言，你可以通过在\
  \ Web 应用程序中包含一个错误页面，并在 `web.xml` 的 `<error-page>` 条目中注册其位置，来覆盖这些默认错误页面。\n\n```\n\
  <error-page>\n    <error-code>500</error-page>\n    <location>/WEB-INF/errorpages/500.xhtml</location>\n\
  </error-page>\n```\n\n自定义错误页面特意被放置在 `/WEB-INF` 文件夹中，这样最终用户就无法直接访问或为其添加书签。默认情况下，Servlet\
  \ 容器会在请求作用域中设置与错误页面相关的属性，这些属性的键被定义为 `javax.servlet.RequestDispatcher.ERROR_XXX`\
  \ 常量。² 这样，如有必要，你可以将它们包含在自定义错误页面中。示例如下：\n\n```\n<dl>\n    <dt>请求 URI</dt>\n    <dd>#{requestScope['javax.servlet.error.request_uri']}</dd>\n\
      <dt>异常类型</dt>\n    <dd>#{requestScope['javax.servlet.error.exception']['class']}</dd>\n\
      <dt>异常消息</dt>\n    <dd>#{requestScope['javax.servlet.error.exception'].message}</dd>\n\
      <dt>堆栈跟踪</dt>\n    <dd><pre>#{\n        facesContext.externalContext.response.writer.flush()\n\
       }#{\n        requestScope['javax.servlet.error.exception'].printStackTrace\n\
              (facesContext.externalContext.response.writer)\n     }</pre></dd>\n\
  </dl>\n```\n\n请注意打印堆栈跟踪的技巧。在打印堆栈跟踪之前刷新响应写入器非常重要，并且 `<pre>` 元素内 EL（表达式语言）表达式之外的模板文本中不能有空白字符，否则这些空白字符会被附加到堆栈跟踪中。\n\
  \n回到此类错误页面的吓人之处，你最好将所有错误细节隐藏在一个条件之后，该条件仅在 JSF 项目阶段等于 Development 时才评估为 true。首先，在某个主模板中设置一个应用程序作用域的快捷变量：\n\
  \n```\n<c:set var=\"DEV\" scope=\"application\"\n    value=\"#{facesContext.application.projectStage\
  \ eq 'Development'}\">\n</c:set>\n```\n\n现在，当 JSF 项目阶段等于 Development 时，你可以有条件地在错误页面中显示技术信息。\n\
  \n```\n<c:if test=\"#{DEV}\">\n    <h3>面向开发者的错误详情</h3>\n    <dl>\n        ...\n\
      </dl>\n</c:if>\n```\n\n无论如何，错误页面完全无状态是非常重要的。换句话说，一个像样的错误页面不能包含任何 JSF 表单，甚至不能包含登出表单。这不仅是为了避免因初始异常实际上是由损坏的\
  \ JSF 状态引起而导致表单提交失败的风险，而且这些表单实际上会提交到错误的 URL（统一资源定位符），即错误页面本身的 URL。由于错误页面隐藏在 `/WEB-INF`\
  \ 文件夹中，表单提交只会导致 404 错误。与其将错误页面移出 `/WEB-INF` 文件夹，不如通过使用一个提交到普通 Servlet 的纯 HTML 表单来解决登出问题。`SecurityContext`\
  \ 在那里也是可注入的，会话作用域的管理 Bean（如果有的话）也是如此。\n\n## Ajax 异常处理\n\n默认情况下，当 JSF Ajax 请求期间发生异常时，最终用户不会收到任何关于操作是否成功执行的反馈。在\
  \ Mojarra 中，只有当 JSF 项目阶段设置为 Development 时，最终用户才会看到一个仅包含异常类型和消息的原始 JavaScript 警告框（参见图\
  \ 9-3）。\n\n![A454457_1_En_9_Fig3_HTML.jpg](img/A454457_1_En_9_Fig3_HTML.jpg)\n\n\
  ###### 图 9-3 在 Mojarra 2.3.3 的 Development 阶段，Ajax 请求期间抛出异常时的 JavaScript 警告框\n\n\
  这并不十分有用。而在 Production 阶段，最终用户甚至不会收到任何反馈。Web 应用程序会静默失败，让最终用户感觉好像什么都没发生，这只会令人困惑，并且对用户体验不利。如果\
  \ JSF Ajax 请求期间的异常能够像同步请求期间的异常一样被处理，重用与 `web.xml` 中声明的 `<error-page>` 完全相同的错误页面，那将更有意义。换句话说，最终用户应该能够完整地看到错误页面。这可以通过创建一个自定义的\
  \ `ExceptionHandler` 实现来实现，该实现基本上指示 JSF 基于错误页面创建一个新的 `UIViewRoot`，然后构建并渲染它。这需要相当多的代码。最简单的形式如下所示：\n\
  \n```\npublic class AjaxExceptionHandler extends ExceptionHandlerWrapper {\n\npublic\
  \ AjaxExceptionHandler(ExceptionHandler wrapped) {\n        super(wrapped);\n    }\n\
  \n@Override\n    public void handle() {\n        handleAjaxException(FacesContext.getCurrentInstance());\n\
          getWrapped().handle();\n    }\n\nprotected void handleAjaxException(FacesContext\
  \ context) {\n        Iterator<ExceptionQueuedEvent> unhandledExceptionQueuedEvents\
  \ =\n            getUnhandledExceptionQueuedEvents().iterator();\n\nif (context\
  \ == null\n            || context.getExternalContext().isResponseCommitted()\n            ||\
  \ !context.getPartialViewContext().isAjaxRequest()\n            || !unhandledExceptionQueuedEvents.hasNext()\n\
          ) {\n            return;\n        }\n\nThrowable exception = unhandledExceptionQueuedEvents\n\
              .next().getContext().getException();\n\nwhile (exception.getCause()\
  \ != null\n            && (exception instanceof FacesException\n                ||\
  \ exception instanceof ELException)\n        ) {\n            exception = exception.getCause();\n\
          }\n\nExternalContext external = context.getExternalContext();\n        String\
  \ uri = external.getRequestContextPath()\n            + external.getRequestServletPath();\n\
          Map<String, Object> requestScope = external.getRequestMap();\n        requestScope.put(RequestDispatcher.ERROR_REQUEST_URI,\
  \ uri);\n        requestScope.put(RequestDispatcher.ERROR_EXCEPTION, exception);\n\
  \nString viewId = \"/WEB-INF/errorpages/500.xhtml\";\n        Application application\
  \ = context.getApplication();\n        ViewHandler viewHandler = application.getViewHandler();\n\
          UIViewRoot viewRoot = viewHandler.createView(context, viewId);\n        context.setViewRoot(viewRoot);\n\
  \ntry {\n            external.responseReset();\n            ViewDeclarationLanguage\
  \ viewDeclarationLanguage =\n                viewHandler.getViewDeclarationLanguage(context,\
  \ viewId);\n            viewDeclarationLanguage.buildView(context, viewRoot);\n\
              context.getPartialViewContext().setRenderAll(true);\n            viewDeclarationLanguage.renderView(context,\
  \ viewRoot);\n            context.responseComplete();\n        }\n        catch\
  \ (IOException e) {\n            throw new FacesException(e);\n        }\n        finally\
  \ {\n            requestScope.remove(RequestDispatcher.ERROR_EXCEPTION);\n        }\n\
  \nunhandledExceptionQueuedEvents.remove();\n\nwhile (unhandledExceptionQueuedEvents.hasNext())\
  \ {\n            unhandledExceptionQueuedEvents.next();\n            unhandledExceptionQueuedEvents.remove();\n\
          }\n    }\n\npublic static class Factory                                \
  \                                               extends ExceptionHandlerFactory\
  \ {\n\npublic Factory(ExceptionHandlerFactory wrapped) {\n            super(wrapped);\n\
          }\n\n@Override\n        public ExceptionHandler getExceptionHandler() {\n\
              return new AjaxExceptionHandler\n                (getWrapped().getExceptionHandler());\n\
          }\n    }\n}\n```\n\n\n\n`handleAjaxException()` 方法首先会检查是否存在 faces 上下文、响应是否尚未提交、请求是否为\
  \ Ajax 请求，以及队列中是否有未处理的异常事件。如果这些条件均不满足，该方法将直接返回，让 JSF 像往常一样继续执行。\n\n当响应或其部分内容已实际发送到客户端时，HTTP\
  \ 响应即被视为已提交。这是一个不可逆的节点。你无法收回已发送的字节。这种情况可能发生在渲染响应阶段中途发生异常时。HTTP 响应的前半部分可能已经发送给了客户端。此外，JSF\
  \ 和服务器的默认异常处理器也无法处理这种情况。最终，客户端会收到一个不完整的 HTML 页面。为避免这种情况，你能做的最好是确保不在支持 bean 的 getter\
  \ 方法中执行业务逻辑（这本身始终是一个坏主意），并确保支持 bean 尽早被初始化。这可以通过在 `<f:viewAction>` 中执行对异常敏感的业务逻辑来实现，而不是使用\
  \ `@PostConstruct`。另一种选择是增大 HTTP 响应缓冲区大小，使其与对异常最敏感的页面所生成的 HTML 响应大小相匹配。假设该大小为 100\
  \ kB，则可以使用以下 `web.xml` 上下文参数。\n\n```\n<context-param>\n    <param-name>javax.faces.FACELETS_BUFFER_SIZE</param-name>\n\
      <param-value>102400</param-value> <!-- 100 kB. -->\n</context-param>\n```\n\n\
  `handleAjaxException()` 的下一步是从未处理异常事件队列中提取我们关心的根本原因。在 JSF 生命周期处理过程中发生的任何异常都将被包装在\
  \ `javax.faces.FacesException` 中。在 EL 表达式求值期间发生的任何异常都将被包装在 `javax.el.ELException`\
  \ 中。这些都不是我们关心的。\n\n接下来，将设置 `#{requestScope['javax.servlet.error.request_uri']}`\
  \ 和 `#{requestScope['javax.servlet.error.exception']}` 变量，以便错误页面可以访问它们。同时，将借助 `ViewHandler`\
  \ 创建代表错误页面的 `UIViewRoot` 实例，并将其设置在 JSF 上下文中。如有必要，你可以根据异常的实际根本原因有条件地准备错误页面的视图 ID。例如：\n\
  \n```\nString viewId;\n\nif (exception instanceof ViewExpiredException) {\n    viewId\
  \ = \"/WEB-INF/errorpages/expired.xhtml\";\n}\nelse {\n    viewId = \"/WEB-INF/errorpages/500.xhtml\"\
  ;\n}\n```\n\n回到 `handleAjaxException()`，在 try 块中，将清除 HTTP 响应缓冲区，用组件填充 `UIViewRoot`，指示\
  \ Ajax 上下文渲染整个视图，渲染 `UIViewRoot`，指示 JSF 上下文响应已手动处理完毕，因此它不会执行任何导航，最后从请求作用域中移除该异常。在\
  \ finally 块中移除异常并非强制要求，但存在一些 Servlet 容器（如 Tomcat）会将其视为触发向响应写入内部错误页面的信号。\n\n最后，将清空未处理异常事件的队列。这也不是强制性的，但这样做是为了与\
  \ `web.xml` 中配置的错误页面的默认行为保持一致，并防止链中的下一个 `ExceptionHandler` 处理任何剩余的异常事件。\n\n为了使其运行起来，你实际上还需要创建一个工厂。与\
  \ JSF 中许多其他应用程序范围的定制一样，自定义异常处理器只能通过工厂注册。这看起来可能有些冗长，但这正是设计的一部分。在这种特定情况下，它允许你根据某些全局配置设置返回不同的异常处理器实现。你可以在前面展示的\
  \ `AjaxExceptionHandler` 类的底部找到作为嵌套类的工厂。它继承自 `javax.faces.context.ExceptionHandlerFactory`\
  \ ³，并可以在 `faces-config.xml` 中按如下方式注册：\n\n```\n<factory>\n    <exception-handler-factory>\n\
          com.example.project.exceptionhandler.AjaxExceptionHandler$Factory\n    </exception-handler-factory>\n\
  </factory>\n```\n\n顺便提一下，必须说明的是，这种异常处理器也适用于非 Ajax 请求。你只需移除 `PartialViewContext#isAjaxRequest()`\
  \ 检查。你只需要记住，根据是否是 Ajax 请求，手动将 HTTP 响应状态码设置为 500。在 `ExternalContext#responseReset()`\
  \ 这行代码之后执行此操作。\n\n```\nif (!context.getPartialViewContext().isAjaxRequest()) {\n\
      external.setResponseStatus\n        (HttpServletResponse.SC_INTERNAL_SERVER_ERROR);\n\
  }\n```\n\n如果你在 Ajax 请求上执行此操作，JSF Ajax 脚本将不会按预期处理 Ajax 响应。它不会显示错误页面，而是会触发 `onerror`\
  \ 处理器。\n\n\n\n## ViewExpiredException 处理\n\n如果你之前使用过 JSF，那么很可能见过或听说过 `ViewExpiredException`。简而言之，当与回发关联的\
  \ JSF 视图状态在 HTTP 会话中再也找不到时，就会抛出此异常——换句话说，当 `javax.faces.STATE_SAVING_METHOD` 上下文参数设置为其默认值\
  \ \"server\"，并且最终用户提交了一个 JSF 表单，但其视图状态在服务器端已无法找到时。请注意，当上下文参数设置为 \"client\" 时，你仍然需要一个\
  \ \"jsf/ClientSideSecretKey\" 环境条目，以避免在服务器重启时出现过期视图。所有这些都在第 3 章的 \"视图状态\" 一节中有详细说明。此外，在第\
  \ 8 章的 \"@ViewScoped\" 一节中，你可以找到如何配置 JSF 将在 HTTP 会话中保存的视图和托管 Bean 的数量。\n\n有几种情况可能会导致意外出现\
  \ `ViewExpiredException`。所有这些情况都与页面导航和浏览器缓存有关，同时最终用户最近已从 Web 应用程序注销。通常，在注销期间，HTTP\
  \ 会话会作为安全措施失效，并且最终用户会被重定向到某个登录页面。当之前访问过的网页是可缓存的，并且最终用户在注销后按下浏览器的后退按钮时，那么最终用户可能会成功地从浏览器缓存中看到之前访问过的网页。如果该网页包含任何\
  \ JSF 表单，那么其 `javax.faces.ViewState` 隐藏输入字段实际上会引用一个在当前会话中已不存在的视图状态。当最终用户提交这样的 JSF\
  \ 表单时，JSF 将不可避免地抛出 `ViewExpiredException`。\n\n尽管这是一项出色的安全措施，但最终用户可能会感到困惑，因为之前访问过的网页实际上在最终用户的体验中已成功加载。这对用户体验不利。因此，你最好确保有状态的\
  \ JSF 页面不可缓存，这样当最终用户按下后退按钮时，Web 浏览器将被迫实际访问 Web 服务器，从而加载一个全新的页面，其视图状态在当前 HTTP 会话中实际上是有效的。这可以通过一个\
  \ Servlet 过滤器来实现，该过滤器设置特定的响应头，指示客户端不要缓存 HTTP 响应。以下是这样一个 Servlet 过滤器的示例：\n\n```\n\
  @WebFilter(servletNames=\"facesServlet\")\npublic class NoCacheFilter implements\
  \ Filter {\n\n@Override                                                        \
  \  \n    public void doFilter\n        (ServletRequest req, ServletResponse res,\
  \ FilterChain chain)\n            throws IOException, ServletException\n    {\n\
          HttpServletRequest request = (HttpServletRequest) req;\n        HttpServletResponse\
  \ response = (HttpServletResponse) res;\n        String resourcePath = request.getContextPath()\n\
              + ResourceHandler.RESOURCE_IDENTIFIER;\n\nif (!request.getRequestURI().startsWith(resourcePath))\
  \ {\n            response.setHeader\n                (\"Cache-Control\", \"no-store,\
  \ must-revalidate\");\n        }\n\nchain.doFilter(request, response);\n    }\n\
  }\n```\n\n基本上，它会拦截所有将要命中 `FacesServlet` 的请求，前提是它在 `web.xml` 中配置了一个名为 \"facesServlet\"\
  \ 的 Servlet 名称，如下所示：\n\n```\n<servlet>\n    <servlet-name>facesServlet</servlet-name>\n\
      <servlet-class>javax.faces.webapp.FacesServlet</servlet-class>\n</servlet>\n\
  ```\n\n或者，如果你已将 Web 应用程序划分为一个仅包含无状态 JSF 页面的公共区域和一个仅包含有状态 JSF 页面的受限区域，那么你也可以将此过滤器映射到仅匹配有状态部分的特定\
  \ URL 模式，例如 `/admin/*`。\n\n```\n@WebFilter(\"/admin/*\")\n```\n\n该过滤器示例在设置缓存控制头之前，首先检查\
  \ HTTP 请求是否不代表 JSF 资源请求。这些请求由上下文路径之后的 `/javax.faces.resource` 路径标识，该路径可通过 `ResourceHandler#RESOURCE_IDENTIFIER`\
  \ 常量获得。当你使用 JSF 资源组件（例如 `<h:graphicImage>`、`<h:outputScript>` 或 `<h:outputstyleSheet>`）时，会自动使用此路径。（另请参阅第\
  \ 6 章的 \"资源组件\" 一节。）你不想禁用它们上的浏览器缓存，因为那样会影响页面加载性能。\n\n所设置的缓存控制头实际上仅被支持 HTTP 1.1 的客户端识别。HTTP\
  \ 1.1 于 1997 年引入。如果你还想覆盖 HTTP 1.0 客户端（如今通常仅指古老的代理或无法使用比 Internet Explorer 6.0 更好的浏览器的可怜用户），那么你最好再添加两个响应头。\n\
  \n```\nresponse.setHeader(\"Pragma\", \"no-cache\"); // HTTP 1.0.\nresponse.setDateHeader(\"\
  Expires\", 0); // Proxies.\n```\n\n现在，有了这个过滤器，最终用户将无法再从浏览器缓存中看到任何 JSF 页面，因此也就无法再在这些页面上遇到\
  \ `ViewExpiredException`。然而，仍然存在一些情况，`ViewExpiredException` 是不可避免的。一种情况是，最终用户在多个浏览器标签页中打开了几个\
  \ JSF 页面，并在其中一个标签页中注销，然后在另一个标签页中执行操作，而没有事先刷新页面。对于这种情况，你确实需要一个 \"抱歉，您的会话已超时\" 的错误页面。这可以很容易地在\
  \ `web.xml` 中配置为另一个错误页面，如下所示：\n\n```\n<error-page>    \n    <exception-type>\n        javax.faces.application.ViewExpiredException\n\
      </exception-type>\n    <location>/WEB-INF/errorpages/expired.xhtml</location>\n\
  </error-page>\n```\n\n不要让它指向一个公共 JSF 页面，例如登录页面。如果你确实需要它成为一个公共 JSF 页面，请在错误页面中使用一个元刷新头，将最终用户进一步重定向到一个公共\
  \ JSF 页面。\n\n```\n<!DOCTYPE html>\n<html lang=\"en\">\n    <head>\n        <title>会话已过期</title>\n\
          <meta http-equiv=\"refresh\"\n            content=\"0;url=#{request.contextPath}/login.xhtml\"\
  \ />\n    </head>\n    <body>\n        <h1>抱歉，您的会话已超时</h1>\n        <h3>您将被重定向到登录页面</h3>\n\
          <p>\n             <a href=\"#{request.contextPath}/login.xhtml\">\n                 如果重定向未生效，或者您等不及了，\n\
                   请点击此处。\n             </a>\n         </p>\n    </body>\n</html>\n\
  ```\n\n请注意，元刷新内容中的 \"0\" 表示重定向前的秒数。因此，\"0\" 意味着 \"立即重定向\"。例如，你可以使用 \"3\" 让浏览器在重定向前等待\
  \ 3 秒。\n\n还要记住，在任何自定义异常处理器（例如上一节演示的 `AjaxExceptionHandler`）中配置此位置。你还需要确保你的 \"通用\"\
  \ 错误页面映射到错误代码 500，而不是异常类型（例如 `java.lang.Exception` 或 `java.lang.Throwable`）；否则，所有包装在\
  \ `ServletException` 中的异常仍会进入通用错误页面。当异常在同步（非 Ajax）回发期间（而不是异步（Ajax）回发期间）抛出时，JSF 会将任何异常包装在\
  \ `ServletException` 中。`web.xml` 错误页面机制仅在按异常类型找不到匹配的错误页面时，才会从 `ServletException`\
  \ 中提取根本原因，以便按异常类型进行第二次错误页面匹配。\n\n\n\n避免 `ViewExpiredException` 的另一种完全不同的方案是使用无状态\
  \ JSF 视图。这样，JSF 视图状态将不会被保存，JSF 视图也永远不会过期，而是每次请求时都会从头重建。你可以通过将 `<f:view>` 的 `transient`\
  \ 属性设置为 `true` 来启用无状态视图。第 4 章的“无状态表单”一节对此进行了详细说明。\n\n无论采用哪种解决方案，请确保**不要**使用 Mojarra\
  \ 特有的 `com.sun.faces.enableRestoreView11Compatibility` 上下文参数。这基本上会开启 JSF 1.0/1.1\
  \ 中关于过期视图的行为。它不会再抛出 `ViewExpiredException`，但也不会真正恢复原始的视图状态。它基本上会从头重建视图以及所有关联的视图作用域\
  \ Bean，从而丢失所有原始状态。由于应用程序的行为会令人困惑（“嘿，我输入的值去哪了..??”），这对用户体验很不好。更好的做法是改用无状态 JSF 视图，这样你可以在特定视图中管理应用程序，而不是在所有视图中。\n\
  \n## IOException 处理\n\n底层 `HttpServletRequest` 和 `HttpServletResponse` 对象的某些方法可能会抛出\
  \ `IOException`。通常，这仅发生在网络连接意外中断时：例如，最终用户通过按下 Web 浏览器中的 Esc 按钮突然停止 HTTP 请求，或者最终用户在当前页面仍在加载时突然导航到另一个网页，甚至最终用户的计算机或网线着火时。这些情况确实无法避免。作为\
  \ Web 应用程序开发者，最好的做法是让任何 `IOException` 向上冒泡到 Servlet 容器。换句话说，完全没有必要像下面这样捕获它：\n\n\
  ```\npublic void someAjaxListener() {\n    try {\n        FacesContext.getCurrentInstance()\n\
              .getExternalContext().redirect(url);\n    }\n    catch (IOException\
  \ e) {\n        throw new UncheckedIOException(e);\n    }\n}\n```\n\n相反，直接让它抛出即可。\n\
  \n```\npublic void someAjaxListener() throws IOException {                     \
  \                                                                 \n    FacesContext.getCurrentInstance()\n\
          .getExternalContext().redirect(url);\n}\n```\n\n## EJBException 处理\n\n有时，调用服务方法也可能导致异常。通常，这些异常是有意为之的，例如“实体未找到”、“违反唯一约束”、“无效的用户凭据”、“实体已被其他用户修改”等。默认情况下，任何非特定于应用程序的\
  \ `RuntimeException`，例如 `NullPointerException`，甚至从 EJB 服务方法抛出的 JPA 的 `PersistenceException`，都会被包装在\
  \ `EJBException` 中。这使得在 JSF 操作方法中确定实际的根本原因变得笨拙。\n\n```\npublic void addProduct()\
  \ {\n    FacesMessage message;\n\ntry {\n        Long id = productService.create(product);\n\
          message = new FacesMessage(FacesMessage.SEVERITY_INFO,\n            \"Product\
  \ successfully saved\", \"ID is \" + id);\n    }\n    catch (EJBException e) {\n\
          if (e.getCause() instanceof ConstraintViolationException) {\n            message\
  \ = new FacesMessage(FacesMessage.SEVERITY_ERROR,\n                \"Duplicate product!\"\
  , e.getMessage());\n            context.validationFailed();\n\n}\n        else {\n\
              throw e;\n        }\n    }\n\ncontext.addMessage(null, message);\n}\n\
  ```\n\n这不是最佳实践。你不仅需要通过检查 `Exception#getCause()` 来确定 EJB 异常的根本原因，而且 web.xml 错误页面机制也无法为例如\
  \ `ConstraintViolationException` 显示特定的错误页面，因为它被包装在 `EJBException` 中。为了让 EJB 抛出未包装的异常，你需要首先创建一个自定义异常超类，然后使用\
  \ `@javax.ejb.ApplicationException` 对其进行注解。⁴\n\n```\n@ApplicationException(rollback=true)\n\
  public abstract class BusinessException extends RuntimeException {\n    public BusinessException()\
  \ {\n        super();\n    }\n    public BusinessException(Exception cause) {\n\
          super(cause);\n    }\n}\n```\n\n请注意注解上的 `rollback=true` 属性。如果你希望 EJB 容器在抛出此异常时回滚任何活动事务，这一点非常重要。以下是此自定义业务异常的一些子类示例。\n\
  \n```\npublic abstract class QueryException extends BusinessException {}\npublic\
  \ class EntityNotFoundException extends QueryException {}\npublic class DuplicateEntityException\
  \ extends QueryException {}\npublic abstract class CredentialsException extends\
  \ BusinessException {}\npublic class InvalidUsernameException extends CredentialsException\
  \ {}\npublic class InvalidPasswordException extends CredentialsException {}\n```\n\
  \n请注意，你不需要在所有子类上重复 `@ApplicationException`，因为它已经是 `@Inherited` 的。以下是一些可能抛出这些异常的具体用例：\n\
  \n```\npublic User getById(Long id) {\n    try {\n        return entityManager\n\
              .createQuery(\"FROM User u WHERE u.id = :id\", User.class)\n            .setParameter(\"\
  id\", id)\n            .getSingleResult();\n    }\n    catch (NoResultException\
  \ e) {\n        throw new EntityNotFoundException(e);\n    }\n}\n\npublic Optional<User>\
  \ findByEmail(String email) {\n    try {\n        return Optional.of(entityManager\n\
              .createQuery(\"FROM User u\"\n                + \" WHERE u.email = :email\"\
  , User.class)\n            .setParameter(\"email\", email)\n            .getSingleResult());\n\
      }\n    catch (NoResultException e) {\n        return Optional.empty();\n    }\n\
  }\n\npublic User getByEmailAndPassword(String email, String password) {        \
  \                                                                              \
  \          \n    User user = findByEmail(email)\n        .orElseThrow(InvalidUsernameException::new);\n\
      Credentials credentials = user.getCredentials();\n    byte[] passwordHash =\
  \ digest(password, credentials.getSalt());\n\nif (!Arrays.equals(passwordHash, credentials.getPasswordHash()))\
  \ {\n        throw new InvalidPasswordException();\n    }\n\nreturn user;\n}\n\n\
  \n\npublic Long create(User user) {\n    if (findByEmail(user.getEmail()).isPresent())\
  \ {\n        throw new DuplicateEntityException();\n    }\n    entityManager.persist(user);\n\
      return user.getId();\n}\n```\n\n在 JSF 支持 bean 的动作方法中，你可以相应地处理它们。\n\n```\npublic\
  \ void signup() {\n    FacesMessage message;\n\ntry {\n        userService.create(product);\n\
          message = new FacesMessage(\"您已成功注册！\");\n    }\n    catch (DuplicateEntityException\
  \ e) {\n        message = new FacesMessage(FacesMessage.SEVERITY_ERROR,\n            \"\
  抱歉，用户名已被占用！\", e.getMessage());\n        context.validationFailed();\n    }\n\n\
  context.addMessage(null, message);\n}\n```\n\n为了进一步减少样板代码，你甚至可以放行所有业务异常，并使用自定义异常处理器来处理它们。\n\
  \n```\npublic class BusinessExceptionHandler extends ExceptionHandlerWrapper {\n\
  \npublic BusinessExceptionHandler(ExceptionHandler wrapped) {\n        super(wrapped);\n\
      }\n\n@Override\n    public void handle() {\n        handleBusinessException(FacesContext.getCurrentInstance());\n\
          getWrapped().handle();\n    }\n\nprotected void handleBusinessException(FacesContext\
  \ context) {\n        Iterator<ExceptionQueuedEvent> unhandledExceptionQueuedEvents\
  \ =\n            getUnhandledExceptionQueuedEvents().iterator();\n\nif (context\
  \ == null\n            || !unhandledExceptionQueuedEvents.hasNext()\n        ) {\n\
              return;\n        }\n\nThrowable exception = unhandledExceptionQueuedEvents\n\
              .next().getContext().getException();\n\nwhile (exception.getCause()\
  \ != null\n            && (exception instanceof FacesException\n                ||\
  \ exception instanceof ELException)\n        ) {\n            exception = exception.getCause();\n\
          }\n\nif (!(exception instanceof BusinessException)) {\n            return;\n\
          }\n\ncontext.addMessage(null, new FacesMessage(                        \
  \                                                                        \n            FacesMessage.SEVERITY_FATAL,\n\
              exception.toString(),\n            exception.getMessage()));\n        context.validationFailed();\n\
          context.getPartialViewContext()\n            .getRenderIds().add(\"globalMessages\"\
  );\n\nunhandledExceptionQueuedEvents.remove();\n\nwhile (unhandledExceptionQueuedEvents.hasNext())\
  \ {\n            unhandledExceptionQueuedEvents.next();\n            unhandledExceptionQueuedEvents.remove();\n\
          }\n    }\n\npublic static class Factory extends ExceptionHandlerFactory\
  \ {\n\npublic Factory(ExceptionHandlerFactory wrapped) {\n            super(wrapped);\n\
          }\n\n@Override\n        public ExceptionHandler getExceptionHandler() {\n\
              return new BusinessExceptionHandler\n                (getWrapped().getExceptionHandler());\n\
          }\n    }\n\n}\n```\n\n是的，这确实与前面“Ajax 异常处理器”一节中展示的 AjaxExceptionHandler 类似。然而，第一个区别在于，当响应已提交或不是\
  \ Ajax 请求时，它不会跳过异常处理。第二个区别在于提取异常根本原因和排空剩余未处理异常事件之间的逻辑。这个 BusinessExceptionHandler\
  \ 会检查根本原因是否是 BusinessException 的实例，如果是，它将添加一个 faces 消息，并指示 JSF 显式更新由“globalMessages”标识的组件，该组件应指向主模板中的全局消息组件，类似于以下内容：\n\
  \n```\n<h:messages id=\"globalMessages\" globalOnly=\"true\" />\n```\n\n最终，所有与业务异常相关的\
  \ faces 消息都将汇集于此。你可能已经注意到，通过调用 FacesContext#validationFailed()，faces 上下文被显式标记为“验证失败”。这通常很有用，以防\
  \ Facelet 模板中的任何代码依赖于此。如果你希望将其与 AjaxExceptionHandler 一起用于非业务异常，则需要在 faces-config.xml\
  \ 中*在* AjaxExceptionHandler *之后*注册它。在 faces-config.xml 中声明较晚的任何内容都将有效地包装先前声明的内容。这也适用于自定义异常处理器工厂。当\
  \ BusinessExceptionHandler 确认异常不是 BusinessException 的实例时，它将把未处理的异常留在队列中，从方法返回，并最终委托给被包装的\
  \ ExceptionHandler 的 handle() 方法，即 AjaxExceptionHandler。\n\n```\n<factory>\n    <exception-handler-factory>\n\
          com.example.project.AjaxExceptionHandler$Factory\n    </exception-handler-factory>\n\
      <exception-handler-factory>\n        com.example.project.BusinessExceptionHandler$Factory\n\
      </exception-handler-factory>\n</factory>\n```\n\n有了 BusinessExceptionHandler，你可以进一步简化支持\
  \ bean 的动作方法，如下所示：\n\n```\npublic void signup() {\n    userService.create(product);\n\
      context.addMessage(null,\n        new FacesMessage(\"您已成功注册！\");\n}\n```\n\n\
  # 脚注\n\n1 [`javaee.github.io/javaee-spec/javadocs/javax/faces/context/ExceptionHandler.html`](https://javaee.github.io/javaee-spec/javadocs/javax/faces/context/ExceptionHandler.html)\
  \ .\n\n2 [`javaee.github.io/javaee-spec/javadocs/javax/servlet/RequestDispatcher.html#ERROR_EXCEPTION`](https://javaee.github.io/javaee-spec/javadocs/javax/servlet/RequestDispatcher.html%23ERROR_EXCEPTION)\
  \ .\n\n3 [`javaee.github.io/javaee-spec/javadocs/javax/faces/context/ExceptionHandlerFactory.html`](https://javaee.github.io/javaee-spec/javadocs/javax/faces/context/ExceptionHandlerFactory.html)\
  \ .\n\n4 [`javaee.github.io/javaee-spec/javadocs/javax/ejb/ApplicationException.html`](https://javaee.github.io/javaee-spec/javadocs/javax/ejb/ApplicationException.html)\
  \ .\n\n© Bauke Scholtz, Arjan Tijms 2018\n\nBauke Scholtz 和 Arjan Tijms，《Java EE\
  \ 8 中 JSF 的权威指南》，`doi.org/10.1007/978-1-4842-3387-0_10`\n\n# 10. WebSocket 推送\n\n\
  Bauke Scholtz^(1 ) 和 Arjan Tijms²\n\n(1)威廉斯塔德，库拉索\n\n(2)阿姆斯特丹，北荷兰省，荷兰\n\nJSF 1.0\
  \ 引入了基于 HTML 表单的 POST 动作支持。JSF 2.0 引入了基于 AJAX 的 POST 支持。JSF 2.0 引入了 GET 查询字符串参数映射支持。JSF\
  \ 2.2 引入了基于 GET 的动作支持。JSF 2.3 引入了 WebSocket 支持。\n\nJSF 的 WebSocket 支持由新的 <f:websocket>\
  \ 标签、PushContext 接口和 @Push 注解表示。它构建在 Java EE 7 中引入的 JSR-356 WebSocket 规范之上。因此，从技术上讲，它也可以在\
  \ Java EE 7 环境中使用。自 7.0.27 版本的 Tomcat 和 9.1.0 版本的 Jetty 起，它们也原生支持 JSR-356。\n\n在\
  \ Mojarra 中，<f:websocket> 有一个额外的 Java EE 7 依赖项：JSON-P (JSR-353)。如果你的目标环境是 Tomcat\
  \ 或 Jetty 而非 Java EE 应用服务器，你可能需要单独安装它。JSON-P 在内部用于将 Java 对象转换为 JSON 字符串，以便可以轻松地传输到客户端，并作为附加到\
  \ <f:websocket> 的 JavaScript 监听器函数的参数提供。\n\n\n\n## 配置\n\nJSR-356 WebSocket 规范并未正式支持在运行时以编程方式初始化套接字端点。因此，我们无法通过在视图中简单声明\
  \ `<f:websocket>` 并等待引用它的 JSF 页面首次打开来完成初始化。我们确实需要在部署期间显式地初始化它。虽然我们可以默认这样做，但如果 Web\
  \ 应用从未使用过某个 WebSocket 端点，让它永远保持打开状态并不理想。因此，我们无法避免使用一个上下文参数来在部署期间显式地初始化它。\n\n```\n\
  <context-param>\n    <param-name>javax.faces.ENABLE_WEBSOCKET_ENDPOINT</param-name>\n\
      <param-value>true</param-value>\n</context-param>\n```\n\n如果你更喜欢编程式初始化而非声明式初始化，你可以在你的\
  \ Web 片段库的 `ServletContainerInitializer` 中使用 `ServletContext#setInitParameter()`，如下所示：\n\
  \n```\npublic class YourInitializer implements ServletContainerInitializer {\n\n\
      @Override\n    public void onStartup(Set<Class<?>> types, ServletContext context)\
  \ {\n        context.setInitParameter(\n            PushContext.ENABLE_WEBSOCKET_ENDPOINT_PARAM_NAME,\
  \ \"true\");\n    }\n}\n```\n\n请注意，无法在 `ServletContextListener` 中执行此任务，因为 JSF 实际上会在其自身的\
  \ `ServletContainerInitializer` 实现中注册 WebSocket 端点，而该实现总是在任何 `ServletContextListener`\
  \ 之前运行。\n\n一旦 WebSocket 端点在部署期间被启用并成功初始化，它将在 URL（统一资源定位符）模式 `/javax.faces.push/*`\
  \ 上监听 WebSocket 握手请求。第一个路径元素将代表 WebSocket 通道名称。\n\n回到“正式”一词，某些 WebSocket 实现确实支持编程式初始化，例如\
  \ Undertow 提供的实现（WildFly 也使用该实现）。不幸的是，规范并未如此规定，并且可能存在根本不支持编程式初始化的 WebSocket 实现，例如\
  \ Payara 中使用的 Tyrus。¹\n\n默认情况下，WebSocket 容器会在应用服务器监听 HTTP 请求的同一端口上监听握手请求。你可以通过另一个\
  \ `web.xml` 上下文参数来更改端口：\n\n```\n<context-param>\n    <param-name>javax.faces.WEBSOCKET_ENDPOINT_PORT</param-name>\n\
      <param-value>8000</param-value>\n</context-param>\n```\n\n或者在 `ServletContainerInitializer`\
  \ 中以编程方式设置：\n\n```\ncontext.setInitParameter(\n    PushContext.WEBSOCKET_ENDPOINT_PORT_PARAM_NAME,\
  \ \"8000\");\n```\n\n## 用法\n\n在你的 JSF 页面中，只需声明 `<f:websocket>` 标签，并附上必需的 `channel`\
  \ 属性（代表通道名称）和可选的 `onmessage` 属性（代表对 JavaScript 函数的引用）。\n\n```\n<f:websocket channel=\"\
  test\" onmessage=\"logMessage\" />\n\n<script>\n    function logMessage(message,\
  \ channel, event) {\n        console.log(message);\n    }\n</script>\n```\n\n该 JavaScript\
  \ 函数将被调用并传入三个参数。\n\n1.  `message`：作为 JSON 对象的推送消息。\n2.  `channel`：WebSocket 通道名称。如果你打算使用全局监听器，或希望手动控制\
  \ WebSocket 的关闭，这可能会很有用。\n3.  `event`：原始的 `MessageEvent` 对象。如果你打算在 JavaScript 函数中检查它，这可能会很有用。\n\
  \n在 WAR 端，你可以通过 `@Push` 注解在任何支持 CDI 注入的 Web 工件中注入 `PushContext`。这可以是一个简单的 CDI 托管\
  \ Bean，也可以是 `@WebServlet`、`@WebFilter` 或 `@WebListener`。\n\n```\nimport javax.inject.Named;\n\
  import javax.enterprise.context.RequestScoped;\n\nimport javax.inject.Inject;\n\
  import javax.faces.push.Push;\nimport javax.faces.push.PushContext;\n\n@Named @RequestScoped\n\
  public class Bean {\n\n    @Inject @Push\n    private PushContext test;\n\n    public\
  \ void submit() {\n        test.send(\"Hello World!\");\n    }\n}\n```\n\n`PushContext`\
  \ 变量名 `test` 必须与 JSF 页面中声明的通道名称匹配。如果无法将变量名与通道名称匹配，你始终可以在 `@Push` 注解的可选 `channel`\
  \ 属性中指定通道名称。\n\n```\n@Inject @Push(channel=\"test\")\nprivate PushContext foo;\n\
  ```\n\n一旦前面展示的 Bean 的 `submit()` 方法被某个 JSF 命令组件（即使在不同的 JSF 页面中）调用，推送消息“Hello World!”将被发送到整个应用中**所有**在相同通道名称上打开的套接字。\n\
  \n## 作用域与用户\n\n你可能已经意识到，`<f:websocket>` 默认是应用作用域的。你可以通过可选的 `scope` 属性来控制作用域。允许的值为\
  \ `application`、`session` 和 `view`。\n\n当设置为 `session` 时，消息将仅发送到当前会话中相同通道上所有打开的套接字。\n\
  \n```\n<f:websocket channel=\"progress\" scope=\"session\" />\n```\n\n这对于来自用户自身发起的长时间运行的会话作用域后台任务的进度消息特别有用。这样，用户就可以继续浏览网站，而无需在同一个页面上等待结果。\n\
  \n或者，你也可以将可选的 `user` 属性设置为一个可序列化的值，代表唯一的用户标识符，它可以是一个代表用户登录名的字符串，或是一个代表用户 ID 的长整型。当设置此属性时，套接字的作用域将自动默认为\
  \ `session`，并且不能设置为 `application`。\n\n```\n<f:websocket channel=\"chat\" user=\"\
  #{loggedInUser.id}\" />\n```\n\n这提供了向特定用户发送消息的机会，如下所示：\n\n```\nprivate String message;\n\
  private User recipient;\n\n@Inject @Push\nprivate PushContext chat;\n\npublic void\
  \ sendMessage() {\n    Long recipientId = recipient.getId();\n    chat.send(message,\
  \ recipientId);\n}\n```\n\n你甚至可以通过提供一个 `Set` 参数来向多个用户发送消息。\n\n```\nprivate String\
  \ message;\nprivate Set<User> recipients;\n\n@Inject @Push\nprivate PushContext\
  \ chat;\n\npublic void sendMessage() {\n    Set<Long> recipientIds = recipients.stream()\n\
          .map(User::getId)\n        .collect(Collectors.toSet());\n    chat.send(message,\
  \ recipientIds);\n}\n```\n\n换句话说，你可以通过这种方式轻松实现一个聊天框。顺便提一下，像 Stack Overflow 和 Facebook\
  \ 这样的实时用户定向通知就是通过这种方式工作的。\n\n当作用域设置为 `view` 时，消息将仅发送到当前视图中指定通道上打开的套接字。这不会影响应用中所有其他视图中相同通道上的任何套接字。\n\
  \n```\n<f:websocket channel=\"push\" scope=\"view\" />\n```\n\n这也支持与 `user` 属性结合使用。\n\
  \n```\n<f:websocket channel=\"chat\" user=\"#{user.id}\" scope=\"view\" />\n```\n\
  \n不过，这种构造有些不同寻常，仅当 `user` 属性所代表的已登录用户的生存期可能比 HTTP 会话短时才应使用。然而，这反过来被认为是一种糟糕的安全实践。最佳安全实践是：在登录和注销期间使\
  \ HTTP 会话失效。在登录期间使 HTTP 会话失效可以防止会话固定攻击，而在注销期间使会话失效可以防止脏的用户特定数据在 HTTP 会话中残留。\n\n\n\
  \n## 通道设计提示\n\n你可以在整个应用程序中，在不同作用域上声明多个推送通道，无论是否指定用户目标。但请注意，即使通道是视图作用域的，同一个通道名称也很容易在多个视图中被重复使用。如果你尽可能少用不同的通道名称，并将通道名称绑定到特定的推送套接字作用域/用户组合（而非特定的\
  \ JSF 视图），效率会更高。如果你打算为不同目的使用多个视图作用域的通道，最好只使用一个视图作用域的通道，并设置一个全局 JavaScript 监听器，该监听器能够根据传递的消息来区分其任务，例如，在服务器端按如下方式发送消息：\n\
  \n```\nMap<String, Object> message = new HashMap<>();\nmessage.put(\"functionName\"\
  , \"someFunction\");\nmessage.put(\"functionData\", functionData); // 可以是 Map 或\
  \ Bean。\nsomeChannel.send(message);\n```\n\n然后在 `onmessage` JavaScript 监听器函数中按如下方式处理：\n\
  \n```\nfunction someSocketListener(message) {\n    windowmessage.functionName;\n\
  }\n\nfunction someFunction(data) {\n    // ...\n}\n\nfunction otherFunction(data)\
  \ {                                                          \n    // ...\n}\n\n\
  // ...\n```\n\n## 一次性推送\n\n你可以使用 `connected` 属性来防止套接字在页面加载时自动连接。\n\n```\n<f:websocket\
  \ ... connected=\"false\" />\n```\n\n当你希望在调用一个可能需要更长时间才能完成的视图作用域 Ajax 操作方法后，执行一次性的结果推送，并且希望用户能立即继续使用同一个页面，而不会因“网站响应慢”的体验而感到烦恼时，这尤其有用。这种方法只需要配合\
  \ `jsf.push` JavaScript API（应用程序编程接口）做一些额外的工作。² 它有三个函数，但我们只对其中的两个感兴趣：`jsf.push.open(...)`\
  \ 和 `jsf.push.close(...)`。第三个函数 `jsf.push.init(...)` 主要用于初始化套接字，这由 `<f:websocket>`\
  \ 标签的渲染器负责。\n\n在调用 Ajax 操作方法之前，你需要通过调用 `jsf.push.open(...)` 函数并传入套接字客户端 ID 作为参数来显式地打开套接字。而在推送消息到达之后，你需要通过调用\
  \ `jsf.push.close(...)` 函数并传入套接字客户端 ID 作为参数来显式地关闭套接字。以下示例演示了这种方法：\n\n```\n<script>\n\
      function startLongRunningProcess() {\n        jsf.push.open(\"push\");\n        document.getElementById(\"\
  status\").innerHTML =\n            \"长时间运行进程已启动...\";\n    }\n    function endLongRunningProcess(result)\
  \ {\n        jsf.push.close(\"push\");\n        document.getElementById(\"status\"\
  ).innerHTML = result;\n    }\n</script>\n<h:form>\n    <h:commandButton value=\"\
  提交\"\n        onclick=\"startLongRunningProcess()\"\n        action=\"#{longRunningProcess.submit}\"\
  >\n        <f:ajax />\n    </h:commandButton>                                  \
  \                  \n</h:form>\n<div id=\"status\" />\n<f:websocket id=\"push\"\
  \ channel=\"push\" scope=\"view\"\n    connected=\"false\" onmessage=\"endLongRunningProcess\"\
  >\n</f:websocket>\n```\n\n必须指出，像上面那样将 JavaScript 代码直接放在 HTML 源码中是一种不好的做法。当然，这仅用于演示目的。为了更好的维护性、性能和工具支持，在实际代码中，你应该将\
  \ JavaScript 代码放在一个 JS 文件中，并通过 `<h:outputScript>` 引入。这里我甚至还没提到为了演示而缺少 jQuery 魔法的问题。\n\
  \n在这个例子中，打开套接字是在命令按钮的 `onclick` 事件中执行的。而 `onmessage` 监听器函数则负责关闭套接字。当然，你也可以让套接字始终保持打开状态，而无需操作\
  \ JavaScript，但如果套接字除了呈现视图作用域 Ajax 操作方法的结果之外没有其他用途，这可能会浪费资源。以下是关联的后台 Bean 的样子：\n\n\
  ```\n@Named @RequestScoped\npublic class LongRunningProcess {\n\n    @Inject\n    private\
  \ LongRunningProcessService service;\n\n    @Inject @Push\n    private PushContext\
  \ push;                                                          \n\n    public\
  \ void submit() {\n        service.asyncSubmit(result -> push.send(result));\n    }\n\
  }\n```\n\n以下是服务类的样子：\n\n```\n@Stateless\npublic class LongRunningProcessService\
  \ {\n\n    @Asynchronous\n    public void asyncSubmit(Consumer<String> callback)\
  \ {\n        String result = someLongRunningProcess();\n        callback.accept(result);\n\
      }\n\n}\n```\n\n请注意 EJB 的 `@Asynchronous` 注解。这在此结构中非常重要。它将确保 EJB（企业 Java Bean）方法在单独的线程中执行。这允许后台\
  \ Bean 方法立即返回，而无需等待 EJB 方法完成。\n\n## 有状态 UI 更新\n\n你可能已经注意到，`onmessage` JavaScript\
  \ 监听器函数通常仅适用于小型无状态任务，例如显示反馈消息或使用 JavaScript 向某个无状态列表添加新项。当你想要更新由另一个 JSF 组件表示的有状态\
  \ UI（用户界面）时，它就不是那么有用了。想象一下，用一个完整的 JSF 表格替换一个简单的加载图片。\n\n为此，你最好嵌套一个监听特定推送消息的 `<f:ajax>`。通过其\
  \ `render` 属性，你可以在传入的推送消息中自动更新任意 JSF 组件。以下是一个示例，它最初显示一个加载图片，然后在表格准备好加载时显示表格：\n\n\
  ```\n<h:form>\n    <f:websocket channel=\"push\" scope=\"view\">\n        <f:ajax\
  \ event=\"loaded\" render=\":results\" />\n    </f:websocket>\n</h:form>\n<h:panelGroup\
  \ id=\"results\" layout=\"block\">\n    <h:graphicImage name=\"images/loading.gif\"\
  \n        rendered=\"#{empty longRunningSearch.results}\">\n    </h:graphicImage>\n\
      <h:dataTable value=\"#{longRunningSearch.results}\" var=\"result\"\n        rendered=\"\
  #{not empty longRunningSearch.results}\">\n        <h:column>#{result.id}</h:column>\n\
          <h:column>#{result.name}</h:column>\n        <h:column>#{result.value}</h:column>\n\
      </h:dataTable>\n</h:panelGroup>\n```\n\n请注意，`<f:websocket>` 被放置在 `<h:form>`\
  \ 中。当它嵌套了 `<f:ajax>` 时，这是强制性的。通常情况下这不是必需的。以下是后台 Bean 的样子：\n\n```\n@Named @ViewScoped\n\
  public class LongRunningSearch implements Serializable {\n\n    private List<Result>\
  \ results;\n\n    @Inject\n    private LongRunningSearchService service;\n\n    @Inject\
  \ @Push\n    private PushContext push;\n\n    @PostConstruct\n    public void init()\
  \ {\n        service.asyncLoadResults(results -> {\n            this.results = results;\n\
              push.send(\"loaded\");\n        });\n    }\n\n    public List<Result>\
  \ getResults() {\n        return results;\n    }\n}\n```\n\n请注意，推送消息 `\"loaded\"\
  ` 与 `<f:ajax event>` 的值完全匹配。你可以使用任何你想要的值，并且可以根据需要嵌套任意多个 `<f:ajax>` 标签。托管 Bean 必须是\
  \ `@ViewScoped` 的，这一点很重要，因为 Ajax 调用基本上是在同一个视图内的不同请求中执行的。最后，服务类如下所示：\n\n```\n@Stateless\n\
  public class LongRunningSearchService {\n\n    @Asynchronous\n    public void asyncLoadResults(Consumer<List<Result>>\
  \ callback) {\n        List<Result> results = someLongRunningProcess();\n        callback.accept(results);\n\
      }\n}\n```\n\n`someLongRunningProcess()` 方法代表你对某个长时间运行进程的实现（例如，调用第三方 Web 服务 API）。\n\
  \n\n\n## 全站推送通知\n\n为此，你可以使用一个应用程序作用域的套接字。这种套接字对于由 Web 应用程序本身在某个可能对所有应用程序用户感兴趣的事件上触发的应用程序级反馈消息特别有用。可以想象一下全站统计、实时列表、股票更新等场景。以下示例展示了一个实时前十名列表的情况：\n\
  \n```\n<h:dataTable id=\"top10\" value=\"#{bean.top10}\" var=\"item\">\n    <h:column>#{item.ranking}</h:column>\n\
      <h:column>#{item.name}</h:column>\n    <h:column>#{item.score}</h:column>\n\
  </h:dataTable>\n<h:form>\n    <f:websocket channel=\"top10Observer\">\n        <f:ajax\
  \ event=\"updated\" render=\":top10\" />\n    </f:websocket>\n</h:form>\n```\n\n\
  以下是服务类的样子，借助了 CDI 事件的一点帮助。\n\n```\n@Stateless\npublic class ItemService {\n\n    @Inject\n\
      private EntityManager entityManager;\n\n    @Inject\n    private BeanManager\
  \ beanManager;\n\n    public void update(Item item) {\n        List<Item> previousTop10\
  \ = getTop10();\n        entityManager.merge(item);\n        List<Item> currentTop10\
  \ = getTop10();\n\n        if (!currentTop10.equals(previousTop10)) {\n            beanManager.fireEvent(new\
  \ Top10UpdatedEvent());\n        }\n    }\n\n    pulic List<Item> getTop10() {\n\
          return entityManager\n            .createNamedQuery(\"Item.top10\", Item.class)\n\
              .getResultList();\n    }\n}\n```\n\n请注意，在这个特定示例中，`Top10UpdatedEvent`\
  \ 基本上只是一个空类，比如 `public class Top10UpdatedEvent {}`。另外请注意，我们这里没有注入 `PushContext`。否则这会被认为是层之间的紧耦合。所有与\
  \ JSF 相关的代码都属于前端，而不是后端。这样，后端服务类就能更好地在各种前端框架（除了 JSF，例如 JAX-RS 甚至普通的 JSP/Servlet）中重用。换句话说，你应该确保你的后端类不会直接或间接地使用任何前端特定的类，例如来自\
  \ `javax.faces.*`、`javax.ws.*` 和 `javax.servlet.*` 包的类。\n\n任何通过 `BeanManager#fireEvent()`\
  \ 方法触发的事件都可以使用 CDI 的 `@Observes` 注解进行观察。这适用于所有层。换句话说，即使事件在后端触发，你也可以在前端观察到它。唯一的要求是支持\
  \ bean 必须是 `@ApplicationScoped` 的。也就是说，在那一刻，不一定存在任何 HTTP 请求、HTTP 会话或 JSF 视图。\n\n\
  ```\n@Named @ApplicationScoped\npublic class Bean {\n\n    private List<Item> top10;\n\
  \n    @Inject\n    private ItemService service;\n\n    @Inject @Push\n    private\
  \ PushContext top10Observer;\n\n    @PostConstruct\n    public void load() {\n        top10\
  \ = service.getTop10();\n    }\n\n    public void onTop10Updated(@Observes Top10UpdatedEvent\
  \ event) {\n        load();\n        top10Observer.send(\"updated\");\n    }\n\n\
      public List<Item> getTop10() {                                             \
  \             \n        return top10;\n    }\n}\n```\n\n## 跟踪活跃的套接字\n\n为了跟踪活跃的套接字，你可以在一个应用程序作用域的\
  \ bean 中观察 `@WebsocketEvent.Opened` 和 `@WebsocketEvent.Closed` 事件。以下示例假设你有一个 `<f:websocket\
  \ channel=\"chat\" user=\"...\">`，并且你打算收集“活跃的聊天用户”：\n\n```\n@ApplicationScoped\n\
  public class WebsocketEventObserver {\n\n    private Map<Serializable, AtomicInteger>\
  \ users;\n\n    @PostConstruct\n    public void init() {\n        users = new ConcurrentHashMap<>();\n\
      }\n\n    public void onopen(@Observes @Opened WebsocketEvent event) {\n        if\
  \ (\"chat\".equals(event.getChannel())) {\n            getCounter(event.getUser()).incrementAndGet();\n\
          }\n    }\n\n    public void onclose(@Observes @Closed WebsocketEvent event)\
  \ {\n        if (\"chat\".equals(event.getChannel())) {\n            getCounter(event.getUser()).decrementAndGet();\n\
          }\n    }\n\n    private AtomicInteger getCounter(Serializable user) {\n\
          return users.computeIfAbsent(user, k -> new AtomicInteger());\n    }\n\n\
      public Set<Serializable> getActiveUsers() {\n        return users.entrySet().stream()\n\
              .filter(entry -> entry.getValue().intValue() > 0)\n            .map(entry\
  \ -> entry.getKey())\n            .collect(Collectors.toSet());\n    }\n}\n```\n\
  \n你可以使用上面的 `getActiveUsers()` 方法来获取一组“活跃的聊天用户”。请注意，单个用户可以在同一个会话中多次打开同一个网页（例如，多个浏览器标签页），这正是为什么使用计数器而不是简单地从\
  \ Set 中添加和删除用户的原因。\n\n## 检测会话和视图过期\n\n默认情况下，只要文档保持打开状态，`<f:websocket>` 标签就会保持连接永久打开——当然，前提是没有设置\
  \ `connected=\"false\"`，或者没有调用 `jsf.push.close(clientId)`。当第一次连接尝试失败时，它会立即报告一个错误。你可以选择使用\
  \ `onclose` 属性来引用一个充当关闭监听器的 JavaScript 函数。\n\n```\n<f:websocket ... onclose=\"logClose\"\
  \ />\n\n<script>\n    function logClose(code, channel, event) {\n        if (code\
  \ == -1) {\n            // 客户端不支持 WebSocket API。例如 IE9。\n        }\n        else\
  \ if (code == 1000) {\n            // 由于视图或会话过期导致的正常关闭。\n        }\n        else\
  \ {\n            // 由于客户端或服务器错误导致的异常关闭。\n        }\n    }\n</script>\n```\n\n该 JavaScript\
  \ 函数将被调用并传入三个参数。\n\n1.  `code`：作为整数的关闭原因代码。如果为 -1，则表示客户端根本不支持 WebSocket JavaScript\
  \ API³。如果为 1000，则表示由于服务器端的视图或会话过期而发生了正常关闭。\n\n2.  `channel`：WebSocket 通道名称。如果你打算使用全局监听器，这可能会很有用。\n\
  \n3.  `event`：原始的 `CloseEvent` 对象。如果你打算在 JavaScript 函数中检查它，这可能会很有用。\n\n当第一次连接尝试成功，但后来由于某种原因（例如，服务器正在重启）断开连接时，默认情况下它会持续尝试重新连接。在\
  \ Mojarra 的情况下，它会最多重试 25 次，每次间隔增加 500 毫秒，并最终报告一个错误。\n\n正如你可能在前面提到的 `onclose` 监听器函数示例中注意到的，你可以检查\
  \ `<f:websocket>` 的关闭代码是否等于 1000，以便通过 JavaScript 执行一些客户端操作（例如，显示警告消息和/或重定向到某个“会话已过期”页面）。\n\
  \n```\n<f:websocket channel=\"push\" scope=\"session\" onclose=\"closeListener\"\
  \ />\n\n<script>\n    function closeListener(code) {\n        if (code == 1000)\
  \ {\n            window.location = jsf.contextPath + \"/expired.xhtml\";\n        }\n\
      }\n</script>\n```\n\n这既适用于视图作用域的套接字，也适用于会话作用域的套接字。然而，只要文档在客户端仍然打开，应用程序作用域的套接字就会永久保持打开状态，即使底层的视图或会话已经过期。\n\
  \n\n\n## 深入解析 Mojarra 的 f:websocket 实现\n\n<f:websocket> API 规定了以下类和方法：\n\n*   `javax.faces.push.Push`，一个用于\
  \ `@Inject` 的 CDI 限定符。借助此限定符，可以指定套接字通道名称。\n\n*   `javax.faces.push.PushContext`，一个包含三个\
  \ `send()` 方法的接口：`send(String message)`、`send(String message, S user)` 和 `send(String\
  \ message, Collection<S> users)`。所有这些方法都将推送消息作为 `Object` 接收，并在 JavaScript 端将其转换为\
  \ JSON 字符串。每个消息都返回 `Future<Void>`。如果返回 `null`，则表示目标套接字根本未打开。如果在调用 `Future#get()`\
  \ 方法时未抛出 `ExecutionException`，则表示消息已成功送达。\n\n*   `javax.faces.component.UIWebsocket`，一个实现了\
  \ `ClientBehaviorHolder` 的组件，用于支持嵌套的 `<f:ajax>`。从历史上看，原型标签使用的是 `TagHandler` 而非 `UIComponent`。后来决定让该标签支持\
  \ `<f:ajax>`，因为这会使复杂且有状态的 UI 更新变得更加容易。然而，让 `TagHandler` 实现 `ClientBehaviorHolder`\
  \ 并受益于所有内置的 Ajax 魔法是不可能的，因此才转换为了 `UIComponent`。\n\n*   `ViewHandler#getWebsocketURL()`\
  \ 方法，它接收一个通道名称，并借助 `ExternalContext#encodeWebsocketURL()` 返回 `ws://host:port/context/javax.faces.push/channel`\
  \ 形式的绝对 WebSocket URL。\n\n*   `ExternalContext#encodeWebsocketURL()` 方法，它基本上接收一个\
  \ `/context/javax.faces.push/channel` 形式的相对 WebSocket URI，并返回绝对 WebSocket URL。\n\
  \n实际的实现相当广泛。它直接基于 OmniFaces 的 `<o:socket>` ⁴，并在此处和彼处进行了一些调整，例如在 JavaScript API 函数中使用组件的客户端\
  \ ID 而不是通道名称。\n\n*   `com.sun.faces.renderkit.html_basic.WebsocketRenderer`，一个 Faces\
  \ 渲染器类，它在编码期间将套接字通道、作用域和用户注册到 `WebsocketChannelManager`，并从中检索 WebSocket URL。然后，它会自动包含包含必要\
  \ `javax.push.*` 函数的 `jsf.js` 脚本，并渲染 `jsf.push.init(...)` 内联脚本函数调用，其中将 WebSocket\
  \ URL 作为参数之一。此函数应在 JavaScript 中创建一个新的 `WebSocket(url)`。`WebsocketRenderer` 还会将 `WebsocketFacesListener`\
  \ 订阅到当前视图。\n\n*   `com.sun.faces.push.WebsocketChannelManager`，一个会话作用域的 CDI 托管 Bean，它跟踪所有已注册的\
  \ `<f:websocket>` 通道、作用域和用户，并确保每个套接字都有其唯一的通道标识符。它会将每个通道标识符注册到 `WebsocketSessionManager`，并将面向用户的套接字的通道标识符注册到\
  \ `WebsocketUserManager`。\n\n*   `com.sun.faces.push.WebsocketFacesListener`，一个系统事件监听器，它监听\
  \ `PreRenderViewEvent`，并根据 `connected` 属性是否表示在 Ajax 请求期间发生更改的动态 EL 表达式，在必要时渲染 `jsf.push.open(...)`\
  \ 或 `jsf.push.close(...)` 内联脚本函数调用。\n\n*   `com.sun.faces.push.WebsocketEndpoint`，一个实现了\
  \ JSR-356 `javax.websocket.Endpoint` 的类，并监听 URI 模板 `/javax.faces.push/{channel}`。当在客户端\
  \ JavaScript 中创建并打开一个新的 `WebSocket(url)` 时，会在服务器端 Java 中创建一个新的 `javax.websocket.Session`，并且\
  \ `WebsocketEndpoint` 会将此 `Session` 添加到 `WebsocketSessionManager`。同样地，当套接字关闭时，`WebsocketEndpoint`\
  \ 会将其从 `WebsocketSessionManager` 中移除。\n\n*   `com.sun.faces.push.WebsocketSessionManager`，一个应用作用域的\
  \ CDI 托管 Bean，它收集所有已打开的套接字会话，并验证其唯一的 WebSocket URL 是否已由 `WebsocketChannelManager`\
  \ 注册。\n\n*   `com.sun.faces.push.WebsocketUserManager`，一个应用作用域的 CDI 托管 Bean，它收集所有已打开的面向用户的套接字的通道标识符。\n\
  \n*   `com.sun.faces.push.WebsocketPushContext`，`PushContext` 接口的具体实现。它通过 `WebsocketSessionManager`\
  \ 发送推送消息，并在必要时通过 `WebsocketUserManager` 获取面向用户的通道。\n\n*   `com.sun.faces.push.WebsocketPushContextProducer`，CDI\
  \ 生产者，它根据从 `@Push` 限定符、`WebsocketSessionManager` 和 `WebsocketUserManager` 获取的通道名称创建\
  \ `WebsocketPushContext` 实例。\n\n# 脚注\n\n1 [`github.com/javaee/websocket-spec/issues/211`](https://github.com/javaee/websocket-spec/issues/211)\
  \ .\n\n2 [`javaserverfaces.github.io/docs/2.3/jsdocs/symbols/jsf.push.html`](https://javaserverfaces.github.io/docs/2.3/jsdocs/symbols/jsf.push.html)\
  \ .\n\n3 [`caniuse.com/#feat=websockets`](http://caniuse.com/%23feat%3Dwebsockets)\
  \ .\n\n4 [`showcase.omnifaces.org/push/socket`](http://showcase.omnifaces.org/push/socket)\
  \ .\n\n© Bauke Scholtz, Arjan Tijms 2018\n\nBauke Scholtz 和 Arjan Tijms，Java EE\
  \ 8 中 JSF 的权威指南，`doi.org/10.1007/978-1-4842-3387-0_11`\n\n# 11. 自定义组件\n\nBauke Scholtz^(1 )\
  \ 和 Arjan Tijms²\n\n(1)威廉斯塔德，库拉索\n\n(2)阿姆斯特丹，北荷兰省，荷兰\n\n在第 7 章中，您应该已经了解到，像 `<ui:composition>`、`<ui:include>`\
  \ 和 `<ui:decorate>` 这样的 Facelet 模板在您希望将主页面布局片段拆分为可重用的模板（如页眉、菜单、主要内容区域和页脚）时非常有用。而像\
  \ `<t:field>` 这样的 Facelet 标签文件在您希望拥有可重用的组件组以最大限度地减少代码重复时非常有用。并且，像 `<t:inputLocalTime>`\
  \ 这样的复合组件在您希望基于现有组件（以及必要时的一些 HTML）创建具有单一职责的自定义组件时非常有用。\n\n然而，在某些情况下，可能不存在完全符合您目的的单一组件，即使是由现有组件和一些\
  \ HTML 组合而成也不行。或者，组件可能存在，但其渲染器并未按您设想的方式工作。此时，您就需要创建一个自定义组件或自定义渲染器。\n\nJSF（JavaServer\
  \ Faces）从一开始就围绕 UIComponent API（应用程序编程接口）提供了高度的抽象。您可以通过创建一个全新的自定义 UIComponent，或扩展现有标准\
  \ HTML 组件集中的组件，或为现有组件插入自定义 Renderer 来自定义组件。\n\n\n\n## 组件类型、组件族与渲染器类型\n\n每个 `UIComponent`\
  \ 实例都关联着“组件类型”、“组件族”和“渲染器类型”。组件类型本质上代表了与组件标签关联的唯一组件标识符。它可以通过 `@FacesComponent` 注解或\
  \ `faces-config.xml` 中的 `<component>` 条目注册到 JSF 中。以下示例演示了在一个最小组件类上使用注解的方式：\n\n```\n\
  @FacesComponent(SomeComponent.COMPONENT_TYPE)\npublic class SomeComponent extends\
  \ UIComponentBase {\n\npublic static final String COMPONENT_TYPE = \"project.SomeComponent\"\
  ;\n    public static final String COMPONENT_FAMILY = \"project.SomeFamily\";\n\n\
  public SomeComponent() {\n        setRendererType(SomeRenderer.RENDERER_TYPE);\n\
      }\n\n@Override\n    public String getFamily() {\n        return COMPONENT_FAMILY;\n\
      }\n}\n```\n\n以下示例演示了在 `faces-config.xml` 中使用条目的方式：\n\n```\n<component>\n    <component-type>project.SomeComponent</component-type>\n\
      <component-class>\n        com.example.project.component.SomeComponent\n    </component-class>\n\
  </component>\n```\n\n请注意，当你同时通过注解和 XML 方式使用相同标识符注册 Java EE 工件时，XML 声明将始终优先于注解声明。这一点对所有\
  \ JSF 注解同样适用。\n\n组件类中的公共常量 `COMPONENT_TYPE` 和 `COMPONENT_FAMILY` 并非强制要求，但它们遵循与标准\
  \ JSF 组件集相同的约定，因此在使用 JSF 开发时能提供更高的一致性。公共常量 `COMPONENT_TYPE` 允许开发者以编程方式创建组件，而无需硬编码组件类型。\n\
  \n```\nUIComponent component = FacesContext.getCurrentInstance()\n    .getApplication().createComponent(SomeComponent.COMPONENT_TYPE);\n\
  ```\n\n请注意，在一般的 JSF Web 应用程序中，以这种方式编程创建 `UIComponent` 实例通常并非标准做法。相反，你通常会在视图中定义组件，并将创建\
  \ `UIComponent` 实例的工作交给 JSF 或任何可插拔的组件库。在使用 Facelets 视图技术的情况下，组件标签可以通过 `@FacesComponent(createTag=true)`\
  \ 或 `*.taglib.xml` 文件中的 `<tag>` 条目（同时指定组件类型）注册到 JSF 中，如下所示：\n\n```\n<tag>\n    <tag-name>someComponent</tag-name>\n\
      <component>\n        <component-type>project.SomeComponent</component-type>\n\
      </component>\n</tag>\n```\n\n如前所述，标准 JSF 组件集也在组件标签背后的具体 `UIComponent` 类中定义了组件类型。这些\
  \ `UIComponent` 类都位于 `javax.faces.component.html` 包中。`UIComponent` 类名可以通过在组件标签名前加上“Html”前缀推导出来。例如，组件标签\
  \ `<h:outputText>` 由 `HtmlOutputText` 组件支持。JSF 可以通过 `@FacesComponent` 注解或 `faces-config.xml`\
  \ 中的 `<component>` 条目，确定哪个组件类确切地与组件标签关联，因此 JSF 知道对于 `<h:outputText>` 标签，它应该创建一个具体的\
  \ `HtmlOutputText` 实例。\n\n一旦 JSF 获得了具体的 `UIComponent` 实例，它就可以通过分别调用 `UIComponent#getFamily()`\
  \ 和 `UIComponent#getRendererType()` 方法来确定组件族和渲染器类型。这些信息对于为给定的 `UIComponent` 实例创建具体的\
  \ `Renderer` 实例是必需的，如下面的代码片段所示：\n\n```\nRenderer renderer = FacesContext.getCurrentInstance().getRenderKit()\n\
      .getRenderer(component.getFamily(), component.getRendererType());\n```\n\n组件族本质上是一个“硬编码”的常量，可以在多个组件类型之间共享。它之所以是“硬编码”的，是因为没有为其提供\
  \ setter 方法。这是为了获取具体的 `Renderer` 实例所必需的，因为这些实例不是按组件类型注册到 JSF 中的，而是按组件族注册的。这允许可插拔渲染套件的开发者只需注册一次渲染器类型，而无需为每个已知的标准组件类型和未知的自定义组件类型多次注册。通常，组件族和渲染器类型通过\
  \ `@FacesRenderer` 注解或 `faces-config.xml` 中的 `<renderer>` 条目注册到 JSF 中。以下示例演示了在一个最小渲染器类上使用注解的方式：\n\
  \n```\n@FacesRenderer(\n    componentFamily=SomeComponent.COMPONENT_FAMILY,\n    rendererType=SomeRenderer.RENDERER_TYPE)\n\
  public class SomeRenderer extends Renderer {\n    public static final String RENDERER_TYPE\
  \ = \"project.SomeRenderer\";\n}\n```\n\n以下示例演示了在 `faces-config.xml` 中使用条目的方式：\n\
  \n```\n<render-kit>\n    <renderer>\n        <component-family>project.SomeFamily</component-family>\n\
          <renderer-type>project.SomeRenderer</renderer-type>\n        <renderer-class>\n\
              com.example.project.renderer.SomeRenderer\n        </renderer-class>\n\
      </renderer>\n</render-kit>\n```\n\n渲染器类型默认在具体组件类的构造函数中定义，正如你可能已经在前面的 `SomeComponent`\
  \ 类代码片段中注意到的那样。如果需要，组件子类的开发者，甚至作为组件最终用户的你，都可以随时用所需的渲染器实例覆盖组件的默认渲染器实例。这可以通过多种方式实现，全部通过\
  \ XML 完成。第一种方式是通过 `*.taglib.xml` 文件中与组件标签关联的 `<tag>` 条目。\n\n```\n<tag>\n    <tag-name>someComponent</tag-name>\n\
      <component>\n        <component-type>project.SomeComponent</component-type>\n\
          <renderer-type>custom.OtherRenderer</renderer-type>\n    </component>\n\
  </tag>\n```\n\n这会影响整个应用程序，并且仅针对特定的组件标签。第二种方式是通过在 `faces-config.xml` 中添加一个新的 `<renderer>`\
  \ 条目，该条目精确地针对所需的组件族及其默认渲染器类型。\n\n```\n<render-kit>\n    <renderer>\n        <component-family>project.SomeFamily</component-family>\n\
          <renderer-type>project.SomeRenderer</renderer-type>\n        <renderer-class>\n\
              com.example.custom.renderers.OtherRenderer\n        </renderer-class>\n\
      </renderer>\n</render-kit>\n```\n\n这会影响整个应用程序，并且针对当前与给定渲染器类型关联的、属于给定组件族的*每个*组件标签。第三种方式是通过组件标签的\
  \ `rendererType` 属性。\n\n```\n<x:someComponent ... rendererType=\"custom.OtherRenderer\"\
  \ />\n```\n\n这仅影响声明的组件标签，而不影响其他标签。表 11-1 提供了标准 JSF 组件集中所有组件类型、组件族和渲染器类型的概览。\n\n\n\
  \n###### 表 11-1 标准 JSF HTML 组件集的组件类、组件类型、组件族和渲染器类型\n\n| 组件标签 | 组件类 | 组件类型 | 组件族\
  \ | 渲染器类型 |\n| --- | --- | --- | --- | --- |\n| <h:body> | HtmlBody | javax.faces.OutputBody\
  \ | javax.faces.Output | javax.faces.Body |\n| <h:button> | HtmlOutcomeTargetButton\
  \ | javax.faces.HtmlOutcomeTargetButton | javax.faces.OutcomeTarget | javax.faces.Button\
  \ |\n| <h:column> | HtmlColumn | javax.faces.HtmlColumn | javax.faces.Column | null\
  \ |\n| <h:commandButton> | HtmlCommandButton | javax.faces.HtmlCommandButton | javax.faces.Command\
  \ | javax.faces.Button |\n| <h:commandLink> | HtmlCommandLink | javax.faces.HtmlCommandLink\
  \ | javax.faces.Command | javax.faces.Link |\n| <h:commandScript> | HtmlCommandScript\
  \ | javax.faces.HtmlCommandScript | javax.faces.Command | javax.faces.Script |\n\
  | <h:dataTable> | HtmlDataTable | javax.faces.HtmlDataTable | javax.faces.Data |\
  \ javax.faces.Table |\n| <h:doctype> | HtmlDoctype | javax.faces.OutputDoctype |\
  \ javax.faces.Output | javax.faces.Doctype |\n| <h:form> | HtmlForm | javax.faces.HtmlForm\
  \ | javax.faces.Form | javax.faces.Form |\n| <h:graphicImage> | HtmlGraphicImage\
  \ | javax.faces.HtmlGraphicImage | javax.faces.Graphic | javax.faces.Image |\n|\
  \ <h:head> | HtmlHead | javax.faces.OutputHead | javax.faces.Output | javax.faces.Head\
  \ |\n| <h:inputFile> | HtmlInputFile | javax.faces.HtmlInputFile | javax.faces.Input\
  \ | javax.faces.File |\n| <h:inputHidden> | HtmlInputHidden | javax.faces.HtmlInputHidden\
  \ | javax.faces.Input | javax.faces.Hidden |\n| <h:inputSecret> | HtmlInputSecret\
  \ | javax.faces.HtmlInputSecret | javax.faces.Input | javax.faces.Secret |\n| <h:inputText>\
  \ | HtmlInputText | javax.faces.HtmlInputText | javax.faces.Input | javax.faces.Text\
  \ |\n| <h:inputTextarea> | HtmlInputTextarea | javax.faces.HtmlInputTextarea | javax.faces.Input\
  \ | javax.faces.Textarea |\n| <h:link> | HtmlOutcomeTargetLink | javax.faces.HtmlOutcomeTargetLink\
  \ | javax.faces.OutcomeTarget | javax.faces.Link |\n| <h:message> | HtmlMessage\
  \ | javax.faces.HtmlMessage | javax.faces.Message | javax.faces.Message |\n| <h:messages>\
  \ | HtmlMessages | javax.faces.HtmlMessages | javax.faces.Messages | javax.faces.Messages\
  \ |\n| <h:outputFormat> | HtmlOutputFormat | javax.faces.HtmlOutputFormat | javax.faces.Output\
  \ | javax.faces.Format |\n| <h:outputLabel> | HtmlOutputLabel | javax.faces.HtmlOutputLabel\
  \ | javax.faces.Output | javax.faces.Label |\n| <h:outputText> | HtmlOutputText\
  \ | javax.faces.HtmlOutputText | javax.faces.Output | javax.faces.Text |\n| <h:outputScript>\
  \ | UIOutput | javax.faces.Output | javax.faces.Output | javax.faces.Script |\n\
  | <h:outputStylesheet> | UIOutput | javax.faces.Output | javax.faces.Output | javax.faces.resource.Stylesheet\
  \ |\n| <h:panelGrid> | HtmlPanelGrid | javax.faces.HtmlPanelGrid | javax.faces.Panel\
  \ | javax.faces.Grid |\n| <h:panelGroup> | HtmlPanelGroup | javax.faces.HtmlPanelGroup\
  \ | javax.faces.Panel | javax.faces.Group |\n| <h:selectBooleanCheckbox> | HtmlSelectBooleanCheckbox\
  \ | javax.faces.HtmlSelectBooleanCheckbox | javax.faces.SelectBoolean | javax.faces.Checkbox\
  \ |\n| <h:selectManyCheckbox> | HtmlSelectManyCheckbox | javax.faces.HtmlSelectManyCheckbox\
  \ | javax.faces.SelectMany | javax.faces.Checkbox |\n| <h:selectManyListbox> | HtmlSelectManyListbox\
  \ | javax.faces.HtmlSelectManyListbox | javax.faces.SelectMany | javax.faces.Listbox\
  \ |\n| <h:selectManyMenu> | HtmlSelectManyMenu | javax.faces.HtmlSelectManyMenu\
  \ | javax.faces.SelectMany | javax.faces.Menu |\n| <h:selectOneListbox> | HtmlSelectOneListbox\
  \ | javax.faces.HtmlSelectOneListbox | javax.faces.SelectOne | javax.faces.Listbox\
  \ |\n| <h:selectOneMenu> | HtmlSelectOneMenu | javax.faces.HtmlSelectOneMenu | javax.faces.SelectOne\
  \ | javax.faces.Menu |\n| <h:selectOneRadio> | HtmlSelectOneRadio | javax.faces.HtmlSelectOneRadio\
  \ | javax.faces.SelectOne | javax.faces.Radio |\n\n如果仔细审视该表，你会发现组件族和渲染器类型中存在某种规律，尤其是在输入、选择和命令组件中。你会注意到，一个渲染器类型可以被多个组件共享，甚至跨不同组件族共享。\n\
  \n你还会注意到，有一个 HTML 组件没有渲染器类型，即 `<h:column>`。这是一个特殊组件，不能单独使用，只能嵌套在特定的父组件中使用。在标准 JSF\
  \ 组件集中，目前只有 `<h:dataTable>` 支持它。其渲染器能够识别类型为 `UIColumn` 的子组件，并据此进行相应处理。\n\n\n\n##\
  \ 创建新组件和渲染器\n\n如果你更仔细地观察第 3 章的表格 3-1，可能会注意到 JSF 没有提供任何组件来根据提供的数组或集合值渲染动态的`<ul>`、`<ol>`甚至`<dl>`元素。它只支持`<table>`元素。诚然，使用\
  \ Facelets 的`<ui:repeat>`加上一些自定义 HTML 代码也能实现同样的效果，但我们将以此为契机，创建一个能够渲染`<ul>`或`<ol>`的新自定义组件。\n\
  \n第一步是检查哪个`UIComponent`子类适合我们设想的任务，以便将自定义代码逻辑降至最低。在`javax.faces.component`包中，你可以找到许多`UIXxx`组件子类。如果你想创建新的表单组件，请继承`UIForm`；如果想创建新的输入组件，请继承`UIInput`；如果想创建新的输出组件，请继承`UIOutput`；如果想创建新的数据迭代器组件，请继承`UIData`。通常很少需要直接继承`UIComponent`。我们希望能够在集合上迭代，以便在`<ul>`内部生成`<li>`元素，因此我们将选择`UIData`。它已经实现了大量迭代和状态保存逻辑。以下是自定义组件类`com.example.project.component.DataList`：\n\
  \n```\n@FacesComponent(createTag=true)\npublic class DataList extends UIData {\n\
  \npublic DataList() {\n        setRendererType(DataListRenderer.RENDERER_TYPE);\n\
      }\n}\n```\n\n就这些吗？是的，`UIData`超类已经包含了我们所需的一切，所有生成 HTML 的代码只需放入`DataListRenderer`中，稍后将展示。你会注意到`@FacesComponent`注解声明了`createTag=true`属性。这基本上指示\
  \ JSF 自动在预定义的 XML 命名空间`http://xmlns.jcp.org/jsf/component`中创建一个组件标签。换句话说，上述标签在 Facelets\
  \ 文件中可以这样使用：\n\n```\n< ... xmlns:my=\"http://xmlns.jcp.org/jsf/component\">\n    ...\n\
      <my:dataList ...>\n        ...\n    </my:dataList>\n```\n\nXML 命名空间前缀“my”当然由你选择。通常，你会在此处选择公司名称的某种缩写。你也可以使用`namespace`属性覆盖预定义的\
  \ XML 命名空间。\n\n```\n@FacesComponent(createTag=true, namespace=\"http://example.com/ui\"\
  )\n```\n\n这样它将按如下方式可用：\n\n```\n< ... xmlns:ex=\"http://example.com/ui\">\n    ...\n\
      <ex:dataList ...>\n        ...\n    </ex:dataList>\n```\n\n遗憾的是，此命名空间无法与自定义`*.taglib.xml`文件的`<namespace>`统一。如果对两者使用相同的命名空间，JSF\
  \ 将优先使用`*.taglib.xml`而非`@FacesComponent`，从而无法找到自定义组件标签。也就是说，在几乎所有与 Java EE 相关的内容中，任何基于\
  \ XML 的注册优先级都高于基于 Java 注解的注册。\n\n你基本上还需要在`*.taglib.xml`文件中显式注册自定义组件。以下是在第 7 章“标签文件”一节中创建的`/WEB-INF/example.taglib.xml`如何通过注册自定义组件进行扩展，这本质上与`@FacesComponent`为你所做的工作相同。\n\
  \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<facelet-taglib\n    xmlns:=\"\
  http://xmlns.jcp.org/xml/ns/javaee\"\n    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
  \n    xsi:schemaLocation=\"http://xmlns.jcp.org/xml/ns/javaee\n      http://xmlns.jcp.org/xml/ns/javaee/web-facelettaglibrary_2_3.xsd\"\
  \n    version=\"2.3\"\n>\n    <namespace>http://example.com/tags</namespace>\n    <short-name>t</short-name>\n\
  \n<!-- 其他标签在此 -->\n\n<tag>\n        <description>渲染一个 HTML 列表。</description>\n        <tag-name>dataList</tag-name>\n\
          <component>\n            <component-type>dataList</component-type>\n        </component>\n\
      </tag>\n</facelet-taglib>\n```\n\n这样，自定义组件就可以与其他标签位于同一命名空间中。\n\n```\n< ... xmlns:t=\"\
  http://example.com/tags\">\n    ...\n    <t:dataList ...>\n        ...\n    </t:dataList>\
  \ \n```\n\n现在，你可以基本上移除`@FacesComponent`的所有属性，使其仅保留`@FacesComponent`。是的，正如你在`example.taglib.xml`中看到的，组件类型默认为类名并将首字母小写。你始终可以通过在`@FacesComponent`注解中显式指定值来覆盖它。通常，你会用公司名称作为前缀。将其定义为公共常量是一个好习惯，这样其他人可以在必要时在\
  \ Javadoc 中查找它，或将其用于`Application#createComponent()`。\n\n```\n@FacesComponent(DataList.COMPONENT_TYPE)\n\
  public class DataList extends UIData {\n\npublic static final String COMPONENT_TYPE\
  \ = \"example.DataList\";\n\npublic DataList() {\n        setRendererType(DataListRenderer.RENDERER_TYPE);\n\
      }\n}\n```\n\n现在相应地调整`example.taglib.xml`中的组件类型。\n\n```\n<component>\n    <component-type>example.DataList</component-type>\n\
  </component>\n```\n\n`*.taglib.xml`还允许你通过`<attribute>`条目注册属性，尽管这可能会导致代码冗长。你应该已经在第\
  \ 7 章的“标签文件”一节中看到过。遗憾的是，当前版本的 JSF 没有提供注解来声明式地声明“官方”组件属性。目前还没有类似`@FacesAttribute\
  \ private Iterable value`这样的东西。这可能会在未来的 JSF 版本中出现。非官方的方式（不带任何`<attribute>`）也能正常工作。你可以在视图中的组件标签上声明任何你想要的属性。\n\
  \n```\n<t:dataList foo=\"bar\" bar=\"foo\" />\n```\n\n这只是 XML 的自由度。实际组件或渲染器实现是否对其做处理则是另一回事。你甚至可以在现有组件上声明自定义属性，并插入一个扩展的`Renderer`来处理该属性。更多内容将在“扩展现有渲染器”一节中介绍。说到渲染器，我们的`<t:dataList>`仍然需要在其构造函数中注册的渲染器。以下是`com.example.project.renderer.DataListRenderer`的样子。\n\
  \n```\n@FacesRenderer(\n    componentFamily=UIData.COMPONENT_FAMILY,\n    rendererType=DataListRenderer.RENDERER_TYPE)\n\
  public class DataListRenderer extends Renderer {\n\npublic static final String RENDERER_TYPE\
  \ = \"example.List\";\n\n@Override\n    public void encodeBegin\n        (FacesContext\
  \ context, UIComponent component)\n            throws IOException\n    {\n        ResponseWriter\
  \ writer = context.getResponseWriter();\n        UIData data = (UIData) component;\n\
  \nif (data.getRowCount() > 0) {\n            writer.startElement(\"ul\", component);\n\
          }\n    }\n\n@Override\n    public void encodeChildren\n        (FacesContext\
  \ context, UIComponent component)\n            throws IOException\n    {\n        ResponseWriter\
  \ writer = context.getResponseWriter();\n        UIData data = (UIData) component;\n\
  \nfor (int i = 0; i < data.getRowCount(); i++) {\n            data.setRowIndex(i);\n\
              writer.startElement(\"li\", component);\n\nif (component.getChildCount()\
  \ > 0) {\n                for (UIComponent child : component.getChildren()) {\n\
                      child.encodeAll(context);\n                }\n            }\n\
  \nwriter.endElement(\"li\");\n        }\n\ndata.setRowIndex(-1);\n    }\n\n@Override\n\
      public void encodeEnd\n        (FacesContext context, UIComponent component)\n\
              throws IOException\n    {\n        ResponseWriter writer = context.getResponseWriter();\n\
          UIData data = (UIData) component;\n\n\n```markdown\nif (data.getRowCount()\
  \ > 0) {\n            writer.endElement(\"ul\");\n        }\n    }\n}\n```\n\n事后看来，这相对简单。我们将尽可能多的繁重工作委托给\
  \ JSF 提供的 `UIData` 超类。在 `encodeBegin()` 中，当数据模型不为空时，你开始 `<ul>` 元素。这需要通过检查 `UIData#getRowCount()`\
  \ 的结果来确认。其 Javadoc¹ 基本说明如下：\n\n> *返回底层数据模型中的行数。如果可用行数未知，则返回 -1。*\n\n“行”这个术语确实与表格密切相关。这也是该超类最初设计的目的：`<h:dataTable>`。“项”这个术语本来会更通用，但现状如此。\n\
  \n然后，在 `encodeChildren()` 方法中，我们通过 `UIData#setRowIndex()` 方法设置当前行索引，开始 `<li>` 元素，通过在每个子组件上调用\
  \ `UIComponent#encodeAll()` 来原样编码所有子组件，最后结束 `<li>` 元素。循环完成后，我们通过调用值为 -1 的 `UIData#setRowIndex()`\
  \ 来明确告知 `UIData` 超类。其 Javadoc² 说明如下：\n\n> *如果新的 rowIndex 值为 -1：如果 var 属性不为 null，则移除相应的请求作用域属性（如果有）。重置所有后代组件的状态信息。*\n\
  \n因此，它会清除与迭代相关的任何状态。这一点非常重要；否则，它可能会在组件树中进一步引起副作用，甚至当它自身需要遍历数据模型时，可能导致视图状态损坏。最后，在\
  \ `encodeEnd()` 方法中，它将基于与 `encodeBegin()` 中相同的条件结束 `<ul>` 元素。\n\n`encodeChildren()`\
  \ 方法中对 `UIData#setRowIndex()` 的调用会在底层从 `value` 属性中提取数据模型，并将其包装在 `javax.faces.model.DataModel`\
  \ 抽象类的合适实现中。³ 到目前为止，根据 `UIData#getValue()` 的 Javadoc，⁴ 支持 `value` 属性背后的以下对象类型，按此扫描顺序：\n\
  \n1.  `java.util.List`（自 1.0 起）\n2.  数组（自 1.0 起）\n3.  `java.sql.ResultSet`（自 1.0\
  \ 起）\n4.  `javax.servlet.jsp.jstl.sql.Result`（自 1.0 起）\n5.  `java.util.Collection`（自\
  \ 2.2 起）\n6.  `java.lang.Iterable`（自 2.3 起）\n7.  `java.util.Map`（自 2.3 起）\n8.  已通过\
  \ `@FacesDataModel` 注册了合适 `DataModel` 的类型（自 2.3 起）\n9.  所有其他类型将使用 `ScalarDataModel`\
  \ 类进行适配，该类会将对象视为单行数据（自 1.0 起）\n\n你确实不会期望在现代 Java EE 应用中看到有人传递一个普通的 `java.sql.ResultSet`，更不用说看到带有\
  \ JSTL `<sql:xxx>` 标签的 JSP 页面了。但这都是为了向后兼容。请记住，JSF 是在 2004 年引入的。向后兼容性是它能够存活至今的最强关键之一。它们当然有被移除的可能，但不是现在。\n\
  \n而且，某些类型之间确实存在重叠；`List` 和 `Collection` 很容易被 `Iterable` 覆盖，因为它们都实现了这个接口。但这有性能方面的原因。对于\
  \ `List`，`ListDataModel` 通过索引直接访问项；对于 `Collection`，`CollectionDataModel` 首先通过 `Collection#toArray()`\
  \ 提取项，然后通过索引访问；对于 `Iterable`，`IterableDataModel` 只是简单地迭代项，并首先将它们收集到一个新的 `List` 中。这可能会有所不同。\n\
  \n你还会看到，JSF 2.3 不仅添加了两个新的数据模型，还引入了一个新的注解来注册自定义数据模型。以前，每次将自定义集合传递给 `UIData` 组件之前，你需要手动将其包装在自定义数据模型中。`DataModel`\
  \ 抽象类本身有一个缺点，即它本身不可序列化，这或多或少迫使你让持有此类数据模型的 `@ViewScoped` bean 在瞬态数据模型属性上拥有一个延迟加载的\
  \ getter，如下所示：\n\n```\nprivate YourCollection yourCollection;\nprivate transient\
  \ YourDataModel dataModel;\n\npublic DataModel getDataModel() {\n    if (dataModel\
  \ == null) {\n        dataModel = new YourDataModel(yourCollection);\n    }\n  \
  \  return dataModel;\n}\n```\n\n理想情况下，`UIData` 应该自身识别 `YourCollection` 类型，并自动将其包装在\
  \ `YourDataModel` 中。新的 `@FacesDataModel` 注解正是做到了这一点。\n\n```\n@FacesDataModel(forClass=YourCollection.class)\n\
  public class YourDataModel<E> extends DataModel<E> {}\n```\n\n回到自定义渲染器，还有一个方法没有解释：`getRendersChildren()`。它被重写为显式返回\
  \ `true`。你可能会问自己，为什么它最初是 `false`？为什么不直接让它成为 `encodeChildren()` 的默认行为，并依赖任何重写的 `encodeChildren()`\
  \ 方法来决定是否要在子组件上调用 `encodeAll()`？这实际上是规范中的一个历史性疏忽。最初，`encodeAll()` 方法并不存在。它是在 JSF\
  \ 1.2 中才添加的，并且基本上使 `getRendersChildren()` 变得过时。但为了向后兼容，引入了这种复杂性。\n\n简而言之，如果你重写了\
  \ `encodeChildren()` 方法，请始终让 `getRendersChildren()` 返回 `true`。否则，子组件将根本不会被编码。\n\n\
  最后但同样重要的是，你可能还会想知道，为什么我们不“简单地”重写 `DataList` 组件的 `encodeBegin()`、`encodeChildren()`（和\
  \ `getRendersChildren()`）以及 `encodeEnd()` 方法，而是创建一个“完整的”渲染器实现。主要原因是：简单性和可扩展性。`UIComponent`\
  \ 上指定的这些方法不仅仅用于渲染。它们还会检查 `UIComponent#isRendered()` 是否返回 `true`。`encodeBegin()`\
  \ 还会触发 `PreRenderComponentEvent`，并将当前组件作为 `#{component}` 推入 EL（表达式语言）作用域。`encodeEnd()`\
  \ 将 `#{component}` 从 EL 作用域中弹出。并且它们还会检查是否附加了渲染器，如果有，则委托给它。这些都在它们的 Javadoc 中有所说明。当你重写这些方法时，你需要手动处理它们。这是不必要的重复工作。而且，如果将来有人想要调整组件的渲染，如果你的组件不检查渲染器，他们将无法插入自定义渲染器。\n\
  ```\n\n\n## 扩展现有组件\n\n假设有一个现有组件，你希望调整其行为，通常是通过添加一个或多个新的自定义属性。如果这些属性纯粹是输出型的，那么你可以直接使用\
  \ JSF 2.2 中引入的透传属性功能。在此之前，任何组件官方不支持的属性在视图渲染时都会被忽略。例如，当你希望为现有的 `<h:inputFile>` 组件添加缺失的\
  \ `accept` 属性时，简单地像下面这样添加属性是行不通的。\n\n```\n<h:inputFile id=\"photo\" value=\"#{editProfile.photo}\"\
  \ accept=\"image/*\" />\n```\n\n利用透传属性功能，你可以明确指示 JSF 无论如何都要渲染该自定义属性。这可以通过两种方式实现。第一种方式是通过\
  \ [`xmlns.jcp.org/jsf/passthrough`](http://xmlns.jcp.org/jsf/passthrough) XML 命名空间进行注册。\n\
  \n```\n< ... xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n    xmlns:a=\"http://xmlns.jcp.org/jsf/passthrough\"\
  >\n    ...\n    <h:form enctype=\"multipart/form-data\">\n        <h:inputFile ...\
  \ a:accept=\"image/*\" />\n    </h:form>\n```\n\n另一种方式是通过 `<f:passThroughAttribute>`\
  \ 标签进行声明。\n\n```\n< ... xmlns:f=\"http://xmlns.jcp.org/jsf/core\"\n    xmlns:h=\"\
  http://xmlns.jcp.org/jsf/html\">\n    ...\n    <h:form enctype=\"multipart/form-data\"\
  >\n        <h:inputFile ...>\n            <f:passThroughAttribute name=\"accept\"\
  \ value=\"image/*\" />\n        </h:inputFile>\n    </h:form>\n```\n\n无论哪种方式，在客户端都能正常工作。在支持该属性的浏览器上，文件浏览对话框只会显示与\
  \ `accept` 属性中指定的、以逗号分隔的 IANA（互联网号码分配机构）媒体类型相匹配的文件。然而，在不支持该属性的浏览器上，这将无法生效，并且也不会在服务器端进行任何验证。即使浏览器支持该属性，任何恶意的最终用户都可以轻易地操纵检索到的\
  \ HTML 文档，移除 `accept` 属性，从而能够上传不同类型的文件。\n\n正是为了处理服务器端的工作，你希望扩展 `<h:inputFile>` 组件，使其能够基于\
  \ `accept` 属性执行验证。第一步是查看 `<h:inputFile>` 具体代表哪个 `UIComponent` 类。如 表 11-1 所示，它是 `javax.faces.component.html.HtmlInputFile`。让我们从扩展它并添加新的\
  \ `accept` 属性开始。\n\n```\n@FacesComponent(createTag=true)\npublic class InputFile\
  \ extends HtmlInputFile {\n\n@Override\n    public void encodeBegin(FacesContext\
  \ context) throws IOException {\n        String accept = getAccept();\n        if\
  \ (accept != null) {\n            getPassThroughAttributes().put(\"accept\", accept);\n\
          }\n        super.encodeBegin(context);\n    }\n\npublic String getAccept()\
  \ {\n        return (String) getStateHelper().eval(\"accept\");\n    }\n\npublic\
  \ void setAccept(String accept) {\n        getStateHelper().put(\"accept\", accept);\n\
      }\n}\n```\n\n请注意，`accept` 属性没有对应的属性。任何公共组件属性都必须由一个 getter/setter 对来表示，该对进一步委托给\
  \ `UIComponent#getStateHelper()`。基本上，你必须将所有视图范围的组件属性委托给 `StateHelper`。这将反过来确保正确的增量最终进入\
  \ JSF 视图状态。这当然是可选的，但不这样做将导致组件实例无法通过编程方式进行操作。在前一个 HTTP 请求期间执行的任何更改都会在随后的 HTTP 回发请求中丢失，原因很简单：`UIComponent`\
  \ 实例是从头开始重新创建的。\n\n还要注意，新的 `accept` 属性只是在 `encodeBegin()` 方法中作为透传属性添加，然后才委托给执行实际渲染工作的父类方法。这消除了为渲染新属性这一特定目的而创建整个自定义渲染器的需要。现在让我们测试一下。\n\
  \n```\n< ... xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n    xmlns:my=\"http://xmlns.jcp.org/jsf/component\"\
  >\n    ...\n    <h:form enctype=\"multipart/form-data\">\n        <my:inputFile\
  \ id=\"photo\" value=\"#{editProfile.photo}\"\n            accept=\"image/*\" required=\"\
  true\">\n            <f:ajax listener=\"#{editProfile.upload}\" render=\"photo_m\"\
  \ />\n        </my:inputFile>\n        <h:message id=\"photo_m\" for=\"photo\" />\n\
      </h:form>\n```\n\n为了完整起见，以下是后台 bean 的样子。\n\n```\n@Named @RequestScoped\npublic\
  \ class EditProfile {\n\nprivate Part photo;\n\npublic void upload() {\n        String\
  \ fileName = photo.getSubmittedFileName();\n        String fileType = photo.getContentType();\n\
          long fileSize = photo.getSize();\n\nSystem.out.println(\"File name: \" +\
  \ fileName);\n        System.out.println(\"File type: \" + fileType);\n        System.out.println(\"\
  File size: \" + fileSize);\n    }\n\n// 添加/生成 getter 和 setter。\n}\n```\n\n现在，我们基本上创建了等同于\
  \ `<h:inputFile>` 并带有透传 `accept` 属性的 `UIComponent`。下一步是实现服务器端验证，检查上传文件的媒体类型是否与指定的\
  \ `accept` 属性匹配。为此，我们希望在我们的 `InputFile` 类中重写 `UIInput#validateValue()`，如下所示。这将在处理验证阶段（第三阶段）运行。\n\
  \n```\n@Override\nprotected void validateValue(FacesContext context, Object newValue)\
  \ {\n    String accept = getAccept();\n\nif (accept != null && newValue instanceof\
  \ Part) {\n        Part part = (Part) newValue;\n        String contentType = context.getExternalContext()\n\
              .getMimeType(part.getSubmittedFileName());\n        String acceptPattern\
  \ = accept.trim()\n            .replace(\"*\", \".*\").replaceAll(\"\\\\s*,\\\\\
  s*\", \"|\");\n\nif (contentType == null || !contentType.matches(acceptPattern))\
  \ {\n            String message = \"不可接受的文件类型\";\n            context.addMessage(getClientId(context),\
  \ new FacesMessage(\n                FacesMessage.SEVERITY_ERROR, message, null));\n\
              setValid(false);\n        }\n    }\n\nif (isValid()) {\n        super.validateValue(context,\
  \ newValue);\n    }\n}\n```\n\n如你所见，它基本上会检查是否指定了 `accept` 属性以及是否有提交的文件，如果是，则将 `accept`\
  \ 属性转换为正则表达式模式，并将提交文件的内容类型与之匹配。`accept` 属性表示一个以逗号分隔的 IANA 媒体类型字符串，其中星号用作通配符，逗号用作析取运算符。例如，`accept`\
  \ 值为 `\"image/*,application/pdf\"` 会这样转换为正则表达式 `\"image/.*|application/pdf\"`。如果不匹配，它将向\
  \ faces 上下文添加一条与该组件关联的 faces 消息，并通过调用 `UIInput#setValid(false)` 将组件标记为无效。最后，如果组件有效，它将继续向父类进行验证调用。\n\
  \n另外还有一点需要提及：内容类型不是从 `Part#getContentType()` 获取的，而是基于提交的文件名从 `ExternalContext#getMimeType()`\
  \ 获取的。这只是为了覆盖客户端不发送内容类型，或者发送了服务器无法理解的内容类型这种边界情况。`ExternalContext#getMimeType()`\
  \ 基本上是从 `web.xml` 中的 `<mime-mapping>` 条目获取已知内容类型的列表。服务器本身有一些默认值，你可以在 Web 应用程序自己的\
  \ `web.xml` 中覆盖或扩展它们。\n\n\n\n现在，文件的 content type 属性在客户端进行过滤，并在服务器端进行验证。这固然很好，但这当然只是基于文件名验证文件的\
  \ content type，而不是文件的实际内容。想象一下，有人创建了一个 ZIP 文件，然后简单地将文件扩展名重命名为图像文件，甚至是一个带有恶意软件的可执行文件。它仍然会通过客户端和服务器端的文件类型验证。坦率地说，这个责任不在于组件本身，而在于你，JSF\
  \ 开发者。正确的解决方案是创建一个自定义验证器并将其附加到组件上。以下是一个图像文件验证器的示例，它借助了能够解析图像文件的 Java2D API。如果它抛出异常或返回\
  \ null，那么它肯定不是图像文件。\n\n```\n@FacesValidator(\"project.ImageFileValidator\")\npublic\
  \ class ImageFileValidator implements Validator<Part> {\n\n@Override\n    public\
  \ void validate\n        (FacesContext context, UIComponent component, Part value)\n\
              throws ValidatorException\n    {\n        if (value == null) {\n            return;\
  \ // 让 @NotNull 或 required=\"true\" 处理。\n        }\n\ntry {\n            ImageIO.read(value.getInputStream()).toString();\n\
          }\n        catch (Exception e) {\n            String message = \"Not an\
  \ image file\";\n            throw new ValidatorException(new FacesMessage(message),\
  \ e);\n        }\n    }\n}\n```\n\n为了使其运行，将其声明为组件标签的 validator 属性。\n\n```\n<my:inputFile\
  \ ... validator=\"project.ImageFileValidator\" />\n```\n\n它运行得很好。现在，当验证也通过时，将调用后端\
  \ bean 的动作方法，你可以在其中将上传的文件保存到所需位置。这可以按如下方式实现：\n\n```\npublic void upload() {\n    Path\
  \ folder = Paths.get(\"/path/to/uploads\");\n    String fileName = Paths.get(photo.getSubmittedFileName())\n\
          .getFileName().toString();\n    int indexOfLastDot = fileName.lastIndexOf('.');\n\
      String name = fileName.substring(0, indexOfLastDot);\n    String extension =\
  \ fileName.substring(indexOfLastDot);\n    FacesMessage message = new FacesMessage();\n\
  \ntry (InputStream contents = photo.getInputStream()) {\n        Path file = Files.createTempFile(folder,\
  \ name + \"-\", extension);\n        Files.copy(contents, file, StandardCopyOption.REPLACE_EXISTING);\n\
          message.setSummary(\"Uploaded file successfully saved.\");\n    }\n    catch\
  \ (IOException e) {\n        message.setSummary(\"Could not save uploaded file,\
  \ try again.\");\n        message.setSeverity(FacesMessage.SEVERITY_ERROR);\n        e.printStackTrace();\n\
      }\n\nFacesContext.getCurrentInstance().addMessage(null, message);\n}\n```\n\n\
  你可能会疑惑为什么它似乎将上传的文件保存为临时文件。实际上并非如此。我们只是利用 `Files#createTempFile()` 工具来保证保存文件文件名的唯一性。它会在文件名和文件扩展名之间自动包含一个唯一的随机字符串。否则，当多人上传恰好同名的不同文件时，他们可能会相互覆盖，从而导致信息丢失。\n\
  \n## 扩展现有渲染器\n\n假设有一个现有的渲染器存在逻辑错误或缺陷，你想通过扩展它而不是从头重写来快速修补它。不幸的是，这听起来比实际要容易得多。也就是说，标准的渲染器实现不是标准\
  \ JSF API 的一部分，这与 `javax.faces.component.html` 包中可用的标准 HTML 组件实现相反。实际的标准 HTML 渲染器实现由\
  \ JSF 实现本身提供。Mojarra 将它们放在 `com.sun.faces.renderkit.html_basic` 包中，而 MyFaces 将它们放在\
  \ `org.apache.myfaces.renderkit.html` 包中。\n\n这些标准 HTML 渲染器的另一个问题是代码的抽象性相对较差。基本上，所有这些标准\
  \ HTML 渲染器都没有抽象出那些仅用于发出 HTML 标记的代码片段，使其与逻辑完全分离。换句话说，当你需要修复某些逻辑时，你几乎总是还必须编写或复制/粘贴所有负责发出\
  \ HTML 的代码。\n\n一个常见的现实世界示例是希望让 `<h:message>` 或 `<h:messages>` 以未转义的方式渲染 faces 消息，这样你就可以在\
  \ faces 消息中嵌入一些 HTML 代码，通常是提供一个指向所需目标页面的链接（例如，“未知用户，也许你想<a href=\"login\">登录</a>？”）。标准的\
  \ `<h:message>` 组件不支持这种功能，并且 HTML 转义由其渲染器控制，而渲染器又依赖于 JSF 实现。这种 JSF 内置的 HTML 转义随处可见，并且当你即将在网页中嵌入用户控制的数据时，它是防止可能的\
  \ XSS 攻击漏洞的非常重要的屏障。有一些组件具有显式属性来关闭此 HTML 转义，例如带有 `escape` 属性的 `<h:outputText>`、带有\
  \ `itemEscaped` 属性的 `<f:selectItem>` 以及带有 `itemLabelEscaped` 属性的 `<f:selectItems>`。然而，`<h:message>`\
  \ 和 `<h:messages>` 中缺少这样的属性。另请参阅 JSF 规范问题 634。⁹ 也许它会在 JSF.next 中添加，但目前你无法绕过第三方组件库或扩展现有的标准\
  \ HTML 渲染器。\n\n我们将以此为例，为 `<h:message>` 扩展现有的标准 HTML 渲染器。第一步是查看 `<h:message>` 组件当前具体使用哪个渲染器。在表\
  \ 11-1 中，你将看到此组件由 `HtmlMessage` 类支持。当前使用的渲染器实现可以通过编程方式确定，如下所示：\n\n```\nString componentFamily\
  \ = HtmlMessage.COMPONENT_FAMILY;\nString rendererType = new HtmlMessage().getRendererType();\n\
  Renderer renderer = FacesContext.getCurrentInstance().getRenderKit()\n    .getRenderer(componentFamily,\
  \ rendererType);\nSystem.out.println(renderer.getClass());\n```\n\n如果你使用 Mojarra\
  \ 作为 JSF 实现，它将打印如下内容：\n\n```\nclass com.sun.faces.renderkit.html_basic.MessageRenderer\n\
  ```\n\n这正好是我们想要扩展的渲染器类。Mojarra 是开源的，其源代码目前可在 [`github.com/javaserverfaces/mojarra`](https://github.com/javaserverfaces/mojarra)\
  \ 获取。一旦你掌握了 `MessageRenderer` 的源代码，下一步就是找出 `FacesMessage` 的摘要和详细信息具体在哪里渲染，以及我们如何用最少的代码覆盖它。我们可以在源代码中看到，这发生在\
  \ `encodeEnd()` 方法中，在当前 Mojarra 2.3.3 版本中，该方法已经有 182 行代码。它使用 `ResponseWriter#writeText()`\
  \ ¹⁰ 来渲染摘要和详细信息。我们希望将其替换为 `ResponseWriter#write()`，这样它就不会执行任何转义。\n\n\n\n我们当然可以扩展该类，复制/粘贴\
  \ `encodeEnd()` 方法中全部 182 行代码，并像下面这样调整 `writeText()` 对摘要和详情变量的调用：\n\n```\nObject\
  \ escape = component.getAttributes().get(\"escape\");\n\nif (escape == null || Boolean.parseBoolean(escape.toString()))\
  \ {\n    writer.writeText(summary, component, null);\n}\nelse {\n    writer.write(summary);\n\
  }\n```\n\n然而，这种做法并不优雅。如果我们能在 `encodeEnd()` 方法中捕获所有 `writeText()` 调用，并透明地委托给 `write()`\
  \ 方法，那会好得多。你可以通过包装 `ResponseWriter`，将其设置到 faces 上下文中，并传递给父类来实现这一点。JSF API 中几乎每个公开的构件都有对应的\
  \ `XxxWrapper` 类。你可以在 `javax.faces.FacesWrapper` Javadoc 的“所有已知实现类”部分找到它们。¹¹ 所有这些包装类使得\
  \ JSF 非常易于定制和扩展。它们都有一个接受待包装类的构造函数，你基本上只需要选择要装饰的一个或多个方法即可。\n\n总而言之，下面展示了如何扩展 `MessageRenderer`，以将\
  \ `encodeEnd()` 方法期间的所有 `writeText()` 调用委托给 `write()`。\n\n```\npublic class EscapableMessageRenderer\
  \ extends MessageRenderer {\n\n@Override\n    public void encodeEnd\n        (FacesContext\
  \ context, UIComponent component)\n            throws IOException\n    {\n        ResponseWriter\
  \ writer = context.getResponseWriter();\n\ntry {\n            context.setResponseWriter(new\
  \ ResponseWriterWrapper(writer) {\n                @Override\n                public\
  \ void writeText\n                    (Object text, UIComponent component, String\
  \ property)\n                        throws IOException\n                {\n                    String\
  \ string = text.toString();\n                    Object escape = component.getAttributes()\n\
                          .get(\"escape\");\n                    if (escape == null\n\
                          || Boolean.parseBoolean(escape.toString()))\n                    {\n\
                          super.writeText(string, component, property);\n                    }\n\
                      else {\n                        super.write(string);\n                    }\n\
                  }\n            });\n\nsuper.encodeEnd(context, component);\n        }\n\
          finally {\n            context.setResponseWriter(writer);\n        }\n    }\n\
  }\n```\n\n请注意，在使用了包装后的响应写入器的 try 块的 finally 中恢复原始响应写入器非常重要。为了使其运行，请在 `faces-config.xml`\
  \ 中按如下方式注册，关联到 `<h:message>` 组件的组件族和渲染器类型：\n\n```\n<render-kit>\n    <renderer>\n\
          <component-family>javax.faces.Message</component-family>\n        <renderer-type>javax.faces.Message</renderer-type>\n\
          <renderer-class>\n            com.example.project.renderer.EscapableMessageRenderer\n\
          </renderer-class>\n    </renderer>\n</render-kit>\n```\n\n不，你不能为此使用 `@FacesRenderer`\
  \ 注解。在扩展现有渲染器时，这不起作用。原始渲染器本身已经在某个 XML 文件中注册到了完全相同的组件族和渲染器类型上。而且你知道，当同时发现基于 XML 的配置和基于注解的配置时，前者总是具有更高的优先级。\n\
  \n现在，你只需将现有 `<h:message>` 组件的 `escape` 属性设置为 `false`，即可让扩展后的渲染器执行其工作。\n\n```\n<h:message\
  \ ... escape=\"false\" />\n```\n\n请注意，不要在显示在此处的任何 faces 消息中嵌入用户控制的输入，否则你将打开一个潜在的\
  \ XSS 攻击漏洞。\n\n## 自定义标签处理器\n\n在第 3 章中，你了解了视图构建时间和视图渲染时间之间的区别，以及诸如 JSTL 之类的标签处理器在构建\
  \ JSF 组件树时运行，而 JSF 组件在处理 HTTP 请求和响应的 JSF 生命周期中运行。不仅 JSF 组件可以定制，标签处理器也可以。当你想控制 JSF\
  \ 组件树的构建而不是处理 HTTP 请求和响应时，这尤其有用。\n\n`<f:viewParam>` 在主从页面中很有用。从主页面，你可以链接到以实体 ID\
  \ 作为参数的详情页面。在详情页面，你可以通过 `<f:viewParam>` 按 ID 加载实体。具体如下：\n\n```\n<f:metadata>\n    <f:viewParam\
  \ name=\"id\" value=\"#{editItem.item}\"\n        converter=\"project.ItemConverter\"\
  \ converterMessage=\"未知项目\"\n        required=\"true\" requiredMessage=\"错误请求\"\
  >\n    </f:viewParam>\n</f:metadata>\n```\n\n当转换或验证失败时，一条 faces 消息将被添加到当前页面的 faces\
  \ 上下文中。然而，更多时候你只想直接将用户重定向回主页面。使用 `<f:event>` 处理 `PostValidateEvent` 来实现这一点相对简单。不，`<f:viewAction>`\
  \ 不起作用，因为当存在转换或验证错误时，它首先就不会被调用。\n\n```\n<f:metadata>\n    ...\n    <f:event type=\"\
  postValidate\" listener=\"#{editItem.onload()}\" />\n</f:metadata>\n```\n\n其中 `onload()`\
  \ 方法如下所示：\n\n```\npublic void onload() throws IOException {\n    FacesContext context\
  \ = FacesContext.getCurrentInstance();\n    if (context.isValidationFailed()) {\n\
          ExternalContext ec = context.getExternalContext();\n        ec.redirect(ec.getRequestContextPath()\
  \ + \"/items.xhtml\");\n    }\n}\n```\n\n好吧，这可行，但当你拥有更多此类页面时，这会导致样板代码。理想情况下，你希望能够以声明方式在\
  \ `<f:viewParam>` 本身上注册一个事件监听器，如下所示，这样你就可以保持后端 bean 代码中不包含手动请求-响应处理逻辑。\n\n```\n\
  <f:metadata>\n    <f:viewParam ...>\n        <t:viewParamValidationFailed redirect=\"\
  /items.xhtml\" />\n    </f:viewParam>\n</f:metadata>\n```\n\n这可以通过一个标签处理器来实现，该处理器在由\
  \ `<f:viewParam>` 标签表示的 `UIViewParameter` 组件上注册一个新的系统事件监听器。标签处理器类必须扩展 `javax.faces.view.facelets.TagHandler`。\n\
  \n```\npublic class ViewParamValidationFailed extends TagHandler\n    implements\
  \ ComponentSystemEventListener\n{\n    private String redirect;\n\npublic ViewParamValidationFailed(TagConfig\
  \ config) {\n        super(config);\n        redirect = getRequiredAttribute(\"\
  redirect\").getValue();\n    }\n\n@Override\n    public void apply(FaceletContext\
  \ context, UIComponent parent)\n        throws IOException\n    {\n        if (parent\
  \ instanceof UIViewParameter\n            && !context.getFacesContext().isPostback())\n\
          {\n            parent.subscribeToEvent(PostValidateEvent.class, this);\n\
          }\n    }\n\n@Override\n    public void processEvent(ComponentSystemEvent\
  \ event)\n        throws AbortProcessingException\n    {\n        UIComponent parent\
  \ = event.getComponent();\n        parent.unsubscribeFromEvent(PostValidateEvent.class,\
  \ this);\n        FacesContext context = event.getFacesContext();\n\nif (context.isValidationFailed())\
  \ {\n            try {\n                ExternalContext ec = context.getExternalContext();\n\
                  ec.redirect(ec.getRequestContextPath() + redirect);\n            }\n\
              catch (IOException e) {\n                throw new AbortProcessingException(e);\n\
              }\n        }\n    }\n}\n```\n\n\n\n实际上，这也实现了 `javax.faces.event.ComponentSystemEventListener`。对于标签处理器来说，这并不是严格必需的；在这个特定示例中只是为了代码方便而这样做。重写的\
  \ `apply()` 方法用于 `TagHandler`，而重写的 `processEvent()` 方法用于 `ComponentSystemEventListener`。在\
  \ `apply()` 方法中，我们有机会在父组件被添加到组件树之前，以编程方式对其进行操作。\n\n我们可以通过调用 `UIComponent#subscribeToEvent()`\
  \ 来以编程方式实现与 `<f:event>` 相同的行为，传入感兴趣的组件系统事件类型和监听器实例。感兴趣的监听器实例恰好就是当前的标签处理器实例。当应用程序发布了感兴趣的组件系统事件时，监听器实例的\
  \ `processEvent()` 方法将被调用。\n\n我们在 `processEvent()` 中做的第一件事是取消订阅该监听器实例。这是有意为之，因为组件系统事件监听器被认为是有状态的，因此本质上会被保存在\
  \ JSF 视图状态中。观察这一点的一个简单方法是，重新配置 JSF，通过在 `web.xml` 中显式地将 `javax.faces.STATE_SAVING_METHOD`\
  \ 上下文参数设置为 `client`，将视图状态保存在客户端，然后检查任何 JSF 表单生成的 HTML 输出中 `javax.faces.ViewState`\
  \ 隐藏输入字段的大小。每次你添加 `<f:event>`，或者在 `ComponentSystemEventListener` 完成其工作后没有取消订阅它，JSF\
  \ 视图状态的大小都会随着监听器实例的序列化形式而增长。在这个监听器只应在非回发期间运行的特定用例中，这是不必要的；因此需要显式取消订阅。\n\n现在，为了让它运行起来，在\
  \ `/WEB-INF/example.taglib.xml` 中按如下方式注册它：\n\n```\n<tag>\n    <tag-name>viewParamValidationFailed</tag-name>\n\
      <handler-class>\n        com.example.project.taghandler.ViewParamValidationFailed\n\
      </handler-class>                                                    \n</tag>\n\
  ```\n\n## 打包成可分发的 JAR\n\n如果你开发了一堆可复用的组件、渲染器、标签处理器、标签文件、复合组件等等，并且希望将它们打包成一个 JAR 文件，以便包含在\
  \ Web 应用程序的 `/WEB-INF/lib` 目录中，那么你需要创建一个所谓的 Web 片段项目。基本上，所有面向 JSF 的组件和实用库，如 OmniFaces、PrimeFaces、OptimusFaces、BootsFaces、ButterFaces\
  \ 和 DeltaSpike，都是这样构建的。从 Maven 的角度来看，它只是一个 JAR 项目。关键是将通常放在 Maven WAR 项目的 `src/main/webapp`\
  \ 文件夹中的文件，放到 Maven JAR 项目的 `src/main/resources/META-INF/resources/[libraryName]`\
  \ 文件夹中。有一个主要的例外：所有通常放在 `src/main/webapp/WEB-INF` 中的部署描述符文件，例如 `web.xml`、`faces-config.xml`、`*.taglib.xml`\
  \ 和 `beans.xml`，都直接放在 `src/main/resources/META-INF` 文件夹中。另一个例外是，`web.xml` 文件需要被\
  \ `web-fragment.xml` 替代。\n\nresources 文件夹中的 `[libraryName]` 子文件夹代表“库名称”，它通常是项目名称的\
  \ URL 友好形式。例如，“omnifaces”、“primefaces”、“optimusfaces”、“bsf”、“butterfaces”等。这个库名称正好可以在资源组件（如\
  \ `<h:outputScript>`、`<h:outputStylesheet>` 和 `<h:graphicImage>`）的 `library` 属性中使用。下面是在\
  \ Eclipse 中，这样一个 Maven JAR 项目按照“Web 片段”规则组织后的样子。请特别注意 `src/main/resources` 文件夹的结构。当然，任何\
  \ Java 类都可以像往常一样放在 `src/main/java` 文件夹中。\n\n![A454457_1_En_11_Figa_HTML.jpg](img/A454457_1_En_11_Figa_HTML.jpg)\n\
  \n其中，`common.taglib.xml` 看起来如下所示，复合库名称设置为相对于 `src/main/resources/META-INF/resources`\
  \ 的路径，标签文件源设置为相对于 `*.taglib.xml` 文件本身位置的路径。\n\n```\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>\n<facelet-taglib\n    xmlns:=\"http://xmlns.jcp.org/xml/ns/javaee\"\n\
      xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n    xsi:schemaLocation=\"\
  http://xmlns.jcp.org/xml/ns/javaee\n        http://xmlns.jcp.org/xml/ns/javaee/web-facelettaglibrary_2_3.xsd\"\
  \n    version=\"2.3\"\n>\n    <namespace>http://example.com/common</namespace>\n\
      <short-name>common</short-name>\n    <composite-library-name>common/components</composite-library-name>\n\
  \n<tag>\n        <tag-name>someTag</tag-name>\n        <source>resources/common/tags/someTag.xhtml</source>\n\
      </tag>\n</facelet-taglib>\n```\n\n并且，`web-fragment.xml` 看起来如下所示，与 `web.xml`\
  \ 几乎相同，只是根元素不同，使用 `<web-fragment>` 而不是 `<web-app>`。\n\n```\n<?xml version=\"1.0\"\
  \ encoding=\"UTF-8\"?>\n<web-fragment\n    xmlns:=\"http://xmlns.jcp.org/xml/ns/javaee\"\
  \n    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n    xsi:schemaLocation=\"\
  http://xmlns.jcp.org/xml/ns/javaee\n        http://xmlns.jcp.org/xml/ns/javaee/web-fragment_4_0.xsd\"\
  \n    version=\"4.0\"\n>\n    <name>common</name>\n</web-fragment>\n```\n\n一旦这样的\
  \ Web 片段项目被构建为 JAR 文件并包含在主 Web 应用程序项目的 `/WEB-INF/lib` 中，那么该 JAR 中的资源就可以通过库名称“common”在主\
  \ Web 应用程序项目的 Facelets 文件中使用，如下所示：\n\n```\n<ui:composition template=\"/common/templates/some.xhtml\"\
  \n    xmlns:=\"http://www.w3.org/1999/xhtml\"\n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\
  \n    xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\n    xmlns:common=\"http://example.com/common\"\
  \n>\n    <ui:define name=\"content\">\n        <common:someComposite />\n        <h:graphicImage\
  \ library=\"common\" name=\"js/some.svg\" />\n        <ui:include src=\"/common/includes/some.xhtml\"\
  \ />\n        <h:outputScript library=\"common\" name=\"scripts/some.js\" />\n        <h:outputStylesheet\
  \ library=\"common\" name=\"styles/some.css\" />\n        <common:someTag />\n    </ui:define>\
  \                                                    \n</ui:composition>\n```\n\n\
  ## 资源依赖\n\n在某些情况下，你的自定义组件或渲染器可能依赖于特定的 JavaScript 或样式表资源，而你希望避免最终用户通过 `<h:outputScript>`\
  \ 或 `<h:outputStylesheet>` 手动包含它。在这种情况下，你可能会发现 `@javax.faces.application.ResourceDependency`\
  \ 注解¹² 很有用。假设你想自动将 `common:scripts/some.js` 和 `common:styles/some.css` 与某个特定的自定义组件一起包含进来；那么你可以这样做：\n\
  \n```\n@ResourceDependency(library=\"common\", name=\"some.css\", target=\"head\"\
  )\n@ResourceDependency(library=\"common\", name=\"some.js\", target=\"head\")\n\
  public class SomeCustomComponent extends UIComponent {\n    // ...\n}\n```\n\n当然，你也可以在必要时包含\
  \ JSF 自己的 `javax.faces:jsf.js`，例如，当你的自定义组件恰好依赖于 `jsf.ajax.request()` 或标准 JSF JavaScript\
  \ API 提供的其他函数时。`javax.faces:jsf.js` 可以按如下方式包含，脚本库和名称作为 `ResourceHandler` 的常量可用。\n\
  \n```\n@ResourceDependency(\n    library=ResourceHandler.JSF_SCRIPT_LIBRARY_NAME,\n\
      name=ResourceHandler.JSF_SCRIPT_RESOURCE_NAME,\n    target=\"head\")\npublic\
  \ class SomeCustomComponent extends UIComponent {\n    // ...\n}\n```\n\n\n\n# 脚注\n\
