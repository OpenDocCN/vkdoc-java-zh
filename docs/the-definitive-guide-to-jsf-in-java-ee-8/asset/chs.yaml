  \ .\n\n4 [`javaee.github.io/javaee-spec/javadocs/javax/faces/component/UIData.html#getValue--`](https://javaee.github.io/javaee-spec/javadocs/javax/faces/component/UIData.html%23getValue%2D%2D)\
  \ .\n\n5 [`developer.mozilla.org/en-US/docs/Web/HTML/Element/input/file`](https://developer.mozilla.org/en-US/docs/Web/HTML/Element/input/file)\
  \ .\n\n6 [`javaserverfaces.github.io/docs/2.3/vdldocs/facelets/h/inputFile.html`](https://javaserverfaces.github.io/docs/2.3/vdldocs/facelets/h/inputFile.html)\
  \ .\n\n7 [www.iana.org/assignments/media-types/media-types.xhtml](http://www.iana.org/assignments/media-types/media-types.xhtml)\
  \ .\n\n8 [`caniuse.com/#feat=input-file-accept`](https://caniuse.com/%23feat%3Dinput-file-accept)\
  \ .\n\n9 [`github.com/javaee/javaserverfaces-spec/issues/634`](https://github.com/javaee/javaserverfaces-spec/issues/634)\
  \ .\n\n10 [`javaee.github.io/javaee-spec/javadocs/javax/faces/context/ResponseWriter.html#writeText-java.lang.Object-javax.faces.component.UIComponent-java.lang.String-`](https://javaee.github.io/javaee-spec/javadocs/javax/faces/context/ResponseWriter.html%23writeText-java.lang.Object-javax.faces.component.UIComponent-java.lang.String-)\
  \ .\n\n11 [`javaee.github.io/javaee-spec/javadocs/javax/faces/FacesWrapper.html`](https://javaee.github.io/javaee-spec/javadocs/javax/faces/FacesWrapper.html)\
  \ .\n\n12 [`javaee.github.io/javaee-spec/javadocs/javax/faces/application/ResourceDependency.html`](https://javaee.github.io/javaee-spec/javadocs/javax/faces/application/ResourceDependency.html)\
  \ .\n\n© Bauke Scholtz, Arjan Tijms 2018\n\nBauke Scholtz 与 Arjan Tijms，《Java EE\
  \ 8 中 JSF 权威指南》，`doi.org/10.1007/978-1-4842-3387-0_12`\n\n# 12. 搜索表达式\n\nBauke Scholtz^(1 )\
  \ 与 Arjan Tijms²\n\n(1) 库拉索岛威廉斯塔德\n\n(2) 荷兰北荷兰省阿姆斯特丹\n\n正如第 3 章“Ajax 生命周期”和第 4 章“Ajax\
  \ 化组件”所述，`<f:ajax>` 标签的 `execute` 和 `render` 属性接受一组以空格分隔的所谓**组件搜索表达式**。\n\n搜索表达式自\
  \ JSF（JavaServer Faces）诞生之初就一直存在，因为它被用于 `<h:outputLabel>`、`<h:message>` 和 `<h:messages>`\
  \ 的 `for` 属性中。但直到 JSF 2.0 引入 `<f:ajax>` 后，它们才成为 JSF 开发者必须掌握的核心知识。这是因为，标签和消息在绝大多数情况下已经与目标输入组件位于同一个命名容器父组件中，因此在\
  \ `for` 属性中直接指定目标输入组件的 ID 就已足够。但对于 `<f:ajax>` 的 `execute` 和 `render` 属性而言，情况未必如此，因为目标组件可能位于不同的命名容器上下文中，甚至位于物理上不同的\
  \ Facelets 文件中。\n\n为了克服这些困难，JSF 2.0 引入了几个更抽象的搜索表达式：`\"@this\"`、`\"@form\"`、`\"@all\"\
  ` 和 `\"@none\"`。像 `\"@form\"` 这样的表达式特别易于使用，因为它仅表示“以当前表单为目标”。如果该当前表单是在引用它的页面之上两个父模板中定义的，那么这确实使引用它变得容易得多。\n\
  \n尽管这些关键字让事情变得简单了许多，但它们的功能相当有限。不仅只有四个关键字，而且它们不可扩展，并且默认的 JSF 组件集仅在 `<f:ajax>` 标签内部使用它们。在其他组件（甚至\
  \ JSF 自带的 `<h:outputLabel>`、`<h:message>` 和 `<h:messages>`）中使用它们，以及以编程方式使用它们，都被忽略了。因此，在\
  \ JSF 2.3 中，最后时刻引入了一个“组件搜索表达式框架”，极大地扩展了这四个关键字。它主要基于 PrimeFaces 中一个经过验证的 API（应用程序编程接口）。¹\n\
  \n## 相对本地 ID\n\n这是组件搜索表达式的最简单形式。最常见的用例出现在 `<h:outputLabel>`、`<h:message>` 和 `<h:messages>`\
  \ 组件的 `for` 属性中。它仅引用目标 `UIInput` 组件的唯一 ID。\n\n```\n<h:outputLabel for=\"email\"\
  \ value=\"电子邮件地址\" />\n<h:inputText id=\"email\" value=\"#{login.email}\" required=\"\
  true\" />\n<h:message for=\"email\" />\n```\n\n这仅要求目标组件也位于同一个命名容器父组件内。命名容器父组件是实现了\
  \ `NamingContainer` 接口的组件。² 在标准 JSF 中，只有 `<h:form>`、`<h:dataTable>`、`<ui:repeat>`\
  \ 和 `<f:subview>` 是 `NamingContainer` 的实例。所有复合组件也都是 `NamingContainer` 的实例，但标签文件不是。\n\
  \n如果你需要从 `<h:outputLabel>` 引用命名容器内的特定 `UIInput` 组件，那么你需要将所谓的命名容器分隔符字符附加到命名容器组件的\
  \ ID 之后，然后再附加目标 `UIInput` 组件的 ID。默认的命名容器分隔符字符是冒号“:”。当前配置的分隔符字符可以通过 `UINamingContainer#getSeparatorCharacter()`\
  \ 以编程方式获取。³\n\n```\nchar separatorCharacter = UINamingContainer\n    .getSeparatorCharacter(FacesContext.getCurrentInstance);\n\
  ```\n\n这可以通过 `web.xml` 中的 `javax.faces.SEPARATOR_CHAR` 上下文参数进行配置。\n\n```\n<context-param>\n\
      <param-name>javax.faces.SEPARATOR_CHAR</param-name>\n    <param-value>-</param-value>\n\
  </context-param>\n```\n\n\n\n###### 警告\n\n**不**建议将其更改为其他字符，例如连字符“-”或下划线“_”。⁴\n\n\
  从长远来看，这样做会造成混淆且脆弱，因为这些字符在 ID 属性本身中也是允许的。JSF 不会根据当前配置的命名容器分隔符字符来验证组件 ID，因此它很容易被忽略，并在搜索表达式中引用此类组件时引发问题。\n\
  \n回到从 `<h:outputLabel>` 引用命名容器内特定 `UIInput` 组件的问题，在示例复合组件 `<t:inputLocalTime>`（如第\
  \ 7 章“复合组件”一节所示）中，小时下拉组件的 ID 为“hour”。因此，对于 `<h:outputLabel>`，当使用默认的命名容器分隔符时，复合组件内小时下拉菜单的相对本地\
  \ ID 是“time:hour”。\n\n```\n<h:outputLabel id=\"l_time\" for=\"time:hour\" value=\"\
  Time\" />\n<t:inputLocalTime id=\"time\" value=\"#{schedule.time}\" required=\"\
  true\" />\n<h:message id=\"m_time\" for=\"time\" />\n```\n\n请注意，这对于 `<h:message>`\
  \ 并非必需，因为 faces 消息在底层已经使用复合组件本身的客户端 ID 添加到 faces 上下文中。\n\n使用相对本地 ID 在 `<h:dataTable>`\
  \ 的 `<h:column>` 上下文中也同样有效。它会在当前迭代行的上下文中进行解析，即使目标组件位于另一列中。以下示例说明了这一点：\n\n```\n<h:dataTable\
  \ id=\"users\" value=\"#{admin.users}\" var=\"user\">\n    ...\n    <h:column>\n\
          <f:facet name=\"header\">Country</f:facet>\n        <h:selectOneMenu id=\"\
  country\" value=\"#{user.address.country}\">\n            <f:selectItems value=\"\
  #{data.countries}\" />\n            <f:ajax render=\"city\" />\n        </h:selectOneMenu>\n\
      </h:column>\n    <h:column>\n        <f:facet name=\"header\">City</f:facet>\n\
          <h:selectOneMenu id=\"city\" value=\"#{user.address.city}\">\n            <f:selectItems\
  \ value=\"#{user.address.country.cities}\" />\n        </h:selectOneMenu>\n    </h:column>\n\
      ...\n</h:dataTable>\n```\n\n在底层，相对本地 ID 是使用 `UIComponent#findComponent()` API\
  \ 中描述的算法来解析的。⁵ 这意味着你也可以通过编程方式解析它们。你只需确保 `findComponent()` 方法是在正确的基组件上调用，而不是在例如 `UIViewRoot`\
  \ 上调用。\n\n## 绝对分层 ID\n\n如果目标组件与当前组件不在同一个命名容器父级中，那么你需要使用绝对分层 ID 而不是本地相对 ID。关键区别在于，绝对分层\
  \ ID 以命名容器分隔符字符开头。然后它会从 `UIViewRoot` 开始搜索目标组件。这种结构通常用在 `<f:ajax>` 的 `render` 属性中，当它需要引用一个不在同一表单内的组件时。\n\
  \n```\n<h:form id=\"search\">\n    ...\n    <h:commandButton id=\"submit\" ...>\n\
          <f:ajax execute=\"@form\" render=\":results\" />\n    </h:commandButton>\n\
  </h:form>\n<h:panelGroup id=\"results\" layout=\"block\">\n    ...\n</h:panelGroup>\n\
  ```\n\n一个不太常见的需要使用绝对分层 ID 的用例是，当你需要引用一个嵌套在另一个命名容器中的组件时——例如，当你想在复合组件内部的 `<cc:clientBehavior>`\
  \ 事件期间更新与复合组件关联的 `<h:message>`。\n\n```\n<h:form id=\"form\">\n    <h:outputLabel\
  \ id=\"l_time\" for=\"time:hour\" value=\"Time\" />\n    <t:inputLocalTime id=\"\
  time\" value=\"#{schedule.time}\" required=\"true\">\n        <f:ajax render=\"\
  :form:m_time\" />\n    <h:message id=\"m_time\" for=\"time\" />\n</h:form>\n```\n\
  \n你可以认为这是 JSF 规范中的一个错误或疏忽。这确实如此，应该在 JSF 的下一个版本中加以解决。另一个不太常见的用例是，当你需要更新迭代组件（如 `<h:dataTable>`\
  \ 和 `<ui:repeat>`）的特定迭代轮次时。\n\n```\n<h:form id=\"form\">\n    <h:dataTable id=\"\
  table\" value=\"#{bean.items}\" var=\"item\">\n        <h:column>\n            <h:panelGroup\
  \ id=\"column1\" layout=\"block\">\n                ...\n            </h:panelGroup>\n\
          </h:column>\n        <h:column>\n            <h:panelGroup id=\"column2\"\
  \ layout=\"block\">\n                ...\n            </h:panelGroup>\n        </h:column>\n\
      </h:dataTable>\n    <h:commandButton value=\"Update second row\">\n        <f:ajax\
  \ render=\":form:table:1:column1\n                        :form:table:1:column2\"\
  >\n        </f:ajax>\n    </h:commandButton>\n</h:form>\n```\n\n请注意，迭代索引是从零开始的，与普通的\
  \ Java 集合和数组一样。还要注意，你基本上需要将单元格的内容包装在另一个组件中，以便正确引用单元格的内容，并且你需要显式指定每一列才能更新整行，如上所示。更新整个列也是可能的，但不太方便，因为你基本上需要为每一行指定搜索表达式。幸运的是，`render`\
  \ 属性可以接受 EL（表达式语言）表达式，并且 EL 流 API 可用于根据表中的项目数量，以 `:form:table:[i]:column` 格式连接一组字符串。\n\
  \n```\n<h:commandButton value=\"Update second column\">\n    <f:ajax render=\"#{bean.items.stream()\n\
          .map(i -> ' :form:list:' += bean.items.indexOf(i) += ':column2')\n        .reduce((l,\
  \ r) -> (l += r)).get()}\">\n    </f:ajax>\n</h:commandButton>\n```\n\n诚然，这不是最优雅的方法。你最好委托给应用程序作用域\
  \ bean 中的自定义函数。它可能看起来像下面这样：\n\n```\n<h:commandButton value=\"Update second column\"\
  >\n    <f:ajax\n        render=\"#{ajax.columnIds(bean.items, ':form:table::column2')}\"\
  \n    </f:ajax>\n</h:commandButton>\n```\n\n其中 `#{ajax}` 应用程序作用域 bean 看起来像下面这样：\n\
  \n```\n@Named @ApplicationScoped\npublic class Ajax {\n\npublic String columnIds(List<?>\
  \ list, String idTemplate) {\n        return IntStream.range(0, list.size()).boxed()\n\
              .map(i -> idTemplate.replace(\"::\", \":\" + i + \":\"))\n            .collect(Collectors.joining(\"\
  \ \"));\n    }\n}\n```\n\n\n\n这已经算是不错的做法了，但仍有模板化的痕迹。如有必要，你还可以通过编程方式从后端 bean 添加 Ajax\
  \ 渲染 ID。为此，你可以使用 `PartialViewContext#getRenderIds()` ⁶。返回的集合是可变的，并且仅在渲染响应阶段（第六阶段）被使用。你还需要在此处指定一个绝对层级\
  \ ID，但有一个重要的区别：它不能以命名容器分隔符字符开头。换句话说，`:form:table:0:column2` 是行不通的；你需要指定 `form:table:0:column2`。它始终相对于\
  \ `UIViewRoot` 进行解析。\n\n```\nFacesContext context = FacesContext.getCurrentInstance();\n\
  PartialViewContext ajaxContext = context.getPartialViewContext();\najaxContext.getRenderIds().add(\"\
  form:table:0:column2\");\n```\n\n作为提示，如果你难以确定绝对层级 ID 或记住哪些组件是命名容器，那么你始终可以查看生成的 HTML\
  \ 输出。在你常用的浏览器中打开 JSF 页面，执行*查看页面源代码*，找到目标 JSF 组件对应的 HTML 元素，获取其 `ID` 属性的值，最后在其前面加上命名容器分隔符字符。\n\
  \n另外，如果你遇到以 `j_id` 为前缀的自动生成 ID，那么你绝对需要为相关的 JSF 组件指定一个固定的 ID；否则，当该组件在组件树中的位置可能因条件变化（例如，在目标组件位置之前有条件包含的组件）而改变时，其值就会出错。（另请参阅第\
  \ 4 章的“基于文本的输入组件”一节。）\n\n与相对本地 ID 类似，绝对层级 ID 可以使用 `UIComponent#findComponent()`\
  \ API 中描述的算法通过编程方式解析。⁷ 以下示例演示了如何获取代表 `<h:form id=\"form\"><h:dataTable id=\"table\"\
  >` 的 `UIData` 组件。\n\n```\nUIViewRoot root = FacesContext.getCurrentInstance().getViewRoot();\n\
  UIData table = (UIData) root.findComponent(\"form:table\");\n```\n\n## 标准搜索关键字\n\
  \nJSF 提供了一组更抽象的搜索表达式，称为“搜索关键字”。它们都以 `@` 字符开头。它们可用于在搜索表达式中替代固定的组件 ID。表 12-1 提供了它们的概述。\n\
  \n###### 表 12-1 JSF 提供的标准搜索关键字\n\n| 关键字 | 解析目标 | 起始版本 |\n| --- | --- | --- |\n|\
  \ @this | UIComponent#getCurrentComponent() | 2.0 |\n| @form | UIComponent#getNamingContainer()\
  \ 直到遇到 UIForm | 2.0 |\n| @all | 所有组件 | 2.0 |\n| @none | 无 | 2.0 |\n| @parent | UIComponent#getParent()\
  \ | 2.3 |\n| @child(index) | 给定索引处的 UIComponent#getChildren() | 2.3 |\n| @next |\
  \ UIComponent#getParent() 然后下一个索引处的 UIComponent#getChildren() | 2.3 |\n| @previous\
  \ | UIComponent#getParent() 然后上一个索引处的 UIComponent#getChildren() | 2.3 |\n| @namingcontainer\
  \ | UIComponent#getNamingContainer() | 2.3 |\n| @composite | UIComponent#getCompositeComponentParent()\
  \ | 2.3 |\n| @id(id) | 使用给定 ID 的 UIComponent#findComponent() | 2.3 |\n| @root |\
  \ FacesContext#getViewRoot() | 2.3 |\n\n在标准 JSF 组件集中，所有搜索关键字（包括自定义关键字）都可以用于以下组件属性：\n\
  \n*   `<f:ajax execute>` — 指定在 Ajax 回发请求的应用请求值、处理验证、更新模型值和调用应用阶段（第二、三、四、五阶段）期间必须处理的组件。默认为\
  \ `@this`。\n\n*   `<f:ajax render>` — 指定在 Ajax 回发请求的渲染响应阶段（第六阶段）期间必须处理的组件。默认为 `@none`。\n\
  \n*   `<h:outputLabel for>` — 指定生成的 HTML `<label>` 元素的目标组件。默认为 `@none`。\n\n*   `<h:message\
  \ for>` — 指定必须为其渲染第一个 faces 消息的目标组件。默认为 `@none`。\n\n*   `<h:messages for>` — 指定必须为其渲染所有\
  \ faces 消息的目标组件。默认为 `@none`。\n\n请注意，对于 `<h:outputLabel>`、`<h:message>` 和 `<h:messages>`\
  \ 的 `for` 属性，使用搜索关键字仅在 JSF 2.3 之后才成为可能。在旧版本中，仅支持相对 ID 和绝对 ID。\n\n最常用的搜索关键字无疑是 `@form`。当你在一个旨在处理整个表单的\
  \ `UICommand` 组件中使用 `<f:ajax>` 时，基本上别无选择。\n\n```\n<h:form>              \n    ...\n\
      <h:commandButton value=\"Submit\" ...>\n        <f:ajax execute=\"@form\" />\n\
      </h:commandButton>\n</h:form> \n```\n\n自 JSF 2.3 起，另一个新特性是搜索关键字可以与常规组件 ID 链接。以下示例扩展了前面“绝对层级\
  \ ID”一节中给出的示例。\n\n```\n<h:form>\n    <h:outputLabel id=\"l_time\" for=\"time:hour\"\
  \ value=\"Time\" />\n    <t:inputLocalTime id=\"time\" value=\"#{schedule.time}\"\
  \ required=\"true\">\n        <f:ajax render=\"@form:m_time\" />\n    <h:message\
  \ id=\"m_time\" for=\"time\" />\n</h:form>\n```\n\n以下示例演示了在删除一行时更新整个表格。\n\n```\n\
  <h:form>\n    <h:dataTable value=\"#{products.list}\" var=\"product\">\n        ...\n\
          <h:column>\n            <h:commandButton id=\"delete\" value=\"Delete\"\n\
                  action=\"#{products.delete(product)}\">\n                <f:ajax\
  \ render=\"@namingcontainer\" />\n            </h:commandButton>\n        </h:column>\n\
      </h:dataTable>\n</h:form>\n```\n\n特别注意，它引用的是最近的实现了 `NamingContainer` 接口的组件，在此上下文中是\
  \ `<h:dataTable>`，而不是 `<h:form>`。\n\n关于编程式解析，包含关键字的搜索表达式不能使用 `UIComponent#findComponent()`\
  \ 进行编程式解析。为此，你需要使用 `SearchExpressionHandler#resolveComponent()` 或 `resolveComponents()`\
  \ ⁸。`SearchExpressionHandler` 又可以通过 `Application#getSearchExpressionHandler()` 获取。你还需要预先创建\
  \ `SearchExpressionContext` ⁹，它封装了开始搜索的组件。\n\n```\nFacesContext context = FacesContext.getCurrentInstance();\n\
  UIComponent base = context.getViewRoot(); // 可以是任何组件。\nString expression = \"@namingcontainer\"\
  ;\n\nSearchExpressionContext searchContext = SearchExpressionContext\n    .createSearchExpressionContext(context,\
  \ base);\nSearchExpressionHandler searchHandler = context.getApplication()\n    .getSearchExpressionHandler();\n\
  handler.resolveComponent(searchContext, expression, (ctx, found) -> {\n    System.out.println(found);\n\
  });\n```\n\n坦率地说，这相当冗长，但它是 JSF API 自带的。幸运的是，存在像 OmniFaces 这样的实用工具库。\n\n\n\n## 自定义搜索关键字\n\
  \nJSF 2.3 引入的组件搜索表达式框架还附带了一个 API，允许我们创建自定义搜索关键字。假设你有一个包含多个 `<h:message>` 组件的表单，并且希望在提交表单时重新渲染所有这些组件。那么你可能会倾向于在\
  \ `<f:ajax>` 的 `render` 属性中使用 `@form`。\n\n```\n<h:form>                \n    <h:outputLabel\
  \ for=\"input1\" ... />\n    <h:inputText id=\"input1\" ... />\n    <h:message for=\"\
  input1\" />\n\n<h:outputLabel for=\"input2\" ... />\n    <h:inputText id=\"input2\"\
  \ ... />\n    <h:message for=\"input2\" />\n\n<h:outputLabel for=\"input3\" ...\
  \ />\n    <h:inputText id=\"input3\" ... />\n    <h:message for=\"input3\" />\n\n\
  <h:commandButton value=\"提交\" ...>\n        <f:ajax execute=\"@form\" render=\"\
  @form\" />\n    </h:commandButton>\n</h:form> \n```\n\n但这种方法效率并不高。实际上，它还会不必要地重新渲染同一表单内的所有标签、输入组件以及任何其他在\
  \ Ajax 回发请求期间根本不会改变的静态内容。这会造成资源浪费。理想情况下，我们应该有一个类似 `@messages` 的搜索关键字，它可以引用同一表单内的所有消息组件。\n\
  \n```\n<h:form>\n    <h:outputLabel for=\"input1\" ... />\n    <h:inputText id=\"\
  input1\" ... />\n    <h:message id=\"m_input1\" for=\"input1\" />\n\n<h:outputLabel\
  \ for=\"input2\" ... />\n    <h:inputText id=\"input2\" ... />\n    <h:message id=\"\
  m_input2\" for=\"input2\" />\n\n<h:outputLabel for=\"input3\" ... />\n    <h:inputText\
  \ id=\"input3\" ... />\n    <h:message id=\"m_input3\" for=\"input3\" />\n\n<h:commandButton\
  \ value=\"提交\" ...>\n        <f:ajax execute=\"@form\" render=\"@messages\" />\n\
      </h:commandButton>\n</h:form>\n```\n\n请注意，每个 `<h:message>` 组件都设置了显式 ID，因为如果没有显式\
  \ ID，它们默认不会向 HTML 输出渲染任何内容，那么 JSF Ajax API 的 JavaScript 将无法找到它们，从而无法根据 Ajax 响应更新其内容。\n\
  \n为了让 JSF 识别新的搜索关键字 `@messages`，首先需要按如下方式扩展 `javax.faces.component.search.SearchKeywordResolver`\
  \ ¹⁰：\n\n```\npublic class MessagesKeywordResolver extends SearchKeywordResolver\
  \ {\n\n@Override\n    public boolean isResolverForKeyword\n        (SearchExpressionContext\
  \ context, String keyword)\n    {\n        return \"messages\".equals(keyword);\n\
      }\n\n@Override\n    public void resolve\n        (SearchKeywordContext context,\
  \ UIComponent base, String keyword)\n    {\n        UIComponent form = base.getNamingContainer();\n\
          while (!(form instanceof UIForm) && form != null) {\n            form =\
  \ form.getNamingContainer();\n        }\n\nif (form != null) {\n            Set<String>\
  \ messageClientIds = new HashSet<>();\n            VisitContext visitContext = VisitContext.createVisitContext\n\
                  (context.getSearchExpressionContext().getFacesContext());\n\nform.visitTree(visitContext,\
  \ (visit, child) -> {\n                if (child instanceof UIMessage) {\n                    messageClientIds.add(child.getClientId());\n\
                  }\n                return VisitResult.ACCEPT;\n            });\n\
  \nif (!messageClientIds.isEmpty()) {\n                context.invokeContextCallback(new\
  \ UIMessage() {\n                    @Override\n                    public String\
  \ getClientId(FacesContext context) {\n                        return String.join(\"\
  \ \", messageClientIds);\n                    }\n                });\n            }\n\
          }\n\ncontext.setKeywordResolved(true);\n    }\n}\n```\n\n需要注意的是，这种方法已经有些取巧了。也就是说，`SearchKeywordResolver`\
  \ 的意图是将一个关键字解析为恰好一个组件，该组件的客户端 ID 随后将用于替换关键字。然后这个组件会被传递给 `SearchKeywordContext#invokeContextCallback()`。在上述方法中，我们改为收集父级\
  \ `UIForm` 内所有 `UIMessage` 组件的客户端 ID，然后向 `invokeContextCallback()` 提供一个假的 `UIMessage`\
  \ 组件，该组件会调用假 `UIMessage` 组件的 `getClientId()`，而后者实际上返回的是所需的客户端 ID 集合。\n\n还应注意，这里使用的是\
  \ `UIComponent#visitTree()` ¹¹ 而不是递归遍历 `UIComponent#getChildren()` 来收集任何 `UIMessage`\
  \ 组件的客户端 ID。也就是说，当简单地遍历子组件时，你迟早会遇到一个迭代器组件，例如 `<h:dataTable>` 或 `<ui:repeat>`，如果它恰好只嵌套了一个\
  \ `UIMessage` 组件，那么你最终只会得到一个客户端 ID，即不带迭代索引的那个。`UIComponent#visitTree()` 不会这样做；路径中的任何迭代器组件都会实际遍历其模型值，并返回多个\
  \ `UIMessage` 组件，每个组件都带有包含迭代索引的正确客户端 ID。\n\n最后，必须调用 `SearchKeywordContext#setKeywordResolved(true)`\
  \ 来通知搜索上下文关键字已成功解析，即使它实际上没有解析到任何内容。如果忘记这一步，实际上不会造成任何损害，但如果不这样标记搜索关键字已解析，搜索上下文将继续咨询所有其他搜索关键字解析器，这可能会导致效率降低。\n\
  \n最后，为了让新的 `MessagesKeywordResolver` 运行，需要在 `faces-config.xml` 中按如下方式注册它：\n\n```\n\
  <application>\n    <search-keyword-resolver>\n        com.example.project.MessagesKeywordResolver\n\
      </search-keyword-resolver>\n</application>\n```\n\n或者，在 `@WebListener` 中以编程方式注册，如下所示：\n\
  \n```\n@WebListener\npublic class ApplicationConfig implements ServletContextListener\
  \ {\n\n@Override\n    public void contextInitialized(ServletContextEvent event)\
  \ {\n        FacesContext.getCurrentInstance().getApplication()\n            .addSearchKeywordResolver(new\
  \ MessagesKeywordResolver());\n    }\n}\n```\n\n请注意，此时 `FacesContext` 必须可用，因此 `ServletContainerInitializer`\
  \ 不一定能正常工作；并且 `FacesServlet` 可能尚未处理过请求，因此在某些受管 bean 中注册也不一定能正常工作。\n\n\n\n# 脚注\n\n\
