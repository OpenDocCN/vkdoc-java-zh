- '# 4. 表单组件


  Bauke Scholtz^(1 ) 和 Arjan Tijms²


  (1) 库拉索岛威廉斯塔德


  (2) 荷兰北荷兰省阿姆斯特丹


  这些是标准 JSF（JavaServer Faces）组件集中最重要的组件。没有它们，JSF 一开始就不会非常有用。当使用纯 HTML 元素而不是 JSF 组件时，你最终会用代码污染控制器，以手动应用、转换和验证提交的值；用这些值更新模型；并找出要调用的操作方法。这正是
  JSF 作为基于 HTML 表单的 Web 应用程序的组件化 MVC（模型-视图-控制器）框架，应该为你分担的繁重工作。


  ## 输入、选择和命令组件


  所有输入组件都继承自 `UIInput` 超类。所有选择组件都继承自其子类，可以是 `UISelectBoolean`、`UISelectOne` 或 `UISelectMany`。（有关标准
  JSF 组件的完整列表，请参见第 3 章的表 3-1。）所有输入和选择组件都实现了 `EditableValueHolder` 接口，该接口允许附加 `Converter`、`Validator`
  和 `ValueChangeListener`。所有命令组件都继承自 `UICommand` 超类，并实现 `ActionSource` 接口，该接口允许定义一个或多个应在调用应用程序阶段（第五阶段）调用的托管
  bean 方法。它们只能有一个“action”方法和多个“action listener”方法。


  HTML 要求所有输入、选择和命令元素都嵌套在表单元素中。标准 JSF 组件集只提供一个这样的组件，即 `<h:form>`，它来自 `UIForm` 超类。你也可以使用纯
  HTML `<form>` 元素，但它不会自动在表单中包含表示 JSF 视图状态的强制性 `javax.faces.ViewState` 隐藏输入字段。`<h:form>`
  的渲染器负责自动将其包含在生成的每个 JSF 表单的 HTML 表示中。没有它，JSF 将无法识别该请求为有效的回发请求。换句话说，`FacesContext.getCurrentInstance().isPostback()`
  将返回 `false`，然后 JSF 甚至不会处理提交的值，更不用说调用操作方法了。JSF 页面中的纯 HTML `<form>` 元素仅对结合 `<f:viewParam>`
  标签的 GET 请求有用，这些标签应负责处理提交的输入值。这将在后面的“GET 表单”部分详细说明。


  所有命令组件都有一个 `action` 属性，可以绑定到托管 bean 方法。只要没有转换或验证错误，此方法将在调用应用程序阶段（第五阶段）被调用。转换和验证将在第
  5 章中介绍，因此我们在此跳过详细说明此步骤。




  ## 基于文本的输入组件


  所有基于文本的输入组件都有一个 `value` 属性，该属性可以绑定到受管 bean 的属性。在视图渲染期间，会查询此属性的 getter 方法，以检索并显示任何预设值。而在回发请求的更新模型值阶段（第四阶段），如果适用，则会使用已提交、经过转换和验证的值来调用此属性的
  setter 方法。以下是一个基本用法示例，演示了所有基于文本的输入组件。


  Facelets 文件 /test.xhtml：


  ```

  <h:form>

      <h:inputText value="#{bean.text}" />

      <h:inputSecret value="#{bean.password}" />

      <h:inputTextarea value="#{bean.message}" />

      <h:inputHidden value="#{bean.hidden}" />

      <h:commandButton value="Submit" action="#{bean.submit}" />

  </h:form>

  ```


  支持 bean 类 com.example.project.view.Bean：


  ```

  @Named @RequestScoped

  public class Bean {


  private String text;

      private String password;

      private String message;

      private String hidden;


  public void submit() {

          System.out.println("表单已提交！");

          System.out.println("text: " + text);

          System.out.println("password: " + password);

          System.out.println("message: " + message);

          System.out.println("hidden: " + hidden);

      }


  // 在此处为每个属性添加/生成 getter 和 setter 方法。

  }

  ```


  生成的 HTML 输出：


  ```

  <form id="j_idt4" name="j_idt4" method="post"

      action="/project/test.xhtml"

      enctype="application/x-www-form-urlencoded">

      <input type="hidden" name="j_idt4" value="j_idt4" />

      <input type="text" name="j_idt4:j_idt5" />

      <input type="password" name="j_idt4:j_idt6" />

      <textarea name="j_idt4:j_idt7"></textarea>

      <input type="hidden" name="j_idt4:j_idt8" />

      <input type="submit" name="j_idt4:j_idt9" value="Submit" />

      <input type="hidden" name="javax.faces.ViewState"

          id="j_id1:javax.faces.ViewState:0"

          value="-4091383829147627416:3884402765892734278"

          autocomplete="off" />

  </form>

  ```


  在 Chrome 浏览器中的渲染效果（已添加换行）：


  ![A454457_1_En_4_Figa_HTML.jpg](img/A454457_1_En_4_Figa_HTML.jpg)


  你会在生成的 HTML 输出中注意到几件事。毫无疑问，首先注意到的是 JSF 还自动生成了 HTML 元素的 `id` 和 `name` 属性，它们都带有 `j_id`
  前缀，该前缀由公共 API（应用程序编程接口）常量 `UIViewRoot.UNIQUE_ID_PREFIX` 定义。其中的“t”基本上代表“树”（tree），而数字基本上代表组件在组件树中的位置。因此，当你在
  Facelets 文件中添加、删除或移动组件时，这个数字很容易发生变化。当质量保证（QA）需要为 Web 应用程序编写集成测试时（通常需要用到 HTML 元素
  ID），这也会成为令人头疼的问题。


  当功能必须要有 `id` 和/或 `name` 属性才能生成 HTML 输出时，JSF 会使用自动生成的 ID。`id` 属性是必需的，以便任何 JavaScript
  代码（也可以是 JSF 自动生成的，例如负责 Ajax 工作的函数）能够找到该 HTML 元素。由于这会使生成的 HTML 代码难以阅读，坦率地说，也很丑陋，我们希望显式地指定任何
  JSF 表单、输入、选择和命令组件的 `id` 属性。这样，JSF 就会直接使用它为 HTML 元素的 `id` 和 `name` 属性赋值，而不是自动生成一个。现在，让我们为此重写
  Facelets 文件 /test.xhtml。一个好的做法是让输入组件的 `id` 属性与 bean 属性名完全匹配，命令组件的 `id` 属性与 bean
  方法名完全匹配。这样最终会得到更具自文档性的代码和生成的 HTML 输出。


  ```

  <h:form id="form">

      <h:inputText id="text" value="#{bean.text}" />

      <h:inputSecret id="password" value="#{bean.password}" />

      <h:inputTextarea id="message" value="#{bean.message}" />

      <h:inputHidden id="hidden" value="#{bean.hidden}" />

      <h:commandButton id="submit" value="Submit"

          action="#{bean.submit}" />

  </h:form>

  ```


  现在，生成的 HTML 输出如下所示：


  ```

  <form id="form" name="form" method="post" action="/project/test.xhtml"

      enctype="application/x-www-form-urlencoded">

      <input type="hidden" name="form" value="form" />

      <input id="form:text" type="text" name="form:text" />

      <input id="form:password" type="password" name="form:password" />

      <textarea id="form:message" name="form:message"></textarea>

      <input id="form:hidden" type="hidden" name="form:hidden" />

      <input id="form:submit" type="submit" name="form:submit"

          value="Submit" />

      <input type="hidden" name="javax.faces.ViewState"

          id="j_id1:javax.faces.ViewState:0"

          value="-7192066430460949081:-3987350607752016894"

          autocomplete="off" />

  </form>

  ```


  这已经清晰多了。请注意，当你显式设置组件 ID 时，它最终一定会出现在生成的 HTML 输出中。生成的 HTML 元素 ID 代表“客户端 ID”，它可能与组件
  ID 不同，具体取决于其父组件。如果该组件有任何父组件是 `NamingContainer` 接口的实例，那么 `NamingContainer` 父组件的 ID
  将被添加到该组件的客户端 ID 之前。在标准的 JSF HTML 组件集中，只有 `<h:form>` 和 `<h:dataTable>` 是 `NamingContainer`
  的实例。其他还有 `<ui:repeat>` 和 `<f:subview>`。


  如果你更仔细地查看生成的 HTML 输出，会发现只剩下一个自动生成的 ID。那就是视图状态隐藏输入字段的 ID，它始终是 `j_id1`。它代表 `UIViewRoot`
  实例的 ID，默认情况下无法从 Facelets 文件中设置。当在基于 Portlet 的 Web 应用程序（而非基于 Servlet 的 Web 应用程序）中使用
  JSF 时，这个 ID 是可覆盖的，并且会代表 Portlet 的唯一名称。在基于 Portlet 的 Web 应用程序中，一个 JSF 页面中可以有多个 Portlet
  视图。换句话说，在基于 Portlet 的 Web 应用程序中，一个 JSF 页面可以有多个 `UIViewRoot` 实例。


  回到生成的 HTML 输出，HTML 输入元素的 `name` 属性对于 HTML 来说是必需的，以便能够通过 HTTP 将提交的值作为请求参数发送。它将作为请求参数名。在任何一款主流的
  Web 浏览器中，你都可以在 Web 开发者工具集的“网络”部分检查请求参数，在浏览器中按 F12 键即可访问。图 4-1 展示了在填写一些值并提交表单后，Chrome
  如何呈现回发请求，正如该图的“表单数据”部分所示。


  ![A454457_1_En_4_Fig1_HTML.jpg](img/A454457_1_En_4_Fig1_HTML.jpg)




  ###### 图 4-1 Chrome 开发者工具——网络——标头——表单数据


  这个隐藏的输入字段，其名称代表 `<h:form>` 的 ID，将向 JSF 指示在回发请求期间具体提交的是哪个表单。也就是说，单个 HTML 文档可以包含多个表单元素。通过这种方式，JSF
  可以在应用请求值阶段（第二阶段）确定当前表单组件是否确实被提交。这将导致表单组件的 `UIForm#isSubmitted()` 方法返回 `true`。名称为
  `javax.faces.ViewState` 的隐藏输入字段代表一个唯一标识符，它指向存储在会话中的序列化视图状态对象。这两个隐藏输入字段都是由与 `UIForm`
  组件关联的渲染器自动包含的。顺便提一下，视图状态隐藏输入字段上的 `autocomplete="off"` 并非技术上的要求，而只是一种变通方法，用于防止某些浏览器在按下后退按钮时用最后已知的值覆盖它，而这个值本身可能是不正确的。


  我们示例中的隐藏输入字段的值为空。在这个表单中，它实际上毫无用处。这样的隐藏输入字段通常只有在它的值由某些你想在托管 bean 中捕获的 JavaScript
  代码设置时才有用。通常，使用隐藏输入字段将托管 bean 属性从一个请求“传递”到下一个请求是没有意义的。相反，这些属性应该分配给一个声明为具有比请求作用域更广作用域（例如视图、流程或会话作用域）的托管
  bean。这样可以省去处理隐藏输入字段的麻烦。Bean 作用域将在第 8 章中详细说明。


  如果你熟悉基本的 HTML，其他请求参数应该不言自明。它们代表所涉及的输入元素的名称/值对。你应该能够确定在提交之前在表单中实际输入了哪些值。JSF 也能够做到同样的事情。它将遍历组件树，并使用组件的“客户端
  ID”作为请求参数名称，从请求参数映射中获取值。基本上，在应用请求值阶段（第二阶段），以下代码会在幕后为每个输入组件执行。这发生在 `UIInput#decode()`
  方法中。


  ```

  FacesContext context = FacesContext.getCurrentInstance();

  ExternalContext externalContext = context.getExternalContext();

  Map<String, String> formData = externalContext.getRequestParameterMap();


  String clientId = component.getClientId(context);

  String submittedValue = formData.get(clientId);

  component.setSubmittedValue(submittedValue);

  ```


  并且，在同一阶段，对于每个命令组件，在与该组件关联的渲染器的 `decode` 方法中，基本上会执行以下代码：


  ```

  if (formData.get(clientId) != null) {

      component.queueEvent(new ActionEvent(context, component));

  }

  ```


  在处理验证阶段（第三阶段），JSF 会在执行必要的转换和验证（如果任何转换器或验证器已注册到组件或关联的 bean 属性上，并且执行无误）之后，将每个相关输入组件的提交值设置为“本地值”。这发生在
  `UIInput#validate()` 方法中，其核心逻辑以下面的简化（非常简化！）代码形式展示：


  ```

  String submittedValue = component.getSubmittedValue();

  try {

      Converter converter = component.getConverter();

      Object newValue = component.getConvertedValue(submittedValue);

      for (Validator validator : component.getValidators()) {

          validator.validate(context, component, newValue);

      }

      component.setValue(newValue);

      component.setSubmittedValue(null);

  }

  catch (ConverterException | ValidatorException e) {

      context.addMessage(clientId, e.getFacesMessage());

      context.validationFailed(); // 跳过阶段 4 和 5。

      component.setValid(false);

  }

  ```


  当没有验证错误，并且 `FacesContext#isValidationFailed()` 因此返回 `false` 时，JSF 将前进到更新模型值阶段（第四阶段）。在此阶段，输入组件的“本地值”最终将被设置为与输入组件的
  `value` 属性关联的托管 bean 属性。这将发生在 `UIInput#updateModel()` 方法中，该方法简化如下：


  ```

  ValueExpression el = component.getValueExpression("value");

  if (el != null) {

      el.setValue(context.getELContext(), component.getValue());

      component.setValue(null);

  }

  ```


  `el` 变量基本上代表了在 `value` 属性中定义的表达式语言（EL）语句，在我们的 `<h:inputText>` 示例中，就是 `#{bean.text}`。`ValueExpression#setValue()`
  将基本上触发此表达式背后的 setter 方法，并将组件的值作为参数传入。因此，实际上它将执行 `bean.setText(component.getValue())`。


  一旦所有模型值都已更新，JSF 将前进到调用应用程序阶段（第五阶段）。在应用请求值阶段（第二阶段）排队到命令组件中的任何 `ActionEvent` 都将被广播。它最终将调用与该命令组件关联的所有方法。在我们的
  `<h:commandButton>` 示例中，其 `action` 属性定义为 `#{bean.submit}`，它将调用 `Bean#submit()` 方法。最后，JSF
  将前进到最后一个阶段，即渲染响应阶段（第六阶段），生成 HTML 输出，并在此过程中调用 getter 方法以获取要嵌入到 HTML 输出中的模型值。




  ## 基于文件的输入组件


  是的，只有一个基于文件的输入组件，即 `<h:inputFile>`。它对其所在的 `<h:form>` 只有一个额外要求：其 `enctype` 属性必须显式设置为
  `multipart/form-data`，以符合 HTML 规范。这对其他输入组件没有影响；它们将继续正常工作。只是默认的表单编码 `application/x-www-form-urlencoded`
  不支持嵌入二进制数据。`multipart/form-data` 编码支持这一点，但它只是稍微冗长一些。每个请求参数值前面都有一个边界行、一个包含请求参数名称的
  `Content-Disposition` 标头、一个包含值内容类型的 `Content Type` 标头以及两个换行符。与默认编码相比，这种编码效率非常低，在默认编码中，URL
  编码的请求参数名称/值对仅通过 `&` 字符连接，但这实际上是能够将文件嵌入 HTTP POST 请求而不会引起歧义的唯一可靠方法，尤其是在上传文本文件时，其内容恰好与名称/值对相似。


  `<h:inputFile>` 的 `value` 属性应绑定到 `javax.servlet.http.Part` 接口的 bean 属性。


  Facelets 文件 /test.xhtml：


  ```

  <h:form id="form" enctype="multipart/form-data">

      <h:inputFile id="file" value="#{bean.file}" />

      <h:commandButton id="submit" value="Submit"

          action="#{bean.submit}" />

  </h:form>

  ```


  支持 bean 类 com.example.project.view.Bean：


  ```

  @Named @RequestScoped

  public class Bean {


      private Part file;


      public void submit() throws IOException {

          System.out.println("Form has been submitted!");

          System.out.println("file: " + file);

          if (file != null) {

              System.out.println("name: " + file.getSubmittedFileName());

              System.out.println("type: " + file.getContentType());

              System.out.println("size: " + file.getSize());

              InputStream content = file.getInputStream();

              // Write content to disk or DB.

          }

      }


      // Add/generate getters and setters for every property here.

  }

  ```


  生成的 HTML 输出：


  ```

  <form id="form" name="form" method="post" action="/project/test.xhtml"

      enctype="multipart/form-data">

      <input type="hidden" name="form" value="form" />

      <input id="form:file" type="file" name="form:file" />

      <input id="form:submit" type="submit" name="form:submit"

          value="Submit" />

      <input type="hidden" name="javax.faces.ViewState"

          id="j_id1:javax.faces.ViewState:0"

          value="6034213708100805615:8835868421785849982"

          autocomplete="off" />

  </form>

  ```


