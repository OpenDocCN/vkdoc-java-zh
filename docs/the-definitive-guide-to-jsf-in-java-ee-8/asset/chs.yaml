  ### 创建支持 Bean 类


  项目现在已正确配置，我们可以开始开发实际的 MVC 应用程序。MVC 的控制器部分已在 web.xml 中配置为 FacesServlet。MVC 的模型部分正是我们现在要创建的。它基本上只是一个简单的
  Java 类，按照 JSF 的惯例，它被称为*支持 Bean*，因为它“支持”一个视图。


  右键单击项目的 src/main/java 文件夹，选择*新建 ➤ Bean*。现在出现的*新建 CDI Bean* 向导也是 JBoss Tools 插件的一部分（见图
  2-17）。在此向导中，将*包*设置为 com.example.project.view，将*名称*设置为 HelloWorld，勾选*添加 @Named* 复选框，最后将*作用域*设置为
  @RequestScoped。其余字段可以保持默认或留空。


  ![A454457_1_En_2_Fig17_HTML.jpg](img/A454457_1_En_2_Fig17_HTML.jpg)




  ###### 图 2-17 Eclipse 中 JBoss Tools 提供的“新建 CDI Bean”向导


  类编辑器现在将打开新创建的后台 Bean 类。我们将对其进行修改，删除无用的构造函数；添加两个属性 `input` 和 `output`；并为 `input`
  属性添加 getter 和 setter 方法对，为 `output` 属性仅添加 getter 方法，以及一个 `submit()` 操作方法，该方法根据 `input`
  属性准备 `output` 属性。提示：在 Eclipse 中，输入属性后，你可以在类编辑器中右键单击任意位置，然后选择 *Source ➤ Generate
  Getters and Setters*，让 IDE 自动生成它们。编辑后的后台 Bean 类应如下所示：


  ```

  package com.example.project.view;


  import javax.enterprise.context.RequestScoped;

  import javax.inject.Named;


  @Named @RequestScoped

  public class HelloWorld {


      private String input;

      private String output;


      public void submit() {

          output = "Hello World! You have typed: " + input;

      }


      public String getInput() {

          return input;

      }


      public void setInput(String input) {

          this.input = input;

      }


      public String getOutput() {

          return output;

      }

  }

  ```


  我们将简要介绍此处使用的注解。


  *   **@Named**——为 Bean 指定一个名称，主要用于通过 EL 引用它。如果不带任何属性，此名称默认为类名的首字母小写形式，因此此处为 "helloWorld"。它将通过
  EL 中的 #{helloWorld} 访问。这可以在 JSF 页面中使用。


  *   **@RequestScoped**——为 Bean 指定一个作用域，这意味着在给定的生命周期内使用 Bean 的同一个实例。在这种情况下，生命周期是
  HTTP 请求的持续时间。当作用域结束时，Bean 会被自动销毁。你可以在第 8 章中阅读更多关于作用域的内容。


  ### 创建 Facelets 文件


  接下来，我们将创建 MVC 的视图部分。它基本上只是一个 XHTML 文件，JSF 将其解释为 *Facelets 文件* 或简称为 *Facelet*。这个
  Facelets 文件最终将生成 HTML 标记，这些标记作为对请求的响应发送到浏览器。借助 EL，它可以引用 Bean 属性并调用 Bean 操作。


  右键单击项目的 webapp 文件夹，然后选择 *New ➤ XHTML Page*（参见图 2-18）。现在出现的 *New XHTML Page* 向导也是
  JBoss Tools 插件的一部分。在此向导中，将 *File name* 设置为 hello.xhtml，然后完成向导。


  ![A454457_1_En_2_Fig18_HTML.jpg](img/A454457_1_En_2_Fig18_HTML.jpg)


  ###### 图 2-18 Eclipse 中 JBoss Tools 提供的“新建 XHTML 页面”向导


  XHTML 编辑器现在将打开新创建的 Facelets 文件。你还会注意到 *Palette* 视图显示在底部框中。这对于基于 JSF 的 Web 开发来说基本上没什么用。所以让我们关闭它。回到新创建的
  Facelets 文件，它最初是空的。用以下内容填充它：


  ```

  <!DOCTYPE html>

  <html lang="en"

      xmlns:="http://www.w3.org/1999/xhtml"

      xmlns:f="http://xmlns.jcp.org/jsf/core"

      xmlns:h="http://xmlns.jcp.org/jsf/html"

  >

      <h:head>

          <title>Hello World</title>

      </h:head>

      <h:body>

          <h1>Hello World</h1>

          <h:form>

              <h:outputLabel for="input" value="Input" />

              <h:inputText id="input" value="#{helloWorld.input}" />

              <h:commandButton value="Submit"

                  action="#{helloWorld.submit}">

                  <f:ajax execute="@form" render=":output" />

              </h:commandButton>

          </h:form>

          <h:outputText id="output" value="#{helloWorld.output}" />

      </h:body>

  </html>

  ```


  我们将简要介绍此处使用的 JSF 特定 XHTML 标签。


  *   **<h:head>**——生成 HTML 的 <head>。它为 JSF 提供了自动包含任何必要 JavaScript 文件的机会，例如包含 <f:ajax>
  所需逻辑的文件。


  *   **<h:body>**——生成 HTML 的 <body>。你也可以在此特定 Facelet 中使用纯 HTML 的 <body>，但这样它就不会给任何其他
  JSF 标签在 HTML <body> 末尾自动包含任何必要 JavaScript 的机会。


  *   **<h:form>**——生成 HTML 的 <form>。JSF 会自动将视图状态包含在一个隐藏的输入字段中。


  *   **<h:outputLabel>**——生成 HTML 的 <label>。你也可以在此特定 Facelet 中使用纯 HTML 的 <label>，但那样你就必须手动处理找出目标输入元素的实际
  ID。


  *   **<h:inputText>**——生成 HTML 的 <input type="text">。JSF 会自动获取并设置 `value` 属性中指定的
  Bean 属性的值。


  *   **<h:commandButton>**——生成 HTML 的 <input type="submit">。JSF 会自动调用 `action` 属性中指定的
  Bean 方法。


  *   **<f:ajax>**——生成 Ajax 行为所需的 JavaScript 代码。你也可以不使用它，但那样表单提交就不会异步执行。`execute`
  属性表示提交时必须处理整个 <h:form>，而 `render` 属性表示 Ajax 提交完成后必须更新由 `id="output"` 标识的标签。


  *   **<h:outputText>**——生成 HTML 的 <span>。这是在 Ajax 提交完成时被更新的标签。它只会打印 `value` 属性中指定的
  Bean 属性。


  这些 JSF 特定的 XHTML 标签也称为 *JSF 组件*。在接下来的章节中，将有更多关于 Facelets 文件和 JSF 组件的内容。请注意，你也可以在
  Facelets 文件中完美地嵌入纯 HTML。只有在功能需要时，或者使用 JSF 组件更容易实现时，才应使用 JSF 组件。


