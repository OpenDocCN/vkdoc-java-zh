  \ .\n\n8 [`javaee.github.io/javaee-spec/javadocs/javax/faces/component/search/SearchExpressionHandler.html#resolveComponent-javax.faces.component.search.SearchExpressionContext-java.lang.String-javax.faces.component.ContextCallback-`](https://javaee.github.io/javaee-spec/javadocs/javax/faces/component/search/SearchExpressionHandler.html%23resolveComponent-javax.faces.component.search.SearchExpressionContext-java.lang.String-javax.faces.component.ContextCallback-)\
