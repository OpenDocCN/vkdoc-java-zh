- "# 3. 组件\n\nBauke Scholtz¹ 与 Arjan Tijms²\n\n(1) 库拉索岛威廉斯塔德\n\n(2) 荷兰北荷兰省阿姆斯特丹\n\n\
  JSF（JavaServer Faces）是一个基于组件的 MVC（模型-视图-控制器）框架。本质上，JSF 将视图定义解析为“组件树”。该树的根由与 faces\
  \ 上下文当前实例关联的“视图根”实例表示。\n\n```\nUIComponent tree = FacesContext.getCurrentInstance().getViewRoot();\n\
  ```\n\n视图通常使用 Facelets 文件中的 XHTML+XML 标记来定义。XML 是一种标记语言，非常适合用最少的代码来定义树形层次结构。组件树也可以在\
  \ Java 类中使用 Java 代码创建和操作，但这通常会导致代码非常冗长，以便声明值或方法表达式，并关联父子关系。通常，这样做的开发者并没有意识到如何使用诸如\
  \ JSTL（JavaServer Pages 标准标签库）之类的标签处理器，仅通过 XML 来操作组件树。\n\n组件树基本上定义了 JSF 应如何处理 HTTP\
  \ 请求，以便应用来自输入组件的请求值、转换和验证它们、更新托管 bean 模型值以及调用托管 bean 操作。它还定义了 JSF 应如何通过使用与组件关联的渲染器生成必要的\
  \ HTML 输出来产生 HTTP 响应，这些组件的属性又可以引用托管 bean 属性。换句话说，组件树定义了应如何处理 JSF 生命周期的各个阶段。图 3-1\
  \ 中的图表显示了 HTTP 回传请求通常是如何被 JSF 处理的。\n\n![A454457_1_En_3_Fig1_HTML.jpg](img/A454457_1_En_3_Fig1_HTML.jpg)\n\
  \n###### 图 3-1 JSF 如何在 MVC 架构中处理 HTTP 回传请求（数字表示顺序）\n\n以下是每个步骤的简要描述：\n\n1.  最终用户发送一个\
  \ HTTP 请求，该请求匹配 `FacesServlet` 的映射，从而调用它。\n\n2.  `FacesServlet` 将根据 HTTP 请求路径标识的\
  \ Facelet 文件构建组件树。\n\n3.  在构建视图期间，组件树将根据需要从支持 bean 获取当前模型值。任何 Facelets 模板标签和 JSTL\
  \ 核心标签的属性，以及 JSF 组件的 \"id\" 和 \"binding\" 属性都将被执行。\n\n4.  `FacesServlet` 将在组件树上恢复\
  \ JSF 视图状态。\n\n5.  `FacesServlet` 将让组件树应用 HTTP 请求参数，输入组件将它们存储为“提交的值”。\n\n6.  在检查\
  \ \"rendered\"、\"disabled\" 和 \"readonly\" 属性以检查它们是否被允许应用请求参数时，输入和命令组件将根据需要从支持 bean\
  \ 获取当前模型值。\n\n7.  当命令组件基于 HTTP 请求参数检测到它在客户端被调用时，它将排队 `ActionEvent`。\n\n8.  `FacesServlet`\
  \ 将让组件树处理所有已注册的转换器和验证器对提交的值进行处理，输入组件将新转换和验证的值存储为“本地值”。\n\n9.  输入组件将从支持 bean 获取旧模型值，并将它们与新值进行比较。\n\
  \n10. 如果新值与旧模型值不同，则输入组件将排队 `ValueChangeEvent`。\n\n11. 当所有转换和验证完成后，`FacesServlet`\
  \ 将在支持 bean 上调用任何已排队的 `ValueChangeEvent` 的监听器方法。\n\n12. `FacesServlet` 将让组件树更新所有模型值。\n\
  \n13. 输入组件将在支持 bean 中设置新的模型值。\n\n14. `FacesServlet` 将在支持 bean 上调用任何已排队的 `ActionEvent`\
  \ 的监听器方法。\n\n15. 支持 bean 的最终操作方法将根据需要返回一个引用目标视图的非空字符串结果。\n\n16. `FacesServlet` 将让组件树渲染响应。\n\
  \n17. 在生成 HTML 输出期间，组件树将根据需要从支持 bean 获取当前模型值。实际上，任何参与生成 HTML 输出的 Facelet 组件和 JSF\
  \ 组件的属性都将被执行。\n\n18. 组件树将把 HTML 输出写入 HTTP 响应。\n\n19. `FacesServlet` 将把 HTTP 响应返回给最终用户。\n\
  \n这与基于请求的 MVC 框架不同，在后者中，开发者需要在与视图关联的“控制器”类中编写更多样板代码，以定义需要应用哪些请求参数，和/或在填充实体之前应如何转换和验证它们。开发者还经常需要在调用操作之前，通过手动调用一堆\
  \ getter 和 setter 来手动填充实体。所有这些在 JSF 中都是不必要的。\n\n需要注意的是，支持 bean 在 MVC 范式中具有相当独特的地位。根据视角的不同，它可以充当模型、视图和控制器。这将在第\
  \ 8 章中详细说明。\n\n## 标准 HTML 组件\n\n默认的 JSF 实现已经提供了一套广泛的组件，用于借助 Facelets 视图技术编写 HTML\
  \ 页面。这些 HTML 组件可在 `http://xmlns.jcp.org/jsf/html` XML 命名空间 URI（统一资源标识符）下找到，该 URI\
  \ 应分配给 \"h\" XML 命名空间前缀。\n\n```\nxmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n```\n\
  \nJSF 页面中始终应存在的最重要的 HTML 组件是 `<h:head>` 和 `<h:body>`。没有它们，JSF 将无法自动包含与特定组件关联的任何脚本或样式表资源。例如，生成\
  \ HTML 提交按钮的 `<h:commandButton>`，其 Ajax 功能需要将 `jsf.js` 脚本文件包含在 HTML 文档中。\n\n*  \
  \ `<h:commandButton>`，生成一个 HTML 提交按钮。\n*   `<h:commandButton>`，可以选择性地包含 Ajax 功能。\n\
  *   Ajax 功能需要在 HTML 文档中包含一个 `jsf.js` 脚本文件。\n\n该组件的渲染器会自动处理这一点，但这仅在存在 `<h:head>`\
  \ 时才有效。`<h:body>` 在这里稍微不那么重要，但可能存在需要在 HTML 正文末尾添加脚本的组件，例如 `<f:websocket>`。换句话说，最精简且符合\
  \ HTML5 规范的 JSF 页面如下所示：\n\n```\n<!DOCTYPE html>\n<html lang=\"en\"\n    xmlns:=\"\
  http://www.w3.org/1999/xhtml\"\n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n\
  >\n    <h:head>\n        <title>标题</title>\n    </h:head>\n    <h:body>\n        ...\n\
      </h:body>\n</html>\n```\n\n生成的 HTML 响应，您可以通过在普通 Web 浏览器中右键单击*查看页面源代码*来检查，应如下所示：\n\
