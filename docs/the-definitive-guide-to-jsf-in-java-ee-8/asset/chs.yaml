  \ .\n\n11 [`javaee.github.io/javaee-spec/javadocs/javax/faces/component/UIComponent.html#visitTree-javax.faces.component.visit.VisitContext-javax.faces.component.visit.VisitCallback-`](https://javaee.github.io/javaee-spec/javadocs/javax/faces/component/UIComponent.html%23visitTree-javax.faces.component.visit.VisitContext-javax.faces.component.visit.VisitCallback-)\
  \ .\n\n© Bauke Scholtz, Arjan Tijms 2018\n\nBauke Scholtz 和 Arjan Tijms，《Java EE\
  \ 8 中 JSF 权威指南》，`doi.org/10.1007/978-1-4842-3387-0_13`\n\n# 13. 安全性\n\nBauke Scholtz^(1 )\
  \ 和 Arjan Tijms²\n\n(1)库拉索岛威廉斯塔德\n\n(2)荷兰北荷兰省阿姆斯特丹\n\nWeb 应用程序的安全性是一个广泛的领域，涵盖诸多主题，例如保护对资源的访问、防御各种类型的注入攻击，以及防止用户被诱骗代表攻击者执行恶意操作。\n\
  \nJSF（JavaServer Faces）以多种方式支持这些主题，要么提供原生解决方案，要么与 Java EE 平台的功能集成。对于资源访问（包括身份验证（调用者证明其身份）和授权（系统确定调用者有权访问哪些资源）），JSF（JavaServer\
  \ Faces）与 Java EE 安全机制集成，而该机制又由 Servlet 规范和 Java EE 安全规范等定义。\n\nJava EE 安全（JSR 375）在\
  \ Java EE 8 的 Web 配置文件和完整配置文件中均受支持。此外，参考实现 Soteria 可在 Java EE 7 服务器上运行，并且由于它构建在\
  \ JASPIC（Java EE 身份验证 SPI）（JSR 196）之上，因此它也可以在支持 JASPIC 的 Servlet 容器（例如 Tomcat 8.5\
  \ 及更高版本和 Jetty 7.0 及更高版本）上运行。\n\n\n\n## Java EE 安全概述与历史\n\n在 Java EE 中，安全并非由单一规范定义，而是分散在多个以不同方式相互集成的规范中。虽然这允许安全的不同方面以各自的速度演进，并且实际上甚至允许某些部分被非规范实现所替代，但这确实模糊了各规范各自负责的领域。\n\
  \n在本入门章节中，我们将首先对各个组成部分及其如何协同工作提供一个较为广泛的概述。我们将重点关注安全的 Web 方面。安全也存在于诸如 EJB（企业 JavaBeans）和\
  \ JCA（Java 连接器架构）连接器等组件中，但这些内容不在本书的讨论范围之内。\n\n从历史上看，Java EE 的安全主要基于 Servlet 规范引入的安全模型。也就是说，该模型的核心元素包括一个“认证机制”（FORM、BASIC\
  \ 等）、一组在 `web.xml` 中定义的安全约束（其中特定的 URL 模式与一组角色（包括空角色集合）相结合），以及几种以编程方式测试调用者详细信息的方法，例如\
  \ `HttpServletRequest.isUserInRole`。\n\n虽然有效，但在早期许多细节被遗漏了。Servlet 规范确实要求实现（Servlet\
  \ 容器）在认证机制方面是可扩展的，但没有具体说明应该如何实现。同样，Servlet 规范隐含地要求一个“身份存储”（文件、数据库、LDAP 等）来保存调用者的详细信息，如凭证、名称和角色，但将所有关于如何配置这些的细节留给了\
  \ Servlet 容器。\n\nServlet 规范没有定义任何以编程方式访问 `web.xml` 中定义的安全约束的方法，也没有定义以编程方式影响其执行的方法（例如，使某些约束基于时间）。此外，Servlet\
  \ 规范的早期版本并没有以最严格的方式指定约束解析，这导致了不同 Servlet 容器之间在解释上存在一些细微差异。\n\n第一个解决这些问题的附加规范是 JACC（JSR\
  \ 115），简单来说，它处理的是授权问题。JACC 规定了 `web.xml` 中的安全约束应如何在代码中表示，即作为一组 `Permission` 实例。JACC\
  \ 还规定了代码如何访问（查询）这些实例，并最终允许自定义授权模块替换或增强容器用于确定其访问决策的逻辑。关于 JACC，一个可能有点难以理解的地方是，它本身并不是一个可以独立实现然后添加到\
  \ Servlet 容器中的东西（就像我们可以对 JSF 做的那样），而是标准化并更精确地规定了所有 Servlet 容器内部已经在做的事情。\n\n第二个解决上述问题的附加规范是\
  \ JASPIC（JSR 196），它处理的是认证问题。JASPIC 规定了 Servlet 容器应在何时调用认证机制，并为这些认证机制定义了一个明确的接口类型，因此自定义认证机制可以使用此接口，而不是\
  \ Servlet 容器专有的接口，从而使其可移植。JASPIC 对身份存储有一些规定，但太少，以至于在实践中无法真正使用。与 JACC 类似，JASPIC 也不是可以独立实现的东西，但它标准化了所有\
  \ Servlet 容器已经在做的事情。\n\nJACC 和 JASPIC 都定义了低层级的 SPI（服务提供者接口），这些接口主要旨在由供应商实现和使用，以提供扩展产品。它们相当原始且相当抽象。因此，它们不是面向应用程序开发人员的（丰富的）API（应用程序编程接口）。这就是\
  \ Java EE 安全 API（JSR 375）的用武之地。Java EE 安全提供了 JASPIC 认证模块的一个更高级、更易于注册（只需实现接口）且更易于使用（基于\
  \ CDI）的版本。Java EE 安全 API 还完整定义了身份存储构件，但也许最重要的是，它提供了所有这些构件的多个具体实现，其中包括一个针对 JSF 使用优化的基于\
  \ FORM 的认证机制，以及多个身份存储，例如 JDBC（Java 数据库连接）存储和 LDAP（轻量级目录访问协议）存储。\n\nJava EE 安全 API\
  \ 的 RI（参考实现）称为 Soteria。该实现当然由 Java EE 8 的 RI GlassFish 及其衍生版 Payara 提供。Soteria 与\
  \ Mojarra 和 MyFaces 一样，被设计为可以独立运行在基本上任何遵循 JASPIC 规范的 Servlet 容器上（正如本章引言中提到的，Tomcat\
  \ 和 Jetty 都遵循该规范）。其依赖项（在撰写本文时，针对 Soteria 1.0）是 CDI 1.2 和表达式语言 3.0。这两个依赖项由所有 Java\
  \ EE 7 实现提供。Servlet 容器通常提供 EL（表达式语言）支持，而 CDI 可以单独添加，例如，使用 RI Weld。对于少数*可选*功能，Soteria\
  \ 利用了遵循 JACC 规范的 Servlet 容器。\n\n## 保护对资源的访问\n\n在 JSF 中，需要保护的主要资源是通过 URL 模式访问的视图。因此，我们需要为这些\
  \ URL 模式定义安全约束。这些约束主要在 `web.xml` 中定义。事实上，从 Java EE 8 开始，`web.xml` 几乎是唯一可行的为 JSF\
  \ 视图定义安全约束的地方。\n\nJava EE 有三种安全约束：\n\n*   排除\n*   未检查\n*   按角色\n\n\n\n### 排除\n\n\
  “**排除**”，又称“全部拒绝”，意味着此约束所覆盖的资源将拒绝所有外部调用者的访问。有人可能会问，这种约束的目的是什么。如果资源永远无法被访问，那这些资源一开始为什么存在？\n\
  \n答案有两方面。一方面，单个应用程序可能为不同目的而配置。排除式安全约束是一种便捷方式，可以快速禁用那些不适用于应用程序特定配置的若干资源。一个更重要的用例是能够区分资源的外部使用和内部使用。这里的关键见解是，安全约束仅应用于对该资源的外部请求，即针对请求\
  \ [`example.com/resources/template.xhtml`](https://example.com/resources/template.xhtml)\
  \ 的调用者，但**不**应用于内部请求，例如包含、转发以及任何从类路径或文件系统加载资源的方法。\n\n这对于 JSF 来说尤其重要，因为复合组件存在一个不太理想的设计选择。复合组件是通过\
  \ Facelet 而非 Java 类实现的组件。按照惯例，它们必须放置在位于 Web 根目录下名为 /resources 的目录内的子目录中。例如，/resources/bar/foo.xhtml。这将使复合组件“foo”在命名空间\
  \ [`xmlns.jcp.org/jsf/composite/bar`](http://xmlns.jcp.org/jsf/composite/bar) 中可用。\n\
  \n组件当然不是视图，调用者不应能直接请求它们。不幸的是，/resources 对于 Java EE 来说并不是一个特殊目录。JSF 通过约定赋予了它特殊含义，但对于\
  \ Servlet 容器来说，它和其他目录一样。这尤其意味着它没有任何保护措施，任何调用者都可以直接请求其中的资源。换句话说，这个目录是“未检查的”，即“全局可读”。即使使用\
  \ *.xhtml 映射，这不仅允许用户猜测我们有哪些组件，还允许用户尝试执行这些组件。显然这不是我们想要的。对此有两种解决方案：\n\n*   配置另一个目录作为\
  \ JSF 资源目录\n*   在 web.xml 中添加上述安全约束\n\n通过 `javax.faces.WEBAPP_RESOURCES_DIRECTORY`\
  \ 上下文参数，可以将另一个目录配置为 JSF 资源目录，而不是 /resources。例如：\n\n```\n<context-param>\n   <param-name>javax.faces.WEBAPP_RESOURCES_DIRECTORY</param-name>\n\
  \   <param-value>WEB-INF/resources</param-value>\n</context-param>\n```\n\n注意，该路径是相对于\
  \ Web 根目录的，并且不能以“/”开头。\n\n虽然这对我们自己的应用程序来说是一个好的默认设置，但它仍然不能完全保护我们。也就是说，第三方 jar 包仍然可以通过\
  \ /resources 提供它们的资源，并且不受该上下文参数的影响。因此，前面提到的“排除”约束是必需的。它看起来如下：\n\n```\n<security-constraint>\n\
  \    <web-resource-collection>\n        <web-resource-name>The /resources folder</web-resource-name>\n\
  \        <url-pattern>/resources/*</url-pattern>\n    </web-resource-collection>\n\
  </security-constraint>\n```\n\n可以看出，定义一个*排除*约束归结为定义我们希望约束的 URL 模式，而不定义任何具体的约束。\n\
  \n### 未检查\n\n“**未检查**”，又称“全部允许”、“公开”和“全局可读”，意味着所有调用者，无论是否经过身份验证，都可以访问此“约束”所覆盖的资源。在内部，可能存在一个显式约束，但在\
  \ web.xml 中，这个“约束”的定义方式很简单，就是不为某个 URL 模式定义任何约束。换句话说，没有被任何其他模式显式覆盖的每个 URL 都是“未检查”的。\n\
  \n### 按角色\n\n“**按角色**”意味着一个所谓的角色与一个 URL 模式相关联，并且经过身份验证的调用者必须拥有该角色才能访问该资源。角色本身通常被视为具有严格语义的概念，但它本质上不过是一个不透明的字符串，需要与经过身份验证的调用者关联的一组此类字符串以及\
  \ URL 模式关联的一组字符串相匹配。该字符串的内容完全由应用程序决定，这意味着它可以是“调用者类型”，如“admin”、“user”等，也可以是更细粒度的内容，如“may_add_item”，甚至是像“AYUDE-OPWR-BM1OP”这样的令牌。\n\
  \n以下是一个示例：\n\n```\n<security-constraint>\n    <web-resource-collection>\n      \
  \  <web-resource-name>User pages</web-resource-name>\n        <url-pattern>/user/*</url-pattern>\n\
  \    </web-resource-collection>\n    <auth-constraint>\n        <role-name>VIEW_USER_PAGES</role-name>\n\
  \    </auth-constraint>\n</security-constraint>\n\n<security-constraint>\n    <web-resource-collection>\n\
  \        <web-resource-name>Admin pages</web-resource-name>\n        <url-pattern>/admin/*</url-pattern>\n\
  \    </web-resource-collection>\n    <auth-constraint>\n        <role-name>VIEW_ADMIN_PAGES</role-name>\n\
  \    </auth-constraint>\n</security-constraint>\n\n<security-role>\n    <role-name>VIEW_USER_PAGES</role-name>\n\
  </security-role>\n<security-role>\n    <role-name>VIEW_ADMIN_PAGES</role-name>\n\
  </security-role>\n```\n\n在上面的片段中，我们定义了两个安全约束——一个用于 /user/* 模式，调用者需要拥有角色“VIEW_USER_PAGES”；另一个用于\
  \ /admin/* 模式，调用者需要拥有角色“VIEW_ADMIN_PAGES”。有了上述约束，访问例如 /user/account.xhtml 的调用者必须经过身份验证，并且必须拥有提到的角色。\n\
  \n一个 `auth-constraint` 可以包含多个角色，这些角色之间应用“或”逻辑。这意味着经过身份验证的调用者只需要拥有该约束中的其中一个角色即可被授予访问权限。约束还可以进一步限制到特定的\
  \ HTTP 方法（例如 GET 或 POST）。但这有一个注意事项，因为默认情况下，所有未指定的方法都将被视为未检查（公开）。这可以通过使用顶级的 `<deny-uncovered-http-methods/>`\
  \ 标签来应对。以下是一个示例：\n\n```\n<deny-uncovered-http-methods />\n\n<security-constraint>\n\
  \    <web-resource-collection>\n        <web-resource-name>User pages</web-resource-name>\n\
  \        <url-pattern>/user/*</url-pattern>\n        <http-method>GET</http-method>\n\
  \        <http-method>POST</http-method>\n    </web-resource-collection>\n    <auth-constraint>\n\
  \        <role-name>VIEW_USER_PAGES</role-name>\n    </auth-constraint>\n</security-constraint>\n\
  ```\n\n\n\n## 设置认证机制\n\n在定义安全约束之后，我们需要设置调用者如何进行认证。负责与调用者交互（即以特定方式要求调用者提供凭证）的组件被称为“认证机制”。Java\
  \ EE 提供了多种现成的认证机制。Servlet 规范提供了四种，即 FORM、BASIC、DIGEST 和 CERT，而 Java EE Security\
  \ 也提供了 FORM 和 BASIC（区别在于它们对应的是 CDI bean），同时还提供了一种名为“Custom FORM”的 FORM 变体。\n\nFORM\
  \ 和 Custom FORM 都适用于交互式 Web 应用程序，例如我们主要使用 JSF 构建的那些应用。与 BASIC 等机制不同，FORM 认证机制会回调应用程序，让其渲染要求调用者提供凭证的表单，这也是这些机制名称的由来。\n\
  \n两者之间的主要区别在于，机制在渲染表单后要求应用程序如何继续所谓的认证对话。在 FORM 中，这是通过让调用者将填写好的表单提交到虚拟 URL `j_security_check`\
  \ 来实现的；而在 Custom FORM 中，这是通过调用注入的 `SecurityContext` 以编程方式完成的。不过，这个微小的区别对 JSF 来说却至关重要。在\
  \ JSF 中，表单视图默认会提交到其请求来源的同一 URL，因此回发到机制强制指定的单一 URL 并不自然。除此之外，在 JSF 中，我们经常需要在回发后运行服务器端代码；想想转换器、验证器以及显示\
  \ faces 消息的能力。如果我们必须回发到虚拟的非 faces 的 `j_security_check` URL，这些功能几乎都无法实现，但当我们能够从后台\
  \ bean 的动作方法中以编程方式继续认证对话时，这些就变得相当可行了。\n\n我们将首先向您展示如何配置 Web 应用程序以使用 Custom FORM 认证机制。之后，我们将解释如何实际使用\
  \ JSF 来满足该机制对应用程序提出的要求。\n\nJava EE Security 提供的所有认证机制都通过其自身的 `AuthenticationMechanismDefinition`\
  \ 注解进行安装和配置。该注解告诉容器要安装哪种类型的认证机制以及使用何种配置。该注解可以放置在类路径上的几乎所有类上。从逻辑上讲，它与 `@FacesConfig`\
  \ 注解非常契合。以下是一个示例：\n\n```\n@CustomFormAuthenticationMechanismDefinition(\n    loginToContinue\
  \ = @LoginToContinue(\n        loginPage = \"/login.xhtml\",\n        errorPage\
  \ = \"\"\n    )\n)\n@FacesConfig @ApplicationScoped\npublic class ApplicationConfig\
  \ {\n    // ...\n}\n```\n\n这里一个可能不太理想的要求是，必须指定 `errorPage` 属性并将其设置为空字符串。之所以需要这样，是因为\
  \ *@LoginToContinue* 元素为实际的错误页面提供了一个默认值。在 JSF 中，我们很少使用显式的错误页面来显示错误，而是重新显示原始页面，并通过\
  \ faces 消息在其上渲染错误信息。\n\n请注意，当前版本的 Java EE Security 只允许同时激活一个认证机制。从技术上讲，当容器遇到 `@CustomFormAuthenticationMechanismDefinition`\
  \ 注解时，它会在系统中添加一个类型为 `HttpAuthenticationMechanism` 的已启用 CDI bean。了解这一点很重要，因为它是一个常规的\
  \ CDI bean，意味着我们可以注入它、装饰它、拦截它，并且基本上可以对其执行我们通常对 CDI bean 能做的所有操作。\n\n`loginToContinue`\
  \ 属性用于配置当调用者试图访问受保护视图时容器转发到的视图。这被称为“容器发起的认证”；由容器启动认证对话，而非应用程序。\n\n请注意，默认是*转发*到登录页面，这意味着如果调用者试图访问\
  \ [`example.com/foo.xhtml`](https://example.com/foo.xhtml) ，并且 `/foo.xhtml` 是受保护的，调用者地址栏中仍将显示\
  \ `/foo.xhtml`，而不是 `/login.xhtml`。然而，回发目标是 `/login.xhtml`，因此在输入凭证后，调用者会在地址栏中看到这个地址。或者，我们也可以配置\
  \ `loginToContinue` 属性以使用重定向。\n\n```\n@CustomFormAuthenticationMechanismDefinition(\n\
      loginToContinue = @LoginToContinue(\n        loginPage = \"/login.xhtml\",\n\
          useForwardToLogin = false,\n        errorPage = \"\"\n    )\n)\n@FacesConfig\
  \ @ApplicationScoped\npublic class ApplicationConfig {\n    // ...\n}\n```\n\n\n\
  \n## 设置身份存储\n\n在声明了安全约束并设置了用于身份验证的机制后，还剩下最后一个难题：设置包含调用者数据（如凭证、姓名和角色）的工件。在 Java EE\
  \ Security 中，这个工件被称为身份存储（identity store）。\n\nJava EE 提供了两种开箱即用的身份存储：一种用于连接数据库，另一种用于连接\
  \ LDAP（轻量级目录访问协议）。Java EE Security 参考实现（Soteria）还额外附带了一个嵌入式身份存储。大多数应用服务器都提供自己的额外身份存储，这些存储通常配置在应用程序外部（例如，通过管理控制台、CLI\
  \ 或存储在服务器内部的 XML 配置文件）。\n\n设置和配置 Java EE Security 提供的身份存储以及 RI 提供的身份存储，其方式与身份验证机制类似：通过\
  \ `IdentityStoreAnnotation`。就像身份验证机制的版本一样，这将导致容器向系统添加一个启用的 CDI bean，这次是实现 `IdentityStore`\
  \ 接口的 bean。\n\n下面展示了一个示例，以及我们之前对身份验证机制的定义：\n\n```\n@CustomFormAuthenticationMechanismDefinition(\n\
      loginToContinue = @LoginToContinue(\n        loginPage = \"/login.xhtml\",\n\
          useForwardToLogin = false,\n        errorPage = \"\"\n    )\n)\n@EmbeddedIdentityStoreDefinition({\n\
      @Credentials(\n        callerName = \"admin@example.com\",\n        password\
  \ = \"secret1\",\n        groups = { \"VIEW_USER_PAGES\", \"VIEW_ADMIN_PAGES\" }\n\
      ),\n    @Credentials(\n        callerName = \"user@example.com\",\n        password\
  \ = \"secret2\",\n        groups = { \"VIEW_USER_PAGES\" })\n    )\n})\n@FacesConfig\
  \ @ApplicationScoped\npublic class ApplicationConfig {\n    // ...\n}\n```\n\n上述代码会创建一个嵌入式（内存中）存储，其中包含两个调用者（用户），第一个用户属于“VIEW_USER_PAGES”和“VIEW_ADMIN_PAGES”组，第二个用户仅属于“VIEW_USER_PAGES”组。身份验证机制将使用此身份存储来验证凭证（调用者名称和密码）是否匹配，如果匹配，则从身份存储中获取正确的组。\n\
  \n细心的读者可能会注意到术语发生了变化。之前我们谈论的是“角色”，而突然间变成了“组”。这是错误吗？嗯，并非如此。组和角色有细微差别。对于容器来说，两者都只是不透明的字符串，但组可以选择性地映射到角色。我们在此不进一步详述此过程，但只需说明，默认情况下，Java\
  \ EE 强制要求所谓的 1:1 组到角色映射，这简单意味着组和角色是相同的。\n\n为了更好地理解身份存储，我们在此再举两个例子。第一个例子，我们将查看 Java\
  \ EE Security API 提供的身份存储之一——数据库身份存储。此存储使用 `@DatabaseIdentityStoreDefinition` 注解激活和配置。需要配置的三个最重要的属性是：数据源（代表\
  \ SQL 数据库）、根据调用者名称获取（已哈希！）密码的 SQL 查询，以及根据调用者名称识别调用者所属组的 SQL 查询。下面给出一个示例：\n\n```\n\
  @CustomFormAuthenticationMechanismDefinition(\n    loginToContinue = @LoginToContinue(\n\
          loginPage = \"/login.xhtml\",\n        errorPage = \"\"\n    )\n)\n@DatabaseIdentityStoreDefinition(\n\
      dataSourceLookup = \"java:app/MyDataSource\",\n    callerQuery = \"SELECT password\
  \ FROM caller WHERE name = ?\",\n    groupsQuery = \"SELECT name FROM groups WHERE\
  \ caller_name = ?\"\n)\n@DataSourceDefinition(\n    name = \"java:app/MyDataSource\"\
  ,\n    className = \"org.h2.jdbcx.JdbcDataSource\",\n    url=\"jdbc:h2:~/test;DB_CLOSE_ON_EXIT=FALSE\"\
  \n)\n@FacesConfig @ApplicationScoped\npublic class ApplicationConfig {\n    // ...\n\
  }\n```\n\n在此示例中，使用 `org.h2.jdbcx.JdbcDataSource` 驱动程序为 H2 数据库定义了一个数据源。自然，对于任何拥有\
  \ JDBC 驱动程序的数据库，都可以类似地完成此操作。或者，数据源可以在应用程序外部定义。我们使用的调用者查询是“select password from caller\
  \ where name = ?”，这意味着我们假设一个表至少包含两列——一列保存调用者名称，另一列保存哈希后的密码。例如，可以通过以下 SQL 语句创建这样的表：\n\
  \n```\nCREATE TABLE caller(\n    name VARCHAR(32) PRIMARY KEY,\n    password VARCHAR(255)\n\
  )\n```\n\n我们用于组的查询是“select name from groups where caller_name = ?”，这假设一个表至少包含两列——调用者名称和组名称，调用者所属的每个组对应一行。例如，可以通过以下\
  \ SQL 语句创建这样的表：\n\n```\nCREATE TABLE caller_groups(\n    caller_name VARCHAR(32),\n\
      name VARCHAR(32)\n)\n```\n\n在填充调用者表时，必须注意密码列默认使用哈希算法，即 `PBKDF2WithHmacSHA256`。可以通过设置迭代次数、密钥大小和盐值大小来（应该）自定义此算法。\n\
  \n除了使用 Java EE Security API 提供的身份存储，我们还可以选择提供自己的自定义身份存储。一个常见的用例是使用应用程序自身的服务来加载特定于应用程序的用户数据。\n\
  \n下面展示了这样一个身份存储的示例：\n\n```\n@ApplicationScoped\npublic class UserServiceIdentityStore\
  \ implements IdentityStore {\n\n@Inject\n    private UserService userService;\n\n\
  @Override\n    public CredentialValidationResult validate(Credential credential)\
  \ {\n        UsernamePasswordCredential login =\n            (UserNamePasswordCredential)\
  \ credential;\n        String email = login.getCaller();\n        String password\
  \ = login.getPasswordAsString();\n\nOptional<User> optionalUser =\n            userService.findByEmailAndPassword(email,\
  \ password);\n\nif (optionalUser.isPresent()) {\n            User user = optionalUser.get();\n\
              return new CredentialValidationResult(\n                user.getEmail(),\n\
                  user.getRolesAsStrings()\n            );\n        }\n        else\
  \ {\n            return CredentialValidationResult.INVALID_RESULT;\n        }\n\
      }\n}\n```\n\n无需特定的注册；上述类只需存在于应用程序中（在其类路径上）。有了这样的自定义身份存储，`ApplicationConfig`\
  \ 类就不需要任何身份存储的配置了。\n\n```\n@CustomFormAuthenticationMechanismDefinition(\n    loginToContinue\
  \ = @LoginToContinue(\n        loginPage = \"/login.xhtml\",\n        errorPage\
  \ = \"\"\n    )\n)\n@FacesConfig @ApplicationScoped\npublic class ApplicationConfig\
  \ {\n    // ...\n}\n```\n\n上面给出的 `UserServiceIdentityStore` 将大部分工作委托给 `UserService`，后者负责处理应用程序中的\
  \ `User` 实体。全面讨论此类服务超出了本书的范围，但我们可以想象它可以使用，例如，JPA 来持久化和加载 `User` 实体。我们的自定义身份存储使用该服务，尝试根据通过凭证传入的用户名和密码来查找\
  \ `User`。如果返回了 `User` 实例，则意味着该名称对应一个现有用户，并且密码正确。在这种情况下，身份存储会返回 `CredentialValidationResult`，它执行两项操作：指示身份验证成功，并向容器提供最终用于为当前请求设置已验证身份的数据。如果服务找不到该用户，则说明用户名或密码错误。在这种情况下，存储返回\
  \ `INVALID_RESULT` 以指示身份验证未成功。\n\n\n\n## 提供自定义 JSF 代码\n\n在前面的章节中，我们首先定义了安全约束（哪些视图受保护），然后设置了认证机制（调用者如何与我们的应用交互以进行认证），最后设置了身份存储（调用者数据存放的位置）。\n\
  \n现在，我们需要将自定义代码接入认证流程。这主要通过提供认证机制在需要收集调用者凭证（本例中为电子邮件和密码）时指向的视图来实现。\n\n登录页面可以保持相对简单——一个标准表单页面，包含两个绑定到后台\
  \ Bean 的输入字段，以及一个提交按钮。\n\n```\n<!DOCTYPE html>\n<html lang=\"en\"\n    xmlns:=\"\
  http://www.w3.org/1999/xhtml\"\n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n\
  >\n    <h:head>\n        <title>登录</title>\n    </h:head>\n    <h:body>\n        <h1>登录</h1>\n\
          <h:form>\n            <h:outputLabel for=\"email\" value=\"电子邮件\" />\n            <h:inputText\
  \ id=\"email\" value=\"#{login.email}\" />\n            <br />\n            <h:outputLabel\
  \ for=\"password\" value=\"密码\" />\n            <h:inputSecret id=\"password\" value=\"\
  #{login.password}\" />\n            <br />\n            <h:commandButton value=\"\
  登录\" action=\"#{login.submit}\" />\n            <h:messages />\n        </h:form>\n\
      </h:body>\n</html>\n```\n\n上面的页面是一个完全正常的 JSF 视图。这特别意味着，与 FORM 认证中经典的 HTML `<form\
  \ method=\"post\" action=\"j_security_check\">` 不同，认证机制不会以任何方式监控回发 URL，因此对收集凭证的输入元素没有任何限制。\n\
  \n相反，JSF 后台 Bean 必须收集这些凭证，然后以编程方式传递它们，并通知认证机制继续对话。在传递凭证之前，JSF 可以自由地进行自己的验证，并与调用者进行自己的对话，而无需认证机制参与其中。请注意，命令按钮明确不使用\
  \ Ajax 提交。你也可以这样做，但那样的话，普通浏览器就不会提示最终用户代表它记住登录凭证。\n\n下面展示了一个处理登录调用的后台 Bean 的完整示例。我们将在下文逐一讨论各个部分。\n\
  \n```\n@Named @RequestScoped\npublic class Login {\n\n@NotNull\n    @Email\n    private\
  \ String email;\n\n@NotNull\n    @Size(min = 8, message = \"密码长度至少为 8 个字符\")\n    private\
  \ String password;\n\n@Inject\n    private SecurityContext securityContext;\n\n\
  @Inject\n    private ExternalContext externalContext;\n\n@Inject\n    private FacesContext\
  \ facesContext;\n\npublic void submit() {\n        switch (continueAuthentication())\
  \ {\n            case SEND_CONTINUE:\n                facesContext.responseComplete();\n\
                  break;\n\ncase SEND_FAILURE:\n                facesContext.addMessage(null,\
  \ new FacesMessage(\n                    FacesMessage.SEVERITY_ERROR, \"登录失败\",\
  \ null));\n                break;\n\ncase SUCCESS:\n                facesContext.addMessage(null,\
  \ new FacesMessage(\n                    FacesMessage.SEVERITY_INFO, \"登录成功\", null));\n\
                  break;\n\ncase NOT_DONE:\n                // 此处不会发生\n        }\n\
      }\n\nprivate AuthenticationStatus continueAuthentication() {\n        return\
  \ securityContext.authenticate(\n            (HttpServletRequest) externalContext.getRequest(),\n\
              (HttpServletResponse) externalContext.getResponse(),\n            AuthenticationParameters.withParams().credential(\n\
                  new UsernamePasswordCredential(email, password))\n        );\n    }\n\
  \npublic String getEmail() {\n        return email;\n    }\n\npublic void setEmail(String\
  \ email) {\n        this.email = email;\n    }\n\npublic String getPassword() {\n\
          return password;\n    }\n\npublic void setPassword(String password) {\n\
          this.password = password;\n    }\n}\n```\n\n我们以两个与所收集凭证对应的实例变量开始后台 Bean。\n\
  \n```\n@NotNull\n@Email\nprivate String email;\n\n@NotNull\n@Size(min = 8, message\
  \ = \"密码长度至少为 8 个字符\")\nprivate String password;\n```\n\n这清楚地展示了相对于 FORM 认证机制的优势，即我们可以使用\
  \ Bean 验证轻松地预先验证用户的输入。由于 JSF 内置了与 Bean 验证的集成，如果输入未通过验证，将提供一个标准的 faces 消息用于渲染。\n\n\
  接下来，我们定义了注入所需的上下文对象。这些对象是：\n\n```\n@Inject\nprivate SecurityContext securityContext;\n\
  \n@Inject\nprivate ExternalContext externalContext;\n\n@Inject\nprivate FacesContext\
  \ facesContext;\n```\n\n细心的读者会认出 `ExternalContext` 和 `FacesContext` 是两个众所周知的 JSF\
  \ 原生类，而 `SecurityContext` 则是例外。这个类来自 Java EE Security，我们将在这里使用它与认证机制进行通信。\n\n继续对话的过程发生在\
  \ `continueAuthentication()` 方法中，如下所示：\n\n```\nprivate AuthenticationStatus continueAuthentication()\
  \ {\n    return securityContext.authenticate(\n        (HttpServletRequest) externalContext.getRequest(),\n\
          (HttpServletResponse) externalContext.getResponse(),\n        AuthenticationParameters.withParams().credential(\n\
             new UsernamePasswordCredential(email, password))\n    );\n}\n```\n\n\
  调用 `SecurityContext#authenticate()` 将再次触发认证机制。由于该机制将处于等待传递凭证的状态，它确实会查找我们传入的凭证，并使用它们继续。正如我们稍后将看到的，我们也可以请求丢弃任何可能存在的状态并开始新的对话。请注意，我们必须将请求和响应对象转换为\
  \ `HttpServletRequest` 和 `HttpServletResponse`。不幸的是，这是必需的，因为 `ExternalContext` 抽象了\
  \ Servlet 和 Portlet 请求，并且对于这两个对象只返回 `Object`。\n\n`SecurityContext#authenticate()`\
  \ 方法返回一个状态，该状态大致指示了认证机制所执行的操作。我们 JSF 后台 Bean 的动作方法必须处理以下情况：\n\n```\nswitch (continueAuthentication())\
  \ {\n    case SEND_CONTINUE:\n        facesContext.responseComplete();\n        break;\n\
  \ncase SEND_FAILURE:\n        facesContext.addMessage(null, new FacesMessage(\n\
              FacesMessage.SEVERITY_ERROR, \"登录失败\", null));\n        break;\n\ncase\
  \ SUCCESS:\n        facesContext.addMessage(null, new FacesMessage(\n            FacesMessage.SEVERITY_INFO,\
  \ \"登录成功\", null));\n        break;\n\ncase NOT_DONE:\n        // 此处不会发生\n}\n```\n\
  \n可以看出，有四种可能的结果。\n\n第一种是 `SEND_CONTINUE`，基本上意味着“认证进行中”。当认证机制重新接管对话时（例如，通过渲染自己的响应，或者更可能的是，通过将调用者重定向到新位置），它会返回此状态。JSF\
  \ 后台 Bean 应通过调用 `FacesContext#responseComplete()` 确保 JSF 生命周期结束，并且不再以任何方式与响应本身交互。\n\
  \n第二种是 `SEND_FAILURE`，基本上意味着“认证失败”。当认证机制无法验证所提供的凭证时，会返回此状态。在大多数情况下，这是因为调用者提供了错误的凭证。JSF\
  \ 后台 Bean 可以通过设置 faces 消息并重新显示登录表单来响应此情况。\n\n\n\n第三个状态是 SUCCESS，表示“身份验证成功”。当身份验证机制成功验证所提供的凭证时，会返回此状态。只有在返回此状态后，`HttpServletRequest#getUserPrincipal()`、`SecurityContext#getCallerPrincipal()`\
  \ 等方法才会返回非空值，以表明当前调用者已通过身份验证。JSF 后台 bean 可以通过多种方式对此做出响应（例如，设置 faces 消息并继续渲染视图，或自行发起重定向）。\n\
  \n第四个也是最后一个状态是 NOT_DONE，当身份验证机制选择完全不进行身份验证时返回此状态。例如，当身份验证机制被预先调用，但身份验证似乎并非必要时，就会发生这种情况。通常，JSF\
  \ 后台 bean 在此处无需采取任何特殊操作。\n\n## 调用者发起的身份验证\n\n之前的代码讨论了未经验证的调用者尝试访问受保护资源（URL/页面）时，身份验证对话框自动启动的情况。由于此身份验证对话框由容器启动，我们称之为“容器发起的身份验证”。\n\
  \n另一种情况是调用者显式启动身份验证对话框（例如，通过点击“登录”按钮）。由于调用者启动此对话框，我们称之为“调用者发起的身份验证”。\n\n在调用者发起的身份验证情况下，核心身份验证机制被直接调用，并且平台提供的“登录以继续”功能被跳过。这意味着，如果身份验证机制依赖于“登录以继续”来重定向到登录页面，并在身份验证后重定向回受保护资源，那么当应用程序以编程方式触发身份验证时，这两个操作都不会发生。\n\
  \n我们之前通过注解定义的 `CustomFormAuthenticationMechanism` 确实是一种使用平台“登录以继续”服务的机制，因此我们将通过导航到之前使用的同一个登录视图来启动身份验证对话框。为了表明这是一个新的登录，提供了一个额外的请求参数。我们启动的视图如下所示：\n\
  \n```\n<!DOCTYPE html>\n<html lang=\"en\"\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\
  \n    xmlns:f=\"http://xmlns.jcp.org/jsf/core\"\n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\
  \n    xmlns:c=\"http://xmlns.jcp.org/jsp/jstl/core\"\n>\n    <h:head>\n        <title>欢迎</title>\n\
      <h:head>\n    <h:body>\n        <c:if test=\"#{not empty request.userPrincipal}\"\
  >\n            <p>已登录为 #{request.userPrincipal}</p>\n        </c:if>\n        <c:if\
  \ test=\"#{empty request.userPrincipal}\">\n            <h:form>\n                <h:button\
  \ value=\"登录\" outcome=\"/login\">\n                    <f:param name=\"new\" value=\"\
  true\" />\n                </h:button>\n            </h:form>\n        </c:if>\n\
      </h:body>\n</html>\n```\n\n在后台 bean 中，我们将注入两个额外的对象：一个用于获取和存储上述请求参数的实例，以及一个对\
  \ Flash 的引用，我们稍后将使用它。\n\n```\n@Inject\nprivate Flash flash;\n\n@Inject @ManagedProperty(\"\
  #{param.new}\")\nprivate boolean isNew;\n```\n\n托管 bean 的作用域需要更改为 `@ViewScoped`，这样我们就能在登录表单回发后保留\
  \ `isNew` 实例变量的值。\n\n一个重要的补充是在 `SecurityContext#authenticate()` 方法中，我们现在将提供一个额外的参数：`newAuthentication`。不过，身份验证机制严格来说并不需要这个参数，它只是足够智能，能够区分初始的新身份验证和继续正在进行的身份验证对话框。然而，当调用者处于身份验证对话框中间，然后导航离开，稍后又显式点击登录按钮时，事情就变得复杂了。如果与该对话框关联的状态在那时尚未过期，身份验证机制将不知道需要一个新的身份验证，并且很可能会继续那个已中止但仍然有效的对话框。\n\
  \n为了防止这种情况，我们可以通过将 `newAuthentication` 设置为 `true` 来强制进行新的身份验证。这将丢弃所有现有状态。修改后的 `continueAuthentication()`\
  \ 方法如下所示：\n\n```\nprivate AuthenticationStatus continueAuthentication() {\n    return\
  \ securityContext.authenticate(\n        (HttpServletRequest) externalContext.getRequest(),\n\
          (HttpServletResponse) externalContext.getResponse(),\n        AuthenticationParameters.withParams()\n\
             .newAuthentication(isNew).credential(\n               new UsernamePasswordCredential(email,\
  \ password))\n    );\n}\n```\n\n请注意，此版本既可用于继续对话框的情况，也可用于启动新对话框的情况。当我们继续对话框时，`isNew`\
  \ 将简单地设为 `false`，这恰好也是未指定该参数时的默认值。\n\n当使用 `CustomFormAuthenticationMechanism` 时，我们知道在调用者发起的身份验证中提供凭证后，不会发生任何重定向或其他对响应的写入操作，因此这为我们提供了一个方便的位置来处理调用者通过身份验证后重定向到登录后页面的操作：即\
  \ SUCCESS 情况。\n\n```\ncase SUCCESS:\n    flash.setKeepMessages(true);\n    facesContext.addMessage(null,\
  \ new FacesMessage(\n        FacesMessage.SEVERITY_INFO, \"登录成功\", null));\n    externalContext.redirect(\n\
          externalContext.getRequestContextPath() + \"/index.xhtml\");\n    break;\n\
  ```\n\n我们在此处将调用者重定向到 `index.xhtml` 登录后页面。请注意，这也是调用者发起身份验证对话框的视图，但这在本例中只是巧合。通常，应用程序开发者可以完全自由地选择将调用者重定向到的视图甚至\
  \ URL。通常，会选择某种登录后页面，它可以是应用程序的首页，也可以是调用者主要角色对应的仪表板。正如我们上面提到的，当返回 SUCCESS 时，调用者已完全通过身份验证。这意味着我们可以查询调用者的角色，并利用这些角色来决定重定向到何处。\n\
  \n展望：未来版本的 Java EE Security 可能会引入一种混合选项，其中调用者发起的身份验证仍然可以像容器发起的身份验证一样以相同的重定向开始，并允许应用程序提供重定向回的\
  \ URL。\n\n\n\n## 记住我（Remember Me）\n\n一旦调用者在 JSF（Web）应用程序中通过身份验证，我们自然不希望每次请求都要求调用者重新进行身份验证。为了防止这种情况，成功身份验证的结果通常会以某种方式与调用者的\
  \ HTTP 会话关联。实际上，`CustomFormAuthenticationMechanism` 内部正是使用 Java EE Security 提供的“自动应用会话”服务来实现这一点的。该服务存储与所述成功身份验证相关的数据（至少包括调用者名称以及调用者所属的任何组）。虽然具体实现最终取决于这些数据的确切存储位置和生命周期，但在实践中，它们通常位于服务器内存中与\
  \ HTTP 会话关联的一个特殊区域。这个区域之所以特殊，是因为它通常是会话作用域的，但数据无法通过 `HttpSession#getAttribute()`\
  \ 访问。\n\n为了避免耗尽服务器内存，HTTP 会话会在一定时间后过期。典型的过期时间在 10 分钟到 1 小时之间。如果调用者在此时间之后访问应用程序，则需要重新进行身份验证。\n\
  \n然而，即使不活动时间长达一小时，重新进行身份验证也常常是不可取的。但出于上述服务器资源耗尽的原因，延长 HTTP 会话的时长又是不可行的。\n\n这时，“记住我”（remember-me）就派上了用场。“记住我”是一个略带俏皮的说法，指的是一个过程：调用者的凭证被交换为一个令牌，并且该令牌通常存储在一个与\
  \ HTTP 会话 cookie 不同的 cookie 中，并且具有更长的生存时间。\n\n“记住我”令牌实际上充当了调用者的新凭证，同时不会暴露调用者的原始密码。“记住我”令牌基本上可以多次分发，例如，按调用者用于连接应用程序的每个设备或\
  \ IP（互联网协议）分发一次。必须注意，虽然令牌不会暴露调用者的原始凭证，但它仍然充当着访问调用者账户的钥匙，因此应像对待任何其他类型的凭证一样，采取同样的预防措施。具体来说，包含“记住我”令牌的\
  \ cookie 应仅通过 HTTPS/SSL 发送，并且应用程序不应逐字存储实际令牌，而应存储其强哈希值。\n\n由于使用“记住我”的主要原因是避免耗尽服务器内存并实现长生命周期，因此“记住我”令牌几乎总是存储在稳定存储中（例如，数据库）。因此，从这种存储中查找数据比从服务器内存中查找成本更高，如果每次请求都需要执行此操作，可能会严重影响性能，尤其是在一直有大量\
  \ Ajax 请求的情况下。\n\n出于这个原因，“记住我”几乎总是与某种缓存结合使用。`CustomFormAuthenticationMechanism`\
  \ 所使用的服务的模块化特性，使得“记住我”可以插入到上述的自动应用会话服务与实际的身份验证机制之间。这样，我们实际上获得了一种内存层次结构：首先尝试在 HTTP\
  \ 会话存储中查找身份验证数据，如果找不到，则尝试“记住我”服务，如果该服务也不包含数据，则最后尝试身份验证机制。\n\n要使用“记住我”，需要完成两件事。\n\
  \n1.  为已安装的身份验证机制激活“记住我”服务\n\n2.  提供一个能够分发和验证“记住我”令牌的特殊身份存储\n\n### 激活“记住我”服务\n\n\
  Java EE Security 中的“记住我”服务由一个拦截器（Interceptor）表示。通过拦截器绑定注解 `@RememberMe`，可以轻松地将[“记住我”服务]应用于我们自己的自定义身份验证机制，即我们拥有其源代码的机制。不幸的是，当需要将这些注解应用于我们没有源代码的\
  \ bean，甚至不知道其确切实现类型的 bean 时，就没那么容易了。\n\n由于我们在上述示例中一直使用的 `CustomFormAuthenticationMechanism`\
  \ 确实属于后一种类型，因此需要做更多的工作。本质上，我们需要获取容器提供的实际 `CustomFormAuthenticationMechanism` 实现的引用，然后使用\
  \ CDI 2.0 的 `InterceptionFactory` 以编程方式添加 `@RememberMe` 注解。然后，结果应从替代生产者方法中返回。\n\n\
  以下代码通过我们之前展示的 `ApplicationConfig` bean 中的新方法 `produceAuthenticationMechanism()`\
  \ 演示了这一点：\n\n```\n@CustomFormAuthenticationMechanismDefinition(\n    loginToContinue\
  \ = @LoginToContinue(\n        loginPage = \"/login.xhtml\",\n        useForwardToLogin\
  \ = false,\n        errorPage = \"\"\n    )\n)\n@FacesConfig @ApplicationScoped\n\
  @Alternative @Priority(500)\npublic class ApplicationConfig {\n\n@Produces\n    public\
  \ HttpAuthenticationMechanism produceAuthenticationMechanism(\n        InterceptionFactory<HttpAuthenticationMechanismWrapper>\n\
          interceptionFactory, BeanManager beanManager\n    ) {\n        @RememberMe\n\
          class RememberMeClass {};\n        interceptionFactory.configure().add(\n\
              RememberMeClass.class.getAnnotation(RememberMe.class));\n        return\
  \ interceptionFactory.createInterceptedInstance(\n            new HttpAuthenticationMechanismWrapper(\n\
                  (HttpAuthenticationMechanism) beanManager\n                .getReference(beanManager\n\
                  .resolve(beanManager\n                .getBeans((HttpAuthenticationMechanism.class).stream()\n\
                  .filter(b -> b.getBeanClass() != ApplicationConfig.class)\n                .collect(Collectors.toSet())),\n\
                      HttpAuthenticationMechanism.class,\n                    beanManager.createCreationalContext(null))));\n\
      }\n}\n```\n\n`ApplicationConfig` bean 使用了 `@Alternative` 和 `@Priority` 注解进行标注。`@Alternative`\
  \ 在此处用于指示该生产者不是普通的常规生产者，而是一个应被调用来替代任何现有生产者或 bean 的生产者。也就是说，我们在此处生成的 bean 是 CDI 原本会为注入选择的具有相同类型的\
  \ bean 的替代品。`@Priority` 用于启用（激活）我们的替代生产者。没有此注解，生产者虽然存在但未被启用，这意味着 CDI 不会调用它。启用替代品的另一种方法是使用\
  \ `beans.xml`。这里的数字 500 用于在启用了多个替代品时进行选择。在这种情况下，将选择数字最大的那个。\n\n上面显示的代码使用了较为知名的 CDI\
  \ 模式 `BeanManager#getBeans()/resolve()/getReference()` 来获取容器提供的 `CustomFormAuthenticationMechanism`。这种模式比更简单的\
  \ `CDI.current().select(...)` 变体更冗长，但它允许我们过滤掉代表生产者方法的 `Bean<T>`。从生产者方法内部的该 `Bean<T>`\
  \ 获取引用会再次调用同一个生产者方法，从而导致递归调用，最终导致堆栈溢出。不言而喻，这是不希望的，因此我们才需要过滤掉那个特定的 `Bean<T>`。\n\n\
  \n\n从 `BeanManager#getReference()` 返回的 bean 实例几乎肯定是一个代理；`CustomFormAuthenticationMechanism`\
  \ 被指定为应用作用域，并且它隐式地使用了拦截器。由于对现有代理进行代理存在技术难度（考虑到生成的代理通常是 final 类型，并且会使用代理缓存），CDI 2.0\
  \ 对其能够创建被拦截实例的对象类型施加了限制。为了绕过这个限制，我们别无选择，只能像上述代码所示那样，插入一个额外手动创建的“透传包装器” `HttpAuthenticationMechanismWrapper`\
  \ 实例。该包装器的代码如下：\n\n```\npublic class HttpAuthenticationMechanismWrapper\n    implements\
  \ HttpAuthenticationMechanism\n{\n    private HttpAuthenticationMechanism wrapped;\n\
  \npublic HttpAuthenticationMechanismWrapper() {\n        //\n    }\n\npublic HttpAuthenticationMechanismWrapper\n\
          (HttpAuthenticationMechanism httpAuthenticationMechanism)\n    {\n        this.wrapped\
  \ = httpAuthenticationMechanism;\n    }\n\npublic HttpAuthenticationMechanism getWrapped()\
  \ {\n        return wrapped;\n    }\n\n@Override\n    public AuthenticationStatus\
  \ validateRequest(\n        HttpServletRequest request,\n        HttpServletResponse\
  \ response,\n        HttpMessageContext context) throws AuthenticationException\n\
      {\n        return getWrapped().validateRequest(request, response, context);\n\
      }\n\n@Override\n    public AuthenticationStatus secureResponse(\n        HttpServletRequest\
  \ request,\n        HttpServletResponse response,\n        HttpMessageContext context)\
  \ throws AuthenticationException\n    {\n        return getWrapped().secureResponse(request,\
  \ response, context);\n    }\n    @Override\n    public void cleanSubject(\n        HttpServletRequest\
  \ request,\n        HttpServletResponse response,\n        HttpMessageContext context)\n\
      {\n        getWrapped().cleanSubject(request, response, context);\n    }\n}\n\
  ```\n\n展望：预计未来版本的 Java EE Security 会为上述任务添加一个便捷方法，从而大大简化此操作。\n\n## 登出\n\n无论使用哪种登录方法，调用方有时可能希望显式登出。在\
  \ Java EE 中，正常的登录（身份验证）通常主要仅对每个请求有效，但各种身份验证机制或其使用的服务（例如 `@AutoApplySession` 和 `@RememberMe`）可能会在单个请求之外保持状态，并在每个后续请求中自动重新验证调用方。\n\
  \n此状态可能保存在多个位置：cookie 中、HTTP 会话中、客户端存储中等。为了登出，我们必须确保清除所有这些状态。在 JSF 中，我们可以通过调用 `HttpServletRequest#logout()`\
  \ 方法简单地实现这一点。这将立即从当前请求中移除已验证的身份，并调用身份验证机制的 `cleanSubject()` 方法，该方法进而会移除其使用的任何会话数据、cookie\
  \ 等。\n\n以下是一个示例：\n\n```\n@Named @RequestScoped\npublic class Logout {\n\n    @Inject\n\
      private HttpServletRequest request;\n\n    public void submit() throws ServletException\
  \ {\n        request.logout();\n        request.getSession().invalidate();\n    }\n\
  }\n```\n\n请注意，为了完全登出，通常最佳实践是同时使会话失效。调用 `HttpServletRequest#logout()` 应该只移除身份验证机制使用的会话状态（如果有的话），而在完全登出后，我们通常也不希望任何其他会话状态残留。根据应用程序设计，通常在登出后还会将调用方重定向到应用程序的主页。\n\
  \n## 自定义 Principal\n\n我们可以从安全上下文中获取的默认 principal 除了名称，或者更准确地说，调用方 principal 名称（也称为用户\
  \ principal 名称）之外，包含的信息非常少。这通常是一个唯一名称，并且通常是（但不一定是）调用方用于身份验证的名称。\n\n在实践中，Web 应用程序几乎总是需要比这个名称更多的信息，并且通常需要一个更丰富的、特定于应用程序的模型对象来表示用户。此模型对象的生命周期需要与\
  \ principal 的生命周期紧密耦合。例如，如果调用方在请求中途登出，关联的模型对象必须立即消失；如果调用方紧接着（可能仍在同一个请求中）再次登录，则必须有一个新的模型对象可用。\n\
  \n有多种模式可以实现这一点，其中一些包括 Servlet 过滤器，另一些包含 CDI 生产者。然而，我们这里要展示的模式涉及自定义 principal。\n\n\
  自定义 principal 意味着从身份存储返回一个特定的 `Principal` 类型，而不是仅仅提供一个 `String` 并让容器决定类型。然后，这个特定的\
  \ `Principal` 类型可以*包含*我们的模型对象（聚合），或者*成为*模型对象（继承）。这里我们将给出一个聚合方法的示例。\n\n首先考虑以下自定义\
  \ Principal：\n\n```\npublic class UserPrincipal extends CallerPrincipal {\n\n    private\
  \ final User user;\n\n    public UserPrincipal(User user) {\n        super(user.getEmail());\n\
          this.user = user;\n    }\n\n    public User getUser() {\n        return\
  \ user;\n    }\n}\n```\n\n这个 principal 继承自 `javax.security.enterprise.CallerPrincipal`，它是\
  \ Java EE Security API 特定的调用方 principal 表示。\n\n有了这个 Principal 实现，我们现在可以调整之前介绍的身份存储，使其返回我们的自定义\
  \ principal。\n\n```\n@ApplicationScoped\npublic class UserServiceIdentityStore implements\
  \ IdentityStore {\n\n    @Inject\n    private UserService userService;\n\n    @Override\n\
      public CredentialValidationResult validate(Credential credential) {\n        UsernamePasswordCredential\
  \ login =\n            (UserNamePasswordCredential) credential;\n        String\
  \ email = login.getCaller();\n        String password = login.getPasswordAsString();\n\
  \n        Optional<User> optionalUser =\n            userService.findByEmailAndPassword(email,\
  \ password);\n\n        if (optionalUser.isPresent()) {\n            User user =\
  \ optionalUser.get();\n            return new CredentialValidationResult(\n                new\
  \ UserPrincipal(user), // Principal 而非 String。\n                user.getRolesAsStrings()\n\
              );\n        }\n        else {\n            return CredentialValidationResult.INVALID_RESULT;\n\
          }\n    }\n}\n```\n\n随后，我们可以再次从注入的安全上下文中访问我们的模型对象。\n\n```\n@Inject\nprivate\
  \ SecurityContext securityContext;\n[...]\nOptional<User> OptionalUser =\n            securityContext.getPrincipalsByType(UserPrincipal.class)\n\
                                       .stream()\n                                     .map(e\
  \ -> e.getUser())\n                                     .findAny();\n```\n\n\n\n\
  ## 基于访问权限的条件渲染\n\n在 Web 应用中，我们经常需要根据调用者是否已通过身份验证，以及（如果已通过验证）其所属的角色，来差异化渲染视图的某些部分。\n\
  \nJSF 组件标签实际上并不需要为此设置特殊属性，因为现有的隐式对象结合表达式语言已经足够强大，能够完成所需的大部分检查。\n\n最常见的检查之一是判断用户是否已通过身份验证。这在上述\
  \ `index.xhtml` 视图中已有简要展示：\n\n```\n<c:if test=\"#{not empty request.userPrincipal}\"\
  >\n    <p>已登录为 #{request.userPrincipal}</p>\n</c:if>\n```\n\n当然，你也可以在此处使用任何 JSF\
  \ 组件的 `rendered` 属性。\n\n```\n<ui:fragment rendered=\"#{not empty request.userPrincipal}\"\
  >\n    <p>已登录为 #{request.userPrincipal}</p>\n</ui:fragment>\n```\n\n然而，正如你在第 3 章的“JSTL\
  \ 核心标签”部分所学，这只会导致组件树略微冗长。此外，`rendered` 属性的检查会在 JSF 生命周期中反复执行，而 JSTL 标签仅在视图构建期间执行一次。\n\
  \n请注意，我们在这里使用的是隐式对象 `#{request}`，而不是更通用的 `SecurityContext`。这是因为在 Java EE 8 中，没有与\
  \ `SecurityContext` 对应的隐式 EL 对象可用。在 Java EE Security 以及 Servlet API（`request` 对象源自该\
  \ API，其类型为 `HttpServletRequest`）中，规定 `getUserPrincipal()` 返回 `null` 表示用户未通过身份验证。Java\
  \ EE Security 与表达式语言之间更好的对齐计划在未来的 Java EE 版本中实现。\n\n如前所述，另一个常见的检查是测试调用者是否属于特定角色。这里我们同样可以使用隐式对象\
  \ `#{request}`，如下所示：\n\n```\n<c:if test=\"#{request.isUserInRole('foo')}\">\n    <!--\
  \ 此处放置 foo 特有的内容 -->\n</c:if>\n```\n\n需要记住的是，正如本章开头所解释的，角色“foo”不必是我们通常意义上所说的“角色”。也就是说，它不必是像“admin”或“manager”这样的名称。实际上，对于视图中某个片段这种非常局部的使用场景，通常更倾向于使用粒度更细的名称（例如，“CAN_UPDATE_SALARY”）。一种常见的技术是将细粒度的角色映射到更粗粒度的角色，例如“ADMIN”。通过这种技术，用户被赋予这些粗粒度角色，而存储身份验证数据的数据库也只包含这些粗粒度角色。当像我们之前看到的身份存储为某个调用者检索此身份验证数据并看到“ADMIN”时，它会返回一个“ADMIN”所映射到的角色集合（例如，`{\"\
  CAN_UPDATE_SALARY\", \"CAN_ADJUST_MARGINS\", ...}`）。\n\n一个我们可以测试的特殊角色是“**”角色，它是\
  \ `#{not empty request.userPrincipal}` 检查的替代方案。该角色被隐式分配给任何已通过身份验证的调用者，但前提是应用程序没有以任何方式声明过它。如果应用程序声明了，“**”就会失去其特殊含义，而仅仅成为安全系统显式测试的另一个不透明字符串。使用“**”检查，我们在本节中展示的第一个片段如下所示：\n\
  \n```\n<c:if test=\"#{request.isUserInRole('**')}\">\n    <p>已登录为 #{request.userPrincipal}</p>\n\
  </c:if>\n```\n\n在标准的 Java EE 编程式 API 中，没有可用的方法来测试调用者是否属于两个或多个角色中的任何一个，或者是否属于所有两个或多个角色。如果需要，可以使用如下代码所示的工具方法：\n\
  \n```\npublic static boolean isInAnyRole(HttpServletRequest request, String... roles)\
  \ {\n    for (String roles : roles) {\n        if (request.isUserInRole(role)) {\n\
              return true;\n        }\n    }\n    return false;\n}\npublic static\
  \ boolean isInAllRoles(HttpServletRequest request, String... roles) {\n    for (String\
  \ roles : roles) {\n        if (!request.isUserInRole(role)) {\n            return\
  \ false;\n        }\n    }\n    return true;\n}\n```\n\n有时，我们不仅需要根据调用者的角色来差异化渲染视图内容，还需要考虑调用者被允许访问哪些其他视图（Web\
  \ 资源）。例如，在渲染导航菜单时（省略调用者无权访问的视图条目），或者以特殊方式（例如，用红色显示或旁边带有锁图标）渲染导航到调用者无权访问的视图的链接或按钮时，就会用到这一点。\n\
  \n实现此目的的传统方法是测试程序员已知的、能授予对给定视图访问权限的角色。虽然这看起来可能有效，但在实践中通常很脆弱，因为它让代码在假设存在特定角色/视图关系的情况下工作，而没有任何强有力的保证来确保这种关系确实成立。\n\
  \n一种更稳定的测试调用者是否有权访问给定视图的方法，就是直接测试这一点：调用者是否有权访问此视图（Web 资源）。`SecurityContext` 有一个方法几乎可以完全用于此目的：`SecurityContext#hasAccessToWebResource()`。由于\
  \ `SecurityContext` 既不是命名 bean 也不是隐式对象，我们必须创建一个小的辅助 bean 才能在 EL 中使用它。如下所示：\n\n```\n\
  @Named @ApplicationScoped\npublic class Security {\n\n@Inject\n    private SecurityContext\
  \ securityContext;\n\npublic boolean hasAccessToWebResource(String resource) {\n\
          return securityContext.hasAccessToWebResource(resource, \"GET\");\n    }\n\
  }\n```\n\n这里需要注意两点。\n\n首先，`hasAccessToWebResource()` 方法接受一个 Web 资源模式，该模式与我们之前看到的\
  \ `web.xml` 片段中用于 `url-pattern` 的模式相同。这接近于 JSF 视图，但并不完全相同。JSF 视图通常以与映射无关的方式指定（例如，`/foo`\
  \ 而不是 `/faces/foo` 或 `/foo.xhtml`）。然而，Web 资源模式必须是 URL 本身，并包含映射。\n\n其次，`hasAccessToWebResource()`\
  \ 要求我们指定要测试访问权限的 HTTP 方法。这是必需的，因为在 Java EE Security 中，约束实际上适用于每个 URL 和每个 HTTP 方法。例如，调用者可能有权\
  \ POST 到 `/foo.xhtml`，但无权 GET `/foo.xhtml`。由于我们将使用工具方法进行导航测试，`GET` 通常是正确的 HTTP 方法，但我们应该意识到有时可能需要测试其他\
  \ HTTP 方法。\n\n有了辅助 bean，我们现在可以轻松地检查对视图上目标资源的访问权限，并据此改变渲染效果。为了演示这一点，我们首先在 `web.xml`\
  \ 中定义三个新的 Web 资源约束。\n\n\n\n```\n<security-constraint>\n    <web-resource-collection>\n\
          <web-resource-name>Bar</web-resource-name>\n        <url-pattern>/bar.xhtml</url-pattern>\n\
      </web-resource-collection>\n    <auth-constraint>\n        <role-name>bar</role-name>\n\
      </auth-constraint>\n</security-constraint>\n<security-constraint>\n    <web-resource-collection>\n\
          <web-resource-name>Foo</web-resource-name>\n        <url-pattern>/foo.xhtml</url-pattern>\n\
      </web-resource-collection>\n    <auth-constraint>\n        <role-name>foo</role-name>\n\
      </auth-constraint>\n</security-constraint>\n<security-constraint>\n    <web-resource-collection>\n\
          <web-resource-name>Baz</web-resource-name>\n        <url-pattern>/baz.xhtml</url-pattern>\n\
      </web-resource-collection>\n    <auth-constraint>\n        <role-name>baz</role-name>\n\
      </auth-constraint>\n</security-constraint>\n```\n\n定义完这些约束后，我们可以在 `enabled`\
  \ 属性上通过访问检查来渲染指向它们的链接。\n\n```\n<h:link value=\"前往 Bar\" outcome=\"/bar\"\n    disabled=\"\
  #{not security.hasAccessToWebResource('/bar.xhtml')}\" />\n<h:link value=\"前往 Foo\"\
  \ outcome=\"/foo\"\n    disabled=\"#{not security.hasAccessToWebResource('/foo.xhtml')}\"\
  \ />\n<h:link value=\"前往 Baz\" outcome=\"/baz\"\n    disabled=\"#{not security.hasAccessToWebResource('/baz.xhtml')}\"\
  \ />\n```\n\n如果使用一个拥有“bar”和“foo”角色但没有“baz”角色的调用者进行身份验证，那么指向 `/baz` 的链接将被渲染为禁用状态。\n\
  \n## 跨站请求伪造保护\n\n跨站请求伪造（CSRF）是一种攻击方式，它使用户在未经同意甚至不知情的情况下，向某个他们可能已登录的站点发送请求。此类请求随后会产生某种副作用，这些副作用可能以特定方式对攻击者有利。\n\
  \n例如，假设你的银行有一个形如 `https:/example.com/transferAmount=4000&targetAccount=7836` 的 URL，其含义是“从我的账户向\
  \ ID 为 7836 的账户转账 4000 欧元。”在此语句中，“我的账户”是通过你与银行之间的登录会话（通常是一个 cookie）来确定的。现在，攻击者可能无法获取你的会话\
  \ cookie，但在这个例子中，只要你的浏览器在你登录银行账户的同时，在另一个标签页或窗口中访问了其他网站，并被诱骗发送了 `https:/example.com/transferAmount=4000&targetAccount=7836`\
  \ 这个请求（其中 `targetAccount` 参数被设置为攻击者控制的账户 ID），那么攻击者就无需获取 cookie 也能得逞。请注意，在实践中，不太可能使用\
  \ GET 请求和请求参数，而是会使用 POST 请求和 POST 参数。然而，对于这两种方式，都存在相同的基本漏洞。\n\n如果我们想保护应用程序免受此类恶意请求的攻击，其中一种方法是在请求中包含“某种东西”（即一个令牌），该令牌需要满足以下条件：\n\
  \n1.  特定于某个调用者。\n2.  在一段时间后过期。\n3.  难以被猜测。\n\n恰好 JSF 已经拥有满足这三项要求的东西，那就是在 JSF 表单中可以找到的\
  \ `javax.faces.ViewState` 隐藏参数。\n\n###### 注意\n\n不过这里有一个注意事项：只有在使用回发、服务器端状态保存，并且相关视图不是无状态的情况下，该参数才能完全满足这些要求。只有在这种情况下，`javax.faces.ViewState`\
  \ 的值才真正是一个令牌。由于这是默认设置，JSF 在这方面开箱即用相对安全，但一旦我们偏离这些默认设置（例如，通过使用无状态视图），这种保护就会受到损害。另请参阅第\
  \ 4 章中的“无状态表单”一节。\n\n除了这种隐式的 CSRF 保护之外，JSF 还提供了显式的 CSRF 保护。这种显式的 CSRF 保护会为所有情况添加一个令牌，并且额外增加了对“referer”和“origin”HTTP\
  \ 头的检查。请注意，对于传入的请求，通常不应信任 HTTP 头，因为它们很容易被伪造。然而，对于这种特定的攻击，我们试图防御的并非任意随机的 HTTP 请求，而是专门针对从受信任浏览器发送的请求。头部检查是在令牌检查之外的附加检查，并且令牌检查必须始终首先通过。\n\
  \n定义哪些视图应受 CSRF 令牌和额外头部检查保护的方式，与我们为视图定义角色的方式有些相似——即在部署描述符中定义一组 URL 模式。不过，这次使用的部署描述符是\
  \ `faces-config.xml`，而不是 `web.xml`。以下是在 `faces-config.xml` 中这些条目的示例：\n\n```\n<protected-views>\n\
      <url-pattern>/bar.xhtml</url-pattern>\n    <url-pattern>/foo.xhtml</url-pattern>\n\
      <url-pattern>/baz.xhtml</url-pattern>\n</protected-views>\n```\n\n请注意，这里的 `url-pattern`\
  \ 与 `web.xml` 中使用的模式完全相同。这里需要注意的一点是，尽管 `faces-config.xml` 是 JSF 特定的部署描述符，但这里的 `url-pattern`\
  \ 仍然是相对于应用程序根目录的完整 URL，这意味着它必须包含所有使用的映射，例如 `/faces/` 和 `.xhtml`。\n\n将包含上述 `protected-views`\
  \ 片段的 `faces-config.xml` 添加到我们本章一直在处理的示例应用程序代码中，将会在 `index.xhtml` 上渲染指向例如 `/bar.xhtml`\
  \ 的链接，其形式如下：\n\n```\n/bar.xhtml?javax.faces.Token=gdMoNbfOycv2v80gr\n```\n\n可以看到，`javax.faces.Token`\
  \ 请求参数已由 JSF 添加。该令牌与用户的 HTTP 会话绑定，因此如果 HTTP 会话过期，令牌也会过期。该令牌在密码学上是强壮的，这意味着它满足了上述\
  \ CSRF 保护令牌的所有三项要求。\n\n如果令牌被篡改（例如，我们使用 `xxMoNbfOycv2v80gr` 而不是 `gdMoNbfOycv2v80gr`），或者完全缺失（即我们请求\
  \ `/bar.xhtml`），JSF 将抛出 `javax.faces.application.ProtectedViewException`。如果链接来自无状态页面，JSF\
  \ 应用程序可以通过通知用户并允许重新渲染原始页面来处理此异常。在上面的例子中，这意味着重新渲染 `index.xhtml`。这样，真正的用户将获得一个新的 CSRF\
  \ 保护令牌，而攻击者则无法从原始请求中获得预期的副作用。\n\n如前所述，还有 referer 和 origin 头部检查。对于此检查，JSF 会检查 referer\
  \ 头部（如果可用）是否设置为源自同一应用程序的 URL。为了演示这一点，考虑第二个 JSF 应用程序，它只有一个空的 `faces-config.xml` 和以下视图：\n\
  \n```\n<!DOCTYPE html>\n<html lang=\"en\"\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\
  \n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n>\n    <h:head />\n    <h:body>\n\
          <h:outputLink value=\"http://localhost:8080/project/bar.xhtml?javax.faces.Token=gdMhNbfOycv2v80gr\"\
  >\n            测试\n        </h:outputLink>\n    </h:body>\n</html>\n```\n\n\n\n\
  假设我们第一个带有 CSRF 保护的应用程序 bar.xhtml 部署在 http://localhost:8080/project 上，点击第二个应用程序中的输出链接，将导致第一个应用程序再次抛出\
  \ javax.faces.application.ProtectedViewException。请注意，referer 是一个可选检查，仅在 referer\
  \ 头实际存在时才会执行，就像第二个应用程序中的链接那样。\n\n如果我们在浏览器的地址栏中直接输入 http://localhost:8080/project/bar.xhtml?javax.faces.Token=gdMhNbfOycv2v80gr，或者通过\
  \ wget 或 curl 等命令行工具直接请求它，则不会有 referer，请求将被接受。\n\n在实践中，GET 请求受 CSRF 攻击保护的价值较低，因为这些请求实际上*应该*是幂等的（不应有副作用，且仅应显示数据）。与其用\
  \ CSRF 保护令牌来屏蔽 GET 请求，更好的做法可能是重构应用程序，使其不包含非幂等的 GET 请求。\n\n不过，对于回发（postback）来说，CSRF\
  \ 保护令牌的工作方式大致相同。为了演示，请考虑将 /bar.xhtml 视图修改为以下内容：\n\n```\n<!DOCTYPE html>\n<html lang=\"\
  en\"\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\
  \n>\n    <h:head />\n    <h:body>\n        <h:form>\n            <h:commandButton\
  \ value=\"测试\" action=\"#{bar.submit}\" />\n        </h:form>\n    </h:body>\n</html>\n\
  ```\n\n渲染此页面将导致表单目标 URL 应用 CSRF 保护令牌，方式与我们之前看到的 GET 请求相同——例如：\n\n```\n<form method=\"\
  post\"\n    action=\"/project/bar.xhtml?javax.faces.Token=gdMhNbfOycv2v80gr\" ...>\n\
  ```\n\n因此，这与隐式的 javax.faces.ViewState 令牌（它始终是一个 POST 参数）是另一个不同之处。\n\n## Web 参数篡改防护\n\
  \nWeb 参数篡改是一种针对应用程序的攻击，攻击者会修改发送（回）到托管应用程序的服务器的参数值。如果应用程序没有正确验证这些值，攻击者可能会获得超出其权限的更多利益，或者有机会执行额外的攻击。\n\
  \n例如，假设一个 Web 应用程序渲染了一个角色列表，这些角色可以分配给其他用户，比如“用户”、“经理”和“销售”。攻击者可能会尝试修改回发的数据，将“用户”的选择改为“管理员”。如果服务器盲目地接受输入，并且“管理员”是一个存在的值，那么即使攻击者没有权限这样做，这也允许攻击者将“管理员”角色授予另一个用户。\n\
  \nJSF 对此类攻击的一个子集具有隐式保护；即，针对从选择组件（具体来说，基于 UISelectOne* 和 UISelectMany* 的组件）回发的值。其工作原理是，JSF\
  \ 在回发后要么从 javax.faces.ViewState 恢复视图（当使用完整状态保存时），要么重新创建视图（当使用部分状态保存时）。只有那些也被渲染过的值才会被接受。不过，通常的注意事项仍然适用，那就是在使用部分状态保存时，组件绑定的数据在回发前后必须保持一致。然而，通过使用视图作用域，这很容易实现。\n\
  \n为了演示，请考虑以下视图：\n\n```\n<!DOCTYPE html>\n<html lang=\"en\"\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\
  \n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n    xmlns:f=\"http://xmlns.jcp.org/jsf/core\"\
  \n>\n    <h:head />\n    <h:body>\n        <h:form>\n            <h:selectOneMenu\
  \ value=\"#{bean.selected}\">\n                <f:selectItems value=\"#{bean.available}\"\
  \ />\n            </h:selectOneMenu>\n            <h:commandButton value=\"选择\"\
  \ />\n        </h:form>\n        <p>选中的值: #{bean.selected}</p>\n    </h:body>\n\
  </html>\n```\n\n以及以下支持 bean：\n\n```\n@Named @RequestScoped\npublic class Bean {\n\
  \n    private List<String> available = Arrays.asList(\"foo\", \"bar\", \"kaz\");\n\
      private String selected;\n\n    public List<String> getAvailable() {\n        return\
  \ available;\n    }\n\n    public String getSelected() {\n        return selected;\n\
      }\n    public void setSelected (String selected) {\n        this.selected =\
  \ selected;\n    }\n}\n```\n\n例如，选择“bar”并点击“选择”，将按预期渲染“选中的值: bar”。可以通过多种方式更改正在发送的值，例如通过像\
  \ Burp Proxy 这样的拦截代理，或者通过 Chrome 等浏览器的开发者工具编辑实时源代码。\n\n![A454457_1_En_13_Fig1_HTML.jpg](img/A454457_1_En_13_Fig1_HTML.jpg)\n\
  \n###### 图 13-1 在 HTML 源代码中篡改选中的值\n\n如图 13-1 所示，在更改后选择“foo”条目并再次点击选择按钮，将导致“foox”值被发送到应用程序。该值将被\
  \ JSF 拒绝，因此将渲染“选中的值:”，表明我们篡改的值确实未被接受。\n\n\n\n## 跨站脚本攻击防护\n\n跨站脚本攻击（XSS）有多种变体，但本质上都是指\
  \ Web 应用程序将来自（其他）用户的数据直接作为标记的一部分渲染并发送给客户端。如果这些数据本身包含脚本代码（通常是 JavaScript），浏览器可能会盲目执行它，从而使攻击者能够读取（例如）Cookie\
  \ 数据并将其发送到攻击者控制的服务器。\n\nJSF 通过为许多常见上下文启用上下文相关的输出转义来提供针对此类攻击的保护。最常见的上下文是输出 HTML，默认情况下，JSF\
  \ 的所有输出写入器都会对其输出进行 XML 转义。\n\n为了演示，请考虑以下后台 Bean：\n\n```\n@Named @RequestScoped\n\
  public class Bean {\n\nprivate String value = \"<script>alert('hi')</script>\";\n\
  \npublic String getValue() {\n        return value;\n    }\n}\n```\n\n`value` 实例变量包含一个我们不希望浏览器执行的脚本。在此示例中，它是硬编码的，但在实践中，它可能来自存储的数据，例如数据库。\n\
  \n现在，我们将使用 JSF 的两个简单的默认构造来渲染此值：Facelet 上的直接表达式语言表达式和 `<h:outputText>` 组件。\n\n```\n\
  <!DOCTYPE html>\n<html lang=\"en\"\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\n\
      xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n    xmlns:f=\"http://xmlns.jcp.org/jsf/core\"\
  \n>\n    <h:head />\n    <h:body>\n        <p>#{bean.value}</p>\n        <p><h:outputText\
  \ value=\"#{bean.value}\" /></p>\n    </h:body>\n</html>\n```\n\n当请求此视图并查看 HTML\
  \ 源代码时，我们会看到该值两次都被渲染为“`<script>alert('hi')</script>`”（即，以浏览器不会执行的转义形式）。\n\n如果我们明确不希望进行此转义，则可以将\
  \ `<h:outputText>` 的 `escape` 属性设置为 `false`。例如：\n\n```\n<h:outputText value=\"#{bean.value}\"\
  \ escape=\"false\" />\n```\n\n再次请求包含上述组件的视图将导致出现一个 JavaScript 警告框，显示“hi”。如果这是攻击者输入的恶意代码，则客户端系统的安全性将受到损害。因此，应极其谨慎地使用\
  \ `escape` 属性。\n\n用于 URL 的输出也会被转义，但转义方式不同，因为它是不同的上下文。为了演示，请考虑将以下组件添加到视图中：\n\n```\n\
  <h:link outcome=\"/foo\">\n    Go to foo\n    <f:param name=\"param\" value=\"#{bean.value}\"\
  \ />\n</h:link>\n```\n\n请求此视图后，我们会看到链接已被渲染为：\n\n```\n<a href=\"/project/foo.xhtml?param=%3Cscript%3Ealert%28%27hi%27%29%3C%2Fscript%3E\"\
  >\n    Go to foo\n</a>\n```\n\n这里发生的情况是，我们的原始值已使用 URL 编码被转义以用作 URL 参数，可以看出这与 XML\
  \ 转义不同，因此称为“上下文相关的输出转义”。\n\n与 XSS 防护相关，应用程序使用的敏感 Cookie 应设置为 HttpOnly，这意味着它们将随每个请求发送到服务器，但无法被客户端的脚本读取。对于会话\
  \ ID Cookie，可以在 `web.xml` 中按如下方式完成：\n\n```\n<session-config>\n    <cookie-config>\n\
          <http-only>true</http-only>\n        <secure>true</secure>\n    </cookie-config>\n\
  </session-config>\n```\n\n请注意，此处 Cookie 也被设置为“secure”。这与 XSS 无关，而是设置 Cookie 仅在使用\
  \ HTTPS/SSL 时发送。这可以保护 Cookie 免遭窃听（例如，在共享 WiFi 网络上）。由于开发通常通过 HTTP 使用 localhost 进行，因此此类设置可能会给开发带来问题。如果是这种情况，则可以在\
  \ `ServletContextListener` 中使用 `ServletContext#getSessionCookieConfig()` 来将 Cookie\
  \ 设置为安全或不安全：\n\n```\n@WebListener\npublic class ApplicationConfig implements ServletContextListener\
  \ {\n\n@Override\n    public void contextInitialized(ServletContextEvent event)\
  \ {\n        if (...) {\n            event.getServletContext()\n                .getSessionCookieConfig()\n\
                  .setSecure(false);\n        }\n    }\n}\n```\n\n其中“...”是一个特定于应用程序的检查，用于判断是否在“开发模式”下运行。您甚至可以使用\
  \ JSF 自身的 `Application#getProjectStage()` 来实现此目的。\n\n\n\n## 源代码暴露防护\n\n在服务端 Web\
  \ 应用的语境下，源代码暴露指的是 Web 应用部分源代码的非预期泄露。这是一种安全风险，不仅因为源代码本身（可能构成商业秘密）的泄露，还因为它可能为攻击者提供后续攻击的线索（源代码可能包含对其他系统、Bean\
  \ 的引用，甚至包含密码的注释，尽管这类注释一开始就不应该存在）。\n\n由于过去一些可能不太理想的设计选择，JSF 在这方面存在一些特定的漏洞，主要涉及 URL\
  \ 映射方式以及资源文件的位置。为了理解这个漏洞，我们首先解释 JSF 映射和 `FacesServlet` 的工作原理。\n\n每个 JSF 应用的主要入口是\
  \ `FacesServlet`。这是由 JSF 框架提供的一个 Servlet，充当所谓的前端控制器，所有 JSF 请求都通过它进行路由。\n\n因此，对 `foo.jsf`\
  \ 这样的 JSF 视图的请求首先需要经过这个 Servlet，然后它会以某种方式定位代表 `foo.jsf` 视图的组件树定义。我们将这个实际定义称为“物理资源”。开箱即用，JSF\
  \ 支持两种类型的物理资源：Facelets 和扩展名为 `.xhtml`、`.view.xml` 和 `.jsp` 的 JSP 文件。请注意，JSP 文件已基本被弃用。\n\
  \n为了让 `FacesServlet` 能够处理所有这些请求，它必须映射到一个或多个能够捕获这些请求的 URL 模式。为此，JSF 支持前缀、后缀和精确映射。\n\
  \n如果在 `web.xml` 中没有指定显式映射，并且在应用中找到了可识别的 JSF 工件（例如空的 `faces-config.xml` 或 `@FacesConfig`\
  \ 注解），那么 `FacesServlet` 会被自动映射。从 JSF 2.1 和 Servlet 3.0 开始，此自动映射针对以下模式：\n\n*   `/faces/*`（前缀映射）\n\
  *   `*.jsf`（后缀映射）\n*   `*.faces`（后缀映射）\n\n从 JSF 2.3 开始，还包括：\n\n*   `*.xhtml`（后缀映射）\n\
  \n特别是较旧的（现有的）JSF 应用仍然会在 `web.xml` 中显式映射 `FacesServlet`，示例如下：\n\n```\n<servlet>\n\
      <servlet-name>facesServlet</servlet-name>\n    <servlet-class>javax.faces.webapp.FacesServlet</servlet-class>\n\
  </servlet>\n<servlet-mapping>\n    <servlet-name>facesServlet</servlet-name>\n    <url-pattern>/faces/*</url-pattern>\n\
      <url-pattern>*.jsf</url-pattern>\n</servlet-mapping>\n```\n\n在后缀映射并使用 Facelets\
  \ 时，`FacesServlet` 会首先尝试定位与请求资源路径和名称相同、但后缀替换为 `.xhtml` 的物理资源。例如，对 `/path/foo.jsf`\
  \ 的请求将导致查找文件 `/path/foo.xhtml`。\n\n在前缀映射中，`FacesServlet` 会尝试定位与请求资源名称和路径相同、但减去前缀路径的物理资源。例如，对\
  \ `/faces/path/foo.xhtml` 的请求将导致查找文件 `/path/foo.xhtml`。\n\n然而，这可能会引入一个安全问题，导致 Facelet\
  \ 源代码泄露。也就是说，对 `/path/foo.xhtml` 的查找是在 `FacesServlet` 所在的 WAR 的 Web 根目录中进行的。除非另有（隐式）映射，Web\
  \ 根目录中的每个文件都可以直接下载。在这种情况下，如果直接请求 `/path/foo.xhtml` 而不是 `/path/foo.jsf` 或 `/faces/path/foo.xhtml`，该请求将不会经过\
  \ `FacesServlet`，并返回该页面的纯 Facelets 源代码，而不是渲染后的标记。\n\n有两种方法可以防止这种源代码泄露。\n\n1.  将\
  \ `FacesServlet` 直接映射到 `*.xhtml`\n2.  向 `web.xml` 添加安全约束\n\n将 `FacesServlet` 直接映射到\
  \ `*.xhtml` 可能是最自然的解决方案。通过这种映射，请求的资源与物理资源完全相同。如果请求 `/path/foo.xhtml`，那么 `FacesServlet`\
  \ 将尝试定位 `/path/foo.xhtml`。通过这种映射，没有第二条路径可以访问 Facelets 源代码，因此不存在泄露风险。\n\n附注：能够使用\
  \ `*.xhtml` 映射是 JSF 2.0 中的一个新特性。在 JSF 1.x 中这样做会导致无限循环。\n\n要将 `FacesServlet` 映射到\
  \ `*.xhtml`，最简单的方法是依赖上面解释的 JSF 2.3 的默认映射。如果由于某种原因无法做到这一点，请将映射添加到 `web.xml` 中的 `FacesServlet`\
  \ 映射中，如下代码所示：\n\n```\n<servlet-mapping>\n    <servlet-name>facesServlet</servlet-name>\n\
      <url-pattern>/faces/*</url-pattern\n    <url-pattern>*.jsf</url-pattern>\n    <url-pattern>*.xhtml</url-pattern>\n\
  </servlet-mapping>\n```\n\n作为替代方案，可以定义一个安全约束来阻止对 `*.xhtml` 资源的访问。通常没有充分的理由选择此方法而不是更简单的\
  \ `*.xhtml` 到 `*.xhtml` 映射，但为了完整性，可以按如下方式操作：\n\n```\n<security-constraint>\n    <display-name>禁止访问\
  \ Facelets 源代码</display-name>\n    <web-resource-collection>\n        <web-resource-name>XHTML</web-resource-name>\n\
          <url-pattern>*.xhtml</url-pattern>\n    </web-resource-collection>\n    <auth-constraint\
  \ />\n</security-constraint>\n```\n\nFacelets 源代码泄露的一个特殊情况发生在复合组件上。复合组件是通过 Facelet\
  \ 而非 Java 类实现的组件。按照惯例，它们必须放置在 Web 根目录下名为 `/resources` 的目录内的一个子目录中——例如 `/resources/bar/foo.xhtml`。这将使组件“foo”在命名空间\
  \ `http://xmlns.jcp.org/jsf/composite/bar` 中可用。\n\n组件当然不是视图，用户不应该能够直接请求它们。不幸的是，`/resources`\
  \ 对于 Java EE 来说并不是一个特殊的目录。JSF 通过约定赋予了它特殊含义，但对于 Servlet 容器来说，它和其他目录一样。这特别意味着对此没有应用任何保护，任何用户都可以直接从中请求资源。换句话说，这个目录是“世界可读的”。即使使用\
  \ `*.xhtml` 映射，这不仅允许用户猜测我们有哪些组件，还允许用户尝试执行这些组件。显然，这不是我们想要的。\n\n对此同样有两种解决方案：\n\n1.\
  \  配置另一个目录作为 JSF 资源目录\n2.  向 `web.xml` 添加安全约束\n\n在 JSF 2.2 中，引入了一种解决此安全漏洞的方法。即，通过\
  \ `javax.faces.WEBAPP_RESOURCES_DIRECTORY` 上下文参数，可以将另一个目录配置为 JSF 资源目录，而不是 `/resources`。例如：\n\
  \n```\n<context-param>\n    <param-name>javax.faces.WEBAPP_RESOURCES_DIRECTORY</param-name>\n\
      <param-value>WEB-INF/resources</param-value>\n</context-param>\n```\n\n请注意，该路径是相对于\
  \ Web 根目录的，并且不能以“/”开头。\n\n或者，对于 JSF 2.0/2.1，可以在 `web.xml` 中再次配置一个安全约束，以禁止调用者访问 `/resources`。这可以通过类似于保护\
  \ `*.xhtml` 访问的方式来完成。\n\n```\n<security-constraint>\n    <web-resource-collection>\n\
          <web-resource-name>resources</web-resource-name>\n        <description>资源目录</description>\n\
          <url-pattern>/resources/*</url-pattern>\n    </web-resource-collection>\n\
      <auth-constraint />\n</security-constraint>\n```\n\n© Bauke Scholtz, Arjan Tijms\
  \ 2018\n\nBauke Scholtz 和 Arjan Tijms，《Java EE 8 中 JSF 的权威指南》，`doi.org/10.1007/978-1-4842-3387-0_14`\n\
  \n\n\n# 14. 本地化\n\nBauke Scholtz¹ 与 Arjan Tijms²\n\n(1) 库拉索岛威廉斯塔德\n\n(2) 荷兰北荷兰省阿姆斯特丹\n\
  \nJSF 一直拥有不错的国际化支持。自 JSF 1.0 起，你就可以提供基于 `java.util.ResourceBundle` 的、针对不同区域设置的资源包文件，这些文件会在声明的页面位置被动态地作为文本包含到网页中。此外，所有\
  \ JSF 转换器和验证器都拥有自己的一套本地化默认消息，你可以通过消息包轻松自定义这些消息，或者从 JSF 1.2 开始，通过新的 `requiredMessage`、`converterMessage`\
  \ 和 `validatorMessage` 属性进行自定义。JSF 2.0 通过新的 `javax.faces.application.ResourceHandler`\
  \ API（应用程序编程接口）增加了对可本地化资源（如样式表、脚本和图片）的支持。\n\n国际化（“I18N”）行为与本地化（“L10N”）行为是不同的。国际化部分基本上已由\
  \ JSF（JavaServer Faces）自身作为一个 MVC（模型-视图-控制器）框架完成。你所需做的就是处理本地化部分。基本上，你需要在视图中指定“活动区域设置”，提供所需的资源包文件（如有必要，可借助第三方翻译服务进行翻译），并在你的\
  \ JSF 页面中声明对资源包文件的引用。\n\n在本章中，你将学习如何为不同语言准备一个 JSF Web 应用程序，以及如何开发它，以便于你自身在维护时进行本地化。\n\
  \n## Hello World, Olá mundo, ![A454457_1_En_14_Figa_HTML.gif](img/A454457_1_En_14_Figa_HTML.gif)\n\
  \n首先，在项目的 `main/java/resources` 文件夹中创建一组新的资源包文件。Maven WAR 项目的 `main/java/resources`\
  \ 文件夹用于存放非类文件，这些文件最终会位于最终构建的 `/WEB-INF/classes` 文件夹中。资源包文件可以采用 `java.util.Properties`\
  \ 格式，扩展名为 `.properties`。\n\n这些文件的文件名必须有一个公共前缀（例如，“text”），后跟一个下划线和两个字母的 ISO 639-1-Alpha-2¹\
  \ 语言代码（例如，“en”代表英语，“pt”代表葡萄牙语，“hi”代表印地语）。它还可以选择性地再跟一个下划线和两个字母的 ISO 3166-1-Alpha-2²\
  \ 国家代码（例如，“GB”代表英国，“US”代表美国，“BR”代表巴西，“PT”代表葡萄牙）。\n\n```\nmain/java/resources/com/example/project/i18n/text.properties\n\
  title = 本地化示例\nheading = Hello World\nparagraph = 欢迎来到我的网站！\nmain/java/resources/com/example/project/i18n/text_pt_BR.properties\n\
  title = Exemplo de localização\nheading = Olá mundo\nparagraph = Bem-vindo ao meu\
  \ site!\nmain/java/resources/com/example/project/i18n/text_hi.properties\n```\n\n\
  ![A454457_1_En_14_Figb_HTML.gif](img/A454457_1_En_14_Figb_HTML.gif)\n\n请注意，所有这些资源包文件都有共同的键“title”、“heading”和“paragraph”，这些键通常使用英语。它基本上是互联网和\
  \ Web 开发者的通用语言。最佳实践是将源代码完全保留为英文，特别是如果它是开源的。\n\n还要注意，英文资源包文件的文件名中没有像 `text_en.properties`\
  \ 那样的“en”语言代码，而只是 `text.properties`。基本上，它已成为后备资源包文件，应包含整个 Web 应用程序中使用的每一个资源包键。这样，当特定语言代码的资源包文件不包含所需的资源包条目时，将从后备资源包文件中查找该值。这对于你希望逐步升级资源包文件，或者\
  \ Web 应用程序中有某些部分（例如后端管理页面）不一定需要本地化的情况非常有用。\n\n## 配置\n\n为了让 JSF 应用程序识别这些资源包文件和所需的区域设置，我们需要编辑其\
  \ `faces-config.xml` 文件，在 `<application>` 元素中添加以下条目：\n\n```\n<application>\n    <locale-config>\n\
          <default-locale>en</default-locale>\n        <supported-locale>pt_BR</supported-locale>\n\
          <supported-locale>hi</supported-locale>\n    </locale-config>\n    <resource-bundle>\n\
          <base-name>com.example.project.i18n.text</base-name>\n        <var>text</var>\n\
      </resource-bundle>\n</application>\n```\n\n`<base-name>` 必须指定完全限定名称（FQN），遵循与\
  \ Java 类相同的约定，并且不包含文件扩展名。`<var>` 基本上声明了资源包文件的 EL（表达式语言）变量名。这将使当前加载的资源包在 EL 中通过 `#{text}`\
  \ 作为一个类似 Map 的对象可用。为避免冲突，你只需确保此名称尚未被任何受管 Bean 或任何隐式 EL 对象占用。\n\n\n\n## 在 JSF 页面中引用资源包\n\
  \n这相对简单，只需将 `#{text}` 视为一个 Map，其中资源包的键作为 Map 的键即可。\n\n```\n<!DOCTYPE html>\n<html\
  \ lang=\"#{view.locale.toLanguageTag()}\"\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\
  \n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\">\n    <h:head>\n        <title>#{text['title']}</title>\n\
      </h:head>\n    <h:body>\n        <h1>#{text['heading']}</h1>\n        <p>#{text['paragraph']}</p>\n\
      </h:body>\n</html>\n```\n\nJSF 会自动根据 HTTP `Accept-Language` 请求头³确定最匹配的活动区域设置，并将其设置为\
  \ `UIViewRoot` 的 `locale` 属性。`Accept-Language` 请求头可在浏览器设置中配置。例如，在 Chrome 中，你可以通过\
  \ `chrome://settings/languages` 进行配置。如果你尝试调整它，比如将英语、葡萄牙语和印地语依次设为浏览器中排名靠前的语言设置，然后刷新\
  \ JSF 页面，你会注意到页面文本会随之改变，以符合浏览器指定的语言设置。如果你打开浏览器的开发者工具（通常按 F12 键可访问），并在网络监视器中检查 HTTP\
  \ 请求头，你还会发现 `Accept-Language` 请求头也相应地发生了变化。\n\n你可能已经注意到，`<html>` 标签的 `lang` 属性引用了\
  \ `#{view.locale.toLanguageTag()}`。基本上，这会打印出当前 `UIViewRoot` 的 `locale` 属性的 IETF\
  \ BCP 47 语言标签⁴，而 `UIViewRoot` 本身作为一个隐式 EL 对象 `#{view}` 可用。`locale` 属性是 `java.util.Locale`\
  \ 的一个实例，它实际上没有像 `getLanguageTag()` 这样的语言标签 getter 方法，只有一个 `toLanguageTag()` 方法，因此在\
  \ EL 中直接引用了该方法，而不是预期的属性引用。\n\n`<html>` 标签的 `lang` 属性对于 JSF 本地化功能的运行并非必需。此外，JSF 将其视为模板文本，不会对其进行任何特殊处理。你可以安全地省略它。然而，它对搜索引擎很重要。这样，像\
  \ Google 这样的搜索引擎就能知道页面内容使用的是哪种语言。这不仅对于正确出现在本地化搜索结果中很重要，而且在你以不同语言提供同一页面时也很重要。否则，一般的搜索引擎算法可能会将其视为“重复内容”而进行惩罚，这对\
  \ SEO（搜索引擎优化）排名不利。\n\n你还会注意到，资源包的键是以所谓的大括号表示法 `#{text['...']}` 指定的。单引号之间的字符串基本上代表了资源包的键。在这种特定情况下，你也可以使用\
  \ `#{text.title}`、`#{text.heading}` 和 `#{text.paragraph}` 来代替。然而，这并非普遍做法。使用大括号表示法不仅能让\
  \ EL 变量所代表的内容（一个资源包）的含义更加清晰，而且还允许你在资源包键名中使用点号，例如 `#{text['meta.description']}`。因为\
  \ EL 表达式 `#{text.meta.description}` 的含义完全不同：“获取 text 对象的嵌套 meta 属性的 description\
  \ 属性”，这是不正确的。\n\n## 更改活动区域设置\n\n你也可以在服务器端更改活动区域设置。最好在包含 `<f:view>` 标签的站点级主模板中的单一位置进行此操作。活动区域设置可以在\
  \ `<f:view>` 的 `locale` 属性中设置，该属性可以接受表示语言标签的静态字符串，也可以接受具体的 `java.util.Locale` 实例。`locale`\
  \ 属性接受 EL 表达式，并可以通过受管 bean 以编程方式更改。这为你提供了让用户通过网页更改区域设置的机会，而无需在浏览器的语言设置中手动调整。你可以在\
  \ JSF 页面中向用户展示可用的语言选项，并让每次选择都更改活动区域设置。这可以通过以下 JSF 页面实现：\n\n```\n<!DOCTYPE html>\n\
  <html lang=\"#{activeLocale.languageTag}\"\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\
  \n    xmlns:f=\"http://xmlns.jcp.org/jsf/core\"\n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\
  >\n    <f:view locale=\"#{activeLocale.current}\">\n        <h:head>\n            <title>#{text['title']}</title>\n\
          </h:head>\n        <h:body>\n            <h1>#{text['heading']}</h1>\n            <p>#{text['paragraph']}</p>\n\
              <h:form>\n                <h:selectOneMenu value=\"#{activeLocale.languageTag}\"\
  >\n                    <f:selectItems\n                        value=\"#{activeLocale.available}\"\
  \ var=\"l\"\n                        itemValue=\"#{l.toLanguageTag()}\"\n                        itemLabel=\"\
  #{l.getDisplayLanguage(l)}\">\n                    </f:selectItems>\n                    <f:ajax\
  \ listener=\"#{activeLocale.reload()}\" />\n                </h:selectOneMenu>\n\
              </h:form>\n        </h:body>\n    </f:view>\n</html>\n```\n\n它与之前的示例略有不同；现在\
  \ `<f:view>` 包裹了 `<h:head>` 和 `<h:body>`。`<f:view>` 的 `locale` 属性通过 `#{activeLocale}`\
  \ 受管 bean 引用当前活动的区域设置，该 bean 如下所示：\n\n```\n@Named @SessionScoped\npublic class ActiveLocale\
  \ implements Serializable {\n\nprivate Locale current;\n    private List<Locale>\
  \ available;\n\n@Inject\n    private FacesContext context;\n\n@PostConstruct\n    public\
  \ void init() {\n        Application app = context.getApplication();\n        current\
  \ = app.getViewHandler().calculateLocale(context);\n        available = new ArrayList<>();\n\
          available.add(app.getDefaultLocale());\n        app.getSupportedLocales().forEachRemaining(available::add);\n\
      }\n\npublic void reload() {\n        context.getPartialViewContext().getEvalScripts()\n\
              .add(\"location.replace(location)\");\n    }\n\npublic Locale getCurrent()\
  \ {\n        return current;\n    }\n\npublic String getLanguageTag() {\n        return\
  \ current.toLanguageTag();\n    }\n\npublic void setLanguageTag(String languageTag)\
  \ {\n        current = Locale.forLanguageTag(languageTag);\n    }\n\npublic List<Locale>\
  \ getAvailable() {\n        return available;\n    }\n\n}\n```\n\n需要重申的是，`@Inject\
  \ FacesContext` 仅当你在 Web 应用程序的某个位置任意一个 CDI bean 上放置了 `@FacesConfig` 注解时才有效。否则，你必须将其替换为内联的\
  \ `FacesContext.getCurrentInstance()` 调用。这些内联调用只有一个注意事项：你需要绝对确保不要在例如 `@PostConstruct`\
  \ 中将其赋值给一个字段，因为实际的实例在同一个 bean 实例的不同方法调用之间可能会发生变化。通过 CDI 将其作为字段注入可以透明地处理这个问题，因此是安全的，但手动赋值则不安全。\n\
  \n在 `@PostConstruct` 中，使用 `ViewHandler#calculateLocale()` 根据 `Accept-Language` 请求头以及\
  \ `faces-config.xml` 中配置的默认和支持的区域设置来计算当前区域设置。这与未定义 `<f:view locale>` 时的 JSF 内部行为完全相同。最后，根据配置的默认和支持的区域设置收集可用的区域设置。\n\
  \n可用的区域设置通过 `<h:selectOneMenu>` 的 `<f:selectItems>` 以下拉选项的形式呈现给用户（参见图 14-1）。嵌套的\
  \ `<f:ajax>` 确保一旦用户更改选项，所选选项就会立即在受管 bean 中设置。\n\n![A454457_1_En_14_Fig1_HTML.jpg](img/A454457_1_En_14_Fig1_HTML.jpg)\n\
  \n\n\n###### 图 14-1 更改活动区域设置\n\n`#{activeLocale.languageTag}` 属性在内部委托给当前的 `java.util.Locale`\
  \ 实例。这主要是为了方便，这样当我们想在 `<h:selectOneMenu>` 中使用 `#{activeLocale.current}` 时，就不必为其添加转换器了。\n\
  \n`<f:ajax listener>` 基本上是在 Ajax 请求完成后，借助一段 JavaScript 代码来执行完整的页面重新加载。这是通过向 `PartialViewContext#getEvalScripts()`\
  \ 方法添加脚本来实现的，该方法是 JSF 2.3 中新增的。任何添加的脚本最终都会按顺序出现在 JSF Ajax 响应的 `<eval>` 部分，并在 JSF\
  \ Ajax 引擎更新了 HTML DOM（文档对象模型）树之后执行。\n\n脚本本身 `location.replace(location)` 基本上指示 JavaScript\
  \ 重新加载当前文档，而不在历史记录中保留前一个文档。这意味着后退按钮不会重新显示同一页面。你也可以使用 `location.reload(true)` 代替，但如果之前在同一文档上触发了同步（非\
  \ Ajax）POST 请求，这种方法就无法很好地工作。它会重新执行该请求并导致重复提交。而且，它还会不必要地在历史记录中记住前一页面。这可能会导致令人困惑的行为，因为后退按钮似乎没有效果——它会重新显示完全相同的页面，因为活动区域设置存储在会话中，而不是请求中。\n\
  \n或者，在这种特定用例中，你也可以不使用 `<f:ajax listener>`，而仅使用 `<f:ajax render=\"@all\">`，无需任何监听器。它至少有一个缺点：文档的标题不会被更新。无论如何，使用\
  \ `@all` 通常被认为是一种不好的做法。它只有一个合法的实际用例：在 Ajax 请求上显示完整的错误页面。\n\n作为另一种完全不同的替代方案，你可以将活动区域设置设为请求作用域而非会话作用域，方法是将语言标签包含在\
  \ URL 中，例如 [`example.com/en/page.xhtml`](http://example.com/en/page.xhtml)、[`example.com/pt/page.xhtml`](http://example.com/pt/page.xhtml)、[`example.com/hi/page.xhtml`](http://example.com/hi/page.xhtml)。这样，你只需点击链接即可更改活动区域设置。这只需要一个\
  \ Servlet 过滤器，从 URL 中提取 `java.util.Locale` 实例并将其转发到所需的 JSF 页面，以及一个自定义视图处理器，将语言标签包含在任何\
  \ `<h:form>`、`<h:link>` 和 `<h:button>` 组件生成的 URL 中。你可以在 Java EE Kickoff 应用程序中找到入门示例。⁵\n\
  \n## 组织资源包键\n\n当 Web 应用程序增长时，你可能会注意到资源包文件开始变得难以维护。关键在于遵循非常严格的约定来组织资源包键。可重用的站点级条目（通常用作输入标签、按钮标签、链接标签、表头标签等）应使用通用前缀作为键（例如，“label.save=保存”）。特定于页面的条目应使用页面特定的前缀作为键（例如，“foldername_pagename.title=某个页面标题”）。以下是一个本地化\
  \ Facelets 模板的详细示例，`/WEB-INF/templates/page.xhtml`：\n\n```\n<!DOCTYPE html>\n<html\
  \ lang=\"#{activeLocale.language}\"\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\
  \n    xmlns:f=\"http://xmlns.jcp.org/jsf/core\"\n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\
  \n    xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\n    xmlns:c=\"http://xmlns.jcp.org/jsp/jstl/core\"\
  \n    xmlns:fn=\"http://xmlns.jcp.org/jsp/jstl/functions\"\n>\n    <c:set var=\"\
  page\" value=\"page#{fn:replace(\n        fn:split(view.viewId, '.')[0], '/', '_')}\"\
  \ scope=\"view\" />\n    <f:view locale=\"#{activeLocale.current}\">\n        <h:head>\n\
              <title>#{text[page += '.title']}</title>\n            <meta name=\"\
  description\"\n                content=\"#{text[page += '.meta.description']}\"\
  \ />\n        </h:head>\n        <h:body id=\"#{page}\">\n            <header>\n\
                  <nav>\n                    <h:link outcome=\"/home\"\n                        value=\"\
  #{text['label.home']}\" />\n                    <h:link outcome=\"/login\"\n                        value=\"\
  #{text['label.login']}\" />\n                    <h:link outcome=\"/signup\"\n                        value=\"\
  #{text['label.signup']}\" />\n                </nav>\n                <h:form>\n\
                      <h:selectOneMenu\n                            value=\"#{activeLocale.languageTag}\"\
  >\n                        <f:selectItems\n                            value=\"\
  #{activeLocale.available}\" var=\"l\"\n                            itemValue=\"\
  #{l.toLanguageTag()}\"\n                            itemLabel=\"#{l.getDisplayLanguage(l)}\"\
  >\n                        </f:selectItems>\n                        <f:ajax listener=\"\
  #{activeLocale.reload()}\" />\n                    </h:selectOneMenu>\n                </h:form>\n\
              </header>\n            <main>\n                <h1>#{text[page += '.title']}</h1>\n\
                  <ui:insert name=\"content\" />\n            </main>\n            <footer>\n\
                  © #{text['page_home.title']}\n            </footer>\n        </h:body>\n\
      </f:view>\n</html>\n```\n\nJSTL 的 `<c:set>` 基本上将 `UIViewRoot#getViewId()` 转换为一个适合用作页面特定前缀的字符串。JSF\
  \ 视图 ID 基本上代表了表示 JSF 页面的物理文件的绝对服务器端路径（例如，“/user/account.xhtml”）。这需要被处理成适合作为资源包键的格式。`fn:split()`\
  \ 调用从中提取出 “/user/account” 部分，而 `fn:replace()` 调用将正斜杠转换为下划线，使其变成 “_user_account”。最后，`<c:set>`\
  \ 将其以 “page_user_account” 的形式存储在视图作用域中，名称为 “page”，以便在同一视图的其他地方可以作为 `#{page}` 使用。\n\
  \n你会注意到 `#{page}` 又被用作 `<h:body>` 的 ID 等。这使得在需要时，可以更容易地从通用的 CSS（层叠样式表）文件中选中特定页面。`#{page}`\
  \ 还被用于多个资源包引用中，例如 `#{text[page += '.title']}`，在 “/home.xhtml” 的情况下，它最终引用了键 “page_home.title”。使用这样的模板，你可以拥有以下特定于页面的资源包条目：\n\
  \n```\npage_home.title = 我的网站\npage_home.meta.description = 一个 Hello World JSF 应用程序。\n\
  \npage_login.title = 登录\npage_login.meta.description = 登录到我的网站。\n\npage_signup.title\
  \ = 注册\npage_signup.meta.description = 注册到我的网站。\n```\n\n\n\n以下是一个模板客户端的示例，它使用了之前展示的模板\
  \ /WEB-INF/templates/page.xhtml 和 /login.xhtml：\n\n```\n<ui:composition template=\"\
  /WEB-INF/templates/page.xhtml\"\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\n    xmlns:f=\"\
  http://xmlns.jcp.org/jsf/core\"\n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n\
      xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\n>\n    <ui:define name=\"content\"\
  >\n        <h:form id=\"login\">\n            <fieldset>\n                <h:outputLabel\
  \ for=\"email\"\n                    value=\"#{text['label.email']}\" />\n                <h:inputText\
  \ id=\"email\" required=\"true\"\n                    value=\"#{login.email}\" />\n\
                  <h:message for=\"email\" styleClass=\"message\" />\n\n<h:outputLabel\
  \ for=\"password\"\n                    value=\"#{text['label.password']}\" />\n\
                  <h:inputSecret id=\"password\" required=\"true\"\n                    value=\"\
  #{login.password}\" />\n                <h:message for=\"password\" styleClass=\"\
  message\" />\n\n<h:commandButton id=\"submit\" action=\"#{login.submit}\"\n                    value=\"\
  #{text['label.login']}\" />\n                <h:message for=\"login\" styleClass=\"\
  message\" />\n            </fieldset>\n        </h:form>\n    </ui:define>\n</ui:composition>\n\
  ```\n\n以下是关联的资源包条目示例：\n\n```\nlabel.email = Email\nlabel.password = Password\nlabel.login\
  \ = Log In\n```\n\n注意：如果你发现页面显示异常，只需添加一个包含以下规则的 CSS 文件即可：\n\n```\nnav a, fieldset\
  \ label, fieldset input {\n    display: block;\n}\n```\n\n## 本地化转换/验证消息\n\n如果你已经准备了一个简单的后台\
  \ Bean 类 Login，包含两个字符串属性 email 和 password 以及一个方法 submit()，并在未填写电子邮件输入框的情况下提交上述登录页面，那么你将遇到如下格式的验证错误：\n\
  \n```\nlogin:email: Validation Error: Value is required.\n```\n\n当你将语言切换为葡萄牙语并重新提交空表单时，你会发现错误信息也已本地化。然而，当你进一步将语言切换为印地语时，你会注意到标准\
  \ JSF 实现中没有提供印地语的标准消息包。你需要自行提供。有几种方法可以实现这一点。\n\n首先，JSF 输入和选择组件支持三个属性来覆盖默认消息：requiredMessage、validatorMessage\
  \ 和 converterMessage。以下示例展示了如何覆盖默认的必填消息：\n\n```\n<h:inputText ... requiredMessage=\"\
  #{text['message.required']}\" />\n```\n\n这可以说是最简单的方法。主要缺点是，如果你没有将其封装在可重用的标签文件（如\
  \ <my:inputText>）中，则需要在各处复制粘贴。这不符合 DRY 原则。⁶\n\n另一种方法是提供一个自定义消息包，覆盖所有针对 JSF 转换/验证消息的预定义包键，并在\
  \ faces-config.xml 中将其注册为 <message-bundle>。你可以在 JSF 规范的第 2.5.2.4 节“本地化应用程序消息”中找到预定义的包键。⁷\
  \ 默认必填消息“Validation Error: Value is Required”的包键是 javax.faces.component.UIInput.REQUIRED。我们可以在新的消息包文件中进行如下调整：\n\
  \n```\nmain/java/resources/com/example/project/i18n/messages.properties\njavax.faces.component.UIInput.REQUIRED\
  \ = {0} is required.\nmain/java/resources/com/example/project/i18n/messages_pt_BR.properties\n\
  javax.faces.component.UIInput.REQUIRED = {0} é obrigatório.\nmain/java/resources/com/example/project/i18n/messages_hi.properties\n\
  ```\n\n![A454457_1_En_14_Figc_HTML.gif](img/A454457_1_En_14_Figc_HTML.gif)\n\n最后，在\
  \ faces-config.xml 文件的 <application> 元素中进行配置：\n\n```\n<application>\n    ...\n    <message-bundle>com.example.project.i18n.messages</message-bundle>\n\
  </application>\n```\n\n你可能已经注意到消息中的 {0} 占位符。它们代表关联输入和选择组件的标签。标签默认为组件的客户端 ID，基本上就是你在浏览器页面源代码中看到的\
  \ JSF 生成的 HTML 元素的 ID。你可以通过显式设置组件的 label 属性来覆盖它。\n\n```\n<h:inputText id=\"email\"\
  \ ... label=\"#{text['label.email']}\" />\n<h:inputSecret id=\"password\" ... label=\"\
  #{text['label.password']}\" />\n```\n\n请注意，将消息包放在与资源包不同的文件中并非绝对必要。你也可以直接将消息包条目放在\
  \ text.properties 文件中，并将 <message-bundle> 条目调整为指向与 <resource-bundle> 相同的完全限定名（FQN）。\n\
  \n## 在自定义转换器/验证器中获取本地化消息\n\n<message-bundle> 条目的值可以通过 Application#getMessageBundle()\
  \ 以编程方式获取。然后，你可以利用 java.util.ResourceBundle API 以及 UIViewRoot#getLocale() 来获取实际的包。这允许你在自定义转换器和验证器中获取本地化消息。以下是一个此类验证器的示例，它检查指定的电子邮件地址是否已被使用：\n\
  \n```\n@FacesValidator(value = \"duplicateEmailValidator\", managed = true)\npublic\
  \ class DuplicateEmailValidator implements Validator<String> {\n\n    @Inject\n\
      private UserService userService;\n\n    @Override\n    public void validate\n\
          (FacesContext context, UIComponent component, String value)\n            throws\
  \ ValidatorException\n    {\n        if (value == null) {\n            return;\n\
          }\n\n        Optional<User> user = userService.findByEmail(value);\n\n        if\
  \ (user.isPresent()) {\n            throw new ValidatorException(new FacesMessage(getMessage(\n\
                  context, \"message.duplicateEmailValidator\")));\n        }\n    }\n\
  \n    public static String getMessage(FacesContext context, String key) {\n        return\
  \ ResourceBundle.getBundle(\n            context.getApplication().getMessageBundle(),\n\
              context.getViewRoot().getLocale()).getString(key);\n    }\n}\n```\n\n\
  你可能已经注意到 @FacesValidator 注解中新增的 managed 属性。这基本上会开启验证器实例上的 CDI 支持，从而允许你将业务服务注入到验证器中。@FacesConverter\
  \ 也支持相同的属性。\n\n上述验证器示例假设由 <message-bundle> 标识的资源包文件中存在以下条目：\n\n```\nmessage.duplicateEmailValidator\
  \ = Email is already in use.\n```\n\n\n\n## 本地化枚举\n\n本地化枚举最简洁的方式是直接将其自身标识作为资源包键。这能使枚举类避免混入硬编码资源包键等潜在的\
  \ UI 特定杂乱内容。通常，枚举的简单名称与枚举值的组合足以构成站点范围内的唯一标识符。以下是一个表示用户组的 `com.example.project.model.Group`\
  \ 枚举：\n\n```\npublic enum Group {\n    USER,\n    MANAGER,\n    ADMINISTRATOR,\n\
      DEVELOPER;\n}\n```\n\n以及 `text.properties` 中的以下资源包条目：\n\n```\nGroup.USER = 用户\n\
  Group.MANAGER = 管理员\nGroup.ADMINISTRATOR = 系统管理员\nGroup.DEVELOPER = 开发者\n```\n\n\
  你可以通过以下方式轻松实现本地化：\n\n```\n<f:metadata>\n    <f:importConstants type=\"com.example.project.model.Group\"\
  \ />\n</f:metadata>\n...\n<h:selectManyCheckbox value=\"#{editUserBacking.user.groups}\"\
  >\n    <f:selectItems value=\"#{Group.values()}\" var=\"group\"\n        itemLabel=\"\
  #{text['Group.' += group]}\" />\n</h:selectManyCheckbox>\n```\n\n请注意，`<f:importConstants>`\
  \ 是 JSF 2.3 新增的功能。它必须放置在 `<f:metadata>` 内部。其 `type` 属性必须指定枚举的完全限定名，或任何包含 `public\
  \ static final` 字段形式公共常量的类或接口。`<f:importConstants>` 会自动将这些常量以 `Map<String, Object>`\
  \ 的形式导入 EL 作用域，其中映射键代表常量名称的字符串形式，映射值代表常量的实际值。\n\n通过 `#{Group.values()}` 你可以获取所有常量值的集合，然后每个值在\
  \ `itemLabel` 中被本地化。另请注意，`itemValue` 被省略了，因为它默认使用 `var` 属性的值，这已经足够了。\n\n## 参数化资源包值\n\
  \n你还可以使用 `java.text.MessageFormat` API 的 `{0}` 占位符来参数化资源包条目。⁸ 在 JSF 端，只能通过 `<h:outputFormat>`\
  \ 进行替换，参数以 `<f:param>` 子元素的形式提供，顺序与占位符一致。给定以下条目：\n\n```\npage_products.table.header\
  \ = 产品表头：{0, choice, 0#没有产品\n                                             | 1#有\
  \ 1 个产品\n                                             | 1<有{0}个产品}。\n```\n\n可以使用\
  \ `<h:outputFormat>` 进行替换，如下所示：\n\n```\n<h:outputFormat value=\"#{text['page_products.table.header']}\"\
  >\n    <f:param value=\"#{bean.products.size()}\" />\n</h:outputFormat>\n```\n\n\
  ## 基于数据库的 ResourceBundle\n\nJSF 还支持将自定义的 `ResourceBundle` 实现指定为 `<base-name>`。这允许你以编程方式填充和提供所需的资源包，例如从多个资源包文件甚至从数据库中获取。在本例中，我们将默认的基于属性文件的资源包替换为从数据库加载条目的资源包。这使我们在组织资源包键方面更进一步。通过这种方式，你甚至可以通过基于\
  \ Web 的界面来编辑它们。以下是 JPA 实体的样子：\n\n```\n@Entity\n@Table(uniqueConstraints = {\n    @UniqueConstraint(columnNames\
  \ = { \"locale\", \"key\" })\n})\npublic class Translation {\n\n@Id @GeneratedValue(strategy\
  \ = GenerationType.IDENTITY)\n    private Long id;\n\n@Column(length = 5, nullable\
  \ = false)\n    private @NotNull Locale locale;\n\n@Column(length = 255, nullable\
  \ = false)\n    private @NotNull String key;\n\n@Lob @Column(nullable = false)\n\
      private @NotNull String value;\n\n// 在此处添加/生成 getter 和 setter 方法。\n}\n```\n\n\
  请注意，JPA（Java 持久化 API）注解提供了足够的提示，说明表的 DDL（数据定义语言）应该是什么样子。当在 `persistence.xml` 中将\
  \ `javax.persistence.schema-generation.database.action` 属性设置为 `create` 或 `drop-and-create`\
  \ 时，它将自动生成适当的 DDL。为完整起见，以下是 HSQL/pgSQL 风格的 DDL。\n\n```\nCREATE TABLE Translation\
  \ (\n    id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,\n    locale VARCHAR(5)\
  \ NOT NULL,\n    key VARCHAR(255) NOT NULL,\n    value CLOB NOT NULL\n);\n\nALTER\
  \ TABLE Translation\n    ADD CONSTRAINT UK_Translation_locale_key\n    UNIQUE (locale,\
  \ key);\n```\n\n以下是 EJB（企业 JavaBeans）服务的样子。\n\n```\n@Stateless\npublic class TranslationService\
  \ {\n\n@PersistenceContext\n    private EntityManager entityManager;\n\n@TransactionAttribute(value\
  \ = REQUIRES_NEW)\n    @SuppressWarnings(\"unchecked\")\n    public Object[][] getContent\n\
          (Locale locale, Locale fallback)\n    {\n        List<Object[]> resultList\
  \ = entityManager.createQuery(\n            \"SELECT t1.key, COALESCE(t2.value,\
  \ t1.value)\"\n                + \" FROM Translation t1\"\n                + \"\
  \ LEFT OUTER JOIN Translation t2\"\n                    + \" ON t2.key = t1.key\"\
  \n                    + \" AND t2.locale = :locale\"\n                + \" WHERE\
  \ t1.locale = :fallback\")\n            .setParameter(\"locale\", locale)\n            .setParameter(\"\
  fallback\", fallback)\n            .getResultList();\n        return resultList.toArray(new\
  \ Object[resultList.size()][]);\n    }\n}\n```\n\n对于 JPA，我们只需要一个额外的转换器，用于在模型中的 `java.util.Locale`\
  \ 和数据库中的 `VARCHAR`（由 `java.lang.String` 表示）之间进行转换。你可以为此使用 JPA 2.0 的 `AttributeConverter`。它很像\
  \ JSF 转换器，但用于 JPA 实体。它相对简单，无需额外配置。请参见以下内容：\n\n```\npublic class LocaleConverter\n\
      implements AttributeConverter<Locale, String>\n{\n    @Override\n    public\
  \ String convertToDatabaseColumn(Locale locale) {\n        return locale.toLanguageTag();\n\
      }\n\n@Override\n    public Locale convertToEntityAttribute(String languageTag)\
  \ {\n        return Locale.forLanguageTag(languageTag);\n    }\n}\n```\n\n现在我们有了自定义的\
  \ `ResourceBundle`；它被称为 `DatabaseResourceBundle`。将其放在包 `com.example.project.i18n`\
  \ 中。\n\n```\npublic class DatabaseResourceBundle extends ResourceBundle {\n\nprivate\
  \ static final Control CONTROL = new DatabaseControl();\n\n@Override\n    public\
  \ Object handleGetObject(String key) {\n        return getCurrentInstance().getObject(key);\n\
      }\n\n@Override\n    public Enumeration<String> getKeys() {\n        return getCurrentInstance().getKeys();\n\
      }\n\n\n\nprivate ResourceBundle getCurrentInstance() {\n        FacesContext\
  \ context = FacesContext.getCurrentInstance();\n        String key = CONTROL.getClass().getName();\n\
          return (ResourceBundle) context.getAttributes()\n            .computeIfAbsent(key,\
  \ k -> ResourceBundle.getBundle(key,\n                context.getViewRoot().getLocale(),\n\
                  Thread.currentThread().getContextClassLoader(),\n                CONTROL));\n\
      }\n\nprivate static class DatabaseControl extends Control {\n        @Override\n\
          public ResourceBundle newBundle\n            (String baseName, Locale locale,\
  \ String format,\n                ClassLoader loader, boolean reload)\n            throws\
  \ IllegalAccessException, InstantiationException,\n                IOException\n\
          {\n            FacesContext context = FacesContext.getCurrentInstance();\n\
              final Object[][] contents = CDI.current()\n                .select(TranslationService.class).get()\n\
                  .getContent(\n                    locale,\n                    context.getApplication().getDefaultLocale());\n\
              return new ListResourceBundle() {\n                @Override\n                protected\
  \ Object[][] getContents() {\n                    return contents;\n                }\n\
              };\n        }\n    }\n}\n```\n\n最后，调整 `faces-config.xml` 中的 `<resource-bundle><base-name>`\
  \ 条目，指定自定义 `ResourceBundle` 的完全限定名称，如下所示：\n\n```\n<base-name>com.example.project.i18n.DatabaseResourceBundle</base-name>\n\
  ```\n\n坦白说，这个 `ResourceBundle` 的实际实现有些取巧，仅仅是因为存在以下限制：\n\n1.  JSF 不允许通过 `faces-config.xml`\
  \ 定义自定义的 `ResourceBundle.Control`。\n\n2.  通过 SPI（串行外设接口）以 `java.util.spi.ResourceBundleControlProvider`\
  \ 方式提供自定义的 `ResourceBundle.Control` 在 WAR 中无法生效。\n\n3.  为 `faces-config.xml` 中注册的每个区域设置创建多个独立的\
  \ `DatabaseResourceBundle` 子类，例如 `DatabaseResourceBundle_en`、`DatabaseResourceBundle_pt_BR`\
  \ 和 `DatabaseResourceBundle_hi`，以满足默认的 `ResourceBundle.Control` 行为，从长远来看不利于维护。\n\
  \n此方法的另一个优点是，它允许您通过简单地调用 `ResourceBundle#clearCache()` 以编程方式清除缓存中的任何数据库包。也就是说，JSF\
  \ 实现可能会在其 `Application` 实现中进一步缓存它，导致 `ResourceBundle#clearCache()` 似乎完全没有效果。已知 Mojarra\
  \ 会这样做。⁹\n\n## ResourceBundle 中的 HTML\n\n这是一种不良实践。它会增加维护负担。对于大段内容，您最好选择比 HTML 更轻量级的标记语言，例如\
  \ Markdown。¹⁰ 这不仅在 XSS（跨站脚本）风险方面更安全，而且用户通过某些内容管理系统（CMS）界面中的文本区域进行编辑也更容易。最好结合基于数据库的资源包来实现这一点。您可以向\
  \ `Translation` 模型添加一个额外的布尔标志，指示该值是否应解析为 Markdown。\n\n```\n@Column(nullable = false)\n\
  private boolean markdown;\n```\n\n然后，在 `TranslationService#getContents()` 内部，将其作为第三列进行选择。\n\
  \n```\n\"SELECT t1.key, COALESCE(t2.value, t1.value), t1.markdown\"\n```\n\n最后，在\
  \ `DatabaseControl#newBundle()` 方法中，检索内容后，您可以根据该布尔值对它们进行后处理。您可以为此使用任何基于 Java 的 Markdown\
  \ 库，例如 CommonMark。¹¹\n\n```\nstatic final Parser PARSER = Parser.builder().build();\n\
  static final HtmlRenderer RENDERER = HtmlRenderer.builder().build();\n...\nfor (Object[]\
  \ translation : contents) {\n    if ((boolean) translation[2]) {\n        translation[1]\
  \ = RENDERER.render(PARSER.parse(translation[1]));\n    }\n}\n```\n\n# 脚注\n\n1 [`en.wikipedia.org/wiki/List_of_ISO_639-1_codes`](https://en.wikipedia.org/wiki/List_of_ISO_639-1_codes)\
  \ .\n\n2 [`en.wikipedia.org/wiki/ISO_3166-1_alpha-2`](https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2)\
  \ .\n\n3 [`www.w3.org/Protocols/rfc2616/rfc2616-sec14.html#sec14.4`](https://www.w3.org/Protocols/rfc2616/rfc2616-sec14.html#sec14.4).\n\
  \n4 [`en.wikipedia.org/wiki/IETF_language_tag`](https://en.wikipedia.org/wiki/IETF_language_tag)\
  \ .\n\n5 [`github.com/javaeekickoff/java-ee-kickoff-app`](https://github.com/javaeekickoff/java-ee-kickoff-app)\
  \ .\n\n6 [`en.wikipedia.org/wiki/Don%27t_repeat_yourself`](https://en.wikipedia.org/wiki/Don%27t_repeat_yourself)\
  \ .\n\n7 [`download.oracle.com/otn-pub/jcp/jsf-2_3-final-eval-spec/JSF_2.3.pdf`](http://download.oracle.com/otn-pub/jcp/jsf-2_3-final-eval-spec/JSF_2.3.pdf)\
  \ .\n\n8 [`docs.oracle.com/javase/8/docs/api/java/text/MessageFormat.html`](https://docs.oracle.com/javase/8/docs/api/java/text/MessageFormat.html)\
  \ .\n\n9 [`stackoverflow.com/q/4325164/157882`](https://stackoverflow.com/q/4325164/157882)\
  \ .\n\n10 [`en.wikipedia.org/wiki/Markdown`](https://en.wikipedia.org/wiki/Markdown)\
  \ .\n\n11 [`github.com/atlassian/commonmark-java`](https://github.com/atlassian/commonmark-java)\
  \ .\n\n© Bauke Scholtz, Arjan Tijms 2018\n\nBauke Scholtz 和 Arjan Tijms，《Java EE\
  \ 8 中 JSF 的权威指南》，`doi.org/10.1007/978-1-4842-3387-0_15`\n\n# 15. 扩展\n\nBauke Scholtz^(1 )\
  \ 和 Arjan Tijms²\n\n(1) 威廉斯塔德，库拉索\n\n(2) 阿姆斯特丹，北荷兰省，荷兰\n\n如果说 JSF（JavaServer Faces）有一个单一的元素或优点可以归因于其如此长久的存在，那可能就是它能够以多种方式进行扩展。从一开始，JSF\
  \ 就使得替换、装饰或增强其大部分核心元素成为可能。\n\n这催生了大量的扩展库和项目。在早期，这些包括 A4J（Ajax4JSF）、Tomahawk、RichFaces、独立的\
  \ Facelets 项目、PrettyFaces 等等。A4J 被合并到 RichFaces 中，而 RichFaces 本身最终于 2016 年停止服务。Facelets\
  \ 被整合到 JSF 本身中，而 PrettyFaces 则成为 Rewrite 框架的一部分。如今，知名且活跃的扩展库包括 PrimeFaces、OmniFaces\
  \ 和 BootsFaces 等。虽然个别库来了又去，但主要的常量是 JSF 从其诞生之初至今的可扩展性。\n\n有时人们说所有这些库都是为了解决 JSF 的缺陷或遗漏，但这并不完全准确。事实上，JSF\
  \ 被明确设计为使此类扩展成为可能，从而允许甚至刺激此类扩展库的出现。例如，与 JSF 同时期的技术 EJB（企业 JavaBeans）几乎没有扩展点，因此，尽管它有许多缺点，我们从未看到围绕它形成丰富的生态系统。\n\
  \n\n\n## 扩展类型\n\n在 JSF 中使用各种扩展点有几种不同的方式。主要区别在于“经典”方法和“以 CDI 为中心的方法”。\n\n在后一种方法中，JSF\
  \ 几乎不需要显式支持可扩展性，因为 CDI 内置了许多机制来支持扩展或替换 CDI 工件。这是 JSF 的未来规划（使几乎所有内容都成为 CDI 工件），但目前\
  \ JSF 2.3 仍处于早期的过渡阶段，只有少数工件通过 CDI 提供。第 8 章的表格 8-1 展示了这些工件。\n\n## 扩展 CDI 工件\n\nCDI\
  \ 完全增强或替换类型的一种方式是提供替代生产者。我们已经在第 13 章中看到了这种技术的使用，尽管其用例略有不同。\n\n最简单的方式是当你需要完全替换该类型时。如果需要增强，则需要一些代码来获取之前的类型，这在当前版本的\
  \ CDI (2.0) 中略显冗长。\n\n以下示例展示了我们将请求参数映射替换为一个新映射，该映射包含原始映射的所有值，以及我们自己添加的一个额外值：\n\n\
  ```\n@Dependent @Alternative @Priority(APPLICATION)\npublic class RequestParameterMapProducer\
  \ {\n\n    @Produces @RequestScoped @RequestParameterMap\n    public Map<String,\
  \ String> producer(BeanManager beanManager) {\n        Map<String, String> previousMap\
  \ = getPreviousMap(beanManager);\n        Map<String, String> newMap = new HashMap<>(previousMap);\n\
          newMap.put(\"test\", \"myTestValue\");\n        return newMap;\n    }\n\
  }\n```\n\n如前所述，`getPreviousMap()` 方法略显冗长。其定义如下：\n\n```\nprivate Map<String, String>\
  \ getPreviousMap(BeanManager beanManager) {\n    class RequestParameterMapAnnotationLiteral\n\
          extends AnnotationLiteral<RequestParameterMap>\n        implements RequestParameterMap\n\
      {\n        private static final long serialVersionUID = 1L;\n    }\n\n    Type\
  \ MAP_TYPE = new ParameterizedType() {\n        @Override\n        public Type getRawType()\
  \ {\n            return Map.class;\n        }\n        @Override\n        public\
  \ Type[] getActualTypeArguments() {\n            return new Type[] {String.class,\
  \ String.class};\n        }\n        @Override\n        public Type getOwnerType()\
  \ {\n            return null;\n        }\n    };\n\n    return (Map<String, String>)\
  \ beanManager\n        .getReference(beanManager\n        .resolve(beanManager\n\
          .getBeans(MAP_TYPE, new RequestParameterMapAnnotationLiteral())\n        .stream()\n\
          .filter(bean -> bean\n            .getBeanClass() != RequestParameterMapProducer.class)\n\
          .collect(Collectors.toSet())),\n            MAP_TYPE,\n            beanManager.createCreationalContext(null));\n\
      }\n}\n```\n\n预计在相关规范的未来修订版中，获取此“先前”或“原始”类型的任务将变得更加容易。例如，未来版本的 JSF 可能会为其（CDI）注解引入即用型注解字面量，例如此处展示的\
  \ `RequestParameterMapAnnotationLiteral`。\n\n为了测试此替代生产者是否有效，请考虑以下支持 bean：\n\n```\n\
  @Named @RequestScoped\npublic class TestBean {\n\n    @Inject @RequestParameterMap\n\
      private Map<String, String> requestParameterMap;\n\n    public String getTest()\
  \ {\n        return requestParameterMap.get(\"test\");\n    }\n\n    public String\
  \ getFoo() {\n        return requestParameterMap.get(\"foo\");\n    }\n}\n```\n\n\
  以及以下 Facelet：\n\n```\n<!DOCTYPE html>\n<html lang=\"en\"\n    xmlns=\"http://www.w3.org/1999/xhtml\"\
  \n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n>\n    <h:head/>\n    <h:body>\n\
          <p>Test: #{testBean.test}</p>\n        <p>Foo: #{testBean.foo}</p>\n    </h:body>\n\
  </html>\n```\n\n部署一个包含这些工件且带有请求参数（例如“foo=bar”）的应用程序，将会显示新映射确实包含了原始请求参数以及我们自己添加的值。\n\
  \n## 扩展经典工件\n\n在 JSF 中增强或完全替换类型的经典方法是为该类型安装一个工厂。这种工厂的基本工作方式与上面演示的 CDI 方法大致相同；工厂返回所请求类型的实现，并获取对“先前”或“原始”类型的引用。\n\
  \n在 Java EE 中，“经典”通常意味着 XML，而经典的工厂确实涉及 XML。具体来说，注册工厂需要在 `faces-config.xml` 中使用 `<factory>`\
  \ 元素，并为每个需要提供工厂的类型使用特定的元素。从 JSF 2.3 开始，支持以下工厂：\n\n*   `<application-factory>`\n\
  *   `<exception-handler-factory>`\n*   `<external-context-factory>`\n*   `<faces-context-factory>`\n\
  *   `<facelet-cache-factory>`\n*   `<partial-view-context-factory>`\n*   `<lifecycle-factory>`\n\
  *   `<view-declaration-language-factory>`\n*   `<tag-handler-delegate-factory>`\n\
  *   `<render-kit-factory>`\n*   `<visit-context-factory>`\n*   `<flash-factory>`\n\
  *   `<flow-handler-factory>`\n*   `<client-window-factory>`\n*   `<search-expression-context-factory>`\n\
  \n除此之外，还有另外一些工件可以通过类似但不同的方式进行替换/增强；这里没有返回类型的工厂，而是直接指定了该类型的实现。这种变体使用 `faces-config.xml`\
  \ 中的 `<application>` 元素来指定。从 JSF 2.3 开始，以下类型可以直接替换/增强：\n\n*   `<navigation-handler>`\n\
  *   `<view-handler>`\n*   `<resource-handler>`\n*   `<search-expression-handler>`\n\
  *   `<flow-handler>`\n*   `<state-manager>`\n*   `<action-listener>`\n\n请注意，所有这些都是单例。从\
  \ JSF 运行时的角度来看，每种类型只有一个实例，但通过包装支持多个实现各自添加功能，从而形成一个链（实现 A 包装实现 B，包装实现 C，等等）。\n\n\
  上述用于每种类型的特定元素立即凸显了经典方法的一个问题；JSF *必须* 为每种要以这种方式替换/增强的特定类型提供显式支持。相比之下，CDI 方法允许我们替换/增强几乎任何类型，而无需\
  \ JSF 提供任何特殊支持，只要 JSF 对该工件使用 CDI 即可。\n\n好的一面是，目前工厂实现比 CDI 版本稍微简单一些，因为“先前”或“原始”类型只是通过构造函数传递给它，而无需使用冗长的代码进行查找。\n\
  \n作为示例，我们将展示如何增强外部上下文工厂。为此，我们首先在 `faces-config.xml` 中进行上述注册。\n\n```\n<factory>\n\
      <external-context-factory>\n        com.example.project.ExternalContextProducer\n\
      </external-context-factory>\n</factory>\n```\n\n然后实现如下所示：\n\n```\npublic class\
  \ ExternalContextProducer extends ExternalContextFactory {\n    public ExternalContextProducer(ExternalContextFactory\
  \ wrapped) {\n        super(wrapped);\n    }\n\n@Override\n    public ExternalContext\
  \ getExternalContext\n        (Object context, Object request, Object response)\n\
      {\n        ExternalContext previousExternalContext =\n            getWrapped().getExternalContext(context,\
  \ request, response);\n        ExternalContext newExternalContext =\n            new\
  \ ExternalContextWrapper(previousExternalContext) {\n                @Override\n\
                  public String getAuthType() {\n                    return \"OurOwnAuthType\"\
  ;\n                }\n            };\n        return newExternalContext;\n    }\n\
  }\n```\n\n\n\n这里需要注意几点。首先，这类工厂都必须继承自一个预先定义的父工厂，在本例中就是 `ExternalContextFactory`。其次，存在一个必须遵循的隐式契约，即严格按照示例所示的方式实现构造函数。也就是说，添加一个公共构造函数，其单一参数的类型与超类完全相同，并将此参数传递给父构造函数。然后，该实例可以通过\
  \ `getWrapped()` 方法在其他方法中使用。\n\n测试其是否正常工作相对简单。我们使用一个与 CDI 版本类似的支撑 bean：\n\n```\n\
  @Named @RequestScoped\npublic class TestBean {\n\n@Inject\n    private ExternalContext\
  \ externalContext;\n\npublic String getAuth() {\n        return externalContext.getAuthType();\n\
      }\n}\n```\n\n以及以下 Facelet：\n\n```\n<!DOCTYPE html>\n<html lang=\"en\"\n    xmlns=\"\
  http://www.w3.org/1999/xhtml\"\n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n\
  >\n    <h:head />\n    <h:body>\n        <p>Test: #{testBean.auth}</p>\n    </h:body>\n\
  </html>\n```\n\n由于外部上下文也是一种可通过 CDI 注入的类型，细心的读者可能会好奇，当同时为该类型提供了 CDI 替代生产者和经典工厂时会发生什么。答案是，严格来说这并未被规范明确（因此属于未定义行为），但在实践中，强烈暗示经典工厂被用作最终获取外部上下文的来源。这意味着，`ExternalContext`\
  \ 的替代生产者只会影响 `ExternalContext` 的直接注入，而不会影响通过任何其他方式获取该类型的情况，例如，通过调用 `FacesContext#getExternalContext()`。这是用户应该清楚意识到的一点。不过，预计规范的未来修订版将使\
  \ CDI 生产者成为初始来源。\n\n## 插件\n\nJSF 在替代生产者和工厂之外提供的另一种扩展类型，本质上是一种插件。这里，核心 JSF 类型不会被替换或增强，而是向运行时的某些部分添加额外的功能。因此，这些新增功能中的大多数必须以某种方式声明它们具体添加了什么，这与仅提供\
  \ X 或 Y 类型实现的工厂不同。\n\n插件作为 `faces-config.xml` 中 `<application>` 元素的子元素添加，就像上面提到的一些类似工厂的类型一样。支持以下类型：\n\
  \n*   `<el-resolver>`\n\n*   `<property-resolver>`（已弃用）\n\n*   `<variable-resolver>`（已弃用）\n\
  \n*   `<search-keyword-resolver>`\n\n我们已经在第 12 章的“自定义搜索关键字”一节中看到了搜索关键字解析器的一个示例。该解析器作为插件的一个特点是\
  \ `isResolverForKeyWord()` 方法，通过该方法，插件可以指示它将为哪个关键字或关键字模式运行。\n\n我们在这里再看另一个示例，即 EL\
  \ 解析器。属性解析器和变量解析器都已弃用，并被 EL 解析器取代。EL 解析器本身并非 JSF 特有的类型，而是源自表达式语言（EL）规范。不过，该规范的重要部分起源于\
  \ JSF。\n\nEL 解析器允许我们以自定义方式解释表达式的所谓基对象和属性。考虑表达式 `#{foo.bar.kaz}`，那么在解析“bar”时，“foo”是基对象，“bar”是属性；而在解析“kaz”时，“bar”是基对象，“kaz”是属性。起初可能有点令人惊讶的是，当解析“foo”时，基对象为\
  \ null，而“foo”是属性。\n\n在实践中，通常不需要添加自定义 EL 解析器，我们通常只需定义一个满足需求的命名 CDI bean 即可。然而，当 JSF\
  \ 集成在一个完全不同的环境中时，自定义 EL 解析器可能会发挥作用，例如，我们希望表达式解析到一个完全不同的（受管理的）bean 系统。即便如此，即使在这种情况下，CDI\
  \ 到其他 bean 的桥接器可能是更好的选择，但了解自定义 EL 解析器是我们武器库中的另一个工具也是件好事。\n\n无论如何，为了演示 EL 解析器的功能，我们将展示一个示例，其中\
  \ EL 表达式的基对象被解释为一个模式，这是我们无法直接用命名 CDI bean 做到的。\n\n以下展示了一个 EL 解析器示例：\n\n```\npublic\
  \ class CustomELResolver extends ELResolver {\n\nprotected boolean isResolverFor(Object\
  \ base, Object property) {\n        return base == null\n            && property\
  \ instanceof String\n            && ((String) property).startsWith(\"dev\");\n    }\n\
  \n@Override\n    public Object getValue\n        (ELContext context, Object base,\
  \ Object property)\n    {\n        if (isResolverFor(base, property)) {\n            context.setPropertyResolved(true);\n\
              return property.toString().substring(3);\n        }\n        return\
  \ null;\n    }\n\n@Override\n    public Class<?> getType\n        (ELContext context,\
  \ Object base, Object property)\n    {\n        if (isResolverFor(base, property))\
  \ {\n            context.setPropertyResolved(true);\n            return String.class;\n\
          }\n        return null;\n    }\n\n@Override\n    public Class<?> getCommonPropertyType\n\
          (ELContext context, Object base)\n    {\n        return base == null ? getType(context,\
  \ base, null) : null;\n    }\n\n@Override\n    public boolean isReadOnly\n        (ELContext\
  \ context, Object base, Object property)\n    {\n        return true;\n    }\n\n\
  @Override\n    public void setValue\n        (ELContext context, Object base, Object\
  \ property, Object value)\n    {\n        // NOOP;\n    }\n\n@Override\n    public\
  \ Iterator<FeatureDescriptor> getFeatureDescriptors\n        (ELContext context,\
  \ Object base)\n    {\n        return null;\n    }\n}\n```\n\n如果我们现在使用以下 Facelet：\n\
  \n```\n<!DOCTYPE html>\n<html lang=\"en\"\n    xmlns=\"http://www.w3.org/1999/xhtml\"\
  \n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n>\n    <h:head />\n    <h:body>\n\
          <p>Test: #{devThisIsDev}</p>\n    </h:body>\n</html>\n```\n\n我们会在请求时看到打印出“Test:\
  \ ThisIsDev”。这里发生的是，自定义 EL 解析器处理所有以“dev”开头的名称。\n\n## 动态扩展\n\n前面的示例主要涉及静态注册我们需要的扩展，例如，通过在\
  \ `faces-config.xml` 中直接注册工厂或类型。工厂为我们提供了一些实现动态行为的机会。也就是说，在调用工厂时，我们可以决定返回什么新类型（如果有的话）。\n\
  \n为了实现更动态的行为，通常需要能够动态添加工厂，或者在 CDI 中动态添加生产者。CDI 为此提供了一个复杂的 SPI（服务提供者接口）（简称为“CDI 扩展”），但这在一定程度上超出了本书的范围。\n\
  \n对于经典工厂以及实际上 `faces-config.xml` 中的所有内容，有一种相对底层的方法可以动态添加它们：应用程序配置填充器，我们接下来将讨论它。\n\
  \n\n\n### 应用程序配置填充器\n\n应用程序配置填充器是一种机制，用于通过编程方式提供额外的 `faces-config.xml` 文件，尽管它使用的是\
  \ XML DOM（文档对象模型）API（应用程序编程接口）。这个 DOM API 使用起来可能有些晦涩，而且应用程序配置填充器的功能受限于它只能进行配置。在\
  \ JSF 中，没有 SPI 能够在此层级直接修改其他 `faces-config.xml`。\n\n该机制通过实现抽象类 `javax.faces.application.ApplicationConfigurationPopulator`，并将该类的完全限定类名放入\
  \ JAR 库的 `META-INF/services/javax.faces.application.ApplicationConfigurationPopulator`\
  \ 文件中来工作。\n\n为了演示这一点，我们将创建之前演示过的 `ExternalContextProducer` 的另一个版本，这次使用上述的 `ApplicationConfigurationPopulator`。为此，我们采用相同的代码，移除\
  \ `faces-config.xml` 文件，并添加 `META-INF/services` 条目以及以下 Java 类：\n\n```\npublic class\
  \ ConfigurationProvider\n    extends ApplicationConfigurationPopulator\n{\n    @Override\n\
      public void populateApplicationConfiguration(Document document) {\n        String\
  \ ns = document.getDocumentElement().getNamespaceURI();\n        Element factory\
  \ = document.createElementNS(ns, \"factory\");\n        Element externalContextFactory\
  \ =\n            document.createElementNS(ns, \"external-context-factory\");\n        externalContextFactory.appendChild(\n\
              document.createTextNode(\n                ExternalContextProducer.class.getName()));\n\
          factory.appendChild(externalContextFactory);\n        document.getDocumentElement().appendChild(factory);\n\
      }\n}\n```\n\n需要注意的是，由于这底层使用了 `java.util.ServiceLoader`，它仅在 `ConfigurationProvider`\
  \ 和 `ExternalContextProducer` 一起被打包到放置在 WAR 的 `/WEB-INF/lib` 目录下的实际 JAR 库中时才有效，而不是直接放在\
  \ WAR 中。\n\n### 应用程序主类\n\n上面我们讨论了应用程序配置填充器，正如我们所看到的，它实际上是一种 `faces-config.xml` 提供者。这意味着它处理的是完全限定类名和本质上仍是文本的元素。\n\
  \nJSF 也提供了一些更传统的编程式 API，其中最著名的可能是 `javax.faces.application.Application` 主类，它除了其他功能外，还持有我们在“扩展经典构件”一节中提到的那些单例。为了完整起见，我们在此重复这个列表。\n\
  \n*   `javax.faces.application.NavigationHandler`\n\n*   `javax.faces.application.ViewHandler`\n\
  \n*   `javax.faces.application.ResourceHandler`\n\n*   `javax.faces.component.search.SearchExpressionHandler`\n\
  \n*   `javax.faces.flow.FlowHandler`\n\n*   `javax.faces.application.StateManager`\n\
  \n*   `javax.faces.event.ActionListener`\n\n所有这些在 `Application` 类上都有相应的 setter 方法。例如，下面展示了\
  \ `ActionListener` 的 Javadoc 和方法声明：\n\n```\n/**\n  * <p>\n  * 设置要为所有 {@link javax.faces.component.ActionSource}\
  \ 组件注册的默认 {@link ActionListener}。\n  * </p>\n  *\n  * @param listener 新的默认 {@link\
  \ ActionListener}\n  *\n  * @throws NullPointerException\n  *            如果 <code>listener</code>\
  \ 为 <code>null</code>\n  */\npublic abstract void setActionListener(ActionListener\
  \ listener);\n```\n\n同样地，`Application` 类对于我们在“插件”一节中提到的插件类型也有“add”方法。\n\n*   `javax.el.ELResolver`\n\
  \n*   `javax.faces.el.PropertyResolver`（已弃用）\n\n*   `javax.faces.el.VariableResolver`（已弃用）\n\
  \n*   `javax.faces.component.serarch.SearchKeywordResolver`\n\n使用 `Application`\
  \ 类来设置这些单例的一个困难在于，首先，它对时机很敏感。这意味着我们只能从某个特定时间点开始设置这些类，显然不能早于 `Application` 本身可用的时间点，并且对于某些单例，直到第一个请求被处理时才能设置。这个第一个请求是一个比较难以追踪的时间点。\n\
  \n具体来说，资源处理器、视图处理器、流程处理器和状态处理器，呃，状态*管理器*，在第一个请求之后就不能再设置了，而 EL 解析器和搜索关键字解析器在第一个请求之后也不能再添加。\n\
  \n为了演示这一点，我们将再次添加上面演示过的自定义 EL 解析器，但这次采用更动态的方式。为此，我们从 `faces-config.xml` 文件中移除 EL\
  \ 解析器，并添加一个系统监听器。我们的 `faces-config.xml` 文件如下所示：\n\n```\n<application>\n    <system-event-listener>\n\
          <system-event-listener-class>\n            com.example.project.ELResolverInstaller\n\
          </system-event-listener-class>\n        <system-event-class>\n            javax.faces.event.PostConstructApplicationEvent\n\
          </system-event-class>\n    </system-event-listener>\n</application>\n```\n\
  \n确实，这并没有摆脱 XML，实际上，XML 甚至更多了，但减少或摆脱 XML 并不是这里的重点，重点是以更动态的方式注册 EL 解析器的能力。\n\n我们刚刚在这里注册的系统事件监听器如下所示：\n\
  \n```\npublic class ELResolverInstaller implements SystemEventListener {\n\n@Override\n\
      public boolean isListenerForSource(Object source) {\n        return source instanceof\
  \ Application;\n    }\n\n@Override\n    public void processEvent(SystemEvent event)\
  \ {\n        Application application = (Application) event.getSource();\n        application.addELResolver(new\
  \ CustomELResolver());\n    }\n}\n```\n\n这里我们有一个系统事件监听器，它监听 `PostConstructApplicationEvent`。这通常是添加像\
  \ EL 解析器这样的插件的好时机。此时 `Application` 实例保证可用，并且请求处理尚未开始，因此我们肯定能在第一个请求被处理之前及时完成。\n\n\
  \n\n## 局部扩展与包装\n\n在某些情况下，我们并不希望全局覆盖（例如）视图处理器，而仅希望在组件中某个方法的局部调用中生效。JSF 通过传递 `FacesContext`\
  \ 来实现这一点，组件将其作为获取几乎所有其他内容的主要入口点。对于 JSF 2.3 而言，组件并非 CDI 制品，也无法通过其他方式注入，因此 CDI 方法目前不适用于它们。\n\
  \n局部扩展可以通过包装 faces 上下文并将包装后的上下文传递给下一层来实现。请注意，Servlet 规范使用了相同的模式：`HttpServletRequest`\
  \ 和 `HttpServletResponse` 可以被过滤器包装，然后传递给下一个过滤器，该过滤器可以再次包装并传递给下一个过滤器，依此类推。\n\n为了说明这一点，假设对于某个特定组件，我们希望增强表单组件等所使用的操作\
  \ URL 生成方式，使得 `\"?foo=bar\"` 被添加到该 URL 中。如果我们通过全局覆盖视图处理器来实现，所有使用该视图处理器的组件和其他代码都会看到这个\
  \ URL，而我们只希望这个特定组件拥有此行为。\n\n为了实现这一点，我们使用包装技术，如下面的组件所示：\n\n```\n@FacesComponent(createTag\
  \ = true)\npublic class CustomForm extends HtmlForm {\n\n@Override\n    public void\
  \ encodeBegin(FacesContext context) throws IOException {\n        super.encodeBegin(new\
  \ ActionURLDecorator(context));\n    }\n}\n```\n\n如果没有 JSF 的支持，实现包装器至少可以说是一项相当繁琐的任务，因为从\
  \ `FacesContext` 到 `ViewHandler` 的路径需要多次调用，并且涉及的类拥有大量方法。幸运的是，JSF 通过为其大部分重要制品提供包装器，并附带易于使用的构造函数，极大地简化了这项任务。\n\
  \n这里使用的模式是：顶层类（上例中的 `ActionURLDecorator`）继承自 `FacesContextWrapper`，并将原始 faces 上下文传递给其超类。然后，通过覆盖链中的初始方法（此处为\
  \ `getApplication()`），并返回该方法返回类型的包装器（将超类版本传递给其构造函数），来实现中间对象的路径。这个包装器随后对链中的下一个方法执行相同操作，直到到达需要自定义行为的最终方法。\n\
  \n以下是一个示例：\n\n```\npublic class ActionURLDecorator extends FacesContextWrapper {\n\
  \npublic ActionURLDecorator(FacesContext context) {\n        super(context);\n    }\n\
  \n@Override\n    public Application getApplication() {\n        return new ApplicationWrapper(super.getApplication())\
  \ {\n            @Override\n            public ViewHandler getViewHandler() {\n\
                  return new ViewHandlerWrapper(super.getViewHandler()) {\n                    @Override\n\
                      public String getActionURL\n                        (FacesContext\
  \ context, String viewId)\n                    {\n                        String\
  \ url = super.getActionURL(context, viewId);\n                        return url\
  \ + \"?foo=bar\";\n                    }\n                };\n            }\n        };\n\
      }\n}\n```\n\n在 JSF 应用程序中引入这两个类后，现在考虑以下使用我们自定义表单组件的 Facelet：\n\n```\n<!DOCTYPE\
  \ html>\n<html lang=\"en\"\n    xmlns=\"http://www.w3.org/1999/xhtml\"\n    xmlns:h=\"\
  http://xmlns.jcp.org/jsf/html\"\n    xmlns:test=\"http://xmlns.jcp.org/jsf/component\"\
  \n>\n    <h:head />\n    <h:body>\n        <test:customForm action=\"index\">\n\
              <h:commandButton action=\"index\" value=\"Go Index\" />\n        </test:customForm>\n\
      </h:body>\n</html>\n```\n\n请记住，当自定义组件使用 `@FacesComponent(createTag=true)` 注解时，无需进行\
  \ XML 注册，其 XML 命名空间默认为 [`xmlns.jcp.org/jsf/component`](http://xmlns.jcp.org/jsf/component)，组件标签名称默认为简单的类名。（另请参见第\
  \ 11 章。）\n\n如果我们请求与此 Facelet 对应的视图并按下按钮，我们确实会看到 `\"?foo=bar\"` 出现在 URL 之后，这意味着我们通过包装器链对视图处理器进行的局部扩展已正确生效。\n\
  \n\n\n## 内省\n\n能够正确扩展框架的一个重要方面，不仅在于能够利用扩展点，还在于能够内省框架并查询它有哪些工件或资源可用。\n\nJSF 提供内省支持的一个方面是，它能够揭示系统中存在哪些视图资源。请记住，在\
  \ JSF 中，像 Facelets 这样的视图被抽象在视图处理器之后，而视图处理器又管理着一个或多个视图声明语言（VDL）实例。VDL，也称为模板引擎，能够通过资源处理器读取其视图。正如我们在本章中所见，所有这些组件都可以被增强，甚至被完全替换。\n\
  \n这具体意味着视图可以来自任何地方（例如，最典型的是来自文件系统），但也可以在内存中生成、从数据库加载、通过网络获取等等。此外，像 Facelets 使用的简单物理文件到逻辑视图名称的映射，对于其他视图声明语言来说，也并非必须如此。\n\
  \n总而言之，这意味着如果没有一个明确的内省机制，使得我们可以询问视图处理器、VDL 和资源处理器它们有哪些视图/资源可用，我们就无法可靠地获取完整的视图列表。\n\
  \n例如，当我们想要使用所谓的无扩展名 URL 时，就需要这样的视图列表。无扩展名 URL 是指没有任何扩展名（如 `.xhtml` 或 `.jsf`），也没有任何额外路径映射（如\
  \ `/faces/**`）的 URL。由于 URL 本身缺乏任何提示，JSF 运行其上的 Servlet 容器必须通过其他方式知道某个请求必须被路由到 faces\
  \ servlet。\n\n一种特别优雅的方式是利用 Servlet 的“精确映射”功能，这是 URL 映射的一种变体，其中将精确的名称（而非模式）映射到给定的\
  \ servlet，在本例中就是 faces servlet。由于 Servlet 规范提供了动态添加 Servlet 映射的 API，并且 JSF 提供了动态内省哪些视图可用的\
  \ API，我们基本上只需要将这两者结合起来即可实现无扩展名 URL。\n\n以下是一个如何实现此功能的示例：\n\n```\n@WebListener\npublic\
  \ class ExtensionLessURLs implements ServletContextListener {\n    @Override\n    public\
  \ void contextInitialized(ServletContextEvent event) {\n        FacesContext facesContext\
  \ = FacesContext.getCurrentInstance();\n        event.getServletContext()\n            .getServletRegistrations()\n\
              .values()\n            .stream()\n            .filter(servlet -> servlet\n\
                  .getClassName().equals(FacesServlet.class.getName()))\n            .findAny()\n\
              .ifPresent(facesServlet -> facesContext\n                .getApplication()\n\
                  .getViewHandler()\n                .getViews(facesContext, \"/\"\
  ,\n                    ViewVisitOption.RETURN_AS_MINIMAL_IMPLICIT_OUTCOME)\n                .forEach(view\
  \ -> facesServlet.addMapping(view)));\n    }\n}\n```\n\n这里发生的是，我们首先尝试找到 faces servlet，这恰好是内省的另一个例子，这次是在\
  \ Servlet 规范中。如果找到了，我们就向视图处理器请求所有视图。如上所述，这将在内部内省所有可用的视图声明实例，而这些实例又可能内省资源处理器。`RETURN_AS_MINIMAL_IMPLICIT_OUTCOME`\
  \ 参数用于确保所有视图都以最简形式返回，不附加任何文件扩展名或其他标记。这与例如操作方法返回或命令组件的 `action` 属性中使用的形式相同。\n\n获得正确格式的视图流后，我们直接将每个视图作为精确映射添加到我们之前找到的\
  \ faces servlet 中。\n\n例如，假设我们在 Web 根目录下的 `/foo` 文件夹中有一个名为 `bar.xhtml` 的 Facelet\
  \ 视图。那么 `getViews()` 将返回一个包含字符串 `\"/foo/bar\"` 的流。当 faces servlet 被映射到这个 `\"/foo/bar\"\
  ` 时，并假设 JSF 应用程序部署在域 `localhost` 端口 `8080` 的上下文路径 `/test` 下，我们可以请求 `http://localhost:8080/test/foo/bar`\
  \ 来查看该 Facelet 的渲染响应。\n\n请注意，尽管通过这种方式在 JSF 中实现无扩展名 URL 相对简单，但为每个应用程序都这样做仍然有些繁琐。预计\
