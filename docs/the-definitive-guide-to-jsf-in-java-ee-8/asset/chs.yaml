  正如你在黄色警告栏中所看到的，只有 Eclipse 需要进一步配置。这涉及到新选择的 JSF 和 JPA facet。点击该链接后，我们会看到 *Modify
  Faceted Project* 向导（参见图 2-14）。


  *Modify Faceted Project* 向导的第一步允许我们配置 JPA facet。我们需要确保指示 Eclipse，JPA 实现已由目标运行时提供，因此
  Eclipse 不需要包含任何库。这可以通过在 *JPA* *implementation* 字段中选择“Disable Library Configuration”选项来实现。由于我们将使用
  Payara 提供的 Hibernate 作为实际的 JPA 实现，它会自动支持发现带有 `@Entity` 注解的类，我们希望指示 Eclipse 也这样做；否则，当通过实体代码生成向导进行操作时，它会自动将实体添加到
  `persistence.xml` 中，或者当我们手动创建一个实体但未将其添加到 `persistence.xml` 时显示警告。


  ![A454457_1_En_2_Fig14_HTML.jpg](img/A454457_1_En_2_Fig14_HTML.jpg)




  ###### 图 2-14 JPA 方面配置


  请注意，目前无需配置数据库连接，因为我们将使用嵌入式数据库。


  在*修改方面项目*向导的下一步中，我们可以配置 JSF 功能（见图 2-15）。同样，我们需要确保 Eclipse 被告知 JSF 实现已由目标运行时提供，因此
  Eclipse 无需包含任何库。这可以通过在*JSF 实现库*字段中选择“禁用库配置”选项来实现。此外，我们需要将 FacesServlet 的 Servlet
