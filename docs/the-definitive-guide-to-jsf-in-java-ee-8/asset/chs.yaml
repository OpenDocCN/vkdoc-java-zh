  在本章中，你将学习如何从零开始，使用 Eclipse IDE（集成开发环境）、Payara 应用服务器和 H2 数据库搭建一个 JSF（JavaServer Faces）开发环境。


  ## 安装 Java SE JDK


  你可能已经知道，Java SE 以 JRE 形式提供给最终用户，以 JDK 形式提供给软件开发人员。Eclipse 本身并不严格要求 JDK，因为它有自己的编译器。JSF
  作为一个软件库，运行也不需要 JDK。然而，Payara 确实需要 JDK 才能运行，主要是为了能够编译 JSP 文件，尽管自 JSF 2.0 以来，JSP 已作为
  JSF 视图技术被弃用。


  因此，你需要确保已按照 Oracle 的说明安装了 JDK。当前的 Java SE 版本是 9，但由于 Java EE 8 是为目前更成熟的 Java SE 8
  设计的，因此推荐使用 JDK 8：[`docs.oracle.com/javase/8/docs/technotes/guides/install/install_overview.html`](https://docs.oracle.com/javase/8/docs/technotes/guides/install/install_overview.html)。


  最重要的部分是：PATH 环境变量应包含存放 Java 可执行文件的 /bin 文件夹（例如，“/path/to/jdk/bin”），并且 JAVA_HOME
  环境变量应设置为 JDK 根文件夹（例如，“/path/to/jdk”）。JSF 本身并不严格要求这些，但 Eclipse 和 Payara 需要它们。Eclipse
  需要 PATH 来查找 Java 可执行文件。Payara 需要 JAVA_HOME 来查找 JDK 工具。




  ### 关于 Java EE 需要注意什么？


  请注意，你**不**需要从 Oracle.com 下载并安装 Java EE，即使 JSF 本身是 Java EE 的一部分。Java EE 基本上是一个抽象规范，而所谓的应用服务器则是其具体实现。这些应用服务器的例子包括
  Payara、WildFly、TomEE、GlassFish 和 Liberty。正是这些应用服务器，开箱即用地提供了 JSF（JavaServer Faces）、EL（表达式语言）、CDI（上下文和依赖注入）、EJB（企业级
  JavaBeans）、JPA（Java 持久化 API）、Servlet、WebSocket 和 JSON-P（JavaScript 对象表示法处理）等 API（应用程序编程接口）。


  还存在所谓的 Servlet 容器，它们基本上只开箱即用地提供 Servlet、JASPIC（Java 容器认证服务提供者接口）、JSP（JavaServer
  Pages）、EL 和 WebSocket API，例如 Tomcat 和 Jetty。然而，在这样的 Servlet 容器上手动安装和配置 JSF、JSTL（JSP
  标准标签库）、CDI、EJB 和 JPA 等组件需要一些工作。对于 EJB 来说，这甚至不是一件简单的事，因为它需要修改 Servlet 容器的内部结构。顺便提一下，这正是
  TomEE 存在的原因。它是一个基于裸机 Tomcat Servlet 容器引擎构建的 Java EE 应用服务器。


  回到 Oracle.com 上的 Java EE 下载，它基本上会提供 GlassFish 服务器，以及一堆文档和可选的 Netbeans IDE。我们不需要它，因为我们已经在使用
  Payara 作为 Java EE 应用服务器，并且将 Eclipse 作为 IDE。因此，Java SE JDK 就足够了。


  ## 安装 Payara


  Payara 是一个开源的 Java EE 应用服务器，于 2014 年从 GlassFish 分支出来。它基本上是对 Oracle 宣布停止对 GlassFish
  商业支持的一种回应，因此以前商业使用 GlassFish 的公司可以轻松切换到 Payara 并继续享受商业支持。得益于对以前使用 GlassFish 的商业客户提供的商业支持，Payara
  应用服务器软件可以持续进行错误修复和改进。


  第一个集成 JSF 2.3 的 Payara 版本是 5。你可以从 [`payara.fish`](https://payara.fish) 下载它。请确保你选择的是
  “Payara Server Full” 或 “Payara Server Web Profile” 下载，而不是例如 “Payara Micro” 或 “Payara
  Embedded”，因为它们有其他用途。安装基本上就是将下载的文件解压并放到你主目录下的某个位置。我们先把它放在那里，直到我们启动并运行 Eclipse，这样我们就可以将
  Payara 集成到 Eclipse 中，并让它管理服务器。


  ### 其他服务器呢？


  本书选择 Payara 的主要原因是，在撰写本文时，它是少数几个集成了 JSF 2.3 的 Java EE 应用服务器之一。另一个是 GlassFish，但我们不太推荐它，因为它基本上不提供商业支持或错误修复。GlassFish
  必须被视为其他应用服务器供应商的真正参考实现，以便他们可以在必要时通过示例构建自己的应用服务器实现。


  在撰写本文时，WildFly、TomEE 和 Liberty 还没有提供集成了 JSF 2.3 的版本。


  ## 安装 Eclipse


  Eclipse 是一个用 Java 编写的开源 IDE。它基本上就像一个记事本，但拥有成千上万甚至数百万的额外功能，例如自动编译类文件、用它们构建 WAR 文件，并将其部署到应用服务器，而无需在命令控制台中手动摆弄
  javac。


  Eclipse 有很多种版本。由于我们将使用 Java EE 进行开发，我们需要名为 “Eclipse IDE for Java EE developers”
  的版本。它通常是 [`eclipse.org/downloads/eclipse-packages/`](http://eclipse.org/downloads/eclipse-packages)
  上排名最高的下载链接。同样，安装基本上就是将下载的文件解压并放到你主目录下的某个位置。


  在 Windows 和 Linux 中，你会在解压后的文件夹中找到 eclipse.ini 配置文件。在 Mac OS 中，此配置文件位于 Eclipse.app/Contents/Eclipse
  中。打开此文件进行编辑。我们想要增加分配给 Eclipse 的内存。在 eclipse.ini 的底部，你会找到以下几行：


  ```

  -Xms256m

  -Xmx1024m

  ```


  这分别设置了 Eclipse 可以使用的初始和最大内存池大小。当你想开发一个像样的 Java EE 应用程序时，这有点太低了。让我们至少将这两个值都加倍。


  ```

  -Xms512m

  -Xmx2g

  ```


  注意，声明的内存不要超过可用的物理内存。当实际内存使用量超过可用物理内存时，它会继续使用虚拟内存，通常是磁盘上的交换文件。这将大大降低性能，并导致严重的卡顿和速度减慢。


  现在，你可以通过执行解压文件夹中的 eclipse 可执行文件来启动 Eclipse。系统会要求你选择一个目录作为工作空间。这是 Eclipse 将保存所有工作空间项目和元数据的目录。


  之后，Eclipse 会显示一个欢迎屏幕。目前这并不重要。你可以点击右上角的 *Workbench* 按钮来关闭欢迎屏幕。如有必要，请取消选中右下角的 “Always
  show Welcome at start up”。之后，你将进入工作台。默认情况下，它看起来像图 2-1 中的截图。


  ![A454457_1_En_2_Fig1_HTML.jpg](img/A454457_1_En_2_Fig1_HTML.jpg)


  ###### 图 2-1 Eclipse 工作台


  ### 配置 Eclipse


  在我们可以开始编写代码之前，我们想对 Eclipse 进行一些微调，以免最终遇到麻烦或烦恼。Eclipse 有大量的设置，其中一些默认值本不应该成为默认值。你可以通过
  *Window ➤ Preferences* 来查看和配置设置。


  *   *General ➤ Workspace ➤ Text file encoding* 必须设置为 **UTF-8**。特别是在 Windows 中，否则可能会默认使用专有的
  CP-1252 编码，该编码不支持拉丁语系以外的任何字符。当使用 CP-1252 读取和保存 Unicode 文件时，你可能会看到难以理解的字符序列。这也被称为“乱码”。¹


  *   *General ➤ Workspace ➤ New text file line delimiter* 必须设置为 **Unix**。它在 Windows
  上也能正常工作。这尤其能让版本控制系统保持满意。否则，在不同操作系统上拉取代码的开发人员可能会因为不同的换行符而面临令人困惑的冲突或差异。


  *   *General ➤ Editors ➤ Text editors ➤ Spelling* 最好**禁用**。这将为你避免一个潜在的巨大烦恼，因为它会不必要地检查
  faces-config.xml 和 web.xml 等 XML 配置文件中的拼写，导致这些文件中出现令人困惑的错误和警告。


  *   *Java ➤ Compiler ➤ Compiler compliance level* 必须设置为 **1.8**。这是 Java EE 8 所需的最低
  Java 版本。


  *   *Java ➤ Installed JREs* 必须设置为 **JDK**，而不是 JRE。此设置通常也用于执行集成的应用服务器，而应用服务器通常需要
  JDK。




  ### 安装 JBoss Tools 插件


  当前版本的 Eclipse Java EE 标准版不支持任何 CDI 工具。它没有用于创建 CDI 托管 Bean 的向导，也没有用于 JSF 页面中 CDI
  托管 Bean 的自动补全和超链接功能。JBoss Tools 插件是一个功能丰富的插件，其中就提供了 CDI 工具。² 这在开发 Java EE Web 应用程序时非常有用。


  要安装它，请转到 *帮助 ➤ Eclipse Marketplace*。在搜索字段中输入“JBoss Tools”，然后点击 *Go*。在结果中向下滚动，直到看到
  JBoss Tools Final，然后点击 *Install*（见图 2-2）。


  ![A454457_1_En_2_Fig2_HTML.jpg](img/A454457_1_En_2_Fig2_HTML.jpg)


  ###### 图 2-2 Eclipse Marketplace 中的 JBoss Tools


  在下一步中，您将看到一个相当长的列表，列出了所有 JBoss Tools 的组件。我们并不需要全部安装。该列表确实也包含一些与 JSF 相关的工具，但它们并不是特别有用。可视化页面编辑器则完全没有用处。通过拖拽来组装
  JSF 页面并不能让您成为一名优秀的 JSF 开发者。只有亲自编写代码才能做到这一点。此外，安装并隐式启用了太多未使用的功能可能会使 Eclipse 变得极其缓慢。您选择的功能越少，IDE
  行为发生意外变化的可能性就越小。因此，取消选中顶部的复选框，然后仅选中“Context and Dependency Injection Tools”（上下文和依赖注入工具）复选框（见图
  2-3）。


