  接下来，接受许可协议的条款，并完成向导，直到 Eclipse 重新启动。


  ### 在 Eclipse 中集成新服务器


  我们需要让 Eclipse 熟悉任何已安装的应用服务器，以便 Eclipse 能够无缝地将其 Java EE API 库链接到项目的构建路径中（即：项目的编译时类路径）。这是为了能够在您的项目中导入
  Java EE API 中的类所必需的。您知道，应用服务器本身代表了抽象 Java EE API 的具体实现。


  为了在 Eclipse 中集成一个新的应用服务器，首先检查工作台底部区域，那里有多个选项卡代表不同的*视图*（您可以通过 *窗口 ➤ 显示视图* 添加新的视图）。点击
  *服务器* 选项卡以打开服务器视图（见图 2-4）。点击显示“没有可用的服务器。点击此链接创建一个新服务器...”的链接。


  ![A454457_1_En_2_Fig4_HTML.jpg](img/A454457_1_En_2_Fig4_HTML.jpg)


  ###### 图 2-4 Eclipse 工作台的服务器视图


  从可用服务器工具列表中，选择 *Oracle ➤ GlassFish Tools*（见图 2-5）。


  ![A454457_1_En_2_Fig5_HTML.jpg](img/A454457_1_En_2_Fig5_HTML.jpg)


  ###### 图 2-5 在新建服务器向导中选择 GlassFish Tools


  首次点击 *下一步* 后，它将在后台下载插件，并要求您在安装插件前接受许可协议。此插件是必需的，以便能够从工作台内部管理任何基于 GlassFish 的服务器——包括将
  Eclipse 项目添加到部署文件夹或从中移除、启动和停止服务器，以及以调试模式运行服务器。安装完成后，它会要求您重新启动 Eclipse。请相应地进行操作。


  返回工作区后，再次点击 *服务器* 视图中的相同链接。您现在将看到一个 *GlassFish* ➤ *GlassFish* 选项。选择此项，并将 *服务器名称*
  字段设置为“Payara”（见图 2-6）。


