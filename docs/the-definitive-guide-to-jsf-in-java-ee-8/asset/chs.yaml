  ## 在 Eclipse 中创建新项目


  我们现在准备好在 Eclipse 中为我们的 JSF 应用程序创建一个新项目。这可以通过工作台的左侧区域完成，该区域默认只显示一个代表*项目资源管理器*视图的选项卡（同样，您可以通过
  *窗口 ➤ 显示视图* 添加新视图）。在此视图中的任意位置右键单击，然后选择 *新建 ➤ 项目*。它将显示 *新建项目* 向导，其中可能包含过多的选项。


  Eclipse 作为一个适用于多种不同项目任务的 IDE，提供了令人眼花缭乱的各种项目类型供您选择。对于将要部署为简单 WAR 文件的基于 Java EE 的应用程序，我们基本上有两种项目类型可供选择：*Web
  ➤ 动态 Web 项目* 和 *Maven ➤ Maven 项目*。


  区别在于，前者是 Eclipse 原生项目，实际上只能在 Eclipse 上工作；而后者是一种通用项目类型，可以由任何 IDE 构建，也可以轻松地在命令行以及各种
  CI 服务器（如 Travis 和 Jenkins）上构建。因此，Maven 项目类型实际上是唯一可行的选择（见图 2-9）。


  ![A454457_1_En_2_Fig9_HTML.jpg](img/A454457_1_En_2_Fig9_HTML.jpg)


  ###### 图 2-9 在新建项目向导中选择 Maven 项目（注意动态 Web 项目是另一个但不可行的选项）


  在下一步中，确保选中 *创建一个简单项目（跳过原型选择）* 选项（见图 2-10）。这将让我们从一个真正空的 Maven 项目开始，以便我们自己配置和填充它。当然，您也可以选择一个原型，这基本上是一个包含几个已准备好的文件和配置的模板项目。但目前我们不需要任何原型。


  ![A454457_1_En_2_Fig10_HTML.jpg](img/A454457_1_En_2_Fig10_HTML.jpg)


  ###### 图 2-10 在新建 Maven 项目向导中勾选“创建一个简单项目”


  在下一步中，我们可以指定我们自己的项目 Maven 坐标。Maven 坐标包括 *Group Id*、*Artifact Id* 和 *Version*，在 Maven
  世界中也被称为 GAV。*Group Id* 通常与您将要使用的根包名匹配，例如 com.example。*Artifact Id* 通常代表您将要使用的项目名称。为简单起见并为了与本书其余部分保持一致，我们将使用
  project。*Version* 可以保持默认的 0.0.1-SNAPSHOT。最后，*Packaging* 应设置为 war。


  ![A454457_1_En_2_Fig11_HTML.jpg](img/A454457_1_En_2_Fig11_HTML.jpg)


  ###### 图 2-11 在新建 Maven 项目向导中填写 Maven GAV


  完成 *新建 Maven 项目* 向导的其余部分（见图 2-11）。您无需编辑任何其他字段。完成向导后，您将在 *项目资源管理器* 视图中看到项目结构（见图 2-12）。


  ![A454457_1_En_2_Fig12_HTML.jpg](img/A454457_1_En_2_Fig12_HTML.jpg)




  ###### 图 2-12 Eclipse 中新建的 Maven 项目


  遗憾的是，Eclipse 生成的 `pom.xml`（它是项目作为 Maven 项目并包含其配置的主要标志）并不理想。它已经过时了，即使是由最新的 Eclipse
  Oxygen 2（2017 年 12 月版）生成的也是如此。从 `pom.xml` 文件上标有令人警惕的红叉以及 *Markers* 视图中显示的错误消息，你就能看出这一点。任何至少有一个此类红叉的项目都无法构建，也无法部署。错误消息明确写着“web.xml
  is missing and <failOnMissingWebXml> is set to true.” 换句话说，Maven 不知何故认为这仍然是一个 Java
  EE 6 之前的项目，而实际上这已经是不允许的了。


  为了解决这个问题，并使 Eclipse 生成的 `pom.xml` 符合当前标准，我们需要打开 `pom.xml` 进行编辑，并按照以下代码所示进行调整：


  ```

  <project

      xmlns:="http://maven.apache.org/POM/4.0.0"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xsi:schemaLocation="http://maven.apache.org/POM/4.0.0

          http://maven.apache.org/xsd/maven-4.0.0.xsd"

  >

      <modelVersion>4.0.0</modelVersion>


  <groupId>com.example</groupId>

      <artifactId>project</artifactId>

      <version>0.0.1-SNAPSHOT</version>

      <packaging>war</packaging>


  <properties>

          <project.build.sourceEncoding>

              UTF-8

          </project.build.sourceEncoding>

          <project.reporting.outputEncoding>

              UTF-8

          </project.reporting.outputEncoding>

          <maven.compiler.source>1.8</maven.compiler.source>

          <maven.compiler.target>1.8</maven.compiler.target>

          <failOnMissingWebXml>false</failOnMissingWebXml>

      </properties>


  <dependencies>

          <dependency>

              <groupId>javax</groupId>

              <artifactId>javaee-api</artifactId>

              <version>8.0</version>

              <scope>provided</scope>

          </dependency>

      </dependencies>

  </project>

  ```


  保存此文件后，Eclipse 会自动处理并清除那个令人警惕的红叉。现在看起来好多了。我们将简要介绍这里最重要的设置。


  *   打包方式 **war**——表示该项目是一个“Web”项目，并且项目的内容将被组装成一个 Web 归档文件。

  *   编码 **UTF-8**——设置源文件所使用的编码，以及生成（报告）输出文件时应使用的编码。这使构建过程可重复，否则它将默认使用系统默认编码（同样，这是一个相当糟糕的默认设置）。

  *   编译器 **1.8**——同时设置 `.java` 源文件中使用的 Java 版本以及 `.class` 文件中的字节码输出版本。如果不设置此项，Maven
  会默认使用最旧的版本，有时甚至比最旧的版本还低。

  *   failOnMissingWebXml **false**——旧版本的 Java EE 要求必须存在 `/WEB-INF/web.xml` 文件。尽管自
  2009 年发布的 Java EE 6 以来，这已不再是必需项，但 Maven 仍然会检查此文件是否存在。将其设置为 `false` 可以避免这种不必要的检查。

  *   依赖 **javax:javaee-api:8.0 provided**——声明了对 Java EE 8 API 的依赖，并确保编译器能够识别所有 Java
  EE 类型，例如 `@Named`。此依赖项被设置为 `provided`，因为这些类型已由目标运行时（在我们的例子中是 Payara）提供。因此，它们将仅用于编译源代码，而不会包含在生成的
  `.war` 文件中。你必须绝对确保任何由目标运行时提供的编译时依赖项都被设置为 `provided`；否则，它们最终会出现在生成的 `.war` 文件中，你可能会遇到类加载问题，其中不同版本的重复库会相互冲突。如果你实际的目标不是完整的
  Java EE 服务器，而是一个精简的 Servlet 容器，则需要按照 Mojarra 的 README 中的说明调整依赖项，³ Mojarra 是可用的 JSF
  实现之一，实际上也是 Payara 底层使用的实现。


  现在，在 Eclipse 的 *Markers* 视图中，只剩下一个警告，内容是“Build path specifies execution environment
  J2SE-1.5. There are no JREs installed in the workspace that are strictly compatible
  with this environment.” 嗯，这基本上意味着 Eclipse 将此 Maven 项目识别为仅支持 Java 1.5 的项目，而我们实际上并没有安装
  Java SE 5，尽管 `pom.xml` 中的编译器版本已设置为 1.8。


  为了告诉 Eclipse 这确实是一个 Java 1.8 项目，我们需要在 *Project Explorer* 视图中右键单击该项目，然后选择 *Properties*。在
  *Project Facets* 部分，你应该将 *Java* facet 的版本从 1.5 更改为 1.8（如果你安装了 JDK 9，则更改为 9）（参见图
  2-13）。同时，我们还需要更新 Servlet API 版本，并添加 CDI、JSF 和 JPA facet。Servlet API 由“Dynamic Web
  Module”条目表示。这需要设置为版本 4.0，以匹配 Java EE 8。此外，还需要选择“CDI”、“JavaServer Faces”和“JPA”条目。顺便提一下，“CDI”facet
  只有在按照“安装 JBoss Tools 插件”一节的说明安装了 JBoss Tools 后才可用。


  遗憾的是，在最新的可用 Eclipse 版本（2017 年 12 月的 Oxygen 2）中，下拉菜单中还没有 JSF 2.3 或 JPA 2.2 版本。可用的最高版本是
  JSF 2.2 和 JPA 2.1。这不是一个大问题。它唯一的影响在于可用的代码生成器和向导。我们之后可以随时调整 Eclipse 生成的 `faces-config.xml`
  和 `persistence.xml` 文件，以匹配 Java EE 8 兼容的版本。


  ![A454457_1_En_2_Fig13_HTML.jpg](img/A454457_1_En_2_Fig13_HTML.jpg)


