  ## 安装 H2


  H2⁴ 是一个内存型 SQL 数据库。它是一个嵌入式数据库，对于快速建模和测试 JPA 实体非常有用，尤其是与基于 JPA 实体自动生成的 SQL 表结合使用时。将
  H2 添加到你的 Web 应用程序项目中，只需在 pom.xml 的 `<dependencies>` 部分添加以下依赖项：


  ```

  <dependency>

      <groupId>com.h2database</groupId>

      <artifactId>h2</artifactId>

      <version>1.4.196</version>

  </dependency>

  ```


  基本上就是这样。JDBC（Java 数据库连接）驱动程序已经内置其中。


  ### 配置数据源


  为了能够与 SQL 数据库交互，我们需要在 Web 应用程序项目中配置一个所谓的数据源。这可以通过在 web.xml 中添加以下部分来完成：


  ```

  <data-source>

      <name>java:global/DataSourceName</name>

      <class-name>org.h2.jdbcx.JdbcDataSource</class-name>

      <url>jdbc:h2:mem:test;DB_CLOSE_DELAY=-1</url>

  </data-source>

  ```


  数据源名称代表 JNDI（Java 命名和目录接口）名称。类名代表所使用的 JDBC 驱动程序的 `javax.sql.DataSource` 实现的完全限定名称。URL
  代表特定于 JDBC 驱动程序的 URL 格式。其语法取决于所使用的 JDBC 驱动程序。对于数据库名称为“test”的内存型 H2 数据库，其 URL 即为
  `jdbc:h2:mem:test`。H2 特有的 `DB_CLOSE_DELAY=-1` 路径参数基本上指示其 JDBC 驱动程序不要在数据库一段时间未被访问时自动关闭它，即使应用服务器仍在运行。


  现在，可以在任何 Servlet 容器管理的工件（如 Servlet 或过滤器）中按如下方式注入 DataSource 的具体实例：


  ```

  @Resource

  private DataSource dataSource;

  ```


  你可以通过 `DataSource#getConnection()` 从中获取 SQL 连接，用于传统的 JDBC 工作。然而，由于我们将要使用 Java EE，最好改用
  Java EE 自身的 JPA 来实现。


  ### 配置 JPA


  为了让 JPA 识别新添加的数据源，我们需要在 persistence.xml 中添加一个新的持久化单元，该单元将数据源用作 JTA 数据源。


  ```

  <persistence-unit name="PersistenceUnitName" transaction-type="JTA">

      <jta-data-source>java:global/DataSourceName</jta-data-source>


      <properties>

          <property

              name="javax.persistence.schema-generation.database.action"

              value="drop-and-create" />

      </properties>

  </persistence-unit>

  ```


  如你所见，数据源通过其 JNDI 名称进行标识。你还会注意到一个 JPA 特有的属性 `javax.persistence.schema-generation.database.action`，其值为“drop-and-create”，这基本上意味着
  Web 应用程序应基于 JPA 实体自动删除并创建所有 SQL 表。当然，这仅适用于原型设计目的，正如我们将在本书剩余部分使用此项目所做的那样。对于实际应用程序，你最好选择“create”或“none”（这是默认值）。事务类型设置为“JTA”基本上意味着应用服务器应自动管理数据库事务。这样，从客户端（通常是
  JSF 支持 bean）对 EJB 的每次方法调用都会透明地启动一个新事务，当 EJB 方法返回给客户端（通常是调用它的支持 bean）时，事务会自动提交并刷新。并且，EJB
  方法抛出的任何运行时异常都会自动回滚事务。


  ### 创建 JPA 实体


  现在，我们将创建一个 JPA 实体。基本上，它是一个 JavaBean 类，代表数据库表中的一条记录。每个 bean 属性都映射到数据库表的特定列。通常，JPA
  实体是针对现有数据库表进行建模的。但是，正如你在上一节“配置 JPA”中关于 persistence.xml 所读到的，反过来做也是可能的：基于 JPA 实体生成数据库表。


  右键点击项目的 src/main/java 文件夹，选择 *New ➤ JPA Entity*。在向导中，将 *Package* 设置为 com.example.project.model，并将
  *Name* 设置为 Message。其余字段可以保持默认或留空（参见图 2-24）。


  ![A454457_1_En_2_Fig24_HTML.jpg](img/A454457_1_En_2_Fig24_HTML.jpg)




  ###### 图 2-24 Eclipse 中的新建 JPA 实体向导


  按如下方式修改新的实体类：


  ```

  package com.example.project.model;


  import java.io.Serializable;

  import javax.persistence.Column;

  import javax.persistence.Entity;

  import javax.persistence.GeneratedValue;

  import javax.persistence.GenerationType;

  import javax.persistence.Id;

  import javax.persistence.Lob;

  import javax.validation.constraints.NotNull;


  @Entity

  public class Message implements Serializable {


      private static final long serialVersionUID = 1L;


      @Id @GeneratedValue(strategy=GenerationType.IDENTITY)

      private Long id;


      @Column(nullable = false) @Lob

      private @NotNull String text;


      // 添加/生成 getter 和 setter 方法。

  }

  ```


  提醒一下，你可以通过在类编辑器中右键单击任意位置并选择 *Source ➤ Generate Getters and Setters* 来让 Eclipse 生成
  getter 和 setter 方法。


  我们将简要介绍这里使用的注解。


  *   **@Entity**——将 Bean 标记为 JPA 实体，以便 JPA 实现会根据其所有属性自动收集与数据库相关的元数据。


  *   **@Id @GeneratedValue(strategy=IDENTITY)**——将一个属性标记为映射到 SQL “IDENTITY” 类型的数据库列。在
  MySQL 术语中，这相当于“AUTO_INCREMENT”。在 PostgreSQL 术语中，这相当于“BIGSERIAL”。


  *   **@Column**——将一个属性标记为映射到常规数据库列。实际的数据库列类型取决于所使用的 Java 类型。如果没有额外的 @Lob 注解，它是一个
  VARCHAR(255)，其长度可以通过 @Column(length=n) 来操作。然而，使用 @Lob 注解后，列类型变为 TEXT。


  *   **@Lob**——将一个 String 属性标记为映射到 TEXT 类型的数据库列，而不是长度受限的 VARCHAR。


  *   **@NotNull**——这实际上不是 JPA 的一部分，而是“Bean Validation”的一部分。简而言之，它确保在提交 JSF 表单以及持久化
  JPA 实体时，Bean 属性被验证永远不会为 null。（参见第 5 章。）另请注意，这基本上复制了 @Column(nullable=false)，但这仅仅是因为
  JPA 不会将任何 Bean Validation 注解视为有效的数据库元数据来生成相应的 SQL 表。


  ### 创建 EJB 服务


  接下来，我们需要创建一个 EJB，以便能够将前述 JPA 实体的实例保存到数据库中，并获取 JPA 实体的列表。


  右键单击项目的 src/main/java 文件夹，然后选择 *New ➤ Class*。在向导中，将 *Package* 设置为 com.example.project.service，并将
  *Name* 设置为 MessageService（参见图 2-25）。其余字段可以保留默认值或留空。


  ![A454457_1_En_2_Fig25_HTML.jpg](img/A454457_1_En_2_Fig25_HTML.jpg)


  ###### 图 2-25 Eclipse 中的新建 Java 类向导


  按如下方式修改新的服务类：


  ```

  package com.example.project.service;


  import java.util.List;

  import javax.ejb.Stateless;

  import javax.persistence.EntityManager;

  import javax.persistence.PersistenceContext;


  @Stateless

  public class MessageService {


      @PersistenceContext

      private EntityManager entityManager;


      public void create(Message message) {

          entityManager.persist(message);

      }


      public List<Message> list() {

          return entityManager

              .createQuery("FROM Message m", Message.class)

              .getResultList();

      }

  }

  ```


  基本上就是这样。让我们简要介绍一下这些注解。


  *   **@Stateless**——将 Bean 标记为无状态 EJB 服务，以便应用服务器知道是否应该对其进行池化，以及何时启动和停止数据库事务。替代注解是
  @Stateful 和 @Singleton。请注意，@Stateless 并不意味着容器会确保类本身是无状态的。作为开发人员，你仍然有责任确保该类不包含任何共享且可变的实例变量。否则，根据其用途，你最好将其标记为
  @Stateful 或 @Singleton。


  *   **@PersistenceContext**——基本上是从项目 persistence.xml 中配置的持久化单元注入 JPA 实体管理器。实体管理器反过来负责将所有
  JPA 实体映射到 SQL 数据库。它将在幕后完成所有繁重的 JDBC 工作。


  ### 调整 Hello World


  现在我们将调整之前创建的 HelloWorld 支持 Bean，以便将消息保存到数据库中，并在表格中显示所有消息。


  ```

  @Named @RequestScoped

  public class HelloWorld {


      private Message message = new Message();

      private List<Message> messages;


      @Inject

      private MessageService messageService;


      @PostConstruct

      public void init() {

          messages = messageService.list();

      }


      public void submit() {

          messageService.create(message);

          messages.add(message);

      }


      public Message getMessage() {

          return message;

      }


      public List<Message> getMessages() {

          return messages;

      }

  }

  ```


  请注意，你不需要为 message 和 messages 设置 setter 方法。我们将使用 Message 实体本身的 getter 和 setter 方法。


  最后，按如下方式调整 hello.xhtml 的 <h:body> 部分：


  ```

  <h1>Hello World</h1>

  <h:form>

      <h:outputLabel for="input" value="Input" />

      <h:inputText id="input" value="#{helloWorld.message.text}" />

      <h:commandButton value="Submit"

          action="#{helloWorld.submit}">

          <f:ajax execute="@form" render=":table" />

      </h:commandButton>

  </h:form>

  <h:dataTable id="table" value="#{helloWorld.messages}" var="message">

      <h:column>#{message.id}</h:column>

      <h:column>#{message.text}</h:column>

  </h:dataTable>

  ```


  现在在你喜欢的 Web 浏览器中重新加载页面并创建一些消息（参见图 2-26）。


  ![A454457_1_En_2_Fig26_HTML.jpg](img/A454457_1_En_2_Fig26_HTML.jpg)


