  我们只需要调整所有部署描述符，使其与实际使用的 Servlet、JSF、JPA 和 CDI 版本保持一致。这通常通过调整部署描述符 XML 文件的根元素来设置所需的
  XML 模式和版本完成。


  你可以在 [`xmlns.jcp.org/xml/ns/javaee`](http://xmlns.jcp.org/xml/ns/javaee) 找到所有 Java
  EE 8 模式，这是一个实际的网页，目前会重定向到 Oracle.com 的某个登录页面。鉴于 Java EE 8 目前正从 Oracle 转移到 Eclipse，这种情况未来可能会改变。你可以通过双击部署描述符
