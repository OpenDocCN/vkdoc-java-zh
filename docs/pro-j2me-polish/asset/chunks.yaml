    **Designing Borders**


    Many different border types use specific CSS attributes. When you want to use
    a border other than the default simple border, you need to specify the border-type
    attribute. Use the border: none; declaration when you extend another style that
    declares a border and you don’t want any border for the child style.


    Please refer to the appendix for learning the details of all available borders,
    such as the round-rect, circle, or bottom border.


    **Designing Backgrounds**


    You can choose between a great number of different backgrounds for your designs.
    When you deploy a background other than the default simple background or the image
    background, you need to declare the background-type attribute. When you extend
    another style and want to remove the background settings, you can use the background:
    none; declaration. The appendix describes details of all available backgrounds.


    ■**Tip** Make sure to check out the online documentation at *http://www.j2mepolish.org/documentation.html*
    for learning about any new backgrounds that are now available.


