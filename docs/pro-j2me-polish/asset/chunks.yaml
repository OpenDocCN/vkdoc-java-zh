- fmt: '# Thanks to Optional APIs


    Thanks to optional APIs, applications can now access many phone features that
    were previously available only for native applications. However, J2ME applications
    still cannot access some areas. When you require native functions for your application,
    you have one of two options: developing a native application or accessing native
    functions from within your J2ME application. Creating native applications is outside
    the scope of this book, but you should be aware that different operating systems
    with partly incompatible versions exist. So, if you want to reach a broad user
    base, you should try to stick to pure Java whenever it’s possible.


    When your target device supports the Personal Java profile, you can just use the
    Java Native Interface (`JNI`) technology for accessing native functions. `JNI`
    provides a comfortable and standardized way for calling functions and receiving
    their return values. In that case, you need to port your native functions only
    when you want to support a new platform, since the Java code can remain the same.
    You need to be aware that the Personal Java profile is supported only by a few
    J2ME devices, for example, the Nokia Communicator series or Sony Ericsson’s UIQ
    devices such as the P910.


    Some KVMs also support `JNI` or similar technologies. The JBlend platform provides
    this possibility, for example ( *http://www.aplix.co.jp/en/jblend/jblend/practical04.html*).
    In general, you need to have a business relationship with the corresponding vendor
    or carrier to be allowed to use `JNI`.


    A third possibility is to implement a native application that uses a server connection
    and waits for incoming requests by listening on a specific port, like 4242. In
    this scenario, you could open a socket connection and access the local server,
    for example, `SocketConnection mySocket = (SocketConnection) Connector.open( "socket://127.0.0.1:4242"
    );`.


    Finally, it is theoretically possible to use the `MIDlet.platformRequest()` mechanism
    for launching native applications. Usually you can initialize telephone calls
    when the request starts with the `tel:<number>` scheme and launch the browser
    using the `http:<url>` scheme. Manufacturers can add their own request schemes
    in the future.


    ## Detecting Interruptions


    `MIDlet`s can be interrupted at any time by incoming phone calls and similar events.
    The Application Management System (`AMS`) should call the `MIDlet.pauseApp()`
    in such cases, but on some devices this does not happen. With some defensive programming
    techniques you can detect interruption on all phones.


    A typical scenario is a game that should be paused whenever it is interrupted.
    For best portability you should tackle this problem from three different angles:
    using `MIDlet.pauseApp()`, using `Canvas.hideNotify()`, and detecting unusual
    time gaps.


    Using the `MIDlet.pauseApp()` mechanism is straightforward. You can enter the
    `PAUSED` state after the `pauseApp()` has been called and can resume the application
    when the `MIDlet.startApp()` is called again.


    Some devices, most notably the Nokia Series 40, never call `pauseApp()`. Instead,
    you are notified when your current (low-level GUI) screen is not shown anymore.
    You can override the `Canvas.hideNotify()` method in your game for pausing it
    and can override the `Canvas.showNotify()` method for resuming the game.


    Finally, some devices seem to stop the whole Java Virtual Machine without calling
    any notification methods when an interruption occurs. Your only chance is then
    to remember the last time your application thread was executed and compare this
    with the current time on the next run. When you see an unusual long gap between
    the two runs, you can assume there has been an interruption. Use the `System.currentTimeMillis()`
    method for getting the current time.


    > **Caution** When devices support both `MIDlet.pauseApp()`/`startApp()` and `Canvas.hideNotify()`/'
