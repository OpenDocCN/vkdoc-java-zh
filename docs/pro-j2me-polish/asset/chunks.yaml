    C H A P T E R 1 2 ■ W O R K I N G W I T H T H E G U I Arranging Items on a Screen


    Usually J2ME Polish arranges each GUI item on its own row, as shown in Figure
    12-15\. You can change the arrangement of the items either by using the view-type
    attribute or by using a tabular layout with the columns and columns-width attributes.


    You can apply view types to any screens that contain items, for example, Lists
    or Forms.


    Several view types are available, which are usually defined in a screen style,
    for example,


    .mainScreen { view-type: dropping; }. You can use either a (predefined) name of
    the view type or the fully qualified classname of that type, which needs to extend
    the de.enough.


    polish.ui.ContainerView class. View types are responsible for the arrangement
    of items and can even animate the items.


    **Figure 12-15.** *Unless told otherwise, J2ME Polish arranges each item on its
    own row.*


    **Using Tables**


    You can use tables for arranging all screen items neatly into cells by using the
    columns attribute in the screen’s style. Table 12-14 explains the columns as well
    as columns-width attributes in detail.


    **Table 12-14.** *Attributes for Table Arrangements*


    **Attribute**


    **Required?**


    **Description**


    columns


    No


    The number of columns. This can be used to lay out the items in a table. Defaults
    to one column.


    columns-width


    No


    Either normal, equal, or the width for each column in a


    comma-separated list (for example, columns-width:


    60,60,100;). Defaults to normal, meaning that each column


    uses as much space as the widest item of that column needs.


    The equal leads to columns that all have the same width.


    The explicit list of column widths results in the usage of those widths.


    Listing 12-36 shows you an example of how to apply these attributes, and Figure
    12-16


    shows the result.


    ![Image 38](index-229_1.jpg)


    5033CH12.qxd 6/20/05 11:31 AM Page 207


    C H A P T E R 1 2 ■ W O R K I N G W I T H T H E G U I **207**


    **Listing 12-36.** *Applying a Table Arrangement to the Input Screen*


    .inputScreen {


    columns: 2;


    columns-width: 52,110;


    }


    **Figure 12-16.** *Using a table arrangement with two columns*


    ■**Caution** You cannot use the columns attribute along with a view type. When
    you use a view type, it is solely responsible for the arrangement of the items.


    When you use explicit tables, you need to add labels and actual items separately
    to a form. This complicates the programming a bit and makes it harder to port
    existing applications to the J2ME Polish GUI. You can, therefore, alternatively
    use the min-width and max-width attributes for setting the exact width of labels
    and items. Listing 12-37 shows how you can achieve the same design as in Figure
    12-16 by adjusting the label and the .inputField style (the latter being used
    for the input fields shown in Figure 12-16).'
