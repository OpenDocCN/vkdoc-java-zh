    最重要的指令是 `#if` 和 `#=` 指令，所以让我们先看看它们。


    **分支您的代码**


    If-then-else 分支是众所周知的编程结构。`#if` 指令及其各种相关指令允许您非常有效地将源代码调整到不同的手机和配置。这些调整的可能性是无穷无尽的。您可以轻松地创建量身定制的应用程序，这些应用程序使用特定于设备的
    API，规避目标设备的已知问题，或根据配置更改应用程序流程。


    检查单个预处理符号


    使用 `#ifdef`、`#ifndef`、`#elifdef`、`#elifndef`、`#else` 和 `#endif` 指令来检查单个预处理符号。预处理符号就像一个布尔变量：要么已定义（true），要么未定义（false）。预处理符号在设备数据库中通过设备的
    `<features>`（例如 `polish.hasPointerEvents`）以及间接通过设备 `<capability>` 元素（例如 `polish.CanvasSize:defined`
    和 `polish.api.mmapi`）定义。您可以通过使用 *build.xml* 文件中 `<build>` 部分的 `symbols` 属性来定义您自己的项目特定符号。表
    8-2 解释了这些指令的含义。


