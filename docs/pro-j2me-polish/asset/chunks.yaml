    9-3 中，日志框架仅在 Ant 属性 `${test}` 为 `true` 时被激活。你可以通过在命令行中首先调用 test 目标来将此属性设置为 `true`：


    ant test j2mepolish


    尽管 `j2mepolish` 目标随后会调用 `init` 目标，但 `${test}` 属性不会被改变，因为 Ant 属性只能被设置一次。当 test
    目标未被调用时，`${test}` 属性会在 `init` 目标中被设置为 `false`。test 和 init 目标也为 `${dir.work}` 属性设置了不同的值。此属性随后被用于设置
    `<build>` 元素的 `workDir` 属性。


    ■**提示** 为启用了日志框架的构建使用不同的工作目录，这样 J2ME Polish 就不需要在每次构建中预处理和编译所有文件。


    **在真实设备上查看日志**


    你也可以在真实设备上查看日志。日志包含所有通过 `#debug` 指令添加的消息。这对于追踪真实设备上的错误非常有用。


