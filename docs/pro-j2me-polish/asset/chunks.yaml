    设备数据库


    **本章内容：**


    • 通过 J2ME Polish 设备数据库了解更多关于你的目标设备的信息。


    • 了解设备数据库文件 *devices.xml*、*vendors.xml*、*groups.xml*、*apis.xml* 和 *bugs.xml* 的
    XML 格式。


    • 发现如何使用设备数据库来选择目标设备、组装特定于设备的资源以及优化你的应用程序。


    在本章中，你将了解 J2ME Polish 设备数据库。该数据库构成了 J2ME Polish 的基础，对于构建和预处理应用程序至关重要。你可以使用设备的已定义特性和能力在构建过程中选择目标设备，并通过预处理将你的应用程序调整到不同的手机。了解设备数据库的结构和用途对于充分利用
    J2ME Polish 至关重要。


    **理解 XML 格式**


    J2ME 设备数据库由不同的 XML 文件组成，这些文件默认位于 J2ME Polish 的安装文件夹中。设备数据库包含以下文件：


    • *devices.xml*：描述许多支持 J2ME 的设备的能力和已知问题。


    • *vendors.xml*：列出所有 J2ME 设备的供应商和制造商。


    • *groups.xml*：描述设备组。每个设备可以属于任意数量的组。


    • *apis.xml*：列出可选的和供应商特定的库，例如移动媒体 API (MMAPI)。


    • *bugs.xml*：描述与设备相关的已知问题。


    ■**注意** 从 J2ME Polish 1.3 开始，*configurations.xml*、*platforms.xml* 和 *capabilities.xml*
    文件也包含在设备数据库中。在 *configurations.xml* 文件中，你可以定义配置，如 CLDC 1.0 和 CLDC 1.1。使用 *platforms.xml*
    文件来定义配置文件，如 MIDP 1.0、DoJa 4.0 和 WIPI 2.0。


