    **总结**


    在本章中，您学习了如何使用 Ant 和 J2ME Polish 构建应用程序。您可以为您的应用程序配备特定资源而无需修改源代码，使用混淆器来最小化应用程序大小，本地化您的应用程序，以及集成第三方
    API。


    在下一章中，您将探索预处理的可能性。与打包解决方案相比，预处理是在应用程序的源代码级别上使用的。


