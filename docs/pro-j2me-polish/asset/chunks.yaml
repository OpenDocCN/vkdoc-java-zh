    **解决游戏引擎的限制**


    你可以在游戏中使用 `javax.microedition.lcdui.game.*` API 的任何类，但需要注意游戏引擎的一些技术限制：


    *   **像素级碰撞检测：** 在 MIDP 1.0 平台上，你无法对精灵使用像素级碰撞检测，因此需要设置碰撞矩形——最好是紧密贴合矩形。

    *   **用户输入评估：** 当你扩展 `GameCanvas` 类时，在重写 `keyPressed(int)`、`keyReleased(int)`
    或 `keyRepeated(int)` 方法之一时，应调用父类的实现，以便游戏引擎也能获知这些事件。我建议在主游戏循环中使用 `getKeyStates()`
    方法来评估用户输入。这能保证在 MIDP 2.0 和 MIDP 1.0 平台上都获得最佳性能。


