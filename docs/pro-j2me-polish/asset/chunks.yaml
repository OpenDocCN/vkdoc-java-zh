    known issue in an existing application just by rebuilding it. The disadvantage
    is, of course, the complexity of bytecode manipulations. If you are up to the
    task, you can create a postcompiler that extends the de.enough.polish.postcompile.PostCompiler
    class. You can integrate it into the processing chain using the <postcompiler>
    element in the *build.xml* file. Postcompilers are invoked after the compilation
    phase and can change a lot of things. An example includes the Floater tool of
    Enough Software, which allows you to implement floating-point calculations using
    the primitive types float and double on CLDC 1.0 devices. Please refer to the


    “Using a Postcompiler” section in Chapter 13 for more details about this option.


    ■**Tip** For manipulating bytecode, refer to the ASM ( *http://asm.objectweb.org*)
    and BCEL ( *http://jakarta.*


    *apache.org/bcel*) libraries.


    **Implementing the User Interface**


    The user interface is often the most problematic area when you target different
    devices. For implementing the user interface in MIDP devices, you can choose between
    the so-called high-level GUI, which offers Forms, Lists, and so forth, and the
    low-level GUI, which allows you to paint your own widgets.


    A common source for errors is the event handling. You must never block the event
    handling thread, for example, in the commandAction() method of a CommandListener
    or in the keyPressed() method of a Canvas. When you have a long-running calculation,
    a network connection, and so on, you need to do this in a separate Thread.


    Using the High-Level GUI


    Using the high-level GUI has several advantages:


    • Your application is smaller, since you do not need so much code for creating
    the user interface.


    • Your application can be ported easier, because many low-level GUI implementations
    contain issues.


    • Development is easier, because the low-level GUI is quite complex.


    The main disadvantage is that the look and feel of your application depends on
    the vendor’s implementation. Some implementations have a pleasant appearance,
    but others provide a somewhat awkward-looking user interface. The MIDP 2.0 profile
    offers some great new features, such as the CustomItem, the ability to focus items
    by calling Display.setCurrentItem(), and pop-up ChoiceGroups.


    With the J2ME Polish GUI, you can use the high-level GUI in your application code
    and take full control at the same time by specifying designs outside the application
    code with CSS


    text files. The J2ME Polish GUI also supports the new MIDP 2.0 high-level GUI
    features on MIDP 1.0 devices. The J2ME Polish GUI internally uses preprocessing
    for adapting itself to various handsets. You can activate and deactivate the usage
    of the J2ME Polish GUI depending on conditions. Please refer to Chapter 12 for
    a detailed discussion of the possibilities.


