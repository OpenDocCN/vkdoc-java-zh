    The Graphics.drawRGB() implementation is problematic on many MIDP 2.0 devices,
    such as Nokia Series 60 and Sony Ericsson K700\. You can use the drawRGB() method
    for painting integer arrays that contain pixel information in the RGB format.
    A cool thing about this method is that you can use translucent data as well so
    your background shines through. On the K700


    device, the drawRGB() implementation does not take the translation origin into
    account—


    instead, the (0, 0) origin is always used. So, when you translate the origin of
    Graphics by calling Graphics.translate( x, y ), the drawn RGB data will be misaligned
    when this bug is present. A possible solution is not to use translate() at all,
    but on some devices this is called anyway by the native implementation, for example,
    when the title is painted. When you use a bit of preprocessing, you are on the
    safe side. Listing 15-9 shows how to circumvent this bug by adjusting the x and
