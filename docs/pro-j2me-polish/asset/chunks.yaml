    或者，你可以设置 `polish.FullScreen` 预处理变量，该变量接受与 `fullscreen` 属性相同的值。通过这种机制，你可以针对不同设备微调设置。例如，西门子设备即使在普通全屏模式下也能接受命令，因此无需为此类设备使用菜单模式。清单
    12-3 演示了这一点。


