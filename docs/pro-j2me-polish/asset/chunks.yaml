- fmt: '# Static Styles


    Static styles are applied to specific Items or Screens using the `#style` preprocessing
    directive in the source code of the application. The programmer just needs to
    tell the designer the style names and what they are used for (that is, for what
    kind of items or screens), and the designer needs to define them in the `polish.css`
    file. Static styles always start with a dot in the CSS file, such as `.myStyle`,
    for example.


    Static styles are faster and less resource intensive than dynamic styles. You
    should stick to static and predefined styles whenever possible.


    # Predefined Styles


    The J2ME Polish GUI uses predefined styles internally. In contrast to the normal
    “user-defined” static styles, their names do not start with a dot, for example,
    `title` instead of `.title`.


    Table 12-7 lists the available predefined styles. When you do not define a predefined
    style, the “default” style is used instead.


    **Table 12-7.** *Supported Predefined Styles*


    | **Style** | **Description** |

    | --- | --- |

    | `title` | The style of screen titles. For MIDP 2.0 devices, the native implementation
    is used by default, unless the menu full-screen mode is used or the preprocessing
    variable `polish.usePolishTitle` is defined with `true`:<br>`<variable name="polish.usePolishTitle"
    value="true" unless="polish.Vendor == Nokia" />`.<br>You can also use custom styles
    for specific Screens or ChoiceGroups by using the `title-style` attribute. |

    | `focused` | The style of a currently focused item. This style is used in Lists,
    in Forms, and for containers such as ChoiceGroup. You can also use custom styles
    for specific Screens or ChoiceGroups by using the `focused-style` attribute. |

    | `menu` | This style is used for designing the menu bar in full-screen mode.
    The full-screen mode can be triggered by the `fullScreenMode` attribute of the
    `<build>` element in the `build.xml` (with `fullScreenMode="menu"`). In the `menu`
    style, you can also define which style is used for the currently focused command
    with the `focused-style` attribute, for example, `focused-style: menuFocused;`.
    In this case, you need to define the static style `.menuFocused` as well. |

    | `menuItem` | The style used for the menu items (the commands) of a screen. When
    `menuItem` is not defined, the `menu` style is used instead. |

    | `label` | This style is used for the menu label of any item. One can specify
    another label style by defining the CSS attribute `label-style` in the appropriate
    style, which refers to another style. |

    | `info` | The style that is used for displaying additional information in a screen.
    Currently this is used only for showing the current input mode when the direct
    input mode of a TextField or a TextBox is enabled. |

    | `default` | The style that is used by the J2ME Polish GUI when the desired predefined
    style is not defined. The `default` style is always defined, even when it is not
    explicitly defined in the `polish.css` file. |

    | `tabbar` | This style designs the tab bar of a TabbedForm. |

    | `activetab` | Designs the currently active tab of a TabbedForm. |

    | `inactivetab` | Designs all tabs but the currently selected one of a TabbedForm.
    |

    | `topframe` | Designs the upper frame of a FramedForm. |

    | `bottomframe` | Designs the lower frame of a FramedForm. |

    | `leftframe` | Designs the left frame of a FramedForm. |

    | `rightframe` | Designs the right frame of a FramedForm. |

    | `frame` | You can use the `frame` style for designing all frames of a FramedForm
    in one style, when you don’t use a more specific style. |


    You are not allowed to use the names of predefined styles for static styles, so
    you must not use a static style with the name `.title`, and so on.


    # Dynamic Styles


    Use dynamic styles to apply styles to items without using `#style` directives
    in the source code. With dynamic styles, the designer can work completely independently
    of the programmer and try new designs for GUI items that do not yet have an associated
    static style. You can also check out the power and possibilities of the J2ME Polish
    API without changing the source code of an existing application at all.'
