    \nIn Listing 12-15, the style called `myStyle` defines some font values and the\
    \ color of the background. Any style contains a selector as well as a number of\
    \ attributes and its values, as shown in Figure 12-7.\n\n**Figure 12-7.** *The\
    \ components of a CSS style*\n\nYou need to finish each attribute-value pair with\
    \ a semicolon. The style declaration needs to end with a right curly parenthesis.\
