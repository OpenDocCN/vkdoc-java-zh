    **为目标设备优化**


    设备数据库的最佳特性之一是，你可以在应用程序的源代码中检测和评估所有特性和能力。这是在预处理步骤中完成的，该步骤在编译之前转换 Java 代码。你使用不同的指令来控制预处理步骤，例如
    //#if、//#foreach 或 //#=。本节仅讨论设备数据库在预处理阶段的一般用法。请参阅第 8 章以了解有关预处理细节的更多信息。


    设备的所有特性都被转换为以 polish. 开头并以特性名称结尾的预处理符号。例如，当设备具有指针事件时，预处理符号 polish.hasPointerEvents
    被定义。可以使用 //#if 或 //#ifdef 指令在代码中检查预处理符号。例如，清单 6-7 显示了如何检查设备是否基于触控笔。


    **清单 6-7.** *在应用程序中检查指针事件*


    //#ifdef polish.hasPointerEvents


    callPointerMethod();


    //#else


    callPlainMethod();


    //#endif


    当前目标设备的能力也可以被评估并在你的源代码中使用。每个能力都可以在 polish.[ *capability-name*] 下使用。你可以使用 //#if
    指令比较能力；例如，//#if polish.BitsPerPixel >= 16 或 //#if polish.


