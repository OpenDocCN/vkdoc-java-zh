    **转发日志消息**


    你可以使用日志处理器来处理日志消息并将其转发给其他实体。在撰写本书时，只有记录管理系统（RMS）处理器可用。因此，目前你可以使用 RMS 日志处理器来存储所有日志条目，然后稍后通过
    LogViewerMidlet 查看它们。


    你可以通过在 *build.xml* 文件中使用 `<handler>` 元素来激活所需的日志处理器。清单 9-6 为所有西门子设备激活了 RMS 日志处理器。


