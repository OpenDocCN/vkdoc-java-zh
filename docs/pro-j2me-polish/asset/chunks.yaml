    **Selecting Your Target Devices**


    With J2ME Polish, you can build and optimize your application for many target
    devices at once. You can do this by specifying requirements for your target devices
    in your *build.xml* file.


    The <deviceRequirements> element is responsible for selecting your target devices.
    (You will learn all the details about building applications for multiple devices
    in Chapter 7.) You can use any <capability> or <feature> that has been defined
    in the device database for selecting your target devices. To demonstrate, Listing
    6-6 shows how to select all devices that support a stylus *and* the MIDP 2.0 platform.


    **Listing 6-6.** *Selecting All Devices Supporting a Stylus and the MIDP 2.0 Platform*


    <deviceRequirements>


    <requirement name="JavaPlatform" value="MIDP/2.0+" />


    <requirement name="Feature" value="hasPointerEvents" />


    </deviceRequirements>


    **Selecting Resources for Your Target Devices**


    J2ME Polish can automatically choose the correct resources, such as images and
    sound files, for your application. All you need to do is put the resources in
    the appropriate subfolder of the *resources* directory in your project. You can
    put common resources directly into the *resources* folder and specialized resources
    into the *resources/[vendor]*, *resources/[group]*, or *resources/[vendor]/[device]*
    folder. J2ME Polish will then pick the correct version of the resource and include
    it in the final application bundle. The details of this process are described
    in Chapter 7.


    The key to resource assembling is the device database. Every device belongs to
    one vendor and can belong to several implicit and explicit groups. J2ME Polish
    always chooses the most specialized version of a resource, in this order:


    **1.** J2ME Polish adds all resources from the common *resources* folder.


    **2.** It adds all resources from the *resources/[vendor-name]* folder, such as
    *resources/Nokia*.


    **3.** It adds all resources from the *resources/[group]* folder for each explicit
    and implicit group that the device belongs to. Examples are *resources/Series60*
    for devices belonging to Series 60, *resources/BitsPerPixel.16+* for devices having
    a color depth of at least 16


    bits per pixel, and *resources/midi* for devices supporting the MIDI sound format.


    **4.** It adds all resources from the *resources/[vendor]/[device]* folder, such
    as *resources/Nokia/6600* or *resources/Sony-Ericsson/K700*.


    In each step, the more specialized resources override the more common resources.
    For example, suppose that you have a background picture called *bg.png* in the
    *resources* folder, as well as in the *resources/Nokia* and *resources/Nokia/3230*
    directories. If you build your application for non-Nokia devices, the image from
    the *resources* folder is added to the JAR file. Nokia devices get the image from
    *resources/Nokia*, but the application for the Nokia 3230 phone gets the image
    from the *resources/Nokia/3230* folder *.*


    5033CH06.qxd 6/17/05 11:48 AM Page 51


    C H A P T E R 6 ■ T H E D E V I C E D ATA B A S E


    **51**


    ■**Note** Explicit groups are the ones that devices refer to with the <groups>
    element in the devices.xml file. Implicit groups result from the device capabilities
    JavaPlatform, JavaConfiguration, SoundFormat, VideoFormat, and BitsPerPixel. You
    can view all implicit and explicit groups of a device in the online device database
    at *http://www.j2mepolish.org/devices-overview.html*. The groups are ordered hierarchically,
    so, for example, the BitsPerColor.16 group is more specific than the BitsPerColor.16+
    group when a device supports exactly 16 bits per color. This order is also shown
    in the online database; the priority is increasing for each listed group, so the
    most specific group is the last one.


    **Optimizing for Your Target Devices**


    One of the best features of the device database is that you can detect and evaluate
    all features and capabilities in the source code of your application. This is
    done in the preprocessing step, which transforms the Java code before it is compiled.
    You control the preprocessing step with different directives, like //#if, //#foreach,
    or //#=. This section discusses only the general usage of the device database
    in the preprocessing phase. See Chapter 8 to learn more about the specifics of
    preprocessing.


    All features of a device are translated into preprocessing symbols starting with
    polish.


    and ending with the name of the feature. When a device has pointer events, the
    preprocessing symbol polish.hasPointerEvents is defined, for example. Preprocessing
    symbols can be checked in your code with the //#if or the //#ifdef directive.
    As an example, Listing 6-7


    shows how to check if a device is stylus-based.


    **Listing 6-7.** *Checking for Pointer Events in Your Application*


    //#ifdef polish.hasPointerEvents


    callPointerMethod();


    //#else


    callPlainMethod();


    //#endif


    The capabilities of the current target device can also be evaluated and used in
    your source code. Each capability is available under polish.[ *capability-name*].
    You can compare capabilities with the //#if directive; for example, //#if polish.BitsPerPixel
    >= 16 or //#if polish.


    identifier == Nokia/6600\. When a capability is defined, you can check a corresponding
    preprocessing symbol polish.[ *capability-name*]:defined. This is especially useful
    when you use the capability with the //#= directive, as in Listings 6-8 and 6-9.


    **Listing 6-8.** *Changing Class Inheritance in Your Application* public class
    SplashScreen


    //#ifdef polish.classes.fullscreen:defined


    //#= extends ${ polish.classes.fullscreen }


    //#else


    extends Canvas


    //#endif


