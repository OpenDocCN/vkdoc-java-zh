    **预验证**


    为了确保应用程序的完整性和安全性，Java 类在加载类时由 Java 虚拟机进行验证。由于此步骤计算密集，J2ME 标准规定所有类需要在*安装到 J2ME
    设备上之前*进行验证。


    此预验证步骤会更改字节码并插入额外的信息，以确保字节码的有效性和完整性。J2ME Polish 默认使用 WTK 提供的预验证器。


    **打包**


    在打包步骤中，为每个目标设备创建最终的应用程序包。它们由一个包含应用程序代码的 JAR 文件和一个包含在手持设备上安装所需元数据的 JAD 文件组成。J2ME
    Polish 专门为每个目标设备和每个区域设置组装资源，并自动创建所需的 JAD 和 Manifest 文件。


    你可以使用第三方打包器，如 7-Zip 或 KZIP，以进一步减小 JAR 文件大小。本章的“打包应用程序”部分详细讨论了所有这些可能性。


    **调用模拟器**


    J2ME Polish 可以调用大多数模拟器来测试应用程序。只需包含一个 <emulator> 元素作为 <j2mepolish> 任务的最后一个元素。请参阅本章的“调试应用程序”部分，以获取有关调用模拟器的更多信息。


    **打包应用程序**


    在针对每个目标设备的打包阶段，会生成一个 JAD 和一个 JAR 文件。此步骤完成了几项任务，例如选择合适的资源、管理 JAD 或 Manifest 属性以及签署应用程序。


    **资源组装**


    J2ME Polish 提供了复杂的方法，只为每个目标设备包含所需且合适的资源。资源组装的基础是 *resources* 文件夹，默认情况下所有资源都位于其中。图
    7-4 显示了一个示例。


