    ## Designing Text Fields


    You can use a `TextField` to get user input. You can choose whether the native
    input methods or a direct input mode should be used. When the native mode is activated,
    a new input screen will pop up for the user and special input modes such as T9
    or handwriting recognition can be used if available on the device. When the direct
    input mode is used instead, no extra screen will be shown, and J2ME Polish accepts
    the entered character directly. Table 12-24 lists the additional CSS attributes
    that are supported by `TextField`s.


    **Table 12-24.** *Additional Attributes for TextField Items*


    | Attribute | Required? | Explanation |

    | --- | --- | --- |

    | `textfield-width` | No | The minimum width of the textfield element in pixels.
    |

    | `textfield-height` | No | The minimum height of the textfield element in pixels.
    Defaults to the height of the used font. |

    | `textfield-direct-input` | No | Defines whether the direct input mode should
    be activated. Possible values are either `false` or `true`. By default the direct
    input mode is deactivated (`false`). You can set the preprocessing variable `polish.TextField.useDirectInput`
    for activating the direct input for all `TextField`s. |

    | `textfield-caret-color` | No | The color of the caret that indicates the editing
    position. This defaults to the color of the used font. |

    | `textfield-caret-char` | No | The character that indicates the editing position.
    This defaults to the pipe symbol, `|`. |

    | `textfield-show-length` | No | Determines whether the length of the entered
    text should be shown during the editing of this field. This has an effect only
    when the direct input mode is used. |


    Listing 12-50 shows you how to design a `TextField` item, and Figure 12-30 shows
    you the result of Listing 12-49.


    **Listing 12-50.** *Designing a TextField Item*


    ```

    .textInput {

    margin: 1;

    padding: 4;

    padding-left: 2;

    padding-right: 2;

    padding-horizontal: 4;

    textfield-direct-input: true;

    font-style: bold;

    font-size: small;

    font-color: fontColor;

    background-color: highlightedBgColor;

    border-color: black;

    layout: left;

    textfield-width: 90;

    datefield-width: 90;

    textfield-caret-color: red;

    textfield-caret-char: >;

    textfield-show-length: true;

    textfield-direct-input: true;

    focused-style: .focusedInput;

    }

    ```


