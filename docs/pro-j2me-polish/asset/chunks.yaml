    **79**


    </deviceRequirements>


    <build>


    <midlet class="com.apress.roadrunner.Roadrunner" />


    **<packager**


    **executable="jar"**


    **arguments="cvfM;;${polish.jarPath};;-C;;${polish.packageDir};;."**


    **/>**


    </build>


    <emulator />


    </j2mepolish>


