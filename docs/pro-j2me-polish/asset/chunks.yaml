- fmt: '# Chapter 10: Using the Utilities


    ## The Font Editor


    You can use the Font Editor to create bitmap fonts out of any True Type fonts.
    Start the editor by double-clicking the Font Editor executable in the `${polish.home}/bin`
    folder.


    You can open any True Type font `.ttf` file by selecting File ➤ Open True Type
    Font in the menu bar, by dragging the file into the opened application, or by
    dropping the font file onto the start script of the editor (see Figure 10-3 earlier
    in this chapter). As you can see in Figure 10-5, you can now change the size,
    color, and other attributes of the font in the editor.


    **Figure 10-5.** *Creating a bitmap font with the Font Editor* You can specify
    which characters are supported by the bitmap font by setting the characters in
    the text field at the bottom. Since every additional character needs additional
    space, you should try to minimize the number of characters; just keep enough characters
    to display all the text that you want to appear in this bitmap font. If your text
    contains a character that is not available in the corresponding bitmap font, that
    character cannot be displayed and is omitted from the screen.


    You can use the character spacing to separate characters of dense or italic fonts.
    Remember that each character needs to be accessible individually, so a rectangle
    needs to fit around each character without overlapping other characters.


    **Caution** Using anti-aliasing for bitmap fonts makes them look smoother, but
    also increases their size and reduces their readability. Anti-aliasing is, therefore,
    not recommended on devices with low resolutions.


    You can optimize the bitmap font by manipulating the base PNG image in your favorite
    image editor, such as Photoshop or The Gimp. Save the corresponding PNG image
    of the font by selecting File ➤ Save PNG Image As. Then load it again by selecting
    File ➤ Open PNG Image. You can also fine-tune the bitmap font by selecting File
    ➤ Open in Binary Editor, or by starting the Binary Editor externally, loading
    the `${polish.home}/bin/bmf.definition`, and opening the bitmap font as the data.
    Use the `de.enough.polish.BitMapFont` class as described earlier in this chapter
    for displaying text with your bitmap fonts.


    ## The SysInfo MIDlet


    J2ME Polish also contains the MIDPSysInfo MIDlet, which allows you to check the
    capabilities of your device quickly. It is located in the `${polish.home}/samples/sysinfo`
    folder and needs to be built first, either by calling `ant` from the command line
    or by executing the `build.xml` script from within your IDE. You will then find
    the files `MIDPSysInfo.jar` and `MIDPSysInfo.jad` in the `dist` folder. Figure
    10-6 shows the SysInfo application in action.


    **Figure 10-6.** *Checking the capabilities of your device with the MIDPSysInfo
    MIDlet*


    ## Summary


    This chapter discussed the various utilities that come with J2ME Polish. Although
    they are not essential for developing J2ME applications, they are quite useful
    and might solve challenges that you encounter during application development.


    In the next chapter, we’ll take a look at the game engine of J2ME Polish and how
    it can help you to develop games for both MIDP 2.0 and MIDP 1.0 devices using
    a single-source base.


    # Chapter 11: Game Programming with J2ME Polish


    **In this chapter:**


    - The J2ME Polish game engine provides the complete MIDP 2.0 game API on MIDP
    1.0 devices.

    - Optimize the game engine by setting various preprocessing variables.

    - Work around the game engine limitations on MIDP 1.0 platforms, which include
    the inability to detect collisions on the pixel level and that not all MIDP 1.0
    platforms support the transformation of sprites.

    - Port MIDP 2 games to MIDP 1.0 platforms by using vendor-specific libraries for
    low-level graphics operations, sound playback, and device control.


    The games industry is the biggest player in the J2ME market. When you’re programming
    J2ME applications, chances are that you are working on games. Gaming is a tremendous
    success story for mobile Java and belongs to the “3 Gs” that supposedly form the
    main revenues in the mobile arena: games, gambling, and girls. The gaming market
    is growing rapidly and has an estimated volume of $4 billion worldwide in 2005.


    The industry has reacted by introducing great enhancements for game programming
    in the MIDP 2.0 standard through the Java Community Process web site (`http://jcp.org/en/jsr/detail?id=118`).
    Unfortunately, the majority of phones out there support only the MIDP 1.0 standard.
    This is where J2ME Polish’s game engine comes to the rescue. As you’ll learn in
    this chapter, you can use the game engine of J2ME Polish for quickly porting MIDP
    2.0 games to MIDP 1.0 platforms.


    ## Using the Game Engine


    Programming games using the MIDP 2.0 game API is easy. You have sprites, a layer
    manager with a view window, and much more. These features are sorely missed when
    you develop your game for MIDP 1.0 platforms. This is why J2ME Polish includes
    a wrapper API that enables you to use the `javax.microedition.lcdui.game.*` API,
    even on MIDP 1.0 devices.


    The game engine allows you to use the complete MIDP 2.0 game API on MIDP 1.0 devices.
    Usually, no source code changes are necessary when you use proper import statements.
    However, there are some principal restrictions that might require adjustments
    of your code, especially the inability to use the pixel-level collision detection.
    Also, not all MIDP 1.0 platforms support sprite transformations. Dealing with
    these limitations is discussed in the “Working Around the Limitations of the Game
    Engine” section later in this chapter.


    Using the game engine is not difficult. J2ME Polish weaves the wrapper classes
    in your code automatically when you target MIDP 1.0 devices. This is done just
    by exchanging the import statements, so you must use proper import statements
    instead of fully qualified class names. Listing 11-1 demonstrates what you should
    *not* do.


    **Listing 11-1.** *How Not to Use the Game Engine*


    ```

    public class MyGameCanvas

    extends javax.microedition.lcdui.game.GameCanvas

    implements Runnable

    {

    public MyGameCanvas(boolean supress) {

    super(supress);

    }

    public void run() {

    // main game-loop

    }

    }

    ```


    The code in Listing 11-1 won’t work when you target an MIDP 1.0 device. Listing
    11-2 shows a working example, which uses import statements properly.


    **Listing 11-2.** *Proper Use of the Game Engine with import Statements*


    ```

    import javax.microedition.lcdui.game.GameCanvas;

    public class MyGameCanvas

    extends GameCanvas

    implements Runnable

    {

    public MyGameCanvas(boolean supress) {

    super(supress);

    }

    public void run() {

    // main game-loop

    }

    }

    ```


    ## Optimizing the Game Engine


    You can tweak the game engine by defining several preprocessing variables in the
    `<variables>` section of your `build.xml` script. The following optimizations
    are available:


    - Enable the full-screen mode for your game

    - Optimize the performance of the `TiledLayer` by using a back buffer and/or single
    tile images

    - Increase the number of possible tiles

    - Activate the game engine for MIDP 2.0 devices with a faulty or slow implementation
    of the game API


    ### Running Your Game in Full-Screen Mode'
