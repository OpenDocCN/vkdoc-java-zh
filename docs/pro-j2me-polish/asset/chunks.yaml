    With Floater you can use all functions of the CLDC 1.1 java.lang.Math implementation
    along with using floats and doubles normally. Floater does this by processing
    the bytecode after the compilation phase. The J2ME Polish integration processes
    the bytecode automatically for all CLDC 1.0 target devices. An additional benefit
    is that Floater does not need to use String for converting floating-point values
    in the internal format, so applications processed by Floater are leaner and faster
    compared to a manual conversion on the source code level.


    Also, you do not need to distinguish between any internal formats and real integer
    variables, since Floater takes care of this transparently.


    **Using Trusted MIDlets**


    The possibility of signing J2ME applications has caused a lot of confusion and
    frustration in the developer community, since most devices do not recognize the
    popular VeriSign and Thawte code-signing certificates.


    The MIDP 2.0 profile introduced the notion of trusted MIDlets. A MIDlet is regarded
    as trusted when the following conditions are fulfilled:


    • The MIDlet has been signed.


    • The signature has been authenticated by the device.


    • The integrity of the signed MIDlet has been verified by the device.


