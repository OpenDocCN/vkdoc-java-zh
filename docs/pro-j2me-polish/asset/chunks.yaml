    polish.api.[ *api-name*] is defined so that you can use it in the preprocessing
    step. The symbol is also the name of the implicit group to which devices belong
    when they support that library.


    Implicit groups can be used to select the appropriate resources for your application.


    You can also extend other libraries by using the <parent> element. In this element,
    you specify one of the names of the parent library. When a library extends another
    library, it inherits all of the symbols of the extended libraries. Listing 6-4
    shows how WMAPI 2.0 extends the original WMAPI. Devices that support WMAPI 2.0
    now automatically belong to both the wmapi and wmapi2.0 groups, and have the preprocessing
    symbols polish.api.wmapi and polish.api.wmapi2.0 defined. When you extend another
    library, you need to ensure that the parent library is defined above the child
    library; otherwise, J2ME Polish will not be able to find it and will abort the
    build.


    You specify the file names of the library with the <files> element. You can specify
    the default path of the library as well by using the <path> element.


    J2ME Polish includes many empty libraries for your convenience. These include
    the Bluetooth API, the MIDP 1.0 API, the Mobile 3D Graphics API, and others.


