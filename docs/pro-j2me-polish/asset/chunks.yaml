    **g.drawRGB( rgbBuffer, 0, 0, x, y, width, height, true );**


    }


    使用预处理来规避错误有时是繁琐的工作，但通常没有其他选择。所有 J2ME Polish 库都使用预处理来适应目标设备，因此您可以直接使用这些库，而无需过多担心设备问题。但是，当您的应用程序针对已知问题的特定目标设备构建时，您应该这样做。当您使用诸如“Generic/midp2”之类的通用目标设备时，J2ME
    Polish 无法规避特定于设备的错误。


    **操作字节码**


    规避错误的另一个选择是在字节码级别修改应用程序。这种方法有几个优点，因为程序员在应用程序开发阶段不需要自己规避问题。此外，程序的某些方面在字节码级别比在源代码级别更容易跟踪，例如浮点计算的使用。第三个优点是，您只需重新构建现有应用程序即可规避新发现的已知问题。当然，缺点是字节码操作的复杂性。如果您愿意承担这项任务，您可以创建一个扩展
    `de.enough.polish.postcompile.PostCompiler` 类的后编译器。您可以使用 *build.xml* 文件中的 `<postcompiler>`
    元素将其集成到处理链中。后编译器在编译阶段之后被调用，并且可以更改很多事情。一个例子是 Enough Software 的 Floater 工具，它允许您在
    CLDC 1.0 设备上使用原始类型 `float` 和 `double` 实现浮点计算。有关此选项的更多详细信息，请参阅第 13 章的“使用后编译器”部分。


    ■**提示** 有关操作字节码，请参考 ASM ( *http://asm.objectweb.org*) 和 BCEL ( *http://jakarta.apache.org/bcel*)
    库。


    **实现用户界面**


    当您针对不同设备时，用户界面通常是最容易出现问题的领域。为了在 MIDP 设备上实现用户界面，您可以在所谓的高级 GUI（提供 Form、List 等）和低级
    GUI（允许您绘制自己的控件）之间进行选择。


    事件处理是常见的错误来源。您绝不能阻塞事件处理线程，例如，在 `CommandListener` 的 `commandAction()` 方法中或 `Canvas`
    的 `keyPressed()` 方法中。当您有长时间运行的计算、网络连接等时，您需要在单独的 `Thread` 中执行此操作。


    使用高级 GUI


    使用高级 GUI 有几个优点：


    • 您的应用程序更小，因为您不需要那么多代码来创建用户界面。


    • 您的应用程序可以更容易地移植，因为许多低级 GUI 实现都包含问题。


    • 开发更容易，因为低级 GUI 相当复杂。


    主要的缺点是应用程序的外观和感觉取决于供应商的实现。一些实现具有令人愉悦的外观，但其他实现则提供了看起来有些笨拙的用户界面。MIDP 2.0 配置文件提供了一些很棒的新功能，例如
    `CustomItem`、通过调用 `Display.setCurrentItem()` 聚焦项目的能力以及弹出式 `ChoiceGroups`。


    使用 J2ME Polish GUI，您可以在应用程序代码中使用高级 GUI，同时通过使用 CSS 文本文件在应用程序代码之外指定设计来完全控制。J2ME
    Polish GUI 还支持 MIDP 1.0 设备上的新 MIDP 2.0 高级 GUI 功能。J2ME Polish GUI 内部使用预处理来适应各种手机。您可以根据条件激活和停用
    J2ME Polish GUI 的使用。有关这些可能性的详细讨论，请参阅第 12 章。


