    **Authentication**


    When the J2ME application needs to authenticate the user, you can use several
    approaches for transmitting the data securely. On MIDP 2.0 devices you can just
    use an HTTPS connection.


    On MIDP 1.0 devices you can calculate the hash value of the password and send
    this value over HTTP. You should also add a timestamp to each authentication request
    and use this timestamp in your hashing function as well for preventing replay
    attacks. In a replay attack a malicious intruder intercepts the communication,
    copies the authentication request, and resends it onward later. You can use the
    Bouncy Castle encryption API for calculating hash values ( *http://www.bouncycastle.org*).


    **Sessions and Cookies**


    You can use sessions for maintaining the state of an HTTP connection over several
    requests.


    This is useful whenever you deal with user data, because otherwise the J2ME application
    would need to send authentication data in each request. You can use URL rewriting
    or cookies for keeping track of the used session. You can retrieve cookies by
    cycling through all headers of a connection. When you start a new request, you
    need to set the cookie as a request property.


