    \n## Creating Your Own Background\n\nFor adding a new background, make sure your\
    \ classpath includes the files `enough-j2mepolish-build.jar`, `enough-j2mepolish-client.jar`,\
    \ and `midp2.jar` from the `${polish.home}/import` folder.\n\nEach background\
    \ needs two implementation classes: one client-side class paints the background\
