    Getting Ready


    **Creating mobile Java applications is great fun. Use this part for learning how
    to install** **J2ME Polish and other necessary or useful tools for J2ME programming.
    If you already** **have J2ME Polish up and running, I suggest that you skim through
    this part, so you don’t** **miss out on the additional tips and tricks.**


    5033CH01.qxd 6/20/05 10:19 AM Page 2


