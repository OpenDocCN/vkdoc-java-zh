    Eclipse is not only one of the most flexible IDEs but also contains many useful
    features that can help you produce better code.


    Take, for example, the many different naming schemes that are used to distinguish
    instance variables from local variables. Some people start local variables with
    a specific character, others start instance variables with a fixed character,
    and a third group starts local variables with one and instance variables with
    another character. While such naming schemes might help you or a small group of
    developers, they are problematic in two ways:


    • Enforcing naming schemes is not a trivial task; you might need to check all
    source code regularly.


    • New programmers need to learn your specific naming scheme first.


    The Java standard provides a wonderful alternative to such naming schemes: use
    this to qualify instance variables. In contrast to your own naming scheme, every
    Java programmer knows that this.variableName refers to an instance variable. Furthermore,
    Eclipse enforces this scheme automatically for you when you activate the corresponding
    compiler warning (or error depending on your needs) under Window ➤ Preferences
    ➤ Java ➤ Compiler ➤ Unqualified Access to Instance Field. Check the other settings
    in the Compiler dialog box; Eclipse can enforce many other code conventions ranging
    from criticizing invalid JavaDoc comments to warning about variables that are
    never used.


    If that is not enough for you, check out the available Eclipse plug-ins at *http://eclipse-plugins.info*.
