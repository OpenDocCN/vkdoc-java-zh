- fmt: '# The BitMapFontViewer


    The `BitMapFontViewer` usually paints the text in one line from the top-left corner
    that is specified in the `paint(int x, int y, Graphics g)` method. You can, however,
    specify a different layout with the `layout(int firstLineWidth, int lineWidth,
    int horizontalPadding, int graphicsOrientation)` method. In that case, the viewer
    will wrap text lines automatically and arrange the lines according to the specified
    orientation (`Graphics.LEFT`, `Graphics.CENTER`, or `Graphics.RIGHT`). You need
    to take the orientation into account when you call the `paint()` method, just
    as when you use the `Font.drawString()` method. Figure 10-1 shows some centered
    text within a game display.


    ![Image 20](index-160_1.jpg)


    **Figure 10-1.** *Using a bitmap font in a game*


    ## Other Utility Classes


    J2ME Polish contains a few more utility classes, which are discussed in other
    chapters:


    - The `de.enough.polish.util.Locale` class retrieves localized messages, provides
    additional information about the locale, and offers locale-specific methods like
    date formatting. Localization of mobile applications is discussed in Chapter 7.

    - The `de.enough.polish.util.Debug` class allows you to log messages and is used
    by the `//#debug` preprocessing directive. Debugging is discussed in Chapter 9.

    - J2ME Polish also contains some `CustomItems` that can be used independently
    of the J2ME Polish GUI, such as the `de.enough.polish.ui.SpriteItem`. These are
    discussed in Chapter 12.


    > **Tip:** Some other classes are planned for future releases. For example, the
    upcoming `de.enough.polish.util.DeviceControl` class will allow you to control
    vibration and backlight settings. Check *http://www.j2mepolish.org* for the latest
    additions.


    ## Stand-Alone Utilities


    Apart from the utility classes, J2ME Polish also provides some stand-alone utilities
    that can help you during the development phase on the server side.


    - The **Binary Editor** allows you to create and manipulate structured binary
    data files, like level files.

    - The **Font Editor** converts any True Type font into a bitmap font that can
    be used by the `de.enough.polish.util.BitMapFont` class.

    - The **MIDPSysInfo MIDlet** shows the capabilities of your device.


    ![Image 21](index-161_1.jpg)

    ![Image 22](index-161_2.jpg)


    These applications reside in the `${polish.home}/bin` folder. Figure 10-2 shows
    how this folder looks on a Mac OS X system.


    **Figure 10-2.** *The `${polish.home}/bin` folder on Mac OS X systems*


    ### The Binary Editor


    You can use the Binary Editor for managing level files and other structured binary
    data files. Start it by double-clicking the Binary Editor executable in the `${polish.home}/bin`
    folder.


    The Binary Editor stores the information about the setup of the data in `.definition`
    files. A definition specifies which data types are used in what sequence in the
    actual data files. When you start the editor for the first time, you will start
    with a new blank definition file.


    Let’s take a tour through the editor. Open the `${polish.home}/bin/level.definition`
    file by selecting **File ➤ Open Definition** in the menu bar, by dragging the
    file into the opened application, or by dropping the definition file onto the
    start script of the editor, as shown in Figure 10-3.


    ![Image 23](index-162_1.jpg)


    The structure of the corresponding data files is now shown in the editor. For
    each entry, you can specify how often the entry is repeated, the type of the entry
    (`byte`, `short`, and so on), and the actual data.


    To load some data, use `${polish.home}/bin/level1.data` by selecting **File ➤
    Open Data** in the menu bar, by dragging the file into the opened application,
    or by dropping the definition file onto the start script of the editor. Now you
    can see the actual data of the file in the right column. You can edit the data
    by clicking into the column. Depending on the data, you can edit it directly in
    the table or in a dialog box, as shown in Figure 10-4.


    **Figure 10-4.** *Editing data with the Binary Editor*


    An entry can be repeated several times when you specify the **Count** value. You
    can define this number either directly by setting a static number or by using
    one or several other data entries. When you use another data entry for specifying
    the number, the numerical value of that entry is used. In Figure 10-4, the entry
    `roadYPositions` is repeated for `numberOfRoads` times, for example. Since the
    value of `numberOfRoads` is 3, the `roadYPosition` entry is repeated three times.


    Apart from numerical values such as `byte` or `short`, you can also use `String`
    entries for the **Count** definition. When you use a `String` entry, the length
    of the data string is used to calculate its numerical value. You can also use
    several entries and add, multiply, subtract, or divide them for calculating the
    repetitions of the current entry. For example, in Figure 10-4, the `cells` entry
    is repeated for `numberOfCols * numberOfRows` times. Since data files are loaded
    sequentially, you can only use entries that are already known; these are any entries
    that are defined above the entry for which you are specifying a **Count** value.


    You can use several predefined types for your files; for example, you can specify
    `byte`, `boolean`, or `PNG Image`. You can change the type just by selecting the
    entry in the **Type** column. When the type has a fixed length, it is shown in
    parentheses after the type. Types with a variable length declare this by having
    “(-1)” at the end of their name. You can also define your own types by selecting
    **Edit ➤ Add Custom Type**. You can mix any already known types together. You
    could use two `short` values for creating a `Position` type, for example. The
    specifications of your custom types are saved in the corresponding `.definition`
    file. Table 10-1 describes the default types.


    **Table 10-1.** *Predefined Types of the Binary Editor*


    | Type | Values | Explanation |

    |------|--------|-------------|

    | `byte` | –128..+128 | Standard Java `byte` value |

    | `unsigned byte` | 0..255 | Positive 8-bit value |

    | `short` | –32768..+32767 | Standard Java `short` value (uses 2 bytes) |

    | `unsigned short` | 0..2^31–1 (2147483647) | Positive 16-bit value |

    | `int` | –2^31..2^31-1 | Standard Java `int` value (uses 4 bytes) |

    | `long` | –2^63..2^63-1 | Standard Java `long` value (uses 8 bytes) |

    | `boolean` | `true`, `false` | One byte representing `true` (1) or `false` (0)
    |

    | `ASCII-String` | Text | A string consisting of ASCII characters with a maximum
    length of 255 characters; uses length+1 bytes in the data file |

    | `UTF-String` | Text | Standard Java `String` |

    | `PNG-Image` | Image | A PNG image |


    > **Note:** PNG images should usually be the last entry in a definition file,
    unless you generate your own code for loading the images.


    The Binary Editor can generate the Java code for loading the corresponding data
    files. Just select **Code ➤ Generate Java Code** to view the generated code. You
    can now save it or copy it to the clipboard.


    You can save your definition files wherever you want to, but most often, you will
    save them along with the data files in the *resources* folder of your project.
    You then need to make sure that the `.definition` files are not included in your
    application bundles. You can do so by specifying the `excludes` attribute of the
    `<resources>` element in the `build.xml` file, as in this example:


    ```xml

    <resources excludes="*.definition, readme.txt" />

    ```


    This element is nested within the `<build>` section. Take a look at the `build.xml`
    file of the **Menu** sample application for a full example.


    ![Image 24](index-164_1.jpg)'
