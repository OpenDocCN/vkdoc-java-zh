    在翻译中使用引号和其他特殊字符


    某些字符需要在您的翻译文件中进行 Java 编码。如果您正确地转义它们，通常是在开头使用反斜杠字符（\），那么您可以使用引号以及任何特殊字符；例如，您可以使用
    \" 表示引号，\t 表示制表符，\\ 表示反斜杠。


