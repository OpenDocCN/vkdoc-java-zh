    \ 4;\n}\n```\n\n**图12-32.** 运行中的`Ticker`。乌龟已通过屏幕样式的`foreground-image`属性移动到前面。\n\
    \n## 设计焦点项\n\n您可以通过使用预定义的`focused`样式来设计当前获得焦点的项。但您也可以选择以不同方式高亮显示焦点项。\n\n通常，您会使用不同的背景或边框设置来指示某个项已获得焦点，但您也可以使用其他属性。例如，当您有一个`List`或`ChoiceGroup`时，您可以在普通样式和焦点样式中都设置`icon-image`属性，并在焦点样式中将图像切换为高亮版本。\n\
    \n您还可以使用`after`和`before`属性在当前获得焦点的项之后或之前插入图像。\n\n对于每个`Screen`或`Item`，您可以通过使用`focused-style`属性设置不同的焦点样式，例如`focused-style:\
    \ .myExtraFocusedStyle;`。这种机制允许您使用不同的样式，但请确保不要因为显示项获得焦点的方式过多而使用户感到困惑。例如，使用此机制来区分同一`Form`中的输入字段和按钮。\n\
    \n### 使用动画\n\n您可以在应用程序的多个位置使用动画背景和动画项。最重要的位置是当前获得焦点的项，但您也可以为屏幕使用动画背景，或为屏幕或菜单使用动画视图类型。其他可能的位置包括当前屏幕的标题以及扩展菜单栏。请适度使用动画，以免影响应用程序的可用性。根据您的应用程序，您将能够使用不同级别的动画和“疯狂”设计。"
