    Excluding or Including Complete Classes


    You can include or exclude complete classes or interfaces with the #condition
    directive. J2ME


    Polish uses this functionality to include its GUI wrapper classes only when the
    J2ME Polish GUI is actually used, for example. Another possible scenario is to
    include an audio player only when the target device supports the necessary requirements,
    as shown in Listing 8-5. The


    #condition directive accepts all arguments of the #if directive, so you can use
    logical operators and comparators in it. You can place the #condition directive
    anywhere in the file, but the recommended position is on the very first line.


    **Listing 8-5.** *Including the Audio Player Class Only When the Device Can Play
    Sounds*


    **//#condition polish.api.mmapi || polish.api.nokia-ui**


    package com.company.j2me.audio;


    public class AudioPlayer {


    ...


    }


    ■**Note** When you use #if directives to check if the device supports audio before
    you use the AudioPlayer class, you don''t actually need the #condition directive,
    since the obfuscator takes care of removing any unused classes. But the #condition
    directive forces you to use these checks consistently; otherwise, you will get
    compiler errors.


