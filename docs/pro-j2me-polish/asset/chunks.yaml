- fmt: "# Signing MIDlets\n\nSigning MIDlets is required when your application needs\
    \ to access security-sensitive resources such as Internet connections. You can\
    \ state your required permissions in the `MIDlet-Permissions` JAD attribute. In\
    \ J2ME Polish you can use the `permissions` attribute of the `<info>` element\
    \ for defining the necessary permissions, for example, `<info permissions=\"javax.microedition.io.Connector.http\"\
    \ [...] />`. Likewise, you can define optional permissions using the `optionalPermissions`\
    \ attribute.\n\nPossible values for permissions include `javax.microedition.ui.Connector.http`,\
    \ `javax.microedition.ui.Connector.socket`, and `javax.microedition.io.PushRegistry`.\n\
    \nPlease check the appendix for all possible permissions.\n\nWhen you want to\
    \ access so-called closed resources such as the low-level networking API (datagram,\
    \ socket, serial), you usually need a valid signature; otherwise, a `SecurityException`\
    \ will be thrown immediately.\n\n## Signing MIDlets\n\nWhen the application is\
    \ signed, the SHA1 hash value of the JAR file is calculated and added to the JAD\
    \ file. The certificate that is used for the calculation is added to the JAD file,\
    \ too. The JAR file itself is not changed and must not be modified later. The\
    \ user is asked once if she gives the signed MIDlet the requested permission.\
    \ When a required permission is denied, the installation is aborted. When the\
    \ user denies an optional permission, the installation proceeds. In such cases\
    \ the user is asked again during the runtime of the application just like an unsigned\
    \ MIDlet.\n\n> **Note:** Please refer to the “Signing MIDlets” section of Chapter\
    \ 7 for learning how to automatically sign your application with J2ME Polish.\n\
    \n## Root Certificates and Java Verified\n\nYou need a certificate for signing\
    \ your application. The device also needs to recognize and trust the used certificate;\
    \ otherwise, the installation is aborted. All devices contain so-called root certificates\
    \ for this purpose.\n\nRoot certificates are separated in three categories:\n\n\
    - **Vendor certificates** are used to sign preinstalled J2ME applications. Such\
    \ applications enjoy the highest possible trust level and can access everything.\
    \ Obviously, you need a business relationship with the vendor for getting signed\
    \ with vendor certificates.\n- **Carriers** can also add their own root certificates\
    \ to their phones. Again, you need a business relationship with the corresponding\
    \ vendor for signing your application with a carrier certificate.\n- **The Java\
    \ Verified/GEO Trust certificate** is also present on most MIDP 2.0–compliant\
    \ devices.\n\nJava Verified (http://www.javaverified.com) is an initiative that\
    \ provides testing and signing services. When your application passes the tests\
    \ and you have paid the necessary fee, your application will be signed by Java\
    \ Verified using the GEO Trust certificate (http://www.geotrust.com) and then\
    \ returned to you via e-mail. So, there is in general no chance for you to sign\
    \ your MIDlets yourself. This is especially annoying if you depend on a valid\
    \ signature because you access closed resources such as the low-level networking\
    \ API. Some devices might support importing new certificates, so in that case\
    \ you can create and use your own certificate for the development phase.\n\nA\
    \ possible strategy to minimize the number of required verifications is to split\
    \ the application into the application itself and the data it operates on. In\
    \ this scenario the application itself would stay the same and download the data\
    \ that is needed for its operation on the first run. In reality, however, few\
    \ applications can remain constant.\n\nWhen your application needs to be signed,\
    \ you should try to limit the number of target devices, because you have to pay\
    \ for each application version that is tested and signed. You can use the virtual\
    \ devices such as “Nokia/Series40DP2” or “Generic/midp2.” They group the functions\
    \ of their respective device class.\n\n## Identifying Devices\n\nEvery device\
    \ has a globally unique identification number called International Mobile Equipment\
    \ Identity (IMEI). A similar identification is the International Mobile Subscription\
    \ Identity (IMSI) that is tied to the Subscriber Identification Module (SIM) card\
    \ of a user. On some devices you can access these values from within your J2ME\
    \ application by querying a system property; on others you need to run your own\
    \ identification program.\n\nYou can access the IMSI on Motorola devices by requesting\
    \ the IMSI system property. Siemens makes the IMEI with the system property `com.siemens.mp.imei`\
    \ available. On Sony Ericsson devices you need either `com.sonyericsson.imei`\
    \ or `com.sonyericsson.IMEI`. RIM BlackBerry devices make the IMEI accessible\
    \ by calling `GPRSInfo.getIMEI()`. The J2ME Polish device database contains the\
    \ required keys for accessing these identities in the `polish.Property.imei` and\
    \ `polish.Property.imsi` variables.\n\nOn Nokia devices you cannot access the\
    \ IMSI or EMEI from within your J2ME application. In such cases you need to create\
    \ your own identification solution.\n\nOften, the user’s mobile phone number (MSISDN)\
    \ is used for identification purposes. The MSISDN can be added dynamically to\
    \ the application bundle when the user requests the application at your over-the-air\
    \ (OTA) server. When the user is accessing your OTA server via WAP, you can extract\
    \ the MSISDN from the HTTP headers of the WAP request when the carrier is adding\
    \ this information. Carriers usually add MSISDN headers or similar identification\
    \ headers only when you have a business relationship with that carrier. Of course,\
    \ you can also ask the user to provide his mobile phone number. Once you have\
    \ the MSISDN, you can insert it into the JAD file that is used for the installation.\
    \ You can then access the JAD attribute by calling `MIDlet.getAppProperty(String\
    \ attributeName)` in your application. JAD files can be changed easily; a more\
    \ secure option is to rebuild the application on request and provide the MSISDN\
    \ as a preprocessing variable.\n\nOn devices that support the Bluetooth API, you\
    \ could also use the Bluetooth address of the device as a globally unique identification\
    \ by calling `LocalDevice.getLocalDevice().getBluetoothAddress()`.\n\nListing\
    \ 15-17 demonstrates how you can use the different identification options in one\
    \ method. When the preprocessing variable `user.msisdn` is defined, the corresponding\
    \ value is returned. Then it is checked whether the IMEI or IMSI can be retrieved.\
    \ When this is also not possible, the Bluetooth address is returned on devices\
    \ supporting the Bluetooth API. Last but not least, the application property `user.msisdn`\
    \ is retrieved from the MIDlet when all other methods fail. To allow you to distinguish\
    \ between the identification methods, each returned ID starts with a header, like\
    \ `msisdn:+4916012345678`.\n\n**Listing 15-17.** *Retrieving a Globally Unique\
    \ Identification ID*\n\n```java\npublic String getIdentification( MIDlet midlet\
    \ ) {\n    //#if user.msisdn:defined\n    //#= return \"msisdn:${user.msisdn}\"\
    ;\n    //#elif polish.Property.imei:defined\n    //#= return \"imei:\" + System.getProperty(\
    \ \"${polish.Property.imei}\" );\n    //#elif polish.Property.imsi:defined\n \
    \   //#= return \"imsi:\" + System.getProperty( \"${polish.Property.imsi}\" );\n\
    \    //#elif polish.api.btapi\n    return \"bluetooth:\" + LocalDevice.getLocalDevice().getBluetoothAddress();\n\
    \    //#else\n    String msisdn = midlet.getAppProperty( \"user.msisdn\" );\n\
    \    if ( msisdn != null ) {\n        return \"misdn:\" + msisdn;\n    } else\
    \ {\n        return null;\n    }\n    //#endif\n}\n```\n\n## Accessing Native\
    \ Functionality"
