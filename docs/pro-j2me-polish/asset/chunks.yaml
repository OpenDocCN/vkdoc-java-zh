    Designing the Focused Item


    You can design the currently focused item by using the predefined focused style.
    But you can choose to highlight the focused item in different ways.


    Often you will use another background or border setting for indicating that an
    item has been focused, but you can use other attributes as well. When you have
    a List or a ChoiceGroup, for example, you can set the icon-image attribute in
    the normal as well as in the focused style and switch the image to a highlighted
    version in the focused style.


    You can also use the after and before attributes for inserting an image after
    or before the currently focused item.


    For each Screen or Item, you can set a different focused style by using the focused-style
