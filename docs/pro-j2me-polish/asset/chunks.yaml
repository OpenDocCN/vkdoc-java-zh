    \ according to preprocessing directives. |\n| Compile | `<compiler>` | This compiles\
    \ the preprocessed source code. |\n| Postcompile | `<postcompiler>` | In the postcompile\
    \ step, the binary bytecode can be processed and changed. |\n| Obfuscate | `<obfuscator>`\
    \ | The obfuscation step removes unnecessary code and shrinks the remaining code.\
    \ |\n| Preverify | `<preverifier>` | The bytecode of MIDP applications needs to\
