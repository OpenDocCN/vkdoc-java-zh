    大多数 J2ME 设备支持 MIDP 1.0 配置文件，而对 MIDP 2.0 的支持正在迅速增长。MIDP 1.0 标准扩展了 CLDC 1.0 或 1.1
    配置，并引入了 MIDlet 的概念、LCDUI 用户界面以及记录存储持久化机制。根据你的时间安排，你甚至可以考虑使用即将推出的 MIDP 3.0 标准（参见
    *http://jcp.org/en/jsr/detail?id=271* 的 JSR 271），但该标准需要几年时间才能在广泛的设备基础上被采用。IMP
    用于没有用户界面的设备，允许你创建用于机器对机器通信的解决方案。表 14-2 列出了 J2ME 世界中所有可用的配置文件。


