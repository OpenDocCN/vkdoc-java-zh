    J2ME Polish 还为每个能力的每个值定义了符号 polish.[ *capability-name*].[value]。例如，当你拥有值为 https、socket
    的 JavaProtocol 能力时，符号 polish.JavaProtocol.https 和 polish.JavaProtocol.socket 都被定义，并且可以使用
    //#if 和 //#ifdef 指令进行检查。


    能力 JavaPlatform、JavaConfiguration、JavaPackage、SoundFormat 和 VideoFormat 也会触发额外的预处理符号。支持
    MIDP 1.0 平台的设备具有 polish.midp1 符号，而 polish.midp2 符号为所有 MIDP 2.0 设备定义。类似地，polish.cldc1.0
    符号为所有 CLDC 1.0 设备定义，polish.cldc1.1 符号为所有 CLDC 1.1 设备定义。对于每个支持的 JavaPackage，定义了
    polish.api.[ *api-name*] 符号；例如，polish.api.mmapi。同样，对于每个支持的 SoundFormat，定义了符号 polish.audio.[
    *format*]。当你的设备支持 MIDI 声音时，定义了 polish.audio.midi 符号。所有视频格式也是如此，因此你可以通过检查 polish.video.mpeg-4
    来检查当前目标设备是否支持 MPEG-4 视频。


    **更改和扩展设备数据库**


    得益于设备数据库的 XML 格式，你可以使用任何文本编辑器读取和写入这些文件。你可以通过编辑安装文件夹中的设备数据库 XML 文件（例如 *${polish.home}/custom-devices.xml*）来进行全局更改，但也可以通过将相关文件复制到项目的基目录中，然后进行编辑，从而仅对当前项目进行本地更改。


    ■**注意** 考虑将你的任何设备数据库更改贡献给 J2ME Polish 社区，以便每个人都能从中受益。如果你不贡献这些更改，你可能需要将自己的版本与官方数据库合并，因为数据库在
    J2ME Polish 的每个版本中都会更新。


    在对数据库进行更改后，如果你在预处理步骤中使用更改后的定义，则可能需要进行一次干净的构建。只需使用 Ant 调用 *build.xml* 文件的 clean
    目标，或者在开始另一个构建之前删除临时的 *build* 文件夹。


    ■**注意** 在 Windows 上，你需要一个像样的文本编辑器来读取和写入 XML 文件。行尾以 Unix 风格写入，因此在记事本中，你只会看到一行看似无尽的文本。考虑使用
    Crimson 编辑器 ( *http://www.crimsoneditor.com*) 或 Java IDE 中的任何编辑器，如 Eclipse ( *http://www.eclipse.org*)。


