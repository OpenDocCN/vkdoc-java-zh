    **282**


    第 14 章 ■ 无线市场概览


    **J2ME 市场**


    无线游戏市场在 J2ME 市场中占据主导地位，据估计，2004 年仅在美国就创造了 3.5 亿美元的收入。10 IDC 预计，美国 J2ME 游戏的销量将在
    2005 年超过铃声，并持续增长，到 2008 年达到 15 亿美元。11 与竞争对手 BREW 技术相比——根据高通的数据，该技术在 2004 年为应用程序开发者创造了
    2 亿美元的全球收入 12——很明显，未来属于 J2ME 标准。


    根据 Evans Data Corporation 的数据，约 40% 的无线开发者使用 J2ME，另有 26% 正在评估其使用。13 ARC Group
    预计，到 2006 年，约 90% 的发货手机将支持 Java 标准。14 作为主要平台的 Symbian 现在支持所有系列手机的 MIDP 2.0 标准，甚至在较低的
    Series 40 细分市场也是如此。


    J2ME 有希望的竞争对手将是移动设备上的 Flash，或许还有微软，尽管微软手机迄今为止并未获得良好评价。Flash 有潜力成为移动市场的主要参与者，但这并不需要对
    J2ME 市场构成威胁。更有可能的是，Flash 将用于营销游戏和商业应用，而应用本身将继续用 Java 实现。


    **总结**


    在本章中，你了解了 J2ME 设备之间的差异以及 J2ME 市场是如何演变的。在下一章中，你将了解一些在实践中经常遇到的方面，例如检测中断、建立网络连接和访问原生功能。

