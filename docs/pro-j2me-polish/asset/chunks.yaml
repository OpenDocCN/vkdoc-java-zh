    并非所有混淆器都能将所有类移动到默认包中。使用默认包可以带来一些额外的节省，因为完全限定的类名存储在每个类内部。你可以只为所有类使用默认包，但这会损害你的架构。`J2ME
    Polish`可以在预处理步骤中将应用程序的所有类移动到默认包中。通过在`build.xml`脚本中将`<obfuscator>`元素的`useDefaultPackage`属性设置为`true`来启用此选项。请记住，这种方法要求你为所有Java源文件使用唯一的类名。


    在打包步骤中，所有类文件和资源都被捆绑到一个JAR文件中。`J2ME Polish`使用默认的Java ZIP算法来打包文件。根据你的应用程序和目标设备，你可能希望使用不同的打包器。请参阅第7章的“打包应用程序”部分以了解更多选项。请记住，使用优化的ZIP兼容算法可能会导致安装过程中出现问题，因此仅将其作为最后的手段实施。


    ## 摘要


    优化应用程序是创建小巧、快速、可工作的应用程序的最后一步。


    你可以针对速度、减少内存占用和更小的JAR文件大小进行优化。


    某些优化对所有方面都有益，而其他优化则相互矛盾。你应该从一开始就考虑可能的高级优化，并将低级优化推迟到最后。


    在本书的附录中，你将找到关于`J2ME Polish`和`J2ME`设置的详细信息，以简洁的格式呈现。


