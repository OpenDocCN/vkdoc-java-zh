    **规避已知问题**


    你可以在 *http://www.j2mepolish.org/devices/issues.html* 查看许多已知问题。你可以通过防御性编程来规避一些问题；其他问题则需要调整你的代码。


    防御性编程


    你可以通过防御性编程规避的一个问题是 Symbian 和 Motorola 设备上 InputStream.available() 实现的行为。在这些设备上，当你从
    JAR 文件中读取资源时，available() 方法返回 0。请注意，CLDC 规范完全允许这种行为，该规范指出默认的 available() 实现总是返回
    0，但子类*应该*重写此方法。这只是有点出乎意料。


    清单 15-6 展示了一个读取资源并将其内容作为字节数组返回的实现。除了 available() 调用之外，该代码中还存在另一个问题：你可能只是假设当你调用
    InputStream.read( byte[] ) 时，整个缓冲区会被一次性读取完毕。


    但事实并非如此，正如 CLDC 的 JavaDoc 所提到的。read() 方法返回的是读取的字节数，而不是完全填满缓冲区。当你确切知道输入的大小时，应该改用
    DataInputStream.readFully( byte[] ) 方法。


    第三个问题是，当 read() 方法抛出异常时，你没有关闭输入流。这可能会导致应用程序中出现内存泄漏。


    **清单 15-6.** *错误地读取资源*


    public byte[] readResource( String url )


    throws IOException


    {


    InputStream in = getClass().getResourceAsStream( url );


    // 以下代码在 Symbian 和 Motorola 上总是返回 0：**int available = in.available();**


    byte[] buffer = new byte[ available ];


    // 这也不能保证正常工作：


    **in.read( buffer );**


    // 不能保证输入流被关闭，


    // 因为 in.read() 可能抛出异常。


    **in.close();**


    return buffer;


    }


    清单 15-7 展示了同一方法的防御性实现，该方法同样适用于 Motorola 和 Symbian 设备。只要 read() 方法通过返回 -1 来指示流结束，你就持续读取资源。你还使用
    ByteArrayOutputStream 来缓冲读取的字节。最后但同样重要的是，你将实际的资源读取操作包围在 try


    {...} finally 块中。即使包围的代码中发生异常，finally 块也会执行。生成的应用程序比原始版本复杂得多，但是，嘿，它能工作！


