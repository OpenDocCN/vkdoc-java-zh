- fmt: "# ChoiceGroups\n\n`ChoiceGroups` hold several items of which one or several\
    \ can be selected. You have access to three kinds of `ChoiceGroups`: exclusive\
    \ groups in which only one item can be selected, multiple groups in which you\
    \ can select several items, and pop-up groups that display the currently selected\
    \ item only when inactive but that “pop up” and show all possibilities when they\
    \ are activated.\n\nWhen you design `ChoiceGroups`, you need to differentiate\
    \ between the group and the actual items. Listing 12-44 demonstrates how you can\
    \ use the `#style` directive and the `append()` method for applying different\
    \ styles to the group and the actual item.\n\n**Listing 12-44.** *Applying Different\
    \ Styles for the ChoiceGroup and Its Embedded Items*\n\n```\npublic ChoiceGroup\
    \ createChoiceGroup( String label, String[] choices ) {\n\n    //#style exclusiveChoiceGroup\n\
    \n    ChoiceGroup group = new ChoiceGroup( label, Choice.EXCLUSIVE );\n    for\
    \ ( int i = 0; i < choices.length; i++ ) {\n\n        String choice = choices[i];\n\
    \n        //#style exclusiveChoiceItem\n\n        group.append( choice, null );\n\
    \n    }\n\n    return group;\n\n}\n```\n\nYou can set the style of the currently\
    \ focused item with the `focused-style` attribute. When you don’t specify it,\
    \ the usual focused style is used instead. Listing 12-45 demonstrates how to set\
    \ a custom focused style (see the next section). You can also set the number of\
    \ columns for displaying the `ChoiceGroup` and even the `view-type`, which allows\
    \ you to use animations and other arrangements of the items contained in the group.\
    \ Table 12-19 lists the available options. For a discussion of the `focused-style`,\
    \ `view-type`, and `columns` attributes, please refer to the earlier “Designing\
    \ Screens” section.\n\n**Table 12-19.** *General Attributes for ChoiceGroups*\n\
    \n| Attribute | Required? | Explanation |\n| --- | --- | --- |\n| `columns` |\
    \ No | The number of columns. This can be used to lay out the items in a table.\
    \ Defaults to one column. |\n| `columns-width` | No | Either `normal`, `equal`,\
    \ or the width for each column in a comma-separated list (for example, `columns-width:\
    \ 60,60,100;`). Defaults to `normal`, meaning that each column uses as much space\
    \ as the widest item of that column needs. The `equal` width leads to columns\
    \ that all have the same width. The explicit list of column widths results in\
    \ the usage of those widths. |\n| `view-type` | No | The view type used for this\
    \ choice group. Please refer to the discussion of view types in the “Designing\
    \ Screens” section. |\n\n## Designing Exclusive Choice Groups\n\nExclusive `ChoiceGroups`\
    \ are like radio boxes encountered on web pages: you can select only one item\
    \ at a time. You can use several additional attributes, which are listed in Table\
    \ 12-20.\n\n**Table 12-20.** *Additional Attributes for Items in Exclusive ChoiceGroups*\n\
    \n| Attribute | Required | Explanation |\n| --- | --- | --- |\n| `icon-image`\
    \ | No | The URL of the image, for example, `icon-image: url( icon.png );`. The\
    \ keyword `%INDEX%` can be used for adding the position of the item to the name,\
    \ for example, `icon-image: url( icon%INDEX%.png );`. The image used for the first\
    \ item will be `icon0.png`, the second item will use the image `icon1.png`, and\
    \ so on. |\n| `icon-image-align` | No | The position of the image relative to\
    \ the text. Either `top`, `bottom`, `left`, or `right`. Defaults to `left`, meaning\
    \ that the image will be drawn left of the text. |\n| `choice-color` | No | The\
    \ color in which the radio box will be painted. Defaults to `black`. |\n| `radiobox-selected`\
    \ | No | The URL of the image for a selected item. Default is a simple image drawn\
    \ in the defined choice color. |\n| `radiobox-plain` | No | The URL of the image\
    \ for a not-selected item. Default is a simple image drawn in the defined choice\
    \ color. When `none` is given, no image will be drawn for not-selected items.\
    \ Only the image for selected items will be drawn in that case. |\n| `view-type`\
    \ | No | The exclusive `ChoiceGroup` additionally supports the `exclusive` view\
    \ type that shows only the currently selected item while allowing the user to\
    \ scroll right and left. |"
  raw: 'ChoiceGroups hold several items of which one or several can be selected. You
    have access to three kinds of ChoiceGroups: exclusive groups in which only one
    item can be selected, multiple groups in which you can select several items, and
    pop-up groups that display the currently selected item only when inactive but
    that “pop up” and show all possibilities when they are activated.


    5033CH12.qxd 6/20/05 11:31 AM Page 216


    **216**


    C H A P T E R 1 2 ■ W O R K I N G W I T H T H E G U I When you design ChoiceGroups,
    you need to differentiate between the group and the actual items. Listing 12-44
    demonstrates how you can use the #style directive and the append() method for
    applying different styles to the group and the actual item.


    **Listing 12-44.** *Applying Different Styles for the ChoiceGroup and Its Embedded
    Items* public ChoiceGroup createChoiceGroup( String label, String[] choices )
    {


    //#style exclusiveChoiceGroup


    ChoiceGroup group = new ChoiceGroup( label, Choice.EXCLUSIVE ); for ( int i =
    0; i < choices.length; i++ ) {


    String choice = choices[i];


    //#style exclusiveChoiceItem


    group.append( choice, null );


    }


    return group;


    }


    You can set the style of the currently focused item with the focused-style attribute.
    When you don’t specify it, the usual focused style is used instead. Listing 12-45
    demonstrates how to set a custom focused style (see the next section). You can
    also set the number of columns for displaying the ChoiceGroup and even the view-type,
    which allows you to use animations and other arrangements of the items contained
    in the group. Table 12-19 lists the available options. For a discussion of the
    focused-style, view-type, and columns attributes, please refer to the earlier
    “Designing Screens” section.


    **Table 12-19.** *General Attributes for ChoiceGroups* **Attribute**


    **Required?**


    **Explanation**


    columns


    No


    The number of columns. This can be used to lay out the items in a table. Defaults
    to one column.


    columns-width


    No


    Either normal, equal, or the width for each column in a


    comma-separated list (for example, columns-width:


    60,60,100;). Defaults to normal, meaning that each column


    uses as much space as the widest item of that column needs.


    The equal width leads to columns that all have the same


    width. The explicit list of column widths results in the usage of those widths.


    view-type


    No


    The view type used for this choice group. Please refer to the discussion of view
    types in the “Designing Screens” section.


    **Designing Exclusive Choice Groups**


    Exclusive ChoiceGroups are like radio boxes encountered on web pages: you can
    select only one item at a time. You can use several additional attributes, which
    are listed in Table 12-20.


