    **Troubleshooting Integration Issues**


    Sometimes you might encounter difficulties while integrating J2ME Polish in Eclipse.


    In case the sources have not been integrated automatically, set the source directory
    of your project manually: select Project ➤ Properties ➤ Java Build Path ➤ Source,
    and add the source folder *source/src* there.


    If Eclipse complains about unknown classes, the classpath of your project is not
    set correctly. Please include the following JAR files from the *${polish.home}/import*
    folder in your classpath: *import/midp2.jar*, *import/enough-j2mepolish-client.jar*,
    *import/mmapi.jar*, *import/nokia-ui.jar*, *import/wmapi.jar*, and any others
    you might want to use in your application such as *m3g.jar* or *pdaapi.jar*.


    If the Run Ant command is not shown when you right-click the *build.xml* file,
    select the *build.xml* script, open the Run menu, and then select External Tools
    ➤ Run As ➤ Ant Build.


    When the build process is aborted with a message that no suitable Java compiler
    was found, you need to make sure a valid Java SDK (not a JRE) is used for the
    build. Switch to the JRE tab in the Run Ant dialog box, and check the Runtime
    JRE setting. In most cases, you can run Ant in the same JRE as the workspace.
    When this does not work, check if the JRE is point-ing to a Java SDK by clicking
    the Installed JREs button in the JRE tab.


