- fmt: '# Series 40


    If you want to deploy your applications on Series 40 devices via Bluetooth, you
    need to use the Nokia Development Suite. The optional OBEX transfers are not supported
    by the Nokia Bluetooth API.


    # Series 60


    The Series 60 platform provides the basis for smart phones not only from Nokia
    but also from many other vendors, such as Sendo, Siemens, and Panasonic. The Series
    60 platform is based on the Symbian OS 6 and higher. The screen size is 176✕208
    pixels with a color depth of 16 bits per pixel (65,536 colors). You can find general
    information about Series 60 at `http://www.series60.com`. Series 60 phones are
    divided into different editions that reflect improvements of the underlying Symbian
    OS. Each edition can also have feature packs that provide enhancements and bug
    fixes.


    The first Series 60 edition is based on the MIDP 1.0 platform and supports the
    Nokia UI API, the Mobile Media API, and the Wireless Messaging API. A notable
    exception is the Nokia 7600 phone, which supports only the Nokia UI API. You can
    build for this edition by targeting the virtual `Nokia/Series60E1` phone:


    ```

    <requirement name="Identifier" value="Nokia/Series60E1" />

    ```


    The second Series 60 edition is separated in the Feature Packs 1, 2, and 3.


    Feature Pack 1 uses the MIDP 2.0 platform along with the CLDC 1.0 configuration.
    Also, the Mobile Media API 1.1 and the Wireless Messaging API are supported. Use
    the `Nokia/Series60E2` or `Nokia/Series60E2FP1` phone for building your application
    for this feature pack:


    ```

    <requirement name="Identifier" value="Nokia/Series60E2FP1" />

    ```


    Feature Pack 2 uses the CLDC 1.1 configuration that supports floating-point calculations
    and is JTWI compliant. Additional features include the PDAAPI (the FileConnection
    and PIM API), the support of Bluetooth connections for the push registry, and
    the Mobile 3D Graphics API for OpenGL-compatible devices. You can use the `Nokia/Series60E2FP2`
    device to build your application for this feature pack.


    Feature Pack 3 additionally supports the Web Services API. Also, the Bluetooth
    implementation provides the optional OBEX part for exchanging data. Use the `Nokia/Series60E2FP3`
    device for targeting devices that support this feature pack.


    The third edition of Series 60 brings some exciting new Java technology into play.
    It supports the Security and Trust API, the Session Initialization API, the Scalable
    2D Vector Graphics API, the Location API, and the Wireless Messaging API 2.0.
    Use the virtual `Nokia/Series60E3` device to build your application for this edition.


    Difficulties with Series 60 vary between different editions and feature packs.
    Some devices have problems with reading Bluetooth InputStreams, some older second-edition
    devices lack the root certificate that is used by the Java Verified program, and
    some have UI issues such as a nonworking `setCurrentItem()` method. Most Series
    60 devices flicker whenever you show a new Canvas. When a previously shown Canvas
    is displayed, an internal buffer is shown first before the `paint()` method of
    that Canvas is called again. In case you do not use the J2ME Polish GUI, which
    handles this issue automatically, you should consider using only one Canvas for
    displaying all screens of your application. Please refer to the issues database
    at `http://www.j2mepolish.org/devices/issues.html` for an up-to-date overview.
    Most Series 60 phones support applications of any size when the required space
    is available. The available heap is mostly 4MB or greater.


    # Series 80


    Nokia’s Series 80 platform consists of devices that combine PDAs and mobile phones.
    They target enterprise users quite successfully. The Nokia Communicator phones
    are the market leaders for these phone types.


    A typical Series 80 device looks like a normal phone, but opening it reveals a
    screen size of 640✕200 pixels and a QWERTY keyboard. Along with the MIDP 2.0 and
    CLDC 1.0 standards, Series 80 devices also support the Personal Java profile and
    CDC. Optional APIs are the Bluetooth API, the Wireless Messaging API, the Mobile
    Media API, the PDAAPI, and the Nokia UI API.


    You can build for a typical Series 80 device by targeting the `Nokia/Series80`
    device:


    ```

    <requirement name="Identifier" value="Nokia/Series80" />

    ```


    # Series 90


    Series 90 devices are optimized to display media with their 320✕200 screens and
    their pen-based input methods. As of April 2005, the Nokia 7710 is the only available
    Series 90 device.


    Series 90 devices support the MIDP 2.0 profile along with the CLDC 1.1 configuration.
    Optional APIs are the Bluetooth API (JSR 82), the Wireless Messaging API, the
    Mobile Media API, the PDAAPI, and Nokia’s UI API.


    Use the `Nokia/Series90` device for targeting a typical device of this series:


    ```

    <requirement name="Identifier" value="Nokia/Series90" />

    ```


    # Motorola


    Motorola is the second biggest vendor with a share of about 16% worldwide in 2004.
    Motorola is unique in using not one, two, or three different operating systems
    but four: its own proprietary Motorola OS, Symbian OS, Microsoft Smartphone, and
    Linux.


    Motorola provides excellent developer resources on `http://motocoder.com`. You
    can query the somewhat hidden known issues database by selecting Knowledge & Support
    and then Bug Submission.


    Motorola MIDP 2.0 phones support only one font size (20) and one font style (plain).
    Motorola recommends a JAR size of 100KB for the J2ME applications, but there is
    no hard limit. On modern devices you can expect a heap size of 800KB and higher.


    You can normally prefetch only one sound at a time on older MIDP 2.0 devices.
    Exceptions to this rule are MIDI, iMelody, and the Motorola-specific mix and basetrack
    formats, of which you can prefetch two sounds simultaneously. You can also prefetch
    one MIDI first and then one WAV file. You need to stop and deallocate the previous
    sound before playing the next one. In general, you can use up to four simultaneous
    TCP connections on Motorola phones.


    The icons of your MIDlets need to be 15✕15 pixels; otherwise, only a generic icon
    will be displayed. If you want to use more than 16KB in your RMS, you need to
    set the `MIDlet-Data-Size` JAD attribute, which defines the needed space in bytes.
    The maximum possible value is 524288 (512KB), but of course you can use only the
    space that is available. When the requested space is not available, the device
    will abort the application’s installation.


    Motorola offers some additional libraries such as the Phonebook API. These APIs
    are accessible only for licensees. If you want to use them, you need to build
    a business relationship with Motorola.


    # Samsung


    Samsung is the third biggest player with a market share of about 13% worldwide
    in 2004. Samsung also maintains a good developer community at `http://developer.samsungmobile.com`.
    For some weird reason, you either need Microsoft Internet Explorer or KDE Konqueror
    to access the site. Mozilla-based browsers are not supported. Still, make sure
    to check out the developer tips for the phones. You can find them in the site’s
    Resources section.'
