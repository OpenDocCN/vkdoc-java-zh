    **避免常见错误**


    在本地化应用程序时，您需要注意一些问题。


    调整 JAR 名称


    您需要记得在 *build.xml* 的 `<info>` 部分调整应用程序的 JAR 名称，以便包含区域设置；否则，只有最后一个本地化的应用程序会被实际写入
    *dist* 文件夹。您可以在 `jarName` 属性中使用变量 `${polish.locale}`、`${polish.language}` 或 `${polish.country}`：


