    **将 MIDP 2.0 游戏移植到**


    **MIDP 1.0 平台**


    得益于 J2ME Polish 的游戏引擎和 GUI，要让一个 MIDP 2.0 游戏在 MIDP 1.0 平台上运行，你只需手动处理一些特定问题。像往常一样，你可以使用预处理来检测目标设备的能力。


    要将你的 MIDP 2.0 游戏移植到 MIDP 1.0 设备，首先需要解决上一节概述的 J2ME Polish 游戏引擎的限制。你可能还需要调整特定于 MIDP
    2.0 的代码，以便你的应用程序能在 MIDP 1.0 设备上工作。


    通常，你不能在游戏中使用任何仅限 MIDP 2.0 的功能，但此规则有两个重要的例外：


    • 你可以使用 `javax.microedition.lcdui.game.*` API 中的所有内容。


    • 当你使用 J2ME Polish GUI 时，你可以使用大多数 MIDP 2.0 高级 GUI 功能，例如 `CustomItem`、`POPUP ChoiceGroups`
    或 `Display.setCurrentItem()`。


    因此，对于游戏来说，通常会出现三个移植问题：使用仅限 MIDP 2.0 的低级图形操作、声音播放以及设备控制（振动和显示灯）。解决方案是使用特定于供应商的库。


    ■**提示** 你通常需要根据目标设备的能力在游戏中集成特定资源。你可以使用 J2ME Polish 的资源组装功能来确保在 JAR 文件中包含正确的文件，如第
    7 章所述。


    **移植低级图形操作**


    移植低级图形操作是一项具有挑战性的任务。你可以在 `javax.microedition.lcdui.Graphics` 和 `javax.microedition.lcdui.Image`
    类中找到低级图形操作。


    例如，MIDP 2.0 平台允许你直接使用 `Graphics.drawRGB()` 方法绘制原始 RGB 数据。`Image.createRGBImage()`
    方法也处理原始 RGB 数据。你是否能移植这些功能取决于你的实际使用情况以及目标设备。所有诺基亚设备都支持简单而强大的诺基亚 UI API；其他供应商通常提供自己的专有扩展。


    表 11-1 列出了可用于移植低级图形操作的专有库。


