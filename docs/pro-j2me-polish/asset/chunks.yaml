    **MicroFloat**


    The MicroFloat library by Dave Clausen is known for its high precision. Calculations
    with MicroFloat yield the results similar to native Java floating-point calculations,
    since MircoFloat follows the international IEEE 754 standard ( *http://grouper.ieee.org/groups/754*).
