    **Building for Multiple Devices**


    In today’s diverse J2ME world, it is necessary to provide specialized application
    bundles for different devices. Consider, for example, the usage of device-specific
    APIs or the usage of resources such as images and sound files: it is not necessary
    to include sound files for devices that do not support that format. On some devices,
    you cannot use classes that are not available on that device, even when you reference
    them only dynamically using the Class.forName (String) pattern. Last but not least,
    you should always use optimized applications when you use J2ME Polish, since that
    API is highly optimized for each target device. Pointer events are, for instance,
    evaluated only when the target device is a pen-based device. Also, workarounds
    for device-specific issues can be incorporated only when you build your application
    for the affected device.


    **Selecting Devices**


    The <deviceRequirements> section is responsible for selecting the devices for
    which the application is built. You can select target devices just by listing
    their names, or you can use more complex selections by stating required capabilities.
    You can use any device capabilities or features that are defined in the device
    database. Listing 7-21 demonstrates how to select all devices that support the
    MIDP 2.0 platform or the Nokia UI API.


    ■**Note** The <deviceRequirements> section is optional. When it is omitted, the
    application is built for all known devices. This might take some time.


