    \ anymore.\n\n### High-Level Performance Tuning\n\nMany performance problems can\
    \ be resolved by changing the architecture, the used protocols, or the used algorithms.\
    \ Usually high-level changes can improve (or decrease, for that matter) the performance\
    \ of your application drastically.\n\n### Tweaking the Architecture\n\nThe architecture\
    \ provides the foundation for your application and allows you to tune the application\
    \ in the design phase already. You should aim to reduce the abstraction and to\
    \ strengthen the grouping of functionalities.\n\n#### Reducing Abstraction\n\n\
    Abstraction is good for reusing components in different environments. But each\
    \ abstraction layer not only increases the application size, but also decreases\
    \ the execution speed, since the virtual machine needs to resolve the inheritance\
