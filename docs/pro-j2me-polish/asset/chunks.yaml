  trans: "\n设计屏幕背景很简单：只需选择一种可用的背景，并将其应用到屏幕样式中即可。一种流行的做法是使用图片作为背景。由于背景总是从屏幕的最顶部绘制到最底部（无论是否存在标题或命令菜单），你需要考虑到这一点。\n\
    \n图 12-10 展示了所使用的背景图片，而图 12-11 则展示了该背景在列表屏幕中的实际效果。你甚至可以使用动画背景，例如“脉动圆圈”背景。\n\n\
    **图 12-10.** *用于屏幕的背景图片*\n\n![Image 33](img/index-222_1.jpg)\n\n5033CH12.qxd 6/20/05\
    \ 11:31 AM 第 200 页\n\n**200**\n\n第 12 章 ■ 使用 GUI 进行开发 **图 12-11.** *列表屏幕中的背景*\
    \ 设计标题\n\n当你为应用程序激活全屏模式后，你需要设计屏幕的标题。在标题中，你可以使用所有常见的设计属性，例如字体和背景设置。如果你愿意，甚至可以为标题使用动画背景。你可以通过设置边距来移动标题；请参考后续的“设计列表”部分，其中有一个将标题移至较低位置的示例。\n\
    \n设计菜单栏和菜单\n\n菜单栏包含屏幕的命令。当你为应用程序激活全屏模式后，你可以同时设计菜单和菜单栏。J2ME Polish 允许你在标准菜单栏和扩展菜单栏之间进行选择。与普通菜单栏相比，扩展菜单栏允许你设计一些额外的细节，但需要占用大约\
    \ 2KB 更多的 JAR 空间。\n\n**设计菜单**\n\n当有多个命令可用时，它们会被分组到“选项”菜单中。当你按下左软键时，菜单将会打开。\n\n\
    你可以使用菜单样式来设计打开的菜单，而默认情况下，你可以使用菜单项样式来设计菜单中包含的项目——或者，如果你根本没有定义菜单项样式，则使用菜单样式来设计。\n\
    \n你可以使用焦点样式来设计打开菜单中当前聚焦的元素。由于默认情况下，焦点样式用于任何位置的任何聚焦元素，你可能希望使用不同的样式。你可以通过在菜单样式中设置\
    \ `focused-style` 属性来实现这一点。\n\n清单 12-32 演示了如何使用所有这些概念。\n\n**清单 12-32.** *设计菜单*\n\
    \nmenu {\n\nmargin-left: 2;\n\npadding: 2;\n\nbackground {\n\n![Image 34](img/index-223_1.jpg)\n\
    \n5033CH12.qxd 6/20/05 11:31 AM 第 201 页\n\n第 12 章 ■ 使用 GUI 进行开发 **201**\n\ntype:\
    \ round-rect;\n\ncolor: highlightedBackgroundColor;\n\nborder-width: 2;\n\nborder-color:\
    \ backgroundColor;\n\n}\n\nfont-style: bold;\n\nfont-color: highlightedFontColor;\n\
    \n**focused-style: .menuFocused;**\n\nmenubar-color: backgroundColor;\n\n}\n\n\
    menuItem {\n\nmargin-top: 2;\n\npadding: 2;\n\npadding-left: 5;\n\nfont {\n\n\
    color: black;\n\nsize: medium;\n\nstyle: bold;\n\n}\n\nlayout: left;\n\n}\n\n\
    .menuFocused extends .menuItem {\n\nbackground-color: backgroundColor;\n\nfont-color:\
    \ highlightedFontColor;\n\nlayout: left | horizontal-expand;\n\nafter: url( dot.png\
    \ );\n\n}\n\n图 12-12 展示了应用程序打开的菜单的实际效果。\n\n你还可以更改“选项”、“选择”和“取消”命令的名称，如第 7 章“构建本地化应用程序”部分所述。\n\
    \n**图 12-12.** *打开的菜单的实际效果*\n\n5033CH12.qxd 6/20/05 11:31 AM 第 202 页\n\n**202**\n\
    \n第 12 章 ■ 使用 GUI 进行开发 **设计普通菜单栏**\n\n你可以使用预定义的菜单样式来设计普通菜单栏。此样式中的字体设置用于渲染实际的命令，而\
    \ CSS 属性 `menubar-color` 则定义了菜单栏的颜色。该颜色可以设置为任何值，包括透明，这在希望显示相应屏幕的背景而非菜单栏时非常有用。顺便提一下，`menubar-color`\
    \ 的默认值是白色。当此属性也在屏幕样式中定义时，它将覆盖菜单样式中针对该屏幕的设置。清单 12-33 展示了如何为普通屏幕使用黑色，而为具有 `.mainScreen`\
    \ 样式的屏幕使用透明菜单栏。\n\n**清单 12-33.** *为菜单栏使用不同颜色* menu {\n\nmargin-left: 2;\n\npadding:\
    \ 2;\n\nbackground {\n\ntype: round-rect;\n\ncolor: highlightedBackgroundColor;\n\
    \nborder-width: 2;\n\nborder-color: bgColor;\n\n}\n\nfont-style: bold;\n\nfocused-style:\
    \ .menuFocused;\n\nfont-color: highlightedFontColor;\n\n**menubar-color: black;**\n\
    \n}\n\n.mainScreen {\n\nbackground-image: url( bg.png );\n\n/* 对此样式的屏幕使用透明菜单栏，\n\
    \   以便菜单栏区域也能显示 bg.png 图片： */\n**menubar-color: transparent;**\n\n}\n\n图 12-13\
    \ 展示了左侧主屏幕上的透明菜单栏和右侧另一个屏幕上的默认黑色菜单栏。\n\n**设计扩展菜单栏**\n\n当普通菜单栏的设计可能性无法满足你的需求时，你可以使用扩展菜单栏。与普通菜单栏不同，扩展菜单栏是一个功能完整的项目，因此可以像任何其他项目一样进行设计。使用扩展菜单栏的代价是需要在你的\
    \ JAR 中增加一个额外的 2KB 类文件。\n\n![Image 35](img/index-225_1.jpg)\n\n5033CH12.qxd 6/20/05\
    \ 11:31 AM 第 203 页\n\n第 12 章 ■ 使用 GUI 进行开发 **203**\n\n**图 12-13.** *主屏幕上的透明菜单栏（左）和另一个屏幕上的黑色菜单栏（右）*\n\
    \n要使用扩展菜单栏代替普通菜单栏，你需要在 `build.xml` 文件的 `<variables>` 部分将 `polish.MenuBar.useExtendedMenuBar`\
    \ 预处理变量设置为 `true`，如清单 12-34 所示。\n\n**清单 12-34.** *激活扩展菜单栏*\n\n<j2mepolish>\n\n\
    <info\n\nlicense=\"GPL\"\n\nname=\"Roadrunner\"\n\nvendorName=\"A reader.\"\n\n\
    version=\"0.0.1\"\n\njarName=\"${polish.vendor}-${polish.name}-roadrunner.jar\"\
    \n\n/>\n\n<deviceRequirements>\n\n<requirement name=\"Identifier\" value=\"Generic/midp1\"\
    \ />\n\n</deviceRequirements>\n\n<build\n\nusePolishGui=\"true\"\n\n>\n\n<midlet\
    \ class=\"com.apress.roadrunner.Roadrunner\" />\n\n<variables>\n\n<!-- 为 Series\
    \ 60 设备激活 GUI -->\n\n**<variable**\n\n**name=\"polish.MenuBar.useExtendedMenuBar\"\
    **\n\n**value=\"true\" />**\n\n</variables>\n\n</build>\n\n<emulator />\n\n</j2mepolish>\n\
    \n5033CH12.qxd 6/20/05 11:31 AM 第 204 页\n\n**204**\n\n第 12 章 ■ 使用 GUI 进行开发 你可以使用预定义的样式\
    \ `menubar`、`leftcommand` 和 `rightcommand` 来设计扩展菜单栏，如表 12-12 所示。表 12-13 列出了 `menubar`\
    \ 样式支持的额外属性。\n\n**表 12-12.** *扩展菜单栏的预定义样式* **样式**\n\n**描述**\n\nmenubar\n\n设计菜单栏本身。\n\
    \nleftcommand\n\n设计左命令（选项、选择以及用户定义的命令）。\n\n接受 `IconItem` 的所有属性。\n\nrightcommand\n\
    \n设计右命令（取消以及用户定义的 `Command.BACK` 或 `CANCEL`\n\n命令）。接受 `IconItem` 的所有属性。\n\n**表\
    \ 12-13.** *menubar 样式的额外属性* **属性**\n\n**必需？**\n\n**描述**\n\nmenubar-options-image\n\
    \n否\n\n定义扩展菜单栏“选项”图片的 URL。\n\nmenubar-select-image\n\n否\n\n定义扩展菜单栏“选择”图片的 URL。\n\
    \nmenubar-cancel-image\n\n否\n\n定义扩展菜单栏“取消”图片的 URL。\n\nmenubar-show-image-and-text\n\
    \n否\n\n确定当为相应操作定义了图片时，菜单栏中是否也显示文本。默认为 `false`。\n"
- fmt: "`Listing 12-35` demonstrates the design of the extended menu bar.\n\n**Listing\
    \ 12-35.** *Designing the Extended Menu Bar*\n\n```\nmenubar {\n    margin-top:\
    \ -10;\n    margin-bottom: 0;\n    margin-left: 2;\n    margin-right: 2;\n   \
    \ padding: 1;\n    background: none;\n    menubar-options-image: url( options.png\
    \ );\n    menubar-select-image: url( checked.png );\n    /*\n    menubar-show-image-and-text:\
    \ true;\n    menubar-cancel-image: url( cancel.png );\n    */\n}\n```\n\n![Image\
    \ 36](index-227_1.jpg)\n\n5033CH12.qxd 6/20/05 11:31 AM Page 205\n\nC H A P T\
    \ E R 1 2 ■ W O R K I N G W I T H T H E G U I **205**\n\n```\nleftcommand {\n\
    \    padding: 2;\n    padding-left: 4;\n    padding-right: 4;\n    padding-horizontal:\
    \ 4;\n    padding-bottom: 0;\n    font-color: fontColor;\n    font-style: bold;\n\
    \    background: none;\n}\n\nrightcommand {\n    padding: 2;\n    padding-left:\
    \ 4;\n    padding-right: 4;\n    padding-horizontal: 4;\n    padding-bottom: 0;\n\
    \    font-color: fontColor;\n    font-style: bold;\n    background {\n       \
    \ type: round-rect;\n        color: highlightedBgColor;\n        border-color:\
    \ fontColor;\n        border-width: 1;\n    }\n}\n```\n\nFigure 12-14 shows the\
    \ result of `Listing 12-35`. You can even use animations for the menu bar, the\
    \ left command, and the right command.\n\n**Figure 12-14.** *The extended menu\
    \ bar using images instead of the usual Option and Select commands*\n\n![Image\
    \ 37](index-228_1.jpg)\n\n5033CH12.qxd 6/20/05 11:31 AM Page 206\n\n**206**\n\n\
    C H A P T E R 1 2 ■ W O R K I N G W I T H T H E G U I Arranging Items on a Screen\n\
    \nUsually J2ME Polish arranges each GUI item on its own row, as shown in Figure\
    \ 12-15. You can change the arrangement of the items either by using the `view-type`\
    \ attribute or by using a tabular layout with the `columns` and `columns-width`\
    \ attributes.\n\nYou can apply view types to any screens that contain items, for\
    \ example, `Lists` or `Forms`.\n\nSeveral view types are available, which are\
    \ usually defined in a screen style, for example:\n\n```\n.mainScreen { view-type:\
    \ dropping; }\n```\n\nYou can use either a (predefined) name of the view type\
    \ or the fully qualified classname of that type, which needs to extend the `de.enough.polish.ui.ContainerView`\
    \ class. View types are responsible for the arrangement of items and can even\
    \ animate the items.\n\n**Figure 12-15.** *Unless told otherwise, J2ME Polish\
    \ arranges each item on its own row.*\n\n## Using Tables\n\nYou can use tables\
    \ for arranging all screen items neatly into cells by using the `columns` attribute\
    \ in the screen’s style. Table 12-14 explains the `columns` as well as `columns-width`\
    \ attributes in detail.\n\n**Table 12-14.** *Attributes for Table Arrangements*\n\
    \n| Attribute | Required? | Description |\n| --- | --- | --- |\n| `columns` |\
    \ No | The number of columns. This can be used to lay out the items in a table.\
    \ Defaults to one column. |\n| `columns-width` | No | Either `normal`, `equal`,\
    \ or the width for each column in a comma-separated list (for example, `columns-width:\
    \ 60,60,100;`). Defaults to `normal`, meaning that each column uses as much space\
    \ as the widest item of that column needs. The `equal` leads to columns that all\
    \ have the same width. The explicit list of column widths results in the usage\
    \ of those widths. |\n\n`Listing 12-36` shows you an example of how to apply these\
    \ attributes, and Figure 12-16 shows the result.\n\n![Image 38](index-229_1.jpg)\n\
    \n5033CH12.qxd 6/20/05 11:31 AM Page 207\n\nC H A P T E R 1 2 ■ W O R K I N G\
    \ W I T H T H E G U I **207**\n\n**Listing 12-36.** *Applying a Table Arrangement\
    \ to the Input Screen*\n\n```\n.inputScreen {\n    columns: 2;\n    columns-width:\
    \ 52,110;\n}\n```\n\n**Figure 12-16.** *Using a table arrangement with two columns*\n\
    \n> **Caution** You cannot use the `columns` attribute along with a view type.\
    \ When you use a view type, it is solely responsible for the arrangement of the\
    \ items.\n\nWhen you use explicit tables, you need to add labels and actual items\
    \ separately to a form. This complicates the programming a bit and makes it harder\
    \ to port existing applications to the J2ME Polish GUI. You can, therefore, alternatively\
    \ use the `min-width` and `max-width` attributes for setting the exact width of\
    \ labels and items. `Listing 12-37` shows how you can achieve the same design\
    \ as in Figure 12-16 by adjusting the label and the `.inputField` style (the latter\
    \ being used for the input fields shown in Figure 12-16)."
