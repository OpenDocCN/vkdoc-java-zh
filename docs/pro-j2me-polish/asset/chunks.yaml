    Knudsen (Apress, 2005)，以获取对 J2ME 开发的精彩介绍。


    **无线工具包**


    无线工具包 (WTK) 不仅提供了一个支持 Java 的手机的通用模拟器，还提供了一个预验证工具，你需要它来使 J2ME 应用程序准备好部署。


    从 *http://java.sun.com/* 下载后，安装过程很简单。*products/j2mewtoolkit*。只需将其安装到默认目录，你就可以开始了。


    **WTK 版本**


    有几个版本的 WTK 可用，特别是用于移动信息设备配置文件 (MIDP) 1.0 手机的旧版 1.0.4 版本和来自 2\. *x* 分支的最新版本。通常，你应该使用最新版本，但如果你愿意，也可以使用
    1.0.4 版本。主要区别在于，当你使用较旧的 WTK 时，你需要将代码编译为 Java 1.1，而当 WTK 2\. *x* 可用时，默认使用 Java
    1.2。理论上，这不应该有区别，但有时你可能会遇到似乎与重载问题相关的真正令人费解的错误。在这种情况下，javac 目标可能会产生影响，所以请记住，当你使用
    WTK 2\. *x* 时可以更改它，但使用 WTK 1.0.4 时则不能。


    **Mac OS X 的 WTK**


    标准 WTK 不适用于 Mac OS X，但你可以使用 mpowers LLC 在 *http://mpowers.net/midp-osx* 提供的移植版本。为此，你还需要安装
    X11，你可以从 *http://www.apple.com/macosx/x11* 获取。


    WTK 本身以磁盘映像的形式提供，当你双击它时会自动挂载。只需先将挂载的磁盘映像拖到桌面上，然后将其拖到 *Applications* 文件夹中即可安装。如果你没有管理员权限，你可以将磁盘映像移动到你的主文件夹中的
    *Applications* 文件夹（如有必要，请创建该文件夹）。


