    C H A P T E R 9 ■ T H E L O G G I N G F R A M E W O R K


    You can use the if and unless attributes of the <debug> element, along with the
    write-once ability of Ant properties, to activate and deactivate the logging framework
    without changing your *build.xml* script. In Listing 9-3, the logging framework
    is activated only when the Ant property ${test} is true. You can set this property
    to true by calling the test target first on the command line:


    ant test j2mepolish


    Even though the init target is called subsequently by the j2mepolish target, the
    ${test}


    property is not changed, since Ant properties can be set only once. When the test
    target is not called, the ${test} property is set to false in the init target.
    The test and init targets also set different values for the ${dir.work} property.
    This property is then used for setting the workDir attribute of the <build> element.


    ■**Tip** Use different working directories for builds with an activated logging
    framework, so that J2ME Polish does not need to preprocess and compile all files
    in each build.


    **Viewing the Log on Real Devices**


    You can view the log on real devices as well. The log contains all messages that
    have been added with the #debug directive. This is quite useful for tracking errors
    on real devices.


    Figure 9-1 shows the log with an activated verbose mode on a Nokia Series 60 phone.
    In each logging message, the current time in milliseconds is shown first, followed
    by the name of the class and the line in the source file in which the logging
    message has been issued. After this verbose information, the real logging message
    appears. Just scroll down to view further messages.


    **Figure 9-1.** *The log on a Nokia Series 60 phone*


    The log is shown automatically when you set the showLogOnError attribute of the
    <debug> element to true and when an exception has been added as the last parameter,
    as shown in Listing 9-4\. However, J2ME Polish can show the log automatically
    only when you use the J2ME


    Polish GUI.


