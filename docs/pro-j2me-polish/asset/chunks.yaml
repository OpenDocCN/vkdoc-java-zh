    \ with the `scrollindicator-color` attribute of the screen’s style. The color\
    \ defaults to black; see Figure 12-19 for an example.\n\n> **Tip:** If you want\
    \ to hide the scroll indicator for a specific screen, just set the color to the\
    \ color of the menu bar.\n\n### Setting a Foreground Image\n\nEach screen can\
    \ have a so-called foreground image that is painted on top of all other elements."
