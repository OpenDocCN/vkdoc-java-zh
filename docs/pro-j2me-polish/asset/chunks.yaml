    C H A P T E R 1 6 ■ O P T I M I Z I N G A P P L I C AT I O N S


    **349**


    **Handling Resources**


    Resources such as images or sound files often claim the largest part of your JAR
    file. In this section, you’ll discover how to tackle resources by including only
    appropriate resources, decreasing the size of the resources, reducing the number
    of resources, and removing resources completely.


    Using Appropriate Resources


    You can reduce the JAR file size by including appropriate resources only. Use
    the automatic resource assembling capabilities of J2ME Polish for this task.


    You can reduce the size of images by using appropriate color palettes. This can
    also improve the quality of the images on devices that support fewer colors than
    the original images, because the dithering algorithms behave differently on various
    devices. You can include different versions of your images for different phones;
    for example, include high-color images only for devices that support the appropriate
    color depth. Useful resource folders are *resources/BitsPerColor.12*, *resources/BitsPerColor.16+*,
    *resources/ScreenSize.128x128*, and *resources/ScreenSize.170+x200+*.


    You can also include resources based on several criteria, such as <fileset dir=


    "resources/sounds" includes="*.mid" if="polish.api.mmapi and polish.sound.midi"
    />.


    Please refer to the “Assembling Resources” section of Chapter 7 for a full discussion
    of the resource selection with J2ME Polish.


    Decreasing the Size of Resources


    Resources often contain information that is not needed for playing or displaying
    them, such as copyright notices or comments.


    You can optimize PNG images with the tools Pngcrush ( *http://pmt.sourceforge.net/*


    *pngcrush*), PNGOUT ( *http://advsys.net/ken/utils.htm#pngout*), and PNGGauntlet
    ( *http://*


    *numbera.com/software/pnggauntlet.aspx*). These tools remove redundant information
    and can reduce the image size by several percentage points.


    Redundant information can be also found in MIDI files. Some editors allow you
    to edit the stored headers. Also, some MIDI events, such as the switching of sound
    banks, are not supported by all J2ME devices, so you can remove those from the
    files.


    ■**Caution** Sometimes removing redundant data *increases* the JAR size, because
    the ZIP algorithm cannot compress the data as efficiently as it could before.
    Any increase will likely consist of only a couple of bytes, but when you are very
    close to your target size, you might need to pay attention to this effect.


    Reducing the Number of Resources


    You can reduce the number of resources by merging them into a single file. This
    can decrease the size effectively when the resources share common capabilities,
    for example, when several PNG files use similar color palettes. In such cases,
    you can create one large image that contains the previous images. Use the Graphics.setClip()
    mechanism to draw the images one by one in your application.


    5033CH16.qxd 6/17/05 12:17 PM Page 350


    **350**


    C H A P T E R 1 6 ■ O P T I M I Z I N G A P P L I C AT I O N S


    When you store several resources independently into one file, such that the header
    information is repeated for each resource, you will save some space in your JAR
    file. The ZIP


    algorithm can compress headers more efficient when they are repeated in one file,
    and each file that is stored in the JAR file requires one entry in the contents
    header of your JAR file; fewer entries result in a smaller file size.


    Removing Resources


    Sometimes it is feasible to remove some resources completely. You just leave the
    bare necessities in your JAR file and download the rest when it is needed. An
    example is to include the resources only for one level of a game, and then download
    the resources for further levels when the user has finished the first level.


    **Obfuscating and Packaging Your Application**


    Last but not least, you can save some space by using obfuscators and specialized
    packagers.


    Obfuscators shrink your classes by renaming them and removing unused code from
    your application. This is an easy way to save substantially. As an added benefit,
    your code will be harder to understand for any malicious or curious users interested
    in decompiling your application. As you learned in the “Obfuscating Applications”
    section of Chapter 7, you can deploy different obfuscators in J2ME Polish—or even
    several obfuscators at once. When your budget is tight, go for the free ProGuard
    obfuscator, but keep in mind that some commercial obfuscators/optimizers can produce
    even smaller JAR file sizes.'
