    **93**


    ■**Tip** Usually you do not need to specify where to find the sources, since J2ME
    Polish finds the source code automatically when it is situated in either the *source/src*
    or *src* folder.


    **Integrating Binary Third-Party APIs**


    When a third-party API is available only in binary form, you can integrate it
    with the <libraries> element of the <build> section in your *build.xml* script.
    This element can point to JAR or ZIP


    files or to a directory containing third-party libraries (either JAR files, ZIP
    files, or classfiles).


    When the libraries are situated in the *${polish.home}/import* folder, only the
    names of the libraries need to be given (instead of specifying the full path).


    In Listing 7-36, the binary library TinyLine is integrated ( *http://www.tinyline.com*).
    TinyLine provides specialized libraries for MIDP 2.0, Nokia Series 60, and Personal
    Profile J2ME


    devices, so you need make sure to include the correct library by using if or unless
    attributes.


    **Listing 7-36.** *Integrating the TinyLine Binary Third-Party Package*


    <j2mepolish>


    <info


    license="GPL"


    name="Roadrunner"


    vendorName="A reader."


    version="0.0.1"


    jarName="${polish.vendor}-${polish.name}-roadrunner.jar"


    />


    <deviceRequirements>


    <requirement name="Identifier" value="Nokia/Series60" />


    </deviceRequirements>


    <build


    >


    <midlet class="com.apress.roadrunner.Roadrunner" />


    **<libraries>**


    **<library file="thirdparty/tinylines60.zip"**


    **if="polish.group.Series60 and not polish.midp2" />**


    **<library file="thirdparty/tinylinemidp2.zip"**


    **if="polish.midp2" />**


    **<library file="thirdparty/tinyline.zip"**


    **if="polish.midp1 and not polish.group.Series60" />**


    **</libraries>**


    </build>


    <emulator />


    </j2mepolish>


