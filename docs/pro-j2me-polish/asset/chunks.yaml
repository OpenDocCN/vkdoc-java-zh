    **midp2 视图**


    midp2 视图按照 MIDP 2.0 标准推荐的方式排列物品：所有物品排成一行，直到空间不足或插入带有 `newline-after` 或 `newline-before`
    布局的物品为止。由于这通常会导致界面杂乱无章，J2ME Polish 通常将每个物品放在单独的行（或使用列时的单元格）中。然而，MIDP 2.0 的排列方式有一个重要优势：你可以在每个屏幕上看到更多内容。你可以通过指定
    `midp2` 视图类型来激活 midp2 视图。


    此视图不支持任何附加属性。图 12-19 展示了它在表单上的效果。


    **图 12-19.** *midp2 视图的实际效果*


    设计滚动指示器


    当屏幕上的物品数量超过可显示范围时，滚动指示器会显示在屏幕底部。你可以使用屏幕样式的 `scrollindicator-color` 属性设置指示器的颜色。颜色默认为黑色；示例见图
    12-19。


    ■**提示** 如果你想隐藏特定屏幕的滚动指示器，只需将颜色设置为菜单栏的颜色即可。


    设置前景图像


    每个屏幕都可以有一个所谓的前景图像，它会绘制在所有其他元素之上。

