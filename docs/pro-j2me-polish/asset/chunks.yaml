    \ Using Floating-Point Arithmetic\n\nJava offers the `float` and `double` primitives\
    \ and advanced mathematical functions in the `java.lang.Math` class. Unfortunately,\
    \ you can use floating-point calculations on CLDC 1.1 platforms only. Most J2ME\
    \ devices are still based on the CLDC 1.0 configuration, for which several solutions\
    \ exist: you can use integer calculations instead, use a floating-point emulation\
    \ library, or use the Floater program ( *http://www.enough.de/floater*) for converting\
    \ floating-point calculations automatically.\n\n### Using Integer Instead of Floating-Point\
    \ Calculations\n\nOften floating-point calculations are not really necessary.\
    \ In such cases you can emulate the floating-point calculations yourself with\
    \ `int` and `long` primitives.\n\nYou can use your own fixed-point calculation\
    \ just by multiplying every number with a fixed factor such as 100 or 1000. To\
    \ get the real value, you just need to divide the result by your chosen factor.\
    \ Consider, for example, the simple fraction calculation shown in Listing 15-13.\n\
    \nYou can use the `Mover` class to calculate the traveled distance of an object.\
    \ Each call of `moveForward()` will return the traveled distance. You can use\
    \ such a calculation in animations, for example.\n\n**Listing 15-13.** *A Simple\
    \ Floating-Point Calculation*\n\n```java\npublic class Mover {\n    private int\
    \ step;\n    private final int steps;\n    private final float distancePerStep;\n\
    \n    public Mover( int distance, int steps ) {\n        this.steps = steps;\n\
    \        this.distancePerStep = (float) distance / (float) steps;\n    }\n\n \
    \   public int moveForward() {\n        this.step++;\n        if ( step > this.steps\
    \ ) {\n            this.step = 0;\n        }\n        return (int) ( this.step\
    \ * this.distancePerStep );\n    }\n}\n```\n\nWhen you don’t need high precision,\
    \ you can use `int` variables instead of `float` ones. For higher precision, use\
    \ `long` variables instead of `double` ones. Listing 15-14 shows a `Mover` implementation\
    \ that simulates two decimal places by multiplying the `distancePerStep` variable\
    \ with 100.\n\n**Listing 15-14.** *A Solution That Uses Only Integers for a Simple\
    \ Floating-Point Calculation*\n\n```java\npublic class Mover {\n    private int\
    \ step;\n    private final int steps;\n    private final int distancePerStep;\n\
    \n    public Mover( int distance, int steps ) {\n        this.steps = steps;\n\
    \        this.distancePerStep = ( distance * 100 ) / steps;\n    }\n\n    public\
    \ int moveForward() {\n        this.step++;\n        if ( step > this.steps )\
    \ {\n            this.step = 0;\n        }\n        return ( this.step * this.distancePerStep\
    \ ) / 100;\n    }\n}\n```\n\n### Using Floating-Point Emulation Libraries\n\n\
    Floating-point emulation libraries allow you to realize complex calculations involving\
    \ trigonometrical functions and more. Popular libraries are MathFP for fast calculations\
    \ and the MicroFloat library for high-precision calculations. Table 15-5 lists\
    \ some available floating-point libraries for the CLDC 1.0 configuration.\n\n\
    **Table 15-5.** *Floating-Point Emulation Libraries*\n\n| Name | License | Home\
    \ Page |\n|------|---------|-----------|\n| MathFP | Liberal Source License |\
    \ *http://home.rochester.rr.com/ohommes/MathFP* |\n| MicroFloat | GPL | *http://www.dclausen.net/projects/microfloat*\
    \ |\n| JMFP | LGPL | *http://sourceforge.net/projects/jmfp* |\n| FPLib | Artistic\
    \ License | *http://bearlib.sourceforge.net* |\n\n#### MathFP\n\nThe MathFP library\
    \ by Onno Hommes offers fast calculations and is licensed under the Liberal Source\
    \ License. You can download it from *http://home.rochester.rr.com/ohommes/MathFP*.\n\
    \nYou can use the MathFP library either in the `long` mode for higher precision\
    \ (using the `net.jscience.math.MathFP` class) or in the less resource `int` mode\
    \ (using the `net.jscience.math.kvm.MathFP` class). Instead of using `float` or\
    \ `double` values, you need to convert Strings into the internal MathFP format\
    \ first. After the conversion you will get an internal integer representation\
    \ of your value. You can also convert an internal MathFP integer value back to\
    \ the corresponding `int` or `long` value without the fraction. Listing 15-15\
    \ shows you how to calculate the space of a circle with MathFP.\n\n**Listing 15-15.**\
    \ *Calculating the Space Occupied by a Circle with MathFP*\n\n```java\npublic\
    \ int calculateCircleSpace( String radiusStr ) {\n    int radius = MathFP.toFP(\
    \ radiusStr );\n    int exponent = MathFP.toFP( 2 );\n    int result = MathFP.mul(\
    \ MathFP.PI,\n        MathFP.pow( radius, exponent ) );\n    return MathFP.toInt(\
    \ result );\n}\n```\n\n#### MicroFloat\n\nThe MicroFloat library by Dave Clausen\
    \ is known for its high precision. Calculations with MicroFloat yield the results\
    \ similar to native Java floating-point calculations, since MicroFloat follows\
    \ the international IEEE 754 standard ( *http://grouper.ieee.org/groups/754*).\
    \ You can download MicroFloat at *http://www.dclausen.net/projects/microfloat*.\n\
    \nThe usage of MicroFloat is similar to MathFP. You can use either the `net.dclausen.microfloat.MicroFloat`\
    \ class for emulating `float` or the `net.dclausen.microfloat.MicroDouble` class\
