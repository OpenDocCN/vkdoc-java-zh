    **图 12-1.** *通过使用 build.xml 控制流程、使用源代码处理业务逻辑、以及使用 polish.css 文件设计应用程序，来创建“经过打磨的”应用程序*


    **控制 GUI**


    你可以通过 *build.xml* 文件来控制 J2ME Polish GUI。你还可以针对特定设备有选择地激活 J2ME Polish GUI，并使用多个预处理变量来改变
    GUI 的行为。


    **激活 GUI**


    通过将 *build.xml* 文件中 `<build>` 元素的 `usePolishGui` 属性设置为 `true` 来激活 GUI。然后，J2ME
    Polish 会自动将必要的代码编织到应用程序中。


    `usePolishGui` 属性接受值 `yes/true`、`no/false` 和 `always`。当设置为 `true` 或 `yes` 时，将使用该
    GUI，除非目标设备不具备推荐的能力（即最大 JAR 大小大于 100KB 且每个颜色的色深至少为 8 位）。对于此类设备，将改用普通的 MIDP GUI。当该属性设置为
    `always` 时，J2ME Polish GUI 将用于所有目标设备，即使它们不具备推荐的能力。


    清单 12-1 为大多数设备激活了 GUI。


    **清单 12-1.** *在 build.xml 文件中为大多数设备激活 GUI*


    <j2mepolish>


    <info


    license="GPL"


    name="Roadrunner"


    vendorName="A reader."


    version="0.0.1"


    jarName="${polish.vendor}-${polish.name}-roadrunner.jar"


    />


    <deviceRequirements>


