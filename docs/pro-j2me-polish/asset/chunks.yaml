    **Using Dynamic and Predefined Styles**


    When you use dynamic styles, you do not even have to set the #style directives.
    In this case, the designs depend on the classes. All Forms can be designed with
    the form style, for example.


    Using dynamic styles can be a fast way to check out the GUI for existing applications,
    but this requires additional memory and runtime. You should, therefore, use normal
    “static” styles for the final application.


    Some elements use predefined styles by default. The title style is responsible
    for the appearance of Screen titles, for example.


    Please refer to the explanation in the following “Designing the GUI” section for
    more information about static, dynamic, and predefined styles.


    **Porting MIDP 2.0 Applications to MIDP 1.0 Platforms**


    When you use the J2ME Polish GUI, you can use MIDP 2.0 widgets like a POPUP ChoiceGroup
    or a CustomItem on MIDP 1.0 devices as well without any restrictions.


    Source code adjustments are necessary only when MIDP 2.0–only features are used,
    which are outside the scope of the J2ME Polish GUI, for example, Display.flashBacklight
    ( int ).


    The MIDP 2.0 call Display.setCurrentItem( Item ) is supported by the J2ME Polish
    GUI for both MIDP 2.0 as well as MIDP 1.0 devices.


    When a specific call is not supported by a target device, the build process will
    be aborted with a compile error. Usually that error then needs to be surrounded
    by an appropriate #if preprocessing directive, as shown in Listing 12-11.


    **Listing 12-11.** *Circumventing MIDP 2.0–Only Calls with Preprocessing*


    //#ifdef polish.midp2


    this.display.flashBacklight( 1000 );


    //#endif


    Please refer to the section “Writing Your Own Custom Items” in Chapter 13 for
    more information on designing custom items with CSS.


