- fmt: "# Using the `polish.Bugs.[name]` Symbols\n\nUsing the `polish.Bugs.[name]`\
    \ symbols allows you to abstract your code from specific devices so that you can\
    \ later use the same workarounds for any device that has the corresponding issue.\
    \ You can add issues in the device database by setting the `Bugs` capability in\
    \ `devices.xml`, `custom-devices.xml`, `groups.xml`, and so on: `<capability name=\"\
    Bugs\" value=\"issueName1, issueName2\" />`.\n\nListing 15-8 shows how to check\
    \ if this issue is present on the current target device. When this is the case\
    \ and the Nokia UI API is available, you extend the `FullCanvas` class instead\
    \ of the normal `Canvas` class. In this case, you use the `polish.classes.fullscreen`\
    \ preprocessing variable, which contains the value `com.nokia.mid.ui.FullCanvas`\
    \ for devices that support the Nokia UI API. This is a bit more flexible compared\
    \ to extending the `FullCanvas` directly. You do not call `setFullScreenMode()`\
    \ when this bug is present or when the MIDP 2.0 profile is not supported by the\
    \ target device.\n\n**Listing 15-8.** *Using the FullCanvas When the needsNokiaUiForSystemAlerts\
    \ Bug Is Present*\n\n```\npackage com.apress.preprocessing;\n\nimport javax.microedition.lcdui.*;\n\
    \npublic class Splash\n\n//#if polish.midp2 && !polish.Bugs.needsNokiaUiForSystemAlerts\n\
    extends Canvas\n\n//#elif polish.classes.fullscreen:defined\n\n//#= extends ${polish.classes.fullscreen}\n\
    \n//#else\n\n// hide extends clause from the IDE:\n\n//# extends Canvas\n\n//#endif\n\
    \n{\n    public void paint( Graphics g ) {\n\n        //#if polish.midp2 && !polish.Bugs.needsNokiaUiForSystemAlerts\n\
    \        setFullScreenMode( true );\n        //#endif\n\n        g.drawString(\
    \ \"Starting!\", getWidth() / 2, getHeight() / 2, Graphics.HCENTER | Graphics.BASELINE\
    \ );\n    }\n}\n```\n\nThe `Graphics.drawRGB()` implementation is problematic\
    \ on many MIDP 2.0 devices, such as Nokia Series 60 and Sony Ericsson K700. You\
    \ can use the `drawRGB()` method for painting integer arrays that contain pixel\
    \ information in the RGB format. A cool thing about this method is that you can\
    \ use translucent data as well so your background shines through. On the K700\
    \ device, the `drawRGB()` implementation does not take the translation origin\
    \ into account—instead, the `(0, 0)` origin is always used. So, when you translate\
    \ the origin of `Graphics` by calling `Graphics.translate( x, y )`, the drawn\
    \ RGB data will be misaligned when this bug is present. A possible solution is\
    \ not to use `translate()` at all, but on some devices this is called anyway by\
    \ the native implementation, for example, when the title is painted. When you\
    \ use a bit of preprocessing, you are on the safe side. Listing 15-9 shows how\
    \ to circumvent this bug by adjusting the `x` and `y` values before calling `drawRGB()`.\n\
    \n**Listing 15-9.** *Circumventing the drawRgbOrigin Issue*\n\n```\npublic void\
    \ paintArgbColor( int argbColor, int x, int y,\n                            int\
    \ width, int height, Graphics g )\n{\n    // circumvent the drawRgbOrigin issue\
    \ when it is present:\n    //#ifdef polish.Bugs.drawRgbOrigin\n    x += g.getTranslateX();\n\
    \    y += g.getTranslateY();\n    //#endif\n\n    // in reality you need to buffer\
    \ this:\n    int[] rgbBuffer = new int[ width ];\n    for ( int i = rgbBuffer.length\
    \ - 1; i >= 0 ; i-- ) {\n        rgbBuffer[ i ] = argbColor;\n    }\n\n    //\
    \ defensive programming: some implementations\n    // don't accept negative coordinates:\n\
    \    if ( x < 0 ) {\n        width += x;\n        if ( width < 0 ) {\n       \
    \     return;\n        }\n        x = 0;\n    }\n    if ( y < 0 ) {\n        height\
    \ += y;\n        if ( height < 0 ) {\n            return;\n        }\n       \
    \ y = 0;\n    }\n\n    // now paint the RGB data:\n    g.drawRGB( rgbBuffer, 0,\
    \ 0, x, y, width, height, true );\n}\n```\n\nUsing preprocessing is sometimes\
    \ tedious work for circumventing bugs, but often there is no alternative. All\
    \ J2ME Polish libraries use preprocessing for adapting themselves to the target\
    \ devices, so you can just use the libraries without needing to be too concerned\
    \ about device issues. You should, however, build your application to specific\
    \ target devices when these have known issues. J2ME Polish has no chance to circumvent\
    \ device-specific bugs when you use generic target devices such as `\"Generic/midp2\"\
    `.\n\n## Manipulating Bytecode\n\nAnother option for circumventing bugs is to\
    \ alter the application on the bytecode level. This approach has several advantages\
    \ because the programmer does not need to circumvent issues herself during the\
    \ application development phase. Also, certain aspects of programs can be tracked\
    \ on the bytecode level easier than on the source code level, such as the usage\
    \ of floating-point calculations. A third advantage is that you can circumvent\
    \ a new known issue in an existing application just by rebuilding it. The disadvantage\
    \ is, of course, the complexity of bytecode manipulations. If you are up to the\
    \ task, you can create a postcompiler that extends the `de.enough.polish.postcompile.PostCompiler`\
    \ class. You can integrate it into the processing chain using the `<postcompiler>`\
    \ element in the `build.xml` file. Postcompilers are invoked after the compilation\
    \ phase and can change a lot of things. An example includes the Floater tool of\
    \ Enough Software, which allows you to implement floating-point calculations using\
    \ the primitive types `float` and `double` on CLDC 1.0 devices. Please refer to\
    \ the \"Using a Postcompiler\" section in Chapter 13 for more details about this\
    \ option.\n\n> **Tip** For manipulating bytecode, refer to the ASM (http://asm.objectweb.org)\
    \ and BCEL (http://jakarta.apache.org/bcel) libraries.\n\n## Implementing the\
    \ User Interface\n\nThe user interface is often the most problematic area when\
    \ you target different devices. For implementing the user interface in MIDP devices,\
    \ you can choose between the so-called high-level GUI, which offers `Forms`, `Lists`,\
    \ and so forth, and the low-level GUI, which allows you to paint your own widgets.\n\
    \nA common source for errors is the event handling. You must never block the event\
    \ handling thread, for example, in the `commandAction()` method of a `CommandListener`\
    \ or in the `keyPressed()` method of a `Canvas`. When you have a long-running\
    \ calculation, a network connection, and so on, you need to do this in a separate\
    \ `Thread`.\n\n### Using the High-Level GUI\n\nUsing the high-level GUI has several\
    \ advantages:\n\n- Your application is smaller, since you do not need so much\
    \ code for creating the user interface.\n- Your application can be ported easier,\
    \ because many low-level GUI implementations contain issues.\n- Development is\
    \ easier, because the low-level GUI is quite complex.\n\nThe main disadvantage\
    \ is that the look and feel of your application depends on the vendor's implementation.\
    \ Some implementations have a pleasant appearance, but others provide a somewhat\
    \ awkward-looking user interface. The MIDP 2.0 profile offers some great new features,\
    \ such as the `CustomItem`, the ability to focus items by calling `Display.setCurrentItem()`,\
    \ and pop-up `ChoiceGroups`.\n\nWith the J2ME Polish GUI, you can use the high-level\
    \ GUI in your application code and take full control at the same time by specifying\
    \ designs outside the application code with CSS text files. The J2ME Polish GUI\
    \ also supports the new MIDP 2.0 high-level GUI features on MIDP 1.0 devices.\
    \ The J2ME Polish GUI internally uses preprocessing for adapting itself to various\
    \ handsets. You can activate and deactivate the usage of the J2ME Polish GUI depending\
    \ on conditions. Please refer to Chapter 12 for a detailed discussion of the possibilities."
