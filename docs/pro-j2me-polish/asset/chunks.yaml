- fmt: "# Working with the J2ME Polish GUI\n\nUnfortunately, you have almost no chance\
    \ to influence the presentation of this GUI. For MIDP 1.0 phones, the design cannot\
    \ be changed at all, while MIDP 2.0 provides some hooks for changing the design;\
    \ sadly, however, the implementations between the two versions differ a lot. So,\
    \ traditionally, you would have needed to use the low-level GUI API for creating\
    \ a good-looking user interface. Unfortunately, the implementation of the low-level\
    \ API provides many surprises, so much manual porting is necessary when you want\
    \ the interface to run on all or most J2ME devices.\n\nIn this chapter, you will\
    \ learn how you can use the J2ME Polish GUI for your application.\n\nThis GUI\
    \ is compatible with the standard high-level GUI API but allows you to design\
    \ every detail of your interface. So, the easy programming of the GUI remains,\
    \ but all restrictions are blasted away!\n\n> **Caution**: A word of warning:\
    \ the GUI of J2ME Polish is powerful. Very powerful. You can let items fly around,\
    \ use pulsating backgrounds, and more. Be advised, however, that not everything\
    \ that’s technically cool is also well suited for your user interface. A game\
    \ can certainly use more funky stuff than banking software, but always keep the\
    \ usability of your application in mind.\n\n## Introducing Interface Concepts\n\
    \nThe J2ME Polish GUI provides a powerful and efficient way to design the user\
    \ interface of wireless Java applications. In fact, the J2ME Polish GUI has several\
    \ unique features:\n\n- **Time to market**: The J2ME Polish GUI is compatible\
    \ with the standard MIDP GUI, so you don’t need to learn a new API and can turn\
    \ on and off the J2ME Polish GUI selectively.\n- **Automatic porting**: J2ME Polish\
    \ weaves the necessary code “automagically” into your application so you don’t\
    \ need to modify your source code. The GUI circumvents known issues of your target\
    \ devices automatically.\n- **Innovative designs**: The GUI is designed using\
    \ simple text files that reside outside the actual application source code. An\
    \ extended version of the web standard CSS is used for the design, so web designers\
    \ can now work on the design of J2ME applications without the help of programmers\
    \ while the programmers concentrate on the business logic.\n- **Customizable**:\
    \ Another important advantage is that you can create extremely different designs\
    \ for the same application code just by exchanging the `polish.css` file and other\
    \ resources. This means you can adjust all designs easily to different devices,\
    \ vendors, device groups, or even locales without changing the source code. Refer\
    \ to the `resources/polish.css` file of one of the sample applications for an\
    \ example.\n- **Flexible**: You control the user interface with the `build.xml`\
    \ file and `#style` preprocessing directives.\n- **Extensible**: All elements\
    \ of the MIDP 2.0 GUI are supported—even on MIDP 1.0 devices. So, you can use\
    \ MIDP 2.0–specific items such as a POPUP ChoiceGroup or a CustomItem on MIDP\
    \ 1.0 phones as well. When you extend the J2ME Polish GUI with CustomItems, you\
    \ will find the same environment on every target device, even when the native\
    \ implementation lacks important features like internal traversal.\n\nThe drawback\
    \ of the J2ME Polish GUI is the increased size of the application package. You\
    \ should calculate up to 30KB of additional space for the GUI, depending on what\
    \ GUI elements and what designs you use. Modern devices such as Symbian-based\
    \ devices (refer to Chapter 15) support application sizes up to several megabytes,\
    \ so the additional size is most often no problem. The situation is, however,\
    \ different on some older devices, such as Nokia’s aged MIDP 1.0–based Series\
    \ 40 models, which accept only applications with a size of up to 64KB. For such\
    \ devices, the GUI is by default not used even when it is activated.\n\nFigure\
    \ 12-1 shows how you would use the J2ME Polish GUI for creating a “polished” application.\
    \ For a complete and simple example that uses the `build.xml` and `polish.css`\
    \ files, please refer to the “Creating a ‘Hello, J2ME Polish World’ Application”\
    \ section of Chapter 7.\n\n**Figure 12-1.** *Creating a “polished” application\
    \ by using `build.xml` for controlling the process, using the source code for\
    \ the business logic, and using the `polish.css` file for the design of your application*\n\
    \n## Controlling the GUI\n\nYou control the J2ME Polish GUI with the `build.xml`\
    \ file. You can also activate the J2ME Polish GUI selectively for specific devices\
    \ and use several preprocessing variables for changing the behavior of the GUI.\n\
    \n### Activating the GUI\n\nActivate the GUI by setting the `usePolishGui` attribute\
    \ of the `<build>` element in the `build.xml` file to `true`. J2ME Polish will\
    \ then weave the necessary code automatically into the application.\n\nThe `usePolishGui`\
    \ attribute accepts the values `yes/true`, `no/false`, and `always`. When `true`\
    \ or `yes` is given, the GUI will be used, unless a target device does not have\
    \ the recommended capabilities (that is, a maximum JAR size greater than 100KB\
    \ and a color depth of at least 8 bits per color). For such devices, the normal\
    \ MIDP GUI is then used instead. When the attribute is set to `always`, the J2ME\
    \ Polish GUI will be used for all target devices, even when they do not have the\
    \ recommended capabilities.\n\nListing 12-1 activates the GUI for most devices.\n\
    \n**Listing 12-1.** *Activating the GUI for Most Devices in the `build.xml` File*\n\
    \n```\n<j2mepolish>\n  <info\n    license=\"GPL\"\n    name=\"Roadrunner\"\n \
    \   vendorName=\"A reader.\"\n    version=\"0.0.1\"\n    jarName=\"${polish.vendor}-${polish.name}-roadrunner.jar\"\
    \n  />\n  <deviceRequirements>\n    <requirement name=\"Identifier\" value=\"\
    Generic/midp1\" />\n  </deviceRequirements>\n  <build\n    usePolishGui=\"true\"\
    \n  >\n    <midlet class=\"com.apress.roadrunner.Roadrunner\" />\n  </build>\n\
    \  <emulator />\n</j2mepolish>\n```\n\nAlternatively, you can enable the J2ME\
    \ Polish GUI by defining the preprocessing variable `polish.usePolishGui`. This\
    \ is useful when you want to activate the GUI for selected devices only. Listing\
    \ 12-2 activates the GUI for Series 60 devices only.\n\n**Listing 12-2.** *Activating\
    \ the GUI for Series 60 Phones Only*\n\n```\n<j2mepolish>\n  <info\n    license=\"\
    GPL\"\n    name=\"Roadrunner\"\n    vendorName=\"A reader.\"\n    version=\"0.0.1\"\
    \n    jarName=\"${polish.vendor}-${polish.name}-roadrunner.jar\"\n  />\n  <deviceRequirements>\n\
    \    <requirement name=\"Identifier\" value=\"Generic/midp1\" />\n  </deviceRequirements>\n\
    \  <build\n    usePolishGui=\"false\"\n  >\n    <midlet class=\"com.apress.roadrunner.Roadrunner\"\
    \ />\n    <variables>\n      <!-- activate the GUI for Series 60 devices -->\n\
    \      <variable\n        name=\"polish.usePolishGui\"\n        value=\"true\"\
    \n        if=\"polish.group.Series60\" />\n    </variables>\n  </build>\n  <emulator\
    \ />\n</j2mepolish>\n```\n\n### Configuring the J2ME Polish GUI\n\nYou can configure\
    \ the behavior of the GUI by modifying the `build.xml` file.\n\n#### Using the\
    \ GUI in Full-Screen Mode\n\nThe J2ME Polish GUI can use the complete screen on\
    \ MIDP 2.0 devices as well as on MIDP 1.0 devices that provide proprietary methods\
    \ for using a full-screen mode.\n\nYou can activate the full-screen mode with\
    \ the `fullscreen` attribute of the `<build>` element, as shown in Listing 12-3.\
    \ The attribute can have the values `yes/true`, `no/false`, or `menu`. When the\
    \ application uses commands, you must use the `menu` mode. In that case, the menu\
    \ bar will be rendered by J2ME Polish, and the menu can be designed with CSS (for\
    \ example, by setting the `menubar-color` attribute or using the `menu` style)."
