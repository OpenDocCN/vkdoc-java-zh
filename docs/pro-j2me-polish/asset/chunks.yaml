    Designing Lists


    Lists contain several items that can be selected. Each list item can contain a
    text string and an image. You can use an implicit list for your main menu. Exclusive
    lists allow you to select only one element, whereas multiple lists allow you to
    select several items.


    An interesting option for lists is to show only the image of the embedded items
    and to use the text of the currently focused item for the title. Listing 12-41
    and Figure 12-21 demonstrate this option. In this case, a background image is
    used for the list, and the actual title is moved downward by setting the appropriate
    margins. You can set the image for list items with the icon-image attribute.


