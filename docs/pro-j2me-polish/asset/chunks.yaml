    **The BitMapFont Class**


    The J2ME standard isn’t really overwhelming when it comes to font support. It
    provides for only the following:


    • Three different font faces (proportional, monospace, and system), but often
    the system and the proportional fonts are the same.


    • Three different sizes (small, medium, and large), with the actual size depending
    on the implementation. You can check the size with the polish.Font.small, polish.Font.medium,
    and polish.Font.large preprocessing variables.


    • Font styles of bold, italic, underlined, and plain.


    Fonts are very much implementation-specific, so you cannot expect them to look
    alike on different platforms. Some vendors, such as Motorola, provide only one
    font type in one size.


    Especially in games, you often need somewhat cooler fonts, and that’s why J2ME
    Polish provides the de.enough.polish.util.BitMapFont class.


    You can use any True Type font in your application with the BitMapFont class.
    Or, to be more precise, you can convert any True Type font into a bitmap font
    with the stand-alone Font Editor and use that bitmap font in your application.
    The Font Editor, located in the *${polish.home}/bin* folder, is described in detail
    later in this chapter.


    If you want to display messages, you need to request a BitMapFontViewer from your
    BitMapFont. The viewer class manages particular text, whereas the bitmap font
    just holds the basic font information and glyphs. By splitting this functionality
    in two different classes, you can view text with custom fonts very efficiently.


