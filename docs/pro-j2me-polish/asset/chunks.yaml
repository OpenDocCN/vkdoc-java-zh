    **Using Locale-Specific Resources**


    Another possible hook for using different resources in your application is the
    localization. You can differentiate between English and Spanish resources by putting
    the Spanish resources into the *resources/es* folder, for example. The section
    “Building Localized Applications” of this chapter elaborates this point further.


    **Selecting and Loading Resources**


    All resources will be copied to the root of the application, and more specific
    resources will overwrite the common resources: if you have a picture named *background.png*
    in the *resources* folder as well as in the *resources/Nokia* and *resources/Nokia/6600*
    folders, the version in the *resources* folder will be used for all non-Nokia
    devices, and the version contained in the *resources/Nokia* folder will be used
    for all Nokia devices. However, the image *resources/Nokia/*


    *6600/background.png* will be used for the application that is built for the Nokia
    6600 phone. In the application code, you can load the Image.createImage( "/background.png"
    ) image from the root, no matter where the resource was copied from.


    Because of this assembling mechanism, no subfolders can be used within an application.


    This means the application cannot load resources from a subfolder but only from
    the root, */*, of the application. This is not a bug but a feature, since subfolders
    only add overhead to an application.


    So, instead of calling this:


    InputStream is = getClass().getResourceAsStream( "/levels/level.map" ); you need
    to use the following code:


    InputStream is = getClass().getResourceAsStream( "/level.map" ); Subdirectories
    in the *resources* folder are merely used to distinguish different devices, device
    groups, and locales.


    Fine-Tuning the Resource Assembling


    Sometimes it is necessary to adjust the automatic resource assembling. You can
    do so by using nested <fileset> elements in your *build.xml* script.


    Imagine that your application uses AMR sound files when the device supports AMR
    and uses MIDI sound files when the device supports MIDI. In the source code, you
    can use the preprocessing symbols polish.audio.amr and polish.audio.midi to distinguish
    between these


    5033CH07.qxd 6/17/05 11:50 AM Page 73


    C H A P T E R 7 ■ B U I L D I N G A P P L I C AT I O N S


    **73**


    **Listing 7-14.** *Distinguishing Between Several Audio Formats*


    //#ifdef polish.audio.amr


    // play the amr sound


    //#elifdef polish.audio.midi


    // play midi sound instead


    //#endif


    The situation is different in the resource assembling step, though. Obviously,
    you can put all AMR files in the *resources/amr* folder and all MIDI files into
    the *resources/midi* folder so these resources are available when they are needed.
    But for devices that support both AMR


    and MIDI sounds, the application will contain the MIDI files as well, even though
    only the AMR files are actually needed. This is a waste of space and can be prevented
    by fine-tuning the resource assembling with nested <fileset> elements, as outlined
    in Listing 7-15.


    **Listing 7-15.** *Fine-Tuning the Resource Assembling with <fileset>*


    <resources


    dir="resources"


    excludes="readme*, *.definition"


    >


    **<fileset**


    dir="resources/multimedia"


    includes="*.amr"


    if="polish.audio.amr"


    />


    **<fileset**


    dir="resources/multimedia"


    includes="*.mid"


    if="polish.audio.midi and not polish.audio.amr"


    />


    </resources>


    In the previous example, MIDI files are included only when two conditions are
    met:


    • The device supports MIDI sound (so the polish.audio.midi symbol will be defined).


    • The device does not support AMR sound (so the polish.audio.amr symbol will not
    be defined).


    In this way, an application contains either AMR files or MIDI files or no sound
    files at all so your application does not contain any redundant resources anymore.


    ■**Note** You might have noticed the usage of and as well as not in the if attribute.
    This is done because you would need to XML encode the normally used && operator
    otherwise. You can use this notation in every place where complex terms are allowed,
    for example, in #if preprocessing terms.


