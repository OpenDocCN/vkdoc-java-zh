    **this.textField.setString( Locale.get( 1, parameters ) );** Translations that
    contain no or one parameter are directly embedded into the source code, so there
    is no performance or size impact compared to a nonlocalized application at all
    for these kinds of translations. Only when a translation has more than one parameter
    is a call to the Locale class actually made. To improve the performance, the former
    String key, messages.Introduction, is transformed to a simple integer by J2ME
    Polish, thus saving valuable bytes as well as ensuring a fast retrieval of the
    resource in question.


