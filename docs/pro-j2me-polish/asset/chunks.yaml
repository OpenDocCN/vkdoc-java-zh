    available = 4 * 1024; // 4 kb


    }


    buffer = new byte[ available ];


    ByteArrayOutputStream out = new ByteArrayOutputStream( available ); int read;


    try {


    while ( (read = in.read( buffer ) ) != -1 ) {


    out.write( buffer, 0, read );


    }


    } finally {


    in.close();


    }


    return out.toByteArray();


    }


