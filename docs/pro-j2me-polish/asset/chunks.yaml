    **本章小结**


    在本章中，你了解了 J2ME Polish 的游戏引擎，以及它如何帮助你移植游戏到 MIDP 1.0 平台。当你使用 MIDP 2.0 平台的底层图形、声音播放和设备控制功能时，需要包含一些手动调整，但除此之外，J2ME
    Polish 会为你处理一切。你可以通过指定各种预处理变量来根据需求调整游戏引擎。


    在下一章中，你将学习如何使用 J2ME Polish 增强的 GUI。该 GUI 允许你在 MIDP 1.0 设备上使用 MIDP 2.0 高级 UI。它还能帮助你专业且出色地设计你的应用程序。


