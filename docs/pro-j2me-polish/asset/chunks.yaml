    how to use the <manifestFilter> element, which sorts and filters the attributes
    of the Manifest.


    **Listing 7-17.** *Filtering JAD and Manifest Attributes*


    <j2mepolish>


    <info


    license="GPL"


    name="Roadrunner"


    vendorName="A reader."


