    **使用后编译器**


    后编译器在源代码成功编译后被调用。您可以使用它来修改应用程序的字节码，这是一项乐趣无穷的工作——当然，前提是您恰好喜欢这种幽默。


    有多个字节码修改库可用，其中最著名的是 BCEL (http://jakarta.apache.org/bcel) 和 ASM (http://asm.objectweb.org)。当您熟悉字节码层面后，可以获得一些惊人的好处。例如，Enough
    Software 的 Floater 工具就使用这种机制，允许在 CLDC 1.0 设备上进行浮点运算。


    您可以通过扩展 `de.enough.polish.postcompile.PostCompiler` 类并实现 `postcompile( File classesDir,
    Device device )` 方法来集成您的后编译器。在您的 *build.xml* 脚本中，使用 `<build>` 元素内的 `<postcompiler>`
    元素集成您的后编译器。您可以通过使用 `postcompiler` 类型，在 `${polish.home}/custom-extensions.xml`
    中注册您的后编译器。


    使用 `antcall` 后编译器调用 *build.xml* 脚本中的任意 Ant 目标：`<postcompiler name="antcall" target="mytarget"
    />`。除了常用的 J2ME Polish 属性外，您还可以使用 `polish.postcompile.dir` 属性，该属性指向包含已编译类文件的目录。


    **集成您自己的混淆器**


    您可以通过扩展 `de.enough.polish.obfuscate.Obfuscator` 类并实现 `obfuscate( Device device,
    File sourceFile, File targetFile, String[] preserve, Path bootClassPath )` 方法，轻松集成您自己的或不受支持的第三方混淆器。使用
    `<obfuscator>` 元素集成您的混淆器，并在 *custom-extensions.xml* 文件中使用 `obfuscator` 类型进行注册。


    大多数混淆器也提供它们自己的 Ant 任务。有时，使用这些专门的任务可以改善混淆效果，因为它们可能提供比 J2ME Polish 更详细的设置。您可以通过使用
    `antcall` 混淆器调用任意 Ant 目标：`<obfuscator name="antcall" target="myobfuscator" />`。`antcall`
    混淆器提供了表 13-3 中列出的额外属性，您可以在您的 Ant 目标中使用这些属性。由于您提供的是自己的 Ant 目标，您可能不需要 `keep` 属性，而是直接使用
    MIDlet 所需的类名。请参考清单 13-7，它调用了 yGuard 混淆器作为一个 Ant 目标。


