    Using J2ME Polish


    **J2ME Polish is a collection of tools for the development of wireless Java applications.In**
    **this part, you will learn how to use and tweak the different tools, such as
    the build framework, the GUI, and the stand-alone tools.**


    5033CH05.qxd 6/17/05 11:47 AM Page 28


