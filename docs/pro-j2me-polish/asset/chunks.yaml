    ## 探索 J2ME Polish 论坛


    存在英语和德语论坛用于讨论与 J2ME Polish 相关的问题。你也可以加入 J2ME Polish 用户邮件列表。在`http://www.j2mepolish.org`上，选择“讨论”以访问论坛。或者通过加入`irc://irc.synyx.de#j2mepolish`互联网中继聊天，直接与其他
    J2ME Polish 用户取得联系。


    ## 探索厂商论坛


    许多厂商也提供用于讨论其 J2ME 设备的论坛。表 15-6 总结了最重要的厂商特定论坛。


