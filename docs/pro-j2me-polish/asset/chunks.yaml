  trans: '

    ■**注意** J2ME Polish 从 1.3 版本开始将支持构建 DoJa 应用程序。你可以在同一项目中，通过预处理或使用不同的源代码文件夹（在 *build.xml*
    中使用 <source> 元素）来分别针对 DoJa 和 MIDP 平台。


    **WIPI 平台**


    无线互联网互操作平台（WIPI，*http://wipi.or.kr/English*）是韩国移动 Java 应用的标准。此前 BREW 标准在韩国占据主导地位，但现在所有运营商都已采用
    WIPI 1.2 标准，而 WIPI 2.0 也即将推出。


    Java 应用无需预先验证，因为字节码会先被转码为 C 源代码，随后在 WIPI 平台上编译为本机二进制代码。


    除此之外，其部署方式与 MIDP 标准兼容：JAR 文件包含资源和类，JAD 文件包含描述信息。


    WIPI 1.2 应用基于 CLDC 1.0，并具有与 MIDP 1.0 配置文件相似的功能集。


    WIPI 2.0 则完全兼容 CLDC 1.1 和 MIDP 2.0 标准。


    ■**注意** 从 J2ME Polish 1.3 版本开始，你可以为 WIPI 平台构建应用程序。


    **编写可移植代码**


    编写可移植代码是创建无线 Java 应用的主要挑战之一。但编写可移植代码是一件好事，因为你希望支持尽可能多的设备以实现最大收益。基本上，有四种策略可用于编写可移植代码：


    5033CH15.qxd 6/20/05 9:20 AM 第 295 页


    第 15 章 ■ 在设备限制间游刃有余


    **295**


    • 使用最低公共标准。


    • 使用在运行时自我调整的动态代码。


    • 根据目标设备使用不同的源文件。


    • 使用预处理。


    在接下来的章节中，我将讨论每种方法的优点和注意事项。J2ME Polish GUI 使用预处理来适应不同的环境。


    **使用最低公共标准**


    使用最低公共标准使事情变得非常简单；你只需坚持使用 MIDP 1.0 配置文件和 CLDC 1.0 配置文件即可。不幸的是，这并非全部真相。


    除了需要专业的用户界面和有限的功能之外，你仍然需要以某种方式规避设备缺陷。但由于你只处理可用可能性中的一小部分，或许能侥幸成功。


    类似的策略是只针对 MIDP 2.0 设备，这正变得越来越可行，尽管支持 MIDP 1.0 的新设备仍在投放市场。


    然而，MIDP 2.0 技术尚不成熟，因此在不同的现有设备上表现差异很大且难以预料。设备问题不可避免。


    使用公共标准的优势在于你只有一个应用包，因此部署应用要容易得多。但这种策略并不能减轻你的测试负担，因为你仍然需要在每个目标设备上测试你的应用。当你声称你的应用能在某款特定手机上运行，而实际上却不能时，商业关系可能会受到严重损害。


    ■**警告** 使用最低公共标准是一种有效的方法，但你也应考虑此决策的商业方面。用户可能会对“老旧”或“差劲”的应用感到失望，从而下次选择其他供应商。此外，除非你提出了革命性的新概念，否则你将很难找到营销合作伙伴。


    **使用动态代码**


    动态编码是 Java 平台的主要优势之一。由于 CLDC/MIDP 平台上没有真正的反射支持，你只能使用 Class.forName()、参数和灵活的函数来实现此方法。


    使用动态类加载的一个例子是强制性的启动画面。清单 15-2

    '
- fmt: "演示了当存在Nokia UI API时如何使用Nokia的`FullCanvas`实现，以及当存在MIDP 2.0 API时如何调用`setFullScreenMode()`方法。\n\
    \n**296**\n\n第15章 ■ 在设备限制间周旋\n\n**清单15-2.** *动态实现全屏*\n```java\npackage com.apress.dynamic;\n\
    \nimport javax.microedition.lcdui.*;\nimport javax.microedition.midlet.*;\n\n\
    public class GameMidlet extends MIDlet {\n\n    private Display display;\n\n \
    \   public GameMidlet() {\n    }\n\n    public void startApp() {\n        this.display\
    \ = Display.getDisplay( this );\n        Canvas splash;\n\n        // 检查设备是否支持MIDP\
    \ 2.0标准：\n        try {\n            Class.forName(\"javax.microedition.io.PushRegistry\"\
    );\n            // 好的，支持MIDP 2.0标准：\n            splash = (Canvas) Class.forName\n\
    \                (\"com.apress.dynamic.Midp2Splash\").newInstance();\n       \
    \ } catch (Exception e) {\n            // 不支持MIDP 2.0标准\n            // 检查设备是否支持Nokia\
    \ UI API：\n            try {\n                Class.forName(\"com.nokia.mid.ui.FullCanvas\"\
    );\n                splash = (Canvas) Class.forName\n                    (\"com.apress.dynamic.NokiaUiSplash\"\
    ).newInstance();\n            } catch (Exception e2) {\n                // 好的，既不支持MIDP\
    \ 2.0也不支持Nokia UI API：\n                splash = new Midp1Splash();\n        \
    \    }\n        }\n\n        // 显示启动画面：\n        this.display.setCurrent( splash\
    \ );\n    }\n\n    public void destroyApp( boolean unconditional ) {\n    }\n\n\
    \    public void pauseApp() {\n    }\n}\n\n// 普通的MIDP 1.0启动画面：\npackage com.apress.dynamic;\n\
    \nimport javax.microedition.lcdui.*;\n\npublic class Midp1Splash extends Canvas\
    \ {\n\n    public void paint( Graphics g ) {\n        g.drawString(\"Starting!\"\
    , getWidth()/2, getHeight()/2, Graphics.HCENTER | Graphics.BASELINE );\n    }\n\
    }\n```\n\n**297**\n\n第15章 ■ 在设备限制间周旋\n\n```java\n// MIDP 2.0启动画面：\npackage com.apress.dynamic;\n\
    \nimport javax.microedition.lcdui.*;\n\npublic class Midp2Splash extends Canvas\
    \ {\n\n    public void paint( Graphics g ) {\n        setFullScreenMode( true\
    \ );\n        g.drawString(\"Starting!\", getWidth()/2, getHeight()/2, Graphics.HCENTER\
    \ | Graphics.BASELINE );\n    }\n}\n\n// Nokia UI API启动画面：\npackage com.apress.dynamic;\n\
    \nimport javax.microedition.lcdui.*;\nimport com.nokia.mid.ui.FullCanvas;\n\n\
    public class NokiaSplash extends FullCanvas {\n\n    public void paint( Graphics\
    \ g ) {\n        g.drawString(\"Starting!\", getWidth()/2, getHeight()/2, Graphics.HCENTER\
    \ | Graphics.BASELINE );\n    }\n}\n```\n\n清单15-2的动态代码只有一个问题：Nokia的`FullCanvas`实现通常不会在`getHeight()`方法中报告正确的高度。这其实不是大问题，唯一的影响是\"\
    Starting\"字符串无法真正垂直居中。然而，当你同时绘制背景时，情况就不同了。在这种情况下，当你调用`g.fillRect( 0, 0, getWidth(),\
    \ getHeight() )`或类似方法时，会留下一个空白区域。\n\n不过，前面的代码已经规避了索尼爱立信P910手机的一个问题。这款手机在`paint()`方法之外启用MIDP\
    \ 2.0全屏模式时（至少对于首次显示的屏幕），反应会相当不稳定。当然，当你希望针对MIDP平台以外的其他平台时，整个方法也会失效。\n\n另一个可能的问题是使用动态代码时带来的代码膨胀。在现代设备上这很可能不是真正的问题，但使用动态编程的全部目的是为所有设备提供一套应用程序代码。事实上，性能可能会受到严重影响。在清单15-2中，当设备上既没有MIDP\
    \ 2.0配置文件也没有Nokia UI API时，会抛出两个异常。异常在应用程序性能方面代价高昂，因此你会损失相当大的潜力。\n\n不过，动态编程可以非常强大；你甚至可以动态检查非标准化按键（如软键）的键码，例如使用`Canvas.getKeyName()`方法。总的来说，你需要为任何可能的组合提供一种解决方案。因此，这使得动态编程相当困难。"
  raw: 'demonstrates how Nokia’s FullCanvas implementation is used when the Nokia
    UI API is present and the setFullScreenMode() method is called when the MIDP 2.0
    API is available.


    5033CH15.qxd 6/20/05 9:20 AM Page 296


    **296**


    C H A P T E R 1 5 ■ D A N C I N G A R O U N D D E V I C E L I M I TAT I O N S


    **Listing 15-2.** *Implementing a Full Screen Dynamically* package com.apress.dynamic;


    import javax.microedition.lcdui.*;


    import javax.microedition.midlet.*;


    public class GameMidlet extends MIDlet {


    private Display display;


    public GameMidlet() {


    }


    public void startApp() {


    this.display = Display.getDisplay( this );


    Canvas splash;


    // check if this device supports the MIDP 2.0 standard:


    try {


    Class.forName("javax.microedition.io.PushRegistry");


    // okay, MIDP 2.0 standard is supported:


    splash = (Canvas) Class.forName


    ("com.apress.dynamic.Midp2Splash").newInstance();


    } catch (Exception e) {


    // the MIDP 2.0 standard is not supported


    // check if this device supports the Nokia-UI-API:


    try {


    Class.forName("com.nokia.mid.ui.FullCanvas");


    splash = (Canvas) Class.forName


    ("com.apress.dynamic.NokiaUiSplash").newInstance();


    } catch (Exception e2) {


    // okay, neither MIDP 2.0 nor Nokia UI API is supported:


    splash = new Midp1Splash();


    }


    }


    // show the splash screen:


