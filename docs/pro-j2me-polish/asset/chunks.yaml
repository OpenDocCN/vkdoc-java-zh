    **总结**


    在本章中，你学习了如何使用 J2ME Polish 和简单的 `System.out.println()` 语句来记录日志消息。日志框架的优势在于，它允许你为不同的类和包分配不同的日志级别。你还可以完全停用日志记录，这样应用程序中就不会留下任何日志痕迹。最后但同样重要的是，你可以使用日志处理器将消息存储到
    RMS 中。


