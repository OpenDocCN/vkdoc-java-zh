    **使用动态样式和预定义样式**


    当您使用动态样式时，甚至无需设置 `#style` 指令。在这种情况下，设计取决于类。例如，所有 Form 都可以使用 form 样式进行设计。


    使用动态样式可以快速检查现有应用程序的 GUI，但这需要额外的内存和运行时。因此，对于最终应用程序，您应该使用常规的“静态”样式。


    某些元素默认使用预定义样式。例如，title 样式负责 Screen 标题的外观。


    有关静态、动态和预定义样式的更多信息，请参考以下“设计 GUI”部分中的说明。


    **将 MIDP 2.0 应用程序移植到 MIDP 1.0 平台**


    当您使用 J2ME Polish GUI 时，您也可以在 MIDP 1.0 设备上毫无限制地使用 MIDP 2.0 小部件，例如 POPUP ChoiceGroup
    或 CustomItem。


    仅当使用了 MIDP 2.0 独有的功能（这些功能超出了 J2ME Polish GUI 的范围，例如 `Display.flashBacklight( int
    )`）时，才需要调整源代码。


    J2ME Polish GUI 支持在 MIDP 2.0 和 MIDP 1.0 设备上调用 MIDP 2.0 的 `Display.setCurrentItem(
