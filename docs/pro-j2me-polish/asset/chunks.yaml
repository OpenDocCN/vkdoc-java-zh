- fmt: '# Devices Support a Wide Range of Audio, Video, and Image Formats


    Devices support a wide range of audio, video, and image formats, but only a few
    formats are generally accepted. In general, you should stick to `MIDI`, `tone-sequence`,
    and `AMR` sounds and `PNG` images. The device database of `J2ME Polish` contains
    information of the supported formats, so you can use resource assembling for including
    the correct resources and use preprocessing for integrating the correct code for
    that format. Chapter 15 discusses the playback of sounds in more detail.


    ## Device Modifications


    A device can change its behavior and capabilities thanks to different firmware
    versions and carrier modifications.


    Firmware can be very interesting. A quite drastic example is the `Motorola E398`
    that changes its key events for the soft keys from one firmware version to another.
    New firmware can resolve issues, but they can also introduce new bugs. Unfortunately,
    you cannot hope that users will update their firmware, even when the latest version
    resolves mission-critical issues.


    A common strategy is to support only the most widely adopted firmware, even if
    this often means not supporting early adopters.


    Some carriers modify devices, too. `Vodafone`, for example, adds its `Vodafone
    Service Class Library`, which includes some 3D and other functionality. You need
    to become a certified `Vodafone` partner to get the full information about these
    libraries. A more serious modification is the disabling of certain functionality.
    A carrier can choose to open specific APIs to certified partners only, such as
    the `Location API`, for example. Such carrier modifications have ramifications
    not only for the technical feasibility but also for the business model of your
    projects, so take them into account.


    ## Device Issues


    Device issues are the main reason why it is so difficult to create compelling
    yet flawlessly working applications for mobile phones. Chapter 15 discusses these
    issues in detail, but I mention them here to complete the collection of device
    differences.


    ## The Emulator Trap


    Emulators are great for testing your application directly on your development
    system, but unfortunately you cannot trust them. A commonly heard excuse on mailing
    lists and discussion boards is “but it works on the emulator!”


    Many emulators are based on Sun’s original `Wireless Toolkit`, while the actual
    Java implementations are created by different companies. So, often the real behavior
    differs from the simulation on the PC. Common problems include how colors and
    images render, performance, and device-specific issues. Often emulators do not
    reproduce issues that the actual device has. More serious, however, is the fact
    that emulators can contain errors that are not present on the actual device.


    The bottom line is that you should use emulators for speeding up the implementation
    phase, but you should not trust emulators when you are trying to solve device-specific
    issues.


    An emulation is never perfect, so testing on the real device is crucial for your
    application’s success.


    ## Examining the Current Market


    The growth of the mobile market is legendary, and sales of mobile phones have
    outnumbered the predictions of market researchers several times. In the following
    sections, I will discuss how the market has evolved and what this means for your
    business.


    ### Telecom Market


    There are 1.5 billion telecom users, which constitutes a quarter of the population
    worldwide.


    Specifically, 78% of these users connect with `GSM`, 14% with `CDMA`, and 6% with
    `TDMA` network technologies, according to Forrester Research. The same study concludes
    that about 80% of the population is covered by network access, so a further 3.5
    billion potential users exist, but most of them do not have much money to spend.
    The 3G network technologies `UMTS` and `WDCMA` have gained in importance, but
    in 2004 only 4% of all sold handsets supported 3G technologies, according to ARC
    Group. However, IDC estimates that in Western Europe 16% of all handsets sold
    in 2005 do support 3G technologies.


    Worldwide, the most important manufacturers of mobile devices are `Nokia` with
    a market share of about 31%, `Motorola` with 16%, `Samsung` with 13%, and `Siemens`
    and `LG` with about 7% each. `Sony Ericsson` is trailing them closely and is expected
    to enter the top five again in 2005. In Western Europe, `Siemens` still holds
    second place with an estimated market share of about 16%, according to IDC. Table
    14-4 summarizes the vendor market worldwide, and Table 14-5 highlights Western
    Europe.


    **Table 14-4.** *Worldwide Mobile Phone Sales in 2004*


    | Vendor | Number of Phones (in millions) | Share |

    |--------|-------------------------------|-------|

    | Nokia | 207.6 | 31.2% |

    | Motorola | 104.5 | 15.7% |

    | Samsung | 86.5 | 13.0% |

    | Siemens | 49.4 | 7.4% |

    | LG Electronics | 44.4 | 6.7% |

    | Others | 172.0 | 25.9% |

    | **Total** | **664.5** | **99.9%** |


    **Table 14-5.** *Western European Mobile Phones Sales in 2004*


    | Vendor | Number of Phones (in millions) | Share |

    |--------|-------------------------------|-------|

    | Nokia | 50.2 | 34.8% |

    | Siemens | 22.5 | 15.6% |

    | Motorola | 17.5 | 12.1% |

    | Sony Ericsson | 15.9 | 11.0% |

    | Samsung | 14.7 | 10.2% |

    | Others | 23.3 | 16.2% |

    | **Total** | **144.1** | **99.9%** |


    According to iSupply, 68% of all phones sold in 2004 had color screens with 16
    bits per pixel being the norm (65,000 colors) and had an average screen size of
    128×160.


    ### J2ME Market


    The wireless gaming market is playing a dominant role in the `J2ME` market with
    an estimated $350 million generated in 2004 in the United States alone. IDC expects
    that sales of `J2ME` games in the United States will overtake ring tones in 2005
    and continue to grow to up to $1.5 billion in 2008. Compared with the competing
    `BREW` technology that generated a worldwide revenue of $200 million in 2004 for
    application developers, according to Qualcomm, it is clear that the future belongs
    to the `J2ME` standard.


    About 40% of all wireless developers use `J2ME`, with another 26% evaluating its
    usage, according to the Evans Data Corporation. In 2006 ARC Group expects that
    around 90% of all shipped mobile phones will support the Java standard. `Symbian`
    as the main platform now supports the `MIDP 2.0` standard for all Series phones,
    even in the lower Series 40 segment.


    Promising competitors for `J2ME` will be `Flash` for mobile devices and maybe
    `Microsoft`, even though `Microsoft` phones do not enjoy good ratings so far.
    `Flash` has the potential to become a major player in the mobile market, but this
    does not need to be a threat to the `J2ME` market. More likely, `Flash` will be
    used for marketing games and business applications, while the applications themselves
    will continue to be implemented in Java.


    ## Summary


    In this chapter, you learned how `J2ME` devices differ from each other and how
    the `J2ME` market has evolved. In the following chapter, you will look at some
    aspects you will commonly encounter in practice, such as detecting interruptions,
    establishing network connections, and accessing native functionality.'
