    C H A P T E R 4


    ■ ■ ■


    Integrating J2ME Polish


    into IDEs


    **In this chapter:**


    • Understand common integration issues when using J2ME Polish.


    • Learn how to integrate J2ME Polish into Eclipse, NetBeans, JBuilder, and IntelliJ.


    You can integrate J2ME Polish into any integrated development environment (IDE)
    that supports Ant, which nowadays means you can integrate J2ME Polish into all
    professional IDEs.


    In this chapter, I will first discuss common options you can set in every IDE,
    and then I will discuss how to integrate into Eclipse, NetBeans, and JBuilder
    in detail.


    **Recognizing Common Integration Issues**


    You must pay attention to certain issues regardless of which IDE you use. Rather
    than repeating these issues in the discussions of each IDE, I will summarize them
    in this section.


    The easiest way to integrate J2ME Polish is to use one of the sample applications
    to get started (for example, *${polish.home}/samples/menu*). Depending on your
    IDE, you can just mount that application folder or copy it onto your IDE’s workspace.
    You can then invoke the provided *build.xml* file within the Menu application
    for building it with J2ME Polish. In case you want to start the emulator, select
    the emulator target in *build.xml*.


    If you want to use J2ME Polish for an existing project, just copy the *${polish.home}/*


    *samples/menu/build.xml* script to your project’s folder and adjust at least the
    <midlet> definition in it. You may also want to change the <deviceRequirements>
    and <resources> settings in the *build.xml* file.


    When you’re working in a team and using a version control system such as CVS (
    *http://*


    *www.cvshome.org*), Subversion ( *http://subversion.tigris.org*), and the like,
    make sure you do not share the temporary *build* and *dist* folders. These are
    created and used by J2ME Polish during the build phase and thus change with every
    run. Usually, you can disable the sharing of these folders by right-clicking (Command+click
    on Mac OS X) the *build* and *dist* folders and then choosing Add to .cvsignore
    (or similar).


