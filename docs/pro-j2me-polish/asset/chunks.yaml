    和 `extJavac`。您可以使用 Ant 的 `<javac>` 任务支持的任何属性和嵌套元素。通常，只有在使用 `<debug>` 元素激活日志框架时才会包含调试信息，但通过清单
    13-12 的设置，您将始终包含调试信息。


