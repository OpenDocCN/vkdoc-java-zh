    **Defining Libraries**


    In *${polish.home}/apis.xml*, you can specify where to find device libraries.
    J2ME Polish includes these libraries automatically in the compilation and obfuscation
    steps when you build your application.


    You define the supported libraries of a device by setting the JavaPackage capability
    in *devices.xml*, *groups.xml*, or *vendors.xml*:


    <capability name="JavaPackage" value="mmapi, wmapi" /> When a supported library
    is not defined in the *apis.xml* file, J2ME Polish searches for the library in
    the project’s *import* folder, and then in *${polish.home}/import* using the library
    name and the extension *.jar* and *.zip*. For example, for the Wireless Messaging
    API (WMAPI), it would first search for the *wmapi.jar* file, and then for the
    *wmapi.zip* file.


    The case is different, however, when you define the library in *apis.xml*. For
    starters, you can define several possible file names and where these files are
    located. You can also specify which preprocessing symbol is set for that API.
    The <apis> element contains all actual <api> definitions. The nested <name> element
    specifies the name of the library, such as Mobile Media API. You should also describe
    the library using the <description> element. The <names> element lists all of
    the names under which the library is known, such as mmapi and JSR-135\. This ensures
    that you always refer to the same library, no matter which of the possible names
    is used in the JavaPackage capability.


    The <symbol> element specifies the preprocessing symbol that is defined for devices
    that support this library. (Preprocessing is covered in Chapter 8.) If you set
    the symbol to mmapi for example, you can check for that library using the //#if
    polish.api.mmapi construct. More generally speaking, for each library with the
    name [ *api-name*] the preprocessing symbol


