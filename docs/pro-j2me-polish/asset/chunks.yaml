    C H A P T E R 9


    ■ ■ ■


    The Logging Framework


    **In this chapter:**


    • Log messages by using the #debug preprocessing directive, and print the messages
    with System.out.println().


    • Specify the level of your message (debug, info, warn, error, fatal, or user-defined)
    in the #debug directive.


    • Print stack traces automatically by adding an exception as the last parameter
    in the System.out.println() call.


    • Use the <debug> element in the *build.xml* file to control the logging framework,
    including to specify different log levels for specific classes or packages (using
    nested <filter> elements).


    • View logged messages on real devices—automatically when an error is logged and
    the J2ME Polish GUI is used, or manually with the de.enough.polish.util.Debug
    class in conjunction with the polish.debugEnabled preprocessing symbol.


    • Use log handlers to process and forward log messages to other entities.


    You use logging for determining the internal application state and to track errors.
    However, logging J2ME applications has some substantial disadvantages. Logging
    messages requires space and runtime resources. Therefore, logging slows down your
    application and increases the application size unnecessarily. You probably won’t
    want to leave your logging statements in your final applications builds. Also,
    you can use System.out.println() statements for viewing log messages in the emulator,
    but these remain hidden on real devices. This chapter describes the logging framework
    of J2ME Polish and how it neutralizes these disadvantages.


    With the logging framework, you can enable different log levels for specific classes
    and packages. When you deactivate the logging framework, no traces are left in
    your application, so you don’t waste resources and space. Finally, you can view
    the logged messages on real devices as well as on emulators.


    **Logging Messages**


    You can log a message in your application by using the #debug preprocessing directive,
    followed by a normal System.out.println() statement, as shown in Listing 9-1\.
    All logged messages are added to an internal log and printed on the System.out
    stream as well, so that


