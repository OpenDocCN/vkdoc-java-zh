    \n**表12-25.** `DateField`项的附加属性\n\n| 属性 | 是否必需？ | 说明 |\n| --- | --- | --- |\n\
    | `datefield-width` | 否 | `datefield`元素的最小宽度，以像素为单位。 |\n| `datefield-height` |\
    \ 否 | `datefield`元素的最小高度，以像素为单位。默认为所用字体的高度。 |\n\n清单12-51展示了如何设计一个`DateField`项，图12-31演示了该设计。\n\
    \n**清单12-51.** 设计一个`DateField`项\n\n```\n.dateInput {\n    margin: 1;\n    padding:\
