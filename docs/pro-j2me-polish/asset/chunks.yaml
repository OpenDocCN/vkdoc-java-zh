- fmt: "# This chapter concludes the J2ME Polish part of this book. In this chapter,\
    \ I discussed the various ways you can extend J2ME Polish—including integrating\
    \ your own preprocessor and other build tools, creating your own GUI elements,\
    \ and extending the logging framework.\n\nIn the following part, you will take\
    \ a close look at the real world of J2ME programming.\n\nSadly, a difference always\
    \ exists between the theoretical standard and the actual implementations of the\
    \ J2ME environments on real phones. In the next part, you will learn how you can\
    \ adjust your application to the various real-world issues while still delivering\
    \ a top-notch application.\n\n# PART 3\n\n## Programming in the Real World\n\n\
    The J2ME standard is tight and simple, yet in the real world there is a surprisingly\
    \ high number of challenges waiting for you. In this part you will learn how to\
    \ identify and overcome these obstacles.\n\n# CHAPTER 14\n\n## Overview of the\
    \ Wireless Market\n\n**In this chapter:**\n\n- Learn how J2ME devices differ in\
    \ many aspects, such as in hardware and software.\n- Consider the wireless market\
    \ and how it relates to your applications, including your business model and the\
    \ technical positioning of your applications.\n\nThis chapter introduces you to\
    \ the challenges of developing wireless applications in the real world. You need\
    \ to deal with a highly fragmented device base, in which devices range from simple\
    \ black-and-white screens with JAR sizes up to 30KB to state-of-the-art UMTS devices\
    \ with 80MB of storage space. The wireless market is rapidly evolving and introduces\
    \ new opportunities each day. In this chapter, you will learn what device differences\
    \ you can expect in the real world. You will also learn how the market is evolving\
    \ and what consequences this has for your business model.\n\n## Introducing Device\
    \ Differences\n\nSun’s chief software architect, Jonathan Schwartz, estimates\
    \ that 500 million J2ME devices are currently in use in the market worldwide.\
    \ This is great, but you have to keep in mind that many devices differ quite a\
    \ lot. In the following sections, I will discuss how and why J2ME devices differentiate.\n\
    \n### Hardware\n\nThe hardware of J2ME devices varies greatly: memory, screen\
    \ resolutions, color depth, network technologies, inclusion of cameras... you\
    \ name it.\n\nIf you need specific hardware features, you can use the device selection\
    \ mechanism of J2ME Polish. Listing 14-1 demonstrates how you can select all phones\
    \ that have an integrated camera in your `build.xml` file. Your application is\
    \ then built only for devices that meet your requirements. I discussed this in\
    \ detail in the “Building for Multiple Devices” section of Chapter 7.\n\n**Listing\
    \ 14-1.** *Selecting All Devices That Include a Camera and Support Image Capturing*\n\
    \n```\n<j2mepolish>\n  <info\n    license=\"GPL\"\n    name=\"Roadrunner\"\n \
    \   vendorName=\"A reader.\"\n    version=\"0.0.1\"\n    jarName=\"${polish.vendor}-${polish.name}-roadrunner.jar\"\
    \n  />\n  <deviceRequirements>\n    <requirement name=\"Term\" value=\"polish.hasCamera\
    \ and polish.Capture.image\" />\n  </deviceRequirements>\n  <build\n    usePolishGui=\"\
    true\"\n  >\n    <midlet class=\"com.apress.roadrunner.Roadrunner\" />\n  </build>\n\
    \  <emulator />\n</j2mepolish>\n```\n\nFurthermore, you can use the resource assembling\
    \ mechanism when dealing with different screen sizes. Current device screens range\
    \ from 128×128 pixels in Nokia Series 40 phones to 640×320 pixels in high-end\
    \ devices. Often you will want to use adjusted graphics for the best perception.\
    \ You can use device groups, vendor devices, and even canvas sizes in fullscreen\
    \ mode for assembling the best-suited resources. For example, you can put your\
    \ general resources into the `resources` folder and put the images for devices\
    \ with big screens into the `resources/ScreenSize.150+x200+` directory. Please\
    \ refer to the “Resource Assembling” section in Chapter 7 for more information\
    \ about this option.\n\n### Profiles and Configurations\n\nJ2ME devices can support\
    \ different profiles and configurations, as shown in Figure 14-1. A distinct line\
    \ is drawn between the Connected Device Configuration (CDC) and the Connected\
    \ Limited Device Configuration (CLDC). The CDC standard is built upon the Java\
    \ 2 Standard Edition and the Java Virtual Machine, so it is very powerful. But\
    \ support for the CDC standard has dropped significantly in past years, so you\
    \ can choose to ignore this configuration along with its personal and foundation\
    \ profiles when you are targeting mobile phones. The CLDC standard, on the other\
    \ hand, contains only some core classes of the Java 2 Standard Edition and contains\
    \ further restrictions such as the inability to process floating-point calculations\
    \ on CLDC 1.0 devices.\n\nConfigurationwise, the importance of the CLDC 1.1 configuration,\
    \ which allows floating-point arithmetic, is increasing; however, most of today’s\
    \ devices support the CLDC 1.0 configuration only. Table 14-1 lists the available\
    \ configurations.\n\nAgain, you can use preprocessing for distinguishing the configurations\
    \ in your source code. CLDC 1.1 devices define the `polish.cldc1.1` preprocessing\
    \ symbol, and CLDC 1.0 devices define the `polish.cldc1.0` symbol.\n\n**Figure\
    \ 14-1.** *The J2ME architecture*\n\n**Table 14-1.** *J2ME Configurations*\n\n\
    | Name | JSR | Explanation |\n|------|-----|-------------|\n| CLDC 1.0 | | Connected\
    \ Limited Device Configuration |\n| CLDC 1.1 | | Connected Limited Device Configuration,\
    \ allows floating-point arithmetic |\n| CDC 1.0 | | Connected Device Configuration\
    \ |\n\nMost J2ME devices support the MIDP 1.0 profile, and support for MIDP 2.0\
    \ is growing rapidly today. The MIDP 1.0 standard extends the CLDC 1.0 or 1.1\
    \ configuration and introduces the notion of MIDlets, the LCDUI user interface,\
    \ and the record store persisting mechanism. Depending on your time frame, you\
    \ can even consider using the forthcoming MIDP 3.0 standard (see JSR 271 at `http://jcp.org/en/jsr/detail?id=271`),\
    \ but this standard will need a couple of years before it will be adopted on a\
    \ broad device base. IMP is used for devices without a user interface and allows\
    \ you to create solutions for machine-to-machine communications. Table 14-2 lists\
    \ all available profiles for the J2ME world.\n\nYou can use preprocessing for\
    \ differentiating between the profiles in your application. Check the `polish.midp1`\
    \ and `polish.midp2` preprocessing symbols for using code that is available for\
    \ only one profile. Chapter 8 explains all the details.\n\n**Table 14-2.** *J2ME\
    \ Profiles*\n\n| Name | JSR | Explanation | Configuration |\n|------|-----|-------------|---------------|\n\
    | MIDP 1.0 | | Mobile Information Device Profile | CLDC |\n| MIDP 2.0 | | Mobile\
    \ Information Device Profile, with enhancements such as the Game API, sound playback,\
    \ and secure networking | CLDC |\n| MIDP 3.0 | | Mobile Information Device Profile,\
    \ with further extensions and improved interoperability | CLDC |\n| IMP 1.0 |\
    \ | Information Module Profile | CLDC |\n| IMP 2.0 | | Information Module Profile—Next\
    \ Generation | CLDC |\n| FP 1.0 | | Foundation Profile based upon J2SE 1.3 | CDC\
    \ |\n| FP 1.1 | | Foundation Profile based upon J2SE 1.4 | CDC |\n| PBP 1.0 |\
    \ | Personal Basis Profile | CDC |\n| PP 1.0 | | Personal Profile | CDC |"
