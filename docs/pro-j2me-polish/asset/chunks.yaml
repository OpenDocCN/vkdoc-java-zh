    ■**Tip** You can easily create you own log handlers by extending the de.enough.polish.log.LogHandler
    class. This is described in detail in Chapter 13.


    **Summary**


    In this chapter, you learned how you can use J2ME Polish and simple System.out.println()
    statements for logging messages. The advantage of the logging framework is that
    it allows you to assign different log levels to different classes and packages.
    You can also deactivate the logging completely, so that no traces of the logging
    remain in your application. Last, but not least, you can use log handlers to store
    the messages into the RMS.


    In the next chapter, you will learn how to use other J2ME Polish utilities, such
    as the Binary Editor and the TextUtil class.


