    Devices should ask users whether they want to keep the data when an update is
    installed.


    In most cases, it is at least possible to keep the data that has been stored in
    the record store.


    Depending on your application’s needs, you should also consider storing the user
    data on the server before an update is requested. You can then add the user’s
    ID to the JAD file that is used for the update. When your application is started
    and there is no user data, you can check that ID and download the data from the
    server.


    Obviously, there are some security risks here, because JAD files can be changed
    very easily. So you need to ensure both that the user is really the intended user
    (authentication) and that any valid user who ended up with an invalid ID for some
    reason can change that ID.


