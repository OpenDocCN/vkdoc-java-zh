- fmt: '# Dynamic Styles


    Dynamic styles need more memory and processing time than static and predefined
    styles. You should, therefore, use static styles if possible.


    Dynamic styles do not start with a dot and use item- or screen-specific names
    for their selectors.


    Texts use either `p`, `a`, `button`, or `icon`. Screens use the name of the screen,
    such as `form`, `list`, or `textbox`, as shown in Listing 12-18.


    **Listing 12-18.** *Using Dynamic Styles in Your `resources/polish.css` File*

    ```

    p {

    font-color: black;

    font-size: medium;

    background: none;

    }


    form {

    margin: 5;

    background-color: gray;

    border: none;

    font-size: medium;

    }

    ```


    You can also design items that are contained in other items or screens. The style
    `form p` selects all text items (of the class `StringItem`) that are embedded
    within a form, as shown in Listing 12-19.


    **Listing 12-19.** *Selecting Texts Within a Form with the Dynamic `form p` Style*

    ```

    form p {

    font-color: black;

    font-size: medium;

    background-color: white;

    }

    ```


    Table 12-8 shows the available dynamic styles for Items and Screens.


    **Table 12-8.** *Available Dynamic Styles*


    | Class | Selector | Explanation |

    |-------|----------|-------------|

    | `StringItem` | `p` | `StringItem` shows text. The `p` selector is used when
    the item has the appearance mode `PLAIN`. |

    | | `a` | The `a` selector is used when the item has the appearance mode `HYPERLINK`.
    |

    | | `button` | The `button` selector is used when the item has the appearance
    mode `BUTTON`. |

    | `ImageItem` | `img` | Shows an image. |

    | `Gauge` | `gauge` | Shows a progress indicator. |

    | `Spacer` | `spacer` | Is used for showing an empty space. Using the `Spacer`
    item is discouraged, since the spaces can be set for all items with the `margin`
    and `padding` attributes. |

    | `IconItem` | `icon` | Shows an image together with text. |

    | `TextField` | `textfield` | Allows textual input from the user. |

    | `DateField` | `datefield` | Allows the input of dates or times from the user.
    |

    | `ChoiceGroup` | `choicegroup` | Contains several choice items. |

    | `ChoiceItem` | `listitem` | Shows a single choice. The selector `listitem` is
    used when this item is contained in an implicit list. |

    | | `radiobox` | The selector `radiobox` is used when the list or choice group
    has the type `EXCLUSIVE`. |

    | | `checkbox` | The selector `checkbox` is used when the list or choice group
    has the type `MULTIPLE`. |

    | | `popup` | The selector `popup` is used when the choice group has the type
    `POPUP`. |

    | `SpriteItem` | `spriteitem` | Contains an animated item. |

    | `List` | `list` | Shows several choice items. |

    | `Form` | `form` | Contains different GUI items. |

    | `TextBox` | `textbox` | Contains a single text input field. |

    | `TabbedForm` | `tabbedform` | A form with several tabs. |

    | `FramedForm` | `framedform` | A form with several frames. |


    ## Extending Styles


    You can also extend other styles. The child style then inherits all the attributes
    of the extended style. You can use this mechanism to keep the basic design in
    one or few style definitions while doing the actual design by extending the basic
    design. This saves you a lot of writing work and allows you to change the design
    more easily. In Listing 12-20, the `.highscoreScreen` style inherits all attributes
    of the `.mainStyle`, but the `font-color` and `background-color` attributes are
    specified differently.


    **Listing 12-20.** *Extending Styles Saves Work and Allows You to Change the Basic
    Design in One Place*

    ```

    .mainScreen {

    margin: 10;

    font-color: black;

    font-size: medium;

    font-style: italic;

    background-color: gray;

    }


    .highscoreScreen extends mainScreen {

    font-color: white;

    background-color: black;

    }

    ```


    ## Reviewing CSS Syntax


    The CSS syntax of J2ME Polish is simple, but you need to obey some rules.


    ### Structure of a CSS Declaration


    Every style starts with the selector followed by an opening curved parenthesis,
    a number of attribute-value pairs, and a closing curved parenthesis.


    The selector can consist of several item names and contain an `extends` clause.


    Each attribute-value pair needs to end with a semicolon.


    ### Naming'
