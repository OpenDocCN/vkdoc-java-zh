  trans: '

    得益于可选 API，应用程序现在可以访问许多此前仅原生应用才能使用的手机功能。然而，J2ME 应用仍无法访问某些领域。当你的应用需要原生功能时，你有两种选择：开发原生应用，或在
    J2ME 应用内部访问原生功能。


    创建原生应用超出了本书的讨论范围，但你应该意识到，存在多种操作系统且其版本部分不兼容。因此，若想覆盖广泛的用户群体，应尽可能坚持使用纯 Java。


    当目标设备支持 Personal Java 配置文件时，你可以直接使用 Java 原生接口（JNI）技术来访问原生功能。JNI 提供了一种便捷且标准化的方式来调用函数并接收其返回值。在这种情况下，只有当你想支持新平台时才需要移植原生函数，因为
    Java 代码可以保持不变。需要注意的是，只有少数 J2ME 设备支持 Personal Java 配置文件，例如诺基亚 Communicator 系列或索尼爱立信的
    UIQ 设备（如 P910）。


    部分 KVM 也支持 JNI 或类似技术。例如，JBlend 平台就提供了这种可能性（*http://www.aplix.co.jp/en/jblend/jblend/practical04.html*）。通常，你需要与相应的供应商或运营商建立商业关系，才能获准使用
    JNI。


    第三种可能性是实现一个原生应用，它通过监听特定端口（如 4242）建立服务器连接并等待传入请求。在此场景下，你可以打开一个套接字连接并访问本地服务器，例如：`SocketConnection
    mySocket = (SocketConnection) Connector.open( "socket://127.0.0.1:4242" );`。


    最后，理论上可以使用 `MIDlet.platformRequest()` 机制来启动原生应用。通常，当请求以 `tel:<号码>` 方案开头时，你可以初始化电话呼叫；使用
    `http:<网址>` 方案时，则可以启动浏览器。


    制造商未来可以添加自己的请求方案。


    检测中断


    MIDlet 随时可能被来电或类似事件中断。在这种情况下，应用程序管理系统（AMS）应调用 `MIDlet.pauseApp()`，但在某些设备上并不会发生。通过一些防御性编程技术，你可以在所有手机上检测到中断。


    一个典型场景是游戏，它应在被中断时暂停。为了获得最佳可移植性，你应该从三个不同角度解决这个问题：使用 `MIDlet.pauseApp()`、使用 `Canvas.hideNotify()`，以及检测异常时间间隔。


    使用 `MIDlet.pauseApp()` 机制很简单。你可以在调用 `pauseApp()` 后进入 **PAUSED** 状态，并在再次调用 `MIDlet.startApp()`
    时恢复应用。


    某些设备（最典型的是诺基亚 Series 40）从不调用 `pauseApp()`。相反，当当前（低级 GUI）屏幕不再显示时，你会收到通知。你可以在游戏中重写
    `Canvas.hideNotify()` 方法来暂停游戏，并重写 `Canvas.showNotify()` 方法来恢复游戏。


    最后，某些设备在发生中断时似乎会停止整个 Java 虚拟机，而不调用任何通知方法。此时你唯一能做的就是记录应用程序线程上次执行的时间，并在下次运行时与当前时间进行比较。当你发现两次运行之间存在异常长的时间间隔时，可以假设发生了中断。使用
    `System.currentTimeMillis()` 方法获取当前时间。


    ■**注意** 当设备同时支持 `MIDlet.pauseApp()`/`startApp()` 和 `Canvas.hideNotify()`/

    '
- fmt: '`showNotify()`，调用的顺序可能出乎意料。一种实现可能会依次调用`hideNotify()`、`pauseApp()`、<interruption>、`showNotify()`和`startApp()`，而另一种实现则可能调用`pauseApp()`、<interruption>、`startApp()`、`hideNotify()`和`showNotify()`。请在你的应用程序中为不同的调用顺序做好准备。


    ## 获取帮助


    在接下来的章节中，你将了解可以在哪些论坛和邮件列表中提出你的问题。


    ## 遵守网络礼仪


    当你发布任何问题或声明时，应当遵守某些规则。这些规则能让每个人的交流更轻松，因此请尽可能遵守网络礼仪。网络礼仪实际上只是常识，但你可能惊讶于有多少人对此毫不在意。


    在提问之前，你应该先搜索答案。首先使用普通的搜索引擎（如 Google），然后查看专门的论坛和门户网站。大多数论坛都提供搜索功能，并会整理一份常见问题列表，你应该先查阅这些内容。


    当你找不到问题的答案时，请将问题发布到合适的论坛，并尽可能详细地描述你的问题。请注明产生错误的具体手机或模拟器型号，说明你使用的任何第三方软件及其版本，尽可能具体地描述问题，并在适用时提供堆栈跟踪信息或异常名称。你还应该附上源代码的相关部分，以便其他用户能够追踪编码错误。在许多论坛上，你可以用`[code]..[/code]`将源代码包围起来，以便正确格式化。不要忘记描述你想要实现的目标；有时存在解决问题的替代方法。最后，你应该说明同样的程序是否能在其他设备或模拟器上正常运行而不出现问题。


    当你因某个问题感到沮丧时，很容易失去耐心，因此请确保以礼貌的方式提问。如果你使用辱骂或任何形式的激进要求，就别指望能得到有用的回答。


    最后但同样重要的是，在论坛中宣传你的产品时要小心。一些论坛为此类内容提供了专门的版块。一般来说，只有当你的产品对 J2ME 开发者真正有吸引力时，才应发布相关新闻。


