    C H A P T E R 7 ■ B U I L D I N G A P P L I C AT I O N S


    />


    <deviceRequirements>


    <requirement name="Identifier" value="Nokia/Series60" />


    </deviceRequirements>


    <build>


    <midlet class="com.apress.roadrunner.Roadrunner" />


    **<obfuscator name="ProGuard" />**


    **<obfuscator name="Dasho" />**


    </build>


    <emulator />


