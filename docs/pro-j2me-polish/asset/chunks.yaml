    你可以使用 layout 属性对齐项。layout 属性定义了受影响的项应如何对齐和布局。可能的布局值例如 left、right 和 center。可以使用所有
    MIDP 2.0 标准的布局值，如表 12-9 所示。例如，如果你想使用完整的可用宽度并将项水平居中，可以指定 layout: center | expand;。你可以使用多个符号来分隔布局值：使用
    ||、|、or 或 and 运算符。


