- fmt: "The shortened hex value defines a color by an RGB value in hexadecimal. Every\
    \ digit will be doubled to retrieve the full hex value: `color: #F00;` is equivalent\
    \ to `color: #FF0000;`, `color: #0D2;` is equivalent to `color: #00DD22;`, and\
    \ so on.\n\nAn RGB value starts with `rgb(` and then lists the decimal value of\
    \ each color from 0 up to 255: `color: rgb( 255, 0, 0 );` defines red, `color:\
    \ rbg( 0, 0, 255 );` defines blue, and so on. Alternatively, you can use percentage\
    \ values for RGB colors: `color: rgb( 100%, 0%, 0% );` and `rgb( 100.00%, 0.00%,\
    \ 0.00% );` both define red.\n\nYou can define alpha-RGB colors with the `argb()`\
    \ construct: `color: argb( 128, 255, 0, 0 );` defines a half-transparent red.\
    \ For the `argb()` construct, percentage values can be used as well.\n\n## Alpha\
    \ Blending\n\nYou can define colors with alpha blending with hexadecimal or `argb()`\
    \ definitions (see the previous section). An alpha value of 0 results in fully\
    \ transparent pixels, whereas the value `FF` (or `255` or `100%`) results in fully\
    \ opaque pixels. Some devices such as Nokia phones and most MIDP 2.0 devices support\
    \ values between 0 and `FF`, resulting in translucent colors. Colors with an alpha\
    \ channel can be used only by specific GUI items. Please refer to the documentation\
    \ of the specific design attributes. Not every component supports alpha-RGB values.\
    \ You can use translucent colors for a simple background, for example, `focused\
    \ { background-color: argb( 128, 255, 0, 0 ); }`.\n\n## Fonts\n\nMany GUI items\
    \ have text elements that you can design with the font attributes of the corresponding\
    \ style. Table 12-11 explains the available attributes.\n\n**Table 12-11.** *Available\
    \ Font Attributes*\n\n| Attribute | Possible Values | Description |\n| --- | ---\
    \ | --- |\n| `color` | Reference to a color or direct declaration of the color.\
    \ | Depending on the number of colors the device supports, colors can look differently\
    \ on the actual device. |\n| `face` | `system` (default, normal) | The default\
    \ font face used when the `font-face` or `label-face` attribute is not set. |\n\
    | | `proportional` | A proportional face. This is on some devices actually the\
    \ same font face as the system font. |\n| | `monospace` | A font face in which\
    \ each character has the same width. |\n| `size` | `small` | The smallest possible\
    \ font. |\n| | `medium` (default, normal) | The default size for texts. |\n| |\
    \ `large` (big) | The largest possible font size. |\n| `style` | `plain` (default,\
    \ normal) | The default style. |\n| | `bold` | A bold thick style. |\n| | `italic`\
    \ (cursive) | A cursive style. |\n| | `underlined` | Not really a style, just\
    \ an underlined text. |\n| `bitmap` | The name of the bitmap font. The extension\
    \ `*.bmf*` is not needed. | With the `bitmap` attribute, you can use a bitmap\
    \ font rather than the standard system, proportional, and monospace fonts. Please\
    \ note that bitmap fonts cannot be changed in size, color, or style. See Chapter\
    \ 10 for a detailed discussion of bitmap fonts. |\n\nListing 12-27 shows you how\
    \ to specify font settings. In this listing, you could skip the `face` and `size`\
    \ attributes, since they define the default behavior anyhow.\n\n**Listing 12-27.**\
    \ *Setting a Specific Font for the Currently Selected Item*\n```\nfocused {\n\
    \    font-color: white;\n    font-face: default; /* same as system or normal */\n\
    \    font-size: default; /* same as medium or normal */\n    font-style: bold;\n\
    \    background-color: highlightedBackgroundColor;\n}\n```\n\n## Bitmap Fonts\n\
    \nYou can use bitmap fonts instead of the usual predefined fonts for any text\
    \ elements such as titles, StringItems, and so on. Please refer to Chapter 10\
    \ to learn more about these fonts and how you can create them using the `${polish.home}/bin/fonteditor`\
    \ tool.\n\nYou can integrate bitmap fonts with the `font-bitmap` attribute. You\
    \ don’t need to give the `*.bmf*` extension, by the way. Listing 12-28 uses the\
    \ `china.bmf` font for the currently focused item.\n\n**Listing 12-28.** *Using\
    \ a Bitmap Font for the Currently Selected Item*\n```\nfocused {\n    font-bitmap:\
    \ china;\n    background-color: highlightedBackgroundColor;\n}\n```\n\n## Labels\n\
    \nAll GUI items can have a label that is designed with the predefined style `label`.\
    \ You can specify another style by using the `label-style` attribute, as shown\
    \ in Listing 12-29. This also demonstrates how you can ensure that there is a\
    \ line break after the focused label by specifying the `newline-after` layout\
    \ in the `label-style` style.\n\n**Listing 12-29.** *Using a Different Label Style*\n\
    ```\nfocused {\n    label-style: focusedLabelStyle;\n    font-color: highlightedFontColor;\n\
    \    background-color: highlightedBackgroundColor;\n    border-width: 2;\n}\n\n\
    .focusedLabelStyle {\n    font-color: highlightedLabelColor;\n    background-color:\
    \ highlightedBackgroundColor;\n    border-width: 2;\n    layout: left | newline-after;\n\
    }\n```\n\n**Tip** You can use the `max-width` CSS attribute for limiting the widths\
    \ or labels, as well as the actual items, so that both fit into a single line.\
    \ Use this feature for creating clean designs without using a table.\n\n## `before`\
    \ and `after` Attributes\n\nYou can insert images before and after any GUI items\
    \ by using the `before` and `after` attributes. Listing 12-30 adds a heart picture\
    \ after the currently focused item. You can view the result in Figure 12-9.\n\n\
    ![Image 31](index-220_1.jpg)\n\n**Listing 12-30.** *Adding an Image After the\
    \ Currently Focused Item*\n```\nfocused {\n    font-color: highlightedFontColor;\n\
    \    background: none;\n    border-type: round-rect;\n    border-width: 2;\n \
    \   border-color: highlightedBorderColor;\n    after: url( heart.png );\n}\n```\n\
    \n**Figure 12-9.** *Using the `after` attribute for adding a heart to the currently\
    \ focused item*\n\n## Backgrounds and Borders\n\nYou can use background and a\
    \ border for every item or screen just by defining it in the appropriate style.\
    \ Many types of backgrounds and borders are available, and some are even animated.\
    \ Listing 12-31 uses a simple red background and black border for the title.\n\
    \n**Listing 12-31.** *Using a Simple Background for the Title*\n```\ntitle {\n\
    \    font-color: highlightedFontColor;\n    background-color: red;\n    border-color:\
    \ black;\n    border-width: 2;\n}\n```\n\nIf you want to use more complex types,\
    \ you need to define the `background-type` or `border-type` explicitly, for example,\
    \ `background-type: pulsating;`.\n\n![Image 32](index-221_1.jpg)\n\n### Designing\
    \ Borders\n\nMany different border types use specific CSS attributes. When you\
    \ want to use a border other than the default simple border, you need to specify\
    \ the `border-type` attribute. Use the `border: none;` declaration when you extend\
    \ another style that declares a border and you don’t want any border for the child\
    \ style.\n\nPlease refer to the appendix for learning the details of all available\
    \ borders, such as the `round-rect`, `circle`, or `bottom` border.\n\n### Designing\
    \ Backgrounds\n\nYou can choose between a great number of different backgrounds\
    \ for your designs. When you deploy a background other than the default simple\
    \ background or the image background, you need to declare the `background-type`\
    \ attribute. When you extend another style and want to remove the background settings,\
    \ you can use the `background: none;` declaration. The appendix describes details\
    \ of all available backgrounds.\n\n**Tip** Make sure to check out the online documentation\
    \ at `http://www.j2mepolish.org/documentation.html` for learning about any new\
    \ backgrounds that are now available.\n\n## Designing Screens\n\nThe MIDP user\
    \ interface consists of screens such as `List` or `Form` that in turn contain\
    \ GUI items such as `StringItem` or `TextField`. In the following sections, you\
    \ will learn all the tricks for making the most out of your screens.\n\n### Designing\
    \ the Screen Background"
