- fmt: '# Chapter 15: Dancing Around Device Limitations


    **In this chapter:**


    - Learn the actual differences among the devices on the market today.

    - Learn how to write portable applications.

    - Solve frequently encountered problems with some easy-to-follow strategies.

    - Find out where you can get help when you are stuck.


    The J2ME implementations that are used in devices on the market today behave differently.


    In the previous chapter, you learned what differences you should expect because
    of the different profiles and configurations; in this chapter, you will get to
    know the practical differences and difficulties that you will encounter when programming
    J2ME applications. You will also learn how to avoid some frequently encountered
    problems and where to get help if you get stuck.


    ## Identifying Vendor Characteristics


    In the following sections, you will learn how to deal with the devices of the
    most popular vendors, including Nokia, Motorola, Samsung, and so on.


    **Tip** Some vendors support specific JAD attributes. Please refer to the "Managing
    JAD and Manifest Attributes" section in the appendix for a complete discussion
    of such attributes.


    ## Nokia


    Nokia is the world''s biggest player in the mobile phone market with a share of
    about 31% in 2004.


    Nokia is pushing new devices into the market with amazing speed: in 2004 Nokia
    released more than 30 new models, and for 2005 Nokia has announced it will release
    more than 40. Fortunately, you can group the Nokia devices into different series
    that in turn are separated by different versions. From the point of view of the
    number of sold devices, the most important series are the low-cost Series 40 for
    the mass market and the Series 60 for smart phones.


    Nokia manufactures high-quality devices and provides one of the best-maintained
    developer sites at `http://forum.nokia.com`; it hosts forums, provides tools,
    and contains documentation for the devices. Nokia also maintains "known issues"
    papers that list problems and how you can circumvent these problems. Table 15-1
    lists the available series and their main features.


    ### Series 40


    Series 40 devices are manufactured for the mass market; they feature small sizes
    and low prices but also are more resource restrained than other Nokia devices.
    All Series 40 models are based on Nokia''s proprietary operating system. The screen
    size is usually 128×128 pixels and can be used fully by either using Nokia''s
    `FullCanvas` class or setting the `Canvas` to full-screen mode on MIDP 2.0–based
    devices. Few Series 40 devices have screens with 128×160 pixels, and some even
    have screens with 96×65 pixels. In general, you can expect a color depth of at
    least 12 bits per pixels (4,096 colors).


    The Series 40 Developer Platform 1.0 features phones based on MIDP 1.0 and CLDC
    1.0 that accept Java applications with a size of up to 64KB and a heap size of
    about 200KB. You can use the record store (RMS) up to 20KB only. You need to use
    the Nokia UI API for playing sounds, using the full-screen mode, controlling the
    vibration and backlight of the device, and performing some advanced image manipulations
    such as rotating images or manipulating pixel data. One of the big drawbacks for
    manipulating image data buffers with the Nokia UI API is that the devices have
    different internal formats, so sometimes you need to use `TYPE_USHORT_4444_ARGB`
    and other times `TYPE_INT_888_RGB`. The main challenge for the old Series 40 phones
    is to keep the application size smaller than 64KB. The Chinese models accept only
    59KB JARs. Some devices of the Developer Platform 1.0 also support the Wireless
    Messaging API. On Series 40 Development Platform 1.0 phones, the `pauseApp()`
    method of your `MIDlet` will never be called, so you can detect whether your application
    is paused only by using the `hideNotify()` method of `Canvas`. This does not work
    when you use high-level GUI screens such as `Form` or `List`, unfortunately. When
    an uncaught exception occurs, the Application Management System will close the
    application by calling `destroyApp(false)`.


    You can build your application for this platform by using the device identifier
    `"Nokia/Series40DP1"` in your device requirements:


    ```

    <requirement name="Identifier" value="Nokia/Series40DP1" />

    ```


    The Series 40 Development Platform 2.0 uses the MIDP 2.0 profile and the CLDC
    1.1 configuration as the base technology. It also supports all additional elements
    specified by the JTWI standard, so the Wireless Messaging API is available on
    all Series 40 Development Platform 2.0 devices. The Mobile Media API is also supported
    and allows the playback of True Tone and MIDI files. Some devices support additional
    APIs such as the Bluetooth API or the Mobile 3D Graphics API. Usually, you should
    not use the Nokia UI API on Development Platform 2.0 devices, since most functionality
    is now superseded by the MIDP 2.0 platform.


    Development Platform 2.0 devices support applications with a JAR size up to 128KB.
    When an application launches a platform request on the Development Platform 2.0,
    the user needs to quit the application before the request is actually launched.


    **Table 15-1.** Main Features of Nokia Devices


    | Series | Version | OS | Profile | Configuration | Libraries |

    |--------|---------|----|---------|---------------|-----------|

    | Series 40 | First Edition | Nokia OS | MIDP 1.0 | CLDC 1.0 | Nokia UI API, WMA
    API |

    | Series 40 | Second Edition, Feature Pack 1 | Nokia OS | MIDP 2.0, JTWI 1.0 |
    CLDC 1.1 | Nokia UI API, WMA API, MMAPI |

    | Series 40 | Second Edition, Feature Pack 2 | Nokia OS | MIDP 2.0, JTWI 1.0 |
    CLDC 1.1 | Nokia UI API, WMA API, MMAPI, Bluetooth API |

    | Series 40 | Second Edition, Feature Pack 3 | Nokia OS | MIDP 2.0, JTWI 1.0 |
    CLDC 1.1 | Nokia UI API, WMA API, MMAPI, Bluetooth API, M3G API |

    | Series 60 | First Edition | Symbian OS 6.1 | MIDP 1.0 | CLDC 1.0 | Nokia UI
    API, WMA API |

    | Series 60 | Second Edition | Symbian OS 7.0s | MIDP 2.0 | CLDC 1.1 | Nokia UI
    API, WMA API, MMAPI, Bluetooth API |

    | Series 60 | Second Edition, Feature Pack 1 | Symbian OS 8.0a | MIDP 2.0, JTWI
    1.0 | CLDC 1.1 | Nokia UI API, WMA API, MMAPI, Bluetooth API, M3G API |

    | Series 60 | Second Edition, Feature Pack 2 | Symbian OS 8.1a | MIDP 2.0, JTWI
    1.0 | CLDC 1.1 | Nokia UI API, WMA API, MMAPI, Bluetooth API, M3G API, PDA API
    |

    | Series 60 | Third Edition | Symbian OS 9.1 | MIDP 2.0, JTWI 1.0 | CLDC 1.0 +
    CDC | Nokia UI API, WMA API, MMAPI, Bluetooth API, M3G API, PDA API, Web Services
    API, SIP API, Location API, Security API |

    | Series 80 | Second Edition | Symbian OS 7.0s | MIDP 2.0 + Personal Profile |
    CLDC 1.0 | Nokia UI API, WMA API, MMAPI, Bluetooth API, PDA API |

    | Series 90 | - | Symbian OS 7.0s | MIDP 2.0 | CLDC 1.0 | Nokia UI API, WMA API,
    MMAPI, Bluetooth API, M3G API |


    You can build your application for this platform by targeting the `"Nokia/Series40DP2"`
    device.


