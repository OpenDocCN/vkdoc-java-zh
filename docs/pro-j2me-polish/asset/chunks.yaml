    为了读取特定的样式设置，您需要实现 `setStyle( Style )` 方法。清单 13-15 中展示的 `StringListItem` 的实现演示了这一点。


    同样，您需要通过预处理隐藏 `super.setStyle( Style )` 的调用，以免您的 IDE 混淆。


    J2ME Polish 会在请求首选内容宽度和高度之前调用 `setStyle()` 方法，这样您的 CustomItem 在请求尺寸时就拥有了样式。


    请注意，变量必须命名为 `style`，或者以 `style` 结尾（小写），以便 J2ME Polish 能正确处理所有样式。这是必需的，因为在预处理步骤中，基于字符串的属性名称会被替换为数值型的短值。


    这种方法显著提高了运行时性能，并最大限度地减少了堆内存使用。


    您有四种可能的方式从样式中检索属性：


    • `style.getProperty( String name )` 返回一个表示该值的字符串，如果属性未定义则返回 null。


    • `style.getIntProperty( String name )` 返回一个表示该值的 Integer，如果属性未定义则返回 null。


    • `style.getBooleanProperty( String name )` 返回一个表示该值的 Boolean，如果属性未定义则返回 null。


    • `style.getObjectProperty( String name )` 返回一个表示该值的 Object，如果属性未定义则返回 null。


    请注意，仅当您在文件 *custom-css-attributes.xml* 中注册了相应的属性时，才能使用后三种方法。属性类型分别为 string、integer/color、boolean
    和 object/style。如果您未指定类型，该属性将被视为字符串属性。对于每个设置的 CSS 属性，预处理符号 `polish.css.[attribute-name]`
    将被定义。您可以使用此机制，仅在属性至少被使用一次时才请求其值。同样，清单 13-15 中 `StringListItem` 的 `setStyle()`
    方法演示了如何通过此机制节省一些宝贵的字节。


    **注册自定义 CSS 属性** 您可以在 J2ME Polish 的安装目录中找到 *custom-css-attributes.xml* 文件。您可以使用此文件来注册在您的
    CustomItems 中使用的 CSS 属性。


    仅当您在 CustomItem 的 `setStyle( Style )` 方法中使用了 `style.getIntProperty( String name
    )`、`style.getBooleanProperty( String name)` 或 `style.getObjectProperty( String
    name )` 方法时，才需要注册这些属性。尽管如此，仍然建议进行注册，因为未来版本的 J2ME Polish 可能会将此信息用于 Eclipse CSS
    插件。


