    前言


    **所**以，你是一名开发者，你为移动设备编写应用程序，并且网络运营商要求你让你的应用程序在他们偏好的设备列表上运行，否则他们就不会与你合作。这一切听起来很熟悉，而且最初听起来也很简单——我们正在用
    Java 开发应用程序，众所周知，Java 是平台无关的，我们只需“一次编写，到处运行”。


    好吧，现在你从地上爬起来，停止了大笑之后，你可能已经意识到编写移动应用程序的一个大问题是，设备之间以及这些设备上的 Java 实现之间存在太多微小的差异，以至于支持众多设备是一项艰巨的任务。


    我们如何绕过这些“不一致性”？


    我们如何避免为我们编写的每个东西都编写特定于设备的源代码？


    这些是移动应用程序开发者面临的*真正*重要的问题。当我开始为移动设备编写应用程序时，我们仍在学习这些不一致性，并且仍在发现让我们想抓狂的东西。


    我想建议你，你的第一站应该始终是 API 规范。


    你看，这就是它们存在的原因：向你展示*应该*发生什么以及你*应该*如何处理事情——但正如你所知，如果你让一千只猴子坐在打字机前，你肯定不会得到莎士比亚的作品。嗯，这里也是如此。如果你把所有设备制造商都交给应用程序管理软件的规范，你当然不能指望它们以完全相同的方式工作。（现在，我不是说这都是他们的错——我的意思是，硬件并不总是完全相同的，奇迹不会发生。）那么，我们*到底*如何绕过这些不一致性呢？嗯，这就是这本书和
    J2ME Polish 的用武之地。我建议直接跳到“现实世界编程”部分，快速阅读一下。然后你应该对当前的问题有更好的理解，并且你会意识到你需要一些帮助来控制你可能需要的大量变通方法。当然，这种帮助以
    J2ME Polish 的形式出现，而这本书解释了如何使用它。


