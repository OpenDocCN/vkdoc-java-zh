    **Branching Your Code**


    If-then-else branches are well-known programming constructs. The #if directive
    and its various relatives and relations allow you to adjust your source code to
    different handsets and configurations very effectively. The possibilities of these
    adjustments are endless. You can easily create tailor-made applications that use
    device-specific APIs, circumvent known issues of your target devices, or change
    the application flow depending on the configuration.


    Checking for Single Preprocessing Symbols


