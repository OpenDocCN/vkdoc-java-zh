- fmt: 'You can control the logging framework with the `<debug>` element in the `build.xml`
    file. You can enable different log levels for specific classes or packages by
    using nested `<filter>` elements, or deactivate the logging framework completely.
    For example, if you activate the error level for the corresponding class or package,
    any debug, info, or warn messages will not be shown. In that case, only messages
    with the levels error and fatal and user-defined levels will actually be logged.
    Inactive logging statements will be commented out in the source code, so that
    they don’t use up any resources, as they are not compiled.


    ## The Logging Framework


    The `<debug>` element is nested inside the `<build>` section of the `<j2mepolish>`
    task, as shown in Listing 9-3. This listing also contains the test and init targets
    that are used to activate and deactivate the logging framework without changing
    the `build.xml` script.


    **Listing 9-3.** *Controlling the Logging Framework with the* `<debug>` *Element
    in* `build.xml`


    ```

    <project name="roadrunner" default="j2mepolish">


    <!-- define the installation folder of J2ME Polish -->


    <property name="polish.home" location="C:\programs\J2ME-Polish" />


    <!-- define the installation folder of the WTK -->


    <property name="wtk.home" location="C:\WTK22" />


    <!-- define the J2ME Polish task, classpath on one line please -->


    <taskdef name="j2mepolish"


    classname="de.enough.polish.ant.PolishTask"


    classpath="${polish.home}/import/enough-j2mepolish-build.jar: ${polish.home}/import/jdom.jar/>


    <!-- enable the test mode -->


    <target name="test">


    <property name="test" value="true" />


    <property name="dir.work" location="build/test" />


    </target>


    <!-- specify default settings -->


    <target name="init">


    <property name="test" value="false" />


    <property name="dir.work" location="build/real" />


    </target>


    <!-- start the build with J2ME Polish -->


    <target name="j2mepolish" depends="init" >


    <j2mepolish>


    <info


    license="GPL"


    name="Roadrunner"


    vendorName="A reader."


    version="0.0.1"


    jarName="${polish.vendor}-${polish.name}-roadrunner.jar"


    />


    <deviceRequirements>


    <requirement name="Identifier" value="Generic/midp1" />


    </deviceRequirements>


    <build


    usePolishGui="true"


    workDir="${dir.work}"


    >


    <midlet class="com.apress.roadrunner.Roadrunner" />


    <debug showLogOnError="true"


    verbose="false"


    level="error"


    if="test"


    >


    <filter


    package="com.apress.roadrunner"


    level="info"


    />


    <filter


    class="com.apress.roadrunner.Roadrunner"


    level="debug"


    />


    </debug>


    </build>


    <emulator />


    </j2mepolish>


    </target>


    </project>

    ```


    The `<debug>` element allows you to specify several options:


    - **`showLogOnError`**: This attribute determines whether J2ME Polish shows the
    log automatically when an error occurred. This setting is honored only when the
    J2ME Polish GUI is used and the error is forwarded to the logging framework. You
    can pass on any error to the logging framework by adding the exception as the
    last parameter to a logged message: `System.out.println("Unable to do something"
    + e );`.


    - **`verbose`**: When you activate the verbose logging mode with the `verbose`
    attribute, J2ME Polish will add the current time in milliseconds, the name of
    the corresponding source file, and the line within the source file in the logging
    statement. This feature helps you track bugs on real devices.


    - **`level`**: You specify the general log level with the `level` attribute. Predefined
    levels are `debug`, `info`, `warn`, `error`, and `fatal`. You can also define
    and use your own log levels. Custom log levels always have the highest possible
    priority; that is, a priority higher than the predefined `fatal` level. You can
    use custom levels just by adding them in the `#debug` directive and in the `<filter>`
    element, described next.


    - **`<filter>`**: You can fine-tune the level setting by using nested `<filter>`
    elements. In each'
