    also use Runtime.freeMemory() and Runtime.totalMemory() in your application, but
    these values depend on the memory strategy of the virtual machine. Use the difference
    between the return values for detecting the approximately used memory: long usedMemory
    =


    runtime.totalMemory() - runtime.freeMemory().


    **Improving the Memory Footprint**


    You can improve the memory footprint in a couple of ways: reducing the number
    of objects and using recursion. You should also take preventative measures to
    guard against memory leaks that you might accidentally produce.


    Reducing the Number of Objects


    Each created object reduces the available memory, so you should aim to reduce
    the number of the needed objects in your application. Isn’t that simple?


    One strategy is to reuse existing objects. Reusing objects can, however, introduce
    new problems such as caches that are held in memory even though the cached objects
    are no longer needed. So consider the implications carefully before adopting this
    strategy widely.


    Another strategy involves reducing the number of temporary objects. These objects
    are often created in loops; String operations are a prime example. Strings are
    immutable, so a new String needs to be instantiated at each change. Consider,
    for example, the creation of a String that contains a consecutive range of numbers
    like 01234\. When you need to concatenate several Strings, it’s often better to
    use StringBuffers instead of the + operator. Listing 16-11


    shows a bad example and a good example of creating a String containing such numbers.


    5033CH16.qxd 6/17/05 12:17 PM Page 343


    C H A P T E R 1 6 ■ O P T I M I Z I N G A P P L I C AT I O N S


    **343**


    **Listing 16-11.** *Reducing the Number of Temporary Objects by Using StringBuffer
    Instead of String* public String getSlowNumberString( int top ) {


    String number = "";


    for ( int i = 0; i <= top; i++ ) {


    number += i;


    }


    return number;


    }


    public String getFastNumberString( int top ) {


    // we assume that top is less than 10 here:


    StringBuffer number = new StringBuffer( top );


    for ( int i = 0; i <= top; i++ ) {


    number.append( i );


    }


    return number.toString();


    }


    Another popular place for creating unnecessary Strings is the Graphics.drawString()
    method. When you call g.drawString( "Points: " + this.points, x, y, Graphics.TOP
    |


    Graphics.LEFT ) in your paint() method, you create a new temporary String object
    every time the method is called. It might be better to create the String containing
    the points only when the number of points is actually changed.


    In some cases, it’s worthwhile to postpone the creation of objects until they
    are really needed. This so-called lazy initialization helps to reduce the memory
    usage but also complicates your application logic, so use this strategy with care.


    Using Recursion


    Using recursive methods yields good-looking and easy-to-understand algorithms,
    but unfortunately it introduces memory and performance overhead. This is due to
    the parameters and the state, which needs to be pushed on the stack of the virtual
    machine for each invocation of the method. In most cases, you can use equivalent
    iterative algorithms instead.


    Avoiding Memory Leaks


    You can create undesirable memory leaks in Java by not dereferencing unused objects.
    This is especially easy when you use containers such as Vector or Hashtable for
    storing objects.


    To avoid creating leaks, when using containers always try to guess and set the
    appropriate size, so that the internal array does not need to be increased. Increasing
    the internal array often includes copying all elements from the old array into
    a new array, so it not only takes time, but also increases the memory usage. Don’t
    forget to remove elements from containers when they are not needed anymore. You
    should also consider dereferencing variables as soon as possible by explicitly
    setting them to null. This helps the garbage collector to figure out which objects
    are not used and reachable anymore.


    5033CH16.qxd 6/17/05 12:17 PM Page 344


    **344**


    C H A P T E R 1 6 ■ O P T I M I Z I N G A P P L I C AT I O N S


    Sometimes devices have different types of memory. Old Sony Ericsson devices such
    as the T610 differentiate between the normal Java heap, the native UI heap, and
    the Video RAM, for example. Images are loaded into the Video RAM, which offers
    faster access but is also limited compared to the Java heap. Garbage collecting
    images from the Video RAM is different than from the normal Java heap memory,
    so you should try to load images that are used all the time first.


    Using large StringBuffers can also be problematic when you call toString() frequently.


    The retrieved Strings use the complete internal array of the StringBuffer, so
    when you later change the buffer, the internal array may need to be copied to
    a new one. In those cases, you end up with having the complete internal array
    as often as you have called toString() on the StringBuffer.


    Many optional APIs use native calls for accomplishing their work. Due to device
    bugs, this can be difficult, so you exercise caution when using Bluetooth connections,
    playing music, or viewing three-dimensional graphics. Make sure to study known
    issues of your target devices with respect to memory handling.


    **Decreasing the Size of JAR Files**


    Minimizing the size of JAR files not only improves download times, but it’s often
    necessary to meet the restrictions of your target devices. MIDP 1.0-based devices
    of Nokia’s Series 40 only accept JAR files up to 64KB, for example.


    In this section, you’ll learn how to decrease the size of your JAR bundle by simplifying
    the class model, reducing the size of resources, removing resources altogether,
    and by using thirdparty packagers and obfuscators.


    **Improving the Class Model**


    You can improve your class model by minimizing the number of classes and interfaces
    in your application. You can do so by grouping similar functionalities and by
    removing unnecessary classes, as described in the sections that follow.


    Grouping Functionalities


    Each class adds overhead to your JAR files, because it needs an additional entry
    in your JAR


    file as well as some Java-specific data such as class constants. Grouping functionalities
    allows you to minimize the number of needed classes.


    A good example is to implement a CommandListener only in one class. Often it seems
    to be easier to provide specialized Screens that handle their commands and events
    autonomously.


    However, this undermines the model view control principle, because the view (Screen)
    provides also the control (CommandListener). When you process events in only one
    controller class like the main MIDlet, you gain several advantages at once:


    • You decouple the control from the view.


    • You implement the CommandListener interface only once, saving precious space.


    • Often you can remove the specialized classes completely, since using and populating
    standard Forms, Lists, and so on is sufficient in many cases.


    5033CH16.qxd 6/17/05 12:17 PM Page 345


    C H A P T E R 1 6 ■ O P T I M I Z I N G A P P L I C AT I O N S


    **345**


    Look out for one-to-one class relations, which are classes that are used by only
    one other class. Often you can merge the functionality of such classes without
    jeopardizing your architecture.


    ■**Caution** Too much grouping severely decreases the maintainability and extensibility
    of your application.'
