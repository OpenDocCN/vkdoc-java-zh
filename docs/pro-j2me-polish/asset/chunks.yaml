  trans: "\npolish.obfuscate.source\n\n包含未混淆类的 JAR 文件\n\npolish.obfuscate.target\n\
    \n应创建的 JAR 文件\n\npolish.obfuscate.bootclasspath\n\n目标设备的引导类路径\n\npolish.obfuscate.classpath\n\
    \n当前目标设备的类路径\n\npolish.obfuscate.keepcount\n\n不应混淆的类数量\n\npolish.obfuscate.keep\n\
    \n所有不应混淆的类，以逗号分隔\n\npolish.obfuscate.keep.0\n\n第一个不应混淆的类\n\npolish.obfuscate.keep.n\n\
    \n第 *n* 个不应混淆的类\n\n**集成预验证器**\n\nMIDP 应用程序需要预验证，以便在资源受限的设备上实现快速验证。你可以通过使用 `<preverifier>`\
    \ 元素来调用不同的预验证器，该元素嵌套在 *build.xml* 脚本的 `<build>` 元素中。\n\n你可以通过扩展 `de.enough.polish.preverify.Preverifier`\
    \ 类并实现 `preverify(Device device, File sourceDir, File targetDir, Path bootClassPath,\
    \ Path classPath)` 方法来实现自己的预验证器。你可以在 *${polish.home}/custom-extensions.xml* 中使用类型\
    \ `preverifier` 注册你的实现。\n\n你可以使用 `antcall` 预验证器调用任何 Ant 目标来预验证你的应用程序：\n\n`<preverifier\
    \ name=\"antcall\" target=\"mypreverify\" />`。除了常用的 J2ME Polish 属性外，你还可以使用 `polish.preverify.source`（指向包含未预验证类的目录）、`polish.preverify.target`（包含应写入预验证类的文件夹）以及\
    \ `polish.preverify.bootclasspath` 和 `polish.preverify.classpath`（包含当前目标设备的类路径）。\n\
    \n使用 `none` 预验证器跳过混淆步骤：`<preverifier name=\"none\" />`。\n\n这对于不需要预验证的设备（例如符合韩国\
    \ WIPI 标准的手机）非常有用。\n\n如果你希望针对特定设备、供应商或平台始终使用特定的预验证器（或者就此而言，不使用任何预验证器），你可以在设备数据库中定义\
    \ `build.Preverifier` 能力。J2ME Polish 在 *${polish.home}/platforms.xml* 中为 WIPI\
    \ 配置文件定义了 `none` 预验证器，例如 `<capability name=\"build.Preverifier\" value=\"none\"\
    \ />`。\n\n**复制和转换资源**\n\n使用 `<copier>` 元素将设备和区域设置特定的资源复制到临时目录。在此过程中，你可以重命名资源，甚至合并它们，以节省\
    \ JAR 文件中的字节。\n\n`<copier>` 元素嵌套在 `<resources>` 元素内，而 `<resources>` 元素又可以在 *build.xml*\
    \ 文件的 `<build>` 部分中使用。J2ME Polish 提供了标准的重命名器扩展，可以在复制资源时重命名它们。使用参数 `searchPattern`\
    \ 和 `replacement` 来配置此过程。在清单 13-13 中，资源名称中被花括号包围的所有部分都会被移除。你可以使用此机制为资源名称添加详细信息，而不会浪费空间。例如，名为\
    \ *m0{first icon of main command}.png* 的文件将被重命名为 *m0.png*。\n\n**清单 13-13.** *即时重命名资源*\n\
    \n```xml\n<resources\n  dir=\"resources/default\"\n  defaultexcludes=\"yes\"\n\
    \  excludes=\"*.db\"\n>\n  <copier name=\"renamer\">\n    <parameter name=\"searchPattern\"\
    \ value=\"\\{.*\\}\" />\n    <parameter name=\"replacement\" value=\"\" />\n \
    \ </copier>\n  <localization locales=\"en\" />\n</resources>\n```\n\n你也可以调用任何\
    \ Ant 目标来复制资源：`<copier name=\"antcall\" target=\"copy\" />`。使用额外的 Ant 属性 `polish.resources.target`（指向所有资源应被复制到的目录）和\
    \ `polish.resources.files`（包含需要复制的资源路径列表，以逗号分隔）。你还可以使用 Ant 属性 `polish.resources.filePaths`，它包含由分号（Windows）或冒号（Unix）分隔的文件路径。\n"
- fmt: "# Extending J2ME Polish\n\n## Custom Resource Copier\n\nExtend the `de.enough.polish.resources.ResourceCopier`\
    \ class, and implement its `copyResources(Device device, Locale locale, File[]\
    \ resources, File targetDir)` method for taking full control. You can register\
    \ your extension in the `${polish.home}/custom-extensions.xml` file using the\
    \ `resourcecopier` type.\n\n## Using Different Packagers\n\nThe packager is responsible\
    \ for creating the final JAR bundles from the application classes and the resources.\
    \ You can integrate your own packager by defining the `<packager>` element inside\
    \ the `<build>` element in your `build.xml` script.\n\nIf you call an Ant target\
    \ with `<packager name=\"antcall\" target=\"package\" />`, you can use the additional\
    \ Ant properties `polish.package.source` (in which all resources, classes, and\
    \ the manifest reside) and `polish.package.target` (which points to the file in\
    \ which the application should be packaged).\n\nCreate your own packager by extending\
    \ the `de.enough.polish.jar.Packager` class. In this class, you need to provide\
    \ the method `createPackage(File sourceDir, File targetFile, Device device, BooleanEvaluator\
    \ evaluator, Map variables, Project project) throws IOException, BuildException`.\
    \ You can register your packager implementation in `${polish.home}/custom-extensions`\
    \ with the `packager` type.\n\n## Integrating Finalizers\n\nAfter a project has\
    \ been preprocessed, compiled, postcompiled, obfuscated, and packaged, it is finalized.\
    \ Examples for the finalizers are the signing of the application bundles or the\
    \ automatic transformation into COD files for BlackBerry devices.\n\nUse the `<finalizer>`\
    \ element inside the `<build>` section of your `build.xml` script to invoke a\
    \ finalizer. You can invoke any Ant target in this step with the `antcall` finalizer:\
    \ `<finalizer name=\"antcall\" target=\"finalizeme\" />`. Use the additional Ant\
    \ properties `polish.finalize.jad` and `polish.finalize.jar` for accessing the\
    \ paths of the created JAD and JAR files.\n\nYou can also implement your own finalizer\
    \ by extending the `de.enough.polish.finalize.Finalizer` class and implementing\
    \ its `finalize(File jadFile, File jarFile, Device device, Locale locale, Environment\
    \ env)` method. Register your finalizer using the `finalizer` type in `${polish.home}/custom-extensions.xml`.\n\
    \nYou can automatically trigger a finalizer by specifying the `build.Finalizer`\
    \ capability in the device database. J2ME Polish uses this feature for automatically\
    \ invoking the COD transformation for all BlackBerry devices, for example: `<capability\
    \ name=\"build.Finalizer\" value=\"jar2cod\" />`.\n\n## Integrating Emulators\n\
    \nInvoking emulators automatically after a successful build can speed up your\
    \ development time. As discussed in Chapter 7, J2ME Polish can already invoke\
    \ various emulators automatically. If you want to extend these mechanisms, you\
    \ can specify command-line options in the device database.\n\nYou can invoke any\
    \ emulator that can be started via the command line by specifying the `Emulator.Executable`\
    \ and `Emulator.Arguments` capabilities. Listing 13-14 shows you how to invoke\
    \ a Motorola emulator by specifying these capabilities in the `${polish.home}/devices.xml`\
    \ file.\n\n**Listing 13-14.** *Defining Emulator Arguments in devices.xml*\n\n\
    ```\n<device>\n  <identifier>Motorola/V550</identifier>\n  <features>doubleBuffering,\
    \ hasCamera</features>\n  <capability name=\"OS\" value=\"Motorola\" />\n  <capability\
    \ name=\"JavaPlatform\" value=\"MIDP/2.0\" />\n  <capability name=\"JavaConfiguration\"\
    \ value=\"CLDC/1.0\" />\n  <capability name=\"JavaPackage\" value=\"mmapi, wmapi,\
    \ phonebook\" />\n  <capability name=\"ScreenSize\" value=\"176x220\" />\n  <capability\
    \ name=\"ClosedFlipScreenSize\" value=\"96x80\" />\n  <capability name=\"BitsPerPixel\"\
    \ value=\"16\" />\n  <capability name=\"HeapSize\" value=\"800 kb\" />\n  <capability\
    \ name=\"MaxJarSize\" value=\"100 kb\" />\n  <capability name=\"MaxRecordStoreSize\"\
    \ value=\"64 kb\" />\n</device>\n```"
