    C H A P T E R 1


    ■ ■ ■


    Quick Setup Guide


    **In this chapter:**


    • Download J2ME Polish ( *http://www.j2mepolish.org*).


    • Install J2ME Polish (double-click the downloaded file or call java -jar j2mepolish-[version].jar).


    • Check out the sample applications (call ant or ant test j2mepolish in the *samples/menu*
    or *samples/roadrunner* directory), if you have Ant and the Wireless Toolkit (WTK)
    installed.


    About two years ago, I was working on yet another mobile application and experienced
    the agony of J2ME development: the application worked fine on the emulators, but
    not in the crude real world. Then it worked on one device, but not another. After
    a while, my coworkers and I managed to get it running on all our target devices
    (five different handsets), but we had to split up the application into a different
    branch for each device we targeted. Then we needed to incorporate any changes
    into each branch. What a headache! We used way too much time coding device adjustments—more
    time than we devoted to the actual application itself. Being good programmers,
    we managed it in the end, of course. Then we presented our finished project. Although
    the application itself was regarded as good, the design was utterly rejected.
    So, we had to redo the code, once again in every branch.


    This scenario probably sounds familiar to you. And, as a programmer, you probably
    wondered, as I did, if it really had to be that way. Why should you create yet
    another application branch just for incorporating device-specific adjustments?
    Why should you do these adjustments in the first place? And last, but not least,
    why should you, as a programmer, be forced to design the user interface of the
    application yourself? These are the types of problems that J2ME Polish was designed
    to address.


    In this chapter, you’ll get a quick start with J2ME Polish. Here, I assume that
    you have set up Ant and the Wireless Toolkit already. Please refer to the following
    chapters for a detailed step-by-step guide.


