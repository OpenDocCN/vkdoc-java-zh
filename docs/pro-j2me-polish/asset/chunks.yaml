    **Porting an MIDP 2.0 Game to the**


    **MIDP 1.0 Platform**


    Thanks to the game engine and the GUI of J2ME Polish, you need to address only
    specific issues manually to allow an MIDP 2.0 game to run on an MIDP 1.0 platform.
    As usual, you can use preprocessing to detect the capabilities of your target
    device.


    To port your MIDP 2.0 game to MIDP 1.0 devices, you first need to work around
    the restrictions of the J2ME Polish game engine, as outlined in the previous section.
    You might also need to adjust MIDP 2.0-specific code so that your application
    works on MIDP 1.0


    devices.


    In general, you cannot use any MIDP 2.0-only functionality in your game, but there
    are two important exceptions to this rule:


    • You can use everything from the javax.microedition.lcdui.game.* API.


    • You can use most MIDP 2.0 high-level GUI functions, like CustomItem, POPUP ChoiceGroups,
    or Display.setCurrentItem() when you use the J2ME Polish GUI.


    So, for games, three porting issues commonly arise: usage of MIDP 2.0-only low-level
    graphics operations, sound playback, and device control (the vibration and display
    light).


    The solution is to use vendor-specific libraries.


    ■**Tip** You will often need to integrate specific resources in your game depending
    on the capabilities of your target device. You can use the resource assembly feature
    of J2ME Polish to ensure that you include the correct files in your JAR file,
    as discussed in Chapter 7.


    **Porting Low-Level Graphics Operations**


    Porting low-level graphics operations is a challenging task. You can find low-level
    graphics operations in the javax.microedition.lcdui.Graphics and javax.microedition.lcdui.Image
    classes.


    For example, the MIDP 2.0 platform allows you to draw raw RGB data directly with
    the Graphics.drawRGB() method. The Image.createRGBImage() method also processes
    raw RGB


    data. Whether you can port these functionalities depends on both your actual usage
    as well as the target device. All Nokia devices support the simple yet powerful
    Nokia UI API; other vendors often provide their own proprietary extensions.


    Table 11-1 lists the proprietary libraries you can use for porting low-level graphics
    operations.


