    preprocessing symbol polish.Bugs.needsNokiaUiForSystemAlerts when this issue is
    present.'
  trans: '

    每个严肃的 Java IDE 都支持为一个项目设置多个源文件夹。在 Eclipse 中，你可以通过右键单击项目，选择“属性”，然后选择“Java 构建路径”来添加源文件夹，如图
    15-2 所示。在“源”选项卡上，单击“添加文件夹”以添加另一个源文件夹。但是，当你想要多次实现相同的类时，不应这样做。在这种情况下，你的 IDE 会（正确地）抱怨存在重复的类定义。只需使用一个主源文件夹（例如
    *source/src*），然后将其他源文件夹添加到父目录中，例如 *source/midp2*、*source/nokiaui* 等。另一种策略是在你的
    IDE 中使用包含不同源代码的不同项目。


    ![图 58](img/index-325_1.jpg)


    5033CH15.qxd 6/20/05 9:20 AM 第 303 页


    第 15 章 ■ 在设备限制间周旋


    **303**


    **图 15-2.** *向 Eclipse 项目添加新的源文件夹* 使用不同源文件的主要缺点是每次更改都需要额外的工作。根据业务需求，你可能需要创建大量不同的
    Java 源文件。当你现在需要包含一个额外的功能或错误修复时，你需要在每个受影响的源文件中实现更改。


    **解决常见问题**


    通常，你会在项目中遇到类似的问题。在接下来的章节中，我将讨论如何解决常见的困难。


    **使用适当的资源**


    不同设备之间的主要区别在于屏幕尺寸，因此你通常需要调整图像以获得最佳效果。此外，你通常需要不同的多媒体资源，例如不同类型的音频文件。


    使用 J2ME Polish 的自动资源组装功能，这项任务很容易完成。


    只需将所有公共资源放入项目的 *resources* 文件夹，并为特定资源使用子文件夹，例如 *resources/Nokia* 用于诺基亚资源，*resources/mmapi*
    用于支持移动媒体 API 的设备，以及 *resources/Motorola/A1000* 用于摩托罗拉 A1000 手机。


    另一个不错的功能是，你也可以使用灵活的文件夹：例如，来自 *resources/BitsPerPixel.12+* 文件夹的资源将用于所有每颜色位深度至少为
    12 位（4096 色）的设备。另一个例子是 *resources/ScreenSize.*


    *150+x200+* 文件夹。当设备的屏幕宽度至少为 150 像素且高度至少为 200 像素时，将使用此文件夹中的资源。当你使用多个这样的灵活资源文件夹时，将使用最匹配的那个。


    你还可以在 *build.xml* 脚本中使用 <resources> 元素及其嵌套的 <fileset> 元素来指定资源的条件。


    请参阅第 7 章中的“打包你的应用程序”部分，以了解使用 J2ME Polish 进行资源组装选项的完整细节。


