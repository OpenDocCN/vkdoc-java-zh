    \ (that is, should fill the complete row).\n\n`shrink`\n`horizontal-shrink`, `hshrink`\n\
    The affected items should use the minimum width possible.\n\n`top`\nThe affected\
    \ items should be top-aligned.\n\n`bottom`\nThe affected items should be bottom-aligned.\n\
    \n`vcenter`\n`vertical-center`\nThe affected items should be centered vertically.\n\
    \n`vexpand`\n`vertical-expand`\nThe affected items should use the whole available\
    \ height (that is, should fill the complete column).\n\n`vshrink`\n`vertical-shrink`\n\
    The affected items should use the minimum height possible.\n\n`newline-after`\n\
    Items following an item with a `newline-after` layout should be placed on the\
    \ next line. Only relevant when you use the `midp2` view type.\n\n`newline-before`\n\
    The affected items should always start on a new line (when there are any items\
    \ in front of it). Only relevant when you use the `midp2` view type.\n\n`plain`\n\
    `default`, `none`\nNo specific layout should be used; instead, the default behavior\
    \ should be used. Such a layout does not need to be defined explicitly, but it\
    \ can be useful to overwrite a basic setting when you extend another style.\n\n\
    # Colors\n\nYou can define colors in the `colors` section and in each attribute\
    \ that ends in `-color`, such as `font-color` and `border-color`, for example.\
    \ You can use predefined colors, RGB definitions, and ARGB definitions.\n\n##\
    \ Predefined Colors\n\nYou can use the standard Windows colors directly, such\
    \ as `background-color: yellow;`, for example. Table 12-10 lists all the available\
    \ predefined colors.\n\n**Table 12-10.** *The Predefined Colors of J2ME Polish*\n\
    \n| Color | Hex Value |\n|-------|-----------|\n| `white` | `#FFFFFF` |\n| `black`\
    \ | `#000000` |\n| `red` | `#FF0000` |\n| `lime` | `#00FF00` |\n| `blue` | `#0000FF`\
    \ |\n| `green` | `#008000` |\n| `silver` | `#C0C0C0` |\n| `gray` | `#808080` |\n\
    | `yellow` | `#FFFF00` |\n| `maroon` | `#800000` |\n| `purple` | `#800080` |\n\
    | `fuchsia` | `#FF00FF` |\n| `olive` | `#808000` |\n| `navy` | `#000080` |\n|\
    \ `teal` | `#008080` |\n| `aqua` | `#00FFFF` |\n\nAnother predefined color is\
    \ `transparent`, which results in a transparent area. `transparent` is supported\
    \ only by some GUI elements such as the menu bar of a full-screen menu or an image\
    \ background.\n\n## The `colors` Section\n\nYou can define your own color in the\
    \ `colors` section of the `polish.css` file. You can then reference these colors\
    \ in your style definitions, as well as in the `fonts`, `border`, and `background`\
    \ sections. Listing 12-23 already showed the `colors` section in action. By using\
    \ the `colors` section, you can later change your colors globally in one place.\n\
    \n> **Tip** You should try to use color names that describe their meaning, not\
    \ their color. A bad name, for example, is `brightPink`. If you change this color\
    \ at a later stage to a green tone, your CSS code will look a bit awkward, since\
    \ it still references `brightPink`. A much better name would be `highlightedBackgroundColor`,\
    \ for example. This allows you to change the color value without losing the meaning\
    \ of the color’s name.\n\n## How to Define Colors\n\nYou can define a color in\
    \ many different ways, as demonstrated in Listing 12-26.\n\n**Listing 12-26.**\
    \ *Defining Colors in Different Ways*\n\n```\n.myStyle {\n    /* the name of the\
    \ color */\n    font-color: white;\n    /* an rgb hex value */\n    border-color:\
    \ #80FF80;\n    /* a short rgb-hex-value - this is red */\n    start-color: #F00;\n\
    \    /* an alpha-rgb hex value */\n    menu-color: #7F80FF80;\n    /* a rrr,ggg,bbb\
    \ value */\n    background-color: rgb( 255, 50, 128 );\n    /* an rgb-value with\
    \ percentage */\n    fill-color: rgb( 100%, 30%, 50% );\n    /* a aaa, rrr, ggg,\
    \ bbb value */\n    label-color: argb( 128, 255, 50, 128 );\n}\n```\n\nColor names\
    \ refer to one of the predefined colors or to a color you have defined in the\
    \ `colors` section: `color: black;` or `color: highlightedBackgroundColor;`.\n\
    \nThe hex value defines a color with two hexadecimal digits for each color (RRGGBB).\
    \ Additionally, the alpha blending component can be added (AARRGGBB): `color:\
    \ #FF0000;` defines red. `color: #7FFF0000;` defines a half-translucent red."
