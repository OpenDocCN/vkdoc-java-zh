- fmt: "# e.g. Congrats, you have won 3 Nokia-nuggets!\n\n`messages.YouHaveWon=Congrats!\
    \ You have won {0} ${polish.Vendor}-${VirtualCurrency}!`\n\nNaturally, you can\
    \ use the variables you have defined in the `messages.txt` file during the usual\
    \ preprocessing in the Java source code as well:\n\n```\n//#= String virtualCurrency\
    \ = \"${VirtualCurrency}\";\n```\n\n## Using Localized Attributes\n\nSome JAD\
    \ or Manifest attributes need to be localized as well, for example, the description\
    \ of the application. You can do this by defining these attributes in the appropriate\
    \ `messages` file, as demonstrated in Listing 7-29.\n\n**Listing 7-29.** *Defining\
    \ JAD and Manifest Attributes in the messages.txt File*\n\n```\nMIDlet-Description=A\
    \ game where you need to tickle your enemies!\nMIDlet-Name=Tickle-Fight\n```\n\
    \nPlease refer to the \"Managing JAD and Manifest Attributes\" section in this\
    \ chapter for more information about defining attributes.\n\n## Coping with Dates\
    \ and Currencies\n\nThe `Locale` class can also help you deal with localized content;\
    \ for most functions, you need to define a country as well in your `<localization>`\
    \ element.\n\n- `static String formatDate( Calendar calendar )` formats a date\
    \ specific to the current locale; this method is also available for `Date` and\
    \ `long`.\n- `static String LANGUAGE` contains the ISO language code for the locale.\n\
    - `static String COUNTRY` holds the ISO country code. This is `null` when no country\
    \ is used in the current locale.\n- `static String DISPLAY_LANGUAGE` contains\
    \ the localized language name; for example, use `Deutsch` for German.\n- `static\
    \ String DISPLAY_COUNTRY` contains the localized name of the country; for example,\
    \ use `Deutschland` for Germany. This is `null` when no country is used in the\
    \ current locale.\n- `static String CURRENCY_SYMBOL` contains the symbol of the\
    \ translation's currency; for example, use `$` or `€`. This is `null` when no\
    \ country is used in the current locale.\n- `static String CURRENCY_CODE` holds\
    \ the three-letter code of the used currency; for example, use `USD` or `EUR`.\
    \ This is `null` when no country is used in the current locale.\n\n## Avoiding\
    \ Common Mistakes\n\nYou have to pay attention to some issues when you want to\
    \ localize your application.\n\n### Adjusting the JAR Name\n\nYou need to remember\
    \ to adjust the JAR name of the application in the `<info>` section of `build.xml`\
    \ so that the locale is included; otherwise, only the last localized application\
    \ is actually written into the `dist` folder. You can use the variables `${polish.locale}`,\
    \ `${polish.language}`, or `${polish.country}` in the `jarName` attribute:\n\n\
    ```\n<info jarName=\"${polish.vendor}-${polish.name}-${polish.locale}-roadrunner.jar\"\
    \n```\n\n### Using Quotation Marks and Other Special Characters in Translations\n\
    \nSome characters need to be Java encoded in your translation files. You can use\
    \ quotation marks as well as any special character if you escape them correctly,\
    \ usually with a backslash character (`\\`) at the start; for example, you can\
    \ use `\\\"` for quotation marks, `\\t` for tabs, and `\\\\` for backslashes.\n\
    \n### Invalid Locale Calls\n\nThe `Locale.get()` method is a bit sensitive about\
    \ its contents. Please ensure that the key of the translation is always given\
    \ directly instead of using a variable; otherwise, J2ME Polish will not be able\
    \ to embed the translation correctly, and you will end up with compile errors.\n\
    \nListing 7-30 shows how *not* to do it.\n\n**Listing 7-30.** *Invalid Locale\
    \ Call, Because the Key Is Not Given Directly*\n\n```\n// never do this:\nString\
    \ key = \"menu.StartGame\";\nthis.menuScreen.append( Locale.get( key ), null );\n\
    ```\n\nInstead, use the key directly in the call as in this example: `this.menuScreen.append(\
    \ Locale.get( \"menu.StartGame\" ), null );`\n\nWhen you have several parameters,\
    \ you need to give the parameters in a variable; otherwise, J2ME Polish is again\
    \ unable to process the call correctly. Listing 7-31 shows the wrong way.\n\n\
    **Listing 7-31.** *Another Invalid Locale Call, Because Parameters Are Given Directly*\n\
    \n```\n// never do this:\nthis.menuScreen.append( Locale.get( \"game.StartMessage\"\
    \ ), new String[]{ userName, enemyname } );\n```\n\nInstead, define the parameters\
    \ before the actual call, as shown in Listing 7-32.\n\n**Listing 7-32.** *Corrected\
    \ Locale Call*\n\n```\n// this is fine:\nString[] parameters = new String[]{ userName,\
    \ enemyname };\nthis.menuScreen.append( Locale.get( \"game.StartMessage\" ), parameters\
    \ );\n```\n\n> **Note** In a future version, J2ME Polish will use bytecode processing\
    \ instead of embedding the translations during the preprocessing phase, so then\
    \ you can use any call method that is allowed by Java.\n\n## Localizing the J2ME\
    \ Polish GUI\n\nThe J2ME Polish GUI uses several texts, which can be localized\
    \ using variables. Table 7-3 lists the variables that can be set either in `build.xml`\
    \ or within any `messages.txt` file.\n\n**Table 7-3.** *Localizing the J2ME Polish\
    \ GUI*\n\n| Variable | Default | Explanation |\n|---|---|---|\n| `polish.command.ok`\
    \ | OK | The label for the OK menu item. |\n| `polish.command.cancel` | Cancel\
    \ | The label for the Cancel menu item. |\n| `polish.command.select` | Select\
    \ | The label for the Select menu item, which is used by an implicit or exclusive\
    \ `List` or `ChoiceGroup`. |\n| `polish.command.mark` | Mark | The label for the\
    \ Mark menu item of a multiple `List` or `ChoiceGroup`. |\n| `polish.command.unmark`\
    \ | Unmark | The label for the Unmark menu item of a multiple `List` or `ChoiceGroup`.\
    \ |\n| `polish.command.options` | Options | The label for the menu when several\
    \ menu items are available. |\n| `polish.command.delete` | Delete | The label\
    \ for the Delete menu item, which is used by `TextFields`. |\n| `polish.command.clear`\
    \ | Clear | The label for the Clear menu item, which is used by `TextFields`.\
    \ |\n| `polish.title.input` | Input | The title of the native `TextBox` that is\
    \ used for the actual input of text. This title is used only when the corresponding\
    \ `TextField` item has no label. When the `TextField` has a label, that label\
    \ is used as a title instead. |\n\nListing 7-33 shows the definition of some of\
    \ these variables within a `messages.txt` file.\n\n**Listing 7-33.** *Localizing\
    \ the GUI in a messages.txt File*\n\n```\nvar:polish.command.cancel=Abbruch\n\
    var:polish.command.delete=Löschen\nvar:polish.title.input=Eingabe\n```\n\nYou\
    \ can also define translations for the J2ME Polish GUI in the `build.xml` file.\
    \ This approach is useful only when no complete localization/internationalization\
    \ should take place. Listing 7-34 demonstrates how to define some German translations.\n\
    \n**Listing 7-34.** *Localizing the GUI with the `<variables>` Element*\n\n```\n\
    <j2mepolish>\n  <info\n    license=\"GPL\"\n    name=\"Roadrunner\"\n    vendorName=\"\
    A reader.\"\n    version=\"0.0.1\"\n    jarName=\"${polish.vendor}-${polish.name}-roadrunner.jar\"\
    \n  />\n  <deviceRequirements>\n    <requirement name=\"Identifier\" value=\"\
    Nokia/Series60\" />\n  </deviceRequirements>\n  <build>\n    <midlet class=\"\
    com.apress.roadrunner.Roadrunner\" />\n    <variables>\n      <variable name=\"\
    polish.command.cancel\" value=\"Abbruch\" />\n      <variable name=\"polish.command.delete\"\
    \ value=\"L&ouml;schen\" />\n      <variable name=\"polish.title.input\" value=\"\
    Eingabe\" />\n    </variables>\n  </build>\n  <emulator />\n</j2mepolish>\n```\n\
    \n## Integrating Third-Party APIs\n\nSometimes you need a third-party API in a\
    \ project. You have to distinguish between APIs that are available as source code\
    \ and APIs that are available in binary-only form. Another case is the so-called\
    \ optional APIs that are already preinstalled on your target devices, such as\
    \ the Wireless Messaging API or the Location API. Depending on the type of API,\
    \ different actions are required for integrating the API.\n\n> **Note** Do not\
    \ forget to add the library to the classpath of your project within your IDE.\n\
    \n### Integrating Source Code Third-Party APIs\n\nWhen a third-party API is available\
    \ in source code, you can integrate it by modifying the `sourceDir` attribute\
    \ of the `<build>` element in the `build.xml` file. Consider the case where your\
    \ normal application code is in the `source/src` directory and the source code\
    \ of the third-party API is in the `source/thirdparty` folder. You can now add\
    \ the third-party API with the `<sources>` element, as shown in Listing 7-35.\
    \ As most other elements, you can use `if` and `unless` conditions for your sources.\n\
    \n**Listing 7-35.** *Integrating a Source Code Third-Party API*\n\n```\n<j2mepolish>\n\
    \  <info\n    license=\"GPL\"\n    name=\"Roadrunner\"\n    vendorName=\"A reader.\"\
    \n    version=\"0.0.1\"\n    jarName=\"${polish.vendor}-${polish.name}-roadrunner.jar\"\
    \n  />\n  <deviceRequirements>\n    <requirement name=\"Identifier\" value=\"\
    Nokia/Series60\" />\n  </deviceRequirements>\n  <build>\n    <sources>\n     \
    \ <source dir=\"source/src\" />\n      <source dir=\"source/thirdparty\" />\n\
    \      <source dir=\"source/s60\" if=\"polish.group.Series60\" />\n    </sources>\n\
    \    <midlet class=\"com.apress.roadrunner.Roadrunner\" />\n  </build>\n  <emulator\
    \ />\n</j2mepolish>\n```\n\n> **Tip** Usually you do not need to specify where\
    \ to find the sources, since J2ME Polish finds the source code automatically when\
    \ it is situated in either the `source/src` or `src` folder.\n\n### Integrating\
    \ Binary Third-Party APIs\n\nWhen a third-party API is available only in binary\
    \ form, you can integrate it with the `<libraries>` element of the `<build>` section\
    \ in your `build.xml` script. This element can point to JAR or ZIP files or to\
    \ a directory containing third-party libraries (either JAR files, ZIP files, or\
    \ classfiles). When the libraries are situated in the `${polish.home}/import`\
    \ folder, only the names of the libraries need to be given (instead of specifying\
    \ the full path).\n\nIn Listing 7-36, the binary library TinyLine is integrated\
    \ (http://www.tinyline.com). TinyLine provides specialized libraries for MIDP\
    \ 2.0, Nokia Series 60, and Personal Profile J2ME devices, so you need make sure\
    \ to include the correct library by using `if` or `unless` attributes.\n\n**Listing\
    \ 7-36.** *Integrating the TinyLine Binary Third-Party Package*\n\n```\n<j2mepolish>\n\
    \  <info\n    license=\"GPL\"\n    name=\"Roadrunner\"\n    vendorName=\"A reader.\"\
    \n    version=\"0.0.1\"\n    jarName=\"${polish.vendor}-${polish.name}-roadrunner.jar\"\
    \n  />\n  <deviceRequirements>\n    <requirement name=\"Identifier\" value=\"\
    Nokia/Series60\" />\n  </deviceRequirements>\n  <build>\n    <midlet class=\"\
    com.apress.roadrunner.Roadrunner\" />\n    <libraries>\n      <library file=\"\
    thirdparty/tinylines60.zip\"\n        if=\"polish.group.Series60 and not polish.midp2\"\
    \ />\n      <library file=\"thirdparty/tinylinemidp2.zip\"\n        if=\"polish.midp2\"\
    \ />\n      <library file=\"thirdparty/tinyline.zip\"\n        if=\"polish.midp1\
    \ and not polish.group.Series60\" />\n    </libraries>\n  </build>\n  <emulator\
    \ />\n</j2mepolish>\n```\n\n### Integrating Device APIs\n\nMany devices provide\
    \ additional optional APIs. A popular example is the Nokia UI API, which provides\
    \ additional graphic and sound functions. When a device supports a specific API,\
    \ this is noted with the `JavaPackage` capability of that device in the `${polish.home}/devices.xml`\
    \ file. Assuming that you want to use the Motorola Phonebook API, you just need\
    \ to copy the corresponding library file `phonebook.jar` or `phonebook.zip` into\
    \ the `${polish.home}/import` folder. It will then be used automatically for the\
    \ devices that support the Phonebook API.\n\nJ2ME Polish already provides a large\
    \ number of APIs ranging from MIDP 1.0 to vendor-specific APIs such as the Nokia\
    \ UI API or the Siemens Extension API.\n\nYou can modify the `${polish.home}/apis.xml`\
    \ file for specifying different library names, paths, or aliases. Chapter 6 describes\
    \ this in more detail.\n\n> **Caution** You cannot use optional and vendor-specific\
    \ APIs for devices that do not support them. So, if a device does not support\
    \ the Wireless Messaging API, you cannot use that API for your application build\
    \ for that device. Use preprocessing and the `polish.api.[api-name]` preprocessing\
    \ symbol for making the necessary adjustments in your application.\n\n## Obfuscating\
    \ Applications\n\nObfuscating is vitally important for J2ME applications not only\
    \ because it makes reverse engineering more difficult but also because the application\
    \ size is decreased—in some cases quite drastically. Obfuscators usually strip\
    \ away any classes, methods, and fields that are not used by the application.\
    \ In a further step, they rename all remaining classes. Because of this functionality,\
    \ you need to define \"entry points\" that are not scrambled. J2ME Polish automatically\
    \ adds all MIDlets that are defined with the `<midlet>` element to the list of\
    \ entry points. With the nested `<keep>` element, you can define additional classes\
    \ that must be kept, even though they are not used directly. This is the case\
    \ for all classes you load with the `Class.forName( String )` mechanism, for example.\
    \ Most obfuscators also accept additional parameters with nested `<parameter>`\
    \ elements. Listing 7-37 demonstrates how to use the ProGuard obfuscator, in which\
    \ the bytecode optimization of ProGuard is deactivated.\n\n**Listing 7-37.** *Using\
    \ the ProGuard Obfuscator*\n\n```\n<j2mepolish>\n  <info\n    license=\"GPL\"\n\
    \    name=\"Roadrunner\"\n    vendorName=\"A reader.\"\n    version=\"0.0.1\"\n\
    \    jarName=\"${polish.vendor}-${polish.name}-roadrunner.jar\"\n  />\n  <deviceRequirements>\n\
    \    <requirement name=\"Identifier\" value=\"Nokia/Series60\" />\n  </deviceRequirements>\n\
    \  <build>\n    <midlet class=\"com.apress.roadrunner.Roadrunner\" />\n    <obfuscator\
    \ name=\"ProGuard\" >\n      <keep class=\"com.apress.roadrunner.DynamicClass\"\
    \ />\n      <parameter name=\"optimize\" value=\"false\" />\n    </obfuscator>\n\
    \  </build>\n  <emulator />\n</j2mepolish>\n```\n\n### Using the Default Package\n\
    \nWhen you place your MIDlet and its related helper classes into different packages,\
    \ you are maintaining a good architecture, but you might need to sacrifice some\
    \ JAR size for that. J2ME Polish can move all your classes into the empty default\
    \ package, which reduces the size of your JAR file. You can enable this option\
    \ with any obfuscator by setting the `useDefaultPackage` option of the obfuscator\
    \ to `true`: `<obfuscator name=\"ProGuard\" useDefaultPackage=\"true\" />`.\n\n\
    > **Caution** Use `import` statements instead of fully qualified class names in\
    \ your code; otherwise, J2ME Polish will not be able to resolve the imports correctly.\
    \ So, *do not* extend a class without importing it. This code will not work: `class\
    \ MyClass extends com.company.package.OtherClass`. But this code is fine: `import\
    \ com.company.package.OtherClass; class MyClass extends OtherClass`.\n\n### Combining\
    \ Several Obfuscators\n\nYou can combine several obfuscators at once just by specifying\
    \ several `<obfuscator>` elements. When you use the `<keep>` subelement, you need\
    \ to specify in only one of the `<obfuscator>` elements. J2ME Polish will then\
    \ use the obfuscated output of one obfuscator as input for the following obfuscator.\
    \ Listing 7-38 uses the ProGuard obfuscator together with the DashO obfuscator.\
    \ Whether combining several obfuscators minimizes the JAR size depends on both\
    \ the obfuscator and your application. In some cases, you might even end up with\
    \ bigger JAR files than with using one obfuscator only. Your mileage may vary.\
    \ You can obtain the DashO obfuscator from http://www.preemptive.com.\n\n**Listing\
    \ 7-38.** *Combining Several Obfuscators*\n\n```\n<j2mepolish>\n  <info\n    license=\"\
    GPL\"\n    name=\"Roadrunner\"\n    vendorName=\"A reader.\"\n    version=\"0.0.1\"\
    \n    jarName=\"${polish.vendor}-${polish.name}-roadrunner.jar\"\n  />\n  <deviceRequirements>\n\
    \    <requirement name=\"Identifier\" value=\"Nokia/Series60\" />\n  </deviceRequirements>\n\
    \  <build>\n    <midlet class=\"com.apress.roadrunner.Roadrunner\" />\n    <obfuscator\
    \ name=\"ProGuard\" />\n    <obfuscator name=\"Dasho\" />\n  </build>\n  <emulator\
    \ />\n</j2mepolish>\n```\n\n> **Note** The appendix lists all supported obfuscators.\
    \ You can integrate unsupported obfuscators by using the `antcall` mechanism,\
    \ by which you can call another target within your `build.xml` script: `<obfuscator\
    \ name=\"antcall\" target=\"obfuscate\" />`. Chapter 13 provides more details\
    \ about this extension mechanism.\n\n## Debugging Applications\n\nJ2ME Polish's\
    \ support for multiple devices, locales, and obfuscators is great for creating\
    \ applications, but it is a bit heavyweight for the development phase. Fortunately,\
    \ you can choose a lightweight approach by tweaking `build.xml` a bit.\n\nOne\
    \ strategy for allowing fast builds is to use conditional `<deviceRequirements>`,\
    \ `<localization>`, and `<obfuscation>` elements, which can be enabled and disabled\
    \ by setting Ant properties.\n\nAnother strategy is to use J2ME Polish in the\
    \ compiler mode. In that case, J2ME Polish only preprocesses, compiles, and possibly\
    \ preverifies the application. This approach is useful for integrating J2ME Polish\
    \ with the IDE or with an IDE plug-in such as EclipseME.\n\nIf you want to debug\
    \ an application that is compiled by J2ME Polish, you need to enable the `<debug>`\
    \ element so that debug information such as variable names and line numbers in\
    \ the source code is included in the classfiles. Alternatively, you can provide\
    \ your own `<compiler>` element.\n\nIn the following sections, I elaborate on\
    \ these strategies.\n\n### Using Conditions\n\nWith conditions you can disable\
    \ and enable elements in `build.xml`. You can use the Ant property `test` to differentiate\
    \ between the test mode and the \"real\" build mode, in which everything is activated.\
    \ Listing 7-39 provides a blueprint for your `build.xml` file.\n\n**Listing 7-39.**\
    \ *Using Conditions in J2ME Polish*\n\n```\n<project name=\"roadrunner\" default=\"\
    j2mepolish\">\n  <!-- define the installation folder of J2ME Polish -->\n  <property\
    \ name=\"polish.home\" location=\"C:\\programs\\J2ME-Polish\" />\n  <!-- define\
    \ the installation folder of the WTK -->\n  <property name=\"wtk.home\" location=\"\
    C:\\WTK22\" />\n  <!-- define the J2ME Polish task, classpath on one line please\
    \ -->\n  <taskdef name=\"j2mepolish\"\n    classname=\"de.enough.polish.ant.PolishTask\"\
    \n    classpath=\"${polish.home}/import/enough-j2mepolish-build.jar:\n       \
    \        ${polish.home}/import/jdom.jar:\n               ${polish.home}/import/proguard.jar\"\
    />\n  <!-- activate the test mode -->\n  <target name=\"test\">\n    <property\
    \ name=\"test\" value=\"true\" />\n    <property name=\"work.dir\" value=\"build/test\"\
    \ />\n  </target>\n  <!-- normal settings -->\n  <target name=\"init\">\n    <property\
    \ name=\"test\" value=\"false\" />\n    <property name=\"work.dir\" value=\"build/real\"\
    \ />\n  </target>\n  <!-- start the build with J2ME Polish -->\n  <target name=\"\
    j2mepolish\" depends=\"init\">\n    <j2mepolish>\n      <info\n        license=\"\
    GPL\"\n        name=\"Roadrunner\"\n        vendorName=\"A reader.\"\n       \
    \ version=\"0.0.1\"\n        jarName=\"${polish.vendor}-${polish.name}-${polish.locale}-app.jar\"\
    \n      />\n      <deviceRequirements if=\"test\">\n        <requirement name=\"\
    Identifier\" value=\"Nokia/Series60\" />\n      </deviceRequirements>\n      <deviceRequirements\
    \ unless=\"test\">\n        <requirement name=\"JavaPlatform\" value=\"MIDP/2.0+\"\
    \ />\n      </deviceRequirements>\n      <build workDir=\"${work.dir}\" >\n  \
    \      <midlet class=\"com.apress.roadrunner.Roadrunner\" />\n        <resources\n\
    \          dir=\"resources\"\n          excludes=\"*.definition\"\n        >\n\
    \          <localization locales=\"de, en, fr_CA\" unless=\"test\" />\n      \
    \    <localization locales=\"en\" if=\"test\" />\n        </resources>\n     \
    \   <debug level=\"error\" if=\"test\" />\n        <obfuscator name=\"ProGuard\"\
    \ unless=\"test\" />\n      </build>\n      <emulator if=\"test\" />\n    </j2mepolish>\n\
    \  </target>\n  <target name=\"clean\">\n    <delete dir=\"build\" />\n    <delete\
    \ dir=\"dist\" />\n  </target>\n</project>\n```\n\nIn this example, you have the\
    \ `test` target that sets the Ant property `test` to `true` and sets the working\
    \ directory to `build/test`. This is recommended because you are also enabling\
    \ the `<debug>` mode. The `<j2mepolish>` target depends on the `<init>` target,\
    \ which sets the `test` property to `false` and defines another working directory.\
    \ When the `<test>` target is executed first, these properties cannot be changed\
    \ by the `<init>` target anymore:\n\n```\n> ant test j2mepolish\n```\n\nThe elements\
    \ `<deviceRequirements>`, `<localization>`, `<debug>`, `<obfuscator>`, and `<emulator>`\
    \ all depend on the `test` property. When it is set to `true`, J2ME Polish will\
    \ compile the application only for the \"Nokia/Series60\" device, use only the\
    \ English `en` locale, enable the debug mode, skip the obfuscation, and start\
    \ the emulator after the build. When the `test` property is `false`, J2ME Polish\
    \ compiles the application for all MIDP 2.0 devices; uses the `en`, `de`, and\
    \ `fr_CA` locales; disables the debug mode; and obfuscates the application.\n\n\
    ### Using J2ME Polish As a Compiler\n\nYou can use J2ME Polish as a compiler,\
    \ in which case only the preprocessing, the compilation, and possibly the preverification\
    \ steps are executed. This can be useful for interacting with available J2ME plug-ins\
    \ such as EclipseME or J2ME-enabled IDEs such as NetBeans.\n\nThe compiler mode\
    \ is activated using the `compilerMode`, `compilerDestDir`, and `compilerModePreverify`\
    \ attributes, as shown in Listing 7-40.\n\n**Listing 7-40.** *Using J2ME Polish\
    \ As a Compiler*\n\n```\n<j2mepolish>\n  <info\n    license=\"GPL\"\n    name=\"\
    Roadrunner\"\n    vendorName=\"A reader.\"\n    version=\"0.0.1\"\n    jarName=\"\
    ${polish.vendor}-${polish.name}-roadrunner.jar\"\n  />\n  <deviceRequirements>\n\
    \    <requirement name=\"Identifier\" value=\"Generic/midp1\" />\n  </deviceRequirements>\n\
    \  <build\n    compilerMode=\"true\"\n    compilerModePreverify=\"true\"\n   \
    \ compilerDestDir=\"preverified\"\n  >\n    <midlet class=\"com.apress.roadrunner.Roadrunner\"\
    \ />\n  </build>\n  <emulator />\n</j2mepolish>\n```\n\nJ2ME Polish sets the `javac-target`\
    \ to either 1.1 or 1.2 depending on the used WTK. You can also set the target\
    \ directly by specifying the `javacTarget` attribute of the `<build>` element.\
    \ Debug information is not added unless the debugging mode is enabled with the\
    \ `<debug>` element.\n\nIf you need full control of the compiler settings, you\
    \ can also use the `<compiler>` element, which is a nested element of the `<build>`\
    \ section. Listing 7-41 demonstrates how to use the `<compiler>` element.\n\n\
    **Listing 7-41.** *Using the `<compiler>` Element*\n\n```\n<build\n  compilerMode=\"\
    true\"\n  compilerModePreverify=\"true\"\n  compilerDestDir=\"preverified\"\n\
    >\n  <midlet class=\"com.apress.roadrunner.Roadrunner\" />\n  <compiler\n    compiler=\"\
    jikes\"\n    debug=\"true\"\n    debuglevel=\"lines,vars,source\"\n    optimize=\"\
    true\"\n  />\n</build>\n```\n\n> **Note** You can use the `<compiler>` element\
    \ independently of the compiler mode; it supports all attributes and elements\
    \ of the original Ant `<javac>` task.\n\n## Summary\n\nIn this chapter, you learned\
    \ how to build applications with Ant and J2ME Polish. You can equip your applications\
    \ with specific resources without touching the source code, use obfuscators to\
    \ minimize the application size, localize your application, and integrate a third-party\
    \ API.\n\nIn the next chapter, you will explore the possibilities of preprocessing.\
    \ In contrast to the packaging solutions, preprocessing is used on the source\
    \ code level of your application.\n\n---\n\n# Chapter 8: Preprocessing\n\n**In\
    \ this chapter:**\n\n- Learn why J2ME Polish uses preprocessing for its J2ME APIs.\n\
    - Control preprocessing with directives.\n- Use the standard preprocessing variables\
    \ supported by J2ME Polish.\n- Define your own variables and symbols in J2ME Polish.\n\
    - Transform variable values using property functions.\n- Explore some practical\
    \ applications of preprocessing.\n\nOne of the greatest challenges of developing\
    \ J2ME applications is to adjust them to work on many different devices. Along\
    \ with the detailed device database you learned about in Chapter 6, J2ME Polish\
    \ provides a powerful preprocessor to help you meet this challenge. Preprocessing\
    \ is the key to optimizing your application without losing portability. This chapter\
    \ equips you with the necessary knowledge to adjust your application to different\
    \ environments, circumvent known issues, and exploit device-specific options.\n\
    \n## Why Preprocessing?\n\nOften, you need to use device-specific code to create\
    \ optimal applications. For example, on Nokia's MIDP 1.0 devices, you can play\
    \ back sounds and use a full-screen mode, but only when you use Nokia's UI API.\
    \ But when you use this API, you cannot run your application on other handsets.\
    \ So what can you do?\n\nJava allows you to load classes dynamically. So, in theory,\
    \ you could create several versions of your classes and load the correct one dynamically\
    \ during the runtime of your application. Unfortunately, this quite drastically\
    \ reduces the performance of your application and increases its size at the same\
    \ time. Both results are not acceptable in the resource-constrained J2ME world.\
    \ Also, some devices do not accept any applications that refer to unknown classes,\
    \ even when those classes are loaded only via Java's reflection mechanism.\n\n\
    Another approach is to create a separate project for each target device, or at\
    \ least for each device type. This solves the performance and size problems, but\
    \ leaves you with a huge maintenance chore. Just imagine the work to implement\
    \ a new feature in all those separate projects!\n\nA third approach is to use\
    \ `static final` variables and the compiler to adjust your code. You can use normal\
    \ `if` branches like `if (Configuration.IS_NOKIA_SERIES60)` to distinguish between\
    \ different configurations. When `Configuration.IS_NOKIA_SERIES60` is a `final\
    \ static boolean` field and `false`, the compiler can eliminate the following\
    \ dead code during the compile phase. The main problem here is that you need to\
    \ create and include one `Configuration` class for each target device, and you\
    \ need to integrate it somehow. Another problem is that you can use `if` branches\
    \ only in the normal code, so you cannot take this approach for importing different\
    \ APIs or using different fields, for example. Also, you need to make sure to\
    \ recompile all classes whenever you change the `Configuration` class.\n\nA more\
    \ powerful solution is to use *aspects* for adjusting your application. In aspect-oriented\
    \ programming, you code a plain-vanilla application and use aspects to inject\
    \ additional code at specific positions in your source code, called *pointcuts*.\
    \ Aspect-oriented development is quite powerful and allows you to do some amazing\
    \ things, like changing the hierarchy of classes. However, this new paradigm is\
    \ also enormously complex and difficult to learn. On the positive side, you end\
    \ up with a very clean and easy-to-understand application. On the other hand,\
    \ you need to provide a different set of aspects for each target device, meaning\
    \ that you need to split up your application project again.\n\n> **Tip** In aspect-oriented\
    \ development, you distinguish between the main cause of your application (for\
    \ example, a banking application) and its secondary purposes (for example, to\
    \ authenticate its users securely). Refer to http://en.wikipedia.org/wiki/Aspect-oriented_programming\
    \ to learn more about aspect-oriented development. The AspectJ project (http://eclipse.org/aspectj)\
    \ is a popular solution for the Java world.\n\nA simple, yet effective, solution\
    \ is to *preprocess* your application. Preprocessing changes your application\
    \ code before it is compiled. You control this process with preprocessing directives,\
    \ symbols, and variables. J2ME Polish not only includes a powerful preprocessor,\
    \ but it also provides a standardized way to query and use the capabilities of\
    \ the current target device. Thanks to the integrated device database, you can\
    \ access the detailed configurations of more than 300 different handsets out of\
    \ the box, so you don't need to create and maintain your own configurations. Preprocessing\
    \ allows you to adjust your application to different devices and configurations\
    \ without degrading runtime performance, creating incompatibilities, or splitting\
    \ up your project.\n\nPreprocessing sounds more complicated than it actually is.\
    \ Listing 8-1 shows a code snippet that uses preprocessing for determining how\
    \ a sound can be played.\n\n**Listing 8-1.** *Playing Sound Only When the MMAPI\
    \ or Nokia's UI API Is Available*\n\n```\npublic void playAudio() {\n  //#if polish.api.mmapi\
    \ || polish.midp2\n    try {\n      Player player = Manager.createPlayer(\n  \
    \      getClass().getResourceAsStream(\"/music.mid\"), \"audio/midi\");\n    \
    \  player.realize();\n      player.prefetch();\n      player.start();\n    } catch\
    \ (Exception e) {\n      //#debug error\n      System.out.println(\"Unable to\
    \ start audio playback\" + e);\n    }\n  //#elif polish.api.nokia-ui\n    try\
    \ {\n      byte[] soundData = loadSoundData();\n      Sound sound = new Sound(\
    \ soundData, Sound.FORMAT_TONE );\n      sound.play( 1 );\n    } catch (IllegalArgumentException\
    \ e) {\n      //#debug error\n      System.out.println(\"Unable to play Nokia\
    \ sound\" + e );\n    }\n  //#else\n    System.out.println(\"No sound playback\
    \ supported.\");\n  //#endif\n}\n```\n\nWhen the device supports the MMAPI or\
    \ the MIDP 2.0 profile, you can use the `javax.microedition.media.Player` for\
    \ the audio playback. The statement `//#if polish.api.mmapi || polish.midp2` tests\
    \ these requirements. Alternatively, you can use Nokia's UI API for playing sounds,\
    \ so the code tests this option in the `//#elif polish.api.nokia-ui` statement.\n\
    \nListing 8-2 demonstrates how you can use the J2ME Polish device database for\
    \ checking the capabilities of the current target device. For each API that the\
    \ device supports, the preprocessing symbol `polish.api.[api-name]` is defined.\
    \ If the device supports the MIDP 1.0 platform, the `polish.midp1` symbol is defined.\
    \ Similarly, the `polish.midp2` preprocessing symbol is defined when the MIDP\
    \ 2.0 platform is supported by the target device.\n\n**Listing 8-2.** *Preprocessed\
    \ Code for Devices That Support Nokia's UI API*\n\n```\npublic void playAudio()\
    \ {\n  //#if polish.api.mmapi || polish.midp2\n    //# try {\n    //#   Player\
    \ player = Manager.createPlayer(\n    //#     getClass().getResourceAsStream(\"\
    /music.mid\"), \"audio/midi\");\n    //#   player.realize();\n    //#   player.prefetch();\n\
    \    //#   player.start();\n    //# } catch (Exception e) {\n    //#   //#debug\
    \ error\n    //#   System.out.println(\"Unable to start audio playback\" + e);\n\
    \    //# }\n  //#elif polish.api.nokia-ui\n    try {\n      byte[] soundData =\
    \ loadSoundData();\n      Sound sound = new Sound( soundData, Sound.FORMAT_TONE\
    \ );\n      sound.play( 1 );\n    } catch (IllegalArgumentException e) {\n   \
    \   //#debug error\n      System.out.println(\"Unable to play Nokia sound\" +\
    \ e );\n    }\n  //#else\n    //# System.out.println(\"No sound playback supported.\"\
    );\n  //#endif\n}\n```\n\nSo what happens when the device supports only Nokia's\
    \ UI API, and not the MMAPI nor the MIDP 2.0 standard? In that case, J2ME Polish\
    \ comments out all the code for the unavailable capabilities. Only the code between\
    \ the `//#elif polish.api.nokia-ui` and the `//#else` directive is left active,\
    \ as in Listing 8-2.\n\nJ2ME Polish calls the preprocessor automatically for you,\
    \ by the way. So you need to include only the necessary preprocessing statements\
    \ in your code. The rest is taken care of by J2ME Polish.\n\n## Preprocessing\
    \ Directives\n\nJ2ME Polish equips you with powerful preprocessing directives\
    \ for controlling the preprocessing phase. All directives start with the standard\
    \ Java line comment characters (double slash) followed by a hash mark, so that\
    \ they don't confuse your IDE and Java compiler. Table 8-1 lists all of the supported\
    \ preprocessing directives. These are described in detail in the following sections.\n\
    \n> **Note** You can also implement your own preprocessing directives, as described\
    \ in Chapter 13.\n\n**Table 8-1.** *J2ME Preprocessing Directives*\n\n| Directive\
    \ | Description | Example |\n|---|---|---|\n| `//#ifdef` | Checks if a single\
    \ preprocessing symbol is defined | `//#ifdef polish.api.mmapi` |\n| `//#ifndef`\
    \ | Checks if a single preprocessing symbol is not defined | `//#ifndef polish.api.mmapi`\
    \ |\n| `//#else` | Branches in an `//#ifdef` or `//#if` directive | `//#else`\
    \ |\n| `//#elifdef` | Branches and checks for another single preprocessing symbol\
    \ | `//#elifdef polish.midp2` |\n| `//#elifndef` | Branches and checks whether\
    \ another single preprocessing symbol is not defined | `//#elifndef polish.midp2`\
    \ |\n| `//#endif` | Ends an `//#ifdef` or `//#if` block | `//#endif` |\n| `//#if`\
    \ | Checks several preprocessing symbols or compares preprocessing variables |\
    \ `//#if polish.api.mmapi \\|\\| polish.midp2` |\n| `//#elif` | Branches and checks\
    \ for other preprocessing symbols or preprocessing variables | `//#elif polish.BitsPerPixel\
    \ > 10` |\n| `//#condition` | Includes or excludes a complete file | `//#condition\
    \ polish.usePolishGui \\|\\| polish.midp2` |\n| `//#define` | Defines temporary\
    \ preprocessing symbols or variables | `//#define tmp.useSound` |\n| `//#undefine`\
    \ | Removes defined preprocessing symbols or variables | `//#undefine tmp.useSound`\
    \ |\n| `//#` | Comments out a statement within an `//#if` or `//#ifdef` block\
    \ | `//# return true;` |\n| `//#=` | Inserts preprocessing variables | `//#= int\
    \ screenWidth = ${polish.ScreenWidth};` |\n| `//#debug` | Uses the logging framework\
    \ of J2ME Polish | `//#debug error` |\n| `//#foreach` | Uses several values of\
    \ a preprocessing variable | `//#foreach format in polish.SoundFormat` |\n| `//#next`\
    \ | Ends a `#foreach` block | `//#next format` |\n| `//#style` | Assigns a J2ME\
    \ Polish CSS style to the following item or screen | `//#style importantText`\
    \ |\n| `//#include` | Includes code fragments | `//#include ${polish.source}/includes/audioplayback.txt`\
    \ |\n| `//#message` | During the build phase, prints out messages | `//#message\
    \ preprocessing for ${polish.Identifier}` |\n| `//#todo` | During the build phase,\
    \ prints out messages that automatically include the name and line of the source\
    \ file | `//#todo implement playSound()` |\n\nThe most important directives are\
    \ the `#if` and the `#=` directives, so let's look at those first.\n\n### Branching\
    \ Your Code\n\nIf-then-else branches are well-known programming constructs. The\
    \ `#if` directive and its various relatives and relations allow you to adjust\
    \ your source code to different handsets and configurations very effectively.\
    \ The possibilities of these adjustments are endless. You can easily create tailor-made\
    \ applications that use device-specific APIs, circumvent known issues of your\
    \ target devices, or change the application flow depending on the configuration.\n\
    \n#### Checking for Single Preprocessing Symbols\n\nUse the `#ifdef`, `#ifndef`,\
    \ `#elifdef`, `#elifndef`, `#else`, and `#endif` directives to check for single\
    \ preprocessing symbols. A preprocessing symbol is like a Boolean variable: either\
    \ it is defined (true) or it is not defined (false). Preprocessing symbols are\
    \ defined in the device database with the `<features>` of a device, such as `polish.hasPointerEvents`,\
    \ and indirectly by device `<capability>` elements, such as `polish.CanvasSize:defined`\
    \ and `polish.api.mmapi`. You can define your own project-specific symbols by\
    \ using the `symbols` attribute of the `<build>` section in the `build.xml` file.\
    \ Table 8-2 explains the meaning of the directives.\n\n**Table 8-2.** *Directives\
    \ for Checking Single Preprocessing Symbols*\n\n| Directive | Meaning | Explanation\
    \ |\n|---|---|---|\n| `//#ifdef [symbol]` | if `[symbol]` is defined | The symbol\
    \ `[symbol]` needs to be defined, when the next section should be compiled. |\n\
    | `//#ifndef [symbol]` | if `[symbol]` is not defined | The symbol `[symbol]`\
    \ must not be defined, when the next section should be compiled. |\n| `//#else`\
    \ | else | When the corresponding `#if` clause failed, the following section will\
    \ be compiled (and the other way around). |\n| `//#elifdef [symbol]` | else if\
    \ `[symbol]` is defined | The symbol `[symbol]` needs to be defined and the previous\
    \ section needs to be false, when the next section should be compiled. |\n| `//#elifndef\
    \ [symbol]` | else if `[symbol]` is not defined | The symbol `[symbol]` must not\
    \ be defined and the previous section needs to be false, when the next section\
    \ should be compiled. |\n| `//#endif` | End of the if block | End of every `#ifdef`\
    \ and `#ifndef` block. |\n\nEvery `//#ifdef` or `//#ifndef` directive needs to\
    \ be closed by an `//#endif` statement. Use the `//#else`, `//#elifdef`, and `//#elifndef`\
    \ directives to branch within an `//#ifdef` or `//#ifndef` block. Listing 8-3\
    \ shows an example of how to use the `#ifdef` directive to include a menu item\
    \ on devices that have a camera.\n\n**Listing 8-3.** *Including an Additional\
    \ Menu Item Only for Devices with a Camera*\n\n```\nthis.menuScreen = new List(\
    \ \"Menu\", List.IMPLICIT );\nthis.menuScreen.append(\"Load Photos\", null );\n\
    this.menuScreen.append(\"View Photos\", null );\n//#ifdef polish.hasCamera\n \
    \ this.menuScreen.append(\"Create Photo\", null );\n//#endif\n```\n\n#### Checking\
    \ for Multiple Symbols and Comparing Variables\n\nOften, you need to check for\
    \ several symbols at once or compare variables in your preprocessing code. You\
    \ can do all that with the `#if`, `#elif`, `#else`, and `#endif` directives. Table\
    \ 8-3 explains the meaning of these directives.\n\n**Table 8-3.** *Directives\
    \ for Checking Several Preprocessing Symbols and Comparing Variables*\n\n| Directive\
    \ | Meaning | Explanation |\n|---|---|---|\n| `//#if [term]` | if `[term]` is\
    \ true | The specified term must be true, if the next section should be compiled.\
    \ |\n| `//#else` | else | When the previous `if` clause failed, the following\
    \ section will be compiled (and the other way around). |\n| `//#elif [term]` |\
    \ else if `[term]` is true | The specified term needs to be true and the previous\
    \ section needs to be false, when the next section should be compiled. |\n| `//#endif`\
    \ | End of the if block | End of every `#if` block. |\n\nYou have already seen\
    \ the `#if` directive in action in Listings 8-1 and 8-2. You can use `#if` and\
    \ `#elif` for checking single preprocessing symbols, too. The only difference\
    \ is that `#ifdef` directives are processed slightly faster during the build phase,\
    \ but on today's high-speed computers, you probably won't notice the difference.\n\
    \nYou can use the normal Boolean operators (`&&`, `||`, `!`, and `^`) and parentheses\
    \ for evaluating complex terms like this:\n\n```\n//#if (polish.api.mmapi || polish.api.nokia-ui)\
    \ && !polish.hasPointerEvents\n```\n\nThe arguments for Boolean operators are\
    \ symbols that are true when they are defined and false otherwise. Table 8-4 explains\
    \ these operators. If you prefer, you can also use the written operators `and`,\
    \ `or`, `not`, and `xor` instead of the symbols. This is especially handy if you\
    \ use or define such terms in your `build.xml` file, because some characters,\
    \ like `&`, need to be XML-encoded (for example, to `&amp`).\n\n**Table 8-4.**\
    \ *Boolean Operators for Evaluating Terms*\n\n| Boolean Operator | Meaning | Explanation\
    \ |\n|---|---|---|\n| `&&` or `and` | And | Both arguments/symbols need to be\
    \ defined: `true && true = true`, `true && false = false`, `false && true = false`,\
    \ `false && false = false` |\n| `\\|\\|` or `or` | Or | At least one argument/symbol\
    \ must be defined: `true \\|\\| true = true`, `true \\|\\| false = true`, `false\
    \ \\|\\| true = true`, `false \\|\\| false = false` |\n| `^` or `xor` | Exclusive\
    \ or (xor) | Only and at least one argument/symbol must be defined: `true ^ false\
    \ = true`, `false ^ true = true`, `true ^ true = false`, `false ^ false = false`\
    \ |\n| `!` or `not` | Not | The argument/symbol must not be defined: `! false\
    \ = true`, `! true = false` |\n\nYou can also compare variables and constants\
    \ in the `#if` directive, as demonstrated by Listing 8-4.\n\n**Listing 8-4.**\
    \ *Showing an Animation Only When the Device Has at Least 65,000 Colors*\n\n```\n\
    public void startApp() {\n  //#if polish.api.mmapi && (polish.BitsPerColor >=\
    \ 16)\n    showSplashVideo();\n  //#else\n    showSplashImage();\n  //#endif\n\
    }\n```\n\nCompare variables with the `==`, `!=`, `>`, `<`, `<=`, and `>=` comparators.\
    \ Arguments for the comparators are variables or constants. A term can include\
    \ both comparators and Boolean operators, if the sections are separated by parentheses.\
    \ Table 8-5 explains the available comparators.\n\n**Table 8-5.** *Comparators\
    \ for Evaluating Terms*\n\n| Comparator | Meaning | Explanation | Example |\n\
    |---|---|---|---|\n| `==` | Equal to | The left and the right argument must be\
    \ equal. Integers and strings can be compared | `8 == 8 = true`, `Nokia == Nokia\
    \ = true`, `//#if polish.BitsPerPixel == 8`, `//#if polish.vendor == Nokia` |\n\
    | `!=` | Not equal to | The left and the right argument must not be equal, integers\
    \ and strings can be compared | `8 != 8 = false`, `Nokia != Sony-Ericsson = true`,\
    \ `//#if polish.BitsPerPixel != 8`, `//#if polish.vendor != Nokia` |\n| `>` |\
    \ Greater than | The left argument must be greater than the right one. Only integers\
    \ can be compared | `8 > 8 = false`, `16 > 8 = true`, `//#if polish.BitsPerPixel\
    \ > 8` |\n| `<` | Less than | The left argument must be smaller than the right\
    \ one. Only integers can be compared | `8 < 8 = false`, `8 < 16 = true`, `//#if\
    \ polish.BitsPerPixel < 8` |\n| `>=` | Greater than or equal to | The left argument\
    \ must be greater than or equal to the right one. Only integers can be compared\
    \ | `8 >= 8 = true`, `16 >= 8 = true`, `//#if polish.BitsPerPixel >= 8` |\n| `<=`\
    \ | Less than or equal to | The left argument must be smaller than or equal to\
    \ the right one. Only integers can be compared | `8 <= 8 = true`, `8 <= 16 = false`,\
    \ `//#if polish.BitsPerPixel <= 8` |\n\nSome variables can use different units.\
    \ The `polish.HeapSize` variable is sometimes defined in kilobytes and sometimes\
    \ in megabytes, for example. You cannot compare such variables using the less-than\
    \ or greater-than comparators, since these comparators accept only numerical values.\
    \ In such situations, you can use property functions. When you use a function\
    \ like this, you precede the function call with a dollar sign (`$`) and enclose\
    \ it within curly parentheses. The following example compares the heap size of\
    \ the current device using the `bytes` function:\n\n```\n//#if ${ bytes( polish.HeapSize\
    \ ) } > 102400\n```\n\nThe `bytes` function will return `-1` when the given memory\
    \ value is dynamic, so it might be necessary to test both cases:\n\n```\n//#if\
    \ ( ${ bytes( polish.HeapSize ) } > 102400 ) or (polish.HeapSize == dynamic)\n\
    ```\n\nYou can also use functions for constants like `100 kb`, which often improves\
    \ the readability of your code:\n\n```\n//#if ${ bytes( polish.HeapSize ) } >\
    \ ${ bytes( 100 kb ) }\n```\n\nYou will find more information about using property\
    \ functions in the \"Managing Variables and Symbols\" section later in this chapter.\n\
    \n#### Excluding or Including Complete Classes\n\nYou can include or exclude complete\
    \ classes or interfaces with the `#condition` directive. J2ME Polish uses this\
    \ functionality to include its GUI wrapper classes only when the J2ME Polish GUI\
    \ is actually used, for example. Another possible scenario is to include an audio\
    \ player only when the target device supports the necessary requirements, as shown\
    \ in Listing 8-5. The `#condition` directive accepts all arguments of the `#if`\
    \ directive, so you can use logical operators and comparators in it. You can place\
    \ the `#condition` directive anywhere in the file, but the recommended position\
    \ is on the very first line.\n\n**Listing 8-5.** *Including the Audio Player Class\
    \ Only When the Device Can Play Sounds*\n\n```\n//#condition polish.api.mmapi\
    \ || polish.api.nokia-ui\npackage com.company.j2me.audio;\n\npublic class AudioPlayer\
    \ {\n  ...\n}\n```\n\n> **Note** When you use `#if` directives to check if the\
    \ device supports audio before you use the `AudioPlayer` class, you don't actually\
    \ need the `#condition` directive, since the obfuscator takes care of removing\
    \ any unused classes. But the `#condition` directive forces you to use these checks\
    \ consistently; otherwise, you will get compiler errors.\n\n### Defining Temporary\
    \ Symbols and Variables\n\nYou can define and remove preprocessing symbols and\
    \ variables in your source code by using the `#define` and `#undefine` directives.\n\
    \nWhen you have a complex preprocessing term, you can test this term once, and\
    \ then set a preprocessing symbol that indicates the result of the term. Later\
    \ on, you need to check only that symbol. Such symbols are valid only in the file\
    \ where they have been defined. To indicate that these symbols are temporary,\
    \ you should start their names with `tmp.`. Listing 8-6 demonstrates how to define\
    \ a temporary symbol and variable.\n\n**Listing 8-6.** *Defining a Symbol and\
    \ a Variable in Your Source Code*\n\n```\n//#if config.useFullScreen && (polish.midp2\
    \ || polish.classes.fullscreen:defined)\n  //#define tmp.useFullScreen\n  //#define\
    \ tmp.message = Hello fullscreen World!\n//#else\n  //#define tmp.message = Hello\
    \ World!\n//#endif\n```\n\nWith the `#undefine` directive, you can remove any\
    \ symbols and variables. Usually, this is not necessary, since J2ME Polish removes\
    \ all temporary symbols and variables automatically when it has finished preprocessing\
    \ the corresponding source file.\n\n> **Tip** You can define conditional variables\
    \ globally by defining them in the `<variables>` section of the `build.xml` file.\
    \ Use the `if` or `unless` attribute for setting them: `<variable name=\"config.Message\"\
    \ value=\"Hello Moto\" if=\"polish.Vendor == Motorola\" />`.\n\n### Including\
    \ Values of Variables in Your Code\n\nYou include the values of preprocessing\
    \ variables in your code by using the `#=` directive. You can include your own\
    \ variables, as well as any device capabilities of the device database. Listing\
    \ 8-7 shows how to use device-specific hard-coded values in your application.\
    \ You can check whether a variable is available by testing the preprocessing symbol\
    \ `[variable-name]:defined`, as in `//#if polish.ScreenWidth:defined`. When you\
    \ include the variable, you need to surround the variable name with a dollar sign\
    \ and curly parentheses, just like the Ant properties in the `build.xml` file.\n\
    \n**Listing 8-7.** *Using Device-Specific Hard-Coded Values*\n\n```\n//#ifdef\
    \ polish.FullCanvasSize:defined\n  //#= final int width = ${polish.FullCanvasWidth};\n\
    \  //#= final int height = ${polish.FullCanvasHeight};\n//#else\n  final int width\
    \ = myCanvas.getWidth();\n  final int height = myCanvas.getHeight();\n//#endif\n\
    ```\n\n### Using Several Variable Values Individually\n\nIn the device database,\
    \ many device capabilities contain several values. For example, the `polish.SoundFormat`,\
    \ `polish.ImageFormat`, and `polish.VideoFormat` capabilities include several\
    \ values, separated by commas. You can access each value individually with the\
    \ `#foreach` directive. The logging framework of J2ME Polish uses this mechanism\
    \ to include all registered log handlers, for example.\n\nIn the `#foreach` directive,\
    \ you define a temporary loop variable that holds each value of the variable:\n\
    \n```\n//#foreach format in polish.SoundFormat\n```\n\nYou need to finish each\
    \ `#foreach` block with the `#next [loop-var-name]` directive:\n\n```\n//#next\
    \ format\n```\n\nYou can loop through any variable that separates its values by\
    \ commas.\n\nListing 8-8 demonstrates how you can loop through all supported sound\
    \ formats of a device.\n\n**Listing 8-8.** *Looping Through All Sound Formats\
    \ of the Target Device*\n\n```\nString format;\n//#foreach format in polish.SoundFormat\n\
    \  format = \"${ lowercase( format ) }\";\n  System.out.println( \"The audio-format\
    \ \" + format + \" is supported.\" );\n//#next format\n```\n\n> **Caution** The\
    \ code fragment within the `#foreach` loop will be copied into the preprocessed\
    \ source code as many times as there are values. This copying process has two\
    \ implications: any variables should be defined outside the loop (but they can\
    \ be set and used within the loop, of course), and when the application is debugged\
    \ or compiled, breakpoints or errors can point to the wrong source code lines.\
    \ If the variable is not defined, the complete block is commented out and not\
    \ compiled at all.\n\nYou can use the `number` property function for retrieving\
    \ the number of separate values within a variable. This is useful when you want\
    \ to fill an array in the `#foreach` loop, for example. Listing 8-9 demonstrates\
    \ a real-world example taken from the logging framework of J2ME Polish.\n\n**Listing\
    \ 8-9.** *Using the `number` Property Function to Determine the Number of Separate\
    \ Entries*\n\n```\n//#if polish.log.handlers:defined\n  private static LogHandler[]\
    \ handlers;\n  static {\n    //#= handlers = new LogHandler[ ${ number( polish.log.handlers\
    \ )} ];\n    int i = 0;\n    //#foreach handler in polish.log.handlers\n     \
    \ //#= handlers[i] = new ${ classname( handler )}();\n      i++;\n    //#next\
    \ handler\n  }\n//#endif\n```\n\n### Including External Code\n\nYou can include\
    \ external code fragments with the `#include` directive. With this mechanism,\
    \ you can create often-used code fragments only once, instead of using copy and\
    \ paste to duplicate functionality.\n\nThe included fragment is loaded relative\
    \ to the location of the `build.xml` file. You can use the `polish.source` variable\
    \ for including files relative to the source directory:\n\n```\n//#include ${polish.source}/includes/standard.java\n\
    ```\n\n### Analyzing the Preprocessing Phase\n\nPreprocessing can be a complex\
    \ business. The `#message` and `#todo` directives help you to follow the preprocessing\
    \ logic by printing out messages during the build process.\n\nYou can include\
    \ any variables in your message. These are replaced by their values when they\
    \ are defined. The `#todo` directive also adds the name of the source code and\
    \ the line number to the output. Listing 8-10 demonstrates the usage and output\
    \ of both directives.\n\n**Listing 8-10.** *Showing Messages During the Build\
    \ Phase*\n\n```\n//#if polish.api.mmapi\n  //#message The device ${polish.Identifier}\
    \ supports the MMAPI.\n//#else\n  //#todo Implement audio playback for device\
    \ ${polish.Identifier}.\n//#endif\n\n// output when you build it for the SE/K700:\n\
    MESSAGE: The device Sony-Ericsson/K700 supports the MMAPI.\n\n// output when you\
    \ build it for Nokia/7650:\nTODO: com.company.package.ClassName line 55: Implement\
    \ audio playback for device Nokia/7650.\n```\n\n### Hiding Statements\n\nHiding\
    \ statements is a somewhat weird application of preprocessing, but nevertheless\
    \ necessary at times so that the IDE is not confused.\n\nSometimes you have several\
    \ `return` statements in one method. In such cases, you can comment out all but\
    \ the last `return` statement by starting the line with `//#`, followed by a space\
    \ and the actual statement. J2ME Polish will then activate the correct `return`\
    \ statement when it preprocesses your source code. Listing 8-11 shows a method\
    \ that caches images for quicker retrieval when the device has a heap size greater\
    \ than 500 kilobytes.\n\n**Listing 8-11.** *Hiding `return` Statements*\n\n```\n\
    public Image loadImage( String url )\n  throws IOException\n{\n  //#if ${ bytes(\
    \ polish.HeapSize ) } <= ${ bytes( 500 kb ) }\n    //# return Image.createImage(\
    \ url );\n  //#else\n    Image image = (Image) this.cachedImages.get( url );\n\
    \    if (image == null) {\n      image = Image.createImage( url );\n      this.cachedImages.put(\
    \ url, image );\n    }\n    return image;\n  //#endif\n}\n```\n\n### Logging\n\
    \nJ2ME Polish contains a logging framework that allows you to view logged messages\
    \ on the device and to enable different logging levels (or none at all). You can\
    \ log a message with the `#debug` directive. The following `System.out.println()`\
    \ message is then forwarded to the logging system. Listing 8-12 demonstrates the\
    \ usage of the logging system. Chapter 9 covers the details of the logging framework.\n\
    \n**Listing 8-12.** *Logging an Error Message*\n\n```\ntry {\n  this.optionalImage\
    \ = Image.createImage( \"/optional.png\" );\n} catch (IOException e) {\n  //#debug\n\
    \  System.out.println(\"Unable to load optional.png\" + e );\n}\n```\n\n### Setting\
    \ CSS Styles\n\nYou can apply CSS styles for UI items with the `#style` directive.\
    \ When you use the advanced GUI of J2ME Polish, you can define such styles in\
    \ the `resources/polish.css` file. This whole process is discussed in detail in\
    \ Chapter 12. Listing 8-13 shows how to apply a style for a `StringItem`.\n\n\
    **Listing 8-13.** *Setting a Style for a UI Item*\n\n```\n//#style text\nStringItem\
    \ item = new StringItem( null, \"Hello World!\" );\n```\n\n### Nesting Directives\n\
    \nYou can nest and mix directives up to any level, so you can check for special\
    \ cases within `#if` branches. Listing 8-14 shows an example.\n\n**Listing 8-14.**\
    \ *Nesting Directives*\n\n```\n//#ifdef polish.group.Series40\n  doSomething(\
    \ 40 );\n  //#if polish.Identifier != Nokia/6230\n    doAnotherThing();\n  //#endif\n\
    //#elifdef polish.group.Series60\n  doSomething( 60 );\n//#endif\n```\n\n## Managing\
    \ Variables and Symbols\n\nMost preprocessing directives need preprocessing symbols\
    \ or variables on which to operate. Many symbols and variables are defined in\
    \ the device database, but you are free to define your own variables and symbols\
    \ as well.\n\nFor each preprocessing variable, several symbols are defined automatically:\
    \ the symbol `[variable-name]:defined` is set for each defined variable, and one\
    \ `[variable-name].[value]` symbol is defined for each value that the variable\
    \ holds. For example, for the fictitious variable `config.Locations` with the\
    \ equally fictitious values `London`, `New-York`, `Moscow`, the following symbols\
    \ would be defined automatically:\n\n- `config.Locations:defined`\n- `config.Locations.London`\n\
    - `config.Locations.New-York`\n- `config.Locations.Moscow`\n\nThe same mechanism\
    \ is used when there is only one value in the variable. If, for example, only\
    \ `London` were set for the `config.Locations` variable, the preprocessing symbols\
    \ `config.Locations:defined` and `config.Locations.London` would be defined.\n\
    \nAs well as defining your own symbols and variables, you may need to transform\
    \ variables before you use or compare them. J2ME Polish provides property functions\
    \ for this task. In this section, you will learn how to define and transform symbols\
    \ and variables. But first, let's take a look at the symbols that are already\
    \ defined in the J2ME Polish device database.\n\n### Using Standard Preprocessing\
    \ Symbols and Variables\n\nThanks to the device database of J2ME Polish, many\
    \ often-needed symbols and variables are already defined out of the box. Each\
    \ device feature results in the corresponding preprocessing symbol, and each capability\
    \ is represented by its respective preprocessing variable. Table 8-6 lists the\
    \ most commonly needed variables and symbols. (See Chapter 6 for details on the\
    \ XML-based device database.)\n\n**Table 8-6.** *Standard Preprocessing Variables\
    \ and Symbols*\n\n| Variable | Symbol | Explanation |\n|---|---|---|\n| `polish.BitsPerPixel`\
    \ | `polish.BitsPerPixel.4`, `polish.BitsPerPixel.16`, etc. | Color depth: 1=monochrome,\
    \ 4=16 colors, 8 = 256 colors, 12 = 4,096 colors, 16 = 65,536 colors, 18 = 262,144\
    \ colors, 24 = 16,777,216 colors |\n| `polish.ScreenSize` | `polish.ScreenSize.176x208`,\
    \ `polish.ScreenWidth.176`, `polish.ScreenHeight.208` | Width times height of\
    \ the screen resolution in pixels, e.g., 176×208 |\n| `polish.CanvasSize` | Like\
    \ `ScreenSize` | Width times height of an MIDP canvas |\n| `polish.FullCanvasSize`\
    \ | Like `ScreenSize` | Width times height of an MIDP canvas in full-screen mode\
    \ |\n| `polish.JavaPlatform` | `polish.midp1` or `polish.midp2` | Supported Java\
    \ platform, e.g., MIDP 1.0 or MIDP 2.0 |\n| `polish.JavaConfiguration` | `polish.cldc1.0`\
    \ or `polish.cldc1.1` | Supported Java configuration, e.g., CLDC 1.0 or CLDC 1.1.\
    \ |\n| `polish.JavaPackage` | `polish.api.nokia-ui`, `polish.api.mmapi`, etc.\
    \ | Supported APIs, e.g., Nokia UI or MMAPI |\n| `polish.JavaProtocol` | `polish.JavaProtocol.serial`,\
    \ `polish.JavaProtocol.https` | Supported data exchange protocols* |\n| `polish.HeapSize`\
    \ | | Maximum heap size, e.g., 500KB or 1.2MB |\n| `polish.MaxJarSize` | | Maximum\
    \ size of the MIDlet JAR bundle, e.g., 100KB or 2MB** |\n| `polish.StorageSize`\
    \ | | Maximum size for all applications and data, e.g., 4MB |\n| `polish.OS` |\
    \ `polish.OS.Motorola`, `polish.OS.Symbian`, etc. | Operating system of the device,\
    \ e.g., Symbian |\n| `polish.VideoFormat` | `polish.video.3gpp`, `polish.video.mpeg-4`\
    \ | Supported video formats of the device, e.g., 3gpp and MPEG-4 |\n| `polish.SoundFormat`\
    \ | `polish.audio.midi`, `polish.audio.wav` | Sound formats that are supported\
    \ by the device, e.g., MIDI and WAV |\n| `polish.Bugs` | `polish.Bugs.drawRgbOrigin`,\
    \ `polish.Bugs.ImageIOStreamAutoClose`, etc. | The short names of known issues\
    \ |\n\n*All MIDP 1.0 devices support HTTP. All MIDP 2.0 devices also support HTTPS.*\n\
    \n**Note that these are sometimes just a recommendation (Motorola, Siemens).*\n\
    \n### Setting Symbols and Variables\n\nYou can define your own variables and symbols\
    \ at various places. You can also set variables conditionally for greater flexibility.\n\
    \nIn the `build.xml` file, you can define variables with the `<variables>` element\
    \ and symbols with the `symbols` attribute of the `<build>` element, as shown\
    \ in Listing 8-15.\n\n**Listing 8-15.** *Defining Variables and Symbols in `build.xml`*\n\
    \n```\n<j2mepolish>\n  <info\n    license=\"GPL\"\n    name=\"Roadrunner\"\n \
    \   vendorName=\"A reader.\"\n    version=\"0.0.1\"\n    jarName=\"${polish.vendor}-${polish.name}-roadrunner.jar\"\
    \n  />\n  <deviceRequirements>\n    <requirement name=\"Identifier\" value=\"\
    Generic/midp1\" />\n  </deviceRequirements>\n  <build\n    usePolishGui=\"true\"\
    \n    symbols=\"mySymbol1, mySymbol2\"\n  >\n    <midlet class=\"com.apress.roadrunner.Roadrunner\"\
    \ />\n    <variables includeAntProperties=\"true\">\n      <variable\n       \
    \ name=\"config.BaseUrl\"\n        value=\"http://www.server.com\"\n      />\n\
    \      <variable\n        name=\"config.WelcomeMessage\"\n        value=\"Welcome!\"\
    \n      />\n    </variables>\n  </build>\n  <emulator />\n</j2mepolish>\n```\n\
    \nThe `<variable>` element also supports the `file` attribute for specifying the\
    \ file that holds the variable definitions. Collecting variable definitions in\
    \ a single file is sometimes easier than managing them in the quite complex `build.xml`\
    \ script. In the external file, you can list any number of variables, separating\
    \ the name and value by an equal sign. You can use comments by starting a line\
    \ with a hash mark. Listing 8-16 shows an example of a file that can be used by\
    \ including `<variable file=\"filename.settings\" />` in the `build.xml` file.\n\
    \n**Listing 8-16.** *Defining Variables in an External File*"
  raw: '# e.g. Congrats, you have won 3 Nokia-nuggets!


    messages.YouHaveWon=Congrats! You have won {0} ${polish.Vendor}-${VirtualCurrency}!


    Naturally, you can use the variables you have defined in the *messages.txt* file
    during the usual preprocessing in the Java source code as well:


    //#= String virtualCurrency = "${VirtualCurrency}"; Using Localized Attributes


