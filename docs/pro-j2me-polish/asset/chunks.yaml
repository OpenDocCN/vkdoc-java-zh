  trans: '

    三星手机的典型问题包括 JAD 属性需要按特定顺序排列，并且应精简到绝对必要。你可以在 *build.xml* 文件中使用 `<jadFilter>` 和
    `<manifestFilter>` 元素，如清单 15-1 所示。此外，在 `<info>` 元素的 `jarName` 和 `jarUrl` 属性中，应仅使用相对
    URL。让三星手机的网络连接正常工作是一个挑战。通常，你需要坚持使用一个连接，并确保使用互联网接入点名称（APN），而不是 WAP 接入点。使用静态 IP
    地址代替域名也有帮助。


    图标尺寸各不相同，有的完全不支持，有的为 24✕24 像素，最高可达 40✕35 像素。


    **清单 15-1.** *在三星设备上过滤 JAD 属性*


    <j2mepolish>


    <info


    license="GPL"


    name="Roadrunner"


    vendorName="A reader."


    version="0.0.1"


    jarName="${polish.vendor}-${polish.name}-roadrunner.jar"


    />


    <deviceRequirements>


    <requirement name="JavaPlatform" value="MIDP/2.0" />


    </deviceRequirements>


    <build>


    <midlet class="com.apress.roadrunner.Roadrunner" />


    <jad>


    **<jadFilter if="polish.Vendor == Samsung">** MIDlet-1, MIDlet-2?, MIDlet-3?,
    MIDlet-4?, MIDlet-5?,


    MIDlet-JarSize, MIDlet-Jar-URL,


    MIDlet-Name, MIDlet-Vendor, MIDlet-Version


    **</jadFilter>**


    **</jad>**


    **<manifestFilter>**


