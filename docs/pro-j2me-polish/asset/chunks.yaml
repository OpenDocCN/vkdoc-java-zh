    **使用动态样式和预定义样式**


    使用动态样式时，您甚至不需要设置`#style`指令。在这种情况下，设计依赖于类。例如，所有`Form`都可以使用`form`样式进行设计。


    使用动态样式可以快速检查现有应用程序的GUI，但这需要额外的内存和运行时。因此，对于最终应用程序，您应该使用普通的“静态”样式。


    某些元素默认使用预定义样式。例如，`title`样式负责Screen标题的外观。


    有关静态、动态和预定义样式的更多信息，请参阅以下“设计GUI”部分中的说明。


    **将MIDP 2.0应用程序移植到MIDP 1.0平台**


    当您使用J2ME Polish GUI时，您也可以在MIDP 1.0设备上使用MIDP 2.0小部件，例如`POPUP ChoiceGroup`或`CustomItem`，没有任何限制。


    仅当使用MIDP 2.0独有的功能时，才需要进行源代码调整，这些功能超出了J2ME Polish GUI的范围，例如`Display.flashBacklight(
    int )`。


    J2ME Polish GUI支持MIDP 2.0调用`Display.setCurrentItem( Item )`，适用于MIDP 2.0和MIDP 1.0设备。


    当目标设备不支持特定调用时，构建过程将因编译错误而中止。通常，该错误需要用适当的`#if`预处理指令包围，如清单12-11所示。


    **清单12-11.** *使用预处理规避MIDP 2.0独有调用*


    ```

    //#ifdef polish.midp2

    this.display.flashBacklight( 1000 );

    //#endif

    ```


