    Both the <jadFilter> and <manifestFilter> elements accept a list of comma-separated
    names defining the allowed attributes in the desired order. When an attribute
    name ends with a question mark like MIDlet-Description?, it is considered optional.
    In that case, it is included only if it has been defined. You can select several
    attributes at the same time by ending an attribute name with an asterisk, as in
    MIDlet-*. In that case, all remaining attributes that start with MIDlet- are included
    at that position. Last but not least, you can select all remaining attributes
    by just using an asterisk, as in *. This obviously has to be the last item in
    the list.


    You can apply a filter for specific devices only by using the if or unless attributes,
    for example, <jadFilter if="polish.Vendor == Samsung" />.


