    \ can implement this strategy. Since your IDE does not know about the J2ME Polish\
    \ `CustomItem` implementation, you need to hide the call of the super constructor\
    \ that contains the `Style` parameter. As you can see in the `getHighscoreInstance()`\
    \ method, you can now define the desired style just by adding a `#style` directive\
    \ before creating a new instance of the `MyCustomItem` class.\n\n**Listing 13-17.**\
    \ *Using an Additional Constructor for Setting a Style*\n\n```java\npublic class\
    \ MyCustomItem extends CustomItem {\n\n    public MyCustomItem( String label )\
    \ {\n        //#style myCustomItemStyle, default\n        super( label );\n  \
    \  }\n\n    //#ifdef polish.usePolishGui\n    public MyCustomItem( String label,\
    \ Style style ) {\n        //#if true\n        //# super( label, style );\n  \
    \      //#else\n        super( label );\n        //#endif\n    }\n    //#endif\n\
    \n    public static MyCustomItem getDefaultInstance( String label ) {\n      \
    \  // use either the myCustomItemStyle or the default style:\n        return new\
    \ MyCustomItem( label );\n    }\n\n    public static MyCustomItem getHighscoreInstance(\
    \ String label ) {\n        // use the highscore style:\n        //#style highscore\n\
    \        return new MyCustomItem( label );\n    }\n\n    protected int getMinContentWidth()\
    \ {\n        return 50;\n    }\n\n    protected int getMinContentHeight() {\n\
    \        return 10;\n    }\n\n    protected int getPrefContentWidth( int allowedWidth\
    \ ) {\n        return 100;\n    }\n\n    protected int getPrefContentHeight( int\
    \ allowedHeight ) {\n        return 20;\n    }\n\n    protected void paint( Graphics\
    \ g, int width, int height ) {\n        // paint the item...\n    }\n}\n```\n\n\
    The fourth and last option is to use dynamic styles. You need to override the\
    \ `createCssSelector()` method in that case, as shown in Listing 13-18. The returned\
    \ style name needs to be in lowercase. You can use a mixed case notation in your\
    \ `polish.css` file, however.\n\n**Listing 13-18.** *Using Dynamic Styles*\n\n\
    ```java\npublic class MyCustomItem extends CustomItem {\n\n    public MyCustomItem(\
    \ String label ) {\n        super( label );\n    }\n\n    //#ifdef polish.useDynamicStyles\n\
    \    protected String createCssSelector() {\n        return \"mycustomitem\";\n\
    \    }\n    //#endif\n\n    protected int getMinContentWidth() {\n        return\
    \ 50;\n    }\n\n    protected int getMinContentHeight() {\n        return 10;\n\
    \    }\n\n    protected int getPrefContentWidth( int allowedWidth ) {\n      \
    \  return 100;\n    }\n\n    protected int getPrefContentHeight( int allowedHeight\
    \ ) {\n        return 20;\n    }\n\n    protected void paint( Graphics g, int\
    \ width, int height ) {\n        // paint the item...\n    }\n}\n```\n\nFor reading\
    \ the specific style settings, you need to implement the `setStyle( Style )` method.\
    \ The implementation of the `StringListItem` shown in Listing 13-15 demonstrates\
    \ this.\n\nAgain, you need to hide the `super.setStyle( Style )` call with preprocessing\
    \ so that your IDE is not confused.\n\nJ2ME Polish will call the `setStyle()`\
    \ method before the preferred content width and height is requested so that your\
    \ `CustomItem` has a style when the dimensions are requested.\n\nPlease note that\
    \ the variable needs to be called `style`, or it needs to end with a lowercase\
    \ `style`, so that J2ME Polish can process all styles correctly. This is required\
    \ because the String-based attribute names are replaced by numerical short values\
    \ during the preprocessing step. This approach significantly improves the runtime\
    \ performance and minimizes the heap usage.\n\nYou have four possible ways to\
    \ retrieve a property from a style:\n\n- `style.getProperty( String name )` returns\
    \ either a `String` representing that value or `null` when the property is not\
    \ defined.\n- `style.getIntProperty( String name )` returns either an `Integer`\
    \ representing that value or `null` when the property is not defined.\n- `style.getBooleanProperty(\
    \ String name )` returns either a `Boolean` representing that value or `null`\
    \ when the property is not defined.\n- `style.getObjectProperty( String name )`\
    \ returns either the value as an `Object` or `null` when the property is not defined.\n\
    \nPlease note that you can use the last three methods only when you have registered\
    \ the corresponding attribute in the file `custom-css-attributes.xml`. The attribute\
    \ types are `string`, `integer/color`, `boolean`, and `object/style`, respectively.\
    \ If you do not specify the type, the attribute will be treated as a string attribute.\
    \ For each set CSS attribute, the preprocessing symbol `polish.css.[attribute-name]`\
    \ will be defined. You can use this mechanism for requesting the attribute values\
    \ only when they are used at least once. Again, Listing 13-15 of the `StringListItem`'s\
    \ `setStyle()` method demonstrates how you can save some precious bytes with this\
    \ mechanism.\n\n## Registering Custom CSS Attributes\n\nYou will find the `custom-css-attributes.xml`\
    \ file in the installation directory of J2ME Polish. You can use this file to\
    \ register CSS attributes that are used in your `CustomItem`s.\n\nRegistering\
    \ these attributes is required only when you use the `style.getIntProperty( String\
    \ name )`, `style.getBooleanProperty( String name )`, or `style.getObjectProperty(\
    \ String name )` method in the `setStyle( Style )` method of your `CustomItem`.\
    \ The registration is encouraged nevertheless, since future versions of J2ME Polish\
    \ might use this information for an Eclipse CSS plug-in.\n\nEach attribute is\
    \ represented by an `<attribute>` element, with the attributes listed in Table\
    \ 13-4.\n\n**Table 13-4.** *Definition of Custom Attributes*\n\n| Attribute  \
    \  | Required? | Explanation |\n|--------------|-----------|-------------|\n|\
    \ `name`       | Yes       | The name of the attribute, for example, `icon-image`.\
    \ |\n| `description`| No        | A description of this attribute. |\n| `type`\
    \       | No        | The type of the attribute. Either `string`, `integer`, `color`,\
    \ `boolean`, `object`, or `style`. Defaults to `string`. When the `getIntProperty()`\
    \ method is used, the type needs to be either `integer` or `color`. When the `getBooleanProperty()`\
    \ method is used, the type needs to be `boolean`. When the `getObjectProperty()`\
    \ method is used, the type needs to be either `object` or `style`. |\n| `appliesTo`\
    \  | No        | A comma-separated list of classnames for which this attribute\
    \ can be applied. |\n| `default`    | No        | The default value of this item.\
    \ |\n| `values`     | No        | A comma-separated list of allowed values for\
    \ this attribute. |\n\nListing 13-19 shows the definition of the color attributes\
    \ that are used by the `StringListItem`.\n\n**Listing 13-19.** *Defining Custom\
    \ CSS Attributes in custom-css-attributes.xml*\n\n```xml\n<attributes>\n    <attribute\n\
    \        name=\"stringlistitem-highlighted-foreground-color\"\n        type=\"\
    color\"\n        appliesTo=\"StringListItem\"\n        description=\"The text\
    \ color of the currently focused entry.\"\n    />\n    <attribute\n        name=\"\
    stringlistitem-foreground-color\"\n        type=\"color\"\n        appliesTo=\"\
    StringListItem\"\n        description=\"The text color of a normal non-focused\
    \ entry.\"\n    />\n    <attribute\n        name=\"stringlistitem-highlighted-background-color\"\
    \n        type=\"color\"\n        appliesTo=\"StringListItem\"\n        description=\"\
    The background color of the currently focused entry.\"\n    />\n    <attribute\n\
    \        name=\"stringlistitem-background-color\"\n        type=\"color\"\n  \
    \      appliesTo=\"StringListItem\"\n        description=\"The background color\
    \ of a normal non-focused entry.\"\n    />\n</attributes>\n```\n\n## Designing\
    \ Your Custom Item\n\nAt last you can now design your custom item in the `resources/polish.css`\
    \ file. Listing 13-20 shows the design of the `StringListItem` already shown in\
    \ Figure 13-1.\n\n**Listing 13-20.** *Designing the StringListItem*\n\n```css\n\
    colors {\n    bgColor: rgb( 132, 143, 96 );\n    highlightedBgColor: rgb( 238,\
    \ 241, 229 );\n    highlightedFontColor: rgb( 238, 241, 229 );\n    fontColor:\
    \ rgb( 30, 85, 86 );\n}\n\n.winnerStringListStyle {\n    font-size: medium;\n\
    \    font-style: bold;\n    stringlistitem-foreground-color: fontColor;\n    stringlistitem-highlighted-foreground-color:\
    \ highlightedFontColor;\n    stringlistitem-background-color: highlightedBgColor;\n\
    \    stringlistitem-highlighted-background-color: bgColor;\n}\n```"
