    第 15 章


    ■ ■ ■


    在设备限制间


    巧妙周旋


    **本章内容：**


    • 了解当今市场上设备之间的实际差异。


    • 学习如何编写可移植的应用程序。


    • 通过一些易于遵循的策略解决常见问题。


    • 了解遇到困难时可以在哪里获得帮助。


    当今市场上设备中使用的 J2ME 实现表现各异。


    在上一章中，你了解了由于不同的简表和配置而可能出现的差异；在本章中，你将了解在编写 J2ME 应用程序时将会遇到的实际差异和困难。你还将学习如何避免一些常见问题，以及在遇到困难时在哪里获得帮助。


    **识别厂商特性**


    在接下来的章节中，你将学习如何处理最流行厂商的设备，包括诺基亚、摩托罗拉、三星等。


    ■**提示** 某些厂商支持特定的 JAD 属性。请参考附录中的“管理 JAD 和清单属性”部分，以获取关于此类属性的完整讨论。


    **诺基亚**


    诺基亚是全球手机市场的最大参与者，2004 年市场份额约为 31%。


    诺基亚以惊人的速度向市场推出新设备：2004 年诺基亚发布了 30 多款新机型，并宣布 2005 年将发布 40 多款。幸运的是，你可以将诺基亚设备按不同版本划分为不同的系列。从销量角度来看，最重要的系列是针对大众市场的低成本
    Series 40 和针对智能手机的 Series 60。


    诺基亚生产高质量的设备，并提供了维护最好的开发者网站之一：*http://forum.nokia.com*；该网站设有论坛、提供工具，并包含设备的文档。诺基亚还维护着“已知问题”文档，列出了问题以及如何规避这些问题的方法。表
    15-1 列出了可用的系列及其主要特性。


    Series 40


    Series 40 设备是为大众市场制造的；它们体积小、价格低，但资源限制也比其他诺基亚设备更严格。所有 Series 40 机型都基于诺基亚专有的操作系统。屏幕尺寸通常为
    128✕128 像素，可以通过使用诺基亚的 FullCanvas 类或将基于 MIDP 2.0 的设备的 Canvas 设置为全屏模式来完全使用。少数 Series
    40 设备拥有 128✕160 像素的屏幕，有些甚至只有 96✕65 像素的屏幕。通常，你可以期望至少 12 位每像素（4096 色）的色深。


    Series 40 开发者平台 1.0 包含基于 MIDP 1.0 和 CLDC 1.0 的手机，这些手机接受大小不超过 64KB 的 Java 应用程序，堆大小约为
    200KB。你只能使用最多 20KB 的记录存储（RMS）。你需要使用诺基亚 UI API 来播放声音、使用全屏模式、控制设备的振动和背光，以及执行一些高级图像操作，例如旋转图像或操作像素数据。使用诺基亚
    UI API 操作图像数据缓冲区的一个主要缺点是设备具有不同的内部格式，因此有时你需要使用 `TYPE_USHORT_4444_ARGB`，而其他时候则需要使用
    `TYPE_INT_888_RGB`。旧款 Series 40 手机的主要挑战是将应用程序大小保持在 64KB 以下。中国机型只接受 59KB 的 JAR
    文件。开发者平台 1.0 的某些设备也支持无线消息 API。在 Series 40 开发者平台 1.0 手机上，你的 MIDlet 的 `pauseApp()`
    方法永远不会被调用，因此你只能通过使用 Canvas 的 `hideNotify()` 方法来检测你的应用程序是否被暂停。不幸的是，当你使用高级 GUI 屏幕（如
    Form 或 List）时，这种方法不起作用。当发生未捕获的异常时，应用程序管理系统将通过调用 `destroyApp(false)` 来关闭应用程序。


    你可以通过在你的设备需求中使用设备标识符“Nokia/Series40DP1”来为此平台构建应用程序：


    <requirement name="Identifier" value="Nokia/Series40DP1" /> Series 40 开发者平台 2.0
    使用 MIDP 2.0 简表和 CLDC 1.1 配置作为基础技术。它还支持 JTWI 标准指定的所有附加元素，因此所有 Series 40 开发者平台 2.0
    设备上都提供了无线消息 API。移动媒体 API 也得到支持，允许播放 True Tone 和 MIDI 文件。某些设备支持附加 API，例如蓝牙 API
    或移动 3D 图形 API。通常，你不应在开发者平台 2.0 设备上使用诺基亚 UI API，因为大多数功能现在已被 MIDP 2.0 平台取代。


    开发者平台 2.0 设备支持 JAR 大小最大为 128KB 的应用程序。当应用程序在开发者平台 2.0 上发起平台请求时，用户需要在请求实际启动之前退出应用程序。启动


