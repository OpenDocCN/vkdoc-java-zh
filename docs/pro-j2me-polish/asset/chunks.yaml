    在与服务器交换数据之前，你应该三思是否使用 XML 或 SOAP。XML 是一种语法冗长的协议，与实际数据相比，它带来了大量开销。你还需要在 J2ME 应用程序中解析和构建
    XML 消息，这在性能和堆内存使用方面可能代价高昂。通常，使用你自己的专有二进制协议会更好。你可以使用 `DataInputStream` 和 `DataOutputStream`
    来方便地读写二进制数据。


    无论如何，如果你无法抗拒使用 XML 协议进行通信，你可以使用 kXML（*http://kxml.sourceforge.net*）来解析数据。


