- fmt: "Whenever a `TextField` is focused, the two additional commands `Clear` and\
    \ `Delete` are added automatically. You can disable this by setting one of the\
    \ following variables to `false`: `polish.TextField.suppressClearCommand`, `polish.TextField.suppressDeleteCommand`,\
    \ or `polish.TextField.suppressCommands`. You should deactivate the `Delete` command\
    \ only when the target device has a known clear key or when you don’t use the\
    \ direct input mode; otherwise, the user won’t be able to delete wrong input.\
    \ The following example removes both the `Clear` and `Delete` commands only when\
    \ the device has a clear key: `<variable name=\"polish.TextField.suppressCommands\"\
    \ value=\"true\" if=\"polish.key.ClearKey:defined\"/>`.\n\n## Using Different\
    \ Designs for Your Application\n\nYou can use completely different designs for\
    \ your application just by using different resource folders. You can switch the\
    \ used resources by specifying the folder in the `<resources>` element, as shown\
    \ in Listing 12-6.\n\n**Listing 12-6.** *Using Another Resources Folder*\n\n```\n\
    <j2mepolish>\n<info\n  license=\"GPL\"\n  name=\"Roadrunner\"\n  vendorName=\"\
    A reader.\"\n  version=\"0.0.1\"\n  jarName=\"${polish.vendor}-${polish.name}-roadrunner.jar\"\
    \n/>\n<deviceRequirements>\n  <requirement name=\"Identifier\" value=\"Generic/midp1\"\
    \ />\n</deviceRequirements>\n<!-- symbol: don't check method-parameters: -->\n\
    <build\n  usePolishGui=\"true\"\n  fullscreen=\"menu\"\n>\n  <midlet class=\"\
    com.apress.roadrunner.Roadrunner\" />\n  <resources\n    dir=\"resources2\"\n\
    \  />\n</build>\n<emulator />\n</j2mepolish>\n```\n\nFigures 12-2, 12-3, and 12-4\
    \ show the Menu sample application with three designs. Note that the source code\
    \ is not changed at all—all changes take place by providing different `polish.css`\
    \ files and different images.\n\n**Figure 12-2.** *The Menu sample application\
    \ in the default design* **Figure 12-3.** *The same application using a pop design*\n\
    \n**Figure 12-4.** *Yet again the same application using a dark design*\n\nYou\
    \ can use this mechanism for customizing your application to different user groups\
    \ or different corporate identities, for example. When you use the localization\
    \ features (refer to the “Building Localized Applications” section in Chapter\
    \ 7), you can also use different texts for your builds. So, you could use one\
    \ application logic or game engine and create many different applications that\
    \ look completely different but that differ only in their design and texts. This\
    \ is a handy way to increase productivity, don’t you think?\n\n## Programming\
    \ the GUI\n\nUsing the J2ME Polish GUI is quite simple actually. Since the J2ME\
    \ Polish GUI is compatible with the MIDP `javax.microedition.lcdui` classes, neither\
    \ import statements nor the actual code usually needs to be changed. In addition,\
    \ you can apply CSS styles to your items using the `#style` directive. J2ME Polish\
    \ also contains some enhancements such as `TabbedForm`, `FramedForm`, and `SpriteItem`.\n\
    \n### Using Correct import Statements\n\nYou need to use correct import statements\
    \ and no fully qualified classnames in your application so that J2ME Polish can\
    \ weave its GUI API into your application. Listing 12-7 shows you a nonworking\
    \ example.\n\n**Listing 12-7.** *How **Not** to Use the J2ME Polish GUI*\n\n```\n\
    public class MyForm\n  extends javax.microedition.lcdui.Form\n{\n  private javax.microedition.lcdui.StringItem\
    \ textItem;\n\n  public MyForm( String title ) {\n    //#style myForm, default\n\
    \    super( title );\n    this.textItem =\n      new javax.microedition.lcdui.StringItem(\
    \ null, \"Hello World\" );\n    append( this.textItem );\n  }\n}\n```\n\nThe code\
    \ in Listing 12-7 won’t work because it does not use import statements correctly.\
    \ Listing 12-8 demonstrates how to correctly use them."
