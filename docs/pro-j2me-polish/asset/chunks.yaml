    <requirement name="Identifier" value="Nokia/Series60E1" /> 第二个 Series 60 版本分为功能包
    1、2 和 3。


    功能包 1 使用 MIDP 2.0 平台以及 CLDC 1.0 配置。此外，还支持移动媒体 API 1.1 和无线消息 API。使用“Nokia/


    Series60E2”或“Nokia/Series60E2FP1”手机来为此功能包构建你的应用：


    <requirement name="Identifier" value="Nokia/Series60E2FP1" /> 功能包 2 使用支持浮点运算且符合
    JTWI 标准的 CLDC 1.1 配置。其他功能包括 PDAAPI（FileConnection 和 PIM


    API）、对推送注册表蓝牙连接的支持，以及针对兼容 OpenGL 设备的 Mobile 3D Graphics API。你可以使用“Nokia/Series60E2FP2”设备来为此功能包构建你的应用。


    功能包 3 额外支持 Web 服务 API。此外，蓝牙实现提供了用于数据交换的可选 OBEX 部分。使用“Nokia/Series60E2FP3”


    设备来定位支持此功能包的设备。


    Series 60 的第三版引入了一些令人兴奋的新 Java 技术。它支持安全与信任 API、会话初始化 API、可缩放 2D 矢量图形 API、位置 API
    和无线消息 API 2.0。使用虚拟的“Nokia/Series60E3”


    设备来为此版本构建你的应用。


    Series 60 的难点因不同版本和功能包而异。一些设备在读取蓝牙 InputStream 时存在问题，一些较旧的第二版设备缺少 Java Verified
    程序使用的根证书，还有一些存在 UI 问题，例如 setCurrentItem() 方法无法正常工作。大多数 Series 60 设备在显示新 Canvas
    时都会闪烁。当显示之前显示过的 Canvas 时，会先显示一个内部缓冲区，然后才会再次调用该 Canvas 的 paint() 方法。如果你没有使用能够自动处理此问题的
    J2ME


    Polish GUI，你应该考虑只使用一个 Canvas


    5033CH15.qxd 6/20/05 9:20 AM 第 287 页


    第 15 章 ■ 在设备限制间周旋


    **287**


    来显示你应用的所有屏幕。请参考 *http://* 上的问题数据库


    *www.j2mepolish.org/devices/issues.html* 以获取最新概览。大多数 Series 60 手机在所需空间可用时支持任意大小的应用。可用的堆内存大多为
    4MB 或更大。


    Series 80


    诺基亚的 Series 80 平台由结合了 PDA 和移动电话的设备组成。它们相当成功地瞄准了企业用户。诺基亚 Communicator 手机是这类手机的市场领导者。


    典型的 Series 80 设备看起来像普通手机，但打开后会显示一个 640✕200 像素的屏幕和一个 QWERTY 键盘。除了 MIDP 2.0 和 CLDC
    1.0 标准外，Series 80 设备还支持 Personal Java 配置文件和 CDC。可选的 API 包括蓝牙 API、无线消息 API、移动媒体
    API、PDAAPI 和诺基亚 UI API。


    你可以通过定位“Nokia/Series80”设备来为典型的 Series 80 设备构建应用：


    <requirement name="Identifier" value="Nokia/Series80" /> Series 90


    Series 90 设备针对其 320✕200 屏幕和基于笔的输入方法进行了优化，以显示媒体。截至 2005 年 4 月，诺基亚 7710 是唯一可用的 Series
    90 设备。


    Series 90 设备支持 MIDP 2.0 配置文件以及 CLDC 1.1 配置。


    可选的 API 包括蓝牙 API (JSR 82)、无线消息 API、移动媒体 API、PDAAPI 和诺基亚的 UI API。


    使用“Nokia/Series90”设备来定位此系列中的典型设备：


    <requirement name="Identifier" value="Nokia/Series90" /> **摩托罗拉**


    摩托罗拉是第二大厂商，2004 年全球市场份额约为 16%。摩托罗拉独特之处在于它使用的不是一个、两个或三个不同的操作系统，而是四个：其专有的摩托罗拉操作系统、Symbian
    OS、Microsoft Smartphone 和 Linux。


    摩托罗拉在 *http://motocoder.com* 上提供了优秀的开发者资源。你可以通过选择“知识与支持”，然后选择“错误提交”来查询有些隐藏的已知问题数据库。


    摩托罗拉 MIDP 2.0 手机仅支持一种字体大小（20）和一种字体样式（普通）。摩托罗拉建议 J2ME 应用的 JAR 大小为 100KB，但没有硬性限制。在现代设备上，你可以预期堆内存大小为
    800KB 或更高。


    在较旧的 MIDP 2.0 设备上，你通常一次只能预取一个声音。此规则的例外是 MIDI、iMelody 以及摩托罗拉专用的 mix 和 basetrack
    格式，这些格式可以同时预取两个声音。你也可以先预取一个 MIDI，然后再预取一个 WAV 文件。在播放下一个声音之前，你需要停止并释放前一个声音。通常，你可以在摩托罗拉手机上同时使用最多四个
    TCP 连接。


    你的 MIDlet 图标需要是 15✕15 像素；否则，只会显示一个通用图标。如果你想在 RMS 中使用超过 16KB 的空间，你需要设置 MIDlet-Data-Size


    5033CH15.qxd 6/20/05 9:20 AM 第 288 页


    **288**


    第 15 章 ■ 在设备限制间周旋


    JAD 属性，该属性以字节为单位定义所需空间。最大可能值为 524288


    （512KB），但当然你只能使用可用的空间。当请求的空间不可用时，设备将中止应用的安装。


    摩托罗拉提供了一些额外的库，例如电话簿 API。这些 API 仅对许可方开放。如果你想使用它们，你需要与摩托罗拉建立业务关系。


    **三星**


    三星是第三大厂商，2004 年全球市场份额约为 13%。三星还在 *http://developer.samsungmobile.com* 维护着一个良好的开发者社区。


    出于某种奇怪的原因，你需要使用 Microsoft Internet Explorer 或 KDE Konqueror 才能访问该网站。不支持基于 Mozilla
    的浏览器。尽管如此，请务必查看针对这些手机的开发者提示。你可以在该网站的“资源”部分找到它们。

