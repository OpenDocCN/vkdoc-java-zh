    **Avoiding Common Mistakes**


    You have to pay attention to some issues when you want to localize your application.


    Adjusting the JAR Name


    You need to remember to adjust the JAR name of the application in the <info> section
    of *build.xml* so that the locale is included; otherwise, only the last localized
    application is actually written into the *dist* folder. You can use the variables
    ${polish.locale}, ${polish.language}, or ${polish.country} in the jarName attribute:


    <info jarName="${polish.vendor}-${polish.name}-${polish.locale}-roadrunner.jar"


    Using Quotation Marks and Other Special Characters in Translations Some characters
    need to be Java encoded in your translation files. You can use quotation marks
    as well as any special character if you escape them correctly, usually with a
    backslash character (\) at the start; for example, you can use \" for quotation
    marks, \t for tabs, and \\ for backslashes.


    Invalid Locale Calls


    The Locale.get() method is a bit sensitive about its contents. Please ensure that
    the key of the translation is always given directly instead of using a variable;
    otherwise, J2ME Polish will not be able to embed the translation correctly, and
    you will end up with compile errors.


    Listing 7-30 shows how *not* to do it.


    **Listing 7-30.** *Invalid Locale Call, Because the Key Is Not Given Directly*


    // never do this:


    String key = "menu.StartGame";


    this.menuScreen.append( Locale.get( key ), null );


    5033CH07.qxd 6/17/05 11:50 AM Page 90


    **90**


    C H A P T E R 7 ■ B U I L D I N G A P P L I C AT I O N S


    Instead, use the key directly in the call as in this example: this.menuScreen.append(
    Locale.get( "menu.StartGame" ), null ); When you have several parameters, you
    need to give the parameters in a variable; otherwise, J2ME Polish is again unable
    to process the call correctly. Listing 7-31 shows the wrong way.


    **Listing 7-31.** *Another Invalid Locale Call, Because Parameters Are Given Directly*


    // never do this:


    this.menuScreen.append( Locale.get( "game.StartMessage" ), new String[]{ userName,
    enemyname } );


    Instead, define the parameters before the actual call, as shown in Listing 7-32.


    **Listing 7-32.** *Corrected Locale Call*


    // this is fine:


    String[] parameters = new String[]{ userName, enemyname }; this.menuScreen.append(
    Locale.get( "game.StartMessage" ), parameters );


    ■**Note** In a future version, J2ME Polish will use bytecode processing instead
    of embedding the translations during the preprocessing phase, so then you can
    use any call method that is allowed by Java.


