    **管理变量和符号**


    大多数预处理指令需要在其上操作的预处理符号或变量。许多符号和变量在设备数据库中定义，但您也可以自由定义自己的变量和符号。


    对于每个预处理变量，会自动定义几个符号：为每个已定义的变量设置符号 `[variable-name]:defined`，并为变量持有的每个值定义一个 `[variable-name].[value]`
    符号。例如，对于虚构的变量 `config.Locations` 及其同样虚构的值 `London`、`New-York`、`Moscow`，将自动定义以下符号：


    • `config.Locations:defined`

    • `config.Locations.London`

    • `config.Locations.New-York`

    • `config.Locations.Moscow`


    当变量中只有一个值时，使用相同的机制。例如，如果只为 `config.Locations` 变量设置了 `London`，则将定义预处理符号 `config.Locations:defined`
    和 `config.Locations.London`。


    除了定义您自己的符号和变量之外，您可能还需要在使用或比较变量之前对其进行转换。J2ME Polish 为此提供了属性函数。在本节中，您将学习如何定义和转换符号和变量。但首先，让我们看一下
    J2ME Polish 设备数据库中已经定义的符号。


