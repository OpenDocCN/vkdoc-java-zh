    **303**


    **Figure 15-2.** *Adding a new source folder to an Eclipse project* The main drawback
    of using different source files is the additional work that is needed for each
    change. Depending on the business requirements, you might need to create loads
    of different Java source files. When you now need to include an additional feature
    or bug fix, you need to implement the change in every affected source file.


    **Solving Common Problems**


    Typically, you will encounter similar problems in your projects. In the following
    sections, I will discuss how you can resolve common difficulties.


    **Using the Appropriate Resources**


    The main difference between different devices is the screen size, so you will
    often need to adjust images for the best results. Also, you will often need different
    multimedia resources, for example, different types of sound files.


    Using J2ME Polish’s automatic resource assembling, this task is quite easy to
    accomplish.


    Just put all common resources into the *resources* folder of your project and
    use subfolders for specific resources, such as *resources/Nokia* for Nokia resources,
    *resources/mmapi* for devices that support the Mobile Media API, and *resources/Motorola/A1000*
    for Motorola’s A1000 phone.


    Another nice feature is that you can use flexible folders as well: resources from
    the *resources/BitsPerPixel.12+* folder will be used for all devices that have
    a color depth of at least 12 bits per color (4,096 colors), for example. Another
    example is the *resources/ScreenSize.*


    *150+x200+* folder. Resources from this folder will be used when the device has
    a screen that is at least 150 pixels wide and 200 pixel high. When you use several
    of these flexible resource folders, the closest match will be used.


    You can also specify conditions for resources using the <resources> element and
    its nested <fileset> elements in your *build.xml* script.


    Please refer to the “Packaging Your Application” section in Chapter 7 for learning
    the full details of the resource assembling options with J2ME Polish.


    5033CH15.qxd 6/20/05 9:20 AM Page 304


    **304**


    C H A P T E R 1 5 ■ D A N C I N G A R O U N D D E V I C E L I M I TAT I O N S


    **Circumventing Known Issues**


    You can see the many known issues at *http://www.j2mepolish.org/devices/issues.html*.
    You can circumvent some issues by defensive programming; other ones require adjustments
    of your code.


    Defensive Programming


    One issue that you can circumvent by defensive programming is the behavior of
    the InputStream.available() implementation on Symbian and Motorola devices. On
    these devices the available() method returns 0 when you read a resource from your
    JAR file. Please note that this behavior is perfectly allowed by the CLDC specification,
    which states that the default available() implementation always returns 0 but
    that subclasses *should* override this method. It is just somewhat unexpected.


    Listing 15-6 shows an implementation that reads a resource and returns its contents
    as a byte array. Next to the available() call is another problem in that code:
    you probably just assume that the whole buffer will be read in one go when you
    call InputStream.read( byte[] ).


    This is not the case, as the JavaDoc of the CLDC mentions. Rather than filling
    the buffer completely, the number of read bytes is returned by the read() method.
    When you know the exact size of the input, you should use the DataInputStream.readFully(
    byte[] ) method instead.


    A third problem is that you do not close the input stream when the read() method
    throws an exception. This could lead to memory leaks in your application.


    **Listing 15-6.** *Reading a Resource Incorrectly*


    public byte[] readResource( String url )


    throws IOException


    {


    InputStream in = getClass().getResourceAsStream( url );


    // the following always returns 0 on Symbian and Motorola: **int available = in.available();**


    byte[] buffer = new byte[ available ];


    // this is not guaranteed to work either:


    **in.read( buffer );**


    // the input stream is not guaranteed to be closed,


    // since in.read() may throw an exception.


    **in.close();**


    return buffer;


    }


    Listing 15-7 shows a defensive implementation of the same method that works on
    Motorola and Symbian devices as well. You read the resource as long as the read()
    method sig-nals the end of the stream by returning -1\. You also use a ByteArrayOutputStream
    for buffering the read bytes. Last but not least, you surround the actual reading
    of the resource with a try


    {...} finally block. The finally block executes even when an exception occurs
    in the surrounded code. The resulting application is much more complicated than
    the original one, but, hey, it works!


    5033CH15.qxd 6/20/05 9:20 AM Page 305


    C H A P T E R 1 5 ■ D A N C I N G A R O U N D D E V I C E L I M I TAT I O N S


    **305**


    **Listing 15-7.** *Reading a Resource Correctly Using Some Defensive Techniques*
    public byte[] readResource( String url )


    throws IOException


    {


    InputStream in = getClass().getResourceAsStream( url );


    byte[] buffer;


    // the following always returns 0 on Symbian and Motorola: int available = in.available();


    **if ( available == 0 ) {**


    available = 4 * 1024; // 4 kb


    }


    buffer = new byte[ available ];


    ByteArrayOutputStream out = new ByteArrayOutputStream( available ); int read;


    try {


    while ( (read = in.read( buffer ) ) != -1 ) {


    out.write( buffer, 0, read );


    }


    } finally {


    in.close();


    }


    return out.toByteArray();


    }


    ■**Tip** Always read the documentation carefully. Whenever it says *might*, *may*,
    or *should*, you cannot assume that the behavior is the same on all devices. You
    are, however, most likely on the safe side when the documentation states that
    a feature *must* be present.


    Code Adjustments


    Often, defensive programming in itself is not sufficient to circumvent issues.
    In such cases you need to adjust your code either on the source code level or
    on the bytecode level.


    **Using Preprocessing**


    You can use preprocessing for circumventing known issues in your source code.


    An example for an issue that requires code changes is the implementation of the
    fullscreen mode on the Sony Ericsson K700 device. When the MIDP 2.0 full-screen
    mode has been activated by calling Canvas.setFullScreenMode( true ), system alerts
    are no longer displayed.


    System alerts are shown whenever you access a restricted resource, for example,
    when you want to start an HTTP connection. A possible workaround is to use the
    com.nokia.mid.ui.


    FullCanvas class of the Nokia UI API that is present on the K700 device as well.
    Please note that the FullCanvas class does not allow you to add any commands.
    J2ME Polish sets the


