    is a reduction of 50%! It also solves the problem of Nokia’s getHeight() method
    in full-screen mode, since it uses hard-coded values.


    Another benefit of preprocessing is that you can check for known issues by testing
    the polish.Bugs capability, for example, //#if polish.Bugs.drawRgbOrigin. This
    allows you to circumvent most bugs; please refer to the known issues database
    at *http://www.j2mepolish.*


    *org/devices/issues.html* and Chapter 8 for more details.


    ■**Tip** The J2ME Polish client APIs, like the user interface, make heavy use
    of preprocessing so that they can adapt to the target device. This is a kind of
    fully automatic adjustment, since no further manual intervention is needed from
    your side. Since you can find most errors in the user interface classes, you can
    save a lot of effort and sweat here.


    A disadvantage of preprocessing is the little or nonexisting support for it by
    the common IDEs. That’s why J2ME Polish includes a preprocessing-aware Java editor
    for the Eclipse IDE


