    C H A P T E R 3


    ■ ■ ■


    Installing J2ME Polish


    **In this chapter:**


    • Get the J2ME Polish installer ( *http://www.j2mepolish.org*).


    • Invoke the installer (by calling java -jar j2mepolish-[ *version*].jar).


    • Use the provided sample applications.


    Thanks to the graphical installer, the setup of J2ME Polish is relatively painless.
    This chapter describes the installation of J2ME Polish, as well as some third-party
    tools that you can use with J2ME Polish.


    **J2ME Polish Installation Guide**


    You can download the J2ME Polish installer from *http://www.j2mepolish.org*. Just
    select Download from the main page.


    ■**Tip** While you’re at *http://www.j2mepolish.org*, you can also subscribe to
    the mailing lists by selecting Discussion, then Mailing Lists. The polish-users
    list provides help and general discussions about J2ME


    Polish. The polish-announce list keeps you updated about new releases.


    You can invoke the installer either by double-clicking the downloaded file or
    by calling java -jar j2mepolish-[ *version*].jar from the command line. You need
    to substitute the


    [ *version*] part with the real version number, such as j2mepolish-1.4.1.jar.
    Now the installer should start.


    The installer is a simple wizard that needs your input for some steps. It presents
    three critical screens: license selection, WTK directory selection, and component
    selection.


    **License Selection**


    The license selection screen, shown in Figure 3-1, asks you to decide which license
    you want to use. The license will be included in the *build.xml* files, which
    control the actual build process. So, you can change the license at any time by
    modifying these files.


    **11**


    ![Image 6](index-34_1.jpg)


    5033CH03.qxd 6/17/05 11:44 AM Page 12


    **12**


    C H A P T E R 3 ■ I N S TA L L I N G J 2 M E P O L I S H


    **Figure 3-1.** *Selecting a license in the installer* The license screen offers
    the following choices:


    **GPL:** If you want to publish your J2ME applications under the open source GNU
    General Public License (GPL), you should select the GPL option. You can also choose
    the GPL


    option when you use J2ME Polish commercially in closed-source products, but in
    that case, you are not allowed to use many modules like the GUI, the debugging
    framework, or any of the provided client APIs. You can, however, use the general
    building facilities of J2ME Polish, including the resource assembling, multiple
    device builds, and powerful preprocessing tools.


    **Evaluation:** If you just want to check out J2ME Polish, choose the Evaluation
    option.


    **Commercial/None-GPL:** If you already have a commercial license key, select
    the Commercial/None-GPL option. In that case, you need to enter your license key
    into the provided text box.


    **WTK Directory Selection**


    Another important installer screen requests that you select the directory in which
    the WTK is installed, as shown in Figure 3-2.


    On Windows, a typical installation directory is *C:\WTK22*. On Mac OS X, you need
    to select the directory (usually called *MIDPv1.0.3 for OS X*), and then click
    Choose in the file selection dialog box.


    Like the license information, the WTK location information is included into the
    provided *build.xml* files, so you can change it later by modifying the ${wtk.home}
    property in those files.


    ![Image 7](index-35_1.jpg)


    ![Image 8](index-35_2.jpg)


