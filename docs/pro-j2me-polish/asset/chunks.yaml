    can, however, specify a different layout with the layout( int firstLineWidth,
    int lineWidth, int horizontalPadding, int graphicsOrientation ) method. In that
    case, the viewer will wrap text lines automatically and arrange the lines according
    to the specified orientation (Graphics.LEFT, Graphics.CENTER, or Graphics.RIGHT).
    You need to take the orientation into account when you call the paint() method,
    just as when you use the Font.drawString() method. Figure 10-1 shows some centered
    text within a game display.


