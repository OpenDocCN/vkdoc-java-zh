    **Defining Groups**


    Device groups provide you with a handy way to define features and capabilities
    for many devices at once. For example, consider the popular Series 40 phones from
    Nokia, which share many common capabilities. Using the <groups> element in the
    *devices.xml* file and the corresponding definitions in the *groups.xml* file,
    it is quite easy to group devices. You can also use groups for selecting the appropriate
    resources, such as images or sound files for your application.


    The <groups> root element contains all <group> elements that define the actual
    groups.


    Use the <name> element to define the name of the group. You can add features and
    capabilities, just as for devices and vendors. Devices belonging to this group
    inherit these features automatically. You can also extend another group with the
    <parent> element that contains the name of the extended group. Again, the child
    group will inherit all features and capabilities of the extended group. Listing
    6-3 shows the definitions of the Nokia-UI group and the Series40 group, in which
    the Series40 group extends the Nokia-UI group.


    ■**Note** In *groups.xml*, you find only the explicit groups; that is, groups
    that devices refer to with the


    <groups> element. There are also implicit groups formed from the device capabilities
    JavaPlatform, JavaConfiguration, JavaPackage, SoundFormat, VideoFormat, and BitsPerPixel,
    as listed in Table 6-1.


