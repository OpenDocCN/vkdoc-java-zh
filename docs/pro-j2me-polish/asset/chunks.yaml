    C H A P T E R 7 ■ B U I L D I N G A P P L I C AT I O N S


    **Summary**


    In this chapter, you learned how to build applications with Ant and J2ME Polish.
    You can equip your applications with specific resources without touching the source
    code, use obfuscators to minimize the application size, localize your application,
    and integrate a third-party API.


    In the next chapter, you will explore the possibilities of preprocessing. In contrast
    to the packaging solutions, preprocessing is used on the source code level of
    your application.


    5033CH08.qxd 6/17/05 12:06 PM Page 101


    C H A P T E R 8


    ■ ■ ■


    Preprocessing


    **In this chapter:**


    • Learn why J2ME Polish uses preprocessing for its J2ME APIs.


    • Control preprocessing with directives.


    • Use the standard preprocessing variables supported by J2ME Polish.


    • Define your own variables and symbols in J2ME Polish.


    • Transform variable values using property functions.


    • Explore some practical applications of preprocessing.


    One of the greatest challenges of developing J2ME applications is to adjust them
    to work on many different devices. Along with the detailed device database you
    learned about in Chapter 6, J2ME Polish provides a powerful preprocessor to help
    you meet this challenge.


    Preprocessing is the key to optimizing your application without losing portability.
    This chapter equips you with the necessary knowledge to adjust your application
    to different environments, circumvent known issues, and exploit device-specific
    options.


    **Why Preprocessing?**


    Often, you need to use device-specific code to create optimal applications. For
    example, on Nokia’s MIDP 1.0 devices, you can play back sounds and use a full-screen
    mode, but only when you use Nokia’s UI API. But when you use this API, you cannot
    run your application on other handsets. So what can you do?


    Java allows you to load classes dynamically. So, in theory, you could create several
    versions of your classes and load the correct one dynamically during the runtime
    of your application.


    Unfortunately, this quite drastically reduces the performance of your application
    and increases its size at the same time. Both results are not acceptable in the
    resource-constrained J2ME


    world. Also, some devices do not accept any applications that refer to unknown
    classes, even when those classes are loaded only via Java''s reflection mechanism.


    Another approach is to create a separate project for each target device, or at
    least for each device type. This solves the performance and size problems, but
    leaves you with a huge main-tenance chore. Just imagine the work to implement
    a new feature in all those separate projects!


    **101**


    5033CH08.qxd 6/17/05 12:06 PM Page 102


    **102**


    C H A P T E R 8 ■ P R E P R O C E S S I N G


    A third approach is to use static final variables and the compiler to adjust your
    code.


    You can use normal if branches like if (Configuration.IS_NOKIA_SERIES60) to distinguish
    between different configurations. When Configuration.IS_NOKIA_SERIES60 is a final
    static boolean field and false, the compiler can eliminate the following dead
    code during the compile phase. The main problem here is that you need to create
    and include one Configuration class for each target device, and you need to integrate
    it somehow. Another problem is that you can use if branches only in the normal
    code, so you cannot take this approach for importing different APIs or using different
    fields, for example. Also, you need to make sure to recompile all classes whenever
    you change the Configuration class.


    A more powerful solution is to use *aspects* for adjusting your application. In
    aspect-oriented programming, you code a plain-vanilla application and use aspects
    to inject additional code at specific positions in your source code, called *pointcuts*.
    Aspect-oriented development is quite powerful and allows you to do some amazing
    things, like changing the hierarchy of classes. However, this new paradigm is
    also enormously complex and difficult to learn. On the positive side, you end
    up with a very clean and easy-to-understand application. On the other hand, you
    need to provide a different set of aspects for each target device, meaning that
    you need to split up your application project again.


    ■**Tip** In aspect-oriented development, you distinguish between the main cause
    of your application (for example, a banking application) and its secondary purposes
    (for example, to authenticate its users securely).


    Refer to *http://en.wikipedia.org/wiki/Aspect-oriented_programming* to learn more
    about aspect-oriented development. The AspectJ project ( *http://eclipse.org/aspectj*)
    is a popular solution for the Java world.


    A simple, yet effective, solution is to *preprocess* your application. Preprocessing
    changes your application code before it is compiled. You control this process
    with preprocessing directives, symbols, and variables. J2ME Polish not only includes
    a powerful preprocessor, but it also provides a standardized way to query and
    use the capabilities of the current target device.


    Thanks to the integrated device database, you can access the detailed configurations
    of more than 300 different handsets out of the box, so you don’t need to create
    and maintain your own configurations. Preprocessing allows you to adjust your
    application to different devices and configurations without degrading runtime
    performance, creating incompatibilities, or splitting up your project.


    Preprocessing sounds more complicated than it actually is. Listing 8-1 shows a
    code snippet that uses preprocessing for determining how a sound can be played.


    **Listing 8-1.** *Playing Sound Only When the MMAPI or Nokia’s UI API Is Available*
    public void playAudio() {


    **//#if polish.api.mmapi || polish.midp2**


    try {


    Player player = Manager.createPlayer(


    getClass().getResourceAsStream("/music.mid"), "audio/midi"); player.realize();


    player.prefetch();


