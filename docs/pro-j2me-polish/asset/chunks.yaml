    Installing the Prerequisites


    **In this chapter:**


    • Install the Java SDK ( *http://java.sun.com/j2se*).


    • Install the WTK ( *http://java.sun.com/products/j2mewtoolkit*, or the Mac OS
    X version from *http://mpowers.net/midp-osx*).


    • Obtain an IDE (such as Eclipse, *http://www.eclipse.org*), if you don’t already
    have one.


    • Install Ant ( *http://ant.apache.org*).


    • Obtain device emulators (from vendors, such as *http://forum.nokia.com*, *http://motocoder.com*,
    and *http://developer.samsungmobile.com*).


    J2ME Polish relies on several open-source and free tools. You need to have the
    Java 2 Software Development Kit (SDK), the Wireless Toolkit (WTK), and Ant—either
    stand-alone or as part of your integrated development environment (IDE). You should
    also install device emulators from several vendors for testing your applications.
    Even though these are not strictly needed for developing great applications, they
    make your programming life a good deal easier. This chapter covers the installation
    of these tools.


    **The Java 2 SDK**


    J2ME Polish is a solution for creating wireless Java applications. So, it’s only
    natural that you need Java itself as well. Java comes in three editions for catering
    to different needs:


    • The Java 2 Standard Edition (J2SE) runs on your desktop computer and is needed
    by J2ME Polish for generating the actual mobile applications.


    • The Java 2 Micro Edition (J2ME) runs on mobile phones, but also on television
    set-top boxes, personal digital assistants (PDAs), and embedded devices.


    • The Java 2 Enterprise Edition (J2EE) runs on servers and is used for powering
    web applications or delivering mobile applications over the air.


    If you do not have J2SE installed, please download the latest 1.4. *x* version
    now from *http://java.sun.com/j2se* and install it. You can also use Java 5.0
    (1.5\. *x*), but many mobile emulators require J2SE 1.4, so I recommend that you
    to stick to the 1.4 branch for now.


    **7**


    5033CH02.qxd 6/17/05 11:43 AM Page 8


    **8**


    C H A P T E R 2 ■ I N S TA L L I N G T H E P R E R E Q U I S I T E S


    ■**Tip** See *Beginning J2ME: From Novice to Professional, Third Edition*, by
    Jonathan Knudsen (Apress, 2005) for a great introduction to J2ME development.


    **The Wireless Toolkit**


    The Wireless Toolkit (WTK) provides not only a generic emulator of a Java-enabled
    mobile phone, but also a preverification tool, which you need to make a J2ME application
    ready for deployment.


    The installation is straightforward once you have downloaded it from *http://java.sun.com/*


    *products/j2mewtoolkit*. Just install it into the default directory, and you’re
    ready to go.


    **WTK Versions**


    Several versions of the WTK are available, notably the old 1.0.4 version for Mobile
    Information Device Profile (MIDP) 1.0 phones and the latest version from the 2\.
    *x* branch. Usually, you should go with the latest version, but you can also use
    the 1.0.4 version if you prefer it. The main difference is that you need to compile
    the code to Java 1.1 when you use the older WTK, whereas Java 1.2 is used by default
    when WTK 2\. *x* is available. In theory, this shouldn’t make a difference, but
    sometimes you might encounter really mind-boggling bugs that seem to be linked
    to overloading problems. In such cases, the javac target can make a difference,
    so just keep in mind that you can change it when you use WTK 2\. *x*, but not
    when you use WTK 1.0.4.


    **WTK for Mac OS X**


    The standard WTK is not available for Mac OS X, but you can use a port that is
    provided by mpowers LLC at *http://mpowers.net/midp-osx*. To do so, you need to
    have X11 installed as well, which you can obtain at *http://www.apple.com/macosx/x11*.


    The WTK itself is delivered as a disc image, which is mounted automatically when
    you double-click it. Just install it by dragging the mounted disc image onto the
    desktop first, and then into the *Applications* folder. If you don’t have administrator’s
    rights, you can move the disc image into the *Applications* folder within your
    home folder (create that folder if necessary).


    **IDE**


    In case you don’t use an IDE yet, I recommend the Eclipse IDE, which is available
    for free from *http://www.eclipse.org*. Eclipse provides a modular and powerful
    environment based on plugins. J2ME Polish also brings along some Eclipse plug-ins
    that help you to write preprocessing code, manage emulators, and so on. Chapter
    3 discusses the possible integration in more detail. Refer to *http://eclipse-tutorial.dev.java.net/*
    to learn more about developing Java programs with Eclipse.


    Other popular IDEs include NetBeans ( *http://www.netbeans.org/*) and JBuilder
    ( *http://*


    *www.borland.com/jbuilder/*).


    5033CH02.qxd 6/17/05 11:43 AM Page 9


    C H A P T E R 2 ■ I N S TA L L I N G T H E P R E R E Q U I S I T E S


    **9**


    **Ant**


    Ant forms the well-established standard for building any Java applications. You
    can use Ant from the command line or from within any serious IDE, such as Eclipse,
    NetBeans, JBuilder, or IDEA.


    If you want to use Ant from the command line, you should download the binary distribution
    from *http://ant.apache.org* and extract it. You then need to adjust your PATH
    environment variable, so that the ant command from the *bin* directory can be
    found.


    If you have installed Ant into *C:\tools\ant,* enter the following command on
    your Windows command line (or your shell script):


    SET PATH=%PATH%;C:\tools\ant\bin


    You can change the PATH variable permanently in the System Settings of Windows
    (Start ➤


    Settings ➤ Control Center ➤ System ➤ Advanced ➤ Environment Variables).


    Also set the JAVA_HOME environment variable, which needs to point to the installation
    directory of the Java 2 SDK:


    SET JAVA_HOME=C:\j2sdk1.4.2_06


    Under Unix/Linux/Mac OS X, use the export command instead of the SET command:
    export PATH=$PATH:/home/user/tools/ant/bin


    export JAVA_HOME=/opt/java


    You can set any environment variable automatically by editing the *.bashrc* script,
    found in your home folder.


    Now you should be able to test your Ant setup by querying the installed version:


    > ant -version


    Apache Ant version 1.6.2 compiled on September 11 2004


    ■**Note** Please refer to the “Ant Crash Course” section in Chapter 7 for a guide
    to getting started with Ant.


    It’s not that difficult!


    **Vendor-Specific Emulators**


    Emulators let you check out the look and feel of an application, and sometimes
    even help you find bugs. Some emulators are little more than the standard WTK
    with another skin, but some do reproduce the actual behavior of the device quite
    well.


    ■**Caution** Beware of the “But it works in the emulator” trap! Never rely on
    an emulator. Test as early and as often as possible on the real device.


