    the obfuscation by using such specialized tasks because they may offer more detailed
    settings than J2ME Polish. You can call any Ant target by using the antcall obfuscator:
    <obfuscator name="antcall" target="myobfuscator" />. The antcall obfuscator provides
    the additional properties listed in Table 13-3 that you can use in your Ant target.
    Since you are providing your own Ant target, you will probably not need the keep
    properties but instead use the necessary classnames of your MIDlet directly. Refer
    to Listing 13-7, which invokes the yGuard obfuscator as an Ant target.


