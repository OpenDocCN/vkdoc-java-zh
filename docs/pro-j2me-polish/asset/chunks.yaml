    \ `${polish.classname}` contains the name of the currently processed class, and\
    \ `${polish.source}` points to the directory that contains the source code.\n\n\
    ## Setting the Compiler\n\nYou can use another compiler or configure the compiler\
    \ by using the `<compiler>` element, as shown in Listing 13-12. Ant supports the\
    \ following compilers: `classic`, `modern`, `jikes`, `jvc`, `kjc`, `gcj`, `sj`,\
    \ and `extJavac`. You can use any attributes and nested elements that are supported\
    \ by Ant's `<javac>` task. Usually, debugging information is included only when\
    \ you activate the logging framework with the `<debug>` element, but with the\
    \ settings of Listing 13-12 you will always include debugging information.\n\n\
    **Listing 13-12.** *Using a Specific Compiler*\n\n```\n<j2mepolish>\n  <info\n\
    \    license=\"GPL\"\n    name=\"Roadrunner\"\n    vendorName=\"A reader.\"\n\
    \    version=\"0.0.1\"\n    jarName=\"${polish.vendor}-${polish.name}-roadrunner.jar\"\
    \n  />\n  <deviceRequirements>\n    <requirement name=\"Identifier\" value=\"\
    Generic/midp1\" />\n  </deviceRequirements>\n  <build\n    usePolishGui=\"true\"\
    \n  >\n    <midlet class=\"com.apress.roadrunner.Roadrunner\" />\n    <compiler\
    \ compiler=\"gcj\" debug=\"true\" debuglevel=\"lines,vars,source\" />\n  </build>\n\
    \  <emulator />\n</j2mepolish>\n```\n\n## Using a Postcompiler\n\nA postcompiler\
    \ is called after the sources have been successfully compiled. You can use it\
    \ to modify the bytecode of your application, which is a source of never-ending\
    \ fun—if you happen to like this sort of humor, that is.\n\nSeveral bytecode modification\
    \ libraries are available, most notably BCEL (http://jakarta.apache.org/bcel)\
    \ and ASM (http://asm.objectweb.org). When you are at home with the bytecode level,\
    \ you can gain some amazing benefits. The Floater tool of Enough Software uses\
    \ this mechanism for allowing floating-point calculations on CLDC 1.0 devices,\
    \ for example.\n\nYou can integrate your postcompiler by extending the `de.enough.polish.postcompile.PostCompiler`\
    \ class and implementing the `postcompile( File classesDir, Device device )` method.\
    \ Integrate your postcompiler with the `<postcompiler>` element inside the `<build>`\
    \ element in your `build.xml` script. You can register your postcompiler in `${polish.home}/custom-extensions.xml`\
    \ by using the `postcompiler` type.\n\nCall any Ant targets within your `build.xml`\
    \ script by using the `antcall` postcompiler: `<postcompiler name=\"antcall\"\
    \ target=\"mytarget\" />`. Next to the usual J2ME Polish properties, you can use\
    \ the `polish.postcompile.dir` property that points to the directory containing\
    \ the compiled classfiles.\n\n## Integrating Your Own Obfuscator\n\nYou can easily\
    \ integrate your own or an unsupported third-party obfuscator by extending the\
    \ `de.enough.polish.obfuscate.Obfuscator` class and implementing the `obfuscate(\
    \ Device device, File sourceFile, File targetFile, String[] preserve, Path bootClassPath\
    \ )` method. Integrate your obfuscator with the `<obfuscator>` element, and register\
    \ it with the `obfuscator` type in the `custom-extensions.xml` file.\n\nMost obfuscators\
    \ provide their own Ant tasks as well. Sometimes you might improve the obfuscation\
    \ by using such specialized tasks because they may offer more detailed settings\
    \ than J2ME Polish. You can call any Ant target by using the `antcall` obfuscator:\
    \ `<obfuscator name=\"antcall\" target=\"myobfuscator\" />`. The `antcall` obfuscator\
    \ provides the additional properties listed in Table 13-3 that you can use in\
    \ your Ant target. Since you are providing your own Ant target, you will probably\
    \ not need the keep properties but instead use the necessary classnames of your\
    \ MIDlet directly. Refer to Listing 13-7, which invokes the `yGuard` obfuscator\
    \ as an Ant target.\n\n**Table 13-3.** *Additional Ant Properties for the antcall\
    \ Obfuscator*\n\n| Property | Description |\n|----------|-------------|"
