    **Updating Your Application**


    Updates are quite important for business applications, but they can be equally
    desirable for long-running networked games. Update options depend on the platform.


    MIDP 1.0 Platforms


    Unfortunately, on MIDP 1.0 platforms, there is no way to trigger an update from
    within your application. Here are a few update strategies to consider:


    • Query the current version whenever you make your first handshake with the server-side
    application. Depending on the business requirements, you could then notify the
    user that an update is available, or the server can deliver content specific to
    the version of your client J2ME application. When an active user chooses to update
    the application, you could send an SMS text message containing the link to the
    latest JAD file on the server. Most devices can now identify HTTP-based links
    in SMS messages and start the WAP browser directly.


    • Send a binary message that contains a WAP-link to the user. The user can then
    save and invoke that link.


    • Send the complete application via an MMS message to the user’s handset. This
    is the most user-friendly way, but not all devices support deployment via MMS.


    MIDP 2.0 Platforms


    On MIDP 2.0 platforms, you can start the update process directly from within your
    application by issuing a platform request. Since platform requests are handled
    differently by real-world devices, you should prepare to exit your application
    after requesting an update. In any case, your application will be shut down before
    the update is actually put into place. Listing 5-3


    shows an example of a MIDlet that persists its current version in a RecordStore
    so that it can detect updates.


