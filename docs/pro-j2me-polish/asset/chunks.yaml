    **41**


    The <identifier> element identifies the device uniquely by stating the names of
    the vendor and of the device, separated by a single slash. You can also define
    several devices at once by separating the identifiers with commas:


    <identifier>Sony-Ericsson/K700, Sony-Ericsson/K700i</identifier> Use the <features>
    element to describe simple Boolean capabilities of the device:


    <features>hasCamera, hasPointerEvents</features> Examples include the existence
    of a camera (hasCamera), the support of pen-based input methods (hasPointerEvents),
    and being a virtual device (isVirtual). To define several features, separate them
    with commas. Features behave like Boolean variables: either they are defined (true)
    or they are not defined (false).


    For defining more complex device capabilities, you use the <capability> element,
    which always has a name and a value:


    <capability name="ScreenSize" value="176x208"/> Like the preceding elements, a
    <capability> can contain several values that are separated by commas:


    <capability name="JavaPackage" value="mmapi, wmapi, btapi"/> Capabilities behave
    like variables with values. You can define any kind of capability, but J2ME provides
    standardized capabilities, as listed in Table 6-1.


    ■**Note** You can define a capability in different ways. The most common method
    is to use the short notation using the name and value attributes. An equally valid
    notation is to use the nested elements


    <capability-name> and <capability-value>. Even though that format is much more
    verbose and cannot be read as easily, it ensures compatibility with the J2EE Client
    Provisioning specification. You can find this specification at *http://jcp.org/en/jsr/detail?id=124*.


    You can explicitly add the device to any groups by specifying the <groups> element:


    <groups>Series60</groups>


    Again, you can define several groups by separating them with commas. These groups
    can, in turn, define features and capabilities, so that you don’t need to specify
    these capabilities in the corresponding devices. Groups are also integral to the
    automatic resource assembling of J2ME Polish. Along with these explicitly defined
    groups, J2ME Polish also uses *implicit groups*.


    Implicit groups are formed from specific capabilities, such as JavaPlatform, JavaPackage,
    or BitsPerColor. Implicit groups help you in the resource assembling step when
    you build your J2ME application. Table 6-1 also shows capabilities that create
    implicit groups.


    5033CH06.qxd 6/17/05 11:48 AM Page 42


    **42**


    C H A P T E R 6 ■ T H E D E V I C E D ATA B A S E


    ■**Note** Whether or not a capability results in an implicit group will be defined
    in the *capabilities.xml* file from J2ME Polish 1.3 onwards.


    Sometimes, it is useful to extend other devices. Consider, for example, the device
    modifications of some carriers like Vodafone. Such carriers often add some libraries
    like the Vodafone Service Class Library (VSCL) and market the device under a different
    name. One example in the device database is the Sony-Ericsson K500i, which is
    marketed by Vodafone as the F500i.


    For such cases, you can use the <parent> element, in which you specify the original
    device:


    <parent>Sony-Ericsson/K500i</parent>


    All features and capabilities of the parent device are inherited automatically.
    When you extend another device, you need to make sure that the parent device is
    defined above the child device; otherwise, J2ME Polish won’t be able to resolve
    the inheritance correctly and will abort the processing.


    You can specify the supportsPolishGui attribute of the <device> element to explicitly
    allow the use of the J2ME Polish GUI for the corresponding device. Normally, J2ME
    Polish checks automatically if a device has the recommended capabilities, such
    as supporting more than 256 colors and having a heap size greater than 500KB.
    By default, the J2ME Polish GUI is used only for devices that do have the recommended
    capabilities. The supportsPolishGui attribute allows you to override the automatic
    checking for GUI support.


    ■**Tip** You can override the GUI indicators by setting the usePolishGui attribute
    in your *build.xml* file to always instead of yes. Then the J2ME Polish GUI will
    be used for all target devices, regardless of the settings in the device database.


