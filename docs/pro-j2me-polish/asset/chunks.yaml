    **Defining Complementing Capabilities and Features**


    You can define capabilities and features in the *vendors.xml*, *groups.xml*, and
    *devices.xml* files.


    A device automatically inherits all features and capabilities of its vendor and
    of all groups to which the device belongs. Such a hierarchy can become quite complex,
    as shown in Figure 6-1.


    **Figure 6-1.** *A device can have a complex hierarchy.*


    Any defined features are additive. This means that if a device’s vendor defines
    *x*, a device’s group defines *y*, and the device itself defines *z*, your device
    will end up with all the features: *x*, *y*, and *z*.


    Capabilities are usually overwritten when they are defined in several places.
    Capabilities in *groups.xml* overwrite the same capabilities in *vendors.xml*,
    and capabilities in *devices.xml* overwrite those that are defined elsewhere.
    Phones from Nokia’s popular Series 40 usually have a screen size of 128✕128 pixels,
    so you find the corresponding definition in the Series40


    group in *groups.xml*:


    <capability name="ScreenSize" value="128x128" /> Some devices from the Series
    40 do have a different screen size, however. In that case, you can just define
    the ScreenSize capability in *devices.xml* with a different value for the corresponding
    devices.


    Some capabilities, however, are cumulative, just like features. If you define
    the JavaPackage, JavaProtocol, SoundFormat, VideoFormat, and Bugs capabilities
    in several places along the hierarchy of a device, they will all add up. For example,
    the JavaPackage capability defines the


    5033CH06.qxd 6/17/05 11:48 AM Page 49


    C H A P T E R 6 ■ T H E D E V I C E D ATA B A S E


    **49**


    supported libraries of a device. All Series 60 phones support the Nokia UI API,
    so the Series60


    group defines this:


    <capability name="JavaPackage" value="nokia-ui" /> The Series60 group actually
    inherits this setting from the Nokia-UI group. Take a look at any device definition
    that belongs to the Series60 group in the *devices.xml* file, and you will see
    that the nokia-ui value is not repeated in the JavaPackage capability, because
    that value is inherited automatically.


    ■**Note** From J2ME Polish 1.3 onwards, you can define whether a capability adds
    or replaces previously set values in the *capabilities.xml* file.


    **Using the Device Database**


    So now you know how the J2ME Polish device database works, but what can it be
    used for?


    Here are some of the things you can do with the device database:


    • Select your target devices with the <deviceRequirements> element.


    • Use automatic resource assembling by putting your images and other resource
    files into the *resources* directory and its subfolders.


    • Optimize your application by evaluating and using device features and capabilities
    taken from the database.


    • Adjust the database to your own needs without affecting other projects.


    **KNOW YOUR TARGET DEVICES**


    When you develop your application for a specific device, you may encounter problems
    or even device bugs. To get information about your target devices, take a look
    at the device database at *http://www.j2mepolish.org/*


    *devices-overview.html*. This is basically a fancy view of the *devices.xml* file
    and related files, which allows you to navigate easily between different devices,
    groups, vendors and so on. If you don''t have online access, you can also view
    the devices at *${polish.home}/doc/html/devices-overview.html*.


    Make sure to check out the known issues of your target device. Often, this helps
    you to solve any problems more quickly. You can also browse all devices that support
    a needed API of your application, which is important when you plan the architecture
    of your application.


