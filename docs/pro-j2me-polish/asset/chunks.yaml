    **Managing Variables and Symbols**


    Most preprocessing directives need preprocessing symbols or variables on which
    to operate.


    Many symbols and variables are defined in the device database, but you are free
    to define your own variables and symbols as well.


    For each preprocessing variable, several symbols are defined automatically: the
    symbol


    [ *variable-name*]:defined is set for each defined variable, and one [ *variable-name*].[
    *value*]


    symbol is defined for each value that the variable holds. For example, for the
    fictitious variable config.Locations with the equally fictitious values London,
    New-York, Moscow, the following symbols would be defined automatically:


    • config.Locations:defined


    • config.Locations.London


    • config.Locations.New-York


    • config.Locations.Moscow


    The same mechanism is used when there is only one value in the variable. If, for
    example, only London were set for the config.Locations variable, the preprocessing
    symbols config.


    Locations:defined and config.Locations.London would be defined.


    As well as defining your own symbols and variables, you may need to transform
    variables before you use or compare them. J2ME Polish provides property functions
    for this task. In this section, you will learn how to define and transform symbols
    and variables. But first, let’s take a look at the symbols that are already defined
    in the J2ME Polish device database.


