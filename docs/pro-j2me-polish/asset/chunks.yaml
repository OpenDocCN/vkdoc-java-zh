    click Add Folder to add another source folder. You should, however, not do this
    when you want to implement the same classes several times. In that case, your
    IDE would (correctly) complain about duplicate class definitions. Just use one
    main source folder (such as *source/src*), and add the other source folders to
    the parent directory, such as *source/midp2*, *source/nokiaui*, and so on. Another
    strategy is to use different projects in your IDE that contain the different sources.


