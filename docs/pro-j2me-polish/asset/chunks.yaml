    **99**


    <deviceRequirements>


    <requirement name="Identifier" value="Generic/midp1" />


    </deviceRequirements>


    **<build**


    **compilerMode="true"**


    **compilerModePreverify="true"**


    **compilerDestDir="preverified"**


    **>**


    <midlet class="com.apress.roadrunner.Roadrunner" />


    </build>


    <emulator />


    </j2mepolish>


    J2ME Polish sets the javac-target to either 1.1 or 1.2 depending on the used WTK.
    You can also set the target directly by specifying the javacTarget attribute of
    the <build> element.


    Debug information is not added unless the debugging mode is enabled with the <debug>
    element.


    If you need full control of the compiler settings, you can also use the <compiler>
    element, which is a nested element of the <build> section. Listing 7-41 demonstrates
    how to use the


    <compiler> element.


    **Listing 7-41.** *Using the <compiler> Element*


    <build


    compilerMode="true"


    compilerModePreverify="true"


    compilerDestDir="preverified"


    >


    <midlet class="com.apress.roadrunner.Roadrunner" />


    **<compiler**


    **compiler="jikes"**


    **debug="true"**


    **debuglevel="lines,vars,source"**


    **optimize="true"**


    **/>**


    </build>


