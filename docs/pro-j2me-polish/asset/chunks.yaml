    静态样式通过在应用程序源代码中使用 `#style` 预处理指令应用于特定的项或屏幕。程序员只需告知设计师样式名称及其用途（即用于何种项或屏幕），而设计师则需要在
    *polish.css* 文件中定义这些样式。在 CSS 文件中，静态样式始终以点号开头，例如 `.myStyle`。


    静态样式比动态样式速度更快，资源消耗更少。应尽可能坚持使用静态样式和预定义样式。


    预定义样式


    J2ME Polish GUI 在内部使用预定义样式。与普通的“用户定义”静态样式不同，它们的名称不以点号开头，例如使用 `title` 而非 `.title`。


    表 12-7 列出了可用的预定义样式。当您未定义某个预定义样式时，将使用“default”样式作为替代。


    **表 12-7.** *支持的预定义样式*


    **样式**


    **描述**


    title


    屏幕标题的样式。对于 MIDP 2.0 设备，默认使用原生实现，除非使用了菜单全屏模式，或者预处理变量 `polish.usePolishTitle` 被定义为
    true：


    `<variable name="polish.usePolishTitle" value="true" unless="polish.Vendor ==
    Nokia" />`。


    您也可以通过使用 `title-style` 属性为特定的 Screen 或 ChoiceGroup 使用自定义样式。


    focused


    当前焦点项的样式。此样式用于 List、Form 以及 ChoiceGroup 等容器。您也可以通过使用 `focused-style` 属性为特定的 Screen
    或 ChoiceGroup 使用自定义样式。


    menu


    此样式用于设计全屏模式下的菜单栏。全屏模式可通过 *build.xml* 中 `<build>` 元素的 `fullScreenMode` 属性触发（设置
    `fullScreenMode="menu"`）。在 menu 样式中，您还可以使用 `focused-style` 属性定义当前焦点命令所使用的样式，例如：`focused-style:
    menuFocused;`。在这种情况下，您还需要定义静态样式 `.menuFocused`。


    menuItem


    用于屏幕菜单项（命令）的样式。当未定义 `menuItem` 时，将使用 `menu` 样式作为替代。


    label


    此样式用于任何项的菜单标签。可以通过在相应样式中定义 CSS 属性 `label-style` 来指定另一个标签样式，该属性引用另一个样式。


    info


    用于在屏幕中显示附加信息的样式。目前，此样式仅用于在 TextField 或 TextBox 的直接输入模式启用时显示当前输入模式。


    default


    当所需的预定义样式未定义时，J2ME Polish GUI 使用的样式。即使未在 *polish.css* 文件中显式定义，`default` 样式也始终存在。


    tabbar


    此样式用于设计 TabbedForm 的标签栏。


    activetab


    用于设计 TabbedForm 中当前活动的标签。


    5033CH12.qxd 6/20/05 11:31 AM Page 185


    第 12 章 ■ 使用 GUI **185**


    **样式**


    **描述**


    inactivetab


    用于设计 TabbedForm 中除当前选中标签外的所有标签。


    topframe


    用于设计 FramedForm 的上部边框。


    bottomframe


    用于设计 FramedForm 的下部边框。


    leftframe


    用于设计 FramedForm 的左侧边框。


    rightframe


    用于设计 FramedForm 的右侧边框。


    frame


    当您未使用更具体的样式时，可以使用 `frame` 样式在一个样式中设计 FramedForm 的所有边框。


    不允许将预定义样式的名称用于静态样式，因此您不能使用名为 `.title` 等的静态样式。


    动态样式


    使用动态样式可以在不修改源代码中 `#style` 指令的情况下将样式应用于项。通过动态样式，设计师可以完全独立于程序员工作，并为尚未关联静态样式的 GUI
    项尝试新的设计。您还可以在不更改现有应用程序源代码的情况下，探索 J2ME Polish API 的强大功能和可能性。

