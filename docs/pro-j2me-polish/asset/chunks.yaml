    \ point out that dynamic programming does not relieve you of the testing burden:\
    \ you still need to test your application on every target device you want to support.\
    \ The benefit is to have only one JAR file, which eases the application’s deployment.\n\
    \n**Tip** When you’re deploying dynamic code, you should consider separating your\
    \ code according to the Model-View-Control pattern so that you can exchange views\
    \ more easily. The common practice on wireless Java platforms is to merge the\
    \ controller and the model to minimize class usage (and therefore JAR space).\n\
    \n## Using Preprocessing\n\nPreprocessing changes your source code before it is\
    \ actually compiled. This approach provides an unmatched flexibility. Listing\
    \ 15-3 shows how to get the same functionality as in the dynamic code example\
    \ in Listing 15-2 with only a fraction of code. In more complex scenarios, you\
    \ will profit even more by using preprocessing.\n\n**Listing 15-3.** *Implementing\
    \ a Full Screen with Preprocessing*\n```\npackage com.apress.preprocessing;\n\n\
    import javax.microedition.lcdui.*;\nimport javax.microedition.midlet.*;\n\npublic\
    \ class GameMidlet extends MIDlet {\n    private Display display;\n\n    public\
    \ GameMidlet() {\n    }\n\n    public void startApp() {\n        this.display\
    \ = Display.getDisplay( this );\n        Splash splash = new Splash();\n     \
    \   this.display.setCurrent( splash );\n    }\n\n    public void destroyApp( boolean\
    \ unconditional ) {\n    }\n\n    public void pauseApp() {\n    }\n}\n\n// the\
    \ splash screen:\npackage com.apress.preprocessing;\n\nimport javax.microedition.lcdui.*;\n\
    \npublic class Splash\n//#if polish.midp2\n    extends Canvas\n//#elif polish.classes.fullscreen:defined\n\
    //#= extends ${polish.classes.fullscreen}\n//#else\n    // hide extends clause\
    \ from the IDE:\n//# extends Canvas\n//#endif\n{\n    public void paint( Graphics\
    \ g ) {\n        //#if polish.midp2\n            setFullScreenMode( true );\n\
    \        //#endif\n        //#if polish.FullCanvasSize:defined\n            //#=\
    \ g.drawString(\"Starting!\",\n            //#= ${polish.FullCanvasWidth}/2,\n\
    \            //#= ${polish.FullCanvasHeight}/2,\n            //#= Graphics.HCENTER\
    \ | Graphics.BASELINE );\n        //#else\n            g.drawString(\"Starting!\"\
    , getWidth()/2, getHeight()/2, Graphics.HCENTER | Graphics.BASELINE );\n     \
    \   //#endif\n    }\n}\n```\nThe simple preprocessing code needs two fewer classes\
    \ than the dynamic code, which is a reduction of 50%! It also solves the problem\
    \ of Nokia’s `getHeight()` method in full-screen mode, since it uses hard-coded\
    \ values.\n\nAnother benefit of preprocessing is that you can check for known\
    \ issues by testing the `polish.Bugs` capability, for example, `//#if polish.Bugs.drawRgbOrigin`.\
    \ This allows you to circumvent most bugs; please refer to the known issues database\
    \ at `http://www.j2mepolish.org/devices/issues.html` and Chapter 8 for more details.\n\
    \n**Tip** The J2ME Polish client APIs, like the user interface, make heavy use\
    \ of preprocessing so that they can adapt to the target device. This is a kind\
    \ of fully automatic adjustment, since no further manual intervention is needed\
    \ from your side. Since you can find most errors in the user interface classes,\
    \ you can save a lot of effort and sweat here.\n\nA disadvantage of preprocessing\
    \ is the little or nonexisting support for it by the common IDEs. That’s why J2ME\
    \ Polish includes a preprocessing-aware Java editor for the Eclipse IDE from version\
    \ 1.3 onward, as shown in Figure 15-1.\n\n![Image 57](index-322_1.jpg)\n\n**Figure\
    \ 15-1.** *The preprocessing-aware Eclipse editor in action*\n\n**Note** Aspect-oriented\
    \ programming provides a similar flexibility to preprocessing. It is, however,\
    \ quite difficult to manage. The available solutions also depend on reflection\
    \ and add their own dispatcher core, which needs additional JAR space of around\
    \ 40KB.\n\n## Using Different Source Files\n\nA similar approach to preprocessing\
