    J2ME Polish calls the preprocessor automatically for you, by the way. So you need
    to include only the necessary preprocessing statements in your code. The rest
    is taken care of by J2ME Polish.


    **Preprocessing Directives**


    J2ME Polish equips you with powerful preprocessing directives for controlling
    the preprocessing phase. All directives start with the standard Java line comment
    characters (double slash) followed by a hash mark, so that they don’t confuse
    your IDE and Java compiler. Table 8-1 lists all of the supported preprocessing
    directives. These are described in detail in the following sections.


    ■**Note** You can also implement your own preprocessing directives, as described
    in Chapter 13.


    **Table 8-1.** *J2ME Preprocessing Directives*


    **Directive**


    **Description**


    **Example**


    //#ifdef


    Checks if a single preprocessing


    //#ifdef polish.api.mmapi


    symbol is defined


    //#ifndef


    Checks if a single preprocessing


    //#ifndef polish.api.mmapi


    symbol is not defined


    //#else


    Branches in an //#ifdef or //#if


    //#else


    directive


    //#elifdef


    Branches and checks for another


    //#elifdef polish.midp2


    single preprocessing symbol


    //#elifndef


    Branches and checks whether


    //#elifndef polish.midp2


    another single preprocessing


