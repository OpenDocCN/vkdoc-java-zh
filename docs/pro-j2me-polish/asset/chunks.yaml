- fmt: '# Note

    J2ME Polish will support building DoJa applications from version 1.3 onward. You
    can use either preprocessing or different source folders (using the `<source>`
    elements in your `build.xml`) for targeting DoJa and MIDP platforms in the same
    project.


    ## WIPI Platforms


    The Wireless Internet Platform for Interoperability (WIPI, `http://wipi.or.kr/English`)
    is the Korean standard for mobile Java applications. Previously the BREW standard
    was strong in Korea, but now all operators have embraced the WIPI 1.2 standards,
    with WIPI 2.0 waiting just around the corner.


    Java applications don’t need to be preverified, because the bytecode is transcoded
    into C source code first and subsequently compiled to the native binary code on
    WIPI platforms.


    Otherwise, the deployment is compatible with the MIDP standard: the JAR file contains
    resources and classes, and the JAD file contains the description.


    WIPI 1.2 applications are based on CLDC 1.0 and have a similar feature set as
    the MIDP 1.0 profile.


    WIPI 2.0 is fully compatible with the CLDC 1.1 and MIDP 2.0 standards.


    # Note

    You can build your application for WIPI platforms beginning with the J2ME Polish
    1.3 release.


    ## Writing Portable Code


    Writing portable code is one of the main challenges of creating wireless Java
    applications. But writing portable code is a Good Thing, because you want to support
    as many devices as possible for maximum revenue. Basically, four strategies are
    available for writing portable code:


    - Use the lowest common denominator.

    - Use dynamic code that adjusts itself during the runtime.

    - Use different source files depending on the target device.

    - Use preprocessing.


    In the following sections, I will discuss the advantages and caveats of each approach.


    The J2ME Polish GUI uses preprocessing for adjusting itself to the various environments.


    ### Using the Lowest Common Denominator


    Using the lowest common denominator makes things quite simple; you just need to
    stick to the MIDP 1.0 profile and the CLDC 1.0 profile. Unfortunately, this is
    not the whole truth.


    Besides the need for professional user interfaces and the limited functionality,
    you still have to circumvent device bugs somehow. But since you deal only with
    a small fraction of the available possibilities, you might get away lucky.


    A similar strategy is to target only MIDP 2.0 devices, which is becoming more
    and more feasible, even though new devices with MIDP 1.0 support are still released
    into the market.


    The MIDP 2.0 technology is, however, young and therefore behaves quite differently
    and unexpectedly on different existing devices. Problems with device issues are
    inevitable.


    The advantage of using a common denominator is that you have only one application
    bundle, so deploying the application is much easier. But this strategy does not
    relieve you of the testing burden, since you still need to test your application
    on every target device. Business relationships can be seriously jeopardized when
    you say that your application is running on a specific handset but in reality
    it isn’t.


    # Caution

    Using the lowest common denominator is a valid approach, but you should consider
    the business aspects of this decision as well. Users might be disappointed about
    “old” or “lame” applications, so they will choose another vendor the next time.
    Also, you will have difficulties finding marketing partners unless you have come
    up with a revolutionary new concept.


    ### Using Dynamic Code


    Dynamic coding is one of the main benefits of Java platforms. Since there is no
    real reflection support on the CLDC/MIDP platforms, you can use only `Class.forName()`,
    parameters, and flexible functions for implementing this approach.


    An example for using dynamic class loading is the obligatory splash screen. Listing
    15-2'
