- fmt: '# Styles


    `Styles` can use any name, as long as it consists of alphanumeric and underline
    (`_`) characters only. Names are not case-sensitive. Static styles need to start
    with a dot. Static styles must not use the names of dynamic or predefined styles.
    All Java keywords, such as `class`, `int`, or `boolean`, are not allowed as style
    names.


    ## Grouping of Attributes


    You can group attributes for easier handling. The styles `.mainScreen` and `.helpScreen`
    in Listing 12-21 use the semantically equivalent font definition. The grouping
    does not change the meaning of the attributes, but it makes the declarations more
    readable for humans.


    **Listing 12-21.** *Grouping CSS Attributes*


    ```

    .mainScreen {

    padding: 5;

    font-color: black;

    font-size: medium;

    font-style: italic;

    font-face: system;

    }

    .helpScreen {

    margin: 5;

    background-color: yellow;

    font {

    color: black;

    size: medium;

    style: italic;

    face: system;

    }

    }

    ```


    ## Referring to Other Styles


    When you refer to another style, you don’t need to write the dots of static styles.
    You refer to other styles, for example, after the `extends` keyword or in attributes
    such as `title-style`, `focused-style`, and so on.


    ## Comments


    You can insert comments at any place by starting them with `/*` and stopping them
    with `*/`. Everything between these boundaries is ignored, as shown in Listing
    12-22.


    **Listing 12-22.** *Using Comments in the `polish.css` File*


    ```

    /**

    * this style designs the main screen:

    **/

    .mainScreen {

    /* defining the color of a font: */

    font-color: black;

    /* sizes are small, medium, and large: */

    font-size: medium;

    /* styles are plain, bold, italic, or underlined: */

    font-style: italic;

    /* the face can either be system, proportional, or monospace: */

    font-face: system;

    }

    ```


    ## Common Design Attributes


    In each style, you can use some common attributes regardless of what item or screen
    you actually design with that style. In the following sections, you will learn
    how you can use these general attributes.


    ### Structure of the `polish.css` File


    The `polish.css` file can contain different sections:


    - **The colors section**: The colors section contains the definition of colors.

    - **The fonts section**: The fonts section contains font definitions that you
    can reference in several styles.

    - **The backgrounds section**: The backgrounds section contains background definitions
    that can be used by several styles.

    - **The borders section**: The borders section contains definition of borders
    for several styles.

    - **The rest**: The rest of `polish.css` contains the actual style definitions.


    You can reference the defined colors, fonts, backgrounds, and borders in the actual
    style definitions. This makes changes easy, since you need to change the value
    in only one place.


    ### Structure of a Style Definition


    Each style can contain several common attribute groups:


    - **margin**: The gap between items

    - **padding**: The gap between the border and the content of an item

    - **font**: The used content font and its color

    - **layout**: The layout of the items

    - **background**: The definition of the Item’s or Screen’s background

    - **border**: The definition of the Item’s or Screen’s border

    - **before and after**: Elements that should be inserted before or after the items.

    - **min-width and max-width**: The width of Items

    - **focused-style**: The style that is used when the Item is focused

    - **Specific attributes**: Any attributes for specific GUI items


    Listing 12-23 demonstrates what a complete `polish.css` file can look like.


    **Listing 12-23.** *A Complete `polish.css` File*


    ```

    colors {

    bgColor: rgb( 132,143,96 );

    highlightedBgColor: rgb( 238,241,229 );

    highlightedFontColor: rgb( 238,241,229 );

    fontColor: rgb( 30, 85, 86 );

    }

    borders {

    thinBorder {

    type: round-rect;

    arc: 8;

    color: fontColor;

    }

    }

    backgrounds {

    imageBackground {

    ```'
