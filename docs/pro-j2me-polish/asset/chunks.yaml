    The dynamic code of Listing 15-2 has only one problem: Nokia’s FullCanvas implementation
    often does not report the correct height in the getHeight() method. This is not
    a real problem, since the only effect is that the “Starting” String is drawn not
    really vertically centered. The case is different, however, when you also paint
    a background. In that case, a blank area would remain when you call g.fillRect(
    0, 0, getWidth(), getHeight() ) or similar.


    The previous code has already circumvented one issue of Sony Ericsson’s P910 phone,
    though. This phone reacts quite irritated whenever you enable the MIDP 2.0 full-screen
    mode anywhere other than the paint() method—at least for the first shown screen.
    Of course, the whole approach also fails when you want to target other platforms
    than the MIDP ones.


    Another possible problem is the associated code bloat when you use dynamic code.
    This is not most likely a real problem on modern devices, but the whole purpose
    of using dynamic programming is to provide one application code for all devices.
    In fact, the performance might be affected quite badly. In Listing 15-2, two exceptions
    will be thrown when neither the MIDP 2.0 profile nor the Nokia UI API is present
    on the device. Exceptions are very costly in regard to the performance of an application,
    so you lose quite a lot potential here.


    Dynamic programming can be quite powerful, though; you can even check for keycodes
    of nonstandardized keys, such as the soft keys, dynamically by using the Canvas.getKeyName()
    method, for example. In general, you need to provide one solution for any possible
    combination. So, this makes dynamic programming quite difficult.'
