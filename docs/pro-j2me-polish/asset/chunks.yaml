- fmt: "`polish.obfuscate.source`\n\nThe JAR file containing the unobfuscated classes\n\
    \n`polish.obfuscate.target`\n\nThe JAR file that should be created\n\n`polish.obfuscate.bootclasspath`\n\
    \nThe boot classpath for the target device\n\n`polish.obfuscate.classpath`\n\n\
    The classpath for the current target device\n\n`polish.obfuscate.keepcount`\n\n\
    The number of classes that should not be obfuscated\n\n`polish.obfuscate.keep`\n\
    \nAll classes separated by a comma that should not be obfuscated\n\n`polish.obfuscate.keep.0`\n\
    \nThe first class that should not be obfuscated\n\n`polish.obfuscate.keep.n`\n\
    \nThe *n* th class that should not be obfuscated\n\n## Integrating a Preverifier\n\
    \nMIDP applications need preverification for allowing fast verification on the\
    \ resource-constrained devices. You can call different preverifiers by using the\
    \ `<preverifier>` element, which is nested inside the `<build>` element in your\
    \ `build.xml` script.\n\nYou can implement your own preverifier by extending the\
    \ `de.enough.polish.preverify.Preverifier` class and implementing the `preverify(\
    \ Device device, File sourceDir, File targetDir, Path bootClassPath, Path classPath\
    \ )` method. You can register your implementation in `${polish.home}/custom-extensions.xml`\
    \ using the type `preverifier`.\n\nYou can call any Ant target for preverifying\
    \ your application with the `antcall` preverifier:\n\n`<preverifier name=\"antcall\"\
    \ target=\"mypreverify\" />`. Along with the usual J2ME Polish properties, you\
    \ can use `polish.preverify.source`, which points to the directory containing\
    \ the unpreverified classes; `polish.preverify.target`, which contains the folder\
    \ to which the preverified classes should be written; and `polish.preverify.bootclasspath`\
    \ and `polish.preverify.classpath`, which contain the classpaths for the current\
    \ target device.\n\nUse the `none` preverifier for skipping the obfuscation step:\
    \ `<preverifier name=\"none\" />`.\n\nThis is useful for devices that do not need\
    \ preverification, such as cell phones compliant to the Korean WIPI standard.\n\
    \nIf you want to always use a specific preverifier (or none, for that matter)\
    \ for a specific device, vendor, or platform, you can define the `build.Preverifier`\
    \ capability in the device database. J2ME Polish defines the `none` preverifier\
    \ for the WIPI profiles in `${polish.home}/platforms.xml`, such as `<capability\
    \ name=\"build.Preverifier\" value=\"none\" />`.\n\n## Copying and Transforming\
    \ Resources\n\nUse the `<copier>` element for copying the device- and locale-specific\
    \ resources to a temporary directory. Along the way, you could rename resources\
    \ or even merge them to save some bytes in your JAR file.\n\nThe `<copier>` element\
    \ is nested inside the `<resources>` element, which in turn can be used in the\
    \ `<build>` section of your `build.xml` file. J2ME Polish provides the standard\
    \ renamer extension that can rename your resources while copying them. Use the\
    \ parameters `searchPattern` and `replacement` for configuring this process. In\
    \ Listing 13-13, all parts in resource names that are surrounded by curly braces\
    \ are removed. You can use this mechanism for adding verbose information to resource\
    \ names without wasting space. A file called `m0{first icon of main command}.png`\
    \ would be renamed to `m0.png`, for example.\n\n**Listing 13-13.** *Renaming Resources\
    \ on the Fly*\n\n```\n<resources\n  dir=\"resources/default\"\n  defaultexcludes=\"\
    yes\"\n  excludes=\"*.db\"\n>\n  <copier name=\"renamer\">\n    <parameter name=\"\
    searchPattern\" value=\"\\{.*\\}\" />\n    <parameter name=\"replacement\" value=\"\
    \" />\n  </copier>\n  <localization locales=\"en\" />\n</resources>\n```\n\nYou\
    \ can also call any Ant target for copying the resources: `<copier name=\"antcall\"\
    \ target=\"copy\" />`. Use the additional Ant properties `polish.resources.target`\
    \ (which points to the directory to which all resources should be copied) and\
    \ `polish.resources.files` (which contains a list of comma-separated paths of\
    \ the resources that need to be copied). You can also use the Ant property `polish.resources.filePaths`,\
    \ which contains the paths of the files separated by semicolons (Windows) or colons\
    \ (Unix)."
