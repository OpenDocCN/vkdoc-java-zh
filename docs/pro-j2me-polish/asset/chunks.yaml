- fmt: "# Chapter 15: Dancing Around Device Limitations\n\n## Summary\n\nProgramming\
    \ in the real world is different from the theory. Sadly, Java's promise of \"\
    code once, run everywhere\" is not yet fulfilled. In this chapter, you learned\
    \ about the difficulties you will encounter in the real world and how to overcome\
    \ the most common dilemmas. Also, you now know where to ask for help when you\
    \ cannot solve specific problems.\n\nIn the forthcoming chapter, you will learn\
    \ how to optimize the performance, the size, and the memory usage of your application.\n\
    \n# Chapter 16: Optimizing Applications\n\n**In this chapter:**\n\n- Understand\
    \ that optimizing is the last step for creating a successful application for the\
    \ resource constrained J2ME world.\n- Learn to optimize in the following three\
    \ areas: performance, memory consumption, and JAR size.\n- Discover that some\
    \ optimizations improve all areas, while others constitute tradeoffs.\n- Plan\
    \ possible high-level optimizations during the architecture phase but postpone\
    \ low-level optimizations until your application works correctly.\n\nSince J2ME\
    \ devices are resource constrained, you need to optimize your application for\
    \ execution speed, memory consumption, and JAR file size. In this chapter, you'll\
    \ learn tips and tricks for getting the very best out of your application.\n\n\
    ## Optimization Overview\n\nOptimizing your application is not a trivial task.\
    \ As discussed in this section, you need to consider unintentional side effects,\
    \ different levels of optimizations, and how you want to structure your efforts.\n\
    \nOne unintentional side effect of optimization is increased usage of heap memory\
    \ when optimizing for performance. For example, painting different parts of an\
    \ image using the `Graphics.setClip()` method is quite slow compared to splitting\
    \ the image into the different parts and painting each part directly. But the\
    \ splitting process requires additional heap memory—at least double the original\
    \ memory required for the base image.\n\nAlso, low-level optimizations often decrease\
    \ the readability and maintainability of your source code. Modulo operations can\
    \ be implemented using the `&` operator, when the argument is a power of two;\
    \ for example, `int round = i % 8;` can be rewritten as `int round = i & 7;`.\n\
    \nWhereas the first term is easy to understand, the second one is not so obvious.\
    \ You can also change the argument `8` in the first term to any number without\
    \ changing the logic of the program. In contrast, you can use only numbers that\
    \ are one less than a power of two (`x2 – 1`) in the second term.\n\nA general\
    \ piece of advice about optimization is to ensure the correctness of your application\
    \ first before moving into the optimization phase. This is not entirely true for\
    \ the J2ME world, however. You need to take the constraints of your target devices\
    \ into account in the architecture phase and possibly even in the idea phase.\
    \ Some high-level architecture decisions such as the class model or the used protocols\
    \ have a direct impact on the runtime behavior of your application. So in the\
    \ J2ME world, the advice to postpone optimizations applies only to low-level optimizations.\n\
    \nYou can optimize your application in two different ways.\n\nOne approach is\
    \ to come up with some ideas about why your application is slow, and then change\
    \ all the code pieces that can be improved in one way or another, throw away working\
    \ but possibly slow parts, and introduce new features along the way.\n\nThe other,\
    \ more rational approach is to measure the performance on your actual target devices.\
    \ This helps you to identify the bottlenecks in your application. Set realistic\
    \ goals such as \"Part X should complete in under two seconds in 80% of cases.\"\
    \ Then hypothesize why a specific part is too slow. Prove your hypothesis by implementing\
    \ one change at a time, repeating the measurement, and then asking yourself, \"\
    Has this particular change improved the situation?\" Always choose to eliminate\
    \ the easiest bottleneck first, because removing one bottleneck can alter the\
    \ measurements of the complete application.\n\n## Improving Performance\n\nTo\
    \ improve the performance of your application, you first need to know what parts\
    \ of the application need to be improved. You can first identify the bottlenecks\
    \ in your application by measuring performance, both in the emulator as well as\
    \ on the actual device. Then you can tune the performance through high-level architectural\
    \ strategies and low-level optimizations.\n\nYou can also improve the perceived\
    \ performance of your application. In the sections that follow, you'll explore\
    \ all four aspects of performance tuning.\n\n### Measuring Performance\n\nMeasuring\
    \ the performance of an application is important for two reasons. First, most\
    \ applications spend 80% of their time within 20% of their code, so it's crucial\
    \ to find out what's happening in that 20%. Otherwise, you end up wasting your\
    \ time and effort on parts of your application that don't have any impact at all\
    \ on performance. Second, you need to measure the performance to find out whether\
    \ your changes are really improving the situation.\n\nIn this section, you'll\
    \ learn how to measure an application's performance both in the WTK emulator and\
    \ on the target device.\n\n#### Measuring Performance in the WTK Emulator\n\n\
    You can measure an application's performance in the WTK-compliant emulator by\
    \ setting the `enableProfiler` attribute of the `<emulator>` element to `true`,\
    \ as shown in Listing 16-1. The profiler collects information during the run of\
    \ your application and then displays it after you close the emulator. Figure 16-1\
    \ shows typical profiler output.\n\n**Listing 16-1.** *Enabling the WTK Profiler*\n\
    \n```\n<j2mepolish>\n  <info\n    license=\"GPL\"\n    vendorName=\"A reader.\"\
    \n    version=\"0.0.1\"\n    jarName=\"${polish.vendor}-${polish.name}-roadrunner.jar\"\
    \n  />\n  <deviceRequirements>\n    <requirement name=\"Identifier\"\n      value=\"\
    Generic/midp2\" />\n  </deviceRequirements>\n  <build\n    usePolishGui=\"true\"\
    \n  >\n    <midlet class=\"com.apress.roadrunner.Roadrunner\" />\n  </build>\n\
    \  <emulator enableProfiler=\"true\" />\n</j2mepolish>\n```\n\n**Figure 16-1.**\
    \ *Measuring performance with the WTK profiler*\n\n> **Note** The profiler is\
    \ included in WTK versions starting with 1.0.4, but you can successfully invoke\
    \ it from external programs such as J2ME Polish only from version 2.2 onward.\
    \ Make sure you're using a recent version of WTK.\n\n#### Measuring Performance\
    \ on the Actual Target Device\n\nThe WTK profiler is great for finding bottlenecks\
    \ in your application, but it may unfortunately provide misleading information.\
    \ Measuring performance on your 3GHz machine with 1GB RAM does not necessarily\
    \ yield the same results as on your 200MHz phone with 600KB of heap memory. Typical\
    \ counter examples are network operations and persisting data in record stores.\
    \ These are blindingly fast on your development machine, but on the real device\
    \ you may encounter quite different processing times. You can configure some performance-related\
    \ settings on some emulators, but this is not a replacement for measuring performance\
    \ on the actual device. To make matters worse, devices themselves vary greatly\
    \ in their performance. A good strategy is to ensure that your application runs\
    \ adequately on the lower range of your target devices.\n\nTo measure the performance\
    \ on real devices, you can use the logging framework of J2ME."
