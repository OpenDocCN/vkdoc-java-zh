    **Precalculating Data**


    When you do performance-intensive calculations, you should do them only once whenever
    possible. Typical examples include the calculation of random data with Random.nextInt()
    or calls to trigonometric functions such as Math.sin(). Simple calculations that
    involve only constants are already resolved by the compiler, so you shouldn’t
    waste space using extra fields in class such as defaultAnchor = Graphics.TOP |
    Graphics.LEFT.


    **Using Optimized Arithmetic Operations**


    For specific arithmetic operations, you can use much faster bit-shifting operators.
    Whenever possible, use multiplication instead of division. Last but not least,
    integer operations are faster than float operations.


    Divisions by a power of two can be done faster using the shift right operator
    >>. Instead of dividing a number x by 2y, you can just use x >> y, so x >> 3 yields
    the same result as x / 8.


    Modulo operations can be done by bit operators, when the modulo argument is a
    power of two. Instead of calculating int round = i % 8; you can use the faster
    bit operation int round = i & 7;.


    **Using switch Statements**


    Instead of using several if blocks, you can use the switch statement. When you
    use a contiguous value range, the switch statement uses a constant processing
    time regardless of which case does match. So it might be even worth it to add
    dummy cases to create a contiguous test range. Listing 16-7 demonstrates a slow
    and a fast usage of the switch statement.


