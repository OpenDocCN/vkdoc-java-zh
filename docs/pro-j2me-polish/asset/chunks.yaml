    第 12 章


    ■ ■ ■


    使用 GUI


    **本章内容：**


    • 在深入配置和编程之前，首先了解 GUI 的概念。


    • 使用与 MIDP 2.0 标准完全兼容的 J2ME Polish GUI 进行配置和编程。


    • 即使在 MIDP 1.0 设备上，也能使用 MIDP 2.0 特性，例如 `CustomItem` 或 `POPUP ChoiceGroup`。


    • 使用简单的 CSS 文本文件在应用程序代码之外设计用户界面。


    图形界面是应用程序最重要的部分；事实上，它对于人们对应用程序的感知至关重要。道理很简单：创建一个美观且响应迅速的用户界面，你的应用程序就会被视为专业且优秀。然而，创建专业的
    GUI 并非易事。你可以使用 `javax.microedition.lcdui` 包中所谓的高级 GUI API 来快速且可移植地构建用户界面。

