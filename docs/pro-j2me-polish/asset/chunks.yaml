    the files *MIDPSysInfo.jar* and *MIDPSysInfo.jad* in the *dist* folder. Figure
    10-6 shows the SysInfo application in action.


    **Figure 10-6.** *Checking the capabilities of your device with the MIDPSysInfo
    MIDlet* **Summary**


    This chapter discussed the various utilities that come with J2ME Polish. Although
    they are not essential for developing J2ME applications, they are quite useful
    and might solve challenges that you encounter during application development.


    In the next chapter, we’ll take a look at the game engine of J2ME Polish and how
    it can help you to develop games for both MIDP 2.0 and MIDP 1.0 devices using
    a single-source base.


