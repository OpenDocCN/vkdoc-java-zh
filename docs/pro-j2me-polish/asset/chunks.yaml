- fmt: "# Every serious Java IDE supports several source folders for one project.\
    \ In Eclipse you can add source folders by right-clicking the project, selecting\
    \ Properties, and then selecting Java Build Path, as shown in Figure 15-2. On\
    \ the Source tab, click Add Folder to add another source folder. You should, however,\
    \ not do this when you want to implement the same classes several times. In that\
    \ case, your IDE would (correctly) complain about duplicate class definitions.\
    \ Just use one main source folder (such as `source/src`), and add the other source\
    \ folders to the parent directory, such as `source/midp2`, `source/nokiaui`, and\
    \ so on. Another strategy is to use different projects in your IDE that contain\
    \ the different sources.\n\n![Image 58](index-325_1.jpg)\n\n**Figure 15-2.** *Adding\
    \ a new source folder to an Eclipse project*\n\nThe main drawback of using different\
    \ source files is the additional work that is needed for each change. Depending\
    \ on the business requirements, you might need to create loads of different Java\
    \ source files. When you now need to include an additional feature or bug fix,\
    \ you need to implement the change in every affected source file.\n\n## Solving\
    \ Common Problems\n\nTypically, you will encounter similar problems in your projects.\
    \ In the following sections, I will discuss how you can resolve common difficulties.\n\
    \n### Using the Appropriate Resources\n\nThe main difference between different\
    \ devices is the screen size, so you will often need to adjust images for the\
    \ best results. Also, you will often need different multimedia resources, for\
    \ example, different types of sound files.\n\nUsing J2ME Polish’s automatic resource\
    \ assembling, this task is quite easy to accomplish. Just put all common resources\
    \ into the `resources` folder of your project and use subfolders for specific\
    \ resources, such as `resources/Nokia` for Nokia resources, `resources/mmapi`\
    \ for devices that support the Mobile Media API, and `resources/Motorola/A1000`\
    \ for Motorola’s A1000 phone.\n\nAnother nice feature is that you can use flexible\
    \ folders as well: resources from the `resources/BitsPerPixel.12+` folder will\
    \ be used for all devices that have a color depth of at least 12 bits per color\
    \ (4,096 colors), for example. Another example is the `resources/ScreenSize.150+x200+`\
    \ folder. Resources from this folder will be used when the device has a screen\
    \ that is at least 150 pixels wide and 200 pixels high. When you use several of\
    \ these flexible resource folders, the closest match will be used.\n\nYou can\
    \ also specify conditions for resources using the `<resources>` element and its\
    \ nested `<fileset>` elements in your `build.xml` script.\n\nPlease refer to the\
    \ “Packaging Your Application” section in Chapter 7 for learning the full details\
    \ of the resource assembling options with J2ME Polish.\n\n## Circumventing Known\
    \ Issues\n\nYou can see the many known issues at `http://www.j2mepolish.org/devices/issues.html`.\
    \ You can circumvent some issues by defensive programming; other ones require\
    \ adjustments of your code.\n\n### Defensive Programming\n\nOne issue that you\
    \ can circumvent by defensive programming is the behavior of the `InputStream.available()`\
    \ implementation on Symbian and Motorola devices. On these devices the `available()`\
    \ method returns 0 when you read a resource from your JAR file. Please note that\
    \ this behavior is perfectly allowed by the CLDC specification, which states that\
    \ the default `available()` implementation always returns 0 but that subclasses\
    \ *should* override this method. It is just somewhat unexpected.\n\nListing 15-6\
    \ shows an implementation that reads a resource and returns its contents as a\
    \ byte array. Next to the `available()` call is another problem in that code:\
    \ you probably just assume that the whole buffer will be read in one go when you\
    \ call `InputStream.read(byte[])`. This is not the case, as the JavaDoc of the\
    \ CLDC mentions. Rather than filling the buffer completely, the number of read\
    \ bytes is returned by the `read()` method. When you know the exact size of the\
    \ input, you should use the `DataInputStream.readFully(byte[])` method instead.\n\
    \nA third problem is that you do not close the input stream when the `read()`\
    \ method throws an exception. This could lead to memory leaks in your application.\n\
    \n**Listing 15-6.** *Reading a Resource Incorrectly*\n\n```\npublic byte[] readResource(\
    \ String url )\n    throws IOException\n{\n    InputStream in = getClass().getResourceAsStream(\
    \ url );\n    // the following always returns 0 on Symbian and Motorola:\n   \
    \ int available = in.available();\n    byte[] buffer = new byte[ available ];\n\
    \    // this is not guaranteed to work either:\n    in.read( buffer );\n    //\
    \ the input stream is not guaranteed to be closed,\n    // since in.read() may\
    \ throw an exception.\n    in.close();\n    return buffer;\n}\n```\n\nListing\
    \ 15-7 shows a defensive implementation of the same method that works on Motorola\
    \ and Symbian devices as well. You read the resource as long as the `read()` method\
    \ signals the end of the stream by returning -1. You also use a `ByteArrayOutputStream`\
    \ for buffering the read bytes. Last but not least, you surround the actual reading\
    \ of the resource with a `try {...} finally` block. The `finally` block executes\
    \ even when an exception occurs in the surrounded code. The resulting application\
    \ is much more complicated than the original one, but, hey, it works!\n\n**Listing\
    \ 15-7.** *Reading a Resource Correctly Using Some Defensive Techniques*\n\n```\n\
    public byte[] readResource( String url )\n    throws IOException\n{\n    InputStream\
    \ in = getClass().getResourceAsStream( url );\n    byte[] buffer;\n    // the\
    \ following always returns 0 on Symbian and Motorola:\n    int available = in.available();\n\
    \    if ( available == 0 ) {\n        available = 4 * 1024; // 4 kb\n    }\n \
    \   buffer = new byte[ available ];\n    ByteArrayOutputStream out = new ByteArrayOutputStream(\
    \ available );\n    int read;\n    try {\n        while ( (read = in.read( buffer\
    \ ) ) != -1 ) {\n            out.write( buffer, 0, read );\n        }\n    } finally\
    \ {\n        in.close();\n    }\n    return out.toByteArray();\n}\n```\n\n> **Tip**\
    \ Always read the documentation carefully. Whenever it says *might*, *may*, or\
    \ *should*, you cannot assume that the behavior is the same on all devices. You\
    \ are, however, most likely on the safe side when the documentation states that\
    \ a feature *must* be present.\n\n### Code Adjustments\n\nOften, defensive programming\
    \ in itself is not sufficient to circumvent issues. In such cases you need to\
    \ adjust your code either on the source code level or on the bytecode level.\n\
    \n#### Using Preprocessing\n\nYou can use preprocessing for circumventing known\
    \ issues in your source code.\n\nAn example for an issue that requires code changes\
    \ is the implementation of the fullscreen mode on the Sony Ericsson K700 device.\
    \ When the MIDP 2.0 full-screen mode has been activated by calling `Canvas.setFullScreenMode(true)`,\
    \ system alerts are no longer displayed. System alerts are shown whenever you\
    \ access a restricted resource, for example, when you want to start an HTTP connection.\
    \ A possible workaround is to use the `com.nokia.mid.ui.FullCanvas` class of the\
    \ Nokia UI API that is present on the K700 device as well. Please note that the\
    \ `FullCanvas` class does not allow you to add any commands. J2ME Polish sets\
    \ the preprocessing symbol `polish.Bugs.needsNokiaUiForSystemAlerts` when this\
    \ issue is present."
