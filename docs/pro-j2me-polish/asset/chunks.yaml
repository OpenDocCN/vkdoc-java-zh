    在实际目标设备上测量性能


    WTK 分析器非常适合查找应用程序中的瓶颈，但不幸的是，它可能会提供误导性信息。在你的 3GHz 机器（配备 1GB 内存）上测量性能，不一定能得出与在 200MHz
    手机（配备 600KB 堆内存）上相同的结果。典型的反例是网络操作和在记录存储中持久化数据。这些操作在你的开发机器上快得惊人，但在真实设备上，


