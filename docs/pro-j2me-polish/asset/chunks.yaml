    5033CH12.qxd 6/20/05 11:31 AM Page 226


    **226**


    C H A P T E R 1 2 ■ W O R K I N G W I T H T H E G U I


    **Figure 12-30.** *The TextField with direct input in action*


    > **Tip:** You can even use bitmap fonts for your `TextField`. Just use the `font-bitmap`
    attribute for setting the font.


