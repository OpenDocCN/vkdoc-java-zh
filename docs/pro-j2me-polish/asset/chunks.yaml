    在更复杂的情况下，你可以通过评估 USER_AGENT HTTP 头并使用服务器端脚本技术（如 JavaServer Pages (JSP) 或 PHP）为当前设备动态生成
    WML 页面。你也可以通过二进制短消息（作为 WAP 链接）或简单的文本消息发送指向 JAD 文件的链接。


    此外，还有第三方 OTA 服务器可用。这些通常提供不同的配置技术、设备识别和支付解决方案。


    ■**注意** 在开发阶段使用 OTA 很痛苦，因为你需要先将应用程序复制到 Web 服务器，然后再次从服务器下载。这需要相当多的时间，而且成本也可能很高。因此，请检查你的设备是否有其他安装选项可用。


    多媒体消息配置


    某些设备也可以通过使用多媒体消息服务 (MMS) 接收 J2ME 应用程序。用户发现这比处理普通的 OTA 下载方便得多，因为不需要额外的交互（除了在网页上选择应用程序和设备）。你需要一个短消息服务
    (SMS) 中心来为你发送这些消息。


    跟踪你的安装


    如果你在互联网上发布你的应用程序，则不容易知道它被安装了多少次。幸运的是，J2ME 标准允许在每次安装以及删除你的应用程序时进行通知。可选的 JAD 属性
    MIDlet-Install-Notify 包含应在应用程序安装后调用的 HTTP 地址。设备


