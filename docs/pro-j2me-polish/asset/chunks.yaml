    **Preprocessing**


    In the preprocessing phase, the source code is changed before it is compiled.
    Together with the device database of J2ME Polish, you can easily adapt your application
    to different handsets without creating incompatibilities. You can utilize a whole
    armada of preprocessing directives for customizing your application to different
    environments. Each device defines capabilities and symbols that you can exploit
    in the preprocessing step. Refer to *http://*


    *www.j2mepolish.org/devices-overview.html* to learn the available preprocessing
    symbols and variables for each device.


    Listing 7-11 demonstrates how you can use preprocessing to distinguish between
    devices that might support audio playback. Note that each preprocessing directive
    starts with the characters //#. This ensures that your IDE is not confused about
    those directives. Chapter 8


    discusses all the options of preprocessing.


    **Listing 7-11.** *Using Preprocessing to Distinguish Devices That Might Support
    Audio Playback*


    //#if polish.api.mmapi || polish.midp2


    // okay, the MMAPI can be used for audio playback.


    //#if polish.audio.midi


    // play back the MIDI file...


    //#elif polish.audio.wav


    // play back the WAV file...


    //#endif


    //#endif


    **Compilation**


    During the compilation phase, the source code is translated into binary bytecode.
    J2ME Polish automatically includes all optional APIs that are supported by your
    target devices, such as MMAPI, for example. It also sets the javactarget to either
    1.1 or 1.2 depending on the used WTK; from WTK 2.0 onward, the 1.2 javac-target
    is preferred. The javac-target ensures the


    5033CH07.qxd 6/17/05 11:50 AM Page 67


    C H A P T E R 7 ■ B U I L D I N G A P P L I C AT I O N S


    **67**


    compatibility of the compiled classfiles with your device. You can also set the
    target directly by specifying the javacTarget attribute of the <build> element.
    Debug information is not added unless the debugging mode is enabled with the <debug>
    element.


    You can also use J2ME Polish as a compiler, in which case only the preprocessing,
    the compilation, and optionally the preverification (see the “Preverification”
    section) steps are executed. This can be useful for interacting with available
    J2ME plug-ins such as EclipseME or J2ME-enabled IDEs such as NetBeans. Activate
    the compiler mode by using the compilerMode, compilerDestDir, and compilerModePreverify
    attributes, as shown in Listing 7-12.


    **Listing 7-12.** *Using J2ME Polish As a Compiler*


    <j2mepolish>


    <info


    license="GPL"


    name="Roadrunner"


    vendorName="A reader."


    version="0.0.1"


    jarName="${polish.vendor}-${polish.name}-roadrunner.jar"


    />


    <deviceRequirements>


    <requirement name="Identifier" value="Generic/midp1" />


    </deviceRequirements>


    **<build**


    **compilerMode="true"**


    **compilerModePreverify="true"**


    **compilerDestDir="preverified"**


    **>**


    <midlet class="com.apress.roadrunner.Roadrunner" />


    </build>


    <emulator />


    </j2mepolish>


    If you need full control of the compiler settings, you can also use the <compiler>
    element, which is a nested element of the <build> section. This allows you to
    enable the insertion of debug information directly, for example. The <compiler>
    element accepts all attributes and nested elements of the original <javac> task;
    please consult *http://ant.apache.org/manual* for more information.


    **Obfuscation**


    Obfuscating your J2ME application is good for two reasons: it makes your application
    more difficult to decompile, and it reduces the size of your application by removing
    all unused classes, methods, and fields and renaming the remaining ones.


    J2ME Polish supports many different obfuscators, and you can even use several
    obfuscators at once. The “Obfuscating Applications” section in this chapter describes
    all the available options and their implications.


    5033CH07.qxd 6/17/05 11:50 AM Page 68


    **68**


    C H A P T E R 7 ■ B U I L D I N G A P P L I C AT I O N S


    **Preverification**


    To ensure the integrity and security of the application, Java classes are verified
    by the Java Virtual Machine while loading the class. Since this step is computing
    intensive, the J2ME standard mandates that all classes need to be verified *before*
    they are installed on the J2ME device.


    This preverification step alters the bytecode and inserts additional information
    that ensures the validity and integrity of the bytecode. J2ME Polish uses the
    preverifier supplied with the WTK by default.


    **Packaging**


    In the packaging step, the final application bundles are created for each target
    device. They consist of one JAR file with the application code and one JAD file
    with the metadata needed for installation on the handheld. J2ME Polish assembles
    the resources specifically for each target device and for each locale and creates
    the needed JAD and Manifest files automatically.


    You can use third-party packagers such as 7-Zip or KZIP for decreasing the JAR
    file size a bit more. The “Packaging Your Application” section of this chapter
    discusses all these possibilities in full detail.


    **Invoking Emulators**


    J2ME Polish can invoke most emulators for testing the application. Just include
    an <emulator> element as the last element of the <j2mepolish> task. Please refer
    to the “Debugging Applications” section of this chapter for more information about
    invoking emulators.


    **Packaging Your Application**


    In the packaging phase for each target device, a JAD and a JAR file are generated.
    This step accomplishes several tasks, such as selecting the appropriate resources,
    managing JAD or Manifest attributes, and signing the application.


