    **本章内容：**


    • J2ME Polish 游戏引擎在 MIDP 1.0 设备上提供完整的 MIDP 2.0 游戏 API。


    • 通过设置各种预处理变量来优化游戏引擎。


    • 解决 MIDP 1.0 平台上游戏引擎的限制，包括无法在像素级别检测碰撞以及并非所有 MIDP 1.0 平台都支持精灵变换。


    • 通过使用特定于供应商的库进行低级图形操作、声音播放和设备控制，将 MIDP 2 游戏移植到 MIDP 1.0 平台。


    游戏产业是 J2ME 市场中最大的参与者。当你编写 J2ME 应用程序时，很可能正在开发游戏。游戏是移动 Java 的巨大成功故事，属于移动领域主要收入的“3G”：游戏（games）、赌博（gambling）和女孩（girls）。游戏市场正在快速增长，据估计
    2005 年全球市场规模为 40 亿美元。


    业界通过 Java Community Process 网站（*http://jcp.org/en/jsr/* *detail?id=118*）在 MIDP
    2.0 标准中引入了游戏编程的重大改进。不幸的是，市面上大多数手机仅支持 MIDP 1.0 标准。这正是 J2ME Polish 游戏引擎的用武之地。正如你将在本章中学到的，你可以使用
    J2ME Polish 的游戏引擎快速将 MIDP 2.0 游戏移植到 MIDP 1.0 平台。


    **使用游戏引擎**


    使用 MIDP 2.0 游戏 API 编程游戏很容易。你有精灵、带视图窗口的图层管理器等等。当你为 MIDP 1.0 平台开发游戏时，会非常怀念这些功能。这就是为什么
    J2ME Polish 包含一个包装 API，使你即使在 MIDP 1.0 设备上也能使用 `javax.microedition.lcdui.game.*`
    API。


    游戏引擎允许你在 MIDP 1.0 设备上使用完整的 MIDP 2.0 游戏 API。通常，当你使用正确的 import 语句时，无需更改源代码。然而，存在一些主要限制可能需要调整你的代码，特别是无法使用像素级碰撞检测。此外，并非所有
    MIDP 1.0 平台都支持精灵变换。处理这些限制将在本章后面的“解决游戏引擎的限制”部分中讨论。


    使用游戏引擎并不困难。当你以 MIDP 1.0 设备为目标时，J2ME Polish 会自动将包装类编织到你的代码中。这仅通过交换 import 语句来完成，因此你必须使用正确的
