- fmt: '# Typical Problems with Samsung Phones


    Typical problems with Samsung phones include the JAD attributes that need to be
    in a specific order and should be trimmed to the absolute necessary. You can use
    the `<jadFilter>` and `<manifestFilter>` elements in your `build.xml` file, as
    shown in Listing 15-1. Also, you should use only a relative URL in the `jarName`
    and `jarUrl` attributes of the `<info>` element. It’s a challenge to get network
    connections to work on Samsung phones. In general, you need to stick to one connection
    and make sure to use an Internet Access Point Name (APN) rather than a WAP access
    point. It also helps to use static IP addresses instead of domain names.


    Icon sizes vary from not supported at all, to 24×24, and up to 40×35 pixels.


    ## Listing 15-1. Filtering JAD Attributes on Samsung Devices


    ```

    <j2mepolish>

    <info

    license="GPL"

    name="Roadrunner"

    vendorName="A reader."

    version="0.0.1"

    jarName="${polish.vendor}-${polish.name}-roadrunner.jar"

    />

    <deviceRequirements>

    <requirement name="JavaPlatform" value="MIDP/2.0" />

    </deviceRequirements>

    <build>

    <midlet class="com.apress.roadrunner.Roadrunner" />

    <jad>

    <jadFilter if="polish.Vendor == Samsung"> MIDlet-1, MIDlet-2?, MIDlet-3?, MIDlet-4?,
    MIDlet-5?,

    MIDlet-JarSize, MIDlet-Jar-URL,

    MIDlet-Name, MIDlet-Vendor, MIDlet-Version

    </jadFilter>

    </jad>

    <manifestFilter>

    Manifest-Version, MIDlet-Name,

    MIDlet-1, MIDlet-2?, MIDlet-3?, MIDlet-4?, MIDlet-5?,

    MIDlet-Version, MIDlet-Vendor,

    MicroEdition-Configuration, MicroEdition-Profile

    </manifestFilter>

    </build>

    <emulator />

    </j2mepolish>

    ```


    Samsung is famous for its secret menus that can be enabled by pressing some key
    combination, such as `#*536963#` for enabling the serial Java transfer on the
    D500. Just search the Web for "Samsung secret codes" to find many menus.


    # Siemens


    Siemens is still the fourth biggest player in the mobile device market with a
    share of about 7% worldwide in 2004. All Siemens handsets except the Series 60–based
    SX1 device use a proprietary Siemens operating system. The Siemens brand belongs
    to BenQ now.


    Siemens provides emulators and information at `https://communication-market.siemens.de/portal/main.aspx?pid=1`.
    You will find the community by selecting Device Based Applications, Community,
    and then Forum.


    You can separate Siemens devices into the 55, 65, and 75 groups. The 75 generation
    is expected to be shipped in the third quarter of 2005. The currently available
    65 generation supports the MIDP 2.0 profile along with the CLDC 1.1 configuration.
    Along with being JTWI compliant, the devices support many optional APIs: the Wireless
    Messaging API, the Mobile Media API, the Bluetooth API, the Mobile 3D Graphics
    API, and the Location API. Please note that some low-cost devices support only
    some, if any, of these APIs. Also, the entry model, A65, still features only the
    former standard MIDP 1.0 with CLDC 1.0. The recommended JAR size is now up to
    350KB, and the available heap size is 1.5MB. Table 15-2 lists the main features
    of the Siemens groups.


    ## Table 15-2. Main Features of Siemens Devices


    | Group | OS | Profile | Configuration | Libraries | Screen Size |

    |-------|----|---------|--------------|-----------|-------------|

    | 55 | Siemens OS | MIDP 1.0 | CLDC 1.0 | Siemens-Color-Game-API | 101×64, 101×80
    |

    | 65 | Siemens OS | MIDP 2.0, JTWI 1.0 | CLDC 1.1 | WMAPI, MMAPI, BTAPI, M3GAPI
    (optional), Location API (optional), Siemens-Color-Game-API | 132×176 |

    | 75 | Siemens OS | MIDP 2.0, JTWI 1.0 | CLDC 1.1 | WMAPI, MMAPI, BTAPI, M3GAPI
    (optional), Location API (optional) | 132×176–240×320 |

    | SX1 (single device) | Symbian OS | MIDP 1.0 | CLDC 1.0 | WMAPI, MMAPI, BTAPI,
    Nokia UI API, Siemens-Color-Game-API | 176×220 |


    You can target a group by using the "Siemens/x55," "Siemens/x65," and "Siemens/x75"
    virtual devices:


    ```

    <requirement name="Identifier" value="Siemens/x65" />

    ```


    Typical problems with Siemens handsets include the `javax.microedition.lcdui.game`
    API, because this is based on the Siemens former game API that sometimes behaves
    differently from the MIDP 2.0 standard. For example, you cannot set the view window
    in `LayerManager.setViewWindow()`. Instead, you need to adjust the `paint()` call
    in your code: `layerManager.paint( g, x - viewX, y - viewY );`. When you set an
    alarm using `PushRegistry`, your application does not start automatically. Instead,
    an icon displays to indicate that an application is waiting to be launched. In
    addition, when you handle sounds, you should prefetch and play only one sound
    at a time.


    # LG Electronics


    The Korean manufacturer LG Electronics (LGE) is the fifth biggest player with
    a market share of about 6% worldwide in 2004.


    LGE is selling its phones only through operators who in turn can change the phone
    details, which is why LGE seems to be of the opinion that it does not need to
    release detailed phone information or provide a developer community. You must
    depend on external forums when you encounter problems. I discuss these in the
    "Getting Help" section toward the end of this chapter.


    # Sony Ericsson


    Sony Ericsson is sixth biggest player with a market share of about 6% worldwide
    in 2004.


    Sony Ericsson maintains an excellent developer community at `http://developer.sonyericsson.com`.
    Select Tech Support to reach the forums. The mass-market phones use a proprietary
    Sony Ericsson OS, whereas the high-class smart phones are based on the Symbian
    UIQ platform (a pen-based user interface). Table 15-3 lists the available groups,
    called *Java platforms*, by Sony Ericsson.


    You can target a specific group by using the virtual devices "SonyEricsson/JavaPlatform1,"
    "SonyEricsson/JavaPlatform2," "SonyEricsson/JavaPlatform1Symbian," and so on:


    ```

    <requirement name="Identifier" value="SonyEricsson/JavaPlatform5" />

    ```


    The MIDP 1.0 phones have a limit of 30KB for the RMS, but you can use the complete
    available file space on Sony Ericsson''s MIDP 2.0 phones. You can use up to 256KB
    on MIDP 1.0 and about 1.5MB on MIDP 2.0 phones on the heap.


    ## Table 15-3. Main Features of Sony Ericsson Devices


    | Java Platform | OS | Profile | Configuration | Libraries | Screen Size |

    |---------------|----|---------|--------------|-----------|-------------|

    | 1 | SE OS | MIDP 1.0 | CLDC 1.0 | MMAPI, WMAPI (optional) | 128×160 |

    | 2 | SE OS | MIDP 2.0, JTWI 1.0 | CLDC 1.1 | WMAPI, MMAPI, Nokia UI API | 176×220
    |

    | 3 | SE OS | MIDP 2.0, JTWI 1.0 | CLDC 1.1 | WMAPI, MMAPI, Nokia UI API, M3GAPI,
    Mascot-Capsule 3.0 | 128×128, 128×160, 176×220, 240×320 |

    | 4 | SE OS | MIDP 2.0, JTWI 1.0 | CLDC 1.1 | WMAPI, MMAPI, Nokia UI API, M3GAPI,
    Mascot-Capsule 3.0, VSCL (optional) | 176×220 |

    | 5 | SE OS | MIDP 2.0, JTWI 1.0 | CLDC 1.1 | WMAPI, MMAPI, Nokia UI API, M3GAPI,
    Mascot-Capsule 3.0, PDAAPI, BTAPI (optional) | 176×220 |

    | 1-Symbian | Symbian UIQ OS | MIDP 1.0 | CLDC 1.0 | — | 208×320 |

    | 2-Symbian | Symbian UIQ OS | MIDP 2.0 | CLDC 1.0 | WMAPI, MMAPI, BTAPI | 208×320
    |'
