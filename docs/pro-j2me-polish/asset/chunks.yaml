    For long operations such as loading data over the network or searching for data
    in record stores, you should give some thought to how you can measure and visualize
    the progress.


    The best case is when you know in advance how long the operation lasts and how
    many steps it involves. In such a case, you can just show a progress meter starting
    at 0% and ending at 100%, for example, by using a `Gauge` with a definite range.
    Please try to make an equally distributed progress, as it is quite annoying when
    the meter quickly advances to 90% and then crawls the rest of the way to 100%.
    In network operations, you can transmit the length of the data. When searching
    through record stores, you can query the number of recordsets in advance.


    Sometimes you can split the operation into several steps, even though you don’t
    know the exact number of needed steps. In such cases, you can use an incrementally
    updating `Gauge` for displaying progress.


    In cases when you can’t determine the required time and can’t split up the operation
    into single steps, you should give at least some feedback to the user that an
    operation is in progress. Use a continuously running `Gauge` or an animation for
    this purpose.


    ## Ensuring Responsiveness


    When you are notified about events such as the pressing of a key or the invocation
    of a command, you need to return control as quickly as possible back to the System
    thread. When you set a current screen by calling `Display.setCurrent()`, the screen
    will not be shown until your method returns, for example. So you are required
    to use background threads for ongoing operations like network access or storing
    large amounts of data in the record store. When you do CPU-intensive tasks, you
    should pause the background thread between different steps, so that the operating
    system thread has a chance to deliver events to your application.


    ## Reducing Memory Consumption


    Depending on your target devices, you can have a heap size between 200KB and several
    megabytes available for your application. But even several megabytes may not be
    enough when your application is experiencing memory leaks. Also, reducing the
    memory footprint may increase the performance of your application, because garbage
    collection does not need to kick in as frequently.


    In this section, you’ll first learn how to measure your application’s memory consumption,
    and then you’ll examine how to improve the memory footprint by reducing the number
    of objects, using recursion, and avoiding memory leaks.


    ### Measuring Memory Consumption


    You can measure the memory footprint of your application in the WTK emulator by
    enabling the `enableMemoryMonitor` option of the `<emulator>` element, as shown
    in Listing 16-10. Figure 16-2 shows the memory monitor in action.


