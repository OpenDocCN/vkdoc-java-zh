    **Integrating Third-Party APIs**


    Sometimes you need a third-party API in a project. You have to distinguish between
    APIs that are available as source code and APIs that are available in binary-only
    form. Another case is the so-called optional APIs that are already preinstalled
    on your target devices, such as the Wireless Messaging API or the Location API.
    Depending on the type of API, different actions are required for integrating the
    API.


    ■**Note** Do not forget to add the library to the classpath of your project within
    your IDE.


    **Integrating Source Code Third-Party APIs**


    When a third-party API is available in source code, you can integrate it by modifying
    the sourceDir attribute of the <build> element in the *build.xml* file. Consider
    the case where your normal application code is in the *source/src* directory and
    the source code of the third-party API is in the *source/thirdparty* folder. You
    can now add the third-party API with the <sources> element, as shown in Listing
    7-35\. As most other elements, you can use if and unless conditions for your sources.


    **Listing 7-35.** *Integrating a Source Code Third-Party API*


    <j2mepolish>


    <info


    license="GPL"


    name="Roadrunner"


    vendorName="A reader."


    version="0.0.1"


    jarName="${polish.vendor}-${polish.name}-roadrunner.jar"


    />


    <deviceRequirements>


    <requirement name="Identifier" value="Nokia/Series60" />


    </deviceRequirements>


    <build


    **>**


    **<sources>**


    **<source dir="source/src" />**


    **<source dir="source/thirdparty" />**


    **<source dir="source/s60" if="polish.group.Series60" />**


    **</sources>**


    <midlet class="com.apress.roadrunner.Roadrunner" />


    </build>


    <emulator />


    </j2mepolish>


