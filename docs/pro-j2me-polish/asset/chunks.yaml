    Using preprocessing is sometimes tedious work for circumventing bugs, but often
    there is no alternative. All J2ME Polish libraries use preprocessing for adapting
    themselves to the target devices, so you can just use the libraries without needing
    to be too concerned about device issues. You should, however, build your application
    to specific target devices when these have known issues. J2ME Polish has no chance
    to circumvent device-specific bugs when you use generic target devices such as
    “Generic/midp2.”


    **Manipulating Bytecode**


    Another option for circumventing bugs is to alter the application on the bytecode
    level.


    This approach has several advantages because the programmer does not need to circumvent
    issues herself during the application development phase. Also, certain aspects
    of programs can be tracked on the bytecode level easier than on the source code
    level, such as the usage of floating-point calculations. A third advantage is
    that you can circumvent a new


