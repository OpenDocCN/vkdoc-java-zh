    **遍历**


    当你的自定义项首次获得焦点时，`traverse()` 方法将以 `CustomItem.NONE` 方向被调用。后续调用将包含方向（`Canvas.UP`、`Canvas.DOWN`、`Canvas.LEFT`
    或 `Canvas.RIGHT`）。


    **设计 CustomItem**


    当你希望使用 CSS 样式来设计你的 `CustomItem` 时，请确保项目类路径中包含 *enough-j2mepolish-client.jar*。你可以在
    J2ME Polish 安装目录的 *import* 文件夹中找到它。


    **应用样式** 当使用 J2ME Polish GUI 时，预处理符号 `polish.usePolishGui` 会被定义。你只能在 MIDP 2.0
    环境中或使用 J2ME Polish GUI 时扩展 `CustomItems`。当你希望同时在 J2ME Polish GUI 和纯 MIDP 2.0 基础的
    UI 中使用你的 `CustomItem` 时，请使用 `#if` 预处理指令来区分这些情况。例如，清单 13-15 中的 `StringListItem`
    仅在使用了 J2ME Polish GUI 时才实现 `setStyle()` 方法。


    你可以通过以下几种方式将 CSS 样式集成到你的 `CustomItem` 中：


    • 你可以在调用父类构造函数之前定义一个静态样式。

    • 你可以使用 `Form.append()` 方法。

    • 你可以创建一个额外的构造函数，该构造函数接受一个 `Style` 作为最后一个参数。

    • 你可以使用动态样式。


    我现在将解释这些选项。首先，在你的构造函数中定义静态样式很简单——只需使用 `#style` 指令：


    //#style stringListItem, default


    super( label );


    当你使用此构造时，应始终允许默认样式，这样当你的第一个样式未定义时，构建过程不会中止。通过在 `#style` 指令中将其添加为最后一个可能的样式来实现这一点。


    其次，使用 `Form.append()` 方法更灵活，因为你可以在应用程序中为你的 `CustomItem` 使用不同的样式。清单 13-16 向你展示了如何为
    `StringListItem` 应用 `winnerStringListStyle`。


