    **Installing J2ME Polish**


    The installation of J2ME Polish is done in three distinct phases: **1.** Install
    the Java Software Development Kit (SDK) 1.4 or higher, the Wireless Toolkit (WTK),
    and a Java integrated development environment (IDE) or Ant.


    **2.** Install J2ME Polish.


    **3.** Integrate J2ME Polish into your favorite IDE.


    You can download J2ME Polish from *http://www.j2mepolish.org* and start the installation
    by either double-clicking the downloaded *.jar* file or by calling java -jar j2mepolish-[
    *version*].jar


    from the command line. (Sanity note: Please substitute the [ *version*] with the
    actual version number of J2ME Polish.) You should now be presented with the screen
    similar to Figure 1-1.


    **Figure 1-1.** *Installing J2ME Polish*


    **Launching the Sample Applications**


    After you have installed J2ME Polish to any directory, which I refer to as *${polish.home}*,
    you can check out the sample applications, which can be found in the *samples*
    directory. Change (cd) to one of the directories, such as *samples/menu*, and
    call Ant from the command line: ant test j2mepolish


    The default WTK emulator should pop up when J2ME Polish has finished processing
    the application, as shown in Figure 1-2.


    ![Image 5](index-27_1.jpg)


    5033CH01.qxd 6/20/05 10:19 AM Page 5


    C H A P T E R 1 ■ Q U I C K S E T U P G U I D E


    **5**


    **Figure 1-2.** *The sample menu application in the WTK emulator* If you see any
    error messages, most likely your Ant setup or your path to the WTK is not correct.
    See the “Troubleshooting Sample Application Errors” section in Chapter 3 for help.


    You can also start J2ME Polish from within any Java IDE. You need to mount the
    sample project, right-click the *build.xml* file within it, and select Run Ant,
    Execute, or a similar menu command to launch J2ME Polish. If you want to start
    the emulator, make sure that you have selected the test target first, followed
    by the j2mepolish target.


    **Exploring the Sample Applications**


    If you wonder how the sample applications are made, you can take a peek at the
    *build.xml* file in either the *samples/menu* or *samples/roadrunner* directory.
    This standard Ant file controls the build process and uses the <j2mepolish> task
    for creating the application.


