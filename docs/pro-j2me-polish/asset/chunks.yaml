    第 12 章 ■ 使用 GUI **介绍界面概念**


    J2ME Polish GUI 提供了一种强大且高效的方式来设计无线 Java 应用程序的用户界面。事实上，J2ME Polish GUI 具有以下几个独特特性：


    • **上市时间**：J2ME Polish GUI 与标准 MIDP GUI 兼容，因此你无需学习新的 API，并且可以有选择地开启或关闭 J2ME Polish
    GUI。


    • **自动移植**：J2ME Polish 会将必要的代码“自动地”编织到你的应用程序中，因此你无需修改源代码。该 GUI 会自动规避目标设备的已知问题。


    • **创新设计**：该 GUI 使用位于实际应用程序源代码之外的简单文本文件进行设计。设计采用了网页标准 CSS 的扩展版本，因此网页设计师现在可以在没有程序员帮助的情况下设计
    J2ME 应用程序，而程序员则可以专注于业务逻辑。


    • **可定制**：另一个重要优势是，你只需更换 *polish.css* 文件和其他资源，就能为同一应用程序代码创建截然不同的设计。这意味着你可以轻松地为不同设备、供应商、设备组甚至区域设置调整所有设计，而无需更改源代码。有关示例，请参考某个示例应用程序中的
    *resources/polish.css* 文件。


    • **灵活**：你可以通过 *build.xml* 文件和 `#style` 预处理指令来控制用户界面。


    • **可扩展**：MIDP 2.0 GUI 的所有元素都得到支持——即使在 MIDP 1.0 设备上也是如此。因此，你可以在 MIDP 1.0 手机上使用
    MIDP 2.0 特有的项目，例如 POPUP ChoiceGroup 或 CustomItem。当你使用 CustomItem 扩展 J2ME Polish
    GUI 时，你会在每个目标设备上找到相同的环境，即使原生实现缺少内部遍历等重要功能。


    J2ME Polish GUI 的缺点在于应用程序包的大小会增加。根据你使用的 GUI 元素和设计，你需要为 GUI 额外预留最多 30KB 的空间。现代设备，例如基于
    Symbian 的设备（参见第 15 章），支持高达数兆字节的应用程序大小，因此额外的体积通常不成问题。然而，在一些较旧的设备上，情况则有所不同，例如诺基亚老旧的基于
    MIDP 1.0 的 Series 40 机型，它们只接受大小不超过 64KB 的应用程序。对于此类设备，即使激活了 GUI，默认情况下也不会使用它。


    图 12-1 展示了如何使用 J2ME Polish GUI 来创建一个“经过打磨的”应用程序。关于使用 *build.xml* 和 *polish.css*
    文件的完整且简单的示例，请参考第 7 章的“创建‘Hello, J2ME Polish World’应用程序”一节。


