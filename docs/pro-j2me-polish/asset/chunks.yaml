    <deviceRequirements>


    <requirement name="Identifier" value="Generic/midp1" />


    </deviceRequirements>


    <build>


    <midlet class="com.apress.roadrunner.Roadrunner" />


    **<packager name="7zip" >**


    <parameter name="compression" value="maximum" />


    <parameter name="passes" value="4" />


