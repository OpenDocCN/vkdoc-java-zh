    You can optimize your application in two different ways.


    One approach is to come up with some ideas about why your application is slow,
    and then change all the code pieces that can be improved in one way or another,
    throw away working but possibly slow parts, and introduce new features along the
    way.


    The other, more rational approach is to measure the performance on your actual
    target devices. This helps you to identify the bottlenecks in your application.
    Set realistic goals such as


    “Part X should complete in under two seconds in 80% of cases.” Then hypothesize
    why a specific part is too slow. Prove your hypothesis by implementing one change
    at a time, repeating the measurement, and then asking yourself, “Has this particular
    change improved the situation?” Always choose to eliminate the easiest bottleneck
    first, because removing one bottleneck can alter the measurements of the complete
