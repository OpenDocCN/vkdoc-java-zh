- fmt: 'Typical problems include MIDP 2.0 graphics features such as transforming sprites
    (the reference point is sometimes not taken into account) and drawing RGB data
    (the translation origin is not taken into account). Support for `CustomItem`s
    is limited to viewing purposes only, since key events are not forwarded to the
    item. Another problematic area is the full-screen mode on the Java platform 2-Symbian
    devices: the first screen that uses the full-screen mode needs to enable it in
    the `paint()` method and not in the constructor. A more difficult issue to overcome
    is the full-screen mode on the K700. It works just fine, but it does not show
    system alerts correctly, for example, when you are establishing an HTTP connection.
    You can circumvent this by using the `com.nokia.mid.ui.FullCanvas` class instead.
    Most user interface bugs, such as the previously mentioned one, are resolved by
    the J2ME Polish GUI automatically. The good thing about Sony Ericsson platforms
    is that they behave consistently, so your chances are quite good that your application
    works fine on all Sony Ericsson devices once it works flawlessly on one device.


    ## RIM BlackBerry


    The BlackBerry series from Research in Motion (RIM) has become quite popular for
    business solutions with its integrated e-mail push functionality. You can find
    quite extensive information at `http://www.blackberry.com/developers`. RIM also
    maintains a community at `http://www.blackberry.com/developers/forum`.


    BlackBerry extends the CLDC and MIDP standards with its own proprietary API that
    allows you to integrate your application tightly into the handset. You can use
    the provided Java Development Environment (JDE) for developing BlackBerry applications
    under Windows. This is not a requirement; you can also use any other IDE. BlackBerry
    devices do not accept JAR files but only proprietary COD files. J2ME Polish converts
    the JAR files automatically for BlackBerry devices when you have defined the `blackberry.home`
    Ant property, which points to the location of the JDE.


    ## Other Vendors


    Many other device manufacturers exist, including Sanyo, Sharp, and Palm. Judging
    from their worldwide market share, they don’t play a big role, but you should
    consider supporting them depending on your target market. Please refer to the
    device database of J2ME Polish at `http://www.j2mepolish.org/devices-overview.html`
    to get to know the specifics of such phones.


    ## Identifying Carriers


    Carriers such as Vodafone, Sprint, and T-Mobile can modify devices by including
    or deactivating additional libraries and by adding or changing root certificates.


    Vodafone (`http://via.vodafone.com`) is quite active by providing its own Vodafone
    Service Class Library (VSCL) that includes 3D and multimedia features. You need
    to sign a nondisclosure agreement and start a business relationship with Vodafone
    before you can get more information about these opportunities.


    Sprint (`http://developer.sprintpcs.com`) provides many resources and forums for
    their phones.


    Nextel (`http://developer.nextel.com`) even provides its own open-source UI API
    (`http://nextel.sourceforge.net`), but this hasn’t been updated since 2001.


    AT&T Wireless (`http://developer.cingular.com/developer`) provides a developer
    community and J2ME documentation.


    O2 (`http://www.sourceo2.com`) publishes information and provides forums on its
    developer site.


    Some carriers expect that your application has been verified by the Java Verified
    program (`http://www.javaverified.com`) when you want to market your applications
    on their portals.


    ## Identifying Platforms


    In addition to the MIDP platforms, several similar mobile Java platforms are available
    that are partly compatible with the J2ME standard. Table 15-4 lists the most important
    platforms.


    > **Tip** From J2ME Polish 1.3 onward, you can build for any of these platforms
    and even define additional platforms in the `${polish.home}/custom-platforms.xml`
    file.


    **Table 15-4.** *Important Mobile Java Platforms*


    | Platform | Region | Specialties |

    | :--- | :--- | :--- |

    | MIDP | Worldwide | Leading standard for creating mobile Java applications. |

    | JTWI | Worldwide | Additional libraries and clarification of the MIDP 2.0 standard.
    |

    | IMP | Worldwide | Standard for creating embedded Java applications without user
    interface. |

    | Personal Java | Worldwide | For enterprise applications, based on J2SE. |

    | DoJa | Japan | NTT DoCoMo’s (`http://www.nttdocomo.co.jp/english`) mobile Java
    platform. Similar but not compatible with the MIDP standard. |

    | WIPI | Korea | WIPI 1.0 is 90% compatible with MIDP 1.0, and WIPI 1.2 is 100%
    compatible with the MIDP 2.0 standard. Neither platform requires preverification.
    |


    ### MIDP Platforms


    MIDP-compatible platforms (based on JSRs 37, 118, and 271) form the vast majority
    of available mobile Java implementations.


    Symbian (`http://www.symbian.com/developer`) provides the most widely used operating
    system and with it the MIDP profile. The UIQ 2.*x* version from Symbian additionally
    supports the Personal Java profile. The current Symbian OS uses Sun’s CLDC HI
    1.1 implementation, which features a dynamic adaptive compiler. This DAC compiler
    can compile selected bytecode on demand and hotswap it in the middle of a method.


    Aplix’s JBlend JVM (`http://www.aplix.co.jp/en/jblend`) is the leading virtual
    machine implementation in Japan and is used worldwide. Manufacturers such as Sharp,
    Sanyo, and Motorola deploy JBlend in several devices. Operators such as Vodafone,
    NTT DoCoMo, and Sprint also use JBlend. The platform supports the MIDP 1.0, MIDP
    2.0, and DoJa profiles along with the CLDC 1.1 and CLDC 1.0 configurations. Optional
    APIs such as the Mobile Media API, the Wireless Messaging API, and the Mobile
    3D Graphics API are supported. Additionally, JBlend supports some carrier extensions
    such as Vodafone’s Service Class Library and the Common Java Service Platform.


    Other common virtual machines include IBM’s WEME virtual machine (also called
    J9, `http://www-306.ibm.com/software/wireless/weme`), which is used on Palm platforms.


    Esmertec’s Jbed platform (`http://www.esmertec.com`) is often used for BREW devices.
    BREW, Binary Runtime Environment for Wireless, is the North American competing
    standard to J2ME. Tao Group’s Intent platform (`http://withintent.biz`) targets
    mainly Windows smart phone devices.


    Not really a platform but an interesting technology is AMR’s Jazelle (`http://www.arm.com/products/solutions/Jazelle.html`).
    The idea is to have hardware that interprets and executes the Java bytecode directly.
    AMR offers processor designs that include the Jazelle technology. Since the hardware
    is directly embedded in the main processor, Jazelle offers high performance.


    ### DoJa Platforms


    DoJa (also called iAppli, `http://www.doja-developer.net`) is the de facto Japanese
    Java standard made by NTT DoCoMo. Initial versions allowed applications with JAR
    sizes up to only 10KB in DoJa 1.0 and then 30KB in DoJa 2.5. The current DoJa
    4.0 version supports JAR sizes up to 100KB and allows up to 400KB for the persistent
    data.


    DoJa is built upon the CLDC 1.0 configuration and offers a similar feature set
    as MIDP. Main differences are the persistence mechanism (DoJa can store only one
    large byte array in the so-called scratchpad), the application life cycle and
    threading model (it’s recommend to use only a single thread in DoJa applications),
    and the event handling (DoJa offers functions similar to the MIDP 2.0 `GameCanvas`
    class). You can find porting instructions at `http://www.doja-developer.net`.'
