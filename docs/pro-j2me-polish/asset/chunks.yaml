    The factor in percent by which the icon image should be


    scaled when it is focused on a MIDP 2.0 device; for


    example, 150 for enlarging the image to 1.5 times its size.


    scale-steps


    No


    The number of steps used for scaling the icon image, applicable only when the
    scale-factor attribute is used.


    Designing Forms


    Forms can contain any kind of items, even CustomItems that you can create for
    yourself. They support all the common screen attributes, such as foreground-image,
    view-type, and so on, so please refer to the previous discussion about the common
    screen features for learning more about these options.


    Designing TabbedForms


    TabbedForms are just like Forms, but they are able to split the screen into several
    tabs. You can design tabbed forms like a normal form, but you can use the predefined
    styles tabbar, activetab, and inactivetab to design the additional elements of
    a tabbed form. The tabbar style is responsible for the bar containing the tabs
    at a whole; the activetab style designs the currently active tab, and the inactivetab
    style designs all remaining tabs. You can set the color of the scrolling indicator
    within the tabbar style with the tabbar-scrolling-indicator-color attribute, as
    demonstrated in Listing 12-42\. You can see the results in Figure 12-22.


    **Listing 12-42.** *Designing a TabbedForm*


    tabbar {


    background-color: white;


    layout: expand;


    padding-bottom: 0;


    **tabbar-scrolling-indicator-color: black;**


    }


    activetab {


    background-type: round-tab;


    background-color: silver;


    background-arc: 8;


    ![Image 44](index-236_1.jpg)


    5033CH12.qxd 6/20/05 11:31 AM Page 214


    **214**


    C H A P T E R 1 2 ■ W O R K I N G W I T H T H E G U I font-color: white;


    padding-left: 10;


    padding-right: 8;


    }


    inactivetab {


    padding-left: 6;


    padding-right: 4;


    margin-left: 2;


    margin-right: 2;


    background-type: round-tab;


    background-color: gray;


    background-arc: 8;


    font-color: silver;


    }


    **Figure 12-22.** *A TabbedForm in action*


    Designing FramedForms


    FramedForms have a scrollable content area along with the nonscrollable top, bottom,
    left, and right frames. You can design each frame using the predefined styles
    topframe, bottomframe, leftframe, and rightframe. Alternatively, you can use the
    frame style for defining all frames in one style. The right and left frames are
    one of the few elements that do actually use the vertical-expand and vertical-center
    layout settings. Listing 12-43 demonstrates the design of a FramedForm with a
    bottom frame. You can see the FramedForm in action in Figure 12-23.


    **Listing 12-43.** *Designing the Lower Frame in a FramedForm* bottomframe {


    padding: 3;


    background-color: silver;


    layout: expand;


    padding-bottom: 0;


    }


    ![Image 45](index-237_1.jpg)


    5033CH12.qxd 6/20/05 11:31 AM Page 215


    C H A P T E R 1 2 ■ W O R K I N G W I T H T H E G U I **215**


    **Figure 12-23.** *A FramedForm in action*


    Designing TextBoxes


    TextBoxes are used for getting text input from the user. They support all the
    additional attributes of TextFields, so please refer to the following discussions
    of these fields.


    **Designing Items**


    Apart from the common design attributes, some GUI items support additional CSS
    attributes.


    With the help of these advanced settings, you can influence the design even more.


    Designing String Items


    StringItems are used quite often and form the basis for many other items such
    as TextField, DateField, and IconItem (the latter is used internally by J2ME Polish
    for Lists). Apart from the already discussed common attributes, no further attributes
    are supported by StringItems.


    The most important CSS attributes are the font ones. You can even use bitmap fonts
    for StringItems; please refer to the earlier “Fonts” section. If you want to change
    the line spacing within one StringItem, you can use the padding-vertical attribute.


    Designing Image Items


    You can use ImageItems for displaying an image within a Form. ImageItems do not
    support additional CSS attributes. Since images can also be added by using various
    backgrounds or using before and after attributes, you often don’t need to use
    ImageItems directly in your application.


