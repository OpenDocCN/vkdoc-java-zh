    **使用设备数据库**


    那么现在你了解了 J2ME Polish 设备数据库的工作原理，但它可以用来做什么呢？以下是你可以使用设备数据库做的一些事情：


    • 使用 <deviceRequirements> 元素选择你的目标设备。


    • 通过将图像和其他资源文件放入 *resources* 目录及其子文件夹，使用自动资源组装。


    • 通过评估和使用从数据库获取的设备特性和能力来优化你的应用程序。


    • 根据你自己的需求调整数据库，而不会影响其他项目。


