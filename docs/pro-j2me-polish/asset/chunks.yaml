    **Listing 13-6.** *Using an Extension Conditionally*


    ```

    <preprocessor

    name="fullscreen"

    if="polish.classes.fullscreen:defined"

    >

    <parameter name="logfile" value="log.txt" />

    </preprocessor>

    ```


    ## Invoking Ant Targets


    Most build extensions allow you to call Ant targets instead of implementing your
    own extension. J2ME Polish makes all capabilities and features of the current
    target device available as Ant properties so that you can evaluate and use them
    within the specified target. For calling an Ant target, set the name of the extension
    to `antcall` and specify the Ant target with the `target` attribute. Listing 13-7
    demonstrates how you can use the `yguard` Ant task for obfuscating your application.
    Using the `yguard` Ant task instead of the built-in integration of J2ME Polish
    allows you to further tweak the yGuard obfuscator, since the Ant task exposes
    some additional configuration options.


    **Listing 13-7.** *Invoking Ant Targets from Within J2ME Polish*


    ```

    <project name="roadrunner" default="j2mepolish">

    <property name="polish.home" location="C:\programs\J2ME-Polish" />

    <property name="wtk.home" location="C:\WTK22" />

    <taskdef name="j2mepolish"

    classname="de.enough.polish.ant.PolishTask"

    classpath="${polish.home}/import/enough-j2mepolish-build.jar: ${polish.home}/import/jdom.jar"/>

    <target name="j2mepolish">

    <j2mepolish>

    <info

    license="GPL"

    name="Roadrunner"

    ```'
