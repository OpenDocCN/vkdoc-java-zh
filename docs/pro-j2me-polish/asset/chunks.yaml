    The usage of MicroFloat is similar to MathFP. You can use either the net.dclausen.


    microfloat.MicroFloat class for emulating float or the net.dclausen.microfloat.MicroDouble
    class for emulating double values. Listing 15-16 shows you how you can calculate
    the used space of a circle with MicroFloat.


    **Listing 15-16.** *Calculating the Space Occupied by a Circle with MicroFloat*
    public int calculateCircleSpace( String radiusStr ) {


    int radius = MicroFloat.parseFloat( radiusStr );


    int result = MicroFloat.mul( MicroFloat.PI,


