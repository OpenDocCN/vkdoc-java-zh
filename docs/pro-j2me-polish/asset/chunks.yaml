    你使用 `#condition` 预处理指令开始实现，以确保 `StringListItem` 仅在当前目标设备支持 MIDP 2.0 平台或目标设备使用
    J2ME Polish GUI 时才被包含。


    列表实现本身相当基础。`String[] entries` 字段包含列表项，`int focusedIndex` 标记当前选中的条目，`int topIndex`
    标记第一个显示的条目。`traverse()` 方法负责在列表中导航，而 `paint()` 方法则在屏幕上显示可见条目。`pointerPressed()`
    方法仅在当前目标设备支持指针事件时添加，也可用于在列表中导航。我将在后续章节中解释列表的设计。


    理解 J2ME Polish 对自定义项的处理


    MIDP 2.0 规范为自定义项实际支持哪些功能留有一定空间。当你使用 J2ME Polish GUI 时，可以确信你的自定义项在每个目标设备上的行为都是一致的，无论其原生实现如何。因此，只有当你使用了在目标设备上实现有误的低级图形操作时，才需要进行移植工作。请参考目标设备在
    *http://www.j2mepolish.org/devices-overview.html* 上的已知问题列表。另一个可能的移植问题是，当你希望同时在
    MIDP 1.0 手机上使用你的项时，使用了仅限 MIDP 2.0 的功能。


    **初始化**


    J2ME Polish 首先调用 `getPrefContentWidth( allowedHeight )` 方法，并传入一个未定义的 `allowedHeight`
    ( -1 )。随后调用 `getPrefContentHeight( allowedWidth )` 方法，该方法会获取实际授予的宽度。当 J2ME Polish
    需要调整宽度时，你的自定义项将通过 `setSize(width, height)` 方法再次收到通知。最大可能宽度是设备的屏幕宽度；根据应用程序的设计，你可能拥有更少的空间。


    请注意，`Display.getColor( int )` 和 `Font.getFont( int )` 方法仅在 MIDP 2.0 设备上可用。因此，此类调用只能在当前目标设备支持
    MIDP 2.0 平台时使用。请参考清单 13-15 中的 `init()` 方法，了解如何使用 `#if` 预处理指令来区分不同情况。


    **交互模式**


    J2ME Polish 在每个平台上都支持交互模式 `CustomItem.KEY_PRESS`、`CustomItem.TRAVERSE_HORIZONTAL`
    和 `CustomItem.TRAVERSE_VERTICAL`。此外，在所有支持指针事件的设备上都支持 `CustomItem.POINTER_PRESS`
    模式。


