    standard does not provide the means for reading and writing ZIP streams. Alternatively,
    you can use the GZIPInputStream implementation of the TinyLine project ( *http://www.tinyline.com*),
    for example.


    To improve performance, you can also minimize the use of encryption, for example
    by authenticating only once per session. When you have a security-sensitive application,
    however, you should be very careful about not using all available means to secure
    the data. See the


    “Improving Perceived Performance” section for some ideas on how to increase the
    usability of your application while maintaining a high level of security.


