    throws IOException


    {


    String recordStoreName = url.substring( 1, url.length() - ".png".length() ); try
    {


    RecordStore store = RecordStore.openRecordStore( recordStoreName, false ); byte[]
    imageData = store.getRecord( store.getNextRecordID() - 1 ); return Image.createImage(
    imageData, 0, imageData.length );


    } catch ( RecordStoreNotFoundException e ) {


    // 在后台加载图像：


    Thread thread = new Thread(


