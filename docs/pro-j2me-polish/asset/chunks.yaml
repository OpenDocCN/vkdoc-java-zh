    **Honoring Netiquette**


    You should honor certain rules when you post any questions or statements. These
    rules make everyone’s life easier, so please stick to this netiquette if possible.
    Netiquette is really just common sense, but you may be surprised how many people
    do not care about it.


    Before asking a question, you should search for an answer. Start with a normal
    search engine such as Google, and then check out specialized forums and portals.
    Most forums provide a search function and compile a list of frequently asked questions
    that you should consult first.


    When you cannot find the answer to your problem, post your question to an appropriate
    forum and try to describe your problem in as much detail as possible. Name the
    exact phone or emulator that produces the error, name any third-party software
    and version you are using, describe the problem as concretely as possible, and
    provide stack traces or exception names when applicable. You should also add the
    relevant parts of the source code so that other users can track down coding errors.
    On many forums you can surround the source code with


    [code]..[/code] so that it is formatted correctly. Do not forget to describe what
    you want to achieve; sometimes there are alternative ways to solve a problem.
    Finally, you should mention whether the same program works on other devices or
    emulators without the problem occurring.


    When you are frustrated about a problem, it is easy to lose your temper, so make
    sure you ask your questions in a polite way. You cannot expect to get a useful
    answer if you are swearing or aggressively demanding in any way.


    Last but not least, you should be careful with advertising your products in forums.
    Some forums provide specific boards for such items. In general, you should post
    news about your products only when they are of real interest to J2ME developers.


