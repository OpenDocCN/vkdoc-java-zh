- fmt: "# Designing the currently focused item of the ChoiceGroup\n\n```\n.choiceGroupFocused\
    \ {\n    padding: 3;\n    padding-horizontal: 5;\n    font-color: fontColor;\n\
    \    font-style: bold;\n    border {\n        type: round-rect;\n        color:\
    \ fontColor;\n        arc: 8;\n    }\n    layout: left | expand;\n}\n```\n\n![Image\
    \ 49](index-243_1.jpg)\n\n## Designing Pop-up Choice Groups\n\nPop-up `ChoiceGroup`s\
    \ normally show you only the currently selected item. Only when you activate the\
    \ group by either pressing the fire button or invoking the `Select` command will\
    \ all available options be shown. After you have selected an item, the group closes\
    \ again. Table 12-22 lists the available attributes. In contrast to the multiple\
    \ and exclusive `ChoiceGroup`s, these attributes apply only to the actual `ChoiceGroup`\
    \ style, not to the style of the items contained within the `ChoiceGroup`.\n\n\
    **Table 12-22.** *Additional Attributes for Items in Multiple ChoiceGroups*\n\n\
    | Attribute | Required? | Explanation |\n|-----------|-----------|-------------|\n\
    | `popup-image` | No | The URL to the image that should be shown in the closed\
    \ pop-up group. Per default a simple drop-down image will be used. |\n| `popup-color`\
    \ | No | The color for the arrow in the drop-down image of a closed pop-up group.\
    \ Defaults to black and makes sense only when no pop-up image has been specified.\
    \ |\n| `popup-background-color` | No | The color for the background in the drop-down\
    \ image of a closed pop-up group. Defaults to white and makes sense only when\
    \ no pop-up image has been specified. |\n\nListing 12-48 shows how to design a\
    \ pop-up `ChoiceGroup`, and Figure 12-28 shows it in action.\n\n**Listing 12-48.**\
    \ *Designing a Pop-up ChoiceGroup*\n\n```\n/* Designing the ChoiceGroup */\n.popupChoiceGroup\
    \ {\n    popup-color: fontColor;\n    popup-background-color: backgroundColor;\n\
    \    focused-style: choiceGroupFocused;\n}\n```\n\n![Image 50](index-244_1.jpg)\n\
    \n```\n/* Designing the items contained in the ChoiceGroup */\n.popupChoiceItem\
    \ {\n    margin: 1; /* compensation for the border of the focused style */\n \
    \   padding: 3;\n    padding-horizontal: 5;\n    font-color: fontColor;\n    font-style:\
    \ plain;\n}\n\n/* Designing the currently focused item of the opened ChoiceGroup\
    \ */\n.choiceGroupFocused {\n    padding: 3;\n    padding-horizontal: 5;\n   \
    \ font-color: fontColor;\n    font-style: bold;\n    border {\n        type: round-rect;\n\
    \        color: fontColor;\n        arc: 8;\n    }\n    layout: left | expand;\n\
    }\n```\n\n**Figure 12-28.** *The pop-up ChoiceGroup in the closed state (left)\
    \ and in the opened mode (right)*\n\n## Designing Gauge Items\n\nA `Gauge` shows\
    \ a progress indicator or can be used to enter a fixed range of numbers. It supports\
    \ quite a few additional attributes, listed in Table 12-23.\n\n**Table 12-23.**\
    \ *Additional Attributes for Gauge Items*\n\n| Attribute | Required? | Explanation\
    \ |\n|-----------|-----------|-------------|\n| `gauge-image` | No | The URL of\
    \ the image, for example, `gauge-image: url(progress.png);`. When no gauge width\
    \ is defined, the width of this image will be used instead. |\n| `gauge-color`\
    \ | No | The color of the progress bar. Defaults to blue. |\n| `gauge-width` |\
    \ No | The width of the gauge element in pixels. When no width is defined, either\
    \ the available width or the width of the provided image will be used. |\n| `gauge-height`\
    \ | No | The height of the gauge element in pixels. Defaults to 10. When an image\
    \ is provided, the height of the image will be used. |\n| `gauge-mode` | No |\
    \ Either `chunked` or `continuous`. In the `continuous` mode, only the gauge color\
    \ will be used, whereas the `chunked` mode intersects the indicator in chunks.\
    \ The setting is ignored when an image is provided. Default value is `chunked`.\
    \ |\n| `gauge-gap-color` | No | The color of gaps between single chunks. Only\
    \ used in the `chunked` gauge mode or when a gauge with an indefinite range is\
    \ used. In the latter case, the provided color will be used to indicate the idle\
    \ state. Default gap color is white. |\n| `gauge-gap-width` | No | The width of\
    \ gaps in pixels between single chunks. |"
