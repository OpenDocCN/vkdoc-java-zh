    **Forwarding Log Messages**


    You can use log handlers to process and forward log messages to other entities.
    At the time of writing this book, only the Record Management System (RMS) handler
    is available. So, currently, you could use the RMS log handler to store all log
    entries, and then view them later with the LogViewerMidlet.


    You can activate the desired log handlers by using the <handler> element in your
    *build.xml* file. Listing 9-6 activates the RMS log handler for all Siemens devices.


    **Listing 9-6.** *Activating the RMS Log Handler for Siemens Devices*


    <debug level="warn" unless="test">


    **<handler name="rms" if="polish.Vendor == Siemens" />**


    <filter package="com.apress.application" level="debug" />


    </debug>


    The RMS log handler saves all log entries in the RMS, so that you can view them
    with the de.enough.polish.log.rms.LogViewerMidlet. You can find this MIDlet in
    *${polish.home}/*


    *samples/logviewer*. When you build it, make sure to set the following preprocessing
    variables in the <variables> section of the log viewer’s *${polish.home}/samples/logviewer/build.xml*
    script:


    • polish.log.MIDletSuite (corresponding to the name attribute in your <info> element)


    • polish.log.Vendor (as in the vendorName attribute in your <info> section) Without
    these variables, the log viewer will not be able to find the shared record store
    that contains the log messages.


    After you have defined the necessary variables, you can then build the log viewer
    and install it on your device. Figure 9-2 shows the log viewer in action. You
    can filter the shown messages by typing in keywords.


    ![Image 19](index-153_1.jpg)


