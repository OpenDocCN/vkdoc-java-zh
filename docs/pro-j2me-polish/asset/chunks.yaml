    Usually, the standard, compliant, internal J2ME Polish packager is used for creating
    the final application bundles. External packagers can reduce the size of JAR files
    by using optimized zip algorithms. Use the <packager> element for working with
    a different packaging program, and integrate any packager by specifying the attributes
    executable and arguments. Use the executable attribute for defining the actual
    packager program. In the arguments attribute, you can separate several arguments
    by using two semicolons, as demonstrated in Listing 7-19.


    **Listing 7-19.** *Using the JAR Packager*


    <j2mepolish>


    <info


    license="GPL"


    name="Roadrunner"


    vendorName="A reader."


    version="0.0.1"


    jarName="${polish.vendor}-${polish.name}-roadrunner.jar"


    />


    <deviceRequirements>


    <requirement name="Identifier" value="Generic/midp1" />


