    \    textfield-caret-color: red;\n    textfield-caret-char: >;\n    textfield-show-length:\
    \ true;\n    textfield-direct-input: true;\n    focused-style: .focusedInput;\n\
    }\n```\n\n**图12-31.** 运行中的`DateField`\n\n## 设计Ticker\n\n`Ticker`是在屏幕上滚动的动画文本。它们通常用于显示广告，当然，也可以通过J2ME\
    \ Polish进行完全配置。表12-26列出了`Ticker`项的属性。\n\n**表12-26.** `Ticker`项的附加属性\n\n| 属性 |\
    \ 是否必需？ | 说明 |\n| --- | --- | --- |\n| `ticker-step` | 否 | 每次更新时`ticker`移动的像素数。默认为2像素。\
    \ |\n\n清单12-52展示了如何设计一个`Ticker`项，图12-32演示了它的实际效果。\n\n**清单12-52.** 设计一个`Ticker`项\n\
    \n```\n.tickerStyle {\n    font-color: fontColor;\n    font-size: small;\n   \
