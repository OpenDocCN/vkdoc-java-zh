    Introduction


    **T**his book introduces J2ME Polish, a collection of open source tools for creating
    “polished”


    wireless Java applications. J2ME Polish is best known for its build tools and
    its user interface—


    but more about that later. In this book, you will learn how to use J2ME Polish
    to your advantage.


    You will also learn about the challenges you will encounter in the real world
    of wireless Java programming and how J2ME Polish can help you to master these
    problems, by circumventing device bugs, integrating the best matching resources,
    and more.


    The first part of this book helps you to install and integrate J2ME Polish in
    your development system. The second part of the book deals with the various tools
    included in J2ME


    Polish, including the following:


    • Device database (Chapter 6)


    • Build tools (Chapter 7)


    • Preprocessor (Chapter 8)


    • Logging framework (Chapter 9)


    • Utilities (Chapter 10)


    • Game engine (Chapter 11)


    • User interface (Chapter 12)


    You can also extend J2ME Polish in almost every aspect, which I discuss in Chapter
    13.


    In the third and last part of the book, you will learn about differences between
    J2ME devices, known issues, and typical challenges of J2ME programming in the
    real world.


    In this book, I assume that you are already familiar with J2ME development, so
    you should know what a MIDlet is, what the Mobile Media API is used for, and so
    forth. This book will not teach J2ME programming; instead, it focuses on how you
    can get the most out of your programming.


