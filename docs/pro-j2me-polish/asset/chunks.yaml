    Again, I should point out that dynamic programming does not relieve you of the
    testing burden: you still need to test your application on every target device
    you want to support.


    The benefit is to have only one JAR file, which eases the application’s deployment.


    ■**Tip** When you’re deploying dynamic code, you should consider separating your
    code according to the Model-View-Control pattern so that you can exchange views
    more easily. The common practice on wireless Java platforms is to merge the controller
    and the model to minimize class usage (and therefore JAR space).


    **Using Preprocessing**


    Preprocessing changes your source code before it is actually compiled. This approach
    provides an unmatched flexibility. Listing 15-3 shows how to get the same functionality
    as in the dynamic code example in Listing 15-2 with only a fraction of code. In
    more complex scenarios, you will profit even more by using preprocessing.


