    第 10 章


    ■ ■ ■


    使用实用工具


    **本章内容：**


    • 使用 `ArrayList` 工具类作为缓慢的 `java.lang.Vector` 实现的替代方案。


    • 使用 `TextUtil` 类将文本适配到显示区域内。


    • 使用 `BitMapFont` 类自定义字体。


    • 使用字体编辑器将任何 TrueType 字体转换为位图字体。


    • 使用二进制编辑器创建和操作二进制数据文件。


    • 使用 `MIDPSysInfo` MIDlet 测试设备的功能。


    J2ME Polish 包含几个方便的工具类和独立实用程序。在本章中，我们将探讨如何在开发无线 Java 应用程序时使用它们。


    **工具类**

    '
- fmt: "# J2ME Polish Utility Classes\n\nJ2ME Polish’s utility classes, `de.enough.polish.util.*`,\
    \ equip you with advanced features not found in the MIDP standard. Make sure to\
    \ add the `*${polish.home}/import/*enough-j2mepolish-client.jar*` to the classpath,\
    \ so that the Java runtime can find these additional classes. In most IDEs, you\
    \ can set auxiliary libraries in the properties of your project.\n\nHere, we will\
    \ look at the following utility classes:\n\n- The `ArrayList` class, which provides\
    \ an alternative to the slow `java.lang.Vector` implementation\n- The `TextUtil`\
    \ class, which wraps your text so that it fits within your display area\n- The\
    \ `BitMapFont` class, which allows you to use custom fonts for displaying messages\n\
    \n> **Note:** If you take a look at the preprocessed code in the `build` folder\
    \ of your project, you will notice that J2ME Polish adds all utility classes to\
    \ your project, even if you don't want to use them. Don’t worry about it—the obfuscator\
    \ will remove all unused classes, so that no resources will be wasted.\n\n## The\
    \ ArrayList Class\n\nThe `de.enough.polish.util.ArrayList` class implements a\
    \ list that uses a dynamic array for storing its values. In contrast to `java.util.Vector`,\
    \ `ArrayList` does not use synchronization and is, therefore, considerably faster.\
    \ However, since the `ArrayList` is not synchronized, you need to make sure to\
    \ implement your own synchronization when several threads access the `ArrayList`\
    \ concurrently.\n\nYou can use all methods of `java.util.ArrayList`, which is\
    \ available only for the Java 2 Standard Edition (J2SE).\n\nListing 10-1 demonstrates\
    \ an example of using the `ArrayList` class for managing an arbitrary number of\
    \ contacts in an address book.\n\n**Listing 10-1.** *Using `de.enough.polish.util.ArrayList`*\n\
    \n```\npackage com.apress.adress;\n\nimport de.enough.polish.util.ArrayList;\n\
    \npublic class AdressBook {\n\n    ArrayList contactsList;\n\n    public AdressBook()\
    \ {\n        super();\n    }\n\n    public void addContact( Contact contact )\
    \ {\n        this.contactsList.add( contact );\n    }\n\n    public Contact[]\
    \ searchContacts( String pattern ) {\n        ArrayList matchingContacts = new\
    \ ArrayList();\n        for ( int i = this.contactsList.size(); --i >= 0; ) {\n\
    \            Contact contact = (Contact) this.contactsList.get( i );\n       \
    \     if ( contact.pattern.indexOf(pattern) != -1 ) {\n                matchingContacts.add(\
    \ contact );\n            }\n        }\n        return (Contact[]) matchingContacts.toArray(\n\
    \            new Contact[ matchingContacts.size() ]);\n    }\n}\n```\n\n```\n\
    package com.apress.adress;\n\npublic class Contact {\n\n    public String firstName;\n\
    \    public String lastName;\n    public String chatAddress;\n    public String\
    \ emailAddress;\n    public String pattern;\n\n    public Contact(String firstName,\
    \ String lastName,\n                   String chatAddress, String emailAddress)\n\
    \    {\n        this.firstName = firstName;\n        this.lastName = lastName;\n\
    \        this.chatAddress = chatAddress;\n        this.emailAddress = emailAddress;\n\
    \        this.pattern = firstName + lastName + chatAddress + emailAddress;\n \
    \   }\n}\n```\n\n## The TextUtil Class\n\nYou can split text into a `String` array\
    \ with the `de.enough.polish.util.TextUtil` class. This is useful for wrapping\
    \ text so that it fits on the small screens found on handheld devices. Some split\
    \ methods may take font metrics and preferred text widths into account, making\
    \ it rather painless to display a lot of text in a small view. Listing 10-2 demonstrates\
    \ using the `TextUtil` class for wrapping the text before it is painted on the\
    \ screen.\n\n**Listing 10-2.** *Using the `de.enough.polish.util.TextUtil` Class*\n\
    \n```\nimport de.enough.polish.util.TextUtil;\nimport javax.microedition.lcdui.Graphics;\n\
    import javax.microedition.lcdui.Font;\n\npublic final class TextViewer {\n\n \
    \   private final String[] lines;\n    private final Font font;\n    private final\
    \ int color;\n\n    public TextViewer( String text ) {\n        // splitting the\
    \ text only at line breaks:\n        this.lines = TextUtil.split( text, '\\n'\
    \ );\n        this.font = Font.getDefaultFont();\n        this.color = 0;\n  \
    \  }\n\n    public TextViewer( String text, Font font, int color,\n          \
    \             int firstLineWidth, int lineWidth )\n    {\n        // wrapping\
    \ the text for the specified font, so that\n        // it fits on the screen:\n\
    \        this.lines = TextUtil.split( text, font, firstLineWidth, lineWidth );\n\
    \        this.font = font;\n        this.color = color;\n    }\n\n    public void\
    \ paint( int x, int y, Graphics g ) {\n        g.setColor( this.color );\n   \
    \     g.setFont( this.font );\n        int lineHeight = this.font.getHeight()\
    \ + 2;\n        for (int i = 0; i < this.lines.length; i++ ) {\n            String\
    \ line = this.lines[i];\n            g.drawString( line, x, y, Graphics.TOP |\
    \ Graphics.LEFT );\n            y += lineHeight;\n        }\n    }\n}\n```\n\n\
    ## The BitMapFont Class\n\nThe J2ME standard isn’t really overwhelming when it\
    \ comes to font support. It provides for only the following:\n\n- Three different\
    \ font faces (proportional, monospace, and system), but often the system and the\
    \ proportional fonts are the same.\n- Three different sizes (small, medium, and\
    \ large), with the actual size depending on the implementation. You can check\
    \ the size with the `polish.Font.small`, `polish.Font.medium`, and `polish.Font.large`\
    \ preprocessing variables.\n- Font styles of bold, italic, underlined, and plain.\n\
    \nFonts are very much implementation-specific, so you cannot expect them to look\
    \ alike on different platforms. Some vendors, such as Motorola, provide only one\
    \ font type in one size.\n\nEspecially in games, you often need somewhat cooler\
    \ fonts, and that’s why J2ME Polish provides the `de.enough.polish.util.BitMapFont`\
    \ class.\n\nYou can use any True Type font in your application with the `BitMapFont`\
    \ class. Or, to be more precise, you can convert any True Type font into a bitmap\
    \ font with the stand-alone Font Editor and use that bitmap font in your application.\
    \ The Font Editor, located in the `${polish.home}/bin` folder, is described in\
    \ detail later in this chapter.\n\nIf you want to display messages, you need to\
    \ request a `BitMapFontViewer` from your `BitMapFont`. The viewer class manages\
    \ particular text, whereas the bitmap font just holds the basic font information\
    \ and glyphs. By splitting this functionality in two different classes, you can\
    \ view text with custom fonts very efficiently.\n\nListing 10-3 shows how you\
    \ can use the `BitMapFont` and `BitMapFontViewer` classes for displaying messages\
