    **集成终结器**


    在项目经过预处理、编译、后编译、混淆和打包之后，项目将被终结。终结器的示例包括对应用程序包进行签名，或自动转换为 BlackBerry 设备的 COD 文件。


    使用 *build.xml* 脚本中 `<build>` 部分内的 `<finalizer>` 元素来调用终结器。您可以在此步骤中使用 `antcall`
    终结器调用任何 Ant 目标：`<finalizer name="antcall" target="finalizeme" />`。使用额外的 Ant 属性
    `polish.finalize.jad` 和 `polish.finalize.jar` 来访问所创建的 JAD 和 JAR 文件的路径。


