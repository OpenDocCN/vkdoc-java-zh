    in which all classes and resources reside) and the *${polish.jarPath}* file (the
    file that should be created) are useful for specifying the arguments for the packager.


    Of course, you can also use any other Ant or J2ME Polish properties as well.


    You can use the popular 7-Zip and KZIP packagers just by defining the appropriate
    name attribute (either 7zip or kzip). Please note that these packagers use optimized
    zip algorithms that are not accepted by every J2ME device. Listing 7-20 uses the
    7-Zip packager for generating the JAR file. The packager supports the optional
    parameters compression (either maximum, normal, or none), passes (the number of
    compression runs, a number between 1 and 4), and fastbytes (the size of internal
    compression chunks, a number between 3 and 255). Set the ${7zip.home} Ant property
    when the 7-Zip packager is neither on the path of your system nor in the *${polish.home}/bin*
    folder.


