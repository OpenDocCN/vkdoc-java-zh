    第 8 章 ■ 预处理


    第三种方法是使用 `static final` 变量和编译器来调整您的代码。您可以使用普通的 `if` 分支，例如 `if (Configuration.IS_NOKIA_SERIES60)`
    来区分不同的配置。当 `Configuration.IS_NOKIA_SERIES60` 是一个 `final static boolean` 字段并且为
    `false` 时，编译器可以在编译阶段消除后续的死代码。这里的主要问题是您需要为每个目标设备创建并包含一个 `Configuration` 类，并且需要以某种方式集成它。另一个问题是您只能在普通代码中使用
    `if` 分支，因此您不能采用这种方法来导入不同的 API 或使用不同的字段等。此外，您需要确保在更改 `Configuration` 类时重新编译所有类。


    一个更强大的解决方案是使用*切面*来调整您的应用程序。在面向切面编程中，您编写一个普通的应用程序，并使用切面在源代码中的特定位置（称为*连接点*）注入额外的代码。面向切面开发非常强大，允许您做一些令人惊奇的事情，比如更改类的层次结构。然而，这种新范式也非常复杂且难以学习。从好的方面来说，您最终会得到一个非常干净且易于理解的应用程序。另一方面，您需要为每个目标设备提供一组不同的切面，这意味着您需要再次拆分您的应用程序项目。


    ■**提示** 在面向切面开发中，您需要区分应用程序的主要目的（例如，银行应用程序）和其次要目的（例如，安全地验证其用户）。请参阅 *http://en.wikipedia.org/wiki/Aspect-oriented_programming*
    以了解有关面向切面开发的更多信息。AspectJ 项目 ( *http://eclipse.org/aspectj*) 是 Java 世界的一个流行解决方案。


    一个简单而有效的解决方案是*预处理*您的应用程序。预处理在编译之前更改您的应用程序代码。您可以使用预处理指令、符号和变量来控制此过程。J2ME Polish
    不仅包含一个强大的预处理器，而且还提供了一种标准化的方式来查询和使用当前目标设备的能力。得益于集成的设备数据库，您可以开箱即用地访问超过 300 种不同手机的详细配置，因此您无需创建和维护自己的配置。预处理允许您调整您的应用程序以适应不同的设备和配置，而不会降低运行时性能、造成不兼容或拆分您的项目。


