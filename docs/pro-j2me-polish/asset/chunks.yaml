    **Managing JAD and Manifest Attributes**


    JAD and Manifest attributes are needed during the installation and can contain
    user-defined properties for configuring your application. Some attributes are
    mandatory, such as the name of the application, and some are optional, such as
    the description. Sometimes you might need to define vendor- or carrier-specific
    attributes as well.


    ■**Tip** Consider using preprocessing for configuring your application instead
    of using user-defined attributes and calling MIDlet.getAppProperty(String) during
    runtime. You can include any variables with the


    #= preprocessing directive, for example, //#= private final static String START_URL
    =


    "${start-url}";. You can define your configuration variables using the <variables>
    element in the


    <build> section.


    You can specify attributes in three ways:


    • By specifying attributes in the <info> section of the <j2mepolish> task


    • By using the <jad> element of the <build> section


    • By defining preprocessing variables in the <variables> element of the <build>
    section or in the *messages.txt* files that are used in the localization step
    Standard attributes are defined in the <info> section, whereas the <jad> element
    is used for defining nonstandard attributes. Your defined preprocessing variables
    can override the values of any attributes that you have defined in the <info>
    section. This is useful for setting locale-specific attributes such as the name
    of your application. Chapter 8 discusses how you can define your own variables.


    In every attribute value, you can use any variables from the device database or
    from your own preprocessing variables.


    Listing 7-16 shows how attributes are defined using the <info> and <jad> elements.


    **Listing 7-16.** *Defining JAD and Manifest Attributes in Your build.xml Script*


    <j2mepolish>


    <info


    license="GPL"


    **name="Roadrunner"**


    **vendorName="HighTech Ltd."**


    **version="0.0.1"**


    **jarName="${polish.vendor}-${polish.name}-roadrunner.jar"**


    />


    <deviceRequirements>


    <requirement name="Identifier" value="Generic/midp1" />


    </deviceRequirements>


    <build>


    <midlet class="com.apress.roadrunner.Roadrunner" />


    5033CH07.qxd 6/17/05 11:50 AM Page 75


    C H A P T E R 7 ■ B U I L D I N G A P P L I C AT I O N S


    **75**


    **<jad>**


    **<attribute**


    **name="Nokia-MIDlet-Category"**


    **value="Game"**


    **if="polish.group.Series40"**


    **/>**


    **<attribute**


    **file="config/${polish.vendor}.attributes"**


    **/>**


    **</jad>**


    </build>


    <emulator />


    </j2mepolish>


    Each <attribute> element supports the XML attributes name, value, file, target,
    if, and unless.


    Except when you use the optional file XML attribute, you do not have to set the
    name and the value of the attribute. With the file option, you specify the file
    that contains one or more attributes, in which colons separate name and values
    of the attribute: Nokia-MIDlet-Category: Game. Listing 7-16 included all attributes
    defined in the *config/${polish.vendor}.*


    *attributes* file. The ${polish.vendor} property contains the name of the vendor
    of the current target device, so when you build your application for the Siemens
    SK65 phone, you would include the *config/Siemens.attributes* file.


    With the XML attribute target, you can control whether the attribute should be
    added to the JAD (target="jad"), the Manifest (target="manifest"), or both (target="jad,manifest").


    When you omit the target setting, the attribute is added to both the JAD file
    and the Manifest.


    This is the default behavior of J2ME Polish even though the MIDP standard suggests
    putting user-defined attributes only into the JAD file. Some devices do, however,
    use the JAD file only during the installation and remove it afterwards.


    With the optional if and unless terms, you can control whether the attribute should
    be added for the current target device. Listing 7-16 added the Nokia-MIDlet-Category
    attribute only when the target device belongs to the “Series40” group, because
    it would be ignored on all other devices anyway.


