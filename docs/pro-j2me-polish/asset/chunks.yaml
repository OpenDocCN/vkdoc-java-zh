    C H A P T E R 1 2 ■ W O R K I N G W I T H T H E G U I **Introducing Interface
    Concepts**


    The J2ME Polish GUI provides a powerful and efficient way to design the user interface
    of wireless Java applications. In fact, the J2ME Polish GUI has several unique
    features:


    • **Time to market**: The J2ME Polish GUI is compatible with the standard MIDP
    GUI, so you don’t need to learn a new API and can turn on and off the J2ME Polish
    GUI selectively.


    • **Automatic porting**: J2ME Polish weaves the necessary code “automagically”
    into your application so you don’t need to modify your source code. The GUI circumvents
    known issues of your target devices automatically.


    • **Innovative designs**: The GUI is designed using simple text files that reside
    outside the actual application source code. An extended version of the web standard
    CSS is used for the design, so web designers can now work on the design of J2ME
    applications without the help of programmers while the programmers concentrate
    on the business logic.


    • **Customizable**: Another important advantage is that you can create extremely
    different designs for the same application code just by exchanging the *polish.css*
    file and other resources. This means you can adjust all designs easily to different
    devices, vendors, device groups, or even locales without changing the source code.
    Refer to the *resources/polish.css* file of one of the sample applications for
    an example.


    • **Flexible**: You control the user interface with the *build.xml* file and #style
    preprocessing directives.


    • **Extensible**: All elements of the MIDP 2.0 GUI are supported—even on MIDP
    1.0


    devices. So, you can use MIDP 2.0–specific items such as a POPUP ChoiceGroup or
    a CustomItem on MIDP 1.0 phones as well. When you extend the J2ME Polish GUI with
    CustomItems, you will find the same environment on every target device, even when
    the native implementation lacks important features like internal traversal.


    The drawback of the J2ME Polish GUI is the increased size of the application package.


    You should calculate up to 30KB of additional space for the GUI, depending on
    what GUI elements and what designs you use. Modern devices such as Symbian-based
    devices (refer to Chapter 15) support application sizes up to several megabytes,
    so the additional size is most often no problem. The situation is, however, different
    on some older devices, such as Nokia’s aged MIDP 1.0–based Series 40 models, which
    accept only applications with a size of up to 64KB. For such devices, the GUI
    is by default not used even when it is activated.


    Figure 12-1 shows how you would use the J2ME Polish GUI for creating a “polished”
    application. For a complete and simple example that uses the *build.xml* and *polish.css*
    files, please refer to the “Creating a ‘Hello, J2ME Polish World’ Application”
    section of Chapter 7.


