    有时，扩展其他设备很有用。例如，考虑一些运营商（如 Vodafone）的设备修改。这些运营商通常会添加一些库，如 Vodafone 服务类库 (VSCL)，并以不同的名称销售该设备。设备数据库中的一个例子是索尼爱立信
