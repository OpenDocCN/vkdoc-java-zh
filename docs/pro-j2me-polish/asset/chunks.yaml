  trans: '

    ■**注意** 此外，还存在一些未经 Java 社区流程标准化的 J2ME 兼容平台，例如韩国的 WIPI 和日本的 DoJa 平台。第 15 章将更详细地讨论这些平台。从
    J2ME Polish 1.3 开始，您将能够在 *${polish.home}/*


    *platforms.xml* 文件中定义额外的平台。


    **可选包**


    有许多库可用于扩展 MIDP 设备的基本功能。一些库是特定于供应商或运营商的；其他则由 Java 社区流程（JCP）标准化。


    大多数 MIDP 1.0 设备仅包含特定于供应商的 API 增强功能，例如诺基亚的 UI API、三星的设备控制类和摩托罗拉的 Phonebook API。一些运营商（如沃达丰）提供了额外的扩展。出于兼容性原因，这些库即使在现代设备中也继续存在，但其使用大多已被弃用，并被
    MIDP 2.0 配置文件或可选包所取代。


    许多 MIDP 2.0 设备支持标准化的可选 API，例如移动媒体 API 或无线消息 API。您可以使用它们，而无需将自己局限于特定的供应商或运营商。表
    14-3 包含了最流行的可选包，您可以在 Java 社区流程主页（*http://www.jcp.org*）上找到它们的规范。如果您想部署一个可选库，请参考
    J2ME Polish 的设备数据库（*http://www.*


    *j2mepolish.org/devices/apis.html*），以了解您的库被采用的程度。同时，请仔细阅读规范，因为通常某些部分是可选的，例如蓝牙
    API 的 OBEX 传输。


