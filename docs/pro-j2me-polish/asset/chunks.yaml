    **Figure 3-2.** *Specifying the WTK directory location* **Component Selection**


    The last important screen of the installer is the one where you select the components
    to be installed, as shown in Figure 3-3.


    **Figure 3-3.** *Selecting the components you want to install*


    ![Image 9](index-36_1.jpg)


    5033CH03.qxd 6/17/05 11:44 AM Page 14


    **14**


    C H A P T E R 3 ■ I N S TA L L I N G J 2 M E P O L I S H


    You can click the components to get more information about them. If you want to
    digitally sign MIDlets on Mac OS X, you should select the *JadUtil.jar* file,
    since this file is not available in the WTK port of mpowers LLC (discussed in
    Chapter 2).


    **The Installation**


    After you have selected the installation directory for J2ME Polish itself, the
    installation process is started. You will then find the hierarchy shown in Figure
    3-4 in the J2ME Polish installation directory (which I will refer to as *${polish.home}*).


    **Figure 3-4.** *The J2ME Polish installation directory*


    5033CH03.qxd 6/17/05 11:44 AM Page 15


    C H A P T E R 3 ■ I N S TA L L I N G J 2 M E P O L I S H


    **15**


    The J2ME Polish installation directory contains the following folders:


    • The *bin* folder contains some stand-alone tools, such as the editor for binary
    data files and the tool for creating bitmap fonts from True Type fonts.


    • The *doc* folder contains the HTML and the PDF documentation.


    • The *import* folder contains the core libraries of J2ME Polish, along with many
    standard J2ME libraries and vendor-specific API extensions. These APIs are used
    during the build process and can also be used for the classpath of your J2ME project
    in your favorite IDE.


    • The *samples* directory contains the sample applications.


    • The root directory ( *${polish.home}*) contains the device database, which consists
    of the files *devices.xml*, *vendors.xml*, *groups.xml*, *bugs.xml*, and *apis.xml*.
    The file *custom-css-attributes.xml* can be used to describe your own extensions
    to the GUI of J2ME Polish.


    **External Tools**


    While you’re in the install mode, you should also consider installing the following
    third-party tools:


    **Jad:** Jad ( *http://www.kpdus.com/jad.html*) is a free Java decompiler. It
    is useful for resolving stack traces shown within emulators. Such stack traces
    show only the bytecode instruction offset within a method. J2ME Polish can show
    the actual positions in the source code when Jad is either in the PATH or in the
    *${polish.home}/bin* folder.


    **ProGuard:** ProGuard ( *http://proguard.sourceforge.net*) is the best open-source
    obfuscator, which protects and shrinks your code at the same time. Copy the *proguard.jar*
    file to *${polish.home}/import*.


    **7-Zip:** J2ME Polish can use 7-Zip ( *http://7-zip.org*, or *http://p7zip.sourceforge.net*
    for Linux and Mac OS X systems) for packaging the application, which might result
    in smaller file sizes. Install 7-Zip to *${polish.home}/bin* so that J2ME Polish
    can find it automatically. You can download 7-Zip for Linux and Mac OS X at *http://p7zip.sourceforge.net*.


    **KZIP:** J2ME Polish can also use the KZIP packager ( *http://advsys.net/ken/utils.htm#kzip*).


    When you install KZIP to *${polish.home}/bin*, J2ME Polish can find it automatically.


    **Pngcrush, PNGOUT, and PNGGauntlet:** Pngcrush ( *http://pmt.sourceforge.net/pngcrush*)
    and PNGOUT ( *http://advsys.net/ken/utils.htm#pngout*) optimize PNG images. You
    must use these tools manually. PNGGauntlet ( *http://numbera.com/software/pnggauntlet.aspx*)
    provides a GUI for PNGOUT. Install these tools anywhere on your system.


    **J2ME Polish Sample Applications**


    You will find sample applications in the *samples* folder of the J2ME Polish installation
    directory *${polish.home}* (see Figure 3-4). You can use these sample applications
    as a blueprint for your own projects. Each sample application contains the following:


    5033CH03.qxd 6/17/05 11:44 AM Page 16


    **16**


    C H A P T E R 3 ■ I N S TA L L I N G J 2 M E P O L I S H


    • The *resources* folder stores all images, design settings, and so forth.


    • The *resources2* folder stores an alternative design for the application.


    • The *src* folder contains the actual source code of the sample application.


    • The *build.xml* file controls how J2ME Polish should build the sample applications.


    ■**Note** In this section, I assume that you are using Ant from the command line.
    Of course, you can build the sample application from within your IDE as well.
    Often, it is enough to create a new project with the sample application as its
    root, right-click *build.xml* within it, and select Run ➤ Ant or a similar menu
    command in the IDE. See the next chapter for details on integrating J2ME Polish
    into common IDEs.


    **Testing the Sample Applications**


    The Menu application just displays a typical menu of any J2ME game. Test this
    application in the emulator from the command line with the following commands:


    > cd C:\Programs\J2ME-Polish\samples\menu


    > ant test j2mepolish


    Adjust the path to your installation directory of J2ME Polish accordingly.


    So what happens here? When Ant is called, it looks for the file *build.xml* in
    the current directory (so it uses *samples/menu/build.xml* in this example). The
    parameters test and j2mepolish denote targets within *build.xml*, which are executed
    by Ant. The test target sets an Ant property to true, which is evaluated by the
    j2mepolish target. When test is true, J2ME


    Polish will build the application for only one device and will also launch the
    appropriate emulator after the successful build. When everything works out, you
    should see the sample application (see Figure 1-2 in Chapter 1).


    The RoadRunner sample application features a full-blown game, in which a frog
    needs to be guided through crowded streets (sound familiar?). By default, the
    RoadRunner game is built for the Nokia/Series60 in the test mode. Before building
    it, make sure that you have installed that emulator, which you can get from *http://forum.nokia.com*.
    Depending on your setup, you might need to define the Ant property ${nokia.home}
    in the *build.xml* file, for example:


    <property name="nokia.home" value="C:\Nokia" /> A commented-out version of this
    property can be found at the beginning of the *build.xml* file.


    Treat yourself to a successful installation and play a round of RoadRunner now:


    > cd C:\Programs\J2ME-Polish\samples\roadrunner


    > ant test j2mepolish


    Use the correct path for the cd command.


    Figure 3-5 shows the main RoadRunner menu.


    ![Image 10](index-39_1.jpg)


    5033CH03.qxd 6/17/05 11:44 AM Page 17


    C H A P T E R 3 ■ I N S TA L L I N G J 2 M E P O L I S H


    **17**


    **Figure 3-5.** *The main menu of the RoadRunner game* **Troubleshooting Sample
    Application Errors**


    If you get an error message when you build a sample application, check your Ant
    setup. The following are common errors:


    **Command not found:** To resolve this, set your PATH environment variable so
    that it includes the *bin* directory of your Ant setup; for example, SET PATH=%PATH%;C:\ant\bin,
    or on Unix systems, export PATH=$PATH:/home/ant/bin.


    **Java Compiler cannot be found:** To resolve this, make sure that you have set
    the JAVA_HOME environment variable correctly (using the preceding SET or export
    command).


    **${wtk.home} can be set incorrectly:** If you did not specify the installation
    directory of the WTK correctly during the installation, J2ME Polish will complain
    about the wrong ${wtk.home} property. In that case, you need to open the *build.xml*
    file and adjust this Ant property; for example, <property name="wtk.home" value="C:\WTK22"
    />.


    When you call ant without any parameters from the command line, only the j2mepolish
    target will be executed. Since the test property has not been set to true, J2ME
    Polish will create the sample application for several target devices and will
    not launch the emulator. In that case, you will find the created applications
    within the newly created *dist* folder.


