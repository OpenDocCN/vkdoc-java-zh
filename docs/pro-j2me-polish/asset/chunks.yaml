    下拉视图显示物品下落和弹跳的动画。你可以通过将视图类型设置为 `dropping` 来激活它。表 12-15 列出了此视图的所有附加属性。


    **表 12-15.** *下拉视图类型的附加属性* **属性**


    **是否必需？**


    **说明**


