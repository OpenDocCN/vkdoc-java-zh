    本章向你介绍了 J2ME Polish 的总体架构。你了解了四个主要层：构建框架、客户端框架、IDE 插件和独立工具。你还了解了无线 Java 应用程序的生命周期以及
    J2ME Polish 如何在每个阶段帮助你。


