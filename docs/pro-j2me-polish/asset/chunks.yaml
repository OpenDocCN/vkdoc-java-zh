    **Integrating Device APIs**


    Many devices provide additional optional APIs. A popular example is the Nokia
    UI API, which provides additional graphic and sound functions. When a device supports
    a specific API, this is noted with the JavaPackage capability of that device in
    the *${polish.home}/devices.xml* file.


    Assuming that you want to use the Motorola Phonebook API, you just need to copy
    the corresponding library file *phonebook.jar* or *phonebook.zip* into the *${polish.home}/import*
    folder. It will then be used automatically for the devices that support the Phonebook
    API.


    J2ME Polish already provides a large number of APIs ranging from MIDP 1.0 to vendor-specific
    APIs such as the Nokia UI API or the Siemens Extension API.


    You can modify the *${polish.home}/apis.xml* file for specifying different library
    names, paths, or aliases. Chapter 6 describes this in more detail.


    ■**Caution** You cannot use optional and vendor-specific APIs for devices that
    do not support them. So, if a device does not support the Wireless Messaging API,
    you cannot use that API for your application build for that device. Use preprocessing
    and the polish.api.[api-name] preprocessing symbol for making the necessary adjustments
    in your application.


    **Obfuscating Applications**


    Obfuscating is vitally important for J2ME applications not only because it makes
    reverse engineering more difficult but also because the application size is decreased—in
    some cases quite drastically. Obfuscators usually strip away any classes, methods,
    and fields that are not used by the application. In a further step, they rename
    all remaining classes. Because of this functionality, you need to define “entry
    points” that are not scrambled. J2ME Polish automatically adds all MIDlets that
    are defined with the <midlet> element to the list of entry points. With the nested
    <keep> element, you can define additional classes that must be kept, even though
    they are not used directly. This is the case for all classes you load with the
    Class.forName( String ) mechanism, for example. Most obfuscators also accept additional
    parameters with nested


    <parameter> elements. Listing 7-37 demonstrates how to use the ProGuard obfuscator,
    in which the bytecode optimization of ProGuard is deactivated.


    **Listing 7-37.** *Using the ProGuard Obfuscator*


    <j2mepolish>


    <info


    license="GPL"


    name="Roadrunner"


    vendorName="A reader."


    version="0.0.1"


    jarName="${polish.vendor}-${polish.name}-roadrunner.jar"


    />


    <deviceRequirements>


    <requirement name="Identifier" value="Nokia/Series60" />


    5033CH07.qxd 6/17/05 11:50 AM Page 95


    C H A P T E R 7 ■ B U I L D I N G A P P L I C AT I O N S


    **95**


    </deviceRequirements>


    <build>


    <midlet class="com.apress.roadrunner.Roadrunner" />


    **<obfuscator name="ProGuard" >**


    **<keep class="com.apress.roadrunner.DynamicClass" />**


    **<parameter name="optimize" value="false" />**


    **</obfuscator>**


    </build>


    <emulator />


    **</j2mepolish>**


    **Using the Default Package**


    When you place your MIDlet and its related helper classes into different packages,
    you are maintaining a good architecture, but you might need to sacrifice some
    JAR size for that. J2ME


    Polish can move all your classes into the empty default package, which reduces
    the size of your JAR file. You can enable this option with any obfuscator by setting
    the useDefaultPackage option of the obfuscator to true: <obfuscator name="ProGuard"
    useDefaultPackage="true" />.


    ■**Caution** Use import statements instead of fully qualified class names in your
    code; otherwise, J2ME


    Polish will not be able to resolve the imports correctly. So, *do not* extend
    a class without importing it. This code will not work: class MyClass extends com.company.package.OtherClass.
    But this code is fine: import com.company.package.OtherClass; class MyClass extends
    OtherClass.


    **Combining Several Obfuscators**


    You can combine several obfuscators at once just by specifying several <obfuscator>
    elements.


    When you use the <keep> subelement, you need to specify in only one of the <obfuscator>
    elements. J2ME Polish will then use the obfuscated output of one obfuscator as
    input for the following obfuscator. Listing 7-38 uses the ProGuard obfuscator
    together with the DashO


    obfuscator. Whether combining several obfuscators minimizes the JAR size depends
    on both the obfuscator and your application. In some cases, you might even end
    up with bigger JAR


    files than with using one obfuscator only. Your mileage may vary. You can obtain
    the DashO


    obfuscator from *http://www.preemptive.com*.


    **Listing 7-38.** *Combining Several Obfuscators*


    <j2mepolish>


    <info


    license="GPL"


    name="Roadrunner"


    vendorName="A reader."


    version="0.0.1"


    jarName="${polish.vendor}-${polish.name}-roadrunner.jar"


