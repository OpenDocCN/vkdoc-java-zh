- fmt: "# 排版后的内容\n\nYou should think twice before using XML or SOAP for exchanging\
    \ data with a server. XML is a syntactically verbose protocol that carries a lot\
    \ of overhead compared to the actual data. You also need to parse and construct\
    \ the XML messages in your J2ME application, which can be quite costly in terms\
    \ of performance and heap memory usage. Often it is better to use your own proprietary\
    \ binary protocol instead. You can use `DataInputStream` and `DataOutputStream`\
    \ for reading and writing binary data comfortably.\n\nAnyway, if you can’t resist\
    \ using an XML protocol for communication, you can use `kXML` (http://kxml.sourceforge.net)\
    \ for parsing the data.\n\n## Authentication\n\nWhen the J2ME application needs\
    \ to authenticate the user, you can use several approaches for transmitting the\
    \ data securely. On MIDP 2.0 devices you can just use an HTTPS connection. On\
    \ MIDP 1.0 devices you can calculate the hash value of the password and send this\
    \ value over HTTP. You should also add a timestamp to each authentication request\
    \ and use this timestamp in your hashing function as well for preventing replay\
    \ attacks. In a replay attack a malicious intruder intercepts the communication,\
    \ copies the authentication request, and resends it onward later. You can use\
    \ the Bouncy Castle encryption API for calculating hash values (http://www.bouncycastle.org).\n\
    \n## Sessions and Cookies\n\nYou can use sessions for maintaining the state of\
    \ an HTTP connection over several requests. This is useful whenever you deal with\
    \ user data, because otherwise the J2ME application would need to send authentication\
    \ data in each request. You can use URL rewriting or cookies for keeping track\
    \ of the used session. You can retrieve cookies by cycling through all headers\
    \ of a connection. When you start a new request, you need to set the cookie as\
    \ a request property. Listing 15-11 shows a possible solution for this.\n\n###\
    \ Listing 15-11. Receiving and Setting Cookies\n\n```java\nimport javax.microedition.io.HttpConnection;\n\
    import java.io.IOException;\n\npublic class CookieStore {\n    private String\
    \ cookie;\n\n    public void readCookie( HttpConnection con ) throws IOException\
    \ {\n        this.cookie = con.getHeaderField( \"Set-Cookie\" );\n        if (\
    \ this.cookie == null ) {\n            this.cookie = con.getHeaderField( \"Set-Cookie2\"\
    \ );\n        }\n    }\n\n    public void setCookie( HttpConnection con ) throws\
    \ IOException {\n        if ( this.cookie != null ) {\n            con.setRequestProperty(\
    \ \"Cookie\", this.cookie );\n        }\n    }\n}\n```\n\n## Playing Sounds\n\n\
    Playing sounds and music has become quite easy nowadays thanks to the Mobile Media\
    \ API (MMAPI, JSR 135). In practice you need to be aware of some limitations.\
    \ Specifically, you need to be careful when you want to play several sounds at\
    \ the same time. On many devices this is not possible. The `supports.mixing` system\
    \ property is `true` when the device can play back several sounds simultaneously:\n\
    \n```java\nif ( \"true\".equals( System.getProperty( \"supports.mixing\" ) ) {\n\
    \    ...\n}\n```\n\nLikewise, you can check the preprocessing variable `polish.Property.supports.mixing`\
    \ in your source code:\n\n```java\n//#if polish.Property.supports.mixing == true\n\
    ```\n\nThe safest way is to use only one player at a time and dispose all resources\
    \ when you are done with one sound. Prefetching several sounds at once is also\
    \ not always possible. Listing 15-12 shows you how to play one sound over and\
    \ over again, at least as long as the `playMusic` field is `true`. Please also\
    \ note that the `PlayerListener` uses the `equals()` method for comparing incoming\
    \ events. This works on all devices, whereas using the `==` comparator that is\
    \ used by the JavaDoc documentation of the MMAPI does not work on all devices.\n\
    \n### Listing 15-12. Playing Background Music with the MMAPI\n\n```java\n//#condition\
    \ polish.api.mmapi || polish.midp2\npackage com.apress.multimedia;\n\nimport java.io.IOException;\n\
    import javax.microedition.media.*;\n\npublic class MusicPlayer\n```"
