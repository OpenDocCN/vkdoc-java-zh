    `<filter>` 元素中，你需要指定 `package` 或 `class` 属性以及 `level` 属性。这允许你为特定的类或包分配不同的日志级别。


    `if` 和 `unless`：你可以通过使用 `if` 或 `unless` 属性来完全激活或停用日志框架。`if` 属性指定了在日志应被激活时需要为 `true`
    或 `yes` 的 Ant 属性。`unless` 属性指定了在日志框架应被激活时需要为 `false` 或 `no` 的 Ant 属性。


    当你停用日志时，J2ME Polish 会在应用编译前注释掉所有日志语句，这样你的应用中就不会留下任何日志痕迹。


