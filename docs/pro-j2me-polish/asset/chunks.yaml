    `extends` 语句，这样你的集成开发环境就不会报错说类定义无效。


    **清单 8-19.** *在可用时扩展诺基亚的 FullCanvas* public class SplashScreen


    //#if polish.api.nokia-ui


    //# extends com.nokia.mid.ui.FullCanvas


    //#else


    extends Canvas


    //#endif


    **配置应用程序**


    大多数开发者使用 JAD 文件来存储配置设置，并通过 `MIDlet.getAppProperty ( *String key* )` 来检索这些设置。正如你在第
    7 章中学到的，J2ME Polish 支持使用 `<jad>` 元素来设置 JAD 属性。这种方法的优点是你可以稍后轻松更改设置，但它也有几个关键缺点：


    5033CH08.qxd 6/17/05 12:06 PM Page 120


    **120**


    第 8 章 ■ 预处理


    • 你需要额外的处理时间和代码来在运行时确定配置。


    • 一些设备在安装后会删除 JAD 文件及其所有设置。


    • 恶意用户可以轻易拦截和更改 JAD 文件。


    作为替代方案，你可以使用预处理来配置你的应用程序。在 `build.xml` 文件中使用 `<variable>` 元素指定你的配置设置：


    <variable name="config.BaseUrl" value="http://www.specific.com" /> 现在你可以使用 `#=`
    指令来使用这些变量。最佳实践是在未指定设置时使用默认值。如清单 8-20 所示，你可以通过测试 `[ *变量名*]:defined` 预处理符号来检查变量是否已定义，该符号会自动为所有变量定义。


    **清单 8-20.** *使用预处理配置应用程序*


    //#ifdef config.BaseUrl:defined


    **//#= private static final String BASE_URL = "${config.BaseUrl}";**


    //#else


    private static final String BASE_URL = "http://www.default.com";


    //#endif


    虽然使用预处理来配置应用程序通常比使用 JAD 属性更智能，但它也有一个缺点：使用动态设置更加困难。动态生成 JAD 文件比按需构建整个应用程序更容易。动态设置的一个例子是包含客户的电话号码以便后续识别。你可以结合使用
    J2ME Polish 的两种方法：对常规配置值使用预处理，对频繁更改的设置使用动态 JAD 生成。


    **使用硬编码值**


    使用设备特定的硬编码值是另一个可以通过预处理变量应对的挑战。为什么要这样做？一个原因是这种方法可以规避某些设备问题。例如，一些诺基亚设备在全屏模式下无法报告正确的画布高度，因此你需要使用正确的硬编码值。另一个原因是硬编码值可以加速你的应用程序。


    清单 8-21 演示了当你想要使用可用屏幕宽度的三分之二来显示内容的情况。当你使用硬编码值时，Java 编译器会在编译阶段计算出正确的结果。诚然，这个例子不会显著加速你的应用程序，但它确实演示了原理。请查看设备数据库
    *http://www.j2mepolish.org/devices-overview.html*，以了解更多关于目标设备可用变量的信息。


    5033CH08.qxd 6/17/05 12:06 PM Page 121


    第 8 章 ■ 预处理


    **121**


    **清单 8-21.** *使用预处理进行硬编码变量*


    //#ifdef polish.ScreenWidth:defined


    **//#= final int myMessageWidth = ${polish.ScreenWidth} * 2 / 3;**


    //#else


    final int myMessageWidth = getWidth() * 2 / 3;


    //#endif


