- fmt: "When you store your data inside a `String` instead of an `int[]` array, you\
    \ might be able to save space even if you have to unpackage the single values\
    \ and parse them. Listing 16-13 makes use of the J2ME Polish `de.enough.polish.util.TextUtil`\
    \ helper class to split the `String` that contains the values. In cases when your\
    \ application uses this helper class anyhow, you can minimize the JAR size in\
    \ this way. You need only 22 instructions to unpack and to parse the integer array,\
    \ compared with the 38 instructions you need for the directly specified example\
    \ `int[]` array with 9 elements.\n\n**Listing 16-13.** *Saving Space by Storing\
    \ Array Data in Strings*\n\n```\n// Java source code instructions:\n\nString value\
    \ = \"23,57,23453,2342,232,213,345,56,6767\";\nString[] valueChunks = TextUtil.split(\
    \ value, ',' );\n\nint[] values = new int[ valueChunks.length ];\n\nfor ( int\
    \ i = 0; i < values.length; i++ ) {\n    values[ i ] = Integer.parseInt( valueChunks[\
    \ i ] );\n}\n\n// resulting Java bytecode instructions:\n\nldc1 #75 <String \"\
    23,57,23453,2342,232,213,345,56,6767\">\nastore 4\naload 4\nbipush 44\ninvokestatic\
    \ #81 <Method String[] TextUtil.split( String, char )>\nastore 5\naload 5\narraylength\n\
    newarray int[]\nastore 6\niconst_0\nistore 7\ngoto 208\naload 6\niload 7\naload\
    \ 5\niload 7\naaload\ninvokestatic #87 <Method int Integer.parseInt( String )>\n\
    iastore\niinc 7 1\n```\n\nAnother option to save space while gaining flexibility\
    \ is to store the data outside of the actual classes and load it using a `DataInputStream`.\
    \ You can use the Binary Editor in `${polish.home}/bin` to manage such data files\
    \ comfortably (see Chapter 10). Listing 16-14 shows loading an integer array from\
    \ a resource file. In this example, you assume that the first short value in the\
    \ file includes the length of the following integer array. In this way, you need\
    \ only 22 instructions to load the integer array compared with 38 instructions\
    \ for defining the example `int[]` array directly in the class. Of course, additional\
    \ space is needed for every resource file, so storing each moderately long array\
    \ in an external file will do more harm than good. But as soon as the data gets\
    \ complex, you will almost certainly profit from this approach.\n\n**Listing 16-14.**\
    \ *Loading Array Data from a Resource File*\n\n```\n// Java source-code instructions:\n\
    \nInputStream is = getClass().getResourceAsStream( \"/l1.data\" );\nDataInputStream\
    \ in = new DataInputStream( is );\n\nshort arrayLength = in.readShort();\nint[]\
    \ values = new int[ arrayLength ];\n\nfor ( int i = 0; i < values.length; i++\
    \ ) {\n    values[ i ] = in.readInt();\n}\n\n// resulting Java byte-code instructions:\n\
    \naload_0\ninvokevirtual #97 <Method Class Object.getClass()>\nldc1 #99 <String\
    \ \"/l1.data\">\ninvokevirtual #105 <Method java.io.InputStream Class.getResourceAsStream(String)>\n\
    astore 7\nnew #107 <Class DataInputStream>\ndup\naload 7\ninvokespecial #110 <Method\
    \ void DataInputStream(java.io.InputStream)>\nastore 8\naload 8\ninvokevirtual\
    \ #114 <Method short DataInputStream.readShort()>\nistore 9\niload 9\nnewarray\
    \ int[]\nastore 10\niconst_0\nistore 11\ngoto 310\naload 10\niload 11\naload 8\n\
    invokevirtual #118 <Method int DataInputStream.readInt()>\niastore\niinc 11 1\n\
    ```\n\n## Handling Resources\n\nResources such as images or sound files often\
    \ claim the largest part of your JAR file. In this section, you’ll discover how\
    \ to tackle resources by including only appropriate resources, decreasing the\
    \ size of the resources, reducing the number of resources, and removing resources\
    \ completely.\n\n### Using Appropriate Resources\n\nYou can reduce the JAR file\
    \ size by including appropriate resources only. Use the automatic resource assembling\
    \ capabilities of J2ME Polish for this task.\n\nYou can reduce the size of images\
    \ by using appropriate color palettes. This can also improve the quality of the\
    \ images on devices that support fewer colors than the original images, because\
    \ the dithering algorithms behave differently on various devices. You can include\
    \ different versions of your images for different phones; for example, include\
    \ high-color images only for devices that support the appropriate color depth.\
    \ Useful resource folders are `resources/BitsPerColor.12`, `resources/BitsPerColor.16+`,\
    \ `resources/ScreenSize.128x128`, and `resources/ScreenSize.170+x200+`.\n\nYou\
    \ can also include resources based on several criteria, such as `<fileset dir=\"\
    resources/sounds\" includes=\"*.mid\" if=\"polish.api.mmapi and polish.sound.midi\"\
    \ />`. Please refer to the “Assembling Resources” section of Chapter 7 for a full\
    \ discussion of the resource selection with J2ME Polish.\n\n### Decreasing the\
    \ Size of Resources\n\nResources often contain information that is not needed\
    \ for playing or displaying them, such as copyright notices or comments.\n\nYou\
    \ can optimize PNG images with the tools Pngcrush (`http://pmt.sourceforge.net/pngcrush`),\
    \ PNGOUT (`http://advsys.net/ken/utils.htm#pngout`), and PNGGauntlet (`http://numbera.com/software/pnggauntlet.aspx`).\
    \ These tools remove redundant information and can reduce the image size by several\
    \ percentage points.\n\nRedundant information can be also found in MIDI files.\
    \ Some editors allow you to edit the stored headers. Also, some MIDI events, such\
    \ as the switching of sound banks, are not supported by all J2ME devices, so you\
    \ can remove those from the files.\n\n> **Caution** Sometimes removing redundant\
    \ data *increases* the JAR size, because the ZIP algorithm cannot compress the\
    \ data as efficiently as it could before. Any increase will likely consist of\
    \ only a couple of bytes, but when you are very close to your target size, you\
    \ might need to pay attention to this effect.\n\n### Reducing the Number of Resources\n\
    \nYou can reduce the number of resources by merging them into a single file. This\
    \ can decrease the size effectively when the resources share common capabilities,\
    \ for example, when several PNG files use similar color palettes. In such cases,\
    \ you can create one large image that contains the previous images. Use the `Graphics.setClip()`\
    \ mechanism to draw the images one by one in your application.\n\nWhen you store\
    \ several resources independently into one file, such that the header information\
    \ is repeated for each resource, you will save some space in your JAR file. The\
    \ ZIP algorithm can compress headers more efficient when they are repeated in\
    \ one file, and each file that is stored in the JAR file requires one entry in\
    \ the contents header of your JAR file; fewer entries result in a smaller file\
    \ size.\n\n### Removing Resources\n\nSometimes it is feasible to remove some resources\
    \ completely. You just leave the bare necessities in your JAR file and download\
    \ the rest when it is needed. An example is to include the resources only for\
    \ one level of a game, and then download the resources for further levels when\
    \ the user has finished the first level.\n\n## Obfuscating and Packaging Your\
    \ Application\n\nLast but not least, you can save some space by using obfuscators\
    \ and specialized packagers. Obfuscators shrink your classes by renaming them\
    \ and removing unused code from your application. This is an easy way to save\
    \ substantially. As an added benefit, your code will be harder to understand for\
    \ any malicious or curious users interested in decompiling your application. As\
    \ you learned in the “Obfuscating Applications” section of Chapter 7, you can\
    \ deploy different obfuscators in J2ME Polish—or even several obfuscators at once.\
    \ When your budget is tight, go for the free ProGuard obfuscator, but keep in\
    \ mind that some commercial obfuscators/optimizers can produce even smaller JAR\
    \ file sizes."
