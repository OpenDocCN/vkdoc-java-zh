    **设计 GUI**


    你可以使用 Web 标准层叠样式表（CSS）来设计 J2ME Polish 的 GUI。因此，现在每位网页设计师都可以使用 J2ME Polish 来设计移动应用程序！以下章节将详细解释所有设计可能性；无需具备
    CSS 的预备知识。


    所有设计设置和文件都存储在项目的 *resources* 目录中，除非在 *build.xml* 文件中指定了其他目录。该目录中最重要的文件是 *polish.css*。你可以在其中找到所有设计定义。这些设计定义按*样式*分组。


