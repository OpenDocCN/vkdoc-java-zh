    **Splitting an Image into Single Tiles**


    A `TiledLayer` can be drawn significantly faster when the base image is split
    into single tiles. This optimization needs a bit more memory compared with a basic
    `TiledLayer`. Also the transparency of the tiles is lost when the device does
    not support Nokia’s UI API. You can activate this optimization by setting the
    `polish.TiledLayer.splitImage` preprocessing variable to `true`, as shown in Listing
    11-6.


    **Listing 11-6.** *Activating the Split Image Optimization for the TiledLayer*


    ```

    <variables>

    <variable

    name="polish.TiledLayer.splitImage"

    value="true"

    />

    </variables>

    ```


    **Defining the Grid Type of a TiledLayer**


    Each `TiledLayer` stores the information about the included tiles in an internal
    array called the *grid*. By default, J2ME Polish uses a byte grid that significantly
    decreases the memory footprint, but which limits the number of different tiles
    to 128. You can change the array type from the default byte to `int` or `short`
    by defining the preprocessing variable `polish.TiledLayer.GridType` accordingly.
    Listing 11-7 shows how to change to the `short` type, which allows you to use
    up to 32,767 different tiles—probably enough for even the most demanding mobile
    game.


    **Listing 11-7.** *Supporting Up to 32,767 Different Tiles*


    ```

    <variables>

    <variable

    name="polish.TiledLayer.GridType"

    value="short"

    />

    </variables>

    ```


    **Using the Game Engine for MIDP 2.0 Devices**


    You can use the J2ME Polish implementation for MIDP 2.0 devices as well. You might
    want to do this because some vendor implementations are buggy or have sluggish
    performance. To use the game engine on MIDP 2.0 devices, set the preprocessing
    variable `polish.usePolishGameApi` to `true`, as shown in Listing 11-8.


    **Listing 11-8.** *Using the J2ME Polish Game Engine for a Specific MIDP 2.0 Target
    Device*


    ```

    <variables>

    <variable

    name="polish.usePolishGameApi"

    value="true"

    if="polish.identifier == VendorName/DeviceName"

    />

    </variables>

    ```


    **Working Around the Limitations of the Game Engine**


    You can use any classes of the `javax.microedition.lcdui.game.*` API in your game,
    but you need to be aware of some technical limitations for the game engine:


    - **Pixel-level collision detection:** On MIDP 1.0 platforms, you cannot use the
    pixel-level collision detection for sprites, so you need to set collision rectangles
    instead—preferably tight ones.

    - **Evaluation of user input:** When you extend the `GameCanvas` class, you should
    call the super implementations when you override one of the methods `keyPressed(int)`,
    `keyReleased(int)`, or `keyRepeated(int)`, so that the game engine is informed
    about the events as well. I recommend using the `getKeyStates()` method in the
    main game loop for evaluating the user’s input. This guarantees the best performance
    on both MIDP 2.0 and MIDP 1.0 platforms.

    - **Sprite transformations:** At the time of writing this chapter, you can use
    `Sprite` transformations only for devices that support Nokia’s UI API; otherwise,
    the transformations will be ignored. You can find out whether the current target
    device supports `Sprite` transformations by checking the preprocessing symbol
    `polish.supportSpriteTransformation` like shown in Listing 11-9. When no transformations
    are supported you can just add additional frames that are already transformed
    to your `Sprite` image. Instead of transforming the `Sprite`, you can achieve
    the same effect by setting another frame sequence that points to the transformed
    frames.


    **Listing 11-9.** *Checking Whether the Device Supports Sprite Transformations*


