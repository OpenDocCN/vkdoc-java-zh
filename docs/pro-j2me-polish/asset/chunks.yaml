    **集成设备 API**


    许多设备提供额外的可选 API。一个流行的例子是诺基亚 UI API，它提供了额外的图形和声音功能。当设备支持特定 API 时，会在 `${polish.home}/devices.xml`
    文件中通过该设备的 `JavaPackage` 能力来注明。


    假设您想使用摩托罗拉电话簿 API，您只需将相应的库文件 *phonebook.jar* 或 *phonebook.zip* 复制到 `${polish.home}/import`
    文件夹中。然后，对于支持电话簿 API 的设备，它将自动被使用。


    J2ME Polish 已经提供了大量 API，范围从 MIDP 1.0 到特定于供应商的 API，例如诺基亚 UI API 或西门子扩展 API。


    您可以修改 `${polish.home}/apis.xml` 文件来指定不同的库名称、路径或别名。第 6 章对此进行了更详细的描述。


    ■**警告** 您不能在不支持可选 API 和特定于供应商的 API 的设备上使用它们。因此，如果某个设备不支持无线消息 API，您就不能在为该设备构建的应用程序中使用该
    API。使用预处理和 `polish.api.[api-name]` 预处理符号在您的应用程序中进行必要的调整。


    **混淆应用程序**


    混淆对于 J2ME 应用程序至关重要，不仅因为它使逆向工程更加困难，而且还因为应用程序的大小会减小——在某些情况下会大幅减小。混淆器通常会剥离应用程序未使用的任何类、方法和字段。在下一步中，它们会重命名所有剩余的类。由于此功能，您需要定义不会被混淆的“入口点”。J2ME
    Polish 会自动将所有使用 `<midlet>` 元素定义的 MIDlet 添加到入口点列表中。使用嵌套的 `<keep>` 元素，您可以定义必须保留的其他类，即使它们没有被直接使用。例如，对于所有使用
    `Class.forName( String )` 机制加载的类都是如此。大多数混淆器也接受嵌套的 `<parameter>` 元素提供的额外参数。清单 7-37
    演示了如何使用 ProGuard 混淆器，其中 ProGuard 的字节码优化被停用。


