    case Canvas.KEY_NUM9: return '9';\n```\n\n## Accelerating Loops\n\nLoops can be\
    \ improved in several ways. You can move method calls and calculations outside\
    \ of the loop, use better termination conditions, and unroll loops.\n\nA typical\
    \ loop header is `for ( int i = 0; i < list.size(); i++ )`. A simple yet effective\
    \ improvement is to run the list from top to bottom instead: `for ( int i = list.size();\
    \ --i >= 0; )`. In this case, the `list.size()` call is done only once at the\
    \ start of the loop. You have also improved the termination condition by checking\
    \ against the value 0, which is slightly faster than comparing a variable against\
    \ a different number.\n\nIf you do any calculations inside the loop, check whether\
    \ you can do them outside of the loop as well. The same applies to the creation\
    \ of temporary objects, which not only decreases the available memory, but also\
    \ requires more frequent garbage collection.\n\nA very low-level optimization\
    \ is to unroll loops. To successfully unroll a loop, you need to know the number\
    \ of possible invocations in advance. When your loop is always executed a multiple\
    \ of four times, for example, you can repeat the loop body four times, reducing\
    \ the number of needed jumps and termination checking by a factor of four. Listing\
    \ 16-8 shows an example in which an array that contains either four elements or\
    \ a multiple of four elements is filled with integer values. The `slowFill()`\
    \ method uses a traditional loop, whereas the `fastFill()` method unrolls the\
    \ loop.\n\n**Listing 16-8.** *Accelerating Loops by Unrolling*\n\n```java\npublic\
    \ void slowFill( int[] numbers ) {\n    for ( int i = numbers.length; --i >= 0;\
    \ ) {\n        numbers[ i ] = i;\n    }\n}\n\npublic void fastFill( int[] numbers\
    \ ) {\n    // warning: this will crash if numbers.length != x * 4\n    for ( int\
    \ i = numbers.length; --i >= 0; ) {\n        numbers[ i ] = i;\n        numbers[\
    \ --i ] = i;\n        numbers[ --i ] = i;\n        numbers[ --i ] = i;\n    }\n\
    }\n```\n\n## Setting Default Values of Instance Fields\n\nAll instance fields\
    \ have default values that you don’t need to set again. Primitive numbers such\
    \ as `int`, `long`, and `float` are all 0 by default; `boolean` fields are `false`;\
    \ and objects are `null`. This is a rare example of a low-level optimization that\
    \ you should always apply.\n\n## Using Access Modifiers\n\nMethods and fields\
    \ can have different modifiers that may influence performance. For J2ME applications,\
    \ you can choose one or several of the following modifiers: `synchronized`, `private`,\
    \ `protected`, `public`, `static`, and `final`.\n\nUsing `synchronized` methods\
    \ ensures that only one thread at a time can run through these methods. This is\
    \ costly because a lock needs to be acquired for the method and because only one\
    \ thread can run through it a time. You don’t need synchronization when you have\
    \ stateless objects or when you only read data. When you write data, you can sometimes\
    \ minimize the impact by using a `synchronized` block instead of synchronizing\
    \ the complete method. Also remember that accessing instance fields is atomic,\
    \ so in some cases you might not need synchronization at all.\n\nA popular myth\
    \ is that using `static` fields and methods improves performance greatly. The\
    \ `static` modifier allows the access without instantiating the corresponding\
    \ class. The truth about the performance of the `static` access is, however, that\
    \ it depends on your target platform. The first virtual machines did indeed penalize\
    \ the usage of normal instance fields, while modern HotSpot JVMs access instance\
    \ fields and methods even faster than `static` ones. As always, you should measure\
    \ the performance on your target devices. Using the `static` modifier excessively\
    \ most certainly degrades the architecture of your application and makes subsequent\
    \ changes harder."
