    array for storing its values. In contrast to java.util.Vector, ArrayList does
    not use synchronization and is, therefore, considerably faster. However, since
    the ArrayList is not synchronized, you need to make sure to implement your own
    synchronization when several threads access the ArrayList concurrently.


    You can use all methods of java.util.ArrayList, which is available only for the
    Java 2


    Standard Edition (J2SE).


