    第 9 章


    ■ ■ ■


    日志框架


    **本章内容：**


    • 使用 `#debug` 预处理指令记录日志消息，并通过 `System.out.println()` 打印消息。


    • 在 `#debug` 指令中指定消息的级别（debug、info、warn、error、fatal 或用户自定义）。


    • 通过在 `System.out.println()` 调用中添加异常作为最后一个参数，自动打印堆栈跟踪。


    • 使用 `build.xml` 文件中的 `<debug>` 元素控制日志框架，包括为特定类或包指定不同的日志级别（使用嵌套的 `<filter>` 元素）。


    • 在真实设备上查看记录的日志消息——当记录错误且使用 J2ME Polish GUI 时自动显示，或通过 `de.enough.polish.util.Debug`
    类结合 `polish.debugEnabled` 预处理符号手动查看。


    • 使用日志处理器将日志消息处理并转发给其他实体。


    你使用日志来确定应用程序的内部状态并跟踪错误。然而，在 J2ME 应用程序中记录日志存在一些显著的缺点。日志消息需要空间和运行时资源。因此，日志会降低应用程序速度，并增加不必要的应用程序大小。你可能不希望将日志语句保留在最终构建的应用程序中。此外，你可以使用
    `System.out.println()` 语句在模拟器中查看日志消息，但这些消息在真实设备上是隐藏的。本章介绍 J2ME Polish 的日志框架，以及它如何消除这些缺点。


    借助日志框架，你可以为特定类和包启用不同的日志级别。当你停用日志框架时，应用程序中不会留下任何痕迹，因此不会浪费资源和空间。最后，你可以在真实设备和模拟器上查看记录的日志消息。


    **记录日志消息**


    你可以使用 `#debug` 预处理指令，后跟一个普通的 `System.out.println()` 语句，在应用程序中记录日志消息，如清单 9-1 所示。所有记录的日志消息都会添加到内部日志中，并同时打印到
    `System.out` 流中。


    .


    **123**


    5033CH09.qxd 6/17/05 12:09 PM 第 124 页


    **124**


    第 9 章 ■ 日志框架


    **清单 9-1.** *在应用程序中记录日志*


    public Image getImage( String url ) {


    // 尝试从 Hashtable 缓存中获取图像：


    Image image = (Image) this.cache.get( url );


    if (image == null) {


    try {


    image = Image.createImage( url );


    this.cache.put( url, image );


    **//#debug**


    **System.out.println("已加载图像 [" + url + "]" );**


    } catch (IOException e) {


    **//#debug error**


    **System.out.println("无法加载图像 [" + url + "]" + e );**


    }


    }


    return image;


    }


    在此示例中，成功加载图像后，我们发出一个简单的语句，表明图像已加载。你可以在 `#debug` 指令中指定消息的优先级级别。预定义的级别包括 debug、info、warn、error
    和 fatal。你也可以定义自己的级别。


    清单 9-1 中的第一个 `#debug` 指令未指定日志级别，因此默认使用 debug 级别。catch 分支中的第二个 `#debug` 指令指定了 error
    级别。你可以在 `build.xml` 脚本中为类或包激活特定的日志级别，以过滤掉所有优先级较低的日志消息，如本章后面的“控制日志”部分所述。


    如果你在 `System.out.println()` 调用中添加异常作为最后一个参数，日志框架将自动打印其堆栈跟踪。在清单 9-1 中，捕获了一个 `IOException`，并将其用作日志消息中的最后一个参数：


    System.out.println("无法加载图像 [" + url + "]" + e); 日志框架会识别该参数是一个异常，并在模拟器中随日志消息一起打印异常的堆栈跟踪。


    **异常的堆栈跟踪**


    异常的堆栈跟踪仅在模拟器中可用。遗憾的是，在真实设备上无法获取堆栈跟踪。你可以改用详细调试模式来跟踪故障。通过将 `<debug>` 元素的 `verbose`
    属性设置为 `true` 来激活此模式。


