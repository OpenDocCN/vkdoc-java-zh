    Building Applications


    **In this chapter:**


    • Get an overview of the basic concepts of Ant, on which J2ME Polish is based.


    • Learn about the various build phases, ranging from preprocessing to packaging
    the application.


    • Learn how to build for multiple devices, create localized applications, integrate
    thirdparty libraries, and obfuscate and debug your applications.


    J2ME Polish makes it easy to use one application source code as the base for targeting
    various devices at the same time. This is often necessary because the devices
    may support the MIDP 1.0 or MIDP 2.0 standard, support proprietary APIs such as
    the Nokia UI API, support different sound formats, and so on.


    Building J2ME applications is quite a complex task nowadays. Of course, the application
    needs to be compiled for the correct Java version, preverified, and packaged,
    but usually some other steps are involved as well, such as preprocessing or obfuscating
    the application.


    J2ME Polish’s main focus is to build J2ME applications, so it provides a flexible
    and powerful framework for doing so. In the following section, I will freshen
    up your Ant knowledge first; because J2ME Polish is based on Ant, understanding
    the basic Ant concepts is crucial.


    I will discuss the different build phases subsequently; then you will learn the
    various handles and switches of J2ME Polish. In addition, in this chapter, I will
    discuss typical user scenarios such as building your application for multiple
    devices and for several localizations.


    **Taking an Ant Crash Course**


    Apache Ant describes itself quite modestly as “ . . . a Java-based build tool.
    In theory, it is kind of like Make, but without Make’s wrinkles.”1 If you consider
    the sheer number of available Ant tasks, this is a noble understatement. Ant is
    *the* standard for building Java applications. With it, you can build applications,
    deploy them via FTP or any other network protocol to remote servers, enforce code
    style guides, and much more.


    Ant interprets and executes the file *build.xml* in the current directory by default.
    The basic element of an Ant build file is a *project*, which basically contains
    *targets* and *tasks*. A *target* can be called from outside, for example, from
    the command line. Each target usually **55**


    5033CH07.qxd 6/17/05 11:50 AM Page 56


    **56**


    C H A P T E R 7 ■ B U I L D I N G A P P L I C AT I O N S


    contains one or more task, which is responsible for carrying out the real actions.
    Listing 7-1


    shows a complete example.


    **Listing 7-1.** *A Complete build.xml Example*


    <project name="example" default="hello">


    <target name="hello">


    <echo message="hello world!" />


    </target>


    </project>


    Congratulations—you have created your first Ant script! Now let’s take a closer
    look at it.


    The <project> tag is the top element of the *build.xml* script. The attribute
    default describes which target should be called when no target has been specified
    on the command line. In this example, it points to the hello target. This target
    uses the <echo> task for printing information on the standard output. Figuring
    out what the <echo> task prints on the screen is left as an exercise to the reader.


    When you now call Ant from the command line, you should see similar output to
    that in Listing 7-2.


    **Listing 7-2.** *The Output of Your First Ant Script*


    > ant


    Buildfile: build.xml


    hello:


    [echo] hello world!


    BUILD SUCCESSFUL


    Total time: 3 seconds


    Well done—you have executed your first Ant script! If you are curious about what
    Ant tasks are already available, please refer to the Ant documentation at *http://ant.apache.org/*


    *manual/*. You will also find a list of external tasks such as J2ME Polish at
    *http://ant.apache.org/*


    *external.html*.


    So, what else can you find in *build.xml*? The most important concepts you will
    encounter are *properties*. You can define properties outside a target at the
    beginning of the script or within a target. A property is a constant that can
    be set only once, as demonstrated in Listing 7-3.


    **Listing 7-3.** *Using Ant Properties*


    <project name="example" default="greetuser">


    <target name="robert">


    <property name="user" value="Robert" />


    </target>


    <target name="jinny">


    <property name="user" value="Jinny" />


    </target>


    5033CH07.qxd 6/17/05 11:50 AM Page 57


    C H A P T E R 7 ■ B U I L D I N G A P P L I C AT I O N S


    **57**


    <target name="greetuser">


    <echo message="hello ${user}" />


    </target>


    </project>


    Listing 7-3 provides three targets: robert, jinny, and greetuser. In the greetuser
    target, it uses the property ${user} within the message attribute.


    ■**Note** With J2ME Polish you can use all Ant properties in your source code
    by setting the includeAntProperties and replacePropertiesWithoutDirective attributes
    of the <variables> element to true.


    You can invoke any target just by giving the name of the target as a parameter,
    for example, ant robert greetuser. In this example, the robert target will be
    invoked first. It sets the ${user} property to Robert. Then the greetuser target
    is executed, which will print “hello Robert” in this case. It is easy to imagine
    what happens when you call ant jinny greetuser.


    But what happens when you call ant jinny robert hello? Thanks to the “write-once”
    nature of Ant properties, the printed message will be “hello Jinny” in this case.


    You can define properties on the command line as well using the -D option, which
    is useful for providing a script with passwords. For example:


    ant -Duser=Benny


    This “write-once” capability of Ant properties might be confusing at first, but
    it is really useful for developing in teams where some people might want to use
    different settings. You can load user-specific properties with the file attribute
    of the <property> element, as demonstrated in Listing 7-4.


    **Listing 7-4.** *Loading Ant Properties*


    <project name="example" default="showpaths">


    **<property file="${user.name}-build.properties" />**


    <property name="wtk.home" location="C:\WTK22" />


    <property name="polish.home" location="C:\programs\J2ME-Polish" />


    <target name="showpaths">


    <echo message="wtk.home=${wtk.home}" />


    <echo message="polish.home=${polish.home}" />


    </target>


    </project>


    Listing 7-4 uses the predefined Ant property ${user.name} to determine the name
    of the properties file. So, if your username is “kirk” on your system, you can
    provide the properties file *kirk-build.properties* for defining your own settings.
    The properties file needs to have the common Java properties format, so you separate
    property names and values with the equals character:


