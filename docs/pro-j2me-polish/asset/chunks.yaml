    The Device Database


    **In this chapter:**


    • Learn more about your target devices with the J2ME Polish device database.


    • Get to know the XML format of the files in the device database: *devices.xml*,
    *vendors.xml*, *groups.xml*, *apis.xml*, and *bugs.xml*.


    • Discover how to use the device database to select your target devices, assemble
    device-specific resources, and optimize your applications.


    In this chapter, you will learn about the J2ME Polish device database. This database
    forms the basis of J2ME Polish and is essential for building and preprocessing
    applications. You can use the defined features and capabilities of the devices
    for selecting target devices in the build process and for adjusting your application
    to different handsets with preprocessing. Knowing the structure and uses of the
    device database is crucial for getting the most out of J2ME Polish.


    **Understanding the XML Format**


    The J2ME device database consists of different XML files that reside in the installation
    folder of J2ME Polish by default. The following files are included in the device
    database:


    • *devices.xml*: Describes the capabilities and known issues of many J2ME capable
    devices.


    • *vendors.xml*: Lists all vendors and manufacturers of J2ME devices.


    • *groups.xml*: Describes the device groups. Each device can belong to an arbitrary
    number of groups.


    • *apis.xml*: Lists optional and vendor-specific libraries, such as the Mobile
    Media API (MMAPI).


    • *bugs.xml*: Describes known issues associated with devices.


    ■**Note** From J2ME Polish 1.3 onwards, the *configurations.xml*, *platforms.xml*,
    and *capabilities.xml* files are also included in the device database. In the
    *configurations.xml* file, you can define configurations like CLDC


    1.0 and CLDC 1.1\. Use the *platforms.xml* file for defining profiles like MIDP
    1.0, DoJa 4.0, and WIPI 2.0.


    **39**


    5033CH06.qxd 6/17/05 11:48 AM Page 40


    **40**


    C H A P T E R 6 ■ T H E D E V I C E D ATA B A S E


    All of the files in the device database use a similar XML format and include common
    elements like <features> and <capability>. Features and capabilities can be inherited;
    some are overwritten, and others are supplemented. Here, we’ll look at how to
    define devices, vendors, groups, libraries, and known issues.


    **Defining Devices**


    The *${polish.home}/devices.xml* file specifies the capabilities of most known
    J2ME devices, as well as some virtual devices. The database contains a couple
    of virtual phones that can be used to prepare your application for yet unknown
    devices. Listing 6-1 shows the definition of the Nokia 6600 and the virtual Java
    Technology for the Wireless Industry (JTWI) phones. The database contains a couple
    of virtual phones that can be used to prepare your application for yet unknown
    devices.


