    \ the Space Occupied by a Circle with MicroFloat*\n\n```java\npublic int calculateCircleSpace(\
    \ String radiusStr ) {\n    int radius = MicroFloat.parseFloat( radiusStr );\n\
    \    int result = MicroFloat.mul( MicroFloat.PI,\n        MicroFloat.mul( radius,\
    \ radius ) );\n    return MicroFloat.intValue( result );\n}\n```\n\n### Automatic\
    \ Conversion\n\nYou can also use Enough Software’s Floater tool for automatically\
    \ converting any floating-point calculations. J2ME Polish includes an evaluation\
    \ version of this converter. You can find more information about Floater at *http://www.enough.de/floater*.\n\
    \nWith Floater you can use all functions of the CLDC 1.1 `java.lang.Math` implementation\
    \ along with using `float` and `double` normally. Floater does this by processing\
    \ the bytecode after the compilation phase. The J2ME Polish integration processes\
    \ the bytecode automatically for all CLDC 1.0 target devices. An additional benefit\
    \ is that Floater does not need to use String for converting floating-point values\
    \ in the internal format, so applications processed by Floater are leaner and\
    \ faster compared to a manual conversion on the source code level.\n\nAlso, you\
    \ do not need to distinguish between any internal formats and real integer variables,\
    \ since Floater takes care of this transparently.\n\n## Using Trusted MIDlets\n\
    \nThe possibility of signing J2ME applications has caused a lot of confusion and\
