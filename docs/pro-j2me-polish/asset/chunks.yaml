    **Describing Known Issues**


    You can find typical device issues in the device database as well. Such issues
    are defined using the Bugs capability in the *devices.xml* file. You can refer
    to *${polish.home}/bugs.xml* to get more information about each issue.


    Each issue is described using a <bug> element. The nested element <name> equals
    the value given in the Bugs capability in *devices.xml*. You must not use any
    spaces within the name, and you should use meaningful names in camel notation;
    for example, drawRgbOrigin.


    The <description> element explains the issue in clear English, and the <area>
    element defines which area the bug belongs to; for example, ui, multimedia, or
    rms. The optional <solution> element describes how to circumvent the issue, if
    possible. Listing 6-5 shows an example of the issue database.


    **Listing 6-5.** *Clarifying Device Bugs in bugs.xml*


    <bugs>


    <bug>


    <name>drawRgbOrigin</name>


    <description>The Graphics.drawRGB(..) method does not use a translated origin,
    but starts always at the top-left 0,0 origin.


    </description>


    <area>ui</area>


    <solution>


    Use the top-left 0,0 origin for devices with this bug:


    //#ifdef polish.Bugs.drawRgbOrigin


    x += g.getTranslateX();


    y += g.getTranslateY();


    //#endif


    g.drawRGB( rgbData, offset, scanlength, x, y, width, height, processAlpha);


    </solution>


    </bug>


    <bug>


    <name>ImageIOStreamAutoClose</name>


    <description>The Image.createImage( InputStream in ) should not close the given
    input stream according to the specification. Devices with this bug close the input
    stream.


    </description>


    <area>io</area>


    <solution>Move any image which should be loaded from an input stream to the last
    position in the corresponding stream.


    </solution>


    <bug>


    </bugs>


