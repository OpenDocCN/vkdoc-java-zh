    **Table 12-20.** *Additional Attributes for Items in Exclusive ChoiceGroups* **Attribute**


    **Required**


    **Explanation**


    icon-image


    No


    The URL of the image, for example, icon-image:


    url( icon.png );. The keyword %INDEX% can be used for


    adding the position of the item to the name, for example,


    icon-image: url( icon%INDEX%.png );. The image used for


    the first item will be *icon0.png*, the second item will use the image *icon1.png*,
    and so on.


    icon-image-align


    No


    The position of the image relative to the text. Either top, bottom, left, or right.
    Defaults to left, meaning that the image will be drawn left of the text.


    choice-color


    No


    The color in which the radio box will be painted. Defaults to black.


    radiobox-selected


    No


    The URL of the image for a selected item. Default is a


    simple image drawn in the defined choice color.


    radiobox-plain


    No


    The URL of the image for a not-selected item. Default is a simple image drawn
    in the defined choice color. When


    none is given, no image will be drawn for not-selected


    items. Only the image for selected items will be drawn in


    that case.


    view-type


    No


    The exclusive ChoiceGroup additionally supports the


    exclusive view type that shows only the currently selected item while allowing
    the user to scroll right and left.'
  trans: '

    ChoiceGroup 包含多个选项，用户可以选择其中一个或多个。您可以使用三种类型的 ChoiceGroup：**独占组**（只能选择一个选项）、**多选组**（可以选择多个选项）以及**弹出组**（非激活状态下仅显示当前选中的选项，激活时会“弹出”并显示所有可选选项）。


    5033CH12.qxd 6/20/05 11:31 AM Page 216


    **216**


    第 12 章 ■ 使用 GUI 设计 ChoiceGroup 时，需要区分组本身和其中的实际选项。清单 12-44 演示了如何使用 `#style` 指令和
    `append()` 方法为组和实际选项应用不同的样式。


    **清单 12-44.** *为 ChoiceGroup 及其内嵌选项应用不同样式* public ChoiceGroup createChoiceGroup(
    String label, String[] choices ) {


    //#style exclusiveChoiceGroup


    ChoiceGroup group = new ChoiceGroup( label, Choice.EXCLUSIVE ); for ( int i =
    0; i < choices.length; i++ ) {


    String choice = choices[i];


    //#style exclusiveChoiceItem


    group.append( choice, null );


    }


    return group;


    }


    您可以使用 `focused-style` 属性设置当前聚焦项的样式。如果未指定，则会使用默认的聚焦样式。清单 12-45 演示了如何设置自定义聚焦样式（请参阅下一节）。您还可以设置
    ChoiceGroup 的列数，甚至设置视图类型（view-type），从而允许对组内选项使用动画或其他排列方式。表 12-19 列出了可用的选项。关于 `focused-style`、`view-type`
    和 `columns` 属性的讨论，请参考前面的“设计屏幕”部分。


    **表 12-19.** *ChoiceGroup 的通用属性* **属性**


    **是否必需？**


    **说明**


    columns


    否


    列数。可用于将选项布局成表格形式。默认值为一列。


    columns-width


    否


    可选值为 `normal`、`equal`，或是以逗号分隔的每列宽度列表（例如 `columns-width: 60,60,100;`）。默认值为 `normal`，表示每列使用该列最宽选项所需的空间。`equal`
    值使所有列具有相同宽度。显式指定列宽列表则会使用这些宽度值。


    view-type


    否


    用于此选择组的视图类型。请参考“设计屏幕”部分中关于视图类型的讨论。


    **设计独占 ChoiceGroup**


    独占 ChoiceGroup 类似于网页上的单选按钮：一次只能选择一个选项。您可以使用表 12-20 中列出的几个额外属性。


    5033CH12.qxd 6/20/05 11:31 AM Page 217


    第 12 章 ■ 使用 GUI **217**


    **表 12-20.** *独占 ChoiceGroup 中选项的额外属性* **属性**


    **是否必需**


    **说明**


    icon-image


    否


    图像的 URL，例如 `icon-image: url( icon.png );`。可以使用关键字 `%INDEX%` 将选项的位置添加到名称中，例如 `icon-image:
    url( icon%INDEX%.png );`。第一个选项使用的图像将是 *icon0.png*，第二个选项使用图像 *icon1.png*，以此类推。


