    **98**


    C H A P T E R 7 ■ B U I L D I N G A P P L I C AT I O N S


    </resources>


    **<debug level="error" if="test" />**


    **<obfuscator name="ProGuard" unless="test" />**


    </build>


    **<emulator if="test" />**


    </j2mepolish>


    </target>


    <target name="clean">


    <delete dir="build" />


    <delete dir="dist" />


    </target>


    </project>


    In this example, you have the test target that sets the Ant property test to true
    and sets the working directory to *build/test*. This is recommended because you
    are also enabling the


    <debug> mode. The <j2mepolish> target depends on the <init> target, which sets
    the test property to false and defines another working directory. When the <test>
    target is executed first, these properties cannot be changed by the <init> target
    anymore:


    > ant test j2mepolish


    The elements <deviceRequirements>, <localization>, <debug>, <obfuscator>, and


    <emulator> all depend on the test property. When it is set to true, J2ME Polish
    will compile the application only for the “Nokia/Series60” device, use only the
    English en locale, enable the debug mode, skip the obfuscation, and start the
    emulator after the build. When the test property is false, J2ME Polish compiles
    the application for all MIDP 2.0 devices; uses the en, de, and fr_CA locales;
    disables the debug mode; and obfuscates the application.


    **Using J2ME Polish As a Compiler**


    You can use J2ME Polish as a compiler, in which case only the preprocessing, the
    compilation, and possibly the preverification steps are executed. This can be
    useful for interacting with available J2ME plug-ins such as EclipseME or J2ME-enabled
    IDEs such as NetBeans.


    The compiler mode is activated using the compilerMode-, compilerDestDir-, and
    compilerModePreverify attributes, as shown in Listing 7-40.


    **Listing 7-40.** *Using J2ME Polish As a Compiler*


    <j2mepolish>


    <info


    license="GPL"


    name="Roadrunner"


    vendorName="A reader."


    version="0.0.1"


    jarName="${polish.vendor}-${polish.name}-roadrunner.jar"


    />


    5033CH07.qxd 6/17/05 11:50 AM Page 99


