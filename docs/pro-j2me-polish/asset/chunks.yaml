- fmt: '■**Note** Also, J2ME-compatible platforms exist that are not standardized
    by the Java Community Process, such as the Korean WIPI and Japanese DoJa platforms.
    Chapter 15 discusses these platforms in more detail. From J2ME Polish 1.3 onward,
    you will be able to define additional platforms in the `${polish.home}/platforms.xml`
    file.


    **Optional Packages**


    Many libraries are available that extend the basic functionality of MIDP devices.
    Some libraries are vendor- or carrier-specific; others are standardized by the
    Java Community Process (JCP).


    Most MIDP 1.0 devices contain only vendor-specific API enhancements such as Nokia’s
    UI API, Samsung’s device control classes, and Motorola’s Phonebook API. Some carriers
    such as Vodafone provide additional extensions. For compatibility reasons, these
    libraries continue to exist even in modern devices, but their usage is mostly
    deprecated and superseded either by the MIDP 2.0 profile or by optional packages.


    Many MIDP 2.0 devices support standardized optional APIs, such as the Mobile Media
    API or the Wireless Messaging API. You can use them without locking yourself into
    a specific vendor or carrier. Table 14-3 contains the most popular optional packages,
    and you can find their specifications on the Java Community Process home page
    (`http://www.jcp.org`). If you want to deploy an optional library, refer to J2ME
    Polish’s device database at `http://www.j2mepolish.org/devices/apis.html` for
    getting an idea of how widely your library has been adopted. Also, read the specification
    carefully, since often some parts are optional, such as the OBEX transfer of the
    Bluetooth API.


    You can use preprocessing for detecting whether a library is available for the
    current target device. For each supported API, the symbol `polish.api.[api-name]`
    is defined (for example, `polish.api.mmapi`). You can also use resource assembling
    for including content for only those devices that support a specific library.
    Use, for example, the `resources/mmapi` folder when your application contains
    content that depends on the Mobile Media API. Please refer to Chapters 7 and 8
    for detailed information about these options.


    **Table 14-3.** Optional Packages for MIDP Devices


    | Name | JSR | Stage | Explanation |

    |------|-----|-------|-------------|

    | MMAPI | | Available | The Mobile Media API allows you to play and record sounds,
    images, and videos. |

    | WMAPI 1.1 | | Available | The Wireless Messaging API allows you to send and
    receive text messages (SMS). |

    | WMAPI 2.0 | | Final | The 2.0 version allows you to send and receive multimedia
    messages (MMS). |

    | M3GAPI | | Available | The Mobile 3D Graphics API provides 3D capabilities.
    |

    | SIMPLEAPI | | Early | This extends the JAIN SIP API (JSR 32) to provide instant
    messaging on J2ME devices. |

    | PDAPI | | Available | The PDA optional packages actually define two independent
    APIs: the Personal Information Management (PIM) API allows you to access the address
    book, organizer, and so on; the File Connection (FC) API allows you to read and
    write files that reside outside the application (for example, on a memory card).
    In practice, devices always support either both libraries or none. |

    | SIPAPI | | Final | The Session Initiation API for J2ME extends the Generic Connection
    Framework to allow secure multimedia IP sessions. |

    | LAPI | | Available | The Location API allows you to pinpoint the position of
    the user. |

    | WAAPI | | Available | The Web Services API provides XML-parsing APIs and allows
    you to access web services as a SOAP client. |

    | IMAPI | | Early | Provides a protocol-agnostic way to send and receive instant
    messages. |

    | CHAPI | | Final | The Content Handler API allows applications to register themselves
    as handlers for specific MIME types. |

    | SVGAPI | | Available | The Scalable 2D Vector Graphics API allows you to render
    vector images in the SVG format, a format similar to Macromedia’s proprietary
    Flash format. |

    | PAPI | | Final | The Payment API allows you to initiate microbillings from within
    your application. |

    | DSAPI | | Early | The Data Sync API enables you to access native data synchronization
    implementations. |

    | MIAPI | | Final | The Mobile Internationalization API allows you to use localized
    content in your application. |

    | MTA | | Early | The Mobile Telephony API allows you to initiate and accept voice
    calls, receive network notifications and IDs, and so on. |

    | MSAPI | | Early | The Mobile Sensor API allows you to discover and sample data
    from sensors independent from the underlying transport protocol. |

    | MUICAPI | | Early | The Mobile User Interface Customization API allows you to
    query user interface settings of the device. |

    | AHNAPI | | Early | The Ad Hoc Networking API eases the development of peer-to-peer
    applications. |

    | UMBAAPI | | Early | The Unified Message Box Access API allows you to read, write,
    copy, and move any kind of messages on the device. |

    | MBSAPI | | Early | The Mobile Broadcast Service API for Handheld Terminals allows
    you to receive and interact with broadcast media. |


    **The JTWI Specification and Mobile Service Architecture**


    JSR 185, Java Technology for the Wireless Industry (JTWI), is a combined effort
    of several manufacturers to create a more predictable environment for Java application
    developers. JSR 248, Mobile Service Architecture (MSA), continues the work started
    by JTWI and enhances the definition with new technologies.


    JTWI is based upon the MIDP 2.0 profile and mandates that compatible devices at
    least support the Wireless Messaging API (WMAPI 1.1) and—where applicable but
    optionally—the Mobile Media API (MMAPI 1.1). JTWI also clarifies some parts of
    the CLDC and MIDP specifications that are open to interpretation, including the
    following:


    - Compliant implementations support at least ten parallel threads.

    - The clock resolution for `System.currentTimeMillis()` is 40 milliseconds or
    less.

    - Basic Latin and Latin-1 characters are supported.

    - Custom GMT-compatible time zones are possible.

    - JAR files are supported up to at least 64KB, and JAD files can be at least 5KB.

    - MIDlets can at least occupy 30KB of data in the record management system of
    JTWI-compliant phones.

    - A heap size of at least 256KB is available for the MIDlets.

    - A screen size of at least 125✕125 pixels and a color depth of at least 12 bits
    per pixel (4,096 colors) is required.

    - JPEG and PNG images are supported.

    - HTTP 1.1 needs to be supported for retrieving multimedia content.

    - Devices need to be able to execute MIDlets at specific timings (using the `PushRegistry.registerAlarm()`
    mechanism).

    - Phones need to be able to execute MIDlets upon incoming messages, when this
    has been registered, either by using the JAD attribute `MIDlet-Push-n` or by calling
    `PushRegistry.registerConnection()`.

    - When multimedia functionality is made available through Java libraries, JTWI-compliant
    devices need to expose the functionality through the Mobile Media API.

    - Devices with MMAPI support need to be able to play back at least MIDI and tone-sequence
    files. They also need to allow the capture of JPEG images and WAV audio when the
    device contains the corresponding capabilities.


    The Mobile Service Architecture specification is still in an early phase, but
    minimum requirements of compliant phones will be the CLDC 1.1 configuration and
    the MIDP 2.0 profile.


    You can check whether a device complies with the JTWI standard by testing the
    preprocessing symbol `polish.jtwi`.


    **Supported Formats**'
