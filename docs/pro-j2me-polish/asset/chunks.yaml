    属性，并且未使用背景；所有其他设置保持不变。如果你不想使用某个属性，即使该属性已在父样式中定义，在大多数情况下你可以使用 `attribute-name:
    none` 设置。在清单 12-17 中，通过指定 `background: none`，该样式未使用背景。


    **清单 12-17.** *位于 resources/Nokia/polish.css 中的诺基亚特化样式*


    .myStyle {


    font-color: gray;


    background: none;


    }


    **使用动态、静态和预定义样式**


    J2ME Polish 区分动态样式、静态样式和预定义样式：


    *   *静态*样式在应用程序的源代码中使用 `#style` 预处理指令定义。

    *   *预定义*样式由 J2ME Polish 内部用于某些特定项，例如屏幕标题、菜单栏或 TabbedForm 中的选项卡。

    *   *动态*样式根据项的类型用于项。


