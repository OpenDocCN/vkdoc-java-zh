  trans: "\n当您的应用程序需要访问安全敏感资源（如互联网连接）时，需要对 MIDlet 进行签名。您可以在 MIDlet-Permissions JAD\
    \ 属性中声明所需的权限。在 J2ME Polish 中，您可以使用 `<info>` 元素的 `permissions` 属性来定义必要的权限，例如 `<info\
    \ permissions=\"javax.microedition.io.Connector.http\" [...] />`。同样，您也可以使用 `optionalPermissions`\
    \ 属性来定义可选权限。\n\n权限的可能取值包括 `javax.microedition.ui.Connector.http`、`javax.microedition.ui.Connector.socket`\
    \ 和 `javax.microedition.io.PushRegistry`。\n\n请查阅附录以了解所有可能的权限。\n\n当您想要访问所谓的封闭资源（如底层网络\
    \ API（数据报、套接字、串行））时，通常需要有效的签名；否则，会立即抛出 `SecurityException`。\n\n**签名 MIDlet**\n\
    \n当应用程序被签名后，JAR 文件的 SHA1 哈希值会被计算并添加到 JAD 文件中。用于计算的证书也会被添加到 JAD 文件中。JAR 文件本身不会改变，且之后不得修改。用户会被询问一次是否授予已签名的\
    \ MIDlet 所请求的权限。当必需的权限被拒绝时，安装会中止。当用户拒绝可选权限时，安装会继续进行。在这种情况下，应用程序运行期间会再次询问用户，就像未签名的\
    \ MIDlet 一样。\n\n5033CH15.qxd 6/20/05 9:20 AM 第 318 页\n\n**318**\n\n第 15 章 ■ 在设备限制间周旋\n\
    \n■**注意** 请参阅第 7 章的“签名 MIDlet”部分，了解如何使用 J2ME Polish 自动签名您的应用程序。\n\n**根证书与 Java\
    \ Verified**\n\n您需要一个证书来签名您的应用程序。设备也需要识别并信任所使用的证书；否则，安装会中止。所有设备都为此目的包含了所谓的根证书。\n\
    \n根证书分为三类：\n\n- **供应商证书**用于签名预装的 J2ME 应用程序。此类应用程序享有最高级别的信任，可以访问所有内容。显然，您需要与供应商建立业务关系，才能使用供应商证书进行签名。\n\
    - **运营商**也可以将自己的根证书添加到其手机中。同样，您需要与相应的供应商建立业务关系，才能使用运营商证书签名您的应用程序。\n- **Java Verified/GEO\
    \ Trust 证书**也存在于大多数符合 MIDP 2.0 规范的设备上。\n\nJava Verified（*http://www.javaverified.com*）是一项提供测试和签名服务的倡议。当您的应用程序通过测试并支付了必要费用后，Java\
    \ Verified 会使用 GEO Trust 证书（*http://www.geotrust.com*）对您的应用程序进行签名，然后通过电子邮件返回给您。因此，通常您无法自行签名您的\
    \ MIDlet。如果您因访问封闭资源（如底层网络 API）而依赖有效签名，这会尤其令人烦恼。某些设备可能支持导入新证书，在这种情况下，您可以在开发阶段创建并使用自己的证书。\n\
    \n一种减少所需验证次数的可行策略是将应用程序拆分为应用程序本身及其操作的数据。在这种场景下，应用程序本身保持不变，并在首次运行时下载其操作所需的数据。然而，在现实中，很少有应用程序能够保持不变。\n\
    \n当您的应用程序需要签名时，您应尽量限制目标设备的数量，因为您需要为每个经过测试和签名的应用程序版本付费。您可以使用诸如“Nokia/Series40DP2”或“Generic/midp2”之类的虚拟设备。它们对其各自设备类的功能进行了分组。\n\
    \n**识别设备**\n\n每台设备都有一个全球唯一的识别号码，称为国际移动设备识别码（IMEI）。类似的识别码是国际移动用户识别码（IMSI），它与用户的用户识别模块（SIM）卡绑定。在某些设备上，您可以通过查询系统属性从\
    \ J2ME 应用程序中访问这些值；在其他设备上，您需要运行自己的识别程序。\n\n您可以通过请求 IMSI 系统属性在摩托罗拉设备上访问 IMSI。西门子通过系统属性\
    \ `com.siemens.mp.imei` 提供 IMEI。在索尼\n\n5033CH15.qxd 6/20/05 9:20 AM 第 319 页\n\n\
    第 15 章 ■ 在设备限制间周旋\n\n**319**\n\n爱立信设备上，您需要使用 `com.sonyericsson.imei` 或 `com.sonyericsson.IMEI`。RIM\
    \ 黑莓设备通过调用 `GPRSInfo.getIMEI()` 使 IMEI 可访问。J2ME Polish 设备数据库在 `polish.Property.imei`\
    \ 和 `polish.Property.imsi` 变量中包含了访问这些标识所需的键。\n\n在诺基亚设备上，您无法从 J2ME 应用程序中访问 IMSI\
    \ 或 IMEI。在这种情况下，您需要创建自己的识别解决方案。\n\n通常，用户的手机号码（MSISDN）被用于识别目的。当用户通过您的空中下载（OTA）服务器请求应用程序时，MSISDN\
    \ 可以动态添加到应用程序包中。当用户通过 WAP 访问您的 OTA 服务器时，如果运营商添加了此信息，您可以从 WAP 请求的 HTTP 标头中提取 MSISDN。通常，只有当您与该运营商有业务关系时，运营商才会添加\
    \ MSISDN 标头或类似的识别标头。当然，您也可以要求用户提供其手机号码。一旦您获得了 MSISDN，就可以将其插入用于安装的 JAD 文件中。然后，您可以在应用程序中通过调用\
    \ `MIDlet.getAppProperty( String attributeName )` 来访问该 JAD 属性。JAD 文件可以轻松更改；一个更安全的选项是按需重建应用程序，并将\
    \ MSISDN 作为预处理变量提供。\n\n在支持蓝牙 API 的设备上，您还可以通过调用 `LocalDevice.getLocalDevice().getBluetoothAddress()`\
    \ 将设备的蓝牙地址用作全局唯一标识。\n\n清单 15-17 演示了如何在一个方法中使用不同的识别选项。当预处理变量 `user.msisdn` 被定义时，返回相应的值。然后检查是否可以检索到\
    \ IMEI 或 IMSI。如果这也无法实现，则在支持蓝牙 API 的设备上返回蓝牙地址。最后但同样重要的是，当所有其他方法都失败时，从 MIDlet 中检索应用程序属性\
    \ `user.msisdn`。为了允许您区分识别方法，每个返回的 ID 都以一个标头开头，例如 `msisdn:+4916012345678`。\n\n\
    **清单 15-17.** *检索全局唯一标识 ID*\n\n```java\npublic String getIdentification( MIDlet\
