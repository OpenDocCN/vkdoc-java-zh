    **52**


    C H A P T E R 6 ■ T H E D E V I C E D ATA B A S E


    **Listing 6-9.** *Determining the Canvas Height with the Device Capabilities*


    //#ifdef polish.FullCanvasHeight:defined


    //#= int height = ${ polish.FullCanvasHeight };


    //#else


    int height = getHeight();


    //#endif


    J2ME Polish also defines the symbol polish.[ *capability-name*].[value] for each
    value of a capability. When you have the JavaProtocol capability with the values
    https, socket, for example, both the symbols polish.JavaProtocol.https and polish.JavaProtocol.socket
    are defined and can be checked with //#if and //#ifdef directives.


    The capabilities JavaPlatform, JavaConfiguration, JavaPackage, SoundFormat, and
    VideoFormat also trigger additional preprocessing symbols. Devices that support
    the MIDP 1.0


    platform have the polish.midp1 symbol, and the polish.midp2 symbol is defined
    for all MIDP


    2.0 devices. Similarly, the polish.cldc1.0 symbol is defined for all CLDC 1.0
    devices, and the polish.cldc1.1 symbol is defined for all CLDC 1.1 devices. For
    each supported JavaPackage, the polish.api.[ *api-name*] symbol is defined; for
    example, polish.api.mmapi. Also for each supported SoundFormat, the symbol polish.audio.[
    *format*] is defined. When your device supports MIDI sound, the polish.audio.midi
    symbol is defined. The same is true for all video formats, so you can check whether
    the current target device supports MPEG-4 videos by checking for polish.video.mpeg-4.


    **Changing and Extending the Device Database**


    Thanks to the XML format of the device database, you can read and write these
    files with any text editor. You can make changes globally by editing the device
    database XML file in the installation folder, such as *${polish.home}/custom-devices.xml*,
    but you can also do them locally only for the current project by copying the relevant
    file into the base directory of your project before editing it.


    ■**Note** Consider contributing any of your device database changes to the J2ME
    Polish community, so that everyone can profit from them. If you do not contribute
    these changes, you might need to merge your own version with the official database,
    because the database is updated in every release of J2ME Polish.


    After you have made changes to the database, you might need to make a clean build
    when you are using the changed definitions during the preprocessing step. Just
    call the clean target of the *build.xml* file with Ant or remove the temporary
    *build* folder before starting another build.


    ■**Note** On Windows, you need a decent text editor for reading and writing the
    XML files. The line endings are written in Unix style, so in Notepad, you’ll see
    only one seemingly endless text line. Consider using the Crimson editor ( *http://www.crimsoneditor.com*)
    or any editor in a Java IDE like Eclipse ( *http://www.eclipse.org*).


