    第 12 章 ■ 使用 GUI *外边距*描述了与其他 GUI 项之间的间隙。*内边距*描述了项边框与该项实际内容之间的间隙。


    margin 和 padding 属性定义了左、右、上、下元素的默认间隙。任何 margin 的默认值都是 0 像素，任何 padding 的默认值都是 1
    像素。除了左、右、上、下内边距之外，J2ME Polish 还支持垂直和水平内边距。这些内边距定义了不同内容部分之间的间隙。项的标签与实际内容之间的间隙由水平内边距定义。


    另一个例子是图标，它由图像和文本组成。根据图像的对齐方式，垂直或水平内边距会填充图标图像与图标文本之间的空间。


    在清单 12-24 中，上、右、下外边距为 5 像素，左外边距为 10 像素。


    **清单 12-24.** *定义简单外边距*


    .myStyle {


    margin: 5;


    margin-left: 10;


    font-color: black;


    }


    你也可以使用百分比值。上、下和垂直属性的百分比值相对于显示屏的高度。左、右和水平属性的百分比值相对于显示屏的宽度。清单 12-25 演示了这一点。


    **清单 12-25.** *定义百分比内边距*


    .myStyle {


    padding-left: 2%;


    padding-right: 2%;


    padding-vertical: 1%;


    margin-left: 10;


    font-color: black;


    }


    当设备宽度为 176 像素时，2% 的内边距结果为 3.52 像素，即实际内边距为 3 像素。在显示屏高度为 208 像素时，1% 的垂直内边距结果为 2.08
    像素，即实际内边距为 2 像素。请注意，使用百分比值时，需要定义设备的 ScreenSize 能力。


