    Optimizing Applications


    **In this chapter:**


    • Understand that optimizing is the last step for creating a successful application
    for the resource constrained J2ME world.


    • Learn to optimize in the following three areas: performance, memory consumption,
    and JAR size.


    • Discover that some optimizations improve all areas, while others constitute
    tradeoffs.


    • Plan possible high-level optimizations during the architecture phase but postpone
    low-level optimizations until your application works correctly.


    Since J2ME devices are resource constrained, you need to optimize your application
    for execution speed, memory consumption, and JAR file size. In this chapter, you’ll
    learn tips and tricks for getting the very best out of your application.


    **Optimization Overview**


    Optimizing your application is not a trivial task. As discussed in this section,
    you need to consider unintentional side effects, different levels of optimizations,
    and how you want to structure your efforts.


    One unintentional side effect of optimization is increased usage of heap memory
    when optimizing for performance. For example, painting different parts of an image
    using the Graphics.setClip() method is quite slow compared to splitting the image
    into the different parts and painting each part directly. But the splitting process
    requires additional heap memory—at least double the original memory required for
    the base image.


    Also, low-level optimizations often decrease the readability and maintainability
    of your source code. Modulo operations can be implemented using the & operator,
    when the argument is a power of two; for example, int round = i % 8; can be rewritten
    as int round = i & 7;.


    Whereas the first term is easy to understand, the second one is not so obvious.
    You can also change the argument 8 in the first term to any number without changing
    the logic of the program. In contrast, you can use only numbers that are one less
    than a power of two (x2 – 1) in the second term.


