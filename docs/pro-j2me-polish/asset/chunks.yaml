    再次提醒，开发机器上的内存消耗可能与实际设备上的不同。对于某些操作系统，你可以使用原生应用程序来控制 MIDlet 运行时的内存。在 Symbian 设备上，你可以使用
    TaskSpy（*http://*）


    ![图 60](img/index-364_1.jpg)


    5033CH16.qxd 6/17/05 12:17 PM 第 342 页


    **342**


    第 16 章 ■ 优化应用程序


    **图 16-2.** *使用 WTK 模拟器测量内存占用* 你也可以在应用程序中使用 `Runtime.freeMemory()` 和 `Runtime.totalMemory()`，但这些值取决于虚拟机的内存策略。使用返回值之间的差值来检测近似使用的内存：`long
    usedMemory = runtime.totalMemory() - runtime.freeMemory()`。


    **改善内存占用**


    你可以通过几种方式改善内存占用：减少对象数量和使用递归。同时，还应采取预防措施，防止意外产生内存泄漏。


    减少对象数量


    每个创建的对象都会减少可用内存，因此你应该致力于减少应用程序中所需对象的数量。这难道不简单吗？


    一种策略是重用现有对象。然而，重用对象可能会引入新问题，例如即使缓存的对象不再需要，它们仍会保留在内存中。因此，在广泛采用此策略之前，请仔细考虑其影响。


    另一种策略涉及减少临时对象的数量。这些对象通常在循环中创建；字符串操作就是一个典型的例子。字符串是不可变的，因此每次更改都需要实例化一个新的字符串。例如，考虑创建一个包含连续数字范围（如
    01234）的字符串。当你需要连接多个字符串时，通常最好使用 `StringBuffer` 而不是 `+` 运算符。清单 16-11 展示了创建包含此类数字的字符串的一个糟糕示例和一个良好示例。


    5033CH16.qxd 6/17/05 12:17 PM 第 343 页


    第 16 章 ■ 优化应用程序


    **343**


    **清单 16-11.** *通过使用 StringBuffer 代替 String 来减少临时对象数量* `public String getSlowNumberString(
    int top ) {


    String number = "";


    for ( int i = 0; i <= top; i++ ) {


    number += i;


    }


    return number;


    }


    public String getFastNumberString( int top ) {


    // 我们假设 top 小于 10：


    StringBuffer number = new StringBuffer( top );


    for ( int i = 0; i <= top; i++ ) {


    number.append( i );


    }


    return number.toString();


    }`


    另一个容易创建不必要字符串的地方是 `Graphics.drawString()` 方法。当你在 `paint()` 方法中调用 `g.drawString(
    "Points: " + this.points, x, y, Graphics.TOP | Graphics.LEFT )` 时，每次调用该方法都会创建一个新的临时字符串对象。更好的做法是仅在分数实际发生变化时才创建包含分数的字符串。


    在某些情况下，将对象的创建推迟到真正需要时是值得的。这种所谓的**延迟初始化**有助于减少内存使用，但也会使应用程序逻辑复杂化，因此请谨慎使用此策略。


    使用递归


    使用递归方法可以产生美观且易于理解的算法，但不幸的是，它会带来内存和性能开销。这是因为每次调用方法时，参数和状态都需要被压入虚拟机的栈中。在大多数情况下，你可以使用等效的迭代算法来代替。


    避免内存泄漏


    在 Java 中，如果不取消对未使用对象的引用，可能会产生不希望的内存泄漏。当使用诸如 `Vector` 或 `Hashtable` 之类的容器来存储对象时，尤其容易发生这种情况。


    为避免产生泄漏，在使用容器时，应始终尝试猜测并设置合适的大小，这样内部数组就不需要扩容。扩容内部数组通常涉及将所有元素从旧数组复制到新数组，因此不仅耗时，还会增加内存使用。当不再需要容器中的元素时，不要忘记将其移除。你还应该考虑尽早通过显式地将变量设置为
    `null` 来取消引用。这有助于垃圾回收器判断哪些对象不再被使用且不可达。


    5033CH16.qxd 6/17/05 12:17 PM 第 344 页


    **344**


    第 16 章 ■ 优化应用程序


    有时设备具有不同类型的内存。例如，旧的索尼爱立信设备（如 T610）区分了普通的 Java 堆、原生 UI 堆和视频 RAM。图像被加载到视频 RAM 中，后者提供更快的访问速度，但与
    Java 堆相比也更为有限。从视频 RAM 中回收图像垃圾与从普通 Java 堆内存中回收不同，因此你应该首先尝试加载那些始终会被使用的图像。


    当你频繁调用 `toString()` 时，使用大型 `StringBuffer` 也可能带来问题。检索到的字符串会使用 `StringBuffer` 的完整内部数组，因此当你稍后更改缓冲区时，可能需要将内部数组复制到一个新的数组中。在这些情况下，最终你会拥有与在
    `StringBuffer` 上调用 `toString()` 次数一样多的完整内部数组。


    许多可选 API 使用原生调用来完成其工作。由于设备缺陷，这可能会很困难，因此在使用蓝牙连接、播放音乐或查看三维图形时要格外小心。请务必研究目标设备在内存处理方面的已知问题。


    **减小 JAR 文件的大小**


    最小化 JAR 文件的大小不仅可以改善下载时间，而且通常是满足目标设备限制所必需的。例如，诺基亚 Series 40 基于 MIDP 1.0 的设备只接受最大
    64KB 的 JAR 文件。


    在本节中，你将学习如何通过简化类模型、减小资源大小、完全移除资源以及使用第三方打包器和混淆器来减小 JAR 包的大小。


    **改进类模型**


    你可以通过最小化应用程序中类和接口的数量来改进类模型。你可以通过将相似功能分组以及移除不必要的类来实现这一点，如下面各节所述。


    功能分组


    每个类都会给 JAR 文件增加开销，因为它需要在 JAR 文件中增加一个条目以及一些 Java 特定的数据（如类常量）。功能分组允许你将所需类的数量最小化。


    一个很好的例子是仅在一个类中实现 `CommandListener`。通常，提供能够自主处理其命令和事件的专用屏幕似乎更容易。然而，这破坏了模型-视图-控制原则，因为视图（屏幕）也提供了控制（`CommandListener`）。当你仅在一个控制器类（如主
    MIDlet）中处理事件时，你会同时获得几个优势：


    • 你将控制与视图解耦。


    • 你只实现一次 `CommandListener` 接口，从而节省宝贵的空间。


    • 通常，你可以完全移除专用类，因为在许多情况下，使用和填充标准表单、列表等就足够了。


    5033CH16.qxd 6/17/05 12:17 PM 第 345 页


    第 16 章 ■ 优化应用程序


    **345**


    注意寻找一对一类关系，即那些仅被另一个类使用的类。通常，你可以合并这些类的功能，而不会危及你的架构。


    ■**注意** 过多的分组会严重降低应用程序的可维护性和可扩展性。'
- fmt: '# 移除不必要的类和方法


    有时你可以完全移除类或方法。这对于冗余抽象和一些辅助类来说通常是可行的。


    例如，许多开发者倾向于在MIDlet中抽象事件处理。虽然抽象事件处理对于J2SE和J2EE应用程序来说可能是个好主意，但对于J2ME应用程序来说通常是冗余的。最终，这种事件处理抽象会以某种方式镜像`javax.microedition.lcdui.CommandListener`接口的行为。避免提供与MIDP标准类似功能的抽象。


    辅助类对于简化复杂交互很有用，但随着时间的推移，它们往往会变得臃肿，并镜像底层功能的相同功能。


    一个典型的例子是用于MMAPI音频播放的辅助类。起初，辅助类比复杂的MMAPI本身更容易处理。但随着时间的推移，你会遇到需要特殊处理的情况，因此你向辅助类添加功能。需要反馈系统？添加一个新的事件处理接口。需要处理不同的音频源？添加额外的构造函数。你最终会在辅助类中重新实现大部分MMAPI功能。这对你自己来说可能更容易处理，但当其他程序员需要修改你的代码时会发生什么？始终批判性地评估对辅助类的需求。


    如果你的辅助类仅仅是为了降低其他API的复杂性，请尝试摆脱它们。


    此外，不必要的辅助方法也经常出现。例如，一个`Form`提供了一些用于向其中添加特殊项的方法，比如`public void addChoiceGroup(
    String label, String[] elements )`。这似乎比创建一个新的`ChoiceGroup`并将其添加到`Form`中更容易。但迟早，你也会发现自己添加了`addMultipleChoiceGroup()`和`addPopupChoiceGroup()`辅助方法。在大多数情况下，这种努力并不值得。如果任何东西看起来像是代码重复，请尝试摆脱它。


    # 存储数组数据


    类文件内部的长数组定义会占用大量空间，因为Java的字节码无法直接存储数组数据。相反，每个数组元素首先被压入栈，然后存储在正确的数组位置，如清单16-12所示。首先，虚拟机被指示使用`newarray`指令分配一个新数组。对于每个元素，数组位置随后被压入栈，例如，对于第一个元素使用`iconst_0`（压入整数常量0），或者对于第七个元素使用`bipush
    6`（压入1字节有符号整数）。


    然后，数组元素的实际值通过`bipush`（1字节整数值）、`sipush`（2字节整数值）或`ldc`（从常量池加载值）压入栈。最后，元素通过`iastore`存储在分配的数组中。


    **清单16-12.** *存储简单整数数组的字节码指令*


    ```java

    // Java source-code instruction:

    int[] values = new int[]{ 23, 57, 23453, 2342, 232, 213, 345, 56, 6767 };


    // Resulting bytecode instructions:

    bipush 9

    newarray int[]

    dup

    iconst_0

    bipush 23

    iastore

    dup

    iconst_1

    bipush 57

    iastore

    dup

    iconst_2

    sipush 23453

    iastore

    dup

    iconst_3

    sipush 2342

    iastore

    dup

    iconst_4

    sipush 232

    iastore

    dup

    iconst_5

    sipush 213

    iastore

    dup

    bipush 6

    sipush 345

    iastore

    dup

    bipush 7

    bipush 56

    iastore

    dup

    bipush 8

    sipush 6767

    iastore

    ```


    数组通常用于存储配置值，例如游戏中的关卡设置。与其使用需要长字节码指令链的数组，你可以使用其他变量或将数据存储在类外部。'
  raw: 'Also, some devices enforce a maximum size for classes. On Siemens devices,
    a class must not exceed 16KB, for example.


    Removing Unnecessary Classes and Methods


    Sometimes you can remove classes or methods altogether. This is often true for
    redundant abstraction and for some helper classes.


    Somehow, many developers tend to abstract the event handling in MIDlets, for example.


    While abstracting the event handling might be good idea for J2SE and J2EE applications,
    it is usually redundant for J2ME applications. In the end, such event handling
    abstractions mirror the behavior of the javax.microedition.lcdui.CommandListener
    interface in one way or another. Avoid abstractions that provide functions similar
    to the ones offered by the MIDP


    standard.


    Helper classes are great for easing complex interactions, but over time they tend
    to bloat and mirror the same functionality as the underlying ones.


    A typical example is a helper class for the MMAPI audio playback. At first the
    helper classes are much easier to handle than the complex MMAPI itself. But over
    time, you encounter cases that need special treatment, so you add functionality
    to your helper class. Need a feedback system? Add a new interface for event handling.
    Need to handle different audio sources? Add additional constructors. You will
    end up reimplementing most of the MMAPI functionality in your helper class. This
    might be easier to handle for yourself, but what happens when another programmer
    needs to change your code? Always assess the need for helper classes critically.


    If your helper classes are merely there to reduce the complexity of other APIs,
    try to get rid of them.


    In addition, unnecessary helper methods are often seen in the wild. Take, for
    example, a Form that provides some methods for adding special items to it, such
    as public void addChoiceGroup( String label, String[] elements ). This might seem
    to be easier than creating a new ChoiceGroup and adding it to the Form. But sooner
    or later, you will find yourself adding the helper methods addMultipleChoiceGroup()
    and addPopupChoiceGroup(), too. In most cases, the effort is not really worth
    it. If anything looks like a duplication of code, try to get rid of it.


    Storing Array Data


    Long array definitions inside class files take up considerable space, because
    Java’s bytecode cannot store array data directly. Instead, each array element
    is first pushed on the stack and then stored at the correct array position, as
    shown in Listing 16-12\. At first, the virtual machine is instructed to allocate
    a new array with the newarray instruction. For each element, the array position
    is then pushed on the stack, for example, with iconst_0 (push the integer constant
    0) for the first element, or with bipush 6 (push a 1-byte signed integer) for
    the seventh element.


    5033CH16.qxd 6/17/05 12:17 PM Page 346


    **346**


    C H A P T E R 1 6 ■ O P T I M I Z I N G A P P L I C AT I O N S


    Then the actual value of the array element is pushed on the stack with either
    bipush (1-byte integer values), sipush (2-byte integer values), or ldc (load value
    from the constant pool).


    Finally, the element is stored inside the allocated array with iastore.


    **Listing 16-12.** *Bytecode Instruction for Storing a Simple Integer Array*


    // Java source-code instruction:


    int[] values = new int[]{ 23, 57, 23453, 2342, 232, 213, 345, 56, 6767 };


    // Resulting bytecode instructions:


    bipush 9


    newarray int[]


    dup


    iconst_0


    bipush 23


    iastore


    dup


    iconst_1


    bipush 57


    iastore


    dup


    iconst_2


    sipush 23453


    iastore


    dup


    iconst_3


    sipush 2342


    iastore


    dup


    iconst_4


    sipush 232


    iastore


    dup


    iconst_5


    sipush 213


    iastore


    dup


    bipush 6


    sipush 345


    iastore


    dup


    bipush 7


    bipush 56


    iastore


    dup


    bipush 8


    sipush 6767


    iastore


    5033CH16.qxd 6/17/05 12:17 PM Page 347


    C H A P T E R 1 6 ■ O P T I M I Z I N G A P P L I C AT I O N S


    **347**


    Arrays are often used to store configuration values such as the setup of levels
    in games.


    Instead of using arrays that need long chains of bytecode instructions, you can
    either use other variables or store the data outside of your classes.'
