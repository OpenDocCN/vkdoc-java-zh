    ## Registering Extensions for Several Projects


    When you want to use your extension in more than one project, you can register
    the extension in `${polish.home}/custom-extensions.xml`. Listing 13-4 registers
    the `FullScreenPreprocessor` extension under the name `fullscreen`.


    **Listing 13-4.** *Registering an Extension in `${polish.home}/custom-extensions.xml`*


    ```

    <extension>

    <type>preprocessor</type>

    <name>fullscreen</name>

    <class>com.apress.preprocess.FullScreenPreprocessor</class>

    <classpath>../apress-preprocessor/bin/classes:

    ${polish.home}/import/apress.jar</classpath>

    </extension>

    ```


    The `<type>` element depends on the kind of extension; examples include `preprocessor`,
    `propertyfunction`, `packager`, and `finalizer`. You also need to provide the
    `<class>` element and usually the `<classpath>` element as well, unless your extensions
    are on the classpath of your system anyway. Note that you can use several classpaths
    when you separate them with colons (`:`) or semicolons (`;`). In Listing 13-4,
    J2ME Polish tries to load the `FullScreenPreprocessor` class from the `../apress-preprocessor/bin/classes`
    directory first, before using the `${polish.home}/import/apress.jar` file. In
    this way, you will always use the latest version on your development system, while
    coworkers can use the same `custom-extensions.xml` file when they have the `apress.jar`
    file in `${polish.home}/import`. Last but not least, you need to set a `<name>`
    element, which has to be unique for the type of extension.


    Listing 13-5 uses the registered extension in the `build.xml` script. Instead
    of defining the `class` and `classpath` attributes, you simply need to provide
    the `name` attribute.


    **Listing 13-5.** *Using a Registered Extension in `build.xml`*


    ```

    <preprocessor name="fullscreen" >

    <parameter name="logfile" value="log.txt" />

    </preprocessor>

    ```


    ## Using Extensions Conditionally


    You can implement extensions conditionally by using the `if` and `unless` attributes
    of the extension in your `build.xml` script. You can use any Ant properties or
    preprocessing terms in these attributes, as demonstrated in Listing 13-6. The
    code uses the `fullscreen` preprocessor only when the current target device has
    a known native fullscreen class.


