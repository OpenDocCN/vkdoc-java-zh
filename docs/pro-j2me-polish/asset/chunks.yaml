    **STACK TRACES OF EXCEPTIONS**


    Stack traces of exceptions are available only in emulators. In real devices, sadly,
    stack traces are not available. You can use the verbose debugging mode instead
    for tracking malfunctions. You activate this mode by setting the verbose attribute
