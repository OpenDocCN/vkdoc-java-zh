- fmt: "# Designing the Background of the Screen\n\nDesigning the background of the\
    \ screen is easy: just choose one of the available backgrounds and apply it to\
    \ the screen style. A popular option is to use an image as the background. Since\
    \ the background is always painted from the very top to the very bottom of the\
    \ screen (regardless of whether there is a title or a commands menu present),\
    \ you need to take this into account.\n\nFigure 12-10 shows the used background\
    \ image, and Figure 12-11 shows the background in action in a `List` screen. You\
    \ can even use animated backgrounds like the “pulsating-circles” background.\n\
    \n**Figure 12-10.** *The background image used for a screen*\n\n![Image 33](index-222_1.jpg)\n\
    \n5033CH12.qxd 6/20/05 11:31 AM Page 200\n\n**200** C H A P T E R 1 2 ■ W O R\
    \ K I N G W I T H T H E G U I\n\n**Figure 12-11.** *The background within a List\
    \ screen*\n\n# Designing Titles\n\nWhen you have activated the full-screen mode\
    \ for your application, you need to design the title of your screen. In the title\
    \ you can use all the common design attributes such as font and background settings.\
    \ If you like, you can even use animated backgrounds for the title. You can move\
    \ the title by setting the margins; refer to the forthcoming “Designing Lists”\
    \ section for an example where the title is moved to a lower place.\n\n# Designing\
    \ the Menu Bar and the Menu\n\nMenu bars contain the commands of the screen. You\
    \ can design the menu along with the menu bar when you have activated the full-screen\
    \ mode for your application. J2ME Polish lets you choose between the standard\
    \ menu bar and the extended menu bar. In contrast to the usual one, the extended\
    \ menu bar allows you to design some additional details but requires about 2KB\
    \ more JAR space.\n\n## Designing the Menu\n\nWhen several commands are available,\
    \ they will be grouped together into the `Options` menu. When you now press the\
    \ left soft button, the menu will open.\n\nYou can design the opened menu with\
    \ the `menu` style, whereas you design the items contained in the menu with the\
    \ `menuitem` style by default—or with the `menu` style, in case you haven’t defined\
    \ the `menuitem` style at all.\n\nYou can design the currently focused element\
    \ inside the opened menu with the `focused` style. Since the `focused` style is\
    \ used for all focused elements anywhere by default, you might want to use a different\
    \ style. You can do this by setting the `focused-style` attribute in the `menu`\
    \ style.\n\nListing 12-32 illustrates how to use all these concepts.\n\n**Listing\
    \ 12-32.** *Designing the Menu*\n\n```\nmenu {\n    margin-left: 2;\n    padding:\
    \ 2;\n    background {\n        type: round-rect;\n        color: highlightedBackgroundColor;\n\
    \        border-width: 2;\n        border-color: backgroundColor;\n    }\n   \
    \ font-style: bold;\n    font-color: highlightedFontColor;\n    focused-style:\
    \ .menuFocused;\n    menubar-color: backgroundColor;\n}\n\nmenuItem {\n    margin-top:\
    \ 2;\n    padding: 2;\n    padding-left: 5;\n    font {\n        color: black;\n\
    \        size: medium;\n        style: bold;\n    }\n    layout: left;\n}\n\n\
    .menuFocused extends .menuItem {\n    background-color: backgroundColor;\n   \
    \ font-color: highlightedFontColor;\n    layout: left | horizontal-expand;\n \
    \   after: url( dot.png );\n}\n```\n\nFigure 12-12 shows you the opened menu of\
    \ the application in action.\n\nYou can also change the names of the `Options`,\
    \ `Select`, and `Cancel` commands, as explained in the “Building Localized Applications”\
    \ section of Chapter 7.\n\n**Figure 12-12.** *The opened menu in action*\n\n5033CH12.qxd\
    \ 6/20/05 11:31 AM Page 202\n\n**202** C H A P T E R 1 2 ■ W O R K I N G W I T\
    \ H T H E G U I\n\n## Designing the Normal Menu Bar\n\nYou can design the normal\
    \ bar using the predefined `menu` style. The font settings in this style render\
    \ the actual commands, and the CSS attribute `menubar-color` defines the color\
    \ of the menu bar. The color can have any setting including `transparent`, which\
    \ is useful when the background of the corresponding screen should be shown instead\
    \ of the menu bar. The `menubar-color` defaults to `white`, by the way. When this\
    \ attribute is also defined in a screen style, it will override the setting in\
    \ the `menu` style for the corresponding screen. Listing 12-33 shows you how you\
    \ can use `black` for the normal screens while using a transparent menu bar for\
    \ the screen with the `.mainScreen` style.\n\n**Listing 12-33.** *Using Different\
    \ Colors for the Menu Bar*\n\n```\nmenu {\n    margin-left: 2;\n    padding: 2;\n\
    \    background {\n        type: round-rect;\n        color: highlightedBackgroundColor;\n\
    \        border-width: 2;\n        border-color: bgColor;\n    }\n    font-style:\
    \ bold;\n    focused-style: .menuFocused;\n    font-color: highlightedFontColor;\n\
    \    menubar-color: black;\n}\n\n.mainScreen {\n    background-image: url( bg.png\
    \ );\n    /* use a transparent menubar for screens with this style,\n       so\
    \ that the bg.png image is shown in the menubar as well: */\n    menubar-color:\
    \ transparent;\n}\n```\n\nFigure 12-13 shows the main screen with the transparent\
    \ menu bar on the left and another screen with the default black menu bar on the\
    \ right.\n\n## Designing the Extended Menu Bar\n\nYou can use the extended menu\
    \ bar in cases when the design possibilities of the normal menu bar are not sufficient\
    \ for you. In contrast to the normal menu bar, the extended menu bar is a full-blown\
    \ item and can, therefore, be designed just like any other item. The price for\
    \ using the extended menu bar is to have an additional 2KB classfile in your JAR.\n\
    \n![Image 35](index-225_1.jpg)\n\n5033CH12.qxd 6/20/05 11:31 AM Page 203\n\n**203**\
    \ C H A P T E R 1 2 ■ W O R K I N G W I T H T H E G U I\n\n**Figure 12-13.** *The\
    \ transparent menu bar (left) on the main screen and the black menu bar (right)\
    \ on another screen*\n\nFor using the extended menu bar instead of the normal\
    \ one, you need to set the `polish.MenuBar.useExtendedMenuBar` preprocessing variable\
    \ to `true` in the `<variables>` section of the `build.xml` file, as shown in\
    \ Listing 12-34.\n\n**Listing 12-34.** *Activating the Extended Menu Bar*\n\n\
    ```\n<j2mepolish>\n    <info\n        license=\"GPL\"\n        name=\"Roadrunner\"\
    \n        vendorName=\"A reader.\"\n        version=\"0.0.1\"\n        jarName=\"\
    ${polish.vendor}-${polish.name}-roadrunner.jar\"\n    />\n    <deviceRequirements>\n\
    \        <requirement name=\"Identifier\" value=\"Generic/midp1\" />\n    </deviceRequirements>\n\
    \    <build\n        usePolishGui=\"true\"\n    >\n        <midlet class=\"com.apress.roadrunner.Roadrunner\"\
    \ />\n        <variables>\n            <!-- activate the GUI for Series 60 devices\
    \ -->\n            <variable\n                name=\"polish.MenuBar.useExtendedMenuBar\"\
    \n                value=\"true\" />\n        </variables>\n    </build>\n    <emulator\
    \ />\n</j2mepolish>\n```\n\n5033CH12.qxd 6/20/05 11:31 AM Page 204\n\n**204**\
    \ C H A P T E R 1 2 ■ W O R K I N G W I T H T H E G U I\n\nYou can design the\
    \ extended menu bar with the predefined styles `menubar`, `leftcommand`, and `rightcommand`,\
    \ as shown in Table 12-12. Table 12-13 lists the additional attributes supported\
    \ by the `menubar` style.\n\n**Table 12-12.** *Predefined Styles for the Extended\
    \ Menu Bar*\n\n| Style | Description |\n|-------|-------------|\n| `menubar` |\
    \ Designs the menu bar itself. |\n| `leftcommand` | Designs the left command (`Options`,\
    \ `Select`, and user-defined commands). Accepts all attributes of the `IconItem`.\
    \ |\n| `rightcommand` | Designs the right command (`Cancel` and user-defined `Command.BACK`\
    \ or `CANCEL` commands). Accepts all attributes of the `IconItem`. |\n\n**Table\
    \ 12-13.** *Additional Attributes of the `menubar` Style*\n\n| Attribute | Required?\
    \ | Description |\n|-----------|-----------|-------------|\n| `menubar-options-image`\
    \ | No | Defines the image’s URL for the `Options` image of the extended menu\
    \ bar. |\n| `menubar-select-image` | No | Defines the image’s URL for the `Select`\
    \ image of the extended menu bar. |\n| `menubar-cancel-image` | No | Defines the\
    \ image’s URL for the `Cancel` image of the extended menu bar. |\n| `menubar-show-image-and-text`\
    \ | No | Determines whether the text should be shown as well in the menu bar when\
    \ an image has been defined for the corresponding action. Defaults to `false`.\
    \ |"
