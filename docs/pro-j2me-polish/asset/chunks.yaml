    Image image = (Image) this.cache.get( url );


    if (image == null) {


    try {


    image = Image.createImage( url );


    this.cache.put( url, image );


    **//#debug**


    **System.out.println("Loaded image [" + url + "]" );**


    } catch (IOException e) {


    **//#debug error**


    **System.out.println("Unable to load image [" + url + "]" + e );**


    }


    }


    return image;


    }


    In this example, after successfully loading an image, we issue a simple statement
    that the image was loaded. You can specify the priority level of your message
    in the #debug directive.


    Predefined levels are debug, info, warn, error, and fatal. You can also define
    your own levels.


    The first #debug directive in Listing 9-1 does not specify a log level, so the
    debug level is used by default. The second #debug directive within the catch branch
    specifies the error level. You can activate specific log levels for classes or
    packages in your *build.xml* script, to filter out all log messages that have
    a lower priority, as explained in the “Controlling the Logging” section later
    in this chapter.


    If you add an exception as the last parameter in the System.out.println() call,
    the logging framework will print its stack trace automatically. In Listing 9-1,
    an IOException is caught and used as the last parameter in the logged message:


    System.out.println("Unable to load image [" + url + "]" + e); The logging framework
    recognizes that the parameter is an exception, and the stack trace of the exception
