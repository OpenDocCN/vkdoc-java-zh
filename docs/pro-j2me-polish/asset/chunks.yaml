  raw: 'The final modifier prevents subclasses from overriding a method and allows
    you to set a variable only once. This eases the interpretation and optimization
    of the inheritance structure and simplifies the access of field values for the
    compiler and the virtual machine, thus increasing performance.


    A special issue are static final constants. These are directly embedded by the
    compiler.


    Simple calculations such as Graphics.TOP | Graphics.LEFT are also done during
    the compilation phase, so using constants is a good thing.


    Much faster than static and instance fields are local variables. Local variables
    are stored on the stack of the virtual machine, whereas other variables are stored
    in the heap memory.


    The JVM is a stack-based machine, so accessing data from the stack is faster than
    reading from and writing data to the heap.


    When you use the public access modifier for fields, you can access them directly
    from within other classes instead of using getter and setter methods. This is
    again only faster on old KVM devices, whereas the differences are negligible on
    HotSpot machines. Also keep in mind that accessing fields directly complicates
    adjustments at a later stage. Take, for example, the setting of a date field.
    When you use a setter method, you can easily include the calculation of the remaining
    time until the date inside of the setDate() method; this is not possible if you
    modify the field directly.


    **Improving Perceived Performance**


    In many cases, you cannot further improve the actual performance of an application.
    In this situation, you should concentrate on improving the *perceived* performance
    instead. Do this by giving feedback to the user about the progress of an ongoing
    process and ensuring the responsiveness of your application, as discussed in the
    following sections.


    Improving the perceived performance objectively often increases the time needed
    to accomplish a task, but to the user your application feels more responsive,
    and the user’s impression is what counts.


