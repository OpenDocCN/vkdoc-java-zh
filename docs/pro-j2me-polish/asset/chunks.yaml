    某些 MIDP 2.0 设备不支持菜单模式，因为当按下软键时，它们不会转发按键事件。J2ME Polish 通过评估设备数据库来确定设备是否支持菜单模式。当设置了
    `hasCommandKeyEvents` 特性时，设备支持纯 MIDP 2.0 菜单模式。此外，你可以设置 `capabilities` 键 `key.LeftSoftKey`
    和 `key.RightSoftKey` 来定义软键的键码（这些是报告给 `Canvas` 的 `keyPressed()` 方法的值）。当未定义键时，左软键假定值为
    -6，右软键假定值为 -7。清单 12-4 显示了包含这些设置的西门子/CX65 手机的定义。


    **清单 12-4.** *全屏模式的支持取决于软键的事件*


    <device


    supportsPolishGui="true">


    <identifier>Siemens/CX65</identifier>


    **<features>hasCommandEvents</features>**


    <capability name="ScreenSize" value="132x176"/>


    **<capability name="key.LeftSoftKey" value="-1" />**


    **<capability name="key.RightSoftKey" value="-4" />**


    </device>


    配置 GUI 的命令、标签和行为


    你可以使用预处理变量和符号来更改 J2ME Polish GUI 的外观或逻辑。表 12-1 和 12-2 列出了你可以在 *build.xml* 文件中设置的可用的配置符号和变量。


    **表 12-1.** *用于配置 GUI 的可用预处理符号* **预处理符号**


    **说明**


    polish.skipArgumentCheck


    当定义此符号时，将不会检查方法参数。这可以略微提高运行时性能和应用程序的大小。


    **表 12-2.** *用于配置 GUI 的可用预处理变量* **预处理变量**


    **默认值**


    **说明**


    polish.animationInterval


    定义动画的间隔（以毫秒为单位）。


    polish.classes.ImageLoader


    通常，J2ME Polish 使用 `Image.createImage( String url )` 方法从 JAR 文件中加载所有图像。这在大多数情况下都适用，但有时图像应从
    RMS 或互联网获取。在这种情况下，你可以定义 `polish.classes.ImageLoader` 变量。给定的类（或类的静态字段）需要实现 `javax.microedition.lcdui.Image
    loadImage( String url ) throws IOException` 方法，该方法负责获取图像。此选项在第 13 章的“动态加载图像”部分有详细讨论。


    **预处理变量**


    **默认值**


    **说明**


    polish.ChoiceGroup.suppressMarkCommands


    false


    默认情况下，多选列表或 ChoiceGroup 会将“标记”和“取消标记”命令添加到菜单中。这些命令的名称可以轻松更改；请参阅第 7 章的“构建本地化应用程序”部分。如果你想完全禁止这些命令，则必须将
    `polish.ChoiceGroup.suppressMarkCommands` 变量设置为 `true`。

