- fmt: "# Optimizing Applications\n\nThe protocols that you choose for storing and\
    \ transmitting data influence both the memory consumption as well as the performance\
    \ of your application.\n\nUsing XML-based protocols for transmitting data is quite\
    \ fashionable, but it requires additional resources for parsing the data. Also,\
    \ a lot of redundant data is transmitted. The same is true when using SOAP or\
    \ web services. When your application should talk only to your own proprietary\
    \ server application, it is often better to use a binary protocol instead. You\
    \ can use the `DataInputStream` and `DataOutputStream` classes for such protocols.\
    \ When you have a multichannel server application or need to access servers from\
    \ different companies, using web services is, however, often the better option.\n\
    \nTo improve the network throughput, you can also consider transmitting only the\
    \ changed data, especially in conjunction with caching the data. Keep in mind\
    \ that this complicates the interpretation of the data. A similar option is to\
    \ compress the data. Unfortunately, the MIDP standard does not provide the means\
    \ for reading and writing ZIP streams. Alternatively, you can use the `GZIPInputStream`\
    \ implementation of the TinyLine project (http://www.tinyline.com), for example.\n\
    \nTo improve performance, you can also minimize the use of encryption, for example\
    \ by authenticating only once per session. When you have a security-sensitive\
    \ application, however, you should be very careful about not using all available\
    \ means to secure the data. See the \"Improving Perceived Performance\" section\
    \ for some ideas on how to increase the usability of your application while maintaining\
    \ a high level of security.\n\nNetwork operations are very slow compared to almost\
    \ anything else. Apart from decreasing the transmitted data and using IP addresses\
    \ instead of server names, there is not much you can do to speed up network operations.\
    \ Caching the data might help, and you might even want try storing the received\
    \ data in the record store so that you have at least some (but possibly outdated)\
    \ data when you restart your application.\n\n## Record Stores\n\nRecord stores\
    \ are required for persisting data. You read them by calling the `RecordStore.enumerateRecords()`\
    \ method, which allows you to use a comparator and a filter for the enumeration.\n\
    \nThe problem with the interfaces `RecordFilter` and `RecordComparator` is that\
    \ they only get the `byte[]` data of the single recordsets. Usually you will need\
    \ to restore the original object for comparing the single recordsets, so when\
    \ you have both a filter and a comparator, you need to create and discard each\
    \ recordset object at least four times: twice in the comparator, once in the filter,\
    \ and once in your application. This not only degrades the performance, but also\
    \ greatly increases the memory footprint of your application. Listing 16-5 demonstrates\
    \ the usage of these elements.\n\n**Listing 16-5.** *Creating Many Temporary Objects\
    \ by Filtering and Sorting a Record Store*\n\n```java\nimport javax.microedition.rms.*;\n\
    import de.enough.polish.util.ArrayList;\n\npublic class RecordStoreReader\n  \
    \  implements RecordFilter, RecordComparator\n{\n    private final ArrayList list;\n\
    \    private final Object condition;\n\n    public RecordStoreReader( Object condition\
    \ )\n        throws RecordStoreException\n    {\n        this.condition = condition;\n\
    \        this.list = new ArrayList();\n        // open record store:\n       \
    \ RecordStore store = RecordStore.openRecordStore( \"store\", false );\n     \
    \   // enumerate the record sets:\n        RecordEnumeration enumeration =\n \
    \           store.enumerateRecords( this, this, false );\n        while ( enumeration.hasNextElement()\
    \ ) {\n            MyRecordData data = new MyRecordData( ennumeration.nextRecord()\
    \ );\n            this.list.add( data );\n        }\n        store.closeRecordStore();\n\
    \    }\n\n    public ArrayList getRecords() {\n        return this.list;\n   \
    \ }\n\n    public int compare( byte[] rec1, byte[] rec2 ) {\n        MyRecordData\
    \ data1 = new MyRecordData( rec1 );\n        MyRecordData data2 = new MyRecordData(\
    \ rec2 );\n        return data1.compare( data2 );\n    }\n\n    public boolean\
    \ matches( byte[] candidate ) {\n        MyRecordData data = new MyRecordData(\
    \ candidate );\n        return data.conditionFulfilled( this.condition );\n  \
    \  }\n}\n```\n\nA possible solution is to cleverly store the required data for\
    \ sorting and filtering so that you can use single bytes instead of creating temporary\
    \ objects out of the recordsets. Another approach is not to use `RecordFilter`\
    \ and `RecordComparator`, but instead use your own filtering and sorting mechanism\
    \ during the reading of the enumeration. Listing 16-6 filters and sorts the entries\
    \ all at once. It also uses a local `ArrayList` for accessing the data slightly\
    \ faster. In contrast to the previous example, each recordset object is created\
    \ only once.\n\n**Listing 16-6.** *Filtering and Sorting a Record Store Simultaneously*\n\
    \n```java\nimport javax.microedition.rms.*;\nimport de.enough.polish.util.ArrayList;\n\
    \npublic class RecordStoreReader {\n    private final ArrayList list;\n\n    public\
    \ RecordStoreReader( Object condition )\n        throws RecordStoreException\n\
    \    {\n        // open record store:\n        RecordStore store = RecordStore.openRecordStore(\
    \ \"store\", false );\n        // enumerate the record sets the fastest possible\
    \ way:\n        RecordEnumeration enumeration =\n            store.enumerateRecords(\
    \ null, null, false );\n        ArrayList recordList = new ArrayList( enumeration.numRecords()\
    \ );\n        while ( enumeration.hasNextElement() ) {\n            MyRecordData\
    \ data = new MyRecordData( enumeration.nextRecord() );\n            if ( !data.conditionFulfilled(\
    \ condition ) ) {\n                continue;\n            }\n            boolean\
    \ notInserted = true;\n            for ( int i = recordList.size(); --i >= 0;\
    \ ) {\n                MyRecordData compare = (MyRecordData) recordList.get( i\
    \ );\n                if ( data.compare( compare ) != RecordComparator.PRECEDES\
    \ ) {\n                    recordList.add( i + 1, data );\n                  \
    \  notInserted = false;\n                    break;\n                }\n     \
    \       }\n            if ( notInserted ) {\n                recordList.add( 0,\
    \ data );\n            }\n        }\n        store.closeRecordStore();\n     \
    \   this.list = recordList;\n    }\n\n    public ArrayList getRecords() {\n  \
    \      return this.list;\n    }\n}\n```\n\nWhen you need to sort and filter vast\
    \ amounts of data from the record store regularly, consider using index recordsets\
    \ that contain pointers to the actual data. To retrieve a particular recordset,\
    \ you look up its position in the index set before loading it directly. This technique\
    \ can improve data reading a great deal, but it makes persisting new entries much\
    \ more complex. Your mileage may vary.\n\n## Selecting Algorithms\n\nIf you have\
    \ an application that needs to perform many calculations and do a lot of data\
    \ processing, consider the used algorithms carefully. Since algorithms are very\
    \ much specific to your application, discussion of the merits and disadvantages\
    \ of different algorithms are out of scope here.\n\n## Low-Level Performance Tuning\n\
    \nAfter you have implemented high-level optimizations, you can continue to the\
    \ exciting area of low-level tuning. Before we move on to cover these optimizations,\
    \ a word of warning is in order: low-level optimizations can easily introduce\
    \ new bugs, often decrease the readability and maintainability of your application,\
    \ and might improve the performance only on specific target devices.\n\n### Improving\
    \ Graphic Operations\n\nRendering graphics or text on the screen is quite complex\
    \ and therefore takes some time to complete. The best you can do is avoid painting\
    \ altogether, for example by rendering data only after it has changed, or by using\
    \ and evaluating clipping regions. In addition, you can use image buffers for\
    \ complex backgrounds that don't change often. Splitting an image into single\
    \ tiles also improves performance greatly when you need to paint an animation,\
    \ for example.\n\n### Using Appropriate Containers"
