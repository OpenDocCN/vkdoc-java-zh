- fmt: '# 使用预处理改变类继承


    你可以使用预处理来改变类的继承关系。一个例子是在启动画面中使用诺基亚的`FullCanvas`类。清单8-19演示了这种应用，并展示了如何隐藏第一个`extends`语句，这样你的IDE就不会报错无效的类定义。


    **清单8-19.** *在可用时扩展诺基亚的FullCanvas*

    ```

    public class SplashScreen


    //#if polish.api.nokia-ui


    //# extends com.nokia.mid.ui.FullCanvas


    //#else


    extends Canvas


    //#endif

    ```


    # 配置应用程序


    大多数开发者使用JAD文件存储配置设置，并通过`MIDlet.getAppProperty(String key)`检索这些设置。正如你在第7章中学到的，J2ME
    Polish支持使用`<jad>`元素设置JAD属性。这种方法的优点是你可以稍后轻松更改设置，但它也有几个关键缺点：


    - 你需要额外的处理时间和代码来在运行时确定配置。

    - 一些设备在安装后会移除JAD文件及其所有设置。

    - 恶意用户可以轻松拦截和更改JAD文件。


    作为替代方案，你可以使用预处理来配置应用程序。在`build.xml`文件中使用`<variable>`元素指定你的配置设置：


    ```

    <variable name="config.BaseUrl" value="http://www.specific.com" />

    ```


    现在你可以使用`#=`指令来使用变量。最佳实践是在未指定设置时使用默认值。如清单8-20所示，你可以通过测试`[variable-name]:defined`预处理符号来检查变量是否已定义，该符号会自动为所有变量定义。


    **清单8-20.** *使用预处理配置应用程序*

    ```

    //#ifdef config.BaseUrl:defined


    //#= private static final String BASE_URL = "${config.BaseUrl}";


    //#else


    private static final String BASE_URL = "http://www.default.com";


    //#endif

    ```


    虽然使用预处理配置应用程序通常比使用JAD属性更智能，但它也有一个缺点：更难使用动态设置。动态生成JAD文件比按需构建完整的应用程序更容易。动态设置的一个例子是包含客户的电话号码以便后续识别。你可以结合使用J2ME
    Polish的两种方法：对常规配置值使用预处理，对频繁更改的设置使用动态JAD生成。


    # 使用硬编码值


    使用设备特定的硬编码值是另一个可以通过预处理变量应对的挑战。为什么要这样做？一个原因是你可以通过这种方法规避某些设备问题。例如，一些诺基亚设备在全屏模式下无法报告正确的画布高度，因此你需要使用正确的硬编码值。另一个原因是硬编码值可以加速你的应用程序。


    清单8-21演示了当你想要使用可用屏幕宽度的三分之二来显示内容的情况。当你使用硬编码值时，Java编译器会在编译阶段计算出正确的结果。诚然，这个例子不会显著加速你的应用程序，但它确实演示了原理。请查看设备数据库`http://www.j2mepolish.org/devices-overview.html`，了解目标设备的可用变量。


    **清单8-21.** *使用预处理进行硬编码变量*

    ```

    //#ifdef polish.ScreenWidth:defined


    //#= final int myMessageWidth = ${polish.ScreenWidth} * 2 / 3;


    //#else


    final int myMessageWidth = getWidth() * 2 / 3;


    //#endif

    ```


    # 规避已知问题'
  raw: 'You can use preprocessing for changing the inheritance of your class. One
    example is using Nokia’s FullCanvas class for splash screens. Listing 8-19 demonstrates
    this application, and also shows how to hide the first extends statement, so that
    your IDE will not complain about an invalid class definition.


    **Listing 8-19.** *Extending Nokia’s FullCanvas When It Is Available* public class
    SplashScreen


    //#if polish.api.nokia-ui


    //# extends com.nokia.mid.ui.FullCanvas


    //#else


    extends Canvas


    //#endif


    **Configuring Applications**


    Most developers use the JAD file for storing configuration settings and MIDlet.getAppProperty
    ( *String key* ) to retrieve those settings. As you learned in Chapter 7, J2ME
    Polish supports the setting of JAD attributes with the <jad> element. The advantage
    of this approach is that you can easily change the settings later on, but it also
    has several critical drawbacks:


    5033CH08.qxd 6/17/05 12:06 PM Page 120


    **120**


    C H A P T E R 8 ■ P R E P R O C E S S I N G


    • You need extra processing time and additional code for determining the configuration
    during the runtime.


    • A few devices remove the JAD file and all its settings after the installation.


    • Malicious users can easily intercept and change the JAD file.


    As an alternative, you can use preprocessing for configuring your application.
    Specify your configuration settings with the <variable> element in the *build.xml*
    file:


    <variable name="config.BaseUrl" value="http://www.specific.com" /> Now you can
    use your variables with the #= directive. Best practice is to use default values
    in case no settings have been specified. As shown in Listing 8-20, you can check
    whether a variable has been defined by testing the [ *variable-name*]:defined
    preprocessing symbol that is automatically defined for all variables.


    **Listing 8-20.** *Using Preprocessing for Configuring an Application*


    //#ifdef config.BaseUrl:defined


    **//#= private static final String BASE_URL = "${config.BaseUrl}";**


    //#else


    private static final String BASE_URL = "http://www.default.com";


    //#endif


    While using preprocessing for configuring your application is often the smarter
    solution than using JAD attributes, it has also a drawback: it is harder to use
    dynamic settings. It’s easier to generate a JAD file on the fly than to build
    the complete application on request. An example of dynamic settings is the inclusion
    of the customer’s phone number for later identification. You can use both approaches
    with J2ME Polish: use preprocessing for the normal configuration values and dynamic
    JAD generation for settings that change frequently.


    **Using Hard-Coded Values**


    Using device-specific hard-coded values is another challenge that you can cope
    with preprocessing variables. Why would you want to do that? One reason is that
    you can circumvent some device issues with this approach. Some Nokia devices,
    for example, do not report the correct canvas height when they are in the full-screen
    mode, so you need to use the correct hard-coded value. Another reason is that
    hard-coded values can speed up your application.


    Listing 8-21 demonstrates the case when you want to use two-thirds of the available
    screen width for displaying something. When you use hard-coded values, the Java
    compiler calculates the correct result during the compile phase. Granted, this
    example won’t speed up your application much, but it does demonstrate the principle.
    Take a look at the device database at *http://www.j2mepolish.org/devices-overview.html*
    to find out more about the available variables for your target devices.


    5033CH08.qxd 6/17/05 12:06 PM Page 121


    C H A P T E R 8 ■ P R E P R O C E S S I N G


    **121**


    **Listing 8-21.** *Using Preprocessing for Hard-Coding Variables*


    //#ifdef polish.ScreenWidth:defined


    **//#= final int myMessageWidth = ${polish.ScreenWidth} * 2 / 3;**


    //#else


    final int myMessageWidth = getWidth() * 2 / 3;


    //#endif


    **Circumventing Known Issues**'
