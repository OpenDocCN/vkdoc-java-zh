    第 15 章 ■ 在设备限制间起舞


    再次强调，动态编程并不能减轻你的测试负担：你仍然需要在每个想要支持的目标设备上测试你的应用程序。


    其好处在于只有一个 JAR 文件，这简化了应用程序的部署。


    ■**提示** 在部署动态代码时，你应该考虑根据模型-视图-控制模式来分离代码，以便更容易地交换视图。在无线 Java 平台上的常见做法是将控制器和模型合并，以最小化类的使用（从而节省
    JAR 空间）。


    **使用预处理**


