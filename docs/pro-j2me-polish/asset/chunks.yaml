    **Minimizing the Number of Target Devices**


    Creating device-optimized applications is great, but it has two ramifications.
    First, it is more complex to distribute. Second, if you need to run through a
    verification process, you need to submit all versions of your application.


    Whether you have only one or you have thirty versions of your application complicates
    the distribution. This may or may not be a problem, depending on your distribution
    plan.


    When you distribute your applications through carriers, aggregators, or device
    vendors, you just need to transmit the different application versions to your
    distribution partner. This is not a problem in today’s fragmented device world,
    because professional distributors deploy capable platforms. When, however, you
    want to distribute your application on your own, you have to manage these different
    versions somehow and provide the best-suited versions to your


    5033CH07.qxd 6/17/05 11:50 AM Page 84


    **84**


    C H A P T E R 7 ■ B U I L D I N G A P P L I C AT I O N S


    clients. Take a look at the J2EE Provisioning Specification (see JSR 124 at *http://jcp.org/en/jsr/*


    *detail?id=124*) for getting ideas how to do this.


    Another reason why you might want to minimize the number of different versions
    is the Java Verified process ( *http://www.javaverified.com*). This Java Verified
    initiative tests and—


    more important—signs your application. Signing is required if you want to use
    certain security-sensitive options such as networking without asking the user
    for permission. Some areas such as low-level networking layers cannot even be
    used without having a valid signature. Unfortunately, the Java Verified initiative
    is one of the few available ways to sign your application. And it costs money
    for each tested version.


    So, some situations require you to limit the number of different versions. J2ME
    Polish provides many virtual devices for this task. These allow you to build for
    certain classes of devices.


    These can be very unspecific like the “Generic/midp1” device, specific like the
    “Nokia/Series60”


    one, or very specific like “Nokia/Series60E2FP3” for a Series 60 device of the
    second edition that includes the Feature Pack 3\. Refer to the device database
    at *http://www.j2mepolish.org/*


    *devices-overview.html* for getting to know the available virtual devices.


    **Building Localized Applications**


    Often applications should be marketed in not only one country or region but in
    several ones.


    The process of adjusting an application to a specific region is called *localization*.


    With J2ME Polish you can manage the obvious needed translations and also adjust
    any kind of resources such as images or sounds to specific regions. Traditionally,
    localization involved loading the localized messages from a file during runtime
    and retrieving these messages with Hashtable keys. This slows down a localized
    application and also enlarges the application size. J2ME Polish embeds the translations
    directly into the source code by default, so in most cases a localized application
    has absolutely no overhead at all compared to a nonlocalized application—both
    in size as well as in performance.


    The localization framework extends the concepts of resource assembling, so you
    can, for example, provide one Nokia-specific resource for each supported locale.
    The localization is controlled by the <localization> element, which is a subelement
    of the <resources> element (see the “Resource Assembling” section in this chapter).


    **The <localization> Element and Localized Resource Assembling** You can control
    the localization process with the <localization> element in your *build.xml* script.
    Listing 7-24 demonstrates how to use this element.


    **Listing 7-24.** *Using <localization> for Supporting Several Locales*


    <j2mepolish>


    <info


    license="GPL"


    name="Roadrunner"


    vendorName="A reader."


    version="0.0.1"


    jarName="${polish.vendor}-${polish.name}-${polish.locale}-roadrunner.jar"


    />


    5033CH07.qxd 6/17/05 11:50 AM Page 85


    C H A P T E R 7 ■ B U I L D I N G A P P L I C AT I O N S


    **85**


    <deviceRequirements>


    <requirement name="Identifier" value="Nokia/Series60" />


    </deviceRequirements>


    <build>


    <midlet class="com.apress.roadrunner.Roadrunner" />


    <resources>


    **<localization**


    **locales="de_DE, en_US,"**


    **unless="test" />**


    **<localization locales="en_US" if="test" />**


    </resources>


    </build>


    <emulator />


    </j2mepolish>


    ■**Caution** The jarName attribute of the <info> section uses the ${polish.locale}
    property. This is necessary because otherwise different localizations would all
    end up in the same application bundle; and in that case, only the last locale
    could be used.


    The <localization> element is responsible for defining which locales should be
    supported. The previous example uses the locales de_DE (German in Germany) and
    en_US (English in the United States), unless the test mode is active, in which
    case the application is built only for the US-English locale.


    Locales are defined using the ISO standard of two lowercase letters for the language2
    (en for English, de for German, fr for French, and so on) and two optional uppercase
    letters for the country3 (US for the United States, DE for Germany, FR for France,
    and so on). Possible combinations separate the language and the region with an
    underscore. You can localize your application for French-speaking Canadians by
    supporting the locale fr_CA, for example.


    In each used *resources* folder, you can create a subfolder for a specific locale,
    for instance, *resources/en* for general English resources and *resources/en_US*
    for resources for the American English version of your application. The usual
    specification rules also apply here, so a more specific resource in *resources/Nokia/en*
    will override a resource with the same name in *resources/Nokia* when the English
    locale is used.


    **Managing Translations**


    It is easy to use translations in your application once you have the hang of it.
    In the following sections, you will learn how to do just that.


