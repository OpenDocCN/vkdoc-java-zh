    C H A P T E R 1 2 ■ W O R K I N G W I T H T H E G U I in *styles*. You can assign
    a style to any GUI item, such as a title, a paragraph, or an input field.


    Within a style, several attributes and its values are usually defined, as shown
    in Listing 12-15.


    **Listing 12-15.** *A Simple Style Definition*


    .myStyle {


    font-color: white;


    font-style: bold;


    font-size: large;


    font-face: proportional;


    background-color: black;


    }


    In Listing 12-15, the style called myStyle defines some font values and the color
    of the background. Any style contains a selector as well as a number of attributes
    and its values, as shown in Figure 12-7.


    **Figure 12-7.** *The components of a CSS style*


    You need to finish each attribute-value pair with a semicolon. The style declaration
    needs to end with a right curly parenthesis. The selector, or name, of a style
    is case-insensitive, so


    .MySTYle is the same as .myStyle.


    You can adjust your design to different handsets easily by using subfolders in
    the *resources* folder. This mechanism uses the same features as the resource
    assembling described in Chapter 7\. The relevant techniques are repeated in the
    “Designing for Specific Devices and Device Groups” section.


    You can specify styles directly for GUI items with the #style preprocessing directive
    in the source code. Alternatively, you can use the dynamic names of the GUI items;
    for example, you can use p for text items, a for hyperlinks, or form p for all
    text items that are embedded in a Form. The possible combinations as well as the
    predefined styles are discussed in the section


    “Using Dynamic, Static, and Predefined Styles.”


    Styles can extend other styles with the extends keyword, such as .myStyle extends
    baseStyle {}. The section “Extending Styles” describes this process.


    J2ME Polish supports the CSS box model with margins, paddings, and content. Other
    common design settings include the background, border, and font settings. The
    section


    “Common Design Attributes” describes these widespread settings. The possibilities
    for designing screens and items are discussed subsequently.


    **Designing for Specific Devices and Device Groups**


    Sometimes you need to adjust the design to a specific device, a group of devices,
    or a specific locale. You can easily use specific pictures, styles, and so on,
    by using the appropriate subfolders of the *resources* folder (as described in
    the “Resource Assembling” section of Chapter 7).


    5033CH12.qxd 6/20/05 11:31 AM Page 183


    C H A P T E R 1 2 ■ W O R K I N G W I T H T H E G U I **183**


    You adjust your design to a specific vendor, group, or device by adding a *polish.css*
    file to the appropriate folder, such as *resources/Series60/polish.css* or *resources/ScreenSize.240+x320+/*


    *polish.css*. Instead of repeating all styles and attributes from the more basic
    CSS files, you just need to identify the more specific setting. When you want
    to change the color of a font, you just need to specify the font-color attribute
    of that style, for example. You don’t need to define any other attributes or styles.
    This is the cascading character of the Cascading Style Sheets of J2ME Polish.


    Listings 12-16 and 12-17 illustrate the cascading character of *polish.css*. In
    Listing 12-16, you have a basic style definition that is situated in the *resources/polish.css*
    file.


    **Listing 12-16.** *A Basic Style Definition in resources/polish.css*


    .myStyle {


    padding: 5;


    font-color: white;


    font-style: bold;


    font-size: large;


    font-face: proportional;


    background-color: black;


    border-color: yellow;


    }


    Listing 12-17 shows the specialization of that style in the Nokia-specific file
    *resources/*


    *Nokia/polish.css*. In that case, only the font-color attribute is changed, and
    no background is used; all other settings remain the same. If you don’t want to
    use an attribute even though that attribute has been defined in the parent style,
    you can use the attribute-name: none setting in most cases. In Listing 12-17,
    no background is used for the style by specifying background: none.


    **Listing 12-17.** *A Nokia Specialization of the Style That Resides in resources/Nokia/polish.css*


    .myStyle {


    font-color: gray;


    background: none;


    }


    **Using Dynamic, Static, and Predefined Styles**


    J2ME Polish distinguishes between dynamic, static, and predefined styles:


    • *Static* styles are defined in the source code of the application with the #style
    preprocessing directive.


    • *Predefined* styles are used internally by J2ME Polish for some specific items
    such as screen titles, menu bars, or tabs in a TabbedForm.


    • *Dynamic* styles are used for items according to their type.


