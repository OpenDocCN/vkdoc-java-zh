    ## Extending J2ME Polish


    The `CustomPreprocessor` class provides the `registerDirective(String)` method,
    which makes preprocessing quite comfortable. In this case, you want to process
    only those lines that start with the `//#useragent` directive, so you can register
    this directive by calling `registerDirective("//#useragent")`. For each registered
    directive, you need to implement the method `process[directive-name]`, so implement
    `processUseragent()` as shown in Listing 13-10. This method is responsible for
    the actual preprocessing and replaces the term `${useragent}` with the actual
    user agent in this example. Please note that the spelling of the method name must
    be the same as the directive name, with the exception that the first letter after
    "process" is capitalized in the method name.


    **Listing 13-10.** *Registering Directives in the UserAgentPreprocessor*


    ```java

    package com.apress.preprocess;


    import org.apache.tools.ant.BuildException;


    import de.enough.polish.preprocess.CustomPreprocessor;


    import de.enough.polish.util.StringList;


    public class UserAgentPreprocessor extends CustomPreprocessor {


    public UserAgentPreprocessor() {


    super();


    registerDirective( "//#useragent" );


    }


    public void processUseragent( String line, StringList lines, String className
    ) {


    int directiveStart = line.indexOf( "//#useragent" ); String argument = line.substring(
    directiveStart


    + "//#useragent".length() ).trim();


    int replacePos = argument.indexOf( "${useragent}" ); if ( replacePos == -1 ) {


    throw new BuildException( getErrorStart( className, lines )


    + "Unable to process #useragent-directive: "


    + "found no ${useragent} sequence in line ["


    + line + "]." );


    }


    String userAgent = this.currentDevice.getCapability( "polish.UserAgent" ); if
    ( userAgent == null ) {


    userAgent = this.currentDevice.getIdentifier();


    }


    if ( this.currentLocale != null ) {


    userAgent += "<" + this.currentLocale.toString() + ">";


    }


    String result = argument.substring( 0, replacePos )


    + userAgent


    + argument.substring( replacePos + "${useragent}".length() ); lines.setCurrent(
    result );


    }


    }

    ```


    You can use various instance fields in your preprocessing methods:


    - `de.enough.polish.Environment environment` queries any preprocessing variables
    or symbols.

    - `de.enough.polish.BooleanEvaluator booleanEvaluator` evaluates complex terms
    that can be used in `#if` directives.

    - `de.enough.polish.Device currentDevice` contains device settings (these can
    also be queried from the preprocessor).

    - `java.util.Locale currentLocale` represents the current localization; this is
    the only variable that can be `null`.


    The example used the device to get the applicable user agent. When you use the
    localization, you also add the localization setting to the user agent. If you
    have the English locale and target the Nokia 6600 device, the user agent would
    be `Nokia/6600<en>`, for example. This user agent can then be queried by a server
    application, which in turn can generate content specifically for that device and
    the used localization.


    After preprocessing the given line, you can persist your changes by calling `lines.setCurrent(
    line )`. When you encounter a fatal error, you can abort the build by throwing
    an `org.apache.tools.ant.BuildException` that explains the situation.


    ## Taking Full Control


    For more complex situations, you can override the `processClass()` method, which
    allows you to process the complete source files. This requires you to do the parsing
    yourself, but it gives you greater flexibility as well. Listing 13-11 creates
    another preprocessor called `FullScreenPreprocessor`. This preprocessor just looks
    for classes that extend the `javax.microedition.lcdui.Canvas` class and changes
    the `extends` statement so that these classes extend the native fullscreen class
    of the current target devices, for example, Nokia''s `com.nokia.mid.FullCanvas`.
    This allows you to always use any available fullscreen class without using extra
    preprocessing directives in your application.


    > **Caution** Remember that fullscreen classes may not support all normal `Canvas`
    operations. Nokia''s `com.nokia.mid.FullCanvas` does not support commands, for
    example, so use this preprocessor with care.


    **Listing 13-11.** *Parsing the Complete Source Code in the FullScreenPreprocessor*


    ```java

    package com.apress.preprocess;


    import de.enough.polish.Device;


    import de.enough.polish.preprocess.CustomPreprocessor;


    import de.enough.polish.util.StringList;


    public class FullScreenPreprocessor extends CustomPreprocessor {


    private boolean doProcessClass;


    private String fullScreenClass;


    public FullScreenPreprocessor() {


    super();


    }


    public void notifyDevice( Device device, boolean usesPolishGui ) {


