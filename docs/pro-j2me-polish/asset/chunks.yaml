    The translations are embedded in the actual code during the preprocessing phase;
    if you look at the preprocessed code, you will find code like in Listing 7-27.


    **Listing 7-27.** *The Embedded Translations After the Preprocessing*


    ```

    import de.enough.polish.util.Locale;

    [...]

    // getting a simple translation:

    this.menuScreen.append( "Start Tickle Fight", null );

    // getting a translation with one parameter:

    this.menuScreen.setTitle( "Welcome " + userName + "!" );

    // getting a translation with several parameters:

    String[] parameters = new String[2];

    parameters[0] = userName;

    parameters[1] = enemyName;

    this.textField.setString( Locale.get( 1, parameters ) );

    ```


    Translations that contain no or one parameter are directly embedded into the source
    code, so there is no performance or size impact compared to a nonlocalized application
    at all for these kinds of translations. Only when a translation has more than
    one parameter is a call to the `Locale` class actually made. To improve the performance,
    the former String key, `messages.Introduction`, is transformed to a simple integer
    by J2ME Polish, thus saving valuable bytes as well as ensuring a fast retrieval
    of the resource in question.


    ## Defining Translations


    Use the `resources/messages.txt` file to define your default translations, `resources/de/messages.txt`
    to define your German translations, and `resources/fr_CA/messages.txt` to define
    your French Canadian translations. Instead of using subfolders, you can also use
    the files `resources/messages.txt`, `resources/messages_de.txt`, and `resources/messages_fr_CA.txt`
    if you prefer to have all translations in one folder. Translations follow the
    usual hierarchy of resource assembling, so if you have Nokia-specific translations,
    you can define these in `resources/Nokia/messages.txt`, and so on. For each translation
    key, the best matching translation is used. When an application is localized for
    the Nokia 6600 phone and the German `de` language, J2ME Polish tries to find a
    translation in the following places:


    - `resources/Nokia/6600/de/messages.txt`

    - `resources/Nokia/6600/messages_de.txt`

    - `resources/[group-name]/de/messages.txt` (for example, `resources/Series60/de/messages.txt`)

    - `resources/[group-name]/messages_de.txt` (for example, `resources/Series60/messages_de.txt`)

    - `resources/Nokia/de/messages.txt`

    - `resources/Nokia/messages_de.txt`


