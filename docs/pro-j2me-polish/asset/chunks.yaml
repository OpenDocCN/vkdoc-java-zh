    **使用受信任的 MIDlet**


    签署 J2ME 应用程序的可能性在开发者社区中引起了许多困惑和挫折，因为大多数设备不识别流行的 VeriSign 和 Thawte 代码签名证书。


    MIDP 2.0 规范引入了受信任 MIDlet 的概念。当满足以下条件时，MIDlet 被视为受信任：


    • MIDlet 已被签名。


    • 签名已被设备认证。


    • 已签名 MIDlet 的完整性已由设备验证。


