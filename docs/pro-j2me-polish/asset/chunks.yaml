    **Controlling the GUI**


    You control the J2ME Polish GUI with the *build.xml* file. You can also activate
    the J2ME Polish GUI selectively for specific devices and use several preprocessing
    variables for changing the behavior of the GUI.


    **Activating the GUI**


    Activate the GUI by setting the usePolishGui attribute of the <build> element
    in the *build.xml* file to true. J2ME Polish will then weave the necessary code
    automatically into the application.


    The usePolishGui attribute accepts the values yes/true, no/false, and always.
    When true or yes is given, the GUI will be used, unless a target device does not
    have the recommended capabilities (that is, a maximum JAR size greater than 100KB
    and a color depth of at least 8 bits per color). For such devices, the normal
    MIDP GUI is then used instead. When the attribute is set to always, the J2ME Polish
    GUI will be used for all target devices, even when they do not have the recommended
    capabilities.


