    在 `createNewStatement()` 方法中，你可以从提供的 `background` HashMap 中读取设计设置。要解析这些值，你可以使用辅助方法
    `parseInt()`、`parseFloat()`、`parseBoolean()`、`parseColor()`、`getUrl()` 和 `parseAnchor()`。每个辅助方法都需要属性名称和值作为参数。


    在此示例中，使用了 `color` 和 `speed` 属性。`color` 值已由超类解析，可以通过 `this.color` 访问。如果没有定义颜色，背景颜色默认为白色。当缺少必需的值或值设置不正确时，你可以抛出一个
    `BuildException`，详细说明出错的原因。一切正常时，只需返回一个包含用于创建背景新实例的源代码的字符串。


    集成自定义背景


    为了集成你的自定义背景，你需要将转换器类添加到 `<j2mepolish>` 任务的类路径中，并调整项目的源路径，以便同时包含你的客户端背景类。


    首先，通过调整 *build.xml* 文件中的 `<taskdef>` 元素，将你的背景转换器类添加到 `<j2mepolish>` 任务中。将转换器项目
    *classes* 目录的路径添加到 `<taskdef>` 元素的 `classpath` 属性中，如清单 13-26 所示。


