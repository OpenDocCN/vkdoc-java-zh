- fmt: '# 排版后的文档


    Whether you create mobile banking software or the latest games can make a difference
    in the users’ expectations. Your mileage may vary.


    You can include an animation whenever you show a different screen in your application
    by specifying the `screen-change-animation` attribute. Such animations help you
    to create a very lively application. Table 12-27 lists all available values along
    with a brief description.


    **Table 12-27.** *Possible Screen Change Animations*


    | Animation | Explanation |

    |-----------|-------------|

    | `left` | Moves the new screen from the left to the right. You can specify the
    speed in pixels per animation phase with the `left-screen-change-animation-speed`
    attribute. |

    | `right` | Moves the screen from the right to the left. Set the speed in pixels
    per animation phase with the `right-screen-change-animation-speed` attribute.
    |

    | `top` | Moves the new screen from the top to the bottom. You can specify the
    speed in pixels per animation phase with the `top-screen-change-animation-speed`
    attribute. |

    | `bottom` | Moves the new screen from the bottom to the top. You can specify
    the speed with the `bottom-screen-change-animation-speed` attribute. |

    | `zoomOut` | Starts with a magnified and almost transparent screen and zooms
    out of it gradually. |

    | `zoomInAndHide` | Magnifies the previously shown screen and makes it more transparent
    in each animation phase. |


    ## Summary


    Well done! You have mastered the most complex part of J2ME Polish—the user interface.
    You have now learned how you can program, control, and design the GUI for creating
    truly professional applications. Just to repeat the main lessons: you program
    the GUI just like the normal `javax.microedition.lcdui` API, but you need to ensure
    that you use proper import statements.


    For controlling the GUI, you can set various preprocessing variables in your project’s
    `build.xml` file. Last but not least, you can design the user interface outside
    the application code with the `resources/polish.css` file.


    In the next chapter, you will finish the J2ME Polish part of this book by learning
    how you can extend this framework. J2ME Polish contains various hooks so that
    you can extend it quite easily, whether you want to add your own preprocessor
    or your own GUI background.


    ---


    # Chapter 13


    ## Extending J2ME Polish


    **In this chapter:**


    - Discover how to integrate your own tools for each phase of the development cycle:
    preprocessing, compiling, postcompiling, obfuscating, and packaging.

    - Learn how to extend the J2ME Polish GUI by providing your own backgrounds, borders,
    custom items, and image loader.

    - Learn how to extend the logging framework by providing your own log handlers.


    J2ME Polish is powerful, but sometimes you may encounter a situation that requires
    specific adjustments. In this chapter, you will learn how you can extend J2ME
    Polish to realize your own build solutions and your own user interface extensions.


    ## Extending the Build Tools


    In the following sections, you will learn how you can extend the build phases
    of J2ME Polish.


    By extending the build process, you can satisfy your specific company needs such
    as using a specific compiler, your own preprocessing directives, or your own resource
    assembling strategies. You can also use this mechanism to create (and sell) extensions
    of J2ME Polish for other developers.


    ### Understanding the Extension Mechanism


    All build extensions share some capabilities, such as a common superclass and
    the possibility to accept parameters. Also, the registration of extensions works
    the same way for all kinds of build extensions. I will discuss these common characteristics
    in the following sections.


    ### Recapitulating the Build Phases


    During the build process, J2ME Polish goes through various build phases, as discussed
    in Chapter 7. You can extend each phase by implementing your own extension or
    by providing and calling another Ant target in your `build.xml` script.'
