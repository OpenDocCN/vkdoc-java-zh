    在本章中，你将学习如何为你的应用程序使用 J2ME Polish GUI。


    该 GUI 与标准的高级 GUI API 兼容，但允许你设计界面的每一个细节。因此，GUI 的简易编程特性得以保留，而所有限制都被一扫而空！


