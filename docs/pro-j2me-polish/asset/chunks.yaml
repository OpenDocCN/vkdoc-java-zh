    **性能调优**


    你可以通过多种方式提高应用程序的性能，本节将对此进行讨论。高层优化涉及应用程序的架构和使用的协议，而底层优化则涉及使用的算法或数据结构。你应该将此类底层更改作为最后一步，当无法再进行高层优化时再进行。


    高层性能调优


    许多性能问题可以通过更改架构、使用的协议或使用的算法来解决。通常，高层更改可以极大地提高（或降低）应用程序的性能。


