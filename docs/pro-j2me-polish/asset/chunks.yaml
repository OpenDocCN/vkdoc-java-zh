    The chapter introduced you to the general architecture of J2ME Polish. You gained
    an insight in the four main layers: the build framework, client framework, IDE
    plug-ins, and stand-alone tools. You also learned about the life cycle of wireless
    Java applications and how J2ME Polish can help you in each phase.


    In the next chapter, we will take a look at the device database that provides
    the foundation for almost every module of J2ME Polish.


