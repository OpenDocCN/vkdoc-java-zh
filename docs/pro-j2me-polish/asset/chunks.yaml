    obfuscators by using the antcall mechanism, by which you can call another target
    within your *build.xml* script: <obfuscator name="antcall" target="obfuscate"
    />. Chapter 13 provides more details about this extension mechanism.


    **Debugging Applications**


    J2ME Polish’s support for multiple devices, locales, and obfuscators is great
    for creating applications, but it is a bit heavyweight for the development phase.
    Fortunately, you can choose a lightweight approach by tweaking *build.xml* a bit.


    One strategy for allowing fast builds is to use conditional <deviceRequirements>,


    <localization>, and <obfuscation> elements, which can be enabled and disabled
    by setting Ant properties.


    Another strategy is to use J2ME Polish in the compiler mode. In that case, J2ME
    Polish only preprocesses, compiles, and possibly preverifies the application.
    This approach is useful for integrating J2ME Polish with the IDE or with an IDE
    plug-in such as EclipseME.


    If you want to debug an application that is compiled by J2ME Polish, you need
    to enable the <debug> element so that debug information such as variable names
    and line numbers in the source code is included in the classfiles. Alternatively,
    you can provide your own


    <compiler> element.


    In the following sections, I elaborate on these strategies.


    **Using Conditions**


    With conditions you can disable and enable elements in *build.xml*. You can use
    the Ant property test to differentiate between the test mode and the “real” build
    mode, in which everything is activated. Listing 7-39 provides a blueprint for
    your *build.xml* file.


    5033CH07.qxd 6/17/05 11:50 AM Page 97


