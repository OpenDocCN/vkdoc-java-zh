    Let’s now look at the *build.xml* script in detail.


    The properties ${wtk.home} and ${polish.home} define the locations of the Wireless
    Toolkit and of J2ME Polish (you *have* adjusted those values to your system, right?).


    ■**Note** Even though the ${wtk.home} property is not used directly in the script,
    it is needed by J2ME


    Polish for finding the preverify tool.


    The <taskdef> element tells Ant about the J2ME Polish task and how to find it.
    Please make sure you have put the classpath attribute on a single line without
    any spaces in it.


    The real J2ME Polish task is invoked in the j2mepolish target. The task contains
    the four sections <info>, <deviceRequirements>, <build>, and <emulator>.


    The <info> section describes general information about the MIDlet, which is written
    into the generated JAD and Manifest files. The most important attribute is jarName,
    which specifies the name of the JAR file that is generated. Listing 7-7 uses the
    properties ${polish.vendor}


    (the vendor of a device) and ${polish.name} (the name of a device) without having
    these properties defined anywhere. They are defined automatically by J2ME Polish
    and change with each processed device.


    In the <deviceRequirements> section, the target devices are selected for which
    the application is built. For each target device, an application bundle consisting
    of a JAD and JAR file is created in the *dist* folder of your project. You can
    select devices by names or by defining needed capabilities such as “all devices
    that support the Bluetooth API and the Mobile Media API.” In this example, you
    will build the application for the “Generic/midp1” device, which represents a
    typical device supporting the MIDP 1.0 profile.


    The following <build> section controls the actual build process. In this example,
    you merely inform J2ME Polish about the MIDlet class using the nested <midlet>
    element. You also specify that the J2ME Polish GUI should not be used by setting
    the usePolishGui attribute to false.


    The last section of the <j2mepolish> task is the <emulator> one. This section
    is responsible for invoking the emulator for the target device.


    The clean target is used in case you want to do a clean rebuild. It just removes
    the *build* and *dist* folders in your project. J2ME Polish uses the *build* folder
    as a temporary work folder.


    Preprocessed source codes and compiled classes are stored here, for example. The
    *dist* directory contains the final JAR and JAD files of your application. Doing
    a clean build is necessary in certain cases, for example, when you have changed
    device definitions. In principle you could always do a clean build, but in that
    case J2ME Polish would need a bit more time, because all source files would need
    to be compiled again.


