    **Signing MIDlets**


    The MIDP 2.0 standard distinguishes between trusted and untrusted applications.
    An application is considered untrusted by default, unless it contains a valid
    digital signature. Whenever an untrusted application accesses security-sensitive
    resources such as sending text messages, the user will be asked for permission.
    Certain actions such as low-level network access might be entirely forbidden for
    untrusted applications. In contrast, the user is asked only once during the installation
    to allow certain actions for trusted applications. With J2ME Polish you can automate
    the signing of your application when you have a valid digital certificate.


    ■**Note** Chapter 15 covers how to sign MIDlets in the real world in detail. In
    most cases you will need to certify your application by the Java Verified initiative
    ( *http://www.javaverified.com*). This will involve further costs. You can define
    any required permissions with the permissions attribute and optional operations
    with the optionalPermissions attribute of the <info> element, as shown in Listing
    7-18\. Please refer to the appendix for getting a list of available permissions.


    When the application is signed, the SHA1 hash value of the JAR file is calculated
    and added to the JAD file. The certificate that is used for the calculation is
    added to the JAD file, too. The JAR file itself is not changed and must not be
    modified afterward.


    For testing purposes, you do not need to purchase a certificate. Such MIDlets
    cannot be installed on real devices, however, unless you manage to import the
    certificate on your device.


    This seems to be difficult, to say the least. Generate a temporary key with Java’s
    keytool on the command line:


    > keytool -genkey -alias SignMIDlet -keystore midlets.ks -keyalg RSA You can now
    sign your MIDlet using the <sign> element, which is nested in the <build> section,
    as shown in Listing 7-18\. This example assumes you have purchased and imported
    an appropriate certificate into the keystore named *midlets.ks* with the key named
    SignMIDlet.


    **Listing 7-18.** *Signing MIDlets*


    <j2mepolish>


    <info


    license="GPL"


    5033CH07.qxd 6/17/05 11:50 AM Page 78


    **78**


    C H A P T E R 7 ■ B U I L D I N G A P P L I C AT I O N S


    vendorName="A reader."


    version="0.0.1"


    jarName="${polish.vendor}-${polish.name}-roadrunner.jar"


    **permissions="javax.microedition.io.Connector.http"**


    **optionalPermissions="javax.microedition.io.Connector.bluetooth.client"**


    />


    <deviceRequirements>


    <requirement name="Identifier" value="Generic/midp2" />


    </deviceRequirements>


    <build>


    <midlet class="com.apress.roadrunner.Roadrunner" />


    **<sign**


    **keystore="midlets.ks"**


    **key="SignMIDlet"**


    **password="${password}"**


    **/>**


    </build>


    <emulator />


    </j2mepolish>


    The application is signed only when the current device supports the MIDP 2.0 standard.


    It is assumed that the *midlets.ks* keystore is situated in the same directory
    as the *build.xml* file.


    Please note that the password is specified using an Ant property in Listing 7-18\.
    You can define this property on the command line using the -Dpassword=[value]
    option:


    > ant -Dpassword=secret


