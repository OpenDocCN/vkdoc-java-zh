- fmt: "### **Listing 12-37.** *Achieving a Tabular Arrangement with the `min-width`\
    \ and `max-width` CSS Attributes*\n\n```\n.inputField {\n  min-width: 110;\n \
    \ max-width: 110;\n}\n\nlabel {\n  min-width: 52;\n  max-width: 52;\n}\n```\n\n\
    ![Image 39](index-230_1.jpg)\n\n5033CH12.qxd 6/20/05 11:31 AM Page 208\n\n**208**\
    \  \nC H A P T E R 1 2 ■ W O R K I N G W I T H T H E G U I\n\n### **dropping View**\n\
    \nThe dropping view shows an animation of dropping and bouncing items. You can\
    \ activate it by setting the `view-type` to `dropping`. Table 12-15 lists all\
    \ additional attributes of this view.\n\n**Table 12-15.** *Additional Attributes\
    \ of the `dropping` View Type*\n\n| Attribute | Required? | Explanation |\n| ---\
    \ | --- | --- |\n| `droppingview-speed` | No | The speed in pixels per animation\
    \ step. The default speed is 10. |\n| `droppingview-repeat-animation` | No | Defines\
    \ whether the animation should be repeated each time the screen is shown. Possible\
    \ values are `true` and `false`. This defaults to `false`. |\n| `droppingview-maximum`\
    \ | No | The maximum bouncing height in pixels. This defaults to 30. |\n| `droppingview-damping`\
    \ | No | The value by which the maximum is decreased for each following item.\
    \ By having a damping, the top items seem to bounce higher than lower ones. The\
    \ default damping is 10. |\n| `droppingview-maxperiode` | No | The maximum allowed\
    \ number of bounces. This defaults to 5. |\n\nListing 12-38 shows how to use the\
    \ dropping view for your main screen, and Figure 12-17 shows it in action.\n\n\
    **Listing 12-38.** *Using the `dropping` View for Your Main Screen*\n\n```\n.mainScreen\
    \ {\n  padding-left: 5;\n  padding-right: 5;\n  view-type: dropping;\n  droppingview-speed:\
    \ 15;\n  droppingview-damping: 5;\n  droppingview-maxperiode: 2;\n}\n```\n\n![Image\
    \ 40](index-231_1.jpg)\n\n5033CH12.qxd 6/20/05 11:31 AM Page 209\n\nC H A P T\
    \ E R 1 2 ■ W O R K I N G W I T H T H E G U I **209**\n\n### **shuffle View**\n\
    \nThe shuffle view animates the items by moving them from the left and right side\
    \ into their final target position. Activate it by setting the `view-type` attribute\
    \ to `shuffle`. This view supports the additional attributes listed in Table 12-16.\n\
    \n**Table 12-16.** *Additional Attributes of the `shuffle` View Type*\n\n| Attribute\
    \ | Required? | Explanation |\n| --- | --- | --- |\n| `shuffleview-speed` | No\
    \ | The speed in pixels per animation step. The default speed is 10. |\n| `shuffleview-repeat-animation`\
    \ | No | Defines whether the animation should be repeated each time the screen\
    \ is shown. Possible values are `true` and `false`. This defaults to `false`.\
    \ |\n\nListing 12-39 shows how to use the shuffle view, and Figure 12-18 gives\
    \ you an idea of what it looks like.\n\n**Listing 12-39.** *Using the `shuffle`\
    \ View Type for Your Main Screen*\n\n```\n.mainScreen {\n  padding-left: 5;\n\
    \  padding-right: 5;\n  view-type: shuffle;\n  shuffleview-speed: 15;\n}\n```\n\
    \n**Figure 12-18.** *The shuffle view in action*\n\n### **midp2 View**\n\nThe\
    \ midp2 view arranges the items just like the MIDP 2.0 standard encourages it:\
    \ the items are all lined up into one row until there is not enough space anymore\
    \ or until an item with a `newline-after` or `newline-before` layout is inserted.\
    \ Since this often leads to cluttered and untidy interfaces, J2ME Polish usually\
    \ puts each item on its own line (or cell when columns are used). The MIDP 2.0\
    \ arrangement has, however, one important advantage: you can view more content\
    \ per screen. You can activate the midp2 view by specifying the `midp2` view-type.\n\
    \nThis view supports no additional attributes. Figure 12-19 shows it on a Form.\n\
    \n**Figure 12-19.** *The midp2 view in action*\n\n### Designing the Scroll Indicator\n\
    \nThe scroll indicator displays at the bottom of a screen whenever there are more\
