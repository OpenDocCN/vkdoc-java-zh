- fmt: '# CHAPTER 15 ■ DANCING AROUND DEVICE LIMITATIONS


    ## Using the Low-Level GUI


    The low-level GUI API allows you to control every detail of the user interface
    but brings along the burden of having to manage every detail yourself, including
    scrolling, handling events, and, most of all, painting the user interface.


    ## Custom Items


    On MIDP 2.0 devices you can also mix the low- and high-level GUI API with the
    `javax.microedition.lcdui.CustomItem` class. Depending on the target device, you
    can even receive key events for complex interactions with your `CustomItem`. The
    only mandatory functionality is, however, to display the contents of your `CustomItem`,
    so you cannot rely on any advanced interaction modes. You are not restricted,
    however, when you use the J2ME Polish GUI, which supports the same interaction
    modes and forwards key- and pointer-pressed events on every target device.


    ## Soft Keys


    Soft keys are not standardized, so you will encounter different keycodes between
    different vendors. The device database contains the keycodes for most devices;
    Listing 15-10 demonstrates how to use the information with a bit of preprocessing.
    When `polish.key.LeftSoftKey` is not defined, assume that the appropriate keycode
    is `-6`. The default keycode for the right soft key is `-7`. In the `keyPressed()`
    method, you first check whether one of the soft keys has been pressed, before
    you get the game action. This is a defensive programming technique because some
    devices throw `IllegalArgumentExceptions` when a soft key value is given to the
    `getGameAction()` method.


    **Listing 15-10.** *Using the Correct Keycodes for the Soft Keys*


    ```

    package com.apress.preprocessing;


    import javax.microedition.lcdui.*;


    public class MyCanvas extends Canvas {


    //#ifdef polish.key.LeftSoftKey:defined

    //#= private static final int LEFT_SOFT_KEY = ${polish.key.LeftSoftKey};

    //#else

    private static final int LEFT_SOFT_KEY = -6;

    //#endif


    //#ifdef polish.key.RightSoftKey:defined

    //#= private static final int RIGHT_SOFT_KEY = ${polish.key.RightSoftKey};

    //#else

    private static final int RIGHT_SOFT_KEY = -7;

    //#endif


    public void keyPressed( int keyCode ) {

    if ( keyCode == LEFT_SOFT_KEY ) {

    // process left soft key

    } else if ( keyCode == RIGHT_SOFT_KEY ) {

    // process right soft key

    } else {

    int gameAction = getGameAction( keyCode );

    // process key pressed event...

    }

    }


    protected void paint( javax.microedition.lcdui.Graphics graphics ) {

    }

    }

    ```


    Some devices do not produce any key events when soft keys are pressed. In that
    case, you can sometimes add empty and thus invisible commands, mostly one `Command.BACK`
    type and one `Command.SCREEN` type, so that both keys have an associated command.
    You can then process these commands in the `commandAction()` method of the `CommandListener`.


    ## Networking


    Networking allows you to interact with the outside world. On MIDP platforms, you
    have a different range of possible techniques, such as text messaging (SMS), Bluetooth,
    and HTTP.


    ### Short Message Service


    The short message service (SMS) allows you to send text messages up to a length
    of 160 characters from your mobile device. You can use the Wireless Messaging
    API (WMAPI, JSR 120) for sending and receiving text messages. The WMAPI 2.0 (JSR
    205) also supports multimedia messages (MMS).


    A potential problem for wireless messages is the running time, which can vary
    greatly. Also, you have no guarantee that the message is really delivered. In
    general, SMS is, however, an easy and reliable communication protocol.


    ### Bluetoothing


    Bluetooth allows you to connect other Bluetooth-enabled devices directly. This
    kind of connection is great for exchanging information ad hoc. Using the so-called
    pico networks, you can also connect to several other devices at once. Not every
    device that supports Bluetooth connections makes them available through the optional
    Bluetooth API (JSR 82), but the support is constantly growing.


    A common problem with Bluetooth is that only few devices have implemented the
    optional OBEX part in the Bluetooth API. You can create your own protocol or use
    the Avetana OBEX library (`http://sourceforge.net/projects/avetanaobex`) for exchanging
    data.


    For security reasons, most Bluetooth devices keep their ID hidden, unless the
    user requests to be "visible" explicitly. When you already know your communication
    partners, this is not a problem, but this can have serious implications when your
    application depends on discovering new devices. An example of such an application
    is a dating service that matches interests whenever it discovers another device
    that also runs this service.


    Finally, another problem is the latency of creating connections. When you have
    only a short time for making connections—for example, when users pass by each
    other—you might not be able to discover the device and establish a connection.


    ### HTTP Networking


    The Hypertext Transfer Protocol (HTTP) is the only guaranteed way to make connections
    on all devices. MIDP 2.0 devices additionally need to support HTTPS connections
    for secure communication.


    HTTP is a network-agnostic protocol, so in principle your application does not
    need to care whether the device uses WAP, TCP, GSM, GPRS, UMTS, or other network
    technology.


    When you have problems establishing a connection on a device, you should first
    check whether you are using an Internet access point or a connection through the
    WAP gateway of the carrier. Connecting through a WAP gateway often causes trouble
    when you try to connect to nonstandard ports. You should, therefore, try to use
    port `80`, `8080`, or `443` for your server application. In case you still encounter
    problems, make sure to use an Internet access point on your device. Resolving
    domain names slows down network connections and can also cause problems, so try
    to use a static IP address instead in your J2ME application. You can configure
    your application by providing the server IP address as a JAD attribute or as a
    preprocessing variable.


    The latency for network connections is quite high, often several seconds. This
    rules out complex real-time applications, such as multiplayer action games. Again,
    you might speed up latency a bit by using an IP address instead of a domain name.
    This can cause problems, however, when your sever application is relocated in
    the future.


    Since connections cost money, the device is required to ask the user for permission
    when an HTTP connection is about to be established. When the user does not allow
    the connection, a `SecurityException` is thrown. When you sign your application,
    you can use the `MIDlet-Permissions` JAD attribute for stating that your application
    needs HTTP connections to function. In that case, the user is asked only once
    during the installation. When the user declines the required resource, the application
    is not installed at all. In J2ME Polish you can use the `permissions` attribute
    of the `<info>` element for setting this JAD attribute: `<info permissions="javax.microedition.io.Connector.http"
    [...] />`.


    ## Data Protocols'
