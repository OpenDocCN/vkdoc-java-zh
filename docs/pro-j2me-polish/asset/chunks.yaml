  raw: 'Not all obfuscators can move all classes into the default package. Using the
    default package brings some additional savings, because the fully qualified class
    names are stored inside each class. You could just use the default package for
    all your classes, but this will jeopardize your architecture. J2ME Polish can
    move all classes of your application into the default package during the preprocessing
    step. Enable this option by setting the useDefaultPackage attribute of the <obfuscator>
    element to true in your *build.xml* script. Remember that this approach requires
    you to use unique class names for all your Java source files.


    In the packaging step, all class files and resources are bundled into one JAR
    file. J2ME Polish uses the default Java ZIP algorithm for packaging the files.
    Depending on your application and your target devices, you might want to use a
    different packager. Please refer to the “Packaging Applications” section of Chapter
    7 to learn more about your options. Keep in mind that using optimized ZIP-compatible
    algorithms might result in problems during the installation, so implement this
    only as a last resort.


    **Summary**


    Optimizing your application is the last step for you to create a small, fast,
    working application.


    You can optimize for speed, for a reduced memory footprint, and for smaller JAR
    file sizes.


    Some optimizations are beneficial for all areas, while others contradict each
    other. You should consider possible high-level optimizations from the beginning
    and postpone low-level optimization until the end.


    In this book’s appendix, you will find details about J2ME Polish and J2ME settings
    in a condensed format.


