    **JTWI 规范与移动服务架构**


    JSR 185，即无线行业 Java 技术（JTWI），是多家制造商共同努力的结果，旨在为 Java 应用程序开发者创造一个更可预测的环境。JSR 248，即移动服务架构（MSA），延续了
    JTWI 开始的工作，并用新技术增强了定义。


    JTWI 基于 MIDP 2.0 配置文件，并要求兼容设备至少支持无线消息 API（WMAPI 1.1），并且在适用但可选的情况下支持移动媒体 API（MMAPI
    1.1）。JTWI 还澄清了 CLDC 和 MIDP 规范中一些存在解释空间的部分，包括以下内容：


    • 兼容实现至少支持十个并行线程。


    • `System.currentTimeMillis()` 的时钟分辨率应为 40 毫秒或更短。


    • 支持基本拉丁语和拉丁语-1 字符。


    • 可以支持自定义的 GMT 兼容时区。


    • JAR 文件至少支持到 64KB，JAD 文件至少可以为 5KB。


    • 在兼容 JTWI 的手机的记录管理系统中，MIDlet 至少可以占用 30KB 的数据。


    • MIDlet 可用的堆大小至少为 256KB。


    • 屏幕尺寸至少为 125✕125 像素，颜色深度至少为每像素 12 位（4,096 种颜色）。


    • 支持 JPEG 和 PNG 图像。


    • 需要支持 HTTP 1.1 以检索多媒体内容。


