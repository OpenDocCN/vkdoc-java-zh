    Foreword


    **S**o, you are a developer, you write applications for mobile devices, and you’ve
    been asked by a network operator to get your application working on their list
    of preferred devices, otherwise they won’t deal with you. That all sounds familiar
    and, initially, it all sounds pretty easy—we are developing applications in Java,
    and as we all know, Java is platform independent and we just “write once, run
    anywhere.”


    OK, now that you’ve picked yourself up off the floor and stopped laughing after
    that statement, you’ve probably realized the big deal about writing mobile applications
    is that there are so many little differences between devices and the Java implementations
    on those devices that it’s a mammoth task to support many devices.


    How do we get around these “inconsistencies”?


    How do we avoid having device-specific source code for everything we write?


    These are among the *really* important questions for mobile application developers.
    When I started writing applications for mobile devices, we were still learning
    about these inconsistencies and still finding things that made us want to tear
    our hair out.


    I would like to suggest that your first port of call should always be the API
    specifications.


    You see, that’s why they are there: to show you exactly what *should* happen and
    how you *should* handle things—but as you know, if you sit a thousand monkeys
    in front of typewriters, you certainly don’t end up with the works of Shakespeare.
    Well, the same applies here. If you give all the device manufacturers the specifications
    for the application management software, you certainly can’t expect them to work
    in exactly the same way. (Now, I’m not saying it’s all their fault—I mean, it’s
    not always exactly the same hardware, and miracles don’t happen.) So, how *do*
    we get around these inconsistencies? Well, that’s where this book and J2ME


    Polish come in. I recommend going straight to the “Programming in the Real World”
    section and having a quick read through it. Then you should have a better appreciation
    for the problems at hand, and you’ll realize that you need some help to control
    the mass of workarounds that you’re likely to need. Of course, that help comes
    in the form of J2ME Polish, and this book explains how to use it.


    **xvi**


    5033FM.qxd 6/20/05 11:23 AM Page xvii


    ■FOREWORD


    **xvii**


    As I mentioned earlier, when I started writing mobile device applications, we
    were still figuring out the problems, and to a certain extent we still are. I
    used to have my own custom Ant scripts for individual builds of an application
    for individual devices. I just looked at one of the device benchmark sites and
    it already has results for over 400 devices! I certainly don’t want to have 400
    versions of source code for one application. I first came across J2ME Polish when
    I was looking for a better way to implement my build system, and since then I’ve
    found it to be an extremely useful addition to my entire development process.
    Tools like this are what will keep us developing applications in a reasonable
    amount of time for multiple devices, which keeps the network operators and publishers
    happy—and you want to keep them happy, because this mobile applications industry
    is one of the fastest-growing industries in the world.


    So if you want to be successful, keep your knowledge up to date, keep your eye
    on the ball, and keep enjoying the ride. J2ME Polish keeps developers happy and
    able to make everything work.


    Welcome to your world—make it a good one!


    Kirk Bateman


