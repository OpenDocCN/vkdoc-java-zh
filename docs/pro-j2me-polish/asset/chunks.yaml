    **323**


    **总结**


    现实世界中的编程与理论有所不同。遗憾的是，Java“一次编写，到处运行”的承诺尚未完全实现。在本章中，你了解了在现实世界中会遇到的困难，以及如何克服最常见的困境。此外，你现在也知道了在无法解决特定问题时该向何处寻求帮助。


    在下一章中，你将学习如何优化应用程序的性能、大小和内存使用。


