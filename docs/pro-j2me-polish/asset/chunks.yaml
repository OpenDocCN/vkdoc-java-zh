    **Using a Back Buffer in the TiledLayer**


    The TiledLayer paints several tiles on the screen and is often used to render
    the background of a game. The back buffer optimization uses an internal image
    buffer to which the tiles are painted only when they have changed. Instead of
    painting all tiles individually, the complete buffer will be painted to the screen.
    This can quite dramatically increase the speed of your game, especially in cases
    when the visible tiles are changed only occasionally.


    The drawbacks of the back buffer optimization are that it uses more memory and
    that you can’t use any transparent tiles. Therefore, you should not activate the
    back buffer optimization when any of the following apply:


    • Memory is an issue.


    • The TiledLayer is not used as the background.


    • You use several TiledLayers simultaneously.


