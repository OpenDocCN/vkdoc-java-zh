    **测试示例应用程序**


    菜单应用程序仅显示任何 J2ME 游戏的典型菜单。使用以下命令在模拟器中测试此应用程序：


    > cd C:\Programs\J2ME-Polish\samples\menu


    > ant test j2mepolish


    相应地调整路径到你的 J2ME Polish 安装目录。


    那么这里发生了什么？当调用 Ant 时，它会在当前目录中查找文件 *build.xml*（因此在此示例中使用 *samples/menu/build.xml*）。参数
    test 和 j2mepolish 表示 *build.xml* 中的目标，由 Ant 执行。test 目标将一个 Ant 属性设置为 true，该属性由
    j2mepolish 目标评估。当 test 为 true 时，J2ME Polish 将仅为单个设备构建应用程序，并在成功构建后启动相应的模拟器。如果一切顺利，你应该会看到示例应用程序（参见第
    1 章中的图 1-2）。


