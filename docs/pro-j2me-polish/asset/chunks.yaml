    **选择目标设备**


    使用 J2ME Polish，你可以一次为多个目标设备构建和优化你的应用程序。你可以通过在 *build.xml* 文件中指定目标设备的要求来做到这一点。<deviceRequirements>
    元素负责选择你的目标设备。（你将在第 7 章中了解关于为多个设备构建应用程序的所有细节。）你可以使用设备数据库中定义的任何 <capability> 或 <feature>
    来选择你的目标设备。为了演示，清单 6-6 显示了如何选择所有支持触控笔*和* MIDP 2.0 平台的设备。


    **清单 6-6.** *选择所有支持触控笔和 MIDP 2.0 平台的设备*


    <deviceRequirements>


    <requirement name="JavaPlatform" value="MIDP/2.0+" />


    <requirement name="Feature" value="hasPointerEvents" />


    </deviceRequirements>


    **为目标设备选择资源**


    J2ME Polish 可以自动为你的应用程序选择正确的资源，例如图像和声音文件。你只需将资源放在项目 *resources* 目录的相应子文件夹中。你可以将通用资源直接放入
    *resources* 文件夹，将专用资源放入 *resources/[vendor]*、*resources/[group]* 或 *resources/[vendor]/[device]*
    文件夹。然后 J2ME Polish 将选择正确版本的资源并将其包含在最终的应用程序包中。此过程的详细信息在第 7 章中描述。


    资源组装的关键是设备数据库。每个设备都属于一个供应商，并且可以属于多个隐式和显式组。J2ME Polish 总是选择最专门的资源版本，顺序如下：


    **1.** J2ME Polish 添加来自通用 *resources* 文件夹的所有资源。


    **2.** 它添加来自 *resources/[vendor-name]* 文件夹的所有资源，例如 *resources/Nokia*。


    **3.** 对于设备所属的每个显式和隐式组，它添加来自 *resources/[group]* 文件夹的所有资源。示例包括用于属于 Series 60 的设备的
    *resources/Series60*、用于颜色深度至少为 16 位每像素的设备的 *resources/BitsPerPixel.16+*，以及用于支持
    MIDI 声音格式的设备的 *resources/midi*。


    **4.** 它添加来自 *resources/[vendor]/[device]* 文件夹的所有资源，例如 *resources/Nokia/6600*
    或 *resources/Sony-Ericsson/K700*。


    在每一步中，更专门的资源会覆盖更通用的资源。例如，假设你在 *resources* 文件夹中有一个名为 *bg.png* 的背景图片，并且在 *resources/Nokia*
    和 *resources/Nokia/3230* 目录中也有。如果你为非诺基亚设备构建应用程序，则 *resources* 文件夹中的图像会被添加到 JAR
    文件中。诺基亚设备会从 *resources/Nokia* 获取图像，但诺基亚 3230 手机的应用程序会从 *resources/Nokia/3230*
    文件夹获取图像 *。*


