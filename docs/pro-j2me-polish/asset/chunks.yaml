- fmt: "# 排版后的内容\n\nAlternatively, you can set the `polish.FullScreen` preprocessing\
    \ variable, which accepts the same values as the `fullscreen` attribute. With\
    \ this mechanism, you can fine-tune the setting for different devices. Siemens\
    \ devices, for example, accept commands even in the normal full-screen mode, so\
    \ there is no need to use the menu mode for such devices. Listing 12-3 demonstrates\
    \ this.\n\n**Listing 12-3.** *Enabling the Full-Screen Mode*\n\n```\n<j2mepolish>\n\
    <info\n  license=\"GPL\"\n  name=\"Roadrunner\"\n  vendorName=\"A reader.\"\n\
    \  version=\"0.0.1\"\n  jarName=\"${polish.vendor}-${polish.name}-roadrunner.jar\"\
    \n/>\n<deviceRequirements>\n  <requirement name=\"Identifier\" value=\"Generic/midp1\"\
    \ />\n</deviceRequirements>\n<build\n  usePolishGui=\"true\"\n  fullscreen=\"\
    menu\"\n>\n  <midlet class=\"com.apress.roadrunner.Roadrunner\" />\n  <variables>\n\
    \    <!-- Use the normal fullscreen for Siemens devices -->\n    <variable\n \
    \     name=\"polish.FullScreen\"\n      value=\"true\"\n      if=\"polish.vendor\
    \ == Siemens\" />\n  </variables>\n</build>\n<emulator />\n</j2mepolish>\n```\n\
    \nSome MIDP 2.0 devices do not support the menu mode, since they do not forward\
    \ key events when a soft key is pressed. J2ME Polish determines whether a device\
    \ supports the menu mode by evaluating the device database. When the `hasCommandKeyEvents`\
    \ feature is set, the device supports the pure MIDP 2.0 menu mode. Additionally,\
    \ you can set the capabilities `key.LeftSoftKey` and `key.RightSoftKey` to define\
    \ the key codes for the soft keys (these are the values that are reported to the\
    \ `keyPressed()` method of a `Canvas`). When no keys are defined, the value `-6`\
    \ is assumed for the left soft key and the value `-7` for the right soft key.\
    \ Listing 12-4 shows the definition of the Siemens/CX65 phone that includes these\
    \ settings.\n\n**Listing 12-4.** *Support of the Full-Screen Mode Depends on Events\
    \ for the Soft Keys*\n\n```\n<device\n  supportsPolishGui=\"true\">\n  <identifier>Siemens/CX65</identifier>\n\
    \  <features>hasCommandKeyEvents</features>\n  <capability name=\"ScreenSize\"\
    \ value=\"132x176\"/>\n  <capability name=\"key.LeftSoftKey\" value=\"-1\" />\n\
    \  <capability name=\"key.RightSoftKey\" value=\"-4\" />\n</device>\n```\n\n##\
    \ Configuring Commands, Labels, and Behavior of the GUI\n\nYou can use preprocessing\
    \ variables and symbols for changing the appearance or logic of the J2ME Polish\
    \ GUI. Tables 12-1 and 12-2 list the available configuration symbols and variables\
    \ you can set in the `build.xml` file.\n\n**Table 12-1.** *Available Preprocessing\
    \ Symbols for Configuring the GUI*\n\n| Preprocessing Symbol | Explanation |\n\
    |----------------------|-------------|\n| `polish.skipArgumentCheck` | When this\
    \ symbol is defined, method arguments will not be checked. This improves the runtime\
    \ performance and the size of the application a bit. |\n\n**Table 12-2.** *Available\
    \ Preprocessing Variables for Configuring the GUI*\n\n| Preprocessing Variable\
    \ | Default | Explanation |\n|------------------------|---------|-------------|\n\
    | `polish.animationInterval` | | Defines the interval in milliseconds for animations.\
    \ |\n| `polish.classes.ImageLoader` | | Usually, J2ME Polish loads all images\
    \ from the JAR file using the `Image.createImage(String url)` method. This works\
    \ fine for most situations, but sometimes images should be retrieved from the\
    \ RMS or the Internet. In such cases, you can define the `polish.classes.ImageLoader`\
    \ variable. The given class (or static field of a class) needs to implement the\
    \ `javax.microedition.lcdui.Image loadImage(String url) throws IOException` method,\
    \ which is responsible for retrieving the image. This option is discussed in detail\
    \ in the “Loading Images Dynamically” section of Chapter 13. |\n| `polish.ChoiceGroup.suppressMarkCommands`\
    \ | `false` | A multiple `List` or `ChoiceGroup` adds the commands “Mark” and\
    \ “Unmark” by default to the menu. The names of the commands can be changed easily;\
    \ see the “Building Localized Applications” section in Chapter 7. If you want\
    \ to suppress the commands completely, the `polish.ChoiceGroup.suppressMarkCommands`\
    \ variable has to be set to `true`. |"
