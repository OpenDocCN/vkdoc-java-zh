- fmt: "# The Device Database\n\nThe device database (`http://www.j2mepolish.org/devices/issues.html`)\
    \ not only contains the capabilities and features of most J2ME devices, but it\
    \ also lists known issues associated with them. You can use this data for circumventing\
    \ known issues.\n\nAs a random example, some devices have problems when you initialize\
    \ a `DateField` with `null` instead of a `Date` instance. Specifically, the first\
    \ Nokia Series 60 devices, like the 7650 and 3650, don't allow you to change the\
    \ date when it has been initialized with `null`. Listing 8-22 shows how to check\
    \ for this error and use the current date instead of `null`.\n\n**Listing 8-22.**\
    \ *Circumventing a Problem with an Uninitialized Date for a DateField*\n\n```\n\
    DateField dateField = new DateField(\"Your Birthday:\", DateField.DATE);\n\n//#ifdef\
    \ polish.Bugs.dateFieldAcceptsNoNullDate\n\ndateField.setDate( new Date() );\n\
    \n//#endif\n```\n\n## Summary\n\nThis chapter explained how to make most of your\
    \ application by using preprocessing. J2ME Polish makes device-specific adjustments\
    \ quite easy by providing both a powerful preprocessor and an extensive device\
    \ database.\n\nThe next chapter covers the logging framework, which is realized\
    \ with preprocessing as well. It allows you to view logging messages on real devices,\
    \ and can be configured or disabled just by setting some build variables.\n\n\
    # Chapter 9: The Logging Framework\n\n**In this chapter:**\n\n- Log messages by\
    \ using the `#debug` preprocessing directive, and print the messages with `System.out.println()`.\n\
    - Specify the level of your message (`debug`, `info`, `warn`, `error`, `fatal`,\
    \ or user-defined) in the `#debug` directive.\n- Print stack traces automatically\
    \ by adding an exception as the last parameter in the `System.out.println()` call.\n\
    - Use the `<debug>` element in the `build.xml` file to control the logging framework,\
    \ including to specify different log levels for specific classes or packages (using\
    \ nested `<filter>` elements).\n- View logged messages on real devices—automatically\
    \ when an error is logged and the J2ME Polish GUI is used, or manually with the\
    \ `de.enough.polish.util.Debug` class in conjunction with the `polish.debugEnabled`\
    \ preprocessing symbol.\n- Use log handlers to process and forward log messages\
    \ to other entities.\n\nYou use logging for determining the internal application\
    \ state and to track errors. However, logging J2ME applications has some substantial\
    \ disadvantages. Logging messages requires space and runtime resources. Therefore,\
    \ logging slows down your application and increases the application size unnecessarily.\
    \ You probably won't want to leave your logging statements in your final applications\
    \ builds. Also, you can use `System.out.println()` statements for viewing log\
    \ messages in the emulator, but these remain hidden on real devices. This chapter\
    \ describes the logging framework of J2ME Polish and how it neutralizes these\
    \ disadvantages.\n\nWith the logging framework, you can enable different log levels\
    \ for specific classes and packages. When you deactivate the logging framework,\
    \ no traces are left in your application, so you don't waste resources and space.\
    \ Finally, you can view the logged messages on real devices as well as on emulators.\n\
    \n## Logging Messages\n\nYou can log a message in your application by using the\
    \ `#debug` preprocessing directive, followed by a normal `System.out.println()`\
    \ statement, as shown in Listing 9-1. All logged messages are added to an internal\
    \ log and printed on the `System.out` stream as well.\n\n**Listing 9-1.** *Logging\
    \ in an Application*\n\n```\npublic Image getImage( String url ) {\n\n    // try\
    \ to get the image from the Hashtable cache:\n    Image image = (Image) this.cache.get(\
    \ url );\n\n    if (image == null) {\n        try {\n            image = Image.createImage(\
    \ url );\n            this.cache.put( url, image );\n\n            //#debug\n\
    \            System.out.println(\"Loaded image [\" + url + \"]\" );\n\n      \
    \  } catch (IOException e) {\n\n            //#debug error\n            System.out.println(\"\
    Unable to load image [\" + url + \"]\" + e );\n        }\n    }\n\n    return\
    \ image;\n}\n```\n\nIn this example, after successfully loading an image, we issue\
    \ a simple statement that the image was loaded. You can specify the priority level\
    \ of your message in the `#debug` directive. Predefined levels are `debug`, `info`,\
    \ `warn`, `error`, and `fatal`. You can also define your own levels.\n\nThe first\
    \ `#debug` directive in Listing 9-1 does not specify a log level, so the `debug`\
    \ level is used by default. The second `#debug` directive within the `catch` branch\
    \ specifies the `error` level. You can activate specific log levels for classes\
    \ or packages in your `build.xml` script, to filter out all log messages that\
    \ have a lower priority, as explained in the \"Controlling the Logging\" section\
    \ later in this chapter.\n\nIf you add an exception as the last parameter in the\
    \ `System.out.println()` call, the logging framework will print its stack trace\
    \ automatically. In Listing 9-1, an `IOException` is caught and used as the last\
    \ parameter in the logged message:\n\n```\nSystem.out.println(\"Unable to load\
    \ image [\" + url + \"]\" + e);\n```\n\nThe logging framework recognizes that\
    \ the parameter is an exception, and the stack trace of the exception will be\
    \ printed out along with the logged message in the emulator.\n\n### Stack Traces\
    \ of Exceptions\n\nStack traces of exceptions are available only in emulators.\
    \ In real devices, sadly, stack traces are not available. You can use the verbose\
    \ debugging mode instead for tracking malfunctions. You activate this mode by\
    \ setting the `verbose` attribute of the `<debug>` element to `true`.\n\nStack\
    \ traces in emulators are resolved automatically when you install the Jad decompiler\
    \ to `${polish.home}/bin`. Usually, only the instruction offset in the bytecode\
    \ is specified by emulators; for example, `at com.company.package.YourClass.doSomething(\
    \ +20 )`. When the Jad decompiler is installed, J2ME Polish shows you the corresponding\
    \ position in the source code along with the original stack trace. You can download\
    \ Jad for free from `http://www.kpdus.com/jad.html`.\n\n## Adding Debug Code for\
    \ Specific Log Levels\n\nYou can include additional debugging code by checking\
    \ the appropriate log level in the preprocessing step. You can test for a specific\
    \ log level by checking the preprocessing symbol `polish.debug.[level-name]`.\
    \ As with the `#debug` directive, a given log level includes all higher levels\
    \ as well. So, when the `warn` level is activated for the current class, the preprocessing\
    \ symbols `polish.debug.warn`, `polish.debug.error`, `polish.debug.fatal`, and\
    \ `polish.debug.user-defined` are active.\n\nListing 9-2 demonstrates how to add\
    \ information to your application when the `info` log level is active.\n\n**Listing\
    \ 9-2.** *Benchmarking Only When the info Log Level Is Active*\n\n```\npublic\
    \ void run() {\n\n    //#if polish.debug.info\n    int numberOfFrames = 0;\n \
    \   int framesPerSecond = 0;\n    long lastFpsTime = System.currentTimeMillis();\n\
    \    //#endif\n\n    while (gameIsRunning) {\n        processUserInput();\n  \
    \      animateWorld();\n        renderWorld();\n        flushGraphics();\n\n \
    \       //#if polish.debug.info\n        numberOfFrames++;\n        if (System.currentTimeMillis()\
    \ - lastFpsTime >= 1000) {\n            lastFpsTime = System.currentTimeMillis();\n\
    \            framesPerSecond = numberOfFrames;\n            numberOfFrames = 0;\n\
    \        }\n        this.graphics.drawString( \"fps=\" + framesPerSecond, 0, 0,\
    \ Graphics.TOP | Graphics.LEFT );\n        //#endif\n    }\n}\n```\n\n## Controlling\
    \ the Logging"
