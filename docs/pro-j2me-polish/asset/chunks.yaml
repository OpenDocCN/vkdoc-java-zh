    Another important feature of Ant is the dependencies between several targets.
    Before you can deploy an application, you need to make sure it has been built
    first, for example.


    Listing 7-5 ensures this dependency.


    **Listing 7-5.** *Dependencies Between Ant Targets*


    <project name="example" default="build">


    <target name="build">


    <echo message="building application..." />


    </target>


    <target name="deploy" depends="build">


    <echo message="deploying application..." />


    </target>


    </project>


    When you call the deploy target with ant deploy, the build target executes first,
    even though you did not specify it on the command line.


    ■**Tip** The *build.xml* script is—as you probably noticed—an XML file, so you
    can use XML comments like


    <!-- invoking J2ME Polish -->. You also need to encode special characters. If
    you need to specify a quotation mark within an attribute or property, just write
    &quot; instead. If you need the ampersand character, &, use &amp;, and so on.


