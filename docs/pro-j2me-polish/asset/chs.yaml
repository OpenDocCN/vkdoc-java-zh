  **调试应用程序**


  J2ME Polish 对多设备、区域设置和混淆器的支持对于创建应用程序非常有用，但对于开发阶段来说有点重量级。幸运的是，您可以通过稍微调整 *build.xml*
  来选择轻量级的方法。


  一种实现快速构建的策略是使用条件性的 `<deviceRequirements>`、`<localization>` 和 `<obfuscation>` 元素，这些元素可以通过设置
  Ant 属性来启用和禁用。


  另一种策略是在编译器模式下使用 J2ME Polish。在这种情况下，J2ME Polish 仅预处理、编译并可能预验证应用程序。此方法对于将 J2ME Polish
  与 IDE 或 IDE 插件（如 EclipseME）集成非常有用。


  如果您想调试由 J2ME Polish 编译的应用程序，您需要启用 `<debug>` 元素，以便在 class 文件中包含调试信息，例如变量名和源代码中的行号。或者，您可以提供自己的
  `<compiler>` 元素。


  在以下部分中，我将详细阐述这些策略。


  **使用条件**


  使用条件，您可以在 *build.xml* 中禁用和启用元素。您可以使用 Ant 属性 `test` 来区分测试模式和“真实”构建模式，在真实构建模式下所有内容都被激活。清单
  7-39 为您的 *build.xml* 文件提供了一个蓝图。


