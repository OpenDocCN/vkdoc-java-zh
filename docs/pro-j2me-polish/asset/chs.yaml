  \ bgColor;\n\n}\n\n\n\n背景和边框设置将由 J2ME Polish 强制执行，因此您的 CustomItem 只需绘制其内容。仅当不使用\
  \ J2ME Polish GUI 时，才需要绘制背景，如清单 13-21 所示。\n\n**清单 13-21.** *仅在未使用 J2ME Polish GUI\
  \ 时绘制 CustomItem 的背景*\n\nprotected void paint( Graphics g, int width, int height\
  \ ) {\n\n//#ifndef polish.usePolishGui\n\n// 绘制默认背景：\n\ng.setColor( this.backgroundColor\
  \ );\n\ng.fillRect( 0, 0, this.width, this.height );\n\n//#endif\n\n}\n\n**动态加载图像**\n\
  \n图片在用户界面中经常使用。通常，您只需将所有图像放入 *resources* 文件夹或其子文件夹之一，这样这些图像就会被包含在 JAR 应用程序包中（请参考第\
  \ 7 章的“资源组装”部分）。然而，在某些情况下，您可能希望从其他来源加载图像。例如，您可以从 Web 服务器加载所有图像，这样您的 JAR 文件就不包含这些文件，因此体积会更小。或者，您可以通过根据应用程序的状态交换图像来动态更改应用程序的外观。\n\
  \nJ2ME Polish 通过设置预处理变量 `polish.classes.ImageLoader` 来支持动态图像加载。您需要提供一个类（或类的静态字段），该类实现了\
  \ `javax.microedition.lcdui.Image loadImage( String url )` 方法。当未定义图像加载器时，J2ME Polish\
  \ 会直接调用 `Image.createImage( url )` 来加载图片。\n\n在清单 13-22 中，`com.apress.ui.ImageLoader`\
  \ 类从 Web 服务器加载图像并将其存储在 RecordStore 中。您还可以通过设置预处理变量 `ImageLoader.server.url` 来影响使用哪个服务器。\n\
  \n■**注意** 请注意，清单 13-22 中的代码需要一些优化：通常您应该一次性加载并存储所有图像，而不是为每个新请求的图像创建一个新的 HTTP 连接。由于图像数据是在请求*之后*才被检索和存储的，因此您需要重新启动应用程序才能看到这些图像。\n\
  \n**清单 13-22.** *实现一个从 Web 服务器获取图像的图像加载器*\npackage com.apress.ui;\n\nimport java.io.ByteArrayOutputStream;\n\
  \nimport java.io.IOException;\n\nimport java.io.InputStream;\n\nimport javax.microedition.io.Connector;\n\
  \nimport javax.microedition.io.HttpConnection;\n\nimport javax.microedition.lcdui.Image;\n\
  \nimport javax.microedition.rms.RecordStore;\n\nimport javax.microedition.rms.RecordStoreException;\n\
  \nimport javax.microedition.rms.RecordStoreNotFoundException; public final class\
  \ ImageLoader\n\nimplements Runnable {\n\n//#if ImageLoader.server.url:defined\n\
  \n//#= private final static String WEBSERVER_URL = \"${ImageLoader.server.url}\"\
  ;\n\n//#else\n\nprivate final static String WEBSERVER_URL =\n\n\"http://www.company.com/servlet/ImageProvider?img=\"\
  ;\n\n//#endif\n\nprivate final String imageUrl;\n\nprivate final String recordStoreName;\n\
  \nprivate ImageLoader( String recordStoreName, String imageUrl ) {\n\nthis.imageUrl\
  \ = imageUrl;\n\nthis.recordStoreName = recordStoreName;\n\n}\n\npublic static Image\
  \ loadImage( String url )\n\nthrows IOException\n\n{\n\nString recordStoreName =\
  \ url.substring( 1, url.length() - \".png\".length() ); try {\n\nRecordStore store\
  \ = RecordStore.openRecordStore( recordStoreName, false ); byte[] imageData = store.getRecord(\
  \ store.getNextRecordID() - 1 ); return Image.createImage( imageData, 0, imageData.length\
  \ );\n\n} catch ( RecordStoreNotFoundException e ) {\n\n// 在后台加载图像：\n\nThread thread\
  \ = new Thread(\n\nnew ImageLoader( recordStoreName, url ) );\n\nthread.start();\n\
  \nreturn null;\n\n} catch ( RecordStoreException e ) {\n\n//#debug error\n\nSystem.out.println(\
  \ \"无法从记录存储加载图像\" + e ); throw new IOException( e.toString() );\n\n}\n\n}\n\nprivate\
  \ byte[] loadImageFromHttpServer()\n\nthrows IOException\n\n{\n\ntry {\n\n\n\n```java\n\
  HttpConnection connection = (HttpConnection)\nConnector.open(\n    WEBSERVER_URL\
  \ + this.imageUrl,\n    Connector.READ_WRITE, true );\nconnection.setRequestMethod(\
  \ HttpConnection.GET );\nconnection.setRequestProperty( \"Connection\", \"close\"\
  \ );\nint responseCode = connection.getResponseCode();\nif ( responseCode == HttpConnection.HTTP_OK\
  \ ) {\n    InputStream in = connection.openInputStream();\n    ByteArrayOutputStream\
  \ out = new ByteArrayOutputStream();\n    byte[] buffer = new byte[ 5 * 1024 ];\n\
  \    int read;\n    while ( (read = in.read( buffer, 0, buffer.length ) ) != -1\
  \ ) {\n        out.write( buffer, 0, read );\n    }\n    return out.toByteArray();\n\
  } else {\n    throw new IOException( \"Got invalid response code: \" + responseCode\
  \ );\n}\n} catch ( SecurityException e ) {\n    //#debug error\n    System.out.println(\
  \ \"Not allowed to open connection\" + e );\n5033CH13.qxd 6/17/05 12:13 PM Page\
  \ 264\n**264**\n第 13 章 ■ 扩展 J2ME POLISH\n    throw new IOException( e.toString()\
  \ );\n}\n}\nprivate void storeImageInRms( byte[] data ) {\n    try {\n        RecordStore\
  \ store = RecordStore.openRecordStore(\n            this.recordStoreName, true );\n\
  \        store.addRecord( data, 0, data.length );\n    } catch ( RecordStoreException\
  \ e ) {\n        //#debug error\n        System.out.println( \"Unable to store image\
  \ in record-store [\"\n            + this.recordStoreName + \"]\" + e );\n    }\n\
  }\npublic void run() {\n    System.out.println( \"running image loader...\" );\n\
  \    try {\n        byte[] data = loadImageFromHttpServer();\n        storeImageInRms(\
  \ data );\n    } catch ( IOException e ) {\n        //#debug error\n        System.out.println(\
  \ \"Unable to load image from server [\"\n            + WEBSERVER_URL + \"]\" +\
  \ e );\n    }\n}\n}\n清单 13-23 通过在 *build.xml* 脚本中指定 `polish.classes.ImageLoader`\
