  **GPL：** 如果你想在开源 GNU 通用公共许可证 (GPL) 下发布你的 J2ME 应用程序，你应该选择 GPL 选项。当你将 J2ME Polish
  用于闭源产品的商业用途时，你也可以选择 GPL 选项，但在这种情况下，你不允许使用许多模块，如 GUI、调试框架或任何提供的客户端 API。但是，你可以使用 J2ME
  Polish 的通用构建功能，包括资源组装、多设备构建和强大的预处理工具。


  **评估：** 如果你只是想查看 J2ME Polish，请选择“评估”选项。


