  当你为特定设备开发应用程序时，你可能会遇到问题甚至设备错误。要获取关于你的目标设备的信息，请查看 *http://www.j2mepolish.org/* 上的设备数据库。*devices-overview.html*。这基本上是
  *devices.xml* 文件和相关文件的精美视图，允许你在不同的设备、组、供应商等之间轻松导航。如果你没有在线访问权限，你也可以在 *${polish.home}/doc/html/devices-overview.html*
  查看设备。


  请务必查看你的目标设备的已知问题。通常，这有助于你更快地解决任何问题。你还可以浏览所有支持你的应用程序所需 API 的设备，这在规划应用程序架构时非常重要。


