  \n**配置应用程序**\n\n大多数开发者使用 JAD 文件来存储配置设置，并通过 `MIDlet.getAppProperty ( *String key*\
  \ )` 来检索这些设置。正如你在第 7 章中学到的，J2ME Polish 支持使用 `<jad>` 元素来设置 JAD 属性。这种方法的优点是你可以稍后轻松更改设置，但它也有几个关键缺点：\n\
  \n5033CH08.qxd 6/17/05 12:06 PM Page 120\n\n**120**\n\n第 8 章 ■ 预处理\n\n• 你需要额外的处理时间和代码来在运行时确定配置。\n\
  \n• 一些设备在安装后会删除 JAD 文件及其所有设置。\n\n• 恶意用户可以轻易拦截和更改 JAD 文件。\n\n作为替代方案，你可以使用预处理来配置你的应用程序。在\
  \ `build.xml` 文件中使用 `<variable>` 元素指定你的配置设置：\n\n<variable name=\"config.BaseUrl\"\
  \ value=\"http://www.specific.com\" /> 现在你可以使用 `#=` 指令来使用这些变量。最佳实践是在未指定设置时使用默认值。如清单\
  \ 8-20 所示，你可以通过测试 `[ *变量名*]:defined` 预处理符号来检查变量是否已定义，该符号会自动为所有变量定义。\n\n**清单 8-20.**\
  \ *使用预处理配置应用程序*\n\n//#ifdef config.BaseUrl:defined\n\n**//#= private static final\
  \ String BASE_URL = \"${config.BaseUrl}\";**\n\n//#else\n\nprivate static final\
  \ String BASE_URL = \"http://www.default.com\";\n\n//#endif\n\n虽然使用预处理来配置应用程序通常比使用\
  \ JAD 属性更智能，但它也有一个缺点：使用动态设置更加困难。动态生成 JAD 文件比按需构建整个应用程序更容易。动态设置的一个例子是包含客户的电话号码以便后续识别。你可以结合使用\
  \ J2ME Polish 的两种方法：对常规配置值使用预处理，对频繁更改的设置使用动态 JAD 生成。\n\n**使用硬编码值**\n\n使用设备特定的硬编码值是另一个可以通过预处理变量应对的挑战。为什么要这样做？一个原因是这种方法可以规避某些设备问题。例如，一些诺基亚设备在全屏模式下无法报告正确的画布高度，因此你需要使用正确的硬编码值。另一个原因是硬编码值可以加速你的应用程序。\n\
  \n清单 8-21 演示了当你想要使用可用屏幕宽度的三分之二来显示内容的情况。当你使用硬编码值时，Java 编译器会在编译阶段计算出正确的结果。诚然，这个例子不会显著加速你的应用程序，但它确实演示了原理。请查看设备数据库\
  \ *http://www.j2mepolish.org/devices-overview.html*，以了解更多关于目标设备可用变量的信息。\n\n5033CH08.qxd\
  \ 6/17/05 12:06 PM Page 121\n\n第 8 章 ■ 预处理\n\n**121**\n\n**清单 8-21.** *使用预处理进行硬编码变量*\n\
  \n//#ifdef polish.ScreenWidth:defined\n\n**//#= final int myMessageWidth = ${polish.ScreenWidth}\
  \ * 2 / 3;**\n\n//#else\n\nfinal int myMessageWidth = getWidth() * 2 / 3;\n\n//#endif\n\
  \n**规避已知问题**\n\n\n\n设备数据库（*http://www.j2mepolish.org/devices/issues.html*）不仅包含大多数\
  \ J2ME 设备的功能和特性，还列出了与这些设备相关的已知问题。你可以利用这些数据来规避已知问题。\n\n举个随机示例，某些设备在将 `DateField`\
  \ 初始化为 `null` 而非 `Date` 实例时会出现问题。具体来说，早期的诺基亚 Series 60 设备（如 7650 和 3650）不允许你在日期被初始化为\
  \ `null` 后修改日期。清单 8-22 展示了如何检查此错误，并使用当前日期代替 `null`。\n\n**清单 8-22.** *规避 DateField\
  \ 未初始化日期的问题* DateField dateField = new DateField(\"您的生日:\", DateField.DATE);\n\n\
  //#ifdef polish.Bugs.dateFieldAcceptsNoNullDate\n\ndateField.setDate( new Date()\
  \ );\n\n//#endif\n\n**总结**\n\n本章讲解了如何通过预处理充分利用你的应用程序。J2ME Polish 通过提供强大的预处理器和广泛的设备数据库，使设备特定的调整变得非常容易。\n\
  \n下一章将介绍日志框架，该框架同样通过预处理实现。它允许你在真实设备上查看日志消息，并且只需设置一些构建变量即可配置或禁用日志。\n\n5033CH08.qxd\
  \ 6/17/05 12:06 PM 第 122 页\n\n5033CH09.qxd 6/17/05 12:09 PM 第 123 页\n\n第 9 章\n\n\
  ■ ■ ■\n\n日志框架\n\n**本章内容：**\n\n• 使用 `#debug` 预处理指令记录日志消息，并通过 `System.out.println()`\
  \ 打印消息。\n\n• 在 `#debug` 指令中指定消息的级别（debug、info、warn、error、fatal 或用户自定义）。\n\n• 通过在\
  \ `System.out.println()` 调用中添加异常作为最后一个参数，自动打印堆栈跟踪。\n\n• 使用 `build.xml` 文件中的 `<debug>`\
  \ 元素控制日志框架，包括为特定类或包指定不同的日志级别（使用嵌套的 `<filter>` 元素）。\n\n• 在真实设备上查看记录的日志消息——当记录错误且使用\
  \ J2ME Polish GUI 时自动显示，或通过 `de.enough.polish.util.Debug` 类结合 `polish.debugEnabled`\
  \ 预处理符号手动查看。\n\n• 使用日志处理器将日志消息处理并转发给其他实体。\n\n你使用日志来确定应用程序的内部状态并跟踪错误。然而，在 J2ME 应用程序中记录日志存在一些显著的缺点。日志消息需要空间和运行时资源。因此，日志会降低应用程序速度，并增加不必要的应用程序大小。你可能不希望将日志语句保留在最终构建的应用程序中。此外，你可以使用\
  \ `System.out.println()` 语句在模拟器中查看日志消息，但这些消息在真实设备上是隐藏的。本章介绍 J2ME Polish 的日志框架，以及它如何消除这些缺点。\n\
  \n借助日志框架，你可以为特定类和包启用不同的日志级别。当你停用日志框架时，应用程序中不会留下任何痕迹，因此不会浪费资源和空间。最后，你可以在真实设备和模拟器上查看记录的日志消息。\n\
  \n**记录日志消息**\n\n你可以使用 `#debug` 预处理指令，后跟一个普通的 `System.out.println()` 语句，在应用程序中记录日志消息，如清单\
  \ 9-1 所示。所有记录的日志消息都会添加到内部日志中，并同时打印到 `System.out` 流中。\n\n.\n\n**123**\n\n5033CH09.qxd\
  \ 6/17/05 12:09 PM 第 124 页\n\n**124**\n\n第 9 章 ■ 日志框架\n\n**清单 9-1.** *在应用程序中记录日志*\n\
  \npublic Image getImage( String url ) {\n\n// 尝试从 Hashtable 缓存中获取图像：\n\nImage image\
  \ = (Image) this.cache.get( url );\n\nif (image == null) {\n\ntry {\n\nimage = Image.createImage(\
  \ url );\n\nthis.cache.put( url, image );\n\n**//#debug**\n\n**System.out.println(\"\
  已加载图像 [\" + url + \"]\" );**\n\n} catch (IOException e) {\n\n**//#debug error**\n\
  \n**System.out.println(\"无法加载图像 [\" + url + \"]\" + e );**\n\n}\n\n}\n\nreturn image;\n\
  \n}\n\n在此示例中，成功加载图像后，我们发出一个简单的语句，表明图像已加载。你可以在 `#debug` 指令中指定消息的优先级级别。预定义的级别包括 debug、info、warn、error\
  \ 和 fatal。你也可以定义自己的级别。\n\n清单 9-1 中的第一个 `#debug` 指令未指定日志级别，因此默认使用 debug 级别。catch\
  \ 分支中的第二个 `#debug` 指令指定了 error 级别。你可以在 `build.xml` 脚本中为类或包激活特定的日志级别，以过滤掉所有优先级较低的日志消息，如本章后面的“控制日志”部分所述。\n\
  \n如果你在 `System.out.println()` 调用中添加异常作为最后一个参数，日志框架将自动打印其堆栈跟踪。在清单 9-1 中，捕获了一个 `IOException`，并将其用作日志消息中的最后一个参数：\n\
  \nSystem.out.println(\"无法加载图像 [\" + url + \"]\" + e); 日志框架会识别该参数是一个异常，并在模拟器中随日志消息一起打印异常的堆栈跟踪。\n\
  \n**异常的堆栈跟踪**\n\n异常的堆栈跟踪仅在模拟器中可用。遗憾的是，在真实设备上无法获取堆栈跟踪。你可以改用详细调试模式来跟踪故障。通过将 `<debug>`\
  \ 元素的 `verbose` 属性设置为 `true` 来激活此模式。\n\n当你将 Jad 反编译器安装到 `${polish.home}/bin` 时，模拟器中的堆栈跟踪会自动解析。通常，模拟器仅指定字节码中的指令偏移量；例如，`at\
  \ com.company.package.YourClass.doSomething( +20 )`。安装 Jad 反编译器后，J2ME Polish 会显示源代码中的相应位置以及原始堆栈跟踪。你可以从\
  \ *http://www.kpdus.com/jad.html* 免费下载 Jad。\n\n5033CH09.qxd 6/17/05 12:09 PM 第 125\
  \ 页\n\n第 9 章 ■ 日志框架\n\n**125**\n\n**为特定日志级别添加调试代码**\n\n你可以通过在预处理步骤中检查适当的日志级别来包含额外的调试代码。你可以通过检查预处理符号\
  \ `polish.debug.[level-name]` 来测试特定的日志级别。与 `#debug` 指令一样，给定的日志级别包含所有更高级别。因此，当为当前类激活\
  \ warn 级别时，预处理符号 `polish.debug.warn`、`polish.debug.error`、`polish.debug.fatal` 和\
  \ `polish.debug.user-defined` 均处于活动状态。\n\n清单 9-2 演示了当 info 日志级别处于活动状态时，如何向应用程序添加信息。\n\
  \n**清单 9-2.** *仅在 info 日志级别处于活动状态时进行基准测试* public void run() {\n\n**//#if polish.debug.info**\n\
  \nint numberOfFrames = 0;\n\nint framesPerSecond = 0;\n\nlong lastFpsTime = System.currentTimeMillis();\n\
  \n**//#endif**\n\nwhile (gameIsRunning) {\n\nprocessUserInput();\n\nanimateWorld();\n\
  \nrenderWorld();\n\nflushGraphics();\n\n**//#if polish.debug.info**\n\nnumberOfFrames++;\n\
  \nif (System.currentTimeMillis() - lastFpsTime >= 1000) {\n\nlastFpsTime = System.currentTimeMillis();\n\
  \nframesPerSecond = numberOfFrames;\n\nnumberOfFrames = 0;\n\n}\n\nthis.graphics.drawString(\
  \ \"fps=\" + framesPerSecond, 0, 0, Graphics.TOP | Graphics.LEFT );\n\n**//#endif**\n\
  \n}\n\n}\n\n**控制日志**\n\n\n\n你可以通过 *build.xml* 文件中的 `<debug>` 元素来控制日志框架。你可以使用嵌套的\
  \ `<filter>` 元素为特定的类或包启用不同的日志级别，或者完全停用日志框架。例如，如果你为相应的类或包激活了错误级别，那么任何调试、信息或警告消息都不会显示。在这种情况下，只有错误、致命级别以及用户自定义级别的消息才会被实际记录。未激活的日志语句将在源代码中被注释掉，这样它们就不会消耗任何资源，因为它们不会被编译。\n\
  \n5033CH09.qxd 6/17/05 12:09 PM 第 126 页\n\n**126**\n\n第 9 章 ■ 日志框架\n\n`<debug>`\
  \ 元素嵌套在 `<j2mepolish>` 任务的 `<build>` 部分中，如代码清单 9-3 所示。该清单还包含了用于激活和停用日志框架的 `test`\
  \ 和 `init` 目标，而无需修改 *build.xml* 脚本。\n\n**代码清单 9-3.** *在 build.xml 中使用* `<debug>`\
  \ *元素控制日志框架*\n\n<project name=\"roadrunner\" default=\"j2mepolish\">\n\n<!-- 定义\
  \ J2ME Polish 的安装文件夹 -->\n\n<property name=\"polish.home\" location=\"C:\\programs\\\
  J2ME-Polish\" />\n\n<!-- 定义 WTK 的安装文件夹 -->\n\n<property name=\"wtk.home\" location=\"\
  C:\\WTK22\" />\n\n<!-- 定义 J2ME Polish 任务，classpath 请写在一行内 -->\n\n<taskdef name=\"\
  j2mepolish\"\n\nclassname=\"de.enough.polish.ant.PolishTask\"\n\nclasspath=\"${polish.home}/import/enough-j2mepolish-build.jar:\
  \ ${polish.home}/import/jdom.jar/>\n\n<!-- 启用测试模式 -->\n\n**<target name=\"test\"\
  >**\n\n**<property name=\"test\" value=\"true\" />**\n\n**<property name=\"dir.work\"\
  \ location=\"build/test\" />**\n\n**</target>**\n\n<!-- 指定默认设置 -->\n\n**<target\
  \ name=\"init\">**\n\n**<property name=\"test\" value=\"false\" />**\n\n**<property\
  \ name=\"dir.work\" location=\"build/real\" />**\n\n**</target>**\n\n<!-- 使用 J2ME\
  \ Polish 开始构建 -->\n\n<target name=\"j2mepolish\" depends=\"init\" >\n\n<j2mepolish>\n\
  \n<info\n\nlicense=\"GPL\"\n\nname=\"Roadrunner\"\n\nvendorName=\"A reader.\"\n\n\
  version=\"0.0.1\"\n\njarName=\"${polish.vendor}-${polish.name}-roadrunner.jar\"\n\
  \n/>\n\n<deviceRequirements>\n\n<requirement name=\"Identifier\" value=\"Generic/midp1\"\
  \ />\n\n</deviceRequirements>\n\n<build\n\nusePolishGui=\"true\"\n\n**workDir=\"\
  ${dir.work}\"**\n\n>\n\n<midlet class=\"com.apress.roadrunner.Roadrunner\" />\n\n\
  **<debug showLogOnError=\"true\"**\n\n**verbose=\"false\"**\n\n**level=\"error\"\
  **\n\n5033CH09.qxd 6/17/05 12:09 PM 第 127 页\n\n第 9 章 ■ 日志框架\n\n**127**\n\n**if=\"\
  test\"**\n\n**>**\n\n**<filter**\n\n**package=\"com.apress.roadrunner\"**\n\n**level=\"\
  info\"**\n\n**/>**\n\n**<filter**\n\n**class=\"com.apress.roadrunner.Roadrunner\"\
  **\n\n**level=\"debug\"**\n\n**/>**\n\n**</debug>**\n\n</build>\n\n<emulator />\n\
  \n</j2mepolish>\n\n</target>\n\n</project>\n\n`<debug>` 元素允许你指定几个选项：showLogOnError：此属性决定\
  \ J2ME Polish 在发生错误时是否自动显示日志。此设置仅在使用了 J2ME Polish GUI 并且错误被转发到日志框架时才会生效。你可以通过将异常作为最后一个参数添加到日志消息中，将任何错误传递给日志框架：`System.out.println(\"\
  Unable to do something\" + e );`。\n\nverbose：当你使用 `verbose` 属性激活详细日志记录模式时，J2ME Polish\
  \ 会在日志语句中添加当前时间（毫秒）、相应源文件的名称以及源文件中的行号。此功能有助于你在真实设备上追踪错误。\n\nlevel：你可以使用 `level`\
  \ 属性指定通用日志级别。预定义的级别有 debug、info、warn、error 和 fatal。你也可以定义并使用自己的日志级别。自定义日志级别始终具有最高的可能优先级；也就是说，其优先级高于预定义的\
  \ fatal 级别。你只需在 `#debug` 指令和接下来要描述的 `<filter>` 元素中添加自定义级别即可使用它们。\n\n<filter>：你可以通过使用嵌套的\
  \ `<filter>` 元素来微调级别设置。在每个\n\n\n\n`<filter>` 元素中，你需要指定 `package` 或 `class` 属性以及\
  \ `level` 属性。这允许你为特定的类或包分配不同的日志级别。\n\n`if` 和 `unless`：你可以通过使用 `if` 或 `unless` 属性来完全激活或停用日志框架。`if`\
  \ 属性指定了在日志应被激活时需要为 `true` 或 `yes` 的 Ant 属性。`unless` 属性指定了在日志框架应被激活时需要为 `false` 或\
  \ `no` 的 Ant 属性。\n\n当你停用日志时，J2ME Polish 会在应用编译前注释掉所有日志语句，这样你的应用中就不会留下任何日志痕迹。\n\n\
