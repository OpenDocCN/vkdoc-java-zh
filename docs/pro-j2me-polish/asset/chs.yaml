  \ != null ) {\n            // MIDlet 已被暂停：\n            this.display.setCurrent(\
  \ this.mainScreen );\n        } else {\n            // MIDlet 首次启动：\n          \
  \  try {\n                Image image = Image.createImage( \"/splash.png\" );\n\
  \                int backgroundColor = 0xFFFFFF;\n                String readyMessage\
  \ = \"按任意键继续...\";\n```\n\n\n// 将 readyMessage 设为 null 以跳转到下一个\n\n// 一旦可用即可显示。\n\
  \n5033CH16.qxd 6/17/05 12:16 PM Page 340\n\n**340**\n\n第 16 章 ■ 优化应用程序\n\nint messageColor\
  \ = 0xFF0000;\n\n**InitializerSplashScreen splashScreen = new InitializerSplashScreen\
  \ (**\n\nthis.display, image, backgroundColor, readyMessage,\n\nmessageColor, this\
  \ );\n\nthis.display.setCurrent( splashScreen );\n\n} catch ( IOException e ) {\n\
  \nthrow new MIDletStateChangeException(\n\n\"无法加载启动画面图像\" );\n\n}\n\n}\n\n}\n\n\
  **public Displayable initApp() {**\n\n// 初始化应用程序，\n\n// 例如，从记录存储中读取数据等。\n\n[...]\n\
  \n// 现在创建主菜单屏幕：\n\n// 例如：this.mainScreen = new Form( \"主菜单\" );\n\n[...]\n\nreturn\
  \ this.mainScreen;\n\n}\n\npublic void pauseApp() {}\n\npublic void destroyApp(\
  \ boolean unconditional ) {}\n\n}\n\n对于长时间的操作，例如通过网络加载数据或在记录存储中搜索数据，你应该考虑如何衡量和可视化进度。\n\
  \n最好的情况是，你事先知道操作持续多长时间以及涉及多少步骤。在这种情况下，你可以显示一个从 0% 开始到 100% 结束的进度条，例如，通过使用一个具有明确范围的\
  \ `Gauge`。请尽量使进度均匀分布，因为当进度条快速跳到 90% 然后缓慢爬完剩余部分到 100% 时，会相当令人恼火。在网络操作中，你可以传输数据的长度。在搜索记录存储时，你可以预先查询记录集的数量。\n\
  \n有时，即使你不知道所需步骤的确切数量，也可以将操作拆分为几个步骤。在这种情况下，你可以使用一个增量更新的 `Gauge` 来显示进度。\n\n当你无法确定所需时间，也无法将操作拆分为单个步骤时，你至少应该向用户提供一些操作正在进行的反馈。为此，可以使用一个持续运行的\
  \ `Gauge` 或动画。\n\n**确保响应性**\n\n当你收到关于事件（例如按键按下或命令调用）的通知时，你需要尽快将控制权返回给系统线程。例如，当你通过调用\
  \ `Display.setCurrent()` 设置当前屏幕时，屏幕要等到你的方法返回后才会显示。因此，对于持续进行的操作（如网络访问或在记录存储中存储大量数据），你需要使用后台线程。当你执行\
  \ CPU 密集型任务时，你应该在不同步骤之间暂停后台线程，以便操作系统线程有机会将事件传递给你的应用程序。\n\n**减少内存消耗**\n\n根据你的目标设备，你的应用程序可用的堆大小可能在\
  \ 200KB 到几兆字节之间。但是，当你的应用程序出现内存泄漏时，即使是几兆字节也可能不够用。此外，减少内存占用可能会提高应用程序的性能，因为垃圾回收不需要那么频繁地触发。\n\
  \n在本节中，你将首先学习如何测量应用程序的内存消耗，然后你将研究如何通过减少对象数量、使用递归以及避免内存泄漏来改善内存占用。\n\n**测量内存消耗**\n\
  \n你可以通过在 WTK 模拟器中启用 `<emulator>` 元素的 `enableMemoryMonitor` 选项来测量应用程序的内存占用，如清单 16-10\
  \ 所示。\n\n图 16-2 显示了运行中的内存监视器。\n\n**清单 16-10.** *在 WTK 模拟器中启用内存监视器*\n\n<j2mepolish>\n\
  \n<info\n\nlicense=\"GPL\"\n\nname=\"Roadrunner\"\n\nvendorName=\"一位读者。\"\n\nversion=\"\
  0.0.1\"\n\njarName=\"${polish.vendor}-${polish.name}-roadrunner.jar\"\n\n/>\n\n\
  <deviceRequirements>\n\n<requirement name=\"Identifier\"\n\nvalue=\"Generic/midp2\"\
  \ />\n\n</deviceRequirements>\n\n<build\n\nusePolishGui=\"true\"\n\n>\n\n\n\n<midlet\
  \ class=\"com.apress.roadrunner.Roadrunner\" />\n\n</build>\n\n**<emulator enableMemoryMonitor=\"\
  true\" />**\n\n</j2mepolish>\n\n再次提醒，开发机器上的内存消耗可能与实际设备上的不同。对于某些操作系统，你可以使用原生应用程序来控制\
  \ MIDlet 运行时的内存。在 Symbian 设备上，你可以使用 TaskSpy（*http://*）\n\n![图 60](img/index-364_1.jpg)\n\
  \n5033CH16.qxd 6/17/05 12:17 PM 第 342 页\n\n**342**\n\n第 16 章 ■ 优化应用程序\n\n**图 16-2.**\
  \ *使用 WTK 模拟器测量内存占用* 你也可以在应用程序中使用 `Runtime.freeMemory()` 和 `Runtime.totalMemory()`，但这些值取决于虚拟机的内存策略。使用返回值之间的差值来检测近似使用的内存：`long\
  \ usedMemory = runtime.totalMemory() - runtime.freeMemory()`。\n\n**改善内存占用**\n\n\
  你可以通过几种方式改善内存占用：减少对象数量和使用递归。同时，还应采取预防措施，防止意外产生内存泄漏。\n\n减少对象数量\n\n每个创建的对象都会减少可用内存，因此你应该致力于减少应用程序中所需对象的数量。这难道不简单吗？\n\
  \n一种策略是重用现有对象。然而，重用对象可能会引入新问题，例如即使缓存的对象不再需要，它们仍会保留在内存中。因此，在广泛采用此策略之前，请仔细考虑其影响。\n\
  \n另一种策略涉及减少临时对象的数量。这些对象通常在循环中创建；字符串操作就是一个典型的例子。字符串是不可变的，因此每次更改都需要实例化一个新的字符串。例如，考虑创建一个包含连续数字范围（如\
  \ 01234）的字符串。当你需要连接多个字符串时，通常最好使用 `StringBuffer` 而不是 `+` 运算符。清单 16-11 展示了创建包含此类数字的字符串的一个糟糕示例和一个良好示例。\n\
  \n5033CH16.qxd 6/17/05 12:17 PM 第 343 页\n\n第 16 章 ■ 优化应用程序\n\n**343**\n\n**清单 16-11.**\
  \ *通过使用 StringBuffer 代替 String 来减少临时对象数量* `public String getSlowNumberString( int\
  \ top ) {\n\nString number = \"\";\n\nfor ( int i = 0; i <= top; i++ ) {\n\nnumber\
  \ += i;\n\n}\n\nreturn number;\n\n}\n\npublic String getFastNumberString( int top\
  \ ) {\n\n// 我们假设 top 小于 10：\n\nStringBuffer number = new StringBuffer( top );\n\n\
  for ( int i = 0; i <= top; i++ ) {\n\nnumber.append( i );\n\n}\n\nreturn number.toString();\n\
  \n}`\n\n另一个容易创建不必要字符串的地方是 `Graphics.drawString()` 方法。当你在 `paint()` 方法中调用 `g.drawString(\
  \ \"Points: \" + this.points, x, y, Graphics.TOP | Graphics.LEFT )` 时，每次调用该方法都会创建一个新的临时字符串对象。更好的做法是仅在分数实际发生变化时才创建包含分数的字符串。\n\
  \n在某些情况下，将对象的创建推迟到真正需要时是值得的。这种所谓的**延迟初始化**有助于减少内存使用，但也会使应用程序逻辑复杂化，因此请谨慎使用此策略。\n\n\
  使用递归\n\n使用递归方法可以产生美观且易于理解的算法，但不幸的是，它会带来内存和性能开销。这是因为每次调用方法时，参数和状态都需要被压入虚拟机的栈中。在大多数情况下，你可以使用等效的迭代算法来代替。\n\
  \n避免内存泄漏\n\n在 Java 中，如果不取消对未使用对象的引用，可能会产生不希望的内存泄漏。当使用诸如 `Vector` 或 `Hashtable` 之类的容器来存储对象时，尤其容易发生这种情况。\n\
  \n为避免产生泄漏，在使用容器时，应始终尝试猜测并设置合适的大小，这样内部数组就不需要扩容。扩容内部数组通常涉及将所有元素从旧数组复制到新数组，因此不仅耗时，还会增加内存使用。当不再需要容器中的元素时，不要忘记将其移除。你还应该考虑尽早通过显式地将变量设置为\
  \ `null` 来取消引用。这有助于垃圾回收器判断哪些对象不再被使用且不可达。\n\n5033CH16.qxd 6/17/05 12:17 PM 第 344\
  \ 页\n\n**344**\n\n第 16 章 ■ 优化应用程序\n\n有时设备具有不同类型的内存。例如，旧的索尼爱立信设备（如 T610）区分了普通的 Java\
  \ 堆、原生 UI 堆和视频 RAM。图像被加载到视频 RAM 中，后者提供更快的访问速度，但与 Java 堆相比也更为有限。从视频 RAM 中回收图像垃圾与从普通\
  \ Java 堆内存中回收不同，因此你应该首先尝试加载那些始终会被使用的图像。\n\n当你频繁调用 `toString()` 时，使用大型 `StringBuffer`\
  \ 也可能带来问题。检索到的字符串会使用 `StringBuffer` 的完整内部数组，因此当你稍后更改缓冲区时，可能需要将内部数组复制到一个新的数组中。在这些情况下，最终你会拥有与在\
  \ `StringBuffer` 上调用 `toString()` 次数一样多的完整内部数组。\n\n许多可选 API 使用原生调用来完成其工作。由于设备缺陷，这可能会很困难，因此在使用蓝牙连接、播放音乐或查看三维图形时要格外小心。请务必研究目标设备在内存处理方面的已知问题。\n\
  \n**减小 JAR 文件的大小**\n\n最小化 JAR 文件的大小不仅可以改善下载时间，而且通常是满足目标设备限制所必需的。例如，诺基亚 Series 40\
  \ 基于 MIDP 1.0 的设备只接受最大 64KB 的 JAR 文件。\n\n在本节中，你将学习如何通过简化类模型、减小资源大小、完全移除资源以及使用第三方打包器和混淆器来减小\
  \ JAR 包的大小。\n\n**改进类模型**\n\n你可以通过最小化应用程序中类和接口的数量来改进类模型。你可以通过将相似功能分组以及移除不必要的类来实现这一点，如下面各节所述。\n\
  \n功能分组\n\n每个类都会给 JAR 文件增加开销，因为它需要在 JAR 文件中增加一个条目以及一些 Java 特定的数据（如类常量）。功能分组允许你将所需类的数量最小化。\n\
  \n一个很好的例子是仅在一个类中实现 `CommandListener`。通常，提供能够自主处理其命令和事件的专用屏幕似乎更容易。然而，这破坏了模型-视图-控制原则，因为视图（屏幕）也提供了控制（`CommandListener`）。当你仅在一个控制器类（如主\
  \ MIDlet）中处理事件时，你会同时获得几个优势：\n\n• 你将控制与视图解耦。\n\n• 你只实现一次 `CommandListener` 接口，从而节省宝贵的空间。\n\
  \n• 通常，你可以完全移除专用类，因为在许多情况下，使用和填充标准表单、列表等就足够了。\n\n5033CH16.qxd 6/17/05 12:17 PM 第\
  \ 345 页\n\n第 16 章 ■ 优化应用程序\n\n**345**\n\n注意寻找一对一类关系，即那些仅被另一个类使用的类。通常，你可以合并这些类的功能，而不会危及你的架构。\n\
  \n■**注意** 过多的分组会严重降低应用程序的可维护性和可扩展性。\n\n\n此外，某些设备对类的大小有强制限制。例如，在西门子设备上，一个类的大小不得超过\
  \ 16KB。\n\n**移除不必要的类和方法**\n\n有时你可以直接移除整个类或方法。冗余的抽象层和某些辅助类通常属于这种情况。\n\n例如，许多开发者倾向于在\
  \ MIDlet 中抽象事件处理。\n\n虽然对 J2SE 和 J2EE 应用程序来说，抽象事件处理可能是个好主意，但对于 J2ME 应用程序而言，这通常是多余的。最终，这类事件处理抽象会以某种方式镜像`javax.microedition.lcdui.CommandListener`接口的行为。请避免提供与\
  \ MIDP 标准功能相似的抽象。\n\n辅助类对于简化复杂交互非常有用，但随着时间的推移，它们往往会变得臃肿，并镜像底层功能的相同实现。\n\n一个典型的例子是用于\
  \ MMAPI 音频播放的辅助类。起初，辅助类比复杂的 MMAPI 本身更容易处理。但随着时间的推移，你会遇到需要特殊处理的情况，于是你不断为辅助类添加功能。需要反馈系统？添加一个新的事件处理接口。需要处理不同的音频源？添加额外的构造函数。最终，你会在辅助类中重新实现\
  \ MMAPI 的大部分功能。这对你自己来说可能更容易处理，但当其他程序员需要修改你的代码时会发生什么？请务必批判性地评估辅助类的必要性。\n\n如果你的辅助类仅仅是为了降低其他\
  \ API 的复杂性，请尝试移除它们。\n\n此外，不必要的辅助方法在实际代码中也屡见不鲜。例如，一个`Form`提供了向其中添加特殊项的方法，比如`public\
  \ void addChoiceGroup( String label, String[] elements )`。这看起来比创建一个新的`ChoiceGroup`再添加到`Form`中更简单。但迟早你会发现，自己又添加了`addMultipleChoiceGroup()`和`addPopupChoiceGroup()`等辅助方法。在大多数情况下，这种努力并不值得。如果任何代码看起来像是重复实现，请尝试移除它。\n\
  \n**存储数组数据**\n\n类文件内部的长数组定义会占用大量空间，因为 Java 的字节码无法直接存储数组数据。相反，每个数组元素会先被压入栈，然后存储到正确的数组位置，如清单\
  \ 16-12 所示。首先，虚拟机通过`newarray`指令分配一个新数组。然后，对于每个元素，数组索引被压入栈，例如，第一个元素使用`iconst_0`（压入整数常量\
  \ 0），第七个元素使用`bipush 6`（压入 1 字节有符号整数）。\n\n5033CH16.qxd 6/17/05 12:17 PM 第 346 页\n\
  \n**346**\n\n第 16 章 ■ 优化应用程序\n\n接着，数组元素的实际值通过`bipush`（1 字节整数值）、`sipush`（2 字节整数值）或`ldc`（从常量池加载值）压入栈。\n\
  \n最后，通过`iastore`将元素存储到已分配的数组中。\n\n**清单 16-12.** *存储简单整数数组的字节码指令*\n\n// Java 源代码指令：\n\
  \nint[] values = new int[]{ 23, 57, 23453, 2342, 232, 213, 345, 56, 6767 };\n\n\
  // 生成的字节码指令：\n\nbipush 9\n\nnewarray int[]\n\ndup\n\niconst_0\n\nbipush 23\n\niastore\n\
  \ndup\n\niconst_1\n\nbipush 57\n\niastore\n\ndup\n\niconst_2\n\nsipush 23453\n\n\
  iastore\n\ndup\n\niconst_3\n\nsipush 2342\n\niastore\n\ndup\n\niconst_4\n\nsipush\
  \ 232\n\niastore\n\ndup\n\niconst_5\n\nsipush 213\n\niastore\n\ndup\n\nbipush 6\n\
  \nsipush 345\n\niastore\n\ndup\n\nbipush 7\n\nbipush 56\n\niastore\n\ndup\n\nbipush\
  \ 8\n\nsipush 6767\n\niastore\n\n5033CH16.qxd 6/17/05 12:17 PM 第 347 页\n\n第 16 章\
  \ ■ 优化应用程序\n\n**347**\n\n数组常用于存储配置值，例如游戏关卡的设置。\n\n与其使用需要长串字节码指令的数组，你可以改用其他变量，或者将数据存储在类的外部。\n\
  \n\n\n当你将数据存储在 `String` 中而非 `int[]` 数组中时，即使需要解包并解析单个值，也可能节省空间。清单 16-13 利用了 J2ME\
  \ Polish 的 `de.enough.polish.util.TextUtil` 辅助类来拆分包含这些值的字符串。如果你的应用无论如何都会用到这个辅助类，那么通过这种方式可以最小化\
  \ JAR 文件的大小。解包并解析这个整数数组只需要 22 条指令，而直接指定包含 9 个元素的 `int[]` 数组示例则需要 38 条指令。\n\n**清单\
  \ 16-13.** *通过将数组数据存储在字符串中来节省空间*\n\n// Java 源代码指令：\n\nString value = \"23,57,23453,2342,232,213,345,56,6767\"\
  ; String[] valueChunks = TextUtil.split( value, ',' );\n\nint[] values = new int[\
  \ valueChunks.length ];\n\nfor ( int i = 0; i < values.length; i++ ) {\n\nvalues[\
  \ i ] = Integer.parseInt( valueChunks[ i ] );\n\n}\n\n// 生成的 Java 字节码指令：\n\nldc1\
  \ #75 <String \"23,57,23453,2342,232,213,345,56,6767\"> astore 4\n\naload 4\n\n\
  bipush 44\n\ninvokestatic #81 <Method String[] TextUtil.split( String, char )> astore\
  \ 5\n\naload 5\n\narraylength\n\nnewarray int[]\n\nastore 6\n\niconst_0\n\nistore\
  \ 7\n\ngoto 208\n\naload 6\n\niload 7\n\naload 5\n\niload 7\n\naaload\n\ninvokestatic\
  \ #87 <Method int Integer.parseInt( String )> iastore\n\niinc 7 1\n\n另一种既能节省空间又能获得灵活性的选择是将数据存储在实际类之外，并使用\
  \ `DataInputStream` 加载。你可以使用位于 `${polish.home}/bin` 目录下的**二进制编辑器**来方便地管理此类数据文件（参见第\
  \ 10 章）。清单 16-14 展示了如何从资源文件中加载一个整数数组。在此示例中，假设文件中的第一个 `short` 值包含了后续整数数组的长度。通过这种方式，加载整数数组只需要\
  \ 22 条指令，而直接在类中定义示例 `int[]` 数组则需要 38 条指令。当然，每个资源文件都需要额外的空间，因此将每个中等长度的数组存储在外部文件中可能弊大于利。但是，一旦数据变得复杂，你几乎肯定会从这种方法中受益。\n\
  \n**清单 16-14.** *从资源文件加载数组数据*\n\n// Java 源代码指令：\n\nInputStream is = getClass().getResourceAsStream(\
  \ \"/l1.data\" ); DataInputStream in = new DataInputStream( is );\n\nshort arrayLength\
  \ = in.readShort();\n\nint[] values = new int[ arrayLength ];\n\nfor ( int i = 0;\
  \ i < values.length; i++ ) {\n\nvalues[ i ] = in.readInt();\n\n}\n\n// 生成的 Java\
  \ 字节码指令：\n\naload_0\n\ninvokevirtual #97 <Method Class Object.getClass()> ldc1 #99\
  \ <String \"/l1.data\">\n\ninvokevirtual #105 <Method java.io.InputStream Class.getResourceAsStream(String)>\
  \ astore 7\n\nnew #107 <Class DataInputStream>\n\ndup\n\naload 7\n\ninvokespecial\
  \ #110 <Method void DataInputStream(java.io.InputStream)> astore 8\n\naload 8\n\n\
  invokevirtual #114 <Method short DataInputStream.readShort()> istore 9\n\niload\
  \ 9\n\nnewarray int[]\n\nastore 10\n\niconst_0\n\nistore 11\n\ngoto 310\n\naload\
  \ 10\n\niload 11\n\naload 8\n\ninvokevirtual #118 <Method int DataInputStream.readInt()>\
  \ iastore\n\niinc 11 1\n\n5033CH16.qxd 6/17/05 12:17 PM Page 349\n\n第 16 章 ■ 优化应用程序\n\
  \n**349**\n\n**处理资源**\n\n诸如图片或声音文件之类的资源通常占据了 JAR 文件的最大部分。在本节中，你将了解如何通过仅包含合适的资源、减小资源大小、减少资源数量以及完全移除资源来处理资源。\n\
  \n使用合适的资源\n\n你可以通过仅包含合适的资源来减小 JAR 文件的大小。为此，请使用 J2ME Polish 的自动资源组装功能。\n\n你可以通过使用合适的调色板来减小图片的大小。这还可以提高在支持颜色数少于原始图片的设备上的图片质量，因为抖动算法在不同设备上的表现不同。你可以为不同的手机包含不同版本的图片；例如，仅为支持相应颜色深度的设备包含高彩色图片。有用的资源文件夹包括\
  \ `resources/BitsPerColor.12`、`resources/BitsPerColor.16+`、`resources/ScreenSize.128x128`\
  \ 和 `resources/ScreenSize.170+x200+`。\n\n你还可以基于多个标准来包含资源，例如 `<fileset dir=\"resources/sounds\"\
  \ includes=\"*.mid\" if=\"polish.api.mmapi and polish.sound.midi\" />`。\n\n关于使用\
  \ J2ME Polish 进行资源选择的完整讨论，请参考第 7 章的“组装资源”部分。\n\n减小资源的大小\n\n资源通常包含播放或显示它们所不需要的信息，例如版权声明或注释。\n\
  \n你可以使用工具 Pngcrush ( *http://pmt.sourceforge.net/pngcrush* )、PNGOUT ( *http://advsys.net/ken/utils.htm#pngout*\
  \ ) 和 PNGGauntlet ( *http://numbera.com/software/pnggauntlet.aspx* ) 来优化 PNG 图片。这些工具会移除冗余信息，并可以将图片大小减少几个百分点。\n\
  \nMIDI 文件中也可能存在冗余信息。一些编辑器允许你编辑存储的头部信息。此外，某些 MIDI 事件，例如音色库切换，并非所有 J2ME 设备都支持，因此你可以从文件中移除这些事件。\n\
  \n■**注意** 有时移除冗余数据会*增加* JAR 文件的大小，因为 ZIP 算法无法像以前那样高效地压缩数据。任何增加可能只有几个字节，但当你的目标大小非常接近时，你可能需要注意这种影响。\n\
  \n减少资源的数量\n\n你可以通过将多个资源合并到一个文件中来减少资源的数量。当资源共享共同特性时，例如多个 PNG 文件使用相似的调色板，这可以有效地减小大小。在这种情况下，你可以创建一个包含先前所有图片的大图片。在你的应用程序中使用\
  \ `Graphics.setClip()` 机制来逐个绘制这些图片。\n\n5033CH16.qxd 6/17/05 12:17 PM Page 350\n\n\
  第 16 章 ■ 优化应用程序\n\n**350**\n\n当你将多个独立的资源存储到一个文件中时，每个资源的头部信息会重复出现，这将在你的 JAR 文件中节省一些空间。当头部信息在一个文件中重复出现时，ZIP\
  \ 算法可以更有效地压缩它们，并且存储在 JAR 文件中的每个文件都需要在 JAR 文件的内容头部中有一个条目；条目越少，文件大小就越小。\n\n移除资源\n\n\
  有时完全移除某些资源是可行的。你只需在 JAR 文件中保留最基本的资源，并在需要时下载其余部分。一个例子是只包含游戏一个关卡的资源，然后在用户完成第一关后下载后续关卡的资源。\n\
  \n**混淆和打包你的应用程序**\n\n最后但同样重要的是，你可以通过使用混淆器和专门的打包器来节省一些空间。混淆器通过重命名类并移除应用程序中未使用的代码来缩小类文件。这是一种轻松节省大量空间的方法。额外的好处是，对于任何有兴趣反编译你应用程序的恶意或好奇用户来说，你的代码将更难理解。正如你在第\
  \ 7 章的“混淆应用程序”部分所学到的，你可以在 J2ME Polish 中部署不同的混淆器——甚至可以同时使用多个混淆器。当预算紧张时，可以选择免费的 ProGuard\
  \ 混淆器，但请记住，一些商业混淆器/优化器可以产生更小的 JAR 文件。\n\n\n\n并非所有混淆器都能将所有类移动到默认包中。使用默认包可以带来一些额外的节省，因为完全限定的类名存储在每个类内部。你可以只为所有类使用默认包，但这会损害你的架构。J2ME\
  \ Polish 可以在预处理步骤中将应用程序的所有类移动到默认包中。通过在 *build.xml* 脚本中将 `<obfuscator>` 元素的 `useDefaultPackage`\
  \ 属性设置为 `true` 来启用此选项。请记住，这种方法要求你为所有 Java 源文件使用唯一的类名。\n\n在打包步骤中，所有类文件和资源都被打包到一个\
  \ JAR 文件中。J2ME Polish 使用默认的 Java ZIP 算法来打包文件。根据你的应用程序和目标设备，你可能希望使用不同的打包器。请参阅第 7\
  \ 章的“打包应用程序”部分，以了解更多关于你的选项的信息。请记住，使用优化的 ZIP 兼容算法可能会导致安装过程中出现问题，因此仅将其作为最后的手段实施。\n\
  \n**总结**\n\n优化你的应用程序是创建一个小巧、快速、可运行的应用程序的最后一步。\n\n你可以针对速度、减少内存占用和更小的 JAR 文件大小进行优化。\n\
  \n某些优化对所有方面都有益，而另一些则相互矛盾。你应该从一开始就考虑可能的高级优化，并将低级优化推迟到最后。\n\n在本书的附录中，你将找到关于 J2ME Polish\
  \ 和 J2ME 设置的详细信息，以简洁的格式呈现。\n\n5033INDEX.qxd 6/20/05 9:35 AM 第 419 页\n\n索引\n\n■**符号**\n\
