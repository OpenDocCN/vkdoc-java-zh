  <identifier> 元素通过说明供应商和设备的名称（用单个斜杠分隔）来唯一标识设备。你也可以通过用逗号分隔标识符来一次定义多个设备：


  <identifier>Sony-Ericsson/K700, Sony-Ericsson/K700i</identifier> 使用 <features> 元素来描述设备的简单布尔能力：


  <features>hasCamera, hasPointerEvents</features> 示例包括存在摄像头 (hasCamera)、支持基于笔的输入方法
  (hasPointerEvents) 以及是虚拟设备 (isVirtual)。要定义多个特性，请用逗号分隔它们。特性的行为类似于布尔变量：要么已定义（true），要么未定义（false）。


  为了定义更复杂的设备能力，你使用 <capability> 元素，它总是有一个名称和一个值：


  <capability name="ScreenSize" value="176x208"/> 像前面的元素一样，<capability> 可以包含多个值，这些值用逗号分隔：


  <capability name="JavaPackage" value="mmapi, wmapi, btapi"/> 能力的行为类似于具有值的变量。你可以定义任何类型的能力，但
  J2ME 提供了标准化的能力，如表 6-1 所列。


  ■**注意** 你可以以不同的方式定义能力。最常见的方法是使用 name 和 value 属性的简短表示法。同样有效的表示法是使用嵌套元素 <capability-name>
  和 <capability-value>。尽管这种格式冗长得多，并且不易阅读，但它确保了与 J2EE 客户端配置规范的兼容性。你可以在 *http://jcp.org/en/jsr/detail?id=124*
  找到此规范。


  你可以通过指定 <groups> 元素将设备显式添加到任何组：


  <groups>Series60</groups>


  同样，你可以通过用逗号分隔来定义多个组。这些组反过来可以定义特性和能力，这样你就不需要在相应的设备中指定这些能力。组也是 J2ME Polish 自动资源组装不可或缺的一部分。除了这些显式定义的组之外，J2ME
  Polish 还使用*隐式组*。隐式组由特定的能力形成，例如 JavaPlatform、JavaPackage 或 BitsPerColor。隐式组在构建 J2ME
  应用程序的资源组装步骤中帮助你。表 6-1 还显示了创建隐式组的能力。


