  **WTK 版本**


  有几个版本的 WTK 可用，特别是用于移动信息设备配置文件 (MIDP) 1.0 手机的旧版 1.0.4 版本和来自 2\. *x* 分支的最新版本。通常，你应该使用最新版本，但如果你愿意，也可以使用
  1.0.4 版本。主要区别在于，当你使用较旧的 WTK 时，你需要将代码编译为 Java 1.1，而当 WTK 2\. *x* 可用时，默认使用 Java 1.2。理论上，这不应该有区别，但有时你可能会遇到似乎与重载问题相关的真正令人费解的错误。在这种情况下，javac
  目标可能会产生影响，所以请记住，当你使用 WTK 2\. *x* 时可以更改它，但使用 WTK 1.0.4 时则不能。


  **Mac OS X 的 WTK**


  标准 WTK 不适用于 Mac OS X，但你可以使用 mpowers LLC 在 *http://mpowers.net/midp-osx* 提供的移植版本。为此，你还需要安装
