  \ `Background` 类来实现。\n\n**扩展日志框架**\n\n你可以通过提供自己的日志处理器来扩展 J2ME Polish 的日志框架。日志处理器继承自\
  \ `de.enough.polish.log.LogHandler` 类，并实现 `handleLog( LogEntry entry )` 方法。使用此机制来创建你自己的日志功能，例如将日志消息转发到\
  \ HTTP 服务器。\n\n5033CH13.qxd 6/17/05 12:13 PM 第 270 页\n\n**270**\n\n第 13 章 ■ 扩展 J2ME\
  \ POLISH\n\n实现日志处理器后，你需要注册并集成它。通过将日志处理器添加到 *${polish.home}/custom-extensions.xml*\
  \ 文件中进行注册，如清单 13-28 所示。\n\n**清单 13-28.** *在 custom-extensions.xml 中注册日志处理器*\n\n\
  <extension>\n\n<type>loghandler</type>\n\n<name>http</name>\n\n<clientClass>com.apress.log.HttpLogHandler</clientClass>\n\
  \n</extension>\n\n注册后，你可以通过向 *build.xml* 文件中的 `<debug>` 元素添加一个 `<handler>` 元素来集成你的日志处理器。在\
  \ `<handler>` 元素中，你只需重复注册时使用的名称。当日志处理器位于不同的项目中时，你还需要通过修改 `<source>` 元素或 `<build>`\
  \ 部分的 `sourceDir` 属性来包含该项目的源目录。清单 13-29 演示了如何包含一个日志处理器。你可以通过提供多个 `<handler>` 元素来包含任意数量的日志处理器。\n\
