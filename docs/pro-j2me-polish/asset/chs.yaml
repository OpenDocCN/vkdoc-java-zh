  设备不支持振动\" + e );\n\n}\n\n**//#endif**\n\n}\n\n**本章小结**\n\n在本章中，你了解了 J2ME Polish\
  \ 的游戏引擎，以及它如何帮助你移植游戏到 MIDP 1.0 平台。当你使用 MIDP 2.0 平台的底层图形、声音播放和设备控制功能时，需要包含一些手动调整，但除此之外，J2ME\
  \ Polish 会为你处理一切。你可以通过指定各种预处理变量来根据需求调整游戏引擎。\n\n在下一章中，你将学习如何使用 J2ME Polish 增强的 GUI。该\
  \ GUI 允许你在 MIDP 1.0 设备上使用 MIDP 2.0 高级 UI。它还能帮助你专业且出色地设计你的应用程序。\n\n5033CH11.qxd 6/17/05\
  \ 12:11 PM Page 158\n\n5033CH12.qxd 6/20/05 11:31 AM Page 159\n\n第 12 章\n\n■ ■ ■\n\
  \n使用 GUI\n\n**本章内容：**\n\n• 在深入配置和编程之前，首先了解 GUI 的概念。\n\n• 使用与 MIDP 2.0 标准完全兼容的 J2ME\
  \ Polish GUI 进行配置和编程。\n\n• 即使在 MIDP 1.0 设备上，也能使用 MIDP 2.0 特性，例如 `CustomItem` 或 `POPUP\
  \ ChoiceGroup`。\n\n• 使用简单的 CSS 文本文件在应用程序代码之外设计用户界面。\n\n图形界面是应用程序最重要的部分；事实上，它对于人们对应用程序的感知至关重要。道理很简单：创建一个美观且响应迅速的用户界面，你的应用程序就会被视为专业且优秀。然而，创建专业的\
  \ GUI 并非易事。你可以使用 `javax.microedition.lcdui` 包中所谓的高级 GUI API 来快速且可移植地构建用户界面。\n\n\n\
  \n遗憾的是，你几乎无法影响此 GUI 的呈现方式。对于 MIDP 1.0 手机，其设计完全无法更改，而 MIDP 2.0 虽然提供了一些用于修改设计的钩子，但两个版本的实现差异很大。因此，传统上你需要使用低级\
  \ GUI API 来创建美观的用户界面。不幸的是，低级 API 的实现带来了许多意外问题，因此若想让界面在所有或大多数 J2ME 设备上运行，就需要进行大量手动移植。\n\
  \n在本章中，你将学习如何为你的应用程序使用 J2ME Polish GUI。\n\n该 GUI 与标准的高级 GUI API 兼容，但允许你设计界面的每一个细节。因此，GUI\
  \ 的简易编程特性得以保留，而所有限制都被一扫而空！\n\n■**注意** 一句忠告：J2ME Polish 的 GUI 功能强大。非常强大。你可以让项目飞旋、使用脉动背景等等。但请注意，并非所有技术上炫酷的东西都适合你的用户界面。游戏当然可以使用比银行软件更花哨的元素，但始终要将应用程序的可用性牢记在心。\n\
  \n**159**\n\n5033CH12.qxd 6/20/05 11:31 AM 第 160 页\n\n**160**\n\n第 12 章 ■ 使用 GUI\
  \ **介绍界面概念**\n\nJ2ME Polish GUI 提供了一种强大且高效的方式来设计无线 Java 应用程序的用户界面。事实上，J2ME Polish\
  \ GUI 具有以下几个独特特性：\n\n• **上市时间**：J2ME Polish GUI 与标准 MIDP GUI 兼容，因此你无需学习新的 API，并且可以有选择地开启或关闭\
  \ J2ME Polish GUI。\n\n• **自动移植**：J2ME Polish 会将必要的代码“自动地”编织到你的应用程序中，因此你无需修改源代码。该\
  \ GUI 会自动规避目标设备的已知问题。\n\n• **创新设计**：该 GUI 使用位于实际应用程序源代码之外的简单文本文件进行设计。设计采用了网页标准 CSS\
  \ 的扩展版本，因此网页设计师现在可以在没有程序员帮助的情况下设计 J2ME 应用程序，而程序员则可以专注于业务逻辑。\n\n• **可定制**：另一个重要优势是，你只需更换\
  \ *polish.css* 文件和其他资源，就能为同一应用程序代码创建截然不同的设计。这意味着你可以轻松地为不同设备、供应商、设备组甚至区域设置调整所有设计，而无需更改源代码。有关示例，请参考某个示例应用程序中的\
  \ *resources/polish.css* 文件。\n\n• **灵活**：你可以通过 *build.xml* 文件和 `#style` 预处理指令来控制用户界面。\n\
  \n• **可扩展**：MIDP 2.0 GUI 的所有元素都得到支持——即使在 MIDP 1.0 设备上也是如此。因此，你可以在 MIDP 1.0 手机上使用\
  \ MIDP 2.0 特有的项目，例如 POPUP ChoiceGroup 或 CustomItem。当你使用 CustomItem 扩展 J2ME Polish\
  \ GUI 时，你会在每个目标设备上找到相同的环境，即使原生实现缺少内部遍历等重要功能。\n\nJ2ME Polish GUI 的缺点在于应用程序包的大小会增加。根据你使用的\
  \ GUI 元素和设计，你需要为 GUI 额外预留最多 30KB 的空间。现代设备，例如基于 Symbian 的设备（参见第 15 章），支持高达数兆字节的应用程序大小，因此额外的体积通常不成问题。然而，在一些较旧的设备上，情况则有所不同，例如诺基亚老旧的基于\
  \ MIDP 1.0 的 Series 40 机型，它们只接受大小不超过 64KB 的应用程序。对于此类设备，即使激活了 GUI，默认情况下也不会使用它。\n\n\
  图 12-1 展示了如何使用 J2ME Polish GUI 来创建一个“经过打磨的”应用程序。关于使用 *build.xml* 和 *polish.css*\
  \ 文件的完整且简单的示例，请参考第 7 章的“创建‘Hello, J2ME Polish World’应用程序”一节。\n\n5033CH12.qxd 6/20/05\
  \ 11:31 AM 第 161 页\n\n第 12 章 ■ 使用 GUI **161**\n\n**图 12-1.** *通过使用 build.xml 控制流程、使用源代码处理业务逻辑、以及使用\
  \ polish.css 文件设计应用程序，来创建“经过打磨的”应用程序*\n\n**控制 GUI**\n\n你可以通过 *build.xml* 文件来控制 J2ME\
  \ Polish GUI。你还可以针对特定设备有选择地激活 J2ME Polish GUI，并使用多个预处理变量来改变 GUI 的行为。\n\n**激活 GUI**\n\
  \n通过将 *build.xml* 文件中 `<build>` 元素的 `usePolishGui` 属性设置为 `true` 来激活 GUI。然后，J2ME\
  \ Polish 会自动将必要的代码编织到应用程序中。\n\n`usePolishGui` 属性接受值 `yes/true`、`no/false` 和 `always`。当设置为\
  \ `true` 或 `yes` 时，将使用该 GUI，除非目标设备不具备推荐的能力（即最大 JAR 大小大于 100KB 且每个颜色的色深至少为 8 位）。对于此类设备，将改用普通的\
  \ MIDP GUI。当该属性设置为 `always` 时，J2ME Polish GUI 将用于所有目标设备，即使它们不具备推荐的能力。\n\n清单 12-1\
  \ 为大多数设备激活了 GUI。\n\n**清单 12-1.** *在 build.xml 文件中为大多数设备激活 GUI*\n\n<j2mepolish>\n\
  \n<info\n\nlicense=\"GPL\"\n\nname=\"Roadrunner\"\n\nvendorName=\"A reader.\"\n\n\
  version=\"0.0.1\"\n\njarName=\"${polish.vendor}-${polish.name}-roadrunner.jar\"\n\
  \n/>\n\n<deviceRequirements>\n\n5033CH12.qxd 6/20/05 11:31 AM 第 162 页\n\n**162**\n\
  \n第 12 章 ■ 使用 GUI\n\n<requirement name=\"Identifier\" value=\"Generic/midp1\" />\n\
  \n</deviceRequirements>\n\n<build\n\n**usePolishGui=\"true\"**\n\n>\n\n<midlet class=\"\
  com.apress.roadrunner.Roadrunner\" />\n\n</build>\n\n<emulator />\n\n</j2mepolish>\n\
  \n或者，你可以通过定义预处理变量 `polish.usePolishGui` 来启用 J2ME Polish GUI。当你只想为选定的设备激活 GUI 时，这很有用。清单\
  \ 12-2 仅为 Series 60 设备激活了 GUI。\n\n**清单 12-2.** *仅为 Series 60 手机激活 GUI*\n\n<j2mepolish>\n\
  \n<info\n\nlicense=\"GPL\"\n\nname=\"Roadrunner\"\n\nvendorName=\"A reader.\"\n\n\
  version=\"0.0.1\"\n\njarName=\"${polish.vendor}-${polish.name}-roadrunner.jar\"\n\
  \n/>\n\n<deviceRequirements>\n\n<requirement name=\"Identifier\" value=\"Generic/midp1\"\
  \ />\n\n</deviceRequirements>\n\n<build\n\n**usePolishGui=\"false\"**\n\n>\n\n<midlet\
  \ class=\"com.apress.roadrunner.Roadrunner\" />\n\n<variables>\n\n<!-- 为 Series\
  \ 60 设备激活 GUI -->\n\n**<variable**\n\n**name=\"polish.usePolishGui\"**\n\n**value=\"\
  true\"**\n\n**if=\"polish.group.Series60\" />**\n\n</variables>\n\n**</build>**\n\
  \n<emulator />\n\n</j2mepolish>\n\n**配置 J2ME Polish GUI**\n\n你可以通过修改 *build.xml*\
  \ 文件来配置 GUI 的行为。\n\n5033CH12.qxd 6/20/05 11:31 AM 第 163 页\n\n第 12 章 ■ 使用 GUI **163**\n\
  \n使用全屏模式下的 GUI\n\nJ2ME Polish GUI 可以在 MIDP 2.0 设备以及那些提供了专有方法使用全屏模式的 MIDP 1.0 设备上使用整个屏幕。\n\
  \n你可以使用 `<build>` 元素的 `fullscreen` 属性来激活全屏模式，如清单 12-3 所示。该属性可以取值 `yes/true`、`no/false`\
  \ 或 `menu`。当应用程序使用命令时，你必须使用 `menu` 模式。在这种情况下，菜单栏将由 J2ME Polish 渲染，并且菜单可以使用 CSS 进行设计（例如，通过设置\
  \ `menubar-color` 属性或使用 `menu` 样式）。\n\n\n\n或者，你可以设置 `polish.FullScreen` 预处理变量，该变量接受与\
  \ `fullscreen` 属性相同的值。通过这种机制，你可以针对不同设备微调设置。例如，西门子设备即使在普通全屏模式下也能接受命令，因此无需为此类设备使用菜单模式。清单\
  \ 12-3 演示了这一点。\n\n**清单 12-3.** *启用全屏模式*\n\n<j2mepolish>\n\n<info\n\nlicense=\"GPL\"\
  \n\nname=\"Roadrunner\"\n\nvendorName=\"A reader.\"\n\nversion=\"0.0.1\"\n\njarName=\"\
  ${polish.vendor}-${polish.name}-roadrunner.jar\"\n\n/>\n\n<deviceRequirements>\n\
