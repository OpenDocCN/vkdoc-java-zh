  **33**


  **优化应用程序**


  当你实现并测试第一个原型时，你通常会发现需要在优化阶段修复的缺点。典型的缺点包括以下内容： **特定于设备的错误：** 你在某些设备上遇到错误，但在其他设备上没有。你可以通过使用预处理来规避特定于设备的错误来解决这些问题。第
  8 章描述了如何使用 J2ME Polish 预处理你的应用程序。在第 15 章中，你将了解在现实世界中可能遇到的问题以及如何解决它们。


  **应用程序大小：** 你的应用程序太大。通常，你可以使用自动资源组装来优化资源使用并调整应用程序的架构。第 7 章讨论了资源的自动组装。


  **应用程序性能：** 性能不如预期。你可以使用多种技术来提高应用程序的性能。第 16 章专门讨论优化策略。


  **部署应用程序**


  将你的应用程序部署到真实的手机上是你应用程序生命周期中的关键步骤。你可以使用不同的方法来安装你的应用程序，从数据线到空中下载。


  蓝牙、红外线和数据线


  安装你的应用程序的最简单方法是使用蓝牙连接，现在大多数设备都提供这种连接。通常，只需将生成的 JAR 文件（其中包含应用程序的类和资源）发送到手机即可。如何操作取决于你的操作系统和设置。通常，你只需右键单击该文件并选择“发送到蓝牙设备”或类似选项。现代设备在收到
  JAR 文件后会自动开始安装，但有时你需要查看手机的收件箱文件夹并选择发送的文件来开始安装。


  与使用蓝牙非常相似的是使用红外线连接或数据线或 USB 线。请参阅你的设备文档，了解设置此类连接的说明。


  空中下载


  部署你的 J2ME 应用程序的唯一标准化方式是空中下载 (OTA)。在这种情况下，你需要一个提供应用程序的 JAD 和 JAR 文件的 Web 服务器。


  在一个简单的情况下，你可以使用一个简单的无线标记语言 (WML) 页面，如清单 5-1 所示。该页面可以通过设备的无线应用协议 (WAP) 浏览器访问，并且只提供一个指向
  JAD 文件的链接。当设备读取 JAD 文件时，它会将控制权转发给应用程序管理系统 (AMS)。然后 AMS 会显示一些详细信息（标题、供应商和应用程序大小），并提示用户下载实际的应用程序文件
  (JAR)。


