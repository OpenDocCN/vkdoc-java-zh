  在此示例中，您有一个 `test` 目标，它将 Ant 属性 `test` 设置为 `true`，并将工作目录设置为 *build/test*。这是推荐的，因为您还启用了
  `<debug>` 模式。`<j2mepolish>` 目标依赖于 `<init>` 目标，该目标将 `test` 属性设置为 `false` 并定义另一个工作目录。当
  `<test>` 目标首先被执行时，这些属性就不能再被 `<init>` 目标更改了：


  > ant test j2mepolish


  元素 `<deviceRequirements>`、`<localization>`、`<debug>`、`<obfuscator>` 和 `<emulator>`
  都依赖于 `test` 属性。当它设置为 `true` 时，J2ME Polish 将仅为“Nokia/Series60”设备编译应用程序，仅使用英语 `en`
  区域设置，启用调试模式，跳过混淆，并在构建后启动模拟器。当 `test` 属性为 `false` 时，J2ME Polish 为所有 MIDP 2.0 设备编译应用程序；使用
  `en`、`de` 和 `fr_CA` 区域设置；禁用调试模式；并混淆应用程序。


