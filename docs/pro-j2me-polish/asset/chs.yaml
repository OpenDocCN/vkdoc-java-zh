  **使用默认包**


  当您将 MIDlet 及其相关的辅助类放入不同的包中时，您是在维护良好的架构，但您可能需要为此牺牲一些 JAR 大小。J2ME Polish 可以将您的所有类移动到空的默认包中，这可以减小
  JAR 文件的大小。您可以通过将混淆器的 `useDefaultPackage` 选项设置为 `true` 来在任何混淆器上启用此选项：`<obfuscator
  name="ProGuard" useDefaultPackage="true" />`。


  ■**警告** 在代码中使用 import 语句，而不是完全限定的类名；否则，J2ME Polish 将无法正确解析导入。因此，*不要*在不导入的情况下扩展一个类。这段代码将无法工作：`class
  MyClass extends com.company.package.OtherClass`。但这段代码是可以的：`import com.company.package.OtherClass;
  class MyClass extends OtherClass`。


  **组合多个混淆器**


  您可以通过指定多个 `<obfuscator>` 元素来同时组合多个混淆器。当您使用 `<keep>` 子元素时，只需在其中一个 `<obfuscator>`
  元素中指定即可。然后，J2ME Polish 会将一个混淆器的混淆输出用作下一个混淆器的输入。清单 7-38 将 ProGuard 混淆器与 DashO 混淆器一起使用。组合多个混淆器是否能最小化
  JAR 大小取决于混淆器和您的应用程序。在某些情况下，您最终得到的 JAR 文件甚至可能比只使用一个混淆器还要大。您的结果可能会有所不同。您可以从 *http://www.preemptive.com*
  获取 DashO 混淆器。


