  **集成二进制形式的第三方 API**


  当第三方 API 仅以二进制形式提供时，您可以使用 *build.xml* 脚本中 `<build>` 部分的 `<libraries>` 元素来集成它。此元素可以指向
  JAR 或 ZIP 文件，或指向包含第三方库（JAR 文件、ZIP 文件或 class 文件）的目录。当库位于 `${polish.home}/import`
  文件夹中时，只需给出库的名称（而不是指定完整路径）。


