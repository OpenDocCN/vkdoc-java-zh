  \n\n\n如果你想通过蓝牙将应用程序部署到 Series 40 设备上，你需要使用诺基亚开发套件。诺基亚蓝牙 API 不支持可选的 OBEX 传输。\n\n\
  Series 60\n\nSeries 60 平台不仅为诺基亚的智能手机，也为许多其他厂商（如 Sendo、西门子和松下）的智能手机提供了基础。Series 60\
  \ 平台基于 Symbian OS 6 及更高版本。屏幕尺寸为 176✕208 像素，色彩深度为每像素 16 位（65,536 色）。你可以在 *http://www.*\
  \ 找到关于 Series 60 的通用信息。\n\n*series60.com*。Series 60 手机被划分为不同的版本，这些版本反映了底层 Symbian\
  \ OS 的改进。每个版本还可以包含功能包，以提供增强功能和错误修复。\n\n第一个 Series 60 版本基于 MIDP 1.0 平台，并支持诺基亚 UI\
  \ API、移动媒体 API 和无线消息 API。一个值得注意的例外是诺基亚 7600 手机，它仅支持诺基亚 UI API。你可以通过定位虚拟的“Nokia/Series60E1”手机来为此版本构建应用：\n\
  \n<requirement name=\"Identifier\" value=\"Nokia/Series60E1\" /> 第二个 Series 60 版本分为功能包\
  \ 1、2 和 3。\n\n功能包 1 使用 MIDP 2.0 平台以及 CLDC 1.0 配置。此外，还支持移动媒体 API 1.1 和无线消息 API。使用“Nokia/\n\
  \nSeries60E2”或“Nokia/Series60E2FP1”手机来为此功能包构建你的应用：\n\n<requirement name=\"Identifier\"\
  \ value=\"Nokia/Series60E2FP1\" /> 功能包 2 使用支持浮点运算且符合 JTWI 标准的 CLDC 1.1 配置。其他功能包括\
  \ PDAAPI（FileConnection 和 PIM\n\nAPI）、对推送注册表蓝牙连接的支持，以及针对兼容 OpenGL 设备的 Mobile 3D\
  \ Graphics API。你可以使用“Nokia/Series60E2FP2”设备来为此功能包构建你的应用。\n\n功能包 3 额外支持 Web 服务 API。此外，蓝牙实现提供了用于数据交换的可选\
  \ OBEX 部分。使用“Nokia/Series60E2FP3”\n\n设备来定位支持此功能包的设备。\n\nSeries 60 的第三版引入了一些令人兴奋的新\
  \ Java 技术。它支持安全与信任 API、会话初始化 API、可缩放 2D 矢量图形 API、位置 API 和无线消息 API 2.0。使用虚拟的“Nokia/Series60E3”\n\
  \n设备来为此版本构建你的应用。\n\nSeries 60 的难点因不同版本和功能包而异。一些设备在读取蓝牙 InputStream 时存在问题，一些较旧的第二版设备缺少\
  \ Java Verified 程序使用的根证书，还有一些存在 UI 问题，例如 setCurrentItem() 方法无法正常工作。大多数 Series 60\
  \ 设备在显示新 Canvas 时都会闪烁。当显示之前显示过的 Canvas 时，会先显示一个内部缓冲区，然后才会再次调用该 Canvas 的 paint()\
  \ 方法。如果你没有使用能够自动处理此问题的 J2ME\n\nPolish GUI，你应该考虑只使用一个 Canvas\n\n5033CH15.qxd 6/20/05\
