  \ 模式下，仅使用 gauge 颜色；而 chunked 模式则将指示器分割成块。当提供了图片时，此设置将被忽略。默认值为 chunked。\n\ngauge-gap-color\n\
  \n否\n\n单个块之间间隙的颜色。仅在 chunked 模式或使用不定范围 gauge 时使用。在后一种情况下，提供的颜色将用于指示空闲状态。默认间隙颜色为白色。\n\
