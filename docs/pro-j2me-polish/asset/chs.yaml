  第 4 章


  ■ ■ ■


  将 J2ME Polish


  集成到 IDE 中


  **本章内容：**


  • 了解使用 J2ME Polish 时的常见集成问题。


  • 学习如何将 J2ME Polish 集成到 Eclipse、NetBeans、JBuilder 和 IntelliJ 中。


  你可以将 J2ME Polish 集成到任何支持 Ant 的集成开发环境 (IDE) 中，这意味着如今你可以将 J2ME Polish 集成到所有专业的 IDE
  中。在本章中，我将首先讨论你可以在每个 IDE 中设置的常见选项，然后详细讨论如何集成到 Eclipse、NetBeans 和 JBuilder 中。


  **识别常见集成问题**


  无论你使用哪种 IDE，都必须注意某些问题。我不会在每个 IDE 的讨论中重复这些问题，而是将它们总结在本节中。


  集成 J2ME Polish 的最简单方法是使用一个示例应用程序作为起点（例如，*${polish.home}/samples/menu*）。根据你的 IDE，你可以直接挂载该应用程序文件夹，或者将其复制到你的
  IDE 的工作区中。然后，你可以调用 Menu 应用程序中提供的 *build.xml* 文件，使用 J2ME Polish 构建它。如果你想启动模拟器，请在
  *build.xml* 中选择 emulator 目标。


  如果你想为现有项目使用 J2ME Polish，只需将 *${polish.home}/* 复制到你的项目文件夹中，并至少调整其中的 <midlet> 定义。你可能还想更改
  *build.xml* 文件中的 <deviceRequirements> 和 <resources> 设置。


  当你在团队中工作并使用版本控制系统（如 CVS ( *http://www.cvshome.org*)、Subversion ( *http://subversion.tigris.org*)
  等）时，请确保不要共享临时的 *build* 和 *dist* 文件夹。这些文件夹由 J2ME Polish 在构建阶段创建和使用，因此每次运行都会更改。通常，你可以通过右键单击（在
  Mac OS X 上为 Command+单击）*build* 和 *dist* 文件夹，然后选择“添加到 .cvsignore”（或类似选项）来禁用这些文件夹的共享。


