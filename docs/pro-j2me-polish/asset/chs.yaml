  **图 3-5.** *RoadRunner 游戏的主菜单* **示例应用程序错误故障排除**


  如果你在构建示例应用程序时收到错误消息，请检查你的 Ant 设置。以下是常见错误：


  **找不到命令：** 要解决此问题，请设置你的 PATH 环境变量，使其包含你的 Ant 设置的 *bin* 目录；例如，SET PATH=%PATH%;C:\ant\bin，或者在
  Unix 系统上，export PATH=$PATH:/home/ant/bin。


  **找不到 Java 编译器：** 要解决此问题，请确保你已正确设置 JAVA_HOME 环境变量（使用前面的 SET 或 export 命令）。


  **${wtk.home} 可能设置不正确：** 如果你在安装期间未正确指定 WTK 的安装目录，J2ME Polish 将报告错误的 ${wtk.home}
  属性。在这种情况下，你需要打开 *build.xml* 文件并调整此 Ant 属性；例如，<property name="wtk.home" value="C:\WTK22"
  />。


  当你从命令行调用 ant 而不带任何参数时，只会执行 j2mepolish 目标。由于 test 属性未设置为 true，J2ME Polish 将为多个目标设备创建示例应用程序，并且不会启动模拟器。在这种情况下，你将在新创建的
  *dist* 文件夹中找到创建的应用程序。


  **总结**


  借助本章的帮助，你现在已经安装了 J2ME Polish，甚至可能还安装了一些其他有用的工具。在下一章中，你将学习如何将你的 J2ME Polish 安装集成到你最喜欢的
  IDE 中。


