  \n第 9 章 ■ 日志框架\n\n你可以使用 `<debug>` 元素的 `if` 和 `unless` 属性，结合 Ant 属性的“只写一次”特性，在不修改你的\
  \ *build.xml* 脚本的情况下激活和停用日志框架。在代码清单 9-3 中，日志框架仅在 Ant 属性 `${test}` 为 `true` 时被激活。你可以通过在命令行中首先调用\
  \ test 目标来将此属性设置为 `true`：\n\nant test j2mepolish\n\n尽管 `j2mepolish` 目标随后会调用 `init`\
  \ 目标，但 `${test}` 属性不会被改变，因为 Ant 属性只能被设置一次。当 test 目标未被调用时，`${test}` 属性会在 `init` 目标中被设置为\
  \ `false`。test 和 init 目标也为 `${dir.work}` 属性设置了不同的值。此属性随后被用于设置 `<build>` 元素的 `workDir`\
  \ 属性。\n\n■**提示** 为启用了日志框架的构建使用不同的工作目录，这样 J2ME Polish 就不需要在每次构建中预处理和编译所有文件。\n\n**在真实设备上查看日志**\n\
  \n你也可以在真实设备上查看日志。日志包含所有通过 `#debug` 指令添加的消息。这对于追踪真实设备上的错误非常有用。\n\n图 9-1 显示了在诺基亚 Series\
