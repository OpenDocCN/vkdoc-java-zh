  **图 16-1.** *使用 WTK 分析器测量性能*\n\n■**注意** 分析器包含在从 1.0.4 版本开始的 WTK 中，但只有从 2.2 版本开始，你才能从\
  \ J2ME Polish 等外部程序成功调用它。请确保你使用的是较新版本的 WTK。\n\n在实际目标设备上测量性能\n\nWTK 分析器非常适合查找应用程序中的瓶颈，但不幸的是，它可能会提供误导性信息。在你的\
  \ 3GHz 机器（配备 1GB 内存）上测量性能，不一定能得出与在 200MHz 手机（配备 600KB 堆内存）上相同的结果。典型的反例是网络操作和在记录存储中持久化数据。这些操作在你的开发机器上快得惊人，但在真实设备上，\n\
  \n5033CH16.qxd 6/17/05 12:16 PM Page 328\n\n**328**\n\n第 16 章 ■ 优化应用程序\n\n你可能会遇到截然不同的处理时间。你可以在某些模拟器上配置一些与性能相关的设置，但这并不能替代在实际设备上测量性能。更糟糕的是，设备本身的性能也差异巨大。一个好的策略是确保你的应用程序在目标设备中的低端机型上也能正常运行。\n\
  \n为了在真实设备上测量性能，你可以使用 J2ME 的日志框架。\n\n\n\n与 `System.currentTimeMillis()` 方法配合使用。日志框架并非必需，但它允许你在不修改代码的情况下开启或关闭基准测试。或者，你也可以使用常规的预处理来激活或停用基准测试，但那样的话，你还需要提供自己的方式来显示测量值。\n\
  \n在对代码进行基准测试时，请尝试测试典型的真实场景。此外，你应该重复测量足够多次，以排除单次运行之间的差异。请记住，`System.currentTimeMillis()`\
  \ 方法在不同设备上的精度可能不同。在符合 JTWI (JSR 185) 规范的设备上，时钟精度为 40 毫秒或更低，因此如果可能，你的测试应该运行几秒钟。\n\
  \n清单 16-2 中的代码测量了一个典型游戏循环的性能。当基准测试激活时，`animateWorld()` 和 `renderWorld()` 会被重复执行\
  \ 100 次。这可以抵消任何异常运行的影响，并确保即使在时钟精度较低的情况下也能获得准确的计时。\n\n**清单 16-2.** *测量典型游戏循环的性能*\
