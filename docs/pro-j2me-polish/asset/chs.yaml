  第 7 章


  ■ ■ ■


  构建应用程序


  **本章内容：**


  • 了解 J2ME Polish 所基于的 Ant 的基本概念。


  • 学习从预处理到打包应用程序的各种构建阶段。


  • 学习如何为多个设备构建、创建本地化应用程序、集成第三方库以及混淆和调试你的应用程序。


  J2ME Polish 使得使用一个应用程序源代码作为基础，同时针对各种设备变得容易。这通常是必要的，因为设备可能支持 MIDP 1.0 或 MIDP 2.0
  标准、支持专有 API（如诺基亚 UI API）、支持不同的声音格式等等。


  如今，构建 J2ME 应用程序是一项相当复杂的任务。当然，应用程序需要针对正确的 Java 版本进行编译、预验证和打包，但通常还涉及其他一些步骤，例如预处理或混淆应用程序。


  J2ME Polish 的主要重点是构建 J2ME 应用程序，因此它为此提供了一个灵活而强大的框架。在下一节中，我将首先复习你的 Ant 知识；因为 J2ME
  Polish 基于 Ant，理解基本的 Ant 概念至关重要。


  随后我将讨论不同的构建阶段；然后你将学习 J2ME Polish 的各种手柄和开关。此外，在本章中，我将讨论典型的用户场景，例如为多个设备和多个区域设置构建你的应用程序。


  **Ant 速成课程**


  Apache Ant 相当谦虚地将自己描述为“……一个基于 Java 的构建工具。理论上，它有点像 Make，但没有 Make 的缺点。”1 如果你考虑可用 Ant
