  </j2mepolish>\n\n某些 MIDP 2.0 设备不支持菜单模式，因为当按下软键时，它们不会转发按键事件。J2ME Polish 通过评估设备数据库来确定设备是否支持菜单模式。当设置了\
  \ `hasCommandKeyEvents` 特性时，设备支持纯 MIDP 2.0 菜单模式。此外，你可以设置 `capabilities` 键 `key.LeftSoftKey`\
  \ 和 `key.RightSoftKey` 来定义软键的键码（这些是报告给 `Canvas` 的 `keyPressed()` 方法的值）。当未定义键时，左软键假定值为\
  \ -6，右软键假定值为 -7。清单 12-4 显示了包含这些设置的西门子/CX65 手机的定义。\n\n**清单 12-4.** *全屏模式的支持取决于软键的事件*\n\
