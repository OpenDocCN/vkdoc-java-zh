  \ null, \"Hello World\" );** append( this.textItem );\n\n}\n\n}\n\n■**提示** 即使你正在使用\
  \ J2ME Polish GUI，你也可以利用 J2ME Polish 的这种导入行为，在应用程序中使用原生的 lcdui 类。TextBox 是一个常见的例子，用于从用户处获取大量文本。在这种情况下，你很可能不想使用\
  \ J2ME Polish 实现提供的直接文本输入模式，因为用户无法使用 T9 输入法和其他原生输入辅助工具。\n\n你可以直接在字段声明中使用完全限定类名来使用原生\
  \ TextBox，例如：`javax.microedition.lcdui.TextBox nativeTextBox = new javax.microedition.lcdui.TextBox(\
  \ \"Message\", null, 500, TextField.ANY );`。\n\n**设置样式**\n\n你应该使用`#style`预处理指令来应用所需的设计样式。该指令包含一个或多个用逗号分隔的样式名称。当指定多个样式名称时，J2ME\
  \ Polish 将使用第一个可用的样式。J2ME Polish 的预处理器仅选择第一个可用的样式，并将其作为最后一个参数插入到下一行中。例如，代码清单 12-9\
  \ 使用了`.mainMenu`或`default`样式来设计一个 Form。\n\n**代码清单 12-9.** *为 Form 应用 CSS 样式*\n\n\
