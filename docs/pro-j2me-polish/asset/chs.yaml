  \n**RIM BlackBerry**\n\nResearch in Motion (RIM) 的 BlackBerry 系列凭借其集成的电子邮件推送功能，在商业解决方案中变得相当流行。您可以在\
  \ *http://www.blackberry.com/developers* 找到相当全面的信息。RIM 还在 *http://*\n\n*www.blackberry.com/developers/forum*\
  \ 维护着一个社区。\n\n5033CH15.qxd 6/20/05 9:20 AM 第 292 页\n\n**292**\n\n第 15 章 ■ 在设备限制间周旋\n\
  \nBlackBerry 通过其专有 API 扩展了 CLDC 和 MIDP 标准，允许您将应用程序紧密集成到手机中。您可以使用提供的 Java 开发环境 (JDE)\
  \ 在 Windows 下开发 BlackBerry 应用程序。\n\n这不是必需的；您也可以使用任何其他 IDE。BlackBerry 设备不接受 JAR 文件，只接受专有的\
  \ COD 文件。当您定义了指向 JDE 位置的 `blackberry.home` Ant 属性时，J2ME Polish 会自动为 BlackBerry 设备转换\
  \ JAR 文件。\n\n**其他供应商**\n\n还存在许多其他设备制造商，包括 Sanyo、Sharp 和 Palm。从它们的全球市场份额来看，它们并不扮演重要角色，但您应该根据目标市场考虑支持它们。请参考\
  \ J2ME Polish 的设备数据库，网址为 *http://*\n\n*www.j2mepolish.org/devices-overview.html*，以了解此类手机的具体信息。\n\
  \n**识别运营商**\n\n像 Vodafone、Sprint 和 T-Mobile 这样的运营商可以通过包含或停用附加库以及添加或更改根证书来修改设备。\n\
  \nVodafone ( *http://via.vodafone.com*) 非常活跃，提供了自己的 Vodafone 服务类库 (VSCL)，其中包含 3D\
  \ 和多媒体功能。在您获得有关这些机会的更多信息之前，您需要签署保密协议并与 Vodafone 建立业务关系。\n\nSprint ( *http://developer.sprintpcs.com*)\
  \ 为其手机提供了许多资源和论坛。\n\nNextel ( *http://developer.nextel.com*) 甚至提供了自己的开源 UI API (\
  \ *http://*\n\n*nextel.sourceforge.net*)，但自 2001 年以来就没有更新过。\n\nAT&T Wireless ( *http://developer.cingular.com/developer*)\
  \ 提供了一个开发者社区和 J2ME 文档。\n\nO2 ( *http://www.sourceo2.com*) 在其开发者网站上发布信息并提供论坛。\n\n\
  当您希望在其门户上营销您的应用程序时，一些运营商期望您的应用程序已通过 Java Verified 计划 ( *http://www.javaverified.com*)\
  \ 的验证。\n\n**识别平台**\n\n除了 MIDP 平台之外，还有几个类似的移动 Java 平台可用，它们与 J2ME 标准部分兼容。表 15-4 列出了最重要的平台。\n\
  \n■**提示** 从 J2ME Polish 1.3 开始，您可以为这些平台中的任何一个进行构建，甚至可以在 *${polish.home}/custom-platforms.xml*\
  \ 文件中定义其他平台。\n\n5033CH15.qxd 6/20/05 9:20 AM 第 293 页\n\n第 15 章 ■ 在设备限制间周旋\n\n**293**\n\
  \n**表 15-4.** *重要的移动 Java 平台*\n\n**平台**\n\n**区域**\n\n**特点**\n\nMIDP\n\n全球\n\n创建移动\
  \ Java 应用程序的领先标准。\n\nJTWI\n\n全球\n\n附加库和对 MIDP 2.0 标准的澄清。\n\nIMP\n\n全球\n\n创建无用户界面的嵌入式\
  \ Java 应用程序的标准。\n\nPersonal Java\n\n全球\n\n用于企业应用程序，基于 J2SE。\n\nDoJa\n\n日本\n\nNTT\
  \ DoCoMo 的 ( *http://www.nttdocomo.co.jp/english*) 移动 Java 平台。与 MIDP 标准相似但不兼容。\n\
  \nWIPI\n\n韩国\n\nWIPI 1.0 与 MIDP 1.0 兼容 90%，WIPI 1.2 与 MIDP 2.0 标准 100% 兼容。两个平台都不需要预验证。\n\
  \n**MIDP 平台**\n\n兼容 MIDP 的平台（基于 JSR 37、118 和 271）构成了绝大多数可用的移动 Java 实现。\n\nSymbian\
  \ ( *http://www.symbian.com/developer*) 提供了最广泛使用的操作系统以及 MIDP 配置文件。Symbian 的 UIQ\
  \ 2.*x* 版本还支持 Personal Java 配置文件。当前的 Symbian OS 使用 Sun 的 CLDC HI 1.1 实现，该实现具有动态自适应编译器。这个\
  \ DAC 编译器可以按需编译选定的字节码，并在方法中间热交换它。\n\nAplix 的 JBlend JVM ( *http://www.aplix.co.jp/en/jblend*)\
  \ 是日本领先的虚拟机实现，并在全球范围内使用。Sharp、Sanyo 和 Motorola 等制造商在多种设备中部署了 JBlend。Vodafone、NTT\
  \ DoCoMo 和 Sprint 等运营商也使用 JBlend。该平台支持 MIDP 1.0、MIDP 2.0 和 DoJa 配置文件以及 CLDC 1.1\
  \ 和 CLDC 1.0 配置。支持可选 API，例如移动媒体 API、无线消息 API 和移动 3D 图形 API。此外，JBlend 还支持一些运营商扩展，例如\
  \ Vodafone 的服务类库和通用 Java 服务平台。\n\n其他常见的虚拟机包括 IBM 的 WEME 虚拟机（也称为 J9，*http://www-306.ibm.com/software/wireless/weme*），用于\
  \ Palm 平台。\n\nEsmertec 的 Jbed 平台 ( *http://www.esmertec.com*) 通常用于 BREW 设备。BREW，即无线二进制运行时环境，是与\
  \ J2ME 竞争的北美标准。Tao Group 的 Intent 平台 ( *http://withintent.biz*) 主要针对 Windows 智能手机设备。\n\
  \nAMR 的 Jazelle ( *http://www.*\n\n*arm.com/products/solutions/Jazelle.html*) 与其说是一个平台，不如说是一项有趣的技术。其理念是让硬件直接解释和执行\
  \ Java 字节码。AMR 提供包含 Jazelle 技术的处理器设计。由于硬件直接嵌入在主处理器中，Jazelle 提供了高性能。\n\n5033CH15.qxd\
  \ 6/20/05 9:20 AM 第 294 页\n\n**294**\n\n第 15 章 ■ 在设备限制间周旋\n\n**DoJa 平台**\n\nDoJa（也称为\
  \ iAppli，*http://www.doja-developer.net*）是由 NTT DoCoMo 制定的事实上的日本 Java 标准。初始版本允许的\
  \ JAR 大小在 DoJa 1.0 中仅为 10KB，在 DoJa 2.5 中为 30KB。当前的 DoJa 4.0 版本支持高达 100KB 的 JAR 大小，并允许高达\
  \ 400KB 的持久数据。\n\nDoJa 构建于 CLDC 1.0 配置之上，并提供与 MIDP 类似的功能集。主要区别在于持久性机制（DoJa 只能在所谓的暂存区中存储一个大的字节数组）、应用程序生命周期和线程模型（建议在\
  \ DoJa 应用程序中仅使用单个线程）以及事件处理（DoJa 提供类似于 MIDP 2.0 GameCanvas 类的函数）。您可以在 *http://www.*\n\
  \n*doja-developer.net* 找到移植说明。\n\n\n\n■**注意** J2ME Polish 从 1.3 版本开始将支持构建 DoJa 应用程序。你可以在同一项目中，通过预处理或使用不同的源代码文件夹（在\
  \ *build.xml* 中使用 <source> 元素）来分别针对 DoJa 和 MIDP 平台。\n\n**WIPI 平台**\n\n无线互联网互操作平台（WIPI，*http://wipi.or.kr/English*）是韩国移动\
  \ Java 应用的标准。此前 BREW 标准在韩国占据主导地位，但现在所有运营商都已采用 WIPI 1.2 标准，而 WIPI 2.0 也即将推出。\n\n\
  Java 应用无需预先验证，因为字节码会先被转码为 C 源代码，随后在 WIPI 平台上编译为本机二进制代码。\n\n除此之外，其部署方式与 MIDP 标准兼容：JAR\
  \ 文件包含资源和类，JAD 文件包含描述信息。\n\nWIPI 1.2 应用基于 CLDC 1.0，并具有与 MIDP 1.0 配置文件相似的功能集。\n\n\
  WIPI 2.0 则完全兼容 CLDC 1.1 和 MIDP 2.0 标准。\n\n■**注意** 从 J2ME Polish 1.3 版本开始，你可以为 WIPI\
  \ 平台构建应用程序。\n\n**编写可移植代码**\n\n编写可移植代码是创建无线 Java 应用的主要挑战之一。但编写可移植代码是一件好事，因为你希望支持尽可能多的设备以实现最大收益。基本上，有四种策略可用于编写可移植代码：\n\
  \n5033CH15.qxd 6/20/05 9:20 AM 第 295 页\n\n第 15 章 ■ 在设备限制间游刃有余\n\n**295**\n\n• 使用最低公共标准。\n\
  \n• 使用在运行时自我调整的动态代码。\n\n• 根据目标设备使用不同的源文件。\n\n• 使用预处理。\n\n在接下来的章节中，我将讨论每种方法的优点和注意事项。J2ME\
  \ Polish GUI 使用预处理来适应不同的环境。\n\n**使用最低公共标准**\n\n使用最低公共标准使事情变得非常简单；你只需坚持使用 MIDP 1.0\
  \ 配置文件和 CLDC 1.0 配置文件即可。不幸的是，这并非全部真相。\n\n除了需要专业的用户界面和有限的功能之外，你仍然需要以某种方式规避设备缺陷。但由于你只处理可用可能性中的一小部分，或许能侥幸成功。\n\
  \n类似的策略是只针对 MIDP 2.0 设备，这正变得越来越可行，尽管支持 MIDP 1.0 的新设备仍在投放市场。\n\n然而，MIDP 2.0 技术尚不成熟，因此在不同的现有设备上表现差异很大且难以预料。设备问题不可避免。\n\
  \n使用公共标准的优势在于你只有一个应用包，因此部署应用要容易得多。但这种策略并不能减轻你的测试负担，因为你仍然需要在每个目标设备上测试你的应用。当你声称你的应用能在某款特定手机上运行，而实际上却不能时，商业关系可能会受到严重损害。\n\
  \n■**警告** 使用最低公共标准是一种有效的方法，但你也应考虑此决策的商业方面。用户可能会对“老旧”或“差劲”的应用感到失望，从而下次选择其他供应商。此外，除非你提出了革命性的新概念，否则你将很难找到营销合作伙伴。\n\
  \n**使用动态代码**\n\n动态编码是 Java 平台的主要优势之一。由于 CLDC/MIDP 平台上没有真正的反射支持，你只能使用 Class.forName()、参数和灵活的函数来实现此方法。\n\
  \n使用动态类加载的一个例子是强制性的启动画面。清单 15-2\n\n\n\n演示了当存在诺基亚 UI API 时，如何使用诺基亚的 `FullCanvas`\
  \ 实现，以及当 MIDP 2.0 API 可用时，如何调用 `setFullScreenMode()` 方法。\n\n5033CH15.qxd 6/20/05\
  \ 9:20 AM 第 296 页\n\n**296**\n\n第 15 章 ■ 在设备限制间周旋\n\n**清单 15-2.** *动态实现全屏* package\
  \ com.apress.dynamic;\n\nimport javax.microedition.lcdui.*;\n\nimport javax.microedition.midlet.*;\n\
  \npublic class GameMidlet extends MIDlet {\n\nprivate Display display;\n\npublic\
  \ GameMidlet() {\n\n}\n\npublic void startApp() {\n\nthis.display = Display.getDisplay(\
  \ this );\n\nCanvas splash;\n\n// 检查此设备是否支持 MIDP 2.0 标准：\n\ntry {\n\nClass.forName(\"\
  javax.microedition.io.PushRegistry\");\n\n// 好的，支持 MIDP 2.0 标准：\n\nsplash = (Canvas)\
  \ Class.forName\n\n(\"com.apress.dynamic.Midp2Splash\").newInstance();\n\n} catch\
  \ (Exception e) {\n\n// 不支持 MIDP 2.0 标准\n\n// 检查此设备是否支持诺基亚 UI API：\n\ntry {\n\n\
  Class.forName(\"com.nokia.mid.ui.FullCanvas\");\n\nsplash = (Canvas) Class.forName\n\
  \n(\"com.apress.dynamic.NokiaUiSplash\").newInstance();\n\n} catch (Exception e2)\
  \ {\n\n// 好的，既不支持 MIDP 2.0 也不支持诺基亚 UI API：\n\nsplash = new Midp1Splash();\n\n}\n\
  \n}\n\n// 显示启动画面：\n\nthis.display.setCurrent( splash );\n\n}\n\npublic void destroyApp(\
  \ boolean unconditional ) {\n\n}\n\npublic void pauseApp() {\n\n}\n\n}\n\n// 普通的\
  \ MIDP 1.0 启动画面：\n\npackage com.apress.dynamic;\n\nimport javax.microedition.lcdui.*;\n\
  \npublic class Midp1Splash extends Canvas {\n\npublic void paint( Graphics g ) {\n\
  \ng.drawString(\"正在启动！\", getWidth()/2, getHeight()/2, Graphics.HCENTER | Graphics.BASELINE\
  \ );\n\n5033CH15.qxd 6/20/05 9:20 AM 第 297 页\n\n第 15 章 ■ 在设备限制间周旋\n\n**297**\n\n\
  }\n\n}\n\n// MIDP 2.0 启动画面：\n\npackage com.apress.dynamic;\n\nimport javax.microedition.lcdui.*;\n\
  \npublic class Midp2Splash extends Canvas {\n\npublic void paint( Graphics g ) {\n\
  \nsetFullScreenMode( true );\n\ng.drawString(\"正在启动！\", getWidth()/2, getHeight()/2,\
  \ Graphics.HCENTER | Graphics.BASELINE );\n\n}\n\n}\n\n// 诺基亚 UI API 启动画面：\n\npackage\
  \ com.apress.dynamic;\n\nimport javax.microedition.lcdui.*;\n\nimport com.nokia.mid.ui.FullCanvas;\n\
  \npublic class NokiaSplash extends FullCanvas {\n\npublic void paint( Graphics g\
  \ ) {\n\ng.drawString(\"正在启动！\", getWidth()/2, getHeight()/2, Graphics.HCENTER |\
  \ Graphics.BASELINE );\n\n}\n\n}\n\n清单 15-2 的动态代码只有一个问题：诺基亚的 `FullCanvas` 实现在 `getHeight()`\
  \ 方法中通常不会报告正确的高度。这其实不算大问题，唯一的影响是“正在启动”字符串无法真正垂直居中。然而，当你同时绘制背景时，情况就不同了。在这种情况下，当你调用\
  \ `g.fillRect( 0, 0, getWidth(), getHeight() )` 或类似方法时，会留下一块空白区域。\n\n不过，前面的代码已经规避了索尼爱立信\
  \ P910 手机的一个问题。只要你在 `paint()` 方法之外的其他地方启用 MIDP 2.0 全屏模式（至少对于首次显示的屏幕而言），这款手机就会反应异常。当然，当你希望针对\
  \ MIDP 之外的其他平台时，整个方法也会失效。\n\n另一个可能的问题是使用动态代码时伴随的代码膨胀。在现代设备上，这很可能不是真正的问题，但使用动态编程的全部意义在于为所有设备提供一套应用程序代码。事实上，性能可能会受到严重影响。在清单\
  \ 15-2 中，当设备上既不存在 MIDP 2.0 配置文件也不存在诺基亚 UI API 时，将会抛出两个异常。就应用程序性能而言，异常的开销非常大，因此你在这里会损失相当大的潜力。\n\
  \n不过，动态编程也可以非常强大；例如，你甚至可以使用 `Canvas.getKeyName()` 方法动态检查非标准化按键（如软键）的键码。总的来说，你需要为任何可能的组合提供一种解决方案。因此，这使得动态编程变得相当困难。\n\
  \n\n\n你还需要通过在 *build.xml* 文件的 `<obfuscator>` 元素内指定相应的 `<keep>` 元素，来通知 J2ME Polish\
  \ 每个动态加载的类，例如：`<obfuscator name=\"ProGuard\"> <keep name=\"com.apress.dynamic.Midp2Splash\"\
  \ /> </obfuscator>`。\n\n5033CH15.qxd 6/20/05 9:20 AM 第 298 页\n\n**298**\n\n第 15\
  \ 章 ■ 在设备限制间起舞\n\n再次强调，动态编程并不能减轻你的测试负担：你仍然需要在每个想要支持的目标设备上测试你的应用程序。\n\n其好处在于只有一个\
  \ JAR 文件，这简化了应用程序的部署。\n\n■**提示** 在部署动态代码时，你应该考虑根据模型-视图-控制模式来分离代码，以便更容易地交换视图。在无线\
  \ Java 平台上的常见做法是将控制器和模型合并，以最小化类的使用（从而节省 JAR 空间）。\n\n**使用预处理**\n\n预处理会在源代码实际编译之前对其进行修改。这种方法提供了无与伦比的灵活性。清单\
  \ 15-3 展示了如何用更少的代码实现与清单 15-2 中动态代码示例相同的功能。在更复杂的场景中，使用预处理将带来更大的收益。\n\n**清单 15-3.**\
  \ *使用预处理实现全屏*\npackage com.apress.preprocessing;\n\nimport javax.microedition.lcdui.*;\n\
  \nimport javax.microedition.midlet.*;\n\npublic class GameMidlet extends MIDlet\
  \ {\n\nprivate Display display;\n\npublic GameMidlet() {\n\n}\n\npublic void startApp()\
  \ {\n\nthis.display = Display.getDisplay( this );\n\nSplash splash = new Splash();\n\
  \nthis.display.setCurrent( splash );\n\n}\n\npublic void destroyApp( boolean unconditional\
  \ ) {\n\n}\n\npublic void pauseApp() {\n\n}\n\n}\n\n// 启动画面：\n\npackage com.apress.preprocessing;\n\
  \nimport javax.microedition.lcdui.*;\n\npublic class Splash\n\n5033CH15.qxd 6/20/05\
  \ 9:20 AM 第 299 页\n\n第 15 章 ■ 在设备限制间起舞\n\n**299**\n\n//#if polish.midp2\n\nextends\
  \ Canvas\n\n//#elif polish.classes.fullscreen:defined\n\n//#= extends ${polish.classes.fullscreen}\n\
  \n//#else\n\n// 对 IDE 隐藏 extends 子句：\n\n//# extends Canvas\n\n//#endif\n\n{\n\n\
  public void paint( Graphics g ) {\n\n//#if polish.midp2\n\nsetFullScreenMode( true\
  \ );\n\n//#endif\n\n//#if polish.FullCanvasSize:defined\n\n//#= g.drawString(\"\
  Starting!\",\n\n//#= ${polish.FullCanvasWidth}/2,\n\n//#= ${polish.FullCanvasHeight}/2,\n\
  \n//#= Graphics.HCENTER | Graphics.BASELINE );\n\n//#else\n\ng.drawString(\"Starting!\"\
  , getWidth()/2, getHeight()/2, Graphics.HCENTER | Graphics.BASELINE );\n\n//#endif\n\
  \n}\n\n}\n\n这个简单的预处理代码比动态代码少了两个类，减少了 50%！它还解决了诺基亚设备在全屏模式下 `getHeight()` 方法的问题，因为它使用了硬编码的值。\n\
  \n预处理的另一个好处是，你可以通过测试 `polish.Bugs` 能力来检查已知问题，例如 `//#if polish.Bugs.drawRgbOrigin`。这使你可以规避大多数错误；更多详情请参考已知问题数据库\
  \ *http://www.j2mepolish.org/devices/issues.html* 以及第 8 章。\n\n■**提示** J2ME Polish\
  \ 客户端 API（如用户界面）大量使用了预处理，以便它们能够适应目标设备。这是一种全自动调整，因为你无需再进行额外的手动干预。由于你可以在用户界面类中发现大多数错误，因此可以节省大量精力和汗水。\n\
  \n预处理的一个缺点是常见的 IDE 对其支持很少或根本不支持。这就是为什么 J2ME Polish 从 1.3 版本开始为 Eclipse IDE 包含了一个支持预处理的\
  \ Java 编辑器，如图 15-1 所示。\n\n![Image 57](img/index-322_1.jpg)\n\n5033CH15.qxd 6/20/05\
  \ 9:20 AM 第 300 页\n\n**300**\n\n第 15 章 ■ 在设备限制间起舞\n\n**图 15-1.** *运行中的支持预处理的 Eclipse\
  \ 编辑器*\n\n■**注意** 面向方面编程提供了与预处理类似的灵活性。然而，它相当难以管理。现有的解决方案也依赖于反射，并添加了它们自己的调度核心，这需要额外的约\
  \ 40KB 的 JAR 空间。\n\n**使用不同的源文件**\n\n一种与预处理类似的方法是使用不同的源文件夹。通过在 *build.xml* 文件中实现条件性的\
  \ `<source>` 元素，你可以使用不同的源文件和文件夹。清单 15-4 展示了如何根据当前目标设备使用不同的源文件。\n\n**清单 15-4.** *使用\
  \ `<source>` 元素实现不同源文件*\n\n<j2mepolish>\n\n<info\n\nlicense=\"GPL\"\n\nname=\"Roadrunner\"\
  \n\nvendorName=\"一位读者。\"\n\nversion=\"0.0.1\"\n\njarName=\"${polish.vendor}-${polish.name}-roadrunner.jar\"\
  \n\n/>\n\n5033CH15.qxd 6/20/05 9:20 AM 第 301 页\n\n第 15 章 ■ 在设备限制间起舞\n\n**301**\n\
  \n<deviceRequirements>\n\n<requirement name=\"Identifier\"\n\nvalue=\"Nokia/Series60,\
  \ Siemens/x75\" />\n\n</deviceRequirements>\n\n<build\n\nusePolishGui=\"true\"\n\
  \n>\n\n<midlet class=\"com.apress.roadrunner.Roadrunner\" />\n\n**<sources>**\n\n\
  **<source dir=\"source/src\" />**\n\n**<source dir=\"source/midp2\"**\n\n**if=\"\
  polish.midp2\" />**\n\n**<source dir=\"source/nokiaui\"**\n\n**if=\"polish.api.nokia-ui\
  \ and not polish.midp2\" />**\n\n**<source dir=\"source/midp1\"**\n\n**if=\"not\
