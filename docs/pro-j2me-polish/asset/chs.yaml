  属性 ${wtk.home} 和 ${polish.home} 定义了无线工具包和 J2ME Polish 的位置（你*已经*将这些值调整到你的系统了，对吧？）。


  ■**注意** 尽管 ${wtk.home} 属性没有直接在脚本中使用，但 J2ME Polish 需要它来查找预验证工具。


  <taskdef> 元素告诉 Ant 关于 J2ME Polish 任务以及如何找到它。请确保将 classpath 属性放在一行，中间没有任何空格。


  真正的 J2ME Polish 任务在 j2mepolish 目标中被调用。该任务包含四个部分：<info>、<deviceRequirements>、<build>
  和 <emulator>。


  <info> 部分描述了关于 MIDlet 的一般信息，这些信息被写入生成的 JAD 和 Manifest 文件中。最重要的属性是 jarName，它指定了生成的
  JAR 文件的名称。清单 7-7 使用了属性 ${polish.vendor}（设备的供应商）和 ${polish.name}（设备的名称），这些属性在任何地方都没有定义。它们由
  J2ME Polish 自动定义，并随每个处理的设备而变化。


  在 <deviceRequirements> 部分中，选择为其构建应用程序的目标设备。对于每个目标设备，会在项目的 *dist* 文件夹中创建一个由 JAD 和
  JAR 文件组成的应用程序包。你可以通过名称选择设备，或者通过定义所需的能力来选择，例如“所有支持蓝牙 API 和移动媒体 API 的设备”。在此示例中，你将为代表典型支持
  MIDP 1.0 配置文件的设备的“Generic/midp1”设备构建应用程序。


  接下来的 <build> 部分控制实际的构建过程。在此示例中，你仅使用嵌套的 <midlet> 元素通知 J2ME Polish 关于 MIDlet 类的信息。你还通过将
  usePolishGui 属性设置为 false 来指定不应使用 J2ME Polish GUI。


  <j2mepolish> 任务的最后一部分是 <emulator> 部分。此部分负责为目标设备调用模拟器。


  clean 目标用于你想要进行干净重建的情况。它只是删除项目中的 *build* 和 *dist* 文件夹。J2ME Polish 使用 *build* 文件夹作为临时工作文件夹。例如，预处理后的源代码和编译后的类都存储在这里。*dist*
  目录包含应用程序的最终 JAR 和 JAD 文件。在某些情况下，例如当你更改了设备定义时，进行干净构建是必要的。原则上，你总是可以进行干净构建，但在那种情况下，J2ME
  Polish 需要更多时间，因为所有源文件都需要重新编译。


