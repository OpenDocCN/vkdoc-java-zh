  \n设计焦点项\n\n您可以使用预定义的焦点样式来设计当前获得焦点的项。但您也可以选择以不同方式高亮显示焦点项。\n\n通常，您会使用不同的背景或边框设置来指示某个项已获得焦点，但您也可以使用其他属性。例如，当您有一个\
  \ List 或 ChoiceGroup 时，您可以在普通样式和焦点样式中都设置 icon-image 属性，并在焦点样式中将图像切换为高亮版本。\n\n您还可以使用\
  \ after 和 before 属性在当前焦点项之后或之前插入图像。\n\n对于每个 Screen 或 Item，您可以使用 focused-style 属性设置不同的焦点样式，例如，focused-style:\
  \ .myExtraFocusedStyle;。这种机制允许您使用不同的样式，但请确保不要因为显示项获得焦点的方式过多而使用户感到困惑。例如，使用此机制来区分同一\
  \ Form 中的输入字段和按钮。\n\n**使用动画**\n\n您可以在应用程序的多个位置使用动画背景和动画项。最重要的位置是当前获得焦点的项，但您也可以为屏幕使用动画背景，或为屏幕或菜单使用动画视图类型。其他可能的位置包括当前屏幕的标题以及扩展菜单栏。请谨慎使用\n\
  \n5033CH12.qxd 6/20/05 11:31 AM Page 229\n\n第 12 章 ■ 使用 GUI 进行工作 **229**\n\n动画，以免影响应用程序的可用性。根据您的应用程序，您将能够使用不同级别的动画和“疯狂”设计——\n\
  \n\n\n无论是开发手机银行软件还是最新游戏，都会影响用户的期望值。实际效果可能因情况而异。\n\n通过在应用中指定 `screen-change-animation`\
  \ 属性，你可以在切换不同屏幕时加入动画效果。这类动画有助于打造生动活泼的应用。表 12-27 列出了所有可用值及其简要说明。\n\n**表 12-27.**\
  \ *可能的屏幕切换动画*\n\n**动画**\n\n**说明**\n\nleft\n\n将新屏幕从左向右移动。你可以通过 `left-screen-change-animation-speed`\
  \ 属性指定每个动画阶段的像素移动速度。\n\nright\n\n将屏幕从右向左移动。通过 `right-screen-change-animation-speed`\
  \ 属性设置每个动画阶段的像素移动速度。\n\ntop\n\n将新屏幕从上向下移动。你可以通过 `top-screen-change-animation-speed`\
  \ 属性指定每个动画阶段的像素移动速度。\n\nbottom\n\n将新屏幕从下向上移动。你可以通过 `bottom-screen-change-animation-speed`\
  \ 属性指定移动速度。\n\nzoomOut\n\n从放大且近乎透明的屏幕开始，逐渐缩小。\n\nzoomInAndHide\n\n放大之前显示的屏幕，并在每个动画阶段使其变得更加透明。\n\
  \n**总结**\n\n恭喜！你已经掌握了 J2ME Polish 最复杂的部分——用户界面。现在你已学会如何编程、控制和设计 GUI，以创建真正专业的应用程序。再次强调主要要点：GUI\
  \ 的编程方式与普通的 `javax.microedition.lcdui` API 相同，但需要确保使用正确的导入语句。\n\n在控制 GUI 方面，你可以在项目的\
  \ *build.xml* 文件中设置各种预处理变量。最后但同样重要的是，你可以通过 *resources/polish.css* 文件在应用程序代码之外设计用户界面。\n\
  \n在下一章中，你将学习如何扩展该框架，从而完成本书中 J2ME Polish 部分的学习。J2ME Polish 包含多种扩展点，无论你是想添加自己的预处理器还是自定义\
  \ GUI 背景，都能轻松实现扩展。\n\n5033CH12.qxd 6/20/05 11:31 AM 第 230 页\n\n5033CH13.qxd 6/17/05\
  \ 12:13 PM 第 231 页\n\n第 13 章\n\n■ ■ ■\n\n扩展 J2ME Polish\n\n**本章内容：**\n\n• 了解如何为开发周期的每个阶段（预处理、编译、后编译、混淆和打包）集成自己的工具。\n\
  \n• 学习如何通过提供自定义背景、边框、自定义项和图像加载器来扩展 J2ME Polish GUI。\n\n• 学习如何通过提供自定义日志处理器来扩展日志框架。\n\
  \nJ2ME Polish 功能强大，但有时你可能会遇到需要特定调整的情况。在本章中，你将学习如何扩展 J2ME Polish，以实现自己的构建解决方案和用户界面扩展。\n\
  \n**扩展构建工具**\n\n在以下小节中，你将学习如何扩展 J2ME Polish 的构建阶段。\n\n通过扩展构建过程，你可以满足公司的特定需求，例如使用特定的编译器、自己的预处理指令或自己的资源组装策略。你还可以利用此机制为其他开发者创建（并销售）J2ME\
  \ Polish 的扩展。\n\n**理解扩展机制**\n\n所有构建扩展都共享一些特性，例如共同的超类和接受参数的能力。此外，所有类型的构建扩展的注册方式也相同。我将在以下小节中讨论这些共同特性。\n\
  \n回顾构建阶段\n\n在构建过程中，J2ME Polish 会经历多个构建阶段，如第 7 章所述。你可以通过实现自己的扩展，或在 *build.xml* 脚本中提供并调用另一个\
  \ Ant 目标来扩展每个阶段。\n\n\n\n表 13-1 总结了各个构建阶段及其扩展点。一个不绑定特定构建阶段的扩展是属性函数，它不仅可以在预处理阶段使用，还可以在\
  \ *build.xml* 脚本的各个元素中使用。\n\n**231**\n\n5033CH13.qxd 6/17/05 12:13 PM 第 232 页\n\n\
  **232**\n\n第 13 章 ■ 扩展 J2ME POLISH\n\n**表 13-1.** *构建阶段的扩展点*\n\n**阶段**\n\n**元素**\n\
  \n**描述**\n\n预处理\n\n<preprocessor>\n\n根据预处理指令修改应用程序的源代码。\n\n编译\n\n<compiler>\n\n\
  编译预处理后的源代码。\n\n后编译\n\n<postcompiler>\n\n在后编译步骤中，可以处理并修改二进制字节码。\n\n混淆\n\n<obfuscator>\n\
  \n混淆步骤移除不必要的代码并缩减剩余代码。\n\n预验证\n\n<preverifier>\n\nMIDP 应用程序的字节码在安装前需要进行预验证。\n\n\
  打包\n\n<resourcecopier>\n\n资源复制器将所有设备和区域特定的资源复制到临时目录，然后再压缩成 JAR 文件。\n\n打包\n\n<packager>\n\
  \n打包器负责从所有资源和类创建 JAR 文件。\n\n最终化\n\n<finalizer>\n\n可以使用最终化器处理完成的 JAR 和 JAD 文件。\n\n\
  模拟\n\n<emulator>\n\n在此阶段，可以在模拟器中测试应用程序。\n\n属性函数\n\n可以定义并使用自己的属性函数。\n\n使用扩展超类\n\n\
  所有构建扩展都有一个共同的超类；它们继承自 `de.enough.polish.Extension` 类。\n\n`Extension` 类包含对 `org.apache.tools.ant.Project`（代表你的\
  \ Ant *build.xml* 脚本）、`de.enough.polish.Environment`（保存当前目标设备的所有设置以及用户定义的变量）的引用，以及对扩展定义和设置的引用，你可以用这些来参数化你的扩展。\n\
  \n所有扩展都需要实现 `public void execute( de.enough.polish.Device, java.util.Locale, de.enough.polish.Environment\
  \ )` 方法，该方法在构建阶段到达时被调用（例如，在预处理、后编译或混淆阶段）。大多数子类将此调用映射到更专门的调用；例如，`PostCompiler` 将调用转发到\
  \ `postCompile( java.io.File classesDir, Device device )` 方法。\n\n每个扩展可以通过重写 `public\
  \ void initialize( Device, Locale, Environment )` 和 `public void finalize( Device,\
  \ Locale, Environment )` 方法来影响其他构建阶段。在初始化期间，你可以通过调用 `Environment` 实例的 `setVariable(\
  \ String, String )`、`setSymbol( String )` 或 `set( Object )` 方法来设置预处理变量和符号。你可以在预处理阶段评估并使用这些设置，或者用它们来影响其他构建阶段。\n\
  \n5033CH13.qxd 6/17/05 12:13 PM 第 233 页\n\n第 13 章 ■ 扩展 J2ME POLISH\n\n**233**\n\n\
  配置构建扩展\n\n你可以在 *build.xml* 脚本中通过设置嵌套的 `<parameter>` 元素来配置大多数扩展。清单 13-1 展示了如何使用参数\
  \ `logfile` 和 `enableLogging` 配置一个自定义预处理器。\n\n**清单 13-1.** *配置预处理器扩展*\n\n<preprocessor\
  \ class=\"com.apress.preprocess.FullScreenPreprocessor\">\n\n<parameter name=\"\
  logfile\" value=\"fullscreen.log\" />\n\n<parameter name=\"enableLogging\" value=\"\
  true\" />\n\n</preprocessor>\n\n`<parameter>` 元素接受属性 `name`、`value`、`file`、`if`\
  \ 和 `unless`，如表 13-2 所列。\n\n**表 13-2.** *<parameter> 元素的属性*\n\n**<parameter> 属性**\n\
  \n**是否必需？**\n\n**说明**\n\nname\n\n是，除非使用了 file\n\n变量的名称。\n\nvalue\n\n是，除非使用了 file\n\
  \n变量的值。\n\nfile\n\n否\n\n包含多个参数的文件。在该文件中，名称和值参数需要用等号（=）分隔。空行和以井号（#）开头的行将被忽略。\n\n\
  if\n\n否\n\n需要为 true 的 Ant 属性，或者\n\n\n\n需要结果为 true 的预处理项，该参数才会被包含。\n\n除非\n\n否\n\n\
  需要结果为 false 的 Ant 属性或\n需要结果为 false 的预处理项，该参数才会被包含。\n\n当您希望在扩展中接受参数时，有两种选择：\n\n•\
  \ 您可以实现 `public void setParameters( de.enough.polish.Variable[] parameters, java.io.File\
  \ baseDir )` 方法。\n\n• 您可以为每个支持的参数实现 `set[参数名称]` 方法。\n\n此方法可以接受 `String`、`boolean`\
  \ 或 `File` 作为输入。对于清单 13-1 中的参数，一个好的选择是实现 `setLogfile( File logfile )` 和 `setEnableLogging(\
  \ boolean enable )` 方法。请注意，方法名称是区分大小写的，因此您需要使用与 `<parameter>` 元素的 `name` 属性相同的大小写。此规则的例外是方法名称中“set”部分之后的第一个字符，它始终需要是大写字符。\n\
  \n5033CH13.qxd 6/17/05 12:13 PM 第 234 页\n\n**234**\n\n第 13 章 ■ 扩展 J2ME POLISH\n\n\
  这两种配置选项之间的区别在于，只有当您实现 `setParameters( Variable[], File )` 方法时，才能使用条件参数（那些使用 `if`\
  \ 或 `unless` 属性的参数）。您可以通过在该参数上调用 `isConditionFulfilled( Environment )` 来确定参数的条件是否满足。\n\
  \n清单 13-2 演示了如何在预处理扩展中使用条件参数。此示例使用了 `configure( Variable[] )` 便捷方法，该方法会为每个没有条件或条件已满足的参数依次调用\
  \ `set[参数名称]` 方法。如果您想使用动态名称的变量，则需要在 `setParameters( Variable[], File )` 方法中实现自己的处理逻辑。\n\
  \n**清单 13-2.** *使用条件参数配置扩展* `package com.apress.preprocess;`\n\n`import java.io.File;`\n\
  \n`import java.io.IOException;`\n\n`import de.enough.polish.Device;`\n\n`import\
  \ de.enough.polish.preprocess.CustomPreprocessor;`\n\n`import de.enough.polish.Variable;`\n\
  \n`import de.enough.polish.util.FileUtil;`\n\n`import de.enough.polish.util.StringList;`\n\
  \n`public class FullScreenPreprocessor extends CustomPreprocessor {`\n\n`private\
  \ Variable[] parameters;`\n\n`private File logfile;`\n\n`private boolean enabledLogging;`\n\
  \n`public FullScreenPreprocessor() {`\n\n`super();`\n\n`}`\n\n`public void notifyDevice(Device\
  \ device, boolean usePolishGui) {`\n\n`super.notifyDevice(device, usePolishGui);`\n\
  \n`// 设置默认值：`\n`this.logfile = null;`\n\n`// 配置此扩展：`\n`**configure( this.parameters\
  \ );**`\n\n`}`\n\n`public void processClass( StringList lines, String className\
  \ ) {`\n\n`// 现在预处理类...`\n`System.out.println( \"FullScreenPrepocessor: processing\
  \ class \"`\n`+ className );`\n\n`}`\n\n5033CH13.qxd 6/17/05 12:13 PM 第 235 页\n\n\
  第 13 章 ■ 扩展 J2ME POLISH\n\n**235**\n\n`**public void setParameters( Variable[] parameters,\
  \ File baseDir ) {**`\n\n`this.parameters = parameters;`\n\n`}`\n\n`public void\
  \ setLogfile( File logfile ) {`\n\n`this.logfile = logfile;`\n\n`}`\n\n`public void\
  \ setEnableLogging( boolean enabledLogging ) {`\n\n`this.enabledLogging = enabledLogging;`\n\
  \n`}`\n\n`}`\n\n使用构建扩展\n\n在使用构建扩展之前，您需要先注册它们。您有两种选择：要么在 *build.xml* 脚本中定义它们，要么在\
  \ *${polish.home}/* *custom-extensions.xml* 中注册它们。您也可以有条件地使用扩展。\n\n**直接使用扩展**\n\n\
  您可以通过使用每个扩展都提供的 `class` 和 `classpath` 属性，直接在 *build.xml* 文件中定义您的扩展。清单 13-3 展示了如何使用此机制来定义清单\
  \ 13-2 中的 `FullScreenPreprocessor`。\n\n**清单 13-3.** *在 build.xml 中定义扩展*\n\n`<j2mepolish>`\n\
  \n`<info`\n\n`license=\"GPL\"`\n\n`name=\"Roadrunner\"`\n\n`vendorName=\"A reader.\"\
  `\n\n`version=\"0.0.1\"`\n\n`jarName=\"${polish.vendor}-${polish.name}-roadrunner.jar\"\
  `\n\n`/>`\n\n`<deviceRequirements>`\n\n`<requirement name=\"Identifier\" value=\"\
  Generic/midp1\" />`\n\n`</deviceRequirements>`\n\n`<build`\n\n`usePolishGui=\"true\"\
  `\n\n`>`\n\n\n\n<midlet class=\"com.apress.roadrunner.Roadrunner\" />\n\n<preprocessor\n\
  \n**class=\"com.apress.preprocess.FullScreenPreprocessor\"**\n\n**classPath=\"../apress-preprocessor/bin/classes\"\
  **\n\n>\n\n<parameter name=\"logfile\" value=\"log.txt\" />\n\n5033CH13.qxd 6/17/05\
  \ 12:13 PM Page 236\n\n**236**\n\n第 13 章 ■ 扩展 J2ME POLISH\n\n</preprocessor>\n\n\
  </build>\n\n<emulator />\n\n</j2mepolish>\n\n**为多个项目注册扩展**\n\n当你希望在多个项目中使用扩展时，可以在\
  \ *${polish.home}/custom-extensions.xml* 中注册该扩展。清单 13-4 以名称 fullscreen 注册了 FullScreenPreprocessor\
  \ 扩展。\n\n**清单 13-4.** *在 ${polish.home}/custom-extensions.xml 中注册扩展*\n\n<extension>\n\
  \n<type>preprocessor</type>\n\n<name>fullscreen</name>\n\n<class>com.apress.preprocess.FullScreenPreprocessor</class>\n\
  \n<classpath>../apress-preprocessor/bin/classes:\n\n${polish.home}/import/apress.jar</classpath>\n\
  \n</extension>\n\n<type> 元素取决于扩展的类型；示例包括 preprocessor、propertyfunction、packager\
  \ 和 finalizer。你还需要提供 <class> 元素，通常还需要提供 <classpath> 元素，除非你的扩展已经位于系统的类路径中。请注意，你可以使用多个类路径，只需用冒号（:）或分号（;）将它们分隔开。在清单\
  \ 13-4 中，J2ME Polish 会首先尝试从 *../apress-preprocessor/bin/classes* 目录加载 FullScreenPreprocessor\
  \ 类，然后再使用 *${polish.home}/*\n\n*import/apress.jar* 文件。这样，你始终会使用开发系统上的最新版本，而同事在 *${polish.home}/import*\
  \ 目录下拥有 *apress.jar* 文件时，也可以使用相同的 *custom-extensions.xml* 文件。最后但同样重要的是，你需要设置一个 <name>\
  \ 元素，该元素对于该扩展类型必须是唯一的。\n\n清单 13-5 在 *build.xml* 脚本中使用了已注册的扩展。你无需定义 class 和 classpath\
  \ 属性，只需提供 name 属性即可。\n\n**清单 13-5.** *在 build.xml 中使用已注册的扩展*\n\n**<preprocessor\
  \ name=\"fullscreen\" >**\n\n<parameter name=\"logfile\" value=\"log.txt\" />\n\n\
  </preprocessor>\n\n**有条件地使用扩展**\n\n你可以通过在 *build.xml* 脚本中使用扩展的 if 和 unless 属性来有条件地实现扩展。你可以在这些属性中使用任何\
  \ Ant 属性或预处理术语，如清单 13-6 所示。该代码仅在当前目标设备具有已知的原生全屏类时才使用全屏预处理器。\n\n5033CH13.qxd 6/17/05\
  \ 12:13 PM Page 237\n\n第 13 章 ■ 扩展 J2ME POLISH\n\n**237**\n\n**清单 13-6.** *有条件地使用扩展*\n\
  \n<preprocessor\n\nname=\"fullscreen\"\n\n**if=\"polish.classes.fullscreen:defined\"\
  **\n\n>\n\n<parameter name=\"logfile\" value=\"log.txt\" />\n\n</preprocessor>\n\
  \n调用 Ant 目标\n\n大多数构建扩展允许你调用 Ant 目标，而无需实现自己的扩展。J2ME Polish 将当前目标设备的所有能力和特性作为 Ant\
  \ 属性提供，以便你可以在指定的目标中评估和使用它们。要调用 Ant 目标，请将扩展的名称设置为 antcall，并使用 target 属性指定 Ant 目标。清单\
  \ 13-7 演示了如何使用 yguard Ant 任务来混淆你的应用程序。使用 yguard Ant 任务而不是 J2ME Polish 内置的集成，可以让你进一步调整\
  \ yGuard 混淆器，因为该 Ant 任务暴露了一些额外的配置选项。\n\n**清单 13-7.** *从 J2ME Polish 内部调用 Ant 目标*\n\
  \n<project name=\"roadrunner\" default=\"j2mepolish\">\n\n<property name=\"polish.home\"\
  \ location=\"C:\\programs\\J2ME-Polish\" />\n\n<property name=\"wtk.home\" location=\"\
  C:\\WTK22\" />\n\n<taskdef name=\"j2mepolish\"\n\nclassname=\"de.enough.polish.ant.PolishTask\"\
  \n\nclasspath=\"${polish.home}/import/enough-j2mepolish-build.jar: ${polish.home}/import/jdom.jar\"\
  />\n\n<target name=\"j2mepolish\">\n\n<j2mepolish>\n\n<info\n\nlicense=\"GPL\"\n\
  \nname=\"Roadrunner\"\n\n\n\nvendorName=\"A reader.\"\n\nversion=\"0.0.1\"\n\njarName=\"\
  ${polish.vendor}-${polish.name}-roadrunner.jar\"\n\n/>\n\n<deviceRequirements>\n\
  \n<requirement name=\"Identifier\" value=\"Generic/midp1\" />\n\n</deviceRequirements>\n\
  \n<build\n\nusePolishGui=\"true\"\n\n>\n\n<midlet class=\"com.apress.roadrunner.Roadrunner\"\
  \ />\n\n**<obfuscator name=\"antcall\" target=\"yguard\" />**\n\n</build>\n\n<emulator\
  \ />\n\n5033CH13.qxd 6/17/05 12:13 PM Page 238\n\n**238**\n\n第 13 章 ■ 扩展 J2ME POLISH\n\
  \n</j2mepolish>\n\n</target>\n\n**<target name=\"yguard\" >**\n\n<taskdef name=\"\
  yguard\"\n\nclassname=\"com.yworks.yguard.ObfuscatorTask\"\n\nclasspath=\"import/yguard.jar\"\
  \n\n/>\n\n<echo message=\"正在为 ${polish.identifier} 进行混淆。\" />\n\n<yguard>\n\n<property\
  \ name=\"error-checking\" value=\"pedantic\"/>\n\n<inoutpair in=\"${polish.obfuscate.source}\"\
  \ ➥\n\nout=\"${polish.obfuscate.target}\"/>\n\n<externalclasses\n\npath=\"${polish.obfuscate.bootclasspath}:${polish.obfuscate.classpath}\"\
  \n\n/>\n\n<expose>\n\n<class name=\"com.apress.roadrunner.Roadrunner\" />\n\n</expose>\n\
  \n</yguard>\n\n</target>\n\n</project>\n\n如前所述，你可以在 Ant 目标中使用 J2ME Polish 属性。某些扩展（例如\
  \ <obfuscator>）还会额外提供特定于扩展的属性。\n\n例如，清单 13-7 使用了属性 ${polish.obfuscate.bootclasspath}\
  \ 和 ${polish.obfuscate.classpath}，它们指向当前目标设备所支持的库。请参考以下章节，了解扩展是否为 antcall 设置了额外的属性。\n\
  \n■**注意** 当你在 J2ME Polish 任务之外引用 J2ME Polish 属性时，必须仅使用小写字母。J2ME Polish 在内部将所有能力名称存储为小写，并将查询转换为小写，以使预处理术语等不区分大小写。\n\
  \n你也可以通过使用嵌套的 <parameter> 元素来设置自己的属性。与通常只能设置一次的 Ant 属性不同，此类属性可以随每个目标设备而变化。当然，你也可以在\
  \ <parameter> 元素内部使用 J2ME Polish 特定的变量和属性函数，如清单 13-8 所示。\n\n**清单 13-8.** *设置你自己的\
  \ Ant 属性*\n\n<finalizer name=\"antcall\" target=\"deploy\">\n\n<parameter name=\"\
  dir.ftp\" value=\"${ nospace( polish.Vendor ) }\" />\n\n</finalizer>\n\n5033CH13.qxd\
  \ 6/17/05 12:13 PM Page 239\n\n第 13 章 ■ 扩展 J2ME POLISH\n\n**239**\n\n**创建你自己的预处理器**\n\
  \n预处理器负责在源代码编译之前对其进行修改。\n\n你可以通过扩展 `de.enough.polish.preprocessor.CustomPreprocessor`\
  \ 类，并将其集成到 *build.xml* 文件的 <preprocessor> 元素中，来为 J2ME Polish 添加自定义预处理器。\n\n准备工作\n\
  \n在你的 IDE 中创建一个新项目，并设置类路径，使其包含 *enough-j2mepolish-build.jar*，你可以在 *${polish.home}/import*\
  \ 文件夹中找到该文件。同时，将 Ant 安装目录中的 *ant.jar* 文件也添加到类路径中。\n\n实现预处理器类\n\n创建一个新类，继承 `de.enough.polish.preprocess.CustomPreprocessor`，并将其命名为\
  \ `com.apress.preprocess.UserAgentPreprocessor`。你有两种选择来实现实际功能：要么选择简单的方式，注册一个预处理指令；要么自己解析所有源代码。\n\
  \n**注册指令**\n\n现在，我将展示如何实现 `UserAgentPreprocessor`，该预处理器在遇到 `//#useragent` 指令时，会为当前设备和区域设置插入用户代理。当你的应用程序连接到\
  \ HTTP 服务器时，这非常有用，如清单 13-9 所示。\n\n**清单 13-9.** *使用 #useragent 预处理指令* public byte[]\
  \ openHttpConnection( String url )\n\nthrows IOException, SecurityException\n\n\
  {\n\nHttpConnection connection = (HttpConnection)\n\nConnector.open( url,Connector.READ_WRITE,\
  \ true );\n\nconnection.setRequestMethod( HttpConnection.GET );\n\nconnection.setRequestProperty(\"\
  Connection\", \"close\");\n\n**//#useragent connection.setRequestProperty( \"UserAgent\"\
  , \"${useragent}\" );** int responseCode = connection.getResponseCode();\n\n\n\n\
  if ( responseCode == HttpConnection.HTTP_OK ) {\n\nInputStream in = connection.openInputStream();\n\
  \nByteArrayOutputStream out = new ByteArrayOutputStream();\n\nbyte[] buffer = new\
  \ byte[ 5 * 1024 ];\n\nint read;\n\nwhile ( ( read = in.read( buffer, 0, buffer.length\
  \ ) ) != -1 ) {\n\nout.write( buffer, 0, read );\n\n}\n\nreturn out.toByteArray();\n\
  \n} else {\n\nthrow new IOException( \"Got invalid response code: \" + responseCode\
  \ );\n\n}\n\n5033CH13.qxd 6/17/05 12:13 PM Page 240\n\n**240**\n\n第 13 章 ■ 扩展 J2ME\
  \ POLISH\n\n`CustomPreprocessor` 类提供了 `registerDirective(String)` 方法，这使得预处理变得非常方便。在本例中，你只想处理以\
  \ `//#useragent` 指令开头的行，因此可以通过调用 `registerDirective(\"//#useragent\")` 来注册此指令。对于每个已注册的指令，你需要实现\
  \ `process[directive-name]` 方法，因此请按清单 13-10 所示实现 `processUseragent()` 方法。该方法负责实际的预处理，并在本例中将\
  \ `${useragent}` 替换为实际的用户代理。请注意，方法名的拼写必须与指令名相同，但方法名中“process”后的第一个字母需要大写。\n\n**清单\
  \ 13-10.** *在 UserAgentPreprocessor 中注册指令* package com.apress.preprocess;\n\nimport\
  \ org.apache.tools.ant.BuildException;\n\nimport de.enough.polish.preprocess.CustomPreprocessor;\n\
  \nimport de.enough.polish.util.StringList;\n\npublic class UserAgentPreprocessor\
  \ extends CustomPreprocessor {\n\npublic UserAgentPreprocessor() {\n\nsuper();\n\
  \n**registerDirective( \"//#useragent\" );**\n\n}\n\n**public void processUseragent(\
  \ String line, StringList lines, String className ) {**\n\nint directiveStart =\
  \ line.indexOf( \"//#useragent\" ); String argument = line.substring( directiveStart\n\
  \n+ \"//#useragent\".length() ).trim();\n\nint replacePos = argument.indexOf( \"\
  ${useragent}\" ); if ( replacePos == -1 ) {\n\nthrow new BuildException( getErrorStart(\
  \ className, lines )\n\n+ \"Unable to process #useragent-directive: \"\n\n+ \"found\
  \ no ${useragent} sequence in line [\"\n\n+ line + \"].\" );\n\n}\n\nString userAgent\
  \ = this.currentDevice.getCapability( \"polish.UserAgent\" ); if ( userAgent ==\
  \ null ) {\n\nuserAgent = this.currentDevice.getIdentifier();\n\n}\n\nif ( this.currentLocale\
  \ != null ) {\n\nuserAgent += \"<\" + this.currentLocale.toString() + \">\";\n\n\
  }\n\n5033CH13.qxd 6/17/05 12:13 PM Page 241\n\n第 13 章 ■ 扩展 J2ME POLISH\n\n**241**\n\
  \nString result = argument.substring( 0, replacePos )\n\n+ userAgent\n\n+ argument.substring(\
  \ replacePos + \"${useragent}\".length() ); lines.setCurrent( result );\n\n}\n\n\
  }\n\n你可以在预处理方法中使用各种实例字段：\n\n• `de.enough.polish.Environment environment` 用于查询任何预处理变量或符号。\n\
  \n• `de.enough.polish.BooleanEvaluator booleanEvaluator` 用于评估可在 `#if` 指令中使用的复杂表达式。\n\
  \n• `de.enough.polish.Device currentDevice` 包含设备设置（也可以从预处理器中查询）。\n\n• `java.util.Locale\
  \ currentLocale` 表示当前本地化设置；这是唯一可能为 `null` 的变量。\n\n该示例使用了设备来获取适用的用户代理。当你使用本地化设置时，你还会将本地化设置添加到用户代理中。例如，如果你使用英语区域设置并以诺基亚\
  \ 6600 设备为目标，则用户代理将是 `Nokia/6600<en>`。然后，服务器应用程序可以查询此用户代理，进而为该设备和所使用的本地化设置生成特定内容。\n\
  \n预处理完给定行后，你可以通过调用 `lines.setCurrent( line )` 来持久化你的更改。当遇到致命错误时，你可以通过抛出 `org.apache.tools.ant.BuildException`\
  \ 来中止构建，该异常会说明具体情况。\n\n**完全控制**\n\n对于更复杂的情况，你可以重写 `processClass()` 方法，该方法允许你处理完整的源文件。这需要你自己进行解析，但也为你提供了更大的灵活性。清单\
  \ 13-11 创建了另一个名为 `FullScreenPreprocessor` 的预处理器。该预处理器仅查找扩展了 `javax.microedition.lcdui.Canvas`\
  \ 类的类，并修改 `extends` 语句，使这些类扩展当前目标设备的原生全屏类，例如诺基亚的 `com.nokia.mid.FullCanvas`。这使你无需在应用程序中使用额外的预处理指令，即可始终使用任何可用的全屏类。\n\
  \n■**注意** 请记住，全屏类可能不支持所有正常的 `Canvas` 操作。例如，诺基亚的 `com.nokia.mid.FullCanvas` 不支持命令，因此请谨慎使用此预处理器。\n\
  \n5033CH13.qxd 6/17/05 12:13 PM Page 242\n\n**242**\n\n第 13 章 ■ 扩展 J2ME POLISH\n\
  \n**清单 13-11.** *在 FullScreenPreprocessor 中解析完整源代码* package com.apress.preprocess;\n\
  \nimport de.enough.polish.Device;\n\nimport de.enough.polish.preprocess.CustomPreprocessor;\n\
  \nimport de.enough.polish.util.StringList;\n\npublic class FullScreenPreprocessor\
  \ extends CustomPreprocessor {\n\nprivate boolean doProcessClass;\n\nprivate String\
  \ fullScreenClass;\n\npublic FullScreenPreprocessor() {\n\nsuper();\n\n}\n\npublic\
  \ void notifyDevice( Device device, boolean usesPolishGui ) {\n\nsuper.notifyDevice(\
  \ device, usesPolishGui );\n\nthis.fullScreenClass = device.getCapability( \"polish.classes.fullscreen\"\
  \ ); this.doProcessClass = ( this.fullScreenClass != null );\n\n}\n\npublic void\
  \ notifyPolishPackageStart() {\n\nsuper.notifyPolishPackageStart();\n\nthis.doProcessClass\
  \ = false;\n\n}\n\n**public void processClass( StringList lines, String className\
  \ ) {**\n\nif ( !this.doProcessClass ) {\n\nreturn;\n\n}\n\nwhile ( lines.next()\
  \ ) {\n\nString line = lines.getCurrent();\n\nint extendsIndex = line.indexOf( \"\
  extends Canvas\" ); if ( extendsIndex != -1 ) {\n\nline = line.substring( 0, extendsIndex\
  \ )\n\n+ \"extends \" + this.fullScreenClass\n\n+ line.substring( extendsIndex +\
  \ \"extends Canvas\".length() ); lines.setCurrent( line );\n\n}\n\n}\n\n}\n\n}\n\
  \n在 `FullScreenPreprocessor` 中，你正在搜索完整源代码中的 `extends Canvas` 项。为了提高效率，你仅在当前目标设备定义了全屏类时才启动解析。你在重写的\
  \ `notifyDevice()` 方法中检查这一点，每当处理新的目标设备时，J2ME Polish 都会调用该方法。得益于设备数据库，你只需检查当前目标设备是否定义了\
  \ `polish.classes.fullscreen` 能力，该能力包含原生全屏类的名称（如果设备有的话）。\n\n另一个重要特性是，你不会更改任何 J2ME\
  \ Polish 核心类，因为这些类无论如何都遵循 *build.xml* 中的全屏设置。每当处理 J2ME Polish 核心类时，都会自动调用 `notifyPolishPackageStart()`\
  \ 方法。方便的是，这些核心类总是最后处理，因此你可以等待下一次 `notifyDevice()` 调用以重新开始。\n\n■**注意** 如果你有自己的预处理指令，但选择使用\
  \ `processClass()` 方法自行解析完整源代码，你仍然必须注册你的指令，以便 J2ME Polish 知道它们。当你实现 `processClass()`\
  \ 方法时，你不需要实现 `process[directive-name]` 方法。每当 J2ME Polish 遇到未知的预处理指令时，它将中止构建过程。\n\
  \n**使用你的预处理器**\n\n要使用你的预处理器，请在你的 *build.xml* 中使用 `<build>` 部分的嵌套 `<preprocessor>`\
  \ 元素。请参考之前关于使用构建扩展的讨论，以了解如何执行此操作。\n\n\n\n您也可以通过使用 `antcall` 预处理器，在预处理阶段调用任意 Ant\
  \ 目标。在这种情况下，您可以使用两个额外的 Ant 属性：`${polish.classname}` 包含当前正在处理的类的名称，`${polish.source}`\
  \ 指向包含源代码的目录。\n\n**设置编译器**\n\n您可以使用其他编译器，或通过 `<compiler>` 元素配置编译器，如清单 13-12 所示。Ant\
  \ 支持以下编译器：`classic`、`modern`、`jikes`、`jvc`、`kjc`、`gcj`、`sj` 和 `extJavac`。您可以使用 Ant\
  \ 的 `<javac>` 任务支持的任何属性和嵌套元素。通常，只有在使用 `<debug>` 元素激活日志框架时才会包含调试信息，但通过清单 13-12 的设置，您将始终包含调试信息。\n\
  \n**清单 13-12.** *使用特定编译器*\n\n<j2mepolish>\n\n<info\n\nlicense=\"GPL\"\n\nname=\"\
  Roadrunner\"\n\nvendorName=\"A reader.\"\n\nversion=\"0.0.1\"\n\njarName=\"${polish.vendor}-${polish.name}-roadrunner.jar\"\
  \n\n5033CH13.qxd 6/17/05 12:13 PM Page 244\n\n**244**\n\n第 13 章 ■ 扩展 J2ME POLISH\n\
  \n/>\n\n<deviceRequirements>\n\n<requirement name=\"Identifier\" value=\"Generic/midp1\"\
  \ />\n\n</deviceRequirements>\n\n<build\n\nusePolishGui=\"true\"\n\n>\n\n<midlet\
  \ class=\"com.apress.roadrunner.Roadrunner\" />\n\n**<compiler compiler=\"gcj\"\
  \ debug=\"true\" debuglevel=\"lines,vars,source\" />**\n\n</build>\n\n<emulator\
  \ />\n\n</j2mepolish>\n\n**使用后编译器**\n\n后编译器在源代码成功编译后被调用。您可以使用它来修改应用程序的字节码，这是一项乐趣无穷的工作——当然，前提是您恰好喜欢这种幽默。\n\
  \n有多个字节码修改库可用，其中最著名的是 BCEL (http://jakarta.apache.org/bcel) 和 ASM (http://asm.objectweb.org)。当您熟悉字节码层面后，可以获得一些惊人的好处。例如，Enough\
  \ Software 的 Floater 工具就使用这种机制，允许在 CLDC 1.0 设备上进行浮点运算。\n\n您可以通过扩展 `de.enough.polish.postcompile.PostCompiler`\
  \ 类并实现 `postcompile( File classesDir, Device device )` 方法来集成您的后编译器。在您的 *build.xml*\
  \ 脚本中，使用 `<build>` 元素内的 `<postcompiler>` 元素集成您的后编译器。您可以通过使用 `postcompiler` 类型，在\
  \ `${polish.home}/custom-extensions.xml` 中注册您的后编译器。\n\n使用 `antcall` 后编译器调用 *build.xml*\
  \ 脚本中的任意 Ant 目标：`<postcompiler name=\"antcall\" target=\"mytarget\" />`。除了常用的 J2ME\
  \ Polish 属性外，您还可以使用 `polish.postcompile.dir` 属性，该属性指向包含已编译类文件的目录。\n\n**集成您自己的混淆器**\n\
  \n您可以通过扩展 `de.enough.polish.obfuscate.Obfuscator` 类并实现 `obfuscate( Device device,\
  \ File sourceFile, File targetFile, String[] preserve, Path bootClassPath )` 方法，轻松集成您自己的或不受支持的第三方混淆器。使用\
  \ `<obfuscator>` 元素集成您的混淆器，并在 *custom-extensions.xml* 文件中使用 `obfuscator` 类型进行注册。\n\
  \n大多数混淆器也提供它们自己的 Ant 任务。有时，使用这些专门的任务可以改善混淆效果，因为它们可能提供比 J2ME Polish 更详细的设置。您可以通过使用\
  \ `antcall` 混淆器调用任意 Ant 目标：`<obfuscator name=\"antcall\" target=\"myobfuscator\"\
  \ />`。`antcall` 混淆器提供了表 13-3 中列出的额外属性，您可以在您的 Ant 目标中使用这些属性。由于您提供的是自己的 Ant 目标，您可能不需要\
  \ `keep` 属性，而是直接使用 MIDlet 所需的类名。请参考清单 13-7，它调用了 yGuard 混淆器作为一个 Ant 目标。\n\n5033CH13.qxd\
  \ 6/17/05 12:13 PM Page 245\n\n第 13 章 ■ 扩展 J2ME POLISH\n\n**245**\n\n**表 13-3.**\
  \ *antcall 混淆器的额外 Ant 属性* **属性**\n\n**描述**\n\n\n\npolish.obfuscate.source\n\n包含未混淆类的\
  \ JAR 文件\n\npolish.obfuscate.target\n\n应创建的 JAR 文件\n\npolish.obfuscate.bootclasspath\n\
  \n目标设备的引导类路径\n\npolish.obfuscate.classpath\n\n当前目标设备的类路径\n\npolish.obfuscate.keepcount\n\
  \n不应混淆的类数量\n\npolish.obfuscate.keep\n\n所有不应混淆的类，以逗号分隔\n\npolish.obfuscate.keep.0\n\
  \n第一个不应混淆的类\n\npolish.obfuscate.keep.n\n\n第 *n* 个不应混淆的类\n\n**集成预验证器**\n\nMIDP 应用程序需要预验证，以便在资源受限的设备上实现快速验证。你可以通过使用\
  \ `<preverifier>` 元素来调用不同的预验证器，该元素嵌套在 *build.xml* 脚本的 `<build>` 元素中。\n\n你可以通过扩展\
  \ `de.enough.polish.preverify.Preverifier` 类并实现 `preverify(Device device, File sourceDir,\
  \ File targetDir, Path bootClassPath, Path classPath)` 方法来实现自己的预验证器。你可以在 *${polish.home}/custom-extensions.xml*\
  \ 中使用类型 `preverifier` 注册你的实现。\n\n你可以使用 `antcall` 预验证器调用任何 Ant 目标来预验证你的应用程序：\n\n\
  `<preverifier name=\"antcall\" target=\"mypreverify\" />`。除了常用的 J2ME Polish 属性外，你还可以使用\
  \ `polish.preverify.source`（指向包含未预验证类的目录）、`polish.preverify.target`（包含应写入预验证类的文件夹）以及\
  \ `polish.preverify.bootclasspath` 和 `polish.preverify.classpath`（包含当前目标设备的类路径）。\n\
  \n使用 `none` 预验证器跳过混淆步骤：`<preverifier name=\"none\" />`。\n\n这对于不需要预验证的设备（例如符合韩国 WIPI\
  \ 标准的手机）非常有用。\n\n如果你希望针对特定设备、供应商或平台始终使用特定的预验证器（或者就此而言，不使用任何预验证器），你可以在设备数据库中定义 `build.Preverifier`\
  \ 能力。J2ME Polish 在 *${polish.home}/platforms.xml* 中为 WIPI 配置文件定义了 `none` 预验证器，例如\
  \ `<capability name=\"build.Preverifier\" value=\"none\" />`。\n\n**复制和转换资源**\n\n\
  使用 `<copier>` 元素将设备和区域设置特定的资源复制到临时目录。在此过程中，你可以重命名资源，甚至合并它们，以节省 JAR 文件中的字节。\n\n`<copier>`\
  \ 元素嵌套在 `<resources>` 元素内，而 `<resources>` 元素又可以在 *build.xml* 文件的 `<build>` 部分中使用。J2ME\
  \ Polish 提供了标准的重命名器扩展，可以在复制资源时重命名它们。使用参数 `searchPattern` 和 `replacement` 来配置此过程。在清单\
  \ 13-13 中，资源名称中被花括号包围的所有部分都会被移除。你可以使用此机制为资源名称添加详细信息，而不会浪费空间。例如，名为 *m0{first icon\
  \ of main command}.png* 的文件将被重命名为 *m0.png*。\n\n**清单 13-13.** *即时重命名资源*\n\n```xml\n\
  <resources\n  dir=\"resources/default\"\n  defaultexcludes=\"yes\"\n  excludes=\"\
  *.db\"\n>\n  <copier name=\"renamer\">\n    <parameter name=\"searchPattern\" value=\"\
  \\{.*\\}\" />\n    <parameter name=\"replacement\" value=\"\" />\n  </copier>\n\
  \  <localization locales=\"en\" />\n</resources>\n```\n\n你也可以调用任何 Ant 目标来复制资源：`<copier\
  \ name=\"antcall\" target=\"copy\" />`。使用额外的 Ant 属性 `polish.resources.target`（指向所有资源应被复制到的目录）和\
  \ `polish.resources.files`（包含需要复制的资源路径列表，以逗号分隔）。你还可以使用 Ant 属性 `polish.resources.filePaths`，它包含由分号（Windows）或冒号（Unix）分隔的文件路径。\n\
  \n\n\n扩展 `de.enough.polish.resources.ResourceCopier` 类，并实现其 `copyResources( Device\
  \ device, Locale locale, File[] resources, File targetDir )` 方法以进行完全控制。您可以在 *${polish.home}/*\
  \ 目录下的 *custom-extensions.xml* 文件中使用 `resourcecopier` 类型注册您的扩展。\n\n**使用不同的打包器**\n\
  \n打包器负责从应用程序类和资源创建最终的 JAR 包。您可以通过在 *build.xml* 脚本的 `<build>` 元素内定义 `<packager>`\
  \ 元素来集成自己的打包器。\n\n如果您使用 `<packager name=\"antcall\" target=\"package\" />` 调用 Ant\
  \ 目标，则可以使用额外的 Ant 属性 `polish.package.source`（其中包含所有资源、类和清单文件）和 `polish.package.target`（指向应用程序应打包到的文件）。\n\
  \n通过扩展 `de.enough.polish.jar.Packager` 类来创建您自己的打包器。在此类中，您需要提供方法 `createPackage(\
  \ File sourceDir, File targetFile, Device device, BooleanEvaluator evaluator, Map\
  \ variables, Project project ) throws IOException, BuildException`。您可以在 *${polish.home}/custom-extensions*\
  \ 中使用 `packager` 类型注册您的打包器实现。\n\n5033CH13.qxd 6/17/05 12:13 PM 第 247 页\n\n第 13 章\
  \ ■ 扩展 J2ME POLISH\n\n**247**\n\n**集成终结器**\n\n在项目经过预处理、编译、后编译、混淆和打包之后，项目将被终结。终结器的示例包括对应用程序包进行签名，或自动转换为\
  \ BlackBerry 设备的 COD 文件。\n\n使用 *build.xml* 脚本中 `<build>` 部分内的 `<finalizer>` 元素来调用终结器。您可以在此步骤中使用\
  \ `antcall` 终结器调用任何 Ant 目标：`<finalizer name=\"antcall\" target=\"finalizeme\" />`。使用额外的\
  \ Ant 属性 `polish.finalize.jad` 和 `polish.finalize.jar` 来访问所创建的 JAD 和 JAR 文件的路径。\n\
  \n您也可以通过扩展 `de.enough.polish.finalize.Finalizer` 类并实现其 `finalize( File jadFile,\
  \ File jarFile, Device device, Locale locale, Environment env )` 方法来实现自己的终结器。在 *${polish.home}/custom-extensions.xml*\
  \ 中使用 `finalizer` 类型注册您的终结器。\n\n您可以通过在设备数据库中指定 `build.Finalizer` 能力来自动触发终结器。J2ME\
  \ Polish 使用此功能自动为所有 BlackBerry 设备调用 COD 转换，例如：`<capability name=\"build.Finalizer\"\
  \ value=\"jar2cod\" />`。\n\n**集成模拟器**\n\n在成功构建后自动调用模拟器可以加快您的开发速度。如第 7 章所述，J2ME Polish\
  \ 已经可以自动调用各种模拟器。如果您想扩展这些机制，可以在设备数据库中指定命令行选项。\n\n通过指定 `Emulator.Executable` 和 `Emulator.Arguments`\
  \ 能力，您可以调用任何可以通过命令行启动的模拟器。清单 13-14 展示了如何通过在 *${polish.home}/devices.xml* 文件中指定这些能力来调用\
