  你也可以通过设置 JAD 属性 MIDlet-Delete-Notify 来跟踪应用程序的删除。然后设备将尝试在删除时发送一个 POST 请求，说明 912 Deletion
  Notification。


  你可以通过在 J2ME Polish 中定义 <info> 属性 installNotify 和 deleteNotify 来指定 MIDlet-Install-Notify
  和 MIDlet-Delete-Notify。你将在第 7 章中了解更多关于设置属性的信息。


  ■**警告** 不要依赖接收每次安装或删除通知。网络故障和用户交互可能会抑制此机制。


