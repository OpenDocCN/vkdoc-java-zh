  false\" />\n\n</handler>\n\n<handler name=\"http\" />\n\n</debug>\n\n**总结**\n\n\n\
  \n本章总结了本书中关于 J2ME Polish 的部分。在本章中，我讨论了扩展 J2ME Polish 的各种方法——包括集成你自己的预处理程序和其他构建工具、创建你自己的\
  \ GUI 元素以及扩展日志框架。\n\n在接下来的部分中，你将深入了解 J2ME 编程的现实世界。\n\n遗憾的是，理论标准与真实手机上 J2ME 环境的实际实现之间总是存在差异。在下一部分中，你将学习如何在交付一流应用程序的同时，使你的应用程序适应各种现实世界的问题。\n\
  \n5033CH14.qxd 6/17/05 12:15 PM 第 271 页\n\n第 3 部分\n\n■ ■ ■\n\n现实世界中的编程\n\n**J2ME\
  \ 标准严谨而简洁，但在现实世界中，仍有数量惊人的挑战在等待着你。在本部分中，你将学习如何识别并克服这些障碍。**\n\n5033CH14.qxd 6/17/05\
  \ 12:15 PM 第 272 页\n\n5033CH14.qxd 6/17/05 12:15 PM 第 273 页\n\n第 14 章\n\n■ ■ ■\n\
  \n无线市场概览\n\n**本章内容包括：**\n\n• 了解 J2ME 设备在硬件和软件等多个方面的差异。\n\n• 思考无线市场及其与你的应用程序的关系，包括你的商业模式和应用程序的技术定位。\n\
  \n本章将向你介绍在现实世界中开发无线应用程序所面临的挑战。你需要应对高度碎片化的设备基础，这些设备从 JAR 大小不超过 30KB 的简单黑白屏手机，到拥有\
  \ 80MB 存储空间的最先进的 UMTS 设备，不一而足。无线市场正在快速发展，每天都会带来新的机遇。在本章中，你将了解在现实世界中可能遇到的设备差异。你还将了解市场如何演变，以及这对你的商业模式有何影响。\n\
  \n**介绍设备差异**\n\nSun 的首席软件架构师 Jonathan Schwartz 估计，目前全球市场上正在使用的 J2ME 设备有 5 亿部¹。这很了不起，但你必须记住，许多设备之间存在相当大的差异。在接下来的章节中，我将讨论\
  \ J2ME 设备如何以及为何存在差异。\n\n**硬件**\n\nJ2ME 设备的硬件差异很大：内存、屏幕分辨率、色彩深度、网络技术、是否包含摄像头……你能想到的方面都有差异。\n\
  \n如果你需要特定的硬件功能，可以使用 J2ME Polish 的设备选择机制。清单 14-1 演示了如何在你的 *build.xml* 文件中选择所有内置摄像头的手机。然后，你的应用程序将仅针对满足你要求的设备进行构建。我在第\
  \ 7 章的“为多种设备构建”一节中详细讨论了这一点。\n\n*om_3gsm*\n\n**273**\n\n5033CH14.qxd 6/17/05 12:15\
  \ PM 第 274 页\n\n**274**\n\n第 14 章 ■ 无线市场概览\n\n**清单 14-1.** *选择所有包含摄像头并支持图像捕捉的设备*\n\
  \n<j2mepolish>\n\n<info\n\nlicense=\"GPL\"\n\nname=\"Roadrunner\"\n\nvendorName=\"\
  A reader.\"\n\nversion=\"0.0.1\"\n\njarName=\"${polish.vendor}-${polish.name}-roadrunner.jar\"\
  \n\n/>\n\n<deviceRequirements>\n\n**<requirement name=\"Term\" value=\"polish.hasCamera\
  \ and polish.Capture.image\" />**\n\n</deviceRequirements>\n\n<build\n\nusePolishGui=\"\
  true\"\n\n>\n\n<midlet class=\"com.apress.roadrunner.Roadrunner\" />\n\n</build>\n\
  \n<emulator />\n\n</j2mepolish>\n\n此外，在处理不同屏幕尺寸时，你可以使用资源组装机制。当前设备屏幕范围从诺基亚 Series\
  \ 40 手机的 128✕128 像素到高端设备的 640✕320 像素。为了获得最佳视觉效果，你通常希望使用调整后的图形。你可以使用设备组、供应商设备，甚至全屏模式下的画布尺寸来组装最合适的资源。例如，你可以将通用资源放入\
  \ *resources* 文件夹，并将用于大屏设备的图像放入 *resources/ScreenSize.150+x200+* 目录。有关此选项的更多信息，请参阅第\
  \ 7 章的“资源组装”部分。\n\n**配置文件和配置**\n\nJ2ME 设备可以支持不同的配置文件和配置，如图 14-1 所示。连接设备配置（CDC）和有限连接设备配置（CLDC）之间存在明显的界限。CDC\
  \ 标准基于 Java 2 标准版和 Java 虚拟机构建，因此非常强大。但在过去几年中，对 CDC 标准的支持已显著下降，因此如果你的目标是手机，可以选择忽略此配置及其个人和基础配置文件。另一方面，CLDC\
  \ 标准仅包含 Java 2 标准版的一些核心类，并包含进一步的限制，例如在 CLDC 1.0 设备上无法进行浮点运算。\n\n在配置方面，允许浮点运算的 CLDC\
  \ 1.1 配置的重要性正在增加；然而，当今大多数设备仅支持 CLDC 1.0 配置。表 14-1 列出了可用的配置。\n\n同样，你可以使用预处理来区分源代码中的配置。CLDC\
  \ 1.1 设备定义了 `polish.cldc1.1` 预处理符号，而 CLDC 1.0 设备定义了 `polish.cldc1.0` 符号。\n\n5033CH14.qxd\
  \ 6/17/05 12:15 PM 第 275 页\n\n第 14 章 ■ 无线市场概览\n\n**275**\n\n**图 14-1.** *J2ME 架构*\n\
