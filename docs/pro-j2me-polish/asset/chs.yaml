  ■前言


  **xvii**


  正如我之前提到的，当我开始编写移动设备应用程序时，我们仍在弄清楚问题，并且在某种程度上我们仍然如此。我曾经有我自己的自定义 Ant 脚本，用于为单个设备构建单个应用程序。我刚刚看了一个设备基准测试网站，它已经有超过
  400 个设备的结果！我当然不想为一个应用程序拥有 400 个版本的源代码。我第一次遇到 J2ME Polish 是在我寻找更好的方法来实现我的构建系统时，从那时起，我发现它是我整个开发过程中一个非常有用的补充。像这样的工具将使我们能够在合理的时间内为多个设备开发应用程序，这能让网络运营商和发行商满意——而你想让他们满意，因为这个移动应用程序行业是世界上增长最快的行业之一。


  所以，如果你想成功，就要保持你的知识更新，保持专注，并享受这个过程。J2ME Polish 让开发者保持快乐，并能够使一切正常工作。


