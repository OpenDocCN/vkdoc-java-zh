  \n5033CH12.qxd 6/20/05 11:31 AM 第 206 页\n\n**206**\n\n第 12 章 ■ 使用 GUI 进行开发 在屏幕上排列项目\n\
  \n通常，J2ME Polish 会将每个 GUI 项目排列在单独的行上，如图 12-15 所示。你可以通过使用`view-type`属性或使用带有`columns`和`columns-width`属性的表格布局来更改项目的排列方式。\n\
  \n你可以将视图类型应用于任何包含项目的屏幕，例如列表或表单。\n\n有几种可用的视图类型，通常定义在屏幕样式中，例如：\n\n.mainScreen { view-type:\
  \ dropping; }。你可以使用视图类型的（预定义）名称或该类型的完全限定类名，该类需要继承`de.enough.polish.ui.ContainerView`类。视图类型负责项目的排列，甚至可以为项目添加动画效果。\n\
  \n**图 12-15.** *除非另有指定，否则 J2ME Polish 会将每个项目排列在单独的行上。*\n\n**使用表格**\n\n你可以通过使用屏幕样式中的`columns`属性，将屏幕上的所有项目整齐地排列到单元格中。表\
  \ 12-14 详细解释了`columns`和`columns-width`属性。\n\n**表 12-14.** *表格排列的属性*\n\n**属性**\n\n\
  **是否必需？**\n\n**描述**\n\ncolumns\n\n否\n\n列数。可用于将项目布局在表格中。默认为一列。\n\ncolumns-width\n\
  \n否\n\n可以是`normal`、`equal`，或者以逗号分隔的每列宽度列表（例如，columns-width: 60,60,100;）。默认为`normal`，表示每列使用该列最宽项目所需的空间。`equal`会导致所有列具有相同的宽度。显式的列宽列表将使用这些宽度。\n\
  \n清单 12-36 向你展示了如何应用这些属性的示例，图 12-16 展示了结果。\n\n![图 38](img/index-229_1.jpg)\n\n5033CH12.qxd\
  \ 6/20/05 11:31 AM 第 207 页\n\n第 12 章 ■ 使用 GUI 进行开发 **207**\n\n**清单 12-36.** *将表格排列应用于输入屏幕*\n\
  \n.inputScreen {\n\ncolumns: 2;\n\ncolumns-width: 52,110;\n\n}\n\n**图 12-16.** *使用两列表格排列*\n\
  \n■**注意** 你不能将`columns`属性与视图类型一起使用。当你使用视图类型时，它完全负责项目的排列。\n\n当你使用显式表格时，需要将标签和实际项目分别添加到表单中。这会使编程稍微复杂化，并使将现有应用程序移植到\
  \ J2ME Polish GUI 变得更加困难。因此，你可以选择使用`min-width`和`max-width`属性来设置标签和项目的精确宽度。清单 12-37\
  \ 展示了如何通过调整标签和`.inputField`样式（后者用于图 12-16 中显示的输入字段）来实现与图 12-16 相同的设计。\n\n\n\n**列表\
  \ 12-37.** *使用 min-width 和 max-width CSS 属性实现表格排列*\n\n.inputField {\n\nmin-width:\
  \ 110;\n\nmax-width: 110;\n\n}\n\nlabel {\n\nmin-width: 52;\n\nmax-width: 52;\n\n\
