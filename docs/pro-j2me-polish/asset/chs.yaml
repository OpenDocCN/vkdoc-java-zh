  <emulator />\n\n</j2mepolish>\n\n如清单 15-5 所示，这段代码实际上与动态 Java 源代码非常相似。然而，主要区别在于，你不会因为将未使用的类包含在应用程序中而浪费\
  \ JAR 和内存空间。此外，对于不了解 J2ME Polish 的开发者来说，代码本身也更容易理解。\n\n**清单 15-5.** *通过使用不同的源文件夹实现全屏启动画面*\n\
  package com.apress.folders;\n\nimport javax.microedition.lcdui.*;\n\nimport javax.microedition.midlet.*;\n\
  \npublic class GameMidlet extends MIDlet {\n\nprivate Display display;\n\npublic\
  \ GameMidlet() {\n\n}\n\npublic void startApp() {\n\nthis.display = Display.getDisplay(\
  \ this );\n\nSplash splash = new Splash();\n\nthis.display.setCurrent( splash );\n\
  \n}\n\npublic void destroyApp( boolean unconditional ) {\n\n}\n\npublic void pauseApp()\
  \ {\n\n}\n\n}\n\n5033CH15.qxd 6/20/05 9:20 AM 第 302 页\n\n**302**\n\n第 15 章 ■ 在设备限制间起舞\n\
  \n// 普通的 MIDP 1.0 启动画面，\n\n// 此类位于 source/midp1：\n\npackage com.apress.folders;\n\
  \nimport javax.microedition.lcdui.*;\n\npublic class Splash extends Canvas {\n\n\
  public void paint( Graphics g ) {\n\ng.drawString(\"Starting!\", getWidth()/2, getHeight()/2,\
  \ Graphics.HCENTER | Graphics.BASELINE );\n\n}\n\n}\n\n// MIDP 2.0 启动画面，\n\n// 此类位于\
  \ source/midp2：\n\npackage com.apress.folders;\n\nimport javax.microedition.lcdui.*;\n\
  \npublic class Splash extends Canvas {\n\npublic void paint( Graphics g ) {\n\n\
  setFullScreenMode( true );\n\ng.drawString(\"Starting!\", getWidth()/2, getHeight()/2,\
  \ Graphics.HCENTER | Graphics.BASELINE );\n\n}\n\n}\n\n// Nokia UI API 启动画面，\n\n\
  // 此类位于 source/nokiaui：\n\npackage com.apress.folders;\n\nimport javax.microedition.lcdui.*;\n\
  \nimport com.nokia.mid.ui.FullCanvas;\n\npublic class Splash extends FullCanvas\
  \ {\n\npublic void paint( Graphics g ) {\n\ng.drawString(\"Starting!\", getWidth()/2,\
  \ getHeight()/2, Graphics.HCENTER | Graphics.BASELINE );\n\n}\n\n}\n\n\n\n每个严肃的\
  \ Java IDE 都支持为一个项目设置多个源文件夹。在 Eclipse 中，你可以通过右键单击项目，选择“属性”，然后选择“Java 构建路径”来添加源文件夹，如图\
  \ 15-2 所示。在“源”选项卡上，单击“添加文件夹”以添加另一个源文件夹。但是，当你想要多次实现相同的类时，不应这样做。在这种情况下，你的 IDE 会（正确地）抱怨存在重复的类定义。只需使用一个主源文件夹（例如\
  \ *source/src*），然后将其他源文件夹添加到父目录中，例如 *source/midp2*、*source/nokiaui* 等。另一种策略是在你的\
  \ IDE 中使用包含不同源代码的不同项目。\n\n![图 58](img/index-325_1.jpg)\n\n5033CH15.qxd 6/20/05 9:20\
  \ AM 第 303 页\n\n第 15 章 ■ 在设备限制间周旋\n\n**303**\n\n**图 15-2.** *向 Eclipse 项目添加新的源文件夹*\
  \ 使用不同源文件的主要缺点是每次更改都需要额外的工作。根据业务需求，你可能需要创建大量不同的 Java 源文件。当你现在需要包含一个额外的功能或错误修复时，你需要在每个受影响的源文件中实现更改。\n\
  \n**解决常见问题**\n\n通常，你会在项目中遇到类似的问题。在接下来的章节中，我将讨论如何解决常见的困难。\n\n**使用适当的资源**\n\n不同设备之间的主要区别在于屏幕尺寸，因此你通常需要调整图像以获得最佳效果。此外，你通常需要不同的多媒体资源，例如不同类型的音频文件。\n\
  \n使用 J2ME Polish 的自动资源组装功能，这项任务很容易完成。\n\n只需将所有公共资源放入项目的 *resources* 文件夹，并为特定资源使用子文件夹，例如\
  \ *resources/Nokia* 用于诺基亚资源，*resources/mmapi* 用于支持移动媒体 API 的设备，以及 *resources/Motorola/A1000*\
  \ 用于摩托罗拉 A1000 手机。\n\n另一个不错的功能是，你也可以使用灵活的文件夹：例如，来自 *resources/BitsPerPixel.12+*\
  \ 文件夹的资源将用于所有每颜色位深度至少为 12 位（4096 色）的设备。另一个例子是 *resources/ScreenSize.*\n\n*150+x200+*\
  \ 文件夹。当设备的屏幕宽度至少为 150 像素且高度至少为 200 像素时，将使用此文件夹中的资源。当你使用多个这样的灵活资源文件夹时，将使用最匹配的那个。\n\
  \n你还可以在 *build.xml* 脚本中使用 <resources> 元素及其嵌套的 <fileset> 元素来指定资源的条件。\n\n请参阅第 7 章中的“打包你的应用程序”部分，以了解使用\
  \ J2ME Polish 进行资源组装选项的完整细节。\n\n5033CH15.qxd 6/20/05 9:20 AM 第 304 页\n\n**304**\n\
  \n第 15 章 ■ 在设备限制间周旋\n\n**规避已知问题**\n\n你可以在 *http://www.j2mepolish.org/devices/issues.html*\
  \ 查看许多已知问题。你可以通过防御性编程来规避一些问题；其他问题则需要调整你的代码。\n\n防御性编程\n\n你可以通过防御性编程规避的一个问题是 Symbian\
  \ 和 Motorola 设备上 InputStream.available() 实现的行为。在这些设备上，当你从 JAR 文件中读取资源时，available()\
  \ 方法返回 0。请注意，CLDC 规范完全允许这种行为，该规范指出默认的 available() 实现总是返回 0，但子类*应该*重写此方法。这只是有点出乎意料。\n\
  \n清单 15-6 展示了一个读取资源并将其内容作为字节数组返回的实现。除了 available() 调用之外，该代码中还存在另一个问题：你可能只是假设当你调用\
  \ InputStream.read( byte[] ) 时，整个缓冲区会被一次性读取完毕。\n\n但事实并非如此，正如 CLDC 的 JavaDoc 所提到的。read()\
  \ 方法返回的是读取的字节数，而不是完全填满缓冲区。当你确切知道输入的大小时，应该改用 DataInputStream.readFully( byte[] )\
  \ 方法。\n\n第三个问题是，当 read() 方法抛出异常时，你没有关闭输入流。这可能会导致应用程序中出现内存泄漏。\n\n**清单 15-6.** *错误地读取资源*\n\
  \npublic byte[] readResource( String url )\n\nthrows IOException\n\n{\n\nInputStream\
  \ in = getClass().getResourceAsStream( url );\n\n// 以下代码在 Symbian 和 Motorola 上总是返回\
  \ 0：**int available = in.available();**\n\nbyte[] buffer = new byte[ available ];\n\
  \n// 这也不能保证正常工作：\n\n**in.read( buffer );**\n\n// 不能保证输入流被关闭，\n\n// 因为 in.read()\
  \ 可能抛出异常。\n\n**in.close();**\n\nreturn buffer;\n\n}\n\n清单 15-7 展示了同一方法的防御性实现，该方法同样适用于\
  \ Motorola 和 Symbian 设备。只要 read() 方法通过返回 -1 来指示流结束，你就持续读取资源。你还使用 ByteArrayOutputStream\
  \ 来缓冲读取的字节。最后但同样重要的是，你将实际的资源读取操作包围在 try\n\n{...} finally 块中。即使包围的代码中发生异常，finally\
  \ 块也会执行。生成的应用程序比原始版本复杂得多，但是，嘿，它能工作！\n\n5033CH15.qxd 6/20/05 9:20 AM 第 305 页\n\n\
  第 15 章 ■ 在设备限制间周旋\n\n**305**\n\n**清单 15-7.** *使用一些防御性技术正确读取资源* public byte[] readResource(\
  \ String url )\n\nthrows IOException\n\n{\n\nInputStream in = getClass().getResourceAsStream(\
  \ url );\n\nbyte[] buffer;\n\n// 以下代码在 Symbian 和 Motorola 上总是返回 0：int available\
  \ = in.available();\n\n**if ( available == 0 ) {**\n\navailable = 4 * 1024; // 4\
  \ kb\n\n}\n\nbuffer = new byte[ available ];\n\nByteArrayOutputStream out = new\
  \ ByteArrayOutputStream( available ); int read;\n\ntry {\n\nwhile ( (read = in.read(\
  \ buffer ) ) != -1 ) {\n\nout.write( buffer, 0, read );\n\n}\n\n} finally {\n\n\
  in.close();\n\n}\n\nreturn out.toByteArray();\n\n}\n\n■**提示** 始终仔细阅读文档。每当文档中说*可能*、*也许*或*应该*时，你不能假设所有设备上的行为都相同。但是，当文档声明某个功能*必须*存在时，你很可能处于安全的一边。\n\
  \n代码调整\n\n通常，防御性编程本身不足以规避问题。在这种情况下，你需要在源代码级别或字节码级别调整代码。\n\n**使用预处理**\n\n你可以使用预处理来规避源代码中的已知问题。\n\
  \n一个需要代码更改的问题示例是索尼爱立信 K700 设备上全屏模式的实现。当通过调用 Canvas.setFullScreenMode( true ) 激活\
  \ MIDP 2.0 全屏模式时，系统警报将不再显示。\n\n每当你访问受限资源时，例如，当你想要启动 HTTP 连接时，会显示系统警报。一种可能的解决方法是使用同样存在于\
  \ K700 设备上的诺基亚 UI API 的 com.nokia.mid.ui.\n\nFullCanvas 类。请注意，FullCanvas 类不允许你添加任何命令。当此问题存在时，J2ME\
  \ Polish 会设置\n\n5033CH15.qxd 6/20/05 9:20 AM 第 306 页\n\n**306**\n\n第 15 章 ■ 在设备限制间周旋\n\
  \n预处理符号 polish.Bugs.needsNokiaUiForSystemAlerts。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n使用 `polish.Bugs.[name]` 符号可以将代码与特定设备抽象开来，这样您以后就可以为任何存在相应问题的设备使用相同的解决方案。您可以通过在\
  \ *devices.xml*、*custom-devices.xml*、*groups.xml* 等文件中设置 Bugs 能力来向设备数据库添加问题：`<capability\
  \ name=\"Bugs\" value=\"issueName1, issueName2\" />`。\n\n清单 15-8 展示了如何检查当前目标设备上是否存在此问题。当存在此问题且\
  \ Nokia UI API 可用时，您将扩展 `FullCanvas` 类，而不是普通的 `Canvas` 类。在这种情况下，您可以使用 `polish.classes.fullscreen`\
  \ 预处理变量，对于支持 Nokia UI API 的设备，该变量的值为 `com.nokia.mid.ui.FullCanvas`。与直接扩展 `FullCanvas`\
  \ 相比，这更加灵活。当存在此错误或目标设备不支持 MIDP 2.0 配置文件时，您不应调用 `setFullScreenMode()`。\n\n**清单 15-8.**\
  \ *当存在 needsNokiaUiForSystemAlerts 错误时使用 FullCanvas* package com.apress.preprocessing;\n\
  \nimport javax.microedition.lcdui.*;\n\npublic class Splash\n\n**//#if polish.midp2\
  \ && !polish.Bugs.needsNokiaUiForSystemAlerts** **extends Canvas**\n\n**//#elif\
  \ polish.classes.fullscreen:defined**\n\n**//#= extends ${polish.classes.fullscreen}**\n\
  \n**//#else**\n\n**// 对 IDE 隐藏 extends 子句：**\n\n**//# extends Canvas**\n\n**//#endif**\n\
  \n{\n\npublic void paint( Graphics g ) {\n\n**//#if polish.midp2 && !polish.Bugs.needsNokiaUiForSystemAlerts**\
  \ **setFullScreenMode( true );**\n\n**//#endif**\n\ng.drawString( \"Starting!\"\
  , getWidth() / 2, getHeight() / 2, Graphics.HCENTER | Graphics.BASELINE );\n\n}\n\
  \n}\n\n`Graphics.drawRGB()` 实现在许多 MIDP 2.0 设备上存在问题，例如诺基亚 Series 60 和索尼爱立信 K700。您可以使用\
  \ `drawRGB()` 方法来绘制包含 RGB 格式像素信息的整数数组。这个方法的一个很酷的地方是，您也可以使用半透明数据，这样您的背景就能透出来。在 K700\
  \ 设备上，`drawRGB()` 实现没有考虑平移原点——相反，它始终使用 (0, 0) 原点。因此，当您通过调用 `Graphics.translate(\
  \ x, y )` 平移 Graphics 的原点时，如果存在此错误，绘制的 RGB 数据将会错位。一个可能的解决方案是完全不使用 `translate()`，但在某些设备上，原生实现无论如何都会调用它，例如在绘制标题时。当您使用一点预处理时，您就安全了。清单\
  \ 15-9 展示了如何通过在调用 `drawRGB()` 之前调整 x 和 y 值来规避此错误。\n\n5033CH15.qxd 6/20/05 9:20 AM\
  \ 第 307 页\n\n第 15 章 ■ 绕开设备限制\n\n**307**\n\n**清单 15-9.** *规避 drawRgbOrigin 问题* public\
  \ void paintArgbColor( int argbColor, int x, int y,\n\nint width, int height, Graphics\
  \ g )\n\n{\n\n// 当存在 drawRgbOrigin 问题时规避它：\n\n**//#ifdef polish.Bugs.drawRgbOrigin**\n\
  \n**x += g.getTranslateX();**\n\n**y += g.getTranslateY();**\n\n**//#endif**\n\n\
  // 实际上您需要缓冲这个：\n\nint[] rgbBuffer = new int[ width ];\n\nfor ( int i = rgbBuffer.length\
  \ - 1; i >= 0 ; i-- ) {\n\nrgbBuffer[ i ] = argbColor;\n\n}\n\n// 防御性编程：某些实现不接受负坐标：\n\
  \nif ( x < 0 ) {\n\nwidth += x;\n\nif ( width < 0 ) {\n\nreturn;\n\n}\n\nx = 0;\n\
  \n}\n\nif ( y < 0 ) {\n\nheight += y;\n\nif ( height < 0 ) {\n\nreturn;\n\n}\n\n\
  y = 0;\n\n}\n\n// 现在绘制 RGB 数据：\n\n**g.drawRGB( rgbBuffer, 0, 0, x, y, width, height,\
  \ true );**\n\n}\n\n使用预处理来规避错误有时是繁琐的工作，但通常没有其他选择。所有 J2ME Polish 库都使用预处理来适应目标设备，因此您可以直接使用这些库，而无需过多担心设备问题。但是，当您的应用程序针对已知问题的特定目标设备构建时，您应该这样做。当您使用诸如“Generic/midp2”之类的通用目标设备时，J2ME\
  \ Polish 无法规避特定于设备的错误。\n\n**操作字节码**\n\n规避错误的另一个选择是在字节码级别修改应用程序。这种方法有几个优点，因为程序员在应用程序开发阶段不需要自己规避问题。此外，程序的某些方面在字节码级别比在源代码级别更容易跟踪，例如浮点计算的使用。第三个优点是，您只需重新构建现有应用程序即可规避新发现的已知问题。当然，缺点是字节码操作的复杂性。如果您愿意承担这项任务，您可以创建一个扩展\
  \ `de.enough.polish.postcompile.PostCompiler` 类的后编译器。您可以使用 *build.xml* 文件中的 `<postcompiler>`\
  \ 元素将其集成到处理链中。后编译器在编译阶段之后被调用，并且可以更改很多事情。一个例子是 Enough Software 的 Floater 工具，它允许您在\
  \ CLDC 1.0 设备上使用原始类型 `float` 和 `double` 实现浮点计算。有关此选项的更多详细信息，请参阅第 13 章的“使用后编译器”部分。\n\
  \n■**提示** 有关操作字节码，请参考 ASM ( *http://asm.objectweb.org*) 和 BCEL ( *http://jakarta.apache.org/bcel*)\
  \ 库。\n\n**实现用户界面**\n\n当您针对不同设备时，用户界面通常是最容易出现问题的领域。为了在 MIDP 设备上实现用户界面，您可以在所谓的高级 GUI（提供\
  \ Form、List 等）和低级 GUI（允许您绘制自己的控件）之间进行选择。\n\n事件处理是常见的错误来源。您绝不能阻塞事件处理线程，例如，在 `CommandListener`\
  \ 的 `commandAction()` 方法中或 `Canvas` 的 `keyPressed()` 方法中。当您有长时间运行的计算、网络连接等时，您需要在单独的\
  \ `Thread` 中执行此操作。\n\n使用高级 GUI\n\n使用高级 GUI 有几个优点：\n\n• 您的应用程序更小，因为您不需要那么多代码来创建用户界面。\n\
  \n• 您的应用程序可以更容易地移植，因为许多低级 GUI 实现都包含问题。\n\n• 开发更容易，因为低级 GUI 相当复杂。\n\n主要的缺点是应用程序的外观和感觉取决于供应商的实现。一些实现具有令人愉悦的外观，但其他实现则提供了看起来有些笨拙的用户界面。MIDP\
  \ 2.0 配置文件提供了一些很棒的新功能，例如 `CustomItem`、通过调用 `Display.setCurrentItem()` 聚焦项目的能力以及弹出式\
  \ `ChoiceGroups`。\n\n使用 J2ME Polish GUI，您可以在应用程序代码中使用高级 GUI，同时通过使用 CSS 文本文件在应用程序代码之外指定设计来完全控制。J2ME\
  \ Polish GUI 还支持 MIDP 1.0 设备上的新 MIDP 2.0 高级 GUI 功能。J2ME Polish GUI 内部使用预处理来适应各种手机。您可以根据条件激活和停用\
  \ J2ME Polish GUI 的使用。有关这些可能性的详细讨论，请参阅第 12 章。\n\n5033CH15.qxd 6/20/05 9:20 AM 第\
  \ 309 页\n\n\n\n第 15 章 ■ 在设备限制中灵活应对\n\n**309**\n\n使用低级图形用户界面\n\n低级 GUI API 允许你控制用户界面的每一个细节，但也带来了必须自行管理所有细节的负担，包括滚动、事件处理，以及最重要的——绘制用户界面。\n\
  \n**自定义项**\n\n在 MIDP 2.0 设备上，你还可以通过`javax.microedition.lcdui.CustomItem`类混合使用低级和高级\
  \ GUI API。根据目标设备的不同，你甚至可以接收按键事件，以实现与`CustomItem`的复杂交互。然而，唯一强制要求的功能是显示`CustomItem`的内容，因此你不能依赖任何高级交互模式。不过，当你使用\
  \ J2ME Polish GUI 时，则不受此限制，它支持相同的交互模式，并在所有目标设备上转发按键和指针按下事件。\n\n**软键**\n\n软键并未标准化，因此不同厂商的按键代码会有所不同。设备数据库包含了大多数设备的按键代码；清单\
  \ 15-10 演示了如何通过一些预处理来使用这些信息。当`polish.key.LeftSoftKey`未定义时，假设其按键代码为-6。右软键的默认按键代码为-7。在`keyPressed()`方法中，你首先检查是否有软键被按下，然后再获取游戏动作。这是一种防御性编程技术，因为某些设备在将软键值传递给`getGameAction()`方法时会抛出`IllegalArgumentException`异常。\n\
  \n**清单 15-10.** *为软键使用正确的按键代码*\n```java\npackage com.apress.preprocessing;\n\nimport\
  \ javax.microedition.lcdui.*;\n\npublic class MyCanvas extends Canvas {\n\n//#ifdef\
  \ polish.key.LeftSoftKey:defined\n//#= private static final int LEFT_SOFT_KEY =\
  \ ${polish.key.LeftSoftKey};\n//#else\nprivate static final int LEFT_SOFT_KEY =\
  \ -6;\n//#endif\n\n//#ifdef polish.key.RightSoftKey:defined\n//#= private static\
  \ final int RIGHT_SOFT_KEY = ${polish.key.RightSoftKey};\n//#else\nprivate static\
  \ final int RIGHT_SOFT_KEY = -7;\n//#endif\n\npublic void keyPressed( int keyCode\
  \ ) {\nif ( keyCode == LEFT_SOFT_KEY ) {\n// 处理左软键\n} else if ( keyCode == RIGHT_SOFT_KEY\
  \ ) {\n// 处理右软键\n5033CH15.qxd 6/20/05 9:20 AM Page 310\n\n**310**\n第 15 章 ■ 在设备限制中灵活应对\n\
  \n} else {\nint gameAction = getGameAction( keyCode );\n// 处理按键按下事件...\n}\n}\n\n\
  protected void paint( javax.microedition.lcdui.Graphics graphics ) {\n}\n}\n```\n\
  \n某些设备在按下软键时不会产生任何按键事件。在这种情况下，你有时可以添加空的、因此不可见的命令，通常是一个`Command.BACK`类型和一个`Command.SCREEN`类型，这样两个键就都有了关联的命令。然后你可以在`CommandListener`的`commandAction()`方法中处理这些命令。\n\
  \n**网络连接**\n\n网络连接允许你与外部世界交互。在 MIDP 平台上，你有多种可能的技术，例如短信（SMS）、蓝牙和 HTTP。\n\n短消息服务\n\
  \n短消息服务（SMS）允许你从移动设备发送长度不超过 160 个字符的文本消息。你可以使用无线消息 API（WMAPI，JSR 120）来发送和接收文本消息。WMAPI\
  \ 2.0（JSR 205）还支持多媒体消息（MMS）。\n\n无线消息的一个潜在问题是运行时间，它可能变化很大。此外，你无法保证消息一定会被送达。不过总的来说，SMS\
  \ 是一种简单且可靠的通信协议。\n\n蓝牙\n\n蓝牙允许你直接连接其他支持蓝牙的设备。这种连接非常适合临时交换信息。使用所谓的微微网，你还可以同时连接到多个其他设备。并非所有支持蓝牙连接的设备都通过可选的蓝牙\
  \ API（JSR 82）使其可用，但支持度正在不断增长。\n\n蓝牙的一个常见问题是，只有少数设备实现了蓝牙 API 中可选的 OBEX 部分。你可以创建自己的协议，或使用\
  \ Avetana OBEX 库（*http://sourceforge.net/projects/avetanaobex*）来交换数据。\n\n出于安全原因，大多数蓝牙设备会隐藏其\
  \ ID，除非用户明确请求“可见”。当你已经知道通信伙伴时，这不是问题，但当你的应用程序依赖于发现新设备时，这可能会产生严重影响。此类应用程序的一个例子是约会服务，每当它发现另一个也运行此服务的设备时，就会匹配兴趣。\n\
  \n5033CH15.qxd 6/20/05 9:20 AM Page 311\n\n第 15 章 ■ 在设备限制中灵活应对\n\n**311**\n\n最后，另一个问题是建立连接的延迟。当你只有很短的时间来建立连接时——例如，当用户彼此擦肩而过时——你可能无法发现设备并建立连接。\n\
  \nHTTP 网络连接\n\n超文本传输协议（HTTP）是在所有设备上进行连接的唯一有保证的方式。MIDP 2.0 设备还需要支持 HTTPS 连接以实现安全通信。\n\
  \nHTTP 是一种与网络无关的协议，因此原则上你的应用程序无需关心设备使用的是 WAP、TCP、GSM、GPRS、UMTS 还是其他网络技术。\n\n当你在某设备上建立连接遇到问题时，应首先检查你使用的是互联网接入点还是通过运营商的\
  \ WAP 网关进行连接。当你尝试连接到非标准端口时，通过 WAP 网关连接常常会导致问题。因此，你应该尝试为你的服务器应用程序使用端口 80、8080 或 443。如果仍然遇到问题，请确保在你的设备上使用互联网接入点。解析域名会减慢网络连接速度，也可能导致问题，因此请尝试在你的\
  \ J2ME 应用程序中使用静态 IP 地址。你可以通过将服务器 IP 地址作为 JAD 属性或预处理变量来配置你的应用程序。\n\n网络连接的延迟相当高，通常需要几秒钟。这排除了复杂的实时应用程序，例如多人动作游戏。同样，你可以通过使用\
  \ IP 地址而不是域名来稍微加快延迟。但是，当你的服务器应用程序将来迁移时，这可能会导致问题。\n\n由于连接需要付费，设备在即将建立 HTTP 连接时被要求询问用户权限。当用户不允许连接时，会抛出`SecurityException`异常。当你对应用程序进行签名时，可以使用`MIDlet-Permissions`\
  \ JAD 属性来声明你的应用程序需要 HTTP 连接才能运行。在这种情况下，仅在安装过程中询问用户一次。当用户拒绝所需资源时，应用程序根本不会安装。在 J2ME\
  \ Polish 中，你可以使用`<info>`元素的`permissions`属性来设置此 JAD 属性：`<info permissions=\"javax.microedition.io.Connector.http\"\
  \ [...] />`。\n\n**数据协议**\n\n\n\n在与服务器交换数据之前，你应该三思是否使用 XML 或 SOAP。XML 是一种语法冗长的协议，与实际数据相比，它带来了大量开销。你还需要在\
  \ J2ME 应用程序中解析和构建 XML 消息，这在性能和堆内存使用方面可能代价高昂。通常，使用你自己的专有二进制协议会更好。你可以使用 `DataInputStream`\
  \ 和 `DataOutputStream` 来方便地读写二进制数据。\n\n无论如何，如果你无法抗拒使用 XML 协议进行通信，你可以使用 kXML（*http://kxml.sourceforge.net*）来解析数据。\n\
  \n5033CH15.qxd 6/20/05 9:20 AM Page 312\n\n**312**\n\n第 15 章 ■ 在设备限制间周旋\n\n**身份验证**\n\
  \n当 J2ME 应用程序需要验证用户身份时，你可以使用几种方法来安全地传输数据。在 MIDP 2.0 设备上，你可以直接使用 HTTPS 连接。\n\n在 MIDP\
  \ 1.0 设备上，你可以计算密码的哈希值，并通过 HTTP 发送该值。你还应该为每个身份验证请求添加一个时间戳，并在哈希函数中也使用这个时间戳，以防止重放攻击。在重放攻击中，恶意入侵者会拦截通信，复制身份验证请求，并在之后重新发送。你可以使用\
  \ Bouncy Castle 加密 API 来计算哈希值（*http://www.bouncycastle.org*）。\n\n**会话和 Cookie**\n\
  \n你可以使用会话来维护跨多个请求的 HTTP 连接状态。这在处理用户数据时非常有用，否则 J2ME 应用程序需要在每个请求中发送身份验证数据。你可以使用 URL\
  \ 重写或 Cookie 来跟踪所使用的会话。你可以通过遍历连接的所有标头来检索 Cookie。当你开始一个新请求时，需要将 Cookie 设置为请求属性。\n\
  \n清单 15-11 展示了此问题的一个可能解决方案。\n\n**清单 15-11.** *接收和设置 Cookie*\n\n```java\nimport javax.microedition.io.HttpConnection;\n\
  \nimport java.io.IOException;\n\npublic class CookieStore {\n\nprivate String cookie;\n\
  \npublic void readCookie( HttpConnection con ) throws IOException {\n\nthis.cookie\
  \ = con.getHeaderField( \"Set-Cookie\" ); if ( this.cookie == null ) {\n\nthis.cookie\
  \ = con.getHeaderField( \"Set-Cookie2\" );\n\n}\n\n}\n\npublic void setCookie( HttpConnection\
  \ con )\n\nthrows IOException {\n\nif ( this.cookie != null ) {\n\ncon.setRequestProperty(\
  \ \"Cookie\", this.cookie );\n\n}\n\n}\n\n}\n```\n\n5033CH15.qxd 6/20/05 9:20 AM\
  \ Page 313\n\n第 15 章 ■ 在设备限制间周旋\n\n**313**\n\n**播放声音**\n\n得益于移动媒体 API（MMAPI，JSR\
  \ 135），如今播放声音和音乐已经变得相当容易。但在实践中，你需要注意一些限制。\n\n具体来说，当你想要同时播放多个声音时需要小心。在许多设备上，这是不可能的。当设备可以同时播放多个声音时，`supports.mixing`\
  \ 系统属性为 `true`：\n\n```java\nif ( \"true\".equals( System.getProperty( \"supports.mixing\"\
  \ ) ) { ...\n```\n\n同样，你可以在源代码中检查预处理变量 `polish.Property.supports.mixing`：\n\n```java\n\
  //#if polish.Property.supports.mixing == true\n```\n\n最安全的方法是每次只使用一个播放器，并在处理完一个声音后释放所有资源。同时预取多个声音也并非总是可行的。\n\
  \n清单 15-12 展示了如何反复播放一个声音，至少在 `playMusic` 字段为 `true` 时如此。另请注意，`PlayerListener` 使用\
  \ `equals()` 方法来比较传入的事件。这在所有设备上都有效，而使用 MMAPI 的 JavaDoc 文档中使用的 `==` 比较器则并非在所有设备上都有效。\n\
  \n**清单 15-12.** *使用 MMAPI 播放背景音乐*\n\n```java\n//#condition polish.api.mmapi || polish.midp2\n\
  \npackage com.apress.multimedia;\n\nimport java.io.IOException;\n\nimport javax.microedition.media.*;\n\
  \npublic class MusicPlayer\n```\n\n\nimplements PlayerListener {\n\npublic boolean\
  \ playMusic = true;\n\nprivate Player player;\n\npublic void playMusic( String url,\
  \ String contentType )\n\nthrows MediaException, IOException {\n\nboolean registerListener\
  \ = ( this.player == null );\n\nif ( !registerListener ) {\n\nthis.player.stop();\n\
  \nthis.player.deallocate();\n\n}\n\nthis.player = Manager.createPlayer(\n\ngetClass().getResourceAsStream(\
  \ url ), contentType );\n\nif ( registerListener ) {\n\nplayer.addPlayerListener(\
  \ this );\n\n}\n\nplayer.realize();\n\nplayer.prefetch();\n\nplayer.start();\n\n\
  }\n\n5033CH15.qxd 6/20/05 9:20 AM Page 314\n\n**314**\n\n第 15 章 ■ 在设备限制间周旋\n\npublic\
  \ void playerUpdate( Player p, String event, Object data ) throws MediaException\
  \ {\n\nif ( this.playMusic && event.equals( END_OF_MEDIA ) ) {\n\np.start();\n\n\
  }\n\n}\n\n}\n\n**使用浮点运算**\n\nJava 在 `java.lang.Math` 类中提供了 `float` 和 `double` 基本类型以及高级数学函数。遗憾的是，你只能在\
  \ CLDC 1.1 平台上使用浮点计算。大多数 J2ME 设备仍然基于 CLDC 1.0 配置，对此存在几种解决方案：你可以改用整数计算、使用浮点模拟库，或者使用\
  \ Floater 程序（*http://www.enough.de/floater*）来自动转换浮点计算。\n\n**使用整数代替浮点计算**\n\n通常，浮点计算并非真正必要。在这种情况下，你可以使用\
  \ `int` 和 `long` 基本类型自行模拟浮点计算。\n\n你可以通过将每个数字乘以一个固定因子（例如 100 或 1000）来使用自己的定点计算。要获得真实值，你只需将结果除以你选择的因子即可。例如，考虑清单\
  \ 15-13 中所示的简单分数计算。\n\n你可以使用 `Mover` 类来计算一个物体移动的距离。每次调用 `moveForward()` 都会返回移动的距离。例如，你可以在动画中使用这种计算。\n\
  \n**清单 15-13.** *一个简单的浮点计算* public class Mover {\n\nprivate int step;\n\nprivate\
  \ final int steps;\n\nprivate final float distancePerStep;\n\npublic Mover( int\
  \ distance, int steps ) {\n\nthis.steps = steps;\n\nthis.distancePerStep = (float)\
  \ distance / (float) steps;\n\n}\n\npublic int moveForward() {\n\nthis.step++;\n\
  \nif ( step > this.steps ) {\n\nthis.step = 0;\n\n5033CH15.qxd 6/20/05 9:20 AM Page\
  \ 315\n\n第 15 章 ■ 在设备限制间周旋\n\n**315**\n\n}\n\nreturn (int) ( this.step * this.distancePerStep\
  \ );\n\n}\n\n}\n\n当不需要高精度时，你可以使用 `int` 变量代替 `float` 变量。对于更高精度，则使用 `long` 变量代替 `double`\
  \ 变量。清单 15-14 展示了一个 `Mover` 实现，它通过将 `distancePerStep` 变量乘以 100 来模拟两位小数。\n\n**清单\
  \ 15-14.** *一个仅使用整数进行简单浮点计算的解决方案* public class Mover {\n\nprivate int step;\n\n\
  private final int steps;\n\nprivate final int distancePerStep;\n\npublic Mover(\
  \ int distance, int steps ) {\n\nthis.steps = steps;\n\nthis.distancePerStep = (\
  \ distance * 100 ) / steps;\n\n}\n\npublic int moveForward() {\n\nthis.step++;\n\
  \nif ( step > this.steps ) {\n\nthis.step = 0;\n\n}\n\nreturn ( this.step * this.distancePerStep\
  \ ) / 100;\n\n}\n\n}\n\n**使用浮点模拟库**\n\n浮点模拟库允许你实现涉及三角函数等的复杂计算。流行的库有用于快速计算的 MathFP\
  \ 和用于高精度计算的 MicroFloat 库。表 15-5 列出了一些可用于 CLDC 1.0 配置的浮点库。\n\n**表 15-5.** *浮点模拟库*\n\
  \n**名称**\n\n**许可证**\n\n**主页**\n\nMathFP\n\n宽松源代码许可证\n\n*http://home.rochester.rr.com/ohommes/MathFP*\n\
  \nMicroFloat\n\nGPL\n\n*http://www.dclausen.net/projects/microfloat*\n\nJMFP\n\n\
  LGPL\n\n*http://sourceforge.net/projects/jmfp*\n\nFPLib\n\nArtistic 许可证\n\n*http://bearlib.sourceforge.net*\n\
  \n5033CH15.qxd 6/20/05 9:20 AM Page 316\n\n**316**\n\n第 15 章 ■ 在设备限制间周旋\n\n**MathFP**\n\
  \nOnno Hommes 开发的 MathFP 库提供快速计算，并根据宽松源代码许可证授权。你可以从 *http://home.rochester.rr.com/ohommes/MathFP*\
  \ 下载它。\n\n你可以在长模式（使用 `net.jscience.math.MathFP` 类）下使用 MathFP 库以获得更高精度，或者在资源占用较少的\
  \ int 模式（使用 `net.jscience.math.kvm.MathFP` 类）下使用。你需要先将字符串转换为内部的 MathFP 格式，而不是直接使用\
  \ `float` 或 `double` 值。转换后，你将获得一个表示该值的内部整数。你也可以将内部的 MathFP 整数值转换回对应的 `int` 或 `long`\
  \ 值（不含小数部分）。清单 15-15 向你展示了如何使用 MathFP 计算圆的面积。\n\n**清单 15-15.** *使用 MathFP 计算圆所占空间*\n\
  \npublic int calculateCircleSpace( String radiusStr ) {\n\nint radius = MathFP.toFP(\
  \ radiusStr );\n\nint exponent = MathFP.toFP( 2 );\n\nint result = MathFP.mul( MathFP.PI,\n\
  \nMathFP.pow( radius, exponent ) );\n\nreturn MathFP.toInt( result );\n\n}\n\n**MicroFloat**\n\
  \nDave Clausen 开发的 MicroFloat 库以其高精度而闻名。使用 MicroFloat 进行计算会产生与原生 Java 浮点计算相似的结果，因为\
  \ MicroFloat 遵循国际 IEEE 754 标准（*http://grouper.ieee.org/groups/754*）。你可以在 *http://www.dclausen.net/projects/microfloat*\
  \ 下载 MicroFloat。\n\nMicroFloat 的用法与 MathFP 类似。你可以使用 `net.dclausen.microfloat.MicroFloat`\
  \ 类来模拟 `float`，或使用 `net.dclausen.microfloat.MicroDouble` 类来模拟 `double` 值。清单 15-16\
  \ 向你展示了如何使用 MicroFloat 计算圆所占的空间。\n\n**清单 15-16.** *使用 MicroFloat 计算圆所占空间* public\
  \ int calculateCircleSpace( String radiusStr ) {\n\nint radius = MicroFloat.parseFloat(\
  \ radiusStr );\n\nint result = MicroFloat.mul( MicroFloat.PI,\n\nMicroFloat.mul(\
  \ radius, radius ) );\n\nreturn MicroFloat.intValue( result );\n\n}\n\n**自动转换**\n\
  \n你也可以使用 Enough Software 的 Floater 工具来自动转换任何浮点计算。J2ME Polish 包含此转换器的评估版本。你可以在 *http://www.enough.de/floater*\
  \ 找到关于 Floater 的更多信息。\n\n5033CH15.qxd 6/20/05 9:20 AM Page 317\n\n第 15 章 ■ 在设备限制间周旋\n\
  \n**317**\n\n使用 Floater，你可以正常使用 `float` 和 `double`，以及 CLDC 1.1 的 `java.lang.Math`\
  \ 实现的所有功能。Floater 通过在编译阶段后处理字节码来实现这一点。J2ME Polish 集成会自动为所有 CLDC 1.0 目标设备处理字节码。另一个好处是，Floater\
  \ 不需要使用字符串将浮点值转换为内部格式，因此与在源代码级别进行手动转换相比，由 Floater 处理的应用程序更精简、速度更快。此外，你无需区分任何内部格式和真正的整数变量，因为\
  \ Floater 会透明地处理这一切。\n\n**使用受信任的 MIDlet**\n\n签署 J2ME 应用程序的可能性在开发者社区中引起了许多困惑和挫折，因为大多数设备不识别流行的\
  \ VeriSign 和 Thawte 代码签名证书。\n\nMIDP 2.0 规范引入了受信任 MIDlet 的概念。当满足以下条件时，MIDlet 被视为受信任：\n\
  \n• MIDlet 已被签名。\n\n• 签名已被设备认证。\n\n• 已签名 MIDlet 的完整性已由设备验证。\n\n权限\n\n\n\n当您的应用程序需要访问安全敏感资源（如互联网连接）时，需要对\
  \ MIDlet 进行签名。您可以在 MIDlet-Permissions JAD 属性中声明所需的权限。在 J2ME Polish 中，您可以使用 `<info>`\
  \ 元素的 `permissions` 属性来定义必要的权限，例如 `<info permissions=\"javax.microedition.io.Connector.http\"\
  \ [...] />`。同样，您也可以使用 `optionalPermissions` 属性来定义可选权限。\n\n权限的可能取值包括 `javax.microedition.ui.Connector.http`、`javax.microedition.ui.Connector.socket`\
  \ 和 `javax.microedition.io.PushRegistry`。\n\n请查阅附录以了解所有可能的权限。\n\n当您想要访问所谓的封闭资源（如底层网络\
  \ API（数据报、套接字、串行））时，通常需要有效的签名；否则，会立即抛出 `SecurityException`。\n\n**签名 MIDlet**\n\n\
  当应用程序被签名后，JAR 文件的 SHA1 哈希值会被计算并添加到 JAD 文件中。用于计算的证书也会被添加到 JAD 文件中。JAR 文件本身不会改变，且之后不得修改。用户会被询问一次是否授予已签名的\
  \ MIDlet 所请求的权限。当必需的权限被拒绝时，安装会中止。当用户拒绝可选权限时，安装会继续进行。在这种情况下，应用程序运行期间会再次询问用户，就像未签名的\
  \ MIDlet 一样。\n\n5033CH15.qxd 6/20/05 9:20 AM 第 318 页\n\n**318**\n\n第 15 章 ■ 在设备限制间周旋\n\
  \n■**注意** 请参阅第 7 章的“签名 MIDlet”部分，了解如何使用 J2ME Polish 自动签名您的应用程序。\n\n**根证书与 Java Verified**\n\
  \n您需要一个证书来签名您的应用程序。设备也需要识别并信任所使用的证书；否则，安装会中止。所有设备都为此目的包含了所谓的根证书。\n\n根证书分为三类：\n\n\
  - **供应商证书**用于签名预装的 J2ME 应用程序。此类应用程序享有最高级别的信任，可以访问所有内容。显然，您需要与供应商建立业务关系，才能使用供应商证书进行签名。\n\
  - **运营商**也可以将自己的根证书添加到其手机中。同样，您需要与相应的供应商建立业务关系，才能使用运营商证书签名您的应用程序。\n- **Java Verified/GEO\
  \ Trust 证书**也存在于大多数符合 MIDP 2.0 规范的设备上。\n\nJava Verified（*http://www.javaverified.com*）是一项提供测试和签名服务的倡议。当您的应用程序通过测试并支付了必要费用后，Java\
  \ Verified 会使用 GEO Trust 证书（*http://www.geotrust.com*）对您的应用程序进行签名，然后通过电子邮件返回给您。因此，通常您无法自行签名您的\
  \ MIDlet。如果您因访问封闭资源（如底层网络 API）而依赖有效签名，这会尤其令人烦恼。某些设备可能支持导入新证书，在这种情况下，您可以在开发阶段创建并使用自己的证书。\n\
  \n一种减少所需验证次数的可行策略是将应用程序拆分为应用程序本身及其操作的数据。在这种场景下，应用程序本身保持不变，并在首次运行时下载其操作所需的数据。然而，在现实中，很少有应用程序能够保持不变。\n\
  \n当您的应用程序需要签名时，您应尽量限制目标设备的数量，因为您需要为每个经过测试和签名的应用程序版本付费。您可以使用诸如“Nokia/Series40DP2”或“Generic/midp2”之类的虚拟设备。它们对其各自设备类的功能进行了分组。\n\
  \n**识别设备**\n\n每台设备都有一个全球唯一的识别号码，称为国际移动设备识别码（IMEI）。类似的识别码是国际移动用户识别码（IMSI），它与用户的用户识别模块（SIM）卡绑定。在某些设备上，您可以通过查询系统属性从\
  \ J2ME 应用程序中访问这些值；在其他设备上，您需要运行自己的识别程序。\n\n您可以通过请求 IMSI 系统属性在摩托罗拉设备上访问 IMSI。西门子通过系统属性\
  \ `com.siemens.mp.imei` 提供 IMEI。在索尼\n\n5033CH15.qxd 6/20/05 9:20 AM 第 319 页\n\n\
  第 15 章 ■ 在设备限制间周旋\n\n**319**\n\n爱立信设备上，您需要使用 `com.sonyericsson.imei` 或 `com.sonyericsson.IMEI`。RIM\
  \ 黑莓设备通过调用 `GPRSInfo.getIMEI()` 使 IMEI 可访问。J2ME Polish 设备数据库在 `polish.Property.imei`\
  \ 和 `polish.Property.imsi` 变量中包含了访问这些标识所需的键。\n\n在诺基亚设备上，您无法从 J2ME 应用程序中访问 IMSI 或\
  \ IMEI。在这种情况下，您需要创建自己的识别解决方案。\n\n通常，用户的手机号码（MSISDN）被用于识别目的。当用户通过您的空中下载（OTA）服务器请求应用程序时，MSISDN\
  \ 可以动态添加到应用程序包中。当用户通过 WAP 访问您的 OTA 服务器时，如果运营商添加了此信息，您可以从 WAP 请求的 HTTP 标头中提取 MSISDN。通常，只有当您与该运营商有业务关系时，运营商才会添加\
  \ MSISDN 标头或类似的识别标头。当然，您也可以要求用户提供其手机号码。一旦您获得了 MSISDN，就可以将其插入用于安装的 JAD 文件中。然后，您可以在应用程序中通过调用\
  \ `MIDlet.getAppProperty( String attributeName )` 来访问该 JAD 属性。JAD 文件可以轻松更改；一个更安全的选项是按需重建应用程序，并将\
  \ MSISDN 作为预处理变量提供。\n\n在支持蓝牙 API 的设备上，您还可以通过调用 `LocalDevice.getLocalDevice().getBluetoothAddress()`\
  \ 将设备的蓝牙地址用作全局唯一标识。\n\n清单 15-17 演示了如何在一个方法中使用不同的识别选项。当预处理变量 `user.msisdn` 被定义时，返回相应的值。然后检查是否可以检索到\
  \ IMEI 或 IMSI。如果这也无法实现，则在支持蓝牙 API 的设备上返回蓝牙地址。最后但同样重要的是，当所有其他方法都失败时，从 MIDlet 中检索应用程序属性\
  \ `user.msisdn`。为了允许您区分识别方法，每个返回的 ID 都以一个标头开头，例如 `msisdn:+4916012345678`。\n\n**清单\
  \ 15-17.** *检索全局唯一标识 ID*\n\n```java\npublic String getIdentification( MIDlet midlet\
  \ ) {\n    //#if user.msisdn:defined\n    //#= return \"msisdn:${user.msisdn}\"\
  ;\n    //#elif polish.Property.imei:defined\n    //#= return \"imei:\" + System.getProperty(\
  \ \"${polish.Property.imei}\" );\n    //#elif polish.Property.imsi:defined\n   \
  \ //#= return \"imsi:\" + System.getProperty( \"${polish.Property.imsi}\" );\n \
  \   //#elif polish.api.btapi\n    return \"bluetooth:\" + LocalDevice.getLocalDevice().getBluetoothAddress();\n\
  \    //#else\n    String msisdn = midlet.getAppProperty( \"user.msisdn\" );\n  \
  \  if ( msisdn != null ) {\n        return \"misdn:\" + msisdn;\n    } else {\n\
  \        return null;\n    }\n    //#endif\n}\n```\n\n5033CH15.qxd 6/20/05 9:20\
  \ AM 第 320 页\n\n**320**\n\n第 15 章 ■ 在设备限制间周旋\n\n**访问原生功能**\n\n\n\n得益于可选 API，应用程序现在可以访问许多此前仅原生应用才能使用的手机功能。然而，J2ME\
  \ 应用仍无法访问某些领域。当你的应用需要原生功能时，你有两种选择：开发原生应用，或在 J2ME 应用内部访问原生功能。\n\n创建原生应用超出了本书的讨论范围，但你应该意识到，存在多种操作系统且其版本部分不兼容。因此，若想覆盖广泛的用户群体，应尽可能坚持使用纯\
  \ Java。\n\n当目标设备支持 Personal Java 配置文件时，你可以直接使用 Java 原生接口（JNI）技术来访问原生功能。JNI 提供了一种便捷且标准化的方式来调用函数并接收其返回值。在这种情况下，只有当你想支持新平台时才需要移植原生函数，因为\
  \ Java 代码可以保持不变。需要注意的是，只有少数 J2ME 设备支持 Personal Java 配置文件，例如诺基亚 Communicator 系列或索尼爱立信的\
  \ UIQ 设备（如 P910）。\n\n部分 KVM 也支持 JNI 或类似技术。例如，JBlend 平台就提供了这种可能性（*http://www.aplix.co.jp/en/jblend/jblend/practical04.html*）。通常，你需要与相应的供应商或运营商建立商业关系，才能获准使用\
  \ JNI。\n\n第三种可能性是实现一个原生应用，它通过监听特定端口（如 4242）建立服务器连接并等待传入请求。在此场景下，你可以打开一个套接字连接并访问本地服务器，例如：`SocketConnection\
  \ mySocket = (SocketConnection) Connector.open( \"socket://127.0.0.1:4242\" );`。\n\
  \n最后，理论上可以使用 `MIDlet.platformRequest()` 机制来启动原生应用。通常，当请求以 `tel:<号码>` 方案开头时，你可以初始化电话呼叫；使用\
  \ `http:<网址>` 方案时，则可以启动浏览器。\n\n制造商未来可以添加自己的请求方案。\n\n检测中断\n\nMIDlet 随时可能被来电或类似事件中断。在这种情况下，应用程序管理系统（AMS）应调用\
  \ `MIDlet.pauseApp()`，但在某些设备上并不会发生。通过一些防御性编程技术，你可以在所有手机上检测到中断。\n\n一个典型场景是游戏，它应在被中断时暂停。为了获得最佳可移植性，你应该从三个不同角度解决这个问题：使用\
  \ `MIDlet.pauseApp()`、使用 `Canvas.hideNotify()`，以及检测异常时间间隔。\n\n使用 `MIDlet.pauseApp()`\
  \ 机制很简单。你可以在调用 `pauseApp()` 后进入 **PAUSED** 状态，并在再次调用 `MIDlet.startApp()` 时恢复应用。\n\
  \n某些设备（最典型的是诺基亚 Series 40）从不调用 `pauseApp()`。相反，当当前（低级 GUI）屏幕不再显示时，你会收到通知。你可以在游戏中重写\
  \ `Canvas.hideNotify()` 方法来暂停游戏，并重写 `Canvas.showNotify()` 方法来恢复游戏。\n\n最后，某些设备在发生中断时似乎会停止整个\
  \ Java 虚拟机，而不调用任何通知方法。此时你唯一能做的就是记录应用程序线程上次执行的时间，并在下次运行时与当前时间进行比较。当你发现两次运行之间存在异常长的时间间隔时，可以假设发生了中断。使用\
  \ `System.currentTimeMillis()` 方法获取当前时间。\n\n■**注意** 当设备同时支持 `MIDlet.pauseApp()`/`startApp()`\
  \ 和 `Canvas.hideNotify()`/\n\n\n\n`showNotify()` 的调用顺序可能出乎意料。一种实现可能会依次调用 `hideNotify()`、`pauseApp()`、<中断>、`showNotify()`\
  \ 和 `startApp()`，而另一种实现则可能调用 `pauseApp()`、<中断>、`startApp()`、`hideNotify()` 和 `showNotify()`。请在你的应用程序中为不同的调用顺序做好准备。\n\
  \n**获取帮助**\n\n在接下来的章节中，你将了解可以在哪些论坛和邮件列表中提出你的问题。\n\n**遵守网络礼仪**\n\n当你发布任何问题或声明时，应遵守一定的规则。这些规则能让每个人的交流更顺畅，因此请尽可能遵守网络礼仪。网络礼仪实际上只是常识，但你可能惊讶于有多少人对此毫不在意。\n\
  \n在提问之前，你应该先搜索答案。首先使用普通的搜索引擎，如 Google，然后查看专门的论坛和门户网站。大多数论坛都提供搜索功能，并会整理一份常见问题列表，你应该优先查阅。\n\
  \n当你找不到问题的答案时，请将问题发布到合适的论坛，并尽可能详细地描述你的问题。请明确指出产生错误的手机或模拟器型号，说明你正在使用的任何第三方软件及其版本，尽可能具体地描述问题，并在适用时提供堆栈跟踪信息或异常名称。你还应附上源代码的相关部分，以便其他用户能够追踪到编码错误。在许多论坛上，你可以用\
  \ `[code]..[/code]` 将源代码括起来，以便正确格式化。不要忘记描述你想要实现的目标；有时存在解决问题的替代方法。最后，你应该说明同样的程序是否能在其他设备或模拟器上正常运行而不出现问题。\n\
  \n当你因某个问题感到沮丧时，很容易失去耐心，所以请确保以礼貌的方式提问。如果你咒骂或以任何方式咄咄逼人地要求，就别指望能得到有用的回答。\n\n最后但同样重要的是，在论坛上宣传你的产品时要谨慎。一些论坛为此设有专门的版块。一般来说，只有当你的产品新闻对\
  \ J2ME 开发者真正有意义时，才应发布。\n\n5033CH15.qxd 6/20/05 9:20 AM 第 322 页\n\n**322**\n\n第 15\
  \ 章 ■ 在设备限制间周旋\n\n**探索 J2ME Polish 论坛**\n\n存在用于讨论 J2ME Polish 相关问题的英文和德文论坛。你也可以加入\
  \ J2ME Polish 用户邮件列表。在 *http://www.j2mepolish.org* 上，选择“讨论”以访问论坛。或者通过加入 *irc://irc.synyx.de#j2mepolish*\
  \ 互联网中继聊天，直接与其他 J2ME Polish 用户联系。\n\n**探索厂商论坛**\n\n许多厂商也提供用于讨论其 J2ME 设备的论坛。表 15-6\
