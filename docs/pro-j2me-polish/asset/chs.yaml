  \n**图 9-1.** *诺基亚 Series 60 手机上的日志*\n\n当你将 `<debug>` 元素的 `showLogOnError` 属性设置为\
  \ `true`，并且将一个异常作为最后一个参数添加时，日志会自动显示，如代码清单 9-4 所示。但是，J2ME Polish 仅在你使用 J2ME Polish\
  \ GUI 时才能自动显示日志。\n\n5033CH09.qxd 6/17/05 12:09 PM 第 129 页\n\n第 9 章 ■ 日志框架\n\n**129**\n\
  \n**代码清单 9-4.** *记录异常*\n\ntry {\n\nimage = Image.createImage( url );\n\n} catch\
  \ (IOException e) {\n\n**//#debug error**\n\n**System.out.println(\"无法加载图片 [\" +\
  \ url + \"]\" + e );**\n\n}\n\n你可以随时通过调用 `de.enough.polish.util.Debug.showLog( Display\
  \ display )` 方法手动显示日志。该类位于 *${polish.home}/import/enough-j2mepolish-client.jar*\
  \ 文件中。你应该将此文件添加到 IDE 中项目的类路径中。\n\n你应该仅在日志框架被激活时显示日志。否则，你在日志中看不到多少条目。你可以通过检查代码中的\
  \ `polish.debugEnabled` 预处理符号来检测日志框架是否处于活动状态。代码清单 9-5 演示了如何使用命令来触发日志显示。\n\n**代码清单\
  \ 9-5.** *手动显示日志*\n\n**import de.enough.polish.util.Debug;**\n\nimport javax.microedition.lcdui.*;\n\
  \nimport javax.microedition.midlet.*;\n\npublic class MyMIDlet extends MIDlet\n\n\
  implements CommandListener\n\n{\n\n**//#ifdef polish.debugEnabled**\n\n**private\
