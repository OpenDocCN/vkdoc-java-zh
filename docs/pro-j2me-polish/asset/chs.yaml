  \ 允许您发起和接听语音呼叫、接收网络通知和 ID 等。\n\nMSAPI\n\n早期\n\n移动传感器 API 允许您发现和采样来自传感器的数据，而与底层传输协议无关。\n\
  \nMUICAPI\n\n早期\n\n移动用户界面定制 API 允许您查询设备的用户界面设置。\n\nAHNAPI\n\n早期\n\n自组网 API 简化了点对点应用程序的开发。\n\
  \nUMBAAPI\n\n早期\n\n统一消息框访问 API 允许您读取、写入、复制和移动设备上的任何类型的消息。\n\nMBSAPI\n\n早期\n\n手持终端移动广播服务\
  \ API 允许您接收广播媒体并与之交互。\n\n**JTWI 规范与移动服务架构**\n\nJSR 185，即无线行业 Java 技术（JTWI），是多家制造商共同努力的结果，旨在为\
  \ Java 应用程序开发者创造一个更可预测的环境。JSR 248，即移动服务架构（MSA），延续了 JTWI 开始的工作，并用新技术增强了定义。\n\nJTWI\
  \ 基于 MIDP 2.0 配置文件，并要求兼容设备至少支持无线消息 API（WMAPI 1.1），并且在适用但可选的情况下支持移动媒体 API（MMAPI 1.1）。JTWI\
  \ 还澄清了 CLDC 和 MIDP 规范中一些存在解释空间的部分，包括以下内容：\n\n• 兼容实现至少支持十个并行线程。\n\n• `System.currentTimeMillis()`\
  \ 的时钟分辨率应为 40 毫秒或更短。\n\n• 支持基本拉丁语和拉丁语-1 字符。\n\n• 可以支持自定义的 GMT 兼容时区。\n\n• JAR 文件至少支持到\
  \ 64KB，JAD 文件至少可以为 5KB。\n\n• 在兼容 JTWI 的手机的记录管理系统中，MIDlet 至少可以占用 30KB 的数据。\n\n• MIDlet\
  \ 可用的堆大小至少为 256KB。\n\n• 屏幕尺寸至少为 125✕125 像素，颜色深度至少为每像素 12 位（4,096 种颜色）。\n\n• 支持 JPEG\
  \ 和 PNG 图像。\n\n• 需要支持 HTTP 1.1 以检索多媒体内容。\n\n5033CH14.qxd 6/17/05 12:15 PM 第 279\
  \ 页\n\n第 14 章 ■ 无线市场概述\n\n**279**\n\n• 设备需要能够在特定时间执行 MIDlet（使用 `PushRegistry.registerAlarm()`\
  \ 机制）。\n\n• 手机需要能够在收到传入消息时执行已注册的 MIDlet，这可以通过使用 JAD 属性 `MIDlet-Push-n` 或调用 `PushRegistry.registerConnection()`\
  \ 来实现。\n\n• 当通过 Java 库提供多媒体功能时，兼容 JTWI 的设备需要通过移动媒体 API 公开该功能。\n\n• 支持 MMAPI 的设备需要能够至少播放\
  \ MIDI 和音序文件。当设备包含相应功能时，它们还需要允许捕获 JPEG 图像和 WAV 音频。\n\n移动服务架构规范仍处于早期阶段，但兼容手机的最低要求将是\
  \ CLDC 1.1 配置和 MIDP 2.0 配置文件。\n\n您可以通过测试预处理符号 `polish.jtwi` 来检查设备是否符合 JTWI 标准。\n\
  \n**支持的格式**\n\n\n\n设备支持多种音频、视频和图像格式，但通常只有少数几种格式被广泛接受。一般来说，你应该坚持使用 MIDI、音序和 AMR 声音以及\
  \ PNG 图像。J2ME Polish 的设备数据库包含所支持格式的信息，因此你可以使用资源组装来包含正确的资源，并使用预处理来集成针对该格式的正确代码。第\
  \ 15 章将更详细地讨论声音的播放。\n\n**设备修改**\n\n由于不同的固件版本和运营商修改，设备的行为和能力可能会发生变化。\n\n固件可能非常有趣。一个相当极端的例子是摩托罗拉\
  \ E398，其软键的按键事件会因固件版本不同而改变。新固件可以解决问题，但也可能引入新的错误。不幸的是，你不能指望用户会更新他们的固件，即使最新版本解决了关键任务问题。\n\
  \n一种常见的策略是只支持最广泛采用的固件，即使这通常意味着不支持早期采用者。\n\n一些运营商也会修改设备。例如，沃达丰添加了其沃达丰服务类库，其中包含一些\
  \ 3D 和其他功能。你需要成为经过认证的沃达丰合作伙伴才能获得这些库的完整信息。更严重的修改是禁用某些功能。运营商可以选择仅向经过认证的合作伙伴开放特定的 API，例如位置\
  \ API。此类运营商修改不仅会影响技术可行性，还会影响你项目的商业模式，因此请务必考虑它们。\n\n5033CH14.qxd 6/17/05 12:15 PM\
  \ 第 280 页\n\n**280**\n\n第 14 章 ■ 无线市场概览\n\n**设备问题**\n\n设备问题是为何为手机创建既引人注目又完美运行的应用程序如此困难的主要原因。第\
  \ 15 章将详细讨论这些问题，但我在此提及它们是为了完整地说明设备差异。\n\n**模拟器陷阱**\n\n模拟器非常适合在你的开发系统上直接测试应用程序，但不幸的是，你不能信任它们。在邮件列表和讨论板上经常听到的借口是“但在模拟器上能运行！”\n\
  \n许多模拟器基于 Sun 的原始 Wireless Toolkit，而实际的 Java 实现是由不同公司创建的。因此，实际行为通常与 PC 上的模拟不同。常见问题包括颜色和图像的渲染方式、性能以及设备特定问题。通常，模拟器不会重现实际设备存在的问题。然而，更严重的是，模拟器可能包含实际设备上不存在的错误。\n\
  \n底线是，你应该使用模拟器来加速实现阶段，但在尝试解决设备特定问题时，不应信任模拟器。\n\n模拟永远不完美，因此在真实设备上进行测试对于你的应用程序的成功至关重要。\n\
  \n**审视当前市场**\n\n移动市场的增长是传奇性的，手机销量多次超出市场研究人员的预测。在接下来的章节中，我将讨论市场如何演变以及这对你的业务意味着什么。\n\
  \n**电信市场**\n\n全球有 15 亿电信用户，占世界人口的四分之一。\n\n具体来说，根据 Forrester Research 的数据，这些用户中有\
  \ 78% 使用 GSM，14% 使用 CDMA，6% 使用 TDMA 网络技术。同一项研究得出结论，约 80% 的人口被网络覆盖，因此还有 35 亿潜在用户，但他们中的大多数人没有太多钱可花。3G\
  \ 网络技术 UMTS 和 WDCMA 的重要性日益增加，但根据 ARC Group 的数据，2004 年只有 4% 的售出手机支持 3G 技术。然而，IDC\
  \ 估计，在西欧，2005 年售出的手机中有 16% 支持 3G 技术。\n\n2\\. 使用美国数字，因此十亿在欧洲大陆是十亿（milliard）。\n\n\
