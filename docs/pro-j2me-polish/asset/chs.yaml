  \n</j2mepolish>\n\n**性能调优**\n\n你可以通过多种方式提高应用程序的性能，本节将对此进行讨论。高层优化涉及应用程序的架构和使用的协议，而底层优化则涉及使用的算法或数据结构。你应该将此类底层更改作为最后一步，当无法再进行高层优化时再进行。\n\
  \n高层性能调优\n\n许多性能问题可以通过更改架构、使用的协议或使用的算法来解决。通常，高层更改可以极大地提高（或降低）应用程序的性能。\n\n5033CH16.qxd\
  \ 6/17/05 12:16 PM Page 330\n\n**330**\n\n第 16 章 ■ 优化应用程序\n\n**调整架构**\n\n架构为你的应用程序提供了基础，并允许你在设计阶段就对应用程序进行调优。你应该致力于减少抽象并加强功能的分组。\n\
  \n**减少抽象** 抽象有利于在不同环境中重用组件。但每个抽象层不仅会增加应用程序的大小，还会降低执行速度，因为虚拟机需要在运行时解析继承结构。调用仅由一个具体类实现的方法，比调用由一个抽象类实现并由一个具体类重写的接口方法要快得多。\n\
  \n通过使用一点预处理，你可以同时避免和使用接口。清单 16-4 演示了如何仅在具体实现未知的情况下使用接口。\n\n**清单 16-4.** *通过预处理同时使用和避免接口*\
  \ public interface SelectionListener {\n\npublic void selectionChanged( StringListItem\
  \ item );\n\n}\n\npublic class StringListItem extends CustomItem {\n\n**//#if SelectionListenerImplementation:defined**\n\
  \n//#= ${classname( SelectionListenerImplementation )} selectionListener;\n\n//#else\n\
  \nSelectionListener selectionListener;\n\n//#endif\n\n**//#if SelectionListenerImplementation:defined**\n\
  \n//#= public void setSelectionListener(\n\n//#= ${classname( SelectionListenerImplementation\
  \ )} selectionListener\n\n//#= ) {\n\n//#else\n\npublic void setSelectionListener(\n\
  \nSelectionListener selectionListener\n\n) {\n\n//#endif\n\nthis.selectionListener\
  \ = selectionListener;\n\n}\n\n[...]\n\n}\n\npublic class Controller\n\n**//#if\
  \ SelectionListenerImplementation:defined**\n\n//# implements CommandListener\n\n\
  //#else\n\nimplements CommandListener, SelectionListener\n\n5033CH16.qxd 6/17/05\
  \ 12:16 PM Page 331\n\n第 16 章 ■ 优化应用程序\n\n**331**\n\n//#endif\n\n{\n\npublic void\
  \ selectionChanged( StringListItem item ) {\n\n//#debug info\n\nSystem.out.println(\
  \ \"selection changed: \" + item );\n\n}\n\n[...]\n\n}\n\n你可以通过在 *build.xml* 脚本中设置预处理变量来“发布”一个具体的实现。当定义了变量\
  \ `SelectionListenerImplementation` 时，清单 16-4 不使用接口：\n\n<variable name=\"SelectionListenerImplementation\"\
  \ value=\"Controller\" /> 在代码中，当所有类都被 J2ME Polish 移入默认包时（这由 *build.xml* 文件中 `<obfuscator>`\
  \ 元素的 `useDefaultPackage` 属性启用），你还需要额外使用 `classname` 属性函数。`classname` 函数在未使用默认包时返回完全限定名，例如\
  \ `com.apress.performance.Controller`，但在使用默认包时仅返回类名本身——在本例中为 `Controller`。这是必要的，因为\
  \ `useDefaultPackage` 选项会在编译前将所有源文件移入默认包。\n\n■**注意** 消除仅由一个类实现的接口是自动优化的一个潜在目标。Enough\
  \ Software 目前正在开发 Juicer 优化器 ( *http://www.enough.de/juicer*)，它将实现这一点，并在字节码级别进行其他几项改进。\n\
  \n**线程** 线程是昂贵的资源，应在应用程序中谨慎使用。尝试设计你的架构，使其尽可能多地包含单线程区域。这也会减少对同步方法的需求，因为同步方法会拖慢你的应用程序。\n\
  \n**重用和缓存对象** 创建对象可能代价高昂，尽管在当前 HotSpot 虚拟机上创建对象的成本远低于第一代 KVM。设计你的架构，使其能够重用对象。\n\n\
  重用对象有时涉及缓存对象。在许多情况下，缓存会使使用复杂化，并增加所需的堆内存，因此你可能最好不要重用这些对象。当数据检索成本高昂、数据被频繁访问，并且数据本身足够小可以放入堆中时，缓存是有用的。你还需要考虑如何维护缓存和数据源之间的一致性。如果你有大型数据集，你可能能够识别出最常需要的部分，这样就不需要缓存所有内容。\n\
  \n**协议和网络操作**\n\n\n\n选择用于存储和传输数据的协议会影响应用程序的内存消耗和性能表现。\n\n5033CH16.qxd 6/17/05 12:16\
  \ PM 第 332 页\n\n**332**\n\n第 16 章 ■ 优化应用程序\n\n使用基于 XML 的协议传输数据虽然很流行，但解析数据需要额外的资源，同时也会传输大量冗余数据。使用\
  \ SOAP 或 Web 服务时也是如此。当您的应用程序仅需与自有服务器通信时，采用二进制协议通常是更好的选择。您可以使用`DataInputStream`和`DataOutputStream`类来实现此类协议。不过，当您拥有多通道服务器应用程序或需要访问不同公司的服务器时，使用\
  \ Web 服务往往是更优方案。\n\n为提高网络吞吐量，您还可以考虑仅传输已更改的数据，尤其是在结合数据缓存的情况下。请注意，这会增加数据解析的复杂性。另一种类似方案是压缩数据。遗憾的是，MIDP\
  \ 标准并未提供读写 ZIP 流的方法。作为替代，您可以使用 TinyLine 项目（*http://www.tinyline.com*）的`GZIPInputStream`实现。\n\
  \n为提升性能，您还可以尽量减少加密的使用，例如仅在每个会话中认证一次。但对于安全性敏感的应用程序，您必须谨慎行事，不能放弃所有可用的数据安全手段。有关如何在保持高安全性的同时提升应用可用性的思路，请参阅“提升感知性能”部分。\n\
  \n网络操作的速度远低于其他几乎所有操作。除了减少传输数据量和用 IP 地址替代服务器名称外，您能做的加速网络操作的事情并不多。数据缓存可能会有所帮助，您甚至可以考虑将接收到的数据存储在记录存储中，这样在重启应用程序时至少能拥有部分（可能已过时的）数据。\n\
  \n**记录存储**\n\n记录存储用于持久化数据。您通过调用`RecordStore.enumerateRecords()`方法来读取它们，该方法允许您为枚举指定比较器和过滤器。\n\
  \n`RecordFilter`和`RecordComparator`接口的问题在于，它们只能获取单个记录集的`byte[]`数据。通常您需要恢复原始对象来比较各个记录集，因此当同时使用过滤器和比较器时，每个记录集对象至少需要创建和销毁四次：比较器中两次，过滤器中一次，应用程序中一次。这不仅会降低性能，还会大幅增加应用程序的内存占用。清单\
  \ 16-5 演示了这些元素的使用。\n\n**清单 16-5.** *通过过滤和排序记录存储创建大量临时对象*\n```java\nimport javax.microedition.rms.*;\n\
  import de.enough.polish.util.ArrayList;\n\npublic class RecordStoreReader\n    implements\
  \ RecordFilter, RecordComparator\n{\n    private final ArrayList list;\n    private\
  \ final Object condition;\n\n5033CH16.qxd 6/17/05 12:16 PM 第 333 页\n\n第 16 章 ■ 优化应用程序\n\
  \n**333**\n\n    public RecordStoreReader( Object condition )\n        throws RecordStoreException\n\
  \    {\n        this.condition = condition;\n        this.list = new ArrayList();\n\
  \        // 打开记录存储：\n        RecordStore store = RecordStore.openRecordStore( \"\
  store\", false );\n        // 枚举记录集：\n        RecordEnumeration enumeration =\n\
  \            store.enumerateRecords( this, this, false );\n        while ( enumeration.hasNextElement()\
  \ ) {\n            **MyRecordData data = new MyRecordData( ennumeration.nextRecord()\
  \ );**\n            this.list.add( data );\n        }\n        store.closeRecordStore();\n\
  \    }\n\n    public ArrayList getRecords() {\n        return this.list;\n    }\n\
  \n    public int compare( byte[] rec1, byte[] rec2 ) {\n        **MyRecordData data1\
  \ = new MyRecordData( rec1 );**\n        **MyRecordData data2 = new MyRecordData(\
  \ rec2 );**\n        return data1.compare( data2 );\n    }\n\n    public boolean\
  \ matches( byte[] candidate ) {\n        **MyRecordData data = new MyRecordData(\
  \ candidate );**\n        return data.conditionFulfilled( this.condition );\n  \
  \  }\n}\n```\n\n一种可行的解决方案是巧妙地存储排序和过滤所需的数据，以便使用单个字节，而不是从记录集中创建临时对象。另一种方法是不使用`RecordFilter`和`RecordComparator`，而是在读取枚举时使用自己的过滤和排序机制。清单\
  \ 16-6 一次性完成了条目的过滤和排序。它还使用了本地`ArrayList`来略微加快数据访问速度。与之前的示例相比，每个记录集对象只创建一次。\n\n**清单\
  \ 16-6.** *同时过滤和排序记录存储*\n```java\nimport javax.microedition.rms.*;\nimport de.enough.polish.util.ArrayList;\n\
  \npublic class RecordStoreReader {\n    private final ArrayList list;\n\n5033CH16.qxd\
  \ 6/17/05 12:16 PM 第 334 页\n\n**334**\n\n第 16 章 ■ 优化应用程序\n\n    public RecordStoreReader(\
  \ Object condition )\n        throws RecordStoreException\n    {\n        // 打开记录存储：\n\
  \        RecordStore store = RecordStore.openRecordStore( \"store\", false );\n\
  \        // 以最快方式枚举记录集：\n        RecordEnumeration enumeration =\n            store.enumerateRecords(\
  \ null, null, false );\n        ArrayList recordList = new ArrayList( enumeration.numRecords()\
  \ );\n        while ( enumeration.hasNextElement() ) {\n            **MyRecordData\
  \ data = new MyRecordData( enumeration.nextRecord() );**\n            if ( !data.conditionFulfilled(\
  \ condition ) ) {\n                continue;\n            }\n            boolean\
  \ notInserted = true;\n            for ( int i = recordList.size(); --i >= 0; )\
  \ {\n                MyRecordData compare = (MyRecordData) recordList.get( i );\n\
  \                if ( data.compare( compare ) != RecordComparator.PRECEDES ) {\n\
  \                    recordList.add( i + 1, data );\n                    notInserted\
  \ = false;\n                    break;\n                }\n            }\n     \
  \       if ( notInserted ) {\n                recordList.add( 0, data );\n     \
  \       }\n        }\n        store.closeRecordStore();\n        this.list = recordList;\n\
  \    }\n\n    public ArrayList getRecords() {\n        return this.list;\n    }\n\
  }\n```\n\n当您需要定期对记录存储中的大量数据进行排序和过滤时，可以考虑使用包含指向实际数据指针的索引记录集。要检索特定记录集，您先在索引集中查找其位置，然后直接加载。这种技术可以极大地改善数据读取性能，但会使持久化新条目变得更加复杂。具体效果可能因情况而异。\n\
  \n**选择算法**\n\n如果您的应用程序需要执行大量计算和数据处理，请仔细考虑所使用的算法。由于算法高度依赖于具体应用，讨论不同算法的优缺点超出了本书的范围。\n\
  \n5033CH16.qxd 6/17/05 12:16 PM 第 335 页\n\n第 16 章 ■ 优化应用程序\n\n**335**\n\n底层性能调优\n\
  \n在完成高层优化之后，您可以进入激动人心的底层调优领域。在介绍这些优化之前，有必要先提醒一句：底层优化很容易引入新错误，通常会降低应用程序的可读性和可维护性，并且可能仅在特定目标设备上提升性能。\n\
  \n**改进图形操作**\n\n在屏幕上渲染图形或文本相当复杂，因此需要一定时间才能完成。您能做的最好是避免完全重绘，例如仅在数据发生变化后才进行渲染，或者使用并评估裁剪区域。此外，您可以为不常变化的复杂背景使用图像缓冲区。例如，在需要绘制动画时，将图像分割成单个图块也能大幅提升性能。\n\
  \n**使用合适的容器**\n\n\n\n容器用于容纳多个元素。MIDP 平台为此提供了 `Vector`、`Hashtable` 和 `Stack` 实现。或者，你也可以实现自己的解决方案、使用简单数组，或部署\
  \ J2ME Polish 的 `de.enough.polish.util.ArrayList`。\n\n标准 MIDP 容器的主要缺点是它们已同步，因此速度较慢。\n\
  \nJ2ME Polish 提供的 `ArrayList` 未同步，因此与标准容器相比速度更快。\n\n如果你知道或能猜到容器所需的容量，应在构造函数中设置它（例如，`new\
  \ Vector( 20 )`）。\n\n然而，存储多个元素最快的方式是使用数组而非容器。\n\n其缺点是你需要负责确保容量充足。当需要增加数组大小时，请使用\
  \ `System.arrayCopy()` 方法来复制元素。使用一维数组比二维数组更快，因为 JVM 需要两次检查请求的元素是否在二维数组的允许边界内。\n\n\
  通常，你可以通过一些计算来模拟多维数组。\n\n与其访问二维数组元素 `data[ row ][ column ]`，不如使用一维数组元素 `data[ row\
  \ * numberOfColumns + column ]`。\n\n当你需要频繁访问数组或容器中的特定元素时，应考虑添加一个实例字段来保存该元素。这样，你可以省去重复的数组边界检查。\n\
  \n■**注意** 将配置值（如关卡数据）存储在数组中可能会增加应用程序的大小，因为 Java 字节码无法直接存储此类数据。请参阅本章的“减小 JAR 文件大小”部分，以了解更多替代方案。\n\
  \n5033CH16.qxd 6/17/05 12:16 PM Page 336\n\n**336**\n\n第 16 章 ■ 优化应用程序\n\n**预计算数据**\n\
  \n当进行性能密集型计算时，应尽可能只计算一次。典型的例子包括使用 `Random.nextInt()` 计算随机数据，或调用三角函数如 `Math.sin()`。仅涉及常量的简单计算已由编译器解析，因此你不应使用额外的字段（如\
  \ `defaultAnchor = Graphics.TOP | Graphics.LEFT`）来浪费空间。\n\n**使用优化的算术运算**\n\n对于特定的算术运算，你可以使用快得多的位移运算符。尽可能使用乘法代替除法。最后但同样重要的是，整数运算比浮点运算更快。\n\
  \n除以 2 的幂次方可以使用右移运算符 `>>` 更快地完成。与其将数字 x 除以 2y，不如直接使用 `x >> y`，因此 `x >> 3` 的结果与 `x\
  \ / 8` 相同。\n\n当取模参数是 2 的幂次方时，可以使用位运算符进行取模运算。与其计算 `int round = i % 8;`，不如使用更快的位运算\
  \ `int round = i & 7;`。\n\n**使用 switch 语句**\n\n与其使用多个 `if` 块，不如使用 `switch` 语句。当使用连续的值范围时，无论匹配哪个\
  \ `case`，`switch` 语句的处理时间都是恒定的。因此，添加虚拟 `case` 以创建连续的测试范围可能是值得的。清单 16-7 演示了 `switch`\
  \ 语句的慢速和快速用法。\n\n**清单 16-7.** *加速 switch 语句* \npublic char slowSwitch( int keyEvent\
  \ ) {\n    switch ( keyEvent ) {\n        case Canvas.KEY_NUM6: return '6';\n  \
  \      case Canvas.KEY_NUM3: return '3';\n        case Canvas.KEY_NUM8: return '8';\n\
  \        case Canvas.KEY_NUM9: return '9';\n        case Canvas.KEY_NUM2: return\
  \ '2';\n        case Canvas.KEY_NUM1: return '1';\n        case Canvas.KEY_NUM5:\
  \ return '5';\n    }\n}\n\npublic char fastSwitch( int keyEvent ) {\n    switch\
  \ ( keyEvent ) {\n        case Canvas.KEY_NUM1: return '1';\n        case Canvas.KEY_NUM2:\
  \ return '2';\n        case Canvas.KEY_NUM3: return '3';\n        case Canvas.KEY_NUM4:\
  \ return '4';\n        case Canvas.KEY_NUM5: return '5';\n        case Canvas.KEY_NUM6:\
  \ return '6';\n\n\n\ncase Canvas.KEY_NUM7: return '7';\n\n5033CH16.qxd 6/17/05 12:16\
  \ PM Page 337\n\n第 16 章 ■ 优化应用程序\n\n**337**\n\ncase Canvas.KEY_NUM8: return '8';\n\
  \ncase Canvas.KEY_NUM9: return '9';\n\n}\n\n}\n\n**加速循环**\n\n可以通过多种方式改进循环。你可以将方法调用和计算移到循环外部，使用更好的终止条件，以及展开循环。\n\
  \n典型的循环头是 `for ( int i = 0; i < list.size(); i++ )`。一个简单而有效的改进是改为从列表顶部向下遍历：`for\
  \ ( int i = list.size(); --i >= 0; )`。在这种情况下，`list.size()` 调用仅在循环开始时执行一次。你还通过检查值\
  \ 0 改进了终止条件，这比将变量与不同数字进行比较要稍快一些。\n\n如果你在循环内部执行任何计算，请检查是否也可以将它们移到循环外部。临时对象的创建也是如此，这不仅会减少可用内存，还会导致更频繁的垃圾回收。\n\
  \n一种非常底层的优化是展开循环。要成功展开循环，你需要预先知道可能的调用次数。例如，当你的循环总是执行四的倍数次时，你可以将循环体重复四次，从而将所需的跳转和终止检查次数减少四倍。清单\
  \ 16-8 展示了一个示例，其中包含四个元素或四的倍数个元素的数组被填充为整数值。`slowFill()` 方法使用传统循环，而 `fastFill()` 方法则展开了循环。\n\
  \n**清单 16-8.** *通过展开加速循环*\n\npublic void slowFill( int[] numbers ) {\n\nfor ( int\
  \ i = numbers.length; --i >= 0; ) {\n\nnumbers[ i ] = i;\n\n}\n\n}\n\npublic void\
  \ fastFill( int[] numbers ) {\n\n// 警告：如果 numbers.length != x * 4，此方法将崩溃\n\nfor\
  \ ( int i = numbers.length; --i >= 0; ) {\n\nnumbers[ i ] = i;\n\nnumbers[ --i ]\
  \ = i;\n\nnumbers[ --i ] = i;\n\nnumbers[ --i ] = i;\n\n}\n\n}\n\n**设置实例字段的默认值**\n\
  \n所有实例字段都有默认值，你无需再次设置。诸如 `int`、`long` 和 `float` 等基本数字类型默认值为 0；`boolean` 字段默认值为 `false`；对象默认值为\
  \ `null`。这是一个你应该始终应用的底层优化的罕见例子。更准确地说，\n\n.\n\n5033CH16.qxd 6/17/05 12:16 PM Page\
  \ 338\n\n**338**\n\n第 16 章 ■ 优化应用程序\n\n**使用访问修饰符**\n\n方法和字段可以有不同的修饰符，这些修饰符可能会影响性能。对于\
  \ J2ME 应用程序，你可以选择以下一个或多个修饰符：`synchronized`、`private`、`protected`、`public`、`static`\
  \ 和 `final`。\n\n使用 `synchronized` 方法可以确保一次只有一个线程能运行这些方法。这代价高昂，因为需要为该方法获取锁，并且一次只能有一个线程运行它。当你拥有无状态对象或仅读取数据时，不需要同步。当你写入数据时，有时可以通过使用同步块而不是同步整个方法来最小化影响。还要记住，访问实例字段是原子性的，因此在某些情况下你可能根本不需要同步。\n\
  \n一个流行的误解是，使用 `static` 字段和方法可以大大提高性能。`static` 修饰符允许在无需实例化相应类的情况下进行访问。然而，关于 `static`\
  \ 访问性能的真相是，它取决于你的目标平台。早期的虚拟机确实会惩罚普通实例字段的使用，而现代 HotSpot JVM 访问实例字段和方法甚至比访问静态字段和方法更快。与往常一样，你应该在目标设备上测量性能。过度使用\
  \ `static` 修饰符肯定会降低应用程序的架构质量，并使后续更改更加困难。\n\n\n\n`final`修饰符可以防止子类重写方法，并允许你仅对变量赋值一次。这简化了继承结构的解析和优化，并为编译器和虚拟机简化了字段值的访问，从而提升性能。\n\
  \n一个特殊的问题是静态 final 常量。这些常量会被编译器直接嵌入。\n\n诸如 `Graphics.TOP | Graphics.LEFT` 之类的简单计算也会在编译阶段完成，因此使用常量是一件好事。\n\
  \n局部变量的速度远快于静态字段和实例字段。局部变量存储在虚拟机的栈上，而其他变量则存储在堆内存中。\n\nJVM 是一个基于栈的机器，因此从栈中访问数据比从堆中读写数据更快。\n\
  \n当你对字段使用 `public` 访问修饰符时，可以直接从其他类中访问它们，而无需使用 getter 和 setter 方法。这仅在旧版 KVM 设备上更快，而在\
  \ HotSpot 机器上差异可以忽略不计。同时请记住，直接访问字段会使后续调整变得复杂。以设置日期字段为例，当你使用 setter 方法时，可以轻松地在 `setDate()`\
  \ 方法中包含到该日期剩余时间的计算；而直接修改字段则无法做到这一点。\n\n**提升感知性能**\n\n在许多情况下，你无法进一步改善应用程序的实际性能。此时，你应该专注于提升*感知*性能。具体做法是向用户反馈当前进程的进度，并确保应用程序的响应性，如下文所述。\n\
  \n客观地提升感知性能通常会延长完成任务所需的时间，但对用户而言，你的应用程序会感觉响应更快，而用户的印象才是关键。\n\n5033CH16.qxd 6/17/05\
  \ 12:16 PM Page 339\n\n第 16 章 ■ 优化应用程序\n\n**339**\n\n提供进度反馈\n\n让用户了解应用程序的进度是一项值得的投资，因为它能显著提高用户的耐心。\n\
  \n在应用程序启动时，通常需要执行一些初始化工作，例如从记录存储中读取数据。标准的解决方案是提供一个启动画面，并在后台线程中执行必要的初始化。J2ME Polish\
  \ 为此任务提供了 `de.enough.polish.ui.splash.InitializerSplashScreen`。该启动画面会显示一张图片以及一条可选消息，并在后台线程中初始化实际应用程序。\n\
  \n如清单 16-9 所示，你需要实现 `de.enough.polish.ui.splash.ApplicationInitializer` 接口的 `initApp()`\
  \ 方法以进行实际初始化。`InitializerSplashScreen` 还可以有不同的视图；更多信息请参考 JavaDoc 文档。\n\n**清单 16-9.**\
