  \ TextField 可以像标准的 `javax.microedition.lcdui.TextField` 一样进行编程，但它提供了两种输入模式：您可以在原生输入模式和直接内联输入模式之间进行选择。您还可以激活或停用默认附加到每个\
  \ TextField 的 Delete 和 Clear 命令。\n\n**配置输入模式**\n\n默认使用原生输入模式。当用户想要编辑字段时，会在另一个屏幕中打开一个原生\
  \ TextField。这种方法的优点是用户可以使用设备的所有输入辅助功能，例如 T9、手写识别等。对于基于触控笔的设备，或者当用户需要编辑长文本时，您应该始终使用原生输入模式。\n\
  \n5033CH12.qxd 6/20/05 11:31 AM 第 168 页\n\n**168**\n\n第 12 章 ■ 使用 GUI 您可以通过 `textfield-direct-input`\
  \ CSS 属性（详情请参见下一节）或设置 `TextField.useDirectInput` 预处理变量来启用直接输入模式。使用预处理变量可以稍微提高应用程序的性能和大小，但在这种情况下，直接输入模式会为所有\
  \ TextField 以及 TextBox 启用。您可以通过在变量定义中使用条件，将直接输入模式的激活限制在没有触控笔的设备上：`<variable name=\"\
  polish.TextField.useDirectInput\" value=\"true\" if=\"!polish.hasPointerEvents\"\
  />`。\n\n当您使用直接输入模式时，您可能希望根据本地化需求允许额外的字符。您可以为此任务定义变量 `polish.TextField.charactersKey0`、`polish.TextField.charactersKey1`\
  \ 等：`<variable name=\"polish.TextField.charactersKey2\" value=\"abc2äåæ\" />`。请参考表\
  \ 12-2 了解这些变量的默认值。\n\n■**提示** 如果您使用直接输入模式，可以通过先创建一个 NUMERIC TextField，然后将约束条件更改为\
  \ ANY，从而在将初始输入模式设置为数字的同时允许任何类型的输入：`field = new TextField( \"password: \", null,\
  \ 20, TextField.NUMERIC ); field.setConstraints ( TextField.ANY );`。当您的字段通常接受数字但不限于数字时，这可以极大地提高应用程序的可用性。\n\
  \n**配置 TextField 命令**\n\n\n\n每当 TextField 获得焦点时，系统会自动添加“清除”和“删除”这两个附加命令。你可以通过将以下变量之一设置为\
  \ `false` 来禁用此功能：`polish.TextField.suppressClearCommand`、`polish.TextField.suppressDeleteCommand`\
  \ 或 `polish.TextField.suppressCommands`。仅当目标设备具有已知的清除键，或者你不使用直接输入模式时，才应停用“删除”命令；否则，用户将无法删除错误输入。以下示例仅在设备具有清除键时移除“清除”和“删除”命令：<variable\
  \ name=\n\n\"polish.TextField.suppressCommands\" value=\"true\" if=\"polish.key.ClearKey:defined\"\
  />。\n\n为应用程序使用不同的设计\n\n你可以仅通过使用不同的资源文件夹，为应用程序采用完全不同的设计。你可以通过在 `<resources>` 元素中指定文件夹来切换所使用的资源，如清单\
