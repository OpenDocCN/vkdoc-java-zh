  **单独使用多个变量值**


  在设备数据库中，许多设备能力包含多个值。例如，`polish.SoundFormat`、`polish.ImageFormat` 和 `polish.VideoFormat`
  能力包含多个值，用逗号分隔。您可以使用 `#foreach` 指令单独访问每个值。例如，J2ME Polish 的日志框架使用此机制来包含所有已注册的日志处理器。


  在 `#foreach` 指令中，您定义一个临时的循环变量，该变量保存变量的每个值：


  //#foreach format in polish.SoundFormat


  您需要使用 `#next [loop-var-name]` 指令结束每个 `#foreach` 块：


  //#next format


  您可以遍历任何用逗号分隔其值的变量。


  清单 8-8 演示了如何遍历设备支持的所有声音格式。


