  **J2ME Polish 安装指南**


  你可以从 *http://www.j2mepolish.org* 下载 J2ME Polish 安装程序。只需从主页选择“下载”。


  ■**提示** 在 *http://www.j2mepolish.org* 上，你还可以通过选择“讨论”，然后选择“邮件列表”来订阅邮件列表。polish-users
