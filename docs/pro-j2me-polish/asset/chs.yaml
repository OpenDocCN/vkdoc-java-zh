  **更新应用程序**


  更新对于业务应用程序非常重要，但对于长时间运行的网络游戏也同样可取。更新选项取决于平台。


  MIDP 1.0 平台


  不幸的是，在 MIDP 1.0 平台上，无法从应用程序内部触发更新。以下是一些需要考虑的更新策略：


  • 每当你与服务器端应用程序进行首次握手时，查询当前版本。根据业务需求，你可以随后通知用户有可用更新，或者服务器可以根据你的客户端 J2ME 应用程序的版本提供特定内容。当活跃用户选择更新应用程序时，你可以发送一条包含服务器上最新
  JAD 文件链接的 SMS 文本消息。大多数设备现在可以识别 SMS 消息中基于 HTTP 的链接，并直接启动 WAP 浏览器。


  • 向用户发送一条包含 WAP 链接的二进制消息。然后用户可以保存并调用该链接。


  • 通过 MMS 消息将完整的应用程序发送到用户的手机。这是最用户友好的方式，但并非所有设备都支持通过 MMS 进行部署。


  MIDP 2.0 平台


  在 MIDP 2.0 平台上，你可以通过发出平台请求直接从应用程序内部启动更新过程。由于真实设备处理平台请求的方式不同，你应该准备好在请求更新后退出应用程序。无论如何，在更新实际实施之前，你的应用程序将被关闭。清单
