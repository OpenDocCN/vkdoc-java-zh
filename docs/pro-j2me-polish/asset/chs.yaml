  </build>\n<emulator />\n</j2mepolish>\n\n**创建你自己的背景**\n\n要添加新的背景，请确保你的类路径包含来自 `${polish.home}/import`\
  \ 文件夹的 `enough-j2mepolish-build.jar`、`enough-j2mepolish-client.jar` 和 `midp2.jar`\
  \ 文件。\n\n每个背景需要两个实现类：一个客户端类在实际手持设备上绘制背景，另一个服务端类负责在构建阶段创建和配置客户端类。\n\n在接下来的章节中，你将创建并集成一个用于焦点项目的动画背景。当用户更改焦点项目时，它会平滑地跟随当前选择。\n\
  \n创建客户端背景类\n\n你可以通过扩展 `de.enough.polish.ui.Background` 类并实现其 `paint( int x, int\
  \ y, int width, int height, Graphics g )` 方法来创建客户端背景。为了实现背景动画，你还可以重写 `animate()`\
  \ 方法。每当用户聚焦另一个项目时，背景会被绘制到不同的位置（如果在焦点样式中使用）。你可以利用这些位置变化来检测焦点变化。然后在 `animate()` 方法中移动背景，直到到达新的目标位置。清单\
  \ 13-24 演示了这一点。\n\n**清单 13-24.** *实现移动背景*\n\n//#condition polish.usePolishGui\n\
  package com.apress.ui;\nimport javax.microedition.lcdui.Graphics;\nimport de.enough.polish.ui.Background;\n\
  public class MovingBackground extends Background {\n    private final int color;\n\
  \n\n\n5033CH13.qxd 6/17/05 12:13 PM 第 266 页\n\n**266**\n\n第 13 章 ■ 扩展 J2ME POLISH\n\
  \nprivate final int speed;\n\nprivate int nextX;\n\nprivate int nextY;\n\nprivate\
  \ int currentX;\n\nprivate int currentY;\n\npublic MovingBackground( int color,\
  \ int speed ) {\n\nthis.color = color;\n\nthis.speed = speed;\n\n}\n\n**public void\
  \ paint( int x, int y, int width, int height, Graphics g ) {**\n\nif ( x != this.nextX\
  \ || y != this.nextY ) {\n\nthis.nextX = x;\n\nthis.nextY = y;\n\n}\n\ng.setColor(\
  \ this.color );\n\ng.fillRect( this.currentX, this.currentY, width, height );\n\n\
  }\n\n**public boolean animate() {**\n\nif ( this.currentX == this.nextX && this.currentY\
  \ == this.nextY ) {\n\nreturn false;\n\n}\n\nif ( this.currentX < this.nextX ) {\n\
  \nthis.currentX += this.speed;\n\nif ( this.currentX > this.nextX ) {\n\nthis.currentX\
  \ = this.nextX;\n\n}\n\n} else if ( this.currentX > this.nextX ) {\n\nthis.currentX\
  \ -= this.speed;\n\nif ( this.currentX < this.nextX ) {\n\nthis.currentX = this.nextX;\n\
  \n}\n\n}\n\nif ( this.currentY < this.nextY ) {\n\nthis.currentY += this.speed;\n\
  \nif ( this.currentY > this.nextY ) {\n\nthis.currentY = this.nextY;\n\n}\n\n} else\
  \ if ( this.currentY > this.nextY ) {\n\nthis.currentY -= this.speed;\n\nif ( this.currentY\
  \ < this.nextY ) {\n\nthis.currentY = this.nextY;\n\n}\n\n}\n\n5033CH13.qxd 6/17/05\
  \ 12:13 PM 第 267 页\n\n第 13 章 ■ 扩展 J2ME POLISH\n\n**267**\n\nreturn true;\n\n}\n\n\
  }\n\n创建服务端背景类\n\n为了正确地从 *polish.css* 文件转换设计设置，你需要实现一个转换器类，该类继承自 `de.enough.polish.preprocess.BackgroundConverter`\
  \ 并实现其 `createNewStatement( HashMap background, Style style, StyleSheet styleSheet\
  \ )` 方法。此方法解析提供的 CSS 设置，并创建必要的源代码，用于生成客户端背景类的新实例。清单 13-25 实现了创建 `MovingBackground`\
  \ 的转换器。\n\n**清单 13-25.** *实现背景转换器*\n\n//#condition false\n\npackage com.apress.ui;\n\
  \nimport java.util.HashMap;\n\nimport org.apache.tools.ant.BuildException;\n\nimport\
  \ de.enough.polish.preprocess.BackgroundConverter;\n\nimport de.enough.polish.preprocess.Style;\n\
  \nimport de.enough.polish.preprocess.StyleSheet;\n\npublic class MovingBackgroundConverter\
  \ extends BackgroundConverter {\n\npublic MovingBackgroundConverter() {\n\n}\n\n\
  **protected String createNewStatement(**\n\nHashMap background,\n\nStyle style,\n\
  \nStyleSheet styleSheet )\n\nthrows BuildException\n\n{\n\nString speedStr = (String)\
  \ background.get( \"speed\" ); if ( speedStr != null ) {\n\nsuper.parseInt( \"speed\"\
  , speedStr );\n\n} else {\n\nspeedStr = \"5\";\n\n}\n\nreturn \"new com.apress.ui.MovingBackground(\
  \ \"\n\n+ this.color + \", \" + speedStr + \" )\";\n\n}\n\n}\n\n5033CH13.qxd 6/17/05\
  \ 12:13 PM 第 268 页\n\n**268**\n\n第 13 章 ■ 扩展 J2ME POLISH\n\n在 `createNewStatement()`\
  \ 方法中，你可以从提供的 `background` HashMap 中读取设计设置。要解析这些值，你可以使用辅助方法 `parseInt()`、`parseFloat()`、`parseBoolean()`、`parseColor()`、`getUrl()`\
  \ 和 `parseAnchor()`。每个辅助方法都需要属性名称和值作为参数。\n\n在此示例中，使用了 `color` 和 `speed` 属性。`color`\
  \ 值已由超类解析，可以通过 `this.color` 访问。如果没有定义颜色，背景颜色默认为白色。当缺少必需的值或值设置不正确时，你可以抛出一个 `BuildException`，详细说明出错的原因。一切正常时，只需返回一个包含用于创建背景新实例的源代码的字符串。\n\
  \n集成自定义背景\n\n为了集成你的自定义背景，你需要将转换器类添加到 `<j2mepolish>` 任务的类路径中，并调整项目的源路径，以便同时包含你的客户端背景类。\n\
  \n首先，通过调整 *build.xml* 文件中的 `<taskdef>` 元素，将你的背景转换器类添加到 `<j2mepolish>` 任务中。将转换器项目\
  \ *classes* 目录的路径添加到 `<taskdef>` 元素的 `classpath` 属性中，如清单 13-26 所示。\n\n**清单 13-26.**\
  \ *调整 J2ME Polish 的类路径*\n\n<taskdef\n\nname=\"j2mepolish\"\n\nclassname=\"de.enough.polish.ant.PolishTask\"\
  \n\nclasspath=\"${polish.home}/bin/classes:\n\n${polish.home}/import/jdom.jar:\n\
  \n../apress-j2mepolish/bin/classes\"\n\n/>\n\n其次，你需要告知 J2ME Polish 关于额外背景的信息。你可以通过\
  \ *build.xml* 中 `<build>` 元素的 `srcDir` 属性来实现。使用冒号分隔多个目录；例如，使用 `srcDir=\"source/src:../apress-j2mepolish/source/src\"\
  `。你也可以使用嵌套的 `<source>` 元素，它还可以通过其 `if` 和 `unless` 属性有条件地包含源代码。\n\n最后，你需要在应用程序的 *resources/polish.css*\
  \ 文件中使用新的背景。将背景类型指定为服务端转换类，如清单 13-27 所示。\n\n**清单 13-27.** *在 polish.css 文件中使用移动背景*\
