  \ 的倍数。\n\nint defaultFrameIndex\n\n当 SpriteItem 未获得焦点时显示的帧索引。\n\nboolean repeatAnimation\n\
  \n指定动画完成一个循环后是否应重复播放。\n\n清单 12-14 演示了如何在应用程序中使用 SpriteItem。\n\n**清单 12-14.** *编程\
