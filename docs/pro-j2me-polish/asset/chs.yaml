  \n**}**\n\n**//#endif**\n\n}\n\n}\n\n**转发日志消息**\n\n你可以使用日志处理器来处理日志消息并将其转发给其他实体。在撰写本书时，只有记录管理系统（RMS）处理器可用。因此，目前你可以使用\
  \ RMS 日志处理器来存储所有日志条目，然后稍后通过 LogViewerMidlet 查看它们。\n\n你可以通过在 *build.xml* 文件中使用 `<handler>`\
  \ 元素来激活所需的日志处理器。清单 9-6 为所有西门子设备激活了 RMS 日志处理器。\n\n**清单 9-6.** *为西门子设备激活 RMS 日志处理器*\n\
  \n<debug level=\"warn\" unless=\"test\">\n\n**<handler name=\"rms\" if=\"polish.Vendor\
  \ == Siemens\" />**\n\n<filter package=\"com.apress.application\" level=\"debug\"\
  \ />\n\n</debug>\n\nRMS 日志处理器将所有日志条目保存在 RMS 中，以便你可以使用 `de.enough.polish.log.rms.LogViewerMidlet`\
  \ 查看它们。你可以在 *${polish.home}/*`samples/logviewer` 中找到这个 MIDlet。构建时，请确保在日志查看器的 *${polish.home}/samples/logviewer/build.xml*\
  \ 脚本的 `<variables>` 部分设置以下预处理变量：\n\n• `polish.log.MIDletSuite`（对应于你的 `<info>` 元素中的\
  \ `name` 属性）\n\n• `polish.log.Vendor`（对应于你的 `<info>` 部分中的 `vendorName` 属性）如果没有这些变量，日志查看器将无法找到包含日志消息的共享记录存储。\n\
  \n定义必要的变量后，你就可以构建日志查看器并将其安装到设备上。图 9-2 展示了运行中的日志查看器。你可以通过输入关键字来过滤显示的消息。\n\n![Image\
  \ 19](img/index-153_1.jpg)\n\n5033CH09.qxd 6/17/05 12:09 PM Page 131\n\n第 9 章 ■\
  \ 日志框架\n\n**131**\n\n**图 9-2.** *RMS 日志查看器允许你轻松过滤消息。*\n\n■**提示** 你可以通过扩展 `de.enough.polish.log.LogHandler`\
  \ 类来轻松创建自己的日志处理器。第 13 章将对此进行详细描述。\n\n**总结**\n\n在本章中，你学习了如何使用 J2ME Polish 和简单的 `System.out.println()`\
  \ 语句来记录日志消息。日志框架的优势在于，它允许你为不同的类和包分配不同的日志级别。你还可以完全停用日志记录，这样应用程序中就不会留下任何日志痕迹。最后但同样重要的是，你可以使用日志处理器将消息存储到\
  \ RMS 中。\n\n在下一章中，你将学习如何使用其他 J2ME Polish 实用工具，例如二进制编辑器和 `TextUtil` 类。\n\n5033CH09.qxd\
  \ 6/17/05 12:09 PM Page 132\n\n5033CH10.qxd 6/17/05 12:10 PM Page 133\n\n第 10 章\n\
  \n■ ■ ■\n\n使用实用工具\n\n**本章内容：**\n\n• 使用 `ArrayList` 工具类作为缓慢的 `java.lang.Vector` 实现的替代方案。\n\
  \n• 使用 `TextUtil` 类将文本适配到显示区域内。\n\n• 使用 `BitMapFont` 类自定义字体。\n\n• 使用字体编辑器将任何 TrueType\
  \ 字体转换为位图字体。\n\n• 使用二进制编辑器创建和操作二进制数据文件。\n\n• 使用 `MIDPSysInfo` MIDlet 测试设备的功能。\n\n\
  J2ME Polish 包含几个方便的工具类和独立实用程序。在本章中，我们将探讨如何在开发无线 Java 应用程序时使用它们。\n\n**工具类**\n\n\n\
  \nJ2ME Polish 的工具类 `de.enough.polish.util.*` 为您提供了 MIDP 标准中所不具备的高级功能。请务必将 *`${polish.home}/import/*`*\
  \ 目录下的 *`enough-j2mepolish-client.jar`* 添加到类路径中，以便 Java 运行时能够找到这些额外的类。在大多数集成开发环境（IDE）中，您可以在项目的属性中设置辅助库。\n\
  \n接下来，我们将介绍以下工具类：\n\n• `ArrayList` 类，它提供了对速度较慢的 `java.lang.Vector` 实现的替代方案。\n• `TextUtil`\
  \ 类，用于自动换行文本，使其适应您的显示区域。\n• `BitMapFont` 类，允许您使用自定义字体来显示消息。\n\n■**注意** 如果您查看项目 *build*\
  \ 文件夹中的预处理代码，您会发现 J2ME Polish 会将所有工具类都添加到您的项目中，即使您并不想使用它们。对此不必担心——混淆器会移除所有未使用的类，因此不会浪费任何资源。\n\
  \n**133**\n\n5033CH10.qxd 6/17/05 12:10 PM Page 134\n\n**134**\n\n第 10 章 ■ 使用工具类\n\
  \n**ArrayList 类**\n\n`de.enough.polish.util.ArrayList` 类实现了一个使用动态数组来存储其值的列表。与 `java.util.Vector`\
  \ 相比，`ArrayList` 不使用同步机制，因此速度要快得多。然而，由于 `ArrayList` 不是同步的，当多个线程并发访问 `ArrayList`\
  \ 时，您需要确保实现自己的同步机制。\n\n您可以使用 `java.util.ArrayList` 的所有方法，该类仅适用于 Java 2 标准版（J2SE）。\n\
  \n清单 10-1 演示了如何使用 `ArrayList` 类来管理通讯录中任意数量的联系人。\n\n**清单 10-1.** *使用 de.enough.polish.util.ArrayList*\
  \ `package com.apress.adress;`\n\n**import de.enough.polish.util.ArrayList;**\n\n\
  public class AdressBook {\n\nArrayList contactsList;\n\npublic AdressBook() {\n\n\
  super();\n\n}\n\npublic void addContact( Contact contact ) {\n\n**this.contactsList.add(\
  \ contact );**\n\n}\n\npublic Contact[] searchContacts( String pattern ) {\n\n**ArrayList\
  \ matchingContacts = new ArrayList();**\n\nfor ( int i = this.contactsList.size();\
  \ --i >= 0; ) {\n\nContact contact = (Contact) this.contactsList.get( i );\n\nif\
  \ ( contact.pattern.indexOf(pattern) != -1 ) {\n\n**matchingContacts.add( contact\
  \ );**\n\n}\n\n}\n\n**return (Contact[]) matchingContacts.toArray(**\n\n**new Contact[\
  \ matchingContacts.size() ]);**\n\n}\n\n}\n\npackage com.apress.adress;\n\npublic\
  \ class Contact {\n\n5033CH10.qxd 6/17/05 12:10 PM Page 135\n\n第 10 章 ■ 使用工具类\n\n\
  **135**\n\npublic String firstName;\n\npublic String lastName;\n\npublic String\
  \ chatAddress;\n\npublic String emailAddress;\n\npublic String pattern;\n\npublic\
  \ Contact(String firstName, String lastName,\n\nString chatAddress, String emailAddress)\n\
  \n{\n\nthis.firstName = firstName;\n\nthis.lastName = lastName;\n\nthis.chatAddress\
  \ = chatAddress;\n\nthis.emailAddress = emailAddress;\n\nthis.pattern = firstName\
  \ + lastName + chatAddress + emailAddress;\n\n}\n\n}\n\n**TextUtil 类**\n\n您可以使用\
  \ `de.enough.polish.util.TextUtil` 类将文本分割成一个字符串数组。这对于自动换行文本以使其适应手持设备的小屏幕非常有用。某些分割方法会考虑字体规格和首选文本宽度，从而使得在小视图中显示大量文本变得相当简单。清单\
  \ 10-2 演示了在文本绘制到屏幕之前，如何使用 `TextUtil` 类进行自动换行。\n\n**清单 10-2.** *使用 de.enough.polish.util.TextUtil\
  \ 类* **import de.enough.polish.util.TextUtil;**\n\nimport javax.microedition.lcdui.Graphics;\n\
  \nimport javax.microedition.lcdui.Font;\n\npublic final class TextViewer {\n\nprivate\
  \ final String[] lines;\n\nprivate final Font font;\n\nprivate final int color;\n\
  \npublic TextViewer( String text ) {\n\n// 仅在换行符处分割文本：\n\n**this.lines = TextUtil.split(\
  \ text, '\\n' );**\n\nthis.font = Font.getDefaultFont();\n\nthis.color = 0;\n\n\
  }\n\npublic TextViewer( String text, Font font, int color,\n\nint firstLineWidth,\
  \ int lineWidth )\n\n{\n\n5033CH10.qxd 6/17/05 12:10 PM Page 136\n\n**136**\n\n\
  第 10 章 ■ 使用工具类\n\n// 为指定的字体自动换行文本，使其适应屏幕：\n\n**this.lines = TextUtil.split( text,\
  \ font, firstLineWidth, lineWidth );** this.font = font;\n\nthis.color = color;\n\
  \n}\n\npublic void paint( int x, int y, Graphics g ) {\n\ng.setColor( this.color\
  \ );\n\ng.setFont( this.font );\n\nint lineHeight = this.font.getHeight() + 2;\n\
  \nfor (int i = 0; i < this.lines.length; i++ ) {\n\nString line = this.lines[i];\n\
  \ng.drawString( line, x, y, Graphics.TOP | Graphics.LEFT );\n\ny += lineHeight;\n\
  \n}\n\n}\n\n}\n\n**BitMapFont 类**\n\n在字体支持方面，J2ME 标准并不令人印象深刻。它仅提供以下内容：\n\n• 三种不同的字体外观（比例字体、等宽字体和系统字体），但通常系统字体和比例字体是相同的。\n\
  • 三种不同的字号（小、中、大），实际大小取决于具体实现。您可以使用 `polish.Font.small`、`polish.Font.medium` 和 `polish.Font.large`\
  \ 预处理变量来检查字号。\n• 字体样式包括粗体、斜体、下划线和普通体。\n\n字体在很大程度上是特定于实现的，因此您不能期望它们在不同平台上看起来一样。一些供应商，例如摩托罗拉，只提供一种字号的一种字体类型。\n\
  \n尤其是在游戏中，您通常需要更酷的字体，这就是 J2ME Polish 提供 `de.enough.polish.util.BitMapFont` 类的原因。\n\
  \n您可以在应用程序中使用 `BitMapFont` 类来使用任何 TrueType 字体。或者，更准确地说，您可以使用独立的字体编辑器将任何 TrueType\
  \ 字体转换为位图字体，然后在应用程序中使用该位图字体。位于 *`${polish.home}/bin`* 文件夹中的字体编辑器将在本章后面详细描述。\n\n\
  如果您想显示消息，您需要从您的 `BitMapFont` 中请求一个 `BitMapFontViewer`。查看器类管理特定的文本，而位图字体仅保存基本的字体信息和字形。通过将这两个功能分离到不同的类中，您可以非常高效地使用自定义字体查看文本。\n\
  \n清单 10-3 展示了如何使用 `BitMapFont` 和 `BitMapFontViewer` 类以自定义字体显示消息。\n\n5033CH10.qxd\
  \ 6/17/05 12:10 PM Page 137\n\n第 10 章 ■ 使用工具类\n\n**137**\n\n**清单 10-3.** *使用自定义位图字体显示消息*\
  \ **import de.enough.polish.util.BitMapFont;**\n\n**import de.enough.polish.util.BitMapFontViewer;**\n\
  \nimport javax.microedition.lcdui.CustomItem;\n\nimport javax.microedition.lcdui.Graphics;\n\
  \nimport javax.microedition.lcdui.Font;\n\npublic final class BitMapTextViewer {\n\
  \n**private final BitMapFont bitMapFont;**\n\n**private BitMapFontViewer bitMapFontViewer;**\n\
  \nprivate final int verticalPadding;\n\nprivate final int firstLineWidth;\n\nprivate\
  \ final int lineWidth;\n\npublic BitMapTextViewer( String text, int verticalPadding,\
  \ int firstLineWidth, int lineWidth )\n\n{\n\n**this.bitMapFont = BitMapFont.getInstance(\"\
  /china.bmf\");** this.verticalPadding = verticalPadding;\n\nthis.firstLineWidth\
  \ = firstLineWidth;\n\nthis.lineWidth = lineWidth;\n\nsetText( text );\n\n}\n\n\
  public void setText( String text ) {\n\n**this.bitMapFontViewer = this.bitMapFont.getViewer(\
  \ text );** **this.bitMapFontViewer.layout( this.firstLineWidth, this.lineWidth,**\
  \ **this.verticalPadding, Graphics.LEFT );**\n\n}\n\npublic void paint( int x, int\
  \ y, Graphics g ) {\n\n**this.bitMapFontViewer.paint( x, y, g );**\n\n}\n\n}\n\n\
  \n\nBitMapFontViewer 通常从 `paint( int x, int y, Graphics g )` 方法指定的左上角开始，将文本绘制在一行中。不过，你可以使用\
  \ `layout( int firstLineWidth, int lineWidth, int horizontalPadding, int graphicsOrientation\
  \ )` 方法指定不同的布局。在这种情况下，查看器会自动换行，并根据指定的方向（`Graphics.LEFT`、`Graphics.CENTER` 或 `Graphics.RIGHT`）排列各行。在调用\
  \ `paint()` 方法时，你需要考虑方向，就像使用 `Font.drawString()` 方法时一样。图 10-1 展示了游戏显示中的一些居中文本。\n\
  \n![Image 20](img/index-160_1.jpg)\n\n5033CH10.qxd 6/17/05 12:10 PM Page 138\n\n\
  **138**\n\n第 10 章 ■ 使用工具类\n\n**图 10-1.** *在游戏中使用位图字体*\n\n**其他工具类**\n\nJ2ME Polish\
  \ 还包含一些其他工具类，这些将在其他章节中讨论：\n\n• `de.enough.polish.util.Locale` 类用于检索本地化消息，提供关于区域设置的额外信息，并提供特定于区域设置的方法，例如日期格式化。移动应用程序的本地化将在第\
  \ 7 章讨论。\n\n• `de.enough.polish.util.Debug` 类允许你记录消息，并由\n\n`//#debug` 预处理指令使用。调试将在第\
  \ 9 章讨论。\n\n• J2ME Polish 还包含一些可以独立于 J2ME Polish GUI 使用的 `CustomItems`，例如 `de.enough.polish.ui.SpriteItem`。这些将在第\
  \ 12 章讨论。\n\n■**提示** 未来版本计划添加其他一些类。例如，即将推出的 `de.enough.polish.util.DeviceControl`\
  \ 类将允许你控制振动和背光设置。请查看 *http://www.j2mepolish.org* 了解最新添加内容。\n\n**独立工具**\n\n除了工具类之外，J2ME\
  \ Polish 还提供了一些独立工具，可以在服务器端的开发阶段为你提供帮助。\n\n• **二进制编辑器** 允许你创建和操作结构化的二进制数据文件，例如关卡文件。\n\
  \n• **字体编辑器** 将任何 TrueType 字体转换为可由 `de.enough.polish.util.BitMapFont` 类使用的位图字体。\n\
  \n• **MIDPSysInfo MIDlet** 显示你设备的功能。\n\n![Image 21](img/index-161_1.jpg)\n\n![Image\
  \ 22](img/index-161_2.jpg)\n\n5033CH10.qxd 6/17/05 12:10 PM Page 139\n\n第 10 章 ■\
  \ 使用工具类\n\n**139**\n\n这些应用程序位于 *${polish.home}/bin* 文件夹中。图 10-2 展示了该文件夹在 Mac OS\
  \ X 系统上的外观。\n\n**图 10-2.** *Mac OS X 系统上的 ${polish.home}/bin 文件夹* **二进制编辑器**\n\n\
  你可以使用二进制编辑器来管理关卡文件和其他结构化的二进制数据文件。\n\n通过双击 *${polish.home}/bin* 文件夹中的二进制编辑器可执行文件来启动它。\n\
  \n二进制编辑器将数据设置的信息存储在 *.definition* 文件中。一个定义指定了在实际数据文件中使用哪些数据类型以及它们的顺序。\n\n当你第一次启动编辑器时，你将从一个新的空白定义文件开始。\n\
  \n让我们浏览一下编辑器。通过选择菜单栏中的 **文件 ➤ 打开定义**，将文件拖入已打开的应用程序，或者将定义文件拖放到编辑器的启动脚本上，来打开 *${polish.home}/bin/level.definition*\
  \ 文件，如图 10-3 所示。\n\n*op*\n\n![Image 23](img/index-162_1.jpg)\n\n5033CH10.qxd 6/17/05\
  \ 12:10 PM Page 140\n\n**140**\n\n第 10 章 ■ 使用工具类\n\n现在，编辑器中显示了相应数据文件的结构。对于每个条目，你可以指定该条目重复的次数、条目的类型（byte、short\
  \ 等）以及实际数据。\n\n要加载一些数据，请使用 *${polish.home}/bin/level1.data*，通过选择菜单栏中的 **文件 ➤ 打开数据**，将文件拖入已打开的应用程序，或者将定义文件拖放到编辑器的启动脚本上。现在你可以在右侧列中看到文件的实际数据。你可以通过点击列来编辑数据。根据数据类型，你可以直接在表格中或对话框中进行编辑，如图\
  \ 10-4 所示。\n\n**图 10-4.** *使用二进制编辑器编辑数据* 当你指定了 Count 值时，一个条目可以重复多次。你可以通过设置一个静态数字，或者使用一个或多个其他数据条目来定义这个数字。当你使用另一个数据条目来指定次数时，会使用该条目的数值。例如，在图\
  \ 10-4 中，条目 `roadYPositions` 重复了 `numberOfRoads` 次。由于 `numberOfRoads` 的值为 3，因此 `roadYPosition`\
  \ 条目重复了三次。\n\n除了数值类型（如 byte 或 short）之外，你还可以使用 String 条目来定义 Count。当你使用 String 条目时，数据字符串的长度用于计算其数值。你还可以使用多个条目，并对它们进行加、乘、减或除运算，以计算当前条目的重复次数。例如，在图\
  \ 10-4 中，`cells` 条目重复了 `numberOfCols * numberOfRows` 次。由于数据文件是顺序加载的，你只能使用已经已知的条目；这些条目是在你为其指定\
  \ Count 值的条目之上定义的任何条目。\n\n5033CH10.qxd 6/17/05 12:10 PM Page 141\n\n第 10 章 ■ 使用工具类\n\
  \n**141**\n\n你可以为你的文件使用几种预定义类型；例如，你可以指定 byte、boolean 或 PNG Image。只需在 Type 列中选择条目即可更改类型。\n\
  \n当类型具有固定长度时，它会在类型后面的括号中显示。可变长度的类型通过在其名称末尾添加“(-1)”来声明。你也可以通过选择 **编辑 ➤ 添加自定义类型**\
  \ 来定义自己的类型。你可以混合使用任何已知的类型。\n\n例如，你可以使用两个 short 值来创建一个 Position 类型。自定义类型的规范保存在相应的\
  \ **.definition* 文件中。表 10-1 描述了默认类型。\n\n**表 10-1.** *二进制编辑器的预定义类型* **类型**\n\n**值**\n\
