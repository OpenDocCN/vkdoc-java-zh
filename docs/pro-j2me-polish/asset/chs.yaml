  J2ME Polish 安装目录包含以下文件夹：


  • *bin* 文件夹包含一些独立工具，例如二进制数据文件编辑器和从 True Type 字体创建位图字体的工具。


  • *doc* 文件夹包含 HTML 和 PDF 文档。


  • *import* 文件夹包含 J2ME Polish 的核心库，以及许多标准 J2ME 库和供应商特定的 API 扩展。这些 API 在构建过程中使用，也可以在你最喜欢的
  IDE 中用于 J2ME 项目的类路径。


  • *samples* 目录包含示例应用程序。


  • 根目录 ( *${polish.home}*) 包含设备数据库，它由文件 *devices.xml*、*vendors.xml*、*groups.xml*、*bugs.xml*
  和 *apis.xml* 组成。文件 *custom-css-attributes.xml* 可用于描述你对 J2ME Polish GUI 的自己的扩展。


  **外部工具**


  在安装模式下，你还应该考虑安装以下第三方工具：


  **Jad：** Jad ( *http://www.kpdus.com/jad.html*) 是一个免费的 Java 反编译器。它对于解析模拟器中显示的堆栈跟踪很有用。这样的堆栈跟踪只显示方法内的字节码指令偏移量。当
  Jad 位于 PATH 或 *${polish.home}/bin* 文件夹中时，J2ME Polish 可以显示源代码中的实际位置。


  **ProGuard：** ProGuard ( *http://proguard.sourceforge.net*) 是最好的开源混淆器，它可以同时保护和缩小你的代码。将
  *proguard.jar* 文件复制到 *${polish.home}/import*。


  **7-Zip：** J2ME Polish 可以使用 7-Zip ( *http://7-zip.org*，或适用于 Linux 和 Mac OS X 系统的
  *http://p7zip.sourceforge.net*) 来打包应用程序，这可能会产生更小的文件大小。将 7-Zip 安装到 *${polish.home}/bin*，以便
  J2ME Polish 可以自动找到它。你可以在 *http://p7zip.sourceforge.net* 下载适用于 Linux 和 Mac OS X 的
  7-Zip。


  **KZIP：** J2ME Polish 也可以使用 KZIP 打包器 ( *http://advsys.net/ken/utils.htm#kzip*)。


  当你将 KZIP 安装到 *${polish.home}/bin* 时，J2ME Polish 可以自动找到它。


  **Pngcrush、PNGOUT 和 PNGGauntlet：** Pngcrush ( *http://pmt.sourceforge.net/pngcrush*)
  和 PNGOUT ( *http://advsys.net/ken/utils.htm#pngout*) 优化 PNG 图像。你必须手动使用这些工具。PNGGauntlet
  ( *http://numbera.com/software/pnggauntlet.aspx*) 为 PNGOUT 提供了一个 GUI。将这些工具安装到你的系统上的任何位置。


