  \n**如何定义颜色**\n\n你可以通过多种不同的方式定义颜色，如清单 12-26 所示。\n\n5033CH12.qxd 6/20/05 11:31 AM\
  \ 第 195 页\n\n第 12 章 ■ 使用 GUI **195**\n\n**清单 12-26.** *以不同方式定义颜色*\n\n.myStyle {\n\
  \n/* 颜色的名称 */\n\nfont-color: white;\n\n/* 一个 rgb 十六进制值 */\n\nborder-color: #80FF80;\n\
  \n/* 一个简短的 rgb 十六进制值 - 这是红色 */\n\nstart-color: #F00;\n\n/* 一个 alpha-rgb 十六进制值 */\n\
  \nmenu-color: #7F80FF80;\n\n/* 一个 rrr,ggg,bbb 值 */\n\nbackground-color: rgb( 255,\
  \ 50, 128 );\n\n/* 一个带百分比的 rgb 值 */\n\nfill-color: rgb( 100%, 30%, 50% );\n\n/*\
  \ 一个 aaa, rrr, ggg, bbb 值 */\n\nlabel-color: argb( 128, 255, 50, 128 );\n\n}\n\n\
  颜色名称引用的是预定义颜色之一，或者你在 `colors` 部分定义的颜色：`color: black;` 或 `color: highlightedBackgroundColor;`。\n\
  \n十六进制值使用每种颜色的两位十六进制数字来定义颜色（RRGGBB）。此外，可以添加 alpha 混合分量（AARRGGBB）：`color: #FF0000;`\
  \ 定义红色。`color: #7FFF0000;` 定义半透明红色。\n\n\n\n缩短的十六进制值通过 RGB 值的十六进制表示来定义颜色。每个数字都会加倍以获取完整的十六进制值：`color:\
  \ #F00;` 等同于 `color: #FF0000;`，`color: #0D2;` 等同于 `color: #00DD22;`，以此类推。\n\nRGB\
  \ 值以 `rgb(` 开头，然后列出每种颜色从 0 到 255 的十进制值：`color: rgb( 255, 0, 0 );` 定义红色，`color: rgb(\
  \ 0, 0, 255 );` 定义蓝色，以此类推。或者，你也可以为 RGB 颜色使用百分比值：`color: rgb( 100%, 0%, 0% );` 和\
  \ `rgb( 100.00%, 0.00%, 0.00% );` 都定义红色。\n\n你可以使用 `argb()` 结构定义 Alpha-RGB 颜色：`color:\
  \ argb( 128, 255, 0, 0 );` 定义半透明的红色。对于 `argb()` 结构，也可以使用百分比值。\n\n**Alpha 混合**\n\n\
  你可以使用十六进制或 `argb()` 定义（参见上一节）来定义带有 Alpha 混合的颜色。Alpha 值为 0 会产生完全透明的像素，而值为 FF（或 255\
  \ 或 100%）则会产生完全不透明的像素。某些设备，如诺基亚手机和大多数 MIDP 2.0 设备，支持介于 0 和 FF 之间的值，从而产生半透明颜色。带有\
  \ Alpha 通道的颜色只能由特定的 GUI 项使用。请参考特定设计属性的文档。并非每个组件都支持 Alpha-RGB 值。你可以为简单的背景使用半透明颜色，例如，`focused\
  \ { background-color: argb( 128, 255, 0, 0 ); }`。\n\n5033CH12.qxd 6/20/05 11:31\
