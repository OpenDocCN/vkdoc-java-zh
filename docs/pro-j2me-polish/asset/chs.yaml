  一个 PNG 图像\n\n■**注意** PNG 图像通常应该是定义文件中的最后一个条目，除非你生成自己的代码来加载图像。\n\n二进制编辑器可以生成用于加载相应数据文件的\
  \ Java 代码。只需选择 **代码 ➤ 生成 Java 代码** 即可查看生成的代码。你现在可以保存它或将其复制到剪贴板。\n\n你可以将定义文件保存在任何你想要的地方，但通常你会将它们与数据文件一起保存在项目的\
  \ *resources* 文件夹中。然后你需要确保 **.definition* 文件不包含在你的应用程序包中。你可以通过在 *build.xml* 文件的\
  \ `<resources>` 元素中指定 excludes 属性来实现这一点，如下例所示：\n\n<resources excludes=\"*.definition,\
  \ readme.txt\" /> 此元素嵌套在 `<build>` 部分中。有关完整示例，请查看 Menu 示例应用程序的 *build.xml* 文件。\n\
  \n![Image 24](img/index-164_1.jpg)\n\n5033CH10.qxd 6/17/05 12:10 PM Page 142\n\n\
  **142**\n\n\n\n第 10 章 ■ 使用实用工具\n\n**字体编辑器**\n\n你可以使用字体编辑器从任何 TrueType 字体中创建位图字体。双击\
  \ *${polish.home}/bin* 文件夹中的字体编辑器可执行文件即可启动编辑器。\n\n你可以通过以下方式打开任何 TrueType 字体 **.ttf*\
  \ 文件：在菜单栏中选择“文件 ➤ 打开 TrueType 字体”，将文件拖入已打开的应用程序，或者将字体文件拖放到编辑器的启动脚本上（参见本章前面的图 10-3）。如图\
  \ 10-5 所示，你现在可以在编辑器中更改字体的大小、颜色和其他属性。\n\n**图 10-5.** *使用字体编辑器创建位图字体* 你可以通过在底部的文本字段中设置字符来指定位图字体支持的字符。由于每个额外的字符都需要额外的空间，因此应尽量减少字符数量；只需保留足够的字符来显示你希望以该位图字体呈现的所有文本。如果你的文本包含相应位图字体中不可用的字符，则该字符将无法显示并从屏幕中省略。\n\
  \n你可以使用字符间距来分隔密集或斜体字体的字符。请记住，每个字符都需要单独访问，因此每个字符周围必须有一个矩形区域，且不能与其他字符重叠。\n\n■**注意**\
  \ 对位图字体使用抗锯齿功能会使它们看起来更平滑，但也会增加其大小并降低可读性。因此，不建议在低分辨率设备上使用抗锯齿功能。\n\n你可以通过在你喜欢的图像编辑器（如\
  \ Photoshop 或 GIMP）中操作基础 PNG 图像来优化位图字体。选择“文件 ➤ 另存为 PNG 图像”来保存字体的相应 PNG 图像。然后通过选择“文件\
  \ ➤ 打开 PNG 图像”重新加载它。你也可以通过选择“文件 ➤ 在二进制编辑器中打开”来微调位图字体，或者\n\n![Image 25](img/index-165_1.jpg)\n\
  \n5033CH10.qxd 6/17/05 12:10 PM 第 143 页\n\n第 10 章 ■ 使用实用工具\n\n**143**\n\n在外部启动二进制编辑器，加载\
  \ *${polish.home}/bin/bmf.definition*，并将位图字体作为数据打开。使用本章前面描述的 `de.enough.polish.BitMapFont`\
  \ 类来显示你的位图字体文本。\n\n**SysInfo MIDlet**\n\nJ2ME Polish 还包含 MIDPSysInfo MIDlet，它允许你快速检查设备的能力。它位于\
  \ *${polish.home}/samples/sysinfo* 文件夹中，需要先构建，可以通过命令行调用 `ant` 或在 IDE 中执行 *build.xml*\
  \ 脚本来完成。然后你会在 *dist* 文件夹中找到 *MIDPSysInfo.jar* 和 *MIDPSysInfo.jad* 文件。图 10-6 显示了正在运行的\
  \ SysInfo 应用程序。\n\n**图 10-6.** *使用 MIDPSysInfo MIDlet 检查设备能力* **总结**\n\n本章讨论了 J2ME\
  \ Polish 附带的多种实用工具。虽然它们对于开发 J2ME 应用程序并非必不可少，但它们非常有用，并且可能解决你在应用程序开发过程中遇到的挑战。\n\n\
  在下一章中，我们将介绍 J2ME Polish 的游戏引擎，以及它如何帮助你使用单一源代码基础为 MIDP 2.0 和 MIDP 1.0 设备开发游戏。\n\n\
  5033CH10.qxd 6/17/05 12:10 PM 第 144 页\n\n5033CH11.qxd 6/17/05 12:11 PM 第 145 页\n\
  \n第 11 章\n\n■ ■ ■\n\n使用 J2ME Polish 进行\n\n游戏编程\n\n**本章内容：**\n\n• J2ME Polish 游戏引擎在\
  \ MIDP 1.0 设备上提供完整的 MIDP 2.0 游戏 API。\n\n• 通过设置各种预处理变量来优化游戏引擎。\n\n• 解决 MIDP 1.0 平台上游戏引擎的限制，包括无法在像素级别检测碰撞以及并非所有\
  \ MIDP 1.0 平台都支持精灵变换。\n\n• 通过使用特定于供应商的库进行低级图形操作、声音播放和设备控制，将 MIDP 2 游戏移植到 MIDP 1.0\
  \ 平台。\n\n游戏产业是 J2ME 市场中最大的参与者。当你编写 J2ME 应用程序时，很可能正在开发游戏。游戏是移动 Java 的巨大成功故事，属于移动领域主要收入的“3G”：游戏（games）、赌博（gambling）和女孩（girls）。游戏市场正在快速增长，据估计\
  \ 2005 年全球市场规模为 40 亿美元。\n\n业界通过 Java Community Process 网站（*http://jcp.org/en/jsr/*\
  \ *detail?id=118*）在 MIDP 2.0 标准中引入了游戏编程的重大改进。不幸的是，市面上大多数手机仅支持 MIDP 1.0 标准。这正是 J2ME\
  \ Polish 游戏引擎的用武之地。正如你将在本章中学到的，你可以使用 J2ME Polish 的游戏引擎快速将 MIDP 2.0 游戏移植到 MIDP 1.0\
  \ 平台。\n\n**使用游戏引擎**\n\n使用 MIDP 2.0 游戏 API 编程游戏很容易。你有精灵、带视图窗口的图层管理器等等。当你为 MIDP 1.0\
  \ 平台开发游戏时，会非常怀念这些功能。这就是为什么 J2ME Polish 包含一个包装 API，使你即使在 MIDP 1.0 设备上也能使用 `javax.microedition.lcdui.game.*`\
  \ API。\n\n游戏引擎允许你在 MIDP 1.0 设备上使用完整的 MIDP 2.0 游戏 API。通常，当你使用正确的 import 语句时，无需更改源代码。然而，存在一些主要限制可能需要调整你的代码，特别是无法使用像素级碰撞检测。此外，并非所有\
  \ MIDP 1.0 平台都支持精灵变换。处理这些限制将在本章后面的“解决游戏引擎的限制”部分中讨论。\n\n使用游戏引擎并不困难。当你以 MIDP 1.0 设备为目标时，J2ME\
  \ Polish 会自动将包装类编织到你的代码中。这仅通过交换 import 语句来完成，因此你必须使用正确的 import 语句，而不是完全限定的类名。清单\
  \ 11-1 演示了你不应该*做*的事情。\n\n**清单 11-1.** *如何**不**使用游戏引擎* `public class MyGameCanvas`\n\
  \n`**extends javax.microedition.lcdui.game.GameCanvas**`\n\n`implements Runnable`\n\
  \n`{`\n\n`public MyGameCanvas(boolean supress) {`\n\n`super(supress);`\n\n`}`\n\n\
  `public void run() {`\n\n`// 主游戏循环`\n\n`}`\n\n`}`\n\n当你以 MIDP 1.0 设备为目标时，清单 11-1\
  \ 中的代码将无法工作。清单 11-2 显示了一个工作示例，它正确使用了 import 语句。\n\n**清单 11-2.** *使用 import 语句正确使用游戏引擎*\
  \ `**import javax.microedition.lcdui.game.GameCanvas;**`\n\n`public class MyGameCanvas`\n\
  \n`**extends GameCanvas**`\n\n`implements Runnable`\n\n`{`\n\n`public MyGameCanvas(boolean\
  \ supress) {`\n\n`super(supress);`\n\n`}`\n\n`public void run() {`\n\n`// 主游戏循环`\n\
  \n`}`\n\n`}`\n\n**优化游戏引擎**\n\n你可以通过在 *build.xml* 脚本的 `<variables>` 部分定义几个预处理变量来调整游戏引擎。以下优化可用：\n\
  \n5033CH11.qxd 6/17/05 12:11 PM 第 147 页\n\n第 11 章 ■ 使用 J2ME Polish 进行游戏编程\n\n**147**\n\
  \n• 为你的游戏启用全屏模式\n\n• 通过使用后缓冲区和/或单个瓦片图像来优化 TiledLayer 的性能\n\n• 增加可能的瓦片数量\n\n• 为具有错误或缓慢游戏\
  \ API 实现的 MIDP 2.0 设备激活游戏引擎\n\n**以全屏模式运行你的游戏**\n\n\n\n通常，你会希望为游戏使用全屏模式。要启用此模式，请使用项目\
  \ *build.xml* 文件中 `<build>` 元素的 `fullscreen` 属性。可选值为 `true`、`false` 或 `menu`。`menu`\
  \ 模式允许你设计菜单栏，但仅在使用 J2ME Polish GUI 时可用。\n\n`<build>` 元素的 `fullscreen` 属性可为整个应用程序启用全屏模式。如果你想为实际游戏过程使用不同的设置，可以通过设置\
  \ `polish.GameCanvas.useFullScreen` 预处理变量来为 `GameCanvas` 实现定义特定设置。允许的值同样为 `true`、`false`\
  \ 或 `menu`。清单 11-3 演示了如何为应用程序使用菜单全屏模式，同时为 `GameCanvas` 使用常规全屏模式。\n\n**清单 11-3.**\
  \ *为 GameCanvas 启用全屏模式*\n\n<j2mepolish>\n\n<info\n\nlicense=\"GPL\"\n\nname=\"MazeRace\"\
  \n\nvendorName=\"A reader.\"\n\nversion=\"0.0.1\"\n\njarName=\"${polish.vendor}-${polish.name}-${polish.locale}-mazerace.jar\"\
  \n\n/>\n\n<deviceRequirements>\n\n<requirement name=\"Identifier\" value=\"Nokia/Series60\"\
  \ />\n\n</deviceRequirements>\n\n<build\n\nusePolishGui=\"true\"\n\n**fullscreen=\"\
  menu\"**\n\n>\n\n<midlet class=\"com.apress.mazerace.MazeRace\" />\n\n<variables>\n\
  \n**<variable**\n\n**name=\"polish.GameCanvas.useFullScreen\"**\n\n**value=\"true\"\
  **\n\n**/>**\n\n</variables>\n\n</build>\n\n<emulator />\n\n5033CH11.qxd 6/17/05\
  \ 12:11 PM Page 148\n\n**148**\n\n第 11 章 ■ 使用 J2ME POLISH 进行游戏编程\n\n当你向 `GameCanvas`\
  \ 添加命令时，需要启用菜单模式。菜单模式需要 J2ME Polish GUI，而后者又要求你不要实现 `paint( Graphics )` 方法，因为该方法由\
  \ J2ME Polish GUI 内部使用。\n\n在这种情况下，你应该改用 `flushGraphics()` 方法。如果无法做到这一点，你可以使用一些预处理来实现\
  \ `paintScreen( Graphics )` 方法，而不是 `paint( Graphics )` 方法，如清单 11-4 所示。\n\n**清单 11-4.**\
  \ *在菜单全屏模式下使用 paintScreen() 方法代替 paint() 方法* import javax.microedition.lcdui.game.GameCanvas;\n\
  \nimport javax.microedition.lcdui.Graphics;\n\npublic class MyGameCanvas\n\nextends\
  \ GameCanvas\n\nimplements Runnable\n\n{\n\npublic MyGameCanvas(boolean supress)\
  \ {\n\nsuper(supress);\n\n}\n\npublic void run() {\n\n// 主游戏循环\n\n}\n\n**//#if polish.usePolishGui\
  \ && polish.classes.fullscreen:defined && !polish.midp2**\n\n**//# public void paintScreen(\
  \ Graphics g )**\n\n**//#else**\n\n**public void paint( Graphics g )**\n\n**//#endif**\n\
  \n{\n\n// 实现 paint 方法\n\n}\n\n}\n\n**在 TiledLayer 中使用后缓冲**\n\n`TiledLayer` 在屏幕上绘制多个图块，通常用于渲染游戏背景。后缓冲优化使用一个内部图像缓冲区，仅在图块发生变化时才进行绘制。不是逐个绘制所有图块，而是将整个缓冲区绘制到屏幕上。这可以显著提高游戏速度，尤其是在可见图块仅偶尔变化的情况下。\n\
  \n后缓冲优化的缺点是它会占用更多内存，并且你无法使用任何透明图块。因此，在以下任何情况下，你都不应激活后缓冲优化：\n\n• 内存紧张。\n\n• `TiledLayer`\
  \ 未用作背景。\n\n• 你同时使用了多个 `TiledLayer`。\n\n5033CH11.qxd 6/17/05 12:11 PM Page 149\n\
  \n第 11 章 ■ 使用 J2ME POLISH 进行游戏编程\n\n**149**\n\n你可以通过将 `polish.TiledLayer.useBackBuffer`\
  \ 预处理变量设置为 `true` 来激活后缓冲优化。你还可以通过将 `polish.TiledLayer.TransparentTileColor` 变量设置为任何整数颜色值来指定背景颜色，如清单\
  \ 11-5 所示。此颜色随后将用于之前透明的图块。\n\n**清单 11-5.** *为 TiledLayer 激活后缓冲优化*\n\n<variables>\n\
  \n<variable\n\nname=\"polish.TiledLayer.useBackBuffer\"\n\nvalue=\"true\"\n\n/>\n\
  \n<variable\n\n\n\nname=\"polish.TiledLayer.TransparentTileColor\"\n\nvalue=\"0xCFCFCF\"\
  \n\n/>\n\n</variables>\n\n**将图像分割为单个图块**\n\n当基础图像被分割为单个图块时，TiledLayer 的绘制速度可以显著提升。\n\
  \n与基本的 TiledLayer 相比，这种优化需要稍多的内存。此外，如果设备不支持诺基亚的 UI API，图块的透明度将丢失。你可以通过将预处理变量 `polish.TiledLayer.splitImage`\
  \ 设置为 `true` 来激活此优化，如清单 11-6 所示。\n\n**清单 11-6.** *为 TiledLayer 激活分割图像优化*\n\n<variables>\n\
  \n<variable\n\nname=\"polish.TiledLayer.splitImage\"\n\nvalue=\"true\"\n\n/>\n\n\
  </variables>\n\n**定义 TiledLayer 的网格类型**\n\n每个 TiledLayer 将包含的图块信息存储在一个名为*网格*的内部数组中。默认情况下，J2ME\
  \ Polish 使用字节网格，这显著减少了内存占用，但将不同图块的数量限制为 128 个。你可以通过定义预处理变量 `polish.TiledLayer.GridType`，将数组类型从默认的字节类型更改为整型或短整型。清单\
  \ 11-7 展示了如何更改为短整型，这允许你使用多达 32,767 个不同的图块——即使对于最苛刻的手机游戏来说也足够了。\n\n5033CH11.qxd 6/17/05\
  \ 12:11 PM 第 150 页\n\n**150**\n\n第 11 章 ■ 使用 J2ME POLISH 进行游戏编程\n\n**清单 11-7.**\
  \ *支持多达 32,767 个不同图块*\n\n<variables>\n\n<variable\n\nname=\"polish.TiledLayer.GridType\"\
  \n\nvalue=\"short\"\n\n/>\n\n</variables>\n\n**为 MIDP 2.0 设备使用游戏引擎**\n\n你也可以为 MIDP\
  \ 2.0 设备使用 J2ME Polish 实现。你可能希望这样做，因为某些厂商的实现存在缺陷或性能低下。要在 MIDP 2.0 设备上使用游戏引擎，请将预处理变量\
  \ `polish.usePolishGameApi` 设置为 `true`，如清单 11-8 所示。\n\n**清单 11-8.** *为特定 MIDP 2.0\
  \ 目标设备使用 J2ME Polish 游戏引擎*\n\n<variables>\n\n<variable\n\nname=\"polish.usePolishGameApi\"\
  \n\nvalue=\"true\"\n\nif=\"polish.identifier == VendorName/DeviceName\"\n\n/>\n\n\
  </variables>\n\n**解决游戏引擎的限制**\n\n你可以在游戏中使用 `javax.microedition.lcdui.game.*` API\
  \ 的任何类，但需要注意游戏引擎的一些技术限制：\n\n*   **像素级碰撞检测：** 在 MIDP 1.0 平台上，你无法对精灵使用像素级碰撞检测，因此需要设置碰撞矩形——最好是紧密贴合矩形。\n\
  *   **用户输入评估：** 当你扩展 `GameCanvas` 类时，在重写 `keyPressed(int)`、`keyReleased(int)` 或\
  \ `keyRepeated(int)` 方法之一时，应调用父类的实现，以便游戏引擎也能获知这些事件。我建议在主游戏循环中使用 `getKeyStates()`\
  \ 方法来评估用户输入。这能保证在 MIDP 2.0 和 MIDP 1.0 平台上都获得最佳性能。\n\n5033CH11.qxd 6/17/05 12:11\
  \ PM 第 151 页\n\n第 11 章 ■ 使用 J2ME POLISH 进行游戏编程\n\n**151**\n\n*   **精灵变换：** 在撰写本章时，你只能在支持诺基亚\
  \ UI API 的设备上使用精灵变换；否则，变换将被忽略。你可以通过检查预处理符号 `polish.supportSpriteTransformation`\
  \ 来了解当前目标设备是否支持精灵变换，如清单 11-9 所示。当不支持变换时，你可以向精灵图像中添加已经变换好的额外帧。无需变换精灵，通过设置指向已变换帧的另一个帧序列，也能达到相同效果。\n\
  \n**清单 11-9.** *检查设备是否支持精灵变换*\nimport javax.microedition.lcdui.game.GameCanvas;\n\
  \nimport javax.microedition.lcdui.game.Sprite;\n\npublic class MyGameCanvas\n\n\
  extends GameCanvas\n\nimplements Runnable\n\n{\n\n\n\n**//#if !( polish.midp2 ||\
  \ polish.supportSpriteTransformation )** private static final int MIRROR_SEQUENCE\
  \ = new int[]{ 2, 3 };\n\n**//#endif**\n\nSprite player;\n\npublic MyGameCanvas(boolean\
  \ supress) {\n\nsuper(supress);\n\n}\n\npublic void run() {\n\n// 主游戏循环\n\n}\n\n\
  public void mirrorPlayer() {\n\n**//#if polish.midp2 || polish.supportSpriteTransformation**\
  \ this.player.setTransform( Sprite.TRANS_MIRROR );\n\n**//#else**\n\n// 在精灵中使用额外的镜像帧：\n\
  \nthis.player.setFrameSequence( MIRROR_SEQUENCE );\n\n**//#endif**\n\n**}**\n\n\
  }\n\n5033CH11.qxd 6/17/05 12:11 PM Page 152\n\n**152**\n\n第 11 章 ■ 使用 J2ME POLISH\
  \ 进行游戏编程\n\n**将 MIDP 2.0 游戏移植到**\n\n**MIDP 1.0 平台**\n\n得益于 J2ME Polish 的游戏引擎和 GUI，要让一个\
  \ MIDP 2.0 游戏在 MIDP 1.0 平台上运行，你只需手动处理一些特定问题。像往常一样，你可以使用预处理来检测目标设备的能力。\n\n要将你的 MIDP\
  \ 2.0 游戏移植到 MIDP 1.0 设备，首先需要解决上一节概述的 J2ME Polish 游戏引擎的限制。你可能还需要调整特定于 MIDP 2.0 的代码，以便你的应用程序能在\
  \ MIDP 1.0 设备上工作。\n\n通常，你不能在游戏中使用任何仅限 MIDP 2.0 的功能，但此规则有两个重要的例外：\n\n• 你可以使用 `javax.microedition.lcdui.game.*`\
  \ API 中的所有内容。\n\n• 当你使用 J2ME Polish GUI 时，你可以使用大多数 MIDP 2.0 高级 GUI 功能，例如 `CustomItem`、`POPUP\
  \ ChoiceGroups` 或 `Display.setCurrentItem()`。\n\n因此，对于游戏来说，通常会出现三个移植问题：使用仅限 MIDP\
  \ 2.0 的低级图形操作、声音播放以及设备控制（振动和显示灯）。解决方案是使用特定于供应商的库。\n\n■**提示** 你通常需要根据目标设备的能力在游戏中集成特定资源。你可以使用\
  \ J2ME Polish 的资源组装功能来确保在 JAR 文件中包含正确的文件，如第 7 章所述。\n\n**移植低级图形操作**\n\n移植低级图形操作是一项具有挑战性的任务。你可以在\
  \ `javax.microedition.lcdui.Graphics` 和 `javax.microedition.lcdui.Image` 类中找到低级图形操作。\n\
  \n例如，MIDP 2.0 平台允许你直接使用 `Graphics.drawRGB()` 方法绘制原始 RGB 数据。`Image.createRGBImage()`\
  \ 方法也处理原始 RGB 数据。你是否能移植这些功能取决于你的实际使用情况以及目标设备。所有诺基亚设备都支持简单而强大的诺基亚 UI API；其他供应商通常提供自己的专有扩展。\n\
