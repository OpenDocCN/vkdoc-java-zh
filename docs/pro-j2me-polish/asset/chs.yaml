  你使用 `#condition` 预处理指令开始实现，以确保 `StringListItem` 仅在当前目标设备支持 MIDP 2.0 平台或目标设备使用 J2ME\
  \ Polish GUI 时才被包含。\n\n列表实现本身相当基础。`String[] entries` 字段包含列表项，`int focusedIndex`\
  \ 标记当前选中的条目，`int topIndex` 标记第一个显示的条目。`traverse()` 方法负责在列表中导航，而 `paint()` 方法则在屏幕上显示可见条目。`pointerPressed()`\
  \ 方法仅在当前目标设备支持指针事件时添加，也可用于在列表中导航。我将在后续章节中解释列表的设计。\n\n理解 J2ME Polish 对自定义项的处理\n\n\
  MIDP 2.0 规范为自定义项实际支持哪些功能留有一定空间。当你使用 J2ME Polish GUI 时，可以确信你的自定义项在每个目标设备上的行为都是一致的，无论其原生实现如何。因此，只有当你使用了在目标设备上实现有误的低级图形操作时，才需要进行移植工作。请参考目标设备在\
  \ *http://www.j2mepolish.org/devices-overview.html* 上的已知问题列表。另一个可能的移植问题是，当你希望同时在\
  \ MIDP 1.0 手机上使用你的项时，使用了仅限 MIDP 2.0 的功能。\n\n**初始化**\n\nJ2ME Polish 首先调用 `getPrefContentWidth(\
  \ allowedHeight )` 方法，并传入一个未定义的 `allowedHeight` ( -1 )。随后调用 `getPrefContentHeight(\
  \ allowedWidth )` 方法，该方法会获取实际授予的宽度。当 J2ME Polish 需要调整宽度时，你的自定义项将通过 `setSize(width,\
  \ height)` 方法再次收到通知。最大可能宽度是设备的屏幕宽度；根据应用程序的设计，你可能拥有更少的空间。\n\n请注意，`Display.getColor(\
  \ int )` 和 `Font.getFont( int )` 方法仅在 MIDP 2.0 设备上可用。因此，此类调用只能在当前目标设备支持 MIDP 2.0\
  \ 平台时使用。请参考清单 13-15 中的 `init()` 方法，了解如何使用 `#if` 预处理指令来区分不同情况。\n\n**交互模式**\n\nJ2ME\
  \ Polish 在每个平台上都支持交互模式 `CustomItem.KEY_PRESS`、`CustomItem.TRAVERSE_HORIZONTAL` 和\
  \ `CustomItem.TRAVERSE_VERTICAL`。此外，在所有支持指针事件的设备上都支持 `CustomItem.POINTER_PRESS`\
  \ 模式。\n\n5033CH13.qxd 6/17/05 12:13 PM Page 256\n\n**256**\n\n第 13 章 ■ 扩展 J2ME POLISH\n\
  \n**遍历**\n\n当你的自定义项首次获得焦点时，`traverse()` 方法将以 `CustomItem.NONE` 方向被调用。后续调用将包含方向（`Canvas.UP`、`Canvas.DOWN`、`Canvas.LEFT`\
  \ 或 `Canvas.RIGHT`）。\n\n**设计 CustomItem**\n\n当你希望使用 CSS 样式来设计你的 `CustomItem` 时，请确保项目类路径中包含\
  \ *enough-j2mepolish-client.jar*。你可以在 J2ME Polish 安装目录的 *import* 文件夹中找到它。\n\n**应用样式**\
  \ 当使用 J2ME Polish GUI 时，预处理符号 `polish.usePolishGui` 会被定义。你只能在 MIDP 2.0 环境中或使用 J2ME\
  \ Polish GUI 时扩展 `CustomItems`。当你希望同时在 J2ME Polish GUI 和纯 MIDP 2.0 基础的 UI 中使用你的\
  \ `CustomItem` 时，请使用 `#if` 预处理指令来区分这些情况。例如，清单 13-15 中的 `StringListItem` 仅在使用了 J2ME\
  \ Polish GUI 时才实现 `setStyle()` 方法。\n\n你可以通过以下几种方式将 CSS 样式集成到你的 `CustomItem` 中：\n\
  \n• 你可以在调用父类构造函数之前定义一个静态样式。\n• 你可以使用 `Form.append()` 方法。\n• 你可以创建一个额外的构造函数，该构造函数接受一个\
  \ `Style` 作为最后一个参数。\n• 你可以使用动态样式。\n\n我现在将解释这些选项。首先，在你的构造函数中定义静态样式很简单——只需使用 `#style`\
  \ 指令：\n\n//#style stringListItem, default\n\nsuper( label );\n\n当你使用此构造时，应始终允许默认样式，这样当你的第一个样式未定义时，构建过程不会中止。通过在\
  \ `#style` 指令中将其添加为最后一个可能的样式来实现这一点。\n\n其次，使用 `Form.append()` 方法更灵活，因为你可以在应用程序中为你的\
  \ `CustomItem` 使用不同的样式。清单 13-16 向你展示了如何为 `StringListItem` 应用 `winnerStringListStyle`。\n\
  \n**清单 13-16.** *使用 Form.append() 方法设置样式*\nString[] entries = new String[] { \"\
  \ first \", \" second \",\n\n\" third \", \" fourth \", \" fifth \", \" sixth \"\
  , \" seventh \" }; StringListItem customListItem = new StringListItem( \"Place:\"\
  , entries, 4, this.display );\n\n**//#style winnerStringListStyle**\n\n**this.inputForm.append(\
  \ customListItem );**\n\n第三，使用一个额外的构造函数，该构造函数接受一个 `Style` 作为最后一个参数，与使用 `Form.append()`\
  \ 方法一样灵活，但实现起来更复杂。清单 13-17\n\n5033CH13.qxd 6/17/05 12:13 PM Page 257\n\n第 13 章 ■\
