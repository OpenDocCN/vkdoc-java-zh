  \n<requirement name=\"Identifier\" value=\"Nokia/Series90\" /> **摩托罗拉**\n\n摩托罗拉是第二大厂商，2004\
  \ 年全球市场份额约为 16%。摩托罗拉独特之处在于它使用的不是一个、两个或三个不同的操作系统，而是四个：其专有的摩托罗拉操作系统、Symbian OS、Microsoft\
  \ Smartphone 和 Linux。\n\n摩托罗拉在 *http://motocoder.com* 上提供了优秀的开发者资源。你可以通过选择“知识与支持”，然后选择“错误提交”来查询有些隐藏的已知问题数据库。\n\
  \n摩托罗拉 MIDP 2.0 手机仅支持一种字体大小（20）和一种字体样式（普通）。摩托罗拉建议 J2ME 应用的 JAR 大小为 100KB，但没有硬性限制。在现代设备上，你可以预期堆内存大小为\
  \ 800KB 或更高。\n\n在较旧的 MIDP 2.0 设备上，你通常一次只能预取一个声音。此规则的例外是 MIDI、iMelody 以及摩托罗拉专用的 mix\
  \ 和 basetrack 格式，这些格式可以同时预取两个声音。你也可以先预取一个 MIDI，然后再预取一个 WAV 文件。在播放下一个声音之前，你需要停止并释放前一个声音。通常，你可以在摩托罗拉手机上同时使用最多四个\
  \ TCP 连接。\n\n你的 MIDlet 图标需要是 15✕15 像素；否则，只会显示一个通用图标。如果你想在 RMS 中使用超过 16KB 的空间，你需要设置\
  \ MIDlet-Data-Size\n\n5033CH15.qxd 6/20/05 9:20 AM 第 288 页\n\n**288**\n\n第 15 章\
  \ ■ 在设备限制间周旋\n\nJAD 属性，该属性以字节为单位定义所需空间。最大可能值为 524288\n\n（512KB），但当然你只能使用可用的空间。当请求的空间不可用时，设备将中止应用的安装。\n\
  \n摩托罗拉提供了一些额外的库，例如电话簿 API。这些 API 仅对许可方开放。如果你想使用它们，你需要与摩托罗拉建立业务关系。\n\n**三星**\n\n\
  三星是第三大厂商，2004 年全球市场份额约为 13%。三星还在 *http://developer.samsungmobile.com* 维护着一个良好的开发者社区。\n\
  \n出于某种奇怪的原因，你需要使用 Microsoft Internet Explorer 或 KDE Konqueror 才能访问该网站。不支持基于 Mozilla\
  \ 的浏览器。尽管如此，请务必查看针对这些手机的开发者提示。你可以在该网站的“资源”部分找到它们。\n\n\n\n三星手机的典型问题包括 JAD 属性需要按特定顺序排列，并且应精简到绝对必要。你可以在\
