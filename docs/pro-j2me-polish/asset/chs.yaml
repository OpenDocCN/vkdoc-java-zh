  \n}\n\n}\n\n}\n\n**设计 GUI**\n\n你可以使用 Web 标准层叠样式表（CSS）来设计 J2ME Polish 的 GUI。因此，现在每位网页设计师都可以使用\
  \ J2ME Polish 来设计移动应用程序！以下章节将详细解释所有设计可能性；无需具备 CSS 的预备知识。\n\n所有设计设置和文件都存储在项目的 *resources*\
  \ 目录中，除非在 *build.xml* 文件中指定了其他目录。该目录中最重要的文件是 *polish.css*。你可以在其中找到所有设计定义。这些设计定义按*样式*分组。\n\
  \n5033CH12.qxd 6/20/05 11:31 AM Page 182\n\n**182**\n\n第 12 章 ■ 使用 GUI 进行开发 你可以将样式分配给任何\
  \ GUI 项，例如标题、段落或输入字段。\n\n在样式中，通常会定义多个属性及其值，如清单 12-15 所示。\n\n**清单 12-15.** *一个简单的样式定义*\n\
  \n.myStyle {\n\nfont-color: white;\n\nfont-style: bold;\n\nfont-size: large;\n\n\
  font-face: proportional;\n\nbackground-color: black;\n\n}\n\n在清单 12-15 中，名为 myStyle\
  \ 的样式定义了一些字体值和背景颜色。任何样式都包含一个选择器以及多个属性及其值，如图 12-7 所示。\n\n**图 12-7.** *CSS 样式的组成部分*\n\
  \n你需要用分号结束每个属性-值对。样式声明需要以右花括号结束。样式的选择器或名称不区分大小写，因此 `.MySTYle` 与 `.myStyle` 相同。\n\
  \n你可以通过在 *resources* 文件夹中使用子文件夹来轻松调整设计以适应不同的手机。此机制使用与第 7 章中描述的资源组装相同的功能。相关技术将在“为特定设备和设备组进行设计”部分中重复说明。\n\
  \n你可以在源代码中使用 `#style` 预处理指令直接为 GUI 项指定样式。或者，你也可以使用 GUI 项的动态名称；例如，你可以对文本项使用 `p`，对超链接使用\
  \ `a`，或者对嵌入在 Form 中的所有文本项使用 `form p`。可能的组合以及预定义样式将在“使用动态、静态和预定义样式”部分中讨论。\n\n样式可以使用\
  \ `extends` 关键字扩展其他样式，例如 `.myStyle extends baseStyle {}`。“扩展样式”部分描述了此过程。\n\nJ2ME\
  \ Polish 支持带有外边距、内边距和内容的 CSS 盒模型。其他常见的设计设置包括背景、边框和字体设置。“常见设计属性”部分描述了这些广泛使用的设置。随后将讨论设计屏幕和项目的可能性。\n\
  \n**为特定设备和设备组进行设计**\n\n有时你需要针对特定设备、设备组或特定区域调整设计。你可以通过使用 *resources* 文件夹的适当子文件夹（如第\
  \ 7 章的“资源组装”部分所述）轻松使用特定的图片、样式等。\n\n5033CH12.qxd 6/20/05 11:31 AM Page 183\n\n第 12\
  \ 章 ■ 使用 GUI 进行开发 **183**\n\n你可以通过将 *polish.css* 文件添加到适当的文件夹（例如 `resources/Series60/polish.css`\
  \ 或 `resources/ScreenSize.240+x320+/*polish.css`）来调整设计以适应特定供应商、组或设备。你无需重复更基础 CSS\
  \ 文件中的所有样式和属性，只需标识更具体的设置即可。例如，当你想要更改字体颜色时，只需指定该样式的 `font-color` 属性即可。你无需定义任何其他属性或样式。这就是\
  \ J2ME Polish 中层叠样式表的层叠特性。\n\n清单 12-16 和 12-17 说明了 *polish.css* 的层叠特性。在清单 12-16\
  \ 中，有一个位于 `resources/polish.css` 文件中的基本样式定义。\n\n**清单 12-16.** *resources/polish.css\
  \ 中的基本样式定义*\n\n.myStyle {\n\npadding: 5;\n\nfont-color: white;\n\nfont-style: bold;\n\
  \nfont-size: large;\n\nfont-face: proportional;\n\nbackground-color: black;\n\n\
  border-color: yellow;\n\n}\n\n清单 12-17 显示了该样式在诺基亚特定文件 `resources/Nokia/polish.css`\
  \ 中的特化。在这种情况下，仅更改了 `font-color` 属性，并且未使用背景；所有其他设置保持不变。如果你不想使用某个属性，即使该属性已在父样式中定义，在大多数情况下你可以使用\
  \ `attribute-name: none` 设置。在清单 12-17 中，通过指定 `background: none`，该样式未使用背景。\n\n**清单\
  \ 12-17.** *位于 resources/Nokia/polish.css 中的诺基亚特化样式*\n\n.myStyle {\n\nfont-color:\
  \ gray;\n\nbackground: none;\n\n}\n\n**使用动态、静态和预定义样式**\n\nJ2ME Polish 区分动态样式、静态样式和预定义样式：\n\
  \n*   *静态*样式在应用程序的源代码中使用 `#style` 预处理指令定义。\n*   *预定义*样式由 J2ME Polish 内部用于某些特定项，例如屏幕标题、菜单栏或\
  \ TabbedForm 中的选项卡。\n*   *动态*样式根据项的类型用于项。\n\n5033CH12.qxd 6/20/05 11:31 AM Page\
  \ 184\n\n**184**\n\n第 12 章 ■ 使用 GUI 进行开发 静态样式\n\n\n\n静态样式通过在应用程序源代码中使用 `#style`\
  \ 预处理指令应用于特定的项或屏幕。程序员只需告知设计师样式名称及其用途（即用于何种项或屏幕），而设计师则需要在 *polish.css* 文件中定义这些样式。在\
  \ CSS 文件中，静态样式始终以点号开头，例如 `.myStyle`。\n\n静态样式比动态样式速度更快，资源消耗更少。应尽可能坚持使用静态样式和预定义样式。\n\
  \n预定义样式\n\nJ2ME Polish GUI 在内部使用预定义样式。与普通的“用户定义”静态样式不同，它们的名称不以点号开头，例如使用 `title`\
  \ 而非 `.title`。\n\n表 12-7 列出了可用的预定义样式。当您未定义某个预定义样式时，将使用“default”样式作为替代。\n\n**表 12-7.**\
  \ *支持的预定义样式*\n\n**样式**\n\n**描述**\n\ntitle\n\n屏幕标题的样式。对于 MIDP 2.0 设备，默认使用原生实现，除非使用了菜单全屏模式，或者预处理变量\
  \ `polish.usePolishTitle` 被定义为 true：\n\n`<variable name=\"polish.usePolishTitle\"\
  \ value=\"true\" unless=\"polish.Vendor == Nokia\" />`。\n\n您也可以通过使用 `title-style`\
  \ 属性为特定的 Screen 或 ChoiceGroup 使用自定义样式。\n\nfocused\n\n当前焦点项的样式。此样式用于 List、Form 以及\
  \ ChoiceGroup 等容器。您也可以通过使用 `focused-style` 属性为特定的 Screen 或 ChoiceGroup 使用自定义样式。\n\
  \nmenu\n\n此样式用于设计全屏模式下的菜单栏。全屏模式可通过 *build.xml* 中 `<build>` 元素的 `fullScreenMode`\
  \ 属性触发（设置 `fullScreenMode=\"menu\"`）。在 menu 样式中，您还可以使用 `focused-style` 属性定义当前焦点命令所使用的样式，例如：`focused-style:\
  \ menuFocused;`。在这种情况下，您还需要定义静态样式 `.menuFocused`。\n\nmenuItem\n\n用于屏幕菜单项（命令）的样式。当未定义\
  \ `menuItem` 时，将使用 `menu` 样式作为替代。\n\nlabel\n\n此样式用于任何项的菜单标签。可以通过在相应样式中定义 CSS 属性\
  \ `label-style` 来指定另一个标签样式，该属性引用另一个样式。\n\ninfo\n\n用于在屏幕中显示附加信息的样式。目前，此样式仅用于在 TextField\
  \ 或 TextBox 的直接输入模式启用时显示当前输入模式。\n\ndefault\n\n当所需的预定义样式未定义时，J2ME Polish GUI 使用的样式。即使未在\
  \ *polish.css* 文件中显式定义，`default` 样式也始终存在。\n\ntabbar\n\n此样式用于设计 TabbedForm 的标签栏。\n\
  \nactivetab\n\n用于设计 TabbedForm 中当前活动的标签。\n\n5033CH12.qxd 6/20/05 11:31 AM Page 185\n\
  \n第 12 章 ■ 使用 GUI **185**\n\n**样式**\n\n**描述**\n\ninactivetab\n\n用于设计 TabbedForm\
  \ 中除当前选中标签外的所有标签。\n\ntopframe\n\n用于设计 FramedForm 的上部边框。\n\nbottomframe\n\n用于设计 FramedForm\
  \ 的下部边框。\n\nleftframe\n\n用于设计 FramedForm 的左侧边框。\n\nrightframe\n\n用于设计 FramedForm\
  \ 的右侧边框。\n\nframe\n\n当您未使用更具体的样式时，可以使用 `frame` 样式在一个样式中设计 FramedForm 的所有边框。\n\n\
  不允许将预定义样式的名称用于静态样式，因此您不能使用名为 `.title` 等的静态样式。\n\n动态样式\n\n使用动态样式可以在不修改源代码中 `#style`\
  \ 指令的情况下将样式应用于项。通过动态样式，设计师可以完全独立于程序员工作，并为尚未关联静态样式的 GUI 项尝试新的设计。您还可以在不更改现有应用程序源代码的情况下，探索\
  \ J2ME Polish API 的强大功能和可能性。\n\n\n\n动态样式比静态和预定义样式需要更多的内存和处理时间。因此，应尽可能使用静态样式。\n\n\
  动态样式不以点号开头，其选择器使用特定项目或屏幕的名称。\n\n文本使用 `p`、`a`、`button` 或 `icon` 选择器。屏幕使用屏幕本身的名称，例如\
  \ `form`、`list` 或 `textbox`，如清单 12-18 所示。\n\n**清单 12-18.** *在 resources/polish.css\
  \ 文件中使用动态样式* p {\n\nfont-color: black;\n\nfont-size: medium;\n\nbackground: none;\n\
  \n}\n\nform {\n\nmargin: 5;\n\nbackground-color: gray;\n\nborder: none;\n\nfont-size:\
  \ medium;\n\n}\n\n你还可以设计包含在其他项目或屏幕中的项目。样式 `form p` 会选择嵌入在表单中的所有文本项目（属于 `StringItem`\
  \ 类），如清单 12-19 所示。\n\n5033CH12.qxd 6/20/05 11:31 AM 第 186 页\n\n**186**\n\n第 12 章\
  \ ■ 使用 GUI **清单 12-19.** *使用动态样式 form p 选择表单内的文本* form p {\n\nfont-color: black;\n\
  \nfont-size: medium;\n\nbackground-color: white;\n\n}\n\n表 12-8 显示了项目和屏幕可用的动态样式。\n\
  \n**表 12-8.** *可用的动态样式*\n\n**类**\n\n**选择器**\n\n**说明**\n\nStringItem\n\np\n\nStringItem\
  \ 显示文本。当项目的外观模式为 PLAIN 时，使用 p 选择器。\n\na\n\n当项目的外观模式为 HYPERLINK 时，使用 a 选择器。\n\nbutton\n\
  \n当项目的外观模式为 BUTTON 时，使用 button 选择器。\n\nImageItem\n\nimg\n\n显示图像。\n\nGauge\n\ngauge\n\
  \n显示进度指示器。\n\nSpacer\n\nspacer\n\n用于显示空白区域。不推荐使用 Spacer 项目，因为可以通过 margin 和 padding\
  \ 属性为所有项目设置间距。\n\nIconItem\n\nicon\n\n显示图像和文本。\n\nTextField\n\ntextfield\n\n允许用户输入文本。\n\
  \nDateField\n\ndatefield\n\n允许用户输入日期或时间。\n\nChoiceGroup\n\nchoicegroup\n\n包含多个选择项。\n\
  \nChoiceItem\n\nlistitem\n\n显示单个选择项。当此项目包含在隐式列表中时，使用 listitem 选择器。\n\nradiobox\n\
  \n当列表或选择组的类型为 EXCLUSIVE 时，使用 radiobox 选择器。\n\ncheckbox\n\n当列表或选择组的类型为 MULTIPLE 时，使用\
  \ checkbox 选择器。\n\npopup\n\n当选择组的类型为 POPUP 时，使用 popup 选择器。\n\nSpriteItem\n\nspriteitem\n\
  \n包含动画项目。\n\nList\n\nlist\n\n显示多个选择项。\n\nForm\n\nform\n\n包含不同的 GUI 项目。\n\nTextBox\n\
  \ntextbox\n\n包含单个文本输入字段。\n\nTabbedForm\n\ntabbedform\n\n带有多个选项卡的表单。\n\nFramedForm\n\
  \nframedform\n\n带有多个框架的表单。\n\n5033CH12.qxd 6/20/05 11:31 AM 第 187 页\n\n第 12 章 ■\
  \ 使用 GUI **187**\n\n**扩展样式**\n\n你还可以扩展其他样式。子样式会继承被扩展样式的所有属性。你可以利用这种机制将基本设计保留在一个或少数几个样式定义中，同时通过扩展基本设计来完成实际设计。这可以节省大量编写工作，并让你更轻松地更改设计。在清单\
  \ 12-20 中，`.highscoreScreen` 样式继承了 `.mainStyle` 的所有属性，但 `font-color` 和 `background-color`\
  \ 属性被指定为不同的值。\n\n**清单 12-20.** *扩展样式可节省工作量，并允许你在一个地方更改基本设计*\n\n.mainScreen {\n\n\
  margin: 10;\n\nfont-color: black;\n\nfont-size: medium;\n\nfont-style: italic;\n\
  \nbackground-color: gray;\n\n}\n\n**.highscoreScreen extends mainScreen {**\n\n\
  font-color: white;\n\nbackground-color: black;\n\n}\n\n**回顾 CSS 语法**\n\nJ2ME Polish\
  \ 的 CSS 语法很简单，但你需要遵守一些规则。\n\nCSS 声明的结构\n\n每个样式都以选择器开头，后跟一个左花括号、若干属性-值对，以及一个右花括号。\n\
  \n选择器可以由多个项目名称组成，并可以包含 `extends` 子句。\n\n每个属性-值对都需要以分号结尾。\n\n命名\n\n\n\n样式可以使用任意名称，只要名称仅由字母数字和下划线（_）字符组成即可。名称不区分大小写。静态样式需要以点号开头。静态样式不得使用动态样式或预定义样式的名称。所有\
  \ Java 关键字，例如 `class`、`int` 或 `boolean`，均不允许用作样式名称。\n\n属性分组\n\n你可以对属性进行分组以便于处理。清单\
  \ 12-21 中的 `.mainScreen` 和 `.helpScreen` 样式使用了语义上等效的字体定义。分组不会改变属性的含义，但能使声明对人类来说更具可读性。\n\
  \n5033CH12.qxd 6/20/05 11:31 AM 第 188 页\n\n**188**\n\n第 12 章 ■ 使用 GUI 工作 **清单 12-21.**\
  \ *分组 CSS 属性*\n\n.mainScreen {\n\npadding: 5;\n\nfont-color: black;\n\nfont-size:\
  \ medium;\n\nfont-style: italic;\n\nfont-face: system;\n\n}\n\n.helpScreen {\n\n\
  margin: 5;\n\nbackground-color: yellow;\n\n**font {**\n\n**color: black;**\n\n**size:\
  \ medium;**\n\n**style: italic;**\n\n**face: system;**\n\n**}**\n\n}\n\n引用其他样式\n\
  \n当你引用另一个样式时，无需为静态样式编写点号。例如，在 `extends` 关键字之后，或在诸如 `title-style`、`focused-style`\
  \ 等属性中，你可以引用其他样式。\n\n注释\n\n你可以在任何位置插入注释，以 `/*` 开头，以 `*/` 结束。这两个标记之间的所有内容都会被忽略，如清单\
  \ 12-22 所示。\n\n**清单 12-22.** *在 polish.css 文件中使用注释*\n\n/**\n\n* 此样式设计主屏幕：\n\n**/\n\
  \n.mainScreen {\n\n/* 定义字体颜色： */\n\nfont-color: black;\n\n/* 尺寸为 small、medium 和\
  \ large： */\n\nfont-size: medium;\n\n/* 样式为 plain、bold、italic 或 underlined： */\n\
  \nfont-style: italic;\n\n/* 字体可以是 system、proportional 或 monospace： */\n\nfont-face:\
  \ system;\n\n}\n\n5033CH12.qxd 6/20/05 11:31 AM 第 189 页\n\n第 12 章 ■ 使用 GUI 工作 **189**\n\
  \n**通用设计属性**\n\n在每个样式中，无论你实际使用该样式设计什么项目或屏幕，都可以使用一些通用属性。在接下来的章节中，你将学习如何使用这些通用属性。\n\
  \npolish.css 文件的结构\n\n*polish.css* 文件可以包含不同的部分：\n\n• **colors 部分**：colors 部分包含颜色的定义。\n\
  \n• **fonts 部分**：fonts 部分包含可在多个样式中引用的字体定义。\n\n• **backgrounds 部分**：backgrounds 部分包含可由多个样式使用的背景定义。\n\
  \n• **borders 部分**：borders 部分包含多个样式的边框定义。\n\n• **其余部分**：*polish.css* 的其余部分包含实际的样式定义。\n\
  \n你可以在实际的样式定义中引用已定义的颜色、字体、背景和边框。这使得修改变得容易，因为你只需要在一个地方更改值。\n\n样式定义的结构\n\n每个样式可以包含多个通用属性组：\n\
  \n• **margin**：项目之间的间距\n\n• **padding**：边框与项目内容之间的间距\n\n• **font**：使用的内容字体及其颜色\n\
  \n• **layout**：项目的布局\n\n• **background**：项目或屏幕背景的定义\n\n• **border**：项目或屏幕边框的定义\n\
  \n• **before 和 after**：应在项目之前或之后插入的元素。\n\n• **min-width 和 max-width**：项目的宽度\n\n\
  • **focused-style**：当项目获得焦点时使用的样式\n\n• **特定属性**：特定 GUI 项目的任何属性\n清单 12-23 演示了一个完整的\
  \ *polish.css* 文件可能的样子。\n\n5033CH12.qxd 6/20/05 11:31 AM 第 190 页\n\n**190**\n\n\
  第 12 章 ■ 使用 GUI 工作 **清单 12-23.** *一个完整的 polish.css 文件*\n\ncolors {\n\nbgColor: rgb(\
  \ 132,143,96 );\n\nhighlightedBgColor: rgb( 238,241,229 );\n\nhighlightedFontColor:\
  \ rgb( 238,241,229 );\n\nfontColor: rgb( 30, 85, 86 );\n\n}\n\nborders {\n\nthinBorder\
  \ {\n\ntype: round-rect;\n\narc: 8;\n\ncolor: fontColor;\n\n}\n\n}\n\nbackgrounds\
  \ {\n\nimageBackground {\n\n\n\ncolor: highlightedBgColor;\n\nimage: url( bg.png\
  \ );\n\n}\n\n}\n\n/* 标题的设计 */\n\ntitle {\n\npadding: 2;\n\nmargin-top: 0;\n\nmargin-bottom:\
  \ 5;\n\nmargin-left: 0;\n\nmargin-right: 0;\n\nfont-face: proportional;\n\nfont-size:\
  \ large;\n\nfont-style: bold;\n\nfont-color: highlightedFontColor;\n\nbackground-color:\
  \ bgColor;\n\nborder: thinBorder;\n\nlayout: horizontal-center | horizontal-expand;\n\
  \n}\n\n/* 当前选中项的设计 */\n\nfocused {\n\npadding: 5;\n\nbackground {\n\ntype: round-rect;\n\
  \narc: 8;\n\n5033CH12.qxd 6/20/05 11:31 AM Page 191\n\n第 12 章 ■ 使用 GUI **191**\n\
  \ncolor: highlightedBgColor;\n\nborder-color: fontColor;\n\nborder-width: 2;\n\n\
  }\n\nfont {\n\nstyle: bold;\n\ncolor: fontColor;\n\nsize: small;\n\n}\n\nlayout:\
  \ expand | center;\n\nafter: url( checked.png );\n\n}\n\n/* 主菜单屏幕的设计 */\n\n.mainScreen\
  \ {\n\npadding: 5;\n\npadding-left: 15;\n\npadding-right: 15;\n\nbackground: imageBackground;\n\
  \nlayout: horizontal-expand | horizontal-center | vertical-center; columns: 2;\n\
  \ncolumns-width: equal;\n\nmenubar-color: fontColor;\n\nshow-text-in-title: true;\n\
  \n}\n\nCSS 盒模型：外边距和内边距\n\n所有 GUI 项都支持标准的 CSS 盒模型，如图 12-8 所示。\n\n**图 12-8.** *J2ME\
  \ Polish 的 CSS 盒模型*\n\n5033CH12.qxd 6/20/05 11:31 AM Page 192\n\n**192**\n\n第 12\
  \ 章 ■ 使用 GUI *外边距*描述了与其他 GUI 项之间的间隙。*内边距*描述了项边框与该项实际内容之间的间隙。\n\nmargin 和 padding\
  \ 属性定义了左、右、上、下元素的默认间隙。任何 margin 的默认值都是 0 像素，任何 padding 的默认值都是 1 像素。除了左、右、上、下内边距之外，J2ME\
  \ Polish 还支持垂直和水平内边距。这些内边距定义了不同内容部分之间的间隙。项的标签与实际内容之间的间隙由水平内边距定义。\n\n另一个例子是图标，它由图像和文本组成。根据图像的对齐方式，垂直或水平内边距会填充图标图像与图标文本之间的空间。\n\
  \n在清单 12-24 中，上、右、下外边距为 5 像素，左外边距为 10 像素。\n\n**清单 12-24.** *定义简单外边距*\n\n.myStyle\
  \ {\n\nmargin: 5;\n\nmargin-left: 10;\n\nfont-color: black;\n\n}\n\n你也可以使用百分比值。上、下和垂直属性的百分比值相对于显示屏的高度。左、右和水平属性的百分比值相对于显示屏的宽度。清单\
  \ 12-25 演示了这一点。\n\n**清单 12-25.** *定义百分比内边距*\n\n.myStyle {\n\npadding-left: 2%;\n\
  \npadding-right: 2%;\n\npadding-vertical: 1%;\n\nmargin-left: 10;\n\nfont-color:\
  \ black;\n\n}\n\n当设备宽度为 176 像素时，2% 的内边距结果为 3.52 像素，即实际内边距为 3 像素。在显示屏高度为 208 像素时，1%\
  \ 的垂直内边距结果为 2.08 像素，即实际内边距为 2 像素。请注意，使用百分比值时，需要定义设备的 ScreenSize 能力。\n\n使用布局对齐项\n\
  \n你可以使用 layout 属性对齐项。layout 属性定义了受影响的项应如何对齐和布局。可能的布局值例如 left、right 和 center。可以使用所有\
  \ MIDP 2.0 标准的布局值，如表 12-9 所示。例如，如果你想使用完整的可用宽度并将项水平居中，可以指定 layout: center | expand;。你可以使用多个符号来分隔布局值：使用\
  \ ||、|、or 或 and 运算符。\n\n5033CH12.qxd 6/20/05 11:31 AM Page 193\n\n第 12 章 ■ 使用 GUI\
  \ **193**\n\n**表 12-9.** *可用的布局值*\n\n**布局**\n\n**替代名称**\n\n**说明**\n\nleft\n\n受影响的项应左对齐。\n\
  \nright\n\n受影响的项应右对齐。\n\ncenter\n\nhorizontal-center, hcenter\n\n受影响的项应水平居中。\n\n\
  expand\n\nhorizontal-expand, hexpand\n\n\n\n受影响的项目应使用整个\n可用宽度（即应填满\n整行）。\n\nshrink\n\
