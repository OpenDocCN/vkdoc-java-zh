  \n编程 FramedForm\n\n`de.enough.polish.ui.FramedForm`将屏幕分为一个主区域和四个可能的框架，分别位于屏幕的顶部、底部、左侧或右侧。只有主区域可以滚动，而框架保持在其位置。例如，您可以使用框架将按钮固定在特定位置，或包含一个`TextField`来过滤显示的项目。表\
