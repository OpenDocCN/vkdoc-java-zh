  \ 4MB 或更大。\n\nSeries 80\n\n诺基亚的 Series 80 平台由结合了 PDA 和移动电话的设备组成。它们相当成功地瞄准了企业用户。诺基亚\
  \ Communicator 手机是这类手机的市场领导者。\n\n典型的 Series 80 设备看起来像普通手机，但打开后会显示一个 640✕200 像素的屏幕和一个\
  \ QWERTY 键盘。除了 MIDP 2.0 和 CLDC 1.0 标准外，Series 80 设备还支持 Personal Java 配置文件和 CDC。可选的\
