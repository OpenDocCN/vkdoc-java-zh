  第 12 章 ■ 使用 GUI 工作 **编程特定项目和屏幕**\n\n通常，J2ME Polish GUI 与 MIDP 2.0 UI 标准完全兼容。但是，MIDP\
  \ 2.0 标准中不提供某些增强功能。以下部分讨论如何对 TabbedForm、FramedForm 和 SpriteItem 进行编程。更多详细信息，请参阅\
  \ *${polish.home}/doc/javadoc.html* 中的 JavaDoc 文档。\n\n编程 TabbedForm\n\n`de.enough.polish.ui.TabbedForm`\
