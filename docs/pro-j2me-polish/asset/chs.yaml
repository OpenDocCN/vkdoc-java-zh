  <parent>Sony-Ericsson/K500i</parent>


  父设备的所有特性和能力都会自动继承。当你扩展另一个设备时，你需要确保父设备定义在子设备之上；否则，J2ME Polish 将无法正确解析继承关系，并将中止处理。


  你可以指定 <device> 元素的 supportsPolishGui 属性，以显式允许对相应设备使用 J2ME Polish GUI。通常，J2ME Polish
  会自动检查设备是否具有推荐的能力，例如支持超过 256 种颜色并且堆大小大于 500KB。默认情况下，J2ME Polish GUI 仅用于确实具有推荐能力的设备。supportsPolishGui
  属性允许你覆盖 GUI 支持的自动检查。


  ■**提示** 你可以通过在 *build.xml* 文件中将 usePolishGui 属性设置为 always 而不是 yes 来覆盖 GUI 指示器。然后，无论设备数据库中的设置如何，J2ME
  Polish GUI 都将用于所有目标设备。


