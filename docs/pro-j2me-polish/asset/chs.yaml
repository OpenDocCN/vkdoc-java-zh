  **定义补充能力和特性**


  你可以在 *vendors.xml*、*groups.xml* 和 *devices.xml* 文件中定义能力和特性。设备会自动继承其供应商以及该设备所属的所有组的特性和能力。这样的层次结构可能变得相当复杂，如图
  6-1 所示。


  **图 6-1.** *设备可以具有复杂的层次结构。*


  任何已定义的特性的都是累加的。这意味着，如果设备的供应商定义了 *x*，设备的组定义了 *y*，并且设备本身定义了 *z*，那么你的设备最终将拥有所有特性：*x*、*y*
  和 *z*。


  当在多个地方定义能力时，通常会被覆盖。*groups.xml* 中的能力会覆盖 *vendors.xml* 中的相同能力，而 *devices.xml* 中的能力会覆盖在其他地方定义的能力。诺基亚流行的
  Series 40 手机通常具有 128✕128 像素的屏幕尺寸，因此你在 *groups.xml* 的 Series40 组中找到相应的定义：


  <capability name="ScreenSize" value="128x128" /> 然而，Series 40 中的某些设备确实具有不同的屏幕尺寸。在这种情况下，你可以在
  *devices.xml* 中为相应的设备定义具有不同值的 ScreenSize 能力。


  然而，某些能力是累积的，就像特性一样。如果你在设备层次结构的多个地方定义了 JavaPackage、JavaProtocol、SoundFormat、VideoFormat
  和 Bugs 能力，它们都会累加起来。例如，JavaPackage 能力定义了


