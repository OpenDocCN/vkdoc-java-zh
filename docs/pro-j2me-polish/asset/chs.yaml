  **集成第三方 API**


  有时您需要在项目中使用第三方 API。您必须区分以源代码形式提供的 API 和仅以二进制形式提供的 API。另一种情况是所谓的可选 API，它们已预装在您的目标设备上，例如无线消息
  API 或位置 API。根据 API 的类型，集成 API 需要不同的操作。


  ■**注意** 不要忘记在您的 IDE 中将库添加到项目的类路径中。


  **集成源代码形式的第三方 API**


  当第三方 API 以源代码形式提供时，您可以通过修改 *build.xml* 文件中 `<build>` 元素的 `sourceDir` 属性来集成它。考虑您正常的应用程序代码位于
  *source/src* 目录，而第三方 API 的源代码位于 *source/thirdparty* 文件夹的情况。您现在可以使用 `<sources>` 元素添加第三方
  API，如清单 7-35 所示。与大多数其他元素一样，您可以为您的源代码使用 `if` 和 `unless` 条件。


  **清单 7-35.** *集成源代码形式的第三方 API*


  <j2mepolish>

  <info

  license="GPL"

  name="Roadrunner"

  vendorName="A reader."

  version="0.0.1"

  jarName="${polish.vendor}-${polish.name}-roadrunner.jar"

  />

  <deviceRequirements>

  <requirement name="Identifier" value="Nokia/Series60" />

  </deviceRequirements>

  <build

  **>**

  **<sources>**

  **<source dir="source/src" />**

  **<source dir="source/thirdparty" />**

  **<source dir="source/s60" if="polish.group.Series60" />**

  **</sources>**

  <midlet class="com.apress.roadrunner.Roadrunner" />

  </build>

  <emulator />

  </j2mepolish>


