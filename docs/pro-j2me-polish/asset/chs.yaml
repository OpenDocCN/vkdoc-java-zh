  \ FramedForm*\n\n编程 SpriteItem\n\n使用 `de.enough.polish.ui.SpriteItem` 在菜单 Form 中包含动画。此项目嵌入了一个普通的\
  \ `javax.microedition.lcdui.game.Sprite`，当该项目获得焦点时，精灵会播放动画。例如，想象一本合上的书，当用户聚焦它时，书会打开。\n\
  \n得益于 J2ME Polish 游戏引擎（参见第 11 章），您也可以在 MIDP 1.0 设备上使用 Sprites。表 12-6 列出了创建新 SpriteItem\
  \ 所需的参数。\n\n根据应用程序的状态，您可以通过调用 Sprite 的 `setFrameSequence( int[] )` 方法来更改 Sprite\
  \ 的帧序列，从而改变动画。\n\n5033CH12.qxd 6/20/05 11:31 AM Page 179\n\n第 12 章 ■ 使用 GUI **179**\n\
  \n**表 12-6.** *SpriteItem 构造函数的参数* **参数**\n\n**说明**\n\nString label\n\n项目的标签。\n\n\
  Sprite sprite\n\n嵌入的 Sprite。动画期间将显示该 Sprite 的帧序列。\n\nlong animationInterval\n\n\
