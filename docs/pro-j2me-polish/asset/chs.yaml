  • *src* 文件夹包含示例应用程序的实际源代码。


  • *build.xml* 文件控制 J2ME Polish 应如何构建示例应用程序。


  ■**注意** 在本节中，我假设你从命令行使用 Ant。当然，你也可以从你的 IDE 中构建示例应用程序。通常，只需创建一个以示例应用程序为根的新项目，右键单击其中的
  *build.xml*，然后在 IDE 中选择“运行 ➤ Ant”或类似的菜单命令即可。有关将 J2ME Polish 集成到常见 IDE 的详细信息，请参阅下一章。


  **测试示例应用程序**


  菜单应用程序仅显示任何 J2ME 游戏的典型菜单。使用以下命令在模拟器中测试此应用程序：


  > cd C:\Programs\J2ME-Polish\samples\menu


  > ant test j2mepolish


  相应地调整路径到你的 J2ME Polish 安装目录。


  那么这里发生了什么？当调用 Ant 时，它会在当前目录中查找文件 *build.xml*（因此在此示例中使用 *samples/menu/build.xml*）。参数
  test 和 j2mepolish 表示 *build.xml* 中的目标，由 Ant 执行。test 目标将一个 Ant 属性设置为 true，该属性由 j2mepolish
  目标评估。当 test 为 true 时，J2ME Polish 将仅为单个设备构建应用程序，并在成功构建后启动相应的模拟器。如果一切顺利，你应该会看到示例应用程序（参见第
  1 章中的图 1-2）。


  RoadRunner 示例应用程序包含一个完整的游戏，其中需要引导一只青蛙穿过拥挤的街道（听起来很熟悉？）。默认情况下，RoadRunner 游戏在测试模式下为
  Nokia/Series60 构建。在构建之前，请确保你已经安装了该模拟器，你可以从 *http://forum.nokia.com* 获取。根据你的设置，你可能需要在
  *build.xml* 文件中定义 Ant 属性 ${nokia.home}，例如：


  <property name="nokia.home" value="C:\Nokia" /> 此属性的注释版本可以在 *build.xml* 文件的开头找到。


  现在犒劳自己一次成功的安装，并玩一局 RoadRunner：


  > cd C:\Programs\J2ME-Polish\samples\roadrunner


  > ant test j2mepolish


  为 cd 命令使用正确的路径。


