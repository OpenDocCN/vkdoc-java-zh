    This completes the maze action game implementation. Once you have all of the classes
    in place, you should be able to run the game. Observe how each AI behaves and
    attempts to catch, or threaten, the player in their own unique way.


    Different games will place different requirements on the AI. Some will make use
    of the A* pathfinding algorithm as in our example, others will require writing
    conditional (`if`) statements that trick the player into thinking that the AI
    is learning, and there will be cases where established computer science algorithms
    are needed. All in all, there is no single way of addressing the AI implementation
    in games. Nevertheless, you now have a general understanding of the field and
    are aware of common implementation techniques. We are now ready to summarize the
    key points we covered in this chapter.


    ## Summary


    In this chapter, we covered the basics of game AI. Having AI in a game is important
    as it makes the game significantly more engaging for the player. More specifically,
    we considered how AI agents can navigate the game world using the A* pathfinding
    available in FXGL. The A* algorithm operates on a 2D grid or a graph, a data structure
    with nodes and edges, and calculates the shortest (there can be multiple) path
    between two nodes. Thereafter, we discussed adding behavior to AI agents. Behavior
    allows agents to engage with gameplay and the player to perform various actions.
    In FXGL, such behavior can be added by using custom components or by using a finite
    state machine. Finally, we put together a clone of Pac-Man with our original additions.
    We discussed how to implement each AI agent’s behavior in the game and demonstrated
    how flexible FXGL can be in allowing users to write custom logic. The next chapter
    will focus on enhancing the visual aspects of FXGL games.


    # 6. Graphics, Visual Effects, and User Interfaces


    Many visually complex features related to graphics and rendering will be discussed
    in this chapter. We will also cover the particle and the animation systems in
    FXGL in detail. In particular, we will consider:


    - The rendering pipeline in FXGL and abstractions over low-level drawing

    - The separation between the game and the UI layers

    - The particle system, its configuration, and how to use it within the game world

    - How to translate, rotate, and scale game and UI elements using the FXGL API


    Graphics and visual effects are a key aspect of modern games, especially so if
    the game is of an AAA class. While FXGL cannot match such level of graphically
    intensive computations, it is still able to produce impressive results. For example,
    a "shoot ''em up" game with numerous visual effects applied can be seen in Figure
    [6-1](#522865_1_En_6_Chapter.xhtml#Fig1).


    ![A screenshot depicts a scene from the top down shooter game, which has numerous
    visual effects.](images/522865_1_En_6_Chapter/522865_1_En_6_Fig1_HTML.jpg)


    **Figure 6-1** An example top-down shooter developed with FXGL


    To get a general idea of how rendering works and what concepts are used, we open
    this chapter by exploring the theory behind computer graphics and how it is implemented
    in FXGL. In the content that follows, we will use JavaFX and FXGL interchangeably,
    as most of the rendering pipeline in FXGL is provided by JavaFX.'
