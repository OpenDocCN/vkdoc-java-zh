    of how the level is generated. It is stored as a plain text file, where each symbolic
    character designates an entity. For example:


    ```

    11E1


    P111

    ```


    You could view this simple example as follows: “1” represents a block, “0” represents
    a coin, “P” represents the player, and “E” represents an enemy. The actual level
    is slightly bigger but follows the same convention.


    We now consider each major method in Listing [5-10](#522865_1_En_5_Chapter.xhtml#PC13).
    The first method is `newBlock()`, which spawns a new block type entity. You will
    note that the `@Spawns` annotation has a “1” as its parameter. This is the same
    character we used in the example earlier to identify a block. Blocks are the cells
    that cannot be crossed and act like obstacles. In terms of the view, it is a simple
    JavaFX Rectangle with rounded corners. The coin entity is spawned from “0” using
    the `newCoin()` method and has a texture associated with it. We offset the texture
    so it is centered in the cell and add a bounding box. Most of these methods have
    been covered earlier in the book.


    The construction of the player and enemy entities is a bit more complex. In the
    case of the player entity, we first create an animated texture from the sprite
    sheet. Given any texture, FXGL allows us to create an animated one quite easily
    using the `toAnimatedTexture()` method, which takes two parameters: the number
    of frames and the total animation duration. When setting the view of the player
    entity, we need to remember to call `loop()` so that the animation is looped indefinitely.
    The rest of the player construction code is simply adding relevant components,
    though there is one call that is of particular note:


    ```

    new AStarMoveComponent(new LazyValue(() -> geto("grid"))).

    ```


    In previous examples, you have seen how we can construct the `AStarMoveComponent`
    using an A* grid. However, when we are creating the player entity in this game,
    the grid does not exist yet, so instead we pass a `LazyValue` object with a callback
    to get the grid object at runtime. You will find the same approach used in constructing
    the enemy entity. One of the main differences for the enemy entity is how we obtain
    the AI component. To avoid having four different methods for creating four enemy
    types, we extract the AI component construction into a separate method, which
    cycles through the components and, each time it is called, returns a different
    one. This completes the overview of the factory class and its spawn methods. You
    are encouraged to recap material from the previous chapters with respect to the
    code that we did not cover in detail here.


