    ```


    因此，椅子 `diningChair` 的价格为 50 个货币单位。我们可以从同一个类创建另一个对象，并为其赋予不同的价格值：


    ```

    Chair officeChair = new Chair();

    officeChair.cost = 75;

    ```


    请注意，尽管对象 `diningChair` 和 `officeChair` 都是 `Chair` 类型，但它们是两个不同的对象：椅子 `diningChair`
    价格为 50，而椅子 `officeChair` 价格为 75。如果我们更改 `diningChair` 中某些变量的值，`officeChair` 中变量的值不会随之改变。这是面向对象编程的核心概念之一：每个对象都拥有自己的属性。


    我们刚刚讨论了属于对象的变量。这种仅影响其所属实例的变量被称为实例级变量。在上述示例中，变量 `cost` 就是一个实例级变量。除了实例级变量，我们还可以定义类级变量，即静态变量。顾名思义，它们属于类，而非对象。请看以下示例：


    ```

    class Chair {

    static int quality;

    int cost;

    }

    ```


    我们刚刚创建了一个名为 `quality` 的 `int` 类型静态变量，它属于 `Chair` 类，而非 `Chair` 类型的某个具体对象。由于 `quality`
    是类级变量，我们通常通过类而非对象来访问它：


    ```

    Chair.quality = 3;

    ```


    我们会注意到，所有访问 `quality` 值的对象都将读取到相同的值 3，因为只有一个静态变量。在介绍了“类”概念的基础知识后，我们现在来讨论方法。


    ### 方法


    如前所述，变量允许我们按对象或按类存储信息。方法则允许我们定义可执行的操作，同样也是按对象或按类进行。我们将继续使用 `Chair` 类，并为其添加一个名为
    `move` 的简单方法，如代码清单 2-1 所示。


    ```

    class Chair {

    static int quality;

    int cost;

    void move(int x, int y) {

    // some code

    }

    }

    代码清单 2-1

    向类中添加方法的示例

    ```


    方法（在某些语言中称为函数或过程）是可重用的代码块。一个方法定义包含四个重要部分：


    *   **名称：** 我们的方法名称为“move”。通常，名称应是一个有意义的动作，因为方法定义了操作——即对象能做什么。按照惯例，方法名以小写字母开头，后续每个单词的首字母大写。


    *   **返回类型：** 在我们的示例中，返回类型是 `void`，这是一个特殊关键字，表示该方法不返回任何值。可以使用任何类型（例如 `int`）替代“void”，以表示该方法返回该类型的值。从方法中返回值是从方法中提取结果的一种常见方式。但在我们的示例中，没有预期需要返回的有意义结果，因此我们使用了“void”。


    *   **参数列表：** 参数列表显示了方法在被调用时期望接收的参数类型。在上述示例中，有两个 `int` 类型的预期参数：`x` 和 `y`。使用参数是开发者向方法传递信息的一种常见方式。


    *   **方法体：** 最后，方法体是位于该方法的花括号“{”和“}”之间的代码块。在我们的示例中，为了清晰说明，我们添加了“// some code”占位符来代替方法体。方法体本质上是在方法被调用时（即方法被调用时）将要执行的代码。


    与变量可以是静态的一样，方法也可以使用 `static` 关键字作为前缀，在这种情况下，它们属于类。假设我们希望有一个操作，能够确定通过调用 `new Chair()`
    生成的椅子对象的材质。假设在我们的抽象模型中，所有椅子都具有相同的材质（某种名为 `Material` 的类型），那么 `c1` 的材质和 `c2` 的材质之间就没有区别。如果是这种情况，我们可以简单地在
    `Chair` 类中添加一个名为 `getMaterial()` 的静态方法，如代码清单 2-2 所示。


    ```

    class Chair {

    static int quality;

    int cost;

    static Material getMaterial() {

    // some code

    }

    void move(int x, int y) {

    // some code

    }

    }

    代码清单 2-2

    静态方法的示例

    ```


    与静态变量的访问方式类似（即通过类访问），静态方法也以这种方式访问。因此，要调用新创建的方法，我们会编写 `Chair.getMaterial()`，而不是
    `c1.getMaterial()`。如果在后续开发中，我们决定每把椅子可以拥有自己的材质，那么我们可以从方法中移除 `static` 关键字。此时该方法变为非静态方法，我们需要像之前一样通过
    `c1.getMaterial()` 或 `c2.getMaterial()` 来调用它。


    有时，定义具有相似但不同类型特征的类会很有用。例如，考虑餐椅和办公椅。这两者都属于椅子类型，并且它们确实有一些共同的功能，但它们的全部功能集并不相同。一个简单的例子是，办公椅有轮子，而餐椅没有。如果我们为这两种椅子分别创建单独的类，例如：


    ```

    class DiningChair

    class OfficeChair

    ```'
- fmt: "# Inheritance in Java\n\nThen we would readily see that we would need to duplicate\
    \ quite a lot of code. Clearly, this is not an ideal solution. To avoid this,\
    \ Java, as a language, provides the inheritance feature. In simple terms, we can\
    \ define a \"supertype\" called `Chair` where we can keep all of the common functionalities\
    \ that a chair would have, and then we can define \"subtypes\" (or subclasses)\
    \ `DiningChair` and `OfficeChair` that \"extend\" from `Chair` and only contain\
    \ code that is relevant to them. Thus, with this approach, we can provide a nice\
    \ and clean solution to our little problem of duplicated code. To extend from\
    \ a class, one can write as follows:\n\n```\nclass DiningChair extends Chair {}\n\
    class OfficeChair extends Chair {}\n```\n\nIn some cases, it is possible for two\
    \ (or more) subtypes to share functionality (think methods) but in a way where\
    \ each subtype performs the functionality in its own way. For this concept, let\
    \ us pick a different, not related to chairs, example. A commonly used one in\
    \ many textbooks is the class `Animal` with the method `speak()`.\n\n```\nclass\
    \ Animal {\n    void speak() { }\n}\n```\n\nSuppose we have two subtypes of `Animal`:\
    \ `Cat` and `Dog`. Both types can speak, but in their own way. So while the functionality\
    \ remains the same, the way it is performed is different for each subtype of `Animal`.\n\
    \nTo implement this functionality in Java, we have the `@Override` annotation,\
    \ which can be added to a method to signify that it overrides the method with\
    \ the same name from the supertype class. Let us consider a concrete example in\
    \ Listing [2-3](#522865_1_En_2_Chapter.xhtml#PC13). The first thing to note is\
    \ the `@Override` annotation on the `speak()` method. It tells the developer that\
    \ `speak()` in the class `Cat` overrides the method `speak()` in the class `Animal`.\
    \ So when the user calls `speak()`, if the object on which the call was made is\
    \ of type `Cat`, then the `speak()` method that lives inside the `Cat` class will\
    \ be called and not the one from the class `Animal`. We will use \"overrides\"\
    \ in a few places when building FXGL games; hence, this concept will become more\
    \ important as we continue through this book. The reader will be reminded of its\
    \ usage when we will get there.\n\n```\nclass Dog extends Animal {\n    @Override\n\
    \    void speak() {\n        // bark\n    }\n}\n\nclass Cat extends Animal {\n\
    \    @Override\n    void speak() {\n        // meow\n    }\n}\n```\n\n**Listing\
    \ 2-3** An example of using the `@Override` annotation\n\nHaving recapped Java\
    \ basics, we will now consider how to add libraries to Java projects. Libraries\
    \ are reusable collections of pre-built code that are a common way to solve known\
    \ problems. They are an important tool in any developer's arsenal.\n\n## Adding\
    \ External Libraries\n\nIn this section, we will see how to use the IntelliJ IDE\
    \ and the built-in Maven support to add an external library to a Java project.\
    \ We will also download any prerequisite software. If you do not yet have an installation\
    \ of JDK 17 on your system, the general-availability JDK 17 release can be downloaded\
    \ from [`https://jdk.java.net/17/`](https://jdk.java.net/17/) for all major OS\
    \ platforms: Windows, macOS, and Linux. All you need to do is download the appropriate\
    \ `.zip` file and extract it into a location of choice.\n\nIn Java, there are\
    \ several ways to add an external library to your project. You can use Maven,\
    \ Gradle, or a stand-alone `.jar` file. We will consider a common approach using\
    \ Maven, which is a dependency management (or build) tool. Build tools are responsible\
    \ for downloading dependencies (such as JavaFX and FXGL) a software project has\
    \ so that the developer does not need to waste their time manually installing\
    \ these external libraries. Modern development tools, such as the IntelliJ editor\
    \ (available from [`www.jetbrains.com/idea/`](http://www.jetbrains.com/idea/)),\
    \ already come with Maven support. To simplify our task, we will use this support\
    \ and create a simple project with Maven.\n\n![](images/522865_1_En_2_Chapter/522865_1_En_2_Fig1_HTML.jpg)\n\
    \n**Figure 2-1** The File ➤ New ➤ Project menu in IntelliJ IDE 2021.2.2 (Community\
    \ Edition)\n\nOpen up IntelliJ and proceed with the menu options shown in Figure\
    \ [2-1](#522865_1_En_2_Chapter.xhtml#Fig1). Specifically, the options are File\
    \ ➤ New ➤ Project. This sequence will lead you to the following window in Figure\
    \ [2-2](#522865_1_En_2_Chapter.xhtml#Fig2). The first thing to ensure is that\
    \ your project SDK says 17 (or higher). In Figure [2-2](#522865_1_En_2_Chapter.xhtml#Fig2),\
    \ the project SDK (close to the top of the image) says version 17.0.1, which is\
    \ JDK 17. If you have a different version selected, then you can click on the\
    \ drop-down menu and select the appropriate version or click \"Add JDK\", and\
    \ then navigate to your JDK installation folder that you downloaded from the link\
    \ that was given previously. Now that you have a suitable JDK selected, we will\
    \ select the Maven project on the left-hand side (see Figure [2-2](#522865_1_En_2_Chapter.xhtml#Fig2))\
    \ and then click Next. In the next window, we can give the name to our project,\
    \ such as `JavaFXApp` (or `BasicFXGLGame`) and choose the directory in which the\
    \ source code will be stored.\n\n![](images/522865_1_En_2_Chapter/522865_1_En_2_Fig2_HTML.png)\n\
    \n**Figure 2-2** The New Project wizard window in IntelliJ IDE\n\nFigure [2-3](#522865_1_En_2_Chapter.xhtml#Fig3)\
    \ shows how the Maven project details can be modified. Once you have picked the\
    \ name for the project, you can leave the other bits unchanged from the default.\
    \ Click Finish. IntelliJ should now produce a project with the view that looks\
    \ similar to Figure [2-4](#522865_1_En_2_Chapter.xhtml#Fig4), but without the\
    \ FXGL dependency. The XML file that you can see on the right is called the Project\
    \ Object Model file, or `pom.xml` for short. This file contains the information\
    \ necessary to build the project. More advanced `pom` files may also contain extra\
    \ details related to how to manage project resources, test produced builds, generate\
    \ project documentation, and even deploy the resulting artifacts.\n\n![](images/522865_1_En_2_Chapter/522865_1_En_2_Fig4_HTML.png)\n\
    \n**Figure 2-4** The Maven project with the generated Project Object Model (`pom.xml`)\
    \ and an extra FXGL dependency\n\n![](images/522865_1_En_2_Chapter/522865_1_En_2_Fig3_HTML.jpg)\n\
    \n**Figure 2-3** The New Maven Project window in IntelliJ\n\nWe will now add the\
    \ FXGL dependency (which includes JavaFX) to the project by adding a new \"dependency\"\
    \ item inside the `pom.xml` file. A dependency has three parts to it: group ID,\
    \ artifact name, and version. These details are given in Figure [2-4](#522865_1_En_2_Chapter.xhtml#Fig4)\
    \ and Listing [2-4](#522865_1_En_2_Chapter.xhtml#PC14).\n\nOnce you have added\
    \ the dependency as shown in Figure [2-4](#522865_1_En_2_Chapter.xhtml#Fig4),\
    \ click the \"refresh\" icon in the top-right corner of IntelliJ IDE and the FXGL\
    \ dependency will be automatically downloaded and available for use.\n\n```\n\
    <dependency>\n    <groupId>com.github.almasb</groupId>\n    <artifactId>fxgl</artifactId>\n\
    </dependency>\n```\n\n**Listing 2-4** Adding the FXGL dependency inside the XML\
    \ file\n\nThis step completes the addition of external libraries to Java projects\
    \ using IntelliJ and Maven. We will now proceed with building some sample applications\
    \ using JavaFX and FXGL."
