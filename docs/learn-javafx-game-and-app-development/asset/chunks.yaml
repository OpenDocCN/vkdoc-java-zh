    An organizational chart. Java F X A P I is classified into direct 3 D, open G
    L, open G L E S. Direct 3 D is used in windows. open G L is used in Mac O S and
    Linux. open G L E S is used in Android, I O S, embedded.


    Figure 6-4


    Different JavaFX rendering back ends


    We have now completed the overview of the FXGL rendering pipeline and move on
