  raw: '### Requirement 3: Adding Input


    Requirement 3 states that we should be able to control the player entity using
    the keyboard. We will now proceed with user input. In FXGL, typically all of the
    input-related code is placed inside the `initInput()` method. The code in Listing
    [2-10](#522865_1_En_2_Chapter.xhtml#PC24) shows how to add an input action. Most
    of the input in FXGL is handled in this format. The developer would specify an
    action (some code to be run) and then bind it to a trigger (a mouse button, a
    key press, or some other way to provide input, such as a controller).


    ```

    @Override

    protected void initInput() {

    FXGL.onKey(KeyCode.D, () -> {

    player.translateX(5); // move right 5 pixels

    });

    }

    Listing 2-10

    The initInput() method allows binding user input to in-game actions

    ```


    Let us go through Listing [2-10](#522865_1_En_2_Chapter.xhtml#PC24) line by line.
    By calling the `onKey()` method from FXGL, we are effectively saying “while a
    key is being pressed, perform an action.” In this case, the key is `KeyCode.D`.
    Again, if you have used JavaFX before, then you will know that these are exactly
    the same key codes used in standard event handlers. As you have noticed, to use
    most of the FXGL functionality, all you need to do is call `FXGL.***`, and your
    IDE will show all possible functions with autocomplete.


    Recall from the requirements that the action we wish to preform is to move the
    player. So when D is pressed, we want to move the player to the right. We call
    `player.translateX(5)`, which moves the entity’s X coordinate by 5 pixels. Note
    that “translate” is a terminology used in computer graphics (and JavaFX) and means
    move. You will note that the FXGL API is quite concise. This concise API is commonly
    called DSL – domain-specific language in the context of FXGL. This can be shortened
    even further if we use static imports. You can statically import FXGL calls by
    adding the following import line:


    ```

    import static com.almasb.fxgl.dsl.FXGL.*;

    ```


    Now that we are familiar with input handling for one key, the rest of the code
    should be straightforward and is given in Listing [2-11](#522865_1_En_2_Chapter.xhtml#PC26).


    ```

    @Override

    protected void initInput() {

    FXGL.onKey(KeyCode.D, () -> {

    player.translateX(5); // move right 5 pixels

    });

    FXGL.onKey(KeyCode.A, () -> {

    player.translateX(-5); // move left 5 pixels

    });

    FXGL.onKey(KeyCode.W, () -> {

    player.translateY(-5); // move up 5 pixels

    });

    FXGL.onKey(KeyCode.S, () -> {

    player.translateY(5); // move down 5 pixels

    });

    }

    Listing 2-11

    The initInput() method implementation for all four directions

    ```


    With the `initInput()` method populated, requirement 3 is now complete.


    ### Requirement 4: Adding UI


    The next requirement is the UI, which we handle in the `initUI()` method, given
    in Listing [2-12](#522865_1_En_2_Chapter.xhtml#PC27).


    ```

    @Override

    protected void initUI() {

    Text textPixels = new Text();

    textPixels.setTranslateX(50); // x = 50

    textPixels.setTranslateY(100); // y = 100

    FXGL.getGameScene().addUINode(textPixels); // add to the screen

    }

    Listing 2-12

    The initUI() method allows adding user interface objects on the screen

    ```


    In Listing [2-12](#522865_1_En_2_Chapter.xhtml#PC27), the Text class is used directly
    from JavaFX. In fact, for most UI objects, we simply use the JavaFX controls,
    since there is no need to reinvent the wheel. You should note that when we added
    the entity to the world, the game scene picked up the fact the entity had a view
    associated with it. Hence, the game scene magically added the entity to the scene
    graph. With UI objects, we are responsible for their additions to the scene graph,
    and we do exactly that by calling `getGameScene().addUINode()`. We will handle
    the UI updates, such as the number of pixels moved by the player a bit later on.


    ### Requirement 5: Updating UI


    In order to complete the last requirement, we are going to use a game variable.
    In FXGL, a game variable can be accessed and modified from any part of the game.
    In a sense, it is a global variable with the scope being tied to the FXGL game
    instance. In addition, such variables can be bound to (like with JavaFX properties).
    We start by creating such a variable:


    ```

    @Override

    protected void initGameVars(Map vars) {

    vars.put("pixelsMoved", 0);

    }

    ```


    The preceding code creates a game variable named “pixelsMoved” with the initial
    value of 0\. Note that FXGL will automatically infer the type of the variable
    based on the initial value, which in this case is an integer. For example, if
    we used 0.0, then the type of the game variable would be a double. Next, we need
    to update the variable when the player moves. We can do this in the input handling
    section of the code.


    ```

    FXGL.onKey(KeyCode.D, () -> {

    player.translateX(5); // move right 5 pixels

    FXGL.inc("pixelsMoved", +5);

    });

    ```


    You can do the same with the rest of the movement actions, that is, left, up,
    and down. The last step is to bind our UI text object we created earlier to the
    variable `pixelsMoved`. Ultimately, this allows FXGL to automatically update the
    UI based on the `pixelsMoved` value so that we don’t need to update the UI manually.
    In `initUI()`, once we have created the `textPixels` object, we can do the following:


    ```

    textPixels.textProperty().bind(FXGL.getWorldProperties().intProperty("pixelsMoved").asString());

    ```


    To expand on this, we are taking the text property of the `textPixels` UI object
    and binding it to the `pixelsMoved` value, which first needs to be converted to
    a String since it is an integer. This is the last change we are making to this
    example, and you now should have a simple FXGL game.


    There are many areas that we have not covered yet, for example, asset loading,
    physics, AI, and graphics – these and other features will be discussed as we continue
    our journey through this book.


    ## Summary


    In this chapter, we covered requisite concepts that are used throughout this book.
    We recapped Java basics with respect to classes and methods. We saw how one could
    create a class to model an abstract or a real-world object and how methods can
    provide functionalities to these classes. Next, we used IntelliJ to add the JavaFX
    (via FXGL) external library via the built-in Maven support, which simplifies the
    process. Subsequently, we used the JavaFX library to create a simple application
    with three UI controls: text output, text input, and button. Finally, using the
    FXGL library as an external dependency, we implemented a simple game demo. The
    demo has shown us how to use input and create entities, which are game objects,
    and how to interact with JavaFX UI controls. In the next chapter, we will learn
    more about entities and how they allow us to create complex game worlds.


    # 3. Entity-Component Case Study: Develop Pong


    We start our game development journey in this chapter, where we develop a clone
    of the Pong arcade game. We will start building your knowledge about the game
    development process with FXGL. Through this process, we will learn about


    *   Entities and how they represent game objects


    *   Components and how they add data and behavior to entities


    *   Game world and how to perform queries to access specific entities in the world


    Game objects form the fundamental concepts of any game. The bigger the game, the
    more robust implementation of game objects should be in order to scale properly.
    Developers with extensive background in object-oriented programming may fall into
    a trap where inheritance ends up being intertwined with game object functionality,
    leading to a less scalable software architecture. Inheritance favors vertical
    hierarchy and is extremely beneficial in a range of use cases, including small
    to medium-sized games. However, the Entity-Component model, which tends to favor
    horizontal hierarchy, offers its own benefits and can be more suitable in large
    game projects. The benefits of this model will become clearer as you continue
    reading through this chapter. We will begin by defining what an entity is.'
