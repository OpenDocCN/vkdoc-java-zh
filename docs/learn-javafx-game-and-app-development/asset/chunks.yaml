    ### 需求 3：添加输入


    需求 3 指出，我们应该能够使用键盘控制玩家实体。现在我们将着手处理用户输入。在 FXGL 中，通常所有与输入相关的代码都放在 `initInput()`
    方法中。清单 2-10 中的代码展示了如何添加一个输入动作。FXGL 中的大部分输入都以此格式处理。开发者需要指定一个动作（要运行的代码），然后将其绑定到一个触发器（鼠标按钮、按键或某种其他输入方式，例如控制器）。


    ```

    @Override

    protected void initInput() {

    FXGL.onKey(KeyCode.D, () -> {

    player.translateX(5); // 向右移动 5 像素

    });

    }

    清单 2-10

    initInput() 方法允许将用户输入绑定到游戏内动作

    ```


    让我们逐行分析清单 2-10。通过调用 FXGL 的 `onKey()` 方法，我们实际上是在说“当某个键被按下时，执行一个动作”。在这个例子中，按键是 `KeyCode.D`。同样，如果你之前使用过
    JavaFX，你就会知道这些与标准事件处理器中使用的键码完全相同。正如你所注意到的，要使用 FXGL 的大部分功能，你只需调用 `FXGL.***`，你的
    IDE 就会通过自动补全显示所有可能的函数。


    回顾需求，我们希望执行的动作是移动玩家。所以当按下 D 键时，我们希望将玩家向右移动。我们调用 `player.translateX(5)`，这会将实体的
    X 坐标移动 5 像素。请注意，“translate”是计算机图形学（以及 JavaFX）中使用的术语，意思是移动。你会注意到 FXGL 的 API 非常简洁。这种简洁的
    API 在 FXGL 的上下文中通常被称为 DSL（领域特定语言）。如果我们使用静态导入，这甚至可以进一步简化。你可以通过添加以下导入行来静态导入 FXGL
    调用：


    ```

    import static com.almasb.fxgl.dsl.FXGL.*;

    ```


    既然我们已经熟悉了单个按键的输入处理，那么剩下的代码就很简单了，如清单 2-11 所示。


    ```

    @Override

    protected void initInput() {

    FXGL.onKey(KeyCode.D, () -> {

    player.translateX(5); // 向右移动 5 像素

    });

    FXGL.onKey(KeyCode.A, () -> {

    player.translateX(-5); // 向左移动 5 像素

    });

    FXGL.onKey(KeyCode.W, () -> {

    player.translateY(-5); // 向上移动 5 像素

    });

    FXGL.onKey(KeyCode.S, () -> {

    player.translateY(5); // 向下移动 5 像素

    });

    }

    清单 2-11

    所有四个方向的 initInput() 方法实现

    ```


    填充了 `initInput()` 方法后，需求 3 就完成了。


    ### 需求 4：添加 UI


    下一个需求是 UI，我们在 `initUI()` 方法中处理，如清单 2-12 所示。


    ```

    @Override

    protected void initUI() {

    Text textPixels = new Text();

    textPixels.setTranslateX(50); // x = 50

    textPixels.setTranslateY(100); // y = 100

    FXGL.getGameScene().addUINode(textPixels); // 添加到屏幕

    }

    清单 2-12

    initUI() 方法允许在屏幕上添加用户界面对象

    ```


    在清单 2-12 中，`Text` 类是直接来自 JavaFX 的。实际上，对于大多数 UI 对象，我们直接使用 JavaFX 控件，因为没必要重复造轮子。你应该注意到，当我们向世界添加实体时，游戏场景会自动识别该实体具有关联的视图。因此，游戏场景会神奇地将该实体添加到场景图中。对于
    UI 对象，我们需要负责将它们添加到场景图中，而调用 `getGameScene().addUINode()` 正是为了完成这个操作。稍后我们将处理 UI
    更新，例如玩家移动的像素数。


    ### 需求 5：更新 UI


    为了完成最后一个需求，我们将使用一个游戏变量。在 FXGL 中，可以从游戏的任何部分访问和修改游戏变量。从某种意义上说，它是一个全局变量，其作用域绑定到 FXGL
    游戏实例。此外，这些变量可以像 JavaFX 属性一样进行绑定。我们首先创建这样一个变量：


    ```

    @Override

    protected void initGameVars(Map vars) {

    vars.put("pixelsMoved", 0);

    }

    ```


    上述代码创建了一个名为“pixelsMoved”的游戏变量，初始值为 0。请注意，FXGL 会根据初始值自动推断变量的类型，在本例中为整数。例如，如果我们使用
    0.0，那么游戏变量的类型将是双精度浮点数。接下来，我们需要在玩家移动时更新该变量。我们可以在代码的输入处理部分执行此操作。


    ```

    FXGL.onKey(KeyCode.D, () -> {

    player.translateX(5); // 向右移动 5 像素

    FXGL.inc("pixelsMoved", +5);

    });

    ```


    你可以对剩下的移动动作（即向左、向上和向下）执行相同的操作。最后一步是将我们之前创建的 UI 文本对象绑定到变量 `pixelsMoved`。最终，这允许
    FXGL 根据 `pixelsMoved` 的值自动更新 UI，这样我们就不需要手动更新 UI 了。在 `initUI()` 中，一旦我们创建了 `textPixels`
    对象，就可以执行以下操作：


    ```

    textPixels.textProperty().bind(FXGL.getWorldProperties().intProperty("pixelsMoved").asString());

    ```


    进一步解释一下，我们获取 `textPixels` UI 对象的文本属性，并将其绑定到 `pixelsMoved` 值，由于该值是整数，需要先将其转换为字符串。这是我们对这个示例所做的最后一项更改，现在你应该拥有一个简单的
    FXGL 游戏了。


    我们还有很多领域没有涉及，例如资源加载、物理、AI 和图形——这些以及其他特性将在我们继续阅读本书的过程中讨论。


    ## 本章小结


    在本章中，我们介绍了本书中使用的必要概念。我们回顾了关于类和方法的 Java 基础知识。我们了解了如何创建一个类来模拟抽象或现实世界中的对象，以及方法如何为这些类提供功能。接下来，我们使用
    IntelliJ 通过内置的 Maven 支持添加了 JavaFX（通过 FXGL）外部库，这简化了流程。随后，我们使用 JavaFX 库创建了一个包含三个
    UI 控件（文本输出、文本输入和按钮）的简单应用程序。最后，我们使用 FXGL 库作为外部依赖，实现了一个简单的游戏演示。该演示向我们展示了如何使用输入、创建实体（即游戏对象），以及如何与
    JavaFX UI 控件交互。在下一章中，我们将进一步了解实体以及它们如何帮助我们创建复杂的游戏世界。


    # 3. 实体-组件案例研究：开发 Pong 游戏


    在本章中，我们将开始游戏开发之旅，开发一个 Pong 街机游戏的克隆版。我们将开始构建你关于使用 FXGL 进行游戏开发过程的知识。通过这个过程，我们将学习：


    *   实体及其如何表示游戏对象

    *   组件及其如何向实体添加数据和行为

    *   游戏世界以及如何执行查询以访问世界中的特定实体


    游戏对象构成了任何游戏的基本概念。游戏越大，游戏对象的实现就应该越健壮，以便能够适当地扩展。具有深厚面向对象编程背景的开发者可能会陷入一个陷阱，即继承最终与游戏对象功能交织在一起，导致软件架构的可扩展性降低。继承倾向于垂直层次结构，在一系列用例中（包括中小型游戏）非常有益。然而，实体-组件模型倾向于水平层次结构，它提供了自身的优势，并且可能更适合大型游戏项目。随着你继续阅读本章，这种模型的好处将变得更加清晰。我们将从定义什么是实体开始。

