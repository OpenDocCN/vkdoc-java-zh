- fmt: "# Implementation Phases\n\n## Early Stages\n\nAs for implementation, during\
    \ the first several versions, you just play around with the system and the code.\
    \ The goal here is to identify what works and what does not both in terms of API\
    \ and functionality. It is fine to write throw-away code to prototype quickly\
    \ at this point to test out functionality. However, developers should be mindful\
    \ that the code will be thrown away, so no major decisions should be made to avoid\
    \ code rigidity.\n\nThe early stages of development are also good for establishing\
    \ technical limitations of the chosen software (and hardware) stack. For example,\
    \ one limitation of the JavaFX rendering pipeline is that it does not support\
    \ external shaders (GPU programs that can change how something is drawn). This\
    \ limitation restricts how creative developers can get when designing the visuals\
    \ of their game.\n\n## Late Stages\n\nIn the late stages of development, once\
    \ you get to know the API and how users utilize the system, you can start focusing\
    \ on those core bits and build the rest of the functionality around it. It is\
    \ also good to start writing your tests for the core bits so you know what they\
    \ are supposed to do. In particular, you can start putting together a formal specification\
    \ for your engine, and via tests, you can show that it actually does that. It\
    \ is important to specify exactly what the engine is trying to achieve to avoid\
    \ any distractions and features that do not need implementation. Ultimately, this\
    \ saves time and improves the quality of the core items.\n\nIt should be noted\
    \ that at this (late) stage, the development should be steady but slow. Growing\
    \ the code too fast may lead to poor design decisions, ultimately making the code\
    \ less extensible. Engine users should be consulted frequently to ensure that\
    \ the functionality being implemented is actually being used. Involving engine\
    \ users in the development process is a good way to identify the core subsystems\
    \ that are important to them.\n\n## Architectural Patterns\n\nThere are various\
    \ low-level and high-level tips and tricks learned during the development. However,\
    \ one that stands out is the use of an event bus, which can help decouple various\
    \ engine systems. Suppose we have two so-called systems: achievements and audio.\
    \ To ensure relatively easy code maintenance, we would like to ensure that one\
    \ system does not have a dependency on the other (i.e., the achievements system\
    \ does not call any methods from the audio system and vice versa). If there are\
    \ no dependencies, then we can readily make a change in one system while not affecting\
    \ the code base of the other system. Now, suppose our problem is playing a sound\
    \ effect (a function in the audio system) every time an achievement has been unlocked\
    \ (a function in the achievements system).\n\nTo address the preceding problem\
    \ while ensuring there are no dependencies between the two systems, we can use\
    \ an event bus. Somewhere in our code base there is an overarching system, which\
    \ we call the engine, that maintains other systems. In the engine system, we can\
    \ have the following pseudocode:\n\n```\nonAchievement(eventData) {\n    audioSystem.playSound(\
    \ ... );\n}\n// for conciseness we are passing a function as an object\neventBus.addEventHandler(EventType.ACHIEVEMENT,\
    \ onAchievement)\n```\n\nWhen there is a new unlocked achievement, the achievements\
    \ system fires an event of type `EventType.ACHIEVEMENT`. The event is caught by\
    \ the event bus and is passed to the engine system, which, in turn, uses the audio\
    \ system to play a sound. Using the described approach, changes in the achievements\
    \ and the audio systems do not affect one another, though may affect (i.e., result\
    \ in a public API change) the engine system. The utilization of the event bus\
    \ in this way was one of the significant architectural patterns that were learned\
    \ during the development and helped build FXGL’s robust infrastructure.\n\n# Future\
    \ Projects and Extra Resources\n\nWe have seen a number of different projects\
    \ that can be developed with FXGL. In this section, we explore what further ideas\
    \ can be turned into demonstrable prototypes. These ideas include:\n\n- Hand tracking\
    \ visualization: [`https://github.com/AlmasB/HandTrackingFXGL`](https://github.com/AlmasB/HandTrackingFXGL)\n\
    - Open-world role-playing game (RPG): [`https://github.com/AlmasB/zephyria`](https://github.com/AlmasB/zephyria)\n\
    - High-performance rendering: [`https://github.com/AlmasB/FXGL-FastRender`](https://github.com/AlmasB/FXGL-FastRender)\n\
    \nWe will now briefly consider each project in the preceding order.\n\n## Hand\
    \ Tracking Visualization\n\nTo develop a hand tracking visualization tool, we\
    \ first need to obtain the data. The MediaPipe library provides access to the\
    \ hand tracking data processed by a Machine Learning application. There are several\
    \ ways to make use of the library, with the easiest approach for this case being\
    \ the JavaScript version, which is only a few lines of code. The key process is\
    \ to capture the data from JavaScript and send it to our FXGL application, which\
    \ can be done using web sockets. Luckily, there are libraries available for web\
    \ sockets, meaning we only need to properly set them up and we can stream the\
    \ hand tracking data from the MediaPipe library into our tool. An example of what\
    \ such a visualization tool might produce is in Figure 8-1. You are welcome to\
    \ explore the repository and turn this demo into a usable piece of software.\n\
    \n![A program output depicts a number of colored dots numbered from 0 to 20. The\
    \ dots 0, 5, 9, 13, and 17 are connected by a deep colored line, which results\
    \ in a cone shaped structure, and contains a football image in it. The text on\
    \ the top left reads, current gesture colon, no underscore hand.](images/522865_1_En_8_Chapter/522865_1_En_8_Fig1_HTML.jpg)\n\
    \n**Figure 8-1** — A sketch for an FXGL hand tracking data visualization tool\n\
    \n## Open-World RPG (Zephyria)\n\nZephyria is an open-world RPG game written completely\
    \ in the Kotlin programming language. The fact that it uses a language other than\
    \ Java is significant, as it demonstrates that Kotlin users can also access all\
    \ of FXGL’s capabilities. The game features large open-world maps covering up\
    \ to 250000 tiles, where each tile is a square with 32 pixels in size. The map\
    \ is loaded from a Tiled level file and is traversed using the A* algorithm we\
    \ covered in Chapter 5. A screenshot from the game is in Figure 8-2.\n\n![A screenshot\
    \ depicts a scene from the game Zephyria R P G.](images/522865_1_En_8_Chapter/522865_1_En_8_Fig2_HTML.jpg)\n\
    \n**Figure 8-2** — An example map in Zephyria RPG\n\n## High-Performance Rendering\n\
    \nIn Chapter 6, we discussed the immediate and retained modes of rendering and\
    \ how the immediate mode can improve performance. It is possible to yield further\
    \ performance gains if we combine the immediate mode with GPU parallel computing.\
    \ Effectively, the idea is that both the logic and rendering are configured in\
    \ such a way that each computation can be run in parallel. If that precondition\
    \ is true and the computation units are straightforward enough to translate to\
    \ GPU commands, then running such an algorithm on GPU is likely to significantly\
    \ boost performance. For example, Figure 8-3 shows a particle swarm rendered with\
    \ FXGL that includes 10 million particles. The reader is encouraged to browse\
    \ the repository link mentioned previously to see how various rendering approaches\
    \ can either improve or hinder performance.\n\n![A program output depicts a particle\
    \ swarm, that has a huge number of pale colored particles.](images/522865_1_En_8_Chapter/522865_1_En_8_Fig3_HTML.jpg)\n\
    \n**Figure 8-3** — A particle swarm example using FXGL\n\nWe now provide useful\
    \ resources for further research and development."
  raw: 'As for implementation, during the first several versions, you just play around
    with the system and the code. The goal here is to identify what works and what
    does not both in terms of API and functionality. It is fine to write throw-away
    code to prototype quickly at this point to test out functionality. However, developers
    should be mindful that the code will be thrown away, so no major decisions should
    be made to avoid code rigidity.


    The early stages of development are also good for establishing technical limitations
    of the chosen software (and hardware) stack. For example, one limitation of the
    JavaFX rendering pipeline is that it does not support external shaders (GPU programs
    that can change how something is drawn). This limitation restricts how creative
    developers can get when designing the visuals of their game.


    In the late stages of development, once you get to know the API and how users
    utilize the system, you can start focusing on those core bits and build the rest
    of the functionality around it. It is also good to start writing your tests for
    the core bits so you know what they are supposed to do. In particular, you can
    start putting together a formal specification for your engine, and via tests,
    you can show that it actually does that. It is important to specify exactly what
    the engine is trying to achieve to avoid any distractions and features that do
    not need implementation. Ultimately, this saves time and improves the quality
    of the core items.


    It should be noted that at this (late) stage, the development should be steady
    but slow. Growing the code too fast may lead to poor design decisions, ultimately
    making the code less extensible. Engine users should be consulted frequently to
    ensure that the functionality being implemented is actually being used. Involving
    engine users in the development process is a good way to identify the core subsystems
    that are important to them.


    There are various low-level and high-level tips and tricks learned during the
    development. However, one that stands out is the use of an event bus, which can
    help decouple various engine systems. Suppose we have two so-called systems: achievements
    and audio. To ensure relatively easy code maintenance, we would like to ensure
    that one system does not have a dependency on the other (i.e., the achievements
    system does not call any methods from the audio system and vice versa). If there
    are no dependencies, then we can readily make a change in one system while not
    affecting the code base of the other system. Now, suppose our problem is playing
    a sound effect (a function in the audio system) every time an achievement has
    been unlocked (a function in the achievements system).


    To address the preceding problem while ensuring there are no dependencies between
    the two systems, we can use an event bus. Somewhere in our code base there is
    an overarching system, which we call the engine, that maintains other systems.
    In the engine system, we can have the following pseudocode:


    ```

    onAchievement(eventData) {

    audioSystem.playSound( ... );

    }

    // for conciseness we are passing a function as an object

    eventBus.addEventHandler(EventType.ACHIEVEMENT, onAchievement)

    ```


    When there is a new unlocked achievement, the achievements system fires an event
    of type `EventType.ACHIEVEMENT`. The event is caught by the event bus and is passed
    to the engine system, which, in turn, uses the audio system to play a sound. Using
    the described approach, changes in the achievements and the audio systems do not
    affect one another, though may affect (i.e., result in a public API change) the
    engine system. The utilization of the event bus in this way was one of the significant
    architectural patterns that were learned during the development and helped build
    FXGL’s robust infrastructure.


    ## Future Projects and Extra Resources


    We have seen a number of different projects that can be developed with FXGL. In
    this section, we explore what further ideas can be turned into demonstrable prototypes.
    These ideas include


    *   Hand tracking visualization: [`https://github.com/AlmasB/HandTrackingFXGL`](https://github.com/AlmasB/HandTrackingFXGL),


    *   Open-world role-playing game (RPG): [`https://github.com/AlmasB/zephyria`](https://github.com/AlmasB/zephyria),
    and


    *   High-performance rendering: [`https://github.com/AlmasB/FXGL-FastRender`](https://github.com/AlmasB/FXGL-FastRender).


    We will now briefly consider each project in the preceding order.


    To develop a hand tracking visualization tool, we first need to obtain the data.
    The MediaPipe library provides access to the hand tracking data processed by a
    Machine Learning application. There are several ways to make use of the library,
    with the easiest approach for this case being the JavaScript version, which is
    only a few lines of code. The key process is to capture the data from JavaScript
    and send it to our FXGL application, which can be done using web sockets. Luckily,
    there are libraries available for web sockets, meaning we only need to properly
    set them up and we can stream the hand tracking data from the MediaPipe library
    into our tool. An example of what such a visualization tool might produce is in
    Figure [8-1](#522865_1_En_8_Chapter.xhtml#Fig1). You are welcome to explore the
    repository and turn this demo into a usable piece of software.


    ![](images/522865_1_En_8_Chapter/522865_1_En_8_Fig1_HTML.jpg)


    A program output depicts a number of colored dots numbered from 0 to 20\. The
    dots 0, 5, 9, 13, and 17 are connected by a deep colored line, which results in
    a cone shaped structure, and contains a football image in it. The text on the
    top left reads, current gesture colon, no underscore hand.


    Figure 8-1


    A sketch for an FXGL hand tracking data visualization tool


    Zephyria is an open-world RPG game written completely in the Kotlin programming
    language. The fact that it uses a language other than Java is significant, as
    it demonstrates that Kotlin users can also access all of FXGL’s capabilities.
    The game features large open-world maps covering up to 250000 tiles, where each
    tile is a square with 32 pixels in size. The map is loaded from a Tiled level
    file and is traversed using the A* algorithm we covered in Chapter [5](#522865_1_En_5_Chapter.xhtml).
    A screenshot from the game is in Figure [8-2](#522865_1_En_8_Chapter.xhtml#Fig2).


    ![](images/522865_1_En_8_Chapter/522865_1_En_8_Fig2_HTML.jpg)


    A screenshot depicts a scene from the game Zephyria R P G.


    Figure 8-2


    An example map in Zephyria RPG


    In Chapter [6](#522865_1_En_6_Chapter.xhtml), we discussed the immediate and retained
    modes of rendering and how the immediate mode can improve performance. It is possible
    to yield further performance gains if we combine the immediate mode with GPU parallel
    computing. Effectively, the idea is that both the logic and rendering are configured
    in such a way that each computation can be run in parallel. If that precondition
    is true and the computation units are straightforward enough to translate to GPU
    commands, then running such an algorithm on GPU is likely to significantly boost
    performance. For example, Figure [8-3](#522865_1_En_8_Chapter.xhtml#Fig3) shows
    a particle swarm rendered with FXGL that includes 10 million particles. The reader
    is encouraged to browse the repository link mentioned previously to see how various
    rendering approaches can either improve or hinder performance.


    ![](images/522865_1_En_8_Chapter/522865_1_En_8_Fig3_HTML.jpg)


    A program output depicts a particle swarm, that has a huge number of pale colored
    particles.


    Figure 8-3


    A particle swarm example using FXGL


    We now provide useful resources for further research and development:'
  trans: '

    在实现方面，前几个版本中，你只需对系统和代码进行探索。此阶段的目标是确定 API 和功能方面哪些有效、哪些无效。此时，为了快速测试功能，编写一次性代码进行原型设计是可以的。然而，开发者应意识到这些代码将被丢弃，因此不应做出任何重大决策，以避免代码僵化。


    开发的早期阶段也适合确定所选软件（和硬件）栈的技术限制。例如，JavaFX 渲染管线的一个限制是它不支持外部着色器（可以改变绘制方式的 GPU 程序）。这一限制制约了开发者在设计游戏视觉效果时的创意发挥空间。


    在开发的后期阶段，一旦你熟悉了 API 并了解用户如何使用系统，就可以开始专注于那些核心部分，并围绕它们构建其余功能。此时也开始为核心部分编写测试，以便明确它们应实现的功能。具体来说，你可以开始为引擎制定正式的规范，并通过测试证明它确实达到了规范要求。精确指定引擎试图实现的目标非常重要，这可以避免分心以及实现不必要的功能。最终，这能节省时间并提高核心项目的质量。


    需要注意的是，在这个（后期）阶段，开发应保持稳定但缓慢。代码增长过快可能导致糟糕的设计决策，最终降低代码的可扩展性。应频繁咨询引擎用户，确保正在实现的功能确实被使用。让引擎用户参与开发过程是识别对他们重要的核心子系统的好方法。


    开发过程中会学到各种底层和高层的技巧与窍门。然而，其中一个突出的方法是使用事件总线，它有助于解耦各种引擎系统。假设我们有两个所谓的系统：成就系统和音频系统。为了确保代码维护相对容易，我们希望一个系统不依赖于另一个系统（即，成就系统不调用音频系统的任何方法，反之亦然）。如果没有依赖关系，那么我们可以轻松地修改一个系统，而不会影响另一个系统的代码库。现在，假设我们的问题是每次解锁成就（成就系统中的一个功能）时播放音效（音频系统中的一个功能）。


    为了解决上述问题，同时确保两个系统之间没有依赖关系，我们可以使用事件总线。在代码库的某处，有一个总揽全局的系统，我们称之为引擎，它维护着其他系统。在引擎系统中，我们可以有以下伪代码：


    ```

    onAchievement(eventData) {

    audioSystem.playSound( ... );

    }

    // 为简洁起见，我们将一个函数作为对象传递

    eventBus.addEventHandler(EventType.ACHIEVEMENT, onAchievement)

    ```


    当有新的成就解锁时，成就系统会触发一个类型为 `EventType.ACHIEVEMENT` 的事件。该事件被事件总线捕获并传递给引擎系统，引擎系统进而使用音频系统播放声音。使用所描述的方法，成就系统和音频系统的更改不会相互影响，但可能会影响（即导致公共
    API 更改）引擎系统。以这种方式使用事件总线是在开发过程中学到的重要架构模式之一，它帮助构建了 FXGL 的健壮基础设施。


    ## 未来项目与额外资源


    我们已经看到了许多可以用 FXGL 开发的不同项目。在本节中，我们将探讨哪些进一步的想法可以转化为可演示的原型。这些想法包括：


    *   手部追踪可视化：[`https://github.com/AlmasB/HandTrackingFXGL`](https://github.com/AlmasB/HandTrackingFXGL)，


    *   开放世界角色扮演游戏 (RPG)：[`https://github.com/AlmasB/zephyria`](https://github.com/AlmasB/zephyria)，以及


    *   高性能渲染：[`https://github.com/AlmasB/FXGL-FastRender`](https://github.com/AlmasB/FXGL-FastRender)。


    我们现在将按照上述顺序简要考虑每个项目。


    要开发手部追踪可视化工具，我们首先需要获取数据。MediaPipe 库提供了对由机器学习应用程序处理的手部追踪数据的访问。有多种方法可以使用该库，对于这种情况，最简单的方法是使用
    JavaScript 版本，它只需要几行代码。关键过程是从 JavaScript 捕获数据并将其发送到我们的 FXGL 应用程序，这可以使用 WebSocket
    完成。幸运的是，有可用的 WebSocket 库，这意味着我们只需要正确设置它们，就可以将手部追踪数据从 MediaPipe 库流式传输到我们的工具中。此类可视化工具可能产生的示例如图
    8-1 所示。欢迎您探索该仓库，并将此演示转化为可用的软件。


    ![](img/522865_1_En_8_Fig1_HTML.jpg)


    程序输出描绘了许多从 0 到 20 编号的彩色点。点 0、5、9、13 和 17 由一条深色线连接，形成一个锥形结构，其中包含一个足球图像。左上角的文字显示：当前手势：无手。


    图 8-1


    FXGL 手部追踪数据可视化工具草图


    Zephyria 是一款完全用 Kotlin 编程语言编写的开放世界 RPG 游戏。它使用 Java 以外的语言这一事实意义重大，因为它表明 Kotlin
    用户也可以访问 FXGL 的所有功能。该游戏拥有覆盖多达 250000 个图块的大型开放世界地图，每个图块是一个 32 像素大小的正方形。地图从 Tiled
    关卡文件加载，并使用我们在第 5 章中介绍的 A* 算法进行遍历。游戏截图如图 8-2 所示。


    ![](img/522865_1_En_8_Fig2_HTML.jpg)


    截图描绘了游戏 Zephyria RPG 中的一个场景。


    图 8-2


    Zephyria RPG 中的示例地图


    在第 6 章中，我们讨论了即时模式和保留模式渲染，以及即时模式如何提高性能。如果我们将即时模式与 GPU 并行计算相结合，则有可能获得进一步的性能提升。实际上，其理念是逻辑和渲染的配置方式使得每个计算都可以并行运行。如果该前提成立，并且计算单元足够简单以转换为
    GPU 指令，那么在 GPU 上运行此类算法很可能会显著提升性能。例如，图 8-3 显示了使用 FXGL 渲染的包含 1000 万个粒子的粒子群。鼓励读者浏览前面提到的仓库链接，了解不同的渲染方法如何提高或降低性能。


    ![](img/522865_1_En_8_Fig3_HTML.jpg)


    程序输出描绘了一个粒子群，其中有大量浅色粒子。


    图 8-3


    使用 FXGL 的粒子群示例


    我们现在提供用于进一步研究和开发的有用资源：

    '
- fmt: '*   FXGLGames: [`https://github.com/AlmasB/FXGLGames`](https://github.com/AlmasB/FXGLGames)
    – 这是一个预构建的`FXGL`模板和示例演示的集合，包括完整的游戏。欢迎为仍在开发中的游戏仓库做出贡献。

    *   在线资源: [`www.youtube.com/c/AlmasB0/videos`](http://www.youtube.com/c/AlmasB0/videos),
    [`https://github.com/AlmasB/FXGL/wiki`](https://github.com/AlmasB/FXGL/wiki) –
    这些资源会持续更新，以确保它们代表最新的`FXGL`版本。

    *   社区文章和游戏: [`https://github.com/AlmasB/FXGL#community`](https://github.com/AlmasB/FXGL%2523community)
    – 有一个稳步增长的`FXGL`用户社区，无论是初学者、学生、爱好者还是专业人士。社区已经撰写了许多文章来展示`FXGL`的各种功能，包括一些复杂的示例。


    最后，如果你感到不知所措，你可以随时加入`FXGL`讨论区：[`https://github.com/AlmasB/FXGL/discussions`](https://github.com/AlmasB/FXGL/discussions)，在那里你可以提出针对你具体用例的问题。


    ## 结语


    如果你已经读到这里，那么我想感谢你的坚持，并祝贺你完成了`FXGL 17`的学习之旅。我真诚地希望这本书能帮助你了解`JavaFX`和`FXGL`在游戏和应用程序开发方面的能力。虽然这本书只涵盖了冰山一角，但你现在应该有了一个坚实的基础，可以继续在上面构建，而前面提到的资源可以帮助你做到这一点。我祝愿你在未来的所有努力中一切顺利，并期待看到你的项目！'
