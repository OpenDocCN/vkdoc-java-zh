    if we add a node with a z-index of 2, then it will be drawn on top of the nodes
    with z-indices 0 and 1.


    The UI layer is where your HUD (heads-up display) and various UI elements are
    located, including the menus. It is commonly used to provide information about
    the game and player states. The view is fixed in the visible viewport, and its
    coordinate system is always within (0, 0) to (width, height). This means that
    while the player can move around freely in the world, the UI stays fixed in one
    place. Having fixed coordinates also simplifies designing and positioning UI elements.
    To add a node into the UI layer, you can call the following:


    ```

