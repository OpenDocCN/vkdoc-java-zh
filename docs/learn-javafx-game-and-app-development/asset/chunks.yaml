    the information necessary to build the project. More advanced pom files may also
    contain extra details related to how to manage project resources, test produced
    builds, generate project documentation, and even deploy the resulting artifacts.


    ![](images/522865_1_En_2_Chapter/522865_1_En_2_Fig4_HTML.png)


    A screenshot of a window, that has a menu bar, tools, and information to build
    a project. To the right side of the window, are the lines of code titled p o m
    dot x m l.


    Figure 2-4


    The Maven project with the generated Project Object Model (pom.xml) and an extra
    FXGL dependency


    ![](images/522865_1_En_2_Chapter/522865_1_En_2_Fig3_HTML.jpg)


    A screenshot of a window titled new project depicts 2 text boxes, that are labeled
    and filled as follows. 1\. Name: Basic F X G L game. 2. Location: tilde slash
    Almas underscore workspace slash java slash basic F X G L game.


    Figure 2-3


