    ### 构建球体组件


    在考虑了双方球拍的逻辑之后，让我们深入探讨球体实体的逻辑。下一个组件是 `BallComponent`，如代码清单 3-6 所示。


    ```

    import com.almasb.fxgl.entity.component.Component;

    import com.almasb.fxgl.physics.PhysicsComponent;

    import javafx.geometry.Point2D;

    import static com.almasb.fxgl.dsl.FXGL.*;

    import static java.lang.Math.*;

    public class BallComponent extends Component {

    private PhysicsComponent physics;

    @Override

    public void onUpdate(double tpf) {

    limitVelocity();

    checkOffscreen();

    }

    private void limitVelocity() {

    // 防止 X 方向移动过慢

    if (abs(physics.getVelocityX()) < 5 * 60) {

    physics.setVelocityX(signum(physics.getVelocityX()) * 5 * 60);

    }

    // 防止 Y 方向移动过快

    if (abs(physics.getVelocityY()) > 5 * 60 * 2) {

    physics.setVelocityY(signum(physics.getVelocityY()) * 5 * 60);

    }

    }

    // 我们使用了物理引擎，因此球有可能被推过墙壁而超出屏幕，故需进行此检查

    private void checkOffscreen() {

    var viewport = getGameScene().getViewport();

    var visArea = viewport.getVisibleArea();

    if (getEntity().getBoundingBoxComponent().isOutside(visArea)) {

    physics.overwritePosition(new Point2D(

    getAppWidth() / 2,

    getAppHeight() / 2

    ));

    }

    }

    }

    代码清单 3-6

    BallComponent 类

    ```


    我们再次从查看 `onUpdate()` 方法开始。这里的高级逻辑是：(a) 限制球的速度，使其不会突破音障；(b) 检查球是否移出屏幕。每个元素都在各自的方法中实现。`limitVelocity()`
    方法检查当前在 X 轴和 Y 轴上的速度，并根据需要将值限制在 `5 * 60`。最后，我们检查球是否在屏幕之外。这种情况可能发生，因为我们使用物理引擎来运行刚体的碰撞模拟。在某些情况下，球可能会被猛烈地推向墙壁，以至于正确的数值计算会将其置于墙壁之外。因此，有一个简单的检查来测试球是否在视口的可见区域内。如果不是，则只需将球移动到屏幕中心。


    ### 构建实体工厂


    一旦我们通过前面提到的组件实现了每个实体的逻辑，就可以继续添加一个工厂来生成实体。工厂代码如代码清单 3-7 所示，其中有两个值得注意的方法。


    ```

    import com.almasb.fxgl.entity.Entity;

    import com.almasb.fxgl.entity.EntityFactory;

    import com.almasb.fxgl.entity.SpawnData;

    import com.almasb.fxgl.entity.Spawns;

    import com.almasb.fxgl.entity.components.CollidableComponent;

    import com.almasb.fxgl.physics.BoundingShape;

    import com.almasb.fxgl.physics.HitBox;

    import com.almasb.fxgl.physics.PhysicsComponent;

    import com.almasb.fxgl.physics.box2d.dynamics.BodyType;

    import com.almasb.fxgl.physics.box2d.dynamics.FixtureDef;

    import javafx.scene.paint.Color;

    import javafx.scene.shape.Rectangle;

    import static com.almasb.fxgl.dsl.FXGL.entityBuilder;

    import static com.almasb.fxgl.dsl.FXGL.getip;

    public class PongFactory implements EntityFactory {

    @Spawns("ball")

    public Entity newBall(SpawnData data) {

    PhysicsComponent physics = new PhysicsComponent();

    physics.setBodyType(BodyType.DYNAMIC);

    physics.setFixtureDef(new FixtureDef().density(0.3f).restitution(1.0f));

    physics.setOnPhysicsInitialized(() -> physics.setLinearVelocity(5 * 60, -5 * 60));

    return entityBuilder(data)

    .type(EntityType.BALL)

    .view(new Circle(5, 5, 5))

    .bbox(new HitBox(BoundingShape.circle(5)))

    .with(physics)

    .with(new CollidableComponent(true))

    .with(new BallComponent())

    .build();

    }

    @Spawns("bat")

    public Entity newBat(SpawnData data) {

    boolean isPlayer = data.get("isPlayer");

    PhysicsComponent physics = new PhysicsComponent();

    physics.setBodyType(BodyType.KINEMATIC);

    return entityBuilder(data)

    .type(isPlayer ? EntityType.PLAYER_BAT : EntityType.ENEMY_BAT)

    .viewWithBBox(new Rectangle(20, 60, Color.LIGHTGRAY))

    .with(new CollidableComponent(true))

    .with(physics)

    .with(isPlayer ? new BatComponent() : new EnemyBatComponent())

    .build();

    }

    }

    代码清单 3-7

    PongFactory 类

    ```


    我们可以看到工厂类中的两个方法是 `newBall()` 和 `newBat()`。我们将按顺序查看它们，从 `newBall()` 方法开始。在方法内部，我们找到了一个物理组件，因为我们的球是由物理世界驱动的。我们需要初始化物理属性，赋予球某些特性：


    *   将主体类型设置为动态（其他类型包括静态（无移动）和运动学（玩家控制移动）），这允许物理世界完全控制实体的移动。


    *   设置物理实体的密度和恢复系数（弹性程度）。


    *   在物理初始化时，设置实体的线速度，使球开始移动。


    配置好物理组件后，我们将注意力转向实体构建器。构建器允许我们快速设置实体的许多属性。更具体地说，我们将类型设置为 `EntityType.BALL`，视图设置为半径为
    5 的圆形，碰撞盒设置为半径为 5 的圆形形状。实体的所有组件都可以通过调用 `with()` 轻松设置。使用此方法，我们添加了物理、可碰撞和球体组件。至此，我们的球体实体构建完成，现在我们开始构建球拍实体。


    回想一下，我们有两种不同类型的球拍实体：玩家和敌人。在构建球拍实体时，我们可以传递一个额外的参数来告诉工厂我们想要使用的是玩家球拍还是敌人球拍。因此，`newBat()`
    方法中的第一行代码将此参数提取为一个布尔值 `isPlayer`。与 `newBall()` 方法一样，我们也需要一个物理组件。然而，该组件的配置更简单——我们只需将主体类型设置为运动学，以便玩家或
    AI 可以控制球拍，而不是由物理世界控制。剩下的就是使用实体构建器构建球拍实体。我们根据布尔值 `isPlayer` 设置实体类型。视图是一个简单的 JavaFX
    矩形，它也用于通过 `viewWithBBox()` 方法自动为实体生成碰撞盒。与球体实体一样，我们设置了可碰撞和物理组件。最后，使用布尔值 `isPlayer`，我们可以确定应该使用
    `BatComponent` 还是 `EnemyBatComponent`。

    '
- fmt: '### Building the Application Class


    Finally, the class that brings all of these parts of the Pong game together is
    `PongApp`. Here, we will consider the class in detail, but as you progress through
    the book, in subsequent chapters, we will often omit the trivial details since
    they are already covered in these early chapters of the book.


    As before, we will first take care of all the imports, given in Listing [3-8](#522865_1_En_3_Chapter.xhtml#PC23).


    ```

    import com.almasb.fxgl.animation.Interpolators;

    import com.almasb.fxgl.app.GameApplication;

    import com.almasb.fxgl.app.GameSettings;

    import com.almasb.fxgl.core.math.FXGLMath;

    import com.almasb.fxgl.entity.Entity;

    import com.almasb.fxgl.entity.SpawnData;

    import com.almasb.fxgl.input.UserAction;

    import com.almasb.fxgl.physics.CollisionHandler;

    import com.almasb.fxgl.physics.HitBox;

    import com.almasb.fxgl.ui.UI;

    import javafx.scene.input.KeyCode;

    import javafx.scene.paint.Color;

    import javafx.util.Duration;

    import java.util.Map;

    import static com.almasb.fxgl.dsl.FXGL.*;

    Listing 3-8

    PongApp class imports

    ```


    Next, we will create the class `PongApp`, which extends `GameApplication`. This
    snippet is given in Listing [3-9](#522865_1_En_3_Chapter.xhtml#PC24). We will
    provide the basic settings such as the title and version of the game. Recall that
    the game width and height are automatically set to 800×600 by default; however,
    you can set your own values as necessary. We will also add the entry point to
    the game inside the `main` method.


    ```

    public class PongApp extends GameApplication {

    @Override

    protected void initSettings(GameSettings settings) {

    settings.setTitle("Pong");

    settings.setVersion("1.0");

    }

    public static void main(String[] args) {

    launch(args);

    }

    }

    Listing 3-9

    PongApp class inherits from GameApplication

    ```


    We will need to access the player bat throughout the game, so we can control it.
    Therefore, it makes sense to create an instance-level variable to store the player
    bat component:


    ```

    private BatComponent playerBat;

    ```


    Once we have the reference to the player bat, we would like to be able to move
    it up and down. In other words, we need input, which we will handle in `initInput()`,
    given in Listing [3-10](#522865_1_En_3_Chapter.xhtml#PC26). You can see that instead
    of the simple input handling presented in the previous chapter, we use a slightly
    more sophisticated approach via the `getInput()` method. The advantage of utilizing
    this expanded API is that we can use `onActionBegin()`, `onAction()`, and `onActionEnd()`
    callbacks, which fire when a key is first pressed (action begin), held (action),
    and released (action end), respectively.


    ```

    @Override

    protected void initInput() {

    getInput().addAction(new UserAction("Up") {

    @Override

    protected void onAction() {

    playerBat.up();

    }

    @Override

    protected void onActionEnd() {

    playerBat.stop();

    }

    }, KeyCode.W);

    getInput().addAction(new UserAction("Down") {

    @Override

    protected void onAction() {

    playerBat.down();

    }

    @Override

    protected void onActionEnd() {

    playerBat.stop();

    }

    }, KeyCode.S);

    }

    Listing 3-10

    PongApp class input handling

    ```


    As we can see, our input is quite minimal – we only need the W and S keys to make
    the player bat move up or down. The `onAction()` callback is called while the
    key is being pressed, whereas the `onActionEnd()` is called when the key is released.
    These calls are exactly what we need in order to make the bat move or stop.


    We also need to keep track of scores both for the player and the enemy (or player
    2). We can do so by creating FXGL variables. Recall that they are almost like
    normal variables you would create in Java but have additional features, such as
    being able to listen to their changes and bind to them. Essentially, FXGL variables
    are like JavaFX properties. In Listing [3-11](#522865_1_En_3_Chapter.xhtml#PC27),
    we create two FXGL variables: `player1score` and `player2score`, both initialized
    to 0. Later, in `initGame()` (also in Listing [3-11](#522865_1_En_3_Chapter.xhtml#PC27)),
    we listen to changes in these variables and declare the winner based on the values
    – a score of 11 is required to win the game.


    ```

    @Override

    protected void initGameVars(Map vars) {

    vars.put("player1score", 0);

    vars.put("player2score", 0);

    }

    @Override

    protected void initGame() {

    getWorldProperties().addListener("player1score", (old, newScore) -> {

    if (newScore == 11) {

    showGameOver("Player 1");

    }

    });

    getWorldProperties().addListener("player2score", (old, newScore) -> {

    if (newScore == 11) {

    showGameOver("Player 2");

    }

    });

    getGameWorld().addEntityFactory(new PongFactory());

    getGameScene().setBackgroundColor(Color.rgb(0, 0, 5));

    initScreenBounds();

    initGameObjects();

    }

    Listing 3-11

    Initializing the game and variables

    ```


    Furthermore, we also add our `PongFactory` which we implemented earlier and set
    the game background color to RGB 0, 0, 5, which is very close to black. There
    are three methods in `initGame()` that we have not covered yet: `showGameOver()`,
    `initScreenBounds()`, and `initGameObjects()`. You should be able to guess what
    these methods do by considering their name. We will go through them in order in
    Listing [3-12](#522865_1_En_3_Chapter.xhtml#PC28).


    ```

    private void showGameOver(String winner) {

    getDialogService().showMessageBox(winner + " won! Demo over\nThanks for playing",
    getGameController()::exit);

    }

    private void initScreenBounds() {

    Entity walls =

    entityBuilder()

    .type(EntityType.WALL)

    .collidable()

    .buildScreenBounds(150);

    getGameWorld().addEntity(walls);

    }

    private void initGameObjects() {

    Entity ball = spawn("ball", getAppWidth() / 2 - 5, getAppHeight() / 2 - 5);

    Entity bat1 = spawn("bat", new SpawnData(getAppWidth() / 4, getAppHeight() / 2
    - 30).put("isPlayer", true));

    Entity bat2 = spawn("bat", new SpawnData(3 * getAppWidth() / 4 - 20, getAppHeight()
    / 2 - 30).put("isPlayer", false));

    playerBat = bat1.getComponent(BatComponent.class);

    }

    Listing 3-12

    Gameplay methods

    ```


    The implementation of the `showGameOver()` method is straightforward. We show
    a message box displaying who won the game, and once the box is dismissed, we exit
    the game. Next, in `initScreenBounds()`, we wish to create walls around the screen
    so that the ball can hit these walls and bounce back into the playable area of
    the game.


    The last method in Listing [3-12](#522865_1_En_3_Chapter.xhtml#PC28) is `initGameObjects()`,
    where we simply create all of the entities that can be seen in the game: the ball
    and the two bats. We also remember to pass the `isPlayer` boolean variable when
    we create the bats. This is because our factory needs to know which one is the
    player bat and which one is the enemy bat. The last line in this method obtains
    a reference to the `BatComponent` to initialize the `playerBat` variable we defined
    earlier.'
