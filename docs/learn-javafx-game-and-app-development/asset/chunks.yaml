  raw: 'In FXGL, the entity factory class allows each entity creation to be conveniently
    isolated into its own method. We will now go through these methods in order, starting
    with the background entity. This entity forms an endless scrolling view based
    on an image that loops around. The built-in `ScrollingBackgroundView` class allows
    us to do just that. We also add a new `IrremovableComponent` that we have not
    used before. Since we have multiple levels in this platformer game, we will be
    destroying an existing level and setting a new one from time to time. Most levels
    have some shared entities, such as the background and the player. Hence, there
    is no need to recreate these entities every time we wish to change a level. For
    these cases, the `IrremovableComponent` is useful as it locks the entity (to which
    it is attached) from being removed from the world.


    The next entity type is platform. A platform only has a bounding box and a physics
    component. By default, the physics component already has a static body, so there
    is no need for us to alter it. Note that we do not need to create a view for the
    platform since it is loaded directly from the Tiled “.tmx” level file.


    The exit trigger is an entity that, when it collides with the player, enables
    (makes visible) the exit door to the next level. In games, triggers are typically
    not visible themselves and work simply as collision objects. As expected, we create
    a bounding box for it and add the collidable component.


    With respect to the door entity, it is split into door top and door bottom since
    there are two tiles that together make up a door. You will note from the code
    that only the bottom part of the door is made collidable to avoid triggering collision
    with the player twice.


    The player entity is one of the most complex ones in this game. First, we configure
    the physics component to have the dynamic body type, so that is affected by the
    physics forces. We also add a ground sensor, allowing the developer to know when
    the player has hit the ground, that is, the player entity is not in the air. To
    avoid the player sticking to walls, we also set the friction to 0\. Setting it
    to a nonzero positive value is likely to affect the gameplay and feel for the
    game, so you can experiment with it to achieve suitable functionality. Another
    thing to note here is that the player has two bounding boxes: one for the head
    and the other for the body to represent the collision shapes more accurately.
    Finally, we attach collidable, irremovable, and player components, which is straightforward.


    The exit sign entity adds a little bit of a dynamic interaction between the player
    and the game world. The idea is that when the player collides with the sign, it
    will light up. This is not an incredibly important feature in this use case; however,
    it should give you some ideas on what you can do in your own games.


    The key prompt entity is there to help the player identify which key needs to
    be pressed to interact with the world. For example, recall any game you have played
    recently, whether 2D or 3D, where upon getting close to a door or an item, the
    game visually prompted you to press a specific key to interact. This is exactly
    what we are doing here with the key prompt entity.


    The button entity is part of the gameplay, where the player needs to activate
    the button in order to progress through the level. In the levels we use, the button
    will allow the player to make the door visible, thus making progress to the next
    level possible. This completes the factory class overview, and we will now move
    on to other classes in our game example.


    ### Game Visuals: Subscenes


    To make our platformer example a little bit more game-like, we are going to introduce
    a few subscenes. Scenes and their interaction are beyond the scope of this book,
    so only a very brief introduction will be given here. There will be two custom
    scenes in the game: one to show during game loading and one to show during the
    end of a level.


    ![](images/522865_1_En_4_Chapter/522865_1_En_4_Fig4_HTML.jpg)


    A screenshot of a loading scene depicts the following from top to bottom. A text,
    that reads loading level, a payer image, and 3 dots.


    Figure 4-4


    A screenshot of the main loading scene


    As we can see in Figure [4-4](#522865_1_En_4_Chapter.xhtml#Fig4), we create a
    JavaFX Text object with text “Loading level”, show the player image, and add three
    dots. This is implemented in Listing [4-5](#522865_1_En_4_Chapter.xhtml#PC7) as
    a single constructor call that sets up the animations used in the scene. The dots
    are animated using a built-in fade-in animation from FXGL (more on animations
    in Chapter [6](#522865_1_En_6_Chapter.xhtml)). Finally, we position the text in
    the middle and add a player image. The image is animated to rotate from 0 to 360
    degrees and loop indefinitely.


