  trans: '

    ### 构建关卡与实体


    工厂实现代码见清单 5-10。如我们所知，实体工厂负责实例化游戏中出现的所有实体。共有四种实体类型，因此有四个使用 `@Spawns` 注解的方法来创建这些实体。在介绍它们之前，我们先说明关卡是如何生成的。关卡以纯文本文件形式存储，其中每个符号字符代表一个实体。例如：


    ```

    11E1


    P111

    ```


    你可以这样理解这个简单示例：“1”代表方块，“0”代表金币，“P”代表玩家，“E”代表敌人。实际关卡会稍大一些，但遵循相同的约定。


    现在我们来看清单 5-10 中的每个主要方法。第一个方法是 `newBlock()`，它生成一个新的方块类型实体。你会注意到 `@Spawns` 注解的参数是“1”。这正是我们之前示例中用来标识方块的字符。方块是不可穿越的单元格，起到障碍物的作用。在视图方面，它是一个简单的带有圆角的
    JavaFX 矩形。金币实体通过 `newCoin()` 方法从“0”生成，并关联了一个纹理。我们偏移了纹理使其在单元格中居中，并添加了一个边界框。本书前面章节已介绍过这些方法中的大部分。


    玩家和敌人实体的构建稍微复杂一些。对于玩家实体，我们首先从精灵表中创建一个动画纹理。对于任何纹理，FXGL 都允许我们使用 `toAnimatedTexture()`
    方法轻松创建动画纹理，该方法接受两个参数：帧数和动画总时长。在设置玩家实体的视图时，我们需要记得调用 `loop()` 方法，以便动画无限循环。玩家构建代码的其余部分只是添加相关组件，但有一个调用特别值得注意：


    ```

    new AStarMoveComponent(new LazyValue(() -> geto("grid"))).

    ```


    在之前的示例中，你已经看到我们如何使用 A* 网格构建 `AStarMoveComponent`。然而，在本游戏中创建玩家实体时，网格尚未存在，因此我们传递了一个带有回调函数的
    `LazyValue` 对象，以便在运行时获取网格对象。你会发现构建敌人实体时也采用了相同的方法。敌人实体的主要区别之一在于我们如何获取 AI 组件。为了避免为创建四种敌人类型而编写四个不同的方法，我们将
    AI 组件的构建提取到一个单独的方法中，该方法会循环遍历这些组件，每次调用时返回一个不同的组件。至此，工厂类及其生成方法的概述就完成了。建议你回顾前面章节中关于我们未在此处详细讨论的代码内容。


    ```

    import com.almasb.fxgl.core.util.LazyValue;

    import com.almasb.fxgl.dsl.components.RandomAStarMoveComponent;

    import com.almasb.fxgl.entity.Entity;

    import com.almasb.fxgl.entity.EntityFactory;

    import com.almasb.fxgl.entity.SpawnData;

    import com.almasb.fxgl.entity.Spawns;

    import com.almasb.fxgl.entity.component.Component;

    import com.almasb.fxgl.entity.components.CollidableComponent;

    import com.almasb.fxgl.pathfinding.CellMoveComponent;

    import com.almasb.fxgl.pathfinding.astar.AStarMoveComponent;

    import com.almasb.fxgl.physics.BoundingShape;

    import com.almasb.fxgl.physics.HitBox;

    import com.almasb.fxgl.texture.AnimatedTexture;

    import com.almasb.fxglgames.pacman.components.PaletteChangingComponent;

    import com.almasb.fxglgames.pacman.components.PlayerComponent;

    import com.almasb.fxglgames.pacman.components.ai.DelayedChasePlayerComponent;

    import com.almasb.fxglgames.pacman.components.ai.GuardCoinComponent;

    import javafx.geometry.Point2D;

    import javafx.scene.paint.Color;

    import javafx.scene.shape.Rectangle;

    import javafx.util.Duration;

    import java.util.Map;

    import java.util.function.Supplier;

    import static com.almasb.fxgl.dsl.FXGL.*;

    import static com.almasb.fxglgames.pacman.PacmanApp.BLOCK_SIZE;

    import static com.almasb.fxglgames.pacman.PacmanType.*;

    public class PacmanFactory implements EntityFactory {

    @Spawns("1")

    public Entity newBlock(SpawnData data) {

    var rect = new Rectangle(38, 38, Color.BLACK);

    rect.setArcWidth(25);

    rect.setArcHeight(25);

    rect.setStrokeWidth(1);

    rect.setStroke(Color.BLUE);

    return entityBuilder(data)

    .type(BLOCK)

    .viewWithBBox(rect)

    .zIndex(-1)

    .build();

    }

    @Spawns("0")

    public Entity newCoin(SpawnData data) {

    var view = texture("coin.png");

    view.setTranslateX(5);

    view.setTranslateY(5);

    return entityBuilder(data)

    .type(COIN)

    .bbox(new HitBox(new Point2D(5, 5), BoundingShape.box(30, 30)))

    .view(view)

    .zIndex(-1)

    .with(new CollidableComponent(true))

    .with(new CellMoveComponent(BLOCK_SIZE, BLOCK_SIZE, 50))

    .scale(0.5, 0.5)

    .build();

    }

    @Spawns("P")

    public Entity newPlayer(SpawnData data) {

    AnimatedTexture view = texture("player.png").toAnimatedTexture(2, Duration.seconds(0.33));

    return entityBuilder(data)

    .type(PLAYER)

    .bbox(new HitBox(new Point2D(4, 4), BoundingShape.box(32, 32)))

    .anchorFromCenter()

    .view(view.loop())

    .with(new CollidableComponent(true))

    .with(new CellMoveComponent(BLOCK_SIZE, BLOCK_SIZE, 200).allowRotation(true))

    // 网格尚未构建，因此延迟传递

    .with(new AStarMoveComponent(new LazyValue(() -> geto("grid"))))

    .with(new PlayerComponent())

    .rotationOrigin(35 / 2.0, 40 / 2.0)

    .build();

    }

    private Supplier aiComponents = new Supplier() {

    private Map> components = Map.of(

    0, () -> new DelayedChasePlayerComponent().withDelay(),

    1, GuardCoinComponent::new,

    2, RandomAStarMoveComponent::new,

    3, DelayedChasePlayerComponent::new

    );

    private int index = 0;

    @Override

    public Component get() {

    if (index == 4) { // 共有 4 个敌人

    index = 0;

    }

    return components.get(index++).get();

    }

    };

    @Spawns("E")

    public Entity newEnemy(SpawnData data) {

    return entityBuilder(data)

    .type(ENEMY)

    .bbox(new HitBox(new Point2D(2, 2), BoundingShape.box(36, 36)))

    .anchorFromCenter()

    .with(new CollidableComponent(true))

    .with(new PaletteChangingComponent(texture("spritesheet.png", 695 * 0.24, 1048
    * 0.24)))

    .with(new CellMoveComponent(BLOCK_SIZE, BLOCK_SIZE, 125))

    // 网格尚未构建，因此延迟传递

    .with(new AStarMoveComponent(new LazyValue(() -> geto("grid"))))

    .with(aiComponents.get())

    .build();

    }

    }

    清单 5-10

    实体工厂类实现

    ```


    在通过应用程序类连接游戏所有部分之前，我们先来看一个通过 FXML 实现的简单用户界面（UI），以便玩家了解时间限制和其他游戏内机制。

    '
- fmt: '### Building the UI


    Writing a UI using the FXML markup is a common approach in JavaFX. Hence, FXGL
    provides first-class support for FXML files. Listing [5-11](#522865_1_En_5_Chapter.xhtml#PC14)
    has an example UI done in FXML. The example has a `Pane` as the root node and
    only three subnodes: a rectangle background for our UI and two labels, one for
    the score and the other to indicate the number of teleports the player can utilize.


    ```

    Listing 5-11

    The FXML file containing the UI definition for our game

    ```


    In order to make use of this UI in FXGL, we need a controller class, such as the
    one provided in Listing [5-12](#522865_1_En_5_Chapter.xhtml#PC15). The only responsibility
    of the class is to bind the text of the labels we defined to their in-game properties
    and to attach an extra UI element – the time progress bar. Recall that the player
    needs to complete the game demo within a specified period of time, so our progress
    bar will keep the player up to date on how much time has left before the demo
    finishes.


    ```java

    import com.almasb.fxgl.ui.ProgressBar;

    import com.almasb.fxgl.ui.UIController;

    import javafx.fxml.FXML;

    import javafx.scene.control.Label;

    import javafx.scene.layout.Pane;

    import javafx.scene.paint.Color;

    import static com.almasb.fxgl.dsl.FXGL.getUIFactoryService;

    import static com.almasb.fxgl.dsl.FXGL.getip;

    public class PacmanUIController implements UIController {

    @FXML

    private Pane root;

    private ProgressBar timeBar;

    @FXML

    private Label labelScore;

    @FXML

    private Label labelTeleport;

    @Override

    public void init() {

    timeBar = new ProgressBar(false);

    timeBar.setHeight(50);

    timeBar.setTranslateX(-60);

    timeBar.setTranslateY(100);

    timeBar.setRotate(-90);

    timeBar.setFill(Color.GREEN);

    timeBar.setLabelVisible(false);

    timeBar.setMaxValue(PacmanApp.TIME_PER_LEVEL);

    timeBar.setMinValue(0);

    timeBar.setCurrentValue(PacmanApp.TIME_PER_LEVEL);

    timeBar.currentValueProperty().bind(getip("time"));

    root.getChildren().addAll(timeBar);

    labelScore.setFont(getUIFactoryService().newFont(18));

    labelTeleport.setFont(getUIFactoryService().newFont(12));

    labelScore.textProperty().bind(getip("score").asString("Score:\n%d"));

    labelTeleport.textProperty().bind(getip("teleport").asString("Teleports:\n[%d]"));

    }

    }

    Listing 5-12

    The UI controller class

    ```


    The last piece of the software “puzzle” is the `PacmanApp` class, which brings
    all other classes together.


    ### Building the Application Class


    Unlike the previous game example from the last chapter, this class is quite simple.
    This is because the game focuses on AI, components for which we already covered.
    In Listing [5-13](#522865_1_En_5_Chapter.xhtml#PC16), we first define our constant
    variables related to the time given for the level and the size of blocks, maps,
    and UI. These constants are then used inside `initSettings()` in a straightforward
    way. In `initInput()`, we simply call the player component and the five actions
    we had created. There are four variables in the game that are of importance, so
    we create them in `initGameVars()`. These are used to keep track of the player
    score, the number of coins left in the game, the number of teleports the player
    can use, and the time left to complete the level.


    The `initGame()` code is of particular importance as it shows us how to parse
    the text file into a game world and subsequently generate an A* grid from this
    game world. To produce a level, we use the `AssetLoader` with the `TextLevelLoader`
    and provide relevant details, such as the block size. As for generating the A*
    grid (so that enemies can move intelligently), essentially, we call `AStarGrid.fromWorld`
    and provide details about the map and block sizes. We also tell FXGL what types
    of entities are not walkable. In this case, the `BLOCK` entity is the only entity
    type that is not walkable, so we use an “if” statement to signify it. In this
    method, we also add the grid object to the list of variables. Recall that when
    creating the player entity, we passed in the A* grid using a lazy value, indicating
    to FXGL that such an object would exist at runtime. We are now simply fulfilling
    that promise. Having generated the game world, we can readily compute the number
    of coins in the game: `getGameWorld().getEntitiesByType(COIN).size()`). Finally
    in this initialization method, we schedule the game timer to run each second so
    that the “time” variable is decremented appropriately; and we add a listener to
    it so that when it reaches 0, the game will be over.


    As with a typical architecture of FXGL games, in `initPhysics()`, we set up collision
    handlers, such as the one between the player and enemies and one between the player
    and coins. The `initUI()` method shows a new `loadUI()` call, where we wire the
    FXML file and the UI controller class together, both of which we created earlier.
    The other methods implemented in the `PacmanApp` class are trivial.'
