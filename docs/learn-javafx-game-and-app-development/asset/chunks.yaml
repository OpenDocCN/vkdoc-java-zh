  raw: '## FXGL Basics: Creating a Simple Application


    In this section, we will build a simple FXGL application, which will be our first
    game example. Before we proceed, let us define some requirements for our simple
    game:


    1.  The game will have a 600×600 window.


    2.  There is a player on the screen, represented by a blue rectangle.


    3.  The player can be controlled by pressing W, S, A, and D on the keyboard.


    4.  The user interface (UI) is represented by a single of text, which shows how
    many pixels the player has moved.


    5.  When the player moves, the UI text will update itself accordingly.


    At the end of this section, you should have a game similar to what you can see
    in Figure [2-6](#522865_1_En_2_Chapter.xhtml#Fig6). Although this may look far
    from a real game, its development will help you understand the basic features
    present in FXGL. As a result, after completing this section, you will be able
    to build a variety of simple games.


    ![](images/522865_1_En_2_Chapter/522865_1_En_2_Fig6_HTML.jpg)


    A program output depicts a window titled basic game app 0 dot 1\. The window has
    minimize, maximize, and close options on the top right. A colored square is depicted
    on the window, and the number 75 is on the top left of the square.


    Figure 2-6


    A basic FXGL application


    The first step is to prepare our development environment. From the previous section,
    you should have a clear idea of how to create a new project and add FXGL as a
    dependency; hence, we will start immediately from creating a Java package for
    our game in `src/main/java`. For simplicity, let us call the package “tutorial”.
    In that package, we are going to create a Java class named “BasicGameApp”. In
    JavaFX applications, it is common to append “App” to the class where the `main()`
    method is located. This allows other developers to easily identify where the main
    entry point to the application is. To make your next steps a lot easier, we can
    open the BasicGameApp class and add the commonly used FXGL imports given in Listing
    [2-7](#522865_1_En_2_Chapter.xhtml#PC19).


    ```

    import com.almasb.fxgl.app.GameApplication;

    import com.almasb.fxgl.app.GameSettings;

    import com.almasb.fxgl.dsl.FXGL;

    import com.almasb.fxgl.entity.Entity;

    import com.almasb.fxgl.input.Input;

    import com.almasb.fxgl.input.UserAction;

    import javafx.scene.input.KeyCode;

    import javafx.scene.paint.Color;

    import javafx.scene.shape.Rectangle;

    import javafx.scene.text.Text;

    import java.util.Map;

    Listing 2-7

    Common FXGL imports

    ```


    We are now in a position to start writing some code. To start using FXGL, your
    “App” class needs to extend `GameApplication` and override the `initSettings()`
    method:


    ```

    public class BasicGameApp extends GameApplication {

    @Override

    protected void initSettings(GameSettings settings) {}

    }

    ```


    As soon as you add the extends clause, your IDE is likely to prompt automatic
    generation of the overridden method. In the following subsections, we will cover
    other commonly used overridden methods.


    Via the `initSettings()` method and the `settings` object, you can change a plethora
    of game settings and configure the application in a way that fits your needs.
    However, at the moment, we simply want to have a working application as quickly
    as possible. Hence, we will leave this method alone for the time being. The next
    method we will add is


    ```

    public static void main(String[] args) {

    launch(args);

    }

    ```


    We already covered a simple JavaFX application in an earlier section, so this
    method is nothing new. This is the way to start a normal JavaFX application. Since
    FXGL is seamlessly integrated with JavaFX, this is also the way to start FXGL
    applications. As you progress through this book, you will realize that FXGL is
    just JavaFX with game development features. At this point, your application is
    already runnable, so you may wish to start the game (as per usual by right-clicking
    and selecting “Run”), see the results, and finally close it.


    ### Requirement 1: Opening a Window


    We will now go through each requirement we defined earlier, in turn, to develop
    our game. The first requirement was to open a 600×600 window, in which our game
    will run. As we mentioned earlier, in order to change settings, we can use the
    `initSettings()` method, shown in Listing [2-8](#522865_1_En_2_Chapter.xhtml#PC22).


    ```

    @Override

    protected void initSettings(GameSettings settings) {

    settings.setWidth(600);

    settings.setHeight(600);

    settings.setTitle("Basic Game App");

    settings.setVersion("0.1");

    }

    Listing 2-8

    The initSettings() method allows providing game-specific settings

    ```


    Using the settings object, we changed the width and height to 600\. We also set
    the title and version of the game. Once they are set, the settings cannot be changed
    during runtime. This does not mean you cannot resize the application for instance;
    instead, this means the provided values are the startup settings to be used. You
    can now click “run” in your IDE, which should start the game with a 600×600 window
    and “Basic Game App” as the window title. We have now completed the first requirement.
    You can see this requirement was straightforward to achieve. You will note that
    other requirements are not more complex either. This is the overall aim of FXGL:
    to make JavaFX game development significantly easier and more streamlined.


    ### Requirement 2: Adding the Player


    The second requirement is to add a player object to our game. We are going to
    do this in `initGame()`. In short, this is where you set up everything that needs
    to be ready before the game starts. The code is given in Listing [2-9](#522865_1_En_2_Chapter.xhtml#PC23).


    ```

    private Entity player;

    @Override

    protected void initGame() {

    player = FXGL.entityBuilder()

    .at(300, 300)

    .view(new Rectangle(25, 25, Color.BLUE))

    .buildAndAttach();

    }

    Listing 2-9

    The initGame() method allows setting up the game and its game objects

    ```


    We will cover it slowly, method by method.


    *   There is an instance-level field named player of type Entity. An entity is
    essentially a game object, as defined by FXGL. This is everything you need to
    know about it at this stage. We will discuss entities to a greater length in the
    next chapter. FXGL.entityBuilder() is the preferred way to build entities.


    *   Next, by calling .at(), we can set the position of the entity we are creating.
    In this case, it’s x = 300 and y = 300\. Note that a position of any entity is
    at its top-left point, as in JavaFX.


    *   Then, we tell the entity builder to create the view of our entity. In particular,
    we wish to use the Rectangle object, which comes directly from JavaFX, so nothing
    new here. We construct the rectangle by providing its width = 25, height = 25,
    and color. An important thing to note here is that you can use any JavaFX Node
    instead of the rectangle to pass into the view method and therefore provide the
    visual representation of your entity.


    *   Finally, we call .buildAndAttach(). By calling build, we can obtain the reference
    to the entity that we were building. As for the attach part, it conveniently allows
    us to add the built entity straight to the game world. We will cover the game
    world and what it is in the next chapter. For now, just consider it as a place
    where entities exist and live.


    If you run the game now, you should see a blue rectangle near the center of the
    window. This step completes requirement 2.'
  trans: '

    ## FXGL 基础：创建简单应用


    在本节中，我们将构建一个简单的 FXGL 应用程序，这将是我们的第一个游戏示例。在开始之前，让我们先为这个简单游戏定义一些需求：


    1.  游戏将有一个 600×600 的窗口。


    2.  屏幕上有一个玩家，由一个蓝色矩形表示。


    3.  玩家可以通过键盘上的 W、S、A 和 D 键进行控制。


    4.  用户界面（UI）由一段文本表示，显示玩家移动了多少像素。


    5.  当玩家移动时，UI 文本将相应地更新。


    在本节结束时，你应该拥有一个类似于图 2-6 所示的游戏。虽然这看起来可能远非一个真正的游戏，但它的开发将帮助你理解 FXGL 中的基本特性。因此，完成本节后，你将能够构建各种简单的游戏。


    ![](img/522865_1_En_2_Fig6_HTML.jpg)


    程序输出显示一个标题为“basic game app 0 dot 1”的窗口。窗口右上角有最小化、最大化和关闭选项。窗口内显示一个彩色方块，方块左上角显示数字
    75。


    图 2-6


    一个基本的 FXGL 应用程序


    第一步是准备我们的开发环境。从上一节中，你应该已经清楚如何创建新项目并将 FXGL 添加为依赖项；因此，我们将立即从在 `src/main/java` 中为我们的游戏创建一个
    Java 包开始。为简单起见，我们将该包命名为“tutorial”。在该包中，我们将创建一个名为“BasicGameApp”的 Java 类。在 JavaFX
    应用程序中，通常会在包含 `main()` 方法的类名后附加“App”。这使其他开发人员能够轻松识别应用程序的主入口点。为了让你后续步骤更轻松，我们可以打开
    BasicGameApp 类并添加清单 2-7 中给出的常用 FXGL 导入。


    ```

    import com.almasb.fxgl.app.GameApplication;

    import com.almasb.fxgl.app.GameSettings;

    import com.almasb.fxgl.dsl.FXGL;

    import com.almasb.fxgl.entity.Entity;

    import com.almasb.fxgl.input.Input;

    import com.almasb.fxgl.input.UserAction;

    import javafx.scene.input.KeyCode;

    import javafx.scene.paint.Color;

    import javafx.scene.shape.Rectangle;

    import javafx.scene.text.Text;

    import java.util.Map;

    清单 2-7

    常用的 FXGL 导入

    ```


    现在我们可以开始编写一些代码了。要开始使用 FXGL，你的“App”类需要继承 `GameApplication` 并重写 `initSettings()`
    方法：


    ```

    public class BasicGameApp extends GameApplication {

    @Override

    protected void initSettings(GameSettings settings) {}

    }

    ```


    一旦你添加了 extends 子句，你的 IDE 很可能会提示自动生成重写的方法。在接下来的小节中，我们将介绍其他常用的重写方法。


    通过 `initSettings()` 方法和 `settings` 对象，你可以更改大量游戏设置，并以适合你需求的方式配置应用程序。然而，目前我们只想尽快让应用程序运行起来。因此，我们暂时先不处理这个方法。我们要添加的下一个方法是：


    ```

    public static void main(String[] args) {

    launch(args);

    }

    ```


    我们已经在前面章节中介绍过一个简单的 JavaFX 应用程序，所以这个方法并不新鲜。这是启动普通 JavaFX 应用程序的方式。由于 FXGL 与 JavaFX
    无缝集成，这也是启动 FXGL 应用程序的方式。随着你阅读本书的深入，你会意识到 FXGL 就是带有游戏开发功能的 JavaFX。此时，你的应用程序已经可以运行，因此你可以启动游戏（通常通过右键单击并选择“运行”），查看结果，最后关闭它。


    ### 需求 1：打开窗口


    现在，我们将依次实现之前定义的每个需求，来开发我们的游戏。第一个需求是打开一个 600×600 的窗口，我们的游戏将在其中运行。正如我们之前提到的，要更改设置，我们可以使用
    `initSettings()` 方法，如清单 2-8 所示。


    ```

    @Override

    protected void initSettings(GameSettings settings) {

    settings.setWidth(600);

    settings.setHeight(600);

    settings.setTitle("Basic Game App");

    settings.setVersion("0.1");

    }

    清单 2-8

    initSettings() 方法允许提供游戏特定的设置

    ```


    使用 settings 对象，我们将宽度和高度更改为 600。我们还设置了游戏的标题和版本。一旦设置完成，这些设置在运行时就不能更改。这并不意味着你不能调整应用程序的大小；相反，这意味着提供的值是启动时要使用的设置。现在你可以在
    IDE 中点击“运行”，这将启动一个 600×600 的窗口，窗口标题为“Basic Game App”。至此，我们完成了第一个需求。你可以看到这个需求实现起来很简单。你会注意到其他需求也并不复杂。这就是
    FXGL 的总体目标：让 JavaFX 游戏开发变得显著更简单、更高效。


    ### 需求 2：添加玩家


    第二个需求是向我们的游戏添加一个玩家对象。我们将在 `initGame()` 中完成此操作。简而言之，这是你设置游戏开始前需要准备好的所有内容的地方。代码如清单
    2-9 所示。


    ```

    private Entity player;

    @Override

    protected void initGame() {

    player = FXGL.entityBuilder()

    .at(300, 300)

    .view(new Rectangle(25, 25, Color.BLUE))

    .buildAndAttach();

    }

    清单 2-9

    initGame() 方法允许设置游戏及其游戏对象

    ```


    我们将逐一方法地慢慢讲解。


    *   有一个名为 player 的实例级字段，类型为 Entity。实体本质上是一个游戏对象，正如 FXGL 所定义的那样。这是现阶段你需要了解的全部内容。我们将在下一章更详细地讨论实体。`FXGL.entityBuilder()`
    是构建实体的首选方式。


    *   接下来，通过调用 `.at()`，我们可以设置正在创建的实体的位置。在本例中，x = 300，y = 300。请注意，任何实体的位置都在其左上角点，与
    JavaFX 中一样。


    *   然后，我们告诉实体构建器创建我们实体的视图。具体来说，我们希望使用 Rectangle 对象，它直接来自 JavaFX，所以这里没有新内容。我们通过提供宽度
    = 25、高度 = 25 和颜色来构造矩形。这里需要注意的重要一点是，你可以使用任何 JavaFX Node 而不是矩形来传递给 view 方法，从而提供实体的视觉表示。


    *   最后，我们调用 `.buildAndAttach()`。通过调用 build，我们可以获得正在构建的实体的引用。至于 attach 部分，它方便地允许我们将构建好的实体直接添加到游戏世界中。我们将在下一章介绍游戏世界及其含义。现在，只需将其视为实体存在和生存的地方。


    如果你现在运行游戏，你应该会在窗口中心附近看到一个蓝色矩形。这一步完成了需求 2。

    '
- fmt: "### Requirement 3: Adding Input\n\nRequirement 3 states that we should be\
    \ able to control the player entity using the keyboard. We will now proceed with\
    \ user input. In FXGL, typically all of the input-related code is placed inside\
    \ the `initInput()` method. The code in Listing [2-10](#522865_1_En_2_Chapter.xhtml#PC24)\
    \ shows how to add an input action. Most of the input in FXGL is handled in this\
    \ format. The developer would specify an action (some code to be run) and then\
    \ bind it to a trigger (a mouse button, a key press, or some other way to provide\
    \ input, such as a controller).\n\n```java\n@Override\nprotected void initInput()\
    \ {\n    FXGL.onKey(KeyCode.D, () -> {\n        player.translateX(5); // move\
    \ right 5 pixels\n    });\n}\n```\n\n*Listing 2-10* The `initInput()` method allows\
    \ binding user input to in-game actions\n\nLet us go through Listing [2-10](#522865_1_En_2_Chapter.xhtml#PC24)\
    \ line by line. By calling the `onKey()` method from FXGL, we are effectively\
    \ saying “while a key is being pressed, perform an action.” In this case, the\
    \ key is `KeyCode.D`. Again, if you have used JavaFX before, then you will know\
    \ that these are exactly the same key codes used in standard event handlers. As\
    \ you have noticed, to use most of the FXGL functionality, all you need to do\
    \ is call `FXGL.***`, and your IDE will show all possible functions with autocomplete.\n\
    \nRecall from the requirements that the action we wish to perform is to move the\
    \ player. So when D is pressed, we want to move the player to the right. We call\
    \ `player.translateX(5)`, which moves the entity’s X coordinate by 5 pixels. Note\
    \ that “translate” is a terminology used in computer graphics (and JavaFX) and\
    \ means move. You will note that the FXGL API is quite concise. This concise API\
    \ is commonly called DSL – domain-specific language in the context of FXGL. This\
    \ can be shortened even further if we use static imports. You can statically import\
    \ FXGL calls by adding the following import line:\n\n```java\nimport static com.almasb.fxgl.dsl.FXGL.*;\n\
    ```\n\nNow that we are familiar with input handling for one key, the rest of the\
    \ code should be straightforward and is given in Listing [2-11](#522865_1_En_2_Chapter.xhtml#PC26).\n\
    \n```java\n@Override\nprotected void initInput() {\n    FXGL.onKey(KeyCode.D,\
    \ () -> {\n        player.translateX(5); // move right 5 pixels\n    });\n   \
    \ FXGL.onKey(KeyCode.A, () -> {\n        player.translateX(-5); // move left 5\
    \ pixels\n    });\n    FXGL.onKey(KeyCode.W, () -> {\n        player.translateY(-5);\
    \ // move up 5 pixels\n    });\n    FXGL.onKey(KeyCode.S, () -> {\n        player.translateY(5);\
    \ // move down 5 pixels\n    });\n}\n```\n\n*Listing 2-11* The `initInput()` method\
    \ implementation for all four directions\n\nWith the `initInput()` method populated,\
    \ requirement 3 is now complete.\n\n### Requirement 4: Adding UI\n\nThe next requirement\
    \ is the UI, which we handle in the `initUI()` method, given in Listing [2-12](#522865_1_En_2_Chapter.xhtml#PC27).\n\
    \n```java\n@Override\nprotected void initUI() {\n    Text textPixels = new Text();\n\
    \    textPixels.setTranslateX(50); // x = 50\n    textPixels.setTranslateY(100);\
    \ // y = 100\n    FXGL.getGameScene().addUINode(textPixels); // add to the screen\n\
    }\n```\n\n*Listing 2-12* The `initUI()` method allows adding user interface objects\
    \ on the screen\n\nIn Listing [2-12](#522865_1_En_2_Chapter.xhtml#PC27), the `Text`\
    \ class is used directly from JavaFX. In fact, for most UI objects, we simply\
    \ use the JavaFX controls, since there is no need to reinvent the wheel. You should\
    \ note that when we added the entity to the world, the game scene picked up the\
    \ fact the entity had a view associated with it. Hence, the game scene magically\
    \ added the entity to the scene graph. With UI objects, we are responsible for\
    \ their additions to the scene graph, and we do exactly that by calling `getGameScene().addUINode()`.\
    \ We will handle the UI updates, such as the number of pixels moved by the player,\
    \ a bit later on.\n\n### Requirement 5: Updating UI\n\nIn order to complete the\
    \ last requirement, we are going to use a game variable. In FXGL, a game variable\
    \ can be accessed and modified from any part of the game. In a sense, it is a\
    \ global variable with the scope being tied to the FXGL game instance. In addition,\
    \ such variables can be bound to (like with JavaFX properties). We start by creating\
    \ such a variable:\n\n```java\n@Override\nprotected void initGameVars(Map vars)\
    \ {\n    vars.put(\"pixelsMoved\", 0);\n}\n```\n\nThe preceding code creates a\
    \ game variable named `pixelsMoved` with the initial value of 0. Note that FXGL\
    \ will automatically infer the type of the variable based on the initial value,\
    \ which in this case is an integer. For example, if we used `0.0`, then the type\
    \ of the game variable would be a double. Next, we need to update the variable\
    \ when the player moves. We can do this in the input handling section of the code.\n\
    \n```java\nFXGL.onKey(KeyCode.D, () -> {\n    player.translateX(5); // move right\
    \ 5 pixels\n    FXGL.inc(\"pixelsMoved\", +5);\n});\n```\n\nYou can do the same\
    \ with the rest of the movement actions, that is, left, up, and down. The last\
    \ step is to bind our UI text object we created earlier to the variable `pixelsMoved`.\
    \ Ultimately, this allows FXGL to automatically update the UI based on the `pixelsMoved`\
    \ value so that we don’t need to update the UI manually. In `initUI()`, once we\
