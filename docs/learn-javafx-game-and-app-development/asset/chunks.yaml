- fmt: "# Entity\n\nAny game object that you can think of (e.g., player, enemy, coin,\
    \ bullet, power-up, wall, dirt, weapon, treasure box, and many others) is an entity.\
    \ By itself, an entity is nothing but a generic object. Without adding components,\
    \ it is almost impossible to distinguish one entity from another. Components are\
    \ the crucial objects that carry data and behavior with them to define each entity\
    \ in its unique way. We will expand upon this in the next sections.\n\nIn FXGL,\
    \ there are a number of useful methods you can invoke on an entity.\n\nThese include:\n\
    \n* `addComponent(Component c)` / `removeComponent(Component c)` – Allows adding\
    \ new and removing existing components.\n* `setProperty(String key, Object value)`\
    \ – Allows adding a variable of any type to the entity. These variables are useful\
    \ if you do not wish to create a new component to store data. The values can be\
    \ obtained by calling `getInt(String key)`, `getString(String key)`, `getObject(String\
    \ key)`, and other similar methods.\n* `getComponents()` – Retrieves the list\
    \ of all components attached to an entity.\n* `getPosition()` / `setPosition(Point2D\
    \ p)` – Returns the position/sets the position of the entity in 2D space. More\
    \ specifically, the method asks the `TransformComponent` to provide/modify this\
    \ data (as we know, entities themselves do not store any data, only their components\
    \ do).\n* `translate(Point2D vector)` – Moves the entity by the given vector.\
    \ More specifically, the method asks the `TransformComponent` to modify position\
    \ data.\n* `isVisible()` / `setVisible(boolean b)` – Checks if the entity is being\
    \ drawn/if set to false, the entity will not be drawn.\n* `getType()` / `setType(Object\
    \ type)` – Allows retrieving/setting the entity type. Typically, the enum class\
    \ values are used as types.\n\nNow that we are more familiar with what an entity\
    \ is and what methods we can invoke on it, we will consider components.\n\n##\
    \ Components As Data\n\nIn this section, we will see how components can add data\
    \ to an entity. In the context of FXGL’s Entity-Component model, a component is\
    \ a part of an entity. A component can carry any data you wish for an entity to\
    \ possess. We will appeal to the analogy of adding instance fields to the class\
    \ definition in Java:\n\n```\nclass Car {\n    int moveSpeed;\n    Color color;\n\
    }\n```\n\nSo if we wanted to add a new property (field) possessed by a car, we\
    \ would have to modify the preceding class. In games, objects commonly “lose”\
    \ old properties and “gain” new properties, which means we need to have the ability\
    \ to modify the preceding class at runtime, and this is not trivial.\n\nFurthermore,\
    \ let us consider deeper implications of using the `Car` class. In the previous\
    \ example, the `Car` class contains an instance field `moveSpeed`, implying that\
    \ it can move. Now, imagine that we also have a player character that, too, can\
    \ move. We can add `moveSpeed` to the `Player` class. However, there are many\
    \ other movable game objects. So perhaps we should use inheritance instead and\
    \ have an abstract class `MovableGameObject`, or better still an interface `Movable`.\
    \ That is good and all, but what if we want an object that sometimes can move\
    \ and sometimes cannot? For example, a car controlled by the player can move,\
    \ but it cannot move by itself. We cannot simply remove an interface and attach\
    \ it back when we need it. It is clear that this problem does not have a trivial\
    \ solution using inheritance.\n\nThe good news is that in computer science, there\
    \ is typically more than one solution for any given problem. Inheritance is not\
    \ the only tool in our arsenal. You may have heard the phrase “composition over\
    \ inheritance.” Well, components are somewhat an extreme version of that. They\
    \ allow us to attach fields and methods at runtime – how cool is that? Consider\
    \ the snippet of code in Listing [3-1](#522865_1_En_3_Chapter.xhtml#PC2), which\
    \ is an equivalent of the `Car` class, but rewritten with components:\n\n```\n\
    Entity entity = new Entity();\nentity.addComponent(new MoveSpeedComponent());\n\
    entity.addComponent(new ColorComponent());\n// some time later we can make it\
    \ immovable\nentity.removeComponent(MoveSpeedComponent.class);\n// or change a\
    \ component's value like a normal field\nentity.getComponentOptional(ColorComponent.class).ifPresent(color\
    \ -> {\n    color.setValue(Color.RED);\n});\nListing 3-1\nAn example of adding,\
    \ removing, and accessing a component\n```\n\nWe can see that with components,\
    \ the inheritance problem we described earlier becomes quite trivial to solve.\
    \ This change in representation of a problem is a common technique in computer\
    \ science. This technique allows to rephrase the problem in a way that is easy\
    \ to solve by a known method. In addition, the approach that uses components isolates\
    \ logic in each component. This means we can attach this `MoveSpeedComponent`\
    \ to any entity. We can also add any number of different components to an entity,\
    \ making this approach highly scalable. Finally, there is a strong adherence to\
    \ the Single Responsibility principle (from SOLID principles), so all changes\
    \ that need to modify, say, movement will take place inside a single component,\
    \ namely, `MoveSpeedComponent`.\n\nWhen creating an entity, it is preferred to\
    \ add any components that you know an entity is going to possess up front. Then\
    \ you can enable or disable components as necessary. For example, `CollidableComponent`\
    \ signifies that an entity can collide with something. Suppose we do not want\
    \ our entity to be collidable when created. Instead of adding the component when\
    \ the entity becomes collidable, we can simply add the component at creation and\
    \ set its value to false (in Java, we can use `var` instead of the type of the\
    \ left side to shorten the code):\n\n```\nvar c = new CollidableComponent();\n\
    c.setValue(false);\nentity.addComponent(c);\n```\n\nHaving considered the case\
    \ where a component acts as a data container, we will now focus on how we can\
    \ use components to add behavior to entities.\n\n## Components As Behavior\n\n\
    Components can also carry behavior information with them, effectively allowing\
    \ entities to obtain new methods and be able to perform new actions. In fact,\
    \ we previously demonstrated the analogy of adding a component with data as adding\
    \ a field to a class. Well, adding components with behavior is like adding methods.\
    \ Components allow us to make an entity do something, thus defining entity behavior.\
    \ Before we create a custom component, let us first consider the built-in methods\
    \ in the `Component` class:\n\n* `onAdded()` – This callback is called when the\
    \ component is added to an entity.\n* `onRemoved()` – This callback is called\
    \ when the component is removed from an entity.\n* `onUpdate()` – This callback\
    \ is called every frame to allow the component to update its logic.\n* `pause()`\
    \ – Calling this method will make the component pause processing any updates in\
    \ `onUpdate()`.\n* `resume()` – Calling this method will make the component resume\
    \ processing any updates in `onUpdate()`.\n\nAny custom class that extends from\
    \ `Component` will have access to these methods."
  raw: '## Entity


    Any game object that you can think of (e.g., player, enemy, coin, bullet, power-up,
    wall, dirt, weapon, treasure box, and many others) is an entity. By itself, an
    entity is nothing but a generic object. Without adding components, it is almost
    impossible to distinguish one entity from another. Components are the crucial
    objects that carry data and behavior with them to define each entity in its unique
    way. We will expand upon this in the next sections.


    In FXGL, there are a number of useful methods you can invoke on an entity.


    These include


    *   addComponent(Component c)/removeComponent(Component c) – Allows adding new
    and removing existing components.


    *   setProperty(String key, Object value) – Allows adding a variable of any type
    to the entity. These variables are useful if you do not wish to create a new component
    to store data. The values can be obtained by calling getInt(String key), getString(String
    key), getObject(String key), and other similar methods.


    *   getComponents() – Retrieves the list of all components attached to an entity.


    *   getPosition()/setPosition(Point2D p) – Returns the position/sets the position
    of the entity in 2D space. More specifically, the method asks the TransformComponent
    to provide/modify this data (as we know, entities themselves do not store any
    data, only their components do).


    *   translate(Point2D vector) – Moves the entity by the given vector. More specifically,
    the method asks the TransformComponent to modify position data.


    *   isVisible()/setVisible(boolean b) – Checks if the entity is being drawn/if
    set to false, the entity will not be drawn.


    *   getType()/setType(Object type) – Allows retrieving/setting the entity type.
    Typically, the enum class values are used as types.


    Now that we are more familiar with what an entity is and what methods we can invoke
    on it, we will consider components.


    ## Components As Data


    In this section, we will see how components can add data to an entity. In the
    context of FXGL’s Entity-Component model, a component is a part of an entity.
    A component can carry any data you wish for an entity to possess. We will appeal
    to the analogy of adding instance fields to the class definition in Java:


    ```

    class Car {

    int moveSpeed;

    Color color;

    }

    ```


    So if we wanted to add a new property (field) possessed by a car, we would have
    to modify the preceding class. In games, objects commonly “lose” old properties
    and “gain” new properties, which means we need to have the ability to modify the
    preceding class at runtime, and this is not trivial.


    Furthermore, let us consider deeper implications of using the `Car` class. In
    the previous example, the `Car` class contains an instance field `moveSpeed`,
    implying that it can move. Now, imagine that we also have a player character that,
    too, can move. We can add `moveSpeed` to the `Player` class. However, there are
    many other movable game objects. So perhaps we should use inheritance instead
    and have an abstract class `MovableGameObject`, or better still an interface `Movable`.
    That is good and all, but what if we want an object that sometimes can move and
    sometimes cannot? For example, a car controlled by the player can move, but it
    cannot move by itself. We cannot simply remove an interface and attach it back
    when we need it. It is clear that this problem does not have a trivial solution
    using inheritance.


    The good news is that in computer science, there is typically more than one solution
    for any given problem. Inheritance is not the only tool in our arsenal. You may
    have heard the phrase “composition over inheritance.” Well, components are somewhat
    an extreme version of that. They allow us to attach fields and methods at runtime
    – how cool is that? Consider the snippet of code in Listing [3-1](#522865_1_En_3_Chapter.xhtml#PC2),
    which is an equivalent of the `Car` class, but rewritten with components:


    ```

    Entity entity = new Entity();

    entity.addComponent(new MoveSpeedComponent());

    entity.addComponent(new ColorComponent());

    // some time later we can make it immovable

    entity.removeComponent(MoveSpeedComponent.class);

    // or change a component''s value like a normal field

    entity.getComponentOptional(ColorComponent.class).ifPresent(color -> {

    color.setValue(Color.RED);

    });

    Listing 3-1

    An example of adding, removing, and accessing a component

    ```


    We can see that with components, the inheritance problem we described earlier
    becomes quite trivial to solve. This change in representation of a problem is
    a common technique in computer science. This technique allows to rephrase the
    problem in a way that is easy to solve by a known method. In addition, the approach
    that uses components isolates logic in each component. This means we can attach
    this `MoveSpeedComponent` to any entity. We can also add any number of different
    components to an entity, making this approach highly scalable. Finally, there
    is a strong adherence to the Single Responsibility principle (from SOLID principles),
    so all changes that need to modify, say, movement will take place inside a single
    component, namely, `MoveSpeedComponent`.


    When creating an entity, it is preferred to add any components that you know an
    entity is going to possess up front. Then you can enable or disable components
    as necessary. For example, `CollidableComponent` signifies that an entity can
    collide with something. Suppose we do not want our entity to be collidable when
    created. Instead of adding the component when the entity becomes collidable, we
    can simply add the component at creation and set its value to false (in Java,
    we can use `var` instead of the type of the left side to shorten the code):


    ```

    var c = new CollidableComponent();

    c.setValue(false);

    entity.addComponent(c);

    ```


    Having considered the case where a component acts as a data container, we will
    now focus on how we can use components to add behavior to entities.


    ## Components As Behavior


    Components can also carry behavior information with them, effectively allowing
    entities to obtain new methods and be able to perform new actions. In fact, we
    previously demonstrated the analogy of adding a component with data as adding
    a field to a class. Well, adding components with behavior is like adding methods.
    Components allow us to make an entity do something, thus defining entity behavior.
    Before we create a custom component, let us first consider the built-in methods
    in the `Component` class:


    *   onAdded() – This callback is called when the component is added to an entity.


    *   onRemoved() – This callback is called when the component is removed from an
    entity.


    *   onUpdate() – This callback is called every frame to allow the component to
    update its logic.


    *   pause() – Calling this method will make the component pause processing any
    updates in onUpdate().


    *   resume() – Calling this method will make the component resume processing any
    updates in onUpdate().


    Any custom class that extends from `Component` will have access to these methods.'
  trans: "\n## 实体\n\n你能想到的任何游戏对象（例如：玩家、敌人、金币、子弹、强化道具、墙壁、泥土、武器、宝箱等等）都是一个实体。就其本身而言，实体只是一个通用对象。如果不添加组件，几乎无法区分一个实体与另一个实体。组件是关键对象，它们携带数据和行为，以独特的方式定义每个实体。我们将在接下来的章节中对此进行详细阐述。\n\
    \n在 FXGL 中，有许多有用的方法可以在实体上调用。\n\n这些方法包括：\n\n*   `addComponent(Component c)` / `removeComponent(Component\
    \ c)` – 允许添加新组件和移除现有组件。\n\n*   `setProperty(String key, Object value)` – 允许向实体添加任何类型的变量。如果你不想创建新组件来存储数据，这些变量会很有用。可以通过调用\
    \ `getInt(String key)`、`getString(String key)`、`getObject(String key)` 以及其他类似方法来获取这些值。\n\
    \n*   `getComponents()` – 检索附加到实体上的所有组件列表。\n\n*   `getPosition()` / `setPosition(Point2D\
    \ p)` – 返回/设置实体在二维空间中的位置。更具体地说，该方法会请求 `TransformComponent` 提供/修改此数据（正如我们所知，实体本身不存储任何数据，只有它们的组件才存储数据）。\n\
    \n*   `translate(Point2D vector)` – 按给定的向量移动实体。更具体地说，该方法会请求 `TransformComponent`\
    \ 修改位置数据。\n\n*   `isVisible()` / `setVisible(boolean b)` – 检查实体是否正在被绘制/如果设置为 false，则实体将不会被绘制。\n\
    \n*   `getType()` / `setType(Object type)` – 允许检索/设置实体类型。通常，枚举类值被用作类型。\n\n现在我们对实体是什么以及可以在其上调用哪些方法有了更多了解，接下来我们将考虑组件。\n\
    \n## 作为数据的组件\n\n在本节中，我们将看到组件如何向实体添加数据。在 FXGL 的实体-组件模型上下文中，组件是实体的一部分。一个组件可以携带你希望实体拥有的任何数据。我们将借助在\
    \ Java 中向类定义添加实例字段的类比来说明：\n\n```\nclass Car {\n    int moveSpeed;\n    Color color;\n\
    }\n```\n\n因此，如果我们想为汽车添加一个新属性（字段），就必须修改前面的类。在游戏中，对象通常会“失去”旧属性并“获得”新属性，这意味着我们需要有能力在运行时修改前面的类，而这并非易事。\n\
    \n此外，让我们考虑使用 `Car` 类更深层次的含义。在前面的例子中，`Car` 类包含一个实例字段 `moveSpeed`，这意味着它可以移动。现在，想象一下我们还有一个玩家角色，它也可以移动。我们可以将\
    \ `moveSpeed` 添加到 `Player` 类中。然而，还有许多其他可移动的游戏对象。所以也许我们应该改用继承，并创建一个抽象类 `MovableGameObject`，或者更好的做法是使用一个接口\
    \ `Movable`。这固然很好，但如果我们想要一个有时可以移动、有时不能移动的对象呢？例如，由玩家控制的汽车可以移动，但它自身不能移动。我们不能简单地移除一个接口，然后在需要时再把它附加回去。很明显，使用继承无法简单地解决这个问题。\n\
    \n好消息是，在计算机科学中，对于任何给定的问题通常都有不止一种解决方案。继承并不是我们武器库中唯一的工具。你可能听说过“组合优于继承”这句话。嗯，组件在某种程度上是这种思想的极端版本。它们允许我们在运行时附加字段和方法——这有多酷？考虑一下代码清单\
    \ 3-1 中的代码片段，它是 `Car` 类的等价物，但用组件重写了：\n\n```\nEntity entity = new Entity();\nentity.addComponent(new\
    \ MoveSpeedComponent());\nentity.addComponent(new ColorComponent());\n// 一段时间后，我们可以让它不可移动\n\
    entity.removeComponent(MoveSpeedComponent.class);\n// 或者像普通字段一样更改组件的值\nentity.getComponentOptional(ColorComponent.class).ifPresent(color\
    \ -> {\n    color.setValue(Color.RED);\n});\n代码清单 3-1\n添加、移除和访问组件的示例\n```\n\n\
    我们可以看到，使用组件，我们之前描述的继承问题变得非常容易解决。这种问题表示方式的改变是计算机科学中的一种常用技术。这种技术允许以一种易于通过已知方法解决的方式重新表述问题。此外，使用组件的方法将逻辑隔离在每个组件中。这意味着我们可以将这个\
    \ `MoveSpeedComponent` 附加到任何实体上。我们还可以向一个实体添加任意数量的不同组件，这使得这种方法具有高度的可扩展性。最后，它严格遵守单一职责原则（来自\
    \ SOLID 原则），因此所有需要修改（例如，移动）的更改都将发生在一个单独的组件内，即 `MoveSpeedComponent`。\n\n在创建实体时，最好预先添加你知道实体将拥有的所有组件。然后，你可以根据需要启用或禁用组件。例如，`CollidableComponent`\
    \ 表示一个实体可以与其他物体碰撞。假设我们不希望实体在创建时可碰撞。与其在实体变得可碰撞时再添加组件，不如在创建时直接添加组件并将其值设置为 false（在\
    \ Java 中，我们可以使用 `var` 代替左侧的类型来缩短代码）：\n\n```\nvar c = new CollidableComponent();\n\
    c.setValue(false);\nentity.addComponent(c);\n```\n\n在考虑了组件作为数据容器的情况之后，我们现在将重点讨论如何使用组件向实体添加行为。\n\
    \n## 作为行为的组件\n\n组件也可以携带行为信息，从而有效地让实体获得新方法并能够执行新操作。事实上，我们之前演示了将带有数据的组件类比为向类添加字段。嗯，添加带有行为的组件就像添加方法。组件允许我们让实体做一些事情，从而定义实体的行为。在我们创建自定义组件之前，让我们先考虑一下\
    \ `Component` 类中的内置方法：\n\n*   `onAdded()` – 当组件被添加到实体时，会调用此回调函数。\n\n*   `onRemoved()`\
    \ – 当组件从实体中移除时，会调用此回调函数。\n\n*   `onUpdate()` – 每帧都会调用此回调函数，以允许组件更新其逻辑。\n\n*  \
    \ `pause()` – 调用此方法将使组件暂停处理 `onUpdate()` 中的任何更新。\n\n*   `resume()` – 调用此方法将使组件恢复处理\
    \ `onUpdate()` 中的任何更新。\n\n任何继承自 `Component` 的自定义类都可以访问这些方法。\n"
- fmt: '### Custom Components


    Suppose we want entity to be a lift so that it can carry the player to the top
    of a mountain. As previously seen, adding such a component to an entity is trivial:


    ```

    entity.addComponent(new LiftComponent());

    ```


    Now we will consider how one might implement such a `LiftComponent`. Each component
    has an `onUpdate()` method that can be overridden to provide the necessary functionality
    (recall from Chapter [2](#522865_1_En_2_Chapter.xhtml) that such overrides are
    annotated with `@Override`). Using this approach, we can construct the piece of
    code shown in Listing [3-2](#522865_1_En_3_Chapter.xhtml#PC5) that will allow
    us to turn any entity into a lift.


    ```

    public class LiftComponent extends Component {

    LocalTimer timer = ...;

    boolean isGoingUp = true;

    double speed = ...;

    @Override

    public void onUpdate(double tpf) {

    if (timer.elapsed(duration)) {

    isGoingUp = ! isGoingUp;

    timer.capture();

    }

    entity.translateY(isGoingUp? -speed * tpf : speed * tpf);

    }

    }

    Listing 3-2

    An example of a custom component

    ```


    You will note that we do not need to initialize the reference to the “entity”
    object. It is automatically injected into the component when we add it to an entity.
    This FXGL feature significantly simplifies the developer code. Another similar
    feature that avoids extra boilerplate code is component injection.


    ### Component Injection


    The common use case for automated component injection is when you have two components,
    namely, `Component1` and `Component2`, such that `Component2` needs to have a
    reference to `Component1`:


    ```

    class Component1 extends Component {}

    class Component2 extends Component {

    private Component1 comp;

    }

    ```


    In this case, you do not need to manually obtain a reference to `Component1` in
    your `Component2` class. The object will be automatically injected into the “comp”
    field by FXGL during component addition. It is important to note that `Component2`
    requires `Component1` to be present on the entity since it is a dependency. The
    check for required components is performed during component addition, so it is
    crucial to ensure that all required components are added first. In this case,
    `Component1` should be added before `Component2`; otherwise, FXGL will raise an
    exception.


    Let us see how such an injection works in practice. For instance, Listing [3-3](#522865_1_En_3_Chapter.xhtml#PC7)
    shows a very simple player component with methods `up()`, `down()`, `left()`,
    and `right()` that allow basic movement of the entity to which the component will
    be attached.


    ```

    public class PlayerComponent extends Component {

    // note that this component is injected automatically

    private TransformComponent position;

    private double speed = 0;

    @Override

    public void onUpdate(double tpf) {

    speed = tpf * 60;

    }

    public void up() {

    position.translateY(-5 * speed);

    }

    public void down() {

    position.translateY(5 * speed);

    }

    public void left() {

    position.translateX(-5 * speed);

    }

    public void right() {

    position.translateX(5 * speed);

    }

    }

    Listing 3-3

    A possible implementation of the custom PlayerComponent class

    ```


    We can see that the `position` component field does not need to be initialized
    by the developer. It will be automatically injected by FXGL, thus reducing the
    amount of code.


    Now that we are familiar with entities and components, it is time to focus on
    the game world, which is where entities spend most of their life cycle.


    ## Game World


    In this section, we will explore the game world and its significance in effective
    entity storage and query. The game world is, essentially, a data structure that
    contains entities. It is also responsible for adding, updating, and removing entities
    from the game. Finally, the game world provides means of querying (searching the
    world for) entities by various criteria. For example, you can collect all enemy
    entities, so you can boost their attributes when the player levels up.


    Adding an entity to the world also adds it to the game. Similarly, to remove an
    entity from the game, all you need to do is to remove it from the world. Entities
    that are currently in the game world are considered to be active – their `isActive()`
    method will return true. Let us create a simple entity and add it to the game
    world. The game world in FXGL can be obtained by calling


    ```

    var world = FXGL.getGameWorld();

    ```


    To add an entity, `e`, to it, we can call


    ```

    world.addEntity(e);

    ```


    Finally, to remove the entity, we can call


    ```

    world.removeEntity(e);

    ```


    We are now able to add and remove entities as necessary, so our attention moves
    to game world queries.


    ### World Queries


    There are various ways to search for entities within the world. Typically, such
    methods begin with “get”. For example, `getEntitiesByType()`. We will consider,
    in turn, querying entities by


    *   **Type** (requires `TypeComponent`) – Suppose we have an enum called `EntityType`
    that contains valid types for entities in your game. It might be that you wish
    to obtain all enemies in the game, so that you can apply a power-up to them, as
    a way to increase the game difficulty. This can easily be done by calling


    *   **ID** (requires `IDComponent`) – Suppose you might allow copies of entities.
    This is especially useful for RPG-type games, where you have a lot of duplicates
    of items. So maybe we placed multiple forges in the game world and assigned a
    unique `IDComponent` to each forge. While the name is the same, "Forge", its numeric
    ID is different. The following code allows you to obtain a reference to a specific
    forge in the game:


    ```

    var enemies = world.getEntitiesByType(EntityType.ENEMY);

    ```


    *   **Singleton** – There are many cases where there is just one entity of a given
    type, such as the player. It can be troublesome to go through a list of entities
    to get the one we want. So FXGL provides a nice utility query for that:


    ```

    var forge123 = world.getEntityByID("Forge", 123);

    ```


    *   **Random** – In gameplay, it is common to introduce some elements of randomness.
    If you wish to blow up a random enemy, you can get a random enemy entity via


    ```

    var player = world.getSingleton(EntityType.PLAYER);

    ```


    *   **Component** – Some in-game logic should only be executed on entities that
    have certain components. An easy way to grab all entities with a given component
    is as follows:


    ```

    var enemy = world.getRandom(EntityType.ENEMY);

    ```


    *   **Range** – Gameplay logic, such as triggering an interaction with an entity
    or dealing damage to entities in a radius, can be implemented by querying entities
    in a specific range. For example, to achieve this, we can call the following method
    to obtain all entities that fall inside a given rectangle (either fully or partially):


    ```

    var entsWithComponent = world.getEntitiesByComponent(MyComponent.class);

    ```


    *   **Filter** – Finally, we can query entities in a general way by using a custom
    filter. The filter is essentially a function that given an entity returns true
    or false. If the result is true, then that entity will be added to the list to
    be returned:


    ```

    var entitiesNearby = world.getEntitiesInRange(new Rectangle2D(5, 5, 30, 30));

    ```


    ```

    var entsWithHP10 = world.getEntitiesFiltered(e -> e.getInt("hp") == 10);

    ```


    This completes the overview of the game world and its common functionality related
    to storing and querying entities. We will now focus on making use of these concepts
    in a Pong clone.'
