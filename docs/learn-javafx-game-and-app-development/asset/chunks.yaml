  trans: '

    ## 底层渲染与视口


    视口是通往游戏世界的窗口，也是用户看到的可见区域。实际上，FXGL 中的视口承担了摄像头的职责。当构建的游戏世界大于单个屏幕时，FXGL 允许调整视口，以便“摄像头”可以移动，显示游戏世界的其他部分。你可以通过以下方式获取视口的引用：


    ```

    Viewport viewport = getGameScene().getViewport();

    ```


    你可以通过调用以下方法手动更改视口的 x 和 y 值：


    ```

    viewport.setX(...);

    viewport.setY(...);

    ```


    虽然你可以使用 JavaFX 的 X 和 Y 属性来绑定到任何实体的 X 和 Y，但 API 提供了一个内置方法来绑定视口，使其自动跟随实体：


    ```

    Entity player = ...;

    // distX, distY 定义了原点与实体之间的距离

    viewport.bindToEntity(player, distX, distY);

    ```


    当视口跟随玩家时，它可能会超出关卡边界。你可以设置视口可以“游荡”的边界范围：


    ```

    viewport.setBounds(minX, minY, maxX, maxY);

    ```


    使用这种方法，你可以确保视口始终渲染游戏边界内的视图。


    我们已经了解了如何通过保留模式和立即模式进行高级绘制，包括如何使用视口修改屏幕的可见区域。然而，在底层，大致了解像素如何运作以及绘制单个像素需要哪些信息也很重要。单个像素的颜色可以用
    RGBA 对象表示，其中字母分别代表红色、绿色、蓝色和 Alpha 通道。根据每个通道值的表示方式，它可以是 0.0 到 1.0 之间的浮点数范围，也可以是
    0 到 255 之间的整数。通过组合红色、绿色和蓝色的值，可以构建出一系列颜色。最终结果还由 Alpha 通道决定，其中 0.0（或 0）表示颜色完全透明（实际上不可见），1.0（或
    255）表示颜色完全不透明。此范围内的任何值都提供一定程度的透明度，使得可以看穿这个特定像素。通过使用不同透明度值的组合，可以实现许多视觉上吸引人的效果，例如图
    6-3 中所示的效果，其中多个椭圆形重叠，每个椭圆形都以自己的不透明度绘制。


    ![](img/522865_1_En_6_Fig3_HTML.jpg)


    一个视觉效果截图，通过重叠多个具有不同不透明度的椭圆形创建。


    图 6-3


    叠加多个具有不同不透明度（Alpha 通道值）的像素


    当像素重叠时，最终颜色通过混合模式确定。混合可以描述为一个函数，它接收两个像素——底部已经绘制好的像素和顶部即将绘制的像素——并返回组合后的颜色。由于该函数可以自由实现任何混合两种颜色以获得最终颜色的方式，因此可能存在无限多种混合函数，尽管有些（如
    `SRC_OVER` 和 `ADD`）比其他函数更常见。例如，JavaFX 使用的默认混合函数称为 `SRC_OVER`，它简单地返回顶部颜色。`ADD`
    混合函数将两种颜色相加并返回结果。在 FXGL 中，`Texture` 类提供了一系列这些混合函数，由于它们作用于底层图像数据，因此没有渲染开销。但是，如果你需要动态混合，仍然可以使用
    JavaFX 的 `BlendMode`，但如果节点数量很大，它可能会很耗费资源。


    现在我们已经了解了像素的最终颜色是如何处理的，渲染堆栈的最后一部分是如何将所有像素信息显示到屏幕上。最终，这些像素将由特定于目标平台（应用程序运行所在的平台）的后端实现来绘制。我们已经看到，JavaFX
    管道提供了一组可用于实现高性能渲染的高级 API。这些 API 由一系列平台特定的本地代码类实现。渲染背后使用的技术包括 Windows 上的 Direct3D、macOS
    和 Linux 上的 OpenGL，以及移动和嵌入式设备（如树莓派）上的 OpenGL ES。该堆栈的可视化表示见图 6-4。macOS 上的现代图形实现也利用
    Metal 进行精细调整的性能优化。


    ![](img/522865_1_En_6_Fig4_HTML.jpg)


    一个组织结构图。Java F X A P I 被分类为 Direct 3 D、Open G L、Open G L E S。Direct 3 D 用于 Windows。Open
    G L 用于 Mac O S 和 Linux。Open G L E S 用于 Android、I O S、嵌入式设备。


    图 6-4


    不同的 JavaFX 渲染后端


    至此，我们完成了对 FXGL 渲染管线的概述，接下来将介绍可以使用此管线生成的视觉效果。


    ## 视觉效果系统


    FXGL 中存在许多系统，允许使用视觉上吸引人的效果。所有这些系统都建立在上述渲染堆栈之上，并提供用户友好的 API 来访问所需功能。常用的系统包括粒子系统、动画系统和插值系统，以下小节将对它们进行详细说明。

    '
- fmt: '### Particle System


    Particle effects are a set of visual effects where each individual view is called
    a particle. These effects are typically colorful and dynamic, so they can easily
    bring any gameplay element to life. In FXGL (and other engines), a system that
    controls all particles and their behavior is called a particle system. A particle
    can be represented by a small geometric (possibly textured) object with certain
    properties, such as velocity, acceleration, scale, lifetime, opacity, and many
    others. Finally, a particle emitter is the construct that configures how and when
    particles are created. A single particle, when drawn, may appear just like any
    other ordinary game object. However, when drawn in large quantities, these particles
    can create extraordinary visual effects, such as the effect seen in Figure [6-5](#522865_1_En_6_Chapter.xhtml#Fig5).


    ![](images/522865_1_En_6_Chapter/522865_1_En_6_Fig5_HTML.jpg)


    A screenshot of a visual effect, which is created by particles in large quantities.


    **Figure 6-5** An example of a particle effect in FXGL


    The common approach of using a particle system in FXGL involves taking a stock
    emitter (there are several built-in emitters provided by FXGL in the `ParticleEmitters`
    class) and configuring it as needed to produce the desirable visual effect. A
    particle emitter is not a graphical object in itself; hence, it requires a “bridge”
    to be added to the FXGL scene graph. There are two such bridges: `ParticleComponent`
    and `ParticleSystem`. As you may have guessed, the former allows attaching an
    emitter to an entity, thus adding the emitter to the game layer, whereas the latter
    attaches the emitter to the UI layer.


    Configuring an emitter is generally straightforward. For example, the emitter
    in Listing [6-1](#522865_1_En_6_Chapter.xhtml#PC14) uses an existing explosion
    emitter configuration and sets the number of maximum emissions to 2, sets the
    number of particles per emission to 50, and, finally, sets the emission rate to
    0.5 (1 means every frame; 0.5 is every two frames). In practice, the emitter will
    fire twice: once in the first frame and once more after skipping a frame. In each
    emission, there will be 50 particles. As can be seen from Listing [6-1](#522865_1_En_6_Chapter.xhtml#PC14),
    various other properties can be set, so the reader is encouraged to play with
    these settings to see their impact on the visuals.


    ```

    var emitter = ParticleEmitters.newExplosionEmitter(300);

    emitter.setMaxEmissions(2);

    emitter.setNumParticles(50);

    emitter.setEmissionRate(0.5);

    emitter.setSize(1, 24);

    emitter.setScaleFunction(i -> FXGLMath.randomPoint2D());

    emitter.setExpireFunction(i -> Duration.seconds(2.5));

    emitter.setAccelerationFunction(() -> Point2D.ZERO);

    emitter.setBlendMode(BlendMode.ADD);

    // ... other properties

    ```


    **Listing 6-1** Configuring a particle emitter


    Once the emitter is configured, we can use the `ParticleComponent` to make the
    emitter part of the game:


    ```

    var e = new Entity();

    e.addComponent(new ParticleComponent(emitter));

    ```


    Adding `e` to the game world will also automatically add the particle effect to
    the FXGL scene graph, thus making it visible in the game. Similarly, to remove
    the particle effect from the game, all we need to do is remove the entity (to
    which the effect is attached) from the world.


    ### Animation System


    In addition to particle effects, there are other ways to bring any static images
    to life. We now cover various ways to animate visual objects. Animations are a
    common part of any dynamic game element or visually appealing user interface.
    Fundamentally, an animation is a change of some value over time. If the value
    we are changing directly affects any visible properties, then what we see on the
    screen becomes dynamic. Commonly used animations fall into one of these categories:


    *   Translation (changing the position of an object along the X, Y, or Z axis)

    *   Rotation (changing the angle of an object along the X, Y, or Z axis)

    *   Scale (changing the size of an object along the X, Y, or Z axis)

    *   Opacity (changing the transparency of an object between 0 and 100%)

    *   Color (changing the RGBA value of an object)

    *   Custom (changing the custom property of an object)


    Let us consider the example in Listing [6-2](#522865_1_En_6_Chapter.xhtml#PC16).
    In the example, we have a standard JavaFX `Rectangle` (though you can also use
    an entity), which we are going to translate along the X axis. As with the entity
    builder that you are familiar with, we can use the animation builder to simplify
    the animation construction. Once we have a reference to the builder via `animationBuilder()`,
    we can set the duration of the single cycle, the number of times to repeat the
    animation, and whether it should reverse itself during alternate cycles. Next,
    we decide which one of the categories mentioned previously we would like to use
    for the animation. Since we selected translation, in Listing [6-2](#522865_1_En_6_Chapter.xhtml#PC16),
    we call `translate()`, which in turn allows us to configure the animation further
    with specific properties, such as the `from` and `to` points. Finally, we call
    `buildAndPlay()`, which, as the name implies, will build the animation and start
    playing. By default, the animation is played inside in the game scene. If you
    need to change the scene in which the animation is executed, for example, a menu
    scene, then you can simply pass the reference to your scene object when calling
    the animation builder. To build other animation types, appropriate methods exist,
    such as `rotate()`, `scale()`, `fade()`, and other more generic ones, such as
    `animate()`.


    ```

    var node = new Rectangle();

    animationBuilder()

    .duration(Duration.seconds(2.0))

    .repeat(2)

    .autoReverse(true)

    .translate(node)

    .from(new Point2D(0.0, 100.0))

    .to(new Point2D(200.0, 100.0))

    .buildAndPlay();

    ```


    **Listing 6-2** Animating a JavaFX node'
  raw: '### Particle System


    Particle effects are a set of visual effects where each individual view is called
    a particle. These effects are typically colorful and dynamic, so they can easily
    bring any gameplay element to life. In FXGL (and other engines), a system that
    controls all particles and their behavior is called a particle system. A particle
    can be represented by a small geometric (possibly textured) object with certain
    properties, such as velocity, acceleration, scale, lifetime, opacity, and many
    others. Finally, a particle emitter is the construct that configures how and when
    particles are created. A single particle, when drawn, may appear just like any
    other ordinary game object. However, when drawn in large quantities, these particles
    can create extraordinary visual effects, such as the effect seen in Figure [6-5](#522865_1_En_6_Chapter.xhtml#Fig5).


    ![](images/522865_1_En_6_Chapter/522865_1_En_6_Fig5_HTML.jpg)


    A screenshot of a visual effect, which is created by particles in large quantities.


    Figure 6-5


    An example of a particle effect in FXGL


    The common approach of using a particle system in FXGL involves taking a stock
    emitter (there are several built-in emitters provided by FXGL in the `ParticleEmitters`
    class) and configuring it as needed to produce the desirable visual effect. A
    particle emitter is not a graphical object in itself; hence, it requires a “bridge”
    to be added to the FXGL scene graph. There are two such bridges: `ParticleComponent`
    and `ParticleSystem`. As you may have guessed, the former allows attaching an
    emitter to an entity, thus adding the emitter to the game layer, whereas the latter
    attaches the emitter to the UI layer.


    Configuring an emitter is generally straightforward. For example, the emitter
    in Listing [6-1](#522865_1_En_6_Chapter.xhtml#PC14) uses an existing explosion
    emitter configuration and sets the number of maximum emissions to 2, sets the
    number of particles per emission to 50, and, finally, sets the emission rate to
    0.5 (1 means every frame; 0.5 is every two frames). In practice, the emitter will
    fire twice: once in the first frame and once more after skipping a frame. In each
    emission, there will be 50 particles. As can be seen from Listing [6-1](#522865_1_En_6_Chapter.xhtml#PC14),
    various other properties can be set, so the reader is encouraged to play with
    these settings to see their impact on the visuals.


    ```

    var emitter = ParticleEmitters.newExplosionEmitter(300);

    emitter.setMaxEmissions(2);

    emitter.setNumParticles(50);

    emitter.setEmissionRate(0.5);

    emitter.setSize(1, 24);

    emitter.setScaleFunction(i -> FXGLMath.randomPoint2D());

    emitter.setExpireFunction(i -> Duration.seconds(2.5));

    emitter.setAccelerationFunction(() -> Point2D.ZERO);

    emitter.setBlendMode(BlendMode.ADD);

    // ... other properties

    Listing 6-1

    Configuring a particle emitter

    ```


    Once the emitter is configured, we can use the `ParticleComponent` to make the
    emitter part of the game:


    ```

    var e = new Entity();

    e.addComponent(new ParticleComponent(emitter);

    ```


    Adding `e` to the game world will also automatically add the particle effect to
    the FXGL scene graph, thus making it visible in the game. Similarly, to remove
    the particle effect from the game, all we need to do is remove the entity (to
    which the effect is attached) from the world.


    ### Animation System


    In addition to particle effects, there are other ways to bring any static images
    to life. We now cover various ways to animate visual objects. Animations are a
    common part of any dynamic game element or visually appealing user interface.
    Fundamentally, an animation is a change of some value over time. If the value
    we are changing directly affects any visible properties, then what we see on the
    screen becomes dynamic. Commonly used animations fall into one of these categories:


    *   Translation (changing the position of an object along the X, Y, or Z axis)


    *   Rotation (changing the angle of an object along the X, Y, or Z axis)


    *   Scale (changing the size of an object along the X, Y, or Z axis)


    *   Opacity (changing the transparency of an object between 0 and 100%)


    *   Color (changing the RGBA value of an object)


    *   Custom (changing the custom property of an object)


    Let us consider the example in Listing [6-2](#522865_1_En_6_Chapter.xhtml#PC16).
    In the example, we have a standard JavaFX `Rectangle` (though you can also use
    an entity), which we are going to translate along the X axis. As with the entity
    builder that you are familiar with, we can use the animation builder to simplify
    the animation construction. Once we have a reference to the builder via `animationBuilder()`,
    we can set the duration of the single cycle, the number of times to repeat the
    animation, and whether it should reverse itself during alternate cycles. Next,
    we decide which one of the categories mentioned previously we would like to use
    for the animation. Since we selected translation, in Listing [6-2](#522865_1_En_6_Chapter.xhtml#PC16),
    we call `translate()`, which in turn allows us to configure the animation further
    with specific properties, such as the `from` and `to` points. Finally, we call
    `buildAndPlay()`, which, as the name implies, will build the animation and start
    playing. By default, the animation is played inside in the game scene. If you
    need to change the scene in which the animation is executed, for example, a menu
    scene, then you can simply pass the reference to your scene object when calling
    the animation builder. To build other animation types, appropriate methods exist,
    such as `rotate()`, `scale()`, `fade()`, and other more generic ones, such as
    `animate()`.


    ```

    var node = new Rectangle();

    animationBuilder()

    .duration(Duration.seconds(2.0))

    .repeat(2)

    .autoReverse(true)

    .translate(node)

    .from(new Point2D(0.0, 100.0))

    .to(new Point2D(200.0, 100.0))

    .buildAndPlay();

    Listing 6-2

    Animating a JavaFX node

    ```'
  trans: '

    ### 粒子系统


    粒子效果是一组视觉效果，其中每个独立的视图被称为一个粒子。这些效果通常色彩丰富且富有动感，因此能轻松让任何游戏元素变得生动。在 FXGL（以及其他引擎）中，控制所有粒子及其行为的系统被称为粒子系统。一个粒子可以由一个微小的几何（可能带有纹理）对象来表示，并具有某些属性，例如速度、加速度、缩放、生命周期、不透明度等等。最后，粒子发射器是一种构造，用于配置粒子如何以及何时被创建。单个粒子在绘制时，可能看起来就像任何其他普通的游戏对象。然而，当大量绘制时，这些粒子可以创造出非凡的视觉效果，例如图
    6-5 中所示的效果。


    ![](img/522865_1_En_6_Fig5_HTML.jpg)


    一张由大量粒子创建的视觉效果截图。


    图 6-5


    FXGL 中粒子效果的一个示例


    在 FXGL 中使用粒子系统的常见方法包括：获取一个内置发射器（FXGL 在 `ParticleEmitters` 类中提供了几个内置发射器），然后根据需要进行配置，以产生所需的视觉效果。粒子发射器本身不是一个图形对象；因此，它需要一个“桥梁”才能被添加到
    FXGL 的场景图中。有两个这样的桥梁：`ParticleComponent` 和 `ParticleSystem`。你可能已经猜到，前者允许将发射器附加到一个实体上，从而将发射器添加到游戏层，而后者则将发射器附加到
    UI 层。


    配置发射器通常很简单。例如，代码清单 6-1 中的发射器使用了一个现有的爆炸发射器配置，并将最大发射次数设置为 2，每次发射的粒子数设置为 50，最后，将发射率设置为
    0.5（1 表示每帧发射一次；0.5 表示每两帧发射一次）。在实践中，该发射器将发射两次：第一次在第一帧，第二次在跳过一个帧之后。每次发射将产生 50 个粒子。从
    代码清单 6-1 中可以看出，还可以设置各种其他属性，因此鼓励读者尝试这些设置，以观察它们对视觉效果的影响。


    ```

    var emitter = ParticleEmitters.newExplosionEmitter(300);

    emitter.setMaxEmissions(2);

    emitter.setNumParticles(50);

    emitter.setEmissionRate(0.5);

    emitter.setSize(1, 24);

    emitter.setScaleFunction(i -> FXGLMath.randomPoint2D());

    emitter.setExpireFunction(i -> Duration.seconds(2.5));

    emitter.setAccelerationFunction(() -> Point2D.ZERO);

    emitter.setBlendMode(BlendMode.ADD);

    // ... 其他属性

    代码清单 6-1

    配置粒子发射器

    ```


    一旦发射器配置完成，我们可以使用 `ParticleComponent` 使发射器成为游戏的一部分：


    ```

    var e = new Entity();

    e.addComponent(new ParticleComponent(emitter);

    ```


    将 `e` 添加到游戏世界也会自动将粒子效果添加到 FXGL 场景图中，从而使其在游戏中可见。类似地，要从游戏中移除粒子效果，我们只需要从世界中移除该实体（效果所附加到的实体）。


    ### 动画系统


    除了粒子效果之外，还有其他方法可以让任何静态图像变得生动。我们现在介绍各种为视觉对象添加动画的方法。动画是任何动态游戏元素或视觉上吸引人的用户界面的常见组成部分。从根本上说，动画是某个值随时间的变化。如果我们改变的值直接影响任何可见属性，那么我们在屏幕上看到的内容就会变得动态。常用的动画属于以下类别之一：


    *   平移（沿 X、Y 或 Z 轴改变对象的位置）

    *   旋转（沿 X、Y 或 Z 轴改变对象的角度）

    *   缩放（沿 X、Y 或 Z 轴改变对象的大小）

    *   不透明度（在 0% 到 100% 之间改变对象的透明度）

    *   颜色（改变对象的 RGBA 值）

    *   自定义（改变对象的自定义属性）


    让我们考虑 代码清单 6-2 中的示例。在这个例子中，我们有一个标准的 JavaFX `Rectangle`（尽管你也可以使用一个实体），我们将沿 X 轴平移它。与你熟悉的实体构建器一样，我们可以使用动画构建器来简化动画的构建。一旦通过
    `animationBuilder()` 获得了构建器的引用，我们就可以设置单个周期的持续时间、动画重复的次数，以及在交替周期中是否应该自动反转。接下来，我们决定要使用前面提到的哪个类别来制作动画。由于我们选择了平移，在
    代码清单 6-2 中，我们调用了 `translate()`，它进而允许我们使用特定属性（例如 `from` 和 `to` 点）进一步配置动画。最后，我们调用
    `buildAndPlay()`，顾名思义，它将构建动画并开始播放。默认情况下，动画在游戏场景内播放。如果你需要更改执行动画的场景，例如菜单场景，那么你可以在调用动画构建器时简单地传递对场景对象的引用。要构建其他动画类型，存在相应的方法，例如
    `rotate()`、`scale()`、`fade()`，以及其他更通用的方法，例如 `animate()`。


    ```

    var node = new Rectangle();

    animationBuilder()

    .duration(Duration.seconds(2.0))

    .repeat(2)

    .autoReverse(true)

    .translate(node)

    .from(new Point2D(0.0, 100.0))

    .to(new Point2D(200.0, 100.0))

    .buildAndPlay();

    代码清单 6-2

    为 JavaFX 节点添加动画

    ```

    '
- fmt: '### Interpolation System


    If an animation is a change of value, then interpolation (also known as easing
    or tweening) is the rate of this change. For example, suppose you have a fade-out
    animation that changes the opacity of the player entity from `1.0` to `0.0` over
    two seconds. By default, FXGL uses the linear interpolator, which means each second
    the animation will progress by the same amount. So, if it takes two seconds to
    go from `1.0` to `0.0`, then it is readily seen that after one second, the player’s
    opacity will be `0.5`. If we use any nonlinear interpolator, then we will experience
    a different rate of the animation, so after one second, the opacity value may
    be greater or less than `0.5`. Visually, this means the player will fade out slower
    or quicker.


    We should note that using different interpolators does not change the start and
    end values, or the duration of the animation. Instead, an interpolator will affect
    the values that are computed during the animation. Effectively, interpolation
    is a ratio between time and progress, where the linear interpolator simply provides
    the ratio of 1:1, that is, 50% of time passed equals to 50% of progress completed.
    Thus, an interpolator can readily be represented as a function:


    ```

    double interpolate(double time) {

    double progress = ...

    return progress;

    }

    ```


    This function can convert the time value between 0 and 1 into a progress value
    (in the same range) using any arbitrary mathematical operation. You can see the
    results of common interpolators (which are already provided by FXGL) in Figure
    [6-6](#522865_1_En_6_Chapter.xhtml#Fig6). The animation of the bird entity translates
    it from the left side to the right over two seconds. When the time value is 0,
    all bird entities, regardless of their interpolators, will start on the left,
    and when the time is 1, they will all finish at the same location (along the X
    axis) on the right. The figure shows the time value close to 0.4.


    ![](images/522865_1_En_6_Chapter/522865_1_En_6_Fig6_HTML.jpg)


    A graph depicts the effects of different interpolators with a time value close
    to 0.4. For elastic and back, the bird entity is closer to the end of x axis.
    For linear and smooth, the bird entity is closer to the start of x axis. For quadratic,
    cubic, quartic, quintic, exponential, sine, circular, and bounce, the bird entity
    is between them.


    **Figure 6-6** Effects of different interpolators on the animation progress


    As a final remark, it should be noted that from the animation point of view, there
    is no difference between a JavaFX node and an FXGL entity. Hence, the API for
    both is the same. On this remark, we complete our overview of the FXGL visual
    systems.


    ## Summary


    In this chapter, we looked at rendering basics and how they are implemented in
    FXGL. We saw how to add standard JavaFX controls to the FXGL UI and how the UI
    layer is separated from the game layer. Using JavaFX controls an important feature
    as it demonstrates that JavaFX developers do not need to learn new API and can
    use what they know straight away. We saw how to construct complex visual effects
    with the particle system and configure them to fit our game. Finally, we covered
    how to animate game and UI elements and how to configure animations with interpolators.
    The key-takeaway message from this chapter is that although graphics theory can
    be a significantly complex topic, high-level abstractions in JavaFX and FXGL allow
    developers to fully utilize the rendering capabilities of the target platform
    without the need to access low-level implementation details.


    # General-Purpose Applications and Packaging


    This chapter is dedicated for general-purpose (nongame) applications that can
    be developed using FXGL. These include business applications, graphical editors,
    and visualization tools. At a high level, a game application is not very different
    from a front-end business application. They both run in an infinite loop until
    the user exits the application. They both take input, update the application state,
    and finally render the state to the screen. To demonstrate that FXGL can be used
    for developing both game and nongame applications, we will cover:


    *   An application with a login screen and business logic

    *   A graph data visualizer

    *   A simple representation of our solar system in 3D


    We will also cover the packaging and cross-platform deployment of JavaFX and FXGL
    applications, including games, to end users. This simplifies the process of running
    the end-user application and can be achieved by using the OpenJFX and the GluonFX
    Maven plug-ins.'
