  trans: '

    ### 构建应用程序类


    最后，将 Pong 游戏所有部分整合在一起的类是 `PongApp`。这里我们将详细讨论这个类，但随着你阅读本书后续章节，我们通常会省略那些琐碎的细节，因为这些内容在前几章中已经介绍过了。


    和之前一样，我们首先处理所有导入语句，如代码清单 3-8 所示。


    ```

    import com.almasb.fxgl.animation.Interpolators;

    import com.almasb.fxgl.app.GameApplication;

    import com.almasb.fxgl.app.GameSettings;

    import com.almasb.fxgl.core.math.FXGLMath;

    import com.almasb.fxgl.entity.Entity;

    import com.almasb.fxgl.entity.SpawnData;

    import com.almasb.fxgl.input.UserAction;

    import com.almasb.fxgl.physics.CollisionHandler;

    import com.almasb.fxgl.physics.HitBox;

    import com.almasb.fxgl.ui.UI;

    import javafx.scene.input.KeyCode;

    import javafx.scene.paint.Color;

    import javafx.util.Duration;

    import java.util.Map;

    import static com.almasb.fxgl.dsl.FXGL.*;

    代码清单 3-8

    PongApp 类导入语句

    ```


    接下来，我们将创建继承自 `GameApplication` 的 `PongApp` 类。该代码片段如代码清单 3-9 所示。我们将提供基本设置，例如游戏的标题和版本。回想一下，游戏宽度和高度默认自动设置为
    800×600；不过，你可以根据需要设置自己的值。我们还会在 `main` 方法中添加游戏的入口点。


    ```

    public class PongApp extends GameApplication {

    @Override

    protected void initSettings(GameSettings settings) {

    settings.setTitle("Pong");

    settings.setVersion("1.0");

    }

    public static void main(String[] args) {

    launch(args);

    }

    }

    代码清单 3-9

    PongApp 类继承自 GameApplication

    ```


    我们需要在整个游戏过程中访问玩家球拍，以便控制它。因此，创建一个实例级变量来存储玩家球拍组件是合理的：


    ```

    private BatComponent playerBat;

    ```


    一旦我们有了玩家球拍的引用，我们就希望能够上下移动它。换句话说，我们需要输入处理，这将在 `initInput()` 中处理，如代码清单 3-10 所示。你可以看到，我们没有使用前一章介绍的简单输入处理方式，而是通过
    `getInput()` 方法采用了一种稍微复杂的方法。使用这个扩展 API 的好处是，我们可以使用 `onActionBegin()`、`onAction()`
    和 `onActionEnd()` 回调函数，它们分别在按键首次按下（动作开始）、按住（动作中）和释放（动作结束）时触发。


    ```

    @Override

    protected void initInput() {

    getInput().addAction(new UserAction("Up") {

    @Override

    protected void onAction() {

    playerBat.up();

    }

    @Override

    protected void onActionEnd() {

    playerBat.stop();

    }

    }, KeyCode.W);

    getInput().addAction(new UserAction("Down") {

    @Override

    protected void onAction() {

    playerBat.down();

    }

    @Override

    protected void onActionEnd() {

    playerBat.stop();

    }

    }, KeyCode.S);

    }

    代码清单 3-10

    PongApp 类输入处理

    ```


    正如我们所见，我们的输入非常简单——我们只需要 W 和 S 键来让玩家球拍上下移动。`onAction()` 回调在按键被按住时调用，而 `onActionEnd()`
    在按键释放时调用。这些调用正是我们让球拍移动或停止所需要的。


    我们还需要跟踪玩家和敌人（或玩家 2）的得分。我们可以通过创建 FXGL 变量来实现这一点。回想一下，它们几乎就像你在 Java 中创建的普通变量，但具有额外的功能，例如能够监听其变化并绑定到它们。本质上，FXGL
    变量就像 JavaFX 属性。在代码清单 3-11 中，我们创建了两个 FXGL 变量：`player1score` 和 `player2score`，两者都初始化为
    0。稍后，在 `initGame()` 中（同样在代码清单 3-11 中），我们监听这些变量的变化，并根据值宣布获胜者——需要得 11 分才能赢得游戏。


    ```

    @Override

    protected void initGameVars(Map vars) {

    vars.put("player1score", 0);

    vars.put("player2score", 0);

    }

    @Override

    protected void initGame() {

    getWorldProperties().addListener("player1score", (old, newScore) -> {

    if (newScore == 11) {

    showGameOver("Player 1");

    }

    });

    getWorldProperties().addListener("player2score", (old, newScore) -> {

    if (newScore == 11) {

    showGameOver("Player 2");

    }

    });

    getGameWorld().addEntityFactory(new PongFactory());

    getGameScene().setBackgroundColor(Color.rgb(0, 0, 5));

    initScreenBounds();

    initGameObjects();

    }

    代码清单 3-11

    初始化游戏和变量

    ```


    此外，我们还添加了之前实现的 `PongFactory`，并将游戏背景颜色设置为 RGB 0, 0, 5，这非常接近黑色。`initGame()` 中有三个方法我们还没有介绍：`showGameOver()`、`initScreenBounds()`
    和 `initGameObjects()`。你应该能够通过它们的名称猜到这些方法的作用。我们将按照代码清单 3-12 中的顺序逐一介绍它们。


    ```

    private void showGameOver(String winner) {

    getDialogService().showMessageBox(winner + " won! Demo over\nThanks for playing",
    getGameController()::exit);

    }

    private void initScreenBounds() {

    Entity walls =

    entityBuilder()

    .type(EntityType.WALL)

    .collidable()

    .buildScreenBounds(150);

    getGameWorld().addEntity(walls);

    }

    private void initGameObjects() {

    Entity ball = spawn("ball", getAppWidth() / 2 - 5, getAppHeight() / 2 - 5);

    Entity bat1 = spawn("bat", new SpawnData(getAppWidth() / 4, getAppHeight() / 2
    - 30).put("isPlayer", true));

    Entity bat2 = spawn("bat", new SpawnData(3 * getAppWidth() / 4 - 20, getAppHeight()
    / 2 - 30).put("isPlayer", false));

    playerBat = bat1.getComponent(BatComponent.class);

    }

    代码清单 3-12

    游戏玩法方法

    ```


    `showGameOver()` 方法的实现很简单。我们显示一个消息框，显示谁赢得了游戏，一旦消息框被关闭，我们就退出游戏。接下来，在 `initScreenBounds()`
    中，我们希望围绕屏幕创建墙壁，以便球可以撞击这些墙壁并弹回游戏的可玩区域。


    代码清单 3-12 中的最后一个方法是 `initGameObjects()`，我们在这里简单地创建了游戏中可以看到的所有实体：球和两个球拍。我们还要记得在创建球拍时传递
    `isPlayer` 布尔变量。这是因为我们的工厂需要知道哪个是玩家球拍，哪个是敌人球拍。该方法的最后一行获取了 `BatComponent` 的引用，以初始化我们之前定义的
    `playerBat` 变量。

