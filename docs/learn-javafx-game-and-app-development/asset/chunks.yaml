    ## 碰撞处理


    在本节中，我们将探讨 FXGL 中用于处理碰撞的 API，即调用游戏逻辑代码来执行碰撞导致的游戏内操作。之前我们已经使用过玩家-金币碰撞的示例，因此我们将在此基础上继续深入。如前所述，当玩家与金币碰撞时，通常会执行三个操作：移除金币、增加玩家分数、播放音效以提示用户事件发生。在上一章中，我们已经使用了一些简单的碰撞处理
    DSL API，但这里我们将探索完整的 API，因为它提供了更多选项。为了实现这一游戏逻辑，我们创建一个继承自 `CollisionHandler` 的类。在构造函数中，我们指定该处理器所针对的两种实体类型。接下来，我们考虑需要重写的方法。


    ```

    public class PlayerCoinHandler extends CollisionHandler {

    public PlayerCoinHandler() {

    super(EntityType.PLAYER, EntityType.COIN);

    }

    @Override

    protected void onHitBoxTrigger(Entity p, Entity c, HitBox boxA, HitBox boxB) {
    }

    @Override

    protected void onCollisionBegin(Entity p, Entity c) {

    c.removeFromWorld();

    FXGL.inc("score", +2);

    FXGL.play("pickup_coin.wav");

    }

    @Override

    protected void onCollision(Entity p, Entity c) { }

    @Override

    protected void onCollisionEnd(Entity p, Entity c) { }

    }

    清单 4-1

    碰撞处理器示例

    ```


    从清单 4-1 中可以看出，共有四个这样的方法（如果你对所有可能的物理相关方法感兴趣，可以访问 [`https://github.com/AlmasB/FXGL/tree/dev/fxgl-entity/src/main/java/com/almasb/fxgl`](https://github.com/AlmasB/FXGL/tree/dev/fxgl-entity/src/main/java/com/almasb/fxgl)
    查看）：


    *   onHitBoxTrigger() – 这是碰撞发生时第一个被调用的方法。它允许我们检查哪些碰撞框发生了碰撞。这在格斗游戏中非常有用：根据角色被击中的部位，我们可以决定扣除多少生命值。


    *   onCollisionBegin() – 该方法在碰撞发生的同一帧被调用，且仅调用一次。通常，这是用于收集类物品（如金币）的回调函数。在示例代码中，我们实现了之前描述的游戏逻辑：移除金币、增加分数、播放音效。


    *   onCollision() – 该方法在碰撞持续期间每帧都会被调用。可用于对与尖刺碰撞的玩家持续造成伤害。或者，该回调也可用于奖励处于得分区域的玩家分数。


    *   onCollisionEnd() – 该方法在碰撞停止发生的同一帧被调用。可用于隐藏用户交互提示，因为玩家已离开可交互区域。


    要使碰撞处理器生效，两个实体必须满足以下要求；它们必须同时具备：


    *   已附加 `CollidableComponent` 组件

    *   拥有碰撞框

    *   拥有类型

    *   通过调用 `addCollisionHandler()` 将碰撞处理器附加到物理世界


    如果满足这些要求，碰撞处理器将正确处理两个实体之间发生的碰撞（调用重写的方法）。最后，当不再需要时，你可以通过调用 `removeCollisionHandler()`
    将其移除。


    ## 物理世界


    到目前为止，我们讨论的都是由开发者控制的实体。还有一种方式可以让物理世界参与游戏逻辑，那就是让物理世界控制实体。在这种情况下，我们实际上是在运行一个模拟，例如刚体动力学。为了运行模拟，实体需要附加一个
    `PhysicsComponent` 组件。通过该组件可以设置几种常用的配置选项：


    *   setFixtureDef() – 夹具定义提供了实体的物理属性，如摩擦力、恢复系数（弹性）、密度和形状。常见的形状有矩形、圆形、链形和多边形。


    *   setOnPhysicsInitialized() – 允许开发者提供一个回调函数，该函数在实体的物理初始化完成后被调用。


    *   setLinearVelocity() – 允许开发者手动设置支持物理的实体的速度。该速度随后将由物理世界应用。


    *   setBodyType() – 可选类型为静态、运动学或动态。静态实体质量为零且速度为零。这些通常是不会移动的物体，例如平台和墙壁。运动学实体质量为零，但速度可由开发者设置为非零值。运动学实体由物理世界移动，通常代表玩家控制的对象，例如《Pong》或《Breakout》中的球拍。动态实体具有正质量，且速度由施加在实体上的力计算得出。与运动学实体类似，动态实体也由物理世界移动。它们通常代表不需要玩家控制的对象，例如子弹或《Pong》与《Breakout》中的球。


    在刚体动力学中，实体获得一个刚体（固体）。当两个这种形式的实体碰撞时，物理引擎会尝试将它们分离，使实体不占据同一空间。一旦实体被视为物理世界的一部分，你可能希望配置一些常用的世界选项。这些选项可通过物理世界对象访问：


    *   setGravity() – 设置应用于世界中动态实体的重力。


    *   raycast() – 你可以从世界中的任意位置“发射”一条线到特定点。该方法将返回该线击中的第一个实体。如果你想知道某个实体是否在另一个实体的视线范围内，这将非常有用。


    *   toMeters() / toPixels() – 允许在像素和米之间进行便捷转换。请注意，游戏基于像素单位运行，而物理世界使用米作为单位。


    *   toPoint() / toVector() – 与之前类似，此方法将点/向量从一个上下文（游戏或物理世界）转换到另一个上下文（物理世界或游戏）。

    '
- fmt: '## Platformer


    In this section, we will put all we have learned about physics in this chapter
    into practice and build a demo shown in Figure [4-3](#522865_1_En_4_Chapter.xhtml#Fig3).
    We will do so by developing a simple platformer game. Unlike the game of Pong
    developed in the previous chapter, the platformer game will make use of external
    resources – assets, which also include a pre-built level in Tiled Editor. To simplify
    development, we will use publicly available free-for-use images and sprite sheets.
    Please ensure you download and place the assets in the appropriate directories
    (the following link provides details on the directory structure of the assets).
    Having done that, you will be able to follow along with the implementation given
    in this section. The used assets, as well as the links to the original sources
    and authors of these assets, are available from the FXGLGames GitHub repository:
    [`https://github.com/AlmasB/FXGLGames/tree/master/Mario`](https://github.com/AlmasB/FXGLGames/tree/master/Mario).


    ![](images/522865_1_En_4_Chapter/522865_1_En_4_Fig3_HTML.jpg)


    An image depicts a platformer game demo, which has clouds and trees in the background.
    The letter D on a dark background is in the center, and the player image is on
    the platform.


    **Figure 4-3** A platformer demo developed with FXGL


    As per usual, the first step is to identify what entity types we will have in
    the game. In the platformer game we are developing, these are:


    ```

    public enum EntityType {

    PLAYER, COIN, PLATFORM, EXIT_TRIGGER, KEY_PROMPT, EXIT_SIGN, BUTTON, DOOR_TOP,
    DOOR_BOT

    }

    ```


    Some of these are self-explanatory, whereas others will make more sense as we
    go through the development.


    We will now consider each of our classes in the game in the following order:


    *   `PlayerComponent`

    *   `PlayerButtonHandler`

    *   `PlatformerFactory`

    *   `MainLoadingScene`

    *   `LevelEndScene`

    *   `PlatformerApp`


    Each of these classes manages one aspect of the game.


    ### Game Logic


    We proceed by examining the `PlayerComponent` class. Recall from the previous
    chapter that Components allow us to add data and behavior to entities. In addition,
    we can control entities via Components by adding methods. As before, we will go
    through the class in Listing [4-2](#522865_1_En_4_Chapter.xhtml#PC4) and its methods
    in order, providing the necessary details related to their purpose.


    ```

    import com.almasb.fxgl.entity.component.Component;

    import com.almasb.fxgl.physics.PhysicsComponent;

    import com.almasb.fxgl.texture.AnimatedTexture;

    import com.almasb.fxgl.texture.AnimationChannel;

    import javafx.geometry.Point2D;

    import javafx.scene.image.Image;

    import javafx.util.Duration;

    import static com.almasb.fxgl.dsl.FXGL.image;

    public class PlayerComponent extends Component {

    private PhysicsComponent physics;

    private AnimatedTexture texture;

    private AnimationChannel animIdle;

    private AnimationChannel animWalk;

    private int jumps = 2;

    public PlayerComponent() {

    Image image = image("player.png");

    animIdle = new AnimationChannel(image, 4, 32, 42, Duration.seconds(1), 1, 1);

    animWalk = new AnimationChannel(image, 4, 32, 42, Duration.seconds(0.66), 0, 3);

    texture = new AnimatedTexture(animIdle);

    texture.loop();

    }

    @Override

    public void onAdded() {

    entity.getTransformComponent().setScaleOrigin(new Point2D(16, 21));

    entity.getViewComponent().addChild(texture);

    physics.onGroundProperty().addListener((obs, old, isOnGround) -> {

    if (isOnGround) {

    jumps = 2;

    }

    });

    }

    @Override

    public void onUpdate(double tpf) {

    if (physics.isMovingX()) {

    if (texture.getAnimationChannel() != animWalk) {

    texture.loopAnimationChannel(animWalk);

    }

    } else {

    if (texture.getAnimationChannel() != animIdle) {

    texture.loopAnimationChannel(animIdle);

    }

    }

    }

    public void left() {

    getEntity().setScaleX(-1);

    physics.setVelocityX(-170);

    }

    public void right() {

    getEntity().setScaleX(1);

    physics.setVelocityX(170);

    }

    public void stop() {

    physics.setVelocityX(0);

    }

    public void jump() {

    if (jumps == 0)

    return;

    physics.setVelocityY(-300);

    jumps--;

    }

    }

    ```


    **Listing 4-2** `PlayerComponent` class


    There are five fields, one constructor, and six methods in this class. The fields
    are the physics component (which we will add to the entity in the factory class
    later as per usual), the animated texture (which allows us to use a sprite sheet),
    two animation channels (one for idle animation and one for walk animation), and
    finally the number of jumps we allow the player to make. The constructor sets
    up the animations. Note that `image()` (the full call is `FXGL.image()`) can be
    used to load any image from `/assets/textures` as a JavaFX `Image`. Our image
    is called `player.png`; hence, this is the argument we pass into the `image()`
    method. Using the loaded image, we construct two animation channels and loop the
    idle animation.


    In the `onAdded()` callback, which is called when this component (`PlayerComponent`)
    is added to the entity, we need to do three things: set the scale origin (so we
    can correctly turn the player left or right based on movement), add the animated
    texture, and register a listener that notifies when the player is on the ground,
    so we can reset the number of jumps. Note that we set the scale origin of the
    player entity to point `16,21`, which is the center point of a single frame (32×42)
    of player animations.


    In the next callback, `onUpdate()`, we identify which of the two animations (walk
    or idle) to loop. The physics component can tell us if the entity is moving along
    a particular axis. In our use case, moving along the X axis would mean the player
    is not idle. Therefore, if `isMovingX()` is true, we want to loop the walk animation,
    otherwise the idle animation.'
