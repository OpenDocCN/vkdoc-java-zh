- fmt: '### Classes


    在 Java 以及许多其他编程语言中，类是对象的模板。类用于建模或表示某些抽象概念（例如碰撞检测处理器）或现实世界中的事物（例如椅子）。定义一个类非常简单：


    ```

    class Chair { }

    ```


    上述代码通常存储在一个名为`Chair.java`的文件中，其中文件名与类名匹配。需要注意的是，根据 Java 语言的命名规范，类名以大写字母开头。对于类名中的每个新单词，该单词也以大写字母开头。因此，如果我们有一个针对不同类型椅子的类，例如“木椅”，那么类名将是`WoodenChair`。


    创建类的实例被称为实例化该类：


    ```

    Chair diningChair = new Chair();

    ```


    在上述代码中，我们创建了一个名为`diningChair`的`Chair`类的实例。该实例（`diningChair`）也被称为对象。对象就是任何类的实例。类可以拥有变量，用于存储信息。当向类定义中添加变量时，该类的每个实例都将拥有这些变量的独立副本，并且可以对其进行操作。例如，我们可以添加一个`int`类型的变量（回想一下，`int`或整数表示一个整数）：


    ```

    class Chair {

    int cost;

    }

    ```


    变量`cost`可以存储与单个椅子价格相关的信息：


    ```

    diningChair.cost = 50;

    ```


    因此，椅子`diningChair`的价格为 50 货币单位。我们可以从同一个类创建另一个对象，并为其分配不同的价格值：


    ```

    Chair officeChair = new Chair();

    officeChair.cost = 75;

    ```


    请注意，尽管对象`diningChair`和`officeChair`都是`Chair`类型，但它们是两个不同的对象：椅子`diningChair`价格为
    50，椅子`officeChair`价格为 75。如果我们更改`diningChair`中某些变量的值，`officeChair`中变量的值不会改变。这是面向对象编程的关键概念之一：每个对象都有自己的属性。


    我们刚刚讨论了属于对象的变量。这种仅影响其所属实例的变量被称为实例级别变量。在前面的例子中，变量`cost`是一个实例级别变量。除了实例级别变量，我们还可以定义类级别变量或静态变量。顾名思义，它们属于类，而不是属于对象。考虑以下代码：


    ```

    class Chair {

    static int quality;

    int cost;

    }

    ```


    我们刚刚创建了一个`int`类型的静态变量，名为`quality`，它属于`Chair`类，而不是属于`Chair`类型的单个对象。由于`quality`是一个类级别变量，我们通常通过类而不是对象来访问它：


    ```

    Chair.quality = 3;

    ```


    我们会注意到，所有访问`quality`值的对象都将读取到相同的值 3，因为只有一个静态变量。在介绍了“类”概念的基础知识之后，我们现在继续讨论方法。


    ### 方法


    如前所述，变量允许我们在每个对象或每个类的基础上存储信息。方法允许我们定义可以执行的操作，同样是在每个对象或每个类的基础上。我们将继续使用`Chair`类，并为其添加一个名为`move`的简单方法，如代码清单
    [2-1](#522865_1_En_2_Chapter.xhtml#PC8) 所示。


    ```

    class Chair {

    static int quality;

    int cost;

    void move(int x, int y) {

    // some code

    }

    }

    Listing 2-1

    An example of adding a method to a class

    ```


    方法（在某些语言中称为函数或过程）是可以重复使用的代码块。一个方法定义包含四个重要部分：


    *   **名称：** 我们方法的名称是“move”。通常，名称是一个有意义的动作，因为方法定义了操作——对象能做什么。按照惯例，名称以小写字母开头，然后名称中的每个新单词首字母大写。


    *   **返回类型：** 在我们的例子中，返回类型是`void`，这是一个特殊的关键字，表示该方法不返回任何值。任何类型（例如`int`）都可以用来代替“void”，以表示该方法返回该类型的值。从方法返回值是从方法中提取某些结果的常见方式。然而，在我们的例子中，没有期望的有意义的结果；因此，我们使用“void”。


    *   **参数列表：** 参数列表显示了方法在被调用时期望的参数类型。在前面的例子中，有两个`int`类型的期望值：`x`和`y`。使用参数是开发人员将某些信息传递到方法中的常见方式。


    *   **方法体：** 最后，方法体是位于该方法的花括号“{”和“}”之间的代码块。在我们的例子中，为了说明清楚，我们添加了“// some code”占位符来代替方法体。方法体本质上是在方法被调用（即方法被调用时）时执行的代码。


    与变量可以是静态的一样，方法也可以使用`static`关键字作为前缀，在这种情况下，它们属于类。假设我们希望有一个操作，允许我们确定通过调用`new Chair()`生成的椅子对象的材质。假设我们抽象模型中的所有椅子都具有相同的材质（某种名为`Material`的类型），那么`c1`的材质和`c2`的材质之间就没有区别。如果是这种情况，我们可以简单地在`Chair`类中添加一个名为`getMaterial()`的静态方法，如代码清单
    [2-2](#522865_1_En_2_Chapter.xhtml#PC9) 所示。


    ```

    class Chair {

    static int quality;

    int cost;

    static Material getMaterial() {

    // some code

    }

    void move(int x, int y) {

    // some code

    }

    }

    Listing 2-2

    An example of a static method

    ```


    类似于静态变量的访问方式（即通过类访问），静态方法也以这种方式访问。因此，要调用新创建的方法，我们会写`Chair.getMaterial()`，而不是`c1.getMaterial()`。如果后来我们决定每个椅子可以有自己的材质，那么我们可以从方法中移除`static`关键字。然后该方法变为非静态方法，我们需要像之前一样通过`c1.getMaterial()`或`c2.getMaterial()`来调用它。


    有时，定义具有相似但不同类型特征的类是有用的。例如，考虑餐椅和办公椅。这两者都是椅子类型，并且它们确实有一些共同的功能，但它们的全部功能集并不相同。一个简单的例子是，办公椅有轮子，而餐椅没有。如果我们为这两种椅子分别创建单独的类，例如：


    ```

    class DiningChair

    class OfficeChair

    ```'
  raw: '### Classes


    In Java, and many other programming languages, classes are templates for objects.
    Classes are used to model or represent some abstract concepts, such as a collision
    detection handler, or real-world things, such as a chair. Defining a class is
    straightforward:


    ```

    class Chair { }

    ```


    The preceding code will typically be stored in a file called Chair.java, where
    the name of the file matches the class name. It should be noted that per the Java
    language naming convention, classes start with an uppercase letter. For each new
    word in the class name, the word also starts with an uppercase letter. So if we
    had a class for a different type of chair, such as “wooden chair,” then the name
    would be `WoodenChair`.


    Creating an instance of a class is known as instantiating that class:


    ```

    Chair diningChair = new Chair();

    ```


    In the preceding code, we created an instance, called `diningChair`, of a class
    called `Chair`. The instance (`diningChair`) is also called an object. An object
    is simply an instance of any class. Classes can have variables, which store information.
    When adding a variable to a class definition, each instance of that class will
    have its own copy of these variables that can be manipulated. For example, we
    can add a variable of type int (recall that an int, or integer, represents a whole
    number):


    ```

    class Chair {

    int cost;

    }

    ```


    The variable cost could store information related to how much a single chair costs:


    ```

    diningChair.cost = 50;

    ```


    So chair `diningChair` costs 50 units of currency. We can create another object
    from the same class and assign a different cost value:


    ```

    Chair officeChair = new Chair();

    officeChair.cost = 75;

    ```


    Note that although objects `diningChair` and `officeChair` are both of type Chair,
    they are two distinct objects: chair `diningChair` costs 50, and chair `officeChair`
    costs 75. If we change values of some variables in `diningChair`, the values of
    variables in `officeChair` will not change. This is one of the crucial concepts
    of object-oriented programming: each object has its own properties.


    We have just talked about variables that belong to an object. Such variables that
    only affect the instance to which they belong are known as instance level. In
    the preceding example, the variable cost is an instance-level variable. In addition
    to instance-level variables, we can also define class-level variables, or static
    variables. As implied by name, they belong to a class, rather than to an object.
    Consider the following:


    ```

    class Chair {

    static int quality;

    int cost;

    }

    ```


    We have just created a static variable of type int, named quality, which belongs
    to the class `Chair` and not to an individual object of type `Chair`. Since quality
    is a class-level variable, we typically access it via the class, not the object:


    ```

    Chair.quality = 3;

    ```


    We will note that all objects that access the value of quality will read the same
    value of 3, since there is only one static variable. Having covered the basics
    of the “class” concept, we now move on to methods.


    ### Methods


    As explained earlier, variables allow us to store information on a per-object,
    or per-class, basis. Methods allow us to define actions that can be performed,
    again, on a per-object, or per-class, basis. We will continue with our `Chair`
    class and add a simple method to it, called move, in Listing [2-1](#522865_1_En_2_Chapter.xhtml#PC8).


    ```

    class Chair {

    static int quality;

    int cost;

    void move(int x, int y) {

    // some code

    }

    }

    Listing 2-1

    An example of adding a method to a class

    ```


    Methods (known as functions or procedures in some languages) are blocks of code
    that can be reused. A method definition has four important parts:


    *   **Name:** The name of our method is “move”. Typically, the name is a meaningful
    action since methods define actions – what an object can do. By convention, they
    start with a lowercase letter, then each new word in the name is capitalized.


    *   **Return type:** The return type, in our case, is void, which is a special
    keyword, and it means that the method does not return any value. Any type (e.g.,
    int) can be used instead of “void” to signify that the method returns a value
    of that type. Returning a value from a method is a common way to extract some
    result from the method. However, in our example, there is no meaningful result
    we expect; hence, we use “void”.


    *   **List of parameters:** The list of parameters shows the types that the method
    expects when being called. In the preceding example, there are two expected values
    of type int: x and y. Using parameters is a common way for developers to pass
    some information into a method.


    *   **Body:** Finally, the body of a method is a block of code that is located
    between the curly braces “{” and “}” of that method. In our example, we added
    the “// some code” placeholder instead of the method body for clarification purposes.
    The method body is essentially the code that will be executed when the method
    is invoked (that is when the method is called).


    As with variables, which can be static, methods can also be prefixed with the
    static keyword, in which case they belong to a class. Suppose we wish to have
    an action that allows us to determine the material of chair objects produced by
    calling `new Chair()`. Assuming that all chairs in our abstract model have the
    same material (of some type named `Material`), there would be no difference between
    the material of `c1` and the material of `c2`. If this is the case, we can simply
    add a static method, called `getMaterial()`, to the `Chair` class, in Listing
    [2-2](#522865_1_En_2_Chapter.xhtml#PC9).


    ```

    class Chair {

    static int quality;

    int cost;

    static Material getMaterial() {

    // some code

    }

    void move(int x, int y) {

    // some code

    }

    }

    Listing 2-2

    An example of a static method

    ```


    Similar to how a static variable is accessed, that is, via the class, static methods
    are also accessed in this way. So to call the newly created method, we would write
    `Chair.getMaterial()`, rather than `c1.getMaterial()`. If, further down the line,
    we decide that each chair can have its own material, then we can remove the static
    keyword from the method. Then the method becomes nonstatic, and we would need
    to call it via `c1.getMaterial()` or `c2.getMaterial()` as before.


    Sometimes, it is useful to define classes that have similar, yet distinct, types.
    For example, consider a dining room chair and an office chair. Both of these things
    are of type chair, and they do have some common functionalities, yet the full
    set of their functionalities is not the same. A trivial example would be that
    an office chair has wheels but a dining chair does not. If we were to create a
    separate class for both of these types of chairs, for example:


    ```

    class DiningChair

    class OfficeChair

    ```'
