- fmt: '在`FXGL`中，实体工厂类允许将每个实体的创建方便地隔离到其自己的方法中。我们现在将按顺序介绍这些方法，从背景实体开始。该实体基于循环播放的图像形成无限滚动视图。内置的`ScrollingBackgroundView`类允许我们实现这一点。我们还添加了一个之前未使用过的新`IrremovableComponent`。由于这个平台游戏有多个关卡，我们会不时销毁现有关卡并设置新关卡。大多数关卡都有一些共享实体，例如背景和玩家。因此，每次我们想要更改关卡时，无需重新创建这些实体。对于这些情况，`IrremovableComponent`非常有用，因为它可以锁定其所附加的实体，使其无法从世界中移除。


    下一个实体类型是平台。平台只有边界框和物理组件。默认情况下，物理组件已经具有静态主体，因此我们无需更改它。请注意，我们不需要为平台创建视图，因为它直接从`Tiled`的`.tmx`关卡文件加载。


    出口触发器是一个实体，当它与玩家碰撞时，会启用（使其可见）通往下一关卡的出口门。在游戏中，触发器通常本身不可见，仅作为碰撞对象工作。正如预期的那样，我们为其创建了一个边界框并添加了可碰撞组件。


    关于门实体，它被分为上门和下门，因为有两块瓷砖共同组成一扇门。您会从代码中注意到，只有门的下部被设置为可碰撞，以避免与玩家触发两次碰撞。


    玩家实体是此游戏中最复杂的实体之一。首先，我们将物理组件配置为动态主体类型，以便其受物理力影响。我们还添加了一个地面传感器，使开发者能够知道玩家何时落地，即玩家实体不在空中。为了避免玩家粘在墙上，我们还将摩擦力设置为`0`。将其设置为非零正值可能会影响游戏的手感和体验，因此您可以进行实验以达到合适的功能。这里需要注意的另一件事是，玩家有两个边界框：一个用于头部，另一个用于身体，以更准确地表示碰撞形状。最后，我们附加了可碰撞、不可移除和玩家组件，这很直接。


    出口标志实体为玩家与游戏世界之间增加了一点动态交互。其思路是，当玩家与标志碰撞时，标志会亮起。在这个用例中，这并不是一个极其重要的功能；然而，它应该能为您在自己的游戏中可以做什么提供一些思路。


    按键提示实体用于帮助玩家识别需要按下哪个键来与世界交互。例如，回想一下您最近玩过的任何游戏，无论是`2D`还是`3D`，当靠近门或物品时，游戏会视觉提示您按下特定键进行交互。这正是我们在这里使用按键提示实体所做的。


    按钮实体是游戏玩法的一部分，玩家需要激活按钮才能通过关卡。在我们使用的关卡中，按钮将使玩家能够使门可见，从而有可能进入下一关卡。这完成了工厂类的概述，我们现在将继续介绍游戏示例中的其他类。


    ### 游戏视觉效果：子场景


