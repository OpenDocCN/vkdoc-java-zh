    // 使用 setLayout / setTranslate 方法定位

    getGameScene().addUINode(node);

    ```


    关于 UI 层中的菜单，FXGL 使用工厂模式来处理这些对象。要提供您自己的菜单实现，我们需要做两件事：首先，创建您的菜单类，该类继承 `FXGLMenu`；其次，创建您的工厂类，该类继承
    `SceneFactory`。例如：


    ```

    public class MyMenu extends FXGLMenu {

    public MyMenu(MenuType type) {

    super(type);

    getContentRoot().getChildren().addAll( ... );

    }

    }

    ```


    `MenuType.MAIN_MENU` 是在应用程序启动时显示的菜单。当主菜单显示时，游戏尚未初始化。`MenuType.GAME_MENU` 是玩家在游戏过程中可以打开的菜单。这两种菜单的视图和功能都可以通过继承
    `FXGLMenu` 来实现。完成后，我们需要告诉 FXGL 如何构造您的自定义菜单，这通过场景工厂来完成：


    ```

    public class MySceneFactory extends SceneFactory {

    public FXGLMenu newMainMenu() {

    return new MyMenu(MenuType.MAIN_MENU);

    }

    public FXGLMenu newGameMenu() {

    return new MyMenu(MenuType.GAME_MENU);

    }

    }

    ```


    最后，剩下唯一要做的事情就是告诉 FXGL 使用哪个工厂类。这可以通过在 `initSettings()` 方法中设置场景工厂来实现，如下所示：


    ```

    settings.setSceneFactory(new MySceneFactory());.

    ```


    ### 即时模式


    在介绍了 FXGL 中保留模式的基础知识之后，我们现在简要地考虑一下即时模式。如果您尝试运行过一些 FXGL 示例，或者只是浏览过代码，您可能已经注意到，并没有显式的
    `render()` 方法需要重写来提供您自己的渲染例程。部分原因是 FXGL 旨在提供非常高级的 API，并将大部分底层代码隐藏在引擎幕后。实际原因是 JavaFX
    只允许访问保留图形模式，这意味着我们不是自己绘制对象，而是指定要绘制什么。尽管如此，如果确实需要，我们可以使用 `GraphicsContext` 对象来模拟直接绘制。可以通过首先构造一个
    `Canvas` 对象并将其添加到 UI 层来获得它，如下所示：


    ```

    @Override

    protected void initGame() {

    Canvas canvas = new Canvas(width, height);

    addUINode(canvas);

    }

    ```


    接下来，在应用程序的 `onUpdate()` 方法中，我们可以获取对 `GraphicsContext` 对象的引用，然后手动在其上绘制。


    ```

    @Override

    protected void onUpdate(double tpf) {

    GraphicsContext g = canvas.getGraphicsContext();

    }

    ```


    我们可以像直接绘制到屏幕上一样在 `g` 上绘制。在这种情况下，图形上下文位于游戏层中所有元素的顶部（因为它被添加到 UI 层）。因此，您用它绘制的任何内容都将绘制在现有游戏和实体视图之上。值得注意的是，只有当您的游戏需要更高性能或需要显示许多实体时，才应该使用
    `GraphicsContext`；否则，场景图（保留）模式可能更优。


    为了使用即时模式获得更高的渲染性能，您可以查看 `PixelBuffer`，它是在 JavaFX 13 中引入的，允许通过 `WritableImage`
    直接绘制到屏幕的可见区域。一个有用的额外好处是这种绘制可以并行化。换句话说，您可以将绘制区域分成多个部分，使得每个部分由单独的线程并行绘制，从而可能进一步提高渲染性能。然而，这种方法的主要缺点是
    `PixelBuffer` 本身不提供任何光栅化手段。这意味着如果您想绘制一个矩形，您需要逐像素地绘制它。可以想象，这是一个相当大的限制，因此，只有在您明确需要性能时才应使用此方法。如果您确实想尝试这种渲染方法，搜索“JavaFX
    `PixelBuffer` example”会得到一些有用的结果。至此，我们完成了对 FXGL 中两种高级渲染方法的概述，现在我们的注意力转向低级渲染能力和视口。

    '
- fmt: '# Low-Level Rendering and Viewport


    The viewport is a window into the game world and is the visible area that the
    user sees. Effectively, the viewport in FXGL takes on the responsibility of a
    camera. When building a game world that is larger than a single screen, FXGL allows
    adjusting the viewport so that the “camera” can move to show other parts of the
    game world. You can obtain the reference to the viewport as follows:


    ```

    Viewport viewport = getGameScene().getViewport();

    ```


    You can change the `x` and `y` values of the viewport manually by calling:


    ```

    viewport.setX(...);

    viewport.setY(...);

    ```


    While you can use the `X` and `Y` JavaFX properties to bind to any entity’s `X`
    and `Y`, the API has a built-in method to bind the viewport, so it automatically
    follows an entity:


    ```

    Entity player = ...;

    // distX, distY define how far the origin is from the entity

    viewport.bindToEntity(player, distX, distY);

    ```


    As the viewport follows the player, it may go off the level bounds. You can set
    the bounds to how far the viewport can "wander off":


    ```

    viewport.setBounds(minX, minY, maxX, maxY);

    ```


    Using this approach, you can ensure that the viewport always renders the view
    that is within the bounds of the game.


    We have seen how to perform high-level drawing via the retained and immediate
    modes, including how to modify the visible area of the screen using the viewport.
    However, at low level, it is also important to have a rough idea of how pixels
    operate and what information is needed to draw a single pixel. The color of a
    single pixel can be represented by an `RGBA` object, where the letters stand for
    red, green, blue, and alpha, respectively. Based on how the values of each channel
    are represented, it is either a floating-point range between `0.0` and `1.0` or
    a whole number (integer) between `0` and `255`. By combining the values of red,
    green, and blue, it is possible to construct a range of colors. The final result
    is also determined by the alpha channel, where `0.0` (or `0`) means the color
    is completely transparent (effectively invisible) and `1.0` (or `255`) means the
    color is completely opaque. Any value between this range provides some level of
    transparency, making it possible to see through this specific pixel. Using a combination
    of different transparency values, it is possible to achieve many visually appealing
    effects, such as the effect seen in Figure [6-3](#522865_1_En_6_Chapter.xhtml#Fig3),
    where multiple oval shapes are overlapping and each is drawn with its own opacity
    value.


    ![](images/522865_1_En_6_Chapter/522865_1_En_6_Fig3_HTML.jpg)


    A screenshot of a visual effect, which is created by overlapping multiple oval
    shapes with different levels of opacity.


    **Figure 6-3** Overlaying multiple pixels with different levels of opacity (alpha
    channel value)


    When pixels overlap, the final color is determined via the blending mode. Blending
    can be described as a function that takes two pixels, the bottom one that has
    already been drawn and the top one that we are about to draw, and returns the
    combined color. Since the function is free to implement any way of mixing the
    two colors to obtain the final one, there can be an infinite number of blending
    functions, though some (like `SRC_OVER` and `ADD`) are more common than others.
    For example, the default blending function that JavaFX uses is called `SRC_OVER`,
    which simply returns the top color. The `ADD` blending function sums the two colors
    and returns the result. In FXGL, the `Texture` class provides a range of these
    blending functions, and since they operate on the underlying image data, there
    is no rendering overhead. If you need dynamic blending, however, you can still
    use the JavaFX `BlendMode`, but it can be costly if you have a large number of
    nodes.


    Now that we know how the final color of a pixel is processed, the final piece
    of the rendering stack is how to get all of this pixel information to the screen.
    Ultimately, these pixels will get drawn by the back-end implementation that is
    specific to the target platform (the platform on which the application is running).
    We have seen that the JavaFX pipeline provides a set of high-level APIs that can
    be used to achieve high-performance rendering. These APIs are implemented by a
    range of platform-specific classes in native code. The technologies used behind
    the rendering are Direct3D on Windows, OpenGL on macOS and Linux, and OpenGL ES
    on mobile and embedded (such as the Raspberry Pi). A visual representation of
    this stack is available from Figure [6-4](#522865_1_En_6_Chapter.xhtml#Fig4).
    The modern implementation of graphics on macOS also makes use of Metal for fine-tuned
    performance improvements.


    ![](images/522865_1_En_6_Chapter/522865_1_En_6_Fig4_HTML.jpg)


    An organizational chart. Java F X A P I is classified into direct 3 D, open G
    L, open G L E S. Direct 3 D is used in windows. open G L is used in Mac O S and
    Linux. open G L E S is used in Android, I O S, embedded.


    **Figure 6-4** Different JavaFX rendering back ends


    We have now completed the overview of the FXGL rendering pipeline and move on
    to visual effects that can be produced using this pipeline.


    # Visual Effects Systems


    In FXGL, a number of systems exist that allow the use of visually appealing effects.
    All of them build on top of the aforementioned rendering stacks and provide a
    user-friendly API to access the required functionality. The commonly used ones
    are the particle, animation, and interpolation systems, which are expanded upon
    in the following subsections.'
