    # 7. General-Purpose Applications and Packaging


    This chapter is dedicated for general-purpose (nongame) applications that can
    be developed using FXGL. These include business applications, graphical editors,
    and visualization tools. At a high level, a game application is not very different
    from a front-end business application. They both run in an infinite loop until
