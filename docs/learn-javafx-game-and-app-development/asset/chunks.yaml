  raw: 'All that remains now is to set up the physics aspect of our game. Since all
    of our entities have `PhysicsComponent` attached, they are managed by the physics
    world (more on this will be presented in the following chapter). This means any
    setting we apply to the physics world will also affect these entities. For example,
    by default, the physics world applies a typical gravity vector, which has 0 velocity
    along the X axis and ~10 velocity along the Y axis. We do not need this in a game
    of Pong; otherwise, the ball would be heavily drawn toward the bottom of the screen.
    Let us consider the implementation of `initPhysics()` in Listing [3-13](#522865_1_En_3_Chapter.xhtml#PC29).


    ```

    @Override

    protected void initPhysics() {

    getPhysicsWorld().setGravity(0, 0);

    getPhysicsWorld().addCollisionHandler(new CollisionHandler(EntityType.BALL, EntityType.WALL)
    {

    @Override

    protected void onHitBoxTrigger(Entity a, Entity b, HitBox boxA, HitBox boxB) {

    if (boxB.getName().equals("LEFT")) {

    inc("player2score", +1);

    } else if (boxB.getName().equals("RIGHT")) {

    inc("player1score", +1);

    }

    }

    });

    }

    Listing 3-13

    Initializing physics

    ```


    The very first thing we do in the method is effectively disable gravity in any
    direction. We then set up collision handlers – these are callback methods that
    are invoked when a collision between two entity types occurs. For example, in
    the preceding case, we wish to know when a collision occurs between a ball and
    the walls. Based on this, we can appropriately increase the score of player 1
    or player 2\. To add a collision handler, we first construct it by passing the
    two entity types (here `EntityType.BALL` and `EntityType.WALL`), and then we override
    the `onHitBoxTrigger()` method so that we can check which side of the wall the
    ball hit. As for incrementing the score variables, it is straightforward – we
    call the `inc()` method and provide the amount by which to increment the variable.


    ### Game Structure Review


    This completes the implementation of the Pong clone. You should now be able to
    run the application and see the entire functionality of the game we have implemented
    in this section. We will now briefly review the high-level architecture of the
    application we built to recap:


    *   There are three components: PlayerBatComponent, EnemyBatComponent, and BallComponent.
    Each component is attached to different entities to turn them (and their behavior)
    into the player bat, enemy bat, and ball, respectively.


    *   There is (always) one entity factory class named PongFactory. Its only responsibility
    is to create and configure entities in the game.


    *   There is (always) one application class named PongApp. It is responsible for
    bringing all other classes together and facilitating the program entry point (the
    main() method).


    The `PongApp` class also initializes the game in the following order:


    *   initSettings() to set up the game settings, such as game dimensions, game
    version, and the title


    *   initInput() to set up input bindings for the user to be able to control the
    player entity


    *   initGameVars() to set up game variables that are accessible throughout the
    engine and game code


    *   initGame() to set up the PongFactory, game entities, and gameplay logic


    *   initPhysics() to set up the collision handlers and physics properties


    ## Summary


    In this chapter, we covered the theory behind the Entity-Component model and explored
    how this model can provide powerful abstractions of game state. In particular,
    entities allow us to represent game objects, whereas components provide data and
    behavior to entities. Furthermore, we explored various ways to query entities
    from the game world – a container for entities in the game. Finally, we used this
    theory in practice by implementing a simple yet insightful clone of the Pong game.
    In the next chapter, which is focused on game physics, we will consider collision-driven
    interaction between entities in more detail.


    # 4. Physics Case Study: Platformer Game


    In this chapter, we will consider how important game physics is in the development
    of games. We will also see how physics is implemented in the FXGL game engine
    and how it can be used in FXGL games. More specifically, game physics typically
    serves two purposes: collision detection and simulations, both of which will be
    covered in the context of FXGL. By completing this chapter, you will learn the
    following:


    *   Commonly used collision detection techniques and how to implement them


    *   How to add collision handling code


    *   Physics world and its properties


    *   How to implement physics simulations


    *   How to build a simple platformer game


    In many modern games, a lot of the interaction between the player and the game
    world is done via physics. For example, the player character will approach an
    in-game object and a prompt will appear as the physics subsystem will detect the
    proximity between these two entities. Another example is dropping a weighted item
    onto a pressure plate so that a physics property of the item (in this case, mass)
    will trigger the pressure plate. In this chapter, we will see how to implement
    similar examples, starting with collision detection. For simplicity, we will only
    focus on 2D.'
  trans: '

    现在剩下的工作就是设置游戏的物理部分。由于我们所有的实体都附加了 `PhysicsComponent`，它们由物理世界管理（更多内容将在下一章介绍）。这意味着我们对物理世界所做的任何设置也会影响这些实体。例如，默认情况下，物理世界会施加一个典型的重力向量，该向量在
    X 轴上的速度为 0，在 Y 轴上的速度约为 10。在乒乓球游戏中我们不需要这个；否则，球会严重偏向屏幕底部。让我们考虑清单 3-13 中 `initPhysics()`
    的实现。


    ```

    @Override

    protected void initPhysics() {

    getPhysicsWorld().setGravity(0, 0);

    getPhysicsWorld().addCollisionHandler(new CollisionHandler(EntityType.BALL, EntityType.WALL)
    {

    @Override

    protected void onHitBoxTrigger(Entity a, Entity b, HitBox boxA, HitBox boxB) {

    if (boxB.getName().equals("LEFT")) {

    inc("player2score", +1);

    } else if (boxB.getName().equals("RIGHT")) {

    inc("player1score", +1);

    }

    }

    });

    }

    清单 3-13

    初始化物理

    ```


    在该方法中，我们做的第一件事就是有效禁用任何方向上的重力。然后我们设置碰撞处理器——这些是当两种实体类型之间发生碰撞时被调用的回调方法。例如，在上述情况中，我们希望知道球与墙壁之间何时发生碰撞。基于此，我们可以相应地增加玩家
    1 或玩家 2 的分数。要添加碰撞处理器，我们首先通过传递两种实体类型（这里是 `EntityType.BALL` 和 `EntityType.WALL`）来构造它，然后重写
    `onHitBoxTrigger()` 方法，以便检查球击中了墙壁的哪一侧。至于增加分数变量，这很简单——我们调用 `inc()` 方法并提供要增加变量的数值。


    ### 游戏结构回顾


    至此，乒乓球克隆游戏的实现就完成了。你现在应该能够运行应用程序，并看到我们在本节中实现的游戏的完整功能。现在我们将简要回顾一下所构建应用程序的高级架构，以作总结：


    *   有三个组件：`PlayerBatComponent`、`EnemyBatComponent` 和 `BallComponent`。每个组件都附加到不同的实体上，分别将它们（及其行为）转变为玩家球拍、敌方球拍和球。


    *   （始终）有一个名为 `PongFactory` 的实体工厂类。它的唯一职责是创建和配置游戏中的实体。


    *   （始终）有一个名为 `PongApp` 的应用程序类。它负责将所有其他类整合在一起，并提供程序入口点（`main()` 方法）。


    `PongApp` 类还按以下顺序初始化游戏：


    *   `initSettings()` 用于设置游戏设置，例如游戏尺寸、游戏版本和标题

    *   `initInput()` 用于设置输入绑定，以便用户能够控制玩家实体

    *   `initGameVars()` 用于设置游戏变量，这些变量在整个引擎和游戏代码中都可访问

    *   `initGame()` 用于设置 `PongFactory`、游戏实体和游戏逻辑

    *   `initPhysics()` 用于设置碰撞处理器和物理属性


    ## 总结


    在本章中，我们介绍了实体-组件模型背后的理论，并探讨了该模型如何提供对游戏状态的强大抽象。特别是，实体允许我们表示游戏对象，而组件则为实体提供数据和行为。此外，我们还探讨了从游戏世界（游戏中实体的容器）查询实体的各种方法。最后，我们通过实现一个简单但富有洞察力的乒乓球游戏克隆，将这些理论付诸实践。在下一章中，我们将重点讨论游戏物理，更详细地考虑实体之间基于碰撞的交互。


    # 4. 物理案例研究：平台游戏


    在本章中，我们将考虑游戏物理在游戏开发中的重要性。我们还将了解物理在 FXGL 游戏引擎中是如何实现的，以及如何在 FXGL 游戏中使用它。更具体地说，游戏物理通常有两个目的：碰撞检测和模拟，这两者都将在
    FXGL 的背景下进行介绍。完成本章后，你将学习以下内容：


    *   常用的碰撞检测技术及其实现方法

    *   如何添加碰撞处理代码

    *   物理世界及其属性

    *   如何实现物理模拟

    *   如何构建一个简单的平台游戏


    在许多现代游戏中，玩家与游戏世界之间的很多交互都是通过物理实现的。例如，玩家角色接近游戏内对象时，会弹出一个提示，因为物理子系统会检测到这两个实体之间的接近。另一个例子是将一个重物放在压力板上，这样物品的物理属性（在这种情况下是质量）会触发压力板。在本章中，我们将看到如何实现类似的例子，从碰撞检测开始。为简单起见，我们只关注
    2D 情况。

