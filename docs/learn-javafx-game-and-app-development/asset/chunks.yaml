    }

    public static void main(String[] args) {

    launch(args);

    }

    }

    代码清单 7-6

    SolarSystemApp 类

    ```


    至此，模拟程序已完成，我们可以运行太阳系演示了。出于探索目的，你可能希望调整天体的各种属性，观察这些变化如何影响模拟效果。


    ## 打包与部署


    本节将介绍 OpenJFX 和 GluonFX Maven 插件，利用它们我们可以生成多种最终用户包，包括特定平台的无依赖镜像以及原生镜像。我们将从前者开始，该包允许用户无需安装
    Java 即可运行打包后的应用程序。


    要使用 OpenJFX Maven 插件的 jlink 命令，通常需要创建一个 `module-info.java` 文件，位于源码根目录（通常是 `src/main/java`）。文件内容相当简单：只需为其命名（此处为
    `mygame`），并声明包含 FXGL。


    ```

    open module mygame {

    requires com.almasb.fxgl.all;

    }

    ```


    下一步是将 Maven 插件添加到 pom.xml 文件的相应（插件）部分，如代码清单 7-7 所示。


    ```

    org.openjfx

    javafx-maven-plugin

    0.0.8


    mygame/com.mygame.GameApp


    代码清单 7-7

    OpenJFX Maven 插件

    ```


    插件配置中显示的 main class 属性指向包含 `main()` 方法的类，本例中类名为 `GameApp`，位于 `com.mygame` 包中。现在我们可以使用命令行构建无依赖包了。打开操作系统（或
    IDE）命令提示符，导航到 pom.xml 所在目录。假设命令提示符能识别 mvn 命令（如果不能，可能需要修改系统设置，让命令提示符知道 Maven 的安装位置），然后运行：


    ```

    mvn compile

    mvn javafx:jlink

    ```


    这些命令成功执行后，`target` 目录将包含与当前运行平台对应的二进制文件子目录。例如，在 Windows 上执行命令会生成 Windows 的无依赖包。这意味着你可以将该包分发给
    Windows 用户，他们无需安装 Java 或其他任何东西即可运行。要运行打包好的 Windows 特定应用程序，可以启动 `bin` 子目录中的 .bat
    文件，该文件通过一系列调用最终会执行 `main()` 方法。


    GluonFX Maven 插件则实现了不同的目标：它执行提前编译，生成完全原生的包，与之前的方法不同，它原生运行（而非通过 Java 虚拟机）。添加和配置该插件的最简单方式如代码清单
    7-8 所示，其中我们使用了与 OpenJFX 插件相同的主类。


    ```

    com.gluonhq

    gluonfx-maven-plugin

    1.0.13


    com.mygame.GameApp


    代码清单 7-8

    GluonFX Maven 插件

    ```


    使用此插件时，有两个值得注意的命令（其他命令超出本书范围）。第一个是：


    ```

    mvn gluonfx:run

    ```


    该命令允许你快速测试项目能否在 Java 虚拟机上成功编译和运行。当项目运行效果满意后，我们执行第二个命令：


    ```

    mvn gluonfx:build

    ```


    这是一个非常密集且要求高的任务，它将 Java 代码转换为特定平台的原生代码，生成可执行文件。例如，在 Windows 上，这可以是 .exe 或 .msi
    文件。通过更改目标平台，我们还可以为移动设备和嵌入式设备构建原生包。更多信息请访问 [`https://github.com/gluonhq/gluonfx-maven-plugin/`](https://github.com/gluonhq/gluonfx-maven-plugin/)。


    使用这两种方法，我们最终得到一组文件或包，可以分发给非开发者的系统，这些系统随后即可运行你用 JavaFX 构建的游戏或应用程序。由于 FXGL 应用程序本质上就是一个
    JavaFX 应用程序，任何项目都可以通过这种方式构建、打包和部署。


    ## 本章小结


    在本章中，我们探讨了 FXGL 适用的多种非游戏用例。FXGL 能够很好地支持这些用例并不令人意外，因为它本身就是 JavaFX 的直接扩展。因此，我们再次观察到，FXGL
    应用程序可以完成 JavaFX 应用程序能做的所有事情。具体来说，我们看到了如何构建一个包含登录和业务逻辑的通用应用程序，接着是图形数据可视化，以及我们太阳系的
    3D 模拟。最后，我们讨论了如何打包和部署 FXGL 应用程序，以便最终用户轻松运行。在下一章（即最后一章）中，我们将回顾本书涵盖的所有内容，并提供丰富的外部参考资料供读者参考。

    '
- fmt: '# 8. Conclusion


    In this final chapter, we conclude by providing a brief summary of the chapters
    and giving the reader an opportunity to explore additional possibilities with
    FXGL. Specifically, we answer frequently asked questions, and then we discuss
    details of future projects that can be built on the contents of this book. Finally,
    there will be an extensive list of resources that can be referred to for deeper
    insights into FXGL.


    In previous chapters, we explored what the FXGL game engine is capable of and
    how it seamlessly integrates with the JavaFX ecosystem. It is time to recap key-takeaway
    messages from each of the chapters:


    * Chapter [2](#522865_1_En_2_Chapter.xhtml): We recapped Java basics in terms
    of classes, objects, and methods. This allowed us to construct a Java representation
    of real-world objects and abstract ideas. We then used the IntelliJ IDE with the
    Maven build tool to load JavaFX as an external library via FXGL. This approach
    generalizes and can be used to load any external library. We also implemented
    an FXGL demo.


    * Chapter [3](#522865_1_En_3_Chapter.xhtml): We learned about entities and how
    they represent game objects. We also learned about components and how they can
    provide data and behavior to entities, turning a generic template into a unique
    game object. Entities live inside the game world and can be queried from it by
    a range of properties, such as entity type, position, and the set of components
    it has. In this chapter, we also built our first game example – a game of Pong.
    Through its development, we saw how scalable the Entity-Component model is in
    games.


    * Chapter [4](#522865_1_En_4_Chapter.xhtml): We covered physics basics and learned
    about various ways to detect collisions. Collision detection is a key aspect of
    any game since it enables interaction between game objects. We saw how FXGL allows
    developers to add collision handling code and modify properties of physics-driven
    entities. Using these physics concepts, we developed a platformer game where the
    player must reach the end of the level by interacting with entities.


    * Chapter [5](#522865_1_En_5_Chapter.xhtml): We learned a little bit about graph
    theory, the A* pathfinding algorithm, and how searching a graph allows us to find
    paths between two points in a game level. In FXGL, this functionality is provided
    by the `AStarMoveComponent`, which uses level data to navigate the game world.
    This chapter also focused on AI and how developers can add informed behavior to
    entities via either custom components or the finite-state-machine implementation.
    Finally, we developed a maze action game, where each enemy has a distinct set
    of AI behaviors.


    * Chapter [6](#522865_1_En_6_Chapter.xhtml): We covered the basics of graphics
    theory and how it translates to the FXGL (JavaFX) rendering pipeline. We configured
    a particle emitter to produce custom visual effects. We saw how JavaFX UI objects
    can be used within the FXGL environment. This is a significant advantage of FXGL
    since there is no need to learn any new API for generating complex user interfaces.
    To bring these interfaces to life, we explored the animation system and built-in
    interpolators, which can change how the animation looks overall.


    * Chapter [7](#522865_1_En_7_Chapter.xhtml): We saw how game and business applications
    have a lot in common when it comes to implementation. We developed simple nongame
    applications using FXGL, including a login screen with business logic, a graph
    data visualizer, and an animated 3D solar system model. Finally, we explored how
    to use Maven plug-ins to package FXGL apps.


    Having completed these chapters, you are well suited to continue your game or
    application development journey with FXGL 17. The following sections provide extra
    resources to help you achieve your goal more effectively.


    ## Frequently Asked Questions


    This section covers a variety of questions related to FXGL, including its API,
    software architecture, and development, that are common in the community.


    **How to change global settings?** FXGL offers a lot of built-in settings that
    can be easily configured from the `initSettings()` method using the `GameSettings`
    object. Here are some important examples:


    * `setApplicationMode(ApplicationMode.DEBUG)` – Enables all debug logging calls.

    * `setScaleOnResize(boolean)` – If true, the game contents will be automatically
    scaled up or down during resize depending on the user device resolution.

    * `setFullscreenAllowedFromStart(boolean)` – If true, allows the game to enter
    full screen immediately upon start.


    **How to change audio volume?** The audio volume, both for sound effects and music,
    can be changed by accessing the runtime settings. Note that these are not identical
    to the settings object from the `initSettings()` method, though a lot of the settings
    overlap. To get the runtime settings and change the volume, you can call:


    ```

    getSettings().setGlobalSoundVolume(0.5);

    getSettings().setGlobalMusicVolume(0.5);

    ```


    The following questions focus on the general development of FXGL and the framework
    as a whole, rather than code that achieves a specific functionality.


    **What was the reason for developing FXGL?** It started off as a set of custom
    Java classes on top of the existing JavaFX functionality used in lectures on basics
    of game development. As the code base grew and became flexible, I continued to
    use it to help me run JavaFX tutorials on YouTube so that I could avoid typing
    the same code across tutorials. As I iterated over the code and its API, eventually,
    these simple classes formed packages and, later, modules. Hence, I decided to
    make a library out of it and share with everyone who is interested in learning
    JavaFX and (or) game development.


    **I am doing a school (academic) project, can I use FXGL?** If you are a student,
    you should address this question to your tutor to find out if third-party libraries
    are allowed in your project. If you are the tutor, then feel free to contact me
    if you need help adapting your course to use FXGL. There are a number of academic
    institutions around the world who already make use of FXGL in their curriculum.


    **If I use FXGL for a project, do I need to worry about license or credits?**
    No. The FXGL code base is provided under the MIT license, so feel free to do anything
    you want with it. Something like "Powered by FXGL" would be nice, but it is up
    to you. FXGL is suitable for academic, hobby, and commercial projects.


    **Will FXGL help my employability?** If you are serious about game development
    and planning a future career in this field, working for an AAA company, I would
    suggest that you use Unity (C#) or Unreal Engine (C++), both of which are available
    for free. They are the engines that are widely recognized in the industry. However,
    if you wish to become an independent game developer, working for a smaller company,
    and would like to continue using Java, then all FXGL, libGDX, and JMonkey are
    good alternatives depending on your use case.


    **What were the key points learned during FXGL development?** The FXGL engine
    has been (and still very much is) in development since 2015. The entire development
    timeline can be split into two: the early stage and the late stage. In the early
    stage, in terms of software architecture and design, everything is tentative.
    Designing the engine from top-down has been useful to identify significant areas
    of focus, such as gameplay, networking, file system access, and other subsystems.'
