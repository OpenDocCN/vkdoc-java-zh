    ## Concluding Remarks


    If you have reached this point, then I would like to thank you for your perseverance
    and for completing your journey with FXGL 17\. I sincerely hope the book has been
    helpful in getting to know what JavaFX and FXGL are capable of within the context
    of game and application development. While this book only covered the tip of the
