    那么我们会很容易发现需要重复编写大量代码。显然，这并不是一个理想的解决方案。为了避免这种情况，Java 作为一种语言，提供了继承特性。简单来说，我们可以定义一个名为
    Chair 的“超类型”，在其中保留椅子应具备的所有通用功能，然后定义从 Chair “扩展”而来的“子类型”（或子类）`DiningChair` 和 `OfficeChair`，它们只包含与自身相关的代码。因此，通过这种方法，我们可以为代码重复这个小问题提供一个简洁干净的解决方案。要扩展一个类，可以编写如下代码：


    ```

    class DiningChair extends Chair {}

    class OfficeChair extends Chair {}

    ```


    在某些情况下，两个（或更多）子类型可能共享功能（比如方法），但每个子类型都以自己的方式执行该功能。针对这个概念，我们换一个与椅子无关的例子。许多教科书常用的是
    `Animal` 类及其 `speak()` 方法。


    ```

    class Animal {

    void speak() { }

    }

    ```


    假设 Animal 有两个子类型：Cat 和 Dog。两种类型都能说话，但方式不同。因此，虽然功能保持不变，但 Animal 的每个子类型执行该功能的方式却各不相同。


    要在 Java 中实现此功能，我们有 `@Override` 注解，可以将其添加到方法上，以表明它覆盖了超类型类中同名的方法。让我们看一下清单 2-3 中的具体示例。首先要注意的是
    `speak()` 方法上的 `@Override` 注解。它告诉开发者，`Cat` 类中的 `speak()` 覆盖了 `Animal` 类中的 `speak()`
    方法。因此，当用户调用 `speak()` 时，如果调用对象是 `Cat` 类型，则会调用 `Cat` 类中的 `speak()` 方法，而不是 `Animal`
    类中的那个。在构建 FXGL 游戏时，我们会在几个地方使用“覆盖”；因此，随着本书的深入，这个概念会变得越来越重要。当用到时，我们会提醒读者其用法。


    ```

    class Dog extends Animal {

    @Override

    void speak() {

    // 汪汪叫

    }

    }

    class Cat extends Animal {

    @Override

    void speak() {

    // 喵喵叫

    }

    }

    清单 2-3

    使用 @Override 注解的示例

    ```


    回顾了 Java 基础知识后，我们现在将考虑如何向 Java 项目添加库。库是可重用的预构建代码集合，是解决已知问题的常见方式。它们是任何开发者工具库中的重要工具。


    ## 添加外部库


    在本节中，我们将了解如何使用 IntelliJ IDE 和内置的 Maven 支持向 Java 项目添加外部库。我们还将下载任何必要的软件。如果你的系统上尚未安装
    JDK 17，可以从 [`https://jdk.java.net/17/`](https://jdk.java.net/17/) 下载适用于所有主流操作系统平台（Windows、macOS
    和 Linux）的通用 JDK 17 版本。你只需下载相应的“.zip”文件并将其解压到所选位置即可。


    在 Java 中，有几种方法可以向项目添加外部库。你可以使用 Maven、Gradle 或独立的“.jar”文件。我们将考虑一种使用 Maven 的常见方法，Maven
    是一种依赖管理（或构建）工具。构建工具负责下载软件项目所需的依赖项（例如 JavaFX 和 FXGL），这样开发者就不必浪费时间手动安装这些外部库。现代开发工具，如
    IntelliJ 编辑器（可从 [`www.jetbrains.com/idea/`](http://www.jetbrains.com/idea/) 获取），已经内置了
    Maven 支持。为了简化任务，我们将使用此支持并创建一个简单的 Maven 项目。


    ![](img/522865_1_En_2_Fig1_HTML.jpg)


    截图显示了一个菜单栏，其中文件、新建和项目被高亮显示。


    图 2-1


    IntelliJ IDE 2021.2.2（社区版）中的文件 ➤ 新建 ➤ 项目菜单


    打开 IntelliJ，然后按照图 2-1 所示的菜单选项进行操作。具体来说，选项是文件 ➤ 新建 ➤ 项目。此序列将引导你进入图 2-2 中的窗口。首先要确保你的项目
    SDK 显示为 17（或更高版本）。在图 2-2 中，项目 SDK（靠近图像顶部）显示版本 17.0.1，即 JDK 17。如果你选择了不同的版本，可以单击下拉菜单并选择适当的版本，或单击“添加
    JDK”，然后导航到你从之前给出的链接下载的 JDK 安装文件夹。现在，既然你已选择了合适的 JDK，我们将选择左侧的 Maven 项目（见图 2-2），然后单击“下一步”。在下一个窗口中，我们可以为项目命名，例如
    JavaFXApp（或 BasicFXGLGame），并选择源代码将存储的目录。


    ![](img/522865_1_En_2_Fig2_HTML.png)


    新建项目向导窗口的截图显示左侧有 6 个选项卡，其中 Maven 被选中。选项卡右侧是一个标签“项目 SDK”，显示 17，版本 17.0.1。中央是原型列表，底部有
    4 个按钮，其中“下一步”按钮被高亮显示。


    图 2-2


    IntelliJ IDE 中的新建项目向导窗口


    图 2-3 显示了如何修改 Maven 项目详细信息。一旦你为项目选择了名称，可以保持其他部分为默认值不变。单击“完成”。IntelliJ 现在应该会生成一个项目，其视图类似于图
    2-4，但没有 FXGL 依赖项。你在右侧看到的 xml 文件称为项目对象模型文件，简称 pom.xml。此文件包含构建项目所需的信息。更高级的 pom 文件还可能包含与如何管理项目资源、测试生成的构建、生成项目文档甚至部署最终产物相关的额外详细信息。


    ![](img/522865_1_En_2_Fig4_HTML.png)


    窗口截图，包含菜单栏、工具和构建项目的信息。窗口右侧是标题为 pom.xml 的代码行。


    图 2-4


    带有生成的项目对象模型 (pom.xml) 和额外 FXGL 依赖项的 Maven 项目


    ![](img/522865_1_En_2_Fig3_HTML.jpg)


    标题为“新建项目”的窗口截图显示两个文本框，标签和内容如下：1. 名称：Basic FXGL game。2. 位置：tilde slash Almas underscore
    workspace slash java slash basic FXGL game。


    图 2-3


    IntelliJ 中的新建 Maven 项目窗口


    现在，我们将通过在 pom.xml 文件中添加一个新的“dependency”项，向项目添加 FXGL 依赖项（其中包含 JavaFX）。一个依赖项包含三个部分：组
    ID、工件名称和版本。这些详细信息在图 2-4 和清单 2-4 中给出。


    按照图 2-4 所示添加依赖项后，单击 IntelliJ IDE 右上角的“刷新”图标，FXGL 依赖项将自动下载并可供使用。


    ```


    com.github.almasb

    fxgl


    清单 2-4

    在 xml 文件中添加 FXGL 依赖项

    ```


    此步骤完成了使用 IntelliJ 和 Maven 向 Java 项目添加外部库的操作。现在，我们将继续使用 JavaFX 和 FXGL 构建一些示例应用程序。

