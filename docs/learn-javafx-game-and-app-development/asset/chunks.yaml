    The reader is encouraged to use the same or newer versions. However, it should
    be noted that newer versions may not have exactly the same workflow process and
    there may be some tweaking required. On this note, let us begin our journey with
    FXGL 17.


    # 2. Requisite Concepts


    In this chapter, we will cover fundamental concepts from Java, JavaFX, and FXGL.
    This knowledge will be required to understand the contents of this book. More
    specifically, we will look at


    *   Java theory `–` classes and methods


    *   How to use IntelliJ and Maven to add external dependencies


    *   How to create a simple JavaFX application with basic user interface controls


    *   How to create a simple FXGL application


    Readers who are familiar with these topics, may skip this chapter or parts of
    it.


    ## Java Basics


    This section will introduce (or recap for those already familiar with the concepts)
    fundamental Java basics, including classes and methods. We will consider how to
    create classes, instance-level (nonstatic) variables, and class-level (static)
    variables. We will also recap how to add nonstatic and static methods to a class.
    Finally, we will briefly talk about inheritance and the `@Override` annotation.'
