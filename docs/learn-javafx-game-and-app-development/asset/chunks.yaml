  trans: '

    # 5. AI 案例研究：开发迷宫动作游戏


    在本章中，我们将探讨 AI 的基础知识：它能帮助我们在游戏中实现什么，以及如何在 FXGL 中实现一系列 AI 行为。AI 是游戏开发的关键领域之一。没有它，大多数单人游戏的吸引力和趣味性将大打折扣。AI
    赋予 NPC 和敌人准智能的决策能力，其目标是为玩家带来娱乐体验。更具体地说，作为游戏开发者，我们应致力于让 AI 足够复杂以匹配玩家的技能水平，但又足够浅显以给予玩家隐形的优势。如果设计和实现得当，这样的
    AI 角色将与玩家产生有趣且富有挑战性的互动，但也会在适当的时候“认输”。


    我们将 AI 分为两类：寻路和行为。寻路 AI 处理在二维（或三维）平面中两点之间搜索路径的问题。例如，一个“追踪者”敌人能够追捕玩家，同时避开游戏关卡内的所有障碍物。行为
    AI 主要关注实体在任何给定时刻所执行的动作。在本章中，我们将探索几种实现行为的方法。完成本章后，你将学到：


    *   图论基础知识和 A* 寻路算法

    *   如何使用 `AStarMoveComponent` 在游戏世界中寻找两点之间的路径

    *   如何使用自定义组件定义简单的 AI 行为

    *   如何使用有限状态机定义具有多种状态的 AI 行为

    *   如何利用简单的 AI 行为实现一个动作游戏


    寻路通常是在一种允许应用常见计算机科学搜索算法的数据结构上进行的。本章首先探讨一种称为“图”的数据结构。


    ## 图论与寻路概念


    存在一系列基于图搜索的寻路算法。图是节点集合与连接节点的边集合的统称。图 5-1 展示了一个示例，其中有十个节点（圆形）和十条边（线条）。图论是计算机科学中研究图及其应用的基础领域。有许多针对特定任务定制的图搜索算法。在游戏中，一种常用于寻找两点之间路径的算法被称为
    A*（读作“A star”）算法。


    ![](img/522865_1_En_5_Fig1_HTML.jpg)


    一个连通图描绘了 10 个节点。节点 a、b、c、d、e、f、g、h、i 和 j 由 10 条边连接。


    图 5-1

    一个图


    在应用包括 A* 在内的任何搜索算法之前，首要任务是将游戏世界转换为图。假设在你的 2D 游戏世界中，有相互连接的房间或单元格，你可以从一个房间移动到其相邻的房间。但也会存在无法移动的情况，例如某个房间是封闭的。将这样的世界转换为图的一个简单算法是：为每个房间创建一个节点，如果可以从
    A 移动到 B（且移动单位为一个单元），则在节点 A 和 B 之间创建一条边。由此产生的结构就是你的图。例如，如果图 5-1 中的图是以这种方式生成的，那么我们可以从一个移动单位从房间“a”移动到房间“c”。然而，要从“a”移动到“b”，我们需要先到达“c”。


    假设在图 5-1 中，我们希望从节点“a”移动到节点“g”。当然，我们可以使用暴力方法，简单地检查从“a”到“g”的所有可能路径，然后选择一条合适的。在这样的小型图上，这种方法通常没问题。但是，想象一个像《GTA
    V》那样广阔的世界，其底层图会变得过于庞大而无法使用暴力方法，尤其是在我们只有几分之一秒的时间来计算路径的情况下。显然，我们需要一种更有效的方法来解决这类通用问题。这正是
    A* 寻路算法能够发挥巨大作用的地方。


    ## FXGL 中的 A* 寻路


    为了在 FXGL 中使用 A* 算法，我们首先需要根据游戏世界构建一个 `AStarGrid` 对象。`AStarGrid` 是一个由 `AStarCell`
    对象组成的二维网格，这些对象可以处于两种状态之一：`WALKABLE`（可通行）或 `NOT_WALKABLE`（不可通行）。接下来，我们需要向希望在网格中移动的实体添加几个组件。这些组件是
    `CellMoveComponent` 和 `AStarMoveComponent`。


    `CellMoveComponent` 允许实体在基于单元格的环境（如网格、图或瓦片地图）中移动。`AStarMoveComponent` 利用 `CellMoveComponent`
    并提供必要的路径信息，使实体不会穿过墙壁或其他障碍物。为了帮助巩固这些理论概念，我们将构建一个小型独立应用程序，其代码见清单 5-1。在继续之前，请务必记下所需的导入语句。


    ```

    import com.almasb.fxgl.app.GameApplication;

    import com.almasb.fxgl.app.GameSettings;

    import com.almasb.fxgl.dsl.FXGL;

    import com.almasb.fxgl.entity.Entity;

    import com.almasb.fxgl.pathfinding.CellMoveComponent;

    import com.almasb.fxgl.pathfinding.CellState;

    import com.almasb.fxgl.pathfinding.astar.AStarGrid;

    import com.almasb.fxgl.pathfinding.astar.AStarMoveComponent;

    import javafx.scene.input.MouseButton;

    import javafx.scene.paint.Color;

    import javafx.scene.shape.Rectangle;

    import javafx.scene.shape.StrokeType;

    import static com.almasb.fxgl.dsl.FXGL.*;

    public class PathfindingSample extends GameApplication {

    @Override

    protected void initSettings(GameSettings settings) {

    settings.setWidth(1280);

    settings.setHeight(720);

    }

    @Override

    protected void initGame() {

    var grid = new AStarGrid(1280 / 40, 720 / 40);

    var agent = entityBuilder()

    .viewWithBBox(new Rectangle(40, 40, Color.BLUE))

    .with(new CellMoveComponent(40, 40, 150))

    .with(new AStarMoveComponent(grid))

    .zIndex(1)

    .anchorFromCenter()

    .buildAndAttach();

    for (int y = 0; y  {

    if (event.getButton() == MouseButton.PRIMARY) {

    agent.getComponent(AStarMoveComponent.class)

    .moveToCell(finalX, finalY);

    } else if (event.getButton() == MouseButton.SECONDARY) {

    grid.get(finalX, finalY).setState(CellState.NOT_WALKABLE);

    view.setFill(Color.RED);

    }

    });

    }

    }

    }

    public static void main(String[] args) {

    launch(args);

    }

    }

    清单 5-1

    PathfindingSample 类

    ```


    让我们详细分析清单 5-1 中的代码。首先，我们可以看到 `AStarGrid` 是以适当的尺寸构建的。请注意，提供的值是单元格数量，而非像素，这就是为什么我们将
    1280 和 720 除以 40（本例中单个单元格的大小）。接下来，使用 `EntityBuilder`，我们构建了代理实体。你已从前面的章节熟悉了构建实体的过程，因此我们可以跳过细节。在本例中，该实体是一个带有
    `CellMoveComponent` 和 `AStarMoveComponent` 的蓝色方块。请注意，后一个组件需要能够访问我们构建的网格，以便在关卡中智能移动。如你所见，实际的网格遍历实现细节对开发者是隐藏的，从而使
    API 易于使用。


    现在，我们将构建实体，使我们（用户）能够看到游戏世界并识别哪些单元格是可通行的，哪些是不可通行的。每个实体将有一个方形视图，默认颜色为白色。我们将为每个实体的
    `ViewComponent` 添加一个点击处理程序，这样当我们点击它时，可以执行两个操作：(1) 如果左键点击，我们使用其 `AStarMoveComponent`
    将代理移动到该单元格；(2) 如果右键点击，我们将该单元格设置为不可通行，并将其颜色更改为红色。左键和右键点击事件是标准的 JavaFX 事件，因此你可以为任何游戏示例使用类似的设置进行快速原型开发。

