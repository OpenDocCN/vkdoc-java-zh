  trans: '

    ## JavaFX 基础：创建简单应用


    在本节中，我们将构建一个包含常用控件的简单 JavaFX 应用。首先从一个最小化的 JavaFX 应用开始，其代码如清单 2-5 所示。


    ```

    import javafx.application.Application;

    import javafx.scene.Scene;

    import javafx.scene.layout.Pane;

    import javafx.stage.Stage;

    public class FXApp extends Application {

    @Override

    public void start(Stage stage) throws Exception {

    stage.setScene(new Scene(new Pane(), 800, 600));

    stage.show();

    }

    public static void main(String[] args) {

    launch(args);

    }

    }

    清单 2-5

    一个最小化的 JavaFX 应用

    ```


    要运行此应用，请使用 IntelliJ，首先在项目的 `src/main/java` 目录下创建一个名为 `FXApp` 的新 Java 类——该目录在图
    2-4 中已高亮显示。然后将清单 2-5 中的代码输入到新创建的 FXApp.java 文件中。最后，右键单击该文件并选择“运行”，即可看到这个简单的 JavaFX
    应用运行起来。


    这段源代码中有几个关键点需要注意：


    *   任何 JavaFX 应用都会有一个继承 Application 的类。通常这个类也包含程序的入口点——`public static void main(String[]
    args)`，它仅调用 `launch(args)`。这是大多数 JavaFX 和 FXGL 应用的启动方式。


    *   另一个重要的代码片段是 `start()` 方法，它重写了 Application 类中同名的方法。这是一个必要的重写，允许开发者在启动阶段配置他们的
    JavaFX 应用。在我们的例子中，我们做了两件事：将场景设置到舞台对象上，并显示舞台。Stage 类是对操作系统特定窗口的抽象，我们将在第 6 章讨论图形时更详细地介绍。


    现在我们将介绍基础知识，包括用户输入、交互和输出。为此，我们在之前的最小示例基础上，扩展出清单 2-6 中的独立示例，它给出了如何实现这三个基本概念的总体思路。


    ```

    import javafx.application.Application;

    import javafx.scene.Parent;

    import javafx.scene.Scene;

    import javafx.scene.control.Button;

    import javafx.scene.control.TextField;

    import javafx.scene.layout.VBox;

    import javafx.scene.text.Font;

    import javafx.scene.text.Text;

    import javafx.stage.Stage;

    public class BasicApp extends Application {

    @Override

    public void start(Stage stage) throws Exception {

    stage.setScene(new Scene(createContent()));

    stage.show();

    }

    private Parent createContent() {

    TextField input = new TextField();

    Text output = new Text();

    Button button = new Button("Press");

    button.setOnAction(e -> {

    output.setText(input.getText());

    });

    VBox root = new VBox(input, button, output);

    root.setPrefSize(600, 600);

    return root;

    }

    public static void main(String[] args) {

    launch(args);

    }

    }

    清单 2-6

    一个基础 JavaFX 应用的示例

    ```


    清单 2-6 中主要的增加部分是 `createContent()` 方法——其他部分都相当直接。我们将详细分析这个方法：


    1.  首先，我们创建 TextField，用于接收用户输入。


    2.  接着，我们创建 Text 对象，它将作为向用户输出某些信息的载体。


    3.  在输出之后，我们创建一个名为“Press”的按钮，并提供一些在按钮按下时要执行的代码。具体来说，这段代码会将输入的文本数据设置到输出文本中。


    4.  最后，我们创建根布局容器，它定义了控件（输入框、按钮、输出文本）在屏幕上的放置方式。这里我们使用 VBox，它会将其内部的所有控件垂直排列。我们还为此布局容器设置了首选大小，以便窗口自动调整以适应此尺寸。然后，该方法返回根容器，将其设置为场景的根节点。


    如果你运行该应用（和之前一样，右键单击 Java 文件并点击运行），结果应类似于图 2-5 中的截图。正如我们所见，项目的布局是垂直排列的。


    ![](img/522865_1_En_2_Fig5_HTML.jpg)


    程序输出显示一个窗口。窗口右上角有最小化、最大化和关闭选项。在左上角，从上到下，窗口显示一行文本，内容为 hello world，接着是一个标有 press
    的按钮，以及一行文本，内容为 hello world。


    图 2-5


    一个包含三个基本控件（TextField、Button 和 Text 对象）的基础 JavaFX 应用


    最后一个要考虑的主要特性是 JavaFX 属性以及如何将一个属性绑定到另一个属性。在 JavaFX 中，属性充当值的包装器。这些值可以是任何类型。一些常用的类型包括
    int、double、boolean、String 和通用 Object。与我们已经熟悉的 int 等类型相比，使用属性的主要优势在于绑定的属性会自动更新。假设我们有一个要求用户输入姓名的
    `TextField` 和一个仅复制用户输入姓名的 Text 对象。如果没有属性，我们必须监听 `TextField` 上的每个按键事件，然后在用户输入或删除字符时手动更新
    Text 对象：


    ```

    text.setText(textField.getText());

    ```


    使用属性，上述功能可以以一种简洁的方式实现，只需调用一次，无需为任何监听器编写代码。


    ```

    text.textProperty().bind(textField.textProperty());

    ```


    至此，本书后续将使用的基本 JavaFX 特性概述完毕。现在我们将专注于构建一个简单的 FXGL 应用。

    '
- fmt: "# FXGL Basics: Creating a Simple Application\n\nIn this section, we will build\
    \ a simple FXGL application, which will be our first game example. Before we proceed,\
    \ let us define some requirements for our simple game:\n\n1. The game will have\
    \ a 600×600 window.\n2. There is a player on the screen, represented by a blue\
    \ rectangle.\n3. The player can be controlled by pressing W, S, A, and D on the\
    \ keyboard.\n4. The user interface (UI) is represented by a single of text, which\
    \ shows how many pixels the player has moved.\n5. When the player moves, the UI\
    \ text will update itself accordingly.\n\nAt the end of this section, you should\
    \ have a game similar to what you can see in Figure [2-6](#522865_1_En_2_Chapter.xhtml#Fig6).\
    \ Although this may look far from a real game, its development will help you understand\
    \ the basic features present in FXGL. As a result, after completing this section,\
    \ you will be able to build a variety of simple games.\n\n![](images/522865_1_En_2_Chapter/522865_1_En_2_Fig6_HTML.jpg)\n\
    \nA program output depicts a window titled basic game app 0 dot 1. The window\
    \ has minimize, maximize, and close options on the top right. A colored square\
    \ is depicted on the window, and the number 75 is on the top left of the square.\n\
    \n**Figure 2-6** A basic FXGL application\n\nThe first step is to prepare our\
    \ development environment. From the previous section, you should have a clear\
    \ idea of how to create a new project and add FXGL as a dependency; hence, we\
    \ will start immediately from creating a Java package for our game in `src/main/java`.\
    \ For simplicity, let us call the package \"tutorial\". In that package, we are\
    \ going to create a Java class named `BasicGameApp`. In JavaFX applications, it\
    \ is common to append \"App\" to the class where the `main()` method is located.\
    \ This allows other developers to easily identify where the main entry point to\
    \ the application is. To make your next steps a lot easier, we can open the `BasicGameApp`\
    \ class and add the commonly used FXGL imports given in Listing [2-7](#522865_1_En_2_Chapter.xhtml#PC19).\n\
    \n```\nimport com.almasb.fxgl.app.GameApplication;\nimport com.almasb.fxgl.app.GameSettings;\n\
    import com.almasb.fxgl.dsl.FXGL;\nimport com.almasb.fxgl.entity.Entity;\nimport\
    \ com.almasb.fxgl.input.Input;\nimport com.almasb.fxgl.input.UserAction;\nimport\
    \ javafx.scene.input.KeyCode;\nimport javafx.scene.paint.Color;\nimport javafx.scene.shape.Rectangle;\n\
