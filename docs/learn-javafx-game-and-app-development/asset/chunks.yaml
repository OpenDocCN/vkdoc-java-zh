    Having recapped Java basics, we will now consider how to add libraries to Java
    projects. Libraries are reusable collections of pre-built code that are a common
    way to solve known problems. They are an important tool in any developer’s arsenal.


    ## Adding External Libraries


    In this section, we will see how to use the IntelliJ IDE and the built-in Maven
    support to add an external library to a Java project. We will also download any
    prerequisite software. If you do not yet have an installation of JDK 17 on your
    system, the general-availability JDK 17 release can be downloaded from [`https://jdk.java.net/17/`](https://jdk.java.net/17/)
    for all major OS platforms: Windows, macOS, and Linux. All you need to do is download
    the appropriate “.zip” file and extract it into a location of choice.


    In Java, there are several ways to add an external library to your project. You
    can use Maven, Gradle, or a stand-alone “.jar” file. We will consider a common
    approach using Maven, which is a dependency management (or build) tool. Build
    tools are responsible for downloading dependencies (such as JavaFX and FXGL) a
    software project has so that the developer does not need to waste their time manually
    installing these external libraries. Modern development tools, such as the IntelliJ
    editor (available from [`www.jetbrains.com/idea/`](http://www.jetbrains.com/idea/)),
    already come with Maven support. To simplify our task, we will use this support
    and create a simple project with Maven.


    ![](images/522865_1_En_2_Chapter/522865_1_En_2_Fig1_HTML.jpg)


    A screenshot depicts a menu bar, in which file, new, and project are highlighted.


    Figure 2-1


    The File ➤ New ➤ Project menu in IntelliJ IDE 2021.2.2 (Community Edition)


    Open up IntelliJ and proceed with the menu options shown in Figure [2-1](#522865_1_En_2_Chapter.xhtml#Fig1).
    Specifically, the options are File ➤ New ➤ Project. This sequence will lead you
    to the following window in Figure [2-2](#522865_1_En_2_Chapter.xhtml#Fig2). The
    first thing to ensure is that your project SDK says 17 (or higher). In Figure
    [2-2](#522865_1_En_2_Chapter.xhtml#Fig2), the project SDK (close to the top of
    the image) says version 17.0.1, which is JDK 17\. If you have a different version
    selected, then you can click on the drop-down menu and select the appropriate
    version or click “Add JDK”, and then navigate to your JDK installation folder
    that you downloaded from the link that was given previously. Now that you have
    a suitable JDK selected, we will select the Maven project on the left-hand side
    (see Figure [2-2](#522865_1_En_2_Chapter.xhtml#Fig2)) and then click Next. In
    the next window, we can give the name to our project, such as JavaFXApp (or BasicFXGLGame)
    and choose the directory in which the source code will be stored.


    ![](images/522865_1_En_2_Chapter/522865_1_En_2_Fig2_HTML.png)


    A screenshot of a new project wizard window depicts 6 tabs on the left, in which
    Maven is selected. To the right of the tabs, is a label project S D K, which depicts
    17, version 17 dot 0 dot 1\. In the center is the list of archetypes, followed
    by 4 buttons at the bottom, in which the next button is highlighted.


    Figure 2-2


    The New Project wizard window in IntelliJ IDE


    Figure [2-3](#522865_1_En_2_Chapter.xhtml#Fig3) shows how the Maven project details
    can be modified. Once you have picked the name for the project, you can leave
    the other bits unchanged from the default. Click Finish. IntelliJ should now produce
    a project with the view that looks similar to Figure [2-4](#522865_1_En_2_Chapter.xhtml#Fig4),
    but without the FXGL dependency. The xml file that you can see on the right is
