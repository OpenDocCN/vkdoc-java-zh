    we will use one component for all of them, whose implementation is in Listing
    [7-4](#522865_1_En_7_Chapter.xhtml#PC5). You will observe that it is relatively
    simple. Using the `enum` data for the celestial body, we build and apply two animations:
    one to rotate around the body axis and the other to orbit around the sun. To rotate
    around a specific point, we call the `origin()` method to set such a point. However,
    it should be noted that the first animation does not need to call the `origin()`
    method since, by default, the rotation in 3D is around the center of the entity,
    which is exactly what we need in this case. For the second animation, the rotation
    needs to happen around a different point, specifically around the sun entity’s
    center. Given that we will place the sun at `(0,0,0)`, it is sufficient to set
    the origin to `(-entity.getX(),0,0)`, because each entity’s X value equals to
    the distance from the world center, which is `(0,0,0)`.


    ```java

    import com.almasb.fxgl.entity.component.Component;

    import javafx.geometry.Point3D;

    import javafx.scene.shape.Sphere;

    import javafx.util.Duration;

    import static com.almasb.fxgl.dsl.FXGL.animationBuilder;

    public class CelestialBodyComponent extends Component {

    private CelestialBody data;

    private Sphere view;

    public CelestialBodyComponent(CelestialBody data) {

    this.data = data;

    }

    @Override

    public void onAdded() {

    view = (Sphere) entity.getViewComponent().getChildren().get(0);

    animationBuilder()

    .duration(Duration.seconds(data.getRotationSpeed() * 3))

    .repeatInfinitely()

    .rotate(view)

    .from(new Point3D(0, 0, 0))

    .to(new Point3D(0, 360, 0))

    .buildAndPlay();

    animationBuilder()

    .duration(Duration.seconds(data.getOrbitalPeriod() * 0.1))

    .repeatInfinitely()

    .rotate(entity)

    .origin(new Point3D(-entity.getX(), 0, 0))

    .from(new Point3D(0, 0, 0))

    .to(new Point3D(0, 360, 0))

    .buildAndPlay();

    }

    }

    ```


    Listing 7-4 — The implementation of the `CelestialBodyComponent` class


    This completes the entire logic of this simulation. The remaining actions for
    us are to tell FXGL how to build entities via the factory and how to set up our
    3D scene.


    ## Celestial Object Construction


    As we already know, to construct an entity, we create a factory. Listing [7-5](#522865_1_En_7_Chapter.xhtml#PC6)
    shows the implementation of our factory class. There is only one method since
    all entities are of the same type. We examine this method in detail.


    ```java

    import com.almasb.fxgl.entity.*;

    import com.almasb.fxgl.scene3d.Torus;

    import javafx.geometry.Point3D;

    import javafx.scene.AmbientLight;

    import javafx.scene.paint.*;

    import javafx.scene.shape.Sphere;

    import javafx.util.Duration;

    import static com.almasb.fxgl.dsl.FXGL.entityBuilder;

    import static com.almasb.fxglgames.CelestialBody.SATURN;

    import static com.almasb.fxglgames.CelestialBody.SUN;

    public class SolarSystemFactory implements EntityFactory {

    @Spawns("body")

    public Entity newBody(SpawnData data) {

    // from km to 3D units

    var sizeScale = 0.00005;

    var distanceScale = 0.00000016;

    CelestialBody bodyData = data.get("data");

    // distance sun-body, +offset by radius of each body

    var x = (bodyData.getDistanceFromSun() + SUN.getRadiusScaled(1.0) + bodyData.getRadiusScaled(1.0))
    * distanceScale;

    var r = bodyData.getRadiusScaled(sizeScale);

    var mat = new PhongMaterial();

    mat.setDiffuseMap(bodyData.getImage());

    var view = new Sphere(r);

    view.setMaterial(mat);

    var e = entityBuilder(data)

    .at(x, 0, 0)

    .view(view)

    .with(new CelestialBodyComponent(bodyData))

    .build();

    if (bodyData == SATURN) {

    var torus = new Torus(r * 1.5, r * 0.3 / 3.0);

    e.getViewComponent().addChild(torus);

    }

    return e;

    }

    }

    ```


    Listing 7-5 — The `SolarSystemFactory` class


    We first define our scaling units. We do this because the actual distance and
    size values in kilometers are too much for our application to handle, particularly
    given the ratio between kilometers and 3D units is not one to one. We use different
    scales for distance and size so that most entities are visible in our simulation.
    We are not trying to achieve the scientific level of accuracy here, so such discrepancies
    are acceptable. Next, we obtain the body data by calling `data.get("data")`, so
    when spawning an entity, we must ensure to actually pass this `enum` data in.
    This allows us to calculate the position and size of celestial bodies in 3D units.


    The views in 3D can have `Material` objects attached to them that dictate what
    the view looks like. We are using the default `PhongMaterial` and apply the celestial
    body’s texture to it. Ultimately, each celestial body is represented as a sphere
    in our demo, so we construct a `Sphere` object using the precalculated radius,
    `r`, and apply the material. The construction of the entity itself is straightforward,
    as it is a sequence of calls that we are already familiar with. Once the entity
    is constructed, there is one special case for Saturn, where we add an extra `Torus`
    view, giving the iconic ring effect around the planet.


    ## Building the 3D Application Class


    Finally, the classes we created earlier can be brought together in the `SolarSystemApp`
    game application class, whose implementation is in Listing [7-6](#522865_1_En_7_Chapter.xhtml#PC7).
    The only instance-level field in this class is the reference to the 3D camera.
    In 2D, the viewport movements (which affect the 2D camera) we covered in the previous
    chapter were trivial, and these included translations along the X and Y axes.
    However, in 3D, it is much more convenient to have an abstraction over a camera,
    rather than the viewport. Before we initialize and control the camera, we must
    first enable the 3D mode in `initSettings()`. This will make FXGL properly construct
    the scene and be aware that entities will now live in a 3D world, rather than
    2D. In `initInput()`, the camera movements based on the keys “WASD” simply call
    corresponding methods in the `Camera3D` class.


    Inside game initialization, we obtain the camera reference from the game scene.
    We then set its properties, such as the movement speed, how far the camera should
    see, and where it would initially be located (we translate camera Z by 10 units,
    so we look at the origin `0,0,0` when the camera spawns). Finally, we set the
    camera in FPS (first-person shooter) mode, which means when we move the mouse,
    the camera view will match that and rotate accordingly. We also make the cursor
    invisible to create a more immersive experience for the user.


    Next, we add the previously created entity factory, so FXGL knows how to create
    bodies. The remaining methods initialize the lighting, the skybox (think a 3D
    background), and the bodies themselves. There will be two lights in our simulation:
    one that lights up the entire scene, `AmbientLight`, and the other that seemingly
    radiates from the sun’s location, `PointLight`. Skybox is a term used to describe
    the collection of images drawn on the six internal sides of an imaginary cube
    that encloses the entire game scene in 3D. If this cube is large and far enough,
    then these six images create an illusion of a vast space around the camera. Skyboxes
    or their alternatives are commonly used in games to hide the finite borders of
    the game world. To create this illusion, in `initSkybox()` method, we build a
    1024×1024 image and go through each pixel to color it either white or black. The
    color white is only given a 2% chance, so it is most likely the entire image will
    be largely black with some rare occurrences of white, which creates the night
    sky effect with stars that we saw in Figure [7-3](#522865_1_En_7_Chapter.xhtml#Fig3).
    Finally, the creation of bodies is straightforward, since all of the logic is
    already encapsulated in the factory class. We go through each `enum` item for
    celestial bodies and use the data to spawn their respective entities.'
