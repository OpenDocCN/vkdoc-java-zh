    protected void initInput() {

    getInput().addAction(new UserAction("Left") {

    @Override

    protected void onAction() {

    player.getComponent(PlayerComponent.class).left();

    }

    @Override

    protected void onActionEnd() {

    player.getComponent(PlayerComponent.class).stop();

    }

    }, KeyCode.A);

    getInput().addAction(new UserAction("Right") {

    @Override

    protected void onAction() {

    player.getComponent(PlayerComponent.class).right();

    }

    @Override

    protected void onActionEnd() {

    player.getComponent(PlayerComponent.class).stop();

    }

    }, KeyCode.D);

    getInput().addAction(new UserAction("Jump") {

    @Override

    protected void onActionBegin() {

    player.getComponent(PlayerComponent.class).jump();

    }

    }, KeyCode.W);

    getInput().addAction(new UserAction("Use") {

    @Override

    protected void onActionBegin() {

    getGameWorld().getEntitiesByType(BUTTON)

    .stream()

    .filter(btn -> btn.hasComponent(CollidableComponent.class) && player.isColliding(btn))

    .forEach(btn -> {

    btn.removeComponent(CollidableComponent.class);

    Entity keyEntity = btn.getObject("keyEntity");

    keyEntity.setProperty("activated", true);

    KeyView view = (KeyView) keyEntity.getViewComponent().getChildren().get(0);

    view.setKeyColor(Color.RED);

    makeExitDoor();

    });

    }

    }, KeyCode.E);

    }

    @Override

    protected void initGameVars(Map vars) {

    vars.put("level", STARTING_LEVEL);

    vars.put("levelTime", 0.0);

    }

    @Override

    protected void initGame() {

    getGameWorld().addEntityFactory(new PlatformerFactory());

    player = null;

    nextLevel();

    // player must be spawned after call to nextLevel, otherwise player gets removed

    // before the update tick _actually_ adds the player to game world

    player = spawn("player", 50, 50);

    set("player", player);

    spawn("background");

    Viewport viewport = getGameScene().getViewport();

    viewport.setBounds(-1500, 0, 250 * 70, getAppHeight());

    viewport.bindToEntity(player, getAppWidth() / 2, getAppHeight() / 2);

    viewport.setLazy(true);

    }

    @Override

    protected void initPhysics() {

    getPhysicsWorld().setGravity(0, 760);

    getPhysicsWorld().addCollisionHandler(new PlayerButtonHandler());

    onCollisionOneTimeOnly(PLAYER, EXIT_SIGN, (player, sign) -> {

    var texture = texture("exit_sign.png").brighter();

    texture.setTranslateX(sign.getX() + 9);

    texture.setTranslateY(sign.getY() + 13);

    var gameView = new GameView(texture, 150);

    getGameScene().addGameView(gameView);

    runOnce(() -> getGameScene().removeGameView(gameView), Duration.seconds(1.6));

    });

    onCollisionOneTimeOnly(PLAYER, EXIT_TRIGGER, (player, trigger) -> {

    makeExitDoor();

    });

    onCollisionOneTimeOnly(PLAYER, DOOR_BOT, (player, door) -> {

    levelEndScene.get().onLevelFinish();

    // the above runs in its own scene, so fade will wait until

    // the user exits that scene

    getGameScene().getViewport().fade(() -> {

    nextLevel();

    });

    });

    onCollisionBegin(PLAYER, KEY_PROMPT, (player, prompt) -> {

    String key = prompt.getString("key");

    var entity = getGameWorld().create("keyCode", new SpawnData(prompt.getX(), prompt.getY()).put("key",
    key));

    spawnWithScale(entity, Duration.seconds(1), Interpolators.ELASTIC.EASE_OUT());

    runOnce(() -> {

    despawnWithScale(entity, Duration.seconds(1), Interpolators.ELASTIC.EASE_IN());

    }, Duration.seconds(2.5));

    });

    }

    private void makeExitDoor() {

    var doorTop = getGameWorld().getSingleton(DOOR_TOP);

    var doorBot = getGameWorld().getSingleton(DOOR_BOT);

    doorBot.getComponent(CollidableComponent.class).setValue(true);

    doorTop.setOpacity(1);

    doorBot.setOpacity(1);

    }

    @Override

    protected void onUpdate(double tpf) {

    inc("levelTime", tpf);

    if (player.getY() > getAppHeight()) {

    setLevel(geti("level"));

    }

    }

    private void nextLevel() {

    if (geti("level") == MAX_LEVEL) {

    showMessage("You finished the demo!");

    return;

    }

    inc("level", +1);

    setLevel(geti("level"));

    }

    private void setLevel(int levelNum) {

    if (player != null) {

    player.getComponent(PhysicsComponent.class).overwritePosition(new Point2D(50,
    50));

    player.setZIndex(Integer.MAX_VALUE);

    }

    set("levelTime", 0.0);

    Level level = setLevelFromMap("tmx/level" + levelNum  + ".tmx");

    var shortestTime = level.getProperties().getDouble("star1time");

    var levelTimeData = new LevelEndScene.LevelTimeData(shortestTime * 2.4, shortestTime*1.3,
    shortestTime);

    set("levelTimeData", levelTimeData);

    }

    public static void main(String[] args) {

    launch(args);

    }

    }

    **清单 4-7**

    **PlatformerApp 类**

    ```


    至此，我们的平台游戏示例就完成了。需要注意的是，构建任何游戏都有不同的方法。本章介绍的案例研究仅提供了一种可能的实现方式。随着你对 JavaFX 和 FXGL
    的深入学习，你会发现解决同一问题的不同方法，甚至可能是更优的方法。这在游戏开发和计算机科学领域都很常见。尽管如此，基于这个示例，你现在应该能够构建一个由物理引擎驱动的简单平台游戏了。


    ## 总结


    在本章中，我们探讨了物理在游戏开发中的一系列应用。我们思考了如何使用几种不同的技术进行碰撞检测，并讨论了它们在 FXGL 中的实现细节。接着，我们研究了一些可用于处理实体间交互（例如发生碰撞时）的游戏逻辑代码。我们看到了碰撞处理的重要性，因为它允许玩家与游戏世界互动，也允许非玩家实体之间相互交互。在考虑
    3D 游戏时，这种重要性尤为突出，因为交互是沉浸感的基础。最后，我们构建了一个简单的平台游戏，它大量运用了本章所涵盖的内容。在下一章中，我们将继续探讨如何为不受玩家控制的实体定义
    AI。'
- fmt: '# 5. AI Case Study: Develop a Maze Action Game


    In this chapter, we are going to look at the AI basics: what it helps us achieve
    in games and how to implement a range of AI behaviors in FXGL. AI is one of the
    key areas of game development. Without it, most single-player games would be far
    less engaging and fun. AI is what gives NPCs and enemies quasi-informed decision-making
    abilities with the goal to entertain the player. More specifically, we, as game
    developers, should aim to make the AI sophisticated enough that it can match the
    player’s skill but shallow enough to give the player an invisible advantage. If
    designed and implemented well, such an AI agent will generate interesting and
    challenging interactions with the player but will know when to lose.


    We will categorize AI into two: pathfinding and behavior. Pathfinding AI deals
    with searching a path between two points in a 2D (or 3D) plane. For example, a
    “seeker” enemy is able to hunt down the player while avoiding all obstacles inside
    the game level. Behavior AI is primarily focused on what an entity does at any
    given moment. In this chapter, we will explore several ways to implement behavior.
    By completing this chapter, you will learn about


    * Graph theory basics and the A* pathfinding algorithm

    * How to use `AStarComponent` to find a path between two points in the game world

    * How to use custom Components to define simple AI behavior

    * How to use a finite state machine to define AI behavior with multiple states

    * How to implement an action game using simple AI behavior


    Pathfinding is typically done on a data structure that allows common computer
    science search algorithms to be applied. We begin this chapter by exploring one
    such data structure called a graph.


    ## Graph Theory and Pathfinding Concepts


    There exist a range of pathfinding algorithms based on graph searches. A graph
    is a collection of nodes and a collection of edges, which connect the nodes. An
    example can be seen in Figure [5-1](#522865_1_En_5_Chapter.xhtml#Fig1), where
    there are ten nodes (circles) and also ten edges (lines). Graph theory is a fundamental
    area of computer science that studies graphs and its applications. There are many
    graph search algorithms tailored for specific tasks. In games, a common algorithm
    used for finding a path between two points is known as the A* (pronounced “A star”)
    algorithm.


    ![](images/522865_1_En_5_Chapter/522865_1_En_5_Fig1_HTML.jpg)


    A connected graph depicts 10 nodes. Nodes a, b, c, d, e, f, g, h, I, and j are
    connected by 10 edges.


    Figure 5-1


    A graph


    Before we can apply any search algorithm, including A*, the first task is to convert
    the game world into a graph. Suppose in your 2D game world you have rooms or cells
    that are interconnected, such that you can go from one room to its adjacent (neighboring)
    room. There will be cases where you cannot do this, for example, if a room is
    closed. A simple algorithm to convert such a world into a graph is to create a
    node for every room and an edge between two nodes, A and B, if you can go from
    A to B in a single unit of movement. The resulting structure is your graph. For
    example, if the graph in Figure [5-1](#522865_1_En_5_Chapter.xhtml#Fig1) was produced
    in this way, then we can go from room “a” to room “c” in a single unit of movement.
    However, in order to go from “a” to “b”, we need to get to “c” first.


    Suppose in Figure [5-1](#522865_1_En_5_Chapter.xhtml#Fig1) we wish to go from
    node “a” to node “g”. Of course, we can use a brute force approach and simply
    check all possible routes from “a” to “g” and then pick a suitable one. On small
    graphs like this, the approach would generally be fine. However, imagine a vast
    world, like in GTA V, where the underlying graph would simply be too big to brute
    force, particularly given we have a fraction of a second to compute the path.
    It is clear that we need a more effective approach to solve such problems for
    the general case. This is where the A* pathfinding algorithm can be of tremendous
    help.


    ## A* Pathfinding in FXGL


    In order to use the A* algorithm in FXGL, we will first need to construct an `AStarGrid`
    object from our game world. `AStarGrid` is a 2D grid that consists of `AStarCell`
    objects, which can have one of the two states: `WALKABLE` or `NOT_WALKABLE`. Next,
    we need to add a few components to the entity we would like to move in the grid.
    The components are `CellMoveComponent` and `AStarMoveComponent`.


    `CellMoveComponent` allows the entity to move in a cell-based environment, such
    as a grid, a graph, or a tile map. `AStarMoveComponent` makes use of `CellMoveComponent`
    and provides the necessary path information so that the entity does not go through
    walls or other obstacles. To help reinforce these theoretical concepts, we will
    build a small stand-alone application, whose code is in Listing [5-1](#522865_1_En_5_Chapter.xhtml#PC1).
    Before proceeding, do make a note of the imports required.


    ```

    import com.almasb.fxgl.app.GameApplication;

    import com.almasb.fxgl.app.GameSettings;

    import com.almasb.fxgl.dsl.FXGL;

    import com.almasb.fxgl.entity.Entity;

    import com.almasb.fxgl.pathfinding.CellMoveComponent;

    import com.almasb.fxgl.pathfinding.CellState;

    import com.almasb.fxgl.pathfinding.astar.AStarGrid;

    import com.almasb.fxgl.pathfinding.astar.AStarMoveComponent;

    import javafx.scene.input.MouseButton;

    import javafx.scene.paint.Color;

    import javafx.scene.shape.Rectangle;

    import javafx.scene.shape.StrokeType;

    import static com.almasb.fxgl.dsl.FXGL.*;

    public class PathfindingSample extends GameApplication {

    @Override

    protected void initSettings(GameSettings settings) {

    settings.setWidth(1280);

    settings.setHeight(720);

    }

    @Override

    protected void initGame() {

    var grid = new AStarGrid(1280 / 40, 720 / 40);

    var agent = entityBuilder()

    .viewWithBBox(new Rectangle(40, 40, Color.BLUE))

    .with(new CellMoveComponent(40, 40, 150))

    .with(new AStarMoveComponent(grid))

    .zIndex(1)

    .anchorFromCenter()

    .buildAndAttach();

    for (int y = 0; y  {

    if (event.getButton() == MouseButton.PRIMARY) {

    agent.getComponent(AStarMoveComponent.class)

    .moveToCell(finalX, finalY);

    } else if (event.getButton() == MouseButton.SECONDARY) {

    grid.get(finalX, finalY).setState(CellState.NOT_WALKABLE);

    view.setFill(Color.RED);

    }

    });

    }

    }

    }

    public static void main(String[] args) {

    launch(args);

    }

    }

    Listing 5-1

    PathfindingSample class

    ```


    Let us examine the code in Listing [5-1](#522865_1_En_5_Chapter.xhtml#PC1) in
    detail. First, we can see that the `AStarGrid` is constructed with appropriate
    dimensions. Note that the values provided are in number of cells, rather than
    pixels, which is why we divide 1280 and 720 by 40 (size of a single cell in our
    case). Next, using `EntityBuilder`, we build our agent entity. You are already
    familiar with the process of building an entity from previous chapters, so we
    can skip the details. In this case, the entity is a blue square with `CellMoveComponent`
    and `AStarMoveComponent`. Note that the latter component needs to have access
    to the grid we constructed in order to be able to move intelligently around the
    level. As you can see, the actual grid traversal implementation details are hidden
    from the developer to make the API easy to use.


    We will now build our entities that allow us, the users, to see into the game
    world and identify cells that are walkable and those that are not. Each entity
    will have a square view, whose color will be white by default. We will add an
    on-click handler to each entity’s `ViewComponent` so that when we click on it,
    we can do two things: (1) if left click, we move our agent to that cell using
    its `AStarMoveComponent`; (2) if right click, we set the cell as one that cannot
    be walked on and also change its color to red. The left and right click events
    are standard JavaFX events, so you can use a similar setup for any of your game
    examples for quick prototyping.'
