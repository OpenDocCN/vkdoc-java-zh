    ## Combining Logic and Visuals


    We are now in a position where we can wire all of these classes, whether logic
    or visuals related, together with the `PlatformerApp` class. As per the standard
    architecture in FXGL, all of the functionality we developed will be used in a
    class called “App”. In this case, it is `PlatformerApp`. It is a reasonably complex
    class, so we will tackle it in sections, covering methods one by one. The order
    is as follows:


    *   `initSettings()` – Initializes the game settings

    *   `initInput()` – Initializes user actions that control the game character

    *   `initGameVars()` – Initializes the game variables that are accessible globally

    *   `initGame()` – Initializes the rest of the game and gameplay

    *   `initPhysics()` – Initializes the physics settings and collision handlers

    *   `makeExitDoor()` – Makes the exit door visible in the game

    *   `onUpdate()` – Called every game frame to increment the game time and check
    for player’s death

    *   `nextLevel()` – Advances the game to the next level

    *   `setLevel()` – Sets a given level by loading it from the Tiled `.tmx` file


    All of these methods are provided as part of Listing [4-7](#522865_1_En_4_Chapter.xhtml#PC9).
    In `initInput()`, we have four keys we would like to bind to: A (to move left),
    D (to move right), W (to jump), and E (to use). We have previously used a more
    concise set of APIs for input; however, here, we need to use the full API so we
    can override `onAction()` and `onActionEnd()`. The actual input implementation
    is trivial for A, D, and W since we just call the player component’s methods we
    created earlier. The implementation of E is a bit more complex. We would like
    to find all button entities in the game and then check that the button is collidable
    and is currently colliding with the player. If so, we update the button view,
    so it indicates that it has been pressed, and then we call `makeExitDoor()`, which
    we will cover shortly.


    In `initGameVars()`, we initialize game variables to be accessible from anywhere
    in the source code. We store two things: the current level and the time spent
    on this level. Using the time value, at the end of the level, we can check and
    award stars appropriately in the level end scene, which we constructed earlier.


    The next method is `initGame()`, where the majority of the game initialization
    process takes place. We add our platformer factory class, so FXGL knows how to
    create our entities. We create the level, spawn the player, and spawn the background
    (note that because of background z-index, we do not have to spawn the background
    before anything else; z-index nicely takes care of any ordering issues). Finally,
    we bind the viewport (visible area of the game) to the player entity. This last
    action makes the viewport follow the player entity and provide the side-scrolling
    effect you typically see in platformer games. We will discuss the viewport and
    its importance in Chapter [6](#522865_1_En_6_Chapter.xhtml).'
