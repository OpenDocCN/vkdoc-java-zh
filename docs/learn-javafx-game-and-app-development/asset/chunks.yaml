    AI 组件在许多即时战略游戏中非常有用，其中“工人”类型的实体可以为玩家采集资源。最终，我们可以识别出三种状态：采集、移动和存放。前两种状态是持续性的，意味着实体将在其中花费一些时间。然而，存放是一个单一动作，不一定需要实现为一个状态。此
    AI 的实现可以在代码清单 5-5 中看到。我们现在对其进行详细检查。

