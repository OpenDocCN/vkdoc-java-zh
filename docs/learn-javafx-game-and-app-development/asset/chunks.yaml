    # 1. 引言


    JavaFX 是一个用于 Java 的现代高性能图形用户界面（GUI）工具包。它在包括桌面、移动和嵌入式在内的多种平台上提供硬件加速支持，从而能够开发跨平台应用程序。然而，要使用
    JavaFX 高效地开发游戏，需要掌握许多特定领域的知识。为了满足这一需求，FXGL 游戏引擎扩展了 JavaFX，并引入了对真实游戏开发技术的支持（示例如图
    1-1 所示）。这些技术包括实体-组件模型、寻路、物理、粒子系统、精灵表动画以及许多其他功能。因此，JavaFX 开发者可以借助 FXGL 更快速、更高效地制作游戏，并轻松将游戏打包为原生平台镜像，包括
    Android 和 iOS。


    ![](img/522865_1_En_1_Fig1_HTML.png)


    一张截图展示了使用 FXGL 游戏引擎开发的不同游戏场景的截图合集。


    图 1-1


    使用 FXGL 开发的游戏截图合集


    FXGL 游戏引擎是完全开源的。这使得任何 FXGL 用户都可以向项目贡献新功能或修复 Bug。该项目完全由社区用户（无论是个人还是公司）支持。在撰写本书时，所有开发团队成员都是利用自己的业余时间参与该项目。项目源代码可在
    [`https://github.com/AlmasB/FXGL`](https://github.com/AlmasB/FXGL) 找到。


    FXGL 项目最初只是一组代码片段，用于帮助在布莱顿大学讲授游戏开发课程，并协助制作 YouTube 教程。随着代码库的增长，将其开发成一个公开可用的 Java
    游戏引擎变得顺理成章。因此，FXGL 并非旨在与现有引擎竞争，而是为 Java 用户提供一种替代工具，用于开发高性能应用程序。在开发的早期阶段，以下软件项目对引擎的架构和实现产生了重要影响：Unity、Unreal
    Engine、libGDX、jMonkey、CRYENGINE、X-Ray、OpenJK、Duality 和 Phaser。


    底层基础设施和渲染引擎由 JavaFX GUI 工具包提供。JavaFX 是 Swing 的现代替代品，用于在 Java 中构建富客户端应用程序。它与许多个人和公司合作开发，不断改善其在广泛支持平台上的表现。基于这种支持，FXGL
    能够开发出真正跨平台且具备众多游戏特定功能的游戏。


    FXGL 提供的功能可分为以下几类：内部框架服务、游戏逻辑、人工智能（AI）、物理、游戏玩法、输入、用户界面（UI）、图形、音频、文件输入输出（IO）、网络、硬件访问和外部工具集成。这些类别可描述如下：


    ![](img/522865_1_En_1_Fig2_HTML.jpg)


    一张截图展示了多个不同颜色的 3D 形状。


    图 1-2


    FXGL 中 3D 场景的示例


    *   内部框架服务提供对引擎计时器和生命周期的访问，允许监听特定事件并从代码中适当处理它们。


    *   在 FXGL 中，游戏逻辑通过实体-组件模型（定义游戏对象）和游戏世界（作为游戏对象的容器）的组合来实现。与任何流行的数据结构一样，游戏世界允许查询和过滤数据（游戏对象），以满足开发者的需求。


    *   AI 类别主要包括两个领域：导航和行为。导航系统允许游戏对象在游戏关卡中自行寻路而不穿过障碍物，而行为逻辑则为游戏对象提供一定水平的人工智能。'
- fmt: '*   The category of physics can also be split into two: collision detection
    and rigid body simulation. The former tells us if two game objects are overlapping,
    which in turn can be used for various gameplay mechanics, such as picking up a
    health kit. The latter, also known as rigid body dynamics, can be used to simulate
    a range of physics properties for game object interaction, such as friction, elasticity,
    and density.

    *   In terms of gameplay, FXGL provides facilities for achievements, in-game notifications,
    quick-time events, as well as built-in mini-games.

    *   The user input is handled via an intuitive set of bindings between user actions
    (such as shoot or jump) and triggers (such as the spacebar key or the left mouse
    button). The same API (set of functions accessible from code) can be used to mock
    physical triggers when running on mobile.

    *   The user interface aspect of the engine is built on top of JavaFX and enhances
    its visual controls. For example, FXGL provides in-game menus, overlays, camera
    animations, and 9-slice UI generation.

    *   The graphics features of FXGL are also built on the ones provided by JavaFX
    since the engine uses JavaFX’s rendering pipeline. The improvements include a
    highly customizable particle system, runtime texture manipulation, and editable
    custom 3D shapes. An example application with some built-in 3D shapes can be seen
    in Figure [1-2](#522865_1_En_1_Chapter.xhtml#Fig2).

    *   The audio service allows developers to play short sound effects and long background
    music files. It also controls certain audio properties, such as volume.

    *   All of the IO calls are wrapped by the file system service, which simplifies
    writing to and reading from the local storage (whether it is on desktop or mobile).

    *   The networking service is implemented by extending the standard JDK (Java
    Development Kit) capabilities. For example, the high-level interface does not
    distinguish between TCP and UDP connections and provides a unified way to handle
    incoming and outgoing messages.

    *   The hardware support includes Xbox and PlayStation controllers and a range
    of API available from the Gluon Attach project, which provides access to mobile
    hardware capabilities.

    *   Finally, the following external tools are supported: Tiled map editor to build
    game world levels and FXGL dialogue editor for easily generating complex dialogues
    between in-game characters.


    For completeness, it should be noted that these features are not exclusive to
    FXGL. There are other alternatives available when entering the world of Java game
    development. In particular, popular frameworks and engines include libGDX and
    jMonkeyEngine. Both of these projects have been developed for a longer period
    of time, compared to FXGL. These projects provide a large number of mature game
    development tools to Java game developers. The FXGL project is not meant to compete
    with these technologies; instead, the aim is to provide an alternative approach
    to Java game development, particularly to JavaFX developers, who are already familiar
    with the JavaFX API set.


    This book is designed to be suitable for both beginners and experts in Java and/or
    JavaFX who wish to develop apps and games with FXGL while improving Java and/or
    JavaFX skills. After completing this book, the reader will be able to


    *   Make use of advanced Java and JavaFX concepts

    *   Explain and implement real-world game development concepts in a general-purpose
    programming language, such as Java

    *   Develop professional cross-platform, including desktop and mobile, applications,
    and games using the FXGL game engine

    *   Design and implement scalable gameplay-specific functionality involving physics,
    artificial intelligence, and graphics systems in FXGL

    *   Deploy JavaFX and FXGL applications and games using platform-specific native
    images


    The high-level overview of the book is as follows:


    *   In Chapter [2](#522865_1_En_2_Chapter.xhtml), we cover requisite concepts
    from Java and JavaFX that will be used throughout this book. We will also introduce
    the reader to the FXGL game engine and its development workflow.

    *   We start our game development journey in Chapter [3](#522865_1_En_3_Chapter.xhtml),
    where we develop an arcade game similar to Pong. Through this process, we will
    learn about the Entity-Component model used in FXGL to create a powerful abstraction
    of the game world.

    *   We build on this in chapter [4](#522865_1_En_4_Chapter.xhtml), where we develop
    a platformer game using the physics engine and learn about collision detection.

    *   An important concept of game AI is covered in Chapter [5](#522865_1_En_5_Chapter.xhtml)
    by developing a maze action game like Pac-Man.

    *   Many visually complex features related to graphics and rendering will be discussed
    in Chapter [6](#522865_1_En_6_Chapter.xhtml). In this chapter, we also cover UI
    elements and the animation system in FXGL.

    *   Chapter [7](#522865_1_En_7_Chapter.xhtml) is focused on general-purpose (nongame)
    applications that can be developed using FXGL. These include business applications,
    graphical editors, and visualization tools. The chapter also covers the packaging
    of JavaFX and FXGL applications, including games, to later deploy to end users.

    *   Finally, in Chapter [8](#522865_1_En_8_Chapter.xhtml), we conclude and discuss
    details of future projects that can be built on the contents of this book.


    Each chapter incrementally builds on the previous chapters and introduces a new
    topic. The code snippets provided in this book are either in Java or pseudocode
    that is similar to Java. The examples given use the following software versions:


    *   Java 17,

    *   JavaFX 17

    *   FXGL 17

    *   IntelliJ 2021


    An example setup project using these technologies is provided in the next chapter.
    The reader is encouraged to use the same or newer versions. However, it should
    be noted that newer versions may not have exactly the same workflow process and
    there may be some tweaking required. On this note, let us begin our journey with
    FXGL 17.


    ## 2. Requisite Concepts


    In this chapter, we will cover fundamental concepts from Java, JavaFX, and FXGL.
    This knowledge will be required to understand the contents of this book. More
    specifically, we will look at


    *   Java theory `–` classes and methods

    *   How to use IntelliJ and Maven to add external dependencies

    *   How to create a simple JavaFX application with basic user interface controls

    *   How to create a simple FXGL application


    Readers who are familiar with these topics, may skip this chapter or parts of
    it.


    ### Java Basics


    This section will introduce (or recap for those already familiar with the concepts)
    fundamental Java basics, including classes and methods. We will consider how to
    create classes, instance-level (nonstatic) variables, and class-level (static)
    variables. We will also recap how to add nonstatic and static methods to a class.
    Finally, we will briefly talk about inheritance and the `@Override` annotation.'
