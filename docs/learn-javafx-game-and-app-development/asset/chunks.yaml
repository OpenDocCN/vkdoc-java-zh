    ### 构建用户界面


    使用 FXML 标记编写 UI 是 JavaFX 中的常见方法。因此，FXGL 为 FXML 文件提供了一流支持。清单 5-11 展示了一个用 FXML 编写的
    UI 示例。该示例以 `Pane` 作为根节点，仅包含三个子节点：一个作为 UI 背景的矩形，以及两个标签，一个用于显示分数，另一个用于指示玩家可使用的传送次数。


    ```


    清单 5-11

    包含我们游戏 UI 定义的 FXML 文件

    ```


    为了在 FXGL 中使用此 UI，我们需要一个控制器类，例如清单 5-12 中提供的类。该类的唯一职责是将我们定义的标签文本绑定到其游戏内属性，并附加一个额外的
    UI 元素——时间进度条。回想一下，玩家需要在指定时间内完成游戏演示，因此我们的进度条将让玩家随时了解演示结束前还剩多少时间。


    ```

    import com.almasb.fxgl.ui.ProgressBar;

    import com.almasb.fxgl.ui.UIController;

    import javafx.fxml.FXML;

    import javafx.scene.control.Label;

    import javafx.scene.layout.Pane;

    import javafx.scene.paint.Color;

    import static com.almasb.fxgl.dsl.FXGL.getUIFactoryService;

    import static com.almasb.fxgl.dsl.FXGL.getip;

    public class PacmanUIController implements UIController {

    @FXML

    private Pane root;

    private ProgressBar timeBar;

    @FXML

    private Label labelScore;

    @FXML

    private Label labelTeleport;

    @Override

    public void init() {

    timeBar = new ProgressBar(false);

    timeBar.setHeight(50);

    timeBar.setTranslateX(-60);

    timeBar.setTranslateY(100);

    timeBar.setRotate(-90);

    timeBar.setFill(Color.GREEN);

    timeBar.setLabelVisible(false);

    timeBar.setMaxValue(PacmanApp.TIME_PER_LEVEL);

    timeBar.setMinValue(0);

    timeBar.setCurrentValue(PacmanApp.TIME_PER_LEVEL);

    timeBar.currentValueProperty().bind(getip("time"));

    root.getChildren().addAll(timeBar);

    labelScore.setFont(getUIFactoryService().newFont(18));

    labelTeleport.setFont(getUIFactoryService().newFont(12));

    labelScore.textProperty().bind(getip("score").asString("Score:\n%d"));

    labelTeleport.textProperty().bind(getip("teleport").asString("Teleports:\n[%d]"));

    }

    }

    清单 5-12

    UI 控制器类

    ```


    软件“拼图”的最后一块是 `PacmanApp` 类，它将所有其他类整合在一起。


    ### 构建应用程序类


    与上一章中的前一个游戏示例不同，这个类非常简单。这是因为游戏侧重于 AI，而我们已经涵盖了其所需的组件。在清单 5-13 中，我们首先定义了与关卡时间、方块大小、地图和
    UI 相关的常量变量。这些常量随后以直接的方式在 `initSettings()` 中使用。在 `initInput()` 中，我们简单地调用了玩家组件和我们创建的五个动作。游戏中有四个重要的变量，因此我们在
    `initGameVars()` 中创建它们。这些变量用于跟踪玩家分数、游戏中剩余的金币数量、玩家可以使用的传送次数以及完成关卡剩余的时间。


    `initGame()` 代码尤为重要，因为它向我们展示了如何将文本文件解析为游戏世界，并随后从该游戏世界生成 A* 网格。为了生成关卡，我们使用带有 `TextLevelLoader`
    的 `AssetLoader`，并提供相关细节，例如方块大小。至于生成 A* 网格（以便敌人能够智能移动），本质上，我们调用 `AStarGrid.fromWorld`
    并提供关于地图和方块大小的详细信息。我们还告诉 FXGL 哪些类型的实体是不可行走的。在这种情况下，`BLOCK` 实体是唯一不可行走的实体类型，因此我们使用一个“if”语句来指明它。在此方法中，我们还将网格对象添加到变量列表中。回想一下，在创建玩家实体时，我们使用惰性值传递了
    A* 网格，向 FXGL 指示此类对象将在运行时存在。我们现在只是在履行那个承诺。生成游戏世界后，我们可以轻松计算游戏中的金币数量：`getGameWorld().getEntitiesByType(COIN).size());`。最后，在此初始化方法中，我们安排游戏计时器每秒运行一次，以便“时间”变量被适当递减；并且我们为其添加一个监听器，以便当它达到
    0 时，游戏结束。


    与 FXGL 游戏的典型架构一样，在 `initPhysics()` 中，我们设置碰撞处理器，例如玩家与敌人之间以及玩家与金币之间的碰撞处理器。`initUI()`
    方法展示了一个新的 `loadUI()` 调用，我们在其中将 FXML 文件和 UI 控制器类连接在一起，这两个文件都是我们之前创建的。`PacmanApp`
    类中实现的其他方法都很简单。

