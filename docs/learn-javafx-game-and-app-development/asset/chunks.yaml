- fmt: '# JavaFX Basics: Creating a Simple Application


    In this section, we will build a simple JavaFX application that contains commonly
    used controls. We start by considering a minimal JavaFX application, which would
    look something like the one in Listing [2-5](#522865_1_En_2_Chapter.xhtml#PC15).


    ```

    import javafx.application.Application;

    import javafx.scene.Scene;

    import javafx.scene.layout.Pane;

    import javafx.stage.Stage;

    public class FXApp extends Application {

    @Override

    public void start(Stage stage) throws Exception {

    stage.setScene(new Scene(new Pane(), 800, 600));

    stage.show();

    }

    public static void main(String[] args) {

    launch(args);

    }

    }

    Listing 2-5

    A minimal JavaFX application

    ```


    To run this application, using IntelliJ, first, create a new Java class called
    `FXApp` inside the `src/main/java` directory in your project – this directory
    is highlighted in Figure [2-4](#522865_1_En_2_Chapter.xhtml#Fig4). You can now
    type the code in Listing [2-5](#522865_1_En_2_Chapter.xhtml#PC15) into the newly
    created `FXApp.java` file. Finally, right-click on this file and select “run”
    to see this simple JavaFX app running.


    There are important key points to note in this source code:


    *   Any JavaFX application will have a class that extends `Application`. It is
    common for this class to also contain the entry point to the program – `public
    static void main(String[] args)`, which simply calls `launch(args)`. This is how
    most JavaFX and FXGL applications start.


    *   Another important code snippet is the `start()` method that overrides a method
    with the same name from the `Application` class. It is a necessary override and
    allows the developer to configure their JavaFX application during the starting
    phase. In our case, we do two things here: set the scene to the stage object and
    show the stage. The `Stage` class is an abstraction over an OS-specific window,
    which will be covered in more detail in Chapter [6](#522865_1_En_6_Chapter.xhtml)
    when we discuss graphics.


    We will now cover the basics, including user input, interaction, and output. To
    do this, we extend the previous minimal example with the stand-alone example in
    Listing [2-6](#522865_1_En_2_Chapter.xhtml#PC16), which gives a general idea of
    how to implement these three basic concepts.


    ```

    import javafx.application.Application;

    import javafx.scene.Parent;

    import javafx.scene.Scene;

    import javafx.scene.control.Button;

    import javafx.scene.control.TextField;

    import javafx.scene.layout.VBox;

    import javafx.scene.text.Font;

    import javafx.scene.text.Text;

    import javafx.stage.Stage;

    public class BasicApp extends Application {

    @Override

    public void start(Stage stage) throws Exception {

    stage.setScene(new Scene(createContent()));

    stage.show();

    }

    private Parent createContent() {

    TextField input = new TextField();

    Text output = new Text();

    Button button = new Button("Press");

    button.setOnAction(e -> {

    output.setText(input.getText());

    });

    VBox root = new VBox(input, button, output);

    root.setPrefSize(600, 600);

    return root;

    }

    public static void main(String[] args) {

    launch(args);

    }

    }

    Listing 2-6

    An example of a basic JavaFX application

    ```


    The major addition in Listing [2-6](#522865_1_En_2_Chapter.xhtml#PC16) is the
    `createContent()` method – other bits are reasonably straightforward. We will
    examine this method in detail:


    1.  First, we create the `TextField` which we use to take input from the user.


    2.  Next, we create the `Text` object, which will serve as output for some information
    back to the user.


    3.  After the output, we create a button with name “Press” and provide some code
    to be executed when the button is pressed. Specifically, this code will set the
    input text data to the output text.


    4.  Finally, we create the root layout container that defines how the controls
    (input, button, output) are to be placed on the screen. In this case, we use `VBox`,
    which lays out all controls placed inside it vertically. We also set the preferred
    size to this layout container so that the window is automatically adjusted to
    facilitate this size. The root container is then returned from the method to be
    set as the root node of the scene.


    If you run the application (as before, right-click on the Java file and click
    Run), the result should be similar to the screenshot in Figure [2-5](#522865_1_En_2_Chapter.xhtml#Fig5).
    As we can observe, the layout of items is arranged in a vertical fashion.


    ![](images/522865_1_En_2_Chapter/522865_1_En_2_Fig5_HTML.jpg)


    A program output depicts a window. The window has minimize, maximize, and close
    options on the top right. On the top left, from top to bottom, the window depicts
    a line of text, that reads hello world, followed by a button labeled press, and
    a line of text, that reads hello world.


    Figure 2-5


    A basic JavaFX application with three fundamental controls: `TextField`, `Button`,
    and `Text` objects


    The last major feature to consider is the JavaFX properties and how we can bind
    one property to another. Properties, in JavaFX, act as wrappers around values.
    The values can be of any type. Some commonly used types are `int`, `double`, `boolean`,
    `String`, and generic `Object`. The main advantage of using properties against
    already-familiar `int`, for example, is the fact that bound properties automatically
    update. Suppose we have a `TextField` that asks the user to enter their name and
    a `Text` object that simply copies the name that the user enters. Without properties,
    we would have to listen for each key event on the `TextField` and then manually
    update the `Text` object whenever the user entered or deleted a character:


    ```

    text.setText(textField.getText());

    ```


    With properties, the preceding functionality can be achieved in a neat way, which
    is only called once without the need to write code for any listeners.


    ```

    text.textProperty().bind(textField.textProperty());

    ```


    This completes the general overview of basic JavaFX features that will be used
    later in the book. We will now focus on building a simple FXGL application.'
