    ### 天体构建


    众所周知，要构建实体，我们需要创建一个工厂。代码清单 7-5 展示了工厂类的实现。由于所有实体类型相同，因此只有一个方法。我们来详细分析这个方法。


    ```

    import com.almasb.fxgl.entity.*;

    import com.almasb.fxgl.scene3d.Torus;

    import javafx.geometry.Point3D;

    import javafx.scene.AmbientLight;

    import javafx.scene.paint.*;

    import javafx.scene.shape.Sphere;

    import javafx.util.Duration;

    import static com.almasb.fxgl.dsl.FXGL.entityBuilder;

    import static com.almasb.fxglgames.CelestialBody.SATURN;

    import static com.almasb.fxglgames.CelestialBody.SUN;

    public class SolarSystemFactory implements EntityFactory {

    @Spawns("body")

    public Entity newBody(SpawnData data) {

    // 从公里转换为 3D 单位

    var sizeScale = 0.00005;

    var distanceScale = 0.00000016;

    CelestialBody bodyData = data.get("data");

    // 太阳与天体之间的距离，加上每个天体的半径偏移

    var x = (bodyData.getDistanceFromSun() + SUN.getRadiusScaled(1.0) + bodyData.getRadiusScaled(1.0))
    * distanceScale;

    var r = bodyData.getRadiusScaled(sizeScale);

    var mat = new PhongMaterial();

    mat.setDiffuseMap(bodyData.getImage());

    var view = new Sphere(r);

    view.setMaterial(mat);

    var e = entityBuilder(data)

    .at(x, 0, 0)

    .view(view)

    .with(new CelestialBodyComponent(bodyData))

    .build();

    if (bodyData == SATURN) {

    var torus = new Torus(r * 1.5, r * 0.3 / 3.0);

    e.getViewComponent().addChild(torus);

    }

    return e;

    }

    }

    代码清单 7-5

    SolarSystemFactory 类

    ```


    我们首先定义缩放单位。这样做是因为实际距离和尺寸的公里数值对于我们的应用来说过大，尤其是公里与 3D 单位之间的比例并非一比一。我们对距离和尺寸使用不同的缩放比例，以便在模拟中能看到大多数实体。我们并不追求科学级别的精确度，因此这种差异是可以接受的。接下来，我们通过调用`data.get("data")`获取天体数据，因此在生成实体时，必须确保实际传入这个`enum`数据。这样我们就能计算出天体在
    3D 单位中的位置和大小。


    3D 中的视图可以附加`Material`对象，用于决定视图的外观。我们使用默认的`PhongMaterial`，并将天体的纹理应用到其上。最终，每个天体在演示中都表现为一个球体，因此我们使用预先计算好的半径`r`构建一个`Sphere`对象，并应用材质。实体本身的构建很简单，就是一系列我们已经熟悉的调用。实体构建完成后，有一个针对土星的特殊情况，我们为其添加了一个额外的`Torus`视图，从而产生环绕行星的标志性光环效果。


    ### 构建 3D 应用程序类


    最后，我们之前创建的类可以在`SolarSystemApp`游戏应用程序类中整合起来，其实现见代码清单 7-6。该类中唯一的实例级字段是对 3D 摄像机的引用。在
    2D 中，我们在上一章介绍的视口移动（影响 2D 摄像机）很简单，包括沿 X 轴和 Y 轴的平移。然而在 3D 中，对摄像机进行抽象比使用视口要方便得多。在初始化和控制摄像机之前，我们必须先在`initSettings()`中启用
    3D 模式。这将使 FXGL 正确构建场景，并意识到实体将存在于 3D 世界中，而非 2D。在`initInput()`中，基于“WASD”键的摄像机移动只需调用`Camera3D`类中的相应方法即可。


    在游戏初始化过程中，我们从游戏场景中获取摄像机引用。然后设置其属性，例如移动速度、摄像机的可视距离以及初始位置（我们将摄像机沿 Z 轴平移 10 个单位，这样当摄像机生成时，它会看向原点
    0,0,0）。最后，我们将摄像机设置为 FPS（第一人称射击）模式，这意味着当我们移动鼠标时，摄像机视图会随之匹配并相应旋转。我们还使光标不可见，为用户创造更沉浸的体验。


    接下来，我们添加之前创建的实体工厂，这样 FXGL 就知道如何创建天体。其余的方法用于初始化光照、天空盒（可以理解为 3D 背景）以及天体本身。我们的模拟中将有两种光源：一种照亮整个场景的`AmbientLight`，另一种看似从太阳位置辐射出来的`PointLight`。天空盒是一个术语，用于描述绘制在包围整个
    3D 游戏场景的假想立方体六个内侧面上的图像集合。如果这个立方体足够大且足够远，那么这六张图像就会在摄像机周围营造出广阔空间的错觉。天空盒或其替代品在游戏中常用于隐藏游戏世界的有限边界。为了营造这种错觉，在`initSkybox()`方法中，我们构建了一个
    1024×1024 的图像，并遍历每个像素将其着色为白色或黑色。白色只有 2%的几率出现，因此整个图像很可能大部分是黑色，偶尔出现白色，从而创造出我们在图
    7-3 中看到的带有星星的夜空效果。最后，天体的创建很简单，因为所有逻辑都已封装在工厂类中。我们遍历每个天体的`enum`项，并使用数据生成它们各自的实体。

