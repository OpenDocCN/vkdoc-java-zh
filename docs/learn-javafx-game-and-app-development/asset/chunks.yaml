    This completes our platformer game example. We should be mindful that there are
    different ways to build any game. The case study covered in this chapter simply
    provides one possible implementation. As you learn more about JavaFX and FXGL,
    you will find different, possibly superior, ways to solve the same problem. This
    is common in game development and in the field of computer science in general.
    Nevertheless, based on this example, you should now be able to build a simple
    platformer game driven by physics.


    ## Summary


    In this chapter, we explored a range of physics uses in game development. We considered
    how to perform collision detection with a few different techniques. We also discussed
    their implementation details in FXGL. Next, we looked at some gameplay code that
    can be used for handling interactions between entities, for example, when a collision
    occurs. We saw how important collision handling is, since it allows the player
    to interact with the game world, as well as nonplayer entities to interact with
    one another. This importance is particularly prominent when considering 3D games,
    where interaction is fundamental to the immersion. Finally, we built a simple
    platformer game that utilized a lot of what we covered in this chapter. In the
    following chapter, we proceed by looking at how we can define AI for entities
    that are not player controlled.'
