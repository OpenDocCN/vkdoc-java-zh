    The implementation of `PaletteChangingComponent` is focused on choosing a random
    row inside the enemy sprite sheet and picking the right movement image based on
    which direction the entity is moving. The comments in the code show whether the
    move was horizontal or vertical. Once we have that information, the remaining
    question is whether the move was left or right (for horizontal), or up or down
    (for vertical). This can be determined by the difference between the current location
    and the previous one. If the difference is positive, then the move was to the
    right (for horizontal) and down (for vertical). The opposite is true if the difference
    is negative.


    Our last component to explore is the `PlayerComponent` class. Its full implementation
    is available from Listing [5-9](#522865_1_En_5_Chapter.xhtml#PC10). The entire
    logic of the component is just about moving the player in the correct direction
    using the A* component. We have the four methods (up, down, left, right), which
    can be called from input handling code to make our player move in a specific direction.
    In `onUpdate()`, we check whether we can actually move in that direction and do
    so if that is possible. The `teleport()` method has a trivial implementation due
    to the flexibility of the A* grid API. The code obtains a reference to a random
    walkable cell and moves the player entity (or rather teleports it) directly to
    that cell.


