    你可以将此处给出的关卡结束场景代码仅视为一个示例，而非参考实现。游戏视觉效果和美学并非一门精确科学，需要开发者通过大量试错才能获得恰到好处的游戏体验。这通常需要人类参与者的反馈，他们可以试玩你的游戏，并为游戏设计提供宝贵的见解。


    ### 结合逻辑与视觉效果


    现在，我们可以将所有类（无论是逻辑相关还是视觉效果相关）与 `PlatformerApp` 类连接起来。根据 FXGL 的标准架构，我们开发的所有功能都将在一个名为
    "App" 的类中使用。在本例中，它就是 `PlatformerApp`。这是一个相当复杂的类，因此我们将分节处理，逐一介绍各个方法。顺序如下：


    *   `initSettings()` – 初始化游戏设置


    *   `initInput()` – 初始化控制游戏角色的用户操作


    *   `initGameVars()` – 初始化全局可访问的游戏变量


    *   `initGame()` – 初始化游戏其余部分及玩法


    *   `initPhysics()` – 初始化物理设置和碰撞处理器


    *   `makeExitDoor()` – 使出口门在游戏中可见


    *   `onUpdate()` – 每帧调用，用于增加游戏时间并检查玩家是否死亡


    *   `nextLevel()` – 将游戏推进到下一关卡


    *   `setLevel()` – 通过从 Tiled 的 ".tmx" 文件加载来设置指定关卡


    所有这些方法都在清单 4-7 中提供。在 `initInput()` 中，我们需要绑定四个按键：A（向左移动）、D（向右移动）、W（跳跃）和 E（使用）。我们之前使用过更简洁的输入
    API 集；但在这里，我们需要使用完整的 API，以便重写 `onAction()` 和 `onActionEnd()`。对于 A、D 和 W 键，实际的输入实现很简单，因为我们只需调用之前创建的玩家组件的方法。E
    键的实现稍微复杂一些。我们需要找到游戏中所有按钮实体，然后检查该按钮是否可碰撞且当前正与玩家碰撞。如果是，我们就更新按钮视图，使其显示已被按下，然后调用 `makeExitDoor()`，稍后我们将介绍该方法。


    在 `initGameVars()` 中，我们初始化游戏变量，使其在源代码的任何位置都可访问。我们存储两样东西：当前关卡和在该关卡上花费的时间。利用时间值，在关卡结束时，我们可以在关卡结束场景中检查并相应地授予星星，该场景我们之前已经构建。


    下一个方法是 `initGame()`，大部分游戏初始化过程在此进行。我们添加平台游戏工厂类，以便 FXGL 知道如何创建我们的实体。我们创建关卡、生成玩家并生成背景（注意，由于背景的
    z-index，我们不必在其他任何东西之前生成背景；z-index 可以很好地处理任何排序问题）。最后，我们将视口（游戏的可视区域）绑定到玩家实体。这最后一步使视口跟随玩家实体，并提供你在平台游戏中常见的横向卷轴效果。我们将在第
    6 章讨论视口及其重要性。'
- fmt: '在`initPhysics()`中，我们设置了游戏的物理配置。具体来说，我们首先根据玩家控制的感觉将重力设置为一个任意值`760`。如果玩家感觉太轻，你可能希望增加该值。同样，如果玩家跳跃距离太短，你可以减小该值。回想一下，在注册碰撞处理器时，有两种方法可以使用：一种是创建一个碰撞处理器类，就像我们在`PlayerButtonHandler`中所做的那样，另一种是使用FXGL提供的DSL
    API。当玩家与出口标志、出口触发器和出口门碰撞时，我们只想触发一次碰撞处理代码。因此，我们使用`onCollisionOneTimeOnly()`。这三种实体类型的一次性碰撞处理器中的代码很简单。在`initPhysics()`中注册的最后一个碰撞处理器是玩家与按键提示之间的碰撞。我们不希望这些类型之间的碰撞只发生一次，而是希望每次发生碰撞时都得到通知；因此，我们使用之前见过的`onCollisionBegin()`。处理器内部的代码会生成一个按键提示实体，该实体浮动几秒钟，向玩家指示可以按下特定键来触发某些游戏机制。


    `makeExitDoor()`方法简单地获取世界中构成出口门的两个实体（上半部分和下半部分）的引用。我们启用门上的碰撞注册，并通过将两者的不透明度设置为`1`（因此透明度为`0`）使它们在游戏中可见。


    在`onUpdate()`内部，我们将关卡时间增加一个等于每帧时间的值，如果以每秒60帧运行，该值通常为`0.016(6)`。该方法中唯一的其他代码是对玩家`Y`值的检查。如果它大于游戏高度，则玩家必定已从关卡中掉落（由于错过平台跳跃），因此我们重新开始同一关卡。


    `nextLevel()`方法负责设置下一关卡，或者在没有更多关卡时显示游戏结束消息。首先执行此检查，以查看我们的关卡是否是游戏中的最大关卡。如果检查失败，我们将关卡编号增加`1`并将其设置为当前关卡。


    `setLevel()`方法是关卡生成发生的地方。我们将玩家的位置重置到游戏开始处，并重置关卡时间。`setLevelFromMap()`方法由FXGL提供，用于自动将`.tmx`文件解析为FXGL关卡。我们还可以查询与`.tmx`文件关联的各种属性，例如在关卡中获得三颗星所需的`shortestTime`自定义属性。最后，我们基于此数据构建一个新的关卡结束场景。


    总结一下清单[4-7](#522865_1_En_4_Chapter.xhtml#PC9)，应用程序类只是将所有我们在其他文件中实现的各个组件、逻辑和视图相关类整合在一起。你会在使用FXGL的整个开发过程中发现这种模式（即先开发功能类，然后在应用程序类中组合它们）。'
  raw: 'In `initPhysics()`, we set up the physics configuration of the game. Specifically,
    we first set the gravity to an arbitrary value of 760 based on how the player
    controls feel. If the player appears too light, you may wish to increase the value.
    Similarly, if the player jumps are too short, you can decrease the value. Recall
    that when registering a collision handler, there are two approaches you can utilize:
    one is to create a collision handler class, which we did in `PlayerButtonHandler`
    above, or use DSL API provided by FXGL. When the player collides with the exit
    sign, the exit trigger, and the exit door, we only want to trigger the collision
    handling code once. Hence, we use `onCollisionOneTimeOnly()`. The code inside
    one-time collision handlers for these three entity types is straightforward. The
    last collision handler registered in `initPhysics()` is the one between the player
    and key prompts. We do not wish the collision between these types to happen only
    once, but we want to be notified every time the collision occurs; hence, we use
    `onCollisionBegin()`, which we saw before. The code inside the handler spawns
    a key prompt entity that floats for a few seconds indicating to the player that
    a specific key can be pressed to trigger some gameplay mechanic.


    The `makeExitDoor()` method simply gets the references to the two entities (the
    top half and the bottom half) in the world that together form the exit door. We
    enable the collision registering on the door and make both parts visible in the
    game by setting their opacity to 1 (and therefore transparency to 0).


    Inside `onUpdate()`, we increase the level time by a value equal to the time per
    frame, which is normally 0.016(6) if running at 60 frames per second. The only
    other code inside the method is a check for the player’s Y value. If it is greater
    than the game height, then the player must have fallen through the level (by missing
    a platform jump), so we restart the same level.


    The `nextLevel()` method is responsible for setting the next level or showing
    the game over message if there are no more levels. This check is performed first
    to see if our level is the maximum level we have in the game. Failing the check,
    we increment the level number by 1 and set it as the current level.


    The `setLevel()` method is where the level generation happens. We reset the player’s
    position to the beginning of the game and also reset the level time. The `setLevelFromMap()`
    method is provided by FXGL to automatically parse a “.tmx” file into an FXGL level.
    We can also query various properties associated with the “.tmx” file, such as
    the custom property of `shortestTime` needed to achieve three stars in the level.
    Finally, we construct a new level end scene based on this data.


    To sum up Listing [4-7](#522865_1_En_4_Chapter.xhtml#PC9), the application class
    simply brings together all of the individual components, logic, and view-related
    classes that we implemented in other files. You will find this pattern (where
    functionality classes are developed first and then combined in the application
    class) throughout your development with FXGL.'
  trans: '

    在 `initPhysics()` 中，我们设置了游戏的物理配置。具体来说，我们首先根据玩家控制的手感，将重力设置为一个任意值 760。如果玩家感觉太轻，你可能希望增加该值。同样，如果玩家跳跃高度太低，你可以减小该值。回想一下，在注册碰撞处理器时，有两种方法可供使用：一种是创建一个碰撞处理器类，就像我们在上面的
    `PlayerButtonHandler` 中所做的那样；另一种是使用 FXGL 提供的 DSL API。当玩家与出口标志、出口触发器和出口门碰撞时，我们只想触发一次碰撞处理代码。因此，我们使用了
    `onCollisionOneTimeOnly()`。这三种实体类型的一次性碰撞处理器内部的代码都很直接。在 `initPhysics()` 中注册的最后一个碰撞处理器是玩家与按键提示之间的碰撞。我们不希望这些类型之间的碰撞只发生一次，而是希望在每次发生碰撞时都得到通知；因此，我们使用了之前见过的
    `onCollisionBegin()`。处理器内部的代码会生成一个按键提示实体，该实体漂浮几秒钟，向玩家指示可以按下特定按键来触发某种游戏机制。


    `makeExitDoor()` 方法只是获取世界中构成出口门的两个实体（上半部分和下半部分）的引用。我们启用了门上的碰撞注册，并通过将两者的不透明度设置为
    1（因此透明度为 0）使它们在游戏中可见。


    在 `onUpdate()` 内部，我们将关卡时间增加一个等于每帧时间的值，如果以每秒 60 帧运行，该值通常为 0.016(6)。该方法中唯一的其他代码是检查玩家的
    Y 值。如果它大于游戏高度，那么玩家一定是（因错过平台跳跃而）掉出了关卡，因此我们重新开始同一关卡。


    `nextLevel()` 方法负责设置下一个关卡，或者在没有更多关卡时显示游戏结束消息。首先执行此检查，以查看我们的关卡是否是游戏中拥有的最大关卡。如果检查失败，我们将关卡编号增加
    1，并将其设置为当前关卡。


    `setLevel()` 方法是关卡生成发生的地方。我们将玩家的位置重置到游戏起点，并重置关卡时间。`setLevelFromMap()` 方法由 FXGL
    提供，用于自动将“.tmx”文件解析为 FXGL 关卡。我们还可以查询与“.tmx”文件关联的各种属性，例如在关卡中获得三颗星所需的 `shortestTime`
    自定义属性。最后，我们基于此数据构建一个新的关卡结束场景。


    总结一下清单 4-7，应用程序类只是将我们在其他文件中实现的所有独立组件、逻辑和视图相关类整合在一起。在使用 FXGL 进行开发的过程中，你会发现这种模式（先开发功能类，然后在应用程序类中组合它们）贯穿始终。

