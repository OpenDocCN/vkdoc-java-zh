- fmt: "# Collision Handling\n\nIn this section, we examine the FXGL API that allows\
    \ us to handle collisions, that is, to call gameplay code to perform some in-game\
    \ operations as a result of a collision. We have used the player-coin example\
    \ collision earlier, so we will continue building on that. As mentioned before,\
    \ when the player collides with the coin, we would normally perform three actions:\
    \ remove the coin, increase the player score, and play a sound effect to let the\
    \ user know that an event has occurred. In the previous chapter, we already used\
    \ some simple collision handling DSL API, but here, we will explore the full API,\
    \ as it provides us with more options. To implement this gameplay logic, we create\
    \ a class that extends a `CollisionHandler`. In the constructor, we specify the\
    \ two types of entities for which this is a handler. We now consider the overridden\
    \ methods.\n\n```\npublic class PlayerCoinHandler extends CollisionHandler {\n\
    \    public PlayerCoinHandler() {\n        super(EntityType.PLAYER, EntityType.COIN);\n\
    \    }\n\n    @Override\n    protected void onHitBoxTrigger(Entity p, Entity c,\
    \ HitBox boxA, HitBox boxB) { }\n\n    @Override\n    protected void onCollisionBegin(Entity\
    \ p, Entity c) {\n        c.removeFromWorld();\n        FXGL.inc(\"score\", +2);\n\
    \        FXGL.play(\"pickup_coin.wav\");\n    }\n\n    @Override\n    protected\
    \ void onCollision(Entity p, Entity c) { }\n\n    @Override\n    protected void\
    \ onCollisionEnd(Entity p, Entity c) { }\n}\n```\n\nAs we can see from Listing\
    \ [4-1](#522865_1_En_4_Chapter.xhtml#PC2), there are four such methods (if you\
    \ are curious about all possible physics-related methods, they are available from\
    \ [`https://github.com/AlmasB/FXGL/tree/dev/fxgl-entity/src/main/java/com/almasb/fxgl`](https://github.com/AlmasB/FXGL/tree/dev/fxgl-entity/src/main/java/com/almasb/fxgl)):\n\
    \n- `onHitBoxTrigger()` – This is the first method to be called when the collision\
    \ occurs. It allows us to check which hit boxes collided. This is useful, for\
    \ example, in fighting games: depending on where the character was hit, we can\
    \ decide how many hit points to deduct.\n- `onCollisionBegin()` – This is the\
    \ method to be called in the same frame when the collision occurs, and it is called\
    \ only once. Normally, this is the callback that is used for collectible items,\
    \ such as a coin. In the example code, we implement just what we described the\
    \ gameplay should be: remove the coin, increase the score, and play the sound.\n\
    - `onCollision()` – This is the method to be called every frame while the collision\
    \ is present. This can be used to constantly deal damage to the player who is\
    \ colliding with spikes. Alternatively, the callback can also be used to award\
    \ points to the player for being in the scoring zone.\n- `onCollisionEnd()` –\
    \ This is the method to be called in the same frame when the collision stopped\
    \ occurring. This can be used to make user interaction prompts invisible, as the\
    \ player has left the area where the interaction is meaningful.\n\nFor the collision\
    \ handler to work, two entities must satisfy the following requirements; they\
    \ must both:\n\n- Have a `CollidableComponent` attached\n- Have a bounding box\n\
    - Have a type\n- Have the collision handler attached to the physics world by calling\
    \ `addCollisionHandler()`\n\nIf these requirements are met, then the collision\
    \ handler will appropriately handle the collisions (call the overridden methods)\
    \ that occur between the two entities. Finally, when no longer needed, you can\
    \ remove it by calling `removeCollisionHandler()`.\n\n## Physics World\n\nSo far,\
    \ we have considered entities that are controlled by the developer. There is one\
    \ other way to involve the physics world in gameplay, which is to let it control\
    \ the entities. In this case, we are effectively running a simulation, such as\
    \ rigid body dynamics. In order to run the simulation, an entity needs to have\
    \ a `PhysicsComponent` attached. There are several commonly used configuration\
    \ options that can be set via this component:\n\n- `setFixtureDef()` – A fixture\
    \ definition provides physics properties of an entity, such as friction, restitution\
    \ (elasticity), density, and shape. Common shapes are rectangle, circle, chain,\
    \ and polygon.\n- `setOnPhysicsInitialized()` – Allows the developer to provide\
    \ a callback, which is invoked when physics has been initialized for the entity.\n\
    - `setLinearVelocity()` – Allows the developer to manually set the velocity of\
    \ a physics-supported entity. The velocity will then be applied by the physics\
    \ world.\n- `setBodyType()` – One of static, kinematic, or dynamic. A static entity\
    \ has zero mass and zero velocity. These are typically objects that do not move,\
    \ for example, platforms and walls. A kinematic entity has zero mass but nonzero\
    \ velocity that can be set by the developer. Kinematic entities are moved by the\
    \ physics world and typically represent player-controlled objects, such as the\
    \ bat in Pong or Breakout. A dynamic entity has a positive mass and nonzero velocity\
    \ calculated by the forces being applied to the entity. Like kinematic, a dynamic\
    \ entity is also moved by the physics world. They normally represent objects that\
    \ do not need to be controlled by the player, for example, bullets or the ball\
    \ in Pong or Breakout.\n\nIn rigid body dynamics, entities obtain a rigid (solid)\
    \ body. When two entities of this form collide, the physics engine will attempt\
    \ to separate them so that entities do not occupy the same space. Once an entity\
    \ is considered part of the physics world, there are several commonly used world\
    \ options you may wish to configure. These are accessible from the physics world\
    \ object:\n\n- `setGravity()` – Sets the gravity that is applied to dynamic entities\
    \ in the world.\n- `raycast()` – You can “shoot” a line from anywhere in the world\
    \ to a specific point. The method will return the first entity hit by that line.\
    \ This is useful if you wish to know if an entity is in the line of sight of another.\n\
    - `toMeters()` / `toPixels()` – Allows convenient conversion between pixels and\
    \ meters. Note that the game works in pixel-based units, whereas the physics world\
    \ operates with meters.\n- `toPoint()` / `toVector()` – As before, this method\
    \ converts from a point / vector from one context (game or physics world) to another\
    \ (physics world or game)."
  raw: '## Collision Handling


    In this section, we examine the FXGL API that allows us to handle collisions,
    that is, to call gameplay code to perform some in-game operations as a result
    of a collision. We have used the player-coin example collision earlier, so we
    will continue building on that. As mentioned before, when the player collides
    with the coin, we would normally perform three actions: remove the coin, increase
    the player score, and play a sound effect to let the user know that an event has
    occurred. In the previous chapter, we already used some simple collision handling
    DSL API, but here, we will explore the full API, as it provides us with more options.
    To implement this gameplay logic, we create a class that extends a `CollisionHandler`.
    In the constructor, we specify the two types of entities for which this is a handler.
    We now consider the overridden methods.


    ```

    public class PlayerCoinHandler extends CollisionHandler {

    public PlayerCoinHandler() {

    super(EntityType.PLAYER, EntityType.COIN);

    }

    @Override

    protected void onHitBoxTrigger(Entity p, Entity c, HitBox boxA, HitBox boxB) {
    }

    @Override

    protected void onCollisionBegin(Entity p, Entity c) {

    c.removeFromWorld();

    FXGL.inc("score", +2);

    FXGL.play("pickup_coin.wav");

    }

    @Override

    protected void onCollision(Entity p, Entity c) { }

    @Override

    protected void onCollisionEnd(Entity p, Entity c) { }

    }

    Listing 4-1

    An example of a collision handler

    ```


    As we can see from Listing [4-1](#522865_1_En_4_Chapter.xhtml#PC2), there are
    four such methods (if you are curious about all possible physics-related methods,
    they are available from [`https://github.com/AlmasB/FXGL/tree/dev/fxgl-entity/src/main/java/com/almasb/fxgl`](https://github.com/AlmasB/FXGL/tree/dev/fxgl-entity/src/main/java/com/almasb/fxgl)):


    *   onHitBoxTrigger() – This is the first method to be called when the collision
    occurs. It allows us to check which hit boxes collided. This is useful, for example,
    in fighting games: depending on where the character was hit, we can decide how
    many hit points to deduct.


    *   onCollisionBegin() – This is the method to be called in the same frame when
    the collision occurs, and it is called only once. Normally, this is the callback
    that is used for collectible items, such as a coin. In the example code, we implement
    just what we described the gameplay should be: remove the coin, increase the score,
    and play the sound.


    *   onCollision() – This is the method to be called every frame while the collision
    is present. This can be used to constantly deal damage to the player who is colliding
    with spikes. Alternatively, the callback can also be used to award points to the
    player for being in the scoring zone.


    *   onCollisionEnd() – This is the method to be called in the same frame when
    the collision stopped occurring. This can be used to make user interaction prompts
    invisible, as the player has left the area where the interaction is meaningful.


    For the collision handler to work, two entities must satisfy the following requirements;
    they must both


    *   Have a CollidableComponent attached


    *   Have a bounding box


    *   Have a type


    *   Have the collision handler attached to the physics world by calling addCollisionHandler()


    If these requirements are met, then the collision handler will appropriately handle
    the collisions (call the overridden methods) that occur between the two entities.
    Finally, when no longer needed, you can remove it by calling `removeCollisionHandler()`.


    ## Physics World


    So far, we have considered entities that are controlled by the developer. There
    is one other way to involve the physics world in gameplay, which is to let it
    control the entities. In this case, we are effectively running a simulation, such
    as rigid body dynamics. In order to run the simulation, an entity needs to have
    a `PhysicsComponent` attached. There are several commonly used configuration options
    that can be set via this component:


    *   setFixtureDef() – A fixture definition provides physics properties of an entity,
    such as friction, restitution (elasticity), density, and shape. Common shapes
    are rectangle, circle, chain, and polygon.


    *   setOnPhysicsInitialized() – Allows the developer to provide a callback, which
    is invoked when physics has been initialized for the entity.


    *   setLinearVelocity() – Allows the developer to manually set the velocity of
    a physics-supported entity. The velocity will then be applied by the physics world.


    *   setBodyType() – One of static, kinematic, or dynamic. A static entity has
    zero mass and zero velocity. These are typically objects that do not move, for
    example, platforms and walls. A kinematic entity has zero mass but nonzero velocity
    that can be set by the developer. Kinematic entities are moved by the physics
    world and typically represent player-controlled objects, such as the bat in Pong
    or Breakout. A dynamic entity has a positive mass and nonzero velocity calculated
    by the forces being applied to the entity. Like kinematic, a dynamic entity is
    also moved by the physics world. They normally represent objects that do not need
    to be controlled by the player, for example, bullets or the ball in Pong or Breakout.


    In rigid body dynamics, entities obtain a rigid (solid) body. When two entities
    of this form collide, the physics engine will attempt to separate them so that
    entities do not occupy the same space. Once an entity is considered part of the
    physics world, there are several commonly used world options you may wish to configure.
    These are accessible from the physics world object:


    *   setGravity() – Sets the gravity that is applied to dynamic entities in the
    world.


    *   raycast() – You can “shoot” a line from anywhere in the world to a specific
    point. The method will return the first entity hit by that line. This is useful
    if you wish to know if an entity is in the line of sight of another.


    *   toMeters() / toPixels() – Allows convenient conversion between pixels and
    meters. Note that the game works in pixel-based units, whereas the physics world
    operates with meters.


    *   toPoint() / toVector() – As before, this method converts from a point / vector
    from one context (game or physics world) to another (physics world or game).'
