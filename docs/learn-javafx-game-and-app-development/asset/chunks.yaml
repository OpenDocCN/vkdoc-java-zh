    import com.almasb.fxgl.app.GameApplication;

    import com.almasb.fxgl.app.GameSettings;

    import com.almasb.fxgl.core.math.FXGLMath;

    import com.almasb.fxgl.dsl.components.DraggableComponent;

    import com.almasb.fxgl.entity.Entity;

    import javafx.geometry.Rectangle2D;

    import javafx.scene.paint.Color;

    import javafx.scene.shape.Circle;

    import javafx.scene.shape.Line;

    import java.util.HashMap;

    import java.util.Map;

    import static com.almasb.fxgl.dsl.FXGL.*;

    public class GraphVisSample extends GameApplication {

    private static final double NODE_RADIUS = 5;

    private Map nodes = new HashMap();

    private Map edges = new HashMap();

    @Override

    protected void initSettings(GameSettings settings) {

    settings.setWidth(1600);

    settings.setHeight(900);

    }

    @Override

    protected void initGame() {

    getGameScene().setBackgroundColor(Color.LIGHTGRAY);

    Entity background = new Entity();

    getGameWorld().addEntity(background);

    getAssetLoader().loadText("twitter_edges.txt")

    .forEach(line -> {

    var tokens = line.split(" +");

    int n1 = Integer.parseInt(tokens[0]);

    int n2 = Integer.parseInt(tokens[1]);

    Entity e1 = nodes.get(n1);

    if (e1 == null)

    e1 = makeNode(n1)

    Entity e2 = nodes.get(n2);

    if (e2 == null)

    e2 = makeNode(n2);

    var edge = new Line();

    edge.startXProperty().bind(e1.xProperty().add(NODE_RADIUS));                      edge.startYProperty().bind(e1.yProperty().add(NODE_RADIUS));

    edge.endXProperty().bind(e2.xProperty().add(NODE_RADIUS)          edge.endYProperty().bind(e2.yProperty().add(NODE_RADIUS));

    background.getViewComponent().addChild(edge);

    edges.put(hash(e1, e2), true);

    });

    }

    @Override

    protected void onUpdate(double tpf) {

    double K = 50;

    var entities = getGameWorld().getEntities();

    // start from 1 to skip the background entity

    for (int i = 1; i  e2

    var v = e2.getPosition()

    .subtract(e1.getPosition());

    double d = v.magnitude();

    // if there''s an edge between e1 and e2

    if (edges.containsKey(hash(e1, e2))) {

    double force = d * d / K * tpf;

    e1.translate(v.normalize().multiply(force));

    e2.translate(v.normalize().multiply(-force));

    }

    if (d > 0.0) {

    double force = K * K / d * tpf;

    e1.translate(v.normalize().multiply(-force));

    e2.translate(v.normalize().multiply(force));

    forceBounds(e1);

    forceBounds(e2);

    }

    }

    }

    }

    private Entity makeNode(int id) {

    var e = entityBuilder()

    .at(FXGLMath.randomPoint(new Rectangle2D(0, 0, getAppWidth(), getAppHeight())))

    .view(new Circle(NODE_RADIUS,NODE_RADIUS,NODE_RADIUS))

    .with("id", id)

    .with(new DraggableComponent())

    .buildAndAttach();

    nodes.put(id, e);

    return e;

    }

    private void forceBounds(Entity e) {

    if (e.getX()  getAppWidth())

    e.setX(getAppWidth() - 10);

    if (e.getY() + 10 > getAppHeight())

    e.setY(getAppHeight() - 10);

    }

    private int hash(Entity e1, Entity e2) {

    var hash1 = e1.hashCode();

    var hash2 = e2.hashCode();

    return hash1 > hash2

    ? 31 * (31 + hash1) + hash2

    : 31 * (31 + hash2) + hash1;

    }

    public static void main(String[] args) {

    launch(args);

    }

    }

    ```

    **Listing 7-2** An example implementation of a graph visualization application


    You can see that with this relatively simple graph drawing application, we have
    already produced a piece of software that is applicable in the real world. Specifically,
    this demo allows us to explore graph data that arise from various sources – the
    data need not be from a social network. This completes our visualizer demo, while
    we move on to the next exciting application, combining space, 3D, and dynamic
    simulations.


    ## Solar System in 3D


    In this section, we will use 3D capabilities of FXGL for the first time. While
    this section is not meant to give a comprehensive overview of what can be done
    in 3D, it demonstrates basic principles of such an application in FXGL. As you
    progress through this section, you will note that apart from rendering, there
    is very little difference between 2D and 3D.


    ### Celestial Object Data and Logic


    It is likely you have already seen different representations of our solar system.
    One of them is in Figure [7-4](#522865_1_En_7_Chapter.xhtml#Fig4), which is a
    screenshot from the application we will develop. Recall that when building a game,
    we would normally start by defining entity types. In this application, given we
    do not have different entity types (all of the entities shown in Figure [7-4](#522865_1_En_7_Chapter.xhtml#Fig4)
    are just celestial objects), we instead start by defining the properties of celestial
    bodies. Since the objects of these bodies are predefined, that is, we will not
    be introducing any at runtime, it makes sense to define them using an `enum` named
    `CelestialBody`. The full definitions are available in Listing [7-3](#522865_1_En_7_Chapter.xhtml#PC4).
    In simple terms, each body has a diameter in kilometers (km), rotation speed around
    its axis in km per second, distance from the sun in 10⁶ km, the orbital period
    in number of days, and finally the texture image to be used for the body. The
    image assets used for these bodies are obtained from [`www.solarsystemscope.com/textures/`](http://www.solarsystemscope.com/textures/)
    under CC-BY 4.0, though you can use any suitable images. Finally, the numeric
    values for bodies are available from [`https://nssdc.gsfc.nasa.gov/planetary/factsheet/`](https://nssdc.gsfc.nasa.gov/planetary/factsheet/).


    ```java

    import javafx.scene.image.Image;

    import static com.almasb.fxgl.dsl.FXGL.image;

    public enum CelestialBody {

    // scale down with 0.2 to make others visible

    SUN(1392680 * 0.2, 1.997, 0, 0, image("2k_sun.jpg")),

    MERCURY(4879, 0.003026, 57.9, 88, image("2k_mercury.jpg")),

    VENUS(12104, 0.00181, 108.2, 224.7, image("2k_venus_surface.jpg")),

    EARTH(12756, 0.4651, 149.6, 365.2, image("2k_earth_daymap.jpg")),

    MARS(6792, 0.24117, 228.0, 687.0, image("2k_mars.jpg")),

    JUPITER(142984, 12.6, 778.5, 4331, image("2k_jupiter.jpg")),

    SATURN(120536, 9.87, 1432.0, 10747, image("2k_saturn.jpg")),

    URANUS(51118, 2.59, 2867.0, 30589, image("2k_uranus.jpg")),

    NEPTUNE(49528, 2.68, 4515.0, 59800, image("2k_neptune.jpg"));

    // in km

    private double diameter;

    // in km/s

    private double rotationSpeed;

    // in 10^6 km

    private double distanceFromSun;

    // in days

    private double orbitalPeriod;

    private Image image;

    CelestialBody(double diameter, double rotationSpeed, double distanceFromSun, double
    orbitalPeriod, Image image) {

    this.diameter = diameter;

    this.rotationSpeed = rotationSpeed;

    this.distanceFromSun = distanceFromSun;

    this.orbitalPeriod = orbitalPeriod;

    this.image = image;

    }

    public double getDiameter() {

    return diameter;

    }

    public double getRadiusScaled(double scale) {

    return diameter * scale / 2.0;

    }

    public double getRotationSpeed() {

    return rotationSpeed;

    }

    public double getDistanceFromSun() {

    return distanceFromSun * 1_000_000;

    }

    public double getOrbitalPeriod() {

    return orbitalPeriod;

    }

    public Image getImage() {

    return image;

    }

    }

    ```

