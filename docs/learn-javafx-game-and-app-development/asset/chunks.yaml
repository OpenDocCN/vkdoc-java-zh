- fmt: "### Custom Components\n\nAs per usual, we start by defining entity types that\
    \ are present in the game. In our Pac-Man clone, we only have four types:\n\n\
    ```java\npublic enum PacmanType {\n    PLAYER, ENEMY, BLOCK, COIN\n}\n```\n\n\
    As this game is focused on AI, most of the functionality is contained within components.\
    \ We mentioned earlier that there are four types of enemies. These are `GuardCoinComponent`,\
    \ `DelayedChasePlayerComponent` (one with a delay and one without), and `RandomAStarMoveComponent`,\
    \ which is available as a pre-built component from FXGL. We will consider the\
    \ implementation of the first two files. As for the `RandomAStarMoveComponent`,\
    \ it has only one simple goal, which is to randomly move the entity inside the\
    \ level using the A* pathfinding. Therefore, we will not be discussing its implementation\
    \ details here. However, you are welcome to browse through the component’s source\
    \ code inside the FXGL repository on GitHub.\n\nWith respect to custom component\
    \ classes, there are four of them in this game example. They are:\n\n- `GuardCoinComponent`\
    \ – This is an AI component to make an enemy entity to guard a chosen coin in\
    \ the game.\n- `DelayedChasePlayerComponent` – This is an AI component to make\
    \ an enemy chase the player entity. This component has two modes: immediate (without\
    \ a delay) and delayed. In the immediate mode, it will directly go to the player\
    \ using the quickest route, whereas in the delayed mode, it will pick a slightly\
    \ longer route, giving the player some breathing space.\n- `PaletteChangingComponent`\
    \ – This is not an AI component per se, but it is there to help the AI fool the\
    \ player by changing the color scheme of each enemy so that the player cannot\
    \ readily know which AI they are facing.\n- `PlayerComponent` – This component\
    \ allows the player entity to perform gameplay actions, such as move and teleport.\n\
    \nWe will then go through the four components in the order mentioned previously,\
    \ with the first one being the `GuardCoinComponent`, in Listing [5-6](#522865_1_En_5_Chapter.xhtml#PC7).\n\
    \n```java\nimport com.almasb.fxgl.core.collection.grid.Cell;\nimport com.almasb.fxgl.entity.Entity;\n\
    import com.almasb.fxgl.entity.component.Component;\nimport com.almasb.fxgl.entity.component.Required;\n\
    import com.almasb.fxgl.pathfinding.astar.AStarMoveComponent;\nimport com.almasb.fxgl.texture.Texture;\n\
    import com.almasb.fxglgames.pacman.PacmanType;\nimport javafx.scene.paint.Color;\n\
    \npublic class GuardCoinComponent extends Component {\n    private AStarMoveComponent\
    \ astar;\n    private Entity targetCoin;\n\n    @Override\n    public void onUpdate(double\
    \ tpf) {\n        if (targetCoin == null || !targetCoin.isActive()) {\n      \
    \      entity.getWorld()\n                    .getRandom(PacmanType.COIN)\n  \
    \                  .ifPresent(coin -> {\n                        highlight(coin);\n\
    \                        targetCoin = coin;\n                    });\n       \
    \ } else {\n            if (astar.isAtDestination()) {\n                int x\
    \ = targetCoin.call(\"getCellX\");\n                int y = targetCoin.call(\"\
    getCellY\");\n                Cell cell = astar.getGrid().get(x, y);\n       \
    \         astar.getGrid()\n                        .getRandomCell(c -> c.getState().isWalkable()\
    \ && c.distance(cell) < 5)\n                        .ifPresent(astar::moveToCell);\n\
    \            }\n        }\n    }\n\n    private void highlight(Entity coin) {\n\
    \        var texture = (Texture) coin.getViewComponent().getChildren().get(0);\n\
    \        var newTexture = texture.multiplyColor(Color.RED).brighter();\n     \
    \   coin.getViewComponent().removeChild(texture);\n        coin.getViewComponent().addChild(newTexture);\n\
    \    }\n}\n```\n\n**Listing 5-6** The implementation of the Guard AI in our game\
    \ example\n\nThere are only two fields in this component: the reference to the\
    \ `AStarMoveComponent` (which we are already familiar with) and the coin entity.\
    \ The coin is what this AI will be guarding. Inside the `onUpdate()` method, we\
    \ first check if the target coin exists and is present in the game world, otherwise\
    \ picking a random coin to be our target. If the coin does exist, we simply choose\
