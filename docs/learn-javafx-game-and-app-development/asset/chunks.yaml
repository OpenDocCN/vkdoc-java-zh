  trans: '

    ## 平台游戏


    在本节中，我们将把本章学到的所有物理知识付诸实践，构建一个如图 4-3 所示的演示程序。为此，我们将开发一个简单的平台游戏。与上一章开发的乒乓球游戏不同，这个平台游戏将使用外部资源——素材，其中也包括一个在
    Tiled Editor 中预构建的关卡。为了简化开发，我们将使用公开可用的免费图片和精灵表。请确保你已下载并将素材放置在相应的目录中（以下链接提供了素材目录结构的详细信息）。完成这些步骤后，你就能跟随本节给出的实现进行操作。所使用的素材，以及这些素材的原始来源和作者的链接，均可在
    FXGLGames GitHub 仓库中找到：[`https://github.com/AlmasB/FXGLGames/tree/master/Mario`](https://github.com/AlmasB/FXGLGames/tree/master/Mario)。


    ![](img/522865_1_En_4_Fig3_HTML.jpg)


    一张图片展示了一个平台游戏演示，背景中有云朵和树木。深色背景上的字母 D 位于中央，玩家图像在平台上。


    图 4-3


    使用 FXGL 开发的平台游戏演示


    按照惯例，第一步是确定游戏中将包含哪些实体类型。在我们开发的平台游戏中，这些类型如下：


    ```

    public enum EntityType {

    PLAYER, COIN, PLATFORM, EXIT_TRIGGER, KEY_PROMPT, EXIT_SIGN, BUTTON, DOOR_TOP,
    DOOR_BOT

    }

    ```


    其中一些类型不言自明，而其他类型则会在我们逐步开发的过程中变得更加清晰。


    接下来，我们将按以下顺序逐一分析游戏中的每个类：


    *   PlayerComponent


    *   PlayerButtonHandler


    *   PlatformerFactory


    *   MainLoadingScene


    *   LevelEndScene


    *   PlatformerApp


    每个类都管理游戏的一个方面。


    ### 游戏逻辑


    我们首先来检查 `PlayerComponent` 类。回顾上一章的内容，组件允许我们向实体添加数据和行为。此外，我们还可以通过添加方法来通过组件控制实体。和之前一样，我们将按顺序逐一分析清单
    4-2 中的类及其方法，并提供与其用途相关的必要细节。


    ```

    import com.almasb.fxgl.entity.component.Component;

    import com.almasb.fxgl.physics.PhysicsComponent;

    import com.almasb.fxgl.texture.AnimatedTexture;

    import com.almasb.fxgl.texture.AnimationChannel;

    import javafx.geometry.Point2D;

    import javafx.scene.image.Image;

    import javafx.util.Duration;

    import static com.almasb.fxgl.dsl.FXGL.image;

    public class PlayerComponent extends Component {

    private PhysicsComponent physics;

    private AnimatedTexture texture;

    private AnimationChannel animIdle;

    private AnimationChannel animWalk;

    private int jumps = 2;

    public PlayerComponent() {

    Image image = image("player.png");

    animIdle = new AnimationChannel(image, 4, 32, 42, Duration.seconds(1), 1, 1);

    animWalk = new AnimationChannel(image, 4, 32, 42, Duration.seconds(0.66), 0, 3);

    texture = new AnimatedTexture(animIdle);

    texture.loop();

    }

    @Override

    public void onAdded() {

    entity.getTransformComponent().setScaleOrigin(new Point2D(16, 21));

    entity.getViewComponent().addChild(texture);

    physics.onGroundProperty().addListener((obs, old, isOnGround) -> {

    if (isOnGround) {

    jumps = 2;

    }

    });

    }

    @Override

    public void onUpdate(double tpf) {

    if (physics.isMovingX()) {

    if (texture.getAnimationChannel() != animWalk) {

    texture.loopAnimationChannel(animWalk);

    }

    } else {

    if (texture.getAnimationChannel() != animIdle) {

    texture.loopAnimationChannel(animIdle);

    }

    }

    }

    public void left() {

    getEntity().setScaleX(-1);

    physics.setVelocityX(-170);

    }

    public void right() {

    getEntity().setScaleX(1);

    physics.setVelocityX(170);

    }

    public void stop() {

    physics.setVelocityX(0);

    }

    public void jump() {

    if (jumps == 0)

    return;

    physics.setVelocityY(-300);

    jumps--;

    }

    }

    清单 4-2

    PlayerComponent 类

    ```


    这个类包含五个字段、一个构造函数和六个方法。这些字段分别是：物理组件（稍后我们将像往常一样在工厂类中将其添加到实体中）、动画纹理（允许我们使用精灵表）、两个动画通道（一个用于待机动画，一个用于行走动画），以及最后我们允许玩家跳跃的次数。构造函数负责设置动画。请注意，`image()`（完整调用是
    `FXGL.image()`）可用于从 `/assets/textures` 加载任何图像作为 JavaFX 的 `Image`。我们的图像名为 player.png，因此这就是我们传递给
    `image()` 方法的参数。使用加载的图像，我们构建了两个动画通道，并循环播放待机动画。


    在 `onAdded()` 回调中（当此组件 `PlayerComponent` 被添加到实体时调用），我们需要做三件事：设置缩放原点（以便我们能够根据移动方向正确地将玩家向左或向右翻转）、添加动画纹理，以及注册一个监听器，该监听器会在玩家落地时通知我们，以便重置跳跃次数。请注意，我们将玩家实体的缩放原点设置为点
    (16, 21)，这是玩家动画单帧（32×42）的中心点。


    在下一个回调 `onUpdate()` 中，我们确定要循环播放两个动画（行走或待机）中的哪一个。物理组件可以告诉我们实体是否正在沿特定轴移动。在我们的用例中，沿
    X 轴移动意味着玩家并非处于待机状态。因此，如果 `isMovingX()` 返回 true，我们想要循环播放行走动画，否则播放待机动画。

    '
- fmt: 'As expected, the `left()` and `right()` methods have a similar implementation.
    Scaling the entity with a negative value in the X axis means the entity will face
    the other (left) direction. Doing the same with a positive value scales the entity
    to face right. The velocities along the X axis can be set based on the game feel.
    Setting the X velocity to 0 will stop the entity entirely, hence the name of the
    method `stop()`. The last method `jump()` checks if we can jump: if the number
    of jumps is 0, then we cannot. The actual jump implementation simply sets the
    Y velocity to a negative value. Note that the positive Y axis faces down in FXGL
    (and in JavaFX). We now have a functional player component.


    Next, we will define our very first collision handler class in Listing [4-3](#522865_1_En_4_Chapter.xhtml#PC5).
    Note that we have already used anonymous collision handlers briefly and now we
    will properly isolate handling code into a separate class. The collision here
    will be handled between the player and the interactable button. When the player
    collides with the button, it will trigger a prompt to become visible, to indicate
    that the button can be pressed. When the collision ends, the key prompt will once
    again become invisible. We can turn visibility on and off by setting the opacity
    of the entity to 1 and 0, respectively. Note that it is also possible to call
    `setVisible(true / false)`, which will achieve the same visual effect.


    ```

    import com.almasb.fxgl.entity.Entity;

    import com.almasb.fxgl.physics.CollisionHandler;

    import com.almasb.fxglgames.platformer.EntityType;

    import static com.almasb.fxgl.dsl.FXGL.getGameWorld;

    public class PlayerButtonHandler extends CollisionHandler {

    public PlayerButtonHandler() {

    super(EntityType.PLAYER, EntityType.BUTTON);

    }

    @Override

    protected void onCollisionBegin(Entity player, Entity btn) {

    Entity keyEntity = btn.getObject("keyEntity");

    if (!keyEntity.isActive()) {

    keyEntity.setProperty("activated", false);

    getGameWorld().addEntity(keyEntity);

    }

    keyEntity.setOpacity(1);

    }

    @Override

    protected void onCollisionEnd(Entity player, Entity btn) {

    Entity keyEntity = btn.getObject("keyEntity");

    if (!keyEntity.getBoolean("activated")) {

    keyEntity.setOpacity(0);

    }

    }

    }

    Listing 4-3

    PlayerButtonHandler class

    ```


    Compared to the game of Pong we implemented in the previous chapter, there are
    far more entity types in our platformer game. Hence, the factory class is quite
    a bit larger. Consider the factory implementation in Listing [4-4](#522865_1_En_4_Chapter.xhtml#PC6),
    which we will also examine method by method. While there is a lot to go through,
    you only need to focus on one method at a time.


    ```

    import com.almasb.fxgl.dsl.components.LiftComponent;

    import com.almasb.fxgl.dsl.views.ScrollingBackgroundView;

    import com.almasb.fxgl.entity.Entity;

    import com.almasb.fxgl.entity.EntityFactory;

    import com.almasb.fxgl.entity.SpawnData;

    import com.almasb.fxgl.entity.Spawns;

