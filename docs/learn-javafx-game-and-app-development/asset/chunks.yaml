  trans: '

    # 8. 结论


    在最后一章中，我们通过简要总结各章节内容，并让读者有机会探索 FXGL 的更多可能性来作结。具体来说，我们回答了常见问题，然后讨论了可以基于本书内容构建的未来项目的细节。最后，将提供一个详尽的资源列表，供读者深入了解
    FXGL。


    在前面的章节中，我们探讨了 FXGL 游戏引擎的能力，以及它如何与 JavaFX 生态系统无缝集成。现在是时候回顾每章的关键要点：


    *   第 2 章：我们回顾了关于类、对象和方法的 Java 基础知识。这使我们能够构建现实世界对象和抽象概念的 Java 表示。然后，我们使用带有 Maven
    构建工具的 IntelliJ IDE，通过 FXGL 将 JavaFX 作为外部库加载。这种方法具有通用性，可用于加载任何外部库。我们还实现了一个 FXGL
    演示。


    *   第 3 章：我们学习了实体以及它们如何表示游戏对象。我们还学习了组件以及它们如何为实体提供数据和行为，将通用模板转变为独特的游戏对象。实体存在于游戏世界中，可以通过一系列属性（如实体类型、位置及其拥有的组件集）从世界中查询。在本章中，我们还构建了第一个游戏示例——一个乒乓球游戏。通过其开发过程，我们看到了实体-组件模型在游戏中的可扩展性。


    *   第 4 章：我们涵盖了物理基础知识，并学习了检测碰撞的各种方法。碰撞检测是任何游戏的关键方面，因为它实现了游戏对象之间的交互。我们看到了 FXGL
    如何允许开发者添加碰撞处理代码并修改物理驱动实体的属性。利用这些物理概念，我们开发了一个平台游戏，玩家必须通过与实体交互来到达关卡终点。


    *   第 5 章：我们学习了一些图论知识、A* 寻路算法，以及如何通过搜索图来找到游戏关卡中两点之间的路径。在 FXGL 中，此功能由 `AStarMoveComponent`
    提供，它使用关卡数据在游戏世界中导航。本章还重点介绍了 AI，以及开发者如何通过自定义组件或有限状态机实现为实体添加智能行为。最后，我们开发了一个迷宫动作游戏，其中每个敌人都有不同的
    AI 行为集。


    *   第 6 章：我们涵盖了图形学的基础知识，以及它如何转化为 FXGL（JavaFX）渲染管线。我们配置了一个粒子发射器来生成自定义视觉效果。我们看到了如何在
    FXGL 环境中使用 JavaFX UI 对象。这是 FXGL 的一个显著优势，因为无需学习任何新的 API 即可生成复杂的用户界面。为了让这些界面生动起来，我们探索了动画系统和内置插值器，它们可以改变动画的整体外观。


    *   第 7 章：我们看到了游戏和业务应用在实现方面有很多共同点。我们使用 FXGL 开发了简单的非游戏应用，包括一个带有业务逻辑的登录界面、一个图形数据可视化器，以及一个动画
    3D 太阳系模型。最后，我们探讨了如何使用 Maven 插件来打包 FXGL 应用。


    完成这些章节后，您已具备继续使用 FXGL 17 进行游戏或应用开发之旅的良好条件。以下部分提供了额外的资源，以帮助您更有效地实现目标。


    ## 常见问题解答


    本节涵盖了与 FXGL 相关的各种问题，包括其 API、软件架构和开发，这些都是社区中常见的问题。


    ***如何更改全局设置？*** FXGL 提供了许多内置设置，可以通过 `initSettings()` 方法中的 `GameSettings` 对象轻松配置。以下是一些重要的示例：


    *   setApplicationMode(ApplicationMode.DEBUG) – 启用所有调试日志记录调用。


    *   setScaleOnResize(boolean) – 如果为 true，则在调整大小时，游戏内容会根据用户设备分辨率自动放大或缩小。


    *   setFullscreenAllowedFromStart(boolean) – 如果为 true，则允许游戏在启动时立即进入全屏模式。


    ***如何更改音频音量？*** 可以通过访问运行时设置来更改音频音量，包括音效和音乐。请注意，这些设置与 `initSettings()` 方法中的设置对象不完全相同，尽管许多设置是重叠的。要获取运行时设置并更改音量，您可以调用：


    ```

    getSettings().setGlobalSoundVolume(0.5);

    getSettings().setGlobalMusicVolume(0.5);

    ```


    以下问题侧重于 FXGL 的总体开发以及整个框架，而不是实现特定功能的代码。


    ***开发 FXGL 的原因是什么？*** 它最初是一组自定义 Java 类，构建在用于游戏开发基础讲座的现有 JavaFX 功能之上。随着代码库的增长和变得灵活，我继续使用它来帮助我在
    YouTube 上运行 JavaFX 教程，这样我就可以避免在教程中重复输入相同的代码。随着我对代码及其 API 的迭代，最终这些简单的类形成了包，后来又形成了模块。因此，我决定将其制作成一个库，并与所有有兴趣学习
    JavaFX 和（或）游戏开发的人分享。


    ***我正在做一个学校（学术）项目，可以使用 FXGL 吗？*** 如果您是学生，您应该向您的导师咨询，以确定您的项目中是否允许使用第三方库。如果您是导师，如果您需要帮助调整您的课程以使用
    FXGL，请随时与我联系。世界上已有许多学术机构在其课程中使用了 FXGL。


    ***如果我在项目中使用 FXGL，是否需要担心许可或署名问题？*** 不需要。FXGL 代码库在 MIT 许可下提供，因此您可以随意使用它。像“Powered
    by FXGL”这样的字样会很好，但这取决于您。FXGL 适用于学术、爱好和商业项目。


    ***FXGL 会帮助我提高就业能力吗？*** 如果您认真对待游戏开发，并计划在该领域从事未来职业，为 AAA 级公司工作，我建议您使用 Unity (C#)
    或 Unreal Engine (C++)，两者均可免费使用。它们是业界广泛认可的引擎。但是，如果您希望成为一名独立游戏开发者，为较小的公司工作，并且希望继续使用
    Java，那么根据您的用例，FXGL、libGDX 和 JMonkey 都是不错的替代方案。


    ***在 FXGL 开发过程中学到了哪些关键点？*** FXGL 引擎自 2015 年以来一直（并且现在仍然）处于开发中。整个开发时间线可以分为两个阶段：早期阶段和后期阶段。在早期阶段，就软件架构和设计而言，一切都是暂定的。自上而下地设计引擎有助于确定重要的关注领域，例如游戏玩法、网络、文件系统访问和其他子系统。

