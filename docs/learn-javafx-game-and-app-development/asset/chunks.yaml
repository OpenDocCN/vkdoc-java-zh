    getGameScene().addUINode(node);

    ```


    With respect to menus in the UI layer, FXGL uses the factory pattern to work with
    these objects. To provide your own menu implementation, there are two things we
    need to do: first, create your menu class that extends `FXGLMenu`, and second,
    create your factory class that extends `SceneFactory`. For example:


    ```

    public class MyMenu extends FXGLMenu {

    public MyMenu(MenuType type) {

    super(type);

    getContentRoot().getChildren().addAll( ... );

    }

    }

    ```


    The `MenuType.MAIN_MENU` is the one shown at the start of the application. When
    the main menu is shown, the game has not been initialized yet. The `MenuType.GAME_MENU`
    is the one that can be opened by the player during gameplay. The view and functionality
    for both of these can be implemented by extending `FXGLMenu`. Once you have done
    so, we need to tell FXGL how to construct your custom menu, which is done via
    the scene factory:


    ```

    public class MySceneFactory extends SceneFactory {

    public FXGLMenu newMainMenu() {

    return new MyMenu(MenuType.MAIN_MENU);

    }

    public FXGLMenu newGameMenu() {

    return new MyMenu(MenuType.GAME_MENU);

    }

    }

    ```


    Finally, the only thing that remains is telling FXGL which factory class to use.
    This can be accomplished by setting the scene factory inside the `initSettings()`
    method as follows:


    ```

    settings.setSceneFactory(new MySceneFactory());.

    ```


    ### Immediate Mode


    Having covered basics of the retained mode in FXGL, we now briefly consider the
    immediate mode. If you have tried running some FXGL examples, or just skimmed
    through the code, you have probably noticed that there is no explicit `render()`
    to override in order to provide your own rendering routines. The reason for this
    is partially because FXGL is meant to be very high level in its API and hide most
    of the low-level code behind the engine curtains. The actual reason is the fact
    that JavaFX only gives access to the retained graphics mode, meaning we do not
