- fmt: "# Pong\n\nIn this section, we will build a fully functioning foundation for\
    \ a Pong game. The full up-to-date source code is available from [`https://github.com/AlmasB/FXGLGames`](https://github.com/AlmasB/FXGLGames)\
    \ under the Pong directory.\n\nIn Figure [3-1](#522865_1_En_3_Chapter.xhtml#Fig1)\
    \ (on the left image), you can see what we will achieve in this section. Admittedly,\
    \ the game looks a bit bland, but you will learn a lot about the basics of the\
    \ FXGL workflow and how to develop games in a predesigned templated way. Further\
    \ into this book, you will learn about graphical effects, which will allow you\
    \ to make this classic game a bit more visually appealing while staying true to\
    \ the original aesthetics, as can be seen in Figure [3-1](#522865_1_En_3_Chapter.xhtml#Fig1)\
    \ (on the right image).\n\n![](images/522865_1_En_3_Chapter/522865_1_En_3_Fig1_HTML.png)\n\
    \n2 Screenshots. The left depicts a screen, that has 2 small vertical thick lines\
    \ on it. The right depicts a screen, that has 2 small vertical thick lines, 2\
    \ small circles, and a line with graphical effects.\n\n**Figure 3-1** A game of\
    \ Pong: simple (left) and with visual enhancements (right)\n\nA common approach\
    \ when developing FXGL games is to start by defining what types of entities we\
    \ are planning to have in the game. In this example, we will have:\n\n- The player\
    \ bat\n- The enemy bat\n- The ball\n- Walls\n\nAs discussed before, we can define\
    \ types as Java enums. An enum is like a special class that can only hold a predefined\
    \ set of values. To implement these types, we can create the following enum:\n\
    \n```\npublic enum EntityType {\n    PLAYER_BAT, ENEMY_BAT, BALL, WALL\n}\n```\n\
    \n## Building the Player Bat Component\n\nAs we saw earlier with components, the\
    \ FXGL architecture promotes separation of concerns, which allows us to develop\
    \ various parts of our game separately. This independent development of parts\
    \ provides flexibility to developers and is in line with the Single Responsibility\
    \ Principle (which is part of SOLID principles; more information can be found\
    \ online). In light of this, we can start building the logic of our game entities\
    \ by creating their components first. In Pong, there are two types of objects:\
    \ bats (paddles) and the ball. We will begin with the `BatComponent`, the code\
    \ for which is given in Listing [3-4](#522865_1_En_3_Chapter.xhtml#PC19).\n\n\
    ```\nimport com.almasb.fxgl.dsl.FXGL;\nimport com.almasb.fxgl.entity.component.Component;\n\
    import com.almasb.fxgl.physics.PhysicsComponent;\n\npublic class BatComponent\
    \ extends Component {\n    private static final double BAT_SPEED = 420;\n    protected\
    \ PhysicsComponent physics;\n\n    public void up() {\n        if (entity.getY()\
    \ >= BAT_SPEED / 60)\n            physics.setVelocityY(-BAT_SPEED);\n        else\n\
    \            stop();\n    }\n\n    public void down() {\n        if (entity.getBottomY()\
    \ <= FXGL.getAppHeight() - (BAT_SPEED / 60))\n            physics.setVelocityY(BAT_SPEED);\n\
    \        else\n            stop();\n    }\n\n    public void stop() {\n      \
    \  physics.setLinearVelocity(0, 0);\n    }\n}\n```\n\n**Listing 3-4** `BatComponent`\
    \ class\n\nAs with other code snippets, we will cover the `BatComponent` class\
    \ in full. First, we note the three imports, which allow us to make use of FXGL\
    \ methods, the generic `Component` class, and the `PhysicsComponent` class. To\
    \ create a custom component, we define the name (here `BatComponent`) and extend\
    \ from `Component`.\n\nNext, we define our static constant value for the bat movement\
    \ speed. It is declared as a variable at the top (rather than using it in the\
    \ code as a hard-coded value) to make it easier to find the variable and modify\
    \ the value later on should you wish to change it. Taking this line of thought\
    \ further, you can even remove the “final” modifier if you would like to be able\
    \ to change the variable at runtime.\n\nSubsequently, we declare the `PhysicsComponent`\
    \ reference, named `physics`. Recall from the “Component Injection” subsection\
    \ in this chapter that we do not need to explicitly assign the reference to a\
    \ value since during entity creation, the component will be automatically injected.\
    \ Of course, we need to remember to add the `PhysicsComponent` before the `BatComponent`\
    \ for this to work properly. We will come back to entity creation later on, and\
    \ we will see how components are being added in the entity factory class.\n\n\
    The `BatComponent` has three methods: `up()`, `down()`, and `stop()`. As their\
    \ names imply, these methods are responsible for moving the bat entity. The implementation\
    \ of these methods is trivial – we check if we can move in a direction (e.g.,\
    \ up) and do so if the check succeeds. More specifically, when attempting to move\
    \ upward, we check if the Y value of the bat entity is further below than the\
    \ top of the game (screen). This means there is space available to move. If the\
    \ check fails, we stop the bat movement by setting its velocity to 0.\n\nAt this\
    \ stage, you may be wondering about the `BAT_SPEED / 60` used in the check and\
    \ not just `BAT_SPEED`. The reason is the difference between seconds and frames.\
    \ The velocity we set using physics is `BAT_SPEED` per second, and there are typically\
    \ 60 frames in a second. Therefore, each frame, we actually move `BAT_SPEED /\
    \ 60` units. Hence, we use this value to check if there is sufficient space available\
    \ for the bat entity to move.\n\n## Building the Enemy Bat Component\n\nBy extending\
    \ (recall what inheritance is from Chapter [2](#522865_1_En_2_Chapter.xhtml))\
    \ our `BatComponent`, we can define the `EnemyBatComponent` since most of the\
    \ functionality remains the same. The `EnemyBatComponent` can be written as in\
    \ Listing [3-5](#522865_1_En_3_Chapter.xhtml#PC20).\n\n```\nimport com.almasb.fxgl.entity.Entity;\n\
    \npublic class EnemyBatComponent extends BatComponent {\n    private Entity ball;\n\
    \n    @Override\n    public void onUpdate(double tpf) {\n        if (ball == null)\
    \ {\n            ball = entity.getWorld()\n                    .getSingletonOptional(EntityType.BALL)\n\
    \                    .orElse(null);\n        } else {\n            moveAI();\n\
    \        }\n    }\n\n    private void moveAI() {\n        Entity bat = entity;\n\
    \        boolean isBallToLeft = ball.getRightX() < bat.getX();\n        boolean\
    \ isBallToRight = ball.getX() > bat.getRightX();\n\n        if (isBallToLeft ||\
    \ isBallToRight) {\n            if (ball.getY() > bat.getY()) {\n            \
    \    if (isBallToLeft)\n                    down();\n                else\n  \
    \                  up();\n            } else {\n                stop();\n    \
    \        }\n        } else {\n            stop();\n        }\n    }\n}\n```\n\n\
    **Listing 3-5** `EnemyBatComponent` class\n\nLet us examine this class in detail.\
    \ You will note that this new component has a reference to the ball entity. At\
    \ the start of the game, we don’t know whether the ball is in the game world or\
    \ not, so we initialize the ball inside the `onUpdate()` method. To do so, we\
    \ check if the ball is `null` – at the start of the game, it is indeed `null`.\
    \ So during the first frame the game runs, the ball entity type will be queried\
    \ from the game world and initialized. By looking at the “else” branch of the\
    \ if statement, we can see that a call to `moveAI()` is made. In essence, at a\
    \ high level, this check can be described as follows: If the ball reference is\
    \ null, initialize it; otherwise, move the enemy bat.\n\nThe AI of the enemy bat\
    \ is actually quite simple. We will consider complex AI in a future chapter. In\
    \ the meantime, our AI is just a few if statements. We know the enemy bat is on\
    \ the right side of the screen. So we first check if the ball is to the left of\
    \ the bat, meaning we should try and catch it. By contrast, if the ball is to\
    \ the right, then we want to avoid touching it; otherwise, it will keep bouncing\
    \ between the bat and the wall, constantly awarding points to the player bat.\
    \ After this check, the only thing left to do is see if the ball is above or below\
    \ the enemy bat and move accordingly."
  raw: '## Pong


    In this section, we will build a fully functioning foundation for a Pong game.
    The full up-to-date source code is available from [`https://github.com/AlmasB/FXGLGames`](https://github.com/AlmasB/FXGLGames)
    under the Pong directory.


    In Figure [3-1](#522865_1_En_3_Chapter.xhtml#Fig1) (on the left image), you can
    see what we will achieve in this section. Admittedly, the game looks a bit bland,
    but you will learn a lot about the basics of the FXGL workflow and how to develop
    games in a predesigned templated way. Further into this book, you will learn about
    graphical effects, which will allow you to make this classic game a bit more visually
    appealing while staying true to the original aesthetics, as can be seen in Figure
    [3-1](#522865_1_En_3_Chapter.xhtml#Fig1) (on the right image).


    ![](images/522865_1_En_3_Chapter/522865_1_En_3_Fig1_HTML.png)


    2 Screenshots. The left depicts a screen, that has 2 small vertical thick lines
    on it. The right depicts a screen, that has 2 small vertical thick lines, 2 small
    circles, and a line with graphical effects.


    Figure 3-1


    A game of Pong: simple (left) and with visual enhancements (right)


    A common approach when developing FXGL games is to start by defining what types
    of entities we are planning to have in the game. In this example, we will have


    *   The player bat


    *   The enemy bat


    *   The ball


    *   Walls


    As discussed before, we can define types as Java enums. An enum is like a special
    class that can only hold a predefined set of values. To implement these types,
    we can create the following enum:


    ```

    public enum EntityType {

    PLAYER_BAT, ENEMY_BAT, BALL, WALL

    }

    ```


    ### Building the Player Bat Component


    As we saw earlier with components, the FXGL architecture promotes separation of
    concerns, which allows us to develop various parts of our game separately. This
    independent development of parts provides flexibility to developers and is in
    line with the Single Responsibility Principle (which is part of SOLID principles;
    more information can be found online). In light of this, we can start building
    the logic of our game entities by creating their components first. In Pong, there
    are two types of objects: bats (paddles) and the ball. We will begin with the
    `BatComponent`, the code for which is given in Listing [3-4](#522865_1_En_3_Chapter.xhtml#PC19).


    ```

    import com.almasb.fxgl.dsl.FXGL;

    import com.almasb.fxgl.entity.component.Component;

    import com.almasb.fxgl.physics.PhysicsComponent;

    public class BatComponent extends Component {

    private static final double BAT_SPEED = 420;

    protected PhysicsComponent physics;

    public void up() {

    if (entity.getY() >= BAT_SPEED / 60)

    physics.setVelocityY(-BAT_SPEED);

    else

    stop();

    }

    public void down() {

    if (entity.getBottomY() <= FXGL.getAppHeight() - (BAT_SPEED / 60))

    physics.setVelocityY(BAT_SPEED);

    else

    stop();

    }

    public void stop() {

    physics.setLinearVelocity(0, 0);

    }

    }

    Listing 3-4

    BatComponent class

    ```


    As with other code snippets, we will cover the `BatComponent` class in full. First,
    we note the three imports, which allow us to make use of FXGL methods, the generic
    `Component` class, and the `PhysicsComponent` class. To create a custom component,
    we define the name (here `BatComponent`) and extend from `Component`.


    Next, we define our static constant value for the bat movement speed. It is declared
    as a variable at the top (rather than using it in the code as a hard-coded value)
    to make it easier to find the variable and modify the value later on should you
    wish to change it. Taking this line of thought further, you can even remove the
    “final” modifier if you would like to be able to change the variable at runtime.


    Subsequently, we declare the `PhysicsComponent` reference, named physics. Recall
    from the “Component Injection” subsection in this chapter that we do not need
    to explicitly assign the reference to a value since during entity creation, the
    component will be automatically injected. Of course, we need to remember to add
    the `PhysicsComponent` before the `BatComponent` for this to work properly. We
    will come back to entity creation later on, and we will see how components are
    being added in the entity factory class.


    The `BatComponent` has three methods: up, down, and stop. As their names imply,
    these methods are responsible for moving the bat entity. The implementation of
    these methods is trivial – we check if we can move in a direction (e.g., up) and
    do so if the check succeeds. More specifically, when attempting to move upward,
    we check if the Y value of the bat entity is further below than the top of the
    game (screen). This means there is space available to move. If the check fails,
    we stop the bat movement by setting its velocity to 0.


    At this stage, you may be wondering about the `BAT_SPEED / 60` used in the check
    and not just `BAT_SPEED`. The reason is the difference between seconds and frames.
    The velocity we set using physics is `BAT_SPEED` per second, and there are typically
    60 frames in a second. Therefore, each frame, we actually move `BAT_SPEED / 60`
    units. Hence, we use this value to check if there is sufficient space available
    for the bat entity to move.


    ### Building the Enemy Bat Component


    By extending (recall what inheritance is from Chapter [2](#522865_1_En_2_Chapter.xhtml))
    our `BatComponent`, we can define the `EnemyBatComponent` since most of the functionality
    remains the same. The `EnemyBatComponent` can be written as in Listing [3-5](#522865_1_En_3_Chapter.xhtml#PC20).


    ```

    import com.almasb.fxgl.entity.Entity;

    public class EnemyBatComponent extends BatComponent {

    private Entity ball;

    @Override

    public void onUpdate(double tpf) {

    if (ball == null) {

    ball = entity.getWorld()

    .getSingletonOptional(EntityType.BALL)

    .orElse(null);

    } else {

    moveAI();

    }

    }

    private void moveAI() {

    Entity bat = entity;

    boolean isBallToLeft = ball.getRightX()  bat.getY()) {

    if (isBallToLeft)

    down();

    else

    up();

    } else {

    stop();

    }

    }

    }

    Listing 3-5

    EnemyBatComponent class

    ```


    Let us examine this class in detail. You will note that this new component has
    a reference to the ball entity. At the start of the game, we don’t know whether
    the ball is in the game world or not, so we initialize the ball inside the `onUpdate()`
    method. To do so, we check if the ball is `null` – at the start of the game, it
    is indeed `null`. So during the first frame the game runs, the ball entity type
    will be queried from the game world and initialized. By looking at the “else”
    branch of the if statement, we can see that a call to `moveAI()` is made. In essence,
    at a high level, this check can be described as follows: If the ball reference
    is null, initialize it; otherwise, move the enemy bat.


    The AI of the enemy bat is actually quite simple. We will consider complex AI
    in a future chapter. In the meantime, our AI is just a few if statements. We know
    the enemy bat is on the right side of the screen. So we first check if the ball
    is to the left of the bat, meaning we should try and catch it. By contrast, if
    the ball is to the right, then we want to avoid touching it; otherwise, it will
    keep bouncing between the bat and the wall, constantly awarding points to the
    player bat. After this check, the only thing left to do is see if the ball is
    above or below the enemy bat and move accordingly.'
  trans: '

    ## 乒乓球


    在本节中，我们将为乒乓球游戏构建一个功能完整的基础框架。最新的完整源代码可在 [`https://github.com/AlmasB/FXGLGames`](https://github.com/AlmasB/FXGLGames)
    的 Pong 目录下获取。


    在图 3-1（左侧图片）中，您可以看到本节将要实现的效果。诚然，游戏看起来略显单调，但您将学到大量关于 FXGL 工作流程的基础知识，以及如何以预设模板化的方式开发游戏。在本书后续内容中，您将学习图形效果，这将使您能够在保留原始美学风格的同时，让这款经典游戏在视觉上更具吸引力，如图
    3-1（右侧图片）所示。


    ![](img/522865_1_En_3_Fig1_HTML.png)


    2 张截图。左侧屏幕显示有两条细小的垂直粗线。右侧屏幕显示有两条细小的垂直粗线、两个小圆圈以及一条带有图形效果的线条。


    图 3-1


    乒乓球游戏：简单版（左）与视觉增强版（右）


    开发 FXGL 游戏时，一种常见的方法是首先定义我们计划在游戏中拥有的实体类型。在本示例中，我们将包含：


    *   玩家球拍

    *   敌方球拍

    *   球

    *   墙壁


    如前所述，我们可以将类型定义为 Java 枚举。枚举是一种特殊的类，只能包含一组预定义的值。要实现这些类型，我们可以创建以下枚举：


    ```

    public enum EntityType {

    PLAYER_BAT, ENEMY_BAT, BALL, WALL

    }

    ```


    ### 构建玩家球拍组件


    正如我们之前通过组件所看到的，FXGL 架构提倡关注点分离，这使我们能够独立开发游戏的各个部分。这种独立开发的方式为开发者提供了灵活性，并符合单一职责原则（该原则是
    SOLID 原则的一部分；更多信息可在网上找到）。基于此，我们可以通过先创建组件来开始构建游戏实体的逻辑。在乒乓球游戏中，有两种类型的对象：球拍（挡板）和球。我们将从
    `BatComponent` 开始，其代码如代码清单 3-4 所示。


    ```

    import com.almasb.fxgl.dsl.FXGL;

    import com.almasb.fxgl.entity.component.Component;

    import com.almasb.fxgl.physics.PhysicsComponent;

    public class BatComponent extends Component {

    private static final double BAT_SPEED = 420;

    protected PhysicsComponent physics;

    public void up() {

    if (entity.getY() >= BAT_SPEED / 60)

    physics.setVelocityY(-BAT_SPEED);

    else

    stop();

    }

    public void down() {

    if (entity.getBottomY() <= FXGL.getAppHeight() - (BAT_SPEED / 60))

    physics.setVelocityY(BAT_SPEED);

    else

    stop();

    }

    public void stop() {

    physics.setLinearVelocity(0, 0);

    }

    }

    代码清单 3-4

    BatComponent 类

    ```


    与其他代码片段一样，我们将全面介绍 `BatComponent` 类。首先，我们注意到三个导入语句，它们使我们能够使用 FXGL 方法、通用的 `Component`
    类以及 `PhysicsComponent` 类。要创建自定义组件，我们需要定义名称（此处为 `BatComponent`）并继承 `Component`。


    接下来，我们定义球拍移动速度的静态常量值。将其声明为顶部的变量（而不是在代码中作为硬编码值使用），以便于查找该变量并在以后需要修改时轻松更改其值。进一步思考，如果您希望在运行时能够更改变量，甚至可以移除“final”修饰符。


    随后，我们声明了 `PhysicsComponent` 的引用，命名为 physics。回顾本章“组件注入”小节，我们不需要显式地为引用赋值，因为在实体创建过程中，组件会被自动注入。当然，我们需要记得在
    `BatComponent` 之前添加 `PhysicsComponent`，这样才能正常工作。我们稍后会回到实体创建的话题，并了解在实体工厂类中如何添加组件。


    `BatComponent` 包含三个方法：up、down 和 stop。顾名思义，这些方法负责移动球拍实体。这些方法的实现很简单——我们检查是否可以向某个方向（例如向上）移动，如果检查通过则执行移动。更具体地说，当尝试向上移动时，我们检查球拍实体的
    Y 值是否低于游戏（屏幕）的顶部。这意味着有足够的空间可以移动。如果检查失败，我们通过将速度设置为 0 来停止球拍移动。


    此时，您可能会对检查中使用的 `BAT_SPEED / 60` 而非直接使用 `BAT_SPEED` 感到疑惑。原因在于秒与帧之间的差异。我们通过物理系统设置的速度是每秒
    `BAT_SPEED`，而通常每秒有 60 帧。因此，每帧我们实际移动 `BAT_SPEED / 60` 个单位。所以，我们使用这个值来检查是否有足够的空间供球拍实体移动。


    ### 构建敌方球拍组件


    通过继承（回顾第 2 章中关于继承的概念）我们的 `BatComponent`，我们可以定义 `EnemyBatComponent`，因为大部分功能保持不变。`EnemyBatComponent`
    可以编写为代码清单 3-5 所示。


    ```

    import com.almasb.fxgl.entity.Entity;

    public class EnemyBatComponent extends BatComponent {

    private Entity ball;

    @Override

    public void onUpdate(double tpf) {

    if (ball == null) {

    ball = entity.getWorld()

    .getSingletonOptional(EntityType.BALL)

    .orElse(null);

    } else {

    moveAI();

    }

    }

    private void moveAI() {

    Entity bat = entity;

    boolean isBallToLeft = ball.getRightX()  bat.getY()) {

    if (isBallToLeft)

    down();

    else

    up();

    } else {

    stop();

    }

    }

    }

    代码清单 3-5

    EnemyBatComponent 类

    ```


    让我们详细分析这个类。您会注意到，这个新组件包含一个对球实体的引用。在游戏开始时，我们不知道球是否存在于游戏世界中，因此我们在 `onUpdate()` 方法内部初始化球。为此，我们检查球是否为
    `null`——在游戏开始时，它确实是 `null`。因此，在游戏运行的第一帧，将从游戏世界中查询球实体类型并进行初始化。通过查看 if 语句的“else”分支，我们可以看到调用了
    `moveAI()`。本质上，从高层次来看，这个检查可以描述如下：如果球引用为 null，则初始化它；否则，移动敌方球拍。


    敌方球拍的 AI 实际上非常简单。我们将在未来的章节中考虑复杂的 AI。目前，我们的 AI 仅由几个 if 语句组成。我们知道敌方球拍位于屏幕的右侧。因此，我们首先检查球是否在球拍的左侧，这意味着我们应该尝试接住它。相反，如果球在右侧，那么我们希望避免碰到它；否则，球会在球拍和墙壁之间不断弹跳，持续为玩家球拍加分。完成此检查后，唯一剩下的事情就是判断球是在敌方球拍的上方还是下方，并相应地移动。'
- fmt: '### Building the Ball Component


    Having considered the logic of both bats, let us dive into the logic of the ball
    entity. The next component is the `BallComponent`, which is provided in Listing
    [3-6](#522865_1_En_3_Chapter.xhtml#PC21).


    ```

    import com.almasb.fxgl.entity.component.Component;

    import com.almasb.fxgl.physics.PhysicsComponent;

    import javafx.geometry.Point2D;

    import static com.almasb.fxgl.dsl.FXGL.*;

    import static java.lang.Math.*;

    public class BallComponent extends Component {

    private PhysicsComponent physics;

    @Override

    public void onUpdate(double tpf) {

    limitVelocity();

    checkOffscreen();

    }

    private void limitVelocity() {

    // don''t move too slow in X direction

    if (abs(physics.getVelocityX())  5 * 60 * 2) {

    physics.setVelocityY(signum(physics.getVelocityY()) * 5 * 60);

    }

    }

    // we use a physics engine, so it is possible to push the ball through a wall
    to outside of the screen, hence the check

    private void checkOffscreen() {

    var viewport = getGameScene().getViewport();

    var visArea = viewport.getVisibleArea();

    if (getEntity().getBoundingBoxComponent().isOutside(visArea)) {

    physics.overwritePosition(new Point2D(

    getAppWidth() / 2,

    getAppHeight() / 2

    ));

    }

    }

    }

    Listing 3-6

    BallComponent class

    ```


    We again start by looking at the `onUpdate()` method. The high-level logic here
    is (a) limit the ball velocity so that it doesn’t break the sound barrier and
    (b) check if the ball is off-screen. Each of these elements is implemented in
    their own methods. The `limitVelocity()` method checks the current velocity in
    the X axis and then in the Y axis, limiting the values to `5 * 60` as necessary.
    Finally, we check if the ball is outside of the screen. This can occur because
    we use the physics engine to run the collisions simulation for rigid bodies. It
    is possible, in some cases, that the ball gets pushed against the walls so hard
    that the correct value computation would put it outside of the wall. Hence, there
    is a simple check to test if the ball is within the visible area of the viewport.
    If it isn’t, then just move the ball to the center of the screen.


    ### Building the Entity Factory


    Once we have the logic for each entity, implemented via components stated previously,
    we can now proceed with adding a factory to spawn the entities. The factory code
    is given in Listing [3-7](#522865_1_En_3_Chapter.xhtml#PC22), and it has two methods
    of note.


    ```

    import com.almasb.fxgl.entity.Entity;

    import com.almasb.fxgl.entity.EntityFactory;

    import com.almasb.fxgl.entity.SpawnData;

    import com.almasb.fxgl.entity.Spawns;

    import com.almasb.fxgl.entity.components.CollidableComponent;

    import com.almasb.fxgl.physics.BoundingShape;

    import com.almasb.fxgl.physics.HitBox;

    import com.almasb.fxgl.physics.PhysicsComponent;

    import com.almasb.fxgl.physics.box2d.dynamics.BodyType;

    import com.almasb.fxgl.physics.box2d.dynamics.FixtureDef;

    import javafx.scene.paint.Color;

    import javafx.scene.shape.Rectangle;

    import static com.almasb.fxgl.dsl.FXGL.entityBuilder;

    import static com.almasb.fxgl.dsl.FXGL.getip;

    public class PongFactory implements EntityFactory {

    @Spawns("ball")

    public Entity newBall(SpawnData data) {

    PhysicsComponent physics = new PhysicsComponent();

    physics.setBodyType(BodyType.DYNAMIC);

    physics.setFixtureDef(new FixtureDef().density(0.3f).restitution(1.0f));

    physics.setOnPhysicsInitialized(() -> physics.setLinearVelocity(5 * 60, -5 * 60));

    return entityBuilder(data)

    .type(EntityType.BALL)

    .view(new Circle(5, 5, 5))

    .bbox(new HitBox(BoundingShape.circle(5)))

    .with(physics)

    .with(new CollidableComponent(true))

    .with(new BallComponent())

    .build();

    }

    @Spawns("bat")

    public Entity newBat(SpawnData data) {

    boolean isPlayer = data.get("isPlayer");

    PhysicsComponent physics = new PhysicsComponent();

    physics.setBodyType(BodyType.KINEMATIC);

    return entityBuilder(data)

    .type(isPlayer ? EntityType.PLAYER_BAT : EntityType.ENEMY_BAT)

    .viewWithBBox(new Rectangle(20, 60, Color.LIGHTGRAY))

    .with(new CollidableComponent(true))

    .with(physics)

    .with(isPlayer ? new BatComponent() : new EnemyBatComponent())

    .build();

    }

    }

    Listing 3-7

    PongFactory class

    ```


    We can see the two methods in the factory class are `newBall()` and `newBat()`.
    We will look at these in order, starting from the `newBall()` method. Inside,
    we find a physics component since our ball is driven by the physics world. We
    need to initialize the physics to give the ball certain properties:


    - The body type is set to dynamic (other types are static (no movement) and kinematic
    (player-controlled movement)), which allows the physics world to fully control
    the movement of the entity.

    - Set the density and restitution (how bouncy it is) of the physics entity.

    - On physics initialized, set linear velocity of the entity, so the ball starts
    moving.


    Once our physics component is configured, we turn our attention to the entity
    builder. The builder allows us to quickly set up a bunch of properties of an entity.
    More specifically, we set the type to `EntityType.BALL`, the view to be a circle
    of radius 5, and the hit box to be of circular shape with radius 5. All of the
    components of an entity can easily be set by calling `with()`. Using this method,
    we add the physics, collidable, and ball components. This completes the construction
    of our ball entity, and we now move to constructing our bat entities.


    Recall that we have two different types of the bat entity: player and enemy. When
    constructing the bat entity, we are able to pass an extra parameter to tell the
    factory whether it is the player bat or the enemy bat we wish to use. Hence, the
    first line of code inside the `newBat()` method extracts this parameter into a
    boolean `isPlayer`. As with the `newBall()` method, we also require a physics
    component. However, the configuration of the component is simpler – we just set
    the body type to be kinematic so that the player or AI can control the bats, rather
    than the physics world. All that is left is the construction of the bat entity
    using the entity builder. We set the entity type based on the boolean `isPlayer`.
    The view is a simple JavaFX rectangle, which is also used to automatically generate
    a hit box for the entity with the `viewWithBBox()` method. As with the ball entity,
    we set the collidable and physics components. Finally, using the boolean `isPlayer`,
    we can determine whether we should use `BatComponent` or `EnemyBatComponent`.'
