- fmt: '# Graph Data Visualizer


    In this section, we will use a subset of Twitter social networking data available
    from [`https://snap.stanford.edu/data/`](https://snap.stanford.edu/data/) and
    develop an FXGL application to visualize this data in a form of a graph. Recall
    from Chapter [5](#522865_1_En_5_Chapter.xhtml) that a graph is a collection of
    nodes (items) and a collection of edges that connect the nodes. Graph data arises
    from a range of domains: from file systems and social networks to football matches
    and biomedical sciences. It is common to use graph visualizations to identify
    connections between items or to explore relationships between groups of items.
    A screenshot from the application we build is in Figure [7-3](#522865_1_En_7_Chapter.xhtml#Fig3),
    where you can see a moderately complex graph.


    ![](images/522865_1_En_7_Chapter/522865_1_En_7_Fig3_HTML.png)


    A screenshot depicts a complex graph, which has a huge number of nodes and a huge
    number of edges, that interconnect the nodes.


    **Figure 7-3** A visualization of an example Twitter network


    The data we obtained from the preceding source comes in a specific plain text
    format where each new line consists of two numbers (IDs) with a single space between
    them, like so:


    ```

    number1 number2

    number3 number4

    ...

    ```


    Each number (ID) identifies a single node (person in our context): these are drawn
    as small circles in Figure [7-3](#522865_1_En_7_Chapter.xhtml#Fig3). Each line
    of text identifies that there exists an edge (relationship) between the two nodes
    (people): these relationships are drawn as lines in Figure [7-3](#522865_1_En_7_Chapter.xhtml#Fig3).
    In essence, the high-level algorithm is as follows: draw a circle for each node
    and draw a line for each edge. This algorithm, alongside the FXGL application,
    is implemented in Listing [7-2](#522865_1_En_7_Chapter.xhtml#PC3), which we will
    now explore in detail.


    There are three fields in the `GraphVisSample` class: one to store the radius
    of circles that represent nodes, one to store a mapping from node IDs to their
    associated entities in the application, and, lastly, one to store edges present
    in the graph data (this can be stored as a list if you prefer). There are also
    five methods of note: `initGame()`, `onUpdate()`, `makeNode()`, `forceBounds()`,
    and `hash()`.


    In `initGame()`, we:


    * Load the graph data (which is in the plain text format defined previously) as
    a `List<String>`, where each item in the list is a separate line of text

    * Call `forEach()` on the list to process each line

    * Split each line into two tokens (the two int node IDs) and let `makeNode()`
    construct an entity from the node ID.

    * Add a new edge between the two nodes since each line of text indicates a relationship


    We see that each edge’s start and end points are bound to the positions of entities
    that visualize the nodes. Using this approach, we do not need to manually move
    the edges when we move the nodes. To avoid adding an entity for each edge, we
    construct a single entity called “background”, and we attach all edges to that
    entity. Finally, we store the edge data by “hashing” two node ids using `hash()`.
    This approach allows us to produce a unique identifier for a given pair regardless
    of the order in the pair.


    In `onUpdate()`, we implement the layout algorithm for the graph nodes and edges
    based on the Fruchterman-Reingold force model. Discussions on graph layout algorithms
    are beyond the scope of this book; however, in simple terms, nodes that have an
    edge between them are attracted, whereas nodes without edges are repelled. Therefore,
    all we need to do is move nodes that are connected with a line closer to one another
    and move nonconnected nodes further away from one another. This algorithm can
    be achieved by iterating over each node-node pair in the application and applying
    the appropriate movement. We should be mindful of the fact that these movement
    calls may translate nodes out of the screen bounds. Typically, we do not wish
    for this to happen, so at the end of each check, we call `forceBounds()` that
    keeps all nodes within the visible part of the screen.


    The `forceBounds()` method is straightforward and consists of four “if” statement
    checks, one for each side of the screen. If the entity (node) is beyond one of
    these sides, it is snapped back to stay within the screen bounds.


    The `makeNode()` method constructs an entity with a `Circle` as its view and,
    initially, places it randomly on the screen. We also attach a built-in component
    called `DraggableComponent`, which we have not used before. By attaching it to
    any entity, we are able to click on the entity and drag it around on the screen
    with our mouse. Since all nodes are constantly in motion due to the graph layout
    algorithm, dragging one node makes the graph self-rearrange, resulting in an appealing
    interactive experience for the user. In fact, by adding an on-click handler that,
    when clicked, would bring up some information about the node, we can easily extend
    this application. The implementation of this feature is left up to the reader
    to explore.'
