    2D grid with a blue square agent. Left-clicking on any cell will move the agent
    to that cell using the built-in A* pathfinding. Play around with it to see how
    right-clicking can create obstacles and how the agent will avoid them. An example
    screenshot is given in Figure [5-2](#522865_1_En_5_Chapter.xhtml#Fig2), where
    the red obstacles that spell out “FXGL” block the blue agent’s path.


    ![](images/522865_1_En_5_Chapter/522865_1_En_5_Fig2_HTML.png)


    A screenshot depicts a grid, in which a few of the blocks are filled in a deep
    color, that spells out F X G L. A block on the top of G is filled in a different
    color.


    Figure 5-2


    An example application showing A* pathfinding in FXGL


    ## Behavior


    We have covered how AI can move in a 2D world to reach its target using the world
    data. We now turn our attention to what AI should be doing when it does reach
    the target. In this section, we explore multiple ways of adding AI behavior to
    your enemy entities. While all are valid ways of adding AI, certain approaches
    are more suitable based on your use case. The most straightforward approach is
    to use a custom component when your entity behavior primarily has a single job.
    For example, suppose you have an enemy entity whose role is to be stationary and
    signal the other AI entities that the player is close. We can implement this behavior
    by creating a `SignalComponent`, shown in Listing [5-2](#522865_1_En_5_Chapter.xhtml#PC2).


    Essentially, the component’s `onUpdate()` method performs all of the logic behind
    this simple behavior. First, we will need to obtain the reference to the player
    entity so that we can check the distance between the player and us (the signaling
    entity). To do that, you can use one of the many query methods we covered in Chapter
    [3](#522865_1_En_3_Chapter.xhtml). Recall that `getEntity()`, when called from
    inside the component, returns the entity to which the component is attached, so
    the signaling entity. Using a simple if statement, we can check whether we should
    “signal other AI because the player is close.” You can also add the else branch,
    which is not needed here, but it should give you an idea regarding how to implement
    similar use cases.


    ```

    public class SignalComponent extends Component {

    @Override

    public void onUpdate(double tpf) {

    Entity player = ...

    if (getEntity().distance(player) < 100) {

    // constantly signal other AI that player is close

    }

    }

    }

    Listing 5-2

    SignalComponent class

    ```


    Let us consider another example in Listing [5-3](#522865_1_En_5_Chapter.xhtml#PC3).
    This AI behavior is focused on following any entity. Given a reference to any
    entity, such as the player, the `onUpdate()` method will constantly move the AI
    agent toward the direction of the entity. In general, you may have noticed that
    in FXGL, the update method is an appropriate place to handle entity logic and
    AI code.


    ```

    public class FollowComponent extends Component {

    @Override

    public void onUpdate(double tpf) {

    Entity player = ...

    getEntity().translateTowards(player.getPosition(),10);

    }

    }

    Listing 5-3

    FollowComponent class

    ```


    As you can see from Listings [5-2](#522865_1_En_5_Chapter.xhtml#PC2) and [5-3](#522865_1_En_5_Chapter.xhtml#PC3),
    the behavior implementation in FXGL is quite straightforward. However, in games,
    there are various use cases that arise, for which this simple implementation is
    not as suitable. So far, we have covered behavior that primarily had a single
    job: to signal or to follow. When the AI behavior has two or more distinct states,
    then we can use an existing `StateComponent` to help us define the AI functionality
    in a more effective way. The `StateComponent` essentially allows us to use a finite
    state machine (FSM), where an AI agent can only be in one of predefined states.
    In order to do this in FXGL, first, add `StateComponent` to your entity. Next,
    implement your states, such as in Listing [5-4](#522865_1_En_5_Chapter.xhtml#PC4).


    ```

    private EntityState GUARD = new EntityState() {

    @Override

    protected void onUpdate(double tpf) {

    // code to run when in this state

    }

    };

    Listing 5-4

    Defining an EntityState

    ```


    Finally, we can use `StateComponent` of the entity and set the created state:
    `entity.getComponent(StateComponent.class).changeState(GUARD)`. From this point
    onward, the entity will be calling the `onUpdate()` from the `GUARD` state, allowing
    the developer to isolate behavior that is specific to that state, again, following
    the single responsibility principle. Any other states can be created in exactly
    the same way. You can see that this approach can promote flexibility since states
    do not necessarily rely on knowing the existence of other states. However, if
    you wish, like in the next example, you can still declare all states within a
    single file and switch to a new state from within an existing different state.


    We will now look at a small FXGL application using FSM. In particular, let us
    imagine a resource gathering AI in a real-time strategy game, such as Warcraft
    3, Stronghold Crusader, or many other games of the genre. Such an AI automatically
    moves to any assigned resource to gather it. Once its “backpack” is full, the
    AI will move to the nearest “stockpile” to deposit the gathered resources, thus
    clearing its backpack. Next, it will restart its loop and continue gathering resources.
    Such an AI component is useful in many real-time strategy games where “worker”
    type entities can gather resources for the player. Ultimately, we can identify
    three states: gathering, moving, and depositing. The first two states are continuous,
    meaning the entity will spend some time in them. However, depositing is a single
    action and does not necessarily need to be implemented as a state. The implementation
    of this AI can be seen in Listing [5-5](#522865_1_En_5_Chapter.xhtml#PC5). We
    now examine it in detail.'
