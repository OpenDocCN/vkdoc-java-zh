    ```


    There are four variable fields and two state fields in this component:


    *   stateComponent – Reference to StateComponent, which is automatically injected.


    *   target – Current target of the entity, or null if there is no target.


    *   targetPosition – The position of the current target, or the point that the
    entity is moving toward if no target is present.


    *   prevTarget – The previous target of the entity.


    *   GATHERING state – In this state, the entity collects resources.


    *   MOVING state – In this state, the entity moves, either to a resource or to
    a stockpile.


    In the `GATHERING` state, the `onUpdate()` overridden method first checks if the
    backpack is full. We need to perform this check since there is no point in gathering
    resources if we do not have space for them. If the check returns true, meaning
    the backpack is full, then we send the AI back to the “base.” Next, we want to
    check if the resource is actually available to collect as it could have been depleted.
    If it is not available, we send our AI to the nearest matching resource entity
    to continue its gathering work. Having completed these checks, we check if the
    gathering timer has passed, since we do not want to gather the resource every
    frame, but every 2 seconds (~120 frames) in our example.


    In the `MOVING` state, the `onUpdate()` method takes care of changing the position
    of our AI entity in the game world. We first check if the entity has reached its
    destination; if it has, then we check why we are here (to gather a resource, or
    to drop off the gathered resource); otherwise, we make the entity continue moving
    in the direction of its target.


    The other methods in Listing [5-5](#522865_1_En_5_Chapter.xhtml#PC5) are there
    to simplify the implementation of our states, and you are encouraged to read through
    them on your own. So as you can see, at the end of the day, our AI is indeed just
    a sequence of conditional statements. However, if these are implemented properly
    and aligned with the appropriate concepts, such as FSM, then they create a powerful
    illusion for the player to play against. Now that we have covered different types
    of AI, as well as their simple implementations, we will proceed with a more specific
    game example.


    ## Maze Action Game


    In this section, we will build a simple action game with maze elements. Essentially,
    the game is a slightly modified clone of Pac-Man, which is a perfect example for
    this chapter. The game has four enemies in a maze-like level filled with coins.
    The player must traverse the maze and collect the coins while avoiding the enemies.
    Instead of making a complete clone, we will add some original elements to the
    game, such as the time bar and the teleport ability. All of the assets (including
