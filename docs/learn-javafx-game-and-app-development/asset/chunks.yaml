    至此，迷宫动作游戏的实现就完成了。一旦你拥有了所有类，就应该能够运行游戏。观察每个 AI 如何以各自独特的方式行动，并试图捕捉或威胁玩家。


    不同的游戏对 AI 有不同的要求。有些会像我们的示例一样使用 A*寻路算法，另一些则需要编写条件（if）语句来让玩家误以为 AI 在学习，还有些情况会用到成熟的计算机科学算法。总而言之，游戏
    AI 的实现没有单一的方法。不过，你现在已经对该领域有了总体了解，并知晓了常见的实现技术。现在，我们来总结本章涵盖的关键要点。


    ## 总结


    在本章中，我们介绍了游戏 AI 的基础知识。在游戏中加入 AI 非常重要，因为它能显著提升玩家的参与度。具体来说，我们探讨了 AI 代理如何利用 FXGL
    中的 A*寻路功能在游戏世界中导航。A*算法在二维网格或图（一种包含节点和边的数据结构）上运行，并计算两个节点之间的最短路径（可能存在多条）。随后，我们讨论了为
    AI 代理添加行为。行为使代理能够参与游戏玩法并与玩家互动，执行各种动作。在 FXGL 中，可以通过使用自定义组件或有限状态机来添加此类行为。最后，我们整合了一个带有原创附加功能的《吃豆人》克隆版。我们讨论了如何在游戏中实现每个
    AI 代理的行为，并展示了 FXGL 在允许用户编写自定义逻辑方面的灵活性。下一章将重点介绍如何增强 FXGL 游戏的视觉效果。


    # 6. 图形、视觉效果和用户界面


    本章将讨论许多与图形和渲染相关的视觉复杂特性。我们还将详细讲解 FXGL 中的粒子系统和动画系统。具体来说，我们将探讨：


    *   FXGL 中的渲染管线以及对底层绘制的抽象

    *   游戏层与 UI 层的分离

    *   粒子系统、其配置以及如何在游戏世界中使用它

    *   如何使用 FXGL API 平移、旋转和缩放游戏及 UI 元素


    图形和视觉效果是现代游戏的关键方面，对于 AAA 级游戏尤其如此。虽然 FXGL 无法达到如此高强度的图形计算水平，但它仍然能够产生令人印象深刻的效果。例如，图
    6-1 展示了一款应用了大量视觉效果的“射击”游戏。


    ![](img/522865_1_En_6_Fig1_HTML.jpg)


    一张截图展示了这款俯视角射击游戏中的场景，其中包含大量视觉效果。


    图 6-1

    一个使用 FXGL 开发的俯视角射击游戏示例


    为了对渲染的工作原理以及所使用的概念有一个总体了解，我们通过探讨计算机图形学背后的理论以及它在 FXGL 中的实现来开启本章。在后续内容中，我们将互换使用
    JavaFX 和 FXGL，因为 FXGL 中的大部分渲染管线都是由 JavaFX 提供的。'
- fmt: '## High-Level Rendering and UI


    We begin our graphics journey from the very top of the rendering process, encapsulated
    in a platform-specific representation of a window, and we go all the way down
    to how each back end natively renders the elements inside the window. In JavaFX,
    a native operating system window is abstracted by the `Stage` class. When it comes
    to window rendering, commonly seen options are:


    - Exclusive full screen (the window gets exclusive access to the graphics adapter,
    making it the only thing to be rendered on the display; this approach can make
    it difficult to quickly switch between windows).

    - Windowed (this is the typical state of any desktop application when you normally
    see the window decorations, including the minimize, maximize, and close buttons).
    This is the option that is provided by default.

    - Borderless full screen (the window is maximized, and borders are removed to
    achieve a full screen effect; however, without exclusive access, it is much easier
    to switch between windows).


    As you already know, inside the `Stage` object, we have a `Scene`, where all of
    the application gets rendered. In terms of rendering modes, in graphics, we commonly
    distinguish between “retained” and “immediate.” In the retained mode, you typically
    create UI objects and set their properties, whereas in the immediate mode, you
    typically make graphics calls to draw some primitives. For example, suppose we
    wish to draw a rectangle using both approaches. Using the retained mode, we construct
    a new `Rectangle()` object and set its `x`, `y`, `width`, and `height` properties.
    Then, based on these properties, JavaFX will know how to draw the rectangle. Using
    the immediate mode, we would normally make four calls to `drawLine()` with appropriate
    parameters to draw the four sides of the rectangle. The `drawLine()` method here
    is used to give a contrasting example, though it should be noted that some APIs
    may provide a direct call to `drawRect()`, which would draw a rectangle. We now
    examine how these theoretical approaches relate to the JavaFX implementation,
    starting first with the retained mode.


    ### Retained Mode


    The retained mode of rendering in JavaFX is done via the scene graph, which is
    a slightly modified graph (recall that we covered graphs in the previous chapter)
    data structure, called a tree. A tree data structure has a single special node
    called the root. The scene graph root is the top-level container that drives the
    layout of UI objects in the scene. An example of the scene graph hierarchy can
    be seen in Figure [6-2](#522865_1_En_6_Chapter.xhtml#Fig2), which shows how JavaFX
    UI objects (nodes) are organized in the scene. The scene graph is read from top
    to bottom and from left to right.


    ![](images/522865_1_En_6_Chapter/522865_1_En_6_Fig2_HTML.jpg)


    An organizational chart depicts the scene graph hierarchy as follows. Scene graph
    root is classified into button, slider, and vertical layout container. The vertical
    layout container includes list view and label.


    **Figure 6-2** An example JavaFX scene graph


    In the figure, you will notice that some nodes contain other nodes. For example,
    the vertical layout container that has `ListView` and `Label` objects is deliberately
    renamed to demonstrate how containers can have multiple nodes (these nodes are
    called children) inside them. In JavaFX, the actual name of the vertical layout
    node is `VBox`. Nodes that are not layout containers and are meant to be interactive
    from the user’s perspective are commonly known as controls. These nodes do not
    have children. Examples of controls include `Button` and `Slider`.


    The scene graph in JavaFX manages a logical representation of all UI objects active
    in the application. Based on this information, the scene graph can manage these
    objects in a very efficient way. For example, if a UI object is not visible, then
    there is no need to draw it. Another example would be “partial redraw”, where
    only a portion of the scene graph is redrawn if there were no major changes since
    the last frame. Generally, the scene graph retained approach is the preferred
    way to display your visual objects in JavaFX, and this is also true for FXGL.
    We should note here that all UI nodes in the visible scene can only be modified
    from the JavaFX Application Thread to avoid any graphical issues. In practice,
    this means in FXGL, you should only modify the UI from inside the `initUI()` or
    `onUpdate()` method. Alternatively, you can bind UI properties to FXGL in-game
    variables, as we have done in previous chapters, to avoid the need for manually
    modifying the view.


    Let us consider how to use the retained rendering approach with our game world.
    Recall that entities themselves do not necessarily carry information regarding
    their visual representation since not all entities require one. In order to display
    an entity on the screen, we normally need to configure and attach its view via
    the `ViewComponent`, which then provides the scene graph with rendering data.


    ```

    Rectangle view = new Rectangle();

    // configure view as appropriate

    entity.getViewComponent().addChild(view);

    ```


    Adding this entity to the game world will automatically add it to the scene graph
    since it has a `ViewComponent` with an associated view inside it. In the preceding
    example, we used a software generated shape – a rectangle. However, most of the
    time you will be using textures as views. There is a `Texture` class that does
    exactly that:


    ```

    Texture t = FXGL.texture("player.png");

    ```


    It should be noted that `Texture` is also a JavaFX node, so you can use it anywhere
    inside the UI, not just for FXGL entities.


    In the retained mode in FXGL, the scene graph is split into two: the game layer
    and the UI layer on top. The game layer is where your world is displayed. The
    coordinates in the game layer can extend beyond the visible viewport (we will
    cover the viewport concept a bit later in this section). As your player moves
    around, other parts of the world will become visible. Although most of the game
    layer will consist of entities, it is possible to add a view that is not associated
    with any entity.'
  raw: '## High-Level Rendering and UI


    We begin our graphics journey from the very top of the rendering process, encapsulated
    in a platform-specific representation of a window, and we go all the way down
    to how each back end natively renders the elements inside the window. In JavaFX,
    a native operating system window is abstracted by the `Stage` class. When it comes
    to window rendering, commonly seen options are


    *   Exclusive full screen (the window gets exclusive access to the graphics adapter,
    making it the only thing to be rendered on the display; this approach can make
    it difficult to quickly switch between windows).


    *   Windowed (this is the typical state of any desktop application when you normally
    see the window decorations, including the minimize, maximize, and close buttons).
    This is the option that is provided by default.


    *   Borderless full screen (the window is maximized, and borders are removed to
    achieve a full screen effect; however, without exclusive access, it is much easier
    to switch between windows).


    As you already know, inside the `Stage` object, we have a `Scene`, where all of
    the application gets rendered. In terms of rendering modes, in graphics, we commonly
    distinguish between “retained” and “immediate.” In the retained mode, you typically
    create UI objects and set their properties, whereas in the immediate mode, you
    typically make graphics calls to draw some primitives. For example, suppose we
    wish to draw a rectangle using both approaches. Using the retained mode, we construct
    a new `Rectangle()` object and set its x, y, width, and height properties. Then,
    based on these properties, JavaFX will know how to draw the rectangle. Using the
    immediate mode, we would normally make four calls to `drawLine()` with appropriate
    parameters to draw the four sides of the rectangle. The `drawLine()` method here
    is used to give a contrasting example, though it should be noted that some APIs
    may provide a direct call to `drawRect()`, which would draw a rectangle. We now
    examine how these theoretical approaches relate to the JavaFX implementation,
    starting first with the retained mode.


    ### Retained Mode


    The retained mode of rendering in JavaFX is done via the scene graph, which is
    a slightly modified graph (recall that we covered graphs in the previous chapter)
    data structure, called a tree. A tree data structure has a single special node
    called the root. The scene graph root is the top-level container that drives the
    layout of UI objects in the scene. An example of the scene graph hierarchy can
    be seen in Figure [6-2](#522865_1_En_6_Chapter.xhtml#Fig2), which shows how JavaFX
    UI objects (nodes) are organized in the scene. The scene graph is read from top
    to bottom and from left to right.


    ![](images/522865_1_En_6_Chapter/522865_1_En_6_Fig2_HTML.jpg)


    An organizational chart depicts the scene graph hierarchy as follows. Scene graph
    root is classified into button, slider, and vertical layout container. The vertical
    layout container includes list view and label.


    Figure 6-2


    An example JavaFX scene graph


    In the figure, you will notice that some nodes contain other nodes. For example,
    the vertical layout container that has `ListView` and `Label` objects is deliberately
    renamed to demonstrate how containers can have multiple nodes (these nodes are
    called children) inside them. In JavaFX, the actual name of the vertical layout
    node is `VBox`. Nodes that are not layout containers and are meant to be interactive
    from the user’s perspective are commonly known as controls. These nodes do not
    have children. Examples of controls include `Button` and `Slider`.


    The scene graph in JavaFX manages a logical representation of all UI objects active
    in the application. Based on this information, the scene graph can manage these
    objects in a very efficient way. For example, if a UI object is not visible, then
    there is no need to draw it. Another example would be “partial redraw”, where
    only a portion of the scene graph is redrawn if there were no major changes since
    the last frame. Generally, the scene graph retained approach is the preferred
    way to display your visual objects in JavaFX, and this is also true for FXGL.
    We should note here that all UI nodes in the visible scene can only be modified
    from the JavaFX Application Thread to avoid any graphical issues. In practice,
    this means in FXGL, you should only modify the UI from inside the `initUI()` or
    `onUpdate()` method. Alternatively, you can bind UI properties to FXGL in-game
    variables, as we have done in previous chapters, to avoid the need for manually
    modifying the view.


    Let us consider how to use the retained rendering approach with our game world.
    Recall that entities themselves do not necessarily carry information regarding
    their visual representation since not all entities require one. In order to display
    an entity on the screen, we normally need to configure and attach its view via
    the `ViewComponent`, which then provides the scene graph with rendering data.


    ```

    Rectangle view = new Rectangle();

    // configure view as appropriate

    entity.getViewComponent().addChild(view);

    ```


    Adding this entity to the game world will automatically add it to the scene graph
    since it has a `ViewComponent` with an associated view inside it. In the preceding
    example, we used a software generated shape – a rectangle. However, most of the
    time you will be using textures as views. There is a `Texture` class that does
    exactly that:


    ```

    Texture t = FXGL.texture("player.png");

    ```


    It should be noted that `Texture` is also a JavaFX node, so you can use it anywhere
    inside the UI, not just for FXGL entities.


    In the retained mode in FXGL, the scene graph is split into two: the game layer
    and the UI layer on top. The game layer is where your world is displayed. The
    coordinates in the game layer can extend beyond the visible viewport (we will
    cover the viewport concept a bit later in this section). As your player moves
    around, other parts of the world will become visible. Although most of the game
    layer will consist of entities, it is possible to add a view that is not associated
    with any entity:'
  trans: '

    ## 高级渲染与用户界面


    我们从渲染流程的最顶层开始图形学之旅，这一层封装在平台特定的窗口表示中，然后一路深入，探究每个后端如何原生渲染窗口内的元素。在 JavaFX 中，原生操作系统窗口由
    `Stage` 类抽象表示。在窗口渲染方面，常见的选项包括：


    *   **独占全屏**（窗口独占图形适配器，使其成为显示器上唯一渲染的内容；这种方式可能导致窗口间切换困难）。

    *   **窗口模式**（这是任何桌面应用的典型状态，通常可以看到窗口装饰，包括最小化、最大化和关闭按钮）。这是默认提供的选项。

    *   **无边框全屏**（窗口最大化，移除边框以实现全屏效果；但由于没有独占访问权限，窗口间切换更为便捷）。


    如你所知，在 `Stage` 对象内部，我们有一个 `Scene`，所有应用内容都在其中渲染。在渲染模式方面，图形学中通常区分“保留模式”和“立即模式”。在保留模式下，你通常创建
    UI 对象并设置其属性；而在立即模式下，你通常通过图形调用来绘制图元。例如，假设我们希望用两种方法绘制一个矩形。使用保留模式，我们构造一个新的 `Rectangle()`
    对象，并设置其 x、y、宽度和高度属性。然后，基于这些属性，JavaFX 将知道如何绘制矩形。使用立即模式，我们通常会调用四次 `drawLine()` 并传入适当参数来绘制矩形的四条边。这里使用
    `drawLine()` 方法是为了提供对比示例，但需要注意的是，某些 API 可能提供直接调用 `drawRect()` 的方法来绘制矩形。我们现在探讨这些理论方法如何与
    JavaFX 实现相关联，首先从保留模式开始。


    ### 保留模式


    JavaFX 中的保留模式渲染通过场景图完成，这是一种经过轻微修改的图（回顾一下我们在前一章中介绍的图）数据结构，称为树。树数据结构有一个特殊的节点，称为根节点。场景图的根节点是顶层容器，驱动场景中
    UI 对象的布局。场景图层次结构的一个示例如图 6-2 所示，该图展示了 JavaFX UI 对象（节点）如何在场景中组织。场景图从上到下、从左到右读取。


    ![](img/522865_1_En_6_Fig2_HTML.jpg)


    组织结构图描绘了场景图层次结构如下：场景图根节点分为按钮、滑块和垂直布局容器。垂直布局容器包含列表视图和标签。


    图 6-2


    一个 JavaFX 场景图示例


    在图中，你会注意到某些节点包含其他节点。例如，包含 `ListView` 和 `Label` 对象的垂直布局容器被特意重命名，以演示容器内部可以包含多个节点（这些节点称为子节点）。在
    JavaFX 中，垂直布局节点的实际名称是 `VBox`。不是布局容器且从用户角度旨在交互的节点通常称为控件。这些节点没有子节点。控件的示例包括 `Button`
    和 `Slider`。


    JavaFX 中的场景图管理应用中所有活跃 UI 对象的逻辑表示。基于此信息，场景图可以非常高效地管理这些对象。例如，如果某个 UI 对象不可见，则无需绘制它。另一个例子是“部分重绘”，即如果自上一帧以来没有重大变化，则仅重绘场景图的一部分。通常，场景图保留方法是
    JavaFX 中显示视觉对象的首选方式，对于 FXGL 也是如此。这里需要注意的是，可见场景中的所有 UI 节点只能从 JavaFX 应用程序线程修改，以避免任何图形问题。在实践中，这意味着在
    FXGL 中，你只应在 `initUI()` 或 `onUpdate()` 方法内部修改 UI。或者，你可以将 UI 属性绑定到 FXGL 的游戏内变量，正如我们在前几章中所做的那样，以避免手动修改视图的需要。


    让我们考虑如何将保留渲染方法应用于我们的游戏世界。回想一下，实体本身不一定携带其视觉表示的信息，因为并非所有实体都需要视觉表示。为了在屏幕上显示实体，我们通常需要通过
    `ViewComponent` 配置并附加其视图，然后该组件会向场景图提供渲染数据。


    ```

    Rectangle view = new Rectangle();

    // 按需配置视图

    entity.getViewComponent().addChild(view);

    ```


    将此实体添加到游戏世界将自动将其添加到场景图，因为它包含一个带有相关视图的 `ViewComponent`。在前面的示例中，我们使用了一个软件生成的形状——矩形。然而，大多数情况下，你会使用纹理作为视图。有一个
    `Texture` 类正是为此设计的：


    ```

    Texture t = FXGL.texture("player.png");

    ```


    需要注意的是，`Texture` 也是一个 JavaFX 节点，因此你可以在 UI 中的任何位置使用它，而不仅仅用于 FXGL 实体。


    在 FXGL 的保留模式下，场景图被分为两部分：游戏层和顶部的 UI 层。游戏层是你的世界显示的地方。游戏层中的坐标可以延伸到可见视口之外（我们将在本节稍后介绍视口概念）。随着你的玩家移动，世界的其他部分将变得可见。尽管游戏层的大部分由实体组成，但也可以添加不与任何实体关联的视图：

