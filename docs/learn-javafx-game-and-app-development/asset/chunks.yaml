    ## Packaging and Deployment


    In this section, we will introduce the OpenJFX and GluonFX Maven plug-ins, using
    which we will be able to produce a variety of end-user packages. These include
    a platform-specific zero-dependency image and also a native image. We will start
    with the former package that allows running the packaged application without the
    need for the user to install Java.


    To use the OpenJFX Maven plug-in with its `jlink` command, we typically need a
    `module-info.java` file, located at the sources root directory (typically `src/main/java`).
    The file contents are fairly trivial: we just give it a name (`mygame` in this
    case), and we tell it to include FXGL.


    ```

    open module mygame {

    requires com.almasb.fxgl.all;

    }

    ```


    Our next step is to add the Maven plug-in to the appropriate (plug-ins) part of
    the `pom.xml` file, which is done in Listing [7-7](#522865_1_En_7_Chapter.xhtml#PC9).


    ```

    org.openjfx

    javafx-maven-plugin

    0.0.8


    mygame/com.mygame.GameApp


    Listing 7-7

    The OpenJFX Maven plug-in

    ```


    The main class property shown in the plug-in configuration points to the class
    that has the `main()` method, and its name in our example is `GameApp`, located
    in the `com.mygame` package. We are now ready to use the command line for building
    zero-dependency packages. Open the operating system (or IDE) command prompt and
    navigate to where your `pom.xml` is located. Assuming the prompt recognizes the
    `mvn` command (if not, you may need to change the system settings so that the
    prompt knows where your Maven installation is), we simply run


    ```

    mvn compile

    mvn javafx:jlink

    ```


    Once these commands are successfully executed, the `target` directory will contain
    subdirectories with binaries specific to the platform on which you are running.
    For example, executing the commands on Windows will produce a zero-dependency
    package for Windows. This means you can distribute the package among Windows users
    and they will not need to install Java or anything else to run it. To run the
    packaged Windows-specific application, you can start the `.bat` file located in
    the `bin` subdirectory, which, through a series of calls, will invoke the `main()`
    method.


    The GluonFX Maven plug-in achieves a different goal: it performs an ahead-of-time
    compilation to produce a fully native package, which, unlike the previous approach,
    runs natively (which is not via the Java virtual machine). The simplest way to
    add and configure the plug-in is shown in Listing [7-8](#522865_1_En_7_Chapter.xhtml#PC11),
    where we use the same main class as with the OpenJFX plug-in.


    ```

    com.gluonhq

    gluonfx-maven-plugin

    1.0.13


    com.mygame.GameApp


    Listing 7-8

    The GluonFX Maven plug-in

    ```


    With this plugin, there are two commands of note (other commands are beyond the
    scope of this book). The first one is:


    ```

    mvn gluonfx:run

    ```


    This command allows you to quickly test that your project successfully compiles
    and runs using the Java virtual machine. Once you are happy with how your project
    performs, we move to the second command:


    ```

    mvn gluonfx:build

    ```


    This is a very intensive and demanding task that converts your Java code into
    platform-specific native code, resulting in an executable file. For example, on
    Windows, this can be a `.exe` or `.msi` file. By changing the target platform,
    we can also build native packages for mobile and embedded devices. More information
    can be found at [`https://github.com/gluonhq/gluonfx-maven-plugin/`](https://github.com/gluonhq/gluonfx-maven-plugin/).


    Using both of these approaches, we end up with a set of files or packages that
    can be distributed to nondeveloper systems that can then execute your game or
    application built with JavaFX. Since an FXGL application is, for all intents and
    purposes, a JavaFX application, any project can also be built, packaged, and deployed
    in this way.


    ## Summary


    In this chapter, we explored a variety of nongame use cases for which FXGL is
    suitable. It is not surprising that FXGL is able to facilitate these use cases
    well since it is a direct extension of JavaFX. Therefore, as we once again observe,
    an FXGL application can do everything a JavaFX application can. In particular,
    we saw how we can build a general-purpose application with login and business
    logic, followed by graph data visualization, and a 3D simulation of our solar
    system. Finally, we considered how we can package and deploy our FXGL applications
    to make it easy for the end user to run them. In the next, closing, chapter, we
    recap everything we covered in this book and provide extensive external resources
    for reference.'
