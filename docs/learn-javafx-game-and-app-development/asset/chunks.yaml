  trans: '

    在 FXGL 中，实体工厂类允许将每个实体的创建便捷地隔离到各自的方法中。现在我们将按顺序逐一介绍这些方法，从背景实体开始。该实体基于一个循环滚动的图像，形成无限滚动的视图。内置的
    `ScrollingBackgroundView` 类正好可以实现这一点。我们还添加了一个之前未使用过的新组件 `IrremovableComponent`。由于这个平台游戏包含多个关卡，我们需要不时地销毁现有关卡并设置新关卡。大多数关卡都共享一些实体，例如背景和玩家。因此，每次切换关卡时都无需重新创建这些实体。在这种情况下，`IrremovableComponent`
    就非常有用，因为它能锁定所附加的实体，使其无法从世界中移除。


    下一个实体类型是平台。平台仅包含一个边界框和一个物理组件。默认情况下，物理组件已经具有静态刚体，因此我们无需修改它。请注意，我们不需要为平台创建视图，因为它直接从
    Tiled 的“.tmx”关卡文件中加载。


    出口触发器是一个实体，当它与玩家碰撞时，会启用（使其可见）通往下一关卡的出口门。在游戏中，触发器本身通常不可见，仅作为碰撞对象工作。正如预期，我们为其创建了一个边界框，并添加了可碰撞组件。


    关于门实体，它被分为门顶和门底两部分，因为门由两个图块组成。你会从代码中注意到，只有门的底部被设置为可碰撞，以避免与玩家触发两次碰撞。


    玩家实体是此游戏中最复杂的实体之一。首先，我们将物理组件配置为动态刚体类型，以便其受到物理力的影响。我们还添加了一个地面传感器，使开发者能够知道玩家何时落地，即玩家实体不在空中。为了避免玩家粘在墙上，我们还将摩擦力设置为
    0。将其设置为非零正值可能会影响游戏玩法和手感，因此你可以进行实验以达到合适的效果。这里需要注意的另一件事是，玩家有两个边界框：一个用于头部，另一个用于身体，以更精确地表示碰撞形状。最后，我们附加了可碰撞、不可移除和玩家组件，这很直接。


    出口标志实体为玩家与游戏世界之间增加了一点动态交互。其思路是，当玩家与标志碰撞时，标志会亮起。在这个用例中，这并不是一个极其重要的功能；然而，它应该能为你提供一些关于如何在你自己游戏中实现类似功能的思路。


    按键提示实体用于帮助玩家识别需要按下哪个键来与世界交互。例如，回想一下你最近玩过的任何游戏，无论是 2D 还是 3D，当你靠近一扇门或一个物品时，游戏会视觉提示你按下特定键进行交互。这正是我们在这里通过按键提示实体所做的事情。


    按钮实体是游戏玩法的一部分，玩家需要激活按钮才能推进关卡。在我们使用的关卡中，按钮将使门可见，从而让玩家能够进入下一关卡。至此，工厂类概述完毕，接下来我们将介绍游戏示例中的其他类。


