  raw: '### Custom Components


    As per usual, we start by defining entity types that are present in the game.
    In our Pac-Man clone, we only have four types:


    ```

    public enum PacmanType {

    PLAYER, ENEMY, BLOCK, COIN

    }

    ```


    As this game is focused on AI, most of the functionality is contained within components.
    We mentioned earlier that there are four types of enemies. These are `GuardCoinComponent`,
    `DelayedChasePlayerComponent` (one with a delay and one without), and `RandomAStarMoveComponent`,
    which is available as a pre-built component from FXGL. We will consider the implementation
    of the first two files. As for the `RandomAStarMoveComponent`, it has only one
    simple goal, which is to randomly move the entity inside the level using the A*
    pathfinding. Therefore, we will not be discussing its implementation details here.
    However, you are welcome to browse through the component’s source code inside
    the FXGL repository on GitHub.


    With respect to custom component classes, there are four of them in this game
    example. They are


    *   GuardCoinComponent – This is an AI component to make an enemy entity to guard
    a chosen coin in the game.


    *   DelayedChasePlayerComponent – This is an AI component to make an enemy chase
    the player entity. This component has two modes: immediate (without a delay) and
    delayed. In the immediate mode, it will directly go to the player using the quickest
    route, whereas in the delayed mode, it will pick a slightly longer route, giving
    the player some breathing space.


    *   PaletteChangingComponent – This is not an AI component per se, but it is there
    to help the AI fool the player by changing the color scheme of each enemy so that
    the player cannot readily know which AI they are facing.


    *   PlayerComponent – This component allows the player entity to perform gameplay
    actions, such as move and teleport.


    We will then go through the four components in the order mentioned previously,
    with the first one being the `GuardCoinComponent`, in Listing [5-6](#522865_1_En_5_Chapter.xhtml#PC7).


    ```

    import com.almasb.fxgl.core.collection.grid.Cell;

    import com.almasb.fxgl.entity.Entity;

    import com.almasb.fxgl.entity.component.Component;

    import com.almasb.fxgl.entity.component.Required;

    import com.almasb.fxgl.pathfinding.astar.AStarMoveComponent;

    import com.almasb.fxgl.texture.Texture;

    import com.almasb.fxglgames.pacman.PacmanType;

    import javafx.scene.paint.Color;

    public class GuardCoinComponent extends Component {

    private AStarMoveComponent astar;

    private Entity targetCoin;

    @Override

    public void onUpdate(double tpf) {

    if (targetCoin == null || !targetCoin.isActive()) {

    entity.getWorld()

    .getRandom(PacmanType.COIN)

    .ifPresent(coin -> {

    highlight(coin);

    targetCoin = coin;

    });

    } else {

    if (astar.isAtDestination()) {

    int x = targetCoin.call("getCellX");

    int y = targetCoin.call("getCellY");

    Cell cell = astar.getGrid().get(x, y);

    astar.getGrid()

    .getRandomCell(c -> c.getState().isWalkable() && c.distance(cell) < 5)

    .ifPresent(astar::moveToCell);

    }

    }

    }

    private void highlight(Entity coin) {

    var texture = (Texture) coin.getViewComponent().getChildren().get(0);

    var newTexture = texture.multiplyColor(Color.RED).brighter();

    coin.getViewComponent().removeChild(texture);

    coin.getViewComponent().addChild(newTexture);

    }

    }

    Listing 5-6

    The implementation of the Guard AI in our game example

    ```


    There are only two fields in this component: the reference to the `AStarMoveComponent`
    (which we are already familiar with) and the coin entity. The coin is what this
    AI will be guarding. Inside the `onUpdate()` method, we first check if the target
    coin exists and is present in the game world, otherwise picking a random coin
    to be our target. If the coin does exist, we simply choose a random location near
    the coin and move our AI to that cell. The highlighting method you see in Listing
    [5-6](#522865_1_En_5_Chapter.xhtml#PC7) allows us to make the selected coin stand
    out, so the player is aware of its position and can make gameplay decisions based
    on this feature. Highlighting effectively turns the coin red, as seen in Figure
    [5-4](#522865_1_En_5_Chapter.xhtml#Fig4).


    ![](images/522865_1_En_5_Chapter/522865_1_En_5_Fig4_HTML.jpg)


    A screenshot of a game depicts a few dark colored blocks on the top and bottom,
    A I, and 6 coins. The 2 coins on the left and 3 on the right are pale colored.
    The A I and the coin next to it in the center are deeply colored.


    Figure 5-4


    The coin being guarded by the AI is highlighted in red


    The `DelayedChasePlayerComponent` is the next custom AI component for us to explore,
    whose code is in Listing [5-7](#522865_1_En_5_Chapter.xhtml#PC8).


    ```

    import com.almasb.fxgl.dsl.FXGL;

    import com.almasb.fxgl.entity.component.Component;

    import com.almasb.fxgl.entity.component.Required;

    import com.almasb.fxgl.pathfinding.astar.AStarMoveComponent;

    import com.almasb.fxglgames.pacman.PacmanType;

    @Required(AStarMoveComponent.class)

    public class DelayedChasePlayerComponent extends Component {

    private AStarMoveComponent astar;

    private boolean isDelayed = false;

    @Override

    public void onUpdate(double tpf) {

    if (!isDelayed) {

    move();

    } else {

    // if delayed, only move when reached destination

    if (astar.isAtDestination()) {

    move();

    }

    }

    }

    private void move() {

    var player = FXGL.getGameWorld().getSingleton(PacmanType.PLAYER);

    int x = player.call("getCellX");

    int y = player.call("getCellY");

    astar.moveToCell(x, y);

    }

    public DelayedChasePlayerComponent withDelay() {

    isDelayed = true;

    return this;

    }

    }

    Listing 5-7

    The implementation of the player Chaser AI in our game example

    ```


    The implementation of this AI component is relatively straightforward with only
    two fields: the `AStarMoveComponent` reference (so the AI knows how to move) and
    a flag for whether the AI should move in a delayed fashion or go to the player
    immediately without any superficial delays. In the `move()` method, you will notice
    that we make the following call: `player.call("getCellX");`. It is a general-purpose
    shortcut that allows our entities to call methods in their attached components.
    For example, without this shortcut, we would have to call the full API: `player.getComponent(CellMoveComponent.class).getCellX();`.
    So in cases like this, where the call is unambiguous, it is possible to use the
    `call()` method on entities.


    Our next component in Listing [5-8](#522865_1_En_5_Chapter.xhtml#PC9) shows how
    to implement the random palette swap for our enemy entities. While the enemies
    in the original game do not do this (they do turn into ghosts, but they do not
    constantly switch their color), it is an interesting addition to our clone, since
    the player is no longer able to easily figure out which enemy has which AI.'
