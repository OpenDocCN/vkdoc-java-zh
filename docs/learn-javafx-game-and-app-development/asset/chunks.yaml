    ## 图数据可视化工具


    在本节中，我们将使用来自 [`https://snap.stanford.edu/data/`](https://snap.stanford.edu/data/)
    的 Twitter 社交网络数据子集，并开发一个 FXGL 应用程序，以图形形式可视化这些数据。回顾第 5 章，图是由节点（项目）集合和连接节点的边集合组成的。图数据来源于多个领域：从文件系统和社交网络到足球比赛和生物医学科学。通常使用图可视化来识别项目之间的连接，或探索项目组之间的关系。我们构建的应用程序截图如图
    7-3 所示，其中可以看到一个中等复杂程度的图。


    ![](img/522865_1_En_7_Fig3_HTML.png)


    该截图展示了一个复杂图，其中包含大量节点和大量相互连接节点的边。


    图 7-3


    一个示例 Twitter 网络的可视化


    我们从上述来源获取的数据采用特定的纯文本格式，其中每一行由两个数字（ID）组成，中间用单个空格分隔，如下所示：


    ```

    number1 number2

    number3 number4

    ...

    ```


    每个数字（ID）标识一个节点（在我们的上下文中指人）：这些节点在图 7-3 中绘制为小圆圈。每行文本表示两个节点（人）之间存在一条边（关系）：这些关系在图
    7-3 中绘制为线条。本质上，高级算法如下：为每个节点绘制一个圆圈，并为每条边绘制一条线。该算法以及 FXGL 应用程序在清单 7-2 中实现，我们现在将详细探讨。


    `GraphVisSample` 类中有三个字段：一个用于存储表示节点的圆圈的半径，一个用于存储从节点 ID 到应用程序中关联实体的映射，最后一个用于存储图数据中的边（如果愿意，也可以将其存储为列表）。此外，还有五个值得注意的方法：`initGame()`、`onUpdate()`、`makeNode()`、`forceBounds()`
    和 `hash()`。


    在 `initGame()` 中，我们：


    *   将图数据（采用之前定义的纯文本格式）加载为 `List<String>`，其中列表中的每个项都是一行文本

    *   在列表上调用 `forEach()` 来处理每一行

    *   将每一行拆分为两个标记（两个整数节点 ID），并让 `makeNode()` 从节点 ID 构造一个实体

    *   在两个节点之间添加一条新边，因为每行文本表示一种关系


    我们看到每条边的起点和终点都绑定到可视化节点的实体的位置上。使用这种方法，我们在移动节点时无需手动移动边。为了避免为每条边添加一个实体，我们构造了一个名为“background”的单一实体，并将所有边附加到该实体上。最后，我们通过使用
    `hash()` 对两个节点 ID 进行“哈希处理”来存储边数据。这种方法使我们能够为给定的一对节点生成唯一标识符，无论这对节点的顺序如何。


    在 `onUpdate()` 中，我们基于 Fruchterman-Reingold 力模型实现图节点和边的布局算法。关于图布局算法的讨论超出了本书的范围；然而，简单来说，有边相连的节点相互吸引，而没有边的节点相互排斥。因此，我们只需要将有线条连接的节点移近，并将没有连接的节点移远。该算法可以通过遍历应用程序中的每一对节点并应用适当的移动来实现。我们需要注意，这些移动调用可能会将节点移出屏幕边界。通常我们不希望发生这种情况，因此在每次检查结束时，我们调用
    `forceBounds()` 来将所有节点保持在屏幕的可见部分内。


    `forceBounds()` 方法很简单，包含四个“if”语句检查，分别对应屏幕的四个边。如果实体（节点）超出其中某一边，它会被拉回以保持在屏幕边界内。


    `makeNode()` 方法构造一个以 `Circle` 作为其视图的实体，并最初将其随机放置在屏幕上。我们还附加了一个之前未使用过的内置组件 `DraggableComponent`。通过将其附加到任何实体，我们可以点击该实体并用鼠标在屏幕上拖动它。由于图布局算法使所有节点持续运动，拖动一个节点会使图自行重新排列，从而为用户带来吸引人的交互体验。事实上，通过添加一个点击处理程序，在点击时显示关于该节点的一些信息，我们可以轻松扩展此应用程序。此功能的实现留给读者自行探索。

