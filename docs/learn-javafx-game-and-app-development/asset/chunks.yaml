- fmt: '# Collision Detection


    Collision detection tells us whether two entities are colliding (overlapping)
    or not colliding. As mentioned previously, this is a useful tool for enabling
    interaction between game objects. For example, the player entity collides with
    a coin entity and as a result of this collision, the player is able to pick up
    the coin. Figure [4-1](#522865_1_En_4_Chapter.xhtml#Fig1) illustrates this scenario
    where the player is a blue square and the coin is a yellow circle.


    ![](images/522865_1_En_4_Chapter/522865_1_En_4_Fig1_HTML.jpg)


    A screenshot of a platformer game depicts entities as follows. A long platform
    at the bottom with a colored circle on it on the right. 3 small platforms of different
    heights from bottom to top contain a colored circle; a colored square, and 2 colored
    circles; a colored arrowhead, and a colored circle respectively.


    **Figure 4-1** An example platformer demonstrating possible entity interaction


    Collision detection techniques fall into two categories: broad phase and narrow
    phase. The goal of the broad-phase technique or algorithm is to avoid performing
    expensive computations for entities that are far away (and therefore cannot collide).
    These techniques are typically fast but less precise; that is, they are only good
    for quickly filtering out pairs of entities that cannot collide. Broad-phase techniques
    do not typically tell us if two entities are colliding; hence, once we have pairs
    that can potentially collide, we employ a narrow-phase technique. Compared to
    broad phase, these are slower but incredibly accurate, allowing us to identify
    whether a collision between two entities has occurred.


    For broad phase, FXGL uses a grid-based spatial indexing algorithm to improve
    the performance of collision detection. Most of the broad-phase techniques, such
    as quadtree and k-d tree, utilize some form of spatial indexing to group entities
    that cannot collide based on the distance between them. However, for conciseness,
    we do not consider broad-phase algorithms in this book. Instead, we will focus
    on narrow-phase techniques.


    A variety of collision detection techniques are available for computing whether
    two entities overlap in 2D, including:


    - Axis-aligned bounding box (each entity is wrapped with a rectangle that bounds
    the entity, and then we check if the rectangles overlap)

    - Separating axis theorem (using several predefined axes, we draw lines of separation;
    if there exists at least one such line, there is no overlap)

    - Circle-circle intersections (enclose each entity with a circle and check if
    the circles are overlapping)

    - Polygonal (enclose each entity with a polygonal, typically convex, shape and
    check if these shapes overlap)

    - Image pixel based (if entities have images as their views, then identify the
    intersection area of images, and if there is at least one pixel in the intersection,
    there is a collision between entities)

    - Grid based (if the game is grid-based, then check if entities occupy the same
    cell or adjacent cells)


    The preceding list should give you an idea with respect to the general approach:
    enclose entities with some known shape for which it is reasonably easy to detect
    collisions. In this book, we will only consider the first two techniques, which
    are commonly used methods in game development: axis-aligned bounding box and separating
    axis theorem. We will not go into too much detail since FXGL already implements
    these approaches and provides an easy way to access them.


    The axis-aligned bounding box (AABB) algorithm is essential in any collision detection
    technique due to its performance and ease of implementation. The algorithm can
    be described as follows. Wrap each entity with a bounding box, which is the smallest
    rectangle that can completely enclose the entity. Next, check if two rectangles
    (boxes that wrap the two entities in question) overlap. If they do, register the
    collision; if they do not, then there is no collision.


    A straightforward way to implement the AABB algorithm is as follows:


    ```

    return box2.maxX >= box1.minX &&

    box2.maxY >= box1.minY &&

    box2.minX <= box1.maxX &&

    box2.minY <= box1.maxY

    ```


    If all of these checks succeed, then there is a collision between `box1` and `box2`;
    thus, there is a collision between entities that these boxes represent.


    However, there are limitations to the AABB approach. The main limitation is that
    bounding boxes, as the technique name implies, have to be axis-aligned. This means
    that if at least one entity is rotated, that is, has a nonzero rotation angle,
    then the approach is not suitable. In such cases, we can utilize a different technique
    called separating axis theorem, known as SAT for short. The SAT states that if
    there exists an axis along which there is a separation between two objects, then
    these objects are not overlapping. Unlike the bounding box approach given previously,
    this approach allows us to check for collisions even if entities are rotated (at
    nonzero degree angles). For example, in Figure [4-2](#522865_1_En_4_Chapter.xhtml#Fig2),
    the collision between the two rotated entities on the right will be correctly
    reported by SAT.


    ![](images/522865_1_En_4_Chapter/522865_1_En_4_Fig2_HTML.jpg)


    An illustration depicts 3 entities as follows. A colored square on the left; a
    rectangle and a square on the right are in different colors and collide as they
    rotate.


    **Figure 4-2** Zero and nonzero rotation angles of entities


    In FXGL, both of these approaches are isolated behind a user-friendly API, like
    with most of the algorithms that are built-in. Suppose we have two entities, `e1`
    and `e2`. To check if they are colliding, in code, one can call the method `e1.isColliding(e2)`,
    which returns an intuitive boolean value.


    Now that we have discussed the fundamental theory behind collision detection,
    it is time to turn our attention to handling these collisions.'
