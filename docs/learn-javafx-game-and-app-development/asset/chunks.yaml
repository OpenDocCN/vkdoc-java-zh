    About the Author About the Technical Reviewer


    # 1. Introduction


    JavaFX is a modern high-performance graphical user interface (GUI) toolkit for
    Java. It provides hardware acceleration support on a range of platforms, including
    desktop, mobile, and embedded, allowing the development of cross-platform applications.
    However, to develop games with JavaFX effectively, numerous domain-specific concepts
    are needed. To address this need, the FXGL game engine extends JavaFX and brings
    support for real-world game development techniques (examples seen in Figure [1-1](#522865_1_En_1_Chapter.xhtml#Fig1)).
    These include the entity-component model, pathfinding, physics, particle systems,
    sprite sheet animations, and many other features. As a result, JavaFX developers
    can produce games more quickly and more effectively with FXGL and easily package
    their games to native platform images, including Android and iOS.


    ![](images/522865_1_En_1_Chapter/522865_1_En_1_Fig1_HTML.png)


    A screenshot depicts a compilation of screenshots, which are of different game
    scenes, developed using the FXGL game engine.


    Figure 1-1


    A compilation of screenshots from games developed with FXGL


    The FXGL game engine is fully open source. This allows any FXGL user to contribute
    new features or bug fixes back to the project. The project is solely supported
    by the community users, whether individuals or companies. At the time of writing
    this book, all development team members work on this project in their own time.
    The project source code can be found at [`https://github.com/AlmasB/FXGL`](https://github.com/AlmasB/FXGL).


    The FXGL project initially started off as a collection of code snippets used to
    help deliver lectures on game development courses at the University of Brighton
    and help with developing tutorials for YouTube. As the code base grew, it made
    sense to develop it into a publicly accessible game engine in Java. As such, FXGL
    is not meant to compete with existing engines, but instead its goal is to provide
    Java users with an alternative tool to develop high-performance applications.
    During the early stages of development, the following software projects played
    an influential role in the engine’s architecture and implementation: Unity, Unreal
    Engine, libGDX, jMonkey, CRYENGINE, X-Ray, OpenJK, Duality, and Phaser.


    The underlying infrastructure and the rendering engine are provided by the JavaFX
    GUI toolkit. JavaFX is a modern alternative to Swing for building rich client
    applications in Java. It is developed in collaboration with many individuals and
    companies, constantly improving its presence on a wide range of supported platforms.
    Building on this support enables FXGL to develop truly cross-platform games with
    numerous game-specific features.


    The features provided by FXGL can be put into several categories: internal framework
    services, game logic, artificial intelligence (AI), physics, gameplay, input,
    user interface (UI), graphics, audio, file input output (IO), networking, hardware
    access, and external tool integration. These categories can be described as follows:


    ![](images/522865_1_En_1_Chapter/522865_1_En_1_Fig2_HTML.jpg)


    A screenshot depicts a number of different 3D shapes, which are in different colors.


    Figure 1-2


    An example of a 3D scene in FXGL


    - Internal framework services provide access to the engine timer and life cycle,
    allowing to listen for specific events and handle them appropriately from code.


    - In FXGL, game logic is implemented as a combination of the Entity-Component
    model, which defines game objects, and the game world, which acts as a container
    for game objects. As with any popular data structure, the game world allows querying
    and filtering data (game objects) to suit developer needs.


    - The AI category mostly comprises two areas: navigation and behavior. The navigation
    system allows game objects to find their way around the game level without passing
    through obstacles, whereas the behavior logic gives the game objects some level
    of artificial intelligence.'
