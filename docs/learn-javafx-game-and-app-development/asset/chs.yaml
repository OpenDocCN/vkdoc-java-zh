  ### 插值系统


  如果动画是数值的变化，那么插值（也称为缓动或补间）就是这种变化的速率。例如，假设你有一个淡出动画，会在两秒内将玩家实体的不透明度从 `1.0` 变为 `0.0`。默认情况下，FXGL
  使用线性插值器，这意味着动画每秒的进度是相同的。因此，如果从 `1.0` 到 `0.0` 需要两秒，那么显而易见，一秒后玩家的不透明度将是 `0.5`。如果我们使用任何非线性插值器，那么动画的速率就会不同，因此一秒后，不透明度值可能大于或小于
  `0.5`。从视觉上看，这意味着玩家淡出的速度会变慢或变快。


  我们应该注意，使用不同的插值器不会改变动画的起始值、结束值或持续时间。相反，插值器会影响动画期间计算出的数值。实际上，插值就是时间与进度之间的比率，其中线性插值器仅提供
  1:1 的比率，即经过 50% 的时间等同于完成 50% 的进度。因此，插值器可以很容易地表示为一个函数：


  ```

  double interpolate(double time) {

  double progress = ...

  return progress;

  }

  ```


  这个函数可以使用任意数学运算，将介于 0 和 1 之间的时间值转换为（同一范围内的）进度值。你可以在图 6-6 中看到常见插值器（FXGL 已提供）的结果。鸟实体动画在两秒内将其从左侧平移到右侧。当时间值为
  0 时，所有鸟实体，无论其插值器如何，都将从左侧开始；当时间值为 1 时，它们都将到达右侧的同一位置（沿 X 轴）。该图显示的时间值接近 0.4。


  ![](img/522865_1_En_6_Fig6_HTML.jpg)


  一张图表描绘了不同插值器在时间值接近 0.4 时的效果。对于弹性（elastic）和回退（back）插值器，鸟实体更接近 X 轴的末端。对于线性（linear）和平滑（smooth）插值器，鸟实体更接近
  X 轴的起点。对于二次（quadratic）、三次（cubic）、四次（quartic）、五次（quintic）、指数（exponential）、正弦（sine）、圆形（circular）和弹跳（bounce）插值器，鸟实体位于两者之间。


  图 6-6


  不同插值器对动画进度的影响


  最后需要指出的是，从动画的角度来看，JavaFX 节点和 FXGL 实体之间没有区别。因此，两者的 API 是相同的。基于此，我们完成了对 FXGL 视觉系统的概述。


  ## 总结


  在本章中，我们研究了渲染基础以及它们在 FXGL 中的实现方式。我们了解了如何将标准的 JavaFX 控件添加到 FXGL UI，以及 UI 层如何与游戏层分离。使用
  JavaFX 控件是一个重要特性，因为它表明 JavaFX 开发者无需学习新的 API，可以直接使用他们已有的知识。我们学习了如何使用粒子系统构建复杂的视觉效果，并对其进行配置以适配我们的游戏。最后，我们介绍了如何为游戏和
  UI 元素添加动画，以及如何使用插值器配置动画。本章的关键信息是，尽管图形理论可能是一个非常复杂的主题，但 JavaFX 和 FXGL 中的高级抽象允许开发者充分利用目标平台的渲染能力，而无需访问底层实现细节。


  '
- '# 7. 通用应用程序与打包


  本章专门介绍可以使用 FXGL 开发的通用（非游戏）应用程序。这些包括商业应用程序、图形编辑器和可视化工具。从高层次来看，游戏应用程序与前端的商业应用程序并没有太大区别。它们都在一个无限循环中运行，直到用户退出应用程序。它们都接收输入，更新应用程序状态，最后将状态渲染到屏幕上。为了证明
