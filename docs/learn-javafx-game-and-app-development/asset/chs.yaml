  Zephyria 是一款完全用 Kotlin 编程语言编写的开放世界 RPG 游戏。它使用 Java 以外的语言这一事实意义重大，因为它表明 Kotlin 用户也可以访问
  FXGL 的所有功能。该游戏拥有覆盖多达 250000 个图块的大型开放世界地图，每个图块是一个 32 像素大小的正方形。地图从 Tiled 关卡文件加载，并使用我们在第
