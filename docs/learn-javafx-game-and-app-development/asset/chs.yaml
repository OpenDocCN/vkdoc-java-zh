  ## 打包与部署


  本节将介绍 OpenJFX 和 GluonFX Maven 插件，利用它们我们可以生成多种最终用户包，包括特定平台的无依赖镜像以及原生镜像。我们将从前者开始，该包允许用户无需安装
  Java 即可运行打包后的应用程序。


  要使用 OpenJFX Maven 插件的 jlink 命令，通常需要创建一个 `module-info.java` 文件，位于源码根目录（通常是 `src/main/java`）。文件内容相当简单：只需为其命名（此处为
  `mygame`），并声明包含 FXGL。


  ```

  open module mygame {

  requires com.almasb.fxgl.all;

  }

  ```


  下一步是将 Maven 插件添加到 pom.xml 文件的相应（插件）部分，如代码清单 7-7 所示。


  ```

  org.openjfx

  javafx-maven-plugin

  0.0.8


  mygame/com.mygame.GameApp


  代码清单 7-7

  OpenJFX Maven 插件

  ```


  插件配置中显示的 main class 属性指向包含 `main()` 方法的类，本例中类名为 `GameApp`，位于 `com.mygame` 包中。现在我们可以使用命令行构建无依赖包了。打开操作系统（或
  IDE）命令提示符，导航到 pom.xml 所在目录。假设命令提示符能识别 mvn 命令（如果不能，可能需要修改系统设置，让命令提示符知道 Maven 的安装位置），然后运行：


  ```

  mvn compile

  mvn javafx:jlink

  ```


  这些命令成功执行后，`target` 目录将包含与当前运行平台对应的二进制文件子目录。例如，在 Windows 上执行命令会生成 Windows 的无依赖包。这意味着你可以将该包分发给
  Windows 用户，他们无需安装 Java 或其他任何东西即可运行。要运行打包好的 Windows 特定应用程序，可以启动 `bin` 子目录中的 .bat
  文件，该文件通过一系列调用最终会执行 `main()` 方法。


  GluonFX Maven 插件则实现了不同的目标：它执行提前编译，生成完全原生的包，与之前的方法不同，它原生运行（而非通过 Java 虚拟机）。添加和配置该插件的最简单方式如代码清单
  7-8 所示，其中我们使用了与 OpenJFX 插件相同的主类。


  ```

  com.gluonhq

  gluonfx-maven-plugin

  1.0.13


  com.mygame.GameApp


  代码清单 7-8

  GluonFX Maven 插件

  ```


  使用此插件时，有两个值得注意的命令（其他命令超出本书范围）。第一个是：


  ```

  mvn gluonfx:run

  ```


  该命令允许你快速测试项目能否在 Java 虚拟机上成功编译和运行。当项目运行效果满意后，我们执行第二个命令：


  ```

  mvn gluonfx:build

  ```


  这是一个非常密集且要求高的任务，它将 Java 代码转换为特定平台的原生代码，生成可执行文件。例如，在 Windows 上，这可以是 .exe 或 .msi 文件。通过更改目标平台，我们还可以为移动设备和嵌入式设备构建原生包。更多信息请访问
  [`https://github.com/gluonhq/gluonfx-maven-plugin/`](https://github.com/gluonhq/gluonfx-maven-plugin/)。


  使用这两种方法，我们最终得到一组文件或包，可以分发给非开发者的系统，这些系统随后即可运行你用 JavaFX 构建的游戏或应用程序。由于 FXGL 应用程序本质上就是一个
  JavaFX 应用程序，任何项目都可以通过这种方式构建、打包和部署。


  ## 本章小结


  在本章中，我们探讨了 FXGL 适用的多种非游戏用例。FXGL 能够很好地支持这些用例并不令人意外，因为它本身就是 JavaFX 的直接扩展。因此，我们再次观察到，FXGL
  应用程序可以完成 JavaFX 应用程序能做的所有事情。具体来说，我们看到了如何构建一个包含登录和业务逻辑的通用应用程序，接着是图形数据可视化，以及我们太阳系的
  3D 模拟。最后，我们讨论了如何打包和部署 FXGL 应用程序，以便最终用户轻松运行。在下一章（即最后一章）中，我们将回顾本书涵盖的所有内容，并提供丰富的外部参考资料供读者参考。




