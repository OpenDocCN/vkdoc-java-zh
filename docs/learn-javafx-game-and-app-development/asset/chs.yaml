  由于演示中的所有实体均为天体且仅需一种行为，我们将为它们统一使用一个组件，其实现见代码清单 7-4。你会注意到它相对简单。利用天体的`enum`数据，我们构建并应用了两个动画：一个用于绕自身轴旋转，另一个用于绕太阳公转。要绕特定点旋转，需调用`origin()`方法设置该点。但需注意，第一个动画无需调用`origin()`方法，因为默认情况下
  3D 旋转是围绕实体中心进行的，而这正是我们所需。对于第二个动画，旋转需要围绕另一个点进行，具体来说是太阳实体的中心。由于我们将太阳放置在`(0,0,0)`处，将原点设置为`(-entity.getX(),0,0)`即可，因为每个实体的
  X 值等于其到世界中心`(0,0,0)`的距离。


  ```

  import com.almasb.fxgl.entity.component.Component;

  import javafx.geometry.Point3D;

  import javafx.scene.shape.Sphere;

  import javafx.util.Duration;

  import static com.almasb.fxgl.dsl.FXGL.animationBuilder;

  public class CelestialBodyComponent extends Component {

  private CelestialBody data;

  private Sphere view;

  public CelestialBodyComponent(CelestialBody data) {

  this.data = data;

  }

  @Override

  public void onAdded() {

  view = (Sphere) entity.getViewComponent().getChildren().get(0);

  animationBuilder()

  .duration(Duration.seconds(data.getRotationSpeed() * 3))

  .repeatInfinitely()

  .rotate(view)

  .from(new Point3D(0, 0, 0))

  .to(new Point3D(0, 360, 0))

  .buildAndPlay();

  animationBuilder()

  .duration(Duration.seconds(data.getOrbitalPeriod() * 0.1))

  .repeatInfinitely()

  .rotate(entity)

  .origin(new Point3D(-entity.getX(), 0, 0))

  .from(new Point3D(0, 0, 0))

  .to(new Point3D(0, 360, 0))

  .buildAndPlay();

  }

  }

