  软件“拼图”的最后一块是 `PacmanApp` 类，它将所有其他类整合在一起。


  ### 构建应用程序类


  与上一章中的前一个游戏示例不同，这个类非常简单。这是因为游戏侧重于 AI，而我们已经涵盖了其所需的组件。在清单 5-13 中，我们首先定义了与关卡时间、方块大小、地图和
  UI 相关的常量变量。这些常量随后以直接的方式在 `initSettings()` 中使用。在 `initInput()` 中，我们简单地调用了玩家组件和我们创建的五个动作。游戏中有四个重要的变量，因此我们在
  `initGameVars()` 中创建它们。这些变量用于跟踪玩家分数、游戏中剩余的金币数量、玩家可以使用的传送次数以及完成关卡剩余的时间。


  `initGame()` 代码尤为重要，因为它向我们展示了如何将文本文件解析为游戏世界，并随后从该游戏世界生成 A* 网格。为了生成关卡，我们使用带有 `TextLevelLoader`
  的 `AssetLoader`，并提供相关细节，例如方块大小。至于生成 A* 网格（以便敌人能够智能移动），本质上，我们调用 `AStarGrid.fromWorld`
  并提供关于地图和方块大小的详细信息。我们还告诉 FXGL 哪些类型的实体是不可行走的。在这种情况下，`BLOCK` 实体是唯一不可行走的实体类型，因此我们使用一个“if”语句来指明它。在此方法中，我们还将网格对象添加到变量列表中。回想一下，在创建玩家实体时，我们使用惰性值传递了
  A* 网格，向 FXGL 指示此类对象将在运行时存在。我们现在只是在履行那个承诺。生成游戏世界后，我们可以轻松计算游戏中的金币数量：`getGameWorld().getEntitiesByType(COIN).size());`。最后，在此初始化方法中，我们安排游戏计时器每秒运行一次，以便“时间”变量被适当递减；并且我们为其添加一个监听器，以便当它达到
  0 时，游戏结束。


  与 FXGL 游戏的典型架构一样，在 `initPhysics()` 中，我们设置碰撞处理器，例如玩家与敌人之间以及玩家与金币之间的碰撞处理器。`initUI()`
  方法展示了一个新的 `loadUI()` 调用，我们在其中将 FXML 文件和 UI 控制器类连接在一起，这两个文件都是我们之前创建的。`PacmanApp`
  类中实现的其他方法都很简单。



  ```java

  import com.almasb.fxgl.app.GameApplication;

  import com.almasb.fxgl.app.GameSettings;

  import com.almasb.fxgl.entity.Entity;

  import com.almasb.fxgl.entity.level.Level;

  import com.almasb.fxgl.entity.level.text.TextLevelLoader;

  import com.almasb.fxgl.pathfinding.CellState;

  import com.almasb.fxgl.pathfinding.astar.AStarGrid;

  import com.almasb.fxgl.ui.UI;

  import com.almasb.fxglgames.pacman.components.PlayerComponent;

  import javafx.scene.input.KeyCode;

  import javafx.scene.paint.Color;

  import javafx.util.Duration;

  import java.util.Map;

  import static com.almasb.fxgl.dsl.FXGL.*;

  import static com.almasb.fxglgames.pacman.PacmanType.*;

  public class PacmanApp extends GameApplication {

  public static final int BLOCK_SIZE = 40;

  public static final int MAP_SIZE = 21;

  private static final int UI_SIZE = 80;

  // 秒

  public static final int TIME_PER_LEVEL = 110;

  public Entity getPlayer() {

  return getGameWorld().getSingleton(PLAYER);

  }

  public PlayerComponent getPlayerComponent() {

  return getPlayer().getComponent(PlayerComponent.class);

  }

  @Override

  protected void initSettings(GameSettings settings) {

  settings.setWidth(MAP_SIZE * BLOCK_SIZE + UI_SIZE);

  settings.setHeight(MAP_SIZE * BLOCK_SIZE);

  settings.setTitle("FXGL 吃豆人");

  settings.setVersion("1.0");

  }

  @Override

  protected void initInput() {

  onKey(KeyCode.W, () -> getPlayerComponent().up());

  onKey(KeyCode.S, () -> getPlayerComponent().down());

  onKey(KeyCode.A, () -> getPlayerComponent().left());

  onKey(KeyCode.D, () -> getPlayerComponent().right());

  onKeyDown(KeyCode.F, () -> {

  if (geti("teleport") > 0) {

  inc("teleport", -1);

  getPlayerComponent().teleport();

  }

  });

  }

  @Override

  protected void initGameVars(Map vars) {

  vars.put("score", 0);

  vars.put("coins", 0);

  vars.put("teleport", 1);

  vars.put("time", TIME_PER_LEVEL);

  }

  @Override

  protected void initGame() {

  getGameScene().setBackgroundColor(Color.DARKSLATEGREY);

  getGameWorld().addEntityFactory(new PacmanFactory());

  Level level = getAssetLoader().loadLevel("pacman_level0.txt", new TextLevelLoader(40,
  40, '' ''));

  getGameWorld().setLevel(level);

  // 初始化 A* 底层网格，并将有方块阻挡的单元格标记为不可行走

  AStarGrid grid = AStarGrid.fromWorld(getGameWorld(), MAP_SIZE, MAP_SIZE, BLOCK_SIZE,
  BLOCK_SIZE, (type) -> {

  if (type == BLOCK)

  return CellState.NOT_WALKABLE;

  return CellState.WALKABLE;

  });

  set("grid", grid);

  // 计算金币数量

  set("coins", getGameWorld().getEntitiesByType(COIN).size());

  run(() -> inc("time", -1), Duration.seconds(1));

  getWorldProperties().addListener("time", (old, now) -> {

  if (now == 0) {

  onPlayerKilled();

  }

  });

  }

  @Override

  protected void initPhysics() {

  onCollisionBegin(PLAYER, ENEMY, (p, e) -> onPlayerKilled());

  onCollisionCollectible(PLAYER, COIN, c -> onCoinPickup());

  }

  @Override

  protected void initUI() {

  UI ui = getAssetLoader().loadUI("pacman_ui.fxml", new PacmanUIController());

  ui.getRoot().setTranslateX(MAP_SIZE * BLOCK_SIZE);

  getGameScene().addUI(ui);

  }

  @Override

  protected void onUpdate(double tpf) {

  if (requestNewGame) {

  requestNewGame = false;

  getGameController().startNewGame();

  }

  }

  public void onCoinPickup() {

  inc("coins", -1);

  inc("score", +50);

  inc("teleport", +1);

  if (geti("coins") == 0) {

  gameOver();

  }

  }

  private boolean requestNewGame = false;

  public void onPlayerKilled() {

  requestNewGame = true;

  }

  private void gameOver() {

  getDialogService().showMessageBox("演示结束。按确定退出", getGameController()::exit);

  }

  public static void main(String[] args) {

  launch(args);

  }

  }

