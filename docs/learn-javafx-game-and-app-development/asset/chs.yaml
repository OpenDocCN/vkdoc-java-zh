  ## JavaFX 基础：创建简单应用


  在本节中，我们将构建一个包含常用控件的简单 JavaFX 应用。首先从一个最小化的 JavaFX 应用开始，其代码如清单 2-5 所示。


  ```

  import javafx.application.Application;

  import javafx.scene.Scene;

  import javafx.scene.layout.Pane;

  import javafx.stage.Stage;

  public class FXApp extends Application {

  @Override

  public void start(Stage stage) throws Exception {

  stage.setScene(new Scene(new Pane(), 800, 600));

  stage.show();

  }

  public static void main(String[] args) {

  launch(args);

  }

  }

  清单 2-5

  一个最小化的 JavaFX 应用

  ```


  要运行此应用，请使用 IntelliJ，首先在项目的 `src/main/java` 目录下创建一个名为 `FXApp` 的新 Java 类——该目录在图 2-4
  中已高亮显示。然后将清单 2-5 中的代码输入到新创建的 FXApp.java 文件中。最后，右键单击该文件并选择“运行”，即可看到这个简单的 JavaFX 应用运行起来。


  这段源代码中有几个关键点需要注意：


  *   任何 JavaFX 应用都会有一个继承 Application 的类。通常这个类也包含程序的入口点——`public static void main(String[]
  args)`，它仅调用 `launch(args)`。这是大多数 JavaFX 和 FXGL 应用的启动方式。


  *   另一个重要的代码片段是 `start()` 方法，它重写了 Application 类中同名的方法。这是一个必要的重写，允许开发者在启动阶段配置他们的
  JavaFX 应用。在我们的例子中，我们做了两件事：将场景设置到舞台对象上，并显示舞台。Stage 类是对操作系统特定窗口的抽象，我们将在第 6 章讨论图形时更详细地介绍。


  现在我们将介绍基础知识，包括用户输入、交互和输出。为此，我们在之前的最小示例基础上，扩展出清单 2-6 中的独立示例，它给出了如何实现这三个基本概念的总体思路。


  ```

  import javafx.application.Application;

  import javafx.scene.Parent;

  import javafx.scene.Scene;

  import javafx.scene.control.Button;

  import javafx.scene.control.TextField;

  import javafx.scene.layout.VBox;

  import javafx.scene.text.Font;

  import javafx.scene.text.Text;

  import javafx.stage.Stage;

  public class BasicApp extends Application {

  @Override

  public void start(Stage stage) throws Exception {

  stage.setScene(new Scene(createContent()));

  stage.show();

  }

  private Parent createContent() {

  TextField input = new TextField();

  Text output = new Text();

  Button button = new Button("Press");

  button.setOnAction(e -> {

  output.setText(input.getText());

  });

  VBox root = new VBox(input, button, output);

  root.setPrefSize(600, 600);

  return root;

  }

  public static void main(String[] args) {

  launch(args);

  }

  }

  清单 2-6

  一个基础 JavaFX 应用的示例

  ```


  清单 2-6 中主要的增加部分是 `createContent()` 方法——其他部分都相当直接。我们将详细分析这个方法：


  1.  首先，我们创建 TextField，用于接收用户输入。


  2.  接着，我们创建 Text 对象，它将作为向用户输出某些信息的载体。


  3.  在输出之后，我们创建一个名为“Press”的按钮，并提供一些在按钮按下时要执行的代码。具体来说，这段代码会将输入的文本数据设置到输出文本中。


  4.  最后，我们创建根布局容器，它定义了控件（输入框、按钮、输出文本）在屏幕上的放置方式。这里我们使用 VBox，它会将其内部的所有控件垂直排列。我们还为此布局容器设置了首选大小，以便窗口自动调整以适应此尺寸。然后，该方法返回根容器，将其设置为场景的根节点。


  如果你运行该应用（和之前一样，右键单击 Java 文件并点击运行），结果应类似于图 2-5 中的截图。正如我们所见，项目的布局是垂直排列的。


  ![](img/522865_1_En_2_Fig5_HTML.jpg)


  程序输出显示一个窗口。窗口右上角有最小化、最大化和关闭选项。在左上角，从上到下，窗口显示一行文本，内容为 hello world，接着是一个标有 press 的按钮，以及一行文本，内容为
  hello world。


  图 2-5


  一个包含三个基本控件（TextField、Button 和 Text 对象）的基础 JavaFX 应用


  最后一个要考虑的主要特性是 JavaFX 属性以及如何将一个属性绑定到另一个属性。在 JavaFX 中，属性充当值的包装器。这些值可以是任何类型。一些常用的类型包括
  int、double、boolean、String 和通用 Object。与我们已经熟悉的 int 等类型相比，使用属性的主要优势在于绑定的属性会自动更新。假设我们有一个要求用户输入姓名的
  `TextField` 和一个仅复制用户输入姓名的 Text 对象。如果没有属性，我们必须监听 `TextField` 上的每个按键事件，然后在用户输入或删除字符时手动更新
  Text 对象：


  ```

  text.setText(textField.getText());

  ```


  使用属性，上述功能可以以一种简洁的方式实现，只需调用一次，无需为任何监听器编写代码。


  ```

  text.textProperty().bind(textField.textProperty());

  ```


  至此，本书后续将使用的基本 JavaFX 特性概述完毕。现在我们将专注于构建一个简单的 FXGL 应用。




  ## FXGL 基础：创建简单应用


  在本节中，我们将构建一个简单的 FXGL 应用程序，这将是我们的第一个游戏示例。在开始之前，让我们先为这个简单游戏定义一些需求：


  1.  游戏将有一个 600×600 的窗口。


  2.  屏幕上有一个玩家，由一个蓝色矩形表示。


  3.  玩家可以通过键盘上的 W、S、A 和 D 键进行控制。


  4.  用户界面（UI）由一段文本表示，显示玩家移动了多少像素。


  5.  当玩家移动时，UI 文本将相应地更新。


  在本节结束时，你应该拥有一个类似于图 2-6 所示的游戏。虽然这看起来可能远非一个真正的游戏，但它的开发将帮助你理解 FXGL 中的基本特性。因此，完成本节后，你将能够构建各种简单的游戏。


  ![](img/522865_1_En_2_Fig6_HTML.jpg)


  程序输出显示一个标题为“basic game app 0 dot 1”的窗口。窗口右上角有最小化、最大化和关闭选项。窗口内显示一个彩色方块，方块左上角显示数字
  75。


  图 2-6


  一个基本的 FXGL 应用程序


  第一步是准备我们的开发环境。从上一节中，你应该已经清楚如何创建新项目并将 FXGL 添加为依赖项；因此，我们将立即从在 `src/main/java` 中为我们的游戏创建一个
  Java 包开始。为简单起见，我们将该包命名为“tutorial”。在该包中，我们将创建一个名为“BasicGameApp”的 Java 类。在 JavaFX
  应用程序中，通常会在包含 `main()` 方法的类名后附加“App”。这使其他开发人员能够轻松识别应用程序的主入口点。为了让你后续步骤更轻松，我们可以打开 BasicGameApp
  类并添加清单 2-7 中给出的常用 FXGL 导入。


  ```

  import com.almasb.fxgl.app.GameApplication;

  import com.almasb.fxgl.app.GameSettings;

  import com.almasb.fxgl.dsl.FXGL;

  import com.almasb.fxgl.entity.Entity;

  import com.almasb.fxgl.input.Input;

  import com.almasb.fxgl.input.UserAction;

  import javafx.scene.input.KeyCode;

  import javafx.scene.paint.Color;

  import javafx.scene.shape.Rectangle;

  import javafx.scene.text.Text;

  import java.util.Map;

  清单 2-7

  常用的 FXGL 导入

  ```


  现在我们可以开始编写一些代码了。要开始使用 FXGL，你的“App”类需要继承 `GameApplication` 并重写 `initSettings()` 方法：


  ```

  public class BasicGameApp extends GameApplication {

  @Override

  protected void initSettings(GameSettings settings) {}

  }

  ```


  一旦你添加了 extends 子句，你的 IDE 很可能会提示自动生成重写的方法。在接下来的小节中，我们将介绍其他常用的重写方法。


  通过 `initSettings()` 方法和 `settings` 对象，你可以更改大量游戏设置，并以适合你需求的方式配置应用程序。然而，目前我们只想尽快让应用程序运行起来。因此，我们暂时先不处理这个方法。我们要添加的下一个方法是：


  ```

  public static void main(String[] args) {

  launch(args);

  }

  ```


  我们已经在前面章节中介绍过一个简单的 JavaFX 应用程序，所以这个方法并不新鲜。这是启动普通 JavaFX 应用程序的方式。由于 FXGL 与 JavaFX
  无缝集成，这也是启动 FXGL 应用程序的方式。随着你阅读本书的深入，你会意识到 FXGL 就是带有游戏开发功能的 JavaFX。此时，你的应用程序已经可以运行，因此你可以启动游戏（通常通过右键单击并选择“运行”），查看结果，最后关闭它。


  ### 需求 1：打开窗口


  现在，我们将依次实现之前定义的每个需求，来开发我们的游戏。第一个需求是打开一个 600×600 的窗口，我们的游戏将在其中运行。正如我们之前提到的，要更改设置，我们可以使用
  `initSettings()` 方法，如清单 2-8 所示。


  ```

  @Override

  protected void initSettings(GameSettings settings) {

  settings.setWidth(600);

  settings.setHeight(600);

  settings.setTitle("Basic Game App");

  settings.setVersion("0.1");

  }

  清单 2-8

  initSettings() 方法允许提供游戏特定的设置

  ```


  使用 settings 对象，我们将宽度和高度更改为 600。我们还设置了游戏的标题和版本。一旦设置完成，这些设置在运行时就不能更改。这并不意味着你不能调整应用程序的大小；相反，这意味着提供的值是启动时要使用的设置。现在你可以在
  IDE 中点击“运行”，这将启动一个 600×600 的窗口，窗口标题为“Basic Game App”。至此，我们完成了第一个需求。你可以看到这个需求实现起来很简单。你会注意到其他需求也并不复杂。这就是
  FXGL 的总体目标：让 JavaFX 游戏开发变得显著更简单、更高效。


  ### 需求 2：添加玩家


  第二个需求是向我们的游戏添加一个玩家对象。我们将在 `initGame()` 中完成此操作。简而言之，这是你设置游戏开始前需要准备好的所有内容的地方。代码如清单
  2-9 所示。


  ```

  private Entity player;

  @Override

  protected void initGame() {

  player = FXGL.entityBuilder()

  .at(300, 300)

  .view(new Rectangle(25, 25, Color.BLUE))

  .buildAndAttach();

  }

  清单 2-9

  initGame() 方法允许设置游戏及其游戏对象

  ```


  我们将逐一方法地慢慢讲解。


  *   有一个名为 player 的实例级字段，类型为 Entity。实体本质上是一个游戏对象，正如 FXGL 所定义的那样。这是现阶段你需要了解的全部内容。我们将在下一章更详细地讨论实体。`FXGL.entityBuilder()`
  是构建实体的首选方式。


  *   接下来，通过调用 `.at()`，我们可以设置正在创建的实体的位置。在本例中，x = 300，y = 300。请注意，任何实体的位置都在其左上角点，与
  JavaFX 中一样。


  *   然后，我们告诉实体构建器创建我们实体的视图。具体来说，我们希望使用 Rectangle 对象，它直接来自 JavaFX，所以这里没有新内容。我们通过提供宽度
  = 25、高度 = 25 和颜色来构造矩形。这里需要注意的重要一点是，你可以使用任何 JavaFX Node 而不是矩形来传递给 view 方法，从而提供实体的视觉表示。


  *   最后，我们调用 `.buildAndAttach()`。通过调用 build，我们可以获得正在构建的实体的引用。至于 attach 部分，它方便地允许我们将构建好的实体直接添加到游戏世界中。我们将在下一章介绍游戏世界及其含义。现在，只需将其视为实体存在和生存的地方。


  如果你现在运行游戏，你应该会在窗口中心附近看到一个蓝色矩形。这一步完成了需求 2。




  ### 需求 3：添加输入


  需求 3 指出，我们应该能够使用键盘控制玩家实体。现在我们将着手处理用户输入。在 FXGL 中，通常所有与输入相关的代码都放在 `initInput()` 方法中。清单
  2-10 中的代码展示了如何添加一个输入动作。FXGL 中的大部分输入都以此格式处理。开发者需要指定一个动作（要运行的代码），然后将其绑定到一个触发器（鼠标按钮、按键或某种其他输入方式，例如控制器）。


  ```

  @Override

  protected void initInput() {

  FXGL.onKey(KeyCode.D, () -> {

  player.translateX(5); // 向右移动 5 像素

  });

  }

  清单 2-10

  initInput() 方法允许将用户输入绑定到游戏内动作

  ```


  让我们逐行分析清单 2-10。通过调用 FXGL 的 `onKey()` 方法，我们实际上是在说“当某个键被按下时，执行一个动作”。在这个例子中，按键是 `KeyCode.D`。同样，如果你之前使用过
  JavaFX，你就会知道这些与标准事件处理器中使用的键码完全相同。正如你所注意到的，要使用 FXGL 的大部分功能，你只需调用 `FXGL.***`，你的 IDE
  就会通过自动补全显示所有可能的函数。


  回顾需求，我们希望执行的动作是移动玩家。所以当按下 D 键时，我们希望将玩家向右移动。我们调用 `player.translateX(5)`，这会将实体的 X
  坐标移动 5 像素。请注意，“translate”是计算机图形学（以及 JavaFX）中使用的术语，意思是移动。你会注意到 FXGL 的 API 非常简洁。这种简洁的
  API 在 FXGL 的上下文中通常被称为 DSL（领域特定语言）。如果我们使用静态导入，这甚至可以进一步简化。你可以通过添加以下导入行来静态导入 FXGL 调用：


  ```

  import static com.almasb.fxgl.dsl.FXGL.*;

  ```


  既然我们已经熟悉了单个按键的输入处理，那么剩下的代码就很简单了，如清单 2-11 所示。


  ```

  @Override

  protected void initInput() {

  FXGL.onKey(KeyCode.D, () -> {

  player.translateX(5); // 向右移动 5 像素

  });

  FXGL.onKey(KeyCode.A, () -> {

  player.translateX(-5); // 向左移动 5 像素

  });

  FXGL.onKey(KeyCode.W, () -> {

  player.translateY(-5); // 向上移动 5 像素

  });

  FXGL.onKey(KeyCode.S, () -> {

  player.translateY(5); // 向下移动 5 像素

  });

  }

  清单 2-11

  所有四个方向的 initInput() 方法实现

  ```


  填充了 `initInput()` 方法后，需求 3 就完成了。


  ### 需求 4：添加 UI


  下一个需求是 UI，我们在 `initUI()` 方法中处理，如清单 2-12 所示。


  ```

  @Override

  protected void initUI() {

  Text textPixels = new Text();

  textPixels.setTranslateX(50); // x = 50

  textPixels.setTranslateY(100); // y = 100

  FXGL.getGameScene().addUINode(textPixels); // 添加到屏幕

  }

  清单 2-12

  initUI() 方法允许在屏幕上添加用户界面对象

  ```


  在清单 2-12 中，`Text` 类是直接来自 JavaFX 的。实际上，对于大多数 UI 对象，我们直接使用 JavaFX 控件，因为没必要重复造轮子。你应该注意到，当我们向世界添加实体时，游戏场景会自动识别该实体具有关联的视图。因此，游戏场景会神奇地将该实体添加到场景图中。对于
  UI 对象，我们需要负责将它们添加到场景图中，而调用 `getGameScene().addUINode()` 正是为了完成这个操作。稍后我们将处理 UI 更新，例如玩家移动的像素数。


  ### 需求 5：更新 UI


  为了完成最后一个需求，我们将使用一个游戏变量。在 FXGL 中，可以从游戏的任何部分访问和修改游戏变量。从某种意义上说，它是一个全局变量，其作用域绑定到 FXGL
  游戏实例。此外，这些变量可以像 JavaFX 属性一样进行绑定。我们首先创建这样一个变量：


  ```

  @Override

  protected void initGameVars(Map vars) {

  vars.put("pixelsMoved", 0);

  }

  ```


  上述代码创建了一个名为“pixelsMoved”的游戏变量，初始值为 0。请注意，FXGL 会根据初始值自动推断变量的类型，在本例中为整数。例如，如果我们使用
  0.0，那么游戏变量的类型将是双精度浮点数。接下来，我们需要在玩家移动时更新该变量。我们可以在代码的输入处理部分执行此操作。


  ```

  FXGL.onKey(KeyCode.D, () -> {

  player.translateX(5); // 向右移动 5 像素

  FXGL.inc("pixelsMoved", +5);

  });

  ```


  你可以对剩下的移动动作（即向左、向上和向下）执行相同的操作。最后一步是将我们之前创建的 UI 文本对象绑定到变量 `pixelsMoved`。最终，这允许 FXGL
  根据 `pixelsMoved` 的值自动更新 UI，这样我们就不需要手动更新 UI 了。在 `initUI()` 中，一旦我们创建了 `textPixels`
  对象，就可以执行以下操作：


  ```

  textPixels.textProperty().bind(FXGL.getWorldProperties().intProperty("pixelsMoved").asString());

  ```


  进一步解释一下，我们获取 `textPixels` UI 对象的文本属性，并将其绑定到 `pixelsMoved` 值，由于该值是整数，需要先将其转换为字符串。这是我们对这个示例所做的最后一项更改，现在你应该拥有一个简单的
  FXGL 游戏了。


  我们还有很多领域没有涉及，例如资源加载、物理、AI 和图形——这些以及其他特性将在我们继续阅读本书的过程中讨论。


  ## 本章小结


  在本章中，我们介绍了本书中使用的必要概念。我们回顾了关于类和方法的 Java 基础知识。我们了解了如何创建一个类来模拟抽象或现实世界中的对象，以及方法如何为这些类提供功能。接下来，我们使用
  IntelliJ 通过内置的 Maven 支持添加了 JavaFX（通过 FXGL）外部库，这简化了流程。随后，我们使用 JavaFX 库创建了一个包含三个 UI
  控件（文本输出、文本输入和按钮）的简单应用程序。最后，我们使用 FXGL 库作为外部依赖，实现了一个简单的游戏演示。该演示向我们展示了如何使用输入、创建实体（即游戏对象），以及如何与
  JavaFX UI 控件交互。在下一章中，我们将进一步了解实体以及它们如何帮助我们创建复杂的游戏世界。


  '
- "# 3. 实体-组件案例研究：开发 Pong 游戏\n\n在本章中，我们将开始游戏开发之旅，开发一个 Pong 街机游戏的克隆版。我们将开始构建你关于使用 FXGL\
  \ 进行游戏开发过程的知识。通过这个过程，我们将学习：\n\n*   实体及其如何表示游戏对象\n*   组件及其如何向实体添加数据和行为\n*   游戏世界以及如何执行查询以访问世界中的特定实体\n\
  \n游戏对象构成了任何游戏的基本概念。游戏越大，游戏对象的实现就应该越健壮，以便能够适当地扩展。具有深厚面向对象编程背景的开发者可能会陷入一个陷阱，即继承最终与游戏对象功能交织在一起，导致软件架构的可扩展性降低。继承倾向于垂直层次结构，在一系列用例中（包括中小型游戏）非常有益。然而，实体-组件模型倾向于水平层次结构，它提供了自身的优势，并且可能更适合大型游戏项目。随着你继续阅读本章，这种模型的好处将变得更加清晰。我们将从定义什么是实体开始。\n\
  \n\n\n## 实体\n\n你能想到的任何游戏对象（例如：玩家、敌人、金币、子弹、强化道具、墙壁、泥土、武器、宝箱等等）都是一个实体。就其本身而言，实体只是一个通用对象。如果不添加组件，几乎无法区分一个实体与另一个实体。组件是关键对象，它们携带数据和行为，以独特的方式定义每个实体。我们将在接下来的章节中对此进行详细阐述。\n\
  \n在 FXGL 中，有许多有用的方法可以在实体上调用。\n\n这些方法包括：\n\n*   `addComponent(Component c)` / `removeComponent(Component\
  \ c)` – 允许添加新组件和移除现有组件。\n\n*   `setProperty(String key, Object value)` – 允许向实体添加任何类型的变量。如果你不想创建新组件来存储数据，这些变量会很有用。可以通过调用\
  \ `getInt(String key)`、`getString(String key)`、`getObject(String key)` 以及其他类似方法来获取这些值。\n\
  \n*   `getComponents()` – 检索附加到实体上的所有组件列表。\n\n*   `getPosition()` / `setPosition(Point2D\
  \ p)` – 返回/设置实体在二维空间中的位置。更具体地说，该方法会请求 `TransformComponent` 提供/修改此数据（正如我们所知，实体本身不存储任何数据，只有它们的组件才存储数据）。\n\
  \n*   `translate(Point2D vector)` – 按给定的向量移动实体。更具体地说，该方法会请求 `TransformComponent`\
  \ 修改位置数据。\n\n*   `isVisible()` / `setVisible(boolean b)` – 检查实体是否正在被绘制/如果设置为 false，则实体将不会被绘制。\n\
  \n*   `getType()` / `setType(Object type)` – 允许检索/设置实体类型。通常，枚举类值被用作类型。\n\n现在我们对实体是什么以及可以在其上调用哪些方法有了更多了解，接下来我们将考虑组件。\n\
  \n## 作为数据的组件\n\n在本节中，我们将看到组件如何向实体添加数据。在 FXGL 的实体-组件模型上下文中，组件是实体的一部分。一个组件可以携带你希望实体拥有的任何数据。我们将借助在\
  \ Java 中向类定义添加实例字段的类比来说明：\n\n```\nclass Car {\n    int moveSpeed;\n    Color color;\n\
  }\n```\n\n因此，如果我们想为汽车添加一个新属性（字段），就必须修改前面的类。在游戏中，对象通常会“失去”旧属性并“获得”新属性，这意味着我们需要有能力在运行时修改前面的类，而这并非易事。\n\
  \n此外，让我们考虑使用 `Car` 类更深层次的含义。在前面的例子中，`Car` 类包含一个实例字段 `moveSpeed`，这意味着它可以移动。现在，想象一下我们还有一个玩家角色，它也可以移动。我们可以将\
  \ `moveSpeed` 添加到 `Player` 类中。然而，还有许多其他可移动的游戏对象。所以也许我们应该改用继承，并创建一个抽象类 `MovableGameObject`，或者更好的做法是使用一个接口\
  \ `Movable`。这固然很好，但如果我们想要一个有时可以移动、有时不能移动的对象呢？例如，由玩家控制的汽车可以移动，但它自身不能移动。我们不能简单地移除一个接口，然后在需要时再把它附加回去。很明显，使用继承无法简单地解决这个问题。\n\
  \n好消息是，在计算机科学中，对于任何给定的问题通常都有不止一种解决方案。继承并不是我们武器库中唯一的工具。你可能听说过“组合优于继承”这句话。嗯，组件在某种程度上是这种思想的极端版本。它们允许我们在运行时附加字段和方法——这有多酷？考虑一下代码清单\
  \ 3-1 中的代码片段，它是 `Car` 类的等价物，但用组件重写了：\n\n```\nEntity entity = new Entity();\nentity.addComponent(new\
  \ MoveSpeedComponent());\nentity.addComponent(new ColorComponent());\n// 一段时间后，我们可以让它不可移动\n\
  entity.removeComponent(MoveSpeedComponent.class);\n// 或者像普通字段一样更改组件的值\nentity.getComponentOptional(ColorComponent.class).ifPresent(color\
  \ -> {\n    color.setValue(Color.RED);\n});\n代码清单 3-1\n添加、移除和访问组件的示例\n```\n\n我们可以看到，使用组件，我们之前描述的继承问题变得非常容易解决。这种问题表示方式的改变是计算机科学中的一种常用技术。这种技术允许以一种易于通过已知方法解决的方式重新表述问题。此外，使用组件的方法将逻辑隔离在每个组件中。这意味着我们可以将这个\
  \ `MoveSpeedComponent` 附加到任何实体上。我们还可以向一个实体添加任意数量的不同组件，这使得这种方法具有高度的可扩展性。最后，它严格遵守单一职责原则（来自\
  \ SOLID 原则），因此所有需要修改（例如，移动）的更改都将发生在一个单独的组件内，即 `MoveSpeedComponent`。\n\n在创建实体时，最好预先添加你知道实体将拥有的所有组件。然后，你可以根据需要启用或禁用组件。例如，`CollidableComponent`\
  \ 表示一个实体可以与其他物体碰撞。假设我们不希望实体在创建时可碰撞。与其在实体变得可碰撞时再添加组件，不如在创建时直接添加组件并将其值设置为 false（在\
  \ Java 中，我们可以使用 `var` 代替左侧的类型来缩短代码）：\n\n```\nvar c = new CollidableComponent();\n\
  c.setValue(false);\nentity.addComponent(c);\n```\n\n在考虑了组件作为数据容器的情况之后，我们现在将重点讨论如何使用组件向实体添加行为。\n\
  \n## 作为行为的组件\n\n组件也可以携带行为信息，从而有效地让实体获得新方法并能够执行新操作。事实上，我们之前演示了将带有数据的组件类比为向类添加字段。嗯，添加带有行为的组件就像添加方法。组件允许我们让实体做一些事情，从而定义实体的行为。在我们创建自定义组件之前，让我们先考虑一下\
  \ `Component` 类中的内置方法：\n\n*   `onAdded()` – 当组件被添加到实体时，会调用此回调函数。\n\n*   `onRemoved()`\
  \ – 当组件从实体中移除时，会调用此回调函数。\n\n*   `onUpdate()` – 每帧都会调用此回调函数，以允许组件更新其逻辑。\n\n*   `pause()`\
  \ – 调用此方法将使组件暂停处理 `onUpdate()` 中的任何更新。\n\n*   `resume()` – 调用此方法将使组件恢复处理 `onUpdate()`\
  \ 中的任何更新。\n\n任何继承自 `Component` 的自定义类都可以访问这些方法。\n\n\n\n### 自定义组件\n\n假设我们希望实体成为一个升降机，以便能将玩家运送到山顶。如前所述，为实体添加这样一个组件非常简单：\n\
  \n```\nentity.addComponent(new LiftComponent());\n```\n\n现在我们来考虑如何实现这样一个 `LiftComponent`。每个组件都有一个\
  \ `onUpdate()` 方法，可以通过重写该方法来提供所需的功能（回顾第 2 章，此类重写需使用 `@Override` 注解）。利用这种方法，我们可以构建如代码清单\
  \ 3-2 所示的代码片段，该代码能将任何实体变成一个升降机。\n\n```\npublic class LiftComponent extends Component\
  \ {\nLocalTimer timer = ...;\nboolean isGoingUp = true;\ndouble speed = ...;\n@Override\n\
  public void onUpdate(double tpf) {\nif (timer.elapsed(duration)) {\nisGoingUp =\
  \ ! isGoingUp;\ntimer.capture();\n}\nentity.translateY(isGoingUp? -speed * tpf :\
  \ speed * tpf);\n}\n}\n代码清单 3-2\n一个自定义组件的示例\n```\n\n你会注意到，我们无需初始化对“entity”对象的引用。当我们将其添加到实体时，它会自动注入到组件中。这个\
  \ FXGL 特性极大地简化了开发者的代码。另一个避免额外样板代码的类似特性是组件注入。\n\n### 组件注入\n\n自动组件注入的常见用例是当你拥有两个组件，即\
  \ `Component1` 和 `Component2`，并且 `Component2` 需要持有对 `Component1` 的引用时：\n\n```\n\
  class Component1 extends Component {}\nclass Component2 extends Component {\nprivate\
  \ Component1 comp;\n}\n```\n\n在这种情况下，你无需在 `Component2` 类中手动获取对 `Component1` 的引用。在组件添加过程中，FXGL\
  \ 会自动将该对象注入到“comp”字段中。需要注意的是，`Component2` 要求实体上必须存在 `Component1`，因为它是一个依赖项。对所需组件的检查会在组件添加时执行，因此确保所有必需的组件都先被添加至关重要。在这种情况下，`Component1`\
  \ 应该在 `Component2` 之前添加；否则，FXGL 会抛出异常。\n\n让我们看看这种注入在实践中是如何工作的。例如，代码清单 3-3 展示了一个非常简单的玩家组件，其中包含\
  \ up、down、left 和 right 方法，这些方法允许对组件将要附加到的实体进行基本移动。\n\n```\npublic class PlayerComponent\
  \ extends Component {\n// 注意：此组件是自动注入的\nprivate TransformComponent position;\nprivate\
  \ double speed = 0;\n@Override\npublic void onUpdate(double tpf) {\nspeed = tpf\
  \ * 60;\n}\npublic void up() {\nposition.translateY(-5 * speed);\n}\npublic void\
  \ down() {\nposition.translateY(5 * speed);\n}\npublic void left() {\nposition.translateX(-5\
  \ * speed);\n}\npublic void right() {\nposition.translateX(5 * speed);\n}\n}\n代码清单\
  \ 3-3\n自定义 PlayerComponent 类的一种可能实现\n```\n\n我们可以看到，`position` 组件字段无需由开发者初始化。它会被\
  \ FXGL 自动注入，从而减少了代码量。\n\n现在我们已经熟悉了实体和组件，是时候关注游戏世界了，实体的大部分生命周期都在其中度过。\n\n## 游戏世界\n\
  \n在本节中，我们将探讨游戏世界及其在有效存储和查询实体方面的重要性。游戏世界本质上是一个包含实体的数据结构。它还负责向游戏添加、更新和移除实体。最后，游戏世界提供了通过各种条件查询（在世界中搜索）实体的方法。例如，你可以收集所有敌人实体，以便在玩家升级时提升它们的属性。\n\
  \n将实体添加到世界也意味着将其添加到游戏中。同样，要从游戏中移除实体，你只需将其从世界中移除即可。当前在游戏世界中的实体被视为活跃的——它们的 `isActive()`\
  \ 方法将返回 true。让我们创建一个简单的实体并将其添加到游戏世界中。在 FXGL 中，可以通过调用以下代码获取游戏世界：\n\n```\nvar world\
  \ = FXGL.getGameWorld();\n```\n\n要向其中添加一个实体 `e`，我们可以调用：\n\n```\nworld.addEntity(e);\n\
  ```\n\n最后，要移除该实体，我们可以调用：\n\n```\nworld.removeEntity(e);\n```\n\n我们现在能够根据需要添加和移除实体了，因此我们的注意力转向了游戏世界查询。\n\
  \n### 世界查询\n\n在世界中搜索实体的方法有多种。通常，这类方法以“get”开头。例如，`getEntitiesByType()`。我们将依次考虑通过以下方式查询实体：\n\
  \n*   **类型（需要 TypeComponent）** – 假设我们有一个名为 EntityType 的枚举，其中包含游戏中实体的有效类型。你可能希望获取游戏中的所有敌人，以便对它们应用增益效果，以此增加游戏难度。这可以通过调用以下代码轻松实现：\n\
  \n*   **ID（需要 IDComponent）** – 假设你可能允许复制实体。这对于 RPG 类游戏尤其有用，因为这类游戏中会有大量重复的物品。所以，我们可能在游戏世界中放置了多个熔炉，并为每个熔炉分配了一个唯一的\
  \ IDComponent。虽然名称相同，都是“熔炉”，但其数字 ID 是不同的。以下代码允许你获取游戏中特定熔炉的引用：\n\n```\nvar enemies\
  \ = world.getEntitiesByType(EntityType.ENEMY);\n```\n\n*   **单例** – 在很多情况下，某种类型的实体只有一个，例如玩家。通过遍历实体列表来获取我们想要的那个可能会很麻烦。因此，FXGL\
  \ 为此提供了一个便捷的实用查询方法：\n\n```\nvar forge123 = world.getEntityByID(\"Forge\", 123);\n\
  ```\n\n*   **随机** – 在游戏玩法中，引入一些随机元素是很常见的。如果你想要炸毁一个随机敌人，可以通过以下方式获取一个随机的敌人实体：\n\n\
  ```\nvar player = world.getSingleton(EntityType.PLAYER);\n```\n\n*   **组件** – 某些游戏内逻辑只应在具有特定组件的实体上执行。获取所有具有给定组件的实体的一种简单方法如下：\n\
  \n```\nvar enemy = world.getRandom(EntityType.ENEMY);\n```\n\n*   **范围** – 游戏玩法逻辑，例如触发与实体的交互或对半径范围内的实体造成伤害，可以通过查询特定范围内的实体来实现。例如，为了实现这一点，我们可以调用以下方法来获取位于给定矩形内（完全或部分）的所有实体：\n\
  \n```\nvar entsWithComponent = world.getEntitiesByComponent(MyComponent.class);\n\
  ```\n\n*   **过滤器** – 最后，我们可以通过使用自定义过滤器以通用方式查询实体。过滤器本质上是一个函数，给定一个实体，返回 true 或 false。如果结果为\
  \ true，则该实体将被添加到要返回的列表中：\n\n```\nvar entitiesNearby = world.getEntitiesInRange(new\
  \ Rectangle2D(5, 5, 30, 30));\n```\n\n```\nvar entsWithHP10 = world.getEntitiesFiltered(e\
  \ -> e.getInt(\"hp\") == 10);\n```\n\n至此，我们完成了对游戏世界及其与存储和查询实体相关的常见功能的概述。现在，我们将专注于在一个\
  \ Pong 克隆游戏中运用这些概念。\n\n\n\n## 乒乓球\n\n在本节中，我们将为乒乓球游戏构建一个功能完整的基础框架。最新的完整源代码可在 [`https://github.com/AlmasB/FXGLGames`](https://github.com/AlmasB/FXGLGames)\
  \ 的 Pong 目录下获取。\n\n在图 3-1（左侧图片）中，您可以看到本节将要实现的效果。诚然，游戏看起来略显单调，但您将学到大量关于 FXGL 工作流程的基础知识，以及如何以预设模板化的方式开发游戏。在本书后续内容中，您将学习图形效果，这将使您能够在保留原始美学风格的同时，让这款经典游戏在视觉上更具吸引力，如图\
  \ 3-1（右侧图片）所示。\n\n![](img/522865_1_En_3_Fig1_HTML.png)\n\n2 张截图。左侧屏幕显示有两条细小的垂直粗线。右侧屏幕显示有两条细小的垂直粗线、两个小圆圈以及一条带有图形效果的线条。\n\
  \n图 3-1\n\n乒乓球游戏：简单版（左）与视觉增强版（右）\n\n开发 FXGL 游戏时，一种常见的方法是首先定义我们计划在游戏中拥有的实体类型。在本示例中，我们将包含：\n\
  \n*   玩家球拍\n*   敌方球拍\n*   球\n*   墙壁\n\n如前所述，我们可以将类型定义为 Java 枚举。枚举是一种特殊的类，只能包含一组预定义的值。要实现这些类型，我们可以创建以下枚举：\n\
  \n```\npublic enum EntityType {\nPLAYER_BAT, ENEMY_BAT, BALL, WALL\n}\n```\n\n###\
  \ 构建玩家球拍组件\n\n正如我们之前通过组件所看到的，FXGL 架构提倡关注点分离，这使我们能够独立开发游戏的各个部分。这种独立开发的方式为开发者提供了灵活性，并符合单一职责原则（该原则是\
  \ SOLID 原则的一部分；更多信息可在网上找到）。基于此，我们可以通过先创建组件来开始构建游戏实体的逻辑。在乒乓球游戏中，有两种类型的对象：球拍（挡板）和球。我们将从\
  \ `BatComponent` 开始，其代码如代码清单 3-4 所示。\n\n```\nimport com.almasb.fxgl.dsl.FXGL;\n\
  import com.almasb.fxgl.entity.component.Component;\nimport com.almasb.fxgl.physics.PhysicsComponent;\n\
  public class BatComponent extends Component {\nprivate static final double BAT_SPEED\
  \ = 420;\nprotected PhysicsComponent physics;\npublic void up() {\nif (entity.getY()\
  \ >= BAT_SPEED / 60)\nphysics.setVelocityY(-BAT_SPEED);\nelse\nstop();\n}\npublic\
  \ void down() {\nif (entity.getBottomY() <= FXGL.getAppHeight() - (BAT_SPEED / 60))\n\
  physics.setVelocityY(BAT_SPEED);\nelse\nstop();\n}\npublic void stop() {\nphysics.setLinearVelocity(0,\
  \ 0);\n}\n}\n代码清单 3-4\nBatComponent 类\n```\n\n与其他代码片段一样，我们将全面介绍 `BatComponent` 类。首先，我们注意到三个导入语句，它们使我们能够使用\
  \ FXGL 方法、通用的 `Component` 类以及 `PhysicsComponent` 类。要创建自定义组件，我们需要定义名称（此处为 `BatComponent`）并继承\
  \ `Component`。\n\n接下来，我们定义球拍移动速度的静态常量值。将其声明为顶部的变量（而不是在代码中作为硬编码值使用），以便于查找该变量并在以后需要修改时轻松更改其值。进一步思考，如果您希望在运行时能够更改变量，甚至可以移除“final”修饰符。\n\
  \n随后，我们声明了 `PhysicsComponent` 的引用，命名为 physics。回顾本章“组件注入”小节，我们不需要显式地为引用赋值，因为在实体创建过程中，组件会被自动注入。当然，我们需要记得在\
  \ `BatComponent` 之前添加 `PhysicsComponent`，这样才能正常工作。我们稍后会回到实体创建的话题，并了解在实体工厂类中如何添加组件。\n\
  \n`BatComponent` 包含三个方法：up、down 和 stop。顾名思义，这些方法负责移动球拍实体。这些方法的实现很简单——我们检查是否可以向某个方向（例如向上）移动，如果检查通过则执行移动。更具体地说，当尝试向上移动时，我们检查球拍实体的\
  \ Y 值是否低于游戏（屏幕）的顶部。这意味着有足够的空间可以移动。如果检查失败，我们通过将速度设置为 0 来停止球拍移动。\n\n此时，您可能会对检查中使用的\
  \ `BAT_SPEED / 60` 而非直接使用 `BAT_SPEED` 感到疑惑。原因在于秒与帧之间的差异。我们通过物理系统设置的速度是每秒 `BAT_SPEED`，而通常每秒有\
  \ 60 帧。因此，每帧我们实际移动 `BAT_SPEED / 60` 个单位。所以，我们使用这个值来检查是否有足够的空间供球拍实体移动。\n\n### 构建敌方球拍组件\n\
  \n通过继承（回顾第 2 章中关于继承的概念）我们的 `BatComponent`，我们可以定义 `EnemyBatComponent`，因为大部分功能保持不变。`EnemyBatComponent`\
  \ 可以编写为代码清单 3-5 所示。\n\n```\nimport com.almasb.fxgl.entity.Entity;\npublic class\
  \ EnemyBatComponent extends BatComponent {\nprivate Entity ball;\n@Override\npublic\
  \ void onUpdate(double tpf) {\nif (ball == null) {\nball = entity.getWorld()\n.getSingletonOptional(EntityType.BALL)\n\
  .orElse(null);\n} else {\nmoveAI();\n}\n}\nprivate void moveAI() {\nEntity bat =\
  \ entity;\nboolean isBallToLeft = ball.getRightX()  bat.getY()) {\nif (isBallToLeft)\n\
  down();\nelse\nup();\n} else {\nstop();\n}\n}\n}\n代码清单 3-5\nEnemyBatComponent 类\n\
  ```\n\n让我们详细分析这个类。您会注意到，这个新组件包含一个对球实体的引用。在游戏开始时，我们不知道球是否存在于游戏世界中，因此我们在 `onUpdate()`\
  \ 方法内部初始化球。为此，我们检查球是否为 `null`——在游戏开始时，它确实是 `null`。因此，在游戏运行的第一帧，将从游戏世界中查询球实体类型并进行初始化。通过查看\
  \ if 语句的“else”分支，我们可以看到调用了 `moveAI()`。本质上，从高层次来看，这个检查可以描述如下：如果球引用为 null，则初始化它；否则，移动敌方球拍。\n\
  \n敌方球拍的 AI 实际上非常简单。我们将在未来的章节中考虑复杂的 AI。目前，我们的 AI 仅由几个 if 语句组成。我们知道敌方球拍位于屏幕的右侧。因此，我们首先检查球是否在球拍的左侧，这意味着我们应该尝试接住它。相反，如果球在右侧，那么我们希望避免碰到它；否则，球会在球拍和墙壁之间不断弹跳，持续为玩家球拍加分。完成此检查后，唯一剩下的事情就是判断球是在敌方球拍的上方还是下方，并相应地移动。\n\
  \n\n### 构建球体组件\n\n在考虑了双方球拍的逻辑之后，让我们深入探讨球体实体的逻辑。下一个组件是 `BallComponent`，如代码清单 3-6\
  \ 所示。\n\n```\nimport com.almasb.fxgl.entity.component.Component;\nimport com.almasb.fxgl.physics.PhysicsComponent;\n\
  import javafx.geometry.Point2D;\nimport static com.almasb.fxgl.dsl.FXGL.*;\nimport\
  \ static java.lang.Math.*;\npublic class BallComponent extends Component {\nprivate\
  \ PhysicsComponent physics;\n@Override\npublic void onUpdate(double tpf) {\nlimitVelocity();\n\
  checkOffscreen();\n}\nprivate void limitVelocity() {\n// 防止 X 方向移动过慢\nif (abs(physics.getVelocityX())\
  \ < 5 * 60) {\nphysics.setVelocityX(signum(physics.getVelocityX()) * 5 * 60);\n\
  }\n// 防止 Y 方向移动过快\nif (abs(physics.getVelocityY()) > 5 * 60 * 2) {\nphysics.setVelocityY(signum(physics.getVelocityY())\
  \ * 5 * 60);\n}\n}\n// 我们使用了物理引擎，因此球有可能被推过墙壁而超出屏幕，故需进行此检查\nprivate void checkOffscreen()\
  \ {\nvar viewport = getGameScene().getViewport();\nvar visArea = viewport.getVisibleArea();\n\
  if (getEntity().getBoundingBoxComponent().isOutside(visArea)) {\nphysics.overwritePosition(new\
  \ Point2D(\ngetAppWidth() / 2,\ngetAppHeight() / 2\n));\n}\n}\n}\n代码清单 3-6\nBallComponent\
  \ 类\n```\n\n我们再次从查看 `onUpdate()` 方法开始。这里的高级逻辑是：(a) 限制球的速度，使其不会突破音障；(b) 检查球是否移出屏幕。每个元素都在各自的方法中实现。`limitVelocity()`\
  \ 方法检查当前在 X 轴和 Y 轴上的速度，并根据需要将值限制在 `5 * 60`。最后，我们检查球是否在屏幕之外。这种情况可能发生，因为我们使用物理引擎来运行刚体的碰撞模拟。在某些情况下，球可能会被猛烈地推向墙壁，以至于正确的数值计算会将其置于墙壁之外。因此，有一个简单的检查来测试球是否在视口的可见区域内。如果不是，则只需将球移动到屏幕中心。\n\
  \n### 构建实体工厂\n\n一旦我们通过前面提到的组件实现了每个实体的逻辑，就可以继续添加一个工厂来生成实体。工厂代码如代码清单 3-7 所示，其中有两个值得注意的方法。\n\
  \n```\nimport com.almasb.fxgl.entity.Entity;\nimport com.almasb.fxgl.entity.EntityFactory;\n\
  import com.almasb.fxgl.entity.SpawnData;\nimport com.almasb.fxgl.entity.Spawns;\n\
  import com.almasb.fxgl.entity.components.CollidableComponent;\nimport com.almasb.fxgl.physics.BoundingShape;\n\
  import com.almasb.fxgl.physics.HitBox;\nimport com.almasb.fxgl.physics.PhysicsComponent;\n\
  import com.almasb.fxgl.physics.box2d.dynamics.BodyType;\nimport com.almasb.fxgl.physics.box2d.dynamics.FixtureDef;\n\
  import javafx.scene.paint.Color;\nimport javafx.scene.shape.Rectangle;\nimport static\
  \ com.almasb.fxgl.dsl.FXGL.entityBuilder;\nimport static com.almasb.fxgl.dsl.FXGL.getip;\n\
  public class PongFactory implements EntityFactory {\n@Spawns(\"ball\")\npublic Entity\
  \ newBall(SpawnData data) {\nPhysicsComponent physics = new PhysicsComponent();\n\
  physics.setBodyType(BodyType.DYNAMIC);\nphysics.setFixtureDef(new FixtureDef().density(0.3f).restitution(1.0f));\n\
  physics.setOnPhysicsInitialized(() -> physics.setLinearVelocity(5 * 60, -5 * 60));\n\
  return entityBuilder(data)\n.type(EntityType.BALL)\n.view(new Circle(5, 5, 5))\n\
  .bbox(new HitBox(BoundingShape.circle(5)))\n.with(physics)\n.with(new CollidableComponent(true))\n\
  .with(new BallComponent())\n.build();\n}\n@Spawns(\"bat\")\npublic Entity newBat(SpawnData\
  \ data) {\nboolean isPlayer = data.get(\"isPlayer\");\nPhysicsComponent physics\
  \ = new PhysicsComponent();\nphysics.setBodyType(BodyType.KINEMATIC);\nreturn entityBuilder(data)\n\
  .type(isPlayer ? EntityType.PLAYER_BAT : EntityType.ENEMY_BAT)\n.viewWithBBox(new\
  \ Rectangle(20, 60, Color.LIGHTGRAY))\n.with(new CollidableComponent(true))\n.with(physics)\n\
  .with(isPlayer ? new BatComponent() : new EnemyBatComponent())\n.build();\n}\n}\n\
  代码清单 3-7\nPongFactory 类\n```\n\n我们可以看到工厂类中的两个方法是 `newBall()` 和 `newBat()`。我们将按顺序查看它们，从\
  \ `newBall()` 方法开始。在方法内部，我们找到了一个物理组件，因为我们的球是由物理世界驱动的。我们需要初始化物理属性，赋予球某些特性：\n\n* \
  \  将主体类型设置为动态（其他类型包括静态（无移动）和运动学（玩家控制移动）），这允许物理世界完全控制实体的移动。\n\n*   设置物理实体的密度和恢复系数（弹性程度）。\n\
  \n*   在物理初始化时，设置实体的线速度，使球开始移动。\n\n配置好物理组件后，我们将注意力转向实体构建器。构建器允许我们快速设置实体的许多属性。更具体地说，我们将类型设置为\
  \ `EntityType.BALL`，视图设置为半径为 5 的圆形，碰撞盒设置为半径为 5 的圆形形状。实体的所有组件都可以通过调用 `with()` 轻松设置。使用此方法，我们添加了物理、可碰撞和球体组件。至此，我们的球体实体构建完成，现在我们开始构建球拍实体。\n\
  \n回想一下，我们有两种不同类型的球拍实体：玩家和敌人。在构建球拍实体时，我们可以传递一个额外的参数来告诉工厂我们想要使用的是玩家球拍还是敌人球拍。因此，`newBat()`\
  \ 方法中的第一行代码将此参数提取为一个布尔值 `isPlayer`。与 `newBall()` 方法一样，我们也需要一个物理组件。然而，该组件的配置更简单——我们只需将主体类型设置为运动学，以便玩家或\
  \ AI 可以控制球拍，而不是由物理世界控制。剩下的就是使用实体构建器构建球拍实体。我们根据布尔值 `isPlayer` 设置实体类型。视图是一个简单的 JavaFX\
  \ 矩形，它也用于通过 `viewWithBBox()` 方法自动为实体生成碰撞盒。与球体实体一样，我们设置了可碰撞和物理组件。最后，使用布尔值 `isPlayer`，我们可以确定应该使用\
  \ `BatComponent` 还是 `EnemyBatComponent`。\n\n\n\n### 构建应用程序类\n\n最后，将 Pong 游戏所有部分整合在一起的类是\
  \ `PongApp`。这里我们将详细讨论这个类，但随着你阅读本书后续章节，我们通常会省略那些琐碎的细节，因为这些内容在前几章中已经介绍过了。\n\n和之前一样，我们首先处理所有导入语句，如代码清单\
  \ 3-8 所示。\n\n```\nimport com.almasb.fxgl.animation.Interpolators;\nimport com.almasb.fxgl.app.GameApplication;\n\
  import com.almasb.fxgl.app.GameSettings;\nimport com.almasb.fxgl.core.math.FXGLMath;\n\
  import com.almasb.fxgl.entity.Entity;\nimport com.almasb.fxgl.entity.SpawnData;\n\
  import com.almasb.fxgl.input.UserAction;\nimport com.almasb.fxgl.physics.CollisionHandler;\n\
  import com.almasb.fxgl.physics.HitBox;\nimport com.almasb.fxgl.ui.UI;\nimport javafx.scene.input.KeyCode;\n\
  import javafx.scene.paint.Color;\nimport javafx.util.Duration;\nimport java.util.Map;\n\
  import static com.almasb.fxgl.dsl.FXGL.*;\n代码清单 3-8\nPongApp 类导入语句\n```\n\n接下来，我们将创建继承自\
  \ `GameApplication` 的 `PongApp` 类。该代码片段如代码清单 3-9 所示。我们将提供基本设置，例如游戏的标题和版本。回想一下，游戏宽度和高度默认自动设置为\
  \ 800×600；不过，你可以根据需要设置自己的值。我们还会在 `main` 方法中添加游戏的入口点。\n\n```\npublic class PongApp\
  \ extends GameApplication {\n@Override\nprotected void initSettings(GameSettings\
  \ settings) {\nsettings.setTitle(\"Pong\");\nsettings.setVersion(\"1.0\");\n}\n\
  public static void main(String[] args) {\nlaunch(args);\n}\n}\n代码清单 3-9\nPongApp\
  \ 类继承自 GameApplication\n```\n\n我们需要在整个游戏过程中访问玩家球拍，以便控制它。因此，创建一个实例级变量来存储玩家球拍组件是合理的：\n\
  \n```\nprivate BatComponent playerBat;\n```\n\n一旦我们有了玩家球拍的引用，我们就希望能够上下移动它。换句话说，我们需要输入处理，这将在\
  \ `initInput()` 中处理，如代码清单 3-10 所示。你可以看到，我们没有使用前一章介绍的简单输入处理方式，而是通过 `getInput()` 方法采用了一种稍微复杂的方法。使用这个扩展\
  \ API 的好处是，我们可以使用 `onActionBegin()`、`onAction()` 和 `onActionEnd()` 回调函数，它们分别在按键首次按下（动作开始）、按住（动作中）和释放（动作结束）时触发。\n\
  \n```\n@Override\nprotected void initInput() {\ngetInput().addAction(new UserAction(\"\
  Up\") {\n@Override\nprotected void onAction() {\nplayerBat.up();\n}\n@Override\n\
  protected void onActionEnd() {\nplayerBat.stop();\n}\n}, KeyCode.W);\ngetInput().addAction(new\
  \ UserAction(\"Down\") {\n@Override\nprotected void onAction() {\nplayerBat.down();\n\
  }\n@Override\nprotected void onActionEnd() {\nplayerBat.stop();\n}\n}, KeyCode.S);\n\
  }\n代码清单 3-10\nPongApp 类输入处理\n```\n\n正如我们所见，我们的输入非常简单——我们只需要 W 和 S 键来让玩家球拍上下移动。`onAction()`\
  \ 回调在按键被按住时调用，而 `onActionEnd()` 在按键释放时调用。这些调用正是我们让球拍移动或停止所需要的。\n\n我们还需要跟踪玩家和敌人（或玩家\
  \ 2）的得分。我们可以通过创建 FXGL 变量来实现这一点。回想一下，它们几乎就像你在 Java 中创建的普通变量，但具有额外的功能，例如能够监听其变化并绑定到它们。本质上，FXGL\
  \ 变量就像 JavaFX 属性。在代码清单 3-11 中，我们创建了两个 FXGL 变量：`player1score` 和 `player2score`，两者都初始化为\
  \ 0。稍后，在 `initGame()` 中（同样在代码清单 3-11 中），我们监听这些变量的变化，并根据值宣布获胜者——需要得 11 分才能赢得游戏。\n\
  \n```\n@Override\nprotected void initGameVars(Map vars) {\nvars.put(\"player1score\"\
  , 0);\nvars.put(\"player2score\", 0);\n}\n@Override\nprotected void initGame() {\n\
  getWorldProperties().addListener(\"player1score\", (old, newScore) -> {\nif (newScore\
  \ == 11) {\nshowGameOver(\"Player 1\");\n}\n});\ngetWorldProperties().addListener(\"\
  player2score\", (old, newScore) -> {\nif (newScore == 11) {\nshowGameOver(\"Player\
  \ 2\");\n}\n});\ngetGameWorld().addEntityFactory(new PongFactory());\ngetGameScene().setBackgroundColor(Color.rgb(0,\
  \ 0, 5));\ninitScreenBounds();\ninitGameObjects();\n}\n代码清单 3-11\n初始化游戏和变量\n```\n\
  \n此外，我们还添加了之前实现的 `PongFactory`，并将游戏背景颜色设置为 RGB 0, 0, 5，这非常接近黑色。`initGame()` 中有三个方法我们还没有介绍：`showGameOver()`、`initScreenBounds()`\
  \ 和 `initGameObjects()`。你应该能够通过它们的名称猜到这些方法的作用。我们将按照代码清单 3-12 中的顺序逐一介绍它们。\n\n```\n\
  private void showGameOver(String winner) {\ngetDialogService().showMessageBox(winner\
  \ + \" won! Demo over\\nThanks for playing\", getGameController()::exit);\n}\nprivate\
  \ void initScreenBounds() {\nEntity walls =\nentityBuilder()\n.type(EntityType.WALL)\n\
  .collidable()\n.buildScreenBounds(150);\ngetGameWorld().addEntity(walls);\n}\nprivate\
  \ void initGameObjects() {\nEntity ball = spawn(\"ball\", getAppWidth() / 2 - 5,\
  \ getAppHeight() / 2 - 5);\nEntity bat1 = spawn(\"bat\", new SpawnData(getAppWidth()\
  \ / 4, getAppHeight() / 2 - 30).put(\"isPlayer\", true));\nEntity bat2 = spawn(\"\
  bat\", new SpawnData(3 * getAppWidth() / 4 - 20, getAppHeight() / 2 - 30).put(\"\
  isPlayer\", false));\nplayerBat = bat1.getComponent(BatComponent.class);\n}\n代码清单\
  \ 3-12\n游戏玩法方法\n```\n\n`showGameOver()` 方法的实现很简单。我们显示一个消息框，显示谁赢得了游戏，一旦消息框被关闭，我们就退出游戏。接下来，在\
  \ `initScreenBounds()` 中，我们希望围绕屏幕创建墙壁，以便球可以撞击这些墙壁并弹回游戏的可玩区域。\n\n代码清单 3-12 中的最后一个方法是\
  \ `initGameObjects()`，我们在这里简单地创建了游戏中可以看到的所有实体：球和两个球拍。我们还要记得在创建球拍时传递 `isPlayer` 布尔变量。这是因为我们的工厂需要知道哪个是玩家球拍，哪个是敌人球拍。该方法的最后一行获取了\
  \ `BatComponent` 的引用，以初始化我们之前定义的 `playerBat` 变量。\n\n\n\n现在剩下的工作就是设置游戏的物理部分。由于我们所有的实体都附加了\
  \ `PhysicsComponent`，它们由物理世界管理（更多内容将在下一章介绍）。这意味着我们对物理世界所做的任何设置也会影响这些实体。例如，默认情况下，物理世界会施加一个典型的重力向量，该向量在\
  \ X 轴上的速度为 0，在 Y 轴上的速度约为 10。在乒乓球游戏中我们不需要这个；否则，球会严重偏向屏幕底部。让我们考虑清单 3-13 中 `initPhysics()`\
  \ 的实现。\n\n```\n@Override\nprotected void initPhysics() {\ngetPhysicsWorld().setGravity(0,\
  \ 0);\ngetPhysicsWorld().addCollisionHandler(new CollisionHandler(EntityType.BALL,\
  \ EntityType.WALL) {\n@Override\nprotected void onHitBoxTrigger(Entity a, Entity\
  \ b, HitBox boxA, HitBox boxB) {\nif (boxB.getName().equals(\"LEFT\")) {\ninc(\"\
  player2score\", +1);\n} else if (boxB.getName().equals(\"RIGHT\")) {\ninc(\"player1score\"\
  , +1);\n}\n}\n});\n}\n清单 3-13\n初始化物理\n```\n\n在该方法中，我们做的第一件事就是有效禁用任何方向上的重力。然后我们设置碰撞处理器——这些是当两种实体类型之间发生碰撞时被调用的回调方法。例如，在上述情况中，我们希望知道球与墙壁之间何时发生碰撞。基于此，我们可以相应地增加玩家\
  \ 1 或玩家 2 的分数。要添加碰撞处理器，我们首先通过传递两种实体类型（这里是 `EntityType.BALL` 和 `EntityType.WALL`）来构造它，然后重写\
  \ `onHitBoxTrigger()` 方法，以便检查球击中了墙壁的哪一侧。至于增加分数变量，这很简单——我们调用 `inc()` 方法并提供要增加变量的数值。\n\
  \n### 游戏结构回顾\n\n至此，乒乓球克隆游戏的实现就完成了。你现在应该能够运行应用程序，并看到我们在本节中实现的游戏的完整功能。现在我们将简要回顾一下所构建应用程序的高级架构，以作总结：\n\
  \n*   有三个组件：`PlayerBatComponent`、`EnemyBatComponent` 和 `BallComponent`。每个组件都附加到不同的实体上，分别将它们（及其行为）转变为玩家球拍、敌方球拍和球。\n\
  \n*   （始终）有一个名为 `PongFactory` 的实体工厂类。它的唯一职责是创建和配置游戏中的实体。\n\n*   （始终）有一个名为 `PongApp`\
  \ 的应用程序类。它负责将所有其他类整合在一起，并提供程序入口点（`main()` 方法）。\n\n`PongApp` 类还按以下顺序初始化游戏：\n\n* \
  \  `initSettings()` 用于设置游戏设置，例如游戏尺寸、游戏版本和标题\n*   `initInput()` 用于设置输入绑定，以便用户能够控制玩家实体\n\
  *   `initGameVars()` 用于设置游戏变量，这些变量在整个引擎和游戏代码中都可访问\n*   `initGame()` 用于设置 `PongFactory`、游戏实体和游戏逻辑\n\
  *   `initPhysics()` 用于设置碰撞处理器和物理属性\n\n## 总结\n\n在本章中，我们介绍了实体-组件模型背后的理论，并探讨了该模型如何提供对游戏状态的强大抽象。特别是，实体允许我们表示游戏对象，而组件则为实体提供数据和行为。此外，我们还探讨了从游戏世界（游戏中实体的容器）查询实体的各种方法。最后，我们通过实现一个简单但富有洞察力的乒乓球游戏克隆，将这些理论付诸实践。在下一章中，我们将重点讨论游戏物理，更详细地考虑实体之间基于碰撞的交互。\n\
  \n"
- '# 4. 物理案例研究：平台游戏


  在本章中，我们将考虑游戏物理在游戏开发中的重要性。我们还将了解物理在 FXGL 游戏引擎中是如何实现的，以及如何在 FXGL 游戏中使用它。更具体地说，游戏物理通常有两个目的：碰撞检测和模拟，这两者都将在
  FXGL 的背景下进行介绍。完成本章后，你将学习以下内容：


  *   常用的碰撞检测技术及其实现方法

  *   如何添加碰撞处理代码

  *   物理世界及其属性

  *   如何实现物理模拟

  *   如何构建一个简单的平台游戏


  在许多现代游戏中，玩家与游戏世界之间的很多交互都是通过物理实现的。例如，玩家角色接近游戏内对象时，会弹出一个提示，因为物理子系统会检测到这两个实体之间的接近。另一个例子是将一个重物放在压力板上，这样物品的物理属性（在这种情况下是质量）会触发压力板。在本章中，我们将看到如何实现类似的例子，从碰撞检测开始。为简单起见，我们只关注
  2D 情况。




  ## 碰撞检测


  碰撞检测用于判断两个实体是否发生碰撞（重叠）。如前所述，这是实现游戏对象之间交互的有用工具。例如，玩家实体与金币实体碰撞，玩家因此能够拾取金币。图 4-1 展示了这一场景，其中玩家是一个蓝色方块，金币是一个黄色圆圈。


  ![](img/522865_1_En_4_Fig1_HTML.jpg)


  一张平台游戏截图展示了如下实体：底部有一个长平台，上面右侧有一个彩色圆圈；从下到上不同高度的三个小平台上分别包含：一个彩色圆圈；一个彩色方块和两个彩色圆圈；一个彩色箭头和一个彩色圆圈。


  图 4-1


  一个展示可能实体交互的平台游戏示例


  碰撞检测技术分为两大类：宽阶段和窄阶段。宽阶段技术或算法的目标是避免对距离较远（因此不可能碰撞）的实体执行昂贵的计算。这些技术通常速度快但精度较低；也就是说，它们仅适用于快速过滤掉不可能碰撞的实体对。宽阶段技术通常无法判断两个实体是否正在碰撞；因此，一旦我们得到可能碰撞的实体对，就会采用窄阶段技术。与宽阶段相比，窄阶段技术速度较慢但极其精确，能够识别两个实体之间是否发生了碰撞。


  在宽阶段，FXGL 使用基于网格的空间索引算法来提高碰撞检测的性能。大多数宽阶段技术，如四叉树和 k-d 树，都利用某种形式的空间索引，根据实体之间的距离将不可能碰撞的实体分组。然而，为简洁起见，本书不讨论宽阶段算法，而是专注于窄阶段技术。


  有多种碰撞检测技术可用于计算两个实体在二维空间中是否重叠，包括：


  *   轴对齐包围盒（每个实体用一个包围它的矩形包裹，然后检查矩形是否重叠）

  *   分离轴定理（使用几个预定义的轴，绘制分离线；如果存在至少一条这样的线，则没有重叠）

  *   圆-圆相交（用圆包围每个实体，并检查圆是否重叠）

  *   多边形（用多边形，通常是凸多边形，包围每个实体，并检查这些形状是否重叠）

  *   基于图像像素（如果实体使用图像作为视图，则识别图像的交集区域，如果交集中至少有一个像素，则实体之间发生碰撞）

  *   基于网格（如果游戏基于网格，则检查实体是否占据相同或相邻的单元格）


  上述列表应该能让你了解一般方法：用某种已知形状包围实体，以便相对容易地检测碰撞。在本书中，我们只考虑前两种在游戏开发中常用的方法：轴对齐包围盒和分离轴定理。我们不会深入太多细节，因为
  FXGL 已经实现了这些方法，并提供了简便的访问方式。


  轴对齐包围盒（AABB）算法因其性能和易于实现而在任何碰撞检测技术中都至关重要。该算法可描述如下：用包围盒包裹每个实体，包围盒是能完全包围实体的最小矩形。接下来，检查两个矩形（包裹两个待检测实体的盒子）是否重叠。如果重叠，则记录碰撞；如果不重叠，则没有碰撞。


  实现 AABB 算法的一种直接方式如下：


  ```

  return box2.maxX >= box1.minX &&

  box2.maxY >= box1.minY &&

  box2.minX <= box1.maxX &&

  box2.minY <= box1.maxY

  ```


  如果所有这些检查都成功，则 `box1` 和 `box2` 之间存在碰撞；因此，这些盒子所代表的实体之间也存在碰撞。


  然而，AABB 方法存在局限性。主要局限性在于，正如该技术名称所示，包围盒必须与轴对齐。这意味着如果至少有一个实体发生了旋转（即旋转角度不为零），则该方法不适用。在这种情况下，我们可以使用另一种称为分离轴定理（简称
  SAT）的技术。SAT 指出，如果存在一个轴，两个物体沿该轴有分离，则这两个物体没有重叠。与前面给出的包围盒方法不同，即使实体发生旋转（角度不为零度），该方法也能检查碰撞。例如，在图
  4-2 中，右侧两个旋转实体之间的碰撞将被 SAT 正确报告。


  ![](img/522865_1_En_4_Fig2_HTML.jpg)


  一张示意图展示了三个实体：左侧是一个彩色方块；右侧是一个矩形和一个方块，颜色不同，且因旋转而发生碰撞。


  图 4-2


  实体的零度与非零度旋转角


  在 FXGL 中，这两种方法都像大多数内置算法一样，通过用户友好的 API 封装。假设我们有两个实体 `e1` 和 `e2`。要检查它们是否碰撞，在代码中可以调用方法
  `e1.isColliding(e2)`，该方法返回一个直观的布尔值。


  现在我们已经讨论了碰撞检测背后的基本理论，是时候将注意力转向如何处理这些碰撞了。




  ## 碰撞处理


  在本节中，我们将探讨 FXGL 中用于处理碰撞的 API，即调用游戏逻辑代码来执行碰撞导致的游戏内操作。之前我们已经使用过玩家-金币碰撞的示例，因此我们将在此基础上继续深入。如前所述，当玩家与金币碰撞时，通常会执行三个操作：移除金币、增加玩家分数、播放音效以提示用户事件发生。在上一章中，我们已经使用了一些简单的碰撞处理
  DSL API，但这里我们将探索完整的 API，因为它提供了更多选项。为了实现这一游戏逻辑，我们创建一个继承自 `CollisionHandler` 的类。在构造函数中，我们指定该处理器所针对的两种实体类型。接下来，我们考虑需要重写的方法。


  ```

  public class PlayerCoinHandler extends CollisionHandler {

  public PlayerCoinHandler() {

  super(EntityType.PLAYER, EntityType.COIN);

  }

  @Override

  protected void onHitBoxTrigger(Entity p, Entity c, HitBox boxA, HitBox boxB) { }

  @Override

  protected void onCollisionBegin(Entity p, Entity c) {

  c.removeFromWorld();

  FXGL.inc("score", +2);

  FXGL.play("pickup_coin.wav");

  }

  @Override

  protected void onCollision(Entity p, Entity c) { }

  @Override

  protected void onCollisionEnd(Entity p, Entity c) { }

  }

  清单 4-1

  碰撞处理器示例

  ```


  从清单 4-1 中可以看出，共有四个这样的方法（如果你对所有可能的物理相关方法感兴趣，可以访问 [`https://github.com/AlmasB/FXGL/tree/dev/fxgl-entity/src/main/java/com/almasb/fxgl`](https://github.com/AlmasB/FXGL/tree/dev/fxgl-entity/src/main/java/com/almasb/fxgl)
  查看）：


  *   onHitBoxTrigger() – 这是碰撞发生时第一个被调用的方法。它允许我们检查哪些碰撞框发生了碰撞。这在格斗游戏中非常有用：根据角色被击中的部位，我们可以决定扣除多少生命值。


  *   onCollisionBegin() – 该方法在碰撞发生的同一帧被调用，且仅调用一次。通常，这是用于收集类物品（如金币）的回调函数。在示例代码中，我们实现了之前描述的游戏逻辑：移除金币、增加分数、播放音效。


  *   onCollision() – 该方法在碰撞持续期间每帧都会被调用。可用于对与尖刺碰撞的玩家持续造成伤害。或者，该回调也可用于奖励处于得分区域的玩家分数。


  *   onCollisionEnd() – 该方法在碰撞停止发生的同一帧被调用。可用于隐藏用户交互提示，因为玩家已离开可交互区域。


  要使碰撞处理器生效，两个实体必须满足以下要求；它们必须同时具备：


  *   已附加 `CollidableComponent` 组件

  *   拥有碰撞框

  *   拥有类型

  *   通过调用 `addCollisionHandler()` 将碰撞处理器附加到物理世界


  如果满足这些要求，碰撞处理器将正确处理两个实体之间发生的碰撞（调用重写的方法）。最后，当不再需要时，你可以通过调用 `removeCollisionHandler()`
  将其移除。


  ## 物理世界


  到目前为止，我们讨论的都是由开发者控制的实体。还有一种方式可以让物理世界参与游戏逻辑，那就是让物理世界控制实体。在这种情况下，我们实际上是在运行一个模拟，例如刚体动力学。为了运行模拟，实体需要附加一个
  `PhysicsComponent` 组件。通过该组件可以设置几种常用的配置选项：


  *   setFixtureDef() – 夹具定义提供了实体的物理属性，如摩擦力、恢复系数（弹性）、密度和形状。常见的形状有矩形、圆形、链形和多边形。


  *   setOnPhysicsInitialized() – 允许开发者提供一个回调函数，该函数在实体的物理初始化完成后被调用。


  *   setLinearVelocity() – 允许开发者手动设置支持物理的实体的速度。该速度随后将由物理世界应用。


  *   setBodyType() – 可选类型为静态、运动学或动态。静态实体质量为零且速度为零。这些通常是不会移动的物体，例如平台和墙壁。运动学实体质量为零，但速度可由开发者设置为非零值。运动学实体由物理世界移动，通常代表玩家控制的对象，例如《Pong》或《Breakout》中的球拍。动态实体具有正质量，且速度由施加在实体上的力计算得出。与运动学实体类似，动态实体也由物理世界移动。它们通常代表不需要玩家控制的对象，例如子弹或《Pong》与《Breakout》中的球。


  在刚体动力学中，实体获得一个刚体（固体）。当两个这种形式的实体碰撞时，物理引擎会尝试将它们分离，使实体不占据同一空间。一旦实体被视为物理世界的一部分，你可能希望配置一些常用的世界选项。这些选项可通过物理世界对象访问：


  *   setGravity() – 设置应用于世界中动态实体的重力。


  *   raycast() – 你可以从世界中的任意位置“发射”一条线到特定点。该方法将返回该线击中的第一个实体。如果你想知道某个实体是否在另一个实体的视线范围内，这将非常有用。


  *   toMeters() / toPixels() – 允许在像素和米之间进行便捷转换。请注意，游戏基于像素单位运行，而物理世界使用米作为单位。


  *   toPoint() / toVector() – 与之前类似，此方法将点/向量从一个上下文（游戏或物理世界）转换到另一个上下文（物理世界或游戏）。




  ## 平台游戏


  在本节中，我们将把本章学到的所有物理知识付诸实践，构建一个如图 4-3 所示的演示程序。为此，我们将开发一个简单的平台游戏。与上一章开发的乒乓球游戏不同，这个平台游戏将使用外部资源——素材，其中也包括一个在
  Tiled Editor 中预构建的关卡。为了简化开发，我们将使用公开可用的免费图片和精灵表。请确保你已下载并将素材放置在相应的目录中（以下链接提供了素材目录结构的详细信息）。完成这些步骤后，你就能跟随本节给出的实现进行操作。所使用的素材，以及这些素材的原始来源和作者的链接，均可在
  FXGLGames GitHub 仓库中找到：[`https://github.com/AlmasB/FXGLGames/tree/master/Mario`](https://github.com/AlmasB/FXGLGames/tree/master/Mario)。


  ![](img/522865_1_En_4_Fig3_HTML.jpg)


  一张图片展示了一个平台游戏演示，背景中有云朵和树木。深色背景上的字母 D 位于中央，玩家图像在平台上。


  图 4-3


  使用 FXGL 开发的平台游戏演示


  按照惯例，第一步是确定游戏中将包含哪些实体类型。在我们开发的平台游戏中，这些类型如下：


  ```

  public enum EntityType {

  PLAYER, COIN, PLATFORM, EXIT_TRIGGER, KEY_PROMPT, EXIT_SIGN, BUTTON, DOOR_TOP, DOOR_BOT

  }

  ```


  其中一些类型不言自明，而其他类型则会在我们逐步开发的过程中变得更加清晰。


  接下来，我们将按以下顺序逐一分析游戏中的每个类：


  *   PlayerComponent


  *   PlayerButtonHandler


  *   PlatformerFactory


  *   MainLoadingScene


  *   LevelEndScene


  *   PlatformerApp


  每个类都管理游戏的一个方面。


  ### 游戏逻辑


  我们首先来检查 `PlayerComponent` 类。回顾上一章的内容，组件允许我们向实体添加数据和行为。此外，我们还可以通过添加方法来通过组件控制实体。和之前一样，我们将按顺序逐一分析清单
  4-2 中的类及其方法，并提供与其用途相关的必要细节。


  ```

  import com.almasb.fxgl.entity.component.Component;

  import com.almasb.fxgl.physics.PhysicsComponent;

  import com.almasb.fxgl.texture.AnimatedTexture;

  import com.almasb.fxgl.texture.AnimationChannel;

  import javafx.geometry.Point2D;

  import javafx.scene.image.Image;

  import javafx.util.Duration;

  import static com.almasb.fxgl.dsl.FXGL.image;

  public class PlayerComponent extends Component {

  private PhysicsComponent physics;

  private AnimatedTexture texture;

  private AnimationChannel animIdle;

  private AnimationChannel animWalk;

  private int jumps = 2;

  public PlayerComponent() {

  Image image = image("player.png");

  animIdle = new AnimationChannel(image, 4, 32, 42, Duration.seconds(1), 1, 1);

  animWalk = new AnimationChannel(image, 4, 32, 42, Duration.seconds(0.66), 0, 3);

  texture = new AnimatedTexture(animIdle);

  texture.loop();

  }

  @Override

  public void onAdded() {

  entity.getTransformComponent().setScaleOrigin(new Point2D(16, 21));

  entity.getViewComponent().addChild(texture);

  physics.onGroundProperty().addListener((obs, old, isOnGround) -> {

  if (isOnGround) {

  jumps = 2;

  }

  });

  }

  @Override

  public void onUpdate(double tpf) {

  if (physics.isMovingX()) {

  if (texture.getAnimationChannel() != animWalk) {

  texture.loopAnimationChannel(animWalk);

  }

  } else {

  if (texture.getAnimationChannel() != animIdle) {

  texture.loopAnimationChannel(animIdle);

  }

  }

  }

  public void left() {

  getEntity().setScaleX(-1);

  physics.setVelocityX(-170);

  }

  public void right() {

  getEntity().setScaleX(1);

  physics.setVelocityX(170);

  }

  public void stop() {

  physics.setVelocityX(0);

  }

  public void jump() {

  if (jumps == 0)

  return;

  physics.setVelocityY(-300);

  jumps--;

  }

  }

  清单 4-2

  PlayerComponent 类

  ```


  这个类包含五个字段、一个构造函数和六个方法。这些字段分别是：物理组件（稍后我们将像往常一样在工厂类中将其添加到实体中）、动画纹理（允许我们使用精灵表）、两个动画通道（一个用于待机动画，一个用于行走动画），以及最后我们允许玩家跳跃的次数。构造函数负责设置动画。请注意，`image()`（完整调用是
  `FXGL.image()`）可用于从 `/assets/textures` 加载任何图像作为 JavaFX 的 `Image`。我们的图像名为 player.png，因此这就是我们传递给
  `image()` 方法的参数。使用加载的图像，我们构建了两个动画通道，并循环播放待机动画。


  在 `onAdded()` 回调中（当此组件 `PlayerComponent` 被添加到实体时调用），我们需要做三件事：设置缩放原点（以便我们能够根据移动方向正确地将玩家向左或向右翻转）、添加动画纹理，以及注册一个监听器，该监听器会在玩家落地时通知我们，以便重置跳跃次数。请注意，我们将玩家实体的缩放原点设置为点
  (16, 21)，这是玩家动画单帧（32×42）的中心点。


  在下一个回调 `onUpdate()` 中，我们确定要循环播放两个动画（行走或待机）中的哪一个。物理组件可以告诉我们实体是否正在沿特定轴移动。在我们的用例中，沿
  X 轴移动意味着玩家并非处于待机状态。因此，如果 `isMovingX()` 返回 true，我们想要循环播放行走动画，否则播放待机动画。




  不出所料，`left()` 和 `right()` 方法有着相似的实现。将实体在 X 轴上缩放为负值意味着实体将面向另一个（左）方向。使用正值进行相同操作则会将实体缩放为面向右侧。可以基于游戏手感来设置
  X 轴上的速度。将 X 速度设置为 0 将完全停止实体，因此该方法得名 `stop()`。最后一个方法 `jump()` 会检查我们是否可以跳跃：如果跳跃次数为
  0，则不能。实际的跳跃实现只是将 Y 速度设置为负值。请注意，在 FXGL（以及 JavaFX）中，Y 轴正方向是向下的。现在我们有了一个功能性的玩家组件。


  接下来，我们将在代码清单 4-3 中定义我们的第一个碰撞处理类。请注意，我们之前已经简要地使用过匿名碰撞处理器，现在我们将把处理代码正确地隔离到一个单独的类中。这里的碰撞将在玩家和可交互按钮之间处理。当玩家与按钮碰撞时，会触发一个提示变为可见，以指示该按钮可以被按下。当碰撞结束时，按键提示将再次变为不可见。我们可以通过将实体的不透明度分别设置为
  1 和 0 来打开和关闭可见性。请注意，也可以调用 `setVisible(true / false)`，这将达到相同的视觉效果。


  ```

  import com.almasb.fxgl.entity.Entity;

  import com.almasb.fxgl.physics.CollisionHandler;

  import com.almasb.fxglgames.platformer.EntityType;

  import static com.almasb.fxgl.dsl.FXGL.getGameWorld;

  public class PlayerButtonHandler extends CollisionHandler {

  public PlayerButtonHandler() {

  super(EntityType.PLAYER, EntityType.BUTTON);

  }

  @Override

  protected void onCollisionBegin(Entity player, Entity btn) {

  Entity keyEntity = btn.getObject("keyEntity");

  if (!keyEntity.isActive()) {

  keyEntity.setProperty("activated", false);

  getGameWorld().addEntity(keyEntity);

  }

  keyEntity.setOpacity(1);

  }

  @Override

  protected void onCollisionEnd(Entity player, Entity btn) {

  Entity keyEntity = btn.getObject("keyEntity");

  if (!keyEntity.getBoolean("activated")) {

  keyEntity.setOpacity(0);

  }

  }

  }

