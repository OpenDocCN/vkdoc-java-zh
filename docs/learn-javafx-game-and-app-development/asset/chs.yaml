  ## 3D 太阳系


  在本节中，我们将首次使用 FXGL 的 3D 功能。虽然本节并非旨在全面概述 3D 能实现的所有功能，但它演示了在 FXGL 中此类应用的基本原理。当你学习完本节内容后，你会注意到，除了渲染之外，2D
  和 3D 之间几乎没有区别。


  ### 天体数据与逻辑


  你可能已经见过太阳系的不同表现形式。图 7-4 就是其中一种，它是我们将要开发的应用的截图。回想一下，在构建游戏时，我们通常会从定义实体类型开始。在这个应用中，由于我们没有不同的实体类型（图
  7-4 中显示的所有实体都只是天体），因此我们转而从定义天体的属性开始。由于这些天体的对象是预定义的，也就是说我们不会在运行时引入任何新天体，因此使用名为 `CelestialBody`
  的 `enum` 来定义它们是合理的。完整的定义见代码清单 7-3。简单来说，每个天体都有以公里为单位的直径、以公里/秒为单位的自转速度、以 10⁶ 公里为单位的与太阳的距离、以天为单位的公转周期，以及最后用于该天体的纹理图像。这些天体使用的图像资源来自
  [`www.solarsystemscope.com/textures/`](http://www.solarsystemscope.com/textures/)，遵循
  CC-BY 4.0 许可，不过你也可以使用任何合适的图像。最后，天体的数值数据来自 [`https://nssdc.gsfc.nasa.gov/planetary/factsheet/`](https://nssdc.gsfc.nasa.gov/planetary/factsheet/)。


