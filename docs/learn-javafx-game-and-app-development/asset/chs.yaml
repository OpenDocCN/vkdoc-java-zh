  在第 6 章中，我们讨论了即时模式和保留模式渲染，以及即时模式如何提高性能。如果我们将即时模式与 GPU 并行计算相结合，则有可能获得进一步的性能提升。实际上，其理念是逻辑和渲染的配置方式使得每个计算都可以并行运行。如果该前提成立，并且计算单元足够简单以转换为
  GPU 指令，那么在 GPU 上运行此类算法很可能会显著提升性能。例如，图 8-3 显示了使用 FXGL 渲染的包含 1000 万个粒子的粒子群。鼓励读者浏览前面提到的仓库链接，了解不同的渲染方法如何提高或降低性能。


