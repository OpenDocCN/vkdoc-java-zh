  如图 4-4 所示，我们创建了一个 JavaFX 文本对象，内容为“Loading level”，显示玩家图像，并添加了三个点。这在代码清单 4-5 中通过一个构造函数调用实现，该调用设置了场景中使用的动画。这些点使用
  FXGL 内置的淡入动画进行动画处理（更多关于动画的内容请参见第 6 章）。最后，我们将文本居中放置，并添加了一个玩家图像。该图像被设置为从 0 度到 360
  度旋转并无限循环。


