  ```


  让我们详细分析清单 5-1 中的代码。首先，我们可以看到 `AStarGrid` 是以适当的尺寸构建的。请注意，提供的值是单元格数量，而非像素，这就是为什么我们将
  1280 和 720 除以 40（本例中单个单元格的大小）。接下来，使用 `EntityBuilder`，我们构建了代理实体。你已从前面的章节熟悉了构建实体的过程，因此我们可以跳过细节。在本例中，该实体是一个带有
  `CellMoveComponent` 和 `AStarMoveComponent` 的蓝色方块。请注意，后一个组件需要能够访问我们构建的网格，以便在关卡中智能移动。如你所见，实际的网格遍历实现细节对开发者是隐藏的，从而使
  API 易于使用。


  现在，我们将构建实体，使我们（用户）能够看到游戏世界并识别哪些单元格是可通行的，哪些是不可通行的。每个实体将有一个方形视图，默认颜色为白色。我们将为每个实体的
  `ViewComponent` 添加一个点击处理程序，这样当我们点击它时，可以执行两个操作：(1) 如果左键点击，我们使用其 `AStarMoveComponent`
  将代理移动到该单元格；(2) 如果右键点击，我们将该单元格设置为不可通行，并将其颜色更改为红色。左键和右键点击事件是标准的 JavaFX 事件，因此你可以为任何游戏示例使用类似的设置进行快速原型开发。




  我们的小示例现已完成。你应该能够运行它，并看到一个带有蓝色方形智能体的二维网格。左键单击任意单元格，智能体将使用内置的 A* 寻路算法移动到该单元格。你可以尝试操作，看看右键单击如何创建障碍物，以及智能体如何避开它们。图
  5-2 给出了一个示例截图，其中拼出“FXGL”的红色障碍物阻挡了蓝色智能体的路径。


  ![](img/522865_1_En_5_Fig2_HTML.png)


  该截图描绘了一个网格，其中一些方块以深色填充，拼出了 F X G L 字样。G 上方的一个方块以不同颜色填充。


  图 5-2


  一个展示 FXGL 中 A* 寻路功能的示例应用程序


  ## 行为


  我们已经介绍了 AI 如何利用世界数据在二维世界中移动以到达目标。现在，我们将注意力转向 AI 到达目标后应该做什么。在本节中，我们将探讨为敌方实体添加 AI
  行为的多种方式。虽然所有这些方式都是添加 AI 的有效方法，但根据你的用例，某些方法更为合适。当你的实体行为主要承担单一任务时，最直接的方法是使用自定义组件。例如，假设你有一个敌方实体，其作用是保持静止，并在玩家靠近时向其他
  AI 实体发出信号。我们可以通过创建一个 `SignalComponent` 来实现此行为，如代码清单 5-2 所示。


  本质上，该组件的 `onUpdate()` 方法执行了此简单行为背后的所有逻辑。首先，我们需要获取玩家实体的引用，以便检查玩家与我们（信号实体）之间的距离。为此，你可以使用我们在第
  3 章中介绍的众多查询方法之一。回想一下，当从组件内部调用时，`getEntity()` 会返回该组件所附加的实体，即信号实体。通过一个简单的 if 语句，我们可以检查是否应该“因为玩家靠近而向其他
  AI 发出信号”。你也可以添加 else 分支，虽然这里不需要，但它应该能让你了解如何实现类似的用例。


  ```

  public class SignalComponent extends Component {

  @Override

  public void onUpdate(double tpf) {

  Entity player = ...

  if (getEntity().distance(player) < 100) {

  // 持续向其他 AI 发出信号：玩家靠近了

  }

  }

  }

  代码清单 5-2

  SignalComponent 类

  ```


  让我们考虑代码清单 5-3 中的另一个示例。此 AI 行为专注于跟随任何实体。给定对任何实体（例如玩家）的引用后，`onUpdate()` 方法将不断将 AI
  智能体移向该实体的方向。总的来说，你可能已经注意到，在 FXGL 中，update 方法是处理实体逻辑和 AI 代码的合适位置。


  ```

  public class FollowComponent extends Component {

  @Override

  public void onUpdate(double tpf) {

  Entity player = ...

  getEntity().translateTowards(player.getPosition(),10);

  }

  }

  代码清单 5-3

  FollowComponent 类

  ```


  从代码清单 5-2 和 5-3 可以看出，FXGL 中的行为实现相当直接。然而，在游戏中会出现各种用例，这种简单的实现方式并不那么适用。到目前为止，我们介绍的行为主要承担单一任务：发出信号或跟随。当
  AI 行为具有两个或更多不同的状态时，我们可以使用现有的 `StateComponent` 来帮助我们以更有效的方式定义 AI 功能。`StateComponent`
  本质上允许我们使用有限状态机（FSM），其中 AI 智能体一次只能处于预定义状态之一。要在 FXGL 中实现这一点，首先，将 `StateComponent`
  添加到你的实体中。接下来，实现你的状态，如代码清单 5-4 所示。


  ```

  private EntityState GUARD = new EntityState() {

  @Override

  protected void onUpdate(double tpf) {

  // 处于此状态时要运行的代码

  }

  };

  代码清单 5-4

  定义 EntityState

  ```


  最后，我们可以使用实体的 `StateComponent` 并设置创建的状态：`entity.getComponent(StateComponent.class).changeState(GUARD)`。从此刻起，实体将调用
  `GUARD` 状态中的 `onUpdate()`，使开发者能够隔离特定于该状态的行为，再次遵循单一职责原则。任何其他状态都可以用完全相同的方式创建。你可以看到，这种方法可以提升灵活性，因为状态不一定需要依赖其他状态的存在。但是，如果你愿意，就像下一个示例那样，你仍然可以在单个文件中声明所有状态，并从现有的不同状态切换到新状态。


  现在，我们将看一个使用 FSM 的小型 FXGL 应用程序。具体来说，让我们设想一个即时战略游戏中的资源采集 AI，例如《魔兽争霸 3》、《要塞：十字军东征》或该类型的许多其他游戏。这种
  AI 会自动移动到任何指定的资源处进行采集。一旦其“背包”满了，AI 就会移动到最近的“库存点”存放采集到的资源，从而清空其背包。接着，它会重新开始循环并继续采集资源。这种
  AI 组件在许多即时战略游戏中非常有用，其中“工人”类型的实体可以为玩家采集资源。最终，我们可以识别出三种状态：采集、移动和存放。前两种状态是持续性的，意味着实体将在其中花费一些时间。然而，存放是一个单一动作，不一定需要实现为一个状态。此
  AI 的实现可以在代码清单 5-5 中看到。我们现在对其进行详细检查。




  ```

  import com.almasb.fxgl.dsl.FXGL;

  import com.almasb.fxgl.entity.Entity;

  import com.almasb.fxgl.entity.component.Component;

  import com.almasb.fxgl.entity.component.Required;

  import com.almasb.fxgl.entity.state.EntityState;

  import com.almasb.fxgl.entity.state.StateComponent;

  import com.almasb.fxgl.time.LocalTimer;

  import javafx.geometry.Point2D;

  import javafx.util.Duration;

  public class GathererComponent extends Component {

  private StateComponent stateComponent;

  private Entity target;

  private Point2D targetPosition;

  private Entity prevTarget;

  private EntityState GATHERING = new EntityState() {

  private LocalTimer gatherTimer = FXGL.newLocalTimer();

  private ResourceComponent resourceComponent;

  @Override

  public void onEnteredFrom(EntityState entityState) {

  resourceComponent = target.getComponent(ResourceComponent.class);

  gatherTimer.capture();

  }

  @Override

  public void onUpdate(double tpf) {

  if (isBackpackFull()) {

  FXGL.getGameWorld()

  .getClosestEntity(entity, e -> e.isType(EntityType.STOCKPILE))

  .ifPresent(s -> sendTo(s));

  return;

  }

  if (resourceComponent.isEmpty()) {

  FXGL.getGameWorld()

  // 并匹配资源类型...

  .getClosestEntity(entity, e -> e.hasComponent(ResourceComponent.class) && !e.getComponent(ResourceComponent.class).isEmpty())

  .ifPresent(resource -> sendTo(resource));

  return;

  }

  if (gatherTimer.elapsed(Duration.seconds(2))) {

  resourceComponent.gather();

  entity.getProperties().increment(resourceComponent.getType().toString(), +1);

  gatherTimer.capture();

  }

  }

  };

  private EntityState MOVING = new EntityState() {

  @Override

  protected void onUpdate(double tpf) {

  // 到达目的地，停止移动

  if (entity.getPosition().distance(targetPosition) < 5) {

  if (target != null) {

  if (target.hasComponent(ResourceComponent.class)) {

  // 目标是资源

  stateComponent.changeState(GATHERING);

  } else if (target.isType(EntityType.STOCKPILE)) {

  // 目标是库存点

  depositResources(target);

  if (prevTarget != null) {

  sendTo(prevTarget);

  } else {

  // 无目标，保持空闲

  stateComponent.changeStateToIdle();

  }

  }

  } else {

  // 无目标，保持空闲

  stateComponent.changeStateToIdle();

  }

  return;

  }

  entity.translateTowards(targetPosition, 5);

  }

  };

  private boolean isBackpackFull() {

  return entity.getInt(ResourceType.WOOD.toString()) + entity.getInt(ResourceType.STONE.toString())
  == 10;

  }

  private void depositResources(Entity stockpile) {

  for (var resourceType : ResourceType.values()) {

  int qty = entity.getInt(resourceType.toString());

  stockpile.getProperties().increment(resourceType.toString(), qty);

  entity.setProperty(resourceType.toString(), 0);

  }

  }

  public void sendTo(Entity target) {

  this.prevTarget = this.target;

  this.target = target;

  sendTo(target.getPosition());

  }

  public void sendTo(Point2D point) {

  targetPosition = point;

  stateComponent.changeState(MOVING);

  }

  }

  清单 5-5

  `GathererComponent` 类的示例实现

  ```


  该组件包含四个变量字段和两个状态字段：


  *   `stateComponent` – 对 `StateComponent` 的引用，会自动注入。

  *   `target` – 实体的当前目标，若无目标则为 `null`。

  *   `targetPosition` – 当前目标的位置，若无目标则为实体正在移动的目标点。

  *   `prevTarget` – 实体的上一个目标。

  *   `GATHERING` 状态 – 在此状态下，实体收集资源。

  *   `MOVING` 状态 – 在此状态下，实体移动，前往资源点或库存点。


  在 `GATHERING` 状态下，重写的 `onUpdate()` 方法首先检查背包是否已满。我们需要执行此检查，因为如果没有空间存放资源，收集资源就没有意义。如果检查结果为
  `true`，表示背包已满，则将 AI 送回“基地”。接下来，我们需要检查资源是否确实可供采集，因为资源可能已被耗尽。如果资源不可用，则将 AI 发送到最近的匹配资源实体，以继续其采集工作。完成这些检查后，我们检查采集计时器是否已超时，因为我们不希望每帧都采集资源，而是在示例中每
  2 秒（约 120 帧）采集一次。


  在 `MOVING` 状态下，`onUpdate()` 方法负责更改 AI 实体在游戏世界中的位置。我们首先检查实体是否已到达目的地；如果已到达，则检查我们在此处的原因（采集资源或存放已采集的资源）；否则，让实体继续朝目标方向移动。


  清单 5-5 中的其他方法用于简化状态的实现，建议您自行阅读。因此，您可以看到，归根结底，我们的 AI 实际上只是一系列条件语句。然而，如果这些语句实现得当，并与适当的概念（如
  FSM）相结合，它们就能为玩家营造出强大的对抗幻觉。现在我们已经介绍了不同类型的 AI 及其简单实现，接下来将进入一个更具体的游戏示例。


  ## 迷宫动作游戏


  在本节中，我们将构建一个包含迷宫元素的简单动作游戏。本质上，这是一个稍作修改的《吃豆人》克隆版，非常适合作为本章的示例。游戏在一个充满硬币的迷宫式关卡中设有四个敌人。玩家必须穿越迷宫并收集硬币，同时避开敌人。我们不会制作一个完整的克隆版，而是为游戏添加一些原创元素，例如时间条和传送能力。所有资源（包括其使用许可）和代码均可通过以下链接下载：[`https://github.com/AlmasB/FXGLGames/tree/master/Pacman`](https://github.com/AlmasB/FXGLGames/tree/master/Pacman)。您可以在图
  5-3 中看到游戏截图。


