  .scale(textContinue)

  .from(new Point2D(1, 1))

  .to(new Point2D(1.25, 1.25))

  .buildAndPlay();

  var vbox = new VBox(15, textUserTime, gradeBox, textContinue);

  vbox.setAlignment(Pos.CENTER);

  vbox.setPadding(new Insets(25));

  var root = new StackPane(

