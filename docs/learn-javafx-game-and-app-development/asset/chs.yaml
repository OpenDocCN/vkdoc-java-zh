- '# 2. 必要概念


  在本章中，我们将涵盖 Java、JavaFX 和 FXGL 的基本概念。理解本书内容需要这些知识。更具体地说，我们将了解：


  *   Java 理论——类和方法

  *   如何使用 IntelliJ 和 Maven 添加外部依赖

  *   如何创建一个带有基本用户界面控件的简单 JavaFX 应用程序

  *   如何创建一个简单的 FXGL 应用程序


  熟悉这些主题的读者可以跳过本章或其中的部分内容。


  ## Java 基础


  本节将介绍（或为已熟悉这些概念的读者复习）Java 基础知识，包括类和方法。我们将考虑如何创建类、实例级（非静态）变量和类级（静态）变量。我们还将复习如何向类添加非静态和静态方法。最后，我们将简要讨论继承和
  `@Override` 注解。




  ### 类


  在 Java 及许多其他编程语言中，类是对象的模板。类用于建模或表示某些抽象概念（例如碰撞检测处理器）或现实世界中的事物（例如椅子）。定义一个类非常简单：


  ```

  class Chair { }

  ```


  上述代码通常存储在名为 `Chair.java` 的文件中，文件名需与类名保持一致。需要注意的是，根据 Java 语言的命名规范，类名以大写字母开头。如果类名包含多个单词，每个单词的首字母也需大写。因此，如果我们为另一种类型的椅子（例如“木椅”）定义一个类，其名称应为
  `WoodenChair`。


  创建类的实例被称为实例化该类：


  ```

  Chair diningChair = new Chair();

  ```


  在上述代码中，我们创建了一个名为 `diningChair` 的 `Chair` 类实例。该实例（`diningChair`）也被称为对象。对象就是任何类的实例。类可以包含变量，用于存储信息。当在类定义中添加变量时，该类的每个实例都会拥有这些变量的独立副本，并可对其进行操作。例如，我们可以添加一个
  `int` 类型的变量（注意，`int` 或整数表示整数值）：


  ```

  class Chair {

  int cost;

  }

  ```


  变量 `cost` 可用于存储与单个椅子价格相关的信息：


  ```

  diningChair.cost = 50;

  ```


  因此，椅子 `diningChair` 的价格为 50 个货币单位。我们可以从同一个类创建另一个对象，并为其赋予不同的价格值：


  ```

  Chair officeChair = new Chair();

  officeChair.cost = 75;

  ```


  请注意，尽管对象 `diningChair` 和 `officeChair` 都是 `Chair` 类型，但它们是两个不同的对象：椅子 `diningChair`
  价格为 50，而椅子 `officeChair` 价格为 75。如果我们更改 `diningChair` 中某些变量的值，`officeChair` 中变量的值不会随之改变。这是面向对象编程的核心概念之一：每个对象都拥有自己的属性。


  我们刚刚讨论了属于对象的变量。这种仅影响其所属实例的变量被称为实例级变量。在上述示例中，变量 `cost` 就是一个实例级变量。除了实例级变量，我们还可以定义类级变量，即静态变量。顾名思义，它们属于类，而非对象。请看以下示例：


  ```

  class Chair {

  static int quality;

  int cost;

  }

  ```


  我们刚刚创建了一个名为 `quality` 的 `int` 类型静态变量，它属于 `Chair` 类，而非 `Chair` 类型的某个具体对象。由于 `quality`
  是类级变量，我们通常通过类而非对象来访问它：


  ```

  Chair.quality = 3;

  ```


  我们会注意到，所有访问 `quality` 值的对象都将读取到相同的值 3，因为只有一个静态变量。在介绍了“类”概念的基础知识后，我们现在来讨论方法。


  ### 方法


  如前所述，变量允许我们按对象或按类存储信息。方法则允许我们定义可执行的操作，同样也是按对象或按类进行。我们将继续使用 `Chair` 类，并为其添加一个名为 `move`
  的简单方法，如代码清单 2-1 所示。


  ```

  class Chair {

  static int quality;

  int cost;

  void move(int x, int y) {

  // some code

  }

  }

  代码清单 2-1

  向类中添加方法的示例

  ```


  方法（在某些语言中称为函数或过程）是可重用的代码块。一个方法定义包含四个重要部分：


  *   **名称：** 我们的方法名称为“move”。通常，名称应是一个有意义的动作，因为方法定义了操作——即对象能做什么。按照惯例，方法名以小写字母开头，后续每个单词的首字母大写。


  *   **返回类型：** 在我们的示例中，返回类型是 `void`，这是一个特殊关键字，表示该方法不返回任何值。可以使用任何类型（例如 `int`）替代“void”，以表示该方法返回该类型的值。从方法中返回值是从方法中提取结果的一种常见方式。但在我们的示例中，没有预期需要返回的有意义结果，因此我们使用了“void”。


  *   **参数列表：** 参数列表显示了方法在被调用时期望接收的参数类型。在上述示例中，有两个 `int` 类型的预期参数：`x` 和 `y`。使用参数是开发者向方法传递信息的一种常见方式。


  *   **方法体：** 最后，方法体是位于该方法的花括号“{”和“}”之间的代码块。在我们的示例中，为了清晰说明，我们添加了“// some code”占位符来代替方法体。方法体本质上是在方法被调用时（即方法被调用时）将要执行的代码。


  与变量可以是静态的一样，方法也可以使用 `static` 关键字作为前缀，在这种情况下，它们属于类。假设我们希望有一个操作，能够确定通过调用 `new Chair()`
  生成的椅子对象的材质。假设在我们的抽象模型中，所有椅子都具有相同的材质（某种名为 `Material` 的类型），那么 `c1` 的材质和 `c2` 的材质之间就没有区别。如果是这种情况，我们可以简单地在
  `Chair` 类中添加一个名为 `getMaterial()` 的静态方法，如代码清单 2-2 所示。


  ```

  class Chair {

  static int quality;

  int cost;

  static Material getMaterial() {

  // some code

  }

  void move(int x, int y) {

  // some code

  }

  }

  代码清单 2-2

  静态方法的示例

  ```


  与静态变量的访问方式类似（即通过类访问），静态方法也以这种方式访问。因此，要调用新创建的方法，我们会编写 `Chair.getMaterial()`，而不是 `c1.getMaterial()`。如果在后续开发中，我们决定每把椅子可以拥有自己的材质，那么我们可以从方法中移除
  `static` 关键字。此时该方法变为非静态方法，我们需要像之前一样通过 `c1.getMaterial()` 或 `c2.getMaterial()` 来调用它。


  有时，定义具有相似但不同类型特征的类会很有用。例如，考虑餐椅和办公椅。这两者都属于椅子类型，并且它们确实有一些共同的功能，但它们的全部功能集并不相同。一个简单的例子是，办公椅有轮子，而餐椅没有。如果我们为这两种椅子分别创建单独的类，例如：


  ```

  class DiningChair

  class OfficeChair

  ```



  那么我们会很容易发现需要重复编写大量代码。显然，这并不是一个理想的解决方案。为了避免这种情况，Java 作为一种语言，提供了继承特性。简单来说，我们可以定义一个名为
  Chair 的“超类型”，在其中保留椅子应具备的所有通用功能，然后定义从 Chair “扩展”而来的“子类型”（或子类）`DiningChair` 和 `OfficeChair`，它们只包含与自身相关的代码。因此，通过这种方法，我们可以为代码重复这个小问题提供一个简洁干净的解决方案。要扩展一个类，可以编写如下代码：


  ```

  class DiningChair extends Chair {}

  class OfficeChair extends Chair {}

  ```


  在某些情况下，两个（或更多）子类型可能共享功能（比如方法），但每个子类型都以自己的方式执行该功能。针对这个概念，我们换一个与椅子无关的例子。许多教科书常用的是
  `Animal` 类及其 `speak()` 方法。


  ```

  class Animal {

  void speak() { }

  }

  ```


  假设 Animal 有两个子类型：Cat 和 Dog。两种类型都能说话，但方式不同。因此，虽然功能保持不变，但 Animal 的每个子类型执行该功能的方式却各不相同。


  要在 Java 中实现此功能，我们有 `@Override` 注解，可以将其添加到方法上，以表明它覆盖了超类型类中同名的方法。让我们看一下清单 2-3 中的具体示例。首先要注意的是
  `speak()` 方法上的 `@Override` 注解。它告诉开发者，`Cat` 类中的 `speak()` 覆盖了 `Animal` 类中的 `speak()`
  方法。因此，当用户调用 `speak()` 时，如果调用对象是 `Cat` 类型，则会调用 `Cat` 类中的 `speak()` 方法，而不是 `Animal`
  类中的那个。在构建 FXGL 游戏时，我们会在几个地方使用“覆盖”；因此，随着本书的深入，这个概念会变得越来越重要。当用到时，我们会提醒读者其用法。


  ```

  class Dog extends Animal {

  @Override

  void speak() {

  // 汪汪叫

  }

  }

  class Cat extends Animal {

  @Override

  void speak() {

  // 喵喵叫

  }

  }

  清单 2-3

  使用 @Override 注解的示例

  ```


  回顾了 Java 基础知识后，我们现在将考虑如何向 Java 项目添加库。库是可重用的预构建代码集合，是解决已知问题的常见方式。它们是任何开发者工具库中的重要工具。


  ## 添加外部库


  在本节中，我们将了解如何使用 IntelliJ IDE 和内置的 Maven 支持向 Java 项目添加外部库。我们还将下载任何必要的软件。如果你的系统上尚未安装
  JDK 17，可以从 [`https://jdk.java.net/17/`](https://jdk.java.net/17/) 下载适用于所有主流操作系统平台（Windows、macOS
  和 Linux）的通用 JDK 17 版本。你只需下载相应的“.zip”文件并将其解压到所选位置即可。


  在 Java 中，有几种方法可以向项目添加外部库。你可以使用 Maven、Gradle 或独立的“.jar”文件。我们将考虑一种使用 Maven 的常见方法，Maven
  是一种依赖管理（或构建）工具。构建工具负责下载软件项目所需的依赖项（例如 JavaFX 和 FXGL），这样开发者就不必浪费时间手动安装这些外部库。现代开发工具，如
  IntelliJ 编辑器（可从 [`www.jetbrains.com/idea/`](http://www.jetbrains.com/idea/) 获取），已经内置了
  Maven 支持。为了简化任务，我们将使用此支持并创建一个简单的 Maven 项目。


