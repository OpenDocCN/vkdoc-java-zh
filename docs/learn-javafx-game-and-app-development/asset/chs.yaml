  为了在 FXGL 中使用此 UI，我们需要一个控制器类，例如清单 5-12 中提供的类。该类的唯一职责是将我们定义的标签文本绑定到其游戏内属性，并附加一个额外的
  UI 元素——时间进度条。回想一下，玩家需要在指定时间内完成游戏演示，因此我们的进度条将让玩家随时了解演示结束前还剩多少时间。


