- fmt: '# 10. Collector and Concurrency


    So far, we have used the `collect()` method without further explanation. This
    overloaded method either takes a `Collector`, as we did before (e.g., `.collect(Collectors.toList())`
    or `.collect(Collectors.groupingByConcurrent(Person::getAge))`); or you may pass
    three arguments for supplier, accumulator, and combiner. Don’t get puzzled yet;
    I’m going to explain these soon.


    As its name suggests, the main purpose of `collect` is to collect data. This is
    done by modifying a mutable data structure. In contrast to this, the `reduce()`
    method applies to immutable data structures.


    Now it’s time to write our own collector. For the sake of simplicity, we create
    a collector to sum up a stream of numbers. These numbers are generated by a simple
    number generator (Listing [10-1](#A435427_1_En_10_Chapter.html#Par4)).


    ```

    1   public static List createNumbers() {

    2     List numbers = new ArrayList();

    3     Random random = new Random();

    4     int max = 1000000 + random.nextInt(1000000);

    5     for (int i = 0; i < max; i++) {

    6       numbers.add((long)random.nextInt(100));

    7     }

    8     return numbers;

    9   }

    Listing 10-1.

    Number Generator

    ```


    But first of all, we take a quick look at Java concurrency. Although `parallelStreams()`
    avoids all the manual thread handling, a basic knowledge is useful to understand
    how to write a collector that successfully performs in parallel.


    ## Java Concurrency


    There are two terms we have to talk about: “concurrency” and “parallelism.” We
    have to define both terms before we move on because we talk about Java concurrency,
    but parallel streams.


    With concurrency, several parts of a program will be executed in different threads,
    running concurrent instead of serial. This does not necessarily imply that these
    threads run at the same time. Remember the old days of one single core CPU (central
    processing unit) per computer: to keep the user interface (UI) fluent, it had
    been a good practice to perform the UI handling in one thread and the time-consuming
    computation in a different one. Both threads alternating gained small slices of
    CPU time. On a modern multicore CPU, these threads may run in parallel.


    On the other hand, within parallelism, a couple of parallel running threads would
    perform the same computation of different data simultaneously. Parallel streams
    implement parallelism. Take a look at the drawing (Figure [10-1](#A435427_1_En_10_Chapter.html#Fig1)):
    the parallel streams contain different data of the same type. Each intermediate
    operation is defined once and will be executed in parallel as suggested by the
    vertical alignment.


    ![A435427_1_En_10_Fig1_HTML.jpg](A435427_1_En_10_Fig1_HTML.jpg)


    Figure 10-1. Parallel stream with intermediate operations


    People may consider parallelism as a special case of concurrency or as something
    different. In this book, we won’t deepen this discussion. Anyway, to get parallelism
    using Java, we technically need concurrency.


    ![A435427_1_En_10_Figa_HTML.jpg](A435427_1_En_10_Figa_HTML.jpg) Processes and
    Threads


    Within this book we only deal with threads, which are separate units of a program,
    running within the same process. Whereas a process offers a completely separated
    environment with its own memory, threads run within a shared environment and especially
    share their memory. This fact becomes important if classes are used by multiple
    threads.


    Get a more detailed explanation by the [Java Tutorial](https://docs.oracle.com/javase/tutorial/essential/concurrency/procthread.html).[¹](#A435427_1_En_10_Chapter.html#Fn1)


    Java had been designed for multithreading from the very beginning. The class `Thread`
    has been part of Java since JDK (Java Development Kit) 1.0.


    Let’s take a look at how to define and run a second thread (Listing [10-2](#A435427_1_En_10_Chapter.html#Par15)).


    ```

    1   public static void main(String[] args) {

    2     Thread thread = new MyThread();

    3     thread.start();

    4     System.out.println("Message from Main");

    5   }


    7   private static class MyThread extends Thread {

    8     @Override

    9     public void run() {

    10       System.out.println("Message from MyThread");

    11     }

    12   }

    Listing 10-2.

    Simple Usage of Thread

    ```


    We simply need to define a class that is derived from `Thread` and overwrite the
    `run()` method. In the main program, we create a new instance of our thread and
    call `start()`. Behind the scenes, `start` requests a new thread from the operating
    system and performs the `run` method within this new thread.


    But there is one problem. Usually you want to build up class structures by deriving
    them from a technical class and not from `Thread`. Fortunately, Java offers an
    alternative way to create a thread. We need to implement the interface `Runnable`.
    And that is exactly what the class `Thread` does internally (Listing [10-3](#A435427_1_En_10_Chapter.html#Par18)).


    ```

    1   public static void main(String[] args) {

    2     Thread thread = new Thread(new MyRunnable());

    3     thread.start();

    4     System.out.println("Message from Main");

    5   }


    7   private static class MyRunnable implements Runnable {

    8     @Override

    9     public void run() {

    10       System.out.println("Message from MyRunnable");

    11     }

    12   }

    Listing 10-3.

    Thread Using Runnable

    ```


    Now, a new `Thread` is created by passing an object of our class. Everything else
    stays unchanged.'
