    42   }

    Listing 10-5.

    Parallel Summing —with Unexpected Results

    ```


    However, if you invoke this program a couple of times, you’ll get different results,
    even though you wait for the second thread to finish. What happened?


    Watch out for the `sum()` method.


    ```

    sum += val;

    ```


    At first glance, this looks like a single operation. But in fact, this is only
    syntactic sugar , and we can rewrite this statement.


    ```

    sum = sum + val;

    ```


    With our common hardware structure, it is not possible to perform an addition
    within a variable. In fact, the computer must load the value of `sum` into a register,
    add `val`, and then push the result into the variable back. Thus, the line of
    code might be rewritten using pseudo code.


    ```

    1   register.load(sum)

    2   register.add(val)

    3   register.write(sum)

    ```


    As you can see, this is a non-atomic sequence of operations. Between two of them,
    the CPU might perform something else.


    Let’s assume sum has a value of 0\. And we have two threads, adding a value each.
    Thread 1 might add 5, while thread 2 adds 3\. The following sequence produces
    the expected result:


    | Operation | Result |

    | --- | --- |

    | Thread 1 register1.load(sum) | register1 = 0 |

    | Thread 1 register1.add(5) | register1 = 5 |

    | Thread 1 register1.write(sum) | sum = 5 |

    | Thread 2 register2.load(sum) | register2 = 5 |

    | Thread 2 register2.add(3) | register2 = 8 |

    | Thread 2 register2.write(sum) | sum = 8 |


    But as both threads run independently, we cannot determine the execution order
    . At a different run, the statements might be executed in following order:


    | Operation | Result |

    | --- | --- |

    | Thread 1 register1.load(sum) | register1 = 0 |

    | Thread 1 register1.add(5) | register1 = 5 |

    | Thread 2 register2.load(sum) | register2 = 0 (sum is still 0 at this time!)
    |

    | Thread 1 register1.write(sum) | sum = 5 |

    | Thread 2 register2.add(3) | register2 = 3 |

    | Thread 2 register2.write(sum) | sum = 3 |


    What we’ve seen is a typical race condition. The result depends on which thread
    leads the race to the common variable. The method `sum()` became a critical section
    within the code. Such a section must be protected, for example, by a lock. Or
    you may use Java’s qualifier `synchronized`.


    ```

    public synchronized void sum(long val)

    ```


    Now this method will be automatically protected. Only one thread at one time is
    allowed to run this method, whereas other threads are forced to wait. All the
    calls to `sum()` become serial, which destroys the parallelism. This can’t be
    an appropriate solution.


    Volatile


    Maybe you have heard about the volatile qualifier for variables in a multithreaded
    environment and guess this would be a good choice. Sadly, this does not help.
    Volatile only guarantees that any read after a write will retrieve the last written
    value. Take a look at the first thread sequence, and there especially at `Thread
    2 register2.load(sum)`. The sum had been written in the step just before that.
    The former value had been 0\. What happens if the read access would query the
    cache? Although just the 5 has been pushed to the var, Java might read the former
    0\. Volatile avoids this problem due to its guarantee: nothing more. Thus, volatile
    won’t help (without we might have additional faults).


    For more information, read about the [Java Memory Model](https://www.cs.umd.edu/%7Epugh/java/memoryModel/jsr-133-faq.html).[²](#A435427_1_En_10_Chapter.html#Fn2)


    Probably the best solution for our problem is to avoid the critical section. To
    avoid the shared variable, we simply create a separate `SummingUnit` for each
    thread. Each thread would solve a part of our problem—create a subtotal. At the
    end, we have to combine all of them.


    The following is an example of parallel summing—with a separate `SummingUnit`
    for each thread:


    ```

    1   public static void main(String[] args) throws InterruptedException {

    2     List numbers = Utils.createNumbers();

    3     int size = numbers.size();

    4     SummingUnit summingUnit = new SummingUnit();

    5     SummingUnit summingUnit2 = new SummingUnit();


    7     Thread thread = new Thread(new SumTask(numbers, 0,

    8             size / 2, summingUnit));

    9     thread.start();


    11     SumTask sumTask = new SumTask(numbers, size / 2,

    12             size, summingUnit2);

    13     sumTask.run();

    14     thread.join(); // wait for thread to complete


    16     summingUnit.combine(summingUnit2);

    17     System.out.println("Sum: " + summingUnit.getSum());

    18   }

    ```


    In line 5 of the preceding code, a second `SummingUnit` is created, which is used
    in line 12\. Then (line 16), the subtotals are combined. Because every thread
    uses its own object, we can avoid any synchronization .'
