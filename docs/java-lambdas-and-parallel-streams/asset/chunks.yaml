- fmt: '# Lazy Evaluation


    You may treat a lambda expression as a kind of function reference. And this function
    is not executed at the time you assign it to a variable but only when evaluating
    the variable. This lazy evaluation might be used to realize an around-invoke.
    For example, we may push the evaluation into a method that measures the execution
    time.


    In the following snippet, `getVendorCount` will be executed immediately.


    ```

    int personCount = getVendorCount(persons);

    ```


    Using a lambda expression, it is simple to pass `getVendorCount` as a function
    into a different method.


    ```

    int personCount = invokeMethod(() -> getVendorCount(persons));

    ```


    The essential part is that `getVendorCount` will not be executed here. It will
    be carried out within the measuring method, just when `method.get()` is called
    (Listing [4-5](#A435427_1_En_4_Chapter.html#Par42)).


    ```

    1    private static <T> T invokeMethod(Supplier<T> method) {

    2     long start = System.nanoTime();

    3     T result = method.get();

    4     long elapsedTime = System.nanoTime() - start;

    5     System.out.println("Elapsed time: " + elapsedTime/1000000);

    6     return result;

    7   }

    Listing 4-5.

    Messfunktion zum Aufruf einer Methode

    ```


    # Summary


    Using lambda expressions, we were successful in implementing a flexible filter
    function for the data.


    However, we can only change the filter condition so far. If we need to use a different
    kind of evaluation, for example, amount and total price of an article, we still
    need to adapt the method. Here, the stream interface comes into play, which allows
    you to do without the loop and to chain other execution steps such as transformation
    or reduction. To understand how Java could be enhanced by this interface, we first
    need to introduce some other new Java features. One of these enhancements is the
    chance to create default methods. I will show this within Chapter [5](#A435427_1_En_5_Chapter.html).


