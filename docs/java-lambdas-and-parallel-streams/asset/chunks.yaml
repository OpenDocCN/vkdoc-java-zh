    然而，如果你多次调用这个程序，即使你等待第二个线程完成，也会得到不同的结果。发生了什么？


    请注意`sum()`方法。


    ```java

    sum += val;

    ```


    乍一看，这看起来像是一个单一操作。但实际上，这只是语法糖，我们可以重写这个语句。


    ```java

    sum = sum + val;

    ```


    在我们常见的硬件结构中，不可能在变量内部执行加法操作。实际上，计算机必须将`sum`的值加载到寄存器中，加上`val`，然后将结果写回变量。因此，这行代码可以用伪代码重写如下：


    ```java

    1   register.load(sum)

    2   register.add(val)

    3   register.write(sum)

    ```


    如你所见，这是一个非原子操作序列。在这两个操作之间，CPU可能会执行其他操作。


    假设`sum`的值为0。我们有两个线程，每个线程添加一个值。线程1添加5，线程2添加3。以下序列产生了预期的结果：


    | 操作 | 结果 |

    | --- | --- |

    | 线程1 `register1.load(sum)` | `register1` = 0 |

    | 线程1 `register1.add(5)` | `register1` = 5 |

    | 线程1 `register1.write(sum)` | `sum` = 5 |

    | 线程2 `register2.load(sum)` | `register2` = 5 |

    | 线程2 `register2.add(3)` | `register2` = 8 |

    | 线程2 `register2.write(sum)` | `sum` = 8 |


    但由于两个线程独立运行，我们无法确定执行顺序。在另一次运行时，语句可能按以下顺序执行：


    | 操作 | 结果 |

    | --- | --- |

    | 线程1 `register1.load(sum)` | `register1` = 0 |

    | 线程1 `register1.add(5)` | `register1` = 5 |

    | 线程2 `register2.load(sum)` | `register2` = 0（此时`sum`仍为0！） |

    | 线程1 `register1.write(sum)` | `sum` = 5 |

    | 线程2 `register2.add(3)` | `register2` = 3 |

    | 线程2 `register2.write(sum)` | `sum` = 3 |


    我们看到的是一个典型的竞态条件。结果取决于哪个线程在争夺共享变量的竞赛中领先。`sum()`方法成为了代码中的一个临界区。这样的区域必须受到保护，例如通过锁。或者你可以使用Java的`synchronized`限定符。


    ```java

    public synchronized void sum(long val)

    ```


    现在这个方法将自动受到保护。一次只允许一个线程运行此方法，其他线程被迫等待。所有对`sum()`的调用都变成了串行，这破坏了并行性。这不能是一个合适的解决方案。


    ## Volatile


    你可能听说过在多线程环境中变量的`volatile`限定符，并认为这将是一个不错的选择。遗憾的是，这并没有帮助。`volatile`只保证任何读操作在写操作之后都能获取到最后写入的值。看看第一个线程序列，特别是`Thread
    2 register2.load(sum)`。`sum`在前一步刚刚被写入。之前的值是0。如果读访问查询缓存会发生什么？尽管刚刚将5写入变量，但Java可能读取之前的0。`volatile`由于其保证避免了这个问题：仅此而已。因此，`volatile`无济于事（除非我们可能有其他错误）。


    更多信息，请阅读关于[Java内存模型](https://www.cs.umd.edu/%7Epugh/java/memoryModel/jsr-133-faq.html)的内容。


    ## 避免临界区


    对于我们问题的最佳解决方案可能是避免临界区。为了避免共享变量，我们只需为每个线程创建一个单独的`SummingUnit`。每个线程将解决我们问题的一部分——创建一个小计。最后，我们必须将它们全部合并。


    以下是使用每个线程单独`SummingUnit`进行并行求和的示例：


    ```java

    1   public static void main(String[] args) throws InterruptedException {

    2     List numbers = Utils.createNumbers();

    3     int size = numbers.size();

    4     SummingUnit summingUnit = new SummingUnit();

    5     SummingUnit summingUnit2 = new SummingUnit();


    7     Thread thread = new Thread(new SumTask(numbers, 0,

    8             size / 2, summingUnit));

    9     thread.start();


    11     SumTask sumTask = new SumTask(numbers, size / 2,

    12             size, summingUnit2);

    13     sumTask.run();

    14     thread.join(); // wait for thread to complete


    16     summingUnit.combine(summingUnit2);

    17     System.out.println("Sum: " + summingUnit.getSum());

    18   }

    ```


    在上述代码的第5行，创建了第二个`SummingUnit`，它在第12行中使用。然后（第16行），合并小计。由于每个线程使用自己的对象，我们可以避免任何同步。'
