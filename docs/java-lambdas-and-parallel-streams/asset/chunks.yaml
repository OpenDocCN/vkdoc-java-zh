  trans: '

    ## 摘要


    通过默认方法 `stream()`，Java 8 在不破坏兼容性的前提下，增强了集合框架及其他接口的功能。它为你提供了一种表面上顺序化的编程方式，来解决那些底层需要循环的问题。最重要的是，你可以通过将此方法替换为
    `parallelStream()` 来实现并行化。


    在本章中，流主要通过简洁的示例进行了重点介绍。在初步了解之后，是时候深入探讨一些细节了。我将特别关注 `Stream` 和 `Spliterator` 这两个接口。


    # 8. stream()、Stream 与 Spliterator


    到目前为止，你已经对如何使用 `stream()` 和 `parallelStream()` 有了初步印象。我们想深入幕后，进一步研究这些方法。


    ![A435427_1_En_8_Figa_HTML.jpg](img/A435427_1_En_8_Figa_HTML.jpg)研究 Java 中的实现。了解如何在你的
    IDE 中显示 Java 源代码。以 [NetBeans](http://netbeans.org/) 为例，¹ 只需打开前面的某个示例，将光标放在 `stream()`
    上。使用组合键 {Ctrl+B} 即可调用 `goto` 源代码。


    `stream()` 和 `parallelStream()` 是 `Collection` 接口的默认方法（参见 8-1）。


    ```

    1   default Stream stream() {

    2     return StreamSupport.stream(spliterator(), false);

    3   }


    5   default Stream parallelStream() {

    6     return StreamSupport.stream(spliterator(), true);

    7   }

    Listing 8-1.

    接口 Collection 的摘录

    ```


    如你所见，这两个方法非常相似。两者都调用了 `StreamSupport.stream()`。唯一的区别在于第二个参数。这个布尔类型的参数 `parallel`
    可以是 `false` 或 `true`。因此，这就清楚了为什么在许多情况下你可以互换使用这两个方法。


    这两个方法都返回一个流，该流由接口 `Stream` 定义。并且它们使用了一个所谓的 Spliterator，通过 `spliterator()` 调用。我将在接下来的段落中讨论这两者。


    ## Stream


    接口 `Stream` 定义了许多返回流的方法。它们不是获取整个输入来生成一个完整的流，而是一个元素一个元素地生成。举个例子，我们来看一下 `filter`
    的签名：


    ```

    Stream filter(Predicate predicate);

    ```


    这会根据过滤条件生成一个流。值得注意的是，`filter` 接收一个类型为 T²（或其超类）的元素，该元素是流的一个元素。如前所述，`Predicate`
    是一个函数式接口。因此，可以使用 lambda 表达式来实现该谓词。由于类型在流中是已知的，lambda 表达式无需声明类型。请参见前面关于 lambda
    表达式规则的段落。


    正如 `filter` 所示，`Stream` 定义了中间操作的工作方式。输出元素的类型可能与输入不同（例如 `map`）。映射操作的输出是一个对象流，其类型可能与输入不同。例如，我们可以将一个人映射为其年龄或姓名。


    对于某些数据类型，定义了专门的流。例如，有 Long 或 Double 流，它们支持额外的数学运算。并且在 `Stream` 内部，定义了一些中间操作来转换为这种专门的流。在前面的示例中，我们使用了
    `.mapToLong(...))`，它对预定义的流类型执行了这样的映射。


    ```

    LongStream mapToLong(ToLongFunction mapper);

    ```


    `LongStream` 并非派生自 `Stream`，但两者都派生自 `BaseStream`。


    除了中间操作，Stream 接口还提供了终端操作以及流的生成。


    终端操作不仅仅是简单或复杂的“结果”，例如 `min`、`max`、`collect`（用于收集数据，例如到列表中），还包括为每个元素显式调用一个方法。


    ```

    void forEach(Consumer action);

    ```


    通过 `forEach`，内部迭代器被提供给一个实现了 `Consumer` 接口的方法。这也是另一个函数式接口。


    让我们来看看终端操作。例如，`min` 操作通常返回数值流的最小值。如果流不包含任何值会发生什么？结果必须为空。为了避免空结果，所有这类操作都会生成一个预期类型的可选值。这个结果的类型不是
    `T`，而是 `Optional<T>`。


    要描述 `Stream` 提供的所有方法，将远远超出这本简明书籍的范围。其目的是让你很好地理解这些原理。建议阅读 [API 文档](https://docs.oracle.com/javase/8/docs/api/java/util/stream/Stream.html)，³
    该文档可通过脚注 3 中的 URL 获取（在撰写本文时有效）。


    ## Spliterator


    `Spliterator` 负责将对象流拆分成更小的部分。其名称是“拆分迭代器”的缩写。这就是前面多次提到的内部迭代器。除了迭代之外，拆分功能使你能够将流的部分提供给不同的线程。


    你可以将 spliterator 用于顺序处理以及并行处理。Java 8 附带了一个默认实现（参见 8-2）。


    ```

    1   @Override

    2   default Spliterator spliterator() {

    3       return Spliterators.spliterator(this, 0);

    4   }

    Listing 8-2.

    默认方法 Spliterator

    ```


    对于特殊用例，可以创建你自己的 spliterator。虽然在大多数情况下，现有的实现已经足够，但理解基本概念非常有用。


    接口 `Spliterator` 定义了两个重要的方法。


    ```

    boolean tryAdvance(Consumer action);

    ```


    上述代码尝试为下一个元素执行一个操作——如果存在的话。如果成功推进，此方法返回 `true`，而 `false` 表示没有元素（即流的末尾）。这与常见的迭代器概念有显著区别：使用迭代器时，你首先必须检查是否至少还有一个元素存在。如果
    `hasNext()` 返回 `true`，你可以通过 `next()` 获取它。


    `tryAdvance` 有一个配套方法，用于遍历剩余元素。第二个重要的方法如下。


    ```

    Spliterator trySplit();

    ```


    这尝试以有意义的方式拆分数据。如果底层数据结构的大小是已知的，例如，数据保存在数组中，那么 `trySplit` 会将其拆分为两个（几乎）大小相等的部分：`trySplit`
    返回一个额外的 spliterator，如果需要，该 spliterator 可以再次拆分数据。通过这种方式，整个数据集将被拆分成大量较小的数据集，这些数据集可能可以并行处理。


    如果数据量未知，例如，因为你从文件读取数据或通过某个数据通道在线接收数据，那么拆分将根据其他标准执行。例如，一个文件可以在每 1,024 行之后进行拆分。


    尽管 `tryAdvance` 和 `trySplit` 是理解 spliterator 行为的最重要方法，但此接口还提供了更多的方法和字段。如果需要，你可以在
    [API 文档](https://docs.oracle.com/javase/8/docs/api/java/util/Spliterator.html)
    中阅读相关内容。⁴

    '
- fmt: '# Summary


    The interface `Stream` defines a lot of methods to process data within a stream.
    Intermediate operations perform an action and yield another stream. This allows
    you to chain processing steps by a dot notation (fluent API).


    The `Spliterator` is the internal `Iterator`, which is able to split the data
    into smaller chunks. This enables the parallel processing of these chunks. Sometimes
    you have to consider some constraints to enable a successful parallelization.
    I will discuss this in Chapter [9](#A435427_1_En_9_Chapter.html).


    Footnotes [1](#A435427_1_En_8_Chapter.html#Fn1_source)


    [`http://netbeans.org`](http://netbeans.org)


    [2](#A435427_1_En_8_Chapter.html#Fn2_source)


    If you do not know the common type notation of generics, take a look into the
    Internet, for example, at [Wikipedia: de.wikipedia.org/wiki/Generische_Programmierung_in_Java](https://de.wikipedia.org/wiki/Generische_Programmierung_in_Java)
    or Oracle’s [Java Tutorial](https://docs.oracle.com/javase/tutorial/java/generics/methods.html):
    [docs.oracle.com/javase/tutorial/java/generics/methods.html](https://docs.oracle.com/javase/tutorial/java/generics/methods.html).


    [3](#A435427_1_En_8_Chapter.html#Fn3_source)


    [`https://docs.oracle.com/javase/8/docs/api/java/util/stream/Stream.html`](https://docs.oracle.com/javase/8/docs/api/java/util/stream/Stream.html)


    [4](#A435427_1_En_8_Chapter.html#Fn4_source)


    [`https://docs.oracle.com/javase/8/docs/api/java/util/Spliterator.html`](https://docs.oracle.com/javase/8/docs/api/java/util/Spliterator.html)


    # 9. Parallel Stream


    If by the usage of `parallelStream` the data can be processed correctly in parallel,
    you need to consider some ancillary conditions. In case of inobservance, either
    Java will prohibit parallel execution or you might get unexpected results.


    - Use stateless lambda expressions. State means you keep a value somewhere, for
    instance, in a variable. Now, if a future execution of the lambda expression depends
    on this value, the behavior of parallel execution may become non-deterministic.
    The result potentially becomes nonpredictable. If you’re lucky, the compiler prevents
    parallelism. Otherwise you will wonder about the results.

    - Do not change the data the stream is based on. For example, if you add or remove
    elements of a collection while iterating through it, it may work when you process
    sequential. Such code is not healthy and often leads to an exception. With a parallel
    stream, you can’t use such poor code: you’ll always get an exception.

    - Avoid side effects. This is the main principle of functional programming. A
    function always returns the same result when the same parameters are provided.
    Side effects like changing a variable with broader scope should be avoided. If
    you are working with streams and like to use a variable with broader scope, the
    compiler will accept this only if these variables are used in the same manner
    as final variables. A modern IDE such as NetBeans would give you the advice that
    variables referenced from a lambda expression must be final or used effectively
    final.

    - Processing must be independent from order. Because in the case of parallel processing,
    the order is not determined, it is essential that the result does not depend on
    the processing order. Or you need to enforce an ordered processing. This creates
    some overhead, which might consume the time you’ve earned with parallelism. The
    problem of a calculation that depends on a special order can be investigated by
    the following example. The apparently same calculation is implemented in three
    different ways. To reproduce the stable or changing results, every variant is
    invoked multiple times.


    ```

    1   long[] result = new long[1];


    3   for (int i = 0; i < 1000; i++)

    4     IntStream.range(0, 1000).forEach(n -> result[0] = (result[0] + n) * n);

    7     System.out.println("serial: " + result[0]);

    8   }


    10   for (int i = 0; i < 1000; i++)

    11     IntStream.range(0, 1000).parallel().forEach(n -> result[0] = (result[0]
    + n) * n);

    14     System.out.println("parallel: " + result[0]);

    15   }


    17   for (int i = 0; i < 1000; i++)

    18     IntStream.range(0, 1000).parallel().forEachOrdered(n -> result[0] = (result[0]
    + n) * n);

    21     System.out.println("parallel ordered: " + result[0]);

    22   }

    Listing 9-1.

    Sequential, parallel and parallel ordered processing

    ```


    The stream is generated by `range` as `LongStream`. This delivers numbers in the
    desired range. There is no `parallelStream` as in the `Collection` interface,
    but you can switch to parallel processing by `parallel()`.


    The sequential variant as well as the ordered parallel one always report the result
    of 3003755479748501215, whereas the unordered parallel version creates different
    results.


    The calculation of `result[0] = (result[0] + n) * n)` depends on the order. It’s
    very clear that a zero in place of `n` will produce as zero as the next intermediate
    result (and a zero as final if processed last). Because the zero will be used
    at any time, you can’t predict the result. If you further investigate the math,
    it becomes clear that it depends on the order for any other value too.


    For a simple demonstration, these three demos use a side effect. All intermediate
    results will be stored in an external variable. Because this has to be effectively
    final, we used a dirty trick: instead of a `long`, we used an array.


    In a productive application, never use such dirty tricks! Here is a clean variant.


    ```

    1   long reduce = LongStream.range(0, 1000).reduce(0, (a, c) -> (a + c) * c);

    ```


    For those who are unfamiliar with lambdas, this looks very strange, while the
    dirty solution seems to be more understandable. That’s why I used it for this
    demonstration. Never fear the clean solution. After using lambdas for a short
    while, this kind of programming is quite easy.


    Here is a short explanation of the terminal `reduce` operation. The first parameter
    is used to initialize an accumulator. The second operation is a binary `Function`
    that takes the accumulator (`a`) and the current object (`c`) of the stream. The
    result of this operation will replace the former value of the accumulator and
    becomes available for the next object of the stream.


    - By using `Collect` respect `Concurrent`


    ```

    1    Map<Integer, List<Person>> ageMap = persons

    2      .stream()

    3     .collect(Collectors.groupingBy(Person::getAge));


    5    ConcurrentMap<Integer, List<Person>> ageMapPar = persons

    6      .parallelStream()

    7     .collect(Collectors.groupingByConcurrent(Person::getAge));

    ```


    - The collecting structure (here: `ConcurrentMap`) may have the characteristics
    `Collector.Character` and `Collector.Characteristics.UNORDERED`.


    ## Summary


    Although parallel programming with streams is available without explicit thread
    handling and often without synchronization, you still have to consider some constraints
    to get correct results. Next, we’ll examine the `collect` method with respect
    to Java concurrency.'
