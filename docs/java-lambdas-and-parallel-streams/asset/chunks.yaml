    [https://​docs.​oracle.​com/​javase/​tutorial/​java/​javaOO/​methodreferences​.​html](https://docs.oracle.com/javase/tutorial/java/javaOO/methodreferences.html)


    # 5. Default Method


    ## The Problem


    An interface might be treated as a kind of contract between a provider and a user.
    As such, it can’t be recalled or changed unilaterally. If you develop software
    against an interface, you must rely on the function. If the provider (e.g., developer
    of a framework) changes the interface, it might be possible that your software
    can’t use the new version anymore. If you are in luck, your compiled program may
    still work together with the new version. This is the case if the change keeps
    binary compatibility. By the next time you need to compile your program, the compiler
    usually reports an error: the compiler forces all methods of the interface to
    be implemented. Because the changed interface is not source compatible, you need
    to adopt your program.


    So how can you enhance an interface without breaking source and binary compatibility?


    ## Solution—The Java Way


    The developers of the Java language solved this problem by introducing default
    methods. These are concrete method implementations within the interface, declared
    as `default`. If none of the existing parts are changed, an interface that has
    been enhanced by default methods can be used directly by all classes that implement
    it: without the need to change these implementing classes!


    Because a default method is a ready to use method, there is no need to implement
    it, and the enhanced interface keeps source and binary compatibility. Beginning
    with Java 8, your classes may use methods from parent classes as well as from
    interfaces. Thus, Java virtual has a kind of multiple inheritance or mixin now.


    What about the (well-) known problems of multiple inheritance? Or what happens
    if your class or a parent class of it already possesses a method of the same name
    and signature?


    Java 8 has a couple of well-defined rules to prevent problems that are described
    in the following. For simplification, we now call it “homonymous” methods if we
    discuss methods of the same name and signature.


    - If the (abstract) method signatures of the enhanced interface stay unchanged,
    the interface will be source and binary compatible

    - The interface might be enhanced by concrete methods, which are available for
    inheritance

    - If the implementing class contains a homonymous method, this has priority

    - The interface provider is able to enhance the interface

    - Enhancements of implemented libraries by the library user are not possible (enhancements
    by the provider only)

    - This is in contrast to extension methods of other languages, which enhance existing
    classes by the user

    - There are well-defined rules to choose the right method in case of homonymous
    implementation

    - Fields (“member” variables) defined in an interface are implicit final

    - Despite these restrictions, default methods have a great potential

    - Best examples are the `stream()` and `parallelStream()` methods not only of
    the Java 8 collections'
