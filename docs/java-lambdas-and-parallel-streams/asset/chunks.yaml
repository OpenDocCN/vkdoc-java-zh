    # 6. Optional


    首先，我们来看另一个在使用新流时发挥作用的类族：`Optional`。


    如你所知，如果在 Java 中声明但未初始化一个对象，其值为 `null`。如果尝试访问值为 `null` 的对象的方法，将会得到空指针异常。遗憾的是，我们无法在任何时候都避免空值。至少我们需要某种东西来表示对象的缺失。为了避免空指针异常，你需要在软件中的许多地方检查各种变量是否为空值（参见清单
    6-1）。


    ```

    1   String name;

    2   [...]

    3   if (name != null) {...}

    清单 6-1.

    检查非空值

    ```


    Java 8 引入了 `Optional` 类，它封装了一个可选对象，并提供了检查内容的方法（清单 6-2）。


    ```

    1   Optional name;

    2   [...]

    3   if (name.isPresent()){...}

    清单 6-2.

    检查是否存在

    ```


    乍一看，这似乎是用一种麻烦代替了另一种麻烦。检查的数量仍然相同，只是从检查空值变成了检查是否存在。而且还需要一个额外的类。那么，额外的好处在哪里呢？


    `Optional` 类提供的功能远不止简单的存在性测试。首先，你可以告诉这个类在封装的对象不存在时抛出哪个异常。用你选择的异常（附带详细消息）替换愚蠢的空指针异常，在出错时是一个巨大的优势。另一方面，`Optional`
    提供了一些方法来获取值。


    要访问封装的对象，可以使用 `get()` 方法。而使用 `orElse()` 方法，你可以指定一个替代值，当值不存在时使用。这可以防止你遇到任何“无值异常”，并允许你以更少的检查来开发软件。


    你可以在 [API 文档](https://docs.oracle.com/javase/8/docs/api/java/util/Optional.html)
    中找到关于 `Optional` 的更多详细信息。¹


    在本章开头，我提到了一个类族。`Optional` 是一个直接派生自 `Object` 的单一类。除此之外，还有 `OptionalDouble`、`OptionalInt`、`OptionalLong`
    这些类，它们也直接派生自 `Object`。这些类的行为与 `Optional` 类似。因此，这个类族既不是通过继承自公共父类来定义，也不是通过实现公共接口来定义。这些类只是以类似的方式编程，并实现了相近的行为。


    它们的方法略有不同。例如，要获取一个 Optional Double 的值，方法不是 `get()` 而是 `getAsDouble()`——我们将在第 7
    章学习 Streams 时用到它。


    脚注 1


    [`https://docs.oracle.com/javase/8/docs/api/java/util/Optional.html`](https://docs.oracle.com/javase/8/docs/api/java/util/Optional.html)

    '
- fmt: '# 7. Make the Acquaintance of Streams


    Ok, back to the analysis of the data.


    Let’s assume two existing filters can’t be combined to one complex condition but
    have to be applied one after the other. Or we need separate steps to transform
    the data, or, or, . . .


    Generally speaking, the data will be processed in a chain. Each operation takes
    some data, performs any kind of operation, and produces an intermediate result,
    which is used as input for the next task. Such a procedure is known as pipelining
    (see Figure [7-1](#A435427_1_En_7_Chapter.html#Fig1)).


    ![A435427_1_En_7_Fig1_HTML.jpg](A435427_1_En_7_Fig1_HTML.jpg)


    Figure 7-1. Classical process chain


    Operations work differently when using a stream. All transformations in the chain
    are performed “on the fly.” From the developers point of view, there is a data
    input at the beginning of the chain and one output at its end, but no explicit
    intermediate result (Figure [7-2](#A435427_1_En_7_Chapter.html#Fig2)).


    ![A435427_1_En_7_Fig2_HTML.jpg](A435427_1_En_7_Fig2_HTML.jpg)


    Figure 7-2. Stream processing


    The developer needs to create a data source and then appends the processing steps
    till the last one. This so-called terminal operation creates the result. The data
    flow only starts when the final operation is invoked.


    The trick is an internal iterator, which emits the data. Due to this, there is
    no need for the programmer to create a loop (which is nothing else but an external
    iterator). The developer just needs to tell the system how to handle the data.
    The former loop now looks like a serial process—which can be parallelized in an
    easy way later on.


    ## Examples


    To get a first impression of how the Stream works, we take a look at a couple
    of use cases. It doesn’t matter whether you do not understand everything right
    now—later on I will discuss the details (see Listing [7-1](#A435427_1_En_7_Chapter.html#Par8)).


    ```

    1   List youngFemales = persons.stream()

    2   .filter(p -> p.getAge() < 20)

    3   .filter(p -> p.isFemale())

    4   .collect(Collectors.toList());

    Listing 7-1.

    List All Female Persons with Age Below 20

    ```


    The code `person.stream()` emits all data as a stream using an internal iterator.
    Lines 2 and 3 (Listing [7-1](#A435427_1_En_7_Chapter.html#Par8)) act as two chained
    filters; and in the last line, the resulting data is collected into a list. I
    will discuss `collect()` and `Collectors` later on.


    ```

    1   double averageAge = persons.stream()

    2               .filter(p -> p.getAge() < 20 && p.isFemale())

    3               .mapToInt(p -> p.getAge())

    4               .average()

    5               .getAsDouble();

    Listing 7-2.

    Average Age of All Females Younger Than 20

    ```


    In Listing [7-2](#A435427_1_En_7_Chapter.html#Par10), we first filter for the
    same persons as in Listing [7-1](#A435427_1_En_7_Chapter.html#Par8). For a little
    variation, the condition is realized as a combined one. Because this has no noticeable
    affect on performance, the first variant might be preferable, especially because
    it is possible to combine the single processing steps dynamically at runtime.


    In line 3 of Listing [7-2](#A435427_1_En_7_Chapter.html#Par8), we have a mapping,
    which takes an object of the stream (`Person`) and yields a different one: the
    stream will continue with the person’s age. Next, we calculate the average of
    it. At the end of the process chain, we’ll get the result from type `Double` and
    assign it to the variable on the left side (`averageAge` on line 1).


    ```

    1   long totalSelling = persons

    2           .stream()

    3           .filter(Person::isVendor)

    4           .mapToLong(p -> p.getSelling().values()

    5                   .stream()

    6                   .mapToLong(ArticleInfo::getQuantity)

    7                   .sum())

    8           .sum();

    Listing 7-3.

    Total Count of Selling

    ```


    Just to remind you, all data is available as a list of persons. Some of them are
    labeled as vendors. For each vendor, all selling is stored in a list.


    In Listing [7-3](#A435427_1_En_7_Chapter.html#Par13), the total count of selling
    is calculated. With a traditional approach, you would implement two loops: one
    loop to iterate the persons and the inner one to iterate through the selling.


    By streams, it is realized with two loops also, but these loops are hidden to
    the developer. The code reads like a serial process: take all persons, determine
    the vendors, and for each calculate the amount (lines 4–7) and then the final
    sum. This is clear and concise code—and maybe unfamiliar. But once you know the
    lambda syntax and internal iterators, it becomes easy to read. Could you have
    made it shorter without lambdas and streams?


    If you don’t like the duplicate call of the `sum` function, we can realize the
    calculation in a different way. It is possible to flatten the “stream of streams.”
    For this, Java offers `flatMap`, or in this concrete solution, a `flatMapToLong`
    (Listing [7-4](#A435427_1_En_7_Chapter.html#Par18)).


    ```

    1   long totalSelling = persons

    2           .stream()

    3           .filter(Person::isVendor)

    4           .flatMapToLong(p -> p.getSelling().values().stream()

    5           .mapToLong(ArticleInfo::getQuantity))

    6           .sum();

    Listing 7-4.

    Total Count of Selling with Flattened Stream

    ```


    As the examples show, the stream interfaces comes along with a fluent API. You
    may combine all methods via dot notation. Thus, the processing looks more declarative:
    you describe what will happen to your data. For processing, we have to distinguish
    intermediate from terminal operations.


    An intermediate operation is one that is processed within the stream. Examples
    for these are `filter`, `map`, or `sorted`. They accept a stream and emit one.


    A terminal operation closes the stream. Examples for this kind of operation are
    `collect`, `reduce`, and `sum`. Understandably, there can be only one terminal
    operation.


    The process does not start until the terminal operation is called. Thus, a stream
    realizes the concept of lazy evaluation.


    We can use this behavior to assign the intermediate steps to a variable and build
    the chain dynamically. The following code illustrates this concept; `someCondition()`
    and `someOtherCondition()` are placeholders for any condition.


    Imagine a user interface where the user selects some combo boxes, check boxes,
    and other elements that are used to build up the processing. In real applications,
    you’ll meet such simple, up to complex, builders (Listing [7-5](#A435427_1_En_7_Chapter.html#Par25)).


    ```

    1   Stream stream = persons.stream();

    2   if (someCondition()){

    3     stream = stream.filter(Person::isFemale);

    4   }

    5   if (someOtherCondition()){

    6     stream = stream.filter(p -> p.getAge() < 18);

    7   }

    8   if (someThirdCondition()){

    9     stream = stream.sorted(Comparator.comparing(Person::getName));

    10  }

    11  double averageAge = stream

    12          .mapToInt(p -> p.getAge())

    13          .average()

    14          .getAsDouble();

    Listing 7-5.

    Dynamic Build of Process Chain

    ```


    ## Parallel Processing


    ![A435427_1_En_7_Figa_HTML.jpg](A435427_1_En_7_Figa_HTML.jpg) Parallelize


    Using the last example (or any other), replace `stream()` by `parallelStream()`.
    Measure the time that is needed both for the sequential well as for the parallel
    variant on a multicore machine.


    For taking the time, you can use the method `invokeMethod`, which was introduced
    in Chapter [4](#A435427_1_En_4_Chapter.html) (see Listing [7-6](#A435427_1_En_7_Chapter.html#Par28)).


    ```

    1   Supplier totalSelling = () ->

    2            persons.stream()

    3           .filter(Person::isVendor)

    4           .flatMapToLong(p -> p.getSelling().values().stream()

    5           .mapToLong(ArticleInfo::getQuantity))

    6           .sum();

    7   System.out.println("total: " + invokeMethod(totalSelling));

    Listing 7-6.

    Measure Time

    ```


    As stated at the beginning of this book in the section The Solution (Chapter [1](#A435427_1_En_1_Chapter.html)),
    it is really possible to realize parallel processing by the usage of `parallelStream()`
    in place of `stream()`. Although this looks quite simple, you have to consider
    some ancillary conditions. I will further investigate this.'
