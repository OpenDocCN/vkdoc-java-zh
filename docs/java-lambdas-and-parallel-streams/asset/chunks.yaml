- fmt: "# Collect\n\nAfter this short journey into Java concurrency, we’ll come back\
    \ to parallel streams and the `collect()` method. The mentioned overload taking\
    \ three parameters is defined as\n\n```\n1    R collect(Supplier supplier,\n2\
    \                 BiConsumer accumulator,\n3                 BiConsumer combiner);\n\
    ```\n\nThe first parameter takes a function, which supplies a new result container\
    \ of type `R`. We use a `SummingUnit` for `R`.\n\nThe accumulator parameter is\
    \ a function that takes a result container `R`—which is a `SummingUnit` —and an\
    \ object of the stream from type `T`. In our example, this is one of the numbers.\n\
    \nAnd the last parameter takes a function where Java passes two result containers\
    \ in. This function performs the combination.\n\nPutting all this together, we\
    \ use `SummingUnit` within `collect` (Listing [10-6](#A435427_1_En_10_Chapter.html#Par51)).\n\
    \n```\n1   System.out.println(\"total: \" +\n2     numbers.parallelStream().collect(\n\
    3       () -> new SummingUnit(),     // supplier\n4       (summingUnit, value)\
    \ ->\n5         summingUnit.sum(value),    // accumulator\n6       (summingUnit,\
    \ other) ->\n7         summingUnit.combine(other) // combiner\n8     ).getSum()\n\
    9   );\nListing 10-6.\nUsing SummingUnit Within Collect\n```\n\nNow, if you run\
    \ the program, you may recognize that the app prints out a couple of instances\
    \ of “ctor `SummingUnit`.” Remember, we print this within `SummingUnit`’s constructor.\
    \ This indicates that Java invokes a couple of threads to perform the work. In\
    \ fact, Java uses the fork/join framework to schedule the threads. The principle\
    \ of this framework is whether the task is small enough to run serial. If bigger,\
    \ then the problem would be divided (best in two similar big parts), and both\
    \ parts would be processed in different threads. Therefore, this algorithm is\
    \ applied recursively.\n\nIf you’re interested in more details about the fork/join\
    \ framework, please refer to the [Java](https://docs.oracle.com/javase/tutorial/essential/concurrency/forkjoin.html)\
    \ [Tutorials](https://docs.oracle.com/javase/tutorial/essential/concurrency/forkjoin.html).[³](#A435427_1_En_10_Chapter.html#Fn3)\n\
    \nAs explained before, you can freely choose the names for lambda parameters.\
    \ The scope is quite narrow. Thus, usually short names are chosen.\n\n```\n1 \
    \  .collect(() -> new SummingUnit(),\n2   (s, v) -> s.sum(v), (s, o) -> s.combine(o))\n\
    ```\n\nAlternatively we can use method references.\n\n```\n1   .collect(SummingUnit::new,\
    \ SummingUnit::sum, SummingUnit::combine)\n```\n\nAs the preceding examples show,\
    \ it is quite easy to collect data. Usually it is not worthwhile to run such a\
    \ simple task in parallel, but it should be no problem to transfer the knowledge\
    \ to a more sophisticated task of your technical domain. Longer running tasks\
    \ especially take profit from parallelism.\n\nInstead of passing a couple of functions\
    \ to the `collect()` method, we can write a `Collector`, which is passed to `collect()`.\
    \ The following is the signature of the overloaded method:\n\n```\n1    R collect(Collector\
    \ collector);\n```\n\n`Collector` is an interface we have to implement. We create\
    \ a class `SummingCollector`, which returns the sum as a final result.\n\n```\n\
    1   System.out.println(\"total: \" +\n2             numbers.parallelStream().collect(new\
    \ SummingCollector()));\n```\n\nThe `Collector` interface forces us to override\
    \ a couple of methods that return functions. With lambdas, it’s quite easy to\
    \ define functions we can pass around as arguments. Besides (surprise!) supplier,\
    \ accumulator, and combiner, we need to override the finisher. The finisher takes\
    \ the last remaining result container for further processing. Our collector would\
    \ return the final sum.\n\nTo reuse most of the code we have developed so far,\
    \ the `SummingCollector` would internally delegate most tasks to a `SummingUnit`.\n\
    \nA last method we need to override returns a set of characteristics (Listing\
    \ [10-7](#A435427_1_En_10_Chapter.html#Par67)).\n\n```\n1   public class SummingCollector\n\
    2                 implements Collector{\n3     @Override\n4     public Supplier\
    \ supplier() {\n5       return () -> new SummingUnit();\n6     }\n\n8   @Override\n\
    9   public BiConsumer accumulator() {\n10     return (s, v) -> s.sum(v);\n11 \
    \  }\n\n13   @Override\n14   public BinaryOperator combiner() {\n15     return\
    \ (left, right) -> {left.combine(right); return left;};\n16   }\n\n18   @Override\n\
    19   public Function finisher() {\n20     return s -> s.getSum();\n21   }\n\n\
    23   @Override\n24   public Set characteristics() {\n25     return EnumSet.of(Characteristics.UNORDERED);\n\
    26     // do not add \", Characteristics.CONCURRENT\"!\n27   }\nListing 10-7.\n\
    SummingCollector\n```\n\nWe parameterize the interface `Collector` with three\
    \ types `<T, A, R>` as shown in the signature. Here `T` is `Long` (a number),\
    \ `A` is replaced by a `SummingUnit`, and the result type `R` in the end is a\
    \ `Long` too: the final sum.\n\nBecause we did not return the characteristic `CONCURRENT`,\
    \ the supplier function is called for every thread. You may watch this by observing\
    \ the output during object construction.\n\nIf we provide the characteristic `CONCURRENT`,\
    \ Java assumes the supplier to be enabled for multithreading. It would create\
    \ only one `SummingUnit`, which is shared by all the threads. And guess, the result\
    \ would differ from run to run because we have a critical section with a race\
    \ condition.\n\n## Summary\n\nIn this chapter we discussed the principles of a\
    \ collector. The example showed, how a collector might be implemented. The parallel\
    \ version of stream is very simple to use and hides all the painful stuff of threading,\
    \ locking, synchronizing. But, a slightly knowledge of Java’s concurrency features\
    \ and typical problems like racing conditions is helpful to write a correct collector.\n\
    \n## Final thoughts\n\nAlthough this example had been very useful to discuss some\
    \ aspects of parallelism, it is not a real world example for a couple of reasons:\n\
    \n1.  There is no need to implement a summing function because Java offers one\
    \ out of the box\n\n    ```\n    numbers.parallelStream().mapToLong(i -> i).sum();\n\
    \    ```\n\n    Internally Java implements the sum using the “dirty” trick with\
    \ an array to hold a simple value.  \n2.  Instead of collecting data, we may simply\
    \ reduce the data.\n\n    ```\n    numbers.parallelStream().reduce(0L, (a, c)\
    \ -> a + c);\n    ```\n\nThe `reduce` function creates a new object with every\
    \ addition. It starts with zero. Then it takes two arguments, the accumulator\
    \ and the current object. It returns the sum of both which is stored as a new\
    \ object into the accumulator. Because there is no shared object, we do not have\
    \ shared state, no race condition etc.\n\nBut sometimes we really need a collector,\
    \ for example if we want to collect objects into a collection or map. This is\
    \ shown in the next chapter.\n\nFootnotes [1](#A435427_1_En_10_Chapter.html#Fn1_source)\n\
    \n[`https://docs.oracle.com/javase/tutorial/essential/concurrency/procthread.html`](https://docs.oracle.com/javase/tutorial/essential/concurrency/procthread.html)\n\
    \n  [2](#A435427_1_En_10_Chapter.html#Fn2_source)\n\n[`https://www.cs.umd.edu/~pugh/java/memoryModel/jsr-133-faq.html`](https://www.cs.umd.edu/%7Epugh/java/memoryModel/jsr-133-faq.html)\n\
    \n  [3](#A435427_1_En_10_Chapter.html#Fn3_source)\n\n[`https://docs.oracle.com/javase/tutorial/essential/concurrency/forkjoin.html`](https://docs.oracle.com/javase/tutorial/essential/concurrency/forkjoin.html)"
