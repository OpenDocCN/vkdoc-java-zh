    A simple getter is used to read the sum. The method `combine()` is initially not
    used; we need it later on. Remember the combiner argument of collect?


    For demonstration, a new thread will process half of our number, whereas the other
    half is processed by the “main” part. To achieve this goal, I created SumTask,
    which takes the appropriate parameters for the first and second half. One instance
    of this class is called by a new thread and the other directly. To synchronize
    both threads, the main thread waits by `thread.join` until the spawned thread
    is finished (Listing [10-5](#A435427_1_En_10_Chapter.html#Par24)).


