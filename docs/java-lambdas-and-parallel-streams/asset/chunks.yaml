- fmt: '# A First Explanation


    You may well ask, “what the hell are the `stream()` and `parallelStream()` methods?”
    Here is the quick overview; a more detailed description is given in later chapters.


    You may imagine a `Stream` as a continuous flow of data, comparable to something
    like an `InputStream`. The data might be emitted by different sources, such as
    a collection, a file, a generator, or some other source. However, the content
    of this stream is not simply bytes or characters; instead, the stream emits arbitrary
    objects (see Figure [1-1](#A435427_1_En_1_Chapter.html#Fig1)).


    ![A435427_1_En_1_Fig1_HTML.jpg](A435427_1_En_1_Fig1_HTML.jpg)


    Figure 1-1. Stream (quelle is German for source)


    On their journey from source to target, the objects may be filtered, changed,
    transformed, collected, or processed in some other way. How and with whichever
    means this happens I describe later on.


    A `ParallelStream` can be imagined as a parallel stream of objects of the same
    type. The objects are split into different streams at their source (see Figure
    [1-2](#A435427_1_En_1_Chapter.html#Fig2)). Later on, I will discuss the details
    of this splitting task.


    ![A435427_1_En_1_Fig2_HTML.jpg](A435427_1_En_1_Fig2_HTML.jpg)


    Figure 1-2. Parallel streams


    To implement solutions to the challenge, I will use some of Java’s new language
    features, including:


    *   Lambda statements

    *   Functional interfaces

    *   Default methods

    *   Optionals

    *   Streams

    *   Operations on streams


    # 2. The Data


    Back to the challenge.


    I shall analyze data about a large number of persons who buy and sell diverse
    products. The data structure for this task has a simple design: A person has a
    given name, surname, age, and gender. A buyer might also be a vendor. Sales and
    purchases are stored in lists. Each element in this list represents a product
    by its article number, the quantity sold, and the unit price. The unit price may
    change per transaction due to various discounts. The following diagram (Figure
    [2-1](#A435427_1_En_2_Chapter.html#Fig1)) visualizes the class `Person`.


    ![A435427_1_En_2_Fig1_HTML.jpg](A435427_1_En_2_Fig1_HTML.jpg)


    Figure 2-1. Class `Person`


    In the appendix, you’ll find a simple program to create sample data.


    # 3. First Analysis—From Naive to Flexible


    In this section, I will develop traditional solutions to various filtering requirements.
    I avoid using Lambdas or Streams so that the techniques illustrated here can be
    compared with the solutions developed in Chapter [4](#A435427_1_En_4_Chapter.html).


    ## Fix Filter


    The first task is to list all customers who are less than 20 years old. This can
    be done very easily; all we need is a loop with a filter condition to select young
    customers and a target list to collect them (see Listing [3-1](#A435427_1_En_3_Chapter.html#Par3)).


    ```

    1   private List getPersonsLessThan20Years(List persons){

    2     List result = new ArrayList();

    3     for (Person person : persons) {

    4       if (person.getAge() < 20) {

    5         result.add(person);

    6       }

    7     }

    8     return result;

    9   }

    Listing 3-1. Simple Implementation to Select and Collect Persons Younger Than
    20 Years

    ```


    ## Simple Parameterization


    The next requirement is to collect the group of people between 30 and 40 years
    old. Of course, we realize that in the future, we may need to query different
    age groups; so it would be better to parameterize the method rather than hard-coding
    the condition (see Listing [3-2](#A435427_1_En_3_Chapter.html#Par5)).


    ```

    1   private List getPersonsByAgeRange(

    2                                   List persons,

    3                                   int from,

    4                                   int to) {

    5   List result = new ArrayList();

    6     for (Person person : persons) {

    7       if (person.getAge() >= from && person.getAge() <= to) {

    8         result.add(person);

    9       }

    10     }

    11     return result;

    12   }

    Listing 3-2. Parameterized Implementation to Choose All Persons of a Specified
    Age Group

    ```


    Here, the developer has introduced some flexibility. However, this method still
    does no more than select persons of a specified age group. If additional criteria
    are needed, such as querying the gender, this method doesn’t help. A novice programmer
    might try to solve the problem by adding extra parameters for gender, vendor,
    status, and so forth (see Listing [3-3](#A435427_1_En_3_Chapter.html#Par7)).


    ```

    1   private List getPersonsByDiverseCriteria(

    2                                     List persons,

    3                                     int ageFrom,

    4                                     int ageTo,

    5                                     Gender gender,

    6                                     boolean isCustomer,

    7                                     boolean isVendor) {

    8     [loop omitted]

    9   }

    Listing 3-3. Overloading a Method with (Too) Many Parameters

    ```


    Senior developers might shake their heads at such naive code; their experience
    tells them that one day you won’t be able to do your analysis because you will
    need at least one more parameter.


    ## Behavior Parameterization


    The next evolutionary step toward a better solution is to create the condition
    or filter as a stand-alone object and to pass it to the now more general-purpose
    method. This allows the method to be parameterized with different behaviors, or
    different algorithms, reminding us of the strategy pattern.


    For our task, this behavior will implement an interface that contains a test to
    choose a person by a specified condition. Let’s call this interface `Condition`
    (see Listing [3-4](#A435427_1_En_3_Chapter.html#Par11)).


    ```

    1   public interface Condition {

    2     boolean test(T t);

    3   }

    Listing 3-4. Interface Condition

    ```


    Now our method (the loop) needs only two parameters: the list of persons and the
    condition (Listing [3-5](#A435427_1_En_3_Chapter.html#Par13)).


    ```

    1   private List getPersonsByCondition(List persons, \

    3                         Condition condition){

    4     List result = new ArrayList();

    5     for (Person person : persons) {

    6       if (condition.test(person)) {

    7         result.add(person);

    8       }

    9     }

    10     return result;

    11   }

    Listing 3-5. Flexible Filtering Due to Injectable Condition

    ```


    The condition is swapped out and will be injected by a parameter. Thus, there
    is no need to change the implementation of the method when we need a different
    filter. Now let’s refactor our first analysis to get everyone less than 20 years
    old (see Listing [3-6](#A435427_1_En_3_Chapter.html#Par15)).


    ```

    1   class YoungerThanCondition implements Condition{

    2     private final int _age;

    3     YoungerThanCondition(int age){

    4       _age = age;

    5     }


    7     @Override

    8     public boolean test(Person person) {

    9       return person.getAge() < _age;

    10     }

    11   }

    Listing 3-6. Implementation of the Condition According to Interface Condition

    ```


    Now, the code to call our loop and to inject the filter looks more clean and concise
    (Listing [3-7](#A435427_1_En_3_Chapter.html#Par17)).


    ```

    1   persons = getPersonsByCondition(persons, new YoungerThanCondition(20));

    Listing 3-7. Call Loop with Filter

    ```


    Following the object-oriented paradigm, we pass the condition to the method as
    an object. Now, if we need other filter criteria, we simply create different filter
    classes as implementations of the `Condition` interface. The loop to collect the
    persons of interest remains unchanged.'
  raw: '## A First Explanation


    You may well ask, “what the hell are the stream() and parallelStream() methods?”
    Here is the quick overview; a more detailed description is given in later chapters.


    You may imagine a Stream as a continuous flow of data, comparable to something
    like an InputStream. The data might be emitted by different sources , such as
    a collection, a file, a generator, or some other source. However, the content
    of this stream is not simply bytes or characters; instead, the stream emits arbitrary
    objects(see Figure [1-1](#A435427_1_En_1_Chapter.html#Fig1)).


    ![A435427_1_En_1_Fig1_HTML.jpg](A435427_1_En_1_Fig1_HTML.jpg)


    Figure 1-1.


    Stream (quelle is German for source)


    On their journey from source to target, the objects may be filtered, changed,
    transformed, collected, or processed in some other way. How and with whichever
    means this happens I describe later on.


    A ParallelStream can be imagined as a parallel stream of objects of the same type.
    The objects are split into different streams at their source (see Figure [1-2](#A435427_1_En_1_Chapter.html#Fig2)).
    Later on, I will discuss the details of this splitting task.


    ![A435427_1_En_1_Fig2_HTML.jpg](A435427_1_En_1_Fig2_HTML.jpg)


    Figure 1-2.


    Parallel streams


    To implement solutions to the challenge, I will use some of Java’s new language
    features , including


    *   Lambda statements

    *   Functional interfaces

    *   Default methods

    *   Optionals

    *   Streams

    *   Operations on streams


    # 2. The Data


    Back to the challenge.


    I shall analyze data about a large number of persons who buy and sell diverse
    products. The data structure for this task has a simple design: A person has a
    given name, surname, age, and gender. A buyer might also be a vendor. Sales and
    purchases are stored in lists. Each element in this list represents a product
    by its article number, the quantity sold, and the unit price. The unit price may
    change per transaction due to various discounts. The following diagram (Figure
    [2-1](#A435427_1_En_2_Chapter.html#Fig1)) visualizes the class Person.


    ![A435427_1_En_2_Fig1_HTML.jpg](A435427_1_En_2_Fig1_HTML.jpg)


    Figure 2-1.


    Class Person


    In the appendix, you’ll find a simple program to create sample data.


    # 3. First Analysis—From Naive to Flexible


    In this section, I will develop traditional solutions to various filtering requirements.
    I avoid using Lambdas or Streams so that the techniques illustrated here can be
    compared with the solutions developed in Chapter [4](#A435427_1_En_4_Chapter.html).


    ## Fix Filter


    The first task is to list all customers who are less than 20 years old. This can
    be done very easily; all we need is a loop with a filter condition to select young
    customers and a target list to collect them (see Listing [3-1](#A435427_1_En_3_Chapter.html#Par3)).


    ```

    1   private List getPersonsLessThan20Years(List persons){

    2     List result = new ArrayList();

    3     for (Person person : persons) {

    4       if (person.getAge() < 20) {

    5         result.add(person);

    6       }

    7     }

    8     return result;

    9   }

    Listing 3-1.

    Simple Implementation to Select and Collect Persons Younger Than 20 Years

    ```


    ## Simple Parameterization


    The next requirement is to collect the group of people between 30 and 40 years
    old. Of course, we realize that in the future, we may need to query different
    age groups; so it would be better to parameterize the method rather than hard-coding
    the condition (see Listing [3-2](#A435427_1_En_3_Chapter.html#Par5)).


    ```

    1   private List getPersonsByAgeRange(

    2                                   List persons,

    3                                   int from,

    4                                   int to) {

    5   List result = new ArrayList();

    6     for (Person person : persons) {

    7       if (person.getAge() >= from && person.getAge() <= to) {

    8         result.add(person);

    9       }

    10     }

    11     return result;

    12   }

    Listing 3-2.

    Parameterized Implementation to Choose All Persons of a Specified Age Group

    ```


    Here, the developer has introduced some flexibility. However, this method still
    does no more than select persons of a specified age group. If additional criteria
    are needed, such as querying the gender, this method doesn’t help. A novice programmer
    might try to solve the problem by adding extra parameters for gender, vendor,
    status, and so forth (see Listing [3-3](#A435427_1_En_3_Chapter.html#Par7)).


    ```

    1   private List getPersonsByDiverseCriteria(

    2                                     List persons,

    3                                     int ageFrom,

    4                                     int ageTo,

    5                                     Gender gender,

    6                                     boolean isCustomer,

    7                                     boolean isVendor) {

    8     [loop omitted]

    9   }

    Listing 3-3.

    Overloading a Method with (Too) Many Parameters

    ```


    Senior developers might shake their heads at such naive code; their experience
    tells them that one day you won’t be able to do your analysis because you will
    need at least one more parameter.


    ## Behavior Parameterization


    The next evolutionary step toward a better solution is to create the condition
    or filter as a stand-alone object and to pass it to the now more general-purpose
    method. This allows the method to be parameterized with different behaviors, or
    different algorithms, reminding us of the strategy pattern.


    For our task, this behavior will implement an interface that contains a test to
    choose a person by a specified condition. Let’s call this interface Condition
    (see Listing [3-4](#A435427_1_En_3_Chapter.html#Par11)).


    ```

    1   public interface Condition {

    2     boolean test(T t);

    3   }

    Listing 3-4.

    Interface Condition

    ```


    Now our method (the loop) needs only two parameters: the list of persons and the
    condition (Listing [3-5](#A435427_1_En_3_Chapter.html#Par13)).


    ```

    1   private List getPersonsByCondition(List persons, \


    3                         Condition condition){

    4     List result = new ArrayList();

    5     for (Person person : persons) {

    6       if (condition.test(person)) {

    7         result.add(person);

    8       }

    9     }

    10     return result;

    11   }

    Listing 3-5.

    Flexible Filtering Due to Injectable Condition

    ```


    The condition is swapped out and will be injected by a parameter. Thus, there
    is no need to change the implementation of the method when we need a different
    filter. Now let’s refactor our first analysis to get everyone less than 20 years
    old (see Listing [3-6](#A435427_1_En_3_Chapter.html#Par15)).


    ```

    1   class YoungerThanCondition implements Condition{

    2     private final int _age;

    3     YoungerThanCondition(int age){

    4       _age = age;

    5     }


    7     @Override

    8     public boolean test(Person person) {

    9       return person.getAge() < _age;

    10     }

    11   }

    Listing 3-6.

    Implementation of the Condition According to Interface Condition

    ```


    Now, the code to call our loop and to inject the filter looks more clean and concise
    (Listing [3-7](#A435427_1_En_3_Chapter.html#Par17)).


    ```

    1   persons = getPersonsByCondition(persons, new YoungerThanCondition(20));

    Listing 3-7.

    Call Loop with Filter

    ```


    Following the object-oriented paradigm, we pass the condition to the method as
    an object. Now, if we need other filter criteria, we simply create different filter
    classes as implementations of the Condition interface. The loop to collect the
    persons of interest remains unchanged.'
  trans: '

    ## 初步解释


    你可能会问：“`stream()` 和 `parallelStream()` 方法到底是什么？”这里先做一个快速概述；更详细的描述将在后续章节中给出。


    你可以将 Stream 想象成一个连续的数据流，类似于 `InputStream`。数据可能来自不同的数据源，例如集合、文件、生成器或其他来源。不过，这个流的内容不仅仅是字节或字符；相反，流会发出任意对象（见图
    1-1）。


    ![A435427_1_En_1_Fig1_HTML.jpg](img/A435427_1_En_1_Fig1_HTML.jpg)


    图 1-1.


    Stream（quelle 是德语中“源”的意思）


    在从源到目标的旅程中，对象可能会被过滤、更改、转换、收集或以其他方式处理。至于如何以及通过何种方式实现，我将在后面描述。


    `ParallelStream` 可以想象成同一类型对象的并行流。这些对象在源处被分割成不同的流（见图 1-2）。稍后，我将讨论这种分割任务的细节。


    ![A435427_1_En_1_Fig2_HTML.jpg](img/A435427_1_En_1_Fig2_HTML.jpg)


    图 1-2.


    并行流


    为了实现挑战的解决方案，我将使用 Java 的一些新语言特性，包括：


    *   Lambda 表达式

    *   函数式接口

    *   默认方法

    *   Optional

    *   Stream

    *   对 Stream 的操作


    # 2. 数据


    回到挑战。


    我将分析大量买卖各种产品的人员数据。此任务的数据结构设计简单：一个人有名字、姓氏、年龄和性别。买家也可能是卖家。销售和购买记录存储在列表中。该列表中的每个元素通过其商品编号、销售数量和单价来表示一个产品。由于各种折扣，单价可能会因交易而异。下图（图
    2-1）可视化了 Person 类。


    ![A435427_1_En_2_Fig1_HTML.jpg](img/A435427_1_En_2_Fig1_HTML.jpg)


    图 2-1.


    Person 类


    在附录中，你将找到一个用于创建示例数据的简单程序。


    # 3. 初步分析——从朴素到灵活


    在本节中，我将针对各种过滤需求开发传统的解决方案。我避免使用 Lambda 或 Stream，以便此处展示的技术可以与第 4 章中开发的解决方案进行比较。


    ## 固定过滤


    第一个任务是列出所有年龄小于 20 岁的客户。这很容易做到；我们只需要一个带有过滤条件的循环来选择年轻客户，以及一个目标列表来收集他们（见清单 3-1）。


    ```

    1   private List getPersonsLessThan20Years(List persons){

    2     List result = new ArrayList();

    3     for (Person person : persons) {

    4       if (person.getAge() < 20) {

    5         result.add(person);

    6       }

    7     }

    8     return result;

    9   }

    清单 3-1.

    选择并收集年龄小于 20 岁人员的简单实现

    ```


    ## 简单参数化


    下一个需求是收集年龄在 30 到 40 岁之间的人群。当然，我们意识到将来可能需要查询不同的年龄段；因此，最好将方法参数化，而不是硬编码条件（见清单 3-2）。


    ```

    1   private List getPersonsByAgeRange(

    2                                   List persons,

    3                                   int from,

    4                                   int to) {

    5   List result = new ArrayList();

    6     for (Person person : persons) {

    7       if (person.getAge() >= from && person.getAge() <= to) {

    8         result.add(person);

    9       }

    10     }

    11     return result;

    12   }

    清单 3-2.

    选择指定年龄段所有人员的参数化实现

    ```


    在这里，开发者引入了一些灵活性。然而，此方法仍然只能选择指定年龄段的人员。如果需要额外的条件，例如查询性别，此方法就无能为力了。新手程序员可能会尝试通过为性别、卖家、状态等添加额外参数来解决问题（见清单
    3-3）。


    ```

    1   private List getPersonsByDiverseCriteria(

    2                                     List persons,

    3                                     int ageFrom,

    4                                     int ageTo,

    5                                     Gender gender,

    6                                     boolean isCustomer,

    7                                     boolean isVendor) {

    8     [循环省略]

    9   }

    清单 3-3.

    使用（过多）参数重载方法

    ```


    资深开发者可能会对这种天真的代码摇头；他们的经验告诉他们，总有一天你将无法进行分析，因为你至少还需要一个参数。


    ## 行为参数化


    迈向更好解决方案的下一个演进步骤是，将条件或过滤器创建为一个独立的对象，并将其传递给现在更通用的方法。这允许使用不同的行为或不同的算法对方法进行参数化，这让我们想起了策略模式。


    对于我们的任务，此行为将实现一个接口，该接口包含一个根据指定条件选择人员的测试。让我们将此接口称为 `Condition`（见清单 3-4）。


    ```

    1   public interface Condition {

    2     boolean test(T t);

    3   }

    清单 3-4.

    接口 Condition

    ```


    现在，我们的方法（循环）只需要两个参数：人员列表和条件（清单 3-5）。


    ```

    1   private List getPersonsByCondition(List persons, \


    3                         Condition condition){

    4     List result = new ArrayList();

    5     for (Person person : persons) {

    6       if (condition.test(person)) {

    7         result.add(person);

    8       }

    9     }

    10     return result;

    11   }

    清单 3-5.

    由于可注入的条件而实现的灵活过滤

    ```


    条件被抽离出来，并通过参数注入。因此，当我们需要不同的过滤器时，无需更改方法的实现。现在，让我们重构我们的第一个分析，以获取所有年龄小于 20 岁的人（见清单
    3-6）。


    ```

    1   class YoungerThanCondition implements Condition{

    2     private final int _age;

    3     YoungerThanCondition(int age){

    4       _age = age;

    5     }


    7     @Override

    8     public boolean test(Person person) {

    9       return person.getAge() < _age;

    10     }

    11   }

    清单 3-6.

    根据接口 Condition 实现 Condition

    ```


    现在，调用我们的循环并注入过滤器的代码看起来更加简洁明了（清单 3-7）。


    ```

    1   persons = getPersonsByCondition(persons, new YoungerThanCondition(20));

    清单 3-7.

    使用过滤器调用循环

    ```


    遵循面向对象范式，我们将条件作为对象传递给方法。现在，如果我们需要其他过滤条件，我们只需创建不同的过滤器类作为 `Condition` 接口的实现。用于收集感兴趣人员的循环保持不变。

    '
- fmt: '## Anonymous Classes


    But creating a separate class for each different condition still seems to be a
    heavyweight approach. The question is this: “If we only need to use the condition
    in one place, can we create the class just where we’ll need it?” This is where
    anonymous classes come into play (see Listing [3-8](#A435427_1_En_3_Chapter.html#Par20)).


    ```

    1   persons = getPersonsByCondition(persons, new Condition(){

    2         @Override

    3         public boolean test(Person person) {

    4           return person.getAge() < 20;

    5         }

    6       });

    Listing 3-8.

    Parameterize with Anonymous Class

    ```


    Because the anonymous class is just created where it is needed, we can’t reuse
    it. It doesn’t make sense to pass the age as a parameter; we simply write it directly
    into the condition.


    Compared with the fully fledged filter classes, anonymous classes are much shorter.
    But instead of passing a short class name as the parameter, we have to override
    the `test()` method and to write a couple of lines. Anonymous classes are shorter
    than fully fledged classes but move the code into the parameter; this may not
    seem ideal. And by the way—lots of programmers dislike anonymous classes.


    # 4. Lambda Expressions


    After all of these traditional approaches, it’s time to move on to the lambda
    expressions, which have been introduced into Java 8.


    Just to remind you, the method `test()` of the interfaces `Condition` expects
    a `Person` and checks a condition.


    Let’s call this condition a function. Do you remember mathematics at school? Many
    pupils had to learn about functions and expressions such as `x -> f(x)`. This
    meant a value `x` will be mapped to a function of `x`. In our current task, a
    `Person` will be mapped to a function (`Condition`) of `Person`. And Java’s lambda
    syntax reminds you exactly of this. For our concrete analysis, this will be as
    in Listing [4-1](#A435427_1_En_4_Chapter.html#Par4).


    ```

    1   person -> person.getAge() < 20

    Listing 4-1.

    Lambda Expression for Age Condition

    ```


    Now you can use this expression in place of the condition interface (see Listing
    [4-2](#A435427_1_En_4_Chapter.html#Par6)).


    ```

    1   persons = getPersonsByCondition(

    2                       persons,

    3                       person -> person.getAge() < 20);

    Listing 4-2.

    Collect Persons with Lambda Expression

    ```


    This is concise and clear code, easy to read and understandable—once you are familiar
    with this syntax. Even (or especially?) for senior developers, the unusual syntax
    is often the biggest hurdle.


    I predict that once a programmer has chummed up with it, he or she usually doesn’t
    want to miss it anymore.


    Finally it is possible to exchange the condition for our analysis in an easy way.
    The example in Listing [4-3](#A435427_1_En_4_Chapter.html#Par10) shows how to
    select all female persons.


    ```

    1   persons = getPersonsByCondition(

    2   persons,

    3   person -> person.getGender() == Gender.Female);

    Listing 4-3.

    Changing the Filter by Just a Lambda Expression

    ```


    ## Functional Interface


    Lambda expressions may be used where a functional interface is expected. We call
    an interface functional interface if it defines accurately one abstract method.
    The lambda expression overrides this method.


    With Java 8, a couple of predefined functional interfaces are included (e.g.,
    see Figure [4-1](#A435427_1_En_4_Chapter.html#Fig1)). Therefore, an extra definition
    such as the one we did with `Condition` is not needed. In our case, we could use
    the predefined interface `Predicate`, which is used to check such a condition.
    A list of the functional interfaces available with Java 8 can be read at [Oracle](https://docs.oracle.com/javase/8/docs/api/java/util/function/package-summary.html).[¹](#A435427_1_En_4_Chapter.html#Fn1)


    ![A435427_1_En_4_Fig1_HTML.jpg](A435427_1_En_4_Fig1_HTML.jpg)


    Figure 4-1. Predefined Functional Interfaces


    These functional interfaces usually are annotated with `@FunctionalInterface`.
    This is an informative annotation and might be used by an IDE (integrated development
    environment) or by the compiler who is able to check the requirements of such
    an interface. However, for the usage with a lambda expression, this interface
    is not needed.


    The functional interfaces defined with Java 8 mostly contains other useful concrete
    methods. A method implementation within an interface is a new feature of Java
    8. These so called default methods are preconditions for extensions such as the
    new Stream API, and I will describe them later on.


    ## Lambda Notation


    Because of the interface that has to be implemented, the compiler has the ability
    to determine the count and the data types of the expected parameters. The names
    of the parameters don’t matter and can be freely chosen by the programmer—like
    you do for parameters of methods you’ll write. If there are at least two parameters
    or you want (or need to) declare a type, then the parameters need to be surrounded
    by parentheses—like parameters of a method. If there is only one parameter and
    no type declared, then the parentheses might be omitted. Hence, these notations
    are equivalent (see Listing [4-4](#A435427_1_En_4_Chapter.html#Par17)).


    ```

    1   persons = getPersonsByCondition(persons, person -> person.getAge()  p.getAge()  p.getAge()
    < 20);

    Listing 4-4.

    Different Notations of a Lambda Expression

    ```


    In detail, a lambda expression consists of a parameter list, the lambda operator
    `->` (minus + greater than character), and a statement. As usual, this statement
    may be a block statement, which is built up by a couple of substatements.


    ```

    (parameter list) -> statement

    ```


    Here are the most important rules mentioned in brief: Type + name like method
    parameters in parentheses `(int x, int y) -> x * y;`


    Clearly, determinable types might be omitted.


    ```

    (x, y) -> x * y;

    ```


    An empty parameter list is possible too and needs a pair of parentheses.


    ```

    () -> getVendorCount(persons)

    ```


    If there is only one parameter without any type declaration, the parentheses might
    be omitted.


    ```

    x -> x * x;

    ```


    As special notations, lambda expressions may be replaced by a so-called method
    or object references.


    - `class::method`

    - `object::method`


    Let’s take a look at the class `Person`. This contains a boolean method `isVendor()`.
    If this is needed in a condition, then the lambda expression would be


    ```

    p -> p.isVendor()

    ```


    Using a method reference instead will change the code too.


    ```

    Person::isVendor

    ```


    Observe the discontinuance of the parentheses. Using a method reference sometimes
    can lead to a more concise notation. I mention it here for completeness. Later
    on in this book, I use it rarely and without further explanation. Detailed information
    about this matter is available, for example, in the [Java tutorials](https://docs.oracle.com/javase/tutorial/java/javaOO/methodreferences.html).[²](#A435427_1_En_4_Chapter.html#Fn2)'
