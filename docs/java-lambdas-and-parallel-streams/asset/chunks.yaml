  trans: "\n## 收集\n\n在简要了解了 Java 并发机制之后，我们将回到并行流和 `collect()` 方法。之前提到的那个接受三个参数的重载方法定义如下：\n\
    \n```\n1    R collect(Supplier supplier,\n2                 BiConsumer accumulator,\n\
    3                 BiConsumer combiner);\n```\n\n第一个参数接受一个函数，该函数提供类型为 R 的新结果容器。我们使用\
    \ `SummingUnit` 作为 R 的类型。\n\n累加器参数是一个函数，它接受一个结果容器 R（即 `SummingUnit`）和一个类型为 T 的流对象。在我们的示例中，这个对象是其中一个数字。\n\
    \n最后一个参数接受一个函数，Java 会向该函数传入两个结果容器。此函数执行合并操作。\n\n综合以上所有内容，我们在 collect 方法中使用 `SummingUnit`（清单\
    \ 10-6）。\n\n```\n1   System.out.println(\"total: \" +\n2     numbers.parallelStream().collect(\n\
    3       () -> new SummingUnit(),     // supplier\n4       (summingUnit, value)\
    \ ->\n5         summingUnit.sum(value),    // accumulator\n6       (summingUnit,\
    \ other) ->\n7         summingUnit.combine(other) // combiner\n8     ).getSum()\n\
    9   );\n清单 10-6.\n在 Collect 中使用 SummingUnit\n```\n\n现在，如果你运行这个程序，可能会发现应用打印出了几个“ctor\
    \ SummingUnit”实例。请记住，我们在 SummingUnit 的构造函数中打印了这条信息。这表明 Java 调用了多个线程来执行工作。实际上，Java\
    \ 使用了 fork/join 框架来调度线程。该框架的原则是判断任务是否足够小以串行执行。如果任务较大，则会将问题分解（最好分成两个大小相似的部分），然后两个部分会在不同的线程中处理。因此，这个算法是递归应用的。\n\
    \n如果你对 fork/join 框架的更多细节感兴趣，请参考 [Java 教程](https://docs.oracle.com/javase/tutorial/essential/concurrency/forkjoin.html)。³\n\
    \n如前所述，你可以自由选择 lambda 参数的名称。其作用域非常狭窄。因此，通常选择简短的名称。\n\n```\n1   .collect(() ->\
    \ new SummingUnit(),\n2   (s, v) -> s.sum(v), (s, o) -> s.combine(o))\n```\n\n\
    或者，我们可以使用方法引用。\n\n```\n1   .collect(SummingUnit::new, SummingUnit::sum, SummingUnit::combine)\n\
    ```\n\n正如前面的示例所示，收集数据相当容易。通常，并行运行如此简单的任务并不值得，但将所学知识迁移到你技术领域中更复杂的任务应该没有问题。特别是运行时间较长的任务能从并行中获益。\n\
    \n除了向 `collect()` 方法传递一组函数外，我们还可以编写一个 Collector，并将其传递给 `collect()`。以下是该重载方法的签名：\n\
    \n```\n1    R collect(Collector collector);\n```\n\nCollector 是一个我们需要实现的接口。我们创建一个类\
    \ `SummingCollector`，它将总和作为最终结果返回。\n\n```\n1   System.out.println(\"total: \"\
    \ +\n2             numbers.parallelStream().collect(new SummingCollector()));\n\
    ```\n\nCollector 接口强制我们重写一些返回函数的方方法。使用 lambda，定义可以作为参数传递的函数非常容易。除了（惊喜！）supplier、accumulator\
    \ 和 combiner 之外，我们还需要重写 finisher。finisher 接受最后一个剩余的结果容器进行进一步处理。我们的 collector 将返回最终的总和。\n\
    \n为了重用我们已经开发的大部分代码，SummingCollector 会在内部将大部分任务委托给 SummingUnit。\n\n我们需要重写的最后一个方法返回一组特征（清单\
    \ 10-7）。\n\n```\n1   public class SummingCollector\n2                 implements\
    \ Collector{\n3     @Override\n4     public Supplier supplier() {\n5       return\
    \ () -> new SummingUnit();\n6     }\n\n8   @Override\n9   public BiConsumer accumulator()\
    \ {\n10     return (s, v) -> s.sum(v);\n11   }\n\n13   @Override\n14   public\
    \ BinaryOperator combiner() {\n15     return (left, right) -> {left.combine(right);\
    \ return left;};\n16   }\n\n18   @Override\n19   public Function finisher() {\n\
    20     return s -> s.getSum();\n21   }\n\n23   @Override\n24   public Set characteristics()\
    \ {\n25     return EnumSet.of(Characteristics.UNORDERED);\n26     // 不要添加 \",\
    \ Characteristics.CONCURRENT\"!\n27   }\n清单 10-7.\nSummingCollector\n```\n\n我们使用三个类型\
    \ `<T, A, R>` 对 Collector 接口进行参数化，如签名所示。这里 T 是 Long（一个数字），A 被替换为 SummingUnit，最终的结果类型\
    \ R 也是 Long：即最终的总和。\n\n因为我们没有返回 CONCURRENT 特征，所以每个线程都会调用 supplier 函数。你可以通过观察对象构造期间的输出来查看这一点。\n\
    \n如果我们提供了 CONCURRENT 特征，Java 会假定 supplier 已启用多线程支持。它将只创建一个 SummingUnit，由所有线程共享。猜猜看，结果会因运行而异，因为我们有一个存在竞态条件的临界区。\n\
    \n## 总结\n\n在本章中，我们讨论了收集器的原理。示例展示了如何实现一个收集器。流的并行版本使用起来非常简单，并且隐藏了所有关于线程、锁定、同步的繁琐细节。但是，对\
    \ Java 并发特性以及竞态条件等典型问题稍有了解，有助于编写正确的收集器。\n\n## 最终思考\n\n尽管这个示例对于讨论并行性的某些方面非常有用，但由于以下几个原因，它并非一个现实世界的示例：\n\
    \n1.  没有必要实现一个求和函数，因为 Java 提供了一个现成的\n\n    ```\n    numbers.parallelStream().mapToLong(i\
    \ -> i).sum();\n    ```\n\n    Java 内部使用一个“肮脏”的技巧来实现求和，即使用一个数组来保存简单的值。  \n2. \
    \ 除了收集数据，我们也可以简单地归约数据。\n\n    ```\n    numbers.parallelStream().reduce(0L, (a,\
    \ c) -> a + c);\n    ```\n\n    reduce 函数在每次加法时都会创建一个新对象。它从零开始。然后它接受两个参数：累加器和当前对象。它返回两者的和，该和作为一个新对象存储到累加器中。因为没有共享对象，所以没有共享状态，也没有竞态条件等。\n\
    \n但有时我们确实需要一个收集器，例如，如果我们想将对象收集到集合或映射中。这将在下一章中展示。\n\n脚注 1\n\n[`https://docs.oracle.com/javase/tutorial/essential/concurrency/procthread.html`](https://docs.oracle.com/javase/tutorial/essential/concurrency/procthread.html)\n\
    \n  2\n\n[`https://www.cs.umd.edu/~pugh/java/memoryModel/jsr-133-faq.html`](https://www.cs.umd.edu/%7Epugh/java/memoryModel/jsr-133-faq.html)\n\
    \n  3\n\n[`https://docs.oracle.com/javase/tutorial/essential/concurrency/forkjoin.html`](https://docs.oracle.com/javase/tutorial/essential/concurrency/forkjoin.html)\n"
- fmt: '# 11. `GroupingCollector`


    Let‘s assume we want to calculate the average spending of persons, grouped by
    age. We want to create a collector that returns a `Map<Integer, Double>` in which
    the `Integer` represents the age group and the `Double` represents average spendings.


    To verify this collector, we use a simple output:


    ```

    1   [. . .]


    3   [ommited: create persons as shown before]


    5   printResults(persons.getPersons().parallelStream()

    6     .collect(new GroupAverageCollector()));


    8   [. . .]


    10   private static void printResults(Map results) {

    11     System.out.println("");

    12     for (int group : results.keySet()) {

    13       System.out.println("Group: " + group + ";  avg: " + results.get(group));

    14     }

    15   }

    Listing 11-1.

    Preparing the output

    ```


    Remember the data structure introduced at the beginning of this book. All of the
    persons contain a list of buyings. The prices are internally stored at cents to
    avoid floating point operations. To keep the collector lean, we use a helping
    class that sums up the cents and the person count and calculates the average =
    `sum(cents) / 100 / personCount`.


    ```

    1   public class AverageBuilder {


    3     private int _count;

    4     private long _cents;


    6     public int getCount() {

    7       return _count;

    8     }


    10    public long getCents() {

    11      return _cents;

    12    }


    14    public void add(long cents) {

    15      _count++;

    16      _cents += cents;

    17    }


    19    public void add(AverageBuilder other) {

    20      _count += other.getCount();

    21      _cents += other.getCents();

    22    }


    24    public double getAverage() {

    25      return _cents / 100D / _count;

    26    }

    27   }

    Listing 11-2.

    Helper class to calculate the average

    ```


    This class contains two `add` methods: one to add the spendings of one person
    and the second to combine two `AverageBuilder`s.


    In Chapter [10](#A435427_1_En_10_Chapter.html), we started with a `SummingUnit`,
    which was reused within the collector. The collector we use in this chapter is
    not based on such an existing class. Instead, it contains the functions to accumulate,
    combine, and finish:


    ```

    1   public class GroupAverageCollector implements

    2       Collector, Map> {


    4     @Override

    5     public Supplier> supplier() {

    6       return () -> new HashMap();

    7     }


    9     @Override

    10    public BiConsumer, Person> accumulator() {

    11      return (m, p) -> add(m, p);

    12    }


    14    @Override

    15    public BinaryOperator> combiner() {

    16      return (left, right) -> {

    17        combine(left, right);

    18        return left;

    19      };

    20    }


    22    @Override

    23    public Function, Map> finisher() {

    24      return m -> finish(m);

    25    }


    27    @Override

    28    public Set characteristics() {

    29      return EnumSet.of(Characteristics.UNORDERED);

    30      // no Characteristics.CONCURRENT!

    31    }


    33    private static void add(Map map, Person person) {

    34      int group = person.getAge() / 10;

    35      if (!map.containsKey(group)) {

    36        map.put(group, new AverageBuilder());

    37      }

    38      long cents = person.getBuying().values()

    39              .stream().mapToLong(a -> a.getAmount().getCents()).sum();

    40      map.get(group).add(cents);

    41    }


    43    private static void combine(Map left,

    44            Map right) {

    45      for (int group : right.keySet()) {

    46        if (!left.containsKey(group)) {

    47          left.put(group, right.get(group));

    48        } else {

    49          left.get(group).add(right.get(group));

    50        }

    51      }

    52    }


    54    private static Map finish(Map map) {

    55      Map result = new HashMap();

    56      for (int group : map.keySet()) {

    57        result.put(group, map.get(group).getAverage());

    58      }

    59      return result;

    60    }


    62 }

    Listing 11-3.

    GroupAverageCollector implementing accumulator, combiner, and finisher

    ```


    Line 2. This collector takes object of type `Person`. It accumulates the values
    in a `Map<Integer, AverageBuilder>` and returns a `Map<Integer, Double>`.


    Line 6. The supplier produces a new `HashMap` for every thread because there is
    no `Characteristics.CONCURRENT`.


    Line 11. Remember `accumulator`, `combiner`, and `finisher` do not return values
    but pointers to the functions that are implemented within this collector as static
    functions (methods).


    Line 3. In this example, the age groups are simply calculated by an integer division.


    Line 39. All buyings are stored within a list. We use a stream to sum up the cents.


    The `combine` function merges two maps into one, and the `finish` function transforms
    the intermediate result into the required output format. All functions shall be
    understandable to you as a Java developer.


    Because we did not use `Characteristics.CONCURRENT`, the stream framework creates
    a new map per thread. Although processed in parallel, the functions are implemented
    as in the good old days of simple sequential programming.


    What would happen if we use `Characteristics.CONCURRENT`? Before you continue
    reading, please think about this. Hopefully you‘ll recognize all the implications.


    (Take some time to think about it)


    As mentioned before, the framework will call the supplier only once. It creates
    one map, which is used within all threads. First of all, a `HashMap` is not a
    thread save. This can be solved easily by replacing it with a `ConcurrentHashMap`.
    But if you run the program, you‘ll get non-deterministic results.


    The `add` method is a critical section. It might be interrupted at any time. And
    it contains a shared state. Both might result in false values as described in
    Chapter [10](#A435427_1_En_10_Chapter.html). A simple solution is to make the
    `add` synchronized:


    ```

    1   private static synchronized void add(Map map, Person person) {...}

    Listing 11-4.

    Critical section protected by synchronized

    ```


    Because synchronization slows down the performance, this usually is not a good
    choice.


    ## Summary


    In this chapter, I discussed a collector that really “collects” data. Depending
    on the design and the characteristics of the collector, special multithreaded
    handling might be avoided. Thus, parallel programming without explicit synchronization,
    locking, and so forth is prevalent possible. But a basic knowledge of multithreading
    pitfalls is necessary to create sequential-alike programs that fit well in a parallel
    processing environment.


    ## Final Thoughts


    The intention of this compact book is to show you the principles of Java lambdas
    and parallel streams. It does not explain every detail such as every intermediate
    or final operator. With the knowledge of its principles, it should be no problem
    to understand these operations by exploring the API documentation. One good starting
    point is the documentation of the package `java.util.stream` ( [`https://docs.oracle.com/javase/8/docs/api/index.html?java/util/stream/package-summary.html`](https://docs.oracle.com/javase/8/docs/api/index.html?java/util/stream/package-summary.html)
    ).


    One last tip to start your journey: A great way to learn how to use streams is
    to do it interactively. Java 9 comes with an interactive shell that is great for
    this purpose. As of the time of this writing, Java 9 is available as an early
    access version ( [`https://jdk9.java.net`](https://jdk9.java.net) ). I irregularly
    blog about this shell ( [`http://blog.mueller-bruehl.de`](http://blog.mueller-bruehl.de)
    ). The main article so far is “Interactive Java with jshell” ( [`http://blog.mueller-bruehl.de/netbeans/interactive-java-with-jshell`](http://blog.mueller-bruehl.de/netbeans/interactive-java-with-jshell)
    ).


    Now it is time to let you explore the great world of lambdas and streams by yourself.
    I hope this book was quite interesting, understandable, and valuable to you. Let
    me know!'
