- fmt: '# Rules to Choose a Default Method


    Java 8 defines some rules for which method will be used in case of homonymous
    methods. If it can’t be decided, the compiler will report an error.


    As the name default method implies, this method is only used as a default if no
    implementation is used in the implementing class. If there are homonymous methods
    in different interfaces the class will implement, the compiler will choose the
    method that is “closest” to the class. This is independent from the fact of whether
    theses interfaces are derived from each other or are independent.


    The following examples will demonstrate this (see Listings [5-1](#A435427_1_En_5_Chapter.html#Par20)
    to [5-3](#A435427_1_En_5_Chapter.html#Par22)).


    ```

    1   public interface InterfaceA {

    2     default void print (){

    3       System.out.println("InterfaceA");

    4     }

    5   }

    Listing 5-1.

    Interface with Default Method

    ```


    ```

    1   public class InterfaceImplementor implements InterfaceA{}

    Listing 5-2.

    Implementing Class (Without Further Functionality)

    ```


    ```

    1   public class InterfaceDemo {

    2       public static void main(String[] args) {

    3         new InterfaceImplementor().print();

    4       }

    5   }

    Listing 5-3.

    Invocation of the Class

    ```


    ![A435427_1_En_5_Figa_HTML.jpg](A435427_1_En_5_Figa_HTML.jpg) Create a Java project
    using these three files to comprehend the operating mode.


    As you may have expected, this small demo simply prints out `InterfaceA`. The
    a next interface with a homonymous method will be added (see Listing [5-4](#A435427_1_En_5_Chapter.html#Par25)).


    ```

    1   public interface InterfaceB {

    2     default void print (){

    3       System.out.println("InterfaceB");

    4     }

    5   }

    Listing 5-4.

    InterfaceB with Homonymous Default Method

    ```


    Last but not least, the class `InterfaceImplementor` needs to implement this additional
    interface (Listing [5-5](#A435427_1_En_5_Chapter.html#Par27)).


    ```

    1   public class InterfaceImplementor implements InterfaceA, InterfaceB{}

    Listing 5-5.

    Implementing Class (Without Further Functionality)

    ```


    A modern IDE will alert an error (see Figure [5-1](#A435427_1_En_5_Chapter.html#Fig1)).


    ![A435427_1_En_5_Fig1_HTML.jpg](A435427_1_En_5_Fig1_HTML.jpg)


    Figure 5-1.


    NetBeans alerts misusage


    In either case, the compiler will tell you that it can’t compile this program.
    What will happen if you create inheritance with these interfaces?


    In the case of the preceding example, it is possible to inherit from `InterfaceA`
    and/or `InterfaceB`. As long as you use two different interfaces in your implementing
    class, which have different homonymous default methods, the compiler will alert
    an error.


    It becomes a bit different if the interfaces inherit from a common interface that
    has such a default method. Create two interfaces that both inherit from `InterfaceA`.
    One of them will override the default method. For brevity, these three files are
    shown as one listing (Listing [5-6](#A435427_1_En_5_Chapter.html#Par32)).


    ```

    1   public interface InterfaceA11 {

    2     default void print (){

    3       System.out.println("InterfaceA11");

    4     }

    5   }


    7   public interface InterfaceA12 {}


    9   public class InterfaceImplementor implements InterfaceA11, InterfaceA12{}

    Listing 5-6.

    Inheritance of Default Method

    ```


    If you run this program, it will print out `InterfaceA11`. The `print` method
    of `InterfaceA11` resides on the lowest level of the inheritance hierarchy. Thus,
    it is “closest” to the implementing class. The same is valid if you implement
    interfaces from different hierarchic levels.


    ```

    public class InterfaceImplementor implements InterfaceA, InterfaceA11{}

    ```


    This will call the `print` method from `InterfaceA11` too.


    If you want to program and use two homonymous methods on the same level, for example,
    develop a `print` method in `InterfaceA12` too, the compiler can’t determine which
    to choose and reports an error.


    ## Summary


    Default methods enable the enhancement of existing interfaces without breaking
    compatibility. In this sense, they build the foundation for new features like
    `stream()`, which I describe later on. Before, I have to discuss another enhancement:
    the `Optional` class.


    Read further descriptions of default methods in the Internet, for example, at
    [Oracle](https://docs.oracle.com/javase/tutorial/java/IandI/defaultmethods.html)
    .[¹](#A435427_1_En_5_Chapter.html#Fn1)


    Footnotes [1](#A435427_1_En_5_Chapter.html#Fn1_source)


    [`https://docs.oracle.com/javase/tutorial/java/IandI/defaultmethods.html`](https://docs.oracle.com/javase/tutorial/java/IandI/defaultmethods.html)


    # 6. Optional


    First of all, we take a look at another family of classes that play their role
    in using the new streams: `Optional`.


    As you know, if you declare but do not initialize an object in Java, its value
    is `null`. If you try to access a method of an object with value of `null`, you’ll
    get a null pointer exception. Sadly, we cannot avoid a `null` value at any time.
    At least we need a something to represent the absence of an object. To avoid null
    pointer exceptions, you need to check many places within your software diverse
    variables for a `null` value (see Listing [6-1](#A435427_1_En_6_Chapter.html#Par3)).


    ```

    1   String name;

    2   [...]

    3   if (name != null) {...}

    Listing 6-1.

    Check for Non-Null Value

    ```


    Java 8 introduced the class `Optional`, which encapsulates an optional object
    and offers methods to check the content (Listing [6-2](#A435427_1_En_6_Chapter.html#Par5)).


    ```

    1   Optional name;

    2   [...]

    3   if (name.isPresent()){...}

    Listing 6-2.

    Check for Presence

    ```


    At first glance, this looks like replacing one evil with another. Still, there
    are the same amount of checks, not for `null` but for presence. And an additional
    class is required. So where is the excess profit?


    The class `Optional` offers a bit more than just simple tests for presence. First
    of all, you may tell this class which exception to throw in case of the absence
    of the encapsulated object. Replacing the dumb null pointer exception by one of
    your choice in conjunction with a detailed message is a great plus in case of
    error. On the other hand, `Optional` offers some methods to retrieve a value.


    To access the encapsulated object, you use the method `get()`. And with `orElse()`
    you specify an alternative, which is used in case of an absence value. This prevents
    you from any “no value exception” and allows you to develop your software with
    less checks.


    You’ll find more details about `Optional` within the [API documentation](https://docs.oracle.com/javase/8/docs/api/java/util/Optional.html)
    .[¹](#A435427_1_En_6_Chapter.html#Fn1)


    At the beginning of this chapter, I talked about a family of classes. `Optional`
    is a single class that is directly derived from `Object`. Besides that, there
    are the classes `OptionalDouble`, `OptionalInt`, `OptionalLong`, which are directly
    derived from `Object` too. These classes have a similar behavior to `Optional`.
    Thus, this class family is neither defined by inheritance from a common parent
    nor by implementing a common interface. These classes are simply programmed in
    a similar way and implement a behavior that is close together.


    There are slightly different methods. For example, to retrieve the value of an
    optional `Double`, the method is not `get()` but `getAsDouble()` —and we use it
    when we learn about Streams in Chapter [7](#A435427_1_En_7_Chapter.html).


    Footnotes [1](#A435427_1_En_6_Chapter.html#Fn1_source)


    [`https://docs.oracle.com/javase/8/docs/api/java/util/Optional.html`](https://docs.oracle.com/javase/8/docs/api/java/util/Optional.html)'
