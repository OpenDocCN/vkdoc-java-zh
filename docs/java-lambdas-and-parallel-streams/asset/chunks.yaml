    # 1. Introduction


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-2487-8_​1](http://dx.doi.org/10.1007/978-1-4842-2487-8_1))
    contains supplementary material, which is available to authorized users.


    ## Lambdas and (Parallel) Streams


    Some of the new features introduced in Java 8, such as the new Date and Time API
    (application program interfaces), feel quite familiar and can be used immediately
    by an experienced Java developer. But some of the most important enhancements,
    including Lambdas and Streams, require the developer to learn some new concepts.
    Lambda statements in particular introduce a syntax that is quite unusual for object-oriented
    programmers. These language constructs are known only to developers who used functional
    programming languages or enhancements like Microsoft’s Linq (Language Integrated
    Query ). This special syntax takes some getting used to, and some developers may
    even be a little frightened at first glance. However, these enhancements are extremely
    powerful, and it is certainly worth taking the time to understand how they can
    help you to write code that is not only concise but also faster to write and more
    reusable.


    In this book, I start with an explanation of Lambda expressions; show how they
    can be used with Streams; and finally, discuss how both Lambdas and Streams can
    be combined to implement effective parallel processing.


    The following task will run like a golden thread through the book:


    ## The Challenge


    *   Analyze a bigger amount of data according to varying criteria

    *   Parallelize this task without explicit use of thread management, synchronization,
    Excecutor, or ForkJoin


    ## The Solution


    Use parallelStream() instead of stream()!'
