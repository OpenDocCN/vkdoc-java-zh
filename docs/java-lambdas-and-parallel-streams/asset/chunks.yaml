- fmt: '### Persons


    Within the class `Person`, not only name and age, but also buyings—and (in case
    of vendor) sellings—are stored (Listing [A-7](#A435427_1_En_BookBackmatter_OnlinePDF.html#Par21)).
    For the latter, a `ConcurrentHashMap` is used (instead of a simple `HashMap`).
    This is one of the little prerequisites for parallelism (see the description in
    the text).


    ```

    1   public class Person {


    3     private String _givenName;

    4     private String _surname;

    5     private Gender _gender;

    6     private int _age;

    7     private Map _selling = new ConcurrentHashMap();

    8     private Map _buying = new ConcurrentHashMap();

