- '# 1. 引言


  电子补充材料 本章的在线版本 (doi:[10.​1007/​978-1-4842-2487-8_​1](http://dx.doi.org/10.1007/978-1-4842-2487-8_1))
  包含补充材料，仅供授权用户使用。


  ## Lambda 表达式与（并行）流


  Java 8 中引入的一些新特性，例如新的日期和时间 API（应用程序编程接口），对于经验丰富的 Java 开发者来说感觉相当熟悉，可以立即使用。但一些最重要的增强功能，包括
  Lambda 表达式和流，要求开发者学习一些新概念。特别是 Lambda 语句引入了一种对面向对象程序员来说相当不寻常的语法。这些语言结构只有使用过函数式编程语言或类似
  Microsoft 的 Linq（语言集成查询）等增强功能的开发者才熟悉。这种特殊的语法需要一些时间来适应，有些开发者甚至可能在初看时感到些许畏惧。然而，这些增强功能极其强大，花时间理解它们如何帮助你编写不仅简洁，而且编写速度更快、可重用性更高的代码，绝对是值得的。


  在本书中，我将从解释 Lambda 表达式开始；展示如何将它们与流一起使用；最后，讨论如何将 Lambda 表达式和流结合起来实现有效的并行处理。


  以下任务将像一条金线贯穿全书：


  ## 挑战


  *   根据不同的标准分析大量数据

  *   在不显式使用线程管理、同步、Executor 或 ForkJoin 的情况下并行化此任务


  ## 解决方案


  使用 parallelStream() 代替 stream()！




  ## 初步解释


  你可能会问：“`stream()` 和 `parallelStream()` 方法到底是什么？”这里先做一个快速概述；更详细的描述将在后续章节中给出。


  你可以将 Stream 想象成一个连续的数据流，类似于 `InputStream`。数据可能来自不同的数据源，例如集合、文件、生成器或其他来源。不过，这个流的内容不仅仅是字节或字符；相反，流会发出任意对象（见图
  1-1）。


  ![A435427_1_En_1_Fig1_HTML.jpg](img/A435427_1_En_1_Fig1_HTML.jpg)


  图 1-1.


  Stream（quelle 是德语中“源”的意思）


  在从源到目标的旅程中，对象可能会被过滤、更改、转换、收集或以其他方式处理。至于如何以及通过何种方式实现，我将在后面描述。


  `ParallelStream` 可以想象成同一类型对象的并行流。这些对象在源处被分割成不同的流（见图 1-2）。稍后，我将讨论这种分割任务的细节。


  ![A435427_1_En_1_Fig2_HTML.jpg](img/A435427_1_En_1_Fig2_HTML.jpg)


  图 1-2.


  并行流


  为了实现挑战的解决方案，我将使用 Java 的一些新语言特性，包括：


  *   Lambda 表达式

  *   函数式接口

  *   默认方法

  *   Optional

  *   Stream

  *   对 Stream 的操作


