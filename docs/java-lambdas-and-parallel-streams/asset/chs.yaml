  ）。到目前为止的主要文章是“使用 jshell 进行交互式 Java 编程”（ [`http://blog.mueller-bruehl.de/netbeans/interactive-java-with-jshell`](http://blog.mueller-bruehl.de/netbeans/interactive-java-with-jshell)
