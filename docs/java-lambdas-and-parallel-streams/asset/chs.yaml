- "# 9. 并行流\n\n如果通过使用 `parallelStream` 能够正确地并行处理数据，你需要考虑一些辅助条件。如果不遵守这些条件，Java 要么会禁止并行执行，要么你可能会得到意想不到的结果。\n\
  \n*   使用无状态的 lambda 表达式。状态意味着你在某处（例如，在一个变量中）保存了一个值。现在，如果 lambda 表达式的未来执行依赖于这个值，那么并行执行的行为可能会变得不确定。结果可能变得不可预测。幸运的话，编译器会阻止并行化。否则，你会对结果感到困惑。\n\
  *   不要改变流所基于的数据。例如，如果你在遍历集合时添加或删除元素，在顺序处理时可能还能工作。这样的代码是不健康的，并且常常会导致异常。对于并行流，你不能使用这种糟糕的代码：你总是会得到一个异常。\n\
  *   避免副作用。这是函数式编程的主要原则。当提供相同的参数时，一个函数总是返回相同的结果。应该避免像改变一个作用域更广的变量这样的副作用。如果你正在使用流，并且想使用一个作用域更广的变量，只有当这些变量像\
  \ final 变量一样被使用时，编译器才会接受。像 NetBeans 这样的现代 IDE 会给你建议：从 lambda 表达式引用的变量必须是 final 的，或者实际上是\
  \ final 的。\n*   处理必须与顺序无关。因为在并行处理的情况下，顺序是不确定的，所以结果不依赖于处理顺序是至关重要的。或者你需要强制进行有序处理。这会产生一些开销，可能会消耗你通过并行化节省的时间。一个依赖于特定顺序的计算问题可以通过下面的例子来研究。看似相同的计算以三种不同的方式实现。为了重现稳定或变化的结果，每个变体都被多次调用。\n\
  \n```\n1   long[] result = new long[1];\n\n3   for (int i = 0; i < 5; i++) {\n4\
  \     result[0] = 0;\n5     LongStream.range(0, 1000)\n6       .forEach(n -> result[0]\
  \ = (result[0] + n) * n);\n7     System.out.println(\"serial: \" + result[0]);\n\
  8   }\n\n10   for (int i = 0; i < 5; i++) {\n11     result[0] = 0;\n12     LongStream.range(0,\
  \ 1000).parallel()\n13       .forEach(n -> result[0] = (result[0] + n) * n);\n14\
  \     System.out.println(\"parallel: \" + result[0]);\n15   }\n\n17   for (int i\
  \ = 0; i < 5; i++) {\n18     result[0] = 0;\n19     LongStream.range(0, 1000).parallel()\n\
  20       .forEachOrdered(n -> result[0] = (result[0] + n) * n);\n21     System.out.println(\"\
  parallel ordered: \" + result[0]);\n22   }\n清单 9-1.\n顺序、并行和有序并行处理\n```\n\n该流通过 `range`\
  \ 生成为一个 `LongStream`。这会在所需范围内提供数字。`Collection` 接口中没有 `parallelStream`，但你可以通过 `parallel()`\
  \ 切换到并行处理。\n\n顺序变体以及有序并行变体总是报告结果为 3003755479748501215，而无序并行版本会产生不同的结果。\n\n`result[0]\
  \ = (result[0] + n) * n)` 的计算依赖于顺序。很明显，如果 n 的位置是 0，那么下一个中间结果将是 0（如果最后处理，最终结果也是 0）。因为零会在任何时候被使用，你无法预测结果。如果你进一步研究数学，就会发现对于任何其他值，它也依赖于顺序。\n\
  \n为了简单演示，这三个演示都使用了副作用。所有中间结果都将存储在一个外部变量中。由于这必须是实际上是 final 的，我们使用了一个小技巧：我们使用了一个数组，而不是一个\
  \ `long`。\n\n在生产应用中，永远不要使用这种小技巧！这是一个干净的变体。\n\n```\n1   long reduce = LongStream.range(0,\
  \ 1000).reduce(0, (a, c) -> (a + c) * c);\n```\n\n对于那些不熟悉 lambda 的人来说，这看起来非常奇怪，而那个“脏”的解决方案似乎更容易理解。这就是我为什么用它来做演示。永远不要害怕干净的解决方案。使用\
  \ lambda 一小段时间后，这种编程方式就相当容易了。\n\n这里是对终端 `reduce` 操作的简短解释。第一个参数用于初始化一个累加器。第二个操作是一个二元函数，它接收累加器\
  \ (a) 和流的当前对象 (c)。此操作的结果将替换累加器的先前值，并可用于流的下一个对象。\n\n*   通过使用 `Collect` 并考虑 `Concurrent`\n\
  \n```\n    1    Map<Integer, List<Person>> ageMap = persons\n    2      .stream()\n\
  \    3     .collect(Collectors.groupingBy(Person::getAge));\n\n5    ConcurrentMap<Integer,\
  \ List<Person>> ageMapPar = persons\n    6      .parallelStream()\n    7     .collect(Collectors.groupingByConcurrent(Person::getAge));\n\
  \    ```\n\n*   收集结构（此处：`ConcurrentMap`）可能具有 `Collector.Character` 和 `Collector.Characteristics.UNORDERED`\
  \ 特性。\n\n## 摘要\n\n尽管使用流进行并行编程无需显式线程处理，并且通常无需同步，但你仍然需要考虑一些约束条件才能获得正确的结果。接下来，我们将结合\
  \ Java 并发性来研究 `collect` 方法。\n\n\n\n"
- "# 10. 收集器与并发\n\n到目前为止，我们一直在使用 `collect()` 方法，但尚未深入解释。这个重载方法要么接受一个收集器（Collector），就像我们之前所做的那样（例如\
  \ `.collect(Collectors.toList())` 或 `.collect(Collectors.groupingByConcurrent(Person::getAge))`）；要么你可以传入三个参数，分别对应供应器（supplier）、累加器（accumulator）和组合器（combiner）。先别困惑，我很快就会解释这些概念。\n\
  \n顾名思义，`collect` 的主要目的是收集数据。这是通过修改可变数据结构来实现的。与此相反，`reduce()` 方法则适用于不可变数据结构。\n\n\
  现在，是时候编写我们自己的收集器了。为简单起见，我们创建一个收集器来对数字流进行求和。这些数字由一个简单的数字生成器生成（代码清单 10-1）。\n\n```\n\
  1   public static List createNumbers() {\n2     List numbers = new ArrayList();\n\
  3     Random random = new Random();\n4     int max = 1000000 + random.nextInt(1000000);\n\
  5     for (int i = 0; i < max; i++) {\n6       numbers.add((long)random.nextInt(100));\n\
  7     }\n8     return numbers;\n9   }\n代码清单 10-1.\n数字生成器\n```\n\n但首先，我们快速了解一下 Java\
  \ 并发。尽管 `parallelStreams()` 避免了所有手动线程处理，但了解一些基础知识有助于理解如何编写一个能够成功并行执行的收集器。\n\n##\
  \ Java 并发\n\n我们需要讨论两个术语：“并发”和“并行”。在继续之前，我们必须先定义这两个术语，因为我们既要讨论 Java 并发，又要讨论并行流。\n\
  \n对于并发，程序的多个部分将在不同的线程中执行，以并发方式而非串行方式运行。这并不一定意味着这些线程同时运行。回想一下过去每台计算机只有一个单核 CPU（中央处理器）的时代：为了保持用户界面（UI）流畅，最佳实践是将\
  \ UI 处理放在一个线程中，而将耗时的计算放在另一个线程中。这两个线程交替获得少量的 CPU 时间片。在现代多核 CPU 上，这些线程可以并行运行。\n\n\
  另一方面，在并行中，多个并行运行的线程会同时对不同的数据执行相同的计算。并行流实现了并行性。请看下图（图 10-1）：并行流包含相同类型的不同数据。每个中间操作只定义一次，并按照垂直对齐所示的方式并行执行。\n\
  \n![A435427_1_En_10_Fig1_HTML.jpg](img/A435427_1_En_10_Fig1_HTML.jpg)\n\n图 10-1.\n\
  \n带有中间操作的并行流\n\n人们可能将并行视为并发的一种特殊情况，或者将其视为不同的概念。在本书中，我们不会深入讨论这个问题。无论如何，要使用 Java 实现并行，我们在技术上需要并发。\n\
  \n![A435427_1_En_10_Figa_HTML.jpg](img/A435427_1_En_10_Figa_HTML.jpg) 进程与线程\n\n\
  在本书中，我们只涉及线程，它们是程序的独立单元，运行在同一个进程中。进程提供了一个完全独立的环境，拥有自己的内存，而线程则运行在共享环境中，特别是共享它们的内存。如果多个线程使用同一个类，这一事实就变得很重要。\n\
  \n更详细的解释请参考 [Java 教程](https://docs.oracle.com/javase/tutorial/essential/concurrency/procthread.html)。¹\n\
  \nJava 从一开始就被设计为支持多线程。`Thread` 类自 JDK（Java 开发工具包）1.0 起就已成为 Java 的一部分。\n\n让我们看看如何定义并启动第二个线程（代码清单\
  \ 10-2）。\n\n```\n1   public static void main(String[] args) {\n2     Thread thread\
  \ = new MyThread();\n3     thread.start();\n4     System.out.println(\"Message from\
  \ Main\");\n5   }\n\n7   private static class MyThread extends Thread {\n8     @Override\n\
  9     public void run() {\n10       System.out.println(\"Message from MyThread\"\
  );\n11     }\n12   }\n代码清单 10-2.\nThread 的简单用法\n```\n\n我们只需定义一个继承自 `Thread` 的类，并重写\
  \ `run()` 方法。在主程序中，我们创建线程的一个新实例，并调用 `start()`。在幕后，`start` 向操作系统请求一个新线程，并在这个新线程中执行\
  \ `run` 方法。\n\n但有一个问题。通常，你希望通过继承一个技术类（而非 `Thread`）来构建类结构。幸运的是，Java 提供了另一种创建线程的方式。我们需要实现\
  \ `Runnable` 接口。而这正是 `Thread` 类内部所做的（代码清单 10-3）。\n\n```\n1   public static void\
  \ main(String[] args) {\n2     Thread thread = new Thread(new MyRunnable());\n3\
  \     thread.start();\n4     System.out.println(\"Message from Main\");\n5   }\n\
  \n7   private static class MyRunnable implements Runnable {\n8     @Override\n9\
  \     public void run() {\n10       System.out.println(\"Message from MyRunnable\"\
  );\n11     }\n12   }\n代码清单 10-3.\n使用 Runnable 的线程\n```\n\n现在，通过传入我们类的一个对象来创建一个新线程。其他一切保持不变。\n\
  \n\n\n掌握了这些知识后，我们想利用线程来执行求和任务。我们创建了一个名为 `SummingUnit` 的类，它负责执行计算（清单 10-4）。\n\n```\n\
  1   public class SummingUnit {\n2     public SummingUnit(){\n3       System.out.println(\"\
  ctor SummingUnit\");\n4     }\n\n6     private long _sum = 0;\n\n8     public long\
  \ getSum() {\n9       return _sum;\n10     }\n\n12     public void sum(long value)\
  \ {\n13       _sum += value;\n14     }\n\n16     public void combine(SummingUnit\
  \ other) {\n17       _sum += other._sum;\n18     }\n\n20   }\n清单 10-4.\nSummingUnit\n\
  ```\n\n该类内部使用一个字段来累加传递给 `sum()` 方法的值。通过一个简单的 getter 方法来读取总和。`combine()` 方法最初并未使用，我们稍后会用到它。还记得\
  \ `collect` 的 combiner 参数吗？\n\n为了演示，一个新线程将处理我们一半的数字，而另一半则由“主”线程处理。为了实现这个目标，我创建了\
  \ `SumTask`，它接收用于前半部分和后半部分的相应参数。该类的一个实例由新线程调用，另一个实例则直接调用。为了同步这两个线程，主线程通过 `thread.join`\
  \ 等待，直到生成的线程完成（清单 10-5）。\n\n```\n1   public static void main(String[] args) throws\
  \ InterruptedException {\n2     List numbers = Utils.createNumbers();\n3     int\
  \ size = numbers.size();\n4     SummingUnit summingUnit = new SummingUnit();\n\n\
  6     Thread thread = new Thread(new SumTask(numbers, 0,\n7             size / 2,\
  \ summingUnit));\n8     thread.start();\n\n10     SumTask sumTask = new SumTask(numbers,\
  \ size / 2,\n11             size, summingUnit);\n12     sumTask.run();\n13     thread.join();\
  \ // 等待线程完成\n\n15     System.out.println(\"Sum: \" + summingUnit.getSum());\n16\
  \   }\n\n19   private static class SumTask implements Runnable {\n\n21     private\
  \ final List _numbers;\n22     private final int _start;\n23     private final int\
  \ _end;\n24     private final SummingUnit _summingUnit;\n\n26     public SumTask(List\
  \ numbers,\n27                             int start,\n28                      \
  \       int end,\n29                             SummingUnit summingUnit) {\n30\
  \       _numbers = numbers;\n31       _start = start;\n32       _end = end;\n33\
  \       _summingUnit = summingUnit;\n34     }\n\n36     @Override\n37     public\
  \ void run() {\n38       for (int i = _start; i < _end; i++) {\n39         _summingUnit.sum(_numbers.get(i));\n\
  40       }\n41     }\n42   }\n清单 10-5.\n并行求和——结果出乎意料\n```\n\n然而，如果你多次运行这个程序，即使你等待第二个线程完成，也会得到不同的结果。发生了什么？\n\
  \n请注意 `sum()` 方法。\n\n```\nsum += val;\n```\n\n乍一看，这似乎是一个单一操作。但实际上，这只是语法糖，我们可以重写这条语句。\n\
  \n```\nsum = sum + val;\n```\n\n在我们常见的硬件结构中，不可能在一个变量内部完成加法操作。实际上，计算机必须将 `sum` 的值加载到寄存器中，加上\
  \ `val`，然后将结果写回变量。因此，这行代码可以用伪代码重写如下。\n\n```\n1   register.load(sum)\n2   register.add(val)\n\
  3   register.write(sum)\n```\n\n如你所见，这是一个非原子性的操作序列。在这两个操作之间，CPU 可能会执行其他操作。\n\n假设\
  \ `sum` 的值为 0。我们有两个线程，每个线程都添加一个值。线程 1 可能加 5，而线程 2 加 3。以下序列产生了预期的结果：\n\n| 操作 | 结果\
  \ |\n| --- | --- |\n| 线程 1 register1.load(sum) | register1 = 0 |\n| 线程 1 register1.add(5)\
  \ | register1 = 5 |\n| 线程 1 register1.write(sum) | sum = 5 |\n| 线程 2 register2.load(sum)\
  \ | register2 = 5 |\n| 线程 2 register2.add(3) | register2 = 8 |\n| 线程 2 register2.write(sum)\
  \ | sum = 8 |\n\n但由于两个线程独立运行，我们无法确定执行顺序。在另一次运行时，语句可能按以下顺序执行：\n\n| 操作 | 结果 |\n| ---\
  \ | --- |\n| 线程 1 register1.load(sum) | register1 = 0 |\n| 线程 1 register1.add(5)\
  \ | register1 = 5 |\n| 线程 2 register2.load(sum) | register2 = 0（此时 sum 仍然是 0！） |\n\
  | 线程 1 register1.write(sum) | sum = 5 |\n| 线程 2 register2.add(3) | register2 = 3\
  \ |\n| 线程 2 register2.write(sum) | sum = 3 |\n\n我们看到的是一个典型的竞态条件。结果取决于哪个线程在争夺共享变量的竞赛中领先。`sum()`\
  \ 方法成为了代码中的一个临界区。这样的区域必须受到保护，例如通过锁。或者你可以使用 Java 的 `synchronized` 限定符。\n\n```\npublic\
  \ synchronized void sum(long val)\n```\n\n现在这个方法将自动受到保护。一次只允许一个线程运行此方法，而其他线程则被迫等待。所有对\
  \ `sum()` 的调用都变成了串行，这破坏了并行性。这不能算是一个合适的解决方案。\n\nVolatile\n\n你可能听说过在多线程环境中变量的 `volatile`\
  \ 限定符，并猜测这将是一个不错的选择。遗憾的是，这并没有帮助。`Volatile` 仅保证在写入之后的任何读取都将获取最后写入的值。看看第一个线程序列，特别是\
  \ `Thread 2 register2.load(sum)`。`sum` 在前一步刚刚被写入。之前的值是 0。如果读取访问查询的是缓存，会发生什么？尽管刚刚将\
  \ 5 写入了变量，但 Java 可能读取到之前的 0。`Volatile` 由于其保证避免了这个问题，但也仅此而已。因此，`volatile` 没有帮助（除非我们可能还有其他错误）。\n\
  \n更多信息，请阅读关于 [Java 内存模型](https://www.cs.umd.edu/%7Epugh/java/memoryModel/jsr-133-faq.html)\
  \ 的内容。²\n\n对于我们这个问题，最好的解决方案可能是避免临界区。为了避免共享变量，我们只需为每个线程创建一个单独的 `SummingUnit`。每个线程将解决我们问题的一部分——计算一个小计。最后，我们必须将它们全部合并。\n\
  \n以下是并行求和的示例——每个线程使用一个单独的 `SummingUnit`：\n\n```\n1   public static void main(String[]\
  \ args) throws InterruptedException {\n2     List numbers = Utils.createNumbers();\n\
  3     int size = numbers.size();\n4     SummingUnit summingUnit = new SummingUnit();\n\
  5     SummingUnit summingUnit2 = new SummingUnit();\n\n7     Thread thread = new\
  \ Thread(new SumTask(numbers, 0,\n8             size / 2, summingUnit));\n9    \
  \ thread.start();\n\n11     SumTask sumTask = new SumTask(numbers, size / 2,\n12\
  \             size, summingUnit2);\n13     sumTask.run();\n14     thread.join();\
  \ // 等待线程完成\n\n16     summingUnit.combine(summingUnit2);\n17     System.out.println(\"\
  Sum: \" + summingUnit.getSum());\n18   }\n```\n\n在前述代码的第 5 行，创建了第二个 `SummingUnit`，它在第\
  \ 12 行被使用。然后（第 16 行），合并了小计。由于每个线程都使用自己的对象，我们可以避免任何同步。\n\n\n\n## 收集\n\n在简要了解了 Java\
  \ 并发机制之后，我们将回到并行流和 `collect()` 方法。之前提到的那个接受三个参数的重载方法定义如下：\n\n```\n1    R collect(Supplier\
  \ supplier,\n2                 BiConsumer accumulator,\n3                 BiConsumer\
  \ combiner);\n```\n\n第一个参数接受一个函数，该函数提供类型为 R 的新结果容器。我们使用 `SummingUnit` 作为 R 的类型。\n\
  \n累加器参数是一个函数，它接受一个结果容器 R（即 `SummingUnit`）和一个类型为 T 的流对象。在我们的示例中，这个对象是其中一个数字。\n\n\
  最后一个参数接受一个函数，Java 会向该函数传入两个结果容器。此函数执行合并操作。\n\n综合以上所有内容，我们在 collect 方法中使用 `SummingUnit`（清单\
  \ 10-6）。\n\n```\n1   System.out.println(\"total: \" +\n2     numbers.parallelStream().collect(\n\
  3       () -> new SummingUnit(),     // supplier\n4       (summingUnit, value) ->\n\
  5         summingUnit.sum(value),    // accumulator\n6       (summingUnit, other)\
  \ ->\n7         summingUnit.combine(other) // combiner\n8     ).getSum()\n9   );\n\
  清单 10-6.\n在 Collect 中使用 SummingUnit\n```\n\n现在，如果你运行这个程序，可能会发现应用打印出了几个“ctor SummingUnit”实例。请记住，我们在\
  \ SummingUnit 的构造函数中打印了这条信息。这表明 Java 调用了多个线程来执行工作。实际上，Java 使用了 fork/join 框架来调度线程。该框架的原则是判断任务是否足够小以串行执行。如果任务较大，则会将问题分解（最好分成两个大小相似的部分），然后两个部分会在不同的线程中处理。因此，这个算法是递归应用的。\n\
  \n如果你对 fork/join 框架的更多细节感兴趣，请参考 [Java 教程](https://docs.oracle.com/javase/tutorial/essential/concurrency/forkjoin.html)。³\n\
  \n如前所述，你可以自由选择 lambda 参数的名称。其作用域非常狭窄。因此，通常选择简短的名称。\n\n```\n1   .collect(() -> new\
  \ SummingUnit(),\n2   (s, v) -> s.sum(v), (s, o) -> s.combine(o))\n```\n\n或者，我们可以使用方法引用。\n\
  \n```\n1   .collect(SummingUnit::new, SummingUnit::sum, SummingUnit::combine)\n\
  ```\n\n正如前面的示例所示，收集数据相当容易。通常，并行运行如此简单的任务并不值得，但将所学知识迁移到你技术领域中更复杂的任务应该没有问题。特别是运行时间较长的任务能从并行中获益。\n\
  \n除了向 `collect()` 方法传递一组函数外，我们还可以编写一个 Collector，并将其传递给 `collect()`。以下是该重载方法的签名：\n\
  \n```\n1    R collect(Collector collector);\n```\n\nCollector 是一个我们需要实现的接口。我们创建一个类\
  \ `SummingCollector`，它将总和作为最终结果返回。\n\n```\n1   System.out.println(\"total: \" +\n\
  2             numbers.parallelStream().collect(new SummingCollector()));\n```\n\n\
  Collector 接口强制我们重写一些返回函数的方方法。使用 lambda，定义可以作为参数传递的函数非常容易。除了（惊喜！）supplier、accumulator\
  \ 和 combiner 之外，我们还需要重写 finisher。finisher 接受最后一个剩余的结果容器进行进一步处理。我们的 collector 将返回最终的总和。\n\
  \n为了重用我们已经开发的大部分代码，SummingCollector 会在内部将大部分任务委托给 SummingUnit。\n\n我们需要重写的最后一个方法返回一组特征（清单\
  \ 10-7）。\n\n```\n1   public class SummingCollector\n2                 implements\
  \ Collector{\n3     @Override\n4     public Supplier supplier() {\n5       return\
  \ () -> new SummingUnit();\n6     }\n\n8   @Override\n9   public BiConsumer accumulator()\
  \ {\n10     return (s, v) -> s.sum(v);\n11   }\n\n13   @Override\n14   public BinaryOperator\
  \ combiner() {\n15     return (left, right) -> {left.combine(right); return left;};\n\
  16   }\n\n18   @Override\n19   public Function finisher() {\n20     return s ->\
  \ s.getSum();\n21   }\n\n23   @Override\n24   public Set characteristics() {\n25\
  \     return EnumSet.of(Characteristics.UNORDERED);\n26     // 不要添加 \", Characteristics.CONCURRENT\"\
  !\n27   }\n清单 10-7.\nSummingCollector\n```\n\n我们使用三个类型 `<T, A, R>` 对 Collector 接口进行参数化，如签名所示。这里\
  \ T 是 Long（一个数字），A 被替换为 SummingUnit，最终的结果类型 R 也是 Long：即最终的总和。\n\n因为我们没有返回 CONCURRENT\
  \ 特征，所以每个线程都会调用 supplier 函数。你可以通过观察对象构造期间的输出来查看这一点。\n\n如果我们提供了 CONCURRENT 特征，Java\
  \ 会假定 supplier 已启用多线程支持。它将只创建一个 SummingUnit，由所有线程共享。猜猜看，结果会因运行而异，因为我们有一个存在竞态条件的临界区。\n\
  \n## 总结\n\n在本章中，我们讨论了收集器的原理。示例展示了如何实现一个收集器。流的并行版本使用起来非常简单，并且隐藏了所有关于线程、锁定、同步的繁琐细节。但是，对\
  \ Java 并发特性以及竞态条件等典型问题稍有了解，有助于编写正确的收集器。\n\n## 最终思考\n\n尽管这个示例对于讨论并行性的某些方面非常有用，但由于以下几个原因，它并非一个现实世界的示例：\n\
  \n1.  没有必要实现一个求和函数，因为 Java 提供了一个现成的\n\n    ```\n    numbers.parallelStream().mapToLong(i\
  \ -> i).sum();\n    ```\n\n    Java 内部使用一个“肮脏”的技巧来实现求和，即使用一个数组来保存简单的值。  \n2.  除了收集数据，我们也可以简单地归约数据。\n\
  \n    ```\n    numbers.parallelStream().reduce(0L, (a, c) -> a + c);\n    ```\n\n\
  \    reduce 函数在每次加法时都会创建一个新对象。它从零开始。然后它接受两个参数：累加器和当前对象。它返回两者的和，该和作为一个新对象存储到累加器中。因为没有共享对象，所以没有共享状态，也没有竞态条件等。\n\
  \n但有时我们确实需要一个收集器，例如，如果我们想将对象收集到集合或映射中。这将在下一章中展示。\n\n脚注 1\n\n[`https://docs.oracle.com/javase/tutorial/essential/concurrency/procthread.html`](https://docs.oracle.com/javase/tutorial/essential/concurrency/procthread.html)\n\
  \n  2\n\n[`https://www.cs.umd.edu/~pugh/java/memoryModel/jsr-133-faq.html`](https://www.cs.umd.edu/%7Epugh/java/memoryModel/jsr-133-faq.html)\n\
  \n  3\n\n[`https://docs.oracle.com/javase/tutorial/essential/concurrency/forkjoin.html`](https://docs.oracle.com/javase/tutorial/essential/concurrency/forkjoin.html)\n\
  \n\n\n"
- '# 11. 分组收集器


  假设我们要计算按年龄分组的人的平均支出。我们希望创建一个收集器，返回一个 `Map<Integer, Double>`，其中 Integer 代表年龄组，Double
  代表平均支出。


  为了验证这个收集器，我们使用一个简单的输出：


  ```

  1   [. . .]


  3   [省略：按之前所示创建 persons]


  5   printResults(persons.getPersons().parallelStream()

  6     .collect(new GroupAverageCollector()));


  8   [. . .]


  10   private static void printResults(Map results) {

  11     System.out.println("");

  12     for (int group : results.keySet()) {

  13       System.out.println("Group: " + group + ";  avg: " + results.get(group));

  14     }

  15   }

  清单 11-1.

  准备输出

  ```


  回想一下本书开头介绍的数据结构。所有人员都包含一个购买列表。价格内部以“分”为单位存储，以避免浮点运算。为了使收集器保持精简，我们使用一个辅助类来累加“分”和人数，并计算平均值
  = sum(分) / 100 / 人数。


  ```

  1   public class AverageBuilder {


  3     private int _count;

  4     private long _cents;


  6     public int getCount() {

  7       return _count;

  8     }


  10    public long getCents() {

  11      return _cents;

  12    }


  14    public void add(long cents) {

  15      _count++;

  16      _cents += cents;

  17    }


  19    public void add(AverageBuilder other) {

  20      _count += other.getCount();

  21      _cents += other.getCents();

  22    }


  24    public double getAverage() {

  25      return _cents / 100D / _count;

  26    }

  27   }

  清单 11-2.

  用于计算平均值的辅助类

  ```


  这个类包含两个 `add` 方法：一个用于添加一个人的支出，另一个用于合并两个 `AverageBuilder`。


  在第 10 章中，我们从 `SummingUnit` 开始，它在收集器中被重用。本章使用的收集器并非基于这样的现有类。相反，它包含了用于累加、合并和完成转换的函数：


  ```

  1   public class GroupAverageCollector implements

  2       Collector, Map> {


  4     @Override

  5     public Supplier> supplier() {

  6       return () -> new HashMap();

  7     }


  9     @Override

  10    public BiConsumer, Person> accumulator() {

  11      return (m, p) -> add(m, p);

  12    }


  14    @Override

  15    public BinaryOperator> combiner() {

  16      return (left, right) -> {

  17        combine(left, right);

  18        return left;

  19      };

  20    }


  22    @Override

  23    public Function, Map> finisher() {

  24      return m -> finish(m);

  25    }


  27    @Override

  28    public Set characteristics() {

  29      return EnumSet.of(Characteristics.UNORDERED);

  30      // 没有 Characteristics.CONCURRENT!

  31    }


  33    private static void add(Map map, Person person) {

  34      int group = person.getAge() / 10;

  35      if (!map.containsKey(group)) {

  36        map.put(group, new AverageBuilder());

  37      }

  38      long cents = person.getBuying().values()

  39              .stream().mapToLong(a -> a.getAmount().getCents()).sum();

  40      map.get(group).add(cents);

  41    }


  43    private static void combine(Map left,

  44            Map right) {

  45      for (int group : right.keySet()) {

  46        if (!left.containsKey(group)) {

  47          left.put(group, right.get(group));

  48        } else {

  49          left.get(group).add(right.get(group));

  50        }

  51      }

  52    }


  54    private static Map finish(Map map) {

  55      Map result = new HashMap();

  56      for (int group : map.keySet()) {

  57        result.put(group, map.get(group).getAverage());

  58      }

  59      return result;

  60    }


  62 }

  清单 11-3.

  实现 accumulator、combiner 和 finisher 的 GroupAverageCollector

  ```


  第 2 行。此收集器接收 `Person` 类型的对象。它将值累加到 `Map<Integer, AverageBuilder>` 中，并返回 `Map<Integer,
  Double>`。


  第 6 行。`supplier` 为每个线程生成一个新的 `HashMap`，因为没有设置 `Characteristics.CONCURRENT`。


  第 11 行。请记住，`accumulator`、`combiner` 和 `finisher` 不返回值，而是返回指向在此收集器中作为静态函数（方法）实现的函数的指针。


  第 3 行。在此示例中，年龄组简单地通过整数除法计算。


  第 39 行。所有购买记录都存储在一个列表中。我们使用流来累加“分”。


  `combine` 函数将两个映射合并为一个，而 `finish` 函数将中间结果转换为所需的输出格式。作为 Java 开发人员，您应该能够理解所有这些函数。


  由于我们没有使用 `Characteristics.CONCURRENT`，流框架会为每个线程创建一个新的映射。尽管是并行处理，但这些函数的实现方式与过去简单的顺序编程时代相同。


  如果我们使用 `Characteristics.CONCURRENT` 会发生什么？在继续阅读之前，请思考一下这个问题。希望您能认识到所有的影响。


  （花点时间思考一下）


  如前所述，框架只会调用一次 `supplier`。它创建一个映射，供所有线程使用。首先，`HashMap` 不是线程安全的。这可以通过将其替换为 `ConcurrentHashMap`
  轻松解决。但是，如果您运行该程序，将会得到不确定的结果。


  `add` 方法是一个临界区。它可能随时被中断。并且它包含一个共享状态。这两者都可能导致如第 10 章所述的错误值。一个简单的解决方案是使 `add` 同步：


  ```

  1   private static synchronized void add(Map map, Person person) {...}

  清单 11-4.

  通过 synchronized 保护的临界区

  ```


  由于同步会降低性能，这通常不是一个好的选择。


  ## 总结


  在本章中，我讨论了一个真正“收集”数据的收集器。根据收集器的设计和特性，可以避免特殊的多线程处理。因此，无需显式同步、锁定等即可实现并行编程。但是，为了创建适合并行处理环境的类似顺序的程序，了解多线程陷阱的基础知识是必要的。


  ## 最后的话


  这本精简书籍的目的是向您展示 Java Lambda 和并行流的原理。它没有解释每一个细节，例如每个中间或终端操作。掌握了其原理后，通过查阅 API 文档来理解这些操作应该没有问题。一个很好的起点是
  `java.util.stream` 包的文档（ [`https://docs.oracle.com/javase/8/docs/api/index.html?java/util/stream/package-summary.html`](https://docs.oracle.com/javase/8/docs/api/index.html?java/util/stream/package-summary.html)
  ）。


