- fmt: '## About the Author


    ![image](images/carl_p_dea.jpg) ![images](images/square.jpg) **Carl P. Dea** is
    currently a Software Engineer working for BCT-LLC on projects with high performance
    computing (HPC) architectures. He has been developing software for 15 years with
    many clients from Fortune 500 companies to nonprofit organizations. He has written
    software ranging from mission-critical applications to web applications. Carl
    has been using Java since the very beginning and he also is a huge JavaFX enthusiast
    dating back when it used to be called F3. His passion for software development
    started when his middle school science teacher had shown him the TRS-80 computer.
    Carl''s current software development interests are rich client applications, game
    programming, Arduino, mobile phones and tablet computers. When he''s not working,
    he and his wife love to watch their daughters perform at gymnastics meets. Carl
    lives on the East Coast in Pasadena (aka “The Dena”), Maryland, USA.


    ## About the Technical Reviewer


    ![images](images/square.jpg) **David Coffin** is the author of *Expert Oracle*
    and *Java Security* from Apress. He is an IT analyst working at the Savannah River
    Site, a large Department of Energy facility. For more than 30 years, David''s
    expertise has been in multiplatform network integration and systems programming.
    Before coming to the Savannah River Site, he worked for several defense contractors
    and served as the technical lead for office and network computing at the National
    Aerospace Plane Joint Program Office at Wright-Patterson Air Force Base in Ohio.
    As a perpetual student, he has one master''s degree and many hours toward another.
    As a family man, David has raised eight children. He is a triathlete and distance
    swimmer who competes in the middle of the pack. He is also a classical guitar
    player, but he''s not quitting his day job.


    ## Introduction


    JavaFX 2.0 is Java''s next generation graphical user interface (GUI) toolkit for
    developers to rapidly build rich cross-platform applications. Built from the ground
    up, JavaFX takes advantage of modern GPUs through hardware-accelerated graphics
    while providing well-designed programming interfaces enabling developers to combine
    graphics, animation, and UI controls. The new JavaFX 2.0 is a pure Java language
    application programming interface (API).


    The key architectural strategies provided by JavaFX 2.0 API are the reuse of existing
    Java libraries and the bridging of communication between other languages that
    run on the JVM (Visage, Jython, Groovy, JRuby, and Scala).


    Nandini Ramani of Oracle plainly states the intended direction of JavaFX the platform
    in the following excerpt from the screencast, *Introducing JavaFX 2.0*:


    > *“The industry is moving toward multi-core/multi-threading [type] platforms
    with GPUs. JavaFX 2.0 leverages these attributes to improve execution efficiency
    and UI design flexibility. Our initial goal is to give architects and developers
    of enterprise applications a set of tools and APIs to help them build better data
    driven business applications.”*

    >

    > —Nandini Ramani

    > Oracle Corp.

    > VP of Development, Java Client Platform


    ### Some History


    In 2005, Sun Microsystems acquired the company SeeBeyond, at which a certain software
    engineer by the name of Chris Oliver created a graphics-rich scripting language
    known as F3 (Form Follows Function). F3 was later unveiled by Sun Microsystems
    at the 2007 JavaOne conference as JavaFX.


    On April 20, 2009 Oracle Corporation announced the acquisition of Sun Microsystems,
    making Oracle the new steward of JavaFX. At JavaOne 2010, Oracle announced the
    JavaFX roadmap. As part of the road map, Oracle revealed its plans to phase out
    the JavaFX script language and re-create JavaFX for the Java language and platform.


    As promised based on the 2010 roadmap, JavaFX 2.0 SDK was released at JavaOne
    October 3, 2011. Oracle also announced its commitment to take steps to release
    JavaFX as an open-source product, thus allowing the community to help move the
    platform forward. Open-sourcing JavaFX will increase its adoption, enable a quicker
    turnaround time on bug fixes, and generate new enhancements.


    [Table 0-1](#Introduction.html#tab_0_1) shows the overall history of the major
    JavaFX releases.


    ![images](images/t0I01.jpg)


    ### Approach in This Book


    The title of the book says it all: *JavaFX 2.0 Introduction by Example*. In this
    book, you will be learning the new JavaFX 2.0 capabilities by following practical
    recipe examples. These recipes will, in turn, provide you with the knowledge needed
    to create your own rich client applications. In the same tone with Java''s mantra
    “Write once, run anywhere,” JavaFX also preserves this same sentiment. Because
    JavaFX 2.0 is written entirely in Java the language, you will feel right at home.


    Most of the recipes can be compiled and run under Java 6. However, some recipes
    will take advantage of Java 7''s language enhancements, so Java 7 will be required.
    While working through this book with JavaFX 2.0 and Java 7, you will realize that
    the new APIs and language enhancements will help you to become a more productive
    developer. Having said this, I encourage you to explore all of Java 7''s new capabilities.
    To delve deeper into the new capabilities of Java 7, I recommend the book, *Java
    7 Recipes*. On an added note, the recipes in this book can also be found in *Java
    7 Recipes*.


    This book covers JavaFX 2.0''s fundamentals, graphics and animations, audio and
    video, and the Web. The fundamentals include how to install prerequisite software
    (JavaFX 2.0, NetBeans 7.1) and create simple user interfaces. You will also learn
    the basics of the scene graph, text nodes and font styles, shapes, colors, layouts,
    menus, UI controls, simple styling (CSS styling), binding expressions, background
    processes, keyboard shortcuts, and dialog boxes. Next, in graphics and animations
    you will encounter image handling, drag-and-drop operations, animation APIs, and
    UI theming (Look ''n'' Feel). After graphics and animations, you will learn audio
    and video. This section will include creating an MP3 player, using a video player,
    responding to media events, handling media marker events, and synchronizing an
    animation with media events. Finally, you will be using JavaFX 2.0 to interoperate
    with web technologies such as HTML5, JavaScript, and XML. In this section, you
    will be learning how to embed JavaFX into a web page, rendering and dynamically
    manipulating HTML5 content, creating a weather application to respond to HTML
    events, and creating an RSS feed application using an embedded database (Derby).


    ### Who This Book Is For


    If you are a Java developer who desires to take your client-side applications
    to the next level, you will find this book your guide to help you begin creating
    usable and aesthetically pleasing user interfaces. If you want a particular platform
    that is not listed in the preceding table, don''t be too concerned because by
    the time you read this, JavaFX 2.0 should be available on your favorite OS.


    ### How This Book Is Structured


    This book is arranged in a natural progression that moves forward from beginner-
    to intermediate-level concepts. For the Java developer, none of the concepts mentioned
    in this book should be extremely difficult to figure out. This book''s recipes
    are presented in a problem-solution format. After a brief description of a practical
    and real-world problem, a step-by-step solution will explain which techniques
    will be best suited to solve the problem. Each recipe can be easily adapted to
    meet your own needs when developing a game, media player, or your usual enterprise
    application. The more experienced Java UI developer you are, the more freedom
    you have to jump around to different chapters and recipes throughout the book.
    However, any Java developer can naturally progress through the book and learn
    the skills needed to enhance everyday GUI applications.'
