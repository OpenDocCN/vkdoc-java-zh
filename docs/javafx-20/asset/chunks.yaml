    #### 工作原理


    在本教程中，你将创建一个模拟时钟应用，将现有的 HTML5 内容渲染到 JavaFX 场景图上。HTML5 允许在浏览器中显示 SVG 内容。SVG 与 JavaFX
    的场景图类似，其中的节点可以在不同尺寸下缩放并保留细节。要操作 SVG 或任何 HTML5 元素，你将使用 JavaScript 语言。如图 4-8 所示，这是一个显示动画模拟时钟的
    JavaFX 应用。要了解更多关于 SVG 的信息，请访问 [`http://www.w3schools.com/svg/default.asp`](http://www.w3schools.com/svg/default.asp)。在运行此示例之前，请确保
    `clock3.svg` 文件位于构建路径中。在 NetBeans 中，你可能需要在运行应用前执行清理和构建操作，以便将资源（`clock3.svg`）复制到构建路径。如果你在命令行中运行应用，也可以手动将
    `clock3.svg` 文件复制到构建路径中，与 `DisplayHtml5Content.class` 文件所在位置相同。


    在软件开发中，你无疑会经历与设计师合作的情况，他们通常会使用流行的工具生成网页内容，然后将其与应用程序的功能对接。为了创建模拟时钟，我请来了我的女儿，她非常精通开源工具
    Inkscape。虽然本教程使用了 Inkscape 生成内容，但我不会详细介绍该工具，因为这超出了本书的范围。要了解更多关于 Inkscape 的信息，请访问
    [`http://www.inkscape.org`](http://www.inkscape.org) 查看教程和演示。为了模拟设计师与开发者工作流程，她创建了一个外观酷炫的时钟，而我则添加了
    JavaScript/SVG 代码来移动时钟的时针、分针和秒针。Inkscape 允许你创建形状、文本和效果，从而生成令人惊叹的插图。由于 SVG 文件被视为
    HTML5 内容，你将能够在支持 HTML5 的浏览器中显示 SVG 图形。在此场景中，你将在 JavaFX 的 `WebView` 节点中显示模拟时钟。你可以将
    `WebView` 节点视为一个能够加载 URL 并显示内容的迷你浏览器。加载 URL 时，你会注意到调用了 `getEngine().load()`，其中
    `getEngine()` 方法会返回一个 `javafx.scene.web.WebEngine` 对象的实例。因此，`WebView` 对象会为每个 `WebView`
    对象隐式创建一个 `javafx.scene.web.WebEngine` 对象实例。以下是 JavaFX 的 `WebEngine` 对象加载文件 `clock3.svg`
    的示例：


    `final WebView browser = new WebView();`

    `URL url = getClass().getResource("clock3.svg");`

    `browser.getEngine().load(url.toExternalForm());`


    你可能会好奇为什么 JavaFX 源代码如此简短。代码简短是因为它的任务只是实例化一个 `javafx.scene.web.WebView`，该对象会实例化一个
    `javafx.scene.web.WebEngine` 类并传递一个 URL。之后，`WebEngine` 对象会像任何浏览器一样渲染 HTML5 内容，完成所有工作。在渲染内容时，请注意时钟的指针会移动或动画化；例如，秒针会顺时针旋转。在让时钟动画化之前，你需要通过整个
    SVG 文档（位于根 `svg` 元素上）的 `onload` 属性调用 JavaScript 的 `updateTime()` 函数来设置时钟的初始位置。设置好时钟指针后，你将添加
    SVG 代码，分别使用 `line` 和 `animateTransform` 元素来绘制和动画化。以下是让秒针无限动画化的 SVG 代码片段：


    `<g id="secondHand">`

    `<line stroke-width="2" y1="-20" y2="70" stroke-linecap="round" stroke="red"/>`

    `<animateTransform attributeName="transform" type="rotate" repeatCount="indefinite"
    dur="60s" by="360" />`

    `</g>`


    最后，如果你想创建一个像本教程中描述的那样时钟，请访问 [`http://screencasters.heathenx.org/blog`](http://screencasters.heathenx.org/blog)
    学习所有关于 Inkscape 的知识。另一个令人印象深刻且美观的自定义控件展示，专注于仪表和表盘，是 Gerrit Grunwald 的 Steel Series。要感到完全惊叹，请访问他的博客
    [`http://harmoniccode.blogspot.com`](http://harmoniccode.blogspot.com)。


    ### 4-3. 使用 Java 代码操作 HTML5 内容


    #### 问题


    你是一名薪水微薄的开发者，老板拒绝让你搬到靠窗的工位。你必须找到一种方法，在不离开工位的情况下了解天气情况。


    #### 解决方案


    创建一个从雅虎天气服务获取数据的天气应用。以下代码实现了一个天气应用，它检索雅虎的天气信息，并将其作为 HTML 渲染到 JavaFX 应用中：


    `package javafx2introbyexample.chapter4.recipe4_03;`


    `import javafx.animation.*;`

    `import javafx.application.Application;`

    `import javafx.beans.property.*;`

    `import javafx.beans.value.*;`

    `import javafx.concurrent.Worker.State;`

    `import javafx.scene.*;`

    `import javafx.scene.web.*;`

    `import javafx.stage.Stage;`

    `import javafx.util.Duration;`

    `import org.w3c.dom.*;`


    `/**`

    ` * 显示天气预览和 3 天预报`

    ` * @author cdea`

    ` */`

    `public class ManipulatingHtmlContent extends Application {`

    `    String url = "http://weather.yahooapis.com/forecastrss?p=USMD0033&u=f";`

    `    int refreshCountdown = 60;`


    `    @Override public void start(Stage stage) {`

    `        // 创建场景`

    `        stage.setTitle("第 4-3 章 操作 HTML 内容");`

    `        Group root = new Group();`

    `        Scene scene = new Scene(root, 460, 340);`


    `        final WebEngine webEngine = new WebEngine(url);`


    `        StringBuilder template = new StringBuilder();`

    `        template.append("<head>\n");`

    `        template.append("<style type=\"text/css\">body {background-`

    `color:#b4c8ee;}</style>\n");`

    `        template.append("</head>\n");        `

    `        template.append("<body id=''weather_background''>");`


