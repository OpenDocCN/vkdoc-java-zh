    \n### How It Works\n\nTo create an RSS reader, you will need to store feed locations\
    \ for later reading. When adding a new RSS feed, you will want to locate the little\
    \ orange iconic button and drag the URL address line into your JavaFX RSS reader\
    \ application. I find that the drag metaphor works on my FireFox browser. However,\
    \ I’ve provided a text field to allow you to cut-and-paste the URL. Enter a URL\
    \ and press the enter key to initiate the loading of the headline news for that\
    \ URL’s feed. For example you can visit Google’s technology news RSS feed at:\n\
    [http://news.google.com/news?pz=1&cf=all&ned=us&hl=en&topic=tc&output=rss](http://news.google.com/news?pz=1&cf=all&ned=us&hl=en&topic=tc&output=rss)\n\
    \n[Figure 4-12](#Chapter04.html#fig_4_12) depicts the orange RSS icon in the upper\
    \ left.\n\n![images](images/0412.jpg)\n\n***Figure 4-12.** RSS icon*\n\nEither\
    \ drag-and-drop the URL, or type it into the text field. The JavaFX RSS reader\
    \ application will the save the URL location to a database. The RSS application\
    \ consists of three frame regions: the RSS feed title column (left), headline\
    \ news (upper right), and web site view (lower right). To display the news headlines,\
    \ click the hyperlinks to the left. To show the entire article in the lower-right\
    \ frame, click the View button below the headline in the upper-right frame. Before\
    \ running the code, the application will require the jar libraries `derby.jar`\
    \ and `derbytools.jar` included into your project classpath. These libraries allow\
    \ you to save RSS URLs to an embedded JDBC database.\n\nSimilar to what you did\
    \ in recipe 4-3, you retrieve news information from the Internet. The RSS retrieved\
    \ will be using version 2.0. RSS is an XML standard providing really simple syndication,\
    \ thus the acronym RSS. Now enough with the acronyms; let’s jump into the code,\
    \ shall we?\n\nIn our `start()` method, you will create a 640 by 480 white scene\
    \ display area. Next, you will create a map (`TreeMap`) containing `Hyperlink`\
    \ objects as values and keys representing the URL location (`String`) to the RSS\
    \ feed. As before when displaying HTML content, you will need to create `WebView`s.\
    \ Here you will create two `WebView`s and one `WebEngine`. The two `WebView`s\
    \ will render HTML for the news headline frame region and the viewing of the entire\
    \ article region (lower right). The single `WebEngine` is responsible for retrieving\
    \ the RSS feed when the user clicks the left frame region containing the RSS hyperlinks.\n\
    \nTo support the feature that allows the user to enter an RSS feed, you will need\
    \ to create a text field that is able to save and render the headline news. Following\
    \ is the code snippet to save an RSS URL and to add its address as a new hyperlink\
    \ to the list of feeds:\n\n```\nfinal VBox leftArea = new VBox(10);\nfinal TextField\
    \ urlField = new TextField();\nurlField.setOnAction(new EventHandler<ActionEvent>(){\n\
    \    public void handle(ActionEvent ae){\n        String url = urlField.getText();\n\
    \        final Hyperlink jfxHyperLink = createHyperLink(url, webEngine);\n   \
    \     hyperLinksMap.put(url, jfxHyperLink);\n        HBox rowBox = new HBox(20);\n\
    \        rowBox.getChildren().add(jfxHyperLink);\n        leftArea.getChildren().add(rowBox);\n\
    \        webEngine.load(url);\n        urlField.setText(\"\");\n    }\n}); //\
    \ end of urlField setOnAction()\n```\n\nNews retrieval is initiated when a user\
    \ clicks on a hyperlink. Once a successful retrieve has occurred on the `webEngine`\
    \ (`WebEngine`) object, you will need to add a `ChangeListener` instance to respond\
    \ when the state property changes to `State.SUCCEEDED`. With a valid state of\
    \ `State.SUCCEEDED`, you will begin to parse the XML DOM returned from the `WebEngine`’s\
    \ `getDocument()` method. Again, I provided a convenience method called `parse()`\
    \ to interrogate the `Document` object representing the RSS news information.\n\
    \n`RssFeed rssFeed = parse(webEngine.getDocument(), webEngine.getLocation());`\n\
    \nNext, you will create an HTML page that will list the channel tile and the number\
    \ of total news headlines returned. After creating the HTML to display the RSS\
    \ channel title and number of articles, you will iterate over all the news headlines\
    \ to build record sets or rows. Each row will contain an HTML button labeled View\
    \ to notify the `WebEngine` object of an alert containing the URL of the article.\
    \ When the `WebEngine` object is notified, the `OnAlert` property will contain\
    \ an event handler to render the entire article in the frame in the lower-right\
    \ split region. After the web page is assembled, you will call the `newsBrief`\
    \ object’s `getEngine().loadContent()` method to render the page. Once rendered\
    \ you will save the URL `rssFeed` (`RssFeed`) object to the database by invoking\
    \ the `DBUtils.saveRssFeed(rssFeed)`. As a convenience, the `saveRssFeed()` method\
    \ will check for duplicates.\n\n![images](images/square.jpg) **Note**: To see\
    \ the full source code relating to database persistence (`DBUtils.java`), please\
