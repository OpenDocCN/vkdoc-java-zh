    #### 工作原理


    要创建视频播放器，你需要像食谱 3-1 那样构建应用程序，复用相同的应用功能，例如拖放文件、媒体按钮控件等。为清晰起见，我采用了之前的食谱，并将大部分 UI
    代码移入便捷函数中，这样你就能专注于媒体 API，而不会在 UI 代码中迷失方向。本章其余食谱将在此基础上，为这个 JavaFX 基础媒体播放器添加简单功能。因此，后续食谱中的代码片段将很简短，仅包含每个新功能所需的必要代码。


    在开始之前，我想谈谈媒体格式。在撰写本书时，JavaFX 2.0 支持一种名为 VP6 的跨平台视频格式，其文件扩展名为 `.flv`（代表流行的 Adobe
    Flash 视频格式）。用于创建 VP6 和 `.flv` 文件的实际编码器和解码器（编解码器）由一家名为 On2 的公司授权。2009 年，On2 被谷歌收购，用于构建开放且免费的
    VP7 和 VP8，以推动 HTML5 的发展。我不想用这些复杂背景让你困惑，但随着媒体格式的流行或淘汰，很难预测事态将如何发展。由于 JavaFX 的目标是跨平台，使用网络上最流行的编解码器似乎是合乎逻辑的，但你可能需要获得许可才能将视频编码为
    VP6 `.flv` 文件格式。因此，关键在于 JavaFX 目前只能播放以 VP6 编码的视频文件。（我尽量记住这是当前媒体格式的状况，所以请不要将任何挫败感归咎于
    JavaFX SDK。）有关要使用的格式的更多详细信息，请参阅 Javadoc API。提醒一句：要警惕那些声称可以免费转换视频的网站。在撰写本文时，唯一能够合法地将视频编码为
    VP6 的编码器是 Adobe 和 Wildform 的商业转换器（[`http://www.wildform.com`](http://www.wildform.com)）。


    现在，既然你知道了可接受的文件格式，如果你没有编码软件，可能想知道如何获取这种类型的文件。如果你手头没有 `.flv` 文件，可以从我最喜欢的网站之一 Media
    College（[`http://www.mediacollege.com`](http://www.mediacollege.com)）获取。从摄影到电影，Media
    College 提供论坛、教程和资源，帮助你进入媒体世界。在那里，你将获得一个特定的媒体文件，用于本章剩余的食谱。要获取 `.flv` 文件，请导航至以下
    URL：[`http://www.mediacollege.com/adobe/flash/video/tutorial/example-flv.html`](http://www.mediacollege.com/adobe/flash/video/tutorial/example-flv.html)。


    接下来，找到指向我们 `.flv` 媒体文件（`20051210-w50s.flv`）的链接，标题为 `Windy 50s Mobility Scooter
    Race`。要下载包含文件的链接，请右键单击并选择“目标另存为”或“链接另存为”。将文件保存到本地文件系统后，你可以将文件拖入媒体播放器应用程序以开始演示。


    ![images](img/square.jpg) **注意** 在撰写本书时，JavaFX 媒体播放器 API 目前支持使用 `.flv` 容器的 VP6
    视频格式。


    与上一个食谱中创建的音频播放器一样，我们的 JavaFX 基础视频播放器具有相同的基本媒体控件，包括停止、暂停和播放。除了这些简单控件外，我们还添加了新功能，例如搜索和全屏模式。


    播放视频时，你需要一个视图区域（`javafx.scene.media.MediaView`）来显示视频。你还需要创建一个滑块控件来监控视频进度，该控件位于图
    3-3 所示应用程序的左下角。滑块控件允许用户在视频中前后搜索。搜索功能仅在视频暂停时有效。最后一个额外功能是通过双击应用程序窗口使视频全屏显示。要恢复窗口，请再次双击或按
    Escape 键。


    为了快速上手，让我们直接进入代码。在 `start()` 方法中设置舞台后，你将通过调用 `createBackground()` 方法（`applicationArea`）创建一个黑色半透明背景。接下来，你将调用
    `attachMouseEvents()` 方法，将所有 `EventHandler` 连接到场景中，使用户能够在桌面上拖动应用程序窗口。另一个要附加到 `Scene`
    的 `EventHandler` 将允许用户切换到全屏模式。要使窗口进入全屏模式，你将创建一个条件来检查应用程序窗口的双击事件。一旦执行双击，你将调用 `Stage`
    的 `setFullScreen()` 方法，并传入与当前设置值相反的布尔值。以下是如何使窗口进入全屏模式：


    `        // 全屏切换`

    `        scene.setOnMouseClicked(new EventHandler<MouseEvent>() {`

    `            public void handle(MouseEvent event){`

    `                if (event.getClickCount() == 2) {`

    `                    primaryStage.setFullScreen(!primaryStage.isFullScreen());`

    `                }`

    `            }`

    `        });`


    继续在 `start()` 方法中的步骤，你将通过调用便捷方法 `createSlider()` 创建一个滑块控件。`createSlider()` 方法将实例化一个
    `Slider` 控件，并添加一个 `ChangeListener`，以便在视频播放时移动滑块。每当滑块的值发生变化时，都会调用 `ChangeListener`
    的 `changed()` 方法。一旦调用 `changed()` 方法，你将有机会看到旧值和新值。以下代码创建了一个 `ChangeListener`，用于在视频播放时更新滑块：


    `    // 在视频播放时更新滑块（稍后移除）`

    `    progressListener = new ChangeListener<Duration>() {`

    `        public void changed(ObservableValue<? extends Duration> observable, Duration
    oldValue, Duration newValue) {`

    `            progressSlider.setValue(newValue.toSeconds());`

    `        }`

    `    };`


    创建进度监听器（`progressListener`）后，你将在 `Scene` 上创建拖放 `EventHandler`。


    目标是确定在用户移动滑块之前是否按下了暂停按钮。一旦确定了暂停标志，你将获取新值并将其转换为毫秒。`dur` 变量用于移动 `mediaPlayer`，以便在用户向左或向右滑动控件时搜索视频中的位置。每当滑块的值发生变化时，都会调用
    `ChangeListener` 的 `changed()` 方法。以下代码负责根据用户移动滑块来移动视频中的搜索位置。


    `slider.valueProperty().addListener(new ChangeListener<Number>() {`

    `   public void changed(ObservableValue<? extends Number> observable, Number oldValue,
    Number`

    `newValue) {`

    `                if (paused) {`

    `                    long dur = newValue.intValue() * 1000;`

    `                    mediaPlayer.seek(new Duration(dur));`

    `                }`

    `            }`

    `        });`


    继续，你将实现一个拖放 `EventHandler`，以处理拖入应用程序窗口区域的 .flv 媒体文件。在这里，你首先检查是否存在之前的 `mediaPlayer`。如果存在，你将停止之前的
    `mediaPlayer` 对象并进行一些清理：


    `        // 停止之前的媒体播放器并清理`

    `        if (mediaPlayer != null) {`

    `           mediaPlayer.stop();`

    `           mediaPlayer.currentTimeProperty().removeListener(progressListener);`

    `           mediaPlayer.setOnPaused(null);`

    `           mediaPlayer.setOnPlaying(null);`

    `           mediaPlayer.setOnReady(null);`

    `        }`


    `        // 准备就绪时播放视频`

    `        mediaPlayer.setOnReady(new Runnable() {`

    `            @Override`

    `            public void run() {`

    `               progressSlider.setValue(1);`


    `        progressSlider.setMax(mediaPlayer.getMedia().getDuration().toMillis()/1000);`

    `           mediaPlayer.play();`

    `        }`

    `    }); // setOnReady()`


    与音频播放器一样，我们创建一个 `Runnable` 实例，在媒体播放器处于就绪状态时运行。你还会注意到 `progressSlider` 控件被设置为使用以秒为单位的值。


    一旦媒体播放器对象处于就绪状态，你将创建一个 `MediaView` 实例来显示媒体。以下是创建 `MediaView` 对象并将其放入场景图以显示视频内容的代码：


    `            // 延迟初始化媒体查看器`

    `            if (mediaView == null) {`

    `                mediaView = MediaViewBuilder.create()`

    `                        .mediaPlayer(mediaPlayer)`

    `                        .x(4)`

    `                        .y(4)`

    `                        .preserveRatio(true)`

    `                        .opacity(.85)`

    `                        .build();`


    `                mediaView.fitWidthProperty().bind(scene.widthProperty().subtract(220));`

    `                mediaView.fitHeightProperty().bind(scene.heightProperty().subtract(30));`


    `                        // 将媒体查看器设为场景中的第二个节点`

    `                        root.getChildren().add(1, mediaView);`

    `                    }`


    `                    // 有时会发生加载错误`

    `                    mediaView.setOnError(new EventHandler<MediaErrorEvent>()
    {`

    `                        public void handle(MediaErrorEvent event) {`

    `                            event.getMediaError().printStackTrace();`

    `                        }`

    `                    });`


    `                    mediaView.setMediaPlayer(mediaPlayer);`

    `                    event.setDropCompleted(success);`

    `                    event.consume();`

    `                }`

    `            });`


    呼！我们终于完成了 `Scene` 的拖放 `EventHandler`。接下来基本上是食谱 3-1 末尾类似的媒体按钮控件。唯一不同的是一个名为 `paused`
    的 `boolean` 类型实例变量，用于指示视频是否已暂停。当此 `paused` 标志设置为 `true` 时，滑块控件可以在视频中向前或向后搜索；否则为
    `false`。以下是控制 `mediaPlayer` 对象并相应设置 `paused` 标志的 `pauseButton` 和 `playButton`：


    `// 暂停媒体并交换按钮为播放按钮`

    `pauseButton.setOnMousePressed(new EventHandler<MouseEvent>() {`

    `    public void handle(MouseEvent me) {`

    `        if (mediaPlayer!=null) {`

    `            buttonArea.getChildren().removeAll(pauseButton, playButton);`

    `            buttonArea.getChildren().add(playButton);`

    `            mediaPlayer.pause();`

    `            paused = true;`

    `        }`

    `    }`

    `});`


    `// 播放媒体并交换按钮为暂停按钮`

    `playButton.setOnMousePressed(new EventHandler<MouseEvent>() {`

    `    public void handle(MouseEvent me) {  `

    `        if (mediaPlayer != null) {`

    `            buttonArea.getChildren().removeAll(pauseButton, playButton);`

    `            buttonArea.getChildren().add(pauseButton);`

    `            paused = false;`

    `            mediaPlayer.play();                    `

    `        }`

    `    }`

    `});`


    以上就是创建视频媒体播放器的方法。在下一个食谱中，你将能够监听媒体事件并调用操作。

