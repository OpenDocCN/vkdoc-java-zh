  raw: '#### Solution #1


    Develop a JavaFX HelloWorld application using the JavaFX project creation wizard
    in the NetBeans IDE.


    **CREATING A JAVAFX HELLO WORLD APPLICATION IN NETBEANS**


    To quickly get started with creating, coding, compiling, and running a simple
    JavaFX HelloWorld application using the NetBeans IDE, follow these steps:


    Launch NetBeans IDE.


    1) On the File menu, select New Project.


    2) Under Choose Project and Categories, select the JavaFX folder.


    3) Under Projects, select Java FX Application, and click Next.


    4) Specify **HelloWorldMain** for your project name.


    5) Change or accept the defaults for the Project Location and Project Folder fields.


    6) Make sure the Create Application Class check box option is selected. Click
    Finish.


    7) In the NetBeans IDE on the Projects tab, select the newly created project.
    Open the Project Properties dialog box to verify that the Source/Binary format
    settings are JDK 7\. Click Sources under Categories.


    8) While still in the Project Properties dialog box, under Categories, select
    Libraries to verify that the Java 7 and JavaFX platform are configured properly.
    Click the Manage Platforms button. Make sure a tab showing JavaFX libraries appears.
    [Figure 1-5](#Chapter01.html#fig_1_5) depicts the JavaFX tab detailing its SDK
    home, Runtime, and Javadoc directory locations. Once verified, click the Close
    button.


    [Figure 1-5](#Chapter01.html#fig_1_5) shows the Java Platform Manager window containing
    JavaFX as a managed platform included with JDK 7.


    ![images](images/0105.jpg)


    ***Figure 1-5.** Java Platform Manager*


    9) After closing the Java Platform Manager window, click OK to close the Project
    Properties window.


    10) To run and test your JavaFX Hello World application, access the Run menu,
    and select Run Main Project or hit the F6 key.


    Shown in [Figure 1-6](#Chapter01.html#fig_1_6) is a simple JavaFX Hello World
    application launched from the NetBeans IDE.


    ![images](images/0106.jpg)


    ***Figure 1-6.** JavaFX Hello World launched from the NetBeans IDE*


    #### Solution #2


    Use your favorite editor to code your JavaFX Hello World application. Once the
    Java file is created you will use the command-line prompt to compile and run your
    JavaFX application. Following are the steps to create a JavaFX Hello World application
    to be compiled and run on the command-line prompt.


    **CREATING A JAVAFX HELLO WORLD APPLICATION IN ANOTHER IDE**


    To quickly get started:


    1\. Copy and paste the following code into your favorite editor and save the file
    as `HelloWorldMain.java`.


    The following source code is a JavaFX Hello World application:


    `package helloworldmain;`


    `import javafx.application.Application;`

    `import javafx.event.ActionEvent;`

    `import javafx.event.EventHandler;`

    `import javafx.scene.Group;`

    `import javafx.scene.Scene;`

    `import javafx.scene.control.Button;`

    `import javafx.stage.Stage;`


    `/**`

    ` *`

    ` * @author cdea`

    ` */`

    `public class HelloWorldMain extends Application {`


    `    /**`

    `     * @param args the command line arguments`

    `     */`

    `    public static void main(String[] args) {`

    `        Application.launch(args);`

    `    }`


    `    @Override`

    `    public void start(Stage primaryStage) {`

    `        primaryStage.setTitle("Hello World");`

    `        Group root = new Group();`

    `        Scene scene = new Scene(root, 300, 250);`

    `        Button btn = new Button();`

    `        btn.setLayoutX(100);`

    `        btn.setLayoutY(80);`

    `        btn.setText("Hello World");`

    `        btn.setOnAction(new EventHandler<ActionEvent>() {`


    `            public void handle(ActionEvent event) {`

    `                System.out.println("Hello World");`

    `            }`

    `        });`

    `        root.getChildren().add(btn);`

    `        primaryStage.setScene(scene);`

    `        primaryStage.show();`

    `    }`

    `}`


    2\. After saving the file named `HelloWorldMain.java`, on the command-line prompt
    you will navigate to the directory location of the file.


    3\. Compile the source code file HelloWorldMain.java using the Java compiler `javac`:


    `    javac -d . HelloWorldMain.java`


    4\. Run and test your JavaFX Hello World application. Assuming you are located
    in the same directory as the `HelloWorldMain.java` file, type the following command
    to run your JavaFX Hello World application from the command-line prompt:


    `    java helloworldmain.HelloWorldMain`


    Shown in [Figure 1-7](#Chapter01.html#fig_1_7) is a simple JavaFX Hello World
    application launched from the command-line prompt.


    ![images](images/0107.jpg)


    ***Figure 1-7.** JavaFX Hello World launched from the command-line prompt*


    #### How It Works


    Following are descriptions of the two solutions. Both solutions require prerequisite
    software. (I cover how to install required software in recipe 1-1.) In Solution
    #1 you will be creating a JavaFX application using the NetBeans IDE. Solution
    #2 allows you to choose your favorite editor and use the command-line prompt to
    compile and execute JavaFX programs.


    #### Solution #1


    To create a simple JavaFX Hello World application, using the NetBeans you will
    use the JavaFX project creation wizard as specified in Steps 1 through 7\. In
    Steps 8 through 10, you will verify two settings to ensure that the project is
    configured to compile and run JavaFX 2.0 applications properly. Finally, in Step
    11 you will run the JavaFX Hello World application by selecting the Run Main Project
    menu option.


    You shouldn’t encounter any difficulty when following Steps 1 through 7\. However,
    Steps 8 through 10 address a minor NetBeans bug that has to do with setting your
    project source/binary format to JDK 7 and making sure that the managed platform
    includes the JavaFX runtime libraries. If you are not experiencing this issue,
    the NetBeans team may have already corrected the problem. To be on the safe side,
    it wouldn’t hurt to follow Steps 8 through 10 to verify your configurations before
    you begin.'
  trans: '

    #### 解决方案 #1


    使用 NetBeans IDE 中的 JavaFX 项目创建向导，开发一个 JavaFX HelloWorld 应用程序。


    **在 NETBEANS 中创建 JAVAFX HELLO WORLD 应用程序**


    要快速上手，使用 NetBeans IDE 创建、编码、编译并运行一个简单的 JavaFX HelloWorld 应用程序，请遵循以下步骤：


    启动 NetBeans IDE。


    1) 在“文件”菜单上，选择“新建项目”。


    2) 在“选择项目与类别”下，选择 `JavaFX` 文件夹。


    3) 在“项目”下，选择“Java FX 应用程序”，然后点击“下一步”。


    4) 将项目名称指定为 **HelloWorldMain**。


    5) 更改或接受“项目位置”和“项目文件夹”字段的默认值。


    6) 确保选中“创建应用程序类”复选框。点击“完成”。


    7) 在 NetBeans IDE 的“项目”选项卡中，选择新创建的项目。打开“项目属性”对话框，验证“源/二进制格式”设置为 JDK 7。在“类别”下点击“源”。


    8) 仍在“项目属性”对话框中，在“类别”下选择“库”，以验证 Java 7 和 JavaFX 平台已正确配置。点击“管理平台”按钮。确保出现一个显示 JavaFX
    库的选项卡。图 1-5 展示了 JavaFX 选项卡，详细说明了其 SDK 主目录、运行时和 Javadoc 目录位置。验证完毕后，点击“关闭”按钮。


    图 1-5 显示了“Java 平台管理器”窗口，其中包含作为 JDK 7 附带托管平台的 JavaFX。


    ![images](img/0105.jpg)


    ***图 1-5.** Java 平台管理器*


    9) 关闭“Java 平台管理器”窗口后，点击“确定”关闭“项目属性”窗口。


    10) 要运行并测试您的 JavaFX Hello World 应用程序，请访问“运行”菜单，并选择“运行主项目”或按 F6 键。


    图 1-6 显示了一个从 NetBeans IDE 启动的简单 JavaFX Hello World 应用程序。


    ![images](img/0106.jpg)


    ***图 1-6.** 从 NetBeans IDE 启动的 JavaFX Hello World*


    #### 解决方案 #2


    使用您喜欢的编辑器编写 JavaFX Hello World 应用程序的代码。创建 Java 文件后，您将使用命令行提示符来编译和运行您的 JavaFX 应用程序。以下是在命令行提示符下创建、编译和运行
    JavaFX Hello World 应用程序的步骤。


    **在其他 IDE 中创建 JAVAFX HELLO WORLD 应用程序**


    要快速上手：


    1. 将以下代码复制并粘贴到您喜欢的编辑器中，并将文件保存为 `HelloWorldMain.java`。


    以下源代码是一个 JavaFX Hello World 应用程序：


    `package helloworldmain;`


    `import javafx.application.Application;`

    `import javafx.event.ActionEvent;`

    `import javafx.event.EventHandler;`

    `import javafx.scene.Group;`

    `import javafx.scene.Scene;`

    `import javafx.scene.control.Button;`

    `import javafx.stage.Stage;`


    `/**`

    ` *`

    ` * @author cdea`

    ` */`

    `public class HelloWorldMain extends Application {`


    `    /**`

    `     * @param args the command line arguments`

    `     */`

    `    public static void main(String[] args) {`

    `        Application.launch(args);`

    `    }`


    `    @Override`

    `    public void start(Stage primaryStage) {`

    `        primaryStage.setTitle("Hello World");`

    `        Group root = new Group();`

    `        Scene scene = new Scene(root, 300, 250);`

    `        Button btn = new Button();`

    `        btn.setLayoutX(100);`

    `        btn.setLayoutY(80);`

    `        btn.setText("Hello World");`

    `        btn.setOnAction(new EventHandler<ActionEvent>() {`


    `            public void handle(ActionEvent event) {`

    `                System.out.println("Hello World");`

    `            }`

    `        });`

    `        root.getChildren().add(btn);`

    `        primaryStage.setScene(scene);`

    `        primaryStage.show();`

    `    }`

    `}`


    2. 保存名为 `HelloWorldMain.java` 的文件后，在命令行提示符下，导航到该文件所在的目录。


    3. 使用 Java 编译器 `javac` 编译源代码文件 `HelloWorldMain.java`：


    `    javac -d . HelloWorldMain.java`


    4. 运行并测试您的 JavaFX Hello World 应用程序。假设您与 `HelloWorldMain.java` 文件位于同一目录，请在命令行提示符下输入以下命令来运行您的
    JavaFX Hello World 应用程序：


    `    java helloworldmain.HelloWorldMain`


    图 1-7 显示了一个从命令行提示符启动的简单 JavaFX Hello World 应用程序。


    ![images](img/0107.jpg)


    ***图 1-7.** 从命令行提示符启动的 JavaFX Hello World*


    #### 工作原理


    以下是对两种解决方案的描述。两种解决方案都需要先决软件。（我将在配方 1-1 中介绍如何安装所需软件。）在解决方案 #1 中，您将使用 NetBeans IDE
    创建一个 JavaFX 应用程序。解决方案 #2 允许您选择自己喜欢的编辑器，并使用命令行提示符来编译和执行 JavaFX 程序。


    #### 解决方案 #1


    要创建一个简单的 JavaFX Hello World 应用程序，使用 NetBeans 时，您将按照步骤 1 到 7 中指定的方式使用 JavaFX 项目创建向导。在步骤
    8 到 10 中，您将验证两个设置，以确保项目已正确配置，能够编译和运行 JavaFX 2.0 应用程序。最后，在步骤 11 中，您将通过选择“运行主项目”菜单选项来运行
    JavaFX Hello World 应用程序。


    按照步骤 1 到 7 操作时，您不应遇到任何困难。然而，步骤 8 到 10 解决了一个较小的 NetBeans 错误，该错误涉及将项目的源/二进制格式设置为
    JDK 7，并确保托管平台包含 JavaFX 运行时库。如果您没有遇到此问题，可能是 NetBeans 团队已经修正了该问题。为安全起见，在开始之前按照步骤
    8 到 10 验证您的配置也无妨。

