    \ data type. In the preceding example we create first name and last name variables\
    \ of type `SimpleStringProperty` outside the created `Contact` domain object.\
    \ Once they have been created we bind them bidirectionally to allow changes to\
    \ update on either end. So if you change the domain object, the other bound properties\
    \ get updated. And when the outside variables are modified, the domain object’s\
    \ properties get updated. The following demonstrates bidirectional binding against\
    \ string properties on a domain object (`Contact`):\n\n```\nContact contact =\
    \ new Contact(\"John\", \"Doe\");\nStringProperty fname = new SimpleStringProperty();\n\
    fname.bindBidirectional(contact.firstNameProperty());\nStringProperty lname =\
    \ new SimpleStringProperty();\nlname.bindBidirectional(contact.lastNameProperty());\n\
    ```\n\nNext up is how to bind numbers. Binding numbers is simple when using the\
    \ new Fluent API. This high-level mechanism allows a developer to bind variables\
