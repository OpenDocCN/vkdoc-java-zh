- fmt: "### How It Works\n\nTo draw text in JavaFX you will be creating a `javafx.scene.text.Text`\
    \ node to be placed on the scene graph (`javafx.scene.Scene`). In this example\
    \ you’ll notice text objects with random colors and positions scattered about\
    \ the `Scene` area.\n\nFirst, we create a loop to generate random (x, y) coordinates\
    \ to position `Text` nodes. Second, we create random color components between\
    \ (0–255 rgb) to be applied to the `Text` nodes. Third, the rotation angle (in\
    \ degrees) is a randomly generated value between (0–360 degrees) to cause the\
    \ text to be slanted. The following code creates random values that will be assigned\
    \ to a `Text` node’s position, color, and rotation:\n\n```\nint x = rand.nextInt((int)\
    \ scene.getWidth());\nint y = rand.nextInt((int) scene.getHeight());\nint red\
    \ = rand.nextInt(255);\nint green = rand.nextInt(255);\nint blue = rand.nextInt(255);\n\
    int rot = rand.nextInt(360);\n```\n\nOnce the random values are generated, they\
    \ will be applied to the `Text` nodes, which will be drawn onto the scene graph.\
    \ The following code snippet applies position (x, y), color (rgb), and rotation\
    \ (angle in degrees) onto the `Text` node:\n\n```\nText text = new Text(x, y,\
    \ \"JavaFX 2.0\");\ntext.setFill(Color.rgb(red, green, blue, .99));\ntext.setRotate(rot);\n\
    \nroot.getChildren().add(text);\n```\n\nYou will begin to see the power of the\
    \ scene graph API by its ease of use. `Text` nodes can be easily manipulated as\
    \ if they were `Shapes`. Well, actually they really are `Shapes`. Defined in the\
    \ inheritance hierarchy, `Text` nodes extend from the `javafx.scene.shape.Shape`\
    \ class and are therefore capable of doing interesting things such as being filled\
    \ with colors or rotated about an angle. Although the text is colorized, they\
    \ still tend to be somewhat boring. However, in the next recipe we will demonstrate\
    \ how to change a text’s font.\n\n### 1-4: Changing Text Fonts\n\n#### Problem\n\
    \nYou want to change text fonts and add special effect to `Text` nodes.\n\n####\
    \ Solution\n\nCreate a JavaFX application that uses the following classes to set\
    \ the text font and apply effects on `Text` nodes:\n\n- `javafx.scene.text.Font`\n\
    - `javafx.scene.effect.DropShadow`\n- `javafx.scene.effect.Reflection`\n\nThe\
    \ code that follows sets the font and applies effects to `Text` nodes. We will\
    \ be using the Serif, SanSerif, Dialog, and Monospaced fonts along with the drop\
    \ shadow and reflection effects:\n\n```\npackage javafx2introbyexample.chapter1.recipe1_04;\n\
