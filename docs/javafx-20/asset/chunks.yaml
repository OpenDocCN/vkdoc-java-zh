    >     \n>     ![images](img/0403.jpg)\n>     \n>     ***图 4-3.** “新建 JavaFX 应用程序”对话框，您可在其中指定项目名称和项目位置*\n\
    >     \n>     \n> 4.  新项目创建完成后，您可以修改项目属性。要修改属性，请右键点击项目，然后从弹出菜单中选择“属性”。图 4-4 显示了创建的项目，其中包含一个名为\
