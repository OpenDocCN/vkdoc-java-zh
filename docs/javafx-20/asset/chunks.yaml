    Binding has the idea of at least two values being synchronized. This means when
    a dependent variable changes the other variable changes. JavaFX provides many
    binding options that enable the developer to synchronize properties in domain
    objects and GUI controls. This recipe will demonstrate the three common binding
    scenarios.


    One of the easiest ways to bind variables is a *bidirectional bind*. This scenario
    is often used when domain objects contain data that will be bound to a GUI form.
    In our recipe we create a simple contact (`Contact`) object containing a first
    name and last name. Notice the instance variables using the `SimpleStringProperty`
    class. Many of these classes, which end in `Property`, are `javafx.beans.Observable`
    classes that all have the ability to be bound. In order for these properties to
    be bound, they must be the same data type. In the preceding example we create
    first name and last name variables of type `SimpleStringProperty` outside the
    created `Contact` domain object. Once they have been created we bind them bidirectionally
    to allow changes to update on either end. So if you change the domain object,
    the other bound properties get updated. And when the outside variables are modified,
    the domain object’s properties get updated. The following demonstrates bidirectional
    binding against string properties on a domain object (`Contact`):


    `Contact contact = new Contact("John", "Doe");`

    `StringProperty fname = new SimpleStringProperty();`

    `fname.bindBidirectional(contact.firstNameProperty());`

    `StringProperty lname = new SimpleStringProperty();`

    `lname.bindBidirectional(contact.lastNameProperty());`


    Next up is how to bind numbers. Binding numbers is simple when using the new Fluent
    API. This high-level mechanism allows a developer to bind variables to compute
    values using simple arithmetic. Basically, a formula is “bound” to change its
    result based on changes to the variables it is bound to. Please look at the Javadoc
    for details on all the available methods and number types. In this example we
    simply create a formula for an area of a rectangle. The area (`NumberBinding`)
    is the binding, and its dependencies are the width and height (`IntegerProperty`)
    properties. When binding using the fluent interface API, you’ll notice the `multiply()`
    method. According to the Javadoc, all property classes inherit from the `NumberExpressionBase`
    class, which contains the number-based fluent interface APIs. The following code
    snippet uses the fluent interface API:


    `// Area = width * height`

    `final IntegerProperty width = new SimpleIntegerProperty(10);`

    `final IntegerProperty height = new SimpleIntegerProperty(10);    `

    `NumberBinding area = width.multiply(height);`


    The last scenario on binding numbers is considered more of a low-level approach.
    This allows the developer to use primitives and more-complex math operations.
    Here we use a `DoubleBinding` class to solve the volume of a sphere given the
    radius. We begin by implementing the `computeValue()` method to perform our calculation
    of the volume. Shown is the low-level binding scenario to compute the volume of
    a sphere by overriding the `computeValue()` method:


    `final DoubleProperty radius = new SimpleDoubleProperty(2);`


    `DoubleBinding volumeOfSphere = new DoubleBinding() {`

    `        {`

    `             super.bind(radius);`

    `        }`


    `        @Override`

    `        protected double computeValue() {`

    `                return (4 / 3 * Math.PI * Math.pow(radius.get(), 3));`

    `        }`

    `};`


    ### 1-11. Creating and Working with Observable Lists


    #### Problem


    You want to create a GUI application containing two list view controls allowing
    the user pass items between the two lists.


    #### Solution


    Take advantage of JavaFX’s `javafx.collections.ObservableList` and `javafx.scene.control.ListView`
    classes to provide a model-view-controller (MVC) mechanism that updates the UI’s
    list view control whenever the back-end list is manipulated.


    The following code creates a GUI application containing two lists that allow the
    user to send items contained in one list to be sent to the other. Here you will
    create a contrived application to pick candidates to be considered heroes. The
    user will pick potential candidates from the list on the left to be moved into
    the list on the right to be considered heroes. This demonstrates UI list controls’
    (`ListView`) ability to be synchronized with back-end store lists (`ObservableList`).


    `primaryStage.setTitle("Chapter 1-11 Creating and Working with ObservableLists");`

    `Group root = new Group();`

    `Scene scene = new Scene(root, 400, 250, Color.WHITE);`


    `// create a grid pane`

    `GridPane gridpane = new GridPane();`

    `gridpane.setPadding(new Insets(5));`

    `gridpane.setHgap(10);`

    `gridpane.setVgap(10);`


    `// candidates label`

    `Label candidatesLbl = new Label("Candidates");`

    `GridPane.setHalignment(candidatesLbl, HPos.CENTER);`

    `gridpane.add(candidatesLbl, 0, 0);`


    `Label heroesLbl = new Label("Heroes");`

    `gridpane.add(heroesLbl, 2, 0);`

    `GridPane.setHalignment(heroesLbl, HPos.CENTER);`


    `// candidates`

    `final ObservableList<String> candidates =`

    `FXCollections.observableArrayList("Superman",`

    `        "Spiderman",`

    `        "Wolverine",`

    `        "Police",`

    `        "Fire Rescue",`

    `        "Soldiers",`

    `        "Dad & Mom",`

    `        "Doctor",`

    `        "Politician",`

    `        "Pastor",`

    `        "Teacher");`

    `final ListView<String> candidatesListView = new ListView<String>(candidates);`

    `candidatesListView.setPrefWidth(150);`

    `candidatesListView.setPrefHeight(150);`


    `gridpane.add(candidatesListView, 0, 1);`


    `// heros`

    `final ObservableList<String> heroes = FXCollections.observableArrayList();`

    `final ListView<String> heroListView = new ListView<String>(heroes);`

    `heroListView.setPrefWidth(150);`

    `heroListView.setPrefHeight(150);`


    `gridpane.add(heroListView, 2, 1);`


    `// select heroes`

    `Button sendRightButton = new Button(">");`

    `sendRightButton.setOnAction(new EventHandler<ActionEvent>() {`


    `    public void handle(ActionEvent event) {`

    `        String potential = candidatesListView.getSelectionModel().getSelectedItem();`

    `        if (potential != null) {`

    `            candidatesListView.getSelectionModel().clearSelection();`

    `            candidates.remove(potential);`

    `            heroes.add(potential);`

    `        }`

    `    }`

    `});`


    `// deselect heroes`

    `Button sendLeftButton = new Button("<");`

    `sendLeftButton.setOnAction(new EventHandler<ActionEvent>() {`


    `    public void handle(ActionEvent event) {`

    `        String notHero = heroListView.getSelectionModel().getSelectedItem();`

    `        if (notHero != null) {`

    `            heroListView.getSelectionModel().clearSelection();`

    `            heroes.remove(notHero);`

    `            candidates.add(notHero);`

    `        }`

    `    }`

    `});`


    `VBox vbox = new VBox(5);`

    `vbox.getChildren().addAll(sendRightButton,sendLeftButton);`


    `gridpane.add(vbox, 1, 1);`

    `GridPane.setConstraints(vbox, 1, 1, 1, 2,HPos.CENTER, VPos.CENTER);`


    `root.getChildren().add(gridpane);        `

    `primaryStage.setScene(scene);`

    `primaryStage.show();`


    [Figure 1-17](#Chapter01.html#fig_1_17) depicts our hero selection application.


    ![images](images/0117.jpg)


    ***Figure 1-17.** ListViews and ObservableLists*'
