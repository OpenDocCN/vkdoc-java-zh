    ![images](images/square.jpg) **Note** To run this recipe example, make sure the
    CSS files are located in the compiled classes area. Resource files can be loaded
    easily when placed in the same directory (package) as the compiled class file
    that is loading them. The CSS files are co-located with this code example file.
    In NetBeans, you can select Clean and build project or you can copy files to your
    classes build area.


    Now, that you know how to load CSS styles, let’s talk about the JavaFX CSS selectors
    and styling properties. Like CSS style sheets, there are selectors or style classes
    associated with `Node` objects in the Scene graph. All Scene graph nodes have
    a method called `setStyle()` to apply styling properties that could potentially
    change the node’s background color, border, stroke, and so on. Because all graph
    nodes extend from the `Node` class, derived classes will be able to inherit the
    same styling properties. Knowing the inheritance hierarchy of node types is very
    important because the type of node will determine the types of styling properties
    you can affect. For instance a Rectangle extends from Shape, which extends from
    Node. The inheritance does not include `-fx-border-style`, which is the part of
    nodes that extends from `Region`. Based on the type of node there are limitations
    to what styles you are able to set. To see a full listing of all style selectors
    refer to the JavaFX CSS Reference Guide: [`http://download.oracle.com/docs/cd/E17802_01/javafx/javafx/1.3/docs/api/javafx.scene/doc-files/cssref.html`](http://download.oracle.com/docs/cd/E17802_01/javafx/javafx/1.3/docs/api/javafx.scene/doc-files/cssref.html).


