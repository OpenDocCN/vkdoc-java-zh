    `当前 - StringProperty 值   : John Doe`

    `当前 - Contact 值          : John Doe`

    `修改 StringProperty 值`

    `修改后 - StringProperty 值   : Jane Deer`

    `修改后 - Contact 值          : Jane Deer`


    `矩形的面积 [高级 Fluent API]`

    `当前 - 宽度和高度     : 10 10`

    `当前 - 矩形面积: 100`

    `修改宽度和高度`

    `修改后 - 宽度和高度     : 100 700`

    `修改后 - 矩形面积: 70000`


    `球体的体积 [低级 API]`

    `当前 - 球体半径: 2.0`

    `当前 - 球体体积: 25.132741228718345`

    `修改 DoubleProperty 半径`

    `修改后 - 球体半径: 50.0`

    `修改后 - 球体体积: 392699.0816987241`

