    Look ‘n’ Feels. To showcase the available skins, a menu selection allows the user
    to choose the Look ‘N’ Feel to apply to the UI.


    Before discussing CSS styling properties, I want to show you how to load the CSS
    styles to be applied to a JavaFX application. You will first need to create menu
    items to allow the user to choose the preferred Look ‘N’ Feel. When creating a
    menu item you will create a convenience method to build a menu item that would
    load the specified CSS and an `EventHandler` action to apply the chosen CSS style
    onto the current UI. To add the Caspian theme as a menu item you will notice that
    no resources are needed to be loaded because it is JavaFX’s current Look ‘n’ Feel.
    Shown here is adding a menu item containing the Caspian Look ‘N’ Feel CSS style
    that can be applied to the current UI:


    `MenuItem caspianLnf = new MenuItem("Caspian");`

    `caspianLnf.setOnAction(skinForm(caspian, scene));`


    Shown here is adding a menu item containing the sky Look ‘N’ Feel CSS style ready
    to be applied to the current UI:


    `MenuBar menuBar = new MenuBar();`

    `Menu menu = new Menu("Look ''N'' Feel");`

    `menu.getItems().add(createMenuItem("Sky", "sky.css", scene));`


    Calling the `createMenuItem()` method will also call another convenience method
    to load the CSS file called `loadSkin()`. It will also set the menu items `onAction`
    attribute with an appropriate `EventHandler` by calling the `skinForm()` method.
    To recap, the `loadSkin` is responsible for loading the CSS file, and the `skinForm()`
    method’s job is to apply the skin onto the UI application. Shown here are the
    convenience methods to build menu items that apply CSS styles onto a UI application:


    `    protected final MenuItem createMenuItem(String label, String css, final Scene
    scene){`

    `        MenuItem menuItem = new MenuItem(label);`

    `        ObservableList<String> cssStyle = loadSkin(css);`

    `        menuItem.setOnAction(skinForm(cssStyle, scene));`

    `        return menuItem;`

    `    }`


    `    protected final ObservableList<String> loadSkin(String cssFileName) {`

    `        ObservableList<String> cssStyle = FXCollections.observableArrayList();`

    `        cssStyle.addAll(getClass().getResource(cssFileName).toExternalForm());`

    `        return cssStyle;`

    `    }`


    `    protected final EventHandler<ActionEvent> skinForm(final ObservableList<String>
    cssStyle,`

    `final Scene scene) {`

    `        return new EventHandler<ActionEvent>(){`

    `            public void handle(ActionEvent event) {`

    `                scene.getStylesheets().clear();`

