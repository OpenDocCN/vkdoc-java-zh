- fmt: "#### How It Works\n\nIn this recipe you will be creating a JavaFX application\
    \ able to retrieve XML information from Yahoo’s weather service. Once the XML\
    \ is parsed, HTML content is assembled and rendered onto JavaFX’s `WebView` node.\
    \ The `WebView` object instance is a graph node capable of rendering and retrieving\
    \ XML or any HTML5 content. The application will also display a countdown of the\
    \ number of seconds until the next retrieval from the weather service.\n\nWhen\
    \ accessing weather information for your area through Yahoo’s weather service,\
    \ you will need to obtain a location ID or the URL to the RSS feed associated\
    \ with your city. Before I explain the code line by line, I will list the steps\
    \ to obtain the URL for the RSS feed of your local weather forecasts.\n\n> 1.\
    \  Open browser to [`http://weather.yahoo.com/`](http://weather.yahoo.com/).\n\
    > 2.  Enter city or ZIP code and press Go button.\n> 3.  Click the small orange\
    \ colored RSS button near the right side of the web page (under “Add weather to\
    \ your website”).\n> 4.  Copy and paste the URL address line in your browser to\
    \ be used in the code for your weather application. For example, I used the following\
    \ RSS URL web address: [`http://weather.yahooapis.com/forecastrss?p=USMD0033&u=f`](http://weather.yahooapis.com/forecastrss?p=USMD0033&u=f).\n\
    \nNow that you have obtained a valid RSS URL web address, let’s use it in our\
    \ recipe example. When creating the `ManipulatingHtmlContent` class, you will\
    \ need two instance variables: `url` and `refreshCountdown`. The `url` variable\
    \ will be assigned to the RSS URL web address from Step 4. The `refreshCountdown`\
    \ variable of type `int` is assigned 60 to denote the time in seconds until a\
    \ refresh or another retrieval of the weather information takes place.\n\nLike\
    \ all our JavaFX examples inside of the `start()` method, we begin by creating\
    \ the `Scene` object for the initial main content region. Next, we create a `javafx.scene.web.WebEngine`\
    \ instance by passing in the `url` into the constructor. The `WebEngine` object\
    \ will asynchronously load the web content from Yahoo’s weather service. Later\
    \ we will discuss the callback method responsible for handling the content when\
    \ the web content is done loading. The following code line will create and load\
    \ a URL web address using a `WebEngine` object:\n\n```\nfinal WebEngine webEngine\
    \ = new WebEngine(url);\n```\n\nAfter you create a `WebEngine` object, you will\
    \ be creating an HTML document that will form as a template for later assembling\
    \ when the web content is successfully loaded. Although the code contains HTML\
    \ markup tags in Java code, which totally violates the principles of the separation\
    \ of concerns, I inlined HTML by concatenating string values for brevity. To have\
    \ a proper MVC-style separation, you may want to create a separate file containing\
    \ your HTML content with substitution sections for data that will change over\
    \ time. The code snippet that follows is the start of the creation of a template\
    \ used to display weather information:\n\n```\n    StringBuilder template = new\
    \ StringBuilder();\n    template.append(\"<head>\\n\")\n       .append(\"<style\
    \ type=\\\"text/css\\\">body {background-color:#b4c8ee;}</style>\\n\")\n     \
    \  .append(\"</head>\\n\")\n       .append(\"<body id='weather_background'>\"\
    );\n```\n\nOnce you have created your web page by concatenating strings, you will\
    \ create a `WebView` object instance, which is a displayable graph node that will\
    \ be responsible for rendering the web page. Remember from recipe 4-2, in which\
    \ we discussed that a `WebView` will have its own instance of a `WebEngine`. Knowing\
    \ this fact, we only use the `WebView` node to render the assembled HTML web page,\
    \ not to retrieve the XML weather information via a URL. In other words, the `WebEngine`\
    \ object is responsible for retrieving the XML from Yahoo’s Weather service to\
    \ be parsed and then fed into the `WebView` object to be displayed as HTML. The\
    \ following code snippet instantiates a `WebView` graph node that is responsible\
    \ for rendering HTML5 content:\n\n```\nfinal WebView webView = new WebView();\n\
    ```\n\nNext, you will create a countdown timer to refresh the weather information\
    \ being displayed in the application window. First, you will instantiate an `IntegerProperty`\
    \ variable, `countdown`, to hold the number of seconds until the next refresh\
    \ time. Second, you will add a change listener (`ChangeListener`) to update the\
    \ HTML content dynamically using JavaFX’s capability to execute JavaScript. The\
    \ change listener also will determine whether the countdown has reached zero.\
    \ If so, it will invoke the `webEngine`’s (`WebEngine`) `reload()` method to refresh\
    \ or retrieve the weather information again. The following is the code that creates\
    \ an `IntegerProperty` value to update the countdown text within the HTML using\
    \ the `executeScript()` method:\n\n```\nIntegerProperty countDown = new SimpleIntegerProperty(refreshCountdown);\n\
    countDown.addListener(new ChangeListener<Number>() {\n     @Override\n     public\
    \ void changed(ObservableValue<? extends Number> observable, Number oldValue,\n\
    Number newValue){\n\nwebView.getEngine().executeScript(\"document.getElementById('countdown').innerHTML\
    \ =\"\n'Seconds till refresh: \" + newValue + \"'\");\n                if (newValue.intValue()\
    \ == 0) {\n                    webEngine.reload();\n                }\n      \
    \      }\n}); // addListener()\n```\n\nAfter implementing your `ChangeListener`,\
    \ you can create a `TimeLine` object to cause change on the `countdown` variable,\
    \ thus triggering the `ChangeListener` to update the HTML text depicting the seconds\
    \ until refresh. The follow code implements a `TimeLine` to update the `countDown`\
    \ variable:\n\n```\nfinal Timeline timeToRefresh = new Timeline();\ntimeToRefresh.getKeyFrames().addAll(\n\
    \    new KeyFrame(Duration.ZERO, new KeyValue(countDown, refreshCountdown)),\n\
    \    new KeyFrame(Duration.seconds(refreshCountdown), new KeyValue(countDown,\
    \ 0))\n);\n```\n\nIn summary, the rest of the code creates a `ChangeListener`\
    \ that responds to a `State.SUCCEEDED`. Once the `webEngine` (`WebEngine`) has\
    \ finished retrieving the XML, the change listener (`ChangeListener`) is responsible\
    \ for parsing and rendering the assembled web page into the `webView` node. The\
    \ following code parses and displays the weather data by calling the `loadContent()`\
    \ method on the `WebView`’s `WebEngine` instance:\n\n```\n                if (newValue\
    \ != State.SUCCEEDED) {\n                    return;\n                }\n    \
    \            Weather weather = parse(webEngine.getDocument());\n\n           \
    \     ...// the rest of the inlined HTML\n\n                String countdownText\
    \ = \"<b id=\\\"countdown\\\"></b><br />\\n\";\n                webView.getEngine().loadContent(fullHtml\
    \ + location.toString() +\n                        timeOfWeatherTextDiv +\n  \
    \                      countdownText +\n                        weather.htmlDescription);\n\
    ```\n\nTo parse the XML returned by the `webEngine`’s `getDocument()` method,\
    \ you will interrogate the `org.w3c.dom.Document` object. For convenience, I created\
    \ a `parse()` method to walk the DOM to obtain weather data and return as a `Weather`\
    \ object. See Javadocs and Yahoo’s RSS XML Schema for more information on data\
    \ elements returned from weather service.\n\n### 4-4. Responding to HTML Events\n\
    \n#### Problem\n\nYou begin to feel sorry for your other cube mates who are also\
    \ oblivious to the outside world. A storm is approaching and you want to let them\
    \ know to take their umbrella before leaving the building."
