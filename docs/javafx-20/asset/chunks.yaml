    ## C H A P T E R  1


    ## JavaFX Fundamentals


    The JavaFX 2.0 API is Java’s next generation GUI toolkit for developers to build
    rich cross-platform applications. JavaFX 2.0 is based on a scene graph paradigm
    (retained mode) as opposed to the traditional immediate mode style rendering.
    JavaFX’s scene graph is a tree-like data structure that maintains vector-based
    graphic nodes. The goal of JavaFX is to be used across many types of devices such
    as mobile devices, smartphones, TVs, tablet computers, and desktops.


    Before the creation of JavaFX, the development of rich Internet applications (RIAs)
    involved the gathering of many separate libraries and APIs to achieve highly functional
    applications. These separate libraries include Media, UI controls, Web, 3D, and
    2D APIs. Because integrating these APIs together can be rather difficult, the
    talented engineers at Sun Microsystems (now Oracle) created a new set of JavaFX
    libraries that roll up all the same capabilities under one roof. JavaFX is the
    Swiss Army Knife of GUIs (see [Figure 1-1](#Chapter01.html#fig_1_1)). JavaFX 2.0
    is a pure Java (language) API that allows developers to leverage existing Java
    libraries and tools.


    ![images](images/0101.jpg)


    ***Figure 1-1.** JavaFX*


    Depending on who you talk to, you will likely encounter different definitions
    of “user experience” (or in the UI world, UX). But one fact still remains; the
    users will always demand better content and increased usability from GUI applications.
    In light of this fact, developers and designers often work together to craft applications
    to fulfill this demand. JavaFX provides a toolkit that helps both the developer
    and designer (in some cases, they happen to be the same person) to create functional
    yet esthetically pleasing applications. Another thing to acknowledge is that if
    you are developing a game, media player, or the usual enterprise application,
    JavaFX will not only assist in developing richer UIs but you’ll also find that
    the APIs are extremely well designed to greatly improve developer productivity
    (I’m all about the user of the API’s perspective).


    Although this book doesn’t go through an exhaustive study of all of JavaFX 2.0’s
    capabilities, you will find common use cases that can help you build richer applications.
    Hopefully, these recipes can lead you in the right direction by providing practical
    and real-world examples. I also would like to encourage you to explore other resources
    to gain further insight into JavaFX. I highly recommend the book *Pro JavaFX Platform*
    (Apress, 2009) and the soon to released *Pro JavaFX 2.0 Platform* (Apress, 2012),
    which is an invaluable resource. These books go in depth to help you create professional
    grade applications.


    So without further ado, let’s get started, shall we?


    ### 1-1. Installing Required Software


    #### Problem


    You want to start developing JavaFX applications, but you don’t know what software
    is required to be installed.


    #### Solution


    You’ll need to install the following software in order to get started with JavaFX:


    > *   Java 7 JDK or greater

    > *   JavaFX 2.0 SDK

    > *   NetBeans IDE 7.1 or greater


    ![images](images/square.jpg) **Note** As of this writing, things are subject to
    change. To see additional requirements, refer to [`http://download.oracle.com/javafx/2.0/system_requirements/jfxpub-system_requirements.htm`](http://download.oracle.com/javafx/2.0/system_requirements/jfxpub-system_requirements.htm).


    As of this writing, things are subject to change. By the time you read this; you
    will likely find JavaFX able to run on your favorite OS. For this recipe, I assume
    that Java 7 is already installed so I won’t detail those installation steps. Following
    are steps to install all other required software components:


    > 1.  Download JavaFX 2.0 and NetBeans IDE 7.1.x from the following locations:

    >     *   JavaFX 2.0 SDK: [`http://www.oracle.com/technetwork/java/javafx/downloads/index.html`](http://www.oracle.com/technetwork/java/javafx/downloads/index.html)

    >     *   NetBeans 7.1 beta SDK: [`http://netbeans.org`](http://netbeans.org)

    > 2.  Install JavaFX 2.0 SDK. The screen in [Figure 1-2](#Chapter01.html#fig_1_2)
    will appear once you’ve launched the JavaFX SDK Setup executable.


    Once you have launched the JavaFX SDK setup executable you will see the start
    of the wizard in [Figure 1-2](#Chapter01.html#fig_1_2).


    ![images](images/0102.jpg)


    ***Figure 1-2.** JavaFX 2.0 SDK Setup Wizard*


    3.  Next, you can specify the home directory of the JavaFX SDK by clicking the
    Browse button. [Figure 1-3](#Chapter01.html#fig_1_3) shows the default location
    for the JavaFX SDK’s home directory. You might want to jot this location down
    in order to configure your `CLASSPATH` in Step 6.


    [Figure 1-3](#Chapter01.html#fig_1_3) displays Setup Options, which allow you
    to specify the JavaFX 2.0 SDK’s home directory.


    ![images](images/0103.jpg)


    ***Figure 1-3.** JavaFX SDK home directory*


    4.  After you click Next, the components will install and the screen shown in
    [Figure 1-4](#Chapter01.html#fig_1_4) will appear.


    [Figure 1-4](#Chapter01.html#fig_1_4) displays the progress indicator installing
    the last components before completing.


    ![images](images/0104.jpg)


    ***Figure 1-4.** Completing the install*


    5.  Install the NetBeans IDE, which includes the JavaFX 2.0 plug-in.


    When installing, you will follow the default wizard screens. For additional instructions,
    you may refer to [`http://netbeans.org/community/releases/71/install.html`](http://netbeans.org/community/releases/71/install.html).


    6.  Configuring your environment variable `CLASSPATH` to include the JavaFX runtime
    library. The name and location of the runtime library is at `<JavaFX SDK Home
    directory>\rt\lib\jfxrt.jar`. (Linux uses the forward slash: /).


    #### How It Works


    This recipe shows how to install Java FX 2.0 and the NetBeans IDE onto the Windows
    platform. You may need to modify your steps slightly when installing JavaFX 2.0
    on other operating systems as they become available. Although the steps described
    here are for NetBeans, you can also develop using other IDEs such as Eclipse,
    IntelliJ, or vi. While most of the example recipes were created using the NetBeans
    IDE, you can also compile and run JavaFX applications using the command-line prompt.


    To compile and run JavaFX applications using the command-line prompt you will
    need to configure your `CLASSPATH`. After you have followed the wizards to install
    the prerequisite software you will need to set your environment’s `CLASSPATH`
    variable to include the JavaFX runtime library `<JavaFX SDK Home directory>/rt/lib/jfxrt.jar`
    (Step 6). Setting this library will later assist in compiling and running JavaFX-based
    applications on the command-line. The following code configures your `CLASSPATH`
    environment variable based on your platform:


    *Setting CLASSPATH on Windows Platforms*


    ```

    set JAVAFX_HOME=C:\Program Files (x86)\Oracle\JavaFX 2.0 SDK

    set JAVA_HOME=C:\Program Files (x86)\Java\jdk1.7.0

    set CLASSPATH=%JAVAFX_HOME%\rt\lib\jfxrt.jar;.

    ```


    *Setting CLASSPATH on UNIX/Linux/Mac OS platforms*


    ```

    # bash environments

    export JAVAFX_HOME=<JavaFX SDK Home>

    export CLASSPATH=$CLASSPATH:$JAVAFX_HOME/rt/lib/jfxrt.jar


    #csh environments

    setenv JAVAFX_HOME <JavaFX SDK Home>

    setenv CLASSPATH ${CLASSPATH}:${JAVAFX_HOME}/rt/lib/jfxrt.jar

    ```


    In recipe 1-2 you will learn how to create a simple Hello World application. Once
    your Hello World application is created, you will be able to compile and run a
    JavaFX-based application.


    ### 1-2. Creating a Simple User Interface


    #### Problem


    You want to create, code, compile, and run a simple JavaFX Hello World application.'
