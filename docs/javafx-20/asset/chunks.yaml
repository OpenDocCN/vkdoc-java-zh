    ## 第 1 章


    ## JavaFX 基础


    JavaFX 2.0 API 是 Java 的下一代 GUI 工具包，供开发者构建丰富的跨平台应用程序。JavaFX 2.0 基于场景图范式（保留模式），而非传统的即时模式渲染风格。JavaFX
    的场景图是一种树状数据结构，用于维护基于矢量的图形节点。JavaFX 的目标是应用于多种设备类型，例如移动设备、智能手机、电视、平板电脑和台式机。


    在 JavaFX 诞生之前，开发富互联网应用程序（RIA）需要整合许多独立的库和 API，才能实现功能强大的应用程序。这些独立的库包括媒体、UI 控件、Web、3D
    和 2D API。由于将这些 API 整合在一起相当困难，Sun Microsystems（现为 Oracle）才华横溢的工程师们创建了一套新的 JavaFX
    库，将所有相同功能整合到一个屋檐下。JavaFX 堪称 GUI 领域的瑞士军刀（参见图 1-1）。JavaFX 2.0 是一个纯 Java（语言）API，允许开发者利用现有的
    Java 库和工具。


    ![images](img/0101.jpg)


    ***图 1-1.** JavaFX*


    根据你交谈的对象不同，你可能会遇到对“用户体验”（或在 UI 领域，UX）的不同定义。但有一个事实依然不变：用户总是期望 GUI 应用程序提供更好的内容和更高的可用性。鉴于此，开发者和设计师经常携手合作，共同打造满足这一需求的应用程序。JavaFX
    提供了一个工具包，帮助开发者和设计师（在某些情况下，他们可能是同一个人）创建既实用又美观的应用程序。另外需要承认的是，无论你是在开发游戏、媒体播放器，还是常见的企业级应用程序，JavaFX
    不仅能帮助你开发更丰富的用户界面，你还会发现其 API 设计得极为出色，能大幅提升开发者的生产力（我完全是从 API 使用者的角度出发）。


    尽管本书并未详尽研究 JavaFX 2.0 的所有功能，但你会找到一些常见的用例，它们能帮助你构建更丰富的应用程序。希望这些范例能通过提供实用且贴近现实的示例，为你指明正确的方向。我也鼓励你探索其他资源，以更深入地了解
    JavaFX。我强烈推荐《Pro JavaFX Platform》（Apress，2009 年）以及即将出版的《Pro JavaFX 2.0 Platform》（Apress，2012
    年），这些都是非常宝贵的资源。这些书籍会深入讲解，帮助你创建专业级的应用程序。


    那么，闲话少叙，我们开始吧，好吗？


    ### 1-1. 安装所需软件


    #### 问题


    你想开始开发 JavaFX 应用程序，但不知道需要安装哪些软件。


    #### 解决方案


    你需要安装以下软件才能开始使用 JavaFX：


    > *   Java 7 JDK 或更高版本

    > *   JavaFX 2.0 SDK

    > *   NetBeans IDE 7.1 或更高版本


    ![images](img/square.jpg) **注意** 在撰写本文时，情况可能会发生变化。要查看其他要求，请参阅 [`http://download.oracle.com/javafx/2.0/system_requirements/jfxpub-system_requirements.htm`](http://download.oracle.com/javafx/2.0/system_requirements/jfxpub-system_requirements.htm)。


    在撰写本文时，情况可能会发生变化。当你阅读本文时，你可能会发现 JavaFX 能够在你喜欢的操作系统上运行。对于本教程，我假设 Java 7 已经安装，因此我不会详述其安装步骤。以下是安装所有其他所需软件组件的步骤：


    > 1.  从以下位置下载 JavaFX 2.0 和 NetBeans IDE 7.1.x：

    >     *   JavaFX 2.0 SDK：[`http://www.oracle.com/technetwork/java/javafx/downloads/index.html`](http://www.oracle.com/technetwork/java/javafx/downloads/index.html)

    >     *   NetBeans 7.1 beta SDK：[`http://netbeans.org`](http://netbeans.org)

    > 2.  安装 JavaFX 2.0 SDK。启动 JavaFX SDK 安装可执行文件后，将出现图 1-2 所示的界面。


    启动 JavaFX SDK 安装可执行文件后，你将看到图 1-2 中的向导起始界面。


    ![images](img/0102.jpg)


    ***图 1-2.** JavaFX 2.0 SDK 安装向导*


    3.  接下来，你可以通过单击“浏览”按钮指定 JavaFX SDK 的主目录。图 1-3 显示了 JavaFX SDK 主目录的默认位置。你可能需要记下此位置，以便在第
    6 步中配置你的 CLASSPATH。


    图 1-3 显示了安装选项，允许你指定 JavaFX 2.0 SDK 的主目录。


    ![images](img/0103.jpg)


    ***图 1-3.** JavaFX SDK 主目录*


    4.  单击“下一步”后，组件将开始安装，随后将出现图 1-4 所示的界面。


    图 1-4 显示了在完成安装前安装最后几个组件的进度指示器。


    ![images](img/0104.jpg)


    ***图 1-4.** 完成安装*


    5.  安装 NetBeans IDE，其中包含 JavaFX 2.0 插件。


    安装时，你将按照默认的向导界面进行操作。如需其他说明，请参阅 [`http://netbeans.org/community/releases/71/install.html`](http://netbeans.org/community/releases/71/install.html)。


    6.  配置你的环境变量 CLASSPATH，使其包含 JavaFX 运行时库。运行时库的名称和位置为 `<JavaFX SDK 主目录>\rt\lib\jfxrt.jar`。（Linux
    使用正斜杠 /）。


    #### 工作原理


    本教程演示了如何在 Windows 平台上安装 JavaFX 2.0 和 NetBeans IDE。在其他操作系统上安装 JavaFX 2.0 时，你可能需要根据实际情况稍微调整步骤。虽然此处描述的步骤是针对
    NetBeans 的，但你也可以使用其他 IDE 进行开发，例如 Eclipse、IntelliJ 或 vi。虽然大多数示例教程都是使用 NetBeans
    IDE 创建的，但你也可以使用命令行提示符编译和运行 JavaFX 应用程序。


    要使用命令行提示符编译和运行 JavaFX 应用程序，你需要配置你的 CLASSPATH。按照向导安装必备软件后，你需要设置环境的 `CLASSPATH`
    变量，使其包含 JavaFX 运行时库 `<JavaFX SDK 主目录>/rt/lib/jfxrt.jar`（第 6 步）。设置此库将有助于后续在命令行上编译和运行基于
    JavaFX 的应用程序。以下代码根据你的平台配置 CLASSPATH 环境变量：


    *在 Windows 平台上设置 CLASSPATH*


    `set JAVAFX_HOME=C:\Program Files (x86)\Oracle\JavaFX 2.0 SDK`

    `set JAVA_HOME=C:\Program Files (x86)\Java\jdk1.7.0`

    `set CLASSPATH=%JAVAFX_HOME%\rt\lib\jfxrt.jar;.`


    *在 UNIX/Linux/Mac OS 平台上设置 CLASSPATH*


    `# bash 环境`

    `export JAVAFX_HOME=<JavaFX SDK 主目录>`

    `export CLASSPATH=$CLASSPATH:$JAVAFX_HOME/rt/lib/jfxrt.jar`


    `#csh 环境`

    `setenv JAVAFX_HOME <JavaFX SDK 主目录>`

    `setenv CLASSPATH ${CLASSPATH}:${JAVAFX_HOME}/rt/lib/jfxrt.jar`


    在教程 1-2 中，你将学习如何创建一个简单的 Hello World 应用程序。创建 Hello World 应用程序后，你将能够编译和运行基于 JavaFX
    的应用程序。


    ### 1-2. 创建简单的用户界面


    #### 问题


    你想创建、编码、编译并运行一个简单的 JavaFX Hello World 应用程序。

