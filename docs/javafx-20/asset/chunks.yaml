  raw: '#### How It Works


    The form designer application will allow the user to adjust properties dynamically
    using the `GridPane` property control panel to the left. While adjusting properties
    from the left control panel the target form on the right side will be manipulated
    dynamically. When creating a simple form designer application you will be binding
    controls to various properties onto the target form (`GridPane`). This designer
    application is basically broken out into three classes: `ManipulatingLayoutViaGrids`,
    `MyForm`, and `GridPaneControlPanel`. First the `ManipulatingLayoutViaGrids` class
    is the main application to be launched. Second, `MyForm` is the target form that
    will be manipulated. Last, `GridPaneControlPanel` is the grid property control
    panel that has UI controls bound to the targets form’s grid pane properties.


    You begin by creating the main launching point for the application (`ManipulatingLayoutViaGrids`).
    This class is responsible for creating a split pane (`SplitPane`) that sets up
    the target form to the right and instantiates a `GridPaneControlPanel` to be displayed
    to the left. To instantiate a `GridPaneControlPanel` you must pass in the target
    form you want to manipulate into the constructor. I will discuss this further,
    but suffice it to say that the `GridPaneControlPanel` constructor will wire up
    its controls to properties on the target form.


    Next, you will simply create a dummy form that I’ve called `MyForm`. This form
    will be your target form that the property control panel will be manipulating.
    Here, you will notice the `MyForm` extends `GridPane`. In the `MyForm`’s constructor
    you will create and add controls to be put into the form (`GridPane`). To learn
    more about the `GridPane` refer to recipe 1-8\. The following code is a target
    form to be manipulated by the form designer application:


    `/**`

    ` * MyForm is a form to be manipulated by the user.`

    ` * @author cdea`

    ` */`

    `public class MyForm extends GridPane{`

    `    public MyForm() {`


    `        setPadding(new Insets(5));`

    `        setHgap(5);`

    `        setVgap(5);`


    `        Label fNameLbl = new Label("First Name");`

    `        TextField fNameFld = new TextField();`

    `        Label lNameLbl = new Label("Last Name");`

    `        TextField lNameFld = new TextField();`

    `        Label ageLbl = new Label("Age");`

    `        TextField ageFld = new TextField();`


    `        Button saveButt = new Button("Save");`


    `        // First name label`

    `        GridPane.setHalignment(fNameLbl, HPos.RIGHT);`

    `        add(fNameLbl, 0, 0);`

    `//… The rest of the form code`


    To manipulate the target form you will need to create a grid property control
    panel (`GridPaneControlPanel`). This class is responsible for binding the target
    form’s grid pane properties to UI controls that allow the user to adjust values
    using the keyboard and mouse. As you learned earlier in recipe 1-10, you can bind
    values with JavaFX Properties. But instead of binding values directly, you can
    also be notified when a property has changed.


    Another feature that you can apply to properties is that you can add change listeners.
    JavaFX`javafx.beans.value.ChangeListener`s is similar to Java Swing’s property
    change support (`java.beans.PropertyChangeListener`). Similarly, when a bean’s
    property value has changed you will want to be notified of that change. Change
    listeners are designed to intercept the change by making the old and new value
    available to the developer. You will start by creating a `JavaFXchange` listener
    for the toggle button to turn gridlines on or off. When a user interacts with
    the toggle button, the change listener will simply update the target’s grid pane’s
    `gridlinesVisible` property. Because a toggle button’s (`ToggleButton`) selected
    property is a `Boolean` value, you will instantiate a `ChangeListener` class with
    its formal type parameter as `Boolean`. You’ll also notice the overridden method
    `changed()` where its inbound parameters will match the generics formal type parameter
    specified when instantiating a `ChangeListener<Boolean>`. When a property change
    event occurs, the change listener will invoke `setGridLinesVisible()` on the target
    grid pane with the new value and update the toggle button’s text. The following
    code snippet shows a `ChangeListener<Boolean>` added to a `ToggleButton`:


    `gridLinesToggle.selectedProperty().addListener(`

    `new ChangeListener<Boolean>(){`

    `        public void changed(ObservableValue<? extends Boolean> ov, Boolean oldValue,
    Boolean`

    `newVal) {`

    `targetGridPane.setGridLinesVisible(newVal);`

    `gridLinesToggle.setText(newVal ? "On" : "Off");`

    `        }`

    `});`


    Next, you will be applying a change listener to a slider control that allows the
    user to adjust the target grid pane’s top padding. To create a change listener
    for a slider you will be instantiating a `ChangeListener<Number>`. Again, you
    will be overriding the `changed()` method with a signature the same as its formal
    type parameter `Number`. When a change occurs, the slider’s value will be used
    to create an `Insets` object that becomes the new padding for the target grid
    pane. Shown here is the change listener for the top padding and slider control:


    `gridPaddingSlider.valueProperty().addListener(new ChangeListener<Number>() {`

    `    public void changed(ObservableValue<? extends Number> ov, Number oldVal,
    Number`

    `newVal) {        `

    `        double top = targetGridPane.getInsets().getTop();`

    `        double right = targetGridPane.getInsets().getRight();`

    `        double bottom = targetGridPane.getInsets().getBottom();`

    `        double left = targetGridPane.getInsets().getLeft();`


    `        Insets newInsets = new Insets((double) newVal, right, bottom, left);`


    `        targetGridPane.setPadding(newInsets);`

    `    }`

    `});`


    Because the implementation of the other slider controls that handle left padding,
    horizontal gap, and vertical gap are virtually identical to the top padding slider
    control mentioned previously, you can fast forward to cell constraints controls.


    The last bits of grid control panel properties that you want to manipulate are
    the target grid pane’s cell constraints. For brevity I only allow the user to
    set a component’s alignment inside of a cell of a `GridPane`. To see more properties
    to modify, refer to the Javadoc on `javafx.scene.layout.GridPane`. [Figure 2-8](#Chapter02.html#fig_2_8)
    depicts the cell constraint settings for individual cells. An example is to left-justify
    the label Age on the target grid pane. Because cells are zero relative, you will
    enter **0** in the Cell Column field and two into the Cell Row field. Next, you
    will select the drop-down box Horiz. Align to LEFT. Once satisfied with the settings,
    click Apply. [Figure 2-9](#Chapter02.html#fig_2_9) shows the Age label control
    left-aligned horizontally. To implement this, you will create an `EventHandler<ActionEvent>`
    for the apply button’s `onAction` attribute by calling its `setOnAction()` method.
    Again when creating `EventHandler`s you will be overriding `the handle()` method.
    Inside of the `handle()` method you will basically iterate over all node children
    owned by the target grid pane to determine whether it is the specified cell. Once
    the specified cell and child node is determined the alignment will be applied.
    The following code is an `EventHandler` to apply cell constraint when the apply
    button is pressed:


    `final Button cellApplyButton = new Button("Apply");`

    `cellApplyButton.setOnAction(new EventHandler<ActionEvent>() {`


    `    public void handle(ActionEvent event) {`


    `         for (Node child:targetGridPane.getChildren()) {`


    `             int targetColIndx = 0;`

    `             int targetRowIndx = 0;`

    `             try {`

    `                 targetColIndx = Integer.parseInt(cellColFld.getText());`

    `                 targetRowIndx = Integer.parseInt(cellRowFld.getText());`

    `             } catch (Exception e) {`


    `             }`

    `             System.out.println("child = " + child.getClass().getSimpleName());`

    `             int col = GridPane.getColumnIndex(child);`

    `             int row = GridPane.getRowIndex(child);`

    `             if (col == targetColIndx && row == targetRowIndx) {`

    `                 GridPane.setHalignment(child, HPos.valueOf(hAlignFld.getSelectionModel().getSelectedItem().toString()));  `

    `                 GridPane.setValignment(child,`

    `VPos.valueOf(vAlignFld.getSelectionModel().getSelectedItem().toString()));                     `

    `             }`

    `         }`


    `    }`

    `});`


    [Figure 2-8](#Chapter02.html#fig_2_8) depicts the cell constraint grid control
    panel section that left-aligns the control at cell column zero and cell row 2.


    ![images](images/0208.jpg)


    ***Figure 2-8.** Cell constraints*


    [Figure 2-9](#Chapter02.html#fig_2_9) depicts the target grid pane with the grid
    lines turned on along with the Age label left-aligned horizontally at cell column
    0 and cell row 2.


    ![images](images/0209.jpg)


    ***Figure 2-9.** Target grid pane*'
