- fmt: "#### Solution\n\n在 JavaFX 中，所有形状都可以使用纯色和渐变颜色填充。以下是用于填充形状节点的主要类：\n\n> *   `javafx.scene.paint.Color`\n\
    > *   `javafx.scene.paint.LinearGradient`\n> *   `javafx.scene.paint.Stop`\n>\
    \ *   `javafx.scene.paint.RadialGradient`\n\n以下代码使用上述类为形状添加径向渐变、线性渐变以及透明（Alpha\
    \ 通道级别）颜色。我们将在示例中使用椭圆、矩形和圆角矩形。示例中还绘制了一条黑色实线（如图 1-13 所示），以演示形状颜色的透明度。\n\n```\n\
    primaryStage.setTitle(\"Chapter 1-6 Assigning Colors To Objects\");\nGroup root\
    \ = new Group();\nScene scene = new Scene(root, 350, 300, Color.WHITE);\n\nEllipse\
    \ ellipse = new Ellipse(100, 50 + 70/2, 50, 70/2);\nRadialGradient gradient1 =\
    \ RadialGradientBuilder.create()\n        .focusAngle(0)\n        .focusDistance(.1)\n\
    \        .centerX(80)\n        .centerY(45)\n        .radius(120)\n        .proportional(false)\n\
    \        .cycleMethod(CycleMethod.NO_CYCLE)\n        .stops(new Stop(0, Color.RED),\
    \ new Stop(1, Color.BLACK))\n        .build();\n\nellipse.setFill(gradient1);\n\
    root.getChildren().add(ellipse);\n\nLine blackLine = LineBuilder.create()\n  \
    \      .startX(170)\n        .startY(30)\n        .endX(20)\n        .endY(140)\n\
    \        .fill(Color.BLACK)\n        .strokeWidth(10.0f)\n        .translateY(ellipse.prefHeight(-1)\
    \ + ellipse.getLayoutY() + 10)\n        .build();\n\nroot.getChildren().add(blackLine);\n\
    \nRectangle rectangle = RectangleBuilder.create()\n        .x(50)\n        .y(50)\n\
    \        .width(100)\n        .height(70)\n        .translateY(ellipse.prefHeight(-1)\
    \ + ellipse.getLayoutY() + 10)\n        .build();\n\nLinearGradient linearGrad\
    \ = LinearGradientBuilder.create()\n        .startX(50)\n        .startY(50)\n\
    \        .endX(50)\n        .endY(50 + rectangle.prefHeight(-1) + 25)\n      \
    \  .proportional(false)\n        .cycleMethod(CycleMethod.NO_CYCLE)\n        .stops(\
    \ new Stop(0.1f, Color.rgb(255, 200, 0, .784)),\n                new Stop(1.0f,\
    \ Color.rgb(0, 0, 0, .784)))\n        .build();\n\nrectangle.setFill(linearGrad);\n\
    root.getChildren().add(rectangle);\n\nRectangle roundRect = RectangleBuilder.create()\n\
    \        .x(50)\n        .y(50)\n        .width(100)\n        .height(70)\n  \
    \      .arcWidth(20)\n        .arcHeight(20)\n        .translateY(ellipse.prefHeight(-1)\
    \ +\n                    ellipse.getLayoutY() +\n                    10 +\n  \
    \                  rectangle.prefHeight(-1) +\n                    rectangle.getLayoutY()\
    \ + 10)\n        .build();\n\nLinearGradient cycleGrad = LinearGradientBuilder.create()\n\
    \        .startX(50)\n        .startY(50)\n        .endX(70)\n        .endY(70)\n\
    \        .proportional(false)\n        .cycleMethod(CycleMethod.REFLECT)\n   \
    \     .stops(new Stop(0f, Color.rgb(0, 255, 0, .784)),\n               new Stop(1.0f,\
    \ Color.rgb(0, 0, 0, .784)))\n        .build();\n\nroundRect.setFill(cycleGrad);\n\
    root.getChildren().add(roundRect);\n\nprimaryStage.setScene(scene);\nprimaryStage.show();\n\
    ```\n\n图 1-13 展示了可应用于形状的各种彩色填充效果。\n\n![images](images/0113.jpg)\n\n***Figure 1-13.**\
    \ Color shapes*\n\n#### How It Works\n\n图 1-13 展示了从上到下依次排列的形状：椭圆、矩形和圆角矩形，它们均带有彩色渐变填充。绘制椭圆时，将使用径向渐变，使其看起来像一个\
    \ 3D 球体。接下来，将创建一个填充了黄色半透明线性渐变的矩形。在黄色矩形后面绘制了一条粗黑线，以演示矩形的半透明颜色。最后，将实现一个圆角矩形，填充绿色和黑色相间的反射线性渐变，使其看起来像对角线方向的\
    \ 3D 管状物。\n\n渐变颜色的神奇之处在于，它们通常能让形状看起来具有三维效果。渐变绘制允许在两种或多种颜色之间进行插值，从而为形状增加深度感。JavaFX\
    \ 提供了两种类型的渐变：径向渐变（`RadialGradient`）和线性渐变（`LinearGradient`）。对于椭圆形状，将使用径向渐变（`RadialGradient`）。\n\
    \n下表（表 1-1）是根据 JavaFX 2.0 Javadoc 中 `RadialGradient` 类的定义创建的（[`http://download.oracle.com/javafx/2.0/api/javafx/scene/paint/RadialGradient.html`](http://download.oracle.com/javafx/2.0/api/javafx/scene/paint/RadialGradient.html)）。\n\
    \n![images](images/t0101.jpg)\n\n![images](images/t0101a.jpg)\n\n在示例中，焦点角度设置为\
    \ 0，焦点距离设置为 0.1，中心 X 和 Y 设置为 (80, 45)，半径设置为 120 像素，`proportional` 设置为 `false`，循环方法设置为无循环（`CycleMethod.NO_CYCLE`），两个颜色停止点分别设置为红色（`Color.RED`）和黑色（`Color.BLACK`）。这些设置为椭圆提供了径向渐变效果：从中心位置\
    \ (80, 45)（椭圆左上角）的红色开始，在 120 像素（半径）的距离内过渡到黑色。\n\n接下来，将创建一个填充黄色半透明线性渐变的矩形。对于黄色矩形，将使用线性渐变（`LinearGradient`）绘制。\n\
    \n下表（表 1-2）是根据 JavaFX 2.0 Javadoc 中 `LinearGradient` 类的定义创建的（[`http://download.oracle.com/javafx/2.0/api/javafx/scene/paint/LinearGradient.html`](http://download.oracle.com/javafx/2.0/api/javafx/scene/paint/LinearGradient.html)）。\n\
    \n![images](images/t0102.jpg)\n\n要创建线性渐变绘制，需要指定起点和终点的 `startX`、`startY`、`endX`\
    \ 和 `endY`。起点和终点的坐标表示渐变图案开始和结束的位置。\n\n要创建第二个形状（黄色矩形），将起点 X 和 Y 设置为 (50, 50)，终点\
    \ X 和 Y 设置为 (50, 75)，`proportional` 设置为 `false`，循环方法设置为无循环（`CycleMethod.NO_CYCLE`），两个颜色停止点分别设置为黄色（`Color.YELLOW`）和黑色（`Color.BLACK`），Alpha\
    \ 透明度为 0.784。这些设置为矩形提供了从上到下的线性渐变效果：从起点 (50, 50)（矩形左上角）开始，过渡到黑色（矩形左下角）。\n\n最后，会看到一个圆角矩形，其渐变图案沿对角线方向使用绿色和黑色重复。这是一个简单的线性渐变绘制，与线性渐变绘制（`LinearGradient`）相同，只是起点\
    \ X、Y 和终点 X、Y 设置在对角线位置，并且循环方法设置为反射（`CycleMethod.REFLECT`）。当将循环方法指定为反射（`CycleMethod.REFLECT`）时，渐变图案将在颜色之间重复或循环。以下代码片段实现了循环方法为反射（`CycleMethod.REFLECT`）的圆角矩形：\n\
    \n```\nLinearGradient cycleGrad = LinearGradientBuilder.create()\n        .startX(50)\n\
    \        .startY(50)\n        .endX(70)\n        .endY(70)\n        .proportional(false)\n\
    \        .cycleMethod(CycleMethod.REFLECT)\n        .stops(new Stop(0f, Color.rgb(0,\
    \ 255, 0, .784)),\n               new Stop(1.0f, Color.rgb(0, 0, 0, .784)))\n\
    \        .build();\n```\n\n### 1-7. 创建菜单\n\n#### 问题\n\n你希望在 JavaFX 应用程序中创建标准菜单。"
  raw: '#### Solution


    In JavaFX, all shapes can be filled with simple colors and gradient colors. The
    following are the main classes used to fill shape nodes:


    > *   `javafx.scene.paint.Color`

    > *   `javafx.scene.paint.LinearGradient`

    > *   `javafx.scene.paint.Stop`

    > *   `javafx.scene.paint.RadialGradient`


    The following code uses the preceding classes to add radial and linear gradient
    colors as well as transparent (alpha channel level) colors to our shapes. We will
    be using an ellipse, rectangle, and rounded rectangle in our recipe. A solid black
    line (as depicted in [Figure 1-13](#Chapter01.html#fig_1_13)) also appears in
    our recipe to demonstrate the transparency of our shape’s color.


    `primaryStage.setTitle("Chapter 1-6 Assigning Colors To Objects");`

    `Group root = new Group();`

    `Scene scene = new Scene(root, 350, 300, Color.WHITE);`


    `Ellipse ellipse = new Ellipse(100, 50 + 70/2, 50, 70/2);`

    `RadialGradient gradient1 = RadialGradientBuilder.create()`

    `        .focusAngle(0)`

    `        .focusDistance(.1)`

    `        .centerX(80)`

    `        .centerY(45)`

    `        .radius(120)`

    `        .proportional(false)`

    `        .cycleMethod(CycleMethod.NO_CYCLE)`

    `        .stops(new Stop(0, Color.RED), new Stop(1, Color.BLACK))`

    `        .build();`


    `ellipse.setFill(gradient1);`

    `root.getChildren().add(ellipse);`


    `Line blackLine = LineBuilder.create()`

    `        .startX(170)`

    `        .startY(30)`

    `        .endX(20)`

    `        .endY(140)`

    `        .fill(Color.BLACK)`

    `        .strokeWidth(10.0f)`

    `        .translateY(ellipse.prefHeight(-1) + ellipse.getLayoutY() + 10)`

    `        .build();`


    `root.getChildren().add(blackLine);`


    `Rectangle rectangle = RectangleBuilder.create()`

    `        .x(50)`

    `        .y(50)`

    `        .width(100)`

    `        .height(70)`

    `        .translateY(ellipse.prefHeight(-1) + ellipse.getLayoutY() + 10)`

    `        .build();`


    `LinearGradient linearGrad = LinearGradientBuilder.create()`

    `        .startX(50)`

    `        .startY(50)`

    `        .endX(50)`

    `        .endY(50 + rectangle.prefHeight(-1) + 25)`

    `        .proportional(false)`

    `        .cycleMethod(CycleMethod.NO_CYCLE)`

    `        .stops( new Stop(0.1f, Color.rgb(255, 200, 0, .784)),`

    `                new Stop(1.0f, Color.rgb(0, 0, 0, .784)))`

    `        .build();`


    `rectangle.setFill(linearGrad);`

    `root.getChildren().add(rectangle);`


    `Rectangle roundRect = RectangleBuilder.create()`

    `        .x(50)`

    `        .y(50)`

    `        .width(100)`

    `        .height(70)`

    `        .arcWidth(20)`

    `        .arcHeight(20)`

    `        .translateY(ellipse.prefHeight(-1) +`

    `                    ellipse.getLayoutY() +`

    `                    10 +`

    `                    rectangle.prefHeight(-1) +`

    `                    rectangle.getLayoutY() + 10)`

    `        .build();`


    `LinearGradient cycleGrad = LinearGradientBuilder.create()`

    `        .startX(50)`

    `        .startY(50)`

