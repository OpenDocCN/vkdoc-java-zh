    \ on the right.\n *\n * Manipulating Layout Via Grids\n * @author cdea\n */\n\
    public class GridPaneControlPanel extends GridPane{\n    public GridPaneControlPanel(final\
    \ GridPane targetGridPane) {\n        super();\n\n        setPadding(new Insets(5));\n\
