    ## Graphics with JavaFX


    Have you ever heard someone say, “When two worlds collide”? This expression is
    used when a person from a different background or culture is put in a situation
    where they are at odds and must face very hard decisions. When we build a GUI
    application needing animations, we are often in a collision course between business
    and gaming worlds.


    In the ever-changing world of RIAs, you probably have noticed an increase of animations
    such as pulsing buttons, transitions, moving backgrounds, and so on. When GUI
    applications use animations, they can provide visual cues to the user to let them
    know what to do next. With JavaFX, you will be able to have the best of both worlds.


    [Figure 2-1](#Chapter02.html#fig_2_1) illustrates a simple drawing coming alive.


    ![images](images/0201.jpg)


    ***Figure 2-1.** Graphics with JavaFX*


    In this chapter you will create images, animations, and Look ‘N’ Feels. Fasten
    your seatbelts; you’ll discover solutions to integrate cool game-like interfaces
    into our everyday applications.


    ![images](images/square.jpg) **Note** Refer to [Chapter 1](#Chapter01.html#ch1)
    if you are new to JavaFX. Among other things, it will help you get an environment
    created in which you can be productive in using JavaFX.


