  raw: '#### How It Works


    In this recipe you’ll be creating a simple application enabling you to animate
    objects by following a drawn path on the Scene graph. To make things simple you
    will be using one shape (`Circle`) that will perform a path transition (`javafx.animation.PathTransition`).
    You will allow the user to draw a path on the scene surface by pressing the mouse
    button like a drawing program. Once you are satisfied with the path drawn, you
    will release the mouse press that triggers the red ball to follow the path similar
    to objects moving through pipes inside a building.


    You will create two instance variables to maintain the coordinates that make up
    the path. To hold the path being drawn, you will create an instance of a `javafx.scene.shape.Path`
    object. You also should know that the path instance should be added to the Scene
    graph before the start of the application. Shown here is adding the instance variable
    `onePath` onto the Scene graph:


    `// add path`

    `root.getChildren().add(onePath);`


    Next, you will create an instance variable `anchorPt` (`javafx.geometry.Point2D`)
    that will hold the path’s starting point. Later, you will see how these variables
    will be updated based on mouse events. Shown here are the instance variables that
    maintain the currently drawn path:


    `Path onePath = new Path();`

    `Point2D anchorPt;`


    First, let’s create a shape that will be animated. In this scenario, you will
    be creating a cool-looking red ball. To create a spherical-looking ball you will
    create a gradient color `RadialGradient` that will be used to paint or fill a
    circle shape. (Refer to recipe 1-6 for how to fill shapes with gradient paint.)
    Once you have created the red spherical ball you need to create `PathTransition`
    object to perform the path following animation. By using the convenient `PathTransitionBuilder`
    class you simply set the duration to four seconds and the cycle count to one.
    The cycle count is the number of times the animation cycle will occur. Next, you
    will set the node to reference the red ball (`sphere`). Then, you will set the
    `path()` method to the instance variable `onePath`, which contains all the coordinates
    and lines that make up a drawn path. After setting the path for the sphere to
    animate, you should specify how the shape will follow the path such as perpendicular
    to a tangent point on the path. The following code creates an instance of a path
    transition:


    `// animate sphere by following the path.`

    `final PathTransition pathTransition = PathTransitionBuilder.create()`

    `    .duration(Duration.millis(4000))`

    `    .cycleCount(1)`

    `    .node(sphere)`

    `    .path(onePath)`

    `    .orientation(PathTransition.OrientationType.ORTHOGONAL_TO_TANGENT)`

    `    .build();`


    After the creation of your path transition you will want it to clean up when the
    animation is completed. To reset or clean up the path variable when the animation
    is finished, you will create and add an event handler to listen to the `onFinished`
    property event on the path transition object. The following code snippet adds
    an event handler to clear the current path information:


    `// once finished clear path`

    `pathTransition.onFinishedProperty().set(new EventHandler<ActionEvent>() {`

    `   public void handle(ActionEvent event){`

    `      onePath.getElements().clear();`

    `   }`

    `});`


    With the shape and transition all set up, you will next respond to mouse events
    that will update the instance variable mentioned earlier. You will be listening
    to mouse events occurring on the `Scene` object. Here, you will once again rely
    on creating event handlers to be set on the Scene’s `onMouseXXXProperty` methods
    where the `XXX` denotes the actual mouse event name such as pressed, dragged,
    and released.


    When a user draws a path, he or she will perform a mouse press event to begin
    the start of the path. To listen to a mouse-pressed event, you will create an
    event handler with a formal type parameter of `MouseEvent`. Here you will override
    the `handle()` method. As a mouse-pressed event occurs, you want to clear the
    instance variable `onePath` of any prior drawn path information. Next, you will
    simply set the stroke width and color of the path so the user can see the path
    being drawn. Finally, you will add the starting point to the path using an instance
    of a `MoveTo` object. Shown here is the handler code to respond when the user
    performs a mouse press:


    `        // starting initial path`

    `        scene.onMousePressedProperty().set(new EventHandler<MouseEvent>() {`

    `            public void handle(MouseEvent event){`

    `                // clear path`

    `                onePath.getElements().clear();`

    `                // start point in path`

    `                anchorPt = new Point2D(event.getX(), event.getY());`

    `                onePath.setStrokeWidth(3);`

    `                onePath.setStroke(Color.BLACK);`

    `                onePath.getElements().add(new MoveTo(anchorPt.getX(), anchorPt.getY()));   `

    `            }`

    `        });`


    Once the mouse-pressed event handler is in place, you will be creating another
    handler for mouse-dragged events. Again, you will look for the Scene’s `onMouseXXXProperty()`
    methods that correspond to the proper mouse event that you care about. In this
    case, it will be the `onMouseDraggedProperty()` that you want to set. Inside the
    overridden `handle()` method you will be taking mouse coordinates that will be
    converted to `LineTo` objects to be added to the path (`Path`). These `LineTo`
    objects are instances of path element (`javafx.scene.shape.PathElement`) as discussed
    in recipe 1-5\. The following code is an event handler responsible for mouse-dragged
    events:


    `// dragging creates lineTos added to the path`

    `scene.onMouseDraggedProperty().set(new EventHandler<MouseEvent>() {`

    `        public void handle(MouseEvent event){`

    `                onePath.getElements().add(new LineTo(event.getX(), event.getY()));`

    `        }`

    `});`


    Finally, you will be creating an event handler to listen to a mouse-released event.
    When a user releases the mouse, the path’s stroke is set to zero to appear as
    if it were removed. Then you will reset the path transition by stopping it and
    playing it from the start. The following code is an event handler responsible
    for mouse-released event:


    `// end the path when mouse released event`

    `scene.onMouseReleasedProperty().set(new EventHandler<MouseEvent>() {`

    `    public void handle(MouseEvent event){`

    `        onePath.setStrokeWidth(0);`

    `        if (onePath.getElements().size() > 1) {`

    `            pathTransition.stop();`

    `            pathTransition.playFromStart();`

    `        }`

    `    }`

    `});`


