    `           mediaPlayer.setOnPlaying(null);`

    `           mediaPlayer.setOnReady(null);`

    `        }`


    `        // play video when ready status`

    `        mediaPlayer.setOnReady(new Runnable() {`

    `            @Override`

    `            public void run() {`

    `               progressSlider.setValue(1);`


    `        progressSlider.setMax(mediaPlayer.getMedia().getDuration().toMillis()/1000);`

    `           mediaPlayer.play();`

    `        }`

    `    }); // setOnReady()`


    As with the audio player, we create a `Runnable` instance to be run when the media
    player is in a ready state. You’ll notice also that the `progressSlider` control
    being set up to use values in seconds.


    Once the media player object is in a ready state you will be creating a `MediaView`
    instance to display the media. Shown following is the creation of a `MediaView`
    object to be put into the scene graph to display video content:


    `            // Lazy init media viewer`

    `            if (mediaView == null) {`

    `                mediaView = MediaViewBuilder.create()`

    `                        .mediaPlayer(mediaPlayer)`

    `                        .x(4)`

    `                        .y(4)`

    `                        .preserveRatio(true)`

    `                        .opacity(.85)`

    `                        .build();`


    `                mediaView.fitWidthProperty().bind(scene.widthProperty().subtract(220));`

    `                mediaView.fitHeightProperty().bind(scene.heightProperty().subtract(30));`


    `                        // make media view as the second node on the scene.`

    `                        root.getChildren().add(1, mediaView);`

    `                    }`


    `                    // sometimes loading errors occur`

    `                    mediaView.setOnError(new EventHandler<MediaErrorEvent>()
    {`

    `                        public void handle(MediaErrorEvent event) {`

    `                            event.getMediaError().printStackTrace();`

    `                        }`

    `                    });`


    `                    mediaView.setMediaPlayer(mediaPlayer);`

    `                    event.setDropCompleted(success);`

    `                    event.consume();`

    `                }`

    `            });`


    Whew! We are finally finished with our drag-dropped `EventHandler` for our `Scene`.
    Up next is pretty much the rest of the media button controls similar to the end
    of recipe 3-1\. The only thing different is a single instance variable named `paused`
    of type `boolean` that denotes whether the video was paused. This `paused` flag
    when set to true will allow the slider control to seek forward or backward through
    the video; otherwise false. Following is the `pauseButton` and `playButton` controlling
    the `mediaPlayer` object and setting the `paused` flag accordingly:


    `// pause media and swap button with play button`

    `pauseButton.setOnMousePressed(new EventHandler<MouseEvent>() {`

    `    public void handle(MouseEvent me) {`

    `        if (mediaPlayer!=null) {`

    `            buttonArea.getChildren().removeAll(pauseButton, playButton);`

    `            buttonArea.getChildren().add(playButton);`

    `            mediaPlayer.pause();`

    `            paused = true;`

    `        }`

    `    }`

    `});`


    `// play media and swap button with pause button`

    `playButton.setOnMousePressed(new EventHandler<MouseEvent>() {`

    `    public void handle(MouseEvent me) {  `

    `        if (mediaPlayer != null) {`

    `            buttonArea.getChildren().removeAll(pauseButton, playButton);`

    `            buttonArea.getChildren().add(pauseButton);`

    `            paused = false;`

    `            mediaPlayer.play();                    `

    `        }`

    `    }`

    `});`


    So that is how to create a video media player. In the next recipe, you will be
    able to listen to media events and invoke actions.'
