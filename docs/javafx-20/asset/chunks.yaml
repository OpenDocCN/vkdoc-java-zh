  raw: '#### How It Works


    When dealing with Java `collections` you’ll notice there are so many useful container
    classes that represent all kinds of data structures. One commonly used collection
    is the `java.util.ArrayList` class. When building applications with domain objects
    that contain an `ArrayList,` a developer can easily manipulate objects inside
    the collection. But, in the past (back in the day), when using Java Swing components
    combined with collections can often be a challenge, especially updating the GUI
    to reflect changes in the domain object. How do we resolve this issue? Well, JavaFX’s
    `ObservableList` to the rescue!


    Speaking of rescue, I’ve created a GUI application to allow users to choose their
    favorite heroes. This is quite similar to application screens that manage user
    roles by adding or removing items from list box components. In JavaFX we will
    be using a `ListView` control to hold String objects. Before we create an instance
    of a `ListView` we create an `ObservableList` containing our candidates. Here
    you’ll notice the use of a factory class called `FXCollections`, in which you
    can pass in common collection types to be wrapped and returned to the caller as
    an `ObservableList`. In the recipe I passed in an array of Strings instead of
    an `ArrayList`, so hopefully you get the idea about how to use the `FXCollections`
    class. I trust you will use it wisely: “With great power, there must also come
    great responsibility”. This code line calls the `FXCollections` class to return
    an observable list (`ObservableList`):


    `ObservableList<String> candidates = FXCollections.observableArrayList(...);`


    After creating an `ObservableList`, a `ListView` class is instantiated using a
    constructor that receives the observable list. Shown here is code to create and
    populate a `ListView` object:


    `ListView<String> candidatesListView = new ListView<String>(candidates);`


    In the last item of business, our code will manipulate the `ObservableList`s as
    if they were `java.util.ArrayList`s. Once manipulated, the `ListView` will be
    notified and automatically updated to reflect the changes of the `ObservableList`.
    The following code snippet implements the event handler and action event when
    the user presses the send right button:


    `// select heroes`

    `Button sendRightButton = new Button(">");`

    `sendRightButton.setOnAction(new EventHandler<ActionEvent>() {`


    `    public void handle(ActionEvent event) {`

    `        String potential = candidatesListView.getSelectionModel().getSelectedItem();`

    `        if (potential != null) {`

    `            candidatesListView.getSelectionModel().clearSelection();`

    `            candidates.remove(potential);`

    `            heroes.add(potential);`

    `        }`

    `    }`

    `});`


    When setting an action we use the generic class `EventHandler` to create an anonymous
    inner class with the `handle()` method to listen for a button press event. When
    a button press event arrives, the code will determine which item in the `ListView`
    was selected. Once the item was determined, we clear the selection, remove the
    item, and add the item to the hero’s `ObserverableList`.


    ### 1-12. Generating a Background Process


    #### Problem


    You want to create a GUI application that simulates the copying of files using
    background processing while displaying the progress to the user.


    #### Solution


    Create an application typical of a dialog box showing progress indicators while
    copying files in the background. The following are the main classes used in this
    recipe:


    > *   `javafx.scene.control.ProgressBar`

    > *   `javafx.scene.control.ProgressIndicator`

    > *   `javafx.concurrent.Task` classes


    The following source code is an application that simulates a file copy dialog
    box displaying progress indicators and performing background processes:


    `package javafx2introbyexample.chapter1.recipe1_12;`


    `import java.util.Random;`

    `import javafx.application.Application;`

    `import javafx.beans.value.ChangeListener;`

    `import javafx.beans.value.ObservableValue;`

    `import javafx.concurrent.Task;`

    `import javafx.event.ActionEvent;`

    `import javafx.event.EventHandler;`

    `import javafx.geometry.Pos;`

    `import javafx.scene.Group;`

    `import javafx.scene.Scene;`

    `import javafx.scene.control.Button;`

    `import javafx.scene.control.Label;`

    `import javafx.scene.control.ProgressBar;`

    `import javafx.scene.control.ProgressIndicator;`

    `import javafx.scene.control.TextArea;`

    `import javafx.scene.layout.BorderPane;`

    `import javafx.scene.layout.HBox;`

    `import javafx.scene.paint.Color;`

    `import javafx.stage.Stage;`


    `/**`

    ` * Background Processes`

    ` * @author cdea`

    ` */`

    `public class BackgroundProcesses extends Application {`


    `    static Task copyWorker;`

    `    final int numFiles = 30;`


    `    /**`

    `     * @param args the command line arguments`

    `     */`

    `    public static void main(String[] args) {`

    `        Application.launch(args);`

    `    }`


    `    @Override`

    `    public void start(Stage primaryStage) {`

    `        primaryStage.setTitle("Chapter 1-12 Background Processes");`

    `        Group root = new Group();`

    `        Scene scene = new Scene(root, 330, 120, Color.WHITE);`


    `        BorderPane mainPane = new BorderPane();`


    `mainPane.layoutXProperty().bind(scene.widthProperty().subtract(mainPane.widthProperty()).divide(2));`

    `        root.getChildren().add(mainPane);`


    `        final Label label = new Label("Files Transfer:");`

    `        final ProgressBar progressBar = new ProgressBar(0);`

    `        final ProgressIndicator progressIndicator = new ProgressIndicator(0);`


    `        final HBox hb = new HBox();`

    `        hb.setSpacing(5);`

    `        hb.setAlignment(Pos.CENTER);`

    `        hb.getChildren().addAll(label, progressBar, progressIndicator);`

    `        mainPane.setTop(hb);`


    `        final Button startButton = new Button("Start");`

    `        final Button cancelButton = new Button("Cancel");`

    `        final TextArea textArea = new TextArea();`

    `        textArea.setEditable(false);`

    `        textArea.setPrefSize(200, 70);`

    `        final HBox hb2 = new HBox();`

    `        hb2.setSpacing(5);`

    `        hb2.setAlignment(Pos.CENTER);`

    `        hb2.getChildren().addAll(startButton, cancelButton, textArea);`

    `        mainPane.setBottom(hb2);`


    `        // wire up start button`

    `        startButton.setOnAction(new EventHandler<ActionEvent>() {`


    `            public void handle(ActionEvent event) {`

    `                startButton.setDisable(true);`

    `                progressBar.setProgress(0);`

    `                progressIndicator.setProgress(0);`

    `                textArea.setText("");`

    `                cancelButton.setDisable(false);`

    `                copyWorker = createWorker(numFiles);`


    `                // wire up progress bar`

    `                progressBar.progressProperty().unbind();`

    `                progressBar.progressProperty().bind(copyWorker.progressProperty());`

    `                progressIndicator.progressProperty().unbind();`

    `                progressIndicator.progressProperty().bind(copyWorker.progressProperty());`


    `                // append to text area box`

    `                copyWorker.messageProperty().addListener(new ChangeListener<String>()
    {`


    `                    public void changed(ObservableValue<? extends String> observable,
    String oldValue, String newValue) {`

    `                        textArea.appendText(newValue + "\n");`

    `                    }`

    `                });`'
