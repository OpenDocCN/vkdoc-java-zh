- fmt: "### How It Works\n\nIn the photo viewer application I decided to incorporate\
    \ animation effects. The main animation effects I focus on are translating and\
    \ fading. First, you will create a news ticker control that scrolls `Text` nodes\
    \ to the left by using a translation transition (`javafx.animation.TranslateTransition`).\
    \ Next, you will apply another fading effect when the user clicks the previous\
    \ and next buttons to transition from the current image to the next. To perform\
    \ this effect, you will use a compound transition (`javafx.animation.SequentialTransition`)\
    \ consisting of multiple animations. Finally, to create the effect of the button\
    \ controls fading in and out based on where the mouse is located, you will need\
    \ a fade transition (`javafx.animation.FadeTransition`).\n\nBefore I begin to\
    \ discuss the steps to fulfill the requirements, I want to mention the basics\
    \ of JavaFX animation. The JavaFX animation API allows you to assemble timed events\
    \ that can interpolate over a node’s attribute values to produce animated effects.\
    \ Each timed event is called a keyframe (`KeyFrame`), which is responsible for\
    \ interpolating over a `Node`’s property over a period of time (`javafx.util.Duration`).\
    \ Knowing that a keyframe’s job is to operate on a `Node`’s property value, you\
    \ will have to create an instance of a `KeyValue` class that will reference the\
    \ desired `Node` property. The idea of interpolation is simply the distributing\
    \ of values between a start and end value. An example is to move a rectangle by\
    \ its current x position (zero) to 100 pixels in 1000 milliseconds; in other words,\
    \ move the rectangle 100 pixels to the right, spanning one second. Shown here\
    \ is a keyframe and key value to interpolate a rectangle’s x property for 1000\
    \ milliseconds:\n\n```\nfinal Rectangle rectangle = new Rectangle(0, 0, 50, 50);\n\
    KeyValue keyValue = new KeyValue(rectangle.xProperty(), 100);\nKeyFrame keyFrame\
    \ = new KeyFrame(Duration.millis(1000), keyValue);\n```\n\nWhen creating many\
    \ keyframes that are assembled consecutively, you need to create a `TimeLine`.\
    \ Because `TimeLine` is a subclass of `javafx.animation.Animation`, there are\
    \ standard attributes such as its cycle count and auto-reverse that can be set.\
    \ The *cycle count* is the number of times you want the timeline to play the animation.\
    \ If you want the cycle count to play the animation indefinitely, use the value\
    \ `Timeline.INDEFINITE`. The auto-reverse is the capability for the animation\
    \ to play the timeline backward. By default, the cycle count is set to 1, and\
    \ the auto-reverse is set to false. When adding keyframes you will simply add\
    \ them using the `getKeyFrames().add()` method on the `TimeLine` object. The following\
    \ code snippet demonstrates a timeline playing indefinitely and auto-reverse set\
    \ to true:\n\n```\nTimeline timeline = new Timeline();\ntimeline.setCycleCount(Timeline.INDEFINITE);\n\
    timeline.setAutoReverse(true);\ntimeline.getKeyFrames().add(keyFrame);\ntimeline.play();\n\
    ```\n\nWith this knowledge of timelines you can animate any graph node in JavaFX.\
    \ Although you have the ability to create timelines in a low-level way, it can\
    \ become very cumbersome. You are probably wondering whether there are easier\
    \ ways to express common animations. Good news! JavaFX has transitions (`Transition`),\
    \ which are convenience classes to perform common animated effects. Some of the\
    \ common animation effects classes are these:\n\n> *   `javafx.animation.FadeTransition`\n\
    > *   `javafx.animation.PathTransition`\n> *   `javafx.animation.ScaleTransition`\n\
    > *   `javafx.animation.TranslateTransition`\n\nTo see more transitions, see `javafx.animation`\
    \ in the Javadoc. Because `Transition` objects are also subclasses of the `javafx.animation.Animation`\
    \ class, you will have the opportunity to set the cycle count and auto-reverse\
    \ attributes. In this recipe you will be focusing on two transition effects: translate\
    \ transition (`TranslateTransition`) and fade transition (`FadeTransition`).\n\
    \nThe first requirement in our problem statement is to create a news ticker. When\
    \ creating a news ticker control, `Text` nodes will scroll from right to left\
    \ inside a rectangular region. When the text scrolls to the left edge of the rectangular\
    \ region you will want the text to be clipped to create a view port that only\
    \ shows pixels inside of the rectangle. Here, I first create a `Group` to hold\
    \ all the components that comprise a ticker control. Next is the creation of a\
    \ rectangle using the `RectangleBuilder` to build a white rounded rectangle filled\
    \ with 55 percent opacity. After creating the visual region I create a similar\
    \ rectangle that represents the clipped region using the `setClip(someRectangle)`\
