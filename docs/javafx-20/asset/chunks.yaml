- fmt: "### How It Works\n\nJavaFX has the capability to apply CSS styles onto the\
    \ Scene graph and its nodes very much like browsers applying CSS styles onto elements\
    \ in an HTML document object model (DOM). In this recipe you will be skinning\
    \ a user interface using JavaFX styling attributes. I basically used the recipe’s\
    \ UI to apply the various Look ‘n’ Feels. To showcase the available skins, a menu\
    \ selection allows the user to choose the Look ‘N’ Feel to apply to the UI.\n\n\
    Before discussing CSS styling properties, I want to show you how to load the CSS\
    \ styles to be applied to a JavaFX application. You will first need to create\
    \ menu items to allow the user to choose the preferred Look ‘N’ Feel. When creating\
    \ a menu item you will create a convenience method to build a menu item that would\
    \ load the specified CSS and an `EventHandler` action to apply the chosen CSS\
    \ style onto the current UI. To add the Caspian theme as a menu item you will\
    \ notice that no resources are needed to be loaded because it is JavaFX’s current\
    \ Look ‘n’ Feel. Shown here is adding a menu item containing the Caspian Look\
    \ ‘N’ Feel CSS style that can be applied to the current UI:\n\n`MenuItem caspianLnf\
    \ = new MenuItem(\"Caspian\");`\n`caspianLnf.setOnAction(skinForm(caspian, scene));`\n\
    \nShown here is adding a menu item containing the sky Look ‘N’ Feel CSS style\
    \ ready to be applied to the current UI:\n\n`MenuBar menuBar = new MenuBar();`\n\
    `Menu menu = new Menu(\"Look 'N' Feel\");`\n`menu.getItems().add(createMenuItem(\"\
    Sky\", \"sky.css\", scene));`\n\nCalling the `createMenuItem()` method will also\
    \ call another convenience method to load the CSS file called `loadSkin()`. It\
    \ will also set the menu items `onAction` attribute with an appropriate `EventHandler`\
    \ by calling the `skinForm()` method. To recap, the `loadSkin` is responsible\
    \ for loading the CSS file, and the `skinForm()` method’s job is to apply the\
    \ skin onto the UI application. Shown here are the convenience methods to build\
    \ menu items that apply CSS styles onto a UI application:\n\n```\nprotected final\
    \ MenuItem createMenuItem(String label, String css, final Scene scene){\n    MenuItem\
    \ menuItem = new MenuItem(label);\n    ObservableList<String> cssStyle = loadSkin(css);\n\
    \    menuItem.setOnAction(skinForm(cssStyle, scene));\n    return menuItem;\n\
    }\n\nprotected final ObservableList<String> loadSkin(String cssFileName) {\n \
    \   ObservableList<String> cssStyle = FXCollections.observableArrayList();\n \
    \   cssStyle.addAll(getClass().getResource(cssFileName).toExternalForm());\n \
    \   return cssStyle;\n}\n\nprotected final EventHandler<ActionEvent> skinForm(final\
    \ ObservableList<String> cssStyle,\nfinal Scene scene) {\n    return new EventHandler<ActionEvent>(){\n\
    \        public void handle(ActionEvent event) {\n            scene.getStylesheets().clear();\n\
    \            scene.getStylesheets().addAll(cssStyle);   \n        }\n    };\n\
    }\n```\n\n![images](images/square.jpg) **Note** To run this recipe example, make\
    \ sure the CSS files are located in the compiled classes area. Resource files\
    \ can be loaded easily when placed in the same directory (package) as the compiled\
    \ class file that is loading them. The CSS files are co-located with this code\
    \ example file. In NetBeans, you can select Clean and build project or you can\
    \ copy files to your classes build area.\n\nNow, that you know how to load CSS\
    \ styles, let’s talk about the JavaFX CSS selectors and styling properties. Like\
    \ CSS style sheets, there are selectors or style classes associated with `Node`\
    \ objects in the Scene graph. All Scene graph nodes have a method called `setStyle()`\
    \ to apply styling properties that could potentially change the node’s background\
    \ color, border, stroke, and so on. Because all graph nodes extend from the `Node`\
    \ class, derived classes will be able to inherit the same styling properties.\
    \ Knowing the inheritance hierarchy of node types is very important because the\
    \ type of node will determine the types of styling properties you can affect.\
    \ For instance a `Rectangle` extends from `Shape`, which extends from `Node`.\
    \ The inheritance does not include `-fx-border-style`, which is the part of nodes\
    \ that extends from `Region`. Based on the type of node there are limitations\
    \ to what styles you are able to set. To see a full listing of all style selectors\
    \ refer to the JavaFX CSS Reference Guide: [`http://download.oracle.com/docs/cd/E17802_01/javafx/javafx/1.3/docs/api/javafx.scene/doc-files/cssref.html`](http://download.oracle.com/docs/cd/E17802_01/javafx/javafx/1.3/docs/api/javafx.scene/doc-files/cssref.html).\n\
    \nAll JavaFX styling properties will be prefixed with `-fx-`. For example, all\
    \ `Node`s have the styling property to affect its opacity the attribute used is\
    \ `-fx-opacity`. Following are selectors to style JavaFX `javafx.scene.control.Label`s\
    \ and `javafx.scene.control.Button`s:\n\n```\n.label {\n    -fx-text-fill: rgba(17,\
    \ 145, 213);\n    -fx-border-color: rgba(255, 255, 255, .80);\n    -fx-border-radius:\
    \ 8;\n    -fx-padding: 6 6 6 6;\n    -fx-font: bold italic 20pt \"LucidaBrightDemiBold\"\
    ;\n}\n.button{\n    -fx-text-fill: rgba(17, 145, 213);\n    -fx-border-color:\
    \ rgba(255, 255, 255, .80);\n    -fx-border-radius: 8;\n    -fx-padding: 6 6 6\
    \ 6;\n    -fx-font: bold italic 20pt \"LucidaBrightDemiBold\";\n}\n```\n\n## C\
    \ H A P T E R  3\n\n## Media with JavaFX\n\nJavaFX provides a media-rich API capable\
    \ of playing audio and video. The Media API allows developers to incorporate audio\
    \ and video into their RIAs. One of the main benefits of the Media API is its\
    \ cross-platform abilities when distributing media content via the Web. With a\
    \ range of devices (tablet, music player, TV, and so on) that need to play multimedia\
    \ content, the need for a cross-platform API is essential.\n\nImagine a not-so-distant\
    \ future where your TV or wall is capable of interacting with you in ways that\
    \ you’ve never dreamed possible. For instance, while viewing a movie you could\
    \ select items or clothing used in the movie to be immediately purchased, all\
    \ from the comfort of your home. With this future in mind, developers seek to\
    \ enhance the interactive qualities of their media-based applications.\n\nIn this\
    \ chapter you will learn how to play audio and video in an interactive way. Find\
    \ your seats for Act III of JavaFX as audio and video take center stage (as depicted\
    \ in [Figure 3-1](#Chapter03.html#fig_3_1)).\n\n![images](images/0301.jpg)\n\n\
    ***Figure 3-1.** Audio and video*\n\n### 3-1. Playing Audio\n\n#### Problem\n\n\
    You want to listen to music and become entertained with a graphical visualization."
