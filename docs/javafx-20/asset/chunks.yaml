    ### 2-5. 使用 CSS 增强界面


    #### 问题


    你想要改变 GUI 界面的外观与风格。


    #### 解决方案


    使用 JavaFX 的 CSS 样式应用于图形节点。以下代码演示了如何在图形节点上使用 CSS 样式。该代码创建了四个主题：Caspian、Control
    Style 1、Control Style 2 和 Sky。每个主题都使用 CSS 定义，并影响对话框的外观与风格。在代码之后，你可以看到对话框的两种不同呈现效果：


    `package javafx2introbyexample.chapter2.recipe2_05;`


