    >     \n>     ***图 4-6.** 设置“在浏览器中运行”选项*\n>     \n>     \n> 7.  通过点击工具栏上的“运行”按钮或按\
    \ F6 键来运行并测试项目。图 4-7 展示了最终在浏览器中运行的 Hello World 应用程序。\n\n![images](img/0407.jpg)\n\
    \n***图 4-7.** 在浏览器中运行的 MyJavaFXApp Hello World 应用程序*\n\n#### 工作原理\n\n要创建嵌入在 HTML\
    \ 页面中的 JavaFX 应用程序，您需要使用 NetBeans IDE。尽管存在不同的部署策略，例如 Webstart 和独立模式，但此处您使用 NetBeans\
    \ 的新建项目向导，自动将其部署为包含 JavaFX 应用程序的本地网页并在浏览器中运行。有关深入的 JavaFX 部署策略，请参考 Oracle 的《部署\
    \ JavaFX 应用程序》：[`http://download.oracle.com/javafx/2.0/deployment/deployment_toolkit.htm`](http://download.oracle.com/javafx/2.0/deployment/deployment_toolkit.htm)。\n\
    \n以下是此解决方案生成的代码。您会注意到所使用的 JavaFX 类；例如 `Stage`、`Group` 和 `Scene` 类。\n\n![images](img/square.jpg)\
    \ **注意** 您可以将本方案中其他代码文件的导入和代码体拖放到新的主项目类的主体中，并相应地更改类定义行上的名称。\n\n以下是 NetBeans 向导生成新项目以创建嵌入在\
    \ HTML 网页中的 JavaFX 应用程序时的源代码：\n\n`package myjavafxapp;`\n\n`import javafx.application.Application;`\n\
    `import javafx.event.ActionEvent;`\n`import javafx.event.EventHandler;`\n`import\
    \ javafx.scene.Group;`\n`import javafx.scene.Scene;`\n`import javafx.scene.control.Button;`\n\
    `import javafx.stage.Stage;`\n\n`/**`\n` *`\n` * @author cdea`\n`*/`\n`public\
    \ class MyJavaFXApp extends Application {`\n\n`    /**`\n`     * @param args the\
    \ command line arguments`\n`     */`\n`    public static void main(String[] args)\
    \ {`\n`        Application.launch(args);`\n`    }`\n\n`    @Override`\n`    public\
    \ void start(Stage primaryStage) {`\n`        primaryStage.setTitle(\"Hello World\"\
    );`\n`        Group root = new Group();`\n`        Scene scene = new Scene(root,\
    \ 300, 250);`\n`        Button btn = new Button();`\n`        btn.setLayoutX(100);`\n\
    `        btn.setLayoutY(80);`\n`        btn.setText(\"Hello World\");`\n`        btn.setOnAction(new\
    \ EventHandler<ActionEvent>() {`\n\n`            public void handle(ActionEvent\
    \ event) {`\n`                System.out.println(\"Hello World\");`\n`            }`\n\
    `        });`\n`        root.getChildren().add(btn);`\n`        primaryStage.setScene(scene);`\n\
    `        primaryStage.show();`\n`    }`\n`}`\n\n在步骤 1 中，您启动一个新项目（如图 4-7 所示）。在步骤\
    \ 2 中，您选择要创建的标准 JavaFX 应用程序。选择项目类型后，您将指定项目名称。确保选中“创建应用程序类”复选框，以便向导生成 MyJavaFXApp\
    \ Java 文件。点击“完成”后，您新创建的应用程序将出现在“项目”选项卡中。接下来，您将执行步骤 5 来更改项目属性。\n\n在步骤 5 中，您将更改两个类别：“源”和“运行”。在“源”类别中，确保“源代码/二进制格式”设置为\
    \ JDK 1.6 或更高版本。更新“源”类别后，您将通过“运行”类别更改项目的运行方式（步骤 6）。在步骤 6 中，选中“在浏览器中”单选按钮选项后，您会注意到工作目录字段下方的“宽度”和“高度”。要使用您自己的自定义网页，请点击“浏览”按钮选择现有的\
    \ HTML 文件，但在本方案中，您可以将其留空，让向导生成一个通用的 HTML 页面。假设您已完成设置，点击“确定”关闭“项目属性”对话框窗口。\n\n\
    最后，您将运行嵌入的 JavaFX Web 应用程序（步骤 7）。要运行您的应用程序，您需要确保此项目被设置为主项目，方法是在菜单中选择 `运行 -> 设置主项目\
    \ -> MyJavaFXApp`。启动运行后，您的浏览器将启动，其中包含一个包含 JavaFX 应用程序的通用网页。您还会注意到，有一个方便的链接允许您将应用程序作为\
    \ Webstart 应用程序（非嵌入）启动。\n\n### 4-2\\. 显示 HTML5 内容\n\n#### 问题\n\n您全身心投入工作项目，以至于经常错过孩子的足球比赛。您需要一个时钟应用程序来跟踪时间。\n"
- fmt: "#### Solution\n\n创建一个基于 JavaFX 的应用程序，其中包含一个以 HTML5 内容创建的模拟时钟。使用 JavaFX 的 `WebView`\
    \ API 在应用程序中渲染 HTML5 内容。\n\n以下源代码是一个 JavaFX 应用程序，用于显示一个动画模拟时钟。该应用程序将加载名为 `clock3.svg`\
    \ 的 SVG 文件，并将其内容显示到 JavaFX 场景图中：\n\n```java\npackage javafx2introbyexample.chapter4.recipe4_02;\n\
    \nimport java.net.URL;\nimport javafx.application.Application;\nimport javafx.scene.Scene;\n\
    import javafx.scene.paint.Color;\nimport javafx.scene.web.WebView;\nimport javafx.stage.Stage;\n\
    \n/**\n *\n * @author cdea\n*/\npublic class DisplayHtml5Content extends Application\
    \ {\n    private Scene scene;\n    @Override public void start(Stage stage) {\n\
    \        // create the scene\n        stage.setTitle(\"Chapter 4-2 Display Html5\
    \ Content\");\n        final WebView browser = new WebView();\n        URL url\
    \ = getClass().getResource(\"clock3.svg\");\n        browser.getEngine().load(url.toExternalForm());\n\
    \        scene = new Scene(browser,590,400, Color.rgb(0, 0, 0, .80));\n      \
    \  stage.setScene(scene);\n        stage.show();\n    }\n    public static void\
    \ main(String[] args){\n        Application.launch(args);\n    }\n}\n```\n\n这段\
    \ JavaFX 代码将加载并渲染 HTML5 内容。假设你有一个设计师提供了诸如 HTML5 之类的内容，那么你的工作就是在 JavaFX 中渲染这些资源。以下代码代表一个名为\
    \ `clock3.svg` 的 SVG 文件，该文件主要由强大的工具 Inkscape 生成，Inkscape 是一个能够生成 SVG 的插画工具。在以下代码中，请注意手写的\
    \ JavaScript 代码（位于 `CDATA` 标签内），它将根据当前时间定位时钟的秒针、分针和时针。由于所有逻辑（从设置时间到动画指针）都包含在此文件中，因此内容是自包含的，这意味着任何支持\
    \ HTML5 的查看器都可以显示文件内容。因此，在调试时，你可以轻松地在任何兼容 HTML5 的浏览器中渲染内容。在本章后面，我们将演示能够与 HTML5\
    \ 内容交互的 JavaFX 代码。\n\n以下是 SVG 模拟时钟的精简版本。（要获取文件的源代码，请从本书网站下载代码。）这是一个在 Inkscape\
    \ 中创建的 SVG 模拟时钟（`clock3.svg`）：\n\n```svg\n<svg\n   width=\"300\"\n   height=\"\
    250\"\n   id=\"svg4171\"\n   version=\"1.1\"\n   inkscape:version=\"0.48.1 \"\n\
    \   sodipodi:docname=\"clock3.svg\" onload=\"updateTime()\">\n\n<script>\n<![CDATA[\n\
    var\n\nfunction updateTime()\n{\n  var date = new Date()\n\n  var hr = parseInt(date.getHours())\n\
    \  if (hr > 12) {\n    hr = hr - 12;\n  }\n  var min = parseInt(date.getMinutes())\n\
    \  var sec = parseInt(date.getSeconds())\n  var pi=180\n  var secondAngle = sec\
    \ * 6 + pi\n  var minuteAngle = ( min + sec / 60 ) * 6 + pi\n  var hourAngle \
    \  = (hr + min / 60 + sec /3600) * 30 + pi\n\n  moveHands(secondAngle, minuteAngle,\
    \ hourAngle)\n}\n\nfunction moveHands(secondAngle, minuteAngle, hourAngle) {\n\
    \n  var secondHand = document.getElementById(\"secondHand\")\n  var minuteHand\
    \ = document.getElementById(\"minuteHand\")\n  var hourHand = document.getElementById(\"\
    hourHand\")\n\n  secondHand.setAttribute(\"transform\",\"rotate(\"+ secondAngle\
    \ + \")\")  \n  minuteHand.setAttribute(\"transform\",\"rotate(\"+ minuteAngle\
    \ +\")\")\n  hourHand.setAttribute(\"transform\",\"rotate(\"+ hourAngle + \")\"\
    )\n\n}\n\n]]>\n</script>\n<defs id=\"defs4173\">\n... // beginning of SVG code\n\
    ... // Main clock code\n\n<g id=\"hands\" transform=\"translate(108,100)\">\n\
    <g id=\"minuteHand\">\n<line stroke-width=\"3.59497285\" y2=\"50\" stroke-linecap=\"\
    round\" stroke=\"#00fff6\" opacity=\".9\" />\n<animateTransform attributeName=\"\
    transform\" type=\"rotate\" repeatCount=\"indefinite\" dur=\"60min\" by=\"360\"\
    \ />\n</g>\n\n<g id=\"hourHand\">\n<line stroke-width=\"5\" y2=\"30\" stroke-linecap=\"\
    round\" stroke=\"#ffcb00\" opacity=\".9\" />\n<animateTransform attributeName=\"\
    transform\" type=\"rotate\" repeatCount=\"indefinite\" dur=\"12h\" by=\"360\"\
    \ />\n</g>\n<g id=\"secondHand\">\n<line stroke-width=\"2\" y1=\"-20\" y2=\"70\"\
    \ stroke-linecap=\"round\" stroke=\"red\"/>\n<animateTransform attributeName=\"\
    transform\" type=\"rotate\" repeatCount=\"indefinite\" dur=\"60s\" by=\"360\"\
    \ />\n</g>\n</g>\n\n    ... // The rest of the Clock code: shiney glare, black\
    \ button cover (center) on top of  arms\n\n</svg>\n```\n\n[图 4-8](#Chapter04.html#fig_4_8)\
    \ 展示了一个 JavaFX 应用程序，它渲染了 SVG 文件 `clock3.svg`，显示了一个模拟时钟。\n\n![images](images/0408.jpg)\n\
    \n***图 4-8.** 模拟时钟*"
  raw: '#### Solution


    Create a JavaFX based-application containing an analog clock that was created
    as HTML5 content. Use JavaFX’s `WebView` API to render HTML5 content in your application.


    The following source code is a JavaFX application displaying an animated analog
    clock. The application will load an SVG file named `clock3.svg` and display the
    contents onto the JavaFX Scene graph:


    `package javafx2introbyexample.chapter4.recipe4_02;`


    `import java.net.URL;`

    `import javafx.application.Application;`

    `import javafx.scene.Scene;`

    `import javafx.scene.paint.Color;`

    `import javafx.scene.web.WebView;`

    `import javafx.stage.Stage;`


    `/**`

    ` *`

    ` * @author cdea`

    `*/`

    `public class DisplayHtml5Content extends Application {`

    `    private Scene scene;`

    `    @Override public void start(Stage stage) {`

    `        // create the scene`

    `        stage.setTitle("Chapter 4-2 Display Html5 Content");`

    `        final WebView browser = new WebView();`

    `        URL url = getClass().getResource("clock3.svg");`

    `        browser.getEngine().load(url.toExternalForm());`

    `        scene = new Scene(browser,590,400, Color.rgb(0, 0, 0, .80));`

    `        stage.setScene(scene);`

    `        stage.show();`

    `    }`

    `    public static void main(String[] args){`

    `        Application.launch(args);`

    `    }`

    `}`


    This JavaFX code will load and render HTML5 content. Assuming that you have a
    designer who has provided content such as HTML5, it will be your job to render
    assets in JavaFX. The following code represents an SVG file named `clock3.svg`
    that is predominantly generated by the powerful tool Inkscape, which is an illustrator
    tool capable of generating SVG. In the following code, notice hand-coded JavaScript
    code (inside the `CDATA` tag) that will position the second, minute, and hour
    hands of the clock based on the current time of day. Because all the logic (from
    setting the time to animating the hands) is inside this file, things are self
    contained, which means any HTML5 capable viewer can display the file’s contents.
    So when debugging, you can easily render content in any HTML5-compliant browser.
    Later in this chapter, we will demonstrate JavaFX code that can interact with
    HTML5 content.


    Shown here is a pared-down version of the SVG analog clock. (To obtain the file’s
    source code, download the code from the book’s web site.) This is an SVG analog
    clock created in Inkscape (`clock3.svg`):


    `<svg`


    `   width="300"`

    `   height="250"`

    `   id="svg4171"`

    `   version="1.1"`

    `   inkscape:version="0.48.1 "`

    `   sodipodi:docname="clock3.svg" onload="updateTime()">`


    `<script>`


    `<![CDATA[`

    `var`


    `function updateTime()`

    `{`

    `  var date = new Date()`


    `  var hr = parseInt(date.getHours())`

    `  if (hr > 12) {`

    `    hr = hr - 12;`

    `  }`

    `  var min = parseInt(date.getMinutes())`

    `  var sec = parseInt(date.getSeconds())`

    `  var pi=180`

    `  var secondAngle = sec * 6 + pi`

    `  var minuteAngle = ( min + sec / 60 ) * 6 + pi`

    `  var hourAngle   = (hr + min / 60 + sec /3600) * 30 + pi`


    `  moveHands(secondAngle, minuteAngle, hourAngle)`

    `}`


    `function moveHands(secondAngle, minuteAngle, hourAngle) {`


    `  var secondHand = document.getElementById("secondHand")`

    `  var minuteHand = document.getElementById("minuteHand")`

    `  var hourHand = document.getElementById("hourHand")`


    `  secondHand.setAttribute("transform","rotate("+ secondAngle + ")")  `

    `  minuteHand.setAttribute("transform","rotate("+ minuteAngle +")")`

    `  hourHand.setAttribute("transform","rotate("+ hourAngle + ")")`


    `}`


    `]]>`


    `</script>`

    `<defs id="defs4173">`

    `... // beginning of SVG code`

    `... // Main clock code`


    `<g id="hands" transform="translate(108,100)">`

    `<g id="minuteHand">`

    `<line stroke-width="3.59497285" y2="50" stroke-linecap="round" stroke="#00fff6"
    opacity=".9" />`

    `<animateTransform attributeName="transform" type="rotate" repeatCount="indefinite"
    dur="60min" by="360" />`

    `</g>`


    `<g id="hourHand">`

    `<line stroke-width="5" y2="30" stroke-linecap="round" stroke="#ffcb00" opacity=".9"
    />`

    `<animateTransform attributeName="transform" type="rotate" repeatCount="indefinite"
    dur="12h" by="360" />`

    `</g>`

    `<g id="secondHand">`

    `<line stroke-width="2" y1="-20" y2="70" stroke-linecap="round" stroke="red"/>`

    `<animateTransform attributeName="transform" type="rotate" repeatCount="indefinite"
    dur="60s" by="360" />`

    `</g>`

    `</g>`


    `    ... // The rest of the Clock code: shiney glare, black button cover (center)
    on top of  arms`


    `</svg>`


    [Figure 4-8](#Chapter04.html#fig_4_8) depicts a JavaFX application, rendering
    the SVG file `clock3.svg` displaying an analog clock.


    ![images](images/0408.jpg)


    ***Figure 4-8.** Analog clock*'
  trans: '

    #### 解决方案


    创建一个基于 JavaFX 的应用程序，其中包含一个以 HTML5 内容形式创建的模拟时钟。使用 JavaFX 的 `WebView` API 在应用程序中渲染
    HTML5 内容。


    以下源代码是一个显示动画模拟时钟的 JavaFX 应用程序。该应用程序将加载一个名为 `clock3.svg` 的 SVG 文件，并将其内容显示到 JavaFX
    场景图中：


    `package javafx2introbyexample.chapter4.recipe4_02;`


    `import java.net.URL;`

    `import javafx.application.Application;`

    `import javafx.scene.Scene;`

    `import javafx.scene.paint.Color;`

    `import javafx.scene.web.WebView;`

    `import javafx.stage.Stage;`


    `/**`

    ` *`

    ` * @author cdea`

    `*/`

    `public class DisplayHtml5Content extends Application {`

    `    private Scene scene;`

    `    @Override public void start(Stage stage) {`

    `        // 创建场景`

    `        stage.setTitle("第 4 章-2 显示 Html5 内容");`

    `        final WebView browser = new WebView();`

    `        URL url = getClass().getResource("clock3.svg");`

    `        browser.getEngine().load(url.toExternalForm());`

    `        scene = new Scene(browser,590,400, Color.rgb(0, 0, 0, .80));`

    `        stage.setScene(scene);`

    `        stage.show();`

    `    }`

    `    public static void main(String[] args){`

    `        Application.launch(args);`

    `    }`

    `}`


    这段 JavaFX 代码将加载并渲染 HTML5 内容。假设你有一位设计师提供了诸如 HTML5 之类的内容，那么你的工作就是在 JavaFX 中渲染这些资源。以下代码代表一个名为
    `clock3.svg` 的 SVG 文件，该文件主要由强大的工具 Inkscape 生成，Inkscape 是一款能够生成 SVG 的插画工具。在以下代码中，请注意手写的
    JavaScript 代码（位于 `CDATA` 标签内），它将根据当前时间定位时钟的秒针、分针和时针。由于所有逻辑（从设置时间到动画指针）都包含在此文件中，因此内容是自包含的，这意味着任何支持
    HTML5 的查看器都可以显示该文件的内容。因此，在调试时，你可以轻松地在任何兼容 HTML5 的浏览器中渲染内容。在本章后面，我们将演示能够与 HTML5
    内容交互的 JavaFX 代码。


    此处展示的是 SVG 模拟时钟的精简版本。（要获取该文件的源代码，请从本书网站下载代码。）这是一个在 Inkscape 中创建的 SVG 模拟时钟（`clock3.svg`）：


    `<svg`


    `   width="300"`

    `   height="250"`

    `   id="svg4171"`

    `   version="1.1"`

    `   inkscape:version="0.48.1 "`

    `   sodipodi:docname="clock3.svg" onload="updateTime()">`


    `<script>`


    `<![CDATA[`

    `var`


    `function updateTime()`

    `{`

    `  var date = new Date()`


    `  var hr = parseInt(date.getHours())`

    `  if (hr > 12) {`

    `    hr = hr - 12;`

    `  }`

    `  var min = parseInt(date.getMinutes())`

    `  var sec = parseInt(date.getSeconds())`

    `  var pi=180`

    `  var secondAngle = sec * 6 + pi`

