    为你的天气应用程序添加一个“恐慌按钮”，用于模拟发送电子邮件通知。同时添加一个“冷静按钮”来撤销警告信息。


    以下代码实现了带有额外按钮的天气应用程序，用于发出和撤销即将到来的暴风雨天气警告：


    `    @Override public void start(Stage stage) {`


    `...  // 模板构建`


    这段代码将添加 HTML 按钮，其 `onclick` 属性设置为调用 JavaScript 的 `alert` 函数：


    `        template.append("<body id=''weather_background''>");`

    `        template.append("<form>\n");`

    `        template.append("  <input type=\"button\" onclick=\"alert(''warning'')\"
    value=\"恐慌`

    `按钮\" />\n");`

    `        template.append("  <input type=\"button\" onclick=\"alert(''unwarning'')\"
    value=\"冷静`

    `下来\" />\n");`

    `        template.append("</form>\n");`


    以下代码被添加到 `start()` 方法中，用于创建警告消息，并将其不透明度设置为零以使其不可见：


    `        // 调用 createMessage() 方法构建警告消息`

    `        final Text warningMessage = createMessage(Color.RED, "警告: ");`

    `        warningMessage.setOpacity(0);`


    `       ... // 倒计时代码`


    继续在 `start()` 方法内部，添加以下代码段，用于在成功获取天气信息后更新警告消息：


    `        webEngine.getLoadWorker().stateProperty().addListener(new ChangeListener<State>()
    {`

    `            public void changed(ObservableValue<? extends State> observable,
    State oldValue,`

    `State newValue){`

    `                System.out.println("完成!" + newValue.toString());`

    `                if (newValue != State.SUCCEEDED) {`

    `                    return;`

    `                }`

    `                Weather weather = parse(webEngine.getDocument());`

    `                warningMessage.setText("警告: " + weather.currentWeatherText +
    "\n 温度: " +`

    `weather.temperature + "\n 已通过电子邮件通知他人");`


    `                ... // changed() 方法的其余部分`

    `        }); // addListener 方法结束`


    这段代码设置了 `OnAlert` 属性，这是一个事件处理器，用于响应按下“恐慌”或“冷静”按钮时的操作：


    `        webView.getEngine().setOnAlert(new EventHandler<WebEvent<String>>(){`

    `            public void handle(WebEvent<String> evt) {`

    `                warningMessage.setOpacity("warning".equalsIgnoreCase(evt.getData())
    ? 1d :`

    `0d);`

    `            }`

    `        }); // setOnAlert() 方法结束`


    `        root.getChildren().addAll(webView, warningMessage);`


    `        stage.setScene(scene);`

    `        stage.show();`


    `    } // start() 方法结束`


    以下方法是你将添加的一个私有方法，负责创建一个文本节点（`javafx.scene.text.Text`），当用户按下“恐慌按钮”时，该节点将用作警告消息：


    `    private Text createMessage(Color color, String message) {`

    `        DropShadow dShadow = DropShadowBuilder.create()`

    `                            .offsetX(3.5f)`

    `                            .offsetY(3.5f)`

    `                            .build();`

    `        Text textMessage = TextBuilder.create()`

    `                    .text(message)`

    `                    .x(100)`

    `                    .y(50)`

    `                    .strokeWidth(2)`

    `                    .stroke(Color.WHITE)`

    `                    .effect(dShadow)`

    `                    .fill(color)`

    `                    .font(Font.font(null, FontWeight.BOLD, 35))`

    `                    .translateY(50)`

    `                    .build();`

    `        return textMessage;`

    `    }`

    `} // RespondingToHtmlEvents 类结束`


    图 4-10 展示了我们的天气应用程序在按下“恐慌按钮”后显示警告消息的效果。要移除警告消息，你可以按下“冷静按钮”。


    ![images](img/0410.jpg)


    ***图 4-10.** 显示警告消息的天气应用程序*


    #### 工作原理


    在本节中，你将向天气应用程序（来自第 4-3 节）添加额外功能，使其能够响应 HTML 事件。你将创建的应用程序与上一节类似，不同之处在于你将在网页上添加
    HTML 按钮，这些按钮将渲染到 `WebView` 节点上。添加的第一个按钮是“恐慌按钮”，按下时会显示一条警告消息，说明当前的天气状况，并模拟向你的同事发送电子邮件通知。为了撤销警告消息，你还需要添加一个“冷静按钮”。


    ![images](img/square.jpg) **注意** 由于代码与上一节非常相似，我将指出源代码中的新增部分，而不会深入详细说明。


    要添加按钮，你将使用 HTML 标签 `<input type=”button”…>`，并将 `onclick` 属性设置为使用 JavaScript 的
    `alert()` 函数来通知 JavaFX 发生了警报事件。以下是添加到网页中的两个按钮：


    `        StringBuilder template = new StringBuilder();`

    `        ...// HTML 网页的头部部分`

    `        template.append("<form>\n");`

    `        template.append("  <input type=\"button\" onclick=\"alert(''warning'')\"
    value=\"恐慌`

    `按钮\" />\n");`

    `        template.append("  <input type=\"button\" onclick=\"alert(''unwarning'')\"
    value=\"冷静`

    `下来\" />\n");`

    `        template.append("</form>\n");`


    当网页渲染并允许你按下按钮时，`onclick` 属性将调用包含字符串消息的 JavaScript `alert()` 函数。当 `alert()` 函数被调用时，网页的父级所有者（`webView`
    的 `WebEngine` 实例）将通过 `WebEngine` 的 `OnAlert` 属性收到警报通知。为了响应 JavaScript 的警报，你将添加一个事件处理器（`EventHandler`）来响应
    `WebEvent` 对象。在 `handle()` 方法中，你将通过切换 `warningMessage` 节点（`javafx.scene.text.Text`）的不透明度来简单地显示和隐藏警告消息。


    以下代码片段根据事件数据（`evt.getData()`）中包含的字符串（该字符串来自 JavaScript 的 `alert()` 函数）来切换警告消息的不透明度。因此，如果消息是“warning”，则
    `warningMessage` 的不透明度设置为 1；否则设置为 0（两者均为 `double` 类型）。


    `webView.getEngine().setOnAlert(new EventHandler<WebEvent<String>>(){`

    `    public void handle(WebEvent<String> evt) {`

    `       warningMessage.setOpacity("warning".equalsIgnoreCase(evt.getData()) ?
    1d : 0d);`

    `    }`

    `});`


    有关其他 HTML 网页事件（`WebEvent`）的详细信息，请参阅 Javadocs。


    ### 4-5. 显示数据库中的内容


    #### 问题


    你希望持续关注最新消息，监测当地立法机构和科学界关于小型格子间工作区域缺乏光照的有害影响。

