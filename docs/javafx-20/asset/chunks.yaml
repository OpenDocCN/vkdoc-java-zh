- fmt: "### 2-2. Generating an Animation\n\n#### Problem\n\nYou want to generate an\
    \ animation. For example, you want to create a news ticker and photo viewer application\
    \ with the following requirements:\n\n- It will have a news ticker control that\
    \ scrolls to the left.\n- It will fade out the current picture and fade in the\
    \ next picture as the user clicks the button controls.\n- It will fade in and\
    \ out button controls when the cursor moves in and out of the scene area, respectively.\n\
    \n#### Solution\n\nCreate animated effects by accessing JavaFX’s animation APIs\
    \ (`javafx.animation.*`). To create a news ticker, you need the following classes:\n\
    \n- `javafx.animation.TranslateTransition`\n- `javafx.util.Duration`\n- `javafx.event.EventHandler<ActionEvent>`\n\
    - `javafx.scene.shape.Rectangle`\n\nTo fade out the current picture and fade in\
    \ next picture, you need the following classes:\n\n- `javafx.animation.SequentialTransition`\n\
    - `javafx.animation.FadeTransition`\n- `javafx.event.EventHandler<ActionEvent>`\n\
    - `javafx.scene.image.Image`\n- `javafx.scene.image.ImageView`\n- `javafx.util.Duration`\n\
    \nTo fade in and out button controls when the cursor moves into and out of the\
    \ scene area, respectively, the following classes are needed:\n\n- `javafx.animation.FadeTransition`\n\
    - `javafx.util.Duration`\n\nShown here is the code used to create a news ticker\
    \ control:\n\n```\n// create ticker area\nfinal Group tickerArea = new Group();\n\
    final Rectangle tickerRect = RectangleBuilder.create()\n        .arcWidth(15)\n\
    \        .arcHeight(20)\n        .fill(new Color(0, 0, 0, .55))\n        .x(0)\n\
    \        .y(0)\n        .width(scene.getWidth() - 6)\n        .height(30)\n  \
    \      .stroke(Color.rgb(255, 255, 255, .70))\n        .build();\n\nRectangle\
    \ clipRegion = RectangleBuilder.create()\n        .arcWidth(15)\n        .arcHeight(20)\n\
    \        .x(0)\n        .y(0)\n        .width(scene.getWidth() - 6)\n        .height(30)\n\
    \        .stroke(Color.rgb(255, 255, 255, .70))\n        .build();\n\ntickerArea.setClip(clipRegion);\n\
    \n// Resize the ticker area when the window is resized\ntickerArea.setTranslateX(6);\n\
    tickerArea.translateYProperty().bind(scene.heightProperty().subtract(tickerRect.getHeight()\
    \ + 6));\ntickerRect.widthProperty().bind(scene.widthProperty().subtract(buttonRect.getWidth()\
    \ + 16));\nclipRegion.widthProperty().bind(scene.widthProperty().subtract(buttonRect.getWidth()\
    \ + 16));\ntickerArea.getChildren().add(tickerRect);\n\nroot.getChildren().add(tickerArea);\n\
    \n// add news text\nText news = TextBuilder.create()\n        .text(\"JavaFX 2.0\
    \ News! | 85 and sunny | :)\")\n        .translateY(18)\n        .fill(Color.WHITE)\n\
    \        .build();\ntickerArea.getChildren().add(news);\n\nfinal TranslateTransition\
    \ ticker = TranslateTransitionBuilder.create()\n        .node(news)\n        .duration(Duration.millis((scene.getWidth()/300)\
    \ * 15000))\n        .fromX(scene.widthProperty().doubleValue())\n        .toX(-scene.widthProperty().doubleValue())\n\
    \        .fromY(19)\n        .interpolator(Interpolator.LINEAR)\n        .cycleCount(1)\n\
    \        .build();\n\n// when ticker has finished reset and replay ticker animation\n\
    ticker.setOnFinished(new EventHandler<ActionEvent>() {\n    public void handle(ActionEvent\
    \ ae){\n        ticker.stop();\n        ticker.setFromX(scene.getWidth());\n \
    \       ticker.setDuration(new Duration((scene.getWidth()/300) * 15000));\n  \
    \      ticker.playFromStart();\n    }\n});\n\nticker.play();\n```\n\nHere is the\
    \ code used to fade out the current picture and fade in next picture:\n\n```\n\
    // previous button\nArc prevButton = // create arc ...\n\nprevButton.addEventHandler(MouseEvent.MOUSE_PRESSED,\
    \ new EventHandler<MouseEvent>() {\n\n    public void handle(MouseEvent me) {\n\
    \        int indx = gotoImageIndex(PREV);\n        if (indx > -1) {\n        \
    \    String namePict = imagesFiles.get(indx);\n            final Image nextImage\
    \ = new Image(new File(namePict).getAbsolutePath());\n            SequentialTransition\
    \ seqTransition = transitionByFading(nextImage, currentImageView);\n         \
