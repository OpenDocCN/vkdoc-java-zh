    #### 解决方案


    创建一个 JavaFX RSS 阅读器。RSS 订阅源的位置 URL 将存储在数据库中，以便后续检索。以下是本方案中使用的主要类：


    > *   `javafx.scene.control.Hyperlink`

    > *   `javafx.scene.web.WebEngine`

    > *   `javafx.scene.web.WebView`

    > *   `org.w3c.dom.Document`

    > *   `org.w3c.dom.Node`

    > *   `org.w3c.dom.NodeList`


    本方案将使用 Apache 组织提供的嵌入式数据库 Derby，其官网为 [`http://www.apache.org`](http://www.apache.org)。前提条件是你需要下载
    Derby 软件。请访问 [`http://db.apache.org/derby/derby_downloads.html`](http://db.apache.org/derby/derby_downloads.html)
