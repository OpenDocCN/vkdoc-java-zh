    #### How It Works


    An event driven architecture (EDA) is a prominent architectural pattern used to
    model loosely coupled components and services that pass messages asynchronously.
    The JavaFX team has designed the Media API to be event driven. This recipe will
    demonstrate how to implement in response to media events.


    With event-based programming in mind, you will discover nonblocking or callback
    behaviors when invoking functions. In this recipe you will implement the display
    of text in response to an `onPaused` event instead of placing your code into the
    pause button. Instead of tying code directly to a button via an `EventHandler`,
    you will be implementing code that will respond to the media player’s `onPaused`
    event being triggered. When responding to media events, you will be implementing
    `java.lang.Runnable`s.


    You’ll be happy to know that you’ve been using event properties and implementing
    `Runnable`s all along. Hopefully you noticed this in all the recipes in this chapter.
    When the media player is in a ready state, the `Runnable` code will be invoked.
    Why is this correct? Well, when the media player is finished loading the media,
    the `onReady` property will be notified. That way you can be sure you can invoke
    the `MediaPlayer`’s `play()` method. I trust that you will get used to event style
    programming. The following code snippet demonstrates the setting of a `Runnable`
    instance into a media player object’s `OnReady` property:


    `mediaPlayer.setOnReady(new Runnable() {`

    `    @Override`

    `    public void run() {`

    `        mediaPlayer.play();`

    `    }`

    `});`


    You will be taking steps similar to the `onReady` property. Once a `Paused` event
    has been triggered, the `run()` method will be invoked to present to the user
    a message containing a `Text` node with the word `Paused` and a duration showing
    the time in milliseconds into the video. Once displayed, you might want to write
    down the duration as markers (as you’ll learn recipe 3-4). The following code
    snippet shows an attached `Runnable` instance, which is responsible for displaying
    a paused message and duration in milliseconds at the point in which it was paused
    in the video:


    `  // when paused event display pause message`

    `  mediaPlayer.setOnPaused(new Runnable() {`

    `     @Override`

    `     public void run() {`

    `        pauseMessage.setText("Paused \nDuration: " +`

    `mediaPlayer.currentTimeProperty().getValue().toMillis());`

    `        pauseMessage.setOpacity(.90);`


    `    }`

    `  });`


    ### 3-4\. Marking a Position in a Video


    #### Problem


    You want to provide closed caption text while playing a video in the media player.


    #### Solution


    Begin by applying recipe 3-3\. By obtaining the marked durations (in milliseconds)
    from the previous recipe you will create media marker events at points into the
    video. With each media marker you will associate text that will be displayed as
    closed captions. When a marker comes to pass, a text will be shown to the upper-right
    side.


    The following code snippet demonstrates media marker events being handled in the
    `onDragDropped` event property of the `Scene` object:


    `... // inside the start() method`


    `final VBox messageArea = createClosedCaptionArea(scene);`

    `root.getChildren().add(messageArea);`


    `// Dropping over surface`

    `scene.setOnDragDropped(new EventHandler<DragEvent>() {`


    `    @Override`

    `    public void handle(DragEvent event) {`

    `        Dragboard db = event.getDragboard();`


    `        ... // drag dropped code goes here`


    `        // load media`

    `        Media media = new Media(resourceUrlOrFile.toString());`


    `        ... // clean up media player`


    `        // create a new media player`

    `        mediaPlayer = MediaPlayerBuilder.create()`

    `                .media(media)`

    `                .build();`


    `        ...// Set media ‘onXXX’ event properties`


    `        mediaView.setMediaPlayer(mediaPlayer);`


    `        media.getMarkers().put("Starting race", Duration.millis(1959.183673));`

    `        media.getMarkers().put("He is begining \nto get ahead", Duration.millis(3395.918367));`

    `        media.getMarkers().put("They are turning \nthe corner", Duration.millis(6060.408163));`

    `        media.getMarkers().put("The crowds cheer", Duration.millis(9064.489795));`

    `        media.getMarkers().put("He makes the \nfinish line", Duration.millis(11546.122448));`


    `        // display closed captions`

    `        mediaPlayer.setOnMarker(new EventHandler<MediaMarkerEvent> (){`

    `            public void handle(MediaMarkerEvent event){`

    `                closedCaption.setText(event.getMarker().getKey());`

    `            }`

    `        });`

    `        event.setDropCompleted(success);`

    `        event.consume();`

    `    }`

    `}); // end of setOnDragDropped()`


    Shown following is a factory method that returns an area that will contain the
    closed caption to be displayed to the right of the video:


    `    private VBox createClosedCaptionArea(final Scene scene) {`

    `        // create message area`

    `        final VBox messageArea = new VBox(3);`

    `        messageArea.setTranslateY(30);`

    `        messageArea.translateXProperty().bind(scene.widthProperty().subtract(152)
    );`

    `        messageArea.setTranslateY(20);`

    `        closedCaption = TextBuilder.create()`

    `            .stroke(Color.WHITE)`

    `            .fill(Color.YELLOW)`

    `            .font(new Font(15))`

    `            .build();`

    `        messageArea.getChildren().add(closedCaption);`

    `        return messageArea;`

    `    }`


    [Figure 3-5](#Chapter03.html#fig_3_5) depicts the video media player displaying
    closed caption text.


    ![images](images/0305.jpg)


    ***Figure 3-5.** Closed caption text*'
