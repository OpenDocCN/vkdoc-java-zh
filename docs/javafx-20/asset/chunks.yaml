    \                .min(0)\n                .max(100)\n                .value(5)\n\
    \                .showTickLabels(true)\n                .showTickMarks(true)\n\
    \                .minorTickCount(1)\n                .blockIncrement(5)\n    \
    \            .build();\n        gridPaddingSlider.valueProperty().addListener(new\
