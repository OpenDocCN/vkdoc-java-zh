    ## 第 4 章


    ## Web 上的 JavaFX


    JavaFX 提供了与 HTML5 互操作的新功能。JavaFX 中底层的网页渲染引擎是名为 Webkit 的流行开源 API。Webkit 也被用于谷歌的
    Chrome 和苹果的 Safari 浏览器。HTML5 是用于在网页浏览器中渲染内容的新标准标记语言。HTML5 内容包含 JavaScript、CSS、可缩放矢量图形（SVG）以及新的
    HTML 元素标签。


    JavaFX 与 HTML5 之间的关系非常重要，因为它们通过发挥各自的优势相互补充。例如，JavaFX 的富客户端 API 与 HTML5 的丰富网页内容相结合，创造了一种兼具桌面软件特性的网页应用用户体验。这种新型应用被称为
    RIA。


    在本章中，我们将涵盖以下内容：


    > *   在 HTML 网页中嵌入 JavaFX 应用程序

    > *   显示 HTML5 内容

    > *   使用 Java 代码操作 HTML5 内容

    > *   响应 HTML 事件

    > *   显示数据库中的内容


    ### 4-1. 在网页中嵌入 JavaFX 应用程序


    #### 问题


    你希望通过利用现有的网页开发技能，结合 JavaFX 创建一个概念验证，给老板留下深刻印象，从而从格子间晋升到带窗户的办公室。

