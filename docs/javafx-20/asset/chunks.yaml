    #### 工作原理


    在本教程中，我们将使用 JavaFX 创建一个登录界面。在此过程中，我们主要关注 `javafx.stage.Stage` 类。JavaFX 通过 `javafx.stage.Stage`
    类的实例向用户展示界面。当你继承 `Stage` 类时，你可以（如同在 `Swing` 中一样）在构造函数中传入所属窗口，该构造函数随后会调用 `initOwner()`
    方法。接下来，使用 `initModality()` 方法设置对话框的模态状态。以下是一个继承自 `Stage` 类的示例，其构造函数初始化了所属舞台和模态状态：


    `class MyDialog extends Stage {`


    `    public MyDialog(Stage owner, boolean modality, String title) {`

    `        super();`

    `        initOwner(owner);`

    `        Modality m = modality ? Modality.APPLICATION_MODAL : Modality.NONE;`

    `initModality(m);`


    `        ...// 类的其余部分`


    其余代码创建了一个场景（`Scene`），与主应用程序的 `start()` 方法类似。由于登录表单相当乏味，我决定在用户忙于在对话框中更改密码时，创建一个弹跳球的动画。（你将在教程
    2-2 中了解更多关于创建动画的内容。）


    ## 第 2 章


    ## JavaFX 图形


    你是否曾听人说过“两个世界碰撞”？这个表达通常用于描述一个来自不同背景或文化的人，被置于一个矛盾冲突的境地，必须面对艰难抉择。当我们构建需要动画的 GUI
    应用程序时，常常会处于业务世界与游戏世界的碰撞之中。


    在不断变化的 RIA（富互联网应用）世界中，你可能已经注意到动画效果的增多，例如脉冲按钮、过渡效果、动态背景等。当 GUI 应用程序使用动画时，它们可以为用户提供视觉提示，告知下一步操作。借助
    JavaFX，你将能够兼得两个世界的优势。


    图 2-1 展示了一幅简单的画作变得生动起来。


    ![images](img/0201.jpg)


    ***图 2-1.** JavaFX 图形*


    在本章中，你将创建图像、动画和外观样式。系好安全带；你将发现如何将酷炫的游戏化界面集成到日常应用程序中的解决方案。


    ![images](img/square.jpg) **注意** 如果你对 JavaFX 不熟悉，请参考第 1 章。除其他内容外，它将帮助你创建一个能够高效使用
    JavaFX 的开发环境。


    ### 2-1. 创建图像


    #### 问题


    你的文件目录中有一些照片，希望快速浏览并展示它们。


    #### 解决方案


