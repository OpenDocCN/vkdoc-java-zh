    ![images](images/0122.jpg)


    *Figure 1-22\. TabPane*


    #### How It Works


    When you use the `TabPane` control, you might already know the orientation in
    which you want your tabs to appear. This application allows you to set the orientation
    by the menu options for Left, Right, Top, and Bottom.


    To use the `TabPane` you will immediately notice how similar it is to Java Swing’s
    `JTabbedPanel` class. Instead of adding `JPanel` instances, you simply add `javafx.scene.control.Tab`
    instances. The following code snippet adds `Tab` controls into a tab pane control:


    `TabPane tabPane = new TabPane();`

    `Tab tab = new Tab();`

    `tab.setText("Tab" + i);`

    `tabPane.getTabs().add(tab);`


    When changing the orientation the `TabPane` control, use the `setSide()` method.
    The following code line sets the orientation of the tab pane control:


    `tabPane.setSide(Side.BOTTOM);`


