    is an example of HTML generated for an headline news containing a View button
    that can notify the web engine’s `OnAlert` web event (`WebEvent`).


    `<input type="button" onclick="alert(''http://carlfx.wordpress.com/2009/08/03/javafx-forms-`

    `framework-part-2/'')" value="View" />`


    One last thing to point out is that the RSS application has missing features.
    One feature that comes to my mind is the ability to delete individual RSS hyperlinks
    on the left column region. A workaround is to remove all links by deleting the
    database on the file system. Because Derby is an embedded database, you can delete
    the directory containing the database. The JavaFX RSS application will re-create
