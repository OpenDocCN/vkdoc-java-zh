    \     TextField lNameFld = new TextField();\n        Label ageLbl = new Label(\"\
    Age\");\n        TextField ageFld = new TextField();\n\n        Button saveButt\
    \ = new Button(\"Save\");\n\n        // First name label\n        GridPane.setHalignment(fNameLbl,\
