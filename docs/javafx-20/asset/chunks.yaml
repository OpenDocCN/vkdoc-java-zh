    #### How It Works


    JavaFX is capable of styling JavaFX nodes similar to Cascading Style Sheets (CSS)
    in the world of web development. This powerful API can alter a node’s background
    color, font, border, and many other attributes essentially allowing a developer
    or designer to skin GUI controls using CSS.


    This recipe allows a user to enter JavaFX CSS styles in the left text area and,
    by clicking the Bling! button below, to apply the style around the image shown
    to the right. Based on the type of node there are limitations to what styles you
    can set. To see a full listing of all style selectors refer to the JavaFX CSS
    Reference Guide:

    [`http://download.oracle.com/docs/cd/E17802_01/javafx/javafx/1.3/docs/api/javafx.scene/doc-files/cssref.html`](http://download.oracle.com/docs/cd/E17802_01/javafx/javafx/1.3/docs/api/javafx.scene/doc-files/cssref.html).


    In the first step of applying JavaFX CSS styles, you must determine what type
    of node you want to style. When setting attributes on various node types, you
    will discover that certain nodes have limitations. In our recipe the intent is
    to put a border around the `ImageView` object. Because `ImageView` is not extending
    from `Region` it doesn’t have border style properties. So, to resolve this I simply
    create an `HBox` layout to contain the `imageView` and apply the JavaFX CSS against
    the `HBox`. Shown here is code to apply JavaFX CSS border styles to a horizontal
    box region (`HBox`) using the `setStyle()` method:


    `String cssDefault = "-fx-border-color: blue;\n"`

