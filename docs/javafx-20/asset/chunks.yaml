    `}`


    ## 第 3 章


    ## JavaFX 中的媒体


    JavaFX 提供了一个功能丰富的媒体 API，能够播放音频和视频。Media API 允许开发人员将音频和视频集成到他们的富互联网应用程序（RIA）中。Media
    API 的主要优势之一在于，通过 Web 分发媒体内容时具有跨平台能力。由于需要播放多媒体内容的设备种类繁多（平板电脑、音乐播放器、电视等），跨平台 API
    的需求至关重要。


    想象一下不远的未来，你的电视或墙壁能够以你从未梦想过的方式与你互动。例如，在观看电影时，你可以选择电影中使用的物品或服装并立即购买，而这一切都舒适地在家中完成。基于这样的未来愿景，开发人员致力于增强其媒体应用程序的交互特性。


    在本章中，你将学习如何以交互方式播放音频和视频。请就座，观看 JavaFX 的第三幕，音频和视频将成为舞台的中心（如图 3-1 所示）。


