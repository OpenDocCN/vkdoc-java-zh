    mouse to drag and drop a file into the window area. The application also allows
    resizing of the window, which automatically causes scaling of the image’s size
    while maintaining its aspect ratio. After a few images are successfully loaded,
    you will be able to page through each image conveniently by clicking the left
    and right button controls, as shown in [Figure 2-3](#Chapter02.html#fig_2_3).


    Before the code walk-through, let’s discuss the application’s variables. [Table
    2-1](#Chapter02.html#tab_2_1) describes instance variables for our sleek image
    viewer application.


    ![images](images/t0201.jpg)


    When dragging an image into the application, the `imageFiles` variable will cache
    the absolute file path as a String instead of the actual image file in order to
    save space in memory. If a user drags the same image file into the display area,
    the list will contain duplicate strings representing the image file. As an image
    is being displayed, the `currentIndex` variable contains the index into the `imageFiles`
    list. That `imageFiles` list points to the String representing the current image
    file. As the user clicks the buttons to display the previous and next image, the
    `currentIndex` will decrement or increment, respectively. Next, you will walk
    through the code detailing the steps on how to load and display an image. Later
    I will discuss the steps on paging through each image with the next and previous
    buttons.


    You will begin by instantiating an instance of a `javafx.scene.image.ImageView`
    class. The `ImageView` class is a graph node (`Node`) used to display an already
    loaded `javafx.scene.image.Image` object. Using the `ImageView` node will enable
    you to create special effects on the image to be displayed without manipulating
    the physical `Image`. To avoid performance degradation when rendering many effects,
    you can use numerous `ImageView` objects that reference a single `Image` object.
    Many types of effects include blurring, fading, and transforming an image.


    One of the requirements is preserving the displayed image’s aspect ratio as the
    user resizes the window. Here, you will simply call the `setPreserveRatio()` method
    with a value of `true` to preserve the image’s aspect ratio. Remember that because
    the user resizes the window, you want to bind the width of the `ImageView` to
    the `Scene`’s width to allow the scaling of the image to take effect. After setting
    up the `ImageView`, you will want to pass it to an `HBox` instance (`pictureRegion`)
    to be put into the scene. The following code creates the `ImageView` instance,
    preserves the aspect ratio, and scales the image:


    `    // image view`

    `    final ImageView currentImageView = new ImageView();`


    `    // maintain aspect ratio`

    `    currentImageView.setPreserveRatio(true);`


    `    // resize based on the scene`

    `    currentImageView.fitWidthProperty().bind(scene.widthProperty());`


    Next, I want to introduce JavaFX’s new native drag-and-drop support, which offers
    many scenarios a user can perform, such as dragging visual objects from an application
    to be dropped into another application. In this scenario, the user will be dragging
    an image file from the host windowing operating system to your image viewer application.
    When performing this scenario, you must create `EventHandler` objects to listen
    to `DragEvent`s. To fulfill this requirement, you only need to set-up a Scene’s
    drag-over and drag-dropped event handler methods.


    To setup the drag-over attribute, you will be calling the Scene’s `setOnDragOver()`
    method with the appropriate generics `EventHandler<DragEvent>` type. Here you
    will implement the `handle()` method to listen to the drag-over event (`DragEvent`).
    In the `handle()` method notice the event (`DragEvent`) object’s invocation to
    the `getDragboard()` method. The call to `getDragboard()` will return the drag
    source (`Dragboard`), better known as the *clipboard*. When you obtain the `Dragboard`
    object, you can determine and validate what is being dragged over the surface.
    In this scenario, you are trying to determine whether the `Dragboard` object contains
    any files. If so, call the event object’s `acceptTransferModes()` by passing in
    the constant `TransferMode.COPY` to provide visual feedback to the user of the
    application (refer to [Figure 2-2](#Chapter02.html#fig_2_2)). Otherwise it should
    consume the event by calling the `event.consume()` method. The following code
    demonstrates setting up a Scene’s `OnDragOver` attribute by instantiating an inner
    class of type `EventHandler` with a formal type parameter `<DragEvent>` and overriding
    its handle() method:


    `// Dragging over surface`

    `scene.setOnDragOver(new EventHandler<DragEvent>() {`

    `    @Override`

    `    public void handle(DragEvent event) {`

    `        Dragboard db = event.getDragboard();`

    `        if (db.hasFiles()) {`

    `            event.acceptTransferModes(TransferMode.COPY);`

    `        } else {`

    `            event.consume();`

    `        }`

    `    }`

    `});`


    Once the drag-over event handler attribute is set, you must create a drag-dropped
    event handler attribute in order that it may finalize the operation. Listening
    to a drag-dropped event is similar to listening to a drag-over event in which
    you will implement the `handle()` method. Once again you obtain the `Dragboard`
    object from the event to determine whether the clipboard contains any files. If
    so, you will iterate over the list of files and their names to be added to the
    `imageFiles` list. This demonstrates setting up a Scene’s `OnDragDropped` attribute
    by instantiating an inner class of type `EventHandler` with a formal type parameter
    `<DragEvent>` and overriding its `handle()` method:


    `// Dropping over surface`

    `scene.setOnDragDropped(new EventHandler<DragEvent>() {`


    `    @Override`

    `    public void handle(DragEvent event) {`

    `        Dragboard db = event.getDragboard();`

    `        boolean success = false;`

    `        if (db.hasFiles()) {`

    `            success = true;`

    `            String filePath = null;`

    `            for (File file:db.getFiles()) {`

    `                filePath = file.getAbsolutePath();`


    `                currentIndex +=1;`

    `                imageFiles.add(currentIndex, filePath);`

    `            }`


    `            // set new image as the image to show.`

    `            Image imageimage = new Image(filePath);`

    `            currentImageView.setImage(imageimage);`


    `        }`

    `        event.setDropCompleted(success);`

    `        event.consume();`

    `    }`

    `});`


    As the last file is determined, the current image is displayed. The following
    code demonstrates loading an image to be displayed:


    `// set new image as the image to show.`

    `Image imageimage = new Image(filePath);`

    `currentImageView.setImage(imageimage);`


    For the last requirements relating to the image viewer application, you will be
    creating simple controls that allow the user to view the next or previous image.
    I emphasize “simple” controls because JavaFX contains two other methods for creating
    custom controls. One way (CSS Styling) is discussed later in recipe 2-5\. To explore
    the other alternative, please refer to the Javadoc on the Skin and Skinnable APIs.


    To create simple buttons I used Java FX’s `javafx.scene.shape.Arc` to build the
    left and right arrows on top of a small transparent rounded rectangle `javafx.scene.shape.Rectangle`.
    Next is adding an `EventHandler` that listens to mouse-pressed events that will
    load and display the appropriate image based on enums `ButtonMove.PREV` and `ButtonMove.NEXT`.
    You will find the `EventHandler` indispensible and useful in so many ways. When
    instantiating a generics class with a type variable between the `<` and `>` symbols,
    the same type variable will be defined in `the handle()`’s signature. When implementing
    the `handle()` method I determine which button was pressed; it then returns the
    index into the `imageFiles` list of the next image to display. When loading an
    image using the `Image` class you can load images from the file system or a `URL`,
    but in this recipe I am using a `File` object. The following code instantiates
    an `EventHandler<MouseEvent>` with a `handle()` method to display the previous
    image in the `imageFiles` list:


    `Arc leftButton = //... create an Arc`

    `leftButton.addEventHandler(MouseEvent.MOUSE_PRESSED, new EventHandler<MouseEvent>()
    {`

    `   public void handle(MouseEvent me) {                `

    `      int indx = gotoImageIndex(ButtonMove.PREV);`

    `      if (indx > -1) {`

    `         String namePict = imageFiles.get(indx);`

    `         final Image image = new Image(new File(namePict).getAbsolutePath());`

    `         currentImageView.setImage(image);`

    `      }`

    `  }`

    `});`


    The right button’s (`rightButton`) event handler is identical, so I trust you
    get the idea. The only thing different is determining whether the previous button
    or the next button was pressed via the `ButtonMove` enum. This is passed to the
    `gotoImageIndex()` method to determine whether an image is available in that direction.


    To finish the image viewer application, you have to bind the rectangular buttons
    control to the Scene’s width and height, which repositions the control as the
    user resizes the window. Here, I bind the `translateXProperty()`to the Scene’s
    width property by subtracting the `buttonArea’s` width (Fluent API). I also bind
    the `translateYProperty()` based on the Scene’s height property. Once your buttons
    control is bound, your user will experience user interface goodness. The following
    code uses the Fluent API to bind the button control’s properties to the Scene’s
    properties:


    `        // move button group when scene is resized`

    `        buttonGroup.translateXProperty().bind(scene.widthProperty().subtract(buttonArea.getWid`

    `        h() + 6));`


    `        buttonGroup.translateYProperty().bind(scene.heightProperty().subtract(buttonArea.getHe`

    `        ght() + 6));`

    `        root.getChildren().add(buttonGroup);`'
