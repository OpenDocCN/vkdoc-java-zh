    \ to launch the application as a Webstart application (not embedded).\n\n### 4-2\\\
    . Displaying HTML5 Content\n\n#### Problem\n\nYou are so engrossed with a project\
    \ for work that you often miss your kid’s soccer games. What you need is a clock\
    \ application to keep track of the time."
  trans: "\n#### 解决方案\n\n使用 NetBeans IDE 7.1 或更高版本，通过其新建项目向导创建一个 Hello World 程序，使其在浏览器中运行。以下是创建嵌入在\
    \ HTML 网页中的 Hello World JavaFX 应用程序的步骤：\n\n![images](img/square.jpg) **注意** 有关深入的\
    \ JavaFX 部署策略，请参考 Oracle 的《部署 JavaFX 应用程序》：[`http://download.oracle.com/javafx/2.0/deployment/deployment_toolkit.htm`](http://download.oracle.com/javafx/2.0/deployment/deployment_toolkit.htm)。\n\
    \n以下是运行新建项目向导的步骤：\n\n> 1.  在 NetBeans IDE 7.1 或更高版本的“文件”菜单中选择“新建项目”。图 4-1 突出显示了\
