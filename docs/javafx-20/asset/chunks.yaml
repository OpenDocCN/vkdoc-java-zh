- fmt: "### How It Works\n\nIn this recipe you’ll be creating a simple application\
    \ enabling you to animate objects by following a drawn path on the Scene graph.\
    \ To make things simple you will be using one shape (`Circle`) that will perform\
    \ a path transition (`javafx.animation.PathTransition`). You will allow the user\
    \ to draw a path on the scene surface by pressing the mouse button like a drawing\
    \ program. Once you are satisfied with the path drawn, you will release the mouse\
    \ press that triggers the red ball to follow the path similar to objects moving\
    \ through pipes inside a building.\n\nYou will create two instance variables to\
    \ maintain the coordinates that make up the path. To hold the path being drawn,\
    \ you will create an instance of a `javafx.scene.shape.Path` object. You also\
    \ should know that the path instance should be added to the Scene graph before\
    \ the start of the application. Shown here is adding the instance variable `onePath`\
    \ onto the Scene graph:\n\n```\n// add path\nroot.getChildren().add(onePath);\n\
    ```\n\nNext, you will create an instance variable `anchorPt` (`javafx.geometry.Point2D`)\
    \ that will hold the path’s starting point. Later, you will see how these variables\
    \ will be updated based on mouse events. Shown here are the instance variables\
    \ that maintain the currently drawn path:\n\n```\nPath onePath = new Path();\n\
