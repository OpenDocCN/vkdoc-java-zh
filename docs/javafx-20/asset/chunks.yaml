- fmt: "# Solution\n\nEmploy JavaFX’s menu controls to provide standardized menuing\
    \ capabilities such as check box menus, radio menus, submenus, and separators.\
    \ The following are the main classes used to create menus.\n\n> *   `javafx.scene.control.MenuBar`\n\
    > *   `javafx.scene.control.Menu`\n> *   `javafx.scene.control.MenuItem`\n\nThe\
    \ following code calls into play all the menuing capabilities listed previously.\
    \ The example code will simulate a building security application containing menu\
    \ options to turn on cameras, sound an alarm, and select contingency plans.\n\n\
    ```\nprimaryStage.setTitle(\"Chapter 1-7 Creating Menus\");\nGroup root = new\
    \ Group();\nScene scene = new Scene(root, 300, 250, Color.WHITE);\n\nMenuBar menuBar\
    \ = new MenuBar();\n\n// File menu - new, save, exit\nMenu menu = new Menu(\"\
    File\");\nmenu.getItems().add(new MenuItem(\"New\"));\nmenu.getItems().add(new\
    \ MenuItem(\"Save\"));\nmenu.getItems().add(new SeparatorMenuItem());\nmenu.getItems().add(new\
    \ MenuItem(\"Exit\"));\n\nmenuBar.getMenus().add(menu);\n\n// Cameras menu - camera\
    \ 1, camera 2\nMenu tools = new Menu(\"Cameras\");\ntools.getItems().add(CheckMenuItemBuilder.create()\n\
    \        .text(\"Show Camera 1\")\n        .selected(true)\n        .build());\n\
    \ntools.getItems().add(CheckMenuItemBuilder.create()\n        .text(\"Show Camera\
    \ 2\")\n        .selected(true)\n        .build());\nmenuBar.getMenus().add(tools);\n\
    \n// Alarm\nMenu alarm = new Menu(\"Alarm\");\nToggleGroup tGroup = new ToggleGroup();\n\
    RadioMenuItem soundAlarmItem = RadioMenuItemBuilder.create()\n        .toggleGroup(tGroup)\n\
    \        .text(\"Sound Alarm\")\n        .build();\nRadioMenuItem stopAlarmItem\
    \ = RadioMenuItemBuilder.create()\n        .toggleGroup(tGroup)\n        .text(\"\
    Alarm Off\")\n        .selected(true)\n        .build();\n\nalarm.getItems().add(soundAlarmItem);\n\
    alarm.getItems().add(stopAlarmItem);\n\nMenu contingencyPlans = new Menu(\"Contingent\
    \ Plans\");\ncontingencyPlans.getItems().add(new CheckMenuItem(\"Self Destruct\
    \ in T minus 50\"));\ncontingencyPlans.getItems().add(new CheckMenuItem(\"Turn\
    \ off the coffee machine \"));\ncontingencyPlans.getItems().add(new CheckMenuItem(\"\
    Run for your lives! \"));\n\nalarm.getItems().add(contingencyPlans);\nmenuBar.getMenus().add(alarm);\n\
    menuBar.prefWidthProperty().bind(primaryStage.widthProperty());\n\nroot.getChildren().add(menuBar);\n\
    primaryStage.setScene(scene);\nprimaryStage.show();\n```\n\n[Figure 1-14](#Chapter01.html#fig_1_14)\
    \ shows a simulated building security application containing radio, checked, and\
    \ submenu items.\n\n![images](images/0114.jpg)\n\n***Figure 1-14.** Creating menus*\n\
    \n## How It Works\n\nMenus are standard ways on windowed platform applications\
    \ to allow users to select options. Menus should also have the functionality of\
    \ hot keys or keyboard equivalents. Often users will want to use the keyboard\
    \ instead of the mouse to navigate the menu.\n\nFirst, we create an instance of\
    \ a `MenuBar` that will contain one to many menu (`MenuItem`) objects. The following\
    \ code snippet creates a menu bar:\n\n```\nMenuBar menuBar = new MenuBar();\n\
    ```\n\nSecondly, we create menu (`Menu`) objects that contain one-to-many menu\
    \ item (`MenuItem`) objects and other `Menu` objects making submenus. The following\
    \ code snippet creates a menu:\n\n```\nMenu menu = new Menu(\"File\");\n```\n\n\
    Third, we create menu items to be added to `Menu` objects, such as menu (`MenuItem`),\
    \ check (`CheckMenuItem`), and radio menu items (`RadioMenuItem`). Menu items\
    \ can have icons in them. I don’t showcase this in the recipe, but I encourage\
    \ you to explore the various constructors for all menu items (`MenuItem`). When\
    \ creating a radio menu item (`RadioMenuItem`), you should be aware of the `ToggleGroup`\
    \ class. The `ToggleGroup` class is also used on regular radio buttons (`RadioButton`s)\
    \ to allow one selected option only. The following code creates radio menu items\
    \ (`RadioMenuItem`s) to be added to a `Menu` object:\n\n```\n// Alarm\nMenu alarm\
    \ = new Menu(\"Alarm\");\nToggleGroup tGroup = new ToggleGroup();\nRadioMenuItem\
    \ soundAlarmItem = RadioMenuItemBuilder.create()\n        .toggleGroup(tGroup)\n\
    \        .text(\"Sound Alarm\")\n        .build();\nRadioMenuItem stopAlarmItem\
    \ = RadioMenuItemBuilder.create()\n        .toggleGroup(tGroup)\n        .text(\"\
    Alarm Off\")\n        .selected(true)\n        .build();\n\nalarm.getItems().add(soundAlarmItem);\n\
    alarm.getItems().add(stopAlarmItem);\n```\n\nAt times you may want some menu items\
    \ separated with a visual line separator. To create a visual separator, create\
    \ an instance of a `SeparatorMenuItem` class to be added to a menu via the `getItems()`\
    \ method. The method `getItems()` returns an observable list of `MenuItem` objects\
    \ (`ObservableList<MenuItem>`). As you will see later in recipe 1-11, you will\
    \ learn about the ability to be notified when items in a collection are altered.\
    \ The following code line adds a visual line separator (`SeparatorMenuItem`) to\
    \ the menu:\n\n```\nmenu.getItems().add(new SeparatorMenuItem());\n```\n\nOther\
    \ menu items used are the check menu item (`CheckMenuItem`) and the radio menu\
    \ item (`RadioMenuItem`), which are similar to their counterparts in JavaFX UI\
    \ controls check box (`CheckBox`) and radio button (`RadioButton`), respectively.\n\
    \nPrior to our adding the menu bar to the scene, you will notice the bound property\
    \ between the preferred width of the menu bar and the width of the `Stage` object\
    \ via the `bind()` method. When binding these properties you will see the menu\
    \ bar’s width stretch when the user resizes the screen. Later you will see how\
    \ binding works in recipe 1-10, “Binding Expressions.”\n\nThe following code snippet\
    \ shows the binding between the menu bar’s `width` property and the stage’s `width`\
    \ property.\n\n```\nmenuBar.prefWidthProperty().bind(primaryStage.widthProperty());\n\
    \nroot.getChildren().add(menuBar);\n```\n\n# 1-8. Adding Components to a Layout\n\
    \n## Problem\n\nYou want to create a simple form application by adding UI components\
    \ to a layout similar to a grid-like display.\n\n## Solution\n\nUse JavaFX’s `javafx.scene.layout.GridPane`\
    \ class. This source code implements a simple UI form containing a first and last\
    \ name field controls using the grid pane layout node (`javafx.scene.layout.GridPane`):\n\
    \n```\nGridPane gridpane = new GridPane();\ngridpane.setPadding(new Insets(5));\n\
    gridpane.setHgap(5);\ngridpane.setVgap(5);\n\nLabel fNameLbl = new Label(\"First\
    \ Name\");\nTextField fNameFld = new TextField();\nLabel lNameLbl = new Label(\"\
    First Name\");\nTextField lNameFld = new TextField();\nButton saveButt = new Button(\"\
    Save\");\n\n// First name label\nGridPane.setHalignment(fNameLbl, HPos.RIGHT);\n\
    gridpane.add(fNameLbl, 0, 0);\n\n// Last name label\nGridPane.setHalignment(lNameLbl,\
    \ HPos.RIGHT);\ngridpane.add(lNameLbl, 0, 1);\n\n// First name field\nGridPane.setHalignment(fNameFld,\
    \ HPos.LEFT);       \ngridpane.add(fNameFld, 1, 0);\n\n// Last name field\nGridPane.setHalignment(lNameFld,\
    \ HPos.LEFT);\ngridpane.add(lNameFld, 1, 1);\n\n// Save button\nGridPane.setHalignment(saveButt,\
    \ HPos.RIGHT);\ngridpane.add(saveButt, 1, 2);\n\nroot.getChildren().add(gridpane);\n\
    ```\n\n[Figure 1-15](#Chapter01.html#fig_1_15) depicts a small form containing\
    \ UI controls laid out using a grid pane layout node.\n\n![images](images/0115.jpg)\n\
    \n***Figure 1-15.** Adding controls to a layout*"
