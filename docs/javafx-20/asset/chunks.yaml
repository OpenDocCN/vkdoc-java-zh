    left.


    ![images](images/0412.jpg)


    ***Figure 4-12.** RSS icon*


    Either drag-and-drop the URL, or type it into the text field. The JavaFX RSS reader
    application will the save the URL location to a database. The RSS application
    consists of three frame regions: the RSS feed title column (left), headline news
    (upper right), and web site view (lower right). To display the news headlines,
    click the hyperlinks to the left. To show the entire article in the lower-right
    frame, click the View button below the headline in the upper-right frame. Before
    running the code, the application will require the jar libraries `derby.jar` and
    `derbytools.jar` included into your project classpath. These libraries allow you
    to save RSS URLs to an embedded JDBC database.


    Similar to what you did in recipe 4-3, you retrieve news information from the
    Internet. The RSS retrieved will be using version 2.0\. RSS is an XML standard
    providing really simple syndication, thus the acronym RSS. Now enough with the
    acronyms; let’s jump into the code, shall we?


    In our `start()` method, you will create a 640 by 480 white scene display area.
    Next, you will create a map (`TreeMap`) containing `Hyperlink` objects as values
    and keys representing the URL location (`String`) to the RSS feed. As before when
    displaying HTML content, you will need to create `WebView`s. Here you will create
    two `WebView`s and one `WebEngine`. The two `WebView`s will render HTML for the
    news headline frame region and the viewing of the entire article region (lower
    right). The single `WebEngine` is responsible for retrieving the RSS feed when
    the user clicks the left frame region containing the RSS hyperlinks.


    To support the feature that allows the user to enter an RSS feed, you will need
    to create a text field that is able to save and render the headline news. Following
    is the code snippet to save an RSS URL and to add its address as a new hyperlink
    to the list of feeds:


    `        final VBox leftArea = new VBox(10);`

    `        final TextField urlField = new TextField();`

