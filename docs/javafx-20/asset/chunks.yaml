    ***图 1-13.** 彩色形状*


    #### 工作原理


    图 1-13 展示了从上到下依次显示的椭圆、矩形和带有彩色渐变填充的圆角矩形。绘制椭圆形状时，您将使用一种径向渐变，使其看起来像一个 3D 球体对象。接下来，您将创建一个填充有黄色半透明线性渐变的矩形。在黄色矩形后面绘制了一条粗黑线形状，以演示矩形的半透明颜色。最后，您将实现一个圆角矩形，填充有绿色和黑色相间的反射线性渐变，类似于对角线方向的
    3D 管状效果。


    渐变颜色的神奇之处在于，它们通常能让形状看起来具有三维效果。渐变绘制允许您在两种或多种颜色之间进行插值，从而为形状增加深度感。JavaFX 提供了两种类型的渐变：径向渐变（`RadialGradient`）和线性渐变（`LinearGradient`）。对于我们的椭圆形状，您将使用径向渐变（`RadialGradient`）。


    我根据 JavaFX 2.0 Javadoc 中关于 `RadialGradient` 类的定义（[`http://download.oracle.com/javafx/2.0/api/javafx/scene/paint/RadialGradient.html`](http://download.oracle.com/javafx/2.0/api/javafx/scene/paint/RadialGradient.html)）创建了表
    1-1。


    ![images](img/t0101.jpg)


    ![images](img/t0101a.jpg)


    在我们的示例中，焦点角度设置为零，焦点距离设置为 .1，中心 X 和 Y 设置为 (80,45)，半径设置为 120 像素，比例设置为 false，循环方法设置为无循环（`CycleMethod.NO_CYCLE`），两个颜色停止值分别设置为红色（`Color.RED`）和黑色（`Color.BLACK`）。这些设置为我们的椭圆提供了径向渐变，从中心位置
    (80, 45)（椭圆的左上角）的红色开始，插值到距离 120 像素（半径）处的黑色。


    接下来，您将创建一个具有黄色半透明线性渐变的矩形。对于黄色矩形，您将使用线性渐变（`LinearGradient`）绘制。


    我根据 JavaFX 2.0 Javadoc 中关于 `LinearGradient` 类的定义（[`http://download.oracle.com/javafx/2.0/api/javafx/scene/paint/LinearGradient.html`](http://download.oracle.com/javafx/2.0/api/javafx/scene/paint/LinearGradient.html)）创建了表
    1-2。


    ![images](img/t0102.jpg)


    要创建线性渐变绘制，您需要指定起点和终点的 `startX`、`startY`、`endX` 和 `endY`。起点和终点的坐标表示渐变图案开始和结束的位置。


    要创建第二个形状（黄色矩形），您需要将起始 X 和 Y 设置为 `(50, 50)`，结束 X 和 Y 设置为 (50, 75)，比例设置为 false，循环方法设置为无循环（`CycleMethod.NO_CYCLE`），两个颜色停止值分别设置为黄色（`Color.YELLOW`）和黑色（`Color.BLACK`），Alpha
    透明度为 .784。这些设置为我们的矩形提供了从上到下的线性渐变，起点为 (50, 50)（矩形的左上角），插值到黑色（矩形的左下角）。


    最后，您会注意到一个圆角矩形，其渐变图案沿对角线方向重复使用绿色和黑色。这是一种简单的线性渐变绘制，与线性渐变绘制（`LinearGradient`）相同，只是起始
    X、Y 和结束 X、Y 设置在对角线位置，并且循环方法设置为反射（`CycleMethod.REFLECT`）。当将循环方法指定为反射（`CycleMethod.REFLECT`）时，渐变图案将在颜色之间重复或循环。以下代码片段实现了循环方法为反射（`CycleMethod.REFLECT`）的圆角矩形：


    `LinearGradient cycleGrad = LinearGradientBuilder.create()`

