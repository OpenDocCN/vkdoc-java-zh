    \n```\nnewsBrief.getEngine().loadContent(content);\n// write to disk if not already.\n\
    DBUtils.saveRssFeed(rssFeed);\n```\n\nAs in the previous recipes, you will be\
    \ responding to HTML `WebEvent`s when the new headline View button is pressed,\
    \ which calls a JavaScript’s `alert()` function. Shown following is the code snippet\
    \ to handle a web event (`WebEvent`) containing a string of the URL that links\
    \ to the entire article to be viewed in the frame to the lower right region:\n\
    \n```\nnewsBrief.getEngine().setOnAlert(new EventHandler<WebEvent<String>>(){\n\
    \   public void handle(WebEvent<String> evt) {\n      websiteView.getEngine().load(evt.getData());\n\
    \   }\n});\n```\n\nWhen creating the headlines region (upper right) containing\
    \ HTML buttons to render the article’s web page, you will notice the `alert()`\
    \ function containing the URL to be loaded and rendered in the lower bottom split\
    \ frame region. Shown following is an example of HTML generated for an headline\
    \ news containing a View button that can notify the web engine’s `OnAlert` web\
    \ event (`WebEvent`).\n\n`<input type=\"button\" onclick=\"alert('http://carlfx.wordpress.com/2009/08/03/javafx-forms-framework-part-2/')\"\
    \ value=\"View\" />`\n\nOne last thing to point out is that the RSS application\
    \ has missing features. One feature that comes to my mind is the ability to delete\
    \ individual RSS hyperlinks on the left column region. A workaround is to remove\
    \ all links by deleting the database on the file system. Because Derby is an embedded\
    \ database, you can delete the directory containing the database. The JavaFX RSS\
    \ application will re-create an empty database if one doesn’t exist. Hopefully,\
    \ you can add new features to enhance this fun and useful application.\n\n## Index"
