    \        .stroke(Color.BLACK)\n        .fill(Color.WHITE)\n        .build();\n\
    \nroot.getChildren().add(quad);\n\n// outer donut\nEllipse bigCircle = EllipseBuilder.create()\n\
    \        .centerX(100)\n        .centerY(100)\n        .radiusX(50)\n        .radiusY(75/2)\n\
    \        .translateY(quad.getBoundsInParent().getMaxY())\n        .strokeWidth(3)\n\
    \        .stroke(Color.BLACK)\n        .fill(Color.WHITE)\n        .build();\n\
    \n// donut hole\nEllipse smallCircle = EllipseBuilder.create()\n        .centerX(100)\n\
    \        .centerY(100)\n        .radiusX(35/2)\n        .radiusY(25/2)\n     \
    \   .build();\n\n// make a donut\nShape donut = Path.subtract(bigCircle, smallCircle);\n\
