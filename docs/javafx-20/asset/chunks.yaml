    \ classes in the `javafx.scene.shape.*` package. You may also use builder classes\
    \ associated with each shape in the `javafx.builders.*` package.\n\nThe following\
    \ code draws various complex shapes. The first complex shape involves a cubic\
    \ curve drawn in the shape of a sine wave. The next shape, which I would like\
    \ to call the *ice cream cone*, uses the `Path` class that contains path elements\
    \ (`javafx.scene.shape.PathElement`). The third shape is a Quadratic Bézier curve\
    \ (`QuadCurve`) forming a smile. Our final shape is a delectable donut. We create\
    \ this donut shape by subtracting two ellipses (one smaller and one larger):\n\
