- fmt: "#### How It Works\n\nBefore we get started, let’s discuss the instructions\
    \ on how to operate our MP3 player. A user will be able to drag and drop an audio\
    \ file into the application area to be subsequently played. Located on the lower\
    \ right of the application are buttons to stop, pause, and resume play of audio\
    \ media. (The button controls are shown in [Figure 3-2](#Chapter03.html#fig_3_2).)\
    \ As the music is playing, the user will also notice randomly colored balls bouncing\
    \ around to the music. Once the user is done with listening to music, he/she can\
    \ quit the application by clicking the white rounded close button located in the\
    \ upper-right corner.\n\nIt is similar to recipe 2-1, in which you learned how\
    \ to use the drag-and-drop desktop metaphor to load files into a JavaFX application.\
    \ Instead of image files, however, the user will be using audio files. To load\
    \ audio files JavaFX currently supports the following file formats: `.mp3`, `.wav`,\
    \ and `.aiff`.\n\nFollowing the same look and feel, you will use the same style\
    \ as recipe 12-1. In this recipe, I modified the button controls to resemble buttons,\
    \ similar to many media player applications. When the pause button is pressed,\
    \ it will pause the audio media from playing and toggle to the play button control,\
    \ thus allowing the user to resume. As an added bonus, the MP3 player will appear\
    \ as an irregular shaped, semitransparent window without borders that can also\
    \ be dragged around the desktop using the mouse. Now that you know how to operate\
    \ the music player, let’s walk through the code.\n\nFirst, you will create instance\
    \ variables that will maintain state information for the lifetime of the application.\
    \ [Table 3-1](#Chapter03.html#tab_3_1) describes all instance variables used in\
    \ our music player application. The first variable is a reference to a media player\
    \ (`MediaPlayer`) object that will be created in conjunction with a `Media` object\
    \ containing an audio file. Next, you will create an `anchorPt` variable used\
    \ to save the starting coordinate of a mouse press when the user begins to drag\
    \ the window across the screen. When calculating the upper-left bounds of the\
    \ application window during a mouse-dragged operation, the `previousLocation`\
    \ variable will contain the previous window’s screen X and Y coordinates.\n\n\
    [Table 3-1](#Chapter03.html#tab_3_1) lists the MP3 player application’s instance\
    \ variables:\n\n![images](images/t0301.jpg)\n\nIn previous chapters relating to\
    \ GUIs, you saw that GUI applications normally contain a title bar and windowed\
    \ borders surrounding the `Scene`. Here, I wanted to raise the bar a little by\
    \ showing you how to create irregularly shaped semitransparent windows, thus making\
    \ things look more hip or modern. As you begin to create the media player, you’ll\
    \ notice in the `start()` method that we prepare the `Stage` object by initializing\
    \ the style using `StageStyle.TRANSPARENT`. After we initialize the style to `StageStyle.TRANSPARENT`,\
    \ the window will be undecorated, with the entire window area opaque set to zero\
    \ (invisible). The following code shows how to create a transparent window without\
    \ a title bar or windowed borders:\n\n`primaryStage.initStyle(StageStyle.TRANSPARENT);`\n\
    \nWith the invisible stage you will create a rounded rectangular region that will\
    \ be the applications surface, or main content area. Next, you will notice the\
    \ width and height of the rectangle bound to the scene object in case the window\
    \ is resized. Because the window isn’t going to be resized, the bind isn’t necessary\
    \ (it will be needed, however in recipe 3-2, when you get a chance to enlarge\
    \ your video screen to take on a full screen mode).\n\nAfter creating a black,\
    \ semitransparent, rounded, rectangular area (`applicationArea`), you’ll be creating\
    \ a simple `Group` object to hold all the randomly colored `Circle` nodes that\
    \ will show off graphical visualizations while the audio is being played. Later,\
    \ you will see how the `phaseNodes` (`Group`) variable is updated based on sound\
    \ information using an `AudioSpectrumListener`.\n\nNext, you will be adding `EventHandler<MouseEvent>`\
    \ instances to the `Scene` object to monitor mouse events as the user drags the\
    \ window around the screen. The first event in this scenario is a mouse press,\
    \ which will save the cursor’s current (X, Y) coordinates to the variable `anchorPt`.\
    \ The following code is adding an `EventHandler` to the mouse pressed property\
    \ of the `Scene`:\n\n```\n// starting initial anchor point\nscene.setOnMousePressed(new\
    \ EventHandler<MouseEvent>() {\n    public void handle(MouseEvent event){\n  \
    \      anchorPt = new Point2D(event.getScreenX(), event.getScreenY());\n    }\n\
    });\n```\n\nAfter implementing the mouse press event handler, you can create an\
    \ `EventHandler` to the `Scene`’s mouse-dragged property. The mouse–dragged event\
    \ handler will update and position the application window (`Stage`) dynamically,\
    \ based on the previous window’s location (upper-left corner) along with the `anchorPt`\
    \ variable. Shown here is an event handler responsible for the mouse-dragged event\
    \ on the `Scene` object:\n\n```\n// dragging the entire stage\nscene.setOnMouseDragged(new\
    \ EventHandler<MouseEvent>() {\n    public void handle(MouseEvent event){\n  \
    \      if (anchorPt != null && previousLocation != null) {\n            primaryStage.setX(previousLocation.getX()\
    \ + event.getScreenX() - anchorPt.getX());\n            primaryStage.setY(previousLocation.getY()\
    \ + event.getScreenY() - anchorPt.getY());                    \n        }\n  \
    \  }\n});\n```\n\nYou will want to handle the mouse-released event. Once the mouse\
    \ is released, the event handler will update the `previousLocation` variable for\
    \ subsequent mouse-dragged events to move the application window about the screen.\
    \ The following code snippet updates the `previousLocation` variable:\n\n```\n\
    // set the current location\nscene.setOnMouseReleased(new EventHandler<MouseEvent>()\
    \ {\n    public void handle(MouseEvent event){\n        previousLocation = new\
    \ Point2D(primaryStage.getX(), primaryStage.getY());\n    }\n});\n```\n\nNext,\
    \ you will be implementing the drag-and-drop scenario to load the audio file from\
    \ the file system (File manager). When handling a drag-and-drop scenario, it is\
    \ similar to recipe 2-1, in which you created an `EventHandler` to handle `DragEvent`s.\
    \ Instead of loading image files we will be loading audio files from the host\
    \ file system. For brevity, I will simply mention the code lines of the drag-and-dropped\
    \ event handler. Once the audio file is available, you will create a `Media` object\
    \ by passing in the file as a `URI`. The following code snippet is how to create\
    \ a `Media` object:\n\n```\nMedia media = new Media(new File(filePath).toURI().toString());\n\
    ```\n\nOnce you have created a `Media` object you will have to create an instance\
    \ of a `MediaPlayer` in order to play the sound file. Both the `Media` and `MediaPlayer`\
    \ objects are immutable, which is why new instances of each will be created every\
    \ time the user drags a file into the application. Next, you will check the instance\
    \ variable `mediaPlayer` for a previous instance to make sure it is stopped before\
    \ creating a new `MediaPlayer` instance. The following code checks for a prior\
    \ media player to be stopped:\n\n```\nif (mediaPlayer != null) {\n    mediaPlayer.stop();\n\
    }\n```\n\nSo, here is where we create a `MediaPlayer` instance. For ease of coding\
    \ you will be turning to the `MediaPlayer`’s builder class `MediaPlayerBuilder`.\
    \ A `MediaPlayer` object is responsible for controlling the playing of media objects.\
    \ Notice that a `MediaPlayer` will treat sound or video media the same in terms\
    \ of playing, pausing, and stopping media. When creating a media player using\
    \ the `MediaPlayerBuilder` class, you will be specifying the `media` and `audioSpectrumListener`\
    \ attribute methods. Setting the `autoPlay` attribute to true will play the audio\
    \ media immediately after it has been loaded. The last thing to specify on the\
    \ `MediaPlayer` instance is an `AudioSpectrumListener`. So, what exactly is this\
    \ type of listener, you say? Well, according to the Javadocs, it states that it\
    \ is an observer receiving periodic updates of the audio spectrum. In layman’s\
    \ terms, it is the audio media’s sound data such as volume and tempo, and so on.\
    \ To create an instance of an `AudioSpectrumListener` you will create an inner\
    \ class overriding the method `spectrumDataUpdate()`. [Table 3-2](#Chapter03.html#tab_3_2)\
    \ lists all inbound parameters for the audio spectrum listener’s method. For more\
    \ details refer to the Javadocs at [`http://download.oracle.com/javafx/2.0/api/javafx/scene/media/AudioSpectrumListener.html`](http://download.oracle.com/javafx/2.0/api/javafx/scene/media/AudioSpectrumListener.html).\n\
    \n![images](images/t0302.jpg)\n\nHere, you will be creating randomly colored circle\
    \ nodes to be positioned and placed on the scene based on the variable phases\
    \ (array of floats). To draw each colored circle, you will be incrementing the\
    \ circle’s center X by 5 pixels and adding the circle’s center Y with each phase\
    \ value multiplied by 100. Shown here is the code snippet that plots each randomly\
    \ colored circle:\n\n```\ncircle.setCenterX(x + i);\ncircle.setCenterY(y + (phase\
    \ * 100));\n... // setting the circle\ni+=5;\n```\n\nHere is an inner class implementation\
    \ of an `AudioSpectrumListener`:\n\n```\nnew AudioSpectrumListener() {\n    @Override\n\
    \    public void spectrumDataUpdate(double timestamp, double duration, float[]\
    \ magnitudes, float[] phases) {\n        phaseNodes.getChildren().clear();\n \
    \       int i = 0;\n        int x = 10;\n        int y = 150;\n        final Random\
    \ rand = new Random(System.currentTimeMillis());\n        for(float phase:phases)\
    \ {\n            int red = rand.nextInt(255);\n            int green = rand.nextInt(255);\n\
    \            int blue = rand.nextInt(255);\n\n            Circle circle = new\
    \ Circle(10);\n            circle.setCenterX(x + i);\n            circle.setCenterY(y\
    \ + (phase * 100));\n            circle.setFill(Color.rgb(red, green, blue, .70));\n\
    \            phaseNodes.getChildren().add(circle);\n            i+=5;\n      \
    \  }\n    }\n};\n```\n\nOnce the media player is created, you will create a `java.lang.Runnable`\
    \ to be set into the `onReady` attribute to be invoked when the media is in a\
    \ ready state. Once the ready event is realized the `run()` method will call the\
    \ media player object’s `play()` method to begin the audio. With the dragged-drop\
    \ sequence completed, we appropriately notify the drag-and-drop system by invoking\
    \ the event’s `setDropCompleted()` method with a value of true. The following\
    \ code snippet implements a `Runnable` to begin the media player as soon as the\
    \ media player is in a ready state:\n\n```\nmediaPlayer.setOnReady(new Runnable()\
    \ {\n    @Override\n    public void run() {\n        mediaPlayer.play();\n   \
    \ }\n});\n```\n\nFinally you will be creating buttons with JavaFX shapes to represent\
    \ the stop, play, pause, and close buttons. When creating shapes or custom nodes,\
    \ you can add event handlers to nodes in order to respond to mouse clicks. Although\
    \ there are advanced ways to build custom controls in JavaFX, I chose to build\
    \ my own button icons from simple rectangles, arcs, circles and lines. To see\
    \ more-advanced ways to create custom controls, refer to the Javadocs on the `Skinnable`\
    \ API or recipe 2-5. To attach event handlers for a mouse press, simply call the\
    \ `setOnMousePress()` method by passing in an `EventHandler<MouseEvent>` instance.\
    \ The following code demonstrates adding an `EventHandler` to respond to mouse\
    \ press on the `stopButton` node:\n\n```\nstopButton.setOnMousePressed(new EventHandler<MouseEvent>()\
    \ {\n    public void handle(MouseEvent me) {\n        if (mediaPlayer!= null)\
    \ {\n            mediaPlayer.stop();                  \n        }\n    }\n});\n\
    ```\n\nBecause all the buttons use the same preceding code snippet, I will only\
    \ list the method calls that each button will perform on the media player. The\
    \ last button, Close, isn’t related to the media player, but it is how to exit\
    \ the MP3 player application. The following actions are responsible for stopping,\
    \ pausing, playing, and exiting the MP3 player application:\n\n```\nStop - mediaPlayer.stop();\
    \  \nPause - mediaPlayer.pause();\nPlay - mediaPlayer.play();\nClose - Platform.exit();\n\
    ```"
  raw: '#### How It Works


    Before we get started, let’s discuss the instructions on how to operate our MP3
    player. A user will be able to drag and drop an audio file into the application
    area to be subsequently played. Located on the lower right of the application
    are buttons to stop, pause, and resume play of audio media. (The button controls
    are shown in [Figure 3-2](#Chapter03.html#fig_3_2).) As the music is playing,
    the user will also notice randomly colored balls bouncing around to the music.
    Once the user is done with listening to music, he/she can quit the application
    by clicking the white rounded close button located in the upper-right corner.


    It is similar to recipe 2-1, in which you learned how to use the drag-and-drop
    desktop metaphor to load files into a JavaFX application. Instead of image files,
    however, the user will be using audio files. To load audio files JavaFX currently
    supports the following file formats: `.mp3`, `.wav`, and `.aiff`.


    Following the same look and feel, you will use the same style as recipe 12-1\.
    In this recipe, I modified the button controls to resemble buttons, similar to
    many media player applications. When the pause button is pressed, it will pause
    the audio media from playing and toggle to the play button control, thus allowing
    the user to resume. As an added bonus, the MP3 player will appear as an irregular
    shaped, semitransparent window without borders that can also be dragged around
    the desktop using the mouse. Now that you know how to operate the music player,
    let’s walk through the code.


    First, you will create instance variables that will maintain state information
    for the lifetime of the application. [Table 3-1](#Chapter03.html#tab_3_1) describes
    all instance variables used in our music player application. The first variable
    is a reference to a media player (`MediaPlayer`) object that will be created in
    conjunction with a `Media` object containing an audio file. Next, you will create
    an `anchorPt` variable used to save the starting coordinate of a mouse press when
    the user begins to drag the window across the screen. When calculating the upper-left
    bounds of the application window during a mouse-dragged operation, the `previousLocation`
    variable will contain the previous window’s screen X and Y coordinates.


    [Table 3-1](#Chapter03.html#tab_3_1) lists the MP3 player application’s instance
    variables:


    ![images](images/t0301.jpg)


    In previous chapters relating to GUIs, you saw that GUI applications normally
    contain a title bar and windowed borders surrounding the `Scene`. Here, I wanted
    to raise the bar a little by showing you how to create irregularly shaped semitransparent
    windows, thus making things look more hip or modern. As you begin to create the
    media player, you’ll notice in the `start()` method that we prepare the `Stage`
    object by initializing the style using `StageStyle.TRANSPARENT`. After we initialize
    the style to `StageStyle.TRANSPARENT`, the window will be undecorated, with the
    entire window area opaque set to zero (invisible). The following code shows how
    to create a transparent window without a title bar or windowed borders:


    `primaryStage.initStyle(StageStyle.TRANSPARENT);`


    With the invisible stage you will create a rounded rectangular region that will
    be the applications surface, or main content area. Next, you will notice the width
    and height of the rectangle bound to the scene object in case the window is resized.
    Because the window isn’t going to be resized, the bind isn’t necessary (it will
    be needed, however in recipe 3-2, when you get a chance to enlarge your video
    screen to take on a full screen mode).


    After creating a black, semitransparent, rounded, rectangular area (`applicationArea`),
    you’ll be creating a simple `Group` object to hold all the randomly colored `Circle`
    nodes that will show off graphical visualizations while the audio is being played.
    Later, you will see how the `phaseNodes` (`Group`) variable is updated based on
    sound information using an `AudioSpectrumListener`.


    Next, you will be adding `EventHandler<MouseEvent>` instances to the `Scene` object
    to monitor mouse events as the user drags the window around the screen. The first
    event in this scenario is a mouse press, which will save the cursor’s current
    (X, Y) coordinates to the variable `anchorPt`. The following code is adding an
    `EventHandler` to the mouse pressed property of the `Scene`:


    `        // starting initial anchor point`

    `        scene.setOnMousePressed(new EventHandler<MouseEvent>() {`

    `            public void handle(MouseEvent event){`

    `                anchorPt = new Point2D(event.getScreenX(), event.getScreenY());`

    `            }`

    `        });`


    After implementing the mouse press event handler, you can create an `EventHandler`
    to the `Scene`’s mouse-dragged property. The mouse–dragged event handler will
    update and position the application window (`Stage`) dynamically, based on the
    previous window’s location (upper-left corner) along with the `anchorPt` variable.
    Shown here is an event handler responsible for the mouse-dragged event on the
    `Scene` object:


    `        // dragging the entire stage`

    `        scene.setOnMouseDragged(new EventHandler<MouseEvent>() {`

    `            public void handle(MouseEvent event){`

    `                if (anchorPt != null && previousLocation != null) {`

    `                    primaryStage.setX(previousLocation.getX() + event.getScreenX()
    - anchorPt.getX());`

    `                    primaryStage.setY(previousLocation.getY() + event.getScreenY()
    - anchorPt.getY());                    `

    `                }`

    `            }`

    `        });`


    You will want to handle the mouse-released event. Once the mouse is released,
    the event handler will update the `previousLocation` variable for subsequent mouse-dragged
    events to move the application window about the screen. The following code snippet
    updates the `previousLocation` variable:


    `        // set the current location`

    `        scene.setOnMouseReleased(new EventHandler<MouseEvent>() {`

    `            public void handle(MouseEvent event){`

    `                previousLocation = new Point2D(primaryStage.getX(), primaryStage.getY());`

    `            }`

    `        });`


    Next, you will be implementing the drag-and-drop scenario to load the audio file
    from the file system (File manager). When handling a drag-and-drop scenario, it
    is similar to recipe 2-1, in which you created an `EventHandler` to handle `DragEvent`s.
    Instead of loading image files we will be loading audio files from the host file
    system. For brevity, I will simply mention the code lines of the drag-and-dropped
    event handler. Once the audio file is available, you will create a `Media` object
    by passing in the file as a `URI`. The following code snippet is how to create
    a `Media` object:


    `Media media = new Media(new File(filePath).toURI().toString());`


    Once you have created a `Media` object you will have to create an instance of
    a `MediaPlayer` in order to play the sound file. Both the `Media` and `MediaPlayer`
    objects are immutable, which is why new instances of each will be created every
    time the user drags a file into the application. Next, you will check the instance
    variable `mediaPlayer` for a previous instance to make sure it is stopped before
    creating a new `MediaPlayer` instance. The following code checks for a prior media
    player to be stopped:


    `  if (mediaPlayer != null) {`

    `    mediaPlayer.stop();`

    `  }`


    So, here is where we create a `MediaPlayer` instance. For ease of coding you will
    be turning to the `MediaPlayer`’s builder class `MediaPlayerBuilder`. A `MediaPlayer`
    object is responsible for controlling the playing of media objects. Notice that
    a `MediaPlayer` will treat sound or video media the same in terms of playing,
    pausing, and stopping media. When creating a media player using the `MediaPlayerBuilder`
    class, you will be specifying the `media` and `audioSpectrumListener` attribute
    methods. Setting the autoPlay attribute to true will play the audio media immediately
    after it has been loaded. The last thing to specify on the `MediaPlayer` instance
    is an `AudioSpectrumListener`. So, what exactly is this type of listener, you
    say? Well, according to the Javadocs, it states that it is an observer receiving
    periodic updates of the audio spectrum. In layman’s terms, it is the audio media’s
    sound data such as volume and tempo, and so on. To create an instance of an `AudioSpectrumListener`
    you will create an inner class overriding the method `spectrumDataUpdate()`. [Table
    3-2](#Chapter03.html#tab_3_2) lists all inbound parameters for the audio spectrum
    listener’s method. For more details refer to the Javadocs at [`http://download.oracle.com/javafx/2.0/api/javafx/scene/media/AudioSpectrumListener.html`](http://download.oracle.com/javafx/2.0/api/javafx/scene/media/AudioSpectrumListener.html).


    ![images](images/t0302.jpg)


    Here, you will be creating randomly colored circle nodes to be positioned and
    placed on the scene based on the variable phases (array of floats). To draw each
    colored circle, you will be incrementing the circle’s center X by 5 pixels and
    adding the circle’s center Y with each phase value multiplied by 100\. Shown here
    is the code snippet that plots each randomly colored circle:


    `circle.setCenterX(x + i);`

    `        circle.setCenterY(y + (phase * 100));`

    `        ... // setting the circle`

    `i+=5;`


    Here is an inner class implementation of an `AudioSpectrumListener`:


    `new AudioSpectrumListener() {`

    `            @Override`

    `            public void spectrumDataUpdate(double timestamp, double duration,
    float[]`

    `magnitudes, float[] phases) {`


    `               phaseNodes.getChildren().clear();`

    `               int i = 0;`

    `               int x = 10;`

    `               int y = 150;`

    `               final Random rand = new Random(System.currentTimeMillis());`

    `               for(float phase:phases) {`

    `                 int red = rand.nextInt(255);`

    `                 int green = rand.nextInt(255);`

    `                 int blue = rand.nextInt(255);`


    `                 Circle circle = new Circle(10);`

    `                 circle.setCenterX(x + i);`

    `                 circle.setCenterY(y + (phase * 100));`

    `                 circle.setFill(Color.rgb(red, green, blue, .70));`

    `                 phaseNodes.getChildren().add(circle);`

    `                 i+=5;`

    `              }`


    `           }`

    `         };`


    Once the media player is created, you will create a `java.lang.Runnable` to be
    set into the `onReady` attribute to be invoked when the media is in a ready state.
    Once the ready event is realized the `run()` method will call the media player
    object’s `play()` method to begin the audio. With the dragged-drop sequence completed,
    we appropriately notify the drag-and-drop system by invoking the event’s `setDropCompleted()`
    method with a value of true. The following code snippet implements a `Runnable`
    to begin the media player as soon as the media player is in a ready state:


    `   mediaPlayer.setOnReady(new Runnable() {`

    `      @Override`

    `      public void run() {`

    `         mediaPlayer.play();`

    `      }`

    `   });`


    Finally you will be creating buttons with JavaFX shapes to represent the stop,
    play, pause, and close buttons. When creating shapes or custom nodes, you can
    add event handlers to nodes in order to respond to mouse clicks. Although there
    are advanced ways to build custom controls in JavaFX, I chose to build my own
    button icons from simple rectangles, arcs, circles and lines. To see more-advanced
    ways to create custom controls, refer to the Javadocs on the `Skinnable` API or
    recipe 2-5\. To attach event handlers for a mouse press, simply call the `setOnMousePress()`
    method by passing in an `EventHandler<MouseEvent>` instance. The following code
    demonstrates adding an `EventHandler` to respond to mouse press on the `stopButton`
    node:


    `        stopButton.setOnMousePressed(new EventHandler<MouseEvent>() {`

    `            public void handle(MouseEvent me) {`

    `               if (mediaPlayer!= null) {`

    `                 mediaPlayer.stop();                   `

    `               }`

    `            }`

    `        });`


    Because all the buttons use the same preceding code snippet, I will only list
    the method calls that each button will perform on the media player. The last button,
    Close, isn’t related to the media player, but it is how to exit the MP3 player
    application. The following actions are responsible for stopping, pausing, playing,
    and exiting the MP3 player application:


    `Stop - mediaPlayer.stop();  `

    `Pause - mediaPlayer.pause();`

    `Play - mediaPlayer.play();`

    `Close - Platform.exit();`'
  trans: '

    #### 工作原理


    在开始之前，我们先讨论一下如何操作我们的 MP3 播放器。用户可以将音频文件拖放到应用程序区域中，以便随后播放。应用程序右下角有用于停止、暂停和恢复音频媒体播放的按钮。（按钮控件如图
    3-2 所示。）在音乐播放过程中，用户还会注意到随机颜色的球体随着音乐跳动。当用户听完音乐后，可以点击右上角的白色圆角关闭按钮退出应用程序。


    这与技巧 2-1 类似，您在其中学习了如何使用拖放桌面隐喻将文件加载到 JavaFX 应用程序中。不过，这里用户使用的是音频文件，而不是图像文件。要加载音频文件，JavaFX
    目前支持以下文件格式：`.mp3`、`.wav` 和 `.aiff`。


    遵循相同的视觉风格，您将使用与技巧 12-1 相同的样式。在本技巧中，我修改了按钮控件，使其看起来像按钮，类似于许多媒体播放器应用程序。当按下暂停按钮时，它将暂停音频媒体的播放，并切换到播放按钮控件，从而允许用户恢复播放。作为额外奖励，MP3
    播放器将显示为一个不规则形状、半透明且无边框的窗口，并且可以使用鼠标在桌面上拖动。现在您已经知道如何操作音乐播放器，让我们来浏览一下代码。


    首先，您将创建实例变量，这些变量将在应用程序的整个生命周期中维护状态信息。表 3-1 描述了我们的音乐播放器应用程序中使用的所有实例变量。第一个变量是对媒体播放器（`MediaPlayer`）对象的引用，该对象将与包含音频文件的
    `Media` 对象一起创建。接下来，您将创建一个 `anchorPt` 变量，用于在用户开始拖动窗口时保存鼠标按下时的起始坐标。在鼠标拖动操作期间计算应用程序窗口的左上角边界时，`previousLocation`
    变量将包含上一个窗口的屏幕 X 和 Y 坐标。


    表 3-1 列出了 MP3 播放器应用程序的实例变量：


    ![images](img/t0301.jpg)


    在之前关于 GUI 的章节中，您看到 GUI 应用程序通常包含一个标题栏和围绕 `Scene` 的窗口边框。在这里，我想通过向您展示如何创建不规则形状的半透明窗口来提高一点标准，从而使事情看起来更时髦或更现代。当您开始创建媒体播放器时，您会注意到在
    `start()` 方法中，我们通过使用 `StageStyle.TRANSPARENT` 初始化样式来准备 `Stage` 对象。将样式初始化为 `StageStyle.TRANSPARENT`
    后，窗口将无装饰，整个窗口区域的不透明度设置为零（不可见）。以下代码展示了如何创建一个没有标题栏或窗口边框的透明窗口：


    `primaryStage.initStyle(StageStyle.TRANSPARENT);`


    有了这个不可见的舞台，您将创建一个圆角矩形区域，作为应用程序的表面或主要内容区域。接下来，您会注意到矩形的宽度和高度绑定到了场景对象，以防窗口大小被调整。由于窗口不会被调整大小，因此绑定不是必需的（但在技巧
    3-2 中，当您有机会将视频屏幕放大到全屏模式时，将需要它）。


    在创建了一个黑色、半透明、圆角的矩形区域（`applicationArea`）之后，您将创建一个简单的 `Group` 对象，用于容纳所有随机颜色的 `Circle`
    节点，这些节点将在音频播放时展示图形可视化效果。稍后，您将看到如何使用 `AudioSpectrumListener` 根据声音信息更新 `phaseNodes`（`Group`）变量。


    接下来，您将向 `Scene` 对象添加 `EventHandler<MouseEvent>` 实例，以监控用户在屏幕上拖动窗口时的鼠标事件。此场景中的第一个事件是鼠标按下，它将光标的当前
    (X, Y) 坐标保存到变量 `anchorPt` 中。以下代码向 `Scene` 的鼠标按下属性添加了一个 `EventHandler`：


    `        // 起始锚点`

    `        scene.setOnMousePressed(new EventHandler<MouseEvent>() {`

    `            public void handle(MouseEvent event){`

    `                anchorPt = new Point2D(event.getScreenX(), event.getScreenY());`

    `            }`

    `        });`


    实现鼠标按下事件处理器后，您可以创建一个 `EventHandler` 来处理 `Scene` 的鼠标拖动属性。鼠标拖动事件处理器将根据上一个窗口的位置（左上角）以及
    `anchorPt` 变量，动态更新和定位应用程序窗口（`Stage`）。此处显示的是负责 `Scene` 对象上鼠标拖动事件的事件处理器：


    `        // 拖动整个舞台`

    `        scene.setOnMouseDragged(new EventHandler<MouseEvent>() {`

    `            public void handle(MouseEvent event){`

    `                if (anchorPt != null && previousLocation != null) {`

    `                    primaryStage.setX(previousLocation.getX() + event.getScreenX()
    - anchorPt.getX());`

    `                    primaryStage.setY(previousLocation.getY() + event.getScreenY()
    - anchorPt.getY());                    `

    `                }`

    `            }`

    `        });`


    您还需要处理鼠标释放事件。一旦鼠标被释放，事件处理器将更新 `previousLocation` 变量，以便后续的鼠标拖动事件能够在屏幕上移动应用程序窗口。以下代码片段更新了
    `previousLocation` 变量：


    `        // 设置当前位置`

    `        scene.setOnMouseReleased(new EventHandler<MouseEvent>() {`

    `            public void handle(MouseEvent event){`

    `                previousLocation = new Point2D(primaryStage.getX(), primaryStage.getY());`

    `            }`

    `        });`


    接下来，您将实现拖放场景，以从文件系统（文件管理器）加载音频文件。处理拖放场景时，它与技巧 2-1 类似，您在其中创建了一个 `EventHandler`
    来处理 `DragEvent`。这里我们将从主机文件系统加载音频文件，而不是图像文件。为简洁起见，我将仅提及拖放事件处理器的代码行。一旦音频文件可用，您将通过将文件作为
    `URI` 传入来创建一个 `Media` 对象。以下代码片段展示了如何创建一个 `Media` 对象：


    `Media media = new Media(new File(filePath).toURI().toString());`


    创建 `Media` 对象后，您需要创建一个 `MediaPlayer` 实例来播放声音文件。`Media` 和 `MediaPlayer` 对象都是不可变的，这就是为什么每次用户将文件拖入应用程序时都会创建它们的新实例。接下来，您将检查实例变量
    `mediaPlayer` 中是否有先前的实例，以确保在创建新的 `MediaPlayer` 实例之前它已停止。以下代码检查是否有先前的媒体播放器需要停止：


    `  if (mediaPlayer != null) {`

    `    mediaPlayer.stop();`

    `  }`


    那么，这就是我们创建 `MediaPlayer` 实例的地方。为了简化编码，您将使用 `MediaPlayer` 的构建器类 `MediaPlayerBuilder`。`MediaPlayer`
    对象负责控制媒体对象的播放。请注意，`MediaPlayer` 在播放、暂停和停止媒体方面对声音或视频媒体的处理方式相同。使用 `MediaPlayerBuilder`
    类创建媒体播放器时，您需要指定 `media` 和 `audioSpectrumListener` 属性方法。将 autoPlay 属性设置为 true 将在加载音频媒体后立即播放它。需要在
    `MediaPlayer` 实例上指定的最后一件事是 `AudioSpectrumListener`。那么，这种监听器到底是什么呢？根据 Javadocs，它说它是一个接收音频频谱周期性更新的观察者。用通俗的话说，它就是音频媒体的声音数据，例如音量和节奏等。要创建
    `AudioSpectrumListener` 的实例，您将创建一个内部类，重写 `spectrumDataUpdate()` 方法。表 3-2 列出了音频频谱监听器方法的所有入参。有关更多详细信息，请参阅
    [`http://download.oracle.com/javafx/2.0/api/javafx/scene/media/AudioSpectrumListener.html`](http://download.oracle.com/javafx/2.0/api/javafx/scene/media/AudioSpectrumListener.html)
    上的 Javadocs。


    ![images](img/t0302.jpg)


    在这里，您将创建随机颜色的圆形节点，根据变量 phases（浮点数数组）将它们定位并放置在场景上。要绘制每个彩色圆形，您将圆形的中心 X 坐标递增 5 像素，并将圆形的中心
    Y 坐标加上每个相位值乘以 100。此处显示的是绘制每个随机颜色圆形的代码片段：


    `circle.setCenterX(x + i);`

    `        circle.setCenterY(y + (phase * 100));`

    `        ... // 设置圆形`

    `i+=5;`


    以下是 `AudioSpectrumListener` 的内部类实现：


    `new AudioSpectrumListener() {`

    `            @Override`

    `            public void spectrumDataUpdate(double timestamp, double duration,
    float[]`

    `magnitudes, float[] phases) {`


    `               phaseNodes.getChildren().clear();`

    `               int i = 0;`

    `               int x = 10;`

    `               int y = 150;`

    `               final Random rand = new Random(System.currentTimeMillis());`

    `               for(float phase:phases) {`

    `                 int red = rand.nextInt(255);`

    `                 int green = rand.nextInt(255);`

    `                 int blue = rand.nextInt(255);`


    `                 Circle circle = new Circle(10);`

    `                 circle.setCenterX(x + i);`

    `                 circle.setCenterY(y + (phase * 100));`

    `                 circle.setFill(Color.rgb(red, green, blue, .70));`

    `                 phaseNodes.getChildren().add(circle);`

    `                 i+=5;`

    `              }`


    `           }`

    `         };`


    创建媒体播放器后，您将创建一个 `java.lang.Runnable`，将其设置到 `onReady` 属性中，以便在媒体处于就绪状态时调用。一旦就绪事件被触发，`run()`
    方法将调用媒体播放器对象的 `play()` 方法来开始播放音频。完成拖放序列后，我们通过调用事件的 `setDropCompleted()` 方法并传入值
    true 来适当地通知拖放系统。以下代码片段实现了一个 `Runnable`，以便在媒体播放器进入就绪状态后立即启动它：


    `   mediaPlayer.setOnReady(new Runnable() {`

    `      @Override`

    `      public void run() {`

    `         mediaPlayer.play();`

    `      }`

    `   });`


    最后，您将使用 JavaFX 形状创建按钮，以表示停止、播放、暂停和关闭按钮。创建形状或自定义节点时，您可以向节点添加事件处理器以响应鼠标点击。尽管在 JavaFX
    中有构建自定义控件的高级方法，但我选择使用简单的矩形、弧线、圆形和线条来构建我自己的按钮图标。要了解创建自定义控件的更高级方法，请参阅 `Skinnable`
    API 或技巧 2-5 的 Javadocs。要附加鼠标按下的事件处理器，只需调用 `setOnMousePress()` 方法，并传入一个 `EventHandler<MouseEvent>`
    实例。以下代码演示了向 `stopButton` 节点添加一个 `EventHandler` 以响应鼠标按下：


    `        stopButton.setOnMousePressed(new EventHandler<MouseEvent>() {`

    `            public void handle(MouseEvent me) {`

    `               if (mediaPlayer!= null) {`

    `                 mediaPlayer.stop();                   `

    `               }`

    `            }`

    `        });`


    由于所有按钮都使用相同的前述代码片段，我将仅列出每个按钮将在媒体播放器上执行的方法调用。最后一个按钮“关闭”与媒体播放器无关，但它是退出 MP3 播放器应用程序的方式。以下操作负责停止、暂停、播放和退出
    MP3 播放器应用程序：


    `停止 - mediaPlayer.stop();  `

    `暂停 - mediaPlayer.pause();`

    `播放 - mediaPlayer.play();`

    `关闭 - Platform.exit();`

