    #### 工作原理


    表单设计器应用程序将允许用户通过左侧的 `GridPane` 属性控制面板动态调整属性。当从左侧控制面板调整属性时，右侧的目标表单将随之动态变化。在创建简单的表单设计器应用程序时，您需要将控件绑定到目标表单（`GridPane`）的各种属性上。该设计器应用程序主要分为三个类：`ManipulatingLayoutViaGrids`、`MyForm`
    和 `GridPaneControlPanel`。首先，`ManipulatingLayoutViaGrids` 类是要启动的主应用程序。其次，`MyForm`
    是待操作的目标表单。最后，`GridPaneControlPanel` 是网格属性控制面板，其 UI 控件绑定到目标表单的网格窗格属性。


    首先，创建应用程序的主启动点（`ManipulatingLayoutViaGrids`）。该类负责创建一个分割窗格（`SplitPane`），将目标表单设置在右侧，并实例化一个
    `GridPaneControlPanel` 显示在左侧。要实例化 `GridPaneControlPanel`，您必须将要操作的目标表单传入构造函数。我将在后面进一步讨论这一点，但简而言之，`GridPaneControlPanel`
    的构造函数会将其控件连接到目标表单的属性上。


    接下来，您将创建一个我称之为 `MyForm` 的虚拟表单。该表单将是属性控制面板要操作的目标表单。在这里，您会注意到 `MyForm` 继承了 `GridPane`。在
    `MyForm` 的构造函数中，您将创建并添加要放入表单（`GridPane`）的控件。要了解更多关于 `GridPane` 的信息，请参考配方 1-8。以下代码是供表单设计器应用程序操作的目标表单：


    `/**`

    ` * MyForm 是一个供用户操作的表单。`

    ` * @author cdea`

    ` */`

    `public class MyForm extends GridPane{`

    `    public MyForm() {`


    `        setPadding(new Insets(5));`

    `        setHgap(5);`

    `        setVgap(5);`


    `        Label fNameLbl = new Label("名字");`

    `        TextField fNameFld = new TextField();`

    `        Label lNameLbl = new Label("姓氏");`

    `        TextField lNameFld = new TextField();`

    `        Label ageLbl = new Label("年龄");`

    `        TextField ageFld = new TextField();`


    `        Button saveButt = new Button("保存");`


    `        // 名字标签`

    `        GridPane.setHalignment(fNameLbl, HPos.RIGHT);`

    `        add(fNameLbl, 0, 0);`

    `//… 表单代码的其余部分`


    要操作目标表单，您需要创建一个网格属性控制面板（`GridPaneControlPanel`）。该类负责将目标表单的网格窗格属性绑定到 UI 控件上，从而允许用户通过键盘和鼠标调整数值。正如您之前在配方
    1-10 中学到的，您可以使用 JavaFX 属性绑定值。但除了直接绑定值之外，您还可以在属性发生变化时收到通知。


    您可以应用于属性的另一个功能是添加更改监听器。JavaFX 的 `javafx.beans.value.ChangeListener` 类似于 Java Swing
    的属性更改支持（`java.beans.PropertyChangeListener`）。类似地，当 bean 的属性值发生变化时，您会希望收到该更改的通知。更改监听器旨在通过向开发人员提供旧值和新值来拦截更改。您将首先为切换按钮创建一个
    `JavaFX` 更改监听器，用于打开或关闭网格线。当用户与切换按钮交互时，更改监听器将简单地更新目标网格窗格的 `gridlinesVisible` 属性。由于切换按钮（`ToggleButton`）的
    `selected` 属性是 `Boolean` 值，您将实例化一个形式类型参数为 `Boolean` 的 `ChangeListener` 类。您还会注意到重写的方法
    `changed()`，其入参参数将与实例化 `ChangeListener<Boolean>` 时指定的泛型形式类型参数匹配。当属性更改事件发生时，更改监听器将使用新值在目标网格窗格上调用
    `setGridLinesVisible()`，并更新切换按钮的文本。以下代码片段展示了添加到 `ToggleButton` 的 `ChangeListener<Boolean>`：


    `gridLinesToggle.selectedProperty().addListener(`

    `new ChangeListener<Boolean>(){`

    `        public void changed(ObservableValue<? extends Boolean> ov, Boolean oldValue,
    Boolean`

    `newVal) {`

    `targetGridPane.setGridLinesVisible(newVal);`

    `gridLinesToggle.setText(newVal ? "开" : "关");`

    `        }`

    `});`


    接下来，您将为滑块控件应用一个更改监听器，该控件允许用户调整目标网格窗格的顶部内边距。要为滑块创建更改监听器，您将实例化一个 `ChangeListener<Number>`。同样，您将重写
    `changed()` 方法，其签名与其形式类型参数 `Number` 相同。当发生更改时，滑块的值将用于创建一个 `Insets` 对象，该对象成为目标网格窗格的新内边距。以下是顶部内边距和滑块控件的更改监听器：


    `gridPaddingSlider.valueProperty().addListener(new ChangeListener<Number>() {`

    `    public void changed(ObservableValue<? extends Number> ov, Number oldVal,
    Number`

    `newVal) {        `

    `        double top = targetGridPane.getInsets().getTop();`

    `        double right = targetGridPane.getInsets().getRight();`

    `        double bottom = targetGridPane.getInsets().getBottom();`

    `        double left = targetGridPane.getInsets().getLeft();`


    `        Insets newInsets = new Insets((double) newVal, right, bottom, left);`


    `        targetGridPane.setPadding(newInsets);`

    `    }`

    `});`


    由于处理左侧内边距、水平间距和垂直间距的其他滑块控件的实现与前面提到的顶部内边距滑块控件几乎相同，您可以快进到单元格约束控件。


    您想要操作的网格控制面板属性的最后一部分是目标网格窗格的单元格约束。为简洁起见，我只允许用户设置 `GridPane` 单元格内组件的对齐方式。要查看更多可修改的属性，请参考
    `javafx.scene.layout.GridPane` 的 Javadoc。图 2-8 描述了单个单元格的单元格约束设置。一个示例是将目标网格窗格上的“年龄”标签左对齐。由于单元格是从零开始的，您需要在“单元格列”字段中输入
    **0**，在“单元格行”字段中输入 2。接下来，您需要将下拉框“水平对齐”选择为 LEFT。设置满意后，单击“应用”。图 2-9 显示了“年龄”标签控件水平左对齐。要实现此功能，您需要为应用按钮的
    `onAction` 属性创建一个 `EventHandler<ActionEvent>`，通过调用其 `setOnAction()` 方法。同样，在创建
    `EventHandler` 时，您将重写 `handle()` 方法。在 `handle()` 方法内部，您将遍历目标网格窗格拥有的所有子节点，以确定它是否是指定的单元格。一旦确定了指定的单元格和子节点，将应用对齐方式。以下代码是按下应用按钮时应用单元格约束的
    `EventHandler`：


    `final Button cellApplyButton = new Button("应用");`

    `cellApplyButton.setOnAction(new EventHandler<ActionEvent>() {`


    `    public void handle(ActionEvent event) {`


    `         for (Node child:targetGridPane.getChildren()) {`


    `             int targetColIndx = 0;`

    `             int targetRowIndx = 0;`

    `             try {`

    `                 targetColIndx = Integer.parseInt(cellColFld.getText());`

    `                 targetRowIndx = Integer.parseInt(cellRowFld.getText());`

    `             } catch (Exception e) {`


    `             }`

    `             System.out.println("child = " + child.getClass().getSimpleName());`

    `             int col = GridPane.getColumnIndex(child);`

    `             int row = GridPane.getRowIndex(child);`

    `             if (col == targetColIndx && row == targetRowIndx) {`

    `                 GridPane.setHalignment(child, HPos.valueOf(hAlignFld.getSelectionModel().getSelectedItem().toString()));  `

    `                 GridPane.setValignment(child,`

    `VPos.valueOf(vAlignFld.getSelectionModel().getSelectedItem().toString()));                     `

    `             }`

    `         }`


    `    }`

    `});`


    图 2-8 描绘了单元格约束网格控制面板部分，该部分将控件左对齐到单元格列 0 和单元格行 2。


    ![images](img/0208.jpg)


    ***图 2-8.** 单元格约束*


    图 2-9 描绘了目标网格窗格，其中网格线已打开，并且“年龄”标签在单元格列 0 和单元格行 2 处水平左对齐。


    ![images](img/0209.jpg)


    ***图 2-9.** 目标网格窗格*

