    ## C H A P T E R  4


    ## JavaFX on the Web


    JavaFX provides new capabilities to interoperate with HTML5\. The underlying web
    page–rendering engine in JavaFX is the popular open-source API called Webkit.
    Webkit is also used in Google’s Chrome and Apple’s Safari browsers. HTML5 is the
    new standard markup language for rendering content in web browsers. HTML5 content
    consists of JavaScript, CSS, Scalable Vector Graphics (SVG), and new HTML element
    tags.


    The relationship between JavaFX and HTML5 is important because they complement
    one another by drawing from each of their individual strengths. For instance,
    JavaFX’s rich client APIs coupled with HTML5’s rich web content create a user
    experience resembling a web application with the characteristics of desktop software.
    This new breed of applications is called RIAs.


    In this chapter, we will cover the following:


    > *   Embedding JavaFX applications in an HTML web page

    > *   Displaying HTML 5 content

    > *   Manipulating HTML5 content with Java code

    > *   Responding to HTML events

    > *   Displaying content from the database


    ### 4-1. Embedding JavaFX Applications in a Web Page


    #### Problem


    You hope to get promoted out of your cubicle into an office with windows by impressing
    your boss by creating a proof of concept using JavaFX with your existing web development
    skills.'
