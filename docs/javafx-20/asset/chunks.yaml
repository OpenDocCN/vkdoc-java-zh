    After the web page is assembled, you will call the `newsBrief` object’s `getEngine().loadContent()`
    method to render the page. Once rendered you will save the URL `rss Feed` (`RssFeed`)
    object to the database by invoking the `DBUtils.saveRssFeed(rssFeed)`. As a convenience,
    the `saveRssFeed()` method will check for duplicates.


    ![images](images/square.jpg) **Note**: To see the full source code relating to
    database persistence (DBUtils.java), please visit the book’s catalog page at [`http://www.apress.com/9781430242574`](http://www.apress.com/9781430242574).
