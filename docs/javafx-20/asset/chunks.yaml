    #### How It Works


    In this recipe, I basically used JavaFX’s scene graph to display `Text` nodes.
    JavaFX takes a retained mode approach, in which nodes use vector-based graphics.
    Vector-based graphics allow you to scale shapes and apply effects without issues
    of pixilation (jaggies). In each `Text` node you can create and set the font to
    be rendered onto the scene graph. Here is the code to create and set the font
    on a `Text` node:


    `    Text text2 = new Text(50, 50, "JavaFX 2.0: Intro. by Example");`

    `    Font serif = Font.font("Serif", 30);`

    `    text2.setFont(serif);`


    The drop shadow is a real effect (`DropShadow`) object and actually applied to
    a single `Text` node instance. The `DropShadow` object is set to be positioned
    based on an x and y offset in relation to the `Text` node. Also we can set the
    color of the shadow; here we set it to gray with a .588 opacity. Following is
    an example of setting a `Text` node’s effect property with a drop shadow effect
    (`DropShadow`):


    `    DropShadow dropShadow = new DropShadow();`

    `    dropShadow.setOffsetX(2.0f);`

    `    dropShadow.setOffsetY(2.0f);`

    `    dropShadow.setColor(Color.rgb(50, 50, 50, .588));`

    `    text2.setEffect(dropShadow);`


    Although this is about setting text fonts, we applied effects to `Text` nodes.
    I’ve added yet another effect (just kicking it up a notch). While creating the
    last `Text` node using the monospaced font, I applied the popular reflection effect.
    Here it is, set so that .8 or 80 percent of the reflection will be shown. The
    reflection values range from zero (0%) to one (100%). The following code snippet
    implements a reflection of 80% with a float value of 0.8f:


    `    Reflection refl = new Reflection();`

    `    refl.setFraction(0.8f);`


    `    text5.setEffect(refl);`


