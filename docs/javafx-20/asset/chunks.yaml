- fmt: "#### Solution #2\n\nTo create a simple JavaFX Hello World application using\
    \ your favorite IDE, follow Steps 1 and 2. To compile and run your Hello World\
    \ program on the command line, follow Steps 3 and 4.\n\nOnce the source code is\
    \ entered into your favorite editor and the source file has been saved, you will\
    \ want to compile and run your JavaFX program. Open the command-line prompt window\
    \ and navigate to the directory location of the Java file named `HelloWorldMain.java`.\n\
    \nHere I would like to point out the way you compile the file using the command\
    \ `javac -d . HelloWorldMain.java`. You will notice the `-d .` before the file\
    \ name. This lets the Java compiler know where to put class files based on their\
    \ package name. In this scenario, the `HelloWorldMain` package statement is `helloworldmain`,\
    \ which will create a subdirectory under the current directory. When finished\
    \ compiling, your directory structure should resemble the following:\n\n```\n\
    |projects\n        |helloworld\n              |HelloWorldMain.java\n         \
    \     | helloworldmain\n                    |HelloWorldMain.class\n```\n\nWith\
    \ the preceding directory structure in mind, the following commands will compile\
    \ and run our JavaFX Hello World application:\n\n```\n    cd /projects/helloworld\n\
    \    javac –d . HelloWorldMain.java\n    java helloworldmain.HelloWorldMain\n\
    ```\n\n**Note** There are many ways to package and deploy JavaFX applications.\
    \ To learn more, please see “Learning how to deploy and package JavaFX applications”\
    \ at [`http://blogs.oracle.com/thejavatutorials/entry/javafx_2_0_beta_packager`](http://blogs.oracle.com/thejavatutorials/entry/javafx_2_0_beta_packager).\
    \ For in-depth JavaFX deployment strategies, see Oracle’s “Deploying JavaFX Applications”\
    \ at [`http://download.oracle.com/javafx/2.0/deployment/deployment_toolkit.htm`](http://download.oracle.com/javafx/2.0/deployment/deployment_toolkit.htm).\n\
    \nIn both solutions you’ll notice in the source code that JavaFX applications\
    \ extend the `javafx.application.Application` class. The `Application` class provides\
    \ application life cycle functions such as launching and stopping during runtime.\
    \ This also provides a mechanism for Java applications to launch JavaFX GUI components\
    \ in a threadsafe manner. Keep in mind that synonymous to Java Swing’s event dispatch\
    \ thread, JavaFX will have its own JavaFX application thread.\n\nIn our `main()`\
    \ method’s entry point we launch the JavaFX application by simply passing in the\
    \ command line arguments to the `Application.launch()` method. Once the application\
    \ is in a ready state, the framework internals will invoke the `start()` method\
    \ to begin. When the `start()` method is invoked, a JavaFX `javafx.stage.Stage`\
    \ object is available for the developer to use and manipulate.\n\nYou’ll notice\
    \ that some objects are oddly named, such as `Stage` or `Scene`. The designers\
    \ of the API have modeled things similar to a theater or a play in which actors\
    \ perform in front of an audience. With this same analogy, in order to show a\
    \ play, there are basically one-to-many scenes that actors perform in. And, of\
    \ course, all scenes are performed on a stage. In JavaFX the `Stage` is equivalent\
    \ to an application window similar to Java Swing API `JFrame` or `JDialog`. You\
    \ may think of a `Scene` object as a content pane capable of holding zero-to-many\
    \ `Node` objects. A `Node` is a fundamental base class for all scene graph nodes\
    \ to be rendered. Commonly used nodes are UI controls and `Shape` objects. Similar\
    \ to a tree data structure, a scene graph will contain children nodes by using\
    \ a container class `Group`. We’ll learn more about the `Group` class later when\
    \ we look at the `ObservableList`, but for now we can think of them as Java `List`s\
    \ or Collections that are capable of holding `Node`s.\n\nOnce the child nodes\
    \ have been added, we set the `primaryStage`’s (`Stage`) scene and call the `show()`\
    \ method on the `Stage` object to show the JavaFX window.\n\nOne last thing: in\
    \ this chapter most of the example applications will be structured the same as\
    \ this example in which recipe code solutions will reside inside the `start()`\
    \ method. Having said this, most of the recipes in this chapter will follow the\
    \ same pattern. In other words, for the sake of brevity, much of the boiler plate\
    \ code will not be shown. To see the full source listings of all the recipes,\
    \ please download the source code from the book’s web site.\n\n### 1-3: Drawing\
    \ Text\n\n#### Problem\n\nYou want to draw text onto the JavaFX scene graph.\n\
    \n#### Solution\n\nCreate `Text` nodes to be placed on the JavaFX scene graph\
    \ by utilizing the `javafx.scene.text.Text` class. As `Text` nodes are to be placed\
    \ on the scene graph, you decide you want to create randomly positioned `Text`\
    \ nodes rotated around their (x, y) positions scattered about the scene area.\n\
    \nThe following code implements a JavaFX application that displays `Text` nodes\
    \ scattered about the scene graph with random positions and colors:\n\n```\npackage\
    \ javafx2introbyexample.chapter1.recipe1_03;\n\nimport java.util.Random;\nimport\
    \ javafx.application.Application;\nimport javafx.scene.Group;\nimport javafx.scene.Scene;\n\
    import javafx.scene.paint.Color;\nimport javafx.scene.text.Text;\nimport javafx.stage.Stage;\n\
    \n/**\n *\n * @author cdea\n */\npublic class DrawingText extends Application\
    \ {\n\n    /**\n     * @param args the command line arguments\n     */\n    public\
    \ static void main(String[] args) {\n        Application.launch(args);\n    }\n\
    \n    @Override\n    public void start(Stage primaryStage) {\n        primaryStage.setTitle(\"\
    Chapter 1-3 Drawing Text\");\n        Group root = new Group();\n        Scene\
    \ scene = new Scene(root, 300, 250, Color.WHITE);\n        Random rand = new Random(System.currentTimeMillis());\n\
    \        for (int i = 0; i < 100; i++) {\n            int x = rand.nextInt((int)\
    \ scene.getWidth());\n            int y = rand.nextInt((int) scene.getHeight());\n\
    \            int red = rand.nextInt(255);\n            int green = rand.nextInt(255);\n\
    \            int blue = rand.nextInt(255);\n\n            Text text = new Text(x,\
    \ y, \"JavaFX 2.0\");\n\n            int rot = rand.nextInt(360);\n          \
    \  text.setFill(Color.rgb(red, green, blue, .99));\n            text.setRotate(rot);\n\
    \            root.getChildren().add(text);\n        }\n\n        primaryStage.setScene(scene);\n\
    \        primaryStage.show();\n    }\n}\n```\n\n[Figure 1-8](#Chapter01.html#fig_1_8)\
    \ shows random `Text` nodes scattered about the JavaFX scene graph.\n\n![images](images/0108.jpg)\n\
    \n***Figure 1-8.** Drawing text*"
