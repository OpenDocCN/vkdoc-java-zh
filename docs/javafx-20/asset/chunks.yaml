- fmt: "### 2-5. Enhancing with CSS\n\n#### Problem\n\nYou want to change the Look\
    \ ‘N’ Feel of the GUI interface.\n\n#### Solution\n\nUse JavaFX’s CSS styling\
    \ to be applied on graph nodes. The following code demonstrates using CSS styling\
    \ on graph nodes. The code creates four themes: Caspian, Control Style 1, Control\
    \ Style 2, and Sky. Each theme is defined using CSS and affects the Look ‘N’ Feel\
    \ of a dialog box. Following the code, you can see the two different renditions\
    \ of the dialog box:\n\n```\npackage javafx2introbyexample.chapter2.recipe2_05;\n\
    \nimport javafx.application.Application;\nimport javafx.collections.FXCollections;\n\
    import javafx.collections.ObservableList;\nimport javafx.event.ActionEvent;\n\
    import javafx.event.EventHandler;\nimport javafx.scene.Group;\nimport javafx.scene.Scene;\n\
    import javafx.scene.control.Menu;\nimport javafx.scene.control.MenuBar;\nimport\
    \ javafx.scene.control.MenuItem;\nimport javafx.scene.control.SplitPane;\nimport\
    \ javafx.scene.layout.GridPane;\nimport javafx.scene.layout.HBox;\nimport javafx.scene.layout.VBox;\n\
    import javafx.scene.paint.Color;\nimport javafx.stage.Stage;\n\n/**\n * Enhancing\
    \ with CSS\n * @author cdea\n */\npublic class EnhancingWithCss extends Application\
    \ {\n    /**\n     * @param args the command line arguments\n     */\n    public\
    \ static void main(String[] args) {\n        Application.launch(args);\n    }\n\
    \n    @Override\n    public void start(Stage primaryStage) {\n\n            primaryStage.setTitle(\"\
    Chapter 2-5 Enhancing with CSS \");\n            Group root = new Group();\n \
    \           final Scene scene = new Scene(root, 640, 480, Color.BLACK);\n\n  \
    \          MenuBar menuBar = new MenuBar();\n            Menu menu = new Menu(\"\
    Look 'N' Feel\");\n\n            // default caspian look n feel\n            ObservableList<String>\
    \ caspian = FXCollections.observableArrayList();\n            caspian.addAll(scene.getStylesheets());\n\
    \            MenuItem caspianLnf = new MenuItem(\"Caspian\");\n            caspianLnf.setOnAction(skinForm(caspian,\
    \ scene));\n            menu.getItems().add(caspianLnf);\n\n            menu.getItems().add(createMenuItem(\"\
    Control Style 1\", \"controlStyle9781430242574.css\",\nscene));\n            menu.getItems().add(createMenuItem(\"\
    Control Style 2\", \"controlStyle9781430242574.css\",\nscene));\n            menu.getItems().add(createMenuItem(\"\
    Sky\", \"sky.css\", scene));\n\nmenuBar.getMenus().add(menu);\n            //\
    \ stretch menu\nmenuBar.prefWidthProperty().bind(primaryStage.widthProperty());\n\
    \n            // Left and right split pane\n            SplitPane splitPane =\
    \ new SplitPane();\n            splitPane.prefWidthProperty().bind(scene.widthProperty());\n\
    \            splitPane.prefHeightProperty().bind(scene.heightProperty());\n\n\
    \            // Form on the right\n            GridPane rightGridPane = new MyForm();\n\
    \n            GridPane leftGridPane = new GridPaneControlPanel(rightGridPane);\n\
    \            VBox leftArea = new VBox(10);\n            leftArea.getChildren().add(leftGridPane);\n\
    \n            HBox hbox = new HBox();\n            hbox.getChildren().add(splitPane);\n\
    \            VBox vbox = new VBox();\n            vbox.getChildren().add(menuBar);\n\
    \            vbox.getChildren().add(hbox);\n            root.getChildren().add(vbox);\n\
    \            splitPane.getItems().addAll(leftArea, rightGridPane);\n\n       \
    \     primaryStage.setScene(scene);\n\n            primaryStage.show();\n\n  \
    \  }\n\n    protected final MenuItem createMenuItem(String label, String css,\
    \ final Scene scene){\n        MenuItem menuItem = new MenuItem(label);\n    \
    \    ObservableList<String> cssStyle = loadSkin(css);\n        menuItem.setOnAction(skinForm(cssStyle,\
    \ scene));\n        return menuItem;\n    }\n\n    protected final ObservableList<String>\
    \ loadSkin(String cssFileName) {\n        ObservableList<String> cssStyle = FXCollections.observableArrayList();\n\
    \        cssStyle.addAll(getClass().getResource(cssFileName).toExternalForm());\n\
    \        return cssStyle;\n    }\n\n    protected final EventHandler<ActionEvent>\
    \ skinForm(final ObservableList<String> cssStyle, final Scene scene) {\n     \
    \   return new EventHandler<ActionEvent>(){\n            public void handle(ActionEvent\
    \ event) {\n                scene.getStylesheets().clear();\n                scene.getStylesheets().addAll(cssStyle);\
    \   \n            }\n        };\n    }\n\n}\n```\n\n[Figure 2-10](#Chapter02.html#fig_2_10)\
    \ depicts the standard JavaFX Caspian Look ‘n’ Feel (theme).\n\n![images](images/0210.jpg)\n\
    \n**Figure 2-10.** Caspian Look ‘N’ Feel\n\n[Figure 2-11](#Chapter02.html#fig_2_11)\
    \ depicts the Sky Look ‘N’ Feel (theme).\n\n![images](images/0211.jpg)\n\n**Figure\
    \ 2-11.** Sky Look ‘N’ Feel"
  raw: '### 2-5. Enhancing with CSS


    #### Problem


    You want to change the Look ‘N’ Feel of the GUI interface.


    #### Solution


    Use JavaFX’s CSS styling to be applied on graph nodes. The following code demonstrates
    using CSS styling on graph nodes. The code creates four themes: Caspian, Control
    Style 1, Control Style 2, and Sky. Each theme is defined using CSS and affects
    the Look ‘N’ Feel of a dialog box. Following the code, you can see the two different
    renditions of the dialog box:


    `package javafx2introbyexample.chapter2.recipe2_05;`


    `import javafx.application.Application;`

    `import javafx.collections.FXCollections;`

    `import javafx.collections.ObservableList;`

    `import javafx.event.ActionEvent;`

    `import javafx.event.EventHandler;`

    `import javafx.scene.Group;`

    `import javafx.scene.Scene;`

    `import javafx.scene.control.Menu;`

    `import javafx.scene.control.MenuBar;`

    `import javafx.scene.control.MenuItem;`

    `import javafx.scene.control.SplitPane;`

    `import javafx.scene.layout.GridPane;`

    `import javafx.scene.layout.HBox;`

    `import javafx.scene.layout.VBox;`

