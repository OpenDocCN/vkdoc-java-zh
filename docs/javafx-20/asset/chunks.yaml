    `                leftArea.getChildren().add(rowBox);`

    `                webEngine.load(url);`

    `                urlField.setText("");`

    `            }`

    `        }); // end of urlField setOnAction()`


    News retrieval is initiated when a user clicks on a hyperlink. Once a successful
    retrieve has occurred on the `webEngine` (`WebEngine`) object, you will need to
    add a `ChangeListener` instance to respond when the state property changes to
    `State.SUCCEEDED`. With a valid state of `State.SUCCEEDED,` you will begin to
    parse the XML DOM returned from the `WebEngine`’s `getDocument()` method. Again,
    I provided a convenience method called `parse()` to interrogate the `Document`
    object representing the RSS news information.


    `RssFeed rssFeed = parse(webEngine.getDocument(), webEngine.getLocation());`


    Next, you will create an HTML page that will list the channel tile and the number
