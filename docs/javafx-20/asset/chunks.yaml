    #### How It Works


    To create an RSS reader, you will need to store feed locations for later reading.
    When adding a new RSS feed, you will want to locate the little orange iconic button
    and drag the URL address line into your JavaFX RSS reader application. I find
    that the drag metaphor works on my FireFox browser. However, I’ve provided a text
    field to allow you to cut-and-paste the URL. Enter a URL and press the enter key
    to initiate the loading of the headline news for that URL’s feed. For example
    you can visit Google’s technology news RSS feed at:

