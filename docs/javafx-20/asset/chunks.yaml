    #### 工作原理


    在处理 Java `collections` 时，你会注意到有许多有用的容器类，它们代表了各种数据结构。其中一种常用的集合是 `java.util.ArrayList`
    类。当构建包含 `ArrayList` 的领域对象的应用程序时，开发者可以轻松地操作集合中的对象。但在过去，将 Java Swing 组件与集合结合使用往往是一个挑战，尤其是更新
    GUI 以反映领域对象的变化。我们如何解决这个问题呢？别担心，JavaFX 的 `ObservableList` 来救场了！


    说到救场，我创建了一个 GUI 应用程序，允许用户选择他们最喜欢的英雄。这与通过从列表框组件中添加或删除项目来管理用户角色的应用程序界面非常相似。在 JavaFX
    中，我们将使用一个 `ListView` 控件来保存 String 对象。在创建 `ListView` 实例之前，我们先创建一个包含候选对象的 `ObservableList`。这里你会注意到使用了名为
    `FXCollections` 的工厂类，你可以将常见的集合类型传入其中，这些集合会被包装并以 `ObservableList` 的形式返回给调用者。在本示例中，我传入了一个
    String 数组而不是 `ArrayList`，希望你能明白如何使用 `FXCollections` 类。我相信你会明智地使用它：“能力越大，责任越大”。这行代码调用了
    `FXCollections` 类来返回一个可观察列表（`ObservableList`）：


    `ObservableList<String> candidates = FXCollections.observableArrayList(...);`


    创建 `ObservableList` 后，使用接收该可观察列表的构造函数实例化一个 `ListView` 类。以下是创建并填充 `ListView` 对象的代码：


    `ListView<String> candidatesListView = new ListView<String>(candidates);`


    最后，我们的代码将像操作 `java.util.ArrayList` 一样操作 `ObservableList`。一旦操作完成，`ListView` 会收到通知并自动更新，以反映
    `ObservableList` 的变化。以下代码片段实现了当用户按下向右发送按钮时的事件处理器和动作事件：


