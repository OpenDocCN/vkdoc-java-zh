- fmt: "### How It Works\n\nOne of the greatest challenges in building user interfaces\
    \ is the laying out of controls onto the display area. When developing GUI applications\
    \ it is ideal for an application to allow the user to move and adjust the size\
    \ of their viewable area while maintaining a pleasant user experience. Similar\
    \ to Java Swing, JavaFX layout has stock layouts that provide the most common\
    \ ways to display UI controls on the scene graph. This recipe demonstrates the\
    \ `GridPane` class. Before we begin I want explain two common layouts provided\
    \ by JavaFX 2.0. These are the horizontal box (`HBox`) and the vertical box (`VBox`)\
    \ layout nodes. These two common layouts will be used in later recipes to allow\
    \ the scene graph to manage child nodes. `HBox` will contain child nodes that\
    \ take the available horizontal space as nodes are added. `VBox` will contain\
    \ child nodes that take the available vertical space as nodes are added.\n\nFirst\
    \ we create an instance of a `GridPane`. Next, we set the padding by using an\
    \ instance of an `Inset` object. After setting the padding, we simply set the\
    \ horizontal and vertical gap. The following code snippet instantiates a grid\
    \ pane (`GridPane`) with padding, horizontal, and vertical gaps set to 5 (pixels):\n\
    \n```\nGridPane gridpane = new GridPane();\ngridpane.setPadding(new Insets(5));\n\
    gridpane.setHgap(5);\ngridpane.setVgap(5);\n```\n\nThe padding is the top, right,\
    \ bottom, and left spacing around the region's content in pixels. When obtaining\
    \ the preferred size, the padding will be included in the calculation. Setting\
    \ the horizontal and vertical gaps relate to the spacing between UI controls within\
    \ the cells.\n\nNext is simply putting each UI control into its respective cell\
    \ location. All cells are zero relative. Following is a code snippet that adds\
    \ a save button UI control into a grid pane layout node (`GridPane`) at cell (1,\
    \ 2):\n\n```\ngridpane.add(saveButt, 1, 2);\n```\n\nThe layout also allows you\
    \ to horizontally or vertically align controls within the cell. The following\
    \ code statement right-aligns the save button:\n\n```\nGridPane.setHalignment(saveButt,\
    \ HPos.RIGHT);\n```\n\n### 1-9. Generating Borders\n\n#### Problem\n\nYou want\
    \ to create and customize borders around an image.\n\n#### Solution\n\nCreate\
    \ an application to dynamically customized border regions using JavaFX’s CSS styling\
    \ API.\n\nThe following code creates an application that has a CSS editor text\
    \ area and a border view region surrounding an image. By default the editor’s\
    \ text area will contain JavaFX styling selectors that create a dashed-blue line\
    \ surrounding the image. You will have the opportunity to modify styling selector\
    \ values in the CSS Editor by clicking the Bling! button to apply border settings.\n\
    \n```\nprimaryStage.setTitle(\"Chapter 1-9 Generating Borders\");\nGroup root\
    \ = new Group();\nScene scene = new Scene(root, 600, 330, Color.WHITE);\n\n//\
    \ create a grid pane\nGridPane gridpane = new GridPane();\ngridpane.setPadding(new\
    \ Insets(5));\ngridpane.setHgap(10);\ngridpane.setVgap(10);\n\n// label CSS Editor\n\
    Label cssEditorLbl = new Label(\"CSS Editor\");\nGridPane.setHalignment(cssEditorLbl,\
    \ HPos.CENTER);\ngridpane.add(cssEditorLbl, 0, 0);\n\n// label Border View\nLabel\
    \ borderLbl = new Label(\"Border View\");\nGridPane.setHalignment(borderLbl, HPos.CENTER);\n\
    gridpane.add(borderLbl, 1, 0);\n\n// Text area for CSS editor\nfinal TextArea\
    \ cssEditorFld = new TextArea();\ncssEditorFld.setPrefRowCount(10);\ncssEditorFld.setPrefColumnCount(100);\n\
    cssEditorFld.setWrapText(true);\ncssEditorFld.setPrefWidth(150);\nGridPane.setHalignment(cssEditorFld,\
    \ HPos.CENTER);\ngridpane.add(cssEditorFld, 0, 1);\n\nString cssDefault = \"-fx-border-color:\
    \ blue;\\n\"\n        + \"-fx-border-insets: 5;\\n\"\n        + \"-fx-border-width:\
    \ 3;\\n\"\n        + \"-fx-border-style: dashed;\\n\";\ncssEditorFld.setText(cssDefault);\n\
    \n// Border decorate the picture\nfinal ImageView imv = new ImageView();\nfinal\
    \ Image image2 = new Image(GeneratingBorders.class.getResourceAsStream(\"smoke_glass_buttons1.png\"\
    ));\nimv.setImage(image2);\n\nfinal HBox pictureRegion = new HBox();\npictureRegion.setStyle(cssDefault);\n\
    pictureRegion.getChildren().add(imv);\ngridpane.add(pictureRegion, 1, 1);\n\n\
    Button apply = new Button(\"Bling!\");\nGridPane.setHalignment(apply, HPos.RIGHT);\n\
    gridpane.add(apply, 0, 2);\n\napply.setOnAction(new EventHandler<ActionEvent>()\
    \ {\n    public void handle(ActionEvent event) {\n        pictureRegion.setStyle(cssEditorFld.getText());\n\
    \    }\n});\n\nroot.getChildren().add(gridpane);        \nprimaryStage.setScene(scene);\n\
    primaryStage.show();\n```\n\n[Figure 1-16](#Chapter01.html#fig_1_16) illustrates\
    \ the border customizer application.\n\n![images](images/0116.jpg)\n\n***Figure\
    \ 1-16.** Generating borders*\n\n#### How It Works\n\nJavaFX is capable of styling\
    \ JavaFX nodes similar to Cascading Style Sheets (CSS) in the world of web development.\
    \ This powerful API can alter a node’s background color, font, border, and many\
    \ other attributes essentially allowing a developer or designer to skin GUI controls\
    \ using CSS.\n\nThis recipe allows a user to enter JavaFX CSS styles in the left\
    \ text area and, by clicking the Bling! button below, to apply the style around\
    \ the image shown to the right. Based on the type of node there are limitations\
    \ to what styles you can set. To see a full listing of all style selectors refer\
    \ to the JavaFX CSS Reference Guide:\n[`http://download.oracle.com/docs/cd/E17802_01/javafx/javafx/1.3/docs/api/javafx.scene/doc-files/cssref.html`](http://download.oracle.com/docs/cd/E17802_01/javafx/javafx/1.3/docs/api/javafx.scene/doc-files/cssref.html).\n\
    \nIn the first step of applying JavaFX CSS styles, you must determine what type\
    \ of node you want to style. When setting attributes on various node types, you\
    \ will discover that certain nodes have limitations. In our recipe the intent\
    \ is to put a border around the `ImageView` object. Because `ImageView` is not\
    \ extending from `Region` it doesn’t have border style properties. So, to resolve\
    \ this I simply create an `HBox` layout to contain the `imageView` and apply the\
    \ JavaFX CSS against the `HBox`. Shown here is code to apply JavaFX CSS border\
    \ styles to a horizontal box region (`HBox`) using the `setStyle()` method:\n\n\
    ```\nString cssDefault = \"-fx-border-color: blue;\\n\"\n    + \"-fx-border-insets:\
    \ 5;\\n\"\n    + \"-fx-border-width: 3;\\n\"\n    + \"-fx-border-style: dashed;\\\
    n\";\n    final ImageView imv = new ImageView();\n\n    ...// additional image\
    \ view properties set\n\n    final HBox pictureRegion = new HBox();\n    pictureRegion.setStyle(cssDefault);\n\
    \    pictureRegion.getChildren().add(imv);\n```\n\n### 1-10. Binding Expressions\n\
    \n#### Problem\n\nYou want to synchronize changes between two values."
