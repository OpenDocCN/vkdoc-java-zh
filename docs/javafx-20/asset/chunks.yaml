    #### How It Works


    One of the main pitfalls of GUI development is knowing when and how to delegate
    work (`Threads`). We are constantly reminded of thread safety, especially when
    it comes to blocking the GUI thread.


    We begin by creating not one but two progress controls to show off to the user
    the work being done. One is a progress bar, and the other is a progress indicator.
    The progress indicator shows a percentage below the indicator icon. The following
    code snippet shows the initial creation of progress controls:


    `final ProgressBar progressBar = new ProgressBar(0);`

    `final ProgressIndicator progressIndicator = new ProgressIndicator(0);`


    Next, we create a worker thread via our `createWorker()` method. The `createWorker()`
    convenience method will instantiate and return a `javafx.concurrent.Task` object,
    which is similar to the Java Swing’s `SwingWorker` class. Unlike the `SwingWorker`
    class, the `Task` object is greatly simplified and easier to use. If you’ve compared
    the last recipe you will notice that none of the GUI controls is passed into the
    `Task`. The clever JavaFX team has created observable properties that allow us
    to bind to. This fosters a more event-driven approach to handling work (tasks).
    When creating an instance of a `Task` object you will implement the `call()` method
    to do work in the background. During the work being done, you may want to queue
    up intermediate results such as progress or text info, you can call the `updateProgress()`
    and `updateMessage()` methods. These methods will update information in a threadsafe
    way so that the observer of the progress properties will be able to update the
    GUI safely without blocking the GUI thread. The following code snippet demonstrates
    the ability to queue up messages and progress:


    `// queue up status`

    `updateMessage(status);`

    `updateProgress(i + 1, numFiles);`


    After creating a worker `Task` we unbind any old tasks bound to the progress controls.
    Once the progress controls are unbound, we then bind the progress controls to
    our newly created `Task` object `copyWorker`. Shown here is the code used to rebind
    a new `Task` object to the progress UI controls:


    `// wire up progress bar`

    `progressBar.progressProperty().unbind();`

    `progressBar.progressProperty().bind(copyWorker.progressProperty());`

    `progressIndicator.progressProperty().unbind();`

    `progressIndicator.progressProperty().bind(copyWorker.progressProperty());`


    Next, we implement a `ChangeListener` to append the queued results into the `TextArea`
    control. Another remarkable thing about JavaFX Properties is that you can attach
    many listeners similar to Java Swing components. Finally our worker and controls
    are all wired up to spawn a thread to go off in the background. The following
    code line shows the launching of a `Task` worker object:


    `new Thread(copyWorker).start();`


    Finally, we discuss the cancel button. The cancel button will simply call the
    `Task` object’s `cancel()` method to kill the process. Once the task is cancelled
    the progress controls are reset. Once a worker `Task` is cancelled it cannot be
    reused. That is why the start button re-creates a new `Task`. If you want a more-robust
    solution, you should look at the `javafx.concurrent.Service` class. The following
    code line will cancel a `Task` worker object:


    `copyWorker.cancel(true);`


