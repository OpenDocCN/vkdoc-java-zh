    \ createStopControl();\n\n// play button can resume or start a media\nfinal Node\
    \ playButton = createPlayControl();\n\n// pauses media play\nfinal Node pauseButton\
    \ = createPauseControl();\n\nstopButton.setOnMousePressed(new EventHandler<MouseEvent>()\
    \ {\n    public void handle(MouseEvent me) {\n        if (mediaPlayer!= null)\
    \ {\n            buttonArea.getChildren().removeAll(pauseButton, playButton);\n\
    \            buttonArea.getChildren().add(playButton);\n            mediaPlayer.stop();\
    \                  \n        }\n    }\n});\n// pause media and swap button with\
    \ play button\npauseButton.setOnMousePressed(new EventHandler<MouseEvent>() {\n\
    \    public void handle(MouseEvent me) {\n        if (mediaPlayer!=null) {\n \
    \           buttonArea.getChildren().removeAll(pauseButton, playButton);\n   \
    \         buttonArea.getChildren().add(playButton);\n            mediaPlayer.pause();\n\
    \            paused = true;\n        }\n    }\n});\n\n// play media and swap button\
    \ with pause button\nplayButton.setOnMousePressed(new EventHandler<MouseEvent>()\
    \ {\n    public void handle(MouseEvent me) {  \n        if (mediaPlayer != null)\
    \ {\n            buttonArea.getChildren().removeAll(pauseButton, playButton);\n\
    \            buttonArea.getChildren().add(pauseButton);\n            paused =\
    \ false;\n            mediaPlayer.play();                    \n        }\n   \
    \ }\n});\n\n// add stop button to button area\nbuttonArea.getChildren().add(stopButton);\n\
    \n// set pause button as default\nbuttonArea.getChildren().add(pauseButton);\n\
    \n// add buttons\nroot.getChildren().add(buttonArea);\n\n// create a close button\n\
    Node closeButton= createCloseButton(scene);\nroot.getChildren().add(closeButton);\n\
    \nprimaryStage.setOnShown(new EventHandler<WindowEvent>() {\n    public void handle(WindowEvent\
    \ we) {\n        previousLocation = new Point2D(primaryStage.getX(), primaryStage.getY());\n\
    \    }\n});\n\nprimaryStage.setScene(scene);\nprimaryStage.show();\n\n}\n```\n\
    \nFollowing is our `attachMouseEvents()` method that adds an `EventHandler` to\
    \ the `Scene` to provide the ability to make the video player go into full screen\
    \ mode.\n\n```java\nprivate void attachMouseEvents(Scene scene, final Stage primaryStage)\
    \ {\n\n        // Full screen toggle\n        scene.setOnMouseClicked(new EventHandler<MouseEvent>()\
    \ {\n            public void handle(MouseEvent event){\n                if (event.getClickCount()\
    \ == 2) {\n                    primaryStage.setFullScreen(!primaryStage.isFullScreen());\n\
    \                }\n            }\n        });\n        ... // the rest of the\
    \ EventHandlers\n    }\n```\n\nThe following code is a method that creates a slider\
    \ control with a `ChangeListener` to enable the user to seek backward and forward\
    \ through the video:\n\n```java\n    private Slider createSlider(Scene scene)\
    \ {\n        Slider slider = SliderBuilder.create()\n                .min(0)\n\
    \                .max(100)\n                .value(1)\n                .showTickLabels(true)\n\
    \                .showTickMarks(true)\n                .build();\n\n        slider.valueProperty().addListener(new\
    \ ChangeListener<Number>() {\n            public void changed(ObservableValue<?\
    \ extends Number> observable, Number oldValue,\nNumber newValue) {\n         \
    \       if (paused) {\n                    long dur = newValue.intValue() * 1000;\n\
    \                    mediaPlayer.seek(new Duration(dur));\n                }\n\
    \            }\n        });\n        slider.translateYProperty().bind(scene.heightProperty().subtract(30));\n\
    \        return slider;\n    }\n```\n\n[Figure 3-3](#Chapter03.html#fig_3_3) depicts\
    \ a JavaFX basic video player with a slider control.\n\n![images](images/0303.jpg)\n\
