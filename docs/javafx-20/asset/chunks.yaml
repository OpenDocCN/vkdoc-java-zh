    Rendering the QuadCurve (smile) object I used the `QuadCurveBuilder` class similar
    to the `CubicCurveBuilder` class, and you’ll notice the simplicity of creating
    such a shape. This is similar to the cubic curve example described above in the
    first shape. Instead of two control points you only have one control point. Shown
    below ([Figure 1-12](#Chapter01.html#fig_1_12)) is a `QuadCurve` shape with a
    control point below its starting and ending points:


    ![images](images/0112.jpg)


    ***Figure 1-12.** Quadratic Curve*


    Once your builder class is complete you will finish things off by invoking the
    `build()` method. Shown below is a quadratic curve with a stroke thickness of
    three pixels filled with the color white:


    `        // QuadCurve create a smile`

    `        QuadCurve quad =QuadCurveBuilder.create()`

    `                .startX(50)`

    `                .startY(50)`

    `                .endX(150)`

    `                .endY(50)`

    `                .controlX(125)`

    `                .controlY(150)`

    `                .strokeWidth(3)`

    `                .stroke(Color.BLACK)`

    `                .fill(Color.WHITE)`

    `                .build();`


    Last is our tasty donut shape with a drop shadow effect. When creating the donut,
    we begin by creating two circular ellipses. By subtracting the smaller ellipse
    (donut hole) from the larger ellipse area, a newly derived `Shape` object is created
    and returned using the `Path.subtract()` method. Following is the code snippet
    that creates the donut shape using the `Path.subtract()` method:


    `        // outer donut`

    `        Ellipse bigCircle = ...//Outer shape area`


    `        // donut hole`

    `        Ellipse smallCircle = ...// Inner shape area`


    `        // make a donut`

    `        Shape donut = Path.subtract(bigCircle, smallCircle);`


    Next, is applying a drop shadow effect onto our donut. A common technique is to
    draw the shape filled black while the original shape is laid on top slightly offset
    to appear as a shadow. However, in JavaFX we draw it once and use the `setEffect()`
    method to apply a `DropShadow` object instance. To cast the shadow offset call
    the `setOffsetX()` and `setOffsetY()` methods.


    One last thing to point out is that all shapes are drawn to be positioned underneath
    one another. As each shape was created, you’ll notice their translateY property
    was set to reposition or shift the shape from its original position. For example,
    if a shape’s upper left bounding box point is created at (100, 100) and you want
    it to be moved to (101, 101) the translateX and translateY properties would be
    set to one.


