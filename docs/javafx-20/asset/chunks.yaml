- fmt: "### Solution\n\nCreate a simple form designer application to manipulate the\
    \ user interface dynamically using the JavaFX's `javafx.scene.layout.GridPane`.\
    \ The form designer application will have the following features:\n\n- It will\
    \ toggle the display of the Grid layout's grid lines for debugging.\n- It will\
    \ adjust the top padding of the `GridPane`.\n- It will adjust the left padding\
    \ of the `GridPane`.\n- It will adjust the horizontal gap between cells in the\
    \ `GridPane`.\n- It will adjust the vertical gap between cells in the `GridPane`.\n\
    - It will align controls within cells horizontally.\n- It will align controls\
    \ within cells vertically.\n\nThe following code is the main launching point for\
    \ the form designer application:\n\n```\n/**\n * Manipulating Layout Via Grids\n\
    \ * @author cdea\n */\npublic class ManipulatingLayoutViaGrids extends Application\
    \ {\n\n    /**\n     * @param args the command line arguments\n     */\n    public\
    \ static void main(String[] args) {\n        Application.launch(args);\n    }\n\
    \n    @Override\n    public void start(Stage primaryStage) {\n        primaryStage.setTitle(\"\
    Chapter 2-4 Manipulating Layout via Grids \");\n        Group root = new Group();\n\
    \        Scene scene = new Scene(root, 640, 480, Color.WHITE);\n\n        // Left\
    \ and right split pane\n        SplitPane splitPane = new SplitPane();\n     \
    \   splitPane.prefWidthProperty().bind(scene.widthProperty());\n        splitPane.prefHeightProperty().bind(scene.heightProperty());\n\
    \n        // Form on the right\n        GridPane rightGridPane = new MyForm();\n\
    \n        GridPane leftGridPane = new GridPaneControlPanel(rightGridPane);\n\n\
    \        VBox leftArea = new VBox(10);\n        leftArea.getChildren().add(leftGridPane);\n\
    \        HBox hbox = new HBox();\n        hbox.getChildren().add(splitPane);\n\
    \        root.getChildren().add(hbox);\n        splitPane.getItems().addAll(leftArea,\
    \ rightGridPane);\n\n        primaryStage.setScene(scene);\n\n        primaryStage.show();\n\
    \    }\n\n}\n```\n\nWhen the form designer application is launched, the target\
    \ form to be manipulated will be shown to the right side of the window's split\
    \ pane. Shown following is the code of a simple grid-like form class that extends\
    \ from `GridPane` that will be manipulated by the form designer application:\n\
    \n```\n/**\n * MyForm is a form to be manipulated by the user.\n * @author cdea\n\
    \ */\npublic class MyForm extends GridPane{\n    public MyForm() {\n\n       \
    \ setPadding(new Insets(5));\n        setHgap(5);\n        setVgap(5);\n\n   \
    \     Label fNameLbl = new Label(\"First Name\");\n        TextField fNameFld\
