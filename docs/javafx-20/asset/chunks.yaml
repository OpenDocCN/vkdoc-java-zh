    ***图 1-20.** 使用表格*


    #### 工作原理


    为了有趣，我创建了一个简单的 GUI 来显示员工及其老板。你会在图 1-20 的左侧看到一个人物列表（老板）。当用户点击并选择一位老板时，其员工将显示在右侧的
    `TableView` 区域中。你还会注意到，当鼠标悬停在选中的老板上时，会出现工具提示。


    在开始讨论 `TableView` 控件之前，我想先解释一下负责更新 `TableView` 的 `ListView`。按照模型视图的方式，我们首先创建一个包含所有老板的
    `ObservableList`，用于 `ListView` 控件的构造函数。在我的代码中，为了政治正确，我将老板称为*领导者*。以下代码创建了一个 `ListView`
    控件：


    `// 领导者列表`

    `ObservableList<Person> leaders = getPeople();`

    `final ListView<Person> leaderListView = new ListView<Person>(leaders);`


    接下来，我们创建一个单元格工厂，以便在 `ListView` 控件中正确显示人员姓名。由于每个项目都是一个 `Person` 对象，`ListView` 不知道如何渲染
    `ListView` 控件中的每一行。我们只需通过指定 `ListView<Person>` 和 `ListCell<Person>` 数据类型来创建一个
    `javafx.util.Callback` 泛型类型对象。借助你信赖的 NetBeans IDE，它会预生成诸如实现方法 `call()` 之类的内容。接下来是
    `ListCell<Person>` 类型的变量 `cell`（在 `call()` 方法内部），我们在其中创建一个匿名内部类。该内部类必须实现一个 `updateItem()`
    方法。要实现 `updateItem()` 方法，你需要获取人员信息并更新 `Label` 控件（`leadLbl`）。希望你能跟上我的思路。最后一步是设置我们的工具提示。


    最后，我们创建一个 `TableView` 控件，用于根据从 `ListView` 中选择的老板来显示员工。创建 `TableView` 时，我们首先创建列标题。使用以下代码创建表格列：


    `TableColumn<String> firstNameCol = new TableColumn<String>("First Name");`

    `firstNameCol.setProperty("firstName");`


    创建列后，你会注意到 `setProperty()` 方法，它负责调用 Person bean 的属性。因此，当员工列表被放入 `TableView` 时，它将知道如何提取属性以放置到表格的每个单元格中。


    最后一步是在 JavaFX 中实现 `ListView` 上的选择监听器，这被称为选择项属性（`selectionItemProperty()`）。我们只需创建并添加一个
    `ChangeListener` 来监听选择事件。当用户选择一位老板时，`TableView` 会被清空并填充该老板的员工。实际上，这是 `ObservableList`
    的魔力，它通知 `TableView` 发生了变化。通过 `teamMembers`（`ObservableList`）变量来填充 `TableView`：


    `teamMembers.clear();`

    `teamMembers.addAll(observable.getValue().employeesProperty());`


