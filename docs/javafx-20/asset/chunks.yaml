    ***Figure 1-14.** Creating menus*


    #### How It Works


    Menus are standard ways on windowed platform applications to allow users to select
    options. Menus should also have the functionality of hot keys or keyboard equivalents.
    Often users will want to use the keyboard instead of the mouse to navigate the
    menu.


    First, we create an instance of a `MenuBar` that will contain one to many menu
    (`MenuItem`) objects. The following code snippet creates a menu bar:


    `MenuBar menuBar = new MenuBar();`


    Secondly, we create menu (`Menu`) objects that contain one-to-many menu item (`MenuItem`)
    objects and other `Menu` objects making submenus. The following code snippet creates
    a menu:


    `Menu menu = new Menu("File");`


    `Third, we create menu items to be added to Menu objects, such as menu` (`MenuItem`)`,
    check` (`CheckMenuItem`), and `radio menu items` (`RadioMenuItem`). Menu items
    can have icons in them. I don’t showcase this in the recipe, but I encourage you
    to explore the various constructors for all menu items (`MenuItem`). When creating
    a radio menu item (`RadioMenuItem`), you should be aware of the `ToggleGroup`
    class. The `ToggleGroup` class is also used on regular radio buttons (`RadioButton`s)
    to allow one selected option only. The following code creates radio menu items
    (`RadioMenuItem`s) to be added to a `Menu` object:


    `// Alarm`

    `Menu alarm = new Menu("Alarm");`

    `ToggleGroup tGroup = new ToggleGroup();`

    `RadioMenuItem soundAlarmItem = RadioMenuItemBuilder.create()`

    `        .toggleGroup(tGroup)`

    `        .text("Sound Alarm")`

    `        .build();`

    `RadioMenuItem stopAlarmItem = RadioMenuItemBuilder.create()`

    `        .toggleGroup(tGroup)`

    `        .text("Alarm Off")`

    `        .selected(true)`

    `        .build();`


    `alarm.getItems().add(soundAlarmItem);`

    `alarm.getItems().add(stopAlarmItem);`


    At times you may want some menu items separated with a visual line separator.
    To create a visual separator, create an instance of a `SeparatorMenuItem` class
    to be added to a menu via the `getItems()` method. The method `getItems()` returns
    an observable list of `MenuItem` objects (`ObservableList<MenuItem>`). As you
    will see later in recipe 1-11, you will learn about the ability to be notified
    when items in a collection are altered. The following code line adds a visual
    line separator (`SeparatorMenuItem`) to the menu:


    `menu.getItems().add(new SeparatorMenuItem());`


    Other menu items used are the check menu item (`CheckMenuItem`) and the radio
    menu item (`RadioMenuItem`), which are similar to their counterparts in JavaFX
    UI controls check box (`CheckBox`) and radio button (`RadioButton`), respectively.


    Prior to our adding the menu bar to the scene, you will notice the bound property
    between the preferred width of the menu bar and the width of the `Stage` object
    via the `bind()` method. When binding these properties you will see the menu bar’s
    width stretch when the user resizes the screen. Later you will see how binding
    works in recipe 1-10, “Binding Expressions.”


    The following code snippet shows the binding between the menu bar’s `width` property
    and the stage’s `width` property.


    `        menuBar.prefWidthProperty().bind(primaryStage.widthProperty());`


    `        root.getChildren().add(menuBar);`


    ### 1-8\. Adding Components to a Layout


    #### Problem


    You want to create a simple form application by adding UI components to a layout
    similar to a grid-like display.


    #### Solution


    Use JavaFX’s `javafx.scene.layout.GridPane` class. This source code implements
    a simple UI form containing a first and last name field controls using the grid
    pane layout node (`javafx.scene.layout.GridPane`):


    `        GridPane gridpane = new GridPane();`

    `        gridpane.setPadding(new Insets(5));`

    `        gridpane.setHgap(5);`

    `        gridpane.setVgap(5);`


    `        Label fNameLbl = new Label("First Name");`

    `        TextField fNameFld = new TextField();`

    `        Label lNameLbl = new Label("First Name");`

    `        TextField lNameFld = new TextField();`

    `        Button saveButt = new Button("Save");`


    `        // First name label`

    `        GridPane.setHalignment(fNameLbl, HPos.RIGHT);`

    `        gridpane.add(fNameLbl, 0, 0);`


    `        // Last name label`

    `        GridPane.setHalignment(lNameLbl, HPos.RIGHT);`

    `        gridpane.add(lNameLbl, 0, 1);`


    `        // First name field`

    `        GridPane.setHalignment(fNameFld, HPos.LEFT);       `

    `        gridpane.add(fNameFld, 1, 0);`


    `        // Last name field`

    `        GridPane.setHalignment(lNameFld, HPos.LEFT);`

    `        gridpane.add(lNameFld, 1, 1);`


    `        // Save button`

    `        GridPane.setHalignment(saveButt, HPos.RIGHT);`

    `        gridpane.add(saveButt, 1, 2);`


    `        root.getChildren().add(gridpane);`


    [Figure 1-15](#Chapter01.html#fig_1_15) depicts a small form containing UI controls
    laid out using a grid pane layout node.


    ![images](images/0115.jpg)


    ***Figure 1-15.** Adding controls to a layout*'
