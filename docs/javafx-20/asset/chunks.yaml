    In the photo viewer application I decided to incorporate animation effects. The
    main animation effects I focus on are translating and fading. First, you will
    create a news ticker control that scrolls `Text` nodes to the left by using a
    translation transition (`javafx.animation.TranslateTransition`). Next, you will
    apply another fading effect when the user clicks the previous and next buttons
    to transition from the current image to the next. To perform this effect, you
    will use a compound transition (`javafx.animation.SequentialTransition`) consisting
    of multiple animations. Finally, to create the effect of the button controls fading
    in and out based on where the mouse is located, you will need a fade transition
    (`javafx.animation.FadeTransition`).


    Before I begin to discuss the steps to fulfill the requirements, I want to mention
    the basics of JavaFX animation. The JavaFX animation API allows you to assemble
    timed events that can interpolate over a node’s attribute values to produce animated
    effects. Each timed event is called a keyframe (`KeyFrame`), which is responsible
    for interpolating over a `Node`’s property over a period of time (`javafx.util.Duration`).
    Knowing that a keyframe’s job is to operate on a `Node`’s property value, you
    will have to create an instance of a `KeyValue` class that will reference the
    desired `Node` property. The idea of interpolation is simply the distributing
    of values between a start and end value. An example is to move a rectangle by
    its current x position (zero) to 100 pixels in 1000 milliseconds; in other words,
    move the rectangle 100 pixels to the right, spanning one second. Shown here is
    a keyframe and key value to interpolate a rectangle’s x property for 1000 milliseconds:


    `final Rectangle rectangle = new Rectangle(0, 0, 50, 50);`

    `KeyValue keyValue = new KeyValue(rectangle.xProperty(), 100);`

    `KeyFrame keyFrame = new KeyFrame(Duration.millis(1000), keyValue);`


    When creating many keyframes that are assembled consecutively, you need to create
    a `TimeLine`. Because `TimeLine` is a subclass of `javafx.animation.Animation`,
    there are standard attributes such as its cycle count and auto-reverse that can
    be set. The *cycle count* is the number of times you want the timeline to play
    the animation. If you want the cycle count to play the animation indefinitely,
    use the value `Timeline.INDEFINITE`. The auto-reverse is the capability for the
    animation to play the timeline backward. By default, the cycle count is set to
    1, and the auto-reverse is set to false. When adding keyframes you will simply
    add them using the `getKeyFrames().add()` method on the `TimeLine` object. The
    following code snippet demonstrates a timeline playing indefinitely and auto-reverse
    set to true:


    `Timeline timeline = new Timeline();`

    `timeline.setCycleCount(Timeline.INDEFINITE);`

    `timeline.setAutoReverse(true);`

    `timeline.getKeyFrames().add(``keyFrame``);`

    `timeline.play();`


    With this knowledge of timelines you can animate any graph node in JavaFX. Although
    you have the ability to create timelines in a low-level way, it can become very
    cumbersome. You are probably wondering whether there are easier ways to express
    common animations. Good news! JavaFX has transitions (`Transition`), which are
    convenience classes to perform common animated effects. Some of the common animation
    effects classes are these:


    > *   `javafx.animation.FadeTransition`

    > *   `javafx.animation.PathTransition`

    > *   `javafx.animation.ScaleTransition`

    > *   `javafx.animation.TranslateTransition`


    To see more transitions, see `javafx.animation` in the Javadoc`.` Because `Transition`
    objects are also subclasses of the `javafx.animation.Animation` class, you will
    have the opportunity to set the cycle count and auto-reverse attributes. In this
    recipe you will be focusing on two transition effects: translate transition (`TranslateTransition`)
    and fade transition (`FadeTransition`).


    The first requirement in our problem statement is to create a news ticker. When
    creating a news ticker control, `Text` nodes will scroll from right to left inside
    a rectangular region. When the text scrolls to the left edge of the rectangular
    region you will want the text to be clipped to create a view port that only shows
    pixels inside of the rectangle. Here, I first create a `Group` to hold all the
    components that comprise a ticker control. Next is the creation of a rectangle
    using the `RectangleBuilder` to build a white rounded rectangle filled with 55
    percent opacity. After creating the visual region I create a similar rectangle
    that represents the clipped region using the `setClip(someRectangle)` method on
    the `Group` object. [Figure 2-5](#Chapter02.html#fig_2_5) shows a rounded rectangular
    area as a clip region:


    ![images](images/0205.jpg)


    ***Figure 2-5.** Setting the clip region on the Group object*


    Once the ticker control is created, you will bind the translate Y based on the
    Scene’s height property minus the ticker control’s height. You will also bind
    the ticker control’s width property based on the width of scene minus the button
    control’s width. By binding these properties, the ticker control can change its
    size and position whenever a user resizes the application window. This makes the
    ticker control appear to float at the bottom of the window. The following code
    binds the ticker control’s translate Y, width, and clip region’s width property:


    `tickerArea.translateYProperty().bind(scene.heightProperty().subtract(tickerRect.getHeight()
    +`

    `6));`

    `tickerRect.widthProperty().bind(scene.widthProperty().subtract(buttonRect.getWidth()
    + 16));`

    `clipRegion.widthProperty().bind(scene.widthProperty().subtract(buttonRect.getWidth()
    + 16));`

    `tickerArea.getChildren().add(tickerRect);`


    Now that you have finished creating a ticker control, you will need to create
    news to feed into it. You will create a `Text` node with text that represents
    a news feed. To add a newly created `Text` node to the ticker control, call its
    `getChildren().add()` method. The following code adds a `Text` node to the ticker
    control:


    `final Group tickerArea = new Group();`

    `final Rectangle tickerRect = //...`

    `Text news = TextBuilder.create()`

    `    .text("JavaFX 2.0 News! | 85 and sunny | :)")`

    `    // ... more properties defined`

    `    .build();`

    `// add news to ticker control`

    `tickerArea.getChildren().add(news);`


    Next is scrolling the `Text` node from right to left using JavaFX’s `TranslateTransition`
    API. Like many JavaFX classes, in which there are builder classes to easily create
    objects, you will be using the `TranslateTransition` class’ associated builder
    class called `TranslateTransitionBuilder`. The first step is to set the target
    node to perform the `TranslateTransition`. Then you will set the duration, which
    is the total amount of time the `TranslateTransition` will spend when animating.
    A `TranslateTransition` simplifies the creation of an animation by exposing convenience
    methods that operate on a `Node`’s translate X and Y properties. The convenience
    methods are prepended with `from` and `to`. For instance, in the scenario in which
    you use translate X on a `Text` node, there are methods `fromX()` and `toX()`.
    The `fromX()` is the starting value and the `toX()` is the end value that will
    be interpolated. Next, you will set the `TranslateTransition` to a linear transition
    (`Interpolator.LINEAR`) to interpolate evenly between the start and end values.
    To see more interpolator types or to see how to create custom interpolators, see
    the Javadoc on `javafx.animation.Interpolator`s. Finally, I set the cycle count
    to 1, which will animate the ticker once based on the specified duration. The
    following code snippet details creating a `TranslateTransition` that animates
    a `Text` node from right to left:


    `final TranslateTransition ticker = TranslateTransitionBuilder.create()`

    `        .node(news)`

    `        .duration(Duration.millis((scene.getWidth()/300) * 15000))`

    `        .fromX(scene.widthProperty().doubleValue())`

    `        .toX(-scene.widthProperty().doubleValue())`

    `        .fromY(19)`

    `        .interpolator(Interpolator.LINEAR)`

    `        .cycleCount(1)`

    `        .build();`


    When the ticker’s news has scrolled completely off of the ticker area to the far
    left of the Scene, you will want to stop and replay the news feed from the start
    (the far right). To do this you will create an instance of an `EventHandler<ActionEvent>`
    object to be set on the ticker (`TranslateTransition`) object using the `setOnFinished()`
    method. Shown here is how to replay the `TranslateTransition` animation:


    `// when window resizes width wise the ticker will know how far to move`

    `ticker.setOnFinished(new EventHandler<ActionEvent>() {`

    `    public void handle(ActionEvent ae){`

    `        ticker.stop();`

    `        ticker.setFromX(scene.getWidth());`

    `        ticker.setDuration(new Duration((scene.getWidth()/300) * 15000));`

    `        ticker.playFromStart();`

    `    }`

    `});`


    Once the animation is defined, you simply invoke the `play()` method to get it
    started. The following code snippet shows how to play a `TranslateTransition:`


    `ticker.play();`


    Now that you have a better understanding of animated transitions, what about a
    transition that can trigger any number of transitions? JavaFX has two transitions
    that provide this behavior. The two transitions can invoke individual dependent
    transitions sequentially or in parallel. In this recipe I use a sequential transition
    (`SequentialTransition`) to contain two `FadeTransition`s in order to fade out
    the current image displayed and to fade-in the next image into view. When creating
    the previous and next button’s event handlers, you first determine the next image
    to be displayed by calling the `gotoImageIndex()` method. Once the next image
    to be displayed is determined, you will call the `transitionByFading()` method,
    which returns an instance of a `SequentialTransition`. When calling the `transitionByFading()`
    method, you’ll notice the creation of two `FadeTransition`s. The first transition
    will change the opacity level from 1.0 to 0.0 to fade out the current image, and
    the second transition will interpolate the opacity level from 0.0 to 1.0, fading
    in the next image that then becomes the current image. At last the two `FadeTransition`s
    are added to the `SequentialTransition` and returned to the caller. The following
    code creates two `FadeTransition`s and adds them to a `SequentialTransition`:


    `FadeTransition fadeOut = new FadeTransition(Duration.millis(500), imageView);`

    `fadeOut.setFromValue(1.0);`

    `fadeOut.setToValue(0.0);`

    `fadeOut.setOnFinished(new EventHandler<ActionEvent>() {`

    `    public void handle(ActionEvent ae) {`

    `         imageView.setImage(nextImage);`

    `    }`

    `});`


    `FadeTransition fadeIn = new FadeTransition(Duration.millis(500), imageView);`

    `fadeIn.setFromValue(0.0);`

    `fadeIn.setToValue(1.0);`

    `SequentialTransition seqTransition = SequentialTransitionBuilder.create()`

    `        .children(fadeOut, fadeIn)`

    `        .build();`


    For the last requirements relating to fading in and out, you use the button controls.
    You will yet again use the `FadeTransition` to create a ghostly animated effect.
    For starters, just like any event you are interested in you will be creating an
    `EventHandler` (more specifically, an `EventHandler<MouseEvent>`). It is easy
    peasy to add mouse events to the Scene; all you have to do is override the `handle()`
    method where the inbound parameter is a `MouseEvent` type (the same as its formal
    type parameter). Inside of the `handle()` method, you will create an instance
    of a `FadeTransition` object by using the constructor that takes the duration
    and node as parameters. Next, you’ll notice the `setFromValue()` and `setToValue()`
    methods that are called to interpolate values between 1.0 and 0.0 for the opacity
    level, causing the fade-in effect to occur. The following code adds an `EventHandler`
    to create the fade-in effect when the mouse cursor is positioned inside of the
    Scene:


    `// Fade in button controls`

    `scene.setOnMouseEntered(new EventHandler<MouseEvent>() {`

    `    public void handle(MouseEvent me) {`

    `        FadeTransition fadeButtons = new FadeTransition(Duration.millis(500),
    buttonGroup);`

    `        fadeButtons.setFromValue(0.0);`

    `        fadeButtons.setToValue(1.0);`

    `        fadeButtons.play();`

    `    }`

    `});`


    Last but not least, the fade-out `EventHandler` is basically the same as the fade-in,
