    \nThe following code demonstrates drawing a path for a shape to follow:\n\n```\n\
    /**\n * Working with the Scene Graph\n * @author cdea\n */\npublic class WorkingWithTheSceneGraph\
    \ extends Application {\n\n    Path onePath = new Path();\n    Point2D anchorPt;\n\
    \    /**\n     * @param args the command line arguments\n     */\n    public static\
    \ void main(String[] args) {\n        Application.launch(args);\n    }\n\n   \
    \ @Override\n    public void start(Stage primaryStage) {\n        primaryStage.setTitle(\"\
    Chapter 2-3 Working with the Scene Graph\");\n\n        final Group root = new\
    \ Group();\n\n        // add path\n        root.getChildren().add(onePath);\n\n\
    \        final Scene scene = SceneBuilder.create()\n                .root(root)\n\
    \                .width(300)\n                .height(250)\n                .fill(Color.WHITE)\n\
    \                .build();\n\n        RadialGradient gradient1 = new RadialGradient(0,\n\
    \                .1,\n                100,\n                100,\n           \
    \     20,\n                false,\n                CycleMethod.NO_CYCLE,\n   \
    \             new Stop(0, Color.RED),\n                new Stop(1, Color.BLACK));\n\
    \n        // create a sphere\n        final Circle sphere = CircleBuilder.create()\n\
    \                .centerX(100)\n                .centerY(100)\n              \
    \  .radius(20)\n                .fill(gradient1)\n                .build();\n\n\
    \        // add sphere\n        root.getChildren().addAll(sphere);\n\n       \
    \ // animate sphere by following the path.\n        final PathTransition pathTransition\
    \ = PathTransitionBuilder.create()\n            .duration(Duration.millis(4000))\n\
    \            .cycleCount(1)\n            .node(sphere)\n            .path(onePath)\n\
    \            .orientation(PathTransition.OrientationType.ORTHOGONAL_TO_TANGENT)\n\
    \            .build();\n\n        // once finished clear path\n        pathTransition.onFinishedProperty().set(new\
