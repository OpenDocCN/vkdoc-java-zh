- fmt: "### 3-3. Controlling Media Actions and Events\n\n#### Problem\n\nYou want\
    \ the media player to provide feedback in response to certain events. An example\
    \ is displaying the text “Paused” on the screen when the media player’s `paused`\
    \ event is triggered.\n\n#### Solution\n\nYou can use many media event handler\
    \ methods. Shown in [Table 3-3](#Chapter03.html#tab_3_3) are all the possible\
    \ media events that are raised to allow the developer to attach `EventHandler`s\
    \ or `Runnable`s.\n\n![images](images/t0303.jpg)\n\n![images](images/t0303a.jpg)\n\
    \nThe following code will present to the user a text “Paused” with “Duration”\
    \ with a decimal of milliseconds which is overlaid on top of the video when the\
    \ user clicks the pause button (see [Figure 3-4](#Chapter03.html#fig_3_4)):\n\n\
    ```\n// when paused event display pause message\nmediaPlayer.setOnPaused(new Runnable()\
    \ {\n    @Override\n    public void run() {\n        pauseMessage.setText(\"Paused\
    \ \\nDuration: \" +\nmediaPlayer.currentTimeProperty().getValue().toMillis());\n\
    \        pauseMessage.setOpacity(.90);\n    }\n});\n```\n\n![images](images/0304.jpg)\n\
    \n***Figure 3-4.** Paused event*\n\n#### How It Works\n\nAn event driven architecture\
    \ (EDA) is a prominent architectural pattern used to model loosely coupled components\
    \ and services that pass messages asynchronously. The JavaFX team has designed\
    \ the Media API to be event driven. This recipe will demonstrate how to implement\
    \ in response to media events.\n\nWith event-based programming in mind, you will\
    \ discover nonblocking or callback behaviors when invoking functions. In this\
    \ recipe you will implement the display of text in response to an `onPaused` event\
    \ instead of placing your code into the pause button. Instead of tying code directly\
    \ to a button via an `EventHandler`, you will be implementing code that will respond\
    \ to the media player’s `onPaused` event being triggered. When responding to media\
    \ events, you will be implementing `java.lang.Runnable`s.\n\nYou’ll be happy to\
    \ know that you’ve been using event properties and implementing `Runnable`s all\
    \ along. Hopefully you noticed this in all the recipes in this chapter. When the\
    \ media player is in a ready state, the `Runnable` code will be invoked. Why is\
    \ this correct? Well, when the media player is finished loading the media, the\
    \ `onReady` property will be notified. That way you can be sure you can invoke\
    \ the `MediaPlayer`’s `play()` method. I trust that you will get used to event\
    \ style programming. The following code snippet demonstrates the setting of a\
    \ `Runnable` instance into a media player object’s `OnReady` property:\n\n```\n\
    mediaPlayer.setOnReady(new Runnable() {\n    @Override\n    public void run()\
    \ {\n        mediaPlayer.play();\n    }\n});\n```\n\nYou will be taking steps\
    \ similar to the `onReady` property. Once a `Paused` event has been triggered,\
    \ the `run()` method will be invoked to present to the user a message containing\
    \ a `Text` node with the word `Paused` and a duration showing the time in milliseconds\
    \ into the video. Once displayed, you might want to write down the duration as\
    \ markers (as you’ll learn recipe 3-4). The following code snippet shows an attached\
    \ `Runnable` instance, which is responsible for displaying a paused message and\
    \ duration in milliseconds at the point in which it was paused in the video:\n\
    \n```\n// when paused event display pause message\nmediaPlayer.setOnPaused(new\
    \ Runnable() {\n    @Override\n    public void run() {\n        pauseMessage.setText(\"\
    Paused \\nDuration: \" +\nmediaPlayer.currentTimeProperty().getValue().toMillis());\n\
    \        pauseMessage.setOpacity(.90);\n    }\n});\n```\n\n### 3-4. Marking a\
    \ Position in a Video\n\n#### Problem\n\nYou want to provide closed caption text\
    \ while playing a video in the media player.\n\n#### Solution\n\nBegin by applying\
    \ recipe 3-3. By obtaining the marked durations (in milliseconds) from the previous\
    \ recipe you will create media marker events at points into the video. With each\
    \ media marker you will associate text that will be displayed as closed captions.\
    \ When a marker comes to pass, a text will be shown to the upper-right side.\n\
    \nThe following code snippet demonstrates media marker events being handled in\
    \ the `onDragDropped` event property of the `Scene` object:\n\n```\n... // inside\
    \ the start() method\n\nfinal VBox messageArea = createClosedCaptionArea(scene);\n\
    root.getChildren().add(messageArea);\n\n// Dropping over surface\nscene.setOnDragDropped(new\
    \ EventHandler<DragEvent>() {\n\n    @Override\n    public void handle(DragEvent\
    \ event) {\n        Dragboard db = event.getDragboard();\n\n        ... // drag\
    \ dropped code goes here\n\n        // load media\n        Media media = new Media(resourceUrlOrFile.toString());\n\
    \n        ... // clean up media player\n\n        // create a new media player\n\
    \        mediaPlayer = MediaPlayerBuilder.create()\n                .media(media)\n\
    \                .build();\n\n        ...// Set media 'onXXX' event properties\n\
    \n        mediaView.setMediaPlayer(mediaPlayer);\n\n        media.getMarkers().put(\"\
    Starting race\", Duration.millis(1959.183673));\n        media.getMarkers().put(\"\
    He is begining \\nto get ahead\", Duration.millis(3395.918367));\n        media.getMarkers().put(\"\
    They are turning \\nthe corner\", Duration.millis(6060.408163));\n        media.getMarkers().put(\"\
    The crowds cheer\", Duration.millis(9064.489795));\n        media.getMarkers().put(\"\
    He makes the \\nfinish line\", Duration.millis(11546.122448));\n\n        // display\
    \ closed captions\n        mediaPlayer.setOnMarker(new EventHandler<MediaMarkerEvent>\
    \ (){\n            public void handle(MediaMarkerEvent event){\n             \
    \   closedCaption.setText(event.getMarker().getKey());\n            }\n      \
    \  });\n        event.setDropCompleted(success);\n        event.consume();\n \
    \   }\n}); // end of setOnDragDropped()\n```\n\nShown following is a factory method\
    \ that returns an area that will contain the closed caption to be displayed to\
    \ the right of the video:\n\n```\nprivate VBox createClosedCaptionArea(final Scene\
    \ scene) {\n    // create message area\n    final VBox messageArea = new VBox(3);\n\
    \    messageArea.setTranslateY(30);\n    messageArea.translateXProperty().bind(scene.widthProperty().subtract(152)\
    \ );\n    messageArea.setTranslateY(20);\n    closedCaption = TextBuilder.create()\n\
    \        .stroke(Color.WHITE)\n        .fill(Color.YELLOW)\n        .font(new\
    \ Font(15))\n        .build();\n    messageArea.getChildren().add(closedCaption);\n\
    \    return messageArea;\n}\n```\n\n[Figure 3-5](#Chapter03.html#fig_3_5) depicts\
    \ the video media player displaying closed caption text.\n\n![images](images/0305.jpg)\n\
    \n***Figure 3-5.** Closed caption text*"
