- fmt: "#### How It Works\n\nThe first shape is a `javafx.scene.shape.CubicCurve`\
    \ class. To create a cubic curve, you simply look for the appropriate constructor\
    \ to be instantiated. A cubic curve’s main parameters that you will be setting\
    \ are its start X, start Y, control point 1 X, control point 1 Y, control point\
    \ 2 X, control point 2 Y, end X, end Y. The `startX`, `startY`, `endX`, `endY`\
    \ parameters are the starting point and ending point of a curve. The `controlX1`,\
    \ `controlY1`, `controlX2`, `controlY2` denote control point 1 and control point\
    \ 2. A control point is a point that pulls the curve towards the direction of\
    \ the point itself. In our example, we simply have a control point 1 above to\
    \ pull the curve upward to form a hill and control point 2 below to pull the curve\
    \ downward to form a valley. The following illustration ([Figure 1-11](#Chapter01.html#fig_1_11))\
    \ depicts a Cubic Curve with control points influencing the curve:\n\n![images](images/0111.jpg)\n\
    \n***Figure 1-11.** Cubic Curve*\n\nThe following code snippet is used to create\
    \ a `javafx.scene.shape.CubicCurve` instance:\n\n```\nCubicCurve cubicCurve =\
    \ new CubicCurve();\ncubicCurve.setStartX(50);     // start pt (x1,y1)\ncubicCurve.setStartY(75);\
    \  \ncubicCurve.setControlX1(80);  // control pt1\ncubicCurve.setControlY1(-25);\n\
    cubicCurve.setControlX2(110); // control pt2\ncubicCurve.setControlY2(175);\n\
    cubicCurve.setEndX(140);      // end pt (x2,y2)\ncubicCurve.setEndY(75);\n```\n\
    \nBut, right off the bat in the source code listing in the solution section, you’ll\
    \ notice that I didn’t use the usual `new CubicCurve()` constructor like the previous\
    \ snippet, but instead I use a class having a suffix of `Builder` on the end of\
    \ it. `Builder` classes are convenience classes that follow a design pattern called\
    \ the Builder pattern. `Builder` classes provide a way to method chain invocations\
    \ by enabling the developer to specify attributes in an ad hoc way (declarative).\
    \ This makes code more readable and less verbose, thus increasing developer productivity.\
    \ When using this facility while developing graphics applications, you may also\
    \ find that coding tends to be more expressive and reminiscent of declarative\
    \ type languages (Visage, Groovy, Scala, and Python).\n\nBack to `CubicCurveBuilder`;\
    \ we begin with the `create()` method that will instantiate a `Builder` class.\
    \ Next is specifying a cubic curve’s attributes in any order. Similar to mutators\
    \ or setter methods, you simply pass a single value to the method. The convention\
    \ is that the `set` prefixed on the method is removed, and the method returns\
    \ the `this` pointer of the builder object instance. By returning itself it allows\
    \ you to continue to use the dot notation to specify parameters, thus the method\
    \ chaining behavior. Once finished with specifying values on the `Builder` class,\
    \ a call to the `build()` method will return an instance of the desired class\
    \ (in this case, the `CubicCurve` class).\n\nThe ice cream cone shape is created\
    \ using the `javafx.scene.shape.Path` class. As each path element is created and\
    \ added to the `Path` object, each element is *not* considered a graph node (`javafx.scene.Node`).\
    \ This means they do not extend from the `javafx.scene.shape.Shape` class and\
    \ cannot be a child node in a `scene` graph to be displayed. When looking at the\
    \ Javadoc, you will notice that a `Path` class extends from the `Shape` class\
    \ that extends from the (`javafx.scene.Node`) class, and therefore a `Path` is\
    \ a graph node, but path elements do not extend from the `Shape` class. Path elements\
    \ actually extend from the `javafx.scene.shape.PathElement` class, which is only\
    \ used in the context of a `Path` object. So you won’t be able to instantiate\
    \ a `LineTo` class to be put in the `scene` graph. Just remember that the classes\
    \ with `To` as a suffix is a path element, not a real `Shape` node. For example,\
    \ the `MoveTo` and `LineTo` object instances are `Path` elements added to a `Path`\
    \ object, not shapes that can be added to the scene. Shown following are `Path`\
    \ elements added to a `Path` object to draw an ice cream cone:\n\n```\n// Ice\
    \ cream\nPath path = new Path();\n\nMoveTo moveTo = new MoveTo();\nmoveTo.setX(50);\n\
    moveTo.setY(150);\n\n...// Additional Path Elements created.\nLineTo lineTo1 =\
    \ new LineTo();\nlineTo1.setX(50);\nlineTo1.setY(150);\n\n...// Additional Path\
    \ Elements created.\n\npath.getElements().add(moveTo);\npath.getElements().add(quadCurveTo);\n\
    path.getElements().add(lineTo1);\n```\n\nRendering the `QuadCurve` (smile) object\
    \ I used the `QuadCurveBuilder` class similar to the `CubicCurveBuilder` class,\
    \ and you’ll notice the simplicity of creating such a shape. This is similar to\
    \ the cubic curve example described above in the first shape. Instead of two control\
    \ points you only have one control point. Shown below ([Figure 1-12](#Chapter01.html#fig_1_12))\
    \ is a `QuadCurve` shape with a control point below its starting and ending points:\n\
    \n![images](images/0112.jpg)\n\n***Figure 1-12.** Quadratic Curve*\n\nOnce your\
    \ builder class is complete you will finish things off by invoking the `build()`\
    \ method. Shown below is a quadratic curve with a stroke thickness of three pixels\
    \ filled with the color white:\n\n```\n// QuadCurve create a smile\nQuadCurve\
    \ quad = QuadCurveBuilder.create()\n        .startX(50)\n        .startY(50)\n\
    \        .endX(150)\n        .endY(50)\n        .controlX(125)\n        .controlY(150)\n\
    \        .strokeWidth(3)\n        .stroke(Color.BLACK)\n        .fill(Color.WHITE)\n\
    \        .build();\n```\n\nLast is our tasty donut shape with a drop shadow effect.\
    \ When creating the donut, we begin by creating two circular ellipses. By subtracting\
    \ the smaller ellipse (donut hole) from the larger ellipse area, a newly derived\
    \ `Shape` object is created and returned using the `Path.subtract()` method. Following\
    \ is the code snippet that creates the donut shape using the `Path.subtract()`\
    \ method:\n\n```\n// outer donut\nEllipse bigCircle = ...//Outer shape area\n\n\
    // donut hole\nEllipse smallCircle = ...// Inner shape area\n\n// make a donut\n\
    Shape donut = Path.subtract(bigCircle, smallCircle);\n```\n\nNext, is applying\
    \ a drop shadow effect onto our donut. A common technique is to draw the shape\
    \ filled black while the original shape is laid on top slightly offset to appear\
    \ as a shadow. However, in JavaFX we draw it once and use the `setEffect()` method\
    \ to apply a `DropShadow` object instance. To cast the shadow offset call the\
    \ `setOffsetX()` and `setOffsetY()` methods.\n\nOne last thing to point out is\
    \ that all shapes are drawn to be positioned underneath one another. As each shape\
    \ was created, you’ll notice their `translateY` property was set to reposition\
    \ or shift the shape from its original position. For example, if a shape’s upper\
    \ left bounding box point is created at (100, 100) and you want it to be moved\
    \ to (101, 101) the `translateX` and `translateY` properties would be set to one.\n\
    \n### 1-6. Assigning Colors to Objects\n\n#### Problem\n\nYou want to fill your\
    \ shapes with simple colors and gradient colors."
