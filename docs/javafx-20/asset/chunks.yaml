    #### 工作原理


    第一个图形是 `javafx.scene.shape.CubicCurve` 类。要创建一条三次曲线，你只需找到合适的构造函数进行实例化。你需要设置的三次曲线主要参数包括：起点
    X、起点 Y、控制点 1 X、控制点 1 Y、控制点 2 X、控制点 2 Y、终点 X、终点 Y。`startX`、`startY`、`endX`、`endY`
    参数是曲线的起点和终点。`controlX1`、`controlY1`、`controlX2`、`controlY2` 分别表示控制点 1 和控制点 2。控制点是一个将曲线拉向自身方向的点。在我们的示例中，我们简单地在上方设置了一个**控制点
    1** 将曲线向上拉，形成一个山峰；在下方设置了一个**控制点 2** 将曲线向下拉，形成一个山谷。下图（图 1-11）展示了一条受控制点影响的三次曲线：


    ![images](img/0111.jpg)


    ***图 1-11.** 三次曲线*


    以下代码片段用于创建一个 `javafx.scene.shape.CubicCurve` 实例：


    `CubicCurve cubicCurve = new CubicCurve();`

    `cubicCurve.setStartX(50);     // 起点 (x1,y1)`

    `cubicCurve.setStartY(75);  `

    `cubicCurve.setControlX1(80);  // 控制点 1`

    `cubicCurve.setControlY1(-25);`

    `cubicCurve.setControlX2(110); // 控制点 2`

    `cubicCurve.setControlY2(175);`

    `cubicCurve.setEndX(140);      // 终点 (x2,y2)`

    `cubicCurve.setEndY(75);`


    但是，在解决方案部分的源代码清单中，你会立即注意到我没有像前一个片段那样使用通常的 `new CubicCurve()` 构造函数，而是使用了一个以 `Builder`
    为后缀的类。`Builder` 类是遵循一种称为建造者模式的设计模式的便捷类。`Builder` 类通过允许开发者以即席方式（声明式）指定属性，提供了一种方法链式调用的方式。这使得代码更易读、更简洁，从而提高了开发者的生产力。在开发图形应用程序时使用此功能，你还会发现编码往往更具表现力，并让人联想到声明式语言（Visage、Groovy、Scala
    和 Python）。


    回到 `CubicCurveBuilder`；我们从 `create()` 方法开始，该方法将实例化一个 `Builder` 类。接下来是按任意顺序指定三次曲线的属性。类似于修改器或
    setter 方法，你只需向该方法传递一个值。约定是方法前缀的 `set` 被移除，并且该方法返回建造者对象实例的 `this` 指针。通过返回自身，它允许你继续使用点符号来指定参数，从而实现方法链式行为。在
    `Builder` 类上完成值指定后，调用 `build()` 方法将返回所需类的实例（在本例中为 `CubicCurve` 类）。


    冰淇淋蛋筒形状是使用 `javafx.scene.shape.Path` 类创建的。当每个路径元素被创建并添加到 `Path` 对象时，每个元素*不*被视为图形节点（`javafx.scene.Node`）。这意味着它们不继承自
    `javafx.scene.shape.Shape` 类，并且不能作为子节点添加到要显示的 `scene` 图形中。查看 Javadoc 时，你会注意到 `Path`
    类继承自 `Shape` 类，而 `Shape` 类又继承自 `javafx.scene.Node` 类，因此 `Path` 是一个图形节点，但路径元素并不继承自
    `Shape` 类。路径元素实际上继承自 `javafx.scene.shape.PathElement` 类，该类仅在 `Path` 对象的上下文中使用。因此，你无法实例化一个
    `LineTo` 类并将其放入 `scene` 图形中。只需记住，以 `To` 为后缀的类是路径元素，而不是真正的 `Shape` 节点。例如，`MoveTo`
    和 `LineTo` 对象实例是添加到 `Path` 对象的 `Path` 元素，而不是可以添加到场景中的形状。以下是将 `Path` 元素添加到 `Path`
    对象以绘制冰淇淋蛋筒的示例：


    `        // 冰淇淋`

    `        Path path = new Path();`


    `        MoveTo moveTo = new MoveTo();`

    `        moveTo.setX(50);`

    `        moveTo.setY(150);`


    `        ...// 创建额外的路径元素。`

    `        LineTo lineTo1 = new LineTo();`

    `        lineTo1.setX(50);`

    `        lineTo1.setY(150);`


    `        ...// 创建额外的路径元素。`


    `        path.getElements().add(moveTo);`

    `        path.getElements().add(quadCurveTo);`

    `        path.getElements().add(lineTo1);`


    渲染 QuadCurve（微笑）对象时，我使用了与 `CubicCurveBuilder` 类类似的 `QuadCurveBuilder` 类，你会注意到创建此类形状的简便性。这与上面第一个形状中描述的三次曲线示例类似。不同之处在于，这里只有一个控制点，而不是两个。下图（图
    1-12）展示了一个 `QuadCurve` 形状，其控制点位于起点和终点下方：


    ![images](img/0112.jpg)


    ***图 1-12.** 二次曲线*


    一旦你的建造者类完成，你将通过调用 `build()` 方法来收尾。下面展示了一条二次曲线，其描边粗细为三个像素，填充颜色为白色：


    `        // QuadCurve 创建一个微笑`

    `        QuadCurve quad =QuadCurveBuilder.create()`

    `                .startX(50)`

    `                .startY(50)`

    `                .endX(150)`

    `                .endY(50)`

    `                .controlX(125)`

    `                .controlY(150)`

    `                .strokeWidth(3)`

    `                .stroke(Color.BLACK)`

    `                .fill(Color.WHITE)`

    `                .build();`


    最后是我们美味的甜甜圈形状，带有投影效果。创建甜甜圈时，我们首先创建两个圆形椭圆。通过从较大的椭圆区域中减去较小的椭圆（甜甜圈洞），使用 `Path.subtract()`
    方法创建并返回一个新派生的 `Shape` 对象。以下是使用 `Path.subtract()` 方法创建甜甜圈形状的代码片段：


    `        // 外圈甜甜圈`

    `        Ellipse bigCircle = ...// 外部形状区域`


    `        // 甜甜圈洞`

    `        Ellipse smallCircle = ...// 内部形状区域`


    `        // 制作甜甜圈`

    `        Shape donut = Path.subtract(bigCircle, smallCircle);`


    接下来，为我们的甜甜圈应用投影效果。一种常见的技术是绘制一个填充为黑色的形状，然后将原始形状稍微偏移地叠放在其上方，以模拟阴影。然而，在 JavaFX 中，我们只需绘制一次，然后使用
    `setEffect()` 方法应用一个 `DropShadow` 对象实例。要设置阴影偏移，请调用 `setOffsetX()` 和 `setOffsetY()`
    方法。


    最后要指出的一点是，所有形状都被绘制并彼此上下堆叠放置。在创建每个形状时，你会注意到它们的 `translateY` 属性被设置，以重新定位或移动形状到其原始位置之外。例如，如果一个形状的左上角边界框点创建在
    (100, 100)，而你希望将其移动到 (101, 101)，则 `translateX` 和 `translateY` 属性应设置为 1。


    ### 1-6\. 为对象分配颜色


    #### 问题


    你想用纯色和渐变色填充你的形状。

