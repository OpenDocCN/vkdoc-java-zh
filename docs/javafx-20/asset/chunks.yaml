    #### 工作原理


    在照片查看器应用中，我决定加入动画效果。我主要关注的动画效果是平移和淡入淡出。首先，你将创建一个新闻滚动条控件，通过使用平移过渡（`javafx.animation.TranslateTransition`）让`Text`节点向左滚动。接着，当用户点击“上一张”和“下一张”按钮，从当前图片切换到下一张时，你将应用另一种淡入淡出效果。为了实现这种效果，你将使用一个由多个动画组成的复合过渡（`javafx.animation.SequentialTransition`）。最后，为了创建按钮控件根据鼠标位置淡入淡出的效果，你需要一个淡入淡出过渡（`javafx.animation.FadeTransition`）。


    在开始讨论实现需求的步骤之前，我想先提一下 JavaFX 动画的基础知识。JavaFX 动画 API 允许你组装定时事件，这些事件可以在节点的属性值之间进行插值，从而产生动画效果。每个定时事件被称为一个关键帧（`KeyFrame`），它负责在一段时间（`javafx.util.Duration`）内对`Node`的属性进行插值。知道了关键帧的作用是操作`Node`的属性值，你就需要创建一个`KeyValue`类的实例，该实例将引用所需的`Node`属性。插值的概念简单来说就是在起始值和结束值之间分配数值。例如，将一个矩形从其当前
    x 位置（零）在 1000 毫秒内移动到 100 像素；换句话说，就是将矩形向右移动 100 像素，耗时一秒。这里展示了一个关键帧和关键值，用于在 1000
    毫秒内对矩形的 x 属性进行插值：


    `final Rectangle rectangle = new Rectangle(0, 0, 50, 50);`

    `KeyValue keyValue = new KeyValue(rectangle.xProperty(), 100);`

    `KeyFrame keyFrame = new KeyFrame(Duration.millis(1000), keyValue);`


    当创建多个连续组装的关键帧时，你需要创建一个`TimeLine`。因为`TimeLine`是`javafx.animation.Animation`的子类，所以可以设置其标准属性，例如循环次数和自动反转。*循环次数*是你希望时间线播放动画的次数。如果你希望循环次数无限播放动画，请使用值`Timeline.INDEFINITE`。自动反转是指动画反向播放时间线的能力。默认情况下，循环次数设置为
    1，自动反转设置为 false。添加关键帧时，只需使用`TimeLine`对象上的`getKeyFrames().add()`方法即可。以下代码片段演示了一个无限播放且自动反转设置为
    true 的时间线：


    `Timeline timeline = new Timeline();`

    `timeline.setCycleCount(Timeline.INDEFINITE);`

    `timeline.setAutoReverse(true);`

    `timeline.getKeyFrames().add(``keyFrame``);`

    `timeline.play();`


    掌握了时间线的这些知识，你就可以在 JavaFX 中为任何图形节点制作动画。虽然你可以用底层方式创建时间线，但这可能会变得非常繁琐。你可能想知道是否有更简单的方法来表达常见的动画。好消息是！JavaFX
    提供了过渡（`Transition`），这些是用于执行常见动画效果的便捷类。一些常见的动画效果类如下：


    > *   `javafx.animation.FadeTransition`

    > *   `javafx.animation.PathTransition`

    > *   `javafx.animation.ScaleTransition`

    > *   `javafx.animation.TranslateTransition`


    要查看更多过渡效果，请参阅 Javadoc 中的`javafx.animation`。由于`Transition`对象也是`javafx.animation.Animation`类的子类，你将有机会设置循环次数和自动反转属性。在本教程中，你将重点学习两种过渡效果：平移过渡（`TranslateTransition`）和淡入淡出过渡（`FadeTransition`）。


    我们问题陈述中的第一个需求是创建一个新闻滚动条。创建新闻滚动条控件时，`Text`节点将在矩形区域内从右向左滚动。当文本滚动到矩形区域的左边缘时，你需要裁剪文本，以创建一个仅显示矩形内部像素的视口。在这里，我首先创建一个`Group`来容纳构成滚动条控件的所有组件。接下来，使用`RectangleBuilder`创建一个矩形，构建一个填充了
    55% 不透明度的白色圆角矩形。创建可视区域后，我使用`Group`对象上的`setClip(someRectangle)`方法创建一个表示裁剪区域的类似矩形。图
    2-5 显示了一个作为裁剪区域的圆角矩形区域：


    ![images](img/0205.jpg)


    ***图 2-5.** 在 Group 对象上设置裁剪区域*


    创建滚动条控件后，你将根据场景的高度属性减去滚动条控件的高度来绑定 translate Y。你还需要根据场景的宽度减去按钮控件的宽度来绑定滚动条控件的宽度属性。通过绑定这些属性，每当用户调整应用程序窗口大小时，滚动条控件都可以改变其大小和位置。这使得滚动条控件看起来像是浮动在窗口底部。以下代码绑定了滚动条控件的
    translate Y、宽度和裁剪区域的宽度属性：


    `tickerArea.translateYProperty().bind(scene.heightProperty().subtract(tickerRect.getHeight()
    +`

    `6));`

    `tickerRect.widthProperty().bind(scene.widthProperty().subtract(buttonRect.getWidth()
    + 16));`

    `clipRegion.widthProperty().bind(scene.widthProperty().subtract(buttonRect.getWidth()
    + 16));`

    `tickerArea.getChildren().add(tickerRect);`


    现在你已经完成了滚动条控件的创建，接下来需要创建新闻来输入其中。你将创建一个包含代表新闻推送文本的`Text`节点。要将新创建的`Text`节点添加到滚动条控件，请调用其`getChildren().add()`方法。以下代码将一个`Text`节点添加到滚动条控件：


    `final Group tickerArea = new Group();`

    `final Rectangle tickerRect = //...`

    `Text news = TextBuilder.create()`

    `    .text("JavaFX 2.0 新闻！ | 85 度，晴朗 | :)")`

    `    // ... 更多定义的属性`

    `    .build();`

    `// 将新闻添加到滚动条控件`

    `tickerArea.getChildren().add(news);`


    接下来是使用 JavaFX 的`TranslateTransition` API 将`Text`节点从右向左滚动。与许多 JavaFX 类一样，存在用于轻松创建对象的构建器类，你将使用`TranslateTransition`类相关的构建器类`TranslateTransitionBuilder`。第一步是设置执行`TranslateTransition`的目标节点。然后设置持续时间，即`TranslateTransition`在动画化时将花费的总时间。`TranslateTransition`通过公开操作`Node`的
    translate X 和 Y 属性的便捷方法，简化了动画的创建。这些便捷方法以`from`和`to`为前缀。例如，在你在`Text`节点上使用 translate
    X 的场景中，有`fromX()`和`toX()`方法。`fromX()`是起始值，`toX()`是将被插值的结束值。接下来，你将`TranslateTransition`设置为线性过渡（`Interpolator.LINEAR`），以便在起始值和结束值之间均匀插值。要查看更多插值器类型或了解如何创建自定义插值器，请参阅关于`javafx.animation.Interpolator`的
    Javadoc。最后，我将循环次数设置为 1，这将根据指定的持续时间将滚动条动画化一次。以下代码片段详细说明了创建一个将`Text`节点从右向左动画化的`TranslateTransition`：


    `final TranslateTransition ticker = TranslateTransitionBuilder.create()`

    `        .node(news)`

    `        .duration(Duration.millis((scene.getWidth()/300) * 15000))`

    `        .fromX(scene.widthProperty().doubleValue())`

    `        .toX(-scene.widthProperty().doubleValue())`

    `        .fromY(19)`

    `        .interpolator(Interpolator.LINEAR)`

    `        .cycleCount(1)`

    `        .build();`


    当滚动条的新闻完全滚出滚动条区域，到达场景的最左侧时，你需要停止并从起始位置（最右侧）重新播放新闻推送。为此，你将创建一个`EventHandler<ActionEvent>`对象的实例，并使用`setOnFinished()`方法将其设置在滚动条（`TranslateTransition`）对象上。这里展示了如何重播`TranslateTransition`动画：


    `// 当窗口在宽度方向上调整大小时，滚动条将知道移动多远`

    `ticker.setOnFinished(new EventHandler<ActionEvent>() {`

    `    public void handle(ActionEvent ae){`

    `        ticker.stop();`

    `        ticker.setFromX(scene.getWidth());`

    `        ticker.setDuration(new Duration((scene.getWidth()/300) * 15000));`

    `        ticker.playFromStart();`

    `    }`

    `});`


    一旦动画定义完毕，你只需调用`play()`方法即可启动它。以下代码片段展示了如何播放一个`TranslateTransition`：


    `ticker.play();`


    现在你对动画过渡有了更好的理解，那么能够触发任意数量过渡的过渡呢？JavaFX 有两个提供此行为的过渡。这两个过渡可以顺序或并行地调用各个独立的过渡。在本教程中，我使用顺序过渡（`SequentialTransition`）来包含两个`FadeTransition`，以便淡出当前显示的图像并淡入下一张图像。在创建“上一张”和“下一张”按钮的事件处理器时，你首先通过调用`gotoImageIndex()`方法确定要显示的下一个图像。一旦确定了要显示的下一个图像，你将调用`transitionByFading()`方法，该方法返回一个`SequentialTransition`的实例。调用`transitionByFading()`方法时，你会注意到创建了两个`FadeTransition`。第一个过渡将不透明度级别从
    1.0 更改为 0.0，以淡出当前图像；第二个过渡将不透明度级别从 0.0 插值到 1.0，淡入下一张图像，该图像随后成为当前图像。最后，将两个`FadeTransition`添加到`SequentialTransition`并返回给调用者。以下代码创建了两个`FadeTransition`并将它们添加到一个`SequentialTransition`中：


    `FadeTransition fadeOut = new FadeTransition(Duration.millis(500), imageView);`

    `fadeOut.setFromValue(1.0);`

    `fadeOut.setToValue(0.0);`

    `fadeOut.setOnFinished(new EventHandler<ActionEvent>() {`

    `    public void handle(ActionEvent ae) {`

    `         imageView.setImage(nextImage);`

    `    }`

    `});`


    `FadeTransition fadeIn = new FadeTransition(Duration.millis(500), imageView);`

    `fadeIn.setFromValue(0.0);`

    `fadeIn.setToValue(1.0);`

    `SequentialTransition seqTransition = SequentialTransitionBuilder.create()`

    `        .children(fadeOut, fadeIn)`

    `        .build();`


    对于与淡入淡出相关的最后一个需求，你将使用按钮控件。你将再次使用`FadeTransition`来创建一种幽灵般的动画效果。首先，就像你感兴趣的任何事件一样，你将创建一个`EventHandler`（更具体地说，是一个`EventHandler<MouseEvent>`）。向场景添加鼠标事件非常简单；你所要做的就是重写`handle()`方法，其中入参是`MouseEvent`类型（与其形式类型参数相同）。在`handle()`方法内部，你将使用接受持续时间和节点作为参数的构造函数创建一个`FadeTransition`对象的实例。接下来，你会注意到调用了`setFromValue()`和`setToValue()`方法，用于在不透明度级别
    1.0 和 0.0 之间插值，从而产生淡入效果。以下代码添加了一个`EventHandler`，用于在鼠标光标位于场景内部时创建淡入效果：


    `// 淡入按钮控件`

    `scene.setOnMouseEntered(new EventHandler<MouseEvent>() {`

    `    public void handle(MouseEvent me) {`

    `        FadeTransition fadeButtons = new FadeTransition(Duration.millis(500),
    buttonGroup);`

    `        fadeButtons.setFromValue(0.0);`

    `        fadeButtons.setToValue(1.0);`

    `        fadeButtons.play();`

    `    }`

    `});`


    最后但同样重要的是，淡出`EventHandler`与淡入基本相同，只是不透明度的`From`和`To`值是从 1.0 到 0.0，这使得当鼠标指针移出场景区域时，按钮会神秘地消失。

