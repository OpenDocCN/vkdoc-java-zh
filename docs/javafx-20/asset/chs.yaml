  \ 索引\n\n\n\n## 关于作者\n\n![image](img/carl_p_dea.jpg) ![images](img/square.jpg) **卡尔·P·迪亚**目前是\
  \ BCT-LLC 公司的软件工程师，从事高性能计算（HPC）架构项目。他拥有 15 年软件开发经验，客户涵盖《财富》500 强企业及非营利组织。他编写的软件涵盖关键任务型应用到\
  \ Web 应用。卡尔自 Java 诞生之初便开始使用该语言，同时也是 JavaFX 的狂热爱好者，早在该技术还被称为 F3 时便已开始关注。他对软件开发的热情始于中学科学老师向他展示\
  \ TRS-80 计算机的那一刻。卡尔目前专注于富客户端应用、游戏编程、Arduino、手机和平板电脑开发。工作之余，他和妻子喜欢观看女儿们的体操比赛。卡尔居住在美国东海岸马里兰州帕萨迪纳（又称“德纳”）。\n\
  \n## 关于技术审校\n\n![images](img/square.jpg) **大卫·科芬**是 Apress 出版社《专家 Oracle》和《Java\
  \ 安全》的作者。他是萨凡纳河工厂（美国能源部大型设施）的 IT 分析师。30 多年来，大卫的专业领域涵盖多平台网络集成和系统编程。在加入萨凡纳河工厂之前，他曾为多家国防承包商工作，并在俄亥俄州赖特-帕特森空军基地的国家空天飞机联合项目办公室担任办公与网络计算技术负责人。作为终身学习者，他拥有一个硕士学位，并正在攻读另一个学位。作为顾家的男人，大卫养育了八个孩子。他是一名铁人三项运动员和长距离游泳选手，成绩处于中游水平。他还是一名古典吉他手，但并未因此放弃本职工作。\n\
  \n## 引言\n\nJavaFX 2.0 是 Java 的下一代图形用户界面（GUI）工具包，旨在帮助开发者快速构建丰富的跨平台应用。JavaFX 从零开始设计，通过硬件加速图形技术充分利用现代\
  \ GPU，同时提供精心设计的编程接口，使开发者能够整合图形、动画和 UI 控件。全新的 JavaFX 2.0 是一个纯 Java 语言的应用程序编程接口（API）。\n\
  \nJavaFX 2.0 API 的关键架构策略包括复用现有 Java 库，以及桥接在 JVM 上运行的其他语言（Visage、Jython、Groovy、JRuby\
  \ 和 Scala）之间的通信。\n\nOracle 公司的南迪尼·拉马尼在《JavaFX 2.0 介绍》截屏视频中明确阐述了 JavaFX 平台的预期发展方向：\n\
  \n> *“行业正朝着配备 GPU 的多核/多线程平台发展。JavaFX 2.0 利用这些特性提升执行效率和 UI 设计灵活性。我们的首要目标是为企业应用的架构师和开发者提供一套工具和\
  \ API，帮助他们构建更好的数据驱动型业务应用。”*\n\n——南迪尼·拉马尼\nOracle 公司\nJava 客户端平台开发副总裁\n\n### 历史回顾\n\
  \n2005 年，Sun Microsystems 收购了 SeeBeyond 公司，该公司一位名叫克里斯·奥利弗的软件工程师创建了名为 F3（形式追随功能）的图形丰富脚本语言。F3\
  \ 后来由 Sun Microsystems 在 2007 年 JavaOne 大会上以 JavaFX 之名正式发布。\n\n2009 年 4 月 20 日，Oracle\
  \ 公司宣布收购 Sun Microsystems，成为 JavaFX 的新管理者。在 2010 年 JavaOne 大会上，Oracle 公布了 JavaFX\
  \ 路线图。作为路线图的一部分，Oracle 宣布计划逐步淘汰 JavaFX 脚本语言，并为 Java 语言和平台重新打造 JavaFX。\n\n根据 2010\
  \ 年路线图的承诺，JavaFX 2.0 SDK 于 2011 年 10 月 3 日在 JavaOne 大会上发布。Oracle 还宣布将致力于推动 JavaFX\
  \ 成为开源产品，从而让社区共同推动平台发展。开源 JavaFX 将提升其采用率，加快缺陷修复速度，并催生新的增强功能。\n\n表 0-1 展示了 JavaFX\
  \ 主要版本的整体历史。\n\n![images](img/t0I01.jpg)\n\n### 本书的编写方法\n\n本书书名已说明一切：《JavaFX 2.0\
  \ 入门实例》。在本书中，您将通过实践性的示例教程学习 JavaFX 2.0 的新功能。这些教程将为您提供创建自己的富客户端应用所需的知识。与 Java“一次编写，随处运行”的理念一脉相承，JavaFX\
  \ 也秉持同样的精神。由于 JavaFX 2.0 完全用 Java 语言编写，您将感到得心应手。\n\n大多数示例可在 Java 6 下编译运行。但部分示例将利用\
  \ Java 7 的语言增强特性，因此需要 Java 7 环境。在通过本书学习 JavaFX 2.0 和 Java 7 的过程中，您将发现新的 API 和语言增强特性有助于提高开发效率。正因如此，我鼓励您探索\
  \ Java 7 的所有新功能。要深入了解 Java 7 的新特性，我推荐《Java 7 实例》一书。另外，本书中的示例也可在《Java 7 实例》中找到。\n\
  \n本书涵盖 JavaFX 2.0 的基础知识、图形与动画、音频与视频以及 Web 技术。基础知识包括如何安装必备软件（JavaFX 2.0、NetBeans\
  \ 7.1）和创建简单用户界面。您还将学习场景图、文本节点与字体样式、形状、颜色、布局、菜单、UI 控件、简单样式（CSS 样式）、绑定表达式、后台进程、键盘快捷键和对话框的基础知识。接下来，在图形与动画部分，您将接触图像处理、拖放操作、动画\
  \ API 和 UI 主题（外观与风格）。图形与动画之后，您将学习音频与视频。本节包括创建 MP3 播放器、使用视频播放器、响应媒体事件、处理媒体标记事件以及将动画与媒体事件同步。最后，您将使用\
  \ JavaFX 2.0 与 HTML5、JavaScript 和 XML 等 Web 技术互操作。在本节中，您将学习如何将 JavaFX 嵌入网页、渲染和动态操作\
  \ HTML5 内容、创建响应 HTML 事件的天气应用，以及使用嵌入式数据库（Derby）创建 RSS 订阅应用。\n\n### 本书面向的读者\n\n如果您是希望将客户端应用提升到新水平的\
  \ Java 开发者，本书将成为您的指南，帮助您开始创建实用且美观的用户界面。如果您使用的平台未在上表中列出，不必担心——当您阅读本书时，JavaFX 2.0\
  \ 应该已经支持您喜爱的操作系统。\n\n### 本书的结构安排\n\n本书按照从入门到中级概念的自然递进顺序编排。对于 Java 开发者而言，本书提及的所有概念都不应难以理解。本书的示例采用问题-解决方案的格式呈现。在简要描述实际应用问题后，逐步解决方案将解释最适合解决该问题的技术。每个示例都可轻松调整以满足您在开发游戏、媒体播放器或常规企业应用时的特定需求。您的\
  \ Java UI 开发经验越丰富，就越能自由地跳转到本书的不同章节和示例。不过，任何 Java 开发者都可以循序渐进地学习本书，掌握增强日常 GUI 应用所需的技能。\n\
  \n\n\n### 下载代码\n\n本书示例的源代码均可获取。你可以从 Apress 网站上本书的目录页面下载这些代码。网址是 [`http://www.apress.com/9781430242574`](http://www.apress.com/9781430242574)。代码将以\
  \ `.zip` 文件形式提供，并按章节组织。\n\n## 第 1 章\n\n## JavaFX 基础\n\nJavaFX 2.0 API 是 Java 的下一代\
  \ GUI 工具包，供开发者构建丰富的跨平台应用程序。JavaFX 2.0 基于场景图范式（保留模式），而非传统的即时模式渲染风格。JavaFX 的场景图是一种树状数据结构，用于维护基于矢量的图形节点。JavaFX\
  \ 的目标是应用于多种设备类型，例如移动设备、智能手机、电视、平板电脑和台式机。\n\n在 JavaFX 诞生之前，开发富互联网应用程序（RIA）需要整合许多独立的库和\
  \ API，才能实现功能强大的应用程序。这些独立的库包括媒体、UI 控件、Web、3D 和 2D API。由于将这些 API 整合在一起相当困难，Sun Microsystems（现为\
  \ Oracle）才华横溢的工程师们创建了一套新的 JavaFX 库，将所有相同功能整合到一个屋檐下。JavaFX 堪称 GUI 领域的瑞士军刀（参见图 1-1）。JavaFX\
  \ 2.0 是一个纯 Java（语言）API，允许开发者利用现有的 Java 库和工具。\n\n![images](img/0101.jpg)\n\n***图\
  \ 1-1.** JavaFX*\n\n根据你交谈的对象不同，你可能会遇到对“用户体验”（或在 UI 领域，UX）的不同定义。但有一个事实依然不变：用户总是期望\
  \ GUI 应用程序提供更好的内容和更高的可用性。鉴于此，开发者和设计师经常携手合作，共同打造满足这一需求的应用程序。JavaFX 提供了一个工具包，帮助开发者和设计师（在某些情况下，他们可能是同一个人）创建既实用又美观的应用程序。另外需要承认的是，无论你是在开发游戏、媒体播放器，还是常见的企业级应用程序，JavaFX\
  \ 不仅能帮助你开发更丰富的用户界面，你还会发现其 API 设计得极为出色，能大幅提升开发者的生产力（我完全是从 API 使用者的角度出发）。\n\n尽管本书并未详尽研究\
  \ JavaFX 2.0 的所有功能，但你会找到一些常见的用例，它们能帮助你构建更丰富的应用程序。希望这些范例能通过提供实用且贴近现实的示例，为你指明正确的方向。我也鼓励你探索其他资源，以更深入地了解\
  \ JavaFX。我强烈推荐《Pro JavaFX Platform》（Apress，2009 年）以及即将出版的《Pro JavaFX 2.0 Platform》（Apress，2012\
  \ 年），这些都是非常宝贵的资源。这些书籍会深入讲解，帮助你创建专业级的应用程序。\n\n那么，闲话少叙，我们开始吧，好吗？\n\n### 1-1. 安装所需软件\n\
  \n#### 问题\n\n你想开始开发 JavaFX 应用程序，但不知道需要安装哪些软件。\n\n#### 解决方案\n\n你需要安装以下软件才能开始使用 JavaFX：\n\
  \n> *   Java 7 JDK 或更高版本\n> *   JavaFX 2.0 SDK\n> *   NetBeans IDE 7.1 或更高版本\n\n\
