  `        .build();`\n\n`tickerArea.setClip(clipRegion);`\n\n`// 当窗口调整大小时，重新调整滚动条区域的大小`\n\
  `tickerArea.setTranslateX(6);`\n`tickerArea.translateYProperty().bind(scene.heightProperty().subtract(tickerRect.getHeight(`\n\
