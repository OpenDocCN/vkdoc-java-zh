  \n#### 工作原理\n\n要创建一个 RSS 阅读器，你需要存储订阅源位置以便稍后阅读。添加新 RSS 订阅源时，你需要找到那个橙色的小图标按钮，并将 URL\
  \ 地址行拖拽到你的 JavaFX RSS 阅读器应用程序中。我发现拖拽操作在我的 FireFox 浏览器上有效。不过，我也提供了一个文本字段，方便你复制粘贴\
  \ URL。输入一个 URL 并按回车键，即可开始加载该 URL 订阅源的标题新闻。例如，你可以访问 Google 科技新闻的 RSS 订阅源，地址为：\n[`news.google.com/news?pz=1&cf=all&ned=us&hl=en&topic=tc&output=rss`](http://news.google.com/news?pz=1&cf=all&ned=us&hl=en&topic=tc&output=rss)\n\
  \n图 4-12 展示了左上角的橙色 RSS 图标。\n\n![images](img/0412.jpg)\n\n***图 4-12.** RSS 图标*\n\n\
  你可以拖拽 URL，或者将其输入到文本字段中。JavaFX RSS 阅读器应用程序会将 URL 位置保存到数据库。RSS 应用程序包含三个框架区域：RSS 订阅源标题列（左侧）、标题新闻（右上）和网站视图（右下）。要显示新闻标题，请点击左侧的超链接。要在右下角框架中显示整篇文章，请点击右上角框架中标题下方的“查看”按钮。在运行代码之前，应用程序需要将\
  \ `derby.jar` 和 `derbytools.jar` 这两个 jar 库包含到你的项目类路径中。这些库允许你将 RSS URL 保存到嵌入式 JDBC\
  \ 数据库中。\n\n与你在方案 4-3 中所做的类似，你需要从互联网上检索新闻信息。检索到的 RSS 将使用 2.0 版本。RSS 是一种提供真正简易聚合（Really\
  \ Simple Syndication）的 XML 标准，因此缩写为 RSS。现在关于缩写词说得够多了；让我们直接进入代码，好吗？\n\n在我们的 `start()`\
  \ 方法中，你将创建一个 640x480 的白色场景显示区域。接下来，你将创建一个映射（`TreeMap`），其中包含 `Hyperlink` 对象作为值，以及代表\
  \ RSS 订阅源 URL 位置（`String`）的键。与之前显示 HTML 内容时一样，你需要创建 `WebView`。这里你将创建两个 `WebView`\
  \ 和一个 `WebEngine`。这两个 `WebView` 将分别渲染新闻标题框架区域和整篇文章的查看区域（右下角）。单个 `WebEngine` 负责在用户点击包含\
  \ RSS 超链接的左侧框架区域时检索 RSS 订阅源。\n\n为了支持用户输入 RSS 订阅源的功能，你需要创建一个能够保存并渲染标题新闻的文本字段。以下是保存\
  \ RSS URL 并将其地址作为新超链接添加到订阅源列表的代码片段：\n\n`        final VBox leftArea = new VBox(10);`\n\
  `        final TextField urlField = new TextField();`\n`        urlField.setOnAction(new\
  \ EventHandler<ActionEvent>(){`\n`            public void handle(ActionEvent ae){`\n\
  `                String url = urlField.getText();`\n`                final Hyperlink\
  \ jfxHyperLink = createHyperLink(url, webEngine);`\n`                hyperLinksMap.put(url,\
  \ jfxHyperLink);`\n`                HBox rowBox = new HBox(20);`\n`                rowBox.getChildren().add(jfxHyperLink);`\n\
  `                leftArea.getChildren().add(rowBox);`\n`                webEngine.load(url);`\n\
  `                urlField.setText(\"\");`\n`            }`\n`        }); // urlField\
  \ setOnAction() 结束`\n\n当用户点击超链接时，新闻检索即被触发。一旦 `webEngine`（`WebEngine`）对象成功完成检索，你需要添加一个\
  \ `ChangeListener` 实例，以便在状态属性更改为 `State.SUCCEEDED` 时做出响应。当状态为 `State.SUCCEEDED`\
  \ 时，你将开始解析从 `WebEngine` 的 `getDocument()` 方法返回的 XML DOM。同样，我提供了一个名为 `parse()` 的便捷方法，用于查询代表\
  \ RSS 新闻信息的 `Document` 对象。\n\n`RssFeed rssFeed = parse(webEngine.getDocument(),\
  \ webEngine.getLocation());`\n\n接下来，你将创建一个 HTML 页面，列出频道标题和返回的新闻标题总数。在创建了用于显示 RSS\
  \ 频道标题和文章数量的 HTML 之后，你将遍历所有新闻标题以构建记录集或行。每一行将包含一个标记为“查看”的 HTML 按钮，用于通知 `WebEngine`\
  \ 对象一个包含文章 URL 的警报。当 `WebEngine` 对象收到通知时，`OnAlert` 属性将包含一个事件处理程序，用于在右下角分割区域的框架中渲染整篇文章。网页组装完成后，你将调用\
  \ `newsBrief` 对象的 `getEngine().loadContent()` 方法来渲染页面。渲染完成后，你将通过调用 `DBUtils.saveRssFeed(rssFeed)`\
  \ 将 URL `rssFeed`（`RssFeed`）对象保存到数据库。为方便起见，`saveRssFeed()` 方法会检查重复项。\n\n![images](img/square.jpg)\
  \ **注意**：要查看与数据库持久化（DBUtils.java）相关的完整源代码，请访问本书的目录页面：[`http://www.apress.com/9781430242574`](http://www.apress.com/9781430242574)。在那里，你可以下载本书的示例代码。\n\
  \n以下代码加载要渲染的网页，并保存新添加的 `rssFeed` URL：\n\n`newsBrief.getEngine().loadContent(content);`\n\
  `// 如果尚未存在，则写入磁盘。`\n`DBUtils.saveRssFeed(rssFeed);`\n\n与之前的方案一样，当按下新的标题“查看”按钮时，你将响应\
  \ HTML `WebEvent`，该按钮会调用 JavaScript 的 `alert()` 函数。以下是处理包含文章完整 URL 字符串的 web 事件（`WebEvent`）的代码片段，该\
  \ URL 用于在右下角区域框架中查看：\n\n`newsBrief.getEngine().setOnAlert(new EventHandler<WebEvent<String>>(){`\n\
  `   public void handle(WebEvent<String> evt) {`\n`      websiteView.getEngine().load(evt.getData());`\n\
  `   }`\n`});`\n\n在创建包含 HTML 按钮（用于渲染文章网页）的标题区域（右上角）时，你会注意到 `alert()` 函数中包含要加载并在下方分割框架区域中渲染的\
  \ URL。以下是生成的 HTML 示例，用于包含一个“查看”按钮的标题新闻，该按钮可以通知 web 引擎的 `OnAlert` web 事件（`WebEvent`）。\n\
  \n`<input type=\"button\" onclick=\"alert('http://carlfx.wordpress.com/2009/08/03/javafx-forms-`\n\
  `framework-part-2/')\" value=\"查看\" />`\n\n最后要指出的是，RSS 应用程序缺少一些功能。我想到的一个功能是能够删除左侧列区域中的单个\
  \ RSS 超链接。一种变通方法是通过删除文件系统上的数据库来移除所有链接。由于 Derby 是一个嵌入式数据库，你可以删除包含该数据库的目录。如果数据库不存在，JavaFX\
  \ RSS 应用程序将重新创建一个空数据库。希望你能添加新功能来增强这个有趣且实用的应用程序。\n\n## 索引\n\n\n\n### ![images](img/square1.jpg)\
