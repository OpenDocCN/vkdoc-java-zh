  \n图 1-15 描绘了一个包含 UI 控件的小型表单，这些控件使用网格面板布局节点进行布局。\n\n![images](img/0115.jpg)\n\n***图\
  \ 1-15.** 向布局添加控件*\n\n\n\n#### 工作原理\n\n构建用户界面时最大的挑战之一是将控件布局到显示区域上。在开发 GUI 应用程序时，理想的情况是允许用户移动和调整可视区域的大小，同时保持良好的用户体验。与\
  \ Java Swing 类似，JavaFX 布局提供了内置布局，这些布局提供了在场景图上显示 UI 控件的最常用方式。本示例演示了 `GridPane` 类。在开始之前，我想解释一下\
  \ JavaFX 2.0 提供的两种常见布局。它们是水平盒子（`HBox`）和垂直盒子（`VBox`）布局节点。这两种常见布局将在后续示例中使用，以便场景图管理子节点。HBox\
  \ 将包含子节点，这些子节点会占用可用的水平空间（随着节点的添加）。VBox 将包含子节点，这些子节点会占用可用的垂直空间（随着节点的添加）。\n\n首先，我们创建一个\
  \ `GridPane` 实例。接着，我们使用 `Inset` 对象的实例来设置内边距。设置内边距后，我们只需设置水平和垂直间距。以下代码片段实例化了一个网格面板（`GridPane`），其内边距、水平间距和垂直间距均设置为\
  \ 5（像素）：\n\n`GridPane gridpane = new GridPane();`\n`gridpane.setPadding(new Insets(5));`\n\
  `gridpane.setHgap(5);`\n`gridpane.setVgap(5);`\n\n内边距是指区域内容周围的上、右、下、左间距（以像素为单位）。在获取首选大小时，内边距将包含在计算中。设置水平和垂直间距与单元格内\
  \ UI 控件之间的间距有关。\n\n接下来就是将每个 UI 控件放入其各自的单元格位置。所有单元格都是从零开始计数的。以下是一个代码片段，它将一个保存按钮 UI\
  \ 控件添加到网格面板布局节点（`GridPane`）的 (1, 2) 单元格中：\n\n`gridpane.add(saveButt, 1, 2);`\n\n\
  该布局还允许您在单元格内水平或垂直对齐控件。以下代码语句将保存按钮右对齐：\n\n`GridPane.setHalignment(saveButt, HPos.RIGHT);`\n\
  \n### 1-9. 生成边框\n\n#### 问题\n\n您想要创建并自定义图像周围的边框。\n\n#### 解决方案\n\n创建一个应用程序，使用 JavaFX\
  \ 的 CSS 样式 API 动态自定义边框区域。\n\n以下代码创建了一个应用程序，其中包含一个 CSS 编辑器文本区域和一个围绕图像的边框视图区域。默认情况下，编辑器的文本区域将包含\
  \ JavaFX 样式选择器，这些选择器会在图像周围创建一条蓝色虚线。您可以通过单击“Bling!”按钮来修改 CSS 编辑器中的样式选择器值，以应用边框设置。\n\
  \n`primaryStage.setTitle(\"Chapter 1-9 Generating Borders\");`\n`Group root = new\
  \ Group();`\n`Scene scene = new Scene(root, 600, 330, Color.WHITE);`\n\n`// 创建一个网格面板`\n\
  `GridPane gridpane = new GridPane();`\n`gridpane.setPadding(new Insets(5));`\n`gridpane.setHgap(10);`\n\
