  \ 主目录的默认位置。你可能需要记下此位置，以便在第 6 步中配置你的 CLASSPATH。\n\n图 1-3 显示了安装选项，允许你指定 JavaFX 2.0\
  \ SDK 的主目录。\n\n![images](img/0103.jpg)\n\n***图 1-3.** JavaFX SDK 主目录*\n\n4.  单击“下一步”后，组件将开始安装，随后将出现图\
  \ 1-4 所示的界面。\n\n图 1-4 显示了在完成安装前安装最后几个组件的进度指示器。\n\n![images](img/0104.jpg)\n\n***图\
  \ 1-4.** 完成安装*\n\n5.  安装 NetBeans IDE，其中包含 JavaFX 2.0 插件。\n\n安装时，你将按照默认的向导界面进行操作。如需其他说明，请参阅\
  \ [`http://netbeans.org/community/releases/71/install.html`](http://netbeans.org/community/releases/71/install.html)。\n\
  \n6.  配置你的环境变量 CLASSPATH，使其包含 JavaFX 运行时库。运行时库的名称和位置为 `<JavaFX SDK 主目录>\\rt\\lib\\\
  jfxrt.jar`。（Linux 使用正斜杠 /）。\n\n#### 工作原理\n\n本教程演示了如何在 Windows 平台上安装 JavaFX 2.0 和\
  \ NetBeans IDE。在其他操作系统上安装 JavaFX 2.0 时，你可能需要根据实际情况稍微调整步骤。虽然此处描述的步骤是针对 NetBeans 的，但你也可以使用其他\
  \ IDE 进行开发，例如 Eclipse、IntelliJ 或 vi。虽然大多数示例教程都是使用 NetBeans IDE 创建的，但你也可以使用命令行提示符编译和运行\
  \ JavaFX 应用程序。\n\n要使用命令行提示符编译和运行 JavaFX 应用程序，你需要配置你的 CLASSPATH。按照向导安装必备软件后，你需要设置环境的\
  \ `CLASSPATH` 变量，使其包含 JavaFX 运行时库 `<JavaFX SDK 主目录>/rt/lib/jfxrt.jar`（第 6 步）。设置此库将有助于后续在命令行上编译和运行基于\
  \ JavaFX 的应用程序。以下代码根据你的平台配置 CLASSPATH 环境变量：\n\n*在 Windows 平台上设置 CLASSPATH*\n\n`set\
  \ JAVAFX_HOME=C:\\Program Files (x86)\\Oracle\\JavaFX 2.0 SDK`\n`set JAVA_HOME=C:\\\
  Program Files (x86)\\Java\\jdk1.7.0`\n`set CLASSPATH=%JAVAFX_HOME%\\rt\\lib\\jfxrt.jar;.`\n\
  \n*在 UNIX/Linux/Mac OS 平台上设置 CLASSPATH*\n\n`# bash 环境`\n`export JAVAFX_HOME=<JavaFX\
  \ SDK 主目录>`\n`export CLASSPATH=$CLASSPATH:$JAVAFX_HOME/rt/lib/jfxrt.jar`\n\n`#csh\
  \ 环境`\n`setenv JAVAFX_HOME <JavaFX SDK 主目录>`\n`setenv CLASSPATH ${CLASSPATH}:${JAVAFX_HOME}/rt/lib/jfxrt.jar`\n\
  \n在教程 1-2 中，你将学习如何创建一个简单的 Hello World 应用程序。创建 Hello World 应用程序后，你将能够编译和运行基于 JavaFX\
  \ 的应用程序。\n\n### 1-2. 创建简单的用户界面\n\n#### 问题\n\n你想创建、编码、编译并运行一个简单的 JavaFX Hello World\
  \ 应用程序。\n\n\n\n#### 解决方案 #1\n\n使用 NetBeans IDE 中的 JavaFX 项目创建向导，开发一个 JavaFX HelloWorld\
  \ 应用程序。\n\n**在 NETBEANS 中创建 JAVAFX HELLO WORLD 应用程序**\n\n要快速上手，使用 NetBeans IDE 创建、编码、编译并运行一个简单的\
  \ JavaFX HelloWorld 应用程序，请遵循以下步骤：\n\n启动 NetBeans IDE。\n\n1) 在“文件”菜单上，选择“新建项目”。\n\
  \n2) 在“选择项目与类别”下，选择 `JavaFX` 文件夹。\n\n3) 在“项目”下，选择“Java FX 应用程序”，然后点击“下一步”。\n\n4)\
  \ 将项目名称指定为 **HelloWorldMain**。\n\n5) 更改或接受“项目位置”和“项目文件夹”字段的默认值。\n\n6) 确保选中“创建应用程序类”复选框。点击“完成”。\n\
  \n7) 在 NetBeans IDE 的“项目”选项卡中，选择新创建的项目。打开“项目属性”对话框，验证“源/二进制格式”设置为 JDK 7。在“类别”下点击“源”。\n\
  \n8) 仍在“项目属性”对话框中，在“类别”下选择“库”，以验证 Java 7 和 JavaFX 平台已正确配置。点击“管理平台”按钮。确保出现一个显示 JavaFX\
  \ 库的选项卡。图 1-5 展示了 JavaFX 选项卡，详细说明了其 SDK 主目录、运行时和 Javadoc 目录位置。验证完毕后，点击“关闭”按钮。\n\n\
  图 1-5 显示了“Java 平台管理器”窗口，其中包含作为 JDK 7 附带托管平台的 JavaFX。\n\n![images](img/0105.jpg)\n\
  \n***图 1-5.** Java 平台管理器*\n\n9) 关闭“Java 平台管理器”窗口后，点击“确定”关闭“项目属性”窗口。\n\n10) 要运行并测试您的\
  \ JavaFX Hello World 应用程序，请访问“运行”菜单，并选择“运行主项目”或按 F6 键。\n\n图 1-6 显示了一个从 NetBeans\
  \ IDE 启动的简单 JavaFX Hello World 应用程序。\n\n![images](img/0106.jpg)\n\n***图 1-6.** 从\
  \ NetBeans IDE 启动的 JavaFX Hello World*\n\n#### 解决方案 #2\n\n使用您喜欢的编辑器编写 JavaFX Hello\
  \ World 应用程序的代码。创建 Java 文件后，您将使用命令行提示符来编译和运行您的 JavaFX 应用程序。以下是在命令行提示符下创建、编译和运行 JavaFX\
  \ Hello World 应用程序的步骤。\n\n**在其他 IDE 中创建 JAVAFX HELLO WORLD 应用程序**\n\n要快速上手：\n\n\
  1. 将以下代码复制并粘贴到您喜欢的编辑器中，并将文件保存为 `HelloWorldMain.java`。\n\n以下源代码是一个 JavaFX Hello World\
  \ 应用程序：\n\n`package helloworldmain;`\n\n`import javafx.application.Application;`\n\
  `import javafx.event.ActionEvent;`\n`import javafx.event.EventHandler;`\n`import\
  \ javafx.scene.Group;`\n`import javafx.scene.Scene;`\n`import javafx.scene.control.Button;`\n\
  `import javafx.stage.Stage;`\n\n`/**`\n` *`\n` * @author cdea`\n` */`\n`public class\
  \ HelloWorldMain extends Application {`\n\n`    /**`\n`     * @param args the command\
  \ line arguments`\n`     */`\n`    public static void main(String[] args) {`\n`        Application.launch(args);`\n\
  `    }`\n\n`    @Override`\n`    public void start(Stage primaryStage) {`\n`        primaryStage.setTitle(\"\
  Hello World\");`\n`        Group root = new Group();`\n`        Scene scene = new\
  \ Scene(root, 300, 250);`\n`        Button btn = new Button();`\n`        btn.setLayoutX(100);`\n\
  `        btn.setLayoutY(80);`\n`        btn.setText(\"Hello World\");`\n`        btn.setOnAction(new\
  \ EventHandler<ActionEvent>() {`\n\n`            public void handle(ActionEvent\
  \ event) {`\n`                System.out.println(\"Hello World\");`\n`            }`\n\
  `        });`\n`        root.getChildren().add(btn);`\n`        primaryStage.setScene(scene);`\n\
  `        primaryStage.show();`\n`    }`\n`}`\n\n2. 保存名为 `HelloWorldMain.java` 的文件后，在命令行提示符下，导航到该文件所在的目录。\n\
  \n3. 使用 Java 编译器 `javac` 编译源代码文件 `HelloWorldMain.java`：\n\n`    javac -d . HelloWorldMain.java`\n\
  \n4. 运行并测试您的 JavaFX Hello World 应用程序。假设您与 `HelloWorldMain.java` 文件位于同一目录，请在命令行提示符下输入以下命令来运行您的\
  \ JavaFX Hello World 应用程序：\n\n`    java helloworldmain.HelloWorldMain`\n\n图 1-7\
  \ 显示了一个从命令行提示符启动的简单 JavaFX Hello World 应用程序。\n\n![images](img/0107.jpg)\n\n***图\
  \ 1-7.** 从命令行提示符启动的 JavaFX Hello World*\n\n#### 工作原理\n\n以下是对两种解决方案的描述。两种解决方案都需要先决软件。（我将在配方\
  \ 1-1 中介绍如何安装所需软件。）在解决方案 #1 中，您将使用 NetBeans IDE 创建一个 JavaFX 应用程序。解决方案 #2 允许您选择自己喜欢的编辑器，并使用命令行提示符来编译和执行\
  \ JavaFX 程序。\n\n#### 解决方案 #1\n\n要创建一个简单的 JavaFX Hello World 应用程序，使用 NetBeans 时，您将按照步骤\
  \ 1 到 7 中指定的方式使用 JavaFX 项目创建向导。在步骤 8 到 10 中，您将验证两个设置，以确保项目已正确配置，能够编译和运行 JavaFX 2.0\
  \ 应用程序。最后，在步骤 11 中，您将通过选择“运行主项目”菜单选项来运行 JavaFX Hello World 应用程序。\n\n按照步骤 1 到 7 操作时，您不应遇到任何困难。然而，步骤\
  \ 8 到 10 解决了一个较小的 NetBeans 错误，该错误涉及将项目的源/二进制格式设置为 JDK 7，并确保托管平台包含 JavaFX 运行时库。如果您没有遇到此问题，可能是\
  \ NetBeans 团队已经修正了该问题。为安全起见，在开始之前按照步骤 8 到 10 验证您的配置也无妨。\n\n\n\n#### 解决方案 #2\n\n\
  要使用您喜欢的 IDE 创建一个简单的 JavaFX Hello World 应用程序，请遵循步骤 1 和 2。要在命令行上编译并运行您的 Hello World\
  \ 程序，请遵循步骤 3 和 4。\n\n将源代码输入您喜欢的编辑器并保存源文件后，您将需要编译并运行您的 JavaFX 程序。打开命令行提示窗口，并导航到名为\
  \ `HelloWorldMain.java` 的 Java 文件所在的目录。\n\n这里我想指出使用命令 `javac -d . HelloWorldMain.java`\
  \ 编译文件的方式。您会注意到文件名前的 `-d .`。这告诉 Java 编译器根据包名将类文件放在何处。在此场景中，`HelloWorldMain` 的包声明是\
  \ `helloworldmain`，这将在当前目录下创建一个子目录。编译完成后，您的目录结构应类似于以下内容：\n\n`|projects`\n`        |helloworld`\n\
  `              |HelloWorldMain.java`\n`              | helloworldmain`\n`                    |HelloWorldMain.class`\n\
  \n考虑到上述目录结构，以下命令将编译并运行我们的 JavaFX Hello World 应用程序：\n\n`    cd /projects/helloworld`\n\
  \n`    javac –d . HelloWorldMain.java`\n\n`    java helloworldmain.HelloWorldMain`\n\
  \n![images](img/square.jpg) **注意** 打包和部署 JavaFX 应用程序的方法有很多。要了解更多信息，请参阅 [`http://blogs.oracle.com/thejavatutorials/entry/javafx_2_0_beta_packager`](http://blogs.oracle.com/thejavatutorials/entry/javafx_2_0_beta_packager)\
  \ 上的“学习如何部署和打包 JavaFX 应用程序”。有关深入的 JavaFX 部署策略，请参阅 Oracle 的“部署 JavaFX 应用程序”，网址为 [`http://download.oracle.com/javafx/2.0/deployment/deployment_toolkit.htm`](http://download.oracle.com/javafx/2.0/deployment/deployment_toolkit.htm)。\n\
  \n在这两种解决方案中，您都会在源代码中注意到 JavaFX 应用程序继承了 `javafx.application.Application` 类。`Application`\
  \ 类提供了应用程序生命周期函数，例如在运行时启动和停止。这也为 Java 应用程序提供了一种以线程安全方式启动 JavaFX GUI 组件的机制。请记住，与\
  \ Java Swing 的事件调度线程类似，JavaFX 将拥有自己的 JavaFX 应用程序线程。\n\n在我们的 `main()` 方法入口点，我们通过简单地将命令行参数传递给\
  \ `Application.launch()` 方法来启动 JavaFX 应用程序。一旦应用程序进入就绪状态，框架内部将调用 `start()` 方法来开始。当调用\
  \ `start()` 方法时，一个 JavaFX `javafx.stage.Stage` 对象可供开发者使用和操作。\n\n您会注意到一些对象名称很奇怪，例如\
  \ `Stage` 或 `Scene`。API 的设计者将事物建模得类似于剧院或戏剧，演员在观众面前表演。用同样的类比，为了上演一出戏，演员基本上会在一个或多个场景中表演。当然，所有场景都在一个舞台上进行。在\
  \ JavaFX 中，`Stage` 相当于一个应用程序窗口，类似于 Java Swing API 的 `JFrame` 或 `JDialog`。您可以将 `Scene`\
  \ 对象视为一个能够容纳零到多个 `Node` 对象的内容面板。`Node` 是所有要渲染的场景图节点的基本基类。常用的节点是 UI 控件和 `Shape` 对象。类似于树形数据结构，场景图通过使用容器类\
  \ `Group` 来包含子节点。我们稍后在研究 `ObservableList` 时会了解更多关于 `Group` 类的信息，但现在我们可以将它们视为能够容纳\
  \ `Node` 的 Java `List` 或集合。\n\n添加子节点后，我们设置 `primaryStage`（`Stage`）的场景，并在 `Stage`\
  \ 对象上调用 `show()` 方法来显示 JavaFX 窗口。\n\n最后一件事：在本章中，大多数示例应用程序的结构将与这个示例相同，其中配方代码解决方案将位于\
  \ `start()` 方法内部。话虽如此，本章中的大多数配方将遵循相同的模式。换句话说，为简洁起见，许多样板代码将不会显示。要查看所有配方的完整源代码列表，请从本书网站下载源代码。\n\
  \n### 1-3：绘制文本\n\n#### 问题\n\n您想要在 JavaFX 场景图上绘制文本。\n\n#### 解决方案\n\n通过使用 `javafx.scene.text.Text`\
  \ 类创建 `Text` 节点，并将其放置在 JavaFX 场景图上。由于 `Text` 节点将被放置在场景图上，您决定创建随机定位的 `Text` 节点，这些节点围绕其\
  \ (x, y) 位置旋转，散布在场景区域中。\n\n以下代码实现了一个 JavaFX 应用程序，该应用程序显示散布在场景图上、具有随机位置和颜色的 `Text`\
  \ 节点：\n\n`package javafx2introbyexample.chapter1.recipe1_03;`\n\n`import java.util.Random;`\n\
  `import javafx.application.Application;`\n`import javafx.scene.Group;`\n`import\
  \ javafx.scene.Scene;`\n`import javafx.scene.paint.Color;`\n`import javafx.scene.text.Text;`\n\
  `import javafx.stage.Stage;`\n\n`/**`\n` *`\n` * @author cdea`\n` */`\n`public class\
  \ DrawingText extends Application {`\n\n`    /**`\n`     * @param args the command\
  \ line arguments`\n`     */`\n`    public static void main(String[] args) {`\n`        Application.launch(args);`\n\
  `    }`\n\n`    @Override`\n`    public void start(Stage primaryStage) {`\n`        primaryStage.setTitle(\"\
  Chapter 1-3 Drawing Text\");`\n`        Group root = new Group();`\n`        Scene\
  \ scene = new Scene(root, 300, 250, Color.WHITE);`\n`        Random rand = new Random(System.currentTimeMillis());`\n\
  `        for (int i = 0; i < 100; i++) {`\n`            int x = rand.nextInt((int)\
  \ scene.getWidth());`\n`            int y = rand.nextInt((int) scene.getHeight());`\n\
  `            int red = rand.nextInt(255);`\n`            int green = rand.nextInt(255);`\n\
  `            int blue = rand.nextInt(255);`\n\n`            Text text = new Text(x,\
  \ y, \"JavaFX 2.0\");`\n\n`            int rot = rand.nextInt(360);`\n`            text.setFill(Color.rgb(red,\
  \ green, blue, .99));`\n`            text.setRotate(rot);`\n`            root.getChildren().add(text);`\n\
  `        }`\n\n`        primaryStage.setScene(scene);`\n`        primaryStage.show();`\n\
  `    }`\n`}`\n\n图 1-8 显示了散布在 JavaFX 场景图上的随机 `Text` 节点。\n\n![images](img/0108.jpg)\n\
  \n***图 1-8.** 绘制文本*\n\n\n\n#### 工作原理\n\n要在 JavaFX 中绘制文本，你需要创建一个 `javafx.scene.text.Text`\
  \ 节点，并将其放置在场景图（`javafx.scene.Scene`）上。在本示例中，你会看到文本对象以随机颜色和位置散布在 `Scene` 区域中。\n\n\
  首先，我们创建一个循环来生成随机的 (x, y) 坐标，用于定位 `Text` 节点。其次，我们创建介于 (0–255 rgb) 之间的随机颜色分量，并将其应用于\
  \ `Text` 节点。第三，旋转角度（以度为单位）是一个介于 (0–360 度) 之间的随机生成值，用于使文本倾斜。以下代码创建了将分配给 `Text` 节点位置、颜色和旋转的随机值：\n\
  \n`    int x = rand.nextInt((int) scene.getWidth());`\n`    int y = rand.nextInt((int)\
  \ scene.getHeight());`\n`    int red = rand.nextInt(255);`\n`    int green = rand.nextInt(255);`\n\
  `    int blue = rand.nextInt(255);`\n`    int rot = rand.nextInt(360);`\n\n一旦生成了随机值，它们将被应用于\
  \ `Text` 节点，这些节点将被绘制到场景图上。以下代码片段将位置 (x, y)、颜色 (rgb) 和旋转（角度，以度为单位）应用于 `Text` 节点：\n\
  \n`    Text text = new Text(x, y, \"JavaFX 2.0\");`\n`    text.setFill(Color.rgb(red,\
  \ green, blue, .99));`\n`    text.setRotate(rot);`\n\n`    root.getChildren().add(text);`\n\
  \n你将开始看到场景图 API 的强大之处，因为它易于使用。`Text` 节点可以像 `Shapes` 一样轻松操作。实际上，它们确实是 `Shapes`。在继承层次结构中定义，`Text`\
