  ***图 1-18.** 后台进程*\n\n#### 工作原理\n\nGUI 开发的主要陷阱之一在于，何时以及如何委派工作（`Threads`）。我们时常被提醒要注意线程安全，尤其是在避免阻塞\
  \ GUI 线程方面。\n\n我们首先创建了两个进度控件，用于向用户展示正在进行的工作。一个是进度条，另一个是进度指示器。进度指示器会在其图标下方显示一个百分比。以下代码片段展示了进度控件的初始创建过程：\n\
  \n`final ProgressBar progressBar = new ProgressBar(0);`\n`final ProgressIndicator\
  \ progressIndicator = new ProgressIndicator(0);`\n\n接下来，我们通过 `createWorker()` 方法创建一个工作线程。这个便捷方法\
  \ `createWorker()` 会实例化并返回一个 `javafx.concurrent.Task` 对象，它类似于 Java Swing 中的 `SwingWorker`\
  \ 类。与 `SwingWorker` 类不同，`Task` 对象被极大地简化了，使用起来也更加容易。如果你对比过上一个示例，你会发现没有任何 GUI 控件被传入\
  \ `Task` 中。聪明的 JavaFX 团队创建了可观察的属性，使得我们可以进行绑定。这促成了一种更加事件驱动的方式来处理工作（任务）。在创建 `Task`\
  \ 对象的实例时，你需要实现 `call()` 方法，以便在后台执行工作。在工作执行过程中，你可能希望将进度或文本信息等中间结果加入队列，这时可以调用 `updateProgress()`\
  \ 和 `updateMessage()` 方法。这些方法会以线程安全的方式更新信息，使得进度属性的观察者能够安全地更新 GUI，而不会阻塞 GUI 线程。以下代码片段展示了将消息和进度加入队列的能力：\n\
  \n`// 将状态加入队列`\n`updateMessage(status);`\n`updateProgress(i + 1, numFiles);`\n\n\
  创建了一个工作 `Task` 后，我们会解除之前绑定到进度控件上的所有旧任务。一旦进度控件解除绑定，我们便将进度控件绑定到新创建的 `Task` 对象 `copyWorker`\
  \ 上。以下代码展示了将新的 `Task` 对象重新绑定到进度 UI 控件的过程：\n\n`// 连接进度条`\n`progressBar.progressProperty().unbind();`\n\
  `progressBar.progressProperty().bind(copyWorker.progressProperty());`\n`progressIndicator.progressProperty().unbind();`\n\
  `progressIndicator.progressProperty().bind(copyWorker.progressProperty());`\n\n\
  接下来，我们实现一个 `ChangeListener`，用于将队列中的结果追加到 `TextArea` 控件中。JavaFX 属性的另一个显著特点是，你可以像在\
  \ Java Swing 组件上那样附加多个监听器。最后，我们的工作线程和控件都已连接完毕，可以生成一个线程在后台运行。以下代码行展示了如何启动一个 `Task`\
  \ 工作对象：\n\n`new Thread(copyWorker).start();`\n\n最后，我们讨论一下取消按钮。取消按钮会简单地调用 `Task`\
  \ 对象的 `cancel()` 方法来终止进程。任务被取消后，进度控件会被重置。一旦工作 `Task` 被取消，它就不能被重复使用了。这就是为什么启动按钮会重新创建一个新的\
  \ `Task`。如果你需要一个更健壮的解决方案，应该查看 `javafx.concurrent.Service` 类。以下代码行将取消一个 `Task` 工作对象：\n\
  \n`copyWorker.cancel(true);`\n\n### 1-13. 将键盘序列关联到应用程序\n\n#### 问题\n\n你想要为菜单选项创建键盘快捷键。\n\
