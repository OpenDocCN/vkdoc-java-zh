  ## 第 2 章\n\n## JavaFX 图形\n\n你是否曾听人说过“两个世界碰撞”？这个表达通常用于描述一个来自不同背景或文化的人，被置于一个矛盾冲突的境地，必须面对艰难抉择。当我们构建需要动画的\
  \ GUI 应用程序时，常常会处于业务世界与游戏世界的碰撞之中。\n\n在不断变化的 RIA（富互联网应用）世界中，你可能已经注意到动画效果的增多，例如脉冲按钮、过渡效果、动态背景等。当\
  \ GUI 应用程序使用动画时，它们可以为用户提供视觉提示，告知下一步操作。借助 JavaFX，你将能够兼得两个世界的优势。\n\n图 2-1 展示了一幅简单的画作变得生动起来。\n\
  \n![images](img/0201.jpg)\n\n***图 2-1.** JavaFX 图形*\n\n在本章中，你将创建图像、动画和外观样式。系好安全带；你将发现如何将酷炫的游戏化界面集成到日常应用程序中的解决方案。\n\
