  \ {`\n`    public void handle(ActionEvent ae){`\n`        ticker.stop();`\n`        ticker.setFromX(scene.getWidth());`\n\
  `        ticker.setDuration(new Duration((scene.getWidth()/300) * 15000));`\n`        ticker.playFromStart();`\n\
