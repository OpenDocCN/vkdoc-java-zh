  \ `translateX` 和 `translateY` 属性应设置为 1。\n\n### 1-6\\. 为对象分配颜色\n\n#### 问题\n\n你想用纯色和渐变色填充你的形状。\n\
  \n\n\n#### 解决方案\n\n在 JavaFX 中，所有形状都可以使用纯色和渐变色进行填充。以下是用于填充形状节点的主要类：\n\n> *   `javafx.scene.paint.Color`\n\
  > *   `javafx.scene.paint.LinearGradient`\n> *   `javafx.scene.paint.Stop`\n> *\
  \   `javafx.scene.paint.RadialGradient`\n\n以下代码使用上述类为我们的形状添加了径向和线性渐变色，以及透明（Alpha\
  \ 通道级别）颜色。在本示例中，我们将使用一个椭圆、一个矩形和一个圆角矩形。示例中还出现了一条纯黑色线条（如图 1-13 所示），以演示形状颜色的透明度。\n\n\
