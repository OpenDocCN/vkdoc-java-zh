  \n***图 3-3.** JavaFX 基本视频播放器*\n\n\n\n#### 工作原理\n\n要创建视频播放器，你需要像食谱 3-1 那样构建应用程序，复用相同的应用功能，例如拖放文件、媒体按钮控件等。为清晰起见，我采用了之前的食谱，并将大部分\
  \ UI 代码移入便捷函数中，这样你就能专注于媒体 API，而不会在 UI 代码中迷失方向。本章其余食谱将在此基础上，为这个 JavaFX 基础媒体播放器添加简单功能。因此，后续食谱中的代码片段将很简短，仅包含每个新功能所需的必要代码。\n\
  \n在开始之前，我想谈谈媒体格式。在撰写本书时，JavaFX 2.0 支持一种名为 VP6 的跨平台视频格式，其文件扩展名为 `.flv`（代表流行的 Adobe\
  \ Flash 视频格式）。用于创建 VP6 和 `.flv` 文件的实际编码器和解码器（编解码器）由一家名为 On2 的公司授权。2009 年，On2 被谷歌收购，用于构建开放且免费的\
  \ VP7 和 VP8，以推动 HTML5 的发展。我不想用这些复杂背景让你困惑，但随着媒体格式的流行或淘汰，很难预测事态将如何发展。由于 JavaFX 的目标是跨平台，使用网络上最流行的编解码器似乎是合乎逻辑的，但你可能需要获得许可才能将视频编码为\
  \ VP6 `.flv` 文件格式。因此，关键在于 JavaFX 目前只能播放以 VP6 编码的视频文件。（我尽量记住这是当前媒体格式的状况，所以请不要将任何挫败感归咎于\
  \ JavaFX SDK。）有关要使用的格式的更多详细信息，请参阅 Javadoc API。提醒一句：要警惕那些声称可以免费转换视频的网站。在撰写本文时，唯一能够合法地将视频编码为\
  \ VP6 的编码器是 Adobe 和 Wildform 的商业转换器（[`http://www.wildform.com`](http://www.wildform.com)）。\n\
  \n现在，既然你知道了可接受的文件格式，如果你没有编码软件，可能想知道如何获取这种类型的文件。如果你手头没有 `.flv` 文件，可以从我最喜欢的网站之一 Media\
  \ College（[`http://www.mediacollege.com`](http://www.mediacollege.com)）获取。从摄影到电影，Media\
  \ College 提供论坛、教程和资源，帮助你进入媒体世界。在那里，你将获得一个特定的媒体文件，用于本章剩余的食谱。要获取 `.flv` 文件，请导航至以下\
  \ URL：[`http://www.mediacollege.com/adobe/flash/video/tutorial/example-flv.html`](http://www.mediacollege.com/adobe/flash/video/tutorial/example-flv.html)。\n\
  \n接下来，找到指向我们 `.flv` 媒体文件（`20051210-w50s.flv`）的链接，标题为 `Windy 50s Mobility Scooter\
  \ Race`。要下载包含文件的链接，请右键单击并选择“目标另存为”或“链接另存为”。将文件保存到本地文件系统后，你可以将文件拖入媒体播放器应用程序以开始演示。\n\
  \n![images](img/square.jpg) **注意** 在撰写本书时，JavaFX 媒体播放器 API 目前支持使用 `.flv` 容器的 VP6\
  \ 视频格式。\n\n与上一个食谱中创建的音频播放器一样，我们的 JavaFX 基础视频播放器具有相同的基本媒体控件，包括停止、暂停和播放。除了这些简单控件外，我们还添加了新功能，例如搜索和全屏模式。\n\
  \n播放视频时，你需要一个视图区域（`javafx.scene.media.MediaView`）来显示视频。你还需要创建一个滑块控件来监控视频进度，该控件位于图\
