  \ `Menu` 对象。以下代码片段创建了一个菜单：\n\n`Menu menu = new Menu(\"文件\");`\n\n第三，我们创建要添加到 `Menu`\
  \ 对象中的菜单项，例如菜单项（`MenuItem`）、复选框菜单项（`CheckMenuItem`）和单选菜单项（`RadioMenuItem`）。菜单项可以包含图标。本示例中未展示这一点，但我鼓励您探索所有菜单项（`MenuItem`）的各种构造函数。创建单选菜单项（`RadioMenuItem`）时，您应该了解\
  \ `ToggleGroup` 类。`ToggleGroup` 类也用于常规单选按钮（`RadioButton`），以仅允许选择一个选项。以下代码创建了要添加到\
  \ `Menu` 对象中的单选菜单项（`RadioMenuItem`）：\n\n`// 警报`\n`Menu alarm = new Menu(\"警报\");`\n\
  `ToggleGroup tGroup = new ToggleGroup();`\n`RadioMenuItem soundAlarmItem = RadioMenuItemBuilder.create()`\n\
