  \n#### 问题\n\n你希望媒体播放器能针对特定事件提供反馈。例如，当媒体播放器的 `paused` 事件被触发时，在屏幕上显示“已暂停”文本。\n\n####\
  \ 解决方案\n\n你可以使用许多媒体事件处理方法。表 3-3 列出了所有可能触发的媒体事件，以便开发者附加 `EventHandler` 或 `Runnable`。\n\
  \n![images](img/t0303.jpg)\n\n![images](img/t0303a.jpg)\n\n以下代码将在用户点击暂停按钮时，向用户显示包含“已暂停”和“时长”（精确到毫秒小数）的文本，该文本会覆盖在视频之上（参见图\
  \ 3-4）：\n\n`   // 当暂停事件发生时显示暂停消息`\n`   mediaPlayer.setOnPaused(new Runnable() {`\n\
  `     @Override`\n`     public void run() {`\n`        pauseMessage.setText(\"已暂停\
  \ \\n 时长: \" +`\n`mediaPlayer.currentTimeProperty().getValue().toMillis());`\n`        pauseMessage.setOpacity(.90);`\n\
  \n`    }`\n`  });` ![images](img/0304.jpg)\n\n***图 3-4.** 暂停事件*\n\n#### 工作原理\n\n\
  事件驱动架构（EDA）是一种重要的架构模式，用于建模异步传递消息的松散耦合组件和服务。JavaFX 团队将 Media API 设计为事件驱动。本方案将演示如何响应媒体事件进行实现。\n\
  \n基于事件编程的思想，你会在调用函数时发现非阻塞或回调行为。在本方案中，你将实现响应 `onPaused` 事件来显示文本，而不是将代码放入暂停按钮中。你将不再通过\
  \ `EventHandler` 将代码直接绑定到按钮，而是实现响应媒体播放器 `onPaused` 事件被触发的代码。在响应媒体事件时，你将实现 `java.lang.Runnable`。\n\
  \n你会很高兴地发现，你一直在使用事件属性并实现 `Runnable`。希望你在本章的所有方案中都注意到了这一点。当媒体播放器处于就绪状态时，`Runnable`\
  \ 代码将被调用。为什么这是正确的？因为当媒体播放器完成媒体加载时，`onReady` 属性会收到通知。这样你就可以确保能够调用 `MediaPlayer` 的\
  \ `play()` 方法。我相信你会习惯事件式编程。以下代码片段演示了如何将一个 `Runnable` 实例设置到媒体播放器对象的 `OnReady` 属性中：\n\
  \n`mediaPlayer.setOnReady(new Runnable() {`\n`    @Override`\n`    public void run()\
  \ {`\n`        mediaPlayer.play();`\n`    }`\n`});`\n\n你将采取与 `onReady` 属性类似的步骤。一旦触发了\
  \ `Paused` 事件，`run()` 方法将被调用，向用户显示一条消息，其中包含一个带有“已暂停”字样的 `Text` 节点，以及显示视频播放到该时刻的毫秒数。显示后，你可能希望将这些时长记录为标记（你将在方案\
  \ 3-4 中学习）。以下代码片段展示了一个附加的 `Runnable` 实例，它负责在视频暂停的位置显示暂停消息和以毫秒为单位的时长：\n\n`  // 当暂停事件发生时显示暂停消息`\n\
  `  mediaPlayer.setOnPaused(new Runnable() {`\n`     @Override`\n`     public void\
  \ run() {`\n`        pauseMessage.setText(\"已暂停 \\n 时长: \" +`\n`mediaPlayer.currentTimeProperty().getValue().toMillis());`\n\
  `        pauseMessage.setOpacity(.90);`\n\n`    }`\n`  });`\n\n### 3-4. 标记视频中的位置\n\
