  \n***图 3-5.** 隐藏式字幕文本*\n\n\n\n#### 工作原理\n\nMedia API 拥有许多事件属性，开发者可以为这些属性附加 `EventHandler`\
  \ 或 `Runnable` 实例，以便在事件被触发时做出响应。此处我们重点关注 `OnMarker` 事件属性。`Marker` 属性负责接收标记事件（`MediaMarkerEvent`）。\n\
  \n首先，让我们向 `Media` 对象中添加标记。它包含一个 `getMarkers()` 方法，该方法返回一个 `javafx.collections.ObservableMap<String,\
  \ Duration>`。借助可观察映射，你可以添加代表每个标记的键值对。添加的键应为唯一标识符，值则为 `Duration` 的实例。为简单起见，我使用了隐藏式字幕文本作为每个媒体标记的键。标记的时长是你在配方\
  \ 3-3 中按下视频暂停按钮时记录下来的。请注意，我不建议在生产代码中这样做。你可能需要使用一个并行的 `Map`。\n\n添加标记后，你将使用 `setOnMarker()`\
  \ 方法为 `MediaPlayer` 对象的 `OnMarker` 属性设置一个 `EventHandler`。接下来，你将创建 `EventHandler`\
  \ 实例来处理触发的 `MediaMarkerEvent`。一旦接收到事件，就获取代表隐藏式字幕中要使用的文本的键。实例变量 `closedCaption`（`javafx.scene.text.Text`\
  \ 节点）将通过调用 `setText()` 方法并传入与标记关联的键或字符串来显示。\n\n媒体标记的内容就这些。这展示了你可以如何轻松地在视频播放过程中协调特效、动画等。\n\
  \n### 3-5. 同步动画与媒体\n\n#### 问题\n\n你希望在媒体显示中融入动画效果。例如，你希望在视频播放完毕后滚动显示“剧终”字样。\n\n####\
  \ 解决方案\n\n结合使用配方 3-3 和配方 2-2。配方 3-3 展示了如何响应媒体事件。配方 2-2 演示了如何使用 `javafx.animation.TranslateTransition`\
  \ 为文本添加动画效果。\n\n以下代码演示了在媒体结束事件触发时附加的操作：\n\n`mediaPlayer.setOnEndOfMedia(new Runnable()\
  \ {`\n`   @Override`\n`   public void run() {`\n`      closedCaption.setText(\"\"\
  );`\n`      animateTheEnd.getNode().setOpacity(.90);`\n`      animateTheEnd.playFromStart();`\n\
  `  }`\n`});`\n\n这里展示的是一个方法，它创建了一个包含字符串“The End”的 `Text` 节点的 `TranslateTransition`，该动画在媒体结束事件触发后播放：\n\
  \n`    public TranslateTransition createTheEnd(Scene scene) {`\n`        Text theEnd\
  \ = TextBuilder.create()`\n`           .text(\"The End\")`\n`           .font(new\
  \ Font(40))`\n`           .strokeWidth(3)`\n`           .fill(Color.WHITE)`\n`           .stroke(Color.WHITE)`\n\
  `           .x(75)`\n`           .build();`\n\n`        TranslateTransition scrollUp\
  \ = TranslateTransitionBuilder.create()`\n`            .node(theEnd)`\n`            .duration(Duration.seconds(1))`\n\
  `            .interpolator(Interpolator.EASE_IN)`\n`            .fromY(scene.getHeight()\
  \ + 40)`\n`            .toY(scene.getHeight()/2)`\n`            .build();`\n`        return\
  \ scrollUp;`\n`    }`\n\n图 3-6 描绘了在 `OnEndOfMedia` 事件触发后，文本节点“The End”向上滚动的效果。\n\
  \n![images](img/0306.jpg)\n\n***图 3-6.** 动画显示“剧终”*\n\n#### 工作原理\n\n在本配方中，你将能够将事件与动画效果同步。换句话说，当视频播放到结尾时，`OnEndOfMedia`\
  \ 属性事件将启动一个 `Runnable` 实例。启动后，将通过向上滚动一个包含字符串“The End”的 `Text` 节点来执行 `TranslateTransition`\
  \ 动画。\n\n那么，让我来描述与 `MediaPlayer` 对象关联的 `setOnEndOfMedia()` 方法。与配方 3-3 一样，我们只需调用\
  \ `setOnEndOfMedia()` 方法，并传入一个包含调用动画代码的 `Runnable`。如果你不了解动画的工作原理，请参考配方 2-2。一旦事件发生，你将看到文本向上滚动。以下代码片段来自\
  \ `scene.setOnDragDropped()` 方法内部：\n\n`mediaPlayer.setOnEndOfMedia(new Runnable()\
  \ {`\n`   @Override`\n`   public void run() {`\n`      closedCaption.setText(\"\"\
  );`\n`      animateTheEnd.getNode().setOpacity(.90);`\n`      animateTheEnd.playFromStart();`\n\
  `  }`\n`});`\n\n为节省篇幅，我相信你知道代码块应放在何处。如果不知道，你可以参考配方 3-3，其中你会看到其他 `OnXXX` 属性方法。要查看完整的代码清单，请访问本书网站下载源代码。\n\
  \n为了给文本“The End”添加动画效果，你将创建一个便捷的 `createTheEnd()` 方法，用于创建 `Text` 节点实例，并向调用者返回一个\
  \ `TranslateTransition` 对象。返回的 `TranslateTransition` 将执行以下操作：在播放视频前等待一秒钟。接下来是插值器，我使用了\
  \ `Interpolator.EASE_IN`，以便在完全停止前通过缓入效果移动 `Text` 节点。最后是设置节点的 Y 属性，使其从媒体视图区域的底部移动到中心。\n\
  \n以下代码是一个用于向上滚动节点的动画：\n\n`TranslateTransition scrollUp = TranslateTransitionBuilder.create()`\n\
  `            .node(theEnd)`\n`            .duration(Duration.seconds(1))`\n`            .interpolator(Interpolator.EASE_IN)`\n\
  `            .fromY(scene.getHeight() + 40)`\n`            .toY(scene.getHeight()/2)`\n\
  `            .build();`\n\n## 第 4 章\n\n## Web 上的 JavaFX\n\nJavaFX 提供了与 HTML5 互操作的新功能。JavaFX\
  \ 中底层的网页渲染引擎是名为 Webkit 的流行开源 API。Webkit 也被用于谷歌的 Chrome 和苹果的 Safari 浏览器。HTML5 是用于在网页浏览器中渲染内容的新标准标记语言。HTML5\
  \ 内容包含 JavaScript、CSS、可缩放矢量图形（SVG）以及新的 HTML 元素标签。\n\nJavaFX 与 HTML5 之间的关系非常重要，因为它们通过发挥各自的优势相互补充。例如，JavaFX\
  \ 的富客户端 API 与 HTML5 的丰富网页内容相结合，创造了一种兼具桌面软件特性的网页应用用户体验。这种新型应用被称为 RIA。\n\n在本章中，我们将涵盖以下内容：\n\
  \n> *   在 HTML 网页中嵌入 JavaFX 应用程序\n> *   显示 HTML5 内容\n> *   使用 Java 代码操作 HTML5 内容\n\
  > *   响应 HTML 事件\n> *   显示数据库中的内容\n\n### 4-1. 在网页中嵌入 JavaFX 应用程序\n\n#### 问题\n\n\
