  \ donut = Path.subtract(bigCircle, smallCircle);`\n\n接下来，为我们的甜甜圈应用投影效果。一种常见的技术是绘制一个填充为黑色的形状，然后将原始形状稍微偏移地叠放在其上方，以模拟阴影。然而，在\
  \ JavaFX 中，我们只需绘制一次，然后使用 `setEffect()` 方法应用一个 `DropShadow` 对象实例。要设置阴影偏移，请调用 `setOffsetX()`\
  \ 和 `setOffsetY()` 方法。\n\n最后要指出的一点是，所有形状都被绘制并彼此上下堆叠放置。在创建每个形状时，你会注意到它们的 `translateY`\
