  \ `alert()` 函数被调用时，网页的父级所有者（`webView` 的 `WebEngine` 实例）将通过 `WebEngine` 的 `OnAlert`\
  \ 属性收到警报通知。为了响应 JavaScript 的警报，你将添加一个事件处理器（`EventHandler`）来响应 `WebEvent` 对象。在 `handle()`\
  \ 方法中，你将通过切换 `warningMessage` 节点（`javafx.scene.text.Text`）的不透明度来简单地显示和隐藏警告消息。\n\n\
  以下代码片段根据事件数据（`evt.getData()`）中包含的字符串（该字符串来自 JavaScript 的 `alert()` 函数）来切换警告消息的不透明度。因此，如果消息是“warning”，则\
