  , Duration.millis(11546.122448));`\n\n`        // 显示隐藏式字幕`\n`        mediaPlayer.setOnMarker(new\
  \ EventHandler<MediaMarkerEvent> (){`\n`            public void handle(MediaMarkerEvent\
  \ event){`\n`                closedCaption.setText(event.getMarker().getKey());`\n\
