  \ 1-16.** 生成边框*\n\n#### 工作原理\n\nJavaFX 能够像 Web 开发中的层叠样式表（CSS）一样对 JavaFX 节点进行样式设置。这个强大的\
  \ API 可以改变节点的背景颜色、字体、边框以及许多其他属性，本质上允许开发人员或设计人员使用 CSS 对 GUI 控件进行皮肤化处理。\n\n本示例允许用户在左侧文本区域输入\
  \ JavaFX CSS 样式，并通过单击下方的“Bling!”按钮，将样式应用于右侧显示的图像。根据节点类型的不同，您可以设置的样式存在一些限制。要查看所有样式选择器的完整列表，请参考\
  \ JavaFX CSS 参考指南：\n[`http://download.oracle.com/docs/cd/E17802_01/javafx/javafx/1.3/docs/api/javafx.scene/doc-files/cssref.html`](http://download.oracle.com/docs/cd/E17802_01/javafx/javafx/1.3/docs/api/javafx.scene/doc-files/cssref.html)。\n\
  \n在应用 JavaFX CSS 样式的第一步中，您必须确定要设置样式的节点类型。在设置各种节点类型的属性时，您会发现某些节点存在限制。在我们的示例中，目的是在\
  \ `ImageView` 对象周围放置边框。由于 `ImageView` 并非继承自 `Region`，因此它没有边框样式属性。为了解决这个问题，我简单地创建了一个\
  \ `HBox` 布局来包含 `imageView`，并将 JavaFX CSS 应用于 `HBox`。以下代码展示了如何使用 `setStyle()` 方法将\
  \ JavaFX CSS 边框样式应用于水平盒子区域（`HBox`）：\n\n`String cssDefault = \"-fx-border-color:\
  \ blue;\\n\"`\n`    + \"-fx-border-insets: 5;\\n\"`\n`    + \"-fx-border-width:\
  \ 3;\\n\"`\n`    + \"-fx-border-style: dashed;\\n\";`\n`    final ImageView imv\
  \ = new ImageView();`\n\n`    ...// 设置其他图像视图属性`\n\n`    final HBox pictureRegion\
  \ = new HBox();`\n`    pictureRegion.setStyle(cssDefault);`\n`    pictureRegion.getChildren().add(imv);`\n\
  \n### 1-10. 绑定表达式\n\n#### 问题\n\n您想要同步两个值之间的更改。\n\n\n\n#### 解决方案\n\n使用 `javafx.beans.binding.*`\
  \ 和 `javafx.beans.property.*` 包来绑定变量。在绑定值或属性时，需要考虑多种场景。本示例演示了以下三种绑定策略：\n\n> *  \
  \ Java Bean 上的双向绑定\n> *   使用 Fluent API 的高级绑定\n> *   使用 `javafx.beans.binding.*`\
  \ 绑定对象的低级绑定\n\n以下代码是一个实现了这三种策略的控制台应用程序。该控制台应用程序将根据各种绑定场景输出属性值。第一个场景是字符串属性变量与领域对象（`Contact`）所拥有的字符串属性（例如\
  \ `firstName` 属性）之间的双向绑定。下一个场景是使用流式接口 API 计算矩形面积的高级绑定。最后一个场景是使用低级绑定策略计算球体的体积。高级绑定和低级绑定之间的区别在于，高级绑定使用\
  \ `multiply()`、`subtract()` 等方法，而不是运算符 `*` 和 `-`。使用低级绑定时，您需要使用派生的 `NumberBinding`\
  \ 类，例如 `DoubleBinding` 类。使用 `DoubleBinding` 类时，您需要重写其 `computeValue()` 方法，以便使用熟悉的运算符（如\
  \ `*` 和 `-`）来构建复杂的数学公式：\n\n`package javafx2introbyexample.chapter1.recipe1_10;`\n\
  \n`import javafx.beans.binding.DoubleBinding;`\n`import javafx.beans.binding.NumberBinding;`\n\
  `import javafx.beans.property.DoubleProperty;`\n`import javafx.beans.property.IntegerProperty;`\n\
  `import javafx.beans.property.SimpleDoubleProperty;`\n`import javafx.beans.property.SimpleIntegerProperty;`\n\
  `import javafx.beans.property.SimpleStringProperty;`\n`import javafx.beans.property.StringProperty;`\n\
  \n`/**`\n` * 绑定表达式`\n` * @author cdea`\n` */`\n`public class BindingExpressions\
  \ {`\n\n`    /**`\n`     * @param args 命令行参数`\n`     */`\n`    public static void\
  \ main(String[] args) {`\n`        System.out.println(\"第 1 章-10 绑定表达式\\n\");`\n\
  \n`        System.out.println(\"绑定 Contact bean [双向绑定]\");`\n`        Contact contact\
  \ = new Contact(\"John\", \"Doe\");`\n`        StringProperty fname = new SimpleStringProperty();`\n\
  `        fname.bindBidirectional(contact.firstNameProperty());`\n`        StringProperty\
  \ lname = new SimpleStringProperty();`\n`        lname.bindBidirectional(contact.lastNameProperty());`\n\
  \n`        System.out.println(\"当前 - StringProperty 值   : \" + fname.getValue()\
  \ + \" \" +`\n`lname.getValue());`\n`        System.out.println(\"当前 - Contact 值          :\
  \ \" + contact.getFirstName() + \" \"`\n`+ contact.getLastName());`\n\n`        System.out.println(\"\
  修改 StringProperty 值\");`\n`        fname.setValue(\"Jane\");`\n`        lname.setValue(\"\
  Deer\");`\n\n`        System.out.println(\"修改后 - StringProperty 值   : \" + fname.getValue()\
  \ + \" \" +`\n`lname.getValue());`\n`        System.out.println(\"修改后 - Contact\
  \ 值          : \" + contact.getFirstName() + \" \"`\n`+ contact.getLastName());`\n\
  \n`        System.out.println();`\n`        System.out.println(\"矩形的面积 [高级 Fluent\
  \ API]\");`\n\n`        // 面积 = 宽度 * 高度`\n`        final IntegerProperty width =\
  \ new SimpleIntegerProperty(10);`\n`        final IntegerProperty height = new SimpleIntegerProperty(10);`\n\
  \n`        NumberBinding area = width.multiply(height);`\n\n`        System.out.println(\"\
  当前 - 宽度和高度     : \" + width.get() + \" \" +`\n`height.get());`\n`        System.out.println(\"\
  当前 - 矩形面积: \" + area.getValue());`\n`        System.out.println(\"修改宽度和高度\");`\n\
  \n`        width.set(100);`\n`        height.set(700);`\n\n`        System.out.println(\"\
  修改后 - 宽度和高度     : \" + width.get() + \" \" +`\n`height.get());`\n`        System.out.println(\"\
  修改后 - 矩形面积: \" + area.getValue());`\n`        System.out.println();`\n`        System.out.println(\"\
  球体的体积 [低级 API]\");`\n\n`        // 体积 = 4/3 * pi r³`\n`        final DoubleProperty\
  \ radius = new SimpleDoubleProperty(2);`\n\n`        DoubleBinding volumeOfSphere\
  \ = new DoubleBinding() {`\n`            {`\n`                super.bind(radius);`\n\
  `            }`\n\n`            @Override`\n`            protected double computeValue()\
  \ {`\n`                return (4 / 3 * Math.PI * Math.pow(radius.get(), 3));`\n\
  `            }`\n`        };`\n\n`        System.out.println(\"当前 - 球体半径: \" + radius.get());`\n\
  `        System.out.println(\"当前 - 球体体积: \" + volumeOfSphere.get());`\n`        System.out.println(\"\
  修改 DoubleProperty 半径\");`\n\n`        radius.set(50);`\n`        System.out.println(\"\
  修改后 - 球体半径: \" + radius.get());`\n`        System.out.println(\"修改后 - 球体体积: \" +\
  \ volumeOfSphere.get());`\n\n`    }`\n`}`\n\n`class Contact {`\n\n`    private SimpleStringProperty\
  \ firstName = new SimpleStringProperty();`\n`    private SimpleStringProperty lastName\
  \ = new SimpleStringProperty();`\n\n`    public Contact(String fn, String ln) {`\n\
  `        firstName.setValue(fn);`\n`        lastName.setValue(ln);`\n`    }`\n\n\
  `    public final String getFirstName() {`\n`        return firstName.getValue();`\n\
  `    }`\n\n`    public StringProperty firstNameProperty() {`\n`        return firstName;`\n\
  `    }`\n\n`    public final void setFirstName(String firstName) {`\n`        this.firstName.setValue(firstName);`\n\
  `    }`\n\n`    public final String getLastName() {`\n`        return lastName.getValue();`\n\
  `    }`\n\n`    public StringProperty lastNameProperty() {`\n`        return lastName;`\n\
  `    }`\n\n`    public final void setLastName(String lastName) {`\n`        this.lastName.setValue(lastName);`\n\
  `    }`\n`}`\n\n以下输出演示了这三种绑定场景：\n\n`绑定 Contact bean [双向绑定]`\n`当前 - StringProperty\
  \ 值   : John Doe`\n`当前 - Contact 值          : John Doe`\n`修改 StringProperty 值`\n\
  `修改后 - StringProperty 值   : Jane Deer`\n`修改后 - Contact 值          : Jane Deer`\n\
  \n`矩形的面积 [高级 Fluent API]`\n`当前 - 宽度和高度     : 10 10`\n`当前 - 矩形面积: 100`\n`修改宽度和高度`\n\
  `修改后 - 宽度和高度     : 100 700`\n`修改后 - 矩形面积: 70000`\n\n`球体的体积 [低级 API]`\n`当前 - 球体半径:\
  \ 2.0`\n`当前 - 球体体积: 25.132741228718345`\n`修改 DoubleProperty 半径`\n`修改后 - 球体半径: 50.0`\n\
  `修改后 - 球体体积: 392699.0816987241`\n\n\n\n#### 工作原理\n\n绑定（Binding）的核心思想是至少两个值保持同步。这意味着当一个依赖变量发生变化时，另一个变量也会随之改变。JavaFX\
  \ 提供了多种绑定选项，使开发者能够同步领域对象和 GUI 控件中的属性。本示例将演示三种常见的绑定场景。\n\n绑定变量最简单的方法之一是*双向绑定*。当领域对象包含的数据需要绑定到\
  \ GUI 表单时，通常会使用这种场景。在本示例中，我们创建了一个包含名字和姓氏的简单联系人（`Contact`）对象。请注意，实例变量使用了 `SimpleStringProperty`\
  \ 类。许多以 `Property` 结尾的类都是 `javafx.beans.Observable` 类，它们都具有被绑定的能力。为了使这些属性能够被绑定，它们必须是相同的数据类型。在前面的示例中，我们在创建的\
  \ `Contact` 领域对象外部创建了类型为 `SimpleStringProperty` 的名字和姓氏变量。创建完成后，我们对它们进行双向绑定，以便任何一端的更改都能同步更新。因此，如果你更改了领域对象，其他绑定的属性也会更新。而当外部变量被修改时，领域对象的属性也会更新。以下演示了针对领域对象（`Contact`）的字符串属性进行双向绑定：\n\
  \n`Contact contact = new Contact(\"John\", \"Doe\");`\n`StringProperty fname = new\
  \ SimpleStringProperty();`\n`fname.bindBidirectional(contact.firstNameProperty());`\n\
  `StringProperty lname = new SimpleStringProperty();`\n`lname.bindBidirectional(contact.lastNameProperty());`\n\
  \n接下来是如何绑定数字。使用新的 Fluent API 绑定数字非常简单。这种高级机制允许开发者绑定变量，通过简单的算术运算来计算值。基本上，一个“公式”被“绑定”后，会根据其所绑定的变量的变化来改变其结果。请查阅\
  \ Javadoc 了解所有可用方法和数字类型的详细信息。在这个示例中，我们简单地创建了一个计算矩形面积的公式。面积（`NumberBinding`）是绑定对象，它的依赖项是宽度和高度（`IntegerProperty`）属性。使用\
  \ Fluent 接口 API 进行绑定时，你会注意到 `multiply()` 方法。根据 Javadoc，所有属性类都继承自 `NumberExpressionBase`\
  \ 类，该类包含了基于数字的 Fluent 接口 API。以下代码片段使用了 Fluent 接口 API：\n\n`// 面积 = 宽度 * 高度`\n`final\
  \ IntegerProperty width = new SimpleIntegerProperty(10);`\n`final IntegerProperty\
  \ height = new SimpleIntegerProperty(10);    `\n`NumberBinding area = width.multiply(height);`\n\
  \n最后一种绑定数字的场景被认为是一种更底层的方法。这允许开发者使用基本数据类型和更复杂的数学运算。这里我们使用 `DoubleBinding` 类，根据给定的半径求解球体的体积。我们首先实现\
  \ `computeValue()` 方法来执行体积的计算。如下所示，是通过重写 `computeValue()` 方法计算球体体积的底层绑定场景：\n\n`final\
  \ DoubleProperty radius = new SimpleDoubleProperty(2);`\n\n`DoubleBinding volumeOfSphere\
  \ = new DoubleBinding() {`\n`        {`\n`             super.bind(radius);`\n`        }`\n\
  \n`        @Override`\n`        protected double computeValue() {`\n`                return\
  \ (4 / 3 * Math.PI * Math.pow(radius.get(), 3));`\n`        }`\n`};`\n\n### 1-11.\
  \ 创建和使用可观察列表\n\n#### 问题\n\n你想创建一个包含两个列表视图控件的 GUI 应用程序，允许用户在两个列表之间传递项目。\n\n#### 解决方案\n\
  \n利用 JavaFX 的 `javafx.collections.ObservableList` 和 `javafx.scene.control.ListView`\
  \ 类，提供一种模型-视图-控制器（MVC）机制，每当后端列表被操作时，UI 的列表视图控件都会自动更新。\n\n以下代码创建了一个包含两个列表的 GUI 应用程序，允许用户将一个列表中的项目发送到另一个列表。这里你将创建一个虚构的应用程序，用于挑选被视为英雄的候选人。用户将从左侧的列表中选择潜在的候选人，并将其移动到右侧的列表中，以被视为英雄。这演示了\
  \ UI 列表控件（`ListView`）与后端存储列表（`ObservableList`）同步的能力。\n\n`primaryStage.setTitle(\"\
  第 1-11 章 创建和使用 ObservableLists\");`\n`Group root = new Group();`\n`Scene scene =\
  \ new Scene(root, 400, 250, Color.WHITE);`\n\n`// 创建一个网格面板`\n`GridPane gridpane\
  \ = new GridPane();`\n`gridpane.setPadding(new Insets(5));`\n`gridpane.setHgap(10);`\n\
  `gridpane.setVgap(10);`\n\n`// 候选人标签`\n`Label candidatesLbl = new Label(\"候选人\"\
  );`\n`GridPane.setHalignment(candidatesLbl, HPos.CENTER);`\n`gridpane.add(candidatesLbl,\
  \ 0, 0);`\n\n`Label heroesLbl = new Label(\"英雄\");`\n`gridpane.add(heroesLbl, 2,\
  \ 0);`\n`GridPane.setHalignment(heroesLbl, HPos.CENTER);`\n\n`// 候选人`\n`final ObservableList<String>\
  \ candidates =`\n`FXCollections.observableArrayList(\"超人\",`\n`        \"蜘蛛侠\",`\n\
  `        \"金刚狼\",`\n`        \"警察\",`\n`        \"消防救援\",`\n`        \"士兵\",`\n\
  `        \"父母\",`\n`        \"医生\",`\n`        \"政治家\",`\n`        \"牧师\",`\n`        \"\
  教师\");`\n`final ListView<String> candidatesListView = new ListView<String>(candidates);`\n\
  `candidatesListView.setPrefWidth(150);`\n`candidatesListView.setPrefHeight(150);`\n\
  \n`gridpane.add(candidatesListView, 0, 1);`\n\n`// 英雄`\n`final ObservableList<String>\
  \ heroes = FXCollections.observableArrayList();`\n`final ListView<String> heroListView\
  \ = new ListView<String>(heroes);`\n`heroListView.setPrefWidth(150);`\n`heroListView.setPrefHeight(150);`\n\
  \n`gridpane.add(heroListView, 2, 1);`\n\n`// 选择英雄`\n`Button sendRightButton = new\
  \ Button(\">\");`\n`sendRightButton.setOnAction(new EventHandler<ActionEvent>()\
  \ {`\n\n`    public void handle(ActionEvent event) {`\n`        String potential\
  \ = candidatesListView.getSelectionModel().getSelectedItem();`\n`        if (potential\
  \ != null) {`\n`            candidatesListView.getSelectionModel().clearSelection();`\n\
  `            candidates.remove(potential);`\n`            heroes.add(potential);`\n\
  `        }`\n`    }`\n`});`\n\n`// 取消选择英雄`\n`Button sendLeftButton = new Button(\"\
  <\");`\n`sendLeftButton.setOnAction(new EventHandler<ActionEvent>() {`\n\n`    public\
  \ void handle(ActionEvent event) {`\n`        String notHero = heroListView.getSelectionModel().getSelectedItem();`\n\
  `        if (notHero != null) {`\n`            heroListView.getSelectionModel().clearSelection();`\n\
  `            heroes.remove(notHero);`\n`            candidates.add(notHero);`\n\
  `        }`\n`    }`\n`});`\n\n`VBox vbox = new VBox(5);`\n`vbox.getChildren().addAll(sendRightButton,sendLeftButton);`\n\
  \n`gridpane.add(vbox, 1, 1);`\n`GridPane.setConstraints(vbox, 1, 1, 1, 2,HPos.CENTER,\
  \ VPos.CENTER);`\n\n`root.getChildren().add(gridpane);        `\n`primaryStage.setScene(scene);`\n\
  `primaryStage.show();`\n\n图 1-17 描绘了我们的英雄选择应用程序。\n\n![images](img/0117.jpg)\n\n\
  ***图 1-17.** ListViews 和 ObservableLists*\n\n\n\n#### 工作原理\n\n在处理 Java `collections`\
  \ 时，你会注意到有许多有用的容器类，它们代表了各种数据结构。其中一种常用的集合是 `java.util.ArrayList` 类。当构建包含 `ArrayList`\
  \ 的领域对象的应用程序时，开发者可以轻松地操作集合中的对象。但在过去，将 Java Swing 组件与集合结合使用往往是一个挑战，尤其是更新 GUI 以反映领域对象的变化。我们如何解决这个问题呢？别担心，JavaFX\
  \ 的 `ObservableList` 来救场了！\n\n说到救场，我创建了一个 GUI 应用程序，允许用户选择他们最喜欢的英雄。这与通过从列表框组件中添加或删除项目来管理用户角色的应用程序界面非常相似。在\
  \ JavaFX 中，我们将使用一个 `ListView` 控件来保存 String 对象。在创建 `ListView` 实例之前，我们先创建一个包含候选对象的\
  \ `ObservableList`。这里你会注意到使用了名为 `FXCollections` 的工厂类，你可以将常见的集合类型传入其中，这些集合会被包装并以\
  \ `ObservableList` 的形式返回给调用者。在本示例中，我传入了一个 String 数组而不是 `ArrayList`，希望你能明白如何使用 `FXCollections`\
  \ 类。我相信你会明智地使用它：“能力越大，责任越大”。这行代码调用了 `FXCollections` 类来返回一个可观察列表（`ObservableList`）：\n\
  \n`ObservableList<String> candidates = FXCollections.observableArrayList(...);`\n\
