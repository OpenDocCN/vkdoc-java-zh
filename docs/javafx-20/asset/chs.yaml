  \ 2-2\\. 生成动画\n\n#### 问题\n\n你想要生成一个动画。例如，你想创建一个满足以下需求的新闻滚动条和照片查看器应用程序：\n\n> *  \
  \ 它将包含一个向左滚动的新闻滚动条控件。\n> *   当用户点击按钮控件时，当前图片会淡出，下一张图片会淡入。\n> *   当光标移入和移出场景区域时，按钮控件会分别淡入和淡出。\n\
  \n#### 解决方案\n\n通过访问 JavaFX 的动画 API（`javafx.animation.*`）来创建动画效果。要创建新闻滚动条，你需要以下类：\n\
