  图 3-2 展示了一个带有可视化效果的 JavaFX MP3 播放器。\n\n![images](img/0302.jpg)\n\n***图 3-2.** JavaFX\
  \ MP3 播放器*\n\n\n\n#### 工作原理\n\n在开始之前，我们先讨论一下如何操作我们的 MP3 播放器。用户可以将音频文件拖放到应用程序区域中，以便随后播放。应用程序右下角有用于停止、暂停和恢复音频媒体播放的按钮。（按钮控件如图\
  \ 3-2 所示。）在音乐播放过程中，用户还会注意到随机颜色的球体随着音乐跳动。当用户听完音乐后，可以点击右上角的白色圆角关闭按钮退出应用程序。\n\n这与技巧\
  \ 2-1 类似，您在其中学习了如何使用拖放桌面隐喻将文件加载到 JavaFX 应用程序中。不过，这里用户使用的是音频文件，而不是图像文件。要加载音频文件，JavaFX\
  \ 目前支持以下文件格式：`.mp3`、`.wav` 和 `.aiff`。\n\n遵循相同的视觉风格，您将使用与技巧 12-1 相同的样式。在本技巧中，我修改了按钮控件，使其看起来像按钮，类似于许多媒体播放器应用程序。当按下暂停按钮时，它将暂停音频媒体的播放，并切换到播放按钮控件，从而允许用户恢复播放。作为额外奖励，MP3\
  \ 播放器将显示为一个不规则形状、半透明且无边框的窗口，并且可以使用鼠标在桌面上拖动。现在您已经知道如何操作音乐播放器，让我们来浏览一下代码。\n\n首先，您将创建实例变量，这些变量将在应用程序的整个生命周期中维护状态信息。表\
  \ 3-1 描述了我们的音乐播放器应用程序中使用的所有实例变量。第一个变量是对媒体播放器（`MediaPlayer`）对象的引用，该对象将与包含音频文件的 `Media`\
  \ 对象一起创建。接下来，您将创建一个 `anchorPt` 变量，用于在用户开始拖动窗口时保存鼠标按下时的起始坐标。在鼠标拖动操作期间计算应用程序窗口的左上角边界时，`previousLocation`\
  \ 变量将包含上一个窗口的屏幕 X 和 Y 坐标。\n\n表 3-1 列出了 MP3 播放器应用程序的实例变量：\n\n![images](img/t0301.jpg)\n\
  \n在之前关于 GUI 的章节中，您看到 GUI 应用程序通常包含一个标题栏和围绕 `Scene` 的窗口边框。在这里，我想通过向您展示如何创建不规则形状的半透明窗口来提高一点标准，从而使事情看起来更时髦或更现代。当您开始创建媒体播放器时，您会注意到在\
  \ `start()` 方法中，我们通过使用 `StageStyle.TRANSPARENT` 初始化样式来准备 `Stage` 对象。将样式初始化为 `StageStyle.TRANSPARENT`\
  \ 后，窗口将无装饰，整个窗口区域的不透明度设置为零（不可见）。以下代码展示了如何创建一个没有标题栏或窗口边框的透明窗口：\n\n`primaryStage.initStyle(StageStyle.TRANSPARENT);`\n\
  \n有了这个不可见的舞台，您将创建一个圆角矩形区域，作为应用程序的表面或主要内容区域。接下来，您会注意到矩形的宽度和高度绑定到了场景对象，以防窗口大小被调整。由于窗口不会被调整大小，因此绑定不是必需的（但在技巧\
  \ 3-2 中，当您有机会将视频屏幕放大到全屏模式时，将需要它）。\n\n在创建了一个黑色、半透明、圆角的矩形区域（`applicationArea`）之后，您将创建一个简单的\
  \ `Group` 对象，用于容纳所有随机颜色的 `Circle` 节点，这些节点将在音频播放时展示图形可视化效果。稍后，您将看到如何使用 `AudioSpectrumListener`\
  \ 根据声音信息更新 `phaseNodes`（`Group`）变量。\n\n接下来，您将向 `Scene` 对象添加 `EventHandler<MouseEvent>`\
  \ 实例，以监控用户在屏幕上拖动窗口时的鼠标事件。此场景中的第一个事件是鼠标按下，它将光标的当前 (X, Y) 坐标保存到变量 `anchorPt` 中。以下代码向\
  \ `Scene` 的鼠标按下属性添加了一个 `EventHandler`：\n\n`        // 起始锚点`\n`        scene.setOnMousePressed(new\
  \ EventHandler<MouseEvent>() {`\n`            public void handle(MouseEvent event){`\n\
  `                anchorPt = new Point2D(event.getScreenX(), event.getScreenY());`\n\
  `            }`\n`        });`\n\n实现鼠标按下事件处理器后，您可以创建一个 `EventHandler` 来处理 `Scene`\
  \ 的鼠标拖动属性。鼠标拖动事件处理器将根据上一个窗口的位置（左上角）以及 `anchorPt` 变量，动态更新和定位应用程序窗口（`Stage`）。此处显示的是负责\
  \ `Scene` 对象上鼠标拖动事件的事件处理器：\n\n`        // 拖动整个舞台`\n`        scene.setOnMouseDragged(new\
  \ EventHandler<MouseEvent>() {`\n`            public void handle(MouseEvent event){`\n\
  `                if (anchorPt != null && previousLocation != null) {`\n`                    primaryStage.setX(previousLocation.getX()\
  \ + event.getScreenX() - anchorPt.getX());`\n`                    primaryStage.setY(previousLocation.getY()\
  \ + event.getScreenY() - anchorPt.getY());                    `\n`                }`\n\
  `            }`\n`        });`\n\n您还需要处理鼠标释放事件。一旦鼠标被释放，事件处理器将更新 `previousLocation`\
  \ 变量，以便后续的鼠标拖动事件能够在屏幕上移动应用程序窗口。以下代码片段更新了 `previousLocation` 变量：\n\n`        // 设置当前位置`\n\
  `        scene.setOnMouseReleased(new EventHandler<MouseEvent>() {`\n`            public\
  \ void handle(MouseEvent event){`\n`                previousLocation = new Point2D(primaryStage.getX(),\
  \ primaryStage.getY());`\n`            }`\n`        });`\n\n接下来，您将实现拖放场景，以从文件系统（文件管理器）加载音频文件。处理拖放场景时，它与技巧\
  \ 2-1 类似，您在其中创建了一个 `EventHandler` 来处理 `DragEvent`。这里我们将从主机文件系统加载音频文件，而不是图像文件。为简洁起见，我将仅提及拖放事件处理器的代码行。一旦音频文件可用，您将通过将文件作为\
  \ `URI` 传入来创建一个 `Media` 对象。以下代码片段展示了如何创建一个 `Media` 对象：\n\n`Media media = new Media(new\
  \ File(filePath).toURI().toString());`\n\n创建 `Media` 对象后，您需要创建一个 `MediaPlayer` 实例来播放声音文件。`Media`\
  \ 和 `MediaPlayer` 对象都是不可变的，这就是为什么每次用户将文件拖入应用程序时都会创建它们的新实例。接下来，您将检查实例变量 `mediaPlayer`\
  \ 中是否有先前的实例，以确保在创建新的 `MediaPlayer` 实例之前它已停止。以下代码检查是否有先前的媒体播放器需要停止：\n\n`  if (mediaPlayer\
  \ != null) {`\n`    mediaPlayer.stop();`\n`  }`\n\n那么，这就是我们创建 `MediaPlayer` 实例的地方。为了简化编码，您将使用\
  \ `MediaPlayer` 的构建器类 `MediaPlayerBuilder`。`MediaPlayer` 对象负责控制媒体对象的播放。请注意，`MediaPlayer`\
  \ 在播放、暂停和停止媒体方面对声音或视频媒体的处理方式相同。使用 `MediaPlayerBuilder` 类创建媒体播放器时，您需要指定 `media` 和\
  \ `audioSpectrumListener` 属性方法。将 autoPlay 属性设置为 true 将在加载音频媒体后立即播放它。需要在 `MediaPlayer`\
  \ 实例上指定的最后一件事是 `AudioSpectrumListener`。那么，这种监听器到底是什么呢？根据 Javadocs，它说它是一个接收音频频谱周期性更新的观察者。用通俗的话说，它就是音频媒体的声音数据，例如音量和节奏等。要创建\
  \ `AudioSpectrumListener` 的实例，您将创建一个内部类，重写 `spectrumDataUpdate()` 方法。表 3-2 列出了音频频谱监听器方法的所有入参。有关更多详细信息，请参阅\
  \ [`http://download.oracle.com/javafx/2.0/api/javafx/scene/media/AudioSpectrumListener.html`](http://download.oracle.com/javafx/2.0/api/javafx/scene/media/AudioSpectrumListener.html)\
  \ 上的 Javadocs。\n\n![images](img/t0302.jpg)\n\n在这里，您将创建随机颜色的圆形节点，根据变量 phases（浮点数数组）将它们定位并放置在场景上。要绘制每个彩色圆形，您将圆形的中心\
  \ X 坐标递增 5 像素，并将圆形的中心 Y 坐标加上每个相位值乘以 100。此处显示的是绘制每个随机颜色圆形的代码片段：\n\n`circle.setCenterX(x\
  \ + i);`\n`        circle.setCenterY(y + (phase * 100));`\n`        ... // 设置圆形`\n\
  `i+=5;`\n\n以下是 `AudioSpectrumListener` 的内部类实现：\n\n`new AudioSpectrumListener() {`\n\
  `            @Override`\n`            public void spectrumDataUpdate(double timestamp,\
  \ double duration, float[]`\n`magnitudes, float[] phases) {`\n\n`               phaseNodes.getChildren().clear();`\n\
  `               int i = 0;`\n`               int x = 10;`\n`               int y\
  \ = 150;`\n`               final Random rand = new Random(System.currentTimeMillis());`\n\
  `               for(float phase:phases) {`\n`                 int red = rand.nextInt(255);`\n\
  `                 int green = rand.nextInt(255);`\n`                 int blue =\
  \ rand.nextInt(255);`\n\n`                 Circle circle = new Circle(10);`\n`                 circle.setCenterX(x\
  \ + i);`\n`                 circle.setCenterY(y + (phase * 100));`\n`                 circle.setFill(Color.rgb(red,\
  \ green, blue, .70));`\n`                 phaseNodes.getChildren().add(circle);`\n\
  `                 i+=5;`\n`              }`\n\n`           }`\n`         };`\n\n\
  创建媒体播放器后，您将创建一个 `java.lang.Runnable`，将其设置到 `onReady` 属性中，以便在媒体处于就绪状态时调用。一旦就绪事件被触发，`run()`\
  \ 方法将调用媒体播放器对象的 `play()` 方法来开始播放音频。完成拖放序列后，我们通过调用事件的 `setDropCompleted()` 方法并传入值\
  \ true 来适当地通知拖放系统。以下代码片段实现了一个 `Runnable`，以便在媒体播放器进入就绪状态后立即启动它：\n\n`   mediaPlayer.setOnReady(new\
  \ Runnable() {`\n`      @Override`\n`      public void run() {`\n`         mediaPlayer.play();`\n\
  `      }`\n`   });`\n\n最后，您将使用 JavaFX 形状创建按钮，以表示停止、播放、暂停和关闭按钮。创建形状或自定义节点时，您可以向节点添加事件处理器以响应鼠标点击。尽管在\
  \ JavaFX 中有构建自定义控件的高级方法，但我选择使用简单的矩形、弧线、圆形和线条来构建我自己的按钮图标。要了解创建自定义控件的更高级方法，请参阅 `Skinnable`\
  \ API 或技巧 2-5 的 Javadocs。要附加鼠标按下的事件处理器，只需调用 `setOnMousePress()` 方法，并传入一个 `EventHandler<MouseEvent>`\
  \ 实例。以下代码演示了向 `stopButton` 节点添加一个 `EventHandler` 以响应鼠标按下：\n\n`        stopButton.setOnMousePressed(new\
  \ EventHandler<MouseEvent>() {`\n`            public void handle(MouseEvent me)\
  \ {`\n`               if (mediaPlayer!= null) {`\n`                 mediaPlayer.stop();                   `\n\
  `               }`\n`            }`\n`        });`\n\n由于所有按钮都使用相同的前述代码片段，我将仅列出每个按钮将在媒体播放器上执行的方法调用。最后一个按钮“关闭”与媒体播放器无关，但它是退出\
  \ MP3 播放器应用程序的方式。以下操作负责停止、暂停、播放和退出 MP3 播放器应用程序：\n\n`停止 - mediaPlayer.stop();  `\n\
  `暂停 - mediaPlayer.pause();`\n`播放 - mediaPlayer.play();`\n`关闭 - Platform.exit();`\n\
  \n\n\n### 3-2. 播放视频\n\n#### 问题\n\n您希望查看一个视频文件，并带有播放、暂停、停止和进度条等控制功能。\n\n#### 解决方案\n\
  \n通过使用以下类来创建一个视频媒体播放器：\n\n> *   `javafx.scene.media.Media`\n> *   `javafx.scene.media.MediaPlayer`\n\
  > *   `javafx.scene.media.MediaView`\n\n以下代码是一个 JavaFX 基础视频播放器的实现：\n\n`public void\
  \ start(final Stage primaryStage) {`\n`    primaryStage.setTitle(\"第 3-2 章 播放视频\"\
