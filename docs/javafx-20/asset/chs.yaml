  \n![images](img/0211.jpg)\n\n***图 2-11.** Sky 外观与风格*\n\n\n\n#### 工作原理\n\nJavaFX\
  \ 能够像浏览器将 CSS 样式应用于 HTML 文档对象模型（DOM）中的元素一样，将 CSS 样式应用于场景图及其节点。在本教程中，你将使用 JavaFX\
  \ 样式属性为用户界面进行皮肤定制。我主要使用本教程的 UI 来应用各种外观（Look ‘n’ Feel）。为了展示可用的皮肤，提供了一个菜单选择，允许用户选择要应用于\
  \ UI 的外观。\n\n在讨论 CSS 样式属性之前，我想先向你展示如何加载要应用于 JavaFX 应用程序的 CSS 样式。首先，你需要创建菜单项，以便用户可以选择偏好的外观。创建菜单项时，你将创建一个便捷方法来构建一个菜单项，该方法会加载指定的\
  \ CSS 文件，并设置一个 `EventHandler` 动作，将选定的 CSS 样式应用于当前 UI。在添加 Caspian 主题作为菜单项时，你会注意到无需加载任何资源，因为它是\
  \ JavaFX 当前的外观。如下所示，是添加一个包含可应用于当前 UI 的 Caspian 外观 CSS 样式的菜单项：\n\n`MenuItem caspianLnf\
  \ = new MenuItem(\"Caspian\");`\n`caspianLnf.setOnAction(skinForm(caspian, scene));`\n\
  \n如下所示，是添加一个包含可应用于当前 UI 的 Sky 外观 CSS 样式的菜单项：\n\n`MenuBar menuBar = new MenuBar();`\n\
  `Menu menu = new Menu(\"Look 'N' Feel\");`\n`menu.getItems().add(createMenuItem(\"\
  Sky\", \"sky.css\", scene));`\n\n调用 `createMenuItem()` 方法时，还会调用另一个名为 `loadSkin()`\
  \ 的便捷方法来加载 CSS 文件。它还会通过调用 `skinForm()` 方法，为菜单项的 `onAction` 属性设置一个合适的 `EventHandler`。回顾一下，`loadSkin`\
  \ 负责加载 CSS 文件，而 `skinForm()` 方法负责将皮肤应用于 UI 应用程序。如下所示，是构建菜单项并将 CSS 样式应用于 UI 应用程序的便捷方法：\n\
  \n`    protected final MenuItem createMenuItem(String label, String css, final Scene\
  \ scene){`\n`        MenuItem menuItem = new MenuItem(label);`\n`        ObservableList<String>\
  \ cssStyle = loadSkin(css);`\n`        menuItem.setOnAction(skinForm(cssStyle, scene));`\n\
  `        return menuItem;`\n`    }`\n\n`    protected final ObservableList<String>\
  \ loadSkin(String cssFileName) {`\n`        ObservableList<String> cssStyle = FXCollections.observableArrayList();`\n\
  `        cssStyle.addAll(getClass().getResource(cssFileName).toExternalForm());`\n\
  `        return cssStyle;`\n`    }`\n\n`    protected final EventHandler<ActionEvent>\
  \ skinForm(final ObservableList<String> cssStyle,`\n`final Scene scene) {`\n`        return\
  \ new EventHandler<ActionEvent>(){`\n`            public void handle(ActionEvent\
  \ event) {`\n`                scene.getStylesheets().clear();`\n`                scene.getStylesheets().addAll(cssStyle);   `\n\
  `            }`\n`        };`\n`    }`\n\n![images](img/square.jpg) **注意** 要运行本教程示例，请确保\
  \ CSS 文件位于编译后的类目录中。当资源文件与加载它们的编译类文件位于同一目录（包）中时，可以轻松加载。CSS 文件与此代码示例文件位于同一位置。在 NetBeans\
  \ 中，你可以选择“清理并构建项目”，或者将文件复制到你的类构建目录中。\n\n现在，你已经知道如何加载 CSS 样式，接下来让我们讨论 JavaFX CSS\
  \ 选择器和样式属性。与 CSS 样式表类似，场景图中的 `Node` 对象也有关联的选择器或样式类。所有场景图节点都有一个名为 `setStyle()` 的方法，用于应用可能改变节点背景颜色、边框、描边等的样式属性。由于所有图节点都继承自\
  \ `Node` 类，派生类将能够继承相同的样式属性。了解节点类型的继承层次结构非常重要，因为节点类型将决定你可以影响的样式属性类型。例如，Rectangle\
  \ 继承自 Shape，而 Shape 又继承自 Node。这种继承不包括 `-fx-border-style`，它是继承自 `Region` 的节点的一部分。根据节点类型的不同，你可以设置的样式会受到限制。要查看所有样式选择器的完整列表，请参考\
  \ JavaFX CSS 参考指南：[`http://download.oracle.com/docs/cd/E17802_01/javafx/javafx/1.3/docs/api/javafx.scene/doc-files/cssref.html`](http://download.oracle.com/docs/cd/E17802_01/javafx/javafx/1.3/docs/api/javafx.scene/doc-files/cssref.html)。\n\
  \n所有 JavaFX 样式属性都将以 `-fx-` 为前缀。例如，所有 `Node` 都有一个样式属性来影响其不透明度，使用的属性是 `-fx-opacity`。以下是用于设置\
  \ JavaFX `javafx.scene.control.Label` 和 `javafx.scene.control.Button` 样式的选择器：\n\n\
  `.label {`\n`    -fx-text-fill: rgba(17, 145, 213);`\n`    -fx-border-color: rgba(255,\
  \ 255, 255, .80);`\n`    -fx-border-radius: 8;`\n`    -fx-padding: 6 6 6 6;`\n`    -fx-font:\
  \ bold italic 20pt \"LucidaBrightDemiBold\";`\n\n`}`\n`.button{`\n`    -fx-text-fill:\
  \ rgba(17, 145, 213);`\n`    -fx-border-color: rgba(255, 255, 255, .80);`\n`    -fx-border-radius:\
  \ 8;`\n`    -fx-padding: 6 6 6 6;`\n`    -fx-font: bold italic 20pt \"LucidaBrightDemiBold\"\
  ;`\n\n`}`\n\n## 第 3 章\n\n## JavaFX 中的媒体\n\nJavaFX 提供了一个功能丰富的媒体 API，能够播放音频和视频。Media\
  \ API 允许开发人员将音频和视频集成到他们的富互联网应用程序（RIA）中。Media API 的主要优势之一在于，通过 Web 分发媒体内容时具有跨平台能力。由于需要播放多媒体内容的设备种类繁多（平板电脑、音乐播放器、电视等），跨平台\
  \ API 的需求至关重要。\n\n想象一下不远的未来，你的电视或墙壁能够以你从未梦想过的方式与你互动。例如，在观看电影时，你可以选择电影中使用的物品或服装并立即购买，而这一切都舒适地在家中完成。基于这样的未来愿景，开发人员致力于增强其媒体应用程序的交互特性。\n\
  \n在本章中，你将学习如何以交互方式播放音频和视频。请就座，观看 JavaFX 的第三幕，音频和视频将成为舞台的中心（如图 3-1 所示）。\n\n![images](img/0301.jpg)\n\
