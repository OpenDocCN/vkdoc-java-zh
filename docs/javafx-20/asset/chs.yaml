  \n***图 2-2.** 拖放进行中*\n\n图 2-3 展示了放置操作已成功加载图像。\n\n![images](img/0203.jpg)\n\n***图\
  \ 2-3.** 放置操作完成*\n\n\n\n#### 工作原理\n\n本示例是一个简单的应用程序，允许您查看具有 `.jpg`、`.png` 和 `.gif`\
  \ 等文件格式的图像。加载图像需要使用鼠标将文件拖放到窗口区域。该应用程序还允许调整窗口大小，这会自动按比例缩放图像尺寸，同时保持其宽高比。成功加载几张图像后，您可以通过单击左右按钮控件方便地翻页浏览每张图像，如图\
  \ 2-3 所示。\n\n在代码讲解之前，我们先讨论一下应用程序的变量。表 2-1 描述了我们这个精美图像查看器应用程序的实例变量。\n\n![images](img/t0201.jpg)\n\
  \n当将图像拖入应用程序时，`imageFiles` 变量会缓存绝对文件路径（作为字符串），而不是实际的图像文件，以节省内存空间。如果用户将同一图像文件拖入显示区域，列表中会包含代表该图像文件的重复字符串。在显示图像时，`currentIndex`\
  \ 变量包含指向 `imageFiles` 列表的索引。该 `imageFiles` 列表指向代表当前图像文件的字符串。当用户点击按钮显示上一张或下一张图像时，`currentIndex`\
  \ 会相应地递减或递增。接下来，您将逐步了解加载和显示图像的详细代码。稍后，我将讨论使用“上一张”和“下一张”按钮翻页浏览每张图像的步骤。\n\n您首先需要实例化一个\
  \ `javafx.scene.image.ImageView` 类的实例。`ImageView` 类是一个图形节点（`Node`），用于显示已加载的 `javafx.scene.image.Image`\
  \ 对象。使用 `ImageView` 节点，您可以在不操作物理 `Image` 的情况下，对要显示的图像创建特殊效果。为了避免在渲染多种效果时性能下降，您可以使用多个引用同一个\
  \ `Image` 对象的 `ImageView` 对象。许多效果类型包括模糊、淡化和图像变换。\n\n其中一个需求是在用户调整窗口大小时保持显示图像的宽高比。在这里，您只需调用\
  \ `setPreserveRatio()` 方法，并传入值 `true` 来保持图像的宽高比。请记住，由于用户会调整窗口大小，您需要将 `ImageView`\
  \ 的宽度绑定到 `Scene` 的宽度，以使图像缩放生效。设置好 `ImageView` 后，您需要将其传递给一个 `HBox` 实例（`pictureRegion`），以便放入场景中。以下代码创建了\
  \ `ImageView` 实例，保持了宽高比，并缩放了图像：\n\n`    // 图像视图`\n`    final ImageView currentImageView\
  \ = new ImageView();`\n\n`    // 保持宽高比`\n`    currentImageView.setPreserveRatio(true);`\n\
  \n`    // 基于场景调整大小`\n`    currentImageView.fitWidthProperty().bind(scene.widthProperty());`\n\
  \n接下来，我想介绍 JavaFX 新的原生拖放支持，它为用户提供了许多可执行的操作场景，例如将可视对象从一个应用程序拖放到另一个应用程序。在此场景中，用户将从宿主窗口操作系统拖放一个图像文件到您的图像查看器应用程序。执行此操作时，您必须创建\
  \ `EventHandler` 对象来监听 `DragEvent`。为满足此需求，您只需设置场景的拖放悬停（drag-over）和拖放放下（drag-dropped）事件处理方法。\n\
  \n要设置拖放悬停属性，您需要调用 Scene 的 `setOnDragOver()` 方法，并传入适当的泛型类型 `EventHandler<DragEvent>`。在这里，您将实现\
  \ `handle()` 方法来监听拖放悬停事件（`DragEvent`）。在 `handle()` 方法中，请注意事件（`DragEvent`）对象调用了 `getDragboard()`\
  \ 方法。调用 `getDragboard()` 将返回拖放源（`Dragboard`），通常称为*剪贴板*。获取 `Dragboard` 对象后，您可以确定并验证拖放悬停在表面上的内容。在此场景中，您需要判断\
  \ `Dragboard` 对象是否包含任何文件。如果是，则调用事件对象的 `acceptTransferModes()` 方法，并传入常量 `TransferMode.COPY`，以向应用程序用户提供视觉反馈（请参考图\
  \ 2-2）。否则，应通过调用 `event.consume()` 方法来消费该事件。以下代码演示了如何通过实例化一个形式类型参数为 `<DragEvent>`\
  \ 的 `EventHandler` 类型的内部类，并重写其 `handle()` 方法来设置 Scene 的 `OnDragOver` 属性：\n\n`//\
  \ 在表面拖放悬停`\n`scene.setOnDragOver(new EventHandler<DragEvent>() {`\n`    @Override`\n\
  `    public void handle(DragEvent event) {`\n`        Dragboard db = event.getDragboard();`\n\
  `        if (db.hasFiles()) {`\n`            event.acceptTransferModes(TransferMode.COPY);`\n\
  `        } else {`\n`            event.consume();`\n`        }`\n`    }`\n`});`\n\
  \n设置好拖放悬停事件处理属性后，您必须创建一个拖放放下事件处理属性，以便完成操作。监听拖放放下事件与监听拖放悬停事件类似，您需要实现 `handle()` 方法。再次从事件中获取\
  \ `Dragboard` 对象，以判断剪贴板是否包含任何文件。如果是，您将遍历文件列表及其名称，并将其添加到 `imageFiles` 列表中。以下代码演示了如何通过实例化一个形式类型参数为\
  \ `<DragEvent>` 的 `EventHandler` 类型的内部类，并重写其 `handle()` 方法来设置 Scene 的 `OnDragDropped`\
  \ 属性：\n\n`// 在表面拖放放下`\n`scene.setOnDragDropped(new EventHandler<DragEvent>() {`\n\
  \n`    @Override`\n`    public void handle(DragEvent event) {`\n`        Dragboard\
  \ db = event.getDragboard();`\n`        boolean success = false;`\n`        if (db.hasFiles())\
  \ {`\n`            success = true;`\n`            String filePath = null;`\n`            for\
  \ (File file:db.getFiles()) {`\n`                filePath = file.getAbsolutePath();`\n\
  \n`                currentIndex +=1;`\n`                imageFiles.add(currentIndex,\
  \ filePath);`\n`            }`\n\n`            // 设置新图像为要显示的图像`\n`            Image\
  \ imageimage = new Image(filePath);`\n`            currentImageView.setImage(imageimage);`\n\
  \n`        }`\n`        event.setDropCompleted(success);`\n`        event.consume();`\n\
  `    }`\n`});`\n\n当最后一个文件确定后，当前图像就会被显示。以下代码演示了加载要显示的图像：\n\n`// 设置新图像为要显示的图像`\n`Image\
  \ imageimage = new Image(filePath);`\n`currentImageView.setImage(imageimage);`\n\
  \n对于图像查看器应用程序的最后一个需求，您将创建简单的控件，允许用户查看下一张或上一张图像。我强调“简单”控件，是因为 JavaFX 还包含另外两种创建自定义控件的方法。其中一种方法（CSS\
