  `        });`\n`        root.getChildren().add(btn);`\n`        primaryStage.setScene(scene);`\n\
  `        primaryStage.show();`\n`    }`\n`}`\n\n在步骤 1 中，您启动一个新项目（如图 4-7 所示）。在步骤\
  \ 2 中，您选择要创建的标准 JavaFX 应用程序。选择项目类型后，您将指定项目名称。确保选中“创建应用程序类”复选框，以便向导生成 MyJavaFXApp\
  \ Java 文件。点击“完成”后，您新创建的应用程序将出现在“项目”选项卡中。接下来，您将执行步骤 5 来更改项目属性。\n\n在步骤 5 中，您将更改两个类别：“源”和“运行”。在“源”类别中，确保“源代码/二进制格式”设置为\
