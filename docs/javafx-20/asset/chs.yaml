  > *   `javafx.scene.image.Image`\n> *   `javafx.scene.image.ImageView`\n> *   `javafx.util.Duration`\n\
  \n当光标移入和移出场景区域时，分别淡入和淡出按钮控件，需要以下类：\n\n> *   `javafx.animation.FadeTransition`\n\
  > *   `javafx.util.Duration`\n\n以下是用于创建新闻滚动条控件的代码：\n\n`// 创建滚动条区域`\n`final Group\
