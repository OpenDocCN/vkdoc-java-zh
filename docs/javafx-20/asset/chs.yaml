  \ XML 模式。\n\n### 4-4\\. 响应 HTML 事件\n\n#### 问题\n\n你开始为你那些同样对外界浑然不觉的隔间同事感到遗憾。一场暴风雨正在逼近，你想让他们知道在离开大楼前带上雨伞。\n\
