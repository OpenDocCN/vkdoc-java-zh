  #### 工作原理\n\n在本教程中，你将创建一个能够从雅虎天气服务中检索 XML 信息的 JavaFX 应用程序。解析 XML 后，HTML 内容将被组装并渲染到\
  \ JavaFX 的 `WebView` 节点上。`WebView` 对象实例是一个能够渲染和检索 XML 或任何 HTML5 内容的图形节点。该应用程序还将显示一个倒计时，显示距离下一次从天气服务检索数据还有多少秒。\n\
  \n通过雅虎天气服务访问你所在地区的天气信息时，你需要获取一个位置 ID 或与你所在城市关联的 RSS 源的 URL。在我逐行解释代码之前，我将列出获取本地天气预报\
  \ RSS 源 URL 的步骤。\n\n> 1.  在浏览器中打开 [`http://weather.yahoo.com/`](http://weather.yahoo.com/)。\n\
  > 2.  输入城市或邮政编码，然后点击“前往”按钮。\n> 3.  点击网页右侧附近（在“将天气添加到你的网站”下方）的橙色小 RSS 按钮。\n> 4. \
  \ 复制并粘贴浏览器中的 URL 地址行，以便在你的天气应用程序代码中使用。例如，我使用了以下 RSS URL 网址：[`http://weather.yahooapis.com/forecastrss?p=USMD0033&u=f`](http://weather.yahooapis.com/forecastrss?p=USMD0033&u=f)。\n\
  \n现在你已经获取了一个有效的 RSS URL 网址，让我们在我们的教程示例中使用它。创建 `ManipulatingHtmlContent` 类时，你需要两个实例变量：`url`\
  \ 和 `refreshCountdown`。`url` 变量将被赋值为步骤 4 中的 RSS URL 网址。`refreshCountdown` 变量类型为\
  \ `int`，赋值为 60，表示刷新或再次检索天气信息之前的秒数。\n\n与我们所有在 `start()` 方法中的 JavaFX 示例一样，我们首先为初始主内容区域创建\
  \ `Scene` 对象。接下来，我们通过将 `url` 传递给构造函数来创建一个 `javafx.scene.web.WebEngine` 实例。`WebEngine`\
  \ 对象将异步加载来自雅虎天气服务的 Web 内容。稍后我们将讨论负责在 Web 内容加载完成后处理内容的回调方法。以下代码行将使用 `WebEngine` 对象创建并加载一个\
  \ URL 网址：\n\n`final WebEngine webEngine = new WebEngine(url);`\n\n创建 `WebEngine`\
  \ 对象后，你将创建一个 HTML 文档，该文档将作为模板，用于后续在 Web 内容成功加载时进行组装。虽然代码在 Java 代码中包含了 HTML 标记标签，这完全违反了关注点分离的原则，但为了简洁起见，我通过拼接字符串值将\
  \ HTML 内联了。为了实现适当的 MVC 式分离，你可能希望创建一个单独的文件，其中包含你的 HTML 内容，并为随时间变化的数据提供替换部分。以下代码片段是用于显示天气信息的模板创建的起始部分：\n\
