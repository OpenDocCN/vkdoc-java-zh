  . 显示 HTML5 内容\n\n#### 问题\n\n您全身心投入工作项目，以至于经常错过孩子的足球比赛。您需要一个时钟应用程序来跟踪时间。\n\n\n\n\
  #### 解决方案\n\n创建一个基于 JavaFX 的应用程序，其中包含一个以 HTML5 内容形式创建的模拟时钟。使用 JavaFX 的 `WebView`\
  \ API 在应用程序中渲染 HTML5 内容。\n\n以下源代码是一个显示动画模拟时钟的 JavaFX 应用程序。该应用程序将加载一个名为 `clock3.svg`\
  \ 的 SVG 文件，并将其内容显示到 JavaFX 场景图中：\n\n`package javafx2introbyexample.chapter4.recipe4_02;`\n\
  \n`import java.net.URL;`\n`import javafx.application.Application;`\n`import javafx.scene.Scene;`\n\
  `import javafx.scene.paint.Color;`\n`import javafx.scene.web.WebView;`\n`import\
  \ javafx.stage.Stage;`\n\n`/**`\n` *`\n` * @author cdea`\n`*/`\n`public class DisplayHtml5Content\
  \ extends Application {`\n`    private Scene scene;`\n`    @Override public void\
  \ start(Stage stage) {`\n`        // 创建场景`\n`        stage.setTitle(\"第 4 章-2 显示\
  \ Html5 内容\");`\n`        final WebView browser = new WebView();`\n`        URL\
  \ url = getClass().getResource(\"clock3.svg\");`\n`        browser.getEngine().load(url.toExternalForm());`\n\
  `        scene = new Scene(browser,590,400, Color.rgb(0, 0, 0, .80));`\n`        stage.setScene(scene);`\n\
  `        stage.show();`\n`    }`\n`    public static void main(String[] args){`\n\
  `        Application.launch(args);`\n`    }`\n`}`\n\n这段 JavaFX 代码将加载并渲染 HTML5 内容。假设你有一位设计师提供了诸如\
  \ HTML5 之类的内容，那么你的工作就是在 JavaFX 中渲染这些资源。以下代码代表一个名为 `clock3.svg` 的 SVG 文件，该文件主要由强大的工具\
  \ Inkscape 生成，Inkscape 是一款能够生成 SVG 的插画工具。在以下代码中，请注意手写的 JavaScript 代码（位于 `CDATA`\
  \ 标签内），它将根据当前时间定位时钟的秒针、分针和时针。由于所有逻辑（从设置时间到动画指针）都包含在此文件中，因此内容是自包含的，这意味着任何支持 HTML5\
  \ 的查看器都可以显示该文件的内容。因此，在调试时，你可以轻松地在任何兼容 HTML5 的浏览器中渲染内容。在本章后面，我们将演示能够与 HTML5 内容交互的\
  \ JavaFX 代码。\n\n此处展示的是 SVG 模拟时钟的精简版本。（要获取该文件的源代码，请从本书网站下载代码。）这是一个在 Inkscape 中创建的\
  \ SVG 模拟时钟（`clock3.svg`）：\n\n`<svg`\n\n`   width=\"300\"`\n`   height=\"250\"`\n\
  `   id=\"svg4171\"`\n`   version=\"1.1\"`\n`   inkscape:version=\"0.48.1 \"`\n`   sodipodi:docname=\"\
  clock3.svg\" onload=\"updateTime()\">`\n\n`<script>`\n\n`<![CDATA[`\n`var`\n\n`function\
  \ updateTime()`\n`{`\n`  var date = new Date()`\n\n`  var hr = parseInt(date.getHours())`\n\
  `  if (hr > 12) {`\n`    hr = hr - 12;`\n`  }`\n`  var min = parseInt(date.getMinutes())`\n\
  `  var sec = parseInt(date.getSeconds())`\n`  var pi=180`\n`  var secondAngle =\
  \ sec * 6 + pi`\n`  var minuteAngle = ( min + sec / 60 ) * 6 + pi`\n`  var hourAngle   =\
  \ (hr + min / 60 + sec /3600) * 30 + pi`\n\n`  moveHands(secondAngle, minuteAngle,\
  \ hourAngle)`\n`}`\n\n`function moveHands(secondAngle, minuteAngle, hourAngle) {`\n\
  \n`  var secondHand = document.getElementById(\"secondHand\")`\n`  var minuteHand\
  \ = document.getElementById(\"minuteHand\")`\n`  var hourHand = document.getElementById(\"\
  hourHand\")`\n\n`  secondHand.setAttribute(\"transform\",\"rotate(\"+ secondAngle\
  \ + \")\")  `\n`  minuteHand.setAttribute(\"transform\",\"rotate(\"+ minuteAngle\
  \ +\")\")`\n`  hourHand.setAttribute(\"transform\",\"rotate(\"+ hourAngle + \")\"\
  )`\n\n`}`\n\n`]]>`\n\n`</script>`\n`<defs id=\"defs4173\">`\n`... // SVG 代码开始`\n\
  `... // 主时钟代码`\n\n`<g id=\"hands\" transform=\"translate(108,100)\">`\n`<g id=\"\
