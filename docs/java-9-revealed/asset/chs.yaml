  \ 等——这些名称将根据上下文替换为实际值。<selectors> 是确定此格式将用于何种上下文的选择器。\n\n以下命令为输入的代码片段在表达式被添加、修改或替换时设置反馈的显示格式。整个命令需在一行内输入。\n\
