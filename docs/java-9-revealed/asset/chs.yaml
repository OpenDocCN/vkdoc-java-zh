  \n摘要\n\nJDK 9 的主要目标之一是将模块中的类型和资源封装起来，并仅导出那些公共类型允许被其他模块访问的包。有时，你可能需要打破模块指定的封装性，以便进行白盒测试或使用不受支持的\
  \ JDK 内部 API 或库。这可以通过在编译时和运行时使用非标准命令行选项来实现。提供这些选项的另一个原因是向后兼容性。\n\nJDK 9 提供了两个命令行选项：`--add-exports`\
  \ 和 `--add-opens`，它们允许你打破模块声明中定义的封装。`--add-exports` 选项允许你在编译时和运行时将模块中未导出的包导出给其他模块。`--add-opens`\
  \ 选项允许你在运行时将模块中未开放的包开放给其他模块进行深度反射。这些选项的值格式为 `<源模块>/<包>=<目标模块列表>`，其中 `<源模块>` 是将 `<包>`\
  \ 导出或开放给 `<目标模块列表>` 的模块，`<目标模块列表>` 是一个以逗号分隔的目标模块名称列表。你可以使用 `ALL-UNNAMED` 作为目标模块列表的特殊值，表示将这些包导出或开放给所有未命名模块。\n\
  \n在可执行 JAR 的清单文件的主节中，可以使用两个名为 `Add-Exports` 和 `Add-Opens` 的新属性。使用这些属性的效果与使用同名命令行选项相同，不同之处在于这些属性将指定的包导出或开放给所有未命名模块。这些属性的值是一个以空格分隔的、由斜杠分隔的模块名/包名对列表。例如，在可执行\
  \ JAR 的清单文件主节中添加 `Add-Opens: java.base/java.lang` 条目，将把 `java.base` 模块中的 `java.lang`\
  \ 包开放给所有未命名模块。\n\n在测试和调试期间，有时需要让一个模块读取另一个模块，而第一个模块在其声明中没有使用 `requires` 语句来读取第二个模块。这可以通过使用\
  \ `--add-reads` 命令行选项来实现，其值的格式为 `<源模块>=<目标模块列表>`。`<源模块>` 是其定义被更新以读取 `<目标模块列表>` 中指定模块列表的模块，`<目标模块列表>`\
  \ 是一个以逗号分隔的目标模块名称列表。目标模块列表的特殊值 `ALL-UNNAMED` 使源模块读取所有未命名模块。\n\n**第 10 章**\n\n**模块\
  \ API**\n\n在本章中，你将学习：\n\n• 什么是模块 API\n\n• 如何在程序中表示模块和模块描述符\n\n• 如何在程序中读取模块描述符\n\n\
  • 如何表示模块的版本\n\n• 如何使用 `Module` 和 `ModuleDescriptor` 类读取模块的属性\n\n• 如何在运行时使用 `Module`\
  \ 类更新模块的定义\n\n• 如何创建可用于模块的注解以及如何读取模块上使用的注解\n\n• 什么是模块层和配置\n\n• 如何创建自定义模块层并将模块加载到其中\n\
  \n什么是模块 API？\n\n模块 API 由一些类和接口组成，它们让你能够以编程方式访问模块。使用该 API，你可以以编程方式：\n\n• 读取、修改和构建模块描述符\n\
  \n• 加载模块\n\n• 读取模块的内容\n\n• 搜索已加载的模块\n\n• 创建新的模块层\n\n模块 API 很小。它由大约 15 个类和接口组成，分布在两个包中：\n\
  \n• `java.lang`\n\n• `java.lang.module`\n\n© Kishori Sharan 2017\n\nK. Sharan, *Java\
  \ 9 Revealed*, DOI 10.1007/978-1-4842-2592-9_10\n\n第 10 章 ■ 模块 API\n\n\n\n`Module`、`ModuleLayer`\
  \ 和 `LayerInstantiationException` 类位于 `java.lang` 包中，其余类位于 `java.lang.module` 包中。表\
  \ 10-1 列出了模块 API 中的类及其简要说明。该列表未排序。我首先列出 `Module` 和 `ModuleDescriptor`，因为应用程序开发者最常使用它们。所有其他类通常由容器和库使用。该列表不包含模块\
  \ API 中的异常类。我将在后续章节中详细讨论这些类。\n\n***表 10-1.** 模块 API 中常用类及其说明*\n\n**类**\n\n**说明**\n\
  \nModule\n\n表示一个运行时模块。\n\nModuleDescriptor\n\n表示一个模块描述符。它是不可变的。\n\nModuleDescriptor.Builder\n\
  \n一个嵌套的构建器类，用于以编程方式构建模块描述符。\n\nModuleDescriptor.Exports\n\n一个嵌套类，表示模块声明中的 exports\
  \ 语句。\n\nModuleDescriptor.Opens\n\n一个嵌套类，表示模块声明中的 opens 语句。\n\nModuleDescriptor.Provides\n\
  \n一个嵌套类，表示模块声明中的 provides 语句。\n\nModuleDescriptor.Requires\n\n一个嵌套类，表示模块声明中的 requires\
  \ 语句。\n\nModuleDescriptor.Version\n\n一个嵌套类，表示模块的版本字符串。它包含一个 `parse(String v)` 工厂方法，用于从版本字符串返回其实例。\n\
  \nModuleDescriptor.Modifier\n\n一个枚举，其常量表示模块声明中使用的修饰符，例如用于开放模块的 `OPEN`。\n\nModuleDescriptor.Exports.Modifier\n\
  \n一个枚举，其常量表示模块声明中 exports 语句使用的修饰符。\n\nModuleDescriptor.Opens.Modifier\n\n一个枚举，其常量表示模块声明中\
  \ opens 语句使用的修饰符。\n\nModuleDescriptor.Requires.Modifier\n\n一个枚举，其常量表示模块声明中 requires\
  \ 语句使用的修饰符。\n\nModuleReference\n\n对模块内容的引用。它包含模块的描述符及其位置。\n\nResolvedModule\n\n\
  表示模块图中已解析的模块。包含模块的名称、其依赖项以及对其内容的引用。可用于遍历模块图中模块的所有传递依赖项。\n\nModuleFinder\n\n一个接口，用于在指定路径或系统模块中查找模块。找到的模块以\
  \ `ModuleReference` 实例的形式返回。它包含用于获取其实例的工厂方法。\n\nModuleReader\n\n一个接口，用于读取模块的内容。你可以从\
  \ `ModuleReference` 获取 `ModuleReader`。\n\nConfiguration\n\n表示已解析模块的模块图。\n\nModuleLayer\n\
  \n包含一个模块图（一个 `Configuration`）以及图中模块与类加载器之间的映射。\n\nModuleLayer.Controller\n\n一个嵌套类，用于控制\
  \ `ModuleLayer` 中的模块。`ModuleLayer` 类中的方法返回此类的实例。\n\n第 10 章 ■ 模块 API\n\n表示模块\n\n\
  `Module` 类的实例表示一个运行时模块。加载到 JVM 中的每个类型都属于某个模块。JDK 9 在 `Class` 类中添加了一个名为 `getModule()`\
  \ 的方法，该方法返回该类所属的模块。以下代码片段展示了如何获取名为 `BasicInfo` 的类的模块：\n\n// 获取 BasicInfo 类的 Class\
  \ 对象\n\nClass<BasicInfo> cls = BasicInfo.class;\n\n// 获取模块引用\n\nModule module =\
  \ cls.getModule();\n\n模块可以是有名称的或未命名的。`Module` 类的 `isNamed()` 方法对于有名称的模块返回 `true`，对于未命名的模块返回\
  \ `false`。\n\n每个类加载器都包含一个未命名模块，其中包含该类加载器从类路径加载的所有类型。如果类加载器从模块路径加载类型，则这些类型属于有名称的模块。`Class`\
  \ 类的 `getModule()` 方法可能返回有名称的模块或未命名的模块。JDK 9 在 `ClassLoader` 类中添加了一个名为 `getUnnamedModule()`\
  \ 的方法，该方法返回该类加载器的未命名模块。\n\n\n\n在以下代码片段中，假设 `BasicInfo` 类是从类路径加载的，`m1` 和 `m2` 引用的是同一个模块：\n\
  \n```java\nClass<BasicInfo> cls = BasicInfo.class;\nModule m1 = cls.getClassLoader().getUnnamedModule();\n\
  Module m2 = cls.getModule();\n```\n\n`Module` 类的 `getName()` 方法返回模块的名称。对于未命名模块，它返回\
  \ `null`。\n\n```java\n// 获取模块名称\nString moduleName = module.getName();\n```\n\n\
  `Module` 类中的 `getPackages()` 方法返回一个 `Set<String>`，其中包含模块中的所有包。`getClassLoader()`\
  \ 方法返回该模块的类加载器。\n\n`getLayer()` 方法返回包含该模块的 `ModuleLayer`；如果模块不在任何层中，则返回 `null`。模块层仅包含命名模块。因此，对于未命名模块，此方法始终返回\
  \ `null`。\n\n**描述模块**\n\n`ModuleDescriptor` 类的实例表示一个模块定义，它是从模块声明（通常来自 `module-info.class`\
  \ 文件）创建的。也可以使用 `ModuleDescriptor.Builder` 类动态创建模块描述符。模块声明可以通过命令行选项（如 `--add-reads`、`--add-exports`\
  \ 和 `--add-opens`）以及 `Module` 类中的方法（如 `addReads()`、`addOpens()` 和 `addExports()`）进行增强。`ModuleDescriptor`\
  \ 表示在模块声明时添加的模块描述符，而不是增强后的模块描述符。`Module` 类的 `getDescriptor()` 方法返回一个 `ModuleDescriptor`：\n\
  \n```java\nClass<BasicInfo> cls = BasicInfo.class;\nModule module = cls.getModule();\n\
  \n// 获取模块描述符\nModuleDescriptor desc = module.getDescriptor();\n```\n\n第 10 章 ■ 模块\
  \ API\n\n■ **提示** `ModuleDescriptor` 是不可变的。未命名模块没有模块描述符。`Module` 类的 `getDescriptor()`\
  \ 方法对于未命名模块返回 `null`。\n\n你也可以通过使用 `ModuleDescriptor` 类的某个静态 `read()` 方法，从 `module-info.class`\
  \ 文件中读取模块声明的二进制形式来创建 `ModuleDescriptor` 对象。以下代码片段从当前目录读取一个 `module-info.class` 文件。为清晰起见，省略了异常处理：\n\
  \n```java\nString moduleInfoPath = \"module-info.class\";\nModuleDescriptor desc\
  \ = ModuleDescriptor.read(new FileInputStream(moduleInfoPath));\n```\n\n**表示模块语句**\n\
  \n`ModuleDescriptor` 类包含以下静态嵌套类，它们的实例表示模块声明中同名的语句：\n\n- `ModuleDescriptor.Exports`\n\
  - `ModuleDescriptor.Opens`\n- `ModuleDescriptor.Provides`\n- `ModuleDescriptor.Requires`\n\
  \n请注意，没有 `ModuleDescriptor.Uses` 类来表示 `uses` 语句。这是因为 `uses` 语句表示一个服务接口名称，该名称可以用\
  \ `String` 表示。\n\n**表示 exports 语句**\n\n`ModuleDescriptor.Exports` 类的实例表示模块声明中的 `exports`\
  \ 语句。该类中的以下方法返回 `exports` 语句的组成部分：\n\n- `boolean isQualified()`\n- `Set<ModuleDescriptor.Exports.Modifier>\
  \ modifiers()`\n- `String source()`\n- `Set<String> targets()`\n\n`isQualified()`\
  \ 方法对于限定导出返回 `true`，对于非限定导出返回 `false`。\n\n`source()` 方法返回导出包的名称。对于限定导出，`targets()`\
  \ 方法返回一个不可变的模块名称集合，表示包被导出到的目标模块；对于非限定导出，它返回一个空集合。`modifiers()` 方法返回 `exports` 语句的修饰符集合，这些修饰符是嵌套枚举\
  \ `ModuleDescriptor.Exports.Modifier` 的常量，该枚举包含以下两个常量：\n\n- `MANDATED`：该导出在源模块声明中被隐式声明。\n\
  - `SYNTHETIC`：该导出在模块声明的源文件中未被显式或隐式声明。\n\n第 10 章 ■ 模块 API\n\n**表示 opens 语句**\n\n\
  `ModuleDescriptor.Opens` 类的实例表示模块声明中的 `opens` 语句。\n\n\n\n类中的以下方法返回 opens 语句的组成部分：\n\
  \n• boolean isQualified()\n\n• Set<ModuleDescriptor.Opens.Modifier> modifiers()\n\
  \n• String source()\n\n• Set<String> targets()\n\n`isQualified()` 方法对于限定 opens 返回\
  \ true，对于非限定 opens 返回 false。\n\n`source()` 方法返回开放包的名称。对于限定 opens，`targets()` 方法返回一个不可变的模块名称集合，表示该包向哪些模块开放；对于非限定\
  \ opens，则返回一个空集合。`modifiers()` 方法返回 opens 语句的修饰符集合，这些修饰符是嵌套枚举 `ModuleDescriptor.Opens.Modifier`\
  \ 的常量，该枚举包含以下两个常量：\n\n• MANDATED：该 opens 在模块声明的源文件中被隐式声明。\n\n• SYNTHETIC：该 opens\
  \ 在模块声明的源文件中未被显式或隐式声明。\n\n表示 provides 语句\n\n`ModuleDescriptor.Provides` 类的实例表示模块声明中针对特定服务类型的一个或多个\
  \ provides 语句。以下两个 provides 语句为同一服务类型 X.Y 指定了两个实现类：\n\nprovides X.Y with A.B;\n\n\
  provides X.Y with Y.Z;\n\n`ModuleDescriptor.Provides` 类的一个实例将同时表示这两个语句。该类中的以下方法返回\
  \ provides 语句的组成部分：\n\n• List<String> providers()\n\n• String service()\n\n`providers()`\
  \ 方法返回提供者类的完全限定类名列表。在前面的示例中，返回的列表将包含 A.B 和 Y.Z。`service()` 方法返回服务类型的完全限定名称。在前面的示例中，它将返回\
  \ X.Y。\n\n表示 requires 语句\n\n`ModuleDescriptor.Requires` 类的实例表示模块声明中的 requires 语句。该类中的以下方法返回\
  \ requires 语句的组成部分：\n\n• Optional<ModuleDescriptor.Version> compiledVersion()\n\n\
  • Optional<String> rawCompiledVersion()\n\n• String name()\n\n• Set<ModuleDescriptor.Requires.Modifier>\
  \ modifiers()\n\n第 10 章 ■ 模块 API\n\n假设一个名为 M 的模块在编译时包含一条 requires N 语句。如果在编译时 N\
  \ 的模块版本可用，则该版本会记录在 M 的模块描述符中。`compiledVersion()` 方法以 `Optional` 形式返回 N 的已记录版本。如果\
  \ N 没有可用版本，则该方法返回一个空的 `Optional`。requires 语句中指定模块的模块版本仅出于信息目的记录在模块描述符中。模块系统在任何阶段都不会使用它。然而，工具和框架可以将其用于诊断目的。例如，一个工具可能会验证所有通过\
  \ requires 语句指定为依赖项的模块，其可用版本必须等于或高于编译时记录的版本。\n\n继续上一段的示例，`rawCompiledVersion()`\
  \ 方法以 `Optional<String>` 形式返回模块 N 的版本。在大多数情况下，`compiledVersion()` 和 `rawCompiledVersion()`\
  \ 这两个方法会返回相同的模块版本，但格式不同：一个以 `Optional<ModuleDescriptor.Version>` 对象返回，另一个以 `Optional<String>`\
  \ 对象返回。你可能拥有一个模块版本无效的模块。这样的模块可能是在 Java 模块系统之外创建和编译的。你可以将这种具有无效模块版本的模块作为 Java 模块加载。在这种情况下，`compiledVersion()`\
  \ 方法返回一个空的 `Optional<ModuleDescriptor.Version>`，因为该模块版本无法被解析为有效的 Java 模块版本；而 `rawCompiledVersion()`\
  \ 返回一个包含该无效模块版本的 `Optional<String>`。\n\n■ **提示** `ModuleDescriptor.Requires` 类的\
  \ `rawCompiledVersion()` 方法可能返回所需模块的不可解析版本。\n\n\n\n`name()` 方法返回在 `requires` 语句中指定的模块名称。\
  \  \n`modifiers()` 方法返回 `requires` 语句的修饰符集合，这些修饰符是嵌套枚举 `ModuleDescriptor.Requires.Modifier`\
  \ 的常量，包含以下常量：\n\n• `MANDATED`：该依赖项在模块声明源文件中被隐式声明。  \n• `STATIC`：该依赖项在编译时是必需的，在运行时是可选的。\
  \  \n• `SYNTHETIC`：该依赖项在模块声明源文件中既未显式声明也未隐式声明。  \n• `TRANSITIVE`：该依赖项会导致任何依赖当前模块的模块，隐式地依赖于此\
  \ `requires` 语句所指定的模块。\n\n**表示模块版本**\n\n`ModuleDescriptor.Version` 类的实例表示模块的版本。它包含一个名为\
  \ `parse(String version)` 的静态工厂方法，该方法返回一个实例，表示从指定版本字符串解析出的版本。请注意，在模块声明中你无需指定模块版本。当你将模块代码打包成模块化\
  \ JAR 时（通常使用 `jar` 工具），才会添加模块版本。`javac` 编译器也允许你在编译模块时指定模块版本。\n\n模块版本字符串包含三个组成部分：\n\
  \n• 一个必需的版本号  \n• 一个可选的预发布版本  \n• 一个可选的构建版本  \n\n第 10 章 ■ 模块 API\n\n模块版本的形式如下：\n\
  \n`vNumToken+ ('-' preToken+)? ('+' buildToken+)?`\n\n每个组成部分都是一个由标记（token）组成的序列；每个标记要么是一个非负整数，要么是一个字符串。标记之间由标点字符\
  \ `.`、`-` 或 `+` 分隔，或者由数字序列向非数字且非标点字符序列的转换（或反之）来分隔。版本字符串必须以数字开头。版本号是由 `.` 字符分隔的标记序列，以第一个\
  \ `-` 或 `+` 字符结束。预发布版本是由 `.` 或 `-` 字符分隔的标记序列，以第一个 `+` 字符结束。构建版本是由 `.`、`-` 或 `+`\
  \ 字符分隔的标记序列。\n\n`ModuleDescriptor` 类的 `version()` 方法返回一个 `Optional<ModuleDescriptor.Version>`。\n\
  \n**模块的其他属性**\n\n在打包模块化 JAR 时，可以在 `module-info.class` 文件中设置其他模块属性，例如主类名称、操作系统名称等。`ModuleDescriptor`\
  \ 类包含一个方法，用于返回每个此类属性。`ModuleDescriptor` 类中以下方法值得关注：\n\n• `Set<ModuleDescriptor.Exports>\
  \ exports()`  \n• `boolean isAutomatic()`  \n• `boolean isOpen()`  \n• `Optional<String>\
  \ mainClass()`  \n• `String name()`  \n• `Set<ModuleDescriptor.Opens> opens()` \
  \ \n• `Set<String> packages()`  \n• `Set<ModuleDescriptor.Provides> provides()`\
  \  \n• `Optional<String> rawVersion()`  \n• `Set<ModuleDescriptor.Requires> requires()`\
  \  \n• `String toNameAndVersion()`  \n• `Set<String> uses()`\n\n这些方法名直观易懂，可以理解其用途。我将介绍两个需要稍加解释的方法：`packages()`\
  \ 和 `provides()`。\n\n`ModuleDescriptor` 类包含一个名为 `packages()` 的方法，而 `Module` 类包含一个名为\
  \ `getPackages()` 的方法。两者都返回一组包名。为什么会有两个功能相同的方法？实际上，它们的用途不同。在 `ModuleDescriptor`\
  \ 中，该方法返回模块声明中定义的所有包（无论是否被导出）。请注意，你无法获取未命名模块的 `ModuleDescriptor`，在这种情况下，你可以使用 `Module`\
  \ 类中的 `getPackages()` 方法获取未命名模块中的包名。另一个区别是，`ModuleDescriptor` 报告的包名是静态的；而 `Module`\
  \ 报告的包名是动态的，它报告的是调用 `getPackages()` 方法时模块中已加载的包。\n\n`Module` 报告的是运行时当前加载到其中的所有包。\n\
  \n第 10 章 ■ 模块 API\n\n\n\n`provides()` 方法返回一个 `Set<ModuleDescriptor.Provides>`。考虑模块声明中的以下\
  \ provides 语句：\n\nprovides A.B with X.Y1;\n\nprovides A.B with X.Y2;\n\nprovides\
  \ P.Q with S.T1;\n\n在这种情况下，该集合将包含两个元素——一个用于服务类型 A.B，另一个用于服务类型 P.Q。其中一个元素的 `service()`\
  \ 和 `providers()` 方法将分别返回 A.B 以及包含 X.Y1 和 X.Y2 的列表。另一个元素的这些方法将返回 P.Q 以及包含 S.T1 的单个元素列表。\n\
  \n了解模块基本信息\n\n在本节中，我将向您展示一个如何在运行时读取模块基本信息的示例。\n\n清单 10-1 包含一个名为 com.jdojo.module.api\
  \ 的模块的模块声明。它读取三个模块并导出一个包。其中两个被读取的模块，com.jdojo.prime 和 com.jdojo.intro，来自前面的章节。您需要将这两个模块添加到模块路径中，以便编译并运行\
  \ com.jdojo.module.api 模块中的代码。java.sql 模块是一个 JDK 模块。\n\n***清单 10-1.*** 名为 com.jdojo.module.api\
  \ 的模块的声明\n\n// module-info.java\n\nmodule com.jdojo.module.api {\n\nrequires com.jdojo.prime;\n\
  \nrequires com.jdojo.intro;\n\nrequires java.sql;\n\nexports com.jdojo.module.api;\n\
  \n}\n\n清单 10-2 包含一个名为 ModuleBasicInfo 的类的代码，该类使用 Module 和 ModuleDescriptor 类打印三个模块的模块详细信息。\n\
  \n***清单 10-2.*** ModuleBasicInfo 类\n\n// ModuleBasicInfo.java\n\npackage com.jdojo.module.api;\n\
  \nimport com.jdojo.prime.PrimeChecker;\n\nimport java.lang.module.ModuleDescriptor;\n\
  \nimport java.lang.module.ModuleDescriptor.Exports;\n\nimport java.lang.module.ModuleDescriptor.Provides;\n\
  \nimport java.lang.module.ModuleDescriptor.Requires;\n\nimport java.sql.Driver;\n\
  \nimport java.util.Set;\n\npublic class ModuleBasicInfo {\n\npublic static void\
  \ main(String[] args) {\n\n// 获取当前类的模块\n\nClass<ModuleBasicInfo> cls = ModuleBasicInfo.class;\n\
  \nModule module = cls.getModule();\n\n第 10 章 ■ 模块 API\n\n// 打印模块信息\n\nprintInfo(module);\n\
  \nSystem.out.println(\"------------------\");\n\n// 打印模块信息\n\nprintInfo(PrimeChecker.class.getModule());\n\
  \nSystem.out.println(\"------------------\");\n\n// 打印模块信息\n\nprintInfo(Driver.class.getModule());\n\
  \n}\n\npublic static void printInfo(Module m) {\n\nString moduleName = m.getName();\n\
  \nboolean isNamed = m.isNamed();\n\n// 打印模块类型和名称\n\nSystem.out.printf(\"Module Name:\
  \ %s%n\", moduleName);\n\nSystem.out.printf(\"Named Module: %b%n\", isNamed);\n\n\
  // 获取模块描述符\n\nModuleDescriptor desc = m.getDescriptor();\n\n// 对于未命名模块，desc 将为 null\n\
  \nif (desc == null) {\n\nSet<String> currentPackages = m.getPackages();\n\nSystem.out.printf(\"\
  Packages: %s%n\", currentPackages);\n\nreturn;\n\n}\n\nSet<Requires> requires =\
  \ desc.requires();\n\nSet<Exports> exports = desc.exports();\n\nSet<String> uses\
  \ = desc.uses();\n\nSet<Provides> provides = desc.provides();\n\nSet<String> packages\
  \ = desc.packages();\n\nSystem.out.printf(\"Requires: %s%n\", requires);\n\nSystem.out.printf(\"\
  Exports: %s%n\", exports);\n\nSystem.out.printf(\"Uses: %s%n\", uses);\n\nSystem.out.printf(\"\
  Provides: %s%n\", provides);\n\nSystem.out.printf(\"Packages: %s%n\", packages);\n\
  \n}\n\n}\n\n第 10 章 ■ 模块 API\n\n让我们在模块模式和传统模式下运行 ModuleBasicInfo 类。以下命令将使用模块模式：\n\
  \nC:\\Java9Revealed>java --module-path com.jdojo.module.api\\dist;com.jdojo.prime\\\
  dist;com.\n\njdojo.intro\\dist\n\n--module com.jdojo.module.api/com.jdojo.module.api.ModuleBasicInfo\n\
  \nModule Name: com.jdojo.module.api\n\nNamed Module: true\n\nRequires: [mandated\
  \ java.base (@9-ea), com.jdojo.intro, java.sql (@9-ea), com.jdojo.prime]\n\nExports:\
