  \ points=[1, 2, 3, 4]]\n\n请注意使用全局过滤器时的输出。由于 Item 对象包含一个具有四个元素的数组，全局过滤器阻止了它的反序列化。然而，您能够使用\
  \ `ArrayLengthObjectFilter` 反序列化同一个对象，因为该过滤器覆盖了全局过滤器，并允许数组中最多包含五个元素。这在输出的最后一行中显而易见。\n\
  \nJava I/O API 的新增内容\n\nJDK 9 为 I/O API 添加了一些便捷方法。第一个是 `InputStream` 类中的一个新方法：\n\
  \n`long transferTo(OutputStream out) throws IOException`\n\n您曾编写过从输入流读取所有字节并写入输出流的代码。现在，您无需编写循环来从输入流读取字节并写入输出流。`transferTo()`\
  \ 方法会从输入流读取所有字节，并按读取顺序将这些字节顺序写入指定的输出流。该方法返回传输的字节数。\n\n■ **提示** `transferTo()` 方法不会关闭任何一个流。当此方法返回时，输入流将处于流的末尾。\n\
  \n忽略异常处理和流关闭逻辑，下面是一行代码，它将 `log.txt` 文件的内容复制到 `log_copy.txt` 文件。\n\n`new FileInputStream(\"\
  log.txt\").transferTo(new FileOutputStream(\"log_copy.txt\"));`\n\n`java.nio.Buffer`\
  \ 类在 JDK 9 中新增了两个方法：\n\n• `abstract Buffer duplicate()`\n\n• `abstract Buffer slice()`\n\
  \n两个方法都返回一个 `Buffer`，该缓冲区共享原始缓冲区的内容。仅当原始缓冲区是直接缓冲区或只读缓冲区时，返回的缓冲区才会是直接缓冲区或只读缓冲区。`duplicate()`\
  \ 方法返回一个 `Buffer`，其容量、限制、位置和标记值将与原始缓冲区相同。\n\n`slice()` 方法返回一个 `Buffer`，其位置为零，容量和限制为此缓冲区中剩余的元素数量，并且标记未定义。返回缓冲区的内容从原始缓冲区的当前位置开始。这些方法返回的缓冲区独立于原始缓冲区维护它们自己的位置、限制和标记。以下代码片段展示了复制和切片缓冲区的特性：\n\
  \n`IntBuffer b1 = IntBuffer.wrap(new int[]{1, 2, 3, 4});`\n\n`IntBuffer b2 = b1.duplicate();`\n\
  \n`IntBuffer b3 = b1.slice();`\n\n`System.out.println(\"b1=\" + b1);`\n\n`System.out.println(\"\
  b2=\" + b2);`\n\n`System.out.println(\"b2=\" + b3);`\n\n`// 将 b1 移动 1 个位置`\n\n`b1.get();`\n\
  \n`IntBuffer b4 = b1.duplicate();`\n\n`IntBuffer b5 = b1.slice();`\n\n`System.out.println(\"\
  b1=\" + b1);`\n\n`System.out.println(\"b4=\" + b4);`\n\n`System.out.println(\"b5=\"\
  \ + b5);`\n\n`b1=java.nio.HeapIntBuffer[pos=0 lim=4 cap=4]`\n\n`b2=java.nio.HeapIntBuffer[pos=0\
  \ lim=4 cap=4]`\n\n`b2=java.nio.HeapIntBuffer[pos=0 lim=4 cap=4]`\n\n`b1=java.nio.HeapIntBuffer[pos=1\
  \ lim=4 cap=4]`\n\n`b4=java.nio.HeapIntBuffer[pos=1 lim=4 cap=4]`\n\n`b5=java.nio.HeapIntBuffer[pos=0\
  \ lim=3 cap=3]`\n\n总结\n\n在 JDK 9 中，下划线 (`_`) 是一个关键字，您不能单独将其用作单字符标识符，例如变量名、方法名、类型名等。但是，您仍然可以在多字符标识符名称中使用下划线。\n\
  \nJDK 9 移除了必须为要使用 try-with-resources 块管理的资源声明新变量的限制。现在，您可以使用一个引用资源的 *final* 或 *effectively\
  \ final* 变量，由 try-with-resources 块来管理。\n\n只要推断的类型是可表示的，JDK 9 就支持在匿名类中使用菱形运算符。\n\n\
  您可以在接口中拥有一个私有方法，该方法可以是非抽象非默认的实例方法，也可以是静态方法。\n\nJDK 9 允许在私有方法上使用 `@SafeVarargs` 注解。JDK\
  \ 8 已经允许在构造函数、静态方法和 final 方法上使用它。\n\nJDK 9 向 `ProcessBuilder.Redirect` 嵌套类添加了一个名为\
  \ `DISCARD` 的新常量。其类型是 `ProcessBuilder.Redirect`。当您想要丢弃子进程的输出和错误流时，可以将其用作这些流的目标。实现通过写入操作系统特定的“空文件”来丢弃输出。\n\
  \nJDK 9 向 `Math` 和 `StrictMath` 类添加了几个方法，以支持更多的数学运算，例如 `floorDiv(long x, int y)`、`floorMod(long\
  \ x, int y)`、`multiplyExact(long x, int y)`、`multiplyFull(int x, int y)`、`multiplyHigh(long\
  \ x, long y)` 等。\n\nJDK 9 向 `java.util.Optional` 类添加了三个方法：`ifPresentOrElse()`、`or()`\
  \ 和 `stream()`。\n\n`ifPresentOrElse()` 方法允许您提供两个备选的操作方案。如果存在值，则执行一个操作。否则，执行另一个操作。`or()`\
  \ 方法在存在值时返回 `Optional` 本身。否则，返回由指定供应商提供的 `Optional`。`stream()` 方法返回一个包含 `Optional`\
  \ 中存在的值的顺序元素流。如果 `Optional` 为空，则返回一个空流。`stream()` 方法在 flat map 中很有用。\n\nJDK 9 向\
  \ `Thread` 类添加了一个新的静态方法 `onSpinWait()`。它纯粹是向处理器提示调用线程暂时无法继续执行，因此可以优化资源使用。在自旋循环中使用它。\n\
  \nTime API 在 JDK 9 中得到了增强。`Duration`、`LocalDate`、`LocalTime` 和 `OffsetTime` 类添加了几个方法。`LocalDate`\
  \ 类新增了一个 `datesUntil()` 方法，该方法以一天或给定周期的增量返回两个日期之间的日期流。Time API 中有几个新的格式化符号。\n\n\
  `Matcher` 类获得了几个现有方法的重载版本，这些方法以前使用 `StringBuffer`，现在支持使用 `StringBuilder`。一个名为 `results()`\
  \ 的新方法返回 `Stream<MatchResult>`。`Objects` 类获得了几个新的实用方法来检查数组和集合的边界。\n\n`java.util.Arrays`\
  \ 获得了几个方法，允许您比较数组和数组切片是否相等或不匹配。\n\nJavadoc 在 JDK 9 中得到了增强。它支持 HTML5。您可以使用新选项 `-html5`\
  \ 与 `javadoc` 工具一起生成 HTML5 格式的 Javadoc。所有模块、包、类型、成员和形式参数类型的名称都被索引，并且可以使用新的搜索功能进行搜索。Javadoc\
  \ 在每个主页的右上角显示一个搜索框，可用于搜索索引项。\n\n您还可以在 Javadoc 中使用新标签 `@index`，使自定义术语可搜索。搜索是使用客户端\
  \ JavaScript 执行的，无需服务器通信。\n\n许多浏览器供应商已经移除了对 Java 浏览器插件的支持，或者将在不久的将来移除它。考虑到这一点，JDK\
  \ 9 弃用了 Applet API。`java.applet` 包中的所有类型和 `javax.swing.JApplet` 类都已被弃用。`appletviewer`\
  \ 工具也已被弃用。\n\n\n\nJDK 6 通过 `java.awt.Desktop` 类增加了对平台特定桌面功能的有限支持，例如在用户默认浏览器中打开 URI、在用户默认邮件客户端中打开\
  \ mailto URI，以及使用注册的应用程序打开、编辑和打印文件。Java SE 9 进一步推进了平台特定的桌面支持，并为许多系统和应用程序事件通知添加了公共\
  \ API 支持（如果当前平台支持这些功能）。为了支持如此多的新桌面功能，Java SE\n\n9 在 `java.desktop` 模块中添加了一个新包 `java.awt.desktop`。`java.awt.Desktop`\
  \ 类也新增了许多方法。在 JDK 9 中，Desktop API 支持 24 种平台特定的桌面操作和通知，例如当连接的显示器进入或退出省电模式时、当系统进入睡眠模式时、或系统唤醒后等通知。\n\
  \n为了解决反序列化带来的安全风险，JDK 9 引入了对象输入过滤器的概念，可用于验证正在反序列化的对象，如果未通过测试，则可以停止反序列化过程。对象输入过滤器是新接口\
  \ `java.io.ObjectInputFilter` 的一个实例。您可以指定一个系统范围的全局过滤器，该过滤器可在反序列化任何对象时使用。可以使用新的 `jdk.serialFilter`\
  \ 系统属性、在 `JAVA_HOME\\conf\\security\\java.security` 文件中使用名为 `jdk.serialFilter` 的属性，或使用\
  \ `ObjectInputFilter.Config` 类的 `setSerialFilter()` 方法来指定全局过滤器。可以使用 `ObjectInputStream`\
  \ 的 `setObjectInputFilter()` 方法在其上设置本地过滤器，该过滤器会覆盖全局过滤器。\n\n`java.io.InputStream`\
  \ 类新增了一个名为 `transferTo(OutputStream out)` 的方法，可用于从输入流读取所有字节并将其顺序写入指定的输出流。该方法不会关闭任何一个流。`java.nio.Buffer`\
  \ 类新增了两个方法——`duplicate()` 和 `slice()`——可用于复制和拼接缓冲区。复制和拼接后的缓冲区与原始缓冲区共享其内容。但它们维护自己的位置、限制和标记，独立于原始缓冲区。\n\
