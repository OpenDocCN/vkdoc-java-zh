  \ static void m22() {\n\nBox.deprecatedOrdinarily();\n\n}\n\n第 15 章 ■ 增强的弃用机制\n\n\
  /**\n\n* API：已终止弃用\n\n* 使用位置：普通弃用\n\n* 弃用警告：移除警告\n\n* @deprecated 使用有风险。\n\n*/\n\
  \n@Deprecated(since=\"1.1\")\n\npublic static void m23() {\n\nBox.deprecatedTerminally();\n\
  \n}\n\n/**\n\n* API：未弃用\n\n* 使用位置：已终止弃用\n\n* 弃用警告：无警告\n\n* @deprecated 即将移除。\n\n\
  */\n\n@Deprecated(since=\"1.1\", forRemoval=true)\n\npublic static void m31() {\n\
  \nBox.notDeprecated();\n\n}\n\n/**\n\n* API：普通弃用\n\n* 使用位置：已终止弃用\n\n* 弃用警告：无警告\n\
  \n* @deprecated 即将移除。\n\n*/\n\n@Deprecated(since=\"1.1\", forRemoval=true)\n\npublic\
  \ static void m32() {\n\nBox.deprecatedOrdinarily();\n\n}\n\n/**\n\n* API：已终止弃用\n\
