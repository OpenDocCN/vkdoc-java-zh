  哎呀！似乎输出中只有第一行是正确的，第二行不正确。它找到了主类并执行了其 `main()` 方法中的代码。它正确地打印了消息，但模块名称是 `null`。你知道，除了最后一个命令之外，你之前都能够成功运行该模块。\n\
  \n你需要了解 JDK 9 中 `java` 命令的行为。`-jar` 选项在 JDK 9 之前就已存在。在 JDK 9 中，类型可以通过模块路径或类路径作为模块的一部分加载。如果类型是通过类路径加载的，则该类型会成为名为*未命名*模块的成员。即使该类型是从模块化\
  \ JAR 加载的，它也会失去其原始模块的成员身份。实际上，如果模块化 JAR 被放置在类路径上，它会被视为一个 JAR（而不是模块化 JAR），并忽略其 `module-info.class`\
  \ 文件。每个应用程序类加载器都有一个未命名模块。由类加载器从类路径加载的所有类型都是该类加载器未命名模块的成员。未命名模块也表示为 `Module` 类的一个实例，其\
  \ `getName()` 方法返回 `null`。\n\n\n\n在前面的命令中，模块化 JAR 文件 `com.jdojo.intro-1.0.jar` 被当作普通\
