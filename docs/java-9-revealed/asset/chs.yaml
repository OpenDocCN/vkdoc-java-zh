  \ `java/lang/Object.class`，该资源由其父加载器（启动类加载器）加载。\n\n**访问运行时映像中的资源**\n\n让我们通过几个示例来了解如何访问运行时映像中的资源。在\
  \ JDK 9 之前，你可以使用 `ClassLoader` 类的 `getSystemResource()` 静态方法。以下是在 JDK 8 中查找 `Object.class`\
  \ 文件的代码：\n\n```java\nimport java.net.URL;\n\n...\n\nString resource = \"java/lang/Object.class\"\
  ;\n\nURL url = ClassLoader.getSystemResource(resource);\n\nSystem.out.println(url);\n\
  ```\n\n输出：\n```\njar:file:/C:/java8/jre/lib/rt.jar!/java/lang/Object.class\n```\n\
  \n输出显示返回的 URL 使用了 `jar` 协议，并指向 `rt.jar` 文件。\n\nJDK 9 不再将运行时映像存储在 JAR 文件中。它以一种内部格式存储，这种格式将来可能会改变。JDK\
  \ 提供了一种使用 `jrt` 协议、以独立于格式和位置的方式访问运行时资源的方法。以下代码在 JDK 9 中有效，它返回一个使用 `jrt` 协议（而非 `jar`\
  \ 协议）的 URL，如下所示：\n\n```\njrt:/java.base/java/lang/Object.class\n```\n\n第 8 章 ■ JDK\
  \ 9 中的重大变更\n\n■ **提示** 如果你的代码从运行时映像访问资源，并且期望使用 `jar` 协议的 URL，那么在 JDK 9 中需要修改，因为你将获得使用\
  \ `jrt` 格式的 URL。\n\n使用 `jrt` 协议的语法如下：\n\n```\njrt:/<模块名称>/<路径>\n```\n\n其中，`<模块名称>`\
  \ 是模块的名称，`<路径>` 是模块中特定类或资源文件的路径。`<模块名称>` 和 `<路径>` 都是可选的。URL `jrt:/` 指的是当前运行时映像中存储的所有类和资源文件。`jrt:/<模块名称>`\
  \ 指的是 `<模块名称>` 模块中存储的所有类和资源文件。`jrt:/<模块名称>/<路径>` 指的是 `<模块名称>` 模块中名为 `<路径>` 的特定类或资源文件。以下是两个使用\
  \ `jrt` 协议引用类文件和资源文件的 URL 示例：\n\n- `jrt:/java.sql/java/sql/Driver.class`\n- `jrt:/java.desktop/sun/print/resources/duplex.png`\n\
  \n第一个 URL 指定了 `java.sql` 模块中 `java.sql.Driver` 类的类文件。第二个 URL 指定了 `java.desktop`\
  \ 模块中的图像文件 `sun/print/resources/duplex.png`。\n\n■ **提示** 你可以使用 `jrt` 协议访问运行时映像中的资源，而使用\
  \ `Module`、`Class` 和 `ClassLoader` 类中的资源查找方法则难以访问这些资源。\n\n你可以使用 `jrt` 协议创建 URL。以下代码片段展示了如何从运行时映像中将图像文件读入\
  \ `Image` 对象，以及将类文件读入字节数组。无需担心此代码中涉及的模块和包等细节：\n\n```java\n// 将 duplex.png 加载到 Image\
  \ 对象中\nURL imageUrl = new URL(\"jrt:/java.desktop/sun/print/resources/duplex.png\"\
  );\nImage image = ImageIO.read(imageUrl);\n\n// 在此处使用图像对象\nSystem.out.println(image);\n\
  \n// 加载 Object.class 文件的内容\nURL classUrl = new URL(\"jrt:/java.base/java/lang/Object.class\"\
  );\nInputStream input = classUrl.openStream();\nbyte[] bytes = input.readAllBytes();\n\
  System.out.println(\"Object.class 文件大小: \" + bytes.length);\n```\n\n输出：\n```\nBufferedImage@3e57cd70:\
  \ type = 6 ColorModel: #pixelBits = 32 numComponents = 4 color space\n= java.awt.color.ICC_ColorSpace@67b467e9\
  \ transparency = 3 has alpha = true isAlphaPre =\nfalse ByteInterleavedRaster: width\
  \ = 41 height = 24 #numDataElements 4 dataOff[0] = 3\nObject.class 文件大小: 1859\n\
  ```\n\n第 8 章 ■ JDK 9 中的重大变更\n\n何时可以使用其他形式的 `jrt` 协议来表示运行时映像中的所有文件以及模块中的所有文件？你可以使用\
  \ `jrt` 协议引用一个模块，以便在 Java 策略文件中授予权限。以下 Java 策略文件中的条目授予了 `java.activation` 模块中代码的所有权限：\n\
  \n```\ngrant codeBase \"jrt:/java.activation\" {\n    permission java.security.AllPermission;\n\
  };\n```\n\n许多工具和 IDE 需要枚举运行时映像中的所有模块、包和文件。JDK 9 为 `jrt` URL 协议提供了一个只读的 NIO `FileSystem`\
  \ 提供程序。你可以使用此提供程序列出运行时映像中的所有类和资源文件。有些工具和 IDE 将在 JDK 8 上运行，但支持为 JDK 9 开发代码。这些工具也需要获取\
  \ JDK 9 运行时映像中的类和资源文件列表。当你安装 JDK 9 时，`lib` 目录中包含一个 `jrt-fs.jar` 文件。你可以将此 JAR 文件添加到运行在\
  \ JDK 8 上的工具的类路径中，并按如下方式使用 `jrt` 文件系统。\n\n`jrt` 文件系统包含一个由斜杠 (`/`) 表示的根目录，该目录下包含两个子目录：`packages`\
  \ 和 `modules`：\n\n```\n/\n/packages\n/modules\n```\n\n以下代码片段为 `jrt` URL 协议创建了一个\
  \ NIO `FileSystem`：\n\n```java\n// 创建一个 jrt 文件系统\nFileSystem fs = FileSystems.getFileSystem(URI.create(\"\
  jrt:/\"));\n```\n\n以下代码片段读取一个图像文件和 `Object.class` 文件的内容：\n\n```java\n// 从模块加载图像\n\
  Path imagePath = fs.getPath(\"modules/java.desktop\", \"sun/print/resources/duplex.png\"\
  );\nImage image = ImageIO.read(Files.newInputStream(imagePath));\n\n// 在此处使用图像对象\n\
  System.out.println(image);\n\n// 读取 Object.class 文件内容\nPath objectClassPath = fs.getPath(\"\
  modules/java.base\", \"java/lang/Object.class\");\nbyte[] bytes = Files.readAllBytes(objectClassPath);\n\
  System.out.println(\"Object.class 文件大小: \" + bytes.length);\n```\n\n输出：\n```\nBufferedImage@5f3a4b84:\
  \ type = 6 ColorModel: #pixelBits = 32 numComponents = 4 color space\n= java.awt.color.ICC_ColorSpace@5204062d\
  \ transparency = 3 has alpha = true isAlphaPre =\nfalse ByteInterleavedRaster: width\
  \ = 41 height = 24 #numDataElements 4 dataOff[0] = 3\nObject.class 文件大小: 1859\n\
  ```\n\n第 8 章 ■ JDK 9 中的重大变更\n\n以下代码片段打印运行时映像中所有模块的所有条目（类和资源文件）。类似地，你可以为 `packages`\
  \ 创建一个 `Path` 来枚举运行时映像中的所有包。\n\n```java\n// 列出运行时映像中的所有模块\nPath modules = fs.getPath(\"\
  modules\");\nFiles.walk(modules)\n     .forEach(System.out::println);\n```\n\n输出：\n\
  ```\n/modules\n/modules/java.base\n/modules/java.base/java\n/modules/java.base/java/lang\n\
  /modules/java.base/java/lang/Object.class\n/modules/java.base/java/lang/AbstractMethodError.class\n\
  ...\n```\n\n\n\n让我们来看一个完整的程序，它从运行时映像中访问资源。清单 8-9 包含一个名为 com.jdojo.resource.jrt 的模块的模块声明。清单\
  \ 8-10 包含一个名为 JrtFileSystem 的类的源代码，该类位于 com.jdojo.resource.jrt 模块中。\n\n***清单 8-9.***\
  \ 名为 com.jdojo.resource.jrt 的模块的模块声明\n\n// module-info.java\n\nmodule com.jdojo.resource.jrt\
  \ {\n\nrequires java.desktop;\n\n}\n\n***清单 8-10.*** 演示如何使用 jrt URL 方案从运行时映像访问资源的\
  \ JrtFileSystem 类\n\n// JrtFileSystem.java\n\npackage com.jdojo.resource.jrt;\n\n\
  import java.awt.Image;\n\nimport java.io.IOException;\n\nimport java.net.URI;\n\n\
  import java.nio.file.FileSystem;\n\nimport java.nio.file.FileSystems;\n\nimport\
  \ java.nio.file.Files;\n\nimport java.nio.file.Path;\n\nimport javax.imageio.ImageIO;\n\
  \npublic class JrtFileSystem {\n\npublic static void main(String[] args) throws\
  \ IOException {\n\n// 创建一个 jrt 文件系统\n\nFileSystem fs = FileSystems.getFileSystem(URI.create(\"\
  jrt:/\"));\n\n第 8 章 ■ JDK 9 中的重大变更\n\n// 从模块加载一张图片\n\nPath imagePath = fs.getPath(\"\
  modules/java.desktop\", \"sun/print/resources/duplex.png\"); Image image = ImageIO.read(Files.newInputStream(imagePath));\n\
  \n// 在此处使用 image 对象\n\nSystem.out.println(image);\n\n// 读取 Object.class 文件内容\n\n\
  Path objectClassPath = fs.getPath(\"modules/java.base\", \"java/lang/Object.class\"\
  ); byte[] bytes = Files.readAllBytes(objectClassPath);\n\nSystem.out.println(\"\
  Object.class 文件大小: \" + bytes.length);\n\n// 列出运行时映像中的 5 个包\n\nPath packages = fs.getPath(\"\
  packages\");\n\nFiles.walk(packages)\n\n.limit(5)\n\n.forEach(System.out::println);\n\
  \n// 列出运行时映像中的 5 个模块条目\n\nPath modules = fs.getPath(\"modules\");\n\nFiles.walk(modules)\n\
  \n.limit(5)\n\n.forEach(System.out::println);\n\n}\n\n}\n\nBufferedImage@5bfbf16f:\
  \ type = 6 ColorModel: #pixelBits = 32 numComponents = 4 color space =\n\njava.awt.color.ICC_ColorSpace@27d415d9\
  \ transparency = 3 has alpha = true isAlphaPre =\n\nfalse ByteInterleavedRaster:\
  \ width = 41 height = 24 #numDataElements 4 dataOff[0] = 3\n\nObject.class 文件大小:\
  \ 1859\n\npackages\n\npackages/com\n\npackages/com/java.activation\n\npackages/com/java.base\n\
  \npackages/com/java.corba\n\nmodules\n\nmodules/java.desktop\n\nmodules/java.desktop/sun\n\
  \nmodules/java.desktop/sun/print\n\nmodules/java.desktop/sun/print/resources\n\n\
  请注意，程序仅从 packages 和 modules 目录中打印了五个条目。还要注意，你能够访问位于 java.desktop 模块中的 sun/print/resources/duplex.png。java.desktop\
  \ 模块并未开放 sun.print.resources 包。使用 Module、Class 和 ClassLoader 类中的任何资源查找方法来定位 sun/print/resources/duplex.png\
  \ 都会失败。\n\n第 8 章 ■ JDK 9 中的重大变更\n\n使用 JDK 内部 API\n\nJDK 由公共 API 和内部 API 组成。公共 API\
  \ 旨在用于开发可移植的 Java 应用程序。JDK 中的 java.*、javax.* 和 org.* 包包含公共 API。如果你的应用程序仅使用公共 API，则可以保证它在所有支持\
  \ Java 平台的操作系统上都能运行。\n\n此类应用程序提供的另一个保证是，如果它在 JDK 版本 *n* 中能正常工作，那么它在 JDK 版本 *n* +\
  \ 1 中也将继续正常工作。\n\ncom.sun.*、sun.* 和 jdk.* 包用于实现 JDK 本身，它们构成了内部 API，这些 API 并非供开发人员使用。内部\
  \ API 不能保证在所有操作系统上都能正常工作。诸如 com.sun.* 和 sun.* 之类的包是 Oracle JDK 的一部分。如果你使用来自其他供应商的\
  \ JDK，这些包将不可用。非 Oracle JDK（例如来自 IBM 的 JDK）将使用其他包名来实现其内部 API。图 8-6 展示了不同类别的 JDK API。\n\
  \n**JDK API**\n\n公共 API\n\n内部 API\n\njava.*、javax.* 和 org.*\n\nsun.*、com.sun.* 和\
  \ jdk.*\n\n关键 API\n\n非关键 API\n\n在\n\n封装\n\n\n\njdk.unsupported 模块\n\n在 JDK 9 中\n\
  \n***图 8-6.** 基于预期用途的 JDK API 分类*\n\n在 JDK 9 进行模块化之前，可以使用任何 JAR 中的任何公共类，即使这些类构成了\
  \ JDK 内部 API。开发者和一些广泛使用的库出于便利性，或因为这些 API 提供的功能难以在 JDK 外部实现，而一直使用 JDK 内部 API。此类类的示例包括\
  \ `BASE64Encoder` 和 `BASE64Decoder`。开发者出于便利性使用它们，因为它们作为 `sun.misc` 包中的 JDK 内部 API\
  \ 可用，尽管它们并不难以开发。另一个广泛使用的类是 `sun.misc` 包中的 `Unsafe` 类。在 JDK 外部开发一个类来替代 `Unsafe` 类很困难，因为它访问了\
  \ JDK 内部。\n\n那些仅出于便利性使用、在 JDK 外部不被使用，或存在受支持替代方案的内部 API，已被归类为非关键内部 API，并在 JDK 9 中被封装。例如\
  \ `sun.misc` 包中的 `BASE64Encoder` 和 `BASE64Decoder` 类，它们在 JDK 8 中作为公共 API 的一部分，以\
  \ `Base64.Encoder` 和 `Base64.Decoder` 类的形式被添加到 `java.util` 包中。\n\n第 8 章 ■ JDK 9\
  \ 的重大变更\n\n那些被广泛使用但难以在 JDK 外部开发的内部 API 被归类为关键内部 API。如果存在替代方案，它们已在 JDK 9 中被封装。在 JDK\
  \ 9 中被封装但可以通过命令行选项使用的关键内部 API，已使用 `@jdk.Exported` 注解进行标记。JDK 9 未为以下被视为关键内部 API 的类提供替代方案。它们可通过\
  \ `jdk.unsupported` 模块访问。\n\n• `com.sun.nio.file.ExtendedCopyOption`\n• `com.sun.nio.file.ExtendedOpenOption`\n\
  • `com.sun.nio.file.ExtendedWatchEventModifier`\n• `com.sun.nio.file.SensitivityWatchEventModifier`\n\
  • `sun.misc.Signal`\n• `sun.misc.SignalHandler`\n• `sun.misc.Unsafe`\n• `sun.reflect.Reflection`\n\
  • `sun.reflect.ReflectionFactory`\n\n■ **提示** 在 JDK 9 中，大多数 JDK 内部 API 已被封装在模块中，默认情况下不可访问。你仍然可以使用\
  \ `--add-reads` 非标准命令行选项来访问它们。\n\n以下类中的 `addPropertyChangeListener()` 和 `removePropertyChangeListener()`\
  \ 方法在 JDK 8 中已被弃用，并从 JDK 9 中移除：\n\n• `java.util.logging.LogManager`\n• `java.util.jar.Pack200.Packer`\n\
  • `java.util.jar.Pack200.Unpacker`\n\n你可以使用位于 `JAVA_HOME\\bin` 目录中的 `jdeps` 工具来查找代码对\
  \ JDK 内部 API 的类级依赖关系。你还需要使用 `--jdk-internals` 选项，如下所示：\n\njdeps --jdk-internals\
  \ --class-path <class-path> <input-path>\n\n第 8 章 ■ JDK 9 的重大变更\n\n此处，`<input-path>`\
  \ 可以是类文件、目录或 JAR 文件的路径。该命令会分析 `<input-path>` 和 `<class-path>` 上的所有类。以下命令会打印 `jersey-common.jar`\
  \ 文件中 JDK 内部 API 的使用情况，假设该 JAR 位于 `C:\\Java9Revealed\\extlib` 目录中。\n\n部分输出如下所示：\n\
  \nC:\\Java9Revealed>jdeps --jdk-internals extlib\\jersey-common.jar\n\njersey-common.jar\
  \ -> jdk.unsupported\n\norg.glassfish.jersey.internal.util.collection.ConcurrentHashMapV8\
  \ -> sun.misc.Unsafe JDK 内部 API (jdk.unsupported)\n\norg.glassfish.jersey.internal.util.collection.ConcurrentHashMapV8$TreeBin\
  \ -> sun.misc.Unsafe JDK 内部 API (jdk.unsupported)\n\n...\n\n修补模块内容\n\n有时，你可能希望将特定模块的类文件和资源替换为另一个版本，用于测试和调试目的。在\
  \ JDK 9 之前，你可以使用 `-Xbootclasspath/p` 选项来实现这一点。该选项已在 JDK 9 中被移除。在 JDK 9 中，你需要使用 `--patch-module`\
  \ 非标准命令行选项。此选项可用于 `javac` 和 `java` 命令。其语法如下：\n\n\n\n--patch-module <模块名>=<路径列表>\n\
  \n其中，<模块名> 是要替换内容的模块名称。<路径列表> 是包含新模块内容的 JAR 文件或目录列表；列表中的每个元素由特定于主机的路径分隔符分隔，在 Windows\
  \ 上为分号，在类 UNIX 平台上为冒号。\n\n你可以在同一条命令中多次使用 `--patch-module` 选项，从而修补多个模块的内容。你可以修补应用程序模块、库模块和平台模块。\n\
  \n■ **提示** 使用 `--patch-module` 选项时，不能替换 `module-info.class` 文件。尝试这样做会被静默忽略。\n\n\
  现在，我们通过一个修补 `com.jdojo.intro` 模块的示例来演示。你将用一个新的 `Welcome.class` 文件替换该模块中的 `Welcome.class`\
  \ 文件。回想一下，我们在[第 3 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_3)中创建了 `Welcome`\
  \ 类。新类将打印一条不同的消息。新类的声明如清单 8-11 所示。在源代码中，该类位于 `com.jdojo.intro.patch` NetBeans 项目中。\n\
  \n第 8 章 ■ JDK 9 中的重大变更\n\n***清单 8-11.*** Welcome 类的另一个声明\n\n```java\n// Welcome.java\n\
  \npackage com.jdojo.intro;\n\npublic class Welcome {\n\npublic static void main(String[]\
  \ args) {\n\nSystem.out.println(\"Hello Module System.\");\n\n// Print the module\
  \ name of the Welcome class\n\nClass<Welcome> cls = Welcome.class;\n\nModule mod\
  \ = cls.getModule();\n\nString moduleName = mod.getName();\n\nSystem.out.format(\"\
  Module Name: %s%n\", moduleName);\n\n}\n\n}\n```\n\n现在，你需要使用以下命令编译清单 8-11 中新 `Welcome`\
  \ 类的源代码：\n\n```\nC:\\Java9Revealed>javac -Xmodule:com.jdojo.intro\n\n--module-path\
  \ com.jdojo.intro\\dist\n\n-d patches\\com.jdojo.intro.patch com.jdojo.intro.patch\\\
  src\\com\\jdojo\\intro\\Welcome.java\n```\n\n即使你移除前两个选项（`-Xmodule` 和 `--module-path`），此命令也会成功。但是，当你编译诸如\
  \ `java.util.Arrays` 这样的平台类时，这些选项是必需的。否则，你将收到错误。`-Xmodule` 选项指定正在编译的源代码所属的模块名称。`--module-path`\
  \ 选项指定在哪里可以找到 `-Xmodule` 选项中指定的模块。这些选项用于定位编译新类所需的其他类。在本例中，`Welcome` 类不依赖于 `com.jdojo.intro`\
  \ 模块中的任何其他类。这就是为什么移除这些选项不会影响本例结果的原因。`-d` 选项指定编译后的 `Welcome.class` 文件将保存的位置。\n\n\
  以下是从 `com.jdojo.intro` 模块运行原始 `Welcome` 类的命令：\n\n```\nC:\\Java9Revealed>java --module-path\
  \ com.jdojo.intro\\dist\n\n--module com.jdojo.intro/com.jdojo.intro.Welcome\n\n\
  Welcome to the Module System.\n\nModule Name: com.jdojo.intro\n```\n\n现在是时候使用修补后的版本运行\
  \ `Welcome` 类了。以下是执行此操作的命令：\n\n```\nC:\\Java9Revealed>java --module-path com.jdojo.intro\\\
  dist\n\n**--patch-module** com.jdojo.intro=patches\\com.jdojo.intro.patch\n\n--module\
  \ com.jdojo.intro/com.jdojo.intro.Welcome\n\nHello Module System.\n\nModule Name:\
  \ com.jdojo.intro\n```\n\n第 8 章 ■ JDK 9 中的重大变更\n\n当使用 `--patch-module` 选项时，模块系统会在搜索模块路径之前，先搜索此选项中指定的路径。请注意，此选项中指定的路径包含模块的内容，但这些路径本身并不是模块路径。\n\
  \n总结\n\nJDK 9 引入了多项重大变更，如果你正在将遗留应用程序迁移到 JDK 9，则必须了解这些变更。\n\nJDK 的非直观版本控制方案已在 JDK\
  \ 9 中进行了改进。JDK 版本字符串按顺序包含以下四个元素：版本号、预发布信息、构建信息和附加信息。只有第一个元素是必需的。正则表达式 `$vnum(-`\n\
  \n\n`$pre)?(\\+($build)?(-$opt)?)?` 定义了版本字符串的格式。短版本字符串仅包含前两个元素：一个版本号，后面可选地跟有预发布信息。版本字符串可以短至仅包含主版本号的\
  \ `\"9\"`，也可以长至包含所有元素的 `\"9.0.1-ea+154-20170130.07.36am\"`。\n\nJDK 9 新增了一个名为 `Runtime.Version`\
  \ 的静态嵌套类，其实例代表 JDK 版本字符串。该类没有公共构造方法。获取其实例的唯一方式是调用其名为 `parse(String vstr)` 的静态方法。如果版本字符串为\
  \ null 或无效，该方法可能会抛出运行时异常。该类包含多个方法，用于获取版本的不同部分。\n\nJDK 9 改变了 JDK 和 JRE 安装的目录布局。现在，JDK\
  \ 和 JRE 安装之间没有区别，唯一的区别是 JDK 安装包含开发者工具以及一份 JRE 所不包含的、JMOD 格式的平台模块副本。你可以使用 `jlink`\
  \ 工具构建自己的 JRE，并且它可以包含 JRE 中你需要的任何 JDK 部分。\n\n在 Java SE 9 之前，你可以使用“认可标准覆盖机制”来使用实现认可标准或独立\
  \ API 的类与接口的更新版本。这些包括 `javax.rmi.CORBA` 包和用于 XML 处理的 Java API (JAXP)，它们是在 Java 社区流程之外创建的。Java\
  \ SE 9 仍然支持此机制。在 Java SE 9 中，你需要使用 `--upgrade-module-path` 命令行选项。该选项的值是一个目录列表，其中包含用于认可标准和独立\
  \ API 的模块。\n\n版本 9 之前的 Java SE 允许一种扩展机制，通过该机制，你可以将 JAR 文件放置在由系统属性 `java.ext.dirs`\
  \ 指定的目录中，从而扩展运行时映像。如果未设置此系统属性，则默认使用 `jre\\lib\\ext` 目录。Java SE 9 不支持扩展机制。如果你需要类似的功能，可以将这些\
  \ JAR 文件放置在类路径的前端。\n\n在版本 9 之前，JDK 使用三个类加载器来加载类。它们是引导类加载器、扩展类加载器和系统类加载器。它们按层次结构排列——引导类加载器没有父加载器，扩展类加载器以引导类加载器为父加载器，系统类加载器以扩展类加载器为父加载器。类加载器在尝试加载类型本身之前，会先将类型加载请求委托给其父加载器（如果有的话）。JDK\
  \ 9 为了向后兼容，保留了三个类加载器的安排。JDK 9 不支持扩展机制，因此扩展类加载器已无意义。JDK 9 已将扩展类加载器重命名为平台类加载器，可以通过\
  \ `ClassLoader` 类的静态方法 `getPlatformClassLoader()` 获取其引用。在 JDK 9 中，每个类加载器加载不同类型的模块。\n\
  \n在 JDK 9 中，命名模块中的资源默认是封装的。只有当资源位于未命名、无效或开放的包中时，另一个模块中的代码才能访问命名模块中的资源。命名模块中所有名称以\
  \ `.class` 结尾的资源（所有类文件）都可以被其他模块中的代码访问。你可以使用 `jrt` 方案的 URL 来访问运行时映像中的任何资源。\n\n第 8\
  \ 章 ■ JDK 9 中的重大变更\n\n在 JDK 9 之前，可以使用 JDK 内部 API。JDK 9 中的大多数 JDK 内部 API 已被封装。其中一些已通过\
  \ `jdk.unsupported` 模块提供。你可以使用带有 `--jdk-internals` 选项的 `jdeps` 工具来查找代码对 JDK 内部 API\
  \ 的类级别依赖关系。\n\n有时，你可能希望将特定模块的类文件和资源替换为另一个版本，用于测试和调试目的。在 JDK 9 之前，你可以通过使用\n\n\n\n\
  -Xbootclasspath/p 选项已在 JDK 9 中被移除。在 JDK 9 中，你需要使用非标准命令行选项 `--patch-module`。该选项可用于\
  \ `javac` 和 `java` 命令。\n\n**第 9 章**\n\n**打破模块封装**\n\n在本章中，你将学习：\n\n• 什么是打破模块的封装\n\
  \n• 如何使用命令行选项向模块添加依赖（添加 requires）\n\n• 如何使用 `--add-exports` 命令行选项以及可执行 JAR 的 `MANIFEST.MF`\
  \ 文件导出模块的未导出包\n\n• 如何使用 `--add-opens` 命令行选项以及可执行 JAR 的 `MANIFEST.MF` 文件打开模块的未开放包\n\
  \n• 如何使用 `--add-reads` 命令行选项增加模块的可读性\n\n什么是打破模块封装？\n\nJDK 9 的主要目标之一是将类型和资源封装在模块中，并且只导出那些公共类型旨在供其他模块访问的包。有时，你可能需要打破模块指定的封装，以便进行白盒测试或使用不受支持的\
  \ JDK 内部 API 或库。这可以通过在编译时和运行时使用非标准命令行选项来实现。拥有这些选项的另一个原因是向后兼容性。并非所有现有应用程序都会完全迁移到\
  \ JDK 9 并实现模块化。如果这些应用程序需要使用曾经是公共的、但已在 JDK 9 中被封装的 JDK API 或库提供的 API，那么这些应用程序有一种方法可以继续工作。其中一些选项具有相应的属性，可以添加到可执行\
  \ JAR 的 `MANIFEST.MF` 文件中，以避免使用命令行选项。\n\n■ **提示** 每个用于打破模块封装的命令行选项也支持通过 Module API\
  \ 以编程方式使用，这将在第 [10](http://dx.doi.org/10.1007/978-1-4842-2592-9_10) 章中详细介绍。\n\n\
  尽管这些选项听起来像是在做与 JDK 9 之前相同的事情，但在不受任何限制地访问 JDK 内部 API 时，需要谨慎。如果模块中的包未被导出或开放，这意味着模块的设计者并不打算让这些包在模块外部使用。\n\
  \n此类包可能会被修改甚至从模块中删除，恕不另行通知。如果你仍然通过使用命令行选项导出或打开这些包来使用它们，那么你将自行承担应用程序崩溃的风险！\n\n© Kishori\
  \ Sharan 2017\n\nK. Sharan, *Java 9 揭密*, DOI 10.1007/978-1-4842-2592-9_9\n\n第 9\
  \ 章 ■ 打破模块封装\n\n命令行选项\n\n模块声明中的三个模块语句让模块能够封装其类型和资源，并让其他模块能够使用第一个模块中的封装类型和资源。这些语句是\
  \ `exports`、`opens` 和 `requires`。每个模块语句都有一个对应的命令行选项。对于 `exports` 和 `opens` 语句，还有相应的属性可用于\
  \ JAR 的清单文件中。表 9-1 列出了这些语句及其对应的命令行选项和清单属性。我将在以下各节中详细介绍这些选项。\n\n***表 9-1.** 模块语句及其对应的命令行选项和清单属性*\
  \ **模块语句**\n\n**命令行选项**\n\n**清单属性**\n\nexports\n\n--add-exports\n\nAdd-Exports\n\
  \nopens\n\n--add-opens\n\nAdd-Opens\n\nrequires\n\n--add-reads\n\n（无可用属性）\n\n■ **提示**\
  \ 你可以在同一条命令中多次使用 `--add-exports`、`--add-opens` 和 `--add-reads` 命令行选项。\n\n--add-exports\
  \ 选项\n\n模块声明中的 `exports` 语句将模块中的包导出给所有或部分其他模块，以便这些模块可以使用该包中的公共 API。如果某个包未被模块导出，你可以使用名为\
  \ `--add-exports` 的命令行选项将其导出。其语法如下：\n\n\n\n--add-exports <源模块>/<包名>=<目标模块列表>\n\n\
  其中，<源模块> 是将 <包名> 导出到 <目标模块列表> 的模块，<目标模块列表> 是一个以逗号分隔的目标模块名称列表。这相当于在 <源模块> 的声明中添加一条限定导出语句：\n\
  \nmodule <源模块> {\n\n    exports <包名> to <目标模块列表>;\n\n    // 更多语句写在这里\n\n}\n\n■ **提示**\
  \ 如果 --add-exports 选项的目标模块列表是特殊值 ALL-UNNAMED，则该模块的包将被导出到所有未命名模块。--add-exports 选项可用于\
  \ javac 和 java 命令。\n\n第 9 章 ■ 打破模块封装\n\n以下选项将 java.base 模块中的 sun.util.logging 包导出到\
  \ com.jdojo.test 和 com.jdojo.prime 模块：\n\n--add-exports java.base/sun.util.logging=com.jdojo.test,com.jdojo.prime\n\
  \n以下选项将 java.base 模块中的 sun.util.logging 包导出到所有未命名模块：\n\n--add-exports java.base/sun.util.logging=ALL-UNNAMED\n\
  \n--add-opens 选项\n\n模块声明中的 opens 语句会打开模块中的一个包，使其对所有或部分其他模块可见，这样这些模块就可以在运行时使用深度反射来访问该包中的所有成员类型。如果某个模块的包未打开，你可以使用\
  \ --add-opens 命令行选项将其打开。其语法如下：\n\n--add-opens <源模块>/<包名>=<目标模块列表>\n\n其中，<源模块> 是将\
  \ <包名> 开放给 <目标模块列表> 的模块，<目标模块列表> 是一个以逗号分隔的目标模块名称列表。这相当于在 <源模块> 的声明中添加一条限定 opens\
  \ 语句：\n\nmodule <源模块> {\n\n    opens <包名> to <目标模块列表>;\n\n    // 更多语句写在这里\n\n}\n\
  \n■ **提示** 如果 --add-opens 选项的目标模块列表是特殊值 ALL-UNNAMED，则该模块的包将对所有未命名模块开放。--add-opens\
  \ 选项可用于 java 命令。在编译时使用 javac 命令使用此选项会生成警告，且不会产生任何效果。\n\n以下选项将 java.base 模块中的 sun.util.logging\
  \ 包开放给 com.jdojo.test 和 com.jdojo.prime 模块：\n\n--add-opens java.base/sun.util.logging=com.jdojo.test,com.jdojo.prime\n\
  \n以下选项将 java.base 模块中的 sun.util.logging 包开放给所有未命名模块：\n\n--add-opens java.base/sun.util.logging=ALL-UNNAMED\n\
  \n第 9 章 ■ 打破模块封装\n\n--add-reads 选项\n\n--add-reads 选项并非用于打破封装。相反，它用于增加模块的可读性。在测试和调试过程中，有时一个模块需要读取另一个模块，即使前者并不依赖于后者。模块声明中的\
  \ requires 语句用于声明当前模块对另一个模块的依赖。你可以使用 --add-reads 命令行选项来添加一条从一个模块到另一个模块的可读性边。这相当于在第一个模块中添加一条\
  \ requires 语句。其语法如下：\n\n--add-reads <源模块>=<目标模块列表>\n\n其中，<源模块> 是其定义被更新以读取 <目标模块列表>\
  \ 中指定模块列表的模块，<目标模块列表> 是一个以逗号分隔的目标模块名称列表。这相当于为源模块添加一条针对目标模块列表中每个模块的 requires 语句：\n\
  \nmodule <源模块> {\n\n    requires <目标模块 1>;\n\n    requires <目标模块 2>;\n\n    // 更多语句写在这里\n\
  \n}\n\n■ **提示** 如果 --add-reads 选项的目标模块列表是特殊值 ALL-UNNAMED，则源模块将读取所有未命名模块。这是命名模块读取未命名模块的唯一方式。在命名模块声明中，没有等效的模块语句可以用来读取未命名模块。\n\
  \n此选项在编译时和运行时均可用。\n\n以下选项为 com.jdojo.common 模块添加一条读取边，使其能够读取 jdk.accessibility 模块：\n\
  \n\n\n--add-reads com.jdojo.common=jdk.accessibility\n\n--permit-illegal-access\
  \ 选项\n\n前面提到的三个用于添加导出、开放和读取的命令行选项，纯粹是为了向后兼容。然而，当你需要对多个模块进行“非法”访问（即通过反射访问模块中类型中相当难以访问的成员）时，使用这些选项会非常繁琐。针对这种情况，`java`\
  \ 命令提供了 `--permit-illegal-access` 选项。顾名思义，它允许任何未命名模块（类路径上的代码）中的代码，通过深度反射，对任何命名模块中的类型成员进行非法访问。其语法如下：\n\
  \njava --permit-illegal-access <其他选项和参数>\n\n`--permit-illegal-access` 选项不允许命名模块中的代码对其他命名模块中的类型成员进行非法访问。在这种情况下，你可以将此选项与\
  \ `--add-exports`、`--add-opens` 和 `--add-reads` 选项结合使用。\n\n第 9 章 ■ 打破模块封装\n\n■ **提示**\
  \ `--permit-illegal-access` 选项在 JDK 9 中可用，并将在 JDK 10 中移除。使用此选项会在标准错误流上打印警告。一条警告会打印一条消息，说明此选项将在未来版本中移除。其他警告会报告被授予非法访问权限的代码的详细信息、被授予非法访问权限的代码，以及授予该访问权限的选项。\n\
  \n我将在下一节中提供一个示例，演示如何使用所有这些允许打破模块封装的选项。\n\n一个示例\n\n让我们通过一个示例来了解如何打破封装。我使用一个简单的示例。然而，它足以演示所有可用于打破封装的概念和命令行选项。\n\
  \n你创建了 `com.jdojo.intro` 模块作为你的第一个模块。它在 `com.jdojo.intro` 包中包含一个 `Welcome` 类。该模块没有导出该包，因此\
  \ `Welcome` 类是被封装的，无法在模块外部访问。在此示例中，你将从一个名为 `com.jdojo.intruder` 的模块中调用 `Welcome`\
  \ 类的 `main()` 方法，该模块的声明如清单 9-1 所示。\n\n清单 9-2 显示了此模块中 `TestNonExported` 类的代码。\n\n\
  ***清单 9-1.*** 名为 com.jdojo.intruder 的模块的声明\n\n// module-info.java\n\nmodule com.jdojo.intruder\
  \ {\n\n// 无模块语句\n\n}\n\n***清单 9-2.*** 名为 TestNonExported 的类\n\n// TestNonExported.java\n\
  \npackage com.jdojo.intruder;\n\nimport com.jdojo.intro.Welcome;\n\npublic class\
  \ TestNonExported {\n\npublic static void main(String[] args) {\n\nWelcome.main(new\
  \ String[]{});\n\n}\n\n}\n\n`TestNonExported` 类只包含一行代码。它调用 `Welcome` 类的静态 `main()`\
  \ 方法，并传递一个空的 `String` 数组。如果编译并运行此类，它将打印与第 [3](http://dx.doi.org/10.1007/978-1-4842-2592-9_3)\
  \ 章中运行 `Welcome` 类时相同的消息：欢迎使用模块系统。\n\n模块名称：com.jdojo.intro\n\n第 9 章 ■ 打破模块封装\n\n\
  如果你尝试编译 `com.jdojo.intruder` 模块的代码，将会收到一个错误：\n\nC:\\Java9Revealed>javac --module-path\
  \ com.jdojo.intro\\dist\n\n-d com.jdojo.intruder\\build\\classes\n\ncom.jdojo.intruder\\\
  src\\module-info.java com.jdojo.intruder\\src\\com\\jdojo\\intruder\\\n\nTestNonExported.java\n\
  \ncom.jdojo.intruder\\src\\com\\jdojo\\intruder\\TestNonExported.java:4: 错误：包 com.\n\
  \njdojo.intro 不可见\n\nimport com.jdojo.intro.Welcome;\n\n^\n\n（包 com.jdojo.intro\
  \ 在模块 com.jdojo.intro 中声明，但模块 com.jdojo.\n\nintruder 未读取它）\n\n1 个错误\n\n该命令使用 `--module-path`\
  \ 选项将 `com.jdojo.intro` 模块包含在模块路径中。编译时错误指向导入 `com.jdojo.intro.Welcome` 类的 import\
  \ 语句。它指出包 `com.jdojo.intro` 对 `com.jdojo.intruder` 模块不可见。\n\n\n\n也就是说，`com.jdojo.intro`\
  \ 模块并未导出包含 `Welcome` 类的 `com.jdojo.intro` 包。要修复此错误，你需要使用 `--add-exports` 命令行选项，将\
  \ `com.jdojo.intro` 模块的 `com.jdojo.intro` 包导出给 `com.jdojo.intruder` 模块：\n\nC:\\\
  Java9Revealed>javac --module-path com.jdojo.intro\\dist\n\n**--add-exports com.jdojo.intro/com.jdojo.intro=com.jdojo.intruder**\n\
  \n-d com.jdojo.intruder\\build\\classes\n\ncom.jdojo.intruder\\src\\module-info.java\
  \ com.jdojo.intruder\\src\\com\\jdojo\\intruder\\\n\nTestNonExported.java\n\nwarning:\
  \ [options] module name in --add-exports option not found: com.jdojo.intro\n\ncom.jdojo.intruder\\\
  src\\com\\jdojo\\intruder\\TestNonExported.java:4: error: package com.jdojo.\n\n\
  intro is not visible\n\nimport com.jdojo.intro.Welcome;\n\n^\n\n(package com.jdojo.intro\
  \ is declared in module com.jdojo.intro, but module com.jdojo.\n\nintruder does\
  \ not read it)\n\n1 error\n\n1 warning\n\n这次，你收到了一个警告和一个错误。错误与之前相同。警告信息表明编译器找不到\
  \ `com.jdojo.intro` 模块。由于没有对该模块的依赖，即使它位于模块路径中，该模块也不会被解析。要解决这个警告，你需要使用 `--add-modules`\
  \ 选项将 `com.jdojo.intro` 模块添加到默认的根模块集合中： C:\\Java9Revealed>javac --module-path com.jdojo.intro\\\
  dist\n\n**--add-modules com.jdojo.intro**\n\n--add-exports com.jdojo.intro/com.jdojo.intro=com.jdojo.intruder\n\
  \n-d com.jdojo.intruder\\build\\classes\n\ncom.jdojo.intruder\\src\\module-info.java\n\
  \ncom.jdojo.intruder\\src\\com\\jdojo\\intruder\\TestNonExported.java\n\n第 9 章 ■\
  \ 打破模块封装\n\n尽管 `com.jdojo.intruder` 模块并未读取 `com.jdojo.intro` 模块，但这条 `javac` 命令却执行成功了。这似乎是一个\
  \ bug。如果不是 bug，我也找不到任何文档来支持这种行为。稍后你会看到，对于相同的模块，`java` 命令将无法正常工作。\n\n如果此命令报错，提示 `TestNonExported`\
  \ 类无法访问 `Welcome` 类，请添加以下选项来修复：\n\n--add-reads com.jdojo.intruder=com.jdojo.intro\n\
  \n让我们尝试使用以下命令重新运行 `TestNonExported` 类，该命令将 `com.jdojo.intruder` 模块包含到模块路径中：\n\n\
  C:\\Java9Revealed>java --module-path com.jdojo.intro\\dist;com.jdojo.intruder\\\
  build\\classes\n\n--add-modules com.jdojo.intro\n\n--add-exports com.jdojo.intro/com.jdojo.intro=com.jdojo.intruder\n\
  \n--module com.jdojo.intruder/com.jdojo.intruder.TestNonExported\n\nException in\
  \ thread \"main\" java.lang.IllegalAccessError: class com.jdojo.intruder.\n\nTestNonExported\
  \ (in module com.jdojo.intruder) cannot access class com.jdojo.intro.Welcome\n\n\
  (in module com.jdojo.intro) because module com.jdojo.intruder does not read module\
  \ com.\n\njdojo.intro\n\nat com.jdojo.intruder/com.jdojo.intruder.TestNonExported.main(TestNonExported.java:8)\n\
  \n错误信息清晰明了。它指出 `com.jdojo.intruder` 模块必须读取 `com.jdojo.intro` 模块，前者才能使用后者的 `Welcome`\
  \ 类。你可以使用 `--add-reads` 选项来修复此错误，该选项会在 `com.jdojo.intruder` 模块中添加一条读取边（相当于 `requires`\
  \ 语句），使其能够读取 `com.jdojo.intro` 模块。以下命令实现了这一点： C:\\Java9Revealed>java --module-path\
  \ com.jdojo.intro\\dist;com.jdojo.intruder\\build\\classes\n\n--add-modules com.jdojo.intro\n\
  \n--add-exports com.jdojo.intro/com.jdojo.intro=com.jdojo.intruder\n\n**--add-reads\
  \ com.jdojo.intruder=com.jdojo.intro**\n\n--module com.jdojo.intruder/com.jdojo.intruder.TestNonExported\n\
  \nWelcome to the Module System.\n\nModule Name: com.jdojo.intro\n\n这次，你得到了期望的输出。图\
  \ 9-1 展示了运行此命令时创建的模块图。\n\ncom.jdojo.intruder\n\ncom.jdojo.intro\n\njava.base\n\n\
  ***图 9-1.** 使用 --add-modules 和 --add-reads 选项后的模块图* 203\n\n第 9 章 ■ 打破模块封装\n\n\n\n\
  `com.jdojo.intruder` 和 `com.jdojo.intro` 模块都是根模块。`com.jdojo.intruder` 模块被添加到默认的根模块集合中，因为正在运行的主类位于此模块中。`com.jdojo.intro`\
  \ 模块通过 `--add-modules` 选项被添加到默认的根模块集合中。通过 `--add-reads` 选项，从 `com.jdojo.intruder`\
  \ 模块到 `com.jdojo.intro` 模块添加了一条读取边。我使用虚线表示从前一个模块到后一个模块的读取边，以强调它是在模块图构建完成后，作为 `--add-reads`\
  \ 选项的结果而添加的。请在此命令中使用 `-Xdiag:resolver` 选项来查看模块是如何被解析的。\n\n让我们再看一个示例，该示例将展示如何使用 `--add-opens`\
  \ 命令行选项将一个包开放给另一个模块。在第 [4](http://dx.doi.org/10.1007/978-1-4842-2592-9_4) 章中，你有一个\
  \ `com.jdojo.address` 模块，其中包含一个位于 `com.jdojo.address` 包中的 `Address` 类。该模块导出了 `com.jdojo.address`\
  \ 包。该类包含一个名为 `line1` 的私有字段，用于存储地址的第一行。还有一个公共方法 `getLine1()`，它返回 `line1` 字段的值。\n\n\
  如清单 9-3 所示，一个名为 `TestNonOpen` 的类尝试加载 `Address` 类，创建该类的一个实例，并访问其公共和私有成员。`TestNonOpen`\
  \ 类是 `com.jdojo.intruder` 模块的成员。我在 `main()` 方法的 `throws` 子句中添加了一堆异常，以保持逻辑简单。在实际程序中，你会在\
  \ `try-catch` 块中处理它们。\n\n***清单 9-3.*** 一个名为 TestNonOpen 的类\n\n// TestNonOpen.java\n\
  \npackage com.jdojo.intruder;\n\nimport java.lang.reflect.Constructor;\n\nimport\
  \ java.lang.reflect.Field;\n\nimport java.lang.reflect.InvocationTargetException;\n\
  \nimport java.lang.reflect.Method;\n\npublic class TestNonOpen {\n\npublic static\
