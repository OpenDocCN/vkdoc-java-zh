  \ 的原因。`java` 命令是如何找到主类名的呢？回想一下，当你向 `jar` 工具指定主类名时，该工具会在两个位置存储主类名：\n\n• 在 `module-info.class`\
  \ 文件中\n\n• 在 `META-INF/MANIFEST.MF` 文件中\n\n此命令从 `META-INF/MANIFEST.MF` 文件中读取主类的名称。\n\
  \n你也可以使用带有 `--class-path` 选项的 `java` 命令来运行 `Welcome` 类。你可以将模块化 JAR `lib\\com.jdojo.intro-1.0.jar`\
  \ 放在类路径上，在这种情况下，它将被视为普通 JAR，并且 `Welcome` 类将被加载到应用程序类加载器的未命名模块中。在 JDK 9 之前，你就是这样运行类的。以下命令可以完成此操作：\n\
