  \ 和 `m3()`。请注意，`m2()` 方法调用了 `m3()` 两次。第一次调用时，字节码索引为 8，第二次调用时为 35。\n\n`getDeclaringClass()`\
  \ 方法返回声明该栈帧所代表方法的类的 `Class` 对象引用。如果此 `StackWalker` 未配置 `RETAIN_CLASS_REFERENCE`\
  \ 选项，则会抛出 `UnsupportedOperationException`。\n\n`toStackTraceElement()` 方法返回一个 `StackTraceElement`\
  \ 类的实例，该实例代表相同的栈帧。如果你想使用 JDK 9 API 获取 `StackWalker.StackFrame`，但继续使用基于 `StackTraceElement`\
  \ 类分析栈帧的旧代码，这个方法会非常方便。\n\n获取 StackWalker\n\n`StackWalker` 类包含以下返回 `StackWalker`\
  \ 实例的静态工厂方法：\n\n• `StackWalker getInstance()`\n\n• `StackWalker getInstance (StackWalker.Option\
  \ option)`\n\n• `StackWalker getInstance (Set<StackWalker.Option> options)`\n\n\
  • `StackWalker getInstance (Set<StackWalker.Option> options, int estimateDepth)`\n\
  \n你可以使用不同版本的 `getInstance()` 方法对 `StackWalker` 进行不同配置。默认配置是排除所有隐藏帧且不保留类引用。允许你指定\
  \ `StackWalker.Option` 的版本将使用这些选项进行配置。\n\n`estimateDepth` 参数是一个提示，用于指示此 `StackWalker`\
  \ 预期遍历的栈帧估计数量，以便优化内部缓冲区的大小。\n\n以下代码片段创建了四个具有不同配置的 `StackWalker` 类实例：\n\n第 16 章 ■\
  \ 栈遍历\n\nimport java.util.Set;\n\nimport static java.lang.StackWalker.Option.*;\n\
  \n...\n\n// 获取一个默认配置的 StackWalker\n\nStackWalker sw1 = StackWalker.getInstance();\n\
  \n// 获取一个显示反射帧的 StackWalker\n\nStackWalker sw2 = StackWalker.getInstance(SHOW_REFLECT_FRAMES);\n\
  \n// 获取一个显示所有隐藏帧的 StackWalker\n\nStackWalker sw3 = StackWalker.getInstance(SHOW_HIDDEN_FRAMES);\n\
  \n// 获取一个显示反射帧并保留类引用的 StackWalker\n\nStackWalker sw4 = StackWalker.getInstance(\n\
  \n\n\n`Set.of(SHOW_REFLECT_FRAMES, RETAIN_CLASS_REFERENCE));`\n\n■ **提示** `StackWalker`\
  \ 是线程安全且可重用的。多个线程可以使用同一个实例来遍历各自的堆栈。\n\n下一节将解释如何使用 `StackWalker` 遍历堆栈帧。\n\n## 遍历堆栈\n\
  \n现在是时候遍历线程的堆栈帧了。`StackWalker` 类包含两个方法，允许你遍历*当前线程*的堆栈：\n\n• `void forEach(Consumer<?\
  \ super StackWalker.StackFrame> action)`\n\n• `<T> T walk(Function<? super Stream<StackWalker.StackFrame>,?\
  \ extends T> function)`\n\n如果你需要遍历整个堆栈，请使用 `forEach()` 方法。指定的 `Consumer` 将依次从堆栈中获取一个帧，从最顶层的帧开始。以下代码片段打印了\
  \ `StackWalker` 返回的每个帧的详细信息：\n\n```java\n// 打印当前线程所有堆栈帧的详细信息\nStackWalker.getInstance()\n\
  \          .forEach(System.out::println);\n```\n\n如果你想自定义堆栈遍历（例如使用过滤器和映射），请使用 `walk()`\
  \ 方法。\n\n`walk()` 方法接受一个 `Function`，该函数接受一个 `Stream<StackWalker.StackFrame>` 作为参数，并可以返回任何类型的对象。`StackWalker`\
  \ 会创建堆栈帧流并将其传递给您的函数。当函数执行完毕后，`StackWalker` 会关闭该流。传递给 `walk()` 方法的流只能被遍历一次。尝试第二次遍历该流会抛出\
  \ `IllegalStateException`。\n\n**第 16 章 ■ 堆栈遍历**\n\n以下代码片段使用 `walk()` 方法遍历整个堆栈，并打印每个帧的详细信息。此代码片段与之前使用\
  \ `forEach()` 方法的代码片段功能相同。\n\n```java\n// 打印当前线程所有堆栈帧的详细信息\nStackWalker.getInstance()\n\
  \          .walk(s -> {\n              s.forEach(System.out::println);\n       \
  \       return null;\n          });\n```\n\n■ **提示** `StackWalker` 的 `forEach()`\
  \ 方法用于一次处理一个堆栈帧，而 `walk()` 方法则用于将整个堆栈作为帧流进行处理。你可以使用 `walk()` 方法来模拟 `forEach()` 方法的功能，但反之则不行。\n\
  \n你可能想知道为什么 `walk()` 方法不直接返回一个堆栈帧流，而是将流传递给您的函数。不直接从方法返回堆栈帧流是故意的。流的元素是惰性求值的。一旦创建了堆栈帧流，JVM\
  \ 就可以自由地重新组织堆栈，并且在你仍然持有对该流的引用时，没有明确的方法来检测堆栈是否已更改。这就是堆栈帧流的创建和关闭由 `StackWalker` 类控制的原因。\n\
  \n由于 Streams API 非常广泛，`walk()` 方法的使用也是如此。在向你展示一个完整示例之前，我先展示几个示例用法。以下代码片段将当前线程的堆栈帧快照获取到一个\
  \ `List` 中。\n\n```java\nimport java.lang.StackWalker.StackFrame;\nimport java.util.List;\n\
  import static java.util.stream.Collectors.toList;\n...\nList<StackFrame> frames\
  \ = StackWalker.getInstance()\n                                     .walk(s -> s.collect(toList()));\n\
  ```\n\n以下代码片段将当前线程所有堆栈帧的字符串形式收集到一个 `List` 中，排除了那些方法名以 `m2` 开头的帧：\n\n```java\nimport\
  \ java.util.List;\nimport static java.util.stream.Collectors.toList;\n...\nList<String>\
