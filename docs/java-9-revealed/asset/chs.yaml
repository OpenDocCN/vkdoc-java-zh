  \n**总结**\n\n模块 API 由一些类和接口组成，它们为您提供了对模块的编程式访问。使用该 API，您可以编程式地读取/修改/构建模块描述符、加载模块、读取模块内容、创建层等。模块\
  \ API 很小，包含大约 15 个类和接口，分布在两个包中：`java.lang` 和 `java.lang.module`。`Module`、`ModuleLayer`\
  \ 和 `LayerInstantiationException` 类位于 `java.lang` 包中，其余类位于 `java.lang.module` 包中。\n\
  \n`Module` 类的实例表示一个运行时模块。加载到 JVM 中的每个类型都属于某个模块。JDK 9 向 `Class` 类添加了一个名为 `getModule()`\
  \ 的方法，该方法返回该类所属的模块。\n\n`ModuleDescriptor` 类的实例表示一个模块定义，它是从模块声明（通常来自 `module-info.class`\
  \ 文件）创建的。也可以使用 `ModuleDescriptor.Builder` 类动态创建模块描述符。模块声明可以通过命令行选项（如 `--add-reads`、`--add-exports`\
  \ 和 `--add-opens`）以及使用 `Module` 类中的方法（如 `addReads()`、`addOpens()` 和 `addExports()`）进行增强。`ModuleDescriptor`\
  \ 表示模块声明时存在的模块描述符，而不是增强后的模块描述符。\n\n\n\nModule 类的 getDescriptor() 方法返回一个 ModuleDescriptor。ModuleDescriptor\
  \ 是不可变的。未命名模块没有模块描述符。对于未命名模块，Module 类的 getDescriptor() 方法返回 null。ModuleDescriptor\
  \ 类包含多个嵌套类，例如 ModuleDescriptor.Requires 嵌套类；每个嵌套类都代表程序中的一个模块语句。\n\n你可以使用命令行选项以及通过\
  \ Module API 以编程方式增强模块描述符。你可以将对模块属性的所有查询分为两类：一类是模块加载后可能发生变化的属性，另一类是模块加载后不会发生变化的属性。Module\
  \ 类包含针对第一类查询的方法，而 ModuleDescriptor 类包含针对第二类查询的方法。\n\n第 10 章 ■ Module API\n\n你可以在运行时使用\
  \ Module 类中的以下方法之一更新模块的定义：addExports()、addOpens()、addReads() 和 addUses()。\n\n你可以在模块声明上使用注解。java.lang.annotation.ElementType\
  \ 枚举新增了一个名为 MODULE 的值。你可以在注解声明中将 MODULE 用作目标类型，从而允许该注解类型用于模块。在 Java 9 中，两个注解——java.lang.Deprecated\
  \ 和 java.lang.SuppressWarnings——已被更新，可用于模块声明。在模块上使用这些注解只会影响模块声明本身，而不会影响模块中包含的类型。\n\
  \n模块被组织成层。一个层是一组已解析的模块，并带有一个函数，该函数将每个模块映射到一个负责加载该模块中所有类型的类加载器。这组已解析的模块被称为一个*配置*。层是分层组织的。除了*空*层之外，每个层至少有一个父层。顾名思义，空层不包含任何模块，其主要作用是作为*引导*层的父层。引导层由\
  \ JVM 在启动时通过针对一组可观察模块解析应用程序的初始模块（根模块）来创建。你可以创建自定义层。层允许将同一模块的多个版本加载到不同的层中，并在同一个 JVM\
  \ 中使用。\n\n**第 11 章**\n\n**Java Shell**\n\n在本章中，你将学习：\n\n• 什么是 Java Shell\n\n• 什么是\
  \ JShell 工具和 JShell API\n\n• 如何配置 JShell 工具\n\n• 如何使用 JShell 工具评估 Java 代码片段\n\n\
  • 如何使用 JShell API 评估 Java 代码片段\n\n什么是 Java Shell？\n\nJava Shell，在 JDK 9 中称为 JShell，是一个命令行工具，它提供了一种交互式访问\
  \ Java 编程语言的方式。它允许你评估 Java 代码片段，而无需强制你编写整个 Java 程序。它是 Java 的 REPL（读取-求值-打印循环）。JShell\
  \ 也是一个 API，你可以用它来开发应用程序，以提供与 JShell 命令行工具相同的功能。\n\n**R**ead-**E**val-**P**rint 循环（REPL）是一种命令行工具（也称为交互式语言\
  \ Shell），它允许用户快速评估代码片段，而无需编写完整的程序。REPL 这个名称来源于 Lisp 中的三个基本函数——read、eval 和 print——它们在一个循环中使用。read\
  \ 函数读取用户输入并将其解析为数据结构；eval 函数评估解析后的用户输入以产生结果；print 函数打印结果。打印结果后，该工具即可再次接受用户输入，从而触发一个读取-求值-打印循环。术语\
  \ REPL 用于指代允许你与编程语言交互的交互式工具。图 11-1 展示了 REPL 的概念图。UNIX Shell 或 Windows 命令提示符就像一个\
  \ REPL，它读取操作系统命令，执行它，打印输出，然后等待读取下一个命令。\n\n求值\n\n开始\n\n读取\n\n打印\n\n退出\n\n***图 11-1.**\
  \ 读取-求值-打印循环的概念图*\n\n© Kishori Sharan 2017\n\nK. Sharan, *Java 9 Revealed*, DOI\
  \ 10.1007/978-1-4842-2592-9_11\n\n第 11 章 ■ Java Shell\n\n为什么 JShell 被包含在 JDK 9 中？将其包含在\
  \ JDK 9 中的主要原因之一是来自学术界的反馈，即 Java 学习曲线陡峭。其他编程语言，如 Lisp、Python、Ruby、Groovy 和 Clojure，早已支持\
  \ REPL。仅仅为了在 Java 中编写一个“Hello, world!”程序，你就不得不采用编辑-编译-执行循环（ECEL），这涉及编写一个完整的程序、编译它并执行它。如果你需要进行更改，则必须重复这些步骤。除了其他一些诸如定义目录结构、编译和执行程序之类的准备工作外，以下是使用\
  \ JDK 9 中的模块化 Java 程序打印“Hello, world!”消息所需编写的最少代码：\n\n// module-info.java\n\nmodule\
  \ HelloWorld {\n\n}\n\n// HelloWorld.java\n\npackage com.jdojo.intro;\n\npublic\
  \ class HelloWorld {\n\npublic static void main(String[] args) {\n\nSystem.out.println(\"\
  Hello, world!\");\n\n}\n\n}\n\n这个程序在执行时会在控制台上打印一条消息：“Hello, world!”。为了评估这样一个简单的表达式而编写一个完整的程序是小题大做。这就是学术界逐渐放弃将\
  \ Java 作为学生入门编程语言的主要原因。Java 设计者听取了教学社区的反馈，并在 JDK 9 中引入了 JShell 工具。要实现与此程序相同的效果，你只需要在\
  \ jshell 命令提示符下编写一行代码：\n\njshell> System.out.println(\"Hello, world!\")\n\nHello,\
  \ world!\n\njshell>\n\n第一行是你输入到 jshell 命令提示符的代码；第二行是输出。打印输出后，jshell 提示符返回，你可以输入另一个表达式进行评估。\n\
  \n■ **提示**\n\nJShell 不是一种新语言或新编译器。它是一个工具和一个 API，用于以交互方式访问 Java 编程语言。对于初学者来说，它提供了一种快速探索\
  \ Java 编程语言的方法。对于经验丰富的开发人员来说，它提供了一种无需编译和运行整个程序即可快速查看代码片段结果的方法。它还提供了一种使用增量方法快速开发原型的方法。你添加一段代码，获得即时反馈，然后添加另一段代码，直到你的原型完成。\n\
  \nJDK 9 附带了一个 JShell 命令行工具和 JShell API。该工具支持的所有功能也都被 API 支持。也就是说，你可以使用该工具或通过 API\
  \ 以编程方式运行代码片段。你应该能够根据本讨论的上下文区分这两者。本章的大部分内容致力于解释该工具。在最后，我包含了一个部分，通过一个示例描述了 API。\n\
  \n第 11 章 ■ Java Shell\n\nJShell 架构\n\nJava 编译器本身不识别诸如方法声明或变量声明之类的代码片段。只有类和导入语句可以是顶层结构，它们可以独立存在。其他类型的代码片段必须是类的一部分。JShell\
  \ 允许你执行 Java 代码片段，并允许你逐步改进它们。\n\n当前 JShell 架构的指导原则是利用现有的 Java 语言支持和 JDK 中的其他 Java\
  \ 技术，使其与当前和未来版本的语言保持兼容。随着 Java 语言随着时间的推移而发展，其对 JShell 的支持也将随之发展，而对 JShell 实现几乎不需要或完全不需要修改。图\
  \ 11-2 展示了 JShell 的高级架构。\n\nJLine2\n\nJShell 工具\n\n库\n\nJShell API\n\n字节码\n\nJShell\n\
  \n远程客户端\n\n实现\n\nJava 调试器接口\n\n远程 JVM\n\n编译器 API\n\nJava 编译器\n\n***图 11-2.** JShell\
  \ 架构*\n\n\n\nJShell 工具使用的是 JLine 第二版，这是一个用于处理控制台输入的 Java 库。标准的 JDK 编译器无法解析和编译 Java\
  \ 代码片段。因此，JShell 实现拥有自己的解析器，用于解析代码片段并确定其类型，例如方法声明、变量声明等。一旦确定了代码片段的类型，就会使用以下规则将其包装在一个合成类中：\n\
  \n• 导入语句“原样”使用。也就是说，所有导入语句都“原样”放置在合成类的顶部。\n\n• 变量、方法和类声明成为合成类的静态成员。\n\n• 表达式和语句被包装在合成类中的一个合成方法内。\n\
  \n所有合成类都属于一个名为 `REPL` 的包。代码片段被包装后，包装后的源代码会由标准 Java 编译器使用 Compiler API 进行分析和编译。编译器将字符串格式的包装后源代码作为输入，并将其编译成字节码，字节码存储在内存中。\n\
  \n生成的字节码通过套接字发送到运行 JVM 的远程进程，以便加载和执行。\n\n有时，加载到远程 JVM 中的现有代码片段需要由 JShell 工具替换，它通过使用\
  \ Java 调试器 API 来完成此操作。\n\n第 11 章 ■ Java Shell\n\n启动 JShell 工具\n\nJDK 9 附带了一个 JShell\
  \ 工具，它位于 `JDK_HOME\\bin` 目录中。该工具名为 `jshell`。\n\n如果你在 Windows 上已将 JDK 9 安装在 `C:\\\
  java9` 目录中，你将拥有一个名为 `C:\\java9\\bin\\jshell.exe` 的可执行文件，这就是 JShell 工具。要启动 JShell\
  \ 工具，你需要打开命令提示符并输入 `jshell` 命令：\n\n```\nC:\\Java9Revealed>jshell\n|  Welcome to\
  \ JShell -- Version 9-ea\n|  For an introduction type: /help intro\njshell>\n```\n\
  \n在命令提示符下输入 `jshell` 命令可能会报错：\n\n```\nC:\\Java9Revealed>jshell\n'jshell' 不是内部或外部命令，也不是可运行的程序或批处理文件。\n\
  C:\\Java9Revealed>\n```\n\n此错误表明 `JDK_HOME\\bin` 目录未包含在计算机的 `PATH` 环境变量中。我将 JDK\
  \ 9 安装在 `C:\\java9` 目录中，因此我的 `JDK_HOME` 是 `C:\\java9`。要修复此错误，你可以将 `C:\\java9\\bin`\
  \ 目录包含在 `PATH` 环境变量中，或者使用 `jshell` 命令的完整路径，对我来说就是 `C:\\java9\\bin\\jshell`。以下命令序列展示了如何在\
  \ Windows 上设置 `PATH` 环境变量并运行 JShell 工具：\n\n```\nC:\\Java9Revealed>SET PATH=C:\\\
  java9\\bin;%PATH%\nC:\\Java9Revealed>jshell\n|  Welcome to JShell -- Version 9-ea\n\
  |  For an introduction type: /help intro\njshell>\n```\n\n以下命令展示了如何使用 `jshell` 命令的完整路径来启动该工具：\n\
  ```\nC:\\Java9Revealed>C:\\java9\\bin\\jshell\n|  Welcome to JShell -- Version 9-ea\n\
  |  For an introduction type: /help intro\njshell>\n```\n\n当 `jshell` 成功启动时，它会打印一条欢迎消息及其版本信息。它还会打印命令\
  \ `/help intro`。你可以使用此命令打印该工具的简短介绍：\n\n```\njshell> /help intro\n|\n|  intro\n|\n\
  |  jshell 工具允许你执行 Java 代码，并立即获得结果。\n第 11 章 ■ Java Shell\n|  你可以输入一个 Java 定义（变量、方法、类等），例如：int\
  \ x = 8\n|  或者一个 Java 表达式，例如：x + x\n|  或者一个 Java 语句或导入。\n|  这些小的 Java 代码块被称为“代码片段”。\n\
  |\n|  还有一些 jshell 命令可以帮助你理解和控制你所做的事情，例如：/list\n|\n|  要获取命令列表：/help\njshell>\n```\n\
  \n如果你需要该工具的帮助，可以在 `jshell` 中输入命令 `/help` 来打印命令列表及其简短描述：\n\n```\njshell> /help\n\
  <<此处未显示输出。>>\njshell>\n```\n\n你可以将多个命令行选项与 `jshell` 命令一起使用，以向该工具本身传递值。例如，你可以向用于解析和编译代码片段的编译器以及远程\
  \ JVM 传递值。\n\n\n\n用于执行/评估代码片段。运行带有 `--help` 选项的 jshell 程序，可以查看所有可用的标准选项列表。运行带有 `--help-extra`\
  \ 或 `-X` 选项的程序，可以查看所有可用的非标准选项列表。\n\n例如，使用这些选项，你可以为 JShell 工具设置类路径和模块路径。我将在本章后面解释这些选项。\n\
  \n你还可以使用命令行 `--start` 选项自定义 jshell 工具的启动脚本。\n\n你可以将 `DEFAULT` 和 `PRINTING` 作为此选项的参数。`DEFAULT`\
  \ 参数会以包含多个 import 语句的方式启动 jshell，这样你在使用 jshell 时就不需要导入常用类了。以下两种命令启动 jshell 的方式相同：\n\
  \n• `jshell`\n\n• `jshell --start DEFAULT`\n\n你可以使用 `System.out.println()` 方法将消息打印到标准输出。你可以使用\
  \ `--start` 选项并带上 `PRINTING` 参数来启动 jshell，这将包含 `System.out.print()`、`System.out.println()`\
  \ 和 `System.out.printf()` 方法的所有版本，并将它们作为顶层的 `print()`、`println()` 和 `printf()` 方法。这将允许你在\
  \ jshell 中使用 `print()`、`println()` 和 `printf()` 方法，而无需使用它们更长的版本 `System.out.print()`、`System.out.println()`\
  \ 和 `System.out.printf()`。\n\n```\nC:\\Java9Revealed>jshell --start PRINTING\n|\
  \  Welcome to JShell -- Version 9-ea\n|  For an introduction type: /help intro\n\
  \njshell> println(\"hello\")\nhello\n\njshell>\n```\n\n第 11 章 ■ Java Shell\n\n你可以在启动\
  \ jshell 时重复使用 `--start` 选项，以包含默认的 import 语句和打印方法：\n\n```\nC:\\Java9Revealed>jshell\
  \ --start DEFAULT --start PRINTING\n|  Welcome to JShell -- Version 9-ea\n|  For\
  \ an introduction type: /help intro\n\njshell>\n```\n\n**退出 JShell 工具**\n\n要退出 jshell，请在\
  \ jshell 提示符下输入 `/exit` 并按 Enter 键。该命令会打印一条告别消息，退出工具，并将你返回到命令提示符：\n\n```\nC:\\Java9Revealed>jshell\n\
  |  Welcome to JShell -- Version 9-ea\n|  For an introduction type: /help intro\n\
  \njshell> /exit\n|  Goodbye\n\nC:\\Java9Revealed>\n```\n\nJShell 工具在很多方面都很宽容。如果你在\
  \ Java 构造中使用了不支持的*关键字*，它会直接忽略它。你可以使用部分命令。如果你输入的部分命令可以自动补全为唯一的命令名称，那么该工具会像你输入了完整命令一样工作。例如，`/edit`\
  \ 和 `/exit` 是两个以 `/e` 开头的命令。如果你输入 `/ex` 而不是 `/exit`，jshell 会将其解释为 `/exit` 命令。\n\n\
  ```\njshell> /ex\n|  Goodbye\n\nC:\\Java9Revealed>\n```\n\n如果你输入 `/e`，你会收到一个错误，因为有两个可能的命令以\
  \ `/e` 开头：\n\n```\njshell> /e\n|  Command: '/e' is ambiguous: /edit, /exit\n|  Type\
  \ /help for help.\n\njshell>\n```\n\n**什么是代码片段和命令？**\n\n你可以使用 JShell 工具来：\n\n• 评估\
  \ Java 代码片段，在 JShell 术语中简称为*代码片段*。\n• 执行命令，用于查询 JShell 状态和设置 JShell 环境。\n\n第 11\
  \ 章 ■ Java Shell\n\n为了区分命令和代码片段，所有命令都以斜杠（`/`）开头。你在前面的章节中已经看到过一些，例如 `/exit` 和 `/help`。命令用于与工具本身交互，例如自定义其输出、打印帮助信息、退出工具以及打印命令和代码片段的历史记录。我将在后面解释更多命令。如果你有兴趣了解所有可用的命令，请使用\
  \ `/help` 命令。\n\n使用 JShell 工具，你可以一次编写一段 Java 代码片段并进行评估。这些代码片段被称为*代码片段*。代码片段必须遵循\
  \ Java 语言规范中指定的语法。\n\n代码片段可以是：\n\n• 导入声明\n• 类声明\n• 接口声明\n• 方法声明\n• 字段声明\n• 语句\n\
  • 表达式\n\n■ **提示** 你可以在 JShell 中使用所有 Java 语言构造，但包声明除外。JShell 中的所有代码片段都发生在一个名为 `REPL`\
  \ 的内部包和一个内部合成类中。\n\nJShell 工具知道你在何时完成了一个代码片段的输入。当你按下 Enter 键时，如果代码片段是完整的，该工具将执行它；否则，它会将你带到下一行并等待你完成代码片段。如果一行以\
  \ `...>` 开头，则表示代码片段不完整，你需要输入更多文本来完成它。用于更多输入的默认提示符 `...>` 是可以自定义的。以下是一些示例：\n\n```\n\
  C:\\Java9Revealed>jshell\n|  Welcome to JShell -- Version 9-ea\n|  For an introduction\
  \ type: /help intro\n\njshell> 2 + 2\n$1 ==> 4\n\njshell> 2 +\n   ...> 2\n$2 ==>\
  \ 4\n\njshell> 2\n$3 ==> 2\n\njshell>\n```\n\n当你输入 `2 + 2` 并按 Enter 键时，jshell 将其视为一个完整的代码片段（一个表达式）。它会评估该表达式并打印反馈，表明该表达式被评估为\
  \ 4，并且结果被赋值给一个名为 `$1` 的变量。名为 `$1` 的变量是由 JShell 工具自动生成的。我将在后面更详细地解释由工具生成的变量。当你输入\
  \ `2 +` 并按 Enter 键时，jshell 会提示你输入更多内容，因为 `2 +` 在 Java 中不是一个完整的代码片段。当你在第二行输入 `2`\
  \ 时，代码片段就完整了；jshell 会评估该代码片段并打印反馈。当你输入 `2` 并按 Enter 键时，jshell 会评估该代码片段，因为 `2` 本身就是一个完整的表达式。\n\
  \n第 11 章 ■ Java Shell\n\n**评估表达式**\n\n你可以在 jshell 中执行任何有效的 Java 表达式。以下示例评估了两个分别进行数字加法和乘法的表达式：\n\
  \n```\njshell> 2 + 2\n$1 ==> 4\n\njshell> 9.0 * 6\n$2 ==> 54.0\n```\n\n当你评估一个表达式时，如果该表达式评估出一个值，jshell\
  \ 会打印反馈。在这些例子中，`2 + 2` 评估为 4，`9.0 * 6` 评估为 54.0。表达式的值被赋值给一个变量。反馈中包含变量名和表达式的值。在第一个例子中，反馈\
  \ `$1 ==> 4` 意味着表达式 `2 + 2` 评估为 4，并且结果被赋值给一个名为 `$1` 的变量。类似地，表达式 `9.0 * 6` 被评估为 54.0，并且该值被赋值给一个名为\
  \ `$2` 的变量。你可以在其他表达式中使用这些变量名。你可以通过简单地输入它们的名称来打印它们的值：\n\n```\njshell> $1\n$1 ==>\
  \ 4\n\njshell> $2\n$2 ==> 54.0\n\njshell> System.out.println($1)\n4\n\njshell> System.out.println($2)\n\
  54.0\n```\n\n■ **提示** 在 jshell 中，你不需要像在 Java 程序中那样用分号结束语句。该工具会为你插入缺失的分号。\n\n在 Java\
  \ 中，每个变量都有一个数据类型。在这些例子中，名为 `$1` 和 `$2` 的变量的数据类型是什么？在 Java 中，`2 + 2` 评估为 `int` 类型，`9.0\
  \ * 6` 评估为 `double` 类型。因此，`$1` 和 `$2` 变量的数据类型应该分别是 `int` 和 `double`。如何验证这一点？我们先采用一种笨办法。你可以将\
  \ `$1` 和 `$2` 转换为 `Object` 并调用它们的 `getClass()` 方法，这应该会得到 `Integer` 和 `Double`。请注意，当你将它们转换为\
  \ `Object` 时，`int` 和 `double` 类型的原始值在这些例子中被装箱为 `Integer` 和 `Double` 引用类型：\n\n```\n\
  jshell> 2 + 2\n$1 ==> 4\n\njshell> 9.0 * 6\n$2 ==> 54.0\n```\n\n第 11 章 ■ Java Shell\n\
  \n```\njshell> ((Object)$1).getClass()\n$3 ==> class java.lang.Integer\n\njshell>\
  \ ((Object)$2).getClass()\n$4 ==> class java.lang.Double\n\njshell>\n```\n\n有一种更简单的方法来确定\
  \ jshell 创建的变量的数据类型——你只需告诉 jshell 给你详细的反馈，它就会打印它创建的变量的数据类型以及更多信息！以下命令将反馈模式设置为 verbose（详细）并评估相同的表达式：\n\
  \n```\njshell> /set feedback verbose\n|  Feedback mode: verbose\n\njshell> 2 + 2\n\
  $1 ==> 4\n|  created scratch variable $1 : int\n\njshell> 9.0 * 6\n$2 ==> 54.0\n\
  |  created scratch variable $2 : double\n\njshell>\n```\n\n\n\n请注意，jshell 将名为 `$1`\
  \ 和 `$2` 的变量数据类型分别打印为 `int` 和 `double`。对于初学者来说，使用 `-retain` 选项执行以下命令会很有帮助，这样详细反馈模式就能在\
  \ jshell 会话之间*持久*生效：\n\njshell> /set feedback -retain verbose\n\n你也可以使用 `/vars`\
  \ 命令列出 jshell 中定义的所有变量：\n\njshell> /vars\n\n| int $1 = 4\n\n| double $2 = 54.0\n\
  \njshell>\n\n如果你想再次使用普通反馈模式，请使用以下命令：\n\njshell> /set feedback -retain normal\n\n\
  | Feedback mode: normal\n\nJshell>\n\n第 11 章 ■ Java Shell\n\n你不仅限于计算像 `2 + 2` 这样的简单表达式。你可以计算任何\
  \ Java 表达式。下面的示例计算了字符串拼接表达式，并使用了 `String` 类的方法。它还向你展示了如何使用 `for` 循环：\n\njshell>\
  \ \"Hello \" + \"world! \" + 2016\n\n$1 ==> \"Hello world! 2016\"\n\njshell> $1.length()\n\
  \n$2 ==> 17\n\njshell> $1.toUpperCase()\n\n$3 ==> \"HELLO WORLD! 2016\"\n\njshell>\
  \ $1.split(\" \")\n\n$4 ==> String[3] { \"Hello\", \"world!\", \"2016\" }\n\njshell>\
  \ for(String s : $4) {\n\n...> System.out.println(s);\n\n...> }\n\nHello\n\nworld!\n\
  \njshell>\n\n列出代码片段\n\n你在 jshell 中输入的任何内容最终都会成为某个代码片段的一部分。每个代码片段都会被分配一个唯一的代码片段 ID，你可以稍后使用它来引用该代码片段，例如，用于删除该代码片段。`/list`\
  \ 命令会列出所有代码片段。它有以下几种形式：\n\n• /list\n\n• /list -all\n\n• /list -start\n\n• /list\
  \ <snippet-name>\n\n• /list <snippet-id>\n\n不带参数/选项的 `/list` 命令会打印所有用户输入的、处于活动状态的代码片段，这些代码片段也可能是通过\
  \ `/open` 命令从文件中打开的。\n\n使用 `-all` 选项可以列出所有代码片段——包括活动的、非活动的、错误的以及启动时的代码片段。\n\n使用\
  \ `-start` 选项可以仅列出启动时的代码片段。启动时的代码片段会被缓存，`-start` 选项会打印这些缓存的代码片段。即使你在当前会话中删除了它们，它也会打印启动时的代码片段。\n\
  \n某些类型的代码片段有名称（例如，变量/方法声明），并且所有代码片段都有一个 ID。\n\n将代码片段的名称或 ID 与 `/list` 命令一起使用，可以打印由该名称或\
  \ ID 标识的代码片段。\n\n第 11 章 ■ Java Shell\n\n`/list` 命令会以下列格式打印代码片段列表：\n\n<snippet-id>\
  \ : <snippet-source-code>\n\n<snippet-id> : <snippet-source-code>\n\n<snippet-id>\
  \ : <snippet-source-code>\n\n...\n\nJShell 工具会生成唯一的代码片段 ID。对于启动时的代码片段，它们是 `s1`、`s2`、`s3`...；对于有效的代码片段，它们是\
  \ `1`、`2`、`3`...，以此类推；对于错误的代码片段，它们是 `e1`、`e2`、`e3`...。下面的 jshell 会话向你展示了如何使用 `/list`\
  \ 命令列出代码片段。这些示例使用了 `/drop` 命令，通过代码片段名称以及代码片段 ID 来删除代码片段。\n\nC:\\Java9Revealed>jshell\n\
  \n| Welcome to JShell -- Version 9-ea\n\n| For an introduction type: /help intro\n\
  \njshell> /list\n\njshell> 2 + 2\n\n$1 ==> 4\n\njshell> /list\n\n1 : 2 + 2\n\njshell>\
  \ int x = 100\n\nx ==> 100\n\njshell> /list\n\n1 : 2 + 2\n\n2 : int x = 100;\n\n\
  jshell> /list -all\n\ns1 : import java.io.*;\n\ns2 : import java.math.*;\n\ns3 :\
  \ import java.net.*;\n\ns4 : import java.nio.file.*;\n\ns5 : import java.util.*;\n\
  \ns6 : import java.util.concurrent.*;\n\ns7 : import java.util.function.*;\n\ns8\
  \ : import java.util.prefs.*;\n\ns9 : import java.util.regex.*;\n\ns10 : import\
  \ java.util.stream.*;\n\n1 : 2 + 2\n\n2 : int x = 100;\n\n第 11 章 ■ Java Shell\n\n\
  jshell> /list -start\n\ns1 : import java.io.*;\n\ns2 : import java.math.*;\n\ns3\
  \ : import java.net.*;\n\ns4 : import java.nio.file.*;\n\ns5 : import java.util.*;\n\
  \ns6 : import java.util.concurrent.*;\n\ns7 : import java.util.function.*;\n\ns8\
  \ : import java.util.prefs.*;\n\ns9 : import java.util.regex.*;\n\ns10 : import\
  \ java.util.stream.*;\n\njshell> string str = \"using invalid type string\"\n\n\
  | Error:\n\n| cannot find symbol\n\n| symbol: class string\n\n| string str = \"\
  using invalid type string\";\n\n| ^----^\n\njshell> /list\n\n1 : 2 + 2\n\n2 : int\
  \ x = 100;\n\njshell> /list -all\n\ns1 : import java.io.*;\n\ns2 : import java.math.*;\n\
  \ns3 : import java.net.*;\n\ns4 : import java.nio.file.*;\n\ns5 : import java.util.*;\n\
  \ns6 : import java.util.concurrent.*;\n\ns7 : import java.util.function.*;\n\n\n\
  \ns8 : import java.util.prefs.*;\n\ns9 : import java.util.regex.*;\n\ns10 : import\
  \ java.util.stream.*;\n\n1 : 2 + 2\n\n2 : int x = 100;\n\ne1 : string str = \"using\
  \ invalid type string\";\n\njshell> /drop 1\n\n| 已删除变量 $1\n\njshell> /list\n\n2\
  \ : int x = 100;\n\n第 11 章 ■ Java Shell\n\njshell> /drop x\n\n| 已删除变量 x\n\njshell>\
  \ /list\n\njshell> /list -all\n\ns1 : import java.io.*;\n\ns2 : import java.math.*;\n\
  \ns3 : import java.net.*;\n\ns4 : import java.nio.file.*;\n\ns5 : import java.util.*;\n\
  \ns6 : import java.util.concurrent.*;\n\ns7 : import java.util.function.*;\n\ns8\
  \ : import java.util.prefs.*;\n\ns9 : import java.util.regex.*;\n\ns10 : import\
  \ java.util.stream.*;\n\n1 : 2 + 2\n\n2 : int x = 100;\n\ne1 : string str = \"using\
  \ invalid type string\";\n\njshell>\n\n变量、方法和类的名称即为片段名称。请注意，Java 允许变量、方法和类使用相同的名称，因为它们各自位于独立的命名空间中。你可以使用这些实体的名称，通过\
  \ `/list` 命令列出它们：\n\nC:\\Java9Revealed>jshell\n\n| 欢迎使用 JShell -- 版本 9-ea\n\n| 如需介绍，请输入：/help\
  \ intro\n\njshell> /list x\n\n| 不存在该片段：x\n\njshell> int x = 100\n\nx ==> 100\n\n\
  jshell> /list x\n\n1 : int x = 100;\n\njshell> void x(){}\n\n| 已创建方法 x()\n\njshell>\
  \ /list x\n\n1 : int x = 100;\n\n2 : void x(){}\n\n第 11 章 ■ Java Shell\n\njshell>\
  \ void x(int n) {}\n\n| 已创建方法 x(int)\n\njshell> /list x\n\n1 : int x = 100;\n\n\
  2 : void x(){}\n\n3 : void x(int n) {}\n\njshell> class x{}\n\n| 已创建类 x\n\njshell>\
  \ /list x\n\n1 : int x = 100;\n\n2 : void x(){}\n\n3 : void x(int n) {}\n\n4 : class\
  \ x{}\n\njshell>\n\n编辑片段\n\nJShell 工具提供了多种编辑片段和命令的方式。在 jshell 中输入片段和命令时，你可以使用表 11-1\
  \ 中列出的导航键在命令行中导航。你可以使用表 11-2 中列出的键来编辑在 jshell 中输入的某行文本。\n\n***表 11-1.** 在 JShell\
  \ 工具中编辑时的导航键列表*\n\n**键**\n\n**描述**\n\n回车\n\n输入当前行\n\n左箭头\n\n向后移动一个字符\n\n右箭头\n\n\
  向前移动一个字符\n\nCtrl-A\n\n移动到行首\n\nCtrl-E\n\n移动到行尾\n\nMeta-B（或 Alt-B）\n\n向后移动一个单词\n\n\
  Meta-F（或 Alt-F）\n\n向前移动一个单词\n\n![](img/index-281_1.jpg)\n\n第 11 章 ■ Java Shell\n\
  \n***表 11-2.** 在 JShell 工具中修改文本的键列表*\n\n**键**\n\n**描述**\n\n删除\n\n删除光标下的字符\n\n退格键\n\
  \n删除光标前的字符\n\nCtrl-K\n\n删除从光标到行尾的文本\n\nMeta-D（或 Alt-D）\n\n删除从光标到词尾的文本\n\nCtrl-W\n\
  \n删除从光标到前一个空白字符的文本\n\nCtrl-Y\n\n将最近删除的文本粘贴（或拉回）到行中\n\nMeta-Y（或 Alt-Y）\n\n在 Ctrl-Y\
  \ 之后，此组合键循环浏览之前删除的文本\n\n尽管你可以使用丰富的编辑键组合，但在 JShell 工具中编辑多行片段仍然很困难。工具设计者意识到了这个问题，并提供了一个内置的片段编辑器。你可以配置\
  \ JShell 工具，使用你选择的平台特定片段编辑器。有关如何设置自己的编辑器的更多信息，请参阅“设置片段编辑器”一节。\n\n你需要使用 `/edit` 命令来开始编辑片段。该命令有三种形式：\n\
  \n• `/edit <片段名称>`\n\n• `/edit <片段 ID>`\n\n• `/edit`\n\n你可以使用片段名称或片段 ID 来编辑特定的片段。不带参数的\
  \ `/edit` 命令会在编辑器中打开所有活动片段进行编辑。默认情况下，`/edit` 命令会打开一个名为 JShell Edit Pad 的内置编辑器，如图\
  \ 11-3 所示。\n\n***图 11-3.** 名为 JShell Edit Pad 的内置 JShell 编辑器*\n\n![](img/index-282_1.jpg)\n\
  \n第 11 章 ■ Java Shell\n\n\n\nJShell 编辑板是用 Swing 编写的，它显示一个包含 `JTextArea` 和三个 `JButtons`\
  \ 的 `JFrame`。如果你编辑代码片段，请确保在退出窗口前点击“接受”按钮，以使编辑生效。如果你取消或退出编辑器而未接受更改，你的编辑内容将会丢失。\n\n\
  如果你知道变量、方法或类的名称，你可以通过其名称进行编辑。以下 jshell 会话创建了一个变量、多个方法以及一个同名为 x 的类，并使用 `/edit x`\
  \ 命令一次性编辑它们：\n\nC:\\Java9Revealed>jshell\n\n| 欢迎使用 JShell —— 版本 9-ea\n\n| 如需介绍，请输入：/help\
  \ intro\n\njshell> int x = 100\n\nx ==> 100\n\njshell> void x(){}\n\n| 已创建方法 x()\n\
  \njshell> void x (int n) {}\n\n| 已创建方法 x(int)\n\njshell> class x{}\n\n| 已创建类 x\n\
  \njshell> 2 + 2\n\n$5 ==> 4\n\njshell> /edit x\n\n`/edit x` 命令会在 JShell 编辑板中打开所有名称为\
  \ x 的代码片段，如图 11-4 所示。\n\n你可以编辑这些代码片段，接受更改，然后退出编辑，以继续 jshell 会话。\n\n***图 11-4.**\
  \ 按名称编辑代码片段*\n\n第 11 章 ■ Java Shell\n\n重新运行之前的代码片段\n\n在像 jshell 这样的命令行工具中，你经常需要重新运行之前的代码片段。你可以使用上/下箭头键浏览代码片段/命令历史，然后在找到之前的代码片段/命令时按回车键。你也可以使用以下三个命令之一来重新运行之前的代码片段（而非命令）：\n\
  \n• `/!`\n\n• `/<snippet-id>`\n\n• `/-<n>`\n\n`/!` 命令重新运行最后一个代码片段。`/<snippet-id>`\
  \ 命令重新运行由 `<snippet-id>` 标识的代码片段。`/-<n>` 命令重新运行倒数第 n 个代码片段。例如，`/-1` 重新运行最后一个代码片段，`/-2`\
  \ 重新运行倒数第二个代码片段，以此类推。`/!` 和 `/-1` 命令效果相同——它们都重新运行最后一个代码片段。\n\n声明变量\n\n你可以像在 Java\
  \ 程序中一样在 jshell 中声明变量。变量声明可以出现在顶层、方法内部或作为类中的字段声明。顶层变量声明中不允许使用 `static` 和 `final`\
  \ 修饰符。如果使用它们，将会被忽略并给出警告。`static` 修饰符指定类上下文，而 `final` 修饰符限制你更改变量的值。\n\n不允许使用这些修饰符，因为该工具允许你声明独立的变量，以便你随时间变化更改其值进行实验。以下示例展示了如何声明变量：\n\
  \nc:\\Java9Revealed>jshell\n\n| 欢迎使用 JShell —— 版本 9-ea\n\n| 如需介绍，请输入：/help intro\n\
  \njshell> int x\n\nx ==> 0\n\njshell> int y = 90\n\ny ==> 90\n\njshell> side = 90\n\
  \n| 错误：\n\n| 找不到符号\n\n| 符号：变量 side\n\n| side = 90\n\n| ^--^\n\n第 11 章 ■ Java Shell\n\
  \njshell> static double radius = 2.67\n\n| 警告：\n\n| 顶层声明中不允许使用修饰符 'static'，已忽略\n\
  \n| static double radius = 2.67;\n\n| ^----^\n\nradius ==> 2.67\n\njshell> String\
  \ str = new String(\"Hello\")\n\nstr ==> \"Hello\"\n\njshell>\n\n在顶层表达式中使用未声明的变量会产生错误。请注意上一个示例中使用了名为\
  \ side 的未声明变量，这产生了错误。稍后我会向你展示，你可以在方法体内使用未声明的变量。\n\n还可以更改变量的数据类型。你可以声明一个名为 x 的 int\
  \ 类型变量，稍后将其重新声明为 double 或 String 类型。以下示例展示了这一特性：\n\njshell> int x = 10;\n\nx ==>\
  \ 10\n\njshell> int y = x + 2;\n\ny ==> 12\n\njshell> double x = 2.71\n\nx ==> 2.71\n\
  \njshell> y\n\ny ==> 12\n\njshell> String x = \"Hello\"\n\nx ==> \"Hello\"\n\njshell>\
  \ y\n\ny ==> 12\n\njshell>\n\n请注意，当 x 的数据类型或值发生变化时，名为 y 的变量的值并未改变或重新计算。\n\n你也可以使用\
  \ `/drop` 命令删除变量，该命令将变量名作为参数。\n\n以下命令将删除名为 x 的变量：\n\njshell> /drop x\n\n第 11 章 ■\
  \ Java Shell\n\n\n\n你可以使用 `/vars` 命令列出 jshell 中的所有变量。该命令会列出用户声明的变量，以及 jshell 在评估有返回值的表达式时自动声明的变量。该命令有以下几种形式：\n\
  \n• `/vars`\n\n• `/vars <变量名>`\n\n• `/vars <变量片段 ID>`\n\n• `/vars -start`\n\n• `/vars\
  \ -all`\n\n不带参数的命令会列出当前会话中的所有活动变量。如果使用片段名称或 ID，则会列出该片段名称或 ID 对应的变量声明。如果使用 `-start`\
  \ 选项，则会列出所有添加到启动脚本中的变量。如果使用 `-all` 选项，则会列出所有变量，包括失败的、被覆盖的、被丢弃的和启动脚本中的变量。以下示例展示了如何使用\
  \ `/vars` 命令：\n\n```\nc:\\Java9Revealed>jshell\n| 欢迎使用 JShell -- 版本 9-ea\n| 输入 /help\
  \ intro 获取介绍\njshell> /vars\njshell> 2 + 2\n$1 ==> 4\njshell> /vars\n| int $1 =\
  \ 4\njshell> int x = 20;\nx ==> 20\njshell> /vars\n| int $1 = 4\n| int x = 20\n\
  jshell> String str = \"Hello\";\nstr ==> \"Hello\"\njshell> /vars\n| int $1 = 4\n\
  | int x = 20\n| String str = \"Hello\"\njshell> double x = 90.99;\nx ==> 90.99\n\
  第 11 章 ■ Java Shell\njshell> /vars\n| int $1 = 4\n| String str = \"Hello\"\n| double\
  \ x = 90.99\njshell> /drop x\n| 已丢弃变量 x\njshell> /vars\n| int $1 = 4\n| String str\
  \ = \"Hello\"\njshell>\n```\n\n**导入语句**\n\n你可以在 jshell 中使用导入语句。回想一下，在 Java 程序中，`java.lang`\
  \ 包中的所有类型都是默认导入的。要使用其他包中的类型，你需要在编译单元中添加相应的导入语句。我们先从一个例子开始。我将尝试创建三个对象：一个 `String`、一个\
  \ `List<Integer>` 和一个 `ZonedDateTime`。请注意，`String` 类位于 `java.lang` 包中；`List` 和 `Integer`\
  \ 类分别位于 `java.util` 和 `java.lang` 包中；而 `ZonedDateTime` 类位于 `java.time` 包中。\n\n```\n\
  jshell> String str = new String(\"Hello\")\nstr ==> \"Hello\"\njshell> List<Integer>\
  \ nums = List.of(1, 2, 3, 4, 5)\nnums ==> [1, 2, 3, 4, 5]\njshell> ZonedDateTime\
  \ now = ZonedDateTime.now()\n| 错误：\n| 找不到符号\n|   符号：   类 ZonedDateTime\n| ZonedDateTime\
  \ now = ZonedDateTime.now();\n| ^-----------^\n| 错误：\n| 找不到符号\n|   符号：   变量 ZonedDateTime\n\
  | ZonedDateTime now = ZonedDateTime.now();\n| ^-----------^\njshell>\n```\n\n如果你尝试使用\
  \ `java.time` 包中的 `ZonedDateTime` 类，示例会产生错误。\n\n我们原本预期在尝试创建 `List` 时也会出现类似的错误，因为它位于\
  \ `java.util` 包中，而该包在 Java 程序中默认不会被导入。\n\n第 11 章 ■ Java Shell\n\nJShell 工具的唯一目的是让开发者在评估代码片段时更轻松。为了实现这一目标，该工具默认会从几个包中导入所有类型。这些默认导入类型的包是哪些呢？你可以使用\
  \ `/imports` 命令打印 jshell 中所有活动导入的列表：\n\n```\njshell> /imports\n| import java.io.*\n\
  | import java.math.*\n| import java.net.*\n| import java.nio.file.*\n| import java.util.*\n\
  | import java.util.concurrent.*\n| import java.util.function.*\n| import java.util.prefs.*\n\
  | import java.util.regex.*\n| import java.util.stream.*\njshell>\n```\n\n注意，默认导入语句中包含了从\
  \ `java.util` 包导入所有类型的语句。这就是你可以直接创建列表而无需导入的原因。你也可以向 jshell 添加自己的导入。以下示例展示了如何导入 `ZonedDateTime`\
  \ 类并使用它。当 jshell 打印当前日期和时区时，你会得到不同的输出。\n\n```\njshell> /imports\n| import java.util.*\n\
  | import java.io.*\n| import java.math.*\n| import java.net.*\n| import java.util.concurrent.*\n\
  | import java.util.prefs.*\n| import java.util.regex.*\njshell> import java.time.*\n\
  jshell> /imports\n| import java.io.*\n| import java.math.*\n| import java.net.*\n\
  | import java.nio.file.*\n| import java.util.*\n| import java.util.concurrent.*\n\
  | import java.util.function.*\n| import java.util.prefs.*\n| import java.util.regex.*\n\
  ```\n\n\n\n| import java.util.stream.*\n\n**| import java.time.***\n\njshell> ZonedDateTime\
  \ now = ZonedDateTime.now()\n\nnow ==> 2016-11-11T10:39:10.497234400-06:00[America/Chicago]\n\
  \njshell>\n\n第 11 章 ■ Java Shell\n\n请注意，您在 jshell 会话中添加的任何导入，在退出会话时都会丢失。您也可以删除导入语句——包括启动导入和您添加的导入。您需要知道片段\
  \ ID 才能删除片段。启动片段的 ID 为 s1、s2、s3 等，用户定义片段的 ID 为 1、2、3 等。\n\n以下示例展示了如何在 jshell 中添加和删除导入语句：\n\
