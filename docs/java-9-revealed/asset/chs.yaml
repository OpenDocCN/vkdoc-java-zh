  \ 方法会将持续时间分解为各部分（如同 `toDaysPart()` 方法所做的那样），并返回小时部分，即 3。以下代码片段向你展示了一些示例：\n\nSystem.out.println(\"\
  toDays(): \" + compTime.toDays());\n\nSystem.out.println(\"toDaysPart(): \" + compTime.toDaysPart());\n\
