  \ 470)(deflated 42%)\n\n假设你想为 JDK 8、9 和 10 版本创建一个 MRJAR。以下命令将完成此任务，假设 `com.jdojo.mrjar.jdk10\\\
  build\\classes` 目录包含特定于 JDK 10 的类：\n\nC:\\Java9Revealed>jar --create --file mrjars\\\
  com.jdojo.mrjar.jar\n\n-C com.jdojo.mrjar.jdk8\\build\\classes .\n\n--release 9\
  \ -C com.jdojo.mrjar.jdk9\\build\\classes .\n\n--release 10 -C com.jdojo.mrjar.jdk10\\\
  build\\classes .\n\n第 6 章 ■ 打包模块\n\n你可以使用 `--list` 选项验证 MRJAR 中的条目，如下所示：\n\nC:\\\
