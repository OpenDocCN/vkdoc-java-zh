  \ 类。你也可以使用以下命令运行它：\n\n```\nC:\\Java9Revealed>java\n--module-path com.jdojo.reflect\\\
  dist;com.jdojo.reflect.test\\dist\n--add-modules com.jdojo.reflect\n--module com.jdojo.reflect.test/com.jdojo.reflect.test.ReflectTest\n\
  ```\n\n访问 s 时出错：无法使字段 `private static int com.jdojo.reflect.Item.s` 可访问：模块 `com.jdojo.reflect`\
  \ 未向模块 `com.jdojo.reflect.test` 开放 `com.jdojo.reflect`。\n\n访问 t 时出错：无法使字段 `static\
  \ int com.jdojo.reflect.Item.t` 可访问：模块 `com.jdojo.reflect` 未向模块 `com.jdojo.reflect.test`\
  \ 开放 `com.jdojo.reflect`。\n\n访问 u 时出错：无法使字段 `protected static int com.jdojo.reflect.Item.u`\
