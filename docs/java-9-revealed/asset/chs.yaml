  ```\n\n第 8 章 ■ JDK 9 中的重大变更\n\n该 Class 对象将仅在 `com.jdojo.resource.test` 模块中定位资源，这在输出中显而易见。在代码中，我在资源名称前添加了斜杠，因为\
