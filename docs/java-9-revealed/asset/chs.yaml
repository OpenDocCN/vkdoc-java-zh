  **open** module com.jdojo.reflect {\n\n// 无模块语句\n\n}\n\n第 4 章 ■ 模块依赖\n\n重新编译模块，并在\
  \ NetBeans 中使用以下命令重新运行 `ReflectTest` 类：\n\nC:\\Java9Revealed>java\n\n--module-path\
  \ com.jdojo.reflect\\dist;com.jdojo.reflect.test\\dist\n\n--add-modules com.jdojo.reflect\n\
  \n--module com.jdojo.reflect.test/com.jdojo.reflect.test.ReflectTest\n\ns = 10\n\
  \nt = 20\n\nu = 30\n\nv = 40\n\n输出显示，你能够从 `com.jdojo.reflect.test` 模块访问 `Item` 类的所有字段——包括公共和非公共字段。你也可以通过打开\
  \ `com.jdojo.reflect` 包而不是打开整个模块来获得相同的结果。清单 4-16 所示的 `com.jdojo.reflect` 模块声明的修改版本实现了这一点。按照上一步的方式重新编译模块并重新运行\
  \ `ReflectTest` 类，你将获得相同的结果。\n\n***清单 4-16.*** 打开 `com.jdojo.reflect` 包以支持深度反射的\
  \ `com.jdojo.reflect` 模块修改版本\n\n// module-info.java\n\nmodule com.jdojo.reflect\
  \ {\n\n**opens** com.jdojo.reflect;\n\n}\n\n这个示例即将结束！有几点需要注意：\n\n\n\n• 开放模块或包含开放包的模块允许其他模块访问其所有类型的成员以进行深度反射，而其他模块无需声明对该模块的依赖。在此示例中，`com.jdojo.reflect.test`\
  \ 模块能够访问 `Item` 类及其成员，而无需声明对 `com.jdojo.reflect` 模块的依赖。此规则的存在是为了确保诸如 Hibernate 和\
  \ Spring 等使用深度反射的框架无需声明对应用程序模块的依赖即可访问它们。\n\n• 如果你希望在编译时访问某个包的公共 API，并在运行时通过深度反射访问同一个包，你可以同时导出和开放该包。在此示例中，我们可以在\
  \ `com.jdojo.reflect` 模块中导出并开放 `com.jdojo.reflect` 包。\n\n• 如果一个模块是开放的或它开放了某些包，你仍然可以声明对它们的依赖，但并非必须。此规则有助于向\
  \ JDK 9 迁移。如果你的模块对其他已知模块使用了深度反射，你的模块应声明对这些模块的依赖，以获得可靠配置的好处。\n\n让我们来看看这些模块的最终版本。清单\
  \ 4-17 和清单 4-18 包含了这些模块声明的修改版本。\n\n![](img/index-105_1.jpg)\n\n第 4 章 ■ 模块依赖\n\n\
  ***清单 4-17.*** 导出并开放 `com.jdojo.reflect` 包的 `com.jdojo.reflect` 模块的修改版本\n\n// module-info.java\n\
  \nmodule com.jdojo.reflect {\n\nexports com.jdojo.reflect;\n\nopens com.jdojo.reflect;\n\
  \n}\n\n***清单 4-18.*** 读取 `com.jdojo.reflect` 模块的 `com.jdojo.reflect.test` 模块的修改版本\n\
  \n// module-info.java\n\nmodule com.jdojo.reflect.test {\n\nrequires com.jdojo.reflect;\n\
  \n}\n\n现在，当你运行 `ReflectTest` 类时，不再需要使用 `--add-modules` VM 选项。由于 `com.jdojo.reflect.test`\
  \ 模块的模块声明中包含 `requires com.jdojo.reflect;` 语句，`com.jdojo.reflect` 模块将被解析。图 4-13\
  \ 显示了运行 `ReflectTest` 类时创建的模块图。\n\n***图 4-13.** `com.jdojo.reflect` 和 `com.jdojo.reflect.test`\
  \ 模块最终版本的模块图*\n\n在 NetBeans 中重建两个项目，并在 NetBeans 中使用以下命令运行 `ReflectTest` 类。输出与之前的输出相同。\n\
  \nC:\\Java9Revealed>java\n\n--module-path com.jdojo.reflect\\dist;com.jdojo.reflect.test\\\
  dist\n\n--module com.jdojo.reflect.test/com.jdojo.reflect.test.ReflectTest\n\n第\
  \ 4 章 ■ 模块依赖\n\ns = 10\n\nt = 20\n\nu = 30\n\nv = 40\n\n你是否考虑过这样的情况：你的模块需要对另一个模块进行深度反射访问，而该模块没有开放其任何包，并且你无法修改其声明？你可以通过使用\
  \ `--add-opens` 选项来实现。我将在第 9 章描述 JDK 9 让你打破模块封装的不同方法时讨论此选项及许多其他选项。\n\n类型可访问性\n\n\
  在 JDK 9 之前，有四种可访问性类型：\n\n• public\n• protected\n• <package>\n• private\n\n在 JDK\
  \ 8 中，public 类型意味着它可以被程序的所有部分访问。在 JDK 9 中，这一点发生了变化。一个 public 类型可能并非对所有人都是公共的。在模块中定义的\
  \ public 类型可能属于以下三类之一：\n\n• 仅在定义模块内公开\n• 仅对特定模块公开\n• 对所有人公开\n\n如果一个类型在模块中被定义为 public，但该模块并未导出包含该类型的包，则该类型仅在模块内公开。其他模块无法访问该类型。\n\
  \n如果一个类型在模块中被定义为 public，但该模块使用*限定*导出方式导出包含该类型的包，则该类型仅对限定导出中 `to` 子句指定的模块可访问。\n\n\
  如果一个类型在模块中被定义为 public，但该模块使用非限定导出语句导出包含该类型的包，则该类型将对读取第一个模块的每个模块公开。\n\n跨模块拆分包\n\n\
  不允许将包拆分到多个模块中。也就是说，同一个包不能在多个模块中定义。如果同一个包中的类型分布在多个模块中，这些模块应合并为一个模块，或者你需要重命名这些包。有时，你可以成功编译这些模块，但会在运行时收到错误；其他时候，你会收到编译时错误。正如我一开始提到的，拆分包并非无条件禁止。你需要了解这些错误背后的简单规则。\n\
  \n第 4 章 ■ 模块依赖\n\n如果名为 M 和 N 的两个模块定义了同一个名为 P 的包，则不能存在一个模块 Q，使得 M 和 N 模块中的包 P 都可被\
  \ Q 访问。换句话说，多个模块中的同一个包不能同时被一个模块读取。否则，会发生错误。如果一个模块正在使用一个存在于两个模块中的包中的类型，模块系统无法为你做出决定，这可能是错误的。它会生成一个错误，并希望你修复该问题。考虑以下代码片段：\n\
  \n// Test.java\n\npackage java.util;\n\npublic class Test {\n\n}\n\n如果你在 JDK 9 中将\
  \ `Test` 类作为模块的一部分或单独编译，你将收到以下错误：\n\nerror: package exists in another module: java.base\n\
  \npackage java.util;\n\n^\n1 error\n\n如果你在一个名为 M 的模块中有这个类，编译时错误表明 `java.util` 包在此模块以及\
  \ `java.base` 模块中都可被模块 M 读取。你必须将此类的包更改为任何可观察模块中不存在的其他包。\n\n模块声明中的限制\n\n声明模块时有几个限制。如果你违反了它们，你将在编译时或启动时收到错误：\n\
  \n• 模块图不能包含循环依赖。也就是说，两个模块不能相互读取。如果它们相互读取，它们应该是一个模块，而不是两个。请注意，通过编程方式或使用命令行选项添加可读性边，可以在运行时实现循环依赖。\n\
  • 模块声明不支持模块版本。你需要使用 `jar` 工具或其他工具（如 `javac`）将模块版本添加为类文件属性。\n• 模块系统没有子模块的概念。也就是说，`com.jdojo.person`\
  \ 和 `com.jdojo.person.client` 是两个独立的模块；第二个不是第一个的子模块。\n\n模块类型\n\nJava 已经存在了 20 多年，无论是旧应用还是新应用，都将继续使用那些尚未模块化或永远不会模块化的库。如果\
  \ JDK 9 强制每个人都模块化他们的应用程序，那么 JDK 9 可能不会被广泛采用。JDK 9 的设计者考虑到了向后兼容性。你可以按照自己的节奏模块化应用程序，或者决定完全不模块化——只需在\
  \ JDK 9 中运行你现有的应用程序，从而采用 JDK 9。在大多数情况下，你在 JDK 8 或更早版本中工作的应用程序无需任何更改即可在 JDK 9 中继续工作。为了简化迁移，JDK\
  \ 9 定义了四种类型的模块：\n\n• 普通模块\n• 开放模块\n• 自动模块\n• 未命名模块\n\n事实上，你会遇到六个描述六种不同类型模块的术语，对于\
  \ JDK 9 的初学者来说，这充其量是令人困惑的。另外两种类型的模块用于传达这四种模块类型的更广泛类别。图 4-14 显示了所有模块类型的图示。\n\n模块\n\
  \n命名模块\n\n未命名模块\n\n显式模块\n\n自动模块\n\n普通模块\n\n开放模块\n\n***图 4-14.** 模块类型*\n\n\n\n在描述主要的模块类型之前，我先简要定义图\
  \ 4-14 中展示的模块类型。\n\n• 模块是代码和数据的集合。\n\n• 根据模块是否具有名称，模块可以是*具名模块*或*未命名模块*。\n\n• 未命名模块没有进一步的分类。\n\
  \n• 当模块具有名称时，该名称可以在模块声明中显式给出，也可以自动（或隐式）生成。如果名称是在模块声明中显式给出的，则称为*显式模块*。如果名称是由模块系统通过读取模块路径上的\
  \ JAR 文件名生成的，则称为*自动模块*。\n\n• 如果你声明模块时未使用 `open` 修饰符，则称为*普通模块*。\n\n• 如果你使用 `open`\
  \ 修饰符声明模块，则称为*开放模块*。\n\n基于这些定义，开放模块同时也是显式模块和具名模块。自动模块是具名模块，因为它具有自动生成的名称，但它不是显式模块，因为它是由模块系统在编译时和运行时隐式声明的。以下小节将描述这些模块类型。\n\
  \n第 4 章 ■ 模块依赖\n\n■ **提示** 如果 Java 平台最初就设计了模块系统，那么你只会拥有一种模块类型——普通模块！所有其他模块类型的存在都是为了向后兼容，以及平滑迁移和采用\
  \ JDK 9。\n\n普通模块\n\n使用模块声明显式声明且未使用 `open` 修饰符的模块，总是会被赋予一个名称，称为*普通模块*或简称为*模块*。到目前为止，你主要接触的都是普通模块。我一直将普通模块称为模块，除非需要区分这四种模块类型，否则我将继续沿用这一术语。默认情况下，普通模块中的所有类型都是封装的。普通模块的示例如下：\n\
  \nmodule a.normal.module {\n\n    // 模块语句写在这里\n\n}\n\n开放模块\n\n如果模块声明包含 `open` 修饰符，则该模块被称为开放模块。有关开放模块的更多信息，请参阅前面题为“开放模块”的小节。开放模块的示例如下：\n\
  \nopen module a.open.module {\n\n    // 模块语句写在这里\n\n}\n\n自动模块\n\n为了向后兼容，用于查找类型的类路径机制在\
  \ JDK 9 中仍然有效。你可以选择将 JAR 放在类路径、模块路径或两者组合上。请注意，你可以将模块化 JAR 以及普通 JAR 同时放在模块路径和类路径上。\n\
  \n当你将 JAR 放在模块路径上时，该 JAR 会被视为一个模块，称为*自动模块*。“自动模块”这个名称源于以下事实：该模块是从 JAR 中自动定义的——你无需通过添加\
  \ `module-info.class` 文件来显式声明模块。自动模块具有名称。自动模块的名称是什么？它读取哪些模块？导出哪些包？我将很快回答这些问题。\n\n\
  自动模块也是具名模块。其名称和版本根据以下规则从 JAR 文件名中派生：\n\n• 移除 JAR 文件的 `.jar` 扩展名。如果 JAR 文件名为 `com.jdojo.intro-1.0.jar`，此步骤会移除\
  \ `.jar` 扩展名，后续步骤将使用 `com.jdojo.intro-1.0` 来派生模块名称及其版本。\n\n• 如果名称以连字符结尾，且连字符后紧跟至少一位数字（数字后可选地跟一个点），则模块名称从最后一个连字符之前的部分派生。连字符之后的部分，如果能够解析为有效版本，则被分配为模块的版本。在此示例中，模块名称将从\
  \ `com.jdojo.intro` 派生，版本将派生为 `1.0`。\n\n第 4 章 ■ 模块依赖\n\n• 名称部分中的每个非字母数字字符都会被替换为一个点，并且\n\
  \n\n\n在生成的字符串中，两个连续的点会被替换为一个点。此外，所有\n\n前导和尾随的点都会被移除。在此示例中，名称部分没有任何非\n\n字母数字字符，因此模块名称为\
  \ `com.jdojo.intro`。\n\n按顺序应用这些规则，即可得到模块名称和模块版本。在本节末尾，我将展示如何使用 JAR 文件确定自动模块的名称。表\
  \ 4-1 列出了一些 JAR 名称，以及由此推导出的自动模块名称和版本。请注意，该表在 JAR 文件名中未显示扩展名 `.jar`。\n\n***表 4-1.**\
  \ 自动模块名称和版本推导示例*\n\n**JAR 名称**\n\n**模块名称**\n\n**模块版本**\n\ncom.jdojo.intro-1.0\n\n\
  com.jdojo.intro\n\n1.0\n\njunit-4.10.jar\n\njunit\n\n4.10\n\njdojo-logging1.5.0\n\
  \n（错误）\n\n（无版本）\n\nspring-core-4.0.1.RELEASE\n\nspring.core\n\n4.0.1.RELEASE\n\n\
  jdojo-trans-api_1.5_spec-1.0.0\n\n（错误）\n\n1.0.0\n\n_\n\n（错误）\n\n（无版本）\n\n让我们看看表中三个特殊情况，如果将对应的\
  \ JAR 文件放入模块路径，将会收到错误。第一个产生错误的 JAR 名称是 `jdojo-logging1.5.0`。让我们应用规则来推导此 JAR 的自动模块名称：\n\
  \n• JAR 名称中没有紧跟数字的连字符，因此\n\n没有模块版本。整个 JAR 名称用于推导自动模块\n\n名称。\n\n• 所有非字母数字字符都被替换为点。得到的字符串是\n\
  \n`jdojo.logging1.5.0`。回顾第 [2](http://dx.doi.org/10.1007/978-1-4842-2592-9_2) 章，模块名称的每个部分都必须是有效的\
  \ Java 标识符。在此例中，`5` 和 `0` 是模块名称中的两个部分，\n\n它们不是有效的 Java 标识符。因此，推导出的模块名称无效。这就是\n\n\
  将此 JAR 文件添加到模块路径时出现错误的原因。\n\n另一个产生错误的 JAR 名称是 `jdojo-trans-api_1.5_spec-1.0.0`。让我们应用规则来推导此\
  \ JAR 的自动模块名称：\n\n• 它找到最后一个连字符，其后只有数字和点，并将 JAR\n\n名称拆分为两部分：`jdojo-trans-api_1.5_spec`\
  \ 和 `1.0.0`。第一部分用于\n\n推导模块名称。第二部分是模块版本。\n\n• 名称部分中的所有非字母数字字符都被替换为点。得到的\n\n字符串是 `jdojo.trans.api.1.5.spec`，这是一个无效的模块名称，\n\
  \n因为 `1` 和 `5` 不是有效的 Java 标识符。这就是\n\n将此 JAR 文件添加到模块路径时出现错误的原因。\n\n表中的最后一个条目包含一个下划线\
  \ (`_`) 作为 JAR 名称。也就是说，JAR 文件被命名为 `_.jar`。如果应用规则，下划线将被替换为一个点，并且该点将被移除，因为它是名称中唯一的字符。最终得到一个空字符串，这不是一个有效的模块名称。\n\
  \n第 4 章 ■ 模块依赖\n\n如果无法从其名称推导出有效的自动模块名称，则放置在模块路径上的 JAR 将抛出异常。例如，模块路径上的 `_.jar` 文件将导致以下异常：`java.lang.module.ResolutionException:\
  \ Unable to derive module descriptor for: _.jar`\n\n你可以使用带有 `--describe-module`\
  \ 选项的 `jar` 命令来打印模块化 JAR 的模块描述符，并打印 JAR 的推导出的自动模块名称。对于 JAR，它还会打印该 JAR 包含的包列表。使用该命令的一般语法如下：\n\
  \n```\njar --describe-module --file <JAR 路径>\n```\n\n以下命令打印名为 `cglib-2.2.2.jar`\
  \ 的 JAR 的自动模块名称：\n\n```\nC:\\Java9Revealed>jar --describe-module --file lib\\cglib-2.2.2.jar\n\
  No module descriptor found. Derived automatic module.\nmodule cglib@2.2.2 (automatic)\n\
  requires mandated java.base\ncontains net.sf.cglib.beans\ncontains net.sf.cglib.core\n\
  contains net.sf.cglib.proxy\ncontains net.sf.cglib.reflect\ncontains net.sf.cglib.transform\n\
  contains net.sf.cglib.transform.impl\ncontains net.sf.cglib.util\n```\n\n该命令打印一条消息，表明在\
  \ JAR 文件中未找到模块描述符，并从 JAR 推导出一个自动模块。如果你使用一个名称无法转换为有效自动名称的 JAR（例如 `cglib.1-2.2.2.jar`），`jar`\
  \ 命令将打印一条错误消息，并告诉你 JAR 名称的问题所在，如下所示：\n\n```\nC:\\Java9Revealed>jar --describe-module\
  \ --file lib\\cglib.1-2.2.2.jar\nUnable to derive module descriptor for: lib\\cglib.1-2.2.2.jar\n\
  cglib.1: Invalid module name: '1' is not a Java identifier\n```\n\n一旦你知道自动模块的名称，其他显式模块就可以使用\
  \ `requires` 语句来读取它。以下模块声明读取了来自模块路径上 `cglib-2.2.2.jar` 的名为 `cglib` 的自动模块：\n\n```\n\
  module com.jdojo.lib {\n    requires cglib;\n    //...\n}\n```\n\n第 4 章 ■ 模块依赖\n\
  \n要有效使用自动模块，它必须导出包并读取其他模块。让我们看看关于此的规则：\n\n• 自动模块读取所有其他模块。需要注意的是，从自动模块到所有其他模块的可读性是在模块图解析之后添加的。\n\
  \n• 自动模块中的所有包都被导出和开放。\n\n这两条规则基于这样一个事实：没有实际的方法可以判断自动模块依赖于哪些其他模块，以及其他模块需要自动模块的哪些包来进行深度反射编译。\n\
  \n自动模块读取所有其他模块可能会创建循环依赖，这在模块图解析之后是允许的。回想一下，在模块图解析期间不允许模块之间存在循环依赖。也就是说，你不能在模块声明中拥有循环依赖。\n\
  \n自动模块没有模块声明，因此它们不能声明对其他模块的依赖。显式模块可以声明对其他自动模块的依赖。让我们考虑一个情况：显式模块 M 读取自动模块 P，而模块 P\
  \ 使用了另一个自动模块 Q 中的类型 T。当你使用模块 M 中的主类启动应用程序时，模块图将仅包含 M 和 P——为简洁起见，此处省略了 `java.base`\
  \ 模块的讨论。解析过程将从模块 M 开始，并发现它读取了另一个模块 P。解析过程没有实际方法来判断模块 P 读取了模块 Q。你可以通过将它们放在类路径上来编译模块\
  \ P 和 Q。但是，当你运行此应用程序时，将会收到 `ClassNotFoundException`。当模块 P 尝试从模块 Q 访问类型时，会发生此异常。要解决此问题，必须通过使用\
  \ `--add-modules` 命令行选项并将 Q 指定为该选项的值，将模块 Q 作为根模块添加到模块图中。\n\n以下命令描述了名为 `cglib` 的自动模块，其模块声明是通过将\
  \ `cglib-2.2.2.jar` 文件放置在模块路径上推导出来的。输出表明名为 `cglib` 的自动模块导出并开放了其所有包。\n\n```\nC:\\\
  Java9Revealed>java --module-path lib\\cglib-2.2.2.jar\n--list-modules cglib\nautomatic\
  \ module cglib@2.2.2 (file:///C:/Java9Revealed/lib/cglib-2.2.2.jar)\nexports net.sf.cglib.beans\n\
  exports net.sf.cglib.core\nexports net.sf.cglib.proxy\nexports net.sf.cglib.reflect\n\
  exports net.sf.cglib.transform\nexports net.sf.cglib.transform.impl\nexports net.sf.cglib.util\n\
  requires mandated java.base\nopens net.sf.cglib.transform\nopens net.sf.cglib.transform.impl\n\
  opens net.sf.cglib.beans\nopens net.sf.cglib.util\nopens net.sf.cglib.reflect\n\
  opens net.sf.cglib.core\nopens net.sf.cglib.proxy\n```\n\n第 4 章 ■ 模块依赖\n\n未命名模块\n\
  \n\n\n你可以将 JAR 和模块化 JAR 放置在类路径上。当加载某个类型时，如果其包在任何已知模块中都未找到，模块系统会尝试从类路径加载该类型。如果在类路径上找到了该类型，它会被类加载器加载，并成为该类加载器的一个名为*未命名模块*的成员。每个类加载器都定义了一个未命名模块，其成员包括它从类路径加载的所有类型。未命名模块没有名称，因此显式模块无法使用\
  \ `requires` 语句声明对其的依赖。如果你有一个显式模块需要使用未命名模块中的类型，则必须将该未命名模块的 JAR 作为自动模块使用，即将其放置在模块路径上。\n\
  \n在编译时尝试从显式模块访问未命名模块中的类型是一个常见错误。这根本不可能实现，因为未命名模块没有名称，而显式模块在编译时需要模块名称才能读取另一个模块。自动模块充当显式模块和未命名模块之间的桥梁，如图\
  \ 4-15 所示。显式模块可以使用 `requires` 语句访问自动模块，而自动模块可以访问未命名模块。\n\n显式模块\n\n自动模块\n\n未命名模块\n\
  \n***图 4-15.** 自动模块充当显式模块与未命名模块之间的桥梁* 未命名模块没有名称。这并不意味着未命名模块的名称是空字符串、\"unnamed\"\
  \ 或 null。以下模块声明是无效的：\n\nmodule some.module {\n\nrequires \"\"; // 编译时错误\n\nrequires\
  \ \"unnamed\"; // 编译时错误\n\nrequires unnamed; // 编译时错误，除非你有一个名为 unnamed 的命名模块\n\n\
  requires null; // 编译时错误\n\n}\n\n未命名模块会读取其他模块，并根据以下规则导出并开放其所有包给其他模块：\n\n• 未命名模块会读取所有其他模块。因此，未命名模块可以访问所有模块（包括平台模块）中所有导出包的公共类型。此规则使得在\
  \ Java SE 8 中编译和运行的、使用类路径的应用程序，只要它们仅使用标准的、非弃用的 Java SE API，就能够在 Java SE 9 中继续编译和运行。\n\
  \n• 未命名模块会将其所有包开放给所有其他模块。因此，显式模块可以在运行时通过反射访问未命名模块中的类型。\n\n• 未命名模块会导出其所有包。显式模块在编译时无法读取未命名模块。在模块图解析完成后，所有自动模块都会被设置为可以读取未命名模块。\n\
  \n第 4 章 ■ 模块依赖\n\n■ **提示** 未命名模块可能包含一个也被命名模块导出的包。在这种情况下，未命名模块中的该包会被忽略。\n\n让我们看两个使用未命名模块的示例。在第一个示例中，一个普通模块将通过反射访问未命名模块。回想一下，普通模块在编译时无法访问未命名模块。在第二个示例中，一个未命名模块将访问一个普通模块。\n\
  \n普通模块到未命名模块\n\n你不需要声明未命名模块。要拥有一个未命名模块，你需要将一个 JAR 或模块化 JAR 放置在类路径上。我们将通过将 `com.jdojo.reflect`\
  \ 模块的模块化 JAR 放置在类路径上，将其复用为一个未命名模块。\n\n清单 4-19 和清单 4-20 分别包含名为 `com.jdojo.unnamed.test`\
  \ 的模块的模块声明以及该模块中的一个 `Main` 类。在 `main()` 方法中，该类尝试加载 `com.jdojo.reflect.Item` 类并读取其字段。为保持代码简洁，我在\
  \ `main` 方法中添加了一个 `throws` 子句。\n\n***清单 4-19.*** com.jdojo.unnamed.test 模块的模块声明\n\
  \n// module-info.java\n\nmodule com.jdojo.unnamed.test {\n\n\n\n// 无模块声明\n\n}\n\n\
  ***清单 4-20.*** com.jdojo.unnamed.test 模块中的主类\n\n// Main.java\n\npackage com.jdojo.unnamed.test;\n\
  \nimport java.lang.reflect.Field;\n\npublic class Main {\n\npublic static void main(String[]\
  \ args) throws Exception {\n\nClass<?> cls = Class.forName(\"com.jdojo.reflect.Item\"\
  );\n\nField[] fields = cls.getDeclaredFields();\n\nfor (Field field : fields) {\n\
  \nfield.setAccessible(true);\n\nSystem.out.println(field.getName() + \" = \" +\n\
  \nfield.get(null));\n\n}\n\n}\n\n}\n\n![](img/index-115_1.jpg)\n\n第 4 章 ■ 模块依赖\n\
  \n在 NetBeans 中，将 com.jdojo.reflect 项目添加到 com.jdojo.unnamed.test 项目的类路径中，如图 4-16\
  \ 所示。\n\n***图 4-16.** 将 com.jdojo.reflect 项目添加到 com.jdojo.unnamed.test 项目的类路径* 要运行\
  \ Main 类，请使用 NetBeans 或以下命令。在运行命令之前，请确保构建了两个项目——com.jdojo.reflect 和 com.jdojo.unnamed.test。\n\
  \nC:\\Java9Revealed>java --module-path com.jdojo.unnamed.test\\dist\n\n--class-path\
  \ com.jdojo.reflect\\dist\\com.jdojo.reflect.jar\n\n--module com.jdojo.unnamed.test/com.jdojo.unnamed.test.Main\n\
  \ns = 10\n\nt = 20\n\nu = 30\n\nv = 40\n\n通过将 com.jdojo.reflect.jar 放在类路径上，其 Item\
