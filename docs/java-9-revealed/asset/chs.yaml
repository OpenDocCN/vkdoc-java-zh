  \n**创建系统日志记录器**\n\n你需要创建一个系统日志记录器，它是一个实现了 `System.Logger` 接口的类。该接口包含以下方法：\n\n• `String\
  \ getName()`\n\n• `boolean isLoggable(System.Logger.Level level)`\n\n• `default\
  \ void log(System.Logger.Level level, Object obj)`\n\n• `default void log(System.Logger.Level\
  \ level, String msg)`\n\n• `default void log(System.Logger.Level level, String format,\
  \ Object... params)`\n\n• `default void log(System.Logger.Level level, String msg,\
  \ Throwable thrown)`\n\n• `default void log(System.Logger.Level level, Supplier<String>\
  \ msgSupplier)`\n\n• `default void log(System.Logger.Level level, Supplier<String>\
  \ msgSupplier, Throwable thrown)`\n\n• `void log(System.Logger.Level level, ResourceBundle\
  \ bundle, String format, Object... params)`\n\n• `void log(System.Logger.Level level,\
  \ ResourceBundle bundle, String msg, Throwable thrown)`\n\n你需要为 `System.Logger`\
  \ 接口中的四个抽象方法提供实现。\n\n`getName()` 方法应返回你的日志记录器的名称。你可以给它任意你想要的名称。`isLoggable()` 方法在日志记录器能够记录指定级别的消息时返回\
  \ `true`。`log()` 方法的两个版本用于记录消息，其他默认的 `log()` 方法会调用它们。\n\n`System.Logger.Level` 枚举定义了待记录消息级别的常量。一个级别具有名称和严重程度。级别值按严重程度递增的顺序为\
  \ `ALL`、`TRACE`、`DEBUG`、`INFO`、`WARNING`、`ERROR`、`OFF`。你可以使用其 `getName()` 和 `getSeverity()`\
  \ 方法获取级别的名称和严重程度。\n\n清单 19-3 包含了一个名为 `Log4jLogger` 的类的代码，该类实现了 `System.Logger` 接口。\n\
  \n***清单 19-3.*** 一个实现了 `System.Logger` 接口的 `Log4jLogger` 类\n\n// Log4jLogger.java\n\
  \npackage com.jdojo.logger;\n\nimport java.util.ResourceBundle;\n\nimport org.apache.logging.log4j.LogManager;\n\
  \nimport org.apache.logging.log4j.Logger;\n\n第 19 章 ■ 平台与 JVM 日志记录\n\npublic class\
  \ Log4jLogger implements System.Logger {\n\n    // 后端日志记录器。我们的日志记录器将把所有日志记录委托给这个后端日志记录器，即\
  \ Log4j\n\n    private final Logger logger = LogManager.getLogger();\n\n\n\n@Override\n\
  \npublic String getName() {\n\nreturn \"Log4jLogger\";\n\n}\n\n@Override\n\npublic\
  \ boolean isLoggable(Level level) {\n\n// 从 System.Logger.Level 获取 log4j 的级别\n\n\
  org.apache.logging.log4j.Level log4jLevel = toLog4jLevel(level);\n\n// 检查 log4j\
  \ 是否能处理此日志级别，并返回结果\n\nreturn logger.isEnabled(log4jLevel);\n\n}\n\n@Override\n\n\
  public void log(Level level, ResourceBundle bundle, String msg, Throwable thrown)\
  \ {\n\nlogger.log(toLog4jLevel(level), msg, thrown);\n\n}\n\n@Override\n\npublic\
  \ void log(Level level, ResourceBundle bundle, String format, Object... params)\
  \ {\n\nlogger.printf(toLog4jLevel(level), format, params);\n\n}\n\nprivate static\
  \ org.apache.logging.log4j.Level toLog4jLevel(Level level) {\n\nswitch (level) {\n\
  \ncase ALL:\n\nreturn org.apache.logging.log4j.Level.ALL;\n\ncase DEBUG:\n\nreturn\
  \ org.apache.logging.log4j.Level.DEBUG;\n\ncase ERROR:\n\nreturn org.apache.logging.log4j.Level.ERROR;\n\
  \ncase INFO:\n\nreturn org.apache.logging.log4j.Level.INFO;\n\ncase OFF:\n\nreturn\
  \ org.apache.logging.log4j.Level.OFF;\n\ncase TRACE:\n\nreturn org.apache.logging.log4j.Level.TRACE;\n\
  \ncase WARNING:\n\nreturn org.apache.logging.log4j.Level.WARN;\n\ndefault:\n\nthrow\
  \ new RuntimeException(\"未知级别: \" + level);\n\n}\n\n}\n\n}\n\n`Log4jLogger` 的实例将作为平台日志记录器，用于记录平台类的日志消息。它将所有日志记录工作委托给一个后端日志记录器，在此基础实现中，后端日志记录器即为\
  \ Log4j。`logger` 实例变量存储了对 Log4j `Logger` 实例的引用。\n\n第 19 章 ■ 平台与 JVM 日志记录\n\n你需要处理两个日志记录\
  \ API——一个由 `System.Logger` 定义，另一个由 Log4j 定义。\n\n它们使用不同的日志级别，分别由两种不同的类型表示——`System.Logger.Level`\
  \ 和 `org.apache.logging.log4j.Level`。为了记录日志消息，JDK 类会将一个 `System.Logger.Level` 传递给\
  \ `System.Logger` 接口的某个 `log()` 方法，该方法随后需要将该级别映射为 Log4j 的级别。`toLog4jLevel()` 方法负责执行此映射。它接收一个\
  \ `System.Logger.Level`，并返回对应的 `org.apache.logging.log4j.Level`。\n\n`isLoggable()`\
  \ 方法将系统级别映射为 Log4j 级别，并查询 Log4j 该日志级别是否已启用。你可以使用 Log4j 的配置文件（如清单 19-2 所示）来配置 Log4j，以启用任意级别的日志记录。\n\
  \n我保持了这两个 `log()` 方法的实现简单明了。它们只是将工作委托给 Log4j。\n\n这些方法没有使用 `ResourceBundle` 参数。如果你希望在记录日志之前对消息进行本地化，可以使用该参数。\n\
  \n现在你已经编写了平台日志记录器的主要逻辑，但它还不能进行测试。还需要做一些额外的工作才能看到它的实际效果。\n\n创建日志记录器查找器\n\nJava 运行时需要找到你的平台日志记录器。它使用服务定位器模式来查找它。回想一下你在清单\
  \ 19-1 的模块声明中的以下语句。\n\nprovides java.lang.System.LoggerFinder\n\nwith com.jdojo.logger.Log4jLoggerFinder;\n\
  \n在本节中，你将创建一个名为 `Log4jLoggerFinder` 的实现类，该类将实现服务接口 `System.LoggerFinder`。请记住，服务接口不一定是\
