  **Applet API 已弃用**\n\nJava applet 需要 Java 浏览器插件才能运行。许多浏览器供应商已经移除了对 Java 浏览器插件的支持，或者将在不久的将来移除。如果浏览器不支持\
  \ Java 插件，你就无法使用 applet，因此也就没有理由再使用 Applet API。JDK 9 弃用了 Applet API。但是，它不会在 JDK\
  \ 10 中被移除。如果计划在未来的版本中移除它，开发者将提前一个版本收到通知。以下类和接口已被弃用：\n\n•   `java.applet.AppletStub`\n\
  •   `java.applet.Applet`\n•   `java.applet.AudioClip`\n•   `java.applet.AppletContext`\n\
  •   `javax.swing.JApplet`\n\n![](img/index-510_1.jpg)\n\n第 20 章 ■ JDK 9 中的其他变更\n\
  \n在 JDK 9 中，所有 AWT 和 Swing 相关的类都打包在 `java.desktop` 模块中。这些已弃用的类和接口也位于同一模块中。\n\n`appletviewer`\
  \ 工具（随 JDK 一起提供，位于其 `bin` 目录中）用于测试 applet。该工具在 JDK 9 中也被弃用。在 JDK 9 中运行该工具会打印一条弃用警告。\n\
  \n**Javadoc 增强**\n\n\n\nJDK 9 对 Javadoc 的编写、生成和使用方式引入了一些增强功能。JDK 9 在 Javadoc 中支持\
  \ HTML5。默认情况下，javadoc 工具仍会生成 HTML4 格式的输出。该工具新增了一个 `-html5` 选项，用于指示你想要生成 HTML5 格式的输出：\n\
  \njavadoc -html5 <其他选项>\n\njavadoc 工具位于 `JDK_HOME\\bin` 目录中。使用 `--help` 选项运行该工具会打印其用法说明和所有选项。对\
  \ javadoc 工具的完整讨论超出了本书的范围。\n\nNetBeans IDE 允许你为项目生成 Javadoc。在项目的“属性”对话框中，选择 **构建\
  \ ➤ 文档** 以获取 Javadoc 属性表，你可以在其中指定 javadoc 工具的所有选项。要生成 Javadoc，请从项目右键菜单选项中选择 **生成\
  \ Javadoc**。\n\nJDK 9 保留了三框架或无框架的 Javadoc 布局。左上角框架包含三个链接：**所有类**、**所有包** 和 **所有模块**。**所有模块**\
  \ 链接是在 JDK 9 中新增的，它会显示所有模块的列表。**所有类** 链接允许你在左下角框架中查看所有类。另外两个链接允许你查看所有包、模块中的所有包以及所有模块。图\
  \ 20-1 展示了 Javadoc 页面的变化。\n\n***图 20-1.** 三框架布局下的 Java SE 9 Javadoc*\n\n第 20 章 ■\
  \ JDK 9 中的其他变化\n\n你还可以查看某个模块的 Javadoc。在左上角框架中选择一个模块，点击左侧上下框架之间显示的模块名称链接，你将在右侧框架中看到该模块的文档。模块的\
  \ Javadoc 包含所有模块语句的列表，例如 `requires`、`exports` 等。\n\n考虑这样一个场景：你正在寻找用 Java 实现某些功能的逻辑，并在互联网上找到了一段代码，这段代码使用了一个类，但没有显示导入该类的\
  \ import 语句。你可以访问 Java SE 的 Javadoc，并且想进一步了解这个类。如何获取该类的包名（这是访问该类文档所必需的）？你再次搜索互联网。这次，搜索类名，可能会得到一个指向该类\
  \ Javadoc 的链接。\n\n或者，你可以将这段代码复制并粘贴到诸如 NetBeans 和 Eclipse 之类的 Java IDE 中，IDE 会帮助你生成\
  \ import 语句，从而给出该类的包名。不必担心在 JDK 9 中搜索类包名的不便之处。\n\n右侧主框架还有另一个新增功能。该框架中的所有页面都在右上角显示一个**搜索框**（见图\
  \ 20-1）。搜索框允许你搜索 Javadoc。javadoc 工具会准备一个可搜索的术语索引。要了解哪些内容可搜索，你需要知道哪些术语被索引了：\n\n*\
  \   你可以搜索模块、包、类型和成员的声明名称。构造函数和方法的形参类型会被索引，但这些形参的名称不会被索引。因此，你可以搜索形参的类型。如果你在搜索框中输入\
  \ `\"(String, int, int)\"`，它会找到所有接受三个形参（类型分别为 String、int 和 int）的构造函数和方法列表。如果你输入\
  \ `\"util\"` 作为搜索词，它会显示所有在其名称中包含 `\"util\"` 的包、类型和成员的列表。\n*   JDK 9 引入了一个新的内联 Javadoc\
  \ 标签 `@index`，可用于告诉 javadoc 工具索引某个关键字。它可以在 Javadoc 中以 `{@index <关键字> <描述>}` 的形式出现，其中\
  \ `<关键字>` 是要被索引的关键字，`<描述>` 是该关键字的描述。以下 Javadoc 标签是使用 `@index` 标签和关键字 `jdojo` 的示例：`{@index\
  \ jdojo Info site ([www.jdojo.com](http://www.jdojo.com/)) for the Java 9 Revealed\
  \ book!}`。\n\n此列表中未列出的所有其他内容都无法使用 Javadoc 搜索框进行搜索。当你输入搜索词时，搜索框会以列表形式显示找到的结果。结果列表分为多个类别，例如**模块**、**包**、**类型**、**成员**和**搜索标签**。**搜索标签**类别包含从使用\
  \ `@index` 标签指定的索引关键字中找到的结果。\n\n■ **提示** Javadoc 搜索不支持正则表达式。输入的搜索关键字会在索引术语中搜索其出现的任何位置。\n\
  \n图 20-2 展示了带有结果列表的 Javadoc 搜索框的使用。我为 `com.jdojo.misc` 模块生成了 Javadoc，并使用它搜索 `jdojo`，如图左侧所示。我使用\
  \ Java SE 9 的 Javadoc 搜索术语 `Module`，如图右侧所示。\n\n![](img/index-512_1.jpg)\n\n第 20\
  \ 章 ■ JDK 9 中的其他变化\n\n***图 20-2.** 带有关键字和搜索结果的 Javadoc 搜索框*\n\n你可以使用**上**和**下**箭头键在搜索结果中导航。你可以通过以下两种方式之一查看搜索结果的详细信息：\n\
  \n*   点击某个搜索结果以打开该主题的 Javadoc。\n*   当某个搜索结果通过上/下箭头键高亮显示时，按 **Enter** 键打开该主题的详细信息。\n\
  \n■ **提示** 你可以将 `-noindex` 选项与 javadoc 工具一起使用来禁用 Javadoc 搜索。将不会生成索引，并且在生成的 Javadoc\
  \ 中也不会提供搜索框。\n\nJavadoc 搜索是使用客户端 JavaScript 在本地执行的。服务器端没有实现计算或搜索逻辑。如果你在浏览器中禁用了 JavaScript，你将无法使用\
  \ Javadoc 搜索功能。\n\n## 原生桌面特性\n\nJava SE 6 通过 `java.awt.Desktop` 类添加了平台特定的桌面支持。该类支持从\
  \ Java 应用程序执行以下操作：\n\n*   在用户默认浏览器中打开 URI\n*   在用户默认邮件客户端中打开 `mailto` URI\n*   使用注册的应用程序打开、编辑和打印文件\n\
  \n第 20 章 ■ JDK 9 中的其他变化\n\nJava SE 9 进一步推进了平台特定的桌面支持，并为许多系统和应用程序事件通知添加了公共 API 支持（如果当前平台支持这些通知）。`java.awt.Desktop`\
  \ 类仍然是处理平台特定桌面特性的核心类。为了支持如此多新的桌面特性，Java SE 9 在 `java.desktop` 模块中添加了一个新包 `java.awt.desktop`。`java.awt.Desktop`\
  \ 类也新增了许多方法。这个新包包含 30 个类和接口。在 JDK 9 中，Desktop API 支持 24 种平台特定的桌面操作和通知，这些操作和通知由 `Desktop.Action`\
  \ 枚举的常量定义。举几个例子，如下所示：\n\n*   当连接的显示器进入或退出省电模式时的通知\n*   当系统进入睡眠或唤醒后的通知\n*   当用户会话更改（例如锁定/解锁用户会话）时的通知\n\
  *   当应用程序的状态变为或不再是前台应用程序时的通知\n*   当应用程序被要求显示其“关于”对话框时的通知\n\n你可以使用这些特性来优化应用程序的资源使用。例如，如果系统进入睡眠模式，你可以停止动画，并在系统唤醒时恢复它们。本书不可能涵盖整个\
  \ Desktop API。我将通过一个逐步示例来引导你。有关更多信息，请参考 `java.awt.Desktop` 类以及 `java.awt.desktop`\
  \ 包中的类和接口的 API 文档。使用桌面特性时，典型步骤如下：\n\n*   使用 `Desktop` 类的静态方法 `isDesktopSupported()`\
  \ 检查当前平台是否支持 `Desktop` 类。如果该方法返回 `false`，则你无法使用任何桌面特性。\n\n\n\n• 如果支持 `Desktop` 类，请使用该类的静态方法\
  \ `getDesktop()` 获取 `Desktop` 类的引用。\n\n• 并非所有桌面功能在所有平台上都可用。请使用桌面对象上的 `isSupported(Desktop.Action\
  \ action)` 方法检查特定桌面操作是否受支持。受支持的桌面操作由 `Desktop.Action` 枚举中的常量表示。\n\n• 如果某个桌面操作受支持，您可以调用\
  \ `Desktop` 类的方法来执行该操作，例如打开文件，或者使用 `addAppEventListener(SystemEventListener listener)`\
  \ 方法注册事件处理器。\n\n■ **提示** `java.awt` 和 `java.awt.desktop` 包位于 `java.desktop` 模块中。当您使用特定于平台的桌面功能时，请确保您的模块读取了\
  \ `java.desktop` 模块。\n\n清单 20-15 con 包含一个完整的程序，用于演示桌面功能。该应用程序注册了一个用户会话更改监听器。当用户会话更改时，应用程序会收到通知，并在标准输出上打印一条消息。您可以通过远程登录/注销，或锁定和解锁计算机来更改用户会话。您可以使用此桌面通知在用户会话停用时暂停动画等耗时处理，并在会话激活时重新启动该过程。该程序输出之后有详细说明。运行该程序时，您需要锁定和解锁计算机以查看与用户会话相关的输出。显示的输出是我在\
  \ Windows 上运行此程序，并在程序运行期间锁定和解锁计算机一次时得到的。您可能会得到不同的输出。该程序会在两分钟后自动退出。\n\n第 20 章 ■ JDK\
  \ 9 中的其他变更\n\n***清单 20-15.*** 使用特定于平台的桌面功能\n\n// DeskTopFrame.java\n\npackage com.jdojo.misc;\n\
  \nimport java.awt.Desktop;\n\nimport java.awt.desktop.UserSessionEvent;\n\nimport\
  \ java.awt.desktop.UserSessionListener;\n\nimport java.util.concurrent.TimeUnit;\n\
  \npublic class DeskTopFrame {\n\npublic static void main(String[] args) {\n\n//\
  \ 检查 Desktop 类是否可用\n\nif (!Desktop.isDesktopSupported()) {\n\nSystem.out.println(\"\
  当前平台不支持 Desktop。\");\n\nreturn;\n\n}\n\nSystem.out.println(\"当前平台支持 Desktop。\");\n\
  \n// 获取桌面引用\n\nDesktop desktop = Desktop.getDesktop();\n\n// 检查是否支持用户会话事件通知\n\n\
  if (!desktop.isSupported(Desktop.Action.APP_EVENT_USER_SESSION)) {\n\nSystem.out.println(\"\
  当前桌面不支持用户会话通知\");\n\nreturn;\n\n}\n\nSystem.out.println(\"锁定和解锁您的会话以查看用户会话更改通知的实际效果。\"\
  );\n\n// 为用户会话更改添加事件处理器\n\ndesktop.addAppEventListener(new UserSessionListener()\
  \ {\n\n@Override\n\npublic void userSessionDeactivated(UserSessionEvent e) {\n\n\
  System.out.println(\"用户会话已停用。原因：\" + e.getReason());\n\n}\n\n@Override\n\npublic\
  \ void userSessionActivated(UserSessionEvent e) {\n\nSystem.out.println(\"用户会话已激活。原因：\"\
  \ + e.getReason());\n\n}\n\n});\n\n// 使当前线程休眠 2 分钟\n\ntry {\n\nTimeUnit.SECONDS.sleep(120);\n\
  \n} catch (InterruptedException e) {\n\ne.printStackTrace();\n\n}\n\n}\n\n}\n\n\
  第 20 章 ■ JDK 9 中的其他变更\n\n当前平台支持 Desktop。\n\n锁定和解锁您的会话以查看用户会话更改通知的实际效果。\n\n用户会话已停用。原因：LOCK\n\
  \n用户会话已激活。原因：LOCK\n\n`main()` 方法检查当前平台上 `Desktop` 类是否可用。如果不可用，程序退出。如果可用，则获取其引用。\n\
  \nif (!Desktop.isDesktopSupported()) {\n\nSystem.out.println(\"当前平台不支持 Desktop。\"\
  );\n\nreturn;\n\n}\n\n// 获取桌面引用\n\nDesktop desktop = Desktop.getDesktop();\n\n您希望在用户会话更改时收到通知，因此需要检查此功能是否受支持。如果不支持，程序退出。\n\
  \n// 检查是否支持用户会话事件通知\n\n\n\nif (!desktop.isSupported(Desktop.Action.APP_EVENT_USER_SESSION))\
  \ {\n\nSystem.out.println(\"当前桌面环境不支持用户会话通知\");\n\nreturn;\n\n}\n\n如果支持用户会话变更通知，你需要像这样注册一个\
  \ `UserSessionListener` 类型的事件监听器：\n\n// 为用户会话变更添加事件处理器\n\ndesktop.addAppEventListener(new\
  \ UserSessionListener() {\n\n@Override\n\npublic void userSessionActivated(UserSessionEvent\
  \ e) {\n\nSystem.out.println(\"用户会话已激活。原因：\" + e.getReason());\n\n}\n\n@Override\n\
  \npublic void userSessionDeactivated(UserSessionEvent e) {\n\nSystem.out.println(\"\
  用户会话已停用。原因：\" + e.getReason());\n\n}\n\n});\n\n第 20 章 ■ JDK 9 中的其他变更\n\n当用户会话被激活和停用时，会分别调用已注册的\
  \ `UserSessionListener` 的 `userSessionActivated()` 和 `userSessionDeactivated()`\
  \ 方法。这两个方法都接收一个 `UserSessionEvent` 对象作为参数。`UserSessionEvent` 类的 `getReason()` 方法返回一个\
  \ `UserSessionEvent.Reason` 枚举，该枚举的常量定义了用户会话变更的原因。该枚举有四个常量：`CONSOLE`、`LOCK`、`REMOTE`\
  \ 和 `UNSPECIFIED`。`CONSOLE` 和 `REMOTE` 常量表示用户会话分别与控制台终端和远程终端连接/断开连接的原因。`LOCK` 常量表示用户会话已被锁定或解锁的原因。顾名思义，`UNSPECIFIED`\
  \ 常量表示用户会话变更的所有其他原因。清单 20-15 中的输出显示了我锁定和解锁用户会话的情况。\n\n最后，`main()` 方法让当前线程休眠两分钟，这样你就有机会锁定和解锁你的会话，以观察程序运行。如果你移除这部分程序，程序将在没有等待你变更用户会话的情况下退出。\n\
  \n对象反序列化过滤器\n\nJava 允许你序列化和反序列化对象。为了解决反序列化带来的安全风险，JDK 9 引入了对象输入过滤器的概念，该过滤器可用于验证正在反序列化的对象，如果未通过测试，则可以停止反序列化过程。对象输入过滤器是\
  \ JDK 9 新增的接口 `java.io.ObjectInputFilter` 的一个实例。过滤器可以基于以下一个或多个标准：\n\n• 正在反序列化的数组的长度\n\
  • 正在反序列化的嵌套对象的深度\n• 正在反序列化的对象引用的数量\n• 正在反序列化的对象的类\n• 从输入流中消耗的字节数\n\n`ObjectInputFilter`\
  \ 接口仅包含一个方法：\n\n`ObjectInputFilter.Status checkInput(ObjectInputFilter.FilterInfo\
  \ filterInfo)`\n\n你可以指定一个全局过滤器，用于反序列化所有对象。你可以通过为对象输入流设置本地过滤器，在每个 `ObjectInputStream`\
  \ 的基础上覆盖全局过滤器。你也可以不设置全局过滤器，而为每个对象输入流指定一个本地过滤器。有多种创建和指定过滤器的方法。我将逐一举例说明。本节首先介绍 JDK\
  \ 9 中新增的、使用过滤器所需的类和接口：\n\n• `ObjectInputFilter`\n• `ObjectInputFilter.Config`\n\
  • `ObjectInputFilter.FilterInfo`\n• `ObjectInputFilter.Status`\n\n`ObjectInputFilter`\
  \ 是一个接口，其实例代表过滤器。你可以通过在一个类中实现此接口来创建过滤器。或者，你可以使用 `ObjectInputFilter.Config` 类的 `createFilter(String\
  \ pattern)` 方法从字符串中获取其实例，该方法将在下面讨论。\n\n第 20 章 ■ JDK 9 中的其他变更\n\n`ObjectInputFilter.Config`\
  \ 是一个嵌套的静态工具类，用于两个目的：\n\n• 获取和设置全局过滤器\n• 从指定为字符串的模式创建过滤器\n\n`ObjectInputFilter.Config`\
  \ 类包含以下三个静态方法：\n\n• `ObjectInputFilter createFilter(String pattern)`\n• `ObjectInputFilter\
  \ getSerialFilter()`\n• `void setSerialFilter(ObjectInputFilter filter)`\n\n`createFilter()`\
  \ 方法接受一个描述过滤器的模式，并返回一个 `ObjectInputFilter` 接口的实例。以下代码片段创建了一个过滤器，指定正在反序列化的数组长度不应超过\
  \ 4：\n\n`String pattern = \"maxarray=4\";`\n`ObjectInputFilter filter = ObjectInputFilter.Config.createFilter(pattern);`\n\
  \n你可以在一个过滤器中指定多个模式。它们之间用分号 (`;`) 分隔。以下代码片段从两个模式创建了一个过滤器。如果遇到长度大于 4 的数组，或者序列化对象的大小超过\
  \ 1024 字节，该过滤器将拒绝对象反序列化。\n\n`String pattern = \"maxarray=4;maxbytes=1024\";`\n`ObjectInputFilter\
  \ filter = ObjectInputFilter.Config.createFilter(pattern);`\n\n关于指定过滤器模式有若干规则。如果你更喜欢用\
  \ Java 代码编写过滤器逻辑，你可以通过创建一个实现 `ObjectInputFilter` 接口的类，并在其 `checkInput()` 方法中编写逻辑来实现。如果你想从字符串模式创建过滤器，规则如下：有五个过滤器标准，其中四个是限制。它们是\
  \ `maxarray`、`maxdepth`、`maxrefs` 和 `maxbytes`。你可以在模式中使用 `name=value` 对来设置它们，其中\
  \ `name` 是这些关键字之一，`value` 是限制值。如果模式包含等号 (`=`)，则该模式必须使用这四个关键字之一作为名称。第五个过滤器标准用于指定类名的模式，格式如下：\n\
  \n`<模块名>/<完全限定类名>`\n\n如果类在未命名模块中，则模式将与类名匹配。如果对象是数组，则使用数组组件类型的类名来匹配模式，而不是数组本身的类名。以下是匹配类名的模式的所有规则：\n\
  \n• 如果类名与模式匹配，则允许反序列化该对象。\n• 模式开头的 `!` 字符被视为逻辑非。\n• 如果模式包含斜杠 (`/`)，则斜杠之前的部分是模块名。如果模块名与类的模块名匹配，则斜杠之后的部分用作匹配类名的模式。如果模式中没有斜杠，则在匹配模式时不考虑类的模块名。\n\
  • 以 `.**` 结尾的模式匹配包及其所有子包中的任何类。\n• 以 `.*` 结尾的模式匹配包中的任何类。\n• 以 `*` 结尾的模式匹配以该模式为前缀的任何类。\n\
  • 如果模式等于类名，则匹配。\n• 否则，模式不匹配，并且拒绝该对象。\n\n如果你将 `\"com.jdojo.**\"` 设置为过滤器模式，它将允许反序列化\
  \ `com.jdojo` 包及其子包中的所有类，并拒绝反序列化所有其他类的对象。如果你将 `\"!com.jdojo.**\"` 设置为过滤器模式，它将拒绝反序列化\
  \ `com.jdojo` 包及其子包中的所有类，并允许反序列化所有其他类的对象。\n\n`getSerialFilter()` 和 `setSerialFilter()`\
  \ 方法用于获取和设置全局过滤器。你可以通过以下三种方式之一设置全局过滤器：\n\n• 通过设置名为 `jdk.serialFilter` 的系统属性，其值是一系列用分号分隔的过滤器模式。\n\
  • 通过在 `java.security` 文件中设置 `jdk.serialFilter` 属性，该文件存储在 `JAVA_HOME\\conf\\security`\
  \ 目录中。如果你使用 JDK 运行程序，请将 `JAVA_HOME` 视为 `JDK_HOME`。否则，将其视为 `JRE_HOME`。\n• 通过调用 `ObjectInputFilter.Config`\
  \ 类的 `setSerialFilter()` 静态方法。\n\n\n\n以下命令在运行类时，将 `jdk.serialFilter` 系统属性作为命令行选项进行设置。此时无需担心命令的其他细节。\n\
  \nC:\\Java9Revealed>java **-Djdk.serialFilter=maxarray=100;maxdepth=3;com.jdojo.****\
  \ --module-path com.jdojo.misc\\build\\classes --module com.jdojo.misc/com.jdojo.misc.ObjectFilterTest\n\
  \n清单 20-16 展示了 `JAVA_HOME\\conf\\security\\java.security` 配置文件的局部内容。该文件包含更多条目。此处仅展示了一个设置过滤器的条目，其效果与设置\
  \ `jdk.serialFilter` 系统属性相同，如前述命令所示。\n\n***清单 20-16.*** JAVA_HOME\\conf\\security\\\
  java.security 文件中展示 jdk.serialFilter 属性设置的条目\n\nmaxarray=100;maxdepth=3;com.jdojo.**\n\
  \n■ **提示** 如果同时在系统属性和配置文件中设置了过滤器，则使用系统属性中的值。\n\n当你运行带有全局过滤器的 java 命令时，会在 stderr\
  \ 上看到类似如下的消息：\n\nFeb 17, 2017 9:23:45 AM java.io.ObjectInputFilter$Config lambda$static$0\n\
  \nINFO: Creating serialization filter from maxarray=20;maxdepth=3;!com.jdojo.**\n\
  \n这些消息会作为平台消息，通过名为 `java.io.serialization` 的记录器（针对 `java.base` 模块）进行记录。如果你指定了平台记录器（参见第\
  \ [19](http://dx.doi.org/10.1007/978-1-4842-2592-9_19) 章），这些消息将被记录到你的记录器中。其中一条消息会打印出系统属性或配置文件中设置的全局过滤器。\n\
  \n第 20 章 ■ JDK 9 中的其他变更\n\n你也可以在代码中使用 `ObjectInputFilter.Config` 类的静态 `setSerialFilter()`\
  \ 方法来设置全局过滤器：\n\n// 创建一个过滤器\n\nString pattern = \"maxarray=100;maxdepth=3;com.jdojo.**\"\
  ;\n\nObjectInputFilter globalFilter = ObjectInputFilter.Config.createFilter(pattern);\n\
  \n// 设置一个全局过滤器\n\nObjectInputFilter.Config.setSerialFilter(globalFilter);\n\n■ **提示**\
  \ 全局过滤器只能设置一次。例如，如果你通过 `jdk.serialFilter` 系统属性设置了过滤器，那么在代码中调用 `Config.setSerialFilter()`\
  \ 将会抛出 `IllegalStateException`。\n\n当你使用 `Config.setSerialFilter()` 方法设置全局过滤器时，必须设置一个非空的过滤器。\n\
  \n这些规则的存在是为了确保通过系统属性或配置文件设置的全局过滤器不能在代码中被覆盖。\n\n无论过滤器是通过何种方式设置的，你都可以使用 `ObjectInputFilter.Config`\
  \ 类的静态 `getSerialFilter()` 方法来获取全局过滤器。如果没有全局过滤器，该方法返回 `null`。\n\n`ObjectInputFilter.FilterInfo`\
  \ 是一个嵌套的静态接口，其实例封装了当前反序列化的上下文。`ObjectInputFilter.FilterInfo` 的实例会被创建并传递给过滤器的 `checkInput()`\
  \ 方法。你无需在程序中实现此接口或创建其实例。\n\n该接口包含以下方法，你可以在自定义过滤器的 `checkInput()` 方法中使用它们来读取当前的反序列化上下文：\n\
  \n• `Class<?> serialClass()`\n\n• `long arrayLength()`\n\n• `long depth()`\n\n•\
  \ `long references()`\n\n• `long streamBytes()`\n\n`serialClass()` 方法返回正在被反序列化的对象的类。对于数组，它返回数组的类，而不是数组组件类型的类。当反序列化过程中没有创建新对象时，此方法返回\
  \ `null`。\n\n`arrayLength()` 方法返回正在被反序列化的数组的长度。如果正在被反序列化的对象不是数组，则返回 `-1`。\n\n`depth()`\
  \ 方法返回正在被反序列化的对象的嵌套深度。它从 1 开始，每嵌套一层增加 1，当嵌套对象返回时减少 1。\n\n`references()` 方法返回当前正在被反序列化的对象引用的数量。\n\
  \n\n\n`streamBytes()` 方法返回从对象输入流中已消耗的当前字节数。\n\n一个对象可能通过或未通过指定的过滤条件。根据测试结果，你需要返回\
  \ `ObjectInputFilter.Status` 枚举中的以下常量之一。通常，你会在自定义过滤器类的 `checkInput()` 方法中使用这些常量作为返回值。\n\
  \n• `ALLOWED`\n\n• `REJECTED`\n\n• `UNDECIDED`\n\n第 20 章 ■ JDK 9 中的其他变更\n\n这些常量分别表示反序列化被允许、被拒绝以及未决定。通常，返回\
  \ `UNDECIDED` 意味着将由其他过滤器来决定当前对象的反序列化是否继续。如果你正在创建一个用于黑名单类的过滤器，可以对匹配黑名单的类返回 `REJECTED`，对其他类返回\
  \ `UNDECIDED`。清单 20-17 包含一个简单的过滤器，该过滤器基于数组长度进行过滤。\n\n***清单 20-17.*** 一个允许反序列化指定长度数组的对象反序列化过滤器\n\
  \n```java\n// ArrayLengthObjectFilter.java\n\npackage com.jdojo.misc;\n\nimport\
  \ java.io.ObjectInputFilter;\n\npublic class ArrayLengthObjectFilter implements\
  \ ObjectInputFilter {\n\n    private long maxLenth = -1;\n\n    public ArrayLengthObjectFilter(int\
  \ maxLength) {\n        this.maxLenth = maxLength;\n    }\n\n    @Override\n   \
  \ public Status checkInput(FilterInfo info) {\n        long arrayLength = info.arrayLength();\n\
  \        if (arrayLength >= 0 && arrayLength > this.maxLenth) {\n            return\
  \ Status.REJECTED;\n        }\n        return Status.ALLOWED;\n    }\n}\n```\n\n\
  以下代码片段通过将数组最大长度指定为 3 来使用我们的自定义过滤器。\n\n如果对象输入流包含长度大于 3 的数组，反序列化将失败并抛出 `java.io.InvalidClassException`。该代码未展示异常处理逻辑。\n\
  \n```java\nArrayLengthObjectFilter filter = new ArrayLengthObjectFilter(3);\nFile\
  \ inputFile = ...\nObjectInputStream in = new ObjectInputStream(new FileInputStream(inputFile)))\
  \ {\n    in.setObjectInputFilter(filter);\n    Object obj = in.readObject();\n}\n\
  ```\n\n清单 20-18 包含一个名为 `Item` 的类的代码。为了简洁起见，我省略了该类的 getter 和 setter 方法。我将使用它的对象来演示反序列化过滤器。\n\
