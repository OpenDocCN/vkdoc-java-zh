  \n^\n\n1 个错误\n\n编译器信息并不十分清晰。它指出 `Address` 类对 `com.jdojo.person.test` 模块不可访问。回想一下，`Address`\
  \ 类位于 `com.jdojo.address` 模块中，而 `com.jdojo.person.test` 模块并未读取该模块。从代码来看，似乎理应编译通过。你可以访问\
  \ `Person` 类，而该类使用了 `Address` 类；因此你应该能够使用 `Address` 类。但在这里，`john.getAddress()` 方法返回了一个\
  \ `Address` 类型的对象，而你却无法访问该类型。模块系统只是在履行其职责，强制执行 `com.jdojo.address` 模块所定义的封装。如果一个模块想要显式或隐式地使用\
  \ `Address` 类，它必须读取 `com.jdojo.address` 模块。如何解决这个问题？简单的答案是让 `com.jdojo.person.test`\
  \ 模块读取 `com.jdojo.address` 模块，方法是将它的声明修改为清单 4-8 所示的内容。\n\n***清单 4-8.*** `com.jdojo.person.test`\
  \ 模块的修改后模块声明\n\n// module-info.java\n\nmodule com.jdojo.person.test {\n\nrequires\
  \ com.jdojo.person;\n\n**requires com.jdojo.address;**\n\n}\n\n![](img/index-90_1.jpg)\n\
  \n第 4 章 ■ 模块依赖\n\n当你在清单 4-8 中添加了 `requires com.jdojo.address` 语句后，你会遇到另一个错误，指出找不到\
  \ `com.jdojo.address` 模块。将 `com.jdojo.address` 项目添加到 `com.jdojo.person.test` 项目的模块路径中，即可修复此错误。模块路径设置将如图\
  \ 4-5 所示。\n\n***图 4-5.** `com.jdojo.person.test` 模块的模块路径设置*\n\n![](img/index-91_1.jpg)\n\
  \n第 4 章 ■ 模块依赖\n\n图 4-6 显示了此时 `com.jdojo.person.test` 模块的模块图。\n\n***图 4-6.** `com.jdojo.person.test`\
  \ 模块的模块图*\n\n编译并运行 `com.jdojo.person.test` 模块中的 `Main` 类。它将打印以下内容：John lives in\
  \ Jacksonville\n\n你通过添加一条 `requires` 语句解决了问题。然而，其他读取 `com.jdojo.person` 模块的模块很可能也需要处理人员的地址，并且它们也需要添加类似的\
  \ `requires` 语句。如果 `com.jdojo.person` 模块在其公共 API 中暴露了来自多个其他模块的类型，那么读取 `com.jdojo.person`\
  \ 模块的模块将需要为这些模块中的每一个都添加一条 `requires` 语句。对于所有这些模块来说，添加额外的 `requires` 语句将非常繁琐。\n\n\
  JDK 9 的设计者意识到了这个问题，并提供了一种简单的解决方法。在这种情况下，你只需修改 `com.jdojo.person` 模块的声明，在 `requires`\
  \ 语句中添加一个 `transitive` 修饰符来读取 `com.jdojo.address` 模块。清单 4-9 包含了 `com.jdojo.person`\
  \ 模块的修改后声明。\n\n\n\n***清单 4-9.*** 为 `com.jdojo.person` 模块修改后的模块声明\n\n// module-info.java\n\
  \nmodule com.jdojo.person {\n\n// 读取 com.jdojo.address 模块\n\nrequires **transitive**\
  \ com.jdojo.address;\n\n// 导出 com.jdojo.person 包\n\nexports com.jdojo.person;\n\n\
  }\n\n现在，你可以从 `com.jdojo.person.test` 模块的声明中移除读取 `com.jdojo.address` 模块的 `requires`\
  \ 语句。你需要在 `com.jdojo.person.test` 项目的模块路径上保留 `com.jdojo.address` 项目，因为在该模块中使用 `Address`\
  \ 类型时仍然需要 `com.jdojo.address` 模块。重新编译 `com.jdojo.person` 模块。然后重新编译并运行 `com.jdojo.person.test`\
  \ 模块中的 `Main` 类，以获得预期的输出。\n\n![](img/index-92_1.jpg)\n\n![](img/index-92_2.jpg)\n\
  \n第 4 章 ■ 模块依赖\n\n当 `requires` 语句包含 `transitive` 修饰符时，依赖当前模块的其他模块会隐式地读取 `requires`\
  \ 语句中指定的模块。参考清单 4-9，任何读取 `com.jdojo.person` 模块的模块都会隐式地读取 `com.jdojo.address` 模块。\n\
  \n本质上，隐式读取使模块声明更易于阅读，但更难推理，因为仅通过查看模块声明，你无法看到其所有依赖项。图 4-7 展示了 `com.jdojo.person.test`\
  \ 模块的最终模块图。\n\n***图 4-7.** `com.jdojo.person.test` 模块的模块图*\n\n当解析模块时，模块图会通过为每个传递依赖添加一条读取边来扩充。在此示例中，将从\
  \ `com.jdojo.person.test` 模块向 `com.jdojo.address` 模块添加一条读取边，如图 4-8 中的虚线箭头所示。\n\n\
  ***图 4-8.** 通过隐式读取边扩充后的 `com.jdojo.person.test` 模块的模块图* 71\n\n第 4 章 ■ 模块依赖\n\n限定导出\n\
  \n假设你正在开发一个由多个模块组成的库或框架。你的某个模块中包含一些包，这些包中的 API 仅供某些模块内部使用。也就是说，该模块中的包无需导出给所有模块，其可访问性必须仅限于少数几个命名的模块。这可以通过在模块声明中使用限定导出语句来实现。使用限定导出的通用语法如下：\n\
  \nexports <包名> to <模块 1>, <模块 2>...;\n\n这里，`<包名>` 是当前模块要导出的包名，`<模块 1>`、`<模块 2>`\
  \ 等是可以读取当前模块的模块名称。以下模块声明包含一个非限定导出和一个限定导出：\n\nmodule com.jdojo.common {\n\n// 非限定导出语句\n\
  \nexports com.jdojo.zip;\n\n// 限定导出语句\n\nexports com.jdojo.internal to com.jdojo.address;\n\
  \n}\n\n`com.jdojo.common` 模块将 `com.jdojo.zip` 包导出给所有模块，而 `com.jdojo.internal` 包仅属于\
  \ `com.jdojo.address` 模块。`com.jdojo.zip` 模块中的所有公共类型将对所有读取 `com.jdojo.common` 模块的模块可访问。然而，`com.jdojo.internal`\
  \ 包中的所有公共类型仅对 `com.jdojo.address` 模块可访问（前提是该模块读取了前者）。\n\n你可以在 JDK 9 中找到许多限定导出的示例。`java.base`\
  \ 模块包含 `sun.*` 和 `jdk.*` 包，这些包被导出给少数几个命名的模块。以下命令打印了 `java.base` 的模块声明。输出显示了 `java.base`\
  \ 模块中使用的一些限定导出。\n\nc:\\>javap jrt:/java.base/module-info.class\n\nCompiled from\
  \ \"module-info.java\"\n\nmodule java.base {\n\nexports sun.net to jdk.plugin, jdk.incubator.httpclient;\n\
  \nexports sun.nio.cs to java.desktop, jdk.charsets;\n\nexports sun.util.resources\
  \ to jdk.localedata;\n\nexports jdk.internal.util.xml to jdk.jfr;\n\nexports jdk.internal\
  \ to jdk.jfr;\n\n...\n\n}\n\n第 4 章 ■ 模块依赖\n\n并非 JDK 9 中的所有内部 API 都被封装了。`sun.*` 包中有一些关键的内部\
  \ API，例如 `sun.misc.Unsafe` 类，这些 API 在 JDK 9 之前被开发者使用，并且在 JDK 9 中仍然可访问。这些包已被放置在 `jdk.unsupported`\
  \ 模块中。以下命令打印了 `jdk.unsupported` 模块的模块声明：\n\nC:\\Java9Revealed>javap jrt:/jdk.unsupported/module-info.class\n\
  \nCompiled from \"module-info.java\"\n\nmodule jdk.unsupported@9-ea {\n\nrequires\
  \ java.base;\n\nexports sun.misc;\n\nexports com.sun.nio.file;\n\nexports sun.reflect;\n\
  \nopens sun.misc;\n\nopens sun.reflect;\n\n}\n\n可选依赖\n\n模块系统在编译时和运行时都会验证模块依赖关系。有时你可能希望某个模块依赖在编译时是必需的，但在运行时是可选的。\n\
  \n你可能会开发一个库，如果某个特定模块在运行时可用，该库的性能会更好；否则，它会回退到另一个性能较差的模块。然而，该库是针对可选模块编译的，并且它确保如果可选模块不可用，则不会执行依赖于该可选模块的代码。\n\
  \n另一个例子是导出注解包的模块。Java 运行时已经会忽略不存在的注解类型。如果程序中使用的注解在运行时不存在，该注解会被忽略。模块依赖关系在启动时会被验证，如果缺少某个模块，应用程序将无法启动。因此，将包含注解包的模块依赖声明为可选依赖至关重要。\n\
  \n你可以通过在 `requires` 语句中使用 `static` 关键字来声明可选依赖：\n\nrequires **static** <可选包>;\n\n\
  以下模块声明包含对 `com.jdojo.annotation` 模块的可选依赖：\n\nmodule com.jdojo.claim {\n\nrequires\
  \ **static** com.jdojo.annotation;\n\n}\n\n允许在 `requires` 语句中同时使用 `transitive` 和\
  \ `static` 修饰符：\n\nmodule com.jdojo.claim {\n\nrequires **transitive static** com.jdojo.annotation;\n\
  \n}\n\n第 4 章 ■ 模块依赖\n\n如果同时使用 `transitive` 和 `static` 修饰符，它们可以按任意顺序排列。以下声明与上一个声明具有相同的语义：\n\
  \nmodule com.jdojo.claim {\n\nrequires **static transitive** com.jdojo.annotation;\n\
  \n}\n\n使用反射访问模块\n\n二十多年来，Java 一直允许使用反射访问类型的所有成员——私有的、公共的、包级别的和受保护的。你能够访问类或对象的私有成员。你所要做的就是在成员（`Field`、`Method`\
  \ 等）对象上调用 `setAccessible(true)` 方法。在本章的剩余部分，我将把使用反射访问类型的非公共成员称为*深度反射*。\n\n当你导出一个模块的包时，其他模块只能访问导出包中的公共类型以及这些公共类型的公共/受保护成员——在编译时静态地访问，或在运行时通过反射访问。这在模块系统设计期间成为了一个大问题。有许多优秀的框架，例如\
  \ Spring 和 Hibernate，它们严重依赖于对应用程序库中定义的类型成员进行深度反射访问。\n\n模块系统的设计者在设计对模块化代码的深度反射访问时面临巨大挑战。允许对导出包中的类型进行深度反射违反了模块系统的*强封装*主题。即使模块开发者不想暴露模块的某些部分，它也会使所有内容对外部代码可访问。另一方面，不允许深度反射将使\
  \ Java 社区失去一些广泛使用的优秀框架，并且还会破坏许多依赖深度反射的现有应用程序。许多现有应用程序将因此限制而无法迁移到 JDK 9。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n经过几轮设计和实验的迭代，模块系统设计者找到了一个折中方案——鱼与熊掌可以兼得！当前的设计允许你拥有一个兼具强封装性、深度反射访问能力，或两者兼而有之的模块。规则如下：\n\
  \n-   一个被导出的包，在编译时和运行时都只允许访问其公共类型及其公共成员。如果你不导出某个包，那么该包中的所有类型对其他模块都是不可访问的。这提供了强封装性。\n\
  -   你可以开放一个模块，以允许在运行时对该模块中所有包的所有类型进行深度反射。这样的模块被称为*开放模块*。\n-   你可以拥有一个普通模块——即未开放进行深度反射的模块——但其中特定的包可以在运行时开放进行深度反射。所有其他包（非开放包）则被强封装。模块中允许进行深度反射的包被称为*开放包*。\n\
  -   有时，你可能希望在编译时访问某个包中的类型，以便根据该包中的类型编写代码，同时，你又希望在运行时对这些类型进行深度反射访问。你可以通过同时导出和开放同一个包来实现这一点。\n\
  \n第 4 章 ■ 模块依赖\n\n开放模块\n\n在本节的剩余部分，我将向你展示如何声明一个开放模块，以及如何开放一个特定的包以进行深度反射。首先，我将给出语法。在\
  \ `module` 关键字之前使用 `open` 修饰符来声明一个开放模块：\n\n**open** module com.jdojo.model {\n\n\
  // 模块语句写在这里\n\n}\n\n这里，`com.jdojo.model` 模块是一个开放模块。其他模块可以对该模块中所有包的所有类型使用深度反射。你可以在开放模块的声明中包含\
  \ `exports`、`requires`、`uses` 和 `provides` 语句。你不能在开放模块内部使用 `opens` 语句。`opens` 语句用于开放一个特定的包以进行深度反射。因为开放模块开放了所有包以进行深度反射，所以开放模块内部不允许使用\
  \ `opens` 语句。\n\n开放包\n\n开放包意味着允许其他模块对该包中的类型使用深度反射。你可以将包开放给所有其他模块，或开放给一个特定的模块列表。\n\
  \n将包开放给所有其他模块的 `opens` 语句语法如下：\n\nopens <包名>;\n\n这里，`<包名>` 对所有其他模块都可用于深度反射。你也可以使用限定形式的\
  \ `opens` 语句将包开放给特定模块：\n\nopens <包名> to <模块 1>, <模块 2>...;\n\n这里，`<包名>` 仅对 `<模块\
  \ 1>`、`<模块 2>` 等开放以进行深度反射。以下是在模块声明中使用 `opens` 语句的示例：\n\nmodule com.jdojo.model {\n\
  \n// 将 com.jdojo.util 包导出给所有模块\n\nexports com.jdojo.util;\n\n// 将 com.jdojo.util\
  \ 包开放给所有模块\n\nopens com.jdojo.util;\n\n// 仅将 com.jdojo.model.policy 包开放给\n\n// hibernate.core\
  \ 模块\n\nopens com.jdojo.model.policy to hibernate.core;\n\n}\n\n`com.jdojo.model`\
  \ 模块导出了 `com.jdojo.util` 包，这意味着所有公共类型及其公共成员在编译时和运行时（用于普通反射）都是可访问的。第二条语句开放了同一个包，以在运行时进行深度反射。总之，`com.jdojo.util`\
  \ 包的所有公共类型及其公共成员在编译时可访问，并且该包允许在运行时进行深度反射。第三条语句仅将 `com.jdojo.model.policy` 包开放给 `hibernate.core`\
  \ 模块以进行深度反射，这意味着其他模块在编译时无法访问该包的任何类型，而 `hibernate.core` 模块可以在运行时使用深度反射访问所有类型及其成员。\n\
  \n第 4 章 ■ 模块依赖\n\n■ **提示** 一个对另一个模块的开放包执行深度反射的模块，不需要读取包含这些开放包的模块。但是，如果知道模块名称，添加对具有开放包的模块的依赖是允许的，并且强烈建议这样做——这样模块系统可以在编译时和运行时验证依赖关系。\n\
  \n当模块 M 将其包 P 开放给另一个模块 N 以进行深度反射时，模块 N 有可能将其对包 P 拥有的深度反射访问权限委托给另一个模块 Q。模块 N 需要使用\
  \ `Module` 类的 `addOpens()` 方法以编程方式实现这一点。将反射访问权限委托给另一个模块，可以避免将整个模块开放给所有其他模块，同时，这也为被授予反射访问权限的模块增加了额外的工作。\n\
  \n使用深度反射\n\n在本节中，我将解释如何开放模块和包以进行深度反射。我将从一个基本用例开始，然后逐步构建示例。在示例中，我将：\n\n-   展示尝试使用深度反射执行某些操作的代码。通常，这些代码会产生错误。\n\
  -   解释错误背后的原因。\n-   最后，向你展示如何修复这些错误。\n\n我将使用一个名为 `com.jdojo.reflect` 的模块，该模块在 `com.jdojo.reflect`\
  \ 包中包含一个名为 `Item` 的类。清单 4-10 和清单 4-11 包含了该模块和类的源代码。\n\n***清单 4-10.*** com.jdojo.reflect\
  \ 模块的模块声明\n\n// module-info.java\n\nmodule com.jdojo.reflect {\n\n// 没有模块语句\n\n\
  }\n\n***清单 4-11.*** 一个包含四个静态变量的 Item 类\n\n// Item.java\n\npackage com.jdojo.reflect;\n\
  \npublic class Item {\n\nstatic private int s = 10;\n\nstatic int t = 20;\n\nstatic\
  \ protected int u = 30;\n\nstatic public int v = 40;\n\n}\n\n请注意，该模块既没有导出任何包，也没有开放任何包。`Item`\
  \ 类非常简单。它包含四个静态变量，分别对应每种访问修饰符——`private`、包级、`protected` 和 `public`。我特意让这个类保持简单，以便你可以专注于模块系统的规则，而不是理解代码。在本示例中，你将使用深度反射来访问这些静态变量。\n\
  \n第 4 章 ■ 模块依赖\n\n你将使用另一个名为 `com.jdojo.reflect.test` 的模块。清单 4-12 包含了它的声明。它是一个没有模块语句的普通模块。也就是说，除了默认依赖于\
  \ `java.base` 模块外，它没有其他依赖。\n\n***清单 4-12.*** com.jdojo.reflect.test 模块的模块声明\n\n\
  // module-info.java\n\nmodule com.jdojo.reflect.test {\n\n// 没有模块语句\n\n}\n\n`com.jdojo.reflect.test`\
  \ 模块包含一个名为 `ReflectTest` 的类，如清单 4-13 所示。\n\n***清单 4-13.*** 一个用于演示对其他模块中类型及其成员进行反射访问的\
  \ ReflectTest 类\n\n// ReflectTest.java\n\npackage com.jdojo.reflect.test;\n\nimport\
  \ java.lang.reflect.Field;\n\nimport java.lang.reflect.InaccessibleObjectException;\n\
  \npublic class ReflectTest {\n\npublic static void main(String[] args) throws ClassNotFoundException\
  \ {\n\n// 获取 com.jdojo.reflect.Item 类的 Class 对象\n\n// 该类位于 com.jdojo.reflect 模块中\n\
  \nClass<?> cls = Class.forName(\"com.jdojo.reflect.Item\");\n\nField[] fields =\
  \ cls.getDeclaredFields();\n\nfor (Field field : fields) {\n\nprintFieldValue(field);\n\
  \n}\n\n}\n\npublic static void printFieldValue(Field field) {\n\nString fieldName\
  \ = field.getName();\n\ntry {\n\n// 使字段可访问，以防其基于声明（例如私有字段）而不可访问\n\nfield.setAccessible(true);\n\
  \n// 打印字段的值\n\nSystem.out.println(fieldName + \" = \" + field.get(null));\n\n} catch\
  \ (IllegalAccessException | IllegalArgumentException |\n\nInaccessibleObjectException\
  \ e) {\n\nSystem.out.println(\"访问 \" + fieldName +\n\n\" 时出错。错误信息: \" + e.getMessage());\n\
  \n}\n\n}\n\n}\n\n第 4 章 ■ 模块依赖\n\n\n\n`ReflectTest` 类非常简单。在其 `main()` 方法中，它使用 `Class.forName()`\
  \ 方法加载 `com.jdojo.reflect.Item` 类，并尝试打印该类的所有四个静态字段的值。\n\n如果某个类在运行时可用，你可以使用 `Class.forName()`\
  \ 方法从任何模块加载该类。该类不一定需要通过模块依赖（即 `exports` 和 `requires` 语句）来保证可访问。你可能会质疑这条规则。这难道不违反模块系统的强封装前提吗？如何能在不拥有该类的模块导出包含该类的包的情况下，从任何模块加载该类？之所以允许这样做，是因为你加载的是该类的类描述符（`Class`\
  \ 对象）。知道类描述符并不意味着你也能创建该类的对象并访问其成员。强封装指的是只能访问模块中已导出或已打开的那些类型，而不是指加载类描述符。\n\n让我们运行\
  \ `ReflectTest` 类。它将生成以下错误：\n\n```\nException in thread \"main\" java.lang.ClassNotFoundException:\
  \ com.jdojo.reflect.Item\n    at java.base/jdk.internal.loader.BuiltinClassLoader.loadClass(BuiltinClassLoader.java:532)\n\
  \    at java.base/jdk.internal.loader.ClassLoaders$AppClassLoader.loadClass(ClassLoaders.java:186)\n\
  \    at java.base/java.lang.ClassLoader.loadClass(ClassLoader.java:473)\n    at\
  \ java.base/java.lang.Class.forName0(Native Method)\n    at java.base/java.lang.Class.forName(Class.java:292)\n\
  \    at com.jdojo.reflect.test/com.jdojo.reflect.test.ReflectTest.main(ReflectTest.java:12)\n\
  ```\n\n错误信息表明，在尝试加载 `com.jdojo.reflect.Item` 类时抛出了 `ClassNotFoundException`。我之前不是说应该能够加载该类吗？我之前的说法仍然正确。这个错误源于另一个问题。\n\
  \n当你尝试加载一个类时，包含该类的模块必须为模块系统所知。如果你在 JDK 9 之前收到 `ClassNotFoundException`，那表明该类不在类路径中。你需要将包含该类的目录或\
  \ JAR 添加到类路径中，错误就会解决。在 JDK 9 中，模块是通过模块路径来查找的。因此，让我们将 `com.jdojo.reflect` 模块添加到模块路径中，然后运行\
  \ `ReflectTest` 类。在 NetBeans 中，你需要通过属性对话框将 `com.jdojo.reflect` 项目添加到 `com.jdojo.reflect.test`\
  \ 模块的模块路径中，如图 4-9 所示。\n\n![](img/index-100_1.jpg)\n\n第 4 章 ■ 模块依赖\n\n***图 4-9.**\
  \ 在 NetBeans 中将 com.jdojo.reflect 项目添加到 com.jdojo.reflect.test 项目的模块路径中*\n\n你也可以使用以下命令运行\
  \ `ReflectTest` 类，假设你已在 NetBeans 中构建了两个项目，并且项目的 `dist` 目录中包含模块化 JAR：\n\n```\nC:\\\
  Java9Revealed>java\n--module-path com.jdojo.reflect\\dist;com.jdojo.reflect.test\\\
  dist\n--module com.jdojo.reflect.test/com.jdojo.reflect.test.ReflectTest\n```\n\n\
  在 NetBeans 和命令提示符下运行 `ReflectTest` 类都会返回相同的 `ClassNotFoundException`。因此，看起来将 `com.jdojo.reflect`\
  \ 模块添加到模块路径并没有帮助。但这并不完全正确。事实上，这一步确实有帮助，但它只解决了问题的一半。\n\n我们需要理解并解决另一半问题，即模块图。\n\n\
  JDK 9 中的模块路径听起来与类路径类似，但它们的工作方式不同。模块路径用于在模块解析期间定位模块——即构建和扩充模块图时。而类路径则用于在需要加载类时定位类。为了提供可靠的配置，模块系统确保在启动时所有模块所需的依赖项都已存在。一旦你的应用程序启动，所有需要的模块都会被解析，模块解析结束后再向模块路径添加更多模块也无济于事。当你运行\
  \ `ReflectTest` 类时——将 `com.jdojo.reflect` 和 `com.jdojo.reflect.test` 模块都保留在模块路径上——模块图如图\
  \ 4-10 所示。\n\n![](img/index-101_1.jpg)\n\n![](img/index-101_2.jpg)\n\n第 4 章 ■ 模块依赖\n\
  \n***图 4-10.** 运行 ReflectTest 类时的模块图*\n\n当你从一个模块运行一个类时——就像你运行 `ReflectTest` 类时那样——包含主类的模块是唯一用作根的模块。模块图包含主模块所依赖的所有模块及其依赖项。在这种情况下，`com.jdojo.reflect.test`\
  \ 模块是默认根模块集合中的唯一模块，模块系统对 `com.jdojo.reflect` 模块的存在一无所知，即使该模块被放置在模块路径上。你需要做什么才能将\
  \ `com.jdojo.reflect` 模块包含在模块图中？通过使用 `--add-modules` 命令行 VM 选项，将该模块添加到默认的根模块集合中。该选项的值是一个逗号分隔的模块列表，这些模块将被添加到默认的根模块集合中：\n\
  \n```\n--add-modules <module1>,<module2>...\n```\n\n图 4-11 显示了 NetBeans 中 `com.jdojo.reflect.test`\
