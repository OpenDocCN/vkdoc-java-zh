  \n总结\n\n应用程序（或库）提供的特定功能称为*服务*。提供服务实现的应用程序和库称为服务提供者。使用这些服务提供者提供的服务的应用程序称为*服务消费者*或*客户端*。\n\
  \n在 Java 中，*服务*由一组接口和类定义。服务包含一个接口或抽象类，它定义了服务提供的功能，被称为*服务提供者接口*、*服务接口*或*服务类型*。服务接口的特定实现称为*服务提供者*。一个服务接口可以有多个服务提供者。在\
  \ JDK 9 中，服务提供者可以是一个类或一个接口。\n\nJDK 包含一个 `java.util.ServiceLoader<S>` 类，其唯一目的是在运行时为指定的服务接口发现并加载类型为\
  \ S 的服务提供者。如果包含服务提供者的 JAR（模块化或非模块化）放置在类路径上，则 `ServiceLoader` 类会使用 `META-INF/services`\
  \ 目录来查找服务提供者。此目录中的文件名应与服务接口的完全限定名称相同。该文件包含服务提供者实现类的完全限定名称——每行一个类名。该文件可以使用 `#` 字符作为单行注释的开始。`ServiceLoader`\
  \ 类会扫描类路径上的所有 `META-INF/services` 目录以发现服务提供者。\n\n在 JDK 9 中，服务提供者发现机制已更改。使用 `ServiceLoader`\
  \ 类发现和加载服务提供者的模块需要使用 `uses` 语句指定服务接口。在 `uses` 语句中指定的服务接口可以声明在当前模块中，也可以声明在当前模块可访问的任何模块中。你可以使用\
  \ `ServiceLoader` 类的 `iterator()` 方法来遍历所有服务提供者。`stream()` 方法提供了一个元素流，这些元素是 `ServiceLoader.Provider`\
  \ 接口的实例。你可以使用该流根据提供者的类名来过滤和选择特定类型的提供者，而无需实例化所有提供者。\n\n包含服务提供者的模块需要使用 `provides`\
  \ 语句指定服务接口及其实现类。实现类必须声明在当前模块中。\n\n**第 6 章**\n\n**打包模块**\n\n在本章中，你将学习：\n\n• 打包 Java\
  \ 模块的不同格式\n\n• JAR 格式的增强\n\n• 什么是多版本 JAR\n\n• 如何创建和使用多版本 JAR\n\n• 什么是 JMOD 格式\n\n\
  • 如何使用 `jmod` 工具处理 JMOD 文件\n\n• 如何创建、提取和描述 JMOD 文件\n\n• 如何列出 JMOD 文件的内容\n\n• 如何记录\
  \ JMOD 文件中模块的哈希值以进行依赖项验证\n\n模块可以打包成不同的格式，用于三个阶段——编译时、链接时和运行时。并非所有阶段都支持所有格式。JDK 9\
  \ 支持以下格式来打包模块：\n\n• 展开目录\n\n• JAR 格式\n\n• JMOD 格式\n\n• JIMAGE 格式\n\n展开目录和 JAR 格式在\
  \ JDK 9 之前就已支持。JDK 9 增强了 JAR 格式以支持模块化 JAR 和多版本 JAR。JDK 9 引入了两种新的模块打包格式：JMOD 格式和\
  \ JIMAGE 格式。我在本节中讨论 JAR 格式和 JMOD 格式的增强。第 [7](http://dx.doi.org/10.1007/978-1-4842-2592-9_7)\
  \ 章将详细介绍 JIMAGE 格式以及 `jlink` 工具。\n\nJAR 格式\n\n第 [3](http://dx.doi.org/10.1007/978-1-4842-2592-9_3)\
  \ 章介绍了如何使用 `jar` 工具的新选项来创建模块化 JAR。`jar` 工具也用于列出 JAR 文件中的条目，以及提取和更新 JAR 文件的内容。`jar`\
  \ 工具在 JDK 9 之前就支持这些操作，并且在 JDK 9 中这些操作没有新增内容。在本章中，我将介绍 JAR 格式新增的一个特性，称为多版本 JAR。\n\
  \n© Kishori Sharan 2017\n\nK. Sharan, *Java 9 Revealed*, DOI 10.1007/978-1-4842-2592-9_6\n\
  \n第 6 章 ■ 打包模块\n\n什么是多版本 JAR？\n\n\n\n作为一名经验丰富的 Java 开发者，你一定使用过诸如 Spring 框架、Hibernate\
  \ 等 Java 库/框架。你可能正在使用 Java 8，但这些库可能仍在使用 Java 6 或 Java 7。为什么库开发者不利用最新版 JDK 的新特性呢？原因之一是并非所有库用户都使用最新版\
  \ JDK。将库更新为使用更新版本的 JDK，意味着强制所有库用户迁移到该新版 JDK，这在实践中并不可行。在打包代码时，针对不同 JDK 维护和发布库是另一个痛点。通常，你会为不同\
  \ JDK 找到单独的库 JAR。JDK 9 通过为库开发者提供一种打包库代码的新方式解决了这个问题——使用一个包含同一库版本、适用于多个 JDK 的单一 JAR。\n\
  \n这种 JAR 被称为*多版本 JAR*。\n\n多版本 JAR（MRJAR）包含同一库版本（提供相同 API）的代码，适用于多个 JDK 版本。也就是说，你可以拥有一个作为\
  \ MRJAR 的库，它既能用于 JDK 8，也能用于 JDK 9。MRJAR 中的代码将包含在 JDK 8 和 JDK 9 下编译的类文件。使用 JDK 9\
  \ 编译的类可以利用 JDK 9 提供的 API，而使用 JDK 8 编译的类则提供使用 JDK 8 编写的相同库 API。\n\nMRJAR 扩展了 JAR\
  \ 已有的目录结构。JAR 包含一个根目录，其中存放所有内容。它还包含一个用于存储 JAR 元数据的 `META-INF` 目录。\n\n通常，JAR 包含一个\
  \ `META-INF/MANIFEST.MF` 文件，其中包含其属性。典型 JAR 中的条目如下所示：\n\n- jar-root\n\n- C1.class\n\
  \n- C2.class\n\n- C3.class\n\n- C4.class\n\n- META-INF\n\n- MANIFEST.MF\n\n该 JAR\
  \ 包含四个类文件和一个 `MANIFEST.MF` 文件。MRJAR 扩展了 `META-INF` 目录，用于存储特定于某个 JDK 版本的类。`META-INF`\
  \ 目录包含一个 `versions` 子目录，该子目录下可能包含多个子目录——每个子目录的名称与 JDK 主版本号相同。例如，对于特定于 JDK 9 的类，可能存在\
  \ `META-INF/versions/9` 目录；对于特定于 JDK 10 的类，可能存在名为 `META-INF/versions/10` 的目录，以此类推。一个典型的\
  \ MRJAR 可能包含以下条目：\n\n- jar-root\n\n- C1.class\n\n- C2.class\n\n- C3.class\n\n- C4.class\n\
  \n- META-INF\n\n- MANIFEST.MF\n\n- versions\n\n- C2.class\n\n- C5.class\n\n- C1.class\n\
  \n- C2.class\n\n- C6.class\n\n第 6 章 ■ 打包模块\n\n如果此 MRJAR 在不支持 MRJAR 的环境中使用，它将被视为常规\
  \ JAR——将使用根目录中的内容，而 `META-INF/versions/9` 和 `META-INF/versions/10` 中的所有其他内容将被忽略。因此，如果此\
  \ MRJAR 与 JDK 8 一起使用，则只会使用四个类：C1、C2、C3 和 C4。\n\n当此 MRJAR 在 JDK 9 中使用时，将有五个类生效：C1、C2、C3、C4\
  \ 和 C5。将使用 `META-INF/versions/9` 目录中的 C2 类，而不是根目录中的 C2 类。在这种情况下，MRJAR 表明它为 JDK 9\
  \ 提供了一个更新版本的 C2 类，该版本覆盖了根目录中为 JDK 8 或更早版本提供的 C2 版本。JDK 9 版本还添加了一个名为 C5 的新类。\n\n\
  类似地，对于 JDK 版本 10，MRJAR 覆盖了类 C1 和 C2，并包含一个名为 C6 的新类。\n\n在单个 MRJAR 中针对多个 JDK 版本时，MRJAR\
  \ 中的搜索过程与常规 JAR 不同。在 MRJAR 中搜索资源或类文件时，使用以下规则：\n\n• 确定使用 MRJAR 的环境中 JDK 的主版本号。假设\
  \ JDK 的主版本号为 N。\n\n• 要定位名为 R 的资源或类文件，将从版本 N 的目录开始，在 `META-INF/versions` 目录下特定于平台的子目录中进行搜索。\n\
  \n• 如果在子目录 N 中找到 R，则返回该 R。否则，继续搜索更低版本的子目录。\n\n\n搜索所有低于 N 的版本。此过程会持续遍历 `META-INF/versions`\
  \ 目录下的所有子目录。\n\n• 如果在 `META-INF/versions/N` 子目录中未找到 R，则会在 MRJAR 的根目录中搜索 R。\n\n我们以上文展示的\
  \ MRJAR 结构为例。假设程序正在查找 `C3.class`，且当前 JDK 版本为 10。搜索将从 `META-INF/versions/10` 开始，在该目录下未找到\
  \ `C3.class`。接着搜索会继续在 `META-INF/versions/9` 中进行，同样未找到 `C3.class`。\n\n此时，搜索会继续在根目录中进行，并在其中找到\
  \ `C3.class`。\n\n再举一个例子，假设你想在 JDK 版本为 10 时查找 `C2.class`。搜索将从 `META-INF/versions/10`\
  \ 开始，在该目录下找到 `C2.class` 并返回。\n\n再举一个例子，假设你想在 JDK 版本为 9 时查找 `C2.class`。搜索将从 `META-INF/versions/9`\
  \ 开始，在该目录下找到 `C2.class` 并返回。\n\n再举一个例子，假设你想在 JDK 版本为 8 时查找 `C2.class`。由于不存在名为 `META-INF/versions/8`\
  \ 的 JDK 8 特定目录，因此搜索将从根目录开始，并在其中找到 `C2.class` 并返回。\n\n■ **提示** 在 JDK 9 中，所有处理 Jar\
  \ 的工具（例如 `java`、`javac` 和 `javap`）都已修改为支持多版本 Jar。处理 Jar 的 API 也已更新以支持多版本 Jar。\n\n\
  创建多版本 JAR\n\n一旦你了解了在特定 JDK 版本上搜索资源或类文件时 MRJAR 中目录的搜索顺序，就很容易理解类和资源是如何被找到的。JDK 版本特定目录的内容有一些规则。我将在后续章节中描述这些规则。在本节中，我将重点介绍如何创建\
  \ MRJAR。\n\n要运行此示例，你需要在机器上安装 JDK 8 和 JDK 9。如果你没有 JDK 8，任何除 JDK 9 之外的 JDK 也可以。对于非版本\
  \ 8 的 JDK，你需要更改示例中的代码，以便代码能在你的 JDK 上编译。\n\n第 6 章 ■ 打包模块\n\n我将使用一个 MRJAR 来存储应用程序的\
  \ JDK 8 和 JDK 9 版本。该应用程序包含以下两个类：\n\n• `com.jdojo.mrjar.Main`\n• `com.jdojo.mrjar.TimeUtil`\n\
  \n`Main` 类创建 `TimeUtil` 类的对象并调用其方法。`Main` 类可用作运行应用程序的主类。`TimeUtil` 类包含一个 `getLocalDate(Instant\
  \ now)` 方法，该方法接收一个 `Instant` 参数，并返回在当前时区解释该时刻的 `LocalDate`。JDK 9 为 `LocalDate` 类添加了一个名为\
  \ `ofInstant(Instant instant, ZoneId zone)` 的新方法。我们将更新应用程序以使用 JDK 9，从而利用 JDK 9 中的这个新方法，同时保留使用\
  \ JDK 8 Time API 实现相同功能的旧应用程序。\n\n源代码包含两个 NetBeans 项目，分别名为 `com.jdojo.mrjar.jdk8`\
  \ 和 `com.jdojo.mrjar.jdk9`，它们分别配置为使用 JDK 8 和 JDK 9。清单 6-1 和清单 6-2 包含了 JDK 8 版本的\
  \ `TimeUtil` 和 `Main` 类的代码。在 NetBeans 中，你需要将 `com.jdojo.mrjar.jdk8` 项目的“源”和“库”属性更改为\
  \ JDK 8，将 `com.jdojo.mrjar.jdk9` 项目的相应属性更改为 JDK 9。这些项目的源代码很简单，因此我不再提供解释。我本可以将 `TimeUtil`\
  \ 类中的 `getLocalDate()` 方法设为静态方法。但我将其保留为实例方法，以便你可以在输出（稍后讨论）中看到实例化的是哪个版本的类。当你运行 `Main`\
  \ 类时，它会打印当前的本地日期，当你运行此示例时，该日期可能不同。\n\n***清单 6-1.*** JDK 8 的 TimeUtil 类\n\n```java\n\
  // TimeUtil.java\npackage com.jdojo.mrjar;\n\nimport java.time.Instant;\nimport\
  \ java.time.LocalDate;\nimport java.time.ZoneId;\n\npublic class TimeUtil {\n  \
  \  public TimeUtil() {\n        System.out.println(\"Creating JDK 8 version of TimeUtil...\"\
  );\n    }\n}\n```\n\n\n\npublic LocalDate getLocalDate(Instant now) {\n\nreturn\
  \ now.atZone(ZoneId.systemDefault())\n\n.toLocalDate();\n\n}\n\n}\n\n***清单 6-2.***\
  \ JDK 8 的主类\n\n// Main.java\n\npackage com.jdojo.mrjar;\n\nimport java.time.Instant;\n\
  \nimport java.time.LocalDate;\n\n第 6 章 ■ 打包模块\n\npublic class Main {\n\npublic static\
  \ void main(String[] args) {\n\nSystem.out.println(\"Inside JDK 8 version of Main.main()...\"\
  );\n\nTimeUtil t = new TimeUtil();\n\nLocalDate ld = t.getLocalDate(Instant.now());\n\
  \nSystem.out.println(\"Local Date: \" + ld);\n\n}\n\n}\n\nInside JDK 8 version of\
  \ Main.main()...\n\nCreating JDK 8 version of TimeUtil...\n\nLocal Date: 2017-01-27\n\
  \n我们将把所有 JDK 9 类放入一个名为 `com.jdojo.mrjar` 的模块中，其声明如清单 6-3 所示。清单 6-4 和清单 6-5 包含了 JDK\
  \ 9 的 `TimeUtil` 和 `Main` 类的代码。\n\n***清单 6-3.*** 名为 `com.jdojo.mrjar` 的模块声明\n\n\
  // module-info.java\n\nmodule com.jdojo.mrjar {\n\nexports com.jdojo.mrjar;\n\n\
  }\n\n***清单 6-4.*** JDK 9 的 TimeUtil 类\n\n// TimeUtil.java\n\npackage com.jdojo.mrjar;\n\
