  \n栈遍历的缺点\n\n在 JDK 9 之前，栈遍历 API 存在以下几个缺点：\n\n• 效率不高。`Throwable`类的`getStackTrace()`方法会返回整个栈的快照。无法仅获取栈中顶部的几个帧。\n\
  \n• 帧中包含的是方法名和类名，而不是类引用。类引用是`Class<?>`类的实例，而类名仅仅是字符串。\n\n• JVM 规范允许虚拟机实现为了性能而省略栈中的某些帧。因此，如果你希望检查整个栈，当虚拟机隐藏了某些帧时，你将无法做到。\n\
  \n• JDK 及其他库中的许多 API 对调用者敏感。它们的行为会根据调用者的类而变化。例如，如果你想调用`Module`类的`addExports()`方法，调用者的类必须位于同一个模块中。否则，会抛出`IllegalCallerException`异常。在现有的\
  \ API 中，没有简单且高效的方法\n\n\n\n获取调用者类引用的方式。此类 API 依赖于使用 JDK 内部\n\nAPI——`sun.reflect.Reflection`\
  \ 类的 `getCallerClass()` 静态方法。\n\n• 没有简单的方法来过滤掉特定实现类的栈帧。\n\n第 16 章 ■ 栈遍历\n\nJDK 9\
  \ 中的栈遍历\n\nJDK 9 引入了一个新的栈遍历 API，它由 `java.lang` 包中一个名为 `StackWalker` 的类组成。该类提供了简单高效的栈遍历功能。它为当前线程提供一个栈帧的顺序流。栈帧按顺序报告，从生成栈的最顶层帧到最底层帧。`StackWalker`\
  \ 类非常高效，因为它惰性地评估栈帧。它还包含一个便捷方法来获取调用者类的引用。`StackWalker` 类由以下成员组成：\n\n• `StackWalker.Option`\
  \ 嵌套枚举\n\n• `StackWalker.StackFrame` 嵌套接口\n\n• 获取 `StackWalker` 类实例的方法\n\n• 处理栈帧的方法\n\
  \n• 获取调用者类的方法\n\n我将在后续章节中详细解释 `StackWalker` 类的每个组件及其用途。\n\n指定栈遍历选项\n\n你可以通过指定零个或多个选项来配置\
  \ `StackWalker`。选项是 `StackWalker.Option` 枚举的常量之一。常量如下：\n\n• `RETAIN_CLASS_REFERENCE`\n\
  \n• `SHOW_HIDDEN_FRAMES`\n\n• `SHOW_REFLECT_FRAMES`\n\n如果指定了 `RETAIN_CLASS_REFERENCE`\
  \ 选项，则 `StackWalker` 返回的帧将包含声明该帧所表示方法的类的 `Class` 对象的引用。如果你想要获取方法调用者的 `Class` 对象引用，也需要指定此选项。默认情况下，此选项不存在。\n\
  \n默认情况下，特定于实现的帧和反射帧不包含在 `StackWalker` 类返回的帧流中。使用 `SHOW_HIDDEN_FRAMES` 选项可包含所有隐藏帧。\n\
  \n如果指定了 `SHOW_REFLECT_FRAMES` 选项，则 `StackWalker` 类返回的帧流将包含反射帧。使用此选项可能仍会隐藏特定于实现的帧，你可以使用\
  \ `SHOW_HIDDEN_FRAMES` 选项来显示这些帧。\n\n我将在后续章节中解释如何创建 `StackWalker` 类的实例时，向你展示如何使用这些选项及其效果。\n\
  \n表示栈帧\n\n在 JDK 9 之前，使用 `StackTraceElement` 类的实例来表示栈帧。JDK 9 中的 `StackWalker` API\
  \ 使用 `StackWalker.StackFrame` 接口的实例来表示栈帧。\n\n■ **提示** 没有可供你直接使用的 `StackWalker.StackFrame`\
  \ 接口的具体实现类。JDK 中的栈遍历 API 在你检索栈帧时会为你提供该接口的实例。\n\n第 16 章 ■ 栈遍历\n\n`StackWalker.StackFrame`\
  \ 接口包含以下方法，其中大部分与 `StackTraceElement` 类中的方法相同：\n\n• `int getByteCodeIndex()`\n\n\
  • `String getClassName()`\n\n• `Class<?> getDeclaringClass()`\n\n• `String getFileName()`\n\
  \n• `int getLineNumber()`\n\n• `String getMethodName()`\n\n• `boolean isNativeMethod()`\n\
  \n• `StackTraceElement toStackTraceElement()`\n\n在类文件中，每个方法都使用名为 `method_info` 的结构来描述。`method_info`\
  \ 结构包含一个属性表，该表持有一个名为 `Code` 的可变长度属性。`Code` 属性包含一个名为 `code` 的数组，该数组保存了方法的字节码指令。`getByteCodeIndex()`\
  \ 方法返回指向包含此帧所表示执行点的方法的 `Code` 属性中 `code` 数组的索引。对于本地方法，它返回 -1。有关 `code` 数组和 `Code`\
  \ 属性的更多信息，请参阅 Java 虚拟机规范的第 4.7.3 节，网址为：\n\n[`docs.oracle.com/javase/specs/jvms/se8/html/`](https://docs.oracle.com/javase/specs/jvms/se8/html/)\n\
  \n\n\n如何使用方法中的代码数组？作为应用程序开发者，你不会使用方法中的字节码索引来定位执行点。JDK 确实支持使用内部 API 读取类文件及其所有属性。你可以使用位于\
  \ `JDK_HOME\\bin` 目录下的 `javap` 工具查看方法中每条指令的字节码索引。你需要使用 `-c` 选项配合 `javap` 来打印方法的代码数组。以下命令展示了\
  \ `LegacyStackWalk` 类中所有方法的代码数组：\n\nC:\\Java9Revealed>javap -c com.jdojo.stackwalker\\\
  build\\classes\\com\\jdojo\\stackwalker\\\n\nLegacyStackWalk.class\n\n编译自 \"LegacyStackWalk.java\"\
