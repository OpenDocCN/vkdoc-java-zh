  \ true\n向 java.sql 开放 com.jdojo.module.api? false\n\n第 10 章 ■ 模块 API\n\n**更新模块**\n\
  \n在前面的章节中，你了解了如何使用 `--add-exports`、`--add-opens` 和 `--add-reads` 命令行选项向模块添加导出和读取。在本节中，我将向你展示如何通过编程方式向模块添加这些语句。`Module`\
  \ 类包含以下方法，允许你在运行时修改模块声明：\n\n*   `Module addExports(String packageName, Module other)`\n\
  *   `Module addOpens(String packageName, Module other)`\n*   `Module addReads(Module\
  \ other)`\n*   `Module addUses(Class<?> serviceType)`\n\n使用命令行选项和使用这些方法之一来修改模块声明之间存在显著差异。使用命令行选项，你可以修改任何模块的声明。然而，这些方法对调用者敏感。调用这些方法的代码必须位于其声明正在被修改的模块中——调用\
  \ `addOpens()` 方法除外。也就是说，如果你无权访问某个模块的源代码，则无法使用这些方法来修改该模块的声明。这些方法通常旨在供框架使用，框架可以适应运行时需求以与其他模块交互。\n\
  \n当处理命名模块时，如果调用者不被允许调用这些模块，所有这些方法都会抛出 `IllegalCallerException`。\n\n`addExports()`\
  \ 方法更新模块，将指定的包导出到指定的模块。如果指定的包已经导出或开放给指定的模块，或者该方法是在未命名模块或开放模块上调用的，则调用该方法无效。如果指定的包为\
  \ null 或不存在于模块中，则会抛出 `IllegalArgumentException`。调用此方法的效果等同于向模块声明中添加限定导出：\n\n`exports\
  \ <packageName> to <other>;`\n\n`addOpens()` 方法与 `addExports()` 方法的工作方式相同，不同之处在于它更新模块以将指定的包开放给指定的模块。它类似于在模块中添加以下语句：\n\
  \n`opens <packageName> to <other>;`\n\n`addOpens()` 方法对谁可以调用此方法的规则做出了例外。其他方法可以从同一模块的代码中调用。然而，一个模块的\
  \ `addOpens()` 方法可以从另一个模块的代码中调用。假设模块 M 使用以下声明将包 P 开放给模块 N：\n\n```java\nmodule M\
  \ {\n    opens P to N;\n}\n```\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n\n在这种情况下，允许模块 N 调用模块 M 上的 `addOpens(\"P\", S)` 方法，这使得模块 N 能够将包 P 开放给模块 S。当某个模块的作者可能将一个模块的包开放给一个已知的抽象框架模块，而该框架模块在运行时发现并使用另一个实现模块时，就会发生这种情况。这两个动态发现的模块可能都需要对正在声明的模块进行深度反射访问。在这种情况下，模块的作者只需要知道抽象框架的模块名称，并将包开放给它。在运行时，抽象框架的模块可以将同一个包开放给动态发现的实现模块。可以想象一下\
  \ JPA，它作为一个定义了 `java.persistence` 模块的抽象框架，并在运行时发现其他 JPA 实现，例如 Hibernate 和 EclipseLink。在这种情况下，模块的作者可以只将包开放给\
  \ `java.persistence` 模块，而该模块可以在运行时将同一个包开放给 Hibernate 或 EclipseLink 模块。\n\n`addReads()`\
  \ 方法会从此模块向指定模块添加一条可读性边。如果指定的模块是自身（因为每个模块都可以读取自身），或者该方法是在未命名模块上调用的（因为未命名模块可以读取所有模块），则此方法无效。调用此方法等同于在模块声明中添加一条\
  \ `requires` 语句：\n\n`requires <other>;`\n\n`addUses()` 方法会更新模块以添加服务依赖，从而可以使用 `ServiceLoader`\
  \ 类加载指定服务类型的服务。当在未命名模块或自动模块上调用时，此方法无效。其效果等同于在模块声明中添加以下 `uses` 语句：\n\n`uses <serviceType>;`\n\
  \n清单 10-4 包含了 `UpdateModule` 类的代码。它位于 `com.jdojo.module.api` 模块中，如清单 10-1 所示。请注意，模块声明中不包含\
  \ `uses` 语句。该类包含一个 `findFirstService()` 方法，该方法接受一个服务类型作为参数。它会检查模块是否可以加载该服务类型。回想一下，模块必须包含一条指定服务类型的\
  \ `uses` 语句，才能使用 `ServiceLoader` 类加载该服务类型。该方法使用 `Module` 类的 `addUses()` 方法，在服务类型缺失时为其添加一条\
  \ `uses` 语句。最后，该方法加载并返回第一个被加载的服务提供者。\n\n***清单 10-4.*** 一个展示如何在运行时向模块声明添加 `uses`\
  \ 语句的 `UpdateModule` 类\n\n```java\n// UpdateModule.java\npackage com.jdojo.module.api;\n\
  \nimport java.util.ServiceLoader;\n\npublic class UpdateModule {\n\n    public static\
  \ <T> T findFirstService(Class<T> service) {\n        /* 在加载服务提供者之前，检查此模块是否可以使用（或加载）该服务。\n\
  \           如果不能，则更新模块以使用该服务。\n        */\n        Module m = UpdateModule.class.getModule();\n\
  \        if (!m.canUse(service)) {\n            m.addUses(service);\n        }\n\
  \n        return ServiceLoader.load(service)\n                .findFirst()\n   \
  \             .orElseThrow(\n                    () -> new RuntimeException(\"未找到服务类型的服务提供者:\
  \ \" +\n                            service.getName()));\n    }\n}\n```\n\n现在，我们将测试\
  \ `UpdateModule` 类的 `findFirstService()` 方法。清单 10-5 包含了一个名为 `com.jdojo.module.api.test`\
  \ 的模块的声明。它声明了对 `com.jdojo.prime` 模块的依赖，以便可以使用 `PrimeChecker` 服务类型接口。它还声明了对 `com.jdojo.module.api`\
  \ 模块的依赖，以便可以使用 `UpdateModule` 类来加载服务。您需要将这两个模块添加到 NetBeans 中 `com.jdojo.module.api.test`\
  \ 模块的模块路径中。\n\n***清单 10-5.*** 名为 `com.jdojo.module.api.test` 的模块的声明\n\n```java\n\
  // module-info.java\nmodule com.jdojo.module.api.test {\n    requires com.jdojo.prime;\n\
  \    requires com.jdojo.module.api;\n}\n```\n\n清单 10-6 包含了 `com.jdojo.module.api.test`\
  \ 模块中 `Main` 类的代码。\n\n***清单 10-6.*** `com.jdojo.module.api.test` 模块中的 `Main` 方法\n\
  \n```java\n// Main.java\npackage com.jdojo.module.api.test;\n\nimport com.jdojo.module.api.UpdateModule;\n\
  import com.jdojo.prime.PrimeChecker;\n\npublic class Main {\n    public static void\
  \ main(String[] args) {\n        long[] numbers = {3, 10};\n        try {\n    \
  \        // 获取 com.jdojo.prime.PrimeChecker 服务类型的服务提供者\n            PrimeChecker\
  \ pc = UpdateModule.findFirstService(PrimeChecker.class);\n\n            // 检查几个数字是否为质数\n\
