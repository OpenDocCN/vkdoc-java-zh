  \n**自旋等待提示**\n\n在多线程程序中，线程经常需要协调。一个线程可能需要等待另一个线程更新一个 volatile 变量。当该 volatile 变量被更新为某个特定值时，第一个线程才能继续执行。如果等待时间可能较长，建议第一个线程通过休眠或等待来让出\
  \ CPU，并在可以恢复工作时收到通知。然而，让线程休眠或等待会产生延迟。为了缩短等待时间并减少延迟，线程通常会通过循环检查某个条件是否为真来进行等待。考虑一个类中的代码，它使用循环等待一个名为\
  \ `dataReady` 的 volatile 变量变为 `true`：\n\n```java\nvolatile boolean dataReady;\n\
  ...\n@Override\npublic void run() {\n    // 等待数据准备就绪\n    while (!dataReady) {\n\
  \        // 无代码\n    }\n    processData();\n}\n\nprivate void processData() {\n\
  \    // 数据处理逻辑在此处\n}\n```\n\n此代码中的 `while` 循环被称为自旋循环、忙自旋、忙等待或自旋等待。该循环会一直循环，直到 `dataReady`\
  \ 变量变为 `true`。\n\n尽管自旋等待因其不必要的资源消耗而不被推荐，但它通常是必需的。在这个例子中，其优势在于一旦 `dataReady` 变量变为\
  \ `true`，线程就会立即开始处理数据。然而，由于线程在活跃地循环，你需要为性能和功耗付出代价。\n\n某些处理器可以接收到线程处于自旋等待状态的提示，并在可能的情况下优化资源使用。例如，x86\
  \ 处理器支持 `PAUSE` 指令来指示自旋等待。该指令会使线程的下一条指令的执行延迟一小段有限的时间，从而改善资源使用。\n\nJDK 9 在 `Thread`\
  \ 类中新增了一个静态方法 `onSpinWait()`。它纯粹是向处理器发出的一个提示，表明调用线程暂时无法继续执行，因此可以优化资源使用。当底层平台不支持此类提示时，该方法的可能实现可以是空操作。\n\
  \n清单 20-11 con 包含了示例代码。请注意，使用自旋等待提示不会改变程序的语义。如果底层硬件支持该提示，程序性能可能会更好。\n\n第 20 章 ■\
  \ JDK 9 中的其他变更\n\n***清单 20-11.*** 使用静态 `Thread.onSpinWait()` 方法向处理器发送自旋等待提示的示例代码\n\
  \n```java\n// SpinWaitTest.java\npackage com.jdojo.misc;\n\npublic class SpinWaitTest\
  \ implements Runnable {\n    private volatile boolean dataReady = false;\n\n   \
  \ @Override\n    public void run() {\n        // 等待数据准备就绪\n        while (!dataReady)\
  \ {\n            // 提示自旋等待\n            Thread.onSpinWait();\n        }\n      \
  \  processData();\n    }\n\n    private void processData() {\n        // 数据处理逻辑在此处\n\
  \    }\n\n    public void setDataReady(boolean dataReady) {\n        this.dataReady\
  \ = dataReady;\n    }\n}\n```\n\n**时间 API 的增强**\n\nJDK 9 对时间 API 进行了增强，在多个接口和类中新增了许多方法。无法解释所有增强内容。我将按接口和类列出新方法并附上简要说明。如果新方法较为复杂，我会提供示例。时间\
  \ API 包含 `java.time.*` 包，这些包位于 `java.base` 模块中。\n\n本节示例中我会使用代码片段。你可以在本书源代码的 `com.jdojo.misc`\
  \ 模块中的 `com.jdojo.misc.TimeApiTest` 类中找到本节完整的程序。许多示例会打印当前日期和时间。运行这些示例时，你可能会得到不同的输出。\n\
  \n**Clock 类**\n\n\n\n以下方法已添加到 Clock 类中：\n\nstatic Clock tickMillis(ZoneId zone)\n\
  \n`tickMillis()` 方法返回一个时钟，该时钟以整毫秒为单位提供当前时刻的滴答。\n\n该时钟使用最佳可用的系统时钟。该时钟会将精度高于毫秒的时间值截断。调用此方法等同于以下代码：\n\
  \nClock.tick(Clock.system(zone), Duration.ofMillis(1))\n\n第 20 章 ■ JDK 9 中的其他变更\n\
  \nDuration 类\n\n你可以根据用途将 Duration 类中的新方法分为三类：\n\n• 将一个持续时间除以另一个持续时间的方法\n\n• 以特定时间单位获取持续时间的方法，以及获取持续时间的特定部分（如天、小时、秒等）的方法\n\
  \n• 将持续时间截断到特定时间单位的方法\n\n我使用一个持续时间为 23 天、3 小时、45 分钟和 30 秒的例子。以下代码片段将其创建为一个 Duration\
  \ 对象，并将其引用存储在名为 `compTime` 的变量中：\n\n// 创建一个持续时间为 23 天、3 小时、45 分钟和 30 秒的对象\n\nDuration\
  \ compTime = Duration.ofDays(23)\n\n.plusHours(3)\n\n.plusMinutes(45)\n\n.plusSeconds(30);\n\
  \nSystem.out.println(\"Duration: \" + compTime);\n\nDuration: PT555H45M30S\n\n如输出所示，将天数乘以\
  \ 24 转换为小时后，此持续时间表示 555 小时、45 分钟和 30 秒。\n\n将一个持续时间除以另一个持续时间\n\n此类别中只有一个方法：\n\nlong\
  \ dividedBy(Duration divisor)\n\n`dividedBy()` 方法允许你将一个持续时间除以另一个持续时间。它返回指定除数在调用该方法的持续时间中出现的次数。要知道此持续时间中包含多少个整周，你可以使用七天作为持续时间来调用\
  \ `dividedBy()` 方法。以下代码片段展示了如何计算持续时间中的整天数、整周数和整小时数：\n\nlong wholeDays = compTime.dividedBy(Duration.ofDays(1));\n\
  \nlong wholeWeeks = compTime.dividedBy(Duration.ofDays(7));\n\nlong wholeHours =\
  \ compTime.dividedBy(Duration.ofHours(7));\n\nSystem.out.println(\"Number of whole\
  \ days: \" + wholeDays);\n\nSystem.out.println(\"Number of whole weeks: \" + wholeWeeks);\n\
  \nSystem.out.println(\"Number of whole hours: \" + wholeHours);\n\nNumber of whole\
  \ days: 23\n\nNumber of whole weeks: 3\n\nNumber of whole hours: 79\n\n第 20 章 ■\
  \ JDK 9 中的其他变更\n\n转换和检索持续时间的各部分\n\n此类别中向 Duration 类添加了几个方法：\n\n• long toDaysPart()\n\
  \n• int toHoursPart()\n\n• int toMillisPart()\n\n• int toMinutesPart()\n\n• int\
  \ toNanosPart()\n\n• long toSeconds()\n\n• int toSecondsPart()\n\nDuration 类包含两组方法。它们被命名为\
  \ `toXxx()` 和 `toXxxPart()`，其中 Xxx 可以是 Days、Hours、Minutes、Seconds、Millis 和 Nanos。在此列表中，你可能会注意到包含了\
  \ `toDaysPart()`，但缺少了 `toDays()`。如果你发现某一组方法中缺少了某些 Xxx，这意味着这些方法在 JDK 8 中已经存在。例如，`toDays()`\
  \ 方法自 JDK 8 起就已存在于 Duration 类中。\n\n名为 `toXxx()` 的方法将持续时间转换为 Xxx 时间单位并返回整数部分。名为 `toXxxPart()`\
  \ 的方法将持续时间分解为天:小时:分钟:秒:毫秒:纳秒的各个部分，并从中返回 Xxx 部分。在此示例中，`toDays()` 会将持续时间转换为天数并返回整数部分，即\
  \ 23。`toDaysPart()` 会将持续时间分解为 23 天:3 小时:45 分钟:30 秒:0 毫秒:0 纳秒，并返回第一部分，即 23。让我们将相同的规则应用于\
