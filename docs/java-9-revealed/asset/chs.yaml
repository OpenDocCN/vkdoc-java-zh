  \ 类的深度反射访问，解决方案是打开整个模块或包含 `Item` 类的包。清单 4-15 包含了 `com.jdojo.reflect` 模块的修改版本，将其声明为一个开放模块。开放模块在运行时导出其所有包以支持深度反射。\n\
