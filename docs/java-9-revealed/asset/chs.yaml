  lib\\modules\n\njimage: primechecker\\lib\\modules\n\n类中存在错误：/com.jdojo.prime.client/com/jdojo/prime/client/Main2.class\n\
  \n总结\n\n在 JDK 9 中，运行时镜像以一种名为 JIMAGE 的特殊格式存储，该格式针对空间和速度进行了优化。JIMAGE 格式仅在运行时受支持。它是一种用于在\
  \ JDK 中存储和索引模块、类及资源的容器格式。从 JIMAGE 文件中搜索和加载类比从 JAR 和 JMOD 文件中快得多。JIMAGE 格式是 JDK 内部的，开发者很少需要直接与\
  \ JIMAGE 文件交互。\n\nJDK 9 附带了一个名为 `jlink` 的工具，它允许你为应用程序创建一个 JIMAGE 格式的运行时镜像，该镜像将包含应用程序模块以及你的应用程序所使用的那些平台模块。`jlink`\
  \ 工具可以从存储在模块 JAR、展开目录和 JMOD 文件中的模块创建运行时镜像。JDK 9 还附带了一个名为 `jimage` 的工具，可用于探索 JIMAGE\
  \ 文件的内容。\n\n**第 8 章**\n\n**JDK 9 中的重大变更**\n\n在本章中，你将学习：\n\n• 新的 JDK 版本命名方案是什么\n\n\
  • 如何使用 `Runtime.Version` 类解析 JDK 版本字符串\n\n• JDK/JRE 9 的新目录布局是什么\n\n• 在 JDK 9 中，认可标准覆盖机制如何工作\n\
  \n• JDK 9 中使用扩展机制的变化\n\n• 在 JDK 9 中类加载器如何工作以及模块如何被加载\n\n• 在 JDK 9 中资源如何被封装在模块中\n\
  \n• 如何使用 `Module`、`Class` 和 `ClassLoader` 类中的资源查找方法访问模块中的资源\n\n• `jrt` URL 方案是什么，以及如何使用它访问运行时镜像中的资源\n\
  \n• 如何在 JDK 9 中访问 JDK 内部 API，以及 JDK 9 中已移除的 JDK API 列表\n\n• 如何使用 `--patch-module`\
  \ 命令行选项替换模块中的类和资源\n\nJDK 9 中有一些变更可能会破坏在 JDK 8 中运行良好的应用程序。在本章中，我将详细描述这些变更。\n\n新的\
  \ JDK 版本命名方案\n\n在 JDK 9 之前，JDK 的版本命名方案对开发者来说不够直观，程序也难以解析。查看两个 JDK 版本时，你无法分辨它们之间的细微差别。很难回答一个简单的问题：哪个版本包含最新的安全修复，JDK\
  \ 7 Update 55 还是 JDK 7 Update 60？答案并非显而易见，你可能猜的是——*JDK 7 Update 60*。\n\n两个版本包含相同的安全修复。JDK\
  \ 8 Update 66、1.8.0_66 和 JDK 8u66 版本之间有什么区别？它们代表同一个版本。在理解版本字符串中包含的细节之前，有必要详细了解版本命名方案。JDK\
  \ 9 试图标准化 JDK 版本命名方案，使其易于人类理解、易于程序解析，并遵循行业标准的版本命名方案。\n\n© Kishori Sharan 2017\n\n\
  K. Sharan, *Java 9 揭秘*, DOI 10.1007/978-1-4842-2592-9_8\n\n第 8 章 ■ JDK 9 中的重大变更\n\
  \nJDK 9 包含一个名为 `Runtime.Version` 的静态嵌套类，它表示 Java SE 平台实现的版本字符串。它可以用于表示、解析、验证和比较版本字符串。\n\
  \n一个*版本字符串*按顺序由以下四个元素组成。只有第一个是必需的：\n\n• 版本号\n\n• 预发布信息\n\n• 构建信息\n\n• 附加信息\n\n以下正则表达式定义了版本字符串的格式：\n\
  \n$vnum(-$pre)?(\\+($build)?(-$opt)?)?\n\n一个*短版本字符串*由一个版本号组成，可选地后跟预发布信息：$vnum(-$pre)?\n\
  \n你可以有一个像 \"9\" 这样短的版本字符串，它只包含主版本号；也可以有一个像 \"9.0.1-ea+154-20170130.07.36am\" 这样长的版本字符串，它包含版本字符串的所有部分。\n\
  \n版本号\n\n版本号是由句点分隔的元素序列。其长度可以是任意的。其格式如下：\n\n^[1-9][0-9]*(((\\.0)*\\.[1-9][0-9]*)*)*$\n\
  \n版本号可以由一到四个元素组成，如下所示：\n\n$主版本.$次版本.$安全版本(.$附加信息)\n\n$主版本 元素表示 JDK 版本的主版本号。对于包含重要新功能的主版本，该数字会递增。例如，JDK\
  \ 8 的主版本是 8，JDK 9 的主版本是 9。当主版本号递增时，版本号中的所有其他部分都会被移除。例如，如果你有一个版本号为 9.2.2.1，当主版本号从\
  \ 9 递增到 10 时，新的版本号将是 10。\n\n$次版本 元素表示 JDK 版本的次版本号。对于次要更新版本，例如错误修复、新的垃圾收集器、新的 JDK\
  \ 特定 API 等，该数字会递增。\n\n$安全版本 元素表示 JDK 版本的安全级别更新。对于安全更新，该数字会递增。当次版本号递增时，此元素不会被重置。对于给定的\
  \ $主版本，$安全版本 的值越高，始终表示更安全的版本。例如，JDK 版本 9.1.7 与 JDK 版本 9.5.7 一样安全，因为两个版本的安全级别相同，都是\
  \ 7。再比如，JDK 版本 9.2.2 比 9.2.1 更安全，因为对于相同的主版本 9，前者的安全级别 2 大于后者的安全级别 1。\n\n第 8 章 ■\
  \ JDK 9 中的重大变更\n\n以下规则适用于版本号：\n\n• 所有元素必须是非负整数。\n\n• 前三个元素分别被视为主版本、次版本和安全级别；其余元素（如果存在）被视为附加信息，例如表示补丁版本的编号。\n\
  \n• 只有主版本元素是必需的。\n\n• 版本号的元素不能包含前导零。例如，JDK 9 的主版本是 9，而不是 09。\n\n• 尾部元素不能为零。也就是说，你不能有一个像\
  \ 9.0.0 这样的版本号。它可以是 9、9.2 或 9.0.*x*，其中 *x* 是一个正整数。\n\n预发布信息\n\n版本字符串中的 $pre 元素是一个预发布标识符，例如\
  \ `ea` 表示早期访问版本，`snapshot` 表示预发布快照，`internal` 表示开发者内部构建。它是可选的。如果存在，它前面会有一个连字符 (-)，并且必须是一个与正则表达式\
  \ ([a-zA-Z0-9]+) 匹配的字母数字字符串。以下版本字符串包含 9 作为版本号，`ea` 作为预发布信息。\n\n9-ea\n\n构建信息\n\n\
  版本字符串中的 $build 元素是一个构建编号，每次推广构建时递增。它是可选的。当版本号的任何部分递增时，它会重置为 1。如果存在，它前面会有一个加号 (+)，并且必须与正则表达式\
  \ (0|[1-9][0-9]*) 匹配。以下版本字符串包含 154 作为构建编号。\n\n9-ea+154\n\n附加信息\n\n\n\n版本字符串中的 `$opt`\
  \ 元素包含额外的构建信息，例如内部构建的日期和时间。它是可选的。该元素由字母数字组成，可以包含连字符和句点。如果存在，它前面会有一个连字符 (-)，并且必须符合正则表达式\
  \ `([-a-zA-Z0-9\\.]+)`。如果 `$build` 不存在，你需要为 `$opt` 值添加一个加号后跟连字符 (+-) 作为前缀，以指定 `$opt`\
  \ 的值。例如，在 `9-ea+132-2016-08-23` 中，`$build` 是 `132`，`$opt` 是 `2016-08-23`；在 `9+-123`\
  \ 中，`$pre` 和 `$build` 不存在，`$opt` 是 `123`。以下版本字符串在其附加信息元素中嵌入了某个版本的日期和时间：\n\n`9-ea+154-20170130.07.36am`\n\
  \n第 8 章 ■ JDK 9 的重大变更\n\n解析新旧版本字符串\n\nJDK 版本要么是包含新功能和非安全修复的有限更新版本，要么是仅包含安全漏洞修复的关键补丁更新。版本字符串包含版本号，包括更新号和构建号。有限更新版本的编号是\
  \ 20 的倍数。关键补丁更新使用奇数，这些奇数是通过将前一个有限更新版本号加上 5 的倍数，并在需要时再加 1 以保持结果为奇数来计算的。例如 `1.8.0_31-b13`，这是\
  \ JDK 主版本 8 的更新 31。其构建号是 13。请注意，在 JDK 9 之前，版本字符串总是以 `1` 开头。\n\n■ **提示** 你现有的用于解析版本字符串以获取\
  \ JDK 版本主版本的代码，在 JDK 9 中可能会失败，具体取决于其使用的逻辑。例如，如果逻辑通过跳过第一个元素（过去是 `1`）来查找第二个元素中的主版本，则该逻辑会失败。例如，如果它从\
  \ `1.8.0` 返回 `8`，那么现在它从 `9.0.1` 返回 `0`，而你期望的是 `9`。\n\n系统属性的版本变更\n\n在 JDK 9 中，包含\
  \ JDK 版本字符串的系统属性所返回的值已发生变更。\n\n表 8-1 列出了这些系统属性及其格式。`$vstr`、`$vnum` 和 `$pre` 分别指代版本字符串、版本号和预发布信息。\n\
  \n***表 8-1.** JDK 9 中的系统属性及其值*\n\n**系统属性名称**\n\n**值**\n\njava.version\n\n`$vnum(\\\
  -$pre)?`\n\njava.runtime.version\n\n`$vstr`\n\njava.vm.version\n\n`$vstr`\n\njava.specification.version\n\
  \n`$vnum`\n\njava.vm.specification.version\n\n`$vnum`\n\n使用 Runtime.Version 类\n\n\
  JDK 9 新增了一个名为 `Runtime.Version` 的静态嵌套类，其实例代表版本字符串。`Version` 类没有公共构造函数。获取其实例的唯一方法是调用其名为\
  \ `parse(String vstr)` 的静态方法。如果版本字符串为 null 或无效，该方法可能会抛出运行时异常。\n\n```java\nimport\
  \ java.lang.Runtime.Version;\n\n...\n\n// 解析版本字符串 \"9.0.1-ea+132\"\nVersion version\
  \ = Version.parse(\"9.0.1-ea+132\");\n```\n\n第 8 章 ■ JDK 9 的重大变更\n\n`Runtime.Version`\
  \ 类中的以下方法返回版本字符串的元素。方法名称足够直观，可以猜测它们返回的元素值类型。\n\n• `int major()`\n• `int minor()`\n\
  • `int security()`\n• `Optional<String> pre()`\n• `Optional<Integer> build()`\n\
  • `Optional<String> optional()`\n\n请注意，对于可选元素 `$pre`、`$build` 和 `$opt`，返回类型是 `Optional`。对于可选的\
  \ `$minor` 和 `$security` 元素，返回类型是 `int`，而不是 `Optional`，如果版本字符串中缺少 `$minor` 和 `$security`，则返回零。\n\
  \n回顾一下，版本字符串中的版本号在第三个元素之后可能包含附加信息。`Version` 类不包含直接获取这些附加信息的方法。它包含一个 `version()`\
  \ 方法，该方法返回一个 `List<Integer>`，其中列表包含版本号的所有元素。列表中的前三个元素是 `$major`、`$minor` 和 `$security`。其余元素包含附加的版本号信息。\n\
  \n\n\n`Runtime.Version` 类包含用于按顺序和相等性比较两个版本字符串的方法。你可以选择是否包含可选的构建信息（`$opt`）进行比较。这些比较方法如下：\n\
  \n• `int compareTo(Version v)`\n\n• `int compareToIgnoreOptional(Version v)`\n\n\
  • `boolean equals(Object v)`\n\n• `boolean equalsIgnoreOptional(Object v)`\n\n表达式\
  \ `v1.compareTo(v2)` 将返回一个负整数、零或正整数，具体取决于 `v1` 是小于、等于还是大于 `v2`。`compareToIgnoreOptional()`\
  \ 方法的工作方式与 `compareTo()` 方法相同，区别在于它在比较时会忽略可选的构建信息。`equals()` 和 `equalsIgnoreOptional()`\
  \ 方法用于比较两个版本字符串在包含或不包含可选构建信息时是否相等。\n\n哪个版本字符串代表最新的构建版本：`9.1.1` 还是 `9.1.1-ea`？第一个不包含预发布元素，而第二个包含，因此第一个是最新的构建版本。哪个版本字符串代表最新的构建版本：`9.1.1`\
  \ 还是 `9.1.1.1-ea`？这一次，第二个代表最新的构建版本。比较是按顺序进行的——`$vnum`、`$pre`、`$build` 和 `$opt`。当版本号更大时，版本字符串中的其他元素将不再进行比较。\n\
  \n本节源代码位于名为 `com.jdojo.version.string` 的模块中，其声明如清单 8-1 所示。清单 8-2 包含一个完整的程序，演示了如何使用\
  \ `Runtime.Version` 类提取版本字符串的所有部分。\n\n***清单 8-1.*** 名为 com.jdojo.version.string\
  \ 的模块的模块声明\n\n// module-info.java\n\nmodule com.jdojo.version.string {\n\nexports\
  \ com.jdojo.version.string;\n\n}\n\n第 8 章 ■ JDK 9 中的重大变更\n\n***清单 8-2.*** 一个 VersionTest\
  \ 类，演示如何使用 Runtime.Version 类处理版本字符串\n\n// VersionTest.java\n\npackage com.jdojo.version.string;\n\
  \nimport java.util.List;\n\nimport java.lang.Runtime.Version;\n\npublic class VersionTest\
  \ {\n\npublic static void main(String[] args) {\n\nString[] versionStrings = {\n\
  \n\"9\", \"9.1\", \"9.1.2\", \"9.1.2.3.4\", \"9.0.0\",\n\n\"9.1.2-ea+153\", \"9+132\"\
  , \"9-ea+132-2016-08-23\", \"9+-123\",\n\n\"9.0.1-ea+132-2016-08-22.10.56.45am\"\
  };\n\nfor (String versonString : versionStrings) {\n\ntry {\n\nVersion version =\
  \ Version.parse(versonString);\n\n// 获取额外的版本号元素\n\n// 从第 4 个元素开始\n\nString vnumAdditionalInfo\
  \ = getAdditionalVersionInfo(version);\n\nSystem.out.printf(\"Version String=%s%n\"\
  , versonString);\n\nSystem.out.printf(\"Major=%d, Minor=%d, Security=%d, Additional\
  \ Version=%s,\"\n\n+ \" Pre=%s, Build=%s, Optional=%s %n%n\",\n\nversion.major(),\n\
  \nversion.minor(),\n\nversion.security(),\n\nvnumAdditionalInfo,\n\nversion.pre().orElse(\"\
  \"),\n\nversion.build().isPresent() ? version.build().get().toString() : \"\",\n\
  \nversion.optional().orElse(\"\"));\n\n} catch (Exception e) {\n\nSystem.out.printf(\"\
  %s%n%n\", e.getMessage());\n\n}\n\n}\n\n}\n\n// 返回从第 4 个元素到末尾的版本号元素\n\npublic static\
  \ String getAdditionalVersionInfo(Version v) {\n\nString str = \"\";\n\nList<Integer>\
  \ vnum = v.version();\n\nint size = vnum.size();\n\nif (size >= 4) {\n\nstr = str\
  \ + String.valueOf(vnum.get(3));\n\n}\n\n第 8 章 ■ JDK 9 中的重大变更\n\nfor (int i = 4;\
  \ i < size; i++) {\n\nstr = str + \".\" + String.valueOf(vnum.get(i));\n\n}\n\n\
  return str;\n\n}\n\n}\n\nVersion String=9\n\nMajor=9, Minor=0, Security=0, Additional\
  \ Version=, Pre=, Build=, Optional=\n\nVersion String=9.1\n\nMajor=9, Minor=1, Security=0,\
  \ Additional Version=, Pre=, Build=, Optional=\n\nVersion String=9.1.2\n\nMajor=9,\
  \ Minor=1, Security=2, Additional Version=, Pre=, Build=, Optional=\n\nVersion String=9.1.2.3.4\n\
  \nMajor=9, Minor=1, Security=2, Additional Version=3.4, Pre=, Build=, Optional=\n\
  \nInvalid version string: '9.0.0'\n\nVersion String=9.1.2-ea+153\n\nMajor=9, Minor=1,\
  \ Security=2, Additional Version=, Pre=ea, Build=153, Optional=\n\nVersion String=9+132\n\
  \nMajor=9, Minor=0, Security=0, Additional Version=, Pre=, Build=132, Optional=\n\
  \nVersion String=9-ea+132-2016-08-23\n\nMajor=9, Minor=0, Security=0, Additional\
  \ Version=, Pre=ea, Build=132, Optional=2016-08-23\n\nVersion String=9+-123\n\n\
  Major=9, Minor=0, Security=0, Additional Version=, Pre=, Build=, Optional=123\n\n\
  Version String=9.0.1-ea+132-2016-08-22.10.56.45am\n\nMajor=9, Minor=0, Security=1,\
  \ Additional Version=, Pre=ea, Build=132, Optional=2016-08-\n\n22.10.56.45am\n\n\
  JDK 和 JRE 的变更\n\nJDK 和 JRE 在 Java SE 9 中已被模块化。这需要对它们的结构进行一些更改。还进行了一些其他更改以提高性能、安全性和可维护性。这些更改中的大多数影响的是库开发者和\
  \ IDE 开发者，而非应用程序开发者。为了方便讨论这些更改，我将它们分为三大类：\n\n• 布局变更\n\n• 行为变更\n\n• API 变更\n\n第 8\
  \ 章 ■ JDK 9 中的重大变更\n\n以下各节将详细描述这些变更。\n\nJDK 和 JRE 中的布局变更\n\n结构变更影响了运行时映像中目录和文件的组织方式及其内容。在\
  \ Java SE 9 之前，JDK 构建系统会生成两种类型的运行时映像——Java 运行时环境（JRE）和 Java 开发工具包（JDK）。JRE 是 Java\
  \ SE 平台的完整实现，而 JDK 则包含一个嵌入的 JRE 以及开发工具和库。你可以只安装 JRE，或者安装包含嵌入 JRE 的 JDK。图 8-1 显示了\
  \ Java SE 9 之前 JDK 安装中的主要目录。`JDK_HOME` 是安装 JDK 的目录。如果你只安装了 JRE，那么目录仅存在于 `jre` 目录下。\n\
  \nJDK_HOME\n\nbin\n\ninclude\n\njre\n\nlib\n\nbin\n\nlib\n\n***图 8-1.** Java SE\
  \ 9 之前的 JDK 和 JRE 目录安排*\n\n在 Java SE 9 之前的 JDK 中：\n\n• `bin` 目录曾包含命令行开发和调试工具，例如\
  \ `javac`、`jar` 和 `javadoc`。它还曾包含用于启动 Java 应用程序的 `java` 命令。\n\n• `include` 目录包含编译本地代码时要使用的\
  \ C/C++ 头文件。\n\n• `lib` 目录包含多个 JAR 文件和其他类型的文件，用于 JDK 的工具。它包含一个 `tools.jar` 文件，其中包含了\
  \ `javac` 编译器的 Java 类。\n\n• `jre\\bin` 目录包含基本命令，例如 `java` 命令。在 Windows 平台上，它包含系统的运行时动态链接库（DLL）。\n\
  \n• `jre\\lib` 目录包含用户可编辑的配置文件，例如 `.properties` 和 `.policy` 文件。\n\n• `jre\\lib\\\
  endorsed` 目录包含允许“认可标准覆盖机制”的 JAR 文件。这允许将实现认可标准或独立技术的类及接口的更新版本（这些是在 Java 社区流程之外创建的）纳入\
  \ Java 平台。这些 JAR 文件会被前置到 JVM 的引导类路径之前，从而覆盖 Java 运行时中存在的这些类和接口的任何定义。\n\n第 8 章 ■ JDK\
  \ 9 中的重大变更\n\n• `jre\\lib\\ext` 目录包含允许扩展机制的 JAR 文件。此机制通过扩展类加载器加载此目录中的所有 JAR 文件，该加载器是引导类加载器的子加载器，也是系统类加载器的父加载器（系统类加载器加载所有应用程序类）。通过将\
  \ JAR 文件放置在此目录中，你可以扩展 Java SE 平台。这些 JAR 文件的内容对此运行时映像上编译或运行的所有应用程序都是可见的。\n\n• `jre\\\
  lib` 目录包含多个 JAR 文件。`rt.jar` 文件包含运行时的 Java 类和资源文件。许多工具依赖于 `rt.jar` 文件的位置。\n\n• `jre\\\
  lib` 目录包含非 Windows 平台的动态链接本地库。\n\n• `jre\\lib` 目录包含多个其他子目录，其中包含运行时文件，例如字体和图像。\n\n\
  \n\nJDK 和 JRE 的根目录（未嵌入 JDK 中的 JRE）过去包含多个文件，例如 COPYRIGHT、LICENSE 和 README.html。根目录中的\
  \ release 文件包含描述运行时镜像的键值对，例如 Java 版本、操作系统版本和架构。以下代码展示了 JDK 8 中一个示例 release 文件的部分内容：\n\
  \nJAVA_VERSION=\"1.8.0_66\"\n\nOS_NAME=\"Windows\"\n\nOS_VERSION=\"5.2\"\n\nOS_ARCH=\"\
  amd64\"\n\nBUILD_TYPE=\"commercial\"\n\nJava SE 9 扁平化了 JDK 的目录层次结构，并消除了 JDK 和 JRE\
  \ 之间的区别。图 8-2 展示了 Java SE 9 中 JDK 安装的目录。JDK 9 中的 JRE 安装不包含 include 和 jmods 目录。\n\
  \nJDK_HOME\n\nbin\n\nconf\n\ninclude\n\njmods\n\nlegal\n\nlib\n\n***图 8-2.** Java\
  \ SE 9 中的 JDK 目录安排*\n\n在 Java SE 9 的 JDK 中：\n\n• 没有名为 jre 的子目录。\n\n• bin 目录包含所有命令。在\
  \ Windows 平台上，它继续包含系统的运行时动态链接库。\n\n• conf 目录包含用户可编辑的配置文件，例如过去位于 jre\\lib 目录中的 .properties\
  \ 和 .policy 文件。\n\n• include 目录包含用于编译原生代码的 C/C++ 头文件，与之前相同。它仅存在于 JDK 中。\n\n第 8 章\
  \ ■ JDK 9 的重大变更\n\n• jmods 目录包含 JMOD 格式的平台模块。在创建自定义运行时镜像时需要它。它仅存在于 JDK 中。\n\n• legal\
  \ 目录包含法律声明。\n\n• lib 目录包含非 Windows 平台上的动态链接原生库。其子目录和文件不应由开发者直接编辑或使用。\n\nJDK 9 的根目录继续包含\
  \ COPYRIGHT 和 README 等文件。JDK 9 中的 release 文件包含一个新条目，其键为 MODULES，值为镜像中包含的模块列表。\n\n\
  JDK 9 镜像中 release 文件的部分内容如下：\n\nMODULES=java.rmi,jdk.jdi,jdk.policytool\n\nOS_VERSION=\"\
  5.2\"\n\nOS_ARCH=\"amd64\"\n\nOS_NAME=\"Windows\"\n\nJAVA_VERSION=\"9\"\n\nJAVA_FULL_VERSION=\"\
  9-ea+133\"\n\n我仅在列表中展示了三个模块。在完整的 JDK 安装中，此列表将包含所有平台模块。在自定义运行时镜像中，此列表将仅包含您包含在镜像中的模块。\n\
  \n■ **提示** JDK 中的 lib\\tools.jar 和 JRE 中的 lib\\rt.jar 已从 Java SE 9 中移除。这些 JAR 中可用的类和资源现在以内部格式存储在\
  \ lib 目录中一个名为 modules 的文件内。可以使用名为 jrt 的新方案从运行时镜像中检索这些类和资源。依赖于这些 JAR 位置的应用程序将停止工作。\n\
  \n行为变更\n\n行为变更将影响应用程序的运行时行为。以下各节将解释这些变更。\n\n认可标准覆盖机制\n\n在 Java SE 9 之前，您可以使用认可标准覆盖机制来使用实现认可标准或独立\
  \ API（例如 javax.rmi.CORBA 包和 Java API for XML Processing (JAXP)）的类和接口的更新版本，这些 API\
  \ 是在 Java Community Process 之外创建的。这些 JAR 被添加到 JVM 的引导类路径之前，从而覆盖 JRE 中存在的这些类和接口的任何定义。这些\
  \ JAR 的位置由名为 java.endorsed.dirs 的系统属性指定，其中目录由平台特定的路径分隔符分隔。如果未设置此属性，运行时将在 jre\\lib\\\
  endorsed 目录中查找 JAR。\n\nJava SE 9 仍然支持认可标准和独立 API 覆盖机制。在 Java SE 9 中，运行时镜像由模块组成。要使用此机制，您需要使用认可标准和独立\
  \ API 模块的更新版本。您需要使用 --upgrade-module-path 命令行选项。此选项的值是一个包含认可标准和独立 API 模块的目录列表。以下\
  \ Windows 命令覆盖了 JDK 9 中的认可标准模块，例如 java.corba 模块。将使用 umod1 和 umod2 目录中的模块，而不是运行时镜像中的相应模块：\n\
  \njava --upgrade-module-path umod1;umod2 <其他选项>\n\n■ **提示** 在 Java SE 9 中，创建 JAVA_HOME\\\
  lib\\endorsed 目录以及设置名为 java.endorsed.dirs 的系统属性是错误的。\n\n扩展机制\n\n版本 9 之前的 Java SE\
  \ 允许一种扩展机制，通过该机制，您可以通过将 JAR 放置在由系统属性 java.ext.dirs 指定的目录中来扩展运行时镜像。如果未设置此系统属性，则默认使用\
  \ jre\\lib\\ext 目录。此机制通过扩展类加载器加载此目录中的所有 JAR，扩展类加载器是引导类加载器的子类，也是系统类加载器的父类。它加载所有应用程序类。这些\
  \ JAR 的内容对此运行时镜像上编译或运行的所有应用程序可见。\n\nJava SE 9 不支持扩展机制。如果您需要类似的功能，可以将这些 JAR 放置在类路径的前面。在\
  \ JDK 9 中，创建名为 JAVA_HOME\\lib\\ext 的目录或设置名为 java.ext.dirs 的系统属性会导致错误。\n\n类加载器的变更\n\
  \n在运行时，每个类型都由一个类加载器加载，该类加载器由 java.lang.ClassLoader 类的实例表示。如果您有一个对象引用 obj，您可以通过调用\
  \ obj.getClass().getClassLoader() 方法获取其类加载器引用。您可以使用其 getParent() 方法获取类加载器的父加载器。\n\
  \n在版本 9 之前，JDK 使用三个类加载器来加载类，如图 8-3 所示。图中箭头的方向表示委派方向。您可以添加更多的类加载器，这些类加载器将是 ClassLoader\
  \ 类的子类。JDK 中的三个类加载器从不同的位置和类型加载类。\n\n引导类加载器\n\n扩展类加载器\n\n应用程序类加载器\n\n***图 8-3.**\
  \ 版本 9 之前 JDK 中的类加载器层次结构*\n\n第 8 章 ■ JDK 9 的重大变更\n\nJDK 类加载器以层次结构方式工作——引导类加载器位于层次结构的顶部。类加载器将类加载请求委派给其上级。例如，如果应用程序类加载器需要加载一个类，它会将请求委派给扩展类加载器，扩展类加载器又将请求委派给引导类加载器。如果引导类加载器无法加载该类，则扩展类加载器尝试加载它。如果扩展类加载器无法加载该类，则应用程序类加载器尝试加载它。如果应用程序类加载器无法加载它，则会抛出\
  \ ClassNotFoundException。\n\n引导类加载器是扩展类加载器的父加载器。扩展类加载器是应用程序类加载器的父加载器。引导类加载器没有父加载器。默认情况下，应用程序类加载器将是您创建的其他类加载器的父加载器。\n\
  \n引导类加载器加载由 Java 平台组成的引导类，包括 JAVA_HOME\\lib\\rt.jar 和其他几个运行时 JAR 中的类。它完全在虚拟机中实现。\n\
  \n您可以使用 -Xbootclasspath/p 和 -Xbootclasspath/a 命令行选项来前置和\n\n\n\n附加的引导类路径目录。你可以使用\
  \ `-Xbootclasspath` 选项指定引导类路径，该选项将替换默认的引导类路径。在运行时，`sun.boot.class.path` 系统属性包含引导类路径的只读值。JDK\
  \ 用 `null` 表示该类加载器。\n\n也就是说，你无法获取它的引用。例如，`Object` 类由引导类加载器加载，表达式 `Object.class.getClassLoader()`\
  \ 将返回 `null`。\n\n扩展类加载器用于加载通过扩展机制可用的类，这些类位于 `java.ext.dirs` 系统属性指定目录下的 JAR 文件中。要获取扩展类加载器的引用，你需要先获取应用程序类加载器的引用，然后对该引用调用\
  \ `getParent()` 方法。\n\n应用程序类加载器从由 `CLASSPATH` 环境变量或命令行选项 `-cp` 或 `-classpath` 指定的应用程序类路径中加载类。应用程序类加载器也被称为*系统类加载器*，这个名称有些用词不当，因为它错误地暗示它加载系统类。你可以使用\
  \ `ClassLoader` 类的静态方法 `getSystemClassLoader()` 获取应用程序类加载器的引用。\n\nJDK 9 为了向后兼容，保留了三级层次结构的类加载器架构。然而，在它们从模块系统加载类的方式上存在一些变化。图\
  \ 8-4 展示了 JDK 9 的类加载器层次结构。\n\n引导类加载器\n\n平台类加载器\n\n应用程序类加载器\n\n***图 8-4.** JDK 9\
  \ 中的类加载器层次结构*\n\n请注意，在 JDK 9 中，应用程序类加载器可以委托给平台类加载器以及引导类加载器；平台类加载器可以委托给引导类加载器和应用程序类加载器。以下文本详细描述了\
  \ JDK 9 类加载器的工作方式。\n\n在 JDK 9 中，引导类加载器在库代码和虚拟机中都有实现。\n\n为了向后兼容，在程序中它仍然用 `null` 表示。例如，`Object.class.getClassLoader()`\
  \ 仍然返回 `null`。然而，并非所有 Java SE 平台和 JDK 模块都由引导类加载器加载。举几个例子，由引导类加载器加载的模块包括 `java.base`、`java.logging`、`java.prefs`\
  \ 和 `java.desktop`。其他 Java SE 平台和 JDK 模块由接下来描述的平台类加载器和应用程序类加载器加载。用于指定引导类路径的选项 `-Xbootclasspath`\
  \ 和 `-Xbootclasspath/p`，以及系统属性 `sun.boot.class.path`，在 JDK 9 中不再受支持。`-Xbootclasspath/a`\
  \ 选项仍然受支持，其值存储在名为 `jdk.boot.class.path.append` 的系统属性中。\n\nJDK 9 不再支持扩展机制。然而，它保留了扩展类加载器，并赋予其一个新名称，称为*平台类加载器*。`ClassLoader`\
  \ 类包含一个新的静态方法 `getPlatformClassLoader()`，该方法返回平台类加载器的引用。表 8-2 包含了由平台类加载器加载的模块列表。平台类加载器还有另一个用途。默认情况下，由引导类加载器加载的类被授予所有权限。然而，有些类并不需要所有权限。在\
  \ JDK 9 中，这些类已被降权，并由平台类加载器加载，以提高安全性。\n\n***表 8-2.** JDK 9 中由平台类加载器加载的模块列表*\n\n`java.activation`\n\
  \n`java.xml.ws.annotation`\n\n`jdk.desktop`\n\n`java.compiler`\n\n`javafx.base`\n\
  \n`jdk.dynalink`\n\n`java.corba`\n\n`javafx.controls`\n\n`jdk.javaws`\n\n`java.jnlp`\n\
  \n`javafx.deploy`\n\n`jdk.jsobject`\n\n`java.scripting`\n\n`javafx.fxml`\n\n`jdk.localedata`\n\
  \n`java.se`\n\n`javafx.graphics`\n\n`jdk.naming.dns`\n\n`java.se.ee`\n\n`javafx.media`\n\
  \n`jdk.plugin`\n\n`java.security.jgss`\n\n`javafx.swing`\n\n`jdk.plugin.dom`\n\n\
  `java.smartcardio`\n\n`javafx.web`\n\n\n\njdk.plugin.server\n\njava.sql\n\njdk.accessibility\n\
  \njdk.scripting.nashorn\n\njava.sql.rowset\n\njdk.charsets\n\njdk.security.auth\n\
  \njava.transaction\n\njdk.crypto.cryptoki\n\njdk.security.jgss\n\njava.xml.bind\n\
  \njdk.crypto.ec\n\njdk.xml.dom\n\njava.xml.crypto\n\njdk.crypto.mscapi\n\njdk.zipfs\n\
  \njava.xml.ws\n\njdk.deploy\n\n应用程序类加载器会加载模块路径上的应用程序模块，以及一些提供工具或导出工具 API 的 JDK 模块，如表\
  \ 8-3 所示。你仍然可以使用 `ClassLoader` 类的静态方法 `getSystemClassLoader()` 来获取应用程序类加载器的引用。\n\
  \n第 8 章 ■ JDK 9 的重大变更\n\n***表 8-3.** JDK 9 中由应用程序类加载器加载的 JDK 模块列表*\n\njdk.attach\n\
  \njdk.jartool\n\njdk.jstatd\n\njdk.compiler\n\njdk.javadoc\n\njdk.pack\n\njdk.deploy.controlpanel\n\
  \njdk.jcmd\n\njdk.packager\n\njdk.editpad\n\njdk.jconsole\n\njdk.packager.services\n\
  \njdk.hotspot.agent\n\njdk.jdeps\n\njdk.policytool\n\njdk.internal.ed\n\njdk.jdi\n\
  \njdk.rmic\n\njdk.internal.jvmstat\n\njdk.jdwp.agent\n\njdk.scripting.nashorn.shell\n\
  \njdk.internal.le\n\njdk.jlink\n\njdk.xml.bind\n\njdk.internal.opt\n\njdk.jshell\n\
  \njdk.xml.ws\n\n■ **提示** 在 JDK 9 之前，扩展类加载器和应用程序类加载器是 `java.net.URLClassLoader` 类的实例。在\
  \ JDK 9 中，平台类加载器（即先前的扩展类加载器）和应用程序类加载器是内部 JDK 类的实例。如果你的代码依赖于 `URLClassLoader` 类特有的方法，那么你的代码在\
  \ JDK 9 中可能会失效。\n\nJDK 9 中的类加载机制发生了一些变化。三个内置的类加载器协同工作来加载类。当应用程序类加载器需要加载一个类时，它会搜索所有类加载器所定义的模块。如果某个合适的模块被定义给了这些类加载器中的一个，那么该加载器就会加载这个类——这意味着应用程序类加载器现在可以委托给启动类加载器和平台类加载器。如果在这些类加载器定义的命名模块中未找到某个类，应用程序类加载器会委托给它的父加载器，即平台类加载器。如果类仍未加载成功，应用程序类加载器会搜索类路径。如果在类路径上找到了该类，它会将其作为自身未命名模块的成员进行加载。如果在类路径上未找到该类，则会抛出\
  \ `ClassNotFoundException`。\n\n当平台类加载器需要加载一个类时，它会搜索所有类加载器所定义的模块。如果某个合适的模块被定义给了这些类加载器中的一个，那么该加载器就会加载这个类。这意味着平台类加载器既可以委托给启动类加载器，也可以委托给应用程序类加载器。\n\
  \n如果在这些类加载器定义的命名模块中未找到某个类，平台类加载器会委托给它的父加载器，即启动类加载器。\n\n当启动类加载器需要加载一个类时，它会搜索自己的命名模块列表。如果未找到该类，它会搜索通过命令行选项\
  \ `-Xbootclasspath/a` 指定的文件和目录列表。如果在启动类路径上找到了该类，它会将其作为自身未命名模块的成员进行加载。\n\n你可以观察类加载器以及它们所加载的模块和类的实际运行情况。JDK\
  \ 9 包含一个名为 `-Xlog:modules` 的选项，用于在虚拟机加载模块时记录调试或跟踪消息。其格式如下：\n\n`-Xlog:modules=<debug|trace>`\n\
  \n此选项会生成大量输出。我建议你将输出重定向到一个文件，以便于查看。\n\n以下是在 Windows 上运行素数检查器客户端程序并将模块加载消息记录到 `test.txt`\
  \ 文件中的命令。下面显示了部分输出。输出展示了定义模块的类加载器。\n\n第 8 章 ■ JDK 9 的重大变更\n\n`C:\\Java9Revealed>java\
