  \ 552 小时。当你截断到 HOURS 时，它会丢弃所有小于小时的部分，并返回 555 小时。将其截断到 MINUTES 会保留直到分钟的部分，并丢弃所有更小的部分，如秒和毫秒。\n\
  \nofInstant() 工厂方法\n\nTime API 的核心是效率和开发人员的便利性。在一些常用的用例中，日期和时间类型之间的转换迫使开发人员使用比必要更多的方法调用。其中两个这样的用例是：\n\
  \n• 将 java.util.Date 转换为 LocalDate\n\n• 将 Instant 转换为 LocalDate 和 LocalTime\n\n\
  第 20 章 ■ JDK 9 中的其他变更\n\nJDK 9 向 LocalDate 和 LocalTime 类添加了一个静态工厂方法 `ofInstant(Instant\
  \ instant, ZoneId zone)`，以简化这两种类型的转换。JDK 8 中 ZonedDateTime、OffsetDateTime、LocalDateTime\
  \ 和 OffsetTime 类已经拥有此工厂方法。以下代码片段展示了将 java.util.Date 转换为 LocalDate 的两种方式——JDK 8 方式和\
  \ JDK 9 方式：\n\n// 在 JDK 8 中\n\nDate dt = new Date();\n\nLocalDate ld= dt.toInstant()\n\
  \n.atZone(ZoneId.systemDefault())\n\n.toLocalDate();\n\nSystem.out.println(\"Current\
  \ Local Date: \" + ld);\n\n// 在 JDK 9 中\n\nLocalDate ld2 = LocalDate.ofInstant(dt.toInstant(),\
  \ ZoneId.systemDefault());\n\nSystem.out.println(\"Current Local Date: \" + ld2);\n\
  \nCurrent Local Date: 2017-02-11\n\nCurrent Local Date: 2017-02-11\n\n以下代码片段展示了将\
  \ Instant 转换为 LocalDate 和 LocalTime 的两种方式——JDK 8 方式和 JDK 9 方式：\n\n// 在 JDK 8 中\n\
  \nInstant now = Instant.now();\n\nZoneId zone = ZoneId.systemDefault();\n\nZonedDateTime\
  \ zdt = now.atZone(zone);\n\nLocalDate ld3 = zdt.toLocalDate();\n\nLocalTime lt3\
  \ = zdt.toLocalTime();\n\nSystem.out.println(\"Local Date: \" + ld3 + \", Local\
  \ Time:\" + lt3);\n\n// 在 JDK 9 中\n\nLocalDate ld4 = LocalDate.ofInstant(now, zone);\n\
  \nLocalTime lt4 = LocalTime.ofInstant(now, zone);\n\nSystem.out.println(\"Local\
  \ Date: \" + ld4 + \", Local Time:\" + lt4);\n\nLocal Date: 2017-02-11, Local Time:22:13:31.919339400\n\
  \nLocal Date: 2017-02-11, Local Time:22:13:31.919339400\n\n获取纪元秒数\n\n有时你需要获取自纪元\
  \ 1970-01-01T00:00:00Z 以来的秒数\n\n\n\n来自 `LocalDate`、`LocalTime` 和 `OffsetTime`。在\
  \ JDK 8 中，`OffsetDateTime` 类包含一个用于此目的的 `toEpochSecond()` 方法。如果你想从 `ZonedDateTime`\
  \ 获取自纪元以来的秒数，你必须使用其 `toOffsetDateTime()` 方法将其转换为 `OffsetDateTime`，然后使用 `OffsetDateTime`\
  \ 类的 `toEpochSecond()` 方法。JDK 8 没有为 `LocalDate`、`LocalTime` 和 `OffsetTime` 类提供 `toEpochSecond()`\
  \ 方法。JDK 9 添加了这些方法：\n\n• `LocalDate.toEpochSecond(LocalTime time, ZoneOffset offset)`\n\
  \n• `LocalTime.toEpochSecond(LocalDate date, ZoneOffset offset)`\n\n• `OffsetTime.toEpochSecond(LocalDate\
  \ date)`\n\n第 20 章 ■ JDK 9 中的其他变更\n\n为什么这些类中 `toEpochSecond()` 方法的签名不同？要获取自纪元 1970-01-01T00:00:00Z\
  \ 以来的秒数，你需要定义另一个时刻。一个时刻可以由三部分组成：日期、时间、时区偏移量。`LocalDate` 和 `LocalTime` 类只包含时刻三部分中的一部分。`OffsetTime`\
  \ 类包含两部分——时间和偏移量。缺失的部分需要由这些类作为参数指定。因此，这些类包含的 `toEpochSecond()` 方法，其参数用于指定定义时刻所需的缺失部分。以下代码片段使用相同的时刻，通过三个类获取自纪元以来的秒数：\n\
  \n```java\nLocalDate ld = LocalDate.of(2017, 2, 12);\nLocalTime lt = LocalTime.of(9,\
  \ 15, 45);\nZoneOffset offset = ZoneOffset.ofHours(6);\nOffsetTime ot = OffsetTime.of(lt,\
  \ offset);\n\nlong s1 = ld.toEpochSecond(lt, offset);\nlong s2 = lt.toEpochSecond(ld,\
  \ offset);\nlong s3 = ot.toEpochSecond(ld);\n\nSystem.out.println(\"LocalDate.toEpochSecond():\
  \ \" + s1);\nSystem.out.println(\"LocalTime.toEpochSecond(): \" + s2);\nSystem.out.println(\"\
  OffsetTime.toEpochSecond(): \" + s3);\n```\n\n输出：\n```\nLocalDate.toEpochSecond():\
  \ 1486869345\nLocalTime.toEpochSecond(): 1486869345\nOffsetTime.toEpochSecond():\
  \ 1486869345\n```\n\n**LocalDate 的流**\n\nJDK 9 使得在两个给定日期之间遍历所有日期变得容易——可以一次一天，也可以一次一个给定的周期。以下两个方法已添加到\
  \ `LocalDate` 类中：\n\n• `Stream<LocalDate> datesUntil(LocalDate endExclusive)`\n\n\
  • `Stream<LocalDate> datesUntil(LocalDate endExclusive, Period step)`\n\n这些方法生成一个有序的顺序\
  \ `LocalDate` 流。流中的第一个元素是调用该方法的 `LocalDate`。`datesUntil(LocalDate endExclusive)`\
  \ 方法每次将流中的元素递增一天，而 `datesUntil(LocalDate endExclusive, Period step)` 方法则按指定的步长递增。指定的结束日期是排除的。你可以对返回的流进行多种有用的计算。以下代码片段统计了\
  \ 2017 年星期日的数量。请注意，代码使用 2018 年 1 月 1 日作为结束日期（排除），这将使流返回 2017 年的所有日期。\n\n```java\n\
  long sundaysIn2017 = LocalDate.of(2017, 1, 1)\n    .datesUntil(LocalDate.of(2018,\
  \ 1, 1))\n    .filter(ld -> ld.getDayOfWeek() == DayOfWeek.SUNDAY)\n    .count();\n\
  System.out.println(\"Number of Sundays in 2017: \" + sundaysIn2017);\n```\n\n输出：\n\
  ```\nNumber of Sundays in 2017: 53\n```\n\n第 20 章 ■ JDK 9 中的其他变更\n\n以下代码片段打印了 2017\
  \ 年 1 月 1 日（包含）到 2022 年 1 月 1 日（排除）之间所有既是星期五又是当月 13 号的日期：\n\n```java\nSystem.out.println(\"\
  Fridays that fall on 13th of the month between 2017 - 2021: \");\nLocalDate.of(2017,\
  \ 1, 1)\n    .datesUntil(LocalDate.of(2022, 1, 1))\n    .filter(ld -> ld.getDayOfMonth()\
  \ == 13 && ld.getDayOfWeek() == DayOfWeek.FRIDAY)\n    .forEach(System.out::println);\n\
  ```\n\n输出（2017 年至 2021 年（含）之间落在 13 号的星期五）：\n```\n2017-01-13\n2017-10-13\n2018-04-13\n\
  2018-07-13\n2019-09-13\n2019-12-13\n2020-03-13\n2020-11-13\n2021-08-13\n```\n\n\
  以下代码片段打印了 2017 年每个月的最后一天：\n\n```java\nSystem.out.println(\"Last Day of months in\
  \ 2017:\");\nLocalDate.of(2017, 1, 31)\n    .datesUntil(LocalDate.of(2018, 1, 1),\
  \ Period.ofMonths(1))\n```\n\n\n\n.map(ld -> ld.format(DateTimeFormatter.ofPattern(\"\
  EEE MMM dd, yyyy\")))\n\n.forEach(System.out::println);\n\n2017 年各月最后一天：\n\n2017\
  \ 年 1 月 31 日 星期二\n\n2017 年 2 月 28 日 星期二\n\n2017 年 3 月 31 日 星期五\n\n2017 年 4 月 30\
  \ 日 星期日\n\n2017 年 5 月 31 日 星期三\n\n2017 年 6 月 30 日 星期五\n\n2017 年 7 月 31 日 星期一\n\n\
  2017 年 8 月 31 日 星期四\n\n2017 年 9 月 30 日 星期六\n\n2017 年 10 月 31 日 星期二\n\n2017 年 11\
  \ 月 30 日 星期四\n\n2017 年 12 月 31 日 星期日\n\n第 20 章 ■ JDK 9 中的其他变更\n\n新的格式化选项\n\nJDK\
  \ 9 为时间 API 新增了几个格式化选项。以下部分将详细描述每一项变更。\n\n修正儒略日格式化器\n\n你可以在日期时间格式化模式中使用小写字母 `g`，它会将日期部分格式化为一个整数形式的修正儒略日。你可以重复使用多个\
  \ `g`，例如 `ggg`，如果结果中的数字位数少于指定的 `g` 的数量，则会在结果左侧补零。网页 [`www.unicode.org/reports/tr35/tr35-41/tr35-dates.html#Date_Format_Patterns`](http://www.unicode.org/reports/tr35/tr35-41/tr35-dates.html#Date_Format_Patterns)\
  \ 定义了格式化器中字母 `g` 的含义如下：\n\n*修正儒略日。这与传统的儒略日编号有两个不同之处。首先，它以当地时区午夜而非格林尼治正午为分界点。其次，它是一个本地数字；也就是说，它依赖于本地时区。可以将其视为一个包含所有日期相关字段的单一数字。*\n\
  \n■ **提示** 大写字母 `G` 在 JDK 8 中被定义为日期和时间格式化器符号，它将输入格式化为 AD、Anno Domini、A、BC、Before\
  \ Christ 和 B。\n\n以下代码片段展示了如何使用修正儒略日格式化字符 `g` 来格式化一个 `ZonedDateTime`：\n\nZonedDateTime\
  \ zdt = ZonedDateTime.now();\n\nSystem.out.println(\"当前 ZonedDateTime: \" + zdt);\n\
  \nSystem.out.println(\"修正儒略日 (g): \" +\n\nzdt.format(DateTimeFormatter.ofPattern(\"\
  g\")));\n\nSystem.out.println(\"修正儒略日 (ggg): \" +\n\nzdt.format(DateTimeFormatter.ofPattern(\"\
  ggg\")));\n\nSystem.out.println(\"修正儒略日 (gggggg): \" +\n\nzdt.format(DateTimeFormatter.ofPattern(\"\
  gggggg\")));\n\n当前 ZonedDateTime: 2017-02-12T11:49:03.364431100-06:00[America/Chicago]\n\
  \n修正儒略日 (g): 57796\n\n修正儒略日 (ggg): 57796\n\n修正儒略日 (gggggg): 057796\n\n通用时区名称\n\n\
  JDK 8 有两个字母 `V` 和 `z` 用于格式化日期和时间的时区。字母 `V` 生成时区 ID，例如 \"America/Los_Angeles; Z;\
  \ -08:30\"，字母 `z` 生成时区名称，例如 Central Standard Time 和 CST。\n\n第 20 章 ■ JDK 9 中的其他变更\n\
  \nJDK 9 新增了小写字母 `v` 作为格式化器符号，用于生成通用的非位置时区名称，例如 Central Time 或 CT。术语“非位置”意味着它不标识相对于\
  \ UTC 的偏移量。它指的是挂钟时间——即墙上时钟显示的时间。例如，中部时间上午 8 点在 2017 年 3 月 1 日的偏移量为 UTC-06，而在 2017\
  \ 年 3 月 19 日的偏移量为 UTC-05。通用的非位置时区名称不指定时区偏移量。你可以使用两种格式——`v` 和 `vvvv`——分别生成简写形式（例如\
  \ CT）和完整形式（例如 Central Time）的通用非位置时区名称。以下代码片段展示了 `V`、`z` 和 `v` 格式化符号产生的格式化结果之间的差异：\
  \ ZonedDateTime zdt = ZonedDateTime.now();\n\nSystem.out.println(\"当前 ZonedDateTime:\
  \ \" + zdt);\n\nSystem.out.println(\"使用 VV: \" +\n\nzdt.format(DateTimeFormatter.ofPattern(\"\
  MM/dd/yyyy HH:mm VV\")));\n\nSystem.out.println(\"使用 z: \" +\n\nzdt.format(DateTimeFormatter.ofPattern(\"\
  MM/dd/yyyy HH:mm z\")));\n\nSystem.out.println(\"使用 zzzz: \" +\n\nzdt.format(DateTimeFormatter.ofPattern(\"\
  MM/dd/yyyy HH:mm zzzz\")));\n\nSystem.out.println(\"使用 v: \" +\n\nzdt.format(DateTimeFormatter.ofPattern(\"\
  MM/dd/yyyy HH:mm v\")));\n\nSystem.out.println(\"使用 vvvv: \" +\n\nzdt.format(DateTimeFormatter.ofPattern(\"\
  MM/dd/yyyy HH:mm vvvv\")));\n\n\n\n当前 ZonedDateTime：2017-02-12T12:30:08.975373900-06:00[America/Chicago]\n\
  \n使用 VV：02/12/2017 12:30 America/Chicago\n\n使用 z：02/12/2017 12:30 CST\n\n使用 zzzz：02/12/2017\
  \ 12:30 Central Standard Time\n\n使用 v：02/12/2017 12:30 CT\n\n使用 vvvv：02/12/2017\
  \ 12:30 Central Time\n\n使用 Scanner 进行流操作\n\nJDK 9 为 `java.util.Scanner` 新增了以下三个方法。每个方法都返回一个\
  \ `Stream`：\n\n• `Stream<MatchResult> findAll(String patternString)`\n\n• `Stream<MatchResult>\
  \ findAll(Pattern pattern)`\n\n• `Stream<String> tokens()`\n\n`findAll()` 方法返回一个包含所有匹配结果的流。调用\
  \ `findAll(patternString)` 等同于调用 `findAll(Pattern.compile(patternString))`。`tokens()`\
  \ 方法使用当前分隔符从扫描器中返回一个令牌流。清单 20-12 包含一个程序，演示了如何使用 `findAll()` 方法仅从字符串中收集单词。\n\n***清单\
  \ 20-12.*** 一个使用 Scanner 类打印字符串中单词的 ScannerTest 类\n\n// ScannerTest.java\n\npackage\
  \ com.jdojo.misc;\n\nimport java.util.List;\n\nimport java.util.Scanner;\n\nimport\
  \ java.util.regex.MatchResult;\n\nimport static java.util.stream.Collectors.toList;\n\
  \n第 20 章 ■ JDK 9 中的其他变更\n\npublic class ScannerTest {\n\npublic static void main(String[]\
  \ args) {\n\nString patternString = \"\\\\b\\\\w+\\\\b\";\n\nString input = \"A\
  \ test string,\\n which contains a new line.\";\n\nList<String> words = new Scanner(input)\n\
  \n.findAll(patternString)\n\n.map(MatchResult::group)\n\n.collect(toList());\n\n\
  System.out.println(\"Input: \" + input);\n\nSystem.out.println(\"Words: \" + words);\n\
  \n}\n\n}\n\nInput: A test string,\n\nwhich contains a new line.\n\nWords: [A, test,\
  \ string, which, contains, a, new, line]\n\nMatcher 类的增强\n\n`java.util.regex.Matcher`\
  \ 类在 JDK 9 中新增了几个方法：\n\n• `Matcher appendReplacement(StringBuilder sb, String replacement)`\n\
  \n• `StringBuilder appendTail(StringBuilder sb)`\n\n• `String replaceAll(Function<MatchResult,String>\
  \ replacer)`\n\n• `String replaceFirst(Function<MatchResult,String> replacer)`\n\
  \n• `Stream<MatchResult> results()`\n\nJDK 8 中的 `Matcher` 类已经包含了此列表中的前四个方法。在 JDK\
  \ 9 中，它们被重载了。`appendReplacement()` 和 `appendTail()` 方法之前与 `StringBuffer` 一起使用。现在它们也可以与\
  \ `StringBuilder` 一起使用。`replaceAll()` 和 `replaceFirst()` 方法之前接受一个 `String` 作为参数。在\
  \ JDK 9 中，它们被重载为接受一个 `Function<T,R>` 作为参数。\n\n`results()` 方法以流的形式返回匹配结果，其元素类型为 `MatchResult`。你可以查询\
  \ `MatchResult` 以字符串形式获取结果。在 JDK 8 中，也可以将 `Matcher` 的结果作为流来处理。然而，其逻辑并不直接。`results()`\
  \ 方法不会重置匹配器。如果你想重用匹配器，别忘了调用其 `reset()` 方法将其重置到所需位置。清单 20-13 展示了此方法的一些有趣用法。\n\n***清单\
  \ 20-13.*** 一个演示 Matcher 类中 results() 方法用法的 MatcherTest 类\n\n// MatcherTest.java\n\
  \npackage com.jdojo.misc;\n\nimport java.util.List;\n\nimport java.util.Set;\n\n\
  import java.util.regex.Matcher;\n\nimport java.util.regex.Pattern;\n\nimport static\
  \ java.util.stream.Collectors.toList;\n\nimport static java.util.stream.Collectors.toSet;\n\
  \n第 20 章 ■ JDK 9 中的其他变更\n\npublic class MatcherTest {\n\npublic static void main(String[]\
  \ args) {\n\n// 一个匹配 7 位或 10 位电话号码的正则表达式\n\nString regex = \"\\\\b(\\\\d{3})?(\\\
  \\d{3})(\\\\d{4})\\\\b\";\n\n// 一个输入字符串\n\nString input = \"1, 3342229999, 2330001,\
  \ 6159996666, 123, 3340909090\";\n\n// 创建一个匹配器\n\nMatcher matcher = Pattern.compile(regex)\n\
  \n.matcher(input);\n\n// 将格式化后的电话号码收集到列表中\n\nList<String> phones = matcher.results()\n\
  \n.map(mr -> (mr.group(1) == null ? \"\" : \"(\" + mr.group(1) + \") \")\n\n+ mr.group(2)\
  \ + \"-\" + mr.group(3))\n\n.collect(toList());\n\nSystem.out.println(\"Phones:\
  \ \" + phones);\n\n// 重置匹配器，以便我们可以从头开始重用\n\nmatcher.reset();\n\n// 获取不同的区号\n\n\n\
  \n`Set<String> areaCodes = matcher.results()`\n\n`.filter(mr -> mr.group(1) != null)`\n\
  \n`.map(mr -> mr.group(1))`\n\n`.collect(toSet());`\n\n`System.out.println(\"Distinct\
  \ Area Codes:: \" + areaCodes);`\n\n`}`\n\n`}`\n\n电话：[(334) 222-9999, 233-0001,\
  \ (615) 999-6666, (334) 090-9090]\n\n不同区号：：[334, 615]\n\n`main()` 方法声明了两个局部变量，名为\
  \ `regex` 和 `input`。`regex` 变量包含一个用于匹配 7 位或 10 位数字的正则表达式。你将用它来在输入字符串中查找电话号码。`input`\
  \ 变量存储了文本，其中嵌入了电话号码。\n\n`// 一个用于匹配 7 位或 10 位电话号码的正则表达式`\n\n`String regex = \"\\\\\
  b(\\\\d{3})?(\\\\d{3})(\\\\d{4})\\\\b\";`\n\n`// 一个输入字符串`\n\n`String input = \"\
  1, 3342229999, 2330001, 6159996666, 123, 3340909090\";`\n\n接下来，你将正则表达式编译为一个 `Pattern`\
  \ 对象并获取一个匹配器：\n\n`// 创建一个匹配器`\n\n`Matcher matcher = Pattern.compile(regex)`\n\n\
  `.matcher(input);`\n\n第 20 章 ■ JDK 9 中的其他变更\n\n你希望将 10 位电话号码格式化为 (nnn) nnn-nnnn，将\
  \ 7 位电话号码格式化为 nnn-nnnn。最后，你希望将所有格式化后的电话号码收集到一个 `List<String>` 中。以下语句实现了这一点：\n\n\
  `// 将格式化后的电话号码收集到一个列表中`\n\n`List<String> phones = matcher.results()`\n\n`.map(mr\
  \ -> (mr.group(1) == null ? \"\" : \"(\" + mr.group(1) + \") \")`\n\n`+ mr.group(2)\
  \ + \"-\" + mr.group(3))`\n\n`.collect(toList());`\n\n请注意 `map()` 方法的使用，它接收一个 `MatchResult`\
  \ 并返回一个格式化为字符串的电话号码。当匹配到的是 7 位电话号码时，分组 1 将为 null。现在，你希望重用该匹配器来查找 10 位电话号码中的不同区号。你必须重置匹配器，以便下一次匹配从输入字符串的开头开始：\n\
  \n`// 重置匹配器，以便我们可以从头开始重用它`\n\n`matcher.reset();`\n\n`MatchResult` 中的第一个分组包含区号。你需要过滤掉\
  \ 7 位电话号码，并将分组 1 的值收集到一个 `Set<String>` 中，以获取一组不同的区号。以下语句实现了这一点：\n\n`// 获取不同的区号`\n\
  \n`Set<String> areaCodes = matcher.results()`\n\n`.filter(mr -> mr.group(1) != null)`\n\
  \n`.map(mr -> mr.group(1))`\n\n`.collect(toSet());`\n\n**Objects 类的增强**\n\n`java.util.Objects`\
  \ 类由对对象进行操作的静态实用方法组成。通常，它们用于验证方法的参数，例如，检查方法的参数是否为 null。JDK 9 向此类添加了以下静态方法：\n\n*\
  \   `<T> T requireNonNullElse(T obj, T defaultObj)`\n*   `<T> T requireNonNullElseGet(T\
  \ obj, Supplier<? extends T> supplier)`\n*   `int checkFromIndexSize(int fromIndex,\
  \ int size, int length)`\n*   `int checkFromToIndex(int fromIndex, int toIndex,\
  \ int length)`\n*   `int checkIndex(int index, int length)`\n\nJDK 8 已经有三个版本的 `requireNonNull()`\
  \ 方法。该方法用于检查值是否为非 null。如果值为 null，则会抛出 `NullPointerException`。JDK 9 又添加了该方法的两个版本。\n\
  \n`requireNonNullElse(T obj, T defaultObj)` 方法在 `obj` 非 null 时返回 `obj`。如果 `obj`\
  \ 为 null 且 `defaultObj` 非 null，则返回 `defaultObj`。如果 `obj` 和 `defaultObj` 都为 null，则会抛出\
  \ `NullPointerException`。\n\n第 20 章 ■ JDK 9 中的其他变更\n\n`requireNonNullElseGet(T obj,\
  \ Supplier<? extends T> supplier)` 方法的工作方式与 `requireNonNullElse(T obj, T defaultObj)`\
  \ 方法相同，不同之处在于前者使用一个供应者来获取默认值。如果 `obj` 非 null，则返回 `obj`。如果供应者非 null 且其返回一个非 null\
  \ 值，则返回从供应者返回的值。否则，会抛出 `NullPointerException`。\n\n名为 `checkXxx()` 的方法旨在用于检查索引或子范围是否在某个范围内。当你处理数组和集合，并且需要处理索引和子范围时，它们非常有用。如果索引或子范围超出范围，这些方法会抛出\
  \ `IndexOutOfBoundsException`。\n\n`checkFromIndexSize(int fromIndex, int size, int\
  \ length)` 方法检查指定的\n\n\n\n子范围，即从 `fromIndex`（包含）到 `fromIndex + size`（不包含），必须位于范围\
  \ 0（包含）到 `length`（不包含）之内。如果任一参数为负整数，或子范围超出范围，则会抛出 `IndexOutOfBoundsException`。如果子范围在范围内，则返回\
  \ `fromIndex`。\n\n假设你有一个方法，它接受一个索引和大小，并返回数组或列表中的一个子范围。\n\n你可以使用此方法来检查请求的子范围是否在数组或列表的范围内。\n\
  \n`checkFromToIndex(int fromIndex, int toIndex, int length)` 方法检查指定的子范围（从 `fromIndex`（包含）到\
  \ `toIndex`（不包含））是否在范围 0（包含）到 `length`（不包含）之内。如果任一参数为负整数，或子范围超出范围，则会抛出 `IndexOutOfBoundsException`。如果子范围在范围内，则返回\
  \ `fromIndex`。此方法在处理数组和列表时，对于子范围检查非常有用。\n\n`checkIndex(int index, int length)` 方法检查指定的索引是否在范围\
  \ 0（包含）到 `length`（不包含）之内。如果任一参数为负整数，或索引超出范围，则会抛出 `IndexOutOfBoundsException`。如果索引在范围内，则返回该索引。当一个方法接收一个索引并返回数组或列表中该索引处的值时，此方法非常有用。\n\
  \n**比较数组**\n\n`java.util.Arrays` 类包含静态实用方法，可让你对数组执行各种操作，例如排序、比较、转换为流等。在 JDK 9 中，该类新增了几个方法，允许你比较数组和数组切片。新方法分为三类：\n\
  \n•   比较两个数组或其切片是否相等\n•   按字典顺序比较两个数组\n•   查找两个数组中第一个不匹配的索引\n\n添加到该类的列表非常庞大。每个类别中的方法都针对所有原始类型和\
  \ `Object` 数组进行了重载。为节省篇幅，此处不一一列出。有关完整列表，请参阅 `Arrays` 类的 API 文档。在本节末尾，我将使用两个 `int`\
  \ 数组来举例说明。\n\n`equals()` 方法允许你比较两个数组是否相等。如果数组或切片中的元素数量相同，并且数组或切片中所有对应的元素对都相等，则认为两个数组相等。以下是\
  \ `int` 类型的 `equals()` 方法的两个版本：\n\n•   `boolean equals(int[] a, int[] b)`\n•   `boolean\
  \ equals(int[] a, int aFromIndex, int aToIndex, int[] b, int bFromIndex, int bToIndex)`\n\
  \n第一个版本允许你比较两个数组是否相等，它存在于 JDK 9 之前。第二个版本允许你比较两个数组的切片是否相等，这是在 JDK 9 中新增的。`fromIndex`（包含）和\
  \ `toIndex`（不包含）参数决定了要比较的两个数组的范围。如果两个数组相等，则该方法返回 `true`，否则返回 `false`。如果两个数组都为 `null`，则认为它们相等。\n\
  \n第 20 章 ■ JDK 9 中的其他变更\n\nJDK 9 新增了几个名为 `compare()` 和 `compareUnsigned()` 的方法。这两个方法按字典顺序比较数组或数组切片中的元素。`compareUnsigned()`\
  \ 方法将整数值视为无符号数。`null` 数组在字典顺序上小于非 `null` 数组。两个 `null` 数组相等。\n\n以下是 `int` 类型的 `compare()`\
  \ 方法的两个版本：\n\n•   `int compare(int[] a, int[] b)`\n•   `int compare(int[] a, int\
  \ aFromIndex, int aToIndex, int[] b, int bFromIndex, int bToIndex)`\n\n如果第一个和第二个数组（或切片）相等且包含相同顺序的相同元素，则\
  \ `compare()` 方法返回 0；如果第一个数组（或切片）在字典顺序上小于第二个数组（或切片），则返回小于 0 的值；如果第一个数组（或切片）在字典顺序上大于第二个数组（或切片），则返回大于\
  \ 0 的值。\n\n`mismatch()` 方法比较两个数组或数组切片。以下是 `int` 类型的 `mismatch()` 方法的两个版本：\n\n• \
  \  `int mismatch(int[] a, int[] b)`\n•   `int mismatch(int[] a, int aFromIndex,\
  \ int aToIndex, int[] b, int bFromIndex, int bToIndex)`\n\n`mismatch()` 方法返回第一个不匹配的索引。如果没有不匹配，则返回\
  \ -1。如果任一数组为 `null`，则抛出 `NullPointerException`。清单 20-14 con 包含一个完整的程序，用于比较两个数组及其切片。该程序使用了两个\
  \ `int` 数组。\n\n***清单 20-14.*** 使用 Arrays 类方法比较数组和数组切片\n\n```java\n// ArrayComparision.java\n\
  package com.jdojo.misc;\nimport java.util.Arrays;\npublic class ArrayComparison\
  \ {\n    public static void main(String[] args) {\n        int[] a1 = {1, 2, 3,\
  \ 4, 5};\n        int[] a2 = {1, 2, 7, 4, 5};\n        int[] a3 = {1, 2, 3, 4, 5};\n\
  \        // 打印原始数组\n        System.out.println(\"三个数组:\");\n        System.out.println(\"\
  a1: \" + Arrays.toString(a1));\n        System.out.println(\"a2: \" + Arrays.toString(a2));\n\
  \        System.out.println(\"a3: \" + Arrays.toString(a3));\n        // 比较数组是否相等\n\
  \        System.out.println(\"\\n 使用 equals() 方法比较数组:\");\n        System.out.println(\"\
  Arrays.equals(a1, a2): \" + Arrays.equals(a1, a2));\n        System.out.println(\"\
  Arrays.equals(a1, a3): \" + Arrays.equals(a1, a3));\n        System.out.println(\"\
  Arrays.equals(a1, 0, 2, a2, 0, 2): \" +\n                Arrays.equals(a1, 0, 2,\
  \ a2, 0, 2));\n        // 按字典顺序比较数组\n        System.out.println(\"\\n 使用 compare()\
  \ 方法比较数组:\");\n        System.out.println(\"Arrays.compare(a1, a2): \" + Arrays.compare(a1,\
  \ a2));\n        System.out.println(\"Arrays.compare(a2, a1): \" + Arrays.compare(a2,\
  \ a1));\n        System.out.println(\"Arrays.compare(a1, a3): \" + Arrays.compare(a1,\
  \ a3));\n        System.out.println(\"Arrays.compare(a1, 0, 2, a2, 0, 2): \" +\n\
  \                Arrays.compare(a1, 0, 2, a2, 0, 2));\n        // 查找数组中的不匹配索引\n\
  \        System.out.println(\"\\n 使用 mismatch() 方法查找不匹配:\");\n        System.out.println(\"\
  Arrays.mismatch(a1, a2): \" + Arrays.mismatch(a1, a2));\n        System.out.println(\"\
  Arrays.mismatch(a1, a3): \" + Arrays.mismatch(a1, a3));\n        System.out.println(\"\
  Arrays.mismatch(a1, 0, 5, a2, 0, 1): \" +\n                Arrays.mismatch(a1, 0,\
  \ 5, a2, 0, 1));\n    }\n}\n```\n\n三个数组:\na1: [1, 2, 3, 4, 5]\na2: [1, 2, 7, 4,\
  \ 5]\na3: [1, 2, 3, 4, 5]\n\n使用 equals() 方法比较数组:\nArrays.equals(a1, a2): false\n\
  Arrays.equals(a1, a3): true\nArrays.equals(a1, 0, 2, a2, 0, 2): true\n\n使用 compare()\
  \ 方法比较数组:\nArrays.compare(a1, a2): -1\nArrays.compare(a2, a1): 1\nArrays.compare(a1,\
