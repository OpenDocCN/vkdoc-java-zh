  \ 类添加了一个方法：\n\nDuration truncatedTo(TemporalUnit unit)\n\n`truncatedTo()` 方法返回持续时间的副本，其中小于指定单位的逻辑时间单位被截断。指定的时间单位必须是\
  \ DAYS 或更小。指定大于 DAYS 的时间单位（如 WEEKS 和 YEARS）会抛出运行时异常。\n\n■ **提示** `truncatedTo(TemporalUnit\
