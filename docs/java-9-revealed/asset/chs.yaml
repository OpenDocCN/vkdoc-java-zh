  \ 项目，并对所有项目运行“清理并构建”。\n\n**第 2 章**\n\n**模块系统**\n\n在本章中，您将学习：\n\n• JDK 9 之前 Java\
  \ 源代码的编写、打包和部署方式，以及该方法存在的根本问题\n\n• JDK 9 中模块是什么\n\n• 如何声明模块及其依赖关系\n\n• 如何打包模块\n\n\
  • 什么是模块路径\n\n• 什么是可观察模块\n\n• 如何打印可观察模块列表\n\n• 如何打印模块的描述信息\n\n本章旨在让您对 JDK 9 中引入的模块系统有一个简要的概念性概述。\n\
  \n后续章节将通过示例详细阐述所有这些概念。如果您第一次未能理解所有与模块相关的概念，请不要担心。一旦您积累了开发模块化代码的经验，可以回过头来重新阅读本章。\n\
  \nJava 9 之前的生活\n\n在 JDK 9 之前，开发 Java 应用程序涉及以下步骤：\n\n• Java 源代码以 Java 类型的形式编写，例如类、接口、枚举和注解。\n\
  \n• 类型被组织到包中。一个类型总是属于某个包——无论是显式还是隐式。包是类型的逻辑集合，本质上为其包含的类型提供了命名空间。一个包可能包含公有类型、私有类型，以及一些即使声明为公有但实际上是内部实现的类型。\n\
  \n• 类型的编译后代码被打包到一个或多个 JAR 文件中，也称为\n\n\n\n应用程序 JAR 文件，因为它们包含了应用程序代码。一个包中的代码可能跨越多个\
  \ JAR 文件。\n\n© Kishori Sharan 2017\n\nK. Sharan, *Java 9 揭密*, DOI 10.1007/978-1-4842-2592-9_2\n\
  \n第 2 章 ■ 模块系统\n\n• 应用程序可能会使用库。库也以一个或多个 JAR 文件的形式提供，也称为库 JAR 文件。\n\n• 通过将所有 JAR\
  \ 文件（应用程序 JAR 文件和库 JAR 文件）放置在类路径上来部署应用程序。\n\n图 2-1 展示了打包在 JAR 文件中的典型代码结构。该图仅显示了包和类型，排除了其他内容，例如\
  \ `manifest.mf` 文件和资源文件。\n\npackage1\n\npackage2\n\nType1\n\nType4\n\nType2\n\n\
  Type5\n\nType3\n\nType6\n\n***图 2-1.** JAR 文件中的代码结构*\n\n二十多年来，Java 社区一直沿用这种方式编写、编译、打包和部署\
  \ Java 代码。然而，这二十年的历程并非如你所愿般一帆风顺！以这种方式组织和运行 Java 代码存在固有的问题：\n\n• 包仅仅是类型的容器，没有强制任何可访问性边界。包中的公共类型在所有其他包中都是可访问的；无法阻止包中公共类型的这种全局可见性。\n\
  \n• 除了以 `java` 和 `javax` 开头的包之外，其他包都是开放可扩展的。如果你在一个 JAR 文件中拥有包级访问权限的类型，那么在其他定义了同名包中类型的\
  \ JAR 文件中也可以访问这些类型。\n\n• Java 运行时看到的是从一系列 JAR 文件中加载的一组扁平化的包。无法知道不同 JAR 文件中是否存在同一类型的多个副本。运行时将加载在类路径上首先遇到的\
  \ JAR 文件中的类型。\n\n• 你可能会遇到运行时缺少类型的情况，这是因为类路径中没有包含应用程序所需的某个 JAR 文件。当代码尝试使用这些缺失的类型时，它们就会以运行时错误的形式暴露出来。\n\
  \n• 无法在启动时知道应用程序中使用的某些类型是否缺失。你也可能包含了一个错误版本的 JAR 文件，并在运行时收到错误。\n\n这些问题在 Java 社区中非常普遍且臭名昭著，以至于它们有了一个名字——*JAR\
  \ 地狱*。\n\n在我担任 Java 开发人员的工作中，我曾多次经历 JAR 地狱！术语“JAR 地狱”甚至在维基百科上有自己的词条，网址为 [`en.wikipedia.org/wiki/Java_Classloader#JAR_hell。`](https://en.wikipedia.org/wiki/Java_Classloader#JAR_hell)\n\
  \nJDK 和 JRE 的打包也是一个问题。它们以巨大的单体制品形式提供，从而增加了下载时间、启动时间和内存占用。单体 JRE 使得在内存较小的设备上使用 Java\
  \ 变得不可能。如果你将 Java 应用程序部署到云端，你需要为使用的内存付费。通常情况下，单体 JRE 使用的内存比实际需要的多，这意味着你为云服务支付了更多费用。Java\
  \ 8 中引入的紧凑配置文件在减小 JRE 大小（从而减少运行时内存占用）方面迈出了一步，它允许你将 JRE 的一个子集打包到一个称为*紧凑配置文件*的自定义运行时映像中。\n\
  \n第 2 章 ■ 模块系统\n\n■ **提示** 在早期访问版本中，JDK 9 包含了三个模块，分别名为 `java.compact1`、`java.compact2`\
  \ 和 `java.compact3`，它们对应于 JDK 8 中的三个紧凑配置文件。后来，由于 JDK 9 中的模块使你可以完全控制自定义 JRE 中包含的模块列表，因此这些模块被移除了。\n\
  \n你可以将 JDK 9 之前 JDK/JRE 中的这些问题分为三类：\n\n• 不可靠的配置\n\n• 弱封装\n\n• JDK/JRE 的单体结构\n\n\
  图 2-2 展示了 Java 运行时如何看待类路径上的所有 JAR 文件，以及如何从一个 JAR 文件中访问另一个 JAR 文件中的代码，除了类型声明在访问控制方面指定的限制外，没有任何其他限制。\n\
  \nJAR\n\nJAR\n\nJAR\n\nJAR\n\nJAR\n\nJAR\n\nJAR\n\nJAR\n\nJAR\n\n\n\n***图 2-2.**\
  \ Java 运行时加载和访问的类路径上的 JAR 文件*\n\nJava 9 通过引入一种开发、打包和部署 Java 应用程序的新方式解决了这些问题。在 Java\
  \ 9 中，一个 Java 应用程序由称为*模块*的小型交互组件组成。Java 9 还将 JDK/JRE 组织为一组模块。本章的重点是模块概述。后续章节将详细解释模块。\n\
  \n## 新的模块系统\n\nJava 9 引入了一种名为*模块*的新程序组件。你可以将 Java 应用程序视为一组相互交互的模块，这些模块之间具有明确定义的边界和依赖关系。模块系统的开发目标如下：\n\
  \n• 可靠的配置\n• 强封装\n• 模块化 JDK/JRE\n\n这些目标旨在解决 Java 9 之前开发和部署 Java 应用程序时面临的问题。\n\n\
  *可靠的配置*解决了用于查找类型的易出错类路径机制问题。一个模块必须声明对其他模块的显式依赖。模块系统会在应用程序开发的所有阶段（编译时、链接时和运行时）验证这些依赖关系。假设一个模块声明了对另一个模块的依赖，而第二个模块在启动时缺失。JVM\
  \ 会检测到依赖缺失并在启动时失败。在 Java 9 之前，这样的应用程序只有在使用缺失类型时才会产生运行时错误（而非启动时）。\n\n**第 2 章 ■ 模块系统**\n\
  \n*强封装*解决了类路径上 JAR 文件中公共类型可随意访问的问题。一个模块必须显式声明其哪些公共类型可供其他模块访问。一个模块无法访问另一个模块中的公共类型，除非这些模块显式地使其公共类型可被访问。在\
  \ Java 9 中，公共类型并不意味着它可以被程序的所有部分访问。模块系统增加了更精细的访问控制。我将在另一章中解释访问控制。\n\n■ **提示** Java\
  \ 9 通过允许模块声明显式依赖并在开发的所有阶段验证这些依赖，提供了可靠的配置。它通过允许模块声明其公共类型可供其他模块访问的包，提供了强封装。\n\nJDK\
  \ 9 通过将其前身的单体结构分解为一组称为*平台模块*的模块进行了重写。JDK 9 还引入了一个可选的阶段，称为*链接时*，它可能发生在编译时和运行时之间。在链接时，你可以使用一个链接器（即\
  \ JDK 9 附带的名为`jlink`的工具）为你的应用程序创建一个自定义运行时映像，该映像仅包含应用程序中使用的模块。这会将运行时的大小缩减到最佳尺寸。\n\
  \n## 什么是模块？\n\n*模块*是一个命名的代码和数据集合。它可以包含 Java 代码和本地代码。Java 代码被组织为一组包含类型（如类、接口、枚举和注解）的包。数据可能包括资源，如图像文件和配置文件。\n\
  \n对于 Java 代码，模块充当零个或多个包的集合。图 2-3 显示了三个名为`policy`、`claim`和`utility`的模块，其中`policy`模块包含两个包，`claim`模块包含一个包，`utility`模块不包含任何包。\n\
  \n```\npolicy          claim           utility\npackage1        package2       \
  \ package3\nType1           Type4           Type7\nType2           Type5       \
  \    Type8\nType3           Type6           Type9\n```\n\n***图 2-3.** 类型、包和模块的排列*\n\
  \n模块远不止是包的容器。除了名称之外，模块定义还包含以下内容：\n\n• 它*需要*（或依赖）的其他模块列表\n• 它*导出*（其公共 API）供其他模块使用的包列表\n\
  • 它*开放*（其整个 API，包括公共和私有）给其他模块进行反射访问的包列表\n• 它*使用*（或通过`java.util.ServiceLoader`类发现和加载）的服务列表\n\
  • 它*提供*的服务实现列表\n\n当你使用模块时，你会涉及这些方面中的一个或多个。在向你展示如何定义自己的模块之前，我将介绍模块的更多理论方面。\n\nJava\
  \ SE 9 平台规范将平台划分为一组称为*平台模块*的模块。Java SE 9 平台的实现可能包含部分或全部平台模块，从而提供可扩展的 Java 运行时。标准模块的名称以`java.`为前缀。Java\
  \ SE 标准模块的例子包括`java.base`、`java.sql`、`java.xml`和`java.logging`。标准平台模块中的 API 受支持，并供开发者使用。\n\
  \n非标准平台模块是 JDK 的一部分，但未在 Java SE 平台规范中指定。这些 JDK 特有的模块名称以`jdk.`为前缀。JDK 特有模块的例子包括`jdk.charsets`、`jdk.compiler`、`jdk.jlink`、`jdk.policytool`和`jdk.zipfs`。JDK\
  \ 特有模块中的 API 不供开发者使用。这些 API 通常用于 JDK 本身以及那些无法轻易通过 Java SE API 获得所需功能的库开发者。如果你使用这些模块中的\
  \ API，它们可能不受支持，或者将来可能在没有通知的情况下发生变化。\n\nJavaFX 不是 Java SE 9 平台规范的一部分。但是，当你安装 JDK/JRE\
  \ 时，会安装与 JavaFX 相关的模块。JavaFX 模块的名称以`javafx.`为前缀。JavaFX 模块的例子包括`javafx.base`、`javafx.controls`、`javafx.fxml`、`javafx.graphics`和`javafx.web`。\n\
  \n`java.base`模块是 Java SE 9 平台的一部分，是原始模块。它不依赖任何其他模块。模块系统只知道`java.base`模块。它通过模块中指定的依赖关系发现所有其他模块。`java.base`模块导出了核心\
  \ Java SE 包，如`java.lang`、`java.io`、`java.math`、`java.text`、`java.time`、`java.util`等。\n\
  \n## 模块依赖关系\n\n直到 JDK 8，一个包中的公共类型可以被其他包无限制地访问。换句话说，包并不控制其所包含类型的可访问性。JDK 9 中的模块系统提供了对类型可访问性的细粒度控制。\n\
  \n跨模块的可访问性是被使用模块和使用模块之间的双向协议：一个模块显式地使其公共类型可供其他模块使用，而使用这些公共类型的模块显式地声明对第一个模块的依赖。模块中所有未导出的包都是该模块私有的，不能在模块外部使用。\n\
  \n使包中的公共 API 可供其他模块使用称为*导出*该包。如果一个名为`policy`的模块使名为`pkg1`的包中的公共类型可供其他模块使用，则称`policy`模块*导出*了`pkg1`包。如果一个名为`claim`的模块声明了对`policy`模块的依赖，则称`claim`模块*读取*了`policy`模块。如果`claim`模块读取了`policy`模块，这意味着`policy`模块导出包中的所有公共类型都可以在`claim`模块内部访问。一个模块也可以选择性地仅向一个或多个命名模块导出包。这种导出称为*限定导出*或*模块友好导出*。在限定导出中，包中的公共类型仅对指定的命名模块可访问。\n\
  \n在模块系统的上下文中，三个术语——*requires*、*reads*和*depends on*——可以互换使用。Java 文档在此类上下文中提倡使用术语*reads*。以下三个语句含义相同：P\
  \ reads Q、P requires Q 和 P depends on Q，其中 P 和 Q 是两个模块。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n图 2-4 描绘了名为 `policy` 和 `claim` 的两个模块之间的依赖关系。`policy` 模块包含两个包：`pkg1` 和 `pkg2`，并且它导出了\
  \ `pkg1` 包，我使用虚线边界将其与未导出的 `pkg2` 包区分开来。`claim` 模块包含两个包：`pkg3` 和 `pkg4`，它没有导出任何包。它声明了对\
  \ `policy` 模块的依赖。\n\n第 2 章 ■ 模块系统\n\nclaim\n\npolicy\n\nexports\n\npkg3\n\npkg1\n\
  \npkg4\n\nrequires\n\npkg2\n\n***图 2-4.** 声明模块间的依赖关系*\n\n在 JDK 9 中，你可以按如下方式声明这两个模块：\n\
  \nmodule policy {\n\nexports pkg1;\n\n}\n\nmodule claim {\n\nrequires policy;\n\n\
  }\n\n■ **提示** 在模块中指示依赖关系的语法是不对称的——你导出的是*包*，但需要的是*模块*。\n\n如果你的模块依赖于另一个模块，此模块声明要求你知道该模块的名称。一些\
  \ Java 框架和工具严重依赖反射来在运行时访问你未导出的模块代码。它们提供了强大的功能，例如依赖注入、序列化、Java 持久化 API 的实现、代码自动化和调试。Spring、Hibernate\
  \ 和 XStream 就是此类框架和库的例子。这些框架和库不知道你的应用程序模块。但是，它们需要访问你模块中的类型才能完成工作。它们还需要访问你模块的私有成员，这打破了\
  \ JDK 9 中强封装的前提。当一个模块导出一个包时，依赖于第一个模块的其他模块只能访问导出包中的公共 API。为了在运行时授予对模块所有包的深度反射访问权限（访问公共和私有\
  \ API），你可以声明一个 *open* 模块。\n\n图 2-5 展示了一个名为 `policy.model` 的开放模块。我使用虚线边界显示该模块及其包，以表明该模块是开放的，并且任何其他模块都可以访问这些包。`jdojo.jpa`\
  \ 模块在运行时使用反射访问 `policy.model` 模块中的类型。`jdojo.jpa` 模块为 JPA 提供实现，而 `policy.model` 模块显式依赖于\
  \ `jdojo.jpa` 模块。\n\n第 2 章 ■ 模块系统\n\njdojo.jpa\n\npolicy.model\n\nRequires\n\npkg6\n\
  \npkg4\n\npkg7\n\nReflectively Accesses\n\npkg5\n\n***图 2-5.** 一个允许对其所有成员进行反射访问的开放模块*\n\
  \n在 JDK 9 中，你可以按如下方式声明这两个模块：\n\n**open** module policy.model {\n\nrequires jdojo.jpa;\n\
  \n}\n\nmodule jdojo.jpa {\n\n// 该模块在此处导出其包\n\n}\n\n模块图\n\n模块系统只知道一个模块：`java.base`。`java.base`\
  \ 模块不依赖于任何其他模块。所有其他模块都隐式依赖于 `java.base` 模块。\n\n应用程序的模块化结构可以可视化为一个称为*模块图*的图。在模块图中，每个模块表示为一个节点。如果第一个模块依赖于第二个模块，则存在从第一个模块到第二个模块的有向边。模块图是通过解析一组称为*根模块*的初始模块对模块系统已知的一组称为*可观察模块*的模块的依赖关系来构建的。\n\
  \n■ **提示** 模块解析或解析一个模块意味着该模块所依赖的模块是可用的。假设一个名为 P 的模块依赖于两个名为 Q 和 R 的模块。解析模块 P 意味着你定位模块\
  \ Q 和 R，并递归地解析模块 Q 和 R。\n\n模块图是通过在编译时、链接时和运行时解析模块依赖关系来构建的。模块解析从根模块开始，并沿着依赖链接进行，直到到达\
  \ `java.base` 模块。有时，模块路径上可能有一个模块，但你可能会收到找不到该模块的错误。如果该模块未被解析且未包含在模块图中，则可能发生这种情况。要解析一个模块，它需要位于从根模块开始的依赖链中。默认的根模块集是根据调用编译器或\
  \ Java 启动器的方式选择的。你也可以将模块添加到默认的根模块集中。理解在不同情况下如何选择默认根模块非常重要：\n\n• 如果应用程序代码是从类路径编译的，或者主类是从类路径运行的，则默认的根模块集由\
  \ `java.se` 模块和所有非 `java.*` 的系统模块（例如 `jdk.*` 和 `javafx.*`）组成。如果 `java.se` 模块不存在，则默认的根模块集由所有\
  \ `java.*` 和非 `java.*` 模块组成。\n\n![](img/index-35_1.jpg)\n\n第 2 章 ■ 模块系统\n\n• 如果你的应用程序由模块组成，则默认的根模块集取决于阶段：\n\
  \n•\n在编译时，它由所有正在编译的模块组成。\n•\n在链接时，它是空的。\n•\n在运行时，它包含包含主类的模块。你使用 `--module` 或 `-m`\
  \ 选项与 `java` 命令一起指定要运行的模块及其主类。\n\n继续以名为 `policy` 和 `claim` 的两个模块为例，假设 `pkg3.Main`\
  \ 是 `claim` 中的主类，并且两个模块都作为模块化 JAR 打包在 `C:\\Java9Revealed\\lib` 目录中。\n\n图 2-6 展示了当使用以下命令运行应用程序时，在运行时构建的模块图：\n\
  \nC:\\Java9Revealed>java -p lib -m claim/pkg3.Main\n\n***图 2-6.** 模块图示例*\n\n`claim`\
  \ 模块包含应用程序的主类。因此，在创建模块图时，`claim` 是唯一的根模块。`policy` 模块被解析，因为 `claim` 模块依赖于 `policy`\
  \ 模块。`java.base` 模块被解析，因为所有其他模块都依赖于它，这两个模块也是如此。\n\n模块图的复杂性取决于根模块的数量以及模块之间的依赖关系级别。假设，除了依赖于\
  \ `policy` 模块之外，`claim` 模块还依赖于名为 `java.sql` 的平台模块。`claim` 模块的新声明如下所示：\n\nmodule\
  \ policy {\n\nrequires policy;\n\nrequires java.sql;\n\n}\n\n图 2-7 展示了当你在 `claim`\
  \ 模块中运行 `pkg3.Main` 类时将构建的模块图。请注意，`java.xml` 和 `java.logging` 模块也出现在图中，因为 `java.sql`\
  \ 模块依赖于它们。在图中，`claim` 模块是唯一的根模块。\n\n![](img/index-36_1.jpg)\n\n第 2 章 ■ 模块系统\n\n\
  ***图 2-7.** 显示对 `java.sql` 模块依赖关系的模块图*\n\n图 2-8 展示了名为 `java.se` 的平台模块最复杂的模块图之一。`java.se`\
  \ 模块的模块声明如下：\n\nmodule java.se {\n\nrequires transitive java.sql;\n\nrequires transitive\
  \ java.rmi;\n\nrequires transitive java.desktop;\n\nrequires transitive java.security.jgss;\n\
  \nrequires transitive java.security.sasl;\n\nrequires transitive java.management;\n\
  \nrequires transitive java.logging;\n\nrequires transitive java.xml;\n\nrequires\
  \ transitive java.scripting;\n\nrequires transitive java.compiler;\n\nrequires transitive\
  \ java.naming;\n\nrequires transitive java.instrument;\n\nrequires transitive java.xml.crypto;\n\
  \nrequires transitive java.prefs;\n\nrequires transitive java.sql.rowset;\n\nrequires\
  \ java.base;\n\nrequires transitive java.datatransfer;\n\n}\n\n![](img/index-37_1.jpg)\n\
  \n第 2 章 ■ 模块系统\n\n***图 2-8.** 以 `java.se` 模块为根模块的模块图*\n\n\n\n有时，您需要将模块添加到默认的根模块集中，以便解析这些添加的模块。您可以在编译时、链接时和运行时使用\
  \ `--add-modules` 命令行选项来指定额外的根模块：\n\n--add-modules <module-list>\n\n其中，`<module-list>`\
  \ 是一个以逗号分隔的模块名称列表。\n\n您可以将以下特殊值作为模块列表与 `--add-modules` 选项一起使用，这些值具有特殊含义：\n\n• ALL-DEFAULT\n\
  \n• ALL-SYSTEM\n\n• ALL-MODULE-PATH\n\n这三个特殊值在运行时均有效。`ALL-MODULE-PATH` 值只能在编译时使用。\n\
  \n如果使用 `ALL-DEFAULT` 作为模块列表，则当应用程序从类路径运行时使用的默认根模块集将被添加到根集中。这对于作为容器的应用程序非常有用，该容器托管其他可能需要容器应用程序本身未要求的其他模块的应用程序。这是一种使所有\
  \ Java SE 模块对容器可用的方法，因此任何托管的应用程序都可以使用它们。\n\n如果使用 `ALL-SYSTEM` 作为模块列表，则所有系统模块都会被添加到根集中。这对于运行测试框架非常有用。\n\
  \n第 2 章 ■ 模块系统\n\n如果使用 `ALL-MODULE-PATH` 作为模块列表，则模块路径上找到的所有模块都会被添加到根集中。这对于 Maven\
  \ 等工具非常有用，它可以确保模块路径上的所有模块都是应用程序所需的。\n\n■ **提示** 即使模块存在于模块路径上，您也可能会收到找不到模块的错误。在这种情况下，您需要使用\
  \ `--add-modules` 命令行选项将缺失的模块添加到默认的根模块集中。\n\nJDK 9 支持一个有用的非标准命令行选项，该选项会打印诊断消息，描述在构建模块图时用于解析模块的步骤。该选项是\
  \ `-Xdiag:resolver`。以下命令运行 `claim` 模块中的 `pkg3.Main` 类。显示了部分输出。在诊断消息的末尾，您会找到一个 `Result:`\
  \ 部分，其中列出了已解析的模块。\n\nC:\\Java9Revealed>java -Xdiag:resolver -p lib -m claim/pkg3.Main\n\
  \n[Resolver] Root module claim located\n\n[Resolver] (file:///C:/Java9Revealed/lib/claim.jar)\n\
  \n[Resolver] Module java.base located, required by claim\n\n[Resolver] (jrt:/java.base)\n\
  \n[Resolver] Module policy located, required by claim\n\n[Resolver] (file:///C:/Java9Revealed/lib/policy.jar)\n\
  \n...\n\n[Resolver] Result:\n\n[Resolver] claim\n\n[Resolver] java.base\n\n...\n\
  \n[Resolver] policy\n\n聚合模块\n\n您可以创建一个自身不包含任何代码的模块。它收集并重新导出其他模块的内容。这样的模块称为*聚合模块*。假设有几个模块依赖于五个模块。您可以为这五个模块创建一个聚合模块，这样，您的模块就可以只依赖于一个模块——聚合模块。\n\
  \n聚合模块的存在是为了方便。Java 9 包含几个聚合模块，例如 `java.se` 和 `java.se.ee`。`java.se` 模块收集了 Java\
  \ SE 中与 Java EE 不重叠的部分。\n\n`java.se.ee` 模块收集了构成 Java SE 的所有模块，包括与 Java EE 重叠的模块。\n\
  \n声明模块\n\n本节快速概述了用于声明模块的语法。我将在后续章节中更详细地解释每个部分。如果您不理解本节中提到的关于模块的所有内容，请继续阅读。我将在后面的章节中通过示例再次介绍它们。\n\
  \n第 2 章 ■ 模块系统\n\n模块是使用模块声明定义的，这是 Java 编程语言中的一种新结构。语法如下：\n\n[open] module <module>\
  \ {\n\n<module-statement>;\n\n<module-statement>;\n\n...\n\n}\n\n可选的 `open` 修饰符的存在声明了一个*开放模块*。开放模块导出其所有包，以供其他模块通过反射访问。`<module>`\
  \ 是正在定义的模块的名称。`<module-statement>` 是一个模块语句。在一个模块声明中可以有零个或多个模块语句。如果存在，它可以是五种类型的语句之一：\n\
  \n• exports 语句\n\n• opens 语句\n\n• requires 语句\n\n• uses 语句\n\n• provides 语句\n\n\
  `exports` 和 `opens` 语句用于控制对模块代码的访问。`requires` 语句用于声明一个模块对另一个模块的依赖关系。`uses` 和 `provides`\
  \ 语句分别用于表达服务消费和服务提供。以下是一个名为 `myModule` 的模块的模块声明示例：\n\nmodule myModule {\n\n// 导出包\
  \ - com.jdojo.util 和\n\n// com.jdojo.util.parser\n\nexports com.jdojo.util;\n\n\
  exports com.jdojo.util.parser;\n\n// 读取 java.sql 模块\n\nrequires java.sql;\n\n//\
  \ 开放 com.jdojo.legacy 包以供反射访问\n\nopens com.jdojo.legacy;\n\n// 使用服务接口 java.sql.Driver\n\
  \nuses java.sql.Driver;\n\n// 提供 com.jdojo.util.parser.FasterCsvParser\n\n// 类作为服务接口的实现\n\
  \n// 名为 com.jdojo.util.CsvParser\n\nprovides com.jdojo.util.CsvParser\n\nwith com.jdojo.util.parser.FasterCsvParser;\n\
  \n}\n\n第 2 章 ■ 模块系统\n\n您可以通过在模块声明中使用 `open` 修饰符来创建一个开放模块。开放模块允许其他模块对其所有包进行反射访问。您不能在开放模块内部使用\
  \ `opens` 语句，因为在开放模块中所有包都是隐式开放的。以下代码片段声明了一个名为 `myLegacyModule` 的开放模块：\n\n**open**\
  \ module myLegacyModule {\n\nexports com.jdojo.legacy;\n\nrequires java.sql;\n\n\
  }\n\n模块名称\n\n模块名称可以是一个 Java *限定*标识符。限定标识符是一个或多个由点分隔的标识符，例如 `policy`、`com.jdojo.common`\
  \ 和 `com.jdojo.util`。如果模块名称中的任何部分不是有效的 Java 标识符，则会发生编译时错误。例如，`com.jdojo.common.1.0`\
  \ 不是有效的模块名称，因为名称中的两个部分 `1` 和 `0` 不是有效的 Java 标识符。\n\n与包命名约定类似，使用反向域名模式为您的模块赋予唯一名称。使用此约定，最简单的模块（名为\
  \ `com.jdojo.common`）可以声明如下：\n\nmodule com.jdojo.common {\n\n// 无模块语句\n\n}\n\n模块名称不会隐藏同名的变量、类型和包。因此，您可以拥有一个模块以及一个同名的变量、类型或包。它们使用的上下文将区分哪个名称指的是哪种实体。\n\
  \n在 JDK 9 中，`open`、`module`、`requires`、`transitive`、`exports`、`opens`、`to`、`uses`、`provides`\
  \ 和 `with` 是受限关键字。它们将在本章后面以及后续章节中简要解释。\n\n它们仅在模块声明中的特定位置出现时才具有特殊含义。您可以在程序中的任何其他地方将它们用作标识符。例如，以下模块声明是有效的，即使它没有使用直观的模块名称：\n\
  \n// 声明一个名为 module 的模块\n\nmodule module {\n\n// 模块语句写在这里\n\n}\n\n第一个 `module` 词被解释为关键字，第二个是模块名称。\n\
  \n您可以在程序中的任何地方声明一个名为 `module` 的变量：\n\nString module = \"myModule\";\n\n第 2 章 ■ 模块系统\n\
  \n控制对模块的访问\n\n`exports` 语句在编译时和运行时将模块的指定包导出到所有模块或指定的模块列表。它有以下两种形式：\n\n• exports\
  \ <package>;\n\n• exports <package> to <module1>, <module2>...;\n\n使用 `exports`\
  \ 语句的示例如下：\n\nmodule M {\n\nexports com.jdojo.util;\n\nexports com.jdojo.policy\n\
  \nto com.jdojo.claim, com.jdojo.billing;\n\n}\n\n\n\n`opens` 语句在运行时授予对所有模块或指定模块列表反射访问指定包的权限。其他模块可以使用反射访问指定包中的所有类型以及这些类型的所有成员（私有和公有）。`opens`\
  \ 语句采用以下形式：\n\n• `opens <package>;`\n\n• `opens <package> to <module1>, <module2>...;`\n\
  \n使用 `opens` 语句的示例如下：\n\n```java\nmodule M {\n\n    opens com.jdojo.claim.model;\n\
  \n    opens com.jdojo.policy.model to core.hibernate;\n\n    opens com.jdojo.services\
  \ to core.spring;\n\n}\n```\n\n■ **提示** 比较 `exports` 和 `opens` 语句的效果。`exports` 语句允许你在*编译时*和*运行时*仅访问指定包的*公有\
  \ API*，而 `opens` 语句允许你在*运行时*使用*反射*访问指定包中所有类型的*公有*和*私有*成员。\n\n如果一个模块需要在编译时访问另一个模块的公有类型，并在运行时使用反射访问同一模块中类型的私有成员，则第二个模块可以同时导出和开放同一个包，如下所示：\n\
  \n```java\nmodule N {\n\n    exports com.jdojo.claim.model;\n\n    opens com.jdojo.claim.model;\n\
  \n}\n```\n\n在阅读有关模块的内容时，你会遇到三个短语：\n\n• 模块 M 导出了包 P\n• 模块 M 开放了包 Q\n• 模块 M 包含了包 R\n\
  \n前两个短语对应于模块中的 `exports` 和 `opens` 语句。第三个短语意味着该模块包含一个名为 R 的包，该包既未导出也未开放。在模块系统的早期设计中，第三种情况被表述为“模块\
  \ M *隐藏*了包 R”。\n\n**声明依赖关系**\n\n`requires` 语句声明当前模块对另一个模块的依赖。在名为 M 的模块中，`requires\
  \ N` 语句意味着模块 M 依赖于（或读取）模块 N。该语句采用以下形式：\n\n• `requires <module>;`\n• `requires transitive\
  \ <module>;`\n• `requires static <module>;`\n• `requires transitive static <module>;`\n\
  \n`requires` 语句中的 `static` 修饰符使依赖关系在编译时是强制性的，但在运行时是可选的。在名为 M 的模块中，`requires static\
  \ N` 语句意味着模块 M 依赖于模块 N，并且为了编译模块 M，模块 N 必须在编译时存在；然而，为了使用模块 M，模块 N 在运行时的存在是可选的。`requires`\
  \ 语句中的 `transitive` 修饰符会导致任何依赖于当前模块的模块隐式地依赖于 `requires` 语句中指定的模块。假设有三个模块 P、Q 和 R。假设模块\
  \ Q 包含一个 `requires transitive R` 语句。如果模块 P 包含一个 `requires Q` 语句，则意味着模块 P 隐式地依赖于模块\
  \ R。\n\n**配置服务**\n\nJava 允许使用服务提供者机制，在该机制中，服务提供者和服务消费者是解耦的。JDK 9 允许你使用 `uses` 和\
  \ `provides` 模块语句来实现服务。\n\n`uses` 语句指定当前模块可以使用 `java.util.ServiceLoader` 类发现和加载的*服务接口*的名称。它采用以下形式：\n\
  \n`uses <service-interface>;`\n\n使用 `uses` 语句的示例如下：\n\n```java\nmodule M {\n\n \
  \   uses com.jdojo.prime.PrimeChecker;\n\n}\n```\n\n这里，`com.jdojo.prime.PrimeChecker`\
  \ 是一个服务接口，其实现类将由其他模块提供。模块 M 将使用 `java.util.ServiceLoader` 类发现并加载此接口的实现。\n\n`provides`\
  \ 语句为一个服务接口指定一个或多个服务提供者实现类。它采用以下形式：\n\n`provides <service-interface> with <service-impl-class1>,\
  \ <service-impl-class2>...;`\n\n使用 `provides` 语句的示例如下：\n\n```java\nmodule N {\n\n\
  \    provides com.jdojo.prime.PrimeChecker\n\n    with com.jdojo.prime.generic.GenericPrimeChecker;\n\
  \n}\n```\n\n同一个模块既可以提供服务实现，也可以发现和加载服务。一个模块也可以发现和加载一种服务，并为另一种服务提供实现。以下是一些示例：\n\n\
  ```java\nmodule P {\n\n    uses com.jdojo.CsvParser;\n\n    provides com.jdojo.CsvParser\n\
  \n    with com.jdojo.CsvParserImpl;\n\n    provides com.jdojo.prime.PrimeChecker\n\
  \n    with com.jdojo.prime.generic.FasterPrimeChecker;\n\n}\n```\n\n**模块描述符**\n\n\
  在学习了上一节如何声明模块之后，你可能对模块声明的源代码有几个疑问：\n\n• 模块声明的源代码保存在哪里？是保存在文件中吗？如果是，文件名是什么？\n• 模块声明源代码文件应该放在哪里？\n\
  • 模块声明的源代码是如何编译的？\n\n在我展示第一个模块化程序的实际运行之前，我将回答这些问题。\n\n**编译模块声明**\n\n模块声明存储在一个名为\
  \ `module-info.java` 的文件中，该文件位于该模块源文件层次结构的根目录下。Java 编译器将模块声明编译成一个名为 `module-info.class`\
  \ 的文件。`module-info.class` 文件被称为*模块描述符*，它被放置在模块编译后代码层次结构的根目录下。如果你将模块的编译后代码打包到 JAR\
  \ 文件中，`module-info.class` 文件将存储在 JAR 文件的根目录下。\n\n模块声明不包含可执行代码。本质上，它包含模块的配置。为什么我们不将模块声明保存在\
  \ XML 或 JSON 格式的文本文件中，而是保存在类文件中呢？选择类文件作为模块描述符是因为类文件具有可扩展、定义良好的格式。模块描述符包含源代码级模块声明的编译形式。工具（例如\
  \ `jar` 工具）可以在模块声明初始编译后，通过向类文件属性添加额外信息来增强它。类文件格式还允许开发者在模块声明中使用 `import` 和注解。\n\n\
  **模块版本**\n\n在模块系统的初始原型中，模块声明也包含模块版本。在声明中包含模块版本使得模块系统的实现变得复杂，因此模块版本从声明中被移除了。\n\n\
  模块描述符（类文件格式）的可扩展格式被利用来向模块添加版本。当你将模块的编译后代码打包到 JAR 中时，`jar` 工具提供了一个选项来添加模块的版本，该版本最终被添加到\
  \ `module-info.class` 文件中。我将在[第 3 章](http://dx.doi.org/10.1007/978-1-4842-2592-9)中解释如何向模块描述符添加信息。\n\
  \n**模块源文件结构**\n\n让我们通过一个示例来了解如何组织名为 `com.jdojo.contact` 的模块的源代码和编译后代码。该模块包含用于处理联系人信息（例如地址和电话号码）的包。它包含两个包：\n\
  \n• `com.jdojo.contact.info`\n• `com.jdojo.contact.validator`\n\n`com.jdojo.contact.info`\
  \ 包包含两个类——`Address` 和 `Phone`。`com.jdojo.contact.validator` 包包含一个名为 `Validator`\
  \ 的接口和两个名为 `AddressValidator` 和 `PhoneValidator` 的类。图 2-9 显示了 `com.jdojo.contact`\
  \ 模块的内容。\n\n```\ncom.jdojo.contact\n├── com.jdojo.contact.info\n│   ├── Address\n\
  │   └── Phone\n└── com.jdojo.contact.validator\n    ├── Validator\n    ├── AddressValidator\n\
  \    └── PhoneValidator\n```\n\n***图 2-9.** 名为 com.jdojo.contact 的模块的内容*\n\n\n\n\
  在 Java 9 中，Java 编译器工具 javac 新增了几个选项。它允许你一次编译一个模块或一次编译多个模块。如果你想一次编译多个模块，你*必须*将每个模块的源代码存储在一个目录下，该目录的名称与模块名称相同。即使你只有一个模块，也可以遵循这种源目录命名约定。\n\
  \n假设你想编译 `com.jdojo.contact` 模块的源代码。你可以将其源代码存储在名为 `C:\\j9r\\src` 的目录中，该目录包含以下文件：\n\
  \nmodule-info.java\n\ncom\\jdojo\\contact\\info\\Address.java\n\ncom\\jdojo\\contact\\\
  info\\Phone.java\n\ncom\\jdojo\\contact\\validator\\Validator.java\n\ncom\\jdojo\\\
  contact\\validator\\AddressValidator.java\n\ncom\\jdojo\\contact\\validator\\PhoneValidator.java\n\
  \n第 2 章 ■ 模块系统\n\n请注意，你需要像自 Java 1.0 以来一直做的那样，遵循包层次结构来存储接口和类的源文件。\n\n如果你想一次编译多个模块，则必须将源代码目录命名为\
  \ `com.jdojo.contact`，这与模块的名称相同。在这种情况下，你可以将模块的源代码存储在名为 `C:\\j9r\\src` 的目录中，其内容如下：\n\
  \ncom.jdojo.contact\\module-info.java\n\ncom.jdojo.contact\\com\\jdojo\\contact\\\
  info\\Address.java\n\ncom.jdojo.contact\\com\\jdojo\\contact\\info\\Phone.java\n\
  \ncom.jdojo.contact\\com\\jdojo\\contact\\validator\\Validator.java\n\ncom.jdojo.contact\\\
  com\\jdojo\\contact\\validator\\AddressValidator.java\n\ncom.jdojo.contact\\com\\\
  jdojo\\contact\\validator\\PhoneValidator.java\n\n模块的编译代码将遵循与你之前看到的相同的目录层次结构。\n\n\
  **打包模块**\n\n模块的工件可以存储在：\n\n-   一个目录\n-   一个模块化 JAR 文件\n-   一个 JMOD 文件，这是 JDK 9 中引入的一种新的模块打包格式\n\
  \n**目录中的模块**\n\n当模块的编译代码存储在一个目录中时，该目录的根目录包含模块描述符（`module-info.class` 文件），子目录则镜像了包层次结构。继续上一节的示例，假设你将\
  \ `com.jdojo.contact` 模块的编译代码存储在 `C:\\j9r\\mods\\com.jdojo.contact` 目录中。该目录的内容如下：\n\
  \nmodule-info.class\n\ncom\\jdojo\\contact\\info\\Address.class\n\ncom\\jdojo\\\
  contact\\info\\Phone.class\n\ncom\\jdojo\\contact\\validator\\Validator.class\n\n\
  com\\jdojo\\contact\\validator\\AddressValidator.class\n\ncom\\jdojo\\contact\\\
  validator\\PhoneValidator.class\n\n**模块化 JAR 中的模块**\n\nJDK 附带了一个 `jar` 工具，用于将 Java\
  \ 代码打包成 JAR（**J**ava **Ar**chive）文件格式。JAR 格式基于 ZIP 文件格式。JDK 9 增强了 `jar` 工具，可以将模块的代码打包到\
  \ JAR 中。当一个 JAR 包含模块的编译代码时，该 JAR 被称为*模块化 JAR*。模块化 JAR 在其根目录包含一个 `module-info.class`\
  \ 文件。\n\n无论你在 JDK 9 之前在哪里使用 JAR，现在都可以使用模块化 JAR。例如，模块化 JAR 可以放置在类路径上，在这种情况下，模块化 JAR\
  \ 中的 `module-info.class` 文件会被忽略，因为 `module-info` 在 Java 中不是有效的类名。\n\n第 2 章 ■ 模块系统\n\
  \n在打包模块化 JAR 时，你可以使用 `jar` 工具中在 JDK 9 中新增的各种选项，向模块描述符添加信息片段，例如模块版本和主类名。\n\n■ **提示**\
  \ 模块化 JAR 在所有方面都是一个 JAR，只是它在根目录包含一个模块描述符。\n\n通常，一个非平凡的 Java 应用程序由多个模块组成。一个模块化 JAR\
  \ 只能包含*一个*模块的编译代码。需要将应用程序的所有模块打包到一个 JAR 中，以简化将应用程序作为一个工件交付的过程。在撰写本文时，这是一个未解决的问题，在[此链接](http://openjdk.java.net/projects/jigsaw/spec/issues/#MultiModuleExecutableJARs)中有描述。\n\
  \n继续上一节的示例，`com.jdojo.contact` 模块的模块化 JAR 内容如下。请注意，JAR 总是在 `META-INF` 目录中包含一个 `MANIFEST.MF`\
  \ 文件。\n\nmodule-info.class\n\ncom/jdojo/contact/info/Address.class\n\ncom/jdojo/contact/info/Phone.class\n\
  \ncom/jdojo/contact/validator/Validator.class\n\ncom/jdojo/contact/validator/AddressValidator.class\n\
  \ncom/jdojo/contact/validator/PhoneValidator.class\n\nMETA-INF/MANIFEST.MF\n\n**JMOD\
  \ 文件中的模块**\n\nJDK 9 引入了一种名为 *JMOD* 的新格式来打包模块。JMOD 文件使用 `.jmod` 扩展名。JDK 模块被编译成 JMOD\
  \ 格式，并放置在 `JDK_HOME\\jmods` 目录中；例如，你会找到一个 `java.base.jmod` 文件，其中包含 `java.base` 模块的内容。JMOD\
  \ 文件仅在编译时和链接时受支持。它们在运行时不受支持。我将在第 [6](http://dx.doi.org/10.1007/978-1-4842-2592-9)\
  \ 章中详细解释 JMOD 格式。\n\n**模块路径**\n\n自 JDK 诞生以来，用于查找类型的类路径机制就一直存在。类路径是一系列目录、JAR 文件和\
  \ ZIP 文件。当 Java 需要在不同阶段（编译时、运行时、使用工具期间等）查找类型时，它会使用类路径中的条目来查找该类型。\n\nJava 9 中的类型是作为模块的一部分存在的。Java\
  \ 需要在不同阶段查找模块，而不是像 Java 9 之前那样查找类型。Java 9 引入了一种新的查找模块的机制，称为*模块路径*。\n\n*模块路径* 是一个包含模块的路径名序列，其中路径名可以是模块化\
  \ JAR、JMOD 文件或目录的路径。路径名由特定于平台的路径分隔符分隔，在类 UNIX 平台上为冒号（`:`），在 Windows 平台上为分号（`;`）。\n\
  \n第 2 章 ■ 模块系统\n\n当路径名是模块化 JAR 或 JMOD 文件时，很容易理解。在这种情况下，如果 JAR 或 JMOD 文件中的模块描述符包含正在查找的模块的模块定义，则找到该模块。如果路径名是一个目录，则存在以下两种情况：\n\
  \n-   如果目录根目录下存在一个类文件，则该目录被视为包含一个模块定义。根目录下的类文件将被解释为模块描述符。所有其他文件和子目录将被解释为此模块的一部分。如果根目录下存在多个类文件，则找到的第一个文件被解释为模块描述符。经过几次实验，JDK\
  \ 9 build 126 似乎会按字母顺序排序后选取第一个类文件。这种存储模块编译代码的方式肯定会让你头疼。因此，如果目录根目录下包含多个类文件，请避免将该目录添加到模块路径。\n\
  \n-   如果目录根目录下不存在类文件，则目录的内容将被不同地解释。目录中的每个模块化 JAR 或 JMOD 文件都被视为一个模块定义。每个子目录，如果其根目录下包含\
  \ `module-info.class` 文件，则被视为以展开目录树格式包含一个模块定义。如果子目录的根目录下不包含 `module-info.class`\
  \ 文件，则它不被解释为包含模块定义。请注意，如果子目录包含模块定义，其名称不必与模块名称相同。模块名称是从 `module-info.class` 文件中读取的。\n\
  \n以下是 Windows 上有效的模块路径：\n\n-   `C:\\mods`\n-   `C:\\mods\\com.jdojo.contact.jar;C:\\\
  mods\\com.jdojo.person.jar`\n-   `C:\\lib;C:\\mods\\com.jdojo.contact.jar;C:\\mods\\\
  com.jdojo.person.jar`\n\n第一个模块路径包含指向名为 `C:\\mods` 的目录的路径。第二个模块路径包含指向两个模块化 JAR（`com.jdojo.contact.jar`\
  \ 和 `com.jdojo.person.jar`）的路径。第三个\n\n\n\n模块路径包含三个元素——指向目录 C:\\lib 的路径，以及两个模块化 JAR\
  \ 的路径——com.jdojo.contact.jar 和 com.jdojo.person.jar。在类 UNIX 平台上，这些路径的等效形式如下所示：\n\
  \n• /usr/ksharan/mods\n\n• /usr/ksharan/mods/com.jdojo.contact.jar:/usr/ksharan/com.jdojo.person.jar\n\
  \n• /usr/ksharan/lib:/usr/ksharan/mods/com.jdojo.contact.jar:/usr/ksharan/mods/com.jdojo.person.jar\n\
  \n避免模块路径问题的最佳方法是不要将展开的目录用作模块定义。\n\n将两个目录作为模块路径——一个目录包含所有应用程序模块化 JAR，另一个目录包含所有外部库的模块化\
  \ JAR。例如，在 Windows 上，你可以使用 `C:\\applib;C:\\extlib` 作为模块路径，其中 `C:\\applib` 目录包含所有应用程序模块化\
  \ JAR，`C:\\extlib` 目录包含所有外部库的模块化 JAR。\n\n第 2 章 ■ 模块系统\n\nJDK 9 已更新其所有工具，以使用模块路径来查找模块。这些工具提供了新的选项来指定模块路径。在\
  \ JDK 9 之前，你看到的是以连字符 (-) 开头的 UNIX 风格选项，例如 `-cp` 和 `-classpath`。随着 JDK 9 中新增了如此多的选项，JDK\
  \ 设计者难以再为选项提供既简短又对开发者有意义的名称。因此，JDK 9 开始使用 GNU 风格选项，其中选项以两个连续的连字符开头，单词之间用连字符分隔。\n\
  \n以下是 GNU 风格命令行选项的几个示例：\n\n• `--class-path`\n\n• `--module-path`\n\n• `--module-version`\n\
  \n• `--main-class`\n\n• `--print-module-descriptor`\n\n■ **提示** 要打印工具支持的所有标准选项列表，请使用\
  \ `--help` 或 `-h` 选项运行该工具；要打印所有非标准选项，请使用 `-X` 选项运行该工具。例如，`java -h` 和 `java -X` 命令将分别打印\
  \ `java` 命令的标准和非标准选项列表。\n\nJDK 9 中的大多数工具，例如 `javac`、`java` 和 `jar`，都支持两个选项来在命令行上指定模块路径。它们是\
  \ `-p` 和 `--module-path`。为了向后兼容，现有的 UNIX 风格选项将继续得到支持。以下两个命令展示了如何使用这两个选项为 `java`\
  \ 工具指定模块路径：\n\n// 使用 GNU 风格选项\n\nC:\\>java --module-path C:\\applib;C:\\lib other-args-go-here\n\
  \n// 使用 UNIX 风格选项\n\nC:\\>java -p C:\\applib;C:\\extlib other-args-go-here\n\n在本书的所有示例中，我使用\
  \ GNU 风格选项 `--module-path` 来指定模块路径。\n\n当你使用 GNU 风格选项时，可以通过以下两种形式之一来指定选项的值：\n\n•\
  \ `--<name> <value>`\n\n• `--<name>=<value>`\n\n之前的命令也可以写成如下形式：\n\n// 使用 GNU 风格选项\n\
  \nC:\\>java --module-path**=**C:\\applib;C:\\lib other-args-go-here\n\n当使用空格作为名称-值分隔符时，你至少需要使用一个空格。当你使用\
  \ `=` 作为分隔符时，其周围不能包含任何空格。选项 `--module-path=C:\\applib` 是有效的。选项 `--module-path =C:\\\
  applib` 是无效的，因为 `=C:\\applib` 将被解释为模块路径，而这是一个无效路径。\n\n第 2 章 ■ 模块系统\n\n可观察模块\n\n\
  在模块查找过程中，模块系统使用不同类型的模块路径来定位模块。在模块路径上找到的模块集与系统模块一起被称为*可观察模块*。你可以将可观察模块视为在特定阶段（例如编译时、链接时和运行时）可供模块系统使用或可供工具使用的所有模块的集合。\n\
  \nJDK 9 为 `java` 命令添加了一个名为 `--list-modules` 的新选项。该选项可用于打印两种信息：可观察模块的列表以及一个或多个模块的描述。该选项可以通过两种形式使用：\n\
  \n• `--list-modules`\n\n• `--list-modules <module1>,<module2>...`\n\n在第一种形式中，选项后面不跟任何模块名称。它会打印可观察模块的列表。在第二种形式中，选项后面跟一个逗号分隔的模块名称列表，这会打印指定模块的模块描述符。\n\
  \n以下命令打印可观察模块的列表，其中仅包含系统模块：c:\\Java9Revealed> java --list-modules\n\njava.base@9-ea\n\
  \njava.se.ee@9-ea\n\njava.sql@9-ea\n\njavafx.base@9-ea\n\njavafx.controls@9-ea\n\
  \njdk.jshell@9-ea\n\njdk.unsupported@9-ea\n\n...\n\n显示的输出是部分内容。输出中的每个条目包含两部分——模块名称和版本字符串，两者由\
  \ `@` 符号分隔。第一部分是模块名称，第二部分是模块的版本字符串。例如，在 `java.base@9-ea` 中，`java.base` 是模块名称，`9-ea`\
  \ 是版本字符串。\n\n在版本字符串中，数字 9 代表 JDK 9，`ea` 代表*早期访问*。当你运行该命令时，可能会得到不同的版本字符串输出。\n\n我将三个模块化\
  \ JAR 放在了我的 `C:\\Java9Revealed\\lib` 目录中。如果我将 `C:\\Java9Revealed\\lib` 作为模块路径提供给\
  \ `java` 命令，这些模块将被包含在可观察模块列表中。\n\n以下命令展示了当指定模块路径时，可观察模块列表如何变化。这里，`lib` 是一个相对路径，`C:\\\
  Java9Revealed` 是当前目录。\n\nC:\\Java9Revealed>java --module-path lib --list-modules\n\
  \nclaim (file:///C:/Java9Revealed/lib/claim.jar)\n\npolicy (file:///C:/Java9Revealed/lib/policy.jar)\n\
  \njava.base@9-ea\n\njava.xml@9-ea\n\njavafx.base@9-ea\n\njdk.unsupported@9-ea\n\n\
  jdk.zipfs@9-ea\n\n...\n\n第 2 章 ■ 模块系统\n\n请注意，对于应用程序模块，`--list-modules` 选项还会打印它们的位置。当得到意外结果且不知道正在使用哪些模块以及来自哪些位置时，此信息有助于进行故障排除。\n\
  \n以下命令将 `com.jdojo.intro` 模块作为参数传递给 `--list-modules` 选项，以打印该模块的描述：\n\nC:\\Java9Revealed>java\
  \ --module-path lib --list-modules claim\n\nmodule claim (file:///C:/Java9Revealed/lib/claim.jar)\n\
  \nexports com.jdojo.claim\n\nrequires java.sql (@9-ea)\n\nrequires mandated java.base\
  \ (@9-ea)\n\ncontains pkg3\n\n输出的第一行包含模块名称和包含该模块的模块化 JAR 位置。第二行表示该模块导出了 `com.jdojo.claim`\
  \ 模块。第三行表示该模块需要 `java.sql` 模块。第四行表示该模块依赖于强制的 `java.base` 模块。回想一下，除了 `java.base`\
  \ 模块之外，每个模块都依赖于 `java.base` 模块。除了 `java.base` 模块之外，你会在每个模块的描述中看到 `requires mandated\
  \ java.base` 这一行。第五行说明该模块包含一个名为 `pkg3` 的包，该包既未导出也未开放。\n\n你也可以使用 `--list-modules`\
  \ 打印系统模块（例如 `java.base` 和 `java.sql`）的描述。以下命令打印 `java.sql` 模块的描述。\n\nC:\\Java9Revealed>java\
  \ --list-modules java.sql\n\nmodule java.sql@9-ea\n\nexports java.sql\n\nexports\
  \ javax.sql\n\nexports javax.transaction.xa\n\nrequires transitive java.xml\n\n\
  requires mandated java.base\n\nrequires transitive java.logging\n\nuses java.sql.Driver\n\
  \n总结\n\n在 Java 中，包一直被用作类型的容器。一个应用程序由放置在类路径上的多个 JAR 组成。包充当类型的容器，但并未强制执行任何可访问性边界。\n\
  \n\n\n类型的可访问性曾通过修饰符嵌入在类型声明中。如果一个包包含内部实现，程序的其他部分无法阻止访问这些内部实现。当使用某个类型时，类路径机制会线性搜索该类型。这导致了另一个问题：当部署的\
  \ JAR 中缺少某些类型时，会在运行时收到错误——有时甚至在应用程序部署很久之后才出现。这些问题可分为两类：封装与配置。\n\n第 2 章 ■ 模块系统\n\n\
  JDK 9 引入了模块系统。它提供了一种组织 Java 程序的方式，有两个主要目标：*强封装*和*可靠配置*。使用模块系统，应用程序由模块组成，模块是代码和数据的命名集合。一个模块通过其声明来控制其他模块可以访问该模块的哪些部分。访问另一个模块某部分的模块必须声明对第二个模块的依赖。控制访问和声明依赖这两个方面是实现强封装目标的基础。模块的依赖关系在启动时解析。在\
  \ JDK 9 中，如果一个模块依赖于另一个模块，而运行应用程序时第二个模块缺失，你将在启动时收到错误，而不是在应用程序运行后的某个时刻。这是可靠配置的基础。\n\
  \n模块通过模块声明来定义。模块的源代码通常存储在名为 `module-info.java` 的文件中。模块被编译成类文件，通常命名为 `module-info.class`。编译后的模块声明称为*模块描述符*。模块声明不允许指定模块版本。诸如\
  \ `jar` 工具（用于将模块打包成 JAR）之类的工具可以将模块版本添加到模块描述符中。\n\n模块使用 `module` 关键字声明，后跟模块名称。模块声明可以使用五种类型的模块语句：`exports`、`opens`、`requires`、`uses`\
  \ 和 `provides`。`exports` 语句在编译时和运行时将模块的指定包导出到所有模块或指定的模块列表。`opens` 语句在运行时授予对指定包的反射访问权限，允许所有模块或指定的模块列表访问。其他模块可以使用反射访问指定包中的所有类型以及这些类型的所有成员（私有和公有）。`uses`\
  \ 和 `provides` 模块语句用于配置模块以发现服务实现并提供特定服务接口的服务实现。\n\n从 JDK 9 开始，`open`、`module`、`requires`、`transitive`、`exports`、`opens`、`to`、`uses`、`provides`\
  \ 和 `with` 是受限关键字。它们仅在模块声明中的特定位置出现时才具有特殊含义。\n\n模块的源代码和编译后的代码存放在目录、JAR 文件或 JMOD 文件中。在目录和\
  \ JAR 文件中，`module-info.class` 文件位于根目录。\n\n与类路径类似，JDK 9 引入了模块路径。然而，它们的使用方式不同。类路径用于搜索类型的定义，而模块路径用于定位模块，而不是模块中的特定类型。诸如\
  \ `java` 和 `javac` 之类的 Java 工具已更新，可以同时使用模块路径和类路径。你可以使用 `--module-path` 或 `-p` 选项为这些工具指定模块路径。\n\
  \nJDK 9 引入了 GNU 风格的选项供工具使用。这些选项以两个破折号开头，每个单词之间用破折号分隔，例如 `--module-path`、`--class-path`、`--list-modules`\
  \ 等。如果选项接受一个值，该值可以在选项后跟一个空格或 `=` 号。以下两个选项是相同的：\n\n• `--module-path C:\\lib`\n\n\
  • `--module-path=C:\\lib`\n\n在某个阶段（编译时、运行时、工具等）模块系统可用的模块列表称为可观察模块。你可以使用 `java` 命令的\
  \ `--list-modules` 选项列出运行时可用的可观察模块。你也可以使用此选项打印模块的描述。\n\n**第 3 章**\n\n**创建你的第一个模块**\n\
  \n在本章中，你将学习：\n\n• 如何编写模块化的 Java 程序\n\n• 如何编译模块化程序\n\n• 如何将模块的工件打包成模块化 JAR 文件\n\n\
  • 如何运行模块化程序\n\n在本章中，我将解释如何使用模块——从编写源代码到编译、打包和运行程序。本章分为两部分。第一部分展示了使用命令行编写和运行模块程序的所有步骤。第二部分使用\
  \ NetBeans IDE 重复相同的步骤。\n\n在撰写本文时，NetBeans IDE 仍在开发中，并不支持所有 JDK 9 功能。例如，目前你需要在 NetBeans\
  \ 中为你创建的每个模块创建一个新的 Java 项目。在最终版本中，NetBeans 将允许你在一个 Java 项目中拥有多个模块。我在使用命令提示符时比使用\
  \ NetBeans IDE 时涵盖了更多特定的 JDK 9 选项。\n\n本章解释的程序非常简单。程序运行时，会打印一条消息以及主类所属的模块名称。\n\n\
  使用命令提示符\n\n以下小节描述了使用命令提示符创建和运行第一个模块的步骤。\n\n设置目录\n\n你将使用以下目录层次结构来编写、编译、打包和运行源代码：\n\
  \n• `C:\\Java9Revealed`\n\n• `C:\\Java9Revealed\\lib`\n\n• `C:\\Java9Revealed\\\
  mods`\n\n• `C:\\Java9Revealed\\src`\n\n• `C:\\Java9Revealed\\src\\com.jdojo.intro`\n\
  \n© Kishori Sharan 2017\nK. Sharan, *Java 9 Revealed*, DOI 10.1007/978-1-4842-2592-9_3\n\
  \n第 3 章 ■ 创建你的第一个模块\n\n这些目录是在 Windows 上设置的。在非 Windows 操作系统上，你可以设置类似的目录层次结构。`C:\\\
  Java9Revealed` 是顶级目录，包含三个子目录：`lib`、`mods` 和 `src`。\n\n`src` 目录用于存储源代码，其中包含一个名为 `com.jdojo.intro`\
  \ 的子目录。我将子目录命名为 `com.jdojo.intro`，因为我想创建一个名为 `com.jdojo.intro` 的模块，并将其源代码存储在此子目录下。在这种情况下，是否有必要将子目录命名为\
