  \ 工具的详细帮助信息。\n\n清单 15-4 包含一个 `JDeprScanTest` 类的代码。这段代码很简单。它仅用于编译，而非运行。运行它不会产生任何有趣的输出。它创建了两个线程。一个线程使用\
