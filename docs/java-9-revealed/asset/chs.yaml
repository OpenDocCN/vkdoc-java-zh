  \nrequires transitive java.scripting;\n\nrequires transitive java.compiler;\n\n\
  requires transitive java.naming;\n\nrequires transitive java.instrument;\n\nrequires\
  \ transitive java.xml.crypto;\n\nrequires transitive java.prefs;\n\n\n\nrequires\
  \ transitive java.sql.rowset;\n\nrequires java.base;\n\nrequires transitive java.datatransfer;\n\
  \n}\n\n你也可以使用 `jrt` 方案来引用系统类。以下命令打印了 `java.base` 模块中 `java.lang.Object` 类的类信息：\n\
  \nC:\\Java9Revealed>javap jrt:/java.base/java/lang/Object.class\n\nCompiled from\
  \ \"Object.java\"\n\npublic class java.lang.Object {\n\npublic java.lang.Object();\n\
  \npublic final native java.lang.Class<?> getClass();\n\npublic native int hashCode();\n\
  \npublic boolean equals(java.lang.Object);\n\n...\n\n}\n\n**总结**\n\n如果一个模块需要使用另一个模块中包含的公共类型，那么第二个模块需要导出包含这些类型的包，并且第一个模块需要读取第二个模块。\n\
  \n一个模块使用 `exports` 语句导出其包。一个模块可以仅向特定模块导出其包。导出包中的公共类型在编译时和运行时对其他模块可用。导出的包不允许对公共类型的非公共成员进行深度反射。\n\
  \n如果一个模块希望允许其他模块使用反射访问所有类型的成员（公共和非公共），则该模块必须声明为开放模块，或者该模块可以使用 `opens` 语句有选择地开放包。从开放包访问类型的模块不需要读取包含这些开放包的模块。\n\
  \n一个模块使用 `requires` 语句声明对另一个模块的依赖。这种依赖可以使用 `transitive` 修饰符声明为传递依赖。如果模块 M 声明了对模块\
  \ N 的传递依赖，那么任何声明了对模块 M 依赖的模块都隐式声明了对模块 N 的依赖。\n\n依赖可以在编译时声明为强制性的，但在运行时使用 `requires`\
  \ 语句中的 `static` 修饰符声明为可选的。依赖可以同时是运行时可选的和传递的。\n\nJDK 9 中的模块系统改变了公共类型的含义。模块中定义的公共类型可能属于以下三类之一：仅在定义模块内公共、仅对特定模块公共、或对所有模块公共。\n\
  \n**第 4 章 ■ 模块依赖**\n\n根据模块的声明方式以及它是否有名称，存在几种类型的模块。\n\n根据模块是否有名称，模块可以是*具名模块*或*未命名模块*。当模块有名称时，该名称可以在模块声明中显式给出，或者名称可以自动（或隐式）生成。如果名称在模块声明中显式给出，则称为*显式模块*。如果名称由模块系统通过读取模块路径上的\
  \ JAR 文件名生成，则称为*自动模块*。如果你声明一个模块而不使用 `open` 修饰符，则称为*普通模块*。如果你使用 `open` 修饰符声明一个模块，则称为*开放模块*。基于这些定义，开放模块也是一个显式模块和一个具名模块。自动模块是一个具名模块，因为它有一个自动生成的名称，但它不是一个显式模块，因为它是由模块系统在编译时和运行时隐式声明的。\n\
  \n当你将一个 JAR（不是模块 JAR）放在模块路径上时，该 JAR 代表一个自动模块，其名称源自 JAR 文件名。自动模块读取所有其他模块，并且其所有包都被导出和开放。\n\
  \n在 JDK 9 中，类加载器可以从模块或类路径加载类。每个类加载器维护一个名为未命名模块的模块，该模块包含它从类路径加载的所有类型。未命名模块读取所有其他模块。它将其所有包导出并开放给所有其他模块。未命名模块没有名称，因此显式模块不能声明对未命名模块的编译时依赖。如果显式模块需要访问未命名模块中的类型，前者可以使用自动模块作为桥梁或使用反射。\n\
  \n你可以使用 `javap` 工具打印模块声明或属性。使用该工具的 `-verbose`（或 `-v`）选项来打印模块描述符的类属性。JDK 9 以特殊格式存储运行时映像。JDK\
  \ 9 引入了一种名为 `jrt` 的新文件方案，你可以使用它来访问运行时映像的内容。其语法是 `jrt:/<module>/<path-to-a-file>`。\n\
  \n**第 5 章**\n\n**实现服务**\n\n在本章中，你将学习：\n\n• 什么是服务、服务接口和服务提供者\n\n• 如何在 JDK 9 及 JDK\
  \ 9 之前实现服务\n\n• 如何使用 Java 接口作为服务实现\n\n• 如何使用 `ServiceLoader` 类加载服务提供者\n\n• 如何在模块声明中使用\
  \ `uses` 语句来指定当前模块使用 `ServiceLoader` 类加载的服务接口\n\n• 如何使用 `provides` 语句为服务接口指定当前模块提供的服务提供者\n\
  \n• 如何在不实例化服务提供者的情况下，根据其类发现、过滤和选择服务提供者\n\n• 如何在 JDK 9 之前打包服务提供者\n\n**什么是服务？**\n\n\
  由应用程序（或库）提供的特定功能称为*服务*。例如，你可以有不同的库提供*素数服务*，该服务可以检查一个数是否为素数，并生成给定数之后的下一个素数。为服务提供实现的应用程序和库称为*服务提供者*。使用服务的应用程序称为*服务消费者*或*客户端*。\n\
  \n客户端如何使用服务？客户端是否知道所有服务提供者？客户端是否可以在不知道任何服务提供者的情况下获取服务？我将在本章中回答这些问题。\n\nJava SE 6\
  \ 提供了一种机制，允许服务提供者和服务消费者之间松散耦合。也就是说，服务消费者可以使用服务提供者提供的服务，而无需知道服务提供者。\n\n在 Java 中，*服务*由一组接口和类定义。服务包含一个接口或抽象类，它定义了服务提供的功能，这被称为*服务提供者接口*或简称为*服务接口*。请注意，“服务提供者接口”或“服务接口”中的“接口”一词并非指\
  \ Java 中的接口结构。它可以是一个 Java 接口或一个抽象类。使用具体类作为服务接口是可能的，但不推荐。有时，服务接口也被称为*服务类型*——用于标识服务的类型。\n\
  \n*服务*的特定实现称为*服务提供者*。一个服务提供者接口可以有多个服务提供者。通常，一个服务提供者由多个接口和类组成，为服务接口提供实现。\n\n© Kishori\
  \ Sharan 2017\n\nK. Sharan, *Java 9 Revealed*, DOI 10.1007/978-1-4842-2592-9_5\n\
  \n第 5 章 ■ 实现服务\n\nJDK 包含一个 `java.util.ServiceLoader<S>` 类，其唯一目的是在运行时为类型为 S 的服务接口发现和加载服务提供者。`ServiceLoader`\
  \ 类允许服务消费者和服务提供者之间解耦。服务消费者只知道服务接口；`ServiceLoader` 类使实现服务接口的服务提供者的实例对消费者可用。图 5-1\
  \ 展示了服务、服务提供者和服务消费者的安排示意图。\n\n服务提供者\n\n服务提供者\n\n服务\n\n服务提供者\n\n客户端\n\n\n\n***图 5-1.**\
  \ 服务、服务提供者与服务消费者的结构* 通常，服务会使用 `ServiceLoader` 类加载所有服务提供者，并将其提供给服务消费者（或客户端）。这种架构支持插件机制，可以在不影响服务和服务消费者的前提下添加或移除服务提供者。服务消费者仅知晓服务接口，而不知道该服务接口的任何具体实现（即服务提供者）。\n\
  \n■ **提示** 建议阅读 `java.util.ServiceLoader` 类的文档，以全面了解 JDK 9 提供的服务加载机制。\n\n在本章中，我将使用一个服务接口和三个服务提供者。它们的模块、类/接口名称及简要说明列于表\
  \ 5-1。图 5-2 展示了按服务、服务提供者和服务消费者组织的类/接口，可与表 5-1 进行对比。\n\n***表 5-1.** 本章示例中使用的模块、类与接口列表*\
  \ **模块**\n\n**类/接口**\n\n**说明**\n\ncom.jdojo.prime\n\nPrimeChecker\n\n作为服务接口和服务\n\
  \ncom.jdojo.prime.generic\n\nGenericPrimeChecker\n\n服务提供者\n\ncom.jdojo.prime.faster\n\
  \nFasterPrimeChecker\n\n服务提供者\n\ncom.jdojo.prime.probable\n\nProbablePrimeChecker\n\
  \n服务提供者\n\ncom.jdojo.prime.client\n\nMain\n\n服务消费者\n\n第 5 章 ■ 实现服务\n\nGenericPrimeChecker\n\
  \nFasterPrimeChecker\n\nPrimeChecker\n\nProbablePrimeChecker\n\nMain\n\n***图 5-2.**\
  \ 本章示例中使用的服务、三个服务提供者与服务消费者的结构*\n\n发现服务\n\n为了使用服务，需要发现并加载其提供者。`java.util.ServiceLoader`\
  \ 类负责发现和加载服务提供者。发现并加载服务提供者的模块必须在其声明中包含 `uses` 语句，其语法如下：`uses <服务接口>;`\n\n其中，`<服务接口>`\
  \ 是服务接口的名称，可以是 Java 接口名、类名或注解类型名。如果某个模块使用 `ServiceLoader<S>` 类为名为 `S` 的服务接口加载服务提供者实例，则该模块声明必须包含以下语句：\n\
  \n`uses S;`\n\n■ **提示** 在我看来，`uses` 这个语句名称似乎有些用词不当。乍一看，似乎当前模块将使用指定的服务。然而，事实并非如此。服务是由客户端使用的，而不是定义该服务的模块。更直观的语句名称应该是\
  \ `discovers` 或 `loads`。\n\n不过，我们只能接受现有的命名。如果你将其理解为：包含 `uses` 语句的模块*使用* `ServiceLoader`\
  \ 类来为此服务接口加载服务提供者，就能正确理解其含义。除非你的客户端模块需要为服务加载服务提供者，否则无需在客户端模块中使用 `uses` 语句。客户端模块加载服务的情况并不常见。\n\
  \n一个模块可以发现并加载多个服务接口。以下模块声明使用了两个 `uses` 语句，表明它将发现并加载 `com.jdojo.PrimeChecker` 和 `com.jdojo.CsvParser`\
  \ 类型的服务接口：\n\n`module com.jdojo.loader {`\n\n`uses com.jdojo.PrimeChecker;`\n\n\
  `uses com.jdojo.CsvParser;`\n\n`// 其他模块语句放在这里`\n\n`}`\n\n第 5 章 ■ 实现服务\n\n模块声明允许使用\
  \ `import` 语句。为了提高可读性，你可以将上述模块声明重写如下：\n\n`// 从其他包导入类型`\n\n`import com.jdojo.PrimeChecker;`\n\
  \n`import com.jdojo.CsvParser;`\n\n`module com.jdojo.loader {`\n\n`uses PrimeChecker;`\n\
  \n`uses CsvParser;`\n\n`// 其他模块语句放在这里`\n\n`}`\n\n`uses` 语句中指定的服务接口可以声明在当前模块或其他模块中。如果声明在其他模块中，则该服务接口必须对当前模块中的代码可访问，否则会发生编译时错误。例如，上述声明中\
  \ `uses` 语句使用的 `com.jdojo.CsvParser` 服务接口可以声明在 `com.jdojo.loader` 模块中，也可以声明在其他模块（如\
  \ `com.jdojo.csvutil`）中。如果是后一种情况，`com.jdojo.CsvParser` 接口必须对 `com.jdojo.loader`\
  \ 模块可访问。\n\n服务提供者的发现是在运行时动态进行的。发现服务提供者的模块通常不会（也不需要）声明对服务提供者模块的编译时依赖，因为不可能预先知道所有提供者模块。服务发现模块不声明对服务提供者模块依赖的另一个原因是为了保持服务提供者与服务消费者之间的解耦。\n\
  \n提供服务实现\n\n为服务接口提供实现的模块必须包含 `provides` 语句。如果某个模块包含服务提供者，但其声明中没有 `provides` 语句，则该服务提供者将无法通过\
  \ `ServiceLoader` 类加载。也就是说，模块声明中的 `provides` 语句是向 `ServiceLoader` 类传达信息的一种方式：“嘿！我为某个服务提供了实现。当你需要该服务时，可以将我用作提供者。”\
  \ `provides` 语句的语法如下：`provides <服务接口> with <服务实现名称>;`\n\n其中，`provides` 子句指定服务接口的名称，`with`\
  \ 子句指定实现服务提供者接口的类名。在 JDK 9 中，服务提供者可以指定一个接口作为服务接口的实现。这听起来可能不正确，但事实确实如此。我会提供一个接口作为服务提供者实现类型的示例。以下模块声明包含两个\
  \ `provides` 语句：\n\n`module com.jdojo.provider {`\n\n`provides com.jdojo.PrimeChecker\
  \ with com.jdojo.impl.PrimeCheckerFactory;`\n\n`provides com.jdojo.CsvParser with\
  \ com.jdojo.impl.CsvFastParser;`\n\n`// 其他模块语句放在这里`\n\n`}`\n\n第 5 章 ■ 实现服务\n\n第一个\
  \ `provides` 语句声明 `com.jdojo.impl.PrimeCheckerFactory` 是名为 `com.jdojo.PrimeChecker`\
  \ 的服务接口的一种可能实现。第二个 `provides` 语句声明 `com.jdojo.impl.CsvFastParser` 是名为 `com.jdojo.CsvParser`\
  \ 的服务接口的一种可能实现。在 JDK 9 之前，`PrimeCheckerFactory` 和 `CsvFastParser` 必须是类。在 JDK 9 中，它们可以是类或接口。\n\
  \n一个模块可以包含 `uses` 和 `provides` 语句的任意组合——同一个模块可以为某个服务提供实现并发现同一个服务；它可以仅为一种或多种服务提供实现，也可以为一种服务提供实现并发现另一种类型的服务。\n\
  \n以下模块声明发现并提供了同一服务的实现：`module com.jdojo.parser {`\n\n`uses com.jdojo.XmlParser;`\n\
  \n`provides com.jdojo.XmlParser with com.jdojo.xml.impl.XmlParserFactory;`\n\n`//\
  \ 其他模块语句放在这里`\n\n`}`\n\n为了提高可读性，你可以使用 `import` 语句重写上述模块声明：`import com.jdojo.XmlParser;`\n\
  \n`import com.jdojo.xml.impl.XmlParserFactory;`\n\n`module com.jdojo.parser {`\n\
  \n`uses XmlParser;`\n\n`provides XmlParser with XmlParserFactory;`\n\n`// 其他模块语句放在这里`\n\
  \n`}`\n\n■ **提示** `provides` 语句的 `with` 子句中指定的服务实现类/接口必须声明在当前模块中，否则会发生编译时错误。\n\n\
  `ServiceLoader` 类会创建服务实现的实例。当服务\n\n\n\n实现是一个接口，它仅加载并返回接口引用。服务实现（一个类或接口）必须遵循以下规则：\n\
  \n• 如果服务实现隐式或显式声明了一个没有形式参数的公共构造函数，则该构造函数被称为*提供者构造函数*。\n\n• 如果服务实现包含一个名为 `provider`\
  \ 且没有形式参数的公共静态方法，则该方法被称为*提供者方法*。\n\n• 提供者方法的返回类型必须是服务接口类型或其子类型。\n\n• 如果服务实现不包含提供者方法，则服务实现的类型必须是具有提供者构造函数的类，并且该类必须是服务接口类型或其子类型。\n\
  \n第 5 章 ■ 实现服务\n\n当请求 `ServiceLoader` 类发现并加载服务提供者时，它会检查服务实现是否包含提供者方法。如果找到提供者方法，则该方法的返回值就是\
  \ `ServiceLoader` 类返回的服务。如果未找到提供者方法，则使用提供者构造函数实例化服务实现。如果服务实现既不包含提供者方法也不包含提供者构造函数，则会发生编译时错误。\n\
  \n根据这些规则，可以使用 Java 接口作为服务实现。该接口应有一个名为 `provider` 的公共静态方法，该方法返回服务接口类型的实例。\n\n以下小节将引导您完成在\
  \ JDK 9 中实现服务的步骤。最后一个小节解释了如何使同一服务在非模块化环境中工作。\n\n定义服务接口\n\n在本节中，您将开发一个名为*质数检查器*的服务。我将保持服务简单，以便您可以专注于在\
  \ JDK 9 中使用服务提供者机制，而不是编写复杂代码来实现服务功能。该服务的要求如下：\n\n• 服务应提供一个 API 来检查一个数字是否为质数。\n•\
  \ 客户端应能够知道服务提供者的名称。也就是说，每个服务提供者都应能够指定其名称。\n• 客户端应能够在不指定服务提供者名称的情况下检索服务实例。在这种情况下，返回\
  \ `ServiceLoader` 类找到的第一个服务提供者。如果未找到服务提供者，则抛出 `RuntimeException`。\n• 客户端应能够通过指定服务提供者名称来检索服务实例。如果指定名称的服务提供者不存在，则抛出\
  \ `RuntimeException`。\n\n让我们设计服务。服务提供的功能将由一个名为 `PrimeChecker` 的接口表示。它将包含两个方法：\n\n\
  ```java\npublic interface PrimeChecker {\n    String getName();\n    boolean isPrime(long\
  \ n);\n}\n```\n\n`getName()` 方法返回服务提供者的名称。如果指定的参数是质数，`isPrime()` 方法返回 `true`，否则返回\
  \ `false`。所有服务提供者都将实现 `PrimeChecker` 接口。`PrimeChecker` 接口是我们的服务接口（或服务类型）。\n\n服务需要向客户端提供\
  \ API 来检索服务提供者的实例。在客户端检索它们之前，服务需要发现并加载所有服务提供者。服务提供者使用 `ServiceLoader` 类加载。该类没有公共构造函数。您可以使用其\
  \ `load()` 方法之一获取其实例，以加载特定类型的服务。您需要传递服务提供者接口的类。`ServiceLoader` 类包含一个 `iterator()`\
  \ 方法，该方法返回一个 `Iterator`，用于遍历由此 `ServiceLoader` 加载的特定服务接口的所有服务提供者。以下代码片段向您展示了如何加载并遍历\
  \ `PrimeChecker` 的所有服务提供者实例：\n\n```java\n// 加载 PrimeChecker 的服务提供者\nServiceLoader<PrimeChecker>\
  \ loader = ServiceLoader.load(PrimeChecker.class);\n\n// 遍历所有服务提供者实例\nIterator<PrimeChecker>\
  \ iterator = loader.iterator();\n```\n\n第 5 章 ■ 实现服务\n\n```java\nif(iterator.hasNext())\
  \ {\n    PrimeChecker checker = iterator.next();\n    // 在此处使用质数检查器...\n}\n```\n\
  \n在 JDK 8 之前，您必须创建一个类来为您的服务提供发现、加载和检索功能。从 JDK 8 开始，您可以将静态方法添加到接口中。让我们为服务接口添加两个静态方法来实现这些目的：\n\
  \n```java\npublic interface PrimeChecker {\n    String getName();\n    boolean isPrime(long\
  \ n);\n    static PrimeChecker newInstance();\n    static PrimeChecker newInstance(String\
  \ providerName)\n}\n```\n\n`newInstance()` 方法将返回找到的第一个 `PrimeChecker` 实例。另一个版本将返回具有指定提供者名称的服务提供者实例。\n\
  \n让我们创建一个名为 `com.jdojo.prime` 的模块。清单 5-1 展示了 `PrimeChecker` 接口的完整代码。\n\n***清单 5-1.***\
  \ 名为 PrimeChecker 的服务提供者接口\n\n```java\n// PrimeChecker.java\npackage com.jdojo.prime;\n\
  \nimport java.util.ServiceLoader;\n\npublic interface PrimeChecker {\n    /**\n\
  \     * 返回服务提供者名称。\n     *\n     * @return 服务提供者名称\n     */\n    String getName();\n\
  \n    /**\n     * 如果指定的数字是质数，则返回 true，否则返回 false。\n     *\n     * @param n 要检查是否为质数的数字\n\
  \     * @return 如果指定的数字是质数，则返回 true，否则返回 false。\n     */\n    boolean isPrime(long\
  \ n);\n\n    /**\n     * 返回找到的第一个 PrimeChecker 服务提供者。\n     *\n     * @return 找到的第一个\
  \ PrimeChecker 服务提供者。\n     * @throws RuntimeException 当未找到 PrimeChecker 服务提供者时。\n\
  \     */\n    static PrimeChecker newInstance() throws RuntimeException {\n    \
  \    return ServiceLoader.load(PrimeChecker.class)\n                .findFirst()\n\
  \                .orElseThrow(() -> new RuntimeException(\n                    \
  \    \"未找到 PrimeChecker 服务提供者。\"));\n    }\n\n    /**\n     * 按名称返回 PrimeChecker\
  \ 服务提供者实例。\n     *\n     * @param providerName 质数检查器服务提供者名称\n     * @return 一个 PrimeChecker\
  \ 实例\n     */\n    static PrimeChecker newInstance(String providerName) throws RuntimeException\
  \ {\n        ServiceLoader<PrimeChecker> loader = ServiceLoader.load(PrimeChecker.class);\n\
  \        for (PrimeChecker checker : loader) {\n            if (checker.getName().equals(providerName))\
  \ {\n                return checker;\n            }\n        }\n        throw new\
  \ RuntimeException(\"未找到名称为 '\" + providerName + \"' 的 PrimeChecker 服务提供者。\");\n\
  \    }\n}\n```\n\n`com.jdojo.prime` 模块的声明如清单 5-2 所示。它导出了 `com.jdojo.prime` 包，因为服务提供者模块和客户端模块将需要使用\
  \ `PrimeChecker` 接口。\n\n***清单 5-2.*** com.jdojo.prime 模块的模块声明\n\n```java\n// module-info.java\n\
  module com.jdojo.prime {\n    exports com.jdojo.prime;\n    uses com.jdojo.prime.PrimeChecker;\n\
  }\n```\n\n您需要使用带有 `PrimeChecker` 接口完全限定名的 `uses` 语句，因为此模块中的代码（此接口中的 `newInstance()`\
  \ 方法）将使用 `ServiceLoader` 类来加载此接口的服务提供者。如果您想在 `uses` 语句中使用简单名称，请添加适当的 import 语句，如前几节所示。\n\
  \n定义质数检查器服务所需的工作就是这些。\n\n第 5 章 ■ 实现服务\n\n定义服务提供者\n\n在接下来的两节中，您将为 `PrimeChecker`\
  \ 服务接口创建两个服务提供者。第一个服务提供者将实现一个通用的质数检查器，而第二个将实现一个更快的质数检查器。之后，您将创建一个客户端来测试该服务。您将可以选择使用其中一个或两个服务提供者。\n\
  \n\n\n这些服务提供者将实现算法来检查给定数字是否为质数。理解质数的定义将对你有所帮助：一个不能被 1 或自身整除且无余数的正整数称为质数。1 不是质数。质数的几个例子有\
  \ 2、3、5、7 和 11。\n\n定义通用质数服务提供者\n\n在本节中，你将为一个 PrimeChecker 服务定义一个通用服务提供者。为服务定义服务提供者，就是创建一个实现服务接口的类，或者创建一个包含提供者方法的接口。在本例中，你将创建一个名为\
  \ GenericPrimeChecker 的类，它实现了 PrimeChecker 接口，并将包含一个提供者构造函数。\n\n该服务提供者将在一个名为 com.jdojo.prime.generic\
  \ 的独立模块中定义。\n\n清单 5-3 包含了模块声明。该模块声明目前无法编译。\n\n***清单 5-3.*** com.jdojo.prime.generic\
  \ 模块的模块声明\n\n// module-info.java\n\nmodule com.jdojo.prime.generic {\n\nrequires\
  \ com.jdojo.prime;\n\nprovides com.jdojo.prime.PrimeChecker\n\nwith com.jdojo.prime.generic.GenericPrimeChecker;\n\
  \n}\n\n需要 requires 语句，因为该模块将使用来自 com.jdojo.prime 模块的 PrimeChecker 接口。在 NetBeans\
  \ 中，将 com.jdojo.prime 项目添加到 com.jdojo.prime.generic 项目的模块路径中。这将消除模块声明中的编译时错误，该错误是由于\
  \ requires 语句中引用的 com.jdojo.prime 模块缺失导致的。\n\nprovides 语句指定该模块为 PrimeChecker 接口提供了一个实现，其\
  \ with 子句指定了实现类的名称。实现类必须满足以下条件：\n\n• 它必须是一个公共的具体类。它可以是顶层类或嵌套静态类。\n\n它不能是内部类或抽象类。\n\
  \n• 它必须有一个公共的无参构造函数。ServiceLoader 类使用此构造函数通过反射实例化服务提供者。请注意，你并未在 GenericPrimeChecker\
  \ 类中提供提供者方法，这是提供无参公共构造函数的一种替代方案。\n\n• 实现类的实例必须与服务提供者接口赋值兼容。\n\n如果这些条件中的任何一个未满足，则会发生编译时错误。请注意，你不需要导出包含服务实现类的\
  \ com.jdojo.prime.generic 包，因为任何客户端都不应直接依赖于服务实现。客户端只需要知道服务接口，而不需要知道任何特定的服务实现。ServiceLoader\
  \ 类可以访问和实例化实现类，而无需模块导出包含该服务实现的包。\n\n第 5 章 ■ 实现服务\n\n■ **提示** 如果模块使用了 provides 语句，则指定的服务接口可能位于当前模块或另一个可访问的模块中。with\
  \ 子句中指定的服务实现类/接口必须在当前模块中定义。\n\n清单 5-4 包含了 GenericPrimeChecker 类的代码，该类是 PrimeChecker\
  \ 服务接口的服务实现。isPrime()方法返回服务提供者的名称。我提供了 jdojo.generic.primechecker 作为其名称。这是一个任意名称。如果指定的数字是质数，则\
  \ isPrime()方法返回 true；否则返回 false。getName()方法返回提供者名称。\n\n***清单 5-4.*** GenericPrimeChecker\
  \ 类：PrimeChecker 服务接口的服务实现类\n\n// GenericPrimeChecker.java\n\npackage com.jdojo.prime.generic;\n\
  \nimport com.jdojo.prime.PrimeChecker;\n\npublic class GenericPrimeChecker implements\
  \ PrimeChecker {\n\nprivate static final String PROVIDER_NAME = \"jdojo.generic.primechecker\"\
  ;\n\n\n\n@Override\n\npublic boolean isPrime(long n) {\n\nif(n <= 1) {\n\nreturn\
  \ false;\n\n}\n\nif (n == 2) {\n\nreturn true;\n\n}\n\nif(n%2 == 0) {\n\nreturn\
  \ false;\n\n}\n\nfor(long i = 3; i < n; i += 2) {\n\nif(n%i == 0) {\n\nreturn false;\n\
  \n}\n\n}\n\nreturn true;\n\n}\n\n@Override\n\npublic String getName() {\n\nreturn\
  \ PROVIDER_NAME;\n\n}\n\n}\n\n第 5 章 ■ 实现服务\n\n这就是该模块的全部内容。如前所述，要编译此模块，你需要在模块路径中包含\
  \ `com.jdojo.prime` 模块。将此模块编译并打包为模块化 JAR。目前，还没有什么可测试的。\n\n定义更快的素数服务提供者\n\n在本节中，你将定义\
  \ `PrimeChecker` 服务接口的另一个服务提供者。我们将其称为*更快*的服务提供者，因为你将实现一个更快的算法来检查素数。该服务提供者将定义在一个名为\
  \ `com.jdojo.prime.faster` 的独立模块中，服务实现类名为 `FasterPrimeChecker`。\n\n清单 5-5 包含了模块声明，这与我们为\
  \ `com.jdojo.prime.generic` 模块所做的声明类似。这次，只有 `with` 子句中的类名发生了变化。\n\n***清单 5-5.***\
  \ com.jdojo.prime.faster 模块的模块声明\n\n// module-info.java\n\nmodule com.jdojo.prime.faster\
  \ {\n\nrequires com.jdojo.prime;\n\nprovides com.jdojo.prime.PrimeChecker\n\nwith\
  \ com.jdojo.prime.faster.FasterPrimeChecker;\n\n}\n\n模块声明中的 `requires` 语句要求你将 `com.jdojo.prime`\
  \ 项目添加到 NetBeans 中 `com.jdojo.prime.faster` 项目的模块路径中，以便在模块路径上找到 `com.jdojo.prime`\
  \ 模块。\n\n清单 5-6 包含了 `FasterPrimeChecker` 类的代码，其 `isPrime()` 方法的执行速度比 `GenericPrimeChecker`\
  \ 类的 `isPrime()` 方法更快。这次，该方法循环遍历所有从 3 开始、到被测试素数的平方根结束的奇数。\n\n***清单 5-6.*** 用作服务提供者的\
  \ `PrimeChecker` 接口的实现类 `FasterPrimeChecker`\n\n// FasterPrimeChecker.java\n\npackage\
  \ com.jdojo.prime.faster;\n\nimport com.jdojo.prime.PrimeChecker;\n\npublic class\
  \ FasterPrimeChecker implements PrimeChecker {\n\nprivate static final String PROVIDER_NAME\
  \ = \"jdojo.faster.primechecker\";\n\n// 无提供者构造函数\n\nprivate FasterPrimeChecker()\
  \ {\n\n// 无代码\n\n}\n\n// 定义一个提供者方法\n\npublic static PrimeChecker provider() {\n\n\
  return new FasterPrimeChecker();\n\n}\n\n第 5 章 ■ 实现服务\n\n@Override\n\npublic boolean\
  \ isPrime(long n) {\n\nif (n <= 1) {\n\nreturn false;\n\n}\n\nif (n == 2) {\n\n\
  return true;\n\n}\n\nif (n % 2 == 0) {\n\nreturn false;\n\n}\n\nlong limit = (long)\
  \ Math.sqrt(n);\n\nfor (long i = 3; i <= limit; i += 2) {\n\nif (n % i == 0) {\n\
  \nreturn false;\n\n}\n\n}\n\nreturn true;\n\n}\n\n@Override\n\npublic String getName()\
  \ {\n\nreturn PROVIDER_NAME;\n\n}\n\n}\n\n请注意 清单 5-4 和 清单 5-6 中 `GenericPrimeChecker`\
  \ 与 `FasterPrimeChecker` 类之间的区别。`GenericPrimeChecker` 类包含一个默认构造函数，该函数充当提供者构造函数。它不包含提供者方法。`FasterPrimeChecker`\
  \ 类将无参构造函数设为私有，因此它不符合提供者构造函数的条件。回顾一下，提供者构造函数是一个公共的无参构造函数，由 `ServiceLoader` 类用于实例化服务实现类。`FasterPrimeChecker`\
  \ 类则提供了一个提供者方法，声明如下：\n\npublic static PrimeChecker provider() {/*...*/}\n\n当 `ServiceLoader`\
  \ 类需要实例化更快的素数服务时，它将调用此方法。该方法非常简单——它创建并返回一个 `FasterPrimeChecker` 类的对象。\n\n这就是该模块目前所需的全部内容。要编译此模块，`com.jdojo.prime`\
  \ 模块需要位于模块路径中。将此模块编译并打包为模块化 JAR。目前，还没有什么可测试的。\n\n第 5 章 ■ 实现服务\n\n定义最快的素数服务提供者\n\n\
  \n好的，作为高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n在本节中，我将向您展示如何使用 Java\
  \ 接口作为服务实现。您将为 `PrimeChecker` 服务接口定义另一个服务提供者。我们将其称为*可能*素数服务提供者，因为它会告诉您一个数字*可能*是素数。该服务提供者将在一个名为\
  \ `com.jdojo.prime.probable` 的独立模块中定义，服务实现接口称为 `ProbablePrimeChecker`。\n\n该服务用于检查素数。`java.math`\
  \ 包中的 `BigInteger` 类包含一个名为 `isProbablePrime(int certainty)` 的方法。如果该方法返回 `true`，则该数字可能是素数。如果该方法返回\
  \ `false`，则该数字肯定不是素数。`certainty` 参数决定了该方法在返回 `true` 之前确保该数字是素数的程度。`certainty` 参数的值越高，此方法产生的成本就越高，并且当方法返回\
  \ `true` 时，该数字是素数的概率就越高。\n\n清单 5-7 包含了模块声明，这与我们之前为其他两个模块所做的声明类似。这次，只更改了 `with` 子句中的类/接口名称。\n\
  \n***清单 5-7.*** com.jdojo.prime.probable 模块的模块声明\n\n// module-info.java\n\nmodule\
  \ com.jdojo.prime.probable {\n\nrequires com.jdojo.prime;\n\nprovides com.jdojo.prime.PrimeChecker\n\
  \nwith com.jdojo.prime.probable.ProbablePrimeChecker;\n\n}\n\n模块声明中的 `requires`\
  \ 语句将要求您将 `com.jdojo.prime` 项目添加到 NetBeans 中 `com.jdojo.prime.probable` 项目的模块路径中，以便在模块路径上找到\
  \ `com.jdojo.prime` 模块。清单 5-8 包含了 `ProbablePrimeChecker` 类的代码。\n\n***清单 5-8.***\
  \ 用作服务提供者的 `PrimeChecker` 接口的实现接口 `ProbablePrimeChecker`\n\n// ProbablePrimeChecker.java\n\
  \npackage com.jdojo.prime.probable;\n\nimport com.jdojo.prime.PrimeChecker;\n\n\
  import java.math.BigInteger;\n\npublic interface ProbablePrimeChecker {\n\n// 一个提供者方法\n\
  \npublic static PrimeChecker provider() {\n\nfinal String PROVIDER_NAME = \"jdojo.probable.primechecker\"\
  ;\n\nreturn new PrimeChecker() {\n\n@Override\n\npublic boolean isPrime(long n)\
  \ {\n\n// 使用 1000 以获得高确定性，这是我选择的一个任意大数字\n\nint certainty = 1000;\n\nreturn BigInteger.valueOf(n).isProbablePrime(certainty);\n\
  \n}\n\n第 5 章 ■ 实现服务\n\n@Override\n\npublic String getName() {\n\nreturn PROVIDER_NAME;\n\
  \n}\n\n};\n\n}\n\n}\n\n`ProbablePrimeChecker` 接口只包含一个方法，即提供者方法：\n\npublic static\
  \ PrimeChecker provider() {/*...*/}\n\n当 `ServiceLoader` 类需要实例化可能素数服务时，它将调用此方法。\n\
  \n该方法非常简单——它创建并返回一个 `PrimeChecker` 接口的实例。`isPrime()` 方法使用 `BigInteger` 类来检查该数字是否可能是素数。提供者的名称是\
  \ `jdojo.probable.primechecker`。请注意，该接口并未扩展 `PrimeChecker` 接口。要成为服务实现，其提供者方法必须返回服务接口（`PrimeChecker`\
  \ 接口）或其子类型的实例。通过将提供者方法的返回类型声明为 `PrimeChecker`，您已经满足了此要求。\n\n这就是此模块的全部内容。要编译此模块，您需要将\
  \ `com.jdojo.prime` 模块添加到模块路径中。将此模块编译并打包为模块化 JAR。此时，没有什么需要测试的。\n\n测试素数服务\n\n在本节中，您将通过创建一个客户端应用程序来测试该服务，该应用程序将定义在一个名为\
  \ `com.jdojo.prime.client` 的独立模块中。清单 5-9 包含了模块声明。\n\n***清单 5-9.*** com.jdojo.prime.client\
  \ 模块的模块声明\n\n// module-info.java\n\nmodule com.jdojo.prime.client {\n\nrequires\
  \ com.jdojo.prime;\n\n}\n\n客户端模块只需要知道服务接口。在这种情况下，`com.jdojo.prime` 模块定义了服务接口。因此，客户端模块读取服务接口模块，而不读取其他模块。在现实世界中，客户端模块会比这复杂得多，并且可能也会读取其他模块。在\
  \ NetBeans 中，为了编译 `com.jdojo.prime.client` 模块，您需要将 `com.jdojo.prime` 项目添加到其模块路径中。图\
  \ 5-3 显示了 `com.jdojo.prime.client` 模块的模块图。\n\n![](img/index-140_1.jpg)\n\n第 5 章\
  \ ■ 实现服务\n\n***图 5-3.*** com.jdojo.prime.client 模块的模块图\n\n■ **提示** 客户端模块不知道服务提供者模块，因此不需要直接读取它们。服务有责任发现所有服务提供者，并使它们的实例可供客户端使用。在这种情况下，`com.jdojo.prime`\
  \ 模块定义了 `com.jdojo.prime.PrimeChecker` 接口，该接口既是服务接口，也充当服务。\n\n清单 5-10 包含了使用 `PrimeChecker`\
  \ 服务的客户端代码。\n\n***清单 5-10.*** 用于测试 PrimeChecker 服务的主类\n\n// Main.java\n\npackage\
  \ com.jdojo.prime.client;\n\nimport com.jdojo.prime.PrimeChecker;\n\npublic class\
  \ Main {\n\npublic static void main(String[] args) {\n\n// 要检查是否为素数的数字\n\nlong[]\
  \ numbers = {3, 4, 121, 977};\n\n// 尝试默认的素数检查器服务提供者\n\ntry {\n\nPrimeChecker checker\
  \ = PrimeChecker.newInstance();\n\ncheckPrimes(checker, numbers);\n\n} catch (RuntimeException\
  \ e) {\n\nSystem.out.println(e.getMessage());\n\n}\n\n第 5 章 ■ 实现服务\n\n// 尝试更快的素数检查器\n\
  \ntry {\n\nPrimeChecker checker = PrimeChecker.newInstance(\"jdojo.faster.primechecker\"\
  );\n\ncheckPrimes(checker, numbers);\n\n} catch (RuntimeException e) {\n\nSystem.out.println(e.getMessage());\n\
  \n}\n\n// 尝试可能素数检查器\n\ntry {\n\nPrimeChecker checker = PrimeChecker.newInstance(\"\
  jdojo.probable.primechecker\");\n\ncheckPrimes(checker, numbers);\n\n} catch (RuntimeException\
  \ e) {\n\nSystem.out.println(e.getMessage());\n\n}\n\n}\n\npublic static void checkPrimes(PrimeChecker\
  \ primeChecker, long... numbers) {\n\nSystem.out.format(\"使用 %s:%n\", primeChecker.getName());\n\
  \nfor (long n : numbers) {\n\nif (primeChecker.isPrime(n)) {\n\nSystem.out.printf(\"\
  %d 是素数。%n\", n);\n\n} else {\n\nSystem.out.printf(\"%d 不是素数。%n\", n);\n\n}\n\n}\n\
  \n}\n\n}\n\n`checkPrimes()` 方法接受一个 `PrimeChecker` 实例和可变长参数 `long` 数字。它使用 `PrimeChecker`\
  \ 来检查数字是否为素数，并打印相应的消息。`main()` 方法检索默认的 `PrimeChecker` 服务提供者实例，以及 `jdojo.faster.primechecker`\
  \ 和 `jdojo.probable.primechecker` 服务提供者的实例。它使用所有三个服务提供者实例来检查同一组数字是否为素数。编译并打包模块的代码。\n\
  \n如果您在模块路径中仅使用两个模块 `com.jdojo.prime` 和 `com.jdojo.prime.client` 运行 `Main` 类，您将得到以下输出：\n\
  \n未找到 PrimeChecker 服务提供者。\n\n未找到名称为 'jdojo.faster.primechecker' 的 PrimeChecker 服务提供者。\n\
  \n未找到名称为 'jdojo.probable.primechecker' 的 PrimeChecker 服务提供者。\n\n模块路径中没有服务提供者，因此，所有三次检索服务提供者的尝试都失败了。\n\
  \n第 5 章 ■ 实现服务\n\n如果您在模块路径上使用 `com.jdojo.prime`、`com.jdojo.prime.generic` 和 `com.jdojo.prime.client`\
  \ 模块运行 `Main` 类，您将得到以下输出：\n\n使用 jdojo.generic.primechecker:\n\n3 是素数。\n\n4 不是素数。\n\
  \n121 不是素数。\n\n977 是素数。\n\n未找到名称为 'jdojo.faster.primechecker' 的 PrimeChecker 服务提供者。\n\
  \n未找到名称为 'jdojo.probable.primechecker' 的 PrimeChecker 服务提供者。\n\n\n\n这次，模块路径中只有一个服务提供者\
  \ `jdojo.generic.primechecker`。因此，尝试检索默认服务提供者将获得该服务提供者的 `PrimeChecker` 实例。这在输出的第一部分显而易见。尝试检索其他服务提供者失败，因为在模块路径上未找到它们。\n\
  \n如果在模块路径上使用 `com.jdojo.prime`、`com.jdojo.prime.generic`、`com.jdojo.prime.faster`、`com.jdojo.prime.probable`\
  \ 和 `com.jdojo.prime.client` 模块运行 `Main` 类，你将得到类似于以下输出的结果。默认提供者是由迭代器首先找到的那个。\n\n\
  输出显示通用服务提供者为默认提供者，但当你运行程序时，可能会得到任何其他提供者作为默认提供者。\n\n使用 `jdojo.generic.primechecker`：\n\
  \n3 是质数。\n\n4 不是质数。\n\n121 不是质数。\n\n977 是质数。\n\n使用 `jdojo.faster.primechecker`：\n\
  \n3 是质数。\n\n4 不是质数。\n\n121 不是质数。\n\n977 是质数。\n\n使用 `jdojo.probable.primechecker`：\n\
  \n3 是质数。\n\n4 不是质数。\n\n121 不是质数。\n\n977 是质数。\n\n当模块系统在模块声明中遇到 `uses` 语句时，它会扫描模块路径以查找所有包含\
  \ `provides` 语句的模块，这些 `provides` 语句指定了 `uses` 语句中指定的服务接口的实现。从这个意义上说，模块中的 `uses`\
  \ 语句表示对其他模块的间接可选依赖。该依赖在运行时被解析。\n\n**选择和过滤提供者**\n\n有时，你会希望根据提供者的类名来选择它们。例如，你可能只想选择那些完全限定类名以\
  \ `com.jdojo` 开头的质数服务提供者。实现此目的的典型逻辑是使用 `ServiceLoader` 类的 `iterator()` 方法返回的迭代器。\n\
  \n然而，这种操作成本很高。迭代器在将提供者返回给你之前会实例化它，即使实例化是延迟发生的——这意味着提供者仅在需要返回时才被实例化。\n\n**第 5 章 ■\
  \ 实现服务**\n\nJDK 9 为 `ServiceLoader` 类添加了一个新方法。该方法的签名如下：\n\n```java\npublic Stream<ServiceLoader.Provider<S>>\
  \ stream()\n```\n\n`stream()` 方法返回 `ServiceProvider.Provider` 接口实例的流，该接口在 `ServiceLoader`\
  \ 类中声明为嵌套接口，如下所示：\n\n```java\npublic static interface Provider<S> extends Supplier<S>\
  \ {\n    Class<? extends S> type();\n    @Override\n    S get();\n}\n```\n\n`ServiceLoader.Provider`\
  \ 接口的实例代表一个服务提供者。其 `type()` 方法返回服务实现的 `Class` 对象。`get()` 方法实例化并返回服务提供者。`ServiceLoader.Provider`\
  \ 接口有何帮助？当你使用 `stream()` 方法时，流中的每个元素都是 `ServiceLoader.Provider` 类型。你可以根据提供者的类名或类型对流进行过滤，这不会实例化提供者。你可以在过滤器中使用\
  \ `type()` 方法。当你找到所需的提供者时，调用 `get()` 方法来实例化它。这样，你只在确定需要时才实例化提供者，而不是在遍历所有提供者时。\n\n\
  以下是使用 `ServiceLoader` 类的 `stream()` 方法的示例。它会为你提供所有类名以 `com.jdojo` 开头的质数服务提供者的列表。\n\
  \n```java\nstatic List<PrimeChecker> startsWith(String prefix) {\n    return ServiceLoader.load(PrimeChecker.class)\n\
  \            .stream()\n            .filter((Provider p) -> p.type().getName().startsWith(prefix))\n\
  \            .map(Provider::get)\n            .collect(Collectors.toList());\n}\n\
  ```\n\n你可以将此方法添加到 `PrimeChecker` 接口。添加此方法时，需要添加一些导入语句：\n\n```java\nimport java.util.List;\n\
  import java.util.ServiceLoader.Provider;\nimport java.util.stream.Collectors;\n\
  ```\n\n以下是从客户端类调用此方法的示例：\n\n```java\n// 获取所有类名以 \"com.jdojo\" 开头的质数服务列表\nList<PrimeChecker>\
  \ jdojoService = PrimeChecker.startsWith(\"com.jdojo\");\n```\n\n**第 5 章 ■ 实现服务**\n\
