  \ ➤ “构建项目”或按 `F11` 来构建项目。建议您保持“保存时编译”功能处于开启状态。\n\n打包模块代码\n\n您需要构建项目以为您的模块创建一个模块化\
  \ JAR。选择“运行” ➤ “构建项目”或按 `F11` 来构建您的项目。模块的模块化 JAR 创建在 `<项目目录>\\dist` 目录中。模块化 JAR\
  \ 以 NetBeans 项目名称命名。`com.jdojo.intro` 模块的模块化 JAR 将位于 `C:\\Java9Revealed\\com.jdojo.intro\\\
  dist\\com.jdojo.intro.jar`。\n\n在撰写本文时，NetBeans 不支持在模块化 JAR 中添加主类名称和模块版本名称。您可以使用\
  \ `jar` 命令行工具更新模块化 JAR 中的模块信息。使用如下所示的 `--update` 选项。该命令在一行内输入。为了清晰起见，此处将其显示在多行上。\n\
  \n![](img/index-74_1.jpg)\n\n第 3 章 ■ 创建您的第一个模块\n\n```\nC:\\Java9Revealed>jar --update\n\
  --file com.jdojo.intro\\dist\\com.jdojo.intro.jar\n--module-version 1.0\n--main-class\
  \ com.jdojo.intro.Welcome\n```\n\n您可以使用以下命令验证 `com.jdojo.intro` 的模块化 JAR 是否已正确更新。您应该会得到类似如下的输出：\n\
  \n```\nC:\\Java9Revealed>java --module-path com.jdojo.intro\\dist\n--list-modules\
  \ com.jdojo.intro\nmodule com.jdojo.intro@1.0 (file:///C:/Java9Revealed/com.jdojo.intro/dist/com.jdojo.intro.jar)\
  \ requires mandated java.base (@9-ea)\ncontains com.jdojo.intro\n```\n\n请注意，每次在\
  \ NetBeans IDE 中构建项目时，IDE 都会在 `C:\\Java9Revealed\\com.jdojo.intro\\dist` 目录中重新创建\
  \ `com.jdojo.intro.jar` 文件。我向您展示这些命令是为了举例说明如何更新模块化 JAR 文件以包含主类名称和模块版本。最终版本的 NetBeans\
  \ IDE（将与 JDK 9 大致同时发布）应该允许您通过 IDE 添加这些属性。\n\n运行程序\n\n选择“运行” ➤ “运行项目”或按 `F6` 来运行您的程序。如果您看到“运行项目”对话框，如图\
