  `...`\n\n**访问资源**\n\n资源是你的应用程序使用的数据，例如图像、音频、视频、文本文件等。Java 提供了一种与位置无关的方式来访问资源，即通过在类路径上定位资源。你需要像将类文件打包到\
  \ JAR 中一样打包资源，并将 JAR 添加到类路径中。通常，类文件和资源被打包在同一个 JAR 中。访问资源是每个 Java 开发人员都会执行的重要任务。在接下来的章节中，我将解释\
  \ JDK 9 之前版本和 JDK 9 中可用的 API。\n\n**JDK 9 之前的资源访问**\n\n在本节中，我将解释在 JDK 9 之前版本中如何访问资源。如果你已经知道如何在\
  \ JDK 9 之前版本中访问资源，可以跳到下一节，该节描述了如何在 JDK 9 中访问资源。\n\n在 Java 代码中，资源由资源名称标识，资源名称是由斜杠（`/`）分隔的字符串序列。对于存储在\
  \ JAR 中的资源，资源名称就是存储在 JAR 中的文件的路径。例如，在 JDK 9 之前，存储在 `rt.jar` 中 `java.lang` 包下的 `Object.class`\
  \ 文件就是一个资源，其资源名称为 `java/lang/Object.class`。\n\n在 JDK 9 之前，你可以使用以下两个类中的方法来访问资源：\n\
  \n• `java.lang.Class`\n\n• `java.lang.ClassLoader`\n\n资源由 `ClassLoader` 定位。`Class`\
  \ 类中的资源查找方法会委托给它的 `ClassLoader`。因此，一旦你理解了 `ClassLoader` 使用的资源加载过程，使用 `Class` 类的方法就不会有问题。这两个类中都有两个名称不同的实例方法：\n\
  \n• `URL getResource(String name)`\n\n• `InputStream getResourceAsStream(String\
  \ name)`\n\n这两个方法以相同的方式查找资源。它们的区别仅在于返回类型。第一个方法返回一个 `URL`，而第二个方法返回一个 `InputStream`。第二个方法等效于调用第一个方法，然后对返回的\
  \ `URL` 对象调用 `openStream()`。\n\n第 8 章 ■ JDK 9 的重大变更\n\n■ **提示** 如果未找到指定的资源，所有资源查找方法都会返回\
  \ `null`。\n\n`ClassLoader` 类包含三个额外的静态方法来查找资源：\n\n• `static URL getSystemResource(String\
  \ name)`\n\n• `static InputStream getSystemResourceAsStream(String name)`\n\n• `static\
  \ Enumeration<URL> getSystemResources(String name)`\n\n这些方法使用系统类加载器（也称为应用程序类加载器）来查找资源。第一个方法返回找到的第一个资源的\
  \ URL。第二个方法返回找到的第一个资源的 `InputStream`。第三个方法返回一个 `Enumeration`，其中包含所有具有指定资源名称的资源的\
  \ URL。\n\n要查找资源，你可以从两种类型的方法中进行选择——`getSystemResource*` 和 `getResource*`。在讨论哪种方法最好之前，理解有两种类型的资源非常重要：\n\
  \n• 系统资源\n\n• 非系统资源\n\n你必须理解它们之间的区别，才能理解资源查找机制。\n\n\n\n系统资源是指位于类路径上的资源——包括引导类路径、扩展目录中的\
  \ JAR 文件以及应用程序类路径。非系统资源可能存储在类路径以外的位置，例如特定目录、网络或数据库中。`getSystemResource()` 方法通过应用程序类加载器查找资源，该加载器会委托给其父加载器（即扩展类加载器），而扩展类加载器又会进一步委托给其父加载器（即引导类加载器）。如果你的应用程序是独立应用程序，并且仅使用\
  \ JDK 内置的三种类加载器，那么使用名为 `getSystemResource*` 的静态方法即可满足需求。该方法能查找类路径上的所有资源，包括运行时映像中的资源（例如\
  \ `rt.jar` 文件中的资源）。如果你的应用程序是在浏览器中运行的 Applet，或是在应用服务器或 Web 服务器中运行的企业应用程序，则应使用名为 `getResource*`\
  \ 的实例方法，这些方法允许你通过特定的类加载器查找资源。如果在 `Class` 对象上调用 `getResource*` 方法，则会使用当前类加载器（即加载该\
  \ `Class` 对象的类加载器）来查找资源。\n\n传递给 `ClassLoader` 类中所有方法的资源名称都是绝对路径，并且不以斜杠（`/`）开头。例如，在调用\
  \ `ClassLoader` 的 `getSystemResource()` 方法时，应使用 `java/lang/Object.class` 作为资源名称。\n\
  \n`Class` 类中的资源查找方法允许你指定绝对和相对资源名称。\n\n绝对资源名称以斜杠开头，而相对资源名称则不以斜杠开头。使用绝对名称时，`Class`\
  \ 类中的方法会移除开头的斜杠，并委托给加载该 `Class` 对象的类加载器来查找资源。以下调用：\n\n```java\nTest.class.getResource(\"\
  /resources/test.config\");\n```\n\n会被转换为：\n\n```java\nTest.class.getClassLoader()\n\
  \     .getResource(\"resources/test.config\");\n```\n\n第 8 章 ■ JDK 9 中的重大变更\n\n\
  使用相对名称时，`Class` 类中的方法会在委托给加载该 `Class` 对象的类加载器之前，先添加包名，并将包名中的点号替换为斜杠，再附加一个斜杠。假设 `Test`\
  \ 类位于 `com.jdojo.test` 包中，以下调用：\n\n```java\nTest.class.getResource(\"resources/test.config\"\
  );\n```\n\n会被转换为：\n\n```java\nTest.class.getClassLoader()\n     .getResource(\"\
  com/jdojo/test/resources/test.config\");\n```\n\n让我们来看一个在 JDK 9 之前的版本中查找资源的示例。我使用\
  \ JDK 8 运行该示例。\n\n你可以在本书的可下载源代码中找到该示例的源代码以及一个 NetBeans 项目。\n\n该 NetBeans 项目名为 `com.jdojo.resource.preJDK9`。如果你创建自己的项目，请确保将项目的\
  \ Java 平台和源代码版本设置为 JDK 8。类和资源的组织方式如下：\n\n• `word_to_number.properties`\n• `com/jdojo/resource/prejdk9/ResourceTest.class`\n\
  • `com/jdojo/resource/prejdk9/resources/number_to_word.properties`\n\n该项目包含两个资源文件：位于根目录的\
  \ `word_to_number.properties` 和位于 `com/jdojo/resource/prejdk9/resources` 目录的 `number_to_word.properties`。这些属性文件的内容如清单\
  \ 8-3 和清单 8-4 所示。\n\n***清单 8-3.*** `word_to_number.properties` 文件的内容\n\n```\nOne=1\n\
  Two=2\nThree=3\nFour=4\nFive=5\n```\n\n***清单 8-4.*** `number_to_word.properties`\
  \ 文件的内容\n\n```\n1=One\n2=Two\n3=Three\n4=Four\n5=Five\n```\n\n清单 8-5 包含一个完整的程序，演示了如何使用不同的类及其方法来查找资源。该程序表明，你可以将应用程序中的类文件作为资源使用，并且可以使用相同的方法来查找其他类型的资源。\n\
  \n第 8 章 ■ JDK 9 中的重大变更\n\n***清单 8-5.*** 演示如何在 JDK 9 之前的代码中查找资源的测试类\n\n```java\n\
  // ResourceTest.java\npackage com.jdojo.resource.prejdk9;\n```\n\n\n\nimport java.io.IOException;\n\
  \nimport java.net.URL;\n\nimport java.util.Properties;\n\npublic class ResourceTest\
  \ {\n\npublic static void main(String[] args) {\n\nSystem.out.println(\"使用系统类加载器查找资源：\"\
  );\n\nfindSystemResource(\"java/lang/Object.class\");\n\nfindSystemResource(\"com/jdojo/resource/prejdk9/ResourceTest.class\"\
  );\n\nfindSystemResource(\"com/jdojo/prime/PrimeChecker.class\");\n\nfindSystemResource(\"\
  sun/print/resources/duplex.png\");\n\nSystem.out.println(\"\\n 使用 Class 类查找资源：\"\
  );\n\n// 相对资源名称 - 不会找到 Object.class\n\nfindClassResource(\"java/lang/Object.class\"\
  );\n\n// 绝对资源名称 - 会找到 Object.class\n\nfindClassResource(\"/java/lang/Object.class\"\
  );\n\n// 相对资源名称 - 会找到该类\n\nfindClassResource(\"ResourceTest.class\");\n\n// 加载 wordtonumber.properties\
  \ 文件\n\nloadProperties(\"/wordtonumber.properties\");\n\n// 由于使用了绝对资源名称，不会找到该属性文件\n\
  \nloadProperties(\"/resources/numbertoword.properties\");\n\n// 会找到该属性文件\n\nloadProperties(\"\
  resources/numbertoword.properties\");\n\n}\n\npublic static void findSystemResource(String\
  \ resource) {\n\nURL url = ClassLoader.getSystemResource(resource);\n\nSystem.out.println(url);\n\
  \n}\n\npublic static URL findClassResource(String resource) {\n\nURL url = ResourceTest.class.getResource(resource);\n\
  \nSystem.out.println(url);\n\nreturn url;\n\n}\n\n第 8 章 ■ JDK 9 中的重大变更\n\npublic\
  \ static Properties loadProperties(String resource) {\n\nProperties p1 = new Properties();\n\
  \nURL url = ResourceTest.class.getResource(resource);\n\nif (url == null) {\n\n\
  System.out.println(\"未找到属性文件：\" + resource);\n\nreturn p1;\n\n}\n\ntry {\n\np1.load(url.openStream());\n\
  \nSystem.out.println(\"已从 \" + resource + \" 加载属性文件\");\n\nSystem.out.println(p1);\n\
  \n} catch (IOException e) {\n\nSystem.out.println(e.getMessage());\n\n}\n\nreturn\
  \ p1;\n\n}\n\n}\n\n使用系统类加载器查找资源：\n\njar:file:/C:/java8/jre/lib/rt.jar!/java/lang/Object.class\n\
  \nfile:/C:/Java9Revealed/com.jdojo.resource.prejdk9/build/classes/com/jdojo/resource/prejdk9/\n\
  \nResourceTest.class\n\nnull\n\njar:file:/C:/java8/jre/lib/resources.jar!/sun/print/resources/duplex.png\n\
  \n使用 Class 类查找资源：\n\nnull\n\njar:file:/C:/java8/jre/lib/rt.jar!/java/lang/Object.class\n\
  \nfile:/C:/Java9Revealed/com.jdojo.resource.prejdk9/build/classes/com/jdojo/resource/prejdk9/\n\
  \nResourceTest.class\n\n已从 /wordtonumber.properties 加载属性文件\n\n{One=1, Three=3, Four=4,\
  \ Five=5, Two=2}\n\n未找到属性文件：/resources/numbertoword.properties\n\n已从 resources/numbertoword.properties\
  \ 加载属性文件\n\n{5=Five, 4=Four, 3=Three, 2=Two, 1=One}\n\n在 JDK 9 中访问资源\n\n在 JDK 9\
  \ 之前，你可以访问类路径上任何 JAR 中的资源。在 JDK 9 中，类和资源被封装在模块中。最初，JDK 9 的设计者强制实施了模块封装规则，即模块中的资源必须对该模块私有，因此它们*仅*应能被该模块内的代码访问。虽然这条规则在理论上看起来不错，但它给那些跨模块共享资源以及从其他模块加载类文件作为资源的框架带来了问题。最终达成了一项折衷方案，允许对模块中的资源进行*有限*的访问，同时仍然强制实施模块的封装性。JDK\
  \ 9 在三个类中提供了资源查找方法：\n\n• java.lang.Class\n\n• java.lang.ClassLoader\n\n• java.lang.Module\n\
  \nClass 和 ClassLoader 类没有新增任何方法。Module 类包含一个 getResourceAsStream(String name) 方法，如果找到资源，则返回一个\
  \ InputStream；否则返回 null。\n\n资源命名语法\n\n资源名称由一系列用斜杠分隔的字符串组成，例如 com/jdojo/states.png、\n\
  \n/com/jdojo/words.png 和 logo.png。如果资源名称以斜杠开头，则被视为绝对资源名称。\n\n包名根据资源名称使用以下规则计算得出：\n\
  \n• 如果资源名称以斜杠开头，则去掉开头的斜杠。例如，对于\n\n\n\n资源名称 /com/jdojo/words.png，此步骤得到 com/jdojo/words.png。\n\
  \n• 从资源名称中删除最后一个斜杠之后的所有字符。在此示例中，com/jdojo/words.png 变为 com/jdojo。\n\n• 将名称中剩余的每个斜杠替换为句点\
  \ (.)。因此，com/jdojo 转换为 com.jdojo。得到的字符串即为包名。\n\n在某些情况下，使用这些步骤会导致未命名包或无效包名。请记住，包名（如果存在）必须由有效的\
  \ Java 标识符组成。如果没有包名，则称为未命名包。以 META-INF/resource/logo.png 作为资源名为例。\n\n应用上述规则，其包名将被计算为\
  \ META-INF.resources，这不是一个有效的包名，但它是一个有效的资源路径。\n\n查找资源的规则\n\n由于向后兼容性和模块系统的强封装承诺，JDK\
  \ 9 中查找资源的新规则较为复杂，并基于以下几个因素：\n\n• 包含资源的模块类型：命名模块、开放模块、未命名模块或自动模块\n• 访问资源的模块：是同一模块还是不同模块？\n\
  • 被访问资源的包名：是有效的还是无效的 Java 包？是未命名包吗？\n• 包含资源的包的封装状态：包含资源的包是向访问资源的模块导出、开放还是封装？\n•\
  \ 被访问资源的文件扩展名：资源是 `.class` 文件还是其他类型的文件？\n\n第 8 章 ■ JDK 9 中的重大变更\n\n• 用于访问资源的类的方法：是\
  \ `Class`、`ClassLoader` 还是 `Module` 的方法？\n\n以下规则适用于包含在*命名*模块中的资源：\n\n• 如果资源名称以 `.class`\
  \ 结尾，则任何模块中的代码都可以访问该资源。也就是说，任何模块都可以访问任何命名模块中的类文件。\n• 如果根据资源名称计算出的包名不是有效的 Java 包名（例如\
  \ `META-INF.resources`），则任何模块中的代码都可以访问该资源。\n• 如果根据资源名称计算出的包名是未命名包（例如资源名 `words.png`），则任何模块中的代码都可以访问该资源。\n\
  • 如果包含资源的包向访问资源的模块开放，则该模块中的代码可以访问该资源。包可以向模块开放，因为定义该包的模块是开放模块，或者该模块向所有其他模块开放该包，或者该模块使用限定的\
  \ `opens` 语句仅向特定模块开放该包。如果包未通过任何这些方式开放，则该包中的资源不能被该模块外部的代码访问。\n• 此规则是上一条规则的衍生。未命名模块、自动模块或开放模块中的每个包都是开放的，因此所有其他模块中的代码都可以访问这些模块中的所有资源。\n\
  \n■ **提示** 命名模块中的包必须开放（而非导出）才能访问其资源。导出模块的包允许其他模块访问该包中的公共类型（而非资源）。\n\n`Module`、`Class`\
  \ 和 `ClassLoader` 类中的各种资源查找方法在访问命名模块中的资源时行为不同：\n\n• 你可以使用 `Module` 类的 `getResourceAsStream()`\
  \ 方法来访问模块中的资源。此方法对调用者敏感。如果调用者模块不同，此方法将应用前述所有资源可访问性规则。\n• 对于在命名模块中定义的类，`Class` 类中的\
  \ `getResource*()` 方法仅在该命名模块中定位资源。也就是说，你不能使用这些方法来定位定义这些方法所调用类的命名模块之外的类。\n• `ClassLoader`\
  \ 类中的 `getResource*()` 方法根据前面描述的规则列表在命名模块中定位资源。这些方法对调用者不敏感。类加载器在尝试定位资源本身之前，会先将资源搜索委托给其父加载器。这些方法有两个例外：1)\
  \ 它们仅在无条件开放的包中定位资源。如果使用限定的 `opens` 语句向特定模块开放包，这些方法将不会在这些包中定位资源。2) 它们搜索在类加载器中定义的模块。\n\
  \n第 8 章 ■ JDK 9 中的重大变更\n\n`Class` 对象将仅在其所属的模块中查找资源。它还支持以斜杠开头的绝对资源名称和不以斜杠开头的相对资源名称。以下是使用\
  \ `Class` 对象的一些示例：\n\n```java\n// 将找到该资源\nURL url1 = Test.class.getResource(\"Test.class\"\
  );\n\n// 不会找到该资源，因为 Test 和 Object 类位于不同的模块中\nURL url2 = Test.class.getResource(\"\
  /java/lang/Object.class\");\n\n// 将找到该资源，因为 Object 和 Class 类位于同一模块 java.base 中\n\
  URL url3 = Object.class.getResource(\"/java/lang/Class.class\");\n\n// 不会找到该资源，因为\
  \ Object 类位于 java.base 模块中，而\n// Driver 类位于 java.sql 模块中\nURL url4 = Object.class.getResource(\"\
  /java/sql/Driver.class\");\n```\n\n使用 `Module` 类定位资源需要你拥有该模块的引用。如果你可以访问该模块中的某个类，则在该\
  \ `Class` 对象上使用 `getModule()` 方法即可获得模块引用。这是获取模块引用的最简单方法。有时，你只有模块名称的字符串，但没有该模块中类的引用。你可以从模块名称中找到模块引用。模块被组织成层，由\
  \ `java.lang` 包中的 `ModuleLayer` 类的实例表示。JVM 包含至少一个称为引导层的层。引导层中的模块映射到内置的类加载器——引导类加载器、平台类加载器和应用程序类加载器。你可以使用\
  \ `ModuleLayer` 类的 `boot()` 静态方法获取引导层的引用：\n\n```java\n// 获取引导层\nModuleLayer bootLayer\
  \ = ModuleLayer.boot();\n```\n\n一旦获得引导层的引用，就可以使用其 `findModule(String moduleName)`\
  \ 方法来获取模块的引用：\n\n```java\n// 在引导层中查找名为 com.jdojo.resource 的模块\nOptional<Module>\
  \ m = bootLayer.findModule(\"com.jdojo.resource\");\n\n// 如果找到了模块，则在模块中查找资源\nif(m.isPresent())\
  \ {\n    Module testModule = m.get();\n    String resource = \"com/jdojo/resource/opened/opened.properties\"\
  ;\n    InputStream input = module.getResourceAsStream(resource);\n    if (input\
  \ != null) {\n        System.out.println(resource + \" found.\");\n    } else {\n\
  \        System.out.println(resource + \" not found.\");\n    }\n} else {\n    System.out.println(\"\
  Module com.jdojo.resource does not exist\");\n}\n```\n\n第 8 章 ■ JDK 9 中的重大变更\n\n\
