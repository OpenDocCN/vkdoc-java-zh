  3 是质数: true\n10 是质数: false\n```\n\n### 访问模块资源\n\n一个模块可能包含资源，例如图像、音频/视频剪辑、属性文件和策略文件。模块中的类文件（`.class`\
  \ 文件）也被视为资源。`Module` 类包含一个 `getResourceAsStream()` 方法，用于通过资源名称检索资源：\n\n```java\n\
  InputStream getResourceAsStream(String name) throws IOException\n```\n\n请参考[第 8\
  \ 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_8)，其中详细介绍了如何访问模块的资源。\n\n### 模块上的注解\n\
  \n您可以在模块声明上使用注解。`java.lang.annotation.ElementType` 枚举有一个名为 `MODULE` 的新值。如果您在注解声明中使用\
  \ `MODULE` 作为目标类型，则允许在模块上使用该注解。在 Java 9 中，两个注解——`java.lang.Deprecated` 和 `java.lang.SuppressWarnings`——已被更新，以便可以在模块声明上使用。它们可以按如下方式使用：\n\
  \n```java\n@Deprecated(since=\"1.2\", forRemoval=true)\n@SuppressWarnings(\"unchecked\"\
  )\nmodule com.jdojo.myModule {\n    // 模块语句写在这里\n}\n```\n\n当一个模块被弃用时，在 `requires`\
  \ 语句（而非 `exports` 或 `opens` 语句）中使用该模块会导致发出警告。此规则基于以下事实：如果模块 M 被弃用，模块的用户将使用 `requires\
  \ M`，他们需要收到弃用警告。其他语句（如 `exports` 和 `opens`）位于正在被弃用的模块内部。被弃用的模块不会导致对模块内类型的使用发出警告。类似地，如果在模块声明中抑制了警告，则抑制适用于模块声明中的元素，而不适用于该模块中包含的类型。\n\
  \n`Module` 类实现了 `java.lang.reflect.AnnotatedElement` 接口，因此您可以使用各种与注解相关的方法来读取它们。要在模块声明上使用的注解类型必须将\
  \ `ElementType.MODULE` 作为目标。\n\n\n\n■ **提示** 你不能注解单个模块语句。例如，你不能用 `@Deprecated` 注解来标记一个导出语句，以表明该导出包将在未来版本中被移除。在早期设计阶段，曾考虑过此功能，但最终被否决，理由是此功能将耗费大量时间，而当前并不需要。如果将来有需要，可以再添加此功能。因此，你在\
  \ `ModuleDescriptor` 类中找不到任何与注解相关的方法。\n\n现在，我们将创建一个新的注解类型，并将其用于模块声明。清单 10-7 包含一个名为\
  \ `com.jdojo.module.api.annotation` 的模块的模块声明，其中包含三个注解。`Version` 注解类型已在同一模块中声明，其源代码如清单\
  \ 10-8 所示。新注解类型的保留策略为 `RUNTIME`。\n\n***清单 10-7.*** 名为 com.jdojo.module.api.annotation\
  \ 的模块的模块声明\n\n// module-info.java\n\nimport com.jdojo.module.api.annotation.Version;\n\
  \n@Deprecated(since=\"1.2\", forRemoval=false)\n\n@SuppressWarnings(\"unchecked\"\
  )\n\n@Version(major=1, minor=2)\n\nmodule com.jdojo.module.api.annotation {\n\n\
  // 无模块语句\n\n}\n\n***清单 10-8.*** 可用于包、模块和类型的 Version 注解类型\n\n// Version.java\n\n\
  package com.jdojo.module.api.annotation;\n\nimport static java.lang.annotation.ElementType.MODULE;\n\
  \nimport static java.lang.annotation.ElementType.PACKAGE;\n\nimport static java.lang.annotation.ElementType.TYPE;\n\
  \nimport java.lang.annotation.Retention;\n\nimport static java.lang.annotation.RetentionPolicy.RUNTIME;\n\
  \nimport java.lang.annotation.Target;\n\n@Retention(RUNTIME)\n\n@Target({PACKAGE,\
  \ MODULE, TYPE})\n\npublic @interface Version {\n\nint major();\n\nint minor();\n\
  \n}\n\n清单 10-9 包含一个 `AnnotationTest` 类的代码。它读取 `com.jdojo.module.api.annotation`\
  \ 模块上的注解。输出结果中不包含模块上的 `@SuppressWarnings` 注解，因为该注解使用的保留策略是 `RetentionPolicy.RUNTIME`，这意味着该注解在运行时不会被保留。\n\
  \n第 10 章 ■ 模块 API\n\n***清单 10-9.*** 演示如何读取模块上注解的 AnnotationTest 类\n\n// AnnotationTest.java\n\
  \npackage com.jdojo.module.api.annotation;\n\nimport java.lang.annotation.Annotation;\n\
  \npublic class AnnotationTest {\n\npublic static void main(String[] args) {\n\n\
  // 获取 com.jdojo.module.api.annotation 模块的模块引用\n\nModule m = AnnotationTest.class.getModule();\n\
  \n// 打印所有注解\n\nAnnotation[] a = m.getAnnotations();\n\nfor(Annotation ann : a) {\n\
  \nSystem.out.println(ann);\n\n}\n\n// 读取 Deprecated 注解\n\nDeprecated d = m.getAnnotation(Deprecated.class);\n\
  \nif (d != null) {\n\nSystem.out.printf(\"Deprecated: since=%s, forRemoval=%b%n\"\
  ,\n\nd.since(), d.forRemoval());\n\n}\n\n// 读取 Version 注解\n\nVersion v = m.getAnnotation(Version.class);\n\
  \nif (v != null) {\n\nSystem.out.printf(\"Version: major=%d, minor=%d%n\", v.major(),\
  \ v.minor());\n\n}\n\n}\n\n}\n\n@java.lang.Deprecated(forRemoval=false, since=\"\
  1.2\")\n\n@com.jdojo.module.api.annotation.Version(major=1, minor=2)\n\nDeprecated:\
  \ since=1.2, forRemoval=false\n\nVersion: major=1, minor=2\n\n加载类\n\n你可以使用 `Class`\
  \ 类中以下静态 `forName()` 方法之一来加载并初始化一个类：\n\n• `Class<?> forName(String className) throws\
  \ ClassNotFoundException`\n\n• `Class<?> forName(String className, boolean initialize,\
  \ ClassLoader loader) throws ClassNotFoundException`\n\n• `Class<?> forName(Module\
  \ module, String className)`\n\n第 10 章 ■ 模块 API\n\n在这些方法中，`className` 参数是要加载的类或接口的完全限定名，例如\
  \ `java.lang.Thread` 和 `com.jdojo.intro.Welcome`。如果 `initialize` 参数为 `true`，则该类将被初始化。\n\
  \n\n\n`forName(String className)` 方法在加载类后会对其进行初始化，并使用当前类加载器，即加载了调用此方法的类所在的类加载器。表达式\n\
  \nClass.forName(\"P.Q\")\n\n在实例方法中等价于\n\nClass.forName(\"P.Q\", true, this.getClass().getClassLoader())\n\
  \n`forName(Module module, String className)` 方法是在 JDK 9 中新增的。它不会初始化类。\n\n请注意，当未找到指定类时，此方法不会抛出\
  \ `ClassNotFoundException`。\n\n相反，它会返回 `null`。\n\n这些方法均不会检查调用者是否可以访问指定的类。也就是说，你可以使用这些方法从模块中加载未导出的类。加载一个类并不意味着你可以实例化它并访问其成员。当你尝试实例化该类时，才会执行可访问性检查。例如，你可以加载一个未导出的类，但尝试实例化它将会抛出异常。\n\
  \n清单 10-10 con 包含了 `LoadingClass` 类的代码，该类是 `com.jdojo.module.api` 模块的成员。该类包含两个版本的\
  \ `loadClass()` 方法。这些方法加载指定的类，并在成功加载类后，尝试使用无参构造器实例化该类。请注意，`com.jdojo.intro` 模块并未导出包含\
  \ `Welcome` 类的 `com.jdojo.intro` 包。\n\n此示例尝试加载并实例化 `Welcome` 类以及其他两个不存在的类。\n\n***清单\
  \ 10-10.*** 演示如何加载类的类\n\n// LoadingClass.java\n\npackage com.jdojo.module.api;\n\
  \nimport java.lang.reflect.Constructor;\n\nimport java.lang.reflect.InvocationTargetException;\n\
  \nimport java.util.Optional;\n\npublic class LoadingClass {\n\npublic static void\
  \ main(String[] args) {\n\nloadClass(\"com.jdojo.intro.Welcome\");\n\nloadClass(\"\
  com.jdojo.intro.XYZ\");\n\nString moduleName = \"com.jdojo.intro\";\n\nOptional<Module>\
  \ m = ModuleLayer.boot().findModule(moduleName);\n\nif (m.isPresent()) {\n\nModule\
  \ introModule = m.get();\n\nloadClass(introModule, \"com.jdojo.intro.Welcome\");\n\
  \nloadClass(introModule, \"com.jdojo.intro.ABC\");\n\n} else {\n\nSystem.out.println(\"\
  Module not found: \" + moduleName +\n\n\". Please make sure to add the module to\
  \ the module path.\");\n\n}\n\n}\n\n第 10 章 ■ 模块 API\n\npublic static void loadClass(String\
  \ className) {\n\ntry {\n\nClass<?> cls = Class.forName(className);\n\nSystem.out.println(\"\
  Class found: \" + cls.getName());\n\ninstantiateClass(cls);\n\n} catch (ClassNotFoundException\
  \ e) {\n\nSystem.out.println(\"Class not found: \" + className);\n\n}\n\n}\n\npublic\
  \ static void loadClass(Module m, String className) {\n\nClass<?> cls = Class.forName(m,\
  \ className);\n\nif (cls == null) {\n\nSystem.out.println(\"Class not found: \"\
  \ + className);\n\n} else {\n\nSystem.out.println(\"Class found: \" + cls.getName());\n\
  \ninstantiateClass(cls);\n\n}\n\n}\n\npublic static void instantiateClass(Class<?>\
  \ cls) {\n\ntry {\n\n// 获取无参构造器\n\nConstructor<?> c = cls.getConstructor();\n\n\
  Object o = c.newInstance();\n\nSystem.out.println(\"Instantiated class: \" + cls.getName());\n\
  \n} catch (InstantiationException | IllegalAccessException |\n\nIllegalArgumentException\
  \ | InvocationTargetException e) {\n\nSystem.out.println(e.getMessage());\n\n} catch\
  \ (NoSuchMethodException e) {\n\nSystem.out.println(\"No no-args constructor for\
  \ class: \" + cls.getName());\n\n}\n\n}\n\n}\n\n尝试运行 `LoadingClass` 类，只需将三个必需的模块添加到模块路径中：\n\
  \nC:\\Java9Revealed>java\n\n--module-path com.jdojo.module.api\\dist;com.jdojo.prime\\\
  dist;com.jdojo.intro\\dist\n\n--module com.jdojo.module.api/com.jdojo.module.api.LoadingClass\n\
  \nClass found: com.jdojo.intro.Welcome\n\nclass com.jdojo.module.api.LoadingClass\
  \ (in module com.jdojo.module.api) cannot access class\n\ncom.jdojo.intro.Welcome\
  \ (in module com.jdojo.intro) because module com.jdojo.intro does not\n\nexport\
  \ com.jdojo.intro to module com.jdojo.module.api\n\nClass not found: com.jdojo.intro.XYZ\n\
  \nClass found: com.jdojo.intro.Welcome\n\nclass com.jdojo.module.api.LoadingClass\
  \ (in module com.jdojo.module.api) cannot access class\n\n\n\ncom.jdojo.intro.Welcome（位于模块\
  \ com.jdojo.intro 中）因为模块 com.jdojo.intro 未将\ncom.jdojo.intro 导出到模块 com.jdojo.module.api\n\
  \n未找到类：com.jdojo.intro.ABC\n\n第 10 章 ■ 模块 API\n\n输出显示，我们可以加载 com.jdojo.intro.Welcome\
  \ 类。然而，我们无法\n实例化它，因为它未在 com.jdojo.intro 模块中导出。以下命令使用\n`--add-exports` 选项将 com.jdojo.intro\
  \ 模块中的 com.jdojo.intro 包导出到\ncom.jdojo.module.api 模块。输出显示，我们现在可以加载并实例化 Welcome 类。\n\
  \nc:\\Java9Revealed>java\n\n--module-path com.jdojo.module.api\\dist;com.jdojo.prime\\\
  dist;com.jdojo.intro\\dist\n\n**--add-exports com.jdojo.intro/com.jdojo.intro=com.jdojo.module.api**\n\
  \n--module com.jdojo.module.api/com.jdojo.module.api.LoadingClass\n\n已找到类：com.jdojo.intro.Welcome\n\
  \n已实例化类：com.jdojo.intro.Welcome\n\n未找到类：com.jdojo.intro.XYZ\n\n已找到类：com.jdojo.intro.Welcome\n\
  \n已实例化类：com.jdojo.intro.Welcome\n\n未找到类：com.jdojo.intro.ABC\n\n使用模块层\n\n使用模块层是一个高级主题。典型的\
  \ Java 开发者通常不需要直接使用模块层。现有应用程序不会使用模块层。如果你将应用程序迁移到 JDK 9，或使用 JDK 9 开发新应用程序，无论你是否愿意，你至少会使用一个模块层，该层由\
  \ JVM 在启动时创建。通常，使用插件或容器架构的应用程序会使用模块层。在本节中，我将通过一个简单示例简要介绍模块层。在本书的剩余部分，我将互换使用术语“模块层”和“层”。\n\
  \n*层*是一组已解析的模块（一个模块图），并带有一个函数，该函数将每个模块映射到一个负责加载该模块中所有类型的类加载器。这组已解析的模块称为一个*配置*。你可以这样理解模块、类加载器、配置和层之间的关系：\n\
  \n配置 = 一个模块图\n\n模块层 = 配置 + (模块 -> 类加载器)\n\n模块被组织成层。层按层次结构排列。除了*空层*之外，每个层至少有一个父层。空层，顾名思义，不包含任何模块，其主要作用是作为*启动层*的父层。启动层由\
  \ JVM 在启动时通过解析应用程序的初始模块（根模块）与一组可观察模块来创建。在 JDK 9 中，使用类加载器加载类型的方式没有改变。类加载器通常使用父优先委托模型，在该模型中，加载类型的请求被委托给父加载器，父加载器再委托给其父加载器，直到引导类加载器。如果所有父加载器都无法加载该类型，则最初接收请求的类加载器会加载它。图\
  \ 10-1 展示了一个模块、类加载器和层如何组织的示例。\n\n第 10 章 ■ 模块 API\n\ncom.jdojo.test\n\ncom.jdojo.service\n\
  \nspring.core\n\ncom.jdojo.service\n\n**类加载器 1**\n\n**类加载器 2**\n\n**层 1**\n\n**层\
  \ 2**\n\njava.base\n\njava.xml\n\njava.compiler\n\njava.scripting\n\nspring.core\n\
  \ncom.jdojo.test\n\n**引导类加载器**\n\n**平台类加载器**\n\n**应用程序类加载器**\n\n**启动层**\n\n**空层**\n\
  \n**Java 虚拟机**\n\n***图 10-1.** 应用程序中将模块组织成层的示例*\n\n在图中，从 X 指向 Y 的箭头表示 X 是 Y 的父级，其中\
  \ X 和 Y 可以是类加载器或层。层是堆叠的——空层和启动层是最底部的两层。在后续讨论中，我将忽略空层，并将启动层视为层堆栈中的最底层。启动层是两个自定义层（名为层\
  \ 1 和层 2）的父层。\n\n堆栈中给定层中的模块可以读取其下方层中的模块。也就是说，层 1 和层 2 都可以读取启动层中的模块。然而，层 1 不能读取层\
  \ 2 中的模块，因为它们是兄弟层。启动层也不能读取层 1 和层 2 中的模块，因为启动层是它们的父层。如图 10-1 所示，两个用户定义层中的类加载器都以应用程序类加载器作为其父加载器，这通常是常见情况。将应用程序类加载器设置为自定义类加载器的父加载器，可确保后者能够读取启动层中所有模块的所有类型。当一个层中的模块读取其下方层中的模块时，模块的可读性属性会得到尊重。\n\
  \n允许将模块组织成层适用于两种用例——覆盖机制和扩展机制——这两种机制在高级 Java 应用程序（如充当托管应用程序容器的 Java EE 应用/Web 服务器）中经常遇到。在覆盖机制中，托管应用程序需要覆盖容器提供的功能，例如使用同一模块的不同版本。\n\
  \n在扩展机制中，托管应用程序需要补充容器已提供的功能，例如提供额外的服务提供者。在图 10-1 中，com.jdojo.test 模块同时存在于启动层和层 1\
  \ 中。这是模块覆盖的情况。层 1 将使用层 1 中的模块版本，而层 2 将使用启动层中该模块的版本。\n\n通常，容器需要允许托管应用程序提供它们自己的一组模块，这些模块可能会覆盖容器中嵌入的模块。这可以通过将托管应用程序的模块加载到容器层之上的一个层中来实现。加载到应用程序特定层中的模块将覆盖服务器级层中的模块。这样，你可以在同一个\
  \ JVM 中使用同一模块的多个版本。\n\n第 10 章 ■ 模块 API\n\n托管应用程序可能希望使用与容器提供的不同的服务提供者。这可以通过将应用程序特定的服务提供者模块添加到容器层之上的一个层中来实现。你可以使用\
  \ `ServiceLoader` 类的 `load(ModuleLayer layer, Class<S> service)` 方法来加载服务提供者。指定的层将是托管应用程序特定的层。此方法从指定的层及其父层加载服务提供者。\n\
  \n■ **提示** 层是不可变的。一旦创建了一个层，就不能向其中添加模块或从中移除模块。如果需要添加模块或用另一个版本的模块替换现有模块，则必须拆除该层并重新创建它。\n\
  \n创建层是一个多步骤的过程。你需要：\n\n• 创建模块查找器\n\n• 创建一组根模块\n\n• 创建一个配置对象\n\n• 创建一个层\n\n一旦创建了层，就可以使用它来加载类型。我将在接下来的章节中详细介绍这些步骤。最后，我将向你展示如何使用层来使用同一模块的多个版本。\n\
  \n查找模块\n\n模块查找器是 `ModuleFinder` 接口的一个实例。它用于在模块解析和服务绑定期间查找 `ModuleReference`。该接口包含两个用于创建模块查找器的工厂方法：\n\
  \n• `static ModuleFinder of(Path... entries)`\n\n• `static ModuleFinder ofSystem()`\n\
  \n`of()` 方法通过搜索指定的路径序列来定位模块，这些路径可以是目录或打包模块的路径。该方法按顺序搜索指定路径，找到模块名称的第一次出现。以下代码片段展示了如何创建一个模块查找器，该查找器将在\
  \ `C:\\Java9Revealed\\lib` 和 `C:\\Java9Revealed\\customLib` 目录中搜索模块：\n\n// 创建模块路径\n\
  \nPath mp1 = Paths.get(\"C:\\\\Java9Revealed\\\\lib\");\n\n\n\nPath mp2 = Paths.get(\"\
  C:\\\\Java9Revealed\\\\customLib\");\n\n// 使用两个模块路径创建一个模块查找器\n\nModuleFinder finder\
  \ = ModuleFinder.of(mp1, mp2);\n\n有时，你需要一个 `ModuleFinder` 的引用，例如将其传递给某个方法，但该模块查找器无需查找任何模块。你可以使用\
  \ `ModuleFinder.of()` 方法，不传入任何路径作为参数来创建这样一个模块查找器。\n\n`ofSystem()` 方法返回一个模块查找器，用于查找链接到运行时的系统模块。此方法始终能找到\
  \ `java.base` 模块。请注意，你可以将一组自定义模块链接到运行时映像，这意味着使用此方法定位到的模块取决于运行时映像。自定义运行时映像既包含 JDK\
  \ 模块，也包含应用程序模块。此方法将找到这两种类型的模块。\n\n第 10 章 ■ 模块 API\n\n你还可以使用 `compose()` 方法，从零个或多个模块查找器的序列中组合出一个模块查找器：\n\
  \nstatic ModuleFinder compose(ModuleFinder... finders)\n\n此模块查找器将按指定的顺序使用每个模块查找器。第二个模块查找器将查找第一个模块查找器未找到的所有模块，第三个模块查找器将查找第一个和第二个模块查找器都未找到的所有模块，以此类推。\n\
  \n`ModuleFinder` 接口包含以下用于查找模块的方法：\n\n• `Optional<ModuleReference> find(String name)`\n\
  \n• `Set<ModuleReference> findAll()`\n\n`find()` 方法用于查找具有指定名称的模块。`findAll()` 方法用于查找该查找器能够定位到的所有模块。\n\
  \n清单 10-11 包含一个 `FindingModule` 类的代码，演示了如何使用 `ModuleFinder`。\n\n该代码使用了 Windows 上的路径，例如\
  \ `C:\\Java9Revealed\\lib`，其中存储了模块。在运行该类之前，你可能需要更改模块路径。该类是 `com.jdojo.module.api`\
  \ 模块的成员。你可能会得到不同的输出结果。\n\n***清单 10-11.*** 使用 ModuleFinder 定位模块\n\n// FindingModule.java\n\
  \npackage com.jdojo.module.api;\n\nimport java.lang.module.ModuleDescriptor;\n\n\
  import java.lang.module.ModuleFinder;\n\nimport java.lang.module.ModuleReference;\n\
  \nimport java.net.URI;\n\nimport java.nio.file.Path;\n\nimport java.nio.file.Paths;\n\
  \nimport java.util.Optional;\n\nimport java.util.Set;\n\npublic class FindingModule\
  \ {\n\npublic static void main(String[] args) {\n\n// 创建模块路径\n\nPath mp1 = Paths.get(\"\
  C:\\\\Java9Revealed\\\\lib\");\n\nPath mp2 = Paths.get(\"C:\\\\Java9Revealed\\\\\
  customLib\");\n\n// 创建一个模块查找器\n\nModuleFinder finder = ModuleFinder.of(mp1, mp2);\n\
  \n// 查找此查找器能定位到的所有模块\n\nSet<ModuleReference> moduleRefs = finder.findAll();\n\n\
  // 打印找到的模块的详细信息\n\nmoduleRefs.forEach(FindingModule::printInfo);\n\n}\n\n第 10 章\
  \ ■ 模块 API\n\npublic static void printInfo(ModuleReference mr) {\n\nModuleDescriptor\
  \ md = mr.descriptor();\n\nOptional<URI> location = mr.location();\n\nURI uri =\
  \ null;\n\nif(location.isPresent()) {\n\nuri = location.get();\n\n}\n\nSystem.out.printf(\"\
  Module: %s, Location: %s%n\", md.name(), uri);\n\n}\n\n}\n\nModule: com.jdojo.prime.probable,\
  \ Location: file:///C:/Java9Revealed/lib/com.jdojo.prime.\n\nprobable.jar\n\nModule:\
  \ com.jdojo.person, Location: file:///C:/Java9Revealed/lib/com.jdojo.person.jar\n\
  \nModule: com.jdojo.address, Location: file:///C:/Java9Revealed/lib/com.jdojo.address.jar\n\
  \n...\n\n读取模块内容\n\n在上一节中，你学习了如何使用 `ModuleFinder` 查找模块引用，这些引用是 `ModuleReference`\
  \ 类的实例。`ModuleReference` 封装了 `ModuleDescriptor` 和模块的位置。你可以使用 `ModuleReference` 类的\
  \ `open()` 方法来获取 `ModuleReader` 接口的实例。`ModuleReader` 用于列出、查找和读取模块的内容。以下代码片段展示了如何为\
  \ `java.base` 模块获取一个 `ModuleReader`：\n\n// 创建一个系统模块查找器\n\nModuleFinder finder =\
  \ ModuleFinder.ofSystem();\n\n// java.base 模块保证存在\n\nOptional<ModuleReference> omr\
  \ = finder.find(\"java.base\");\n\nModuleReference moduleRef = omr.get();\n\n\n\n\
  // 获取模块读取器\n\nModuleReader reader = moduleRef.open();\n\nModuleReference 类的 open()\
  \ 方法会抛出 IOException。为了保持代码简洁，我在此代码片段中省略了异常处理。\n\nModuleReader 中的以下方法用于处理模块的内容。这些方法名称直观易懂，足以说明其功能。\n\
  \n• void close() throws IOException\n\n• Optional<URI> find(String resourceName)\
  \ throws IOException\n\n• Stream<String> list() throws IOException\n\n• default\
  \ Optional<InputStream> open(String resourceName) throws IOException\n\n• default\
  \ Optional<ByteBuffer> read(String resourceName) throws IOException\n\n• default\
  \ void release(ByteBuffer bb)\n\n第 10 章 ■ 模块 API\n\n传递给这些方法的资源名称是一个以 `/` 分隔的路径字符串。例如，`java.base`\
  \ 模块中 `java.lang.Object` 类的资源名称为 `java/lang/Object.class`。\n\n使用完 ModuleReader 后，需要调用其\
  \ close() 方法来关闭它。如果尝试使用已关闭的 ModuleReader 读取模块内容，则会抛出 IOException。read() 方法返回一个 `Optional<ByteBuffer>`。在消费完字节缓冲区后，需要调用\
  \ `release(ByteBuffer bb)` 方法来释放它，以避免资源泄漏。\n\n清单 10-12 包含一个演示如何读取模块内容的程序。它读取 ByteBuffer\
  \ 中 Object 类的内容，并打印其字节大小。它还打印了 `java.base` 模块中五个资源的名称。你可能会得到不同的输出。\n\n***清单 10-12.***\
  \ 使用 ModuleReader 读取模块内容\n\n// ReadingModuleContents.java\n\npackage com.jdojo.module.api;\n\
  \nimport java.io.IOException;\n\nimport java.lang.module.ModuleFinder;\n\nimport\
  \ java.lang.module.ModuleReader;\n\nimport java.lang.module.ModuleReference;\n\n\
  import java.nio.ByteBuffer;\n\nimport java.util.Optional;\n\npublic class ReadingModuleContents\
