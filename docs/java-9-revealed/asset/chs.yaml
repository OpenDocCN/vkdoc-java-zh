  \n考虑一个作为可执行 JAR 分发的现有应用程序。假设该应用程序使用深度反射来访问 JDK 内部 API。它在 JDK 8 中运行良好。您希望在 JDK 9\
  \ 上运行此可执行 JAR。\n\nJDK 9 中的 JDK 内部 API 已被封装。现在，您必须使用 `--add-exports` 和 `--add-opens`\
  \ 命令行选项以及 `-jar` 选项来运行相同的可执行 JAR。在 JDK 9 中使用新的命令行选项提供了一种解决方案。然而，对于可执行 JAR 的最终用户来说，这有点不方便。为了使用\
  \ JDK 9，他们需要知道要使用的新命令行选项。为了简化此类迁移，JDK 9 为可执行 JAR 的 `MANIFEST.MF` 文件添加了两个新属性：\n\n\
  • `Add-Exports`\n• `Add-Opens`\n\n这些属性被添加到清单文件的主部分。它们与两个命令行选项 `--add-exports` 和\
  \ `--add-opens` 相对应。使用这些属性时有一个区别。\n\n它们将模块的包导出和开放给所有未命名模块。因此，您需要指定源模块及其包的列表，而无需指定目标模块作为这些属性的值。换句话说，在清单文件中，您可以将包导出或开放给所有未命名模块，或者不导出/开放，但不能选择性地导出/开放给特定模块。这些属性的值是以空格分隔的、以斜杠分隔的\
  \ `模块名/包名` 对列表。示例如下：\n\n`Add-Exports: m1/p1 m2/p2 m3/p3 m1/p1`\n\n此条目会将模块 `m1` 中的包\
  \ `p1`、模块 `m2` 中的包 `p2` 以及模块 `m2` 中的包 `p3` 导出给所有未命名模块。解析清单文件的规则比较宽松，并且允许重复，因为历史上是允许的。请注意值中的重复条目\
  \ `m1/p1`。在运行时，这些包将被导出给所有未命名模块。\n\n**第九章 ■ 打破模块封装**\n\n让我们通过一个示例来讲解。我将示例保持简单，以便您可以专注于这些新属性的使用。`java.lang.Long`\
