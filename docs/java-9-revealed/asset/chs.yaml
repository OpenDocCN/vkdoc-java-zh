  \ 7897979L) = 0\n\nmultiplyHigh(Long.MAX_VALUE, 8) = 3\n\n第 20 章 ■ JDK 9 中的其他变更\n\
  \n对 ClassLoader 类的变更\n\nJDK 9 为 `java.lang.ClassLoader` 类新增了以下构造方法和普通方法：\n\n• `protected\
  \ ClassLoader(String name, ClassLoader parent)`\n\n• `public String getName()`\n\
