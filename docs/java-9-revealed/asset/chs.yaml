  \njshell>\n\n方法声明\n\n您可以在 jshell 中声明和调用方法。您可以声明顶层方法，即直接在 jshell 中输入且不在任何类内部的方法。您也可以声明包含方法的类（参见下一节）。在本节中，我将向您展示如何声明和调用顶层方法。您也可以调用现有类的方法。以下示例声明了一个名为`square()`的方法并调用它：\n\
  \njshell> long square(int n) {\n   ...> return n * n;\n   ...> }\n| 已创建方法 square(int)\n\
  \njshell> square(10)\n$2 ==> 100\n\njshell> long n2 = square(37)\nn2 ==> 1369\n\n\
  jshell>\n\n\n\n方法体内允许前向引用。也就是说，你可以在方法体内引用尚未声明的方法或变量。但只有在所有缺失的引用方法和变量都被定义后，才能调用当前声明的方法。\n\
  \njshell> long multiply(int n) {\n\n...> return multiplier * n;\n\n...> }\n\n| 已创建方法\
  \ multiply(int)，但在变量 multiplier 声明之前无法调用\n\njshell> multiply(10)\n\n| 试图调用方法 multiply(int)，但在变量\
  \ multiplier 声明之前无法调用\n\njshell> int multiplier = 2\n\nmultiplier ==> 2\n\n第 11\
  \ 章 ■ Java Shell\n\njshell> multiply(10)\n\n$6 ==> 20\n\njshell> void printCube(int\
  \ n) {\n\n...> System.out.printf(\"Cube of %d is %d.%n\", n, cube(n));\n\n...> }\n\
  \n| 已创建方法 printCube(int)，但在方法 cube(int) 声明之前无法调用\n\njshell> long cube(int n) {\n\
  \n...> return n * n * n;\n\n...> }\n\n| 已创建方法 cube(int)\n\njshell> printCube(10)\n\
  \nCube of 10 is 1000.\n\njshell>\n\n此示例声明了一个名为 multiply(int n) 的方法。它将参数与一个名为 multiplier\
  \ 的变量相乘，而该变量尚未声明。请注意声明此方法后打印的反馈信息。反馈明确指出，在声明 multiplier 变量之前，不能调用 multiply() 方法。调用该方法会产生错误。随后，声明了\
  \ multiplier 变量，并成功调用了 multiply() 方法。\n\n■ **提示** 你也可以使用前向引用来声明递归方法。\n\n类型声明\n\n\
  你可以在 jshell 中像在 Java 中一样声明所有类型，例如类、接口、枚举和注解。以下 jshell 会话创建了一个名为 Counter 的类，创建了它的对象，并调用了它的方法：\n\
  \njshell> class Counter {\n\n...> private int counter;\n\n...> public synchronized\
  \ int next() {\n\n...> return ++counter;\n\n...> }\n\n...>\n\n...> public int current()\
  \ {\n\n...> return counter;\n\n...> }\n\n...> }\n\n| 已创建类 Counter\n\njshell> Counter\
  \ c = new Counter();\n\nc ==> Counter@25bbe1b6\n\n第 11 章 ■ Java Shell\n\njshell>\
  \ c.current()\n\n$3 ==> 0\n\njshell> c.next()\n\n$4 ==> 1\n\njshell> c.next()\n\n\
  $5 ==> 2\n\njshell> c.current()\n\n$6 ==> 2\n\njshell>\n\n你可以使用 `/types` 命令打印 jshell\
  \ 中所有已声明类型的列表。该命令有以下几种形式：\n\n• `/types`\n\n• `/types <类型名称>`\n\n• `/types <代码片段\
  \ ID>`\n\n• `/types -start`\n\n• `/types -all`\n\n不带参数的命令会列出当前活动的 jshell 类、接口和枚举。带有类型名称和代码片段\
  \ ID 参数的命令会分别列出具有指定名称和指定代码片段 ID 的类型。带有 `-start` 选项的命令会列出自动添加的启动类型。带有 `-all` 选项的命令会列出所有类型，包括失败的、覆盖的、丢弃的和启动的。以下\
  \ jshell 是上一个示例会话的延续；它展示了如何打印 jshell 会话中定义的所有活动类型：\n\njshell> /types\n\n| class\
  \ Counter\n\njshell>\n\nCounter 类很小。你可能很快会意识到，在命令行中输入较大类的源代码并不容易。你可能想使用你最喜欢的 Java\
  \ 源代码编辑器（如 NetBeans）来编写源代码，并在 jshell 中快速测试你的类。你可以使用 `/open` 命令在 jshell 中打开一个源代码文件作为源输入。语法如下：\n\
  \n/open <文件路径>\n\n你可以在 `Java9Revealed/com.jdojo.jshell/src/Counter.java` 文件中找到 Counter\
  \ 类的源代码。以下 jshell 会话展示了如何在 jshell 中打开已保存的 `Counter.java` 文件。假设你已将本书的源代码保存在 Windows\
  \ 的 `C:\\` 目录下。如果你使用的是其他操作系统，请遵循文件路径命名约定和你的目录结构来使用以下示例。\n\n第 11 章 ■ Java Shell\n\
  \njshell> /open C:\\Java9Revealed\\com.jdojo.jshell\\src\\Counter.java\n\njshell>\
  \ Counter c = new Counter()\n\nc ==> Counter@25bbe1b6\n\njshell> c.current()\n\n\
  $3 ==> 0\n\njshell> c.next()\n\n$4 ==> 1\n\njshell> c.next()\n\n$5 ==> 2\n\njshell>\
  \ c.current()\n\n$6 ==> 2\n\njshell>\n\n请注意，Counter 类的源代码不包含包声明，因为 jshell 不允许你在包中声明类（或任何类型）。你在\
  \ jshell 中声明的所有类型都被视为内部合成类的静态类型。但是，你可能想测试自己位于包中的类。你可以在 jshell 中使用已编译的、位于包中的类。当你使用库开发应用程序，并希望通过针对库类编写代码片段来试验应用程序逻辑时，通常需要这样做。你需要使用\
  \ `/env` 命令设置类路径，以便能够找到你的类。\n\n本书源代码中包含一个位于 `com.jdojo.jshell` 包中的 Person 类。该类声明如清单\
  \ 11-1 所示。\n\n***清单 11-1.*** Person 类的源代码\n\n// Person.java\n\npackage com.jdojo.jshell;\n\
  \npublic class Person {\n\nprivate String name;\n\npublic Person() {\n\nthis.name\
  \ = \"Unknown\";\n\n}\n\npublic Person(String name) {\n\nthis.name = name;\n\n}\n\
  \npublic String getName() {\n\nreturn name;\n\n}\n\npublic void setName(String name)\
  \ {\n\nthis.name = name;\n\n}\n\n}\n\n第 11 章 ■ Java Shell\n\n以下 jshell 命令在 Windows\
  \ 上设置类路径，假设本书的源代码存储在 `C:\\` 中。如果你的操作系统和源代码位置与假设不同，请使用适合你操作系统的类路径字符串语法和源代码位置。\n\n\
  jshell> /env -class-path C:\\Java9Revealed\\com.jdojo.jshell\\build\\classes\n\n\
  | 正在设置新选项并恢复状态。\n\njshell> Person guy = new Person(\"Martin Guy Crawford\")\n\n\
  | 错误：\n\n| 找不到符号\n\n| 符号：   类 Person\n\n| Person guy = new Person(\"Martin Guy Crawford\"\
  );\n\n| ^----^\n\n| 错误：\n\n| 找不到符号\n\n| 符号：   类 Person\n\n| Person guy = new Person(\"\
  Martin Guy Crawford\");\n\n| ^----^\n\n你知道这个错误的原因吗？我们使用了类的简单名称 Person，而没有导入它，因此\
  \ jshell 无法找到该类。我们需要导入 Person 类或使用其完全限定名称。以下是此 jshell 会话的延续，修复了此错误：\n\njshell> import\
  \ com.jdojo.jshell.Person\n\njshell> Person guy = new Person(\"Martin Guy Crawford\"\
  )\n\nguy ==> com.jdojo.jshell.Person@192b07fd\n\njshell> guy.getName()\n\n$9 ==>\
  \ \"Martin Guy Crawford\"\n\njshell> guy.setName(\"Forrest Butts\")\n\njshell> guy.getName()\n\
  \n$11 ==> \"Forrest Butts\"\n\njshell>\n\n设置执行环境\n\n在上一节中，你学习了如何使用 `/env` 命令设置类路径。该命令可用于设置执行上下文的许多其他组件，例如模块路径。你还可以使用它来解析模块，以便在\
  \ jshell 中使用模块中的类型。其完整语法如下：\n\n/env [-class-path <路径>] [-module-path <路径>] [-add-modules\
  \ <模块>]\n\n[-add-exports <模块/包=目标模块>]\n\n第 11 章 ■ Java Shell\n\n不带参数的 `/env` 命令会打印当前执行上下文的值。`-classpath`\
  \ 选项设置类路径。`-module-path` 选项设置模块路径。`-add-modules` 选项将模块添加到默认的根模块集中，以便它们可以被解析。你可以使用特殊值——`ALL-DEFAULT`、`ALL-SYSTEM`\
  \ 和 `ALL-MODULE-PATH`——与 `-add-modules` 选项一起使用来解析模块。有关这些特殊值的含义，请参考[第 2 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_2)。`-add-exports`\
  \ 选项将模块中未导出的包导出到一组模块。这些选项的含义与它们在 `javac` 和 `java` 命令中使用时的含义相同。\n\n■ **提示** 在命令行中，这些选项必须以两个破折号开头，例如\
  \ `--module-path`。在 jshell 中，它们可以以一个或两个破折号开头。例如，`-module-path` 和 `--module-path`\
  \ 在 jshell 中都是允许的。\n\n\n\n当你设置执行上下文时，当前会话会被重置，并且当前会话中所有先前执行的代码片段都会以静默模式重放。也就是说，重放的代码片段不会显示出来。但是，重放过程中出现的错误会显示出来。\n\
  \n你可以使用 `/env`、`/reset` 和 `/reload` 命令来设置执行上下文。这些命令各自有不同的效果。诸如 `-class-path` 和 `-module-path`\
  \ 等上下文选项的含义是相同的。你可以使用以下命令列出所有可用于设置执行上下文的选项：\n\n`/help context`\n\n让我们通过一个使用 `/env`\
  \ 命令设置模块相关设置的示例来逐步了解。你在[第 3 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_3)中创建了一个\
  \ `com.jdojo.intro` 模块。该模块包含一个名为 `com.jdojo.intro` 的包，但该包并未被导出。现在，你想要调用这个未导出包中 `Welcome`\
  \ 类的静态 `main(String[] args)` 方法。以下是你在 `jshell` 中需要执行的步骤：\n\n• 设置模块路径，以便能够找到该模块。\n\
  • 通过将该模块添加到默认的根模块集中来解析它。你可以使用 `/env` 命令的 `-add-modules` 选项来完成此操作。\n• 使用 `-add-exports`\
  \ 命令导出该包。在 `jshell` 中输入的代码片段是在一个未命名模块中执行的，因此你需要使用 `ALL-UNNAMED` 关键字将该包导出到所有未命名模块。如果你在\
  \ `-add-exports` 选项中未指定目标模块，则默认使用 `ALL-UNNAMED`，并将该包导出到所有未命名模块。\n• （可选）导入 `com.jdojo.intro.Welcome`\
  \ 类，以便在代码片段中使用其简单名称。\n• 现在，你将能够从 `jshell` 中调用 `Welcome.main()` 方法。\n\n以下 `jshell`\
  \ 会话展示了如何执行这些步骤。假设你启动 `jshell` 会话时，当前目录为 `C:\\Java9Revealed`，并且 `C:\\Java9Revealed\\\
  com.jdojo.intro\\build\\classes` 目录包含 `com.jdojo.intro` 模块的编译代码。如果你的目录结构和当前目录不同，请将会话中使用的目录路径替换为你自己的。\n\
  \n第 11 章 ■ Java Shell\n\n```\nC:\\Java9Revealed>jshell\n| 欢迎使用 JShell -- 版本 9-ea\n\
  | 如需介绍，请输入：/help intro\n\njshell> /env -module-path com.jdojo.intro\\build\\classes\n\
  | 正在设置新选项并恢复状态。\n\njshell> /env -add-modules com.jdojo.intro\n| 正在设置新选项并恢复状态。\n\n\
  jshell> /env -add-exports com.jdojo.intro/com.jdojo.intro=ALL-UNNAMED\n| 正在设置新选项并恢复状态。\n\
  \njshell> import com.jdojo.intro.Welcome\n\njshell> Welcome.main(null)\n欢迎使用模块系统。\n\
  模块名称：com.jdojo.intro\n\njshell> /env\n| --module-path com.jdojo.intro\\build\\classes\n\
  | --add-modules com.jdojo.intro\n| --add-exports com.jdojo.intro/com.jdojo.intro=ALL-UNNAMED\n\
  \njshell>\n```\n\n**无需处理受检异常**\n\n在 Java 程序中，如果你调用一个会抛出受检异常的方法，你必须使用 `try-catch`\
  \ 块或添加 `throws` 子句来处理这些异常。JShell 工具旨在提供一种快速简便的方式来评估代码片段，因此你无需在 `jshell` 代码片段中处理受检异常。如果某个代码片段在执行时抛出了受检异常，`jshell`\
  \ 会打印堆栈跟踪并继续执行。\n\n```\njshell> FileReader fr = new FileReader(\"secrets.txt\")\n\
  | 抛出 java.io.FileNotFoundException: secrets.txt (系统找不到指定的文件)\n| 在 FileInputStream.open0\
  \ (本地方法)\n| 在 FileInputStream.open (FileInputStream.java:196)\n| 在 FileInputStream.<init>\
  \ (FileInputStream.java:139)\n| 在 FileInputStream.<init> (FileInputStream.java:94)\n\
  | 在 FileReader.<init> (FileReader.java:58)\n| 在 (#1:1)\n\njshell>\n```\n\n第 11 章\
  \ ■ Java Shell\n\n这个代码片段抛出了一个 `FileNotFoundException`，因为当前目录中不存在名为 `secrets.txt`\
  \ 的文件。如果该文件存在，你无需使用 `try-catch` 块就能创建一个 `FileReader`。请注意，如果你尝试在方法内部使用此代码片段，则正常的\
  \ Java 语法规则适用，你的方法声明将无法编译：\n\n```\njshell> void readSecrets() {\n   ...> FileReader\
  \ fr = new FileReader(\"secrets.txt\");\n   ...> // 此处添加更多代码\n   ...> }\n| 错误：\n\
  | 未报告的异常 java.io.FileNotFoundException；必须被捕获或声明抛出\n| FileReader fr = new FileReader(\"\
  secrets.txt\");\n| ^---------------------------^\n\njshell>\n```\n\n**自动补全**\n\n\
  JShell 工具具有自动补全功能，你可以通过输入部分文本并按 Tab 键来调用它。此功能在你输入命令或代码片段时可用。该工具会检测上下文并帮助你自动补全命令。当存在多种可能性时，它会显示所有可能性，你需要手动输入其中一个。当找到唯一可能性时，它会补全文本。\n\
  \n■ **警告** 在撰写本文时，本节中描述的自动补全键正在重新设计。提议是将 Tab 和 Tab+Shift 键的功能合并到一个 Tab 键中，并将 `<fix>`\
  \ 键（alt+enter 或 alt+F1）的功能合并到 Tab+Shift 键中。这些提议变更的状态可在 [`bugs.openjdk.java.net/browse/JDK-8177076`](https://bugs.openjdk.java.net/browse/JDK-8177076)\
  \ 跟踪。你可以在 JShell 工具上使用 `/help shortcuts` 命令查看当前可用的自动补全键。\n\n以下是该工具找到多种可能性的示例。你需要输入\
  \ `/e` 并按 Tab 键：\n\n```\njshell> /e\n/edit  /exit\n\njshell> /e\n```\n\n该工具检测到你正在尝试输入一个命令，因为你的文本以斜杠（`/`）开头。有两个命令（`/edit`\
  \ 和 `/exit`）以 `/e` 开头，它们被打印出来供你参考。现在你需要自己输入命令的其余部分来完成补全。对于命令，如果你输入足够多的文本使命令名称唯一，然后按\
  \ Enter 键，该工具将执行该命令。在这种情况下，你可以分别输入 `/ed` 或 `/ex` 并按 Enter 键来执行 `/edit` 或 `/exit`\
  \ 命令。你可以输入斜杠（`/`）并按 Tab 键查看命令列表：\n\n```\njshell> /\n/!  /?  /drop  /edit  /env \
  \ /exit  /help\n/history  /imports  /list  /methods  /open  /reload  /reset\n/save\
  \  /set  /types  /vars\n```\n\n以下代码片段创建了一个名为 `str` 的 `String` 变量，初始值为 `\"GoodBye\"\
  `：\n\n```\njshell> String str = \"GoodBye\"\nstr ==> \"GoodBye\"\n```\n\n继续此 `jshell`\
  \ 会话，输入 `str.` 并按 Tab 键：\n\n```\njshell> str.\ncharAt(  chars()  codePointAt(\n\
  codePointBefore(  codePointCount(  codePoints()\ncompareTo(  compareToIgnoreCase(\
  \  concat(\ncontains(  contentEquals(  endsWith(\nequals(  equalsIgnoreCase(  getBytes(\n\
  getChars(  getClass()  hashCode()\nindexOf(  intern()  isEmpty()\nlastIndexOf( \
  \ length()  matches(\nnotify()  notifyAll()  offsetByCodePoints(\nregionMatches(\
  \  replace(  replaceAll(\nreplaceFirst(  split(  startsWith(\nsubSequence(  substring(\
  \  toCharArray()\ntoLowerCase(  toString()  toUpperCase(\ntrim()  wait(\n```\n\n\
  此代码片段打印了 `String` 类中所有可以在变量 `str` 上调用的方法名称。请注意，一些方法名称以 `()` 结尾，而其他方法名称仅以 `(` 结尾。这不是一个错误。如果方法不带参数，其名称后跟\
  \ `()`。如果方法带参数，其名称后跟 `(`。\n\n继续此示例，输入 `str.sub` 并按 Tab 键：\n\n```\njshell> str.sub\n\
  subSequence(  substring(\n```\n\n这次，该工具在 `String` 类中找到了两个以 `sub` 开头的方法。你可以输入整个方法调用\
  \ `str.substring(0, 4)`，然后按 Enter 键来评估代码片段：\n\n```\njshell> str.substring(0, 4)\n\
  $2 ==> \"Good\"\n\njshell>\n```\n\n第 11 章 ■ Java Shell\n\n\n\n或者，你可以通过输入 `str.subs`\
  \ 让工具自动补全方法名。当你输入 `str.subs` 并按下 Tab 键时，工具会补全方法名，插入一个左括号 `(`，并等待你输入该方法的参数：\n\njshell>\
  \ str.substring(\n\nsubstring(\n\njshell> str.substring(\n\n现在，你可以输入方法的参数，然后按 Enter\
  \ 键来求值表达式：\n\njshell> str.substring(0, 4)\n\n$3 ==> \"Good\"\n\njshell>\n\n当一个方法需要参数时，你很可能想查看这些参数的类型。在输入完整的方法/构造器名称和左括号后，按\
  \ Shift+Tab 键可以查看方法的概要。在上一个例子中，如果你输入 `str.substring(` 并按 Shift+Tab，工具将打印 `substring()`\
  \ 方法的概要：\n\njshell> str.substring(\n\nString String.substring(int beginIndex)\n\n\
  String String.substring(int beginIndex, int endIndex)\n\n<press shift-tab again\
  \ to see javadoc>\n\n注意输出内容。它提示如果你再次按 Shift+Tab，将显示 `substring()` 方法的 Javadoc。在下面的提示中，我再次按了\
  \ Shift+Tab 来打印 Javadoc。如果需要显示更多 Javadoc 内容，请按空格键，或输入 Q 返回 jshell 提示符：\n\njshell>\
  \ str.substring(\n\nString String.substring(int beginIndex)\n\n返回此字符串的子字符串。该子字符串从指定索引处的字符开始，一直延伸到该字符串的末尾。\n\
  \n示例：\n\n\"unhappy\".substring(2) 返回 \"happy\"\n\n\"Harbison\".substring(3) 返回 \"\
  bison\"\n\n\"emptiness\".substring(9) 返回 \"\" (空字符串)\n\n参数：\n\nbeginIndex - 起始索引（包含）。\n\
  \n返回：\n\n指定的子字符串。\n\nString String.substring(int beginIndex, int endIndex)\n\n返回此字符串的子字符串。该子字符串从指定的\
  \ beginIndex 开始，一直延伸到索引为 endIndex - 1 的字符。因此，子字符串的长度为 endIndex-beginIndex。\n\n示例：\n\
  \n\"hamburger\".substring(4, 8) 返回 \"urge\"\n\n\"smiles\".substring(1, 5) 返回 \"\
  mile\"\n\n第 11 章 ■ Java Shell\n\n参数：\n\nbeginIndex - 起始索引（包含）。\n\nendIndex - 结束索引（不包含）。\n\
  \n返回：\n\n指定的子字符串。\n\njshell> str.substring(\n\n有时，你输入了一个表达式，并希望将该表达式的值赋给一个适当类型的变量。有时你知道类型，有时你不知道。JShell\
  \ 工具会在你输入完整表达式后，帮助你自动补全赋值部分。输入完整的表达式，然后根据你的平台按 Alt+Enter 或 Alt+F1。现在，按 Alt+V，它会通过添加适当的变量类型并将光标置于你可以输入变量名的位置，来自动补全表达式赋值。让我们逐步操作这些步骤。在\
  \ jshell 中输入表达式 `2 + 2`：\n\njshell> 2 + 2\n\n现在，在 Windows 上，按 Alt+Enter，然后按 Alt+V。jshell\
  \ 会自动补全赋值表达式，并等待你输入变量名：\n\njshell> int = 2 + 2\n\n光标位于 `=` 符号之前。输入 `x` 作为变量名，然后按\
  \ Enter：\n\njshell> int x = 2 + 2\n\nx ==> 4\n\njshell>\n\n执行这些命令时，Windows 中的命令提示符窗口会最大化。你可以按\
  \ Alt+Enter 返回正常窗口。\n\n代码片段与命令历史\n\nJShell 会维护你在所有会话中输入的所有命令和代码片段的历史记录。你可以使用向上和向下箭头键浏览历史记录。你也可以使用\
  \ `/history` 命令打印你在当前会话中输入的所有内容的历史记录：\n\njshell> 2 + 2\n\n$1 ==> 4\n\njshell> System.out.println(\"\
  Hello\")\n\nHello\n\njshell> /history\n\n2 + 2\n\nSystem.out.println(\"Hello\")\n\
  \n/history\n\njshell>\n\n第 11 章 ■ Java Shell\n\n此时，按一次向上箭头显示 `/history`，按两次显示 `System.out.println(\"\
  Hello\")`，按三次显示 `2 + 2`。按第四次向上箭头将显示上一个 jshell 会话中最后输入的命令/代码片段。如果你想执行之前输入的代码片段/命令，请使用向上箭头直到显示所需的命令/代码片段，然后按\
  \ Enter 执行。按向下箭头将导航到列表中的下一个命令或代码片段。\n\n假设你按了五次向上箭头，导航到倒数第五个代码片段/命令。现在按向下箭头将导航到倒数第四个代码片段/命令。当你位于第一个和最后一个代码片段/命令时，按向上箭头或向下箭头将不起作用。\n\
  \n阅读 JShell 堆栈跟踪\n\n在 jshell 上输入的代码片段是合成类的一部分。例如，Java 不允许你声明一个顶级方法。方法声明必须是类型的一部分。当\
  \ Java 程序中抛出异常时，堆栈跟踪会打印类型名称和行号。在 jshell 中，异常可能从代码片段中抛出。在这种情况下，打印合成类名称和行号会产生误导，并且对开发者来说毫无意义。堆栈跟踪中代码片段位置的格式如下：\n\
  \nat <代码片段名称> (#<代码片段 ID>:<代码片段中的行号>)\n\n请注意，某些代码片段可能没有名称。例如，输入代码片段 `2 + 2` 不会给它一个名称。某些代码片段有名称，例如，声明一个变量的代码片段会被赋予与该变量名称相同的名称；方法和类型声明也是如此。有时，你可能有两个同名的代码片段，例如，声明了一个变量和一个同名的/类型。\n\
  \njshell 会为所有代码片段分配一个唯一的代码片段 ID。你可以使用 `/list -all` 命令查找代码片段的 ID。\n\n以下 jshell 会话声明了一个\
  \ `divide()` 方法，并打印了当整数除以零时抛出的运行时 `ArithmeticException` 异常的堆栈跟踪：\n\nC:\\Java9Revealed>jshell\n\
  \n| 欢迎使用 JShell -- 版本 9-ea\n\n| 如需介绍，请输入：/help intro\n\njshell> int divide(int x,\
  \ int y) {\n\n...> return x/y;\n\n...> }\n\n| 已创建方法 divide(int,int)\n\njshell> divide(10,\
  \ 2)\n\n$2 ==> 5\n\njshell> divide(10, 0)\n\n| java.lang.ArithmeticException 抛出：/\
  \ by zero\n\n| at divide (#1:2)\n\n| at (#3:1)\n\n第 11 章 ■ Java Shell\n\njshell>\
  \ /list -all\n\ns1 : import java.io.*;\n\ns2 : import java.math.*;\n\ns3 : import\
  \ java.net.*;\n\ns4 : import java.nio.file.*;\n\ns5 : import java.util.*;\n\ns6\
  \ : import java.util.concurrent.*;\n\ns7 : import java.util.function.*;\n\ns8 :\
  \ import java.util.prefs.*;\n\ns9 : import java.util.regex.*;\n\ns10 : import java.util.stream.*;\n\
  \n1 : int divide(int x, int y) {\n\nreturn x/y;\n\n}\n\n2 : divide(10, 2)\n\n3 :\
  \ divide(10, 0)\n\njshell>\n\n让我们尝试阅读堆栈跟踪。最后一行 `at (#3:1)` 表明异常是由代码片段编号 3 的第 1 行引起的。注意在\
  \ `/list -all` 命令的输出中，代码片段编号 3 是导致异常的表达式 `divide(10, 0)`。第二行 `at divide (#1:2)`\
  \ 表明堆栈跟踪中的第二层位于名称为 `divide`、代码片段 ID 为 1 的代码片段的第 2 行。\n\n重用 JShell 会话\n\n你可以在一个 jshell\
  \ 会话中输入许多代码片段和命令，并可能希望在其他会话中重用它们。你可以使用 `/save` 命令将命令和代码片段保存到文件，并使用 `/open` 命令加载之前保存的命令和代码片段。`/save`\
  \ 命令的语法如下：\n\n/save <选项> <文件路径>\n\n这里，`<选项>` 可以是以下选项之一：`-all`、`-history` 和 `-start`。`<文件路径>`\
  \ 是保存代码片段/命令的文件路径。\n\n不带选项的 `/save` 命令会保存当前会话中的所有活动代码片段。请注意，它不会保存任何命令或失败的代码片段。\n\
  \n带有 `-all` 选项的 `/save` 命令会将当前会话的所有代码片段（包括失败的和启动时的代码片段）保存到指定文件。请注意，它不会保存任何命令。\n\n\
  \n\n使用带有 `-history` 选项的 `/save` 命令，可以保存自 jshell 启动以来你输入的所有内容。\n\n使用带有 `-start` 选项的\
  \ `/save` 命令，可以将默认的启动定义保存到指定文件。\n\n你可以使用 `/open` 命令从文件重新加载代码片段。该命令将文件名作为参数。\n\n\
  以下 jshell 会话声明了一个名为 `Counter` 的类，创建了它的对象，并在该对象上调用了方法。最后，它将所有活动代码片段保存到一个名为 `jshell.jsh`\
