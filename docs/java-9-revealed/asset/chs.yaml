  ...\n\n}\n\n如何打印系统模块（如 `java.base` 或 `java.sql`）的模块声明？\n\n回想一下，系统模块是以特殊文件格式打包的，而不是模块化\
  \ JAR。JDK 9 引入了一种名为 `jrt`（jrt 是 Java 运行时的缩写）的新 URL 方案，用于引用 Java 运行时映像（或系统模块）的内容。使用\
  \ `jrt` 方案的语法如下：\n\njrt:/<模块>/<文件路径>\n\n以下命令打印名为 `java.sql` 的系统模块的模块声明：\n\nC:\\\
  Java9Revealed>javap jrt:/java.sql/module-info.class\n\nCompiled from \"module-info.java\"\
  \n\nmodule java.sql@9-ea {\n\nrequires java.base;\n\nrequires transitive java.logging;\n\
  \nrequires transitive java.xml;\n\nexports javax.transaction.xa;\n\nexports javax.sql;\n\
