  \nx1 ==> 10\n\njshell>\n\n配置 JShell\n\n使用 `/set` 命令，你可以自定义 jshell 会话，范围涵盖从启动代码片段和命令到设置特定平台的代码片段编辑器。在本节中，我将详细解释这些自定义设置。\n\
  \n设置代码片段编辑器\n\nJShell 工具自带一个默认的代码片段编辑器。在 jshell 中，你可以使用 `/edit` 命令来编辑所有代码片段或特定代码片段。`/edit`\
  \ 命令会在编辑器中打开代码片段。代码片段编辑器是一个特定平台的程序，例如 Windows 上的 `notepad.exe`，它将被调用来编辑代码片段。你可以使用带有\
  \ `editor` 参数的 `/set` 命令来设置或删除编辑器设置。该命令的有效形式如下：\n\n• `/set editor [-retain] [-wait]\
  \ <command>`\n\n• `/set editor [-retain] -default`\n\n• `/set editor [-retain] -delete`\n\
  \n如果你使用 `-retain` 选项，该设置将在多个 jshell 会话之间持久保留。\n\n\n\n如果你指定了一个命令，该命令必须是平台特定的。也就是说，在\
  \ Windows 上你需要指定一个 Windows 命令，在 UNIX 上指定一个 UNIX 命令，依此类推。命令可以包含标志。\n\nJShell 工具会将待编辑的代码片段保存到一个临时文件中，并将该临时文件的名称附加到命令后面。当编辑器打开时，你无法使用\
  \ jshell。如果你的编辑器会立即退出，你应该指定 `-wait` 选项，这将使 jshell 等待直到编辑器关闭。\n\n以下命令将记事本设置为 Windows\
  \ 上的编辑器：\n\njshell> /set editor -retain notepad.exe\n\n`-default` 选项会将代码片段编辑器设置为默认编辑器。`-delete`\
  \ 选项会删除当前的编辑器设置。如果 `-retain` 选项与 `-delete` 选项一起使用，则会删除保留的编辑器设置：jshell> /set editor\
  \ -retain -delete\n\n| 编辑器设置为：-default\n\njshell>\n\n第 11 章 ■ Java Shell\n\n在以下环境变量之一中设置的编辑器——`JSHELLEDITOR`、`VISUAL`\
  \ 或 `EDITOR`——会优先于默认编辑器。系统会按顺序在这些环境变量中查找编辑器。如果这些环境变量都未设置，则使用默认编辑器。所有这些规则背后的意图是始终有一个编辑器可用，并将默认编辑器作为后备方案。不带任何参数和选项的\
  \ `/set editor` 命令会打印当前编辑器设置的信息。\n\n以下 jshell 会话将记事本设置为 Windows 上的编辑器。请注意，此示例在 Windows\
  \ 以外的平台上无法运行，在这些平台上你需要指定特定于平台的程序作为编辑器。\n\nC:\\Java9Revealed>jshell\n\n| 欢迎使用 JShell\
  \ -- 版本 9-ea\n\n| 如需介绍，请输入：/help intro\n\njshell> /set editor\n\n| /set editor -default\n\
  \njshell> /set editor -retain notepad.exe\n\n| 编辑器设置为：notepad.exe\n\n| 编辑器设置已保留：notepad.exe\n\
  \njshell> /exit\n\n| 再见\n\nC:\\Java9Revealed>jshell\n\n| 欢迎使用 JShell -- 版本 9-ea\n\
  \n| 如需介绍，请输入：/help intro\n\njshell> /set editor\n\n| /set editor -retain notepad.exe\n\
  \njshell> 2 + 2\n\n$1 ==> 4\n\njshell> /edit\n\njshell> /set editor -retain -delete\n\
  \n| 编辑器设置为：-default\n\njshell> /exit\n\n| 再见\n\nC:\\Java9Revealed>SET JSHELLEDITOR=notepad.exe\n\
  \nC:\\Java9Revealed>jshell\n\n| 欢迎使用 JShell -- 版本 9-ea\n\n| 如需介绍，请输入：/help intro\n\
  \njshell> /set editor\n\n| /set editor notepad.exe\n\njshell>\n\n第 11 章 ■ Java Shell\n\
  \n**设置反馈模式**\n\n当你执行一个代码片段或命令时，jshell 会打印反馈。反馈的数量和格式取决于*反馈模式*。你可以使用四种预定义的反馈模式之一，或自定义反馈模式：\n\
  \n• silent（静默）\n• concise（简洁）\n• normal（正常）\n• verbose（详细）\n\n静默模式完全不提供反馈，而详细模式提供最多的反馈。简洁模式提供与正常模式相同的反馈，但格式更紧凑。设置反馈模式的命令如下：\n\
  \n/set feedback [-retain] <模式>\n\n这里，`<模式>` 是四种反馈模式之一。如果你希望跨 jshell 会话持久化反馈模式，请使用\
  \ `-retain` 选项。\n\n你也可以在特定的反馈模式下启动 jshell：\n\njshell --feedback <模式>\n\n以下命令以详细反馈模式启动\
  \ jshell：\n\nC:\\Java9Revealed>jshell --feedback verbose\n\n以下示例展示了如何设置不同的反馈模式：\n\
  \nC:\\Java9Revealed>jshell\n\n| 欢迎使用 JShell -- 版本 9-ea\n\n| 如需介绍，请输入：/help intro\n\
  \njshell> 2 + 2\n\n$1 ==> 4\n\njshell> /set feedback verbose\n\n| 反馈模式：verbose\n\
  \njshell> 2 + 2\n\n$2 ==> 4\n\n| 创建了临时变量 $2 : int\n\njshell> /set feedback concise\n\
  \njshell> 2 + 2\n\n$3 ==> 4\n\njshell> /set feedback silent\n\n-> 2 + 2\n\n第 11\
  \ 章 ■ Java Shell\n\n-> System.out.println(\"Hello\")\n\nHello\n\n-> /set feedback\
  \ verbose\n\n| 反馈模式：verbose\n\njshell> 2 + 2\n\n$6 ==> 4\n\n| 创建了临时变量 $6 : int\n\
  \n在 jshell 中设置的反馈模式是临时的。它仅对当前会话有效。要跨 jshell 会话持久化反馈模式，请使用带有 `feedback` 参数和 `-retain`\
  \ 选项的 `/set` 命令：\n\n\n\njshell> /set feedback -retain\n\n此命令将持久化当前的反馈模式。当你再次启动 jshell\
  \ 时，它会配置为你执行此命令前所设置的反馈模式。你仍然可以在会话中临时更改反馈模式。如果你想永久设置一个新的反馈模式，你需要使用\n\n`/set feedback\
  \ <mode>` 命令，并再次执行该命令以持久化新设置。\n\n你也可以通过使用 `-retain` 选项来设置一个新的反馈模式，并同时将其持久化到未来的会话中。以下命令会将反馈模式设置为\
  \ verbose 并保留到未来的会话中：\n\njshell> /set feedback -retain verbose\n\n要确定当前的反馈模式，你只需执行带有\
  \ `feedback` 参数的 `/set` 命令。它会打印出用于设置当前反馈模式的命令（在第一行），随后列出所有可用的反馈模式，如下所示：\n\njshell>\
  \ /set feedback\n\n**| /set feedback normal**\n\n|\n\n| 可用的反馈模式：\n\n| concise\n\n\
  | normal\n\n| silent\n\n| verbose\n\njshell>\n\n■ **提示** 在学习 jshell 时，建议你在 verbose\
  \ 反馈模式下启动它，这样你可以获得关于命令和代码片段执行状态的许多详细信息。这将帮助你更快地学习这个工具。\n\n第 11 章 ■ Java Shell\n\n\
  创建自定义反馈模式\n\n四个预配置的反馈模式足以配合 jshell 使用。它们提供了不同级别的粒度来自定义你的 jshell。你也可以拥有自己的自定义反馈模式。我怀疑你是否真的需要自定义反馈模式，但如果你需要，这个功能是存在的。创建自定义反馈模式稍微复杂一些。你需要编写几个自定义步骤。大多数情况下，你可能只想在预定义的反馈模式中自定义几个项目。你可以从头开始创建自定义反馈模式，或者通过复制现有反馈模式并有选择地进行自定义。创建自定义反馈模式的语法如下：\n\
  \n`/set mode <mode> [<old-mode>] [-command|-quiet|-delete]`\n\n这里，`<mode>` 是自定义反馈模式的名称；例如，`kverbose`。`<old-mode>`\
  \ 是现有反馈模式的名称，其设置将被复制到新模式中。使用 `-command` 选项会在设置模式时显示相关信息，而使用 `-quiet` 选项则在设置模式时不显示任何信息。`-delete`\
  \ 选项用于删除该模式。\n\n以下命令通过复制预定义的 verbose 反馈模式的所有设置，创建了一个名为 `kverbose` 的新反馈模式：\n\n`/set\
  \ mode kverbose verbose -command`\n\n以下命令将持久化名为 `kverbose` 的新反馈模式以供将来使用：\n\n`/set\
  \ mode kverbose -retain`\n\n你需要使用 `-delete` 选项来删除自定义反馈模式。你不能删除预定义的反馈模式。如果你持久化了自定义反馈模式，你可以使用\
  \ `-retain` 选项将其从当前和所有未来的会话中删除。以下命令将删除 `kverbose` 反馈模式：\n\n`/set mode kverbose -delete\
  \ -retain`\n\n此时，预定义的 verbose 模式和自定义的 kverbose 模式之间没有区别。创建反馈模式后，你需要自定义三个设置：\n\n\
  • 提示符\n\n• 输出截断限制\n\n• 输出格式\n\n■ **提示** 一旦你完成了自定义反馈模式的定义，你需要使用 `/set feedback <new-mode>`\
  \ 命令来开始使用它。\n\n你可以为反馈设置两种类型的提示符——主提示符和续行提示符。当 jshell 准备好读取新的代码片段/命令时，会显示主提示符。当你输入多行代码片段时，会在每行的开头显示续行提示符。设置提示符的语法如下：\n\
  \n`/set prompt <mode> \"<prompt>\" \"<continuation-prompt>\"`\n\n第 11 章 ■ Java Shell\n\
  \n这里，`<prompt>` 是主提示符，`<continuation-prompt>` 是续行提示符。\n\n以下命令为 kverbose 模式设置了提示符：\n\
  \n`/set prompt kverbose \"\\njshell-kverbose> \" \"more... \"`\n\n\n\n您可以使用以下命令为反馈模式设置每种操作/事件显示的最大字符数：\n\
  \n/set truncation <mode> <length> <selectors>\n\n其中，<mode> 是您设置截断限制的反馈模式；<length>\
  \ 是指定选择器显示的最大字符数。<selectors> 是一个以逗号分隔的选择器列表，用于确定截断限制适用的上下文。选择器是预定义的关键字，代表特定的上下文，例如，`vardecl`\
  \ 是一个表示未初始化的变量声明的选择器。使用以下命令可获取关于设置截断限制和选择器的更多信息：\n\n/help /set truncation\n\n以下命令将所有内容的截断限制设置为\
  \ 80 个字符，并将变量值或表达式的截断限制设置为 5 个字符：\n\n/set truncation kverbose 80\n\n/set truncation\
  \ kverbose 5 expression,varvalue\n\n请注意，最具体的选择器决定了实际使用的截断限制。以下设置使用了两个选择器——一个用于所有类型的代码片段（80\
  \ 个字符），另一个用于表达式和变量值（5 个字符）。对于表达式而言，第二个设置是最具体的设置。在这种情况下，如果您有一个值超过 5 个字符的变量，显示时它将被截断为\
  \ 5 个字符。\n\n设置输出格式是一项复杂的工作。您需要根据操作/事件为所有期望的输出类型设置格式。我不会逐一介绍所有输出类型的定义。使用以下命令可获取关于设置输出格式的更多信息：\n\
