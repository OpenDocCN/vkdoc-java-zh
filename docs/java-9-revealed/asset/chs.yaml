  \ 使用\n\n模块 com.jdojo.prime.probable 提供 com.jdojo.prime.PrimeChecker，由 com.jdojo.prime\
  \ 使用 152\n\n第 7 章 ■ 创建自定义运行时映像\n\n使用与之前相同的逻辑，找到了所有三个服务提供者。让我们创建一个包含所有三个服务提供者的新运行时映像。以下命令完成此任务：\n\
  \nC:\\Java9Revealed>jlink --module-path jmods;C:\\java9\\jmods\n\n--add-modules\
  \ com.jdojo.prime.client\n\n--launcher runprimechecker=com.jdojo.prime.client\n\n\
  **--bind-services**\n\n--output primecheckerservice\n\n将此命令与上一节中使用的命令进行比较。这次，你只使用\
  \ `--add-modules` 选项指定了一个模块。也就是说，你无需指定服务提供者模块的名称。你使用了 `--bind-services` 选项，因此添加的模块中引用的所有服务提供者都会自动添加到运行时映像中。你指定了一个名为\
  \ `primecheckerservice` 的新输出目录。以下命令运行新创建的运行时映像：\n\nC:\\Java9Revealed>primecheckerservice\\\
  bin\\runprimechecker\n\n使用 jdojo.generic.primechecker：\n\n3 是质数。\n\n4 不是质数。\n\n\
  121 不是质数。\n\n977 是质数。\n\n使用 jdojo.faster.primechecker：\n\n3 是质数。\n\n4 不是质数。\n\n\
  121 不是质数。\n\n977 是质数。\n\n使用 jdojo.probable.primechecker：\n\n3 是质数。\n\n4 不是质数。\n\n\
  121 不是质数。\n\n977 是质数。\n\n输出证明，模块路径中的所有三个质数检查服务提供者都已自动添加到运行时映像中。\n\n将插件与 jlink 工具结合使用\n\
  \njlink 工具使用插件架构来创建运行时映像。它将所有类、本地库和配置文件收集到一组资源中。它构建了一个转换器管道，这些转换器是指定为命令行选项的插件。资源被送入管道。管道中的每个转换器都会对资源应用某种转换，转换后的资源再被送入下一个转换器。最后，jlink\
  \ 将转换后的资源送入映像构建器。\n\n第 7 章 ■ 创建自定义运行时映像\n\nJDK 9 随 jlink 工具附带了一些插件。这些插件定义了命令行选项。要使用某个插件，你需要使用其对应的命令行选项。你可以使用\
  \ `--list-plugins` 选项运行 jlink 工具，以打印所有可用插件及其描述和命令行选项的列表：C:\\Java9Revealed>jlink\
  \ --list-plugins\n\n可用插件列表：\n\n插件名称：class-for-name\n\n选项：--class-for-name\n\n描述：类优化：将\
  \ Class.forName 调用转换为常量加载。\n\n插件名称：compress\n\n选项：--compress=<0|1|2>[:filter=<模式列表>]\n\
  \n描述：压缩输出映像中的所有资源。\n\n级别 0：常量字符串共享\n\n级别 1：ZIP\n\n级别 2：两者。\n\n可以指定一个可选的 <模式列表> 过滤器来列出要包含的文件模式。\n\
  \n插件名称：dedup-legal-notices\n\n选项：--dedup-legal-notices=[error-if-not-same-content]\n\
  \n描述：对所有法律声明进行去重。如果指定了 error-if-not-same-content，则当两个同名文件内容不同时，将视为错误。\n\n插件名称：exclude-files\n\
  \n选项：--exclude-files=<模式列表> 要排除的文件\n\n\n\n描述：指定要排除的文件。例如：** .java，glob:/java.base/native/client/**\n\
  \n插件名称：exclude-jmod-section\n\n选项：--exclude-jmod-section=<section-name>\n\n其中 <section-name>\
  \ 是 \"man\" 或 \"headers\"。\n\n描述：指定要排除的 JMOD 部分\n\n插件名称：exclude-resources\n\n选项：--exclude-resources=<pattern-list>\
  \ 要排除的资源\n\n描述：指定要排除的资源。例如：** .jcov，glob:**/META-INF/**\n\n插件名称：generate-jli-classes\n\
  \n选项：--generate-jli-classes=@filename\n\n描述：提供一个文件，提示 jlink 需要预生成哪些 java.lang.invoke\
  \ 类。如果未指定此标志，将生成一组默认类。\n\n插件名称：include-locales\n\n选项：--include-locales=<langtag>[,<langtag>]*\n\
  \n描述：以逗号分隔的 BCP 47 语言标签，允许进行 RFC 4647 中定义的语言环境匹配。例如：en,ja,*-IN\n\n第 7 章 ■ 创建自定义运行时映像\n\
  \n插件名称：order-resources\n\n选项：--order-resources=<pattern-list> 按优先级顺序排列的路径。如果指定了\
  \ @file，则每一行都应与要排序的路径完全匹配\n\n描述：对资源进行排序。例如：**/module-info.class,@classlist,/java.base/java/lang/**\n\
  \n插件名称：release-info\n\n选项：--release-info=<file>|add:<key1>=<value1>:<key2>=<value2>:...|del:<key\
  \ list> 描述：<file> 选项用于从提供的文件加载发布属性。add: 用于向发布文件添加属性。可以传递任意数量的 <key>=<value> 对。del:\
  \ 用于删除发布文件中的键列表。\n\n插件名称：strip-debug\n\n选项：--strip-debug\n\n描述：从输出映像中去除调试信息\n\n\
  插件名称：strip-native-commands\n\n选项：--strip-native-commands\n\n描述：从映像中排除本机命令（例如 java/java.exe）\n\
  \n插件名称：system-modules\n\n选项：--system-modules\n\n描述：快速加载模块描述符（始终启用）\n\n插件名称：vm\n\n\
  选项：--vm=<client|server|minimal|all>\n\n描述：选择输出映像中的 HotSpot VM。默认为 all\n\n对于需要 <pattern-list>\
  \ 的选项，其值将是一个逗号分隔的元素列表，每个元素使用以下形式之一：\n\n<glob-pattern>\n\nglob:<glob-pattern>\n\n\
  regex:<regex-pattern>\n\n@<filename> 其中 filename 是包含要使用的模式的文件名，每行一个模式\n\n以下命令使用了\
  \ compress 和 strip-debug 插件。compress 插件将压缩映像，从而减小映像大小。我使用压缩级别 2 以获得最大压缩。strip-debug\
  \ 插件将从 Java 代码中移除调试信息，从而进一步减小映像大小。在运行此命令之前，请确保删除之前创建的 primechecker 目录。\n\nC:\\Java9Revealed>jlink\
