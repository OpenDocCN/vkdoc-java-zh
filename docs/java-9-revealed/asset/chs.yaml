  \ `m4X()`（其中 X 是数字）的方法向你展示了如何抑制普通弃用和最终弃用警告。\n\n第 15 章 ■ 增强的弃用机制\n\n***清单 15-3.***\
  \ 使用弃用 API 并抑制弃用警告的 BoxTest 类\n\n```java\n// BoxTest.java\npackage com.jdojo.deprecation;\n\
