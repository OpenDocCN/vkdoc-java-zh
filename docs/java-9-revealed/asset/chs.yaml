  \ API\n\n`LayerInfo` 类非常简单。它将版本信息存储在一个名为 `VERSION` 的静态变量中。它在静态初始化器中打印一条包含版本信息的消息。此消息将帮助你理解正在加载的是哪个版本的\
  \ `LayerInfo` 类。`printInfo()` 方法打印类的详细信息：版本、类名、类加载器、模块名称和层。\n\n清单 10-15 和清单 10-16\
  \ 分别包含了 `com.jdojo.layer` 模块的 2.0 版模块定义和 `LayerInfo` 类的类声明。从该模块的 1.0 版到 2.0 版，只有一处发生了变化——静态变量\
