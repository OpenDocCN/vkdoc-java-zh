  \ javax.sql]`\n\n第 10 章 ■ 模块 API\n\n第二次运行时，`ModuleBasicInfo` 和 `PrimeChecker` 类被加载到应用程序类加载器的未命名模块中，这体现在两个模块的\
  \ `isNamed()` 方法均返回 false。\n\n请注意 `Module` 类的 `getPackages()` 方法的动态特性。第一次调用时，它只返回一个包名——`com.jdojo.module.api`。第二次调用时，它返回两个包名——`com.jdojo.module.api`\
  \ 和 `com.jdojo.prime`。这是因为未命名模块中的包会随着新包中的类型被加载而动态添加。`java.sql` 模块的输出在两种情况下保持不变，因为无论\
  \ Java 启动器以何种模式运行，平台类型始终被加载到同一个模块中。\n\n**查询模块**\n\n你可能对模块执行的典型查询包括：\n\n*   模块 M\
  \ 能否读取另一个模块 N？\n*   模块能否使用特定类型的服务？\n*   模块是否向所有或部分模块导出了特定包？\n*   模块是否向所有或部分模块开放了特定包？\n\
  *   这个模块是命名模块还是未命名模块？\n*   这是自动模块吗？\n*   这是开放模块吗？\n\n你可以使用命令行选项，也可以通过编程方式使用模块 API\
  \ 来增强模块描述符。你可以将所有关于模块属性的查询分为两类：一类是结果在模块加载后可能发生变化的，另一类是结果在模块加载后不会发生变化的。`Module` 类包含用于第一类查询的方法，而\
  \ `ModuleDescriptor` 类包含用于第二类查询的方法。`Module` 类为第一类查询提供了以下方法：\n\n*   `boolean canRead(Module\
  \ other)`\n*   `boolean canUse(Class<?> service)`\n*   `boolean isExported(String\
  \ packageName)`\n*   `boolean isExported(String packageName, Module other)`\n* \
  \  `boolean isOpen(String packageName)`\n*   `boolean isOpen(String packageName,\
  \ Module other)`\n*   `boolean isNamed()`\n\n方法名称直观地说明了它们的功能。`isNamed()` 方法对命名模块返回\
  \ true，对未命名模块返回 false。模块的类型（命名或未命名）在模块加载后不会改变。该方法在 `Module` 类中提供，因为你无法为未命名模块获取 `ModuleDescriptor`。\n\
  \n第 10 章 ■ 模块 API\n\n`ModuleDescriptor` 包含三个方法，用于告知模块的类型以及模块描述符的生成方式。`isOpen()`\
  \ 方法在模块为开放模块时返回 true，否则返回 false。`isAutomatic()` 方法在模块为自动模块时返回 true，否则返回 false。\n\
