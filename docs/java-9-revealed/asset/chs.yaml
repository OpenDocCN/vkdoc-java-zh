  \ -> {\n\n>> System.out.printf(\"代码片段: %s%n\", se.snippet().source());\n\n>> System.out.printf(\"\
  先前状态: %s%n\", se.previousStatus());\n\n>> System.out.printf(\"当前状态: %s%n\", se.status());\n\
  \n>> System.out.printf(\"值: %s%n\", se.value());\n\n>> });\n\n-> shell.eval(\"int\
  \ x = 100;\");\n\n代码片段: int x = 100;\n\n先前状态: NONEXISTENT\n\n当前状态: VALID\n\n值: 100\n\
  \n-> shell.eval(\"double x = 100.89;\");\n\n代码片段: double x = 100.89;\n\n先前状态: VALID\n\
  \n当前状态: VALID\n\n值: 100.89\n\n代码片段: int x = 100;\n\n先前状态: VALID\n\n当前状态: OVERWRITTEN\n\
  \n值: null\n\n-> shell.close()\n\n-> /exit\n\nC:\\Java9Revealed>\n\n第 11 章 ■ Java\
  \ Shell\n\n总结\n\nJava shell，在 JDK 9 中称为 JShell，是一个命令行工具，提供了一种交互式访问 Java 编程语言的方式。它允许你评估\
  \ Java 代码片段，而无需强制你编写整个 Java 程序。它是 Java 的 REPL。JShell 也是一个 API，为其他工具（如 IDE）提供对 Java\
  \ 代码 REPL 功能的编程访问。\n\n你可以通过运行存储在 JDK_HOME\\bin 目录中的 jshell 程序来启动 JShell 命令行工具。该工具支持执行代码片段和命令。代码片段是\
  \ Java 代码的片段。当代码片段被评估/执行时，JShell 会维护其状态。它还会跟踪所有已输入代码片段的状态。你可以使用命令来查询 JShell 状态并配置\
  \ jshell 环境。\n\n为了区分命令和代码片段，所有命令都以斜杠（/）开头。\n\nJShell 包含多项功能，可提高开发人员的工作效率并提供更好的用户体验，例如代码自动补全和在工具内显示\
  \ Javadoc。JShell 尝试使用 JDK 中已有的功能，例如编译器 API 来解析、分析和编译代码片段，以及 Java 调试器 API 来用新代码片段替换\
  \ JVM 中的现有代码片段。JShell 的设计使得无需对 JShell 工具本身进行任何更改或进行少量更改，即可使用 Java 语言中的新结构。\n\n**第\
  \ 12 章**\n\n**进程 API 更新**\n\n在本章中，你将学习：\n\n• 什么是进程 API\n\n• 如何创建原生进程\n\n• 如何获取新进程的信息\n\
  \n• 如何获取当前进程的信息\n\n• 如何获取所有系统进程的信息\n\n• 如何设置创建、查询和管理原生进程的权限\n\n什么是进程 API？\n\n进程\
  \ API 由一些类和接口组成，允许你处理原生进程。使用该 API，你可以：\n\n• 从 Java 代码创建新的原生进程\n\n• 获取原生进程的进程句柄，无论它们是由\
  \ Java 代码还是其他方式创建的\n\n• 销毁正在运行的进程\n\n• 查询进程的活动状态及其其他属性\n\n• 获取进程的子进程列表和父进程\n\n•\
  \ 获取原生进程的进程 ID (PID)\n\n• 获取新创建进程的输入、输出和错误流\n\n• 等待进程终止\n\n• 在进程终止时执行任务\n\n进程 API\
  \ 包含 java.lang 包中的以下类和接口：\n\n• Runtime\n\n• ProcessBuilder\n\n• ProcessBuilder.Redirect\n\
  \n© Kishori Sharan 2017\n\nK. Sharan, *Java 9 揭密*, DOI 10.1007/978-1-4842-2592-9_12\n\
  \n第 12 章 ■ 进程 API 更新\n\n• Process\n\n• ProcessHandle\n\n• ProcessHandle.Info\n\n\
  自 Java 1.0 起就支持处理原生进程。Process 类的实例表示由 Java 程序创建的原生进程。通过调用 Runtime 类的 exec() 方法来启动进程。\n\
  \nJDK 5.0 添加了另一个名为 ProcessBuilder 的类，JDK 7.0 添加了一个名为 ProcessBuilder.Redirect 的嵌套类。ProcessBuilder\
  \ 类的实例保存一组进程属性。调用其 start() 方法会启动一个原生进程，并返回一个表示该原生进程的 Process 类实例。你可以多次调用其 start()\
  \ 方法；每次调用，它都会使用 ProcessBuilder 实例中保存的属性启动一个新进程。在 Java 5.0 中，ProcessBuilder 类接管了\
  \ Runtime.exec() 方法启动新进程的工作。\n\n在 Java 7 和 Java 8 中，进程 API 进行了一些改进，为 Process 和 ProcessBuilder\
  \ 类添加了一些方法。\n\n在 Java 9 之前，进程 API 仍然缺乏对处理原生进程的基本支持，例如获取进程的 PID 和所有者、进程的启动时间、进程已使用的\
  \ CPU 时间、当前正在运行的原生进程数量等。请注意，在 Java 9 之前，你可以启动原生进程并处理它们的输入、输出和错误流。但是，你无法处理未启动的原生进程，也无法查询进程的详细信息。为了更紧密地处理原生进程，Java\
  \ 开发人员不得不使用 Java 本地接口 (JNI) 编写本地代码。Java 9 提供了这些处理原生进程所急需的功能。\n\nJava 9 向进程 API 添加了一个名为\
  \ ProcessHandle 的接口。ProcessHandle 接口的实例标识一个原生进程；它允许你查询进程状态和管理进程。\n\n比较 Process 类和\
  \ ProcessHandle 接口。Process 类的实例表示由当前 Java 程序启动的原生进程，而 ProcessHandle 接口的实例表示一个原生进程，无论它是由当前\
  \ Java 程序还是其他方式启动的。在 Java 9 中，Process 类添加了几个方法，这些方法在新的 ProcessHandle 接口中也可用。Process\
  \ 类包含一个 toHandle() 方法，该方法返回一个 ProcessHandle。\n\nProcessHandle.Info 接口的实例表示进程属性的快照。请注意，不同操作系统对进程的实现方式不同，因此它们的属性也各不相同。进程的状态可能随时改变，例如，每当进程获得更多\
  \ CPU 时间时，其使用的 CPU 时间就会增加。要获取进程的最新信息，你需要在需要时使用 ProcessHandle 接口的 info() 方法，该方法将返回一个新的\
  \ ProcessHandle.Info 接口实例。\n\n本章中的所有示例均在 Windows 10 上运行。当你使用 Windows 10 或其他操作系统在自己的机器上运行这些程序时，可能会得到不同的输出。\n\
  \n当前进程\n\nProcessHandle 接口的 current() 静态方法返回当前进程的句柄。请注意，此方法返回的当前进程始终是正在执行代码的 Java\
  \ 进程。\n\n// 获取当前进程的句柄\n\nProcessHandle current = ProcessHandle.current();\n\n一旦获得当前进程的句柄，就可以使用\
  \ ProcessHandle 接口的方法来获取有关该进程的详细信息。有关如何获取当前进程信息的示例，请参阅下一节。\n\n第 12 章 ■ 进程 API 更新\n\
  \n■ **提示** 你不能杀死当前进程。尝试使用 ProcessHandle 接口的 destroy() 或 destroyForcibly() 方法杀死当前进程会导致\
  \ IllegalStateException。\n\n查询进程状态\n\n\n\n您可以使用 `ProcessHandle` 接口中的方法来查询进程的状态。表\
  \ 12-1 列出了该接口中常用的方法及其简要说明。请注意，其中许多方法返回的是进程在快照创建时的状态快照。由于进程是异步创建、运行和销毁的，因此无法保证稍后使用其属性时，该进程仍处于相同状态。\n\
  \n***表 12-1.** ProcessHandle 接口中的方法*\n\n**方法**\n\n**描述**\n\nstatic Stream<ProcessHandle>\
  \ 返回操作系统中当前进程可见的所有进程的快照。\n\nallProcesses()\n\nStream<ProcessHandle>\n\n返回当前进程的直接子进程的快照。使用\
  \ `descendants()` 方法可以获取所有层级的子进程列表，\n\nchildren()\n\n例如，子进程、孙进程、曾孙进程等。\n\nstatic\
  \ ProcessHandle\n\n返回当前进程的 `ProcessHandle`，即执行此方法调用的 Java 进程。\n\ncurrent()\n\nStream<ProcessHandle>\n\
  \n返回进程的后代进程的快照。将其与 `children()` 方法进行比较，后者仅返回进程的直接后代。\n\ndescendants()\n\nboolean\
  \ destroy()\n\n请求终止进程。如果成功请求终止进程，则返回 `true`，否则返回 `false`。能否终止进程取决于操作系统的访问控制。\n\n\
  boolean destroyForcibly()\n\n请求强制终止进程。如果成功请求终止进程，则返回 `true`，否则返回 `false`。强制终止进程会立即结束进程，而正常终止则允许进程干净地关闭。能否终止进程取决于操作系统的访问控制。\n\
  \nlong getPid()\n\n返回进程的原生进程 ID（PID），该 ID 由操作系统分配。请注意，操作系统可能会重用 PID，因此具有相同 PID 的两个进程句柄可能不代表同一个进程。\n\
  \nProcessHandle.Info info()\n\n返回进程信息的快照。\n\nboolean isAlive()\n\n如果此 `ProcessHandle`\
  \ 所代表的进程尚未终止，则返回 `true`，否则返回 `false`。请注意，在您成功请求终止进程后的一段时间内，此方法可能仍返回 `true`，因为进程将被异步终止。\n\
  \nstatic\n\n返回一个现有原生进程的 `Optional<ProcessHandle>`。如果具有指定 pid 的进程不存在，\n\nOptional<ProcessHandle>\n\
  \n则返回一个空的 `Optional`。\n\nof(long pid)\n\n( *续*)\n\n第 12 章 ■ 进程 API 更新\n\n***表 12-1.***\
  \ ( *续*)\n\n**方法**\n\n**描述**\n\nCompletableFuture\n\n返回一个用于进程终止的 `CompletableFuture<ProcessHandle>`。您可以使用返回的对象添加一个任务，\n\
  \n<ProcessHandle> onExit()\n\n该任务将在进程终止时执行。对当前进程调用此方法会抛出 `IllegalStateException`。\n\
  \nOptional<ProcessHandle>\n\n返回父进程的 `Optional<ProcessHandle>`。\n\nparent()\n\nboolean\n\
  \n如果 `destroy()` 的实现能够正常终止进程，则返回 `true`。\n\nsupportsNormalTermination()\n\n表 12-2\
  \ 列出了 `ProcessHandle.Info` 嵌套接口的方法和描述。此接口的实例包含有关进程的快照信息。您可以使用 `ProcessHandle` 接口或\
  \ `Process` 类的 `info()` 方法获取 `ProcessHandle.Info`。该接口中的所有方法都返回一个 `Optional`。\n\n\
  ***表 12-2.** ProcessHandle.Info 接口中的方法*\n\n**方法**\n\n**描述**\n\nOptional<String[]>\n\
  \n返回进程的参数。进程可能会在启动后更改传递给它的原始参数。在这种情况下，此方法返回更改后的参数。\n\narguments()\n\nOptional<String>\
  \ command()\n\n返回进程的可执行文件路径名。\n\nOptional<String>\n\n这是一个便捷方法，用于组合命令和命令行。\n\ncommandLine()\n\
  \n\n\n进程的参数。它通过组合 `command()` 和 `arguments()` 方法返回的值（如果这两个方法都返回非空的可选值）来返回进程的命令行。\n\
  \n`Optional<Instant> startInstant()`\n返回进程的启动时间。如果操作系统未返回启动时间，则返回一个空的 `Optional`。\n\
  \n`Optional<Duration> totalCpuDuration()`\n返回进程使用的总 CPU 时间。请注意，进程可能运行很长时间，但使用的 CPU\
  \ 时间可能非常少。\n\n`Optional<String> user()`\n返回进程的用户。\n\n现在是时候看看 `ProcessHandle` 和 `ProcessHandle.Info`\
  \ 接口的实际应用了。本章中的所有类都位于 `com.jdojo.process.api` 模块中，其声明见清单 12-1。\n\n***清单 12-1.***\
