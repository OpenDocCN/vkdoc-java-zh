  \n第 3 章 ■ 创建您的第一个模块\n\n当您的项目未配置为可运行时，您有两个选项来运行程序：\n\n*   您可以运行一个包含 `main` 方法的类。请注意，在学习过程中，您的项目中可能有多个类包含\
  \ `main` 方法，您可能希望使用此选项。\n*   您可以配置您的项目以使其可运行。当您的项目中只有一个包含 `main` 方法的类时，请使用此选项。\n\
  \n要运行一个类，请在 NetBeans IDE 的“项目”选项卡中右键单击包含 `main()` 方法的类的源文件（`.java` 文件），然后选择“运行文件”，或者选择该类文件并按\
  \ `Shift+F6`。要运行 `Welcome` 类，请选择 `Welcome.java` 文件并运行它。程序输出将打印在输出窗格中，如图 3-23 所示。\n\
  \n***图 3-23.** 运行 Welcome.java 文件*\n\n\n\n要配置项目运行，请右键点击项目并选择“属性”。在“项目属性”对话框中，从“类别”列表中选择“运行”节点。在“主类”字段中输入\
  \ `com.jdojo.intro.Welcome`（见图 3-24）。C 点击“确定”关闭对话框。\n\n![](img/index-76_1.jpg)\n\
  \n第 3 章 ■ 创建你的第一个模块\n\n***图 3-24.** 配置 NetBeans 项目以运行*\n\n项目配置完成后，你可以选择“运行”➤“运行项目”或按\
  \ F6 键来运行项目。运行项目将执行你在项目运行配置中指定的主类。\n\n总结\n\n使用模块开发 Java 应用程序并不会改变 Java 类型在包中的组织方式。模块的源代码在包层次结构的根目录下包含一个\
  \ `module-info.java` 文件。也就是说，`module-info.java` 文件位于未命名包中。它包含模块声明。\n\nJDK 9 增强了\
  \ `javac` 编译器、`jar` 工具和 `java` 启动器，使其能够与模块协同工作。`javac` 编译器接受新的选项，例如用于定位应用程序模块的 `--module-path`、用于定位模块源代码的\
  \ `--module-source-path`，以及用于指定正在编译模块版本的 `--module-version`。`jar` 工具允许你分别使用 `--main-class`\
  \ 和 `--module-version` 选项为模块化 JAR 指定主类和模块版本。`java` 启动器可以在类路径模式、模块模式或混合模式下运行。要运行模块中的类，你需要使用\
  \ `--module-path` 选项指定模块路径。你需要使用 `--module` 选项指定主类名称。主类以 `<module>/<main-class>`\
  \ 的形式指定，其中 `<module>` 是包含主类的模块，`<main-class>` 是包含作为应用程序入口点的 `main()` 方法的类的完全限定名。\n\
  \n在 JDK 9 中，每个类型都属于一个模块。如果某个类型是从类路径加载的，则它属于加载它的类加载器的未命名模块。在 JDK 9 中，每个类加载器维护一个未命名模块，其成员是该类加载器从类路径加载的所有类型。从模块路径加载的类型属于定义它的模块。\n\
  \n第 3 章 ■ 创建你的第一个模块\n\n`Module` 类的实例在运行时表示一个模块。`Module` 类位于 `java.lang` 包中。使用 `Module`\
  \ 类可以在运行时了解关于模块的一切信息。JDK 9 增强了 `Class` 类。它的 `getModule()` 方法返回一个 `Module` 实例，表示该类所属的模块。`Module`\
  \ 类包含一个 `getName()` 方法，该方法以 `String` 形式返回模块名称；对于未命名模块，该方法返回 `null`。\n\nNetBeans\
  \ IDE 正在更新以支持 JDK 9 和开发模块化 Java 应用程序。在撰写本文时，NetBeans 允许你创建模块、编译它们、将它们打包到模块化 JAR\
  \ 中，并在 IDE 中运行它们。你需要为每个模块创建一个单独的 Java 项目。其最终版本将允许你在一个 Java 项目中拥有多个模块。IDE 支持添加 `module-info.java`\
  \ 文件。IDE 有一个非常酷的功能，允许你查看和保存模块图！\n\n**第 4 章**\n\n**模块依赖**\n\n在本章中，你将学习：\n\n• 如何声明模块依赖\n\
  \n• 模块的隐式可读性意味着什么以及如何声明它\n\n• 非限定导出与限定导出的区别\n\n• 声明模块的运行时可选依赖\n\n• 如何打开整个模块或其选定的包以进行深度反射\n\
  \n• JDK 9 中的可访问性类型\n\n• 跨模块拆分包\n\n• 模块声明的限制\n\n• 不同类型的模块：命名模块、未命名模块、显式模块、自动模块、普通模块和开放模块\n\
  \n• 如何使用 `javap` 工具拆解模块的定义\n\n本章中的示例代码需要经过几个步骤。本书的源代码包含了最终步骤中使用的代码。如果你想在阅读本章时每一步都看到这些示例的实际效果，你需要稍微修改源代码，使其与你正在进行的步骤保持同步。\n\
  \n声明模块依赖\n\n如果一个模块需要使用另一个模块中包含的公共类型，则第二个模块需要导出包含这些类型的包，并且第一个模块需要读取第二个模块。请注意，两个模块中的依赖声明是不对称的——类型提供模块导出包含类型的*包*，而类型使用模块读取*模块*。\n\
  \n假设你有两个模块，分别名为 `com.jdojo.address` 和 `com.jdojo.person`。`com.jdojo.address` 模块包含一个名为\
  \ `com.jdojo.address` 的包，该包包含一个名为 `Address` 的类。`com.jdojo.person` 模块想要使用 `com.jdojo.address`\
  \ 模块中的 `Address` 类。图 4-1 显示了`com.jdojo.person` 模块的模块图。让我们逐步完成开发这些模块的步骤。\n\n© Kishori\
  \ Sharan 2017\nK. Sharan, *Java 9 揭秘*, DOI 10.1007/978-1-4842-2592-9_4\n\n![](img/index-79_1.jpg)\n\
  \n第 4 章 ■ 模块依赖\n\n***图 4-1.** com.jdojo.person 模块的模块图*\n\n在 NetBeans 中，你可以创建两个名为\
  \ `com.jdojo.address` 和 `com.jdojo.person` 的 Java 项目。每个项目将包含一个与项目同名的模块的代码。清单 4-1\
  \ 和清单 4-2 包含模块声明和 `Address` 类的代码。`Address` 类是一个简单的类，包含四个字段及其 getter 和 setter 方法。我为这些字段设置了默认值，这样你就不必在所有示例中都输入它们。\n\
  \n***清单 4-1.*** com.jdojo.address 模块的模块声明\n\n// module-info.java\n\nmodule com.jdojo.address\
  \ {\n\n    // 导出 com.jdojo.address 包\n\n    exports com.jdojo.address;\n\n}\n\n\
  ***清单 4-2.*** Address 类\n\n// Address.java\n\npackage com.jdojo.address;\n\npublic\
