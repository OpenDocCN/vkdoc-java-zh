  \ 515\n\nxvii\n\n![](img/index-18_1.jpg)\n\n**关于作者**\n\n**Kishori Sharan** 在 IndraSoft,\
  \ Inc. 担任高级软件工程师主管。他获得了阿拉巴马州特洛伊州立大学计算机信息系统理学硕士学位。他是 Sun 认证的 Java 2 程序员，拥有超过 20 年的企业应用开发经验，并为使用\
  \ Java 平台的专业开发人员提供培训。\n\nxix\n\n![](img/index-19_1.jpg)\n\n**关于技术审校者**\n\n**Manuel\
  \ Jordan Elera** 是一位自学成才的开发者和研究员，他喜欢学习新技术用于自己的实验并创建新的集成。\n\nManuel 获得了 2010 年 Springy\
  \ 奖——社区冠军和 2013 年 Spring 冠军。在他不多的空闲时间里，他阅读圣经并用吉他创作音乐。Manuel 以 dr_pompeii 之名闻名。他为\
  \ Apress 技术审校了多本书籍，包括 *Pro Spring, 第 4 版* (2014), *Practical Spring LDAP* (2013),\
  \ *Pro JPA 2, 第二版* (2013) 和 *Pro Spring Security* (2013)。\n\n阅读他关于许多 Spring 技术的\
  \ 13 篇详细教程，并通过他的博客 [`www.manueljordanelera.blogspot.com/`](http://www.manueljordanelera.blogspot.com/)\
  \ 联系他。你也可以在 Twitter 上关注他 @dr_pompeii。\n\nxxi\n\n**致谢**\n\n我的妻子 Ellen 在我长时间坐在电脑前撰写本书时一直很耐心。我想感谢她在本书写作过程中给予的所有支持。\n\
  \n我想感谢我的家人和朋友们的鼓励和支持：我的母亲 Pratima Devi；我的兄长 Janki Sharan 和 Dr. Sita Sharan；我的侄子\
  \ Gaurav 和 Saurav；我的姐姐 Ratna；我的朋友 Karthikeya Venkatesan、Preethi Vasudev、Rahul Nagpal、Ravi\
  \ Datla；以及许多未在此提及的朋友。\n\n我想感谢我的同事 Forrest “Corky” Butts、Antonio Mathews 和 Yolanda\
  \ Robinson 的支持。\n\n我衷心感谢 Apress 的出色团队在本书出版过程中给予的支持。感谢编辑运营经理 Mark Powers 提供的出色支持，以及在我稿件进度缓慢时对我的格外耐心。特别感谢技术审校者\
  \ Manuel Jordan Elera，他严谨的审校方法帮助剔除了许多技术错误。\n\n最后但同样重要的是，我衷心感谢 Apress 的首席编辑 Steve\
  \ Anglin 为本书出版所采取的主动行动。\n\nxxiii\n\n**引言**\n\n本书的由来\n\nJava 社区对模块系统和 Java Shell\
  \ 最终在 JDK 9 中添加到 Java 平台感到兴奋，我也是如此。毕竟，我们等待了超过 10 年才看到这个模块系统付诸实践。之前的几个 JDK 版本都出现过模块系统的原型，但后来都被放弃了。JDK\
  \ 9 中模块系统的引入也是一波三折。它经历了多次提案和原型的迭代。我于 2016 年初开始撰写本书。我必须承认，这是一本难写的书。我不得不与 JDK 的发布日期以及\
  \ Java 团队对模块系统所做的更改赛跑。\n\n我写了一个主题，几个月后发现 JDK 9 的最终发布日期已经改变，而我写的内容已经不再有效。今天是 2016\
  \ 年 2 月的最后一天，似乎尘埃终于落定——Java 团队和 Java 社区对模块系统感到满意——你将看到本书现在的样子。JDK 9 计划于 2017 年 7\
  \ 月下旬发布。在撰写本文时，JDK 9 的功能已经完备。你不太可能看到本书中介绍的许多内容无法工作的情况。然而，就软件发布而言，五个月是一段很长的时间，所以如果你在阅读本书时发现某段代码无法工作，需要稍作调整才能运行，请不要感到惊讶。\n\
  \n起初，本书计划只有 140 页。随着写作的深入，我认为写一本如此简短的书来介绍 Java 平台最大的新增功能之一，是对读者的不负责任。我感谢我的出版商，从未抱怨我为本书增加了数百页。我专门用了九章（第\
  \ [2](http://dx.doi.org/10.1007/978-1-4842-2592-9_2) 章到第 [10](http://dx.doi.org/10.1007/978-1-4842-2592-9_10)\
  \ 章）来描述新的模块系统。第 [11](http://dx.doi.org/10.1007/978-1-4842-2592-9_11) 章以无与伦比的细节介绍了\
  \ Java Shell (JShell)。\n\n我花了无数小时研究这个主题。我写的都是正在开发中的主题。我在互联网或书籍中找不到任何资料来学习这些主题。最大的挑战之一是开发阶段快速变化的\
  \ JDK 实现。我的主要研究来源是 Java 源代码、Java 增强提案 (JEP) 和 Java 规范请求 (JSR)。我还花了不少时间阅读 Java 源代码，以了解更多关于\
  \ JDK 9 中一些新主题的内容。玩转 Java 程序总是很有趣，有时一玩就是几个小时，然后把它们添加到书中。有时，看到代码一周前还能工作，现在却不行了，这令人沮丧。订阅所有\
  \ JDK 9 项目的邮件列表帮助我与 JDK 保持同步。\n\n\n\n开发团队。有几次我不得不遍历某个 JDK 主题下的所有 bug，以确认某个 bug 尚未修复。\n\
  \n结局好，一切都好。最终，我很高兴能够将所有对学习 Java SE 9 感兴趣的读者来说重要的内容都包含在内。希望你喜欢阅读本书并从中受益。\n\nxxv\n\
  \n■ 引言\n\n本书结构\n\n本书包含 20 章。第 [1 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_1)介绍\
  \ JDK 9 以及如何使用本书及其源代码。第 [2 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_2)到[第\
  \ 10 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_10)涵盖模块系统。这些章节旨在按顺序阅读。\n\n第\
  \ [11 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_11)详细介绍了 Java Shell (JShell)。大部分情况下，你可以不阅读前\
  \ 10 章而直接阅读第 [11 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_11)。但是，为了全面理解，我建议你按顺序阅读。\n\
  \n你可以按任意顺序阅读第 [12 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_12)到第 [20 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_20)。它们涵盖独立的主题。最后一章是一个综合章节。如果某个主题太小，不足以单独成章，我就把它塞进这最后一章。\n\
  \n目标读者\n\n本书专为熟悉 Java SE 8 的经验丰富的 Java 开发人员设计。本书部分内容使用了 Java SE 8 中引入的 Streams API、Time\
  \ API 和 Lambda 表达式。如果你熟悉 Java SE 7 或更早版本，阅读本书第 [1 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_1)到[第\
  \ 11 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_11)肯定会有所收获。这些章节教你模块系统和 Java\
  \ Shell。\n\n建议读者在使用本书时，尽可能多地查阅 Java 编程语言的 API 文档。Java API 文档中包含了 Java 类库中所有可用内容的完整列表。你可以从\
  \ Oracle 官方网站 [www.oracle.com](http://www.oracle.com/) 下载（或查看）Java API 文档。在阅读本书时，你需要自己动手编写\
  \ Java 程序进行练习。你也可以通过修改本书提供的程序来练习。如果只是阅读本书而不练习编写自己的程序，对你的学习过程帮助不大。\n\n记住“熟能生巧”，学习如何使用\
  \ JDK 9 进行编程也是如此。\n\n源代码与勘误\n\n本书的源代码和勘误可以通过 [`www.apress.com/us/book/9781484225912`](http://www.apress.com/us/book/9781484225912)\
  \ 访问。\n\n问题与评论\n\n请将所有问题和评论直接发送给作者：ksharan@jdojo.com。\n\nxxvi\n\n**第 1 章**\n\n**引言**\n\
  \n在本章中，你将学习：\n\n• JDK 9 包含哪些内容\n\n• 如何阅读本书\n\n• 使用本书示例的系统要求\n\n• 如何安装 NetBeans\n\
  \n• 如何下载和使用本书示例附带的源代码\n\nJDK 9 简介\n\nJDK 是 Java 开发工具包的第九个主要版本，计划于 2017 年 7 月下旬发布。\n\
  \n它带来了几个令人兴奋的新特性。本书涵盖了那些对 Java 应用程序开发人员日常编程生活有用的特性。你可以在 [`openjdk.java.net/projects/jdk9/`](http://openjdk.java.net/projects/jdk9/)\
  \ 找到所有特性的完整列表。\n\nJDK 9 最重要、最令人兴奋的特性之一是*模块系统*，它是在代号为 *Jigsaw* 的项目下开发的。JDK 设计者十多年来一直试图将模块系统引入\
  \ Java 平台。它曾计划成为之前几个 JDK 版本的一部分，但后来被放弃了。Jigsaw 也多次推迟了 JDK 9 的发布。Jigsaw 现在终于发布了，你将能够看到它的实际应用。\n\
  \nJigsaw 有什么困难，以至于花了这么多年才完成？Jigsaw 的主要目标是让 Java 开发人员能够以称为*模块*的软件组件来开发应用程序。一个模块可以导出其\
  \ API 供公共使用，并封装其内部实现。一个模块还可以声明对其他模块的依赖关系，这些依赖关系可以在启动时进行验证，从而避免与缺少类型相关的运行时意外。JDK\
  \ 本身也被分解为一组相互交互的模块。这提供了一个可扩展的运行时。如果你的应用程序只使用 JDK 的一个子集，那么你现在可以创建一个运行时映像，其中包含你的应用程序中使用的\
  \ JDK 模块和你的应用程序模块。模块系统的所有这些特性看起来都很正常。一直困扰 JDK 设计者的主要问题是模块系统的向后兼容性、迁移和适配路径。Java 已经存在了\
  \ 20 多年。任何大的特性，包括模块系统，都必须易于采用。根据 Java 社区的反馈，经过多次重新设计和改进的迭代，它终于来了！我用了九章（第 [2 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_2)到[第\
  \ 10 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_10)），占本书篇幅的 40% 以上，来描述模块系统。\n\
  \nJDK 9 的另一个重要补充是 JShell，它是 Java 的 REPL（读取-求值-打印-循环）。JShell 是一个命令行工具和一个 API，它允许你执行一段代码片段并立即获得反馈。\n\
  \n在 JShell 之前，你必须编写一个完整的程序，编译它，然后运行它才能获得反馈。JShell 是一个你将在日常开发中使用的工具，你可能会想知道没有它你是怎么用\
  \ Java 编程这么多年的。JShell 对初学者至关重要，可以帮助他们快速学习 Java 语言，而无需了解程序结构的细节，例如模块和包。我用第 [11 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_11)来讨论\
  \ JShell。\n\n© Kishori Sharan 2017\nK. Sharan, *Java 9 揭密*, DOI 10.1007/978-1-4842-2592-9_1\n\
  \n第 1 章 ■ 引言\n\nJDK 9 还有其他几个补充，将使你的开发人员生活更轻松。仅举几例，它们是 Reactive Streams API、集合工厂方法、孵化中的\
  \ HTTP/2 客户端 API、堆栈遍历 API、平台日志 API 和统一的 JVM 日志记录。我在本书中广泛讨论了这些主题。\n\n如何阅读本书\n\n本书共\
  \ 20 章。第 [2 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_2)到[第 10 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_10)只涵盖一个主题，即模块系统。它们旨在按顺序阅读。诚然，你可能可以在对模块系统一无所知的情况下将现有应用程序迁移到\
  \ JDK 9。但是，如果你想利用 JDK 9 提供的优势，你必须学习模块系统并开始使用它来开发新的 Java 应用程序，并将遗留应用程序迁移到 JDK 9。第\
  \ [11 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_11)到[第 20 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_20)可以按任意顺序阅读。\n\
  \n\n\n[第 2 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_2)“模块系统”简要介绍了使用 JDK 8\
  \ 及更早版本的 Java 开发者所面临的问题。本章介绍了模块系统，并解释了它如何解决 API 封装、配置和可扩展性问题。本章引入了许多与模块系统相关的新术语。如果你不能完全理解它们，请继续阅读。后续章节和示例将通过更详细的解释让你理解这些概念。\n\
  \n[第 3 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_3)“创建你的第一个模块”让你一窥模块的实际应用。它逐步展示了如何声明一个模块、在模块中编写代码、编译模块以及运行作为模块一部分的类。本章不会深入探讨模块声明的细节。\n\
  \n[第 4 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_4)“模块依赖”是一章关于模块系统的密集实践章节。它以前两章为基础，更深入地探讨了如何声明模块的依赖关系以及导出模块的包。它展示了如何声明不同类型的模块，如何将模块化代码和非模块化代码混合到\
  \ Java 应用程序中，以及模块系统提供的其他几个选项。对于任何计划使用 JDK 9 的严肃 Java 开发者来说，这是一章必须理解的章节。\n\n[第 5\
  \ 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_5)“实现服务”展示了如何利用模块系统的简单指令在 JDK 9\
  \ 中实现服务。本章还解释了在 JDK 9 之前服务是如何实现的。\n\n[第 6 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_6)“打包模块”解释了可用于打包模块的不同格式，以及何时应使用一种格式而非其他格式。直到\
  \ JDK 8，你只有一种打包 Java 应用程序的方式，即使用 JAR 文件。本章展示了如何使用 JMOD 格式打包你的模块。\n\n[第 7 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_7)“创建自定义运行时镜像”解释了如何使用\
  \ jlink 工具创建采用名为 JIMAGE 的内部格式的自定义运行时镜像。\n\n[第 8 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_8)“JDK\
  \ 9 中的破坏性变更”解释了如果你迁移到 JDK 9，JDK 9 中可能破坏现有应用程序的变更。本章还建议了如何修复损坏的代码，并提到了 JDK 9 提供的替代方案（如果有的话）。\n\
  \n[第 9 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_9)“打破模块封装”解释了如何可能打破模块系统的主要前提——封装。JDK\
  \ 9 提供了几个非标准的命令行选项，允许你侵入原本被封装且不可访问的模块代码。如果你正在迁移那些曾经可以访问 JDK 内部 API 或第三方库的遗留应用程序，但在\
  \ JDK 9 中这些内部 API 已被封装在模块中，你可能需要这样做。\n\n[第 10 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_10)“模块\
  \ API”解释了如何使用模块 API 以编程方式访问模块系统。凡是能通过模块声明和命令行选项完成的操作，也都可以通过模块 API 完成。\n\n[第 11 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_11)“Java\
  \ Shell”详细介绍了 JShell 工具和 JShell API。它涵盖了在 jshell 工具中打印消息、声明类以及使用现有模块。它描述了如何配置 jshell\
  \ 工具以及如何使用 JShell API 执行代码片段。\n\n[第 12 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_12)“进程\
