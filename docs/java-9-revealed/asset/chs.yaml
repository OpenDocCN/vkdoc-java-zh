  \ TimeUtil...\n\nLocal Date: 2017-01-27\n\n我已经展示了在 JDK 8 和 JDK 9 上运行 `Main` 类时你将得到的输出。然而，此示例的目的并非单独运行这两个类，而是将它们全部打包到一个\
  \ MRJAR 中，并从该 MRJAR 运行它们，我马上就会向你展示这一点。\n\n`jar` 工具在 JDK 9 中得到了增强，以支持创建 MRJAR。在 JDK\
  \ 9 中，`jar` 工具接受一个名为 `--release` 的新选项。其语法如下：\n\njar <options> --release N <other-options>\n\
  \n这里，`N` 是一个 JDK 主版本号，例如 JDK 9 对应 `9`。`N` 的值必须大于或等于 `9`。所有跟在 `--release N` 选项之后的文件都会被添加到\
  \ MRJAR 中的 `META-INF/versions/N` 目录下。\n\n以下命令创建一个名为 `com.jdojo.mrjar.jar` 的 MRJAR，并将其放置在\
  \ `C:\\Java9Revealed\\mrjars` 目录（该目录已存在）中：\n\nC:\\Java9Revealed>jar --create --file\
  \ mrjars\\com.jdojo.mrjar.jar\n\n-C com.jdojo.mrjar.jdk8\\build\\classes .\n\n**--release\
  \ 9** -C com.jdojo.mrjar.jdk9\\build\\classes .\n\n请注意此命令中 `--release 9` 选项的使用。来自\
  \ `com.jdojo.mrjar.jdk9\\build\\classes` 目录的所有文件将被添加到 MRJAR 中的 `META-INF/versions/9`\
  \ 目录。来自 `com.jdojo.mrjar.jdk8\\build\\classes` 目录的所有文件将被添加到 MRJAR 的根目录。MRJAR 中的条目将如下所示：\n\
  \n- jar-root\n\n- com\n\n- jdojo\n\n- mrjar\n\n- Main.class\n\n- TimeUtil.class\n\
