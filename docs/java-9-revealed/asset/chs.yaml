  ■ **提示** 设置启动代码片段/命令后，需要重新启动 `jshell`、执行 `/reset` 或执行 `/reload` 命令才能生效。不要在启动文件中包含\
  \ `/reset` 或 `/reload` 命令。这会导致启动文件加载时出现无限循环。\n\n第 11 章 ■ Java Shell\n\n有三个预定义的脚本，其名称如下：\n\
