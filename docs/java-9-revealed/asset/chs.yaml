  \n...\n\n你可以使用特定命令作为 `/help` 命令的参数来获取有关该命令的信息。以下命令打印有关 `/help` 命令本身的信息：\n\njshell>\
  \ /help /help\n\n|\n\n| /help\n\n|\n\n| 显示有关 jshell 的信息。\n\n| /help\n\n| 列出 jshell\
  \ 命令和帮助主题。\n\n|\n\n| /help <命令>\n\n| 显示有关指定命令的信息。必须包含斜杠。\n\n| 只需要命令的前几个字母——如果多个命令匹配，每个都会显示。示例:\
  \ /help /li\n\n|\n\n| /help <主题>\n\n| 显示有关指定帮助主题的信息。示例: /help intro\n\n以下命令将显示有关\
