  \n^\n\n8 个警告\n\n已弃用 API 的静态分析\n\n\n\n请记住，弃用警告是编译时警告。如果你的已部署应用程序的编译代码开始使用一个通常被弃用的\
  \ API，或者因为一个曾经有效的 API 已被最终弃用并移除而生成运行时错误，你将不会收到任何警告。在 JDK 9 之前，当你升级 JDK 或其他库/框架时，必须重新编译源代码才能看到弃用警告。JDK\
  \ 9 通过提供一个名为 `jdeprscan` 的*静态*分析工具改善了这种情况，该工具可用于扫描编译后的代码，以查看正在使用的已弃用 API 列表。目前，该工具仅报告已弃用的\
  \ JDK API 的使用情况。如果你的编译代码使用了来自其他库（例如 Spring 或 Hibernate）或你自己的库中的弃用 API，此工具将不会报告这些使用情况。\n\
  \n`jdeprscan` 工具位于 `JDK_HOME\\bin` 目录中。使用该工具的一般语法如下：`jdeprscan [options] {dir|jar|class}`\n\
  \n这里，`[options]` 是零个或多个选项的列表。你可以指定一个由空格分隔的目录、JAR 文件或完全限定类名列表作为要扫描的参数。可用的选项如下：\n\n\
  • `-l, --list`\n\n• `--class-path <CLASSPATH>`\n\n• `--for-removal`\n\n• `--release\
  \ <6|7|8|9>`\n\n• `-v, --verbose`\n\n• `--version`\n\n• `--full-version`\n\n• `-h,\
  \ --help`\n\n第 15 章 ■ 增强的弃用机制\n\n`--list` 选项列出 Java SE 中已弃用的 API 集合。使用此选项时，不应指定任何用于定位编译类位置的参数。\n\
  \n`--class-path` 指定在扫描期间用于查找依赖类的类路径。\n\n`--for-removal` 选项将扫描或列表限制为仅那些已被标记为“待移除”的弃用\
  \ API。它只能与值为 9 或更高版本的 release 参数一起使用，因为在 JDK 9 之前，`@Deprecated` 注解类型不包含 `forRemoval`\
  \ 元素。\n\n`--release` 选项指定在扫描期间提供弃用 API 集合的 Java SE 版本。例如，要列出 JDK 6 中所有已弃用的 API，你可以像这样使用该工具：\n\
  \n`jdeprscan --list --release 6`\n\n`--verbose` 选项在扫描过程中打印附加消息。\n\n`--version` 和\
