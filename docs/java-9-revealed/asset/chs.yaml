  vtables, workgang, jfr, system, parser, bytecode, setting, event\n\n如果你对记录垃圾回收和启动的消息感兴趣，可以使用\
  \ `gc` 和 `startuptime` 标签与 `-Xlog` 选项一起使用。列表中的大多数标签名称晦涩难懂，实际上，它们是为从事 JVM 开发的开发人员准备的，而不是为应用程序开发人员准备的。我找不到所有这些标签的描述。链接\
  \ [`bugs.openjdk.java.net/browse/JDK-8146948`](https://bugs.openjdk.java.net/browse/JDK-8146948)\
  \ 包含一个请求为所有这些标签提供描述的错误报告。该错误已标记为已修复，但我找不到一个可以显示标签描述的选项。\n\n■ **提示** 你可以将名为 `all`\
  \ 的特殊标签与 `-Xlog` 选项一起使用，它告诉 JVM 记录所有消息，无论它们关联的标签是什么。标签的默认值是 `all`。\n\n第 19 章 ■ 平台与\
  \ JVM 日志记录\n\n## 消息级别\n\n级别是日志记录的严重级别，它根据消息的严重程度确定要记录的消息。\n\n级别按严重程度递增的顺序具有以下值：`trace`、`debug`、`info`、`warning`\
  \ 和 `error`。如果你启用了严重级别 `S` 的日志记录，则所有严重级别为 `S` 及以上的消息都将被记录。例如，如果你在 `info` 级别启用日志记录，则所有\
  \ `info`、`warning` 和 `error` 级别的消息都将被记录。\n\n■ **提示** 你可以将名为 `off` 的特殊严重级别与 `-Xlog`\
  \ 选项一起使用，以禁用所有级别的日志记录。级别的默认值是 `info`。\n\n## 消息装饰\n\n\n\nJVM 消息在记录之前可以附加额外的信息片段。这些额外的信息片段被称为*装饰器*，它们会被添加到消息的开头。每个装饰器都用方括号——[\
  \ 和 ]——括起来。表 19-2 列出了所有装饰器及其长名称和短名称。你可以在 `-Xlog` 选项中使用长名称或短名称。\n\n***表 19-2.** 装饰器及其长名称和短名称*\n\
  \n**长名称**\n\n**短名称**\n\n**描述**\n\nhostname\n\nhn\n\n计算机名称\n\nlevel\n\nl\n\n消息的严重级别\n\
  \npid\n\np\n\n进程标识符\n\ntags\n\ntg\n\n与消息关联的所有标签\n\ntid\n\nti\n\n线程标识符\n\ntime\n\n\
  t\n\nISO-8601 格式的当前时间和日期\n\n（例如，2017-02-10T18:42:58.418+0000）\n\ntimemillis\n\n\
  tm\n\n以数字表示的当前时间（毫秒），其值\n\n与 `System.currentTimeMillis()` 生成的值相同\n\ntimenanos\n\n\
  tn\n\n以数字表示的当前时间（纳秒），其值\n\n与 `System.nanoTime()` 生成的值相同\n\nuptime\n\nu\n\n自 JVM\
  \ 启动以来的时间，以秒和\n\n毫秒表示（例如，9.219s）\n\nuptimemillis\n\num\n\n自 JVM 启动以来的毫秒数\n\nuptimenanos\n\
  \nun\n\n自 JVM 启动以来的纳秒数\n\nutctime\n\nutc\n\nUTC 格式的当前时间和日期（例如，2017-02-\n\n10T12:42:58.418-0600）\n\
  \n■ **提示** 你可以使用名为 `none` 的特殊装饰器与 `-Xlog` 选项一起使用来关闭装饰器。装饰器的默认值是 `uptime,level,tags`，按此顺序排列。\n\
  \n第 19 章 ■ 平台与 JVM 日志记录\n\n消息输出目标\n\n你可以指定三个目标之一来发送 JVM 日志：\n\n• `stdout`\n\n• `stderr`\n\
  \n• `file=<文件名>`\n\n使用 `stdout` 和 `stderr` 值分别将 JVM 日志打印到标准输出和标准错误。默认的输出目标是 `stdout`。\n\
  \n使用 `file` 值来指定一个文本文件名，将日志发送到文本文件。你可以在文件名中使用 `%p` 和 `%t`，它们会分别扩展为 JVM 的 PID 和启动时间戳。例如，如果你使用\
  \ `-Xlog` 选项将 `file=jvm%p_%t.log` 指定为输出目标，那么每次运行 JVM 时，消息都会被记录到一个文件名类似如下的文件中：\n\n\
  • `jvm2348_2017-02-10_13-26-05.log`\n\n• `jvm7292_2017-02-10_13-26-06.log`\n\n每次启动\
  \ JVM 时，都会创建一个类似列表中所示的日志文件。这里，2348 和 7292 是两次运行时 JVM 的 PID。\n\n■ **提示** 如果输出目标不是\
  \ `stdout` 和 `stderr`，则表明输出目标是文本文件。你可以直接使用 `jvm.log` 作为输出目标，而不必使用 `file=jvm.log`。\n\
  \n你可以为将输出发送到文本文件指定额外的选项：\n\n• `filecount=<文件数量>`\n\n• `filesize=<文件大小>`\n\n这些选项用于控制每个日志文件的最大大小和日志文件的最大数量。考虑以下选项：\n\
  \n`file=jvm.log::filesize=1M,filecount=3`\n\n注意使用了两个连续的冒号 (::)。我将在下一节解释它们。此选项使用\
  \ `jvm.log` 作为日志文件。日志文件的最大大小为 1M（1 MB），日志文件的最大数量为 3。\n\n它将创建四个日志文件：`jvm.log`、`jvm.log.0`、`jvm.log.1`\
  \ 和 `jvm.log.2`。当前消息记录到 `jvm.log` 文件中，当当前文件中的记录消息超过 1MB 时，其他三个文件会进行轮转。你可以使用 `K`\
  \ 表示千字节，`M` 表示兆字节来指定文件大小。如果你指定了文件大小但没有包含 `K` 或 `M` 后缀，则该选项会假定单位为字节。\n\n`-Xlog` 语法\n\
  \n以下是使用 `-Xlog` 选项的语法：\n\n`-Xlog[:<内容>][:[<输出>][:[<装饰器>][:<输出选项>]]]`\n\n与 `-Xlog`\
  \ 一起使用的选项由冒号 (`:`) 分隔。所有选项都是可选的。如果 `-Xlog` 中的前面部分缺失，你必须为该部分使用一个冒号。例如，`-Xlog::stderr`\
  \ 表示所有部分都使用默认值，除了 `<输出>` 部分被指定为 `stderr`。\n\n第 19 章 ■ 平台与 JVM 日志记录\n\n`-Xlog` 最简单的用法如下，它会将所有\
  \ JVM 消息记录到标准输出：\n`java -Xlog --module-path com.jdojo.intro\\dist --module com.jdojo.intro/com.jdojo.intro.Welcome`\n\
  \n有两个特殊的 `-Xlog` 选项：`help` 和 `disable`，可以分别使用 `-Xlog:help` 来打印 `-Xlog` 的帮助信息，以及\
  \ `-Xlog:disable` 来禁用所有 JVM 日志记录。你可能会认为，与其使用 `-Xlog:disable`，不如根本不使用 `-Xlog` 选项。你是对的。然而，`disable`\
  \ 选项的存在另有原因。`-Xlog` 选项可以在同一条命令中多次使用。如果多次出现的 `-Xlog` 包含相同类型的设置，则最后一次出现的 `-Xlog` 中的设置生效。\n\
  \n因此，你可以先指定 `-Xlog:disable` 作为第一个选项，然后再指定另一个 `-Xlog` 来开启特定类型的日志记录。这样，你首先关闭所有默认设置，然后指定你感兴趣的选项。\n\
  \n`<内容>` 部分指定了要记录的消息的标签和严重级别。其语法如下：\n\n`tag1[+tag2...][*][=level][,...]`\n\n`<内容>`\
  \ 部分中的 `+` 表示逻辑与。例如，`gc+exit` 表示记录所有标签集恰好包含两个标签——`gc` 和 `exit` 的消息。标签名称末尾的 `*` 用作通配符，表示“至少”。例如，`gc*`\
  \ 表示记录所有标签集至少包含 `gc` 的消息，这将记录标签集为 `[gc]`、`[gc,exit]`、`[gc,remset,exit]` 等的消息。如果你使用\
  \ `gc+exit*`，则表示记录所有标签集至少包含 `gc` 和 `exit` 标签的消息，这将记录标签集为 `[gc,exit]`、`[gc,remset,exit]`\
  \ 等的消息。你可以为每个要记录的标签名称指定严重级别。例如，`gc=trace` 记录所有标签集仅包含 `gc` 且严重级别为 `trace` 或更高的消息。你可以指定多个条件，用逗号分隔。例如，`gc=trace,heap=error`\
  \ 将记录所有标签集为 `gc` 且级别为 `trace` 或更高，或者标签集为 `heap` 且级别为 `error` 的消息。\n\n我将向你展示使用不同条件记录\
