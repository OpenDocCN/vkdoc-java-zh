  \ String city = \"Jacksonville\";\n\n    private String state = \"FL\";\n\n    private\
  \ String zip = \"32256\";\n\n    public Address() {\n\n    }\n\n    public Address(String\
  \ line1, String line2, String city,\n\n                   String state, String zip)\
  \ {\n\n        this.line1 = line1;\n\n        this.city = city;\n\n        this.state\
  \ = state;\n\n        this.zip = zip;\n\n    }\n\n第 4 章 ■ 模块依赖\n\n    public String\
  \ getLine1() {\n\n        return line1;\n\n    }\n\n    public void setLine1(String\
  \ line1) {\n\n        this.line1 = line1;\n\n    }\n\n    public String getCity()\
  \ {\n\n        return city;\n\n    }\n\n    public void setCity(String city) {\n\
  \n        this.city = city;\n\n    }\n\n    public String getState() {\n\n     \
  \   return state;\n\n    }\n\n    public void setState(String state) {\n\n     \
  \   this.state = state;\n\n    }\n\n    public String getZip() {\n\n        return\
  \ zip;\n\n    }\n\n    public void setZip(String zip) {\n\n        this.zip = zip;\n\
  \n    }\n\n    @Override\n\n    public String toString() {\n\n        return \"\
  [Line1:\" + line1 + \", State:\" + state +\n\n               \", City:\" + city\
  \ + \", ZIP:\" + zip + \"]\";\n\n    }\n\n}\n\n`exports` 语句用于将包导出到所有其他模块或某些*命名模块*。导出包中的所有公共类型在编译时和运行时都是可访问的。在运行时，你可以使用反射仅访问公共类型的公共成员。即使在这些成员上使用\
  \ `setAccessible(true)` 方法，公共类型的非公共成员也无法通过反射访问。`exports` 语句的一般语法如下：\n\nexports <package>;\n\
  \n该语句将 `<package>` 中的所有公共类型导出到所有其他模块。也就是说，任何读取此模块的模块都将能够使用 `<package>` 中的所有公共类型。\n\
  \n`com.jdojo.address` 模块导出了 `com.jdojo.address` 包，因此 `Address` 类（它是公共的且位于 `com.jdojo.address`\
  \ 包中）可以被其他模块使用。在本示例中，你将在 `com.jdojo.person` 模块中使用 `Address` 类。\n\n第 4 章 ■ 模块依赖\n\
  \n\n\n清单 4-3 和清单 4-4 包含了 `com.jdojo.person` 模块的模块声明以及 `Person` 类的代码。\n\n***清单 4-3.***\
  \ `com.jdojo.person` 模块的模块声明\n\n// module-info.java\n\nmodule com.jdojo.person {\n\
  \n// 读取 com.jdojo.address 模块\n\nrequires com.jdojo.address;\n\n// 导出 com.jdojo.person\
  \ 包\n\nexports com.jdojo.person;\n\n}\n\n***清单 4-4.*** `Person` 类\n\n// Person.java\n\
  \npackage com.jdojo.person;\n\nimport com.jdojo.address.Address;\n\npublic class\
  \ Person {\n\nprivate long personId;\n\nprivate String firstName;\n\nprivate String\
  \ lastName;\n\nprivate Address address = new Address();\n\npublic Person(long personId,\
  \ String firstName, String lastName) {\n\nthis.personId = personId;\n\nthis.firstName\
  \ = firstName;\n\nthis.lastName = lastName;\n\n}\n\npublic long getPersonId() {\n\
  \nreturn personId;\n\n}\n\npublic void setPersonId(long personId) {\n\nthis.personId\
  \ = personId;\n\n}\n\npublic String getFirstName() {\n\nreturn firstName;\n\n}\n\
  \npublic void setFirstName(String firstName) {\n\nthis.firstName = firstName;\n\n\
  }\n\npublic String getLastName() {\n\nreturn lastName;\n\n}\n\n第 4 章 ■ 模块依赖\n\n\
  public void setLastName(String lastName) {\n\nthis.lastName = lastName;\n\n}\n\n\
  public Address getAddress() {\n\nreturn address;\n\n}\n\npublic void setAddress(Address\
  \ address) {\n\nthis.address = address;\n\n}\n\n@Override\n\npublic String toString()\
  \ {\n\nreturn \"[Person Id:\" + personId + \", First Name:\" + firstName +\n\n\"\
  , Last Name:\" + lastName + \", Address:\" + address + \"]\";\n\n}\n\n}\n\n`Person`\
  \ 类位于 `com.jdojo.person` 模块中，它使用了一个 `Address` 类型的字段，而 `Address` 类型位于 `com.jdojo.address`\
  \ 模块中。这意味着 `com.jdojo.person` 模块读取了 `com.jdojo.address` 模块。这一点通过 `com.jdojo.person`\
  \ 模块声明中的 `requires` 语句来指明：\n\n// 读取 com.jdojo.address 模块\n\nrequires com.jdojo.address;\n\
  \n`requires` 语句用于指定一个模块对另一个模块的依赖。如果一个模块读取了另一个模块，那么第一个模块需要在其声明中包含一条 `requires` 语句。`requires`\
  \ 语句的通用语法如下：\n\nrequires [transitive] [static] <模块名>;\n\n在这里，`<模块名>` 是当前模块所读取的模块的名称。`transitive`\
  \ 和 `static` 修饰符都是可选的。如果存在 `static` 修饰符，则 `<模块名>` 模块在编译时是必需的，但在运行时是可选的。`transitive`\
  \ 修饰符的存在意味着，读取当前模块的模块会隐式地读取 `<模块名>` 模块。我稍后会介绍一个在 `requires` 语句中使用 `transitive` 修饰符的示例。\n\
  \n每个模块都会隐式地读取 `java.base` 模块。如果模块声明中尚未读取 `java.base` 模块，编译器会添加一条 `requires` 语句来读取它。以下两个名为\
  \ `com.jdojo.common` 的模块声明是等效的：\n\n// 声明 #1\n\nmodule com.jdojo.common {\n\n// 编译器将添加对\
  \ java.base 模块的读取\n\n}\n\n// 声明 #2\n\nmodule com.jdojo.common {\n\n// 显式添加对 java.base\
  \ 模块的读取\n\nrequires java.base;\n\n}\n\n![](img/index-83_1.jpg)\n\n第 4 章 ■ 模块依赖\n\
  \n`com.jdojo.person` 模块的声明中包含一条 `requires` 语句，这意味着 `com.jdojo.address` 模块在编译时和运行时都是必需的。当你编译\
  \ `com.jdojo.person` 模块时，必须将 `com.jdojo.address` 模块包含在模块路径中。如果你使用的是 NetBeans IDE，可以将一个\
  \ NetBeans 项目或一个模块化 JAR 添加到模块路径中。在 NetBeans 中右键单击 `com.jdojo.person` 项目，然后选择“属性”。在“类别”列表中，选择“库”。\n\
  \n选择“编译”选项卡，点击“模块路径”行上的 `+` 号，然后从菜单中选择“添加项目”，如图 4-2 所示。此时会显示“添加项目”对话框，如图 4-3 所示。\n\
