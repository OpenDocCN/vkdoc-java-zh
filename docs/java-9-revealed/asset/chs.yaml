  第 18 章 ■ Streams API 更新\n\n总结\n\nJDK 9 为 Streams API 添加了一些便捷方法，使流处理更简单，并能够使用收集器编写复杂查询。\n\
  \nStream 接口有四个新方法：`dropWhile()`、`takeWhile()`、`ofNullable()` 和 `iterate()`。\n\n\
  对于有序流，`dropWhile()` 方法返回流中的元素，从开头丢弃指定谓词为 true 的元素。对于无序流，`dropWhile()` 方法的行为是非确定性的。它可能选择丢弃任何匹配谓词的子集元素。当前实现从开头丢弃匹配元素，直到遇到不匹配的元素。`takeWhile()`\
  \ 方法的工作方式与 `dropWhile()` 方法相同，区别在于它返回流开头匹配的元素并丢弃其余部分。`ofNullable(T t)` 方法返回一个包含指定元素的单元素流（如果该元素非空）。如果指定元素为\
  \ null，则返回一个空流。新的 `iterate(T seed, Predicate<? super T> hasNext, UnaryOperator<T>\
  \ next)` 方法允许你使用初始种子值并迭代应用指定的 next 函数来创建一个顺序（可能是无限）流。当指定的 `hasNext` 谓词返回 false 时，迭代停止。\n\
  \n`Collectors` 类在 JDK 9 中有两个新方法：`filtering()` 和 `flatMapping()`。`filtering()` 方法返回一个收集器，该收集器在收集元素之前应用过滤器。如果指定谓词对某个元素返回\
  \ true，则收集该元素；否则，不收集该元素。`flatMapping()` 方法返回一个收集器，该收集器在收集元素之前应用扁平映射函数。指定的扁平映射函数应用于流中的每个元素，并且从扁平映射器返回的流元素会被累积。\n\
  \n**第 19 章**\n\n**平台和 JVM 日志记录**\n\n在本章中，你将学习：\n\n• 新的平台日志记录 API\n\n• JVM 日志记录的命令行选项\n\
  \nJDK 9 对平台类（JDK 类）和 JVM 组件的日志记录系统进行了全面改革。有一个新的 API，允许你指定一个你选择的日志记录框架作为平台类日志消息的后端。还有一个新的命令行选项，允许你访问所有\
  \ JVM 组件的消息。在本章中，我将详细描述这两个日志记录工具。\n\n平台日志记录 API\n\nJava SE 9 添加了一个平台日志记录 API，可用于指定一个日志记录器，例如\
  \ Log4j、SLF4J 或自定义日志记录器，Java 平台类（JDK 中的类）可以使用它来记录消息。关于此 API，有几点需要注意。该 API 旨在供 JDK\
  \ 中的类使用，而不是应用程序类。因此，你不应使用此 API 来记录应用程序消息。你需要使用你的日志记录框架（如 Log4j）来记录应用程序消息。该 API 不允许你以编程方式配置日志记录器。该\
  \ API 包含以下内容：\n\n• 一个服务接口 `java.lang.System.LoggerFinder`，它是一个抽象静态类\n\n• 一个接口 `java.lang.System.Logger`，它提供了日志记录\
  \ API\n\n• `java.lang.System` 类中的一个重载方法 `getLogger()`，它返回一个 `System.Logger`\n\n\
  配置平台日志记录器的细节取决于你想要使用的日志记录器。例如，如果你使用 Log4j，则需要单独配置 Log4j 框架并配置平台日志记录器。\n\n配置平台日志记录器需要以下步骤：\n\
  \n• 创建一个实现 `System.Logger` 接口的类。\n\n• 为 `System.LoggerFinder` 服务接口创建一个实现。\n\n• 在模块声明中指定该实现。\n\
  \n我将配置 Log4j 2.0 作为平台日志记录器。配置和使用 Log4j 是一个庞大的主题。我只介绍配置平台日志记录器所需的关于 Log4j 的细节。\n\n\
  © Kishori Sharan 2017\nK. Sharan, *Java 9 Revealed*, DOI 10.1007/978-1-4842-2592-9_19\n\
  \n第 19 章 ■ 平台和 JVM 日志记录\n\n■ **提示** 如果你没有配置自定义平台日志记录器，JDK 会使用 `System.LoggerFinder`\
  \ 的默认实现，当 `java.logging` 模块存在时，该实现使用 `java.util.logging` 作为后端框架。它返回一个日志记录器实例，将日志消息路由到\
  \ `java.util.logging.Logger`。否则，如果 `java.logging` 不存在，默认实现会返回一个简单的日志记录器实例，将 INFO\
  \ 级别及以上的日志消息路由到控制台（`System.err`）。\n\n设置 Log4j 库\n\n你需要下载 Log4j 2.0 库才能使本节中的示例正常工作。Log4j\
  \ 2.0 框架所需的 JAR 文件位于本书源代码的 `Java9Reaveled/extlib` 目录中。你也可以从 [`logging.apache.org/log4j/2.0/download.html`](https://logging.apache.org/log4j/2.0/download.html)\
  \ 下载 Log4J 2.0 库。解压下载的文件，并将以下两个 JAR 文件复制到 `C:\\Java8Revealed\\extlib` 目录。如果你将它们复制到其他目录，请确保在讨论中替换路径。\n\
  \n• `log4j-api-2.8.jar`\n\n• `log4j-core-2.8.jar`\n\n如果你下载了不同版本的 Log4j，这些 JAR 文件名中的版本号（本例中为\
  \ 2.8）可能会不同。在此示例中，你将把这些 JAR 文件用作自动模块。自动模块名称将从 JAR 文件名派生，它们将是 `log4j.api` 和 `log4j.core`。有关自动模块的更多详细信息，请参阅第\
  \ [4 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_4)。\n\n设置 NetBeans 项目\n\n我在\
  \ NetBeans 中创建了一个名为 `com.jdojo.logger` 的 Java 项目。上一节中讨论的两个 Log4j JAR 文件已添加到项目的模块路径中，如图\
  \ 19-1 所示。要在 NetBeans 中将这些 JAR 文件添加到模块路径，你需要从展开的菜单中选择“添加 JAR/文件夹”选项以添加到模块路径。\n\n\
  ![](img/index-456_1.jpg)\n\n第 19 章 ■ 平台和 JVM 日志记录\n\n***图 19-1.** NetBeans 中 com.jdojo.logger\
  \ 项目的模块路径设置*\n\n定义模块\n\n此示例的所有类和资源将位于名为 `com.jdojo.logger` 的模块中，其声明如清单 19-1 所示。\n\
  \n***清单 19-1.*** 名为 com.jdojo.logger 的模块的模块声明\n\n// module-info.java\n\nmodule com.jdojo.logger\
  \ {\n\nrequires log4j.api;\n\nrequires log4j.core;\n\nexports com.jdojo.logger;\n\
