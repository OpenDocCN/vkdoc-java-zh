  \nx-xss-protection=[1; mode=block]\n\n处理响应体\n\n处理 HTTP 响应的响应体是一个两步过程：\n\n• 当你使用\
  \ `HttpClient` 类的 `send()` 或 `sendAsync()` 方法发送请求时，需要指定一个响应体处理器，它是 `HttpResponse.BodyHandler<T>`\
  \ 接口的一个实例。\n\n• 当收到响应状态码和头部时，会调用响应体处理器的 `apply()` 方法。响应状态码和头部会被传递给 `apply()` 方法。`apply()`\
  \ 方法返回一个 `HttpResponse.BodyProcessor<T>` 接口的实例，该实例负责读取响应体并将读取的数据转换为类型 T。\n\n不必担心处理响应体的这些细节。`HttpResponse.BodyHandler<T>`\
  \ 提供了多种实现。你可以使用 `HttpResponse.BodyHandler` 接口的以下静态工厂方法之一，为不同的类型参数 T 获取其实例：\n\n•\
  \ `HttpResponse.BodyHandler<byte[]> asByteArray()`\n• `HttpResponse.BodyHandler<Void>\
  \ asByteArrayConsumer(Consumer<Optional<byte[]>> consumer)`\n• `HttpResponse.BodyHandler<Path>\
  \ asFile(Path file)`\n• `HttpResponse.BodyHandler<Path> asFile(Path file, OpenOption...\
  \ openOptions)`\n• `HttpResponse.BodyHandler<Path> asFileDownload(Path directory,\
  \ OpenOption... openOptions)`\n• `HttpResponse.BodyHandler<String> asString()`\n\
  • `HttpResponse.BodyHandler<String> asString(Charset charset)`\n• `<U> HttpResponse.BodyHandler<U>\
  \ discard(U value)`\n\n第 14 章 ■ HTTP/2 客户端 API\n\n这些方法的签名直观地说明了它们处理哪种类型的响应体。例如，如果你想将响应体作为字符串获取，可以使用\
  \ `asString()` 方法来获取一个响应体处理器。\n\n`discard(U value)` 方法返回一个响应体处理器，该处理器会丢弃响应体并返回指定的值作为响应体。\n\
  \n`HttpResponse<T>` 类的 `body()` 方法返回类型为 T 的响应体。\n\n以下代码片段向 `http://google.com` URL\
  \ 发送一个 GET 请求，并将响应体作为字符串检索。我忽略了异常处理逻辑。\n\n```java\nimport java.net.URI;\nimport\
  \ jdk.incubator.http.HttpClient;\nimport jdk.incubator.http.HttpRequest;\nimport\
  \ jdk.incubator.http.HttpResponse;\nimport static jdk.incubator.http.HttpResponse.BodyHandler.asString;\n\
  ...\n// 构建请求\nHttpRequest request = HttpRequest.newBuilder()\n        .uri(new URI(\"\
  http://google.com\"))\n        .GET()\n        .build();\n// 发送请求并获取响应\nHttpResponse<String>\
  \ response = HttpClient.newHttpClient()\n        .send(request, asString());\n//\
  \ 获取响应体并打印\nString body = response.body();\nSystem.out.println(body);\n```\n\n`<HTML><HEAD><meta\
  \ http-equiv=\"content-type\"`\n\n警告：正在使用孵化器模块：jdk.incubator.httpclient\n\n`<HTML><HEAD><meta\
  \ http-equiv=\"content-type\" content=\"text/html;charset=utf-8\">\n<TITLE>301 Moved</TITLE></HEAD><BODY>\n\
  <H1>301 Moved</H1>\nThe document has moved\n<A HREF=\"http://www.google.com/\">here</A>.\n\
  </BODY></HTML>`\n\n该示例返回一个状态码为 301 的响应体，表明 URL 已迁移。输出中还包含了迁移后的 URL。如果我们在 `HttpClient`\
  \ 中将以下重定向策略设置为 `ALWAYS`，请求将会重新提交到迁移后的 URL。以下代码片段修复了此问题：\n\n```java\n// 请求将遵循服务器发出的重定向\n\
  HttpResponse<String> response = HttpClient.newBuilder()\n        **.followRedirects(HttpClient.Redirect.ALWAYS)**\n\
  \        .build()\n        .send(request, asString());\n```\n\n清单 14-3 包含一个完整的程序，演示了如何使用带有请求体的\
  \ POST 请求并异步处理响应。本书源代码中的 Web 应用程序包含一个名为 `Calculator` 的 Servlet。为节省篇幅，此处未展示 `Calculator`\
  \ Servlet 的源代码。该 Servlet 接受请求中的三个参数，分别命名为 `n1`、`n2` 和 `op`，其中 `n1` 和 `n2` 是两个数字，`op`\
  \ 是一个运算符（+、-、* 或 /）。响应是纯文本，总结了运算符及其结果。\n\n程序中的 URL 假设你已在本地机器上部署了该 Servlet，并且 Web\
  \ 服务器运行在 8080 端口。如果这些假设不成立，请相应修改程序。如果 Servlet 调用成功，你将得到如下所示的输出。否则，你将得到不同的输出。\n\n\
  ***清单 14-3.*** 异步处理 HTTP 响应体\n\n```java\n// CalculatorTest.java\npackage com.jdojo.http.client;\n\
  \nimport java.io.IOException;\nimport java.net.URI;\nimport java.net.URISyntaxException;\n\
  import java.net.URLEncoder;\nimport jdk.incubator.http.HttpClient;\nimport jdk.incubator.http.HttpRequest;\n\
  import static jdk.incubator.http.HttpRequest.BodyProcessor.fromString;\nimport jdk.incubator.http.HttpResponse;\n\
  \npublic class CalculatorTest {\n    public static void main(String[] args) {\n\
  \        try {\n            URI calcUri =\n                new URI(\"http://localhost:8080/webapp/Calculator\"\
  );\n            String formData = \"n1=\" + URLEncoder.encode(\"10\",\"UTF-8\")\
  \ +\n                              \"&n2=\" + URLEncoder.encode(\"20\",\"UTF-8\"\
  ) +\n                              \"&op=\" + URLEncoder.encode(\"+\",\"UTF-8\"\
  ) ;\n            // 创建请求\n            HttpRequest request = HttpRequest.newBuilder()\n\
  \                    .uri(calcUri)\n                    .header(\"Content-Type\"\
  , \"application/x-www-form-urlencoded\")\n                    .header(\"Accept\"\
  , \"text/plain\")\n                    .POST(fromString(formData))\n           \
  \         .build();\n            // 异步处理响应。当响应就绪时，将调用此类的 processResponse() 方法。\n\
  \            HttpClient.newHttpClient()\n                    .sendAsync(request,\n\
  \                               HttpResponse.BodyHandler.asString())\n         \
  \           .whenComplete(CalculatorTest::processResponse);\n            try {\n\
  \                // 让当前线程休眠 5 秒，以便异步响应处理完成\n                Thread.sleep(5000);\n\
  \            } catch (InterruptedException ex) {\n                ex.printStackTrace();\n\
  \            }\n        } catch (URISyntaxException | IOException e) {\n       \
  \     e.printStackTrace();\n        }\n    }\n\n    private static void processResponse(HttpResponse<String>\
  \ response,\n                                        Throwable t) {\n        if\
  \ (t == null ) {\n            System.out.println(\"响应状态码: \" +\n               \
  \                response.statusCode());\n            System.out.println(\"响应体:\
  \ \" + response.body());\n        } else {\n            System.out.println(\"处理\
  \ HTTP 请求时发生异常。错误: \" + t.getMessage());\n        }\n    }\n}\n```\n\n警告：正在使用孵化器模块：jdk.incubator.httpclient\n\
  \n响应状态码: 200\n响应体: 10 + 20 = 30.0\n\n使用响应体处理器为开发者节省了大量工作。一条语句即可将 URL 的内容下载并保存到文件中。以下代码片段将\
  \ `http://www.google.com` URL 的内容保存为当前目录下名为 `google.html` 的文件。下载完成后，会打印下载文件的路径。如果发生错误，则会打印异常的堆栈跟踪。\n\
  \n```java\nHttpClient.newBuilder()\n        .followRedirects(HttpClient.Redirect.ALWAYS)\n\
  \        .build()\n        .sendAsync(HttpRequest.newBuilder()\n               \
  \         .uri(new URI(\"http://www.google.com\"))\n                        .GET()\n\
  \                        .build(),\n                   asFile(Paths.get(\"google.html\"\
  )))\n        .whenComplete((HttpResponse<Path> response,\n                     \
  \  Throwable exception) -> {\n            if(exception == null) {\n            \
  \    System.out.println(\"文件已保存至 \" +\n                                   response.body().toAbsolutePath());\n\
  \            } else {\n                exception.printStackTrace();\n          \
  \  }\n        });\n```\n\n第 14 章 ■ HTTP/2 客户端 API\n\n处理响应尾部\n\nHTTP 尾部是类似于 HTTP\
  \ 头部的键值对列表，由服务器在 HTTP 响应结束时、响应体发送完毕后发送。许多服务器通常不使用 HTTP 尾部。\n\n\n\n`HttpResponse`\
  \ 类包含一个 `trailers()` 方法，该方法以 `CompletableFuture<HttpHeaders>` 实例的形式返回响应尾部。请注意返回对象类型的名称——`HttpHeaders`。HTTP/2\
  \ 客户端 API 确实有一个名为 `HttpTrailers` 的类型。你需要在检索尾部之前先检索响应体。在撰写本文时，HTTP/2 客户端 API 尚不支持处理\
  \ HTTP 尾部。以下代码片段展示了当 API 支持时如何打印所有响应尾部：\n\n```java\n// 获取 HTTP 响应\nHttpResponse<String>\
  \ response = HttpClient.newBuilder()\n    .followRedirects(HttpClient.Redirect.ALWAYS)\n\
  \    .build()\n    .send(HttpRequest.newBuilder()\n        .uri(new URI(\"http://www.google.com\"\
  ))\n        .GET()\n        .build(),\n        asString());\n\n// 读取响应体\nString\
  \ body = response.body();\n\n// 处理尾部\nresponse.trailers()\n    .whenComplete((HttpHeaders\
  \ trailers, Throwable t) -> {\n        if(t == null) {\n            trailers.map()\n\
  \                .entrySet()\n                .forEach(System.out::println);\n \
  \       } else {\n            t.printStackTrace();\n        }\n    });\n```\n\n\
  **设置请求重定向策略**\n\n作为对 HTTP 请求的响应，Web 服务器可能会返回一个 3XX 响应状态码，其中 X 是 0 到 9 之间的数字。此状态码表示客户端需要执行额外的操作才能完成请求。例如，状态码\
  \ 301 表示 URL 已永久移动到新位置。\n\n响应体包含替代位置。默认情况下，收到 3XX 状态码后，请求不会重新提交到新位置。你可以设置 `HttpClient.Redirect`\
  \ 枚举的以下常量之一作为你的 `HttpClient` 的策略，以便在返回的响应包含 3XX 响应状态码时采取行动：\n\n*   `ALWAYS`\n* \
  \  `NEVER`\n*   `SAME_PROTOCOL`\n*   `SECURE`\n\n`ALWAYS` 表示应始终遵循重定向。也就是说，请求应重新提交到新位置。\n\
  \n`NEVER` 表示永远不应遵循重定向。这是默认值。\n\n`SAME_PROTOCOL` 表示如果旧位置和新位置使用相同的协议（例如，HTTP 到 HTTP\
  \ 或 HTTPS 到 HTTPS），则可能发生重定向。\n\n`SECURE` 表示应始终发生重定向，除非旧位置使用 HTTPS 而新位置使用 HTTP。\n\
  \n我在前面的章节中介绍了如何在 `HttpClient` 上使用 `followRedirect` 配置设置。\n\n**使用 WebSocket 协议**\n\
  \nWebSocket 协议在两个端点（一个客户端端点和一个服务器端点）之间提供双向通信。术语*端点*指使用 WebSocket 协议的连接的任何一侧。客户端端点发起连接，服务器端点接受连接。连接是双向的，这意味着服务器端点可以自行向客户端端点推送消息。在此上下文中，你还会遇到另一个术语，称为*对等端*。对等端就是连接的另一端。例如，对于客户端端点，服务器端点是对等端；对于服务器端点，客户端端点是对等端。WebSocket\
  \ *会话*表示一个端点与单个对等端之间的一系列交互。\n\nWebSocket 协议可以分为三个部分：\n\n*   打开握手\n*   数据交换\n*  \
  \ 关闭握手\n\n客户端向服务器发起打开握手。握手使用 HTTP 进行，并带有升级到 WebSocket 协议的请求。服务器以升级响应来响应打开握手。一旦握手成功，客户端和服务器就会交换消息。消息交换可以由客户端或服务器发起。最后，任一端点都可以发送关闭握手；对等端以关闭握手响应。一旦关闭握手成功，WebSocket\
  \ 就会关闭。\n\nJDK 9 中的 HTTP/2 客户端 API 支持创建 WebSocket 客户端端点。要获得使用 WebSocket 协议的完整示例，你需要有一个服务器端点和一个客户端端点。以下部分介绍如何创建两者。\n\
  \n**创建服务器端点**\n\n创建服务器端点需要使用 Java EE。本书侧重于 Java SE 9。我简要解释如何创建在本节示例中使用的服务器端点。在不涉及细节的情况下，我使用\
  \ Java EE 7 注解来创建 WebSocket 服务器端点。\n\n清单 14-4 包含一个名为 `TimeServerEndPoint` 的类的代码。该类包含在本书源代码的\
  \ `webapp` 目录下的 Web 应用程序中。当你将 Web 应用程序部署到 Web 服务器时，此类将作为服务器端点部署。\n\n***清单 14-4.***\
  \ WebSocket 服务器端点\n\n```java\n// TimeServerEndPoint.java\npackage com.jdojo.ws;\n\
  \nimport java.io.IOException;\nimport java.time.ZonedDateTime;\nimport java.util.concurrent.TimeUnit;\n\
  import javax.websocket.CloseReason;\nimport javax.websocket.OnMessage;\nimport javax.websocket.OnOpen;\n\
  import javax.websocket.OnClose;\nimport javax.websocket.OnError;\nimport javax.websocket.Session;\n\
  import javax.websocket.server.ServerEndpoint;\nimport static javax.websocket.CloseReason.CloseCodes.NORMAL_CLOSURE;\n\
  \n@ServerEndpoint(\"/servertime\")\npublic class TimeServerEndPoint {\n\n    @OnOpen\n\
  \    public void onOpen(Session session) {\n        System.out.println(\"客户端已连接。\"\
  );\n    }\n\n    @OnClose\n    public void onClose(Session session) {\n        System.out.println(\"\
  连接已关闭。\");\n    }\n\n    @OnError\n    public void onError(Session session, Throwable\
  \ t) {\n        System.out.println(\"发生错误：\" + t.getMessage());\n    }\n\n    @OnMessage\n\
  \    public void onMessage(String message, Session session) {\n        System.out.println(\"\
  客户端：\" + message);\n        // 向客户端发送消息\n        sendMessages(session);\n    }\n\
  \n    private void sendMessages(Session session) {\n        /* 启动一个新线程并向客户端发送 3\
  \ 条消息。\n           每条消息包含当前日期和时间以及时区。\n        */\n        new Thread(() -> {\n\
  \            for(int i = 0; i < 3; i++) {\n                String currentTime =\n\
  \                    ZonedDateTime.now().toString();\n                try {\n  \
  \                  session.getBasicRemote()\n                        .sendText(currentTime,\
  \ true);\n                    TimeUnit.SECONDS.sleep(5);\n                } catch(InterruptedException\
  \ | IOException e) {\n                    e.printStackTrace();\n               \
  \     break;\n                }\n            }\n            try {\n            \
  \    // 让我们关闭 WebSocket\n                session.close(new CloseReason(NORMAL_CLOSURE,\n\
  \                    \"完成\"));\n            } catch (IOException e) {\n        \
  \        e.printStackTrace();\n            }\n        })\n        .start();\n  \
  \  }\n}\n```\n\n在 `TimeServerEndPoint` 类上使用 `@ServerEndpoint(\"/servertime\")` 注解使得该类在部署到\
  \ Web 服务器时成为服务器端点。注解的 `value` 元素的值是 `/servertime`，这将使 Web 服务器在此 URL 上发布此端点。\n\n\
  该类包含四个方法，它们分别用 `@OnOpen`、`@OnMessage`、`@OnClose` 和 `@OnError` 注解进行了标注。我将这些方法命名为与这些注解相同的名称。这些方法在服务器端点生命周期的不同时间点被调用。它们接受一个\
  \ `Session` 对象作为参数。`Session` 对象表示此端点与其对等端（即客户端端点）的交互。\n\n当与对等端的打开握手成功时，会调用 `onOpen()`\
  \ 方法。该方法打印一条消息，表明客户端已连接。\n\n当从对等端接收到消息时，会调用 `onMessage()` 方法。该方法打印它接收到的消息，并调用一个名为\
  \ `sendMessages()` 的私有方法。`sendMessages()` 方法启动一个新线程，并向对等端发送三条消息。该线程在发送每条消息后休眠五秒。\n\
  \n\n\n消息中包含当前日期、时间及时区信息。你可以同步或异步地向对等端发送消息。要发送消息，你需要获取代表与对等端会话的 `RemoteEndpoint`\
  \ 接口的引用。使用 `Session` 实例上的 `getBasicRemote()` 和 `getAsyncRemote()` 方法，可以分别获取能够同步和异步发送消息的\
  \ `RemoteEndpoint.Basic` 和 `RemoteEndpoint.Async` 实例。一旦获得对等端（远程端点）的引用，你就可以调用其多个\
  \ `sendXxx()` 方法来向对等端发送不同类型的数据。\n\n```java\n// 向对等端发送一条同步文本消息\nsession.getBasicRemote()\n\
  \       .sendText(currentTime, true);\n```\n\n`sendText()` 方法中的第二个参数表示当前发送的消息是否为部分消息的最后一部分。如果你的消息是完整的，请使用\
  \ `true`。\n\n当所有消息都发送给对等端后，会使用 `sendClose()` 方法发送一条关闭消息。该方法接收一个 `CloseReason` 类的对象，该对象封装了关闭代码和关闭原因。当对等端收到关闭消息时，它需要响应一条关闭消息，之后\
  \ WebSocket 连接就会关闭。请注意，在发送关闭消息后，服务器端点不应再向其对等端发送更多消息。\n\n当发生 WebSocket 协议未处理的错误时，会调用\
  \ `onError()` 方法。\n\n你不能单独使用此端点。你需要创建一个客户端端点，我将在下一节中详细介绍。你将在本章稍后的“运行 WebSocket 程序”一节中看到此端点的实际应用。\n\
  \n**创建客户端端点**\n\n开发 WebSocket 客户端端点涉及使用 `WebSocket` 接口，该接口是 JDK 9 中 HTTP/2 客户端 API\
  \ 的一部分。`WebSocket` 接口包含以下嵌套类型：\n\n- `WebSocket.Builder`\n- `WebSocket.Listener`\n\
  - `WebSocket.MessagePart`\n\n`WebSocket` 接口的实例代表一个 WebSocket 客户端端点。构建器（`WebSocket.Builder`\
  \ 接口的实例）用于创建 `WebSocket` 实例。`HttpClient` 类的 `newWebSocketBuilder(URI uri, WebSocket.Listener\
  \ listener)` 方法返回一个 `WebSocket.Builder` 接口的实例。\n\n当客户端端点发生事件时（例如，打开握手完成、消息到达、关闭握手等），通知会被发送给监听器（`WebSocket.Listener`\
  \ 接口的实例）。该接口为每种通知类型都包含一个默认方法。\n\n你需要创建一个实现此接口的类。你只需实现那些与你感兴趣接收通知的事件相对应的方法。在创建 `WebSocket`\
  \ 实例时，你需要指定一个监听器。\n\n当你向对等端发送关闭消息时，可以指定一个关闭状态码。`WebSocket` 接口包含以下 `int` 类型的常量，可用作\
  \ WebSocket 关闭消息的状态码：\n\n- `CLOSED_ABNORMALLY`：表示 WebSocket 关闭消息状态码 (1006)，这意味着连接被异常关闭，例如，未发送或接收关闭消息。\n\
  - `NORMAL_CLOSURE`：表示 WebSocket 关闭消息状态码 (1000)，这意味着连接被正常关闭。这表示建立连接的目的已经达成。\n\n服务器端点可能会发送部分消息。消息被标记为\
  \ first、part、last 或 whole，以指示其位置。`WebSocket.MessagePart` 枚举定义了四个与消息位置对应的常量：`FIRST`、`PART`、`LAST`\
  \ 和 `WHOLE`。当你的监听器收到消息已到达的通知时，你将作为消息的一部分接收到这些值。\n\n以下各节将详细描述设置客户端端点的每个步骤。\n\n**创建监听器**\n\
  \n监听器是 `WebSocket.Listener` 接口的一个实例。创建监听器涉及创建一个实现此接口的类。该接口包含以下默认方法：\n\n- `CompletionStage<?>\
  \ onBinary(WebSocket webSocket, ByteBuffer message, WebSocket.MessagePart part)`\n\
  - `CompletionStage<?> onClose(WebSocket webSocket, int statusCode, String reason)`\n\
  - `void onError(WebSocket webSocket, Throwable error)`\n- `void onOpen(WebSocket\
  \ webSocket)`\n- `CompletionStage<?> onPing(WebSocket webSocket, ByteBuffer message)`\n\
  - `CompletionStage<?> onPong(WebSocket webSocket, ByteBuffer message)`\n- `CompletionStage<?>\
  \ onText(WebSocket webSocket, CharSequence message, WebSocket.MessagePart part)`\n\
  \n当客户端端点连接到对等端时，会调用 `onOpen()` 方法，对等端的引用作为第一个参数传递给此方法。默认实现会请求一条消息，这意味着此监听器可以再接收一条消息。消息的请求是通过\
  \ `WebSocket` 接口的 `request(long n)` 方法进行的：\n\n```java\n// 允许再接收一条消息\nwebSocket.request(1);\n\
  ```\n\n> **提示** 如果服务器发送的消息数量超过请求数量，消息会在 TCP 连接上排队，并可能最终通过 TCP 流量控制强制发送方停止发送更多消息。在适当的时候使用适当的参数值调用\
  \ `request(long n)` 方法非常重要，这样你的监听器才能持续接收来自服务器的消息。一个常见的错误是在监听器中重写 `onOpen()` 方法，但没有调用\
  \ `webSocket.request(1)` 方法，这会阻止你接收来自服务器的消息。\n\n当端点收到来自对等端的关闭消息时，会调用 `onClose()`\
  \ 方法。这是对监听器的最后一次通知。从此方法抛出的异常将被忽略。默认实现不执行任何操作。通常，你需要向对等端发送一条关闭消息以完成关闭握手。\n\n当此端点收到来自对等端的\
  \ Ping 消息时，会调用 `onPing()` 方法。Ping 消息可以由客户端和服务器端点发送。默认实现会向对等端发送一条包含相同消息内容的 Pong 消息。\n\
  \n当端点收到来自对等端的 Pong 消息时，会调用 `onPong()` 方法。Pong 消息通常作为对先前发送的 Ping 消息的响应而接收。端点也可能收到未经请求的\
  \ Pong 消息。`onPong()` 方法的默认实现会在监听器上再请求一条消息，并且不执行其他操作。\n\n当 WebSocket 上发生 I/O 或协议错误时，会调用\
  \ `onError()` 方法。从此方法抛出的异常将被忽略。调用此方法后，监听器将不再接收任何通知。默认实现不执行任何操作。\n\n当从对等端接收到二进制消息和文本消息时，会分别调用\
  \ `onBinary()` 和 `onText()` 方法。请务必检查这些方法的最后一个参数，该参数指示消息的位置。如果你收到部分消息，则需要将它们组装起来以获取完整消息。从这些方法返回\
  \ `null` 表示消息处理完成。否则，将返回一个 `CompletionStage<?>`，并在消息处理完成时完成。\n\n以下代码片段创建了一个准备接收文本消息的\
  \ WebSocket 监听器：\n\n```java\nWebSocket.Listener listener = new WebSocket.Listener()\
  \ {\n    @Override\n    public CompletionStage<?> onText(WebSocket webSocket,\n\
  \                                     CharSequence message,\n                  \
  \                   WebSocket.MessagePart part) {\n        // 允许监听器接收一条消息\n    \
  \    webSocket.request(1);\n        // 打印从服务器接收到的消息\n        System.out.println(\"\
  Server: \" + message);\n        // 返回 null 表示我们已完成此消息的处理\n        return null;\n\
  \    }\n};\n```\n\n**构建端点**\n\n\n\n你需要构建一个充当客户端端点的 `WebSocket` 接口实例。该实例用于与服务器端点建立连接并交换消息。`WebSocket`\
  \ 实例通过 `WebSocket.Builder` 构建。你可以使用 `HttpClient` 类的以下方法获取构建器：`WebSocket.Builder\
  \ newWebSocketBuilder(URI uri, WebSocket.Listener listener)`\n\n用于获取 `WebSocket`\
  \ 构建器的 `HttpClient` 实例为 `WebSocket` 提供连接配置。指定的 `uri` 是服务器端点的 URI。`listener` 是正在构建的端点的监听器，如前文所述。获得构建器后，你可以调用构建器的以下方法之一来配置端点：\n\
  \n• `WebSocket.Builder connectTimeout(Duration timeout)`\n\n• `WebSocket.Builder\
  \ header(String name, String value)`\n\n• `WebSocket.Builder subprotocols(String\
  \ mostPreferred, String... lesserPreferred)`\n\n`connectTimeout()` 方法允许你为打开握手指定超时时间。如果打开握手未在指定时间内完成，`WebSocket.Builder`\
  \ 的 `buildAsync()` 方法返回的 `CompletableFuture` 将以 `HttpTimeoutException` 异常完成。\n\n\
  你可以使用 `header()` 方法为打开握手添加任何自定义标头。你可以使用 `subprotocols()` 方法在打开握手期间请求特定的子协议——服务器只会选择其中一个。子协议由应用程序定义。客户端和服务器需要就特定的子协议及其细节达成一致。\n\
  \n最后，调用 `WebSocket.Builder` 接口的 `buildAsync()` 方法来构建端点。它返回 `CompletableFuture<WebSocket>`，当此端点连接到服务器端点时正常完成；当出现错误时异常完成。以下代码片段展示了如何构建和连接客户端端点。请注意，服务器的\
  \ URI 以 `ws` 开头，表示 `WebSocket` 协议。\n\n```java\nURI serverUri = new URI(\"ws://localhost:8080/webapp/servertime\"\
  );\n\n// 获取一个监听器\nWebSocket.Listener listener = ...;\n\n// 使用默认的 HttpClient 构建端点\n\
  HttpClient.newHttpClient()\n    .newWebSocketBuilder(serverUri, listener)\n    .buildAsync()\n\
  \    .whenComplete((WebSocket webSocket, Throwable t) -> {\n        // 更多代码写在这里\n\
  \    });\n```\n\n**第 14 章 ■ HTTP/2 客户端 API**\n\n**向对等端发送消息**\n\n一旦客户端端点连接到对等端，双方即可交换消息。`WebSocket`\
  \ 接口的实例代表一个客户端端点，该接口包含以下用于向对等端发送消息的方法：\n\n• `CompletableFuture<WebSocket> sendBinary(ByteBuffer\
  \ message, boolean isLast)`\n\n• `CompletableFuture<WebSocket> sendClose()`\n\n\
  • `CompletableFuture<WebSocket> sendClose(int statusCode, String reason)`\n\n• `CompletableFuture<WebSocket>\
  \ sendPing(ByteBuffer message)`\n\n• `CompletableFuture<WebSocket> sendPong(ByteBuffer\
  \ message)`\n\n• `CompletableFuture<WebSocket> sendText(CharSequence message)`\n\
  \n• `CompletableFuture<WebSocket> sendText(CharSequence message, boolean isLast)`\n\
  \n`sendText()` 方法用于向对等端发送文本消息。如果你要发送部分消息，请使用带有两个参数的版本。如果第二个参数为 `false`，表示这是部分消息的一部分。如果第二个参数为\
  \ `true`，表示这是部分消息的最后一部分。如果之前没有发送过部分消息，则第二个参数为 `true` 表示这是一条完整消息。`sendText(CharSequence\
  \ message)` 是一个便捷方法，它调用第二个版本的方法，并将 `true` 作为第二个参数。\n\n`sendBinary()` 方法向对等端发送二进制消息。\n\
  \n`sendPing()` 和 `sendPong()` 方法分别向对等端发送 Ping 和 Pong 消息。\n\n\n\n`sendClose()` 方法用于向对端发送一条\
  \ Close 消息。你可以将其作为对端发起的关闭握手的一部分来发送，也可以主动发送以启动与对端的关闭握手。\n\n■ **提示** 如果你想突然关闭 WebSocket，请使用\
  \ `WebSocket` 接口的 `abort()` 方法。\n\n运行 WebSocket 程序\n\n现在是时候看看 WebSocket 客户端端点与 WebSocket\
  \ 服务端端点是如何交换消息的了。\n\n清单 14-5 包含了一个名为 `WebSocketClient` 的类的代码，该类封装了一个客户端端点。其预期用法如下：\n\
  \n```java\n// 创建一个客户端 WebSocket\nWebSocketClient wsClient = new WebSocketClient(new\
  \ URI(\"<server-uri>\"));\n\n// 连接到服务器并交换消息\nwsClient.connect();\n```\n\n***清单 14-5.***\
  \ 封装了客户端端点及其操作的类\n\n```java\n// WebSocketClient.java\npackage com.jdojo.http.client;\n\
  \nimport java.net.URI;\nimport java.util.concurrent.CompletionStage;\nimport jdk.incubator.http.HttpClient;\n\
  import jdk.incubator.http.WebSocket;\n\n// 第 14 章 ■ HTTP/2 客户端 API\n\npublic class\
  \ WebSocketClient {\n    private WebSocket webSocket;\n    private final URI serverUri;\n\
  \    private boolean inError = false;\n\n    public WebSocketClient(URI serverUri)\
  \ {\n        this.serverUri = serverUri;\n    }\n\n    public boolean isClosed()\
  \ {\n        return (webSocket != null && webSocket.isClosed())\n              \
  \  ||\n                this.inError;\n    }\n\n    public void connect() {\n   \
  \     HttpClient.newHttpClient()\n                .newWebSocketBuilder(serverUri,\
  \ this.getListener())\n                .buildAsync()\n                .whenComplete(this::statusChanged);\n\
  \    }\n\n    private void statusChanged(WebSocket webSocket, Throwable t) {\n \
  \       this.webSocket = webSocket;\n        if (t == null) {\n            this.talkToServer();\n\
  \        } else {\n            this.inError = true;\n            System.out.println(\"\
  无法连接到服务器。\" +\n                    \" 错误: \" + t.getMessage());\n        }\n   \
  \ }\n\n    private void talkToServer() {\n        // 允许监听器接收一条消息\n        webSocket.request(1);\n\
  \        // 向服务器发送时间请求\n        webSocket.sendText(\"Hello\");\n    }\n\n    private\
  \ WebSocket.Listener getListener() {\n        return new WebSocket.Listener() {\n\
  \            @Override\n            public void onOpen(WebSocket webSocket) {\n\
  \                // 允许监听器再接收一条消息\n                webSocket.request(1);\n      \
  \          // 通知用户已连接\n                System.out.println(\"WebSocket 已打开。\");\n\
  \            }\n\n            // 第 14 章 ■ HTTP/2 客户端 API\n\n            @Override\n\
  \            public CompletionStage<?> onClose(WebSocket webSocket,\n          \
  \                                    int statusCode, String reason) {\n        \
  \        // 服务器关闭了 WebSocket。让我们响应来自服务器的关闭消息\n                webSocket.sendClose();\n\
  \                System.out.println(\"WebSocket 已关闭。\" +\n                     \
  \   \" 关闭代码: \" + statusCode +\n                        \", 关闭原因: \" + reason);\n\
  \                // 返回 null 表示此 WebSocket 可以立即关闭\n                return null;\n\
  \            }\n\n            @Override\n            public void onError(WebSocket\
  \ webSocket, Throwable t) {\n                System.out.println(\"发生错误: \" + t.getMessage());\n\
  \            }\n\n            @Override\n            public CompletionStage<?> onText(WebSocket\
  \ webSocket,\n                                             CharSequence message,\
  \ WebSocket.MessagePart part) {\n                // 允许监听器再接收一条消息\n             \
  \   webSocket.request(1);\n                // 打印从服务器接收到的消息\n                System.out.println(\"\
  服务器: \" + message);\n                // 返回 null 表示我们已完成对此消息的处理\n               \
  \ return null;\n            }\n        };\n    }\n}\n```\n\n`WebSocketClient` 类的工作方式如下：\n\
  \n- `webSocket` 实例变量保存了客户端端点的引用。\n- `serverUri` 实例变量存储了服务端端点的 URI。\n- `isError`\
  \ 实例变量存储了一个指示器，表明此端点是否处于错误状态。\n- `isClosed()` 方法检查端点是否已关闭或处于错误状态。\n- 在打开握手成功之前，`webSocket`\
  \ 实例变量将为 `null`。其值在 `statusChanged()` 方法内部更新。\n- `connect()` 方法构建一个 WebSocket 并启动打开握手。请注意，无论连接状态如何，它都会在打开握手完成时调用\
  \ `statusChanged()` 方法。\n\n- `statusChanged()` 方法通过调用 `talkToServer()` 与服务器进行通信。\n\
  \n\n\n当握手成功时的方法。否则，它会打印一条错误消息，并将 `isError` 标志设置为 `true`。\n\n• `talkToServer()` 方法允许监听器再接收一条消息，并向服务器端点发送一条文本消息。请注意，当服务器端点从客户端端点接收到文本消息时，它会以五秒的间隔发送三条消息。从\
  \ `talkToServer()` 方法发送此消息会启动两个端点之间的消息交换。\n\n• `getListener()` 方法创建并返回一个 `WebSocket.Listener`\
  \ 实例。服务器端点将发送三条消息，随后发送一条关闭消息。监听器中的 `onClose()` 方法通过发送一条空的关闭消息来响应服务器的关闭消息，这将结束客户端端点的操作。\n\
  \n清单 14-6 包含了运行客户端端点的程序。如果你运行 `WebSocketClientTest` 类，请确保你的包含服务器端点的 Web 应用程序正在运行。你还需要修改\
  \ `SERVER_URI` 静态变量，使其与你 Web 应用程序的服务器端点 URI 匹配。如果未得到类似所示的输出，请参考下一节“WebSocket 应用程序故障排除”。输出会打印当前日期、时间和时区，因此你得到的输出可能不同。\n\
  \n***清单 14-6.*** 运行客户端端点的程序\n\n```java\n// WebSocketClientTest.java\n\npackage com.jdojo.http.client;\n\
  \nimport java.net.URI;\n\nimport java.net.URISyntaxException;\n\nimport java.util.concurrent.TimeUnit;\n\
  \npublic class WebSocketClientTest {\n\n    // 请更改 URI 以指向你的服务器端点\n    static final\
  \ String SERVER_URI = \"ws://localhost:8080/webapp/servertime\";\n\n    public static\
  \ void main(String[] args)\n            throws URISyntaxException, InterruptedException\
  \ {\n\n        // 创建一个客户端 WebSocket\n        WebSocketClient wsClient = new WebSocketClient(new\
  \ URI(SERVER_URI));\n\n        // 连接到服务器\n        wsClient.connect();\n\n      \
  \  // 等待直到 WebSocket 关闭\n        while (!wsClient.isClosed()) {\n            TimeUnit.SECONDS.sleep(1);\n\
  \        }\n\n        // 需要退出\n        System.exit(0);\n    }\n}\n```\n\n第 14 章\
  \ ■ HTTP/2 客户端 API\n\n一个 WebSocket 已打开。\n服务器: 2016-12-15T14:19:53.311-06:00[America/Chicago]\n\
  服务器: 2016-12-15T14:19:58.312-06:00[America/Chicago]\n服务器: 2016-12-15T14:20:03.313-06:00[America/Chicago]\n\
  WebSocket 已关闭。关闭代码: 1000，关闭原因: 完成\n\n**WebSocket 应用程序故障排除**\n\n在测试 WebSocket 应用程序时，可能会出现许多问题。表\
  \ 14-1 列出了其中一些常见问题及其解决方案。\n\n***表 14-1.** WebSocket 应用程序的可能错误及解决方案*\n\n| **错误消息**\
  \ | **解决方案** |\n| :--- | :--- |\n| 无法连接到服务器。错误：java.net.ConnectException：连接被拒绝：无更多信息\
  \ | 表示 Web 服务器未运行或你的服务器 URI 不正确。尝试运行 Web 服务器并检查在 `WebSocketClientTest` 类的 `SERVER_URI`\
  \ 静态变量中指定的服务器 URI。 |\n| 无法连接到服务器。错误：java.net.http.WebSocketHandshakeException：404:\
  \ RFC 6455 1.3。无法完成握手；HTTP 响应状态码 404 | 表示服务器 URI 未指向服务器上的正确端点。请验证 `WebSocketClientTest`\
  \ 类中 `SERVER_URI` 静态变量的值是否正确。 |\n| 一个 WebSocket 已打开。2016 年 12 月 15 日下午 2:58:03 java.net.http.WS$1\
  \ onError 警告：连接失败 java.net.http.WS@162532d6[CONNECTED]，原因：'RFC 6455 7.2.1。在收到关闭帧之前流已结束'\
  \ 发生错误：null | 表示在打开握手之后，服务器自动关闭了服务器端点。这通常是由你机器上运行的防病毒程序导致的。你需要配置防病毒程序，允许在指定端口上进行\
  \ HTTP 连接，或者将 Web 服务器运行在防病毒程序未阻止的其他端口的 HTTP 监听器上。 |\n| 一个 WebSocket 已打开。 | 表示在打开握手之后...\
  \ |\n\n\n\n在这种情况下，应用程序会打印一行或两行输出\n\nServer: 2016-12-16T07:15:04.586-\n\n然后永远等待。当你的客户端端点逻辑中\n\
  \n06:00[America/Chicago]\n\n没有调用 `webSocket.request(1)` 时，就会发生这种情况。服务器正在发送\n\n消息，这些消息会被排队，因为你没有\n\
  \n允许接收更多消息。在 `onOpen`、`onText` 和其他事件中调用 `request(n)`\n\n方法可以解决此问题。\n\n总结\n\nJDK\
  \ 9 新增了 HTTP/2 客户端 API，让你可以在 Java 应用程序中处理 HTTP 请求和响应。该 API 提供了用于开发支持身份验证和 TLS 的\
  \ WebSocket 客户端端点的类和接口。该 API 位于 `jdk.incubator.http` 包中，该包属于 `jdk.incubator.httpclient`\
  \ 模块。\n\n第 14 章 ■ HTTP/2 客户端 API\n\n三个抽象类 `HttpClient`、`HttpRequest` 和 `HttpResponse`，以及\
  \ `WebSocket` 接口是 HTTP/2 客户端 API 的核心。这些类型的实例通过构建器创建。`HttpClient` 类是不可变的。`HttpClient`\
  \ 类的实例存储可被多个 HTTP 请求复用的 HTTP 连接配置。`HttpRequest` 类的实例代表一个 HTTP 请求。`HttpResponse`\
  \ 类的实例代表从服务器接收到的 HTTP 响应。你可以同步或异步地发送和接收 HTTP 请求和响应。\n\n`WebSocket` 接口的实例代表一个 WebSocket\
  \ 客户端端点。与 WebSocket 服务器端点的通信是异步完成的。WebSocket API 是基于事件的。\n\n你需要为 WebSocket 客户端端点指定一个监听器，它是\
  \ `WebSocket.Listener` 接口的实例。当端点上发生事件时，监听器会通过调用其相应方法得到通知，例如，当与对等方的打开握手成功完成时，会通过调用监听器的\
  \ `onOpen()` 方法来通知监听器。该 API 支持与对等方交换文本和二进制消息。消息可以分部分交换。\n\n**第 15 章**\n\n**增强的弃用**\n\
  \n在本章中，你将学习：\n\n• 如何弃用你的 API\n\n• `@deprecate` Javadoc 标签和 `@Deprecation` 注解在弃用\
  \ API 中的作用\n\n• 用于生成弃用警告的详细规则\n\n• JDK 9 中对 `@Deprecation` 注解的更新\n\n• JDK 9 中新的弃用警告\n\
  \n• 如何使用 `@SuppressWarnings` 注解来抑制 JDK 9 中不同类型的弃用警告\n\n• 如何使用名为 `jdeprscan` 的静态分析工具扫描你编译后的代码库，以查找已弃用\
  \ JDK API 的使用\n\n什么是弃用？\n\nJava 中的弃用是一种提供 API 生命周期信息的方式。你可以弃用模块、包、类型、构造方法、方法、字段、参数和局部变量。当你弃用一个\
  \ API 时，你是在告诉它的用户：\n\n• 不要使用该 API，因为它很危险。\n\n• 迁移离开该 API，因为存在更好的替代品。\n\n• 迁移离开该\
  \ API，因为该 API 将在未来版本中被移除。\n\n如何弃用一个 API\n\nJDK 有两个用于弃用 API 的结构：\n\n• `@deprecated`\
  \ Javadoc 标签\n\n• `@Deprecated` 注解\n\n© Kishori Sharan 2017\nK. Sharan, *Java 9\
  \ 揭秘*, DOI 10.1007/978-1-4842-2592-9_15\n\n第 15 章 ■ 增强的弃用\n\n`@deprecated` Javadoc\
  \ 标签是在 JDK 1.1 中添加的，它允许你利用 HTML 丰富的文本格式化功能来指定弃用的详细信息。`java.lang.Deprecated` 注解类型是在\
  \ JDK 5.0 中添加的，它可以用于正在被弃用的 API 元素上。在 JDK 9 之前，该注解不包含任何元素。它在运行时被保留。\n\n`@deprecated`\
  \ 标签和 `@Deprecated` 注解应该一起使用。两者都应存在或都不存在。`@Deprecation` 注解不允许你指定弃用的描述，因此你必须使用 `@deprecated`\
  \ 标签来提供描述。\n\n\n\n■ **提示** 在 API 元素上使用 `@deprecated` 标签（而非 `@Deprecated` 注解）会生成编译器警告。在\
  \ JDK 9 之前，你需要使用 `-Xlint:dep-ann` 编译器标志才能看到此类警告。\n\n清单 15-1 包含一个名为 `FileCopier`\
  \ 的类的声明。假设此类作为库的一部分发布。该类使用了 `@Deprecated` 注解标记为已弃用。其 Javadoc 使用 `@deprecated` 标签提供弃用详情，例如弃用时间、替代方案以及移除通知。在\
  \ JDK 9 之前，`@Deprecated` 注解类型不包含任何元素，因此你必须在已弃用 API 的 Javadoc 中使用 `@deprecated` 标签提供所有弃用细节。请注意，Javadoc\
  \ 中使用的 `@since` 标签表明 `FileCopier` 类自该库的 1.2 版本起就已存在，而 `@deprecated` 标签则表明该类自该库的\
  \ 1.4 版本起已被弃用。\n\n***清单 15-1.*** FileCopier 工具类\n\n// FileCopier.java\n\npackage\
  \ com.jdojo.deprecation;\n\nimport java.io.File;\n\n/**\n\n* 该类包含可用于复制文件和目录的静态方法。\n\
  \n*\n\n* **@deprecated 自 1.4 版本起弃用。使用不安全。请改用**\n\n*** <code>java.nio.file.Files</code>\
  \ 类。此类**\n\n*** 将在该库的未来版本中移除。**\n\n*\n\n* @since 1.2\n\n*/\n\n**@Deprecated**\n\n\
  public class FileCopier {\n\n// 不支持直接实例化。\n\nprivate FileCopier() {\n\n}\n\n/**\n\
  \n* 将 src 的内容复制到 dst。\n\n* @param src 源文件\n\n* @param dst 目标文件\n\n* @return 如果复制成功则返回\
  \ true，\n\n* 否则返回 false。\n\n*/\n\n第 15 章 ■ 增强的弃用机制\n\npublic static boolean copy(File\
  \ src, File dst) {\n\n// 此处为更多代码\n\nreturn true;\n\n}\n\n// 此处为更多方法\n\n}\n\nJavadoc\
  \ 工具会将 `@deprecated` 标签的内容移至生成的 Javadoc 顶部，以引起读者注意。当非弃用代码*使用*已弃用的 API 时，编译器会生成警告。请注意，使用\
  \ `@Deprecated` 注解标注 API 本身不会生成警告；但使用已被 `@Deprecated` 注解标注的 API 则会生成警告。如果你在 `FileCopier`\
  \ 类外部使用该类，你将收到关于使用已弃用类的编译器警告。\n\nJDK 9 中对 @Deprecated 的更新\n\n假设你编译了代码并将其部署到生产环境。如果你升级了\
  \ JDK 版本或包含你的旧应用程序使用的新弃用 API 的库/框架，你将不会收到任何警告，从而错失迁移远离弃用 API 的机会。你必须重新编译代码才能收到警告。当时没有工具可以扫描和分析编译后的代码（例如\
  \ JAR 文件）并报告弃用 API 的使用情况。更糟糕的情况是，当弃用 API 从新版本中移除，而你的旧编译代码会收到意外的运行时错误。开发人员在查看弃用元素的\
  \ Javadoc 时也会感到困惑——无法表达 API 何时被弃用，以及该弃用 API 是否会在未来版本中被移除。你所能做的只是将这些信息作为文本指定在 `@deprecated`\
  \ 标签中。JDK 9 试图通过增强 `@Deprecated` 注解来解决这些问题。该注解在 JDK 9 中新增了两个元素：`since` 和 `forRemoval`。\n\
  \n在 JDK 9 之前，注解声明如下：\n\n@Documented\n\n@Retention(RetentionPolicy.RUNTIME)\n\n@Target(value={CONSTRUCTOR,\
  \ FIELD, LOCAL_VARIABLE, METHOD, PACKAGE, PARAMETER, TYPE})\n\npublic @interface\
  \ Deprecated {\n\n}\n\n在 JDK 9 中，`Deprecated` 注解的声明更改如下，更改部分以粗体显示：\n\n@Documented\n\
  \n@Retention(RetentionPolicy.RUNTIME)\n\n@Target(value={CONSTRUCTOR, FIELD, LOCAL_VARIABLE,\
  \ METHOD, PACKAGE, **MODULE**, PARAMETER, TYPE}) public @interface Deprecated {\n\
  \n**String since() default \"\";**\n\n**boolean forRemoval() default false;**\n\n\
  }\n\n\n\n这两个新元素都指定了默认值，因此注解的现有使用不会中断。\n\n`since` 元素指定了被注解的 API 元素开始被弃用的版本。它是一个字符串，建议遵循与\
  \ JDK 版本方案相同的版本命名约定，例如“9”。其默认值为空字符串。请注意，JDK 9 并未向 `@Deprecated` 注解类型添加一个元素来指定弃用的描述。这样做有两个原因：\n\
  \n• 该注解在运行时保留。向注解中添加描述性文本会增加运行时内存开销。\n• 描述性文本不能只是纯文本。例如，它需要提供一个指向被弃用 API 替代品的链接。现有的\
  \ `@deprecated` Javadoc 标签已经提供了此功能。\n\n`forRemoval` 元素表示被注解的 API 元素将在未来版本中被移除，你应该迁移离开该\
  \ API。其默认值为 `false`。\n\n■ **提示** 元素上的 `@since` Javadoc 标签指示 API 元素何时被添加，而 `@Deprecated`\
  \ 注解的 `since` 元素则指示 API 元素何时被弃用。在 JDK 9 中，已做出合理努力，在 Java SE API 中 `@Deprecated`\
  \ 注解的大多数（如果不是全部）使用位置回填了这两个元素的值。\n\n在 JDK 9 之前，弃用警告是基于 API 元素及其使用位置上的 `@Deprecated`\
  \ 注解发出的，如表 15-1 所示。当弃用的 API 元素在非弃用的使用位置被使用时，会发出警告。如果声明及其使用位置都被弃用，则不会发出警告。你可以通过在使用位置添加\
  \ `@SuppressWarnings(\"deprecation\")` 注解来抑制弃用警告。\n\n***表 15-1.** JDK 9 之前发出的弃用警告矩阵*\n\
  \n**API 使用位置**\n\n**API 声明位置**\n\n未弃用\n\n已弃用\n\n未弃用\n\nN\n\nW\n\n已弃用\n\nN\n\nN\n\
  \n*N = 无警告，W = 警告*\n\n在 `@Deprecation` 注解类型中添加 `forRemoval` 元素又增加了五种使用情况。当 API 被弃用且\
  \ `forRemoval` 设置为 `false` 时，这种弃用被称为*普通弃用*，此类情况下发出的警告称为*普通弃用警告*。当 API 被弃用且 `forRemoval`\
  \ 设置为 `true` 时，这种弃用被称为*最终弃用*，此类情况下发出的警告称为*最终弃用警告*或*移除警告*。表 15-2 显示了 JDK 9 中发出的弃用警告矩阵。\n\
  \n***表 15-2.** JDK 9 中发出的弃用警告矩阵*\n\n**API 使用位置**\n\n**API 声明位置**\n\n未弃用\n\n普通弃用\n\
  \n最终弃用\n\n未弃用\n\nN\n\nOW\n\nRW\n\n普通弃用\n\nN\n\nN\n\nRW\n\n最终弃用\n\nN\n\nN\n\nRW\n\
  \nN = 无警告，OW = 普通弃用警告，RW = 移除弃用警告\n\n为了向后兼容，表 15-2 中左上角的四种使用情况与表 15-1 相同。也就是说，如果你的代码在\
  \ JDK 8 中生成了弃用警告，那么在 JDK 9 中它将继续生成普通弃用警告。如果 API 已被最终弃用，则无论使用位置是否被弃用，其使用位置都将生成移除警告。\n\
  \n在 JDK 9 中，有一种情况下发出的警告需要稍作解释，即 API 及其使用位置都被最终弃用时。API 和使用它的代码都已被弃用，并且都将在未来被移除，那么在这种情况下收到警告有什么意义呢？这样做是为了涵盖最终弃用的\
  \ API 及其使用位置位于两个不同代码库且独立维护的情况。\n\n\n\n如果使用方的代码库比 API 的代码库寿命更长，那么使用方将遇到意外的运行时错误，因为它所使用的\
  \ API 已不复存在。在使用方发出警告，可以让其维护者有机会规划替代方案，以防最终弃用的 API 在使用方代码之前被移除。\n\n抑制弃用警告\n\nJDK\
  \ 9 中引入的移除警告为抑制弃用警告增加了新的用例。\n\n在 JDK 9 之前，可以通过在使用方代码上添加 `@SuppressWarnings(\"deprecation\"\
  )` 注解来抑制所有弃用警告。考虑以下场景：\n\n• 在 JDK 8 中，某个 API 被弃用，使用方抑制了弃用警告。\n• 在 JDK 9 中，该 API\
  \ 的弃用状态从普通弃用变为最终弃用。\n• 使用方在 JDK 9 中编译正常，因为它已在 JDK 8 中抑制了弃用警告。\n• 该 API 被移除，使用方在未收到任何移除警告的情况下遇到了意外的运行时错误。\n\
  \n为了覆盖此类场景，JDK 9 在使用 `@SuppressWarnings(\"deprecation\")` 时不会抑制移除警告。它仅抑制普通弃用警告。要抑制移除警告，你需要使用\
  \ `@SuppressWarnings(\"removal\")`。如果你想同时抑制普通弃用和移除弃用警告，则需要使用 `@SuppressWarnings({\"\
  deprecation\", \"removal\"})`。\n\n第 15 章 ■ 增强的弃用机制\n\n一个弃用 API 的示例\n\n在本节中，我将通过一个简单示例，向你展示弃用\
  \ API 的所有用例，包括使用弃用 API 以及是否抑制警告。在示例中，我只弃用了方法，并使用它们生成编译时警告。不过，你并非只能弃用方法。方法上的注释应有助于你理解预期行为。清单\
  \ 15-2 包含一个名为 `Box` 的类的代码。该类包含三个方法——分别对应弃用的三种类别：未弃用、普通弃用和最终弃用。我让这个类保持简单，以便你可以专注于所使用的弃用机制。编译\
  \ `Box` 类不会生成任何弃用警告，因为该类并未使用任何弃用的 API，而是包含了弃用的 API。\n\n***清单 15-2.*** 包含三种类型方法的\
  \ Box 类：未弃用、普通弃用和最终弃用\n\n```java\n// Box.java\npackage com.jdojo.deprecation;\n\n\
  /**\n * 此类用于演示如何弃用 API。\n */\npublic class Box {\n\n    /**\n     * 未弃用\n     */\n\
  \    public static void notDeprecated() {\n        System.out.println(\"notDeprecated...\"\
  );\n    }\n\n    /**\n     * 普通弃用。\n     * @deprecated 请勿使用。\n     */\n    @Deprecated(since=\"\
  2\")\n    public static void deprecatedOrdinarily() {\n        System.out.println(\"\
  deprecatedOrdinarily...\");\n    }\n\n    /**\n     * 最终弃用。\n     * @deprecated\
  \ 将在未来版本中移除。\n     * 请迁移你的代码。\n     */\n    @Deprecated(since=\"2\", forRemoval=true)\n\
  \    public static void deprecatedTerminally() {\n        System.out.println(\"\
  deprecatedTerminally...\");\n    }\n}\n```\n\n清单 15-3 包含一个 `BoxTest` 类的代码。该类使用了\
