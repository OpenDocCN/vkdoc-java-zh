  \ 方法获取当前运行进程（即一个 Java 进程）的句柄，并打印其详细信息。你得到的输出可能不同。以下输出是在 Windows 10 上运行该程序时生成的。\n\
  \n***清单 12-2.*** 一个打印当前进程详细信息的 CurrentProcessInfo 类\n\n// CurrentProcessInfo.java\n\
