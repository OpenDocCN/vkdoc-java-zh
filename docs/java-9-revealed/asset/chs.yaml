  \ {\n\nSystem.out.println(e.getMessage());\n\n}\n\ntry {\n\n// 尝试添加元素\n\nluckyNumber.add(8);\n\
  \n} catch(UnsupportedOperationException e) {\n\nSystem.out.println(\"无法添加元素。\");\n\
  \n}\n\n第 13 章 ■ 集合 API 更新\n\ntry {\n\n// 尝试移除元素\n\nluckyNumber.remove(0);\n\n} catch(UnsupportedOperationException\
  \ e) {\n\nSystem.out.println(\"无法移除元素。\");\n\n}\n\n}\n\n}\n\nemptySet = []\n\nsingletonSet\
  \ = [19]\n\nvowels = [E, O, A, U, I]\n\nNulls not allowed in Set.of().\n\nduplicate\
  \ element: 2\n\nCannot add an element.\n\nCannot remove an element.\n\n不可修改的 Map\n\
  \n\n\nJDK 9 为 `Map` 接口新增了重载的 `of()` 静态工厂方法。它提供了一种简单紧凑的方式来创建不可修改的映射。这些方法的实现针对性能进行了微调。\n\
  \n以下是 `of()` 方法的 11 个版本，允许你创建包含零到十个键值条目的不可修改 `Map`：\n\n• `static <K,V> Map<K,V>\
  \ of()`\n\n• `static <K,V> Map<K,V> of(K k1, V v1)`\n\n• `static <K,V> Map<K,V>\
  \ of(K k1, V v1, K k2, V v2)`\n\n• `static <K,V> Map<K,V> of(K k1, V v1, K k2, V\
  \ v2, K k3, V v3)`\n\n• `static <K,V> Map<K,V> of(K k1, V v1, K k2, V v2, K k3,\
  \ V v3, K k4, V v4)`\n\n• `static <K,V> Map<K,V> of(K k1, V v1, K k2, V v2, K k3,\
  \ V v3, K k4, V v4, K k5, V v5)`\n\n• `static <K,V> Map<K,V> of(K k1, V v1, K k2,\
  \ V v2, K k3, V v3, K k4, V v4, K k5, V v5, K k6, V v6)`\n\n• `static <K,V> Map<K,V>\
  \ of(K k1, V v1, K k2, V v2, K k3, V v3, K k4, V v4, K k5, V v5, K k6, V v6, K k7,\
  \ V v7)`\n\n• `static <K,V> Map<K,V> of(K k1, V v1, K k2, V v2, K k3, V v3, K k4,\
  \ V v4, K k5, V v5, K k6, V v6, K k7, V v7, K k8, V v8)`\n\n• `static <K,V> Map<K,V>\
  \ of(K k1, V v1, K k2, V v2, K k3, V v3, K k4, V v4, K k5, V v5, K k6, V v6, K k7,\
  \ V v7, K k8, V v8, K k9, V v9)`\n\n• `static <K,V> Map<K,V> of(K k1, V v1, K k2,\
  \ V v2, K k3, V v3, K k4, V v4, K k5, V v5, K k6, V v6, K k7, V v7, K k8, V v8,\
  \ K k9, V v9, K k10, V v10)`\n\n第 13 章 ■ 集合 API 更新\n\n注意 `of()` 方法中参数的位置。第一个和第二个参数分别是映射中第一个键值条目的键和值；第三个和第四个参数分别是映射中第二个键值条目的键和值；以此类推。请注意，`of()`\
  \ 方法没有像 `List` 和 `Set` 中那样的可变参数版本。这是因为一个 `Map` 条目包含两个值（键和值），而在 Java 中一个方法只能有一个可变参数。下面的代码片段展示了如何使用\
  \ `of()` 方法创建映射：\n\n```java\n// 一个空的、不可修改的 Map\nMap<Integer, String> emptyMap =\
  \ Map.of();\n\n// 一个单例的、不可修改的 Map\nMap<Integer, String> singletonMap = Map.of(1,\
  \ \"One\");\n\n// 一个包含两个条目的不可修改 Map\nMap<Integer, String> luckyNumbers = Map.of(1,\
  \ \"One\", 2, \"Two\");\n```\n\n为了创建包含任意数量条目的不可修改 `Map`，JDK 9 在 `Map` 接口中提供了一个名为\
  \ `ofEntries()` 的静态方法，其签名如下：\n\n```java\n<K,V> Map<K,V> ofEntries(Map.Entry<? extends\
  \ K,? extends V>... entries)\n```\n\n要使用 `ofEntries()` 方法，你需要将每个映射条目包装在 `Map.Entry`\
  \ 实例中。JDK 9 在 `Map` 接口中提供了一个便捷的 `entry()` 静态方法来创建 `Map.Entry` 实例。`entry()` 方法的签名如下：\n\
  \n```java\n<K,V> Map.Entry<K,V> entry(K k, V v)\n```\n\n为了使表达式可读且紧凑，你需要对 `Map.entry`\
  \ 方法进行静态导入，并使用类似下面的语句来创建包含任意数量条目的不可修改 `Map`：\n\n```java\nimport java.util.Map;\n\
  import static java.util.Map.entry;\n\n// ...\n\n// 使用 Map.ofEntries() 和 Map.entry()\
  \ 方法\n// 创建一个不可修改的 Map\nMap<Integer, String> numberToWord =\n    Map.ofEntries(entry(1,\
  \ \"One\"),\n                  entry(2, \"Two\"),\n                  entry(3, \"\
  Three\"));\n```\n\n从 `Map` 接口的 `of()` 和 `ofEntries()` 方法返回的映射具有以下特性：\n\n*   它们在结构上是不可变的。尝试添加、替换或删除条目会抛出\
  \ `UnsupportedOperationException`。\n*   它们不允许键或值为 `null`。如果映射中的键或值为 `null`，则会抛出\
  \ `NullPointerException`。\n\n第 13 章 ■ 集合 API 更新\n\n*   如果所有键和值都是可序列化的，则它们是可序列化的。\n\
  *   它们不允许重复的键。指定重复键会抛出 `IllegalArgumentException`。\n*   映射的迭代顺序是未指定的。\n*   不保证返回的\
  \ `Map` 的实现类。也就是说，不要期望返回的对象是 `HashMap` 或任何其他实现 `Map` 接口的类。这些方法的实现是内部的，你不应对它们的类名做任何假设。例如，`Map.of()`\
  \ 和 `Map.of(1, \"One\")` 可能返回两个不同类的对象。\n\n`Collections` 类包含一个名为 `EMPTY_MAP` 的静态字段，表示一个不可变的空映射。它还包含一个名为\
  \ `emptyMap()` 的静态方法来获取一个不可变的空映射。它的 `singletonMap(K key, V value)` 方法返回一个包含指定键和值的不可变单例映射。下面的代码片段展示了\
  \ JDK 9 之前和 JDK 9 中创建不可变空映射和单例映射的方式：\n\n```java\n// 在 JDK 9 之前创建一个空的、不可变的 Map\n\
  Map<Integer,String> emptyMap1 = Collections.EMPTY_MAP;\nMap<Integer,String> emptyMap2\
  \ = Collections.emptyMap();\n\n// 在 JDK 9 中创建一个空的 Map\nMap<Integer,String> emptyMap\
  \ = Map.of();\n\n// 在 JDK 9 之前创建一个单例的、不可变的 Map\nMap<Integer,String> singletonMap1\
  \ =\n    Collections.singletonMap(1, \"One\");\n\n// 在 JDK 9 中创建一个单例的、不可变的 Map\n\
  Map<Integer,String> singletonMap = Map.of(1, \"One\");\n```\n\n清单 13-4 包含一个完整的程序，展示了如何使用\
  \ `Map` 接口的 `of()`、`ofEntries()` 和 `entry()` 静态方法来创建不可修改的映射。请注意映射中指定日期的顺序以及它们在输出中显示的顺序。它们可能不匹配，因为映射（像集合一样）不保证其条目的检索顺序。\n\
  \n***清单 13-4.*** 使用 `Map.of()`、`Map.ofEntries()` 和 `Map.entry()` 静态方法创建不可修改的映射\n\
  \n```java\n// MapTest.java\npackage com.jdojo.collection;\n\nimport java.util.Map;\n\
  import static java.util.Map.entry;\n\npublic class MapTest {\n    public static\
  \ void main(String[] args) {\n        // 创建几个不可修改的映射\n        Map<Integer,String>\
  \ emptyMap = Map.of();\n        Map<Integer,String> luckyNumber = Map.of(19, \"\
  Nineteen\");\n        Map<Integer,String> numberToWord =\n            Map.of(1,\
  \ \"One\", 2, \"Two\", 3, \"Three\");\n\n        Map<String,String> days = Map.ofEntries(\n\
  \            entry(\"Mon\", \"Monday\"),\n            entry(\"Tue\", \"Tuesday\"\
  ),\n            entry(\"Wed\", \"Wednesday\"),\n            entry(\"Thu\", \"Thursday\"\
  ),\n            entry(\"Fri\", \"Friday\"),\n            entry(\"Sat\", \"Saturday\"\
  ),\n            entry(\"Sun\", \"Sunday\"));\n\n        System.out.println(\"emptyMap\
  \ = \" + emptyMap);\n        System.out.println(\"singletonMap = \" + luckyNumber);\n\
  \        System.out.println(\"numberToWord = \" + numberToWord);\n        System.out.println(\"\
  days = \" + days);\n\n        try {\n            // 尝试使用 null 值\n            Map<Integer,String>\
  \ map = Map.of(1, null);\n        } catch(NullPointerException e) {\n          \
  \  System.out.println(\"Map.of() 中不允许 null。\");\n        }\n\n        try {\n  \
  \          // 尝试使用重复键\n            Map<Integer,String> map = Map.of(1, \"One\",\
  \ 1, \"On\");\n        } catch(IllegalArgumentException e) {\n            System.out.println(e.getMessage());\n\
  \        }\n\n        try {\n            // 尝试添加一个条目\n            luckyNumber.put(8,\
  \ \"Eight\");\n        } catch(UnsupportedOperationException e) {\n            System.out.println(\"\
  无法添加条目。\");\n        }\n\n        try {\n            // 尝试移除一个条目\n            luckyNumber.remove(0);\n\
  \        } catch(UnsupportedOperationException e) {\n            System.out.println(\"\
  无法移除条目。\");\n        }\n    }\n}\n```\n\n```java\nemptyMap = {}\nsingletonMap =\
  \ {19=Nineteen}\nnumberToWord = {1=One, 3=Three, 2=Two}\ndays = {Sat=Saturday, Tue=Tuesday,\
  \ Thu=Thursday, Sun=Sunday, Wed=Wednesday, Fri=Friday, Mon=Monday}\nMap.of() 中不允许\
  \ null。\nduplicate key: 1\n无法添加条目。\n无法移除条目。\n```\n\n第 13 章 ■ 集合 API 更新\n\n总结\n\n\
  \n\nJava 语言中对集合字面量的支持一直是其亟需的特性。JDK 9 并未直接提供对集合字面量的支持，而是更新了 Collection API，在 List、Set\
  \ 和 Map 接口中新增了静态工厂方法，这些方法分别返回不可修改的 List、Set 和 Map。该方法名为 `of()`。该方法被重载，允许你指定零到十个集合元素。List\
  \ 和 Set 接口提供了一个接受可变参数的 `of()` 方法版本，让你可以创建包含任意数量元素的 List 和 Set。Map 接口提供了一个 `ofEntries()`\
  \ 静态工厂方法，让你可以创建包含任意数量条目的不可修改 Map。Map 接口还包含一个静态的 `entry()` 方法，该方法接受一个键和一个值作为参数，并返回一个\
  \ `Map.Entry` 实例。`ofEntries()` 和 `entry()` 方法通常一起使用，以创建包含任意数量条目的不可修改 Map。\n\n这些接口中的新静态工厂方法针对性能进行了微调。`List.of()`\
  \ 和 `Set.of()` 方法不允许 `null` 元素。`Set.of()` 方法不允许重复元素。\n\n`Map.of()` 和 `Map.ofEntries()`\
  \ 方法不允许重复的键，也不允许键或值为 `null`。\n\n**第 14 章**\n\n**HTTP/2 客户端 API**\n\n在本章中，你将学习：\n\
  \n• 什么是 HTTP/2 客户端 API\n\n• 如何创建 HTTP 客户端\n\n• 如何发起 HTTP 请求\n\n• 如何接收 HTTP 响应\n\n\
  • 如何创建 WebSocket 端点\n\n• 如何将未经请求的数据从服务器推送到客户端\n\nJDK 9 将 HTTP/2 客户端 API 作为一个孵化器模块提供，模块名为\
  \ `jdk.incubator.httpclient`。\n\n该模块导出一个包含所有公共 API 的 `jdk.incubator.http` 包。孵化器模块不属于\
  \ Java SE 的一部分。在 Java SE 10 中，它要么被标准化并成为 Java SE 10 的一部分，要么被移除。请访问网页 [`openjdk.java.net/jeps/11`](http://openjdk.java.net/jeps/11)\
  \ 了解更多关于 JDK 中孵化器模块的信息。\n\n孵化器模块在编译时或运行时默认不会被解析，因此你需要使用 `--add-modules` 选项将 `jdk.incubator.httpclient`\
  \ 模块添加到默认的根模块集中，如下所示：\n\n<javac|java|jmod...> -add-modules jdk.incubator.httpclient\
  \ ...\n\n如果一个孵化器模块被另一个模块读取，并且第二个模块被解析，那么该孵化器模块也会被解析。\n\n在本章中，你将创建一个读取 `jdk.incubator.httpclient`\
  \ 模块的模块，并且无需使用 `-add-modules` 选项来解析它。\n\n由于孵化器模块提供的 API 尚未最终确定，当你在编译时或运行时使用孵化器模块时，标准错误输出会打印一条警告。警告信息如下所示：WARNING:\
  \ Using incubator modules: jdk.incubator.httpclient\n\n孵化器模块以及包含孵化器 API 的包的名称都以\
  \ `jdk.incubator` 开头。\n\n一旦它们被标准化并纳入 Java SE，其名称将更改为使用标准的 Java 命名约定。例如，模块名 `jdk.incubator.httpclient`\
  \ 在 Java SE 10 中可能会变为 `java.httpclient`。\n\n© Kishori Sharan 2017\nK. Sharan, *Java\
  \ 9 Revealed*, DOI 10.1007/978-1-4842-2592-9_14\n\n第 14 章 ■ HTTP/2 客户端 API\n\n由于\
  \ `jdk.incubator.httpclient` 模块尚不属于 Java SE，你找不到该模块的 Javadoc。我生成了该模块的 Javadoc，并将其包含在本书的源代码中。你可以通过下载的源代码中的\
  \ `Java9Revealed/jdk.incubator.httpclient/dist/javadoc/index.html` 文件访问该 Javadoc。我使用\
  \ JDK 9 早期访问版本 build 158 生成了该 Javadoc。API 可能会发生变化，你可能需要重新生成 Javadoc。操作方法如下：\n\n\
  1.  本书的源代码包含一个 `jdk.incubator.httpclient` NetBeans 项目，位于与项目同名的目录中。\n\n2.  当你安装 JDK\
  \ 9 时，其源代码会以 `src.zip` 文件的形式复制到安装目录中。将 `src.zip` 文件中 `jdk.incubator.httpclient`\
  \ 目录下的所有内容复制到下载源代码中的 `Java9revealed\\jdk.incubator.httpclient\\src` 目录。\n\n3.  在\
  \ NetBeans 中打开 `jdk.incubator.httpclient` 项目。\n\n4.  右键单击 NetBeans 中的项目节点，然后选择“生成\
  \ Javadoc”选项。你会遇到一些错误和一个警告，可以忽略它们。它将在 `Java9Revealed/jdk.incubator.httpclient/dist/javadoc`\
  \ 目录中生成 Javadoc。打开此目录中的 `index.html` 文件，查看 `jdk.incubator.httpclient` 模块的 Javadoc。\n\
  \n什么是 HTTP/2 客户端 API？\n\n自 JDK 1.0 以来，Java 就支持 HTTP/1.1。HTTP API 由 `java.net` 包中的几种类型组成。\n\
  \n现有的 API 存在以下问题：\n\n• 它被设计为支持多种协议，如 http、ftp、gopher 等，其中许多协议已不再使用。\n\n• 它过于抽象且难以使用。\n\
  \n• 它包含许多未记录的行为。\n\n• 它仅支持一种模式，即阻塞模式，这要求每个请求/响应都有一个线程。\n\n2015 年 5 月，互联网工程任务组 (IETF)\
  \ 发布了 HTTP/2 的规范。请访问网页 [`tools.ietf.org/html/rfc7540`](https://tools.ietf.org/html/rfc7540)\
  \ 获取 HTTP/2 规范的完整文本。\n\nHTTP/2 并未修改应用层语义。也就是说，你在应用程序中了解并一直使用的 HTTP 协议内容没有改变。它采用了一种更高效的方式来准备数据包并在客户端和服务器之间进行传输。你之前了解的所有关于\
  \ HTTP 的知识，例如 HTTP 头、方法、状态码、URL 等，都保持不变。HTTP/2 试图解决 HTTP/1 连接面临的许多与性能相关的问题：\n\n\
  • HTTP/2 支持二进制数据交换，而不是 HTTP/1.1 支持的文本数据。\n\n• HTTP/2 支持多路复用和并发，这意味着在 TCP 连接的两个方向上可以同时进行多个数据交换，并且对请求的响应可以乱序接收。这消除了对等点之间建立多个连接的开销，而这在使用\
  \ HTTP/1.1 时通常是必需的。在 HTTP/1.1 中，必须按照发送请求的顺序接收响应，这被称为*队头*阻塞。HTTP/2 通过在同一 TCP 连接上启用多路复用，解决了队头阻塞问题。\n\
  \n第 14 章 ■ HTTP/2 客户端 API\n\n• 客户端可以建议请求的优先级，服务器在确定响应优先级时可能会考虑该建议。\n\n• HTTP 头部被压缩，这显著减小了头部大小，从而降低了延迟。\n\
  \n• 它允许服务器向客户端主动推送资源。\n\nJDK 9 没有更新现有的 HTTP/1.1 API，而是提供了一个新的 HTTP/2 客户端 API，该 API\
  \ 同时支持 HTTP/1.1 和 HTTP/2。该 API 旨在最终取代旧的 API。新的 API 还包含用于使用 WebSocket 协议开发客户端应用程序的类和接口。\n\
  \n请访问网页 [`tools.ietf.org/html/rfc6455`](https://tools.ietf.org/html/rfc6455) 获取完整的\
  \ WebSocket 协议规范。与现有 API 相比，新的 HTTP/2 客户端 API 具有以下几个优点：\n\n• 对于大多数常见情况，它简单、易学且易用。\n\
  \n• 它提供基于事件的通知。例如，当接收到头部、接收到主体以及发生错误时，它会生成通知。\n\n• 它支持服务器推送，允许服务器在客户端没有显式请求的情况下将资源推送给客户端。它简化了与服务器建立\
  \ WebSocket 通信的过程。\n\n• 它支持 HTTP/2 和 HTTPS/TLS 协议。\n\n• 它可以在同步（阻塞模式）和异步（非阻塞模式）两种模式下工作。\n\
  \n\n\n新的 API 由不到 20 种类型组成，其中四种是主要类型。其他类型在使用这四种类型之一时会被用到。新 API 还使用了旧 API 中的少数类型。新\
  \ API 位于`jdk.incubator.httpclient`模块的`jdk.incubator.http`包中。主要类型包括三个抽象类和一个接口：\n\n\
  • `HttpClient`类\n• `HttpRequest`类\n• `HttpResponse`类\n• `WebSocket`接口\n\n`HttpClient`类的实例是一个存储配置的容器，这些配置可用于多个\
  \ HTTP 请求，而无需为每个请求单独设置。`HttpRequest`类的实例表示一个可发送到服务器的 HTTP 请求。`HttpResponse`类的实例表示一个\
  \ HTTP 响应。`WebSocket`接口的实例表示一个 WebSocket 客户端。你可以使用 Java EE 7 WebSocket API 创建 WebSocket\
  \ 服务器。本章末尾我将展示一个创建 WebSocket 客户端和服务器的示例。\n\n`HttpClient`、`HttpRequest`和`WebSocket`的实例通过构建器创建。每种类型都包含一个名为`Builder`的嵌套类/接口，用于构建该类型的实例。请注意，你不需要创建`HttpResponse`；它会作为你发起的\
  \ HTTP 请求的一部分返回给你。新的 HTTP/2 客户端 API 使用起来非常简单，你甚至可以用一条语句读取 HTTP 资源！以下代码片段使用 GET HTTP\
  \ 请求将 URL [`www.google.com/`](https://www.google.com/) 的内容读取为字符串：\n\n```java\nString\
  \ responseBody = HttpClient.newHttpClient()\n    .send(HttpRequest.newBuilder(new\
  \ URI(\"https://www.google.com/\"))\n        .GET()\n        .build(), BodyHandler.asString())\n\
  \    .body();\n```\n\n处理 HTTP 请求的典型步骤如下：\n\n• 创建一个 HTTP 客户端对象来存储 HTTP 配置信息。\n• 创建一个\
  \ HTTP 请求对象，并填充要发送到服务器的信息。\n• 将 HTTP 请求发送到服务器。\n• 接收来自服务器的 HTTP 响应对象作为响应。\n• 处理\
  \ HTTP 响应。\n\n### 设置示例\n\n本章中我使用了大量涉及与 Web 服务器交互的示例。我没有使用部署在互联网上的 Web 应用程序，而是在 NetBeans\
  \ 中创建了一个 Web 应用程序项目，你可以在本地部署它。如果你更喜欢使用其他 Web 应用程序，则需要更改示例中使用的 URL。\n\nNetBeans Web\
  \ 应用程序位于本书源代码的`webapp`目录中。我通过在 GlassFish 服务器 4.1.1 和 Tomcat 8/9 上部署该 Web 应用程序来测试示例。你可以从[`netbeans.org/`](https://netbeans.org/)\
  \ 下载包含 GlassFish 服务器的 NetBeans IDE。我在 GlassFish 服务器的 8080 端口运行 HTTP 监听器。如果你在不同的端口上运行，则需要更改示例\
  \ URL 中的端口号。\n\n本章的所有 HTTP 客户端程序都位于本书源代码的`com.jdojo.http.client`目录中。它们位于`com.jdojo.http.client`模块中，其声明如清单\
  \ 14-1 所示。\n\n***清单 14-1.*** 名为`com.jdojo.http.client`的模块的模块声明\n\n```java\n// module-info.java\n\
  module com.jdojo.http.client {\n    requires jdk.incubator.httpclient;\n}\n```\n\
  \n### 创建 HTTP 客户端\n\n发送到服务器的 HTTP 请求需要进行配置，以便服务器知道要使用哪个认证器、SSL 配置细节、要使用的 Cookie\
  \ 管理器、代理信息、如果服务器重定向请求时的重定向策略等。`HttpClient`类的实例存储这些特定于请求的配置，并且它们可以重复用于多个请求。你可以按请求覆盖其中的一些配置。当你发送\
  \ HTTP 请求时，需要指定将为此请求提供配置信息的`HttpClient`对象。一个`HttpClient`保存以下所有 HTTP 请求都会使用的信息：认证器、Cookie\
  \ 管理器、执行器、重定向策略、请求优先级、代理选择器、SSL 上下文、SSL 参数和 HTTP 版本。\n\n*认证器*是`java.net.Authenticator`类的一个实例。它用于\
  \ HTTP 认证。默认情况下不使用认证器。\n\n*Cookie 管理器*用于管理 HTTP Cookie。它是`java.net.CookieManager`类的一个实例。默认情况下不使用\
  \ Cookie 管理器。\n\n*执行器*是`java.util.concurrent.Executor`接口的一个实例，用于发送和接收异步 HTTP 请求和响应。如果未指定，则会提供一个默认执行器。\n\
  \n*重定向策略*是`HttpClient.Redirect`枚举的常量之一，用于指定如何处理服务器发出的重定向。默认值是`NEVER`，这意味着永远不会跟随服务器发出的重定向。\n\
  \n*请求优先级*是 HTTP/2 请求的默认优先级，其值可以在 1 到 256（含）之间。这是给服务器的一个提示，用于优先处理请求。值越高表示优先级越高。\n\
  \n*代理选择器*是`java.net.ProxySelector`类的一个实例，用于选择要使用的代理服务器。默认情况下不使用代理服务器。\n\n*SSL 上下文*是`javax.net.ssl.SSLContext`类的一个实例，为安全套接字协议提供实现。当你不需要指定协议或不需要客户端认证时，会提供一个默认的`SSLContext`。\n\
  \n*SSL 参数*是 SSL/TLS/DTLS 连接的参数。它们存储在`javax.net.ssl.SSLParameters`类的一个实例中。\n\nHTTP\
  \ 版本是 HTTP 的版本，可以是 1.1 或 2。它被指定为`HttpClient.Version`枚举的常量之一：`HTTP_1_1`和`HTTP_2`。它尽可能请求特定的\
  \ HTTP 协议版本。默认值是`HTTP_1_1`。\n\n■ **提示** `HttpClient`是不可变的。在构建 HTTP 请求时，`HttpClient`中存储的一些配置可能会被覆盖。\n\
  \n`HttpClient`类是抽象的，你不能直接创建它的对象。有两种方法可以创建`HttpClient`对象：\n\n• 使用`HttpClient`类的`newHttpClient()`静态方法\n\
  • 使用`HttpClient.Builder`类的`build()`方法\n\n以下代码片段获取一个默认的`HttpClient`对象：\n\n```java\n\
  // 获取默认的 HttpClient\nHttpClient defaultClient = HttpClient.newHttpClient();\n```\n\
  \n你也可以使用`HttpClient.Builder`类创建`HttpClient`。`HttpClient.newBuilder()`静态方法返回`HttpClient.Builder`类的一个新实例。`HttpClient.Builder`类为每个配置值提供了一个设置方法。配置值作为方法的参数指定，并且该方法返回构建器对象本身的引用，因此你可以链式调用多个方法。最后，调用`build()`方法返回一个`HttpClient`对象。以下语句创建了一个`HttpClient`，其重定向策略设置为`ALWAYS`，HTTP\
  \ 版本设置为`HTTP_2`：\n\n```java\n// 创建一个自定义的 HttpClient\nHttpClient httpClient = HttpClient.newBuilder()\n\
  \    .followRedirects(HttpClient.Redirect.ALWAYS)\n    .version(HttpClient.Version.HTTP_2)\n\
  \    .build();\n```\n\n\n\n`HttpClient` 类包含一个与每个配置设置相对应的方法，该方法返回该配置的值。这些方法如下：\n\n\
  • `Optional<Authenticator> authenticator()`\n\n• `Optional<CookieManager> cookieManager()`\n\
  \n• `Executor executor()`\n\n• `HttpClient.Redirect followRedirects()`\n\n第 14 章\
  \ ■ HTTP/2 客户端 API\n\n• `Optional<ProxySelector> proxy()`\n\n• `SSLContext sslContext()`\n\
  \n• `Optional<SSLParameters> sslParameters()`\n\n• `HttpClient.Version version()`\n\
  \n请注意，`HttpClient` 类中没有设置器（setter），因为它是不可变的。你不能单独使用 `HttpClient` 对象。在使用 `HttpClient`\
  \ 对象向服务器发送请求之前，你需要先使用 `HttpRequest` 对象。我将在下一节中解释 `HttpRequest` 类。`HttpClient` 类包含以下三种向服务器发送请求的方法：\n\
  \n• `<T> HttpResponse<T> send(HttpRequest req, HttpResponse.BodyHandler<T> responseBodyHandler)`\n\
  \n• `<T> CompletableFuture<HttpResponse<T>> sendAsync(HttpRequest req, HttpResponse.BodyHandler<T>\
  \ responseBodyHandler)`\n\n• `<U,T> CompletableFuture<U> sendAsync(HttpRequest req,\
  \ HttpResponse.MultiProcessor<U,T> multiProcessor)`\n\n`send()` 方法同步发送请求，而 `sendAsync()`\
  \ 方法则异步发送请求。我将在后续章节中更详细地介绍这些方法。\n\n处理 HTTP 请求\n\n客户端应用程序使用 HTTP 请求与 Web 服务器通信。它向服务器发送一个请求，服务器会返回一个\
  \ HTTP 响应。`HttpRequest` 类的实例代表一个 HTTP 请求。以下是处理 HTTP 请求所需执行的步骤：\n\n• 获取一个 HTTP 请求构建器\n\
  \n• 设置请求的参数\n\n• 从构建器创建一个 HTTP 请求\n\n• 同步或异步地向服务器发送 HTTP 请求\n\n• 处理来自服务器的响应\n\n\
  获取 HTTP 请求构建器\n\n你需要使用一个构建器对象（即 `HttpRequest.Builder` 类的实例）来创建 `HttpRequest`。你可以使用\
  \ `HttpRequest` 类的以下静态方法之一来获取 `HttpRequest.Builder`：\n\n• `HttpRequest.Builder newBuilder()`\n\
  \n• `HttpRequest.Builder newBuilder(URI uri)`\n\n第 14 章 ■ HTTP/2 客户端 API\n\n以下代码片段展示了如何使用这些方法来获取\
  \ `HttpRequest.Builder` 实例：\n\n```java\n// 指向谷歌的 URI\nURI googleUri = new URI(\"\
  http://www.google.com\");\n\n// 为谷歌 URI 获取一个构建器\nHttpRequest.Builder builder1 =\
  \ HttpRequest.newBuilder(googleUri);\n\n// 获取一个构建器，此时不指定 URI\nHttpRequest.Builder\
  \ builder2 = HttpRequest.newBuilder();\n```\n\n设置 HTTP 请求参数\n\n一旦你有了 HTTP 请求构建器，就可以使用构建器的方法为请求设置不同的参数。所有方法都返回构建器本身，因此你可以将它们链式调用。这些方法如下：\n\
  \n• `HttpRequest.Builder DELETE(HttpRequest.BodyProcessor body)`\n\n• `HttpRequest.Builder\
  \ expectContinue(boolean enable)`\n\n• `HttpRequest.Builder GET()`\n\n• `HttpRequest.Builder\
  \ header(String name, String value)`\n\n• `HttpRequest.Builder headers(String...\
  \ headers)`\n\n• `HttpRequest.Builder method(String method, HttpRequest.BodyProcessor\
  \ body)`\n\n• `HttpRequest.Builder POST(HttpRequest.BodyProcessor body)`\n\n• `HttpRequest.Builder\
  \ PUT(HttpRequest.BodyProcessor body)`\n\n• `HttpRequest.Builder setHeader(String\
  \ name, String value)`\n\n• `HttpRequest.Builder timeout(Duration duration)`\n\n\
  • `HttpRequest.Builder uri(URI uri)`\n\n• `HttpRequest.Builder version(HttpClient.Version\
  \ version)`\n\n`HttpRequest` 通过 `HttpClient` 发送到服务器。在构建 HTTP 请求时，你可以通过其 `HttpRequest.Builder`\
  \ 对象使用 `version()` 方法设置 HTTP 版本值，该方法将覆盖发送此请求时在 `HttpClient` 中设置的 HTTP 版本。以下代码片段将请求的\
  \ HTTP 版本设置为 2.0，这会覆盖默认 `HttpClient` 对象中的默认值 `NEVER`：\n\n```java\n// 默认情况下，客户端使用\
  \ HTTP 1.1。使用此客户端发送的所有请求\n```\n\n\n// 除非被请求覆盖，否则 HttpClient 将使用 HTTP 1.1\n\nHttpClient\
  \ client = HttpClient.newHttpClient();\n\n// 指向谷歌的 URI\n\nURI googleUri = new URI(\"\
  http://www.google.com\");\n\n第 14 章 ■ HTTP/2 客户端 API\n\n// 获取一个使用 HTTP 2.0 的 HttpRequest\n\
  \nHttpRequest request = HttpRequest.newBuilder(googleUri)\n\n.version(HttpClient.Version.HTTP_2)\n\
  \n.build();\n\n// 客户端对象包含的 HTTP 版本为 1.1，而请求\n\n// 对象包含的 HTTP 版本为 2.0。以下语句将\n\n//\
  \ 使用请求对象中的 HTTP 2.0 发送请求。\n\nHttpResponse<String> r = client.send(request, BodyHandler.asString());\n\
  \n`timeout()` 方法为请求指定了一个超时时间。如果在指定的超时时间内未收到响应，则会抛出 `HttpTimeoutException`。\n\n一个\
  \ HTTP 请求可能包含一个名为 `expect` 且值为 `\"100-Continue\"` 的标头。如果设置了此标头，客户端仅向服务器发送标头，并且期望服务器发回一个错误响应或一个\
  \ `100-Continue` 响应。收到此响应后，客户端再将请求体发送给服务器。客户端使用此技术，在发送实际请求体之前，根据请求的标头检查服务器是否能够处理该请求。此标头默认不设置。你需要调用请求构建器的\
  \ `expectContinue(true)` 方法来启用它。请注意，调用请求构建器的 `header(\"expect\", \"100-Continue\"\
  )` 方法并不会启用此功能。你必须使用 `expectContinue(true)` 方法来启用它。\n\n// 在请求中启用 expect=100-Continue\
  \ 标头\n\nHttpRequest.Builder builder = HttpRequest.newBuilder()\n\n.expectContinue(true);\n\
  \n以下章节描述了如何设置 HTTP 请求的标头、请求体和请求方法。\n\n设置请求标头\n\nHTTP 请求中的标头是一个名称-值对。你可以拥有多个标头。你可以使用\
  \ `HttpRequest.Builder` 类的 `header()`、`headers()` 和 `setHeader()` 方法来向请求添加标头。如果标头尚未存在，`header()`\
  \ 和 `headers()` 方法会添加它们。如果标头已经添加，这些方法则不执行任何操作。`setHeader()` 方法会替换已存在的标头；否则，它会添加该标头。\n\
  \n`header()` 和 `setHeader()` 方法允许你一次添加/设置一个标头，而 `headers()` 方法允许你一次添加多个标头。`headers()`\
  \ 方法接受一个可变参数，该参数应按顺序包含名称-值对。以下代码片段展示了如何为 HTTP 请求设置标头：\n\n// 创建一个 URI\n\nURI calc\
  \ = new URI(\"http://localhost:8080/webapp/Calculator\");\n\n// 使用 header() 方法\n\
  \nHttpRequest.Builder builder1 = HttpRequest.newBuilder(calc)\n\n.header(\"Content-Type\"\
  , \"application/x-www-form-urlencoded\")\n\n.header(\"Accept\", \"text/plain\");\n\
  \n// 使用 headers() 方法\n\nHttpRequest.Builder builder2 = HttpRequest.newBuilder(calc)\n\
  \n.headers(\"Content-Type\", \"application/x-www-form-urlencoded\",\n\n\"Accept\"\
  , \"text/plain\");\n\n第 14 章 ■ HTTP/2 客户端 API\n\n// 使用 setHeader() 方法\n\nHttpRequest.Builder\
  \ builder3 = HttpRequest.newBuilder(calc)\n\n.setHeader(\"Content-Type\", \"application/x-www-form-urlencoded\"\
  )\n\n.setHeader(\"Accept\", \"text/plain\");\n\n设置请求体\n\n某些 HTTP 请求（例如使用 POST 和\
  \ PUT 方法的请求）的请求体包含数据。\n\nHTTP 请求的请求体是使用一个请求体处理器设置的，它是一个名为 `HttpRequest.BodyProcessor`\
  \ 的静态嵌套接口。`HttpRequest.BodyProcessor` 接口包含以下静态工厂方法，这些方法返回一个用于 HTTP 请求的请求体处理器，该处理器从特定类型的源（例如\
  \ `String`、`byte[]` 或 `File`）提供请求体：\n\n• `HttpRequest.BodyProcessor fromByteArray(byte[]\
  \ buf)`\n\n• `HttpRequest.BodyProcessor fromByteArray(byte[] buf, int offset, int\
  \ length)`\n\n• `HttpRequest.BodyProcessor fromByteArrays(Iterable<byte[]> iter)`\n\
  \n• `HttpRequest.BodyProcessor fromFile(Path path)`\n\n• `HttpRequest.BodyProcessor\
  \ fromInputStream(Supplier<? extends InputStream> streamSupplier)`\n\n\n\n• `HttpRequest.BodyProcessor\
  \ fromString(String body)`\n\n• `HttpRequest.BodyProcessor fromString(String s,\
  \ Charset charset)`\n\n这些方法的第一个参数指定了请求体数据的来源。例如，如果请求体由 `String` 对象提供，你可以使用 `fromString(String\
  \ body)` 方法来获取一个主体处理器。\n\n■ **提示** `HttpRequest` 类包含一个静态的 `noBody()` 方法，该方法返回一个\
  \ `HttpRequest.BodyProcessor`，用于处理无请求体的情况。通常，当某个 HTTP 方法不接受请求体，但 `method()` 方法要求你传递一个主体处理器时，你会将此方法与\
  \ `method()` 方法结合使用。\n\n请求是否可以包含主体取决于用于发送请求的 HTTP 方法。`DELETE`、`POST` 和 `PUT` 方法包含主体，而\
  \ `GET` 方法则不包含。`HttpRequest.Builder` 类包含一个与 HTTP 方法名称相同的方法，用于设置请求的方法和主体。例如，要使用带有主体的\
  \ `POST` 方法，构建器有一个 `POST(HttpRequest.BodyProcessor body)` 方法。\n\n还有许多其他 HTTP 方法，例如\
  \ `HEAD` 和 `OPTIONS`，它们在 `HttpRequest.Builder` 类中没有对应的方法。该类包含一个 `method(String method,\
  \ HttpRequest.BodyProcessor body)` 方法，你可以将其用于任何 HTTP 方法。使用 `method()` 方法时，请确保以全大写形式指定方法名称——例如，`GET`、`POST`、`HEAD`\
  \ 等。以下是这些方法的列表：\n\n• `HttpRequest.Builder DELETE(HttpRequest.BodyProcessor body)`\n\
  \n• `HttpRequest.Builder method(String method, HttpRequest.BodyProcessor body)`\n\
  \n第 14 章 ■ HTTP/2 客户端 API\n\n• `HttpRequest.Builder POST(HttpRequest.BodyProcessor\
  \ body)`\n\n• `HttpRequest.Builder PUT(HttpRequest.BodyProcessor body)`\n\n以下代码片段从一个\
  \ `String` 设置 HTTP 请求的主体，这通常在向 URL 提交 HTML 表单时完成。表单数据包含三个字段，分别命名为 `n1`、`n2` 和 `op`。\n\
  \n```java\nURI calc = new URI(\"http://localhost:8080/webapp/Calculator\");\n\n\
  // 组合表单数据，其中 n1 = 10, n2 = 20, op = +\nString formData = \"n1=\" + URLEncoder.encode(\"\
  10\",\"UTF-8\") +\n                  \"&n2=\" + URLEncoder.encode(\"20\",\"UTF-8\"\
  ) +\n                  \"&op=\" + URLEncoder.encode(\"+\",\"UTF-8\") ;\n\nHttpRequest.Builder\
  \ builder = HttpRequest.newBuilder(calc)\n    .header(\"Content-Type\", \"application/x-www-form-urlencoded\"\
  )\n    .header(\"Accept\", \"text/plain\")\n    .POST(HttpRequest.BodyProcessor.fromString(formData));\n\
  ```\n\n**创建 HTTP 请求**\n\n在前面的章节中，你学习了如何创建 `HttpRequest.Builder` 以及如何使用它来设置 HTTP\
  \ 请求的不同属性。创建 HTTP 请求只需在 `HttpRequest.Builder` 上调用 `build()` 方法，该方法会返回一个 `HttpRequest`\
  \ 对象。以下代码片段创建了一个使用 HTTP `GET` 方法的 `HttpRequest`：\n\n```java\nHttpRequest request\
  \ = HttpRequest.newBuilder()\n    .uri(new URI(\"http://www.google.com\"))\n   \
  \ .GET()\n    .build();\n```\n\n以下代码片段构建了一个带有头部和主体的 `HttpRequest`，该请求使用 HTTP `POST`\
  \ 方法：\n\n```java\n// 构建 URI 和表单数据\nURI calc = new URI(\"http://localhost:8080/webapp/Calculator\"\
  );\nString formData = \"n1=\" + URLEncoder.encode(\"10\",\"UTF-8\") +\n        \
  \          \"&n2=\" + URLEncoder.encode(\"20\",\"UTF-8\") +\n                  \"\
  &op=\" + URLEncoder.encode(\"+\",\"UTF-8\");\n\n// 构建 HttpRequest 对象\nHttpRequest\
  \ request = HttpRequest.newBuilder(calc)\n    .header(\"Content-Type\", \"application/x-www-form-urlencoded\"\
  )\n    .header(\"Accept\", \"text/plain\")\n    .POST(HttpRequest.BodyProcessor.fromString(formData))\n\
  \    .build();\n```\n\n请注意，创建 `HttpRequest` 对象并不会将请求发送到服务器。你需要调用 `HttpClient` 类的\
  \ `send()` 或 `sendAsync()` 方法将请求发送到服务器。在前面的示例中，请求对象就像任何其他 Java 对象一样。我将在下一节中解释如何向服务器发送请求。\n\
  \n第 14 章 ■ HTTP/2 客户端 API\n\n以下代码片段创建了一个使用 HTTP `HEAD` 请求方法的 `HttpRequest` 对象。请注意，它使用了\
  \ `HttpRequest.Builder` 类的 `method()` 方法来指定 HTTP 方法。\n\n```java\nHttpRequest request\
  \ =\n    HttpRequest.newBuilder(new URI(\"http://www.google.com\"))\n        .method(\"\
  HEAD\", HttpRequest.noBody())\n        .build();\n```\n\n**处理 HTTP 响应**\n\n一旦你有了\
  \ `HttpRequest` 对象，就可以将请求发送到服务器，并同步或异步地接收响应。`HttpResponse<T>` 类的一个实例表示从服务器接收到的响应，其中类型参数\
  \ `T` 指示响应主体的类型，例如 `String`、`byte[]` 或 `Path`。你可以使用 `HttpRequest` 类中的以下方法之一来发送 HTTP\
  \ 请求并接收 HTTP 响应：\n\n• `<T> HttpResponse<T> send(HttpRequest req, HttpResponse.BodyHandler<T>\
  \ responseBodyHandler)`\n\n• `<T> CompletableFuture<HttpResponse<T>> sendAsync(HttpRequest\
  \ req, HttpResponse.BodyHandler<T> responseBodyHandler)`\n\n• `<U,T> CompletableFuture<U>\
  \ sendAsync(HttpRequest req, HttpResponse.MultiProcessor<U,T> multiProcessor)`\n\
  \n`send()` 方法是同步的。也就是说，它会阻塞直到收到响应。`sendAsync()` 方法异步处理响应。它会立即返回一个 `CompletableFuture<HttpResponse>`，当响应准备好被处理时，该对象完成。\n\
  \n**处理响应状态和头部**\n\nHTTP 响应包含状态码、头部和主体。一旦从服务器接收到状态码和头部，`HttpResponse` 对象就会变得可用，但此时主体尚未收到。\n\
  \n`HttpResponse` 类的 `statusCode()` 方法以 `int` 形式返回响应的状态码。\n\n`HttpResponse` 类的 `headers()`\
  \ 方法以 `HttpHeaders` 接口的实例形式返回响应的头部。`HttpHeaders` 接口包含以下方法，可以方便地按名称检索头部值，或将所有头部作为\
  \ `Map<String,List<String>>` 获取：\n\n• `List<String> allValues(String name)`\n\n\
  • `Optional<String> firstValue(String name)`\n\n• `Optional<Long> firstValueAsLong(String\
  \ name)`\n\n• `Map<String,List<String>> map()`\n\n清单 14-2 包含一个完整的程序，用于向 URL [`www.google.com`](http://www.google.com/)\
  \ 发送一个 `HEAD` 请求。它会打印接收到的响应的状态码和头部。你可能会得到不同的输出。\n\n第 14 章 ■ HTTP/2 客户端 API\n\n***清单\
  \ 14-2.*** 处理 HTTP 响应的状态码和头部\n\n```java\n// GoogleHeadersTest.java\npackage com.jdojo.http.client;\n\
  \nimport java.io.IOException;\nimport java.net.URI;\nimport java.net.URISyntaxException;\n\
  import jdk.incubator.http.HttpClient;\nimport jdk.incubator.http.HttpRequest;\n\
  import jdk.incubator.http.HttpResponse;\n\npublic class GoogleHeadersTest {\n  \
  \  public static void main(String[] args) {\n        try {\n            URI googleUri\
  \ = new URI(\"http://www.google.com\");\n            HttpClient client = HttpClient.newHttpClient();\n\
  \            HttpRequest request =\n                HttpRequest.newBuilder(googleUri)\n\
  \                    .method(\"HEAD\", HttpRequest.noBody())\n                 \
  \   .build();\n            HttpResponse<?> response =\n                client.send(request,\
  \ HttpResponse.BodyHandler.discard(null));\n\n            // 打印响应状态码和头部\n      \
  \      System.out.println(\"Response Status Code:\" +\n                response.statusCode());\n\
  \            System.out.println(\"Response Headers are:\");\n            response.headers()\n\
  \                .map()\n                .entrySet()\n                .forEach(System.out::println);\n\
  \        } catch (URISyntaxException | InterruptedException |\n                \
  \ IOException e) {\n            e.printStackTrace();\n        }\n    }\n}\n```\n\
