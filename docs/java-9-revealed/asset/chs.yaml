  \ 即将休眠 1 秒。\n\n作业 (pid=3684) 即将休眠 1 秒。\n\n**总结**\n\n进程 API 由用于处理原生进程的类和接口组成。自 1.0\
  \ 版本以来，Java SE 就通过 `Runtime` 和 `Process` 类提供了进程 API。它允许你创建新的原生进程、管理其 I/O 流以及销毁它们。Java\
  \ SE 的后续版本改进了该 API。直到 Java 9，开发人员不得不编写原生代码来获取基本信息，例如进程的 ID、用于启动进程的命令等。Java 9 添加了一个名为\
  \ `ProcessHandle` 的接口，它表示一个进程句柄。你可以使用进程句柄来查询和管理原生进程。\n\n第 12 章 ■ 进程 API 更新\n\n以下类和接口构成了进程\
  \ API：`Runtime`、`ProcessBuilder`、`ProcessBuilder.Redirect`、`Process`、`ProcessHandle`\
  \ 和 `ProcessHandle.Info`。\n\n`Runtime` 类的 `exec()` 方法用于启动一个原生进程。`ProcessBuilder`\
  \ 类的 `start()` 方法比 `Runtime` 类的 `exec()` 方法更受青睐，用于启动进程。`ProcessBuilder.Redirect`\
  \ 类的实例表示进程的输入源或进程的输出目标。\n\n`Process` 类的实例表示由 Java 程序创建的原生进程。\n\n\n\n`ProcessHandle`\
  \ 接口的实例代表由 Java 程序或其他方式创建的进程；该接口在 Java 9 中引入，提供了多种查询和管理进程的方法。`ProcessHandle.Info`\
  \ 接口的实例代表进程的快照信息；可通过 `Process` 类或 `ProcessHandle` 接口的 `info()` 方法获取。如果你有一个 `Process`\
  \ 实例，可使用其 `toHandle()` 方法获取 `ProcessHandle`。\n\n`ProcessHandle` 接口的 `onExit()` 方法会返回一个\
  \ `CompletableFuture<ProcessHandle>`，用于处理进程终止事件。你可以利用返回的对象添加一个任务，该任务将在进程终止时执行。请注意，你不能对当前进程使用此方法。\n\
  \n如果安装了安全管理器，应用程序需要拥有 `\"manageProcess\"` 的 `RuntimePermission` 才能查询和管理原生进程，并且对于从\
  \ Java 代码启动的进程的命令文件，还需要拥有 `\"execute\"` 的 `FilePermission`。\n\n**第 13 章**\n\n**Collection\
  \ API 更新**\n\n在本章中，你将学习：\n\n• 在 JDK 9 之前如何创建不可修改的列表、集合和映射，以及使用它们时存在的问题。\n\n• 如何在\
  \ JDK 9 中使用 `List` 接口的 `of()` 静态工厂方法创建不可修改的列表。\n\n• 如何在 JDK 9 中使用 `Set` 接口的 `of()`\
  \ 静态工厂方法创建不可修改的集合。\n\n• 如何在 JDK 9 中使用 `Map` 接口的 `of()`、`ofEntries()` 和 `entry()`\
  \ 静态工厂方法创建不可修改的映射。\n\n背景\n\nCollection API 由类和接口组成，提供了一种存储和操作不同类型对象集合（如列表、集合和映射）的方式。它是在\
  \ Java SE 1.2 中添加的。Java 编程语言不支持集合字面量，而集合字面量是一种简单易用的声明和初始化集合的方式。集合字面量允许你通过以紧凑形式在表达式中指定集合元素来创建特定类型的集合。集合字面量的一个例子是\
  \ `List` 字面量，它允许你创建一个包含两个整数 100 和 200 的列表，如下所示：\n\n`List<Integer> list = [100, 200];`\n\
  \n集合字面量紧凑且易于使用。它可以实现为高效利用内存，因为在创建时元素数量是已知的。它可以被设为不可变，从而使其线程安全。\n\n在 JDK 9 之前，曾多次考虑将集合字面量纳入\
  \ Java 编程语言。Java 设计者决定不将集合字面量添加到 Java 语言中，至少在 JDK 9 中不会。此时将集合字面量添加到 Java 需要付出太多努力，而收益甚微。\n\
  \n他们决定通过更新 Collection API 来实现相同目标，即为 `List`、`Set` 和 `Map` 接口添加静态工厂方法，这些方法可用于轻松高效地创建小型、不可修改的集合。\n\
  \n现有的 Collection API 创建的是可变集合。你可以通过将可变集合包装在另一个对象中来创建不可变（或不可修改）的集合，该对象只是原始可变对象的包装器。要在\
  \ JDK 8 或更早版本中创建一个包含两个整数的不可修改 `List`，通常使用以下代码片段：\n\n© Kishori Sharan 2017\nK. Sharan,\
  \ *Java 9 揭秘*, DOI 10.1007/978-1-4842-2592-9_13\n\n第 13 章 ■ Collection API 更新\n\n\
  // 创建一个空的、可变的列表\n`List<Integer> list = new ArrayList<>();`\n// 向可变列表添加两个元素\n`list.add(100);`\n\
  `list.add(200);`\n// 通过包装可变列表创建一个不可变列表\n`List<Integer> list2 = Collections.unmodifiableList(list);`\n\
  \n这种方法有一个严重缺陷。不可修改的列表只是可修改列表的一个包装器。我故意保留了名为 `list` 的变量。你不能通过 `list2` 变量修改列表；但是，你仍然可以使用\
  \ `list` 变量修改列表，并且当你使用 `list2` 变量读取列表时，这些修改会反映出来。清单 13-1 包含一个完整的程序，用于创建不可修改的 `List`，并向你展示之后如何更改其内容。\n\
  \n***清单 13-1.*** 在 JDK 9 之前创建不可修改的列表\n\n// PreJDK9UnmodifiableList.java\n`package\
  \ com.jdojo.collection;`\n`import java.util.ArrayList;`\n`import java.util.Collections;`\n\
  `import java.util.List;`\n`public class PreJDK9UnmodifiableList {`\n`    public\
  \ static void main(String[] args) {`\n`        List<Integer> list = new ArrayList<>();`\n\
  `        list.add(100);`\n`        list.add(200);`\n`        System.out.println(\"\
  list = \" + list);`\n`        // 创建一个不可修改的列表`\n`        List<Integer> list2 = Collections.unmodifiableList(list);`\n\
  `        System.out.println(\"list2 = \" + list2);`\n`        // 让我们使用 list 添加一个元素`\n\
  `        list.add(300);`\n`        // 使用名为 list 和 list2 的变量打印两个列表的内容`\n`       \
  \ System.out.println(\"list = \" + list);`\n`        System.out.println(\"list2\
  \ = \" + list2);`\n`    }`\n`}`\n\n`list = [100, 200]`\n`list2 = [100, 200]`\n`list\
  \ = [100, 200, 300]`\n`list2 = [100, 200, 300]`\n\n第 13 章 ■ Collection API 更新\n\n\
  输出显示，只要你保留原始列表的引用，就可以更改其内容，而不可修改的列表实际上并非不可修改！解决此问题的一种方法是用新不可修改列表的引用覆盖原始引用变量，如下所示：\n\
  \n`List<Integer> list = new ArrayList<>();`\n`list.add(100);`\n`list.add(200);`\n\
  // 创建一个不可修改的列表并将其存储在 list 中\n`**list** = Collections.unmodifiableList(list);`\n\n\
  请注意，此示例使用了多条语句来创建和填充不可修改的列表。如果你需要将不可修改的列表声明并初始化为类中的实例或静态变量，这种方法行不通，因为它涉及多条语句。这样的声明需要简单、紧凑，并包含在一条语句中。如果你在类中将前面的代码片段用于实例变量，你的代码将类似于以下代码：\n\
  \n`public class Test {`\n`    private List<Integer> list = new ArrayList<>();`\n\
  `    {`\n`        list.add(100);`\n`        list.add(200);`\n`        list = Collections.unmodifiableList(list);`\n\
  `    }`\n`    // ...`\n`}`\n\n还有其他声明和初始化不可修改列表的方法，例如使用数组并将其转换为列表。其中三种方法如下：\n\n`public\
  \ class Test {`\n`    // 使用数组并将其转换为列表`\n`    private List<Integer> list2 = Collections.unmodifiableList(`\n\
  `        new ArrayList<>( Arrays.asList(100, 200)));`\n`    // 使用匿名类`\n`    private\
  \ List<Integer> list3 = Collections.unmodifiableList(`\n`        new ArrayList<>(){{add(100);\
  \ add(200);}});`\n`    // 使用流`\n`    private List<Integer> list4 = Collections.unmodifiableList(`\n\
  `        Stream.of(100, 200).collect(Collectors.toList()));`\n`    // 更多代码在此`\n\
  `}`\n\n此示例证明你可以用一条语句创建不可修改的列表。然而，语法冗长。这些技术效率也不高。例如，仅仅为了在列表中保存两个整数，这些技术会创建多个对象，并带有一个后备数组对象来保存这些值。\n\
  \n第 13 章 ■ Collection API 更新\n\nJDK 9 通过为 `List`、`Set` 和 `Map` 接口提供静态工厂方法解决了这些问题。该方法名为\
  \ `of()`，并且已被重载。在 JDK 9 中，你可以如下所示声明并初始化一个包含两个元素的不可修改列表：\n\n// 创建一个包含两个整数的不可修改列表\n\
  `List<Integer> list = List.of(100, 200);`\n\n不可修改的列表\n\nJDK 9 为 `List` 接口添加了一个重载的\
  \ `of()` 静态工厂方法。它提供了一种简单紧凑的方式来创建不可修改的列表。以下是 `of()` 方法的所有版本：\n\n• `static <E> List<E>\
  \ of()`\n• `static <E> List<E> of(E e1)`\n• `static <E> List<E> of(E e1, E e2)`\n\
  • `static <E> List<E> of(E e1, E e2, E e3)`\n• `static <E> List<E> of(E e1, E e2,\
  \ E e3, E e4)`\n• `static <E> List<E> of(E e1, E e2, E e3, E e4, E e5)`\n\n\n\n\
  • static <E> List<E> of(E e1, E e2, E e3, E e4, E e5, E e6)\n• static <E> List<E>\
  \ of(E e1, E e2, E e3, E e4, E e5, E e6, E e7)\n• static <E> List<E> of(E e1, E\
  \ e2, E e3, E e4, E e5, E e6, E e7, E e8)\n• static <E> List<E> of(E e1, E e2, E\
  \ e3, E e4, E e5, E e6, E e7, E e8, E e9)\n• static <E> List<E> of(E e1, E e2, E\
  \ e3, E e4, E e5, E e6, E e7, E e8, E e9, E e10)\n• static <E> List<E> of(E... elements)\n\
  \n`of()` 方法有 11 个特殊版本，用于创建包含零到十个元素的列表。另一个版本接受可变参数，允许创建包含任意数量元素的不可修改列表。你可能会疑惑，既然可变参数版本可以创建任意数量元素的列表，为什么还要有这么多版本的方法。它们的存在是出于性能原因。API\
  \ 设计者希望元素数量较少的列表能够高效运行。可变参数是通过数组实现的。非可变参数版本的方法避免了将参数装箱到数组中，从而使其更加高效。这些方法针对小型列表使用了\
  \ `List` 接口的特殊实现类。\n\n`of()` 方法返回的列表具有以下特性：\n\n*   它们在结构上是不可变的。尝试添加、替换或删除元素会抛出 `UnsupportedOperationException`。\n\
  *   它们不允许 `null` 元素。如果列表中的元素为 `null`，则会抛出 `NullPointerException`。\n*   如果所有元素都是可序列化的，那么它们也是可序列化的。\n\
  *   元素的顺序与 `of()` 方法中指定的顺序，或与可变参数版本 `of(E… elements)` 方法中使用的数组顺序相同。\n\n第 13 章 ■\
  \ 集合 API 更新\n\n*   不保证返回的 `List` 的实现类。也就是说，不要期望返回的对象是 `ArrayList` 或任何其他实现 `List`\
  \ 接口的类。这些方法的实现是内部的，你不应对其类名做任何假设。例如，`List.of()` 和 `List.of(\"A\")` 可能返回两个不同类的对象。\n\
  \n`Collections` 类包含一个名为 `EMPTY_LIST` 的静态字段，表示一个不可变的空列表。它还包含一个名为 `emptyList()` 的静态方法，用于获取一个不可变的空列表。其\
  \ `singletonList(T object)` 方法返回一个包含指定元素的不可变单例列表。以下代码片段展示了在 JDK 9 之前和 JDK 9 中创建不可变空列表和单例列表的方式：\n\
  \n```java\n// 在 JDK 9 之前创建不可变的空列表\nList<Integer> emptyList1 = Collections.EMPTY_LIST;\n\
  List<Integer> emptyList2 = Collections.emptyList();\n\n// 在 JDK 9 中创建空列表\nList<Integer>\
  \ emptyList = List.of();\n\n// 在 JDK 9 之前创建不可变的单例列表\nList<Integer> singletonList1\
  \ = Collections.singletonList(100);\n\n// 在 JDK 9 中创建不可变的单例列表\nList<Integer> singletonList\
  \ = List.of(100);\n```\n\n如何使用 `of()` 方法从数组创建不可修改列表？答案取决于你希望从数组中得到什么样的列表。你可能希望得到一个元素与数组元素相同的列表，或者希望得到一个以数组本身作为列表中唯一元素的列表。使用\
  \ `List.of(array)` 将调用 `of(E... elements)` 方法，返回的列表元素将与数组中的元素相同。\n\n如果你希望数组本身成为列表中的唯一元素，则需要使用\
  \ `List.<array-type>of(array)` 方法，该方法将调用 `of(E e1)` 方法，返回的列表将只有一个元素，即数组本身。以下代码片段使用一个\
  \ `Integer` 数组演示了这一点：\n\n```java\nInteger[] nums = {100, 200};\n\n// 创建一个元素与数组元素相同的列表\n\
  List<Integer> list1 = List.of(nums);\nSystem.out.println(\"list1 = \" + list1);\n\
  System.out.println(\"list1.size() = \" + list1.size());\n\n// 创建一个以数组本身为唯一元素的列表\n\
  List<Integer[]> list2 = List.<Integer[]>of(nums);\nSystem.out.println(\"list2 =\
  \ \" + list2);\nSystem.out.println(\"list2.size() = \" + list2.size());\n```\n\n\
  输出：\n```\nlist1 = [100, 200]\nlist1.size() = 2\nlist2 = [[Ljava.lang.Integer;@27efef64]\n\
  list2.size() = 1\n```\n\n第 13 章 ■ 集合 API 更新\n\n清单 13-2 包含一个完整的程序，演示如何使用 `List` 接口的\
  \ `of()` 静态工厂方法来创建不可修改列表。\n\n***清单 13-2.*** 使用 `List.of()` 静态方法创建不可修改列表\n\n```java\n\
  // ListTest.java\npackage com.jdojo.collection;\n\nimport java.util.List;\n\npublic\
  \ class ListTest {\n    public static void main(String[] args) {\n        // 创建几个不可修改列表\n\
  \        List<Integer> emptyList = List.of();\n        List<Integer> luckyNumber\
  \ = List.of(19);\n        List<String> vowels = List.of(\"A\", \"E\", \"I\", \"\
  O\", \"U\");\n\n        System.out.println(\"emptyList = \" + emptyList);\n    \
  \    System.out.println(\"singletonList = \" + luckyNumber);\n        System.out.println(\"\
  vowels = \" + vowels);\n\n        try {\n            // 尝试使用 null 元素\n         \
  \   List<Integer> list = List.of(1, 2, null, 3);\n        } catch(NullPointerException\
  \ e) {\n            System.out.println(\"List.of() 中不允许使用 null。\");\n        }\n\
  \n        try {\n            // 尝试添加一个元素\n            luckyNumber.add(8);\n    \
  \    } catch(UnsupportedOperationException e) {\n            System.out.println(\"\
  无法添加元素。\");\n        }\n\n        try {\n            // 尝试移除一个元素\n            luckyNumber.remove(0);\n\
  \        } catch(UnsupportedOperationException e) {\n            System.out.println(\"\
  无法移除元素。\");\n        }\n    }\n}\n```\n\n输出：\n```\nemptyList = []\nsingletonList\
  \ = [19]\nvowels = [A, E, I, O, U]\nList.of() 中不允许使用 null。\n无法添加元素。\n无法移除元素。\n```\n\
  \n第 13 章 ■ 集合 API 更新\n\n**不可修改的集合（Set）**\n\nJDK 9 向 `Set` 接口添加了一个重载的 `of()` 静态工厂方法。它提供了一种简单紧凑的方式来创建不可修改的集合。以下是\
  \ `of()` 方法的所有版本：\n\n• static <E> Set<E> of()\n• static <E> Set<E> of(E e1)\n• static\
  \ <E> Set<E> of(E e1, E e2)\n• static <E> Set<E> of(E e1, E e2, E e3)\n• static\
  \ <E> Set<E> of(E e1, E e2, E e3, E e4)\n• static <E> Set<E> of(E e1, E e2, E e3,\
  \ E e4, E e5)\n• static <E> Set<E> of(E e1, E e2, E e3, E e4, E e5, E e6)\n• static\
  \ <E> Set<E> of(E e1, E e2, E e3, E e4, E e5, E e6, E e7)\n• static <E> Set<E> of(E\
  \ e1, E e2, E e3, E e4, E e5, E e6, E e7, E e8)\n• static <E> Set<E> of(E e1, E\
  \ e2, E e3, E e4, E e5, E e6, E e7, E e8, E e9)\n• static <E> Set<E> of(E e1, E\
  \ e2, E e3, E e4, E e5, E e6, E e7, E e8, E e9, E e10)\n• static <E> Set<E> of(E...\
  \ elements)\n\n所有版本的 `of()` 方法都针对性能进行了微调。你可以使用前 11 个版本来创建包含零到十个元素的不可修改集合。之所以存在前\
  \ 11 个版本的 `of()` 方法以及一个可变参数版本，是为了避免将最多 10 个元素的集合参数装箱到数组中。可变参数版本可用于创建包含任意数量元素的不可修改集合。\n\
  \n`of()` 方法返回的集合具有以下特性：\n\n*   它们在结构上是不可变的。尝试添加、替换或删除元素会抛出 `UnsupportedOperationException`。\n\
  *   它们不允许 `null` 元素。如果集合中的元素为 `null`，则会抛出 `NullPointerException`。\n*   如果所有元素都是可序列化的，那么它们也是可序列化的。\n\
  *   它们不允许重复元素。指定重复元素会抛出 `IllegalArgumentException`。\n*   元素的迭代顺序是未指定的。\n*   不保证返回的\
  \ `Set` 的实现类。也就是说，不要期望返回的对象是 `HashSet` 或任何其他实现 `Set` 接口的类。这些方法的实现是内部的，你不应对其类名做任何假设。例如，`Set.of()`\
  \ 和 `Set.of(\"A\")` 可能返回两个不同类的对象。\n\n第 13 章 ■ 集合 API 更新\n\n`Collections` 类包含一个名为\
  \ `EMPTY_SET` 的静态字段，表示一个不可变的空集合。\n\n\n\n它还包含一个名为 `emptySet()` 的静态方法，用于获取一个不可变的空集合。其\
  \ `singleton(T object)` 方法返回一个包含指定元素的不可变单例集合。以下代码片段展示了在 JDK 9 之前和 JDK 9 中创建不可变空集合与单例集合的方式：\n\
  \n// 在 JDK 9 之前创建不可变的空 Set\n\nSet<Integer> emptySet1 = Collections.EMPTY_SET;\n\n\
  Set<Integer> emptySet2 = Collections.emptySet();\n\n// 在 JDK 9 中创建空 Set\n\nSet<Integer>\
  \ emptySet = Set.of();\n\n// 在 JDK 9 之前创建不可变的单例 Set\n\nSet<Integer> singletonSet1\
  \ = Collections.singleton(100);\n\n// 在 JDK 9 中创建不可变的单例 Set\n\nSet<Integer> singletonSet\
  \ = Set.of(100);\n\n以下代码片段展示了如何从数组创建一个不可修改的 Set。你可以创建一个元素与数组元素相同的 Set，也可以创建一个以数组为唯一元素的\
  \ Set。请注意，当你使用数组元素作为 Set 的元素时，数组中不能包含重复元素。否则，`Set.of()` 方法会抛出 `IllegalArgumentException`。\n\
