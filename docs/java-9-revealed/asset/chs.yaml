  \ 方法名=main.\n\n第 16 章 ■ 堆栈遍历\n\n了解调用者的类\n\n在 JDK 9 之前，开发者依赖以下方法来获取调用者的类：\n\n• SecurityManager\
  \ 类的 getClassContext() 方法，由于该方法是受保护的，因此需要子类化。\n\n• sun.reflect.Reflection 类的 getCallerClass()\
  \ 方法，这是一个 JDK 内部类。\n\nJDK 9 通过在 StackWalker 类中添加一个名为 getCallerClass() 的方法，使得获取调用者类引用变得容易。该方法的返回类型是\
  \ Class<?>。如果 StackWalker 未配置 RETAIN_CLASS_REFERENCE 选项，则调用此方法会抛出 UnsupportedOperationException。如果堆栈中没有调用者帧，例如运行一个其\
  \ main() 方法调用了此方法的类，则调用此方法会抛出 IllegalStateException。\n\n哪个类是调用者类？在 Java 中有两种可调用的结构——方法和构造器。以下讨论使用术语“方法”，但它同样适用于方法和构造器。假设你在一个名为\
  \ S 的方法内部调用了 getCallerClass() 方法，而 S 方法是从一个名为 T 的方法中调用的。再假设名为 T 的方法位于一个名为 C 的类中。在这种情况下，类\
  \ C 就是调用者类。\n\n■ **提示** StackWalker 类的 getCallerClass() 方法在查找调用者类时会过滤掉所有隐藏帧和反射帧，无论获取\
  \ StackWalker 实例时使用了何种选项。\n\n\n\n清单 16-4 包含一个完整程序，演示如何获取调用者的类。其 `main()` 方法调用 `m1()`\
  \ 方法，`m1()` 调用 `m2()` 方法，`m2()` 再调用 `m3()` 方法。`m3()` 方法获取 `StackWalker` 类的实例并得到调用者类。请注意，`m2()`\
  \ 方法使用反射来调用 `m3()` 方法。最后，`main()` 方法尝试获取调用者类。当你运行 `CallerClassTest` 类时，`main()`\
  \ 方法由 JVM 调用，栈上不会有调用者帧，这将抛出 `IllegalStateException`。\n\n***清单 16-4.*** 使用 StackWalker\
  \ 类获取调用者类引用\n\n// CallerClassTest.java\n\npackage com.jdojo.stackwalker;\n\nimport\
