  \ /help /set\n\n|...\n\n有时，一个命令用于处理多个主题，例如，`/set` 命令可用于设置反馈模式、代码片段编辑器、启动脚本等。如果你想打印有关命令特定主题的信息，可以使用以下格式的\
  \ `/help` 命令：\n\n/help /<命令> <主题名称>\n\n以下命令打印有关设置反馈模式的信息：\n\njshell> /help /set\
  \ feedback\n\n以下命令打印有关创建自定义反馈模式的信息：\n\njshell> /help /set mode\n\n第 11 章 ■ Java\
  \ Shell\n\n使用 `/help` 命令并将主题作为参数来打印有关该主题的信息。\n\n目前，有三个预定义主题：`intro`、`shortcuts`\
  \ 和 `context`。以下命令将打印 JShell 工具的简介：\n\njshell> /help intro\n\n以下命令将打印你可以在 JShell\
  \ 工具中使用的快捷键及其描述列表：\n\njshell> /help shortcuts\n\n以下命令将打印用于设置执行上下文的选项列表。这些选项与 `/env`、`/reset`\
  \ 和 `/reload` 命令一起使用。\n\njshell> /help context\n\nJShell API\n\n\n\nJShell API 提供了对代码片段评估引擎的程序化访问。作为开发者，你可能不会直接使用此\
  \ API。它旨在供诸如 NetBeans IDE 等工具使用，这些工具可能包含与 JShell 命令行工具功能等效的 UI，让开发者无需打开命令提示符，即可在\
  \ IDE 内部评估代码片段。在本节中，我将简要介绍 JShell API，并通过一个简单示例展示其用法。\n\nJShell API 位于 `jdk.jshell`\
  \ 模块和 `jdk.jshell` 包中。请注意，如果你使用 JShell API，你的模块需要读取 `jdk.jshell` 模块。JShell API 很简单，主要由三个抽象类和一个接口组成：\n\
  \n• `JShell`\n\n• `Snippet`\n\n• `SnippetEvent`\n\n• `SourceCodeAnalysis`\n\n`JShell`\
  \ 类的实例代表一个代码片段评估引擎。这是 JShell API 中的主类。一个 `JShell` 实例会维护所有已执行代码片段的状态。\n\n代码片段由 `Snippet`\
  \ 类的实例表示。`JShell` 实例在执行代码片段时会生成代码片段事件。\n\n代码片段事件由 `SnippetEvent` 接口的实例表示。一个代码片段事件包含代码片段的当前和先前状态、产生结果的代码片段的值、导致该事件的代码片段的源代码、如果在代码片段执行期间发生异常则包含的异常对象等。\n\
  \n`SourceCodeAnalysis` 类的实例为代码片段提供源代码分析和建议功能。它可以回答如下问题：\n\n• 这是一个完整的代码片段吗？\n\n•\
  \ 这个代码片段可以通过追加一个分号来完成吗？\n\n`SourceCodeAnalysis` 实例还提供建议列表，例如，用于 Tab 补全和访问文档。此类旨在供提供\
  \ JShell 功能的工具使用。\n\n我不再进一步讨论它。如果你有兴趣深入探索，请参考此类的 Javadoc。\n\n第 11 章 ■ Java Shell\n\
  \n图 11-5 展示了 JShell API 不同组件的用例图。在后续章节中，我将解释这些类及其用途。在最后一节中，我将向你展示一个完整的示例。\n\n使用\n\
  生成\nSourceCode\nJShell\nSnippetEvent\n分析\n查询\n持有\nSnippet\n\n***图 11-5.** JShell\
  \ API 组件的用例图*\n\n**创建 JShell**\n\n`JShell` 类是抽象的。它提供了两种创建其实例的方法：\n\n• 使用其静态 `create()`\
  \ 方法\n• 使用名为 `JShell.Builder` 的静态构建器类\n\n`create()` 方法返回一个预配置的 `JShell` 实例。以下代码片段展示了如何使用\
  \ `create()` 方法创建 JShell：\n\n```java\n// 创建一个 JShell 实例\nJShell shell = JShell.create()\n\
  ```\n\n`JShell.Builder` 类允许你通过指定代码片段 ID 生成器、临时变量名生成器、用于打印输出的打印流、用于读取代码片段的输入流以及用于记录错误的错误输出流来配置\
  \ `JShell` 实例。你可以使用 `JShell` 类的 `builder()` 静态方法获取 `JShell.Builder` 类的实例。以下代码片段展示了如何使用\
  \ `JShell.Builder` 类创建 JShell，其中代码中的 `myXXXStream` 是对你的流对象的引用：\n\n```java\n// 创建一个\
  \ JShell 实例\nJShell shell = JShell.builder()\n    .in(myInputStream)\n    .out(myOutputStream)\n\
  \    .err(myErrorStream)\n    .build();\n```\n\n一旦你有了 `JShell` 实例，就可以使用其 `eval(String\
  \ snippet)` 方法开始评估代码片段。你可以使用其 `drop(PersistentSnippet snippet)` 方法丢弃一个代码片段。你可以使用其\
  \ `addToClasspath(String path)` 方法将路径追加到类路径。这三个方法会改变 `JShell` 实例的状态。\n\n第 11 章 ■\
  \ Java Shell\n\n■ **提示** 当你使用完 JShell 后，需要调用其 `close()` 方法来释放资源。`JShell` 类实现了 `AutoCloseable`\
  \ 接口，因此，使用 try-with-resources 块来处理 JShell 是确保它在不再使用时被关闭的最佳方式。JShell 是可变的，并且不是线程安全的。\n\
  \n你可以使用 `JShell` 类的 `onSnippetEvent(Consumer<SnippetEvent> listener)` 和 `onShutdown(Consumer<JShell>\
  \ listener)` 方法注册代码片段事件处理器和 JShell 关闭事件处理器。当代码片段的状态因首次评估或因另一个代码片段的评估而更新时，会触发代码片段事件。\n\
  \n`JShell` 类中的 `sourceCodeAnalysis()` 方法返回一个 `SourceCodeAnalysis` 类的实例，你可以将其用于代码辅助功能。\n\
  \n`JShell` 类中的其他方法用于查询状态。例如，`snippets()`、`types()`、`methods()` 和 `variables()` 方法分别返回所有代码片段的列表、所有具有活动类型声明的代码片段、具有活动方法声明的代码片段以及具有活动变量声明的代码片段。\n\
  \n`eval()` 方法是 `JShell` 类中最常用的方法。它评估/执行指定的代码片段并返回一个 `List<SnippetEvent>`。你可以查询列表中的代码片段事件以了解执行状态。以下是使用\
  \ `eval()` 方法的示例代码片段：\n\n```java\nString snippet = \"int x = 100;\";\n\n// 评估代码片段\n\
  List<SnippetEvent> events = shell.eval(snippet);\n\n// 处理结果\nevents.forEach((SnippetEvent\
  \ se) -> {\n    /* 在此处处理代码片段事件 */\n});\n```\n\n**处理代码片段**\n\n`Snippet` 类的实例代表一个代码片段。该类不提供创建其对象的方法。\n\
  \n你将代码片段作为字符串提供给 JShell，并作为代码片段事件的一部分接收 `Snippet` 类的实例。代码片段事件还为你提供代码片段的先前和当前状态。如果你有一个\
  \ `Snippet` 对象，可以使用 `JShell` 类的 `status(Snippet s)` 方法查询其当前状态，该方法返回一个 `Snippet.Status`。\n\
  \n■ **提示** `Snippet` 类是不可变的且线程安全的。\n\n第 11 章 ■ Java Shell\n\nJava 中有几种类型的代码片段，例如，变量声明、带初始化的变量声明、方法声明、类型声明等。`Snippet`\
  \ 类是一个抽象类，并且有一个子类来表示每种特定类型的代码片段。以下列表显示了表示不同类型代码片段的类的继承层次结构：\n\n• `Snippet`\n   \
  \ • `ErroneousSnippet`\n    • `ExpressionSnippet`\n    • `StatementSnippet`\n  \
  \  • `PersistentSnippet`\n        • `ImportSnippet`\n        • `DeclarationSnippet`\n\
  \            • `MethodSnippet`\n            • `TypeDeclSnippet`\n            • `VarSnippet`\n\
  \n`Snippet` 类的子类名称直观易懂。例如，`PersistentSnippet` 的实例代表存储在 JShell 中且可重用的代码片段，例如类声明或方法声明。`Snippet`\
  \ 类包含以下方法：\n\n• `String id()`\n• `String source()`\n• `Snippet.Kind kind()`\n• `Snippet.SubKind\
  \ subKind()`\n\n`id()` 方法返回代码片段的唯一 ID，`source()` 方法返回其源代码。\n\n`kind()` 和 `subKind()`\
  \ 方法返回代码片段的类型和子类型。\n\n代码片段的类型是 `Snippet.Kind` 枚举的常量之一，例如 `IMPORT`、`TYPE_DECL`、`METHOD`、`VAR`\
  \ 等。代码片段的子类型提供关于其类型的更具体信息，例如，如果代码片段是一个类型声明，其子类型会告诉你它是类、接口、枚举还是注解声明。代码片段的子类型是 `Snippet.SubKind`\
  \ 枚举的常量之一，例如 `CLASS_SUBKIND`、`ENUM_SUBKIND` 等。`Snippet.Kind` 枚举包含一个 `isPersistent`\
  \ 属性，如果此类型的代码片段是持久的，则该属性的值为 `true`，否则为 `false`。\n\n\n\nSnippet 类的子类会添加更多方法，用于返回特定类型代码片段的具体信息。例如，`VarSnippet`\
  \ 类包含一个 `typeName()` 方法，用于返回变量的数据类型。`MethodSnippet` 类包含 `parameterTypes()` 和 `signature()`\
  \ 方法，分别返回参数类型和方法的完整签名（以字符串形式）。\n\n代码片段本身不包含其状态。JShell 会执行并持有 `Snippet` 的状态。请注意，执行一个代码片段可能会影响其他代码片段的状态。例如，声明变量的代码片段可能会改变声明方法的代码片段的状态，使其从有效变为无效，反之亦然——如果该方法引用了该变量。如果你需要获取代码片段的当前状态，请使用\
  \ `JShell` 类的 `status(Snippet s)` 方法，该方法会返回 `Snippet.Status` 枚举中的以下常量之一：\n\n• `DROPPED`：代码片段处于非活动状态，因为它已通过\
  \ `JShell` 类的 `drop()` 方法被丢弃。\n• `NONEXISTENT`：代码片段处于非活动状态，因为它尚不存在。\n• `OVERWRITTEN`：代码片段处于非活动状态，因为它已被新的代码片段替换。\n\
  • `RECOVERABLE_DEFINED`：代码片段是一个包含未解析引用的声明片段。该声明具有有效的签名，并且对其他代码片段可见。当其他代码片段将其状态更改为\
  \ `VALID` 时，它可以被恢复并使用。\n• `RECOVERABLE_NOT_DEFINED`：代码片段是一个包含未解析引用的声明片段。该片段具有无效的签名，并且对其他代码片段不可见。当它的状态变为\
  \ `VALID` 时，可以在以后使用。\n• `REJECTED`：代码片段处于非活动状态，因为它在初始评估时编译失败，并且无法通过进一步更改 JShell\
  \ 状态而变为有效。\n• `VALID`：代码片段在当前 JShell 状态的上下文中是有效的。\n\n处理代码片段事件\n\nJShell 在代码片段评估或执行过程中会生成代码片段事件。你可以通过使用\
  \ `JShell` 类的 `onSnippetEvent()` 方法注册事件处理器，或者使用 `JShell` 类的 `eval()` 方法的返回值（它是一个\
  \ `List<SnippetEvent>`）来处理代码片段事件。以下代码片段展示了如何处理代码片段事件：\n\n```java\ntry (JShell shell\
  \ = JShell.create()) {\n\n    // 创建一个代码片段\n    String snippet = \"int x = 100;\"\
  ;\n\n    shell.eval(snippet)\n         .forEach((SnippetEvent se) -> {\n       \
  \      Snippet s = se.snippet();\n             System.out.printf(\"代码片段: %s%n\"\
  , s.source());\n             System.out.printf(\"种类: %s%n\", s.kind());\n      \
  \       System.out.printf(\"子种类: %s%n\", s.subKind());\n             System.out.printf(\"\
  先前状态: %s%n\", se.previousStatus());\n             System.out.printf(\"当前状态: %s%n\"\
  , se.status());\n             System.out.printf(\"值: %s%n\", se.value());\n    \
  \     });\n}\n```\n\n一个示例\n\n让我们实际看看 JShell API 的应用。清单 11-4 包含名为 `com.jdojo.jshell.api`\
  \ 的模块的模块声明。清单 11-5 包含名为 `JShellApiTest` 的类的完整代码，该类是 `com.jdojo.jshell.api` 模块的成员。\n\
  \n***清单 11-4.*** 名为 com.jdojo.jshell.api 的模块的模块声明\n\n```java\n// module-info.java\n\
  module com.jdojo.jshell.api {\n    requires jdk.jshell;\n}\n```\n\n***清单 11-5.***\
  \ 用于测试 JShell API 的 JShellApiTest 类\n\n```java\n// JShellApiTest.java\npackage com.jdojo.jshell.api;\n\
  \nimport jdk.jshell.JShell;\nimport jdk.jshell.Snippet;\nimport jdk.jshell.SnippetEvent;\n\
  \npublic class JShellApiTest {\n\n    public static void main(String[] args) {\n\
  \        // 创建一个代码片段数组，以便顺序评估/执行它们\n        String[] snippets = { \"int x = 100;\"\
  ,\n                              \"double x = 190.89;\",\n                     \
  \         \"long multiply(int value) {return value * multiplier;}\",\n         \
  \                     \"int multiplier = 2;\",\n                              \"\
  multiply(200)\",\n                              \"mul(99)\"\n                  \
  \          };\n\n        try (JShell shell = JShell.create()) {\n            //\
  \ 注册一个代码片段事件处理器\n            shell.onSnippetEvent(JShellApiTest::snippetEventHandler);\n\
  \n            // 评估所有代码片段\n            for(String snippet : snippets) {\n      \
  \          shell.eval(snippet);\n                System.out.println(\"------------------------\"\
  );\n            }\n        }\n    }\n}\n```\n\n\n\npublic static void snippetEventHandler(SnippetEvent\
  \ se) {\n\n// 打印此代码片段事件的详细信息\n\nSnippet snippet = se.snippet();\n\nSystem.out.printf(\"\
  代码片段: %s%n\", snippet.source());\n\n// 打印此代码片段事件的原因\n\nSnippet causeSnippet = se.causeSnippet();\n\
  \nif (causeSnippet != null) {\n\nSystem.out.printf(\"原因代码片段: %s%n\", causeSnippet.source());\n\
  \n}\n\n第 11 章 ■ Java Shell\n\nSystem.out.printf(\"种类: %s%n\", snippet.kind());\n\
  \nSystem.out.printf(\"子种类: %s%n\", snippet.subKind());\n\nSystem.out.printf(\"先前状态:\
  \ %s%n\", se.previousStatus());\n\nSystem.out.printf(\"当前状态: %s%n\", se.status());\n\
  \nSystem.out.printf(\"值: %s%n\", se.value());\n\nException e = se.exception();\n\
  \nif (e != null) {\n\nSystem.out.printf(\"异常: %s%n\", se.exception().getMessage());\n\
  \n}\n\n}\n\n}\n\n代码片段: int x = 100;\n\n种类: VAR\n\n子种类: VAR_DECLARATION_WITH_INITIALIZER_SUBKIND\n\
  \n先前状态: NONEXISTENT\n\n当前状态: VALID\n\n值: 100\n\n代码片段: double x = 190.89;\n\n种类:\
  \ VAR\n\n子种类: VAR_DECLARATION_WITH_INITIALIZER_SUBKIND\n\n先前状态: VALID\n\n当前状态: VALID\n\
  \n值: 190.89\n\n代码片段: int x = 100;\n\n原因代码片段: double x = 190.89;\n\n种类: VAR\n\n子种类:\
  \ VAR_DECLARATION_WITH_INITIALIZER_SUBKIND\n\n先前状态: VALID\n\n当前状态: OVERWRITTEN\n\
  \n值: null\n\n代码片段: long multiply(int value) {return value * multiplier;}\n\n种类:\
  \ METHOD\n\n子种类: METHOD_SUBKIND\n\n先前状态: NONEXISTENT\n\n当前状态: RECOVERABLE_DEFINED\n\
  \n值: null\n\n代码片段: int multiplier = 2;\n\n种类: VAR\n\n子种类: VAR_DECLARATION_WITH_INITIALIZER_SUBKIND\n\
  \n先前状态: NONEXISTENT\n\n当前状态: VALID\n\n值: 2\n\n代码片段: long multiply(int value) {return\
  \ value * multiplier;}\n\n原因代码片段: int multiplier = 2;\n\n种类: METHOD\n\n第 11 章 ■\
  \ Java Shell\n\n子种类: METHOD_SUBKIND\n\n先前状态: RECOVERABLE_DEFINED\n\n当前状态: VALID\n\
  \n值: null\n\n代码片段: multiply(200)\n\n种类: VAR\n\n子种类: TEMP_VAR_EXPRESSION_SUBKIND\n\
  \n先前状态: NONEXISTENT\n\n当前状态: VALID\n\n值: 400\n\n代码片段: mul(99)\n\n种类: ERRONEOUS\n\
  \n子种类: UNKNOWN_SUBKIND\n\n先前状态: NONEXISTENT\n\n当前状态: REJECTED\n\n值: null\n\n`main()`\
  \ 方法创建了以下六个代码片段，并将它们存储在一个字符串数组中：\n\n1.  `\"int x = 100;\"`\n2.  `\"double x = 190.89;\"\
  `\n3.  `\"long multiply(int value) {return value * multiplier;}\"`\n4.  `\"int multiplier\
  \ = 2;\"`\n5.  `\"multiply(200)\"`\n6.  `\"mul(99)\"`\n\n使用一个 try-with-resources\
  \ 块来创建一个 `JShell` 实例。`snippetEventHandler()` 方法被注册为代码片段事件处理器。该方法会打印代码片段的详细信息，例如其源代码、导致代码片段状态更新的代码片段的源代码、代码片段的先前和当前状态、其值等。最后，使用一个\
  \ for-each 循环遍历所有代码片段，并调用 `eval()` 方法来执行它们。\n\n让我们逐一了解执行这些代码片段时 `JShell` 引擎的状态：\n\
  \n• 当执行代码片段 1 时，该代码片段不存在，因此其状态从 `NONEXISTENT` 转变为 `VALID`。它是一个变量声明代码片段，计算结果为 `100`。\n\
  \n• 当执行代码片段 2 时，它已经存在。请注意，它声明了同名的变量 `x`，但数据类型不同。其先前状态是 `VALID`，当前状态也是 `VALID`。执行此代码片段会改变代码片段\
  \ 1 的状态，使其从 `VALID` 变为 `OVERWRITTEN`，因为不能有两个同名的变量。\n\n• 代码片段 3 声明了一个名为 `multiply()`\
  \ 的方法，该方法在其方法体中使用了未声明的变量 `multiplier`，因此其状态从 `NONEXISTENT` 变为 `RECOVERABLE_DEFINED`。该方法已被定义，这意味着它可以被引用，但在定义适当类型的名为\
  \ `multiplier` 的变量之前无法被调用。\n\n第 11 章 ■ Java Shell\n\n• 代码片段 4 定义了一个名为 `multiplier`\
  \ 的变量，这使得代码片段 3 变为有效。\n\n• 代码片段 5 计算了一个调用 `multiply()` 方法的表达式。该表达式有效，计算结果为 `400`。\n\
  \n• 代码片段 6 计算了一个调用 `mul()` 方法的表达式，而该方法从未被定义过。该代码片段是错误的，并被拒绝。\n\n\n\n通常情况下，你不会同时使用\
  \ JShell API 和 JShell 工具。不过，为了趣味性，我们不妨将它们一起使用。JShell API 只是 Java 中的另一个 API，它也可以在\
  \ JShell 工具中使用。以下 jshell 会话实例化了一个 JShell，注册了一个代码片段事件处理器，并评估了两个代码片段。\n\nC:\\Java9Revealed>jshell\n\
  \n| 欢迎使用 JShell -- 版本 9-ea\n\n| 如需介绍，请输入：/help intro\n\njshell> /set feedback silent\n\
