  | 如需介绍，请输入：/help intro\n\njshell> /reload -restore\n\n| 正在从之前的状态重新启动并恢复。\n\n-: int\
  \ x1 = 10;\n\n-: int x2 = 20;\n\njshell> int x3 = 30\n\nx3 ==> 30\n\njshell> /exit\n\
