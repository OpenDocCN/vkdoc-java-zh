  第 7 章 ■ 创建自定义运行时映像\n\n■ **提示** 在撰写本文时，插件 API 严格来说是实验性的，并且插件的执行顺序尚未定义。在其早期实现中，jlink\
  \ 工具也支持自定义插件，但后来被移除了。\n\njimage 工具\n\nJava 运行时将模块化运行时映像存储在 JIMAGE 文件中。该文件名为 modules，位于\
  \ JAVA_HOME\\lib 目录下，其中 JAVA_HOME 可以是你的 JDK_HOME 或 JRE_HOME。jimage 工具用于探索 JIMAGE\
  \ 文件的内容。它可以：\n\n• 从 JIMAGE 文件中提取条目\n\n• 打印存储在 JIMAGE 中的内容摘要\n\n• 打印条目列表，例如它们的名称、大小、偏移量等\n\
  \n• 验证类文件\n\njimage 工具存储在 JDK_HOME\\bin 目录中。命令的一般格式如下：jimage <subcommand> <options>\
  \ <jimage-file-list>\n\n这里，<subcommand> 是表 7-2 中列出的子命令之一。<options> 是表 7-3 中列出的一个或多个选项；<jimage-file-list>\
  \ 是一个以空格分隔的 JIMAGE 文件列表，用于探索。\n\n***表 7-2.** 与 jimage 工具一起使用的子命令列表*\n\n**子命令**\n\
  \n**描述**\n\nextract\n\n将指定 JIMAGE 文件中的所有条目提取到当前目录。使用 --dir 选项为提取的条目指定另一个目录。\n\n\
  info\n\n打印指定 JIMAGE 文件头部中包含的详细信息。\n\nlist\n\n打印指定 JIMAGE 文件中所有模块及其条目的列表。使用 --verbose\
  \ 选项包含条目的详细信息，例如其大小、偏移量以及条目是否被压缩。\n\nverify\n\n打印指定 JIMAGE 文件中无法验证为类的 .class 条目列表。\n\
  \n第 7 章 ■ 创建自定义运行时映像\n\n***表 7-3.** 与 jimage 工具一起使用的选项列表*\n\n**选项**\n\n**描述**\n\n\
