  \nCPU Time: PT0S\n\nOwner: Unknown\n\nChildren Count: 127\n\n终止进程\n\n你可以使用 `ProcessHandle`\
  \ 接口和 `Process` 类的 `destroy()` 或 `destroyForcibly()` 方法终止进程。如果终止进程的请求成功，这两个方法都返回\
  \ `true`，否则返回 `false`。`destroy()` 方法请求正常终止，而 `destroyForcibly()` 方法请求强制终止。在发出终止进程的请求后，`isAlive()`\
  \ 方法可能会在短时间内返回 `true`。\n\n■ **提示** 你不能终止当前进程。对当前进程调用 `destroy()` 或 `destroyForcibly()`\
  \ 方法会抛出 `IllegalStateException`。操作系统的访问控制可能会阻止进程被终止。\n\n第 12 章 ■ 进程 API 更新\n\n\n\
  \n进程的正常终止能让进程干净地结束。进程的强制终止会立即结束进程。进程是否支持正常终止取决于具体实现。你可以使用 `ProcessHandle` 接口和 `Process`\
  \ 类的 `supportsNormalTermination()` 方法来检查进程是否支持正常终止。如果进程支持正常终止，该方法返回 `true`，否则返回\
  \ `false`。\n\n调用这些方法来终止一个已经终止的进程不会产生任何效果。当进程终止时，`Process` 类的 `onExit()` 方法返回的 `CompletableFuture<Process>`\
  \ 以及 `ProcessHandle` 接口的 `onExit()` 方法返回的 `CompletableFuture<ProcessHandle>` 将会完成。\n\
  \n**管理进程权限**\n\n在前面的章节中运行示例时，我假设没有安装 Java 安全管理器。如果安装了安全管理器，则需要授予适当的权限才能启动、管理和查询原生进程：\n\
  \n• 如果你正在创建一个新进程，你需要拥有 `FilePermission(cmd,\"execute\")` 权限，其中 `cmd` 是用于创建进程的命令的绝对路径。如果\
  \ `cmd` 不是绝对路径，你需要拥有 `FilePermission(\"<<ALL FILES>>\",\"execute\")` 权限。\n\n• 要使用\
  \ `ProcessHandle` 接口中的方法查询原生进程的状态并销毁进程，应用程序需要拥有 `RuntimePermission(\"manageProcess\"\
  )` 权限。\n\n清单 12-6 包含一个程序，该程序获取进程计数并创建一个新进程。它会在没有安全管理器和有安全管理器的情况下重复执行这两个任务。\n\n***清单\
  \ 12-6.*** 使用安全管理器管理进程\n\n// ManageProcessPermission.java\n\npackage com.jdojo.process.api;\n\
  \nimport java.util.concurrent.ExecutionException;\n\npublic class ManageProcessPermission\
  \ {\n\npublic static void main(String[] args) {\n\n// 获取进程计数\n\nlong count = ProcessHandle.allProcesses().count();\n\
  \nSystem.out.printf(\"进程计数: %d%n\", count);\n\n// 启动一个新进程\n\nProcess p = Job.startProcess(1,\
  \ 3);\n\ntry {\n\np.toHandle().onExit().get();\n\n} catch (InterruptedException\
  \ | ExecutionException e) {\n\nSystem.out.println(e.getMessage());\n\n}\n\n// 安装一个安全管理器\n\
  \nSecurityManager sm = System.getSecurityManager();\n\nif(sm == null) {\n\n第 12\
  \ 章 ■ 进程 API 更新\n\nSystem.setSecurityManager(new SecurityManager());\n\nSystem.out.println(\"\
  已安装安全管理器。\");\n\n}\n\n// 获取进程计数\n\ntry {\n\ncount = ProcessHandle.allProcesses().count();\n\
  \nSystem.out.printf(\"进程计数: %d%n\", count);\n\n} catch(RuntimeException e) {\n\n\
  System.out.println(\"无法获取进程计数: \" + e.getMessage());\n\n}\n\n// 启动一个新进程\n\ntry {\n\
