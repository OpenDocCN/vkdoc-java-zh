  \n打印 jimage 工具的完整版本信息。\n\n--verbose\n\n当与 list 子命令一起使用时，打印条目详细信息，例如大小、偏移量和压缩级别。\n\
  \n--version\n\n打印 jimage 工具的版本信息。\n\n我将展示几个使用 jimage 命令的示例。示例使用存储在我计算机上 C:\\java9\\\
  lib\\modules 的 JDK 9 运行时映像。当你运行这些示例时，需要将此映像位置替换为你自己的。你也可以在这些示例中使用由 jlink 工具创建的任何自定义运行时映像。\n\
