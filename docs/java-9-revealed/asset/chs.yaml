  \         cmd.add(className);\n        }\n    }\n}\n\nJob 类包含一个 `startProcess(long\
  \ sleepInterval, long sleepDuration)` 方法，用于启动一个新进程。它启动一个以 Job 类为主类的 JVM，并将休眠间隔和持续时间作为参数传递给\
  \ JVM。该方法尝试构建一个命令，从 `JDK_HOME\\bin` 目录启动 java 命令。如果 Job 类是在命名模块中加载的，它会构建如下命令：\n\n\
  `JDK_HOME\\bin\\java --module-path <module-path> --module com.jdojo.process.api/com.jdojo.process.api.Job\
  \ <sleepInterval> <sleepDuration>`\n\nChapter 12 ■ 进程 API 更新\n\n如果 Job 类是在未命名模块中加载的，它会尝试构建如下命令：\n\
  \n`JDK_HOME\\bin\\java -class-path <class-path> com.jdojo.process.api.Job <sleepInterval>\
  \ <sleepDuration>`\n\n`startProcess()` 方法会打印用于启动进程的命令，尝试启动进程，并返回进程引用。\n\n`addJvmPath()`\
  \ 方法将 JVM 路径添加到命令列表中。它尝试获取当前 JVM 进程的命令，用作新进程的 JVM 路径。如果不可用，则尝试从 `java.home` 系统属性构建该路径。\n\
  \nJob 类包含几个实用方法，用于组合命令的各个部分以及解析传递给 `main()` 方法的参数。请参考它们的 Javadoc 以获取描述。\n\n如果你想启动一个应运行五秒且每五秒唤醒一次的新进程，可以使用\
  \ Job 类的 `startProcess()` 方法：\n\n```java\n// 启动一个运行 15 秒的进程\nProcess p = Job.startProcess(5,\
  \ 15);\n```\n\n你可以使用在清单 12-2 中创建的 `CurrentProcessInfo` 类的 `printInfo()` 方法打印进程详细信息：\n\
  \n```java\n// 获取当前进程的句柄\nProcessHandle handle = p.toHandle();\n\n// 打印进程详细信息\nCurrentProcessInfo.printInfo(handle);\n\
  ```\n\n你可以使用 `ProcessHandle` 的 `onExit()` 方法的返回值，在进程终止时运行一个任务。\n\n```java\nCompletableFuture<ProcessHandle>\
  \ future = handle.onExit();\n\n// 进程终止时打印一条消息\nfuture.thenAccept((ProcessHandle\
  \ ph) -> {\n    System.out.printf(\"Job (pid=%d) terminated.%n\", ph.getPid());\n\
  });\n```\n\n你可以像这样等待新进程终止：\n\n```java\n// 等待进程终止\nfuture.get();\n```\n\n在此示例中，`future.get()`\
  \ 将返回进程的 `ProcessHandle`。我没有使用返回值，因为我已经在 `handle` 变量中拥有了它。\n\n\n\n清单 12-4 包含一个 `StartProcessTest`\
