  jshell>\n\n重置 JShell 状态\n\n你可以使用 `/reset` 命令重置 JShell 的执行状态。执行此命令会产生以下效果：\n\n• 当前会话中输入的所有代码片段都会丢失，因此在执行此命令前请务必小心。\n\
  • 启动代码片段会重新执行。\n• 工具的执行状态会重新启动。\n• 使用 `/set` 命令设置的 jshell 配置会被保留。\n• 使用 `/env` 命令设置的执行环境会被保留。\n\
