  \n} catch (IOException e) {\n\ne.printStackTrace();\n\n}\n\n}\n\n}\n\n第 10 章 ■ 模块\
  \ API\n\nObject.class 大小: 1859\n\njava.base 模块中的五个资源:\n\nmodule-info.class\n\nsun/util/BuddhistCalendar.class\n\
  \nsun/util/PreHashedMap$1$1.class\n\nsun/util/PreHashedMap$1.class\n\nsun/util/PreHashedMap$2$1$1.class\n\
  \n创建配置\n\n一个*配置*代表一组已解析的模块。已解析的模块是指其依赖关系（通过 requires 语句指定）已被计算出来的模块。模块解析过程使用两组模块：一组根模块和一组可观察模块。根模块集合中的每个模块都用作初始模块，其\
  \ requires 语句会针对可观察模块集合进行解析。\n\n一个根模块可能依赖于另一个模块，而该模块又可能依赖于另一个模块，依此类推。解析过程会计算所有根模块的依赖链。由此产生的模块图称为*依赖图*。\n\
  \n依赖图仅考虑 requires 语句。如果某个模块使用了 requires transitive 语句，则依赖于此模块的模块会隐式地依赖于 requires\
  \ transitive 语句中指定的模块。依赖图会因 requires transitive 语句而增加额外的模块可读性，从而产生一个称为*可读性图*的模块图。\n\
  \n\n\n模块中的 `uses` 和 `provides` 语句也会形成依赖关系。如果模块 M 使用了服务类型 S，而另一个模块 N 为 S 提供了实现 T，那么模块\
  \ M 依赖于模块 N 以使用服务类型 S。可读性图会通过为这些服务使用依赖关系计算出的模块进行扩充。\n\n当创建启动层配置时，它通过解析依赖关系（`requires`\
  \ 语句）、隐式可读性（`requires transitive`）以及服务使用依赖关系（`uses` 和 `provides` 语句）来包含模块。当你为用户定义的层创建配置时，你可以选择包含或排除服务使用依赖关系。\n\
  \n`Configuration` 类的实例代表一个配置。一个配置至少有一个父配置，空配置除外。\n\n`ResolvedModule` 类的实例代表配置中的一个已解析模块。其\
  \ `reads()` 方法返回该已解析模块所读取的 `Set<ResolvedModule>`。其 `configuration()` 方法返回该已解析模块所属的\
  \ `Configuration`。其 `reference()` 方法返回一个 `ModuleReference`，你可以用它来获取一个 `ModuleReader`\
  \ 以读取模块的内容。\n\n`Configuration` 类中的以下方法用于创建 `Configuration` 对象：\n\n• `static Configuration\
  \ empty()`\n\n• `Configuration resolve(ModuleFinder before, ModuleFinder after,\
  \ Collection<String> roots)`\n\n• `Configuration resolveAndBind(ModuleFinder before,\
  \ ModuleFinder after, Collection<String> roots)`\n\n• `static Configuration resolve(ModuleFinder\
  \ before, List<Configuration> parents, ModuleFinder after, Collection<String> roots)`\n\
  \n• `static Configuration resolveAndBind(ModuleFinder before, List<Configuration>\
  \ parents, ModuleFinder after, Collection<String> roots)`\n\n第 10 章 ■ 模块 API\n\n\
  `empty()` 方法返回一个空的 `Configuration`。它主要作为启动层配置的父配置存在。\n\n`resolve()` 和 `resolveAndBind()`\
  \ 方法有两个版本：实例方法和静态方法。它们之间只有一个区别。实例方法使用当前配置作为父配置来创建新配置，而静态方法允许你为新配置传递一个父配置列表。\n\n\
  `resolve()` 方法通过解析模块声明中由 `requires` 和 `requires transitive` 语句产生的依赖关系来创建一个新的 `Configuration`\
  \ 对象。指定的根模块被用作根模块。在解析过程中，首先使用指定的前置模块查找器搜索模块。如果未找到模块，则搜索父配置。如果仍未找到模块，则使用指定的后置模块查找器来搜索模块。如果你的配置旨在覆盖父配置中的某个模块，你应该将该模块放在前置模块查找器路径中。\n\
  \n`resolveAndBind()` 方法的工作方式与 `resolve()` 方法相同，区别在于它还会解析服务使用依赖关系。以下代码片段展示了如何使用启动层的配置作为其父配置来创建一个配置：\n\
  \n```java\n// 定义模块查找器\nString modulePath = \"C:\\\\Java9Revealed\\\\customLib\"\
  ;\nPath path = Paths.get(modulePath);\nModuleFinder beforeFinder = ModuleFinder.of(path);\n\
  \n// 我们的后置模块查找器为空\nModuleFinder afterFinder = ModuleFinder.of();\n\n// 设置根模块\nSet<String>\
  \ rootModules = Set.of(\"com.jdojo.layer\");\n\n// 使用启动层的配置作为其父配置来创建一个配置\nConfiguration\
  \ parentConfig = ModuleLayer.boot().configuration();\nConfiguration config = parentConfig.resolve(beforeFinder,\
  \ afterFinder, rootModules);\n```\n\n`Configuration` 类中的以下方法用于检索配置中已解析模块的详细信息：\n\
  \n• `Optional<ResolvedModule> findModule(String name)`\n\n• `Set<ResolvedModule>\
  \ modules()`\n\n• `List<Configuration> parents()`\n\n这些方法的名字和签名足够直观，可以理解其用途。本节中我将不再进一步讨论\
  \ `Configuration` 类。在下一节中，我将展示如何使用 `Configuration` 来创建模块层。\n\n**创建模块层**\n\n模块层是一个配置以及一个将每个模块映射到类加载器的函数。要创建一个层，你必须首先创建一个配置，并拥有一个或多个类加载器来将模块映射到它们。模块的类加载器负责加载该模块中的所有类型。你可以将配置中的所有模块映射到一个类加载器；也可以将每个模块映射到不同的类加载器；或者你可以采用自定义的映射策略。通常，类加载器使用一种委托策略，将类加载请求委托给它们的父类加载器。当你为层中的模块定义类加载器时，你也可以使用这种策略。\n\
  \n`java.lang` 包中的 `ModuleLayer` 类的实例代表一个层。该类包含两个方法：`empty()` 和 `boot()`，分别返回一个带有空配置的空层和启动层。该类中的以下方法用于创建自定义层：\n\
  \n• `ModuleLayer defineModules(Configuration cf, Function<String,ClassLoader> clf)`\n\
  \n• `static ModuleLayer.Controller defineModules(Configuration cf, List<ModuleLayer>\
  \ parentLayers, Function<String,ClassLoader> clf)`\n\n• `ModuleLayer defineModulesWithManyLoaders(Configuration\
  \ cf, ClassLoader parentClassLoader)`\n\n• `static ModuleLayer.Controller defineModulesWithManyLoaders(Configuration\
  \ cf, List<ModuleLayer> parentLayers, ClassLoader parentLoader)`\n\n• `ModuleLayer\
  \ defineModulesWithOneLoader(Configuration cf, ClassLoader parentClassLoader)`\n\
  \n• `static ModuleLayer.Controller defineModulesWithOneLoader(Configuration cf,\
  \ List<ModuleLayer> parentLayers, ClassLoader parentLoader)`\n\n`defineModulesXxx()`\
  \ 方法有两种变体：一组包含实例方法，另一组包含静态方法。实例方法使用调用它们的层作为父层，而静态方法允许你为新层指定一个父层列表。静态方法返回一个 `ModuleLayer.Controller`\
  \ 对象，你可以用它来处理新层中的模块。`ModuleLayer.Controller` 是 `java.lang` 包中的一个嵌套类，包含以下方法：\n\n\
  • `ModuleLayer.Controller addOpens(Module source, String packageName, Module target)`\n\
  \n• `ModuleLayer.Controller addReads(Module source, Module target)`\n\n• `ModuleLayer\
  \ layer()`\n\n`addOpens` 和 `addReads()` 方法允许你将此层中某个模块的包开放给另一个模块，并从此层中的一个模块向另一个模块添加读取边。`layer()`\
  \ 方法返回此控制器正在管理的 `ModuleLayer`。\n\n`defineModules(Configuration cf, Function<String,ClassLoader>\
  \ clf)` 方法将配置作为其第一个参数。第二个参数是一个映射函数，它接受配置中的模块名称并返回该模块的类加载器。在以下情况下，方法调用可能会失败：\n\n\
  • 具有相同包的多个模块被映射到同一个类加载器。\n• 一个模块被映射到一个已经定义了同名模块的类加载器。\n• 一个模块被映射到一个已经在该模块的任何包中定义了类型的类加载器。\n\
  \n`defineModulesWithManyLoaders(Configuration cf, ClassLoader parentClassLoader)`\
  \ 方法使用指定的配置创建一个层。配置中的每个模块都被映射到一个不同的类加载器，该类加载器由此方法创建。指定的父类加载器（第二个参数）被设置为此方法创建的类加载器的父类。通常，你会使用应用程序类加载器作为父类加载器。\n\
  \n第 10 章 ■ 模块 API\n\n\n\nloader 作为此方法创建的所有类加载器的父类加载器。你可以使用 `null` 作为第二个参数，以使用引导类加载器作为此方法创建的所有类加载器的父类加载器。此方法将为配置中的每个模块创建一个新的类加载器。\n\
  \n`defineModulesWithOneLoader(Configuration cf, ClassLoader parentClassLoader)`\
  \ 方法\n\n使用指定的配置创建一个层。它使用指定的父类加载器作为其父类加载器创建一个类加载器。它将配置中的所有模块映射到这一个类加载器。你可以使用 `null`\
  \ 作为第二个参数，以使用引导类加载器作为此方法创建的所有类加载器的父类加载器。\n\n以下代码片段创建了一个以引导层为父层的层。该层中的所有模块将由一个类加载器加载，其父类加载器是系统类加载器。\n\
  \n```java\nConfiguration config = /* 创建一个配置... */\n\nClassLoader sysClassLoader\
  \ = ClassLoader.getSystemClassLoader();\n\nModuleLayer parentLayer = ModuleLayer.boot();\n\
  \nModuleLayer layer = parentLayer.defineModulesWithOneLoader(config, sysClassLoader);\n\
  ```\n\n一旦创建了层，你需要从该层的模块中加载类。模块中的所有类型都由映射到该模块的类加载器加载。请注意，同一个模块可能定义在多个层中，但这些模块将被映射到不同的类加载器。`ModuleLayer`\
  \ 类包含一个 `findLoader(String moduleName)` 方法，该方法接受模块名称作为参数，并返回该模块的 `ClassLoader`。如果该模块未在层中定义，则会检查父层。如果该模块在此层或其祖先层中不存在，则会抛出\
  \ `IllegalArgumentException`。一旦获取了模块的 `ClassLoader`，就可以调用其 `loadClass(String className)`\
  \ 方法来从该模块加载类。以下代码片段（不包括异常处理逻辑）展示了如何在层中加载类：\n\n```java\nModuleLayer layer = /* 创建一个层...\
  \ */\n\n// 使用该层加载一个类\n\nString moduleName = \"com.jdojo.layer\";\n\nString className\
  \ = \"com.jdojo.layer.LayerInfo\";\n\nClass<?> cls = layer.findLoader(moduleName)\n\
  \n.loadClass(className);\n```\n\n一旦获取了 `Class` 对象，就可以使用它来实例化其对象并调用该对象的方法。\n\n以下代码片段创建了所加载类的对象，并调用了该对象上名为\
  \ `printInfo` 的方法：\n\n```java\n// 一个打印对象详细信息的方法名\n\nString methodName = \"printInfo\"\
  ;\n\n// 使用无参构造函数实例化该类\n\nObject obj = cls.getConstructor().newInstance();\n\n//\
  \ 查找该方法\n\nMethod method = cls.getMethod(methodName);\n\n// 调用将打印详细信息的方法\n\nmethod.invoke(obj);\n\
  ```\n\n第 10 章 ■ 模块 API\n\n`ModuleLayer` 类中的以下方法可用于获取关于层本身或层中包含的模块的信息：\n\n*   `Optional<Module>\
  \ findModule(String moduleName)`\n*   `Set<Module> modules()`\n*   `List<ModuleLayer>\
  \ parents()`\n\n`findModule()` 方法在层或其父层中查找具有指定名称的模块。`modules()` 方法返回层中的模块集合，如果层不包含任何模块，则可能为空集合。`parent()`\
  \ 方法返回此层的父层列表，对于空层，该列表将为空。\n\n接下来，我们将通过一个完整的示例来演示如何创建自定义层，以及如何在同一个应用程序的两个层中加载同一模块的两个版本。\n\
  \n模块名称为 `com.jdojo.layer`，它包含一个名为 `com.jdojo.layer` 的包，该包仅包含一个名为 `LayerInfo` 的类。你将拥有同一模块的两个版本，因此所有内容都将重复。我在源代码中创建了两个\
  \ NetBeans 项目，名称分别为 `com.jdojo.layer.v1` 和 `com.jdojo.layer.v2`。\n\n清单 10-13 和清单\
  \ 10-14 分别包含了 `com.jdojo.layer` 模块的 1.0 版模块定义和 `LayerInfo` 类的类声明。\n\n***清单 10-13.***\
  \ com.jdojo.layer 模块的 1.0 版\n\n```java\n// module-info.com 版本 1.0\n\nmodule com.jdojo.layer\
  \ {\n\n    exports com.jdojo.layer;\n\n}\n```\n\n***清单 10-14.*** com.jdojo.layer\
  \ 模块 1.0 版中的 LayerInfo 类\n\n```java\n// LayerInfo.java\n\npackage com.jdojo.layer;\n\
  \npublic class LayerInfo {\n\n    private final static String VERSION = \"1.0\"\
  ;\n\n    static {\n\n        System.out.println(\"正在加载 LayerInfo 版本 \" + VERSION);\n\
  \n    }\n\n    public void printInfo() {\n\n        Class cls = this.getClass();\n\
  \n        ClassLoader loader = cls.getClassLoader();\n\n        Module module =\
