  \n假设你有一个包含 JDK 8 资源和类文件的 JAR，并且你想通过添加 JDK 9 的资源和类文件来将其更新为 MRJAR。你可以通过使用 `--update`\
  \ 选项更新 JAR 的内容来实现。以下命令创建一个仅包含 JDK 8 文件的 JAR：\n\nC:\\Java9Revealed>jar --create --file\
  \ mrjars\\com.jdojo.mrjar.jar\n\n-C com.jdojo.mrjar.jdk8\\build\\classes .\n\n以下命令更新该\
  \ JAR 以使其成为 MRJAR：\n\nC:\\Java9Revealed>jar --update --file mrjars\\com.jdojo.mrjar.jar\n\
  \n--release 9 -C com.jdojo.mrjar.jdk9\\build\\classes .\n\n来看看这个 MRJAR 的实际运行效果。以下命令运行\
  \ `com.jdojo.mrjar` 包中的 `Main` 类，并将 MRJAR 放在类路径上。使用 JDK 8 来运行该类。\n\nC:\\Java9Revealed>\
  \ c:\\java8\\bin\\java -classpath mrjars\\com.jdojo.mrjar.jar com.jdojo.mrjar.Main\n\
  \nInside JDK 8 version of Main.main()...\n\nCreating JDK 8 version of TimeUtil...\n\
  \nLocal Date: 2017-01-27\n\n第 6 章 ■ 打包模块\n\n输出显示，`Main` 和 `TimeUtil` 这两个类都是从 MRJAR\
  \ 的根目录使用的，因为 JDK 8 不支持 MRJAR。以下命令使用模块路径运行相同的类。使用 JDK 9 来运行该命令：\n\nC:\\Java9Revealed>\
  \ c:\\java9\\bin\\java --module-path mrjars\\com.jdojo.mrjar.jar --module com.jdojo.mrjar/com.jdojo.mrjar.Main\n\
  \nInside JDK 9 version of Main.main()...\n\nCreating JDK 9 version of TimeUtil...\n\
  \nLocal Date: 2017-01-27\n\n输出显示，`Main` 和 `TimeUtil` 这两个类都是从 MRJAR 的 `META-INF/versions/9`\
  \ 目录使用的，因为 JDK 9 支持 MRJAR，并且该 MRJAR 包含这些类特定于 JDK 9 的版本。\n\n让我们对这个 MRJAR 稍作改动。创建一个内容相同但没有\
  \ `Main` 类的 MRJAR。\n\n\n\n位于 `META-INF/versions/9` 目录下的类文件。在实际场景中，只有 `TimeUtil`\
  \ 类在应用的 JDK 9 版本中发生了变更，因此无需为 JDK 9 打包 `Main` 类。JDK 8 版本的 `Main` 类同样可以在 JDK 9 上使用。以下命令打包了我们上次所做的所有内容，但排除了\
  \ JDK 9 版本的 `Main` 类。生成的 MRJAR 文件名为 `com.jdojo.mrjar2.jar`。\n\nC:\\Java9Revealed>jar\
  \ --create --verbose --file mrjars\\com.jdojo.mrjar2.jar\n\n-C com.jdojo.mrjar.jdk8\\\
