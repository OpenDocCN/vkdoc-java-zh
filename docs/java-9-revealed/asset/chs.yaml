  \ 仅供参考\n\n## 后续工作\n\n我向你展示了一个使用 Log4j 2.0 作为后端日志记录器来配置平台日志记录器的示例。这个示例在投入生产环境使用之前，还有很多工作要做。我们可以进行的一项改进是记录发出日志消息的类名。请参考清单\
  \ 19-8，你会发现所有记录的日志消息都使用了相同的类名 `com.jdojo.logger.Log4jLogger` 作为日志记录器的类，这是不正确的。你从\
  \ `com.jdojo.logger.PlatformLoggerTest` 类记录了两条消息，而从 `java.util.Currency` 类记录了一条消息。如何解决这个问题？\n\
  \n让我们先尝试理解这个问题。日志记录器的类名由 Log4j 决定。它只是查看其 `log()` 方法的调用者，并将该类用作记录消息的类。在清单 19-3 中，两个\
  \ `log()` 方法调用了 `Log4j` 的 `log()` 方法来委托日志记录工作。Log4j 将 `com.jdojo.logger.Log4jLogger`\
  \ 类视为消息的记录器，并在记录的消息中使用其名称作为日志记录器类。有两种方法可以解决这个问题：\n\n*   在 `Log4jLogger` 类中，使用 JDK\
  \ 9 新增的 **Stack-Walking API** 自行格式化消息。Stack-Walking API 将为你提供调用者的类名和其他详细信息。这将需要你更改\
  \ Log4j 配置文件中的模式布局，以便 Log4j 不会确定并在消息中包含日志记录器的类名。\n*   你可以等待下一个版本的 Log4j，它*可能*会原生支持\
  \ JDK 9 平台日志记录器。在撰写本文时，Log4j 尚未发布此类公告。\n\n第 19 章 ■ 平台与 JVM 日志记录\n\n## 统一 JVM 日志记录\n\
  \nJDK 9 新增了一个命令行选项 `-Xlog`，它为你提供了一个单一访问点，用于访问从 JVM 所有组件记录的所有消息。此选项的使用语法有点复杂。在解释\
  \ `-Xlog` 选项的语法之前，我先解释一下记录的消息的详细信息。\n\n■ **提示** 你可以将 `-Xlog:help` 选项与 `java` 命令一起使用，以打印\
  \ `-Xlog` 选项的描述。该描述包含所有选项的语法和值，并附有示例。\n\n当 JVM 记录消息或当你查找 JVM 记录的消息时，请牢记以下几点：\n\n\
  *   JVM 需要识别消息所属的主题（或 JVM 组件）。例如，如果消息与垃圾回收相关，则消息应被标记为此类。一条消息可能属于多个主题。例如，一条消息可能属于垃圾回收和堆管理。因此，一条消息可能关联多个标签。\n\
  *   像任何其他日志记录工具一样，JVM 日志记录可能发生在不同级别，例如 `info`、`warning` 等。\n*   你应该能够用额外的上下文信息来装饰记录的消息，例如当前日期和时间、记录消息的线程、消息使用的标签等。\n\
  *   消息应该记录在哪里？应该记录到 `stdout`、`stderr` 还是一个或多个文件？你是否应该能够为日志文件指定日志记录选项的策略，例如文件名、大小和文件轮换策略。\n\
  \n如果你理解了这些要点，那么是时候学习以下用于描述 JVM 日志记录的术语了：\n\n*   标签\n*   级别\n*   装饰\n*   输出\n\n以下是在第\
  \ [3 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_3)中创建的 `com.jdojo.Welcome` 类使用\
  \ `-Xlog` 选项运行的示例。它记录所有带有 `gc` 标签且严重级别为 `trace` 或以上的消息，输出到标准输出，并带有级别、时间和标签装饰。\n\n\
  C:\\Java9revealed> java -Xlog:gc=trace:stdout:level,time,tags\n--module-path com.jdojo.intro\\\
  dist\n--module com.jdojo.intro/com.jdojo.intro.Welcome\n\n第 19 章 ■ 平台与 JVM 日志记录\n\
  \n[2017-02-10T12:50:11.412-0600][trace][gc] MarkStackSize: 4096k MarkStackSizeMax:\
  \ 16384k\n[2017-02-10T12:50:11.427-0600][debug][gc] ConcGCThreads: 1\n[2017-02-10T12:50:11.432-0600][debug][gc]\
  \ ParallelGCThreads: 4\n[2017-02-10T12:50:11.433-0600][debug][gc] Initialize mark\
  \ stack with 4096 chunks, maximum 16384\n[2017-02-10T12:50:11.436-0600][info ][gc]\
  \ Using G1\nWelcome to the Module System.\nModule Name: com.jdojo.intro\n\n## 消息标签\n\
