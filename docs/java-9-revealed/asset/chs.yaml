  Command: C:\\java9\\bin\\java.exe\nArguments: []\nCommandLine:\nStart Time: 2016-11-27T12:28:20.611-06:00[America/Chicago]\n\
  CPU Time: PT0.296875S\nOwner: kishori\\ksharan\nChildren Count: 1\n\n比较进程\n\n比较两个进程是否相等或排序是件棘手的事。你不能依赖\
  \ PID 来判断进程是否相等。操作系统会在进程终止后重用 PID。你可以同时检查进程的启动时间和 PID；如果两者都相同，那么这两个进程可能是同一个。`ProcessHandle`\
  \ 接口默认实现的 `equals()` 方法会检查以下三项信息来判断两个进程是否相等：\n\n*   两个进程的 `ProcessHandle` 接口的实现类必须相同。\n\
  *   进程必须具有相同的 PID。\n*   进程必须是在同一时间启动的。\n\n\n\n■ **提示** 在 `ProcessHandle` 接口中使用 `compareTo()`\
  \ 方法的默认实现对于排序来说并不十分有用。它比较的是两个进程的 PID。\n\n**创建进程**\n\n你需要使用 `ProcessBuilder` 类的实例来启动一个新进程。该类包含多个用于设置进程属性的方法。调用\
  \ `start()` 方法即可启动一个新进程。`start()` 方法返回一个 `Process` 对象，你可以用它来处理进程的输入、输出和错误流。以下代码片段创建了一个\
  \ `ProcessBuilder`，用于在 Windows 上启动 JVM：\n\n```java\nProcessBuilder pb = new ProcessBuilder()\n\
  \    .command(\"C:\\\\java9\\\\bin\\\\java.exe\",\n             \"--module-path\"\
  ,\n             \"myModulePath\",\n             \"--module\",\n             \"myModule/className\"\
  )\n    .inheritIO();\n```\n\n第 12 章 ■ 进程 API 更新\n\n有两种方法可以为这个新进程设置命令和参数：\n\n*  \
  \ 你可以将它们传递给 `ProcessBuilder` 类的构造函数。\n*   你可以使用 `command()` 方法。\n\n不带参数的 `command()`\
  \ 方法会返回在 `ProcessBuilder` 中设置的命令。其他带参数的重载版本——一个接受 `String` 可变参数，另一个接受 `List<String>`——用于设置命令和参数。方法中的第一个参数是命令路径，其余参数是该命令的参数。\n\
  \n新进程拥有自己的输入、输出和错误流。`inheritIO()` 方法将新进程的输入、输出和错误流设置为与当前进程相同。`ProcessBuilder` 类中有多个\
  \ `redirectXxx()` 方法，用于自定义新进程的标准 I/O，例如，将标准错误流设置到一个文件，这样所有错误都会被记录到文件中。一旦你配置好进程的所有属性，就可以调用\
  \ `start()` 来启动进程：\n\n```java\n// 启动一个新进程\nProcess newProcess = pb.start();\n```\n\
  \n你可以多次调用 `ProcessBuilder` 类的 `start()` 方法，以使用之前存储在其内部的相同属性启动多个进程。这样做有一个性能优势：你可以创建一个\
  \ `ProcessBuilder` 实例并重复使用它来多次启动同一个进程。\n\n你可以使用 `Process` 类的 `toHandle()` 方法获取进程的进程句柄：\n\
  \n```java\n// 获取进程句柄\nProcessHandle handle = newProcess.toHandle();\n```\n\n你可以使用进程句柄来销毁进程、等待进程结束，或者查询进程的状态和属性，例如其子进程、后代、父进程、使用的\
  \ CPU 时间等。你能获取到的进程信息以及对进程的控制能力，取决于操作系统的访问控制。\n\n要举出一个能在所有操作系统上运行的创建进程的例子是很有技巧性的。我准备了一个例子，其中创建新进程会启动一个新的\
  \ JVM 来运行一个类。如果你能运行本书中的其他示例，说明你的机器上已经安装了 JDK 9，那么这个示例应该也能在你的机器上运行。\n\n清单 12-3 包含了一个名为\
  \ `Job` 的类的代码。它的 `main()` 方法期望两个参数：休眠间隔和休眠时长（以秒为单位）。如果没有传入参数，该方法会使用 5 秒和 60 秒作为默认值。在第一部分中，该方法会尝试提取第一个和第二个参数（如果指定了的话）。\n\
  \n在第二部分中，它使用 `ProcessHandle.current()` 方法获取执行此方法的当前进程的进程句柄。它读取当前进程的 PID，并打印一条包含\
  \ PID、休眠间隔和休眠时长的消息。最后，它启动一个 `for` 循环，并持续休眠指定的间隔，直到达到休眠时长。在循环的每次迭代中，它都会打印一条消息。\n\n\
