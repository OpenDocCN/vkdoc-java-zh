  \ 15 章 ■ 增强的弃用机制\n\n弃用 API 的动态分析\n\njdeprscan 工具是一个静态分析工具，因此它会跳过对弃用 API 的动态使用。例如，你可以通过反射调用一个弃用方法，而该工具在扫描时会遗漏这种情况。你还可以在由\
  \ ServiceLoader 加载的提供者中调用弃用方法，该工具同样会遗漏这些调用。\n\n在未来的版本中，JDK 可能会提供一个名为 jdeprdetect\
  \ 的动态分析工具，用于在运行时跟踪弃用 API 的使用情况。该工具将有助于查找引用弃用 API 的死代码，这些代码由静态分析工具 jdeprscan 报告。\n\
  \n导入语句不再产生弃用警告\n\n直到 JDK 9，如果你使用 import 语句导入弃用结构，编译器都会生成警告，即使你在所有使用这些弃用导入结构的地方都使用了\
  \ @SuppressWarnings 注解。如果你试图消除代码中的所有弃用警告，这会非常烦人。你根本无法消除它们，因为你无法对 import 语句添加注解。JDK\
  \ 9 通过*省略*导入语句上的弃用警告改进了这一点。\n\n考虑名为 ImportDeprecationWarning 的类，如清单 15-5 所示。它在三个地方使用了名为\
  \ StringBufferInputStream 的弃用类：\n\n• 在 import 语句中\n• 在变量声明中\n• 在实例创建表达式中\n\n***清单\
  \ 15-5.*** ImportDeprecationWarning 类\n\n// ImportDeprecationWarning.java\n\npackage\
  \ com.jdojo.deprecation;\n\nimport java.io.StringBufferInputStream;\n\npublic class\
  \ ImportDeprecationWarning {\n\n@SuppressWarnings(\"deprecation\")\n\npublic static\
  \ void main(String[] args) {\n\nStringBufferInputStream sbis =\n\nnew StringBufferInputStream(\"\
  Hello\");\n\nfor(int c = sbis.read(); c != -1; c = sbis.read()) {\n\nSystem.out.println((char)c);\n\
  \n}\n\n}\n\n}\n\n请注意，ImportDeprecationWarning 类在 main() 方法上使用了 @SuppressWarnings\
  \ 注解来抑制弃用警告。在 JDK 8 中使用 -Xlint:deprecation 标志编译此类将生成以下警告。在 JDK 9 中编译此类不会生成任何弃用警告。\n\
  \nC:\\Java9Revealed\\com.jdojo.deprecation\\src>javac -Xlint:deprecation -d ..\\\
  build\\classes com\\\n\njdojo\\deprecation\\ImportDeprecationWarning.java\n\n第 15\
  \ 章 ■ 增强的弃用机制\n\ncom\\jdojo\\deprecation\\ImportDeprecationWarning.java:4: warning:\
  \ [deprecation]\n\nStringBufferInputStream in java.io has been deprecated\n\nimport\
  \ java.io.StringBufferInputStream;\n\n^\n\n1 warning\n\n如果你在 JDK 8 中编译此类，在移除 main()\
  \ 方法上的 @SuppressWarnings 注解后，\n\n\n\n`main()` 方法中，编译器会生成三条弃用警告——每条对应一次对已弃用的 `StringBufferInputStream`\
  \ 类的使用，而 JDK 9 只会生成两条弃用警告——不包括针对导入语句的警告。\n\n总结\n\nJava 中的弃用是一种提供 API 生命周期信息的方式。弃用一个\
  \ API 会告知其用户迁移离开，因为该 API 使用起来有风险、存在更好的替代方案，或者它将在未来版本中被移除。使用已弃用的 API 会在编译时生成弃用警告。\n\
  \n`@deprecated` Javadoc 标签和 `@Deprecated` 注解共同用于弃用 API 元素，例如模块、包、类型、构造方法、方法、字段、参数和局部变量。\n\
  \n在 JDK 9 之前，该注解不包含任何元素。它在运行时被保留。\n\nJDK 9 为该注解添加了两个元素：`since` 和 `forRemoval`。`since`\
  \ 元素默认为空字符串。其值表示 API 元素被弃用的 API 版本。`forRemoval` 元素的类型为 `boolean`，默认为 `false`。其值为\
  \ `true` 表示该 API 元素将在未来版本中被移除。\n\nJDK 9 编译器会根据 `@Deprecated` 注解的 `forRemoval` 元素的值生成两种类型的弃用警告：当\
  \ `forRemoval=false` 时生成*普通弃用警告*，当 `forRemoval=true` 时生成*移除警告*。\n\n在 JDK 9 之前，你可以通过在已弃用\
  \ API 的使用位置添加 `@SuppressWarnings(\"deprecation\")` 注解来抑制弃用警告。在 JDK 9 中，你需要使用 `@SuppressWarnings(\"\
  deprecation\")` 来抑制普通警告，使用 `@SuppressWarnings(\"removal\")` 来抑制移除警告，并使用 `@SuppressWarnings({\"\
  deprecation\", \"removal\"})` 来抑制这两种类型的警告。\n\n在 JDK 9 之前，使用 `import` 语句导入一个已弃用的构造方法会生成编译时弃用警告。JDK\
  \ 9 省略了此类警告。\n\n**第 16 章**\n\n**栈遍历**\n\n在本章中，你将学习：\n\n• 什么是栈和栈帧\n\n• 在 JDK 9 之前如何遍历线程的栈\n\
  \n• 在 JDK 9 中如何使用 `StackWalker` API 遍历线程的栈\n\n• 如何在 JDK 9 中获取调用者的类\n\n什么是栈？\n\n\
  JVM 中的每个线程都有一个*私有*的 JVM 栈，该栈在线程创建时同时创建。栈是一种后进先出（LIFO）的数据结构。栈存储帧。每当调用一个方法时，就会创建一个新帧并将其推送到栈顶。当方法调用完成时，该帧被销毁（从栈中弹出）。栈上的每个帧都包含其自己的局部变量数组，以及其自己的操作数栈、返回值和指向当前方法类运行时常量池的引用。\n\
  \nJVM 的特定实现可能会扩展一个帧以存储更多信息。\n\nJVM 栈上的一个帧表示给定线程中的一次 Java 方法调用。在给定线程中，任何时刻只有一个帧是活动的。这个活动的帧被称为*当前帧*，其方法被称为*当前方法*。定义当前方法的类被称为*当前类*。当当前帧的方法调用另一个方法时，该帧不再是当前帧——一个新帧被推送到栈上，正在执行的方法成为当前方法，新帧成为当前帧。当方法返回时，旧帧再次成为当前帧。有关\
  \ JVM 栈和帧的更多详细信息，请参阅 [`docs.oracle.com/javase/specs/jvms/`](https://docs.oracle.com/javase/specs/jvms/se8/html/index.html)\
  \ 上的 Java 虚拟机规范。\n\n■ **提示** 如果 JVM 支持本地方法，一个线程还包含一个本地方法栈，其中包含每个本地方法调用的本地方法帧。\n\n\
  \n\n图 16-1 展示了两个线程及其 JVM 栈。第一个线程的 JVM 栈包含四个帧，第二个线程的 JVM 栈包含三个帧。帧 4 是线程 1 中的活动帧，帧\
  \ 3 是线程 2 中的活动帧。\n\n© Kishori Sharan 2017\n\nK. Sharan, *Java 9 揭秘*, DOI 10.1007/978-1-4842-2592-9_16\n\
  \n第 16 章 ■ 栈遍历\n\n线程 1\n\n线程 2\n\n帧 4\n\n帧 3\n\n帧 3\n\n帧 2\n\n帧 2\n\n帧 1\n\n帧 1\n\
  \n***图 16-1.** JVM 中线程及其私有 JVM 栈的排列*\n\n什么是栈遍历？\n\n栈遍历（或栈行走）是遍历线程的栈帧并检查帧内容的过程。从\
  \ Java 1.4 开始，您可以获取线程栈的快照，并获取每个帧的详细信息，例如方法调用发生的类名和方法名、源文件名、源文件中的行号等。用于栈遍历的类和接口位于栈遍历\
  \ API 中。\n\nJDK 8 中的栈遍历\n\n在 JDK 9 之前，可以使用 `java.lang` 包中的以下类遍历线程栈中的所有帧：\n\n• `Throwable`\n\
  \n• `Thread`\n\n• `StackTraceElement`\n\n`StackTraceElement` 类的实例代表一个栈帧。`Throwable`\
  \ 类的 `getStackTrace()` 方法返回一个 `StackTraceElement[]`，其中包含当前线程栈的帧。\n\n`Thread` 类的\
  \ `getStackTrace()` 方法返回一个 `StackTraceElement[]`，其中包含线程栈的帧。数组的第一个元素是栈顶帧，代表序列中最后一次方法调用。某些\
  \ JVM 实现可能会省略返回数组中的一些帧。\n\n`StackTraceElement` 类包含以下方法，这些方法返回该帧所代表的方法调用的详细信息：\n\n\
  • `String getClassLoaderName()`\n\n• `String getClassName()`\n\n• `String getFileName()`\n\
  \n• `int getLineNumber()`\n\n第 16 章 ■ 栈遍历\n\n• `String getMethodName()`\n\n• `String\
  \ getModuleName()`\n\n• `String getModuleVersion()`\n\n• `boolean isNativeMethod()`\n\
  \n■ **提示** `getModuleName()`、`getModuleVersion()` 和 `getClassLoaderName()` 方法是在\
  \ JDK 9 中添加到该类中的。\n\n`StackTraceElement` 类中的大多数方法都具有直观的名称，例如，`getMethodName()` 方法返回此帧所代表的方法调用的名称。`getFileName()`\
  \ 方法返回包含方法调用代码的源文件名，`getLineNumber()` 返回源文件中方法调用代码的行号。\n\n以下代码片段展示了如何使用 `Throwable`\
  \ 和 `Thread` 类检查当前线程的栈：\n\n// 使用 Throwable 类\n\nStackTraceElement[] frames = new\
  \ Throwable().getStackTrace();\n\n// 使用 Thread 类\n\nStackTraceElement[] frames2\
  \ = Thread.currentThread()\n\n.getStackTrace();\n\n// 在此处处理帧...\n\n本章中的所有程序都是 `com.jdojo.stackwalker`\
  \ 模块的一部分，其声明如清单 16-1 所示。\n\n***清单 16-1.*** 名为 com.jdojo.stackwalker 的模块的声明\n\n//\
