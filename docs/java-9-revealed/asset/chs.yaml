  \n-C com.jdojo.mrjar.jdk9\\build\\classes com\\jdojo\\mrjar\\TimeUtil.class\n\n\
  你可以使用以下命令验证新 MRJAR 的内容：\n\nC:\\Java9Revealed>jar --list --file mrjars\\com.jdojo.mrjar2.jar\n\
  \nMETA-INF/\n\nMETA-INF/MANIFEST.MF\n\nMETA-INF/versions/9/module-info.class\n\n\
  com/\n\ncom/jdojo/\n\ncom/jdojo/mrjar/\n\ncom/jdojo/mrjar/Main.class\n\ncom/jdojo/mrjar/TimeUtil.class\n\
  \nMETA-INF/versions/9/com/jdojo/mrjar/TimeUtil.class\n\n如果在 JDK 8 上运行 `Main` 类，你将得到与之前相同的输出。然而，在\
  \ JDK 9 上运行则会得到不同的输出：\n\nC:\\Java9Revealed>c:\\java9\\bin\\java --module-path mrjars\\\
  com.jdojo.mrjar2.jar --module com.jdojo.mrjar/com.jdojo.mrjar.Main\n\nInside JDK\
  \ 8 version of Main.main()...\n\nCreating JDK 9 version of TimeUtil...\n\nLocal\
  \ Date: 2017-01-27\n\n第 6 章 ■ 打包模块\n\n输出显示，`Main` 类来自 JAR 根目录，而 `TimeUtil` 类则来自\
  \ `META-INF/versions/9` 目录。请注意，你得到的本地日期值会有所不同。它会打印你机器上的当前日期。\n\n多版本 JAR 的规则\n\n\
  在创建多版本 JAR 时，你需要遵循一些规则。如果出错，`jar` 工具会打印错误信息。有时，错误信息并不直观。正如我所建议的，最好使用 `--verbose`\
  \ 选项运行 `jar` 工具，以获取关于错误的更多详细信息。\n\n大多数规则基于一个事实：一个 MRJAR 包含一个库（或应用）的某个版本 API，该 API\
  \ 面向多个 JDK 平台。例如，你有一个名为 `jdojo-lib-1.0.jar` 的 MRJAR，它可能包含名为 `jdojo-lib` 的库的 1.0\
  \ 版本 API，并且该库可能使用了 JDK 8 和 JDK 9 的 API。这意味着，当这个 MRJAR 在 JDK 8 的类路径、JDK 9 的类路径或 JDK\
  \ 9 的模块路径上使用时，它应该提供相同的 API（就公共类型及其公共成员而言）。如果该 MRJAR 在 JDK 8 和 JDK 9 上提供了不同的 API，那么它就不是一个有效的\
  \ MRJAR。以下部分描述了一些规则。\n\n模块化多版本 JAR\n\n一个 MRJAR 可以是一个模块化 JAR，在这种情况下，它可以在根目录、一个或多个版本化目录中，或两者的组合中包含模块描述符\
  \ `module-info.class`。版本化描述符必须与根模块描述符相同，但以下情况除外：\n\n*   版本化描述符可以对 `java.*` 和 `jdk.*`\
  \ 模块具有不同的非传递性 `requires` 语句。\n*   不同的模块描述符不能对非 JDK 模块具有不同的非传递性 `requires` 语句。\n\
  *   版本化描述符可以具有不同的 `uses` 语句。\n\n这些规则基于这样一个事实：允许更改实现细节，但不允许更改 API 本身。允许更改非 JDK 模块的\
  \ `requires` 语句被视为对 API 的更改——这要求你为不同版本的 JDK 拥有不同的用户定义模块。这就是不允许这样做的原因。\n\n一个模块化 MRJAR\
  \ 在根目录中不必有模块描述符。这就是我们在上一节示例中的情况。我们在根目录中没有模块描述符，但在 `META-INF/versions/9` 目录中有一个。这种安排使得在一个\
  \ MRJAR 中同时包含 JDK 8 的非模块化代码和 JDK 9 的模块化代码成为可能。\n\n模块化多版本 JAR 与封装\n\n\n\n如果你在版本化目录中添加了一个根目录中不存在的新公共类型，那么在创建\
  \ MRJAR 时会收到错误。假设在我们的示例中，你为 JDK 9 添加了一个名为 `Test` 的公共类。如果 `Test` 类位于 `com.jdojo.mrjar`\
  \ 包中，它将被模块导出，并且对 MRJAR 外部的代码可用。请注意，根目录不包含 `Test` 类，因此这个 MRJAR 为 JDK 8 和 JDK 9 提供了不同的公共\
  \ API。在这种情况下，为 JDK 9 在 `com.jdojo.mrjar` 包中添加公共的 `Test` 类会在创建 MRJAR 时产生错误。\n\n继续使用同一个示例，假设你为\
  \ JDK 9 将 `Test` 类添加到了 `com.jdojo.test` 包中。请注意，该模块并未导出此包。当你在模块路径上使用此 MRJAR 时，`Test`\
  \ 类将无法被外部代码访问。从这个意义上说，这个 MRJAR 为 JDK 8 和 JDK 9 提供了相同的公共 API。然而，这里有一个陷阱！你也可以在 JDK\
  \ 9 中将此 MRJAR 放置在类路径上，在这种情况下，`Test` 类可以被外部代码访问——这违反了模块封装原则，也违反了 MRJAR 应在不同 JDK 版本间提供相同公共\
  \ API 的规则。因此，在 MRJAR 中向模块的未导出包添加公共类型也是不允许的。如果你尝试这样做，将会收到类似如下的错误信息：\n\n```\nentry:\
  \ META-INF/versions/9/com/jdojo/test/Test.class, contains a new public class not\
  \ found\nin base entries\ninvalid multi-release jar file mrjars\\com.jdojo.mrjar.jar\
  \ deleted\n```\n\n有时，为了支持更新版本的 JDK，有必要为同一个库添加更多类型。必须添加这些类型以支持更新的实现。你可以通过在 MRJAR\
  \ 的版本化目录中添加包私有类型来实现这一点。在此示例中，如果你将 `Test` 类设为非公共类，就可以为 JDK 9 添加它。\n\n**多版本 JAR 与引导加载器**\n\
  \n引导加载器不支持多版本 JAR，例如，使用 `-Xbootclasspath/a` 选项指定 MRJAR。支持此功能会使引导加载器的实现因一个很少需要的特性而变得复杂。\n\
  \n**相同版本的文件**\n\nMRJAR 应在版本化目录中包含同一文件的不同版本。如果某个资源或类文件在不同平台版本间是相同的，则该文件应仅添加到根目录一次。\n\
  \n目前，如果 `jar` 工具在多个版本化目录中看到具有相同内容的相同条目，它会发出警告。\n\n让我们看看这条规则的实际应用。将 `com.jdojo.mrjar.jdk9\\\
  build\\classes` 目录的内容复制到 `com.jdojo.mrjar.jdk10\\build\\classes` 目录，这样两个目录就具有相同的内容。运行以下命令创建一个包含\
  \ JDK 8、9 和 10 代码的 MRJAR。请注意，版本化目录 9 和 10 中的文件将是相同的。输出中的警告清晰明确。\n\n```\nC:\\Java9Revealed>jar\
  \ --create --file mrjars\\com.jdojo.mrjar.jar\n-C com.jdojo.mrjar.jdk8\\build\\\
  classes .\n--release 9 -C com.jdojo.mrjar.jdk9\\build\\classes .\n--release 10 -C\
  \ com.jdojo.mrjar.jdk10\\build\\classes .\nWarning: entry META-INF/versions/9/com/jdojo/mrjar/Main.class\
  \ contains a class that\nis identical to an entry already in the jar\nWarning: entry\
  \ META-INF/versions/9/com/jdojo/mrjar/TimeUtil.class contains a class that\nis identical\
  \ to an entry already in the jar\n```\n\n**多版本 JAR 与 JAR URL**\n\n在 MRJAR 出现之前，JAR\
  \ 中的所有资源都位于根目录中。当你从类加载器请求资源时（`ClassLoader.getResource(\"com/jdojo/mrjar/TimeUtil.class\"\
  )`），返回的 URL 类似于以下内容：\n\n```\njar:file:/C:/Java9Revealed/mrjars/com.jdojo.mrjar.jar!\
  \ com/jdojo/mrjar/TimeUtil.class\n```\n\n使用 MRJAR 后，资源可能从根目录或版本化目录返回。如果你在 JDK 9\
  \ 上查找 `TimeUtil.class` 文件，URL 将如下所示：\n\n\n\njar:file:/C:/Java9Revealed/mrjars/com.jdojo.mrjar.jar!/META-INF/versions/9/com/jdojo/mrjar/\n\
  \nTimeUtil.class\n\n如果你现有的代码期望资源以特定格式的 jar URL 存在，或者你手动编写了类似的 jar URL，那么使用多版本 JAR（MRJAR）时可能会得到出乎意料的结果。如果你正在用\
  \ MRJAR 重新打包你的 JAR，你需要重新审视你的代码并对其进行修改，使其能与 MRJAR 兼容。\n\n多版本清单属性\n\n一个 MRJAR 在其 `MANIFEST.MF`\
  \ 文件中包含一个特殊的属性条目：\n\nMulti-Release: true\n\n`Multi-Release` 属性是由 `jar` 工具为 MRJAR\
  \ 添加的。如果该属性的值为 `true`，则表示该 JAR 是一个多版本 JAR。如果其值为 `false` 或该属性缺失，则它不是多版本 JAR。该属性被添加到清单文件的主节中。\n\
  \n在 `java.util.jar` 包中的 `Attributes.Name` 类里新增了一个名为 `MULTI_RELEASE` 的常量，用于表示清单文件中的新属性\
  \ `Multi-Release`。因此，在 Java 代码中，`Attributes.Name.MULTI_RELEASE` 常量代表 `Multi-Release`\
  \ 属性的值。\n\nJMOD 格式\n\nJDK 9 引入了一种名为 JMOD 的新格式来打包模块。JMOD 文件旨在处理比 JAR 文件更多的内容类型。JMOD\
  \ 文件可以打包本地代码、配置文件、本地命令以及其他类型的数据。在撰写本文时，JMOD 格式基于 ZIP 格式，但未来将会发生变化。JDK 9 模块以 JMOD\
  \ 格式打包，供你在编译时和链接时使用。JMOD 格式在运行时不受支持。你可以在 `JDK_HOME\\jmods` 目录中找到它们，其中 `JDK_HOME`\
  \ 是你安装 JDK 9 的目录。你可以将自己的模块打包成 JMOD 格式。JMOD 格式的文件具有 `.jmod` 扩展名。例如，名为 `java.base`\
  \ 的平台模块被打包在 `java.base.jmod` 文件中。\n\nJMOD 文件可以包含本地代码，这在运行时动态提取和链接会有些棘手。这就是 JMOD\
  \ 文件在编译时和链接时受支持，但在运行时不受支持的原因。\n\n使用 jmod 工具\n\nJDK 9 附带了一个名为 `jmod` 的新工具。它位于 `JDK_HOME\\\
  bin` 目录中。该工具可用于创建 JMOD 文件、列出 JMOD 文件的内容、打印模块的描述以及记录所用模块的哈希值。使用 `jmod` 工具的一般语法如下：\n\
  \njmod <子命令> <选项> <jmod-文件>\n\n第 6 章 ■ 打包模块\n\n你必须将以下子命令之一与 `jmod` 命令一起使用：\n\n•\
  \ create\n\n• extract\n\n• list\n\n• describe\n\n• hash\n\n`list` 和 `describe` 子命令不接受任何选项。`<jmod-文件>`\
  \ 是你正在创建的 JMOD 文件，或者是你想要描述的现有 JMOD 文件。表 6-1 包含了该工具支持的选项列表。\n\n***表 6-1.** jmod 工具的选项列表*\n\
  \n**选项**\n\n**描述**\n\n--class-path <路径>\n\n指定可以找到待打包类的类路径。\n\n<路径> 可以是一个指向 JAR 文件或包含应用程序类的目录的路径列表。\n\
  \n<路径> 中的内容将被复制到 JMOD 文件中。\n\n--cmds <路径>\n\n指定包含需要复制到 JMOD 文件中的本地命令的目录列表。\n\n--config\
  \ <路径>\n\n指定包含需要复制到 JMOD 文件中的用户可编辑配置文件的目录列表。\n\n--dir <路径>\n\n指定将指定 JMOD 文件的内容提取到的目标目录。\n\
  \n--do-not-resolve-by-default\n\n如果你使用此选项创建 JMOD 文件，则该 JMOD 文件中的模块将从默认的根模块集中排除。要解析此类模块，你必须使用\
  \ `--add-modules` 命令行选项将其添加到默认的根模块集中。\n\n--dry-run\n\n对模块哈希进行试运行。使用此选项，计算并打印哈希值，但不会将其记录在\
  \ JMOD 文件中。\n\n--exclude <模式列表>\n\n排除与提供的逗号分隔模式匹配的文件。\n\n\n\n列表中的每个元素使用以下格式之一：`<glob-pattern>`、`glob:<glob-pattern>`\
  \ 或 `regex:<regex-pattern>`。\n\n`--hash-modules <regex-pattern>`\n\n计算并记录哈希值，用于将打包的模块与匹配给定\
  \ `<regex-pattern>` 且直接或间接依赖于它的模块关联起来。这些哈希值会记录在正在创建的 JMOD 文件中，或者记录在使用 `jmod hash`\
  \ 命令指定的模块路径上的 JMOD 文件或模块化 JAR 中。\n\n`--help, -h`\n\n打印 jmod 命令的用法说明及所有选项的列表。\n\n\
  `--header-files <path>`\n\n指定一个路径列表作为 `<path>`，其中包含要复制到 JMOD 文件中的本地代码头文件。\n\n`--help-extra`\n\
  \n打印 jmod 工具支持的额外选项的帮助信息。\n\n（*续*）\n\n第 6 章 ■ 打包模块\n\n***表 6-1.*** （*续*）\n\n**选项**\n\
  \n**描述**\n\n`--legal-notices <path>`\n\n指定要复制到 JMOD 文件中的法律声明的存放位置。\n\n`--libs <path>`\n\
  \n指定包含要复制到 JMOD 文件中的本地库的目录列表。\n\n`--main-class <class-name>`\n\n指定用于运行应用程序的主类名称。\n\
  \n`--man-pages <path>`\n\n指定手册页的存放位置。\n\n`--module-version <version>`\n\n指定要记录在\
  \ `module-info.class` 文件中的模块版本。\n\n`--module-path <path>`,\n\n指定用于查找模块以进行哈希计算的模块路径。\n\
  \n`-p <path>`\n\n`--os-arch <os-arch>`\n\n指定要记录在 `module-info.class` 文件中的操作系统架构。\n\
  \n`--os-name <os-name>`\n\n指定要记录在 `module-info.class` 文件中的操作系统名称。\n\n`--version`\n\
  \n打印 jmod 工具的版本信息。\n\n`--warn-if-resolved <reason>`\n\n向 jmod 工具提供一个提示，当解析到已弃用、标记为弃用待移除或处于孵化状态的模块时，发出警告。`<reason>`\
  \ 的值可以是以下三者之一：`deprecated`、`deprecated-for-removal` 或 `incubating`。\n\n`@<filename>`\n\
  \n从指定文件中读取选项。\n\n以下各节将详细说明如何使用 jmod 命令。本章中使用的所有命令均在一行内输入。有时，为了在书中清晰展示，我会将它们分成多行显示。\n\
  \n**创建 JMOD 文件**\n\n你可以使用 jmod 工具的 `create` 子命令创建 JMOD 文件。JMOD 文件的内容即模块的内容。假设存在以下目录和文件：\n\
  \n`C:\\Java9Revealed\\jmods`\n\n`C:\\Java9Revealed\\lib\\com.jdojo.prime.jar`\n\n\
  以下命令在 `C:\\Java9Revealed\\jmods` 目录中创建 `com.jdojo.prime.jmod` 文件。该 JMOD 文件的内容来自\
  \ `com.jdojo.prime.jar` 文件。\n\n`C:\\Java9Revealed>jmod create --class-path lib\\\
  com.jdojo.prime.jar jmods\\com.jdojo.prime.jmod`\n\n通常，JMOD 文件的内容来自包含模块编译后代码的一组目录。以下命令创建\
  \ `com.jdojo.prime.jmod` 文件。其内容来自 `mods\\com.jdojo.prime` 目录。该命令使用 `--module-version`\
  \ 选项设置模块版本，该版本将记录在 `com.jdojo.prime\\build\\classes` 目录下的 `module-info.class` 文件中。\n\
  \n请确保删除上一步创建的 JMOD 文件。\n\n`C:\\Java9Revealed>jmod create --module-version 1.0 --class-path\
  \ com.jdojo.prime\\build\\classes jmods\\com.jdojo.prime.jmod`\n\n你能用这个 JMOD 文件做什么？你可以将其放在模块路径上，以便在编译时使用。你也可以将其与\
  \ `jlink` 工具一起使用，创建自定义运行时映像，从而运行你的应用程序。\n\n请注意，你不能在运行时使用它。如果你尝试将 JMOD 文件放在模块路径上并在运行时使用，将会收到以下错误：\n\
  \n`Error occurred during initialization of VM`\n\n`java.lang.module.ResolutionException:\
  \ JMOD files not supported: jmods\\com.jdojo.prime.jmod`\n\n...\n\n**提取 JMOD 文件内容**\n\
  \n你可以使用 `extract` 子命令提取 JMOD 文件的内容。以下命令将 `jmods\\com.jdojo.prime.jmod` 文件的内容提取到名为\
  \ `extracted` 的目录中。\n\n\n\nC:\\Java9Revealed>jmod extract --dir extracted jmods\\\
  com.jdojo.prime.jmod\n\n如果不使用 `--dir` 选项，JMOD 文件的内容将被提取到当前目录。\n\n**列出 JMOD 文件内容**\n\
  \n你可以使用 `jmod` 工具的 `list` 子命令来打印 JMOD 文件中所有条目的名称。以下命令列出了上一节中创建的 `com.jdojo.prime.jmod`\
  \ 文件的内容：\n\nC:\\Java9Revealed>jmod list jmods\\com.jdojo.prime.jmod\n\nclasses/module-info.class\n\
  \nclasses/com/jdojo/prime/PrimeChecker.class\n\n以下命令列出了 `java.base` 模块的内容，该模块以名为\
  \ `java.base.jmod` 的 JMOD 文件形式提供。该命令假设你已将 JDK 9 安装在 `C:\\java9` 目录中。\n\n输出内容超过 120\
  \ 页。此处仅显示部分输出。请注意，JMOD 文件在内部将不同类型的内容存储在不同的目录中。\n\nC:\\Java9Revealed>jmod list C:\\\
  java9\\jmods\\java.base.jmod\n\nclasses/module-info.class\n\nclasses/java/nio/file/WatchEvent.class\n\
  \nclasses/java/nio/file/WatchKey.class\n\nbin/java.exe\n\nbin/javaw.exe\n\nnative/amd64/jvm.cfg\n\
  \n第 6 章 ■ 打包模块\n\nnative/java.dll\n\nconf/net.properties\n\nconf/security/java.policy\n\
  \nconf/security/java.security\n\n...\n\n**描述 JMOD 文件**\n\n你可以使用 `jmod` 工具的 `describe`\
  \ 子命令来描述 JMOD 文件中包含的模块。以下命令描述了 `com.jdojo.prime.jmod` 文件中包含的模块：\n\nC:\\Java9Revealed>jmod\
  \ describe jmods\\com.jdojo.prime.jmod\n\ncom.jdojo.prime@1.0\n\nrequires mandated\
  \ java.base\n\nuses com.jdojo.prime.PrimeChecker\n\nexports com.jdojo.prime\n\n\
  你可以使用此命令描述平台模块。以下命令描述了 `java.sql.jmod` 文件中包含的模块，假设你已将 JDK 9 安装在 `C:\\java9` 目录中：\n\
  \nC:\\Java9Revealed>jmod describe C:\\java9\\jmods\\java.sql.jmod\n\njava.sql@9-ea\n\
  \nrequires mandated java.base\n\nrequires transitive java.logging\n\nrequires transitive\
  \ java.xml\n\nuses java.sql.Driver\n\nexports java.sql\n\nexports javax.sql\n\n\
  exports javax.transaction.xa\n\noperating-system-name Windows\n\noperating-system-architecture\
  \ amd64\n\n**记录模块哈希值**\n\n你可以使用 `jmod` 工具的 `hash` 子命令，在 JMOD 文件所包含模块的 `module-info.class`\
  \ 文件中记录其他模块的哈希值。这些哈希值稍后将用于依赖项验证。假设你在四个 JMOD 文件中有四个模块：\n\n• com.jdojo.prime\n\n•\
  \ com.jdojo.prime.generic\n\n• com.jdojo.prime.faster\n\n• com.jdojo.prime.client\n\
  \n第 6 章 ■ 打包模块\n\n假设你想将这些模块分发给你的客户，并确保模块代码保持不变。你可以通过在 `com.jdojo.prime` 模块中记录 `com.jdojo.prime.generic`、`com.jdojo.prime.faster`\
  \ 和 `com.jdojo.prime.client` 模块的哈希值来实现这一点。让我们看看如何实现。\n\n为了计算其他模块的哈希值，`jmod` 工具需要找到这些模块。你需要使用\
  \ `--module-path` 选项来指定模块路径，以便找到其他模块。你还需要使用 `--hash-modules` 选项来指定需要记录哈希值的模块的模式列表。\n\
  \n■ **提示** 当你将模块打包为模块化 JAR 时，也可以使用 `jar` 工具的 `--hash-modules` 和 `--module-path`\
  \ 选项来记录依赖模块的哈希值。\n\n使用以下四个命令为这四个模块创建 JMOD 文件。请注意，我在创建 `com.jdojo.prime.client.jmod`\
  \ 文件时使用了 `--main-class` 选项。我将在[第 7 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_7)讨论\
  \ `jlink` 工具时再次使用它。如果在运行这些命令时遇到“文件已存在”错误，请从 `jmods` 目录中删除现有的 JMOD 文件并重新运行命令。\n\n\
  C:\\Java9Revealed>jmod create --module-version 1.0\n\n--class-path com.jdojo.prime\\\
  build\\classes jmods\\com.jdojo.prime.jmod\n\nC:\\Java9Revealed>jmod create --module-version\
  \ 1.0\n\n--class-path com.jdojo.prime.generic\\build\\classes\n\njmods\\com.jdojo.prime.generic.jmod\n\
  \nC:\\Java9Revealed>jmod create --module-version 1.0\n\n--class-path com.jdojo.prime.faster\\\
  build\\classes\n\njmods\\com.jdojo.prime.faster.jmod\n\nC:\\Java9Revealed>jmod create\
  \ --main-class com.jdojo.prime.client.Main\n\n--module-version 1.0\n\n--class-path\
  \ com.jdojo.prime.client\\build\\classes\n\njmods\\com.jdojo.prime.client.jmod\n\
  \n现在，你可以使用以下命令，在 `com.jdojo.prime` 模块中记录所有名称以 `com.jdojo.prime.` 开头的模块的哈希值：\n\n\
  C:\\Java9Revealed>jmod hash --module-path jmods\n\n--hash-modules com.jdojo.prime.?\
  \ jmods\\com.jdojo.prime.jmod\n\n哈希值已记录在模块 com.jdojo.prime 中\n\n让我们查看记录在 `com.jdojo.prime`\
  \ 模块中的哈希值。以下命令打印模块描述以及记录在 `com.jdojo.prime` 模块中的哈希值：\n\nC:\\Java9Revealed>jmod describe\
  \ jmods\\com.jdojo.prime.jmod\n\n第 6 章 ■ 打包模块\n\ncom.jdojo.prime@1.0\n\nrequires\
  \ mandated java.base\n\nuses com.jdojo.prime.PrimeChecker\n\nexports com.jdojo.prime\n\
  \nhashes com.jdojo.prime.client SHA-256\n\n2ffb0d4413501e389d6712450bd138bbe82ca8abeb4e8b5d29b0c307d90a2e91\n\
  \nhashes com.jdojo.prime.faster SHA-256\n\n687e07c429080c48bed89a649dca20fa26dc28fab88a4905f1b5070560622a0c\n\
  \nhashes com.jdojo.prime.generic SHA-256\n\nf24556ef69c4345ad7a8e5e59d31ea2d52c8749714ede0c0dedf128255450708\n\
  \n你也可以在使用 `create` 子命令创建新的 JMOD 文件时记录其他模块的哈希值。假设三个模块 `com.jdojo.prime.generic`、`com.jdojo.prime.faster`\
  \ 和 `com.jdojo.prime.client` 存在于模块路径上，你可以使用以下命令创建 `com.jdojo.prime.jmod` 文件，该文件还将记录这三个模块的哈希值：\n\
  \nC:\\Java9Revealed>jmod create --module-version 1.0\n\n--module-path jmods\n\n\
  --hash-modules com.jdojo.prime.?\n\n--class-path com.jdojo.prime\\build\\classes\
  \ jmods\\com.jdojo.prime.jmod\n\n你可以对 JMOD 文件进行哈希处理过程的试运行，此时将打印哈希值，但不会记录。试运行选项有助于在不创建\
  \ JMOD 文件的情况下确保所有设置正确。以下命令序列将引导你完成此过程。首先，删除上一步中创建的 `jmods\\com.jdojo.prime.jmod`\
  \ 文件。\n\n以下命令创建 `jmods\\com.jdojo.prime.jmod` 文件，但不记录任何其他模块的哈希值：\n\nC:\\Java9Revealed>jmod\
  \ create --module-version 1.0\n\n--module-path jmods\n\n--class-path com.jdojo.prime\\\
  build\\classes jmods\\com.jdojo.prime.jmod\n\n以下命令试运行 `hash` 子命令。它计算并打印与 `--hash-modules`\
  \ 选项中指定的正则表达式匹配的其他模块的哈希值。不会在 `jmods\\com.jdojo.prime.jmod` 文件中记录任何哈希值。\n\nC:\\Java9Revealed>jmod\
  \ hash --dry-run --module-path jmods\n\n--hash-modules com.jdojo.prime.? jmods\\\
  com.jdojo.prime.jmod\n\n试运行：\n\ncom.jdojo.prime\n\nhashes com.jdojo.prime.client\
  \ SHA-256\n\n2ffb0d4413501e389d6712450bd138bbe82ca8abeb4e8b5d29b0c307d90a2e91\n\n\
  hashes com.jdojo.prime.faster SHA-256\n\n687e07c429080c48bed89a649dca20fa26dc28fab88a4905f1b5070560622a0c\n\
  \nhashes com.jdojo.prime.generic SHA-256\n\nf24556ef69c4345ad7a8e5e59d31ea2d52c8749714ede0c0dedf128255450708\n\
  \n第 6 章 ■ 打包模块\n\n以下命令验证了上一条命令没有在 JMOD 文件中记录任何哈希值： C:\\Java9Revealed>jmod describe\
  \ jmods\\com.jdojo.prime.jmod\n\ncom.jdojo.prime@1.0\n\nrequires mandated java.base\n\
  \nuses com.jdojo.prime.PrimeChecker\n\nexports com.jdojo.prime\n\n**总结**\n\nJDK\
  \ 9 支持四种打包模块的格式：展开目录、JAR 文件、JMOD 文件和 JIMAGE\n\n\n\n文件。JAR 格式在 JDK 9 中得到了增强，以支持模块化\
  \ JAR 和多版本 JAR。多版本 JAR 允许你打包面向不同 JDK 版本的同一版本的库或应用程序。例如，一个多版本 JAR 可能包含库版本 1.2 的代码，其中包含针对\
  \ JDK 8 和 JDK 9 的代码。当该多版本 JAR 在 JDK 8 上使用时，将使用库代码的 JDK 8 版本；当它在 JDK 9 上使用时，将使用库代码的\
  \ JDK 9 版本。特定于 JDK 版本 N 的文件存储在多版本 JAR 的 `META-INF\\versions\\N` 目录中。所有 JDK 版本通用的文件存储在根目录中。对于不支持多版本\
  \ JAR 的环境，此类 JAR 将被视为常规 JAR。在多版本 JAR 中，文件的搜索顺序有所不同——所有以当前平台主版本号开头的版本化目录会在根目录之前被搜索。\n\
  \nJMOD 文件旨在处理比 JAR 文件更多的内容类型。它们可以打包原生代码、配置文件、原生命令以及其他类型的数据。在撰写本文时，JMOD 格式基于 ZIP\
  \ 格式，但未来将会改变。JDK 9 模块以 JMOD 格式打包，供你在编译时和链接时使用。JMOD 格式在运行时不受支持。你可以使用 `jmod` 工具来处理\
  \ JMOD 文件。\n\n**第 7 章**\n\n**创建自定义运行时镜像**\n\n在本章中，你将学习：\n\n• 什么是自定义运行时镜像和 JIMAGE\
  \ 格式\n\n• 如何使用 `jlink` 工具创建自定义运行时镜像\n\n• 如何指定用于运行存储在自定义镜像中的应用程序的命令名称\n\n• 如何将插件与\
  \ `jlink` 工具一起使用\n\n什么是自定义运行时镜像？\n\n在 JDK 9 之前，Java 运行时镜像作为一个庞大的单体工件提供——从而增加了下载时间、启动时间和内存占用。单体\
  \ JRE 使得无法在内存较小的设备上使用 Java。如果你将 Java 应用程序部署到云端，你需要为使用的内存付费；通常情况下，单体 JRE 使用的内存超出所需，从而导致你为云服务支付更多费用。\n\
  \nJava 8 中引入的紧凑配置文件迈出了减小 JRE 大小（从而减小运行时内存占用）的一步，它允许你将 JRE 的子集打包到一个称为*紧凑配置文件*的自定义运行时镜像中。\n\
  \nJava 9 采用了一种整体方法来打包运行时镜像。所有平台代码都已模块化。\n\n你的应用程序代码也作为模块打包。在 Java 9 中，你可以创建一个自定义运行时，其中包含你的应用程序模块以及你的应用程序所使用的那些平台模块。你还可以在运行时镜像中打包原生命令。创建运行时镜像的另一个好处是，你只需向应用程序用户交付一个包——即运行时镜像——他们无需下载和安装单独的\
  \ JRE 包即可运行你的应用程序。\n\n运行时镜像以一种称为 JIMAGE 的特殊格式存储，该格式针对空间和速度进行了优化。\n\nJIMAGE 格式仅在运行时受支持。它是一种用于在\
  \ JDK 中存储和索引模块、类及资源的容器格式。从 JIMAGE 文件中搜索和加载类的速度比从 JAR 和 JMOD 文件快得多。JIMAGE 格式是 JDK\
  \ 内部的，开发者很少需要直接与 JIMAGE 文件交互。\n\nJIMAGE 格式预计会随着时间的推移发生显著变化，因此其内部细节不会向开发者公开。JDK 9\
  \ 附带了一个名为 `jimage` 的工具，可用于探索 JIMAGE 文件。\n\n我将在本章的单独一节中详细解释该工具。\n\n■ **提示** 你使用 `jlink`\
  \ 工具来创建运行时镜像，该镜像使用一种名为 JIMAGE 的新文件格式来存储模块。JDK 9 附带了 `jimage` 工具，让你可以探索 JIMAGE 文件的内容。\n\
  \n© Kishori Sharan 2017\n\n\n\nK. Sharan, *Java 9 揭密*, DOI 10.1007/978-1-4842-2592-9_7\n\
  \n第 7 章 ■ 创建自定义运行时映像\n\n如果你的代码期望运行时映像存储在名为 `rt.jar` 的文件中，请注意以下警告。\n\nJDK 9 之前，JDK\
  \ 运行时存储在 `rt.jar` 文件中，但在 JDK 9 中情况已不再如此。当你将应用程序迁移到 JDK 9 时，这可能会导致代码出错。\n\n创建自定义运行时映像\n\
  \n你可以使用 `jlink` 工具创建特定于平台的自定义运行时映像。该运行时映像将包含指定的应用程序模块以及仅需要的平台模块，从而减小运行时映像的大小。这对于运行在内存较小的嵌入式设备上的应用程序非常有用。JDK\
  \ 9 附带了 `jlink` 工具，它位于 `JDK_HOME\\bin` 目录中。运行 `jlink` 工具的一般语法如下：\n\n`jlink <options>\
  \ --module-path <modulepath> --add-modules <mods> --output <path>`\n\n其中，`<options>`\
  \ 包含零个或多个 `jlink` 选项，如表 7-1 所列；`<modulepath>` 是模块路径，其中包含要添加到映像中的平台和应用程序模块。模块可以位于模块化\
  \ JAR、展开目录和 JMOD 文件中。`<mods>` 是要添加到映像中的模块列表，由于对其他模块的传递依赖，这可能会导致添加额外的模块。`<path>`\
  \ 是输出目录，生成的运行时映像将存储在此处。\n\n***表 7-1.** jlink 工具选项列表*\n\n**选项**\n\n**描述**\n\n`--add-modules\
  \ <mod>,<mod>...`\n\n指定要解析的根模块列表。所有已解析的模块都将添加到运行时映像中。\n\n`--bind-services`\n\n在链接过程中执行完整的服务绑定。如果添加的模块包含\
  \ `uses` 语句，`jlink` 将扫描模块路径上的所有 JMOD 文件，以将 `uses` 语句中指定的服务的所有服务提供者模块包含在运行时映像中。\n\
  \n`-c, --compress <0|1|2>[:filter=<pattern-list>]`\n\n指定输出映像中所有资源的压缩级别。0 表示常量字符串共享，1\
  \ 表示 ZIP 压缩，2 表示两者兼有。可以指定可选的 `<pattern-list>` 过滤器来列出要包含的文件模式。\n\n`--disable-plugin\
  \ <plugin-name>`\n\n禁用指定的插件。\n\n`--endian <little|big>`\n\n指定生成的运行时映像的字节顺序。默认值为本机平台的字节顺序。\n\
  \n`-h,--help`\n\n打印 `jlink` 工具的使用说明和所有选项列表。\n\n`--ignore-signing-information`\n\n\
  当签名的模块化 JAR 被链接到映像中时，抑制致命错误。签名的模块化 JAR 的相关文件的签名不会被复制到运行时映像中。\n\n( *续*)\n\n第 7 章\
  \ ■ 创建自定义运行时映像\n\n***表 7-1.*** ( *续*)\n\n**选项**\n\n**描述**\n\n`--launcher <command>=<module>`\n\
  \n指定模块的启动器命令。`<command>` 是你想要生成以启动应用程序的命令名称，例如 `runmyapp`。该工具将创建一个名为 `<command>`\
  \ 的脚本/批处理文件来运行 `<module>` 中的主类。\n\n`--launcher <command>=<module>/<main-class>`\n\
  \n指定模块和主类的启动器命令。`<command>` 是你想要生成以启动应用程序的命令名称，例如 `runmyapp`。该工具将创建一个名为 `<command>`\
  \ 的脚本/批处理文件来运行 `<module>` 中的 `<main-class>`。\n\n`--limit-modules <mod>,<mod>`\n\n\
  将可观察模块限制为指定模块的传递闭包中的模块，加上主模块（如果指定），以及通过 `--add-modules` 选项指定的任何其他模块。\n\n`--list-plugins`\n\
  \n列出可用的插件。\n\n`-p, --module-path <modulepath>`\n\n指定模块路径，其中包含要添加到运行时映像中的平台和应用程序模块。\n\
  \n`--no-header-files`\n\n排除本机代码的包含头文件。\n\n`--no-man-pages`\n\n排除手册页。\n\n`--output\
  \ <path>`\n\n指定运行时映像将被复制到的目录。\n\n`--save-opts <filename>`\n\n\n\n将 jlink 选项保存到指定文件中。\n\
  \n-G, --strip-debug\n\n从输出映像中剥离调试信息。\n\n--suggest-providers [<服务名称>,...]\n\n如果未指定服务名称，则会建议所有将为添加的模块链接的服务的提供者名称。\n\
  \n如果指定一个或多个服务名称，则会建议指定服务名称的提供者。此选项可在创建映像之前使用，以了解使用 `--bind-services` 选项时将包含哪些服务。\n\
  \n-v, --verbose\n\n打印详细输出。\n\n--version\n\n打印 jlink 工具的版本。\n\n@<文件名>\n\n从指定文件读取选项。\n\
  \n第 7 章 ■ 创建自定义运行时映像\n\n让我们创建一个运行时映像，其中包含素数检查器应用程序的四个模块以及所需的平台模块（仅包含 `java.base`\
  \ 模块）。请注意，以下命令仅包含素数检查器应用程序中的三个模块。第四个模块将被添加，因为这三个模块依赖于它。命令后的文本将对此进行详细解释。\n\nC:\\\
  Java9Revealed>jlink --module-path jmods;C:\\java9\\jmods\n\n--add-modules com.jdojo.prime.client,com.jdojo.prime.generic,com.jdojo.prime.faster\n\
  \n--launcher runprimechecker=com.jdojo.prime.client\n\n--output primechecker\n\n\
  在我解释此命令的所有选项之前，让我们验证运行时映像是否已成功创建。该命令应将运行时映像复制到 `C:\\Java9Revealed\\primechecker`\
  \ 文件夹。运行以下命令以验证运行时映像包含五个模块：C:\\Java9Revealed>primechecker\\bin\\java --list-modules\n\
  \ncom.jdojo.prime@1.0\n\ncom.jdojo.prime.client@1.0\n\ncom.jdojo.prime.faster@1.0\n\
  \ncom.jdojo.prime.generic@1.0\n\njava.base@9-ea\n\n如果您得到的输出与此处显示的类似，则运行时映像已正确创建。输出中\
  \ `@` 符号后显示的模块版本号可能因您而异。\n\n`--module-path` 选项指定了两个目录：`jmods` 和 `C:\\java9\\jmods`。我将素数检查器应用程序的四个\
  \ JMOD 文件保存在 `C:\\Java9Revealed\\jmods` 目录中。模块路径中的第一个元素让 jlink 工具找到所有应用程序模块。我将 JDK\
  \ 9 安装在 `C:\\java9` 目录中，因此模块路径中的第二个元素让该工具找到平台模块。如果您不指定第二部分，则会收到错误：\n\n未找到模块 java.base。\n\
  \n`--add-modules` 选项指定了素数检查器应用程序的三个模块。您可能想知道为什么我们没有使用此选项指定第四个模块 `com.jdojo.prime`。此列表包含根模块，而不仅仅是包含在运行时映像中的模块。jlink\
  \ 工具将传递性地解析这些根模块的所有依赖项，并将所有解析出的依赖模块包含到运行时映像中。\n\n这三个模块依赖于 `com.jdojo.prime` 模块，该模块将通过定位其在模块路径上而被解析，因此将包含在运行时映像中。该映像还将包含\
  \ `java.base` 模块，因为所有应用程序模块都隐式依赖于它。\n\n`--output` 选项指定运行时映像将被复制到的目录。该命令会将运行时映像复制到\
  \ `C:\\Java9Revealed\\primechecker` 目录。输出目录包含以下子目录和一个名为 `release` 的文件：\n\n• bin\n\
  \n• conf\n\n• include\n\n• legal\n\n• lib\n\n第 7 章 ■ 创建自定义运行时映像\n\n`bin` 目录包含可执行文件。在\
  \ Windows 上，它还包含动态链接的本机库（`.dll` 文件）。\n\n`conf` 目录包含可编辑的配置文件，例如 `.properties` 和 `.policy`\
  \ 文件。\n\n`include` 目录包含 C/C++ 头文件。\n\n`legal` 目录包含法律声明。\n\n`lib` 目录包含添加到运行时映像的模块以及其他文件。在\
  \ Mac、Linux 和 Solaris 上，它还将包含系统的动态链接本机库。\n\n您在 jlink 命令中使用了 `--launcher` 选项。您指定了一个命令名称\
  \ `runprimechecker`，模块名称是 `com.jdojo.prime.client`。`--launcher` 选项使 jlink 创建一个特定于平台的可执行文件，例如在\
  \ Windows 的 `bin` 目录中创建 `runprimechecker.bat` 文件。您可以使用此可执行文件来运行您的应用程序。该文件内容只是运行此模块中主类的包装器。您可以使用此文件运行应用程序：\n\
  \nC:\\Java9Revealed> primechecker\\bin\\runprimechecker\n\n使用 jdojo.faster.primechecker:\n\
  \n3 是素数。\n\n4 不是素数。\n\n121 不是素数。\n\n977 是素数。\n\n使用 jdojo.faster.primechecker:\n\n\
  3 是素数。\n\n4 不是素数。\n\n121 不是素数。\n\n977 是素数。\n\n未找到名为 'jdojo.probable.primechecker'\
  \ 的 PrimeChecker 服务提供者。\n\n您也可以使用由 jlink 工具复制到 `bin` 目录的 `java` 命令来启动您的应用程序：\n\n\
  C:\\Java9Revealed>primechecker\\bin\\java --module com.jdojo.prime.client\n\n此命令的输出将与上一个命令的输出相同。请注意，您不必指定模块路径。链接器（jlink\
  \ 工具）在创建运行时映像时已经处理了模块路径。当您运行生成的运行时映像的 `java` 命令时，它知道在哪里找到模块。还要注意，您不必向命令指定主类名称。您只需指定模块名称。您已经为\
  \ `com.jdojo.prime.client` 模块设置了 `main-class` 属性。当您运行一个模块而不指定主类时，该模块的 `module-info.class`\
  \ 文件中设置的 `main-class` 属性将被用作主类。\n\n绑定服务\n\n在上一节中，您为素数服务客户端应用程序创建了一个运行时映像。您必须使用 `--add-modules`\
  \ 选项指定要包含在映像中的所有服务提供者模块的名称。在本节中，我将向您展示如何在创建运行时映像时使用 jlink 工具的 `--bind-services`\
  \ 选项自动绑定服务。这次，您需要将模块（即 `com.jdojo.prime` 模块）添加到模块图中，其余工作将由 jlink 工具处理。`com.jdojo.prime.client`\
  \ 模块读取 `com.jdojo.prime` 模块，因此将前者添加到模块图中也将解析后者。以下命令打印运行时映像的建议服务提供者列表。显示部分输出。\n\n\
  第 7 章 ■ 创建自定义运行时映像\n\nC:\\Java9Revealed>jlink --module-path jmods;C:\\java9\\jmods\n\
  \n--add-modules com.jdojo.prime.client\n\n**--suggest-providers**\n\n模块 com.jdojo.prime\
  \ 位于 (file:///C:/Java9Revealed/jmods/com.jdojo.prime.jmod)\n\n使用 com.jdojo.prime.PrimeChecker\n\
  \n模块 com.jdojo.prime.client 位于 (file:///C:/Java9Revealed/jmods/com.jdojo.prime.client.jmod)\n\
  \n模块 java.base 位于 (file:///C:/java9/jmods/java.base.jmod)\n\n使用 java.lang.System$LoggerFinder\n\
  \n使用 java.net.ContentHandlerFactory\n\n...\n\n建议的提供者：\n\n模块 com.jdojo.prime.faster\
  \ 提供 com.jdojo.prime.PrimeChecker，由 com.jdojo.prime 使用\n\n模块 com.jdojo.prime.generic\
  \ 提供 com.jdojo.prime.PrimeChecker，由 com.jdojo.prime 使用\n\n模块 com.jdojo.prime.probable\
  \ 提供 com.jdojo.prime.PrimeChecker，由 com.jdojo.prime 使用\n\n模块 java.desktop 提供 java.net.ContentHandlerFactory，由\
  \ java.base 使用\n\n...\n\n该命令仅将 `com.jdojo.prime.client` 模块指定给 `--add-modules` 选项。`com.jdojo.prime`\
  \ 和 `java.base` 模块被解析，因为 `com.jdojo.prime.client` 模块读取它们。所有已解析的模块都会被扫描以查找 `uses`\
  \ 语句，随后，模块路径中的所有模块都会被扫描，以查找 `uses` 语句中指定的服务的服务提供者。所有找到的服务提供者都会被打印出来。\n\n\n\n■ **提示**\
  \ 你可以为 `--suggest-providers` 选项指定参数。如果使用该选项时不带参数，请确保将其放在命令的末尾。否则，`--suggest-providers`\
  \ 选项之后的选项将被解释为其参数，从而导致错误。\n\n以下命令将 `com.jdojo.prime.PrimeChecker` 作为服务名称传递给 `--suggest-providers`\
  \ 选项，以打印为该服务找到的所有服务提供者：\n\nC:\\Java9Revealed>jlink --module-path jmods;C:\\java9\\\
  jmods\n\n--add-modules com.jdojo.prime.client\n\n**--suggest-providers com.jdojo.prime.PrimeChecker**\n\
  \n建议的服务提供者：\n\n模块 com.jdojo.prime.faster 提供 com.jdojo.prime.PrimeChecker，由 com.jdojo.prime\
