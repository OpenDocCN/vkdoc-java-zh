  \ `/help` 或 `/?` 命令来显示命令列表及其简要描述。\n\njshell> /help\n\n| 键入 Java 语言表达式、语句或声明。\n\n\
  | 或者键入以下命令之一：\n\n第 11 章 ■ Java Shell\n\n| /list [<名称或 id>|-all|-start] -- 列出你已键入的源代码\n\
