  \ JVM 日志，以及在记录之前如何自定义 JVM 消息。\n\n[第 20 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_20)“JDK\
  \ 9 中的其他变更”涵盖了 JDK 9 中所有其他对应用程序开发者有影响且在前几章中未涉及的变更。本章的每一节都涵盖一个独立的主题。你可以跳转到你感兴趣的章节，跳过其余部分。本章涵盖了一系列主题，包括下划线在\
