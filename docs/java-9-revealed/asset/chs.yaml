  \ 章 ■ Java Shell\n\n重新加载 JShell 状态\n\n假设你在一个 jshell 会话中处理了许多代码片段，然后退出了会话。现在你想回去重放这些代码片段。一种方法是启动一个新的\
  \ jshell 会话并重新输入这些代码片段。\n\n在 jshell 中重新输入多个代码片段很麻烦。有一种简单的方法可以实现这一点——使用 `/reload`\
  \ 命令。`/reload` 命令会重置 jshell 状态，并按照之前输入的顺序重放所有有效的代码片段和 `/drop` 命令。你可以使用 `-restore`\
  \ 和 `-quiet` 选项来自定义其行为。\n\n不带任何选项的 `/reload` 命令会重置 jshell 状态，并从以下先前的操作/事件中（以最后发生者为准）重放有效历史记录：\n\
  \n• 当前会话的开始\n• 上次执行 `/reset` 命令时\n• 上次执行 `/reload` 命令时\n\n你可以将 `-restore` 选项与 `/reload`\
  \ 命令一起使用。它会重置并重放以下两个操作/事件之间（以最后两个为准）的历史记录：\n\n• 启动 jshell\n• 执行 `/reset` 命令\n• 执行\
  \ `/reload` 命令\n\n\n\n使用 `-restore` 选项执行 `/reload` 命令的效果有些难以理解。\n\n其主要目的是恢复之前的执行状态。如果你在每个\
  \ jshell 会话开始时都执行此命令，那么从第二个会话开始，你的会话将包含你曾在 jshell 会话中执行过的所有代码片段！这是一个强大的功能。也就是说，你可以评估代码片段、关闭\
  \ jshell、重新启动 jshell，然后执行 `/reload -restore` 作为第一个命令，你之前输入的任何代码片段都不会丢失。有时，你会在一个会话中执行两次\
  \ `/reset` 命令，并希望恢复这两次重置之间的状态。你可以通过使用此命令来实现这一结果。\n\n以下 jshell 会话在每个会话中创建一个变量，并通过在每个会话开始时执行\
  \ `/reload -restore` 命令来恢复之前的会话。该示例显示，第四个会话使用了在第一个会话中声明的名为 `x1` 的变量。\n\nC:\\Java9Revealed>jshell\n\
