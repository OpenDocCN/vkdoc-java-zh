  \ secs\n\n欢迎使用模块系统。\n\n模块名称：com.jdojo.intro\n\n摘要\n\nJDK 9 对平台类（JDK 类）和 JVM 组件的日志系统进行了全面改造。现在有一个新的\
  \ API，允许你指定一个你选择的日志框架，作为平台类日志消息的后端。同时，还新增了一个命令行选项，用于访问所有 JVM 组件的消息。\n\n平台日志 API\
  \ 允许你指定一个自定义日志记录器，所有平台类将使用该记录器来记录其消息。你可以使用现有的日志框架（如 Log4j）作为日志记录器。该 API 由 `java.lang.System.LoggerFinder`\
  \ 类和 `java.lang.System.Logger` 接口组成。\n\n`System.Logger` 接口的一个实例代表一个平台日志记录器。`System.LogFinder`\
  \ 类是一个服务接口。你需要为该服务接口提供一个实现，该实现返回一个 `System.Logger` 接口的实例。你可以使用 `java.lang.System`\
  \ 类中的 `getLogger()` 方法来获取一个 `System.Logger`。你应用程序中的一个模块必须包含一个 `provides` 语句，指明 `System.LogFinder`\
  \ 服务接口的实现。否则，将使用默认的日志记录器。\n\nJDK 9 允许你使用一个名为 `-Xlog` 的选项来记录来自所有组件的所有 JVM 消息。该选项允许你指定消息的类型、消息的严重级别、日志目标、日志消息的修饰以及日志文件属性。一条消息由一组标签标识。`System.Logger.Level`\
  \ 枚举的常量指定了消息的严重级别。日志目标可以是 `stdout`、`stderr` 或一个文件。\n\n**第 20 章**\n\n**JDK 9 中的其他变更**\n\
  \n在本章中，你将学习：\n\n• 下划线作为新关键字\n\n• 改进的 try-with-resources 块语法\n\n• 如何在匿名类中使用菱形运算符\n\
  \n• 如何在接口中使用私有方法\n\n• 如何在私有方法上使用 `@SafeVarargs` 注解\n\n• 如何丢弃子进程的输出\n\n• 如何使用 `Math`\
  \ 和 `StrictMath` 类中的新方法\n\n• 如何使用 Optional 流以及 Optional 上的其他新操作\n\n• 如何使用自旋等待提示\n\
  \n• Time API、Matcher 和 Objects 类的增强\n\n• 如何比较数组和数组切片\n\n• Javadoc 的增强以及如何使用其新的搜索功能\n\
  \n• JDK 9 中的原生桌面支持及其使用方法\n\n• 如何在对象反序列化期间使用全局和局部过滤器\n\n• 如何将数据从输入流传输到输出流，以及如何复制和切片缓冲区\n\
  \nJava SE 9 有许多大大小小的变更。大的变更包括模块系统、HTTP/2 客户端 API 等的引入。这些大的变更本身就需要一章来介绍。本章涵盖了所有对\
  \ Java 开发者来说很重要，但还不足以单独成章的所有变更。\n\n你不需要按顺序阅读本章。每一节都涵盖一个新主题。如果你有兴趣了解某个特定主题，可以直接跳转到该主题的章节。\n\
  \n© Kishori Sharan 2017\n\nK. Sharan, *Java 9 Revealed*, DOI 10.1007/978-1-4842-2592-9_20\n\
  \n第 20 章 ■ JDK 9 中的其他变更\n\n本章示例的源代码位于一个名为 `com.jdojo.misc` 的模块中，其模块声明如清单 20-1 所示。\n\
  \n***清单 20-1.*** 名为 com.jdojo.misc 的模块的模块声明\n\n// module-info.java\n\nmodule com.jdojo.misc\
  \ {\n\nrequires java.desktop;\n\nexports com.jdojo.misc;\n\n}\n\n\n\n该模块读取了 `java.desktop`\
  \ 模块，你需要该模块来实现特定于平台的桌面功能，这些功能在“原生桌面功能”一节中有详细描述。\n\n下划线是一个关键字\n\n在 JDK 9 中，下划线（`_`）是一个关键字，你不能单独将其用作单字符标识符，例如变量名、方法名、类型名等。不过，你仍然可以在多字符标识符名称中使用下划线。请参考清单\
  \ 20-2 中的程序。\n\n***清单 20-2.*** 一个将下划线用作标识符的程序\n\n// UnderscoreTest.java\n\npackage\
  \ com.jdojo.misc;\n\npublic class UnderscoreTest {\n\npublic static void main(String[]\
  \ args) {\n\n// 将下划线用作标识符。在 JDK 8 中这是一个编译时警告，在 JDK 9 中则是一个编译时错误。\n\nint _ = 19;\n\
  \nSystem.out.println(_);\n\n// 在多字符标识符中使用下划线。在 JDK 8 和 JDK 9 中都是允许的。\n\nfinal int\
  \ FINGER_COUNT = 20;\n\nfinal String _prefix = \"Sha\";\n\n}\n\n}\n\n在 JDK 8 中编译\
  \ `UnderscoreTest` 类时，会因单独将下划线用作标识符而生成两个警告——一个针对变量声明，另一个针对其在 `System.out.println()`\
  \ 方法调用中的使用。每次单独使用下划线都会生成一个警告。JDK 8 会生成以下两个警告：\n\ncom.jdojo.misc\\src\\com\\jdojo\\\
  misc\\UnderscoreTest.java:8: 警告: '_' 被用作标识符\n\nint _ = 19;\n\n^\n\n（在 Java SE 8\
  \ 之后的版本中，可能不支持将 '_' 用作标识符）\n\ncom.jdojo.misc\\src\\com\\jdojo\\misc\\UnderscoreTest.java:9:\
  \ 警告: '_' 被用作标识符\n\nSystem.out.println(_);\n\n^\n\n（在 Java SE 8 之后的版本中，可能不支持将 '_'\
  \ 用作标识符）\n\n2 个警告\n\n第 20 章 ■ JDK 9 中的其他变更\n\n在 JDK 9 中编译 `UnderscoreTest` 类会生成以下两个编译时错误：\n\
  \ncom.jdojo.misc\\src\\com\\jdojo\\misc\\UnderscoreTest.java:8: 错误: 自版本 9 起，'_'\
  \ 是一个关键字，不能用作标识符\n\nint _ = 19;\n\n^\n\ncom.jdojo.misc\\src\\com\\jdojo\\misc\\\
  UnderscoreTest.java:9: 错误: 自版本 9 起，'_' 是一个关键字，不能用作标识符\n\nSystem.out.println(_);\n\
  \n^\n\n2 个错误\n\n在 JDK 9 中，下划线有什么特殊含义？又在哪里使用它呢？在 JDK 9 中，你已被限制不能将其用作标识符。JDK 的设计者打算在未来的\
  \ JDK 版本中赋予它特殊含义。所以，请等到 JDK 10 或 11，才能看到它作为具有特殊含义的关键字发挥作用。请注释掉源代码中的这些行，或者整个类的代码，这样你就能无错误地编译整个\
  \ NetBeans 项目。如果源代码被注释掉了，你需要取消注释才能看到这些错误。\n\n改进的 try-with-resources 语句\n\nJDK 7\
  \ 在 `java.lang` 包中添加了一个 `AutoCloseable` 接口：\n\npublic interface AutoCloseable {\n\
  \nvoid close() throws Exception;\n\n}\n\nJDK 7 还添加了一个名为 `try-with-resources` 的新语句块，它可以按照以下步骤来管理\
  \ `AutoCloseable` 对象（或资源）：\n\n• 在语句块的开头，将资源的引用赋值给一个*新声明的*变量。\n• 在语句块的主体中使用该资源。\n\
  • 当退出语句块的主体时，代表该资源的变量上的 `close()` 方法将自动为你调用。\n\n这避免了在 JDK 7 之前使用 `finally` 块编写样板代码。以下代码片段展示了开发人员过去如何管理一个可关闭的资源，假设存在一个实现了\
  \ `AutoCloseable` 接口的 `Resource` 类：\n\n/* JDK 7 之前 */\n\nResource res = null;\n\n\
  try{\n\n// 创建资源\n\nres = new Resource();\n\n// 在此处使用 res\n\n第 20 章 ■ JDK 9 中的其他变更\n\
  \n} finally {\n\ntry {\n\nif(res != null) {\n\nres.close();\n\n}\n\n} catch(Exception\
  \ e) {\n\ne.printStackTrace();\n\n}\n\n}\n\nJDK 7 中的 `try-with-resources` 极大地改善了这种情况。在\
  \ JDK 7 中，你可以将之前的代码片段重写如下：\n\ntry (Resource res = new Resource()) {\n\n// 在此处使用\
  \ res\n\n}\n\n\n\n这段代码会在控制流退出 `try` 块时，对 `res` 调用 `close()` 方法。你可以在 `try` 块中指定多个资源，每个资源之间用分号分隔：\n\
  \ntry (Resource res1 = new Resource(); Resource res2 = new Resource()) {\n\n// 在此处使用\
  \ res1 和 res2\n\n}\n\n当 `try` 块退出时，`res1` 和 `res2` 这两个资源的 `close()` 方法会被自动调用。资源会按照它们被指定的**相反顺序**关闭。在这个例子中，会依次调用\
  \ `res2.close()` 和 `res1.close()`。\n\nJDK 7 和 8 要求你在 try-with-resources 块中声明引用资源的变量。如果你在方法中接收了一个资源引用作为参数，你将无法像这样编写逻辑：\n\
  \nvoid useIt(Resource res) {\n\n// 在 JDK 7 和 8 中会导致编译时错误\n\ntry(res) {\n\n// 在此处使用\
  \ res\n\n}\n\n}\n\n为了绕过这个限制，你必须声明另一个该资源类型的新变量，并用你的参数值对其进行初始化。下面的代码片段展示了这种方法。它声明了一个名为\
  \ `res1` 的新引用变量，当 `try` 块退出时，会对其调用 `close()` 方法：\n\nvoid useIt(Resource res) {\n\
  \ntry(**Resource res1** = res) {\n\n// 在此处使用 res1\n\n}\n\n}\n\n第 20 章 ■ JDK 9 中的其他变更\n\
  \nJDK 9 移除了你必须为想要使用 try-with-resources 块管理的资源声明新变量的限制。现在，你可以使用一个 *final* 或 *effectively\
  \ final* 的变量，该变量引用一个将由 try-with-resources 块管理的资源。如果一个变量使用 `final` 关键字显式声明，则它是 final\
  \ 的：\n\n// res 是显式 final 的\n\n**final** Resource res = new Resource();\n\n如果一个变量在初始化后其值从未改变，则它是\
  \ effectively final 的。在下面的代码片段中，`res` 变量是 effectively final 的，即使它没有被声明为 final。它被初始化后，就再也没有被改变过。\n\
  \nvoid doSomething() {\n\n// res 是 effectively final 的\n\nResource res = new Resource();\n\
  \nres.useMe();\n\n}\n\n在 JDK 9 中，你可以这样编写：\n\nResource res = new Resource();\n\n\
  try (res) {\n\n// 在此处使用 res\n\n}\n\n如果你有多个想要使用 try-with-resources 块管理的资源，可以像这样操作：\n\
  \nResource res1 = new Resource();\n\nResource res2 = new Resource();\n\ntry (res1;\
  \ res2) {\n\n// 在此处使用 res1 和 res2\n\n}\n\n你可以在同一个 try-with-resources 块中混合使用 JDK\
  \ 8 和 JDK 9 的方法。下面的代码片段在一个 try-with-resources 块中使用了两个预先声明的 effectively final 变量和一个新声明的变量：\n\
  \nResource res1 = new Resource();\n\nResource res2 = new Resource();\n\ntry (res1;\
  \ res2; Resource res3 = new Resource()) {\n\n// 在此处使用 res1、res2 和 res3\n\n}\n\n\
  第 20 章 ■ JDK 9 中的其他变更\n\n自 JDK 7 起，在 try-with-resources 块内部声明的变量都是隐式 final 的。下面的代码片段显式地将这样一个变量声明为\
  \ final：\n\nResource res1 = new Resource();\n\nResource res2 = new Resource();\n\
  \n// 将 res3 显式声明为 final\n\ntry (res1; res2; **final** Resource res3 = new Resource())\
  \ {\n\n// 在此处使用 res1、res2 和 res3\n\n}\n\n让我们看一个完整的例子。JDK 中有几个类实现了 `AutoCloseable`\
  \ 接口，例如 `java.io` 包中的 `InputStream` 和 `OutputStream` 类。清单 20-3 con 包含了一个实现了 `AutoCloseable`\
  \ 接口的 `Resource` 类的代码。`Resource` 类的对象可以作为资源，由 try-with-resources 块进行管理。`id` 实例变量用于追踪资源。构造函数和其他方法在被调用时只会打印一条消息。\n\
  \n***清单 20-3.*** 一个实现 AutoCloseable 接口的 Resource 类\n\n// Resource.java\n\npackage\
  \ com.jdojo.misc;\n\npublic class Resource implements AutoCloseable {\n\nprivate\
  \ final long id;\n\npublic Resource(long id) {\n\nthis.id = id;\n\nSystem.out.printf(\"\
  已创建资源 %d.%n\", this.id);\n\n}\n\npublic void useIt() {\n\nSystem.out.printf(\"正在使用资源\
  \ %d.%n\", this.id);\n\n}\n\n@Override\n\npublic void close() {\n\n\n\nSystem.out.printf(\"\
  Closing resource %d.%n\", this.id);\n\n}\n\n}\n\n清单 20-4 包含一个 `ResourceTest` 类的代码，该类演示了如何使用\
  \ JDK 9 的新特性：通过 `try-with-resources` 块，使用引用资源的 final 或 effectively final 变量来管理资源。\n\
  \n第 20 章 ■ JDK 9 中的其他变更\n\n***清单 20-4.*** 用于演示 JDK 9 中 `try-catch` 块用法的 `ResourceTest`\
  \ 类\n\n// ResourceTest.java\n\npackage com.jdojo.misc;\n\npublic class ResourceTest\
  \ {\n\npublic static void main(String[] args) {\n\nResource r1 = new Resource(1);\n\
  \nResource r2 = new Resource(2);\n\ntry(r1; r2) {\n\nr1.useIt();\n\nr2.useIt();\n\
  \nr2.useIt();\n\n}\n\nuseResource(new Resource(3));\n\n}\n\npublic static void useResource(Resource\
  \ res) {\n\ntry(res; Resource res4 = new Resource(4)) {\n\nres.useIt();\n\nres4.useIt();\n\
  \n}\n\n}\n\n}\n\n已创建资源 1。\n\n已创建资源 2。\n\n正在使用资源 1。\n\n正在使用资源 2。\n\n正在使用资源 2。\n\n\
  正在关闭资源 2。\n\n正在关闭资源 1。\n\n已创建资源 3。\n\n已创建资源 4。\n\n正在使用资源 3。\n\n正在使用资源 4。\n\n正在关闭资源\
  \ 4。\n\n正在关闭资源 3。\n\n第 20 章 ■ JDK 9 中的其他变更\n\n匿名类中的菱形运算符\n\nJDK 7 引入了菱形运算符（`<>`），只要编译器能够推断出泛型类型，就可以在调用泛型类的构造器时使用它。以下两条语句是等价的；第二条使用了菱形运算符：\n\
  \n// 显式指定泛型类型\n\nList<String> list1 = new ArrayList**<String>** ();\n\n// 编译器将 ArrayList<>\
  \ 推断为 ArrayList<String>\n\nList<String> list2 = new ArrayList**<>** ();\n\nJDK 7\
  \ 不允许在创建匿名类时使用菱形运算符。以下代码片段使用带有菱形运算符的匿名类来创建 `Callable<V>` 接口的实例：\n\n// 在 JDK 7 和\
  \ 8 中会导致编译时错误\n\nCallable<Integer> c = new Callable<>() {\n\n@Override\n\npublic\
  \ Integer call() {\n\nreturn 100;\n\n}\n\n};\n\n上述语句在 JDK 7 和 8 中会产生以下错误：\n\nerror:\
  \ cannot infer type arguments for Callable<V>\n\nCallable<Integer> c = new Callable<>()\
  \ {\n\n^\n\nreason: cannot use '<>' with anonymous inner classes\n\nwhere V is a\
  \ type-variable:\n\nV extends Object declared in interface Callable\n\n1 error\n\
  \n你可以通过指定泛型类型来替代菱形运算符，从而修复此错误：\n\n// 在 JDK 7 和 8 中有效\n\nCallable<Integer> c = new\
  \ Callable< **Integer**>() {\n\n@Override\n\npublic Integer call() {\n\nreturn 100;\n\
  \n}\n\n};\n\nJDK 9 增加了对匿名类中菱形运算符的支持，前提是推断出的类型是可表示的（denotable）。如果推断出的类型是不可表示的（non-denotable），即使在\
  \ JDK 9 中，也不能在匿名类中使用菱形运算符。Java 编译器会使用许多无法在 Java 程序中编写的类型。\n\n可以在 Java 程序中编写的类型称为*可表示*类型。编译器知道但无法在\
  \ Java 程序中编写的类型称为*不可表示*类型。例如，`String` 是一种可表示类型，因为你可以在程序中使用它来表示一种类型；然而，`Serializable\
  \ & CharSequence` 并不是一种\n\n第 20 章 ■ JDK 9 中的其他变更\n\n可表示类型，尽管它对编译器来说是一种有效类型。它是一种交集类型，表示同时实现了\
  \ `Serializable` 和 `CharSequence` 这两个接口的类型。交集类型允许在泛型类型定义中使用，但不能使用这种交集类型来声明变量：\n\n\
  // 在 Java 代码中不允许。不能声明交集类型的变量。\n\n**Serializable & CharSequence** var;\n\n// 在 Java\
  \ 代码中允许\n\nclass Magic<T extends **Serializable & CharSequence**> {\n\n// 更多代码在此处\n\
  \n}\n\n在 JDK 9 中，以下使用菱形运算符与匿名类的代码片段是允许的：\n\n// 在 JDK 7 和 8 中会导致编译时错误，但在 JDK 9 中允许。\n\
  \nCallable<Integer> c = new Callable**<>** () {\n\n@Override\n\npublic Integer call()\
  \ {\n\nreturn 100;\n\n}\n\n};\n\n使用这个 `Magic` 类的定义，JDK 9 允许你像这样使用匿名类：\n\n// 在 JDK\
  \ 9 中允许。<> 被推断为 <String>。\n\n\n\n`Magic<String> m1 = new Magic**<>** (){`\n\n`//\
  \ 更多代码在此处`\n\n`};`\n\n在 JDK 9 中，以下对 `Magic` 类的使用无法编译，因为编译器将泛型类型推断为一种不可表示类型的交集类型：\n\
  \n`// JDK 9 中的编译时错误。<> 被推断为 <Serializable & CharSequence>，`\n\n`// 这是一种不可表示类型`\n\
  \n`Magic<?> m2 = new Magic<>(){`\n\n`// 更多代码在此处`\n\n`};`\n\n上述代码会产生以下编译时错误：\n\n\
  `error: cannot infer type arguments for Magic<>`\n\n`Magic<?> m2 = new Magic<>(){`\n\
  \n`^`\n\n`reason: type argument INT#1 inferred for Magic<> is not allowed in this\
  \ context`\n\n`inferred argument is not expressible in the Signature attribute`\n\
  \n`where INT#1 is an intersection type:`\n\n`INT#1 extends Object,Serializable,CharSequence`\n\
  \n`1 error`\n\n第 20 章 ■ JDK 9 中的其他变更\n\n接口中的私有方法\n\nJDK 8 为接口引入了静态方法和默认方法。如果你在这些方法中需要多次执行相同的逻辑，你只能选择重复该逻辑，或者将逻辑移到另一个类中以隐藏实现。考虑名为\
  \ `Alphabet` 的接口，如清单 20-5 所示。\n\n***清单 20-5.*** 一个名为 Alphabet 的接口，包含两个共享逻辑的默认方法\n\
  \n`// Alphabet.java`\n\n`package com.jdojo.misc;`\n\n`public interface Alphabet\
  \ {`\n\n`default boolean isAtOddPos(char c) {`\n\n`if (!Character.isLetter(c)) {`\n\
  \n`throw new RuntimeException(\"Not a letter: \" + c);`\n\n`}`\n\n`char uc = Character.toUpperCase(c);`\n\
  \n`int pos = uc - 64;`\n\n`return pos % 2 == 1;`\n\n`}`\n\n`default boolean isAtEvenPos(char\
  \ c) {`\n\n`if (!Character.isLetter(c)) {`\n\n`throw new RuntimeException(\"Not\
  \ a letter: \" + c);`\n\n`}`\n\n`char uc = Character.toUpperCase(c);`\n\n`int pos\
  \ = uc - 64;`\n\n`return pos % 2 == 0;`\n\n`}`\n\n`}`\n\n`isAtOddPos()` 和 `isAtEvenPos()`\
  \ 方法检查指定字符在字母表中的位置是奇数还是偶数，假设我们只处理英文字母。该逻辑假设 `A` 和 `a` 位于位置 1，`B` 和 `b` 位于位置 2，依此类推。注意，这两个方法中的逻辑仅在返回语句上有所不同。除了最后一条语句外，这些方法的整个主体都是相同的。你会同意需要重构此逻辑。将公共逻辑移到另一个方法，并从两个方法中调用新方法将是理想的情况。然而，在\
  \ JDK 8 中你不想这样做，因为接口只支持公共方法。这样做会使第三个方法变为公共方法，从而将其暴露给外部世界，这是你不希望发生的。\n\nJDK 9 为你解决了这个问题。它允许你在接口中声明私有方法。清单\
  \ 20-6 sho 展示了使用包含两个方法所用公共逻辑的私有方法重构后的 `Alphabet` 接口版本。这次，我将接口命名为 `AlphabetJdk9`，只是为了确保我可以在源代码中包含两个版本。现有的两个方法变成了单行方法。\n\
  \n第 20 章 ■ JDK 9 中的其他变更\n\n***清单 20-6.*** 一个名为 AlphabetJdk9 的接口，使用了私有方法\n\n`// AlphabetJdk9.java`\n\
  \n`package com.jdojo.misc;`\n\n`public interface AlphabetJdk9 {`\n\n`default boolean\
  \ isAtOddPos(char c) {`\n\n`return getPos(c) % 2 == 1;`\n\n`}`\n\n`default boolean\
  \ isAtEvenPos(char c) {`\n\n`return getPos(c) % 2 == 0;`\n\n`}`\n\n`**private int\
  \ getPos(char c) {**`\n\n`**if (!Character.isLetter(c)) {**`\n\n`**throw new RuntimeException(\"\
  Not a letter: \" + c);**`\n\n`**}`\n\n`**char uc = Character.toUpperCase(c);**`\n\
  \n`**int pos = uc - 64;**`\n\n`**return pos;**`\n\n`**}`\n\n`}`\n\n在 JDK 9 之前，接口中的所有方法默认都是隐式公共的。请记住这些适用于所有\
  \ Java 程序的简单规则：\n\n• 私有方法不会被继承，因此不能被重写。\n\n• final 方法不能被重写。\n\n• 抽象方法会被继承，并且旨在被重写。\n\
  \n• 默认方法是一个实例方法，并提供默认实现。它旨在被重写。\n\n随着 JDK 9 中私有方法的引入，在接口中声明方法时需要遵循一些规则。并非所有修饰符组合——`abstract`、`public`、`private`、`static`\
  \ 和 `final`——都受支持，因为它们没有意义。表 20-1 lis 列出了 JDK 9 接口方法声明中受支持和不受支持的修饰符组合。请注意，`final`\
  \ 修饰符不允许用于接口的方法声明。根据此列表，你可以在接口中拥有一个私有方法，它要么是非抽象、非默认的实例方法，要么是静态方法。\n\n第 20 章 ■ JDK\
  \ 9 中的其他变更\n\n***表 20-1.** 接口方法声明中支持的修饰符*\n\n| **修饰符** | **是否支持？** | **描述** |\n\
  | :--- | :--- | :--- |\n| `public static` | 是 | 自 JDK 8 起支持。 |\n| `public abstract`\
  \ | 是 | 自 JDK 1 起支持。 |\n| `public default` | 是 | 自 JDK 8 起支持。 |\n| `private static`\
  \ | 是 | 自 JDK 9 起支持。 |\n| `private` | 是 | 自 JDK 9 起支持。这是一个非抽象实例方法。 |\n| `private\
  \ abstract` | 否 | 此组合没有意义。私有方法不会被继承，因此不能被重写，而抽象方法必须被重写才有用。 |\n| `private default`\
  \ | 否 | 此组合没有意义。私有方法不会被继承，因此不能被重写，而默认方法旨在在需要时被重写。 |\n\n私有方法上的 @SafeVarargs\n\n*可具体化*类型是其信息在运行时完全可用的类型，例如\
  \ `String`、`Integer`、`List` 等。\n\n*不可具体化*类型是其信息已被编译器通过类型擦除移除的类型，例如 `List<String>`，它在编译后变为\
  \ `List`。\n\n当你使用不可具体化类型的可变参数时，该参数的类型仅对编译器可见。编译器会擦除参数化类型，并将其替换为实际类型的数组——对于无界类型为\
  \ `Object[]`，对于有界类型则为类型上界的特定数组。\n\n编译器无法保证在方法体内对此类不可具体化可变参数执行的操作是安全的。考虑以下方法的定义：\n\
  \n`<T> void print(T... args) {`\n\n`for(T element : args) {`\n\n`System.out.println(element);`\n\
  \n`}`\n\n`}`\n\n编译器会将 `print(T… args)` 替换为 `print(Object[] args)`。此方法体不会对 `args`\
  \ 参数执行任何不安全操作。考虑以下执行不安全操作的方法声明：\n\n`public static void unsafe(List<Long>... rolls)\
  \ {`\n\n`Object[] list = rolls;`\n\n`list[0] = List.of(\"One\", \"Two\");`\n\n`//\
  \ 不安全！！！将在运行时抛出 ClassCastException`\n\n`Long roll = rolls[0].get(0);`\n\n`}`\n\n\
  第 20 章 ■ JDK 9 中的其他变更\n\n`unsafe()` 方法将 `rolls`（一个 `List<String>` 数组）赋值给 `Object[]`，这是可以的。它将一个\
  \ `List<String>` 存储到 `Object[]` 的第一个元素中，这也是允许的。最后一条语句编译正常，因为 `rolls[0]` 的类型被推断为\
  \ `List<Long>`，并且 `get(0)` 方法应该返回一个 `Long`。然而，运行时抛出 `ClassCastException`，因为 `rolls[0].get(0)`\
  \ 返回的实际类型是 `String`，而不是 `Long`。\n\n当你声明像 `print()` 和 `unsafe()` 这样使用不可具体化可变参数类型的方法时，Java\
  \ 编译器会发出类似这样的未检查警告：\n\n`warning: [unchecked] Possible heap pollution from parameterized\
  \ vararg type List<Long>`\n\n`public static void unsafe(List<Long>... rolls) {`\n\
  \n`^`\n\n编译器会为此类方法声明生成一个警告，并为对该方法的每次调用生成一个警告。如果 `unsafe()` 方法被调用五次，你将收到六个警告（一个用于声明，五个用于调用）。你可以通过使用\n\
  \n\n\n在此类方法上使用 `@SafeVarargs` 注解。通过在方法声明中添加此注解，你可以向方法的使用者和编译器保证：在方法体内，你不会对不可具体化的可变参数执行任何不安全操作。你的保证足以让编译器不发出警告。然而，如果该保证在运行时被证明不成立，运行时将抛出相应类型的异常。\n\
  \n在 JDK 9 之前，你可以在以下可执行体（构造器和方法）上使用 `@SafeVarargs` 注解：\n\n• 构造器\n• 静态方法\n• final\
  \ 方法\n\n构造器、静态方法和 final 方法都是不可重写的。仅允许在不可重写的可执行体上使用 `@SafeVarargs` 注解，其背后的理念是为了防止开发者在可重写的可执行体上使用此注解，从而违反该注解对重写可执行体的约束。假设你有一个类\
  \ X，其中包含一个方法 `m1()`，该方法带有 `@SafeVarargs` 注解。\n\n再假设你有一个继承自类 X 的类 Y。类 Y 可能会重写继承来的方法\
  \ `m1()`，并可能包含不安全操作。这将在运行时带来意外，因为开发者可能会基于超类 X 编写代码，并且不会预期其方法 `m1()` 所承诺的任何不安全操作。\n\
  \n私有方法也是不可重写的，因此 JDK 9 决定也允许在私有方法上使用 `@SafeVarargs` 注解。清单 20-7 展示了一个类，其中包含一个使用了\
  \ `@SafeVarargs` 注解的私有方法。JDK 9 中允许使用 `@SafeVarargs` 注解的可执行体列表如下：\n\n• 构造器\n• 静态方法\n\
  • final 方法\n• 私有方法\n\n第 20 章 ■ JDK 9 中的其他变更\n\n***清单 20-7.*** 在 JDK 9 的私有方法上使用 `@SafeVarargs`\
  \ 注解\n\n```java\n// SafeVarargsTest.java\npackage com.jdojo.misc;\n\npublic class\
  \ SafeVarargsTest {\n    // JDK 9 中允许\n    @SafeVarargs\n    private <T> void print(T...\
  \ args) {\n        for(T element : args) {\n            System.out.println(element);\n\
  \        }\n    }\n    // 更多代码在此处\n}\n```\n\n在 JDK 8 中编译此类会生成以下错误，指出 `@SafeVarargs`\
  \ 不能用于非 final 方法，此处即私有方法。你需要使用 `-Xlint:unchecked` 选项编译源代码才能看到这些错误。\n\n```\ncom\\\
  jdojo\\misc\\SafeVarargsTest.java:6: error: Invalid SafeVarargs annotation. Instance\n\
  method <T> print(T...) is not final.\n    private <T> void print(T... args) {\n\
  \    ^\n  where T is a type-variable:\n    T extends Object declared in method <T>print(T...)\n\
  ```\n\n**丢弃进程输出**\n\nJDK 9 在 `ProcessBuilder.Redirect` 嵌套类中添加了一个名为 `DISCARD` 的新常量。其类型为\
  \ `ProcessBuilder.Redirect`。当你希望丢弃子进程的输出时，可以将其用作子进程输出流和错误流的目标。该实现通过写入操作系统特定的“空文件”来丢弃输出。清单\
  \ 20-8 包含一个完整程序，演示了如何丢弃子进程的输出。\n\n***清单 20-8.*** 丢弃进程的输出\n\n```java\n// DiscardProcessOutput.java\n\
  package com.jdojo.misc;\n\nimport java.io.IOException;\n\npublic class DiscardProcessOutput\
  \ {\n    public static void main(String[] args) {\n        System.out.println(\"\
  使用 Redirect.INHERIT:\");\n        startProcess(ProcessBuilder.Redirect.INHERIT);\n\
  \        System.out.println(\"\\n 使用 Redirect.DISCARD:\");\n        startProcess(ProcessBuilder.Redirect.DISCARD);\n\
  \    }\n\n    public static void startProcess(ProcessBuilder.Redirect outputDest)\
  \ {\n        try {\n            ProcessBuilder pb = new ProcessBuilder()\n     \
  \           .command(\"java\", \"-version\")\n                .redirectOutput(outputDest)\n\
  \                .redirectError(outputDest);\n            Process process = pb.start();\n\
  \            process.waitFor();\n        } catch (IOException | InterruptedException\
  \ e) {\n            e.printStackTrace();\n        }\n    }\n}\n```\n\n使用 Redirect.INHERIT:\n\
  \n```\njava version \"9-ea\"\nJava(TM) SE Runtime Environment (build 9-ea+157)\n\
  Java HotSpot(TM) 64-Bit Server VM (build 9-ea+157, mixed mode)\n```\n\n使用 Redirect.DISCARD:\n\
  \n\n\n`startProcess()` 方法通过使用 `-version` 参数启动 Java 程序来开启一个进程。该方法接收一个输出目标作为参数。第一次调用时，传入\
  \ `Redirect.INHERIT` 作为输出目标，这允许子进程使用标准输出和标准错误来打印消息。第二次调用时，传入 `Redirect.DISCARD`\
  \ 作为输出目标，此时子进程不会产生任何输出。\n\nStrictMath 类中的新方法\n\nJDK 在 `java.lang` 包中包含两个类：`Math`\
  \ 和 `StrictMath`。这两个类都仅由静态成员组成，并包含提供基本数值运算的方法，例如平方根、绝对值、符号、三角函数和双曲函数。为什么我们需要两个类来提供类似的操作？`Math`\
  \ 类不要求在所有实现中返回相同的结果。这允许它使用本地库实现来执行操作，这些操作在不同平台上可能返回略有不同的结果。而 `StrictMath` 类则要求在所有实现中返回相同的结果。\n\
  \n`Math` 类中的许多方法会调用 `StrictMath` 类的方法。JDK 9 向 `Math` 和 `StrictMath` 类添加了以下静态方法：\n\
  \n• `long floorDiv(long x, int y)`\n\n• `int floorMod(long x, int y)`\n\n• `double\
  \ fma(double x, double y, double z)`\n\n• `float fma(float x, float y, float z)`\n\
  \n• `long multiplyExact(long x, int y)`\n\n• `long multiplyFull(int x, int y)`\n\
  \n• `long multiplyHigh(long x, long y)`\n\n第 20 章 ■ JDK 9 中的其他变更\n\n`floorDiv()`\
  \ 方法返回小于或等于 `x` 除以 `y` 的代数商的最大 `long` 值。当两个参数符号相同时，除法结果向零舍入（截断模式）。当它们符号不同时，除法结果向负无穷大舍入。当被除数为\
  \ `Long.MIN_VALUE` 且除数为 `-1` 时，该方法返回 `Long.MIN_VALUE`。\n\n当除数为零时，会抛出 `ArithmeticException`。\n\
  \n`floorMod()` 方法返回向下取模的结果，其值等于\n\n`x - (floorDiv(x, y) * y)`\n\n向下取模结果的符号与除数 `y`\
  \ 的符号相同，并且其范围在\n\n`-abs(y) < r < +abs(y)` 之间。\n\n`fma()` 方法对应于 IEEE 754-2008 中定义的融合乘加操作。它返回\
  \ `(a * b + c)` 的结果，如同具有无限范围和精度，并最终舍入到最接近的 `double`/`float` 值。舍入采用向最接近偶数舍入模式。请注意，`fma()`\
  \ 方法返回的结果比表达式 `(a * b + c)` 更精确，因为后者涉及两次舍入误差——一次用于乘法，一次用于加法——而前者仅涉及一次舍入误差。\n\n`multiplyExact()`\
  \ 方法返回两个参数的乘积，如果结果溢出 `long` 类型，则抛出 `ArithmeticException`。\n\n`multiplyFull()` 方法以\
  \ `long` 类型返回两个参数的精确乘积。\n\n`multiplyHigh()` 方法以 `long` 类型返回两个 64 位参数的 128 位乘积的最高有效\
  \ 64 位。当您将两个 64 位 `long` 值相乘时，结果可能是一个 128 位值。此方法返回最高有效（高位）64 位作为结果。清单 20-9 包含一个完整的程序，用于演示这些\
  \ `StrictMath` 类中新方法的使用。\n\n***清单 20-9.*** 一个演示 StrictMath 类中新方法使用的 StrictMathTest\
