  \n}\n\n第 4 章 ■ 模块依赖\n\n你也可以打印系统类的类信息。以下命令从 `java.base` 模块中打印 `java.lang.Object`\
  \ 类的类信息。请注意，在打印系统类信息时，你不需要指定模块路径。\n\nC:\\Java9Revealed>javap --module java.base\
  \ java.lang.Object\n\nCompiled from \"Object.java\"\n\npublic class java.lang.Object\
