    Object Deserialization Filters


    Java lets you serialize and deserialize objects. To address the security risk
    posed by deserialization, JDK 9


    introduced the concept of object input filter that can be used to verify the object
    being deserialized and, if it does not pass a test, the deserialization process
    can be stopped. The object input filter is an instance of a new interface, java.io.ObjectInputFilter,
    which was added to JDK 9\. A filter can be based on one or more of the following
    criteria:


    • The length of the array being deserialized


    • The depth of the nested object being deserialized


    • The number of object references being deserialized


    • The class of an object being deserialized


    • The number of bytes consumed from the input stream


    The ObjectInputFilter interface consists of only one method:


    ObjectInputFilter.Status checkInput(ObjectInputFilter.FilterInfo filterInfo)


    You can specify a global filter to be used for deserializing all objects. You
    can override a global filter on a per ObjectInputStream basis by setting a local
    filter for the object input stream. You can have no global filter and specify
    a local filter for each object input stream. There are several ways to create
    and specify filters. I will explain them one by one with examples. This section
    first introduces the classes and interfaces that were added to JDK 9 that you
    need to use to work with filters:


    • ObjectInputFilter


    • ObjectInputFilter.Config


    • ObjectInputFilter.FilterInfo


    • ObjectInputFilter.Status


    ObjectInputFilter is an interface whose instance represent filters. You can create
    a filter by implementing this interface in a class. Alternatively, you can obtain
    its instances from a string using the createFilter(String pattern) method of the
    ObjectInputFilter.Config class, which is discussed next.


    Chapter 20 ■ Other Changes in JDK 9


    ObjectInputFilter.Config is a nested static utility class that is used for two
    purposes:


    • To get and set the global filter


    • To create filters from patterns specified as strings


    The ObjectInputFilter.Config class contains the following three static methods:


    • ObjectInputFilter createFilter(String pattern)


    • ObjectInputFilter getSerialFilter()


    • void setSerialFilter(ObjectInputFilter filter)


    The createFilter() method takes a pattern that describes a filter and returns
    an instance of the ObjectInputFilter interface. The following snippet of code
    creates a filter that specifies that the length of an array being deserialized
    should not exceed 4:


    String pattern = "maxarray=4";


    ObjectInputFilter filter = ObjectInputFilter.Config.createFilter(pattern);


    You can specify multiply patterns in one filter. They are separated by a semicolon
    (;). The following snippet of code creates a filter from two patterns. The filter
    will reject the object deserialization if it encounters an array with length greater
    than 4 or the size of the serialized object is more than 1024 bytes.


    String pattern = "maxarray=4;maxbytes=1024";


    ObjectInputFilter filter = ObjectInputFilter.Config.createFilter(pattern);


    There are several rules on specifying filter patterns. If you prefer writing the
    filter logic in Java code, you can do so by creating a class that implements the
    ObjectInputFilter interface and write the logic in its checkInput() method. Here
    are the rules if you want to create a filter from patterns in a string: There
    are five filter criteria, four of which are limits. They are maxarray, maxdepth,
    maxrefs, and maxbytes. You can set them using name=value pairs in patterns where
    name is one of these keywords and value is the limit. If a pattern contains an
    equals sign (=), the pattern must use one of these four keywords as the name.
    The fifth filter criterion is used to specify a pattern for a class name of the
    form:


    <module-name>/<fully-qualified-class-name>


    If a class is in unnamed module, the pattern will be matched against the class
    name. If the object is an array, the class name of the component type of the array
    is used to match the pattern, not the class name of the array itself. Here are
    all the rules for a pattern matching a class name:


    • If the class name matches the pattern, the object is allowed to be deserialized.


    • The ! character at the beginning of a pattern is treated as a logical NOT.


    • If the pattern contains a slash (/), the part before the slash is the module
    name. If the


    module name matches the module name of the class, the part after the slash is
    used


    as a pattern to match the class name. If there is no slash in the pattern, the
    module


    name of the class is not considered in matching the pattern.


    • A pattern ending with ".**" matches any class in the package and all sub-packages.


    • A pattern ending with ".*" matches any class in the package.


    Chapter 20 ■ Other Changes in JDK 9


    • A pattern ending with "*" matches any class with the pattern as a prefix.


    • If the pattern is equal to the class name, it matches.


    • Otherwise, the pattern is not matched and the object is rejected.


    If you set “com.jdojo.**” as a filter pattern, it will allow all classes in the
    com.jdojo package and its sub-packages to be deserialized and will reject deserializing
    object of all other classes. If you set “!com.


    jdojo.**” as a filter pattern, it will reject all classes in the com.jdojo package
    and its sub-packages to be deserialized and will allow deserializing objects of
    all other classes.


    The getSerialFilter() and setSerialFilter() methods are used to get and set a
    global filter. You can set a global filter using one of the following three ways:


    • By setting a system property named jdk.serialFilter whose value is a series
    of


    filter patterns separated by a semicolon.


    • By setting a jdk.serialFilter property in the java.security file, which is stored


    in the JAVA_HOME\conf\security directory. If you are using the JDK to run your


    program, read JAVA_HOME as JDK_HOME. Otherwise, read it as JRE_HOME.


    • By calling the setSerialFilter() static method of the ObjectInputFilter.Config


