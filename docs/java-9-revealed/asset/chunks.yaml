    module com.jdojo.person.test {


    requires com.jdojo.person;


    }


    You need to add the com.jdojo.person project to the module path of the com.jdojo.person.test


    project. Otherwise, compiling the code in Listing [4-6 w](#index_split_001.html#88)ill
    generate the following error: C:\Java9Revealed\com.jdojo.person.test\src\module-info.java:3:
    error: module not found:


    com.jdojo.person'
