  trans: '

    类中的以下方法返回 opens 语句的组成部分：


    • boolean isQualified()


    • Set<ModuleDescriptor.Opens.Modifier> modifiers()


    • String source()


    • Set<String> targets()


    `isQualified()` 方法对于限定 opens 返回 true，对于非限定 opens 返回 false。


    `source()` 方法返回开放包的名称。对于限定 opens，`targets()` 方法返回一个不可变的模块名称集合，表示该包向哪些模块开放；对于非限定
    opens，则返回一个空集合。`modifiers()` 方法返回 opens 语句的修饰符集合，这些修饰符是嵌套枚举 `ModuleDescriptor.Opens.Modifier`
    的常量，该枚举包含以下两个常量：


    • MANDATED：该 opens 在模块声明的源文件中被隐式声明。


    • SYNTHETIC：该 opens 在模块声明的源文件中未被显式或隐式声明。


    表示 provides 语句


    `ModuleDescriptor.Provides` 类的实例表示模块声明中针对特定服务类型的一个或多个 provides 语句。以下两个 provides
    语句为同一服务类型 X.Y 指定了两个实现类：


    provides X.Y with A.B;


    provides X.Y with Y.Z;


    `ModuleDescriptor.Provides` 类的一个实例将同时表示这两个语句。该类中的以下方法返回 provides 语句的组成部分：


    • List<String> providers()


    • String service()


    `providers()` 方法返回提供者类的完全限定类名列表。在前面的示例中，返回的列表将包含 A.B 和 Y.Z。`service()` 方法返回服务类型的完全限定名称。在前面的示例中，它将返回
    X.Y。


    表示 requires 语句


    `ModuleDescriptor.Requires` 类的实例表示模块声明中的 requires 语句。该类中的以下方法返回 requires 语句的组成部分：


    • Optional<ModuleDescriptor.Version> compiledVersion()


    • Optional<String> rawCompiledVersion()


    • String name()


    • Set<ModuleDescriptor.Requires.Modifier> modifiers()


    第 10 章 ■ 模块 API


    假设一个名为 M 的模块在编译时包含一条 requires N 语句。如果在编译时 N 的模块版本可用，则该版本会记录在 M 的模块描述符中。`compiledVersion()`
    方法以 `Optional` 形式返回 N 的已记录版本。如果 N 没有可用版本，则该方法返回一个空的 `Optional`。requires 语句中指定模块的模块版本仅出于信息目的记录在模块描述符中。模块系统在任何阶段都不会使用它。然而，工具和框架可以将其用于诊断目的。例如，一个工具可能会验证所有通过
    requires 语句指定为依赖项的模块，其可用版本必须等于或高于编译时记录的版本。


    继续上一段的示例，`rawCompiledVersion()` 方法以 `Optional<String>` 形式返回模块 N 的版本。在大多数情况下，`compiledVersion()`
    和 `rawCompiledVersion()` 这两个方法会返回相同的模块版本，但格式不同：一个以 `Optional<ModuleDescriptor.Version>`
    对象返回，另一个以 `Optional<String>` 对象返回。你可能拥有一个模块版本无效的模块。这样的模块可能是在 Java 模块系统之外创建和编译的。你可以将这种具有无效模块版本的模块作为
    Java 模块加载。在这种情况下，`compiledVersion()` 方法返回一个空的 `Optional<ModuleDescriptor.Version>`，因为该模块版本无法被解析为有效的
    Java 模块版本；而 `rawCompiledVersion()` 返回一个包含该无效模块版本的 `Optional<String>`。


    ■ **提示** `ModuleDescriptor.Requires` 类的 `rawCompiledVersion()` 方法可能返回所需模块的不可解析版本。

    '
- fmt: '`name()`方法返回`requires`语句中指定的模块名称。


    `modifiers()`方法返回`requires`语句的修饰符集合，这些修饰符是嵌套的`ModuleDescriptor.Requires.Modifier`枚举的常量，该枚举包含以下常量：


    - `MANDATED`：该依赖项在模块声明源文件中被隐式声明。

    - `STATIC`：该依赖项在编译时是必需的，在运行时是可选的。

    - `SYNTHETIC`：该依赖项未在模块声明源文件中被显式或隐式声明。

    - `TRANSITIVE`：该依赖项会导致任何依赖当前模块的模块，隐式地声明一个对由此`requires`语句命名的模块的依赖。


    ## 表示模块版本


    `ModuleDescriptor.Version`类的实例表示模块的版本。它包含一个名为`parse(String version)`的静态工厂方法，该方法返回一个表示指定版本字符串对应版本的实例。回想一下，你不需要在模块声明中指定模块版本。当你将模块代码打包成模块化
    JAR 时（通常使用`jar`工具），才需要添加模块版本。`javac`编译器也允许你在编译模块时指定模块版本。


    模块版本字符串包含三个组成部分：


    - 一个必需的版本号

    - 一个可选的预发布版本

    - 一个可选的构建版本


    模块版本的形式如下：


    ```

    vNumToken+ (''-'' preToken+)? (''+'' buildToken+)?

    ```


    每个组成部分是一个由多个标记（token）组成的序列；每个标记要么是一个非负整数，要么是一个字符串。标记由标点字符`.`、`-`或`+`分隔，或者由数字序列到既非数字也非标点字符的字符序列的转换（或反之）来分隔。版本字符串必须以数字开头。版本号是由`.`字符分隔的标记序列，以第一个`-`或`+`字符结束。预发布版本是由`.`或`-`字符分隔的标记序列，以第一个`+`字符结束。构建版本是由`.`、`-`或`+`字符分隔的标记序列。


    `ModuleDescriptor`类的`version()`方法返回一个`Optional<ModuleDescriptor.Version>`。


    ## 模块的其他属性


    在打包模块化 JAR 时，可以在`module-info.class`文件中设置其他模块属性，例如主类名称、操作系统名称等。`ModuleDescriptor`类包含一个方法，用于返回每个此类属性。`ModuleDescriptor`类中以下方法值得关注：


    - `Set<ModuleDescriptor.Exports> exports()`

    - `boolean isAutomatic()`

    - `boolean isOpen()`

    - `Optional<String> mainClass()`

    - `String name()`

    - `Set<ModuleDescriptor.Opens> opens()`

    - `Set<String> packages()`

    - `Set<ModuleDescriptor.Provides> provides()`

    - `Optional<String> rawVersion()`

    - `Set<ModuleDescriptor.Requires> requires()`

    - `String toNameAndVersion()`

    - `Set<String> uses()`


    这些方法名直观易懂。我将介绍两个需要稍加解释的方法：`packages()`和`provides()`。


    `ModuleDescriptor`类包含一个名为`packages()`的方法，而`Module`类包含一个名为`getPackages()`的方法。两者都返回一组包名。为什么会有两个用于相同目的的方法？实际上，它们服务于不同的目的。在`ModuleDescriptor`中，该方法返回模块声明中定义的包集合，无论这些包是否被导出。回想一下，你无法为未命名模块获取`ModuleDescriptor`，在这种情况下，你可以使用`Module`类中的`getPackages()`方法获取未命名模块中的包名。另一个区别是，`ModuleDescriptor`报告的包名是静态的；而`Module`报告的包名是动态的，它报告在调用`getPackages()`方法时模块中已加载的包。`Module`报告运行时当前加载到其中的所有包。'
  raw: 'The name() method returns the name of the module specified in the requires
    statement. The


    modifiers() method returns the set of modifiers for the requires statement that
    are constants of the nested ModuleDescriptor.Requires.Modifier enum, which contains
    the following constants:


    • MANDATED: The dependency was implicitly declared in the source of the module


    declaration.


    • STATIC: The dependency is mandatory at compile-time and optional at runtime.


    • SYNTHETIC: The dependency was not explicitly or implicitly declared in the source
    of


    the module declaration.


    • TRANSITIVE: The dependency causes any module that depends on the current


    module to have an implicitly declared dependency on the module named by this


    requires statement.


    Representing a Module Version


    An instance of the ModuleDescriptor.Version class represents a module’s version.
    It contains a static factory method named parse(String version) that returns its
    instance representing a version from the specified version string. Recall that
    you do not specify a module’s version in a module’s declaration. You add a module
    version when you package module’s code into a modular JAR, typically using the
    jar tool. The javac compiler also lets you specify a module version when you compile
    module.


    A module version string contains three components:


    • A mandatory version number


    • An optional prerelease version


    • An optional build version


    Chapter 10 ■ the Module apI


    A module version is of the following form:


    vNumToken+ (''-'' preToken+)? (''+'' buildToken+)?


    Each component is sequence of tokens; each token is either a non-negative integer
    or a string. Tokens are separated by the punctuation characters ., -, or +, or
    by transition from a sequence of digits to a sequence of characters that are neither
    digits nor punctuation characters, or vice versa. A version string must start
    with a digit. The version number is a sequence of tokens separated by . characters,
    terminated by the first - or +


    character. The prerelease version is a sequence of tokens separated by . or -
    characters, terminated by the first + character. The build version is a sequence
    of tokens separated by ., -, or + characters.


    The version() method of the ModuleDescriptor class returns an Optional<ModuleDescriptor.Version>.


    Other Properties of Modules


    There are other module properties that can be set in the module-info.class file
    while packaging the modular JAR, such as the main class name, OS name, etc. The
    ModuleDescriptor class contains a method that returns each of such properties.
    The following methods in the ModuleDescriptor class are of interest:


    • Set<ModuleDescriptor.Exports> exports()


    • boolean isAutomatic()


    • boolean isOpen()


    • Optional<String> mainClass()


    • String name()


    • Set<ModuleDescriptor.Opens> opens()


    • Set<String> packages()


    • Set<ModuleDescriptor.Provides> provides()


    • Optional<String> rawVersion()


    • Set<ModuleDescriptor.Requires> requires()


    • String toNameAndVersion()


    • Set<String> uses()


    The method names are intuitive to understand their purposes. I cover two methods
    that need a little explanation: packages() and provides().


    The ModuleDescriptor class contains a method named packages() and the Module class
    contains a method named getPackages(). Both return a set of package names. Why
    do you have two methods for the same purpose? In fact, they serve different purposes.
    In the ModuleDescriptor, the method returns the set of packages defined in the
    module declaration whether they are exported or not. Recall that you cannot get
    a ModuleDescriptor for an unnamed module and, in that case, you can get the package
    names in the unnamed module using the getPackages() method in the Module class.
    Another difference is that the package names reported by a ModuleDescriptor are
    static; the package names reported by a Module are dynamic, which reports the
    packages loaded in the module at the time the getPackages() method is called.


    A Module reports all packages currently loaded in it at runtime.


    Chapter 10 ■ the Module apI'
