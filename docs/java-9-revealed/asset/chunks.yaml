    Chapter 20 ■ Other Changes in JDK 9


    Spin-Wait Hints


    In a multi-threaded program, threads often need to coordinate. One thread may
    have to wait for another thread to update a volatile variable. When the volatile
    variable is updated with a certain value, the first thread may proceed. If the
    wait could be longer, it is suggested that the first thread relinquish the CPU
    by sleeping or waiting and it be notified when it can resume work. However, making
    a thread sleep or wait has latency. For a short time wait and to reduce latency,
    it is common for a thread to wait in a loop by checking for a certain condition
    to be true. Consider code in a class that uses a loop to wait for a volatile variable
    named dataReady to be true:


    volatile boolean dataReady;


    ...


    @Override


    public void run() {


    // Wait until data is ready


    while (!dataReady) {


    // No code


    }


    processData();


    }


    private void processData() {


    // Data processing logic goes here


    }


    The while loop in this code is called a spin-loop, busy-spin, busy-wait, or spin-wait.
    The while loop keeps looping until the dataReady variable is true.


    While spin-wait is discouraged because of its unnecessary use of resources, it
    is commonly needed. In this example, the advantage is that the thread will start
    processing data as soon as the dataReady variable becomes true. However, you pay
    for performance and power consumption because the thread is actively looping.


    Certain processors can be hinted that a thread is in a spin-wait and, if possible,
    can optimize the resource usage. For example, x86 processors support a PAUSE instruction
    to indicate a spin-wait. The instruction delays the execution of the next instruction
    for the thread for a finite small amount of time, thus improving resource usage.


    JDK 9 added a new static onSpinWait() method to the Thread class. It is a pure
    hint to the processor that the caller thread is momentarily not able to proceed,
    so resource usage can be optimized. A possible implementation of this method may
    be no-op when the underlying platform does not support such hints.


    Listing [20-11 con](#index_split_008.html#495)tains sample code. Note that your
    program’s semantics do not change by using a spin-wait hint. It may perform better
    if the underlying hardware supports the hint.


    Chapter 20 ■ Other Changes in JDK 9


    ***Listing 20-11.*** Sample Code for Using a Spin-Wait Hint to the Processor Using
    the Static Thread.


    onSpinWait() Method


    // SpinWaitTest.java


    package com.jdojo.misc;


    public class SpinWaitTest implements Runnable {


    private volatile boolean dataReady = false;


    @Override


    public void run() {


    // Wait while data is ready


    while (!dataReady) {


    // Hint a spin-wait


    Thread.onSpinWait();


    }


    processData();


    }


    private void processData() {


    // Data processing logic goes here


    }


    public void setDataReady(boolean dataReady) {


    this.dataReady = dataReady;


    }


    }


