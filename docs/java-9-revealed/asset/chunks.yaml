  trans: "\n在 JDK 8 中，Stream 接口包含两个方法：`skip(long count)` 和 `limit(long count)`。\n\n\
    `skip()` 方法会返回从流开头跳过指定数量元素后的剩余元素。`limit()` 方法则返回从流开头起，数量不超过指定值的元素。这两个方法中，一个从开头丢弃元素，另一个从开头获取元素并丢弃剩余部分。两者都基于元素数量进行操作。`dropWhile()`\
    \ 和 `takeWhile()` 方法分别类似于 `skip()` 和 `limit()` 方法；不过，这两个新方法基于 **Predicate**（谓词）而非元素数量进行判断。\n\
    \n© Kishori Sharan 2017\n\nK. Sharan, *Java 9 揭秘*，DOI 10.1007/978-1-4842-2592-9_18\n\
    \n第 18 章 ■ Stream API 更新\n\n你可以将这些方法视为与 `filter()` 方法类似，但存在一个例外。`filter()` 方法会对所有元素评估谓词，而\
    \ `dropWhile()` 和 `takeWhile()` 方法则从流开头开始评估谓词，直到谓词返回 false 为止。\n\n对于有序流，`dropWhile()`\
    \ 方法会返回流中的元素，并从开头丢弃那些指定谓词返回 true 的元素。考虑以下有序整数流：\n\n1, 2, 3, 4, 5, 6, 7\n\n如果你在\
    \ `dropWhile()` 方法中使用一个谓词，该谓词对小于 5 的整数返回 true，那么该方法将丢弃前四个元素，并返回剩余部分：\n\n5, 6,\
    \ 7\n\n对于无序流，`dropWhile()` 方法的行为是非确定性的。它可能会选择丢弃任意匹配谓词的子集元素。当前的实现会从开头丢弃匹配的元素，直到遇到不匹配的元素为止。\n\
    \n`dropWhile()` 方法有两种极端情况。如果第一个元素不匹配谓词，该方法会返回原始流。如果所有元素都匹配谓词，该方法会返回一个空流。\n\n`takeWhile()`\
    \ 方法的工作方式与 `dropWhile()` 方法相同，区别在于它从流开头返回匹配的元素，并丢弃剩余部分。\n\n■ **提示** 在有序并行流中使用\
    \ `dropWhile()` 和 `takeWhile()` 方法时要格外小心，因为可能会遇到性能下降的问题。在有序并行流中，元素必须按顺序排列，并在这些方法返回之前从所有线程中收集完毕。这些方法在顺序流中性能最佳。\n\
    \n`ofNullable(T t)` 方法返回一个包含单个元素的流，该元素即为指定的元素（如果该元素非空）。如果指定的元素为 null，则返回一个空流。在流处理中使用\
    \ `flatMap()` 方法时，此方法非常有用。考虑以下值可能为 null 的 Map：`Map<Integer, String> map = new\
    \ HashMap<>();`\n\n`map.put(1, \"One\");`\n`map.put(2, \"Two\");`\n`map.put(3,\
    \ null);`\n`map.put(4, \"Four\");`\n\n你如何从这个 Map 中获取排除 null 后的值集合？也就是说，如何从这个 Map\
    \ 中获取包含 \"One\"、\"Two\" 和 \"Four\" 的集合？以下是在 JDK 8 中的实现方式：\n\n```java\n// 在 JDK\
    \ 8 中\nSet<String> nonNullvalues = map.entrySet()\n    .stream()\n    .flatMap(e\
    \ -> e.getValue() == null ? Stream.empty() : Stream.of(e.getValue()))\n    .collect(toSet());\n\
    ```\n\n第 18 章 ■ Stream API 更新\n\n注意 `flatMap()` 方法中 lambda 表达式内使用了三元运算符。在 JDK\
    \ 9 中，你可以使用 `ofNullable()` 方法使这个表达式更简洁：\n\n```java\n// 在 JDK 9 中\nSet<String>\
    \ nonNullvalues = map.entrySet()\n    .stream()\n    .flatMap(e -> Stream.ofNullable(e.getValue()))\n\
    \    .collect(toSet());\n```\n\n新的 `iterate(T seed, Predicate<? super T> hasNext,\
    \ UnaryOperator<T> next)` 方法允许你使用初始种子值，并通过迭代应用指定的 next 函数来创建一个顺序流（可能无限）。当指定的 `hasNext`\
    \ 谓词返回 false 时，迭代停止。调用此方法等同于使用一个 for 循环：\n\n```java\nfor (T n = seed; hasNext.test(n);\
    \ n = next.apply(n)) {\n    // n 是添加到流中的元素\n}\n```\n"
