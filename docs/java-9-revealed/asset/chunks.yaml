    Rules for Multi-Release JARs


    You need to follow a few rules while creating multi-release JARs. If you make
    a mistake, the jar tool will print errors. Sometimes, error messages are not intuitive.
    As I have suggested, it’s best to run the jar tool with the


    --verbose option to get more details on errors.


    Most of the rules are based on one fact: A MRJAR contains an API for one release
    of a library (or an application) for multiple JDK platforms. For example, you
    have a MRJAR named jdojo-lib-1.0.jar that may contain version 1.0 of the APIs
    for the library named jdojo-lib, and that library may use APIs from JDK 8 and
    JDK 9\. That means that this MRJAR should provide the same API (in terms of public
    types and their public members) when it is used on JDK 8 on the class path, on
    JDK 9 on the class path, or on JDK 9 on the module path. If the MRJAR provides
    different APIs on JDK 8 and JDK 9, this is not a valid MRJAR. The following sections
    describe a few rules.


    Modular Multi-Release JARs


    A MRJAR can be a modular JAR and, in that case, it can contain a module descriptor,
    module-info.class, in the root directory, in one or more versioned directories,
    or a combination of both. The versioned descriptors must be identical to the root
    module descriptor, with a few exceptions:


    • A versioned descriptor can have different non-transitive requires statements
    of


    java.* and jdk.* modules.


    • Different module descriptors cannot have different non-transitive requires


    statements for non-JDK modules.


    • A versioned descriptor can have different uses statements.


    These rules are based on the fact that changes in implementation details are allowed,
    but not in the API itself. Allowing changes in the requires statement for non-JDK
    modules is considered a change in the API—


    it requires you to have different user-defined modules for different versions
    of the JDK. This is the reason why this is not allowed.


    A modular MRJAR need not have a module descriptor in the root directory. This
    is what we had in our examples in the previous section. We had no module descriptor
    in the root directory, but had one in the META-INF/versions/9 directory. This
    arrangement makes it possible to have non-modular code for JDK 8


    and modular code for JDK 9 in one MRJAR.


