    jre\lib\endorsed 目录中查找 JAR。


    Java SE 9 仍然支持认可标准和独立 API 覆盖机制。在 Java SE 9 中，运行时镜像由模块组成。要使用此机制，您需要使用认可标准和独立 API
    模块的更新版本。您需要使用 --upgrade-module-path 命令行选项。此选项的值是一个包含认可标准和独立 API 模块的目录列表。以下 Windows
