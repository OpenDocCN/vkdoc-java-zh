    and constructors. The following discussion uses the term method, however it applies
    to both methods and constructors. Suppose you invoke the getCallerClass() method
    inside a method named S, which is called from a method named T. Further suppose
    that the method named T is in a class named C. In this case, class C is the caller
    class.


