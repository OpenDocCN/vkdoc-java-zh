    warnings—excluding the warning for the import statement.


    Summary


    Deprecation in Java is a way to provide information about the lifecycle of the
    API. Deprecating an API tells its users to migrate away because the API is dangerous
    to use, a better replacement exists, or it will be removed in a future release.
    Using deprecated APIs generates compile-time deprecation warnings.


    The @deprecated Javadoc tag and the @Deprecated annotation are used together to
    deprecate API elements such as modules, packages, types, constructors, methods,
    fields, parameters, and local variables.


    Before JDK 9, the annotation did not contain any elements. It is retained at runtime.


    JDK 9 has added two elements to the annotation: since and forRemoval. The since
    element defaults to an empty string. Its value denotes the version of the API
    in which the API element was deprecated. The forRemoval element’s type is boolean
    and it defaults to false. Its value of true denotes that the API element will
    be removed in a future release.


    The JDK 9 compiler generates two types of deprecation warnings depending on the
    value


    of the forRemoval element of the @Deprecated annotation: *ordinary deprecation
    warnings* when forRemoval=false and *removal warnings* for forRemoval=true.


    Before JDK 9, you could suppress the deprecation warnings by annotating the use-sites
    of the


    deprecated APIs with a @SuppressWarnings("deprecation") annotation. In JDK 9,
    you need to use


    @SuppressWarnings("deprecation") to suppress ordinary warnings, @SuppressWarnings("deprecation")
    to suppress removal warnings, and @SuppressWarnings({"deprecation", "removal"})
    to suppress both types of warnings.


    Before JDK 9, importing a deprecated construct using an import statement generated
    a compile-time deprecation warning. JDK 9 omits such warnings.


    **CHAPTER 16**


    **Stack Walking**


    In this chapter, you will learn:


    • What stacks and stack frames are


    • How to traverse a thread’s stack before JDK 9


    • How to traverse a thread’s stack in JDK 9 using the StackWalker API


    • How to get the caller’s class in JDK 9


    What Is a Stack?


    Each thread in a JVM has a *private* JVM stack that is created at the same time
    the thread is created. The stack is a List-In-First-Out (LIFO) data structure.
    A stack stores frames. A new frame is created and pushed to the top of the stack
    each time a method is invoked. A frame is destroyed (popped out of stack) when
    the method invocation completes. Each frame on a stack contains its own array
    of local variables, as well as its own operand stack, return value, and reference
    to the runtime constant pool of the current method’s class.


    A specific implementation of the JVM may extend a frame to store more pieces of
    information.


    A frame on a JVM stack represents a Java method invocation in a given thread.
    In a given thread, only one frame is active at any point. The active frame is
    known as the *current frame* and its method is known as the *current method*.
    The class that defines the current method is known as the *current class*. A frame
    is no longer the current frame when its method invokes another method—a new frame
    is pushed to the stack and the executing method becomes the current method and
    the new frame becomes the current frame. When the method returns, the old frame
    becomes the current frame again. For more details on JVM stack and frames, refer
    to the Java Virtual Machine Specification at [https://docs.oracle.com/javase/specs/jvms/](https://docs.oracle.com/javase/specs/jvms/se8/html/index.html)


    [se8/html/index.html](https://docs.oracle.com/javase/specs/jvms/se8/html/index.html).


    ■ **Tip** If a JVM supports native methods, a thread also contains a native method
    stack that contains a native method frame for each native method invocation.'
