    \n以下选项将 java.base 模块中的 sun.util.logging 包开放给所有未命名模块：\n\n--add-opens java.base/sun.util.logging=ALL-UNNAMED\n\
    \n第 9 章 ■ 打破模块封装\n\n--add-reads 选项\n\n--add-reads 选项并非用于打破封装。相反，它用于增加模块的可读性。在测试和调试过程中，有时一个模块需要读取另一个模块，即使前者并不依赖于后者。模块声明中的\
