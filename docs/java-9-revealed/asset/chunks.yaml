- fmt: "# The Root Directory of JDK and JRE\n\nThe root directory of the JDK and JRE,\
    \ which is not embedded in a JDK, used to contain several files such as `COPYRIGHT`,\
    \ `LICENSE`, and `README.html`. A `release` file in the root directory contained\
    \ a key-value pair describing the runtime image such as the Java version, OS version,\
    \ and architecture. The following code shows the partial contents of an example\
    \ `release` file from JDK 8:\n\n```\nJAVA_VERSION=\"1.8.0_66\"\nOS_NAME=\"Windows\"\
    \nOS_VERSION=\"5.2\"\nOS_ARCH=\"amd64\"\nBUILD_TYPE=\"commercial\"\n```\n\nThe\
    \ Java SE 9 has flattened the directory hierarchy for the JDK and removed the\
    \ distinction between a JDK and a JRE. Figure 8-2 shows the directories for a\
    \ JDK installation in Java SE 9. The JRE installation in JDK 9 does not contain\
    \ the `include` and `jmods` directories.\n\n```\nJDK_HOME\n├── bin\n├── conf\n\
    ├── include\n├── jmods\n├── legal\n└── lib\n```\n\n***Figure 8-2.** JDK directory\
    \ arrangements in Java SE 9*\n\nIn the JDK in Java SE 9:\n\n- There is no sub-directory\
    \ named `jre`.\n- The `bin` directory contains all commands. On the Windows platform,\
    \ it continues to contain the system's runtime dynamically linked libraries.\n\
    - The `conf` directory contains the user-editable configuration files such as\
    \ `.properties` and `.policy` files that used to be in the `jre\\lib` directory.\n\
    - The `include` directory contains C/C++ header files to be used while compiling\
    \ the native code as before. It exists only in the JDK.\n- The `jmods` directory\
    \ contains the platform modules in JMOD format. You need it when creating a custom\
    \ runtime image. It exists only in the JDK.\n- The `legal` directory contains\
    \ legal notices.\n- The `lib` directory contains the dynamically linked native\
    \ libraries on the non-Windows platform. Its sub-directories and files are not\
    \ supposed to be directly edited or used by developers.\n\nThe root directory\
    \ of the JDK 9 continues to have files such as `COPYRIGHT` and `README`. The `release`\
    \ file in JDK 9 contains a new entry with a `MODULES` key whose value is a list\
    \ of modules included in the image.\n\nPartial contents of a `release` file in\
    \ a JDK 9 image are as follows:\n\n```\nMODULES=java.rmi,jdk.jdi,jdk.policytool\n\
    OS_VERSION=\"5.2\"\nOS_ARCH=\"amd64\"\nOS_NAME=\"Windows\"\nJAVA_VERSION=\"9\"\
    \nJAVA_FULL_VERSION=\"9-ea+133\"\n```\n\nI have shown only three modules in the\
    \ list. In a full JDK install, this list will include all platform modules. In\
    \ a custom runtime image, this list will contain only the modules that you include\
    \ in the image.\n\n> **Tip:** The `lib\\tools.jar` in the JDK and the `lib\\rt.jar`\
    \ in the JRE have been removed from Java SE 9. Classes and resources that were\
    \ available in these JARs are now stored in the `lib` directory in an internal\
    \ format within a file named `modules`. A new scheme called `jrt` may be used\
    \ to retrieve those classes and resources from the runtime image. Applications\
    \ dependent on these JARs' locations will stop working.\n\n# Behavioral Changes\n\
    \nBehavioral changes will affect the runtime behavior of an application. The following\
    \ sections explain those changes.\n\n## Endorsed Standards Override Mechanism\n\
    \nPrior to Java SE 9, you were able to use the Endorsed Standards Override Mechanism\
    \ to use the newer versions of classes and interfaces that implement Endorsed\
    \ Standards or Standalone APIs such as the `javax.rmi.CORBA` package and Java\
    \ API for XML Processing (JAXP), which are created outside the Java Community\
    \ Process. These JARs were prepended to the JVM's bootstrap class path, thus overriding\
    \ any definition of these classes and interfaces present in the JRE. The locations\
    \ of these JARs were specified by a system property named `java.endorsed.dirs`\
    \ where directories were separated by platform-specific path-separator characters.\
    \ If this property was not set, the runtime would look for the JARs in the `jre\\\
    lib\\endorsed` directory.\n\nJava SE 9 still supports the Endorsed Standards and\
    \ Standalone APIs Override mechanism. In Java SE 9, a runtime image consists of\
    \ modules. To use this mechanism, you need to use the newer versions of the modules\
    \ for the Endorsed Standards and Standalone APIs. You need to use the `--upgrade-module-path`\
    \ command-line option. The value of this option is a list of directories containing\
    \ modules for the Endorsed Standards and Standalone APIs. The following command\
    \ on Windows overrides the Endorsed Standards modules such as the `java.corba`\
    \ module in JDK 9. The modules in the `umod1` and `umod2` directories will be\
    \ used instead of the corresponding modules in the runtime image:\n\n```\njava\
    \ --upgrade-module-path umod1;umod2 <other-options>\n```\n\n> **Tip:** In Java\
    \ SE 9, it is an error to create a `JAVA_HOME\\lib\\endorsed` directory and to\
    \ set a system property named `java.endorsed.dirs`.\n\n## Extension Mechanism\n\
    \nJava SE prior to version 9 allowed an extension mechanism whereby you were able\
    \ to extend the runtime image by placing JARs in directories specified by the\
    \ system property `java.ext.dirs`. If this system property was not set, the `jre\\\
    lib\\ext` directory was used as its default value. This mechanism loaded all JARs\
    \ in this directory by an extension class loader, which is the child of the bootstrap\
    \ class loader and the parent of the system class loader. It loads all application\
    \ classes. The contents of these JARs were visible to all applications that compile\
    \ or run on this runtime image.\n\nJava SE 9 does not support the extension mechanism.\
    \ If you need a similar functionality, you can place those JARs at the front of\
    \ the class path. Having a directory named `JAVA_HOME\\lib\\ext` or setting a\
    \ system property named `java.ext.dirs` causes an error in JDK 9.\n\n## Changes\
    \ in Class Loaders\n\nAt runtime, every type is loaded by a class loader, which\
    \ is represented by an instance of the `java.lang.ClassLoader` class. If you have\
    \ an object reference `obj`, you can get its class loader reference by calling\
    \ the `obj.getClass().getClassLoader()` method. You can get the parent of a class\
    \ loader using its `getParent()` method.\n\nPrior to version 9, the JDK used three\
    \ class loaders to load classes, as shown in Figure 8-3. The direction of the\
    \ arrow in the diagram indicates the delegation direction. You can add more class\
    \ loaders, which would be a subclass of the `ClassLoader` class. The three class\
    \ loaders in the JDK load classes from different locations and types.\n\n```\n\
    Bootstrap class loader\n        ↑\nExtension class loader\n        ↑\nApplication\
    \ class loader\n```\n\n***Figure 8-3.** Class loaders hierarchy in the JDK prior\
    \ to version 9*\n\nThe JDK class loaders work in a hierarchical fashion—the bootstrap\
    \ class loader being at the top of the hierarchy. A class loader delegates a class-loading\
    \ request to the one above it. For example, if the application class loader needs\
    \ to load a class, it delegates the request to the extension class loader, which\
    \ in turn delegates the request to the bootstrap class loader. If the bootstrap\
    \ class loader cannot load the class, the extension class loader attempts to load\
    \ it. If the extension class loader cannot load the class, the application class\
    \ loader attempts to load it. If the application class loader cannot load it,\
    \ a `ClassNotFoundException` is thrown.\n\nThe bootstrap class loader is the parent\
    \ of the extension class loader. The extension class loader is the parent of the\
    \ application class loader. The bootstrap class loader has no parent. By default,\
    \ the application class loader will be the parent of additional class loaders\
    \ you create.\n\nThe bootstrap class loader loads bootstrap classes that consist\
    \ of the Java platform, including the classes in `JAVA_HOME\\lib\\rt.jar` and\
    \ several other runtime JARs. It is entirely implemented in the virtual machine.\n\
    \nYou can use the `-Xbootclasspath/p` and `-Xbootclasspath/a` command-line options\
    \ to prepend and append to the bootstrap class path."
