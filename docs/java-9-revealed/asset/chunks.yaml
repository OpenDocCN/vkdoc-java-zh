    Whether a request can have a body depends on the HTTP method used to send the
    request. The


    DELETE, POST, and PUT methods have a body, whereas the GET method does not. The
    HttpRequest.Builder class contains a method with the same name as the HTTP method’s
    name to set the method and


    the body of the request. For example, to use the POST method with a body, the
    builder has a


    POST(HttpRequest.BodyProcessor body) method.


    There are many other HTTP methods such as HEAD and OPTIONS, which do not have
    a


    corresponding method the HttpRequest.Builder class. The class contains a method(String
    method, HttpRequest.BodyProcessor body) method that you can use for any HTTP method.
    When using the


    method() method, make sure to specify the method name in all uppercase—for example,
    GET, POST, HEAD, etc. The following is a list of those methods:


    • HttpRequest.Builder DELETE(HttpRequest.BodyProcessor body)


    • HttpRequest.Builder method(String method, HttpRequest.BodyProcessor body)


    Chapter 14 ■ the http/2 Client api


    • HttpRequest.Builder POST(HttpRequest.BodyProcessor body)


    • HttpRequest.Builder PUT(HttpRequest.BodyProcessor body)


    The following snippet of code sets the body of an HTTP request from a String,
    which is typically done when you post an HTML form to a URL. The form data consists
    of three fields named n1, n2, and op.


    URI calc = new URI("http://localhost:8080/webapp/Calculator");


    // Compose the form data with n1 = 10, n2 = 20\. And op = +


    String formData = "n1=" + URLEncoder.encode("10","UTF-8") +


    "&n2=" + URLEncoder.encode("20","UTF-8") +


    "&op=" + URLEncoder.encode("+","UTF-8") ;


    HttpRequest.Builder builder = HttpRequest.newBuilder(calc)


    .header("Content-Type", "application/x-www-form-urlencoded")


    .header("Accept", "text/plain")


    .POST(HttpRequest.BodyProcessor.fromString(formData));


    Creating HTTP Requests


    In previous sections, you learned how to create an HttpRequest.Builder and how
    to use it to set different properties of an HTTP request. Creating an HTTP request
    is simply calling the build() method on an HttpRequest.Builder, which returns
    an HttpRequest object. The following snippet of code creates an HttpRequest that
    uses the HTTP GET method:


    HttpRequest request = HttpRequest.newBuilder()


    .uri(new URI("http://www.google.com"))


    .GET()


    .build();


    The following snippet of code builds an HttpRequest with headers and a body that
    uses an HTTP


    POST method:


    // Build the URI and the form’s data


    URI calc = new URI("http://localhost:8080/webapp/Calculator");


    String formData = "n1=" + URLEncoder.encode("10","UTF-8") +


    "&n2=" + URLEncoder.encode("20","UTF-8") +


    "&op=" + URLEncoder.encode("+","UTF-8");


    // Build the HttpRequest object


    HttpRequest request = HttpRequest.newBuilder(calc)


    .header("Content-Type", "application/x-www-form-urlencoded")


    .header("Accept", "text/plain")


    .POST(HttpRequest.BodyProcessor.fromString(formData))


    .build();


    Note that creating an HttpRequest object does not send the request to the server.
    You will need to call the send() or sendAsync() method of the HttpClient class
    to send the request to the server. In the previous example, the request object
    is like any other Java object. I explain how to send requests to a server in the
    next section.


    Chapter 14 ■ the http/2 Client api


    The following snippet of code creates an HttpRequest object with HTTP HEAD request
    method. Note that it uses the method() method of the HttpRequest.Builder class
    to specify the HTTP method.


    HttpRequest request =


    HttpRequest.newBuilder(new URI("http://www.google.com"))


    .method("HEAD", HttpRequest.noBody())


    .build();


    Processing HTTP Responses


    Once you have an HttpRequest object, you can send the request to a server and
    receive the response synchronously or asynchronously. An instance of the HttpResponse<T>
    class represents a response received from a server, where the type parameter T
    indicates the type of the response body such as String, byte[], or Path. You can
    use one of the following methods of the HttpRequest class to send an HTTP request
    and receive an HTTP response:


    • <T> HttpResponse<T> send(HttpRequest req, HttpResponse.BodyHandler<T>


    responseBodyHandler)


    • <T> CompletableFuture<HttpResponse<T>> sendAsync(HttpRequest req,


    HttpResponse.BodyHandler<T> responseBodyHandler)


    • <U,T> CompletableFuture<U> sendAsync(HttpRequest req,


    HttpResponse.MultiProcessor<U,T> multiProcessor)


    The send() method is synchronous. That is, it blocks until the response is received.
    The sendAsync() method processes the response asynchronously. It returns immediately
    with a CompletableFuture<HttpRes ponse>, which completes when the response is
    ready to be processed.


    Processing Response Status and Headers


    An HTTP response contains a status code, headers, and a body. An HttpResponse
    object is made available to you as soon as the status code and headers are received
    from the server, but before the body is received.


    The statusCode() method of the HttpResponse class returns the status code of the
    response as an int.


    The headers() method of the HttpResponse class returns the headers of the response
    as an instance of the HttpHeaders interface. The HttpHeaders interface contains
    the following methods to conveniently retrieve header’s values by name or all
    headers as a Map<String,List<String>>:


    • List<String> allValues(String name)


    • Optional<String> firstValue(String name)


    • Optional<Long> firstValueAsLong(String name)


    • Map<String,List<String>> map()


    Listing [14-2](#index_split_006.html#375) contains a complete program to send
    a request to the URL[, http://www.google.com](http://www.google.com/), with a
    HEAD request. It prints the received response’s status code and headers. You may
    get different output.


    Chapter 14 ■ the http/2 Client api


    ***Listing 14-2.*** Processing an HTTP Response’s Status Code and Headers


    // GoogleHeadersTest.java


    package com.jdojo.http.client;


    import java.io.IOException;


    import java.net.URI;


    import java.net.URISyntaxException;


    import jdk.incubator.http.HttpClient;


    import jdk.incubator.http.HttpRequest;


    import jdk.incubator.http.HttpResponse;


    public class GoogleHeadersTest {


    public static void main(String[] args) {


    try {


    URI googleUri = new URI("http://www.google.com");


    HttpClient client = HttpClient.newHttpClient();


    HttpRequest request =


    HttpRequest.newBuilder(googleUri)


    .method("HEAD", HttpRequest.noBody())


    .build();


    HttpResponse<?> response =


    client.send(request, HttpResponse.BodyHandler.discard(null));


    // Print the response status code and headers


    System.out.println("Response Status Code:" +


    response.statusCode());


    System.out.println("Response Headers are:");


    response.headers()


    .map()


    .entrySet()


    .forEach(System.out::println);


    } catch (URISyntaxException | InterruptedException |


    IOException e) {


    e.printStackTrace();


    }


    }


    }


