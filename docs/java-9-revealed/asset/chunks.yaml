    ***图 5-1.** 服务、服务提供者与服务消费者的结构* 通常，服务会使用 `ServiceLoader` 类加载所有服务提供者，并将其提供给服务消费者（或客户端）。这种架构支持插件机制，可以在不影响服务和服务消费者的前提下添加或移除服务提供者。服务消费者仅知晓服务接口，而不知道该服务接口的任何具体实现（即服务提供者）。


    ■ **提示** 建议阅读 `java.util.ServiceLoader` 类的文档，以全面了解 JDK 9 提供的服务加载机制。


    在本章中，我将使用一个服务接口和三个服务提供者。它们的模块、类/接口名称及简要说明列于表 5-1。图 5-2 展示了按服务、服务提供者和服务消费者组织的类/接口，可与表
    5-1 进行对比。


    ***表 5-1.** 本章示例中使用的模块、类与接口列表* **模块**


    **类/接口**


    **说明**


    com.jdojo.prime


    PrimeChecker


    作为服务接口和服务


    com.jdojo.prime.generic


    GenericPrimeChecker


    服务提供者


    com.jdojo.prime.faster


    FasterPrimeChecker


    服务提供者


    com.jdojo.prime.probable


    ProbablePrimeChecker


    服务提供者


    com.jdojo.prime.client


    Main


    服务消费者


    第 5 章 ■ 实现服务


    GenericPrimeChecker


    FasterPrimeChecker


    PrimeChecker


    ProbablePrimeChecker


    Main


    ***图 5-2.** 本章示例中使用的服务、三个服务提供者与服务消费者的结构*


    发现服务


    为了使用服务，需要发现并加载其提供者。`java.util.ServiceLoader` 类负责发现和加载服务提供者。发现并加载服务提供者的模块必须在其声明中包含
    `uses` 语句，其语法如下：`uses <服务接口>;`


    其中，`<服务接口>` 是服务接口的名称，可以是 Java 接口名、类名或注解类型名。如果某个模块使用 `ServiceLoader<S>` 类为名为 `S`
    的服务接口加载服务提供者实例，则该模块声明必须包含以下语句：


    `uses S;`


    ■ **提示** 在我看来，`uses` 这个语句名称似乎有些用词不当。乍一看，似乎当前模块将使用指定的服务。然而，事实并非如此。服务是由客户端使用的，而不是定义该服务的模块。更直观的语句名称应该是
    `discovers` 或 `loads`。


    不过，我们只能接受现有的命名。如果你将其理解为：包含 `uses` 语句的模块*使用* `ServiceLoader` 类来为此服务接口加载服务提供者，就能正确理解其含义。除非你的客户端模块需要为服务加载服务提供者，否则无需在客户端模块中使用
    `uses` 语句。客户端模块加载服务的情况并不常见。


    一个模块可以发现并加载多个服务接口。以下模块声明使用了两个 `uses` 语句，表明它将发现并加载 `com.jdojo.PrimeChecker` 和 `com.jdojo.CsvParser`
    类型的服务接口：


    `module com.jdojo.loader {`


    `uses com.jdojo.PrimeChecker;`


    `uses com.jdojo.CsvParser;`


    `// 其他模块语句放在这里`


    `}`


    第 5 章 ■ 实现服务


    模块声明允许使用 `import` 语句。为了提高可读性，你可以将上述模块声明重写如下：


    `// 从其他包导入类型`


    `import com.jdojo.PrimeChecker;`


    `import com.jdojo.CsvParser;`


    `module com.jdojo.loader {`


    `uses PrimeChecker;`


    `uses CsvParser;`


    `// 其他模块语句放在这里`


    `}`


    `uses` 语句中指定的服务接口可以声明在当前模块或其他模块中。如果声明在其他模块中，则该服务接口必须对当前模块中的代码可访问，否则会发生编译时错误。例如，上述声明中
    `uses` 语句使用的 `com.jdojo.CsvParser` 服务接口可以声明在 `com.jdojo.loader` 模块中，也可以声明在其他模块（如
    `com.jdojo.csvutil`）中。如果是后一种情况，`com.jdojo.CsvParser` 接口必须对 `com.jdojo.loader`
    模块可访问。


    服务提供者的发现是在运行时动态进行的。发现服务提供者的模块通常不会（也不需要）声明对服务提供者模块的编译时依赖，因为不可能预先知道所有提供者模块。服务发现模块不声明对服务提供者模块依赖的另一个原因是为了保持服务提供者与服务消费者之间的解耦。


    提供服务实现


    为服务接口提供实现的模块必须包含 `provides` 语句。如果某个模块包含服务提供者，但其声明中没有 `provides` 语句，则该服务提供者将无法通过
    `ServiceLoader` 类加载。也就是说，模块声明中的 `provides` 语句是向 `ServiceLoader` 类传达信息的一种方式：“嘿！我为某个服务提供了实现。当你需要该服务时，可以将我用作提供者。”
    `provides` 语句的语法如下：`provides <服务接口> with <服务实现名称>;`


    其中，`provides` 子句指定服务接口的名称，`with` 子句指定实现服务提供者接口的类名。在 JDK 9 中，服务提供者可以指定一个接口作为服务接口的实现。这听起来可能不正确，但事实确实如此。我会提供一个接口作为服务提供者实现类型的示例。以下模块声明包含两个
    `provides` 语句：


    `module com.jdojo.provider {`


    `provides com.jdojo.PrimeChecker with com.jdojo.impl.PrimeCheckerFactory;`


    `provides com.jdojo.CsvParser with com.jdojo.impl.CsvFastParser;`


    `// 其他模块语句放在这里`


    `}`


    第 5 章 ■ 实现服务


    第一个 `provides` 语句声明 `com.jdojo.impl.PrimeCheckerFactory` 是名为 `com.jdojo.PrimeChecker`
    的服务接口的一种可能实现。第二个 `provides` 语句声明 `com.jdojo.impl.CsvFastParser` 是名为 `com.jdojo.CsvParser`
    的服务接口的一种可能实现。在 JDK 9 之前，`PrimeCheckerFactory` 和 `CsvFastParser` 必须是类。在 JDK 9 中，它们可以是类或接口。


    一个模块可以包含 `uses` 和 `provides` 语句的任意组合——同一个模块可以为某个服务提供实现并发现同一个服务；它可以仅为一种或多种服务提供实现，也可以为一种服务提供实现并发现另一种类型的服务。


    以下模块声明发现并提供了同一服务的实现：`module com.jdojo.parser {`


    `uses com.jdojo.XmlParser;`


    `provides com.jdojo.XmlParser with com.jdojo.xml.impl.XmlParserFactory;`


    `// 其他模块语句放在这里`


    `}`


    为了提高可读性，你可以使用 `import` 语句重写上述模块声明：`import com.jdojo.XmlParser;`


    `import com.jdojo.xml.impl.XmlParserFactory;`


    `module com.jdojo.parser {`


    `uses XmlParser;`


    `provides XmlParser with XmlParserFactory;`


    `// 其他模块语句放在这里`


    `}`


    ■ **提示** `provides` 语句的 `with` 子句中指定的服务实现类/接口必须声明在当前模块中，否则会发生编译时错误。


