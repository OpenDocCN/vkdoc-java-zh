- fmt: "`--add-reads com.jdojo.common=jdk.accessibility`\n\n## The `--permit-illegal-access`\
    \ Option\n\nThe three previously mentioned command-line options to add exports,\
    \ opens, and reads are solely for backwards compatibility. However, using these\
    \ options is tedious when you need “illegal” access (reflective access to rather\
    \ inaccessible members of types in modules) to several modules. The `--permit-illegal-access`\
    \ option is available with the `java` command for such cases. As its name suggests,\
    \ it permits illegal access by code in any unnamed module (code on the class path)\
    \ to members of types in any named modules using deep reflection. Its syntax is\
    \ as follows:\n\n`java --permit-illegal-access <other-options-and-arguments>`\n\
    \nThe `--permit-illegal-access` option does not permit illegal access by code\
    \ in a named module to the members of types in other named modules. In such cases,\
    \ you can combine this option with `--add-exports`, `--add-opens`, and `--add-reads`\
    \ options.\n\n**Tip** The `--permit-illegal-access` option is available in JDK\
    \ 9 and will be removed in JDK 10. Using this option prints warnings on the standard\
    \ error stream. One warning prints a message stipulating this option will be removed\
    \ in the future release. Other warnings report the details of the code that was\
    \ granted the illegal access, the code to which the illegal access was granted,\
    \ and the option that granted the access.\n\nI will present an example of using\
    \ all these options that allow breaking a module’s encapsulation in the next section.\n\
    \n## An Example\n\nLet’s walk through an example of breaking encapsulation. I\
    \ use a trivial example. However, it serves the purpose of demonstrating all concepts\
    \ and command-line options that can be used to break encapsulation.\n\nYou created\
    \ the `com.jdojo.intro` module as your first module. It contains a `Welcome` class\
    \ in the `com.jdojo.intro` package. The module does not export the package, so\
    \ the `Welcome` class is encapsulated and cannot be accessed outside the module.\
    \ In this example, you will call the `main()` method of the `Welcome` class from\
    \ another module named `com.jdojo.intruder`, whose declaration is shown in Listing\
    \ 9-1.\n\nListing 9-2 shows the code for the `TestNonExported` class in this module.\n\
    \n**Listing 9-1.** The Declaration of a Module Named `com.jdojo.intruder`\n\n\
    ```\n// module-info.java\nmodule com.jdojo.intruder {\n    // No module statements\n\
    }\n```\n\n**Listing 9-2.** A Class Named `TestNonExported`\n\n```\n// TestNonExported.java\n\
    package com.jdojo.intruder;\n\nimport com.jdojo.intro.Welcome;\n\npublic class\
    \ TestNonExported {\n    public static void main(String[] args) {\n        Welcome.main(new\
    \ String[]{});\n    }\n}\n```\n\nThe `TestNonExported` class contains only one\
    \ line of code. It calls the static `main()` method of the `Welcome` class passing\
    \ an empty `String` array. If this class is compiled and run, it will print the\
    \ same message that was printed in Chapter 3 when the `Welcome` class was run:\
    \ Welcome to the Module System.\n\nModule Name: `com.jdojo.intro`\n\nIf you try\
    \ compiling the code for the `com.jdojo.intruder` module, you will get an error:\n\
    \n```\nC:\\Java9Revealed>javac --module-path com.jdojo.intro\\dist\n-d com.jdojo.intruder\\\
    build\\classes\ncom.jdojo.intruder\\src\\module-info.java com.jdojo.intruder\\\
    src\\com\\jdojo\\intruder\\\nTestNonExported.java\n\ncom.jdojo.intruder\\src\\\
    com\\jdojo\\intruder\\TestNonExported.java:4: error: package com.\njdojo.intro\
    \ is not visible\nimport com.jdojo.intro.Welcome;\n^\n  (package com.jdojo.intro\
    \ is declared in module com.jdojo.intro, but module com.jdojo.\nintruder does\
    \ not read it)\n1 error\n```\n\nThe command uses the `--module-path` option to\
    \ include the `com.jdojo.intro` module on the module path. The compile-time error\
    \ is pointing to the import statement that imports the `com.jdojo.intro.Welcome`\
    \ class. It states that the package `com.jdojo.intro` is not visible to the `com.jdojo.intruder`\
    \ module."
  raw: '--add-reads com.jdojo.common=jdk.accessibility


    The --permit-illegal-access Option


    The three previously mentioned command-line options to add exports, opens, and
    reads are solely for backwards compatibility. However, using these options is
    tedious when you need “illegal” access (reflective access to rather inaccessible
    members of types in modules) to several modules. The --permit-illegal-access option
    is available with the java command for such cases. As its name suggests, it permits
    illegal access by code in any unnamed module (code on the class path) to members
    of types in any named modules using deep reflection. Its syntax is as follows:


    java --permit-illegal-access <other-options-and-arguments>


    The --permit-illegal-access option does not permit illegal access by code in a
    named module to the members of types in other named modules. In such cases, you
    can combine this option with --add-exports,


    --add-opens, and --add-reads options.


    ChAPtEr 9 ■ BrEAkIng ModulE EnCAPsulAtIon


    ■ **Tip** the


    --permit-illegal-access option is available in Jdk 9 and will be removed in Jdk
    10\. using


    this option prints warnings on the standard error stream. one warning prints a
    message stipulating this option will be removed in the future release. other warnings
    report the details of the code that was granted the illegal access, the code to
    which the illegal access was granted, and the option that granted the access.


    I will present an example of using all these options that allow breaking a module’s
    encapsulation in the next section.


    An Example


    Let’s walk through an example of breaking encapsulation. I use a trivial example.
    However, it serves the purpose of demonstrating all concepts and command-line
    options that can be used to break encapsulation.


    You created the com.jdojo.intro module as your first module. It contains a Welcome
    class in the com.jdojo.intro package. The module does not export the package,
    so the Welcome class is encapsulated and cannot be accessed outside the module.
    In this example, you will call the main() method of the Welcome class from another
    module named com.jdojo.intruder, whose declaration is shown in Listin[g 9-1.](#index_split_003.html#220)


    Listing [9-2](#index_split_003.html#220) shows the code for the TestNonExported
    class in this module.


    ***Listing 9-1.*** The Declaration of a Module Named com.jdojo.intruder


    // module-info.java


    module com.jdojo.intruder {


    // No module statements


    }


    ***Listing 9-2.*** A Class Named TestNonExported


    // TestNonExported.java


    package com.jdojo.intruder;


    import com.jdojo.intro.Welcome;


    public class TestNonExported {


    public static void main(String[] args) {


    Welcome.main(new String[]{});


    }


    }


    The TestNonExported class contains only one line of code. It calls the static
    main() method of the Welcome class passing an empty String array. If this class
    is compiled and run, it will print the same message that was printed in Chapter
    [3](http://dx.doi.org/10.1007/978-1-4842-2592-9_3) when the Welcome class was
    run: Welcome to the Module System.


    Module Name: com.jdojo.intro


    ChAPtEr 9 ■ BrEAkIng ModulE EnCAPsulAtIon


    If you try compiling the code for the com.jdojo.intruder module, you will get
    an error:


    C:\Java9Revealed>javac --module-path com.jdojo.intro\dist


    -d com.jdojo.intruder\build\classes


    com.jdojo.intruder\src\module-info.java com.jdojo.intruder\src\com\jdojo\intruder\


    TestNonExported.java


    com.jdojo.intruder\src\com\jdojo\intruder\TestNonExported.java:4: error: package
    com.


    jdojo.intro is not visible


    import com.jdojo.intro.Welcome;


    ^


    (package com.jdojo.intro is declared in module com.jdojo.intro, but module com.jdojo.


    intruder does not read it)


    1 error


    The command uses the --module-path option to include the com.jdojo.intro module
    on the module path. The compile-time error is pointing to the import statement
    that imports the com.jdojo.intro.


    Welcome class. It states that the package com.jdojo.intro is not visible to the
    com.jdojo.intruder module.'
  trans: '

    --add-reads com.jdojo.common=jdk.accessibility


    --permit-illegal-access 选项


    前面提到的三个用于添加导出、开放和读取的命令行选项，纯粹是为了向后兼容。然而，当你需要对多个模块进行“非法”访问（即通过反射访问模块中类型中相当难以访问的成员）时，使用这些选项会非常繁琐。针对这种情况，`java`
    命令提供了 `--permit-illegal-access` 选项。顾名思义，它允许任何未命名模块（类路径上的代码）中的代码，通过深度反射，对任何命名模块中的类型成员进行非法访问。其语法如下：


    java --permit-illegal-access <其他选项和参数>


    `--permit-illegal-access` 选项不允许命名模块中的代码对其他命名模块中的类型成员进行非法访问。在这种情况下，你可以将此选项与 `--add-exports`、`--add-opens`
    和 `--add-reads` 选项结合使用。


    第 9 章 ■ 打破模块封装


    ■ **提示** `--permit-illegal-access` 选项在 JDK 9 中可用，并将在 JDK 10 中移除。使用此选项会在标准错误流上打印警告。一条警告会打印一条消息，说明此选项将在未来版本中移除。其他警告会报告被授予非法访问权限的代码的详细信息、被授予非法访问权限的代码，以及授予该访问权限的选项。


    我将在下一节中提供一个示例，演示如何使用所有这些允许打破模块封装的选项。


    一个示例


    让我们通过一个示例来了解如何打破封装。我使用一个简单的示例。然而，它足以演示所有可用于打破封装的概念和命令行选项。


    你创建了 `com.jdojo.intro` 模块作为你的第一个模块。它在 `com.jdojo.intro` 包中包含一个 `Welcome` 类。该模块没有导出该包，因此
    `Welcome` 类是被封装的，无法在模块外部访问。在此示例中，你将从一个名为 `com.jdojo.intruder` 的模块中调用 `Welcome`
    类的 `main()` 方法，该模块的声明如清单 9-1 所示。


    清单 9-2 显示了此模块中 `TestNonExported` 类的代码。


    ***清单 9-1.*** 名为 com.jdojo.intruder 的模块的声明


    // module-info.java


    module com.jdojo.intruder {


    // 无模块语句


    }


    ***清单 9-2.*** 名为 TestNonExported 的类


    // TestNonExported.java


    package com.jdojo.intruder;


    import com.jdojo.intro.Welcome;


    public class TestNonExported {


    public static void main(String[] args) {


    Welcome.main(new String[]{});


    }


    }


    `TestNonExported` 类只包含一行代码。它调用 `Welcome` 类的静态 `main()` 方法，并传递一个空的 `String` 数组。如果编译并运行此类，它将打印与第
    [3](http://dx.doi.org/10.1007/978-1-4842-2592-9_3) 章中运行 `Welcome` 类时相同的消息：欢迎使用模块系统。


    模块名称：com.jdojo.intro


    第 9 章 ■ 打破模块封装


    如果你尝试编译 `com.jdojo.intruder` 模块的代码，将会收到一个错误：


    C:\Java9Revealed>javac --module-path com.jdojo.intro\dist


    -d com.jdojo.intruder\build\classes


    com.jdojo.intruder\src\module-info.java com.jdojo.intruder\src\com\jdojo\intruder\


    TestNonExported.java


    com.jdojo.intruder\src\com\jdojo\intruder\TestNonExported.java:4: 错误：包 com.


    jdojo.intro 不可见


    import com.jdojo.intro.Welcome;


    ^


    （包 com.jdojo.intro 在模块 com.jdojo.intro 中声明，但模块 com.jdojo.


    intruder 未读取它）


    1 个错误


    该命令使用 `--module-path` 选项将 `com.jdojo.intro` 模块包含在模块路径中。编译时错误指向导入 `com.jdojo.intro.Welcome`
    类的 import 语句。它指出包 `com.jdojo.intro` 对 `com.jdojo.intruder` 模块不可见。

