    ### Changes to the ClassLoader Class


    JDK 9 added the following constructor and methods to the `java.lang.ClassLoader`
    class:


    - `protected ClassLoader(String name, ClassLoader parent)`

    - `public String getName()`

    - `protected Class<?> findClass(String moduleName, String name)`

    - `protected URL findResource(String moduleName, String name) throws IOException`

    - `public Stream<URL> resources(String name)`

    - `public final boolean isRegisteredAsParallelCapable()`

    - `public final Module getUnnamedModule()`

    - `public static ClassLoader getPlatformClassLoader()`

    - `public final Package getDefinedPackage(String name)`

    - `public final Package[] getDefinedPackages()`


    These methods have intuitive names. I do not discuss all these methods in this
    section. Refer to the API documentation for the description of these methods.
    The protected constructor and methods are meant for developers creating new class
    loaders.


    A class loader can have an optional name, which you can get using the `getName()`
    method. The method returns `null` when class loader does not have a name. The
    Java runtime will include the class loader names, if present, in the stack trace
    and exception messages. This will be helpful in debugging.


    The `resources()` method returns a stream of URLs of all resources found with
    the specific resource name.


    Every class loader contains an unnamed module that contains all types loaded by
    this class loader from the class path. The `getUnnamedModule()` method returns
    the reference of the unnamed module of the class loader.


    The static `getPlatformClassLoader()` method returns the reference of the platform
    class loader.


