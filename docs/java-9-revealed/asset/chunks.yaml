- fmt: "Using an anonymous class:\n\nCaller Class: `com.jdojo.stackwalker.CallerClassTest2$1`\n\
    \nUsing a lambda expression:\n\nCaller Class: `com.jdojo.stackwalker.CallerClassTest2`\n\
    \nThe `main()` method of the `CallerClassTest2` class calls the four methods of\
    \ the `CallerClassTest` class.\n\nThe caller class is `CallerClassTest2` when\
    \ the `CallerClassTest.m3()` is called from the `CallerClassTest2` class directly.\
    \ When you call the `CallerClassTest.main()` method from the `CallerClassTest2`\
    \ class, there is a caller frame and the caller class is the `CallerClassTest2`\
    \ class. Compare this with the output of the previous example when you ran the\
    \ `CallerClassTest` class. At that time, the `CallerClassTest.main()` method was\
    \ called from the JVM and you were not able to get a caller class inside the `CallerClassTest.main()`\
    \ method because there was no caller frame. In the end, `CallerClassTest.m3()`\
    \ method is called from an anonymous class and a lambda expression. The anonymous\
    \ class is reported as the caller class. In case of the lambda expression, its\
    \ enclosing class is reported as the caller class.\n\n## Stack-Walking Permissions\n\
    \nWhen a Java security manager is present and you configure a `StackWalker` with\
    \ the `RETAIN_CLASS_REFERENCE` option, a permission check is performed to make\
    \ sure that the codebase is granted a `java.lang.StackFramePermission` with a\
    \ value of `retainClassReference`. A `SecurityException` is thrown if the permission\
    \ is not granted. The permission check is performed at the time the `StackWalker`\
    \ instance is created, not when the stack walking is performed.\n\nListing 16-6\
    \ contains the code for the `StackWalkerPermissionCheck` class. Its `printStackFrames()`\
    \ method creates a `StackWalker` instance with the `RETAIN_CLASS_REFERENCE` option.\
    \ The `main()` method calls this method, which prints the stack trace without\
    \ any problems, assuming that no security manager is present. A security manager\
    \ is installed and the `printStackFrames()` method is called again. This time,\
    \ a `SecurityException` is thrown, which is indicated in the output.\n\n**Listing\
    \ 16-6.** Creating a `StackWalker` to Retain Class References When a Java Security\
    \ Manager Is Present\n\n```java\n// StackWalkerPermissionCheck.java\npackage com.jdojo.stackwalker;\n\
    \nimport static java.lang.StackWalker.Option.RETAIN_CLASS_REFERENCE;\n\npublic\
    \ class StackWalkerPermissionCheck {\n\n    public static void main(String[] args)\
    \ {\n        System.out.println(\"Before installing security manager:\");\n  \
    \      printStackFrames();\n\n        SecurityManager sm = System.getSecurityManager();\n\
    \        if (sm == null) {\n            sm = new SecurityManager();\n        \
    \    System.setSecurityManager(sm);\n        }\n\n        System.out.println(\n\
    \            \"\\nAfter installing security manager:\");\n        printStackFrames();\n\
    \    }\n\n    public static void printStackFrames() {\n        try {\n       \
    \     StackWalker.getInstance(RETAIN_CLASS_REFERENCE)\n                .forEach(System.out::println);\n\
    \        } catch(SecurityException e){\n            System.out.println(\"Could\
    \ not create a \" +\n                \"StackWalker. Error: \" + e.getMessage());\n\
    \        }\n    }\n}\n```\n\nBefore installing security manager:\n\n```\ncom.jdojo.stackwalker/com.jdojo.stackwalker.StackWalkerPermissionCheck.printStackFrames(StackWalkerPermissionCheck.java:24)\n\
    com.jdojo.stackwalker/com.jdojo.stackwalker.StackWalkerPermissionCheck.main(StackWalkerPermissionCheck.java:9)\n\
    ```\n\nAfter installing security manager:\n\n```\nCould not create a StackWalker.\
    \ Error: access denied (\"java.lang.StackFramePermission\" \"retainClassReference\"\
    )\n```\n\nListing 16-7 shows you how to grant the required permission to create\
    \ a `StackWalker` with the `RETAIN_CLASS_REFERENCE` option. The permission is\
    \ granted to all codebases. You need to add this permission block to the end of\
    \ the `java.policy` file located in the `JAVA_HOME\\conf\\security` directory\
    \ on your machine.\n\n**Listing 16-7.** Granting `java.lang.StackFramePermission`\
    \ with a `\"retainClassReference\"` Value\n\n```\ngrant {\n    permission java.lang.StackFramePermission\
    \ \"retainClassReference\";\n};\n```\n\nWhen you run the class in Listing 16-6\
    \ with the permission granted in Listing 16-7, you should receive the following\
    \ output:\n\nBefore installing security manager:\n\n```\ncom.jdojo.stackwalker/com.jdojo.stackwalker.StackWalkerPermissionCheck.printStackFrames(StackWalkerPermissionCheck.java:24)\n\
    com.jdojo.stackwalker/com.jdojo.stackwalker.StackWalkerPermissionCheck.main(StackWalkerPermissionCheck.java:9)\n\
    ```\n\nAfter installing security manager:\n\n```\ncom.jdojo.stackwalker/com.jdojo.stackwalker.StackWalkerPermissionCheck.printStackFrames(StackWalkerPermissionCheck.java:24)\n\
    com.jdojo.stackwalker/com.jdojo.stackwalker.StackWalkerPermissionCheck.main(StackWalkerPermissionCheck.java:18)\n\
    ```\n\n## Summary\n\nEach thread in a JVM has a *private* JVM stack that is created\
    \ at the same time the thread is created. A stack stores frames. A frame on a\
    \ JVM stack represents a Java method invocation in a given thread. A new frame\
    \ is created and pushed to the top of the stack each time a method is invoked.\
    \ A frame is destroyed (popped out of stack) when the method invocation completes.\
    \ In a given thread, only one frame is active at any point.\n\nThe active frame\
    \ is known as the *current frame* and its method is known as the *current method*.\
    \ The class that defines the current method is known as the *current class*.\n\
    \nBefore JDK 9, it was possible to walk through all frames in a thread’s stack\
    \ using the following classes: `Throwable`, `Thread`, and `StackTraceElement`.\
    \ An instance of the `StackTraceElement` class represents a stack frame. The `getStrackTrace()`\
    \ method of the `Throwable` class returns a `StackTraceElement[]` that contains\
    \ the frames of the current thread’s stack. The `getStrackTrace()` method of the\
    \ `Thread` class returns a `StackTraceElement[]` that contains the frames of the\
    \ thread’s stack. The first element of the array is the top frame in the stack,\
    \ which represents the last method invocation in the sequence. Some implementation\
