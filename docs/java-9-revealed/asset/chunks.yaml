    ## 总结


    如果一个模块需要使用另一个模块中包含的公共类型，则第二个模块必须导出包含这些类型的包，并且第一个模块需要读取第二个模块。


    一个模块使用`exports`语句导出其包。一个模块可以仅向特定模块导出其包。导出包中的公共类型在编译时和运行时对其他模块可用。导出的包不允许对公共类型的非公共成员进行深度反射。


    如果一个模块希望允许其他模块使用反射访问所有类型的成员（公共和非公共），则该模块必须声明为开放模块，或者该模块可以使用`opens`语句有选择地开放包。从开放包访问类型的模块不需要读取包含这些开放包的模块。


    一个模块使用`requires`语句声明对另一个模块的依赖。这种依赖可以使用`transitive`修饰符声明为传递性依赖。如果模块M声明了对模块N的传递性依赖，则任何声明对模块M依赖的模块都隐式声明了对模块N的依赖。


    依赖可以在编译时声明为强制性的，但在运行时使用`requires`语句中的`static`修饰符声明为可选的。依赖可以同时是运行时可选和传递性的。


    JDK 9中的模块系统改变了公共类型的含义。在模块中定义的公共类型可能属于以下三类之一：仅在定义模块内公共、仅对特定模块公共、或对所有人公共。


    ## 第四章：模块依赖


    根据模块的声明方式以及它是否有名称，存在几种类型的模块。


    根据模块是否有名称，模块可以是*命名模块*或*未命名模块*。当模块有名称时，该名称可以在模块声明中显式给出，也可以自动（或隐式）生成。如果名称在模块声明中显式给出，则称为*显式模块*。如果名称由模块系统通过读取模块路径上的JAR文件名生成，则称为*自动模块*。如果你声明一个模块而不使用`open`修饰符，则称为*普通模块*。如果你使用`open`修饰符声明一个模块，则称为*开放模块*。基于这些定义，开放模块也是显式模块和命名模块。自动模块是命名模块，因为它有一个自动生成的名称，但它不是显式模块，因为它是由模块系统在编译时和运行时隐式声明的。


    当你将一个JAR（不是模块JAR）放在模块路径上时，该JAR代表一个自动模块，其名称源自JAR文件名。自动模块读取所有其他模块，并且其所有包都被导出和开放。


    在JDK 9中，类加载器可以从模块或类路径加载类。每个类加载器维护一个名为未命名模块的模块，该模块包含它从类路径加载的所有类型。未命名模块读取每个其他模块。它将其所有包导出并开放给所有其他模块。未命名模块没有名称，因此显式模块不能声明对未命名模块的编译时依赖。如果显式模块需要访问未命名模块中的类型，则前者可以使用自动模块作为桥梁或使用反射。


    你可以使用`javap`工具打印模块声明或属性。使用该工具的`-verbose`（或`-v`）选项打印模块描述符的类属性。JDK 9以特殊格式存储运行时映像。JDK
    9引入了一种名为`jrt`的新文件方案，你可以使用它来访问运行时映像的内容。其语法为`jrt:/<module>/<path-to-a-file>`。


    ## 第五章：实现服务


    在本章中，你将学习：


    *   什么是服务、服务接口和服务提供者

    *   如何在JDK 9和JDK 9之前实现服务

    *   如何使用Java接口作为服务实现

    *   如何使用`ServiceLoader`类加载服务提供者

    *   如何在模块声明中使用`uses`语句来指定当前模块使用`ServiceLoader`类加载的服务接口

    *   如何使用`provides`语句来指定当前模块为服务接口提供的服务提供者

    *   如何在不实例化服务提供者的情况下，根据其类发现、过滤和选择服务提供者

    *   如何在JDK 9之前打包服务提供者


    ### 什么是服务？


    由应用程序（或库）提供的特定功能称为*服务*。例如，你可以有不同的库提供*素数服务*，该服务可以检查一个数字是否为素数，并在给定数字之后生成下一个素数。为服务提供实现的应用程序和库称为*服务提供者*。使用服务的应用程序称为*服务消费者*或*客户端*。


    客户端如何使用服务？客户端是否知道所有服务提供者？客户端是否可以在不知道任何服务提供者的情况下获得服务？我将在本章中回答这些问题。


    Java SE 6提供了一种机制，允许服务提供者和服务消费者之间松散耦合。也就是说，服务消费者可以使用服务提供者提供的服务，而无需知道服务提供者。


    在Java中，*服务*由一组接口和类定义。服务包含一个接口或抽象类，它定义了服务提供的功能，称为*服务提供者接口*或简称为*服务接口*。请注意，“服务提供者接口”或“服务接口”中的“接口”一词并不指Java中的接口构造。它可以是一个Java接口或一个抽象类。使用具体类作为服务接口是可能的，但不推荐。有时，服务接口也称为*服务类型*——用于标识服务的类型。


    *服务*的特定实现称为*服务提供者*。一个服务提供者接口可以有多个服务提供者。通常，一个服务提供者由多个接口和类组成，为服务接口提供实现。


