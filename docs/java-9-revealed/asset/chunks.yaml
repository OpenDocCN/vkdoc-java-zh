    Major=9, Minor=0, Security=0, Additional Version=, Pre=, Build=, Optional=123\n\
    \nVersion String=9.0.1-ea+132-2016-08-22.10.56.45am\nMajor=9, Minor=0, Security=1,\
    \ Additional Version=, Pre=ea, Build=132, Optional=2016-08-22.10.56.45am\n```\n\
    \n# Changes to the JDK and JRE\n\nThe JDK and JRE have been modularized in Java\
    \ SE 9. That warranted a few changes to their structures. A few other changes\
    \ were made to improve performance, security, and maintainability. Most of these\
    \ changes affect library developers and IDE developers rather than application\
    \ developers. For the sake of discussing these changes, I put them into three\
    \ broad categories:\n\n- Layout changes\n- Behavioral changes\n- API changes\n\
    \nThe following sections describe these changes in detail.\n\n## Layout Changes\
    \ in JDK and JRE\n\nStructural changes affect the way directories and files in\
    \ runtime images are organized and affect their contents. Before Java SE 9, the\
    \ JDK build system used to produce two types of runtime images—a Java Runtime\
    \ Environment (JRE) and a Java Development Kit (JDK). The JRE was a complete implementation\
    \ of the Java SE platform and the JDK had an embedded JRE and development tools\
    \ and libraries. You could install only JRE or the JDK, which had an embedded\
    \ JRE. Figure 8-1 shows the main directories in the JDK installation prior to\
    \ Java SE 9. The `JDK_HOME` is the directory in which the JDK was installed. If\
    \ you installed JRE only, you had directories only under the `jre` directory.\n\
    \n```\nJDK_HOME\n├── bin\n├── include\n├── jre\n│   ├── bin\n│   └── lib\n└──\
    \ lib\n```\n\n***Figure 8-1.** JDK and JRE directory arrangements before Java\
    \ SE 9*\n\nIn the JDK, prior to Java SE 9:\n\n- The `bin` directory used to contain\
    \ command-line development and debugging tools such as `javac`, `jar`, and `javadoc`.\
    \ It also used to contain the `java` command to launch Java applications.\n- The\
    \ `include` directory contained C/C++ header files to be used while compiling\
    \ native code.\n- The `lib` directory contained several JARs and other types of\
    \ files for the JDK’s tools. It had a `tools.jar` file, which contained the Java\
    \ classes for the `javac` compiler.\n- The `jre\\bin` directory contained essential\
    \ commands such as the `java` command. On the Windows platform, it contained the\
    \ system’s runtime dynamically linked libraries (DLLs).\n- The `jre\\lib` directory\
    \ contained user-editable configuration files such as `.properties` and `.policy`\
    \ files.\n- The `jre\\lib\\endorsed` directory contained JARs that allowed the\
    \ Endorsed Standards Override Mechanism. This allowed the later versions of classes\
    \ and interfaces that implement Endorsed Standards or Standalone Technology, which\
    \ are created outside the Java Community Process, to be incorporated into the\
    \ Java platform. These JARs were prepended to the JVM’s bootstrap class path,\
    \ thus overriding any definition of these classes and interfaces present in the\
    \ Java runtime.\n- The `jre\\lib\\ext` directory contained JARs that allowed the\
    \ extension mechanism. This mechanism loaded all JARs in this directory by an\
    \ extension class loader, which is the child of the bootstrap class loader and\
    \ parent of the system class loader, which loads all application classes. By placing\
    \ JARs in this directory, you can extend the Java SE platform. The contents of\
    \ these JARs are visible to all applications that compile or run on this runtime\
    \ image.\n- The `jre\\lib` directory contained several JARs. The `rt.jar` file\
    \ contained the Java classes and resource files for the runtime. Many tools depended\
    \ on the location of the `rt.jar` file.\n- The `jre\\lib` directory contained\
    \ dynamically linked native libraries for non-Windows platforms.\n- The `jre\\\
    lib` directory contained several other sub-directories, which contained runtime\
    \ files such as fonts and images."
