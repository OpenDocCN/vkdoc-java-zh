- fmt: "# The Underscore Is a Keyword\n\nIn JDK 9, the underscore (`_`) is a keyword\
    \ and you cannot use it by itself as a one-character identifier such as a variable\
    \ name, a method name, a type name, etc. However, you can still use the underscore\
    \ in a multi-character identifier name. Consider the program in Listing [20-2](#index_split_007.html#474).\n\
    \n***Listing 20-2.*** A Program That Uses an Underscore as an Identifier\n\n```\n\
    // UnderscoreTest.java\npackage com.jdojo.misc;\n\npublic class UnderscoreTest\
    \ {\n    public static void main(String[] args) {\n        // Use an underscore\
    \ as an identifier. It is a compile-time warning in JDK 8 and a\n        // compile-time\
    \ error in JDK 9.\n        int _ = 19;\n        System.out.println(_);\n\n   \
    \     // Use an underscore in multi-character identifiers. They are fine in JDK\
    \ 8 and JDK 9.\n        final int FINGER_COUNT = 20;\n        final String _prefix\
    \ = \"Sha\";\n    }\n}\n```\n\nCompiling the `UnderscoreTest` class in JDK 8 generates\
    \ two warnings for using an underscore as an identifier by itself—one for the\
    \ variable declaration and one for its use in the `System.out.println()` method\
    \ call. A warning is generated for every use of the underscore by itself. JDK\
    \ 8 generates the following two warnings:\n\n```\ncom.jdojo.misc\\src\\com\\jdojo\\\
    misc\\UnderscoreTest.java:8: warning: '_' used as an identifier\nint _ = 19;\n\
    ^\n(use of '_' as an identifier might not be supported in releases after Java\
    \ SE 8)\ncom.jdojo.misc\\src\\com\\jdojo\\misc\\UnderscoreTest.java:9: warning:\
    \ '_' used as an identifier\nSystem.out.println(_);\n^\n(use of '_' as an identifier\
    \ might not be supported in releases after Java SE 8)\n2 warnings\n```\n\nCompiling\
    \ the `UnderscoreTest` class in JDK 9 generates the following two compile-time\
    \ errors:\n\n```\ncom.jdojo.misc\\src\\com\\jdojo\\misc\\UnderscoreTest.java:8:\
    \ error: as of release 9, '_' is a\nkeyword, and may not be used as an identifier\n\
    int _ = 19;\n^\ncom.jdojo.misc\\src\\com\\jdojo\\misc\\UnderscoreTest.java:9:\
    \ error: as of release 9, '_' is a\nkeyword, and may not be used as an identifier\n\
    System.out.println(_);\n^\n2 errors\n```\n\nWhat is the special meaning of an\
    \ underscore in JDK 9 and where do you use it? In JDK 9, you have been restricted\
    \ not to use it as an identifier. JDK designers intend to give it a special meaning\
    \ in a future JDK release. So, wait until JDK 10 or 11 to see it in action as\
    \ a keyword with a special meaning. Comment these lines in the source code or\
    \ the entire class code, so you can compile the entire NetBeans project without\
    \ errors. If the source is commented, you will need to uncomment it to see these\
    \ errors.\n\n# Improved try-with-resources Blocks\n\nJDK 7 added an `AutoCloseable`\
    \ interface to the `java.lang` package:\n\n```\npublic interface AutoCloseable\
    \ {\n    void close() throws Exception;\n}\n```\n\nJDK 7 also added a new block\
    \ called try-with-resources, which can be used to manage `AutoCloseable` objects\
    \ (or resources) using the following steps:\n\n- You assign the reference of the\
    \ resource to a *newly declared* variable at the beginning of the block.\n- You\
    \ work with the resource in the body of the block.\n- When the body of the block\
    \ is exited, the `close()` method on the variable representing the resource will\
    \ be called automatically for you.\n\nThis avoided boilerplate code written using\
    \ a `finally` block before JDK 7. The following snippet of code shows how developers\
    \ used to manage a closeable resource, assuming that a `Resource` class exists\
    \ that implements the `AutoCloseable` interface:\n\n```\n/* Prior to JDK 7 */\n\
    Resource res = null;\ntry {\n    // Create the resource\n    res = new Resource();\n\
    \    // Work with res here\n} finally {\n    try {\n        if (res != null) {\n\
    \            res.close();\n        }\n    } catch (Exception e) {\n        e.printStackTrace();\n\
    \    }\n}\n```\n\nThe try-with-resources in JDK 7 greatly improved this situation.\
    \ In JDK 7, you could rewrite the previous snippet of code as follows:\n\n```\n\
    try (Resource res = new Resource()) {\n    // Work with res here\n}\n```"
