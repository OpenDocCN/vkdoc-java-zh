    BUILD_TYPE="commercial"


    Java SE 9 扁平化了 JDK 的目录层次结构，并消除了 JDK 和 JRE 之间的区别。图 8-2 展示了 Java SE 9 中 JDK 安装的目录。JDK
    9 中的 JRE 安装不包含 include 和 jmods 目录。


    JDK_HOME


    bin


    conf


    include


    jmods


    legal


    lib


