- fmt: "# The JShell API\n\nThe `JShell` API gives you programmatic access to the\
    \ snippet evaluation engine. As a developer, you may not use this API. It is meant\
    \ to be used by tools such as the NetBeans IDE that may include a UI equivalent\
    \ of the `JShell` command-line tool to let developers evaluate snippets of code\
    \ from inside the IDE instead of opening a command prompt to do the same. In this\
    \ section, I briefly introduce the `JShell` API and show its use with a simple\
    \ example.\n\nThe `JShell` API is in the `jdk.jshell` module and the `jdk.jshell`\
    \ package. Note that if you are using the `JShell` API, your module will need\
    \ to read the `jdk.jshell` module. The `JShell` API is simple. It consists mainly\
    \ of three abstract classes and one interface:\n\n- `JShell`\n- `Snippet`\n- `SnippetEvent`\n\
    - `SourceCodeAnalysis`\n\nAn instance of the `JShell` class represents a snippet\
    \ evaluation engine. This is the main class in the `JShell` API. A `JShell` instance\
    \ maintains the state of all snippets as they are executed.\n\nA snippet is represented\
    \ by an instance of the `Snippet` class. A `JShell` instance generates snippet\
    \ events as it executes snippets.\n\nA snippet event is represented by an instance\
    \ of the `SnippetEvent` interface. A snippet event contains the current and previous\
    \ statuses of snippets, the value of the snippet for a result bearing snippet,\
    \ the source code of the snippet that caused the event, an `Exception` object\
    \ if an exception occurred during the snippet execution, etc.\n\nAn instance of\
    \ the `SourceCodeAnalysis` class provides source code analysis and suggestion\
    \ features for a snippet. It answers questions like the following:\n\n- Is it\
    \ a complete snippet?\n- Can this snippet be completed by appending a semicolon?\n\
    \nA `SourceCodeAnalysis` instance also provides a list of suggestions, for example,\
    \ for Tab completion and accessing the documentation. This class is meant to be\
    \ used by a tool providing the `JShell` functionality.\n\nI do not discuss it\
    \ any further. Refer to the Javadoc of this class if you are interested in exploring\
    \ it further.\n\nFigure 11-5 shows the use-case diagram for the different components\
    \ of the `JShell` API. In subsequent sections, I explain these classes and their\
    \ uses. I show you a complete example in the last section.\n\n**Figure 11-5.**\
    \ A use-case diagram for the components of the `JShell` API\n\n## Creating a `JShell`\n\
    \nThe `JShell` class is abstract. It provides two ways to create its instances:\n\
    \n- Using its static `create()` method\n- Using a static builder class named `JShell.Builder`\n\
    \nThe `create()` method returns a preconfigured `JShell` instance. The following\
    \ snippet of code shows how to create a `JShell` using the `create()` method:\n\
    \n```java\n// Create a JShell instance\nJShell shell = JShell.create()\n```\n\n\
    The `JShell.Builder` class lets you configure the `JShell` instance by letting\
    \ you specify a snippet ID generator, a temporary variable name generator, a print\
    \ stream for printing the output, an input stream to read snippets, and an error\
    \ output stream to log errors. You can obtain an instance of the `JShell.Builder`\
    \ class using the `builder()` static method of the `JShell` class. The following\
    \ snippet of code shows how to use the `JShell.Builder` class to create a `JShell`,\
    \ where `myXXXStream` in the code are references to your stream objects:\n\n```java\n\
    // Create a JShell instance\nJShell shell = JShell.builder()\n    .in(myInputStream)\n\
    \    .out(myOutputStream)\n    .err(myErrorStream)\n    .build();\n```\n\nOnce\
    \ you have a `JShell` instance, you can start evaluating snippets using its `eval(String\
    \ snippet)` method. You can drop a snippet using its `drop(PersistentSnippet snippet)`\
    \ method. You can append a path to the class path using its `addToClasspath(String\
    \ path)` method. These three methods change the state of the `JShell` instance.\n\
    \n> **Tip:** When you are done using a `JShell`, you need to call its `close()`\
    \ method to free resources. The `JShell` class implements the `AutoCloseable`\
    \ interface, and therefore, using a `try-with-resources` block to work with a\
    \ `JShell` is the best way to ensure that it is closed when it is no longer in\
    \ use. A `JShell` is mutable and not thread-safe.\n\nYou can register snippet\
    \ event handlers and `JShell` shutdown event handlers using the `onSnippetEvent(Consumer<SnippetEvent>\
    \ listener)` and `onShutdown(Consumer<JShell> listener)` methods of the `JShell`\
    \ class. A snippet event is fired when the status of a snippet changes because\
    \ it is evaluated the first time or its status is updated because of evaluation\
    \ of another snippet.\n\nThe `sourceCodeAnalysis()` method in the `JShell` class\
    \ returns an instance of the `SourceCodeAnalysis` class, which you can use for\
    \ code-assist functionality.\n\nOther methods in the `JShell` class are used to\
    \ query the state. For example, the `snippets()`, `types()`, `methods()`, and\
    \ `variables()` methods return a list of all snippets, all snippets with active\
    \ type declarations, snippets with active method declarations, and snippets with\
    \ active variable declarations, respectively.\n\nThe `eval()` method is the most\
    \ frequently used method in the `JShell` class. It evaluates/executes the specified\
    \ snippet and returns a `List<SnippetEvent>`. You can query the snippet events\
    \ in the list for the state of execution. The following is a sample snippet of\
    \ code that uses the `eval()` method:\n\n```java\nString snippet = \"int x = 100;\"\
    ;\n\n// Evaluate the snippet\nList<SnippetEvent> events = shell.eval(snippet);\n\
    \n// Process the results\nevents.forEach((SnippetEvent se) -> {\n    /* Handle\
    \ the snippet event here */\n});\n```\n\n## Working with Snippets\n\nAn instance\
    \ of the `Snippet` class represents a snippet. The class does not provide a way\
    \ to create its objects. You supply snippets to a `JShell` as strings and you\
    \ receive instances of the `Snippet` class as part of the snippet events. Snippet\
    \ events also provide you with the previous and current statuses of a snippet.\
    \ If you have a `Snippet` object, you can query its current status using the `status(Snippet\
    \ s)` method of the `JShell` class, which returns a `Snippet.Status`.\n\n> **Tip:**\
    \ The `Snippet` class is immutable and thread-safe.\n\nThere are several types\
    \ of snippets in Java, for example, a variable declaration, a variable declaration\
    \ with initialization, a method declaration, a type declaration, etc. The `Snippet`\
    \ class is an abstract class and there is a subclass to represent each specific\
    \ type of snippet. The following list shows the inheritance hierarchy of classes\
    \ representing different types of snippets:\n\n- `Snippet`\n  - `ErroneousSnippet`\n\
    \  - `ExpressionSnippet`\n  - `StatementSnippet`\n  - `PersistentSnippet`\n  \
    \  - `ImportSnippet`\n    - `DeclarationSnippet`\n      - `MethodSnippet`\n  \
    \    - `TypeDeclSnippet`\n      - `VarSnippet`\n\nThe name of the subclasses of\
    \ the `Snippet` class are intuitive. For example, an instance of the `PersistentSnippet`\
    \ represents a snippet that is stored in a `JShell` and can be reused such as\
    \ a class declaration or a method declaration. The `Snippet` class contains the\
    \ following methods:\n\n- `String id()`\n- `String source()`\n- `Snippet.Kind\
    \ kind()`\n- `Snippet.SubKind subKind()`\n\nThe `id()` method returns a unique\
    \ ID of the snippet and the `source()` method returns its source code. The `kind()`\
    \ and `subKind()` methods return the type and sub-type of a snippet.\n\nThe type\
    \ of a snippet is one of the constants of the `Snippet.Kind` enum, for example,\
    \ `IMPORT`, `TYPE_DECL`, `METHOD`, `VAR`, etc. The sub-type of a snippet provides\
    \ more specific information about its type, for example, if a snippet is a type\
    \ declaration, its sub-type will tell you if it is a class, interface, enum, or\
    \ annotation declaration. The sub-type of a snippet is one of the constants of\
    \ the `Snippet.SubKind` enum such as `CLASS_SUBKIND`, `ENUM_SUBKIND`, etc. The\
    \ `Snippet.Kind` enum contains an `isPersistent` property whose value is `true`\
    \ if the snippet of this kind is persistent and `false` otherwise."
  raw: 'The JShell API gives you programmatic access to the snippet evaluation engine.
    As a developer, you may not use this API. It is meant to be used by tools such
    as the NetBeans IDE that may include a UI equivalent of the JShell command-line
    tool to let developers evaluate snippets of code from inside the IDE instead of
    opening a command prompt to do the same. In this section, I briefly introduce
    the JShell API and show its use with a simple example.


    The JShell API is in the jdk.jshell module and the jdk.jshell package. Note that
    if you are using the JShell API, your module will need to read the jdk.jshell
    module. The JShell API is simple. It consists mainly of three abstract classes
    and one interface:


    • JShell


    • Snippet


    • SnippetEvent


    • SourceCodeAnalysis


    An instance of the JShell class represents a snippet evaluation engine. This is
    the main class in the JShell API. A JShell instance maintains the state of all
    snippets as they are executed.


    A snippet is represented by an instance of the Snippet class. A JShell instance
    generates snippet events as it executes snippets.


    A snippet event is represented by an instance of the SnippetEvent interface. A
    snippet event contains the current and previous statuses of snippets, the value
    of the snippet for a result bearing snippet, the source code of the snippet that
    caused the event, an Exception object if an exception occurred during the snippet
    execution, etc.


    An instance of the SourceCodeAnalysis class provides source code analysis and
    suggestion features for a snippet. It answers questions like the following:


    • Is it a complete snippet?


    • Can this snippet be completed by appending a semicolon?


    A SourceCodeAnalysis instance also provides a list of suggestions, for example,
    for Tab completion and accessing the documentation. This class is meant to be
    used by a tool providing the JShell functionality.


    I do not discuss it any further. Refer to the Javadoc of this class if you are
    interested in exploring it further.


    Chapter 11 ■ the Java Shell


    Figur[e 11-5\. sho](#index_split_005.html#321)ws the use-case diagram for the
    different components of the JShell API. In subsequent sections, I explain these
    classes and their uses. I show you a complete example in the last section.


    Uses


    Generates


    SourceCode


    JShell


    SnippetEvent


    Analysis


    Queries


    Holds


    Snippet


    ***Figure 11-5.** A use-case diagram for the components of the JShell API*


    Creating a JShell


    The JShell class is abstract. It provides two ways to create its instances:


    • Using its static create() method


    • Using a static builder class named JShell.Builder


    The create() method returns a preconfigured JShell instance. The following snippet
    of code shows how to create a JShell using the create() method:


    // Create a JShell instance


    JShell shell = JShell.create()


    The JShell.Builder class lets you configure the JShell instance by letting you
    specify a snippet ID


    generator, a temporary variable name generator, a print stream for printing the
    output, an input stream to read snippets, and an error output stream to log errors.
    You can obtain an instance of the JShell.Builder class using the builder() static
    method of the JShell class. The following snippet of code shows how to use the
    JShell.Builder class to create a JShell, where myXXXStream in the code are references
    to your stream objects:


    // Create a JShell instance


    JShell shell = JShell.builder()


    .in(myInputStream)


    .out(myOutputStream)


    .err(myErrorStream)


    .build();


    Once you have a JShell instance, you can start evaluating snippets using its eval(String
    snippet) method. You can drop a snippet using its drop(PersistentSnippet snippet)
    method. You can append a path to the class path using its addToClasspath(String
    path) method. These three methods change the state of the JShell instance.


    Chapter 11 ■ the Java Shell


    ■ **Tip** When you are done using a JShell, you need to call its close() method
    to free resources. the JShell class implements the AutoCloseable interface, and
    therefore, using a try-with-resources block to work with a JShell is the best
    way to ensure that it is closed when it is no longer in use. a JShell is mutable
    and not thread-safe.


    You can register snippet event handlers and JShell shutdown event handlers using
    the onSnippetEve nt(Consumer<SnippetEvent> listener) and onShutdown(Consumer<JShell>
    listener) methods of the JShell class. A snippet event is fired when the status
    of a snippet changes because it is evaluated the first time or its status is updated
    because of evaluation of another snippet.


    The sourceCodeAnalysis() method in the JShell class returns an instance of the
    SourceCodeAnalysis class, which you can use for code-assist functionality.


    Other methods in the JShell class are used to query the state. For example, the
    snippets(), types(), methods(), and variables() methods return a list of all snippets,
    all snippets with active type declarations, snippets with active method declarations,
    and snippets with active variable declarations, respectively.


    The eval() method is the most frequently used method in the JShell class. It evaluates/executes
    the specified snippet and returns a List<SnippetEvent>. You can query the snippet
    events in the list for the state of execution. The following is a sample snippet
    of code that uses the eval() method:


    String snippet = "int x = 100;";


    // Evaluate the snippet


    List<SnippetEvent> events = shell.eval(snippet);


    // Process the results


    events.forEach((SnippetEvent se) -> {


    /* Handle the snippet event here */


    });


    Working with Snippets


    An instance of the Snippet class represents a snippet. The class does not provide
    a way to create its objects.


    You supply snippets to a JShell as strings and you receive instances of the Snippet
    class as part of the snippet events. Snippet events also provide you with the
    previous and current statuses of a snippet. If you have a Snippet object, you
    can query its current status using the status(Snippet s) method of the JShell
    class, which returns a Snippet.Staus.


    ■ **Tip** the Snippet class is immutable and thread-safe.


    Chapter 11 ■ the Java Shell


    There are several types of snippets in Java, for example, a variable declaration,
    a variable declaration with initialization, a method declaration, a type declaration,
    etc. The Snippet class is an abstract class and there is a subclass to represent
    each specific type of snippet. The following list shows the inheritance hierarchy
    of classes representing different types of snippets:


    •


    Snippet


    •


    ErroneousSnippet


    •


    ExpressionSnippet


    •


    StatementSnippet


    •


    PersistentSnippet


    •


    ImportSnippet


    •


    DeclarationSnippet


    •


    MethodSnippet


    •


    TypeDeclSnippet


    •


    VarSnippet


    The name of the subclasses of the Snippet class are intuitive. For example, an
    instance of the PersistentSnippet represents a snippet that is stored in a JShell
    and can be reused such as a class declaration or a method declaration. The Snippet
    class contains the following methods:


    • String id()


    • String source()


    • Snippet.Kind kind()


    • Snippet.SubKind subKind()


    The id() method returns a unique ID of the snippet and the source() method returns
    its source code.


    The kind() and subKind() methods return the type and sub-type of a snippet.


    The type of a snippet is one of the constants of the Snippet.Kind enum, for example,
    IMPORT,


    TYPE_DECL, METHOD, VAR, etc. The sub-type of a snippet provides more specific
    information about its type, for example, if a snippet is a type declaration, its
    sub-type will tell you if it is a class, interface, enum, or annotation declaration.
    The sub-type of a snippet is one of the constants of the Snippet.SubKind enum
    such as CLASS_SUBKIND, ENUM_SUBKIND, etc. The Snippet.Kind enum contains an isPersistent
    property whose value is true if the snippet of this kind is persistent and false
    otherwise.'
  trans: "\nJShell API 提供了对代码片段评估引擎的程序化访问。作为开发者，你可能不会直接使用此 API。它旨在供诸如 NetBeans IDE\
    \ 等工具使用，这些工具可能包含与 JShell 命令行工具功能等效的 UI，让开发者无需打开命令提示符，即可在 IDE 内部评估代码片段。在本节中，我将简要介绍\
    \ JShell API，并通过一个简单示例展示其用法。\n\nJShell API 位于 `jdk.jshell` 模块和 `jdk.jshell` 包中。请注意，如果你使用\
    \ JShell API，你的模块需要读取 `jdk.jshell` 模块。JShell API 很简单，主要由三个抽象类和一个接口组成：\n\n• `JShell`\n\
    \n• `Snippet`\n\n• `SnippetEvent`\n\n• `SourceCodeAnalysis`\n\n`JShell` 类的实例代表一个代码片段评估引擎。这是\
    \ JShell API 中的主类。一个 `JShell` 实例会维护所有已执行代码片段的状态。\n\n代码片段由 `Snippet` 类的实例表示。`JShell`\
    \ 实例在执行代码片段时会生成代码片段事件。\n\n代码片段事件由 `SnippetEvent` 接口的实例表示。一个代码片段事件包含代码片段的当前和先前状态、产生结果的代码片段的值、导致该事件的代码片段的源代码、如果在代码片段执行期间发生异常则包含的异常对象等。\n\
    \n`SourceCodeAnalysis` 类的实例为代码片段提供源代码分析和建议功能。它可以回答如下问题：\n\n• 这是一个完整的代码片段吗？\n\n\
    • 这个代码片段可以通过追加一个分号来完成吗？\n\n`SourceCodeAnalysis` 实例还提供建议列表，例如，用于 Tab 补全和访问文档。此类旨在供提供\
    \ JShell 功能的工具使用。\n\n我不再进一步讨论它。如果你有兴趣深入探索，请参考此类的 Javadoc。\n\n第 11 章 ■ Java Shell\n\
    \n图 11-5 展示了 JShell API 不同组件的用例图。在后续章节中，我将解释这些类及其用途。在最后一节中，我将向你展示一个完整的示例。\n\n\
    使用\n生成\nSourceCode\nJShell\nSnippetEvent\n分析\n查询\n持有\nSnippet\n\n***图 11-5.**\
    \ JShell API 组件的用例图*\n\n**创建 JShell**\n\n`JShell` 类是抽象的。它提供了两种创建其实例的方法：\n\n• 使用其静态\
    \ `create()` 方法\n• 使用名为 `JShell.Builder` 的静态构建器类\n\n`create()` 方法返回一个预配置的 `JShell`\
    \ 实例。以下代码片段展示了如何使用 `create()` 方法创建 JShell：\n\n```java\n// 创建一个 JShell 实例\nJShell\
    \ shell = JShell.create()\n```\n\n`JShell.Builder` 类允许你通过指定代码片段 ID 生成器、临时变量名生成器、用于打印输出的打印流、用于读取代码片段的输入流以及用于记录错误的错误输出流来配置\
    \ `JShell` 实例。你可以使用 `JShell` 类的 `builder()` 静态方法获取 `JShell.Builder` 类的实例。以下代码片段展示了如何使用\
    \ `JShell.Builder` 类创建 JShell，其中代码中的 `myXXXStream` 是对你的流对象的引用：\n\n```java\n//\
    \ 创建一个 JShell 实例\nJShell shell = JShell.builder()\n    .in(myInputStream)\n  \
    \  .out(myOutputStream)\n    .err(myErrorStream)\n    .build();\n```\n\n一旦你有了\
    \ `JShell` 实例，就可以使用其 `eval(String snippet)` 方法开始评估代码片段。你可以使用其 `drop(PersistentSnippet\
    \ snippet)` 方法丢弃一个代码片段。你可以使用其 `addToClasspath(String path)` 方法将路径追加到类路径。这三个方法会改变\
    \ `JShell` 实例的状态。\n\n第 11 章 ■ Java Shell\n\n■ **提示** 当你使用完 JShell 后，需要调用其 `close()`\
    \ 方法来释放资源。`JShell` 类实现了 `AutoCloseable` 接口，因此，使用 try-with-resources 块来处理 JShell\
    \ 是确保它在不再使用时被关闭的最佳方式。JShell 是可变的，并且不是线程安全的。\n\n你可以使用 `JShell` 类的 `onSnippetEvent(Consumer<SnippetEvent>\
    \ listener)` 和 `onShutdown(Consumer<JShell> listener)` 方法注册代码片段事件处理器和 JShell 关闭事件处理器。当代码片段的状态因首次评估或因另一个代码片段的评估而更新时，会触发代码片段事件。\n\
    \n`JShell` 类中的 `sourceCodeAnalysis()` 方法返回一个 `SourceCodeAnalysis` 类的实例，你可以将其用于代码辅助功能。\n\
    \n`JShell` 类中的其他方法用于查询状态。例如，`snippets()`、`types()`、`methods()` 和 `variables()`\
    \ 方法分别返回所有代码片段的列表、所有具有活动类型声明的代码片段、具有活动方法声明的代码片段以及具有活动变量声明的代码片段。\n\n`eval()` 方法是\
    \ `JShell` 类中最常用的方法。它评估/执行指定的代码片段并返回一个 `List<SnippetEvent>`。你可以查询列表中的代码片段事件以了解执行状态。以下是使用\
    \ `eval()` 方法的示例代码片段：\n\n```java\nString snippet = \"int x = 100;\";\n\n// 评估代码片段\n\
    List<SnippetEvent> events = shell.eval(snippet);\n\n// 处理结果\nevents.forEach((SnippetEvent\
    \ se) -> {\n    /* 在此处处理代码片段事件 */\n});\n```\n\n**处理代码片段**\n\n`Snippet` 类的实例代表一个代码片段。该类不提供创建其对象的方法。\n\
    \n你将代码片段作为字符串提供给 JShell，并作为代码片段事件的一部分接收 `Snippet` 类的实例。代码片段事件还为你提供代码片段的先前和当前状态。如果你有一个\
    \ `Snippet` 对象，可以使用 `JShell` 类的 `status(Snippet s)` 方法查询其当前状态，该方法返回一个 `Snippet.Status`。\n\
    \n■ **提示** `Snippet` 类是不可变的且线程安全的。\n\n第 11 章 ■ Java Shell\n\nJava 中有几种类型的代码片段，例如，变量声明、带初始化的变量声明、方法声明、类型声明等。`Snippet`\
    \ 类是一个抽象类，并且有一个子类来表示每种特定类型的代码片段。以下列表显示了表示不同类型代码片段的类的继承层次结构：\n\n• `Snippet`\n \
    \   • `ErroneousSnippet`\n    • `ExpressionSnippet`\n    • `StatementSnippet`\n\
    \    • `PersistentSnippet`\n        • `ImportSnippet`\n        • `DeclarationSnippet`\n\
    \            • `MethodSnippet`\n            • `TypeDeclSnippet`\n            •\
    \ `VarSnippet`\n\n`Snippet` 类的子类名称直观易懂。例如，`PersistentSnippet` 的实例代表存储在 JShell\
    \ 中且可重用的代码片段，例如类声明或方法声明。`Snippet` 类包含以下方法：\n\n• `String id()`\n• `String source()`\n\
    • `Snippet.Kind kind()`\n• `Snippet.SubKind subKind()`\n\n`id()` 方法返回代码片段的唯一 ID，`source()`\
    \ 方法返回其源代码。\n\n`kind()` 和 `subKind()` 方法返回代码片段的类型和子类型。\n\n代码片段的类型是 `Snippet.Kind`\
    \ 枚举的常量之一，例如 `IMPORT`、`TYPE_DECL`、`METHOD`、`VAR` 等。代码片段的子类型提供关于其类型的更具体信息，例如，如果代码片段是一个类型声明，其子类型会告诉你它是类、接口、枚举还是注解声明。代码片段的子类型是\
    \ `Snippet.SubKind` 枚举的常量之一，例如 `CLASS_SUBKIND`、`ENUM_SUBKIND` 等。`Snippet.Kind`\
    \ 枚举包含一个 `isPersistent` 属性，如果此类型的代码片段是持久的，则该属性的值为 `true`，否则为 `false`。\n"
- fmt: "`Snippet`类的子类添加了更多方法来返回特定类型片段的具体信息。例如，`VarSnippet`类包含一个`typeName()`方法，用于返回变量的数据类型。`MethodSnippet`类包含`parameterTypes()`和`signature()`方法，分别返回参数类型和方法的完整签名（以字符串形式）。\n\
    \n片段不包含其状态。`JShell`执行并持有`Snippet`的状态。请注意，执行一个片段可能会影响其他片段的状态。例如，声明变量的片段可能会改变声明方法的片段的状态，使其从有效变为无效，反之亦然，如果该方法引用了该变量。如果需要片段的当前状态，请使用`JShell`类的`status(Snippet\
    \ s)`方法，该方法返回`Snippet.Status`枚举的以下常量之一：\n\n- `DROPPED`：片段处于非活动状态，因为它已通过`JShell`类的`drop()`方法被丢弃。\n\
    - `NONEXISTENT`：片段处于非活动状态，因为它尚不存在。\n- `OVERWRITTEN`：片段处于非活动状态，因为它已被新片段替换。\n- `RECOVERABLE_DEFINED`：片段是一个包含未解析引用的声明片段。该声明具有有效的签名，并且对其他片段可见。当其他片段将其状态更改为`VALID`时，它可以被恢复和使用。\n\
    - `RECOVERABLE_NOT_DEFINED`：片段是一个包含未解析引用的声明片段。该片段具有无效的签名，并且对其他片段不可见。当它的状态更改为`VALID`时，它可以在以后使用。\n\
    - `REJECTED`：片段处于非活动状态，因为它在初始评估时编译失败，并且无法通过对`JShell`状态的进一步更改而变为有效。\n- `VALID`：片段在当前`JShell`状态的上下文中是有效的。\n\
    \n## 处理片段事件\n\n`JShell`在片段评估或执行过程中生成片段事件。您可以通过使用`JShell`类的`onSnippetEvent()`方法注册事件处理程序，或使用`JShell`类的`eval()`方法的返回值（即`List<SnippetEvent>`）来处理片段事件。以下代码片段展示了如何处理片段事件：\n\
    \n```java\ntry (JShell shell = JShell.create()) {\n\n    // Create a snippet\n\
    \    String snippet = \"int x = 100;\";\n\n    shell.eval(snippet)\n         .forEach((SnippetEvent\
    \ se) -> {\n             Snippet s = se.snippet();\n             System.out.printf(\"\
    Snippet: %s%n\", s.source());\n             System.out.printf(\"Kind: %s%n\",\
    \ s.kind());\n             System.out.printf(\"Sub-Kind: %s%n\", s.subKind());\n\
    \             System.out.printf(\"Previous Status: %s%n\", se.previousStatus());\n\
    \             System.out.printf(\"Current Status: %s%n\", se.status());\n    \
    \         System.out.printf(\"Value: %s%n\", se.value());\n         });\n}\n```\n\
    \n## 示例\n\n让我们看看`JShell` API的实际应用。清单[11-4](#index_split_005.html#325)包含了名为`com.jdojo.jshell.api`的模块的模块声明。清单[11-5](#index_split_005.html#325)包含了名为`JShellApiTest`的类的完整代码，该类是`com.jdojo.jshell.api`模块的成员。\n\
    \n***清单 11-4.*** 名为`com.jdojo.jshell.api`的模块的模块声明\n\n```java\n// module-info.java\n\
    module com.jdojo.jshell.api {\n    requires jdk.jshell;\n}\n```\n\n***清单 11-5.***\
    \ 用于测试`JShell` API的`JShellApiTest`类\n\n```java\n// JShellApiTest.java\npackage\
    \ com.jdojo.jshell.api;\n\nimport jdk.jshell.JShell;\nimport jdk.jshell.Snippet;\n\
    import jdk.jshell.SnippetEvent;\n\npublic class JShellApiTest {\n\n    public\
    \ static void main(String[] args) {\n        // Create an array of snippets to\
    \ evaluate/execute\n        // them sequentially\n        String[] snippets =\
    \ { \"int x = 100;\",\n                              \"double x = 190.89;\",\n\
    \                              \"long multiply(int value) {return value * multiplier;}\"\
    ,\n                              \"int multiplier = 2;\",\n                  \
    \            \"multiply(200)\",\n                              \"mul(99)\"\n \
    \                           };\n\n        try (JShell shell = JShell.create())\
    \ {\n            // Register a snippet event handler\n            shell.onSnippetEvent(JShellApiTest::snippetEventHandler);\n\
    \n            // Evaluate all snippets\n            for(String snippet : snippets)\
    \ {\n                shell.eval(snippet);\n                System.out.println(\"\
    ------------------------\");\n            }\n        }\n    }\n}\n```"
  raw: 'Subclasses of the Snippet class add more methods to return specific information
    about the specific type of snippet. For example, the VarSnippet class contains
    a typeName() method, which returns the data type of the variable. The MethodSnippet
    class contains the parameterTypes() and signature() methods, which return parameter
    types and the full signature of the method as a string.


    A snippet does not contain its status. A JShell executes and holds the status
    of a Snippet. Note that executing a snippet may affect the status of other snippets.
    For example, a snippet declaring a variable may change the status of a snippet
    declaring a method from valid to invalid or vice versa if the method was 305


    Chapter 11 ■ the Java Shell


    referencing the variable. If you need the current status of a snippet, use the
    status(Snippet s) method of the JShell class, which returns one of the following
    constants of the Snippet.Status enum:


    • DROPPED: The snippet is inactive because it was dropped using the drop() method
    of


    the JShell class.


    • NONEXISTENT: The snippet is inactive because it does not yet exist.


    • OVERWRITTEN: The snippet is inactive because it has been replaced by a new snippet.


    • RECOVERABLE_DEFINED: The snippet is a declaration snippet containing unresolved


    references. The declaration has a valid signature and it is visible to other snippets.
    It


    can be recovered and used when other snippets change its status to VALID.


    • RECOVERABLE_NOT_DEFINED: The snippet is a declaration snippet containing


    unresolved references. The snippet has an invalid signature and it is not visible
    to


    other snippets. It can be used later when its status changes to VALID.


    • REJECTED: The snippet is inactive because it failed compilation on initial evaluation


    and it is not capable of becoming valid with further changes to the JShell state.


    • VALID: The snippet is valid in the context of the current JShell state.


    Handling Snippet Events


    A JShell generates snippet events as part of snippet evaluation or execution.
    You can handle snippet events by registering event handlers using the onSnippetEvent()
    method of the JShell class or by using the return value of the eval() method of
    the JShell class, which is a List<SnippetEvent>. The following snippet code shows
    you how to process snippet events:


    try (JShell shell = JShell.create()) {


    // Create a snippet


    String snippet = "int x = 100;";


    shell.eval(snippet)


    .forEach((SnippetEvent se) -> {


    Snippet s = se.snippet();


    System.out.printf("Snippet: %s%n", s.source());


    System.out.printf("Kind: %s%n", s.kind());


    System.out.printf("Sub-Kind: %s%n", s.subKind());


    System.out.printf("Previous Status: %s%n", se.previousStatus());


    System.out.printf("Current Status: %s%n", se.status());


    System.out.printf("Value: %s%n", se.value());


    });


    }


    An Example


    Let’s look at the JShell API in action. Listing [11-4 con](#index_split_005.html#325)tains
    the module declaration for a module named com.jdojo.jshell.api. Listing [11-5](#index_split_005.html#325)
    contains the complete code for a class named JShellApiTest, which is a member
    of the com.jdojo.jshell.api module.


    Chapter 11 ■ the Java Shell


    ***Listing 11-4.*** The Module Declaration for the Module Named com.jdojo.jshell.api


    // module-info.java


    module com.jdojo.jshell.api {


    requires jdk.jshell;


    }


    ***Listing 11-5.*** A JShellApiTest Class to Test the JShell API


    // JShellApiTest.java


    package com.jdojo.jshell.api;


    import jdk.jshell.JShell;


    import jdk.jshell.Snippet;


    import jdk.jshell.SnippetEvent;


    public class JShellApiTest {


    public static void main(String[] args) {


    // Create an array of snippets to evaluate/execute


    // them sequentially


    String[] snippets = { "int x = 100;",


    "double x = 190.89;",


    "long multiply(int value) {return value * multiplier;}",


    "int multiplier = 2;",


    "multiply(200)",


    "mul(99)"


    };


    try (JShell shell = JShell.create()) {


    // Register a snippet event handler


    shell.onSnippetEvent(JShellApiTest::snippetEventHandler);


    // Evaluate all snippets


    for(String snippet : snippets) {


    shell.eval(snippet);


    System.out.println("------------------------");


    }


    }


