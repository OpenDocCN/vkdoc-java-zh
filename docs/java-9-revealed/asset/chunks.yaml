- fmt: '# 排版后的内容


    You can use methods in the `ProcessHandle` interface to query the state of a process.
    Table [12-1](#index_split_005.html#332) lists this interface’s commonly used methods
    with brief descriptions. Note that many of these methods return the snapshot of
    the state of a process that was true when the snapshot was taken. There is no
    guarantee that the process will still be in the same state when you use its attributes
    later because processes are created, run, and destroyed asynchronously.


    **Table 12-1.** Methods in the `ProcessHandle` Interface


    | Method | Description |

    |--------|-------------|

    | `static Stream<ProcessHandle> allProcesses()` | Returns a snapshot of all processes
    in the OS that are visible to the current process. |

    | `Stream<ProcessHandle> children()` | Returns a snapshot of the current direct
    children of the process. Use the `descendants()` method to get a list of children
    at all levels, for example, child processes, grandchild processes, great grandchild
    processes, etc. |

    | `static ProcessHandle current()` | Returns a `ProcessHandle` for the current
    process, which is the Java process executing this method call. |

    | `Stream<ProcessHandle> descendants()` | Returns a snapshot of the descendants
    of the process. Compare it to the `children()` method, which returns only direct
    descendants of the process. |

    | `boolean destroy()` | Requests the process to be killed. Returns `true` if termination
    of the process was successfully requested, `false` otherwise. Whether you can
    kill a process depends on operating system access control. |

    | `boolean destroyForcibly()` | Requests the process to be killed forcibly. Returns
    `true` if termination of the process was successfully requested, `false` otherwise.
    Killing a process forcibly terminates the process immediately, whereas a normal
    termination allows a process to shut down cleanly. Whether you can kill a process
    depends on operating system access control. |

    | `long getPid()` | Returns the native process ID (PID) of the process, which
    is assigned by the operating system. Note that a PID may be reused by operating
    systems, so two process handles having the same PID may not represent the same
    process. |

    | `ProcessHandle.Info info()` | Returns a snapshot of information about the process.
    |

    | `boolean isAlive()` | Returns `true` if the process represented by this `ProcessHandle`
    has not yet terminated, `false` otherwise. Note that this method may return `true`
    for some time after you have successfully requested to terminate the process because
    the process will be terminated asynchronously. |

    | `static Optional<ProcessHandle> of(long pid)` | Returns an `Optional<ProcessHandle>`
    for an existing native process. Returns an empty `Optional` if a process with
    the specified pid does not exist. |

    | `CompletableFuture<ProcessHandle> onExit()` | Returns a `CompletableFuture<ProcessHandle>`
    for the termination of the process. You can use the returned object to add a task
    that will be executed when the process terminates. Calling this method on the
    current process throws an `IllegalStateException`. |

    | `Optional<ProcessHandle> parent()` | Returns an `Optional<ProcessHandle>` for
    the parent process. |

    | `boolean supportsNormalTermination()` | Returns `true` if the implementation
    of `destroy()` normally terminates the process. |


    Table [12-2](#index_split_005.html#333) lists the methods and descriptions of
    the `ProcessHandle.Info` nested interface. An instance of this interface contains
    snapshot information about a process. You can obtain a `ProcessHandle.Info` using
    the `info()` method of the `ProcessHandle` interface or the `Process` class. All
    methods in the interface return an `Optional`.


    **Table 12-2.** Methods in the `ProcessHandle.Info` Interface


    | Method | Description |

    |--------|-------------|

    | `Optional<String[]> arguments()` | Returns arguments of the process. The process
    may change the original arguments passed to it after startup. This method returns
    the changed arguments in that case. |

    | `Optional<String> command()` | Returns the executable pathname of the process.
    |

    | `Optional<String> commandLine()` | It is a convenience method for combining
    the command and arguments. |'
