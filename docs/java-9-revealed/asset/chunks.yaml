    ## 配置 JShell


    使用`/set`命令，你可以自定义`jshell`会话，范围从启动代码片段和命令到设置特定平台的代码片段编辑器。在本节中，我将详细解释这些自定义设置。


    ### 设置代码片段编辑器


    `JShell`工具自带一个默认的代码片段编辑器。在`jshell`中，你可以使用`/edit`命令来编辑所有代码片段或特定代码片段。`/edit`命令会在编辑器中打开代码片段。代码片段编辑器是一个特定于平台的程序，例如Windows上的`notepad.exe`，它将被调用来编辑代码片段。你可以使用带有`editor`参数的`/set`命令来设置或删除编辑器设置。该命令的有效形式如下：


    - `/set editor [-retain] [-wait] <command>`

    - `/set editor [-retain] -default`

    - `/set editor [-retain] -delete`


    如果你使用`-retain`选项，该设置将在`jshell`会话之间持久保留。'
