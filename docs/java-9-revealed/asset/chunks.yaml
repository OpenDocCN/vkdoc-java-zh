    ## Summary


    The Java shell, which is called `JShell` in JDK 9, is a command-line tool that
    provides an interactive way to access the Java programming language. It lets you
    evaluate snippets of Java code instead of forcing you to write an entire Java
    program. It is a REPL for Java. `JShell` is also an API that provides programmatic
    access to the REPL functionality for the Java code for other tools such as IDEs.


    You can start the `JShell` command-line tool by running the `jshell` program that
    is stored in the `JDK_HOME\bin` directory. The tool supports executing snippets
    and commands. Snippets are pieces of Java code. As snippets are evaluated/executed,
    `JShell` maintains its state. It also keeps track of the status of all entered
    snippets. You can use commands to query the `JShell` state and configure the `jshell`
    environment.


    To distinguish commands from snippets, all the commands start with a slash (`/`).


    `JShell` contains several features that make developers more productive and provide
    a better user experience, such as auto-completion of code and displaying the Javadoc
    inside the tool. `JShell` attempts to use the already existing functionality in
    the JDK such as the Compiler API to parse, analyze, and compile snippets, and
    the Java Debugger API to replace existing snippets with new ones in the JVM. The
    design of `JShell` makes it possible to use new constructs in the Java languages
    without any changes or with few changes to the `JShell` tool itself.


    # Process API Updates


    In this chapter, you will learn:


    - What the Process API is

    - How to create a native process

    - How to get information about a new process

    - How to get information about the current process

    - How to get information about all system processes

    - How to set permissions to create, query, and manage native processes


    ## What Is the Process API?


    The Process API consists of classes and interfaces that let you work with native
    processes. Using the API, you can:


    - Create new native processes from Java code

    - Get process handles for native processes whether they were created by Java code
    or by other means

    - Destroy running processes

    - Query processes for liveness and their other attributes

    - Get the list of child processes and the parent process of a process

    - Get the process ID (PID) of native processes

    - Get the input, output, and error streams of newly created processes

    - Wait for a process to terminate

    - Execute a task when a process terminates


    The Process API consists of the following classes and interfaces in the `java.lang`
    package:


    - `Runtime`

    - `ProcessBuilder`

    - `ProcessBuilder.Redirect`

    - `Process`

    - `ProcessHandle`

    - `ProcessHandle.Info`


    Support for working with native processes existed since Java 1.0. An instance
    of the `Process` class represents a native process created by a Java program.
    A process is started by calling the `exec()` method of the `Runtime` class.


    JDK 5.0 added another class named `ProcessBuilder` and JDK 7.0 added a nested
    class named `ProcessBuilder.Redirect`. An instance of the `ProcessBuilder` class
    holds a set of attributes for a process. Calling its `start()` method starts a
    native process and returns an instance of the `Process` class that represents
    the native process. You can call its `start()` method multiple times; each time,
    it starts a new process using the attributes held in the `ProcessBuilder` instance.
    In Java 5.0, the `ProcessBuilder` class took over the job of the `Runtime.exec()`
    method to start a new process.


    There were a few improvements in the Process API in Java 7 and Java 8 in terms
    of adding a few methods to the `Process` and `ProcessBuilder` classes.


    Before Java 9, the Process API was still lacking basic support for working with
    native processes such as getting the PID and owner of a process, the start time
    of a process, how much CPU time has been used by a process, how many native processes
    are currently running, etc. Note that before Java 9, you were able to start native
    processes and work with their input, output, and error streams. However, you were
    not able to work with native processes that you did not start and were not able
    to query the details of processes. To work with native processes more closely,
    Java developers had to resort to writing native code using Java Native Interface
    (JNI). Java 9 made these much needed features to work with native processes.


    Java 9 added an interface named `ProcessHandle` to the Process API. An instance
    of the `ProcessHandle` interface identifies a native process; it lets you query
    the process state and manage the process.


    Compare the `Process` class and the `ProcessHandle` interface. An instance of
    the `Process` class represents a native process started by the current Java program,
    whereas an instance of the `ProcessHandle` interface represents a native process
    whether it was started by the current Java program or by other means. In Java
    9, several methods have been added to the `Process` class that are also available
    in the new `ProcessHandle` interface. The `Process` class contains a `toHandle()`
    method that returns a `ProcessHandle`.


    An instance of the `ProcessHandle.Info` interface represents a snapshot of attributes
    of a process. Note that processes are implemented differently by different operating
    systems, so their attributes vary. The state of a process may change anytime,
    for example, the CPU time used by the process increases whenever the process gets
    more CPU time. To get the latest information on a process, you need to use the
    `info()` method of the `ProcessHandle` interface at the time you need it, which
    will return a new instance of the `ProcessHandle.Info` interface.


    All examples in this chapter were run in Windows 10. You may get a different output
    when you run these programs on your machine using Windows 10 or a different operating
    system.


    ## The Current Process


    The `current()` static method of the `ProcessHandle` interface returns the handle
    of the current process. Note that the current process returned by this method
    is always the Java process that is executing the code.


    ```

    // Get the handle of the current process

    ProcessHandle current = ProcessHandle.current();

    ```


    Once you get the handle of the current process, you can use methods of the `ProcessHandle`
    interface to get details about the process. Refer to the next section for an example
    on how to get information about the current process.


    > **Tip:** You cannot kill the current process. Attempting to kill the current
    process by using the `destroy()` or `destroyForcibly()` method of the `ProcessHandle`
    interface results in an `IllegalStateException`.


    ## Querying Process State'
