    Using JShell Documentation


    The JShell tool ships with extensive documentation. Because it is a command-line
    tool, it is little harder to read the documentation on a command line. You can
    use the /help or /? command to display a list of commands and their brief descriptions.


    jshell> /help


    | Type a Java language expression, statement, or declaration.


    | Or type one of the following commands:


    Chapter 11 ■ the Java Shell


    | /list [<name or id>|-all|-start] -- list the source you have typed


    | /edit <name or id> -- edit a source entry referenced by name or id


    | /drop <name or id> -- delete a source entry referenced by name or id


    ...


    You can use a specific command as an argument to the /help command to get information
    about the command. The following command prints information about the /help command
    itself:


    jshell> /help /help


    |


    | /help


    |


    | Display information about jshell.


    | /help


    | List the jshell commands and help subjects.


    |


