    focus on creating MRJARs.


    To run this example, you need JDK 8 and JDK 9 installed on your machine. If you
    do not have JDK 8, any other JDK in addition to JDK 9 will do. For the JDK other
    than version 8, you will need to change the code in the example, so the code will
    compile with your JDK.


    Chapter 6 ■ paCkaging Modules


    I use a MRJAR to store the JDK 8 and JDK 9 versions of an application. The application
    consists of the following two classes:


    • com.jdojo.mrjar.Main


    • com.jdojo.mrjar.TimeUtil


    The Main class creates an object of the TimeUtil class and calls a method in it.
    The Main class can be used as a main class to run the application. The TimeUtil
    class contains a getLocalDate(Instant now) method that takes an Instant as an
    argument and returns a LocalDate interpreting the instant in the current time
    zone. JDK 9 has added a new method to the LocalDate class, which is named ofInstant(Instant
    instant, ZoneId zone). We will update the application to use JDK 9 to take advantage
    of this new method in JDK 9 and will keep the old application that used the JDK
    8 Time API for the same purpose.


    The source code contains two NetBeans projects named com.jdojo.mrjar.jdk8 and
    com.jdojo.mrjar.


