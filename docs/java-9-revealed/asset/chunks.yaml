    以下方法已添加到 Clock 类中：


    static Clock tickMillis(ZoneId zone)


    `tickMillis()` 方法返回一个时钟，该时钟以整毫秒为单位提供当前时刻的滴答。


    该时钟使用最佳可用的系统时钟。该时钟会将精度高于毫秒的时间值截断。调用此方法等同于以下代码：


    Clock.tick(Clock.system(zone), Duration.ofMillis(1))


    第 20 章 ■ JDK 9 中的其他变更


    Duration 类


    你可以根据用途将 Duration 类中的新方法分为三类：


    • 将一个持续时间除以另一个持续时间的方法


    • 以特定时间单位获取持续时间的方法，以及获取持续时间的特定部分（如天、小时、秒等）的方法


    • 将持续时间截断到特定时间单位的方法


    我使用一个持续时间为 23 天、3 小时、45 分钟和 30 秒的例子。以下代码片段将其创建为一个 Duration 对象，并将其引用存储在名为 `compTime`
    的变量中：


    // 创建一个持续时间为 23 天、3 小时、45 分钟和 30 秒的对象


    Duration compTime = Duration.ofDays(23)


    .plusHours(3)


    .plusMinutes(45)


    .plusSeconds(30);


    System.out.println("Duration: " + compTime);


    Duration: PT555H45M30S


    如输出所示，将天数乘以 24 转换为小时后，此持续时间表示 555 小时、45 分钟和 30 秒。


    将一个持续时间除以另一个持续时间


    此类别中只有一个方法：


    long dividedBy(Duration divisor)


    `dividedBy()` 方法允许你将一个持续时间除以另一个持续时间。它返回指定除数在调用该方法的持续时间中出现的次数。要知道此持续时间中包含多少个整周，你可以使用七天作为持续时间来调用
    `dividedBy()` 方法。以下代码片段展示了如何计算持续时间中的整天数、整周数和整小时数：


    long wholeDays = compTime.dividedBy(Duration.ofDays(1));


    long wholeWeeks = compTime.dividedBy(Duration.ofDays(7));


    long wholeHours = compTime.dividedBy(Duration.ofHours(7));


    System.out.println("Number of whole days: " + wholeDays);


    System.out.println("Number of whole weeks: " + wholeWeeks);


    System.out.println("Number of whole hours: " + wholeHours);


    Number of whole days: 23


    Number of whole weeks: 3


    Number of whole hours: 79


    第 20 章 ■ JDK 9 中的其他变更


    转换和检索持续时间的各部分


    此类别中向 Duration 类添加了几个方法：


    • long toDaysPart()


    • int toHoursPart()


    • int toMillisPart()


    • int toMinutesPart()


    • int toNanosPart()


    • long toSeconds()


    • int toSecondsPart()


    Duration 类包含两组方法。它们被命名为 `toXxx()` 和 `toXxxPart()`，其中 Xxx 可以是 Days、Hours、Minutes、Seconds、Millis
    和 Nanos。在此列表中，你可能会注意到包含了 `toDaysPart()`，但缺少了 `toDays()`。如果你发现某一组方法中缺少了某些 Xxx，这意味着这些方法在
    JDK 8 中已经存在。例如，`toDays()` 方法自 JDK 8 起就已存在于 Duration 类中。


    名为 `toXxx()` 的方法将持续时间转换为 Xxx 时间单位并返回整数部分。名为 `toXxxPart()` 的方法将持续时间分解为天:小时:分钟:秒:毫秒:纳秒的各个部分，并从中返回
    Xxx 部分。在此示例中，`toDays()` 会将持续时间转换为天数并返回整数部分，即 23。`toDaysPart()` 会将持续时间分解为 23 天:3
    小时:45 分钟:30 秒:0 毫秒:0 纳秒，并返回第一部分，即 23。让我们将相同的规则应用于 `toHours()` 和 `toHoursPart()`
    方法。`toHours()` 方法会将持续时间转换为小时并返回总小时数，即 555。`toHoursPart()` 方法会将持续时间分解为各部分（如同 `toDaysPart()`
    方法所做的那样），并返回小时部分，即 3。以下代码片段向你展示了一些示例：


    System.out.println("toDays(): " + compTime.toDays());


    System.out.println("toDaysPart(): " + compTime.toDaysPart());


    System.out.println("toHours(): " + compTime.toHours());


    System.out.println("toHoursPart(): " + compTime.toHoursPart());


