- fmt: '# Module API


    ## Dependencies in Modules


    The `uses` and `provides` statements in modules also form a dependency. If a module
    `M` uses a service type `S` and another module `N` provides an implementation
    `S` with `T`, the module `M` depends on module `N` for using the service type
    `S`. The readability graph is augmented with modules computed for such service-use
    dependencies.


    When the configuration for the boot layer is created, it contains modules by resolving
    the dependencies (`requires` statements), implied readability (`requires transitive`),
    and service-use dependencies (`uses` and `provides` statements). When you create
    a configuration for a user-defined layer, you have an option to include or exclude
    the service-use dependencies.


    ## The `Configuration` Class


    An instance of the `Configuration` class represents a configuration. A configuration
    has at least one parent, except an empty configuration.


    An instance of the `ResolvedModule` class represents a resolved module in a configuration.
    Its `reads()` method returns a `Set<ResolvedModule>` that a resolved module reads.
    Its `configuration()` method returns the `Configuration` that the resolved module
    is a member of. Its `reference()` method returns a `ModuleReference` that you
    can use to obtain a `ModuleReader` to reads the module’s contents.


    The following methods in the `Configuration` class create a `Configuration` object:


    - `static Configuration empty()`

    - `Configuration resolve(ModuleFinder before, ModuleFinder after, Collection<String>
    roots)`

    - `Configuration resolveAndBind(ModuleFinder before, ModuleFinder after, Collection<String>
    roots)`

    - `static Configuration resolve(ModuleFinder before, List<Configuration> parents,
    ModuleFinder after, Collection<String> roots)`

    - `static Configuration resolveAndBind(ModuleFinder before, List<Configuration>
    parents, ModuleFinder after, Collection<String> roots)`


    The `empty()` method returns an empty `Configuration`. This primarily exists to
    serve as the parent configuration for the configuration of the boot layer.


    There are two versions of the `resolve()` and `resolveAndBind()` methods: instance
    methods and static methods. There is only one difference between them. The instance
    methods create a new configuration using the current configuration as the parent
    configuration, whereas the static methods let you pass a list of parent configurations
    for the new configuration.


    The `resolve()` method creates a new `Configuration` object by resolving dependencies
    resulting from `requires` and `requires transitive` statements in the module declarations.
    Modules in the specified roots are used as root modules. During resolution process,
    modules are searched using the specified before module finder first. If the module
    is not found, the parent configurations are searched. If the module is still not
    found, the specified after module finder is used to search for the module. If
    your configuration is supposed to override a module in the parent configurations,
    you will place that module in the before module finder path.


    The `resolveAndBind()` method works the same as the `resolve()` method, except
    that it also resolves service-use dependencies. The following snippet of code
    shows how to create a configuration using the boot layer’s configuration as its
    parent configuration:


    ```java

    // Define the module finders

    String modulePath = "C:\\Java9Revealed\\customLib";

    Path path = Paths.get(modulePath);

    ModuleFinder beforFinder = ModuleFinder.of(path);


    // Our after module finder is empty

    ModuleFinder afterFinder = ModuleFinder.of();


    // Set up the root modules

    Set<String> rootModules = Set.of("com.jdojo.layer");


    // Create a configuration using the boot layer’s configuration as its parent configuration

    Configuration parentConfig = ModuleLayer.boot().configuration();

    Configuration config = parentConfig.resolve(beforFinder, afterFinder, rootModules);

    ```


    The following methods in the `Configuration` class are used to retrieve the details
    of resolved modules in a configuration:


    - `Optional<ResolvedModule> findModule(String name)`

    - `Set<ResolvedModule> modules()`

    - `List<Configuration> parents()`


    These methods’ names and signatures are intuitive enough to understand their use.
    I will not discuss the `Configuration` class any further in this section. In the
    next section, I show how to use a `Configuration` to create a module layer.


    ## Creating Module Layers


    A module layer is a configuration and a function that maps each module to a class
    loader. To create a layer, you must first create a configuration and have one
    or more class loaders to map modules to them. The class loader for a module is
    responsible for loading all types in that module. You can map all modules in a
    configuration to one class loader; you can map each module to a different class
    loader; or you can have a custom mapping strategy. Typically, class loaders use
    a delegation strategy that delegates class loading requests to their parent class
    loaders. You can use this strategy as well when you define class loaders for modules
    in layers.


    An instance of the `ModuleLayer` class, which is in the `java.lang` package, represents
    a layer. The class contains two methods, `empty()` and `boot()`, that return an
    empty layer with an empty configuration and the boot layer, respectively. The
    following methods in the class are used to create a custom layer:


    - `ModuleLayer defineModules(Configuration cf, Function<String,ClassLoader> clf)`

    - `static ModuleLayer.Controller defineModules(Configuration cf, List<ModuleLayer>
    parentLayers, Function<String,ClassLoader> clf)`

    - `ModuleLayer defineModulesWithManyLoaders(Configuration cf, ClassLoader parentClassLoader)`

    - `static ModuleLayer.Controller defineModulesWithManyLoaders(Configuration cf,
    List<ModuleLayer> parentLayers, ClassLoader parentLoader)`

    - `ModuleLayer defineModulesWithOneLoader(Configuration cf, ClassLoader parentClassLoader)`

    - `static ModuleLayer.Controller defineModulesWithOneLoader(Configuration cf,
    List<ModuleLayer> parentLayers, ClassLoader parentLoader)`


    The `defineModulesXxx()` methods have two variants: one set contain instance methods
    and another set contain static methods. Instance methods use the layer on which
    they are called as the parent layer, whereas static methods let you specify a
    list of parent layers for the new layer. The static methods return a `ModuleLayer.Controller`
    object, which you can use to work with modules in the new layer. `ModuleLayer.Controller`
    is a nested class in the `java.lang` package with the following methods:


    - `ModuleLayer.Controller addOpens(Module source, String packageName, Module target)`

    - `ModuleLayer.Controller addReads(Module source, Module target)`

    - `ModuleLayer layer()`


    The `addOpens` and `addReads()` methods let you open a package in a module in
    this layer to another module and add a read edge from a module in this layer to
    another module. The `layer()` method returns the `ModuleLayer` that this controller
    is managing.


    The `defineModules(Configuration cf, Function<String,ClassLoader> clf)` method
    takes a configuration as its first argument. The second argument is a mapping
    function that takes a module name in the configuration and returns a class loader
    for that module. The method call may fail if:


    - Multiple modules with the same package are mapped to the same class loader.

    - A module is mapped to a class loader that already has a module of the same name
    defined in it.

    - A module is mapped to a class loader that has already defined types in any of
    the packages in the module.


    The `defineModulesWithManyLoaders(Configuration cf, ClassLoader parentClassLoader)`
    method creates a layer using the specified configuration. Each module in the configuration
    is mapped to a different class loader, which is created by this method. The specified
    parent class loader (the second argument) is set as the parent of the class loaders
    created by this method. Typically, you would use the application class loader.'
  raw: 'The uses and provides statements in modules also form a dependency. If a module
    M uses a service type S and another module N provides an implementation S with
    T, the module M depends on module N for using the service type S. The readability
    graph is augmented with modules computed for such service-use dependencies.


    When the configuration for the boot layer is created, it contains modules by resolving
    the dependencies (requires statements), implied readability (requires transitive),
    and service-use dependencies (uses and provides statements). When you create a
    configuration for a user-defined layer, you have an option to include or exclude
    the service-use dependencies.


    An instance of the Configuration class represents a configuration. A configuration
    has at least one parent, except an empty configuration.


    An instance of the ResolvedModule class represents a resolved module in a configuration.
    Its reads() method returns a Set<ResolvedModule> that a resolved module reads.
    Its configuration() method returns the Configuration that the resolved module
    is a member of. Its reference() method returns a ModuleReference that you can
    use to obtain a ModuleReader to reads the module’s contents.


    The following methods in the Configuration class create a Configuration object:


    • static Configuration empty()


    • Configuration resolve(ModuleFinder before, ModuleFinder after,


    Collection<String> roots)


    • Configuration resolveAndBind(ModuleFinder before, ModuleFinder after,


    Collection<String> roots)


    • static Configuration resolve(ModuleFinder before, List<Configuration>


    parents, ModuleFinder after, Collection<String> roots)


    • static Configuration resolveAndBind(ModuleFinder before,


    List<Configuration> parents, ModuleFinder after, Collection<String>


    roots)


    Chapter 10 ■ the Module apI


    The empty() method returns an empty Configuration. This primarily exists to serve
    as the parent configuration for the configuration of the boot layer.


    There are two versions of the resolve() and resolveAndBind() methods: instance
    methods and static methods. There is only one difference between them. The instance
    methods create a new configuration using the current configuration as the parent
    configuration, whereas the static methods let you pass a list of parent configurations
    for the new configuration.


    The resolve() method creates a new Configuration object by resolving dependencies
    resulting from requires and requires transitive statements in the module declarations.
    Modules in the specified roots are used as root modules. During resolution process,
    modules are searched using the specified before module finder first. If the module
    is not found, the parent configurations are searched. If the module is still not
    found, the specified after module finder is used to search for the module. If
    your configuration is supposed to override a module in the parent configurations,
    you will place that module in the before module finder path.


    The resolveAndBind() method works the same as the resolve() method, except that
    it also resolves service-use dependencies. The following snippet of code shows
    how to create a configuration using the boot layer’s configuration as its parent
    configuration:


    // Define the module finders


    String modulePath = "C:\\Java9Revealed\\customLib";


    Path path = Paths.get(modulePath);


    ModuleFinder beforFinder = ModuleFinder.of(path);


    // Our after module finder is empty


    ModuleFinder afterFinder = ModuleFinder.of();


    // Set up the root modules


    Set<String> rootModules = Set.of("com.jdojo.layer");


    // Create a configuration using the boot layer’s configuration as its parent configuration


    Configuration parentConfig = ModuleLayer.boot().configuration();


    Configuration config = parentConfig.resolve(beforFinder, afterFinder, rootModules);


    The following methods in the Configuration class are used to retrieve the details
    of resolved modules in a configuration:


    • Optional<ResolvedModule> findModule(String name)


    • Set<ResolvedModule> modules()


    • List<Configuration> parents()


    These methods’ names and signatures are intuitive enough to understand their use.
    I will not discuss the Configuration class any further in this section. In the
    next section, I show how to use a Configuration to create a module layer.


    Creating Module Layers


    A module layer is a configuration and a function that maps each module to a class
    loader. To create a layer, you must first create a configuration and have one
    or more class loaders to map modules to them. The class loader for a module is
    responsible for loading all types in that module. You can map all modules in a
    configuration to one class loader; you can map each module to a different class
    loader; or you can have 238


    Chapter 10 ■ the Module apI


    a custom mapping strategy. Typically, class loaders use a delegation strategy
    that delegates class loading requests to their parent class loaders. You can use
    this strategy as well when you define class loaders for modules in layers.


    An instance of the ModuleLayer class, which is in the java.lang package, represents
    a layer. The class contains two methods, empty() and boot(), that return an empty
    layer with an empty configuration and the boot layer, respectively. The following
    methods in the class are used to create a custom layer:


    • ModuleLayer defineModules(Configuration cf, Function<String,ClassLoader> clf)


    • static ModuleLayer.Controller defineModules(Configuration cf,


