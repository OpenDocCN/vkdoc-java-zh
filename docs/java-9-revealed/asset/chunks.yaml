    Summary


    A *stream* is a sequence of elements produced by a producer and consumed by one
    or more consumers. This producer-consumer model is also known as source/sink model
    or publisher-subscriber model.


    There are several stream-processing mechanisms, the pull model and push model
    being the most


    common. In a push model, the publisher pushes the stream of data to the subscriber.
    In a pull model, the subscriber pulls the data from the publisher. These models
    have problems when the two ends do not work at the same rate. The solution is
    to provide a stream that adapts to the speed of both the publisher and subscriber.
    A strategy known as *backpressure* is used in which the subscriber notifies the
    publisher how many items it can handle and the publisher sends only those many
    items to the subscriber.


    Reactive Streams started in 2013 as an initiative for providing a standard for
    *asynchronous* stream processing with *non-blocking backpressure*. It is aimed
    at solving the problems with processing a stream of elements—how to pass a stream
    of elements from a publisher to a subscriber without requiring the publisher to
    block, or the subscriber to have an unbounded buffer or drop. The Reactive Streams
    model dynamically switches between the pull model and push model stream-processing
    mechanisms. It uses the pull model when the subscriber is slower and uses the
    push model when the subscriber is faster.


    In 2015, a specification and Java API for handling Reactive Streams were published.
    The Java API for Reactive Streams consists of four interfaces: Publisher<T>, Subscriber<T>,
    Subscription, and Processor<T,R>.


    A *publisher* publishes items to its subscribers based on the demands received
    from them. A *subscriber* subscribes to a publisher to receive items. The publisher
    sends a subscription token to the subscriber. Using the subscription token, the
    subscriber requests N number of data elements from the publisher. When the data
    elements are ready, the publisher sends N or fewer data elements to the subscriber.
    The subscriber can request more data elements.


    JDK 9 provides a Reactive Streams-compliant API in the java.util.concurrent package,
    which is in the java.base module. The API consists of two classes: Flow and SubmissionPublisher<T>.


    The Flow class encapsulates the Reactive Streams Java API. The four interfaces
    specified by the Reactive Streams Java API are included in the Flow class as nested
    static interfaces: Flow.Processor<T,R>, Flow.Publisher<T>, Flow.Subscriber<T>,
    and Flow.Subscription.


    **CHAPTER 18**


    **Streams API Updates**


    In this chapter, you will learn:


    • New convenience methods added to the Stream interface for stream processing


    • New collectors added to the Collectors class


    JDK 9 added few convenience methods to the Streams API. I categorize them based
    on the type they have been added to:


    • The Stream interface


    • The Collectors class


    Methods in the Stream interface define new stream operations, whereas methods
    in the Collectors class define new collectors. The following sections describe
    them in detail. The source code for this chapter is in a module named com.jdojo.streams,
    whose declaration is shown in Listin[g 18-1](#index_split_007.html#443).


    ***Listing 18-1.*** A Module Declaration for a Module Named com.jdojo.streams


    // module-info.java


    module com.jdojo.streams {


    exports com.jdojo.streams;


    }


    New Stream Operations


    In JDK 9, the Stream interface has the following new methods:


    • default Stream<T> dropWhile(Predicate<? super T> predicate)


    • default Stream<T> takeWhile(Predicate<? super T> predicate)


    • static <T> Stream<T> ofNullable(T t)


    • static <T> Stream<T> iterate(T seed, Predicate<? super T> hasNext,


    UnaryOperator<T> next)'
