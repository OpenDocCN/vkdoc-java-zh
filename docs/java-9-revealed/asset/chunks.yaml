    Listing [12-2](#index_split_005.html#334) contains the code for a class named
    CurrentProcessInfo. Its printInfo() method takes a ProcessHandle as an argument
    and prints the details of the process. We also use this method in other examples
    to print the details of a process. The main() method gets the handle of the current
    process running the process, which is a Java process, and prints its details.
