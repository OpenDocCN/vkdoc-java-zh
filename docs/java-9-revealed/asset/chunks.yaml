    • 表达式\n\n■ **提示** 你可以在 JShell 中使用所有 Java 语言构造，但包声明除外。JShell 中的所有代码片段都发生在一个名为 `REPL`\
    \ 的内部包和一个内部合成类中。\n\nJShell 工具知道你在何时完成了一个代码片段的输入。当你按下 Enter 键时，如果代码片段是完整的，该工具将执行它；否则，它会将你带到下一行并等待你完成代码片段。如果一行以\
    \ `...>` 开头，则表示代码片段不完整，你需要输入更多文本来完成它。用于更多输入的默认提示符 `...>` 是可以自定义的。以下是一些示例：\n\n\
    ```\nC:\\Java9Revealed>jshell\n|  Welcome to JShell -- Version 9-ea\n|  For an\
