    **关于技术审校者**


    **Manuel Jordan Elera** 是一位自学成才的开发者和研究员，他喜欢学习新技术用于自己的实验并创建新的集成。


    Manuel 获得了 2010 年 Springy 奖——社区冠军和 2013 年 Spring 冠军。在他不多的空闲时间里，他阅读圣经并用吉他创作音乐。Manuel
    以 dr_pompeii 之名闻名。他为 Apress 技术审校了多本书籍，包括 *Pro Spring, 第 4 版* (2014), *Practical
    Spring LDAP* (2013), *Pro JPA 2, 第二版* (2013) 和 *Pro Spring Security* (2013)。


    阅读他关于许多 Spring 技术的 13 篇详细教程，并通过他的博客 [`www.manueljordanelera.blogspot.com/`](http://www.manueljordanelera.blogspot.com/)
