    in a named module can be accessed by code in another module only if the resource
    is in an unnamed, invalid, or open package. All resources in a named module whose
    names end with .class (all class files) can be accessed by code in other modules.
    You can use an URL using the jrt scheme to access any resources in a runtime image.


