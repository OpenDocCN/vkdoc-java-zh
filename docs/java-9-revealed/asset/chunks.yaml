- fmt: '# JDK 模块与类加载机制


    ## JDK 模块列表


    以下模块由平台类加载器加载：


    - `jdk.plugin.server`

    - `java.sql`

    - `jdk.accessibility`

    - `jdk.scripting.nashorn`

    - `java.sql.rowset`

    - `jdk.charsets`

    - `jdk.security.auth`

    - `java.transaction`

    - `jdk.crypto.cryptoki`

    - `jdk.security.jgss`

    - `java.xml.bind`

    - `jdk.crypto.ec`

    - `jdk.xml.dom`

    - `java.xml.crypto`

    - `jdk.crypto.mscapi`

    - `jdk.zipfs`

    - `java.xml.ws`

    - `jdk.deploy`


    ## 应用类加载器加载的模块


    应用类加载器加载在模块路径上找到的应用模块，以及一些提供工具或导出工具 API 的 JDK 模块，如表 8-3 所列。你仍然可以使用`ClassLoader`类的静态方法`getSystemClassLoader()`来获取应用类加载器的引用。


    **表 8-3.** JDK 9 中由应用类加载器加载的 JDK 模块列表


    - `jdk.attach`

    - `jdk.jartool`

    - `jdk.jstatd`

    - `jdk.compiler`

    - `jdk.javadoc`

    - `jdk.pack`

    - `jdk.deploy.controlpanel`

    - `jdk.jcmd`

    - `jdk.packager`

    - `jdk.editpad`

    - `jdk.jconsole`

    - `jdk.packager.services`

    - `jdk.hotspot.agent`

    - `jdk.jdeps`

    - `jdk.policytool`

    - `jdk.internal.ed`

    - `jdk.jdi`

    - `jdk.rmic`

    - `jdk.internal.jvmstat`

    - `jdk.jdwp.agent`

    - `jdk.scripting.nashorn.shell`

    - `jdk.internal.le`

    - `jdk.jlink`

    - `jdk.xml.bind`

    - `jdk.internal.opt`

    - `jdk.jshell`

    - `jdk.xml.ws`


    > **提示：** 在 JDK 9 之前，扩展类加载器和应用类加载器是`java.net.URLClassLoader`类的实例。在 JDK 9 中，平台类加载器（即先前的扩展类加载器）和应用类加载器是内部
    JDK 类的实例。如果你的代码依赖于`URLClassLoader`类特有的方法，你的代码在 JDK 9 中可能会失效。


    ## JDK 9 中的类加载机制


    JDK 9 中的类加载机制发生了一些变化。三个内置类加载器协同工作来加载类。当应用类加载器需要加载一个类时，它会搜索所有类加载器定义的模块。如果某个合适的模块被定义到这些类加载器之一，那么该类加载器就会加载这个类——这意味着应用类加载器现在可以委托给启动类加载器和平台类加载器。如果类没有在这些类加载器定义的命名模块中找到，应用类加载器会委托给它的父加载器，即平台类加载器。如果类仍然没有被加载，应用类加载器会搜索类路径。如果在类路径上找到了该类，它会将该类作为其未命名模块的成员加载。如果在类路径上没有找到该类，则会抛出`ClassNotFoundException`。


    当平台类加载器需要加载一个类时，它会搜索所有类加载器定义的模块。如果某个合适的模块被定义到这些类加载器之一，那么该类加载器就会加载这个类。这意味着平台类加载器可以委托给启动类加载器，也可以委托给应用类加载器。


    如果类没有在这些类加载器定义的命名模块中找到，平台类加载器会委托给它的父加载器，即启动类加载器。


    当启动类加载器需要加载一个类时，它会搜索自己的命名模块列表。如果没有找到类，它会搜索通过命令行选项`-Xbootclasspath/a`指定的文件和目录列表。如果在启动类路径上找到了类，它会将该类作为其未命名模块的成员加载。


    ## 查看类加载器与模块加载过程


    你可以观察类加载器以及它们加载的模块和类的实际运行情况。JDK 9 包含一个名为`-Xlog:modules`的选项，用于在虚拟机加载模块时记录调试或跟踪消息。其格式如下：


    ```

    -Xlog:modules=<debug|trace>

    ```


    此选项会生成大量输出。建议你将输出重定向到文件，以便轻松查看。


    以下命令在 Windows 上运行素数检查器的客户端程序，并将模块加载消息记录到`test.txt`文件中。下面显示了部分输出。输出显示了定义模块的类加载器。


    ```

    C:\Java9Revealed>java -Xlog:modules=trace --module-path lib

    --module com.jdojo.prime.client/com.jdojo.prime.client.Main > test.txt

    ```


    ```

    [0.022s][trace][modules] Setting package: class: java.lang.Object, package: java/lang,

    loader: <bootloader>, module: java.base

    [0.022s][trace][modules] Setting package: class: java.io.Serializable, package:
    java/io,

    loader: <bootloader>, module: java.base

    ...

    [0.855s][debug][modules] define_module(): creation of module: com.jdojo.prime.client,

    version: NULL, location: file:///C:/Java9Revealed/lib/com.jdojo.prime.client.jar,
    class

    loader 0x00000049ec86dd90 a ''jdk/internal/loader/ClassLoaders$AppClassLoader''{0x00000000895

    d1c98}, package #: 1

    [0.855s][trace][modules] define_module(): creation of package com/jdojo/prime/client
    for

    module com.jdojo.prime.client

    ...

    ```


    ## 访问资源


    资源是你的应用程序使用的数据，例如图像、音频、视频、文本文件等。Java 提供了一种与位置无关的方式来访问资源，即通过在类路径上定位资源。你需要像将类文件打包到
    JAR 中一样打包资源，并将 JAR 添加到类路径。通常，类文件和资源被打包在同一个 JAR 中。访问资源是每个 Java 开发人员都会执行的重要任务。在接下来的章节中，我将解释
    JDK 9 之前版本和 JDK 9 中可用的 API。


    ### JDK 9 之前的资源访问


    在本节中，我将解释在 JDK 9 之前版本中如何访问资源。如果你已经知道如何在 JDK 9 之前版本中访问资源，可以跳到下一节，该节描述了如何在 JDK 9
    中访问资源。


    在 Java 代码中，资源由资源名称标识，资源名称是由斜杠（`/`）分隔的字符串序列。对于存储在 JAR 中的资源，资源名称就是存储在 JAR 中的文件的路径。例如，在
    JDK 9 之前，存储在`rt.jar`中的`java.lang`包中的`Object.class`文件是一个资源，其资源名称为`java/lang/Object.class`。


    在 JDK 9 之前，你可以使用以下两个类中的方法来访问资源：


    - `java.lang.Class`

    - `java.lang.ClassLoader`


    资源由`ClassLoader`定位。`Class`中的资源查找方法会委托给它的`ClassLoader`。因此，一旦你理解了`ClassLoader`使用的资源加载过程，使用`Class`类的方法就不会有问题。这两个类中都有两个名称不同的实例方法：


    - `URL getResource(String name)`

    - `InputStream getResourceAsStream(String name)`


    这两个方法以相同的方式查找资源。它们仅在返回类型上有所不同。第一个方法返回一个`URL`，而第二个方法返回一个`InputStream`。第二个方法等效于调用第一个方法，然后对返回的`URL`对象调用`openStream()`。


    > **提示：** 如果未找到指定的资源，所有资源查找方法都返回`null`。


    `ClassLoader`类还包含三个额外的静态方法来查找资源：


    - `static URL getSystemResource(String name)`

    - `static InputStream getSystemResourceAsStream(String name)`

    - `static Enumeration<URL> getSystemResources(String name)`


    这些方法使用系统类加载器（也称为应用类加载器）来查找资源。第一个方法返回找到的第一个资源的 URL。第二个方法返回找到的第一个资源的`InputStream`。第三个方法返回一个`Enumeration`，其中包含所有具有指定资源名称的资源的
    URL。


    要查找资源，你可以从两种类型的方法中选择——`getSystemResource*`和`getResource*`。在讨论哪种方法最好之前，理解有两种类型的资源非常重要：


    - 系统资源

    - 非系统资源


    你必须理解它们之间的区别，才能理解资源查找机制。'
