    Stack Walking in JDK 9


    JDK 9 introduced a new Stack-Walking API, which consists of a single class named
    StackWalker in the java.lang package. The class provides easy and efficient stack
    walking. It provides a sequential stream of stack frames for the current thread.
    The stack frames are reported in order, from the top-most frame where the stack
    was generated to the bottom-most frame. The StackWalker class is very efficient
    because it evaluates the stack frames lazily. It also contains a convenience method
    to get the reference of the caller class. The StackWalker class consists of the
    following members:


    • The StackWalker.Option nested enum


    • The StackWalker.StackFrame nested interface


    • Methods to get an instance of the StackWalker class


    • Methods to process stack frames


    • A method to get the caller’s class


    I explain each component of the StackWalker class and their uses in subsequent
    sections in detail.


    Specifying Stack-Walking Options


    You can configure a StackWalker by specifying zero or more options. An option
    is one of the constants of the StackWalker.Option enum. The constants are as follows:


    • RETAIN_CLASS_REFERENCE


    • SHOW_HIDDEN_FRAMES


    • SHOW_REFLECT_FRAMES


    If the RETAIN_CLASS_REFERENCE option is specified, the frames returned by the
    StackWalker will contain the reference of the Class object of the class that declares
    the method represented by the frame. You also need to specify this option if you
    want to get the Class object’s reference of the caller of a method. By default,
    this option is absent.


    By default, implementation-specific and reflection frames are not included in
    the stream of frames returned by the StackWalker class. Use the SHOW_HIDDEN_FRAMES
    option to include all hidden frames.


    If the SHOW_REFLECT_FRAMES option is specified, the stream of frames returned
    by the StackWalker class includes the reflection frames. Using this option may
    still hide the implementation-specific frames, which you can show using the SHOW_HIDDEN_FRAMES
    option.


    I show you how to use these options and their effects when I explain how to create
    instances of the StackWalker class in a subsequent section.


    Representing a Stack Frame


    Prior to JDK 9, an instance of the StackTraceElement class was used to represent
    a stack frame. The StackWalker API in JDK 9 uses an instance of the StackWalker.StackFrame
    interface to represent a stack frame.


    ■ **Tip** there is no concrete implementation class of the StackWalker.StackFrame
    interface for you to use directly. the Stack-Walking apI in JDk provides you with
    instances of the interface when you retrieve stack frames.


    Chapter 16 ■ StaCk WalkIng


    The StackWalker.StackFrame interface contains the following methods, most of which
    are the same as in the StackTraceElement class:


    • int getByteCodeIndex()


    • String getClassName()


    • Class<?> getDeclaringClass()


    • String getFileName()


    • int getLineNumber()


    • String getMethodName()


    • boolean isNativeMethod()


    • StackTraceElement toStackTraceElement()


    In a class file, each method is described using a structure named method_info.
    The method_info structure contains an attribute table that holds a variable-length
    attribute named Code. The Code attribute contains an array named code, which holds
    the bytecode instructions of the method. The getByteCodeIndex() method returns
    the index to the code array in the Code attribute of the method containing the
    execution point represented by this frame. It returns -1 for native methods. For
    more information on the code array and Code attribute, refer to the section 4.7.3
    of the Java Virtual Specification at


    [https://docs.oracle.com/javase/specs/jvms/se8/html/](https://docs.oracle.com/javase/specs/jvms/se8/html/).'
