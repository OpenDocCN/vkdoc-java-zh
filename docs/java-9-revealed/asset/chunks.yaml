- fmt: "# Sub-range Checking Methods\n\nThe sub-range, which is `fromIndex` (inclusive)\
    \ to `fromIndex + size` (exclusive), is within the range, which is `0` (inclusive)\
    \ to `length` (exclusive). If any of the arguments is a negative integer or the\
    \ sub-range is out of range, an `IndexOutOfBoundsException` is thrown. If the\
    \ sub-range is within range, it returns the `fromIndex`.\n\nSuppose you have a\
    \ method that accepts an index and size and returns a sub-range from an array\
    \ or a list. You can use this method to check if the requested sub-range is within\
    \ the range of the array or list.\n\nThe `checkFromToIndex(int fromIndex, int\
    \ toIndex, int length)` method checks if the specified sub-range, which is `fromIndex`\
    \ (inclusive) to `toIndex` (exclusive), is within range, which is `0` (inclusive)\
    \ to `length` (exclusive). If any arguments is a negative integer or the sub-range\
    \ is out of range, an `IndexOutOfBoundsException` is thrown. If the sub-range\
    \ is within range, it returns the `fromIndex`. It is useful to be used for sub-range\
    \ checking while working with arrays and lists.\n\nThe `checkIndex(int index,\
    \ int length)` method checks if the specified index is within range, which is\
    \ `0` (inclusive) to `length` (exclusive). If any argument is a negative integer\
    \ or the index is out of range, an `IndexOutOfBoundsException` is thrown. If index\
    \ is within range, it returns the index. It is useful when a method receives an\
    \ index and returns a value in an array or a list at that index.\n\n## Comparing\
    \ Arrays\n\nThe `java.util.Arrays` class consists of static utility methods that\
    \ let you perform various operations on arrays such as sorting, comparing, converting\
    \ to streams, etc. In JDK 9, this class has gained several methods that let you\
    \ compare arrays and slices of arrays. The new methods fall into three categories:\n\
    \n- Comparing two arrays or their slices for equality\n- Comparing two arrays\
    \ lexicographically\n- Finding the index of the first mismatch in two arrays\n\
    \nThe list of methods added to this class is huge. Methods in each category are\
    \ overloaded for all primitive types and `Object` arrays. To save space, I do\
    \ not list them here. Refer to the API documentation for the `Arrays` class for\
    \ a complete list. At the end of this section, I present an example using two\
    \ `int` arrays.\n\nThe `equals()` method lets you compare two arrays for equality.\
    \ Two arrays are considered equal if the number of elements in the arrays or slices\
    \ is the same, and all corresponding pairs of elements in the arrays or slices\
    \ are equal. The following are two versions of the `equals()` method for `int`:\n\
    \n- `boolean equals(int[] a, int[] b)`\n- `boolean equals(int[] a, int aFromIndex,\
    \ int aToIndex, int[] b, int bFromIndex, int bToIndex)`\n\nThe first version lets\
    \ you compare two arrays for equality and it existed before JDK 9. The second\
    \ version lets you compare slices of two arrays for equality, which has been added\
    \ in JDK 9. The `fromIndex` (inclusive) and `toIndex` (exclusive) arguments determine\
    \ the range of the two arrays to be compared. The method returns `true` if two\
    \ arrays are equal, `false` otherwise. Two arrays are considered equal if both\
    \ are `null`.\n\nJDK 9 added several methods named `compare()` and `compareUnsigned()`.\
    \ Both methods compare elements in arrays or arrays’ slices lexicographically.\
    \ The `compareUnsigned()` method treats the integer values as unsigned. A `null`\
    \ array is lexicographically less than a non-null array. Two `null` arrays are\
    \ equal.\n\nThe following are two versions of the `compare()` method for `int`:\n\
    \n- `int compare(int[] a, int[] b)`\n- `int compare(int[] a, int aFromIndex, int\
    \ aToIndex, int[] b, int bFromIndex, int bToIndex)`\n\nThe `compare()` method\
    \ returns `0` if the first and second arrays (or slices) are equal and contain\
    \ the same elements in the same order; returns a value less than `0` if the first\
    \ array (or slice) is lexicographically less than the second array (or slice);\
    \ and returns a value greater than `0` if the first array (or slice) is lexicographically\
    \ greater than the second array (or slice).\n\nThe `mismatch()` method compares\
    \ two arrays or array’s slices. The following are two versions of the `mismatch()`\
    \ method for `int`:\n\n- `int mismatch(int[] a, int[] b)`\n- `int mismatch(int[]\
    \ a, int aFromIndex, int aToIndex, int[] b, int bFromIndex, int bToIndex)`\n\n\
    The `mismatch()` method returns the index of the first mismatch. If there is no\
    \ mismatch, it returns `-1`. If either array is `null`, it throws a `NullPointerException`.\
    \ Listing 20-14 contains a complete program that compares two arrays and their\
    \ slices. The program uses two `int` arrays.\n\n### Listing 20-14. Comparing Arrays\
    \ and Array’s Slices Using the Arrays Class Methods\n\n```java\n// ArrayComparision.java\n\
    package com.jdojo.misc;\n\nimport java.util.Arrays;\n\npublic class ArrayComparison\
    \ {\n    public static void main(String[] args) {\n        int[] a1 = {1, 2, 3,\
    \ 4, 5};\n        int[] a2 = {1, 2, 7, 4, 5};\n        int[] a3 = {1, 2, 3, 4,\
    \ 5};\n\n        // Print original arrays\n        System.out.println(\"Three\
    \ arrays:\");\n        System.out.println(\"a1: \" + Arrays.toString(a1));\n \
    \       System.out.println(\"a2: \" + Arrays.toString(a2));\n        System.out.println(\"\
    a3: \" + Arrays.toString(a3));\n\n        // Compare arrays for equality\n   \
    \     System.out.println(\"\\nComparing arrays using equals() method:\");\n  \
    \      System.out.println(\"Arrays.equals(a1, a2): \" + Arrays.equals(a1, a2));\n\
    \        System.out.println(\"Arrays.equals(a1, a3): \" + Arrays.equals(a1, a3));\n\
    \        System.out.println(\"Arrays.equals(a1, 0, 2, a2, 0, 2): \" +\n      \
    \          Arrays.equals(a1, 0, 2, a2, 0, 2));\n\n        // Compare arrays lexicographically\n\
    \        System.out.println(\"\\nComparing arrays using compare() method:\");\n\
    \        System.out.println(\"Arrays.compare(a1, a2): \" + Arrays.compare(a1,\
    \ a2));\n        System.out.println(\"Arrays.compare(a2, a1): \" + Arrays.compare(a2,\
    \ a1));\n        System.out.println(\"Arrays.compare(a1, a3): \" + Arrays.compare(a1,\
    \ a3));\n        System.out.println(\"Arrays.compare(a1, 0, 2, a2, 0, 2): \" +\n\
    \                Arrays.compare(a1, 0, 2, a2, 0, 2));\n\n        // Find the mismatched\
    \ index in arrays\n        System.out.println(\"\\nFinding mismatch using the\
    \ mismatch() method:\");\n        System.out.println(\"Arrays.mismatch(a1, a2):\
    \ \" + Arrays.mismatch(a1, a2));\n        System.out.println(\"Arrays.mismatch(a1,\
    \ a3): \" + Arrays.mismatch(a1, a3));\n        System.out.println(\"Arrays.mismatch(a1,\
    \ 0, 5, a2, 0, 1): \" +\n                Arrays.mismatch(a1, 0, 5, a2, 0, 1));\n\
    \    }\n}\n```\n\nOutput:\n\n```\nThree arrays:\na1: [1, 2, 3, 4, 5]\na2: [1,\
    \ 2, 7, 4, 5]\na3: [1, 2, 3, 4, 5]\n\nComparing arrays using equals() method:\n\
    Arrays.equals(a1, a2): false\nArrays.equals(a1, a3): true\nArrays.equals(a1, 0,\
    \ 2, a2, 0, 2): true\n\nComparing arrays using compare() method:\nArrays.compare(a1,\
    \ a2): -1\nArrays.compare(a2, a1): 1\nArrays.compare(a1, a3): 0\nArrays.compare(a1,\
    \ 0, 2, a2, 0, 2): 0\n\nFinding mismatch using the mismatch() method:\nArrays.mismatch(a1,\
    \ a2): 2\nArrays.mismatch(a1, a3): -1\nArrays.mismatch(a1, 0, 5, a2, 0, 1): 1\n\
    ```\n\n## The Applet API Is Deprecated\n\nJava applets require the Java browser\
    \ plugin to work. Many browser vendors have already removed support for the Java\
    \ browser plugin or will be removing it in the near future. If browsers do not\
    \ have support for Java plugins, you cannot use applets and hence there will be\
    \ no reason to use the Applet API. JDK 9 deprecated the Applet API. However, it\
    \ won’t be removed in JDK 10. If it is scheduled to be removed in a future release,\
    \ developers will get a notice one release in advance. The following classes and\
    \ interfaces have been deprecated:\n\n- `java.applet.AppletStub`\n- `java.applet.Applet`\n\
    - `java.applet.AudioClip`\n- `java.applet.AppletContext`\n- `javax.swing.JApplet`\n\
    \nIn JDK 9, all AWT and Swing related classes are packaged in the `java.desktop`\
    \ module. These deprecated classes and interfaces are also in the same module.\n\
    \nThe `appletviewer` tool, which ships with the JDK in its `bin` directory, is\
    \ used to test applets. The tool is also deprecated in JDK 9. Running the tool\
    \ in JDK 9 prints a deprecation warning.\n\n## Javadoc Enhancements"
