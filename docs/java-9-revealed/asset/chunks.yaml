    限定导出


    假设你正在开发一个由多个模块组成的库或框架。你的某个模块中包含一些包，这些包中的 API 仅供某些模块内部使用。也就是说，该模块中的包无需导出给所有模块，其可访问性必须仅限于少数几个命名的模块。这可以通过在模块声明中使用限定导出语句来实现。使用限定导出的通用语法如下：


    exports <包名> to <模块 1>, <模块 2>...;


    这里，`<包名>` 是当前模块要导出的包名，`<模块 1>`、`<模块 2>` 等是可以读取当前模块的模块名称。以下模块声明包含一个非限定导出和一个限定导出：


    module com.jdojo.common {


    // 非限定导出语句


    exports com.jdojo.zip;


    // 限定导出语句


    exports com.jdojo.internal to com.jdojo.address;


    }


    `com.jdojo.common` 模块将 `com.jdojo.zip` 包导出给所有模块，而 `com.jdojo.internal` 包仅属于 `com.jdojo.address`
    模块。`com.jdojo.zip` 模块中的所有公共类型将对所有读取 `com.jdojo.common` 模块的模块可访问。然而，`com.jdojo.internal`
    包中的所有公共类型仅对 `com.jdojo.address` 模块可访问（前提是该模块读取了前者）。


    你可以在 JDK 9 中找到许多限定导出的示例。`java.base` 模块包含 `sun.*` 和 `jdk.*` 包，这些包被导出给少数几个命名的模块。以下命令打印了
    `java.base` 的模块声明。输出显示了 `java.base` 模块中使用的一些限定导出。


    c:\>javap jrt:/java.base/module-info.class


    Compiled from "module-info.java"


    module java.base {


    exports sun.net to jdk.plugin, jdk.incubator.httpclient;


    exports sun.nio.cs to java.desktop, jdk.charsets;


    exports sun.util.resources to jdk.localedata;


    exports jdk.internal.util.xml to jdk.jfr;


    exports jdk.internal to jdk.jfr;


    ...


    }


    第 4 章 ■ 模块依赖


    并非 JDK 9 中的所有内部 API 都被封装了。`sun.*` 包中有一些关键的内部 API，例如 `sun.misc.Unsafe` 类，这些 API
    在 JDK 9 之前被开发者使用，并且在 JDK 9 中仍然可访问。这些包已被放置在 `jdk.unsupported` 模块中。以下命令打印了 `jdk.unsupported`
    模块的模块声明：


    C:\Java9Revealed>javap jrt:/jdk.unsupported/module-info.class


    Compiled from "module-info.java"


    module jdk.unsupported@9-ea {


    requires java.base;


    exports sun.misc;


    exports com.sun.nio.file;


    exports sun.reflect;


    opens sun.misc;


    opens sun.reflect;


    }


    可选依赖


    模块系统在编译时和运行时都会验证模块依赖关系。有时你可能希望某个模块依赖在编译时是必需的，但在运行时是可选的。


    你可能会开发一个库，如果某个特定模块在运行时可用，该库的性能会更好；否则，它会回退到另一个性能较差的模块。然而，该库是针对可选模块编译的，并且它确保如果可选模块不可用，则不会执行依赖于该可选模块的代码。


    另一个例子是导出注解包的模块。Java 运行时已经会忽略不存在的注解类型。如果程序中使用的注解在运行时不存在，该注解会被忽略。模块依赖关系在启动时会被验证，如果缺少某个模块，应用程序将无法启动。因此，将包含注解包的模块依赖声明为可选依赖至关重要。


    你可以通过在 `requires` 语句中使用 `static` 关键字来声明可选依赖：


    requires **static** <可选包>;


    以下模块声明包含对 `com.jdojo.annotation` 模块的可选依赖：


    module com.jdojo.claim {


    requires **static** com.jdojo.annotation;


    }


    允许在 `requires` 语句中同时使用 `transitive` 和 `static` 修饰符：


    module com.jdojo.claim {


    requires **transitive static** com.jdojo.annotation;


    }


    第 4 章 ■ 模块依赖


    如果同时使用 `transitive` 和 `static` 修饰符，它们可以按任意顺序排列。以下声明与上一个声明具有相同的语义：


    module com.jdojo.claim {


    requires **static transitive** com.jdojo.annotation;


    }


    使用反射访问模块


    二十多年来，Java 一直允许使用反射访问类型的所有成员——私有的、公共的、包级别的和受保护的。你能够访问类或对象的私有成员。你所要做的就是在成员（`Field`、`Method`
    等）对象上调用 `setAccessible(true)` 方法。在本章的剩余部分，我将把使用反射访问类型的非公共成员称为*深度反射*。


    当你导出一个模块的包时，其他模块只能访问导出包中的公共类型以及这些公共类型的公共/受保护成员——在编译时静态地访问，或在运行时通过反射访问。这在模块系统设计期间成为了一个大问题。有许多优秀的框架，例如
    Spring 和 Hibernate，它们严重依赖于对应用程序库中定义的类型成员进行深度反射访问。


    模块系统的设计者在设计对模块化代码的深度反射访问时面临巨大挑战。允许对导出包中的类型进行深度反射违反了模块系统的*强封装*主题。即使模块开发者不想暴露模块的某些部分，它也会使所有内容对外部代码可访问。另一方面，不允许深度反射将使
    Java 社区失去一些广泛使用的优秀框架，并且还会破坏许多依赖深度反射的现有应用程序。许多现有应用程序将因此限制而无法迁移到 JDK 9。

    '
- fmt: "经过几轮设计和实验，模块系统设计者提出了一个折中方案——鱼与熊掌兼得！当前设计允许你拥有一个具有强封装、深度反射访问，或两者兼有的模块。规则如下：\n\
    \n- 导出的包将只允许在编译时和运行时访问公共类型及其公共成员。如果不导出包，则该包中的所有类型对其他模块不可访问。这提供了强封装。\n- 可以打开一个模块，以允许在运行时对该模块中所有包的所有类型进行深度反射。这样的模块称为*开放模块*。\n\
    - 可以有一个普通模块——即未为深度反射开放的模块——其中特定包在运行时开放给深度反射。所有其他包（未开放的包）被强封装。模块中允许深度反射的包称为*开放包*。\n\
    - 有时，你可能希望在编译时访问包中的类型，以便根据该包中的类型编写代码，同时希望在运行时对这些类型进行深度反射访问。你可以同时导出和开放同一个包来实现这一点。\n\
    \n## 开放模块\n\n在本节的剩余部分，我将展示如何声明一个开放模块以及如何开放特定包以进行深度反射。首先，给出语法。在`module`关键字前使用`open`修饰符来声明一个开放模块：\n\
    \n```\nopen module com.jdojo.model {\n    // 模块语句写在这里\n}\n```\n\n这里，`com.jdojo.model`模块是一个开放模块。其他模块可以对该模块中所有包的所有类型使用深度反射。你可以在开放模块的声明中包含`exports`、`requires`、`uses`和`provides`语句。不能在开放模块内部使用`opens`语句。`opens`语句用于开放特定包以进行深度反射。因为开放模块开放了所有包用于深度反射，所以不允许在开放模块内部使用`opens`语句。\n\
    \n## 开放包\n\n开放包意味着允许其他模块对该包中的类型使用深度反射。你可以将包开放给所有其他模块，或开放给特定的模块列表。\n\n将包开放给所有其他模块的`opens`语句语法如下：\n\
    \n```\nopens <package>;\n```\n\n这里，`<package>`对所有其他模块开放深度反射。你也可以使用限定`opens`语句将包开放给特定模块：\n\
    \n```\nopens <package> to <module1>, <module2>...;\n```\n\n这里，`<package>`仅对`<module1>`、`<module2>`等开放深度反射。以下是在模块声明中使用`opens`语句的示例：\n\
    \n```\nmodule com.jdojo.model {\n    // 将com.jdojo.util包导出给所有模块\n    exports com.jdojo.util;\n\
    \    // 将com.jdojo.util包开放给所有模块\n    opens com.jdojo.util;\n    // 仅将com.jdojo.model.policy包开放给hibernate.core模块\n\
    \    opens com.jdojo.model.policy to hibernate.core;\n}\n```\n\n`com.jdojo.model`模块导出了`com.jdojo.util`包，这意味着所有公共类型及其公共成员在编译时和运行时正常反射中都是可访问的。第二条语句开放了同一个包用于运行时的深度反射。总之，`com.jdojo.util`包的所有公共类型及其公共成员在编译时可访问，并且该包允许在运行时进行深度反射。第三条语句仅将`com.jdojo.model.policy`包开放给`hibernate.core`模块用于深度反射，这意味着没有其他模块可以在编译时访问该包的任何类型，而`hibernate.core`模块可以使用深度反射在运行时访问所有类型及其成员。\n\
    \n> **提示**：对另一个模块的开放包执行深度反射的模块，不需要读取包含这些开放包的模块。但是，添加对具有开放包的模块的依赖是允许的，并且强烈鼓励这样做——如果你知道模块名称——以便模块系统可以在编译时和运行时验证依赖关系。\n\
    \n当模块`M`将其包`P`开放给另一个模块`N`进行深度反射时，模块`N`可能将其对包`P`拥有的深度反射访问权限委托给另一个模块`Q`。模块`N`需要使用`Module`类的`addOpens()`方法以编程方式实现这一点。将反射访问权限委托给另一个模块，避免了将整个模块开放给所有其他模块，同时，也为被授予反射访问权限的模块增加了额外的工作。\n\
    \n## 使用深度反射\n\n在本节中，我将解释如何开放模块和包以进行深度反射。我从一个基本用例开始，然后逐步构建示例。在示例中，我将：\n\n- 展示尝试使用深度反射执行某些操作的代码。通常，代码会生成错误。\n\
    - 解释错误背后的原因。\n- 最后，展示如何修复错误。\n\n我使用一个名为`com.jdojo.reflect`的模块，其中包含一个位于`com.jdojo.reflect`包中的`Item`类。清单[4-10](#index_split_002.html#97)和清单[4-11](#index_split_002.html#97)包含了该模块和类的源代码。\n\
    \n***清单 4-10.*** `com.jdojo.reflect`模块的模块声明\n\n```\n// module-info.java\nmodule\
    \ com.jdojo.reflect {\n    // 没有模块语句\n}\n```\n\n***清单 4-11.*** 一个包含四个静态变量的`Item`类\n\
    \n```\n// Item.java\npackage com.jdojo.reflect;\n\npublic class Item {\n    static\
    \ private int s = 10;\n    static int t = 20;\n    static protected int u = 30;\n\
    \    static public int v = 40;\n}\n```\n\n注意，该模块既没有导出任何包，也没有开放任何包。`Item`类非常简单。它包含四个静态变量，分别具有每种访问修饰符——`private`、包级、`protected`和`public`。我特意让类保持简单，以便你可以专注于模块系统规则，而不是理解代码。在整个示例中，你将使用深度反射访问这些静态变量。\n\
    \n你将使用另一个名为`com.jdojo.reflect.test`的模块。清单[4-12](#index_split_002.html#98)包含了它的声明。它是一个没有模块语句的普通模块。也就是说，它没有依赖关系，除了默认依赖的`java.base`模块。\n\
    \n***清单 4-12.*** `com.jdojo.reflect.test`模块的模块声明\n\n```\n// module-info.java\n\
    module com.jdojo.reflect.test {\n    // 没有模块语句\n}\n```\n\n`com.jdojo.reflect.test`模块包含一个名为`ReflectTest`的类，如清单[4-13](#index_split_002.html#98)所示。\n\
    \n***清单 4-13.*** 一个演示对其他模块中类型及其成员进行反射访问的`ReflectTest`类\n\n```\n// ReflectTest.java\n\
    package com.jdojo.reflect.test;\n\nimport java.lang.reflect.Field;\nimport java.lang.reflect.InaccessibleObjectException;\n\
    \npublic class ReflectTest {\n    public static void main(String[] args) throws\
    \ ClassNotFoundException {\n        // 获取com.jdojo.reflect.Item类的Class对象\n   \
    \     // 该类位于com.jdojo.reflect模块中\n        Class<?> cls = Class.forName(\"com.jdojo.reflect.Item\"\
    );\n        Field[] fields = cls.getDeclaredFields();\n        for (Field field\
    \ : fields) {\n            printFieldValue(field);\n        }\n    }\n\n    public\
    \ static void printFieldValue(Field field) {\n        String fieldName = field.getName();\n\
    \        try {\n            // 使字段可访问，如果根据其声明（例如私有字段）不可访问的话\n            field.setAccessible(true);\n\
    \            // 打印字段的值\n            System.out.println(fieldName + \" = \" + field.get(null));\n\
    \        } catch (IllegalAccessException | IllegalArgumentException |\n      \
    \          InaccessibleObjectException e) {\n            System.out.println(\"\
    Accessing \" + fieldName +\n                \". Error: \" + e.getMessage());\n\
    \        }\n    }\n}\n```"
  raw: 'After a few iterations of design and experiments, the module system designers
    came up with a middle ground—you can have your cake and it eat too! The current
    design allows you have a module with strong encapsulation, deep reflective access,
    and partly both. Here are the rules:


    • An exported package will allow access to only public types and their public
    members


    at compile-time and runtime. If you do not export a package, all types in that


    package are inaccessible to other modules. This provides strong encapsulation.


    • You can open a module to allow deep reflection on all types in all packages
    in that


    module at runtime. Such a module is called an *open module*.


    • You can have a normal module—a module that is not open for deep reflection—with


    specific packages opened for deep reflection at runtime. All other packages (not


    open packages) are strongly encapsulated. Packages in a module that allow for
    deep


    reflection are known as *open packages*.


    • Sometimes, you may want to access types in a package at compile-time to write
    code


    in terms of the types in that package and, at the same time, you want deep reflective


    access to those types at runtime. You can export and open the same package to


    achieve this.


    Chapter 4 ■ Module dependenCy


    Open Modules


    In the remainder of this section, I show you how to declare an open module and
    how to open a specific package for deep reflection. First, I give you the syntax.
    Use the open modifier before the module keyword to declare an open module:


    **open** module com.jdojo.model {


    // Module statements go here


    }


    Here, the com.jdojo.model module is an open module. Other modules can use deep
    reflection on


    all types on all packages in this module. You can have exports, requires, uses,
    and provides statements in the declaration of an open module. You cannot have
    opens statements inside an open module. An opens statement is used to open a specific
    package for deep reflection. Because an open module opens all packages for deep
    reflection, an opens statement is not allowed inside an open module.


    Opening Packages


    Opening a package means allowing other modules to use deep reflection on the types
    in that package. You can open a package to all other modules or to a specific
    list of modules.


    The syntax for the opens statement to open a package to all other modules is as
    follows:


    opens <package>;


    Here, <package> is available for deep reflection to all other modules. You can
    also open a package to specific modules using a qualified opens statement:


    opens <package> to <module1>, <module2>...;


    Here, <package> is opened for deep reflection only to <module1>, <module2>, etc.
    The following is an example of using the opens statement in a module declaration:


    module com.jdojo.model {


    // Export the com.jdojo.util package to all modules


    exports com.jdojo.util;


    // Open the com.jdojo.util package to all modules


    opens com.jdojo.util;


    // Open the com.jdojo.model.policy package only to the


    // hibernate.core module


    opens com.jdojo.model.policy to hibernate.core;


    }


    The com.jdojo.model module exports the com.jdojo.util package, which means all
    public types


    and their public members are accessible at compile-time and for normal reflection
    at runtime. The second statement opens the same package for deep reflection at
    runtime. In summary, all public types and their public members of the com.jdojo.util
    package are accessible at compile-time and the package allows deep reflection
    at runtime. The third statement opens the com.jdojo.model.policy package only
    to the hibernate.core module for deep reflection, which means that no other modules
    can access any type of this package at compile-time and the hibernate.core module
    can access all types and their members using deep reflection at runtime.


    Chapter 4 ■ Module dependenCy


    ■ **Tip** a module that performs deep reflection on open packages of another module
    does not need to read the module containing the open packages. however, adding
    a dependence on a module with open packages is allowed and strongly encouraged—if
    you know the module name —so the module system can verify the dependency at compile-time
    and at runtime.


    When a module M opens its package P for deep reflection to another module N, it
    is possible that the module N grants the deep reflective access that it has on
    package P to another module Q. The module N will need to do it programmatically
    using the addOpens() method of the Module class. Delegating reflective access
    to another module avoids opening the entire module to all other modules and, at
    the same time, it creates additional work on the part of the module that is granted
    the reflective access.


    Using Deep Reflection


    In this section, I explain how to open modules and packages for deep reflection.
    I start with a basic use case and build the example thereafter. In the example,
    I:


    • Show you the code that attempts to do something using deep reflection. Typically,


    the code will generate errors.


    • Explain the reasons behind the errors.


    • Finally, I show you how to fix the errors.


    I use a module named com.jdojo.reflect that contains a class named Item in the
    com.jdojo.reflect package. Listing [4-10](#index_split_002.html#97) and Listing
    [4-11](#index_split_002.html#97) contain the source code for the module and the
    class.


    ***Listing 4-10.*** The Module Declaration for the com.jdojo.reflect Module


    // module-info.java


    module com.jdojo.reflect {


    // No module statements


    }


    ***Listing 4-11.*** A Class Named Item with Four Static Variables


    // Item.java


    package com.jdojo.reflect;


    public class Item {


    static private int s = 10;


    static int t = 20;


    static protected int u = 30;


    static public int v = 40;


    }


    Notice that the module does not export any package and neither does it open any
    package. The Item class is very simple. It contains four static variables with
    each type of access modifiers—private, package, protected, and public. I have
    intentionally kept the class simple so you can focus on the module system rules,
    rather than understanding the code. You will be accessing these static variables
    using deep reflection throughout this example.


    Chapter 4 ■ Module dependenCy


    You will be using another module named com.jdojo.reflect.test. Listin[g 4-12](#index_split_002.html#98)
    contains its declaration. It is a normal module with no module statement. That
    is, it has no dependency, except the default one that is on the java.base module.


    ***Listing 4-12.*** The Module Declaration for the com.jdojo.reflect.test Module


    // module-info.java


    module com.jdojo.reflect.test {


    // No module statements


    }


    The com.jdojo.reflect.test module contains a class named ReflectTest, as shown
    in Listin[g 4-13](#index_split_002.html#98).


    ***Listing 4-13.*** A ReflectTest Class to Demonstrates Reflective Access to Types
    and Their Members in Other Modules


    // ReflectTest.java


    package com.jdojo.reflect.test;


    import java.lang.reflect.Field;


    import java.lang.reflect.InaccessibleObjectException;


    public class ReflectTest {


    public static void main(String[] args) throws ClassNotFoundException {


    // Get the Class object for the com.jdojo.reflect.Item class


    // which is in the com.jdojo.reflect module


    Class<?> cls = Class.forName("com.jdojo.reflect.Item");


    Field[] fields = cls.getDeclaredFields();


    for (Field field : fields) {


    printFieldValue(field);


    }


    }


    public static void printFieldValue(Field field) {


    String fieldName = field.getName();


    try {


    // Make the field accessible, in case it is not accessible


    // based on its declaration such as a private field


    field.setAccessible(true);


    // Print the field''s value


    System.out.println(fieldName + " = " + field.get(null));


    } catch (IllegalAccessException | IllegalArgumentException |


    InaccessibleObjectException e) {


    System.out.println("Accessing " + fieldName +


    ". Error: " + e.getMessage());


    }


    }


    }


    Chapter 4 ■ Module dependenCy'
