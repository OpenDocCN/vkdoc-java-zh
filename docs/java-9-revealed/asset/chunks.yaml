    \ failed because they are not found on the module path.\n\nIf you run the `Main`\
    \ class with the `com.jdojo.prime`, `com.jdojo.prime.generic`, `com.jdojo.prime.faster`,\
    \ `com.jdojo.prime.probable`, and `com.jdojo.prime.client` modules on the module\
    \ path, you get an output similar to the following output. The default provider\
    \ is the one that is found first by the iterator.\n\nThe output shows the generic\
    \ service provider as the default, but you may get any other provider as the default\
    \ provider when you run the program.\n\n```\nUsing jdojo.generic.primechecker:\n\
    3 is a prime.\n4 is not a prime.\n121 is not a prime.\n977 is a prime.\n\nUsing\
    \ jdojo.faster.primechecker:\n3 is a prime.\n4 is not a prime.\n121 is not a prime.\n\
    977 is a prime.\n\nUsing jdojo.probable.primechecker:\n3 is a prime.\n4 is not\
    \ a prime.\n121 is not a prime.\n977 is a prime.\n```\n\nWhen the module system\
    \ encounters a `uses` statement in a module declaration, it scans the module path\
    \ to find all modules that contain `provides` statements that specify implementations\
    \ for the service interface specified in the `uses` statement. In this sense,\
    \ a `uses` statement in a module indicates an indirect optional dependency on\
    \ other modules. That dependency is resolved at runtime.\n\n## Selecting and Filtering\
    \ Providers\n\nAt times, you’ll want to select providers based on their class\
    \ names. For example, you may want to select only those prime service providers\
    \ whose fully qualified class name starts with `com.jdojo`. A typical logic to\
    \ achieve this would be to use the iterator returned by the `iterator()` method\
    \ of the `ServiceLoader` class.\n\nHowever, this operator is costly. The iterator\
    \ instantiates a provider before returning it to you even though the instantiation\
    \ happens lazily—meaning a provider is instantiated when it is needed to be returned.\n\
    \nJDK 9 added a new method to the `ServiceLoader` class. The method’s signature\
    \ is as follows:\n\n```\npublic Stream<ServiceLoader.Provider<S>> stream()\n```\n\
    \nThe `stream()` method returns a stream of instances of the `ServiceProvider.Provider`\
    \ interface, which is declared as a nested interface in the `ServiceLoader` class\
    \ as follows:\n\n```\npublic static interface Provider<S> extends Supplier<S>\
    \ {\n    Class<? extends S> type();\n    @Override\n    S get();\n}\n```\n\nAn\
    \ instance of the `ServiceLoader.Provider` interface represents a service provider.\
    \ Its `type()` method returns the `Class` object of the service implementation.\
    \ The `get()` method instantiates and returns the service provider. How does the\
    \ `ServiceLoader.Provider` interface help? When you use the `stream()` method,\
    \ each element in the stream is of the `ServiceLoader.Provider` type. You can\
    \ filter the stream based on the class name or type of the provider, which will\
    \ not instantiate the provider. You can use the `type()` method in your filters.\
    \ When you find the desired provider, call the `get()` method to instantiate the\
    \ provider. This way, you instantiate a provider when you know you need it, not\
    \ when you are iterating through all providers.\n\nThe following is an example\
    \ of using the `stream()` method of the `ServiceLoader` class. It gives you a\
    \ list of all prime service providers whose class name starts with `com.jdojo`.\n\
    \n```\nstatic List<PrimeChecker> startsWith(String prefix) {\n    return ServiceLoader.load(PrimeChecker.class)\n\
    \        .stream()\n        .filter((Provider p) -> p.type().getName().startsWith(prefix))\n\
    \        .map(Provider::get)\n        .collect(Collectors.toList());\n}\n```\n\
    \nYou can add this method to the `PrimeChecker` interface. You will need to add\
    \ a few import statements when you add this method:\n\n```\nimport java.util.List;\n\
    import java.util.ServiceLoader.Provider;\nimport java.util.stream.Collectors;\n\
    ```\n\nThe following is an example of calling this method, for example, from the\
    \ client class:\n\n```\n// Get the list of all prime services whose class names\
    \ start with \"com.jdojo\"\nList<PrimeChecker> jdojoService = PrimeChecker.startsWith(\"\
    com.jdojo\");\n```\n\n## Testing Prime Service in Legacy Mode\n\nNot all applications\
    \ will be migrated to use modules. Your modular JARs for the prime service may\
    \ be used along with other JARs on the class path. Suppose you placed all five\
    \ modular JARs for the prime service in `C:\\Java9Revealed\\lib` directory. Run\
    \ the `com.jdojo.prime.client.Main` class by placing the four modular JARs on\
    \ the class path using the following command:\n\n```\nC:\\Java9Revealed>java --class-path\
    \ lib\\com.jdojo.prime.jar;lib\\com.jdojo.prime.client.jar;lib\\com.jdojo.prime.faster.jar;lib\\\
    com.jdojo.prime.generic.jar;lib\\com.jdojo.prime.probable.jar com.jdojo.prime.client.Main\n\
    ```\n\n```\nNo PrimeChecker service provider found.\nA PrimeChecker service provider\
    \ with the name 'jdojo.faster.primechecker' was not found.\nA PrimeChecker service\
    \ provider with the name 'jdojo.probable.primechecker' was not found.\n```\n\n\
    The output indicates that using the legacy mode—the pre-JDK 9 mode by placing\
    \ all modular JARs on the class path—did not find any of the service providers.\
    \ In legacy mode, the service provider discovery mechanism is different. The `ServiceLoader`\
    \ class scans all JARs on the class path looking for files in the `META-INF/services`\
    \ directory. The filename is the fully qualified service interface name. The file\
    \ path looks like this:\n\n```\nMETA-INF/services/<service-interface>\n```\n\n\
    The contents of this file is the list of the fully qualified names of the service\
    \ provider implementation classes/interfaces. Each class name needs to be on a\
    \ separate line. You can use a single-line comment in the file. Text on a line\
    \ starting from a `#` character is considered a comment.\n\nThe service interface\
    \ name is `com.jdojo.prime.PrimeChecker`, so the modular JARs for the three service\
