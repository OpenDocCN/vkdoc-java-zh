- fmt: "# Module API\n\n`Module`类的`getDescriptor()`方法返回一个`ModuleDescriptor`。`ModuleDescriptor`是不可变的。未命名模块没有模块描述符。`Module`类的`getDescriptor()`方法对未命名模块返回`null`。`ModuleDescriptor`类包含几个嵌套类，例如`ModuleDescriptor.Requires`嵌套类；每个嵌套类都代表程序中的模块语句。\n\
    \n你可以使用命令行选项和编程方式通过`Module` API来增强模块描述符。你可以将对模块属性的所有查询分为两类：一类是模块加载后可能发生变化的属性，另一类是模块加载后不会发生变化的属性。`Module`类包含第一类查询的方法，`ModuleDescriptor`类包含第二类查询的方法。\n\
    \n你可以在运行时使用`Module`类中的方法之一来更新模块的定义：`addExports()`、`addOpens()`、`addReads()`和`addUses()`。\n\
    \n你可以在模块声明上使用注解。`java.lang.annotation.ElementType`枚举有一个名为`MODULE`的新值。你可以将`MODULE`用作注解声明上的目标类型，这允许该注解类型用于模块。在Java\
    \ 9中，两个注解——`java.lang.Deprecated`和`java.lang.SuppressWarnings`——已被更新以用于模块声明。在模块上使用这些注解仅影响模块声明，而不影响模块中包含的类型。\n\
    \n模块被组织成层。层是一组已解析的模块，并带有一个函数，该函数将每个模块映射到一个负责加载该模块中所有类型的类加载器。这组已解析的模块称为*配置*。层是分层组织的。一个层至少有一个父层，除了*空*层，顾名思义，它不包含任何模块，主要作为*引导*层的父层存在。引导层由JVM在启动时通过将应用程序的初始模块（根模块）与一组可观察模块进行解析而创建。你可以创建自定义层。层允许将同一模块的多个版本加载到不同的层中，并在同一个JVM中使用。\n\
    \n# Java Shell\n\n在本章中，你将学习：\n\n- 什么是Java Shell\n- 什么是JShell工具和JShell API\n- 如何配置JShell工具\n\
    - 如何使用JShell工具评估Java代码片段\n- 如何使用JShell API评估Java代码片段\n\n## 什么是Java Shell？\n\n\
    Java Shell，在JDK 9中称为JShell，是一个命令行工具，提供了一种交互式访问Java编程语言的方式。它允许你评估Java代码片段，而不是强迫你编写整个Java程序。它是Java的REPL（读取-求值-打印循环）。JShell也是一个API，你可以用它来开发提供与JShell命令行工具相同功能的应用程序。\n\
