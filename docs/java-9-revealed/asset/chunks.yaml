    An exports statement is used to export a package to all other modules or to some
    *named modules*.


    All public types in an exported package is accessible at compile-time and runtime.
    At runtime, you can use reflection to access only public members of public types.
    Non-public members of public types are inaccessible using reflection even if you
    use the setAccessible(true) method on those members. The general syntax for the
    exports statement is as follows:


    exports <package>;


    The statement exports all public types in <package> to all other modules. That
    is, any modules that read this module will be able to use all the public types
    in <package>.


    The com.jdojo.address module exports the com.jdojo.address package, so the Address
    class, which is public and in the com.jdojo.address package, can be used by other
    modules. You will be using the Address class in the com.jdojo.person module in
    this example.


