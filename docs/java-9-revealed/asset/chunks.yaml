- fmt: "# How to Work with the Code Array of a Method\n\nAs an application developer,\
    \ you will not use the bytecode index for an execution point in a method. The\
    \ JDK does support reading a class file and all its attributes using internal\
    \ APIs. You can see the bytecode index of each instruction in a method using the\
    \ `javap` tool, which is located in the `JDK_HOME\\bin` directory. You will need\
    \ to use the `-c` option with `javap` to print the code array of methods. The\
    \ following command shows the code array for all methods in the `LegacyStackWalk`\
    \ class:\n\n```\nC:\\Java9Revealed>javap -c com.jdojo.stackwalker\\build\\classes\\\
    com\\jdojo\\stackwalker\\\n\nLegacyStackWalk.class\n```\n\nCompiled from \"LegacyStackWalk.java\"\
    \n\n```\npublic class com.jdojo.stackwalker.LegacyStackWalk {\n  public com.jdojo.stackwalker.LegacyStackWalk();\n\
    \    Code:\n       0: aload_0\n       1: invokespecial #1 // Method java/lang/Object.\"\
    <init>\":()V\n       4: return\n\n  public static void main(java.lang.String[]);\n\
    \    Code:\n       0: invokestatic  #2 // Method m1:()V\n       3: return\n\n\
    \  public static void m1();\n    Code:\n       0: invokestatic  #3 // Method m2:()V\n\
    \       3: return\n\n  public static void m2();\n    Code:\n       0: getstatic\
    \     #4 // Field java/lang/System.out:Ljava/io/PrintStream;\n       3: ldc  \
    \         #5 // String \\nWithout using reflection:\n       5: invokevirtual #6\
    \ // Method java/io/PrintStream.println:(Ljava/lang/String;)V\n       8: invokestatic\
    \  #7 // Method m3:()V\n       ...\n      32: anewarray     #13 // class java/lang/Object\n\
    \      35: invokevirtual #14 // Method java/lang/reflect/Method.invoke:(Ljava/lang/Object;[Ljava/lang/Object;)Ljava/lang/Object;\n\
    \       ...\n\n  public static void m3();\n    Code:\n       0: invokestatic \
    \ #20 // Method java/lang/Thread.currentThread:()Ljava/lang/Thread;\n       3:\
    \ invokevirtual #21 // Method java/lang/Thread.getStackTrace:()[Ljava/lang/StackTraceElement;\n\
    \       ...\n}\n```\n\nWhen you take a snapshot of the call stack in method `m3()`,\
    \ the outputs in the boldface font represent the execution points in each method—`main()`,\
    \ `m1()`, `m2()` and `m3()`. Note that the `m2()` method calls `m3()` twice. For\
    \ the first call, the bytecode index is 8 and, for the second time, it is 35.\n\
    \nThe `getDeclaringClass()` method returns the reference of the `Class` object\
    \ of the class that declares the method represented by the frame. It throws an\
    \ `UnsupportedOperationException` if this `StackWalker` is not configured with\
    \ the `RETAIN_CLASS_REFERENCE` option.\n\nThe `toStackTraceElement()` method returns\
    \ an instance of the `StackTraceElement` class representing the same stack frame.\
    \ This method is handy if you want to use the JDK 9 API to obtain a `StackWalker.StackFrame`,\
    \ but keep using your old code that uses the `StackTraceElement` class to analyze\
    \ the frame.\n\n## Obtaining a StackWalker\n\nThe `StackWalker` class contains\
    \ the following static factory methods that return a `StackWalker` instance:\n\
    \n- `StackWalker getInstance()`\n- `StackWalker getInstance(StackWalker.Option\
    \ option)`\n- `StackWalker getInstance(Set<StackWalker.Option> options)`\n- `StackWalker\
    \ getInstance(Set<StackWalker.Option> options, int estimateDepth)`\n\nYou can\
    \ configure `StackWalker` differently using different versions of the `getInstance()`\
    \ method. The default configuration is to exclude all hidden frames and not to\
    \ retain class references. Versions that let you specify `StackWalker.Option`\
    \ are configured using those options.\n\nThe `estimateDepth` argument is a hint\
    \ that indicates the estimated number of stack frames this `StackWalker` is expected\
    \ to traverse, so the size of an internal buffer may be optimized.\n\nThe following\
    \ snippet of code creates four instances of the `StackWalker` class with different\
    \ configurations:\n\n```java\nimport java.util.Set;\nimport static java.lang.StackWalker.Option.*;\n\
    \n// Get a StackWalker with a default configuration\nStackWalker sw1 = StackWalker.getInstance();\n\
    \n// Get a StackWalker that shows reflection frames\nStackWalker sw2 = StackWalker.getInstance(SHOW_REFLECT_FRAMES);\n\
    \n// Get a StackWalker that shows all hidden frames\nStackWalker sw3 = StackWalker.getInstance(SHOW_HIDDEN_FRAMES);\n\
    \n// Get a StackWalker that shows reflection frames and retains class references\n\
    StackWalker sw4 = StackWalker.getInstance(\n```"
