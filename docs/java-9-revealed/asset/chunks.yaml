    让我们来看一个使用 `SubmissionPublisher` 作为发布者的快速示例。`SubmissionPublisher` 可以通过其 `submit(T
    item)` 方法发布元素。以下代码片段生成并发布了五个整数（1、2、3、4 和 5），假设 `pub` 是 `SubmissionPublisher` 对象的引用：


    // 生成并发布 10 个整数


    LongStream.range(1L, 6L)


    .forEach(pub::submit);


    你需要一个订阅者来消费发布者发布的元素。`SubmissionPublisher` 类包含一个 `consume(Consumer<? super T> consumer)`
    方法，该方法允许你添加一个订阅者，该订阅者希望处理所有已发布的元素，并且对其他通知（如错误通知和完成通知）不感兴趣。该方法返回一个 `CompletableFuture<Void>`，当发布者调用订阅者的
    `onComplete()` 方法时，该 `CompletableFuture` 将完成。以下代码片段向发布者添加了一个 `Consumer`（该 `Consumer`
    在内部被添加为订阅者）：


    // 添加一个打印已发布元素的订阅者


