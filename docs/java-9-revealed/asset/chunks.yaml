    Configuring JShell


    Using the /set command, you can customize the jshell session, ranging from startup
    snippets and commands to setting a platform-specific snippet editor. In this section,
    I explain those customizations in detail.


    Setting the Snippet Editor


    The JShell tool comes with a default snippet editor. In jshell, you can use the
    /edit command to edit all snippets or a specific snippet. The /edit command opens
    the snippet in an editor. The snippet editor is a platform-specific program such
    as notepad.exe on Windows that will be invoked to edit snippets. You can use the
    /set command with editor as an argument to set or delete an editor setting. The
    valid forms of the command are as follows:


    • /set editor [-retain] [-wait] <command>


    • /set editor [-retain] -default


    • /set editor [-retain] -delete


    If you use the -retain option, the setting will persist across jshell sessions.'
