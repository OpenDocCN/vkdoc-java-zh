    在以下代码片段中，假设 `BasicInfo` 类是从类路径加载的，`m1` 和 `m2` 引用的是同一个模块：


    ```java

    Class<BasicInfo> cls = BasicInfo.class;

    Module m1 = cls.getClassLoader().getUnnamedModule();

    Module m2 = cls.getModule();

    ```


    `Module` 类的 `getName()` 方法返回模块的名称。对于未命名模块，它返回 `null`。


    ```java

    // 获取模块名称

    String moduleName = module.getName();

    ```


    `Module` 类中的 `getPackages()` 方法返回一个 `Set<String>`，其中包含模块中的所有包。`getClassLoader()`
    方法返回该模块的类加载器。


    `getLayer()` 方法返回包含该模块的 `ModuleLayer`；如果模块不在任何层中，则返回 `null`。模块层仅包含命名模块。因此，对于未命名模块，此方法始终返回
    `null`。


    **描述模块**


    `ModuleDescriptor` 类的实例表示一个模块定义，它是从模块声明（通常来自 `module-info.class` 文件）创建的。也可以使用
    `ModuleDescriptor.Builder` 类动态创建模块描述符。模块声明可以通过命令行选项（如 `--add-reads`、`--add-exports`
    和 `--add-opens`）以及 `Module` 类中的方法（如 `addReads()`、`addOpens()` 和 `addExports()`）进行增强。`ModuleDescriptor`
    表示在模块声明时添加的模块描述符，而不是增强后的模块描述符。`Module` 类的 `getDescriptor()` 方法返回一个 `ModuleDescriptor`：


    ```java

    Class<BasicInfo> cls = BasicInfo.class;

    Module module = cls.getModule();


    // 获取模块描述符

    ModuleDescriptor desc = module.getDescriptor();

    ```


    第 10 章 ■ 模块 API


    ■ **提示** `ModuleDescriptor` 是不可变的。未命名模块没有模块描述符。`Module` 类的 `getDescriptor()` 方法对于未命名模块返回
    `null`。


    你也可以通过使用 `ModuleDescriptor` 类的某个静态 `read()` 方法，从 `module-info.class` 文件中读取模块声明的二进制形式来创建
    `ModuleDescriptor` 对象。以下代码片段从当前目录读取一个 `module-info.class` 文件。为清晰起见，省略了异常处理：


    ```java

    String moduleInfoPath = "module-info.class";

    ModuleDescriptor desc = ModuleDescriptor.read(new FileInputStream(moduleInfoPath));

    ```


    **表示模块语句**


    `ModuleDescriptor` 类包含以下静态嵌套类，它们的实例表示模块声明中同名的语句：


    - `ModuleDescriptor.Exports`

    - `ModuleDescriptor.Opens`

    - `ModuleDescriptor.Provides`

    - `ModuleDescriptor.Requires`


    请注意，没有 `ModuleDescriptor.Uses` 类来表示 `uses` 语句。这是因为 `uses` 语句表示一个服务接口名称，该名称可以用
    `String` 表示。


    **表示 exports 语句**


    `ModuleDescriptor.Exports` 类的实例表示模块声明中的 `exports` 语句。该类中的以下方法返回 `exports` 语句的组成部分：


    - `boolean isQualified()`

    - `Set<ModuleDescriptor.Exports.Modifier> modifiers()`

    - `String source()`

    - `Set<String> targets()`


    `isQualified()` 方法对于限定导出返回 `true`，对于非限定导出返回 `false`。


    `source()` 方法返回导出包的名称。对于限定导出，`targets()` 方法返回一个不可变的模块名称集合，表示包被导出到的目标模块；对于非限定导出，它返回一个空集合。`modifiers()`
    方法返回 `exports` 语句的修饰符集合，这些修饰符是嵌套枚举 `ModuleDescriptor.Exports.Modifier` 的常量，该枚举包含以下两个常量：


    - `MANDATED`：该导出在源模块声明中被隐式声明。

    - `SYNTHETIC`：该导出在模块声明的源文件中未被显式或隐式声明。


    第 10 章 ■ 模块 API


    **表示 opens 语句**


    `ModuleDescriptor.Opens` 类的实例表示模块声明中的 `opens` 语句。

    '
- fmt: '# Module API


    ## Representing the `opens` Statement


    The following methods in the class return the components of the `opens` statement:


    - `boolean isQualified()`

    - `Set<ModuleDescriptor.Opens.Modifier> modifiers()`

    - `String source()`

    - `Set<String> targets()`


    The `isQualified()` method returns `true` for a qualified `opens` and `false`
    for a non-qualified `opens`.


    The `source()` method returns the name of the open package. For a qualified `opens`,
    the `targets()` method returns an immutable set of module names to which the package
    is open and, for a non-qualified `opens`, it returns an empty set. The `modifiers()`
    method returns the set of modifiers for the `opens` statement that are constants
    of the nested `ModuleDescriptor.Opens.Modifier` enum, which contains the following
    two constants:


    - `MANDATED`: The `opens` was implicitly declared in the source of the module
    declaration.

    - `SYNTHETIC`: The `opens` was not explicitly or implicitly declared in the source
    of the module declaration.


    ## Representing the `provides` Statement


    An instance of the `ModuleDescriptor.Provides` class represents one or more `provides`
    statements for a specific service type in a module declaration. The following
    two `provides` statements specify two implementation classes for the same service
    type `X.Y`:


    ```

    provides X.Y with A.B;

    provides X.Y with Y.Z;

    ```


    One instance of the `ModuleDescriptor.Provides` class will represent both of these
    statements. The following methods in the class return the components of the `provides`
    statement:


    - `List<String> providers()`

    - `String service()`


    The `providers()` method returns the list of the fully qualified class names of
    the provider classes. In the previous example, the returned list will contain
    `A.B` and `Y.Z`. The `service()` method returns the fully qualified name of the
    service type. In the previous example, it will return `X.Y`.


    ## Representing the `requires` Statement


    An instance of the `ModuleDescriptor.Requires` class represents a `requires` statement
    in a module declaration. The following methods in the class return the components
    of the `requires` statement:


    - `Optional<ModuleDescriptor.Version> compiledVersion()`

    - `Optional<String> rawCompiledVersion()`

    - `String name()`

    - `Set<ModuleDescriptor.Requires.Modifier> modifiers()`


    Suppose a module named `M` having a `requires N` statement is compiled. If the
    module version of `N` is available at the time of compilation, that version is
    recorded in the module descriptor of `M`. The `compiledVersion()` method returns
    that recorded version of `N` in an `Optional`. If no version for `N` was available,
    the method returns an empty `Optional`. The module version of the module specified
    in the `requires` statement is recorded in the module descriptor only for informative
    purposes. It is not used at any phase by the module system. However, it can be
    used by tools and frameworks for diagnostic purposes. For example, a tool may
    verify that all modules specified as dependence using the `requires` statement
    must be available with the same or higher version than the one recorded during
    compilation.


    Continuing with the example in the previous paragraph, the `rawCompiledVersion()`
    method returns the version of module `N` in an `Optional<String>`. In most cases,
    the two methods, `compiledVersion()` and `rawCompiledVersion()`, will return the
    same module version, but in two different formats: one in an `Optional<ModuleDescriptor.Version>`
    object and another in an `Optional<String>` object. You can have a module with
    an invalid module version. Such a module may be created and compiled outside the
    Java module system. You can load such a module with an invalid module version
    as a Java module. In such a case, the `compiledVersion()` method returns an empty
    `Optional<ModuleDescriptor.Version>` because the module version cannot be parsed
    as a valid Java module version, whereas the `rawCompiledVersion()` returns an
    `Optional<String>` that contains the invalid module version.


    **Tip:** The `rawCompiledVersion()` method of the `ModuleDescriptor.Requires`
    class may return an unparseable version of the required module.'
