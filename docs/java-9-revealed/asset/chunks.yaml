    \ A `truncatedTo(TemporalUnit unit)` method already existed in the `LocalTime`\
    \ and `Instant` classes in JDK 8.\n\nThe following snippet of code shows you how\
    \ to use this method:\n\n```\nSystem.out.println(\"Truncated to DAYS: \" + compTime.truncatedTo(ChronoUnit.DAYS));\n\
    System.out.println(\"Truncated to HOURS: \" + compTime.truncatedTo(ChronoUnit.HOURS));\n\
    System.out.println(\"Truncated to MINUTES: \" + compTime.truncatedTo(ChronoUnit.MINUTES));\n\
    ```\n\n```\nTruncated to DAYS: PT552H\nTruncated to HOURS: PT555H\nTruncated to\
    \ MINUTES: PT555H45M\n```\n\nThe duration is 23Days:3Hours:45Minutes:30Seconds:0Millis:0Nanos.\
    \ When you truncate this to `DAYS`, all parts smaller than days are dropped and\
