- fmt: "That is, the `com.jdojo.intro` module does not export the `com.jdojo.intro`\
    \ package that contains the `Welcome` class. To fix this error, you need to export\
    \ the `com.jdojo.intro` package of the `com.jdojo.intro` module to the `com.jdojo.intruder`\
    \ module using the `--add-exports` command-line option:\n\n```\nC:\\Java9Revealed>javac\
    \ --module-path com.jdojo.intro\\dist\n--add-exports com.jdojo.intro/com.jdojo.intro=com.jdojo.intruder\n\
    -d com.jdojo.intruder\\build\\classes\ncom.jdojo.intruder\\src\\module-info.java\
    \ com.jdojo.intruder\\src\\com\\jdojo\\intruder\\\nTestNonExported.java\n```\n\
    \n```\nwarning: [options] module name in --add-exports option not found: com.jdojo.intro\n\
    com.jdojo.intruder\\src\\com\\jdojo\\intruder\\TestNonExported.java:4: error:\
    \ package com.jdojo.\nintro is not visible\n  import com.jdojo.intro.Welcome;\n\
    \                ^\n  (package com.jdojo.intro is declared in module com.jdojo.intro,\
    \ but module com.jdojo.\nintruder does not read it)\n1 error\n1 warning\n```\n\
    \nThis time, you get a warning and an error. The error is the same as before.\
    \ The warning message is stating that the compiler could not find the `com.jdojo.intro`\
    \ module. Because there is no dependency on this module, this module is not resolved\
    \ even if it is in the module path. To resolve the warning, you need to add the\
    \ `com.jdojo.intro` module to the default set of root module using the `--add-modules`\
    \ option:\n\n```\nC:\\Java9Revealed>javac --module-path com.jdojo.intro\\dist\n\
    --add-modules com.jdojo.intro\n--add-exports com.jdojo.intro/com.jdojo.intro=com.jdojo.intruder\n\
    -d com.jdojo.intruder\\build\\classes\ncom.jdojo.intruder\\src\\module-info.java\n\
    com.jdojo.intruder\\src\\com\\jdojo\\intruder\\TestNonExported.java\n```\n\nThis\
    \ `javac` command succeeded even though the `com.jdojo.intruder` module does not\
    \ read the `com.jdojo.intro` module. It seems to be a bug. If it is not a bug,\
    \ there is no documentation that I could find to support this behavior. Later,\
    \ you will see that the `java` command won’t work for the same modules.\n\nIf\
    \ this command errors out with a message that the `TestNonExported` class cannot\
    \ access the `Welcome` class, add the following option to it to fix it:\n\n`--add-reads\
    \ com.jdojo.intruder=com.jdojo.intro`\n\nLet’s try rerunning the `TestNonExported`\
    \ class using the following command, which includes the `com.jdojo.intruder` module\
    \ to the module path:\n\n```\nC:\\Java9Revealed>java --module-path com.jdojo.intro\\\
    dist;com.jdojo.intruder\\build\\classes\n--add-modules com.jdojo.intro\n--add-exports\
    \ com.jdojo.intro/com.jdojo.intro=com.jdojo.intruder\n--module com.jdojo.intruder/com.jdojo.intruder.TestNonExported\n\
    ```\n\n```\nException in thread \"main\" java.lang.IllegalAccessError: class com.jdojo.intruder.\n\
    TestNonExported (in module com.jdojo.intruder) cannot access class com.jdojo.intro.Welcome\n\
    (in module com.jdojo.intro) because module com.jdojo.intruder does not read module\
    \ com.\njdojo.intro\n        at com.jdojo.intruder/com.jdojo.intruder.TestNonExported.main(TestNonExported.java:8)\n\
    ```\n\nThe error message is loud and clear. It states that the `com.jdojo.intruder`\
    \ module must read the `com.jdojo.intro` module in order for the former to use\
    \ the latter’s `Welcome` class. You can fix the error by using the `--add-reads`\
    \ option, which will add a read edge (an equivalent of a `requires` statement)\
    \ in the `com.jdojo.intruder` module to read the `com.jdojo.intro` module. The\
    \ following command does this:\n\n```\nC:\\Java9Revealed>java --module-path com.jdojo.intro\\\
    dist;com.jdojo.intruder\\build\\classes\n--add-modules com.jdojo.intro\n--add-exports\
    \ com.jdojo.intro/com.jdojo.intro=com.jdojo.intruder\n--add-reads com.jdojo.intruder=com.jdojo.intro\n\
    --module com.jdojo.intruder/com.jdojo.intruder.TestNonExported\n```\n\n```\nWelcome\
    \ to the Module System.\nModule Name: com.jdojo.intro\n```\n\nThis time, you receive\
    \ the desired output. Figure [9-1](#index_split_003.html#222) shows the module\
    \ graph that is created when this command is run.\n\n```\ncom.jdojo.intruder\n\
    com.jdojo.intro\njava.base\n```\n\n***Figure 9-1.** The module graph after using\
    \ the `--add-modules` and `--add-reads` options*"
