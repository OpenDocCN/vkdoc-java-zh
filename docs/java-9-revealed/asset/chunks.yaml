    ## Setting Up Startup Snippets


    You can use the `/set` command with a `start` argument to set up your startup
    snippets and commands. Startup snippets and commands are automatically executed
    when you launch `jshell`. You have seen the default startup snippets that import
    types from a few commonly used packages. Typically, you would set the class path
    and module path using an `/env` command and import statements to your startup
    script.


    You can print a list of default startup snippets using the `/list -start` command.
    Note that this command prints the default startup snippets, not the current startup
    snippets. Remember you can also drop startup snippets. Default startup snippets
    include what you get when you start `jshell`. Current startup snippets include
    the default startup snippets minus those you have dropped in the current `jshell`
    session.


    You can use one of the following forms of the `/set` command to set startup snippets/commands:


    - `/set start [-retain] <file>`

    - `/set start [-retain] -default`

    - `/set start [-retain] -none`


    Using the `-retain` option is optional. If it is used, the setting persists across
    `jshell` sessions.


    The first form is used to set startup snippets/commands from a file. When a `/reset`
    or a `/reload` command is executed in the current session, the file’s contents
    will be used as startup snippets/commands. Once you set the startup code from
    a file, `jshell` caches the file’s contents for future use. Modifying the file’s
    contents does not affect the startup code until you set the startup snippets/commands
    again.


    The second form is used to set the startup snippets/commands to the built-in default.


    The third form is used to set an empty startup. That is, there will be no snippets/commands
    executed at startup.'
