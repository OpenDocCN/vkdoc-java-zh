    \ Methods with non-var-args arguments exist to avoid boxing the arguments into\
    \ an array, which makes them more efficient. These methods use special implementation\
    \ classes of the `List` interface for smaller lists.\n\nThe returned lists from\
    \ the `of()` method have the following characteristics:\n\n- They are structurally\
    \ immutable. Attempting to add, replace, or delete elements throws an `UnsupportedOperationException`.\n\
    - They do not allow `null` elements. A `NullPointerException` is thrown if an\
    \ element in the list is `null`.\n- They are serializable if all elements are\
    \ serializable.\n- The order of the elements is the same as specified in the `of()`\
    \ method or the array used with the var-args version of the `of(E… elements)`\
    \ method.\n- There is no guarantee about the implementation class of the returned\
    \ `List`. That is, do not expect the returned object to be of `ArrayList` or any\
    \ other class that implements the `List` interface. Implementations of these methods\
    \ are internal and you should make no assumption about their class names. For\
    \ example, `List.of()` and `List.of(\"A\")` may return objects of two different\
    \ classes.\n\nThe `Collections` class contains a static field named `EMPTY_LIST`\
    \ representing an immutable empty list. It also contains a static method named\
    \ `emptyList()` to obtain an immutable empty list. Its `singletonList(T object)`\
    \ method returns an immutable singleton list with the specified element. The following\
