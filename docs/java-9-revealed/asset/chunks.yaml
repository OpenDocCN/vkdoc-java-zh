- fmt: 'Both new elements have default values specified, so the existing uses of the
    annotation do not break.


    The `since` element specifies the version in which the annotated API element became
    deprecated. It is a string and you are expected to follow the same version naming
    convention as the JDK version scheme, for example `"9"`. It defaults to the empty
    string. Note that JDK 9 did not add an element to the `@Deprecated` annotation
    type to specify a description of the deprecation. This was done for two reasons:


    - The annotation is retained at runtime. Adding descriptive text to the annotation
    would add to the runtime memory.

    - The descriptive text cannot be just plain text. For example, it needs to provide
    a link to the replacement of the deprecated API. The existing `@deprecated` Javadoc
    tag already provides this feature.


    The `forRemoval` element indicates that the annotated API element is subject to
    removal in a future release and you should migrate away from the API. It defaults
    to `false`.


    **Tip:** The `@since` Javadoc tag on an element indicates when the API element
    was added, whereas the `since` element of the `@Deprecated` annotation indicates
    when the API element was deprecated. In JDK 9, reasonable efforts have been made
    to backfill these two elements’ values in most, if not all, use-sites of the `@Deprecated`
    annotations in the Java SE APIs.


    Before JDK 9, the deprecation warnings were issued based on the use of the `@Deprecated`
    annotation on the API element and its use-site, as shown in Table 15-1. The warnings
    were issued when a deprecated API element was used at a non-deprecated use-site.
    If both the declaration and its use-site were deprecated, no warnings were issued.
    You were able to suppress deprecation warnings by annotating the use-sites with
    a `@SuppressWarnings("deprecation")` annotation.


    ***Table 15-1.** Matrix of Deprecation Warnings Issued Before JDK 9*


    | **API Use-Site** | **API Declaration Site** | Not Deprecated | Deprecated |

    |------------------|--------------------------|----------------|------------|

    | Not Deprecated   | N                        | W              |            |

    | Deprecated       | N                        | N              |            |


    *N = No warning, W = Warning*


    Addition of the `forRemoval` element in the `@Deprecated` annotation type has
    added five more use-cases. When an API is deprecated with `forRemoval` set to
    `false`, such a deprecation is known as *ordinary deprecation* and the warnings
    issued in such cases are called *ordinary deprecation warnings*. When an API is
    deprecated with `forRemoval` set to `true`, such a deprecation is known as *terminal
    deprecation* and the warnings issued in such cases are called *terminal deprecation
    warnings* or *removal warnings*. Table 15-2 shows the matrix of deprecation warnings
    issued in JDK 9.


    ***Table 15-2.** Matrix of Deprecation Warnings Issued in JDK 9*


    | **API Use-Site** | **API Declaration Site** | Not Deprecated | Ordinarily Deprecated
    | Terminally Deprecated |

    |------------------|--------------------------|----------------|-----------------------|-----------------------|

    | Not Deprecated   | N                        | OW             | RW                    |                       |

    | Ordinarily Deprecated | N                    | N              | RW                    |                       |

    | Terminally Deprecated | N                    | N              | RW                    |                       |


    *N = No warning, OW = Ordinary deprecation warning, RW = Removal deprecation warning*


    For backward compatibility, four upper-left use cases in Table 15-2 are the same
    as in Table 15-1. That is, if your code generated a deprecation warning in JDK
    8, it will continue to generate an ordinary deprecation warning in JDK 9. If the
    API has been terminally deprecated, its use-sites will generate removal warnings
    irrespective of the deprecated status of the use-site.


    In JDK 9, the warning issued in one case, where both the API and its use-site
    are terminally deprecated, needs a little explanation. Both API and the code that
    uses it have been deprecated and both will be removed in the future, so what is
    the point of getting a warning in such a case? This is done to cover cases where
    the terminally deprecated API and its use-site are in two different codebases
    and are maintained independently.'
