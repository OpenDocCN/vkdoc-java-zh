    ## Chapter 7: Creating Custom Runtime Images


    A word of caution if your code is expecting the runtime image to be stored in
    a file named `rt.jar` file.


    The JDK runtime was stored in a `rt.jar` file before JDK 9, but that is no longer
    the case in JDK 9. This might break your code when you migrate your application
    to JDK 9.


    ### Creating Custom Runtime Images


    You can create a custom platform-specific runtime image using the `jlink` tool.
    The runtime image will contain specified application modules and only the needed
    platform modules, thus reducing the size of the runtime image. This is useful
    for applications running on embedded devices that have a small amount of memory.
    The JDK 9 ships with the `jlink` tool. It is located in the `JDK_HOME\bin` directory.
    The general syntax for running the `jlink` tool is as follows:


    ```

    jlink <options> --module-path <modulepath> --add-modules <mods> --output <path>

    ```


    Here, `<options>` includes zero or more options for `jlink`, as listed in Table
    7-1, and `<modulepath>` is the module path where the platform and application
    modules are located to be added to the image. Modules can be in modular JARs,
    exploded directories, and JMOD files. `<mods>` is a list of modules to be added
    to the image, which may cause additional modules to be added because of transitive
    dependencies on other modules. `<path>` is the output directory where the generated
    runtime image will be stored.


    **Table 7-1.** List of Options for the `jlink` Tool


    | Option | Description |

    | --- | --- |

    | `--add-modules <mod>,<mod>...` | Specifies the list of root modules to resolve.
    All resolved modules will be added to the runtime image. |

    | `--bind-services` | Performs full service binding during the linking process.
    If the added modules contain `uses` statements, `jlink` will scan all JMOD files
    on the module path to include all service provider modules in the runtime image
    for the service specified in the `uses` statement. |

    | `-c, --compress <0\|1\|2>[:filter=<pattern-list>]` | Specifies the compression
    level of all resources in the output image. 0 means constant string sharing, 1
    means ZIP, and 2 means both. An optional `<pattern-list>` filter can be specified
    to list the pattern of files to be included. |

    | `--disable-plugin <plugin-name>` | Disables the specified plugin. |

    | `--endian <little\|big>` | Specifies the byte order of the generated runtime
    image. The default is the byte order of the native platform. |

    | `-h,--help` | Prints the usage description and a list of all options for the
    `jlink` tool. |

    | `--ignore-signing-information` | Suppress a fatal error when signed modular
    JARs are linked in the image. The signatures of related files of the signed modular
    JARs are not copied to the runtime image. |

    | `--launcher <command>=<module>` | Specifies the launcher command for the module.
    `<command>` is the name of the command you want to generate to launch your application,
    for example, `runmyapp`. The tool will create a script/batch file named `<command>`
    to run the main class in `<module>`. |

    | `--launcher <command>=<module>/<main-class>` | Specifies the launcher command
    for the module and the main class. `<command>` is the name of the command you
    want to generate to launch your application, for example, `runmyapp`. The tool
    will create a script/batch file named `<command>` to run the `<main-class>` in
    `<module>`. |

    | `--limit-modules <mod>,<mod>` | Limits the observable modules to those in the
    transitive closure of the named modules plus the main module, if specified, as
    well as any further modules specified with the `--add-modules` option. |

    | `--list-plugins` | Lists the available plugins. |

    | `-p, --module-path <modulepath>` | Specifies the module path where the platform
    and application modules will be found to be added to the runtime image. |

    | `--no-header-files` | Excludes the include header files for the native code.
    |

    | `--no-man-pages` | Excludes the manual pages. |

    | `--output <path>` | Specifies the directory where the runtime image will be
    copied. |

    | `--save-opts <filename>` | Saves the `jlink` options used to create the runtime
    image in the specified file. |'
