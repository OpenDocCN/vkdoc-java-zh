    ## Working with Module Layers


    Working with module layers is an advanced topic. A typical Java developer will
    not need to work with module layers directly. Existing applications will not use
    module layers. If you migrate your applications to JDK 9 or develop new applications
    using JDK 9, whether you want it or not, you are using at least one module layer,
    which is created by the JVM at startup. Typically, applications using plugin or
    container architecture will use module layers. In this section, I give a brief
    overview of module layers using a simple example. I will use the terms, module
    layers and layers interchangeably for the balance of the book.


    A *layer* is a set of resolved modules (a module graph) with a function that maps
    each module to a class loader that is responsible for loading all types in that
    module. The set of resolved modules is called a *configuration*. You can visualize
    the relationship between modules, class loaders, configurations, and layers like
    so:


    Configuration = A module graph


    Module Layer = Configuration + (Module -> Class loader)


    Modules are arranged into layers. Layers are arranged hierarchically. A layer
    has at least one parent layer, except the *empty* layer, which, as its name suggests,
    contains no modules and primarily exists to serve as the parent layer for the
    *boot* layer. The boot layer is created by the JVM at startup by resolving the
    application''s initial modules (the root modules) against a set of observable
    modules. Loading types using class loaders has not changed in JDK 9. Class loaders,
    typically, use the parent-first delegation model in which a request to load a
    type is delegated to the parent, which in turn delegates to its parent until the
    bootstrap class loader. If none of the parents loads the type, the class loader
    that initially received the request loads it. Figure [10-1](#index_split_004.html#251)
    shows an example of the way modules, class loaders, and layers are arranged.


    ## Chapter 10 ■ The Module API


    ```

    com.jdojo.test

    com.jdojo.service

    spring.core

    com.jdojo.service

    Class Loader1

    Class Loader2

    Layer1

    Layer2

    java.base

    java.xml

    java.compiler

    java.scripting

    spring.core

    com.jdojo.test

    Bootstrap Class Loader

    Platform Class Loader

    Application Class Loader

    Boot Layer

    Empty Layer

    Java Virtual Machine

