  trans: "\n• `HttpRequest.BodyProcessor fromString(String body)`\n\n• `HttpRequest.BodyProcessor\
    \ fromString(String s, Charset charset)`\n\n这些方法的第一个参数指定了请求体数据的来源。例如，如果请求体由 `String`\
    \ 对象提供，你可以使用 `fromString(String body)` 方法来获取一个主体处理器。\n\n■ **提示** `HttpRequest`\
    \ 类包含一个静态的 `noBody()` 方法，该方法返回一个 `HttpRequest.BodyProcessor`，用于处理无请求体的情况。通常，当某个\
    \ HTTP 方法不接受请求体，但 `method()` 方法要求你传递一个主体处理器时，你会将此方法与 `method()` 方法结合使用。\n\n请求是否可以包含主体取决于用于发送请求的\
    \ HTTP 方法。`DELETE`、`POST` 和 `PUT` 方法包含主体，而 `GET` 方法则不包含。`HttpRequest.Builder`\
    \ 类包含一个与 HTTP 方法名称相同的方法，用于设置请求的方法和主体。例如，要使用带有主体的 `POST` 方法，构建器有一个 `POST(HttpRequest.BodyProcessor\
    \ body)` 方法。\n\n还有许多其他 HTTP 方法，例如 `HEAD` 和 `OPTIONS`，它们在 `HttpRequest.Builder`\
    \ 类中没有对应的方法。该类包含一个 `method(String method, HttpRequest.BodyProcessor body)` 方法，你可以将其用于任何\
    \ HTTP 方法。使用 `method()` 方法时，请确保以全大写形式指定方法名称——例如，`GET`、`POST`、`HEAD` 等。以下是这些方法的列表：\n\
    \n• `HttpRequest.Builder DELETE(HttpRequest.BodyProcessor body)`\n\n• `HttpRequest.Builder\
    \ method(String method, HttpRequest.BodyProcessor body)`\n\n第 14 章 ■ HTTP/2 客户端\
    \ API\n\n• `HttpRequest.Builder POST(HttpRequest.BodyProcessor body)`\n\n• `HttpRequest.Builder\
    \ PUT(HttpRequest.BodyProcessor body)`\n\n以下代码片段从一个 `String` 设置 HTTP 请求的主体，这通常在向\
    \ URL 提交 HTML 表单时完成。表单数据包含三个字段，分别命名为 `n1`、`n2` 和 `op`。\n\n```java\nURI calc =\
    \ new URI(\"http://localhost:8080/webapp/Calculator\");\n\n// 组合表单数据，其中 n1 = 10,\
    \ n2 = 20, op = +\nString formData = \"n1=\" + URLEncoder.encode(\"10\",\"UTF-8\"\
    ) +\n                  \"&n2=\" + URLEncoder.encode(\"20\",\"UTF-8\") +\n    \
    \              \"&op=\" + URLEncoder.encode(\"+\",\"UTF-8\") ;\n\nHttpRequest.Builder\
    \ builder = HttpRequest.newBuilder(calc)\n    .header(\"Content-Type\", \"application/x-www-form-urlencoded\"\
    )\n    .header(\"Accept\", \"text/plain\")\n    .POST(HttpRequest.BodyProcessor.fromString(formData));\n\
    ```\n\n**创建 HTTP 请求**\n\n在前面的章节中，你学习了如何创建 `HttpRequest.Builder` 以及如何使用它来设置 HTTP\
    \ 请求的不同属性。创建 HTTP 请求只需在 `HttpRequest.Builder` 上调用 `build()` 方法，该方法会返回一个 `HttpRequest`\
    \ 对象。以下代码片段创建了一个使用 HTTP `GET` 方法的 `HttpRequest`：\n\n```java\nHttpRequest request\
    \ = HttpRequest.newBuilder()\n    .uri(new URI(\"http://www.google.com\"))\n \
    \   .GET()\n    .build();\n```\n\n以下代码片段构建了一个带有头部和主体的 `HttpRequest`，该请求使用 HTTP\
    \ `POST` 方法：\n\n```java\n// 构建 URI 和表单数据\nURI calc = new URI(\"http://localhost:8080/webapp/Calculator\"\
    );\nString formData = \"n1=\" + URLEncoder.encode(\"10\",\"UTF-8\") +\n      \
    \            \"&n2=\" + URLEncoder.encode(\"20\",\"UTF-8\") +\n              \
    \    \"&op=\" + URLEncoder.encode(\"+\",\"UTF-8\");\n\n// 构建 HttpRequest 对象\n\
