    Module Graph


    The module system knows about only one module: java.base. The java.base module
    does not depend on any other modules. All other modules implicitly depend on the
    java.base module.


    The modular structure of an application can be visualized as a graph called a
    *module graph*. In a module graph, each module is represented as a node. A directed
    edge from a module to another module exists if the first module depends on the
    second module. A module graph is constructed by resolving the dependencies of
    a set of initial modules called *root modules* against a set of modules known
    to the module system called *observable modules*.


    ■ **Tip** Module resolution or resolving a module means that modules on which
    this module depends are available. Suppose a module named P depends on two modules
    named Q and R. resolving module P means you locate modules Q and R and recursively
    resolve module Q and R.


