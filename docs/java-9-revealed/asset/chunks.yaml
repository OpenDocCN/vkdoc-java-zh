    members of all types in the specified package using *reflection* at *runtime*.


    If a module needs to access public types from another module at compile-time and
    private members of types in the same at runtime using reflection, the second module
    can export and open the same package as shown:


    module N {


    exports com.jdojo.claim.model;


    opens com.jdojo.claim.model;


    }


    You will come across three phrases when reading about modules:


    • A module M exports a package P


    • A module M opens a package Q


    • A module M contains a package R


    Chapter 2 ■ the Module SySteM


    The first two phrases correspond to the exports and opens statements in a module.
    The third phrase means that the module contains a package named R that is neither
    exported nor opened. In the early design of the module system, the third situation
    was phrased as “A module M *conceals* a package R”.


    Declaring Dependency


    A requires statement declares dependence of the current module to another module.
    A "requires N"


    statement in a module named M means that the module M depends on (or reads) the
    module N. The statement takes the following forms:


    • requires <module>;


    • requires transitive <module>;


    • requires static <module>;


    • requires transitive static <module>;


    The static modifier in a requires statement makes the dependence mandatory at
    compile-time, but is optional at runtime. A "requires static N" statement in a
    module named M means that the module M


    depends on the module N and the module N must be present at compile-time in order
    to compile the module M; however, the presence of module N at runtime in order
    to use module M is optional. The transitive modifier in a requires statement causes
    any module, which depends on the current module to have implicit dependence on
    the module specified in the requires statement. Suppose there are three modules
    P, Q, and R. Suppose the module Q contains a "requires transitive R" statement.
    If the module P contains a


    "requires Q" statement, it means that the module P implicitly depends on the module
    R.


    Configuring Services


    Java allows using a service provider mechanism in which service providers and
    service consumers are decoupled. JDK 9 allows you to implement services using
    the uses and provides module statements.


    A uses statement specifies the name of a *service interface* that the current
    module may discover and load using the java.util.ServiceLoader class. It takes
    the following form:


    uses <service-interface>;


    An example of using a uses statement is as follows:


    module M {


    uses com.jdojo.prime.PrimeChecker;


    }


    Here, com.jdojo.PrimeChecker is a service interface whose implementation classes
    will be provided by other modules. The module M will discover and load the implementations
    of this interface using the java.util.ServiceLoader class.


    A provides statement specifies one or more service provider implementation classes
    for a service interface. It takes the following form:


    provides <service-interface>


    with <service-impl-class1>, <service-impl-class2>...;


    Chapter 2 ■ the Module SySteM


    An example of using the provides statement is as follows:


    module N {


    provides com.jdojo.prime.PrimeChecker


    with com.jdojo.prime.generic.GenericPrimeChecker;


    }


    It is possible for the same module to provide service implementations and discover
    and load the service. A module can also discover and load one kind of service
    and provide implementation for another kind of service. The following are a few
    examples:


    module P {


    uses com.jdojo.CsvParser;


    provides com.jdojo.CsvParser


    with com.jdojo.CsvParserImpl;


    provides com.jdojo.prime.PrimeChecker


    with com.jdojo.prime.generic.FasterPrimeChecker;


    }


    Module Descriptors


    After learning about how to declare modules in the previous section, you may have
    several questions about the source code for a module declaration:


    • Where do you save a module declaration’s source code? Is it saved in a file?
    If so,


    what is the filename?


    • Where do you place the module declaration source code file?


    • How is the source code for a module’s declaration compiled?


    I will answer these questions before I show you the first modular program in action.


    Compiling Module Declarations


    A module declaration is stored in a file named module-info.java, which is stored
    at the root of the source file hierarchy for that module. The Java compiler compiles
    a module declaration to a file named module-info.class. The module-info.class
    file is known as a *module descriptor* and it is placed at the root of the compiled
    code hierarchy for the module. If you package the compiled code for a module in
    a JAR file, the module-info.class file is stored at the root of the JAR file.


    A module declaration does not contain executable code. In essence, it contains
    configurations for a module. Why don’t we keep a module declaration in a text
    file in XML or JSON format instead of in a class file? The class file was chosen
    as a module descriptor because a class file has an extensible, well-defined format.
    A module descriptor contains the compiled form of a source-level module declaration.
    It can be augmented by tools, e.g. the jar tool, to include additional information
    in class file attributes after the module declaration is initially compiled. The
    class file format also allows developers to use imports and annotations in a module
    declaration.


    Chapter 2 ■ the Module SySteM


    Module Version


    In the initial prototype of the module system, a module declaration also included
    a module version.


    Including the module version in the declaration made the implementation of the
    module system complex, so the module version was dropped from the declaration.


    The extensible format of the module descriptor (class file format) is exploited
    to add a version to a module. When you package a module’s compiled code into a
    JAR, the jar tool provides an option to add the module’s version, which is finally
    added to the module-info.class file. I explain how to add information to a module
    descriptor in Chapt[er 3.](http://dx.doi.org/10.1007/978-1-4842-2592-9)


    Module Source Files Structure


    Let’s walk through an example of organizing the source code and the compiled code
    for a module named com.jdojo.contact. The module contains packages for working
    with contact information, such as addresses and phone numbers. It contains two
    packages:


    • com.jdojo.contact.info


    • com.jdojo.contact.validator


    The com.jdojo.contact.info package contains two classes—Address and Phone. The


    com.jdojo.contact.validator package contains one interface named Validator and
    two classes called AddressValidator and PhoneValidator. Figure [2-9](#index_split_001.html#44)
    shows the contents of the com.jdojo.contact module.


    com.jdojo.contact


    com.jdojo.contact.info


    com.jdojo.contact.validator


    Address


    Validator


    Phone


    AddressValidator


    PhoneValidator


    ***Figure 2-9.** Contents of a module named com.jdojo.contact*'
  trans: "\n`opens` 语句在运行时授予对所有模块或指定模块列表反射访问指定包的权限。其他模块可以使用反射访问指定包中的所有类型以及这些类型的所有成员（私有和公有）。`opens`\
    \ 语句采用以下形式：\n\n• `opens <package>;`\n\n• `opens <package> to <module1>, <module2>...;`\n\
