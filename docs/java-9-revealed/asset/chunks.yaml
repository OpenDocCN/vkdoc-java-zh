    I added the `com.jdojo.address` module to the default set of root modules using
    the `--add-modules` option. You were able to instantiate the `Address` class even
    if the `com.jdojo.intruder` module does not read the `com.jdojo.address` module.
    There two reasons for this:


    - The `com.jdojo.address` module exports the `com.jdojo.address` package, which
    contains the `Address` class. Therefore, the `Address` class is accessible to
    other modules, provided other modules read the `com.jdojo.address` module.

    - The Java Reflection API assumes readability for all reflective operations. This
    rule assumes that the `com.jdojo.intruder` module reads the `com.jdojo.address`
    module, even if in its module declaration the `com.jdojo.intruder` module does
    not read the `com.jdojo.address` module. If you were to use types from the `com.jdojo.address`
    package at compile-time, for example, declaring a variable of the `Address` class
    type, the `com.jdojo.intruder` module must read the `com.jdojo.address` module
    either in its declaration or at command-line.


    ## Chapter 9 ■ Breaking Module Encapsulation


    The output shows that the `TestNonOpen` class was able to call the public `getLine1()`
    method of the `Address` class. However, it threw an exception when it tried to
    access the private `line1` field. Recall that if a type is exported by a module,
    other modules can use reflection to access the public members of that type.


    For other modules to access the private members of the type, the package containing
    the type must be open.


    The `com.jdojo.address` package is not open. Therefore, the `com.jdojo.intruder`
    module cannot access the private `line1` field of the `Address` class. To do so,
    you can use the `--add-opens` option to open the `com.jdojo.address` package to
    the `com.jdojo.intruder` module:


    ```

    C:Java9revealed> java --module-path com.jdojo.address\dist;com.jdojo.intruder\build\classes

    --add-modules com.jdojo.address

    --add-opens com.jdojo.address/com.jdojo.address=com.jdojo.intruder

    --module com.jdojo.intruder/com.jdojo.intruder.TestNonOpen

