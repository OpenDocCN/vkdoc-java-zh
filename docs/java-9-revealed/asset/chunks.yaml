    JDK 9 简介


    JDK 是 Java 开发工具包的第九个主要版本，计划于 2017 年 7 月下旬发布。


    它带来了几个令人兴奋的新特性。本书涵盖了那些对 Java 应用程序开发人员日常编程生活有用的特性。你可以在 [`openjdk.java.net/projects/jdk9/`](http://openjdk.java.net/projects/jdk9/)
    找到所有特性的完整列表。


    JDK 9 最重要、最令人兴奋的特性之一是*模块系统*，它是在代号为 *Jigsaw* 的项目下开发的。JDK 设计者十多年来一直试图将模块系统引入 Java
    平台。它曾计划成为之前几个 JDK 版本的一部分，但后来被放弃了。Jigsaw 也多次推迟了 JDK 9 的发布。Jigsaw 现在终于发布了，你将能够看到它的实际应用。


    Jigsaw 有什么困难，以至于花了这么多年才完成？Jigsaw 的主要目标是让 Java 开发人员能够以称为*模块*的软件组件来开发应用程序。一个模块可以导出其
    API 供公共使用，并封装其内部实现。一个模块还可以声明对其他模块的依赖关系，这些依赖关系可以在启动时进行验证，从而避免与缺少类型相关的运行时意外。JDK
    本身也被分解为一组相互交互的模块。这提供了一个可扩展的运行时。如果你的应用程序只使用 JDK 的一个子集，那么你现在可以创建一个运行时映像，其中包含你的应用程序中使用的
    JDK 模块和你的应用程序模块。模块系统的所有这些特性看起来都很正常。一直困扰 JDK 设计者的主要问题是模块系统的向后兼容性、迁移和适配路径。Java 已经存在了
    20 多年。任何大的特性，包括模块系统，都必须易于采用。根据 Java 社区的反馈，经过多次重新设计和改进的迭代，它终于来了！我用了九章（第 [2 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_2)到[第
    10 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_10)），占本书篇幅的 40% 以上，来描述模块系统。


    JDK 9 的另一个重要补充是 JShell，它是 Java 的 REPL（读取-求值-打印-循环）。JShell 是一个命令行工具和一个 API，它允许你执行一段代码片段并立即获得反馈。


    在 JShell 之前，你必须编写一个完整的程序，编译它，然后运行它才能获得反馈。JShell 是一个你将在日常开发中使用的工具，你可能会想知道没有它你是怎么用
    Java 编程这么多年的。JShell 对初学者至关重要，可以帮助他们快速学习 Java 语言，而无需了解程序结构的细节，例如模块和包。我用第 [11 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_11)来讨论
    JShell。


    © Kishori Sharan 2017

    K. Sharan, *Java 9 揭密*, DOI 10.1007/978-1-4842-2592-9_1


    第 1 章 ■ 引言


    JDK 9 还有其他几个补充，将使你的开发人员生活更轻松。仅举几例，它们是 Reactive Streams API、集合工厂方法、孵化中的 HTTP/2
    客户端 API、堆栈遍历 API、平台日志 API 和统一的 JVM 日志记录。我在本书中广泛讨论了这些主题。


    如何阅读本书


    本书共 20 章。第 [2 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_2)到[第 10 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_10)只涵盖一个主题，即模块系统。它们旨在按顺序阅读。诚然，你可能可以在对模块系统一无所知的情况下将现有应用程序迁移到
    JDK 9。但是，如果你想利用 JDK 9 提供的优势，你必须学习模块系统并开始使用它来开发新的 Java 应用程序，并将遗留应用程序迁移到 JDK 9。第
    [11 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_11)到[第 20 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_20)可以按任意顺序阅读。

