    ## 获取进程句柄


    有几种方法可以获取原生进程的句柄。对于由 Java 代码创建的进程，你可以使用 `Process` 类的 `toHandle()` 方法获取 `ProcessHandle`。原生进程也可以从
    JVM 外部创建。`ProcessHandle` 接口包含以下方法来获取原生进程的句柄：


    - `static Optional<ProcessHandle> of(long pid)`

    - `static ProcessHandle current()`

    - `Optional<ProcessHandle> parent()`

    - `Stream<ProcessHandle> children()`

    - `Stream<ProcessHandle> descendants()`

    - `static Stream<ProcessHandle> allProcesses()`


    `of()` 静态方法返回指定 `pid` 的 `Optional<ProcessHandle>`。如果没有具有此 `pid` 的进程，则返回空的 `Optional`。要使用此方法，你需要知道进程的
    PID：


    ```java

    // Get the process handle of the process with the pid of 1234

    Optional<ProcessHandle> handle = ProcessHandle.of(1234L);

    ```


    `current()` 静态方法返回当前进程的句柄，该句柄始终是执行代码的 Java 进程。你已经在 `Listing [12-2]` 中看到了此方法的示例。


    `parent()` 方法返回父进程的句柄。如果进程没有父进程或无法检索到父进程，则返回空的 `Optional`。


    `children()` 方法返回进程所有直接子进程的快照。无法保证此方法返回的进程仍然存活。请注意，不存活的进程没有子进程。


    `descendants()` 方法返回进程所有子进程（直接或间接）的快照。


    `allProcesses()` 方法返回此进程可见的所有进程的快照。无法保证在处理流时，流中包含操作系统中的所有进程。在拍摄快照后，进程可能已终止或创建。以下代码片段按
    PID 排序并打印所有进程的 PID：


    ```java

    System.out.printf("All processes PIDs:%n");

    ProcessHandle.allProcesses()

    .map(ph -> ph.getPid())

    .sorted()

    .forEach(System.out::println);

    ```


    你可以计算所有正在运行进程的不同类型的统计信息。你还可以在 Java 中创建一个任务管理器，显示所有正在运行的进程及其属性的 UI。`Listing [12-5]`
    展示了如何获取运行时间最长的进程详情以及使用 CPU 时间最多的进程。我通过比较进程的启动时间来获取运行时间最长的进程，通过比较总 CPU 持续时间来获取使用
    CPU 时间最多的进程。你可能会得到不同的输出。我在 Windows 10 上运行程序时得到了这个输出。


    **Listing 12-5.** 计算进程统计信息


    ```java

    // ProcessStats.java


    package com.jdojo.process.api;


    import java.time.Duration;


    import java.time.Instant;


    public class ProcessStats {


    public static void main(String[] args) {


    System.out.printf("Longest CPU User Process:%n");


    ProcessHandle.allProcesses()


    .max(ProcessStats::compareCpuTime)


    .ifPresent(CurrentProcessInfo::printInfo);


    System.out.printf("%nLongest Running Process:%n");


    ProcessHandle.allProcesses()


    .max(ProcessStats::compareStartTime)


    .ifPresent(CurrentProcessInfo::printInfo);


    }


    public static int compareCpuTime(ProcessHandle ph1,


    ProcessHandle ph2) {


    return ph1.info()


    .totalCpuDuration()


    .orElse(Duration.ZERO)


    .compareTo(ph2.info()


    .totalCpuDuration()


    .orElse(Duration.ZERO));


    }


    public static int compareStartTime(ProcessHandle ph1,


    ProcessHandle ph2) {


    return ph1.info()


    .startInstant()


    .orElse(Instant.now())


