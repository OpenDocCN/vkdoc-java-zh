- fmt: '`JShell`工具使用 JLine 版本 2，这是一个用于处理控制台输入的 Java 库。标准 JDK 编译器无法解析和编译 Java 代码片段。因此，`JShell`实现拥有自己的解析器，用于解析片段并确定其类型，例如方法声明、变量声明等。一旦确定了片段类型，该片段将按照以下规则被包装到一个合成类中：


    - 导入语句“按原样”使用。也就是说，所有导入语句都“按原样”放置在合成类的顶部。

    - 变量、方法和类声明成为合成类的静态成员。

    - 表达式和语句被包装在合成类中的一个合成方法内。


    所有合成类都属于名为`REPL`的包。片段被包装后，包装后的源代码将由标准 Java 编译器使用编译器 API 进行分析和编译。编译器将字符串格式的包装源代码作为输入，并将其编译为字节码，字节码存储在内存中。


    生成的字节码通过套接字发送到运行 JVM 的远程进程，以进行加载和执行。


    有时，加载到远程 JVM 中的现有片段需要被`JShell`工具替换，它通过使用 Java 调试器 API 来完成此操作。


    ## 启动 JShell 工具


    JDK 9 附带了一个`JShell`工具，它位于`JDK_HOME\bin`目录中。该工具名为`jshell`。


    如果你在 Windows 上将 JDK 9 安装在`C:\java9`目录中，你将拥有一个名为`C:\java9\bin\jshell.exe`的可执行文件，这就是`JShell`工具。要启动`JShell`工具，你需要打开命令提示符并输入`jshell`命令：


    ```

    C:\Java9Revealed>jshell

    |  Welcome to JShell -- Version 9-ea

    |  For an introduction type: /help intro

    jshell>

    ```


    在命令提示符下输入`jshell`命令可能会报错：


    ```

    C:\Java9Revealed>jshell

    ''jshell'' is not recognized as an internal or external command,

    operable program or batch file.

