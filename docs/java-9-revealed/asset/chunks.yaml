- fmt: '# `FilterProcessor<T>` 类


    `FilterProcessor<T>` 类继承自 `SubmissionPublisher<T>` 类，并实现了 `Flow.Processor<T,T>`
    接口。处理器必须同时是发布者和订阅者。由于继承了 `SubmissionPublisher<T>` 类，因此无需编写代码使其作为发布者工作。该类实现了 `Processor<T,T>`
    接口的所有方法，因此它将接收并发布相同类型的项目。


    构造函数接受一个 `Predicate<? super T>` 并将其存储在名为 `filter` 的实例变量中，该变量将在 `onNext()` 方法中用于过滤项目。


    `onNext()` 方法应用过滤器。如果过滤器返回 `true`，它会将项目重新发布给其订阅者。该类从其超类 `SubmissionPublisher`
    继承了用于重新发布项目的 `submit()` 方法。


    `onError()` 方法异步地将错误重新发布给其订阅者。它使用 `SubmissionPublisher` 类的 `getExecutor()` 和 `getSubscribers()`
    方法，这两个方法返回 `Executor` 和当前订阅者列表。`Executor` 用于异步地向当前订阅者发布消息。


    `onComplete()` 方法关闭处理器的发布者部分，这将向所有订阅者发送 `onComplete` 消息。


    让我们看看这个处理器的实际应用。清单 17-7 包含了 `ProcessorTest` 类的代码。由于此程序涉及多个异步步骤，您可能会得到不同的输出。程序输出后附有详细的程序说明。


    **清单 17-7.** 在发布者-订阅者链中使用处理器


    ```java

    // ProcessorTest.java


    package com.jdojo.stream;


    import java.util.concurrent.CompletableFuture;


    import java.util.concurrent.SubmissionPublisher;


    import java.util.concurrent.TimeUnit;


    import java.util.stream.LongStream;


    public class ProcessorTest {


    public static void main(String[] args) {


    CompletableFuture<Void> subTask = null;


    // The publisher is closed when the try block exits


    try (SubmissionPublisher<Long> pub = new SubmissionPublisher<>()) {


    // Create a Subscriber


    SimpleSubscriber sub = new SimpleSubscriber("S1", 10);


    // Create a processor


    FilterProcessor<Long> filter = new FilterProcessor<>(n -> n % 2 == 0);


    // Subscribe the filter to the publisher and a subscriber to the filter


    pub.subscribe(filter);


    filter.subscribe(sub);


    // Generate and publish 6 integers


    LongStream.range(1L, 7L)


    .forEach(pub::submit);


    }


    try {


    // Sleep for two seconds to let subscribers finish handling all items


    TimeUnit.SECONDS.sleep(2);


    } catch (InterruptedException e) {


    e.printStackTrace();


    }


    }


    }

