    JDK 8 为接口引入了静态方法和默认方法。如果你在这些方法中需要多次执行相同的逻辑，你只能选择重复该逻辑，或者将逻辑移到另一个类中以隐藏实现。考虑名为 `Alphabet`
    的接口，如清单 20-5 所示。


    ***清单 20-5.*** 一个名为 Alphabet 的接口，包含两个共享逻辑的默认方法


    `// Alphabet.java`


    `package com.jdojo.misc;`


    `public interface Alphabet {`


    `default boolean isAtOddPos(char c) {`


    `if (!Character.isLetter(c)) {`


    `throw new RuntimeException("Not a letter: " + c);`


    `}`


    `char uc = Character.toUpperCase(c);`


    `int pos = uc - 64;`


    `return pos % 2 == 1;`


    `}`


    `default boolean isAtEvenPos(char c) {`


    `if (!Character.isLetter(c)) {`


    `throw new RuntimeException("Not a letter: " + c);`


    `}`


    `char uc = Character.toUpperCase(c);`


    `int pos = uc - 64;`


    `return pos % 2 == 0;`


    `}`


    `}`


    `isAtOddPos()` 和 `isAtEvenPos()` 方法检查指定字符在字母表中的位置是奇数还是偶数，假设我们只处理英文字母。该逻辑假设 `A`
    和 `a` 位于位置 1，`B` 和 `b` 位于位置 2，依此类推。注意，这两个方法中的逻辑仅在返回语句上有所不同。除了最后一条语句外，这些方法的整个主体都是相同的。你会同意需要重构此逻辑。将公共逻辑移到另一个方法，并从两个方法中调用新方法将是理想的情况。然而，在
    JDK 8 中你不想这样做，因为接口只支持公共方法。这样做会使第三个方法变为公共方法，从而将其暴露给外部世界，这是你不希望发生的。


    JDK 9 为你解决了这个问题。它允许你在接口中声明私有方法。清单 20-6 sho 展示了使用包含两个方法所用公共逻辑的私有方法重构后的 `Alphabet`
    接口版本。这次，我将接口命名为 `AlphabetJdk9`，只是为了确保我可以在源代码中包含两个版本。现有的两个方法变成了单行方法。


    第 20 章 ■ JDK 9 中的其他变更


    ***清单 20-6.*** 一个名为 AlphabetJdk9 的接口，使用了私有方法


    `// AlphabetJdk9.java`


    `package com.jdojo.misc;`


    `public interface AlphabetJdk9 {`


    `default boolean isAtOddPos(char c) {`


    `return getPos(c) % 2 == 1;`


    `}`


    `default boolean isAtEvenPos(char c) {`


    `return getPos(c) % 2 == 0;`


    `}`


    `**private int getPos(char c) {**`


    `**if (!Character.isLetter(c)) {**`


    `**throw new RuntimeException("Not a letter: " + c);**`


    `**}`


    `**char uc = Character.toUpperCase(c);**`


    `**int pos = uc - 64;**`


    `**return pos;**`


    `**}`


    `}`


    在 JDK 9 之前，接口中的所有方法默认都是隐式公共的。请记住这些适用于所有 Java 程序的简单规则：


    • 私有方法不会被继承，因此不能被重写。


    • final 方法不能被重写。


    • 抽象方法会被继承，并且旨在被重写。


    • 默认方法是一个实例方法，并提供默认实现。它旨在被重写。


    随着 JDK 9 中私有方法的引入，在接口中声明方法时需要遵循一些规则。并非所有修饰符组合——`abstract`、`public`、`private`、`static`
    和 `final`——都受支持，因为它们没有意义。表 20-1 lis 列出了 JDK 9 接口方法声明中受支持和不受支持的修饰符组合。请注意，`final`
    修饰符不允许用于接口的方法声明。根据此列表，你可以在接口中拥有一个私有方法，它要么是非抽象、非默认的实例方法，要么是静态方法。


    第 20 章 ■ JDK 9 中的其他变更


    ***表 20-1.** 接口方法声明中支持的修饰符*


    | **修饰符** | **是否支持？** | **描述** |

    | :--- | :--- | :--- |

    | `public static` | 是 | 自 JDK 8 起支持。 |

    | `public abstract` | 是 | 自 JDK 1 起支持。 |

    | `public default` | 是 | 自 JDK 8 起支持。 |

    | `private static` | 是 | 自 JDK 9 起支持。 |

    | `private` | 是 | 自 JDK 9 起支持。这是一个非抽象实例方法。 |

    | `private abstract` | 否 | 此组合没有意义。私有方法不会被继承，因此不能被重写，而抽象方法必须被重写才有用。 |

    | `private default` | 否 | 此组合没有意义。私有方法不会被继承，因此不能被重写，而默认方法旨在在需要时被重写。 |


    私有方法上的 @SafeVarargs


    *可具体化*类型是其信息在运行时完全可用的类型，例如 `String`、`Integer`、`List` 等。


    *不可具体化*类型是其信息已被编译器通过类型擦除移除的类型，例如 `List<String>`，它在编译后变为 `List`。


    当你使用不可具体化类型的可变参数时，该参数的类型仅对编译器可见。编译器会擦除参数化类型，并将其替换为实际类型的数组——对于无界类型为 `Object[]`，对于有界类型则为类型上界的特定数组。


    编译器无法保证在方法体内对此类不可具体化可变参数执行的操作是安全的。考虑以下方法的定义：


    `<T> void print(T... args) {`


    `for(T element : args) {`


    `System.out.println(element);`


    `}`


    `}`


    编译器会将 `print(T… args)` 替换为 `print(Object[] args)`。此方法体不会对 `args` 参数执行任何不安全操作。考虑以下执行不安全操作的方法声明：


    `public static void unsafe(List<Long>... rolls) {`


    `Object[] list = rolls;`


    `list[0] = List.of("One", "Two");`


    `// 不安全！！！将在运行时抛出 ClassCastException`


    `Long roll = rolls[0].get(0);`


    `}`


    第 20 章 ■ JDK 9 中的其他变更


    `unsafe()` 方法将 `rolls`（一个 `List<String>` 数组）赋值给 `Object[]`，这是可以的。它将一个 `List<String>`
    存储到 `Object[]` 的第一个元素中，这也是允许的。最后一条语句编译正常，因为 `rolls[0]` 的类型被推断为 `List<Long>`，并且
    `get(0)` 方法应该返回一个 `Long`。然而，运行时抛出 `ClassCastException`，因为 `rolls[0].get(0)` 返回的实际类型是
    `String`，而不是 `Long`。


    当你声明像 `print()` 和 `unsafe()` 这样使用不可具体化可变参数类型的方法时，Java 编译器会发出类似这样的未检查警告：


    `warning: [unchecked] Possible heap pollution from parameterized vararg type List<Long>`


    `public static void unsafe(List<Long>... rolls) {`


    `^`


    编译器会为此类方法声明生成一个警告，并为对该方法的每次调用生成一个警告。如果 `unsafe()` 方法被调用五次，你将收到六个警告（一个用于声明，五个用于调用）。你可以通过使用

