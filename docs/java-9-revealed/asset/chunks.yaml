  raw: 'The streamBytes() method returns the current number of bytes consumed from
    the object input stream.


    An object may pass or fail specified filter criteria. Depending on the test result,
    you are supposed to return one of the following constants of the ObjectInputFilter.Status
    enum. Typically, you will use these constants as return values in the checkInput()
    method of your custom filter class.


    • ALLOWED


    • REJECTED


    • UNDECIDED


    Chapter 20 ■ Other Changes in JDK 9


    These constants indicate that the deserialization is allowed, rejected, and undecided.
    Typically, you would return UNDECIDED to mean that some other filter will decide
    whether the deserialization of the current object continues or not. If you are
    creating a filter to blacklist classes, you can return REJECTED for a match for
    the blacklisted classes and UNDECIDED for others. Listing [20-17 con](#index_split_008.html#520)tains
    a simple filter that filters out based on an array’s length.


    ***Listing 20-17.*** An Object Deserialization Filter That Allows Arrays of a
    Specified Length To Be Deserialized


    // ArrayLengthObjectFilter.java


    package com.jdojo.misc;


    import java.io.ObjectInputFilter;


    public class ArrayLengthObjectFilter implements ObjectInputFilter {


    private long maxLenth = -1;


    public ArrayLengthObjectFilter(int maxLength) {


    this.maxLenth = maxLength;


    }


    @Override


    public Status checkInput(FilterInfo info) {


    long arrayLength = info.arrayLength();


    if (arrayLength >= 0 && arrayLength > this.maxLenth) {


    return Status.REJECTED;


    }


    return Status.ALLOWED;


    }


    }


