    that you want to manage using a try-with-resource block. Now, you can use a *final*
    or *effectively final* variable that references a resource to be managed by a
    try-with-resources block.


    JDK 9 added support for the diamond operator in anonymous classes as long as the
    inferred types are denotable.


    You can have a private method in an interface that is either a non-abstract non-default
    instance method or a static method.


    JDK 9 allows the @SafeVarargs annotation on private methods. JDK 8 already allowed
    it on


    constructors, static methods, and final methods.


    JDK 9 added a new constant named DISCARD to the ProcessBuilder.Redirect nested
    class. Its type is ProcessBuilder.Redirect. You can use it as a destination for
    output and error streams of sub-processes when you want to discard the output.
    Implementations discard output by writing to an operating system specific “null
    file”.


    JDK 9 added several methods to the Math and StrictMath classes to support more
    mathematical


    operations such as floorDiv(long x, int y), floorMod(long x, int y), multiplyExact(long
    x,


    int y), multiplyFull(int x, int y), multiplyHigh(long x, long y), etc.


    Chapter 20 ■ Other Changes in JDK 9


    JDK 9 added three methods to the java.util.Optional class: ifPresentOrElse(),
    or(), and stream().


    The ifPresentOrElse() method lets you provide two alternate courses of actions.
    If a value is present, it performs one action. Otherwise, it performs another
    action. The or() method returns the Optional itself if a value is present. Otherwise,
    it returns an Optional returned by the specified supplier. The stream() method
    returns a sequential stream of elements containing the value present in the Optional.
    If the Optional is empty, it returns an empty stream. The stream() method is useful
    in flat maps.


    JDK 9 added a new static onSpinWait() method to the Thread class. It is a pure
    hint to the processor that the caller thread is momentarily not able to proceed,
    so resource usage can be optimized. Use it inside a spin-loop.


    The Time API received a boost in JDK 9\. Several methods were added to the Duration,
    LocalDate, LocalTime, and OffsetTime classes. The LocalDate class received a new
    datesUntil() method that returns a stream of dates between two dates by increments
    of one day or a given period. There are several new formatter symbols in the Time
    API.


    The Matcher class received overloaded versions of several existing methods, which
    used to work with StringBuffer, to support working with StringBuilder. A new method
    called results() returns a Stream<MatchResult>. The Objects class received several
    new utility methods to check the bounds of arrays and collections.


    The java.util.Arrays gained several methods that let you compare arrays and slices
    of arrays for equality and mismatch.


    Javadoc has been enhanced in JDK 9\. It supports HTML5\. You can use a new option,
    -html5, with the javadoc tool to generate Javadoc in HTML5 format. Names of all
    the modules, packages, types, members, and formal parameter types are indexed
    and can be searched using a new search feature. Javadoc displays a search box
    on the upper-right corner of the each main page, which can be used to search indexed
    terms.


    You can also use a new tag, @index, in your Javadoc to make user-defined terms
    searchable. Searching is performed using the client-side JavaScript and no server
    communication is made.


    Many browser vendors have already removed support for the Java browser plugin
    or will be removing it in the near future. Keeping this in mind, JDK 9 deprecated
    the Applet API. All types in the java.applet package and the javax.swing.JApplet
    class have been deprecated. The appletviewer tool has also been deprecated.'
