- fmt: '# JDK 9 Javadoc Enhancements


    JDK 9 introduced a few enhancements to the way Javadoc is written, generated,
    and used. JDK 9 supports HTML5 in Javadoc. By default, the `javadoc` tool still
    generates output in HTML4. A new option, `-html5`, has been added to the tool
    to indicate that you want the output in HTML5:


    ```

    javadoc -html5 <other-options>

    ```


    The `javadoc` tool is located in the `JDK_HOME\bin` directory. Running the tool
    with the `--help` option prints its usage description and all options. A full
    discussion of the `javadoc` tool is beyond the scope of this book.


    The NetBeans IDE lets you generate Javadoc for your project. On the Properties
    dialog box for your project, select **Build ➤ Documenting** to get the Javadoc
    properties sheet where you can specify all options for the `javadoc` tool. To
    generate the Javadoc, select **Generate Javadoc** from the right-click menu options
    for your project.


    JDK 9 keeps the three-frame or no-frames Javadoc layout. The top-left frame contains
    three links: **ALL CLASSES**, **ALL PACKAGES**, and **ALL MODULES**. The **ALL
    MODULES** link was added in JDK 9, which displays a list of all modules. The **ALL
    CLASSES** link lets you view all classes in the bottom-left frame. The other two
    links let you view all packages, all packages in a module, and all modules. Figure
    20-1 shows the changes to the Javadoc page.


    ***Figure 20-1.** The Javadoc for Java SE 9 in a three-frame layout*


    You can also view the Javadoc for a module. Select a module in the upper-left
    frame, click on the module name link that is shown between the upper and the bottom
    frames on the left, and you will see the module’s documentation in the right frame.
    A module’s Javadoc contains a list of all module statements such as `requires`,
    `exports`, etc.


    Consider this scenario. You are looking for logic to implement something in Java
    and find a piece of code on the Internet, which uses a class, but does not show
    the import statement importing that class. You have access to the Javadoc for
    Java SE and you want to know a little more about the class. How do you get the
    package name of the class, which is needed to get to the documentation of the
    class? You search the Internet again. This time, search for the class name, which
    might get you a link to the Javadoc for the class.


    Alternatively, you can copy and paste the piece of code in a Java IDE such as
    NetBeans and Eclipse, and the IDE will help you generate the import statements
    to give you the package name of the class. Don’t worry about this inconvenience
    of searching for the package name of a class in JDK 9.


    There is another addition to the right main frame. All pages in this frame display
    a **Search** box on the top-right (see Figure 20-1). The search box lets you search
    the Javadoc. The `javadoc` tool prepares an index of terms that can be searched.
    To know what is searchable, you need to know the terms that are indexed:


    - You can search for declared names of modules, packages, types, and members.
    The type of formal parameters of constructors and methods are indexed, but not
    the names of those parameters. So, you can search on the type of formal parameter.
    If you enter `"(String, int, int)"` in the search box, it will find you the list
    of constructors and methods that take three formal parameters of `String`, `int`,
    and `int`. If you enter `"util"` as a search term, it will show you a list of
    all packages, types, and members that contain the term `"util"` in their names.


    - JDK 9 introduced a new inline Javadoc tag, `@index`, which can be used to tell
    the `javadoc` tool to index a keyword. It can appear in Javadoc as `{@index <keyword>
    <description>}`, where `<keyword>` is the keyword to be indexed and `<description>`
    is the keyword’s description. The following Javadoc tag is an example of using
    the `@index` tag with a keyword, `jdojo`: `{@index jdojo Info site (www.jdojo.com)
    for the Java 9 Revealed book!}`.


    Everything else that is not listed in this list is not searchable using the Javadoc
    search box. The search box displays found results as a list when you enter the
    search term. The results list is divided into categories such as **Modules**,
    **Packages**, **Types**, **Members**, and **SearchTags**. The **SearchTags** category
    contains results found from the indexed keywords that are specified using `@index`
    tags.


    **Tip:** The Javadoc search does not support regular expressions. The entered
    search keyword is searched for its occurrence anywhere in the indexed terms.


    Figure 20-2 shows you the use of the Javadoc Search box with the list of results.
    I generated the Javadoc for the `com.jdojo.misc` module and used it to search
    for `jdojo`, as shown on the left of the figure. I used the Javadoc for Java SE
    9 to search for the term, `Module`, as shown on the right of the figure.


    ![](index-512_1.jpg)


    ***Figure 20-2.** The Javadoc search box with keywords and searched results*


    You can use the **Up** and **Down** arrow keys to navigate through the search
    results. You can view the details of the search results in one of the following
    two ways:


    - Click on a search result to open the Javadoc for that topic.

    - When a search result is highlighted using the **Up/Down** arrows, press **Enter**
    to open the details on that topic.


    **Tip:** You can use the `-noindex` option with the `javadoc` tool to disable
    the Javadoc search. No index will be generated and no search box will be available
    in the generated Javadoc.


    A Javadoc search is performed locally using client-side JavaScript. There is no
    computation or search logic implemented in the server. If you have disabled JavaScript
    in your browser, you will not be able to use the Javadoc search feature.


    # Native Desktop Features


    Java SE 6 added platform-specific desktop support through the `java.awt.Desktop`
    class. The class supported performing the following operations from a Java application:


    - Opening a URI in the user-default browser

    - Opening a `mailto` URI in the user-default mail client

    - Opening, editing, and printing files using registered applications


    Java SE 9 takes the platform-specific desktop support forward and adds public
    API support for many system and application event notifications, if they are available
    on the current platform. The `java.awt.Desktop` class is still the central class
    for working with platform-specific desktop features. To support so many new desktop
    features, Java SE 9 added a new package, `java.awt.desktop`, to the `java.desktop`
    module. The `java.awt.Desktop` class has also received many new methods. The new
    package contains 30 classes and interfaces. In JDK 9, the Desktop API supports
    24 platform-specific desktop actions and notifications, which are defined by constants
    of the `Desktop.Action` enum. To name a few, they are as follows:


    - Notifications when the attached displays go into or come out of power save

    - Notifications when the system enters sleep or after the system wakes

    - Notifications when the user session changes such as locking/unlocking a user
    session

    - Notifications when the application’s status changes to be or not to be a foreground
    application

    - Notifications when the application is asked to show its **About** dialog box


    You can use these features to optimize resource usage by your application. For
    example, if the system goes into sleep mode, you can stop animations and resume
    them when the system wakes. It is not possible to cover the entire Desktop API
    in this book. I walk you through a step-by-step example. Refer to the API documentation
    of the `java.awt.Desktop` class and the classes and interfaces in the `java.awt.desktop`
    package for more information. The following steps are typical when using a desktop
    feature:


    - Check if the `Desktop` class is supported by the current platform using the
    static `isDesktopSupported()` method of this class. If the method returns `false`,
    you cannot use any desktop features.'
