    Import Statements


    You can use import statements in jshell. Recall that, in a Java program, all types
    in the java.lang package are imported by default. To use types from other packages,
    you need to add appropriate import statements in your compilation unit. We’ll
    start with an example. I will try to create three objects: a String, a List<Integer>,
    and a ZonedDateTime. Note that the String class is in the java.lang package; the
    List and Integer classes are in the java.util and java.lang packages, respectively;
    and the ZonedDateTime class is in the java.time package.


    jshell> String str = new String("Hello")


    str ==> "Hello"


    jshell> List<Integer> nums = List.of(1, 2, 3, 4, 5)


    nums ==> [1, 2, 3, 4, 5]


    jshell> ZonedDateTime now = ZonedDateTime.now()


    | Error:


    | cannot find symbol


    | symbol: class ZonedDateTime


    | ZonedDateTime now = ZonedDateTime.now();


    | ^-----------^


    | Error:


    | cannot find symbol


    | symbol: variable ZonedDateTime


    | ZonedDateTime now = ZonedDateTime.now();


    | ^-----------^


    jshell>


    The examples generate an error if you try to use the ZonedDateTime class from
    the java.time package.


    We were also expecting a similar error when we try to create a List because it
    is in the java.util package, which is not imported in a Java program by default.


    Chapter 11 ■ the Java Shell


    The sole purpose of the JShell tool is to make developers’ lives easier when evaluating
    snippets. To achieve this goal, the tool imports all types from a few packages
    by default. What are those default packages whose types are imported? You can
    print a list of all active imports in jshell using the /imports command: jshell>
    /imports


    | import java.io.*


    | import java.math.*


    | import java.net.*


    | import java.nio.file.*


    | import java.util.*


    | import java.util.concurrent.*


    | import java.util.function.*


    | import java.util.prefs.*


    | import java.util.regex.*


    | import java.util.stream.*


    jshell>


    Notice the default import statement that imports all types from the java.util
    package. This is the reason that you can create a list without importing it. You
    can also add your own imports to jshell. The following example shows you how to
    import the ZonedDateTime class and use it. You will get different output when
    jshell prints the value of the current date with the time zone.


    jshell> /imports


    | import java.util.*


    | import java.io.*


    | import java.math.*


    | import java.net.*


    | import java.util.concurrent.*


    | import java.util.prefs.*


    | import java.util.regex.*


