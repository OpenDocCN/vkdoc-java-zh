    Using Plugins with the jlink Tool


    The jlink tool uses a plugin architecture to create runtime images. It collects
    all classes, native libraries, and configuration files into a set of resources.
    It builds a pipeline of transformers, which are plugins specified as command-line
    options. Resources are fed into the pipeline. Each transformer in the pipeline
    applies some kind of transformation to resources and the transformed resources
    are fed to the next transformer. At the end, jlink feeds the transformed resources
    to an image builder.


    ChAptEr 7 ■ CrEAtInG CustoM runtIME IMAGEs


