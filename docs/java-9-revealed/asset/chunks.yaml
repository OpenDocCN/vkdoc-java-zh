    避免模块路径问题的最佳方法是不要将展开的目录用作模块定义。


    将两个目录作为模块路径——一个目录包含所有应用程序模块化 JAR，另一个目录包含所有外部库的模块化 JAR。例如，在 Windows 上，你可以使用 `C:\applib;C:\extlib`
    作为模块路径，其中 `C:\applib` 目录包含所有应用程序模块化 JAR，`C:\extlib` 目录包含所有外部库的模块化 JAR。


    第 2 章 ■ 模块系统


    JDK 9 已更新其所有工具，以使用模块路径来查找模块。这些工具提供了新的选项来指定模块路径。在 JDK 9 之前，你看到的是以连字符 (-) 开头的 UNIX
    风格选项，例如 `-cp` 和 `-classpath`。随着 JDK 9 中新增了如此多的选项，JDK 设计者难以再为选项提供既简短又对开发者有意义的名称。因此，JDK
    9 开始使用 GNU 风格选项，其中选项以两个连续的连字符开头，单词之间用连字符分隔。


    以下是 GNU 风格命令行选项的几个示例：


    • `--class-path`


    • `--module-path`


    • `--module-version`


    • `--main-class`


    • `--print-module-descriptor`


    ■ **提示** 要打印工具支持的所有标准选项列表，请使用 `--help` 或 `-h` 选项运行该工具；要打印所有非标准选项，请使用 `-X` 选项运行该工具。例如，`java
    -h` 和 `java -X` 命令将分别打印 `java` 命令的标准和非标准选项列表。


    JDK 9 中的大多数工具，例如 `javac`、`java` 和 `jar`，都支持两个选项来在命令行上指定模块路径。它们是 `-p` 和 `--module-path`。为了向后兼容，现有的
    UNIX 风格选项将继续得到支持。以下两个命令展示了如何使用这两个选项为 `java` 工具指定模块路径：


    // 使用 GNU 风格选项


    C:\>java --module-path C:\applib;C:\lib other-args-go-here


    // 使用 UNIX 风格选项


    C:\>java -p C:\applib;C:\extlib other-args-go-here


    在本书的所有示例中，我使用 GNU 风格选项 `--module-path` 来指定模块路径。


    当你使用 GNU 风格选项时，可以通过以下两种形式之一来指定选项的值：


    • `--<name> <value>`


    • `--<name>=<value>`


    之前的命令也可以写成如下形式：


    // 使用 GNU 风格选项


    C:\>java --module-path**=**C:\applib;C:\lib other-args-go-here


    当使用空格作为名称-值分隔符时，你至少需要使用一个空格。当你使用 `=` 作为分隔符时，其周围不能包含任何空格。选项 `--module-path=C:\applib`
    是有效的。选项 `--module-path =C:\applib` 是无效的，因为 `=C:\applib` 将被解释为模块路径，而这是一个无效路径。


    第 2 章 ■ 模块系统


    可观察模块


    在模块查找过程中，模块系统使用不同类型的模块路径来定位模块。在模块路径上找到的模块集与系统模块一起被称为*可观察模块*。你可以将可观察模块视为在特定阶段（例如编译时、链接时和运行时）可供模块系统使用或可供工具使用的所有模块的集合。


    JDK 9 为 `java` 命令添加了一个名为 `--list-modules` 的新选项。该选项可用于打印两种信息：可观察模块的列表以及一个或多个模块的描述。该选项可以通过两种形式使用：


    • `--list-modules`


    • `--list-modules <module1>,<module2>...`


    在第一种形式中，选项后面不跟任何模块名称。它会打印可观察模块的列表。在第二种形式中，选项后面跟一个逗号分隔的模块名称列表，这会打印指定模块的模块描述符。


    以下命令打印可观察模块的列表，其中仅包含系统模块：c:\Java9Revealed> java --list-modules


    java.base@9-ea


    java.se.ee@9-ea


    java.sql@9-ea


    javafx.base@9-ea


    javafx.controls@9-ea


    jdk.jshell@9-ea


    jdk.unsupported@9-ea


    ...


    显示的输出是部分内容。输出中的每个条目包含两部分——模块名称和版本字符串，两者由 `@` 符号分隔。第一部分是模块名称，第二部分是模块的版本字符串。例如，在
    `java.base@9-ea` 中，`java.base` 是模块名称，`9-ea` 是版本字符串。


    在版本字符串中，数字 9 代表 JDK 9，`ea` 代表*早期访问*。当你运行该命令时，可能会得到不同的版本字符串输出。


    我将三个模块化 JAR 放在了我的 `C:\Java9Revealed\lib` 目录中。如果我将 `C:\Java9Revealed\lib` 作为模块路径提供给
