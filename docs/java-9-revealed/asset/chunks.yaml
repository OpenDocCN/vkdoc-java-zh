    \ `int` 和 `double`。如何验证这一点？我们先采用一种笨办法。你可以将 `$1` 和 `$2` 转换为 `Object` 并调用它们的 `getClass()`\
    \ 方法，这应该会得到 `Integer` 和 `Double`。请注意，当你将它们转换为 `Object` 时，`int` 和 `double` 类型的原始值在这些例子中被装箱为\
