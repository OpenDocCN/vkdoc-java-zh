    Suppressing Deprecation Warnings


    Introduction of removal warnings in JDK 9 has added a new use-case for suppressing
    deprecation warnings.


    Before JDK 9, could suppress all deprecation warnings by annotating the use-site
    with a @SuppressWarnings ("deprecation") annotation. Consider a scenario:


    • In JDK 8, an API is deprecated and the use-site suppresses the deprecation warning.


    • In JDK 9, the API’s deprecation changes from ordinary deprecation to terminal


    deprecation.


    • The use-site compiles fine in JDK 9 because it has suppressed deprecation warnings


    in JDK 8.


    • The API is removed and the use-site receives an unexpected runtime error without


    receiving any removal warning earlier.


    To cover such scenarios, JDK 9 does not suppress removal warnings when you use
    @SuppressWarni ngs("deprecation"). It suppresses only ordinary deprecation warnings.
    To suppress removal warnings, you need to use @SuppressWarnings("removal"). If
    you want to suppress both ordinary and removal deprecation warnings, you need
    to use @SuppressWarnings({“deprecation”, "removal"}).


    Chapter 15 ■ enhanCed depreCation


    A Deprecated API Example


    In this section, I show you all use-cases of deprecating APIs, using the deprecated
    API with and without suppressing warnings with a simple example. In the example,
    I deprecate only methods and use them to generate compile-time warnings. You are,
    however, not limited to deprecating only methods. Comments on the methods should
    help you understand the expected behavior. Listin[g 15-2 con](#index_split_006.html#398)tains
    the code for a class named Box. The class contains three methods—one in each category
    of deprecation—not deprecated, ordinarily deprecated, and terminally deprecated.
