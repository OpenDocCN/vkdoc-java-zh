- fmt: "`Set.of(SHOW_REFLECT_FRAMES, RETAIN_CLASS_REFERENCE)`。\n\n**Tip** 一个`StackWalker`是线程安全且可重用的。多个线程可以使用同一个实例来遍历它们自己的栈。\n\
    \n下一节将解释如何使用`StackWalker`来遍历栈帧。\n\n## 遍历栈\n\n现在是时候遍历一个线程的栈帧了。`StackWalker`类包含两个方法，允许你遍历*当前线程*的栈：\n\
    \n- `void forEach(Consumer<? super StackWalker.StackFrame> action)`\n- `<T> T\
    \ walk(Function<? super Stream<StackWalker.StackFrame>,? extends T> function)`\n\
    \n如果你需要遍历整个栈，请使用`forEach()`方法。指定的`Consumer`将依次从栈中获取一个帧，从最顶层的帧开始。以下代码片段打印了由`StackWalker`返回的每个帧的详细信息：\n\
    \n```\n// 打印当前线程所有栈帧的详细信息\nStackWalker.getInstance()\n    .forEach(System.out::println);\n\
    ```\n\n如果你想要自定义栈遍历，例如使用过滤器和映射，请使用`walk()`方法。\n\n`walk()`方法接受一个`Function`，该函数接受一个`Stream<StackWalker.StackFrame>`作为参数，并可以返回任何类型的对象。`StackWalker`将创建栈帧流并将其传递给您的函数。当函数完成时，`StackWalker`将关闭该流。传递给`walk()`方法的流只能被遍历一次。尝试第二次遍历该流会抛出`IllegalStateException`。\n\
    \n以下代码片段使用`walk()`方法遍历整个栈，打印每个帧的详细信息。此代码片段与之前使用`forEach()`方法的代码片段执行相同的操作。\n\n\
    ```\n// 打印当前线程所有栈帧的详细信息\nStackWalker.getInstance()\n    .walk(s -> {\n       \
    \ s.forEach(System.out::println);\n        return null;\n    });\n```\n\n**Tip**\
    \ `StackWalker`的`forEach()`方法用于一次处理一个栈帧，而`walk()`方法用于将整个栈作为帧流进行处理。你可以使用`walk()`方法来模拟`forEach()`方法的功能，但反之则不行。\n\
    \n你可能想知道为什么`walk()`方法不返回栈帧流，而是将流传递给您的函数。不从此方法返回栈帧流是故意的。流的元素是惰性求值的。一旦创建了栈帧流，JVM\
    \ 就可以自由地重新组织栈，并且没有明确的方法来检测当您仍然持有对其流的引用时栈是否已更改。这就是创建和关闭栈帧流由`StackWalker`类控制的原因。\n\
    \n由于`Streams API`非常广泛，`walk()`方法的使用也是如此。在向您展示一个完整示例之前，我将展示它的一些示例用法。以下代码片段将当前线程的栈帧快照获取到一个`List`中。\n\
    \n```\nimport java.lang.StackWalker.StackFrame;\nimport java.util.List;\nimport\
    \ static java.util.stream.Collectors.toList;\n...\nList<StackFrame> frames = StackWalker.getInstance()\n\
    \    .walk(s -> s.collect(toList()));\n```\n\n以下代码片段将当前线程所有栈帧的字符串形式收集到一个`List`中，排除了那些代表方法名称以`m2`开头的帧：\n\
    \n```\nimport java.util.List;\nimport static java.util.stream.Collectors.toList;\n\
    ...\nList<String> list = StackWalker.getInstance()\n    .walk(s -> s.filter(f\
    \ -> !f.getMethodName().startsWith(\"m2\"))\n                .map(f -> f.toString())\n\
    \                .collect(toList())\n    );\n```\n\n以下代码片段将当前线程所有栈帧的字符串形式收集到一个`List`中，排除了那些代表声明类名称以`Test`结尾的帧：\n\
    \n```\nimport static java.lang.StackWalker.Option.RETAIN_CLASS_REFERENCE;\nimport\
    \ java.util.List;\nimport static java.util.stream.Collectors.toList;\n...\nList<String>\
    \ list = StackWalker\n    .getInstance(RETAIN_CLASS_REFERENCE)\n```"
