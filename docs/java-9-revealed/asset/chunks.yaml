    3 is a prime: true\n10 is a prime: false\n```\n\n## Accessing Module Resources\n\
    \nA module may contain resources such as images, audio/video clips, property files,\
    \ and policy files. Class files (`.class` files) in a module are also considered\
    \ resources. The `Module` class contains a `getResourceAsStream()` method to retrieve\
    \ a resource using the resource name:\n\n```\nInputStream getResourceAsStream(String\
    \ name) throws IOException\n```\n\nRefer to Chapter 8, which covers how to access\
    \ a module’s resources at length.\n\n## Annotation on Modules\n\nYou can use annotations\
    \ on module declarations. The `java.lang.annotation.ElementType` enum has a new\
    \ value called `MODULE`. If you use `MODULE` as a target type on an annotation\
    \ declaration, it allows the annotation to be used on modules. In Java 9, two\
    \ annotations—`java.lang.Deprecated` and `java.lang.SuppressWarnings`—have been\
    \ updated to be used on module declarations. They can be used as follows:\n\n\
    ```\n@Deprecated(since=\"1.2\", forRemoval=true)\n@SuppressWarnings(\"unchecked\"\
