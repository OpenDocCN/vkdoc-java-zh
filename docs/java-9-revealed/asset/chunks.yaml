  raw: 'A system resource is a resource found on the class path—bootstrap class paths,
    JARs in the extension directories, and application class paths. A non-system resource
    may be stored in locations other than class path such as in specific directories,
    on the network, or in a database. The getSystemResource() method finds a resource
    using the application class loader delegating to its parent, which is the extension
    class loader, which in turn delegates to its parent, the bootstrap class loader.
    If your application is a standalone application, and it uses only the three built-in
    JDK class loaders, you will be fine using the static methods named getSystemResource*.
    It will find all resources on the class path, including the resources in the runtime
    image such as in the rt.jar file. If your application is an applet running in
    a browser, or an enterprise application running in an application server or a
    web server, you should use the instance methods named getResource*, which let
    you find a resource using a specific class loader. If you call the getResource*
    methods on a Class object, the current class loader, the class loader that loads
    the Class object, is used to find the resource.


    Resource names passed to all methods in the ClassLoader class are absolute and
    they do not start with a slash (/). For example, when calling the getSystemResource()
    method of the ClassLoader, you would use java/lang/Object.class as the resource
    name.


    The resource-finding methods in the Class class let you specify absolute and relative
    resource names.


    An absolute resource name starts with a slash whereas a relative resource name
    does not. When an absolute name is used, methods in the Class class remove the
    leading slash and delegate to the class loader that loaded the Class object to
    find the resource. The following call


    Test.class.getResource("/resources/test.config");


    is transformed into


    Test.class.getClassLoader()


    .getResource("resources/test.config");


    Chapter 8 ■ Breaking Changes in JDk 9


    When a relative name is used, methods in the Class class prepend the package name,
    substituting dots in the package name with slashes followed with a slash, before
    delegating to the class loader that loaded the Class object to find the resource.
    Assuming that the Test class is in the com.jdojo.test package, the following call


    Test.class.getResource("resources/test.config");


    is transformed into


    Test.class.getClassLoader()


    .getResource("com/jdojo/test/resources/test.config");


    Let’s look at an example of finding resources in a pre-JDK 9 release. I run the
    example using JDK 8.


    You can find its source code along with a NetBeans project in the downloadable
    source code for this book.


    The NetBeans project is named com.jdojo.resource.preJDK9\. If you create your
