    \ M 的模块中，`requires static N` 语句意味着模块 M 依赖于模块 N，并且为了编译模块 M，模块 N 必须在编译时存在；然而，为了使用模块\
    \ M，模块 N 在运行时的存在是可选的。`requires` 语句中的 `transitive` 修饰符会导致任何依赖于当前模块的模块隐式地依赖于 `requires`\
    \ 语句中指定的模块。假设有三个模块 P、Q 和 R。假设模块 Q 包含一个 `requires transitive R` 语句。如果模块 P 包含一个\
    \ `requires Q` 语句，则意味着模块 P 隐式地依赖于模块 R。\n\n**配置服务**\n\nJava 允许使用服务提供者机制，在该机制中，服务提供者和服务消费者是解耦的。JDK\
    \ 9 允许你使用 `uses` 和 `provides` 模块语句来实现服务。\n\n`uses` 语句指定当前模块可以使用 `java.util.ServiceLoader`\
