    \ ZoneId.systemDefault());\n    }\n}\n```\n\n**Listing 6-5.** A Main Class for\
    \ JDK 9\n\n```java\n// Main.java\npackage com.jdojo.mrjar;\n\nimport java.time.Instant;\n\
    import java.time.LocalDate;\n\npublic class Main {\n    public static void main(String[]\
    \ args) {\n        System.out.println(\"Inside JDK 9 version of Main.main()...\"\
    );\n        TimeUtil t = new TimeUtil();\n        LocalDate ld = t.getLocalDate(Instant.now());\n\
    \        System.out.println(\"Local Date: \" + ld);\n    }\n}\n```\n\n```\nInside\
    \ JDK 9 version of Main.main()...\nCreating JDK 9 version of TimeUtil...\nLocal\
    \ Date: 2017-01-27\n```\n\nI have shown the output that you will get when you\
    \ run the `Main` class on JDK 8 and JDK 9. However, the purpose of this example\
    \ is not to run those two classes individually, but rather to package them all\
    \ in a MRJAR and run them from that MRJAR, which I am going to show you shortly.\n\
    \nThe `jar` tool has been enhanced in JDK 9 to support creating MRJARs. In JDK\
    \ 9, the `jar` tool accepts a new option, called `--release`. Its syntax is as\
    \ follows:\n\n```\njar <options> --release N <other-options>\n```\n\nHere, `N`\
    \ is a JDK major version such as 9 for JDK 9. The value for `N` must be greater\
    \ than or equal to 9. All files following the `--release N` option are added to\
    \ the `META-INF/versions/N` directory in the MRJAR.\n\nThe following command creates\
    \ a MRJAR named `com.jdojo.mrjar.jar` and places it in the `C:\\Java9Revealed\\\
    mrjars` directory, which is an existing directory:\n\n```\nC:\\Java9Revealed>jar\
    \ --create --file mrjars\\com.jdojo.mrjar.jar\n    -C com.jdojo.mrjar.jdk8\\build\\\
    classes .\n    --release 9 -C com.jdojo.mrjar.jdk9\\build\\classes .\n```\n\n\
    Notice the use of the `--release 9` option in this command. All files from the\
    \ `com.jdojo.mrjar.jdk9\\build\\classes` directory will be added to the `META-INF/versions/9`\
    \ directory in the MRJAR. All files from the `com.jdojo.mrjar.jdk8\\build\\classes`\
    \ directory will be added to the root of the MRJAR. The entries in the MRJAR will\
    \ look like:\n\n```\n- jar-root\n    - com\n        - jdojo\n            - mrjar\n\
    \                - Main.class\n                - TimeUtil.class\n    - META-INF\n\
    \        - MANIFEST.MF\n        - versions\n            - module-info.class\n\
    \            - com\n                - jdojo\n                    - mrjar\n   \
    \                     - Main.class\n                        - TimeUtil.class\n\
    ```\n\nIt is very helpful to use the `--verbose` option with the `jar` tool while\
    \ creating MRJARs. The option prints out many useful pieces of information that\
    \ help diagnose errors. The following is the same command as before, but with\
    \ the `--verbose` option. The output shows what files were copied and their locations:\n\
    \n```\nC:\\Java9Revealed>jar --create --verbose --file mrjars\\com.jdojo.mrjar.jar\n\
    \    -C com.jdojo.mrjar.jdk8\\build\\classes .\n    --release 9 -C com.jdojo.mrjar.jdk9\\\
    build\\classes .\nadded manifest\nadded module-info: META-INF/versions/9/module-info.class\n\
    adding: com/(in = 0) (out= 0)(stored 0%)\nadding: com/jdojo/(in = 0) (out= 0)(stored\
    \ 0%)\nadding: com/jdojo/mrjar/(in = 0) (out= 0)(stored 0%)\nadding: com/jdojo/mrjar/Main.class(in\
    \ = 1100) (out= 592)(deflated 46%)\nadding: com/jdojo/mrjar/TimeUtil.class(in\
    \ = 884) (out= 503)(deflated 43%)\nadding: META-INF/versions/9/(in = 0) (out=\
    \ 0)(stored 0%)\nadding: META-INF/versions/9/.netbeans_automatic_build(in = 0)\
    \ (out= 0)(stored 0%)\nadding: META-INF/versions/9/.netbeans_update_resources(in\
    \ = 0) (out= 0)(stored 0%)\nadding: META-INF/versions/9/com/(in = 0) (out= 0)(stored\
    \ 0%)\nadding: META-INF/versions/9/com/jdojo/(in = 0) (out= 0)(stored 0%)\nadding:\
    \ META-INF/versions/9/com/jdojo/mrjar/(in = 0) (out= 0)(stored 0%)\nadding: META-INF/versions/9/com/jdojo/mrjar/Main.class(in\
    \ = 1328) (out= 689)(deflated 48%)\nadding: META-INF/versions/9/com/jdojo/mrjar/TimeUtil.class(in\
    \ = 814) (out= 470)(deflated 42%)\n```\n\nSuppose you want to create a MRJAR for\
    \ JDK versions 8, 9, and 10. The following command will do the job, assuming that\
    \ the `com.jdojo.mrjar.jdk10\\build\\classes` directory contains classes that\
    \ are specific to JDK 10:\n\n```\nC:\\Java9Revealed>jar --create --file mrjars\\\
    com.jdojo.mrjar.jar\n    -C com.jdojo.mrjar.jdk8\\build\\classes .\n    --release\
    \ 9 -C com.jdojo.mrjar.jdk9\\build\\classes .\n    --release 10 -C com.jdojo.mrjar.jdk10\\\
    build\\classes .\n```\n\nYou can verify the entries in the MRJAR by using the\
    \ `--list` option as follows:\n\n```\nC:\\Java9Revealed>jar --list --file mrjars\\\
    com.jdojo.mrjar.jar\nMETA-INF/\nMETA-INF/MANIFEST.MF\ncom/\ncom/jdojo/\ncom/jdojo/mrjar/\n\
    com/jdojo/mrjar/Main.class\ncom/jdojo/mrjar/TimeUtil.class\nMETA-INF/versions/9/\n\
    META-INF/versions/9/com/\nMETA-INF/versions/9/com/jdojo/\nMETA-INF/versions/9/com/jdojo/mrjar/\n\
    META-INF/versions/9/com/jdojo/mrjar/Main.class\nMETA-INF/versions/9/com/jdojo/mrjar/TimeUtil.class\n\
    META-INF/versions/9/module-info.class\nMETA-INF/versions/10/\nMETA-INF/versions/10/com/\n\
    META-INF/versions/10/com/jdojo/\nMETA-INF/versions/10/com/jdojo/mrjar/\nMETA-INF/versions/10/com/jdojo/mrjar/TimeUtil.class\n\
    ```\n\nSuppose you have a JAR that contains resource and class files for JDK 8\
    \ and you want to update the JAR to make it a MRJAR by adding resource and class\
    \ files for JDK 9. You can do so by updating the contents of the JAR using the\
    \ `--update` option. The following command creates a JAR with only JDK 8 files:\n\
    \n```\nC:\\Java9Revealed>jar --create --file mrjars\\com.jdojo.mrjar.jar\n   \
    \ -C com.jdojo.mrjar.jdk8\\build\\classes .\n```\n\nThe following command updates\
    \ the JAR to make it a MRJAR:\n\n```\nC:\\Java9Revealed>jar --update --file mrjars\\\
    com.jdojo.mrjar.jar\n    --release 9 -C com.jdojo.mrjar.jdk9\\build\\classes .\n\
    ```\n\nTake a look at this MRJAR in action. The following command runs the `Main`\
    \ class in the `com.jdojo.mrjar` package, placing the MRJAR on the class path.\
    \ JDK 8 is used to run the class.\n\n```\nC:\\Java9Revealed> c:\\java8\\bin\\\
    java -classpath mrjars\\com.jdojo.mrjar.jar com.jdojo.mrjar.Main\nInside JDK 8\
    \ version of Main.main()...\nCreating JDK 8 version of TimeUtil...\nLocal Date:\
    \ 2017-01-27\n```\n\nThe output shows that both classes, `Main` and `TimeUtil`,\
    \ were used from the root directory of the MRJAR because JDK 8 does not support\
    \ MRJAR. The following command runs the same class using the module path. JDK\
    \ 9 was used to run the command:\n\n```\nC:\\Java9Revealed> c:\\java9\\bin\\java\
    \ --module-path mrjars\\com.jdojo.mrjar.jar --module com.jdojo.mrjar/com.jdojo.mrjar.Main\n\
    Inside JDK 9 version of Main.main()...\nCreating JDK 9 version of TimeUtil...\n\
    Local Date: 2017-01-27\n```\n\nThe output shows that both classes, `Main` and\
    \ `TimeUtil`, were used from the `META-INF/versions/9` directory of the MRJAR\
    \ because JDK 9 supports MRJAR and the MRJAR had versions of these classes specific\
    \ to JDK 9.\n\nLet’s give this MRJAR a little twist. Create a MRJAR having the\
    \ same contents, but without the `Main`."
