    Processing the Response Body


    Processing the body of an HTTP response is a two-step process:


    • You need to specify a response body handler, which is an instance of the


    HttpResponse.BodyHandler<T> interface, when you send a request using the send()


    or sendAsync() method of the HttpClient class.


    • When the response status code and headers are received, the apply() method of
    the


    response body handler is called. The response status code and headers are passed
    to


    the apply() method. The apply() method returns an instance of the HttpResponse.


    BodyProcessor<T> interface, which reads the response body and converts the read


    data into the type T.


    Don’t worry about these details of processing a response body. Several implementations
    of the HttpResponse.BodyHandler<T> are provided. You can use one of the following
    static factory methods of the HttpResponse.BodyHandler interface to gets its instance
    for a different type parameter T:


    • HttpResponse.BodyHandler<byte[]> asByteArray()


    • HttpResponse.BodyHandler<Void> asByteArrayConsumer(Consumer<Optional<by


    te[]>> consumer)


    • HttpResponse.BodyHandler<Path> asFile(Path file)


    • HttpResponse.BodyHandler<Path> asFile(Path file, OpenOption...


    openOptions)


    • HttpResponse.BodyHandler<Path> asFileDownload(Path directory,


    OpenOption... openOptions)


    • HttpResponse.BodyHandler<String> asString()


    • HttpResponse.BodyHandler<String> asString(Charset charset)


    • <U> HttpResponse.BodyHandler<U> discard(U value)


    Chapter 14 ■ the http/2 Client api


    These methods’ signatures are intuitive enough to tell you what type of response
    body they handle. For example, if you want to get the response body as a String,
    use the asString() method to get a body handler.


    The discard(U value) method returns a body handler, which will discard the response
    body and return the specified value as the body.


    The body() method of the HttpResponse<T> class returns the response body, which
    is of type T.


