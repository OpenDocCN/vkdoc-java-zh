    Obtaining a Process Handle


    There are several ways to get the handle of a native process. For a process created
    by the Java code, you can get a ProcessHandle using the toHandle() method of the
    Process class. Native processes can also be created from outside the JVM. The
    ProcessHandle interface contains the following methods to get the handle of a
    native process:


    • static Optional<ProcessHandle> of(long pid)


    • static ProcessHandle current()


    • Optional<ProcessHandle> parent()


    • Stream<ProcessHandle> children()


    • Stream<ProcessHandle> descendants()


    • static Stream<ProcessHandle> allProcesses()


    The of() static method returns an Optional<ProcessHandle> for the specified pid.
    If there is no process with this pid, an empty Optional is returned. To use this
    method, you need to know the PID of the process:


    // Get the process handle of the process with the pid of 1234


    Optional<ProcessHandle> handle = ProcessHandle.of(1234L);


    The current() static method returns the handle of the current process, which is
    always the Java process executing the code. You have already seen an example of
    this in Listing [12-2.](#index_split_005.html#334)


    The parent() method returns the handle of the parent process. It returns an empty
    Optional if the process does not have parent or the parent cannot be retrieved.


    Chapter 12 ■ proCess apI Updates


    The children() method returns a snapshot of all direct child processes of the
    process. There is no guarantee that a process returned by this method is still
    alive. Note that a process, which is not alive, does not have children.


    The descendants() method returns a snapshot of all child processes of the process
    direct or indirect.


    The allProcesses() method returns a snapshot of all processes that are visible
    to this process. There is no guarantee that the stream contains all process in
    the operating system at the time the stream is processed.


    Processes may have been terminated or created after the snapshot was taken. The
    following snippet of code prints the PIDs of all processes sorted by their PIDs:


    System.out.printf("All processes PIDs:%n");


    ProcessHandle.allProcesses()


    .map(ph -> ph.getPid())


    .sorted()


    .forEach(System.out::println);


    You can compute different types of statistics for all running processes. You can
    also create a task manager in Java that displays a UI showing all running processes
    and their attributes. Listin[g 12-5](#index_split_005.html#344) shows how to get
    the longest running process details and the process that used the CPU time the
    most. I compared the start time of the processes to get the longest running process
    and the total CPU duration to get the process that used the CPU time the most.
    You may get a different output. I got this output when I ran the program on Windows
    10.


    ***Listing 12-5.*** Computing Process Statistics


    // ProcessStats.java


    package com.jdojo.process.api;


    import java.time.Duration;


    import java.time.Instant;


    public class ProcessStats {


    public static void main(String[] args) {


    System.out.printf("Longest CPU User Process:%n");


    ProcessHandle.allProcesses()


    .max(ProcessStats::compareCpuTime)


    .ifPresent(CurrentProcessInfo::printInfo);


    System.out.printf("%nLongest Running Process:%n");


    ProcessHandle.allProcesses()


    .max(ProcessStats::compareStartTime)


    .ifPresent(CurrentProcessInfo::printInfo);


    }


    public static int compareCpuTime(ProcessHandle ph1,


    ProcessHandle ph2) {


    return ph1.info()


    .totalCpuDuration()


    .orElse(Duration.ZERO)


    .compareTo(ph2.info()


    .totalCpuDuration()


    .orElse(Duration.ZERO));


    }


    Chapter 12 ■ proCess apI Updates


    public static int compareStartTime(ProcessHandle ph1,


    ProcessHandle ph2) {


    return ph1.info()


    .startInstant()


    .orElse(Instant.now())


    .compareTo(ph2.info()


    .startInstant()


    .orElse(Instant.now()));


    }


    }


