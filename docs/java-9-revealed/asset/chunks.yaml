    \ 变为 com/jdojo。\n\n• 将名称中剩余的每个斜杠替换为句点 (.)。因此，com/jdojo 转换为 com.jdojo。得到的字符串即为包名。\n\
    \n在某些情况下，使用这些步骤会导致未命名包或无效包名。请记住，包名（如果存在）必须由有效的 Java 标识符组成。如果没有包名，则称为未命名包。以 META-INF/resource/logo.png\
    \ 作为资源名为例。\n\n应用上述规则，其包名将被计算为 META-INF.resources，这不是一个有效的包名，但它是一个有效的资源路径。\n\n\
    查找资源的规则\n\n由于向后兼容性和模块系统的强封装承诺，JDK 9 中查找资源的新规则较为复杂，并基于以下几个因素：\n\n• 包含资源的模块类型：命名模块、开放模块、未命名模块或自动模块\n\
    • 访问资源的模块：是同一模块还是不同模块？\n• 被访问资源的包名：是有效的还是无效的 Java 包？是未命名包吗？\n• 包含资源的包的封装状态：包含资源的包是向访问资源的模块导出、开放还是封装？\n\
    • 被访问资源的文件扩展名：资源是 `.class` 文件还是其他类型的文件？\n\n第 8 章 ■ JDK 9 中的重大变更\n\n• 用于访问资源的类的方法：是\
    \ `Class`、`ClassLoader` 还是 `Module` 的方法？\n\n以下规则适用于包含在*命名*模块中的资源：\n\n• 如果资源名称以\
    \ `.class` 结尾，则任何模块中的代码都可以访问该资源。也就是说，任何模块都可以访问任何命名模块中的类文件。\n• 如果根据资源名称计算出的包名不是有效的\
    \ Java 包名（例如 `META-INF.resources`），则任何模块中的代码都可以访问该资源。\n• 如果根据资源名称计算出的包名是未命名包（例如资源名\
    \ `words.png`），则任何模块中的代码都可以访问该资源。\n• 如果包含资源的包向访问资源的模块开放，则该模块中的代码可以访问该资源。包可以向模块开放，因为定义该包的模块是开放模块，或者该模块向所有其他模块开放该包，或者该模块使用限定的\
    \ `opens` 语句仅向特定模块开放该包。如果包未通过任何这些方式开放，则该包中的资源不能被该模块外部的代码访问。\n• 此规则是上一条规则的衍生。未命名模块、自动模块或开放模块中的每个包都是开放的，因此所有其他模块中的代码都可以访问这些模块中的所有资源。\n\
    \n■ **提示** 命名模块中的包必须开放（而非导出）才能访问其资源。导出模块的包允许其他模块访问该包中的公共类型（而非资源）。\n\n`Module`、`Class`\
    \ 和 `ClassLoader` 类中的各种资源查找方法在访问命名模块中的资源时行为不同：\n\n• 你可以使用 `Module` 类的 `getResourceAsStream()`\
    \ 方法来访问模块中的资源。此方法对调用者敏感。如果调用者模块不同，此方法将应用前述所有资源可访问性规则。\n• 对于在命名模块中定义的类，`Class`\
    \ 类中的 `getResource*()` 方法仅在该命名模块中定位资源。也就是说，你不能使用这些方法来定位定义这些方法所调用类的命名模块之外的类。\n\
    • `ClassLoader` 类中的 `getResource*()` 方法根据前面描述的规则列表在命名模块中定位资源。这些方法对调用者不敏感。类加载器在尝试定位资源本身之前，会先将资源搜索委托给其父加载器。这些方法有两个例外：1)\
    \ 它们仅在无条件开放的包中定位资源。如果使用限定的 `opens` 语句向特定模块开放包，这些方法将不会在这些包中定位资源。2) 它们搜索在类加载器中定义的模块。\n\
    \n第 8 章 ■ JDK 9 中的重大变更\n\n`Class` 对象将仅在其所属的模块中查找资源。它还支持以斜杠开头的绝对资源名称和不以斜杠开头的相对资源名称。以下是使用\
    \ `Class` 对象的一些示例：\n\n```java\n// 将找到该资源\nURL url1 = Test.class.getResource(\"\
    Test.class\");\n\n// 不会找到该资源，因为 Test 和 Object 类位于不同的模块中\nURL url2 = Test.class.getResource(\"\
    /java/lang/Object.class\");\n\n// 将找到该资源，因为 Object 和 Class 类位于同一模块 java.base 中\n\
    URL url3 = Object.class.getResource(\"/java/lang/Class.class\");\n\n// 不会找到该资源，因为\
    \ Object 类位于 java.base 模块中，而\n// Driver 类位于 java.sql 模块中\nURL url4 = Object.class.getResource(\"\
    /java/sql/Driver.class\");\n```\n\n使用 `Module` 类定位资源需要你拥有该模块的引用。如果你可以访问该模块中的某个类，则在该\
    \ `Class` 对象上使用 `getModule()` 方法即可获得模块引用。这是获取模块引用的最简单方法。有时，你只有模块名称的字符串，但没有该模块中类的引用。你可以从模块名称中找到模块引用。模块被组织成层，由\
    \ `java.lang` 包中的 `ModuleLayer` 类的实例表示。JVM 包含至少一个称为引导层的层。引导层中的模块映射到内置的类加载器——引导类加载器、平台类加载器和应用程序类加载器。你可以使用\
    \ `ModuleLayer` 类的 `boot()` 静态方法获取引导层的引用：\n\n```java\n// 获取引导层\nModuleLayer bootLayer\
    \ = ModuleLayer.boot();\n```\n\n一旦获得引导层的引用，就可以使用其 `findModule(String moduleName)`\
    \ 方法来获取模块的引用：\n\n```java\n// 在引导层中查找名为 com.jdojo.resource 的模块\nOptional<Module>\
    \ m = bootLayer.findModule(\"com.jdojo.resource\");\n\n// 如果找到了模块，则在模块中查找资源\n\
    if(m.isPresent()) {\n    Module testModule = m.get();\n    String resource = \"\
    com/jdojo/resource/opened/opened.properties\";\n    InputStream input = module.getResourceAsStream(resource);\n\
    \    if (input != null) {\n        System.out.println(resource + \" found.\");\n\
    \    } else {\n        System.out.println(resource + \" not found.\");\n    }\n\
    } else {\n    System.out.println(\"Module com.jdojo.resource does not exist\"\
    );\n}\n```\n\n第 8 章 ■ JDK 9 中的重大变更\n\n访问命名模块中资源的示例\n\n在本节中，你将看到资源查找规则的实际应用。你将把资源打包到一个名为\
    \ `com.jdojo.resource` 的模块中，其声明如清单 8-6 所示。\n\n***清单 8-6.*** 名为 com.jdojo.resource\
    \ 的模块的模块声明\n\n```java\n// module-info.java\nmodule com.jdojo.resource {\n    exports\
    \ com.jdojo.exported;\n    opens com.jdojo.opened;\n}\n```\n\n该模块导出了 `com.jdojo.exported`\
    \ 包，并开放了 `com.jdojo.opened` 包。\n\n以下是 `com.jdojo.resource` 模块中所有文件的列表：\n\n• `module-info.class`\n\
    • `unnamed.properties`\n• `META-INF\\invalid_pkg.properties`\n• `com\\jdojo\\\
    encapsulated\\encapsulated.properties`\n• `com\\jdojo\\encapsulated\\EncapsulatedTest.class`\n\
    • `com\\jdojo\\exported\\AppResource.class`\n• `com\\jdojo\\exported\\exported.properties`\n\
    • `com\\jdojo\\opened\\opened.properties`\n• `com\\jdojo\\opened\\OpenedTest.class`\n"
- fmt: "There are four class files. Only the `module-info.class` file is significant\
    \ in this example. Other class files define a class with the same name without\
    \ any details. All files with a `.properties` extension are resource files whose\
    \ contents are not important in this example. The source code supplied with this\
    \ book contains the contents of these files in the `Java9Revealed\\com.jdojo.resource`\
    \ directory. To save space, I will not show the contents of these files here.\n\
    \nThe `unnamed.properties` file is in the unnamed package, so it can be located\
    \ by code in any other module. The `invalid_pkg.properties` file is in the `META-INF`\
    \ directory, which is not a valid Java package name, so this file can also be\
    \ located by code in any other module. The `com.jdojo.encapsulated` package is\
    \ not open, so the `encapsulated.properties` file cannot be located by code in\
    \ other modules. The `com.jdojo.exported` package is not open, so the `exported.properties`\
    \ file cannot be located by code in other modules. The `com.jdojo.opened` package\
    \ is open, so the `opened.properties` file can be located by code in other modules.\
    \ All class files in this module can be located by code in other modules.\n\n\
    Listing [8-7](#index_split_003.html#201) contains the module declaration for a\
    \ `com.jdojo.resource.test` module. The code in this module will try to access\
    \ resources in the `com.jdojo.resource` module and the resources in this module\
    \ itself. You will need to add the `com.jdojo.resource` module to this module\
    \ path to compile it.\n\nFigure [8-5](#index_split_003.html#201) shows the Properties\
    \ dialog box for the `com.jdojo.resource.test` project in NetBeans. It adds the\
    \ `com.jdojo.resource` module to its module path.\n\n![](index-201_1.jpg)\n\n\
    ## Listing 8-7. A Module Declaration for a Module Named `com.jdojo.resource.test`\n\
    \n```java\n// module-info.java\nmodule com.jdojo.resource.test {\n    requires\
    \ com.jdojo.resource;\n    exports com.jdojo.resource.test;\n}\n```\n\n## Figure\
    \ 8-5. Adding the `com.jdojo.resource` module to the module path of the `com.jdojo.resource.test`\
    \ project in NetBeans\n\nThe files in the `com.jdojo.resource.test` module are\
    \ arranged as shown:\n\n- `module-info.class`\n- `com\\jdojo\\resource\\test\\\
    own.properties`\n- `com\\jdojo\\resource\\test\\ResourceTest.class`\n\nThe module\
    \ contains a resource file named `own.properties`, which is in the `com.jdojo.resource.test`\
    \ package. The `own.properties` file is empty. Listing [8-8](#index_split_003.html#201)\
    \ contains the code for the `ResourceTest` class. A detailed explanation of the\
    \ code follows the output of this class.\n\n## Listing 8-8. A `ResourceTest` Class\
    \ Demonstrating How to Access Resources in Named Modules\n\n```java\n// ResourceTest\n\
    package com.jdojo.resource.test;\n\nimport com.jdojo.exported.AppResource;\nimport\
    \ java.io.IOException;\nimport java.io.InputStream;\n\npublic class ResourceTest\
    \ {\n    public static void main(String[] args) {\n        // A list of resources\n\
    \        String[] resources = {\n            \"java/lang/Object.class\",\n   \
    \         \"com/jdojo/resource/test/own.properties\",\n            \"com/jdojo/resource/test/ResourceTest.class\"\
    ,\n            \"unnamed.properties\",\n            \"META-INF/invalid_pkg.properties\"\
