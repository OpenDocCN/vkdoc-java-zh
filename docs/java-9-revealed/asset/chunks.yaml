    **第 13 章**


    **Collection API 更新**


    在本章中，你将学习：


    • 在 JDK 9 之前如何创建不可修改的列表、集合和映射，以及使用它们时存在的问题。


    • 如何在 JDK 9 中使用 `List` 接口的 `of()` 静态工厂方法创建不可修改的列表。


    • 如何在 JDK 9 中使用 `Set` 接口的 `of()` 静态工厂方法创建不可修改的集合。


    • 如何在 JDK 9 中使用 `Map` 接口的 `of()`、`ofEntries()` 和 `entry()` 静态工厂方法创建不可修改的映射。


    背景


    Collection API 由类和接口组成，提供了一种存储和操作不同类型对象集合（如列表、集合和映射）的方式。它是在 Java SE 1.2 中添加的。Java
    编程语言不支持集合字面量，而集合字面量是一种简单易用的声明和初始化集合的方式。集合字面量允许你通过以紧凑形式在表达式中指定集合元素来创建特定类型的集合。集合字面量的一个例子是
    `List` 字面量，它允许你创建一个包含两个整数 100 和 200 的列表，如下所示：


    `List<Integer> list = [100, 200];`


    集合字面量紧凑且易于使用。它可以实现为高效利用内存，因为在创建时元素数量是已知的。它可以被设为不可变，从而使其线程安全。


    在 JDK 9 之前，曾多次考虑将集合字面量纳入 Java 编程语言。Java 设计者决定不将集合字面量添加到 Java 语言中，至少在 JDK 9 中不会。此时将集合字面量添加到
    Java 需要付出太多努力，而收益甚微。


    他们决定通过更新 Collection API 来实现相同目标，即为 `List`、`Set` 和 `Map` 接口添加静态工厂方法，这些方法可用于轻松高效地创建小型、不可修改的集合。


    现有的 Collection API 创建的是可变集合。你可以通过将可变集合包装在另一个对象中来创建不可变（或不可修改）的集合，该对象只是原始可变对象的包装器。要在
    JDK 8 或更早版本中创建一个包含两个整数的不可修改 `List`，通常使用以下代码片段：


    © Kishori Sharan 2017

