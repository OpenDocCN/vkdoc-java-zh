    • 未命名模块会读取所有其他模块。因此，未命名模块可以访问所有模块（包括平台模块）中所有导出包的公共类型。此规则使得在 Java SE 8 中编译和运行的、使用类路径的应用程序，只要它们仅使用标准的、非弃用的
    Java SE API，就能够在 Java SE 9 中继续编译和运行。


    • 未命名模块会将其所有包开放给所有其他模块。因此，显式模块可以在运行时通过反射访问未命名模块中的类型。


    • 未命名模块会导出其所有包。显式模块在编译时无法读取未命名模块。在模块图解析完成后，所有自动模块都会被设置为可以读取未命名模块。


