  trans: '

    [第 2 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_2)“模块系统”简要介绍了使用 JDK 8 及更早版本的
    Java 开发者所面临的问题。本章介绍了模块系统，并解释了它如何解决 API 封装、配置和可扩展性问题。本章引入了许多与模块系统相关的新术语。如果你不能完全理解它们，请继续阅读。后续章节和示例将通过更详细的解释让你理解这些概念。


    [第 3 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_3)“创建你的第一个模块”让你一窥模块的实际应用。它逐步展示了如何声明一个模块、在模块中编写代码、编译模块以及运行作为模块一部分的类。本章不会深入探讨模块声明的细节。


    [第 4 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_4)“模块依赖”是一章关于模块系统的密集实践章节。它以前两章为基础，更深入地探讨了如何声明模块的依赖关系以及导出模块的包。它展示了如何声明不同类型的模块，如何将模块化代码和非模块化代码混合到
    Java 应用程序中，以及模块系统提供的其他几个选项。对于任何计划使用 JDK 9 的严肃 Java 开发者来说，这是一章必须理解的章节。


    [第 5 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_5)“实现服务”展示了如何利用模块系统的简单指令在
    JDK 9 中实现服务。本章还解释了在 JDK 9 之前服务是如何实现的。


    [第 6 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_6)“打包模块”解释了可用于打包模块的不同格式，以及何时应使用一种格式而非其他格式。直到
    JDK 8，你只有一种打包 Java 应用程序的方式，即使用 JAR 文件。本章展示了如何使用 JMOD 格式打包你的模块。


    [第 7 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_7)“创建自定义运行时镜像”解释了如何使用 jlink
    工具创建采用名为 JIMAGE 的内部格式的自定义运行时镜像。


    [第 8 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_8)“JDK 9 中的破坏性变更”解释了如果你迁移到
    JDK 9，JDK 9 中可能破坏现有应用程序的变更。本章还建议了如何修复损坏的代码，并提到了 JDK 9 提供的替代方案（如果有的话）。


    [第 9 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_9)“打破模块封装”解释了如何可能打破模块系统的主要前提——封装。JDK
    9 提供了几个非标准的命令行选项，允许你侵入原本被封装且不可访问的模块代码。如果你正在迁移那些曾经可以访问 JDK 内部 API 或第三方库的遗留应用程序，但在
    JDK 9 中这些内部 API 已被封装在模块中，你可能需要这样做。


    [第 10 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_10)“模块 API”解释了如何使用模块 API
    以编程方式访问模块系统。凡是能通过模块声明和命令行选项完成的操作，也都可以通过模块 API 完成。


    [第 11 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_11)“Java Shell”详细介绍了 JShell
    工具和 JShell API。它涵盖了在 jshell 工具中打印消息、声明类以及使用现有模块。它描述了如何配置 jshell 工具以及如何使用 JShell
    API 执行代码片段。


    [第 12 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_12)“进程 API 更新”涵盖了 JDK 9 中进程
    API 的新增内容。本章并未涵盖自 JDK 1.0 以来进程 API 的全部内容。


    第 1 章 ■ 引言


    [第 13 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_13)“集合 API 更新”涵盖了 JDK 9 中集合
    API 的新增内容，例如用于创建列表、集合和映射的静态工厂方法。


    [第 14 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_14)“HTTP/2 客户端 API”解释了 JDK
    9 中新的孵化中的 HTTP/2 客户端 API。它是孵化器模块的一部分，这意味着它尚未标准化。在 JDK 10 中，它将被标准化并成为 Java SE 平台的一部分，或者将被移除。


    [第 15 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_15)“增强的弃用”解释了对 Deprecation
    注解类型的修改，如何在 JDK 9 中使用@SuppressWarnings 注解，以及如何使用 jdeprscan 工具扫描代码以查找已弃用的 JDK API
    的使用情况。


    [第 16 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_16)“栈遍历”涵盖了 JDK 9 中引入的栈遍历
    API。你可以使用这个新 API 来遍历调用栈并查找调用者类引用。


    [第 17 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_17)“响应式流”涵盖了响应式流 API，它是响应式规范的
    Java 实现。


    [第 18 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_18)“流 API 更新”解释了添加到流 API
    中的新方法。它还解释了添加到流 API 中的新收集器。


    [第 19 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_19)“平台和 JVM 日志记录”解释了新的平台日志记录
    API，你可以使用它将来自平台类的消息记录到自定义日志记录器中。它展示了如何使用 Log4j 记录平台消息。本章还展示了如何使用命令行选项访问 JVM 日志，以及在记录之前如何自定义
    JVM 消息。


    [第 20 章](http://dx.doi.org/10.1007/978-1-4842-2592-9_20)“JDK 9 中的其他变更”涵盖了 JDK
    9 中所有其他对应用程序开发者有影响且在前几章中未涉及的变更。本章的每一节都涵盖一个独立的主题。你可以跳转到你感兴趣的章节，跳过其余部分。本章涵盖了一系列主题，包括下划线在
    JDK 9 中成为关键字、改进的 try-with-resources 块、接口中的私有方法、如何使用 Optional 的流、如何在对象反序列化期间使用过滤器、I/O
    API 中的新方法等等。


