    ## Editing Snippets


    The JShell tool offers several ways to edit snippets and commands. You can use
    navigation keys listed in Table 11-1 to navigate on the command line while entering
    snippets and commands in `jshell`. You can use keys listed in Table 11-2 to edit
    text entered on a line in `jshell`.


    **Table 11-1.** List of Navigation Keys While Editing in the JShell Tool


    | Key | Description |

    | --- | --- |

    | Enter | Enters the current line |

    | Left-Arrow | Moves one character backward |

    | Right-Arrow | Moves one character forward |

    | Ctrl-A | Moves to the beginning of the line |

    | Ctrl-E | Moves to the end of the line |

    | Meta-B (or Alt-B) | Moves a word backward |

    | Meta-F (or Alt-F) | Moves a word forward |


    Chapter 11 ■ the Java Shell


    **Table 11-2.** List of Keys to Modify Text on the JShell Tool


    | Key | Description |

    | --- | --- |

    | Delete | Deletes character under the cursor |

    | Backspace | Deletes character before the cursor |

    | Ctrl-K | Deletes the text from the cursor to the end of the line |

    | Meta-D (or Alt-D) | Deletes the text from the cursor to the end of the word
    |

    | Ctrl-W | Deletes the text from the cursor to the previous whitespace |

    | Ctrl-Y | Pastes (or yanks) the most recently deleted text into the line |

    | Meta-Y (or Alt-Y) | After Ctrl-Y, this key combination cycles through previously
    deleted text |


    It is hard to edit multi-line snippets in the JShell tool, even though you have
    access to a rich set of edit key combinations. The tool designer realized this
    problem and provided a built-in snippet editor. You can configure the JShell tool
    to use the platform-specific snippet editor of your choice. Refer to the section
    entitled “Setting the Snippet Editor” for more information on how to set up your
    own editor.


    You need to use the `/edit` command to start editing a snippet. The command takes
    three forms:


    - `/edit <snippet-name>`

    - `/edit <snippet-id>`

    - `/edit`


    You can use the snippet name or snippet ID to edit a specific snippet. The `/edit`
    command without an argument opens all active snippets in an editor for editing.
    By default, the `/edit` command opens a built-in editor called JShell Edit Pad,
    and it is shown in Figure 11-3.


    **Figure 11-3.** The built-in JShell editor called JShell Edit Pad


