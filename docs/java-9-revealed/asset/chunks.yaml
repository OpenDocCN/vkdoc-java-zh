    Accessing Resources


    Resources are data that your application uses, such as images, audios, videos,
    text files, etc. Java provided a location-independent way to access resources
    by locating resources on the class path. You need to package resources the same
    way as you package your class files in JARs and add the JARs to the class path.
    Typically, class files and resources are packaged in the same JARs. Accessing
    resources is an important task that every Java developer performs. In next sections,
    I explain the APIs available in the JDK before release 9 and in JDK 9.


    Accessing Resources Before JDK 9


    In this section, I explain how resources were accessed in the JDK before release
    9\. If you already know how to access resources in the JDK before release 9, you
    can skip to the next section that describes how to access resources in JDK 9.


    In Java code, a resource is identified by a resource name, which is a sequence
    of strings separated by a slash (/). For resources stored in JARs, a resource
    name is simply the path of the file stored in the JAR. For example, before JDK
    9, the Object.class file in the java.lang package stored in rt.jar is a resource
    and its resource name is java/lang/Object.class.


    Before JDK 9, you could use methods in the following two classes to access resources:


    • java.lang.Class


    • java.lang.ClassLoader


    A resource is located by a ClassLoader. The resource-finding methods in a Class
    delegate to its ClassLoader. Therefore, once you understand the resource loading
    process used by a ClassLoader, you won’t have problems in using the methods of
    the Class class. There are two differently named instance methods in both classes:


    • URL getResource(String name)


    • InputStream getResourceAsStream(String name)


    Both methods find a resource the same way. They differ only in return type. The
    first method returns an URL whereas the second one returns an InputStream. The
    second method is equivalent to calling the first method and subsequently calling
    the openStream() on the returned URL object.


    Chapter 8 ■ Breaking Changes in JDk 9


    ■ **Tip** all resource-finding methods return null if the specified resource is
    not found.


    The ClassLoader class contains three additional static methods to find resources:


    • static URL getSystemResource(String name)


    • static InputStream getSystemResourceAsStream(String name)


    • static Enumeration<URL> getSystemResources(String name)


    These methods use the system class loader, which is also known as the application
    class loader, to find a resource. The first method returns the URL of the first
    resource found. The second method returns the InputStream for the first resource
    found. The third method returns an Enumeration of the URLs of all resources found
    with the specified resource name.


    To find a resource, you have two types of methods to select from—getSystemResource*
    and


    getResource*. Before I discuss which method is best, it is important to understand
    that there are two types of resources:


    • System resources


    • Non-system resources


    You must understand the difference between them to understand the resource finding
    mechanism.'
