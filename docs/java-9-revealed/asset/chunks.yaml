  raw: 'The new API consists of fewer than 20 types, four of which are the main types.
    Other types are used while you are using one of these four types. The new API
    also uses a few types from the old API. The new API is in the jdk.incubator.http
    package in the jdk.incubator.httpclient module. The main types are three abstract
    classes and one interface:


    • The HttpClient class


    • The HttpRequest class


    • The HttpResponse class


    • The WebSocket interface


    An instance of the HttpClient class is a container for storing configurations
    that can be used for multiple HTTP requests instead of setting them separately
    for each. An instance of the HttpRequest class represents an HTTP request that
    can be sent to a server. An instance of the HttpResponse class represents an HTTP
    response. An instance of the WebSocket interface represents a WebSocket client.
    You can create a WebSocket server using the Java EE 7 WebSocket API. I show you
    an example of creating WebSocket client and server at the end of this chapter.


    Instances of HttpClient, HttpRequest, and WebSocket are created using builders.
    Each type contains a nested class/interface named Builder that is used to build
    an instance of that type. Note that you do not create an HttpResponse; it is returned
    to you as part of an HTTP request that you make. The new HTTP/2


    Client API is so simple to use that you can read an HTTP resource in just one
    statement! The following snippet of code reads the contents a[t the URL https://www.google.com/
    as a s](https://www.google.com/)tring using a GET HTTP request: String responseBody
    = HttpClient.newHttpClient()


    .send(HttpRequest.newBuilder(new URI("https://www.google.com/"))


    .GET()


    .build(), BodyHandler.asString())


    .body();


    Chapter 14 ■ the http/2 Client api


    Typical steps in processing HTTP requests are as follows:


    • Create an HTTP client object to store HTTP configuration information.


    • Create an HTTP request object and populate it with information to be sent to


    the server.


    • Send the HTTP request to the server.


    • Receive an HTTP response object as a response from the server.


    • Process the HTTP response.


    Setting Up Examples


    I use many examples in this chapter that involve interacting with a web server.
    Instead of using a web application deployed on the Internet, I created a web application
    project in NetBeans that you can deploy locally. If you prefer using another web
    application, you need to change the URLs used in the examples.


    The NetBeans web application is located in the webapp directory of the book’s
    source code. I tested the examples by deploying the web application on the GlassFish
    server 4.1.1 and Tomcat 8/9\. You can download the NetBeans IDE with the GlassFish
    server fr[om https://netbeans.org/. I r](https://netbeans.org/)an the HTTP listener
    in the GlassFish server at port 8080\. If you run it on a different port, you
    need to change the port number in the example URLs.


    All this chapter’s HTTP client programs are located in the com.jdojo.http.client
    directory in the book’s source code. They are in the com.jdojo.http.client module
    whose declaration is shown in Listing [14-1](#index_split_006.html#367).


    ***Listing 14-1.*** The Module Declaration for a Module Named com.jdojo.http.client


    // module-info.java


    module com.jdojo.http.client {


    requires jdk.incubator.httpclient;


    }


    Creating HTTP Clients


    An HTTP request that is sent to a server needs to be configured so that the server
    knows which authenticator to use, the SSL configuration details, the cookie manager
    to be used, proxy information, the redirect policy if the server redirects the
    request, etc. An instance of the HttpClient class stores these request-specific
    configurations, and they can be reused for multiple requests. You can override
    a few of these configurations on a per-request basis. When you send an HTTP request,
    you need to specify the HttpClient object that will supply the configuration information
    for the request. An HttpClient holds the following pieces of information that
    are used for all HTTP requests: an authenticator, a cookie manager, an executor,
    a redirect policy, a request priority, a proxy selector, an SSL context, SSL parameters,
    and an HTTP version.


    An *authenticator* is an instance of the java.net.Authenticator class. It is used
    for HTTP


    authentication. The default is to use no authenticator.


    A *cookie manager* is used to manage HTTP cookies. It is an instance of the java.net.CookieManager
    class. The default is to use no cookie manager.


    An *executor* is an instance of the java.util.concurrent.Executor interface, which
    is used to send and receive asynchronous HTTP requests and responses. A default
    executor is provided, if it is not specified.


    A *redirect policy* is one of the constants of the HttpClient.Redirect enum that
    specifies how to handle redirects issues by the server. The default is NEVER,
    which means the redirects issued by the server are never followed.


    Chapter 14 ■ the http/2 Client api


    A *request priority* is the default priority for HTTP/2 requests, which can be
    between 1 and 256 (inclusive).


    It is a hint for the server to prioritize the request processing. A higher value
    means a higher priority.


    A *proxy selector* is an instance of the java.net.ProxySelector class that selects
    the proxy server to use.


    The default is not to use a proxy server.


    An *SSL context* is an instance of the javax.net.ssl.SSLContext class that provides
    an implementation for the secure socket protocol. A default SSLContext is provided,
    which works when you do not need to specify protocols or do not need client authentication.


    *SSL parameters* are parameters for SSL/TLS/DTLS connections. They are stored
    in an instance of the javax.net.ssl.SSLParameters class.


    An HTTP version is the version of HTTP, which is 1.1 or 2\. It is specified as
    one of the constants of the HttpClient.Version enum: HTTP_1_1 and HTTP_2\. It
    requests a specific HTTP protocol version wherever possible. The default is HTTP_1_1.


    ■ **Tip** an


    HttpClient is immutable. a few of the configurations stored in an HttpClient may
    be overridden for http requests when such requests are built.


    The HttpClient class is abstract and you cannot create its objects directly. There
    are two ways you can create an HttpClient object:


    • Using the newHttpClient() static method of the HttpClient class


    • Using the build() method of the HttpClient.Builder class


    The following snippet of code gets a default HttpClient object:


    // Get the default HttpClient


    HttpClient defaultClient = HttpClient.newHttpClient();


    You can also create an HttpClient using the HttpClient.Builder class. The HttpClient.newBuilder()
    static method returns a new instance of the HttpClient.Builder class. The HttpClient.Builder
    class provides a method for setting each configuration value. The value for the
    configuration is specified as the parameter of the method and the method returns
    the reference of the builder object itself, so you can chain multiple methods.
    In the end, call the build() method that returns an HttpClient object. The following
    statement creates an HttpClient with the redirect policy set to ALWAYS and the
    HTTP version set to HTTP_2:


    // Create a custom HttpClient


    HttpClient httpClient = HttpClient.newBuilder()


    .followRedirects(HttpClient.Redirect.ALWAYS)


    .version(HttpClient.Version.HTTP_2)


    .build();'
  trans: "\n新的 API 由不到 20 种类型组成，其中四种是主要类型。其他类型在使用这四种类型之一时会被用到。新 API 还使用了旧 API 中的少数类型。新\
    \ API 位于`jdk.incubator.httpclient`模块的`jdk.incubator.http`包中。主要类型包括三个抽象类和一个接口：\n\
    \n• `HttpClient`类\n• `HttpRequest`类\n• `HttpResponse`类\n• `WebSocket`接口\n\n`HttpClient`类的实例是一个存储配置的容器，这些配置可用于多个\
    \ HTTP 请求，而无需为每个请求单独设置。`HttpRequest`类的实例表示一个可发送到服务器的 HTTP 请求。`HttpResponse`类的实例表示一个\
    \ HTTP 响应。`WebSocket`接口的实例表示一个 WebSocket 客户端。你可以使用 Java EE 7 WebSocket API 创建\
    \ WebSocket 服务器。本章末尾我将展示一个创建 WebSocket 客户端和服务器的示例。\n\n`HttpClient`、`HttpRequest`和`WebSocket`的实例通过构建器创建。每种类型都包含一个名为`Builder`的嵌套类/接口，用于构建该类型的实例。请注意，你不需要创建`HttpResponse`；它会作为你发起的\
    \ HTTP 请求的一部分返回给你。新的 HTTP/2 客户端 API 使用起来非常简单，你甚至可以用一条语句读取 HTTP 资源！以下代码片段使用 GET\
    \ HTTP 请求将 URL [`www.google.com/`](https://www.google.com/) 的内容读取为字符串：\n\n```java\n\
    String responseBody = HttpClient.newHttpClient()\n    .send(HttpRequest.newBuilder(new\
    \ URI(\"https://www.google.com/\"))\n        .GET()\n        .build(), BodyHandler.asString())\n\
    \    .body();\n```\n\n处理 HTTP 请求的典型步骤如下：\n\n• 创建一个 HTTP 客户端对象来存储 HTTP 配置信息。\n\
    • 创建一个 HTTP 请求对象，并填充要发送到服务器的信息。\n• 将 HTTP 请求发送到服务器。\n• 接收来自服务器的 HTTP 响应对象作为响应。\n\
    • 处理 HTTP 响应。\n\n### 设置示例\n\n本章中我使用了大量涉及与 Web 服务器交互的示例。我没有使用部署在互联网上的 Web 应用程序，而是在\
    \ NetBeans 中创建了一个 Web 应用程序项目，你可以在本地部署它。如果你更喜欢使用其他 Web 应用程序，则需要更改示例中使用的 URL。\n\n\
    NetBeans Web 应用程序位于本书源代码的`webapp`目录中。我通过在 GlassFish 服务器 4.1.1 和 Tomcat 8/9 上部署该\
    \ Web 应用程序来测试示例。你可以从[`netbeans.org/`](https://netbeans.org/) 下载包含 GlassFish 服务器的\
    \ NetBeans IDE。我在 GlassFish 服务器的 8080 端口运行 HTTP 监听器。如果你在不同的端口上运行，则需要更改示例 URL 中的端口号。\n\
    \n本章的所有 HTTP 客户端程序都位于本书源代码的`com.jdojo.http.client`目录中。它们位于`com.jdojo.http.client`模块中，其声明如清单\
    \ 14-1 所示。\n\n***清单 14-1.*** 名为`com.jdojo.http.client`的模块的模块声明\n\n```java\n//\
    \ module-info.java\nmodule com.jdojo.http.client {\n    requires jdk.incubator.httpclient;\n\
    }\n```\n\n### 创建 HTTP 客户端\n\n发送到服务器的 HTTP 请求需要进行配置，以便服务器知道要使用哪个认证器、SSL 配置细节、要使用的\
    \ Cookie 管理器、代理信息、如果服务器重定向请求时的重定向策略等。`HttpClient`类的实例存储这些特定于请求的配置，并且它们可以重复用于多个请求。你可以按请求覆盖其中的一些配置。当你发送\
    \ HTTP 请求时，需要指定将为此请求提供配置信息的`HttpClient`对象。一个`HttpClient`保存以下所有 HTTP 请求都会使用的信息：认证器、Cookie\
    \ 管理器、执行器、重定向策略、请求优先级、代理选择器、SSL 上下文、SSL 参数和 HTTP 版本。\n\n*认证器*是`java.net.Authenticator`类的一个实例。它用于\
    \ HTTP 认证。默认情况下不使用认证器。\n\n*Cookie 管理器*用于管理 HTTP Cookie。它是`java.net.CookieManager`类的一个实例。默认情况下不使用\
    \ Cookie 管理器。\n\n*执行器*是`java.util.concurrent.Executor`接口的一个实例，用于发送和接收异步 HTTP 请求和响应。如果未指定，则会提供一个默认执行器。\n\
    \n*重定向策略*是`HttpClient.Redirect`枚举的常量之一，用于指定如何处理服务器发出的重定向。默认值是`NEVER`，这意味着永远不会跟随服务器发出的重定向。\n\
    \n*请求优先级*是 HTTP/2 请求的默认优先级，其值可以在 1 到 256（含）之间。这是给服务器的一个提示，用于优先处理请求。值越高表示优先级越高。\n\
    \n*代理选择器*是`java.net.ProxySelector`类的一个实例，用于选择要使用的代理服务器。默认情况下不使用代理服务器。\n\n*SSL\
    \ 上下文*是`javax.net.ssl.SSLContext`类的一个实例，为安全套接字协议提供实现。当你不需要指定协议或不需要客户端认证时，会提供一个默认的`SSLContext`。\n\
    \n*SSL 参数*是 SSL/TLS/DTLS 连接的参数。它们存储在`javax.net.ssl.SSLParameters`类的一个实例中。\n\n\
    HTTP 版本是 HTTP 的版本，可以是 1.1 或 2。它被指定为`HttpClient.Version`枚举的常量之一：`HTTP_1_1`和`HTTP_2`。它尽可能请求特定的\
    \ HTTP 协议版本。默认值是`HTTP_1_1`。\n\n■ **提示** `HttpClient`是不可变的。在构建 HTTP 请求时，`HttpClient`中存储的一些配置可能会被覆盖。\n\
    \n`HttpClient`类是抽象的，你不能直接创建它的对象。有两种方法可以创建`HttpClient`对象：\n\n• 使用`HttpClient`类的`newHttpClient()`静态方法\n\
    • 使用`HttpClient.Builder`类的`build()`方法\n\n以下代码片段获取一个默认的`HttpClient`对象：\n\n```java\n\
    // 获取默认的 HttpClient\nHttpClient defaultClient = HttpClient.newHttpClient();\n\
    ```\n\n你也可以使用`HttpClient.Builder`类创建`HttpClient`。`HttpClient.newBuilder()`静态方法返回`HttpClient.Builder`类的一个新实例。`HttpClient.Builder`类为每个配置值提供了一个设置方法。配置值作为方法的参数指定，并且该方法返回构建器对象本身的引用，因此你可以链式调用多个方法。最后，调用`build()`方法返回一个`HttpClient`对象。以下语句创建了一个`HttpClient`，其重定向策略设置为`ALWAYS`，HTTP\
    \ 版本设置为`HTTP_2`：\n\n```java\n// 创建一个自定义的 HttpClient\nHttpClient httpClient = HttpClient.newBuilder()\n\
    \    .followRedirects(HttpClient.Redirect.ALWAYS)\n    .version(HttpClient.Version.HTTP_2)\n\
    \    .build();\n```\n"
- fmt: '# `HttpClient` Class and HTTP Request Processing


    The `HttpClient` class contains a method corresponding to each configuration setting
    that returns the value for that configuration. Those methods are as follows:


    - `Optional<Authenticator> authenticator()`

    - `Optional<CookieManager> cookieManager()`

    - `Executor executor()`

    - `HttpClient.Redirect followRedirects()`

    - `Optional<ProxySelector> proxy()`

    - `SSLContext sslContext()`

    - `Optional<SSLParameters> sslParameters()`

    - `HttpClient.Version version()`


    Notice that there are no setters in the `HttpClient` class because it is immutable.
    You cannot use an `HttpClient` object by itself. You need to use an `HttpRequest`
    object before you use an `HttpClient` object to send a request to a server. I
    explain the `HttpRequest` class in the next section.


    The `HttpClient` class contains the following three methods to send a request
    to a server:


    - `<T> HttpResponse<T> send(HttpRequest req, HttpResponse.BodyHandler<T> responseBodyHandler)`

    - `<T> CompletableFuture<HttpResponse<T>> sendAsync(HttpRequest req, HttpResponse.BodyHandler<T>
    responseBodyHandler)`

    - `<U,T> CompletableFuture<U> sendAsync(HttpRequest req, HttpResponse.MultiProcessor<U,T>
    multiProcessor)`


    The `send()` method sends the request synchronously, whereas the `sendAsync()`
    methods send the request asynchronously. I cover these methods in more detail
    in subsequent sections.


    ## Processing HTTP Requests


    A client application communicates with a web server using HTTP requests. It sends
    a request to the server and the server sends you back an HTTP response. An instance
    of the `HttpRequest` class represents an HTTP request. The following are the steps
    you need to perform to process an HTTP request:


    - Obtain an HTTP request builder

    - Set the parameters for the request

    - Create an HTTP request from the builder

    - Send the HTTP request to a server synchronously or asynchronously

    - Process the response from the server


    ### Obtaining an HTTP Request Builder


    You need to use a builder object, which is an instance of the `HttpRequest.Builder`
    class, to create an `HttpRequest`. You can get an `HttpRequest.Builder` using
    one of the following static methods of the `HttpRequest` class:


    - `HttpRequest.Builder newBuilder()`

    - `HttpRequest.Builder newBuilder(URI uri)`


    The following snippet of code shows you how to use these methods to get an `HttpRequest.Builder`
    instance:


    ```java

    // A URI to point to google

    URI googleUri = new URI("http://www.google.com");


    // Get a builder for the google URI

    HttpRequest.Builder builder1 = HttpRequest.newBuilder(googleUri);


    // Get a builder without specifying a URI at this time

    HttpRequest.Builder builder2 = HttpRequest.newBuilder();

    ```


    ### Setting HTTP Request Parameters


    Once you have an HTTP request builder, you can set different parameters for the
    request using the builder''s methods. All methods return the builder itself, so
    you can chain them. Those methods are as follows:


    - `HttpRequest.Builder DELETE(HttpRequest.BodyProcessor body)`

    - `HttpRequest.Builder expectContinue(boolean enable)`

    - `HttpRequest.Builder GET()`

    - `HttpRequest.Builder header(String name, String value)`

    - `HttpRequest.Builder headers(String... headers)`

    - `HttpRequest.Builder method(String method, HttpRequest.BodyProcessor body)`

    - `HttpRequest.Builder POST(HttpRequest.BodyProcessor body)`

    - `HttpRequest.Builder PUT(HttpRequest.BodyProcessor body)`

    - `HttpRequest.Builder setHeader(String name, String value)`

    - `HttpRequest.Builder timeout(Duration duration)`

    - `HttpRequest.Builder uri(URI uri)`

    - `HttpRequest.Builder version(HttpClient.Version version)`


    An `HttpRequest` is sent to a server using an `HttpClient`. When you are building
    an HTTP request, you can set the HTTP version value through its the `HttpRequest.Builder`
    object using the `version()` method that will override the HTTP version set in
    the `HttpClient` when this request is sent. The following snippet of code sets
    the HTTP version to 2.0 for a request, which overrides the default value of `NEVER`
    in the default `HttpClient` object:


    ```java

    // By default a client uses HTTP 1.1. All requests sent using this

    ```'
