    ## 多版本JAR的规则


    创建多版本JAR时需要遵循一些规则。如果出错，`jar`工具会打印错误信息。有时错误信息并不直观。正如我所建议的，最好使用`--verbose`选项运行`jar`工具，以获取更详细的错误信息。


    大多数规则基于一个事实：MRJAR包含一个库（或应用程序）的某个版本API，用于多个JDK平台。例如，您有一个名为`jdojo-lib-1.0.jar`的MRJAR，它可能包含名为`jdojo-lib`的库的1.0版本API，并且该库可能使用JDK
    8和JDK 9的API。这意味着，当此MRJAR在JDK 8的类路径、JDK 9的类路径或JDK 9的模块路径上使用时，它应提供相同的API（就公共类型及其公共成员而言）。如果MRJAR在JDK
    8和JDK 9上提供不同的API，则它不是有效的MRJAR。以下部分描述了一些规则。


    ## 模块化多版本JAR


    MRJAR可以是模块化JAR，在这种情况下，它可以在根目录、一个或多个版本化目录中，或两者的组合中包含模块描述符`module-info.class`。版本化描述符必须与根模块描述符相同，但以下情况除外：


    - 版本化描述符可以对`java.*`和`jdk.*`模块具有不同的非传递性`requires`语句。

    - 不同的模块描述符不能对非JDK模块具有不同的非传递性`requires`语句。

    - 版本化描述符可以具有不同的`uses`语句。


    这些规则基于以下事实：允许更改实现细节，但不允许更改API本身。允许更改非JDK模块的`requires`语句被视为API的更改——它要求您为不同版本的JDK拥有不同的用户定义模块。这就是不允许这样做的原因。


    模块化MRJAR在根目录中不必有模块描述符。这就是我们在上一节示例中的情况。我们在根目录中没有模块描述符，但在`META-INF/versions/9`目录中有一个。这种安排使得在一个MRJAR中为JDK
    8提供非模块化代码、为JDK 9提供模块化代码成为可能。


