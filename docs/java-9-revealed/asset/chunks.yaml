    Summary


    If a module needs to use public types contained in another module, the second
    module needs to export the package containing the types and the first module needs
    to read the second module.


    A module exports its packages using the exports statement. A module can export
    its packages only to specific modules. Public types in exports packages are available
    to other modules at compile-time and runtime. An exported package does not allow
    deep reflection on non-public members of public types.


    If a module wants to allow other modules to access all types of members—public
    and non-public—


    using reflection, the module must either be declared as an open module or the
    module can open packages selectively using an opens statement. A module accessing
    types from open packages does not need to read the module containing those open
    packages.


    A module declares a dependence on another module using the requires statement.
    Such a dependence can be declared transitive using the transitive modifier. If
    module M declares a transitive dependence on module N, any module declaring a
    dependence on module M declares an implicit dependence on module N.


    A dependence can be declared mandatory at compile-time, but optional at runtime
    using the static modifier in the requires statement. A dependency can be optional
    at runtime and transitive at the same time.


    The module system in JDK 9 has changed the meaning of the public types. A public
    type defined in a module may fall into one of the three categories: public only
    within the defining module, public only to specific modules, or public to everyone.


    Chapter 4 ■ Module dependenCy


    Based on how a module is declared and whether it has a name, there are several
    types of modules.


    Based on whether a module has a name, a module can be a *named module* or an *unnamed
    module*. When a module has a name, the name can be given explicitly in a module
    declaration or the name can be generated automatically (or implicitly). If the
    name is given explicitly in a module declaration, it is called an *explicit* *module*.
    If the name is generated by the module system by reading the JAR filename on the
    module path, it is called an *automatic module*. If you declare a module without
    using the open modifier, it is called a *normal module*. If you declare a module
    using the open modifier, it is called an *open module*. Based on these definitions,
    an open module is also an explicit module and a named module. An automatic module
    is a named module as it has a name, which is automatically generated, but it is
    not an explicit module because it is implicitly declared by the module system
    at compile-time and runtime.


    When you place a JAR (not a module JAR) on the module path, the JAR represents
    an automatic module whose name is derived from the JAR filename. An automatic
    module reads all the other modules and all its packages are exported and opened.


    In JDK 9, a class loader can load a class from a module or from the class path.
    Every class loader maintains a module called unnamed module that contains all
    types that it loads from the class path. An unnamed module reads every other module.
    It exports and opens all its packages to all other modules. An unnamed module
    does not have a name, so an explicit module cannot declare a compile-time dependence
    on an unnamed module. If an explicit module needs to access types in an unnamed
    module, the former can use an automatic module as a bridge or use reflection.


    You can use the javap tool to print the module declaration or attributes. Use
    the -verbose (or -v) option of the tool to print the class attributes of the module
    descriptor. JDK 9 stores the runtime image in a special format. JDK 9 introduced
    a new file scheme called jrt that you can use to access the contents of the runtime
    image. Its syntax is jrt:/<module>/<path-to-a-file>.


    **CHAPTER 5**


    **Implementing Services**


    In this chapter, you will learn:


    • What services, service interfaces, and service providers are


    • How to implement a service in JDK 9 and before JDK 9


    • How to use a Java interface as a service implementation


    • How to load service providers using the ServiceLoader class


    • How to use the uses statement in a module declaration to specify the service


    interface that the current modules loads using the ServiceLoader class


    • How to use the provides statement to specify a service provider provided by
    the


    current module for a service interface


    • How to discover, filter, and select service providers based on their class without


    instantiating them


    • How to package service providers before JDK 9


    What Is a Service?


    A specific functionality provided by an application (or a library) is known as
    a *service*. For example, you can have different libraries providing a *prime
    number service,* which can check if a number is a prime and generating the next
    prime after a given number. Applications and libraries providing implementations
    for a service are known as *service* *providers.* Applications using the service
    are called *service* *consumers* or *clients*.


    How does a client use the service? Does a client know all service providers? Does
    a client get a service without knowing any service providers? I answer these questions
    in this chapter.


    Java SE 6 provided a mechanism to allow for loose coupling between service providers
    and service consumers. That is, a service consumer can use a service provided
    by a service provider without knowing the service provider.


    In Java, a *service* is defined by a set of interfaces and classes. The service
    contains an interface or an abstract class that defines the functionality provided
    by the service and it is known as the *service* *provider* *interface* or simply
    *service* *interface*. Note that the term “interface” in “service provider interface”
    or “service interface” does not refer to an interface construct in Java. It can
    be a Java interface or an abstract class. It is possible, but not recommended,
    to use a concrete class as a service interface. Sometimes, a service interface
    is also called a *service* *type*—the type that is used to identify the service.


    A specific implementation of a *service* is known as a *service provider*. There
    can be multiple service providers for a service provider interface. Typically,
    a service provider consists of several interfaces and classes to provide an implementation
    for the service interface.


