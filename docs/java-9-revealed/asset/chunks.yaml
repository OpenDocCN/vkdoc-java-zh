- fmt: "### Listing 3-1. The Declaration of a Module Named `com.jdojo.intro`\n\n```java\n\
    // module-info.java\nmodule com.jdojo.intro {\n    // No module statements\n}\n\
    ```\n\nThe module declaration is simple. It contains no module statements. Save\
    \ it in a file named `module-info.java` in the `src\\com.jdojo.intro` directory.\n\
    \nYou will create a class named `Welcome`, which will be stored in the `com.jdojo.intro`\
    \ package. Note that you are giving the package the same name as the module. Do\
    \ you have to keep the module and package names the same? The answer is no. You\
    \ can choose any other package name you want. The class will have a method whose\
    \ signature will be `public static void main(String[])`. This method will serve\
    \ as the entry point for the application. You will print the message inside this\
    \ method.\n\nYou want to print the name of the module of which the `Welcome` class\
    \ is a member. JDK 9 added a class called `Module` in the `java.lang` package.\
    \ An instance of the `Module` class represents a module. Every Java type in JDK\
    \ 9 is a member of a module, even the primitive types such as `int`, `long`, and\
    \ `char`. All primitive types are members of the `java.base` module. The `Class`\
    \ class in JDK 9 has a new method named `getModule()` that returns the module\
    \ reference that the class is a member of. The following snippet of code prints\
    \ the module name of the `Welcome` class.\n\n```java\nClass<Welcome> cls = Welcome.class;\n\
    Module mod = cls.getModule();\nString moduleName = mod.getName();\nSystem.out.format(\"\
    Module Name: %s%n\", moduleName);\n```\n\nYou can replace the four statements\
    \ with one statement:\n\n```java\nSystem.out.format(\"Module Name: %s%n\",\n \
    \   Welcome.class.getModule().getName());\n```\n\n**Tip:** All primitive data\
    \ types are members of the `java.base` module. You can use `int.class.getModule()`\
    \ to get the reference of the module of the `int` primitive data type.\n\nListing\
    \ 3-2 contains the complete source code for the `Welcome` class. Save the source\
    \ code in a file named `Welcome.java` in a directory `com\\jdojo\\intro`, which\
    \ would be a sub-directory of the `src\\com.jdojo.intro` directory. At this point,\
    \ the paths for your source code files will look like this:\n\n- `C:\\Java9Revealed\\\
    src\\com.jdojo.intro\\module-info.java`\n- `C:\\Java9Revealed\\src\\com.jdojo.intro\\\
    com\\jdojo\\intro\\Welcome.java`\n\n### Listing 3-2. The Source Code for the `Welcome`\
    \ Class\n\n```java\n// Welcome.java\npackage com.jdojo.intro;\n\npublic class\
    \ Welcome {\n    public static void main(String[] args) {\n        System.out.println(\"\
    Welcome to the Module System.\");\n        // Print the module name of the Welcome\
    \ class\n        Class<Welcome> cls = Welcome.class;\n        Module mod = cls.getModule();\n\
    \        String moduleName = mod.getName();\n        System.out.format(\"Module\
    \ Name: %s%n\", moduleName);\n    }\n}\n```\n\n## Compiling the Source Code\n\n\
    You will use the Java compiler, the `javac` command, to compile the source code\
    \ and save the compiled code in the `C:\\Java9Revealed\\mods` directory. The `javac`\
    \ command is in the `JDK_HOME\\bin` directory. The following command compiles\
    \ the source code. The command is entered in one line, not three:\n\n```\nC:\\\
    Java9Revealed>javac -d mods --module-source-path src\n    src\\com.jdojo.intro\\\
    module-info.java\n    src\\com.jdojo.intro\\com\\jdojo\\intro\\Welcome.java\n\
    ```\n\nNotice that `C:\\Java9Revealed` is the current directory when this command\
    \ is run. The `-d mods` option tells the Java compiler to store all compiled class\
    \ files into the `mods` directory. Note that you are running the command from\
    \ the `C:\\Java9Revealed` directory, so the `mods` directory in the command means\
    \ the `C:\\Java9Revealed\\mods` directory. If you want, you can replace this option\
    \ with `-d C:\\Java9Revealed\\mods`.\n\nThe second option, `--module-source-path\
    \ src`, specifies that the sub-directories of the `src` directory contain the\
    \ source code for multiple modules, where each sub-directory name is the same\
    \ as the module name for which the sub-directory contains the source files. This\
    \ option has a few implications:\n\n- Under the `src` directory, you must store\
