    ## Multi-Release JARs and Boot Loader


    The boot loader does not support multi-release JARs, for example, specifying MRJARs
    using the `-Xbootclasspath/a` option. Supporting this would have complicated the
    boot loader implementation for a rarely needed feature.


    ## Same Versioned Files


    A MRJAR is supposed to contain different versions of the same file in a versioned
    directory. If a resource or class file is the same across different platform releases,
    such a file should be added once to the root directory. Currently, the `jar` tool
    issues a warning if it sees the same entry in a multiple versioned directory with
    the same contents.


    Let’s see this rule in action. Copy the contents of the `com.jdojo.mrjar.jdk9\build\classes`
    directory to the `com.jdojo.mrjar.jdk10\build\classes` directory, so both directories
    have the same contents. Run the following command to create a MRJAR that will
    contain code for JDK versions 8, 9, and 10. Note that the files in versioned directories
    9 and 10 will be the same. Warnings in the output are loud and clear.


    ```

    C:\Java9Revealed>jar --create --file mrjars\com.jdojo.mrjar.jar

    -C com.jdojo.mrjar.jdk8\build\classes .

    --release 9 -C com.jdojo.mrjar.jdk9\build\classes .

    --release 10 -C com.jdojo.mrjar.jdk10\build\classes .

    Warning: entry META-INF/versions/9/com/jdojo/mrjar/Main.class contains a class
    that

    is identical to an entry already in the jar

    Warning: entry META-INF/versions/9/com/jdojo/mrjar/TimeUtil.class contains a class
    that

    is identical to an entry already in the jar

    ```


