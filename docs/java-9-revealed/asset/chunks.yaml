- fmt: "■ **Tip** Using a `@deprecated` tag, but not a `@Deprecated` annotation, on\
    \ an API element generates a compiler warning. Prior to JDK 9, you needed to use\
    \ the `-Xlint:dep-ann` compiler flag to see such warnings.\n\nListing 15-1 contains\
    \ the declaration for class named `FileCopier`. Suppose this class is shipped\
    \ as part of a library. The class is deprecated using the `@Deprecated` annotation.\
    \ Its Javadoc uses the `@deprecated` tag to give the deprecation details such\
    \ as when it was deprecated, its replacement, and its removal notice. Before JDK\
    \ 9, the `@Deprecated` annotation type did not contain any elements, so you had\
    \ to provide all details about the deprecation using the `@deprecated` tag in\
    \ the Javadoc for the deprecated API. Note that the `@since` tag used in the Javadoc\
    \ indicates that the `FileCopier` class has existed since version 1.2 of this\
    \ library, whereas the `@deprecated` tag indicates that the class has been deprecated\
    \ since version 1.4 of the library.\n\n**Listing 15-1.** A FileCopier Utility\
    \ Class\n\n```java\n// FileCopier.java\npackage com.jdojo.deprecation;\n\nimport\
    \ java.io.File;\n\n/**\n * The class consists of static methods that can be used\
    \ to\n * copy files and directories.\n *\n * @deprecated Deprecated since 1.4.\
    \ Not safe to use. Use the\n * <code>java.nio.file.Files</code> class instead.\
    \ This class\n * will be removed in a future release of this library.\n *\n *\
    \ @since 1.2\n */\n@Deprecated\npublic class FileCopier {\n    // No direct instantiation\
    \ supported.\n    private FileCopier() {\n    }\n\n    /**\n     * Copies the\
    \ contents of src to dst.\n     * @param src The source file\n     * @param dst\
    \ The destination file\n     * @return true if the copy is successfully,\n   \
    \  * false otherwise.\n     */\n    public static boolean copy(File src, File\
    \ dst) {\n        // More code goes here\n        return true;\n    }\n    //\
    \ More methods go here\n}\n```\n\nThe Javadoc tool moves the contents of the `@deprecated`\
    \ tag to the top in the generated Javadoc to draw the reader’s attention. The\
    \ compiler generates a warning when non-deprecated code *uses* a deprecated API.\
    \ Note that annotating an API with the `@Deprecated` annotation does not generate\
    \ a warning; however, using an API that has been annotated with a `@Deprecated`\
    \ annotation does. If you used the `FileCopier` class outside the class itself,\
    \ you will receive a compiler warning about using the deprecated class.\n\n##\
    \ Updates to `@Deprecated` in JDK 9\n\nSuppose you compiled your code and deployed\
    \ it to production. If you upgraded the JDK version or libraries/frameworks that\
    \ contain new, deprecated APIs that your old application uses, you do not receive\
    \ any warnings and you would miss a chance to migrate away from the deprecated\
    \ APIs. You must recompile your code to receive warnings. There was no tool to\
    \ scan and analyze the compiled code (e.g., JAR files) and report the use of deprecated\
    \ APIs. Even worse is the case when a deprecated API is removed from the newer\
    \ version and your old, compiled code receives unexpected runtime errors. Developers\
    \ were also confused when they looked at a deprecated element Javadoc—there was\
    \ no way to express when the API was deprecated and whether the deprecated API\
    \ will be removed in a future release. All you could do was to specify these pieces\
    \ of information in text as part of the `@deprecated` tag. JDK 9 attempted to\
    \ solve these issues by enhancing the `@Deprecated` annotation. The annotation\
    \ has received two new elements in JDK 9: `since` and `forRemoval`.\n\nPrior to\
    \ JDK 9, the annotation declaration was:\n\n```java\n@Documented\n@Retention(RetentionPolicy.RUNTIME)\n\
    @Target(value={CONSTRUCTOR, FIELD, LOCAL_VARIABLE, METHOD, PACKAGE, PARAMETER,\
    \ TYPE})\npublic @interface Deprecated {\n}\n```\n\nIn JDK 9, the declaration\
    \ for the `Deprecated` annotation changed to the following, with changes shown\
    \ in boldface:\n\n```java\n@Documented\n@Retention(RetentionPolicy.RUNTIME)\n\
    @Target(value={CONSTRUCTOR, FIELD, LOCAL_VARIABLE, METHOD, PACKAGE, MODULE, PARAMETER,\
    \ TYPE})\npublic @interface Deprecated {\n    String since() default \"\";\n \
    \   boolean forRemoval() default false;\n}\n```"
