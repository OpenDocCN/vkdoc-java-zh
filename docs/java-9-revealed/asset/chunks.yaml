    \ Listing [6-4](#index_split_002.html#151) and Listing [6-5](#index_split_002.html#152)\
    \ contain the code for the `TimeUtil` and `Main` classes for JDK 9.\n\n**Listing\
    \ 6-3.** A Module Declaration for a Module Named `com.jdojo.mrjar`\n\n```java\n\
    // module-info.java\nmodule com.jdojo.mrjar {\n    exports com.jdojo.mrjar;\n\
    }\n```\n\n**Listing 6-4.** A `TimeUtil` Class for JDK 9\n\n```java\n// TimeUtil.java\n\
    package com.jdojo.mrjar;\n\nimport java.time.Instant;\nimport java.time.LocalDate;\n\
    import java.time.ZoneId;\n\npublic class TimeUtil {\n    public TimeUtil() {\n\
    \        System.out.println(\"Creating JDK 9 version of TimeUtil...\");\n    }\n\
