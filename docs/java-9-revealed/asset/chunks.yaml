    \ will make Log4j to log messages in a file at `logs/platform.log` file under\
    \ the current directory. Refer to the Log4j documentation for more information\
    \ on this configuration.\n\n***Listing 19-2.*** A Log4j Configuration File Named\
    \ `log4j2.xml`\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<Configuration\
