    **第 8 章**


    **JDK 9 中的重大变更**


    在本章中，你将学习：


    • 新的 JDK 版本命名方案是什么


    • 如何使用 `Runtime.Version` 类解析 JDK 版本字符串


    • JDK/JRE 9 的新目录布局是什么


    • 在 JDK 9 中，认可标准覆盖机制如何工作


    • JDK 9 中使用扩展机制的变化


    • 在 JDK 9 中类加载器如何工作以及模块如何被加载


    • 在 JDK 9 中资源如何被封装在模块中


    • 如何使用 `Module`、`Class` 和 `ClassLoader` 类中的资源查找方法访问模块中的资源


    • `jrt` URL 方案是什么，以及如何使用它访问运行时镜像中的资源


    • 如何在 JDK 9 中访问 JDK 内部 API，以及 JDK 9 中已移除的 JDK API 列表


    • 如何使用 `--patch-module` 命令行选项替换模块中的类和资源


    JDK 9 中有一些变更可能会破坏在 JDK 8 中运行良好的应用程序。在本章中，我将详细描述这些变更。


    新的 JDK 版本命名方案


    在 JDK 9 之前，JDK 的版本命名方案对开发者来说不够直观，程序也难以解析。查看两个 JDK 版本时，你无法分辨它们之间的细微差别。很难回答一个简单的问题：哪个版本包含最新的安全修复，JDK
    7 Update 55 还是 JDK 7 Update 60？答案并非显而易见，你可能猜的是——*JDK 7 Update 60*。


    两个版本包含相同的安全修复。JDK 8 Update 66、1.8.0_66 和 JDK 8u66 版本之间有什么区别？它们代表同一个版本。在理解版本字符串中包含的细节之前，有必要详细了解版本命名方案。JDK
    9 试图标准化 JDK 版本命名方案，使其易于人类理解、易于程序解析，并遵循行业标准的版本命名方案。


    © Kishori Sharan 2017


    K. Sharan, *Java 9 揭秘*, DOI 10.1007/978-1-4842-2592-9_8


    第 8 章 ■ JDK 9 中的重大变更


    JDK 9 包含一个名为 `Runtime.Version` 的静态嵌套类，它表示 Java SE 平台实现的版本字符串。它可以用于表示、解析、验证和比较版本字符串。


    一个*版本字符串*按顺序由以下四个元素组成。只有第一个是必需的：


    • 版本号


    • 预发布信息


    • 构建信息


    • 附加信息


    以下正则表达式定义了版本字符串的格式：


    $vnum(-$pre)?(\+($build)?(-$opt)?)?


    一个*短版本字符串*由一个版本号组成，可选地后跟预发布信息：$vnum(-$pre)?


    你可以有一个像 "9" 这样短的版本字符串，它只包含主版本号；也可以有一个像 "9.0.1-ea+154-20170130.07.36am" 这样长的版本字符串，它包含版本字符串的所有部分。


    版本号


    版本号是由句点分隔的元素序列。其长度可以是任意的。其格式如下：


    ^[1-9][0-9]*(((\.0)*\.[1-9][0-9]*)*)*$


    版本号可以由一到四个元素组成，如下所示：


    $主版本.$次版本.$安全版本(.$附加信息)


    $主版本 元素表示 JDK 版本的主版本号。对于包含重要新功能的主版本，该数字会递增。例如，JDK 8 的主版本是 8，JDK 9 的主版本是 9。当主版本号递增时，版本号中的所有其他部分都会被移除。例如，如果你有一个版本号为
    9.2.2.1，当主版本号从 9 递增到 10 时，新的版本号将是 10。


    $次版本 元素表示 JDK 版本的次版本号。对于次要更新版本，例如错误修复、新的垃圾收集器、新的 JDK 特定 API 等，该数字会递增。


    $安全版本 元素表示 JDK 版本的安全级别更新。对于安全更新，该数字会递增。当次版本号递增时，此元素不会被重置。对于给定的 $主版本，$安全版本 的值越高，始终表示更安全的版本。例如，JDK
    版本 9.1.7 与 JDK 版本 9.5.7 一样安全，因为两个版本的安全级别相同，都是 7。再比如，JDK 版本 9.2.2 比 9.2.1 更安全，因为对于相同的主版本
    9，前者的安全级别 2 大于后者的安全级别 1。


    第 8 章 ■ JDK 9 中的重大变更


    以下规则适用于版本号：


    • 所有元素必须是非负整数。


    • 前三个元素分别被视为主版本、次版本和安全级别；其余元素（如果存在）被视为附加信息，例如表示补丁版本的编号。


    • 只有主版本元素是必需的。


    • 版本号的元素不能包含前导零。例如，JDK 9 的主版本是 9，而不是 09。


    • 尾部元素不能为零。也就是说，你不能有一个像 9.0.0 这样的版本号。它可以是 9、9.2 或 9.0.*x*，其中 *x* 是一个正整数。


    预发布信息


    版本字符串中的 $pre 元素是一个预发布标识符，例如 `ea` 表示早期访问版本，`snapshot` 表示预发布快照，`internal` 表示开发者内部构建。它是可选的。如果存在，它前面会有一个连字符
    (-)，并且必须是一个与正则表达式 ([a-zA-Z0-9]+) 匹配的字母数字字符串。以下版本字符串包含 9 作为版本号，`ea` 作为预发布信息。


    9-ea


    构建信息


    版本字符串中的 $build 元素是一个构建编号，每次推广构建时递增。它是可选的。当版本号的任何部分递增时，它会重置为 1。如果存在，它前面会有一个加号 (+)，并且必须与正则表达式
    (0|[1-9][0-9]*) 匹配。以下版本字符串包含 154 作为构建编号。


    9-ea+154


    附加信息

