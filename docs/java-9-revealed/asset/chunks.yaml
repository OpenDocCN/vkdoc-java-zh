    **About the Author**


    **Kishori Sharan** works as a senior software engineer lead at IndraSoft, Inc.
    He earned a master’s of science degree in computer information systems from Troy
    State University, Alabama. He is a Sun-certified Java 2 programmer and has over
    20 years of experience in developing enterprise applications and providing training
    to professional developers using the Java platform.


    ---


    ![](index-19_1.jpg)


    **About the Technical Reviewer**


    **Manuel Jordan Elera** is an autodidactic developer and researcher who enjoys
    learning new technologies for his own experiments and creating new integrations.
    Manuel won the 2010 Springy Award–Community Champion and Spring Champion 2013.
    In his little free time, he reads the Bible and composes music on his guitar.
    Manuel is known as `dr_pompeii`. He has tech reviewed numerous books for Apress,
    including *Pro Spring, 4th Edition* (2014), *Practical Spring LDAP* (2013), *Pro
    JPA 2, Second Edition* (2013), and *Pro Spring Security* (2013). Read his 13 detailed
    tutorials about many Spring technologies and contact him through his blog at [http://www.manueljordanelera.blogspot.com/](http://www.manueljordanelera.blogspot.com/).
    You can also follow him on Twitter @dr_pompeii.


    ---


    **Acknowledgments**


    My wife Ellen was patient when I spent long hours at my computer working on this
    book. I want to thank her for all of her support in writing this book. I want
    to thank my family members and friends for their encouragement and support: my
    mom Pratima Devi; my elder brothers, Janki Sharan and Dr. Sita Sharan; my nephews,
    Gaurav and Saurav; my sister Ratna; my friends, Karthikeya Venkatesan, Preethi
    Vasudev, Rahul Nagpal, Ravi Datla; and many more friends not mentioned here. I
    would like to thank my coworkers, Forrest “Corky” Butts, Antonio Mathews, and
    Yolanda Robinson, for their support. My sincere thanks are due to the wonderful
    team at Apress for their support during the publication of this book. Thanks to
    Mark Powers, the Editorial Operations Manager, for providing excellent support
    and for being exceptionally patient with me when I was slow in producing manuscript.
    My special thanks to Manuel Jordan Elera, the technical reviewer, whose thorough
    approach reviewing the book helped weed out many technical errors. Last but not
    least, my sincere thanks to Steve Anglin, the Lead Editor at Apress, for taking
    the initiative for the publication of this book.


    ---


    **Introduction**


    **How This Book Came About**


    The Java community is excited to see the module system and Java shell finally
    added to the Java platform in JDK 9, and so am I. After all, we had to wait over
    10 years to see this module system in action. Several previous JDK releases saw
    prototypes of the module system, which were later dropped. The introduction of
    the module system in JDK 9 has also been a bumpy ride. It went through several
    iterations of proposals and prototypes. I started writing this book in early 2016.
    I have to admit that this was a difficult book to write. I had to race against
    the JDK release date and the changes the Java team was making to the module system.


    I would write about a topic to find a few months later that the final release
    date for JDK 9 had moved and whatever I had written was no longer valid. Today
    is the last day of February 2016 and it seems that the dust has finally settled—the
    Java team and the Java community are happy with the module system—and you are
    going to get this book as it exists today. JDK 9 is scheduled to be released in
    late July 2017. JDK 9 is feature complete at the time of this writing. It is very
    unlikely that you will see many instances where something covered in this book
    does not work. However, five months is a long time in terms of software releases,
    so don’t be surprised if a piece of code does not work and you have to tweak it
    a bit to make it work when you read this book.


    In the beginning, this book was supposed to be 140 pages. As my writing progressed,
    I thought it would be a disservice to readers to write a book so short covering
    one of the biggest additions to the Java platform. I thank my publisher who never
    complained about me adding hundreds of pages to the book. I devoted nine chapters
    (Chapter [2](http://dx.doi.org/10.1007/978-1-4842-2592-9_2) to Chapter [10](http://dx.doi.org/10.1007/978-1-4842-2592-9_10))
    solely to describing the new module system. Chapter [11](http://dx.doi.org/10.1007/978-1-4842-2592-9_11)
    covers the Java shell (`JShell`) with unmatched details.


    I spent countless hours researching this topic. I was writing on topics that were
    under development. There were no materials on the Internet or in books that I
    could find to learn about these topics. One of the biggest challenges was the
    fast-changing JDK implementation during the development phase. My main sources
    of research were the Java source code, Java Enhancement Processes (JEPs), and
    Java Specification Requests (JSRs). I also spent quite a bit of time reading the
    Java source code to learn more about some of the new topics in JDK 9. It was always
    fun to play with Java programs, sometimes for hours, and then add them to the
    book. Sometimes, it was frustrating to see that the code worked a week ago and
    then did not work anymore. Subscribing to the mailing lists for all JDK 9 projects
    helped me to stay in sync with the JDK.'
