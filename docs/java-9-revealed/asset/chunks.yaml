    entry

    for ABADCURRENCYFILE is ignored because of the invalid country code.

    2017-02-09 10:45:52,420 ERROR com.jdojo.logger.Log4jLogger [main] An unknown error
    occurred.

    2017-02-09 10:45:52,420 INFO com.jdojo.logger.Log4jLogger [main] FYI

