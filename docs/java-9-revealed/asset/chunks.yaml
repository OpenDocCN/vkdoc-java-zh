- fmt: "# To configure to run the project, right-click the project and select Properties.\
    \ From the Project Properties dialog box, select the Run node in the Categories\
    \ list. Enter `com.jdojo.intro.Welcome` as the value for the Main Class (see Figure\
    \ [3-24). C](#index_split_001.html#76)lick OK to close the dialog box.\n\n![](index-76_1.jpg)\n\
    \n**Figure 3-24.** Configuring your NetBeans project to run\n\nOnce your project\
    \ is configured to run, you can select Run ➤ Run Project or press F6 to run your\
    \ project. Running your project will run the main class you have specified in\
    \ the project's run configuration.\n\n## Summary\n\nDeveloping a Java application\
    \ using a module does not change the way Java types are arranged into packages.\
    \ The source code for a module contains a `module-info.java` file at the root\
    \ of the package hierarchy. That is, the `module-info.java` file is placed in\
    \ the unnamed package. It contains the module declaration.\n\nThe `javac` compiler,\
    \ the `jar` tool, and the `java` launcher have been enhanced in JDK 9 to work\
    \ with modules. The `javac` compiler accepts new options such as `--module-path`\
    \ used to locate application modules, `--module-source-path` to locate module's\
    \ source code, and `--module-version` to specify the version of the module being\
    \ compiled. The `jar` tool lets you specify the main class and module version\
    \ for a modular JAR using the `--main-class` and `--module-version` options, respectively.\
    \ The `java` launcher can be run in class path mode, module mode, or mixed mode.\
    \ To run a class in a module, you need to specify the module path using the `--module-path`\
    \ option. You need to specify the main class name using the `--module` option.\
    \ The main class is specified in the form `<module>/<main-class>` where `<module>`\
    \ is the module that contains the main class and `<main-class>` is the fully qualified\
    \ name of the class containing the `main()` method serving as the entry point\
    \ for the application.\n\nIn JDK 9, every type belongs to a module. If a type\
    \ is loaded from the class path, it belongs to an unnamed module of the class\
    \ loader that loads it. In JDK 9, every class loader maintains an unnamed module\
    \ whose members are all types loaded by that class loader from the class path.\
    \ A type loaded from the module path belongs to the module in which it was defined.\n\
    \nAn instance of the `Module` class represents a module at runtime. The `Module`\
    \ class is in the `java.lang` package. Use the `Module` class to know everything\
    \ about a module at runtime. The `Class` class has been enhanced in JDK 9. Its\
    \ `getModule()` method returns a `Module` instance representing the module this\
    \ class is a member of. The `Module` class contains a `getName()` method that\
    \ returns the name of the module as a `String`; for an unnamed module, the method\
    \ returns `null`.\n\nThe NetBeans IDE is being updated to support JDK 9 and developing\
    \ modular Java applications. At the time of this writing, NetBeans allows you\
    \ to create modules, compile them, package them in modular JARs, and run them\
    \ from within the IDE. You need to create a separate Java project for a module.\
    \ Its final release will allow you to have multiple modules in one Java project.\
    \ The IDE has support for adding the `module-info.java` file. The IDE has a very\
    \ cool feature that allows you to view and save module graphs!\n\n## Chapter 4:\
    \ Module Dependency\n\nIn this chapter, you will learn:\n\n- How to declare module\
    \ dependency\n- What an implicit readability of a module means and how to declare\
    \ it\n- The difference between unqualified and qualified exports\n- Declaring\
    \ runtime optional dependency of a module\n- How to open an entire module or its\
    \ selected packages for deep reflection\n- Accessibility types in JDK 9\n- Splitting\
    \ packages across modules\n- Restrictions on module declarations\n- Different\
    \ types of modules: named, unnamed, explicit, automatic, normal, and open modules\n\
    - How to dissemble a module's definition using the `javap` tool\n\nThe example\
    \ code in this chapter goes through several steps. The source code for this book\
