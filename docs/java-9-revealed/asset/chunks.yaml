- fmt: "# Listing 10-17 and 10-18: Module Declaration and LayerTest Class\n\n`Listing\
    \ [10-18 con](#index_split_004.html#262)` contains code for a `LayerTest` class\
    \ that contains the logic to create a custom layer and load modules into it. A\
    \ detailed explanation of the logic used in this class follows the output of this\
    \ class.\n\n***Listing 10-17.*** A Module Declaration for a Module Named `com.jdojo.later.test`\n\
    \n```java\n// module-info.java\n\nmodule com.jdojo.layer.test {\n\n    // This\
    \ module reads version 1.0 of the com.jdojo.layer module\n\n    requires com.jdojo.layer;\n\
    \n}\n```\n\n***Listing 10-18.*** The `LayerTest` Class\n\n```java\n// LayerTest.java\n\
    \npackage com.jdojo.layer.test;\n\nimport java.lang.module.Configuration;\n\n\
    import java.lang.module.ModuleFinder;\n\nimport java.lang.reflect.Method;\n\n\
    import java.nio.file.Path;\n\nimport java.nio.file.Paths;\n\nimport java.util.Set;\n\
    \npublic class LayerTest {\n\n    public static void main(String[] args) {\n\n\
    \        /* Location for the custom module. You will need to change the\n\n  \
    \         path to point to a directory on your PC that contains the\n\n      \
    \     modular JAR for the com.jdojo.layer (version 2.0) module.\n\n        */\n\
    \n        final String CUSTOM_MODULE_LOCATION = \"C:\\\\Java9Revealed\\\\customLib\"\
    ;\n\n        // Define the set of root modules to be resolved in the custom layer\n\
    \n        Set<String> rootModules = Set.of(\"com.jdojo.layer\");\n\n        //\
    \ Create a custom layer\n\n        ModuleLayer customLayer = createLayer(CUSTOM_MODULE_LOCATION,\
    \ rootModules);\n\n        // Test the class in the boot layer\n\n        ModuleLayer\
    \ bootLayer = ModuleLayer.boot();\n\n        testLayer(bootLayer);\n\n       \
    \ System.out.println();\n\n        // Test the class in the custom layer\n\n \
    \       testLayer(customLayer);\n\n    }\n\n    public static ModuleLayer createLayer(String\
    \ modulePath, Set<String> rootModules) {\n\n        Path path = Paths.get(modulePath);\n\
    \n        // Define the module finders to be used in creating a\n\n        //\
    \ configuration for the custom layer\n\n        ModuleFinder beforFinder = ModuleFinder.of(path);\n\
    \n        ModuleFinder afterFinder = ModuleFinder.of();\n\n        // Create a\
    \ configuration for the custom layer\n\n        Configuration parentConfig = ModuleLayer.boot().configuration();\n\
    \n        Configuration config =\n\n            parentConfig.resolve(beforFinder,\
    \ afterFinder, rootModules);\n\n        /* Create a custom layer with one class\
    \ loader. The parent for\n\n           the class loader is the system class loader.\
    \ The boot layer is\n\n           the parent layer of this custom layer.\n\n \
    \       */\n\n        ClassLoader sysClassLoader = ClassLoader.getSystemClassLoader();\n\
    \n        ModuleLayer parentLayer = ModuleLayer.boot();\n\n        ModuleLayer\
    \ layer = parentLayer.defineModulesWithOneLoader(config, sysClassLoader);\n\n\
    \        // Check if we loaded the module in this layer\n\n        if (layer.modules().isEmpty())\
    \ {\n\n            System.out.println(\"\\nCould not find the module \" + rootModules\n\
    \n                + \" at \" + modulePath + \". \"\n\n                + \"Please\
    \ make sure that the com.jdojo.layer.v2.jar exists \"\n\n                + \"\
    at this location.\" + \"\\n\");\n\n        }\n\n        return layer;\n\n    }\n\
    \n    public static void testLayer(ModuleLayer layer) {\n\n        final String\
    \ moduleName = \"com.jdojo.layer\";\n\n        final String className = \"com.jdojo.layer.LayerInfo\"\
    ;\n\n        final String methodName = \"printInfo\";\n\n        try {\n\n   \
    \         // Load the class\n\n            Class<?> cls = layer.findLoader(moduleName)\n\
    \n                .loadClass(className);\n\n            // Instantiate the class\
    \ using its no-args constructor\n\n            Object obj = cls.getConstructor().newInstance();\n\
    \n            // Find the method\n\n            Method method = cls.getMethod(methodName);\n\
    \n            // Call the method that will print the details\n\n            method.invoke(obj);\n\
    \n        } catch (Exception e) {\n\n            e.printStackTrace();\n\n    \
    \    }\n\n    }\n\n}\n```\n\n## Explanation of the `LayerTest` Class Logic\n\n\
    I explain the logic in the `LayerTest` class by methods. The `main()` method declares\
    \ a variable named `CUSTOM_MODULE_LOCATION`, which stores the location of version\
    \ 2.0 of the `com.jdojo.layer` module. You must change the path to point to a\
    \ directory on your computer that contains the compiled module code for version\
    \ 2.0 of the `com.jdojo.layer` module.\n\n```java\nfinal String CUSTOM_MODULE_LOCATION\
    \ = \"C:\\\\Java9Revealed\\\\customLib\";\n```\n\nThe code stores `com.jdojo.layer`\
    \ as the sole root module for the custom layer’s configuration: `Set<String> rootModules\
    \ = Set.of(\"com.jdojo.layer\");`\n\nThe `createLayer()` method is called to create\
    \ a custom layer. The method uses logic to create a custom layer with version\
    \ 2.0 of the `com.jdojo.layer` module at `CUSTOM_MODULE_LOCATION`:\n\n```java\n\
    ModuleLayer customLayer = createLayer(CUSTOM_MODULE_LOCATION, rootModules);\n\
    ```\n\nThe `main()` method obtains the reference of the boot layer:\n\n```java\n\
    ModuleLayer bootLayer = ModuleLayer.boot();\n```\n\nNow, the `testLayer()` method\
    \ is called—once for boot layer and once for the custom layer. The method finds\
    \ the class loader for the `com.jdojo.layer` module in the layer and loads the\
    \ `com.jdojo.layer.LayerInfo` class.\n\n```java\nfinal String moduleName = \"\
    com.jdojo.layer\";\nfinal String className = \"com.jdojo.layer.LayerInfo\";\n\
    final String methodName = \"printInfo\";\n\nClass<?> cls = layer.findLoader(moduleName)\n\
