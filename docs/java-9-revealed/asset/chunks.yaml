    Chapter 20 ■ Other Changes in JDK 9


    ***Listing 20-7.*** Using the @SafeVarargs Annotation on a Private Method in JDK
    9


    // SafeVarargsTest.java


    package com.jdojo.misc;


    public class SafeVarargsTest {


    // Allowed in JDK 9


    **@SafeVarargs**


