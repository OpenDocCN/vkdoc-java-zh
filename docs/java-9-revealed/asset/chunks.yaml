    you execute


    this command.


    • The startup snippets are re-executed.


    • The execution state of the tool is restarted.


    • The jshell configurations that were set using the /set command are retained.


    • The execution environment set using the /env command is retained.


    The following jshell session declares a variable, resets the session, and attempts
    to print the variable’s value. Note that, on resetting a session, all declared
    variables are lost, so the variable previously declared is not found:


    jshell> int x = 987


    x ==> 987


    jshell> /reset


    | Resetting state.


    jshell> x


    | Error:


    | cannot find symbol


    | symbol: variable x


    | x


    | ^


    jshell>


    Chapter 11 ■ the Java Shell


    Reloading the JShell State


    Suppose you played with many snippets in a jshell session and exited the session.
    Now you want to go back and replay those snippets. One way to do it is to start
    a new jshell session and re-enter those snippets.


    Re-entering several snippets in jshell is a hassle. There is an easy way to achieve
    this—by using the


    /reload command. The /reload command resets the jshell state and replays all valid
    snippets and /drop commands in the same sequence they were entered before. You
    can use the -restore and -quiet options to customize its behavior.


    The /reload command without any options resets the jshell state and replays the
    valid history from one of the following prior actions/events, whichever occurs
    last:


    • Beginning of the current session


    • When the last /reset command was executed


    • When the last /reload command was executed


    You can use the -restore option with the /reload command. It resets and replays
    the history between the following two actions/events, whichever are the last two:


    • The launch of jshell


    • Execution of the /reset command


    • Execution of the /reload command'
