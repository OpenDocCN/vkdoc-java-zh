    以下命令在运行类时，将 `jdk.serialFilter` 系统属性作为命令行选项进行设置。此时无需担心命令的其他细节。


    C:\Java9Revealed>java **-Djdk.serialFilter=maxarray=100;maxdepth=3;com.jdojo.****
    --module-path com.jdojo.misc\build\classes --module com.jdojo.misc/com.jdojo.misc.ObjectFilterTest


    清单 20-16 展示了 `JAVA_HOME\conf\security\java.security` 配置文件的局部内容。该文件包含更多条目。此处仅展示了一个设置过滤器的条目，其效果与设置
    `jdk.serialFilter` 系统属性相同，如前述命令所示。


    ***清单 20-16.*** JAVA_HOME\conf\security\java.security 文件中展示 jdk.serialFilter 属性设置的条目


    maxarray=100;maxdepth=3;com.jdojo.**


    ■ **提示** 如果同时在系统属性和配置文件中设置了过滤器，则使用系统属性中的值。


    当你运行带有全局过滤器的 java 命令时，会在 stderr 上看到类似如下的消息：


    Feb 17, 2017 9:23:45 AM java.io.ObjectInputFilter$Config lambda$static$0


    INFO: Creating serialization filter from maxarray=20;maxdepth=3;!com.jdojo.**


    这些消息会作为平台消息，通过名为 `java.io.serialization` 的记录器（针对 `java.base` 模块）进行记录。如果你指定了平台记录器（参见第
    [19](http://dx.doi.org/10.1007/978-1-4842-2592-9_19) 章），这些消息将被记录到你的记录器中。其中一条消息会打印出系统属性或配置文件中设置的全局过滤器。


    第 20 章 ■ JDK 9 中的其他变更


    你也可以在代码中使用 `ObjectInputFilter.Config` 类的静态 `setSerialFilter()` 方法来设置全局过滤器：


    // 创建一个过滤器


    String pattern = "maxarray=100;maxdepth=3;com.jdojo.**";


    ObjectInputFilter globalFilter = ObjectInputFilter.Config.createFilter(pattern);


    // 设置一个全局过滤器


    ObjectInputFilter.Config.setSerialFilter(globalFilter);


    ■ **提示** 全局过滤器只能设置一次。例如，如果你通过 `jdk.serialFilter` 系统属性设置了过滤器，那么在代码中调用 `Config.setSerialFilter()`
    将会抛出 `IllegalStateException`。


    当你使用 `Config.setSerialFilter()` 方法设置全局过滤器时，必须设置一个非空的过滤器。


    这些规则的存在是为了确保通过系统属性或配置文件设置的全局过滤器不能在代码中被覆盖。


    无论过滤器是通过何种方式设置的，你都可以使用 `ObjectInputFilter.Config` 类的静态 `getSerialFilter()` 方法来获取全局过滤器。如果没有全局过滤器，该方法返回
    `null`。


    `ObjectInputFilter.FilterInfo` 是一个嵌套的静态接口，其实例封装了当前反序列化的上下文。`ObjectInputFilter.FilterInfo`
    的实例会被创建并传递给过滤器的 `checkInput()` 方法。你无需在程序中实现此接口或创建其实例。


    该接口包含以下方法，你可以在自定义过滤器的 `checkInput()` 方法中使用它们来读取当前的反序列化上下文：


    • `Class<?> serialClass()`


    • `long arrayLength()`


    • `long depth()`


    • `long references()`


    • `long streamBytes()`


    `serialClass()` 方法返回正在被反序列化的对象的类。对于数组，它返回数组的类，而不是数组组件类型的类。当反序列化过程中没有创建新对象时，此方法返回
    `null`。


    `arrayLength()` 方法返回正在被反序列化的数组的长度。如果正在被反序列化的对象不是数组，则返回 `-1`。


    `depth()` 方法返回正在被反序列化的对象的嵌套深度。它从 1 开始，每嵌套一层增加 1，当嵌套对象返回时减少 1。


    `references()` 方法返回当前正在被反序列化的对象引用的数量。

