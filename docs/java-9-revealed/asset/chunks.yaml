    JDK 和 JRE 的变更


    JDK 和 JRE 在 Java SE 9 中已被模块化。这需要对它们的结构进行一些更改。还进行了一些其他更改以提高性能、安全性和可维护性。这些更改中的大多数影响的是库开发者和
    IDE 开发者，而非应用程序开发者。为了方便讨论这些更改，我将它们分为三大类：


    • 布局变更


    • 行为变更


    • API 变更


    第 8 章 ■ JDK 9 中的重大变更


    以下各节将详细描述这些变更。


    JDK 和 JRE 中的布局变更


    结构变更影响了运行时映像中目录和文件的组织方式及其内容。在 Java SE 9 之前，JDK 构建系统会生成两种类型的运行时映像——Java 运行时环境（JRE）和
    Java 开发工具包（JDK）。JRE 是 Java SE 平台的完整实现，而 JDK 则包含一个嵌入的 JRE 以及开发工具和库。你可以只安装 JRE，或者安装包含嵌入
    JRE 的 JDK。图 8-1 显示了 Java SE 9 之前 JDK 安装中的主要目录。`JDK_HOME` 是安装 JDK 的目录。如果你只安装了 JRE，那么目录仅存在于
    `jre` 目录下。


    JDK_HOME


    bin


    include


    jre


    lib


    bin


    lib


    ***图 8-1.** Java SE 9 之前的 JDK 和 JRE 目录安排*


    在 Java SE 9 之前的 JDK 中：


    • `bin` 目录曾包含命令行开发和调试工具，例如 `javac`、`jar` 和 `javadoc`。它还曾包含用于启动 Java 应用程序的 `java`
    命令。


    • `include` 目录包含编译本地代码时要使用的 C/C++ 头文件。


    • `lib` 目录包含多个 JAR 文件和其他类型的文件，用于 JDK 的工具。它包含一个 `tools.jar` 文件，其中包含了 `javac` 编译器的
    Java 类。


    • `jre\bin` 目录包含基本命令，例如 `java` 命令。在 Windows 平台上，它包含系统的运行时动态链接库（DLL）。


    • `jre\lib` 目录包含用户可编辑的配置文件，例如 `.properties` 和 `.policy` 文件。


    • `jre\lib\endorsed` 目录包含允许“认可标准覆盖机制”的 JAR 文件。这允许将实现认可标准或独立技术的类及接口的更新版本（这些是在 Java
    社区流程之外创建的）纳入 Java 平台。这些 JAR 文件会被前置到 JVM 的引导类路径之前，从而覆盖 Java 运行时中存在的这些类和接口的任何定义。


    第 8 章 ■ JDK 9 中的重大变更


    • `jre\lib\ext` 目录包含允许扩展机制的 JAR 文件。此机制通过扩展类加载器加载此目录中的所有 JAR 文件，该加载器是引导类加载器的子加载器，也是系统类加载器的父加载器（系统类加载器加载所有应用程序类）。通过将
    JAR 文件放置在此目录中，你可以扩展 Java SE 平台。这些 JAR 文件的内容对此运行时映像上编译或运行的所有应用程序都是可见的。


    • `jre\lib` 目录包含多个 JAR 文件。`rt.jar` 文件包含运行时的 Java 类和资源文件。许多工具依赖于 `rt.jar` 文件的位置。


    • `jre\lib` 目录包含非 Windows 平台的动态链接本地库。


    • `jre\lib` 目录包含多个其他子目录，其中包含运行时文件，例如字体和图像。

