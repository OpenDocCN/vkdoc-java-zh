    \npackage com.jdojo.prime.generic;\n\nimport com.jdojo.prime.PrimeChecker;\n\n\
    public class GenericPrimeChecker implements PrimeChecker {\n\n    private static\
    \ final String PROVIDER_NAME = \"jdojo.generic.primechecker\";\n```"
