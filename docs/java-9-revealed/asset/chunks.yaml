    Multi-Release Manifest Attribute


    A MRJAR contains a special attribute entry in its MANIFEST.MF file:


    Multi-Release: true


    The Multi-Release attribute is added by the jar tool for a MRJAR. If the value
    for this attribute is true, it means the JAR is a multi-release JAR. If its value
    is false or the attribute is missing, it is not a multi-release JAR. The attribute
    is added to the main section in the manifest file.


    A new constant named MULTI_RELEASE has been added to the Attributes.Name class,
    which is in


    the java.util.jar package, to represent the new attribute Multi-Release in the
    manifest file. So, the Attributes.Name.MULTI_RELEASE constant represents the value
    for the Multi-Release attribute in Java code.


    The JMOD Format


    JDK 9 introduced a new format, called JMOD, to package modules. JMOD files are
    designed to handle more content types than JAR files can. JMOD files can package
    native code, configuration files, native commands, and other kinds of data. At
    the time of this writing, the JMOD format is based on the ZIP format, which is
    going to change in the future. The JDK 9 modules are packaged in JMOD format for
    you to use at compile-time and link time. JMOD format is not supported at runtime.
    You can find them in the JDK_HOME\jmods directory, where JDK_HOME is the directory
    in which you have installed the JDK 9\. You can package your own modules in JMOD
    format. Files in the JMOD format have a .jmod extension. For example, the platform
    module named java.base has been packaged in the java.base.jmod file.


    JMOD files can contain native code, which is a bit tricky to extract and link
    on-the-fly at runtime. This is the reason that JMOD files are supported at compile-time
    and link time, but not at runtime.


    Using the jmod Tool


    JDK 9 ships with a new tool called jmod. It is located in the JDK_HOME\bin directory.
    It can be used to create a JMOD file, list the contents of a JMOD file, print
    the description of a module, and record hashes of the modules used. The general
    syntax to use the jmod tool is as follows:


    jmod <subcommand> <options> <jmod-file>


    Chapter 6 ■ paCkaging Modules


    You must use one of the sub-commands with the jmod command:


    • create


    • extract


    • list


    • describe


    • hash


    The list and describe sub-commands do not accept any options. The <jmod-file>
    is the JMOD file you are creating or an existing JMOD file that you want to describe.
    Table [6-1](#index_split_002.html#159) contains the list of options supported
    by the tool.


    ***Table 6-1.** List of Options for the jmod Tool*


    **Option**


    **Description**


    --class-path <path>


    Specifies the class path where classes to be packaged can be found.


    <path> can be a list of paths to JAR files or directories containing


    application classes. Contents at <path> will be copied to the JMOD


    file.


    --cmds <path>


    Specifies a list of directories containing native commands, which


    need to be copied to the JMOD file.


    --config <path>


    Specifies a list of directories containing user-editable configuration


    files to be copied to the JMOD file.


    --dir <path>


    Specifies the target directory where the contents of the specified


    JMOD file will be extracted.


    --do-not-resolve-by-default


    If you create a JMOD file using this option, the module contained in


    the JMOD file will be excluded from the default set of root modules.


    To resolve such a module, you have to add it to the default set of


    root modules using the --add-modules command-line option.


    --dry-run


    Dry runs the hashing of modules. Using this option, computes and


    prints the hashes, but does not record them in the JMOD file.


    --exclude <pattern-list>


