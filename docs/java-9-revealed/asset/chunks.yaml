    \ 9中强封装的前提。当一个模块导出一个包时，依赖于该模块的其他模块只能访问导出包中的公共API。为了在运行时授予对所有包进行深度反射访问（访问公共和私有API）的权限，你可以声明一个*开放*模块。\n\
