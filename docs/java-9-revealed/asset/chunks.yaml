- fmt: '# Plugin Reference


    ## exclude-files


    - **Plugin Name**: `exclude-files`

    - **Option**: `--exclude-files=<pattern-list>`

    - **Description**: Specify files to exclude. e.g.: `**.java`, `glob:/java.base/native/client/**`


    ## exclude-jmod-section


    - **Plugin Name**: `exclude-jmod-section`

    - **Option**: `--exclude-jmod-section=<section-name>`

    - **Description**: Specify a JMOD section to exclude. `<section-name>` is `"man"`
    or `"headers"`.


    ## exclude-resources


    - **Plugin Name**: `exclude-resources`

    - **Option**: `--exclude-resources=<pattern-list>`

    - **Description**: Specify resources to exclude. e.g.: `**.jcov`, `glob:**/META-INF/**`


    ## generate-jli-classes


    - **Plugin Name**: `generate-jli-classes`

    - **Option**: `--generate-jli-classes=@filename`

    - **Description**: Takes a file hinting to `jlink` what `java.lang.invoke` classes
    to pre-generate. If this flag is not specified a default set of classes will be
    generated.


    ## include-locales


    - **Plugin Name**: `include-locales`

    - **Option**: `--include-locales=<langtag>[,<langtag>]*`

    - **Description**: BCP 47 language tags separated by a comma, allowing locale
    matching defined in RFC 4647. e.g.: `en`, `ja`, `*-IN`


    ## order-resources


    - **Plugin Name**: `order-resources`

    - **Option**: `--order-resources=<pattern-list>` of paths in priority order. If
    a `@file` is specified, then each line should be an exact match for the path to
    be ordered.

    - **Description**: Order resources. e.g.: `**/module-info.class`, `@classlist`,
    `/java.base/java/lang/**`


    ## release-info


    - **Plugin Name**: `release-info`

    - **Option**: `--release-info=<file>|add:<key1>=<value1>:<key2>=<value2>:...|del:<key
    list>`

    - **Description**: `<file>` option is to load release properties from the supplied
    file. `add:` is to add properties to the release file. Any number of `<key>=<value>`
    pairs can be passed. `del:` is to delete the list of keys in release file.


    ## strip-debug


    - **Plugin Name**: `strip-debug`

    - **Option**: `--strip-debug`

    - **Description**: Strip debug information from the output image.


    ## strip-native-commands


    - **Plugin Name**: `strip-native-commands`

    - **Option**: `--strip-native-commands`

    - **Description**: Exclude native commands (such as `java`/`java.exe`) from the
    image.


    ## system-modules


    - **Plugin Name**: `system-modules`

    - **Option**: `--system-modules`

    - **Description**: Fast loading of module descriptors (always enabled).


    ## vm


    - **Plugin Name**: `vm`

    - **Option**: `--vm=<client|server|minimal|all>`

    - **Description**: Select the HotSpot VM in the output image. Default is `all`.


    ## Pattern List Format


    For options requiring a `<pattern-list>`, the value will be a comma separated
    list of elements each using one the following forms:


    - `<glob-pattern>`

    - `glob:<glob-pattern>`

    - `regex:<regex-pattern>`

    - `@<filename>` where `filename` is the name of a file containing patterns to
    be used, one pattern per line.


    ## Example Command


    The following command uses the `compress` and `strip-debug` plugins. The `compress`
    plugin will compress the image, which will result in a smaller image size. I use
    the compression level 2 to have the maximum compression. The `strip-debug` plugin
    will remove the debugging information from the Java code, thus further reducing
    the size of the image. Make sure to delete the `primechecker` directory that was
    previously created before you run this command.


    ```

    C:\Java9Revealed>jlink --module-path jmods;C:\java9\jmods

    --compress 2

    --strip-debug

    --add-modules com.jdojo.prime.client,com.jdojo.prime.generic,com.jdojo.prime.faster

    --launcher runprimechecker=com.jdojo.prime.client

    --output primechecker

    ```


    > **Tip**: At the time of this writing, the plugin API is strictly experimental
    and the execution order of the plugins is not defined. In its early implementation,
    the `jlink` tool also supported custom plugins, which was later removed.


    # The `jimage` Tool


    The Java runtime ships the modular runtime image in a JIMAGE file. The file is
    named `modules` and it is located in `JAVA_HOME\lib`, where `JAVA_HOME` could
    be your `JDK_HOME` or `JRE_HOME`. The `jimage` tool is used to explore the contents
    of JIMAGE files. It can:


    - Extract entries from the JIMAGE file.

    - Print the summary of the contents stored in the JIMAGE.

    - Print the list of entries such as their name, size, offset, etc.

    - Verify class files.


    The `jimage` tool is stored in the `JDK_HOME\bin` directory. The general format
    of the command is as follows:


    ```

    jimage <subcommand> <options> <jimage-file-list>

    ```


    Here, `<subcommand>` is one of the subcommands listed in Table 7-2. `<options>`
    is one or more options listed in Table 7-3; `<jimage-file-list>` is a space-separated
    list of JIMAGE files to be explored.


    **Table 7-2.** A List of Sub-Commands Used with the `jimage` Tool


    | Sub-Command | Description |

    |-------------|-------------|

    | `extract` | Extracts all entries from the specified JIMAGE files to the current
    directory. Use the `--dir` option to specify another directory for extracted entries.
    |

    | `info` | Prints the detailed information contained in the header of the specified
    JIMAGE file. |

    | `list` | Prints the list of all modules and their entries in the specified JIMAGE
    file. Use the `--verbose` option to include the details of the entries such as
    its size, offset, and whether the entry is compressed. |

    | `verify` | Prints a list of `.class` entries in the specified JIMAGE files that
    do not verify as classes. |


    **Table 7-3.** A List of Options Used with the `jimage` Tool


    | Option | Description |

    |--------|-------------|

    | `--dir <dir-name>` | Specifies the target directory for the `extract` subcommand
    where the entries in the JIMAGE files will be extracted. |

    | `-h`, `--help` | Prints a usage message for the `jimage` tool. |

    | `--include <pattern-list>` | Specifies a list of patterns for filtering entries.
    The value for the pattern list is a comma-separated list of elements, each using
    one the following forms: `<glob-pattern>`, `glob:<glob-pattern>`, `regex:<regex-pattern>`.
    |

    | `--full-version` | Prints full version information for the `jimage` tool. |

    | `--verbose` | When used with the `list` sub-command, prints entry details such
    as size, offset, and compression level. |

    | `--version` | Prints version information for the `jimage` tool. |


    ## Examples


    I show a few examples of using the `jimage` command. Examples use the JDK 9 runtime
    image that is stored at `C:\java9\lib\modules` on my computer. You will need to
    replace this image location with yours when you run these examples. You can also
    use any custom runtime image created by the `jlink` tool in these examples.


    The following command extracts all entries from the runtime image and copies them
    to the `extracted_jdk` directory. The command takes a few seconds to complete.


    ```

    C:\Java9Revealed>jimage extract --dir extracted_jdk C:\java9\lib\modules

    ```


    The following command extracts all image entries with the `.png` extension from
    the JDK runtime image into an `extracted_images` directory:


    ```

    C:\Java9Revealed>jimage extract --include regex:.+\.png --dir extracted_images
    C:\java9\lib\modules

    ```


    The following command lists all entries in the runtime image. A partial output
    is shown:


    ```

    C:\Java9Revealed>jimage list C:\java9\lib\modules

    jimage: C:\java9\lib\modules

    Module: java.activation

    META-INF/mailcap.default

    META-INF/mimetypes.default

    ...

    Module: java.annotations.common

    javax/annotation/Generated.class

    ...

    ```


    The following command lists all entries in the runtime image along with the entries''
    details. Notice the use of the `--verbose` option. A partial output is shown.


    ```

    C:\Java9Revealed>jimage list --verbose C:\java9\lib\modules

    jimage: C:\java9\lib\modules

    Module: java.activation

    Offset      Size   Compressed   Entry

    34214466    292    0            META-INF/mailcap.default

    34214758    562    0            META-INF/mimetypes.default

    ...

    Module: java.annotations.common

    Offset      Size   Compressed   Entry

    34296622    678    0            javax/annotation/Generated.class

    ...

    ```'
