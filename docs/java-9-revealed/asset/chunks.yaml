- fmt: "# The `HttpResponse` Class and Trailers\n\nThe `HttpResponse` class contains\
    \ a `trailers()` method that returns response trailers as an instance of the `CompletableFuture<HttpHeaders>`.\
    \ Notice the name of the returned object type—`HttpHeaders`. The HTTP/2 Client\
    \ API does have a type named `HttpTrailers`. You need to retrieve the response\
    \ body before you can retrieve the trailers. At the time of this writing, the\
    \ HTTP/2 Client API does not support processing HTTP trailers. The following snippet\
    \ of code shows you how to print all response trailers when the API supports it:\n\
    \n```\n// Get an HTTP response\nHttpResponse<String> response = HttpClient.newBuilder()\n\
    \    .followRedirects(HttpClient.Redirect.ALWAYS)\n    .build()\n    .send(HttpRequest.newBuilder()\n\
    \        .uri(new URI(\"http://www.google.com\"))\n        .GET()\n        .build(),\n\
    \    asString());\n\n// Read the response body\nString body = response.body();\n\
    \n// Process trailers\nresponse.trailers()\n    .whenComplete((HttpHeaders trailers,\
    \ Throwable t) -> {\n        if(t == null) {\n            trailers.map()\n   \
    \             .entrySet()\n                .forEach(System.out::println);\n  \
    \      } else {\n            t.printStackTrace();\n        }\n    });\n```\n\n\
    # Setting the Request Redirection Policy\n\nIn response to an HTTP request, a\
    \ web server may return a `3XX` response status code, where `X` is a digit between\
    \ `0` and `9`. This status code indicates that an additional action is required\
    \ on the client's part to fulfill the request. For example, a status code of `301`\
    \ indicates that the URL has permanently moved to a new location.\n\nThe response\
    \ body contains alternative locations. By default, upon receiving a `3XX` status\
    \ code, the request is not resubmitted to a new location. You can set one of the\
    \ following constants of the `HttpClient.Redirect` enum as a policy for your `HttpClient`\
    \ to act in case the returned response contains a `3XX` response status code:\n\
    \n- `ALWAYS`\n- `NEVER`\n- `SAME_PROTOCOL`\n- `SECURE`\n\n`ALWAYS` indicates that\
    \ the redirects should always be followed. That is, the request should be resubmitted\
    \ to the new location.\n\n`NEVER` indicates that the redirects should never be\
    \ followed. This is the default.\n\n`SAME_PROTOCOL` indicates that the redirection\
    \ may occur if the old and new locations use the same protocol—for example, HTTP\
    \ to HTTP or HTTPS to HTTPS.\n\n`SECURE` indicates that the redirection should\
    \ always occur, except when the old location uses HTTPS and the new one uses HTTP.\n\
    \nI covered how to use the `followRedirect` configuration setting on an `HttpClient`\
    \ in previous sections.\n\n# Using the WebSocket Protocol\n\nThe WebSocket protocol\
    \ provides a two-way communication between two endpoints—a client endpoint and\
    \ a server endpoint. The term *endpoint* means any of the two sides of the connection\
    \ that use the WebSocket protocol. The client endpoint initiates a connection\
    \ and the server endpoint accepts the connection. The connection is bi-directional,\
    \ which means the server endpoint can push messages to the client endpoint on\
    \ its own. You will also come across another term in this context, which is called\
    \ *a peer*. A peer is simply the other end of the connection. For example, for\
    \ a client endpoint, the server endpoint is a peer and, for a server endpoint,\
    \ the client endpoint is a peer. A WebSocket *session* represents a sequence of\
    \ interactions between an endpoint and a single peer.\n\nThe WebSocket protocol\
    \ can be broken into three parts:\n\n- Opening handshake\n- Data exchanges\n-\
    \ Closing handshake\n\nThe client initiates an opening handshake with the server.\
    \ The handshake occurs using HTTP with an upgrade request to the WebSocket protocol.\
    \ The server responds to the opening handshake with an upgrade response. Once\
    \ the handshake is successful, the client and the server exchange messages. The\
    \ message exchanges may be initiated by either the client or the server. In the\
    \ end, either endpoint can send a closing handshake; the peer responds with the\
    \ closing handshake. Once the closing handshake is successful, the WebSocket is\
    \ closed.\n\nThe HTTP/2 Client API in JDK 9 supports creating WebSocket client\
    \ endpoints. To have a complete example of using the WebSocket protocol, you will\
    \ need to have a server endpoint and a client endpoint. The following sections\
    \ cover creating both.\n\n## Creating a Server Endpoint\n\nCreating a server endpoint\
    \ requires using Java EE. This book is focused on Java SE 9. I explain briefly\
    \ how to create a server endpoint to be used in the example in this section. Without\
    \ covering the details, I use Java EE 7 annotations to create a WebSocket server\
    \ endpoint.\n\nListing 14-4 contains the code for a class named `TimeServerEndPoint`.\
    \ The class is included in the web application in the `webapp` directory of the\
    \ book's source code. When you deploy the web application to a web server, this\
    \ class will be deployed as a server endpoint.\n\n**Listing 14-4.** A WebSocket\
    \ Server Endpoint\n\n```\n// TimeServerEndPoint.java\npackage com.jdojo.ws;\n\n\
    import java.io.IOException;\nimport java.time.ZonedDateTime;\nimport java.util.concurrent.TimeUnit;\n\
    import javax.websocket.CloseReason;\nimport javax.websocket.OnMessage;\nimport\
    \ javax.websocket.OnOpen;\nimport javax.websocket.OnClose;\nimport javax.websocket.OnError;\n\
    import javax.websocket.Session;\nimport javax.websocket.server.ServerEndpoint;\n\
    import static javax.websocket.CloseReason.CloseCodes.NORMAL_CLOSURE;\n\n@ServerEndpoint(\"\
    /servertime\")\npublic class TimeServerEndPoint {\n\n    @OnOpen\n    public void\
    \ onOpen(Session session) {\n        System.out.println(\"Client connected. \"\
    );\n    }\n\n    @OnClose\n    public void onClose(Session session) {\n      \
    \  System.out.println(\"Connection closed.\");\n    }\n\n    @OnError\n    public\
    \ void onError(Session session, Throwable t) {\n        System.out.println(\"\
    Error occurred:\" + t.getMessage());\n    }\n\n    @OnMessage\n    public void\
    \ onMessage(String message, Session session) {\n        System.out.println(\"\
    Client: \" + message);\n        // Send messages to the client\n        sendMessages(session);\n\
    \    }\n\n    private void sendMessages(Session session) {\n        /* Start a\
    \ new thread and send 3 messages to the\n           client. Each message contains\
    \ the current date and\n           time with zone.\n        */\n        new Thread(()\
    \ -> {\n            for(int i = 0; i < 3; i++) {\n                String currentTime\
    \ =\n                    ZonedDateTime.now().toString();\n                try\
    \ {\n                    session.getBasicRemote()\n                        .sendText(currentTime,\
    \ true);\n                    TimeUnit.SECONDS.sleep(5);\n                } catch(InterruptedException\
    \ | IOException e) {\n                    e.printStackTrace();\n             \
    \       break;\n                }\n            }\n            try {\n        \
    \        // Let us close the WebSocket\n                session.close(new CloseReason(NORMAL_CLOSURE,\n\
    \                    \"Done\"));\n            } catch (IOException e) {\n    \
    \            e.printStackTrace();\n            }\n        })\n        .start();\n\
    \    }\n}\n```\n\nUsing the `@ServerEndpoint(\"/servertime\")` annotation on the\
    \ `TimeServerEndPoint` class makes this class a server endpoint when it is deployed\
    \ to a web server. The value of the `value` element of the annotation is `/servertime`,\
    \ which will make the web server publish this endpoint at this URL.\n\nThe class\
    \ contains four methods, which have been annotated with `@OnOpen`, `@OnMessage`,\
    \ `@OnClose`, and `@OnError` annotations. I named these methods the same as these\
    \ annotations. These methods are called at different points in the lifecycle of\
