  raw: 'The forName(String className) method initializes the class after loading and
    uses the current class loader, which is the class loader that loaded the class
    in which the call to this method appears. The expression


    Class.forName("P.Q")


    inside an instance method is equivalent to


    Class.forName("P.Q", true, this.getClass().getClassLoader())


    The forName(Module module, String className) was added in JDK 9\. It does not
    initialize the class.


    Notice that this method does not throw a ClassNotFoundException when the specified
    class is not found.


    Rather, it returns null.


    None of these methods checks if the caller can access the specified class. That
    is, you can use these methods to load non-exported classes from a module. Loading
    a class does not mean that you can instantiate it and access its members. Accessibility
    checks are performed when you try instantiating the class. For example, you can
    load a non-exported class, but trying to instantiate it will throw an exception.


    Listing [10-10 con](#index_split_004.html#248)tains the code for a LoadingClass
    class that is a member of the com.jdojo.module.api module. The class contains
    two versions of the loadClass() method. The methods load the specified class and,
    after successfully loading the class, it tries to instantiate the class using
    a no-args constructor. Note that the com.jdojo.intro module does not export the
    com.jdojo.intro package that contains the Welcome class.


    This example attempts to load and instantiate the Welcome class and two other
    non-existent classes.


    ***Listing 10-10.*** A Class Demonstrating How to Load Classes


    // LoadingClass.java


    package com.jdojo.module.api;


    import java.lang.reflect.Constructor;


    import java.lang.reflect.InvocationTargetException;


    import java.util.Optional;


    public class LoadingClass {


    public static void main(String[] args) {


    loadClass("com.jdojo.intro.Welcome");


    loadClass("com.jdojo.intro.XYZ");


    String moduleName = "com.jdojo.intro";


    Optional<Module> m = ModuleLayer.boot().findModule(moduleName);


    if (m.isPresent()) {


    Module introModule = m.get();


    loadClass(introModule, "com.jdojo.intro.Welcome");


    loadClass(introModule, "com.jdojo.intro.ABC");


    } else {


    System.out.println("Module not found: " + moduleName +


    ". Please make sure to add the module to the module path.");


    }


    }


