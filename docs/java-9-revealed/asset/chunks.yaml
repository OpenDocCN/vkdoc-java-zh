    ```\n\nJShell 工具在很多方面都很宽容。如果你在 Java 构造中使用了不支持的*关键字*，它会直接忽略它。你可以使用部分命令。如果你输入的部分命令可以自动补全为唯一的命令名称，那么该工具会像你输入了完整命令一样工作。例如，`/edit`\
