    \ [java.sql, javax.transaction.xa, javax.sql]`\n\n# Chapter 10: The Module API\n\
    \nThe second time, the `ModuleBasicInfo` and `PrimeChecker` classes are loaded\
    \ in an unnamed module of the application class loader, which is reflected in\
    \ the `isNamed()` method returning `false` for both modules.\n\nNotice the dynamic\
    \ nature of the `getPackages()` method of the `Module` class. When it is called\
    \ the first time, it returns only one package name—`com.jdojo.module.api`. When\
    \ it is called the second time, it returns two package names—`com.jdojo.module.api`\
    \ and `com.jdojo.prime`. This is because packages in the unnamed module are added\
    \ as types from the new packages are loaded into the unnamed module. The outputs\
    \ for the `java.sql` module remain the same in both cases because platform types\
    \ are always loaded into the same module irrespective of the mode the `java` launcher\
    \ is run in.\n\n## Querying Modules\n\nTypical queries that you may run against\
    \ a module include:\n\n- Can a module `M` read another module `N`?\n- Can a module\
    \ use a service of a specific type?\n- Does a module export a specific package\
    \ to all or some modules?\n- Does a module open a specific package to all or some\
    \ modules?\n- Is this module named or unnamed?\n- Is this an automatic module?\n\
    - Is this an open module?\n\nYou can augment a module descriptor using command-line\
    \ options and programmatically using the `Module` API. You can put all queries\
    \ for module’s properties in two categories: ones whose results may change after\
    \ the module is loaded and ones whose results do not change after the module is\
    \ loaded. The `Module` class contains methods for queries in the first category\
    \ and the `ModuleDescriptor` class contains methods for queries in the second\
    \ category. The `Module` class provides the following methods for queries in the\
    \ first category:\n\n- `boolean canRead(Module other)`\n- `boolean canUse(Class<?>\
    \ service)`\n- `boolean isExported(String packageName)`\n- `boolean isExported(String\
    \ packageName, Module other)`\n- `boolean isOpen(String packageName)`\n- `boolean\
    \ isOpen(String packageName, Module other)`\n- `boolean isNamed()`\n\nMethod names\
    \ are intuitive enough to tell you what they do. The `isNamed()` method returns\
    \ `true` for a named module and `false` for an unnamed module. A module’s type,\
    \ named or unnamed, does not change after the module has been loaded. This method\
    \ is provided in the `Module` class because you cannot get a `ModuleDescriptor`\
    \ for an unnamed module.\n\nThe `ModuleDescriptor` contains three methods that\
    \ tell you about the type of module and how the module descriptor was generated.\
    \ The `isOpen()` method returns `true` if it is an open module and `false` otherwise.\
    \ The `isAutomatic()` method returns `true` for an automatic module and `false`\
    \ otherwise.\n\nListing 10-3 contains the code for a class named `QueryModule`,\
    \ which is a member of the `com.jdojo.module.api` module. It shows you how to\
    \ query a module for dependency checks and whether a package is exported or open\
    \ to all modules or just to a specific module.\n\n**Listing 10-3.** A `QueryModule`\
    \ Class That Demonstrates How to Query a Module at Runtime\n\n```java\n// QueryModule.java\n\
    package com.jdojo.module.api;\n\nimport java.sql.Driver;\n\npublic class QueryModule\
    \ {\n    public static void main(String[] args) throws Exception {\n        Class<QueryModule>\
    \ cls = QueryModule.class;\n        Module m = cls.getModule();\n\n        //\
    \ Check if this module can read the java.sql module\n        Module javaSqlModule\
    \ = Driver.class.getModule();\n        boolean canReadJavaSql = m.canRead(javaSqlModule);\n\
    \n        // Check if this module exports the com.jdojo.module.api package to\
    \ all modules\n        boolean exportsModuleApiPkg = m.isExported(\"com.jdojo.module.api\"\
    );\n\n        // Check if this module exports the com.jdojo.module.api package\
    \ to java.sql module\n        boolean exportsModuleApiPkgToJavaSql =\n       \
    \     m.isExported(\"com.jdojo.module.api\", javaSqlModule);\n\n        // Check\
    \ if this module opens the com.jdojo.module.api package to java.sql module\n \
    \       boolean openModuleApiPkgToJavaSql = m.isOpen(\"com.jdojo.module.api\"\
    , javaSqlModule);\n\n        // Print module type and name\n        System.out.printf(\"\
    Named Module: %b%n\", m.isNamed());\n        System.out.printf(\"Module Name:\
    \ %s%n\", m.getName());\n        System.out.printf(\"Can read java.sql? %b%n\"\
    , canReadJavaSql);\n        System.out.printf(\"Exports com.jdojo.module.api?\
    \ %b%n\", exportsModuleApiPkg);\n        System.out.printf(\"Exports com.jdojo.module.api\
    \ to java.sql? %b%n\",\n            exportsModuleApiPkgToJavaSql);\n        System.out.printf(\"\
    Opens com.jdojo.module.api to java.sql? %b%n\",\n            openModuleApiPkgToJavaSql);\n\
    \    }\n}\n```\n\n`Named Module: true`\n\n`Module Name: com.jdojo.module.api`\n\
    \n`Can read java.sql? true`\n\n`Exports com.jdojo.module.api? true`\n\n`Exports\
    \ com.jdojo.module.api to java.sql? true`\n\n`Opens com.jdojo.module.api to java.sql?\
    \ false`\n\n## Updating Modules\n\nIn previous chapters, you saw how to add exports\
    \ and reads to a module using the `--add-exports`, `--add-opens`, and `--add-reads`\
    \ command-line options. In this section, I show you how to add these statements\
    \ to a module programmatically. The `Module` class contains the following methods\
    \ that let you modify a module declaration at runtime:\n\n- `Module addExports(String\
    \ packageName, Module other)`\n- `Module addOpens(String packageName, Module other)`\n\
    - `Module addReads(Module other)`\n- `Module addUses(Class<?> serviceType)`\n\n\
    There is a significant difference between using command-line options and one of\
    \ these methods to modify a module’s declaration. Using command-line options,\
    \ you can modify any module’s declaration. However, these methods are caller-sensitive.\
    \ The code that calls these methods must be in the module whose declaration is\
    \ being modified—except for calling the `addOpens()` method. That is, if you do\
    \ not have access to the source code of a module, you cannot use these methods\
    \ to modify that module’s declaration. These methods are typically meant to be\
    \ used by frameworks, which can adapt to runtime needs to interact with other\
    \ modules.\n\nAll of these methods throw an `IllegalCallerException` when dealing\
    \ with a named module whereby the caller is not allowed to call these modules.\n\
    \nThe `addExports()` method updates the module to export the specified package\
    \ to the specified module. Calling the method has no effect if the specified package\
    \ is already exported or open to the specified module or if the method is called\
    \ on an unnamed or open module. An `IllegalArgumentException` is thrown if the\
    \ specified package is `null` or does not exist in the module. Calling this method\
    \ has the same effect as adding a qualified export to the module declaration:\n\
    \n```\nexports <packageName> to <other>;\n```\n\nThe `addOpens()` method works\
    \ the same as the `addExports()` method, except that it updates the module to\
    \ open the specified package to the specified module. It is similar to adding\
    \ the following statement in the module:\n\n```\nopens <packageName> to <other>;\n\
