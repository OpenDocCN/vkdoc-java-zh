    \n```java\nmodule policy {\n    requires policy;\n    requires java.sql;\n}\n\
    ```\n\n图2-7展示了在`claim`模块中运行`pkg3.Main`类时将构建的模块图。请注意，`java.xml`和`java.logging`模块也出现在图中，因为`java.sql`模块依赖于它们。在该图中，`claim`模块是唯一的根模块。\n\
    \n**图2-7.** 显示对`java.sql`模块依赖关系的模块图\n\n图2-8展示了名为`java.se`的平台模块最复杂的模块图之一。`java.se`模块的声明如下：\n\
    \n```java\nmodule java.se {\n    requires transitive java.sql;\n    requires transitive\
