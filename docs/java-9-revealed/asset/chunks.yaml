    在 Java SE 9 的 JDK 中：


    • 没有名为 jre 的子目录。


    • bin 目录包含所有命令。在 Windows 平台上，它继续包含系统的运行时动态链接库。


    • conf 目录包含用户可编辑的配置文件，例如过去位于 jre\lib 目录中的 .properties 和 .policy 文件。


    • include 目录包含用于编译原生代码的 C/C++ 头文件，与之前相同。它仅存在于 JDK 中。


