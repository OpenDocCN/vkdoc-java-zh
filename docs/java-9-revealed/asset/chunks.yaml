    ■ **Tip** Before JDk 9, the extension class loader and the application class loader
    were an instance of the java.


    net.URLClassLoader class. in JDk 9, the platform class loader (the erstwhile extension
    class loader) and the application class loader are instances of an internal JDk
    class. if your code relied on the methods specific to the URLClassLoader class,
    your code may break in JDk 9.


    The class loading mechanism in JDK 9 has changed a bit. The three built-in class
    loaders work in tandem to load classes. When the application class loader needs
    to load a class, it searches modules defined to all class loaders. If a suitable
    module is defined to one of these class loaders, that class loader loads the class—implying
    that the application class loader can now delegate to the bootstrap class loader
    and the platform class loader. If a class is not found in a named module defined
    to these class loaders, the application class loader delegates to its parent,
    which is the platform class loader. If class is still not loaded, the application
    class loader searches the class path. If it finds the class on the class path,
    it loads the class as a member of its unnamed module. If it does not find the
    class on the class path, a ClassNotFoundException is thrown.


    When the platform class loader needs to load a class, it searches modules defined
    to all class loaders. If a suitable module is defined to one of these class loaders,
    that class loader loads the class. This implies that the platform class loader
    can delegate to the bootstrap class loader as well as to the application class
    loader.


    If a class is not found in a named module defined to these class loaders, the
    platform class loader delegates to its parent, which is the bootstrap class loader.


    When the bootstrap class loader needs to load a class, it searches its own list
    of named modules. If a class is not found, it searches the list of files and directories
    specified through the command-line option


    -Xbootclasspath/a. If it finds a class on the bootstrap class path, it loads the
    class as a member of its unnamed module.


    You can see the class loaders and the modules and classes they load in action.
    JDK 9 contains an option called -Xlog:modules that logs the debug or trace messages
    as they are loaded by the virtual machine. Its format is as follows:


    -Xlog:modules=<debug|trace>


    This option generates lots of output. I suggest you redirect the output to a file,
    so you can view it easily.


    The following command on Windows runs the client program for the prime checker
    and logs the module loading messages in a test.txt file. A partial output is shown.
    The output shows the class loaders that define modules.


