    Native Desktop Features


    Java SE 6 added platform-specific desktop support through the java.awt.Desktop
    class. The class supported performing the following operations from a Java application:


    • Opening a URI in the user-default browser


    • Opening a mailto URI in the user-default mail client


    • Opening, editing, and printing files using registered applications


    Chapter 20 ■ Other Changes in JDK 9


    Java SE 9 takes the platform-specific desktop support forward and adds public
    API support for many system and application event notifications, if they are available
    on the current platform. The java.awt.


    Desktop class is still the central class for working with platform-specific desktop
    features. To support so many new desktop features, Java SE 9 added a new package,
    java.awt.desktop, to the java.desktop module. The java.awt.Desktop class has also
    received many new methods. The new package contains 30 classes and interfaces.
    In JDK 9, the Desktop API supports 24 platform-specific desktop actions and notifications,
    which are defined by constants of the Desktop.Action enum. To name a few, they
    are as follows:


    • Notifications when the attached displays go into or come out of power save


    • Notifications when the system enters sleep or after the system wakes


    • Notifications when the user session changes such as locking/unlocking a user


    session


    • Notifications when the application’s status changes to be or not to be a foreground


    application


    • Notifications when the application is asked to show its About dialog box


    You can use these features to optimize resource usage by your application. For
    example, if the system goes into sleep mode, you can stop animations and resume
    them when the system wakes. It is not possible to cover the entire Desktop API
    in this book. I walk you through a step-by-step example. Refer to the API documentation
    of the java.awt.Desktop class and the classes and interfaces in the java.awt.desktop
    package for more information. The following steps are typical when using a desktop
    feature:


    • Check if the Desktop class is supported by the current platform using the static


    isDesktopSupported() method of this class. If the method returns false, you


    cannot use any desktop features.'
