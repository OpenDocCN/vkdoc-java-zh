    how you would get a set that contains "One", "Two", and "Four" from this map?
    Here is how you get it in JDK 8:


    // In JDK 8


    Set<String> nonNullvalues = map.entrySet()


    .stream()


    .flatMap(e -> e.getValue() == null ? Stream.empty() : Stream.of(e.getValue()))


    .collect(toSet());


