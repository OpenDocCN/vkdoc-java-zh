    JDK modules as well as application modules. This method will find both types of
    modules.


    Chapter 10 ■ the Module apI


    You can also compose a module finder from a sequence of zero of more module finders
    using the compose() method:


    static ModuleFinder compose(ModuleFinder... finders)


    This module finder will use each module finder in the order specified. The second
    module finder will find all modules not found by the first module finder, the
    third module finder will find all modules not found by the first and second module
    finders, and so on.


    The ModuleFinder interface contains the following methods to find modules:


    • Optional<ModuleReference> find(String name)


    • Set<ModuleReference> findAll()


    The find() method finds a module with the specified name. The findAll() method
    finds all modules that the finder can locate.


