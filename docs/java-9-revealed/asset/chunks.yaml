    Welcome to the Module System.


    Module Name: com.jdojo.intro


    Summary


    JDK 9 has overhauled the logging systems for platform classes (JDK classes) and
    JVM components. There is a new API that lets you specify a logging framework of
    your choice as logging backend for logging messages from platform classes. There
    is also a new command-line option that lets you access messages from all JVM


    components.


    The platform logging API lets you specify a custom logger that will be used by
    all platform classes to log their messages. You can use existing logging frameworks
    such as Log4j as a logger. The API consists of the java.lang.System.LoggerFinder
    class and the java.lang.System.Logger interface.


    An instance of the System.Logger interface represents a platform logger. The System.LogFinder
    class is a service interface. You will need to provide an implementation for this
    service interface, which returns an instance of the System.Logger interface. You
    can use the getLogger() method in the java.lang.System class to get a System.Logger.
    A module in your application must contain a provides statement indicating the
    implementation for the System.LogFinder service interface. Otherwise, a default
    logger will be used.


    JDK 9 allows you to log all JVM messages from all components using a single option
    named -Xlog. The option lets you specify the types of messages, the severity level
    of messages, log destination, decorations for the logged messages, and the log
    file properties. A message is identified by a set of tags. Constants of the System.Logger.Level
    enum specify the severity level of a message. The log destination could be stdout,
    stderr, or a file.


    **CHAPTER 20**


    **Other Changes in JDK 9**


    In this chapter, you will learn:


    • The underscore as a new keyword


    • Improved syntax for using try-with-resources blocks


    • How to use the diamond operator in anonymous classes


    • How to use private methods in interfaces


    • How to use the @SafeVarargs annotation on private methods


    • How to discard outputs of sub-processes


    • How to use new methods in the Math and StrictMath classes


    • How to use stream of Optionals and other new operations on Optionals


    • How to use spin-wait hints


    • The enhancements to the Time API and the Matcher and Objects classes


    • How to compare arrays and slices of arrays


    • The enhancements to the Javadoc and how to use its new search features


    • The native desktop supports in JDK 9 and how to use them


    • How to use global and local filters during object deserialization


    • How to transfer data from an input stream to an output stream and how to duplicate


    and slice buffers


    There are many small and big changes to Java SE 9\. The big changes are the introduction
    of the Module System, HTTP/2 Client API, etc. These big changes warranted a chapter
    by themselves. This chapter covers all the changes that are important for Java
    developers, but are not big enough to get a chapter of their own.


    You do not need to read this chapter sequentially. Each section covers a new topic.
    If you are interested in learning about a specific topic, you can jump directly
    to the section on that topic.


    © Kishori Sharan 2017


    K. Sharan, *Java 9 Revealed*, DOI 10.1007/978-1-4842-2592-9_20


