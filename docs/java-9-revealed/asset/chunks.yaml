    Creating a Logger Finder


    The Java runtime needs to find your platform logger. It uses a service locator
    pattern to find it. Recall the following statement in your module declaration
    in Listin[g 19-1](#index_split_007.html#456).


    provides java.lang.System.LoggerFinder


    with com.jdojo.logger.Log4jLoggerFinder;


    In this section, you will create an implementation class named Log4jLoggerFinder,
    which will


    implement the service interface System.LoggerFinder. Remember that a service interface
    does not need to be a Java interface. It can be an abstract class. In this case,
    System.LoggerFinder is an abstract class and your Log4jLoggerFinder class will
    extend the System.LoggerFinder class. Listin[g 19-4](#index_split_007.html#460)
    contains the code for a Log4jLoggerFinder class that will serve as an implementation
    for the service interface System.LoggerFinder.


