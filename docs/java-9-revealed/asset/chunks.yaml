    API 元素何时被弃用。在 JDK 9 中，已做出合理努力，在 Java SE API 中 `@Deprecated` 注解的大多数（如果不是全部）使用位置回填了这两个元素的值。


    在 JDK 9 之前，弃用警告是基于 API 元素及其使用位置上的 `@Deprecated` 注解发出的，如表 15-1 所示。当弃用的 API 元素在非弃用的使用位置被使用时，会发出警告。如果声明及其使用位置都被弃用，则不会发出警告。你可以通过在使用位置添加
    `@SuppressWarnings("deprecation")` 注解来抑制弃用警告。


