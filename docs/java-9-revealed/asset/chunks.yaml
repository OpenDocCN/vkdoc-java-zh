- fmt: 'You can set the maximum number of characters displayed for each type of action/event
    for a feedback mode using the following command:


    `/set truncation <mode> <length> <selectors>`


    Here, `<mode>` is the feedback mode for which you set the truncation limit; `<length>`
    is the maximum number of characters displayed for the specified selectors. `<selectors>`
    is a comma-separated list of selectors that determines the context to which the
    truncation limit applies. Selectors are predefined keywords that represent specific
    contexts, for example, `vardecl` is a selector that represents a variable declaration
    without initialization. Use the following command for more information about setting
    the truncation limits and selectors:


    `/help /set truncation`


    The following commands set the truncation limit to 80 characters for everything
    and to five characters for a variable value or expression:


    ```

    /set truncation kverbose 80

    /set truncation kverbose 5 expression,varvalue

    ```


    Note that the most specific selector determines the actual truncation limit to
    be used. The following settings use two selectors—one for all types of snippets
    (80 characters) and one for expressions and variable values (5 characters). For
    an expression, the second setting is the most specific setting. In this case,
    if you have a variable whose value is more than five characters, it will be truncated
    to five characters when displayed.


    Setting the output format is a complex job. You will need to set the format for
    all types of output you are expecting based on the actions/events. I do not go
    through defining all types of output formats. Use the following command for more
    information about setting the output formats:


    `/help /set format`


    The syntax for setting an output format is as follows:


    `/set format <mode> <field> "<format>" <selectors>`


