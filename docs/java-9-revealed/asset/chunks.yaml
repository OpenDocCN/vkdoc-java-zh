    System.out.printf("种类: %s%n", snippet.kind());


    System.out.printf("子种类: %s%n", snippet.subKind());


    System.out.printf("先前状态: %s%n", se.previousStatus());


    System.out.printf("当前状态: %s%n", se.status());


