    Managing Process Permissions


    When you ran the examples in the previous sections, I assumed that there was no
    Java security manager installed. If a security manager is installed, appropriate
    permissions need to be granted to start, manage, and query native processes:


    • If you are creating a new process, you need to have FilePermission(cmd,"execute")
    permission, where cmd is the absolute path of the command that will create the


    process. If cmd is not an absolute path, you need to have FilePermission("<<ALL


    FILES>>","execute") permission.


    • To query the state of native processes and destroy the process using the methods
    in


    the ProcessHandle interface, the application needs to have RuntimePermission


    ("manageProcess") permission.


    Listing [12-6](#index_split_005.html#346) contains a program that gets a process
    count and creates a new process. It repeats these two tasks without a security
    manager and with a security manager.


