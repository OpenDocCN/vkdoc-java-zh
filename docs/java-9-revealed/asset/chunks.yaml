- fmt: "• 一个开放模块或包含开放包的模块允许其他模块访问其所有类型的成员以进行深度反射，而其他模块无需声明对该第一个模块的依赖。在此示例中，`com.jdojo.reflect.test`模块能够访问`Item`类及其成员，而无需声明对`com.jdojo.reflect`模块的依赖。此规则的存在是为了确保诸如`Hibernate`和`Spring`等使用深度反射的框架无需声明对应用程序模块的依赖即可访问它们。\n\
    \n• 如果你希望在编译时访问某个包的公共API，并在运行时通过深度反射访问同一个包，你可以同时导出和开放该包。在此示例中，我们可以在`com.jdojo.reflect`模块中导出并开放`com.jdojo.reflect`包。\n\
    \n• 如果一个模块是开放的或它开放了包，你仍然可以声明对它们的依赖，但并非必须如此。此规则有助于迁移到JDK 9。如果你的模块对其他已知模块使用深度反射，你的模块应声明对这些模块的依赖，以获得可靠配置的好处。\n\
    \n让我们看看这些模块的最终版本。清单4-17和清单4-18包含了这些模块声明的修改版本。\n\n**清单4-17.** `com.jdojo.reflect`模块的修改版本，该模块导出并开放了`com.jdojo.reflect`包\n\
