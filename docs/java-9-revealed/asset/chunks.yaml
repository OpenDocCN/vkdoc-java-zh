    System.out.println(\"toDaysPart(): \" + compTime.toDaysPart());\nSystem.out.println(\"\
    toHours(): \" + compTime.toHours());\nSystem.out.println(\"toHoursPart(): \" +\
    \ compTime.toHoursPart());\nSystem.out.println(\"toMinutes(): \" + compTime.toMinutes());\n\
    System.out.println(\"toMinutesPart(): \" + compTime.toMinutesPart());\n```\n\n\
    ```\ntoDays(): 23\ntoDaysPart(): 23\ntoHours(): 555\ntoHoursPart(): 3\ntoMinutes():\
    \ 33345\ntoMinutesPart(): 45\n```\n\n## Truncating Duration\n\nThere is only one\
    \ method added to the `Duration` class in this category:\n\n```\nDuration truncatedTo(TemporalUnit\
    \ unit)\n```\n\nThe `truncatedTo()` method returns a copy of the duration with\
    \ conceptual time units smaller than the specified unit truncated. The temporal\
    \ unit specified must be `DAYS` or smaller. Specifying a temporal unit greater\
