- fmt: "# 模块系统\n\n图2-4展示了名为`policy`和`claim`的两个模块之间的依赖关系。`policy`模块包含两个包：`pkg1`和`pkg2`，并且它导出了`pkg1`包（我使用虚线边界将其与未导出的`pkg2`包区分开来）。`claim`模块包含两个包：`pkg3`和`pkg4`，它不导出任何包，但声明了对`policy`模块的依赖。\n\
    \n**图2-4.** 声明模块之间的依赖关系\n\n在JDK 9中，你可以按如下方式声明这两个模块：\n\n```java\nmodule policy\
    \ {\n    exports pkg1;\n}\n\nmodule claim {\n    requires policy;\n}\n```\n\n\
