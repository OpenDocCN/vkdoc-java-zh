    Java 语言中对集合字面量的支持一直是其亟需的特性。JDK 9 并未直接提供对集合字面量的支持，而是更新了 Collection API，在 List、Set
    和 Map 接口中新增了静态工厂方法，这些方法分别返回不可修改的 List、Set 和 Map。该方法名为 `of()`。该方法被重载，允许你指定零到十个集合元素。List
    和 Set 接口提供了一个接受可变参数的 `of()` 方法版本，让你可以创建包含任意数量元素的 List 和 Set。Map 接口提供了一个 `ofEntries()`
    静态工厂方法，让你可以创建包含任意数量条目的不可修改 Map。Map 接口还包含一个静态的 `entry()` 方法，该方法接受一个键和一个值作为参数，并返回一个
    `Map.Entry` 实例。`ofEntries()` 和 `entry()` 方法通常一起使用，以创建包含任意数量条目的不可修改 Map。


    这些接口中的新静态工厂方法针对性能进行了微调。`List.of()` 和 `Set.of()` 方法不允许 `null` 元素。`Set.of()` 方法不允许重复元素。


    `Map.of()` 和 `Map.ofEntries()` 方法不允许重复的键，也不允许键或值为 `null`。


    **第 14 章**


    **HTTP/2 客户端 API**


    在本章中，你将学习：


    • 什么是 HTTP/2 客户端 API


    • 如何创建 HTTP 客户端


    • 如何发起 HTTP 请求


    • 如何接收 HTTP 响应


    • 如何创建 WebSocket 端点


    • 如何将未经请求的数据从服务器推送到客户端


    JDK 9 将 HTTP/2 客户端 API 作为一个孵化器模块提供，模块名为 `jdk.incubator.httpclient`。


    该模块导出一个包含所有公共 API 的 `jdk.incubator.http` 包。孵化器模块不属于 Java SE 的一部分。在 Java SE 10
    中，它要么被标准化并成为 Java SE 10 的一部分，要么被移除。请访问网页 [`openjdk.java.net/jeps/11`](http://openjdk.java.net/jeps/11)
    了解更多关于 JDK 中孵化器模块的信息。


    孵化器模块在编译时或运行时默认不会被解析，因此你需要使用 `--add-modules` 选项将 `jdk.incubator.httpclient` 模块添加到默认的根模块集中，如下所示：


    <javac|java|jmod...> -add-modules jdk.incubator.httpclient ...


    如果一个孵化器模块被另一个模块读取，并且第二个模块被解析，那么该孵化器模块也会被解析。


    在本章中，你将创建一个读取 `jdk.incubator.httpclient` 模块的模块，并且无需使用 `-add-modules` 选项来解析它。


    由于孵化器模块提供的 API 尚未最终确定，当你在编译时或运行时使用孵化器模块时，标准错误输出会打印一条警告。警告信息如下所示：WARNING: Using
    incubator modules: jdk.incubator.httpclient


    孵化器模块以及包含孵化器 API 的包的名称都以 `jdk.incubator` 开头。


    一旦它们被标准化并纳入 Java SE，其名称将更改为使用标准的 Java 命名约定。例如，模块名 `jdk.incubator.httpclient` 在
    Java SE 10 中可能会变为 `java.httpclient`。


    © Kishori Sharan 2017

    K. Sharan, *Java 9 Revealed*, DOI 10.1007/978-1-4842-2592-9_14


    第 14 章 ■ HTTP/2 客户端 API


    由于 `jdk.incubator.httpclient` 模块尚不属于 Java SE，你找不到该模块的 Javadoc。我生成了该模块的 Javadoc，并将其包含在本书的源代码中。你可以通过下载的源代码中的
    `Java9Revealed/jdk.incubator.httpclient/dist/javadoc/index.html` 文件访问该 Javadoc。我使用
    JDK 9 早期访问版本 build 158 生成了该 Javadoc。API 可能会发生变化，你可能需要重新生成 Javadoc。操作方法如下：


    1.  本书的源代码包含一个 `jdk.incubator.httpclient` NetBeans 项目，位于与项目同名的目录中。


    2.  当你安装 JDK 9 时，其源代码会以 `src.zip` 文件的形式复制到安装目录中。将 `src.zip` 文件中 `jdk.incubator.httpclient`
    目录下的所有内容复制到下载源代码中的 `Java9revealed\jdk.incubator.httpclient\src` 目录。


    3.  在 NetBeans 中打开 `jdk.incubator.httpclient` 项目。


    4.  右键单击 NetBeans 中的项目节点，然后选择“生成 Javadoc”选项。你会遇到一些错误和一个警告，可以忽略它们。它将在 `Java9Revealed/jdk.incubator.httpclient/dist/javadoc`
    目录中生成 Javadoc。打开此目录中的 `index.html` 文件，查看 `jdk.incubator.httpclient` 模块的 Javadoc。


    什么是 HTTP/2 客户端 API？


    自 JDK 1.0 以来，Java 就支持 HTTP/1.1。HTTP API 由 `java.net` 包中的几种类型组成。


    现有的 API 存在以下问题：


    • 它被设计为支持多种协议，如 http、ftp、gopher 等，其中许多协议已不再使用。


    • 它过于抽象且难以使用。


    • 它包含许多未记录的行为。


    • 它仅支持一种模式，即阻塞模式，这要求每个请求/响应都有一个线程。


    2015 年 5 月，互联网工程任务组 (IETF) 发布了 HTTP/2 的规范。请访问网页 [`tools.ietf.org/html/rfc7540`](https://tools.ietf.org/html/rfc7540)
    获取 HTTP/2 规范的完整文本。


    HTTP/2 并未修改应用层语义。也就是说，你在应用程序中了解并一直使用的 HTTP 协议内容没有改变。它采用了一种更高效的方式来准备数据包并在客户端和服务器之间进行传输。你之前了解的所有关于
    HTTP 的知识，例如 HTTP 头、方法、状态码、URL 等，都保持不变。HTTP/2 试图解决 HTTP/1 连接面临的许多与性能相关的问题：


    • HTTP/2 支持二进制数据交换，而不是 HTTP/1.1 支持的文本数据。


    • HTTP/2 支持多路复用和并发，这意味着在 TCP 连接的两个方向上可以同时进行多个数据交换，并且对请求的响应可以乱序接收。这消除了对等点之间建立多个连接的开销，而这在使用
    HTTP/1.1 时通常是必需的。在 HTTP/1.1 中，必须按照发送请求的顺序接收响应，这被称为*队头*阻塞。HTTP/2 通过在同一 TCP 连接上启用多路复用，解决了队头阻塞问题。


    第 14 章 ■ HTTP/2 客户端 API


    • 客户端可以建议请求的优先级，服务器在确定响应优先级时可能会考虑该建议。


    • HTTP 头部被压缩，这显著减小了头部大小，从而降低了延迟。


    • 它允许服务器向客户端主动推送资源。


    JDK 9 没有更新现有的 HTTP/1.1 API，而是提供了一个新的 HTTP/2 客户端 API，该 API 同时支持 HTTP/1.1 和 HTTP/2。该
    API 旨在最终取代旧的 API。新的 API 还包含用于使用 WebSocket 协议开发客户端应用程序的类和接口。


    请访问网页 [`tools.ietf.org/html/rfc6455`](https://tools.ietf.org/html/rfc6455) 获取完整的
    WebSocket 协议规范。与现有 API 相比，新的 HTTP/2 客户端 API 具有以下几个优点：


    • 对于大多数常见情况，它简单、易学且易用。


    • 它提供基于事件的通知。例如，当接收到头部、接收到主体以及发生错误时，它会生成通知。


    • 它支持服务器推送，允许服务器在客户端没有显式请求的情况下将资源推送给客户端。它简化了与服务器建立 WebSocket 通信的过程。


    • 它支持 HTTP/2 和 HTTPS/TLS 协议。


    • 它可以在同步（阻塞模式）和异步（非阻塞模式）两种模式下工作。

