- fmt: '# Chapter 2: The Module System


    [Chapter 2](http://dx.doi.org/10.1007/978-1-4842-2592-9_2), “The Module System,”
    includes a brief history of the issues faced by Java developers using JDK version
    8 and earlier. It introduces the module system and explains how it solves the
    problems of API encapsulation, configuration, and scalability. The chapter introduces
    many new terms related to the module system. If you do not understand all of them,
    keep reading. Subsequent chapters and examples will make them clear with more
    explanation.


    # Chapter 3: Creating Your First Module


    [Chapter 3](http://dx.doi.org/10.1007/978-1-4842-2592-9_3), “Creating Your First
    Module,” gives you a glimpse of modules in action. It shows you step-by-step how
    to declare a module, write code in a module, compile a module, and run a class,
    which is part of a module. This chapter does not go into details of a module declaration.


    # Chapter 4: Module Dependency


    [Chapter 4](http://dx.doi.org/10.1007/978-1-4842-2592-9_4), “Module Dependency,”
    is an intensive hands-on chapter on the module system. It builds on the previous
    two chapters and dives deeper into declaring a module’s dependencies and exporting
    packages of a module. It shows you how to declare different types of modules,
    how to mix modular and non-modular code into a Java application, and several other
    options that are available with the module system. It is a must-understand chapter
    for any serious Java developer planning to use JDK 9.


    # Chapter 5: Implementing Services


    [Chapter 5](http://dx.doi.org/10.1007/978-1-4842-2592-9_5), “Implementing Services,”
    shows you how to take advantage of the simple directives of the module system
    to implement services in JDK 9. The chapter also explains how services were implemented
    before JDK 9.


    # Chapter 6: Packaging Modules


    [Chapter 6](http://dx.doi.org/10.1007/978-1-4842-2592-9_6), “Packaging Modules,”
    explains different formats you can use to package your modules and when one format
    should be used over others. Up to JDK 8, you had only one way to package your
    Java applications, which was using JAR files. This chapter shows you how to package
    your modules using the JMOD format.


    # Chapter 7: Creating Custom Runtime Images


    [Chapter 7](http://dx.doi.org/10.1007/978-1-4842-2592-9_7), “Creating Custom Runtime
    Images,” explains how to create custom runtime images using the `jlink` tool in
    an internal format called JIMAGE.


    # Chapter 8: Breaking Changes in JDK 9


    [Chapter 8](http://dx.doi.org/10.1007/978-1-4842-2592-9_8), “Breaking Changes
    in JDK 9,” explains changes in JDK 9 that may break your existing applications
    if you migrate to JDK 9. The chapter also suggests how to fix the broken code
    and mentions alternatives, if any, offered by JDK 9.


    # Chapter 9: Breaking Module Encapsulation


    [Chapter 9](http://dx.doi.org/10.1007/978-1-4842-2592-9_9), “Breaking Module Encapsulation,”
    explains how it is possible to break the main premise of the module system, which
    is encapsulation. JDK 9 provides several non-standard command-line options that
    will let you break into the otherwise encapsulated non-accessible module code.
    You may need to do this if you are migrating legacy applications, which used to
    have access to JDK internal APIs or third-party libraries, but in JDK 9, those
    internal APIs have been encapsulated in modules.


    # Chapter 10: The Module API


    [Chapter 10](http://dx.doi.org/10.1007/978-1-4842-2592-9_10), “The Module API,”
    explains how you can access the module system programmatically using the Module
    API. Whatever can be done using module declarations and command-line options can
    also be done using the Module API.


    # Chapter 11: The Java Shell


    [Chapter 11](http://dx.doi.org/10.1007/978-1-4842-2592-9_11), “The Java Shell,”
    covers the JShell tool and the JShell API in detail. It covers printing a message,
    declaring classes, and using existing modules inside the `jshell` tool. It describes
    how to configure the `jshell` tool and how to use the JShell API to execute snippets
    of code.


    # Chapter 12: Process API Updates


    [Chapter 12](http://dx.doi.org/10.1007/978-1-4842-2592-9_12), “Process API Updates,”
    covers additions to the Process API in JDK 9. The chapter does not cover the Process
    API in its entirety since JDK 1.0.


    # Chapter 13: Collection API Updates


    [Chapter 13](http://dx.doi.org/10.1007/978-1-4842-2592-9_13), “Collection API
    Updates,” covers additions to the Collection API in JDK 9, such as static factory
    methods to create lists, sets, and maps.


    # Chapter 14: The HTTP/2 Client API


    [Chapter 14](http://dx.doi.org/10.1007/978-1-4842-2592-9_14), “The HTTP/2 Client
    API,” explains the new incubating HTTP/2 Client API in JDK 9. It is part of the
    incubator module, which means it is not standardized yet. In JDK 10, it will be
    standardized and become part of Java SE platform or will be removed.


    # Chapter 15: Enhanced Deprecation


    [Chapter 15](http://dx.doi.org/10.1007/978-1-4842-2592-9_15), “Enhanced Deprecation,”
    explains the modifications to the Deprecation annotation type, how to use the
    `@SuppressWarnings` annotation in JDK 9, and how to use the `jdeprscan` tool to
    scan your code to find the use of the deprecated JDK APIs.


    # Chapter 16: Stack Walking


    [Chapter 16](http://dx.doi.org/10.1007/978-1-4842-2592-9_16), “Stack Walking,”
    covers the Stack-Walking API introduced in JDK 9. You can use this new API to
    traverse the call stack and find caller class references.


    # Chapter 17: Reactive Streams


    [Chapter 17](http://dx.doi.org/10.1007/978-1-4842-2592-9_17), “Reactive Streams,”
    covers the Reactive Streams API, which is a Java implementation of the reactive
    specification.


    # Chapter 18: Streams API Updates


    [Chapter 18](http://dx.doi.org/10.1007/978-1-4842-2592-9_18), “Streams API Updates,”
    explains the new methods added to the Streams API. It also explains new collectors
    added to the Streams API.


    # Chapter 19: Platform and JVM Logging


    [Chapter 19](http://dx.doi.org/10.1007/978-1-4842-2592-9_19), “Platform and JVM
    Logging,” explains the new Platform Logging API that you can use to log messages
    from platform classes to a custom logger. It shows you how to use Log4j to log
    platform messages. The chapter shows you how to access JVM logs using the command-line
    option and how to customize the JVM messages before logging.


    # Chapter 20: Other Changes in JDK 9


    [Chapter 20](http://dx.doi.org/10.1007/978-1-4842-2592-9_20), “Other Changes in
    JDK 9,” covers all the other changes in JDK 9 that are of interest to application
    developers and were not covered in previous chapters. Each section in this chapter
    covers an independent topic. You can jump to a section of your interest and skip
    the rest. The chapter covers a range of topics, including an underscore being
    a keyword in JDK 9, improved try-with-resources blocks, private methods in interfaces,
    how to use streams of Optional, how to use filters during object deserialization,
    new methods in the I/O API, and more.


    # System Requirements


    You need to install JDK 9 on your computer to use the programs in this book and
    to write your own programs.


    At the time of this writing, JDK 9 is still in development. It is expected to
    be released for production use in late July 2017. Its current version is *Early
    Access* Build 157. You can download and install the latest version of JDK 9 from
    [https://jdk9.java.net/download/](https://jdk9.java.net/download/). Follow the
    instructions on this page to download and install JDK 9 specific to your operating
    system.


    It is important that you verify your JDK 9 installation. You can use the `java`
    command with the `-version` option to print the version of the JDK installed on
    your computer:


    ```

    c:\> java -version


    java version "9-ea"


    Java(TM) SE Runtime Environment (build 9-ea+157)


    Java HotSpot(TM) 64-Bit Server VM (build 9-ea+157, mixed mode)

    ```


    Notice the version `9-ea` in the output. That indicates that I have JDK version
    9 Early Access installed on my computer. If you are using the final release, you
    may see only `9` as the version information.


    When you run this command, you may get an error like the one shown here:


    ```

    c:\> java -version


    ''java'' is not recognized as an internal or external command,


    operable program or batch file.

    ```


    The error indicates that the directory containing the `java` command has not been
    added to the `PATH` environment variable on your computer. The `java` command
    is in the `JDK_HOME\bin` directory, where `JDK_HOME` is the directory in which
    you have installed JDK 9. I installed JDK 9 on Windows in the `C:\java9` directory.'
