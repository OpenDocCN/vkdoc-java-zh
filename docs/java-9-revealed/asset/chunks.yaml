    \ Enter 键时，jshell 将其视为一个完整的代码片段（一个表达式）。它会评估该表达式并打印反馈，表明该表达式被评估为 4，并且结果被赋值给一个名为\
    \ `$1` 的变量。名为 `$1` 的变量是由 JShell 工具自动生成的。我将在后面更详细地解释由工具生成的变量。当你输入 `2 +` 并按 Enter\
    \ 键时，jshell 会提示你输入更多内容，因为 `2 +` 在 Java 中不是一个完整的代码片段。当你在第二行输入 `2` 时，代码片段就完整了；jshell\
    \ 会评估该代码片段并打印反馈。当你输入 `2` 并按 Enter 键时，jshell 会评估该代码片段，因为 `2` 本身就是一个完整的表达式。\n\n\
    第 11 章 ■ Java Shell\n\n**评估表达式**\n\n你可以在 jshell 中执行任何有效的 Java 表达式。以下示例评估了两个分别进行数字加法和乘法的表达式：\n\
    \n```\njshell> 2 + 2\n$1 ==> 4\n\njshell> 9.0 * 6\n$2 ==> 54.0\n```\n\n当你评估一个表达式时，如果该表达式评估出一个值，jshell\
    \ 会打印反馈。在这些例子中，`2 + 2` 评估为 4，`9.0 * 6` 评估为 54.0。表达式的值被赋值给一个变量。反馈中包含变量名和表达式的值。在第一个例子中，反馈\
    \ `$1 ==> 4` 意味着表达式 `2 + 2` 评估为 4，并且结果被赋值给一个名为 `$1` 的变量。类似地，表达式 `9.0 * 6` 被评估为\
    \ 54.0，并且该值被赋值给一个名为 `$2` 的变量。你可以在其他表达式中使用这些变量名。你可以通过简单地输入它们的名称来打印它们的值：\n\n```\n\
    jshell> $1\n$1 ==> 4\n\njshell> $2\n$2 ==> 54.0\n\njshell> System.out.println($1)\n\
    4\n\njshell> System.out.println($2)\n54.0\n```\n\n■ **提示** 在 jshell 中，你不需要像在 Java\
