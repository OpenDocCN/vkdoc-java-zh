    The com.jdojo.


    intruder module is added to the default set of root modules because the main class
    being run is in this module. The com.jdojo.intro module is added to the default
    set of root modules by the --add-modules option. A read edge is added from the
    com.jdojo.intruder module to the com.jdojo.intro module by the


    --add-reads option. I have shown the read edge from the former to the latter using
    a dashed line to make a point that it is added as a result of the --add-reads
    option, after the module graph is constructed. Use the


    -Xdiag:resolver option with this command to see how the modules are resolved.


    Let’s walk through another example that will show how to open a package to another
    module using the


    --add-opens command-line option. In Chapter [4](http://dx.doi.org/10.1007/978-1-4842-2592-9_4),
    you had a com.jdojo.address module that contains an Address class in the com.jdojo.address
    package. The module exports the com.jdojo.address package.


    The class contains a private field named line1, which stores the first line of
    an address. There is a public getLine1() method that returns the value of the
    line1 field.


    A TestNonOpen class, as shown in Listin[g 9-3, tr](#index_split_003.html#223)ies
    to load the Address class, creates an instance of the class, and accesses its
    public and private members. The TestNonOpen class is a member of the com.jdojo.


    intruder module. I added a bunch of exceptions in the throws clause of the main()
    method to keep the logic simple. In a real-world program, you would handle them
    in a try-catch block.


