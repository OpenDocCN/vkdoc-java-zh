  raw: 'Recall that deprecation warnings are compile-time warnings. You will not get
    any warnings if compiled code for your deployed application starts using an ordinarily
    deprecated API or generates a runtime error because an API that was once valid
    had been terminally deprecated and removed. Before JDK 9, you had to recompile
    your source code to see deprecation warnings when you upgraded your JDK or other
    libraries/


    frameworks. JDK 9 improves this situation by providing a *static* analysis tool
    called jdeprscan that can be used to scan compiled code to see the list of deprecated
    APIs being used. Currently, the tool reports the use of only deprecated JDK APIs.
    If your compiled code uses deprecated APIs from other libraries, say, Spring or
    Hibernate, or your own libraries, this tool will not report those uses.


    The jdeprscan tool is located in the JDK_HOME\bin directory. The general syntax
    to use the tool is as follows: jdeprscan [options] {dir|jar|class}


    Here, [options] is a list of zero or more options. You can specify a list of space
    separated directory, JARs, or fully qualified class names as arguments to scan.
    The available options are as follows:


    • -l, --list


    • --class-path <CLASSPATH>


    • --for-removal


    • --release <6|7|8|9>


    • -v, --verbose


    • --version


    • --full-version


    • -h, --help


    Chapter 15 ■ enhanCed depreCation


    The --list option lists the set of deprecated APIs in Java SE. No arguments specifying
    the location of compiled classes should be specified when this option is used.


    The --class-path specifies the class path to be used to find dependent classes
    during the scan.


    The --for-removal option restricts the scan or list to only those APIs that have
    been deprecated for removal. It can be used only with a release value of 9 or
    later because the @Deprecated annotation type did not contain the forRemoval element
    before JDK 9.


    The --release option specifies Java SE release that provides the set of deprecated
    APIs during scanning. For example, to list all deprecated APIs in JDK 6, you will
    the tool as follows:


    jdeprscan --list --release 6


    The --verbose option prints additional messages during the scanning process.


    The --version and --full-version options print the abbreviated and full versions
    of the jdeprscan tool, respectively.


    The --help option prints a detailed help message about the jdeprscan tool.


    Listing [15-4](#index_split_006.html#403) contains the code for a JDeprScanTest
    class. The code is trivial. It is intended to just compile, not run. Running it
