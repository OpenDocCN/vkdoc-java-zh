    \ v)`\n- `boolean equals(Object v)`\n- `boolean equalsIgnoreOptional(Object v)`\n\
    \nThe expression `v1.compareTo(v2)` will return a negative integer, zero, or a\
    \ positive integer if `v1` is less than, equal to, or greater than `v2`. The `compareToIgnoreOptional()`\
    \ method works the same way as the `compareTo()` method, except that it ignores\
    \ the optional build information while comparing. The `equals()` and `equalsIgnoreOptional()`\
    \ methods compare two version strings for equality with and without the optional\
    \ build information.\n\nWhich version strings represent the latest build: `9.1.1`\
    \ or `9.1.1-ea`? The first one does not contain the prerelease element whereas\
    \ the second one does, so the first one is the latest build. Which version strings\
    \ represents the latest build: `9.1.1` or `9.1.1.1-ea`? This time, the second\
    \ one represents the latest build. The comparison occurs in sequence—`$vnum`,\
    \ `$pre`, `$build`, and `$opt`. When the version number is greater, other elements\
    \ in the version string are not compared.\n\nThe source code for this section\
    \ is in a module named `com.jdojo.version.string` whose declaration is shown in\
    \ Listing 8-1. Listing 8-2 contains a complete program that shows how to extract\
    \ all parts of a version string using the `Runtime.Version` class.\n\n***Listing\
    \ 8-1.*** A Module Declaration for a Module Named `com.jdojo.version.string`\n\
    \n```java\n// module-info.java\nmodule com.jdojo.version.string {\n    exports\
    \ com.jdojo.version.string;\n}\n```\n\n***Listing 8-2.*** A `VersionTest` Class\
    \ That Shows How to Use the `Runtime.Version` Class to Work with Version Strings\n\
    \n```java\n// VersionTest.java\npackage com.jdojo.version.string;\n\nimport java.util.List;\n\
    import java.lang.Runtime.Version;\n\npublic class VersionTest {\n    public static\
    \ void main(String[] args) {\n        String[] versionStrings = {\n          \
    \  \"9\", \"9.1\", \"9.1.2\", \"9.1.2.3.4\", \"9.0.0\",\n            \"9.1.2-ea+153\"\
    , \"9+132\", \"9-ea+132-2016-08-23\", \"9+-123\",\n            \"9.0.1-ea+132-2016-08-22.10.56.45am\"\
    \n        };\n\n        for (String versonString : versionStrings) {\n       \
    \     try {\n                Version version = Version.parse(versonString);\n\
    \                // Get the additional version number elements\n             \
    \   // which start at 4th element\n                String vnumAdditionalInfo =\
    \ getAdditionalVersionInfo(version);\n                System.out.printf(\"Version\
    \ String=%s%n\", versonString);\n                System.out.printf(\"Major=%d,\
    \ Minor=%d, Security=%d, Additional Version=%s,\"\n                        + \"\
    \ Pre=%s, Build=%s, Optional=%s %n%n\",\n                        version.major(),\n\
    \                        version.minor(),\n                        version.security(),\n\
    \                        vnumAdditionalInfo,\n                        version.pre().orElse(\"\
    \"),\n                        version.build().isPresent() ? version.build().get().toString()\
    \ : \"\",\n                        version.optional().orElse(\"\"));\n       \
    \     } catch (Exception e) {\n                System.out.printf(\"%s%n%n\", e.getMessage());\n\
    \            }\n        }\n    }\n\n    // Returns the version number elements\
    \ from the 4th elements to the end\n    public static String getAdditionalVersionInfo(Version\
    \ v) {\n        String str = \"\";\n        List<Integer> vnum = v.version();\n\
