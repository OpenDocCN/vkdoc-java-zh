- fmt: '# The `$opt` Element in Version Strings


    The `$opt` element in a version string contains additional build information such
    as the date and time of an internal build. It is optional. It is alphanumeric
    and can contain hyphens and periods. If it is present, it is prefixed with a hyphen
    (`-`) and must match the regular expression `([-a-zA-Z0-9\.]+)`. If `$build` is
    absent, you need to prefix the `$opt` value with a plus sign followed by a hyphen
    (`+-`) to specify the value for `$opt`. For example, in `9-ea+132-2016-08-23`,
    `$build` is `132` and `$opt` is `2016-08-23`; in `9+-123`, `$pre` and `$build`
    are absent and `$opt` is `123`. The following version string embeds a date and
    time for a release in its additional information element:


    ```

    9-ea+154-20170130.07.36am

    ```


    # Chapter 8 ■ Breaking Changes in JDK 9


    ## Parsing Old and New Version Strings


    JDK releases have either been Limited Update releases that include new functionality
    and non-security fixes or Critical Patch Updates that only include fixes for security
    vulnerabilities. The version string included the version number, including the
    update number and the build number. Limited Update releases were numbered in multiples
    of 20. Critical Patch Updates used odd numbers, which were calculated by adding
    multiples of five to the prior Limited Update and, when needed, adding one to
    keep the resulting number odd. An example is `1.8.0_31-b13`, which is update 31
    of the major version 8 of the JDK. Its build number is 13. Note that prior to
    JDK 9, the version string always started with `1`.


    > **Tip** Your existing code that parses the version string to get the major version
    of a JDK release may fail in JDK 9 depending on the logic it uses. For example,
    if the logic looks for the major version at the second element by skipping the
    first, which used to be `1`, the logic will fail. For example, if it returns `8`
    from `1.8.0`, now it will return `0` from `9.0.1`, where you would expect `9`.


    ## Version Changes to System Properties


    In JDK 9, the values returned for the system properties that contain the JDK version
    string have changed.


    [Table 8-1](#index_split_003.html#181) contains the list of those system properties
    and their format. `$vstr`, `$vnum`, and `$pre` refer to version string, version
    number, and prerelease information, respectively.


    **Table 8-1.** System Properties and Their Values in JDK 9


    | System Property Name | Value |

    |----------------------|-------|

    | `java.version` | `$vnum(\-$pre)?` |

    | `java.runtime.version` | `$vstr` |

    | `java.vm.version` | `$vstr` |

    | `java.specification.version` | `$vnum` |

    | `java.vm.specification.version` | `$vnum` |


    ## Using the `Runtime.Version` Class


    JDK 9 has added a static nested class called `Runtime.Version` whose instances
    represent version strings. The `Version` class does not have a public constructor.
    The only way to get its instance is to call its static method named `parse(String
    vstr)`. The method may throw a runtime exception if the version string is null
    or invalid.


    ```java

    import java.lang.Runtime.Version;


    ...


    // Parse a version string "9.0.1-ea+132"

    Version version = Version.parse("9.0.1-ea+132");

    ```


    # Chapter 8 ■ Breaking Changes in JDK 9


    The following methods in the `Runtime.Version` class return elements of a version
    string. The method names are intuitive enough to guess the type of element values
    they return.


    - `int major()`

    - `int minor()`

    - `int security()`

    - `Optional<String> pre()`

    - `Optional<Integer> build()`

    - `Optional<String> optional()`


    Notice that for the optional elements, `$pre`, `$build`, and `$opt`, the return
    type is `Optional`. For the optional `$minor` and `$security` elements, the return
    type is `int`, not `Optional`, which will return zero if `$minor` and `$security`
    are absent in the version string.


    Recall that the version number in a version string may contain additional information
    after the third element. The `Version` class does not contain a method to get
    the additional information directly. It contains a `version()` method that returns
    a `List<Integer>` where the list contains all elements of the version number.
    The first three elements in the list are `$major`, `$minor`, and `$security`.
    The remaining elements contain the additional version number information.'
