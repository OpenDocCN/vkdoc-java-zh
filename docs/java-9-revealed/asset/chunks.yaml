- fmt: '# 模块系统与封装配置


    类型的可访问性通过修饰符嵌入在类型声明中。如果一个包包含内部实现，则无法阻止程序的其他部分访问这些内部实现。当使用类型时，类路径机制会线性搜索该类型。这导致了另一个问题：当类型从已部署的JAR中缺失时，会在运行时收到错误——有时是在应用程序部署很久之后。这些问题可以分为两类：封装和配置。


    ## 第2章 ■ 模块系统


    JDK 9引入了模块系统。它提供了一种组织Java程序的方式。它有两个主要目标：**强封装**和**可靠配置**。使用模块系统，应用程序由模块组成，模块是代码和数据的命名集合。模块通过其声明来控制其他模块可以访问该模块的哪些部分。访问另一个模块部分的模块必须声明对第二个模块的依赖。这两个方面——控制访问和声明依赖——是实现强封装目标的基础。模块的依赖关系在启动时解析。在JDK
    9中，如果一个模块依赖于另一个模块，并且在运行应用程序时第二个模块缺失，你将在启动时收到错误，而不是在应用程序运行后的某个时间。这是可靠配置的基础。


    模块使用模块声明来定义。模块的源代码通常存储在名为`module-info.java`的文件中。模块被编译成类文件，通常命名为`module-info.class`。编译后的模块声明称为**模块描述符**。模块声明不允许指定模块版本。诸如`jar`工具之类的工具（将模块打包成JAR）可以将模块版本添加到模块描述符中。


    模块使用`module`关键字声明，后跟模块名称。模块声明可以使用五种类型的模块语句：`exports`、`opens`、`requires`、`uses`和`provides`。`exports`语句在编译时和运行时将模块的指定包导出到所有模块或命名模块列表。`opens`语句在运行时授予对指定包的反射访问权限给所有模块或指定模块列表。其他模块可以使用反射访问指定包中的所有类型以及这些类型的所有成员（私有和公有）。`uses`和`provides`模块语句用于配置模块以发现服务实现并提供特定服务接口的服务实现。


    从JDK 9开始，`open`、`module`、`requires`、`transitive`、`exports`、`opens`、`to`、`uses`、`provides`和`with`是受限关键字。它们仅在模块声明中的特定位置出现时才具有特殊含义。


    模块的源代码和编译代码组织在目录、JAR文件或JMOD文件中。在目录和JAR文件中，`module-info.class`文件位于根目录。


    与类路径类似，JDK 9引入了模块路径。然而，它们的使用方式不同。类路径用于搜索类型的定义，而模块路径用于定位模块，而不是模块中的特定类型。诸如`java`和`javac`之类的Java工具已更新为同时使用模块路径和类路径。你可以使用`--module-path`或`-p`选项为这些工具指定模块路径。


    JDK 9引入了与工具一起使用的GNU风格选项。这些选项以两个破折号开头，每个单词用破折号分隔，例如`--module-path`、`--class-path`、`--list-modules`等。如果选项接受一个值，则该值可以在选项后面跟一个空格或`=`。以下两个选项是相同的：


    - `--module-path C:\lib`

    - `--module-path=C:\lib`


    在某个阶段（编译时、运行时、工具等）模块系统可用的模块列表称为可观察模块。你可以使用`java`命令的`--list-modules`选项列出运行时可用的可观察模块。你也可以使用此选项打印模块的描述。


    ## 第3章 ■ 创建你的第一个模块


    在本章中，你将学习：


    - 如何编写模块化Java程序

    - 如何编译模块化程序

    - 如何将模块的工件打包成模块化JAR文件

    - 如何运行模块化程序


    在本章中，我将解释如何使用模块——从编写源代码到编译、打包和运行程序。本章分为两部分。第一部分展示了使用命令行编写和运行模块程序的所有步骤。第二部分使用NetBeans
    IDE重复相同的步骤。


    在撰写本文时，NetBeans IDE仍在开发中，它不支持所有JDK 9功能。例如，目前你需要在NetBeans中为你创建的每个模块创建一个新的Java项目。在最终版本中，NetBeans将允许你在一个Java项目中拥有多个模块。我在使用命令提示符时比使用NetBeans
    IDE时涵盖了更多特定的JDK 9选项。


    本章解释的程序非常简单。当程序运行时，它会打印一条消息以及主类所属的模块名称。


    ### 使用命令提示符


    以下小节描述了使用命令提示符创建和运行第一个模块的步骤。


    #### 设置目录


    你将使用以下目录层次结构来编写、编译、打包和运行源代码：


    - `C:\Java9Revealed`

    - `C:\Java9Revealed\lib`

    - `C:\Java9Revealed\mods`

    - `C:\Java9Revealed\src`

    - `C:\Java9Revealed\src\com.jdojo.intro`


    © Kishori Sharan 2017

    K. Sharan, *Java 9 Revealed*, DOI 10.1007/978-1-4842-2592-9_3


    第3章 ■ 创建你的第一个模块


    这些目录是在Windows上设置的。在非Windows操作系统上，你可以设置类似的目录层次结构。`C:\Java9Revealed`是顶级目录，它包含三个子目录：`lib`、`mods`和`src`。


    `src`目录用于存储源代码，其中包含一个名为`com.jdojo.intro`的子目录。我将子目录命名为`com.jdojo.intro`，因为我想创建一个名为`com.jdojo.intro`的模块并将其源代码存储在此子目录下。在这种情况下，是否有必要将子目录命名为`com.jdojo.intro`？答案是否定的。我本可以将子目录命名为其他名称，或者我本可以将源代码直接存储在`src`目录中，而无需`com.jdojo.intro`子目录。但是，将存储模块源代码的目录命名为与模块名称相同是一个好习惯。如果你遵循此命名约定，Java编译器将提供选项，帮助你一次性编译多个模块的源代码。


    你将使用`mods`目录以展开的目录层次结构存储编译后的代码。如果需要，你将能够使用此目录中的代码运行程序。


    编译源代码后，你将把它打包成模块化JAR并存储在`lib`目录中。你可以使用模块化JAR运行程序，或者将模块JAR分发给其他开发人员，他们可以运行该程序。


    在本节的其余部分，我使用相对路径引用目录，例如`src`或`src\com.jdojo.intro`。这些相对路径是相对于`C:\Java9Revealed`目录的。例如，`src`表示`C:\Java9Revealed\src`。如果你使用的是非Windows操作系统或遵循其他目录层次结构，请进行适当的调整。


    #### 编写源代码


    你可以使用你选择的文本编辑器（例如Windows上的记事本）来编写源代码。让我们从创建一个名为`com.jdojo.intro`的模块开始。清单[3-1](#index_split_001.html#53)包含了模块声明。'
  raw: 'Accessibility of a type was embedded in the type declaration using modifiers.
    If a package contained internal implementations, there was no way to prevent other
    parts of the program from accessing the internal implementations. The class path
    mechanism searched for a type linearly when the type was used. This lead to another
    issues of receiving errors at runtime when types are missing from the deployed
    JARs—sometimes long after the application was deployed. These problems can be
    categorized into two types: encapsulation and configuration.


    Chapter 2 ■ the Module SySteM


    JDK 9 introduced the module system. It provides a way to arrange Java programs.
    It has two main goals: *strong encapsulation* and *reliable configuration*. Using
    the module system, an application consists of modules, which are named collections
    of code and data. A module controls—through its declaration—


    the parts of the module that can be accessed by other modules. A module that accesses
    parts of another module must declare dependence to the second module. The two
    aspects—controlling access and declaring dependence—are the basis of achieving
    the goal of strong encapsulation. A module’s dependency is resolved at startup.
    In JDK 9, if a module depends on another module and the second module is missing
    when you run your application, you will receive an error at startup rather than
    sometime after the application is running. This is the basis for reliable configuration.


    A module is defined using a module declaration. The source code for a module is
    typically stored in a file named module-info.java. A module is compiled into a
    class file, which is typically named module-info.class. The compiled module declaration
    is called a *module descriptor*. A module declaration does not allow you to specify
    a module version. Tools such as the jar tool that packages a module into a JAR
    can add the module version to the module descriptor.


    A module is declared using the module keyword, which is followed by the module
    name. A module declaration can use five types of module statements: exports, opens,
    requires, uses, and provides. An exports statement exports the specified package
    of the module to all modules or a list of named modules at compile-time and runtime.
    An opens statement grants reflective access to the specified package to all modules
    or a list of specified modules at runtime. Other modules can access all types
    in the specified package and all members (private and public) of those types using
    reflection. The uses and provides module statements are used to configure a module
    to discover service implementations and provide service implementations of a specific
    service interface.


    As of JDK 9, open, module, requires, transitive, exports, opens, to, uses, provides,
    and with are restricted keywords. They have special meaning only when they appear
    in module declarations at specific positions.


    A module’s source code and compiled code are arranged in a directory, a JAR file,
    or a JMOD file. In a directory and a JAR file, the module-info.class file is located
    at the root.


    Similar to the class path, JDK 9 introduced the module path. However, they differ
    in the way they are used. The class path is used to search a type’s definition
    whereas the module path is used to locate modules, not a specific type in the
    module. Java tools such as java and javac have been updated to use module paths
    as well as class paths. You can specify the module path to these tools using the
    --module-path or -p option.


    JDK 9 introduced GNU-style options to be used with tools. The options start with
    two dashes and each word is separated by a dash, for example, --module-path, --class-path,
    --list-modules, etc. If an option accepts a value, the value can follow the option
    after a space or a =. The following two options are the same:


    • --module-path C:\lib


    • --module-path=C:\lib


    The list of modules available to the module system in a phase (compile-time, runtime,
    tools, etc.) is known as observable modules. You can use the --list-modules options
    with the java command to list the observable modules available at runtime. You
    can also use this option to print the description of a module.


    **CHAPTER 3**


    **Creating Your First Module**


    In this chapter, you will learn:


    • How to write modular Java programs


    • How to compile modular programs


    • How to package the artifacts of a module into a modular JAR file


    • How to run a modular program


    In this chapter, I explain how to work with a module—from writing the source code
    to compiling, packaging, and running the program. This chapter is divided into
    two parts. The first part shows you all the steps to write and run a module program
    using the command line. The second part repeats the same steps using the NetBeans
    IDE.


    At the time of this writing, the NetBeans IDE is still under development and it
    does not support all JDK


    9 features. For example, currently you need to create a new Java project in NetBeans
    for every module you create. In its final release, NetBeans will allow you to
    have multiple modules in one Java project. I cover more specific JDK 9 options
    when I use the command prompt than when using the NetBeans IDE.


    The program explained in this chapter is very simple. When the program is run,
    it prints a message and the name of the module to which the main class belongs.


    Using the Command Prompt


    The following sub-sections describe the steps to create and run your first module
    using the command prompt.


    Setting Up the Directories


    You will use the following directory hierarchy to write, compile, package, and
    run the source code:


    • C:\Java9Revealed


    • C:\Java9Revealed\lib


    • C:\Java9Revealed\mods


    • C:\Java9Revealed\src


    • C:\Java9Revealed\src\com.jdojo.intro


    © Kishori Sharan 2017


    K. Sharan, *Java 9 Revealed*, DOI 10.1007/978-1-4842-2592-9_3


    Chapter 3 ■ Creating Your First Module


    These directories are set up on Windows. On a non-Windows operating system, you
    can set up a similar directory hierarchy. C:\Java9Revealed is the top-level directory
    and it contains three sub-directories: lib, mods, and src.


    The src directory is used to store the source code, which contains a sub-directory
    named


    com.jdojo.intro. I have named the sub-directory com.jdojo.intro because I want
    to create a module named com.jdojo.intro and store its source code under this
    sub-directory. Is it necessary, in this case, to name the sub-directory as com.jdojo.intro?
    The answer is no. I could have named the sub-directory differently or I could
    have stored the source directly in the src directory without having the com.jdojo.intro
    sub-directory. However, it is good practice to name the directory to store a module’s
    source code the same as the module name. The Java compiler has options that will
    help you compile the source code for multiple modules in one shot if you follow
    this naming convention.


    You will use the mods directory to store the compiled code in an exploded directory
    hierarchy. If you want, you will be able to run the program using the code in
    this directory.


    After compiling the source code, you will package it into a modular JAR and store
    it in the lib directory.


    You can use the modular JAR to run the program or you can ship the module JAR
    to other developers who can run the program.


    In the remaining part of this section, I use a relative path to a directory such
    as src or src\com.jdojo.


    intro. Those relative paths are relative to the C:\Java9Revealed directory. For
    example, src means C:\Java9Revealed\src. If you are using a non-Windows operating
    system or following another directory hierarchy, please make the appropriate adjustments.


    Writing the Source Code


    You can use a text editor of your choice, e.g., Notepad on Windows, to write the
    source code. Let’s start by creating a module named com.jdojo.intro. Listing [3-1](#index_split_001.html#53)
    contains the module declaration.'
