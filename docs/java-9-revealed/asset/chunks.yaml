    At times, you enter an expression and want to assign the value of the expression
    to a variable of the appropriate type. Sometimes you know the type and sometimes
    you don’t. The JShell tool will help you auto-complete the assignment part after
    you enter the complete expression. Enter the complete expression and then press
    Alt+Enter or Alt+F1 depending on your platform. Now, press Alt+V, which will auto-complete
    the expression assignment by adding the appropriate variable type and placing
    the cursor to the position where you can enter the variable name. Let’s walk through
    these steps. Enter the expression 2 + 2 into jshell: jshell> 2 + 2


    Now, on Windows, press Alt+Enter followed by Alt+V. jshell auto-completes the
    assignment


    expression and waits for you to enter the variable name:


    jshell> int = 2 + 2


    The cursor is placed just before the = symbol. Enter x as the variable name and
    press Enter:


    jshell> int x = 2 + 2


    x ==> 4


    jshell>


    The command prompt in Windows is maximized when you execute these commands. You
    can press


    Alt+Enter to return to the normal window.


    Snippets and Commands History


    JShell maintains a history of all commands and snippets that you enter in all
    sessions. You can navigate through the history using the Up and Down arrow keys.
    You can also use the /history command to print the history of all you typed in
    the current session:


    jshell> 2 + 2


    $1 ==> 4


    jshell> System.out.println("Hello")


    Hello


    jshell> /history


    2 + 2


    System.out.println("Hello")


    /history


    jshell>


    Chapter 11 ■ the Java Shell


    At this point, pressing the Up arrow once shows /history, pressing it twice shows
    System.out.


    println("Hello"), and pressing it three times shows 2 + 2\. Pressing the Up arrow
    a fourth time will show you the last entered command/snippet from the previous
    jshell session. If you want to execute a previously entered snippet/command, use
    the Up arrow until the desired command/snippet is shown, and then press Enter
    to execute it. Pressing the Down arrow navigates you to the next command or snippet
    in the list.


    Suppose you press the Up arrow five times to navigate to the fifth last snippet/command.
    Now pressing the Down arrow will navigate you to the fourth last snippet/command.
    When you are at the first and the last snippet/commands, pressing the Up arrow
    or the Down arrow does nothing.


    Reading JShell Stack Trace


    Snippets entered on jshell are part of a synthetic class. For example, Java does
    not let you declare a top-level method. A method declaration must be part of a
    type. When an exception is thrown in a Java program, the stack trace prints the
    type names and the line numbers. In jshell, an exception may be thrown from a
    snippet. Printing the synthetic class name and line numbers in such cases will
    be misleading and will make no sense to developers. The format for the location
    of the code in snippets in the stack trace will be of the form:


    at <snippet-name> (#<snippet-id>:<line-number-in-snippet>)


    Note that some snippets may not have a name. For example, entering a snippet 2
    + 2 will not give it a name. Some snippets have name such as a snippet declaring
    a variable is assigned the same name as the variable’s name; the same goes with
    a method and a type declaration. Sometimes, you may have two snippets with the
    same name, for example, by declaring a variable and a method/type with the same
    name.


    jshell assigns a unique snippet ID to all snippets. You can find the ID of a snippet
    using the /list -all command.


    The following jshell session declares a divide() method and prints the exception
    stack trace with a runtime ArithmeticException exception that is thrown when an
    integer is divided by zero:


    C:\Java9Revealed>jshell


    | Welcome to JShell -- Version 9-ea


    | For an introduction type: /help intro


    jshell> int divide(int x, int y) {


    ...> return x/y;


    ...> }


    | created method divide(int,int)


    jshell> divide(10, 2)


    $2 ==> 5


    jshell> divide(10, 0)


    | java.lang.ArithmeticException thrown: / by zero


    | at divide (#1:2)


    | at (#3:1)


    Chapter 11 ■ the Java Shell


    jshell> /list -all


    s1 : import java.io.*;


    s2 : import java.math.*;


    s3 : import java.net.*;


    s4 : import java.nio.file.*;


    s5 : import java.util.*;


    s6 : import java.util.concurrent.*;


    s7 : import java.util.function.*;


    s8 : import java.util.prefs.*;


    s9 : import java.util.regex.*;


    s10 : import java.util.stream.*;


    1 : int divide(int x, int y) {


    return x/y;


    }


    2 : divide(10, 2)


    3 : divide(10, 0)


    jshell>


    Let’s try to read the stack trace. The last line, at (#3:1), is stating that the
    exception was caused at line 1 of snippet number 3. Notice in the output of the
    /list -all command that the snippet number 3 is the expression divide(10, 0) that
    caused the exception. The second line, at divide (#1:2), is indicating that the
    second level in the stack trace is at line 2 of the snippet with a name divide
    whose snippet ID 1.


    Reusing JShell Sessions


    You can enter many snippets and commands in a jshell session and may want to reuse
    them in other sessions. You can use the /save command to save commands and snippets
    to a file and use the /open command to load the previously saved commands and
    snippets. The syntax for the /save command is as follows:


    /save <option> <file-path>


    Here, <option> can be one of the options: -all, -history, and -start. <file-path>
    is the file path where the snippets/commands will be saved.


    The /save command with no option saves all active snippets in the current sessions.
    Note that it does not save any commands or failed snippets.


    The /save command with the -all option saves all snippets for the current session
    to the specified file, including failed and startup snippets. Note that it does
    not save any commands.'
