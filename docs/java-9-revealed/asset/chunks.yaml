    ■ **Tip** a client module is not aware of the service provider modules and it
    need not directly read them as such. It is the responsibility of the service to
    discover all service providers and make their instances available to clients.
    In this case, the com.jdojo.prime module defines the com.jdojo.prime.PrimeChecker
    interface, which is a service interface and also acts as a service.


