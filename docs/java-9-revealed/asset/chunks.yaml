    File in the Modular JAR for the com.jdojo.prime.probable Module'
  trans: "\n这次，模块路径中只有一个服务提供者 `jdojo.generic.primechecker`。因此，尝试检索默认服务提供者将获得该服务提供者的\
    \ `PrimeChecker` 实例。这在输出的第一部分显而易见。尝试检索其他服务提供者失败，因为在模块路径上未找到它们。\n\n如果在模块路径上使用 `com.jdojo.prime`、`com.jdojo.prime.generic`、`com.jdojo.prime.faster`、`com.jdojo.prime.probable`\
    \ 和 `com.jdojo.prime.client` 模块运行 `Main` 类，你将得到类似于以下输出的结果。默认提供者是由迭代器首先找到的那个。\n\
    \n输出显示通用服务提供者为默认提供者，但当你运行程序时，可能会得到任何其他提供者作为默认提供者。\n\n使用 `jdojo.generic.primechecker`：\n\
    \n3 是质数。\n\n4 不是质数。\n\n121 不是质数。\n\n977 是质数。\n\n使用 `jdojo.faster.primechecker`：\n\
    \n3 是质数。\n\n4 不是质数。\n\n121 不是质数。\n\n977 是质数。\n\n使用 `jdojo.probable.primechecker`：\n\
    \n3 是质数。\n\n4 不是质数。\n\n121 不是质数。\n\n977 是质数。\n\n当模块系统在模块声明中遇到 `uses` 语句时，它会扫描模块路径以查找所有包含\
    \ `provides` 语句的模块，这些 `provides` 语句指定了 `uses` 语句中指定的服务接口的实现。从这个意义上说，模块中的 `uses`\
    \ 语句表示对其他模块的间接可选依赖。该依赖在运行时被解析。\n\n**选择和过滤提供者**\n\n有时，你会希望根据提供者的类名来选择它们。例如，你可能只想选择那些完全限定类名以\
    \ `com.jdojo` 开头的质数服务提供者。实现此目的的典型逻辑是使用 `ServiceLoader` 类的 `iterator()` 方法返回的迭代器。\n\
    \n然而，这种操作成本很高。迭代器在将提供者返回给你之前会实例化它，即使实例化是延迟发生的——这意味着提供者仅在需要返回时才被实例化。\n\n**第 5 章\
    \ ■ 实现服务**\n\nJDK 9 为 `ServiceLoader` 类添加了一个新方法。该方法的签名如下：\n\n```java\npublic Stream<ServiceLoader.Provider<S>>\
    \ stream()\n```\n\n`stream()` 方法返回 `ServiceProvider.Provider` 接口实例的流，该接口在 `ServiceLoader`\
    \ 类中声明为嵌套接口，如下所示：\n\n```java\npublic static interface Provider<S> extends Supplier<S>\
    \ {\n    Class<? extends S> type();\n    @Override\n    S get();\n}\n```\n\n`ServiceLoader.Provider`\
    \ 接口的实例代表一个服务提供者。其 `type()` 方法返回服务实现的 `Class` 对象。`get()` 方法实例化并返回服务提供者。`ServiceLoader.Provider`\
    \ 接口有何帮助？当你使用 `stream()` 方法时，流中的每个元素都是 `ServiceLoader.Provider` 类型。你可以根据提供者的类名或类型对流进行过滤，这不会实例化提供者。你可以在过滤器中使用\
    \ `type()` 方法。当你找到所需的提供者时，调用 `get()` 方法来实例化它。这样，你只在确定需要时才实例化提供者，而不是在遍历所有提供者时。\n\
    \n以下是使用 `ServiceLoader` 类的 `stream()` 方法的示例。它会为你提供所有类名以 `com.jdojo` 开头的质数服务提供者的列表。\n\
    \n```java\nstatic List<PrimeChecker> startsWith(String prefix) {\n    return ServiceLoader.load(PrimeChecker.class)\n\
    \            .stream()\n            .filter((Provider p) -> p.type().getName().startsWith(prefix))\n\
    \            .map(Provider::get)\n            .collect(Collectors.toList());\n\
    }\n```\n\n你可以将此方法添加到 `PrimeChecker` 接口。添加此方法时，需要添加一些导入语句：\n\n```java\nimport java.util.List;\n\
    import java.util.ServiceLoader.Provider;\nimport java.util.stream.Collectors;\n\
    ```\n\n以下是从客户端类调用此方法的示例：\n\n```java\n// 获取所有类名以 \"com.jdojo\" 开头的质数服务列表\nList<PrimeChecker>\
    \ jdojoService = PrimeChecker.startsWith(\"com.jdojo\");\n```\n\n**第 5 章 ■ 实现服务**\n\
    \n**在传统模式下测试质数服务**\n\n并非所有应用程序都会迁移到使用模块。你的质数服务的模块化 JAR 可能会与类路径上的其他 JAR 一起使用。假设你将质数服务的所有五个模块化\
    \ JAR 放置在 `C:\\Java9Revealed\\lib` 目录中。使用以下命令，将四个模块化 JAR 放置在类路径上来运行 `com.jdojo.prime.client.Main`\
    \ 类：\n\n```\nC:\\Java9Revealed>java --class-path lib\\com.jdojo.prime.jar;lib\\\
    com.jdojo.prime.client.jar;lib\\com.jdojo.prime.faster.jar;lib\\com.jdojo.prime.generic.jar;lib\\\
    com.jdojo.prime.probable.jar com.jdojo.prime.client.Main\n```\n\n未找到 PrimeChecker\
    \ 服务提供者。\n\n未找到名为 'jdojo.faster.primechecker' 的 PrimeChecker 服务提供者。\n\n未找到名为 'jdojo.probable.primechecker'\
    \ 的 PrimeChecker 服务提供者。\n\n输出表明，使用传统模式（即 JDK 9 之前的模式，将所有模块化 JAR 放置在类路径上）未找到任何服务提供者。在传统模式下，服务提供者发现机制是不同的。`ServiceLoader`\
    \ 类扫描类路径上的所有 JAR，查找 `META-INF/services` 目录中的文件。文件名是服务接口的完全限定名称。文件路径如下所示：\n\n```\n\
    META-INF/services/<service-interface>\n```\n\n此文件的内容是服务提供者实现类/接口的完全限定名称列表。每个类名需要单独占一行。你可以在文件中使用单行注释。以\
    \ `#` 字符开头的行上的文本被视为注释。\n\n服务接口名称是 `com.jdojo.prime.PrimeChecker`，因此三个服务提供者的模块化\
    \ JAR 将包含一个名为 `com.jdojo.prime.PrimeChecker` 的文件，路径如下：`META-INF/services/com.jdojo.prime.PrimeChecker`\n\
    \n你需要将 `META-INF/services` 目录添加到源代码目录的根目录。如果你使用的是 NetBeans 等 IDE，IDE 会为你处理文件的打包。清单\
    \ 5-11、清单 5-12 和清单 5-13 包含了三个质数服务提供者模块的模块化 JAR 中此文件的内容。\n\n***清单 5-11.*** com.jdojo.prime.generic\
    \ 模块的模块化 JAR 中 META-INF/services/com.jdojo.prime.PrimeChecker 文件的内容\n\n```\n#\
    \ 通用服务提供者实现类名\ncom.jdojo.prime.generic.GenericPrimeChecker\n```\n\n***清单 5-12.***\
    \ com.jdojo.prime.faster 模块的模块化 JAR 中 META-INF/services/com.jdojo.prime.PrimeChecker\
    \ 文件的内容\n\n```\n# 更快的服务提供者实现类名\ncom.jdojo.prime.faster.FasterPrimeChecker\n```\n\
    \n**第 5 章 ■ 实现服务**\n\n***清单 5-13.*** com.jdojo.prime.probable 模块的模块化 JAR 中 META-INF/services/com.jdojo.prime.PrimeChecker\
    \ 文件的内容\n"
- fmt: "# The probable service provider implementation interface name\n\n`com.jdojo.prime.probable.ProbablePrimeChecker`\n\
    \nRecompile and repackage the modular JARs for the generic and faster prime checker\
    \ service providers.\n\nRun the following command:\n\n```\nC:\\Java9Revealed>java\
    \ --class-path lib\\com.jdojo.prime.jar;lib\\com.jdojo.prime.client.jar;lib\\\
    com.jdojo.prime.faster.jar;lib\\com.jdojo.prime.generic.jar;lib\\com.jdojo.prime.probable.jar\
    \ com.jdojo.prime.client.Main\n```\n\n```\nException in thread \"main\" java.util.ServiceConfigurationError:\
    \ com.jdojo.prime.PrimeChecker: com.jdojo.prime.faster.FasterPrimeChecker Unable\
    \ to get public no-arg constructor\n...\nat com.jdojo.prime.client.Main.main(Main.java:13)\n\
    Caused by: java.lang.NoSuchMethodException: com.jdojo.prime.faster.FasterPrimeChecker.<init>()\n\
    ...\n```\n\nA partial output is shown. The output indicates a runtime exception\
    \ when the `ServiceLoader` class tries to instantiate the faster prime service\
    \ provider. You will get the same error when an attempt is made to instantiate\
    \ the probable prime service provider. Adding information about a service in the\
    \ `META-INF/services` directory is a legacy way of implementing services. For\
    \ backward compatibility, the service implementation must be a class with a public\
    \ no-args constructor. Recall that we provided a provider constructor only for\
    \ the `GenericPrimeChecker` class. So, the other two prime services will not work\
    \ in legacy mode. You can add a provider constructor to the `FasterPrimeChecker`\
    \ class to make it work. However, it is not possible to add a provider constructor\
    \ to an interface and the `ProbablePrimeChecker` will not work in the class path\
    \ mode. You must load it from an explicit module to make it work.\n\n**Tip** Service\
    \ providers deployed on the class path or as automatic modules on the module path\
    \ must have a public no-args constructor.\n\nThe following command adds the modular\
    \ JAR only for the generic prime service provider, which provides a public no-args\
    \ constructor. The output shows that the provider was located, instantiated, and\
    \ used successfully.\n\n```\nC:\\Java9Revealed>java --class-path lib\\com.jdojo.prime.jar;lib\\\
    com.jdojo.prime.client.jar;lib\\com.jdojo.prime.generic.jar com.jdojo.prime.client.Main\n\
    ```\n\n```\nUsing jdojo.generic.primechecker:\n3 is a prime.\n4 is not a prime.\n\
    121 is not a prime.\n977 is a prime.\nA PrimeChecker service provider with the\
    \ name 'jdojo.faster.primechecker' was not found.\nA PrimeChecker service provider\
    \ with the name 'jdojo.probable.primechecker' was not found.\n```\n\n## Summary\n\
    \nA specific functionality provided by an application (or a library) is known\
    \ as a *service*. Applications and libraries providing implementations of a service\
    \ are known as service providers. Applications using the service provided by those\
    \ service providers are called *service consumers* or *clients*.\n\nIn Java, a\
    \ *service* is defined by a set of interfaces and classes. The service contains\
    \ an interface or an abstract class that defines the functionality provided by\
    \ the service and it is known as the *service provider interface*, *service interface*,\
    \ or *service type*. A specific implementation of a service interface is known\
    \ as a *service provider*. There can be multiple service providers for a single\
    \ service interface. In JDK 9, a service provider may be a class or an interface.\n\
    \nThe JDK contains a `java.util.ServiceLoader<S>` class whose sole purpose is\
    \ to discover and load service providers of type `S` at runtime for a specified\
    \ service interface. If a JAR (modular or non-modular) containing a service provider\
    \ is placed on the class path, the `ServiceLoader` class uses the `META-INF/services`\
    \ directory to find the service providers. The name of the file in this directory\
    \ should be the same as the fully qualified name of the service interface. The\
    \ file contains the fully qualified name of the service provider implementation\
    \ classes—one class name per line. The file can use a `#` character as the start\
    \ of single-line comments. The `ServiceLoader` class scans all `META-INF/services`\
    \ directories on the class path to discover service providers.\n\nIn JDK 9, the\
    \ service provider discovery mechanism has changed. A module that uses the `ServiceLoader`\
    \ class to discover and load the service providers needs to specify the service\
    \ interface using a `uses` statement. The service interface specified in a `uses`\
    \ statement may be declared in the current module or any module accessible to\
    \ the current module. You can use the `iterator()` method of the `ServiceLoader`\
    \ class to iterate over all service providers. The `stream()` method provides\
    \ a stream of elements that are instances of the `ServiceLoader.Provider` interface.\
    \ You can use the stream to filter and select a specific type of providers based\
    \ on the provider’s class names without having to instantiate all providers.\n\
    \nA module that contains a service provider needs to specify the service interface\
    \ and its implementation class using a `provides` statement. The implementation\
    \ class must be declared in the current module.\n\n# Chapter 6: Packaging Modules\n\
    \nIn this chapter, you will learn:\n\n- Different formats for packaging Java modules\n\
    - Enhancements to the JAR format\n- What a multi-release JAR is\n- How to create\
    \ and use multi-release JARs\n- What the JMOD format is\n- How to use the `jmod`\
    \ tool to work with JMOD files\n- How to create, extract, and describe JMOD files\n\
    - How to list contents of JMOD files\n- How to record hashes of modules in JMOD\
    \ files for dependency validation\n\nA module can be packaged in different formats\
    \ to be used in three phases—compile-time, link time, and runtime. Not all formats\
    \ are supported in all phases. JDK 9 supports the following formats to package\
    \ modules:\n\n- Exploded directory\n- JAR format\n- JMOD format\n- JIMAGE format\n\
    \nExploded directories and JAR format were supported before JDK 9. The JAR format\
    \ has been enhanced in JDK 9 to support modular JARs and multi-release JARs. JDK\
    \ 9 has introduced two new formats for packaging modules: JMOD format and JIMAGE\
    \ format. I discuss the enhancements to the JAR format and the JMOD format in\
    \ this section. Chapter 7 covers the JIMAGE format along with the `jlink` tool\
    \ in detail.\n\n## The JAR Format\n\nChapter 3 covered how to use new options\
    \ with the `jar` tool to create modular JARs. The `jar` tool is also used to list\
    \ entries in a JAR file, and to extract and update the contents of a JAR file.\
    \ The `jar` tool has supported these operations before JDK 9 and there is nothing\
    \ new to these operations in JDK 9. In this chapter, I cover a new feature added\
    \ to the JAR format, which is called a multi-release JAR.\n\n© Kishori Sharan\
    \ 2017  \nK. Sharan, *Java 9 Revealed*, DOI 10.1007/978-1-4842-2592-9_6\n\n##\
    \ What Is a Multi-Release JAR?"
