    different ways that JDK 9 lets you break module encapsulation.


    Type Accessibility


    Prior to JDK 9, there were four accessibility types:


    • public


    • protected


    • <package>


    • private


    In JDK 8, a public type meant that it was accessible to all parts of the program.
    In JDK 9, this has changed. A public type may not be public to everyone. A public
    type defined in a module may fall into one of three categories:


    • Public only within the defining module


    • Public only to specific modules


    • Public to everyone


    If a type is defined public in a module, but the module does not export the package
    that contains the type, the type is public only within the module. No other modules
    can access the type.


    If a type is defined public in a module, but the module uses a *qualified* exports
    to export the package that contains the type, the type will be accessible only
    to the modules specified in the to clause of the qualified export.


    If a type is defined public in a module, but the module exports the package using
    an unqualified exports statement that contains the type, the type will be public
    to every module that reads the first module.


    Splitting Packages Across Modules


    Splitting packages into multiple modules is not *allowed*. That is, the same package
    cannot be defined in multiple modules. If types in the same package are in multiple
    modules, those modules should be combined into one module or you need to rename
    the packages. Sometimes, you can compile these modules


    successfully and receive a runtime error; other times, you receive a compile-time
    error. Splitting packages is not disallowed unconditionally as I mentioned in
    the beginning. You need to know the simple rule behind such errors.


    Chapter 4 ■ Module dependenCy


    If two modules named M and N define the same package named P, there must not exist
    a module Q such that the package P in both M and N modules is accessible to Q.
    In other words, the same package in multiple modules must not be readable to a
    module at the same time. Otherwise, an error occurs. If a module is using a type
    in a package that is found in two modules, the module system cannot make a decision
    for you, which may be wrong. It generates an error and wants you to fix the problem.
    Consider the following snippet of code:


    // Test.java


    package java.util;


    public class Test {


    }


    If you compile the Test class in JDK 9 as part of a module or by itself, you will
    receive the following error: error: package exists in another module: java.base


    package java.util;


    ^


    1 error


    If you have this class in a module named M, the compile-time error is stating
    that the java.util package is readable by the module M in this module as well
    as in the java.base module. You must change the package for this class to something
    else that does not exist in any observable modules.


    Restrictions in Module Declarations


    There are several restrictions in declaring modules. If you violate them, you
    will get errors at compile-time or at startup:


    • A module graph cannot contain circular dependencies. That is, two modules


    cannot read each other. If they do, they should be one module, not two. Note that


    it is possible to have circular dependencies at runtime by adding readability
    edges


    programmatically or using the command-line options.


    • Module declarations do not support module versions. You will need to add module’s


    version as the class file attribute using the jar tool or some other tools such
    as javac.


    • The module system does not have a concept of sub-modules. That is, com.jdojo.


    person and com.jdojo.person.client are two separate modules; the second one is


    not a sub-module of the first one.


    Types of Modules


    Java has been around for over 20 years and applications, old as well as new, will
    keep using libraries that have not been modularized or will never be modularized.
    If JDK 9 forced everyone to modularize their applications, the JDK 9 would probably
    not be widely adopted. JDK 9 designers kept the backward compatibility in mind.
    You can adopt JDK 9 by modulating your application at your own pace or by deciding
    86


