    \ 客户端 API\n\n以下代码片段创建了一个使用 HTTP `HEAD` 请求方法的 `HttpRequest` 对象。请注意，它使用了 `HttpRequest.Builder`\
    \ 类的 `method()` 方法来指定 HTTP 方法。\n\n```java\nHttpRequest request =\n    HttpRequest.newBuilder(new\
    \ URI(\"http://www.google.com\"))\n        .method(\"HEAD\", HttpRequest.noBody())\n\
    \        .build();\n```\n\n**处理 HTTP 响应**\n\n一旦你有了 `HttpRequest` 对象，就可以将请求发送到服务器，并同步或异步地接收响应。`HttpResponse<T>`\
    \ 类的一个实例表示从服务器接收到的响应，其中类型参数 `T` 指示响应主体的类型，例如 `String`、`byte[]` 或 `Path`。你可以使用\
    \ `HttpRequest` 类中的以下方法之一来发送 HTTP 请求并接收 HTTP 响应：\n\n• `<T> HttpResponse<T> send(HttpRequest\
    \ req, HttpResponse.BodyHandler<T> responseBodyHandler)`\n\n• `<T> CompletableFuture<HttpResponse<T>>\
    \ sendAsync(HttpRequest req, HttpResponse.BodyHandler<T> responseBodyHandler)`\n\
    \n• `<U,T> CompletableFuture<U> sendAsync(HttpRequest req, HttpResponse.MultiProcessor<U,T>\
    \ multiProcessor)`\n\n`send()` 方法是同步的。也就是说，它会阻塞直到收到响应。`sendAsync()` 方法异步处理响应。它会立即返回一个\
    \ `CompletableFuture<HttpResponse>`，当响应准备好被处理时，该对象完成。\n\n**处理响应状态和头部**\n\nHTTP\
    \ 响应包含状态码、头部和主体。一旦从服务器接收到状态码和头部，`HttpResponse` 对象就会变得可用，但此时主体尚未收到。\n\n`HttpResponse`\
    \ 类的 `statusCode()` 方法以 `int` 形式返回响应的状态码。\n\n`HttpResponse` 类的 `headers()` 方法以\
    \ `HttpHeaders` 接口的实例形式返回响应的头部。`HttpHeaders` 接口包含以下方法，可以方便地按名称检索头部值，或将所有头部作为 `Map<String,List<String>>`\
    \ 获取：\n\n• `List<String> allValues(String name)`\n\n• `Optional<String> firstValue(String\
    \ name)`\n\n• `Optional<Long> firstValueAsLong(String name)`\n\n• `Map<String,List<String>>\
    \ map()`\n\n清单 14-2 包含一个完整的程序，用于向 URL [`www.google.com`](http://www.google.com/)\
    \ 发送一个 `HEAD` 请求。它会打印接收到的响应的状态码和头部。你可能会得到不同的输出。\n\n第 14 章 ■ HTTP/2 客户端 API\n\n\
