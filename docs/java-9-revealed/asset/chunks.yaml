    New Methods in the StrictMath Class


    The JDK contains two classes, Math and StrictMath, in the java.lang package. Both
    classes consist of only static members and they contain methods to provide basic
    numeric operations such as square root, absolute, sign, trigonometric functions,
    and hyperbolic functions. Why do we have two classes to provide similar operations?
    The Math class is not required to return the same results in all implementations.
    This allows it to use native implementations of libraries for operations, which
    may return slightly different results on different platforms. The StrictMath class
    is required to return the same results in all implementations.


    Many methods in the Math class call the methods of the StrictMath class. JDK 9
    added the following static methods to the Math and StrictMath classes:


    • long floorDiv(long x, int y)


    • int floorMod(long x, int y)


    • double fma(double x, double y, double z)


    • float fma(float x, float y, float z)


    • long multiplyExact(long x, int y)


    • long multiplyFull(int x, int y)


    • long multiplyHigh(long x, long y)


    Chapter 20 ■ Other Changes in JDK 9


    The floorDiv() method returns the largest long value that is less than or equal
    to the algebraic quotient of dividing x by y. When both arguments have the same
    sign, the division result is rounded toward zero (truncation mode). When they
    have different signs, the division result is rounded toward negative infinity.
    When the dividend is the Long.MIN_VALUE and the divisor is -1, the method returns
    Long.MIN_VALUE.


    An ArithmeticException is thrown when the divisor is zero.


    The floorMod() method returns floor modulus, which is equal to


    x - (floorDiv(x, y) * y)


    The sign of the floor modulus is the same sign as the divisor y, and is in the
    range of


    -abs(y) < r < +abs(y).


    The fma() methods correspond to the fusedMultiplyAdd operation defined in IEEE
    754-2008\. It


    returns the result of (a * b + c) as if with unlimited range and precision, and
    rounded once to the nearest double/float value. The rounding is done using the
    round to nearest even rounding mode. Note that the fma() method returns a more
    accurate result than the expression (a * b + c) because the latter involves two
    rounding errors—one for multiplication and one for addition—whereas the former
    involves only one rounding error.


    The multiplyExact() method returns the product of the two arguments throwing an


    ArithmeticException if the result overflows a long.


    The multiplyFull() method returns the exact product of the two arguments as a
    long.


    The multiplyHigh() method returns as a long the most significant 64 bits of the
    128-bit product of two 64-bit arguments. When you multiply two 64-bit long values,
    the result could be a 128-bit value. This method returns the most significant
    (high) 64 bits as a result. Listin[g 20-9 con](#index_split_008.html#488)tains
    a complete program to demonstrate the use of these new methods in the StrictMath
    class.


