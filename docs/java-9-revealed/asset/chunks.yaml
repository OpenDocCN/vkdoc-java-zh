    \ format, Object... params)`\n- `void log(System.Logger.Level level, ResourceBundle\
    \ bundle, String msg, Throwable thrown)`\n\nYou will need to provide implementation\
    \ for four abstract methods in the `System.Logger` interface.\n\nThe `getName()`\
    \ method should return the name of your logger. You can give it any name you want.\
    \ The `isLoggable()` method returns `true` if the logger can log a message of\
