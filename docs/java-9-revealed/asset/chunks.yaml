    第 6 章 ■ 打包模块


    如果此 MRJAR 在不支持 MRJAR 的环境中使用，它将被视为常规 JAR——将使用根目录中的内容，而 `META-INF/versions/9` 和
    `META-INF/versions/10` 中的所有其他内容将被忽略。因此，如果此 MRJAR 与 JDK 8 一起使用，则只会使用四个类：C1、C2、C3
    和 C4。


