    • How to create publishers, subscribers, and processors using the Java API for
    Reactive


    Streams in JDK 9


    What Is a Stream?


    A stream is a sequence of items produced by a producer and consumed by one or
    more consumers. This producer-consumer model is also known as source/sink model
    or publisher-subscriber model. I refer to it as a publisher-subscriber model in
    this chapter. I use the terms *element*, *item*, *data item*, and *data* interchangeably
    to mean a piece of information that is published by a publisher and received by
    subscribers.


    There are several stream-processing mechanisms, the pull model and push model
    being the most


    common. In a push model, the publisher pushes items to the subscriber. In a pull
    model, the subscriber pulls items from the publisher. These models work great
    when both the publisher and the subscriber work at the same rate, which is an
    ideal situation. We will consider a few situations when they do not work at the
    same rate, the issues involved in such situations, and the possible solutions.


    When the publisher is faster than the subscriber, the latter has to have an unbounded
    buffer to store fast incoming items or it must drop items it cannot handle. Another
    solution is to use a strategy called *backpressure* in which the subscriber tells
    the publisher to slow down and hold the items until the subscriber is ready to
    process more. Using backpressure ensures that a faster publisher doesn’t overwhelm
    a slower subscriber. Using backpressure may require the publisher to have an unbounded
    buffer if it keeps producing and storing elements. The publisher may implement
    a bounded buffer to store limited amount of elements and may choose to drop them
    if its buffer is full. Another strategy may be used in which the publisher retries
    publishing items to the subscriber, which cannot accept the items when they are
    published.


    What does the subscriber do when it requests items from the publisher and the
    items are not available?


    In a synchronous request, the subscriber has to wait, possibly indefinitely, until
    items are available. If the publisher sends items to the subscriber synchronously
    and the subscriber processes them synchronously, the publisher has to block until
    the data processing finishes. The solution is to have an asynchronous processing
    at both ends, where the subscriber may keep working on other tasks after requesting
    items from the publisher. When more items are ready, the publisher sends them
    to the subscriber asynchronously.


    © Kishori Sharan 2017


    K. Sharan, *Java 9 Revealed*, DOI 10.1007/978-1-4842-2592-9_17


    Chapter 17 ■ reaCtive StreamS


    What Is Reactive Streams?


    Reactive Streams started in 2013 as an initiative for providing a standard for
    *asynchronous* stream processing with *non-blocking backpressure*. It is aimed
    at solving the problems in processing of a stream of items—how to pass a stream
    of items from a publisher to a subscriber without requiring the publisher to block,
    or the subscriber to have an unbounded buffer or drop.


    The Reactive Streams model is very simple—the subscriber sends an asynchronous
    request to the publisher for N items. The publisher sends N or fewer items to
    the subscriber asynchronously.


    ■ **Tip** reactive Streams dynamically switches between the pull model and push
    model stream-processing mechanisms. it uses the pull model when the subscriber
    is slower and uses the push model when the subscriber is faster.


    In 2015, a specification and Java API for handling Reactive Streams were published.
    Refer to the web page at [http://www.reactive-streams.org/ for mor](http://www.reactive-streams.org/)e
    information on Reactive Streams. The Java API for Reactive Streams consists of
    only four interfaces:


    • Publisher<T>


    • Subscriber<T>


    • Subscription


    • Processor<T,R>


    A *publisher* is a producer of potentially an unbounded number of *sequenced*
    items. It publishes (or sends) items to its current subscribers based on the demands
    received from them.'
  trans: '

    • JDK 中的响应式流 API 及其使用方法


    • 如何使用 JDK 9 中的 Java API 创建响应式流的发布者、订阅者和处理器


    什么是流？


    流是由生产者生成并由一个或多个消费者消费的一系列项目。这种生产者-消费者模型也称为源/汇模型或发布者-订阅者模型。在本章中，我将其称为发布者-订阅者模型。我交替使用术语*元素*、*项目*、*数据项*和*数据*，均指由发布者发布并由订阅者接收的一条信息。


    存在多种流处理机制，其中最常见的是拉模型和推模型。在推模型中，发布者将项目推送给订阅者。在拉模型中，订阅者从发布者拉取项目。当发布者和订阅者以相同速率工作时，这些模型效果很好，这是一种理想情况。我们将考虑几种它们不以相同速率工作的情况、这些情况所涉及的问题以及可能的解决方案。


    当发布者比订阅者快时，订阅者必须拥有一个无界缓冲区来存储快速传入的项目，否则就必须丢弃无法处理的项目。另一种解决方案是使用一种称为*背压*的策略，即订阅者告知发布者放慢速度并保留项目，直到订阅者准备好处理更多项目。使用背压可以确保较快的发布者不会压垮较慢的订阅者。如果发布者持续生成并存储元素，使用背压可能要求发布者拥有一个无界缓冲区。发布者可以实现一个有界缓冲区来存储有限数量的元素，并在缓冲区满时选择丢弃它们。还可以采用另一种策略，即发布者重试向订阅者发布项目，而订阅者在项目发布时无法接受它们。


    当订阅者向发布者请求项目但项目不可用时，订阅者会做什么？


    在同步请求中，订阅者必须等待，可能无限期等待，直到项目可用。如果发布者同步地向订阅者发送项目，而订阅者同步地处理它们，则发布者必须阻塞，直到数据处理完成。解决方案是在两端进行异步处理，这样订阅者在向发布者请求项目后可以继续处理其他任务。当更多项目准备就绪时，发布者会异步地将它们发送给订阅者。


    © Kishori Sharan 2017


    K. Sharan, *Java 9 揭秘*, DOI 10.1007/978-1-4842-2592-9_17


    第 17 章 ■ 响应式流


    什么是响应式流？


    响应式流始于 2013 年，是一项旨在为*异步*流处理提供标准并实现*非阻塞背压*的倡议。它旨在解决流项目处理中的问题——如何在不要求发布者阻塞、订阅者拥有无界缓冲区或丢弃项目的情况下，将项目流从发布者传递给订阅者。


    响应式流模型非常简单——订阅者向发布者异步请求 N 个项目。发布者异步地向订阅者发送 N 个或更少的项目。


    ■ **提示** 响应式流在拉模型和推模型流处理机制之间动态切换。当订阅者较慢时使用拉模型，当订阅者较快时使用推模型。


    2015 年，发布了处理响应式流的规范和 Java API。有关响应式流的更多信息，请访问网页 [`www.reactive-streams.org/`](http://www.reactive-streams.org/)。用于响应式流的
    Java API 仅包含四个接口：


    • Publisher<T>


    • Subscriber<T>


    • Subscription


    • Processor<T,R>


    *发布者*是潜在无限数量*有序*项目的生产者。它根据从当前订阅者收到的需求，向其发布（或发送）项目。

