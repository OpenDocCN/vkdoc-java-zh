    to JDK 8\. The classes and resources are arranged as follows:


    • word_to_number.properties


    • com/jdojo/resource/prejdk9/ResourceTest.class


    • com/jdojo/resource/prejdk9/resources/number_to_word.properties


    The project contains two resource files: word_to_number.properties at the root
    and number_to_word.


