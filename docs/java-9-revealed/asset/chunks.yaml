- fmt: "```java\n@Override\npublic String getName() {\n    return \"Log4jLogger\"\
    ;\n}\n\n@Override\npublic boolean isLoggable(Level level) {\n    // Get the log4j\
    \ level from System.Logger.Level\n    org.apache.logging.log4j.Level log4jLevel\
    \ = toLog4jLevel(level);\n    // Check if log4j can handle this level of logging\
    \ and return the result\n    return logger.isEnabled(log4jLevel);\n}\n\n@Override\n\
    public void log(Level level, ResourceBundle bundle, String msg, Throwable thrown)\
    \ {\n    logger.log(toLog4jLevel(level), msg, thrown);\n}\n\n@Override\npublic\
    \ void log(Level level, ResourceBundle bundle, String format, Object... params)\
    \ {\n    logger.printf(toLog4jLevel(level), format, params);\n}\n\nprivate static\
    \ org.apache.logging.log4j.Level toLog4jLevel(Level level) {\n    switch (level)\
    \ {\n        case ALL:\n            return org.apache.logging.log4j.Level.ALL;\n\
    \        case DEBUG:\n            return org.apache.logging.log4j.Level.DEBUG;\n\
    \        case ERROR:\n            return org.apache.logging.log4j.Level.ERROR;\n\
    \        case INFO:\n            return org.apache.logging.log4j.Level.INFO;\n\
    \        case OFF:\n            return org.apache.logging.log4j.Level.OFF;\n \
    \       case TRACE:\n            return org.apache.logging.log4j.Level.TRACE;\n\
    \        case WARNING:\n            return org.apache.logging.log4j.Level.WARN;\n\
    \        default:\n            throw new RuntimeException(\"Unknown Level: \"\
    \ + level);\n    }\n}\n```\n\nAn instance of the `Log4jLogger` will be used as\
    \ a platform logger to log messages from the platform classes. It delegates all\
    \ logging work to a backend logger, which is Log4j in this base. The `logger`\
    \ instance variable stores a reference to the Log4j `Logger` instance.\n\n## Chapter\
    \ 19 ■ Platform and JVM Logging\n\nYou are dealing with two logging APIs—one defined\
    \ by `System.Logger` and one defined by the Log4j. They use different logging\
    \ levels, which are represented by two different types—`System.Logger.Level` and\
    \ `org.apache.logging.log4j.Level`. To log messages, JDK classes will pass a `System.Logger.Level`\
    \ to one of the `log()` methods of the `System.Logger` interface, which in turn\
    \ needs to map the level to the Log4j level. The `toLog4jLevel()` method does\
    \ this mapping. It receives a `System.Logger.Level` and returns a corresponding\
    \ `org.apache.logging.log4j.Level`.\n\nThe `isLoggable()` method maps the system\
    \ level to the Log4j level and queries Log4j if logging is enabled for logging.\
    \ You can configure Log4j to enable any level of logging using its configuration\
    \ file shown in Listing 19-2.\n\nI kept the implementation of the two `log()`\
    \ methods simple. They just delegate their work to the Log4j. The methods do not\
    \ use the `ResourceBundle` argument. You would use it if you want to localize\
    \ the message before logging.\n\nYou have now written the main logic of the platform\
    \ logger, but it’s not ready to test yet. A little more work is needed to see\
    \ it in action.\n\n## Creating a Logger Finder\n\nThe Java runtime needs to find\
    \ your platform logger. It uses a service locator pattern to find it. Recall the\
    \ following statement in your module declaration in Listing 19-1:\n\n```\nprovides\
    \ java.lang.System.LoggerFinder\n    with com.jdojo.logger.Log4jLoggerFinder;\n\
    ```\n\nIn this section, you will create an implementation class named `Log4jLoggerFinder`,\
    \ which will implement the service interface `System.LoggerFinder`. Remember that\
    \ a service interface does not need to be a Java interface. It can be an abstract\
    \ class. In this case, `System.LoggerFinder` is an abstract class and your `Log4jLoggerFinder`\
    \ class will extend the `System.LoggerFinder` class. Listing 19-4 contains the\
    \ code for a `Log4jLoggerFinder` class that will serve as an implementation for\
    \ the service interface `System.LoggerFinder`.\n\n***Listing 19-4.*** A `Log4jLoggerFinder`\
    \ Class That Will Be Used as an Implementation for the interface `System.LoggerFinder`\
    \ Service\n\n```java\n// Log4jLoggerFinder.java\npackage com.jdojo.logger;\n\n\
    import java.lang.System.LoggerFinder;\n\npublic class Log4jLoggerFinder extends\
    \ LoggerFinder {\n    // A logger to be used as a platform logger\n    private\
    \ final Log4jLogger logger = new Log4jLogger();\n\n    @Override\n    public System.Logger\
    \ getLogger(String name, Module module) {\n        System.out.printf(\"Log4jLoggerFinder.getLogger():\
    \ \" +\n            \"[name=%s, module=%s]%n\", name, module.getName());\n   \
    \     // Use the same logger for all modules\n        return logger;\n    }\n\
    }\n```\n\n## Chapter 19 ■ Platform and JVM Logging\n\nThe `Log4jLoggerFinder`\
    \ class creates an instance of the `Log4jLogger` class, which was created in Listing\
    \ 19-3, and stores its reference in an instance variable named `logger`. The `getLogger()`\
    \ method returns the same logger whenever the JDK asks for a logger. The `name`\
    \ and `module` arguments in the `getLogger()` method are the name of the requested\
    \ logger and the requestor’s module. For example, when the `java.util.Currency`\
    \ class needs to log a message, it requests a logger with the name `java.util.Currency`\
    \ and the requestor module will be the `java.base` module. If you want to use\
    \ separate logger for each module, you can return a different logger based on\
    \ the `module` argument. This example returns the same logger for all modules,\
    \ so all messages are logged to the same place. I left the `System.out.println()`\
    \ statement in the `getLogger()` method, so you can see the `name` and `module`\
    \ arguments’ values while running this example.\n\n## Testing the Platform Logger\n\
    \nIt is time to see everything in action. Listing 19-5 contains the code for a\
    \ `PlatformLoggerTest` class, which is used to test the platform logger. You may\
    \ get different output.\n\n***Listing 19-5.*** A `PlatformLoggerTest` Class That\
    \ Tests the Platform Logger\n\n```java\n// PlatformLoggerTest.java\npackage com.jdojo.logger;\n\
    \nimport java.lang.System.Logger;\nimport static java.lang.System.Logger.Level.TRACE;\n\
    import static java.lang.System.Logger.Level.ERROR;\nimport static java.lang.System.Logger.Level.INFO;\n\
    import java.util.Currency;\nimport java.util.Set;\n\npublic class PlatformLoggerTest\
    \ {\n    public static void main(final String... args) {\n        // Let us load\
    \ all currencies\n        Set<Currency> c = Currency.getAvailableCurrencies();\n\
    \        System.out.println(\"# of currencies: \" + c.size());\n\n        // Let\
    \ us test the platform logger by logging a few messages\n        Logger logger\
    \ = System.getLogger(\"Log4jLogger\");\n        logger.log(TRACE, \"Entering application.\"\
    );\n        logger.log(ERROR, \"An unknown error occurred.\");\n        logger.log(INFO,\
    \ \"FYI\");\n        logger.log(TRACE, \"Exiting application.\");\n    }\n}\n\
    ```"
