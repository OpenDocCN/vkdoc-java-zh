    # Chapter 20 ■ Other Changes in JDK 9\n\n## New Formatting Options\n\nJDK 9 added\
    \ a few formatting options to the Time API. The following section describes each\
    \ of these changes in detail.\n\n### Modified Julian Day Formatter\n\nYou can\
    \ use the lowercase letter `g` in a date time formatter pattern, which formats\
    \ the date part to a modified Julian day as an integer. You can repeat `g` multiple\
    \ times, for example, `ggg`, which will zero-pad the result if the number of digits\
    \ in the result is less than the number of `g` specified. The web page at [http://www.unicode.org/reports/tr35/tr35-41/tr35-dates.html#Date_Format_Patterns](http://www.unicode.org/reports/tr35/tr35-41/tr35-dates.html#Date_Format_Patterns)\
    \ defines the meaning of the letter `g` in a formatter as follows:\n\n*Modified\
    \ Julian day. This is different from the conventional Julian day number in two\
    \ regards. First, it demarcates days at local zone midnight, rather than noon\
    \ GMT. Second, it is a local number; that is, it depends on the local time zone.\
    \ It can be thought of as a single number that encompasses all the date-related\
    \ fields.*\n\n**Tip** the uppercase letter `G` is defined as a date and time formatter\
    \ symbol in JDK 8, which formats the input as AD, Anno Domini, A, BC, Before Christ,\
    \ and B.\n\nThe following snippet of code shows you how to use the modified Julian\
    \ day formatting character `g` to format a `ZonedDateTime`:\n\n```\nZonedDateTime\
    \ zdt = ZonedDateTime.now();\nSystem.out.println(\"Current ZonedDateTime: \" +\
    \ zdt);\nSystem.out.println(\"Modified Julian Day (g): \" +\n    zdt.format(DateTimeFormatter.ofPattern(\"\
    g\")));\nSystem.out.println(\"Modified Julian Day (ggg): \" +\n    zdt.format(DateTimeFormatter.ofPattern(\"\
    ggg\")));\nSystem.out.println(\"Modified Julian Day (gggggg): \" +\n    zdt.format(DateTimeFormatter.ofPattern(\"\
    gggggg\")));\n```\n\nCurrent ZonedDateTime: 2017-02-12T11:49:03.364431100-06:00[America/Chicago]\n\
    \nModified Julian Day (g): 57796\n\nModified Julian Day (ggg): 57796\n\nModified\
    \ Julian Day (gggggg): 057796\n\n### Generic Time Zone Names\n\nJDK 8 had two\
    \ letters, `V` and `z`, to format the time zone of the date and time. The letter\
    \ `V` produces a zone ID such as \"America/Los_Angeles; Z; -08:30\" and the letter\
    \ `z` produces a zone name such as Central Standard Time and CST.\n\nJDK 9 added\
    \ the lowercase letter `v` as a formatter symbol that produces generic non-location\
    \ zone name such as Central Time or CT. The term “non-location” means that it\
    \ does not identify an offset from UTC. It refers to the wall time—the time shown\
    \ by the clock on the wall. For example, 8am Central time will have an offset\
    \ of UTC-06 on March 1, 2017 and an offset of UTC-05 on March 19, 2017. The generic\
    \ non-location zone name does not specify the time zone offset. You can use it\
    \ in two formats —`v` and `vvvv`—to produce the generic non-location zone name\
    \ in short form (e.g. CT) and long form (e.g. Central Time), respectively. The\
    \ following snippet of code shows the difference in formatted results produced\
    \ by the `V`, `z`, and `v` formatting symbols:\n\n```\nZonedDateTime zdt = ZonedDateTime.now();\n\
    System.out.println(\"Current ZonedDateTime: \" + zdt);\nSystem.out.println(\"\
    Using VV: \" +\n    zdt.format(DateTimeFormatter.ofPattern(\"MM/dd/yyyy HH:mm\
    \ VV\")));\nSystem.out.println(\"Using z: \" +\n    zdt.format(DateTimeFormatter.ofPattern(\"\
    MM/dd/yyyy HH:mm z\")));\nSystem.out.println(\"Using zzzz: \" +\n    zdt.format(DateTimeFormatter.ofPattern(\"\
    MM/dd/yyyy HH:mm zzzz\")));\nSystem.out.println(\"Using v: \" +\n    zdt.format(DateTimeFormatter.ofPattern(\"\
    MM/dd/yyyy HH:mm v\")));\nSystem.out.println(\"Using vvvv: \" +\n    zdt.format(DateTimeFormatter.ofPattern(\"\
    MM/dd/yyyy HH:mm vvvv\")));\n```"
