- fmt: 'JVM messages can be augmented with additional pieces of information before
    they are logged. These additional pieces of information are called *decorations*,
    and they are prepended to the message. Each decoration is enclosed within brackets—`[`
    and `]`. Table 19- contains a list of all decorations with their long and short
    names. You can use long names or short names with the `-Xlog` option.


    **Table 19-2.** Decorations and Their Long and Short Names


    | Long Name | Short Name | Description |

    | --- | --- | --- |

    | `hostname` | `hn` | Computer name |

    | `level` | `l` | Severity level of the message |

    | `pid` | `p` | The process identifier |

    | `tags` | `tg` | All tags associated with the message |

    | `tid` | `ti` | The thread identifier |

    | `time` | `t` | Current time and date in ISO-8601 format (e.g., 2017-02-10T18:42:58.418+0000)
    |

    | `timemillis` | `tm` | Current time in milliseconds as a number, which is the
    same value as generated by `System.currentTimeMillis()` |

    | `timenanos` | `tn` | Current time in nanoseconds as a number, which is the same
    value as generated by `System.nanoTime()` |

    | `uptime` | `u` | Time since the start of the JVM in seconds and milliseconds
    (e.g., 9.219s) |

    | `uptimemillis` | `um` | Milliseconds since the JVM started |

    | `uptimenanos` | `un` | Nanoseconds since the JVM started |

    | `utctime` | `utc` | Current time and date in UTC format (e.g., 2017-02-10T12:42:58.418-0600)
    |


    **Tip** You can use a special decoration named `none` with the `-Xlog` option
    to turn off decoration. The default value for decoration is `uptime,level,tags`
    in this order.


    ## Message Output Destination


    You can specify one of three destinations where the JVM log will be sent:


    - `stdout`

    - `stderr`

    - `file=<file-name>`


    Use the `stdout` and `stderr` values to print the JVM log on standard output and
    standard error, respectively. The default output destination is `stdout`.


    Use the `file` value to specify a text filename to send the log to a text file.
    You can use `%p` and `%t` in the filename, which will expand to JVM’s PID and
    startup timestamp, respectively. For example, if you specify `file=jvm%p_%t.log`
    as an output destination with the `-Xlog` option, for every JVM run, messages
    will be logged to a file whose name will look like this:


    - `jvm2348_2017-02-10_13-26-05.log`

    - `jvm7292_2017-02-10_13-26-06.log`


    Every time you start the JVM, a log file like the one shown in this list will
    be created. Here, `2348` and `7292` are JVM’s PIDs for two runs.


    **Tip** Absence of `stdout` and `stderr` as the output destination indicates that
    the output destination is a text file. Instead of using `file=jvm.log`, you can
    simply use `jvm.log` as the output destination.


    You can specify additional options for sending output to a text file:


    - `filecount=<file-count>`

    - `filesize=<file-size>`


    These options are used to control the maximum size of each log file and the maximum
    number of log files. Consider the following option:


    ```

    file=jvm.log::filesize=1M,filecount=3

    ```


    Note the use of two consecutive colons (`::`). I explain them in the next section.
    This option uses `jvm.log` as the log file. The maximum size for the log file
    is `1M` (1 MB) and the maximum count for log files is `3`. It will create four
    log files: `jvm.log`, `jvm.log.0`, `jvm.log.1`, and `jvm.log.2`. The current messages
    are logged to the `jvm.log` file and the other three files are rotated as the
    logged messages in the current file exceed `1MB`. You can specify the file size
    using `K` for kilobytes and `M` for megabytes. If you specify a file size without
    including the `K` or `M` suffix, the option assumes it’s bytes.


    ## The `-Xlog` Syntax


    The following is the syntax to use the `-Xlog` option:


    ```

    -Xlog[:<contents>][:[<output>][:[<decorators>][:<output-options>]]]

    ```


    The options used with `-Xlog` are separated by colons (`:`). All options are optional.
    If a preceding part in `-Xlog` is missing, you must use a colon for that part.
    For example, `-Xlog::stderr` indicates that all parts are defaulted, except the
    `<output>` part, which is specified as `stderr`.


    The simplest use of `-Xlog` is as follows, which will log all JVM messages to
    the standard output:


    ```

    java -Xlog --module-path com.jdojo.intro\dist --module com.jdojo.intro/com.jdojo.intro.Welcome

    ```


    There are two special `-Xlog` options: `help` and `disable`, which can be used
    as `-Xlog:help` to print help on `-Xlog` and `-Xlog:disable` to disable all JVM
    logging. You might think that instead of using `-Xlog:disable`, you can just not
    use the `-Xlog` option at all. You are correct. However, the `disable` option
    exists for a different reason. The `-Xlog` option can be used multiple times with
    the same command. If multiple occurrences of `-Xlog` contain the settings of the
    same kind, the settings in the last `-Xlog` win. Therefore, you can specify `-Xlog:disable`
    as the first option and specify another `-Xlog` for turning on a specific type
    of logging. This way, first you turn off all defaults and, then you specify the
    options you are interested in.


    The `<contents>` part specifies the tags and severity levels for the messages
    to be logged. Its syntax is as follows:


    ```

    tag1[+tag2...][*][=level][,...]

    ```


    A `+` in the `<contents>` part represents a logical AND. For example, `gc+exit`
    means log all messages whose tag-set contains exactly two tags—`gc` and `exit`.
    An `*` in the end of a tag name works as a wildcard, which means “at least”. For
    example, `gc*` means log all messages whose tag-set contains at least `gc`, which
    will log messages with tag-sets `[gc]`, `[gc,exit]`, `[gc,remset,exit]`, etc.
    If you use `gc+exit*`, it means log all messages with tag-sets containing at least
    `gc` and `exit` tags, which will log messages with tag-sets `[gc,exit]`, `[gc,remset,exit]`,
    etc. You can specify the severity level for each tag name to be logged. For example,
    `gc=trace` logs all messages with tag-set containing only `gc` with severity level
    of `trace` or higher. You can specify multiple criteria separated by a comma.
    For example, `gc=trace,heap=error` will log all messages with `gc` tag-set at
    `trace` or a higher level or with `heap` tag-set at `error` level.


    I show you commands to log JVM messages using different criteria. The outputs
    shown are on my computer. You may get different outputs when you run these commands.
    The following command specifies `gc` and `startuptime` as tags, leaving the other
    settings to the default values:


    ```

