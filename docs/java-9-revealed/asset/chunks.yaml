    ## Further Work


    I showed you an example of configuring a platform logger using Log4j 2.0 as a
    backend logger. There is still a lot for work to be done to this example before
    it can be used in a production environment. One improvement that we could do is
    log the name of the class that is logging the message. Refer to Listing [19-8](#index_split_007.html#464)
    and you will find that all logged messages use the same class name, which is `com.jdojo.logger.Log4jLogger`
    as the logger’s class, which is not correct. You logged two messages from the
    `com.jdojo.logger.PlatformLoggerTest` class and one message was logged from the
    `java.util.Currency` class. How can you fix this?


    Let’s try to understand this issue first. The class name of the logger is determined
    by Log4j. It simply looks at the caller of its `log()` method and uses that class
    as the one that’s logging the message. In Listing [19-3](#index_split_007.html#458),
    the two `log()` methods call the `log()` method of the Log4j to delegate the logging
    work. Log4j sees the `com.jdojo.logger.Log4jLogger` class as the logger of messages
    and uses its name as the logger class in the logged message. There are two ways
    to fix it:


    - In the `Log4jLogger` class, format the message yourself using the Stack-Walking
    API added to JDK 9. The Stack-Walking API will give you the caller’s class name
    and other details. This will make you change the pattern layout in the Log4j configuration
    file, so Log4j does not determine and include the logger’s class name in the message.

    - You can wait for the next version of Log4j, which *might* support JDK 9 platform
    logger out of the box. There is no such announcement from Log4j at the time of
    this writing.


    ## Unified JVM Logging


    JDK 9 added a new command-line option, `-Xlog`, that gives you a single point
    of access to all messages logged from all components of the JVM. The usage syntax
    of this option is a bit complex. I explain the details of the logged messages,
    before I explain the syntax of the `-Xlog` option.


    **Tip** You can use the `-Xlog:help` option with the `java` command to print the
    description of the `-Xlog` option. The description contains the syntax and values
    for all options with examples.


    When the JVM logs a message or when you are looking for a JVM logged message,
    keep the following points in mind:


    - The JVM needs to identify the topic (or the JVM component) to which the message
    belongs. For example, if a message is related to garbage collection, the messages
    should be tagged as such. A message may belong to multiple topics. For example,
    a message may belong to garbage collection and heap management. Therefore, a message
    may have multiple tags associated with it.

    - Like any other logging facility, JVM logging may occur at different levels,
    such as info, warning, etc.

    - You should be able to decorate the logged messages with additional contextual
    information such as current date and time, thread logging the message, tags used
    with the message, etc.

    - Where should the messages be logged? Should they be logged to `stdout`, `stderr`,
    or one or more files? Should you be able to specify the policies for logging options
    for log files such as filenames, size, and a file rotation policy.


    If you understand these points, it’s time to learn the following terms that are
    used to describe the JVM logging:


    - Tags

    - Levels

    - Decorations

    - Output


    The following is an example of running the `com.jdojo.Welcome` class, which you
    created in Chapter 3, with the `-Xlog` option. It logs all messages with the `gc`
    tag with a severity level of `trace` or above on standard output with the level,
    time, and tags decorations.


    ```

    C:\Java9revealed> java -Xlog:gc=trace:stdout:level,time,tags

    --module-path com.jdojo.intro\dist

    --module com.jdojo.intro/com.jdojo.intro.Welcome

    ```


    ```

    [2017-02-10T12:50:11.412-0600][trace][gc] MarkStackSize: 4096k MarkStackSizeMax:
    16384k

    [2017-02-10T12:50:11.427-0600][debug][gc] ConcGCThreads: 1

    [2017-02-10T12:50:11.432-0600][debug][gc] ParallelGCThreads: 4

    [2017-02-10T12:50:11.433-0600][debug][gc] Initialize mark stack with 4096 chunks,
    maximum 16384

    [2017-02-10T12:50:11.436-0600][info ][gc] Using G1

    Welcome to the Module System.

    Module Name: com.jdojo.intro

    ```


    ### Message Tags


    Every logged message is associated with one or more tags called a tag-set. The
    following is a list of all available tags at the time of this writing. This list
    may change in the future. To get a list of supported tags, use the `-Xlog:help`
    option with the `java` command.


    ```

    add, age, alloc, aot, annotation, arguments, attach, barrier, biasedlocking, blocks,
    bot,

    breakpoint, census, class, classhisto, cleanup, compaction, constraints, constantpool,

    coops, cpu, cset, data, defaultmethods, dump, ergo, exceptions, exit, fingerprint,
    freelist,

    gc, hashtables, heap, humongous, ihop, iklass, init, itables, jni, jvmti, liveness,
    load,

    loader, logging, mark, marking, methodcomparator, metadata, metaspace, mmu, modules,

    monitorinflation, monitormismatch, nmethod, normalize, objecttagging, obsolete,
    oopmap, os,

    pagesize, patch, path, phases, plab, promotion, preorder, protectiondomain, ref,
    redefine,

    refine, region, remset, purge, resolve, safepoint, scavenge, scrub, stacktrace,
    stackwalk,

    start, startuptime, state, stats, stringdedup, stringtable, stackmap, subclass,
    survivor,

    sweep, task, thread, tlab, time, timer, update, unload, verification, verify,
    vmoperation,

    vtables, workgang, jfr, system, parser, bytecode, setting, event

    ```


    If you are interested in logging messages for garbage collection and startup,
    you use the `gc` and `startuptime` tags with the `-Xlog` option. Most tags in
    the list have esoteric names and, in fact, they are meant for developers working
    on the JVM, not for application developers. I could not find descriptions of all
    these tags. The link [https://bugs.openjdk.java.net/browse/JDK-8146948](https://bugs.openjdk.java.net/browse/JDK-8146948)
    contains a bug report that requests descriptions for all these tags. The bug is
    marked as fixed, but I could not see an option that will show the tag descriptions.


    **Tip** You can use a special tag named `all` with the `-Xlog` option that tells
    JVM to log all messages irrespective of the tags associated with them. The default
    value for tag is `all`.


    ### Message Levels


    Level is the severity level of logging that determines messages to be logged based
    on severity of messages. Levels have the following values in the increasing order
    of severity: `trace`, `debug`, `info`, `warning`, and `error`. If you enable logging
    for severity level `S`, all messages with severity level `S` and greater will
    be logged. For example, if you enable logging at the `info` level, all messages
    with the `info`, `warning`, and `error` levels will be logged.


    **Tip** You can use a special severity level named `off` with the `-Xlog` option
    to disable logging at all levels. The default value for level is `info`.


    ### Message Decorations'
