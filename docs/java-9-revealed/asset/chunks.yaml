  raw: 'In the previous command, the modular JAR com.jdojo.intro-1.0.jar was treated
    as a JAR and all types defined in it—we have only one, the Welcome class—were
    loaded as part of the unnamed module of the class loader. This is the reason why
    you get the module name as null in the output. How did the java command find the
    main class name? Recall that when you specify the main class name to the jar tool,
    the tool stores the main class name at two places:


    • In the module-info.class file


    • In the META-INF/MANIFEST.MF file


    This command reads the name of the main class from the META-INF/MANIFEST.MF file.


    You can also use the java command with the --class-path option to run the Welcome
    class. You can place the lib\com.jdojo.intro-1.0.jar modular on the class path
    and in that case it will be treated as a JAR and the Welcome class will be loaded
    in the unnamed module of the application class loader. You were used to run a
    class this way before JDK 9\. The following command does the job:


    C:\Java9Revealed>java --class-path lib\com.jdojo.intro-1.0.jar


    com.jdojo.intro.Welcome


    Welcome to the Module System.


    Module Name: null


