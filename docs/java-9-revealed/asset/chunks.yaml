  raw: '■ **Tip** Using the default implementation of the compareTo() method in the
    ProcessHandle interface is not very useful for ordering. It compares the pIds
    of two processes.


    Creating a Process


    You need to use an instance of the ProcessBuilder class to start a new process.
    The class contains several methods to set attributes of the process. Calling the
    start() method starts a new process. The start() method returns a Process object
    that you can use to work with the input, output, and error streams of the process.
    The following snippet of code creates a ProcessBuilder to launch JVM on Windows:


    ProcessBuilder pb = new ProcessBuilder()


    .command("C:\\java9\\bin\\java.exe",


    "--module-path",


    "myModulePath",


    "--module",


    "myModule/className")


    .inheritIO();


    Chapter 12 ■ proCess apI Updates


    There are two ways to set the command and arguments for this new process:


    • You can pass them to the constructor of the ProcessBuilder class.


    • You can use the command() method.


    The command() method without arguments returns the command set in the ProcessBuilder.
    Other


    versions with arguments—one with a var-args of String and one with a List<String>—are
    used to set the command and arguments. The first argument in the method is the
    command path and the rest are the arguments to the command.


    The new process has its own input, output, and error streams. The inheritIO()
    method sets the input, output, and error streams of the new process to be the
    same as the current process. There are several redirectXxx() methods in the ProcessBuilder
    class to customize the standard I/O for the new process, for example, setting
    the standard error stream to a file, so all errors are logged to a file. Once
    you have configured all attributes of the process, you can call start() to start
    the process:


    // Start a new process


    Process newProcess = pb.start();


    You can call the start() method of the ProcessBuilder class multiple times to
    start multiple processes with the same attributes previously stored in it. This
    has a performance benefit that you can create one ProcessBuilder instance and
    reuse it to launch the same process multiple times.


    You can obtain the process handle of a process using the toHandle() method of
    the Process class:


    // Get the process handle


    ProcessHandle handle = newProcess.toHandle();


    You can use the process handle to destroy the process, wait for the process to
    finish, or query the process for its state and attributes such as its children,
    descendants, parents, CPU time used, etc. The information you get about a process
    and the control you have on a process depends on the operating system access controls.


    It is tricky to come up with an example to create a process that will run on all
    operating systems. I came up with an example in which creating a new process launches
    a new JVM to run a class. If you can run other examples in this book, it means
    that you have JDK 9 installed on your machine and this example should work on
    your machine.


    Listing [12-3](#index_split_005.html#336) contains the code for a class named
    Job. Its main() method expects two arguments: sleep interval and sleep duration
    in seconds. If they are not passed, the method uses 5 seconds and 60 seconds as
    the default values. In the first part, the method attempts to extract first and
    second arguments, if specified.


    In the second part, it gets the process handle of the current process executing
    this method using the ProcessHandle.current() method. It reads the PID of the
    current process and prints a message including the PID, sleep interval, and sleep
    duration. In the end, it starts a for loop and keeps sleeping for the sleep interval
    until the sleep duration is reached. In every iteration of the loop, it prints
    a message.


