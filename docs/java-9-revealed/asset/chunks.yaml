- fmt: 'In the following snippet of code, assuming that the `BasicInfo` class is loaded
    from the class path, `m1` and `m2` refer to the same `Module`:


    ```

    Class<BasicInfo> cls = BasicInfo.class;

    Module m1 = cls.getClassLoader().getUnnamedModule();

    Module m2 = cls.getModule();

    ```


    The `getName()` method of the `Module` class returns the name of the module. For
    unnamed modules, it returns `null`.


    ```

    // Get the module name

    String moduleName = module.getName();

    ```


    The `getPackages()` method in the `Module` class returns a `Set<String>` containing
    all packages in the module. The `getClassLoader()` method returns the class loader
    for the module.


    The `getLayer()` method returns the `ModuleLayer` that contains the module; if
    the module is not in a layer, it returns `null`. A module layer contains only
    named modules. So, this method always returns `null` for unnamed modules.


    ## Describing Modules


    An instance of the `ModuleDescriptor` class represents a module definition, which
    is created from a module declaration—typically from a `module-info.class` file.
    A module descriptor can also be created on the fly using the `ModuleDescriptor.Builder`
    class. A module declaration may be augmented using command-line options such as
    `--add-reads`, `--add-exports`, and `--add-opens`, and using methods in the `Module`
    class such as `addReads()`, `addOpens()`, and `addExports()`. A `ModuleDescriptor`
    represents a module descriptor added at the time of module declaration, not an
    augmented module descriptor. The `getDescriptor()` method of the `Module` class
    returns a `ModuleDescriptor`:


    ```

    Class<BasicInfo> cls = BasicInfo.class;

    Module module = cls.getModule();

    // Get the module descriptor

    ModuleDescriptor desc = module.getDescriptor();

    ```


    **Tip:** A `ModuleDescriptor` is immutable. An unnamed module does not have a
    module descriptor. The `getDescriptor()` method of the `Module` class returns
    `null` for an unnamed module.


    You can also create a `ModuleDescriptor` object by reading the binary form of
    the module declaration from a `module-info.class` file using one of the static
    `read()` methods of the `ModuleDescriptor` class. The following snippet of code
    reads a `module-info.class` file from the current directory. Exception handling
    is excluded for clarity:


    ```

    String moduleInfoPath = "module-info.class";

    ModuleDescriptor desc = ModuleDescriptor.read(new FileInputStream(moduleInfoPath));

    ```


    ## Representing Module Statements


    The `ModuleDescriptor` class contains the following static nested classes whose
    instances represent a statement with the same name in a module declaration:


    - `ModuleDescriptor.Exports`

    - `ModuleDescriptor.Opens`

    - `ModuleDescriptor.Provides`

    - `ModuleDescriptor.Requires`


    Notice that there is no `ModuleDescriptor.Uses` class to represent a `uses` statement.
    This is because a `uses` statement represents a service interface name that can
    be represented as a `String`.


    ### Representing the `exports` Statement


    An instance of the `ModuleDescriptor.Exports` class represents an `exports` statement
    in a module declaration. The following methods in the class return the components
    of the `exports` statement:


    - `boolean isQualified()`

    - `Set<ModuleDescriptor.Exports.Modifier> modifiers()`

    - `String source()`

    - `Set<String> targets()`


    The `isQualified()` method returns `true` for a qualified export and `false` for
    a non-qualified export.


    The `source()` method returns the name of the exported package. For a qualified
    export, the `targets()` method returns an immutable set of module names to which
    the package is exported and, for a non-qualified export, it returns an empty set.
    The `modifiers()` method returns the set of modifiers for the `exports` statement
    that are constants of the nested `ModuleDescriptor.Exports.Modifier` enum, which
    contains the following two constants:


    - `MANDATED`: The export was implicitly declared in the source module declaration.

    - `SYNTHETIC`: The export was not explicitly or implicitly declared in the source
    of the module declaration.


    ### Representing the `opens` Statement


    An instance of the `ModuleDescriptor.Opens` class represents an `opens` statement
    in a module declaration.'
