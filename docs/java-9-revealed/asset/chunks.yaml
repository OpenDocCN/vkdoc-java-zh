- fmt: "# Setting the Execution Context\n\nWhen you set the execution context, the\
    \ current session is reset and all previously executed snippets in the current\
    \ session are replayed in quiet mode. That is, the replayed snippets are not shown.\
    \ However, errors during the replay will be shown.\n\nYou can set the execution\
    \ context using the `/env`, `/reset`, and `/reload` commands. Each of these commands\
    \ has different effects. The meaning of the context options such as `-class-path`\
    \ and `-module-path` are the same. You can list all options that can be used to\
    \ set the execution context using the command `/help context`.\n\nLet’s walk through\
    \ an example of using the module-related settings using the `/env` command. You\
    \ created a `com.jdojo.intro` module in Chapter 3. The module contains a package\
    \ named `com.jdojo.intro`, but it does not export the package. Now, you want to\
    \ call the static `main(String[] args)` method of the `Welcome` class in the non-exported\
    \ package. Here are the steps you need to perform in `jshell`:\n\n- Set the module\
    \ path, so the module will be found.\n- Resolve the module by adding it to the\
    \ default set of root modules. You can do this using the `-add-modules` option\
    \ with the `/env` command.\n- Export the package using the `-add-exports` command.\
    \ The snippets entered in `jshell` are executed in an unnamed module, so you will\
    \ need to export the package to all unnamed modules using the `ALL-UNNAMED` keyword.\
    \ If you do not supply target modules in the `-add-exports` option, `ALL-UNNAMED`\
    \ is assumed and the package is exported to all unnamed modules.\n- Optionally,\
    \ import the `com.jdojo.intro.Welcome` class if you want to use its simple name\
    \ in snippets.\n- Now, you will be able to call the `Welcome.main()` method from\
    \ `jshell`.\n\nThe following `jshell` session shows you how to perform these steps.\
    \ It is assumed that you are launching the `jshell` session with `C:\\Java9Revealed`\
    \ as the current directory and the `C:\\Java9Revealed\\com.jdojo.intro\\build\\\
    classes` directory contains the compiled code for the `com.jdojo.intro` module.\
    \ If your directory structure and the current directory are different, substitute\
    \ the directory paths used in session with yours.\n\n```\nC:\\Java9Revealed>jshell\n\
    |  Welcome to JShell -- Version 9-ea\n|  For an introduction type: /help intro\n\
    \njshell> /env -module-path com.jdojo.intro\\build\\classes\n|  Setting new options\
    \ and restoring state.\n\njshell> /env -add-modules com.jdojo.intro\n|  Setting\
    \ new options and restoring state.\n\njshell> /env -add-exports com.jdojo.intro/com.jdojo.intro=ALL-UNNAMED\n\
    |  Setting new options and restoring state.\n\njshell> import com.jdojo.intro.Welcome\n\
    \njshell> Welcome.main(null)\nWelcome to the Module System.\nModule Name: com.jdojo.intro\n\
    \njshell> /env\n|  --module-path com.jdojo.intro\\build\\classes\n|  --add-modules\
    \ com.jdojo.intro\n|  --add-exports com.jdojo.intro/com.jdojo.intro=ALL-UNNAMED\n\
    \njshell>\n```\n\n# No Checked Exceptions\n\nIn a Java program, if you call a\
    \ method that throws checked exceptions, you must handle those exceptions using\
    \ a `try-catch` block or by adding a `throws` clause. The JShell tool is supposed\
    \ to be a quick and easy way to evaluate snippets, so you do not need to handle\
    \ checked exceptions in your `jshell` snippets. If a snippet throws a checked\
    \ exception when it’s executed, `jshell` will print the stack trace and continue.\n\
    \n```\njshell> FileReader fr = new FileReader(\"secrets.txt\")\n|  java.io.FileNotFoundException\
    \ thrown: secrets.txt (The system cannot find the file specified)\n|        at\
    \ FileInputStream.open0 (Native Method)\n|        at FileInputStream.open (FileInputStream.java:196)\n\
    |        at FileInputStream.<init> (FileInputStream.java:139)\n|        at FileInputStream.<init>\
    \ (FileInputStream.java:94)\n|        at FileReader.<init> (FileReader.java:58)\n\
    |        at (#1:1)\n\njshell>\n```\n\nThis snippet threw a `FileNotFoundException`\
    \ because a file named `secrets.txt` does not exist in the current directory.\
    \ If the file existed, you were able to create a `FileReader` without having to\
    \ use a `try-catch` block. Note that if you try to use this snippet inside a method,\
    \ the normal Java syntax rule applies and your method declaration will not compile:\n\
    \n```\njshell> void readSecrets() {\n   ...>     FileReader fr = new FileReader(\"\
    secrets.txt\");\n   ...>     // More code goes here\n   ...> }\n|  Error:\n| \
    \ unreported exception java.io.FileNotFoundException; must be caught or declared\
    \ to be thrown\n|  FileReader fr = new FileReader(\"secrets.txt\");\n|  ^---------------------------^\n\
    \njshell>\n```\n\n# Auto-Completion\n\nThe JShell tool has an auto-completion\
    \ feature that you can invoke by entering partial text and pressing the Tab key.\
    \ This feature is available when you are entering a command or a snippet. The\
    \ tool will detect the context and help you auto-complete the command. When there\
    \ are multiple possibilities, it shows all possibilities and you will need to\
    \ enter one of them manually. When it finds a unique possibility, it will complete\
    \ the text.\n\n**Warning:** At the time of this writing, the auto-completion keys\
    \ described in this section are being reworked. The proposal is to combine the\
    \ functionality of the Tab and Tab+Shift keys into one Tab key, and combine the\
    \ functionality of the `<fix>` key (alt+enter or alt+F1) into the Tab+Shift key.\
    \ The status of these proposed changes is tracked at [https://bugs.openjdk.java.net/browse/JDK-8177076](https://bugs.openjdk.java.net/browse/JDK-8177076).\
    \ You can use the `/help shortcuts` command on the JShell tool to see the currently\
    \ available auto-completion keys.\n\nThe following is an example of the tool finding\
    \ multiple possibilities. You need to enter `/e` and press Tab:\n\n```\njshell>\
    \ /e\n/edit   /exit\n\njshell> /e\n```\n\nThe tool detected that you were trying\
    \ to enter a command because your text started with a slash (`/`). There are two\
    \ commands (`/edit` and `/exit`) that start with `/e`, and they are printed for\
    \ you. Now you will need to complete the command yourself by entering the rest\
    \ of the command. In case of commands, if you enter just enough text to make the\
    \ command name unique and press Enter, the tool will execute that command. In\
    \ this case, you can enter `/ed` or `/ex` and press Enter to execute the `/edit`\
    \ or `/exit` command, respectively. You can enter a slash (`/`) and press Tab\
    \ to see a list of commands:\n\n```\njshell> /\n/!      /?      /drop   /edit\
    \   /env    /exit   /help\n/history /imports /list   /methods /open   /reload\
    \ /reset\n/save   /set    /types  /vars\n```\n\nThe following snippet creates\
    \ a `String` variable named `str` with an initial value of `\"GoodBye\"`:\n\n\
    ```\njshell> String str = \"GoodBye\"\nstr ==> \"GoodBye\"\n```\n\nContinuing\
    \ with this `jshell` session, enter `str.` and press Tab:\n\n```\njshell> str.\n\
    charAt(          chars()          codePointAt(\ncodePointBefore( codePointCount(\
    \  codePoints()\ncompareTo(       compareToIgnoreCase( concat(\ncontains(    \
    \    contentEquals(   endsWith(\nequals(          equalsIgnoreCase( getBytes(\n\
    getChars(        getClass()       hashCode()\nindexOf(         intern()      \
    \   isEmpty()\nlastIndexOf(     length()         matches(\nnotify()         notifyAll()\
    \      offsetByCodePoints(\nregionMatches(   replace(         replaceAll(\nreplaceFirst(\
    \    split(           startsWith(\nsubSequence(     substring(       toCharArray()\n\
    toLowerCase(     toString()       toUpperCase()\ntrim()           wait(\n```\n\
    \nThis snippet printed all method names for the `String` class that you can invoke\
    \ on the variable `str`. Notice that a few method names end with `()` and others\
    \ end with only `(`. This is not a bug. If a method takes no arguments, its name\
    \ is followed with a `()`. If a method takes arguments, its name is followed with\
    \ a `(`.\n\nContinuing with this example, enter `str.sub` and press Tab:\n\n```\n\
    jshell> str.sub\nsubSequence(   substring(\n```\n\nThis time, the tool found two\
    \ methods in the `String` class that start with `sub`. You can enter the entire\
    \ method call, `str.substring(0, 4)`, and press Enter to evaluate the snippet:\n\
    \n```\njshell> str.substring(0, 4)\n$2 ==> \"Good\"\n```"
