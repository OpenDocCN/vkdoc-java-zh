    A *configuration* represents a set of resolved modules. A resolved module is a
    module whose dependencies, specified using the requires statements, have been
    computed. The module resolution process uses two sets of modules: a set of root
    modules and a set of observable modules. Each module in the set of root modules
    is used as an initial module and its requires statements are resolved against
    the set of observable modules.


    A root module may require another module, which in turn may require another module,
    and so on. The resolution process computes the chain of dependencies for all root
    modules. The resulting graph of modules is called a *dependency* graph.


    A dependency graph only takes into account the requires statements. If a module
    uses a requires transitive statement, modules depending on this module implicitly
    depend on the module specified in the requires transitive statement. The dependency
    graph is augmented with additional readability of modules caused by the requires
