- fmt: '# The Module API


    The `Module`, `ModuleLayer`, and `LayerInstantiationException` classes are in
    the `java.lang` package and the rest are in the `java.lang.module` package. Table
    [10-1](#index_split_003.html#231) contains the list of classes in the Module API
    with a brief description of each. The list is not sorted. I list `Module` and
    `ModuleDescriptor` first because application developers use them most frequently.
    All other classes are typically used by containers and libraries. The list does
    not contain exceptions classes in the Module API. I discuss these classes in detail
    in the subsequent sections.


    **Table 10-1.** Commonly Used Classes and Their Descriptions in the Module API


    | Class | Description |

    |-------|-------------|

    | `Module` | Represents a runtime module. |

    | `ModuleDescriptor` | Represents a module descriptor. It is immutable. |

    | `ModuleDescriptor.Builder` | A nested builder class used to build module descriptors
    programmatically. |

    | `ModuleDescriptor.Exports` | A nested class that represents an exports statement
    in a module declaration. |

    | `ModuleDescriptor.Opens` | A nested class that represents an opens statement
    in a module declaration. |

    | `ModuleDescriptor.Provides` | A nested class that represents a provides statement
    in a module declaration. |

    | `ModuleDescriptor.Requires` | A nested class that represents a requires statement
    in a module declaration. |

    | `ModuleDescriptor.Version` | A nested class that represents a module’s version
    string. It contains a `parse(String v)` factory method that returns its instance
    from a version string. |

    | `ModuleDescriptor.Modifier` | An enum whose constants represent modifiers used
    on a module declaration such as `OPEN` for an open module. |

    | `ModuleDescriptor.Exports.Modifier` | An enum whose constants represent modifiers
    used on an exports statement in a module’s declaration. |

    | `ModuleDescriptor.Opens.Modifier` | An enum whose constants represent modifiers
    used on an opens statement in a module’s declaration. |

    | `ModuleDescriptor.Requires.Modifier` | An enum whose constants represent modifiers
    used on a requires statement in a module’s declaration. |

    | `ModuleReference` | A reference to a module’s contents. It contains the module’s
    descriptor and its location. |

    | `ResolvedModule` | Represents a resolved module in a module graph. Contains
    the module’s name, its dependencies, and a reference to its contents. It can be
    used to walk though all transitive dependencies of a module in a module graph.
    |

    | `ModuleFinder` | An interface used to find modules on specified paths or system
    modules. Found modules are returned as instances of `ModuleReference`. It contains
    factory methods to get its instances. |

    | `ModuleReader` | An interface used to read a module’s contents. You can obtain
    a `ModuleReader` from a `ModuleReference`. |

    | `Configuration` | Represents a module graph of resolved modules. |

    | `ModuleLayer` | Contains a module graph (a `Configuration`) and a mapping between
    modules in the graph and class loaders. |

    | `ModuleLayer.Controller` | A nested class used to control modules in a `ModuleLayer`.
    Methods in the `ModuleLayer` class return instances of this class. |


    ## Representing Modules


    An instance of the `Module` class represents a runtime module. Every type loaded
    into the JVM belongs to a module. JDK 9 added a method named `getModule()` in
    the `Class` class that returns the module to which the class belongs. The following
    snippet of code shows how to get the module of a class named `BasicInfo`:


    ```java

    // Get the Class object for of the BasicInfo class

    Class<BasicInfo> cls = BasicInfo.class;


    // Get the module reference

    Module module = cls.getModule();

    ```


    A module can be named or unnamed. The `isNamed()` method of the `Module` class
    returns `true` for a named module and `false` for an unnamed module.


    Every class loader contains an unnamed module that contains all types loaded by
    the class loader from the class path. If a class loader loads types from a module
    path, those types belong to named modules. The `getModule()` method of the `Class`
    class may return a named or unnamed module. JDK 9 added a method named `getUnnamedModule()`
    to the `ClassLoader` class that returns the unnamed module of the class loader.'
