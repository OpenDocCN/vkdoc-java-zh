- fmt: "# WebSocket Client Endpoint\n\nThe `method` when the opening handshake is\
    \ successful. Otherwise, it prints an error message and sets the `isError` flag\
    \ to `true`.\n\n- The `talkToServer()` method allows for one more message to be\
    \ received by the listener and sends a text message to the server endpoint. Note\
    \ that the server endpoint sends three messages with a five-second interval when\
    \ it receives a text message from a client endpoint. Sending this message from\
    \ the `talkToServer()` method initiates the message exchange between the two endpoints.\n\
    - The `getListener()` method creates and returns a `WebSocket.Listener` instance.\
    \ The server endpoint will send three messages followed by a close message. The\
    \ `onClose()` method in the listener responds to the close message from the server\
    \ by sending an empty close message, which will end the client endpoint operations.\n\
    \n`Listing 14-6` contains the program to run the client endpoint. If you run the\
    \ `WebSocketClientTest` class, make sure that your web application with the server\
    \ endpoint is running. You will also need to modify the `SERVER_URI` static variable\
    \ to match the URI of the server endpoint for your web application. Refer to the\
    \ next section, “Troubleshooting the WebSocket Application,” if you do not get\
    \ output similar to the one shown. The output prints the current date and time\
    \ with the time zone, so you may get different output.\n\n## Listing 14-6. A Program\
    \ to Run the Client Endpoint\n\n```java\n// WebSocketClientTest.java\n\npackage\
    \ com.jdojo.http.client;\n\nimport java.net.URI;\nimport java.net.URISyntaxException;\n\
    import java.util.concurrent.TimeUnit;\n\npublic class WebSocketClientTest {\n\n\
    \    // Please change the URI to point to your server endpoint\n    static final\
    \ String SERVER_URI = \"ws://localhost:8080/webapp/servertime\";\n\n    public\
    \ static void main(String[] args)\n            throws URISyntaxException, InterruptedException\
    \ {\n\n        // Create a client WebSocket\n        WebSocketClient wsClient\
    \ = new WebSocketClient(new URI(SERVER_URI));\n\n        // Connect to the Server\n\
    \        wsClient.connect();\n\n        // Wait until the WebSocket is closed\n\
    \        while(!wsClient.isClosed()) {\n            TimeUnit.SECONDS.sleep(1);\n\
    \        }\n\n        // Need to exit\n        System.exit(0);\n    }\n}\n```\n\
    \n## Chapter 14: The HTTP/2 Client API\n\nA WebSocket has been opened.\n\n```\n\
    Server: 2016-12-15T14:19:53.311-06:00[America/Chicago]\nServer: 2016-12-15T14:19:58.312-06:00[America/Chicago]\n\
    Server: 2016-12-15T14:20:03.313-06:00[America/Chicago]\nThe WebSocket is closed.\
    \ Close Code: 1000, Close Reason: Done\n```\n\n## Troubleshooting the WebSocket\
    \ Application\n\nA number of things can go wrong when you are trying to test the\
    \ WebSocket application. Table 14-1 lists a few of these problems and their solutions.\n\
    \n### Table 14-1. Possible Errors and Solutions for the WebSocket Application\n\
    \n| Error Message | Solution |\n| --- | --- |\n| Could not connect to the server.\
    \ Error: `java.net.ConnectException: Connection refused: no further information`\
    \ | Indicates that the web server is not running or your server URI is incorrect.\
    \ Try running the webserver and checking the server URI, which is specified in\
    \ the `WebSocketClientTest` class in its `SERVER_URI` static variable. |\n| Could\
    \ not connect to the server. Error: `java.net.http.WebSocketHandshakeException:\
    \ 404: RFC 6455 1.3. Unable to complete handshake; HTTP response status code 404`\
    \ | Indicates that the server URI is not pointing to the correct endpoint on the\
    \ server. Verify that the value of the `SERVER_URI` static variable in the `WebSocketClientTest`\
    \ class is correct. |\n| A WebSocket has been opened. `Dec 15, 2016 2:58:03 PM\
    \ java.net.http.WS$1 onError WARNING: Failing connection java.net.http.WS@162532d6[CONNECTED],\
    \ reason: 'RFC 6455 7.2.1. Stream ended before a Close frame has been received'\
    \ An error occurred: null` | Indicates that after the opening handshake the server\
    \ is automatically closing the server endpoint. This is typically done by an antivirus\
    \ program running on your machine. You need to configure your antivirus program\
    \ to allow the HTTP connections on the specified port or run the web server with\
    \ an HTTP listener on another port that is not blocked by your antivirus program.\
    \ |\n| A WebSocket has been opened. | (No specific error; indicates successful\
    \ connection) |"
