    什么是栈遍历？


    栈遍历（或栈行走）是遍历线程的栈帧并检查帧内容的过程。从 Java 1.4 开始，您可以获取线程栈的快照，并获取每个帧的详细信息，例如方法调用发生的类名和方法名、源文件名、源文件中的行号等。用于栈遍历的类和接口位于栈遍历
    API 中。


    JDK 8 中的栈遍历


    在 JDK 9 之前，可以使用 `java.lang` 包中的以下类遍历线程栈中的所有帧：


    • `Throwable`


    • `Thread`


    • `StackTraceElement`


    `StackTraceElement` 类的实例代表一个栈帧。`Throwable` 类的 `getStackTrace()` 方法返回一个 `StackTraceElement[]`，其中包含当前线程栈的帧。


    `Thread` 类的 `getStackTrace()` 方法返回一个 `StackTraceElement[]`，其中包含线程栈的帧。数组的第一个元素是栈顶帧，代表序列中最后一次方法调用。某些
    JVM 实现可能会省略返回数组中的一些帧。


