    com.jdojo.person\build\classes;com.jdojo.address\build\classes


    --module com.jdojo.person/com.jdojo.person.Main


    Implicit Readability


    If a module can read another module without the first module including in its
    declaration a requires statement to read the second module, it is said that the
    first module *implicitly* reads the second module.


    Every module implicitly reads the java.base module. An implicit read is not limited
    to the java.base module. A module can also implicitly read another module, other
    than the java.base module. Before I show you how to add implicit readability to
    a module, I will build an example to see why we need this feature.


    In the previous section, you created two modules called com.jdojo.address and
    com.jdojo.person where the second module reads the first module using the following
    declaration:


    module com.jdojo.person {


    **requires com.jdojo.address;**


    ...


    }


    The Person class in the com.jdojo.person module refers to the Address class in
    com.jdojo.address module. Let’s create another module named com.jdojo.person.test,
    which reads the com.jdojo.person module. The module declaration is shown in Listing
    [4-6](#index_split_001.html#88).


