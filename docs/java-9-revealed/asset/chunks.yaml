    the replayed snippets are not shown. However, errors during the replay will be
    shown.


    You can set the execution context using the /env, /reset, and /reload commands.
    Each of these command has different effects. The meaning of the context options
    such as -class-path and -module-path are the same. You can list all options that
    can be used to set the execution context using the command


    -/help context.


    Let’s walk through an example of using the module-related settings using the /env
    command. You created a com.jdojo.intro module in Chapt[er 3](http://dx.doi.org/10.1007/978-1-4842-2592-9_3).
    The module contains a package named com.jdojo.intro, but it does not export the
    package. Now, you want to call the static main(String[] args) method of the Welcome
    class in the non-exported package. Here are the steps you need to perform in jshell:


    • Set the module path, so the module will be found.


    • Resolve the module by adding it to the default set of root modules. You can
    do this


    using the -add-modules option with the /env command.


    • Export the package using the -add-exports command. The snippets entered in


    jshell are executed in an unnamed module, so you will need to export the package


    to all unnamed modules using the ALL-UNNAMED keyword. If you do not supply target


    modules in the -add-exports option, ALL-UNNAMED is assumed and the package is


    exported to all unnamed modules.


    • Optionally, import the com.jdojo.intro.Welcome class if you want to use its
    simple


    name in snippets.


    • Now, you will be able to call the Welcome.main() method from jshell.


    The following jshell session shows you how to perform these steps. It is assumed
    that you are launching the jshell session with C:\Java9Revealed as the current
    directory and the C:\Java9Revealed\


    com.jdojo.intro\build\classes directory contains the compiled code for the com.jdojo.intro
    module. If your directory structure and the current directory are different, substitute
    the directory paths used in session with yours.


    Chapter 11 ■ the Java Shell


    C:\Java9Revealed>jshell


    | Welcome to JShell -- Version 9-ea


    | For an introduction type: /help intro


    jshell> /env -module-path com.jdojo.intro\build\classes


    | Setting new options and restoring state.


    jshell> /env -add-modules com.jdojo.intro


    | Setting new options and restoring state.


    jshell> /env -add-exports com.jdojo.intro/com.jdojo.intro=ALL-UNNAMED


    | Setting new options and restoring state.


    jshell> import com.jdojo.intro.Welcome


    jshell> Welcome.main(null)


    Welcome to the Module System.


    Module Name: com.jdojo.intro


    jshell> /env


    | --module-path com.jdojo.intro\build\classes


    | --add-modules com.jdojo.intro


    | --add-exports com.jdojo.intro/com.jdojo.intro=ALL-UNNAMED


    jshell>


    No Checked Exceptions


    In a Java program, if you call a method that throws checked exceptions, you must
    handle those exceptions using a try-catch block or by adding a throws clause.
    The JShell tool is supposed to be a quick and easy way to evaluate snippets, so
    you do not need to handle checked exceptions in your jshell snippets. If a snippet
    throws a checked exception when it’s executed, jshell will print the stack trace
    and continue.


    jshell> FileReader fr = new FileReader("secrets.txt")


    | java.io.FileNotFoundException thrown: secrets.txt (The system cannot find the
    file specified)


    | at FileInputStream.open0 (Native Method)


    | at FileInputStream.open (FileInputStream.java:196)


    | at FileInputStream.<init> (FileInputStream.java:139)


    | at FileInputStream.<init> (FileInputStream.java:94)


    | at FileReader.<init> (FileReader.java:58)


    | at (#1:1)


    jshell>


    Chapter 11 ■ the Java Shell


    This snippet threw a FileNotFoundException because a file named secrets.txt does
    not exist in the current directory. If the file existed, you were able to create
    a FileReader without having to use a try-catch block. Note that if you try to
    use this snippet inside a method, the normal Java syntax rule applies and your
    method declaration will not compile:


    jshell> void readSecrets() {


    ...> FileReader fr = new FileReader("secrets.txt");


    ...> // More code goes here


    ...> }


    | Error:


    | unreported exception java.io.FileNotFoundException; must be caught or declared
    to be thrown


    | FileReader fr = new FileReader("secrets.txt");


    | ^---------------------------^


    jshell>


    Auto-Completion


    The JShell tool has an auto-completion feature that you can invoke by entering
    partial text and pressing the Tab key. This feature is available when you are
    entering a command or a snippet. The tool will detect the context and help you
    auto-complete the command. When there are multiple possibilities, it shows all
    possibilities and you will need to enter one of them manually. When it finds a
    unique possibility, it will complete the text.


    ■ **Warning** at the time of this writing, the auto-completion keys described
    in this section are being reworked.


    the proposal is to combine the functionality of the Tab and Tab+Shift keys into
    one Tab key, and combine the functionality of the <fix> key (alt+enter or alt+F1)
    into the Tab+Shift key. the status of these proposed changes is tracked at [https://bugs.openjdk.java.net/browse/JDK-8177076.](https://bugs.openjdk.java.net/browse/JDK-8177076)
    You can use the /help shortcuts command on the JShell tool to see the currently
    available auto-completion keys.


    The following is an example of the tool finding multiple possibilities. You need
    to enter /e and press Tab: jshell> /e


    /edit /exit


    jshell> /e


    The tool detected that you were trying to enter a command because your text started
    with a slash (/).


    There are two commands (/edit and /exit) that start with /e, and they are printed
    for you. Now you will need to complete the command yourself by entering the rest
    of the command. In case of commands, if you enter just enough text to make the
    command name unique and press Enter, the tool will execute that 279


    Chapter 11 ■ the Java Shell


    command. In this case, you can enter /ed or /ex and press Enter to execute the
    /edit or /exit command, respectively. You can enter a slash (/) and press Tab
    to see a list of commands:


    jshell> /


    /! /? /drop /edit /env /exit /help


    /history /imports /list /methods /open /reload /reset


    /save /set /types /vars


    The following snippet creates a String variable named str with an initial value
    of "GoodBye": jshell> String str = "GoodBye"


    str ==> "GoodBye"


    Continuing with this jshell session, enter str. and press Tab:


    jshell> str.


    charAt( chars() codePointAt(


    codePointBefore( codePointCount( codePoints()


    compareTo( compareToIgnoreCase( concat(


    contains( contentEquals( endsWith(


    equals( equalsIgnoreCase( getBytes(


    getChars( getClass() hashCode()


    indexOf( intern() isEmpty()


    lastIndexOf( length() matches(


    notify() notifyAll() offsetByCodePoints(


    regionMatches( replace( replaceAll(


    replaceFirst( split( startsWith(


    subSequence( substring( toCharArray()


    toLowerCase( toString() toUpperCase(


    trim() wait(


    This snippet printed all method names for the String class that you can invoke
    on the variable str.


    Notice that a few method names end with () and others end with only (. This is
    not a bug. If a method takes no arguments, its name is following with a (). If
    a method takes arguments, its name is followed with a (.


    Continuing with this example, enter str.sub and press Tab:


    jshell> str.sub


    subSequence( substring(


    This time, the tool found two methods in the String class that start with sub.
    You can enter the entire method call, str.substring(0, 4), and press Enter to
    evaluate the snippet:


    jshell> str.substring(0, 4)


    $2 ==> "Good"


