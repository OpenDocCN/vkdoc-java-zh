    \  // 该模块在此处导出其包\n}\n```\n\n## 模块图\n\n模块系统只知道一个模块：`java.base`。`java.base`模块不依赖于任何其他模块。所有其他模块都隐式依赖于`java.base`模块。\n\
    \n应用程序的模块化结构可以可视化为一个称为*模块图*的图。在模块图中，每个模块表示为一个节点。如果第一个模块依赖于第二个模块，则存在从第一个模块到第二个模块的有向边。模块图是通过解析一组称为*根模块*的初始模块对模块系统已知的一组模块（称为*可观察模块*）的依赖关系来构建的。\n\
    \n> **提示：** 模块解析或解析一个模块意味着该模块所依赖的模块是可用的。假设一个名为`P`的模块依赖于两个名为`Q`和`R`的模块。解析模块`P`意味着你定位模块`Q`和`R`，并递归地解析模块`Q`和`R`。\n\
    \n模块图是在编译时、链接时和运行时通过解析模块依赖关系构建的。模块解析从根模块开始，沿着依赖链接直到到达`java.base`模块。有时，模块路径上可能有一个模块，但你可能会收到找不到该模块的错误。如果该模块未被解析且未包含在模块图中，则可能发生这种情况。要解析一个模块，它需要位于从根模块开始的依赖链中。默认的根模块集是根据编译器或Java启动器的调用方式选择的。你也可以将模块添加到默认的根模块集中。理解在不同情况下如何选择默认根模块非常重要：\n\
    \n- 如果应用程序代码是从类路径编译的，或者主类是从类路径运行的，则默认的根模块集由`java.se`模块和所有非`java.*`的系统模块（如`jdk.*`和`javafx.*`）组成。如果`java.se`模块不存在，则默认的根模块集由所有`java.*`和非`java.*`模块组成。\n\
    \n- 如果你的应用程序由模块组成，则默认的根模块集取决于阶段：\n  - 在编译时，它由所有正在编译的模块组成。\n  - 在链接时，它是空的。\n  -\
    \ 在运行时，它包含包含主类的模块。你使用`--module`或`-m`选项与`java`命令一起指定要运行的模块及其主类。\n\n继续以名为`policy`和`claim`的两个模块为例，假设`pkg3.Main`是`claim`中的主类，并且两个模块都作为模块化JAR打包在`C:\\\
    Java9Revealed\\lib`目录中。\n\n图2-6展示了使用以下命令运行应用程序时在运行时构建的模块图：\n\n```\nC:\\Java9Revealed>java\
    \ -p lib -m claim/pkg3.Main\n```\n\n**图2-6.** 模块图示例\n\n`claim`模块包含应用程序的主类。因此，在创建模块图时，`claim`是唯一的根模块。`policy`模块被解析，因为`claim`模块依赖于`policy`模块。`java.base`模块被解析，因为所有其他模块都依赖于它，这两个模块也是如此。\n\
