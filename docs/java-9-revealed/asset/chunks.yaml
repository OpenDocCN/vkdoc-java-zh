    你还可以查看某个模块的 Javadoc。在左上角框架中选择一个模块，点击左侧上下框架之间显示的模块名称链接，你将在右侧框架中看到该模块的文档。模块的 Javadoc
    包含所有模块语句的列表，例如 `requires`、`exports` 等。


    考虑这样一个场景：你正在寻找用 Java 实现某些功能的逻辑，并在互联网上找到了一段代码，这段代码使用了一个类，但没有显示导入该类的 import 语句。你可以访问
    Java SE 的 Javadoc，并且想进一步了解这个类。如何获取该类的包名（这是访问该类文档所必需的）？你再次搜索互联网。这次，搜索类名，可能会得到一个指向该类
    Javadoc 的链接。


    或者，你可以将这段代码复制并粘贴到诸如 NetBeans 和 Eclipse 之类的 Java IDE 中，IDE 会帮助你生成 import 语句，从而给出该类的包名。不必担心在
    JDK 9 中搜索类包名的不便之处。


    右侧主框架还有另一个新增功能。该框架中的所有页面都在右上角显示一个**搜索框**（见图 20-1）。搜索框允许你搜索 Javadoc。javadoc 工具会准备一个可搜索的术语索引。要了解哪些内容可搜索，你需要知道哪些术语被索引了：


    *   你可以搜索模块、包、类型和成员的声明名称。构造函数和方法的形参类型会被索引，但这些形参的名称不会被索引。因此，你可以搜索形参的类型。如果你在搜索框中输入
    `"(String, int, int)"`，它会找到所有接受三个形参（类型分别为 String、int 和 int）的构造函数和方法列表。如果你输入 `"util"`
    作为搜索词，它会显示所有在其名称中包含 `"util"` 的包、类型和成员的列表。

    *   JDK 9 引入了一个新的内联 Javadoc 标签 `@index`，可用于告诉 javadoc 工具索引某个关键字。它可以在 Javadoc 中以
    `{@index <关键字> <描述>}` 的形式出现，其中 `<关键字>` 是要被索引的关键字，`<描述>` 是该关键字的描述。以下 Javadoc 标签是使用
