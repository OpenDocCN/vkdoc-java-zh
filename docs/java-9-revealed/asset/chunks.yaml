    \n## `--add-opens`选项\n\n模块声明中的`opens`语句将一个模块中的包开放给所有或部分其他模块，以便这些模块可以在运行时使用深度反射访问该包中的所有成员类型。如果模块的某个包未开放，可以使用`--add-opens`命令行选项将其开放。其语法如下：\n\
    \n`--add-opens <source-module>/<package>=<target-module-list>`\n\n这里，`<source-module>`是将`<package>`开放给`<target-module-list>`的模块，`<target-module-list>`是一个以逗号分隔的目标模块名称列表。这相当于在`<source-module>`的声明中添加一个限定的开放语句：\n\
    \n```\nmodule <source-module> {\n    opens <package> to <target-module-list>;\n\
    \    // More statements go here\n}\n```\n\n> **提示**：如果`--add-opens`选项的目标模块列表是特殊值`ALL-UNNAMED`，则该模块的包将对所有未命名模块开放。`--add-opens`选项可用于`java`命令。在编译时使用此选项与`javac`命令会生成警告且无效。\n\
