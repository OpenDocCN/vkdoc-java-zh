  trans: "\n`ReflectTest` 类非常简单。在其 `main()` 方法中，它使用 `Class.forName()` 方法加载 `com.jdojo.reflect.Item`\
    \ 类，并尝试打印该类的所有四个静态字段的值。\n\n如果某个类在运行时可用，你可以使用 `Class.forName()` 方法从任何模块加载该类。该类不一定需要通过模块依赖（即\
    \ `exports` 和 `requires` 语句）来保证可访问。你可能会质疑这条规则。这难道不违反模块系统的强封装前提吗？如何能在不拥有该类的模块导出包含该类的包的情况下，从任何模块加载该类？之所以允许这样做，是因为你加载的是该类的类描述符（`Class`\
    \ 对象）。知道类描述符并不意味着你也能创建该类的对象并访问其成员。强封装指的是只能访问模块中已导出或已打开的那些类型，而不是指加载类描述符。\n\n让我们运行\
    \ `ReflectTest` 类。它将生成以下错误：\n\n```\nException in thread \"main\" java.lang.ClassNotFoundException:\
    \ com.jdojo.reflect.Item\n    at java.base/jdk.internal.loader.BuiltinClassLoader.loadClass(BuiltinClassLoader.java:532)\n\
    \    at java.base/jdk.internal.loader.ClassLoaders$AppClassLoader.loadClass(ClassLoaders.java:186)\n\
    \    at java.base/java.lang.ClassLoader.loadClass(ClassLoader.java:473)\n    at\
    \ java.base/java.lang.Class.forName0(Native Method)\n    at java.base/java.lang.Class.forName(Class.java:292)\n\
    \    at com.jdojo.reflect.test/com.jdojo.reflect.test.ReflectTest.main(ReflectTest.java:12)\n\
    ```\n\n错误信息表明，在尝试加载 `com.jdojo.reflect.Item` 类时抛出了 `ClassNotFoundException`。我之前不是说应该能够加载该类吗？我之前的说法仍然正确。这个错误源于另一个问题。\n\
    \n当你尝试加载一个类时，包含该类的模块必须为模块系统所知。如果你在 JDK 9 之前收到 `ClassNotFoundException`，那表明该类不在类路径中。你需要将包含该类的目录或\
    \ JAR 添加到类路径中，错误就会解决。在 JDK 9 中，模块是通过模块路径来查找的。因此，让我们将 `com.jdojo.reflect` 模块添加到模块路径中，然后运行\
    \ `ReflectTest` 类。在 NetBeans 中，你需要通过属性对话框将 `com.jdojo.reflect` 项目添加到 `com.jdojo.reflect.test`\
    \ 模块的模块路径中，如图 4-9 所示。\n\n![](img/index-100_1.jpg)\n\n第 4 章 ■ 模块依赖\n\n***图 4-9.**\
    \ 在 NetBeans 中将 com.jdojo.reflect 项目添加到 com.jdojo.reflect.test 项目的模块路径中*\n\n你也可以使用以下命令运行\
    \ `ReflectTest` 类，假设你已在 NetBeans 中构建了两个项目，并且项目的 `dist` 目录中包含模块化 JAR：\n\n```\n\
    C:\\Java9Revealed>java\n--module-path com.jdojo.reflect\\dist;com.jdojo.reflect.test\\\
    dist\n--module com.jdojo.reflect.test/com.jdojo.reflect.test.ReflectTest\n```\n\
    \n在 NetBeans 和命令提示符下运行 `ReflectTest` 类都会返回相同的 `ClassNotFoundException`。因此，看起来将\
    \ `com.jdojo.reflect` 模块添加到模块路径并没有帮助。但这并不完全正确。事实上，这一步确实有帮助，但它只解决了问题的一半。\n\n我们需要理解并解决另一半问题，即模块图。\n\
    \nJDK 9 中的模块路径听起来与类路径类似，但它们的工作方式不同。模块路径用于在模块解析期间定位模块——即构建和扩充模块图时。而类路径则用于在需要加载类时定位类。为了提供可靠的配置，模块系统确保在启动时所有模块所需的依赖项都已存在。一旦你的应用程序启动，所有需要的模块都会被解析，模块解析结束后再向模块路径添加更多模块也无济于事。当你运行\
    \ `ReflectTest` 类时——将 `com.jdojo.reflect` 和 `com.jdojo.reflect.test` 模块都保留在模块路径上——模块图如图\
    \ 4-10 所示。\n\n![](img/index-101_1.jpg)\n\n![](img/index-101_2.jpg)\n\n第 4 章 ■\
    \ 模块依赖\n\n***图 4-10.** 运行 ReflectTest 类时的模块图*\n\n当你从一个模块运行一个类时——就像你运行 `ReflectTest`\
    \ 类时那样——包含主类的模块是唯一用作根的模块。模块图包含主模块所依赖的所有模块及其依赖项。在这种情况下，`com.jdojo.reflect.test`\
    \ 模块是默认根模块集合中的唯一模块，模块系统对 `com.jdojo.reflect` 模块的存在一无所知，即使该模块被放置在模块路径上。你需要做什么才能将\
    \ `com.jdojo.reflect` 模块包含在模块图中？通过使用 `--add-modules` 命令行 VM 选项，将该模块添加到默认的根模块集合中。该选项的值是一个逗号分隔的模块列表，这些模块将被添加到默认的根模块集合中：\n\
    \n```\n--add-modules <module1>,<module2>...\n```\n\n图 4-11 显示了 NetBeans 中 `com.jdojo.reflect.test`\
    \ 项目的属性对话框，其中包含你需要使用的 VM 选项，以将 `com.jdojo.reflect` 模块添加到默认的根模块集合中。\n\n***图 4-11.**\
    \ 在 NetBeans 中运行时将 com.jdojo.reflect 模块添加到默认的根模块集合中*\n\n第 4 章 ■ 模块依赖\n\n图 4-12\
    \ 显示了在将 `com.jdojo.reflect` 模块添加到默认的根模块集合后，运行时的模块图。\n\n```\ncom.jdojo.reflect.test\n\
    \    |\n    v\ncom.jdojo.reflect\n    |\n    v\njava.base\n```\n\n***图 4-12.**\
    \ 将 com.jdojo.reflect 模块添加到默认的根模块集合后的模块图*\n\n另一种解析 `com.jdojo.reflect` 模块的方法是在\
    \ `com.jdojo.reflect.test` 模块的声明中添加 `requires com.jdojo.reflect;` 语句。这样，`com.jdojo.reflect`\
    \ 模块将作为 `com.jdojo.reflect.test` 模块的依赖项被解析。如果你使用此选项，则无需使用 `--add-modules` 选项。\n\
    \n在 NetBeans 中重新运行 `ReflectTest` 类。你也可以使用以下命令运行它：\n\n```\nC:\\Java9Revealed>java\n\
    --module-path com.jdojo.reflect\\dist;com.jdojo.reflect.test\\dist\n--add-modules\
    \ com.jdojo.reflect\n--module com.jdojo.reflect.test/com.jdojo.reflect.test.ReflectTest\n\
    ```\n\n访问 s 时出错：无法使字段 `private static int com.jdojo.reflect.Item.s` 可访问：模块 `com.jdojo.reflect`\
    \ 未向模块 `com.jdojo.reflect.test` 开放 `com.jdojo.reflect`。\n\n访问 t 时出错：无法使字段 `static\
    \ int com.jdojo.reflect.Item.t` 可访问：模块 `com.jdojo.reflect` 未向模块 `com.jdojo.reflect.test`\
    \ 开放 `com.jdojo.reflect`。\n\n访问 u 时出错：无法使字段 `protected static int com.jdojo.reflect.Item.u`\
    \ 可访问：模块 `com.jdojo.reflect` 未向模块 `com.jdojo.reflect.test` 开放 `com.jdojo.reflect`。\n\
    \n访问 v 时出错：无法使字段 `public static int com.jdojo.reflect.Item.v` 可访问：模块 `com.jdojo.reflect`\
    \ 未向模块 `com.jdojo.reflect.test` 导出 `com.jdojo.reflect`。\n"
- fmt: "The output is much better. The `com.jdojo.reflect.Item` class was loaded successfully.\
    \ When the program tried to call the `setAccessible(true)` on the fields, an `InaccessibleObjectException`\
    \ was thrown for every field. Notice a difference in four error messages in the\
    \ output. For the `s`, `t`, and `u` fields, the error messages state that you\
    \ cannot access them because the `com.jdojo.reflect` module does not open the\
    \ `com.jdojo.reflect` package. For the `v` field, the error message states that\
    \ the module does not export the `com.jdojo.reflect` package. The reason behind\
    \ different error messages is that the `v` field is public and the others are\
    \ non-public. To access a public field, the package needs to be exported, which\
    \ is the minimum allowable accessibility. For accessing non-public fields, the\
    \ package must be opened, which is the maximum allowable accessibility.\n\n##\
    \ Chapter 4 ■ Module Dependency\n\nListing [4-14](#index_split_002.html#103) contains\
    \ a modified version of the module declaration for the `com.jdojo.reflect` module.\n\
    \nIt exports the `com.jdojo.reflect` package, so all public types and their public\
    \ members are accessible to the outside code.\n\n**Listing 4-14.** A Modified\
    \ Version of the `com.jdojo.reflect` Module\n\n```java\n// module-info.java\n\n\
    module com.jdojo.reflect {\n\n    exports com.jdojo.reflect;\n\n}\n```\n\nRecompile\
    \ both modules and rerun the `ReflectTest` class the same way in NetBeans or using\
    \ the following command:\n\n```\nC:\\Java9Revealed>java\n--module-path com.jdojo.reflect\\\
    dist;com.jdojo.reflect.test\\dist\n--add-modules com.jdojo.reflect\n--module com.jdojo.reflect.test/com.jdojo.reflect.test.ReflectTest\n\
    ```\n\n```\nAccessing s. Error: Unable to make field private static int com.jdojo.reflect.Item.s\n\
    accessible: module com.jdojo.reflect does not \"opens com.jdojo.reflect\" to module\
    \ com.\njdojo.reflect.test\nAccessing t. Error: Unable to make field static int\
    \ com.jdojo.reflect.Item.t accessible:\nmodule com.jdojo.reflect does not \"opens\
    \ com.jdojo.reflect\" to module com.jdojo.reflect.test\nAccessing u. Error: Unable\
    \ to make field protected static int com.jdojo.reflect.Item.u\naccessible: module\
    \ com.jdojo.reflect does not \"opens com.jdojo.reflect\" to module com.jdojo.\n\
    reflect.test\nv = 40\n```\n\nAs expected, you were able to access the value of\
    \ the `v` field, which is public. Exporting a package allows you to access only\
    \ public types and their public members. You cannot access other non-public fields.\
    \ To get deep reflective access to the `Item` class, the solution is to open the\
    \ entire module or the package containing the `Item` class. Listing [4-15](#index_split_002.html#103)\
    \ contains a modified version of the `com.jdojo.reflect` module, which declares\
    \ it as an open module. An open module exports all of its packages at runtime\
    \ for deep reflection.\n\n**Listing 4-15.** A Modified Version of the `com.jdojo.reflect`\
    \ Module That Declares It as an Open Module\n\n```java\n// module-info.java\n\n\
    open module com.jdojo.reflect {\n    // No module statements\n}\n```\n\n## Chapter\
    \ 4 ■ Module Dependency\n\nRecompile the modules and rerun the `ReflectTest` class\
    \ in NetBeans using the following command:\n\n```\nC:\\Java9Revealed>java\n--module-path\
    \ com.jdojo.reflect\\dist;com.jdojo.reflect.test\\dist\n--add-modules com.jdojo.reflect\n\
    --module com.jdojo.reflect.test/com.jdojo.reflect.test.ReflectTest\n```\n\n```\n\
    s = 10\nt = 20\nu = 30\nv = 40\n```\n\nThe output shows that you were able to\
    \ access all fields—public and non-public—of the `Item` class from the `com.jdojo.reflect.test`\
    \ module. You can also get the same results by opening the `com.jdojo.reflect`\
    \ package instead of opening the entire module. A modified version of the `com.jdojo.reflect`\
    \ module declaration, as shown in Listing [4-16](#index_split_002.html#104), achieves\
    \ this. Recompile your modules and rerun the `ReflectTest` class as you did in\
    \ the previous step and you will get the same results.\n\n**Listing 4-16.** A\
    \ Modified Version of the `com.jdojo.reflect` Module That Opens the `com.jdojo.reflect`\
    \ Package for Deep Reflection\n\n```java\n// module-info.java\n\nmodule com.jdojo.reflect\
    \ {\n    opens com.jdojo.reflect;\n}\n```\n\nThis example is almost over! There\
    \ are a few points to note:"
