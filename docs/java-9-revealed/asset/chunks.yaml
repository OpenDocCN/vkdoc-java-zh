    name of the variable and the value of the expressions. In the first case, the
    feedback $1 ==> 4 means that the expression 2 + 2 evaluated to 4 and the result
    was assigned to a variable named $1\. Similarly, the expression 9.0 * 6 was evaluated
    to 54.0 and the value was assigned to a variable named $2\. You can use these
    variable names in other expressions. You can print their values by simply entering
    their names:


    jshell> $1


    $1 ==> 4


    jshell> $2


    $2 ==> 54.0


    jshell> System.out.println($1)


    jshell> System.out.println($2)


    54.0


    ■ **Tip** In jshell, you do not need to terminate a statement with a semicolon
    as you do in a Java program.


    the tool will insert the missing semicolons for you.


    In Java, every variable has a data type. In these examples, what are the data
    types of the variables named $1 and $2? In Java, 2 + 2 evaluates to an int and
    9.0 * 6 evaluates to a double. Therefore, the data types for the $1 and $2 variables
    should be int and double, respectively. How do you verify this? Let’s first do
    it the hard way. You can cast $1 and $2 to an Object and invoke the getClass()
    method on them, which should give you Integer and Double. Note that primitive
    values of int and double types are boxed to Integer and Double reference types
    in these examples when you cast them as an Object:


    jshell> 2 + 2


    $1 ==> 4


    jshell> 9.0 * 6


    $2 ==> 54.0


    Chapter 11 ■ the Java Shell


    jshell> ((Object)$1).getClass()


    $3 ==> class java.lang.Integer


    jshell> ((Object)$2).getClass()


    $4 ==> class java.lang.Double


    jshell>


    There is an easier way to determine the data type of variables created by jshell—you
    just tell jshell to give you verbose feedback and it will print the data type
    of the variables it creates and much more! The following commands set the feedback
    mode to verbose and evaluate the same expressions:


    jshell> /set feedback verbose


    | Feedback mode: verbose


    jshell> 2 + 2


    $1 ==> 4


    | created scratch variable $1 : int


    jshell> 9.0 * 6


    $2 ==> 54.0


    | created scratch variable $2 : double


    jshell>'
