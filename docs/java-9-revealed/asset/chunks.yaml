  raw: 'append additional bootstrap directories. You can specify a bootstrap class
    path using the -Xbootclasspath option, which will replace the default bootstrap
    class path. At runtime, the sun.boot.class.path system property contains the read-only
    value of the boot class path. The JDK represents this class loader by null.


    That is, you cannot get its reference. For example, the Object class is loaded
    by the bootstrap class loader and the expression Object.class.getClassLoader()
    will return null.


    The extension class loader is used to load classes available through the extension
    mechanism located in JARs in the directories specified by the java.ext.dirs system
    property. To get the reference of the extension class loader, you need to get
    the reference of the application class loader and use the getParent() method on
    that reference.


    The application class loader loads classes from the application class path specified
    by the CLASSPATH


    environment variable, or by the command-line option -cp or -classpath. The application
    class loader is also known as a *system class loader*, which is a kind of a misnomer
    that implies falsely that it loads system classes. You can get a reference to
    the application class loader using the static method named getSystemClassLoader()
    of the ClassLoader class.


    JDK 9 keeps the three-level hierarchical class loader architecture for backward
    compatibility. However, there are a few changes in the way they load classes from
    the module system. Figure [8-4](#index_split_003.html#189) shows the JDK 9


    class loader hierarchy.


    Bootstrap class loader


    Platform class loader


    Application class loader


    ***Figure 8-4.** Class loaders hierarchy in JDK 9*


    Notice that in JDK 9, the application class loader can delegate to the platform
    class loader as well as the bootstrap class loader; the platform class loader
    can delegate to bootstrap class loader the application class loader. The following
    text describes the workings of the JDK 9 class loaders in detail.


    In JDK 9, the bootstrap class loader is implemented in both library code and in
    the virtual machine.


    For backward compatibility, it is still represented by null in a program. For
    example, Object.class.


    getClassLoader() still returns null. However, not all Java SE platform and JDK
    modules are loaded by the bootstrap class loader. To name a few, modules loaded
    by the bootstrap class loader are java.base, java.logging, java.prefs, and java.desktop.
    Other Java SE platform and JDK modules are loaded by the 170


    Chapter 8 ■ Breaking Changes in JDk 9


    platform class loader and the application class loader, which are described next.
    Options to specify the boot class path, -Xbootclasspath, and -Xbootclasspath/p,
    and the system property, sun.boot.class.path, are no longer supported in JDK 9\.
    The -Xbootclasspath/a option is still supported and its value is stored in the
    system property called jdk.boot.class.path.append.


    JDK 9 no longer supports the extension mechanism. However, it retains the extension
    class loader under a new name called the *platform class loader*. The ClassLoader
    class contains a new static method named getPlatformClassLoader() that returns
    the reference to the platform class loader. Ta[ble 8-2](#index_split_003.html#190)


    contains the list of modules loaded by the platform class loader. The platform
    class loader serves another purpose. Classes loaded by the bootstrap class loader
    are granted all permissions by default. However, several classes do not need all
    permissions. Such classes have been de-privileged in JDK 9 and they are loaded
    by the platform class loader to improve security.


