    at runtime. You can use the jmod tool to work with JMOD files.


    **CHAPTER 7**


    **Creating Custom Runtime Images**


    In this chapter, you will learn:


    • What a custom runtime image and the JIMAGE format are


    • How to create a custom runtime image using the jlink tool


    • How to specify the command name to run the application stored in a custom image


    • How to use plugins with the jlink tool


    What Is a Custom Runtime Image?


    Before JDK 9, Java runtime image was available as a huge monolithic artifact—thus
    increasing the download time, startup time, and the memory footprint. The monolithic
    JRE made it impossible to use Java on devices with small memory. If you deploy
    your Java applications to a cloud, you pay for the memory you use; most often,
    the monolithic JRE uses more memory than required, thus making you pay more for
    the cloud service.


    The Compact profiles introduced in Java 8 took a step forward to reduce the JRE
    size—hence the runtime memory footprint—by allowing you to package a subset of
    the JRE in a custom runtime image called a *compact profile*.


    Java 9 took a holistic approach to packaging runtime images. All platform code
    has been modularized.


    Your application code is also packaged as modules. In Java 9, you can create a
    custom runtime that will contain your application modules and only those platform
    modules used by your application. You can also package native commands in your
    runtime image. Another benefit of creating a runtime image is that you have to
    ship only one bundle—the runtime image—to your application users who are not needed
    to download and install a separate bundle of JRE to run your application.


    The runtime image is stored in a special format called JIMAGE, which is optimized
    for space and speed.


    The JIMAGE format is supported only at runtime. It is a container format for storing
    and indexing modules, classes, and resources in the JDK. Searching and loading
    classes from a JIMAGE file is a lot faster than from JAR and JMOD files. The JIMAGE
    format is JDK-internal and developers will rarely need to interact with a JIMAGE
    file directly.


    The JIMAGE format is expected to evolve significantly over time and, therefore,
    its internals are not exposed to developers. JDK 9 ships with a tool called jimage,
    which can be used to explore JIMAGE files.


    I explain the tool in detail in a separate section in this chapter.


    ■ **Tip** You use the jlink tool to create a runtime image, which uses a new file
    format called JIMAGE to store modules. JDK 9 ships with the jimage tool to let
    you explore the contents of a JIMAGE file.


