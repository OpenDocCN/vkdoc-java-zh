    the publisher


    in the end. It calls the sleep() method that makes the current thread sleep for
    a


    randomly chosen duration between one and MAX_SLEEP_DURATION seconds.


    • Notice in the output that a few subscribers cancel their subscriptions because
    they


    receive the specified number of items from the publisher.


    Note that this program guarantees that all items will be published before it terminates,
    but does not guarantee that all subscribers will receive those items. In the output,
    you see that subscribers received all items published. This happened because the
    publisher waits for at least one second after publishing the last item, which
    gives the subscribers enough time, in this small program, to receive and process
    the last item.


    This program did not demonstrate backpressure in action because all subscribers
    used the push model by requesting items in one shot. You can modify the SimpleSubscriber
    class as an assignment to see backpressure in action:


    • Request for one item in the onSubscribe() method using the


    subscription.request(1) method.


    • In the onNext() method, request more items after a delay. The delay should make


    the subscriber work at the slower rate at which the publisher publishes items.


    Chapter 17 ■ reaCtive StreamS


    • You will need to either publish more than 256 items, which is the default buffer


    used by the publisher for each subscriber, or use a smaller buffer size using
    another


    constructor of the SubmissionPublisher class. This will force the publisher to
    have


    more items published than the subscribers can handle.


    • Subscribe the subscribers using a drop handler, so you can see when the publisher


    sees the backpressure.


    • Use the offer() method of the SubmissionPublisher class to publish items, so
    the


    publisher does not wait indefinitely when the subscribers cannot handle more items.


    Using Processors


    A processor is a subscriber and a publisher at the same time. To use a processor,
    you need a class that implements the Flow.Processor<T,R> interface, where T is
    the subscribed item type and R is the published item type. In this section, I
    create a simple processor that filters items based on a Predicate<T>. The processor
    subscribes to a publisher that publishes six integers—1, 2, 3, 4, 5, and 6\. A
    subscriber subscribes to the processor. The processor receives items from its
    publisher and republishes the same items if they pass the criterion specified
    by a Predicate<T>. Listing [17-6 con](#index_split_007.html#439)tains the code
    for the FilterProcessor<T> class whose instances act as processors.


    ***Listing 17-6.*** A Processor that Filters Items Based on a Predicate Before
    Republishing


    // FilterProcessor.java


    package com.jdojo.stream;


    import java.util.concurrent.Flow;


    import java.util.concurrent.Flow.Processor;


    import java.util.concurrent.SubmissionPublisher;


    import java.util.function.Predicate;


    public class FilterProcessor<T> extends SubmissionPublisher<T> implements Processor<T,T>{


    private Predicate<? super T> filter;


    public FilterProcessor(Predicate<? super T> filter) {


    this.filter = filter;


    }


    @Override


    public void onSubscribe(Flow.Subscription subscription) {


    // Request an unbounded number of items


    subscription.request(Long.MAX_VALUE);


    }


    @Override


    public void onNext(T item) {


    // If the item passes the filter publish it. Otherwise, no action is needed.


    System.out.println("Filter received: " + item);


    if (filter.test(item)) {


    this.submit(item);


    }


    }


