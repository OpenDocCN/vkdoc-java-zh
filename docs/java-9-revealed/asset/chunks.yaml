    \n## 使用 JAR 的清单属性\n\n可执行 JAR 是一种可以使用`-jar`选项直接运行 Java 应用程序的 JAR 文件，命令如下：`java\
    \ -jar myapp.jar`\n\n这里，`myapp.jar`被称为可执行 JAR。可执行 JAR 在其`MANIFEST.MF`文件中包含一个名为`Main-Class`的属性，其值是`java`命令应运行的主类的完全限定名称。回想一下，还有其他类型的\
    \ JAR，例如模块化 JAR 和多版本 JAR。JAR 属于哪种类型并不重要；可执行 JAR 仅根据使用`-jar`选项启动应用程序的方式定义。\n\n\
    考虑一个作为可执行 JAR 分发的现有应用程序。假设该应用程序使用深度反射来访问 JDK 内部 API。它在 JDK 8 中运行良好。您希望在 JDK 9\
    \ 上运行该可执行 JAR。\n\nJDK 9 中的 JDK 内部 API 已被封装。现在，您必须使用`--add-exports`和`--add-opens`命令行选项以及`-jar`选项来运行相同的可执行\
    \ JAR。在 JDK 9 中使用新的命令行选项提供了一种解决方案。然而，对于可执行 JAR 的最终用户来说，这有点不方便。为了使用 JDK 9，他们需要知道需要使用的新的命令行选项。为了简化此类迁移，JDK\
    \ 9 为可执行 JAR 的`MANIFEST.MF`文件添加了两个新属性：\n\n- `Add-Exports`\n- `Add-Opens`\n\n这些属性被添加到清单文件的主部分。它们对应于两个命令行选项：`--add-exports`和`--add-opens`。使用这些属性时有一个区别。\n\
    \n它们将模块的包导出和开放给所有未命名模块。因此，您需要指定源模块及其包的列表，而无需为目标模块指定值。换句话说，在清单文件中，您可以将包导出或开放给所有未命名模块，或者不导出/开放，但不能选择性地导出/开放给特定模块。这些属性的值是以空格分隔的、以斜杠分隔的`module-name/package-name`对列表。示例如下：\n\
    \n```\nAdd-Exports: m1/p1 m2/p2 m3/p3 m1/p1\n```\n\n此条目将把模块`m1`中的包`p1`、模块`m2`中的包`p2`以及模块`m2`中的包`p3`导出到所有未命名模块。解析清单文件的规则比较宽松，并且允许重复，因为历史上是允许的。请注意值中的重复条目`m1/p1`。在运行时，这些包将被导出到所有未命名模块。\n\
    \n## 第 9 章 ■ 打破模块封装\n\n让我们通过一个示例来讲解。我将示例保持简单，以便您可以专注于这些新属性的使用。`java.lang.Long`类包含一个名为`serialVersionUID`的私有静态字段，其声明如下：\n\
    \n```\nprivate static final long serialVersionUID = 4290774380558885855L;\n```\n\
    \n清单 [9-4](#index_split_003.html#227) 包含一个`TestManifestAttributes`类的代码，该类使用深度反射来访问`Long.serialVersionUID`字段。该类位于`com.jdojo.intruder`模块中。现有应用程序不使用模块，并且它们将使用\
    \ JDK 8 或更低版本开发。然而，对于此示例，这没有任何区别。\n\n**清单 9-4.** 一个名为 TestManifestAttributes 的类\n\
    \n```java\n// TestManifestAttributes.java\npackage com.jdojo.intruder;\n\nimport\
    \ java.lang.reflect.Field;\n\npublic class TestManifestAttributes {\n    public\
    \ static void main(String[] args) throws NoSuchFieldException,\n            IllegalArgumentException,\
    \ IllegalAccessException {\n        Class<Long> cls = Long.class;\n        Field\
    \ svUid = cls.getDeclaredField(\"serialVersionUID\");\n        svUid.setAccessible(true);\n\
    \        long svUidValue = (long)svUid.get(null);\n        System.out.println(\"\
    Long.serialVersionUID=\" + svUidValue);\n    }\n}\n```"
