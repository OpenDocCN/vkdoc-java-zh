- fmt: "在结果字符串中，两个连续的点被替换为一个点。此外，所有前导和尾随的点都被移除。在此示例中，名称部分没有任何非字母数字字符，因此模块名称为`com.jdojo.intro`。\n\
    \n按顺序应用这些规则，可以得到模块名称和模块版本。在本节末尾，我将展示如何使用 JAR 文件确定自动模块的名称。表 4-1 列出了一些 JAR 名称，以及为它们派生的自动模块名称和版本。请注意，该表在\
    \ JAR 文件名中未显示扩展名`.jar`。\n\n**表 4-1.** 自动模块名称和版本派生示例\n\n| JAR 名称 | 模块名称 | 模块版本\
    \ |\n| --- | --- | --- |\n| `com.jdojo.intro-1.0` | `com.jdojo.intro` | `1.0`\
    \ |\n| `junit-4.10.jar` | `junit` | `4.10` |\n| `jdojo-logging1.5.0` | （错误） |\
    \ （无版本） |\n| `spring-core-4.0.1.RELEASE` | `spring.core` | `4.0.1.RELEASE` |\n\
    | `jdojo-trans-api_1.5_spec-1.0.0` | （错误） | `1.0.0` |\n| `_` | （错误） | （无版本） |\n\
    \n让我们看看表中三个特殊情况，如果将 JAR 放在模块路径上，将会收到错误。第一个产生错误的 JAR 名称是`jdojo-logging1.5.0`。让我们应用规则来派生此\
    \ JAR 的自动模块名称：\n\n*   JAR 名称中没有紧跟数字的连字符，因此没有模块版本。整个 JAR 名称用于派生自动模块名称。\n*   所有非字母数字字符都被替换为一个点。结果字符串是`jdojo.logging1.5.0`。回顾第\
    \ 2 章，模块名称的每个部分都必须是有效的 Java 标识符。在这种情况下，`5`和`0`是模块名称中的两个部分，它们不是有效的 Java 标识符。因此，派生的模块名称无效。这就是将此\
    \ JAR 文件添加到模块路径时出错的原因。\n\n另一个产生错误的 JAR 名称是`jdojo-trans-api_1.5_spec-1.0.0`。让我们应用规则来派生此\
    \ JAR 的自动模块名称：\n\n*   它找到最后一个连字符，其后只有数字和点，并将 JAR 名称分成两部分：`jdojo-trans-api_1.5_spec`和`1.0.0`。第一部分用于派生模块名称。第二部分是模块版本。\n\
    *   名称部分中的所有非字母数字字符都被替换为一个点。结果字符串是`jdojo.trans.api.1.5.spec`，这是一个无效的模块名称，因为`1`和`5`不是有效的\
    \ Java 标识符。这就是将此 JAR 文件添加到模块路径时出错的原因。\n\n表中的最后一个条目包含一个下划线（`_`）作为 JAR 名称。也就是说，JAR\
    \ 文件被命名为`_.jar`。如果应用规则，下划线将被替换为一个点，并且该点将被移除，因为它是名称中唯一的字符。最终得到一个空字符串，这不是一个有效的模块名称。\n\
    \n如果无法从其名称派生有效的自动模块名称，则放置在模块路径上的 JAR 将抛出异常。例如，模块路径上的`_.jar`文件将导致以下异常：`java.lang.module.ResolutionException:\
    \ Unable to derive module descriptor for: _.jar`\n\n您可以使用带有`--describe-module`选项的`jar`命令来打印模块化\
    \ JAR 的模块描述符，并打印 JAR 的派生自动模块名称。对于 JAR，它还会打印 JAR 包含的包列表。使用该命令的一般语法如下：\n\n```\n\
    jar --describe-module --file <path-to-JAR>\n```\n\n以下命令打印名为`cglib-2.2.2.jar`的\
    \ JAR 的自动模块名称：\n\n```\nC:\\Java9Revealed>jar --describe-module --file lib\\cglib-2.2.2.jar\n\
    No module descriptor found. Derived automatic module.\nmodule cglib@2.2.2 (automatic)\n\
    requires mandated java.base\ncontains net.sf.cglib.beans\ncontains net.sf.cglib.core\n\
    contains net.sf.cglib.proxy\ncontains net.sf.cglib.reflect\ncontains net.sf.cglib.transform\n\
    contains net.sf.cglib.transform.impl\ncontains net.sf.cglib.util\n```\n\n该命令打印一条消息，表明在\
    \ JAR 文件中未找到模块描述符，并且它从 JAR 派生了一个自动模块。如果您使用一个名称无法转换为有效自动名称的 JAR（例如`cglib.1-2.2.2.jar`），`jar`命令将打印一条错误消息，并告诉您\
    \ JAR 名称有什么问题，如下所示：\n\n```\nC:\\Java9Revealed>jar --describe-module --file lib\\\
    cglib.1-2.2.2.jar\nUnable to derive module descriptor for: lib\\cglib.1-2.2.2.jar\n\
    cglib.1: Invalid module name: '1' is not a Java identifier\n```\n\n一旦您知道自动模块的名称，其他显式模块就可以使用`requires`语句读取它。以下模块声明读取来自模块路径上`cglib-2.2.2.jar`的名为`cglib`的自动模块：\n\
    \n```\nmodule com.jdojo.lib {\n    requires cglib;\n    //...\n}\n```\n\n为了有效使用自动模块，它必须导出包并读取其他模块。让我们看看关于此的规则：\n\
    \n*   自动模块读取所有其他模块。重要的是要注意，从自动模块到所有其他模块的可读性是在模块图解析之后添加的。\n*   自动模块中的所有包都被导出和打开。\n\
    \n这两个规则基于这样一个事实：没有实际的方法来判断自动模块依赖于哪些其他模块，以及其他模块需要自动模块的哪些包来进行深度反射编译。\n\n自动模块读取所有其他模块可能会创建循环依赖，这在模块图解析后是允许的。回想一下，在模块图解析期间不允许模块之间存在循环依赖。也就是说，您不能在模块声明中拥有循环依赖。\n\
    \n自动模块没有模块声明，因此它们不能声明对其他模块的依赖。显式模块可以声明对其他自动模块的依赖。让我们考虑一个情况，其中显式模块`M`读取自动模块`P`，并且模块`P`使用了另一个自动模块`Q`中的类型`T`。当您使用模块`M`中的主类启动应用程序时，模块图将仅包含`M`和`P`（为简洁起见，此处省略`java.base`模块的讨论）。解析过程将从模块`M`开始，并看到它读取了另一个模块`P`。解析过程没有实际的方法来判断模块`P`读取了模块`Q`。您可以通过将它们放在类路径上来编译模块`P`和`Q`。但是，当您运行此应用程序时，您将收到`ClassNotFoundException`。当模块`P`尝试访问模块`Q`中的类型时，会发生此异常。要解决此问题，必须通过使用`--add-modules`命令行选项并将`Q`指定为该选项的值，将模块`Q`作为根模块添加到模块图中。\n\
    \n以下命令描述了名为`cglib`的自动模块，其模块声明是通过将`cglib-2.2.2.jar`文件放置在模块路径上从该文件派生的。输出表明名为`cglib`的自动模块导出并打开了其所有包。\n\
    \n```\nC:\\Java9Revealed>java --module-path lib\\cglib-2.2.2.jar\n--list-modules\
    \ cglib\nautomatic module cglib@2.2.2 (file:///C:/Java9Revealed/lib/cglib-2.2.2.jar)\n\
    exports net.sf.cglib.beans\nexports net.sf.cglib.core\nexports net.sf.cglib.proxy\n\
    exports net.sf.cglib.reflect\nexports net.sf.cglib.transform\nexports net.sf.cglib.transform.impl\n\
    exports net.sf.cglib.util\nrequires mandated java.base\nopens net.sf.cglib.transform\n\
    opens net.sf.cglib.transform.impl\nopens net.sf.cglib.beans\nopens net.sf.cglib.util\n\
    opens net.sf.cglib.reflect\nopens net.sf.cglib.core\nopens net.sf.cglib.proxy\n\
    ```\n\n## 未命名模块"
