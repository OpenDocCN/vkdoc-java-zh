    \ JAR 会被视为一个模块，称为*自动模块*。“自动模块”这个名称源于以下事实：该模块是从 JAR 中自动定义的——你无需通过添加 `module-info.class`\
    \ 文件来显式声明模块。自动模块具有名称。自动模块的名称是什么？它读取哪些模块？导出哪些包？我将很快回答这些问题。\n\n自动模块也是具名模块。其名称和版本根据以下规则从\
