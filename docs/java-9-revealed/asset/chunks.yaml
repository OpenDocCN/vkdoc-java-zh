  raw: 'The JShell tool uses version 2 of JLine, which is a Java library for handling
    console input. The standard JDK compiler does not know how to parse and compile
    snippets of Java code. Therefore, the JShell implementation has its own parser
    that parses snippets and determines the type of snippets, for example, a method
    declaration, a variable declaration, etc. Once the snippet type is determined,
    the snippet is wrapped in a synthetic class using the following rules:


    • Import statements are used “as-is”. That is, all import statements are placed
    “as-is” at


    the top of the synthetic class.


    • Variables, methods, and class declarations become static members of a


    synthetic class.


    • Expressions and statements are wrapped in a synthetic method within a


    synthetic class.


    All synthetic classes belong to a package called REPL. Once snippets are wrapped,
    the wrapped source code is analyzed and compiled by standard Java compiler using
    the Compiler API. The compiler takes the wrapped source code in string format
    as input and compiles it into bytecode, which is stored in memory.


    The generated bytecode is sent over a socket to a remote process running a JVM
    for loading and execution.


    Sometimes, existing snippets loaded into the remote JVM need to be replaced by
    the JShell tool, which it accomplishes using the Java Debugger API.


    Chapter 11 ■ the Java Shell


    Starting the JShell Tool


    JDK 9 ships with a JShell tool, which is located in the JDK_HOME\bin directory.
    The tool is named jshell.


    If you installed JDK 9 in the C:\java9 directory on Windows, you will have an
    executable file named C:\java9\bin\jshell.exe, which is the JShell tool. To start
    the JShell tool, you need to open a command prompt and enter the jshell command:


    C:\Java9Revealed>jshell


    | Welcome to JShell -- Version 9-ea


    | For an introduction type: /help intro


    jshell>


    Entering the jshell command on the command prompt may give you an error:


    C:\Java9Revealed>jshell


    ''jshell'' is not recognized as an internal or external command,


    operable program or batch file.


    C:\Java9Revealed>


    This error indicates that the JDK_HOME\bin directory is not included in the PATH
    environment variable on your computer. I installed JDK 9 in the C:\java9 directory,
    so the JDK_HOME is C:\java9 for me. To fix this error, you either include the
    C:\java9\bin directory in the PATH environment variable or use the full path of
    the jshell command, which would be C:\java9\bin\jshell for me. The following sequence
    of commands show you how to set the PATH environment variable on Windows and run
    the JShell tool:


    C:\Java9Revealed>SET PATH=C:\java9\bin;%PATH%


    C:\Java9Revealed>jshell


    | Welcome to JShell -- Version 9-ea


    | For an introduction type: /help intro


