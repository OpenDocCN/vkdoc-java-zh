    Generic Time Zone Names


    JDK 8 had two letters, V and z, to format the time zone of the date and time.
    The letter V produces a zone ID such as "America/Los_Angeles; Z; -08:30" and the
    letter z produces a zone name such as Central Standard Time and CST.


    Chapter 20 ■ Other Changes in JDK 9


    JDK 9 added the lowercase letter v as a formatter symbol that produces generic
    non-location zone name such as Central Time or CT. The term “non-location” means
    that it does not identify an offset from UTC. It refers to the wall time—the time
    shown by the clock on the wall. For example, 8am Central time will have an offset
    of UTC-06 on March 1, 2017 and an offset of UTC-05 on March 19, 2017\. The generic
    non-location zone name does not specify the time zone offset. You can use it in
    two formats —v and vvvv—to produce the generic non-location zone name in short
    form (e.g. CT) and long form (e.g. Central Time), respectively. The following
