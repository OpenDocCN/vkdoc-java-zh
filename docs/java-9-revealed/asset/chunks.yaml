    如果你现有的代码期望资源以特定格式的 jar URL 存在，或者你手动编写了类似的 jar URL，那么使用多版本 JAR（MRJAR）时可能会得到出乎意料的结果。如果你正在用
    MRJAR 重新打包你的 JAR，你需要重新审视你的代码并对其进行修改，使其能与 MRJAR 兼容。


    多版本清单属性


    一个 MRJAR 在其 `MANIFEST.MF` 文件中包含一个特殊的属性条目：


    Multi-Release: true


    `Multi-Release` 属性是由 `jar` 工具为 MRJAR 添加的。如果该属性的值为 `true`，则表示该 JAR 是一个多版本 JAR。如果其值为
    `false` 或该属性缺失，则它不是多版本 JAR。该属性被添加到清单文件的主节中。


    在 `java.util.jar` 包中的 `Attributes.Name` 类里新增了一个名为 `MULTI_RELEASE` 的常量，用于表示清单文件中的新属性
    `Multi-Release`。因此，在 Java 代码中，`Attributes.Name.MULTI_RELEASE` 常量代表 `Multi-Release`
    属性的值。


    JMOD 格式


    JDK 9 引入了一种名为 JMOD 的新格式来打包模块。JMOD 文件旨在处理比 JAR 文件更多的内容类型。JMOD 文件可以打包本地代码、配置文件、本地命令以及其他类型的数据。在撰写本文时，JMOD
    格式基于 ZIP 格式，但未来将会发生变化。JDK 9 模块以 JMOD 格式打包，供你在编译时和链接时使用。JMOD 格式在运行时不受支持。你可以在 `JDK_HOME\jmods`
    目录中找到它们，其中 `JDK_HOME` 是你安装 JDK 9 的目录。你可以将自己的模块打包成 JMOD 格式。JMOD 格式的文件具有 `.jmod`
    扩展名。例如，名为 `java.base` 的平台模块被打包在 `java.base.jmod` 文件中。


    JMOD 文件可以包含本地代码，这在运行时动态提取和链接会有些棘手。这就是 JMOD 文件在编译时和链接时受支持，但在运行时不受支持的原因。


    使用 jmod 工具


    JDK 9 附带了一个名为 `jmod` 的新工具。它位于 `JDK_HOME\bin` 目录中。该工具可用于创建 JMOD 文件、列出 JMOD 文件的内容、打印模块的描述以及记录所用模块的哈希值。使用
    `jmod` 工具的一般语法如下：


    jmod <子命令> <选项> <jmod-文件>


    第 6 章 ■ 打包模块


    你必须将以下子命令之一与 `jmod` 命令一起使用：


    • create


    • extract


    • list


    • describe


    • hash


    `list` 和 `describe` 子命令不接受任何选项。`<jmod-文件>` 是你正在创建的 JMOD 文件，或者是你想要描述的现有 JMOD 文件。表
