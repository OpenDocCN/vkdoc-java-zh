    \ were:\n\n- Converting a `java.util.Date` to a `LocalDate`\n- Converting an `Instant`\
    \ to `LocalDate` and `LocalTime`\n\nJDK 9 added a static factory method, `ofInstant(Instant\
    \ instant, ZoneId zone)`, to the `LocalDate` and `LocalTime` classes to ease these\
    \ two types of conversions. JDK 8 already had this factory method in the `ZonedDateTime`,\
