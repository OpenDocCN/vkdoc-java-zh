    ## 导入语句


    你可以在`jshell`中使用导入语句。回想一下，在Java程序中，`java.lang`包中的所有类型都是默认导入的。要使用其他包中的类型，你需要在编译单元中添加相应的导入语句。我们先从一个例子开始。我将尝试创建三个对象：一个`String`、一个`List<Integer>`和一个`ZonedDateTime`。请注意，`String`类位于`java.lang`包中；`List`和`Integer`类分别位于`java.util`和`java.lang`包中；而`ZonedDateTime`类位于`java.time`包中。


    ```

    jshell> String str = new String("Hello")

    str ==> "Hello"


    jshell> List<Integer> nums = List.of(1, 2, 3, 4, 5)

    nums ==> [1, 2, 3, 4, 5]


    jshell> ZonedDateTime now = ZonedDateTime.now()

    | Error:

    | cannot find symbol

    | symbol: class ZonedDateTime

    | ZonedDateTime now = ZonedDateTime.now();

    | ^-----------^

    | Error:

    | cannot find symbol

    | symbol: variable ZonedDateTime

    | ZonedDateTime now = ZonedDateTime.now();

    | ^-----------^


    jshell>

    ```


    如果你尝试使用`java.time`包中的`ZonedDateTime`类，这些示例会产生错误。


    我们原本也期望在尝试创建`List`时会出现类似的错误，因为`List`位于`java.util`包中，而该包在Java程序中默认不会被导入。


    `JShell`工具的唯一目的是让开发者在评估代码片段时更轻松。为了实现这一目标，该工具默认会导入几个包中的所有类型。这些默认导入类型的包是哪些呢？你可以使用`/imports`命令打印`jshell`中所有活动导入的列表：


    ```

    jshell> /imports

    | import java.io.*

    | import java.math.*

    | import java.net.*

    | import java.nio.file.*

    | import java.util.*

    | import java.util.concurrent.*

    | import java.util.function.*

    | import java.util.prefs.*

    | import java.util.regex.*

    | import java.util.stream.*


    jshell>

    ```


    注意默认的导入语句，它导入了`java.util`包中的所有类型。这就是你可以创建列表而无需导入它的原因。你也可以向`jshell`添加自己的导入。以下示例展示了如何导入`ZonedDateTime`类并使用它。当`jshell`打印当前日期与时区的值时，你会得到不同的输出。


    ```

    jshell> /imports

    | import java.util.*

    | import java.io.*

    | import java.math.*

    | import java.net.*

    | import java.util.concurrent.*

    | import java.util.prefs.*

    | import java.util.regex.*


    jshell> import java.time.*


    jshell> /imports

    | import java.io.*

