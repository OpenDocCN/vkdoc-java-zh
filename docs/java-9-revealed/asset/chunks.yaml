    \ at runtime. Both the dynamically known modules may need deep reflective access\
    \ to the module being declared. In this case, the module’s author has to know\
    \ only about the module name of the abstract framework and open the package to\
    \ it. At runtime, the abstract framework’s module can open the same package to\
    \ the dynamically discovered implementation module. Think about JPA as an abstract\
    \ framework that defines a `java.persistence` module and discovers other JPA implementation\
    \ such as Hibernate and EclipseLink at runtime. In this case, the module’s author\
    \ can open a package only to the `java.persistence` module, which can open the\
    \ same package to Hibernate or EclipseLink modules at runtime.\n\nThe `addReads()`\
    \ method adds a readability edge from this module to the specified module. This\
    \ method has no effect if the specified module is itself because every module\
    \ can read itself or if it is called on an unnamed module because an unnamed module\
    \ can read all modules. Calling this method is the same as adding a `requires`\
    \ statement to the module declaration:\n\n```\nrequires <other>;\n```\n\nThe `addUses()`\
    \ method updates the module to add a service dependency, so it can use the `ServiceLoader`\
    \ class to load the service of the specified service type. It has no effect when\
    \ called on an unnamed or automatic module. Its effect is the same as adding the\
    \ following `uses` statement in the module’s declaration:\n\n```\nuses <serviceType>;\n\
    ```\n\nListing 10-4 contains the code for an `UpdateModule` class. It is in the\
    \ `com.jdojo.module.api` module as shown in Listing 10-1. Notice that the module\
    \ declaration does not contain a `uses` statement. The class contains a `findFirstService()`\
    \ method, which accepts a service type as an argument. It checks if the module\
    \ can load the service type. Recall that a module must contain a `uses` statement\
    \ with a specified service type to load that service type using the `ServiceLoader`\
    \ class. The method uses the `addUses()` method of the `Module` class to add a\
    \ `uses` statement for the service type if it was absent. In the end, the method\
    \ loads and returns the first service provider loaded.\n\n**Listing 10-4.** An\
    \ `UpdateModule` Class Showing How to Add a `uses` Statement to a Module Declaration\
    \ at Runtime\n\n```\n// UpdateModule.java\npackage com.jdojo.module.api;\n\nimport\
    \ java.util.ServiceLoader;\n\npublic class UpdateModule {\n    public static <T>\
    \ T findFirstService(Class<T> service) {\n        /* Before loading the service\
    \ providers, check if this module can use (or load) the\n           service. If\
    \ not, update the module to use the service.\n        */\n        Module m = UpdateModule.class.getModule();\n\
    \        if (!m.canUse(service)) {\n            m.addUses(service);\n        }\n\
    \        return ServiceLoader.load(service)\n                .findFirst()\n  \
    \              .orElseThrow(\n                    () -> new RuntimeException(\"\
    No service provider found for the service: \" +\n                            \
    \                   service.getName()));\n    }\n}\n```\n\nNow we’ll test the\
    \ `findFirstService()` method of the `UpdateModule` class. Listing 10-5 contains\
    \ the declaration for a module named `com.jdojo.module.api.test`. It declares\
    \ a dependency on the `com.jdojo.prime` module, so it can use the `PrimeChecker`\
    \ service type interface. It declares a dependency on the `com.jdojo.module.api`\
    \ module, so it can use the `UpdateModule` class to load the service. You will\
    \ need to add these two modules to the module path of the `com.jdojo.module.api.test`\
    \ module in NetBeans.\n\n**Listing 10-5.** The Declaration of a Module Named `com.jdojo.module.api.test`\n\
    \n```\n// module-info.java\nmodule com.jdojo.module.api.test {\n    requires com.jdojo.prime;\n\
    \    requires com.jdojo.module.api;\n}\n```\n\nListing 10-6 contains the code\
    \ for a `Main` class in the `com.jdojo.module.api.test` module.\n\n**Listing 10-6.**\
