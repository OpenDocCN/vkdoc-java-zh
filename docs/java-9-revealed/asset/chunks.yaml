- fmt: "# The New HTTP/2 Client API\n\nThe new API consists of fewer than 20 types,\
    \ four of which are the main types. Other types are used while you are using one\
    \ of these four types. The new API also uses a few types from the old API. The\
    \ new API is in the `jdk.incubator.http` package in the `jdk.incubator.httpclient`\
    \ module. The main types are three abstract classes and one interface:\n\n- The\
    \ `HttpClient` class\n- The `HttpRequest` class\n- The `HttpResponse` class\n\
    - The `WebSocket` interface\n\nAn instance of the `HttpClient` class is a container\
    \ for storing configurations that can be used for multiple HTTP requests instead\
    \ of setting them separately for each. An instance of the `HttpRequest` class\
    \ represents an HTTP request that can be sent to a server. An instance of the\
    \ `HttpResponse` class represents an HTTP response. An instance of the `WebSocket`\
    \ interface represents a WebSocket client. You can create a WebSocket server using\
    \ the Java EE 7 WebSocket API. I show you an example of creating WebSocket client\
    \ and server at the end of this chapter.\n\nInstances of `HttpClient`, `HttpRequest`,\
    \ and `WebSocket` are created using builders. Each type contains a nested class/interface\
    \ named `Builder` that is used to build an instance of that type. Note that you\
    \ do not create an `HttpResponse`; it is returned to you as part of an HTTP request\
    \ that you make.\n\nThe new HTTP/2 Client API is so simple to use that you can\
    \ read an HTTP resource in just one statement! The following snippet of code reads\
    \ the contents at the URL `https://www.google.com/` as a string using a GET HTTP\
    \ request:\n\n```\nString responseBody = HttpClient.newHttpClient()\n    .send(HttpRequest.newBuilder(new\
    \ URI(\"https://www.google.com/\"))\n        .GET()\n        .build(), BodyHandler.asString())\n\
    \    .body();\n```\n\n## Typical Steps in Processing HTTP Requests\n\n- Create\
    \ an HTTP client object to store HTTP configuration information.\n- Create an\
    \ HTTP request object and populate it with information to be sent to the server.\n\
    - Send the HTTP request to the server.\n- Receive an HTTP response object as a\
    \ response from the server.\n- Process the HTTP response.\n\n## Setting Up Examples\n\
    \nI use many examples in this chapter that involve interacting with a web server.\
    \ Instead of using a web application deployed on the Internet, I created a web\
    \ application project in NetBeans that you can deploy locally. If you prefer using\
    \ another web application, you need to change the URLs used in the examples.\n\
    \nThe NetBeans web application is located in the `webapp` directory of the book's\
    \ source code. I tested the examples by deploying the web application on the GlassFish\
    \ server 4.1.1 and Tomcat 8/9. You can download the NetBeans IDE with the GlassFish\
    \ server from `https://netbeans.org/`. I ran the HTTP listener in the GlassFish\
    \ server at port 8080. If you run it on a different port, you need to change the\
    \ port number in the example URLs.\n\nAll this chapter's HTTP client programs\
    \ are located in the `com.jdojo.http.client` directory in the book's source code.\
    \ They are in the `com.jdojo.http.client` module whose declaration is shown in\
    \ Listing 14-1.\n\n***Listing 14-1.*** The Module Declaration for a Module Named\
    \ `com.jdojo.http.client`\n\n```\n// module-info.java\nmodule com.jdojo.http.client\
    \ {\n    requires jdk.incubator.httpclient;\n}\n```\n\n## Creating HTTP Clients\n\
    \nAn HTTP request that is sent to a server needs to be configured so that the\
    \ server knows which authenticator to use, the SSL configuration details, the\
    \ cookie manager to be used, proxy information, the redirect policy if the server\
    \ redirects the request, etc. An instance of the `HttpClient` class stores these\
    \ request-specific configurations, and they can be reused for multiple requests.\
    \ You can override a few of these configurations on a per-request basis. When\
    \ you send an HTTP request, you need to specify the `HttpClient` object that will\
    \ supply the configuration information for the request. An `HttpClient` holds\
    \ the following pieces of information that are used for all HTTP requests: an\
    \ authenticator, a cookie manager, an executor, a redirect policy, a request priority,\
    \ a proxy selector, an SSL context, SSL parameters, and an HTTP version.\n\nAn\
    \ *authenticator* is an instance of the `java.net.Authenticator` class. It is\
    \ used for HTTP authentication. The default is to use no authenticator.\n\nA *cookie\
    \ manager* is used to manage HTTP cookies. It is an instance of the `java.net.CookieManager`\
    \ class. The default is to use no cookie manager.\n\nAn *executor* is an instance\
    \ of the `java.util.concurrent.Executor` interface, which is used to send and\
    \ receive asynchronous HTTP requests and responses. A default executor is provided,\
    \ if it is not specified.\n\nA *redirect policy* is one of the constants of the\
    \ `HttpClient.Redirect` enum that specifies how to handle redirects issued by\
    \ the server. The default is `NEVER`, which means the redirects issued by the\
    \ server are never followed.\n\nA *request priority* is the default priority for\
    \ HTTP/2 requests, which can be between 1 and 256 (inclusive). It is a hint for\
    \ the server to prioritize the request processing. A higher value means a higher\
