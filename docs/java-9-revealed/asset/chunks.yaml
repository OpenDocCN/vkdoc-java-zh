    beginning of the stream that are equal to or less than the specified count. One
    of these methods drops elements from the beginning and another takes elements
    from the beginning dropping the remaining. Both work based on the number of elements.
    The dropWhile() and takeWhile() methods are like skip() and limit() methods, respectively;
    however, the new methods work on a Predicate rather than number of elements.


    © Kishori Sharan 2017


    K. Sharan, *Java 9 Revealed*, DOI 10.1007/978-1-4842-2592-9_18


    Chapter 18 ■ StreamS apI UpdateS


    You can think of these methods as similar to the filter() method with an exception.
    The filter() method evaluates the predicate on all elements, whereas the dropWhile()
    and takeWhile() methods evaluate the predicate on elements from the beginning
    of the stream until the predicate fails.


    For an ordered stream, the dropWhile() method returns the elements of the stream,
    discarding the elements from the beginning for which the specified predicate is
    true. Consider the following ordered stream of integers:


    1, 2, 3, 4, 5, 6, 7


    If you use a predicate in the dropWhile() method that returns true for an integer
    less than 5, the method will drop the first four elements and return the rest:


    5, 6, 7


    For an unordered stream, the behavior of the dropWhile() method is non-deterministic.
    It may choose to drop any subset of elements matching the predicate. The current
    implementation drops the matching elements from the beginning until it finds a
    non-matching element.


    There are two extreme cases of the dropWhile() method. If the first element does
    not match the predicate, the method returns the original stream. If all elements
    match the predicate, the method returns an empty stream.


    The takeWhile() method works the same way as the dropWhile() method, except that
    it returns the matching elements from the beginning of the stream and discards
    the rest.


    ■ **Tip** Use the dropWhile() and takeWhile() methods with ordered, parallel streams
    with great care because you may see a performance hit. In an ordered, parallel
    stream, elements must be ordered and returned from all threads before these methods
    can return. these methods perform best with sequential streams.


    The ofNullable(T t) method returns a stream of a single element containing the
    specified element if the element is non-null. If the specified element is null,
    it returns an empty stream. This method is helpful while using the flatMap() method
    in stream processing. Consider the following map whose values may be null: Map<Integer,
    String> map = new HashMap<>();


    map.put(1, "One");


    map.put(2, "Two");


    map.put(3, null);


    map.put(4, "four");


