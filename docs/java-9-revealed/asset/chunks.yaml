- fmt: "# 关于弃用警告的回顾\n\n回顾一下，弃用警告是编译时警告。如果你的已部署应用程序的编译代码开始使用一个通常被弃用的API，或者因为一个曾经有效的API已被最终弃用并移除而导致运行时错误，你将不会收到任何警告。在JDK\
    \ 9之前，当你升级JDK或其他库/框架时，必须重新编译源代码才能看到弃用警告。JDK 9通过提供一个名为`jdeprscan`的*静态*分析工具改善了这种情况，该工具可用于扫描编译后的代码，以查看正在使用的弃用API列表。目前，该工具仅报告对弃用JDK\
    \ API的使用。如果你的编译代码使用了来自其他库（例如Spring或Hibernate）或你自己的库中的弃用API，此工具将不会报告这些使用情况。\n\n\
    `jdeprscan`工具位于`JDK_HOME\\bin`目录中。使用该工具的一般语法如下：`jdeprscan [options] {dir|jar|class}`\n\
