    JDK 9 对 Javadoc 的编写、生成和使用方式引入了一些增强功能。JDK 9 在 Javadoc 中支持 HTML5。默认情况下，javadoc 工具仍会生成
    HTML4 格式的输出。该工具新增了一个 `-html5` 选项，用于指示你想要生成 HTML5 格式的输出：


    javadoc -html5 <其他选项>


    javadoc 工具位于 `JDK_HOME\bin` 目录中。使用 `--help` 选项运行该工具会打印其用法说明和所有选项。对 javadoc 工具的完整讨论超出了本书的范围。


    NetBeans IDE 允许你为项目生成 Javadoc。在项目的“属性”对话框中，选择 **构建 ➤ 文档** 以获取 Javadoc 属性表，你可以在其中指定
    javadoc 工具的所有选项。要生成 Javadoc，请从项目右键菜单选项中选择 **生成 Javadoc**。


    JDK 9 保留了三框架或无框架的 Javadoc 布局。左上角框架包含三个链接：**所有类**、**所有包** 和 **所有模块**。**所有模块** 链接是在
    JDK 9 中新增的，它会显示所有模块的列表。**所有类** 链接允许你在左下角框架中查看所有类。另外两个链接允许你查看所有包、模块中的所有包以及所有模块。图
    20-1 展示了 Javadoc 页面的变化。


    ***图 20-1.** 三框架布局下的 Java SE 9 Javadoc*


