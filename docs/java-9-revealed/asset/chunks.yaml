    总结


    Java shell，在 JDK 9 中称为 JShell，是一个命令行工具，提供了一种交互式访问 Java 编程语言的方式。它允许你评估 Java 代码片段，而无需强制你编写整个
    Java 程序。它是 Java 的 REPL。JShell 也是一个 API，为其他工具（如 IDE）提供对 Java 代码 REPL 功能的编程访问。


    你可以通过运行存储在 JDK_HOME\bin 目录中的 jshell 程序来启动 JShell 命令行工具。该工具支持执行代码片段和命令。代码片段是 Java
    代码的片段。当代码片段被评估/执行时，JShell 会维护其状态。它还会跟踪所有已输入代码片段的状态。你可以使用命令来查询 JShell 状态并配置 jshell
    环境。


    为了区分命令和代码片段，所有命令都以斜杠（/）开头。


    JShell 包含多项功能，可提高开发人员的工作效率并提供更好的用户体验，例如代码自动补全和在工具内显示 Javadoc。JShell 尝试使用 JDK 中已有的功能，例如编译器
    API 来解析、分析和编译代码片段，以及 Java 调试器 API 来用新代码片段替换 JVM 中的现有代码片段。JShell 的设计使得无需对 JShell
    工具本身进行任何更改或进行少量更改，即可使用 Java 语言中的新结构。


    **第 12 章**


    **进程 API 更新**


    在本章中，你将学习：


    • 什么是进程 API


    • 如何创建原生进程


    • 如何获取新进程的信息


    • 如何获取当前进程的信息


    • 如何获取所有系统进程的信息


    • 如何设置创建、查询和管理原生进程的权限


    什么是进程 API？


    进程 API 由一些类和接口组成，允许你处理原生进程。使用该 API，你可以：


    • 从 Java 代码创建新的原生进程


    • 获取原生进程的进程句柄，无论它们是由 Java 代码还是其他方式创建的


    • 销毁正在运行的进程


    • 查询进程的活动状态及其其他属性


    • 获取进程的子进程列表和父进程


    • 获取原生进程的进程 ID (PID)


    • 获取新创建进程的输入、输出和错误流


    • 等待进程终止


    • 在进程终止时执行任务


    进程 API 包含 java.lang 包中的以下类和接口：


    • Runtime


    • ProcessBuilder


    • ProcessBuilder.Redirect


    © Kishori Sharan 2017


    K. Sharan, *Java 9 揭密*, DOI 10.1007/978-1-4842-2592-9_12


    第 12 章 ■ 进程 API 更新


    • Process


    • ProcessHandle


    • ProcessHandle.Info


    自 Java 1.0 起就支持处理原生进程。Process 类的实例表示由 Java 程序创建的原生进程。通过调用 Runtime 类的 exec() 方法来启动进程。


    JDK 5.0 添加了另一个名为 ProcessBuilder 的类，JDK 7.0 添加了一个名为 ProcessBuilder.Redirect 的嵌套类。ProcessBuilder
    类的实例保存一组进程属性。调用其 start() 方法会启动一个原生进程，并返回一个表示该原生进程的 Process 类实例。你可以多次调用其 start()
    方法；每次调用，它都会使用 ProcessBuilder 实例中保存的属性启动一个新进程。在 Java 5.0 中，ProcessBuilder 类接管了
    Runtime.exec() 方法启动新进程的工作。


    在 Java 7 和 Java 8 中，进程 API 进行了一些改进，为 Process 和 ProcessBuilder 类添加了一些方法。


    在 Java 9 之前，进程 API 仍然缺乏对处理原生进程的基本支持，例如获取进程的 PID 和所有者、进程的启动时间、进程已使用的 CPU 时间、当前正在运行的原生进程数量等。请注意，在
    Java 9 之前，你可以启动原生进程并处理它们的输入、输出和错误流。但是，你无法处理未启动的原生进程，也无法查询进程的详细信息。为了更紧密地处理原生进程，Java
    开发人员不得不使用 Java 本地接口 (JNI) 编写本地代码。Java 9 提供了这些处理原生进程所急需的功能。


    Java 9 向进程 API 添加了一个名为 ProcessHandle 的接口。ProcessHandle 接口的实例标识一个原生进程；它允许你查询进程状态和管理进程。


    比较 Process 类和 ProcessHandle 接口。Process 类的实例表示由当前 Java 程序启动的原生进程，而 ProcessHandle
    接口的实例表示一个原生进程，无论它是由当前 Java 程序还是其他方式启动的。在 Java 9 中，Process 类添加了几个方法，这些方法在新的 ProcessHandle
    接口中也可用。Process 类包含一个 toHandle() 方法，该方法返回一个 ProcessHandle。


    ProcessHandle.Info 接口的实例表示进程属性的快照。请注意，不同操作系统对进程的实现方式不同，因此它们的属性也各不相同。进程的状态可能随时改变，例如，每当进程获得更多
    CPU 时间时，其使用的 CPU 时间就会增加。要获取进程的最新信息，你需要在需要时使用 ProcessHandle 接口的 info() 方法，该方法将返回一个新的
    ProcessHandle.Info 接口实例。


    本章中的所有示例均在 Windows 10 上运行。当你使用 Windows 10 或其他操作系统在自己的机器上运行这些程序时，可能会得到不同的输出。


    当前进程


    ProcessHandle 接口的 current() 静态方法返回当前进程的句柄。请注意，此方法返回的当前进程始终是正在执行代码的 Java 进程。


    // 获取当前进程的句柄


    ProcessHandle current = ProcessHandle.current();


    一旦获得当前进程的句柄，就可以使用 ProcessHandle 接口的方法来获取有关该进程的详细信息。有关如何获取当前进程信息的示例，请参阅下一节。


    第 12 章 ■ 进程 API 更新


    ■ **提示** 你不能杀死当前进程。尝试使用 ProcessHandle 接口的 destroy() 或 destroyForcibly() 方法杀死当前进程会导致
    IllegalStateException。


    查询进程状态

