    ## Chapter 1: Introduction


    In this chapter, you will learn:


    - What’s included in JDK 9

    - How to read this book

    - System requirements to use the examples in this book

    - How to install NetBeans

    - How to download and use the supplied source code for the examples in this book


    ### Introduction to JDK 9


    JDK is the ninth major release of the Java Development Kit and is scheduled to
    be released in late July 2017. It comes with several exciting new features. This
    book covers the features that are useful to Java application developers in their
    daily programing life. You can find a complete list of all the features at `http://openjdk.java.net/projects/jdk9/`.


    One of the most important and most exciting features of JDK 9 is the *module system*,
    which was developed under a project with the code name *Jigsaw*. JDK designers
    had been trying to introduce the module system to the Java platform for over 10
    years. It was planned to be part of a few previous JDK releases and was later
    dropped. Jigsaw also delayed the JDK 9 release several times. Jigsaw is being
    released now and you will be able to see it in action.


    What was so difficult about Jigsaw that it took so many years to complete? The
    main goal of Jigsaw was to provide Java developers a way to develop applications
    in terms of software components called *modules*. A module can export its API
    for public use and encapsulate its internals. A module can also declare dependency
    on other modules and these dependencies can be verified at startup, thus avoiding
    runtime surprises related to missing types. The JDK itself is broken into a set
    of interacting modules. This provides a scalable runtime. If your application
    uses a subset of the JDK, you now can create a runtime image that contains JDK
    modules used in your application and your application modules. All these features
    of the module system seem normal. The main issue that had been haunting JDK designers
    was the backward compatibility and migration and adaptation path for the module
    system. Java has been around for over 20 years. Any big feature, including the
    module system, must be easily adoptable. After several iterations of redesigns
    and refinements based on feedback from the Java community, finally it is here!
    I devote nine chapters (Chapters 2 through 10), which is over 40% of the book,
    to describing the module system.


    Another significant addition to JDK 9 is `JShell`, which is a REPL (Read-Eval-Print
    Loop) for Java. `JShell` is a command-line tool and an API, and it allows you
    to execute a snippet of code and get immediate feedback. Before `JShell`, you
    had to write a complete program, compile it, and run it to get feedback. `JShell`
    is a tool that you will use in your daily development and you might wonder how
    you programmed in Java for so many years without it. `JShell` is vital for beginners
    and can help them quickly learn the Java language without understanding the details
    of the program structure such as modules and packages. I devote Chapter 11 to
    discussing `JShell`.


    There are several other additions to JDK 9 that will make your life easier as
    a developer. To name a few, they are the `Reactive Streams API`, collection factory
    methods, the incubating `HTTP/2 Client API`, the `Stack-Walking API`, the `Platform
    Logging API`, and unified JVM logging. I cover these topics extensively in this
    book.


    ### How to Read This Book


    This book consists of 20 chapters. Chapters 2 through 10 cover only one topic,
    which is the module system. They are designed to be read sequentially. It is true
    that you may be able to migrate your existing application to JDK 9 without knowing
    anything about the module system. However, if you want to take advantage of the
    benefits provided by JDK 9, you must learn the module system and start using it
    to develop new Java applications and migrate legacy ones to JDK 9. Chapters 11
    through 20 can be read in any order.'
