    The Person class is in the com.jdojo.person module and it uses a field of the
    Address type, which is in the com.jdojo.address module. This means that the com.jdojo.person
    module reads the com.jdojo.


    address module. This is indicated by the requires statement in the com.jdojo.person
    module declaration:


    // Read the com.jdojo.address module


    requires com.jdojo.address;


    A requires statement is used to specify a module’s dependency to another module.
    If a module reads another module, the first module needs to have a requires statement
    in its declaration. The general syntax for the requires statement is as follows:


    requires [transitive] [static] <module>;


    Here, the <module> is the name of the module that the current module reads. Both
    transitive and static modifiers are optional. If the static modifier is present,
    the <module> module is mandatory at compile-time, but optional at runtime. The
    presence of the transitive modifier implies that a module that reads the current
    module implicitly reads the <module> module. I cover an example of using the transitive
    modifier in a requires statement shortly.


    Every module implicitly reads the java.base module. The compiler adds a requires
    statement to reads the java.base module to a module declaration if the declaration
    does not already read the java.base module. The following two module declarations
    for a module named com.jdojo.common are the same:


    // Declaration #1


    module com.jdojo.common {


    // Compiler will add a read to the java.base module


    }


    // Declaration #2


    module com.jdojo.common {


    // Add a read to the java.base module explicitly


    requires java.base;


    }


