- fmt: "# Process API 更新\n\n进程的正常终止允许进程干净地结束。进程的强制终止会立即终止进程。进程是否支持正常终止是依赖于实现的。你可以使用`ProcessHandle`接口和`Process`类的`supportsNormalTermination()`方法来检查进程是否支持正常终止。如果进程支持正常终止，该方法返回`true`，否则返回`false`。\n\
    \n调用这些方法中的任何一个来终止一个已经终止的进程都不会产生任何操作。当进程终止时，`Process`类的`onExit()`返回的`CompletableFuture<Process>`和`ProcessHandle`接口的`onExit()`返回的`CompletableFuture<ProcessHandle>`会完成。\n\
    \n## 管理进程权限\n\n在前面的章节中运行示例时，我假设没有安装Java安全管理器。如果安装了安全管理器，则需要授予适当的权限来启动、管理和查询本地进程：\n\
    \n- 如果你正在创建一个新进程，你需要拥有`FilePermission(cmd,\"execute\")`权限，其中`cmd`是创建进程的命令的绝对路径。如果`cmd`不是绝对路径，你需要拥有`FilePermission(\"\
    <<ALL FILES>>\",\"execute\")`权限。\n- 要使用`ProcessHandle`接口中的方法查询本地进程的状态并销毁进程，应用程序需要拥有`RuntimePermission(\"\
    manageProcess\")`权限。\n\n清单[12-6](#index_split_005.html#346)包含一个程序，该程序获取进程计数并创建一个新进程。它在没有安全管理器和有安全管理器的情况下重复这两项任务。\n\
    \n***清单 12-6.*** 使用安全管理器管理进程\n\n```\n// ManageProcessPermission.java\npackage\
    \ com.jdojo.process.api;\n\nimport java.util.concurrent.ExecutionException;\n\n\
    public class ManageProcessPermission {\n    public static void main(String[] args)\
    \ {\n        // 获取进程计数\n        long count = ProcessHandle.allProcesses().count();\n\
    \        System.out.printf(\"Process Count: %d%n\", count);\n\n        // 启动一个新进程\n\
    \        Process p = Job.startProcess(1, 3);\n        try {\n            p.toHandle().onExit().get();\n\
    \        } catch (InterruptedException | ExecutionException e) {\n           \
    \ System.out.println(e.getMessage());\n        }\n\n        // 安装安全管理器\n     \
    \   SecurityManager sm = System.getSecurityManager();\n        if(sm == null)\
    \ {\n            System.setSecurityManager(new SecurityManager());\n         \
    \   System.out.println(\"A security manager is installed.\");\n        }\n\n \
    \       // 获取进程计数\n        try {\n            count = ProcessHandle.allProcesses().count();\n\
    \            System.out.printf(\"Process Count: %d%n\", count);\n        } catch(RuntimeException\
    \ e) {\n            System.out.println(\"Could not get a \" +\n              \
    \  \"process count: \" + e.getMessage());\n        }\n\n        // 启动一个新进程\n \
    \       try {\n            p = Job.startProcess(1, 3);\n            p.toHandle().onExit().get();\n\
    \        } catch (InterruptedException | ExecutionException |\n              \
    \   RuntimeException e) {\n            System.out.println(\"Could not start a\
    \ new \" +\n                \"process: \" + e.getMessage());\n        }\n    }\n\
    }\n```\n\n尝试使用以下命令运行`ManageProcessPermission`类，假设你没有更改任何Java策略文件：\n\n```\nC:\\\
    Java9Revealed>java --module-path\nC:\\Java9Revealed\\com.jdojo.process.api\\build\\\
    classes --module\ncom.jdojo.process.api/com.jdojo.process.api.ManageProcessPermission\n\
    \nProcess Count: 126\nCommand used:\nC:\\java9\\bin\\java.exe --module-path\n\
    C:\\Java9Revealed\\com.jdojo.process.api\\build\\classes --module\ncom.jdojo.process.api/com.jdojo.process.api.Job\
    \ 1 3\nJob (pid=6320) info: Sleep Interval=1 seconds, Sleep Duration=3 seconds.\n\
    Job (pid=6320) is going to sleep for 1 seconds.\nJob (pid=6320) is going to sleep\
    \ for 1 seconds.\nJob (pid=6320) is going to sleep for 1 seconds.\nA security\
    \ manager is installed.\nCould not get a process count: access denied (\"java.lang.RuntimePermission\"\
    \ \"manageProcess\")\nCould not start a new process: access denied (\"java.lang.RuntimePermission\"\
    \ \"manageProcess\")\n```\n\n你可能会得到不同的输出。输出表明，在安装安全管理器之前，你能够获取进程计数并创建新进程。安装安全管理器后，Java运行时在请求进程计数和创建新进程时抛出异常。要解决此问题，你需要授予以下四个权限：\n\
    \n- `\"manageProcess\"`的`RuntimePermission`，这将允许应用程序查询本地进程并创建新进程。\n- Java命令路径上的`\"\
    execute\"`的`FilePermission`，这将允许启动JVM。\n- `\"jdk.module.path\"`和`\"java.class.path\"\
    `系统属性的`\"read\"`的`PropertyPermission`，以便`Job`类在构建启动JVM的命令行时可以读取这些属性。\n\n清单[12-7](#index_split_005.html#348)包含一个脚本，用于向所有代码授予这四个权限。你需要将此脚本添加到机器上的`JDK_HOME\\\
    conf\\security\\java.policy`文件中。Java启动器的路径是`C:\\\\java9\\\\bin\\\\java.exe`，并且仅当你在`C:\\\
    java9`目录中安装了JDK 9时，此路径在Windows上才有效。对于所有其他平台和JDK安装，请修改此路径以指向你机器上正确的Java启动器。\n\n\
    ***清单 12-7.*** 对`JDK_HOME\\conf\\security\\java.policy`文件的补充\n\n```\ngrant {\n\
    \    permission java.lang.RuntimePermission \"manageProcess\";\n    permission\
    \ java.io.FilePermission \"C:\\\\java9\\\\bin\\\\java.exe\", \"execute\";\n  \
    \  permission java.util.PropertyPermission \"jdk.module.path\", \"read\";\n  \
    \  permission java.util.PropertyPermission \"java.class.path\", \"read\";\n};\n\
    ```\n\n如果你使用相同的命令再次运行`ManageProcessPermission`类，你应该会得到类似于以下的输出：\n\n```\nProcess\
    \ Count: 133\nCommand used:\nC:\\java9\\bin\\java.exe --module-path\nC:\\Java9Revealed\\\
