    \n接下来，我们将通过一个完整示例来演示如何创建自定义层，以及如何在同一个应用程序的两个层中加载同一模块的两个版本。\n\n模块名称为`com.jdojo.layer`，它包含一个名为`com.jdojo.layer`的包，该包中只有一个名为`LayerInfo`的类。你将拥有同一模块的两个版本，因此所有内容都将重复。我在源代码中创建了两个NetBeans项目，名称分别为`com.jdojo.layer.v1`和`com.jdojo.layer.v2`。\n\
    \n**清单 10-13** 和 **清单 10-14** 分别包含了`com.jdojo.layer`模块的 1.0 版模块定义和`LayerInfo`类的类声明。\n\
    \n***清单 10-13.*** `com.jdojo.layer`模块的 1.0 版\n\n```\n// module-info.com version\
