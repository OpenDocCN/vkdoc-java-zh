    使用模块层


    使用模块层是一个高级主题。典型的 Java 开发者通常不需要直接使用模块层。现有应用程序不会使用模块层。如果你将应用程序迁移到 JDK 9，或使用 JDK
    9 开发新应用程序，无论你是否愿意，你至少会使用一个模块层，该层由 JVM 在启动时创建。通常，使用插件或容器架构的应用程序会使用模块层。在本节中，我将通过一个简单示例简要介绍模块层。在本书的剩余部分，我将互换使用术语“模块层”和“层”。


    *层*是一组已解析的模块（一个模块图），并带有一个函数，该函数将每个模块映射到一个负责加载该模块中所有类型的类加载器。这组已解析的模块称为一个*配置*。你可以这样理解模块、类加载器、配置和层之间的关系：


    配置 = 一个模块图


    模块层 = 配置 + (模块 -> 类加载器)


    模块被组织成层。层按层次结构排列。除了*空层*之外，每个层至少有一个父层。空层，顾名思义，不包含任何模块，其主要作用是作为*启动层*的父层。启动层由 JVM
    在启动时通过解析应用程序的初始模块（根模块）与一组可观察模块来创建。在 JDK 9 中，使用类加载器加载类型的方式没有改变。类加载器通常使用父优先委托模型，在该模型中，加载类型的请求被委托给父加载器，父加载器再委托给其父加载器，直到引导类加载器。如果所有父加载器都无法加载该类型，则最初接收请求的类加载器会加载它。图
    10-1 展示了一个模块、类加载器和层如何组织的示例。


