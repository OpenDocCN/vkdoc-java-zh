    JDK 9 改变了 JDK 和 JRE 安装的目录布局。现在，JDK 和 JRE 安装之间没有区别，唯一的区别是 JDK 安装包含开发者工具以及一份 JRE
    所不包含的、JMOD 格式的平台模块副本。你可以使用 `jlink` 工具构建自己的 JRE，并且它可以包含 JRE 中你需要的任何 JDK 部分。


    在 Java SE 9 之前，你可以使用“认可标准覆盖机制”来使用实现认可标准或独立 API 的类与接口的更新版本。这些包括 `javax.rmi.CORBA`
    包和用于 XML 处理的 Java API (JAXP)，它们是在 Java 社区流程之外创建的。Java SE 9 仍然支持此机制。在 Java SE 9
    中，你需要使用 `--upgrade-module-path` 命令行选项。该选项的值是一个目录列表，其中包含用于认可标准和独立 API 的模块。


    版本 9 之前的 Java SE 允许一种扩展机制，通过该机制，你可以将 JAR 文件放置在由系统属性 `java.ext.dirs` 指定的目录中，从而扩展运行时映像。如果未设置此系统属性，则默认使用
    `jre\lib\ext` 目录。Java SE 9 不支持扩展机制。如果你需要类似的功能，可以将这些 JAR 文件放置在类路径的前端。


    在版本 9 之前，JDK 使用三个类加载器来加载类。它们是引导类加载器、扩展类加载器和系统类加载器。它们按层次结构排列——引导类加载器没有父加载器，扩展类加载器以引导类加载器为父加载器，系统类加载器以扩展类加载器为父加载器。类加载器在尝试加载类型本身之前，会先将类型加载请求委托给其父加载器（如果有的话）。JDK
    9 为了向后兼容，保留了三个类加载器的安排。JDK 9 不支持扩展机制，因此扩展类加载器已无意义。JDK 9 已将扩展类加载器重命名为平台类加载器，可以通过
    `ClassLoader` 类的静态方法 `getPlatformClassLoader()` 获取其引用。在 JDK 9 中，每个类加载器加载不同类型的模块。


    在 JDK 9 中，命名模块中的资源默认是封装的。只有当资源位于未命名、无效或开放的包中时，另一个模块中的代码才能访问命名模块中的资源。命名模块中所有名称以
    `.class` 结尾的资源（所有类文件）都可以被其他模块中的代码访问。你可以使用 `jrt` 方案的 URL 来访问运行时映像中的任何资源。


