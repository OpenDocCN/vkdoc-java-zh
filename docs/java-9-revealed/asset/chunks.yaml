    \ following rules apply to version numbers:\n\n- All elements must be a non-negative\
    \ integer.\n- The first three elements are treated as major version, minor version,\
    \ and security level, respectively; the rest, if present, are treated as additional\
    \ information such as numbers indicating patch releases.\n- Only the major version\
    \ element is mandatory.\n- Elements of a version number cannot contain leading\
    \ zeros. For example, the major version of the JDK 9 is 9, not 09.\n- Trailing\
    \ elements cannot be zero. That is, you cannot have a version number as `9.0.0`.\
