- fmt: '# Creating Publishers


    Creating a publisher depends on the implementation class of the `Flow.Publisher<T>`
    interface. I cover the use of the `SubmissionPublisher<T>` class that implements
    this interface. The class contains the following constructors:


    - `SubmissionPublisher()`

    - `SubmissionPublisher(Executor executor, int maxBufferCapacity)`

    - `SubmissionPublisher(Executor executor, int maxBufferCapacity, BiConsumer<?
    super Flow.Subscriber<? super T>,? super Throwable> handler)`


    A `SubmissionPublisher` uses the supplied `Executor` to deliver items to its subscribers.
    If multiple threads are used to generate items to be published and the number
    of subscribers can be estimated, you use an `Executor` with a fixed thread pool,
    which can be obtained using the `newFixedThreadPool(int nThread)` static method
    of the `Executors` class. Otherwise, you use the default `Executor`, which is
    obtained using the `commonPool()` method of the `ForkJoinPool` class.


    The `SubmissionPublisher` class uses an independent buffer for each subscriber.
    The buffer size is specified by the `maxBufferCapacity` argument in the constructor.
    The default buffer size is the value returned by the `defaultBufferSize()` static
    method of the `Flow` class, which is 256. If the number of published items exceeds
    the buffer size of a subscriber, the extra elements will be dropped. You can get
    the current buffer size of each subscriber using the `getMaxBufferCapacity()`
    method of the `SubmissionPublisher` class.


    When a subscriber’s method throws an exception, its subscription is cancelled.
    When the `onNext()` method of a subscriber throws an exception, the handler specified
    in the constructor is invoked, before its subscription is cancelled. By default,
    the handler is `null`.


    The following snippet of code creates a `SubmissionPublisher` that publishes items
    of the type `Long` with all attributes set to their default values:


    ```

    // Create a publisher that can publish Long values

    SubmissionPublisher<Long> pub = new SubmissionPublisher<>();

    ```


    The `SubmissionPublisher` class implements the `AutoCloseable` interface. Calling
    its `close()` method invokes the `onComplete()` method on its current subscribers.
    Attempting to publish elements after calling the `close()` method throws an `IllegalStateException`.


    # Publishing Items


    The `SubmissionPublisher<T>` class contains the following methods for publishing
    elements:


    - `int offer(T item, long timeout, TimeUnit unit, BiPredicate<Flow.Subscriber<?
    super T>,? super T> onDrop)`

    - `int offer(T item, BiPredicate<Flow.Subscriber<? super T>,? super T> onDrop)`

    - `int submit(T item)`


    The `submit()` method blocks until resources for current subscribers are available
    to publish the item.


    Consider a case with the buffer capacity of 10 for each subscriber. A subscriber
    subscribes with the publisher and does not request any items. The publisher publishes
    10 items and buffers them all. Attempting to publish another item using the `submit()`
    method will block because the subscriber’s buffer is full.


    The `offer()` method is non-blocking. The first version of the method lets you
    specify a timeout, after which the item is dropped. You can specify a drop handler,
    which is a `BiPredicate`. The `test()` method of the drop handler is called before
    dropping the item for a subscriber. If the `test()` method returns `true`, the
    item is retried one more time. If the `test()` method returns `false`, the item
    is dropped without a retry. A negative integer returned from the `offer()` method
    indicates the number of failed attempts to issue the item to a subscriber; a positive
    integer indicates an estimate of the maximum number of items submitted but not
    yet consumed among all current subscribers.


    Which method should you use to publish an item: `submit()` or `offer()`? It depends
    on your requirement. If each published item must be issued to all subscribers,
    `submit()` method is the option. If you want to wait to publish an item for a
    specific amount of time with a retry, the `offer()` method is the option.


    # A Quick Example'
