    and three `JButton`s. If you edit snippets, make sure to click the Accept button
    before exiting the window so that the editing takes effect. If you cancel out
    or exit the editor without accepting the changes, your edits will be lost.


    If you know the name of a variable, a method, or a class, you can edit it using
    its name. The following `jshell` session creates a variable, the methods, and
    a class with the same name `x` and uses the `/edit x` command to edit them all
    at once:


    ```

    C:\Java9Revealed>jshell


    | Welcome to JShell -- Version 9-ea


    | For an introduction type: /help intro


    jshell> int x = 100


    x ==> 100


    jshell> void x(){}


    | created method x()


    jshell> void x (int n) {}


    | created method x(int)


    jshell> class x{}


    | created class x


    jshell> 2 + 2


    $5 ==> 4


    jshell> /edit x

    ```


    The `/edit x` command opens all snippets with the name `x` in a JShell Edit Pad,
    as shown in Figure [11-4.](#index_split_004.html#282)


    You can edit these snippets, accept the changes, and exit the editing, to continue
    with the `jshell` session.


