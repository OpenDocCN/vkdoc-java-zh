- fmt: "`startProcess()`方法通过使用`-version`参数启动`java`程序来启动一个进程。该方法接收一个输出目标作为参数。第一次调用时，传入`Redirect.INHERIT`作为输出目标，这允许子进程使用标准输出和标准错误来打印消息。第二次调用时，传入`Redirect.DISCARD`作为输出目标，此时子进程不会产生任何输出。\n\
    \n## `StrictMath`类中的新方法\n\nJDK 包含两个类：`Math`和`StrictMath`，它们位于`java.lang`包中。这两个类都仅由静态成员组成，并包含提供基本数值运算的方法，例如平方根、绝对值、符号、三角函数和双曲函数。为什么我们需要两个类来提供类似的操作？`Math`类不要求在所有实现中返回相同的结果。这允许它使用本地库实现来执行操作，这些操作在不同平台上可能返回略有不同的结果。而`StrictMath`类则要求在所有实现中返回相同的结果。\n\
    \n`Math`类中的许多方法会调用`StrictMath`类的方法。JDK 9 向`Math`和`StrictMath`类添加了以下静态方法：\n\n-\
    \ `long floorDiv(long x, int y)`\n- `int floorMod(long x, int y)`\n- `double fma(double\
    \ x, double y, double z)`\n- `float fma(float x, float y, float z)`\n- `long multiplyExact(long\
    \ x, int y)`\n- `long multiplyFull(int x, int y)`\n- `long multiplyHigh(long x,\
    \ long y)`\n\n`floorDiv()`方法返回小于或等于`x`除以`y`的代数商的最大`long`值。当两个参数符号相同时，除法结果向零舍入（截断模式）。当它们符号不同时，除法结果向负无穷大舍入。当被除数为`Long.MIN_VALUE`且除数为`-1`时，该方法返回`Long.MIN_VALUE`。\n\
    \n当除数为零时，抛出`ArithmeticException`。\n\n`floorMod()`方法返回向下取模的结果，其值等于：\n\n`x - (floorDiv(x,\
    \ y) * y)`\n\n向下取模的符号与除数`y`的符号相同，并且取值范围为：\n\n`-abs(y) < r < +abs(y)`\n\n`fma()`方法对应于\
