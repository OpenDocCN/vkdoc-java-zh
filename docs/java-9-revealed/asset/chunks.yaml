    \ type in this module. Recompile the `com.jdojo.person` module. Recompile and\
    \ run the `Main` class in the `com.jdojo.person.test` module to get the desired\
    \ output.\n\n![](index-92_1.jpg)\n\n![](index-92_2.jpg)\n\nWhen a `requires` statement\
    \ contains the `transitive` modifier, the module that depends on the current module\
    \ implicitly reads the module specified in the `requires` statement. Referring\
    \ to Listing 4-9, any module that reads the `com.jdojo.person` module implicitly\
    \ reads the `com.jdojo.address` module. Essentially, an implicit read makes the\
    \ module declaration simpler to read, but harder to reason about because, by just\
    \ looking at a module declaration, you cannot see all its dependencies. Figure\
    \ 4-7 shows the final module graph for the `com.jdojo.person.test` module.\n\n\
    ***Figure 4-7.** The module graph for the `com.jdojo.person.test` module*\n\n\
    When modules are resolved, the module graph is augmented by adding a read edge\
    \ for each transitive dependency. In this example, a read edge will be added from\
    \ the `com.jdojo.person.test` module to the `com.jdojo.address` module, as shown\
    \ by the dashed arrow in Figure 4-8.\n\n***Figure 4-8.** The module graph for\
    \ the `com.jdojo.person.test` module after augmenting it with implicit read edges*\n\
    \n## Qualified Exports\n\nSuppose you are developing a library or framework that\
    \ consists of several modules. You have packages in a module that contains APIs\
    \ only for internal use by some modules. That is, packages in that module need\
    \ not be exported to all modules, rather its accessibility must be limited to\
    \ a few named modules. This can be achieved using a qualified exports statement\
    \ in the module declaration. The general syntax for using a qualified export is\
    \ as follows:\n\n```\nexports <package> to <module1>, <module2>...;\n```\n\nHere,\
    \ `<package>` is the name of the package to be exported by the current module\
    \ and `<module1>`, `<module2>`, etc. are the names of modules that can read the\
    \ current module. The following module declaration contains an unqualified export\
    \ and a qualified export:\n\n```java\nmodule com.jdojo.common {\n    // An unqualified\
    \ exports statement\n    exports com.jdojo.zip;\n    // A qualified exports statement\n\
    \    exports com.jdojo.internal to com.jdojo.address;\n}\n```\n\nThe `com.jdojo.common`\
    \ module exports the `com.jdojo.zip` package to all modules, whereas the `com.jdojo.internal`\
    \ package belongs only to the `com.jdojo.address` module. All public types in\
    \ the `com.jdojo.zip` module will be accessible in all modules that read the `com.jdojo.common`\
    \ module. However, all public types in the `com.jdojo.internal` package will be\
    \ accessible only to the `com.jdojo.address` module if the latter reads the former.\n\
    \nYou can find many examples of qualified exports in the JDK 9. The `java.base`\
    \ module contains `sun.*` and `jdk.*` packages that are exported to a few named\
    \ modules. The following command prints the module declaration of `java.base`.\
    \ The output shows a few of the qualified exports used in the `java.base` module.\n\
    \n```\nc:\\>javap jrt:/java.base/module-info.class\nCompiled from \"module-info.java\"\
    \nmodule java.base {\n    exports sun.net to jdk.plugin, jdk.incubator.httpclient;\n\
    \    exports sun.nio.cs to java.desktop, jdk.charsets;\n    exports sun.util.resources\
    \ to jdk.localedata;\n    exports jdk.internal.util.xml to jdk.jfr;\n    exports\
    \ jdk.internal to jdk.jfr;\n    ...\n}\n```\n\nNot all internal APIs in JDK 9\
    \ have been encapsulated. There are a few critical internal APIs in the `sun.*`\
    \ packages, e.g., the class `sun.misc.Unsafe`, which were used by developers prior\
    \ to JDK 9 and are still accessible in JDK 9. Those packages have been placed\
    \ in the `jdk.unsupported` module. The following command prints the module declaration\
    \ for the `jdk.unsupported` module:\n\n```\nC:\\Java9Revealed>javap jrt:/jdk.unsupported/module-info.class\n\
    Compiled from \"module-info.java\"\nmodule jdk.unsupported@9-ea {\n    requires\
    \ java.base;\n    exports sun.misc;\n    exports com.sun.nio.file;\n    exports\
    \ sun.reflect;\n    opens sun.misc;\n    opens sun.reflect;\n}\n```\n\n## Optional\
    \ Dependency\n\nThe module system verifies the module dependencies at compile-time\
    \ as well as at runtime. There are times when you want to make a module dependency\
    \ mandatory at compile-time, but optional at runtime. You may develop a library\
    \ that performs better if a specific module is available at runtime. Otherwise,\
    \ it falls back to another module that makes it perform less than optimal. However,\
    \ the library is compiled against the optional module and it makes sure that the\
    \ code dependent on the optional module is not executed if the optional module\
    \ is not available.\n\nAnother example is a module that exports an annotation\
    \ bundle. The Java runtime already ignores nonexistent annotation types. If an\
    \ annotation used in a program is not present at runtime, the annotation is ignored.\
    \ Module dependency is verified at startup and if a module is missing, the application\
    \ won’t start. Therefore, it is essential to declare such as module dependency\
    \ on the module containing the annotation bundle as optional.\n\nYou can declare\
    \ an optional dependency by using the `static` keyword in a `requires` statement:\n\
    \n```\nrequires static <optional-package>;\n```\n\nThe following module declaration\
    \ contains an optional dependency on the `com.jdojo.annotation` module:\n\n```java\n\
    module com.jdojo.claim {\n    requires static com.jdojo.annotation;\n}\n```\n\n\
    It is allowed to have both `transitive` and `static` modifiers in a `requires`\
    \ statement:\n\n```java\nmodule com.jdojo.claim {\n    requires transitive static\
    \ com.jdojo.annotation;\n}\n```\n\nThe `transitive` and `static` modifiers can\
    \ be used in any order if they’re used together. The following declaration has\
    \ the same semantics as the previous one:\n\n```java\nmodule com.jdojo.claim {\n\
    \    requires static transitive com.jdojo.annotation;\n}\n```\n\n## Accessing\
    \ Modules Using Reflection\n\nFor over 20 years, Java has allowed access to all\
    \ members—private, public, package, and protected—of a type using reflection.\
    \ You were able to access a private member of a class or object. All you had to\
    \ do was call the `setAccessible(true)` method on the member (`Field`, `Method`,\
    \ etc.) object. I will refer to accessing non-public members of a type using reflection\
    \ as *deep reflection* in the remainder of chapter.\n\nWhen you export a package\
    \ of a module, other modules can access only public types and public/protected\
    \ members of those public types in the exported package—statically at compile-time\
    \ or reflectively at runtime. This became a big issue during the design of the\
    \ module system. There are several great frameworks such as Spring and Hibernate,\
    \ which depend heavily on deep reflective access to members of types defined in\
    \ application libraries.\n\nDesigners of the module system faced a big challenge\
    \ in designing the deep reflective access to the modular code. Allowing deep reflection\
    \ on the types of an exported package violated the *strong encapsulation* theme\
    \ of the module system. It makes everything accessible to the outside code even\
    \ if the module developer did not want to expose some part of the module. On the\
    \ other hand, by not allowing deep reflection will devoid the Java community of\
    \ some great widely used frameworks and it will also break many existing applications\
    \ that rely on deep reflection. Many existing applications will simply not migrate\
    \ to JDK 9 because of this limitation."
