    Previous Status: NONEXISTENT\nCurrent Status: VALID\nValue: 2\n\nSnippet: long\
    \ multiply(int value) {return value * multiplier;}\nCause Snippet: int multiplier\
    \ = 2;\nKind: METHOD\nSub-Kind: METHOD_SUBKIND\nPrevious Status: RECOVERABLE_DEFINED\n\
    Current Status: VALID\nValue: null\n\nSnippet: multiply(200)\nKind: VAR\nSub-Kind:\
