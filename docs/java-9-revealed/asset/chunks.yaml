    第 4 章 ■ 模块依赖


    开放模块


    在本节的剩余部分，我将向你展示如何声明一个开放模块，以及如何开放一个特定的包以进行深度反射。首先，我将给出语法。在 `module` 关键字之前使用 `open`
    修饰符来声明一个开放模块：


    **open** module com.jdojo.model {


    // 模块语句写在这里


    }


    这里，`com.jdojo.model` 模块是一个开放模块。其他模块可以对该模块中所有包的所有类型使用深度反射。你可以在开放模块的声明中包含 `exports`、`requires`、`uses`
    和 `provides` 语句。你不能在开放模块内部使用 `opens` 语句。`opens` 语句用于开放一个特定的包以进行深度反射。因为开放模块开放了所有包以进行深度反射，所以开放模块内部不允许使用
    `opens` 语句。


    开放包


    开放包意味着允许其他模块对该包中的类型使用深度反射。你可以将包开放给所有其他模块，或开放给一个特定的模块列表。


    将包开放给所有其他模块的 `opens` 语句语法如下：


    opens <包名>;


    这里，`<包名>` 对所有其他模块都可用于深度反射。你也可以使用限定形式的 `opens` 语句将包开放给特定模块：


    opens <包名> to <模块 1>, <模块 2>...;


    这里，`<包名>` 仅对 `<模块 1>`、`<模块 2>` 等开放以进行深度反射。以下是在模块声明中使用 `opens` 语句的示例：


    module com.jdojo.model {


    // 将 com.jdojo.util 包导出给所有模块


    exports com.jdojo.util;


    // 将 com.jdojo.util 包开放给所有模块


    opens com.jdojo.util;


    // 仅将 com.jdojo.model.policy 包开放给


    // hibernate.core 模块


    opens com.jdojo.model.policy to hibernate.core;


    }


    `com.jdojo.model` 模块导出了 `com.jdojo.util` 包，这意味着所有公共类型及其公共成员在编译时和运行时（用于普通反射）都是可访问的。第二条语句开放了同一个包，以在运行时进行深度反射。总之，`com.jdojo.util`
    包的所有公共类型及其公共成员在编译时可访问，并且该包允许在运行时进行深度反射。第三条语句仅将 `com.jdojo.model.policy` 包开放给 `hibernate.core`
    模块以进行深度反射，这意味着其他模块在编译时无法访问该包的任何类型，而 `hibernate.core` 模块可以在运行时使用深度反射访问所有类型及其成员。


    第 4 章 ■ 模块依赖


    ■ **提示** 一个对另一个模块的开放包执行深度反射的模块，不需要读取包含这些开放包的模块。但是，如果知道模块名称，添加对具有开放包的模块的依赖是允许的，并且强烈建议这样做——这样模块系统可以在编译时和运行时验证依赖关系。


    当模块 M 将其包 P 开放给另一个模块 N 以进行深度反射时，模块 N 有可能将其对包 P 拥有的深度反射访问权限委托给另一个模块 Q。模块 N 需要使用
    `Module` 类的 `addOpens()` 方法以编程方式实现这一点。将反射访问权限委托给另一个模块，可以避免将整个模块开放给所有其他模块，同时，这也为被授予反射访问权限的模块增加了额外的工作。


    使用深度反射


    在本节中，我将解释如何开放模块和包以进行深度反射。我将从一个基本用例开始，然后逐步构建示例。在示例中，我将：


    -   展示尝试使用深度反射执行某些操作的代码。通常，这些代码会产生错误。

    -   解释错误背后的原因。

    -   最后，向你展示如何修复这些错误。


    我将使用一个名为 `com.jdojo.reflect` 的模块，该模块在 `com.jdojo.reflect` 包中包含一个名为 `Item` 的类。清单
    4-10 和清单 4-11 包含了该模块和类的源代码。


    ***清单 4-10.*** com.jdojo.reflect 模块的模块声明


    // module-info.java


    module com.jdojo.reflect {


    // 没有模块语句


    }


    ***清单 4-11.*** 一个包含四个静态变量的 Item 类


    // Item.java


    package com.jdojo.reflect;


    public class Item {


    static private int s = 10;


    static int t = 20;


    static protected int u = 30;


    static public int v = 40;


    }


    请注意，该模块既没有导出任何包，也没有开放任何包。`Item` 类非常简单。它包含四个静态变量，分别对应每种访问修饰符——`private`、包级、`protected`
    和 `public`。我特意让这个类保持简单，以便你可以专注于模块系统的规则，而不是理解代码。在本示例中，你将使用深度反射来访问这些静态变量。


    第 4 章 ■ 模块依赖


    你将使用另一个名为 `com.jdojo.reflect.test` 的模块。清单 4-12 包含了它的声明。它是一个没有模块语句的普通模块。也就是说，除了默认依赖于
    `java.base` 模块外，它没有其他依赖。


    ***清单 4-12.*** com.jdojo.reflect.test 模块的模块声明


    // module-info.java


    module com.jdojo.reflect.test {


    // 没有模块语句


    }


    `com.jdojo.reflect.test` 模块包含一个名为 `ReflectTest` 的类，如清单 4-13 所示。


    ***清单 4-13.*** 一个用于演示对其他模块中类型及其成员进行反射访问的 ReflectTest 类


    // ReflectTest.java


    package com.jdojo.reflect.test;


    import java.lang.reflect.Field;


    import java.lang.reflect.InaccessibleObjectException;


    public class ReflectTest {


    public static void main(String[] args) throws ClassNotFoundException {


    // 获取 com.jdojo.reflect.Item 类的 Class 对象


    // 该类位于 com.jdojo.reflect 模块中


    Class<?> cls = Class.forName("com.jdojo.reflect.Item");


    Field[] fields = cls.getDeclaredFields();


    for (Field field : fields) {


    printFieldValue(field);


    }


    }


    public static void printFieldValue(Field field) {


    String fieldName = field.getName();


    try {


    // 使字段可访问，以防其基于声明（例如私有字段）而不可访问


    field.setAccessible(true);


    // 打印字段的值


    System.out.println(fieldName + " = " + field.get(null));


    } catch (IllegalAccessException | IllegalArgumentException |


    InaccessibleObjectException e) {


    System.out.println("访问 " + fieldName +


    " 时出错。错误信息: " + e.getMessage());


    }


    }


    }


    第 4 章 ■ 模块依赖

