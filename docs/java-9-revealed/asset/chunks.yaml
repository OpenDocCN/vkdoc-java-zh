    Updates to @Deprecated in JDK 9


    Suppose you compiled your code and deployed it to production. If you upgraded
    the JDK version or libraries/frameworks that contain new, deprecated APIs that
    your old application uses, you do not receive any warnings and you would miss
    a chance to migrate away from the deprecated APIs. You must recompile your code
    to receive warnings. There was no tool to scan and analyze the compiled code (e.g.,
    JAR files) and report the use of deprecated APIs. Even worse is the case when
    a deprecated API is removed from the newer version and your old, compiled code
    receives unexpected runtime errors. Developers were also confused when they looked
    at a deprecated element Javadoc—there was no way to express when the API was deprecated
    and whether the deprecated API will be removed in a future release. All you could
    do was to specify these pieces of information in text as part of the @deprecated
    tag. JDK 9 attempted to solve these issues by enhancing the @Deprecated annotation.
    The annotation has received two new elements in JDK 9: since and forRemoval.


    Prior to JDK 9, the annotation declaration was:


    @Documented


    @Retention(RetentionPolicy.RUNTIME)


    @Target(value={CONSTRUCTOR, FIELD, LOCAL_VARIABLE, METHOD, PACKAGE, PARAMETER,
    TYPE})


    public @interface Deprecated {


    }


    In JDK 9, the declaration for the Deprecated annotation changed to the following,
    with changes shown in boldface:


    @Documented


    @Retention(RetentionPolicy.RUNTIME)


    @Target(value={CONSTRUCTOR, FIELD, LOCAL_VARIABLE, METHOD, PACKAGE, **MODULE**,
    PARAMETER, TYPE}) public @interface Deprecated {


    **String since() default "";**


    **boolean forRemoval() default false;**


    }'
