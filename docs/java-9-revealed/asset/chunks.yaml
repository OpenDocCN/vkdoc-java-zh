    Note the positions of the arguments in the of() method. The first and the second
    arguments are the key and the value of the first key-value entry in the map, respectively;
    the third and the fourth arguments are the key and the value of the second key-value
    entry in the map, respectively; and so on. Notice that there is no var-args version
    of the of() method as you have in List and Set. This is because a Map entry contains
    two values (key and value) and you can have only one var-args argument in a method
    in Java. The following snippet of code shows you how to create maps using the
    of() method:


    // An empty, unmodifiable Map


    Map<Integer, String> emptyMap = Map.of();


    // A singleton, unmodifiable Map


    Map<Integer, String> singletonMap = Map.of(1, "One");


    // A unmodifiable Map with two entries


    Map<Integer, String> luckyNumbers = Map.of(1, "One", 2, "Two");


    To create an unmodifiable Map with an arbitrary number of entries, JDK 9 provides
    a static method named ofEntries() in the Map interface, which has the following
    signature:


    <K,V> Map<K,V> ofEntries(Map.Entry<? extends K,? extends V>... entries)


    To use the ofEntries() method, you need to box each map entry in a Map.Entry instance.
    JDK 9


    provides a convenient entry() static method in the Map interface to create instances
    of Map.Entry.


    The signature of the entry() method is as follows:


    <K,V> Map.Entry<K,V> entry(K k, V v)


    To keep the expression readable and compact, you need to use a static import for
    the Map.entry method and use a statement like the following to create an unmodifiable
    Map with an arbitrary number of entries: import java.util.Map;


    import static java.util.Map.entry;


    // ...


    // Use the Map.ofEntries() and Map.entry() methods to


    // create an unmodifiable Map


    Map<Integer, String> numberToWord =


    Map.ofEntries(entry(1, "One"),


    entry(2, "Two"),


    entry(3, "Three"));


    The returned maps from the of() and ofEntries() methods of the Map interface have
    the following characteristics:


    • They are structurally immutable. Attempting to add, replace, or delete entries
    throws


    an UnsupportedOperationException.


    • They do not allow null in keys or values. A NullPointerException is thrown if
    a key


    or value in the map is null.


    Chapter 13 ■ ColleCtion api Updates


    • They are serializable if all keys and values are serializable.


    • They do not allow duplicate keys. Specifying duplicate keys throws an


    IllegalArgumentException.


    • The iteration order of mappings is unspecified.


    • There is no guarantee about the implementation class of the returned Map. That
    is, do


    not expect the returned object to be of HashMap or any other class that implements
    the


    Map interface. Implementations of these methods are internal and you should make


    no assumption about their class names. For example, Map.of() and Map.of(1, "One")


    may return objects of two different classes.


    The Collections class contains a static field named EMPTY_MAP representing an
    immutable empty map.


    It also contains a static method named emptyMap() to obtain an immutable empty
    map. Its singletonMap (K key, V value) method returns an immutable singleton map
    with the specified key and value. The following snippet of code shows pre-JDK
    9 and JDK 9 ways of creating immutable empty and singleton maps:


    // Creating an empty, immutable Map before JDK 9


    Map<Integer,String> emptyMap1 = Collections.EMPTY_MAP;


    Map<Integer,String> emptyMap2 = Collections.emptyMap();


    // Creating an empty Map in JDK 9


    Map<Integer,String> emptyMap = Map.of();


    // Creating a singleton, immutable Map before JDK 9


    Map<Integer,String> singletonMap1 =


    Collections.singletonMap(1, "One");


    // Creating a singleton, immutable Map in JDK 9


    Map<Integer,String> singletonMap = Map.of(1, "One");


    Listing [13-4](#index_split_005.html#351) contains a complete program that shows
    you how to use the of(), ofEntries(), and entry()static methods of the Map interface
    to create unmodifiable maps. Notice the order in which days are specified in the
    map and the order they are shown in the output. They may not match because a map
    does not, like a set, guarantee the retrieval order of its entries.


    ***Listing 13-4.*** Using the Map.of( ), Map.ofEntries( ) and Map.entry( ) Static
    Methods to Create Unmodifiable Maps


