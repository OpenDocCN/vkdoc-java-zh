  trans: '

    创建发布者


    创建发布者依赖于 `Flow.Publisher<T>` 接口的实现类。我将介绍实现了该接口的 `SubmissionPublisher<T>` 类的使用。该类包含以下构造方法：


    • `SubmissionPublisher()`


    • `SubmissionPublisher(Executor executor, int maxBufferCapacity)`


    • `SubmissionPublisher(Executor executor, int maxBufferCapacity,`


    `BiConsumer<? super Flow.Subscriber<? super T>,? super Throwable>`


    `handler)`


    `SubmissionPublisher` 使用提供的 `Executor` 将项目传递给其订阅者。如果使用多个线程生成待发布项目，并且可以预估订阅者数量，则应使用具有固定线程池的
    `Executor`，可通过 `Executors` 类的 `newFixedThreadPool(int nThread)` 静态方法获取。否则，使用默认的
    `Executor`，该默认值通过 `ForkJoinPool` 类的 `commonPool()` 方法获取。


    第 17 章 ■ 响应式流


    `SubmissionPublisher` 类为每个订阅者使用独立的缓冲区。缓冲区大小由构造方法中的 `maxBufferCapacity` 参数指定。默认缓冲区大小为
    `Flow` 类的 `defaultBufferSize()` 静态方法返回的值，即 256。如果发布的项目数量超过订阅者的缓冲区大小，多余的元素将被丢弃。你可以使用
    `SubmissionPublisher` 类的 `getMaxBufferCapacity()` 方法获取每个订阅者的当前缓冲区大小。


    当订阅者的方法抛出异常时，其订阅将被取消。当订阅者的 `onNext()` 方法抛出异常时，在取消其订阅之前，会调用构造方法中指定的处理器。默认情况下，处理器为
    `null`。


    以下代码片段创建了一个 `SubmissionPublisher`，它发布 `Long` 类型的项目，所有属性均设置为默认值：


    ```java

    // 创建一个可以发布 Long 值的发布者

    SubmissionPublisher<Long> pub = new SubmissionPublisher<>();

    ```


    `SubmissionPublisher` 类实现了 `AutoCloseable` 接口。调用其 `close()` 方法会对其当前订阅者调用 `onComplete()`
    方法。在调用 `close()` 方法后尝试发布元素会抛出 `IllegalStateException`。


    发布项目


    `SubmissionPublisher<T>` 类包含以下用于发布元素的方法：


    • `int offer(T item, long timeout, TimeUnit unit, BiPredicate<Flow.Subscriber<?
    super T>,? super T> onDrop)`


    • `int offer(T item, BiPredicate<Flow.Subscriber<? super T>,? super T> onDrop)`


    • `int submit(T item)`


    `submit()` 方法会阻塞，直到当前订阅者的资源可用于发布该项目。


    考虑一个场景：每个订阅者的缓冲区容量为 10。一个订阅者向发布者订阅，但未请求任何项目。发布者发布了 10 个项目并将它们全部缓冲。此时，尝试使用 `submit()`
    方法发布另一个项目将会阻塞，因为订阅者的缓冲区已满。


    `offer()` 方法是非阻塞的。该方法的第一个版本允许你指定一个超时时间，超时后项目将被丢弃。你可以指定一个丢弃处理器，它是一个 `BiPredicate`。在为一个订阅者丢弃项目之前，会调用丢弃处理器的
    `test()` 方法。如果 `test()` 方法返回 `true`，则会再重试一次该项目。如果 `test()` 方法返回 `false`，则直接丢弃项目，不再重试。`offer()`
    方法返回的负整数表示向订阅者发布项目失败的次数；正整数表示所有当前订阅者中已提交但尚未消费的项目数量的估计最大值。


    你应该使用哪种方法来发布项目：`submit()` 还是 `offer()`？这取决于你的需求。如果每个发布的项目都必须传递给所有订阅者，则选择 `submit()`
    方法。如果你想在等待特定时间后发布项目并允许重试，则选择 `offer()` 方法。


