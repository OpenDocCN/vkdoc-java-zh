- fmt: "# Adding Modules to the Default Set of Root Modules\n\nSometimes, you need\
    \ to add modules to the default set of root modules so the added modules are resolved.\
    \ You can specify the additional root modules using the `--add-modules` command-line\
    \ option during compile-time, link time, and runtime:\n\n`--add-modules <module-list>`\n\
    \nHere, `<module-list>` is a comma-separated list of module names.\n\nYou can\
    \ use the following special values as a module list with the `--add-modules` option\
    \ that have special meaning:\n\n- `ALL-DEFAULT`\n- `ALL-SYSTEM`\n- `ALL-MODULE-PATH`\n\
    \nAll three special values are valid at runtime. You can use the `ALL-MODULE-PATH`\
    \ value only at compile-time.\n\nIf `ALL-DEFAULT` is used as the module list,\
    \ the default set of root modules used when the application is run from the class\
    \ path is added to the root set. This is useful for an application that is a container\
    \ and hosts other applications that may need other modules not required by the\
    \ container application itself. This is a way to make all Java SE modules available\
    \ to the container, so any of the hosted applications may use them.\n\nIf `ALL-SYSTEM`\
    \ is used as the module list, all system modules are added to the root set. This\
    \ is useful for running test harnesses.\n\nIf `ALL-MODULE-PATH` is used as the\
    \ module list, all modules found on module paths are added to the root set. This\
    \ is useful for tools such as Maven, which ensures that all modules on the module\
    \ path are needed by the application.\n\n**Tip:** You may receive an error that\
    \ a module is not found even when the module is present on the module path. In\
    \ such cases, you need to add the missing module to the default set of root modules\
    \ using the `--add-modules` command-line option.\n\nJDK 9 supports a useful non-standard\
    \ command-line option that prints the diagnostic messages describing the steps\
    \ used to resolve modules while the module graph is constructed. The option is\
    \ `-Xdiag:resolver`. The following command runs the `pkg3.Main` class in the `claim`\
    \ module. A partial output is shown. At the end of the diagnostic messages, you\
    \ will find a `Result:` section that lists the resolved modules.\n\n```\nC:\\\
    Java9Revealed>java -Xdiag:resolver -p lib -m claim/pkg3.Main\n[Resolver] Root\
    \ module claim located\n[Resolver] (file:///C:/Java9Revealed/lib/claim.jar)\n\
    [Resolver] Module java.base located, required by claim\n[Resolver] (jrt:/java.base)\n\
    [Resolver] Module policy located, required by claim\n[Resolver] (file:///C:/Java9Revealed/lib/policy.jar)\n\
    ...\n[Resolver] Result:\n[Resolver] claim\n[Resolver] java.base\n...\n[Resolver]\
    \ policy\n```\n\n## Aggregator Modules\n\nYou can create a module that contains\
    \ no code of its own. It collects and re-exports the contents of other modules.\
    \ Such a module is called an *aggregator module*. Suppose there are several modules\
    \ that depend on five modules. You can create an aggregator module for those five\
    \ modules, and now, your modules can depend on only one module—the aggregator\
    \ module.\n\nAggregator modules exist for convenience. Java 9 contains several\
    \ aggregator modules such as `java.se` and `java.se.ee`. The `java.se` module\
    \ gathers parts of the Java SE that do not overlap with Java EE. The `java.se.ee`\
    \ module gathers all of the modules that comprise the Java SE, including modules\
    \ that overlap with the Java EE.\n\n## Declaring Modules\n\nThis section contains\
    \ a quick overview of the syntax used to declare modules. I explain each part\
    \ in greater detail in subsequent chapters. If you do not understand everything\
    \ mentioned about modules in this section, keep reading. I will cover them again\
    \ with examples in later chapters.\n\nA module is defined using a module declaration,\
    \ which is a new construct in the Java programming language. The syntax is as\
    \ follows:\n\n```\n[open] module <module> {\n    <module-statement>;\n    <module-statement>;\n\
    \    ...\n}\n```\n\nThe presence of the `open` modifier, which is optional, declares\
    \ an *open module*. An open module exports all its packages to be accessed by\
    \ other modules using reflection. `<module>` is the name of the module being defined.\
    \ `<module-statement>` is a module statement. You can have zero or more module\
    \ statements in a module declaration. If it is present, it can be one of five\
    \ types of statements:\n\n- An `exports` statement\n- An `opens` statement\n-\
    \ A `requires` statement\n- A `uses` statement\n- A `provides` statement\n\nThe\
    \ `exports` and `opens` statements are used to control access to the module's\
    \ code. The `requires` statement is used to declare dependency of a module to\
    \ another module. The `uses` and `provides` statements are used to express service\
    \ consumption and service provision, respectively. The following is an example\
    \ of a module declaration of a module named `myModule`:\n\n```\nmodule myModule\
    \ {\n    // Exports the packages - com.jdojo.util and\n    // com.jdojo.util.parser\n\
    \    exports com.jdojo.util;\n    exports com.jdojo.util.parser;\n\n    // Reads\
    \ the java.sql module\n    requires java.sql;\n\n    // Opens com.jdojo.legacy\
    \ package for reflective access\n    opens com.jdojo.legacy;\n\n    // Uses the\
    \ service interface java.sql.Driver\n    uses java.sql.Driver;\n\n    // Provides\
    \ the com.jdojo.util.parser.FasterCsvParser\n    // class as an implementation\
    \ for the service interface\n    // named com.jdojo.util.CsvParser\n    provides\
    \ com.jdojo.util.CsvParser\n        with com.jdojo.util.parser.FasterCsvParser;\n\
    }\n```\n\nYou can create an open module by using the `open` modifier in the module\
    \ declaration. An open module grants reflective access to all its packages to\
    \ other modules. You cannot use `opens` statements inside an open module because\
    \ all packages are implicitly open in an open module. The following snippet of\
    \ code declares an open module named `myLegacyModule`:\n\n```\nopen module myLegacyModule\
    \ {\n    exports com.jdojo.legacy;\n    requires java.sql;\n}\n```\n\n## Module\
    \ Names\n\nA module name can be a Java-*qualified* identifier. A qualified identifier\
    \ is one or more identifiers separated by a dot, for example, `policy`, `com.jdojo.common`,\
    \ and `com.jdojo.util`. If any part in a module name is not a valid Java identifier,\
    \ a compile-time error occurs. For example, `com.jdojo.common.1.0` is not a valid\
    \ module name because two parts, `1` and `0`, in the name are not valid Java identifiers.\n\
    \nSimilar to the package-naming convention, use the reverse-domain name pattern\
    \ to give your modules unique names. Using this convention, the simplest module,\
    \ which is named `com.jdojo.common`, may be declared as follows:\n\n```\nmodule\
    \ com.jdojo.common {\n    // No module statements\n}\n```\n\nA module name does\
    \ not hide variables, types, and packages with the same name. Therefore, you can\
    \ have a module as well as a variable, a type, or a package with the same name.\
    \ The context of their use will differentiate which name is referring to what\
    \ kind of entity.\n\nIn JDK 9, `open`, `module`, `requires`, `transitive`, `exports`,\
    \ `opens`, `to`, `uses`, `provides`, and `with` are restricted keywords. They\
    \ are explained briefly later in this chapter and in detail in subsequent chapters.\
    \ They have special meaning only when they appear in module declarations at specific\
    \ positions. You can use them as identifiers everywhere else in programs. For\
    \ example, the following module declaration is valid, even though it does not\
    \ use an intuitive module name:\n\n```\n// Declare a module named module\nmodule\
    \ module {\n    // Module statements go here\n}\n```\n\nThe first `module` word\
    \ is interpreted as a keyword and the second one is a module name. You can declare\
    \ a variable named `module` anywhere in your program:\n\n```\nString module =\
    \ \"myModule\";\n```\n\n## Controlling Access to Modules\n\nAn `exports` statement\
    \ exports the specified package of the module to all modules or a list of named\
    \ modules at compile-time and runtime. It takes the following two forms:\n\n-\
    \ `exports <package>;`\n- `exports <package> to <module1>, <module2>...;`\n\n\
    Examples of using the `exports` statement are as follows:\n\n```\nmodule M {\n\
    \    exports com.jdojo.util;\n    exports com.jdojo.policy\n        to com.jdojo.claim,\
    \ com.jdojo.billing;\n}\n```"
