- fmt: "# The Reactive Streams API in JDK and How to Use It\n\n- How to create publishers,\
    \ subscribers, and processors using the Java API for Reactive Streams in JDK 9\n\
    \n## What Is a Stream?\n\nA stream is a sequence of items produced by a producer\
    \ and consumed by one or more consumers. This producer-consumer model is also\
    \ known as source/sink model or publisher-subscriber model. I refer to it as a\
    \ publisher-subscriber model in this chapter. I use the terms *element*, *item*,\
    \ *data item*, and *data* interchangeably to mean a piece of information that\
    \ is published by a publisher and received by subscribers.\n\nThere are several\
    \ stream-processing mechanisms, the pull model and push model being the most common.\
    \ In a push model, the publisher pushes items to the subscriber. In a pull model,\
    \ the subscriber pulls items from the publisher. These models work great when\
    \ both the publisher and the subscriber work at the same rate, which is an ideal\
    \ situation. We will consider a few situations when they do not work at the same\
    \ rate, the issues involved in such situations, and the possible solutions.\n\n\
    When the publisher is faster than the subscriber, the latter has to have an unbounded\
    \ buffer to store fast incoming items or it must drop items it cannot handle.\
    \ Another solution is to use a strategy called *backpressure* in which the subscriber\
    \ tells the publisher to slow down and hold the items until the subscriber is\
    \ ready to process more. Using backpressure ensures that a faster publisher doesn’t\
    \ overwhelm a slower subscriber. Using backpressure may require the publisher\
    \ to have an unbounded buffer if it keeps producing and storing elements. The\
    \ publisher may implement a bounded buffer to store limited amount of elements\
    \ and may choose to drop them if its buffer is full. Another strategy may be used\
    \ in which the publisher retries publishing items to the subscriber, which cannot\
    \ accept the items when they are published.\n\nWhat does the subscriber do when\
    \ it requests items from the publisher and the items are not available?\n\nIn\
    \ a synchronous request, the subscriber has to wait, possibly indefinitely, until\
    \ items are available. If the publisher sends items to the subscriber synchronously\
    \ and the subscriber processes them synchronously, the publisher has to block\
    \ until the data processing finishes. The solution is to have an asynchronous\
    \ processing at both ends, where the subscriber may keep working on other tasks\
    \ after requesting items from the publisher. When more items are ready, the publisher\
    \ sends them to the subscriber asynchronously.\n\n© Kishori Sharan 2017  \nK.\
    \ Sharan, *Java 9 Revealed*, DOI 10.1007/978-1-4842-2592-9_17\n\n## What Is Reactive\
    \ Streams?\n\nReactive Streams started in 2013 as an initiative for providing\
    \ a standard for *asynchronous* stream processing with *non-blocking backpressure*.\
    \ It is aimed at solving the problems in processing of a stream of items—how to\
    \ pass a stream of items from a publisher to a subscriber without requiring the\
    \ publisher to block, or the subscriber to have an unbounded buffer or drop.\n\
    \nThe Reactive Streams model is very simple—the subscriber sends an asynchronous\
    \ request to the publisher for N items. The publisher sends N or fewer items to\
    \ the subscriber asynchronously.\n\n> **Tip** Reactive Streams dynamically switches\
    \ between the pull model and push model stream-processing mechanisms. It uses\
    \ the pull model when the subscriber is slower and uses the push model when the\
    \ subscriber is faster.\n\nIn 2015, a specification and Java API for handling\
    \ Reactive Streams were published. Refer to the web page at [http://www.reactive-streams.org/](http://www.reactive-streams.org/)\
    \ for more information on Reactive Streams. The Java API for Reactive Streams\
    \ consists of only four interfaces:\n\n- `Publisher<T>`\n- `Subscriber<T>`\n-\
    \ `Subscription`\n- `Processor<T,R>`\n\nA *publisher* is a producer of potentially\
    \ an unbounded number of *sequenced* items. It publishes (or sends) items to its\
    \ current subscribers based on the demands received from them."
