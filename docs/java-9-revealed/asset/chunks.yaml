- fmt: 'If you specify a command, the command must be platform-specific. That is,
    you need to specify a Windows command on Windows, a UNIX command on UNIX, and
    so on. The command may contain flags.


    The JShell tool will save the snippets to be edited in a temporary file and will
    append the name of the temporary file to the command. You cannot work with `jshell`
    while an editor is open. If your editor exits immediately, you should specify
    the `-wait` option, which will make `jshell` wait until the editor is closed.


    The following command sets Notepad as an editor on Windows:


    ```

    jshell> /set editor -retain notepad.exe

    ```


    The `-default` option sets the snippet editor to the default editor. The `-delete`
    option deletes the current editor setting. If the `-retain` option is used with
    the `-delete` option, the retained editor setting is deleted:


    ```

    jshell> /set editor -retain -delete

    | Editor set to: -default

    jshell>

    ```


    The editor set in one of the following environment variables—`JSHELLEDITOR`, `VISUAL`,
    or `EDITOR`—takes precedence over the default editor. These environment variables
    are looked up for an editor in order. If none of these environment variables is
    set, the default editor is used. The intent behind all these rules is to have
    an editor all the time and then use the default editor as a fallback. The `/set
    editor` command without any arguments and options prints information about the
    current editor setting.


    The following `jshell` session sets Notepad as an editor on Windows. Note that
    this example will not work on platforms other than Windows, where you need to
    specify your platform-specific program as an editor.


    ```

    C:\Java9Revealed>jshell

    | Welcome to JShell -- Version 9-ea

    | For an introduction type: /help intro


    jshell> /set editor

    | /set editor -default


    jshell> /set editor -retain notepad.exe

    | Editor set to: notepad.exe

    | Editor setting retained: notepad.exe


    jshell> /exit

    | Goodbye


    C:\Java9Revealed>jshell

    | Welcome to JShell -- Version 9-ea

    | For an introduction type: /help intro


    jshell> /set editor

    | /set editor -retain notepad.exe


    jshell> 2 + 2

    $1 ==> 4


    jshell> /edit


    jshell> /set editor -retain -delete

    | Editor set to: -default


    jshell> /exit

    | Goodbye


    C:\Java9Revealed>SET JSHELLEDITOR=notepad.exe


    C:\Java9Revealed>jshell

    | Welcome to JShell -- Version 9-ea

    | For an introduction type: /help intro


    jshell> /set editor

    | /set editor notepad.exe


    jshell>

    ```


    ## Setting Feedback Mode


    When you execute a snippet or a command, `jshell` prints feedback. The amount
    and format of the feedback depends on the *feedback mode*. You can use one of
    the four predefined feedback modes or a custom feedback mode:


    - `silent`

    - `concise`

    - `normal`

    - `verbose`


    The `silent` mode gives you no feedback at all and the `verbose` mode gives you
    the most feedback. The `concise` mode gives you the same feedback as the `normal`
    mode, but in a compact format. The command to set the feedback mode is as follows:


    ```

    /set feedback [-retain] <mode>

    ```


    Here, `<mode>` is one of the four feedback modes. Use the `-retain` option if
    you want to persist the feedback mode across the `jshell` sessions.


    You can also launch `jshell` in a specific feedback mode:


    ```

    jshell --feedback <mode>

    ```


    The following command starts `jshell` in verbose feedback mode:


    ```

    C:\Java9Revealed>jshell --feedback verbose

    ```


    The following examples show you how to set different feedback modes:


