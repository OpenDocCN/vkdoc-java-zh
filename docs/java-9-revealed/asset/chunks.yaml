    ## 消息级别


    级别是日志记录的严重级别，它根据消息的严重程度确定要记录的消息。


    级别按严重程度递增的顺序具有以下值：`trace`、`debug`、`info`、`warning` 和 `error`。如果你启用了严重级别 `S` 的日志记录，则所有严重级别为
    `S` 及以上的消息都将被记录。例如，如果你在 `info` 级别启用日志记录，则所有 `info`、`warning` 和 `error` 级别的消息都将被记录。


    ■ **提示** 你可以将名为 `off` 的特殊严重级别与 `-Xlog` 选项一起使用，以禁用所有级别的日志记录。级别的默认值是 `info`。


