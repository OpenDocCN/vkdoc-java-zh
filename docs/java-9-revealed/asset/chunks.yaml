    ## Creating JMOD Files


    You can create a JMOD file using the `create` sub-command with the `jmod` tool.
    The contents of a JMOD file are the contents of a module. Assume the following
    directories and files exist:


    ```

    C:\Java9Revealed\jmods

    C:\Java9Revealed\lib\com.jdojo.prime.jar

    ```


    The following command creates a `com.jdojo.prime.jmod` file in the `C:\Java9Revealed\jmods`
    directory. The contents of the JMOD file come from the `com.jdojo.prime.jar` file.


    ```

    C:\Java9Revealed>jmod create --class-path lib\com.jdojo.prime.jar

    jmods\com.jdojo.prime.jmod

    ```


    Typically, the contents of the JMOD file come from a set of directories containing
    the compiled code for a module. The following command creates a `com.jdojo.prime.jmod`
    file. Its contents come from a directory `mods\com.jdojo.prime`. The command uses
    the `--module-version` option to set the module version that will be recorded
    in the `module-info.class` file found in the `com.jdojo.prime\build\classes` directory.
    Make sure to delete the JMOD file created in the previous step.


    ```

    C:\Java9Revealed>jmod create --module-version 1.0

    --class-path com.jdojo.prime\build\classes jmods\com.jdojo.prime.jmod

    ```


    What can you do with this JMOD file? You can place it on the module path to use
    it at compile-time. You can use it with the `jlink` tool to create a custom runtime
    image that you can use to run your application. Recall that you cannot use it
    at runtime. If you try to use a JMOD file at runtime by placing it on a module
    path, you will receive the following error:


    ```

    Error occurred during initialization of VM

    java.lang.module.ResolutionException: JMOD files not supported: jmods\com.jdojo.prime.jmod

    ...

    ```


