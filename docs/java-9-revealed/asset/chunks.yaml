- fmt: "`ReflectTest`类很简单。在其`main()`方法中，它使用`Class.forName()`方法加载`com.jdojo.reflect.Item`类，并尝试打印该类所有四个静态字段的值。\n\
    \n如果某个类在运行时可用，你可以使用`Class.forName()`方法从任何模块加载该类。该类不一定需要通过模块依赖（`exports`和`requires`语句）来访问。你可能会质疑这条规则。这是否违反了模块系统的强封装前提？如果拥有该类的模块没有导出包含该类的包，你怎么能从任何模块加载该类呢？这是允许的，因为你加载的是该类的类描述符（`Class`对象）。知道类描述符并不意味着你也可以创建该类的对象并访问其成员。强封装是关于仅访问模块中已导出或已打开的那些类型，而不是关于加载类描述符。\n\
    \n让我们运行`ReflectTest`类。它将生成以下错误：\n\n```\nException in thread \"main\" java.lang.ClassNotFoundException:\
    \ com.jdojo.reflect.Item\n\tat java.base/jdk.internal.loader.BuiltinClassLoader.loadClass(BuiltinClassLoader.java:532)\n\
    \tat java.base/jdk.internal.loader.ClassLoaders$AppClassLoader.loadClass(ClassLoaders.java:186)\n\
    \tat java.base/java.lang.ClassLoader.loadClass(ClassLoader.java:473)\n\tat java.base/java.lang.Class.forName0(Native\
    \ Method)\n\tat java.base/java.lang.Class.forName(Class.java:292)\n\tat com.jdojo.reflect.test/com.jdojo.reflect.test.ReflectTest.main(ReflectTest.java:12)\n\
    ```\n\n错误消息表明，当尝试加载`com.jdojo.reflect.Item`类时抛出了`ClassNotFoundException`。我不是说过你应该能够加载这个类吗？我之前的说法仍然是正确的。这个错误源于另一个问题。\n\
    \n当你尝试加载一个类时，包含该类的模块必须被模块系统所知。如果你在 JDK 9 之前收到`ClassNotFoundException`，它表明该类不在类路径中。你需要将包含该类的目录或\
    \ JAR 添加到类路径中，错误就会解决。在 JDK 9 中，模块是通过模块路径来查找的。所以，让我们将`com.jdojo.reflect`模块添加到模块路径上，然后运行`ReflectTest`类。在\
    \ NetBeans 中，你需要使用属性对话框将`com.jdojo.reflect`项目添加到`com.jdojo.reflect.test`模块的模块路径中，如图\
    \ [4-9](#index_split_002.html#100) 所示。\n\n![](index-100_1.jpg)\n\n**图 4-9.** 在\
    \ NetBeans 中将`com.jdojo.reflect`项目添加到`com.jdojo.reflect.test`项目的模块路径中\n\n你也可以使用以下命令运行`ReflectTest`类，假设你已经在\
    \ NetBeans 中构建了两个项目，并且项目的`dist`目录包含模块化 JAR：\n\n```\nC:\\Java9Revealed>java\n--module-path\
    \ com.jdojo.reflect\\dist;com.jdojo.reflect.test\\dist\n--module com.jdojo.reflect.test/com.jdojo.reflect.test.ReflectTest\n\
    ```\n\n在 NetBeans 和命令行中运行`ReflectTest`类都会返回相同的`ClassNotFoundException`。所以，看起来将`com.jdojo.reflect`模块添加到模块路径并没有帮助。但这并不完全正确。事实上，这一步是有帮助的，但它只解决了一半的问题。\n\
    \n我们需要理解并解决另一半问题，即模块图。\n\nJDK 9 中的模块路径听起来类似于类路径，但它们的工作方式不同。模块路径用于在模块解析期间定位模块——即构建和扩充模块图时。类路径则用于在需要加载类时定位类。为了提供可靠的配置，模块系统确保在启动时所有模块所需的依赖项都已存在。一旦你的应用程序启动，所有需要的模块都会被解析，模块解析结束后再向模块路径添加更多模块也无济于事。当你运行`ReflectTest`类时——将`com.jdojo.reflect`和`com.jdojo.reflect.test`模块都保留在模块路径上——模块图如图\
    \ [4-10](#index_split_002.html#101) 所示。\n\n![](index-101_1.jpg)\n\n![](index-101_2.jpg)\n\
    \n**图 4-10.** 运行`ReflectTest`类时的模块图\n\n当你从一个模块运行一个类时——就像你运行`ReflectTest`类时那样——包含主类的模块是唯一用作根的模块。模块图包含主模块所依赖的所有模块及其依赖项。在这种情况下，`com.jdojo.reflect.test`模块是默认根模块集合中的唯一模块，模块系统对`com.jdojo.reflect`模块的存在一无所知，即使该模块被放置在模块路径上。你需要做什么才能让`com.jdojo.reflect`模块被包含在模块图中呢？通过使用`--add-modules`命令行\
    \ VM 选项，将该模块添加到默认的根模块集合中。该选项的值是一个逗号分隔的模块列表，这些模块将被添加到默认的根模块集合中：\n\n```\n--add-modules\
    \ <module1>,<module2>...\n```\n\n图 [4-11](#index_split_002.html#101) 显示了 NetBeans\
    \ 中`com.jdojo.reflect.test`项目的属性对话框，其中包含你需要使用的 VM 选项，以将`com.jdojo.reflect`模块添加到默认的根模块集合中。\n\
    \n**图 4-11.** 在 NetBeans 运行时将`com.jdojo.reflect`模块添加到默认的根模块集合中\n\n图 [4-12](#index_split_002.html#102)\
    \ 显示了在将`com.jdojo.reflect`模块添加到默认的根模块集合后，运行时的模块图。\n\n```\ncom.jdojo.reflect.test\n\
    \    |\n    v\ncom.jdojo.reflect\n    |\n    v\njava.base\n```\n\n**图 4-12.**\
    \ 将`com.jdojo.reflect`模块添加到默认的根模块集合后的模块图\n\n另一种解析`com.jdojo.reflect`模块的方法是在`com.jdojo.reflect.test`模块的声明中添加一条`requires\
    \ com.jdojo.reflect;`语句。这样，`com.jdojo.reflect`模块将作为`com.jdojo.reflect.test`模块的依赖项被解析。如果你使用这个选项，则不需要使用`--add-modules`选项。\n\
    \n在 NetBeans 中重新运行`ReflectTest`类。你也可以使用以下命令来运行它：\n\n```\nC:\\Java9Revealed>java\n\
    --module-path com.jdojo.reflect\\dist;com.jdojo.reflect.test\\dist\n--add-modules\
    \ com.jdojo.reflect\n--module com.jdojo.reflect.test/com.jdojo.reflect.test.ReflectTest\n\
    ```\n\n访问`s`时出错：无法使字段`private static int com.jdojo.reflect.Item.s`可访问：模块`com.jdojo.reflect`未向模块`com.jdojo.reflect.test`“打开`com.jdojo.reflect`”\n\
    \n访问`t`时出错：无法使字段`static int com.jdojo.reflect.Item.t`可访问：模块`com.jdojo.reflect`未向模块`com.jdojo.reflect.test`“打开`com.jdojo.reflect`”\n\
    \n访问`u`时出错：无法使字段`protected static int com.jdojo.reflect.Item.u`可访问：模块`com.jdojo.reflect`未向模块`com.jdojo.reflect.test`“打开`com.jdojo.reflect`”\n\
    \n访问`v`时出错：无法使字段`public static int com.jdojo.reflect.Item.v`可访问：模块`com.jdojo.reflect`未向模块`com.jdojo.reflect.test`“导出`com.jdojo.reflect`”"
  raw: 'The ReflectTest class is simple. In its main() method, it uses the Class.forName()
    method to load the com.jdojo.reflect.Item class and attempts to print the value
    of all four static fields of the class.


    You can load a class from any module using the Class.forName() method if the class
    is available at runtime. The class does not have to be necessarily accessible
    using module dependency—exports and requires statements. You might question this
    rule. Doesn’t it violate the strong encapsulation premise of the module system?
    How can you load a class from any module without the owning module exporting the
    package containing that class? It is allowed because you are loading the class
    descriptor (the Class object) of the class. Knowing the class descriptor does
    not mean that you can also create objects of that class and access members of
    the class. Strong encapsulation is about accessing only those types of a module
    that are exported or opened, not about loading a class descriptor.


    Let’s run the ReflectTest class. It will generate the following error:


    Exception in thread "main" java.lang.ClassNotFoundException: com.jdojo.reflect.Item
    at java.base/jdk.internal.loader.BuiltinClassLoader.loadClass


    (BuiltinClassLoader.java:532)


    at java.base/jdk.internal.loader.ClassLoaders$AppClassLoader.loadClass


    (ClassLoaders.java:186)


    at java.base/java.lang.ClassLoader.loadClass(ClassLoader.java:473)


    at java.base/java.lang.Class.forName0(Native Method)


    at java.base/java.lang.Class.forName(Class.java:292)


    at com.jdojo.reflect.test/com.jdojo.reflect.test.ReflectTest.main


    (ReflectTest.java:12)


    The error message is stating that a ClassNotFoundException was thrown when an
    attempt was made to load the com.jdojo.reflect.Item class. Didn’t I say that you
    should be able load the class? My previous statement is still correct. This error
    stems from another problem.


    When you attempt to load a class, the module containing the class must be known
    to the module system. If you received a ClassNotFoundException before JDK 9, it
    indicated that class is not in the class path. You would add the directory or
    the JAR that contains the class to the class path and the error will be resolved.
    In JDK 9, modules are found using the module path. So, let’s add the com.jdojo.reflect
    module on the module path and then run the ReflectTest class. In NetBeans, you
    need to add the com.jdojo.


    reflect project into the module path of the com.jdojo.reflect.test module using
    the properties dialog box, as shown in Figur[e 4-9.](#index_split_002.html#100)


    ![](index-100_1.jpg)


    Chapter 4 ■ Module dependenCy


    ***Figure 4-9.** Adding the com.jdojo.reflect project to the module path of the
    com.jdojo.reflect.test project in* *NetBeans*


    You can also run the ReflectTest class using the following command, assuming that
    you have built both projects in NetBeans and the projects’ dist directories contain
    modular JARs:


    C:\Java9Revealed>java


    --module-path com.jdojo.reflect\dist;com.jdojo.reflect.test\dist


    --module com.jdojo.reflect.test/com.jdojo.reflect.test.ReflectTest


    Running the ReflectTest class in NetBeans and on the command prompt returns the
    same


    ClassNotFoundException as before. So, it looks like adding the com.jdojo.reflect
    module to the module path did not help. But that is not entirely true. In fact,
    this step helped, but it solved only half of the problem.


    We need to understand and solve the other half, which is the module graph.


    The module path in JDK 9 sounds similar to the class path, but they work differently.
    A module path is used to locate modules during module resolution—when the module
    graph is built and augmented. The class path is used to locate a class whenever
    a class needs to be loaded. To provide a reliable configuration, the module system
    makes sure all required dependencies for modules are present at startup. Once
    your application is started, all needed modules are resolved and adding more modules
    to the module path after the module resolution is over does not help. When you
    run the ReflectTest class—keeping both com.


    jdojo.reflect and com.jdojo.reflect.test modules on the module path—the module
    graph looks as shown in Figure [4-10.](#index_split_002.html#101)


    ![](index-101_1.jpg)


    ![](index-101_2.jpg)


    Chapter 4 ■ Module dependenCy


    ***Figure 4-10.** The module graph when the ReflectTest class is run*


    When you run a class from a module—as you are doing when you are running the ReflectTest
    class—


    the module that contains the main class is the only module used as the root. The
    module graph contains all modules that the main module depends on and their dependencies.
    In this case, the com.jdojo.reflect.


    test module is the only module in the default set of root modules and the module
    system has no clue about the existence of the com.jdojo.reflect module, even though
    the module is placed on the module path. What do you need to do so the com.jdojo.reflect
    module is included in the module graph? Add this module to the default set of
    root modules by using the --add-modules command-line VM option. The value to this
    option is a comma-separated list of modules to be added to the default set of
    root modules:


    --add-modules <module1>,<module2>...


    Figur[e 4-11 sho](#index_split_002.html#101)ws the Properties dialog box for the
    com.jdojo.reflect.test project in NetBeans with the VM option you need to use
    to add the com.jdojo.reflect module to the default set of root modules.


    ***Figure 4-11.** Adding the com.jdojo.reflect module to the default set of root
    modules at runtime in NetBeans* 80


    Chapter 4 ■ Module dependenCy


    Figur[e 4-12 sho](#index_split_002.html#102)ws the module graph at runtime after
    you add the com.jdojo.reflect module to the default set of root modules.


    com.jdojo.reflect.test


    com.jdojo.reflect


    java.base


    ***Figure 4-12.** The module graph after adding the com.jdojo.reflect module to
    the default set of root modules* Another way of resolving the com.jdojo.reflect
    module is to add a requires com.jdojo.reflect; statement in the declaration of
    the com.jdojo.reflect.test module. This way, the com.jdojo.reflect module will
    be resolved as a dependency of the com.jdojo.reflect.test module. If you use this
    option, you do not need to use the --add-modules option.


    Rerun the ReflectTest class in NetBeans. You can also use the following command
    to run it:


    C:\Java9Revealed>java


    --module-path com.jdojo.reflect\dist;com.jdojo.reflect.test\dist


    --add-modules com.jdojo.reflect


    --module com.jdojo.reflect.test/com.jdojo.reflect.test.ReflectTest


    Accessing s. Error: Unable to make field private static int com.jdojo.reflect.Item.s


    accessible: module com.jdojo.reflect does not "opens com.jdojo.reflect" to module
    com.


    jdojo.reflect.test


    Accessing t. Error: Unable to make field static int com.jdojo.reflect.Item.t accessible:


    module com.jdojo.reflect does not "opens com.jdojo.reflect" to module com.jdojo.reflect.test
    Accessing u. Error: Unable to make field protected static int com.jdojo.reflect.Item.u


    accessible: module com.jdojo.reflect does not "opens com.jdojo.reflect" to module
    com.jdojo.


    reflect.test


    Accessing v. Error: Unable to make field public static int com.jdojo.reflect.Item.v


    accessible: module com.jdojo.reflect does not "exports com.jdojo.reflect" to module
    com.


