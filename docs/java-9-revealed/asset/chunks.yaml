    as a JAR and all types defined in it—we have only one, the `Welcome` class—were
    loaded as part of the unnamed module of the class loader. This is the reason why
    you get the module name as `null` in the output. How did the `java` command find
    the main class name? Recall that when you specify the main class name to the `jar`
    tool, the tool stores the main class name at two places:


    - In the `module-info.class` file

    - In the `META-INF/MANIFEST.MF` file


    This command reads the name of the main class from the `META-INF/MANIFEST.MF`
    file.


    You can also use the `java` command with the `--class-path` option to run the
    `Welcome` class. You can place the `lib\com.jdojo.intro-1.0.jar` modular on the
    class path and in that case it will be treated as a JAR and the `Welcome` class
    will be loaded in the unnamed module of the application class loader. You were
    used to run a class this way before JDK 9. The following command does the job:


    ```

    C:\Java9Revealed>java --class-path lib\com.jdojo.intro-1.0.jar

    com.jdojo.intro.Welcome

    Welcome to the Module System.

    Module Name: null

    ```


    ## Using the NetBeans IDE


    If you followed the previous sections on creating your first module using a command
    prompt, this section will be much easier to follow. In this section, I go through
    the steps to create your first module using the NetBeans IDE. Refer to Chapter
    [1](http://dx.doi.org/10.1007/978-1-4842-2592-9_1) on how to install the NetBeans
    IDE that supports JDK 9 development.


    From now onward, I will use NetBeans to write, program, compile, package, and
    run all programs.


    ### Configuring the IDE


    Start the NetBeans IDE. If you open the IDE for the first time, it shows a pane
    titled Start Page, as shown in Figure 3-1. If you do not want this to show again,
    you can uncheck the checkbox labeled Show On Startup, which is on the upper-right
    corner of the pane. You can close the Start Page pane by clicking the X in the
    pane’s header.


    **Figure 3-1.** The initial NetBeans IDE screen


    Select Tools ➤ Java Platforms to display the Java Platform Manager dialog box,
    as shown in Figure 3-2.


    I am running the NetBeans IDE on JDK 1.8, which is shown in the Platforms list.
    If you are running it on JDK 9, the JDK 9 will be shown in the Platforms list
    and you do not need any further configuration; you can skip to the next section.


    **Figure 3-2.** The Java Platform Manager dialog box


    If you see JDK 9 in the Platforms list, your IDE has been configured to use JDK
    9 and you can close the dialog box by clicking the Close button. If you do not
    see JDK 9 in the Platforms list, click the Add Platform button to open the Add
    Java Platform dialog box, as shown in Figure 3-3. Make sure that the Java Standard
    Edition radio button is selected. Click the Next button to display the platform
    folders, as shown in Figure 3-4.


    **Figure 3-3.** Select the platform type


    **Figure 3-4.** Select the platform folder


    From the Add Java Platform dialog box, select the directory in which the JDK 9
    is installed. I installed the JDK 9 in `C:\java9`, so I selected the `C:\java9`
    directory. Click the Next button. The Add Java Platform dialog box, as shown in
    Figure 3-5, is displayed. The Platform Name and Platform Sources fields are prefilled.


    **Figure 3-5.** The Add Java Platform dialog box


    Click the Finish button, which will bring you back to the Java Platform Manager
    dialog box showing JDK 9 as an item in the Platforms list as shown in Figure 3-6.
