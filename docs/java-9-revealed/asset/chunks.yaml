    JVM 消息在记录之前可以附加额外的信息片段。这些额外的信息片段被称为*装饰器*，它们会被添加到消息的开头。每个装饰器都用方括号——[ 和 ]——括起来。表
    19-2 列出了所有装饰器及其长名称和短名称。你可以在 `-Xlog` 选项中使用长名称或短名称。


    ***表 19-2.** 装饰器及其长名称和短名称*


    **长名称**


    **短名称**


    **描述**


    hostname


    hn


    计算机名称


    level


    l


    消息的严重级别


    pid


    p


    进程标识符


    tags


    tg


    与消息关联的所有标签


    tid


    ti


    线程标识符


    time


    t


    ISO-8601 格式的当前时间和日期


    （例如，2017-02-10T18:42:58.418+0000）


    timemillis


    tm


    以数字表示的当前时间（毫秒），其值


    与 `System.currentTimeMillis()` 生成的值相同


    timenanos


    tn


    以数字表示的当前时间（纳秒），其值


    与 `System.nanoTime()` 生成的值相同


    uptime


    u


    自 JVM 启动以来的时间，以秒和


    毫秒表示（例如，9.219s）


    uptimemillis


    um


    自 JVM 启动以来的毫秒数


    uptimenanos


    un


    自 JVM 启动以来的纳秒数


    utctime


    utc


    UTC 格式的当前时间和日期（例如，2017-02-


    10T12:42:58.418-0600）


    ■ **提示** 你可以使用名为 `none` 的特殊装饰器与 `-Xlog` 选项一起使用来关闭装饰器。装饰器的默认值是 `uptime,level,tags`，按此顺序排列。


    第 19 章 ■ 平台与 JVM 日志记录


    消息输出目标


    你可以指定三个目标之一来发送 JVM 日志：


    • `stdout`


    • `stderr`


    • `file=<文件名>`


    使用 `stdout` 和 `stderr` 值分别将 JVM 日志打印到标准输出和标准错误。默认的输出目标是 `stdout`。


    使用 `file` 值来指定一个文本文件名，将日志发送到文本文件。你可以在文件名中使用 `%p` 和 `%t`，它们会分别扩展为 JVM 的 PID 和启动时间戳。例如，如果你使用
    `-Xlog` 选项将 `file=jvm%p_%t.log` 指定为输出目标，那么每次运行 JVM 时，消息都会被记录到一个文件名类似如下的文件中：


    • `jvm2348_2017-02-10_13-26-05.log`


    • `jvm7292_2017-02-10_13-26-06.log`


    每次启动 JVM 时，都会创建一个类似列表中所示的日志文件。这里，2348 和 7292 是两次运行时 JVM 的 PID。


    ■ **提示** 如果输出目标不是 `stdout` 和 `stderr`，则表明输出目标是文本文件。你可以直接使用 `jvm.log` 作为输出目标，而不必使用
    `file=jvm.log`。


    你可以为将输出发送到文本文件指定额外的选项：


    • `filecount=<文件数量>`


    • `filesize=<文件大小>`


    这些选项用于控制每个日志文件的最大大小和日志文件的最大数量。考虑以下选项：


    `file=jvm.log::filesize=1M,filecount=3`


    注意使用了两个连续的冒号 (::)。我将在下一节解释它们。此选项使用 `jvm.log` 作为日志文件。日志文件的最大大小为 1M（1 MB），日志文件的最大数量为
    3。


    它将创建四个日志文件：`jvm.log`、`jvm.log.0`、`jvm.log.1` 和 `jvm.log.2`。当前消息记录到 `jvm.log` 文件中，当当前文件中的记录消息超过
    1MB 时，其他三个文件会进行轮转。你可以使用 `K` 表示千字节，`M` 表示兆字节来指定文件大小。如果你指定了文件大小但没有包含 `K` 或 `M` 后缀，则该选项会假定单位为字节。


    `-Xlog` 语法


    以下是使用 `-Xlog` 选项的语法：


    `-Xlog[:<内容>][:[<输出>][:[<装饰器>][:<输出选项>]]]`


    与 `-Xlog` 一起使用的选项由冒号 (`:`) 分隔。所有选项都是可选的。如果 `-Xlog` 中的前面部分缺失，你必须为该部分使用一个冒号。例如，`-Xlog::stderr`
    表示所有部分都使用默认值，除了 `<输出>` 部分被指定为 `stderr`。


    第 19 章 ■ 平台与 JVM 日志记录


    `-Xlog` 最简单的用法如下，它会将所有 JVM 消息记录到标准输出：

    `java -Xlog --module-path com.jdojo.intro\dist --module com.jdojo.intro/com.jdojo.intro.Welcome`


    有两个特殊的 `-Xlog` 选项：`help` 和 `disable`，可以分别使用 `-Xlog:help` 来打印 `-Xlog` 的帮助信息，以及
    `-Xlog:disable` 来禁用所有 JVM 日志记录。你可能会认为，与其使用 `-Xlog:disable`，不如根本不使用 `-Xlog` 选项。你是对的。然而，`disable`
    选项的存在另有原因。`-Xlog` 选项可以在同一条命令中多次使用。如果多次出现的 `-Xlog` 包含相同类型的设置，则最后一次出现的 `-Xlog` 中的设置生效。


    因此，你可以先指定 `-Xlog:disable` 作为第一个选项，然后再指定另一个 `-Xlog` 来开启特定类型的日志记录。这样，你首先关闭所有默认设置，然后指定你感兴趣的选项。


    `<内容>` 部分指定了要记录的消息的标签和严重级别。其语法如下：


    `tag1[+tag2...][*][=level][,...]`


    `<内容>` 部分中的 `+` 表示逻辑与。例如，`gc+exit` 表示记录所有标签集恰好包含两个标签——`gc` 和 `exit` 的消息。标签名称末尾的
    `*` 用作通配符，表示“至少”。例如，`gc*` 表示记录所有标签集至少包含 `gc` 的消息，这将记录标签集为 `[gc]`、`[gc,exit]`、`[gc,remset,exit]`
    等的消息。如果你使用 `gc+exit*`，则表示记录所有标签集至少包含 `gc` 和 `exit` 标签的消息，这将记录标签集为 `[gc,exit]`、`[gc,remset,exit]`
    等的消息。你可以为每个要记录的标签名称指定严重级别。例如，`gc=trace` 记录所有标签集仅包含 `gc` 且严重级别为 `trace` 或更高的消息。你可以指定多个条件，用逗号分隔。例如，`gc=trace,heap=error`
    将记录所有标签集为 `gc` 且级别为 `trace` 或更高，或者标签集为 `heap` 且级别为 `error` 的消息。


    我将向你展示使用不同条件记录 JVM 消息的命令。显示的输出来自我的计算机。当你运行这些命令时，可能会得到不同的输出。以下命令指定了 `gc` 和 `startuptime`
    作为标签，其他设置保留默认值：


    `C:\Java9Revealed>java -Xlog:gc,startuptime --module-path com.jdojo.intro\dist
    --module com.jdojo.intro/com.jdojo.intro.Welcome`


    `[0.017s][info][startuptime] StubRoutines generation 1, 0.0002258 secs`

    `[0.022s][info][gc ] Using G1`

    `[0.022s][info][startuptime] Genesis, 0.0045639 secs`

    `...`


    使用 `-Xlog` 等同于使用 `-Xlog:all=info:stdout:uptime,level,tags`。它将所有严重级别为 `info` 或更高的消息记录到
    `stdout`，并带有装饰器 `uptime`、`level` 和 `tags`。以下命令向你展示如何使用默认设置获取 JVM 日志。显示部分输出：


