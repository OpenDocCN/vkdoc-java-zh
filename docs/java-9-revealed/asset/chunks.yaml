- fmt: '# 类加载器架构


    附加引导类加载器的目录。你可以使用`-Xbootclasspath`选项指定引导类路径，这将替换默认的引导类路径。在运行时，`sun.boot.class.path`系统属性包含引导类路径的只读值。JDK
    通过`null`表示该类加载器。


    也就是说，你无法获取它的引用。例如，`Object`类由引导类加载器加载，表达式`Object.class.getClassLoader()`将返回`null`。


    扩展类加载器用于加载通过扩展机制可用的类，这些类位于`java.ext.dirs`系统属性指定的目录中的JAR文件中。要获取扩展类加载器的引用，你需要获取应用程序类加载器的引用，并在该引用上调用`getParent()`方法。


    应用程序类加载器从`CLASSPATH`环境变量或命令行选项`-cp`或`-classpath`指定的应用程序类路径加载类。应用程序类加载器也被称为*系统类加载器*，这个名称有些用词不当，因为它错误地暗示它加载系统类。你可以使用`ClassLoader`类的静态方法`getSystemClassLoader()`获取应用程序类加载器的引用。


    JDK 9 为了向后兼容，保留了三级层次结构的类加载器架构。然而，在它们从模块系统加载类的方式上有一些变化。图[8-4](#index_split_003.html#189)展示了JDK
    9的类加载器层次结构。


    - 引导类加载器

    - 平台类加载器

    - 应用程序类加载器


    ***图8-4.** JDK 9中的类加载器层次结构*


    请注意，在JDK 9中，应用程序类加载器可以委托给平台类加载器以及引导类加载器；平台类加载器可以委托给引导类加载器和应用程序类加载器。以下文本详细描述了JDK
    9类加载器的工作方式。


    在JDK 9中，引导类加载器在库代码和虚拟机中都有实现。为了向后兼容，它在程序中仍然由`null`表示。例如，`Object.class.getClassLoader()`仍然返回`null`。然而，并非所有Java
    SE平台和JDK模块都由引导类加载器加载。举几个例子，由引导类加载器加载的模块包括`java.base`、`java.logging`、`java.prefs`和`java.desktop`。其他Java
    SE平台和JDK模块由接下来描述的平台类加载器和应用程序类加载器加载。用于指定引导类路径的选项`-Xbootclasspath`和`-Xbootclasspath/p`，以及系统属性`sun.boot.class.path`，在JDK
    9中不再支持。`-Xbootclasspath/a`选项仍然支持，其值存储在名为`jdk.boot.class.path.append`的系统属性中。


    JDK 9不再支持扩展机制。然而，它保留了扩展类加载器，并赋予了一个新名称，称为*平台类加载器*。`ClassLoader`类包含一个新的静态方法`getPlatformClassLoader()`，该方法返回平台类加载器的引用。表[8-2](#index_split_003.html#190)包含了由平台类加载器加载的模块列表。平台类加载器还有另一个用途。默认情况下，由引导类加载器加载的类被授予所有权限。然而，有些类并不需要所有权限。这些类在JDK
    9中已被降权，并由平台类加载器加载，以提高安全性。


