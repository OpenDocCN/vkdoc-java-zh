    Installing the NetBeans IDE


    If you want to compile and run all programs in this book, you need to have an
    integrated development environment (IDE) such as NetBeans or Eclipse installed
    on your computer. At the time of this writing, no IDE fully supports the module
    system in JDK 9\. I used the daily latest builds of NetBeans to write all the
    programs for this book. Currently, NetBeans supports creating one module per NetBeans
    project. That is, if you want to create three Java modules in NetBeans, you need
    to create three NetBeans Java project. One Java module can refer to other Java
    modules using project dependencies in NetBeans. Currently, NetBeans does not support
    multi-module Java projects. You can find the latest information on support for
    the module system in NetBeans at the wiki page: [http://wiki.netbeans.org/JDK9Support.](http://wiki.netbeans.org/JDK9Support)


    You can download the latest daily build of NetBeans supporting JDK 9 from the
    following link:


    [http://bits.netbeans.org/download/trunk/nightly/latest/](http://bits.netbeans.org/download/trunk/nightly/latest/).


    There are many types of downloads on this page. The smallest one is less than
    100MB and it is for Java SE. This download will work for you, except for Chapter
    [14](http://dx.doi.org/10.1007/978-1-4842-2592-9_14), which uses a web application.
    You need the Java EE version of NetBeans to run all the examples in Chapter [14](http://dx.doi.org/10.1007/978-1-4842-2592-9_14).


    NetBeans will run on top of JDK 8 as well as JDK 9\. I suggest installing JDK
    9 before installing NetBeans.


    If you have multiple JDKs, currently NetBeans picks up JDK 8 by default. You need
    to point the NetBeans installation to the JDK 9 installation directory for it
    to use JDK 9 by default. If you have installed NetBeans on top of JDK 8, in Chapt[er
    3](http://dx.doi.org/10.1007/978-1-4842-2592-9_3), I describe a step-by-step process
    for using JDK 9 as the Java platform for your projects inside the NetBeans IDE.
    Throughout the book, I included screenshots of the NetBeans windows and images
    to assist you in using it to write your programs and configure the IDE to compile
    and run Java 9


    programs.


    Before you start playing with the Java 9 code, make sure you install NetBeans
    or any other IDE that supports the module system in JDK 9.


