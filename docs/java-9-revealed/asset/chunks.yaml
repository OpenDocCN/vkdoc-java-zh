    \ an unexpected runtime error because the API it uses no longer exists. Issuing\
    \ a warning at the use-site will give its maintainers a chance to plan for alternatives\
    \ in case the terminally deprecated API goes away before the code at use-sites.\n\
    \n## Suppressing Deprecation Warnings\n\nIntroduction of removal warnings in JDK\
    \ 9 has added a new use-case for suppressing deprecation warnings.\n\nBefore JDK\
    \ 9, could suppress all deprecation warnings by annotating the use-site with a\
    \ `@SuppressWarnings(\"deprecation\")` annotation. Consider a scenario:\n\n- In\
    \ JDK 8, an API is deprecated and the use-site suppresses the deprecation warning.\n\
    - In JDK 9, the API’s deprecation changes from ordinary deprecation to terminal\
    \ deprecation.\n- The use-site compiles fine in JDK 9 because it has suppressed\
    \ deprecation warnings in JDK 8.\n- The API is removed and the use-site receives\
    \ an unexpected runtime error without receiving any removal warning earlier.\n\
    \nTo cover such scenarios, JDK 9 does not suppress removal warnings when you use\
    \ `@SuppressWarnings(\"deprecation\")`. It suppresses only ordinary deprecation\
    \ warnings. To suppress removal warnings, you need to use `@SuppressWarnings(\"\
    removal\")`. If you want to suppress both ordinary and removal deprecation warnings,\
    \ you need to use `@SuppressWarnings({\"deprecation\", \"removal\"})`.\n\n## A\
    \ Deprecated API Example\n\nIn this section, I show you all use-cases of deprecating\
    \ APIs, using the deprecated API with and without suppressing warnings with a\
    \ simple example. In the example, I deprecate only methods and use them to generate\
    \ compile-time warnings. You are, however, not limited to deprecating only methods.\
