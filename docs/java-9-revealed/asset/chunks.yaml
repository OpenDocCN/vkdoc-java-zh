    A ModuleDescriptor is immutable. An unnamed module does not have a module descriptor.
    The getDescriptor() method of the Module class returns null for an unnamed module.
    The ModuleDescriptor class contains several nested classes, for example, the ModuleDescriptor.Requires
    nested class; each of them represents a module statement in programs.


    You can augment a module descriptor using command-line options and programmatically
    using the Module API. You can put all queries for a module’s properties in two
    categories: ones that may change after the module is loaded and ones that do not
    change after the module is loaded. The Module class contains methods for queries
    in the first category and the ModuleDescriptor class contains methods for queries
    in the second category.


    Chapter 10 ■ the Module apI


    You can update a module’s definition at runtime using one of the methods in the
    Module class: addExports(), addOpens(), addReads(), and addUses().


    You can use annotations on module declarations. The java.lang.annotation.ElementType
    enum has a new value called MODULE. You can use MODULE as a target type on an
    annotation declaration, which allows the annotation type to be used on modules.
    In Java 9, two annotations—java.lang.Deprecated and java.


    lang.SuppressWarnings—have been updated to be used on module declarations. Using
    these annotations on a module affects only the module declaration, not the types
    contained in the module.


    Modules are arranged into layers. A layer is a set of resolved modules with a
    function that maps each module to a class loader that is responsible for loading
    all types in that module. The set of resolved module is called a *configuration*.
    Layers are arranged hierarchically. A layer has at least one parent layer, except
    the *empty* layer, which, as its name suggests, contains no modules and primarily
    exists to serve as the parent layer for the *boot* layer. The boot layer is created
    by the JVM at startup by resolving the application’s initial modules (the root
    modules) against a set of observable modules. You can create custom layers. Layers
    allow multiple versions of the same module to be loaded into different layers
    and used in the same JVM.


    **CHAPTER 11**


    **The Java Shell**


    In this chapter, you will learn:


    • What the Java shell is


    • What the JShell tool and the JShell API are


    • How to configure the JShell tool


    • How to use the JShell tool to evaluate snippets of Java code


    • How to use the JShell API to evaluate snippets of Java code


    What Is the Java Shell?


    The Java shell, which is called JShell in JDK 9, is a command-line tool that provides
    an interactive way to access the Java programming language. It lets you evaluate
    snippets of Java code instead of forcing you to write an entire Java program.
    It is a REPL (Read-Eval-Print loop) for Java. JShell is also an API that you can
    use to develop an application to provide the same functionality as the JShell
    command-line tool.


    **R**ead-**E**val-**P**rint loop (REPL) is a command-line tool (also known as
    interactive language shell) that lets users evaluate snippets of code quickly
    without having to write a complete program. The name REPL comes from the three
    primitive functions in Lisp—read, eval, and print—used in a loop. The read function
    reads the user input and parses into a data structure; the eval function evaluates
    the parsed user input to yield a result; the print function prints the result.
    After the result is printed, the tool is ready to accept user input again, hence
    triggering a read-eval-print loop. The term REPL is used for an interactive tool
    that lets you interact with a programming language. Figure [11-1](#index_split_004.html#267)
    shows a conceptual diagram for a REPL. A UNIX shell or a Windows command prompt
    acts like a REPL that reads an operating system command, executes it, prints the
    output, and waits to read another command.


    Eval


    Start


    Read


    Print


    Exit


    ***Figure 11-1.** A conceptual diagram for a read-eval-print loop*


    © Kishori Sharan 2017


    K. Sharan, *Java 9 Revealed*, DOI 10.1007/978-1-4842-2592-9_11


    Chapter 11 ■ the Java Shell


    Why was JShell included in JDK 9? One of the main reasons to include it in JDK
    9 was the feedback from academia that has a steep learning curve. Other programming
    languages such as Lisp, Python, Ruby, Groovy, and Clojure have been supporting
    REPL for a long time. Just to write a “Hello, world!” program in Java, you have
    to resort to an Edit-Compile-Execute loop (ECEL) that involves writing a full
    program, compiling it, and execute it. If you need to make a change, you must
    repeat these steps. Apart from some other housekeeping work such as defining the
    directory structure, compiling, and executing the program, the following is the
    minimum you have to write to print a “Hello, world!” message using the modular
    Java program in JDK 9:


    // module-info.java


    module HelloWorld {


    }


    // HelloWorld.java


    package com.jdojo.intro;


    public class HelloWorld {


    public static void main(String[] args) {


    System.out.println("Hello, world!");


    }


    }


    This program, when executed, prints a message on the console: “Hello, world!”.
    Writing a full program to evaluate a simple expression such as this is overkill.
    This was the main reason academia was moving away from teaching Java as the initial
    programming language to students. Java designers listened to the feedback from
    teaching communities and introduced the JShell tool in JDK 9\. To achieve the
    same as this program, you need to write only one line of code on a jshell command
    prompt:


    jshell> System.out.println("Hello, world!")


    Hello, world!


    jshell>


    The first line is the code you enter on the jshell command prompt; the second
    line is the output. After printing the output, the jshell prompt returns and you
    can enter another expression to evaluate.


    ■ **Tip**


    JShell is not a new language or a new compiler. It is a tool and an apI used to
    access the Java programming language interactively. For beginners, it provides
    a way to explore the Java programming language quickly. For experienced developers,
    it provides a quick way to see results of a code snippet without having to compile
    and run an entire program. It also provides a way to quickly develop a prototype
    using an incremental approach. You add a snippet of code, get immediate feedback,
    and add another snippet code until your prototype is complete.


    JDK 9 ships with a JShell command-line tool and the JShell API. All features supported
    by the tool are also supported by the API. That is, you can run snippets of code
    using the tool or programmatically using the API. You should be able to distinguish
    between the two using the context in this discussion. Most of the chapter is devoted
    to explaining the tool. At the end, I include a section describing the API with
    an example.


    Chapter 11 ■ the Java Shell


    The JShell Architecture


    The Java compiler does not recognize snippets such as method declarations or variable
    declarations by themselves. Only classes and import statements can be top-level
    constructs, which can exist by themselves.


    Other types of snippets have to be part of a class. JShell lets you execute snippets
    of Java code and lets you evolve them.


    The guiding principle for the current JShell architecture is to use the existing
    Java language support and other Java technologies in the JDK to keep it compatible
    with the current and future versions of the language. As the Java language evolves
    over time, so will its support of JShell with little or no modification to the
    JShell implementation. Figure [11-2 sho](#index_split_004.html#269)ws the high-level
    architecture of JShell.


