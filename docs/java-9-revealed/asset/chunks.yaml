- fmt: "在 JDK 8 中，`Stream`接口有两个方法：`skip(long count)`和`limit(long count)`。\n\n`skip()`方法返回跳过开头指定数量元素后的流中剩余元素。`limit()`方法返回从流开头开始、数量不超过指定值的元素。这两个方法中，一个从开头丢弃元素，另一个从开头获取元素并丢弃剩余部分。两者都基于元素数量工作。`dropWhile()`和`takeWhile()`方法分别类似于`skip()`和`limit()`方法；然而，新方法基于`Predicate`（谓词）而非元素数量工作。\n\
    \n© Kishori Sharan 2017\n\nK. Sharan, *Java 9 Revealed*, DOI 10.1007/978-1-4842-2592-9_18\n\
    \n第 18 章 ■ Stream API 更新\n\n你可以将这些方法视为与`filter()`方法类似，但有一个例外。`filter()`方法对所有元素评估谓词，而`dropWhile()`和`takeWhile()`方法从流开头开始评估谓词，直到谓词失败为止。\n\
    \n对于有序流，`dropWhile()`方法返回流中的元素，丢弃开头那些指定谓词为真的元素。考虑以下有序整数流：\n\n`1, 2, 3, 4, 5, 6,\
    \ 7`\n\n如果你在`dropWhile()`方法中使用一个谓词，该谓词对小于 5 的整数返回`true`，那么该方法将丢弃前四个元素并返回剩余部分：\n\
    \n`5, 6, 7`\n\n对于无序流，`dropWhile()`方法的行为是非确定性的。它可能会选择丢弃任何匹配谓词的子集元素。当前实现会从开头丢弃匹配的元素，直到遇到不匹配的元素。\n\
    \n`dropWhile()`方法有两种极端情况。如果第一个元素不匹配谓词，该方法返回原始流。如果所有元素都匹配谓词，该方法返回一个空流。\n\n`takeWhile()`方法的工作方式与`dropWhile()`方法相同，区别在于它返回流开头匹配的元素并丢弃剩余部分。\n\
    \n■ **提示** 在有序的并行流中使用`dropWhile()`和`takeWhile()`方法时要格外小心，因为你可能会遇到性能损失。在有序的并行流中，这些方法返回结果之前，必须对所有线程中的元素进行排序并返回。这些方法在顺序流中性能最佳。\n\
    \n`ofNullable(T t)`方法返回一个包含指定元素的单元素流（如果该元素非空）。如果指定元素为`null`，则返回一个空流。此方法在流处理中使用`flatMap()`方法时非常有用。考虑以下值可能为`null`的映射：`Map<Integer,\
    \ String> map = new HashMap<>();`\n\n`map.put(1, \"One\");`\n\n`map.put(2, \"\
    Two\");`\n\n`map.put(3, null);`\n\n`map.put(4, \"four\");`\n\n你如何获取此映射中排除`null`的值集合？也就是说，你如何从这个映射中获取包含`\"\
    One\"`、`\"Two\"`和`\"Four\"`的集合？以下是在 JDK 8 中的实现方式：\n\n```java\n// In JDK 8\nSet<String>\
    \ nonNullvalues = map.entrySet()\n    .stream()\n    .flatMap(e -> e.getValue()\
    \ == null ? Stream.empty() : Stream.of(e.getValue()))\n    .collect(toSet());\n\
    ```\n\n第 18 章 ■ Stream API 更新\n\n注意在`flatMap()`方法的 lambda 表达式中使用了三元运算符。在 JDK 9\
    \ 中，你可以使用`ofNullable()`方法使这个表达式更简洁：\n\n```java\n// In JDK 9\nSet<String> nonNullvalues\
    \ = map.entrySet()\n    .stream()\n    .flatMap(e -> Stream.ofNullable(e.getValue()))\n\
    \    .collect(toSet());\n```\n\n新的`iterate(T seed, Predicate<? super T> hasNext,\
    \ UnaryOperator<T> next)`方法允许你使用初始种子值并迭代应用指定的`next`函数来创建一个顺序的（可能是无限的）流。当指定的`hasNext`谓词返回`false`时，迭代停止。调用此方法等同于使用一个`for`循环：\n\
    \n```java\nfor (T n = seed; hasNext.test(n); n = next.apply(n)) {\n    // n is\
    \ the element added to the stream\n}\n```"
