    The /env command without arguments prints values for the current execution context.
    The -classpath option sets the class path. The -module-path option sets the module
    path. The -add-modules option adds modules to the default set of root modules,
    so they can be resolved. You can use special values—ALL-DEFAULT, ALL-SYSTEM, and
    ALL-MODULE-PATH—with the -add-modules option to resolve the modules. Refer to
    Chapt[er 2](http://dx.doi.org/10.1007/978-1-4842-2592-9_2) for the meanings of
