    ## 创建自定义反馈模式


    四种预配置的反馈模式足以满足`jshell`的使用需求。它们提供了不同级别的粒度来定制您的`jshell`。您也可以拥有自己的自定义反馈模式。虽然我怀疑您是否需要自定义反馈模式，但如果您需要，该功能是存在的。创建自定义反馈模式稍微复杂一些，您需要编写几个自定义步骤。大多数情况下，您可能只想在预定义反馈模式中自定义少数项目。您可以从头创建自定义反馈模式，或者通过复制现有反馈模式并选择性自定义来创建。创建自定义反馈模式的语法如下：


    `/set mode <mode> [<old-mode>] [-command|-quiet|-delete]`


    其中，`<mode>`是自定义反馈模式的名称，例如`kverbose`。`<old-mode>`是现有反馈模式的名称，其设置将被复制到新模式。使用`-command`选项会在设置模式时显示模式信息，而使用`-quiet`选项则在设置模式时不显示任何信息。`-delete`选项用于删除模式。


    以下命令通过复制预定义的`verbose`反馈模式的所有设置，创建一个名为`kverbose`的新反馈模式：


    `/set mode kverbose verbose -command`


    以下命令将持久化名为`kverbose`的新反馈模式以供将来使用：


    `/set mode kverbose -retain`


    您需要使用`-delete`选项来删除自定义反馈模式。您无法删除预定义的反馈模式。如果您已持久化自定义反馈模式，可以使用`-retain`选项将其从当前和所有未来会话中删除。以下命令将删除`kverbose`反馈模式：


    `/set mode kverbose -delete -retain`


    此时，预定义的`verbose`模式和自定义的`kverbose`模式之间没有区别。创建反馈模式后，您需要自定义三个设置：


    - 提示符

    - 输出截断限制

    - 输出格式


    > **提示**：完成自定义反馈模式的定义后，您需要使用`/set feedback <new-mode>`命令来开始使用它。


    您可以为反馈设置两种类型的提示符——主提示符和续行提示符。主提示符在`jshell`准备读取新代码片段/命令时显示。续行提示符在您输入多行代码片段时显示在行首。设置提示符的语法如下：


    `/set prompt <mode> "<prompt>" "<continuation-prompt>"`


    其中，`<prompt>`是主提示符，`<continuation-prompt>`是续行提示符。


    以下命令为`kverbose`模式设置提示符：


    `/set prompt kverbose "\njshell-kverbose> " "more... "`'
