  raw: 'In this section, I show you how to use a Java interface as a service implementation.
    You will define another service provider for the PrimeChecker service interface.
    Let’s call this a *probable* prime service provider because it tells you that
    a number is probably a prime. This service provider will be defined in a separate
    module named com.jdojo.prime.probable and the service implementation interface
    is called ProbablePrimeChecker.


    The service is about checking for a prime number. The BigInteger class in the
    java.math package contains a method called isProbablePrime(int certainty). If
    the method returns true, the number may be a prime. If the method returns false,
    the number is certainly not a prime. The certainty parameter determines the degree
    to which the method makes sure the number is prime before returning true. The
    higher the value of the certainty parameter, the higher the cost this method incurs
    and the higher the probability that the number is a prime when the method returns
    true.


    Listing [5-7](#index_split_002.html#138) contains the module declaration, which
    is similar to the ones we had before for the other two modules. This time, only
    the class/interface name in the with clause has changed.


    ***Listing 5-7.*** The Module Declaration for the com.jdojo.prime.probable Module


    // module-info.java


    module com.jdojo.prime.probable {


    requires com.jdojo.prime;


    provides com.jdojo.prime.PrimeChecker


    with com.jdojo.prime.probable.ProbablePrimeChecker;


    }


    The requires statement in the module declaration will require you to add the com.jdojo.prime
    project to the module path of the com.jdojo.prime.probable project in NetBeans,
    so the com.jdojo.prime module is found on the module path. Listin[g 5-8 con](#index_split_002.html#138)tains
    the code for the ProbablePrimeChecker class.


    ***Listing 5-8.*** An Implementation Interface Named ProbablePrimeChecker for
    the PrimeChecker Interface Used as a Service Provider


    // ProbablePrimeChecker.java


    package com.jdojo.prime.probable;


    import com.jdojo.prime.PrimeChecker;


    import java.math.BigInteger;


    public interface ProbablePrimeChecker {


    // A provider method


    public static PrimeChecker provider() {


    final String PROVIDER_NAME = "jdojo.probable.primechecker";


    return new PrimeChecker() {


    @Override


    public boolean isPrime(long n) {


    // Use 1000 for high certainty, which is an arbitrary big number I chose


    int certainty = 1000;


    return BigInteger.valueOf(n).isProbablePrime(certainty);


    }


    Chapter 5 ■ ImplementIng ServICeS


    @Override


    public String getName() {


    return PROVIDER_NAME;


    }


    };


    }


    }


    The ProbablePrimeChecker interface consists of only one method, which is a provider
    method:


    public static PrimeChecker provider() {/*...*/}


    When the ServiceLoader class needs to instantiate the probable prime service,
    it will call this method.


    The method is very simple—it creates and returns an instance of the PrimeChecker
    interface. The isPrime() method uses the BigInteger class to check whether the
    number is a probable prime. The name of the provider is jdojo.probable.primechecker.
    Note that the interface does not extend the PrimeChecker interface. To be a service
    implementation, its provider method must return an instance of the service interface
    (the PrimeChecker interface) or its subtype. By declaring the return type of the
    provider method as PrimeChecker, you have fulfilled this requirement.


    That’s all you have for this module. To compile this module, you need to add the
    com.jdojo.prime module to the module path. Compile and package this module as
    a modular JAR. At this point, there is nothing to test.


    Testing the Prime Service


    In this section, you will test the service by creating a client application, which
    will be defined in a separate module named com.jdojo.prime.client. Listin[g 5-9
    con](#index_split_002.html#139)tains the module declaration.


    ***Listing 5-9.*** The Module Declaration for the com.jdojo.prime.client Module


    // module-info.java


    module com.jdojo.prime.client {


    requires com.jdojo.prime;


    }


    The client module needs to know only about the service interface. In this case,
    the com.jdojo.prime module defines the service interface. Therefore, the client
    module reads the service interface module and nothing else. In a real world, the
    client module will be much more complex than this and it may read other modules
    as well. In NetBeans, for the com.jdojo.prime.client module for compile, you need
    to add the com.jdojo.prime project to its module path. Figure [5-3](#index_split_002.html#140)
    shows the module graph for the com.jdojo.prime.


    client module.


    ![](index-140_1.jpg)


