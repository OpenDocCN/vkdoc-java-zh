    ## Rerunning Previous Snippets


    In a command-line tool like `jshell`, you’ll often want to rerun previous snippets.
    You can use the Up/Down arrows to navigate through the snippet/command history
    and then press the Enter key when you are on a previous snippet/command. You can
    also use one of the three commands to rerun previous snippets (not commands):


    - `/!`

    - `/<snippet-id>`

    - `/-<n>`


    The `/!` command reruns the last snippet. The `/<snippet-id>` command reruns the
    snippet identified by `<snippet-id>`. The `/-<n>` command reruns the nth last
    snippet. For example, `/-1` reruns the last snippet, `/-2` reruns the second last
    snippet, and so on. The `/!` and `/-1` commands have the same effect—they both
    rerun the last snippet.


    ## Declaring Variables


    You can declare variables in `jshell` as you do in Java programs. A variable declaration
    may occur at the top-level, inside a method, or as a field declaration within
    a class. The `static` and `final` modifiers are not allowed in top-level variable
    declarations. If use them, they will be ignored with a warning. The `static` modifier
    specifies a class context and the `final` modifier restricts you from changing
    the variable’s value.


    You are not allowed to use these modifiers because the tool allows you to declare
    free-standing variables that you would like to experiment with by changing their
    values over time. The following examples show you how to declare variables:


    ```

    c:\Java9Revealed>jshell


    | Welcome to JShell -- Version 9-ea


    | For an introduction type: /help intro


    jshell> int x


    x ==> 0


    jshell> int y = 90


    y ==> 90


    jshell> side = 90


    | Error:

    | cannot find symbol

    | symbol:   variable side

    | side = 90

    | ^--^


    jshell> static double radius = 2.67


    | Warning:

    | Modifier ''static'' not permitted in top-level declarations, ignored

    | static double radius = 2.67;

    | ^----^


    radius ==> 2.67


    jshell> String str = new String("Hello")


    str ==> "Hello"


    jshell>

    ```


    Using an undeclared variable in top-level expressions generates an error. Notice
    the use of an undeclared variable named `side` in the previous example, which
    generated an error. I show you later that you can use an undeclared variable inside
    a method’s body.


    It is also possible to change the data type of a variable. You can declare a variable
    named `x` as an `int` and re-declare it later as a `double` or a `String`. The
    following examples show this feature:


    ```

    jshell> int x = 10;


    x ==> 10


    jshell> int y = x + 2;


    y ==> 12


    jshell> double x = 2.71


    x ==> 2.71


    jshell> y


    y ==> 12


    jshell> String x = "Hello"


    x ==> "Hello"


    jshell> y


    y ==> 12


    jshell>

    ```


    Notice that the value of the variable named `y` did not change or was not reevaluated
    when the data type or the value of `x` changed.


    You can also drop a variable using the `/drop` command, which takes the variable
    name as an argument. The following command will drop the variable named `x`:


    ```

    jshell> /drop x

    ```'
