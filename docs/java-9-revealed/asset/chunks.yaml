    如果你使用类路径运行此应用程序，如何修复此错误？请使用 `--add-open` 命令行选项进行修复：


    C:\Java9Revealed>java --add-opens java.base/java.lang=ALL-UNNAMED


    --class-path com.jdojo.intruder\dist\com.jdojo.intruder.jar com.jdojo.intruder.


    TestManifestAttributes


    Long.serialVersionUID=4290774380558885855


    摘要


    JDK 9 的主要目标之一是将模块中的类型和资源封装起来，并仅导出那些公共类型允许被其他模块访问的包。有时，你可能需要打破模块指定的封装性，以便进行白盒测试或使用不受支持的
    JDK 内部 API 或库。这可以通过在编译时和运行时使用非标准命令行选项来实现。提供这些选项的另一个原因是向后兼容性。


    JDK 9 提供了两个命令行选项：`--add-exports` 和 `--add-opens`，它们允许你打破模块声明中定义的封装。`--add-exports`
    选项允许你在编译时和运行时将模块中未导出的包导出给其他模块。`--add-opens` 选项允许你在运行时将模块中未开放的包开放给其他模块进行深度反射。这些选项的值格式为
    `<源模块>/<包>=<目标模块列表>`，其中 `<源模块>` 是将 `<包>` 导出或开放给 `<目标模块列表>` 的模块，`<目标模块列表>` 是一个以逗号分隔的目标模块名称列表。你可以使用
    `ALL-UNNAMED` 作为目标模块列表的特殊值，表示将这些包导出或开放给所有未命名模块。


    在可执行 JAR 的清单文件的主节中，可以使用两个名为 `Add-Exports` 和 `Add-Opens` 的新属性。使用这些属性的效果与使用同名命令行选项相同，不同之处在于这些属性将指定的包导出或开放给所有未命名模块。这些属性的值是一个以空格分隔的、由斜杠分隔的模块名/包名对列表。例如，在可执行
    JAR 的清单文件主节中添加 `Add-Opens: java.base/java.lang` 条目，将把 `java.base` 模块中的 `java.lang`
    包开放给所有未命名模块。


    在测试和调试期间，有时需要让一个模块读取另一个模块，而第一个模块在其声明中没有使用 `requires` 语句来读取第二个模块。这可以通过使用 `--add-reads`
    命令行选项来实现，其值的格式为 `<源模块>=<目标模块列表>`。`<源模块>` 是其定义被更新以读取 `<目标模块列表>` 中指定模块列表的模块，`<目标模块列表>`
    是一个以逗号分隔的目标模块名称列表。目标模块列表的特殊值 `ALL-UNNAMED` 使源模块读取所有未命名模块。


    **第 10 章**


    **模块 API**


    在本章中，你将学习：


    • 什么是模块 API


    • 如何在程序中表示模块和模块描述符


    • 如何在程序中读取模块描述符


    • 如何表示模块的版本


    • 如何使用 `Module` 和 `ModuleDescriptor` 类读取模块的属性


    • 如何在运行时使用 `Module` 类更新模块的定义


    • 如何创建可用于模块的注解以及如何读取模块上使用的注解


    • 什么是模块层和配置


    • 如何创建自定义模块层并将模块加载到其中


    什么是模块 API？


    模块 API 由一些类和接口组成，它们让你能够以编程方式访问模块。使用该 API，你可以以编程方式：


    • 读取、修改和构建模块描述符


    • 加载模块


    • 读取模块的内容


    • 搜索已加载的模块


    • 创建新的模块层


    模块 API 很小。它由大约 15 个类和接口组成，分布在两个包中：


    • `java.lang`


    • `java.lang.module`


    © Kishori Sharan 2017


    K. Sharan, *Java 9 Revealed*, DOI 10.1007/978-1-4842-2592-9_10


    第 10 章 ■ 模块 API

