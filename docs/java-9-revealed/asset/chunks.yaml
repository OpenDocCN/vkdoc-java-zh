    K. Sharan, *Java 9 Revealed*, DOI 10.1007/978-1-4842-2592-9_6


    第 6 章 ■ 打包模块


    什么是多版本 JAR？

    '
- fmt: '作为一名经验丰富的 Java 开发者，你一定使用过诸如 Spring 框架、Hibernate 等 Java 库/框架。你可能正在使用 Java 8，但这些库可能仍在使用
    Java 6 或 Java 7。为什么库开发者不利用最新版 JDK 的新特性呢？原因之一是并非所有库用户都使用最新的 JDK。将库更新到较新版本的 JDK
    意味着强制所有库用户迁移到该新版本 JDK，这在实践中是不可行的。在打包代码时，针对不同 JDK 维护和发布库是另一个痛点。通常，你会为不同的 JDK 找到单独的库
    JAR。JDK 9 通过为库开发者提供一种打包库代码的新方式解决了这个问题——使用一个单一的 JAR 来包含同一库版本对多个 JDK 的支持。


    这样的 JAR 被称为**多版本 JAR**（multi-release JAR）。


    一个多版本 JAR（MRJAR）包含同一库版本（提供相同的 API）对多个 JDK 版本的支持。也就是说，你可以拥有一个作为 MRJAR 的库，它同时适用于
    JDK 8 和 JDK 9。MRJAR 中的代码将包含在 JDK 8 和 JDK 9 下编译的类文件。使用 JDK 9 编译的类可以利用 JDK 9 提供的
    API，而使用 JDK 8 编译的类则提供使用 JDK 8 编写的相同库 API。


    MRJAR 扩展了 JAR 已有的目录结构。一个 JAR 包含一个根目录，其中存放所有内容。它还包含一个 `META-INF` 目录，用于存储关于该 JAR
    的元数据。


    通常，一个 JAR 包含一个 `META-INF/MANIFEST.MF` 文件，其中包含其属性。一个典型 JAR 中的条目如下所示：


    - `jar-root`

    - `C1.class`

    - `C2.class`

    - `C3.class`

    - `C4.class`

    - `META-INF`

    - `MANIFEST.MF`


    该 JAR 包含四个类文件和一个 `MANIFEST.MF` 文件。MRJAR 扩展了 `META-INF` 目录，用于存储特定于某个 JDK 版本的类。`META-INF`
    目录包含一个 `versions` 子目录，该子目录下可能包含多个子目录——每个子目录以 JDK 主版本号命名。例如，对于特定于 JDK 9 的类，可能存在
    `META-INF/versions/9` 目录；对于特定于 JDK 10 的类，可能存在名为 `META-INF/versions/10` 的目录，以此类推。一个典型的
    MRJAR 可能包含以下条目：


    - `jar-root`

    - `C1.class`

    - `C2.class`

    - `C3.class`

    - `C4.class`

    - `META-INF`

    - `MANIFEST.MF`

    - `versions`

    - `C2.class`

    - `C5.class`

    - `C1.class`

    - `C2.class`

    - `C6.class`


    如果此 MRJAR 在不支持 MRJAR 的环境中使用，它将被视为一个常规 JAR——将使用根目录中的内容，而 `META-INF/versions/9`
    和 `META-INF/versions/10` 中的所有其他内容将被忽略。因此，如果此 MRJAR 与 JDK 8 一起使用，则只会使用四个类：`C1`、`C2`、`C3`
    和 `C4`。


    当此 MRJAR 在 JDK 9 中使用时，有五个类参与：`C1`、`C2`、`C3`、`C4` 和 `C5`。将使用 `META-INF/versions/9`
    目录中的 `C2` 类，而不是根目录中的 `C2` 类。在这种情况下，MRJAR 表明它为 JDK 9 提供了一个更新版本的 `C2` 类，该版本覆盖了根目录中为
    JDK 8 或更早版本提供的 `C2` 版本。JDK 9 版本还添加了一个名为 `C5` 的新类。


    类似地，对于 JDK 10 版本，该 MRJAR 覆盖了类 `C1` 和 `C2`，并包含一个名为 `C6` 的新类。


    在单个 MRJAR 中针对多个 JDK 版本时，MRJAR 中的搜索过程与常规 JAR 不同。在 MRJAR 中搜索资源或类文件时，使用以下规则：


    - 确定使用该 MRJAR 的环境的 JDK 主版本。假设 JDK 的主版本为 `N`。

    - 要定位名为 `R` 的资源或类文件，将从版本 `N` 的目录开始，在 `META-INF/versions` 目录下搜索特定于平台的子目录。

    - 如果在子目录 `N` 中找到 `R`，则返回它。否则，继续搜索更低版本的子目录。'
  raw: 'As an experienced Java developer, you must have used a Java library/framework
    such as Spring framework, Hibernate, etc. You may be using Java 8, but those libraries
    may be still using Java 6 or Java 7. Why can’t the library developers use the
    latest version to take advantage of the JDK’s new features? One of the reasons
    is that not all library users use the latest JDK. Updating a library to use the
    newer version of the JDK means forcing all library users to migrate to that newer
    JDK, which is not possible in practice. Maintaining and releasing a library targeting
    different JDKs is another pain when packaging the code. Typically, you will find
    a separate library JAR for different JDKs. JDK 9 solves this problem by offering
    library developers a new way of packaging a library’s code—using a single JAR
    containing the same release of a library for multiple JDKs.


    Such a JAR is called a *multi-release JAR*.


    A multi-release JAR (MRJAR) contains the same release of a library (offering the
    same APIs) for multiple JDK versions. That is, you can have a library as a MRJAR
    that will work for JDK 8 and JDK 9\. The code in the MRJAR will contain the class
    files compiled in JDK 8 and JDK 9. The classes compiled with JDK 9 may take advantage
    of the APIs offered by JDK 9, whereas the classes compiled with JDK 8 may offer
    the same library APIs written using JDK 8.


    A MRJAR extends the already existing directory structure for a JAR. A JAR contains
    a root directory where all its contents reside. It contains a META-INF directory
    that is used to store metadata about the JAR.


    Typically, a JAR contains a META-INF/MANIFEST.MF file containing its attributes.
    Entries in a typical JAR look like this:


    - jar-root


    - C1.class


    - C2.class


    - C3.class


    - C4.class


    - META-INF


    - MANIFEST.MF


    The JAR contains four class files and a MANIFEST.MF file. A MRJAR extends the
    META-INF directory to store classes that are specific to a JDK version. The META-INF
    directory contains a versions sub-directory, which may contain many sub-directories—each
    of them named the same as the JDK major version. For example, for classes specific
    to JDK 9, there may be the META-INF/versions/9 directory and, for classes specific
    to JDK 10, there may be a directory called META-INF/versions/10, etc. A typical
    MRJAR may have the following entries:


    - jar-root


    - C1.class


    - C2.class


    - C3.class


    - C4.class


    - META-INF


    - MANIFEST.MF


    - versions


    - C2.class


    - C5.class


    - C1.class


    - C2.class


    - C6.class


    Chapter 6 ■ paCkaging Modules


    If this MRJAR is used in an environment that does not support MRJARs, it will
    be treated as a regular JAR—the contents in the root directory will be used and
    all other contents in META-INF/versions/9 and META-INF/versions/10 will be ignored.
    So, if this MRJAR is used with JDK 8, only four classes will be used: C1, C2,
    C3, and C4.


    When this MRJAR is used in JDK 9, five classes are in play: C1, C2, C3, C4, and
    C5\. The C2 class in the META-INF/versions/9 directory will be used instead of
    the C2 class from the root directory. In this case, the MRJAR is saying that it
    has a newer version of the C2 class for JDK 9 that overrides the version of C2
    in the root directory that is for JDK 8 or earlier. The JDK 9 version also adds
    a new class named C5.


    With a similar argument, the MRJAR overrides classes C1 and C2 and contains a
    new class named C6 for the JDK version 10.


    Targeting multiple JDK versions in a single MRJAR, the search process in a MRJAR
    is different from a regular JAR. The search for a resource or class file in a
    MRJAR uses the following rules:


    • The major version of the JDK is determined for the environment in which the
    MRJAR


    is being used. Suppose the major version of the JDK is N.


    • To locate a resource or a class file named R, the platform-specific sub-directory


    under the META-INF/versions directory is searched starting at the directory for


    version N.


    • If R is found in sub-directory N, it is returned. Otherwise, sub-directories
    for versions'
