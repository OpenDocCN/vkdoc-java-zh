- fmt: '`main()`方法中，编译器会生成三个弃用警告——每个对已弃用的`StringBufferInputStream`类的使用都会产生一个警告，而JDK
    9只会生成两个弃用警告——不包括对导入语句的警告。


    ## 摘要


    Java中的弃用是一种提供API生命周期信息的方式。弃用一个API会告知其用户迁移，因为该API使用起来很危险、存在更好的替代方案，或者它将在未来版本中被移除。使用已弃用的API会在编译时生成弃用警告。


    `@deprecated` Javadoc标签和`@Deprecated`注解一起用于弃用API元素，例如模块、包、类型、构造方法、方法、字段、参数和局部变量。


    在JDK 9之前，该注解不包含任何元素。它在运行时被保留。


    JDK 9为该注解添加了两个元素：`since`和`forRemoval`。`since`元素默认为空字符串。其值表示API元素被弃用的API版本。`forRemoval`元素的类型为`boolean`，默认为`false`。其值为`true`表示该API元素将在未来版本中被移除。


    JDK 9编译器会根据`@Deprecated`注解的`forRemoval`元素的值生成两种类型的弃用警告：当`forRemoval=false`时生成*普通弃用警告*，当`forRemoval=true`时生成*移除警告*。


    在JDK 9之前，你可以通过在已弃用API的使用位置添加`@SuppressWarnings("deprecation")`注解来抑制弃用警告。在JDK 9中，你需要使用`@SuppressWarnings("deprecation")`来抑制普通警告，使用`@SuppressWarnings("removal")`来抑制移除警告，并使用`@SuppressWarnings({"deprecation",
    "removal"})`来抑制两种类型的警告。


    在JDK 9之前，使用`import`语句导入已弃用的构造方法会生成编译时弃用警告。JDK 9省略了此类警告。


    ## 第16章 栈遍历


    在本章中，你将学习：


    - 什么是栈和栈帧

    - 如何在JDK 9之前遍历线程的栈

    - 如何在JDK 9中使用`StackWalker` API遍历线程的栈

    - 如何在JDK 9中获取调用者的类


    ### 什么是栈？


    JVM中的每个线程都有一个*私有*的JVM栈，该栈在线程创建时同时创建。栈是一种后进先出（LIFO）数据结构。栈存储帧。每次调用方法时，都会创建一个新帧并将其推送到栈顶。当方法调用完成时，帧被销毁（从栈中弹出）。栈上的每个帧都包含自己的局部变量数组，以及自己的操作数栈、返回值和指向当前方法类运行时常量池的引用。


    JVM的特定实现可能会扩展帧以存储更多信息。


    JVM栈上的一个帧表示给定线程中的一次Java方法调用。在给定线程中，任何时刻只有一个帧处于活动状态。活动帧称为*当前帧*，其方法称为*当前方法*。定义当前方法的类称为*当前类*。当当前方法调用另一个方法时，该帧不再是当前帧——一个新帧被推送到栈上，执行中的方法成为当前方法，新帧成为当前帧。当方法返回时，旧帧再次成为当前帧。有关JVM栈和帧的更多详细信息，请参阅Java虚拟机规范：[https://docs.oracle.com/javase/specs/jvms/se8/html/index.html](https://docs.oracle.com/javase/specs/jvms/se8/html/index.html)。


    > **提示** 如果JVM支持本地方法，线程还包含一个本地方法栈，其中包含每个本地方法调用的本地方法帧。'
