    From the Project Properties dialog box, select the Run node in the Categories
    list. Enter com.jdojo.intro.Welcome as the value for the Main Class (see Figure
    [3-24). C](#index_split_001.html#76)lick OK to close the dialog box.


    ![](index-76_1.jpg)


    Chapter 3 ■ Creating Your First Module


    ***Figure 3-24.** Configuring your NetBeans project to run*


    Once your project is configured to run, you can select Run ➤ Run Project or press
    F6 to run your project. Running your project will run the main class you have
    specified in the project’s run configuration.


    Summary


    Developing a Java application using a module does not change the way Java types
    are arranged into packages. The source code for a module contains a module-info.java
    file at the root of the package hierarchy. That is, the module-info.java file
    is placed in the unnamed package. It contains the module declaration.


    The javac compiler, the jar tool, and the java launcher have been enhanced in
    JDK 9 to work with modules. The javac compiler accepts new options such as --module-path
    used to locate application modules, --module-source-path to locate module’s source
    code, and --module-version to specify the version of the module being compiled.
    The jar tool lets you specify the main class and module version for a modular
    JAR using the --main-class and --module-version options, respectively. The java
    launcher can be run in class path mode, module mode, or mixed mode. To run a class
    in a module, you need to specify the module path using the --module-path option.
    You need to specify the main class name using the --module option. The main class
    is specified in the form <module>/<main-class> where <module> is the module that
    contains the main class and <main-class> is the fully qualified name of the class
    containing the main() method serving as the entry point for the application.


    In JDK 9, every type belongs to a module. If a type is loaded from the class path,
    it belongs to an unnamed module of the class loader that loads it. In JDK 9, every
    class loader maintains an unnamed module whose members are all types loaded by
    that class loader from the class path. A type loaded from the module path belongs
    to the module in which it was defined.


    Chapter 3 ■ Creating Your First Module


    An instance of the Module class represents a module at runtime. The Module class
    is in the java.lang package. Use the Module class to know everything about a module
    at runtime. The Class class has been enhanced in JDK 9\. Its getModule() method
    returns a Module instance representing the module this class is a member of. The
    Module class contains a getName() method that returns the name of the module as
    a String; for an unnamed module, the method returns null.


    The NetBeans IDE is being updated to support JDK 9 and developing modular Java
    applications. At the time of this writing, NetBeans allows you to create modules,
    compile them, package them in modular JARs, and run them from within the IDE.
    You need to create a separate Java project for a module. Its final release will
    allow you to have multiple modules in one Java project. The IDE has support for
    adding the module-info.java file. The IDE has a very cool feature that allows
    you to view and save module graphs!


    **CHAPTER 4**


    **Module Dependency**


    In this chapter, you will learn:


    • How to declare module dependency


    • What an implicit readability of a module means and how to declare it


    • The difference between unqualified and qualified exports


    • Declaring runtime optional dependency of a module


    • How to open an entire module or its selected packages for deep reflection


    • Accessibility types in JDK 9


    • Splitting packages across modules


    • Restrictions on module declarations


    • Different types of modules: named, unnamed, explicit, automatic, normal,


    and open modules


    • How to dissemble a module’s definition using the javap tool


    The example code in this chapter goes through several steps. The source code for
    this book contains the code used in the final step. If you want to see those examples
    in action at every step as you read through this chapter, you need to modify the
    source code a bit to keep it in sync with the step you are working on.


    Declaring Module Dependency


    If a module needs to use public types contained in another module, the second
    module needs to export the package containing the types and the first module needs
    to read the second module. Note that the dependency declarations in two modules
    are asymmetric—the type-provider module exports the *package* containing the types
    whereas the type-user module reads the *module*.


    Suppose you have two modules named com.jdojo.address and com.jdojo.person. The
    com.jdojo.


    address module contains a package named com.jdojo.address, which contains a class
    named Address.


    The com.jdojo.person module wants to use the Address class from the com.jdojo.address
    module.


    Figur[e 4-1 sho](#index_split_001.html#79)ws the module graph for the com.jdojo.person
    module. Let’s walk through the steps to develop these modules.


    © Kishori Sharan 2017


    K. Sharan, *Java 9 Revealed*, DOI 10.1007/978-1-4842-2592-9_4


    ![](index-79_1.jpg)


    Chapter 4 ■ Module dependenCy


    ***Figure 4-1.** The module graph for the com.jdojo.person module*


    In NetBeans, you can create two Java projects named com.jdojo.address and com.jdojo.person.
    Each project will contain the code for a module with the same name as the project.
    Listin[g 4-1 and L](#index_split_001.html#79)isting [4-2 con](#index_split_001.html#79)tain
    the module declaration and the code for the Address class. The Address class is
    a simple class with four fields and their getters and setters. I set the default
    values for these fields, so you don’t have to type them in all examples.


    ***Listing 4-1.*** The Module Declaration for the com.jdojo.address Module


    // module-info.java


    module com.jdojo.address {


    // Export the com.jdojo.address package


    exports com.jdojo.address;


    }


    ***Listing 4-2.*** The Address Class


    // Address.java


    package com.jdojo.address;


    public class Address {


    private String line1 = "1111 Main Blvd.";


    private String city = "Jacksonville";


    private String state = "FL";


    private String zip = "32256";


    public Address() {


    }


    public Address(String line1, String line2, String city,


    String state, String zip) {


    this.line1 = line1;


    this.city = city;


    this.state = state;


    this.zip = zip;


    }


