- fmt: '# Creating Your First Module


    ## Defining a Module in NetBeans


    In this section, I show you how to define a module named `com.jdojo.intro` in
    your NetBeans project. To add a module definition, you need to add a file named
    `module-info.java` to the project. Right-click on the project node and select
    **New** from the menu, as shown in Figure [3-14](#index_split_001.html#69). If
    you see a **Java Module Info** menu item, select that. Otherwise, select **Other**,
    which will display the **New File** dialog box, as shown in Figure [3-15](#index_split_001.html#69).


    ![](index-69_1.jpg)

    ![](index-69_2.jpg)


    ***Figure 3-14.** Adding a module definition to a project*

    ***Figure 3-15.** The New File dialog box to add Java module info*


    Select **Java** from the **Categories** list and **Java Module Info** from the
    **File Types** list. Click the **Next** button, which will display the **New Java
    Module Info** dialog box. Click the **Finish** button to finish creating the module''s
    definition. A `module-info.java` file containing the module declaration is added
    to your project, as shown in Figure [3-16](#index_split_001.html#70). The `module-info.java`
    file is added to the root of the source code directory and in the **Projects**
    file tree it is shown under the `<default-package>` item.


    ![](index-70_1.jpg)

    ![](index-70_2.jpg)


    ***Figure 3-16.** The `module-info.java` file opened in the Editor*


    The name of the module given by NetBeans is, by default, the same as the name
    of the project. The dots are removed and the initial letter of each part of the
    name is now in uppercase. Recall that you had given `com.jdojo.intro` as the project
    name and this is why the module name in the `module-info.java` file is `ComJdojoIntro`.
    Change the module name to `com.jdojo.intro`, as shown in Figure [3-17](#index_split_001.html#70).
    Listing [3-1](#index_split_001.html#53) contains the module declaration, which
    is practically the same when you used the command prompt in the previous section.


    ***Figure 3-17.** The `module-info.java` file with `com.jdojo.intro` as the module
    name*


    ![](index-71_1.jpg)


    ## Viewing Module Graph


    The NetBeans IDE lets you view a module graph. Open the `module-info.java` file
    for a module in the Editor and select the **Graph** tab in the Editor to view
    the module graph. The module graph for the `com.jdojo.intro` module is shown in
    Figure [3-18](#index_split_001.html#71).


    ***Figure 3-18.** The module graph for the `com.jdojo.intro` module*


    You can zoom in and zoom out the module graph, change its layout, and save it
    as an image. Right-click in the graph area for these graph-related options. You
    can select a node in the graph to view only dependencies edges ending with or
    going from the node. You can also rearrange the module graph by moving the nodes
    around.


    You can select the **Source** tab in the Editor when the `module-info.java` file
    is open to edit the source code of the module declaration.


    ## Writing the Source Code


    In this section, you will add a `Welcome` class to the `com.jdojo.intro` project.
    The class will reside in the `com.jdojo.intro` package. From the right-click menu
    of the project node, select **New ➤ Java Class**, which will open the **New Java
    Class** dialog box, as shown in Figure [3-19](#index_split_001.html#72). Enter
    `Welcome` as the **Class Name** and `com.jdojo.intro` as the **Package**. Click
    the **Finish** button to close the dialog box.


    ![](index-72_1.jpg)

    ![](index-72_2.jpg)


    ***Figure 3-19.** Adding a `Welcome` class to the project*


    Listing [3-2](#index_split_001.html#54) contains the complete code for the `Welcome`
    class, which is the same when you were using a command prompt in the previous
    section. In NetBeans, replace the IDE-generated code of the `Welcome` class with
    the code in Listing [3-2](#index_split_001.html#54). Figure [3-20](#index_split_001.html#72)
    shows the source code for the `Welcome` class in the Editor.


    ***Figure 3-20.** The source code for the `Welcome` class in the Editor*


    ![](index-73_1.jpg)


    ## Compiling the Source Code


    When you are using the NetBeans IDE, your Java source files are compiled automatically
    when you save them. You can save source files by choosing **File ➤ Save** or by
    pressing `Ctrl+S`. You can turn off the **Save on Compile** feature for your project
    on the **Project Properties** page by unselecting the **Compile on Save** checkbox,
    as shown in Figure [3-21](#index_split_001.html#73). By default, this checkbox
    is selected. You can access this dialog box by right-clicking on the project node
    and selecting **Properties** and then selecting **Categories ➤ Build ➤ Compiling**.


