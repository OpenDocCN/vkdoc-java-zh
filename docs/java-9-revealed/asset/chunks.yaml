- fmt: "# Module System in Java\n\n## Open Packages\n\nAn `opens` statement grants\
    \ reflective access to the specified package to all modules or a list of specified\
    \ modules at runtime. Other modules can access all types in the specified package\
    \ and all members (private and public) of those types using reflection. The `opens`\
    \ statement takes the following forms:\n\n- `opens <package>;`\n- `opens <package>\
    \ to <module1>, <module2>...;`\n\nExamples of using the `opens` statement are\
    \ as follows:\n\n```java\nmodule M {\n    opens com.jdojo.claim.model;\n    opens\
    \ com.jdojo.policy.model to core.hibernate;\n    opens com.jdojo.services to core.spring;\n\
    }\n```\n\n**Tip:** Compare the effects of the `exports` and `opens` statements.\
    \ The `exports` statement lets you access only *the public API* of the specified\
    \ package at *compile-time* and *runtime*, whereas the `opens` statement lets\
    \ you access *public* and *private* members of all types in the specified package\
    \ using *reflection* at *runtime*.\n\nIf a module needs to access public types\
    \ from another module at compile-time and private members of types in the same\
    \ at runtime using reflection, the second module can export and open the same\
    \ package as shown:\n\n```java\nmodule N {\n    exports com.jdojo.claim.model;\n\
    \    opens com.jdojo.claim.model;\n}\n```\n\nYou will come across three phrases\
    \ when reading about modules:\n\n- A module `M` exports a package `P`\n- A module\
    \ `M` opens a package `Q`\n- A module `M` contains a package `R`\n\nThe first\
    \ two phrases correspond to the `exports` and `opens` statements in a module.\
    \ The third phrase means that the module contains a package named `R` that is\
    \ neither exported nor opened. In the early design of the module system, the third\
    \ situation was phrased as \"A module `M` *conceals* a package `R`\".\n\n## Declaring\
    \ Dependency\n\nA `requires` statement declares dependence of the current module\
    \ to another module. A `requires N` statement in a module named `M` means that\
    \ the module `M` depends on (or reads) the module `N`. The statement takes the\
    \ following forms:\n\n- `requires <module>;`\n- `requires transitive <module>;`\n\
    - `requires static <module>;`\n- `requires transitive static <module>;`\n\nThe\
    \ `static` modifier in a `requires` statement makes the dependence mandatory at\
    \ compile-time, but is optional at runtime. A `requires static N` statement in\
    \ a module named `M` means that the module `M` depends on the module `N` and the\
    \ module `N` must be present at compile-time in order to compile the module `M`;\
    \ however, the presence of module `N` at runtime in order to use module `M` is\
    \ optional. The `transitive` modifier in a `requires` statement causes any module,\
    \ which depends on the current module to have implicit dependence on the module\
    \ specified in the `requires` statement. Suppose there are three modules `P`,\
    \ `Q`, and `R`. Suppose the module `Q` contains a `requires transitive R` statement.\
    \ If the module `P` contains a `requires Q` statement, it means that the module\
    \ `P` implicitly depends on the module `R`.\n\n## Configuring Services\n\nJava\
    \ allows using a service provider mechanism in which service providers and service\
    \ consumers are decoupled. JDK 9 allows you to implement services using the `uses`\
    \ and `provides` module statements.\n\nA `uses` statement specifies the name of\
    \ a *service interface* that the current module may discover and load using the\
    \ `java.util.ServiceLoader` class. It takes the following form:\n\n`uses <service-interface>;`\n\
    \nAn example of using a `uses` statement is as follows:\n\n```java\nmodule M {\n\
    \    uses com.jdojo.prime.PrimeChecker;\n}\n```\n\nHere, `com.jdojo.prime.PrimeChecker`\
    \ is a service interface whose implementation classes will be provided by other\
    \ modules. The module `M` will discover and load the implementations of this interface\
    \ using the `java.util.ServiceLoader` class.\n\nA `provides` statement specifies\
    \ one or more service provider implementation classes for a service interface.\
    \ It takes the following form:\n\n```java\nprovides <service-interface>\n    with\
    \ <service-impl-class1>, <service-impl-class2>...;\n```\n\nAn example of using\
    \ the `provides` statement is as follows:\n\n```java\nmodule N {\n    provides\
    \ com.jdojo.prime.PrimeChecker\n        with com.jdojo.prime.generic.GenericPrimeChecker;\n\
    }\n```\n\nIt is possible for the same module to provide service implementations\
    \ and discover and load the service. A module can also discover and load one kind\
    \ of service and provide implementation for another kind of service. The following\
    \ are a few examples:\n\n```java\nmodule P {\n    uses com.jdojo.CsvParser;\n\
    \    provides com.jdojo.CsvParser\n        with com.jdojo.CsvParserImpl;\n   \
    \ provides com.jdojo.prime.PrimeChecker\n        with com.jdojo.prime.generic.FasterPrimeChecker;\n\
    }\n```\n\n## Module Descriptors\n\nAfter learning about how to declare modules\
    \ in the previous section, you may have several questions about the source code\
    \ for a module declaration:\n\n- Where do you save a module declaration's source\
    \ code? Is it saved in a file? If so, what is the filename?\n- Where do you place\
    \ the module declaration source code file?\n- How is the source code for a module's\
    \ declaration compiled?\n\nI will answer these questions before I show you the\
    \ first modular program in action.\n\n### Compiling Module Declarations\n\nA module\
    \ declaration is stored in a file named `module-info.java`, which is stored at\
    \ the root of the source file hierarchy for that module. The Java compiler compiles\
    \ a module declaration to a file named `module-info.class`. The `module-info.class`\
    \ file is known as a *module descriptor* and it is placed at the root of the compiled\
    \ code hierarchy for the module. If you package the compiled code for a module\
    \ in a JAR file, the `module-info.class` file is stored at the root of the JAR\
    \ file.\n\nA module declaration does not contain executable code. In essence,\
    \ it contains configurations for a module. Why don't we keep a module declaration\
    \ in a text file in XML or JSON format instead of in a class file? The class file\
    \ was chosen as a module descriptor because a class file has an extensible, well-defined\
    \ format. A module descriptor contains the compiled form of a source-level module\
    \ declaration. It can be augmented by tools, e.g. the `jar` tool, to include additional\
    \ information in class file attributes after the module declaration is initially\
    \ compiled. The class file format also allows developers to use imports and annotations\
    \ in a module declaration.\n\n### Module Version\n\nIn the initial prototype of\
    \ the module system, a module declaration also included a module version. Including\
    \ the module version in the declaration made the implementation of the module\
    \ system complex, so the module version was dropped from the declaration.\n\n\
    The extensible format of the module descriptor (class file format) is exploited\
    \ to add a version to a module. When you package a module's compiled code into\
    \ a JAR, the `jar` tool provides an option to add the module's version, which\
    \ is finally added to the `module-info.class` file. I explain how to add information\
    \ to a module descriptor in [Chapter 3](http://dx.doi.org/10.1007/978-1-4842-2592-9).\n\
    \n### Module Source Files Structure\n\nLet's walk through an example of organizing\
    \ the source code and the compiled code for a module named `com.jdojo.contact`.\
    \ The module contains packages for working with contact information, such as addresses\
    \ and phone numbers. It contains two packages:\n\n- `com.jdojo.contact.info`\n\
    - `com.jdojo.contact.validator`\n\nThe `com.jdojo.contact.info` package contains\
    \ two classes—`Address` and `Phone`. The `com.jdojo.contact.validator` package\
    \ contains one interface named `Validator` and two classes called `AddressValidator`\
    \ and `PhoneValidator`. Figure 2-9 shows the contents of the `com.jdojo.contact`\
    \ module.\n\n```\ncom.jdojo.contact\n├── com.jdojo.contact.info\n│   ├── Address\n\
    │   └── Phone\n└── com.jdojo.contact.validator\n    ├── Validator\n    ├── AddressValidator\n\
    \    └── PhoneValidator\n```\n\n***Figure 2-9.** Contents of a module named `com.jdojo.contact`*"
