    在这种情况下，应用程序会打印一行或两行输出


    Server: 2016-12-16T07:15:04.586-


    然后永远等待。当你的客户端端点逻辑中


    06:00[America/Chicago]


    没有调用 `webSocket.request(1)` 时，就会发生这种情况。服务器正在发送


    消息，这些消息会被排队，因为你没有


    允许接收更多消息。在 `onOpen`、`onText` 和其他事件中调用 `request(n)`


    方法可以解决此问题。


    总结


    JDK 9 新增了 HTTP/2 客户端 API，让你可以在 Java 应用程序中处理 HTTP 请求和响应。该 API 提供了用于开发支持身份验证和 TLS
    的 WebSocket 客户端端点的类和接口。该 API 位于 `jdk.incubator.http` 包中，该包属于 `jdk.incubator.httpclient`
    模块。


    第 14 章 ■ HTTP/2 客户端 API


    三个抽象类 `HttpClient`、`HttpRequest` 和 `HttpResponse`，以及 `WebSocket` 接口是 HTTP/2 客户端
    API 的核心。这些类型的实例通过构建器创建。`HttpClient` 类是不可变的。`HttpClient` 类的实例存储可被多个 HTTP 请求复用的
    HTTP 连接配置。`HttpRequest` 类的实例代表一个 HTTP 请求。`HttpResponse` 类的实例代表从服务器接收到的 HTTP 响应。你可以同步或异步地发送和接收
    HTTP 请求和响应。


    `WebSocket` 接口的实例代表一个 WebSocket 客户端端点。与 WebSocket 服务器端点的通信是异步完成的。WebSocket API
    是基于事件的。


    你需要为 WebSocket 客户端端点指定一个监听器，它是 `WebSocket.Listener` 接口的实例。当端点上发生事件时，监听器会通过调用其相应方法得到通知，例如，当与对等方的打开握手成功完成时，会通过调用监听器的
    `onOpen()` 方法来通知监听器。该 API 支持与对等方交换文本和二进制消息。消息可以分部分交换。


    **第 15 章**


    **增强的弃用**


    在本章中，你将学习：


    • 如何弃用你的 API


    • `@deprecate` Javadoc 标签和 `@Deprecation` 注解在弃用 API 中的作用


    • 用于生成弃用警告的详细规则


    • JDK 9 中对 `@Deprecation` 注解的更新


    • JDK 9 中新的弃用警告


    • 如何使用 `@SuppressWarnings` 注解来抑制 JDK 9 中不同类型的弃用警告


    • 如何使用名为 `jdeprscan` 的静态分析工具扫描你编译后的代码库，以查找已弃用 JDK API 的使用


    什么是弃用？


    Java 中的弃用是一种提供 API 生命周期信息的方式。你可以弃用模块、包、类型、构造方法、方法、字段、参数和局部变量。当你弃用一个 API 时，你是在告诉它的用户：


    • 不要使用该 API，因为它很危险。


    • 迁移离开该 API，因为存在更好的替代品。


    • 迁移离开该 API，因为该 API 将在未来版本中被移除。


    如何弃用一个 API


    JDK 有两个用于弃用 API 的结构：


    • `@deprecated` Javadoc 标签


    • `@Deprecated` 注解


    © Kishori Sharan 2017

    K. Sharan, *Java 9 揭秘*, DOI 10.1007/978-1-4842-2592-9_15


    第 15 章 ■ 增强的弃用


    `@deprecated` Javadoc 标签是在 JDK 1.1 中添加的，它允许你利用 HTML 丰富的文本格式化功能来指定弃用的详细信息。`java.lang.Deprecated`
    注解类型是在 JDK 5.0 中添加的，它可以用于正在被弃用的 API 元素上。在 JDK 9 之前，该注解不包含任何元素。它在运行时被保留。


    `@deprecated` 标签和 `@Deprecated` 注解应该一起使用。两者都应存在或都不存在。`@Deprecation` 注解不允许你指定弃用的描述，因此你必须使用
    `@deprecated` 标签来提供描述。

