- fmt: "`ProcessHandle`接口的实例代表由Java程序或其他方式创建的进程；它是在Java 9中新增的，提供了多个查询和管理进程的方法。`ProcessHandle.Info`接口的实例代表进程的快照信息；可以通过`Process`类或`ProcessHandle`接口的`info()`方法获取。如果你有一个`Process`实例，可以使用它的`toHandle()`方法获取`ProcessHandle`。\n\
    \n`ProcessHandle`接口的`onExit()`方法返回一个`CompletableFuture<ProcessHandle>`，用于进程终止。你可以使用返回的对象添加一个在进程终止时执行的任务。请注意，你不能在当前进程上使用此方法。\n\
    \n如果安装了安全管理器，应用程序需要拥有`\"manageProcess\"`的`RuntimePermission`来查询和管理本地进程，并且需要拥有从Java代码启动的进程的命令文件的`\"\
    execute\"`的`FilePermission`。\n\n## 第13章\n\n## Collection API 更新\n\n在本章中，你将学习：\n\
    \n- 在JDK 9之前如何创建不可修改的列表、集合和映射，以及使用它们时存在的问题。\n- 如何使用JDK 9中`List`接口的`of()`静态工厂方法创建不可修改的列表。\n\
    - 如何使用JDK 9中`Set`接口的`of()`静态工厂方法创建不可修改的集合。\n- 如何使用JDK 9中`Map`接口的`of()`、`ofEntries()`和`entry()`静态工厂方法创建不可修改的映射。\n\
    \n### 背景\n\nCollection API 由类和接口组成，提供了一种存储和操作不同类型对象集合（如列表、集合和映射）的方式。它是在Java SE\
    \ 1.2中添加的。Java编程语言不支持集合字面量，而集合字面量是一种简单易用的声明和初始化集合的方式。集合字面量允许你通过以紧凑形式在表达式中指定集合的元素来创建特定类型的集合。集合字面量的一个例子是`List`字面量，它允许你创建一个包含两个整数100和200的列表，如下所示：\n\
    \n```\nList<Integer> list = [100, 200];\n```\n\n集合字面量紧凑且易于使用。它可以实现高效的内存使用，因为在创建时元素的数量是已知的。它可以被设置为不可变，从而使其线程安全。\n\
    \n在JDK 9之前，曾多次考虑在Java编程语言中包含集合字面量。Java设计者决定不向Java语言添加集合字面量，至少在JDK 9中不会。此时向Java添加集合字面量需要付出太多努力，而收益甚微。\n\
    \n他们决定通过更新Collection API来实现相同的目标，即向`List`、`Set`和`Map`接口添加静态工厂方法，这些方法可以轻松高效地创建小的、不可修改的集合。\n\
    \n现有的Collection API创建可变的集合。你可以通过将可变集合包装在另一个对象中来创建不可变（或不可修改）的集合，该对象只是原始可变对象的包装器。要在JDK\
    \ 8或更早版本中创建一个包含两个整数的不可修改的`List`，你通常使用以下代码片段：\n\n© Kishori Sharan 2017\nK. Sharan,\
    \ *Java 9 Revealed*, DOI 10.1007/978-1-4842-2592-9_13\n\n第13章 ■ Collection API\
    \ 更新\n\n```\n// 创建一个空的、可变的列表\nList<Integer> list = new ArrayList<>();\n\n// 向可变列表添加两个元素\n\
    list.add(100);\nlist.add(200);\n\n// 通过包装可变列表创建一个不可变的列表\nList<Integer> list2 =\
    \ Collections.unmodifiableList(list);\n```\n\n这种方法有一个严重的缺陷。不可修改的列表只是可修改列表的一个包装器。我故意保留了名为`list`的变量。你不能使用`list2`变量修改列表；但是，你仍然可以使用`list`变量修改列表，并且当你使用`list2`变量读取列表时，修改会反映出来。清单[13-1](#index_split_005.html#351)包含一个完整的程序，用于创建一个不可修改的`List`，并向你展示之后如何更改其内容。\n\
    \n***清单 13-1.*** 在JDK 9之前创建不可修改的列表\n\n```\n// PreJDK9UnmodifiableList.java\npackage\
    \ com.jdojo.collection;\n\nimport java.util.ArrayList;\nimport java.util.Collections;\n\
    import java.util.List;\n\npublic class PreJDK9UnmodifiableList {\n    public static\
    \ void main(String[] args) {\n        List<Integer> list = new ArrayList<>();\n\
    \        list.add(100);\n        list.add(200);\n        System.out.println(\"\
    list = \" + list);\n\n        // 创建一个不可修改的列表\n        List<Integer> list2 = Collections.unmodifiableList(list);\n\
    \        System.out.println(\"list2 = \" + list2);\n\n        // 让我们使用list添加一个元素\n\
    \        list.add(300);\n\n        // 使用名为list和list2的变量打印列表的内容\n        System.out.println(\"\
    list = \" + list);\n        System.out.println(\"list2 = \" + list2);\n    }\n\
    }\n```\n\n```\nlist = [100, 200]\nlist2 = [100, 200]\nlist = [100, 200, 300]\n\
    list2 = [100, 200, 300]\n```\n\n第13章 ■ Collection API 更新\n\n输出显示，只要你保留原始列表的引用，就可以更改其内容，而不可修改的列表实际上并不是不可修改的！解决此问题的方法是用新的不可修改列表的引用覆盖原始引用变量，如下所示：\n\
    \n```\nList<Integer> list = new ArrayList<>();\nlist.add(100);\nlist.add(200);\n\
    \n// 创建一个不可修改的列表并将其存储在list中\nlist = Collections.unmodifiableList(list);\n```\n\
