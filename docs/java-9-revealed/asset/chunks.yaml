    \ JVM 中的两个不同层中加载`com.jdojo.layer`模块的两个版本。为此模块的 2.0 版创建一个模块化 JAR，将其命名为`com.jdojo.layer.v2.jar`或任何你想要的名称，并将该模块化\
    \ JAR 放入`C:\\Java9Revealed\\customLib`目录。如果你将模块化 JAR 放在其他目录，则需要更改**清单 10-18**\
    \ 代码中的路径。\n\n测试层的程序位于名为`com.jdojo.layer.test`的模块中，其声明如**清单 10-17** 所示。该模块声明了对`com.jdojo.layer`模块\
    \ 1.0 版的依赖。\n\n如何确保`com.jdojo.layer.test`模块使用的是`com.jdojo.layer`模块的 1.0 版？你所要做的就是在运行`com.jdojo.layer.test`模块时，将`com.jdojo.layer`模块\
    \ 1.0 版的代码放在模块路径上。要在 NetBeans 中实现这一点，请将`com.jdojo.layer.v1`项目添加到`com.jdojo.layer.test`模块的模块路径中。"
  raw: 'loader as the parent class loader for all class loaders created by this method.
    You can use null as the second argument to use the bootstrap class loader as the
    parent for all the class loaders created by this method. This method will create
    a new class loader for each module in the configuration.


    The defineModulesWithOneLoader(Configuration cf, ClassLoader parentClassLoader)
    method


    creates a layer using the specified configuration. It creates one class loader
    using the specified parent class loader as its parent. It maps all modules in
    the configuration to that one class loader. You can use null as the second argument
    to use the bootstrap class loader as the parent for all the class loaders created
    by this method.


    The following snippet of code creates a layer with the boot layer as its parent
    layer. All modules in the layer will be loaded by one class loader whose parent
    is the system class loader.


    Configuration config = /* create a configuration... */


    ClassLoader sysClassLoader = ClassLoader.getSystemClassLoader();


    ModuleLayer parentLayer = ModuleLayer.boot();


    ModuleLayer layer = parentLayer.defineModulesWithOneLoader(config, sysClassLoader);


    Once you create a layer, you need to load classes from modules in that layer.
    All types in a module are loaded by the class loader mapped to that module. Note
    that you may have the same module defined in more than one layer, but those modules
    will be mapped to different class loaders. The ModuleLayer class contains a findLoader(String
    moduleName) method that accepts a module name as an argument and returns the ClassLoader
    for that module. If the module in not defined in the layer, the parent layers
    are checked. If the module does not exist in this layer or its ancestor layers,
    an IllegalArgumentException is thrown. Once you get the ClassLoader for the module,
    you can call its loadClass(String className) method to load a class from that
    module. The following snippet of code, excluding the exception handling logic,
    shows how to load a class in a layer:


    ModuleLayer layer = /* create a layer... */


    // Load a class using the layer


    String moduleName = "com.jdojo.layer";


    String className = "com.jdojo.layer.LayerInfo";


    Class<?> cls = layer.findLoader(moduleName)


    .loadClass(className);


    Once you get the Class object, you can use it to instantiate its objects and call
    methods on that object.


    The following snippet of code creates an object of the loaded class and calls
    a method named printInfo on that object:


    // A method name that prints the details of an object


    String methodName = "printInfo";


    // Instantiate the class using its no-args constructor


    Object obj = cls.getConstructor().newInstance();


    // Find the method


    Method method = cls.getMethod(methodName);


    // Call the method that will print the details


    method.invoke(obj);


    Chapter 10 ■ the Module apI


    The following methods in the ModuleLayer class can be used to obtain information
    about the layer itself or the modules contained in the layer:


    • Optional<Module> findModule(String moduleName)


    • Set<Module> modules()


    • List<ModuleLayer> parents()


    The findModule() method finds a module with the specified name in the layer or
    its parent layers. The modules() method returns a set of modules in the layer,
    which may be an empty set if the layer does not contain any modules. The parent()
    method returns a list of parent layers for this layer, which will be empty for
    the empty layer.


    Next, we walk through a complete example of how to create a custom layer and how
    to load the two versions of the same module in two layers in the same application.


    The module name is com.jdojo.layer and it consists of one package named com.jdojo.layer
    that


    contains only one class named LayerInfo. You will have two versions of the same
    modules, so everything will be repeated. I created two NetBeans projects in the
    source code with the names com.jdojo.layer.v1


    and com.jdojo.layer.v2.


    Listing [10-13 and L](#index_split_004.html#260)istin[g 10-14](#index_split_004.html#260)
    contain version 1.0 of the module definition for the com.jdojo.layer module and
    the class declaration for the LayerInfo class, respectively.


    ***Listing 10-13.*** Version 1.0 of the com.jdojo.layer Module


    // module-info.com version 1.0


    module com.jdojo.layer {


    exports com.jdojo.layer;


    }


    ***Listing 10-14.*** The LayerInfo Class in Version 1.0 of the com.jdojo.layer
    Module


    // LayerInfo.java


    package com.jdojo.layer;


    public class LayerInfo {


    private final static String VERSION = "1.0";


    static {


    System.out.println("Loading LayerInfo version " + VERSION);


    }


    public void printInfo() {


    Class cls = this.getClass();


    ClassLoader loader = cls.getClassLoader();


    Module module = cls.getModule();


    String moduleName = module.getName();


    ModuleLayer layer = module.getLayer();


    System.out.println("Class Version: " + VERSION);


    System.out.println("Class Name: " + cls.getName());


    System.out.println("Class Loader: " + loader);


    System.out.println("Module Name: " + moduleName);


    System.out.println("Layer Name: " + layer);


    }


    }


    Chapter 10 ■ the Module apI


    The LayerInfo class is very simple. It stores its version information in a static
    variable named VERSION.


    It prints a message in a static initializer that includes the version information.
    This message will help you understand which version of the LayerInfo class is
    being loaded. The printInfo() method prints the details of the class: the version,
    class name, class loader, the module name, and the layer.


    Listing [10-15 and L](#index_split_004.html#261)istin[g 10-16](#index_split_004.html#261)
    contain version 2.0 of the module definition for the com.jdojo.layer module and
    the class declaration for the LayerInfo class, respectively. Only one thing has
    changed from version 1.0 to version 2.0 of this module—the value of the static
    variable VERSION changed from 1.0 to 2.0.


    ***Listing 10-15.*** Version 2.0 of the com.jdojo.layer Module


    // module-info.com version 2.0


    module com.jdojo.layer {


    exports com.jdojo.layer;


    }


    ***Listing 10-16.*** The LayerInfo Class in Version 2.0 of the com.jdojo.layer
    Module


    // LayerInfo.java


    package com.jdojo.layer;


    public class LayerInfo {


    private final static String VERSION = "2.0";


    static {


    System.out.println("Loading LayerInfo version " + VERSION);


    }


    public void printInfo() {


    Class cls = this.getClass();


    ClassLoader loader = cls.getClassLoader();


    Module module = cls.getModule();


    String moduleName = module.getName();


    ModuleLayer layer = module.getLayer();


    System.out.println("Class Version: " + VERSION);


    System.out.println("Class Name: " + cls.getName());


    System.out.println("Class Loader: " + loader);


    System.out.println("Module Name: " + moduleName);


    System.out.println("Layer Name: " + layer);


    }


    }


    You are ready to test layers and load both versions of the com.jdojo.layer modules
    in two different layers in the same JVM. Create a modular JAR for version 2.0
    of this module, name it com.jdojo.layer.


    v2.jar or give it any other name you want, and place the modular JAR into a C:\Java9Revealed\customLib
    directory. If you place your modular JAR in other directory, you need to change
    the path in the code in Listing [10-18.](#index_split_004.html#262)


    The program to test layers is in a module named com.jdojo.layer.test module whose
    declaration is shown in Listin[g 10-17](#index_split_004.html#262). This module
    declares a dependency on version 1.0 of the com.jdojo.layer module.


    How can you ensure that version 1.0 of the com.jdojo.layer module is used with
    the com.jdojo.layer.


    test module? All you have to do is place the code for version 1.0 of the com.jdojo.layer
    module on the module path when you run the com.jdojo.layer.test module. To achieve
    this in NetBeans, add the com.jdojo.layer.v1 project to the module path of the
    com.jdojo.layer.test module.


