    使用一个 try-with-resources 块来创建一个 `JShell` 实例。`snippetEventHandler()` 方法被注册为代码片段事件处理器。该方法会打印代码片段的详细信息，例如其源代码、导致代码片段状态更新的代码片段的源代码、代码片段的先前和当前状态、其值等。最后，使用一个
    for-each 循环遍历所有代码片段，并调用 `eval()` 方法来执行它们。


    让我们逐一了解执行这些代码片段时 `JShell` 引擎的状态：


    • 当执行代码片段 1 时，该代码片段不存在，因此其状态从 `NONEXISTENT` 转变为 `VALID`。它是一个变量声明代码片段，计算结果为 `100`。


    • 当执行代码片段 2 时，它已经存在。请注意，它声明了同名的变量 `x`，但数据类型不同。其先前状态是 `VALID`，当前状态也是 `VALID`。执行此代码片段会改变代码片段
    1 的状态，使其从 `VALID` 变为 `OVERWRITTEN`，因为不能有两个同名的变量。


    • 代码片段 3 声明了一个名为 `multiply()` 的方法，该方法在其方法体中使用了未声明的变量 `multiplier`，因此其状态从 `NONEXISTENT`
    变为 `RECOVERABLE_DEFINED`。该方法已被定义，这意味着它可以被引用，但在定义适当类型的名为 `multiplier` 的变量之前无法被调用。


