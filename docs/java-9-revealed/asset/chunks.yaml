  raw: 'The HttpResponse class contains a trailers() method that returns response
    trailers as an instance of the Co mpletableFuture<HttpHeaders>. Notice the name
    of the returned object type—HttpHeaders. The HTTP/2


    Client API does have a type named HttpTrailers. You need to retrieve the response
    body before you can retrieve the trailers. At the time of this writing, the HTTP/2
    Client API does not support processing HTTP


    trailers. The following snippet of code shows you how to print all response trailers
    when the API supports it:


    // Get an HTTP response


    HttpResponse<String> response = HttpClient.newBuilder()


    .followRedirects(HttpClient.Redirect.ALWAYS)


    .build()


    .send(HttpRequest.newBuilder()


    .uri(new URI("http://www.google.com"))


    .GET()


    .build(),


    asString());


    // Read the response body


    String body = response.body();


    // Process trailers


    response.trailers()


    .whenComplete((HttpHeaders trailers, Throwable t) -> {


    if(t == null) {


    trailers.map()


    .entrySet()


    .forEach(System.out::println);


    } else {


    t.printStackTrace();


    }


    });


    Setting the Request Redirection Policy


    In response to an HTTP request, a web server may return a 3XX response status
    code, where X is a digit between 0 and 9\. This status code indicates that an
    additional action is required on the client’s part to fulfill the request. For
    example, a status code of 301 indicates that the URL has permanently moved to
    a new location.


    The response body contains alternative locations. By default, upon receiving a
    3XX status code, the request is not resubmitted to a new location. You can set
    one of the following constants of the HttpClient.Redirect enum as a policy for
    your HttpClient to act in case the returned response contains a 3XX response status
    code:


    • ALWAYS


    • NEVER


    • SAME_PROTOCOL


    • SECURE


    ALWAYS indicates that the redirects should always be followed. That is, the request
    should be resubmitted to the new location.


    Chapter 14 ■ the http/2 Client api


    NEVER indicates that the redirects should never be followed. This is the default.


    SAME_PROTOCOL indicates that the redirection may occur if the old and new locations
    use the same protocol—for example, HTTP to HTTP or HTTPS to HTTPS.


    SECURE indicates that the redirection should always occur, except when the old
    location uses HTTPS


    and the new one uses HTTP.


    I covered how to use the follow redirect configuration setting on an HttpClient
    in previous sections.


    Using the WebSocket Protocol


    The WebSocket protocol provides a two-way communication between two endpoints—a
    client endpoint and a server endpoint. The term *endpoint* means any of the two
    sides of the connection that use the WebSocket protocol. The client endpoint initiates
    a connection and the server endpoint accepts the connection. The connection is
    bi-directional, which means the server endpoint can push messages to the client
    endpoint on its own. You will also come across another term in this context, which
    is called *a peer*. A peer is simply the other end of the connection. For example,
    for a client endpoint, the server endpoint is a peer and, for a server endpoint,
    the client endpoint is a peer. A WebSocket *session* represents a sequence of
    interactions between an endpoint and a single peer.


    The WebSocket protocol can be broken into three parts:


    • Opening handshake


    • Data exchanges


    • Closing handshake


    The client initiates an opening handshake with the server. The handshake occurs
    using HTTP with an upgrade request to the WebSocket protocol. The server responds
    to the opening handshake with an upgrade response. Once the handshake is successful,
    the client and the server exchange messages. The message exchanges may be initiated
    by either the client or the server. In the end, either endpoint can send a closing
    handshake; the peer responds with the closing handshake. Once the closing handshake
    is successful, the WebSocket is closed.


    The HTTP/2 Client API in JDK 9 supports creating WebSocket client endpoints. To
    have a complete example of using the WebSocket protocol, you will need to have
    a server endpoint and a client endpoint. The following sections cover creating
    both.


    Creating a Server Endpoint


    Creating a server endpoint requires using Java EE. This book is focused on Java
    SE 9\. I explain briefly how to create a server endpoint to be used in the example
    in this section. Without covering the details, I use Java EE


    7 annotations to create a WebSocket server endpoint.


    Listing [14-4](#index_split_006.html#381) contains the code for a class named
    TimeServerEndPoint. The class is included in the web application in the webapp
    directory of the book’s source code. When you deploy the web application to a
    web server, this class will be deployed as a server endpoint.


    ***Listing 14-4.*** A WebSocket Server Endpoint


    // TimeServerEndPoint.java


    package com.jdojo.ws;


    import java.io.IOException;


    import java.time.ZonedDateTime;


    import java.util.concurrent.TimeUnit;


    import javax.websocket.CloseReason;


    Chapter 14 ■ the http/2 Client api


    import javax.websocket.OnMessage;


    import javax.websocket.OnOpen;


    import javax.websocket.OnClose;


    import javax.websocket.OnError;


    import javax.websocket.Session;


    import javax.websocket.server.ServerEndpoint;


    import static javax.websocket.CloseReason.CloseCodes.NORMAL_CLOSURE;


    @ServerEndpoint("/servertime")


    public class TimeServerEndPoint {


    @OnOpen


    public void onOpen(Session session) {


    System.out.println("Client connected. ");


    }


    @OnClose


    public void onClose(Session session) {


    System.out.println("Connection closed.");


    }


    @OnError


    public void onError(Session session, Throwable t) {


    System.out.println("Error occurred:" + t.getMessage());


    }


    @OnMessage


    public void onMessage(String message, Session session) {


    System.out.println("Client: " + message);


    // Send messages to the client


    sendMessages(session);


    }


    private void sendMessages(Session session) {


    /* Start a new thread and send 3 messages to the


    client. Each message contains the current date and


    time with zone.


    */


    new Thread(() -> {


    for(int i = 0; i < 3; i++) {


    String currentTime =


    ZonedDateTime.now().toString();


    try {


    session.getBasicRemote()


    .sendText(currentTime, true);


    TimeUnit.SECONDS.sleep(5);


    } catch(InterruptedException | IOException e) {


    e.printStackTrace();


    break;


    }


    }


    try {


    // Let us close the WebSocket


    session.close(new CloseReason(NORMAL_CLOSURE,


    "Done"));


    Chapter 14 ■ the http/2 Client api


    } catch (IOException e) {


    e.printStackTrace();


    }


    })


    .start();


    }


    }


    Using the @ServerEndpoint("/servertime") annotation on the TimeServerEndPoint
    class makes this class a server endpoint when it is deployed to a web server.
    The value of the value element of the annotation is /servertime, which will make
    the web server publish this endpoint at this URL.


    The class contains four methods, which have been annotated with @onOpen, @onMessage,
    @onClose, and


    @onError annotations. I named these methods the same as these annotations. These
    methods are called at different points in the lifecycle of the server endpoint.
    They take a Session object as an argument. The Session object represents the interaction
    of this endpoint with its peer, which would be the client endpoint.


    The onOpen() method is called when an opening handshake with a peer is successful.
    The method prints a message that a client is connected.


    The onMessage() is called when a message is received from the peer. The method
    prints the message it receives and calls a private method named sendMessages().
    The sendMessages() method starts a new thread and sends three messages to the
    peer. The thread sleeps for five seconds after sending each message.'
  trans: "\n`HttpResponse` 类包含一个 `trailers()` 方法，该方法以 `CompletableFuture<HttpHeaders>`\
    \ 实例的形式返回响应尾部。请注意返回对象类型的名称——`HttpHeaders`。HTTP/2 客户端 API 确实有一个名为 `HttpTrailers`\
    \ 的类型。你需要在检索尾部之前先检索响应体。在撰写本文时，HTTP/2 客户端 API 尚不支持处理 HTTP 尾部。以下代码片段展示了当 API 支持时如何打印所有响应尾部：\n\
    \n```java\n// 获取 HTTP 响应\nHttpResponse<String> response = HttpClient.newBuilder()\n\
    \    .followRedirects(HttpClient.Redirect.ALWAYS)\n    .build()\n    .send(HttpRequest.newBuilder()\n\
    \        .uri(new URI(\"http://www.google.com\"))\n        .GET()\n        .build(),\n\
    \        asString());\n\n// 读取响应体\nString body = response.body();\n\n// 处理尾部\n\
    response.trailers()\n    .whenComplete((HttpHeaders trailers, Throwable t) ->\
    \ {\n        if(t == null) {\n            trailers.map()\n                .entrySet()\n\
    \                .forEach(System.out::println);\n        } else {\n          \
    \  t.printStackTrace();\n        }\n    });\n```\n\n**设置请求重定向策略**\n\n作为对 HTTP\
    \ 请求的响应，Web 服务器可能会返回一个 3XX 响应状态码，其中 X 是 0 到 9 之间的数字。此状态码表示客户端需要执行额外的操作才能完成请求。例如，状态码\
    \ 301 表示 URL 已永久移动到新位置。\n\n响应体包含替代位置。默认情况下，收到 3XX 状态码后，请求不会重新提交到新位置。你可以设置 `HttpClient.Redirect`\
    \ 枚举的以下常量之一作为你的 `HttpClient` 的策略，以便在返回的响应包含 3XX 响应状态码时采取行动：\n\n*   `ALWAYS`\n\
    *   `NEVER`\n*   `SAME_PROTOCOL`\n*   `SECURE`\n\n`ALWAYS` 表示应始终遵循重定向。也就是说，请求应重新提交到新位置。\n\
    \n`NEVER` 表示永远不应遵循重定向。这是默认值。\n\n`SAME_PROTOCOL` 表示如果旧位置和新位置使用相同的协议（例如，HTTP 到 HTTP\
    \ 或 HTTPS 到 HTTPS），则可能发生重定向。\n\n`SECURE` 表示应始终发生重定向，除非旧位置使用 HTTPS 而新位置使用 HTTP。\n\
    \n我在前面的章节中介绍了如何在 `HttpClient` 上使用 `followRedirect` 配置设置。\n\n**使用 WebSocket 协议**\n\
    \nWebSocket 协议在两个端点（一个客户端端点和一个服务器端点）之间提供双向通信。术语*端点*指使用 WebSocket 协议的连接的任何一侧。客户端端点发起连接，服务器端点接受连接。连接是双向的，这意味着服务器端点可以自行向客户端端点推送消息。在此上下文中，你还会遇到另一个术语，称为*对等端*。对等端就是连接的另一端。例如，对于客户端端点，服务器端点是对等端；对于服务器端点，客户端端点是对等端。WebSocket\
    \ *会话*表示一个端点与单个对等端之间的一系列交互。\n\nWebSocket 协议可以分为三个部分：\n\n*   打开握手\n*   数据交换\n*\
    \   关闭握手\n\n客户端向服务器发起打开握手。握手使用 HTTP 进行，并带有升级到 WebSocket 协议的请求。服务器以升级响应来响应打开握手。一旦握手成功，客户端和服务器就会交换消息。消息交换可以由客户端或服务器发起。最后，任一端点都可以发送关闭握手；对等端以关闭握手响应。一旦关闭握手成功，WebSocket\
    \ 就会关闭。\n\nJDK 9 中的 HTTP/2 客户端 API 支持创建 WebSocket 客户端端点。要获得使用 WebSocket 协议的完整示例，你需要有一个服务器端点和一个客户端端点。以下部分介绍如何创建两者。\n\
    \n**创建服务器端点**\n\n创建服务器端点需要使用 Java EE。本书侧重于 Java SE 9。我简要解释如何创建在本节示例中使用的服务器端点。在不涉及细节的情况下，我使用\
    \ Java EE 7 注解来创建 WebSocket 服务器端点。\n\n清单 14-4 包含一个名为 `TimeServerEndPoint` 的类的代码。该类包含在本书源代码的\
    \ `webapp` 目录下的 Web 应用程序中。当你将 Web 应用程序部署到 Web 服务器时，此类将作为服务器端点部署。\n\n***清单 14-4.***\
    \ WebSocket 服务器端点\n\n```java\n// TimeServerEndPoint.java\npackage com.jdojo.ws;\n\
    \nimport java.io.IOException;\nimport java.time.ZonedDateTime;\nimport java.util.concurrent.TimeUnit;\n\
    import javax.websocket.CloseReason;\nimport javax.websocket.OnMessage;\nimport\
    \ javax.websocket.OnOpen;\nimport javax.websocket.OnClose;\nimport javax.websocket.OnError;\n\
    import javax.websocket.Session;\nimport javax.websocket.server.ServerEndpoint;\n\
    import static javax.websocket.CloseReason.CloseCodes.NORMAL_CLOSURE;\n\n@ServerEndpoint(\"\
    /servertime\")\npublic class TimeServerEndPoint {\n\n    @OnOpen\n    public void\
    \ onOpen(Session session) {\n        System.out.println(\"客户端已连接。\");\n    }\n\
    \n    @OnClose\n    public void onClose(Session session) {\n        System.out.println(\"\
    连接已关闭。\");\n    }\n\n    @OnError\n    public void onError(Session session, Throwable\
    \ t) {\n        System.out.println(\"发生错误：\" + t.getMessage());\n    }\n\n   \
    \ @OnMessage\n    public void onMessage(String message, Session session) {\n \
    \       System.out.println(\"客户端：\" + message);\n        // 向客户端发送消息\n       \
    \ sendMessages(session);\n    }\n\n    private void sendMessages(Session session)\
    \ {\n        /* 启动一个新线程并向客户端发送 3 条消息。\n           每条消息包含当前日期和时间以及时区。\n       \
    \ */\n        new Thread(() -> {\n            for(int i = 0; i < 3; i++) {\n \
    \               String currentTime =\n                    ZonedDateTime.now().toString();\n\
    \                try {\n                    session.getBasicRemote()\n       \
    \                 .sendText(currentTime, true);\n                    TimeUnit.SECONDS.sleep(5);\n\
    \                } catch(InterruptedException | IOException e) {\n           \
    \         e.printStackTrace();\n                    break;\n                }\n\
    \            }\n            try {\n                // 让我们关闭 WebSocket\n      \
    \          session.close(new CloseReason(NORMAL_CLOSURE,\n                   \
    \ \"完成\"));\n            } catch (IOException e) {\n                e.printStackTrace();\n\
    \            }\n        })\n        .start();\n    }\n}\n```\n\n在 `TimeServerEndPoint`\
    \ 类上使用 `@ServerEndpoint(\"/servertime\")` 注解使得该类在部署到 Web 服务器时成为服务器端点。注解的 `value`\
    \ 元素的值是 `/servertime`，这将使 Web 服务器在此 URL 上发布此端点。\n\n该类包含四个方法，它们分别用 `@OnOpen`、`@OnMessage`、`@OnClose`\
    \ 和 `@OnError` 注解进行了标注。我将这些方法命名为与这些注解相同的名称。这些方法在服务器端点生命周期的不同时间点被调用。它们接受一个 `Session`\
    \ 对象作为参数。`Session` 对象表示此端点与其对等端（即客户端端点）的交互。\n\n当与对等端的打开握手成功时，会调用 `onOpen()` 方法。该方法打印一条消息，表明客户端已连接。\n\
    \n当从对等端接收到消息时，会调用 `onMessage()` 方法。该方法打印它接收到的消息，并调用一个名为 `sendMessages()` 的私有方法。`sendMessages()`\
    \ 方法启动一个新线程，并向对等端发送三条消息。该线程在发送每条消息后休眠五秒。\n"
- fmt: "# WebSocket 消息发送与端点管理\n\n`message`包含当前日期、时间以及时区信息。您可以同步或异步地向对等端发送消息。要发送消息，您需要获取代表与对等端会话的`RemoteEndpoint`接口的引用。使用`Session`实例上的`getBasicRemote()`和`getAsyncRemote()`方法，可以分别获取能够同步和异步发送消息的`RemoteEndpoint.Basic`和`RemoteEndpoint.Async`实例。一旦获取了对等端（远程端点）的引用，您可以调用其多个`sendXxx()`方法来向对等端发送不同类型的数据。\n\
    \n```\n// 向对等端发送同步文本消息\nsession.getBasicRemote()\n    .sendText(currentTime, true);\n\
    ```\n\n`sendText()`方法中的第二个参数指示当前发送的消息是否为部分消息的最后一部分。如果您的消息是完整的，请使用`true`。\n\n当所有消息发送给对等端后，使用`sendClose()`方法发送关闭消息。该方法接受一个`CloseReason`类的对象，该对象封装了关闭代码和关闭原因。当对等端收到关闭消息时，对等端需要响应一个关闭消息，之后\
    \ WebSocket 连接即被关闭。请注意，发送关闭消息后，服务器端点不应再向其对等端发送更多消息。\n\n当发生 WebSocket 协议未处理的错误时，会调用`onError()`方法。\n\
    \n您不能单独使用此端点。您需要创建一个客户端端点，我将在下一节中详细介绍。您将在本章稍后的“运行 WebSocket 程序”一节中看到此端点的实际应用。\n\
    \n## 创建客户端端点\n\n开发 WebSocket 客户端端点涉及使用`WebSocket`接口，该接口是 JDK 9 中 HTTP/2 客户端 API\
    \ 的一部分。`WebSocket`接口包含以下嵌套类型：\n\n- `WebSocket.Builder`\n- `WebSocket.Listener`\n\
    - `WebSocket.MessagePart`\n\n`WebSocket`接口的实例代表一个 WebSocket 客户端端点。构建器（`WebSocket.Builder`接口的实例）用于创建`WebSocket`实例。`HttpClient`类的`newWebSocketBuilder(URI\
    \ uri, WebSocket.Listener listener)`方法返回`WebSocket.Builder`接口的实例。\n\n当客户端端点上发生事件时（例如，打开握手完成、消息到达、关闭握手等），通知会发送给监听器（`WebSocket.Listener`接口的实例）。该接口为每种通知类型包含一个默认方法。\n\
    \n您需要创建一个实现此接口的类。您只需实现那些与您感兴趣接收通知的事件相对应的方法。在创建`WebSocket`实例时，您需要指定一个监听器。\n\n当您向对等端发送关闭消息时，可以指定一个关闭状态码。`WebSocket`接口包含以下`int`类型的常量，可用作\
    \ WebSocket 关闭消息的状态码：\n\n- `CLOSED_ABNORMALLY`：表示 WebSocket 关闭消息状态码（1006），意味着连接异常关闭，例如，未发送或接收关闭消息。\n\
    - `NORMAL_CLOSURE`：表示 WebSocket 关闭消息状态码（1000），意味着连接正常关闭。这意味着建立连接的目的已经达成。\n\n服务器端点可能发送部分消息。消息被标记为`first`、`part`、`last`或`whole`，以指示其位置。`WebSocket.MessagePart`枚举定义了四个与消息位置对应的常量：`FIRST`、`PART`、`LAST`和`WHOLE`。当您的监听器收到消息已接收的通知时，您将收到这些值作为消息的一部分。\n\
    \n以下各节详细描述了设置客户端端点的每个步骤。\n\n### 创建监听器\n\n监听器是`WebSocket.Listener`接口的一个实例。创建监听器涉及创建一个实现此接口的类。该接口包含以下默认方法：\n\
    \n- `CompletionStage<?> onBinary(WebSocket webSocket, ByteBuffer message, WebSocket.MessagePart\
    \ part)`\n- `CompletionStage<?> onClose(WebSocket webSocket, int statusCode, String\
    \ reason)`\n- `void onError(WebSocket webSocket, Throwable error)`\n- `void onOpen(WebSocket\
    \ webSocket)`\n- `CompletionStage<?> onPing(WebSocket webSocket, ByteBuffer message)`\n\
    - `CompletionStage<?> onPong(WebSocket webSocket, ByteBuffer message)`\n- `CompletionStage<?>\
    \ onText(WebSocket webSocket, CharSequence message, WebSocket.MessagePart part)`\n\
    \n当客户端端点连接到对等端时，会调用`onOpen()`方法，对等端的引用作为第一个参数传递给此方法。默认实现请求一条消息，这意味着此监听器可以再接收一条消息。消息请求是通过`WebSocket`接口的`request(long\
    \ n)`方法进行的：\n\n```\n// 允许再接收一条消息\nwebSocket.request(1);\n```\n\n> **提示**：如果服务器发送的消息数量超过请求数量，消息会在\
    \ TCP 连接上排队，并可能最终通过 TCP 流量控制强制发送方停止发送更多消息。在适当的时间以适当的参数值调用`request(long n)`方法非常重要，这样您的监听器才能持续接收来自服务器的消息。一个常见的错误是在监听器中重写`onOpen()`方法，但没有调用`webSocket.request(1)`方法，这会导致您无法接收来自服务器的消息。\n\
    \n当端点收到来自对等端的关闭消息时，会调用`onClose()`方法。这是对监听器的最后一次通知。从此方法抛出的异常将被忽略。默认实现不执行任何操作。通常，您需要向对等端发送一个关闭消息以完成关闭握手。\n\
    \n当此端点收到来自对等端的 Ping 消息时，会调用`onPing()`方法。Ping 消息可以由客户端和服务器端点发送。默认实现向对等端发送一个包含相同消息内容的\
    \ Pong 消息。\n\n当端点收到来自对等端的 Pong 消息时，会调用`onPong()`方法。Pong 消息通常作为对先前发送的 Ping 消息的响应而接收。端点也可能收到未经请求的\
    \ Pong 消息。`onPong()`方法的默认实现会在监听器上再请求一条消息，并且不执行其他操作。\n\n当 WebSocket 上发生 I/O 或协议错误时，会调用`onError()`方法。从此方法抛出的异常将被忽略。调用此方法后，监听器将不再接收任何通知。默认实现不执行任何操作。\n\
    \n当从对等端接收到二进制消息和文本消息时，会分别调用`onBinary()`和`onText()`方法。请务必检查这些方法的最后一个参数，该参数指示消息的位置。如果您收到部分消息，则需要将它们组装起来以获取完整消息。从这些方法返回`null`表示消息处理完成。否则，将返回一个`CompletionStage<?>`，并在消息处理完成时完成。\n\
    \n以下代码片段创建了一个准备接收文本消息的 WebSocket 监听器：\n\n```\nWebSocket.Listener listener = new\
    \ WebSocket.Listener() {\n    @Override\n    public CompletionStage<?> onText(WebSocket\
    \ webSocket,\n                                     CharSequence message,\n   \
