    Item.v = 40


    输出显示，未命名模块能够从命名模块的导出包中访问公共类型及其公共成员。请注意，您将无法访问 com.jdojo.unnamed.Main 类中 Item 类的其他静态变量（s、t
    和 u），因为它们不是公共的。


    迁移到 JDK 9 的路径


    当您想要将应用程序迁移到 JDK 9 时，应牢记模块系统提供的两个好处：强封装和可靠配置。您的目标是拥有一个由普通模块组成的应用程序，少数开放模块除外。您可能认为有人可以为您提供一份清晰的步骤列表，用于将现有应用程序迁移到
    JDK 9。


    然而，考虑到应用程序的多样性、它们与其他代码的相互依赖关系以及不同的配置需求，这是不可能的。我所能做的只是提供一些通用的指导方针，可能有助于您完成迁移过程。


    在 JDK 9 之前，一个非平凡的 Java 应用程序由位于三个层中的多个 JAR 组成：


    • 应用程序层中的应用程序 JAR——由应用程序开发人员开发


    • 库层中的库 JAR——由第三方提供


    • JVM 层中的 Java 运行时 JAR


    JDK 9 已经通过将 Java 运行时 JAR 转换为模块来对其进行模块化。也就是说，Java 运行时由模块组成，并且只有模块。


    库层主要由放置在类路径上的第三方 JAR 组成。如果您想将应用程序迁移到 JDK 9，您可能无法获得第三方 JAR 的模块化版本。您也无法控制第三方供应商如何将其
    JAR 转换为模块。您可以将库 JAR 放置在模块路径上，并将其视为自动模块。


    您可以选择完全模块化您的应用程序代码。以下是您对模块类型的选择——从最不理想到最理想：


    • 未命名模块


    • 自动模块


    • 开放模块


    • 普通模块

    '
- fmt: "# 迁移步骤\n\n迁移的第一步是检查你的应用程序是否能在 JDK 9 中运行，方法是将所有 JAR（应用程序 JAR 和库 JAR）放在类路径上，而不对代码进行任何修改。类路径上\
    \ JAR 中的所有类型都将成为未命名模块的一部分。在此状态下，你的应用程序使用 JDK 9，但不具备任何字符串封装和可靠配置。\n\n# 第 4 章 ■\
    \ 模块依赖\n\n一旦你的应用程序在 JDK 9 中原样运行，你就可以开始将应用程序代码转换为自动模块。自动模块中的所有包既开放用于深度反射访问，也导出用于普通的编译时和运行时访问其公共类型。从这个意义上说，它并不比未命名模块更好，因为它没有提供强封装。然而，自动模块为你提供了可靠配置，因为其他显式模块可以声明对自动模块的依赖。\n\
    \n你还有另一种选择：将应用程序代码转换为开放模块，这种模块提供适度更强的封装。在开放模块中，所有包都开放用于深度反射访问，但你可以指定哪些包（如果有）导出用于普通的编译时和运行时访问。显式模块也可以声明对开放模块的依赖——从而为你带来可靠配置的好处。\n\
    \n普通模块提供最强的封装，它允许你选择哪些包（如果有）是开放的、导出的，或两者兼有。显式模块也可以声明对开放模块的依赖，从而为你带来可靠配置的好处。\n\n\
    表 4-2 列出了模块类型及其提供的字符串封装和可靠配置的程度。\n\n**表 4-2.** 模块类型及其提供的强封装和可靠配置的不同程度\n\n| 模块类型\
    \ | 强封装 | 可靠配置 |\n|----------|--------|----------|\n| 未命名   | 否     | 否      \
    \ |\n| 自动     | 否     | 适度     |\n| 开放     | 适度   | 是       |\n| 普通     | 最强 \
    \  | 最强     |\n\n# 解析模块定义\n\n在本节中，我将解释 JDK 附带的 `javap` 工具，该工具可用于解析类文件。\n\n这个工具在学习模块系统时非常有用，尤其是在反编译模块的描述符时。\n\
    \n此时，你有两个 `com.jdojo.intro` 模块的 `module-info.class` 文件副本：一个在 `mods\\com.jdojo.intro`\
    \ 目录中，另一个在 `lib\\com.jdojo.intro-1.0.jar` 文件的模块化 JAR 中。当你将模块代码打包到 JAR 中时，你为模块指定了版本和主类。这些信息去了哪里？它们作为类属性被添加到\
    \ `module-info.class` 文件中。因此，这两个 `module-info.class` 文件的内容并不相同。\n\n如何证明这一点？首先打印两个\
    \ `module-info.class` 文件中的模块声明。你可以使用位于 `JDK_HOME\\bin` 目录中的 `javap` 工具来解析任何类文件中的代码。你可以指定文件名、URL\
    \ 或类名进行解析。以下命令打印模块声明：\n\n```\nC:\\Java9Revealed>javap mods\\com.jdojo.intro\\\
    module-info.class\nCompiled from \"module-info.java\"\nmodule com.jdojo.intro\
    \ {\n    requires java.base;\n}\n```\n\n```\nC:\\Java9Revealed>javap jar:file:lib/com.jdojo.intro-1.0.jar!/module-info.class\n\
    Compiled from \"module-info.java\"\nmodule com.jdojo.intro {\n    requires java.base;\n\
    }\n```\n\n第一个命令使用文件名，第二个命令使用基于 `jar` 方案的 URL。两个命令都使用相对路径。如果需要，你也可以使用绝对路径。\n\n\
    输出表明两个 `module-info.class` 文件包含相同的模块声明。你需要使用 `-verbose` 选项（或 `-v` 选项）打印类信息以查看类属性。\n\
    \n以下命令打印来自 `mods` 目录的 `module-info.class` 文件信息，并显示模块版本和主类名称不存在。部分输出如下所示。"
  raw: 'The first step in migration is to check if your application runs in JDK 9
    by placing all JARs—application JARs and libraries JARs—onto the class path, without
    any modification to your code. All types from the JARs on the class path will
    be part of unnamed modules. Your application in this state uses JDK 9 without
    any string encapsulation and reliable configuration.


    Chapter 4 ■ Module dependenCy


    Once your application runs as is in JDK 9, you can start converting the application
    code into automatic modules. All packages in an automatic module are both open
    for deep reflective access and exported for ordinary compile-time and runtime
    access to their public types. In this sense, it is no better than unnamed modules
    because it does not provide you with strong encapsulation. However, automatic
    modules provide you with reliable configuration because other explicit modules
    can declare dependence automatic modules.


    You have another choice of converting your application code into open modules
    that offer a modest degree of stronger encapsulation: In open modules, all packages
    are open for deep reflective access, but you can specify which packages, if any,
    are exported for ordinary compile-time and runtime access. Explicit modules can
    also declare dependence on open modules – thus giving you a benefit of reliable
    configuration.


    A normal module offers the strongest encapsulation, which lets you choose which
    packages, if any, are open, exported, or both. Explicit modules can also declare
    dependence on open modules, thus giving you the benefit of reliable configuration.


    Ta[ble 4-2 con](#index_split_002.html#120)tains the list of modules types with
    the degree of string encapsulation and reliable configuration they offer.


    ***Table 4-2.** Module Types and the Varying Degrees of Strong*


    *Encapsulation and Reliable Configuration They Offer*


    **Module Type**


    **Strong Encapsulation**


    **Reliable Configuration**


    Unnamed


    No


    No


    Automatic


    No


    Modest


    Open


    Modest


    Yes


    Normal


    Strongest


    Strongest


    Dissembling Module Definitions


    In this section, I explain the javap tool that ships with the JDK, which can be
    used to dissemble class files.


    This tool is very useful in learning the module system, especially in decompiling
    the module’s descriptors.


    At this point, you have two copies of the module-info.class file for the com.jdojo.intro
    module: one in the mods\com.jdojo.intro directory and another in the modular JAR
    in the lib\com.jdojo.intro-1.0.jar file. When you packaged the module’s code into
    a JAR, you had specified a version and a main class for the module. Where did
    these pieces of information go? They were added to the module-info.


    class file as class attributes. Therefore, the contents of the two module-info.class
    files are not the same.


    How do you prove it? Start by printing the module declaration in both module-info.class
    files. You can use the javap tool, which is located in the JDK_HOME\bin directory,
    to dissemble code in any class file. You can specify a filename, an URL, or a
    class name to be dissembled. The following commands print the module declarations:


    C:\Java9Revealed>javap mods\com.jdojo.intro\module-info.class


    Compiled from "module-info.java"


    module com.jdojo.intro {


    requires java.base;


    }


    Chapter 4 ■ Module dependenCy


    C:\Java9Revealed>javap jar:file:lib/com.jdojo.intro-1.0.jar!/module-info.class


    Compiled from "module-info.java"


    module com.jdojo.intro {


    requires java.base;


    }


    The first command uses a filename and the second command uses an URL using the
    jar scheme. Both commands use relative paths. You can use absolute paths if you
    want.


    The outputs indicate that both module-info.class files contain the same module
    declaration. You need to print the class information using the -verbose option
    (or the -v option) to see the class attributes.


    The following command prints the module-info.class file information from the mods
    directory and shows that the module version and main class name do not exist.
    A partial output is shown.'
