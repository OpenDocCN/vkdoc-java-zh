    Server: \" + message);\n        // 返回 null 表示我们已完成此消息的处理\n        return null;\n\
    \    }\n};\n```\n\n### 构建端点"
  raw: 'The message contains the current date and time with the time zone. You can
    send messages to peers synchronously or asynchronously. To send a message, you
    need to get a reference of the RemoteEndpoint interface that represents the conversation
    with a peer. Use the getBasicRemote() and getAsyncRemote() methods on the Session
    instance to get a RemoteEndpoint.Basic and RemoteEndpont.Async instances that
    can send messages synchronously and asynchronously, respectively. Once you get
    a reference of the peer (the remote endpoint), you can call several of its sendXxx()
    methods to send different types of data to the peer.


    // Send a synchronous text message to the peer


    session.getBasicRemote()


    .sendText(currentTime, true);


    The second argument in the sendText() method indicates whether it is the last
    part of the partial message being sent. If your message is complete, use true.


    After all messages are sent to the peer, a close message is sent using the sendClose()
    method. The method takes an object of the CloseReason class that encapsulates
    a close code and a close reason. When the peer receives a close message, the peer
    needs to respond with a close message, and, after that, the WebSocket connection
    is closed. Note that, after sending a close message, the server endpoint is not
    supposed to send more messages to its peer.


    The onError() method is called when an error occurs that is not handled by the
    WebSocket protocol.


    You cannot use this endpoint by itself. You need create a client endpoint, which
    I cover in detail in the next section. You will see this endpoint in action in
    the section entitled “Running the WebSocket Program,”


    later in this chapter.


    Creating a Client Endpoint


    Developing a WebSocket client endpoint involves using the WebSocket interface,
    which is part of the HTTP/2


    Client API in JDK 9\. The WebSocket interface contains the following nested types:


    • WebSocket.Builder


    • WebSocket.Listener


    • WebSocket.MessagePart


    Chapter 14 ■ the http/2 Client api


    An instance of the WebSocket interface represents a WebSocket client endpoint.
    A builder,


    which is an instance of the WebSocket.Builder interface, is used to create a WebSocket
    instance. The newWebSocketBuilder(URI uri, WebSocket.Listener listener) method
    of the HttpClient class returns an instance of the WebSocket.Builder interface.


    When events occur on a client endpoint, for example, the completion of the opening
    handshake, a message arrival, closing handshake, etc., notifications are sent
    to a listener, which is an instance of the WebSocket.Listener interface. The interface
    contains a default method for each type of notification.


    You will need to create a class that implements this interface. You implement
    only those methods that correspond to the events of which you are interested in
    receiving notifications. You need to specify a listener when you create a WebSocket
    instance.


    When you send a close message to a peer, you may specify a close status code.
    The WebSocket interface contains the following constants of type int that can
    be used as the WebSocket Close message status code:


    • CLOSED_ABNORMALLY: Represents a WebSocket Close message status code (1006),


    which means that the connection was closed abnormally, for example, without


    sending or receiving a Close message.


    • NORMAL_CLOSURE: Represents a WebSocket Close message status code (1000), which


    means that the connection was closed normally. This means that the purpose for


    which the connection was established was fulfilled.


    The server endpoint may send partial messages. Messages are marked as first, part,
    last, or whole, which indicates their position. The WebSocket.MessagePart enum
    defines four constants corresponding to a message’s position: FIRST, PART, LAST,
    and WHOLE. You will receive these values as part of a message when your listener
    receives a notification that a message has been received.


    The following sections describe each step in setting up a client endpoint in detail.


    Creating a Listener


    A listener is an instance of the WebSocket.Listener interface. Creating a listener
    involves creating a class that implements this interface. The interface contains
    the following default methods:


    • CompletionStage<?> onBinary(WebSocket webSocket, ByteBuffer message,


    WebSocket.MessagePart part)


    • CompletionStage<?> onClose(WebSocket webSocket, int statusCode,


    String reason)


    • void onError(WebSocket webSocket, Throwable error)


    • void onOpen(WebSocket webSocket)


    • CompletionStage<?> onPing(WebSocket webSocket, ByteBuffer message)


    • CompletionStage<?> onPong(WebSocket webSocket, ByteBuffer message)


    • CompletionStage<?> onText(WebSocket webSocket, CharSequence message,


    WebSocket.MessagePart part)


    Chapter 14 ■ the http/2 Client api


    The onOpen() method is called when the client endpoint is connected to the peer
    whose reference is passed to this method as the first argument. The default implementation
    requests one message, which means that this listener can receive one more message.
    The request for messages is made using the request(long n) method of the WebSocket
    interface:


    // Allow one more message to be received


    webSocket.request(1);


    ■ **Tip** if a server sends more messages than requested, messages are queued
    on the tCp connection and may eventually force the sender to stop sending more
    messages through tCp flow control. it is important that you call the request(long
    n) method at the appropriate time with an appropriate argument value, so your
    listener keeps receiving messages from the server. it is a common mistake to override
    the onOpen() method in your listener and not call the webSocket.request(1) method,
    which prevents you from receiving messages from the server.


    The onClose() method is called when the endpoint receives a close message from
    the peer. It is the last notification to the listener. An exception thrown from
    this method is ignored. The default implementation does not do anything. Typically,
    you need to send a close message to the peer to complete the closing handshake.


    The onPing() method is called when this endpoint receives a Ping message from
    the peer. A Ping message can be sent by both client and server endpoints. The
    default implementation sends a Pong message with the same message contents to
    the peer.


    The onPong() method is called when the endpoint receives a Pong message from the
    peer. A Pong message is typically received as a response to a previously sent
    Ping message. An endpoint may also receive an unsolicited Pong message. The default
    implementation of the onPong() method requests one more message on the listener
    and performs no other actions.


    The onError() method is called when an I/O or protocol error occurs on the WebSocket.
    An exception thrown from this method is ignored. The listener receives no more
    notifications after this method is called.


    The default implementation does nothing.


    The onBinary() and onText() methods are called when a binary message and a text
    message are


    received from the peer, respectively. Make sure to check the last argument of
    these methods, which indicates the position of the message. If you receive partial
    messages, you will need to assemble them to get the whole message. Returning null
    from these methods indicates that the message processing is complete. Otherwise,
    a CompletionStage<?> is returned and it completes when the message processing
    is complete.


    The following snippet of code creates a WebSocket listener that is ready to receive
    text messages: WebSocket.Listener listener = new WebSocket.Listener() {


    @Override


    public CompletionStage<?> onText(WebSocket webSocket,


    CharSequence message,


    WebSocket.MessagePart part) {


    // Allow one message to be received by the listener


    webSocket.request(1);


    // Print the message received from the server


    System.out.println("Server: " + message);


    // Return null indicating that we are done processing this message


    return null;


    }


    };


    Chapter 14 ■ the http/2 Client api


    Building an Endpoint'
  trans: "\n消息中包含当前日期、时间及时区信息。你可以同步或异步地向对等端发送消息。要发送消息，你需要获取代表与对等端会话的 `RemoteEndpoint`\
    \ 接口的引用。使用 `Session` 实例上的 `getBasicRemote()` 和 `getAsyncRemote()` 方法，可以分别获取能够同步和异步发送消息的\
    \ `RemoteEndpoint.Basic` 和 `RemoteEndpoint.Async` 实例。一旦获得对等端（远程端点）的引用，你就可以调用其多个\
    \ `sendXxx()` 方法来向对等端发送不同类型的数据。\n\n```java\n// 向对等端发送一条同步文本消息\nsession.getBasicRemote()\n\
    \       .sendText(currentTime, true);\n```\n\n`sendText()` 方法中的第二个参数表示当前发送的消息是否为部分消息的最后一部分。如果你的消息是完整的，请使用\
    \ `true`。\n\n当所有消息都发送给对等端后，会使用 `sendClose()` 方法发送一条关闭消息。该方法接收一个 `CloseReason`\
    \ 类的对象，该对象封装了关闭代码和关闭原因。当对等端收到关闭消息时，它需要响应一条关闭消息，之后 WebSocket 连接就会关闭。请注意，在发送关闭消息后，服务器端点不应再向其对等端发送更多消息。\n\
    \n当发生 WebSocket 协议未处理的错误时，会调用 `onError()` 方法。\n\n你不能单独使用此端点。你需要创建一个客户端端点，我将在下一节中详细介绍。你将在本章稍后的“运行\
    \ WebSocket 程序”一节中看到此端点的实际应用。\n\n**创建客户端端点**\n\n开发 WebSocket 客户端端点涉及使用 `WebSocket`\
    \ 接口，该接口是 JDK 9 中 HTTP/2 客户端 API 的一部分。`WebSocket` 接口包含以下嵌套类型：\n\n- `WebSocket.Builder`\n\
    - `WebSocket.Listener`\n- `WebSocket.MessagePart`\n\n`WebSocket` 接口的实例代表一个 WebSocket\
    \ 客户端端点。构建器（`WebSocket.Builder` 接口的实例）用于创建 `WebSocket` 实例。`HttpClient` 类的 `newWebSocketBuilder(URI\
    \ uri, WebSocket.Listener listener)` 方法返回一个 `WebSocket.Builder` 接口的实例。\n\n当客户端端点发生事件时（例如，打开握手完成、消息到达、关闭握手等），通知会被发送给监听器（`WebSocket.Listener`\
    \ 接口的实例）。该接口为每种通知类型都包含一个默认方法。\n\n你需要创建一个实现此接口的类。你只需实现那些与你感兴趣接收通知的事件相对应的方法。在创建\
    \ `WebSocket` 实例时，你需要指定一个监听器。\n\n当你向对等端发送关闭消息时，可以指定一个关闭状态码。`WebSocket` 接口包含以下\
    \ `int` 类型的常量，可用作 WebSocket 关闭消息的状态码：\n\n- `CLOSED_ABNORMALLY`：表示 WebSocket 关闭消息状态码\
    \ (1006)，这意味着连接被异常关闭，例如，未发送或接收关闭消息。\n- `NORMAL_CLOSURE`：表示 WebSocket 关闭消息状态码 (1000)，这意味着连接被正常关闭。这表示建立连接的目的已经达成。\n\
    \n服务器端点可能会发送部分消息。消息被标记为 first、part、last 或 whole，以指示其位置。`WebSocket.MessagePart`\
    \ 枚举定义了四个与消息位置对应的常量：`FIRST`、`PART`、`LAST` 和 `WHOLE`。当你的监听器收到消息已到达的通知时，你将作为消息的一部分接收到这些值。\n\
    \n以下各节将详细描述设置客户端端点的每个步骤。\n\n**创建监听器**\n\n监听器是 `WebSocket.Listener` 接口的一个实例。创建监听器涉及创建一个实现此接口的类。该接口包含以下默认方法：\n\
    \n- `CompletionStage<?> onBinary(WebSocket webSocket, ByteBuffer message, WebSocket.MessagePart\
    \ part)`\n- `CompletionStage<?> onClose(WebSocket webSocket, int statusCode, String\
    \ reason)`\n- `void onError(WebSocket webSocket, Throwable error)`\n- `void onOpen(WebSocket\
    \ webSocket)`\n- `CompletionStage<?> onPing(WebSocket webSocket, ByteBuffer message)`\n\
    - `CompletionStage<?> onPong(WebSocket webSocket, ByteBuffer message)`\n- `CompletionStage<?>\
    \ onText(WebSocket webSocket, CharSequence message, WebSocket.MessagePart part)`\n\
    \n当客户端端点连接到对等端时，会调用 `onOpen()` 方法，对等端的引用作为第一个参数传递给此方法。默认实现会请求一条消息，这意味着此监听器可以再接收一条消息。消息的请求是通过\
    \ `WebSocket` 接口的 `request(long n)` 方法进行的：\n\n```java\n// 允许再接收一条消息\nwebSocket.request(1);\n\
    ```\n\n> **提示** 如果服务器发送的消息数量超过请求数量，消息会在 TCP 连接上排队，并可能最终通过 TCP 流量控制强制发送方停止发送更多消息。在适当的时候使用适当的参数值调用\
    \ `request(long n)` 方法非常重要，这样你的监听器才能持续接收来自服务器的消息。一个常见的错误是在监听器中重写 `onOpen()` 方法，但没有调用\
    \ `webSocket.request(1)` 方法，这会阻止你接收来自服务器的消息。\n\n当端点收到来自对等端的关闭消息时，会调用 `onClose()`\
    \ 方法。这是对监听器的最后一次通知。从此方法抛出的异常将被忽略。默认实现不执行任何操作。通常，你需要向对等端发送一条关闭消息以完成关闭握手。\n\n当此端点收到来自对等端的\
    \ Ping 消息时，会调用 `onPing()` 方法。Ping 消息可以由客户端和服务器端点发送。默认实现会向对等端发送一条包含相同消息内容的 Pong\
    \ 消息。\n\n当端点收到来自对等端的 Pong 消息时，会调用 `onPong()` 方法。Pong 消息通常作为对先前发送的 Ping 消息的响应而接收。端点也可能收到未经请求的\
    \ Pong 消息。`onPong()` 方法的默认实现会在监听器上再请求一条消息，并且不执行其他操作。\n\n当 WebSocket 上发生 I/O 或协议错误时，会调用\
    \ `onError()` 方法。从此方法抛出的异常将被忽略。调用此方法后，监听器将不再接收任何通知。默认实现不执行任何操作。\n\n当从对等端接收到二进制消息和文本消息时，会分别调用\
    \ `onBinary()` 和 `onText()` 方法。请务必检查这些方法的最后一个参数，该参数指示消息的位置。如果你收到部分消息，则需要将它们组装起来以获取完整消息。从这些方法返回\
    \ `null` 表示消息处理完成。否则，将返回一个 `CompletionStage<?>`，并在消息处理完成时完成。\n\n以下代码片段创建了一个准备接收文本消息的\
    \ WebSocket 监听器：\n\n```java\nWebSocket.Listener listener = new WebSocket.Listener()\
    \ {\n    @Override\n    public CompletionStage<?> onText(WebSocket webSocket,\n\
    \                                     CharSequence message,\n                \
    \                     WebSocket.MessagePart part) {\n        // 允许监听器接收一条消息\n\
    \        webSocket.request(1);\n        // 打印从服务器接收到的消息\n        System.out.println(\"\
    Server: \" + message);\n        // 返回 null 表示我们已完成此消息的处理\n        return null;\n\
    \    }\n};\n```\n\n**构建端点**\n"
- fmt: "You need to build an instance of the `WebSocket` interface that acts as a\
    \ client endpoint. The instance is used to connect and exchange messages with\
    \ the server endpoint. A `WebSocket` instance is built using a `WebSocket.Builder`.\
    \ You can use the following method of the `HttpClient` class to get a builder:\
    \ `WebSocket.Builder newWebSocketBuilder(URI uri, WebSocket.Listener listener)`\n\
    \nThe `HttpClient` instance used to obtain the `WebSocket` builder supplies the\
    \ connection configuration for the `WebSocket`. The specified `uri` is the URI\
    \ of the server endpoint. The `listener` is a listener for the endpoint being\
    \ built, as described in the previous section. Once you have a builder, you can\
    \ call one of the following methods of the builder to configure the endpoint:\n\
    \n- `WebSocket.Builder connectTimeout(Duration timeout)`\n- `WebSocket.Builder\
    \ header(String name, String value)`\n- `WebSocket.Builder subprotocols(String\
    \ mostPreferred, String... lesserPreferred)`\n\nThe `connectTimeout()` method\
    \ lets you specify a timeout for the opening handshake. If the opening handshake\
    \ does not complete within the specified duration, the `CompletableFuture` returned\
    \ from the `buildAsync()` method of the `WebSocket.Builder` completes exceptionally\
    \ with an `HttpTimeoutException`.\n\nYou can add any custom headers for the opening\
    \ handshake using the `header()` method. You can specify a request for given sub-protocols\
    \ during the opening handshake using the `subprotocols()` method—only one of them\
    \ will be selected by the server. The sub-protocols are defined by the application.\
    \ The client and the server need to agree to work on specific sub-protocols and\
    \ their details.\n\nFinally, call the `buildAsync()` method of the `WebSocket.Builder`\
    \ interface to build the endpoint. It returns `CompletableFuture<WebSocket>`,\
    \ which completes normally when this endpoint is connected to the server endpoint;\
    \ it completes exceptionally when there was an error. The following snippet of\
    \ code shows how to build and connect a client endpoint. Notice that the URI for\
    \ the server starts with `ws`, which indicates the WebSocket protocol.\n\n```\n\
    URI serverUri = new URI(\"ws://localhost:8080/webapp/servertime\");\n\n// Get\
    \ a listener\nWebSocket.Listener listener = ...;\n\n// Build an endpoint using\
    \ the default HttpClient\nHttpClient.newHttpClient()\n    .newWebSocketBuilder(serverUri,\
    \ listener)\n    .buildAsync()\n    .whenComplete((WebSocket webSocket, Throwable\
    \ t) -> {\n        // More code goes here\n    });\n```\n\n## Sending Messages\
    \ to a Peer\n\nOnce a client endpoint is connected to a peer, both exchange messages.\
    \ An instance of the `WebSocket` interface represents a client endpoint and the\
    \ interface contains the following methods to send messages to a peer:\n\n- `CompletableFuture<WebSocket>\
    \ sendBinary(ByteBuffer message, boolean isLast)`\n- `CompletableFuture<WebSocket>\
    \ sendClose()`\n- `CompletableFuture<WebSocket> sendClose(int statusCode, String\
    \ reason)`\n- `CompletableFuture<WebSocket> sendPing(ByteBuffer message)`\n- `CompletableFuture<WebSocket>\
    \ sendPong(ByteBuffer message)`\n- `CompletableFuture<WebSocket> sendText(CharSequence\
    \ message)`\n- `CompletableFuture<WebSocket> sendText(CharSequence message, boolean\
    \ isLast)`\n\nThe `sendText()` method is used to send a text message to the peer.\
    \ If you are sending a partial message, use the version of this method that takes\
    \ two arguments. If the second argument is `false`, it indicates part of the partial\
    \ message. If the second argument is `true`, it indicates the last part of a partial\
    \ message. If there were no partial messages sent before, a `true` in the second\
    \ argument indicates a whole message. The `sendText(CharSequence message)` is\
    \ a convenience method that calls the second version of the method using `true`\
    \ as the second argument.\n\nThe `sendBinary()` method sends a binary message\
    \ to the peer.\n\nThe `sendPing()` and `sendPong()` methods send a Ping and a\
    \ Pong message to the peer, respectively."
  raw: 'You need to build an instance of the WebSocket interface that acts as a client
    endpoint. The instance is used to connect and exchange messages with the server
    endpoint. A WebSocket instance is built using a WebSocket.Builder. You can use
    the following method of the HttpClient class to get a builder: WebSocket.Builder
    newWebSocketBuilder(URI uri, WebSocket.Listener listener)


    The HttpClient instance used to obtain the WebSocket builder supplies the connection
    configuration for the WebSocket. The specified uri is the URI of the server endpoint.
    The listener is a listener for the endpoint being built, as described in the previous
    section. Once you have a builder, you can call one of the following methods of
    the builder to configure the endpoint:


    • WebSocket.Builder connectTimeout(Duration timeout)


    • WebSocket.Builder header(String name, String value)


    • WebSocket.Builder subprotocols(String mostPreferred, String...


    lesserPreferred)


    The connectTimeout() method lets you specify a timeout for the opening handshake.
    If the opening handshake does not complete within the specified duration, the
    CompletableFuture returned from the buildAsync() method of the WebSocket.Builder
    completes exceptionally with an HttpTimeoutException.


    You can add any custom headers for the opening handshake using the header() method.
    You can specify a request for given sub-protocols during the opening handshake
    using the subprotocols() method—only one of them will be selected by the server.
    The sub-protocols are defined by the application. The client and the server need
    to agree to work on specific sub-protocols and their details.


    Finally, call the buildAsync() method of the WebSocket.Builder interface to build
    the endpoint. It returns CompletableFuture<WebSocket>, which completes normally
    when this endpoint is connected to the server endpoint; it completes exceptionally
    when there was an error. The following snippet of code shows how to build and
    connect a client endpoint. Notice that the URI for the server starts with ws,
    which indicates the WebSocket protocol.


    URI serverUri = new URI("ws://localhost:8080/webapp/servertime");


    // Get a listener


    WebSocket.Listener listener = ...;


    // Build an endpoint using the default HttpClient


    HttpClient.newHttpClient()


    .newWebSocketBuilder(serverUri, listener)


    .buildAsync()


    .whenComplete((WebSocket webSocket, Throwable t) -> {


    // More code goes here


    });


