    little tricky to understand.


    Its primary purpose is to restore the previous execution state. If you execute
    this command in the beginning of every jshell session, starting from the second
    session, your session will contain all snippets you had ever executed in jshell
    sessions! This is a powerful feature. That is, you can evaluate snippets, close
    jshell, restart jshell, and execute the /reload -restore command as your first
    command, and you never lose any snippets that you previously entered. Sometimes,
    you will execute the /reset command twice in a session and want to restore the
    state that existed between those two resets. You can achieve this result by using
    this command.


