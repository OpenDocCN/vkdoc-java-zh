    Summary


    A specific functionality provided by an application (or a library) is known as
    a *service*. Applications and libraries providing implementations of a service
    are known as service providers. Applications using the service provided by those
    service providers are called *service consumers* or *clients*.


    In Java, a *service* is defined by a set of interfaces and classes. The service
    contains an interface or an abstract class that defines the functionality provided
    by the service and it is known as the *service provider* *interface*, *service
    interface*, or *service type*. A specific implementation of a service interface
    is known as a *service provider*. There can be multiple service providers for
    a single service interface. In JDK 9, a service provider may be a class or an
    interface.


    The JDK contains a java.util.ServiceLoader<S> class whose sole purpose is to discover
    and load service providers of type S at runtime for a specified service interface.
    If a JAR (modular or non-modular) containing a service provider is placed on the
    class path, the ServiceLoader class uses the META-INF/services directory to find
    the service providers. The name of the file in this directory should be the same
    as the fully qualified name of the service interface. The file contains the fully
    qualified name of the service provider implementation classes—one class name per
    line. The file can use a # character as the start of single-line comments. The
    ServiceLoader class scans all META-INF/services directories on the class path
    to discover service providers.


    In JDK 9, the service provider discovery mechanism has changed. A module that
    uses the


    ServiceLoader class to discover and load the service providers needs to specify
    the service interface using a uses statement. The service interface specified
    in a uses statement may be declared in the current module or any module accessible
    to the current module. You can use the iterator() method of the ServiceLoader
    class to iterate over all service providers. The stream() method provides a stream
    of elements that are instances of the ServiceLoader.Provider interface. You can
    use the stream to filter and select a specific type of providers based on the
    provider’s class names without having to instantiate all providers.


    A module that contains a service provider needs to specify the service interface
    and its implementation class using a provides statement. The implementation class
    must be declared in the current module.


    **CHAPTER 6**


    **Packaging Modules**


    In this chapter, you will learn:


    • Different formats for packaging Java modules


    • Enhancements to the JAR format


    • What a multi-release JAR is


    • How to create and use multi-release JARs


    • What the JMOD format is


    • How to use the jmod tool to work with JMOD files


    • How to create, extract, and describe JMOD files


    • How to list contents of JMOD files


    • How to record hashes of modules in JMOD files for dependency validation


    A module can be packaged in different formats to be used in three phases—compile-time,
    link time, and runtime. Not all formats are supported in all phases. JDK 9 supports
    the following formats to package modules:


    • Exploded directory


    • JAR format


    • JMOD format


    • JIMAGE format


    Exploded directories and JAR format were supported before JDK 9\. The JAR format
    has been enhanced in JDK 9 to support modular JARs and multi-release JARs. JDK
    9 has introduced two new formats for packaging modules: JMOD format and JIMAGE
    format. I discuss the enhancements to the JAR format and the JMOD format in this
    section. Chapter [7](http://dx.doi.org/10.1007/978-1-4842-2592-9_7) covers the
    JIMAGE format along with the jlink tool in detail.


    The JAR Format


    Chapt[er 3](http://dx.doi.org/10.1007/978-1-4842-2592-9_3) covered how to use
    new options with the jar tool to create modular JARs. The jar tool is also used
    to list entries in a JAR file, and to extract and update the contents of a JAR
    file. The jar tool has supported these operations before JDK 9 and there is nothing
    new to these operations in JDK 9\. In this chapter, I cover a new feature added
    to the JAR format, which is called a multi-release JAR.


    © Kishori Sharan 2017


    K. Sharan, *Java 9 Revealed*, DOI 10.1007/978-1-4842-2592-9_6


    Chapter 6 ■ paCkaging Modules


    What Is a Multi-Release JAR?'
