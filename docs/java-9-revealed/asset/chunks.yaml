- fmt: '### **Figure 2-2.** JARs on the class path as loaded and accessed by the Java
    runtime


    Java 9 addresses these problems by introducing a new way of developing, packaging,
    and deploying Java applications. In Java 9, a Java application consists of small
    interacting components called *modules*. Java 9 has organized the JDK/JRE as a
    set of modules as well. The focus of this chapter is an overview of modules. Subsequent
    chapters explain modules in detail.


    ### The New Module System


    Java 9 introduced a new program component called a *module*. You can think of
    a Java application as a collection of interacting modules with well-defined boundaries
    and dependencies between those modules. The module system was developed with the
    following goals:


    - Reliable configuration

    - Strong encapsulation

    - Modular JDK/JRE


    These goals were to solve the problems faced in developing and deploying Java
    applications prior to Java 9.


    *Reliable configuration* solves the problem of the error-prone class path mechanism
    used to look up types. A module must declare explicit dependencies on other modules.
    The module system verifies the dependencies in all phases of the application development—compile-time,
    link time, and runtime. Suppose a module declares a dependency on another module
    and the second module is missing at startup. The JVM detects that a dependency
    is missing and fails at startup. Prior to Java 9, such an application would generate
    a runtime error (not at startup) when the missing types were used.


    *Strong encapsulation* solves the problem of accessibility-at-will of public types
    across JARs on the class path. A module must explicitly declare which of its public
    types are accessible to other modules. A module cannot access public types in
    another module unless those modules explicitly make their public types accessible.
    A public type in Java 9 does not mean that it is accessible to all parts of the
    program. The module system has added more refined accessibility control. I explain
    the accessibility controls in another chapter.


    > **Tip** Java 9 provides reliable configuration by allowing a module to declare
    explicit dependency and verifying those dependencies in all phases of development.
    It provides strong encapsulation by allowing a module to declare packages whose
    public types are accessible to other modules.


    JDK 9 was rewritten by breaking down its predecessor’s monolithic structure into
    a set of modules called *platform modules*. JDK 9 also introduced an optional
    phase called *link time*, which may occur between compile-time and runtime. During
    link time, you use a linker, which is a tool called `jlink` that ships with the
    JDK 9, to create a custom runtime image of your application that includes only
    the modules used in your application. This shrinks the size of the runtime to
    its optimum size.


    ### What Is a Module?


    A *module* is a named collection of code and data. It can contain Java code and
    native code. Java code is organized as a set of packages containing types such
    as classes, interfaces, enums, and annotations. The data may include resources
    such as image files and configuration files.


    For Java code, a module acts as a collection of zero or more packages. Figure
    2-3 shows three modules named `policy`, `claim`, and `utility` in which the `policy`
    module contains two packages, the `claim` module contains one package, and the
    `utility` module contains no packages.


    ```

    policy

    claim

    utility

    package1

    package2

    package3

    Type1

    Type4

    Type7

    Type2

    Type5

    Type8

    Type3

    Type6

    Type9

    ```


    **Figure 2-3.** Arrangement of types, packages, and modules


    A module is much more than just a container of packages. Apart from its name,
    a module definition contains the following:


    - A list of other modules it *requires* (or depends on)

    - A list of packages it *exports* (its public APIs) that other modules can use

    - A list of packages that it *opens* (its entire API, public and private) to other
    modules for reflective access

    - A list of services it *uses* (or discovers and loads using the `java.util.ServiceLoader`
    class)

    - A list of implementations for services that it *provides*


    When you work with a module, you work with one or more of these aspects. I cover
    a few more theoretical aspects of modules before I show you how to define your
    own modules.


    The Java SE 9 Platform Specification divides the platform into a set of modules
    known as *platform modules*. An implementation of the Java SE 9 platform may contain
    some or all of the platform modules, thus providing a scalable Java runtime. Standard
    modules have names prefixed with `java.` Examples of Java SE standard modules
    are `java.base`, `java.sql`, `java.xml`, and `java.logging`. APIs in standard
    platform modules are supported and are intended for use by developers.


    Non-standard platform modules are part of the JDK, but not specified in the Java
    SE Platform Specification. These JDK-specific modules have names prefixed with
    `jdk.` Examples of JDK-specific modules are `jdk.charsets`, `jdk.compiler`, `jdk.jlink`,
    `jdk.policytool`, and `jdk.zipfs`. APIs in the JDK-specific modules are not intended
    for use by developers. These APIs are typically used in the JDK itself and by
    library developers who cannot easily get the desired functionality using the Java
    SE APIs. If you use APIs from these modules, they might not be supported or could
    change in the future without notice.


    JavaFX is not part of the Java SE 9 Platform Specification. However, JavaFX-related
    modules are installed when you install JDK/JRE. JavaFX modules names are prefixed
    with `javafx.` Examples of JavaFX modules are `javafx.base`, `javafx.controls`,
    `javafx.fxml`, `javafx.graphics`, and `javafx.web`.


    The `java.base` module, which is part of the Java SE 9 platform, is the primordial
    module. It does not depend on any other modules. The module system knows only
    about the `java.base` module. It discovers all other modules through the dependencies
    specified in the modules. The `java.base` module exports core Java SE packages
    such as `java.lang`, `java.io`, `java.math`, `java.text`, `java.time`, `java.util`,
    etc.


    ### Module Dependencies


    Up to JDK 8, a public type in one package could be accessed by other packages
    without any restrictions. In other words, packages did not control the accessibility
    of the types they contained. The module system in JDK 9 provides fine-grained
    control over the accessibility of types.


    Accessibility across modules is a two-way agreement between the used module and
    the using module: A module explicitly makes its public types available for use
    by other modules and the modules using those public types explicitly declare dependency
    on the first module. All non-exported packages in a module are private to the
    module and they cannot be used outside the module.


    Making public APIs in a package available to other modules is known as *exporting*
    that package. If a module named `policy` makes the public types in a package named
    `pkg1` available to other modules, it is said that the `policy` module *exports*
    the package `pkg1`. If a module named `claim` declares a dependency on the `policy`
    module, it is said that the `claim` module *reads* the `policy` module. If the
    `claim` module reads the `policy` module, it means that all public types in the
    exported packages of the `policy` module can be accessed inside the `claim` module.
    A module can also export a package selectively only to one or more named modules.
    Such exports are called *qualified exports* or *module-friendly exports*. The
    public types in a package in a qualified export are accessible only to the specified
    named modules.


    In the context of the module system, three terms—*requires*, *reads*, and *depends
    on*—are used interchangeably. Java documentation promotes the usage of the term
    *reads* in such contexts. The following three statements mean the same: `P` reads
    `Q`, `P` requires `Q`, and `P` depends on `Q`, where `P` and `Q` are two modules.'
  raw: '***Figure 2-2.** JARs on the class path as loaded and accessed by the Java
    runtime*


    Java 9 addresses these problems by introducing a new way of developing, packaging,
    and deploying Java applications. In Java 9, a Java application consists of small
    interacting components called *modules*. Java 9


    has organized the JDK/JRE as a set of modules as well. The focus of this chapter
    is an overview of modules.


    Subsequent chapters explain modules in detail.


    The New Module System


    Java 9 introduced a new program component called a *module*. You can think of
    a Java application as a collection of interacting modules with a well-defined
    boundaries and dependencies between those modules. The module system was developed
    with the following goals:


    • Reliable configuration


    • Strong encapsulation


    • Modular JDK/JRE


    These goals were to solve the problems faced in developing and deploying Java
    applications prior to Java 9.


    *Reliable configuration* solves the problem of the error-prone class path mechanism
    used to look up types. A module must declare explicit dependencies on other modules.
    The module system verifies the dependencies in all phases of the application development—compile-time,
    link time, and runtime. Suppose a module declares a dependency on another module
    and the second module is missing at startup. The JVM


    detects that a dependency is missing and fails at startup. Prior to Java 9, such
    an application would generate a runtime error (not at startup) when the missing
    types were used.


    Chapter 2 ■ the Module SySteM


    *Strong encapsulation* solves the problem of accessibility-at-will of public types
    across JARs on the class path. A module must explicitly declare which of its public
    types are accessible to other modules. A module cannot access public types in
    another module unless those modules explicitly make their public types accessible.
    A public type in Java 9 does not mean that it is accessible to all parts of the
    program. The module system has added more refined accessibility control. I explain
    the accessibility controls in another chapter.


    ■ **Tip** Java 9 provides reliable configuration by allowing a module to declare
    explicit dependency and verifying those dependencies in all phases of development.
    It provides strong encapsulation by allowing a module to declare packages whose
    public types are accessible to other modules.


    JDK 9 was rewritten by breaking down its predecessor’s monolithic structure into
    a set of modules called *platform modules*. JDK 9 also introduced an optional
    phase called *link time*, which may occur between compile-time and runtime. During
    link time, you use a linker, which is a tool called jlink that ships with the
    JDK 9, to create a custom runtime image of your application that includes only
    the modules used in your application. This shrinks the size of the runtime to
    its optimum size.


    What Is a Module?


    A *module* is a named collection of code and data. It can contain Java code and
    native code. Java code is organized as a set of packages containing types such
    as classes, interfaces, enums, and annotations. The data may include resources
    such as image files and configuration files.


    For Java code, a module acts as a collection of zero or more packages. Figur[e
    2-3 sho](#index_split_000.html#31)ws three modules named policy, claim, and utility
    in which the policy module contains two packages, the claim module contains one
    package, and the utility module contains no packages.


    policy


    claim


    utility


    package1


    package2


    package3


    Type1


    Type4


    Type7


    Type2


    Type5


    Type8


    Type3


    Type6


    Type9


    ***Figure 2-3.** Arrangement of types, packages, and modules*


    A module is much more than just a container of packages. Apart from its name,
    a module definition contains the following:


    • A list of other modules it *requires* (or depends on)


    • A list of packages it *exports* (its public APIs) that other modules can use


    • A list of packages that it *opens* (its entire API, public and private) to other
    modules for reflective access


    Chapter 2 ■ the Module SySteM


    • A list of services it *uses* (or discovers and loads using the java.util.ServiceLoader
    class)


    • A list of implementations for services that it *provides*


    When you work with a module, you work with one or more of these aspects. I cover
    a few more


    theoretical aspects of modules before I show you how to define your own modules.


    The Java SE 9 Platform Specification divides the platform into a set of modules
    known as *platform* *modules*. An implementation of the Java SE 9 platform may
    contain some or all of the platform modules, thus providing a scalable Java runtime.
    Standard modules have names prefixed with java. Examples of Java SE standard modules
    are java.base, java.sql, java.xml, and java.logging. APIs in standard platform
    modules are supported and are intended for use by developers.


    Non-standard platform modules are part of the JDK, but not specified in the Java
    SE Platform


    Specification. These JDK-specific modules have names prefixed with jdk. Examples
    of JDK-specific modules are jdk.charsets, jdk.compiler, jdk.jlink, jdk.policytool,
    and jdk.zipfs. APIs in the JDK-specific modules are not intended for use by developers.
    These APIs are typically used in the JDK itself and by library developers who
    cannot easily get the desired functionality using the Java SE APIs. If you use
    APIs from these modules, they might not be supported or could change in the future
    without notice.


    JavaFX is not part of the Java SE 9 Platform Specification. However, JavaFX-related
    modules are installed when you install JDK/JRE. JavaFX modules names are prefixed
    with javafx. Examples of JavaFX modules are javafx.base, javafx.controls, javafx.fxml,
    javafx.graphics, and javafx.web.


    The java.base module, which is part of the Java SE 9 platform, is the primordial
    module. It does not depend on any other modules. The module system knows only
    about the java.base module. It discovers all other modules through the dependencies
    specified in the modules. The java.base module exports core Java SE packages such
    as java.lang, java.io, java.math, java.text, java.time, java.util, etc.


    Module Dependencies


    Up to JDK 8, a public type in one package could be accessed by other packages
    without any restrictions. In other words, packages did not control the accessibility
    of the types they contained. The module system in JDK 9 provides fine-grained
    control over the accessibility of types.


    Accessibility across modules is a two-way agreement between the used module and
    the using module: A module explicitly makes its public types available for use
    by other modules and the modules using those public types explicitly declare dependency
    on the first module. All non-exported packages in a module are private to the
    module and they cannot be used outside the module.


    Making public APIs in a package available to other modules is known as *exporting*
    that package. If a module named policy makes the public types in a package named
    pkg1 available to other modules, it is said that the policy module *exports* the
    package pkg1\. If a module named claim declares a dependency on the policy module,
    it is said that the claim module *reads* the policy module. If the claim module
    reads the policy module, it means that all public types in the exported packages
    of the policy module can be accessed inside the claim module. A module can also
    export a package selectively only to one or more named modules. Such exports are
    called *qualified exports* or *module-friendly exports*. The public types in a
    package in a qualified export are accessible only to the specified named modules.


    In the context of the module system, three terms— *requires*, *reads*, and *depends
    on*—are used interchangeably. Java documentation promotes the usage of the term
    *reads* in such contexts. The following three statements mean the same: P reads
    Q, P requires Q, and P depends on Q, where P and Q are two modules.'
