    Callable<Integer> c = new Callable< **Integer**>() {


    @Override


    public Integer call() {


    return 100;


    }


    };


    JDK 9 added support for the diamond operator in anonymous classes as long as the
    inferred types are denotable. You cannot use the diamond operator with anonymous
    classes—even in JDK 9—if the inferred types are non-denotable. The Java compiler
    uses a many types that cannot be written in Java programs.


    Types that can be written in Java programs are known as *denotable* types. Types
    that the compiler knows but cannot be written in Java programs are known as *non-denotable*
    types. For example, String is a denotable type because you can use it in programs
    to denote a type; however, Serializable & CharSequence is not a 468


