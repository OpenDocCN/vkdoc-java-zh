    Updating Modules


    In previous chapters, you saw how to add exports and reads to a module using the
    --add-exports,


    --add-opens, and --add-reads command-line options. In this section, I show you
    how to add these statements to a module programmatically. The Module class contains
    the following methods that let you modify a module declaration at runtime:


    • Module addExports(String packageName, Module other)


    • Module addOpens(String packageName, Module other)


    • Module addReads(Module other)


    • Module addUses(Class<?> serviceType)


    There is a significant difference between using command-line options and one of
    these methods to modify a module’s declaration. Using command-line options, you
    can modify any module’s declaration.


    However, these methods are caller-sensitive. The code that calls these methods
    must be in the module whose declaration is being modified—except for calling the
    addOpens() method. That is, if you do not have access to the source code of a
    module, you cannot use these methods to modify that module’s declaration.


    These methods are typically meant to be used by frameworks, which can adapt to
    runtime needs to interact with other modules.


    All of these methods throw an IllegalCallerException when dealing with a named
    module whereby the caller is not allowed to call these modules.


    The addExports() method updates the module to export the specified package to
    the specified module.


    Calling the method has no effect if the specified package is already exported
    or open to the specified module or if the method is called on an unnamed or open
    module. An IllegalArgumentException is thrown if the specified package is null
    or does not exist in the module. Calling this method has the same effect as adding
    a qualified export to the module declaration:


    exports <packageName> to <other>;


    The addOpens() method works the same as the addExports() method, except that it
    updates the


    module to open the specified package to the specified module. It is similar to
    adding the following statement in the module:


    opens <packageName> to <other>;


    The addOpens() method makes an exception to the rule about who can call this method.
