    \nimport com.jdojo.person.Person;\n\npublic class Main {\n    public static void\
    \ main(String[] args) {\n        Person john = new Person(1001, \"John\", \"Jacobs\"\
    );\n\n        // Get John's city and print it\n        String city = john.getAddress().getCity();\n\
    \        System.out.printf(\"John lives in %s%n\", city);\n    }\n}\n```\n\nThe\
    \ code in the `main()` method is very simple—it creates a `Person` object and\
    \ reads the value of the city in the person’s address:\n\n```\nPerson john = new\
    \ Person(1001, \"John\", \"Jacobs\");\nString city = john.getAddress().getCity();\n\
    ```\n\nCompiling the code for the `com.jdojo.person.test` module generates the\
    \ following error:\n\n```\ncom.jdojo.person.test\\src\\com\\jdojo\\person\\test\\\
    Main.java:11: error: getCity() in Address is\ndefined in an inaccessible class\
    \ or interface\n    String city = john.getAddress().getCity();\n             \
    \       ^\n1 error\n```\n\nThe compiler message is not very clear. It is stating\
    \ that the `Address` class is not accessible to the `com.jdojo.person.test` module.\
    \ Recall that the `Address` class is in the `com.jdojo.address` module, which\
    \ the `com.jdojo.person.test` module does not read. Looking at the code, it seems\
    \ obvious that the code should compile. You have access to the `Person` class,\
    \ which uses the `Address` class; so you should be able to use the `Address` class.\
    \ Here, the `john.getAddress()` method returns an object of the `Address` type,\
    \ which you do not have access to. The module system is simply doing its job in\
    \ enforcing the encapsulation defined by the `com.jdojo.address` module. If a\
    \ module wants to use the `Address` class, explicitly or implicitly, it must read\
    \ the `com.jdojo.address` module. How do you fix it? The simple answer is for\
    \ the `com.jdojo.person.test` module to read the `com.jdojo.address` module by\
    \ changing its declaration to the one shown in Listing [4-8](#index_split_001.html#89).\n\
    \n***Listing 4-8.*** The Modified Module Declaration for the `com.jdojo.person.test`\
    \ Module\n\n```\n// module-info.java\nmodule com.jdojo.person.test {\n    requires\
    \ com.jdojo.person;\n    requires com.jdojo.address;\n}\n```\n\n![](index-90_1.jpg)\n\
    \nWhen you added the `requires com.jdojo.address` statement in Listing [4-8](#index_split_001.html#89),\
    \ you will get another error that will state that the `com.jdojo.address` module\
    \ is not found. Adding the `com.jdojo.address` project to the module path of the\
    \ `com.jdojo.person.test` project will fix this error. The module path setting\
    \ will look as shown in Figure [4-5](#index_split_001.html#90).\n\n***Figure 4-5.**\
    \ The module path setting for the `com.jdojo.person.test` module*\n\n![](index-91_1.jpg)\n\
    \nFigure [4-6](#index_split_001.html#91) shows the module graph for the `com.jdojo.person.test`\
    \ module at this point.\n\n***Figure 4-6.** The module graph for the `com.jdojo.person.test`\
    \ module*\n\nCompile and run the `Main` class in the `com.jdojo.person.test` module.\
