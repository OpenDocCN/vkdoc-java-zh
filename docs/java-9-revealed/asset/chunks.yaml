    类型的可访问性曾通过修饰符嵌入在类型声明中。如果一个包包含内部实现，程序的其他部分无法阻止访问这些内部实现。当使用某个类型时，类路径机制会线性搜索该类型。这导致了另一个问题：当部署的
    JAR 中缺少某些类型时，会在运行时收到错误——有时甚至在应用程序部署很久之后才出现。这些问题可分为两类：封装与配置。


    第 2 章 ■ 模块系统


    JDK 9 引入了模块系统。它提供了一种组织 Java 程序的方式，有两个主要目标：*强封装*和*可靠配置*。使用模块系统，应用程序由模块组成，模块是代码和数据的命名集合。一个模块通过其声明来控制其他模块可以访问该模块的哪些部分。访问另一个模块某部分的模块必须声明对第二个模块的依赖。控制访问和声明依赖这两个方面是实现强封装目标的基础。模块的依赖关系在启动时解析。在
    JDK 9 中，如果一个模块依赖于另一个模块，而运行应用程序时第二个模块缺失，你将在启动时收到错误，而不是在应用程序运行后的某个时刻。这是可靠配置的基础。


    模块通过模块声明来定义。模块的源代码通常存储在名为 `module-info.java` 的文件中。模块被编译成类文件，通常命名为 `module-info.class`。编译后的模块声明称为*模块描述符*。模块声明不允许指定模块版本。诸如
    `jar` 工具（用于将模块打包成 JAR）之类的工具可以将模块版本添加到模块描述符中。


    模块使用 `module` 关键字声明，后跟模块名称。模块声明可以使用五种类型的模块语句：`exports`、`opens`、`requires`、`uses`
    和 `provides`。`exports` 语句在编译时和运行时将模块的指定包导出到所有模块或指定的模块列表。`opens` 语句在运行时授予对指定包的反射访问权限，允许所有模块或指定的模块列表访问。其他模块可以使用反射访问指定包中的所有类型以及这些类型的所有成员（私有和公有）。`uses`
    和 `provides` 模块语句用于配置模块以发现服务实现并提供特定服务接口的服务实现。


    从 JDK 9 开始，`open`、`module`、`requires`、`transitive`、`exports`、`opens`、`to`、`uses`、`provides`
    和 `with` 是受限关键字。它们仅在模块声明中的特定位置出现时才具有特殊含义。


    模块的源代码和编译后的代码存放在目录、JAR 文件或 JMOD 文件中。在目录和 JAR 文件中，`module-info.class` 文件位于根目录。


    与类路径类似，JDK 9 引入了模块路径。然而，它们的使用方式不同。类路径用于搜索类型的定义，而模块路径用于定位模块，而不是模块中的特定类型。诸如 `java`
    和 `javac` 之类的 Java 工具已更新，可以同时使用模块路径和类路径。你可以使用 `--module-path` 或 `-p` 选项为这些工具指定模块路径。


    JDK 9 引入了 GNU 风格的选项供工具使用。这些选项以两个破折号开头，每个单词之间用破折号分隔，例如 `--module-path`、`--class-path`、`--list-modules`
    等。如果选项接受一个值，该值可以在选项后跟一个空格或 `=` 号。以下两个选项是相同的：


    • `--module-path C:\lib`


    • `--module-path=C:\lib`


    在某个阶段（编译时、运行时、工具等）模块系统可用的模块列表称为可观察模块。你可以使用 `java` 命令的 `--list-modules` 选项列出运行时可用的可观察模块。你也可以使用此选项打印模块的描述。


    **第 3 章**


    **创建你的第一个模块**


    在本章中，你将学习：


    • 如何编写模块化的 Java 程序


    • 如何编译模块化程序


    • 如何将模块的工件打包成模块化 JAR 文件


    • 如何运行模块化程序


    在本章中，我将解释如何使用模块——从编写源代码到编译、打包和运行程序。本章分为两部分。第一部分展示了使用命令行编写和运行模块程序的所有步骤。第二部分使用 NetBeans
    IDE 重复相同的步骤。


    在撰写本文时，NetBeans IDE 仍在开发中，并不支持所有 JDK 9 功能。例如，目前你需要在 NetBeans 中为你创建的每个模块创建一个新的
    Java 项目。在最终版本中，NetBeans 将允许你在一个 Java 项目中拥有多个模块。我在使用命令提示符时比使用 NetBeans IDE 时涵盖了更多特定的
    JDK 9 选项。


    本章解释的程序非常简单。程序运行时，会打印一条消息以及主类所属的模块名称。


    使用命令提示符


    以下小节描述了使用命令提示符创建和运行第一个模块的步骤。


    设置目录


    你将使用以下目录层次结构来编写、编译、打包和运行源代码：


    • `C:\Java9Revealed`


    • `C:\Java9Revealed\lib`


    • `C:\Java9Revealed\mods`


    • `C:\Java9Revealed\src`


    • `C:\Java9Revealed\src\com.jdojo.intro`


    © Kishori Sharan 2017

    K. Sharan, *Java 9 Revealed*, DOI 10.1007/978-1-4842-2592-9_3


    第 3 章 ■ 创建你的第一个模块


    这些目录是在 Windows 上设置的。在非 Windows 操作系统上，你可以设置类似的目录层次结构。`C:\Java9Revealed` 是顶级目录，包含三个子目录：`lib`、`mods`
    和 `src`。


    `src` 目录用于存储源代码，其中包含一个名为 `com.jdojo.intro` 的子目录。我将子目录命名为 `com.jdojo.intro`，因为我想创建一个名为
    `com.jdojo.intro` 的模块，并将其源代码存储在此子目录下。在这种情况下，是否有必要将子目录命名为 `com.jdojo.intro`？答案是否定的。我可以将子目录命名为其他名称，或者直接将源代码存储在
    `src` 目录中，而不使用 `com.jdojo.intro` 子目录。然而，将存储模块源代码的目录命名为与模块名称相同是一个好习惯。如果你遵循此命名约定，Java
    编译器提供的选项将帮助你一次性编译多个模块的源代码。


    你将使用 `mods` 目录以展开的目录层次结构存储编译后的代码。如果需要，你可以使用此目录中的代码运行程序。


    编译源代码后，你将把它打包成模块化 JAR 并存储在 `lib` 目录中。你可以使用模块化 JAR 运行程序，或者将模块 JAR 分发给其他开发者，他们可以运行该程序。


    在本节的剩余部分，我使用相对路径，例如 `src` 或 `src\com.jdojo.intro`。这些相对路径是相对于 `C:\Java9Revealed`
    目录的。例如，`src` 表示 `C:\Java9Revealed\src`。如果你使用的是非 Windows 操作系统或遵循其他目录层次结构，请进行相应调整。


    编写源代码


    你可以使用你选择的文本编辑器（例如 Windows 上的记事本）来编写源代码。让我们从创建一个名为 `com.jdojo.intro` 的模块开始。清单 3-1
    包含了模块声明。

