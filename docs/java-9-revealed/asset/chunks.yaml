    (No version)


    Let’s look at three odd cases in the table where you will receive an error if
    you place the JARs in the module path. The first JAR name that generates an error
    is jdojo-logging1.5.0\. Let us apply the rules to derive the automatic module
    name for this JAR:


    • There is no hyphen in the JAR name that is immediately followed by a digit,
    so there


    is no module version. The entire JAR name is used to derive the automatic module


    name.


    • All non-alphanumeric characters are replaced with a dot. The resulting string
    is


    jdojo.logging1.5.0\. Recall from Chapter [2](http://dx.doi.org/10.1007/978-1-4842-2592-9_2)
    that every part of a module name must be a valid Java identifier. In this case,
    5 and 0 are two parts in the module name,


    which are not valid Java identifiers. So, the derived module name is invalid.
    This is


    the reason you get an error when you add this JAR file to the module path.


    Another JAR name that generates an error is jdojo-trans-api_1.5_spec-1.0.0\. Let’s
    apply the rules to derive the automatic module name for this JAR:


    • It finds the last hyphen after which you have only digits and dots and splits
    the JAR


    name into two parts: jdojo-trans-api_1.5_spec and 1.0.0\. The first part is used
    to


    derive the module name. The second part is the module version.


    • All non-alphanumeric characters in the name part are replaced with a dot. The


    resulting string is jdojo.trans.api.1.5.spec, which is an invalid module name


    because 1 and 5 and are not valid Java identifiers. This is the reason you get
    an error


    when you add this JAR file to the module path.


    The last entry in the table contains an underscore (_) as a JAR name. That is,
    the JAR file was named _.jar. If you apply the rules, the underscore will be replaced
    by a dot and that dot will be removed because it is the only character in the
    name. You end up with an empty string, which is not a valid module name.


    Chapter 4 ■ Module dependenCy


    A JAR placed on the module path will throw an exception if a valid automatic module
    name cannot be derived from its name. For example, the _.jar file on the module
    path will cause the following exception: java.lang.module.ResolutionException:
    Unable to derive module descriptor for: _.jar


    You can use the jar command with the --describe-module option to print the module
    descriptor for a modular JAR and to print the name of the derived automatic module
    name for a JAR. For a JAR, it also prints the list of packages the JAR contains.
    The general syntax to use the command is as follows:


    jar --describe-module --file <path-to-JAR>


    The following command prints the automatic module name for the JAR named cglib-2.2.2.jar:


    C:\Java9Revealed>jar --describe-module --file lib\cglib-2.2.2.jar


    No module descriptor found. Derived automatic module.


    module cglib@2.2.2 (automatic)


    requires mandated java.base


    contains net.sf.cglib.beans


    contains net.sf.cglib.core


    contains net.sf.cglib.proxy


    contains net.sf.cglib.reflect


    contains net.sf.cglib.transform


    contains net.sf.cglib.transform.impl


    contains net.sf.cglib.util


    The command prints a message that it did not find a module descriptor in the JAR
    file and it derived an automatic module from the JAR. If you use a JAR (e.g. cglib.1-2.2.2.jar)
    whose name cannot be converted to a valid automatic name, the jar command prints
    an error message and will tell you what is wrong with the JAR name, as shown:


    C:\Java9Revealed>jar --describe-module --file lib\cglib.1-2.2.2.jar


    Unable to derive module descriptor for: lib\cglib.1-2.2.2.jar


    cglib.1: Invalid module name: ''1'' is not a Java identifier


    Once you know the name of an automatic module, other explicit modules can read
    it using requires statements. The following module declaration reads the automatic
    module named cglib that comes from the cglib-2.2.2.jar on the module path:


    module com.jdojo.lib {


    requires cglib;


    //...


    }


    Chapter 4 ■ Module dependenCy


    An automatic module, to be used effectively, must export packages and read other
    modules. Let’s look at the rules about this:


    • An automatic module reads all other modules. It is important to note that readability


    from an automatic module to all other modules is added after the module graph
    is


    resolved.


    • All packages in an automatic module are exported and opened.


    The two rules are based on the fact that there is no practical way to tell which
    other modules an automatic module depends on and which packages of the automatic
    module other modules will need to compile for deep reflection.


    An automatic module reading all other modules may create cyclic dependency, which
    is allowed after the module graph has been resolved. Recall that cyclic dependency
    between modules is not allowed during the module graph resolution. That is, you
    cannot have cyclic dependency in your module declarations.


    Automatic modules do not have a module declaration, so they cannot declare dependencies
    on other modules. Explicit modules may declare dependencies on other automatic
    modules. Let’s take a case where an explicit module M reads an automatic module
    P and the module P uses a type T in another automatic module Q. When you launch
    the application using the main class from module M, the module graph will consist
    of only M and P—excluding the java.base module in this discussion for brevity.
    The resolution process will start with the module M and will see that it reads
    another module P. The resolution process has no practical way to tell that the
    module P reads the module Q. You will be able to compile both modules P and Q
    by placing them on the class path. However, when you run this application, you
    will receive a ClassNotFoundException. The exception occurs when the module P
    tries to access a type from the module Q. To solve this problem, the module Q
    must be included in the module graph by adding it as a root module using the --add-modules
    command-line option and specifying Q as the value for this option.


    The following command describes the automatic modules named cglib whose module
    declaration is derived from the cglib-2.2.2.jar file by placing the file on the
    module path. The output indicates that the automatic module named cglib exports
    and opens all of its packages.


    C:\Java9Revealed>java --module-path lib\cglib-2.2.2.jar


    --list-modules cglib


    automatic module cglib@2.2.2 (file:///C:/Java9Revealed/lib/cglib-2.2.2.jar)


    exports net.sf.cglib.beans


    exports net.sf.cglib.core


    exports net.sf.cglib.proxy


    exports net.sf.cglib.reflect


    exports net.sf.cglib.transform


    exports net.sf.cglib.transform.impl


    exports net.sf.cglib.util


    requires mandated java.base


    opens net.sf.cglib.transform


    opens net.sf.cglib.transform.impl


    opens net.sf.cglib.beans


    opens net.sf.cglib.util


    opens net.sf.cglib.reflect


    opens net.sf.cglib.core


    opens net.sf.cglib.proxy


    Chapter 4 ■ Module dependenCy


    Unnamed Modules'
