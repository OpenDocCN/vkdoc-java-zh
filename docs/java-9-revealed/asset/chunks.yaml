    always loaded into the same module irrespective of the mode the java launcher
    is run in.


    Querying Modules


    Typical queries that you may run against a module include:


    • Can a module M read another module N?


    • Can a module use a service of a specific type?


    • Does a module export a specific package to all or some modules?


    • Does a module open a specific package to all or some modules?


    • Is this module named or unnamed?


    • Is this an automatic module?


    • Is this an open module?


    You can augment a module descriptor using command-line options and programmatically
    using the Module API. You can put all queries for module’s properties in two categories:
    ones whose results may change after the module is loaded and ones whose results
    do not change after the module is loaded. The Module class contains methods for
    queries in the first category and the ModuleDescriptor class contains methods
    for queries in the second category. The Module class provides the following methods
    for queries in the first category:


    • boolean canRead(Module other)


    • boolean canUse(Class<?> service)


    • boolean isExported(String packageName)


    • boolean isExported(String packageName, Module other)


    • boolean isOpen(String packageName)


    • boolean isOpen(String packageName, Module other)


    • boolean isNamed()


    Methods names are intuitive enough to tell you what they do. The isNamed() method
    returns true for a named module and false for an unnamed module. A module’s type,
    named or unnamed, does not change after the module has been loaded. This method
    is provided in the Module class because you cannot get a ModuleDescriptor for
    an unnamed module.


    Chapter 10 ■ the Module apI


    The ModuleDescriptor contains three methods that tell you about the type of module
    and how the module descriptor was generated. The isOpen() method returns true
    if it is an open module and false otherwise. The isAutomatic() method returns
    true for an automatic module and false otherwise.


