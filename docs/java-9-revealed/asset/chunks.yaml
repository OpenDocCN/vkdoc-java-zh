- fmt: "# Forward References in JShell\n\nForward references are allowed inside a\
    \ method’s body. That is, you can refer to methods or variables, which are not\
    \ declared yet, inside a method’s body. The method being declared cannot be called\
    \ until all missing referenced methods and variables are defined.\n\n```\njshell>\
    \ long multiply(int n) {\n   ...> return multiplier * n;\n   ...> }\n| created\
    \ method multiply(int), however, it cannot be invoked until variable multiplier\
    \ is\ndeclared\n\njshell> multiply(10)\n| attempted to call method multiply(int)\
    \ which cannot be invoked until variable multiplier\nis declared\n\njshell> int\
    \ multiplier = 2\nmultiplier ==> 2\n\njshell> multiply(10)\n$6 ==> 20\n\njshell>\
    \ void printCube(int n) {\n   ...> System.out.printf(\"Cube of %d is %d.%n\",\
    \ n, cube(n));\n   ...> }\n| created method printCube(int), however, it cannot\
    \ be invoked until method cube(int) is\ndeclared\n\njshell> long cube(int n) {\n\
    \   ...> return n * n * n;\n   ...> }\n| created method cube(int)\n\njshell> printCube(10)\n\
    Cube of 10 is 1000.\n```\n\nThis example declares a method named `multiply(int\
    \ n)`. It multiplies the argument with a variable named `multiplier`, which has\
    \ not been declared yet. Notice the feedback printed after you declare this method.\
    \ The feedback clearly states that you cannot call the `multiply()` method until\
    \ you declare the `multiplier` variable. Calling the method generates an error.\
    \ Later, the `multiplier` variable is declared and the `multiply()` method is\
    \ called successfully.\n\n**Tip:** You can also declare a recursive method using\
    \ a forward reference.\n\n## Type Declarations\n\nYou can declare all types such\
    \ as classes, interfaces, enums, and annotations in `jshell` as you do in Java.\
    \ The following `jshell` session creates a class named `Counter`, creates its\
    \ object, and calls its methods:\n\n```\njshell> class Counter {\n   ...> private\
    \ int counter;\n   ...> public synchronized int next() {\n   ...>     return ++counter;\n\
    \   ...> }\n   ...>\n   ...> public int current() {\n   ...>     return counter;\n\
    \   ...> }\n   ...> }\n| created class Counter\n\njshell> Counter c = new Counter();\n\
    c ==> Counter@25bbe1b6\n\njshell> c.current()\n$3 ==> 0\n\njshell> c.next()\n\
    $4 ==> 1\n\njshell> c.next()\n$5 ==> 2\n\njshell> c.current()\n$6 ==> 2\n```\n\
    \nYou can use the `/types` command to print a list of all declared types in `jshell`.\
    \ The command has the following forms:\n\n- `/types`\n- `/types <type-name>`\n\
    - `/types <snippet-id>`\n- `/types -start`\n- `/types -all`\n\nThe command without\
    \ an argument lists the current active `jshell` classes, interfaces, and enums.\
    \ Commands with a type name and a snippet ID argument list the types with the\
    \ specified name and specified snippet ID, respectively. The command with the\
    \ `-start` option lists the automatically added startup types. The command with\
    \ the `-all` option lists all types, including failed, overwritten, dropped, and\
    \ startup. The following `jshell` is a continuation of the previous example session;\
    \ it shows how to print all active types defined in a `jshell` session:\n\n```\n\
    jshell> /types\n| class Counter\n```\n\nThe `Counter` class is small. You may\
    \ quickly realize that it is not easy to enter the source code for bigger classes\
    \ on a command line. You want to use your favorite Java source code editor such\
    \ as NetBeans to write the source code and quickly test your classes in `jshell`.\
    \ You can open a source code file as a source input in `jshell` using the `/open`\
    \ command. The syntax is as follows:\n\n```\n/open <file-path>\n```\n\nYou can\
    \ find the source code for the `Counter` class in the `Java9Revealed/com.jdojo.jshell/src/Counter.java`\
    \ file. The following `jshell` session shows you how to open the saved `Counter.java`\
    \ file in `jshell`. It is assumed that you have saved the source code for this\
    \ book in `C:\\` on Windows. If you are using another operating system, just follow\
    \ the file-path naming convention and your directory structure to use the following\
    \ example.\n\n```\njshell> /open C:\\Java9Revealed\\com.jdojo.jshell\\src\\Counter.java\n\
    \njshell> Counter c = new Counter()\nc ==> Counter@25bbe1b6\n\njshell> c.current()\n\
    $3 ==> 0\n\njshell> c.next()\n$4 ==> 1\n\njshell> c.next()\n$5 ==> 2\n\njshell>\
    \ c.current()\n$6 ==> 2\n```\n\nNote that the source code for the `Counter` class\
    \ does not contain a package declaration because `jshell` does not allow you to\
    \ declare a class (or any type) in a package. All types that you declare in `jshell`\
    \ are considered static types of an internal synthetic class. However, you may\
    \ want to test your own class that is in a package. You can use an already compiled\
    \ class, which is in a package, in `jshell`. You will usually need it when you\
    \ are using libraries to develop your application and you want to experiment with\
    \ your application logic by writing snippets against library classes. You will\
    \ need to set the class path using the `/env` command, so your classes may be\
    \ found.\n\nA `Person` class in the `com.jdojo.jshell` package is included in\
    \ the book’s source code. The class declaration is as shown in Listing 11-1.\n\
    \n**Listing 11-1.** The Source Code for a Person Class\n\n```java\n// Person.java\n\
    package com.jdojo.jshell;\n\npublic class Person {\n    private String name;\n\
    \n    public Person() {\n        this.name = \"Unknown\";\n    }\n\n    public\
    \ Person(String name) {\n        this.name = name;\n    }\n\n    public String\
    \ getName() {\n        return name;\n    }\n\n    public void setName(String name)\
    \ {\n        this.name = name;\n    }\n}\n```\n\nThe following `jshell` command\
    \ sets the class path on Windows assuming the source code for this book was stored\
    \ in `C:\\`. Use the syntax for the class path string for your operating system\
    \ and the source code location on your computer if they are different from the\
    \ assumed.\n\n```\njshell> /env -class-path C:\\Java9Revealed\\com.jdojo.jshell\\\
    build\\classes\n| Setting new options and restoring state.\n\njshell> Person guy\
    \ = new Person(\"Martin Guy Crawford\")\n| Error:\n| cannot find symbol\n| symbol:\
    \   class Person\n| Person guy = new Person(\"Martin Guy Crawford\");\n| ^----^\n\
    | Error:\n| cannot find symbol\n| symbol:   class Person\n| Person guy = new Person(\"\
    Martin Guy Crawford\");\n| ^----^\n```\n\nDo you know the reason for this error?\
    \ We used the simple name of the class, `Person`, without importing it and `jshell`\
    \ was not able to locate the class. We need to import the `Person` class or use\
    \ its fully qualified name. The following is a continuation of this `jshell` session\
    \ that fixes this error:\n\n```\njshell> import com.jdojo.jshell.Person\n\njshell>\
    \ Person guy = new Person(\"Martin Guy Crawford\")\nguy ==> com.jdojo.jshell.Person@192b07fd\n\
    \njshell> guy.getName()\n$9 ==> \"Martin Guy Crawford\"\n\njshell> guy.setName(\"\
    Forrest Butts\")\n\njshell> guy.getName()\n$11 ==> \"Forrest Butts\"\n```\n\n\
    ## Setting Execution Environment\n\nIn the previous section, you learned how to\
    \ set the class path using the `/env` command. The command can be used to set\
    \ many other components of the execution context such as the module path. You\
    \ can also use it to resolve modules, so you can use types in modules on `jshell`.\
    \ Its complete syntax is as follows:\n\n```\n/env [-class-path <path>] [-module-path\
    \ <path>] [-add-modules <modules>]\n     [-add-exports <m/p=n>]\n```\n\nThe `/env`\
    \ command without arguments prints values for the current execution context. The\
    \ `-classpath` option sets the class path. The `-module-path` option sets the\
    \ module path. The `-add-modules` option adds modules to the default set of root\
    \ modules, so they can be resolved. You can use special values—`ALL-DEFAULT`,\
    \ `ALL-SYSTEM`, and `ALL-MODULE-PATH`—with the `-add-modules` option to resolve\
    \ the modules. Refer to Chapter 2 for the meanings of these special values. The\
    \ `-add-exports` option exports non-exported packages from a module to a set of\
    \ modules. These options have the same meanings as they have when used with the\
    \ `javac` and `java` commands.\n\n**Tip:** On the command line, these options\
    \ must start with two dashes, for example, `--module-path`. In `jshell`, they\
    \ can start with one dash or two dashes. For example, both `-module-path` and\
    \ `--module-path` are allowed in `jshell`."
