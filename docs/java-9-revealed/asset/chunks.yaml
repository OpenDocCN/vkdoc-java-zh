    运行时错误表明未找到 com.jdojo.reflect.Item 类。这次，错误不如您第一次尝试编译该类时那么清晰。然而，此错误的原因相同——com.jdojo.reflect
    模块在运行时未包含在模块图中。要修复它，您需要使用相同的 --add-modules 选项，但这次是针对 VM。图 4-19 显示了如何在 NetBeans
    中添加此选项。


    ***图 4-19.** 在运行时，将 com.jdojo.reflect 模块添加到 com.jdojo.unnamed 项目的默认根模块集（针对 VM）*


