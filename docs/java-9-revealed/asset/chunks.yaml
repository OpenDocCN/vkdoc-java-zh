    and iterate().


    For an ordered stream, the dropWhile() method returns the elements of the stream,
    discarding the elements from the beginning for which the specified predicate is
    true. For an unordered stream, the behavior of the dropWhile() method is non-deterministic.
    It may choose to drop any subset of elements matching the predicate. The current
    implementation drops the matching elements from the beginning until it finds a
    non-matching element. The takeWhile() method works the same way as the dropWhile()
    method, except that it returns the matching elements from the beginning of the
    stream and discards the rest. The ofNullable(T


    t) method returns a stream of a single element containing the specified element
    if the element is non-null.


    If the specified element is null, it returns an empty stream. The new iterate(T
    seed, Predicate<? super T> hasNext, UnaryOperator<T> next) method lets you create
    a sequential (possibly an infinite) stream using an initial seed value and iteratively
    applying the specified next function. The iteration stops when the specified hasNext
    predicate returns false.


    The Collectors class has two new methods in JDK 9: filtering() and flatMapping().
    The


    filtering() method returns a Collector that applies a filter before collecting
    elements. If the specified predicate returns true for an element, the element
    is collected; otherwise, the element is not collected.


    The flatMapping() method returns a Collector that applies a flat mapping function
    before collecting an element. The specified flat mapping function is applied to
    each element of the stream and the elements of the stream returned from the flat
    mapper are accumulated.


    **CHAPTER 19**


    **Platform and JVM Logging**


    In this chapter, you will learn:


    • The new platform logging API


    • Command-line options for JVM logging


    JDK 9 has overhauled the logging systems for platform classes (JDK classes) and
    JVM components.


    There is a new API that lets you specify a logging framework of your choice as
    logging backend for logging messages from platform classes. There is also a new
    command-line option that lets you access messages from all JVM components. In
    this chapter, I describe both logging facilities in detail.


    Platform Logging API


    Java SE 9 has added a platform logging API that can be used to specify a logger,
    for example, Log4j, SLF4J, or a custom logger, that can be used by the Java platform
    classes (classes in the JDK) to log messages. There are a few important points
    to note about this API. The API is meant to be used by the classes in the JDK,
    not by application classes. So, you should not be using this API to log your application
    messages. You need to use your logging framework such as Log4j to log application
    messages. The API does not let you configure the logger programmatically. The
    API consists of the following:


    • A service interface, java.lang.System.LoggerFinder, which is an abstract static


    class


    • An interface, java.lang.System.Logger, which provides the logging API


    • An overloaded method getLogger() in the java.lang.System class, which returns
    a


    System.Logger


    The details of configuring the platform logger depend on the logger you want to
    use. For example, if you use Log4j, you will need to configure the Log4j framework
    separately and configure the platform logger.


    Configuring the platform logger requires the following steps:


    • Create a class that implements the System.Logger interface.


    • Create an implementation for the System.LoggerFinder service interface.


    • Specify the implementation in a module declaration.


    I will configure Log4j 2.0 as a platform logger. Configuring and using Log4j is
    a vast topic. I cover only the details about Log4i needed to configure the platform
    logger.


