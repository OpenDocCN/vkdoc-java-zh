    the book and benefit from it.


    ## The Structure of the Book


    This book contains 20 chapters. Chapter 1 is an introduction to JDK 9 and how
    to work with the book and its source code. Chapters 2 through 10 cover the module
    system. These chapters are designed to be read sequentially.


    Chapter 11 covers the Java Shell (`JShell`) in detail. For the most part, you
    can read Chapter 11 without reading the first 10 chapters. However, I recommend
    you read them sequentially for a complete understanding.


    You can read Chapters 12 through Chapter 20 in any order. They cover independent
    topics. The last chapter is a catch-all chapter. If a topic was small enough not
    to require a chapter of its own, I stuffed it into this final chapter.


    ## The Audience


    This book is designed for experienced Java developers who are familiar with Java
    SE 8. Parts of the book use `Streams API`, `Time API`, and `Lambdas` introduced
    in Java SE 8. If you know Java SE 7 or earlier versions, you can certainly benefit
    reading Chapters 1 through 11 of this book. These chapters teach you the module
    system and the Java shell.


    Readers are advised to use the API documentation for the Java programming language
    as much as possible while using this book. The Java API documentation is where
    you will find a complete list of everything available in the Java class library.
    You can download (or view) the Java API documentation from Oracle’s official web
    site at `www.oracle.com`. While you read this book, you need to practice writing
    Java programs yourself. You can also practice by tweaking the programs provided
    in the book. It does not help much in your learning process if you just read this
    book and do not practice writing your own programs.


    Remember that “practice makes perfect,” which is also true in learning how to
    program using JDK 9.


    ## Source Code and Errata


    Source code and errata for this book can be accessed via `http://www.apress.com/us/book/9781484225912`.


    ## Questions and Comments


    Please direct all your questions and comments to the author at `ksharan@jdojo.com`.


