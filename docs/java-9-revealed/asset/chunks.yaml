  trans: "\n系统资源是指位于类路径上的资源——包括引导类路径、扩展目录中的 JAR 文件以及应用程序类路径。非系统资源可能存储在类路径以外的位置，例如特定目录、网络或数据库中。`getSystemResource()`\
    \ 方法通过应用程序类加载器查找资源，该加载器会委托给其父加载器（即扩展类加载器），而扩展类加载器又会进一步委托给其父加载器（即引导类加载器）。如果你的应用程序是独立应用程序，并且仅使用\
    \ JDK 内置的三种类加载器，那么使用名为 `getSystemResource*` 的静态方法即可满足需求。该方法能查找类路径上的所有资源，包括运行时映像中的资源（例如\
    \ `rt.jar` 文件中的资源）。如果你的应用程序是在浏览器中运行的 Applet，或是在应用服务器或 Web 服务器中运行的企业应用程序，则应使用名为\
    \ `getResource*` 的实例方法，这些方法允许你通过特定的类加载器查找资源。如果在 `Class` 对象上调用 `getResource*` 方法，则会使用当前类加载器（即加载该\
    \ `Class` 对象的类加载器）来查找资源。\n\n传递给 `ClassLoader` 类中所有方法的资源名称都是绝对路径，并且不以斜杠（`/`）开头。例如，在调用\
    \ `ClassLoader` 的 `getSystemResource()` 方法时，应使用 `java/lang/Object.class` 作为资源名称。\n\
    \n`Class` 类中的资源查找方法允许你指定绝对和相对资源名称。\n\n绝对资源名称以斜杠开头，而相对资源名称则不以斜杠开头。使用绝对名称时，`Class`\
    \ 类中的方法会移除开头的斜杠，并委托给加载该 `Class` 对象的类加载器来查找资源。以下调用：\n\n```java\nTest.class.getResource(\"\
    /resources/test.config\");\n```\n\n会被转换为：\n\n```java\nTest.class.getClassLoader()\n\
    \     .getResource(\"resources/test.config\");\n```\n\n第 8 章 ■ JDK 9 中的重大变更\n\n\
    使用相对名称时，`Class` 类中的方法会在委托给加载该 `Class` 对象的类加载器之前，先添加包名，并将包名中的点号替换为斜杠，再附加一个斜杠。假设\
    \ `Test` 类位于 `com.jdojo.test` 包中，以下调用：\n\n```java\nTest.class.getResource(\"resources/test.config\"\
    );\n```\n\n会被转换为：\n\n```java\nTest.class.getClassLoader()\n     .getResource(\"\
    com/jdojo/test/resources/test.config\");\n```\n\n让我们来看一个在 JDK 9 之前的版本中查找资源的示例。我使用\
    \ JDK 8 运行该示例。\n\n你可以在本书的可下载源代码中找到该示例的源代码以及一个 NetBeans 项目。\n\n该 NetBeans 项目名为\
    \ `com.jdojo.resource.preJDK9`。如果你创建自己的项目，请确保将项目的 Java 平台和源代码版本设置为 JDK 8。类和资源的组织方式如下：\n\
    \n• `word_to_number.properties`\n• `com/jdojo/resource/prejdk9/ResourceTest.class`\n\
    • `com/jdojo/resource/prejdk9/resources/number_to_word.properties`\n\n该项目包含两个资源文件：位于根目录的\
    \ `word_to_number.properties` 和位于 `com/jdojo/resource/prejdk9/resources` 目录的 `number_to_word.properties`。这些属性文件的内容如清单\
    \ 8-3 和清单 8-4 所示。\n\n***清单 8-3.*** `word_to_number.properties` 文件的内容\n\n```\n\
    One=1\nTwo=2\nThree=3\nFour=4\nFive=5\n```\n\n***清单 8-4.*** `number_to_word.properties`\
    \ 文件的内容\n\n```\n1=One\n2=Two\n3=Three\n4=Four\n5=Five\n```\n\n清单 8-5 包含一个完整的程序，演示了如何使用不同的类及其方法来查找资源。该程序表明，你可以将应用程序中的类文件作为资源使用，并且可以使用相同的方法来查找其他类型的资源。\n\
    \n第 8 章 ■ JDK 9 中的重大变更\n\n***清单 8-5.*** 演示如何在 JDK 9 之前的代码中查找资源的测试类\n\n```java\n\
    // ResourceTest.java\npackage com.jdojo.resource.prejdk9;\n```\n"
