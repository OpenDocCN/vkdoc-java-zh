    Migration Path to JDK 9


    When you want to migrate your application to JDK 9, you should keep two benefits
    in mind that are provided by the module system: strong encapsulation and reliable
    configuration. You goal is to have an application that consists of normal modules
    with an exception of a few open modules. You might think that someone could give
    you a clear list of steps you need to perform to migrate your existing applications
    to JDK 9.


    However, that is not possible, keeping in mind the variety of applications, their
    inter-dependence of other code, and the different configuration needs. All I can
    do is lay out a few generic guidelines that may help you through the migration
    process.


    Before JDK 9, a non-trivial Java application consisted of several JARs residing
    in three layers:


    • Application JARs in the application layer—developed by application developers


    • Library JARs in the library layer—provided by a third party


    • Java runtime JARs in the JVM layer


    JDK 9 has already modularized the Java runtime JARs by converting them to modules.
    That is, the Java runtime consists of modules and only modules.


    The library layer consists of mainly third-party JARs placed on the class path.
    If you want to migrate your application to JDK 9, you may not get a modular version
    of the third-party JARs. You also do not have control on how the third-party JARs
    will be converted into modules by their vendors. You can place the library JARs
    onto the module path and treat them as automatic modules.


    You have a choice to fully modularize your application code. The following are
    the choices you have for the module type selection—starting from the least desirable
    to the most desirable:


    • Unnamed modules


    • Automatic modules


    • Open modules


    • Normal module'
