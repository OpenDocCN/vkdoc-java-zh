- fmt: '# 系统资源与非系统资源


    系统资源是位于类路径上的资源——包括引导类路径、扩展目录中的JAR包以及应用程序类路径。非系统资源可能存储在类路径以外的位置，例如特定目录、网络或数据库中。


    `getSystemResource()`方法使用应用程序类加载器查找资源，该加载器委托给其父加载器（扩展类加载器），而扩展类加载器又委托给其父加载器（引导类加载器）。如果你的应用程序是独立应用程序，并且仅使用三个内置的JDK类加载器，那么使用名为`getSystemResource*`的静态方法即可正常工作。它将找到类路径上的所有资源，包括运行时映像中的资源（例如`rt.jar`文件中的资源）。如果你的应用程序是在浏览器中运行的applet，或是在应用服务器或Web服务器中运行的企业应用程序，则应使用名为`getResource*`的实例方法，这些方法允许你使用特定的类加载器查找资源。如果在`Class`对象上调用`getResource*`方法，则会使用当前类加载器（即加载该`Class`对象的类加载器）来查找资源。


    传递给`ClassLoader`类中所有方法的资源名称都是绝对路径，并且不以斜杠（`/`）开头。例如，在调用`ClassLoader`的`getSystemResource()`方法时，应使用`java/lang/Object.class`作为资源名称。


    `Class`类中的资源查找方法允许你指定绝对和相对资源名称。


    绝对资源名称以斜杠开头，而相对资源名称则不以斜杠开头。使用绝对名称时，`Class`类中的方法会去除开头的斜杠，并委托给加载该`Class`对象的类加载器来查找资源。以下调用：


    ```

    Test.class.getResource("/resources/test.config");

    ```


    会被转换为：


    ```

    Test.class.getClassLoader()

    .getResource("resources/test.config");

    ```


    使用相对名称时，`Class`类中的方法会在委托给加载该`Class`对象的类加载器查找资源之前，先添加包名，并将包名中的点替换为斜杠，然后再加上一个斜杠。假设`Test`类位于`com.jdojo.test`包中，以下调用：


    ```

    Test.class.getResource("resources/test.config");

    ```


    会被转换为：


    ```

    Test.class.getClassLoader()

    .getResource("com/jdojo/test/resources/test.config");

    ```


