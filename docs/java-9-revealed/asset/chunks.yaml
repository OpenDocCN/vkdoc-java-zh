    Chapter 4 ■ Module dependenCy


    Qualified Exports


    Suppose you are developing a library or framework that consists of several modules.
    You have packages in a module that contains APIs only for internal use by some
    modules. That is, packages in that module need not be exported to all modules,
    rather its accessibility must be limited to a few named modules. This can be achieved
    using a qualified exports statement in the module declaration. The general syntax
    for using a qualified export is as follows:


    exports <package> to <module1>, <module2>...;


    Here, <package> is the name of the package to be exported by the current module
    and <module1>,


    <module2>, etc. are the names of modules that can read the current module. The
    following module declaration contains an unqualified export and a qualified export:


    module com.jdojo.common {


    // An unqualified exports statement


    exports com.jdojo.zip;


    // A qualified exports statement


    exports com.jdojo.internal to com.jdojo.address;


    }


    The com.jdojo.common module exports the com.jdojo.zip package to all modules,
    whereas the


    com.jdojo.internal package belongs only to the com.jdojo.address module. All public
    types in the com.jdojo.zip module will be accessible in all modules that read
    the com.jdojo.common module. However, all public types in the com.jdojo.internal
    package will be accessible only to the com.jdojo.address module if the latter
    reads the former.


    You can find many examples of qualified exports in the JDK 9\. The java.base module
    contains sun.*


    and jdk.* packages that are exported to a few named modules. The following command
    prints the module declaration of java.base. The output shows a few of the qualified
    exports used in the java.base module.


    c:\>javap jrt:/java.base/module-info.class


    Compiled from "module-info.java"


    module java.base {


    exports sun.net to jdk.plugin, jdk.incubator.httpclient;


    exports sun.nio.cs to java.desktop, jdk.charsets;


    exports sun.util.resources to jdk.localedata;


    exports jdk.internal.util.xml to jdk.jfr;


    exports jdk.internal to jdk.jfr;


    ...


    }


    Chapter 4 ■ Module dependenCy


    Not all internal APIs in JDK 9 have been encapsulated. There are a few critical
    internal APIs in the sun.* packages, e.g., the class sun.misc.Unsafe, which were
    used by developers prior to JDK 9 and are still accessible in JDK 9\. Those packages
    have been placed in the jdk.unsupported module. The following command prints the
    module declaration for the jdk.unsupported module:


    C:\Java9Revealed>javap jrt:/jdk.unsupported/module-info.class


    Compiled from "module-info.java"


    module jdk.unsupported@9-ea {


    requires java.base;


    exports sun.misc;


    exports com.sun.nio.file;


    exports sun.reflect;


    opens sun.misc;


    opens sun.reflect;


    }


    Optional Dependency


    The module system verifies the module dependencies at compile-time as well as
    at runtime. There are times when you want to make a module dependency mandatory
    at compile-time, but optional at runtime.


    You may develop a library that performs better if a specific module is available
    at runtime. Otherwise, it falls back to another module that makes it perform less
    than optimal. However, the library is compiled against the optional module and
    it makes sure that the code dependent on the optional module is not executed if
    the optional module is not available.


    Another example is a module that exports an annotation bundle. The Java runtime
    already ignores nonexistent annotation types. If an annotation used in a program
    is not present at runtime, the annotation is ignored. Module dependency is verified
    at startup and if a module is missing, the application won’t start.


    Therefore, it is essential to declare such as module dependency on the module
    containing the annotation bundle as optional.


    You can declare an optional dependency by using the static keyword in a requires
    statement:


    requires **static** <optional-package>;


    The following module declaration contains an optional dependency on the com.jdojo.annotation


    module:


    module com.jdojo.claim {


    requires **static** com.jdojo.annotation;


    }


    It is allowed to have both transitive and static modifiers in a requires statement:


    module com.jdojo.claim {


    requires **transitive static** com.jdojo.annotation;


    }


    Chapter 4 ■ Module dependenCy


    The transitive and static modifiers can be used in any order if they’re used together.
    The following declaration has the same semantics as the previous one:


    module com.jdojo.claim {


    requires **static transitive** com.jdojo.annotation;


    }


    Accessing Modules Using Reflection


    For over 20 years, Java has allowed access to all members—private, public, package,
    and protected—of a type using reflection. You were able to access a private member
    of a class or object. All you had to do was call the setAccessible(true) method
    on the member (Field, Method, etc.) object. I will refer to accessing non-public
    members of a type using reflection as *deep reflection* in the remainder of chapter.


    When you export a package of a module, other modules can access only public types
    and public/


    protected members of those public types in the exported package—statically at
    compile-time or reflectively at runtime. This became a big issue during the design
    of the module system. There are several great frameworks such as Spring and Hibernate,
    which depend heavily on deep reflective access to members of types defined in
    application libraries.


    Designers of the module system faced a big challenge in designing the deep reflective
    access to the modular code. Allowing deep reflection on the types of an exported
    package violated the *strong* *encapsulation* theme of the module system. It makes
    everything accessible to the outside code even if the module developer did not
    want to expose some part of the module. On the other hand, by not allowing deep
    reflection will devoid the Java community of some great widely used frameworks
    and it will also break many existing applications that rely on deep reflection.
    Many existing applications will simply not migrate to JDK 9


    because of this limitation.'
