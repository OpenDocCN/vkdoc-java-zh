- fmt: '# Java 集合字面量支持


    Java 语言中对集合字面量的支持一直是一个备受期待的特性。JDK 9 没有直接提供集合字面量支持，而是更新了 `Collection` API，在 `List`、`Set`
    和 `Map` 接口中添加了静态工厂方法，这些方法分别返回不可修改的 `List`、`Set` 和 `Map`。该方法名为 `of()`。该方法被重载，允许你指定零到十个集合元素。`List`
    和 `Set` 接口提供了一个接受可变参数（`var-args`）的 `of()` 方法版本，允许你创建包含任意数量元素的 `List` 和 `Set`。`Map`
    接口提供了一个 `ofEntries()` 静态工厂方法，允许你创建包含任意数量条目的不可修改 `Map`。`Map` 接口还包含一个静态的 `entry()`
    方法，该方法接受一个键和一个值作为参数，并返回一个 `Map.Entry` 实例。`ofEntries()` 和 `entry()` 方法一起使用，用于创建包含任意数量条目的不可修改
    `Map`。


    这些接口中的新静态工厂方法针对性能进行了精细调优。`List.of()` 和 `Set.of()` 方法不允许 `null` 元素。`Set.of()` 方法不允许重复元素。


    `Map.of()` 和 `Map.ofEntries()` 方法不允许重复的键，也不允许 `null` 作为键或值。


    ---


    # 第 14 章：HTTP/2 客户端 API


    在本章中，你将学习：


    - 什么是 HTTP/2 客户端 API

    - 如何创建 HTTP 客户端

    - 如何发起 HTTP 请求

    - 如何接收 HTTP 响应

    - 如何创建 WebSocket 端点

    - 如何将未经请求的数据从服务器推送到客户端


    JDK 9 将 HTTP/2 客户端 API 作为一个孵化器模块（incubator module）提供，模块名为 `jdk.incubator.httpclient`。


    该模块导出一个包含所有公共 API 的包 `jdk.incubator.http`。孵化器模块不属于 Java SE 的一部分。在 Java SE 10 中，它要么被标准化并成为
    Java SE 10 的一部分，要么被移除。请访问网页 [http://openjdk.java.net/jeps/11](http://openjdk.java.net/jeps/11)
    了解更多关于 JDK 中孵化器模块的信息。


    孵化器模块在编译时或运行时默认不会被解析，因此你需要使用 `--add-modules` 选项将 `jdk.incubator.httpclient` 模块添加到默认的根模块集合中，如下所示：


    ```

    <javac|java|jmod...> --add-modules jdk.incubator.httpclient ...

    ```


    如果一个孵化器模块被另一个模块读取，并且第二个模块被解析，则该孵化器模块会被解析。


    在本章中，你将创建一个读取 `jdk.incubator.httpclient` 模块的模块，并且你不需要使用 `--add-modules` 选项来解析它。


    由于孵化器模块提供的 API 尚未最终确定，当你在编译时或运行时使用孵化器模块时，标准错误输出会打印一条警告。警告消息如下所示：


    ```

    WARNING: Using incubator modules: jdk.incubator.httpclient

    ```


    孵化器模块和包含孵化器 API 的包的名称都以 `jdk.incubator` 开头。


    一旦它们被标准化并包含在 Java SE 中，它们的名称将更改为使用标准的 Java 命名约定。例如，模块名 `jdk.incubator.httpclient`
    在 Java SE 10 中可能会变成 `java.httpclient`。


    © Kishori Sharan 2017

    K. Sharan, *Java 9 Revealed*, DOI 10.1007/978-1-4842-2592-9_14


    由于 `jdk.incubator.httpclient` 模块尚不属于 Java SE，你找不到该模块的 Javadoc。我为该模块生成了 Javadoc，并将其包含在本书的源代码中。你可以通过下载的源代码中的
    `Java9Revealed/jdk.incubator.httpclient/dist/javadoc/index.html` 文件访问该 Javadoc。我使用
    JDK 9 早期访问版本 build 158 生成了 Javadoc。API 可能会发生变化，你可能需要重新生成 Javadoc。以下是操作方法：


    1.  本书的源代码包含一个 `jdk.incubator.httpclient` NetBeans 项目，位于与项目名称相同的目录中。

    2.  当你安装 JDK 9 时，其源代码会作为 `src.zip` 文件复制到安装目录。将 `src.zip` 文件中 `jdk.incubator.httpclient`
    目录下的所有内容复制到下载源代码中的 `Java9revealed\jdk.incubator.httpclient\src` 目录。

    3.  在 NetBeans 中打开 `jdk.incubator.httpclient` 项目。

    4.  右键单击 NetBeans 中的项目节点，然后选择“生成 Javadoc”选项。你会收到一些可以忽略的错误和警告。它将在 `Java9Revealed/jdk.incubator.httpclient/dist/javadoc`
    目录中生成 Javadoc。打开此目录中的 `index.html` 文件以查看 `jdk.incubator.httpclient` 模块的 Javadoc。


    ## 什么是 HTTP/2 客户端 API？


    自 JDK 1.0 以来，Java 一直支持 HTTP/1.1。HTTP API 由 `java.net` 包中的几种类型组成。


    现有的 API 存在以下问题：


    - 它被设计为支持多种协议，如 `http`、`ftp`、`gopher` 等，其中许多协议已不再使用。

    - 它过于抽象且难以使用。

    - 它包含许多未记录的行为。

    - 它只支持一种模式，即阻塞模式，这要求每个请求/响应都有一个线程。


    2015 年 5 月，互联网工程任务组（IETF）发布了 HTTP/2 的规范。请访问网页 [https://tools.ietf.org/html/rfc7540](https://tools.ietf.org/html/rfc7540)
    获取 HTTP/2 规范的完整文本。


    HTTP/2 没有修改应用层语义。也就是说，你在应用程序中了解并一直使用的 HTTP 协议内容没有改变。它采用了一种更高效的方式来准备数据包并在客户端和服务器之间通过网络发送。你之前了解的关于
    HTTP 的所有内容，例如 HTTP 头、方法、状态码、URL 等，都保持不变。HTTP/2 试图解决 HTTP/1 连接面临的许多与性能相关的问题：


    - HTTP/2 支持二进制数据交换，而不是 HTTP/1.1 支持的文本数据。

    - HTTP/2 支持多路复用和并发，这意味着在 TCP 连接的两个方向上可以同时进行多个数据交换，并且对请求的响应可以乱序接收。这消除了在对等点之间建立多个连接的开销，而这在使用
    HTTP/1.1 时通常是必需的。在 HTTP/1.1 中，响应必须按照发送请求的相同顺序接收，这被称为队头阻塞。HTTP/2 通过在同一 TCP 连接上启用多路复用解决了队头阻塞问题。

    - 客户端可以建议请求的优先级，服务器在确定响应优先级时可能会遵循该建议。

    - HTTP 头被压缩，这显著减小了头部大小，从而降低了延迟。

    - 它允许服务器向客户端未经请求地推送资源。


    JDK 9 没有更新现有的 HTTP/1.1 API，而是提供了一个新的 HTTP/2 客户端 API，该 API 同时支持 HTTP/1.1 和 HTTP/2。该
    API 旨在最终取代旧的 API。新的 API 还包含用于使用 WebSocket 协议开发客户端应用程序的类和接口。


    请访问网页 [https://tools.ietf.org/html/rfc6455](https://tools.ietf.org/html/rfc6455)
    获取完整的 WebSocket 协议规范。新的 HTTP/2 客户端 API 相对于现有 API 有几个优点：


    - 它简单易学，在大多数常见情况下易于使用。

    - 它提供基于事件的通知。例如，当接收到头、接收到主体以及发生错误时，它会生成通知。

    - 它支持服务器推送，允许服务器在客户端没有显式请求的情况下将资源推送给客户端。它使得与服务器建立 WebSocket 通信变得简单。

    - 它支持 HTTP/2 和 HTTPS/TLS 协议。

    - 它可以在同步（阻塞模式）和异步（非阻塞模式）模式下工作。'
  raw: 'Support for collection literals in the Java language has been a much needed
    feature in Java. Instead of providing support for collection literals, JDK 9 updated
    the Collection API to add static factory methods in the List, Set, and Map interfaces
    that return an unmodifiable List, Set, and Map, respectively The method is named
    of(). The method is overloaded to let you specify zero to ten elements of the
    collection. The List and Set interface provide a version of the of() method that
    takes a var-args argument to let you create a List and Set with an arbitrary number
    of elements. The Map interface provides an ofEntries() static factory method to
    let you create an unmodifiable Map of an arbitrary number of entries. The Map
    interface also contains a static entry() method that accepts a key and a value
    as arguments and returns a Map.Entry instance. The ofEntries() and entry() methods
    are used together to create an unmodifiable Map of an arbitrary number of entries.


    The new static factory methods in these interfaces are fined-tuned for performance.
    The List.of() and Set.of() methods do not allow null elements. The Set.of() method
    does not allow duplicate elements.


    The Map.of() and Map.ofEntries() method do not allow duplicate keys, or null as
    a key or value.


    **CHAPTER 14**


    **The HTTP/2 Client API**


    In this chapter, you will learn:


    • What the HTTP/2 Client API is


    • How to create HTTP clients


    • How to make HTTP requests


    • How to receive HTTP responses


    • How to create WebSocket endpoints


    • How to push unsolicited data from server to client


    JDK 9 delivered the HTTP/2 Client API as an incubator module named jdk.incubator.httpclient.


    The module exports a jdk.incubator.http package that contains all public APIs.
    An incubator module is not part of the Java SE. In Java SE 10, either it will
    be standardized and become part of Java SE 10 or it will be removed. Refer to
    the web page at [http://openjdk.java.net/jeps/11 t](http://openjdk.java.net/jeps/11)o
    learn more about incubator modules in JDK.


    An incubator module is not resolved by default at compile-time or runtime, so
    you will need to add the jdk.incubator.httpclient module to the default set of
    root modules using the --add-modules option, like so:


    <javac|java|jmod...> -add-modules jdk.incubator.httpclient ...


    An incubator module is resolved if it is read by another module and the second
    module is resolved.


    In this chapter, you will create a module that reads the jdk.incubator.httpclient
    module and you will not have to use the -add-modules option to resolve it.


    Because the API provided by an incubator module is not final yet, a warning is
    printed on the standard error when you use an incubator module at compile-time
    or runtime. The warning message looks like this: WARNING: Using incubator modules:
    jdk.incubator.httpclient


    The names of an incubator module and packages containing an incubator API start
    with jdk.incubator.


    Once they are standardized and included in Java SE, their names will be changed
    to use the standard Java naming convention. For example, the module name jdk.incubator.httpclient
    may become


    java.httpclient in Java SE 10.


    © Kishori Sharan 2017


    K. Sharan, *Java 9 Revealed*, DOI 10.1007/978-1-4842-2592-9_14


    Chapter 14 ■ the http/2 Client api


    Because the jdk.incubator.httpclient module is not in Java SE yet, you will not
    find Javadoc for this module. I generated the Javadoc for this module and included
    it with the book’s source code. You can access the Javadoc using the Java9Revealed/jdk.incubator.httpclient/dist/javadoc/index.html
    file in the downloaded source code. I used the JDK 9 early access build 158 to
    generate the Javadoc. It is likely that the API may change and you may need to
    regenerate the Javadoc. Here is how you do this:


    1.


    The source code this book contains a jdk.incubator.httpclient NetBeans


    project in a directory with the same name as the project name.


    2.


    When you install JDK 9, its source code is copied as a src.zip file in the installation


    directory. Copy everything from the jdk.incubator.httpclient directory in the


    src.zip file to the Java9revealed\jdk.incubator.httpclient\src directory in


    the downloaded source code.


    3.


    Open the jdk.incubator.httpclient project in NetBeans.


    4.


    Right-click the project node in NetBeans and select the Generate Javadoc option.


    You will get errors and a warning that you can ignore. It will generate Javadoc
    in


    the Java9Revealed/jdk.incubator.httpclient/dist/javadoc directory.


    Open the index.html file in this directory to view the Javadoc for the


    jdk.incubator.httpclient module.


    What Is the HTTP/2 Client API?


    Java has supported HTTP/1.1 since JDK 1.0\. The HTTP API consists of several types
    in the java.net package.


    The existing API had the following issues:


    • It was designed to support multiple protocols such as http, ftp, gopher, etc.,
    many of


    which are not used anymore.


    • It was too abstract and hard to use.


    • It contained many undocumented behaviors.


    • It supported only one mode, blocking mode, which required you to have one thread


    per request/response.


    In May 2015, the Internet Engineering Task Force (IETF) published a specification
    for HTTP/2\. Refer to the web page a[t https://tools.ietf.org/html/rfc7540](https://tools.ietf.org/html/rfc7540)
    for the complete text of the HTTP/2 specification.


    HTTP/2 does not modify the application-level semantics. That is, what you know
    about and have been using about the HTTP protocol in your application have not
    changed. It has a more efficient way of preparing the data packets and sending
    then over to the wire between the client and server. All you knew about HTTP


    before, such as HTTP headers, methods, status codes, URLs, etc., remains the same.
    HTTP/2 attempts to solve many problems related to performance faced by HTTP/1
    connections:


    • HTTP/2 supports binary data exchange instead of textual data supported by


    HTTP/1.1.


    • HTTP/2 supports multiplexing and concurrency, which means that multiple data


    exchanges can occur concurrently in both directions of a TCP connection and


    responses to requests can be received out of order. This eliminates the overhead
    of


    having multiple connections between peers, which was typically the case while
    using


    HTTP/1.1\. In HTTP/1.1, responses must be received in the same order as the requests


    were sent, which is called *head-of-line* blocking. HTTP/2 has solved the head-of-line


    blocking problem by enabling multiplexing over the same TCP connection.


    Chapter 14 ■ the http/2 Client api


    • The client can suggest the priority of a request, which may be honored by the
    server


    in prioritizing responses.


    • HTTP headers are compressed, which reduces the header size significantly, thus


    lowering latency.


    • It allows for unsolicited push of resources from server to clients.


    Instead of updating the existing API for HTTP/1.1, JDK 9 provided a new HTTP/2
    Client API that supports both HTTP/1.1 and HTTP/2\. It is intended that the API
    will eventually replace the old one. The new API also contains classes and interfaces
    to develop client applications using the WebSocket protocol.


    Refer to the web page a[t https://tools.ietf.org/html/rfc6455 for the com](https://tools.ietf.org/html/rfc6455)plete
    WebSocket protocol specification. The new HTTP/2 Client API has several benefits
    over the existing API:


    • It is simple and easy to learn and use for most common cases.


    • It provides event-based notifications. For example, it generates notifications
    when


    headers are received, the body is received, and errors occur.


    • It supports server push, which allows the server to push resources to the client


    without the client making an explicit request. It makes setting up WebSocket


    communication with servers simple.


    • It supports HTTP/2 and HTTPS/TLS protocols.


    • It works in both synchronous (blocking mode) and asynchronous (non-blocking


    mode) modes.'
