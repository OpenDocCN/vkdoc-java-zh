    ### Additions to Java I/O API


    JDK 9 added a few convenience methods to the I/O API. The first one is a new method
    in the `InputStream` class:


    `long transferTo(OutputStream out) throws IOException`


    You have written code that reads all bytes from an input stream just to write
    to an output stream. Now, you do not have to write a loop to read bytes from the
    input stream and write them to the output stream. The `transferTo()` method reads
    all the bytes from the input stream and writes those bytes sequentially—as they
    were read—to the specified output stream. The method returns the number of bytes
    transferred.


    **Tip:** the `transferTo()` method does not close either stream. The input stream
    will be at the end of the stream when this method returns.


    Ignoring exception handling and stream closing logic, here is one line of code
    that copies the contents of the `log.txt` file to the `log_copy.txt` file.


    `new FileInputStream("log.txt").transferTo(new FileOutputStream("log_copy.txt"));`


    The `java.nio.Buffer` class received two new methods in JDK 9:


    - `abstract Buffer duplicate()`

    - `abstract Buffer slice()`


    Both methods return a `Buffer`, which shares the contents of the original buffer.
    The returned buffer will be direct or read-only only if the original buffer is
    direct or read-only. The `duplicate()` method returns a `Buffer` whose capacity,
    limit, position, and mark values will be identical to those of the original buffer.


    The `slice()` method returns a `Buffer` whose position will be zero, capacity
    and limit will be the number of elements remaining in this buffer, and mark will
    be undefined. The contents of the returned buffer start at the current position
    of the original buffer. The returned buffers from these methods maintain their
    position, limit, and mark independent of the original buffer. The following snippet
    of code shows the characteristics of the duplicated and sliced buffers:


    ```

    IntBuffer b1 = IntBuffer.wrap(new int[]{1, 2, 3, 4});

    IntBuffer b2 = b1.duplicate();

    IntBuffer b3 = b1.slice();

    System.out.println("b1=" + b1);

    System.out.println("b2=" + b2);

    System.out.println("b2=" + b3);


    // Move b1 y 1 pos

    b1.get();

    IntBuffer b4 = b1.duplicate();

    IntBuffer b5 = b1.slice();

    System.out.println("b1=" + b1);

    System.out.println("b4=" + b4);

    System.out.println("b5=" + b5);

    ```


    ```

    b1=java.nio.HeapIntBuffer[pos=0 lim=4 cap=4]

    b2=java.nio.HeapIntBuffer[pos=0 lim=4 cap=4]

    b2=java.nio.HeapIntBuffer[pos=0 lim=4 cap=4]

    b1=java.nio.HeapIntBuffer[pos=1 lim=4 cap=4]

    b4=java.nio.HeapIntBuffer[pos=1 lim=4 cap=4]

    b5=java.nio.HeapIntBuffer[pos=0 lim=3 cap=3]

    ```


    ### Summary


    In JDK 9, an underscore (`_`) is a keyword and you cannot use it by itself as
    a one-character identifier such as a variable name, a method name, a type name,
    etc. However, you can still use an underscore in a multi-character identifier
    name.


    JDK 9 removed the restriction that you must declare fresh variables for resources
    that you want to manage using a try-with-resource block. Now, you can use a *final*
    or *effectively final* variable that references a resource to be managed by a
    try-with-resources block.


    JDK 9 added support for the diamond operator in anonymous classes as long as the
    inferred types are denotable.


    You can have a private method in an interface that is either a non-abstract non-default
    instance method or a static method.


    JDK 9 allows the `@SafeVarargs` annotation on private methods. JDK 8 already allowed
    it on constructors, static methods, and final methods.


    JDK 9 added a new constant named `DISCARD` to the `ProcessBuilder.Redirect` nested
    class. Its type is `ProcessBuilder.Redirect`. You can use it as a destination
    for output and error streams of sub-processes when you want to discard the output.
    Implementations discard output by writing to an operating system specific “null
    file”.


    JDK 9 added several methods to the `Math` and `StrictMath` classes to support
    more mathematical operations such as `floorDiv(long x, int y)`, `floorMod(long
    x, int y)`, `multiplyExact(long x, int y)`, `multiplyFull(int x, int y)`, `multiplyHigh(long
    x, long y)`, etc.


    JDK 9 added three methods to the `java.util.Optional` class: `ifPresentOrElse()`,
    `or()`, and `stream()`.


    The `ifPresentOrElse()` method lets you provide two alternate courses of actions.
    If a value is present, it performs one action. Otherwise, it performs another
    action. The `or()` method returns the `Optional` itself if a value is present.
    Otherwise, it returns an `Optional` returned by the specified supplier. The `stream()`
    method returns a sequential stream of elements containing the value present in
    the `Optional`. If the `Optional` is empty, it returns an empty stream. The `stream()`
    method is useful in flat maps.


    JDK 9 added a new static `onSpinWait()` method to the `Thread` class. It is a
    pure hint to the processor that the caller thread is momentarily not able to proceed,
    so resource usage can be optimized. Use it inside a spin-loop.


    The Time API received a boost in JDK 9. Several methods were added to the `Duration`,
    `LocalDate`, `LocalTime`, and `OffsetTime` classes. The `LocalDate` class received
    a new `datesUntil()` method that returns a stream of dates between two dates by
    increments of one day or a given period. There are several new formatter symbols
    in the Time API.


    The `Matcher` class received overloaded versions of several existing methods,
    which used to work with `StringBuffer`, to support working with `StringBuilder`.
    A new method called `results()` returns a `Stream<MatchResult>`. The `Objects`
    class received several new utility methods to check the bounds of arrays and collections.


    The `java.util.Arrays` gained several methods that let you compare arrays and
    slices of arrays for equality and mismatch.


    Javadoc has been enhanced in JDK 9. It supports HTML5. You can use a new option,
    `-html5`, with the `javadoc` tool to generate Javadoc in HTML5 format. Names of
    all the modules, packages, types, members, and formal parameter types are indexed
    and can be searched using a new search feature. Javadoc displays a search box
    on the upper-right corner of each main page, which can be used to search indexed
    terms.


    You can also use a new tag, `@index`, in your Javadoc to make user-defined terms
    searchable. Searching is performed using the client-side JavaScript and no server
    communication is made.


    Many browser vendors have already removed support for the Java browser plugin
    or will be removing it in the near future. Keeping this in mind, JDK 9 deprecated
    the Applet API. All types in the `java.applet` package and the `javax.swing.JApplet`
    class have been deprecated. The `appletviewer` tool has also been deprecated.'
