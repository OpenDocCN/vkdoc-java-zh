    \ API 在使用方代码之前被移除。\n\n抑制弃用警告\n\nJDK 9 中引入的移除警告为抑制弃用警告增加了新的用例。\n\n在 JDK 9 之前，可以通过在使用方代码上添加\
    \ `@SuppressWarnings(\"deprecation\")` 注解来抑制所有弃用警告。考虑以下场景：\n\n• 在 JDK 8 中，某个 API\
    \ 被弃用，使用方抑制了弃用警告。\n• 在 JDK 9 中，该 API 的弃用状态从普通弃用变为最终弃用。\n• 使用方在 JDK 9 中编译正常，因为它已在\
