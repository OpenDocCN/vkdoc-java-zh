    第 15 章 ■ 增强的弃用机制


    弃用 API 的动态分析


    jdeprscan 工具是一个静态分析工具，因此它会跳过对弃用 API 的动态使用。例如，你可以通过反射调用一个弃用方法，而该工具在扫描时会遗漏这种情况。你还可以在由
    ServiceLoader 加载的提供者中调用弃用方法，该工具同样会遗漏这些调用。


    在未来的版本中，JDK 可能会提供一个名为 jdeprdetect 的动态分析工具，用于在运行时跟踪弃用 API 的使用情况。该工具将有助于查找引用弃用 API
    的死代码，这些代码由静态分析工具 jdeprscan 报告。


    导入语句不再产生弃用警告


    直到 JDK 9，如果你使用 import 语句导入弃用结构，编译器都会生成警告，即使你在所有使用这些弃用导入结构的地方都使用了 @SuppressWarnings
    注解。如果你试图消除代码中的所有弃用警告，这会非常烦人。你根本无法消除它们，因为你无法对 import 语句添加注解。JDK 9 通过*省略*导入语句上的弃用警告改进了这一点。


