    | Only the first few letters of the command are needed -- if more than one


    | each will be displayed. Example: /help /li


    |


    | /help <subject>


    | Display information about the specified help subject. Example: /help intro


    The following commands will display information about the /list and /set commands.
    Outputs are not shown because they are long:


    jshell> /help /list


    |...


    jshell> /help /set


    |...


    Sometimes, a command is used to work with multiple topics, for example, the /set
    command can be used to set the feedback mode, a snippet editor, startup scripts,
    etc. If you want to print information about a specific topic of a command, you
    can use the /help command in the following format:


    /help /<command> <topic-name>


    The following command prints information about setting the feedback mode:


    jshell> /help /set feedback


    The following command prints information about creating a custom feedback mode:


    jshell> /help /set mode


    Chapter 11 ■ the Java Shell


    Use the /help command with a subject as an argument to print information about
    the subject.


    Currently, there are three predefined subjects: intro, shortcuts, and context.
    The following command will print an introduction to the JShell tool:


    jshell> /help intro


    The following command will print a list of shortcuts and their descriptions that
    you can use in the JShell tool:


    jshell> /help shortcuts


    The following command will print a list of options used to set the execution context.
    These options are used with the /env, /reset, and /reload commands.


    jshell> /help context


