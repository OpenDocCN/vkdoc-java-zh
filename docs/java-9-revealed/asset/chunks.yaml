- fmt: 'Let’s package the module’s compiled code into a modular JAR. You will need
    to use the `jar` tool, which is located in the `JDK_HOME\bin` directory. The following
    command will do the job. The command is entered in one line, not in multiple lines.
    I broke the command into several lines for clarity. Note that the last part of
    the command is a dot, which means the current directory.


    ```

    C:\Java9Revealed>jar --create

    --file lib/com.jdojo.intro-1.0.jar

    --main-class com.jdojo.intro.Welcome

    --module-version 1.0

    -C mods/com.jdojo.intro .

    ```


    This command uses several options:


    - The `--create` option indicates that you want to create a new modular JAR.

    - The `--file` option is used to specify the location and the name of the new
    modular JAR. You are storing the new modular JAR in the `lib` directory and its
    name would be `com.jdojo.intro-1.0.jar`. I included the version number as `1.0`
    in the name of the modular JAR.

    - The `--main-class` option specifies the fully qualified name of the class having
    the `public static void main(String[])` method as the entry point for the application.
    When you specify this option, the `jar` tool will add an attribute in the `module-info.class`
    file whose value will be the name of the specified class. The `jar` tool also
    uses this option to add a `Main-Class` attribute to the `MANIFEST.MF` file.

    - The `--module-version` option specifies the version of the module as `1.0`.
    The `jar` tool will record this information in the attribute of the `module-info.class`
    file. Note that specifying the module version as `1.0` is not going to affect
    the name of the modular JAR. The `1.0` is included to indicate its version for
    the reader of the filename. The actual version of the module is specified by this
    option.

    - The `-C` option is used to specify the directory that will be used as the current
    directory when the `jar` command is executed. The `mods\com.jdojo.intro` directory
    is specified as the current directory for the `jar` tool. This will make the `jar`
    tool read all the files to be included in the modular JAR from this directory.

    - The last part of the command is a dot (`.`), which means that the `jar` tool
    needs to include all files and directories from the current directory `mods\com.jdojo.intro`.
    Note that this argument and the `-C` option work in tandem. If you do not provide
    the `-C` option, this dot is interpreted as the `C:\Java9Revealed` directory,
    which is the directory from which you are running the command.


    When the command runs successfully, it creates the following file:


    `C:\Java9Revealed\lib\com.jdojo.intro-1.0.jar`


    To make sure that your modular JAR contains the definition of the `com.jdojo.intro`
    module, run the following command. The command is entered on one line.


    ```

    C:\Java9Revealed>java --module-path lib --list-modules com.jdojo.intro

    ```


    The command specifies the module path as the `lib` directory, which means that
    the `lib` directory will be used to search for application modules. You pass `com.jdojo.intro`
    as the module name to the `--list-modules` option, which will print the module
    description along with the module’s location. If you get an output similar to
    the following, your modular JAR was created correctly:


    ```

    module com.jdojo.intro@1.0 (file:///C:/Java9Revealed/lib/com.jdojo.intro-1.0.jar)

    requires mandated java.base (@9-ea)

    contains com.jdojo.intro

    ```


    If you have trouble understanding this output, refer to Chapter [2](http://dx.doi.org/10.1007/978-1-4842-2592-9_2),
    where I explain in detail how to list the observable modules and descriptions
    of a module using the `--list-modules` option of the `java` command.


    ## Running the Program


    You use the `java` command to run a Java program. The syntax is as follows:


    ```

    java --module-path <module-path> --module <module>/<main-class>

    ```


    Here, `<module-path>` is the module path used to locate modules. The `--module`
    option specifies the module to be run along with its main class. If your modular
    JAR contains the `main-class` attribute, you can specify only the `<module>` part
    and `<main-class>` will be read from the modular JAR.


    **Tip:** You can use the shorter versions `-p` and `-m` for the `--module-path`
    and `--module` options, respectively.


    The following command will run the `com.jdojo.intro.Welcome` class in the `com.jdojo.intro`
    module. It is assumed that your current directory is `C:\Java9Revealed` and you
    have the modular JAR for the module located at `C:\java9Revealed\lib\com.jdojo.intro-1.0.jar`.


    ```

    C:\Java9Revealed>java --module-path lib

    --module com.jdojo.intro/com.jdojo.intro.Welcome

    Welcome to the Module System.

    Module Name: com.jdojo.intro

    ```


    The output indicates that the program was correctly executed. If you specify the
    main class while packaging the module code into a modular JAR, you can omit the
    main class name from the command. You had specified the `com.jdojo.intro.Welcome`
    class as the main class for this module, so the following command does the same
    job as the previous one:


    ```

    C:\Java9Revealed>java --module-path lib --module com.jdojo.intro

    Welcome to the Module System.

    Module Name: com.jdojo.intro

    ```


    You can also specify an exploded directory containing a module’s code as the module
    path. Recall that you had compiled the module code into the `mods` directory.
    The following command works the same:


    ```

    C:\Java9Revealed>java --module-path mods

    --module com.jdojo.intro/com.jdojo.intro.Welcome

    Welcome to the Module System.

    Module Name: com.jdojo.intro

    ```


    Let’s try running the module from the `mods` directory using only the module name:


    ```

    C:\Java9Revealed>java --module-path mods --module com.jdojo.intro

    module com.jdojo.intro does not have a MainClass attribute, use -m <module>/<main-class>

    ```


    Oops! You received an error. The error message indicates that the `module-info.class`
    found in the `mods\com.jdojo.intro` directory does not contain the main class
    name. That is true. When you declare a module, you cannot specify a main method
    or a version in the module declaration. When you compile a module, you can specify
    only module version. You can specify the module’s main class and its version when
    you package it using the `jar` tool. The `module-info.class` file in the `lib\com.jdojo.intro-1.0.jar`
    contains the main class name, whereas the `module-info.class` file in the `mods\com.jdojo.intro`
    directory does not. If you want to run a module whose compiled code is in an exploded
    directory, you must specify the main class name along with the module name.


    The JDK also provides another option called `-jar` to run a main class from a
    JAR file. Let’s use the following command to run this module:


    ```

    C:\Java9Revealed>java -jar lib\com.jdojo.intro-1.0.jar

    Welcome to the Module System.

    Module Name: null

    ```


    Oops! It seems that only the first line in the output is correct and the second
    line is incorrect. It found the main class and executed the code in its `main()`
    method. It printed the message correctly, but the module name is `null`. You know
    that you were able to run the module in previous commands, except the last one.


    You need to understand the behavior of the `java` command in JDK 9. The `-jar`
    option existed before JDK 9. In JDK 9, a type can be loaded as part of a module
    via a module path or via a class path. If a type is loaded via a class path, the
    type becomes a member of a module called an *unnamed* module. The type loses its
    membership from its original module, even though the type is loaded from a modular
    JAR. In fact, if a modular JAR is placed on the class path, it is treated as a
    JAR (not a modular JAR), ignoring its `module-info.class` file. Every application
    class loader has an unnamed module. All types loaded by a class loader from the
    class path are members of that class loader’s unnamed module. An unnamed module
    is also represented as an instance of the `Module` class whose `getName()` method
    returns `null`.'
