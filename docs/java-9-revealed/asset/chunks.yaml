- fmt: "# 模块类型概述\n\n在描述主要的模块类型之前，我先简要定义图[4-14](#index_split_002.html#108)中所示的模块类型。\n\
    \n- 模块是代码和数据的集合。\n- 根据模块是否具有名称，模块可以是*具名模块*或*未命名模块*。\n- 未命名模块没有进一步的分类。\n- 当模块具有名称时，该名称可以在模块声明中显式给出，也可以自动（或隐式）生成。如果名称在模块声明中显式给出，则称为*显式模块*。如果名称由模块系统通过读取模块路径上的JAR文件名生成，则称为*自动模块*。\n\
    - 如果你声明模块时未使用`open`修饰符，则称为*普通模块*。\n- 如果你使用`open`修饰符声明模块，则称为*开放模块*。\n\n基于这些定义，开放模块也是显式模块和具名模块。自动模块是具名模块，因为它具有名称（该名称是自动生成的），但它不是显式模块，因为它是由模块系统在编译时和运行时隐式声明的。以下小节将描述这些模块类型。\n\
    \n**提示** 如果Java平台最初就设计了模块系统，那么你只会拥有一种模块类型——普通模块！所有其他模块类型的存在都是为了向后兼容以及平滑迁移和采用JDK\
    \ 9。\n\n## 普通模块\n\n使用模块声明显式声明且未使用`open`修饰符的模块总是被赋予一个名称，称为*普通模块*或简称为*模块*。到目前为止，你主要使用的是普通模块。我一直将普通模块称为模块，除非需要在四种模块类型之间进行区分，否则我将继续使用这个术语。默认情况下，普通模块中的所有类型都是封装的。普通模块的示例如下：\n\
    \n```\nmodule a.normal.module {\n    // 模块语句写在这里\n}\n```\n\n## 开放模块\n\n如果模块声明包含`open`修饰符，则该模块称为开放模块。有关开放模块的更多信息，请参阅前面标题为“开放模块”的部分。开放模块的示例如下：\n\
    \n```\nopen module a.open.module {\n    // 模块语句写在这里\n}\n```\n\n## 自动模块\n\n为了向后兼容，用于查找类型的类路径机制在JDK\
    \ 9中仍然有效。你可以选择将JAR放置在类路径、模块路径或两者的组合上。请注意，你可以将模块化JAR以及普通JAR同时放置在模块路径和类路径上。\n\n\
    当你将JAR放置在模块路径上时，该JAR被视为一个模块，称为*自动*模块。*自动*模块这个名称源于以下事实：该模块是从JAR自动定义的——你无需通过添加`module-info.class`文件来显式声明模块。自动模块具有名称。自动模块的名称是什么？它读取哪些模块以及导出哪些包？我将很快回答这些问题。\n\
    \n自动模块也是具名模块。其名称和版本根据以下规则从JAR文件名派生：\n\n- 移除JAR文件的`.jar`扩展名。如果JAR文件名为`com.jdojo.intro-1.0.jar`，此步骤会移除`.jar`扩展名，后续步骤使用`com.jdojo.intro-1.0`来派生模块名称及其版本。\n\
    - 如果名称以连字符结尾，后跟至少一个数字（该数字可选地后跟一个点），则模块名称从最后一个连字符之前的部分派生。连字符之后的部分如果可以被解析为有效版本，则被分配为模块的版本。在此示例中，模块名称将从`com.jdojo.intro`派生，版本将被派生为`1.0`。\n\
    - 名称部分中的每个非字母数字字符都被替换为一个点。"
  raw: 'Before I describe main types of modules, I give brief definitions of the module
    types shown in Figure [4-14](#index_split_002.html#108).


    • A module is a collection of code and data.


    • Based on whether a module has a name, a module can be a *named module* or an


    *unnamed module*.


    • There are no further categories of unnamed modules.


    • When a module has a name, the name can be given explicitly in a module


    declaration or the name can be generated automatically (or implicitly). If the
    name is


    given explicitly in a module declaration, it is called an *explicit module*. If
    the name is generated by the module system by reading the JAR filename on the
    module path, it


    is called an *automatic module*.


    • If you declare a module without using the open modifier, it is called a *normal
    module*.


    • If you declare a module using the open modifier, it is called an *open module*.


    Based on these definitions, an open module is also an explicit module and a named
    module. An


    automatic module is a named module as it has a name, which is automatically generated,
    but it is not an explicit module because it is implicitly declared by the module
    system at compile-time and runtime. The following sub-sections describe these
    module types.


    Chapter 4 ■ Module dependenCy


    ■ **Tip** If the Java platform was initially designed with the module system,
    you would have only one module type—the normal module! all other module types
    exist for backward compatibility and smooth migration and adoption of JdK 9.


    Normal Modules


    A module that is declared explicitly using a module declaration without using
    an open modifier is always given a name and it is called a *normal module* or
    simply a *module*. So far, you have been working with mostly normal modules. I
    have been referring to normal modules as modules and I will continue using this
    term in this sense unless I need to make a distinction between the four types
    of modules. By default, all types in a normal module are encapsulated. An example
    of a normal module is as follows:


    module a.normal.module {


    // Module statements go here


    }


    Open Modules


    If a module declaration contains the open modifier, the module is known as an
    open module. Refer to the previous section entitled “Open Modules” for more information
    on open modules. An example of an open module is as follows:


    open module a.open.module {


    // Module statements go here


    }


    Automatic Modules


    For backward compatibility, the class path mechanism to look up types still works
    in JDK 9\. You have options to place your JARs on the class path, the module path,
    and a combination of both. Note that you can place modular JARs as well as JARs
    on both the module path and the class path.


    When you place a JAR on the module path, the JAR is treated as a module, which
    is called an *automatic* module. The name *automatic* module is derived from the
    fact that the module is automatically defined out of a JAR—you do not explicitly
    declare the module by adding a module-info.class file. An automatic module has
    a name. What is the name of an automatic module? What modules does it read and
    what packages does it export? I will answer these questions shortly.


    An automatic module is also a named module. Its name and version are derived from
    the name of the JAR file using the following rules:


    • The .jar extension of the JAR file is removed. If the JAR filename is com.jdojo.


    intro-1.0.jar, this step removes the .jar extension and the following steps use


    com.jdojo.intro-1.0 to derive the name of the module and its version.


    • If the name ends with a hyphen followed by at least one digit, which is optionally


    followed by a dot, the module name is derived from the part of the name that


    precedes the last hyphen. The part that follows the hyphen is assigned as the
    version


    of the module if it can be parsed as a valid version. In this example, the module
    name


    will be derived from com.jdojo.intro. The version will be derived as 1.0.


    Chapter 4 ■ Module dependenCy


    • Every non-alphanumeric character in the name part is replaced with a dot and,'
