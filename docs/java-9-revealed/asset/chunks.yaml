    我向你展示了一个使用 Log4j 2.0 作为后端日志记录器来配置平台日志记录器的示例。这个示例在投入生产环境使用之前，还有很多工作要做。我们可以进行的一项改进是记录发出日志消息的类名。请参考清单
    19-8，你会发现所有记录的日志消息都使用了相同的类名 `com.jdojo.logger.Log4jLogger` 作为日志记录器的类，这是不正确的。你从
    `com.jdojo.logger.PlatformLoggerTest` 类记录了两条消息，而从 `java.util.Currency` 类记录了一条消息。如何解决这个问题？


    让我们先尝试理解这个问题。日志记录器的类名由 Log4j 决定。它只是查看其 `log()` 方法的调用者，并将该类用作记录消息的类。在清单 19-3 中，两个
    `log()` 方法调用了 `Log4j` 的 `log()` 方法来委托日志记录工作。Log4j 将 `com.jdojo.logger.Log4jLogger`
    类视为消息的记录器，并在记录的消息中使用其名称作为日志记录器类。有两种方法可以解决这个问题：


    *   在 `Log4jLogger` 类中，使用 JDK 9 新增的 **Stack-Walking API** 自行格式化消息。Stack-Walking
    API 将为你提供调用者的类名和其他详细信息。这将需要你更改 Log4j 配置文件中的模式布局，以便 Log4j 不会确定并在消息中包含日志记录器的类名。

    *   你可以等待下一个版本的 Log4j，它*可能*会原生支持 JDK 9 平台日志记录器。在撰写本文时，Log4j 尚未发布此类公告。


