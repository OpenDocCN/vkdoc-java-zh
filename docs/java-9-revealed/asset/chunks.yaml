    这四个接口包含与清单 17-1\. T 所示相同的方法。Flow 类包含一个名为 `defaultBufferSize()` 的静态方法，该方法返回发布者和订阅者所用缓冲区的默认大小。目前，它返回
    256。


    `SubmissionPublisher<T>` 类是 `Flow.Publisher<T>` 接口的一个实现类。该类实现了 `AutoCloseable`
    接口，因此你可以使用 try-with-resources 块来管理其实例。JDK 9 没有为 `Flow.Subscriber<T>` 接口提供实现类；你需要自行实现它。不过，`SubmissionPublisher<T>`
    类包含一个 `consume(Consumer<? super T> consumer)` 方法，你可以用它来处理该发布者发布的所有项目。稍后我将结合示例更详细地解释这一点。


    **发布者-订阅者交互**


    在开始使用 JDK API 之前，理解使用响应式流的典型发布者-订阅者会话中发生的事件顺序非常重要。我会列出每个事件中使用的方法。一个发布者可以有零个或多个订阅者。为了便于讨论，这里我只使用一个订阅者。


    • 你创建一个发布者和一个订阅者，它们分别是 `Flow.Publisher` 和 `Flow.Subscriber` 接口的实例。


    • 订阅者尝试通过调用发布者的 `subscribe()` 方法来订阅该发布者。如果订阅成功，发布者会异步地调用订阅者的 `onSubscribe()` 方法，并传入一个
    `Flow.Subscription`。如果订阅尝试失败，则会调用订阅者的 `onError()` 方法，并传入一个 `IllegalStateException`，发布者-订阅者交互随之结束。


    • 订阅者通过调用 `Subscription` 的 `request(N)` 方法向发布者请求 N 个项目。订阅者可以向发布者发送多个请求以获取更多项目，而无需等待其先前的请求被满足。


    第 17 章 ■ 响应式流


    • 发布者会调用订阅者的 `onNext(T item)` 方法，调用次数不超过订阅者在其所有先前请求中请求的项目数量——每次调用向订阅者发送一个项目。如果发布者没有更多项目可发送给订阅者，发布者会调用订阅者的
    `onComplete()` 方法以表示流结束，从而结束发布者-订阅者交互。如果订阅者请求 `Long.MAX_VALUE` 个元素，这实际上是一个无界请求，该流实际上就是一个推送流。


    • 如果发布者在任何时候遇到错误，它会调用订阅者的 `onError()` 方法。


    • 订阅者可以通过调用其 `Flow.Subscription` 的 `cancel()` 方法来取消订阅。一旦订阅被取消，发布者-订阅者交互即告结束。不过，如果在请求取消之前存在待处理的请求，订阅者仍有可能在取消订阅后收到项目。


    总结上述关于终止条件的步骤：一旦在订阅者上调用了 `onComplete()` 或 `onError()` 方法，订阅者将不再从发布者处接收任何通知。


    在调用发布者的 `subscribe()` 方法之后，假设订阅者没有取消其订阅，则保证在订阅者上会按以下顺序调用方法：


    `onSubscribe onNext* (onError | onComplete)?`


    这里，符号 `*` 和 `?` 用作正则表达式中的关键字——`*` 表示零次或多次出现，`?` 表示零次或一次出现。


    在订阅者上调用的第一个方法是 `onSubscribe()` 方法，这是成功订阅发布者的通知。订阅者的 `onNext()` 方法可能被调用零次或多次，每次调用表示发布了一个项目。`onComplete()`
    和 `onError()` 方法中的一个可能被调用零次或一次，以表示终止状态；只要订阅者没有取消其订阅，就会调用这两个方法中的一个。

