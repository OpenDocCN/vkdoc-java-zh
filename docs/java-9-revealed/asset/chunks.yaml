    \ singleton lists:\n\n```java\n// Creating an empty, immutable List before JDK\
    \ 9\nList<Integer> emptyList1 = Collections.EMPTY_LIST;\nList<Integer> emptyList2\
    \ = Collections.emptyList();\n\n// Creating an empty list in JDK 9\nList<Integer>\
    \ emptyList = List.of();\n\n// Creating a singleton, immutable List before JDK\
    \ 9\nList<Integer> singletonList1 = Collections.singletonList(100);\n\n// Creating\
    \ a singleton, immutable List in JDK 9\nList<Integer> singletonList = List.of(100);\n\
    ```\n\nHow do you use the `of()` method to create an unmodifiable list from an\
    \ array? The answer depends on the list you want out of the array. You may want\
