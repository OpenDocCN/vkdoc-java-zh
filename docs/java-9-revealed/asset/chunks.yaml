    多版本 JAR 的规则


    在创建多版本 JAR 时，你需要遵循一些规则。如果出错，`jar` 工具会打印错误信息。有时，错误信息并不直观。正如我所建议的，最好使用 `--verbose`
    选项运行 `jar` 工具，以获取关于错误的更多详细信息。


    大多数规则基于一个事实：一个 MRJAR 包含一个库（或应用）的某个版本 API，该 API 面向多个 JDK 平台。例如，你有一个名为 `jdojo-lib-1.0.jar`
    的 MRJAR，它可能包含名为 `jdojo-lib` 的库的 1.0 版本 API，并且该库可能使用了 JDK 8 和 JDK 9 的 API。这意味着，当这个
    MRJAR 在 JDK 8 的类路径、JDK 9 的类路径或 JDK 9 的模块路径上使用时，它应该提供相同的 API（就公共类型及其公共成员而言）。如果该
    MRJAR 在 JDK 8 和 JDK 9 上提供了不同的 API，那么它就不是一个有效的 MRJAR。以下部分描述了一些规则。


    模块化多版本 JAR


    一个 MRJAR 可以是一个模块化 JAR，在这种情况下，它可以在根目录、一个或多个版本化目录中，或两者的组合中包含模块描述符 `module-info.class`。版本化描述符必须与根模块描述符相同，但以下情况除外：


    *   版本化描述符可以对 `java.*` 和 `jdk.*` 模块具有不同的非传递性 `requires` 语句。

    *   不同的模块描述符不能对非 JDK 模块具有不同的非传递性 `requires` 语句。

    *   版本化描述符可以具有不同的 `uses` 语句。


    这些规则基于这样一个事实：允许更改实现细节，但不允许更改 API 本身。允许更改非 JDK 模块的 `requires` 语句被视为对 API 的更改——这要求你为不同版本的
    JDK 拥有不同的用户定义模块。这就是不允许这样做的原因。


    一个模块化 MRJAR 在根目录中不必有模块描述符。这就是我们在上一节示例中的情况。我们在根目录中没有模块描述符，但在 `META-INF/versions/9`
    目录中有一个。这种安排使得在一个 MRJAR 中同时包含 JDK 8 的非模块化代码和 JDK 9 的模块化代码成为可能。


    模块化多版本 JAR 与封装

