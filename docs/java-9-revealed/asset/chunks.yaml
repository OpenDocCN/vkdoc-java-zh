    There are 11 special versions of the of() method to create lists of zero to ten
    elements. Another version takes a var-args argument to allow creating an unmodifiable
    list of any number of elements. You might wonder why there are so many versions
    of the method when the version with the var-args argument can create lists with
    any number of elements. They exist for performance reason. The API designers wanted
    lists with small number of elements to be efficient. A var-args argument is implemented
    using an array. Methods with non-var-args arguments exist to avoid boxing the
    arguments into an array, which makes them more efficient. These methods use special
    implementation classes of the List interface for smaller lists.


    The returned lists from the of() method have the following characteristics:


    • They are structurally immutable. Attempting to add, replace, or delete elements


    throws an UnsupportedOperationException.


    • They do not allow null elements. A NullPointerException is thrown if an element


    in the list is null.


    • They are serializable if all elements are serializable.


    • The order of the elements is the same as specified in the of() method or the
    array


    used with the var-args version of the of(E… elements) method.


