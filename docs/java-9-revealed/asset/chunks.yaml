    \   }\n        return str;\n    }\n}\n```\n\nOutput:\n\n```\nVersion String=9\n\
    Major=9, Minor=0, Security=0, Additional Version=, Pre=, Build=, Optional=\n\n\
    Version String=9.1\nMajor=9, Minor=1, Security=0, Additional Version=, Pre=, Build=,\
