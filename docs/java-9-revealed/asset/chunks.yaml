  trans: "\n实现是一个接口，它仅加载并返回接口引用。服务实现（一个类或接口）必须遵循以下规则：\n\n• 如果服务实现隐式或显式声明了一个没有形式参数的公共构造函数，则该构造函数被称为*提供者构造函数*。\n\
    \n• 如果服务实现包含一个名为 `provider` 且没有形式参数的公共静态方法，则该方法被称为*提供者方法*。\n\n• 提供者方法的返回类型必须是服务接口类型或其子类型。\n\
    \n• 如果服务实现不包含提供者方法，则服务实现的类型必须是具有提供者构造函数的类，并且该类必须是服务接口类型或其子类型。\n\n第 5 章 ■ 实现服务\n\
    \n当请求 `ServiceLoader` 类发现并加载服务提供者时，它会检查服务实现是否包含提供者方法。如果找到提供者方法，则该方法的返回值就是 `ServiceLoader`\
    \ 类返回的服务。如果未找到提供者方法，则使用提供者构造函数实例化服务实现。如果服务实现既不包含提供者方法也不包含提供者构造函数，则会发生编译时错误。\n\n\
    根据这些规则，可以使用 Java 接口作为服务实现。该接口应有一个名为 `provider` 的公共静态方法，该方法返回服务接口类型的实例。\n\n以下小节将引导您完成在\
    \ JDK 9 中实现服务的步骤。最后一个小节解释了如何使同一服务在非模块化环境中工作。\n\n定义服务接口\n\n在本节中，您将开发一个名为*质数检查器*的服务。我将保持服务简单，以便您可以专注于在\
    \ JDK 9 中使用服务提供者机制，而不是编写复杂代码来实现服务功能。该服务的要求如下：\n\n• 服务应提供一个 API 来检查一个数字是否为质数。\n\
    • 客户端应能够知道服务提供者的名称。也就是说，每个服务提供者都应能够指定其名称。\n• 客户端应能够在不指定服务提供者名称的情况下检索服务实例。在这种情况下，返回\
    \ `ServiceLoader` 类找到的第一个服务提供者。如果未找到服务提供者，则抛出 `RuntimeException`。\n• 客户端应能够通过指定服务提供者名称来检索服务实例。如果指定名称的服务提供者不存在，则抛出\
    \ `RuntimeException`。\n\n让我们设计服务。服务提供的功能将由一个名为 `PrimeChecker` 的接口表示。它将包含两个方法：\n\
    \n```java\npublic interface PrimeChecker {\n    String getName();\n    boolean\
    \ isPrime(long n);\n}\n```\n\n`getName()` 方法返回服务提供者的名称。如果指定的参数是质数，`isPrime()`\
    \ 方法返回 `true`，否则返回 `false`。所有服务提供者都将实现 `PrimeChecker` 接口。`PrimeChecker` 接口是我们的服务接口（或服务类型）。\n\
    \n服务需要向客户端提供 API 来检索服务提供者的实例。在客户端检索它们之前，服务需要发现并加载所有服务提供者。服务提供者使用 `ServiceLoader`\
    \ 类加载。该类没有公共构造函数。您可以使用其 `load()` 方法之一获取其实例，以加载特定类型的服务。您需要传递服务提供者接口的类。`ServiceLoader`\
    \ 类包含一个 `iterator()` 方法，该方法返回一个 `Iterator`，用于遍历由此 `ServiceLoader` 加载的特定服务接口的所有服务提供者。以下代码片段向您展示了如何加载并遍历\
    \ `PrimeChecker` 的所有服务提供者实例：\n\n```java\n// 加载 PrimeChecker 的服务提供者\nServiceLoader<PrimeChecker>\
    \ loader = ServiceLoader.load(PrimeChecker.class);\n\n// 遍历所有服务提供者实例\nIterator<PrimeChecker>\
    \ iterator = loader.iterator();\n```\n\n第 5 章 ■ 实现服务\n\n```java\nif(iterator.hasNext())\
    \ {\n    PrimeChecker checker = iterator.next();\n    // 在此处使用质数检查器...\n}\n```\n\
    \n在 JDK 8 之前，您必须创建一个类来为您的服务提供发现、加载和检索功能。从 JDK 8 开始，您可以将静态方法添加到接口中。让我们为服务接口添加两个静态方法来实现这些目的：\n\
    \n```java\npublic interface PrimeChecker {\n    String getName();\n    boolean\
    \ isPrime(long n);\n    static PrimeChecker newInstance();\n    static PrimeChecker\
    \ newInstance(String providerName)\n}\n```\n\n`newInstance()` 方法将返回找到的第一个 `PrimeChecker`\
    \ 实例。另一个版本将返回具有指定提供者名称的服务提供者实例。\n\n让我们创建一个名为 `com.jdojo.prime` 的模块。清单 5-1 展示了\
    \ `PrimeChecker` 接口的完整代码。\n\n***清单 5-1.*** 名为 PrimeChecker 的服务提供者接口\n\n```java\n\
    // PrimeChecker.java\npackage com.jdojo.prime;\n\nimport java.util.ServiceLoader;\n\
    \npublic interface PrimeChecker {\n    /**\n     * 返回服务提供者名称。\n     *\n     *\
    \ @return 服务提供者名称\n     */\n    String getName();\n\n    /**\n     * 如果指定的数字是质数，则返回\
    \ true，否则返回 false。\n     *\n     * @param n 要检查是否为质数的数字\n     * @return 如果指定的数字是质数，则返回\
    \ true，否则返回 false。\n     */\n    boolean isPrime(long n);\n\n    /**\n     * 返回找到的第一个\
    \ PrimeChecker 服务提供者。\n     *\n     * @return 找到的第一个 PrimeChecker 服务提供者。\n   \
    \  * @throws RuntimeException 当未找到 PrimeChecker 服务提供者时。\n     */\n    static PrimeChecker\
    \ newInstance() throws RuntimeException {\n        return ServiceLoader.load(PrimeChecker.class)\n\
    \                .findFirst()\n                .orElseThrow(() -> new RuntimeException(\n\
    \                        \"未找到 PrimeChecker 服务提供者。\"));\n    }\n\n    /**\n  \
    \   * 按名称返回 PrimeChecker 服务提供者实例。\n     *\n     * @param providerName 质数检查器服务提供者名称\n\
    \     * @return 一个 PrimeChecker 实例\n     */\n    static PrimeChecker newInstance(String\
    \ providerName) throws RuntimeException {\n        ServiceLoader<PrimeChecker>\
    \ loader = ServiceLoader.load(PrimeChecker.class);\n        for (PrimeChecker\
    \ checker : loader) {\n            if (checker.getName().equals(providerName))\
    \ {\n                return checker;\n            }\n        }\n        throw\
    \ new RuntimeException(\"未找到名称为 '\" + providerName + \"' 的 PrimeChecker 服务提供者。\"\
    );\n    }\n}\n```\n\n`com.jdojo.prime` 模块的声明如清单 5-2 所示。它导出了 `com.jdojo.prime`\
    \ 包，因为服务提供者模块和客户端模块将需要使用 `PrimeChecker` 接口。\n\n***清单 5-2.*** com.jdojo.prime 模块的模块声明\n\
    \n```java\n// module-info.java\nmodule com.jdojo.prime {\n    exports com.jdojo.prime;\n\
    \    uses com.jdojo.prime.PrimeChecker;\n}\n```\n\n您需要使用带有 `PrimeChecker` 接口完全限定名的\
    \ `uses` 语句，因为此模块中的代码（此接口中的 `newInstance()` 方法）将使用 `ServiceLoader` 类来加载此接口的服务提供者。如果您想在\
    \ `uses` 语句中使用简单名称，请添加适当的 import 语句，如前几节所示。\n\n定义质数检查器服务所需的工作就是这些。\n\n第 5 章 ■\
    \ 实现服务\n\n定义服务提供者\n\n在接下来的两节中，您将为 `PrimeChecker` 服务接口创建两个服务提供者。第一个服务提供者将实现一个通用的质数检查器，而第二个将实现一个更快的质数检查器。之后，您将创建一个客户端来测试该服务。您将可以选择使用其中一个或两个服务提供者。\n"
- fmt: "# These service providers will implement algorithms to check whether a given\
    \ number is prime\n\nIt will be helpful for you to understand the definition of\
    \ a prime number: A positive integer that is not divisible without remainder by\
    \ 1 or itself is called a prime. 1 is not a prime. A few examples of primes are\
    \ 2, 3, 5, 7, and 11.\n\n## Defining a Generic Prime Service Provider\n\nIn this\
    \ section, you will define a generic service provider for the `PrimeChecker` service.\
    \ Defining a service provider for a service is simply creating a class that implements\
    \ the service interface or creating an interface that has a provider method. In\
    \ this case, you will be creating a class named `GenericPrimeChecker` that implements\
    \ the `PrimeChecker` interface and will contain a provider constructor.\n\nThis\
    \ service provider will be defined in a separate module named `com.jdojo.prime.generic`.\n\
    \nListing [5-3](#index_split_002.html#134) contains the module declaration. The\
    \ module declaration will not compile at this time.\n\n**Listing 5-3.** The Module\
    \ Declaration for the `com.jdojo.prime.generic` Module\n\n```java\n// module-info.java\n\
    \nmodule com.jdojo.prime.generic {\n\n    requires com.jdojo.prime;\n\n    provides\
    \ com.jdojo.prime.PrimeChecker\n\n        with com.jdojo.prime.generic.GenericPrimeChecker;\n\
    \n}\n```\n\nThe `requires` statement is needed because this module will use the\
    \ `PrimeChecker` interface from the `com.jdojo.prime` module. In NetBeans, add\
    \ the `com.jdojo.prime` project to the module path of the `com.jdojo.prime.generic`\
    \ project. This will get rid of the compile-time error in the module declaration,\
    \ which is caused by the missing module `com.jdojo.prime` that is referenced in\
    \ the `requires` statement.\n\nThe `provides` statement specifies that this module\
    \ provides an implementation for the `PrimeChecker` interface and its `with` clause\
    \ specifies the name of the implementation class. The implementation class must\
    \ fulfill the following conditions:\n\n- It must be a public concrete class. It\
    \ can be a top-level or nested static class. It cannot be an inner class or an\
    \ abstract class.\n- It must have a public no-args constructor. This constructor\
    \ is used by the `ServiceLoader` class to instantiate the service provider using\
    \ reflection. Note that you are not providing a provider method in the `GenericPrimeChecker`\
    \ class, which is an alternative to providing a no-args public constructor.\n\
    - An instance of the implementation class must be assignment-compatible with the\
    \ service provider interface.\n\nIf any of these conditions are not met, a compile-time\
    \ error occurs. Note that you do not need to export the `com.jdojo.prime.generic`\
    \ package that contains the service implementation class because no client is\
    \ supposed to directly depend on a service implementation. Clients need to know\
