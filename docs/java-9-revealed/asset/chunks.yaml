    • Remove all characters from the resource name starting from the last slash. In
    this


    example, com/jdojo/words.png results in com/jdojo.


    • Replace every remaining slash in the name with a period (.). So, com/jdojo is


    converted to com.jdojo. The resulting string is the package name.


    There are situations when using these steps will result in an unnamed package
    or an invalid package name. Remember that a package name, if present, must consist
    of valid Java identifiers. If there is no package name, it is called an unnamed
    package. Consider META-INF/resource/logo.png as a resource name.


    Applying the previous set of rules, its package name will be computed as META-INF.resources,
    which is not a valid package name, but it is a valid path for a resource.


    Rules to Find Resources


    Because of backward compatibility and the module’s system promise of strong encapsulation,
    new rules to find resources in JDK 9 are complicated and based on several factors:


    • The type of the module that contains the resource: named, open, unnamed, or


    automatic module


    • The module that is accessing the resource: Is it the same module or a different
    one?


    • The package name of the resource being accessed: Is it a valid or invalid Java


    package? Is it an unnamed package?


    • Encapsulation of the package that contains the resource: Is the package that
    contains


    the resource exported, opened, or encapsulated to the module accessing the


    resource?


    • The file extension of the resource being accessed: Is the resource a .class
    file or


    some other type of file?


    Chapter 8 ■ Breaking Changes in JDk 9


    • Which class’ method is being used to access the resource: Class, ClassLoader,
    or


    Module?


    The following rules apply to a resource contained in a *named* module:


    • If a resource name ends with .class, the resource can be accessed by code in
    any


    module. That is, any module can access class files in any named modules.


    • If the package name computed from a resource name is not a valid Java package


    name, for example, META-INF.resources, the resource can be accessed by code in


    any module.


    • If the package name computed from a resource name is an unnamed package, for


    example, for a resource name such as words.png, the resource can be accessed by


    code in any module.


    • If the package containing the resource is opened to the module accessing the


    resource, the resource can be accessed by code in that module. A package can be


    opened to a module because the module defining the package is an open module,


    or the module opens the package to all other modules, or the module opens the


    package only to that specific module using a qualified opens statement. If a package


    is not opened in any of these ways, a resource in that package cannot be accessed
    by


    code outside that module.


    • This rule is an offshoot of the previous rule. Every package in an unnamed,


    automatic, or open module is opened, so all resources in such modules can be


    accessed by code in all other modules.


    ■ **Tip** a package in a named module must be opened, not exported, to access
    its resources. exporting a package of a module allows other modules to access
    public types (not resources) in that package.


    Various resource-finding methods in the Module, Class, and ClassLoader classes
    behave differently while accessing resources in named modules:


    • You can use the getResourceAsStream() method of the Module class to access a


    resource in a module. This method is caller-sensitive. If the caller module is
    different,


    this method applies all the resource accessibility rules as described before.


    • The getResource*() methods in the Class class for a class defined in a named


    module locate resources only in that named module. That is, you cannot use these


    methods to locate a class outside the named module that defines the class on which


    these methods are invoked.


    • The getResource*() methods in the ClassLoader class locate resources in named


    modules based on the list of rules described earlier. These methods are not caller-


    sensitive. A class loader delegates a resource search to its parent before trying


    to locate the resource itself. These methods have two exceptions: 1) They locate


    resources only in unconditionally open packages. If a package is open to specific


    modules using a qualified opens statement, these methods will not locate resources


    in those packages. 2) They search modules defined in the class loader.


    Chapter 8 ■ Breaking Changes in JDk 9


    The Class object will find resources only in the module it is part of. It also
    supports absolute resource names that start with a slash and relative resource
    names that do not start with a slash. Here are a few examples of using the Class
    object:


    // Will find the resource


    URL url1 = Test.class.getResource("Test.class");


    // Will not find the resource because the Test and Object classes are in different
    modules


    URL url2 = Test.class.getResource("/java/lang/Object.class");


    // Will find the resource because the Object and Class classes are in the same
    module,


    java.base


    URL url3 = Object.class.getResource("/java/lang/Class.class");


    // Will not find the resource because the Object class is in the java.base module
    whereas


    // the Driver class is in the java.sql module


    URL url4 = Object.class.getResource("/java/sql/Driver.class");


    Using the Module class to locate resources requires you to have the reference
    of the module. If you have access to a class in that module, using the getModule()
    method on that Class object gives you the module reference. This is the easiest
    way to get a module reference. Sometimes, you have the module name as a string,
    but not the reference of a class in that module. You can find the module reference
    from a module name. Modules are organized into layers that are represented by
    instances of the ModuleLayer class in the java.lang package. The JVM contains
    at least one layer called the boot layer. Modules in the boot layer are mapped
    to the built-in class loaders—bootstrap, platform, and application class loaders.
    You can get the reference of the boot layer using the boot() static method of
    the ModuleLayer class:


    // Get the boot layer


    ModuleLayer bootLayer = ModuleLayer.boot();


    Once you get the reference of the boot layer, you can use its findModule(String
    moduleName) method to get the reference of a module:


    // Find the module named com.jdojo.resource in the boot layer


    Optional<Module> m = bootLayer.findModule("com.jdojo.resource");


    // If the module was found, find a resource in the module


    if(m.isPresent()) {


    Module testModule = m.get();


    String resource = "com/jdojo/resource/opened/opened.properties";


    InputStream input = module.getResourceAsStream(resource);


    if (input != null) {


    System.out.println(resource + " found.");


    } else {


    System.out.println(resource + " not found.”);


    }


    } else {


    System.out.println("Module com.jdojo.resource does not exist");


    }


    Chapter 8 ■ Breaking Changes in JDk 9


    An Example of Accessing Resources in Named Modules


    In this section, you’ll see the resource-finding rules in action. You will package
    resources in a module named com.jdojo.resource whose declaration is shown in Listing
    [8-6](#index_split_003.html#200).


    ***Listing 8-6.*** A Module Declaration for a Module Named com.jdojo.resource


    // module-info.java


    module com.jdojo.resource {


    exports com.jdojo.exported;


    opens com.jdojo.opened;


    }


    The module exports the com.jdojo.exported package and opens the com.jdojo.opened
    package.


    The following is a list of all the files in the com.jdojo.resource module:


    • module-info.class


    • unnamed.properties


    • META-INF\invalid_pkg.properties


    • com\jdojo\encapsulated\encapsulated.properties


    • com\jdojo\encapsulated\EncapsulatedTest.class


    • com\jdojo\exported\AppResource.class


    • com\jdojo\exported\exported.properties


    • com\jdojo\opened\opened.properties


    • com\jdojo\opened\OpenedTest.class'
