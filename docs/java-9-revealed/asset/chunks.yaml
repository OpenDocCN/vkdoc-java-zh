    JDK 9 added a static nested class called Runtime.Version whose instances represent
    JDK version strings. The class does not have a public constructor. The only way
    to get its instance is to call its static method named parse(String vstr). The
    method may throw a runtime exception if the version string is null or invalid.
    The class contains several methods to get different parts of the version.


    JDK 9 changed the directory layout of the JDK and JRE installation. Now, there
    is no distinction between a JDK and JRE installation, except that a JDK installation
    contains developer tools and a copy of platform modules in JMOD format that the
    JRE does not contain. You can build your own JRE (using the jlink tool) and it
    can contain any part of the JDK you need in the JRE.


    Prior to Java SE 9, you could use the Endorsed Standards Override Mechanism to
    use the newer


    versions of classes and interfaces that implement Endorsed Standards or Standalone
    APIs. These include the javax.rmi.CORBA package and Java API for XML Processing
    (JAXP), which are created outside the Java Community Process. Java SE 9 still
    supports this mechanism. In Java SE 9, you need to use the --upgrade-module-path
    command-line option. The value for this option is a list of directories containing
    modules for the Endorsed Standards and Standalone APIs.


    Java SE prior to version 9, allowed an extension mechanism whereby you were able
    to extend the runtime image by placing JARs in directories specified by the system
    property java.ext.dirs. If this system property was not set, the jre\lib\ext directory
    was used as its default value. Java SE 9 does not support the extension mechanism.
    If you need a similar functionality, you can place those JARs at the front of
    the class path.


    Prior to version 9, the JDK used three class loaders to load classes. They were
    boot class loader, extension class loader and system class loader. They were arranged
    hierarchically—the boot class loader having no parent, the extension class loader
    having the boot class loader as its parent, and the system class loader having
    the extension class loader as its parent. Class loaders delegated the type loading
    requires to their parent, if any, before attempting to the load the type itself.
    JDK 9 kept the three class loaders arrangements for backward compatibility. JDK
    9 does not support the extension mechanism, so the extension class loader has
    no meaning. JDK 9 has renamed the extension class loader as platform class loader
    whose reference can be obtained using the static getPlatformClassLoader() method
    of the ClassLoader class. In JDK 9, each class loader loads different types of
    modules.


