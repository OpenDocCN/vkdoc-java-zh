    \ information\n\nThe following regular expression defines the format for a version\
    \ string:\n\n```\n$vnum(-$pre)?(\\+($build)?(-$opt)?)?\n```\n\nA *short version\
    \ string* consists of a version number optionally followed by prerelease information:\
    \ `$vnum(-$pre)?`\n\nYou can have a version string as short as `\"9\"`, which\
    \ contains only the major version number, and as big as `\"9.0.1-ea+154-20170130.07.36am\"\
    `, which contains all parts of a version string.\n\n### Version Number\n\nA version\
    \ number is a sequence of elements separated by periods. It can be an arbitrary\
    \ length. Its format is as follows:\n\n```\n^[1-9][0-9]*(((\\.0)*\\.[1-9][0-9]*)*)*$\n\
    ```\n\nA version number may consist of one to four elements, as follows:\n\n```\n\
    $major.$minor.$security(.$addtionalInfo)\n```\n\nThe `$major` element represents\
    \ the major version of a JDK release. It is incremented for a major release that\
