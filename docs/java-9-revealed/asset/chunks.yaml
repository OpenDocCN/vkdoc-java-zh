    \ `module-info.class` 的文件。`module-info.class` 文件被称为*模块描述符*，它被放置在模块编译后代码层次结构的根目录下。如果你将模块的编译后代码打包到\
    \ JAR 文件中，`module-info.class` 文件将存储在 JAR 文件的根目录下。\n\n模块声明不包含可执行代码。本质上，它包含模块的配置。为什么我们不将模块声明保存在\
