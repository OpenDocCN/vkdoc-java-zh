    在 NetBeans 中重新运行 com.jdojo.unnamed.Main 类，或使用以下命令：


    C:\Java9Revealed>java --module-path com.jdojo.reflect\dist


    **--add-modules com.jdojo.reflect**


    --class-path com.jdojo.unnamed\dist\com.jdojo.unnamed.jar


