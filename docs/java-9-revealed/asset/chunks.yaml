    \n```\n// In JDK 8\nDate dt = new Date();\nLocalDate ld = dt.toInstant()\n   \
    \ .atZone(ZoneId.systemDefault())\n    .toLocalDate();\nSystem.out.println(\"\
    Current Local Date: \" + ld);\n\n// In JDK 9\nLocalDate ld2 = LocalDate.ofInstant(dt.toInstant(),\
    \ ZoneId.systemDefault());\nSystem.out.println(\"Current Local Date: \" + ld2);\n\
    ```\n\n```\nCurrent Local Date: 2017-02-11\nCurrent Local Date: 2017-02-11\n```\n\
    \nThe following snippet of code shows both ways—JDK 8 and JDK 9—to convert an\
    \ `Instant` to a `LocalDate` and a `LocalTime`:\n\n```\n// In JDK 8\nInstant now\
    \ = Instant.now();\nZoneId zone = ZoneId.systemDefault();\nZonedDateTime zdt =\
    \ now.atZone(zone);\nLocalDate ld3 = zdt.toLocalDate();\nLocalTime lt3 = zdt.toLocalTime();\n\
    System.out.println(\"Local Date: \" + ld3 + \", Local Time:\" + lt3);\n\n// In\
    \ JDK 9\nLocalDate ld4 = LocalDate.ofInstant(now, zone);\nLocalTime lt4 = LocalTime.ofInstant(now,\
