    聚合模块


    您可以创建一个自身不包含任何代码的模块。它收集并重新导出其他模块的内容。这样的模块称为*聚合模块*。假设有几个模块依赖于五个模块。您可以为这五个模块创建一个聚合模块，这样，您的模块就可以只依赖于一个模块——聚合模块。


    聚合模块的存在是为了方便。Java 9 包含几个聚合模块，例如 `java.se` 和 `java.se.ee`。`java.se` 模块收集了 Java
    SE 中与 Java EE 不重叠的部分。


    `java.se.ee` 模块收集了构成 Java SE 的所有模块，包括与 Java EE 重叠的模块。


    声明模块


    本节快速概述了用于声明模块的语法。我将在后续章节中更详细地解释每个部分。如果您不理解本节中提到的关于模块的所有内容，请继续阅读。我将在后面的章节中通过示例再次介绍它们。


    第 2 章 ■ 模块系统


    模块是使用模块声明定义的，这是 Java 编程语言中的一种新结构。语法如下：


    [open] module <module> {


    <module-statement>;


    <module-statement>;


    ...


    }


    可选的 `open` 修饰符的存在声明了一个*开放模块*。开放模块导出其所有包，以供其他模块通过反射访问。`<module>` 是正在定义的模块的名称。`<module-statement>`
    是一个模块语句。在一个模块声明中可以有零个或多个模块语句。如果存在，它可以是五种类型的语句之一：


    • exports 语句


    • opens 语句


    • requires 语句


    • uses 语句


    • provides 语句


    `exports` 和 `opens` 语句用于控制对模块代码的访问。`requires` 语句用于声明一个模块对另一个模块的依赖关系。`uses` 和 `provides`
    语句分别用于表达服务消费和服务提供。以下是一个名为 `myModule` 的模块的模块声明示例：


    module myModule {


    // 导出包 - com.jdojo.util 和


    // com.jdojo.util.parser


    exports com.jdojo.util;


    exports com.jdojo.util.parser;


    // 读取 java.sql 模块


    requires java.sql;


    // 开放 com.jdojo.legacy 包以供反射访问


    opens com.jdojo.legacy;


    // 使用服务接口 java.sql.Driver


    uses java.sql.Driver;


    // 提供 com.jdojo.util.parser.FasterCsvParser


    // 类作为服务接口的实现


    // 名为 com.jdojo.util.CsvParser


    provides com.jdojo.util.CsvParser


    with com.jdojo.util.parser.FasterCsvParser;


    }


    第 2 章 ■ 模块系统


    您可以通过在模块声明中使用 `open` 修饰符来创建一个开放模块。开放模块允许其他模块对其所有包进行反射访问。您不能在开放模块内部使用 `opens` 语句，因为在开放模块中所有包都是隐式开放的。以下代码片段声明了一个名为
    `myLegacyModule` 的开放模块：


    **open** module myLegacyModule {


    exports com.jdojo.legacy;


    requires java.sql;


    }


    模块名称


    模块名称可以是一个 Java *限定*标识符。限定标识符是一个或多个由点分隔的标识符，例如 `policy`、`com.jdojo.common` 和 `com.jdojo.util`。如果模块名称中的任何部分不是有效的
    Java 标识符，则会发生编译时错误。例如，`com.jdojo.common.1.0` 不是有效的模块名称，因为名称中的两个部分 `1` 和 `0` 不是有效的
    Java 标识符。


    与包命名约定类似，使用反向域名模式为您的模块赋予唯一名称。使用此约定，最简单的模块（名为 `com.jdojo.common`）可以声明如下：


    module com.jdojo.common {


    // 无模块语句


    }


    模块名称不会隐藏同名的变量、类型和包。因此，您可以拥有一个模块以及一个同名的变量、类型或包。它们使用的上下文将区分哪个名称指的是哪种实体。


    在 JDK 9 中，`open`、`module`、`requires`、`transitive`、`exports`、`opens`、`to`、`uses`、`provides`
    和 `with` 是受限关键字。它们将在本章后面以及后续章节中简要解释。


    它们仅在模块声明中的特定位置出现时才具有特殊含义。您可以在程序中的任何其他地方将它们用作标识符。例如，以下模块声明是有效的，即使它没有使用直观的模块名称：


    // 声明一个名为 module 的模块


    module module {


    // 模块语句写在这里


    }


    第一个 `module` 词被解释为关键字，第二个是模块名称。


    您可以在程序中的任何地方声明一个名为 `module` 的变量：


    String module = "myModule";


    第 2 章 ■ 模块系统


    控制对模块的访问


    `exports` 语句在编译时和运行时将模块的指定包导出到所有模块或指定的模块列表。它有以下两种形式：


    • exports <package>;


    • exports <package> to <module1>, <module2>...;


    使用 `exports` 语句的示例如下：


    module M {


    exports com.jdojo.util;


    exports com.jdojo.policy


    to com.jdojo.claim, com.jdojo.billing;


    }

