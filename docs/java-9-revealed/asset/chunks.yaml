- fmt: "# Implementation is an Interface\n\n`implementation` is an interface, it simply\
    \ loads and returns the interface reference. The service implementation (a class\
    \ or an interface) must follow these rules:\n\n- If the service implementation\
    \ implicitly or explicitly declares a public constructor with no formal parameters,\
    \ that constructor is called the *provider constructor*.\n- If the service implementation\
    \ contains a public static method named `provider` with no formal parameters,\
    \ this method is called the *provider method*.\n- The return type of the `provider`\
    \ method must be the service interface type or its subtype.\n- If the service\
    \ implementation does not contain a `provider` method, the type of the service\
    \ implementation must be a class with a provider constructor and the class must\
    \ be of the service interface type or its subtype.\n\nWhen the `ServiceLoader`\
    \ class is requested to discover and load a service provider, it checks whether\
    \ the service implementation contains a `provider` method. If a `provider` method\
    \ is found, the returned value of the method is the service returned by the `ServiceLoader`\
    \ class. If a `provider` method is not found, it instantiates the service implementation\
    \ using the provider constructor. If the service implementation contains neither\
    \ a `provider` method nor a provider constructor, a compile-time error occurs.\n\
    \nWith these rules, it is possible to use a Java interface as a service implementation.\
    \ The interface should have a public static method named `provider` that returns\
    \ an instance of the service interface type.\n\nThe following sub-sections walk\
    \ you through the steps to implement a service in JDK 9. The last sub-section\
    \ explains how to make the same service work in a non-modular environment.\n\n\
    ## Defining the Service Interface\n\nIn this section, you develop a service called\
    \ *prime checker*. I am keeping the service simple, so you can focus on working\
    \ with the service provider mechanism in JDK 9, rather than writing complex code\
    \ to implement the service functionality. Requirements for this service are as\
    \ follows:\n\n- The service should provide an API to check if a number is a prime.\n\
    - Clients should be able to know the name of the service provider. That is, each\
    \ service provider should be able to specify its name.\n- Clients should be able\
    \ to retrieve a service instance without specifying the name of the service provider.\
    \ In this case, the first service provider found by the `ServiceLoader` class\
    \ is returned. If no service provider is found, a `RuntimeException` is thrown.\n\
    - Clients should be able to retrieve a service instance by specifying a service\
    \ provider name. If a service provider with the specified name does not exist,\
    \ a `RuntimeException` is thrown.\n\nLet’s design the service. The functionality\
    \ provided by the service will be represented by an interface named `PrimeChecker`.\
    \ It will contain two methods:\n\n```java\npublic interface PrimeChecker {\n \
    \   String getName();\n    boolean isPrime(long n);\n}\n```\n\nThe `getName()`\
    \ method returns the name of the service provider. The `isPrime()` method returns\
    \ `true` if the specified argument is a prime, and it returns `false` otherwise.\
    \ All service providers will implement the `PrimeChecker` interface. The `PrimeChecker`\
    \ interface is our service interface (or service type).\n\nThe service needs to\
    \ provide APIs to the clients to retrieve instances of the service providers.\
    \ The service needs to discover and load all service providers before clients\
    \ can retrieve them. The service providers are loaded using the `ServiceLoader`\
    \ class. The class has no public constructor. You can use one of its `load()`\
    \ methods to get its instance to load a specific type of service. You will need\
    \ to pass the class of the service provider interface. The `ServiceLoader` class\
    \ contains an `iterator()` method that returns an `Iterator` for all service providers\
    \ of a specific service interface loaded by this `ServiceLoader`. The following\
    \ snippet of code shows you how to load and iterate through all service provider\
    \ instances for `PrimeChecker`:\n\n```java\n// Load the service providers for\
    \ PrimeChecker\nServiceLoader<PrimeChecker> loader = ServiceLoader.load(PrimeChecker.class);\n\
    \n// Iterate through all service provider instances\nIterator<PrimeChecker> iterator\
    \ = loader.iterator();\nif(iterator.hasNext()) {\n    PrimeChecker checker = iterator.next();\n\
    \    // Use the prime checker here...\n}\n```\n\nBefore JDK 8, you had to create\
    \ a class to provide the discovering, loading, and retrieving features for your\
    \ service. As of JDK 8, you can add static methods to interfaces. Let’s add two\
    \ static methods to our service interface for these purposes:\n\n```java\npublic\
    \ interface PrimeChecker {\n    String getName();\n    boolean isPrime(long n);\n\
    \    \n    static PrimeChecker newInstance();\n    static PrimeChecker newInstance(String\
    \ providerName)\n}\n```\n\nThe `newInstance()` method will return an instance\
    \ of the `PrimeChecker` that is found first. Another version will return the instance\
    \ of a service provider with the specified provider name.\n\nLet’s create a module\
    \ named `com.jdojo.prime`. Listing 5-1 shows you the complete code for the `PrimeChecker`\
    \ interface.\n\n**Listing 5-1.** A Service Provider Interface Named `PrimeChecker`\n\
    \n```java\n// PrimeChecker.java\npackage com.jdojo.prime;\n\nimport java.util.ServiceLoader;\n\
    \npublic interface PrimeChecker {\n    /**\n     * Returns the service provider\
    \ name.\n     *\n     * @return The service provider name\n     */\n    String\
    \ getName();\n\n    /**\n     * Returns true if the specified number is a prime,\
    \ false otherwise.\n     *\n     * @param n The number to be check for being prime\n\
    \     * @return true if the specified number is a prime, false otherwise.\n  \
    \   */\n    boolean isPrime(long n);\n\n    /**\n     * Returns the first PrimeChecker\
    \ service provider found.\n     *\n     * @return The first PrimeChecker service\
    \ provider found.\n     * @throws RuntimeException When no PrimeChecker service\
    \ provider is found.\n     */\n    static PrimeChecker newInstance() throws RuntimeException\
    \ {\n        return ServiceLoader.load(PrimeChecker.class)\n                .findFirst()\n\
    \                .orElseThrow(() -> new RuntimeException(\n                  \
    \      \"No PrimeChecker service provider found.\"));\n    }\n\n    /**\n    \
    \ * Returns a PrimeChecker service provider instance by name.\n     *\n     *\
    \ @param providerName The prime checker service provider name\n     * @return\
    \ A PrimeChecker\n     */\n    static PrimeChecker newInstance(String providerName)\
    \ throws RuntimeException {\n        ServiceLoader<PrimeChecker> loader = ServiceLoader.load(PrimeChecker.class);\n\
    \        for (PrimeChecker checker : loader) {\n            if (checker.getName().equals(providerName))\
    \ {\n                return checker;\n            }\n        }\n        throw\
    \ new RuntimeException(\"A PrimeChecker service provider with the name '\"\n \
    \               + providerName + \"' was not found.\");\n    }\n}\n```\n\nThe\
    \ declaration for the `com.jdojo.prime` module is shown in Listing 5-2. It exports\
    \ the `com.jdojo.prime` package because the `PrimeChecker` interface will need\
    \ to be used by the service provider modules and the client modules.\n\n**Listing\
    \ 5-2.** The Module Declaration for the `com.jdojo.prime` Module\n\n```java\n\
    // module-info.java\nmodule com.jdojo.prime {\n    exports com.jdojo.prime;\n\
    \    uses com.jdojo.prime.PrimeChecker;\n}\n```\n\nYou need to use a `uses` statement\
    \ with the fully qualified name of the `PrimeChecker` interface because the code\
    \ in this module (the `newInstance()` methods in this interface) will use the\
    \ `ServiceLoader` class to load the service providers for this interface. If you\
    \ want to use the simple name in the `uses` statement, add the appropriate import\
    \ statement as shown in the previous sections.\n\nThat is all you have to do to\
    \ define the prime checker service.\n\n## Defining Service Providers\n\nIn the\
    \ next two sections, you will create two service providers for the `PrimeChecker`\
    \ service interface. The first service provider will implement a generic prime\
    \ checker whereas the second one will implement a faster prime checker. Later,\
    \ you will create a client to test the service. You will have a choice to use\
    \ one of these service providers or both."
