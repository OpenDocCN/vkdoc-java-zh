    The --add-opens Option


    The opens statement in a module declaration opens a package in a module to all
    or some other modules, so those modules can use deep reflection to access all
    member types in that package at runtime. If a package of a module is not open,
    you can open it using the --add-opens command-line option. Its syntax is as follows:


    --add-opens <source-module>/<package>=<target-module-list>


    Here, <source-module> is the module that opens <package> to <target-module-list>,
    which is a comma-separated list of target module names. It is equivalent to adding
    a qualified opens statement to the declaration of <source-module>:


    module <source-module> {


    opens <package> to <target-module-list>;


    // More statements go here


    }


    ■ **Tip** If the target module list is a special value, ALL-UNNAMED, for the --add-opens
    option, the module’s package is open to all unnamed modules. the --add-opens option
    is available for the java commands. using this option at compile-time with the
    javac command generates a warning and has no effect.


    The following option opens the sun.util.logging package in the java.base module
    to the


    com.jdojo.test and com.jdojo.prime modules:


    --add-opens java.base/sun.util.logging=com.jdojo.test,com.jdojo.prime


    The following option opens the sun.util.logging package in the java.base module
    to all unnamed modules:


    --add-opens java.base/sun.util.logging=ALL-UNNAMED


    ChAPtEr 9 ■ BrEAkIng ModulE EnCAPsulAtIon


    The --add-reads Option


    The --add-reads option is not about breaking encapsulation. Rather, it is about
    increasing the readability of a module. During testing and debugging, it is sometimes
    necessary for a module to read another module even though the first module does
    not depend on the second module. The requires statement in a module declaration
    is used to declare dependency of the current module on another module. You can
    use the


    --add-reads command-line option to add a readability edge from a module to another
    module. This has the same effect of adding a requires statement to the first module.
    Its syntax is as follows:


    --add-reads <source-module>=<target-module-list>


    Here, <source-module> is the module whose definition is updated to read the list
    of modules specified in the <target-module-list>, which is a comma-separated list
    of target module names. It is equivalent to adding a requires statement to the
    source module for each module in the target module list:


    module <source-module> {


    requires <target-module1>;


    requires <target-module2>;


    // More statements go here


    }


