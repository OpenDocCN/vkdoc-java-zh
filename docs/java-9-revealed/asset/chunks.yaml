    有时，你输入了一个表达式，并希望将该表达式的值赋给一个适当类型的变量。有时你知道类型，有时你不知道。JShell 工具会在你输入完整表达式后，帮助你自动补全赋值部分。输入完整的表达式，然后根据你的平台按
    Alt+Enter 或 Alt+F1。现在，按 Alt+V，它会通过添加适当的变量类型并将光标置于你可以输入变量名的位置，来自动补全表达式赋值。让我们逐步操作这些步骤。在
    jshell 中输入表达式 `2 + 2`：


    jshell> 2 + 2


    现在，在 Windows 上，按 Alt+Enter，然后按 Alt+V。jshell 会自动补全赋值表达式，并等待你输入变量名：


    jshell> int = 2 + 2


    光标位于 `=` 符号之前。输入 `x` 作为变量名，然后按 Enter：


    jshell> int x = 2 + 2


    x ==> 4


    jshell>


    执行这些命令时，Windows 中的命令提示符窗口会最大化。你可以按 Alt+Enter 返回正常窗口。


    代码片段与命令历史


    JShell 会维护你在所有会话中输入的所有命令和代码片段的历史记录。你可以使用向上和向下箭头键浏览历史记录。你也可以使用 `/history` 命令打印你在当前会话中输入的所有内容的历史记录：


    jshell> 2 + 2


    $1 ==> 4


    jshell> System.out.println("Hello")


    Hello


    jshell> /history


    2 + 2


    System.out.println("Hello")


    /history


    jshell>


    第 11 章 ■ Java Shell


    此时，按一次向上箭头显示 `/history`，按两次显示 `System.out.println("Hello")`，按三次显示 `2 + 2`。按第四次向上箭头将显示上一个
    jshell 会话中最后输入的命令/代码片段。如果你想执行之前输入的代码片段/命令，请使用向上箭头直到显示所需的命令/代码片段，然后按 Enter 执行。按向下箭头将导航到列表中的下一个命令或代码片段。


    假设你按了五次向上箭头，导航到倒数第五个代码片段/命令。现在按向下箭头将导航到倒数第四个代码片段/命令。当你位于第一个和最后一个代码片段/命令时，按向上箭头或向下箭头将不起作用。


    阅读 JShell 堆栈跟踪


    在 jshell 上输入的代码片段是合成类的一部分。例如，Java 不允许你声明一个顶级方法。方法声明必须是类型的一部分。当 Java 程序中抛出异常时，堆栈跟踪会打印类型名称和行号。在
    jshell 中，异常可能从代码片段中抛出。在这种情况下，打印合成类名称和行号会产生误导，并且对开发者来说毫无意义。堆栈跟踪中代码片段位置的格式如下：


    at <代码片段名称> (#<代码片段 ID>:<代码片段中的行号>)


    请注意，某些代码片段可能没有名称。例如，输入代码片段 `2 + 2` 不会给它一个名称。某些代码片段有名称，例如，声明一个变量的代码片段会被赋予与该变量名称相同的名称；方法和类型声明也是如此。有时，你可能有两个同名的代码片段，例如，声明了一个变量和一个同名的/类型。


    jshell 会为所有代码片段分配一个唯一的代码片段 ID。你可以使用 `/list -all` 命令查找代码片段的 ID。


    以下 jshell 会话声明了一个 `divide()` 方法，并打印了当整数除以零时抛出的运行时 `ArithmeticException` 异常的堆栈跟踪：


    C:\Java9Revealed>jshell


    | 欢迎使用 JShell -- 版本 9-ea


    | 如需介绍，请输入：/help intro


    jshell> int divide(int x, int y) {


    ...> return x/y;


    ...> }


    | 已创建方法 divide(int,int)


    jshell> divide(10, 2)


    $2 ==> 5


    jshell> divide(10, 0)


    | java.lang.ArithmeticException 抛出：/ by zero


    | at divide (#1:2)


    | at (#3:1)


    第 11 章 ■ Java Shell


    jshell> /list -all


    s1 : import java.io.*;


    s2 : import java.math.*;


    s3 : import java.net.*;


    s4 : import java.nio.file.*;


    s5 : import java.util.*;


    s6 : import java.util.concurrent.*;


    s7 : import java.util.function.*;


    s8 : import java.util.prefs.*;


    s9 : import java.util.regex.*;


    s10 : import java.util.stream.*;


    1 : int divide(int x, int y) {


    return x/y;


    }


    2 : divide(10, 2)


    3 : divide(10, 0)


    jshell>


    让我们尝试阅读堆栈跟踪。最后一行 `at (#3:1)` 表明异常是由代码片段编号 3 的第 1 行引起的。注意在 `/list -all` 命令的输出中，代码片段编号
    3 是导致异常的表达式 `divide(10, 0)`。第二行 `at divide (#1:2)` 表明堆栈跟踪中的第二层位于名称为 `divide`、代码片段
    ID 为 1 的代码片段的第 2 行。


    重用 JShell 会话


    你可以在一个 jshell 会话中输入许多代码片段和命令，并可能希望在其他会话中重用它们。你可以使用 `/save` 命令将命令和代码片段保存到文件，并使用
    `/open` 命令加载之前保存的命令和代码片段。`/save` 命令的语法如下：


    /save <选项> <文件路径>


    这里，`<选项>` 可以是以下选项之一：`-all`、`-history` 和 `-start`。`<文件路径>` 是保存代码片段/命令的文件路径。


    不带选项的 `/save` 命令会保存当前会话中的所有活动代码片段。请注意，它不会保存任何命令或失败的代码片段。


    带有 `-all` 选项的 `/save` 命令会将当前会话的所有代码片段（包括失败的和启动时的代码片段）保存到指定文件。请注意，它不会保存任何命令。

