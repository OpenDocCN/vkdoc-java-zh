    `List<Integer> list = List.of(100, 200);`


    不可修改的列表


    JDK 9 为 `List` 接口添加了一个重载的 `of()` 静态工厂方法。它提供了一种简单紧凑的方式来创建不可修改的列表。以下是 `of()` 方法的所有版本：


    • `static <E> List<E> of()`

