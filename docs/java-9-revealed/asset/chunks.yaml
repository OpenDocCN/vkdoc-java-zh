    Diamond Operator in Anonymous Classes


    JDK 7 introduced the diamond operator (<>), which is used in calling the constructor
    of a generic class as long as the compiler can infer the generic type. The following
    two statements are the same; the second uses a diamond operator:


    // Specify the generic type explicitly


    List<String> list1 = new ArrayList**<String>** ();


    // The compiler infers ArrayList<> as ArrayList<String>


    List<String> list2 = new ArrayList**<>** ();


    JDK 7 did not allow using the diamond operator while creating an anonymous class.
    The following snippet of code uses an anonymous class with a diamond operator
    to create an instance of the Callable<V> interface:


    // A compile-time error in JDK 7 and 8


    Callable<Integer> c = new Callable<>() {


    @Override


    public Integer call() {


    return 100;


    }


    };


    The previous statement generates the following error in JDK 7 and 8:


    error: cannot infer type arguments for Callable<V>


    Callable<Integer> c = new Callable<>() {


    ^


    reason: cannot use ''<>'' with anonymous inner classes


    where V is a type-variable:


    V extends Object declared in interface Callable


