    Sending Messages to a Peer


    Once a client endpoint is connected to a peer, both exchange messages. An instance
    of the WebSocket interface represents a client endpoint and the interface contains
    the following methods to send messages to a peer:


    • CompletableFuture<WebSocket> sendBinary(ByteBuffer message, boolean


    isLast)


    • CompletableFuture<WebSocket> sendClose()


    • CompletableFuture<WebSocket> sendClose(int statusCode, String reason)


    • CompletableFuture<WebSocket> sendPing(ByteBuffer message)


    • CompletableFuture<WebSocket> sendPong(ByteBuffer message)


    • CompletableFuture<WebSocket> sendText(CharSequence message)


    •


    CompletableFuture<WebSocket> sendText(CharSequence message, boolean isLast)


    The sendText() method is used to send a text message to the peer. If you are sending
    a partial message, use the version of this method that takes two arguments. If
    the second argument is false, it indicates part of the partial message. If the
    second argument is true, it indicates the last part of a partial message. If there
    were no partial messages sent before, a true in the second argument indicates
    a whole message. The sendText(CharSequence message) is a convenience method that
    calls the second version of the method using true as the second argument.


    The sendBinary() method sends a binary message to the peer.


    The sendPing() and sendPong() methods send a Ping and a Pong message to the peer,
    respectively.'
  trans: "\n你需要构建一个充当客户端端点的 `WebSocket` 接口实例。该实例用于与服务器端点建立连接并交换消息。`WebSocket` 实例通过\
    \ `WebSocket.Builder` 构建。你可以使用 `HttpClient` 类的以下方法获取构建器：`WebSocket.Builder newWebSocketBuilder(URI\
    \ uri, WebSocket.Listener listener)`\n\n用于获取 `WebSocket` 构建器的 `HttpClient` 实例为\
    \ `WebSocket` 提供连接配置。指定的 `uri` 是服务器端点的 URI。`listener` 是正在构建的端点的监听器，如前文所述。获得构建器后，你可以调用构建器的以下方法之一来配置端点：\n\
    \n• `WebSocket.Builder connectTimeout(Duration timeout)`\n\n• `WebSocket.Builder\
    \ header(String name, String value)`\n\n• `WebSocket.Builder subprotocols(String\
    \ mostPreferred, String... lesserPreferred)`\n\n`connectTimeout()` 方法允许你为打开握手指定超时时间。如果打开握手未在指定时间内完成，`WebSocket.Builder`\
    \ 的 `buildAsync()` 方法返回的 `CompletableFuture` 将以 `HttpTimeoutException` 异常完成。\n\
    \n你可以使用 `header()` 方法为打开握手添加任何自定义标头。你可以使用 `subprotocols()` 方法在打开握手期间请求特定的子协议——服务器只会选择其中一个。子协议由应用程序定义。客户端和服务器需要就特定的子协议及其细节达成一致。\n\
    \n最后，调用 `WebSocket.Builder` 接口的 `buildAsync()` 方法来构建端点。它返回 `CompletableFuture<WebSocket>`，当此端点连接到服务器端点时正常完成；当出现错误时异常完成。以下代码片段展示了如何构建和连接客户端端点。请注意，服务器的\
    \ URI 以 `ws` 开头，表示 `WebSocket` 协议。\n\n```java\nURI serverUri = new URI(\"ws://localhost:8080/webapp/servertime\"\
    );\n\n// 获取一个监听器\nWebSocket.Listener listener = ...;\n\n// 使用默认的 HttpClient 构建端点\n\
    HttpClient.newHttpClient()\n    .newWebSocketBuilder(serverUri, listener)\n  \
    \  .buildAsync()\n    .whenComplete((WebSocket webSocket, Throwable t) -> {\n\
    \        // 更多代码写在这里\n    });\n```\n\n**第 14 章 ■ HTTP/2 客户端 API**\n\n**向对等端发送消息**\n\
    \n一旦客户端端点连接到对等端，双方即可交换消息。`WebSocket` 接口的实例代表一个客户端端点，该接口包含以下用于向对等端发送消息的方法：\n\n\
    • `CompletableFuture<WebSocket> sendBinary(ByteBuffer message, boolean isLast)`\n\
    \n• `CompletableFuture<WebSocket> sendClose()`\n\n• `CompletableFuture<WebSocket>\
    \ sendClose(int statusCode, String reason)`\n\n• `CompletableFuture<WebSocket>\
    \ sendPing(ByteBuffer message)`\n\n• `CompletableFuture<WebSocket> sendPong(ByteBuffer\
    \ message)`\n\n• `CompletableFuture<WebSocket> sendText(CharSequence message)`\n\
    \n• `CompletableFuture<WebSocket> sendText(CharSequence message, boolean isLast)`\n\
    \n`sendText()` 方法用于向对等端发送文本消息。如果你要发送部分消息，请使用带有两个参数的版本。如果第二个参数为 `false`，表示这是部分消息的一部分。如果第二个参数为\
    \ `true`，表示这是部分消息的最后一部分。如果之前没有发送过部分消息，则第二个参数为 `true` 表示这是一条完整消息。`sendText(CharSequence\
    \ message)` 是一个便捷方法，它调用第二个版本的方法，并将 `true` 作为第二个参数。\n\n`sendBinary()` 方法向对等端发送二进制消息。\n\
    \n`sendPing()` 和 `sendPong()` 方法分别向对等端发送 Ping 和 Pong 消息。\n"
- fmt: "`sendClose()`方法向对等端发送一个Close消息。你可以作为对等端发起的关闭握手的一部分发送Close消息，也可以主动发送它以启动与对等端的关闭握手。\n\
    \n**提示**：如果你想突然关闭WebSocket，请使用`WebSocket`接口的`abort()`方法。\n\n## 运行WebSocket程序\n\
    \n现在是时候看看WebSocket客户端端点和WebSocket服务器端点如何交换消息了。\n\n清单[14-5](#index_split_006.html#387)包含了一个名为`WebSocketClient`的类的代码，该类封装了一个客户端端点。其预期用法如下：\n\
    \n```\n// 创建一个客户端WebSocket\nWebSocketClient wsClient = new WebSocketClient(new\
    \ URI(\"<server-uri>\"));\n// 连接到服务器并交换消息\nwsClient.connect();\n```\n\n***清单14-5.***\
    \ 封装客户端端点及其操作的类\n\n```\n// WebSocketClient.java\npackage com.jdojo.http.client;\n\
    \nimport java.net.URI;\nimport java.util.concurrent.CompletionStage;\nimport jdk.incubator.http.HttpClient;\n\
    import jdk.incubator.http.WebSocket;\n\npublic class WebSocketClient {\n    private\
    \ WebSocket webSocket;\n    private final URI serverUri;\n    private boolean\
    \ inError = false;\n\n    public WebSocketClient(URI serverUri) {\n        this.serverUri\
    \ = serverUri;\n    }\n\n    public boolean isClosed() {\n        return (webSocket\
    \ != null && webSocket.isClosed()) || this.inError;\n    }\n\n    public void\
    \ connect() {\n        HttpClient.newHttpClient()\n            .newWebSocketBuilder(serverUri,\
    \ this.getListener())\n            .buildAsync()\n            .whenComplete(this::statusChanged);\n\
    \    }\n\n    private void statusChanged(WebSocket webSocket, Throwable t) {\n\
    \        this.webSocket = webSocket;\n        if (t == null) {\n            this.talkToServer();\n\
    \        } else {\n            this.inError = true;\n            System.out.println(\"\
    Could not connect to the server. Error: \" + t.getMessage());\n        }\n   \
    \ }\n\n    private void talkToServer() {\n        // 允许监听器接收一条消息\n        webSocket.request(1);\n\
    \        // 向服务器发送时间请求\n        webSocket.sendText(\"Hello\");\n    }\n\n    private\
    \ WebSocket.Listener getListener() {\n        return new WebSocket.Listener()\
    \ {\n            @Override\n            public void onOpen(WebSocket webSocket)\
    \ {\n                // 允许监听器再接收一条消息\n                webSocket.request(1);\n\
    \                // 通知用户已连接\n                System.out.println(\"A WebSocket\
    \ has been opened.\");\n            }\n\n            @Override\n            public\
    \ CompletionStage<?> onClose(WebSocket webSocket, int statusCode, String reason)\
    \ {\n                // 服务器关闭了WebSocket。让我们响应来自服务器的关闭消息\n                webSocket.sendClose();\n\
    \                System.out.println(\"The WebSocket is closed. Close Code: \"\
    \ + statusCode + \", Close Reason: \" + reason);\n                // 返回null表示此WebSocket可以立即关闭\n\
    \                return null;\n            }\n\n            @Override\n      \
    \      public void onError(WebSocket webSocket, Throwable t) {\n             \
    \   System.out.println(\"An error occurred: \" + t.getMessage());\n          \
    \  }\n\n            @Override\n            public CompletionStage<?> onText(WebSocket\
    \ webSocket, CharSequence message, WebSocket.MessagePart part) {\n           \
    \     // 允许监听器再接收一条消息\n                webSocket.request(1);\n               \
    \ // 打印从服务器接收到的消息\n                System.out.println(\"Server: \" + message);\n\
    \                // 返回null表示我们已完成此消息的处理\n                return null;\n      \
    \      }\n        };\n    }\n}\n```\n\n`WebSocketClient`类的工作方式如下：\n\n- `webSocket`实例变量保存客户端端点的引用。\n\
    - `serverUri`实例变量存储服务器端点的URI。\n- `isError`实例变量存储此端点是否处于错误状态的指示符。\n- `isClosed()`方法检查端点是否已关闭或处于错误状态。\n\
    - `webSocket`实例变量在打开握手成功之前为`null`。其值在`statusChanged()`方法内部更新。\n- `connect()`方法构建一个WebSocket并启动打开握手。注意，无论连接状态如何，它都会在打开握手完成时调用`statusChanged()`方法。\n\
    - `statusChanged()`方法通过调用`talkToServer()`与服务器通信。"
  raw: 'The sendClose() method sends a Close message to the peer. You can send a Close
    message as part of a closing handshake initiated by a peer or you can send it
    to initiate a closing handshake with the peer.


    ■ **Tip** if you want to close the WebSocket abruptly, use the abort() method
    of the WebSocket interface.


    Running the WebSocket Program


    It is time to see a WebSocket client endpoint and a WebSocket server endpoint
    exchanging messages.


    Listing [14-5](#index_split_006.html#387) contains code for a class named WebSocketClient
    that encapsulates a client endpoint. Its intended use is as follows:


    // Create a client WebSocket


    WebSocketClient wsClient = new WebSocketClient(new URI(“<server-uri>”));


    // Connect to the server and exchange messages


    wsClient.connect();


    ***Listing 14-5.*** A Class That Encapsulates a Client Endpoint and Its Operations


    // WebSocketClient.java


    package com.jdojo.http.client;


    import java.net.URI;


    import java.util.concurrent.CompletionStage;


    import jdk.incubator.http.HttpClient;


    import jdk.incubator.http.WebSocket;


    Chapter 14 ■ the http/2 Client api


    public class WebSocketClient {


    private WebSocket webSocket;


    private final URI serverUri;


    private boolean inError = false;


    public WebSocketClient(URI serverUri) {


    this.serverUri = serverUri;


    }


    public boolean isClosed() {


    return (webSocket != null && webSocket.isClosed())


    ||


    this.inError;


    }


    public void connect() {


    HttpClient.newHttpClient()


    .newWebSocketBuilder(serverUri, this.getListener())


    .buildAsync()


    .whenComplete(this::statusChanged);


    }


    private void statusChanged(WebSocket webSocket, Throwable t) {


    this.webSocket = webSocket;


    if (t == null) {


    this.talkToServer();


    } else {


    this.inError = true;


    System.out.println("Could not connect to the server." +


    " Error: " + t.getMessage());


    }


    }


    private void talkToServer() {


    // Allow one message to be received by the listener


    webSocket.request(1);


    // Send the server a request for time


    webSocket.sendText("Hello");


    }


    private WebSocket.Listener getListener() {


    return new WebSocket.Listener() {


    @Override


    public void onOpen(WebSocket webSocket) {


    // Allow one more message to be received by the listener


    webSocket.request(1);


    // Notify the user that we are connected


    System.out.println("A WebSocket has been opened.");


    }


    Chapter 14 ■ the http/2 Client api


    @Override


    public CompletionStage<?> onClose(WebSocket webSocket,


    int statusCode, String reason) {


    // Server closed the web socket. Let us respond to


    // the close message from the server


    webSocket.sendClose();


    System.out.println("The WebSocket is closed." +


    " Close Code: " + statusCode +


    ", Close Reason: " + reason);


    // Return null indicating that this WebSocket


    // can be closed immediately


    return null;


    }


    @Override


    public void onError(WebSocket webSocket, Throwable t) {


    System.out.println("An error occurred: " + t.getMessage());


    }


    @Override


    public CompletionStage<?> onText(WebSocket WebSocket,


    CharSequence message, WebSocket.MessagePart part) {


    // Allow one more message to be received by the listener


    webSocket.request(1);


    // Print the message received from the server


    System.out.println("Server: " + message);


    // Return null indicating that we are done


    // processing this message


    return null;


    }


    };


    }


    }


    The WebSocketClient class works as follows:


    • The webSocket instance variable holds the reference of the client endpoint.


    • The serverUri instance variable stores the URI of the server endpoint.


    • The isError instance variable stores an indicator whether this endpoint is in


    error or not.


    • The isClosed() method checks whether the endpoint is already closed or is in
    error.


    • The webSocket instance variable will be null until the opening handshake is


    successful. Its value is updated inside the statusChanged() method.


    • The connect() method builds a WebSocket and starts an opening handshake. Note


    that it calls the statusChanged() method when the opening handshake is complete,


    irrespective of the connection status.


    Chapter 14 ■ the http/2 Client api


    • The statusChanged() method talks to the server by calling the talkToServer()'
