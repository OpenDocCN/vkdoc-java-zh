    **关于作者**


    **Kishori Sharan** 在 IndraSoft, Inc. 担任高级软件工程师主管。他获得了阿拉巴马州特洛伊州立大学计算机信息系统理学硕士学位。他是
    Sun 认证的 Java 2 程序员，拥有超过 20 年的企业应用开发经验，并为使用 Java 平台的专业开发人员提供培训。


