    method declaration, you are assuring the method’s users and the compiler that,
    in the method’s body, you are not performing any unsafe operations on the non-reifiable
    var-args argument. Your assurance is good enough for the compiler not to issue
    the warning. However, if your assurance proves to be untrue at runtime, the runtime
    will throw an appropriate type of exception.


    Before JDK 9, you could use the @SafeVarargs annotation on the following executables
    (constructors and methods):


    • Constructors


    • Static methods


    • Final methods


    Constructors, static methods, and final methods are non-overridable. The idea
    behind allowing the


    @SafeVarargs annotation only on non-overridable executables was to safeguard against
    developers using this annotation on an overridden executable that violates the
    annotation’s constraint on the overridden executable. Suppose that you have a
    class X, which contains a method m1(), which contains a @SafeVarargs.


    Further suppose that you have a class Y that inherits from class X. Class Y may
    override the inherited method m1() and may have unsafe operations. This will have
    runtime surprises because developers may write code in terms of the superclass
    X and may not expect any unsafe operation as promised by its method m1().


    A private method is also non-overridable, so JDK 9 decided to allow the @SafeVarargs
    annotation also on private methods. Listing [20-7 sho](#index_split_008.html#486)ws
    a class with a private method using a @SafeVarargs annotation. The new list of
    executables that can have a @SafeVarargs annotation in JDK 9 is as follows:


    • Constructors


