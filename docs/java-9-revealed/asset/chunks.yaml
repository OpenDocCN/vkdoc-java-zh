    C2 类，而不是根目录中的 C2 类。在这种情况下，MRJAR 表明它为 JDK 9 提供了一个更新版本的 C2 类，该版本覆盖了根目录中为 JDK 8 或更早版本提供的
    C2 版本。JDK 9 版本还添加了一个名为 C5 的新类。


