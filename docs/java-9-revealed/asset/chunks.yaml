    opens net.sf.cglib.transform.impl\nopens net.sf.cglib.beans\nopens net.sf.cglib.util\n\
    opens net.sf.cglib.reflect\nopens net.sf.cglib.core\nopens net.sf.cglib.proxy\n\
    ```\n\n第 4 章 ■ 模块依赖\n\n未命名模块\n"
- fmt: "您可以将 JAR 和模块化 JAR 放在类路径上。当加载某个类型且其包在任何已知模块中都找不到时，模块系统会尝试从类路径加载该类型。如果在类路径上找到了该类型，它会被类加载器加载，并成为该类加载器的一个名为*未命名模块*的成员。每个类加载器都定义了一个未命名模块，其成员是它从类路径加载的所有类型。未命名模块没有名称，因此显式模块不能使用`requires`语句声明对其的依赖。如果您有显式模块需要使用未命名模块中的类型，则必须将该未命名模块的\
    \ JAR 作为自动模块使用，方法是将该 JAR 放在模块路径上。\n\n在编译时尝试从显式模块访问未命名模块中的类型是一个常见错误。这根本不可能，因为未命名模块没有名称，而显式模块在编译时需要模块名称才能读取另一个模块。自动模块充当显式模块和未命名模块之间的桥梁，如图\
    \ [4-15](#index_split_002.html#113) 所示。显式模块可以使用`requires`语句访问自动模块，而自动模块可以访问未命名模块。\n\
    \n显式模块\n\n自动模块\n\n未命名模块\n\n***图 4-15.** 一个自动模块充当显式模块和未命名模块之间的桥梁* 未命名模块没有名称。这并不意味着未命名模块的名称是空字符串、`\"\
    unnamed\"`或`null`。以下模块声明是无效的：\n\n```\nmodule some.module {\n    requires \"\"\
    ; // 编译时错误\n    requires \"unnamed\"; // 编译时错误\n    requires unnamed; // 编译时错误，除非您有一个名为\
    \ unnamed 的命名模块\n    requires null; // 编译时错误\n}\n```\n\n未命名模块读取其他模块，并使用以下规则导出并开放其所有包给其他模块：\n\
    \n• 未命名模块读取所有其他模块。因此，未命名模块可以访问所有模块（包括平台模块）中所有导出包中的公共类型。此规则使得在 Java SE 8 中编译和运行的、使用类路径的应用程序，只要它们仅使用标准的、非弃用的\
    \ Java SE API，就能够在 Java SE 9 中继续编译和运行。\n\n• 未命名模块将其所有包开放给所有其他模块。因此，显式模块可以在运行时通过反射访问未命名模块中的类型。\n\
    \n• 未命名模块导出其所有包。显式模块在编译时无法读取未命名模块。在模块图解析后，所有自动模块都会被设置为读取未命名模块。\n\n第 4 章 ■ 模块依赖\n\
    \n■ **提示** 未命名模块可能包含一个也由命名模块导出的包。在这种情况下，未命名模块中的该包将被忽略。\n\n让我们看两个使用未命名模块的示例。在第一个示例中，一个普通模块将使用反射访问未命名模块。回想一下，普通模块在编译时无法访问未命名模块。在第二个示例中，一个未命名模块将访问一个普通模块。\n\
    \n普通模块到未命名模块\n\n您不需要声明未命名模块。要拥有一个未命名模块，您需要将一个 JAR 或模块化 JAR 放在类路径上。我们将通过将`com.jdojo.reflect`模块的模块化\
    \ JAR 放在类路径上，将其作为未命名模块重用。\n\n清单 [4-19](#index_split_002.html#114) 和清单 [4-20](#index_split_002.html#114)\
    \ 分别包含名为`com.jdojo.unnamed.test`的模块的模块声明以及该模块中的一个`Main`类。在`main()`方法中，该类尝试加载`com.jdojo.reflect.Item`类并读取其字段。为保持代码简洁，我向`main`方法添加了一个`throws`子句。\n\
    \n***清单 4-19.*** `com.jdojo.unnamed.test`模块的模块声明\n\n```\n// module-info.java\n\
    module com.jdojo.unnamed.test {\n```"
  raw: 'You can place JARs and modular JARs on the class path. When a type is being
    loaded and its package is not found in any known modules, the module system attempts
    to load the type from the class path. If the type is found on the class path,
    it is loaded by a class loader and becomes a member of a module called *unnamed*
    *module* of that class loader. Every class loader defines an unnamed module whose
    members are all types it loads from the class path. An unnamed module does not
    have a name, so an explicit module cannot declare a dependency on it using a requires
    statement. If you have explicit module that needs to use the types in an unnamed
    module, you must use the JAR for the unnamed module as an automatic module by
    placing the JAR on the module path.


    It is a common mistake to try to access types in an unnamed module from explicit
    modules at compile-time. This is simply not possible because an unnamed module
    does not have a name and an explicit module needs a module name to read another
    module at compile-time. Automatic modules act as bridges between explicit modules
    and unnamed modules, as shown in Figure [4-15](#index_split_002.html#113). Explicit
    modules can access automatic modules using requires statements and the automatic
    modules can access unnamed modules.


    Explicit Module


    Automatic Module


    Unnamed Module


    ***Figure 4-15.** An automatic module acting as a bridge between an explicit module
    and an unnamed module* An unnamed module does not have a name. This does not mean
    that an unnamed module’s name is


    the empty string, “unnamed”, or null. The following declaration for a module is
    invalid:


    module some.module {


    requires ""; // A compile-time error


    requires "unnamed"; // A compile-time error


    requires unnamed; // A compile-time error unless you have a named


    // module whose name is unnamed


    requires null; // A compile-time error


    }


    An unnamed module reads other modules and exports and opens all its packages to
    other modules using the following rules:


    • An unnamed module reads every other module. Therefore, an unnamed module can


    access public types in all exported packages in all modules, including the platform


    modules. This rule makes it possible that applications using the class path that


    compiled and ran in Java SE 8 will continue to compile and run in Java SE 9, provided


    they use only standard, non-deprecated Java SE APIs.


    • An unnamed module opens all its packages to all other modules. Therefore, it


    is possible that an explicit module can access types in unnamed modules using


    reflection at runtime.


    • An unnamed module exports all its packages. An explicit module cannot read an


    unnamed module at compile-time. After the module graph is resolved, all automatic


    modules are made to read unnamed modules.


    Chapter 4 ■ Module dependenCy


    ■ **Tip** It is possible for an unnamed module to contain a package that is also
    exported by a named module.


    In such a case, the package in the unnamed module is ignored.


    Let’s look at two examples of using unnamed modules. In the first example, a normal
    module will access an unnamed module using reflection. Recall that a normal module
    cannot access an unnamed module at compile-time. In the second example, an unnamed
