- fmt: "`loader`作为此方法创建的所有类加载器的父类加载器。你可以使用`null`作为第二个参数，以使用引导类加载器作为此方法创建的所有类加载器的父类加载器。此方法将为配置中的每个模块创建一个新的类加载器。\n\
    \n`defineModulesWithOneLoader(Configuration cf, ClassLoader parentClassLoader)`方法使用指定的配置创建一个层。它使用指定的父类加载器作为其父类加载器创建一个类加载器。它将配置中的所有模块映射到该一个类加载器。你可以使用`null`作为第二个参数，以使用引导类加载器作为此方法创建的所有类加载器的父类加载器。\n\
    \n以下代码片段创建了一个以引导层为父层的层。该层中的所有模块将由一个类加载器加载，其父类加载器是系统类加载器。\n\n```\nConfiguration\
    \ config = /* create a configuration... */\nClassLoader sysClassLoader = ClassLoader.getSystemClassLoader();\n\
    ModuleLayer parentLayer = ModuleLayer.boot();\nModuleLayer layer = parentLayer.defineModulesWithOneLoader(config,\
    \ sysClassLoader);\n```\n\n创建层后，你需要从该层的模块中加载类。模块中的所有类型都由映射到该模块的类加载器加载。请注意，同一个模块可能在多个层中定义，但这些模块将映射到不同的类加载器。`ModuleLayer`类包含一个`findLoader(String\
    \ moduleName)`方法，该方法接受模块名称作为参数，并返回该模块的`ClassLoader`。如果该模块未在层中定义，则会检查父层。如果该模块在此层或其祖先层中不存在，则会抛出`IllegalArgumentException`。获取模块的`ClassLoader`后，你可以调用其`loadClass(String\
    \ className)`方法来加载该模块中的类。以下代码片段（不包括异常处理逻辑）展示了如何在层中加载类：\n\n```\nModuleLayer layer\
    \ = /* create a layer... */\n// Load a class using the layer\nString moduleName\
    \ = \"com.jdojo.layer\";\nString className = \"com.jdojo.layer.LayerInfo\";\n\
    Class<?> cls = layer.findLoader(moduleName)\n                    .loadClass(className);\n\
    ```\n\n获取`Class`对象后，你可以使用它来实例化其对象并调用该对象的方法。\n\n以下代码片段创建了所加载类的对象，并调用了该对象上名为`printInfo`的方法：\n\
