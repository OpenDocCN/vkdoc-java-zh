    将 jlink 选项保存到指定文件中。


    -G, --strip-debug


    从输出映像中剥离调试信息。


    --suggest-providers [<服务名称>,...]


    如果未指定服务名称，则会建议所有将为添加的模块链接的服务的提供者名称。


    如果指定一个或多个服务名称，则会建议指定服务名称的提供者。此选项可在创建映像之前使用，以了解使用 `--bind-services` 选项时将包含哪些服务。


    -v, --verbose


    打印详细输出。


    --version


    打印 jlink 工具的版本。


    @<文件名>


    从指定文件读取选项。


    第 7 章 ■ 创建自定义运行时映像


    让我们创建一个运行时映像，其中包含素数检查器应用程序的四个模块以及所需的平台模块（仅包含 `java.base` 模块）。请注意，以下命令仅包含素数检查器应用程序中的三个模块。第四个模块将被添加，因为这三个模块依赖于它。命令后的文本将对此进行详细解释。


    C:\Java9Revealed>jlink --module-path jmods;C:\java9\jmods


    --add-modules com.jdojo.prime.client,com.jdojo.prime.generic,com.jdojo.prime.faster


    --launcher runprimechecker=com.jdojo.prime.client


    --output primechecker


    在我解释此命令的所有选项之前，让我们验证运行时映像是否已成功创建。该命令应将运行时映像复制到 `C:\Java9Revealed\primechecker`
    文件夹。运行以下命令以验证运行时映像包含五个模块：C:\Java9Revealed>primechecker\bin\java --list-modules


    com.jdojo.prime@1.0


    com.jdojo.prime.client@1.0


    com.jdojo.prime.faster@1.0


    com.jdojo.prime.generic@1.0


    java.base@9-ea


    如果您得到的输出与此处显示的类似，则运行时映像已正确创建。输出中 `@` 符号后显示的模块版本号可能因您而异。


    `--module-path` 选项指定了两个目录：`jmods` 和 `C:\java9\jmods`。我将素数检查器应用程序的四个 JMOD 文件保存在
    `C:\Java9Revealed\jmods` 目录中。模块路径中的第一个元素让 jlink 工具找到所有应用程序模块。我将 JDK 9 安装在 `C:\java9`
    目录中，因此模块路径中的第二个元素让该工具找到平台模块。如果您不指定第二部分，则会收到错误：


    未找到模块 java.base。


    `--add-modules` 选项指定了素数检查器应用程序的三个模块。您可能想知道为什么我们没有使用此选项指定第四个模块 `com.jdojo.prime`。此列表包含根模块，而不仅仅是包含在运行时映像中的模块。jlink
    工具将传递性地解析这些根模块的所有依赖项，并将所有解析出的依赖模块包含到运行时映像中。


    这三个模块依赖于 `com.jdojo.prime` 模块，该模块将通过定位其在模块路径上而被解析，因此将包含在运行时映像中。该映像还将包含 `java.base`
    模块，因为所有应用程序模块都隐式依赖于它。


    `--output` 选项指定运行时映像将被复制到的目录。该命令会将运行时映像复制到 `C:\Java9Revealed\primechecker` 目录。输出目录包含以下子目录和一个名为
    `release` 的文件：


    • bin


    • conf


    • include


    • legal


    • lib


    第 7 章 ■ 创建自定义运行时映像


    `bin` 目录包含可执行文件。在 Windows 上，它还包含动态链接的本机库（`.dll` 文件）。


    `conf` 目录包含可编辑的配置文件，例如 `.properties` 和 `.policy` 文件。


    `include` 目录包含 C/C++ 头文件。


    `legal` 目录包含法律声明。


    `lib` 目录包含添加到运行时映像的模块以及其他文件。在 Mac、Linux 和 Solaris 上，它还将包含系统的动态链接本机库。


    您在 jlink 命令中使用了 `--launcher` 选项。您指定了一个命令名称 `runprimechecker`，模块名称是 `com.jdojo.prime.client`。`--launcher`
    选项使 jlink 创建一个特定于平台的可执行文件，例如在 Windows 的 `bin` 目录中创建 `runprimechecker.bat` 文件。您可以使用此可执行文件来运行您的应用程序。该文件内容只是运行此模块中主类的包装器。您可以使用此文件运行应用程序：


    C:\Java9Revealed> primechecker\bin\runprimechecker


    使用 jdojo.faster.primechecker:


    3 是素数。


    4 不是素数。


    121 不是素数。


    977 是素数。


    使用 jdojo.faster.primechecker:


    3 是素数。


    4 不是素数。


    121 不是素数。


    977 是素数。


    未找到名为 ''jdojo.probable.primechecker'' 的 PrimeChecker 服务提供者。


    您也可以使用由 jlink 工具复制到 `bin` 目录的 `java` 命令来启动您的应用程序：


    C:\Java9Revealed>primechecker\bin\java --module com.jdojo.prime.client


    此命令的输出将与上一个命令的输出相同。请注意，您不必指定模块路径。链接器（jlink 工具）在创建运行时映像时已经处理了模块路径。当您运行生成的运行时映像的
    `java` 命令时，它知道在哪里找到模块。还要注意，您不必向命令指定主类名称。您只需指定模块名称。您已经为 `com.jdojo.prime.client`
    模块设置了 `main-class` 属性。当您运行一个模块而不指定主类时，该模块的 `module-info.class` 文件中设置的 `main-class`
    属性将被用作主类。


    绑定服务


    在上一节中，您为素数服务客户端应用程序创建了一个运行时映像。您必须使用 `--add-modules` 选项指定要包含在映像中的所有服务提供者模块的名称。在本节中，我将向您展示如何在创建运行时映像时使用
    jlink 工具的 `--bind-services` 选项自动绑定服务。这次，您需要将模块（即 `com.jdojo.prime` 模块）添加到模块图中，其余工作将由
    jlink 工具处理。`com.jdojo.prime.client` 模块读取 `com.jdojo.prime` 模块，因此将前者添加到模块图中也将解析后者。以下命令打印运行时映像的建议服务提供者列表。显示部分输出。


    第 7 章 ■ 创建自定义运行时映像


    C:\Java9Revealed>jlink --module-path jmods;C:\java9\jmods


    --add-modules com.jdojo.prime.client


    **--suggest-providers**


    模块 com.jdojo.prime 位于 (file:///C:/Java9Revealed/jmods/com.jdojo.prime.jmod)


    使用 com.jdojo.prime.PrimeChecker


    模块 com.jdojo.prime.client 位于 (file:///C:/Java9Revealed/jmods/com.jdojo.prime.client.jmod)


    模块 java.base 位于 (file:///C:/java9/jmods/java.base.jmod)


    使用 java.lang.System$LoggerFinder


    使用 java.net.ContentHandlerFactory


    ...


    建议的提供者：


    模块 com.jdojo.prime.faster 提供 com.jdojo.prime.PrimeChecker，由 com.jdojo.prime 使用


    模块 com.jdojo.prime.generic 提供 com.jdojo.prime.PrimeChecker，由 com.jdojo.prime 使用


    模块 com.jdojo.prime.probable 提供 com.jdojo.prime.PrimeChecker，由 com.jdojo.prime
    使用


    模块 java.desktop 提供 java.net.ContentHandlerFactory，由 java.base 使用


    ...


    该命令仅将 `com.jdojo.prime.client` 模块指定给 `--add-modules` 选项。`com.jdojo.prime` 和 `java.base`
    模块被解析，因为 `com.jdojo.prime.client` 模块读取它们。所有已解析的模块都会被扫描以查找 `uses` 语句，随后，模块路径中的所有模块都会被扫描，以查找
    `uses` 语句中指定的服务的服务提供者。所有找到的服务提供者都会被打印出来。

