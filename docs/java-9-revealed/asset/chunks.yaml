    in the StackWalker class. The method’s return type is Class<?>. Invoking this
    method throws UnsupportedOperationException if the StackWalker is not configured
    with the RETAIN_CLASS_REFERENCE


    option. Invoking this method throws IllegalStateException if there is no caller
    frame in the stack, for example, running a class whose main() method invokes this
    method.


