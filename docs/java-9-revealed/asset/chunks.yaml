    ■ **Tip** a StackWalker is thread-safe and reusable. Multiple threads can use
    the same instance to traverse their own stacks.


    The next section explains how to use a StackWalker to walk through stack frames.


    Walking the Stack


    It is time to traverse stack frames of a thread. The StackWalker class contains
    two methods that let you traverse the stack of the *current thread*:


    • void forEach(Consumer<? super StackWalker.StackFrame> action)


    • <T> T walk(Function<? super Stream<StackWalker.StackFrame>,? extends T>


    function)


    Use the forEach() method if you need to traverse the entire stack. The specified
    Consumer will be supplied with one frame as a time from the stack, starting with
    the top most frame. The following snippet of code prints the details of each frame
    returned by a StackWalker:


    // Prints the details of all stack frames of the current thread


    StackWalker.getInstance()


    .forEach(System.out::println);


    Use the walk() method if you want to customize the stack traversal such as by
    using filters and maps.


    The walk() method takes a Function, which accepts a Stream<StackWalker.StackFrame>
    as an argument and can return any type of object. The StackWalker will create
    the stream of stack frames and pass it to your function. When the function completes,
    the StackWalker will close the stream. The stream passed to the walk() method
    can be traversed only once. Attempting to traverse the stream a second time throws
    an IllegalStateException.


    Chapter 16 ■ StaCk WalkIng


    The following snippet of code uses the walk() method to traverse the entire stack,
    printing the details of each frame. This snippet of code does the same as what
    the previous snippet of code did using the forEach() method.


    // Prints the details of all stack frames of the current thread


    StackWalker.getInstance()


    .walk(s -> {


    s.forEach(System.out::println);


    return null;


    });


    ■ **Tip** the forEach() method of the StackWalker is used to process stack frames
    one at a time, whereas the walk() method is used to process the entire stack as
    a stream of frames. You can use the walk() method to simulate the functionality
    of the forEach() method, but not vice versa.


    You might wonder why the walk() method does not return a stream of stack frames
    instead of passing the stream to your function. Not returning a stream of stack
    frames from the method is intentional. The elements of the stream are evaluated
    lazily. Once the stream of stack frames is created, the JVM is free to reorganize
    the stack and there is no definite way to detect that the stack has changed while
    you are still holding the reference to its stream. This is the reason that creating
    and closing the stream of stack frames are controlled by the StackWalker class.


    As the Streams API is extensive, so is the use of the walk() method. I show a
    few of its sample uses before I show you a complete example. The following snippet
    of code gets a snapshot of the stack frames of the current thread in a List.


    import java.lang.StackWalker.StackFrame;


    import java.util.List;


    import static java.util.stream.Collectors.toList;


    ...


    List<StackFrame> frames = StackWalker.getInstance()


    .walk(s -> s.collect(toList()));


    The following snippet of code collects the string form of all stack frames of
    the current thread in a List, excluding frames that represent methods whose names
    start with m2:


    import java.util.List;


    import static java.util.stream.Collectors.toList;


    ...


