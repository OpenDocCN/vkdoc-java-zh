- fmt: '# The `/save` Command


    The `/save` command with the `-history` option saves everything that you typed
    in `jshell` since it was launched.


    The `/save` command with the `-start` option saves the default startup definitions
    to the specified file.


    You can reload the snippets from a file using the `/open` command. The command
    takes the filename as an argument.


    The following `jshell` session declares a class named `Counter`, creates its object,
    and invokes methods on the object. Finally, it saves all active snippets to a
    file named `jshell.jsh`. Note that the file extension `.jsh` is customary for
    `jshell` files. You can use any other extension you want.


    ## Chapter 11 ■ the Java Shell


    ```

    C:\Java9Revealed>jshell


    | Welcome to JShell -- Version 9-ea


    | For an introduction type: /help intro


    jshell> class Counter {


    ...> private int count;


    ...> public synchronized int next() {


    ...> return ++count;


    ...> }


    ...> public int current() {


    ...> return count;


    ...> }


    ...> }


    | created class Counter


    jshell> Counter counter = new Counter()


    counter ==> Counter@25bbe1b6


    jshell> counter.current()


    $3 ==> 0


    jshell> counter.next()


    $4 ==> 1


    jshell> counter.next()


    $5 ==> 2


    jshell> counter.current()


    $6 ==> 2


    jshell> /save jshell.jsh


    jshell> /exit


    | Goodbye

    ```


    At this point, you should have a file named `jshell.jsh` in your current directory
    with the contents shown in Listing 11-2.


    **Listing 11-2.** Contents of the `jshell.jsh` File


    ```

    class Counter {


    private int count;


    public synchronized int next() {


    return ++count;


    }


    public int current() {


    return count;


    }


    }


    Counter counter = new Counter();


    counter.current()


    counter.next()


    counter.next()


    counter.current()

    ```


    ## Chapter 11 ■ the Java Shell


    The following `jshell` session opens the `jshell.jsh` file, which will replay
    all the snippets that were saved in the previous session. After opening the file,
    you can start calling methods on the `counter` variable.


    ```

    C:\Java9Revealed>jshell


    | Welcome to JShell -- Version 9-ea


    | For an introduction type: /help intro


    jshell> /open jshell.jsh


    jshell> counter.current()


    $7 ==> 2


    jshell> counter.next()


    $8 ==> 3


    jshell>

    ```


    # Resetting the JShell State


    You can reset the JShell''s execution state using the `/reset` command. Executing
    this command has the following effects:


    - All snippets you enter in the current session are lost, so be careful before
    you execute this command.

    - The startup snippets are re-executed.

    - The execution state of the tool is restarted.

    - The `jshell` configurations that were set using the `/set` command are retained.

    - The execution environment set using the `/env` command is retained.


    The following `jshell` session declares a variable, resets the session, and attempts
    to print the variable''s value. Note that, on resetting a session, all declared
    variables are lost, so the variable previously declared is not found:


    ```

    jshell> int x = 987


    x ==> 987


    jshell> /reset


    | Resetting state.


    jshell> x


    | Error:


    | cannot find symbol


    | symbol: variable x


    | x


    | ^


    jshell>

    ```


    ## Chapter 11 ■ the Java Shell


    # Reloading the JShell State


    Suppose you played with many snippets in a `jshell` session and exited the session.
    Now you want to go back and replay those snippets. One way to do it is to start
    a new `jshell` session and re-enter those snippets.


    Re-entering several snippets in `jshell` is a hassle. There is an easy way to
    achieve this—by using the `/reload` command. The `/reload` command resets the
    `jshell` state and replays all valid snippets and `/drop` commands in the same
    sequence they were entered before. You can use the `-restore` and `-quiet` options
    to customize its behavior.


    The `/reload` command without any options resets the `jshell` state and replays
    the valid history from one of the following prior actions/events, whichever occurs
    last:


    - Beginning of the current session

    - When the last `/reset` command was executed

    - When the last `/reload` command was executed


    You can use the `-restore` option with the `/reload` command. It resets and replays
    the history between the following two actions/events, whichever are the last two:


    - The launch of `jshell`

    - Execution of the `/reset` command

    - Execution of the `/reload` command'
