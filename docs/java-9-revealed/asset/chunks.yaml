    1024 字节，该过滤器将拒绝对象反序列化。


    `String pattern = "maxarray=4;maxbytes=1024";`

    `ObjectInputFilter filter = ObjectInputFilter.Config.createFilter(pattern);`


    关于指定过滤器模式有若干规则。如果你更喜欢用 Java 代码编写过滤器逻辑，你可以通过创建一个实现 `ObjectInputFilter` 接口的类，并在其
    `checkInput()` 方法中编写逻辑来实现。如果你想从字符串模式创建过滤器，规则如下：有五个过滤器标准，其中四个是限制。它们是 `maxarray`、`maxdepth`、`maxrefs`
    和 `maxbytes`。你可以在模式中使用 `name=value` 对来设置它们，其中 `name` 是这些关键字之一，`value` 是限制值。如果模式包含等号
    (`=`)，则该模式必须使用这四个关键字之一作为名称。第五个过滤器标准用于指定类名的模式，格式如下：


