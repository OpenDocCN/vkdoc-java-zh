    重新加载 JShell 状态


    假设你在一个 jshell 会话中处理了许多代码片段，然后退出了会话。现在你想回去重放这些代码片段。一种方法是启动一个新的 jshell 会话并重新输入这些代码片段。


    在 jshell 中重新输入多个代码片段很麻烦。有一种简单的方法可以实现这一点——使用 `/reload` 命令。`/reload` 命令会重置 jshell
    状态，并按照之前输入的顺序重放所有有效的代码片段和 `/drop` 命令。你可以使用 `-restore` 和 `-quiet` 选项来自定义其行为。


    不带任何选项的 `/reload` 命令会重置 jshell 状态，并从以下先前的操作/事件中（以最后发生者为准）重放有效历史记录：


    • 当前会话的开始

    • 上次执行 `/reset` 命令时

    • 上次执行 `/reload` 命令时


    你可以将 `-restore` 选项与 `/reload` 命令一起使用。它会重置并重放以下两个操作/事件之间（以最后两个为准）的历史记录：


    • 启动 jshell

    • 执行 `/reset` 命令

    • 执行 `/reload` 命令

