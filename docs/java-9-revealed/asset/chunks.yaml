    When the ServiceLoader class is requested to discover and load a service provider,
    it checks whether the service implementation contains a provider method. If a
    provider method is found, the returned value of the method is the service returned
    by the ServiceLoader class. If a provider method is not found, it instantiates
    the service implementation using the provider constructor. If the service implementation
    contains neither a provider method nor a provider constructor, a compile-time
    occur occurs.


    With these rules, it is possible to use a Java interface as a service implementation.
    The interface should have a public static method named provider that returns an
    instance of the service interface type.


    The following sub-sections walk you through the steps to implement a service in
    JDK 9\. The last sub-section explains how to make the same service work in a non-modular
    environment.


    Defining the Service Interface


    In this section, you develop a service called *prime checker*. I am keeping the
    service simple, so you can focus on working with the service provider mechanism
    in JDK 9, rather than writing complex code to implement the service functionality.
    Requirements for this service are as follows:


    • The service should provide an API to check if a number is a prime.


    • Clients should be able to know the name of the service provider. That is, each
    service


    provider should be able to specify its name.


    • Clients should be able to retrieve a service instance without specifying the
    name of


    the service provider. In this case, the first service provider found by the ServiceLoader


    class is returned. If no service provider is found, a RuntimeException is thrown.


    • Clients should be able to retrieve a service instance by specifying a service


    provider name. If a service provider with the specified name does not exist, a


    RuntimeException is thrown.


    Let’s design the service. The functionality provided by the service will be represented
    by an interface named PrimeChecker. It will contain two methods:


    public interface PrimeChecker {


    String getName();


    boolean isPrime(long n);


    }


    The getName() method returns the name of the service provider. The isPrime() method
    returns true if the specified argument is a prime, and it returns false otherwise.
    All service providers will implement the PrimeChecker interface. The PrimeChecker
    interface is our service interface (or service type).


    The service needs to provide APIs to the clients to retrieve instances of the
    service providers. The service needs to discover and load all service providers
    before clients can retrieve them. The service providers are loaded using the ServiceLoader
    class. The class has no public constructor. You can use one of its load() methods
    to get its instance to load a specific type of service. You will need to pass
    the class of the service provider interface. The ServiceLoader class contains
    an iterator() method that returns an Iterator for all service providers of a specific
    service interface loaded by this ServiceLoader. The following snippet of code
    shows you how to load and iterate through all service provider instances for PrimeChecker:


    // Load the service providers for PrimeChecker


    ServiceLoader<PrimeChecker> loader = ServiceLoader.load(PrimeChecker.class);


    // Iterate through all service provider instances


    Iterator<PrimeChecker> iterator = loader.iterator();


