    在 JDK 9 中访问资源


    在 JDK 9 之前，你可以访问类路径上任何 JAR 中的资源。在 JDK 9 中，类和资源被封装在模块中。最初，JDK 9 的设计者强制实施了模块封装规则，即模块中的资源必须对该模块私有，因此它们*仅*应能被该模块内的代码访问。虽然这条规则在理论上看起来不错，但它给那些跨模块共享资源以及从其他模块加载类文件作为资源的框架带来了问题。最终达成了一项折衷方案，允许对模块中的资源进行*有限*的访问，同时仍然强制实施模块的封装性。JDK
    9 在三个类中提供了资源查找方法：


    • java.lang.Class


    • java.lang.ClassLoader


    • java.lang.Module


    Class 和 ClassLoader 类没有新增任何方法。Module 类包含一个 getResourceAsStream(String name) 方法，如果找到资源，则返回一个
    InputStream；否则返回 null。


    资源命名语法


    资源名称由一系列用斜杠分隔的字符串组成，例如 com/jdojo/states.png、


    /com/jdojo/words.png 和 logo.png。如果资源名称以斜杠开头，则被视为绝对资源名称。


    包名根据资源名称使用以下规则计算得出：


    • 如果资源名称以斜杠开头，则去掉开头的斜杠。例如，对于

    '
- fmt: "资源名称`/com/jdojo/words.png`，此步骤得到`com/jdojo/words.png`。\n\n- 从资源名称中删除最后一个斜杠及其之后的所有字符。在此示例中，`com/jdojo/words.png`变为`com/jdojo`。\n\
    - 将名称中剩余的每个斜杠替换为句点（`.`）。因此，`com/jdojo`转换为`com.jdojo`。结果字符串即为包名。\n\n在某些情况下，使用这些步骤会导致未命名包或无效包名。请记住，包名（如果存在）必须由有效的\
    \ Java 标识符组成。如果没有包名，则称为未命名包。以`META-INF/resource/logo.png`作为资源名称为例。\n\n应用上述规则集，其包名将被计算为`META-INF.resources`，这不是一个有效的包名，但它是资源的有效路径。\n\
    \n## 查找资源的规则\n\n由于向后兼容性和模块系统的强封装承诺，JDK 9 中查找资源的新规则较为复杂，并基于以下几个因素：\n\n- 包含资源的模块类型：命名模块、开放模块、未命名模块或自动模块。\n\
    - 访问资源的模块：是同一模块还是不同模块？\n- 被访问资源的包名：是有效的还是无效的 Java 包？是未命名包吗？\n- 包含资源的包的封装性：包含资源的包是向访问资源的模块导出、开放还是封装？\n\
    - 被访问资源的文件扩展名：资源是`.class`文件还是其他类型的文件？\n- 用于访问资源的类的方法：`Class`、`ClassLoader`还是`Module`？\n\
    \n以下规则适用于包含在*命名*模块中的资源：\n\n- 如果资源名称以`.class`结尾，则任何模块中的代码都可以访问该资源。也就是说，任何模块都可以访问任何命名模块中的类文件。\n\
    - 如果根据资源名称计算出的包名不是有效的 Java 包名（例如`META-INF.resources`），则任何模块中的代码都可以访问该资源。\n- 如果根据资源名称计算出的包名是未命名包（例如资源名称`words.png`），则任何模块中的代码都可以访问该资源。\n\
    - 如果包含资源的包向访问该资源的模块开放，则该模块中的代码可以访问该资源。一个包可以向模块开放，因为定义该包的模块是开放模块，或者该模块向所有其他模块开放该包，或者该模块使用限定的`opens`语句仅向特定模块开放该包。如果包未通过任何这些方式开放，则该包中的资源无法被该模块外部的代码访问。\n\
    - 此规则是上一条规则的衍生。未命名模块、自动模块或开放模块中的每个包都是开放的，因此所有其他模块中的代码都可以访问这些模块中的所有资源。\n\n> **提示**：命名模块中的包必须开放（而非导出）才能访问其资源。导出模块的包允许其他模块访问该包中的公共类型（而非资源）。\n\
    \n`Module`、`Class`和`ClassLoader`类中的各种资源查找方法在访问命名模块中的资源时行为不同：\n\n- 您可以使用`Module`类的`getResourceAsStream()`方法来访问模块中的资源。此方法对调用者敏感。如果调用者模块不同，此方法将应用前述所有资源可访问性规则。\n\
    - 对于在命名模块中定义的类，`Class`类中的`getResource*()`方法仅在该命名模块中定位资源。也就是说，您不能使用这些方法来定位调用这些方法的类所在命名模块之外的类。\n\
    - `ClassLoader`类中的`getResource*()`方法根据前面描述的规则列表在命名模块中定位资源。这些方法对调用者不敏感。类加载器在尝试自行定位资源之前，会先将资源搜索委托给其父加载器。这些方法有两个例外：1）它们仅在无条件开放的包中定位资源。如果使用限定的`opens`语句向特定模块开放了包，这些方法将不会在这些包中定位资源。2）它们搜索在类加载器中定义的模块。\n\
    \n`Class`对象将仅在其所属的模块中查找资源。它还支持以斜杠开头的绝对资源名称和不以斜杠开头的相对资源名称。以下是使用`Class`对象的一些示例：\n\
    \n```\n// 将找到资源\nURL url1 = Test.class.getResource(\"Test.class\");\n\n// 不会找到资源，因为\
