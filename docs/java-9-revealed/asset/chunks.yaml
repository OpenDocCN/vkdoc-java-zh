  raw: 'You will get this error when you compile the module declaration for the com.jdojo.person
    module without including the com.jdojo.address module in the module path. The
    com.jdojo.person module reads the com.jdojo.address module, so the former must
    be able to find the latter on the module path at compile-time as well as runtime.
    If you are using a command prompt, use the --module-path option to specify the
    module path for the com.jdojo.address module. If you are using NetBeans, refer
    to the previous section for how to configure the module path for the com.jdojo.person
    module.


    Package Does Not Exist Error


    The error is as follows:


    error: package com.jdojo.address does not exist


    import com.jdojo.address.Address;


    ^


    error: cannot find symbol


    private Address address = new Address();


    ^


    symbol: class Address


    location: class Person


    You will get this error when you compile the Person and Main classes in the com.jdojo.person
    module without adding a requires statement in the module declaration. The error
    message states that the compiler cannot find the com.jdojo.address.Address class.
    The solution is to add a requires com.jdojo.address statement to the module declaration
    for the com.jdojo.person module and add the com.jdojo.address module to the module
    path.


    Module Resolution Exception


    The partial error is as follows:


    Error occurred during initialization of VM


    java.lang.module.ResolutionException: Module com.jdojo.person not found


    ...


    You may get this error for the following reasons when you attempt to run the example
    from the command prompt:


    • The module path is not specified correctly.


    • The module path is correct, but no compiled code in the specified directories
    or


    modular JARs is found on the module path.


    Chapter 4 ■ Module dependenCy


    Suppose you use the following command to run the example:


    C:\Java9Revealed>java --module-path


    com.jdojo.person\dist;com.jdojo.address\dist


