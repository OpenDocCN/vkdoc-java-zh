    第 13 章 ■ Collection API 更新


    JDK 9 通过为 `List`、`Set` 和 `Map` 接口提供静态工厂方法解决了这些问题。该方法名为 `of()`，并且已被重载。在 JDK 9 中，你可以如下所示声明并初始化一个包含两个元素的不可修改列表：


