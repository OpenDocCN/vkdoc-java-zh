    Setting Feedback Mode


    When you execute a snippet or a command, jshell prints feedback. The amount and
    format of the feedback depends on the *feedback mode*. You can use one of the
    four predefined feedback modes or a custom feedback mode:


    • silent


    • concise


    • normal


    • verbose


    The silent mode gives you no feedback at all and the verbose mode gives you the
    most feedback. The concise mode gives you the same feedback as the normal mode,
    but in a compact format. The command to set the feedback mode is as follows:


    /set feedback [-retain] <mode>


    Here, <mode> is one of the four feedback modes. Use the -retain option if you
    want to persist the feedback mode across the jshell sessions.


    You can also launch jshell in a specific feedback mode:


    jshell --feedback <mode>


