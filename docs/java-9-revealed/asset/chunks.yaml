    Summary


    The Process API consists of classes and interfaces to work with native processes.
    Java SE has provided the Process API since version 1.0 through the Runtime and
    Process classes. It allowed you to create new native processes, manage their I/O
    streams, and destroy them. Later versions of Java SE improved the API. Until Java
    9, developers had to resort to writing native code to get basic information such
    as the ID of a process, the command used to start a processes, etc. Java 9 added
    an interface named ProcessHandle that represents a process handle. You can use
    the process handle to query and manage a native process.


    Chapter 12 ■ proCess apI Updates


    The following classes and interfaces comprise the Process API: Runtime, ProcessBuilder,


    ProcessBuilder.Redirect, Process, ProcessHandle, and ProcessHandle.Info.


    The exec() method of the Runtime class is used to start a native process. The
    start() method of the ProcessBuilder class is a preferred over the exec() method
    of the Runtime class to start a process. An instance of the ProcessBuilder.Redirect
    class represents a source of input of a process or a destination output of a process.


    An instance of the Process class represents a native process created by a Java
    program.'
