    \ `IndexOutOfBoundsException`。如果子范围在范围内，则返回 `fromIndex`。此方法在处理数组和列表时，对于子范围检查非常有用。\n\
    \n`checkIndex(int index, int length)` 方法检查指定的索引是否在范围 0（包含）到 `length`（不包含）之内。如果任一参数为负整数，或索引超出范围，则会抛出\
    \ `IndexOutOfBoundsException`。如果索引在范围内，则返回该索引。当一个方法接收一个索引并返回数组或列表中该索引处的值时，此方法非常有用。\n\
    \n**比较数组**\n\n`java.util.Arrays` 类包含静态实用方法，可让你对数组执行各种操作，例如排序、比较、转换为流等。在 JDK 9\
    \ 中，该类新增了几个方法，允许你比较数组和数组切片。新方法分为三类：\n\n•   比较两个数组或其切片是否相等\n•   按字典顺序比较两个数组\n•\
    \   查找两个数组中第一个不匹配的索引\n\n添加到该类的列表非常庞大。每个类别中的方法都针对所有原始类型和 `Object` 数组进行了重载。为节省篇幅，此处不一一列出。有关完整列表，请参阅\
    \ `Arrays` 类的 API 文档。在本节末尾，我将使用两个 `int` 数组来举例说明。\n\n`equals()` 方法允许你比较两个数组是否相等。如果数组或切片中的元素数量相同，并且数组或切片中所有对应的元素对都相等，则认为两个数组相等。以下是\
