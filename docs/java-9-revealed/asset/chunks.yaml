- fmt: "# Tip\n\nYou cannot annotate individual module statements. For example, you\
    \ cannot annotate an `exports` statement with a `@Deprecated` annotation indicating\
    \ that the exported package will be removed in a future release. During the early\
    \ design phase, it was considered and rejected on the ground that this feature\
    \ will take a considerable amount of time that is not needed at this time. This\
    \ could be added in the future, if needed. As a result, you will not find any\
    \ annotation-related methods in the `ModuleDescriptor` class.\n\nNow we’ll create\
    \ a new annotation type and use it on a module declaration. Listing [10-7 con](#index_split_004.html#246)\
    \ contains the module declaration for a module named `com.jdojo.module.api.annotation`\
    \ that contains three annotations. The `Version` annotation type has been declared\
    \ in the same module and its source code is shown in Listing [10-8](#index_split_004.html#246).\
    \ The retention policy of the new annotation type is `RUNTIME`.\n\n**Listing 10-7.**\
    \ A Module Declaration for a Module Named `com.jdojo.module.api.annotation`\n\n\
    ```\n// module-info.java\n\nimport com.jdojo.module.api.annotation.Version;\n\n\
    @Deprecated(since=\"1.2\", forRemoval=false)\n\n@SuppressWarnings(\"unchecked\"\
    )\n\n@Version(major=1, minor=2)\n\nmodule com.jdojo.module.api.annotation {\n\n\
    \    // No module statements\n\n}\n```\n\n**Listing 10-8.** A `Version` Annotation\
    \ Type That Can Be Used on Packages, Modules, and Types\n\n```\n// Version.java\n\
    \npackage com.jdojo.module.api.annotation;\n\nimport static java.lang.annotation.ElementType.MODULE;\n\
    \nimport static java.lang.annotation.ElementType.PACKAGE;\n\nimport static java.lang.annotation.ElementType.TYPE;\n\
    \nimport java.lang.annotation.Retention;\n\nimport static java.lang.annotation.RetentionPolicy.RUNTIME;\n\
    \nimport java.lang.annotation.Target;\n\n@Retention(RUNTIME)\n\n@Target({PACKAGE,\
    \ MODULE, TYPE})\n\npublic @interface Version {\n\n    int major();\n\n    int\
    \ minor();\n\n}\n```\n\nListing [10-9](#index_split_004.html#247) contains the\
    \ code for an `AnnotationTest` class. It reads the annotations on the `com.jdojo.module.api.annotation`\
    \ module. The output does not contain the `@SuppressWarnings` annotation that\
    \ is present on the module because this annotation uses a retention policy of\
    \ `RetentionPolicy.RUNTIME`, which means the annotation is not retained at runtime.\n\
    \n**Listing 10-9.** An `AnnotationTest` Class to Demonstrate How to Read Annotations\
    \ on Modules\n\n```\n// AnnotationTest.java\n\npackage com.jdojo.module.api.annotation;\n\
    \nimport java.lang.annotation.Annotation;\n\npublic class AnnotationTest {\n\n\
    \    public static void main(String[] args) {\n\n        // Get the module reference\
    \ of the com.jdojo.module.api.annotation module\n\n        Module m = AnnotationTest.class.getModule();\n\
    \n        // Print all annotations\n\n        Annotation[] a = m.getAnnotations();\n\
    \n        for(Annotation ann : a) {\n\n            System.out.println(ann);\n\n\
    \        }\n\n        // Read the Deprecated annotation\n\n        Deprecated\
    \ d = m.getAnnotation(Deprecated.class);\n\n        if (d != null) {\n\n     \
    \       System.out.printf(\"Deprecated: since=%s, forRemoval=%b%n\",\n\n     \
    \           d.since(), d.forRemoval());\n\n        }\n\n        // Read the Version\
    \ annotation\n\n        Version v = m.getAnnotation(Version.class);\n\n      \
    \  if (v != null) {\n\n            System.out.printf(\"Version: major=%d, minor=%d%n\"\
    , v.major(), v.minor());\n\n        }\n\n    }\n\n}\n```\n\n```\n@java.lang.Deprecated(forRemoval=false,\
    \ since=\"1.2\")\n\n@com.jdojo.module.api.annotation.Version(major=1, minor=2)\n\
    \nDeprecated: since=1.2, forRemoval=false\n\nVersion: major=1, minor=2\n```\n\n\
    ## Loading Classes\n\nYou can use one of the following static `forName()` methods\
    \ of the `Class` class to load and initialize a class:\n\n- `Class<?> forName(String\
    \ className) throws ClassNotFoundException`\n- `Class<?> forName(String className,\
    \ boolean initialize, ClassLoader loader) throws ClassNotFoundException`\n- `Class<?>\
    \ forName(Module module, String className)`\n\nIn these methods, the `className`\
    \ parameter is the fully qualified name of the class or interface to be loaded,\
    \ such as `java.lang.Thread` and `com.jdojo.intro.Welcome`. If the `initialize`\
    \ parameter is `true`, the class will be initialized."
