- fmt: "# In this case, the application prints one or two lines\n\n`Server: 2016-12-16T07:15:04.586-`\
    \ of output and waits forever. This happens when `06:00[America/Chicago]` you\
    \ do not have `webSocket.request(1)` calls in your client endpoint logic. The\
    \ server is sending messages, which are queued because you have not allowed for\
    \ more messages. Calling the `request(n)` method in the `onOpen`, `onText`, and\
    \ other events fixes this problem.\n\n## Summary\n\nJDK 9 added an HTTP/2 Client\
    \ API that lets you work with HTTP requests and responses in Java applications.\
    \ The API provides classes and interfaces to develop WebSocket client endpoints\
    \ with authentication and TLS. The API is in the `jdk.incubator.http` package,\
    \ which is in the `jdk.incubator.httpclient` module.\n\n## Chapter 14 ■ The HTTP/2\
    \ Client API\n\nThree abstract classes, `HttpClient`, `HttpRequest`, and `HttpResponse`,\
    \ and the `WebSocket` interface are central to the HTTP/2 Client API. Instances\
    \ of these types are created using builders. The `HttpClient` class is immutable.\
    \ An instance of the `HttpClient` class stores HTTP connection configurations\
    \ that can be reused for multiple HTTP requests. An instance of the `HttpRequest`\
    \ class represents an HTTP request. An instance of the `HttpResponse` class represents\
    \ an HTTP response received from a server. You can send and receive HTTP requests\
    \ and responses synchronously or asynchronously.\n\nAn instance of the `WebSocket`\
    \ interface represents a WebSocket client endpoint. Communication with the WebSocket\
    \ server endpoint is accomplished asynchronously. The WebSocket API is event-based.\
    \ You need to specify a listener, which is an instance of the `WebSocket.Listener`\
    \ interface, for a WebSocket client endpoint. The listener is notified—by invoking\
    \ its appropriate methods—when an event occurs on the endpoint, for example, the\
    \ listener is notified when the opening handshake with a peer is completed successfully\
    \ by calling the `onOpen()` method of the listener. The API supports exchanging\
    \ text as well as binary messages with peers. Messages can be exchanged in parts.\n\
    \n## Chapter 15 ■ Enhanced Deprecation\n\nIn this chapter, you will learn:\n\n\
    - How to deprecate your APIs\n- The roles of the `@deprecate` Javadoc tag and\
    \ the `@Deprecation` annotation in deprecating APIs\n- The detailed rules that\
    \ are used to generated deprecation warnings\n- Updates to the `@Deprecation`\
    \ annotation in JDK 9\n- New deprecation warnings in JDK 9\n- How to use the `@SuppressWarnings`\
    \ annotation to suppress different types of deprecation warnings in JDK 9\n- How\
    \ to use the static analysis tool named `jdeprscan` to scan your compiled codebase\
    \ to find the uses of deprecated JDK APIs\n\n### What Is Deprecation?\n\nDeprecation\
    \ in Java is a way to provide information about the lifecycle of the API. You\
    \ can deprecate modules, packages, types, constructors, methods, fields, parameters,\
    \ and local variables. When you deprecate an API, you are telling its users:\n\
    \n- Not to use the API because it is dangerous.\n- To migrate away from the API\
    \ because a better replacement for the API exists.\n- To migrate away from the\
    \ API because the API will be removed in a future release.\n\n### How to Deprecate\
    \ an API\n\nThe JDK has two constructs that are used to deprecate APIs:\n\n- The\
    \ `@deprecated` Javadoc tag\n- The `@Deprecated` annotation\n\n© Kishori Sharan\
    \ 2017  \nK. Sharan, *Java 9 Revealed*, DOI 10.1007/978-1-4842-2592-9_15\n\nThe\
    \ `@deprecated` Javadoc tag was added in JDK 1.1 and it lets you specify the details\
    \ about the deprecation with a rich set of text formatting features of HTML. The\
    \ `java.lang.Deprecated` annotation type was added to JDK 5.0 and it can be used\
    \ on the API element, which is being deprecated. Before JDK 9, the annotation\
    \ did not contain any elements. It is retained at runtime.\n\nThe `@deprecated`\
    \ tag and the `@Deprecated` annotation are supposed to be used together. Both\
    \ should be present or both absent. The `@Deprecation` annotation does not let\
    \ you specify a description of the deprecation, so you must use the `@deprecated`\
    \ tag to provide the description."
