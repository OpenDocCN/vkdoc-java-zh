    **总结**


    模块 API 由一些类和接口组成，它们为您提供了对模块的编程式访问。使用该 API，您可以编程式地读取/修改/构建模块描述符、加载模块、读取模块内容、创建层等。模块
    API 很小，包含大约 15 个类和接口，分布在两个包中：`java.lang` 和 `java.lang.module`。`Module`、`ModuleLayer`
    和 `LayerInstantiationException` 类位于 `java.lang` 包中，其余类位于 `java.lang.module` 包中。


    `Module` 类的实例表示一个运行时模块。加载到 JVM 中的每个类型都属于某个模块。JDK 9 向 `Class` 类添加了一个名为 `getModule()`
    的方法，该方法返回该类所属的模块。


    `ModuleDescriptor` 类的实例表示一个模块定义，它是从模块声明（通常来自 `module-info.class` 文件）创建的。也可以使用
    `ModuleDescriptor.Builder` 类动态创建模块描述符。模块声明可以通过命令行选项（如 `--add-reads`、`--add-exports`
    和 `--add-opens`）以及使用 `Module` 类中的方法（如 `addReads()`、`addOpens()` 和 `addExports()`）进行增强。`ModuleDescriptor`
    表示模块声明时存在的模块描述符，而不是增强后的模块描述符。

