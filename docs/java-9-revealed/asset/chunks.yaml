    option that have special meaning:


    • ALL-DEFAULT


    • ALL-SYSTEM


    • ALL-MODULE-PATH


    All three special values are valid at runtime. You can use the ALL-MODULE-PATH
    value only at compile-time.


    If ALL-DEFAULT is used as the module list, the default set of root modules used
    when the application is run from the class path is added to the root set. This
    is useful for an application that is a container and hosts other applications
    that may need other modules not required by the container application itself.
    This is a way to make all Java SE modules available to the container, so any of
    the hosted applications may use them.


    If ALL-SYSTEM is the used as the module list, all system modules are added to
    the root set. This is useful for running test harnesses.


    Chapter 2 ■ the Module SySteM


    If ALL-MODULE-PATH is the used as the module list, all modules found on module
    paths are added to the root set. This is useful for tools such as Maven, which
    ensures that all modules on the module path are needed by the application.


    ■ **Tip** you may receive an error that a module is not found even when the module
    is present on the module path. In such cases, you need to add the missing module
    to the default set of root modules using the


    --add-modules command-line option.


    JDK 9 supports a useful non-standard command-line option that prints the diagnostic
    messages


    describing the steps used to resolve modules while the module graph is constructed.
    The option is


    -Xdiag:resolver. The following command runs the pkg3.Main class in the claim module.
    A partial output is shown. At the end of the diagnostic messages, you will find
    a Result: section that lists the resolved modules.


    C:\Java9Revealed>java -Xdiag:resolver -p lib -m claim/pkg3.Main


    [Resolver] Root module claim located


    [Resolver] (file:///C:/Java9Revealed/lib/claim.jar)


    [Resolver] Module java.base located, required by claim


    [Resolver] (jrt:/java.base)


    [Resolver] Module policy located, required by claim


    [Resolver] (file:///C:/Java9Revealed/lib/policy.jar)


    ...


    [Resolver] Result:


    [Resolver] claim


    [Resolver] java.base


    ...


    [Resolver] policy


    Aggregator Modules


    You can create a module that contains no code of its own. It collects and re-exports
    the contents of other modules. Such a module is called an *aggregator module*.
    Suppose there are several modules that depend on five modules. You can create
    an aggregator module for those five modules, and now, your modules can depend
    on only one module—the aggregator module.


    Aggregator modules exist for convenience. Java 9 contains several aggregator modules
    such as


    java.se and java.se.ee. The java.se module gathers parts of the Java SE that do
    not overlap with Java EE.


    The java.se.ee module gathers all of the modules that comprise the Java SE, including
    modules that overlap with the Java EE.


    Declaring Modules


    This section contains a quick overview of the syntax used to declare modules.
    I explain each part in greater detail in subsequent chapters. If you do not understand
    everything mentioned about modules in this section, keep reading. I will cover
    them again with examples in later chapters.


    Chapter 2 ■ the Module SySteM


    A module is defined using a module declaration, which is a new construct in the
    Java programming language. The syntax is as follows:


    [open] module <module> {


    <module-statement>;


    <module-statement>;


    ...


    }


    The presence of the open modifier, which is optional, declares an *open module*.
    An open module exports all its packages to be accessed by other modules using
    reflection. <module> is the name of the module being defined. <module-statement>
    is a module statement. You can have zero or more module statements in a module
    declaration. If it is present, it can be one of five types of statements:


    • An exports statement


    • An opens statement


    • A requires statement


    • A uses statement


    • A provides statement


    The exports and opens statements are used to control access to the module’s code.
    The requires statement is used to declare dependency of a module to another module.
    The uses and provides statements are used to express service consumption and service
    provision, respectively. The following is an example of a module declaration of
    a module named myModule:


    module myModule {


    // Exports the packages - com.jdojo.util and


    // com.jdojo.util.parser


    exports com.jdojo.util;


    exports com.jdojo.util.parser;


    // Reads the java.sql module


    requires java.sql;


    // Opens com.jdojo.legacy package for reflective access


    opens com.jdojo.legacy;


    // Uses the service interface java.sql.Driver


    uses java.sql.Driver;


    // Provides the com.jdojo.util.parser.FasterCsvParser


    // class as an implementation for the service interface


    // named com.jdojo.util.CsvParser


    provides com.jdojo.util.CsvParser


    with com.jdojo.util.parser.FasterCsvParser;


    }


    Chapter 2 ■ the Module SySteM


    You can create an open module by using the open modifier in the module declaration.
    An open module grants reflective access to all its packages to other modules.
    You cannot use opens statements inside an open module because all packages are
    implicitly open in an open module. The following snippet of code declares an open
    module named myLegacyModule:


    **open** module myLegacyModule {


    exports com.jdojo.legacy;


    requires java.sql;


    }


    Module Names


    A module name can be a Java- *qualified* identifier. A qualified identifier is
    one or more identifiers separated by a dot, for example, policy, com.jdojo.common,
    and com.jdojo.util. If any part in a module name is not a valid Java identifier,
    a compile-time error occurs. For example, com.jdojo.common.1.0 is not valid module
    name because two parts, 1 and 0, in the name are not valid Java identifiers.


    Similar to the package-naming convention, use the reverse-domain name pattern
    to give your modules unique names. Using this convention, the simplest module,
    which is named com.jdojo.common, may be declared as follows:


    module com.jdojo.common {


    // No module statements


    }


    A module name does not hide variables, types, and packages with the same name.
    Therefore, you can have a module as well as a variable, a type, or a package with
    the same name. The context of their use will differentiate which name is referring
    to what kind of entity.


    In JDK 9, open, module, requires, transitive, exports, opens, to, uses, provides,
    and with are restricted keywords. They are explained briefly later in this chapter
    and in detail in subsequent chapters.


    They have special meaning only when they appear in module declarations at specific
    positions. You can use them as identifiers everywhere else in programs. For example,
    the following module declaration is valid, even though it does not use an intuitive
    module name:


    // Declare a module named module


    module module {


    // Module statements go here


    }


    The first module word is interpreted as a keyword and the second one is a module
    name.


    You can declare a variable named module anywhere in your program:


    String module = "myModule";


    Chapter 2 ■ the Module SySteM


    Controlling Access to Modules


    An exports statement exports the specified package of the module to all modules
    or a list of named modules at compile-time and runtime. It takes the following
    two forms:


    • exports <package>;


    • exports <package> to <module1>, <module2>...;


    Examples of using the exports statement are as follows:


    module M {


    exports com.jdojo.util;


    exports com.jdojo.policy


    to com.jdojo.claim, com.jdojo.billing;


    }'
