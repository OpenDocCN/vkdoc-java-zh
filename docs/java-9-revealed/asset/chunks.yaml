  raw: 'JDK 6 added limited support for platform-specific desktop features through
    the java.awt.Desktop class such as opening a URI in the user-default browser,
    opening a mailto URI in the user-default mail client, and opening, editing, and
    printing files using registered applications. Java SE 9 took the platform-specific
    desktop support forward and added public API support for many system and application
    event notifications, if they are available on the current platform. To support
    so many new desktop features, Java SE


    9 added a new package, java.awt.desktop, to the java.desktop module. The java.awt.Desktop
    class also received many new methods. In JDK 9, the Desktop API supports 24 platform-specific
    desktop actions and notifications such as notifications when the attached displays
    go into or come out of power save, when the system enters sleep mode, or after
    the system wakes, etc.


    To address the security risk posed by deserialization, JDK 9 introduced the concept
    of an object input filter that can be used to verify the object being deserialized
    and, if it does not pass a test, the deserialization process can be stopped. The
    object input filter is an instance of a new interface, java.


    io.ObjectInputFilter. You can specify a system-wide global filter that can be
    used while deserializing any object. A global filter can be specified using a
    new jdk.serialFilter system property, using a property named jdk.serialFilter
    in the JAVA_HOME\conf\security\java.security file, or using


    the setSerialFilter() method of the ObjectInputFilter.Config class. A local filter
    can be set on an ObjectInputStream using its setObjectInputFilter() method, which
    overrides the global filter.


    The java.io.InputStream class has received a new method, called transferTo(OutputStream
    out), that can be used to read all bytes from the input stream and write them
    sequentially to the specified output stream. The method does not close either
    stream. The java.nio.Buffer class received two methods—


    duplicate() and slice()—that can be used to duplicate and splice a buffer. The
    duplicated and sliced buffers share their contents with the original buffer. But
    they maintain their position, limit, and mark independent of the original buffer.


