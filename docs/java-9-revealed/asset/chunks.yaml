    ## 多版本清单属性


    一个 MRJAR 在其 `MANIFEST.MF` 文件中包含一个特殊的属性条目：


    `Multi-Release: true`


    `Multi-Release` 属性由 `jar` 工具为 MRJAR 添加。如果该属性的值为 `true`，则表示该 JAR 是一个多版本 JAR。如果其值为
    `false` 或该属性缺失，则它不是多版本 JAR。该属性被添加到清单文件的主节中。


    一个新的常量 `MULTI_RELEASE` 已被添加到 `Attributes.Name` 类中（该类位于 `java.util.jar` 包中），用于表示清单文件中的新属性
    `Multi-Release`。因此，在 Java 代码中，`Attributes.Name.MULTI_RELEASE` 常量代表 `Multi-Release`
    属性的值。


    ## JMOD 格式


    JDK 9 引入了一种名为 JMOD 的新格式，用于打包模块。JMOD 文件旨在处理比 JAR 文件更多的内容类型。JMOD 文件可以打包本地代码、配置文件、本地命令以及其他类型的数据。在撰写本文时，JMOD
    格式基于 ZIP 格式，但未来将会改变。JDK 9 模块以 JMOD 格式打包，供你在编译时和链接时使用。JMOD 格式在运行时不受支持。你可以在 `JDK_HOME\jmods`
    目录中找到它们，其中 `JDK_HOME` 是你安装 JDK 9 的目录。你可以将自己的模块打包成 JMOD 格式。JMOD 格式的文件具有 `.jmod`
    扩展名。例如，名为 `java.base` 的平台模块已打包在 `java.base.jmod` 文件中。


    JMOD 文件可以包含本地代码，这在运行时动态提取和链接有些棘手。这就是 JMOD 文件在编译时和链接时受支持，但在运行时不受支持的原因。


    ## 使用 `jmod` 工具


    JDK 9 附带了一个名为 `jmod` 的新工具。它位于 `JDK_HOME\bin` 目录中。它可以用于创建 JMOD 文件、列出 JMOD 文件的内容、打印模块的描述以及记录所用模块的哈希值。使用
    `jmod` 工具的一般语法如下：


    `jmod <subcommand> <options> <jmod-file>`


    第 6 章 ■ 打包模块


    你必须与 `jmod` 命令一起使用以下子命令之一：


    - `create`

    - `extract`

    - `list`

    - `describe`

    - `hash`


    `list` 和 `describe` 子命令不接受任何选项。`<jmod-file>` 是你正在创建的 JMOD 文件，或者是你想要描述的现有 JMOD
    文件。表 [6-1](#index_split_002.html#159) 包含了该工具支持的选项列表。


    ***表 6-1.** `jmod` 工具的选项列表*


    | **选项** | **描述** |

    | --- | --- |

    | `--class-path <path>` | 指定可以找到要打包类的类路径。`<path>` 可以是 JAR 文件或包含应用程序类的目录的路径列表。`<path>`
    中的内容将被复制到 JMOD 文件中。 |

    | `--cmds <path>` | 指定包含需要复制到 JMOD 文件的本地命令的目录列表。 |

    | `--config <path>` | 指定包含需要复制到 JMOD 文件的用户可编辑配置文件的目录列表。 |

    | `--dir <path>` | 指定将指定 JMOD 文件的内容提取到的目标目录。 |

    | `--do-not-resolve-by-default` | 如果使用此选项创建 JMOD 文件，则该 JMOD 文件中的模块将从默认根模块集中排除。要解析此类模块，你必须使用
    `--add-modules` 命令行选项将其添加到默认根模块集中。 |

    | `--dry-run` | 对模块进行哈希处理的试运行。使用此选项，计算并打印哈希值，但不会将其记录在 JMOD 文件中。 |

    | `--exclude <pattern-list>` | 排除与提供的逗号分隔模式匹配的文件。 |'
