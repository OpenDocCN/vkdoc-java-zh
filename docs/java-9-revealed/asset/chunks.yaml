    # 可能的服务提供者实现接口名称


    com.jdojo.prime.probable.ProbablePrimeChecker


    为通用和更快的质数检查服务提供者重新编译并重新打包模块化 JAR。


    运行以下命令：


    C:\Java9Revealed>java --class-path lib\com.jdojo.prime.jar;lib\com.jdojo.prime.client.


    jar;lib\com.jdojo.prime.faster.jar;lib\com.jdojo.prime.generic.jar;lib\com.jdojo.prime.


    probable.jar com.jdojo.prime.client.Main


    Exception in thread "main" java.util.ServiceConfigurationError: com.jdojo.prime.


    PrimeChecker: com.jdojo.prime.faster.FasterPrimeChecker Unable to get public no-arg


    constructor


    ...


    at com.jdojo.prime.client.Main.main(Main.java:13)


    Caused by: java.lang.NoSuchMethodException: com.jdojo.prime.faster.


    FasterPrimeChecker.<init>()


    ...


    此处显示部分输出。输出表明当 `ServiceLoader` 类尝试实例化更快的质数服务提供者时发生了运行时异常。当尝试实例化概率质数服务提供者时，也会出现同样的错误。在
    `META-INF/services` 目录中添加服务信息是实现服务的传统方式。为了向后兼容，服务实现必须是一个具有公共无参构造函数的类。回想一下，我们只为
    `GenericPrimeChecker` 类提供了提供者构造函数。因此，其他两个质数服务在传统模式下将无法工作。你可以为 `FasterPrimeChecker`
    类添加一个提供者构造函数使其正常工作。但是，无法为接口添加提供者构造函数，因此 `ProbablePrimeChecker` 在类路径模式下将无法工作。你必须从显式模块中加载它才能使其正常工作。


    ■ **提示** 部署在类路径上或作为模块路径上的自动模块的服务提供者必须具有公共无参构造函数。


    以下命令仅为通用质数服务提供者添加了模块化 JAR，该提供者提供了公共无参构造函数。输出显示该提供者已被定位、实例化并成功使用。


    C:\Java9Revealed>java --class-path lib\com.jdojo.prime.jar;lib\com.jdojo.prime.client.


    jar;lib\com.jdojo.prime.generic.jar com.jdojo.prime.client.Main


    第 5 章 ■ 实现服务


    使用 jdojo.generic.primechecker:


    3 是质数。


    4 不是质数。


    121 不是质数。


    977 是质数。


    未找到名为 ''jdojo.faster.primechecker'' 的 PrimeChecker 服务提供者。


    未找到名为 ''jdojo.probable.primechecker'' 的 PrimeChecker 服务提供者。


    总结


    应用程序（或库）提供的特定功能称为*服务*。提供服务实现的应用程序和库称为服务提供者。使用这些服务提供者提供的服务的应用程序称为*服务消费者*或*客户端*。


    在 Java 中，*服务*由一组接口和类定义。服务包含一个接口或抽象类，它定义了服务提供的功能，被称为*服务提供者接口*、*服务接口*或*服务类型*。服务接口的特定实现称为*服务提供者*。一个服务接口可以有多个服务提供者。在
    JDK 9 中，服务提供者可以是一个类或一个接口。


    JDK 包含一个 `java.util.ServiceLoader<S>` 类，其唯一目的是在运行时为指定的服务接口发现并加载类型为 S 的服务提供者。如果包含服务提供者的
    JAR（模块化或非模块化）放置在类路径上，则 `ServiceLoader` 类会使用 `META-INF/services` 目录来查找服务提供者。此目录中的文件名应与服务接口的完全限定名称相同。该文件包含服务提供者实现类的完全限定名称——每行一个类名。该文件可以使用
    `#` 字符作为单行注释的开始。`ServiceLoader` 类会扫描类路径上的所有 `META-INF/services` 目录以发现服务提供者。


    在 JDK 9 中，服务提供者发现机制已更改。使用 `ServiceLoader` 类发现和加载服务提供者的模块需要使用 `uses` 语句指定服务接口。在
    `uses` 语句中指定的服务接口可以声明在当前模块中，也可以声明在当前模块可访问的任何模块中。你可以使用 `ServiceLoader` 类的 `iterator()`
    方法来遍历所有服务提供者。`stream()` 方法提供了一个元素流，这些元素是 `ServiceLoader.Provider` 接口的实例。你可以使用该流根据提供者的类名来过滤和选择特定类型的提供者，而无需实例化所有提供者。


    包含服务提供者的模块需要使用 `provides` 语句指定服务接口及其实现类。实现类必须声明在当前模块中。


    **第 6 章**


    **打包模块**


    在本章中，你将学习：


    • 打包 Java 模块的不同格式


    • JAR 格式的增强


    • 什么是多版本 JAR


    • 如何创建和使用多版本 JAR


    • 什么是 JMOD 格式


    • 如何使用 `jmod` 工具处理 JMOD 文件


    • 如何创建、提取和描述 JMOD 文件


    • 如何列出 JMOD 文件的内容


    • 如何记录 JMOD 文件中模块的哈希值以进行依赖项验证


    模块可以打包成不同的格式，用于三个阶段——编译时、链接时和运行时。并非所有阶段都支持所有格式。JDK 9 支持以下格式来打包模块：


    • 展开目录


    • JAR 格式


    • JMOD 格式


    • JIMAGE 格式


    展开目录和 JAR 格式在 JDK 9 之前就已支持。JDK 9 增强了 JAR 格式以支持模块化 JAR 和多版本 JAR。JDK 9 引入了两种新的模块打包格式：JMOD
    格式和 JIMAGE 格式。我在本节中讨论 JAR 格式和 JMOD 格式的增强。第 [7](http://dx.doi.org/10.1007/978-1-4842-2592-9_7)
    章将详细介绍 JIMAGE 格式以及 `jlink` 工具。


    JAR 格式


    第 [3](http://dx.doi.org/10.1007/978-1-4842-2592-9_3) 章介绍了如何使用 `jar` 工具的新选项来创建模块化
    JAR。`jar` 工具也用于列出 JAR 文件中的条目，以及提取和更新 JAR 文件的内容。`jar` 工具在 JDK 9 之前就支持这些操作，并且在 JDK
    9 中这些操作没有新增内容。在本章中，我将介绍 JAR 格式新增的一个特性，称为多版本 JAR。


