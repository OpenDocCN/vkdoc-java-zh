    **CHAPTER 13**


    **Collection API Updates**


    In this chapter, you will learn:


    • How unmodifiable lists, sets, and maps were created before JDK 9 and what were
    the


    problems in using them.


    • How to create unmodifiable lists using the of() static factory method of the
    List


    interface in JDK 9.


    • How to create unmodifiable sets using the of() static factory method of the
    Set


    interface in JDK 9.


    • How to create unmodifiable maps using the of(), ofEntries(), and entry() static


    factory methods of the Map interface in JDK 9.


    The Background


    The Collection API consists of classes and interfaces that provide a way to store
    and manipulate different types of collections of objects such as lists, sets,
    and maps. It was added to Java SE 1.2\. The Java programming language does not
    support collection literals, which are a simple and easy way to declare and initialize
    collections. A collection literal would let you create a collection of a specific
    type by specifying the elements of the collection in an expression in a compact
    form. An example of a collection literal is a List literal that enables you to
    create a list of two integers, 100 and 200, as shown:


    List<Integer> list = [100, 200];


    A collection literal is compact and simple to use. It can be implemented for efficient
    use of memory because the number of elements is known at creation time. It can
    be made immutable to make it thread-safe.


    Including collection literals in the Java programming language was considered
    several times


    before JDK 9\. Java designers decided not to add collection literals to the Java
    language, at least not in JDK 9\. Adding collection literals to Java at this point
    would require too much effort for too little gain.


    They decided to achieve the same goal by updating the Collection API by adding
    static factory methods to the List, Set and Map interfaces, which can be used
    to create small, unmodifiable collections easily and efficiently.


    The existing Collection API creates mutable collections. You can create an immutable
    (or unmodifiable) collection by wrapping a mutable collection inside another object,
    which is just a wrapper for the original mutable object. To create an unmodifiable
    List of two integers in JDK 8 or earlier, you typically used the following snippet
    of code:


    © Kishori Sharan 2017


    K. Sharan, *Java 9 Revealed*, DOI 10.1007/978-1-4842-2592-9_13


    Chapter 13 ■ ColleCtion api Updates


    // Create an empty, mutable list


    List<Integer> list = new ArrayList<>();


    // Add two elements to the mutable list


    list.add(100);


    list.add(200);


    // Create an immutable list by wrapping the mutable list


    List<Integer> list2 = Collections.unmodifiableList(list);


    This approach has a serious flaw. The unmodifiable list is just a wrapper for
    the modifiable list.


    Intentionally, I kept the variable named list around. You cannot modify the list
    using the list2 variable; however, you can still use the list variable to modify
    the list and the modifications will be reflected when you read the list using
    the list2 variable. Listing [13-1](#index_split_005.html#351) contains a complete
    program to create an unmodifiable List and shows you how to change its contents
    afterward.


    ***Listing 13-1.*** Creating an Unmodifiable List Before JDK 9


    // PreJDK9UnmodifiableList.java


    package com.jdojo.collection;


    import java.util.ArrayList;


    import java.util.Collections;


    import java.util.List;


    public class PreJDK9UnmodifiableList {


    public static void main(String[] args) {


    List<Integer> list = new ArrayList<>();


    list.add(100);


    list.add(200);


    System.out.println("list = " + list);


    // Create an unmodifiable list


    List<Integer> list2 = Collections.unmodifiableList(list);


    System.out.println("list2 = " + list2);


    // Let us add an element using list


    list.add(300);


    // Print the contents of the list using both


    // variables named list and list2


    System.out.println("list = " + list);


    System.out.println("list2 = " + list2);


    }


    }


    list = [100, 200]


    list2 = [100, 200]


    list = [100, 200, 300]


    list2 = [100, 200, 300]


    Chapter 13 ■ ColleCtion api Updates


    The output shows that as long as you keep the reference of the original list,
    you can change its contents and the unmodifiable list is not really unmodifiable!
    A solution to this problem is to overwrite the original reference variable with
    a reference to the new unmodifiable list as shown:


    List<Integer> list = new ArrayList<>();


    list.add(100);


    list.add(200);


    // Create an unmodifiable list and store it in list


    **list** = Collections.unmodifiableList(list);


    Notice that this example uses multiple statements to create and populate an unmodifiable
    list. If you need to declare and initialize an unmodifiable list as an instance
    or static variable in a class, this approach does not work because it involves
    multiple statements. Such a declaration needs to be simple, compact, and contained
    in one statement. If you use the previous snippet of code for an instance variable
    in a class, your code would be similar to the following code:


    public class Test {


    private List<Integer> list = new ArrayList<>();


    {


    list.add(100);


    list.add(200);


    list = Collections.unmodifiableList(list);


    }


    // ...


    }


    There are other ways to declare and initialize an unmodifiable list such as using
    an array and converting it to a list. Three of such ways are as follows:


    public class Test {


    // Using an array and converting it to a list


    private List<Integer> list2 = Collections.unmodifiableList(


    new ArrayList<>( Arrays.asList(100, 200)));


    // Using an anonymous class


    private List<Integer> list3 = Collections.unmodifiableList(


    new ArrayList<>(){{add(100); add(200);}});


    // Using a stream


    private List<Integer> list4 = Collections.unmodifiableList(


    Stream.of(100, 200).collect(Collectors.toList()));


    // More code goes here


    }


    This example proves that you can have an unmodifiable list in one statement. However,
    the syntax is verbose. These techniques are also inefficient. For example, just
    to hold two integers in a list, these techniques create multiple objects with
    a backing array object to hold the values.


    Chapter 13 ■ ColleCtion api Updates


    JDK 9 solves these problems by providing static factory methods to the List, Set,
    and Map interfaces.


    The method is named of() and it is overloaded. In JDK 9, you can declare and initialize
    an unmodifiable list of two elements as shown:


    // Create an unmodifiable list of two integers


    List<Integer> list = List.of(100, 200);


    Unmodifiable Lists


    JDK 9 added an overloaded of() static factory method to the List interface. It
    provides a simple and compact way to create unmodifiable lists. Here are all the
    versions of the of() method:


    • static <E> List<E> of()


    • static <E> List<E> of(E e1)


    • static <E> List<E> of(E e1, E e2)


    • static <E> List<E> of(E e1, E e2, E e3)


    • static <E> List<E> of(E e1, E e2, E e3, E e4)


    • static <E> List<E> of(E e1, E e2, E e3, E e4, E e5)'
