    **引言**


    本书的由来


    Java 社区对模块系统和 Java Shell 最终在 JDK 9 中添加到 Java 平台感到兴奋，我也是如此。毕竟，我们等待了超过 10 年才看到这个模块系统付诸实践。之前的几个
    JDK 版本都出现过模块系统的原型，但后来都被放弃了。JDK 9 中模块系统的引入也是一波三折。它经历了多次提案和原型的迭代。我于 2016 年初开始撰写本书。我必须承认，这是一本难写的书。我不得不与
    JDK 的发布日期以及 Java 团队对模块系统所做的更改赛跑。


    我写了一个主题，几个月后发现 JDK 9 的最终发布日期已经改变，而我写的内容已经不再有效。今天是 2016 年 2 月的最后一天，似乎尘埃终于落定——Java
    团队和 Java 社区对模块系统感到满意——你将看到本书现在的样子。JDK 9 计划于 2017 年 7 月下旬发布。在撰写本文时，JDK 9 的功能已经完备。你不太可能看到本书中介绍的许多内容无法工作的情况。然而，就软件发布而言，五个月是一段很长的时间，所以如果你在阅读本书时发现某段代码无法工作，需要稍作调整才能运行，请不要感到惊讶。


    起初，本书计划只有 140 页。随着写作的深入，我认为写一本如此简短的书来介绍 Java 平台最大的新增功能之一，是对读者的不负责任。我感谢我的出版商，从未抱怨我为本书增加了数百页。我专门用了九章（第
    [2](http://dx.doi.org/10.1007/978-1-4842-2592-9_2) 章到第 [10](http://dx.doi.org/10.1007/978-1-4842-2592-9_10)
    章）来描述新的模块系统。第 [11](http://dx.doi.org/10.1007/978-1-4842-2592-9_11) 章以无与伦比的细节介绍了
    Java Shell (JShell)。


    我花了无数小时研究这个主题。我写的都是正在开发中的主题。我在互联网或书籍中找不到任何资料来学习这些主题。最大的挑战之一是开发阶段快速变化的 JDK 实现。我的主要研究来源是
    Java 源代码、Java 增强提案 (JEP) 和 Java 规范请求 (JSR)。我还花了不少时间阅读 Java 源代码，以了解更多关于 JDK 9 中一些新主题的内容。玩转
    Java 程序总是很有趣，有时一玩就是几个小时，然后把它们添加到书中。有时，看到代码一周前还能工作，现在却不行了，这令人沮丧。订阅所有 JDK 9 项目的邮件列表帮助我与
    JDK 保持同步。

