    ## 使用 JShell 文档


    `JShell`工具附带大量文档。由于它是一个命令行工具，在命令行上阅读文档有点困难。你可以使用`/help`或`/?`命令来显示命令列表及其简要描述。


    ```

    jshell> /help

    |  Type a Java language expression, statement, or declaration.

    |  Or type one of the following commands:

    |

    |  /list [<name or id>|-all|-start] -- list the source you have typed

    |  /edit <name or id>                -- edit a source entry referenced by name
    or id

    |  /drop <name or id>                -- delete a source entry referenced by name
    or id

    ...

    ```


    你可以使用特定命令作为`/help`命令的参数来获取有关该命令的信息。以下命令打印有关`/help`命令本身的信息：


    ```

