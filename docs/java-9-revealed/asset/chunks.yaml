    Accessing Module Resources


    A module may contain resources such as images, audio/video clips, property files,
    and policy files.


    Class files (.class files) in a module are also considered resources. The Module
    class contains a getResourceAsStream() method to retrieve a resource using the
    resource name:


    InputStream getResourceAsStream(String name) throws IOException


    Refer to Chapter [8, whic](http://dx.doi.org/10.1007/978-1-4842-2592-9_8)h covers
    how to access a module’s resources at length.


    Annotation on Modules


    You can use annotations on module declarations. The java.lang.annotation.ElementType
    enum has a new value called MODULE. If you use MODULE as a target type on an annotation
    declaration, it allows the annotation to be used on modules. In Java 9, two annotations—java.lang.Deprecated
    and java.lang.


    SuppressWarnings—have been updated to be used on module declarations. They can
    be used as follows:


    @Deprecated(since="1.2", forRemoval=true)


    @SuppressWarnings("unchecked")


    module com.jdojo.myModule {


    // Module statements go here


    }


    When a module is deprecated, the use of that module in requires, but not in exports
    or opens


    statements, causes a warning to be issued. This rule is based on the fact that
    if module M is deprecated, a requires M will be used by the module’s users who
    need to get the deprecation warning. Other statements such as exports and opens
    are within the module that is being deprecated. A deprecated module does not cause
    warnings to be issued for uses of types within the module. Similarly, if a warning
    is suppressed in a module declaration, the suppression applies to elements within
    the module declaration and not to types contained in that module.


    The Module class implements the java.lang.reflect.AnnotatedElement interface,
    so you can use a variety of annotation related methods to read them. An annotation
    type to be used on module declarations must include ElementType.MODULE as a target.


