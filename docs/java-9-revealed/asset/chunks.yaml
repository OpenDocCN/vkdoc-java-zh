    \ other parts in the version number are removed. For example, if you have a version\
    \ number of `9.2.2.1`, the new version number will be `10` when the major version\
    \ number is incremented from 9 to 10.\n\nThe `$minor` element represents the minor\
    \ version of a JDK release. It is incremented for a minor update release such\
