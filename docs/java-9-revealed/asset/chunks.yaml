    Chapter 11 ■ the Java Shell


    Creating Custom feedback Modes


    The four preconfigured feedback modes are good to work with jshell. They provide
    you different levels of granularity to customize your jshell. You can have your
    own custom feedback mode. I doubt you will ever need a custom feedback mode, but
    the feature is there, if you need it. Creating a custom feedback mode is a little
    more involved. You have to write several customization steps. Most likely, you
    will want to customize a few items in a predefined feedback mode. You can create
    a custom feedback mode from scratch or by copying one from an existing feedback
    mode and customizing it selectively. The syntax to create a custom feedback mode
    is as follows:


    /set mode <mode> [<old-mode>] [-command|-quiet|-delete]


    Here, <mode> is the name of the custom feedback mode; for example, kverbose. <old-mode>
    is the name of an existing feedback mode whose settings will be copied to the
    new mode. Using the -command option displays information about the mode when it
    is set, whereas using the -quiet option does not display any information when
    the mode is set. The -delete option is used to delete the mode.


    The following command creates a new feedback mode called kverbose by copying all
    settings from the predefined verbose feedback mode:


    /set mode kverbose verbose -command


    The following command will persist the new feedback mode named kverbose for future
    use:


    /set mode kverbose -retain


    You need to use the -delete option to delete a custom feedback mode. You cannot
    delete a predefined feedback mode. If you persisted the custom feedback mode,
    you can use the -retain option to delete it from current and all future sessions.
    The following command will delete the kverbose feedback mode:


    /set mode kverbose -delete -retain


    At this point, there is no difference between the predefined verbose mode and
    the custom kverbose mode. After you create a feedback mode, you need to customize
    three settings:


    • Prompts


    • Output truncation limits


    • Output format


    ■ **Tip** Once you are done defining a custom feedback mode, you need to use the
    /set feedback


    <new-mode> command to start using it.


    You can set two types of prompts for feedback—the main prompt and the continuation
    prompt. The main prompt is displayed when jshell is ready to read a new snippet/command.
    The continuation prompt is displayed at the beginning of a line when you are entering
    a multi-line snippet. The syntax for setting prompts is as follows:


    /set prompt <mode> "<prompt>" "<continuation-prompt>"


    Chapter 11 ■ the Java Shell


    Here, <prompt> is the main prompt and <continuation-prompt> is the continuation
    prompt.


    The following command sets the prompts for the kverbose mode:


    /set prompt kverbose "\njshell-kverbose> " "more... "'
