    The addReads() method adds a readability edge from this module to the specified
    module. This method has no effect if the specified module is itself because every
    module can read itself or if it is called on an unnamed module because an unnamed
    module can read all modules. Calling this method is the same as adding a requires
    statement to the module declaration:


    requires <other>;


    The addUses() method updates the module to add a service dependency, so it can
    use the


    ServiceLoader class to load the service of the specified service type. It has
    no effect when called on an unnamed or automatic module. Its effect is the same
    as adding the following uses statement in the module’s declaration:


    uses <serviceType>;


    Listing [10-4](#index_split_004.html#243) contains the code for an UpdateModule
    class. It is in the com.jdojo.module.api module as shown in Listin[g 10-1](#index_split_004.html#237).
    Notice that the module declaration does not contain a uses statement. The class
    contains a findFirstService() method, which accepts a service type as an argument.
    It checks if the module can load the service type. Recall that a module must contain
    a uses statement with a specified service type to load that service type using
    the ServiceLoader class. The method uses the addUses() method of the Module class
    to add a uses statement for the service type if it was absent. In the end, the
    method loads and returns the first service provider loaded.


    ***Listing 10-4.*** An UpdateModule Class Showing How to Add a uses Statement
    to a Module Declaration at Runtime


    // UpdateModule.java


    package com.jdojo.module.api;


    import java.util.ServiceLoader;


    public class UpdateModule {


    public static <T> T findFirstService(Class<T> service) {


    /* Before loading the service providers, check if this module can use (or load)
    the


    service. If not, update the module to use the service.


    */


    Module m = UpdateModule.class.getModule();


    if (!m.canUse(service)) {


    m.addUses(service);


    }


    return ServiceLoader.load(service)


    .findFirst()


    .orElseThrow(


    () -> new RuntimeException("No service provider found for the service: " +


    service.getName()));


    }


    }


