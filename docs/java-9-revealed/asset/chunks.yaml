    method <T> print(T...) is not final.


    private <T> void print(T... args) {


    ^


    where T is a type-variable:


    T extends Object declared in method <T>print(T...)


    Discarding Process Outputs


    JDK 9 added a new constant named DISCARD to the ProcessBuilder.Redirect nested
    class. Its type is ProcessBuilder.Redirect. You can use this as a destination
    for output and error streams of sub-processes when you want to discard the outputs.
    Implementation discards the outputs by writing to an operating system specific
    “null file”. Listing [20-8](#index_split_008.html#486) contains a complete program
    that shows how to discard a sub-process’


    outputs.


    ***Listing 20-8.*** Discarding a Process’ Outputs


    // DiscardProcessOutput.java


    package com.jdojo.misc;


    import java.io.IOException;


    public class DiscardProcessOutput {


    public static void main(String[] args) {


    System.out.println("Using Redirect.INHERIT:");


    startProcess(ProcessBuilder.Redirect.INHERIT);


    System.out.println("\nUsing Redirect.DISCARD:");


    startProcess(ProcessBuilder.Redirect.DISCARD);


    }


    Chapter 20 ■ Other Changes in JDK 9


    public static void startProcess(ProcessBuilder.Redirect outputDest) {


    try {


    ProcessBuilder pb = new ProcessBuilder()


    .command("java", "-version")


    .redirectOutput(outputDest)


    .redirectError(outputDest);


    Process process = pb.start();


    process.waitFor();


    } catch (IOException | InterruptedException e) {


    e.printStackTrace();


    }


    }


    }


    Using Redirect.INHERIT:


    java version "9-ea"


    Java(TM) SE Runtime Environment (build 9-ea+157)


    Java HotSpot(TM) 64-Bit Server VM (build 9-ea+157, mixed mode)


    Using Redirect.DISCARD:'
  trans: "\n在此类方法上使用 `@SafeVarargs` 注解。通过在方法声明中添加此注解，你可以向方法的使用者和编译器保证：在方法体内，你不会对不可具体化的可变参数执行任何不安全操作。你的保证足以让编译器不发出警告。然而，如果该保证在运行时被证明不成立，运行时将抛出相应类型的异常。\n\
    \n在 JDK 9 之前，你可以在以下可执行体（构造器和方法）上使用 `@SafeVarargs` 注解：\n\n• 构造器\n• 静态方法\n• final\
    \ 方法\n\n构造器、静态方法和 final 方法都是不可重写的。仅允许在不可重写的可执行体上使用 `@SafeVarargs` 注解，其背后的理念是为了防止开发者在可重写的可执行体上使用此注解，从而违反该注解对重写可执行体的约束。假设你有一个类\
    \ X，其中包含一个方法 `m1()`，该方法带有 `@SafeVarargs` 注解。\n\n再假设你有一个继承自类 X 的类 Y。类 Y 可能会重写继承来的方法\
    \ `m1()`，并可能包含不安全操作。这将在运行时带来意外，因为开发者可能会基于超类 X 编写代码，并且不会预期其方法 `m1()` 所承诺的任何不安全操作。\n\
    \n私有方法也是不可重写的，因此 JDK 9 决定也允许在私有方法上使用 `@SafeVarargs` 注解。清单 20-7 展示了一个类，其中包含一个使用了\
    \ `@SafeVarargs` 注解的私有方法。JDK 9 中允许使用 `@SafeVarargs` 注解的可执行体列表如下：\n\n• 构造器\n• 静态方法\n\
    • final 方法\n• 私有方法\n\n第 20 章 ■ JDK 9 中的其他变更\n\n***清单 20-7.*** 在 JDK 9 的私有方法上使用\
    \ `@SafeVarargs` 注解\n\n```java\n// SafeVarargsTest.java\npackage com.jdojo.misc;\n\
    \npublic class SafeVarargsTest {\n    // JDK 9 中允许\n    @SafeVarargs\n    private\
    \ <T> void print(T... args) {\n        for(T element : args) {\n            System.out.println(element);\n\
    \        }\n    }\n    // 更多代码在此处\n}\n```\n\n在 JDK 8 中编译此类会生成以下错误，指出 `@SafeVarargs`\
    \ 不能用于非 final 方法，此处即私有方法。你需要使用 `-Xlint:unchecked` 选项编译源代码才能看到这些错误。\n\n```\ncom\\\
    jdojo\\misc\\SafeVarargsTest.java:6: error: Invalid SafeVarargs annotation. Instance\n\
    method <T> print(T...) is not final.\n    private <T> void print(T... args) {\n\
    \    ^\n  where T is a type-variable:\n    T extends Object declared in method\
    \ <T>print(T...)\n```\n\n**丢弃进程输出**\n\nJDK 9 在 `ProcessBuilder.Redirect` 嵌套类中添加了一个名为\
    \ `DISCARD` 的新常量。其类型为 `ProcessBuilder.Redirect`。当你希望丢弃子进程的输出时，可以将其用作子进程输出流和错误流的目标。该实现通过写入操作系统特定的“空文件”来丢弃输出。清单\
    \ 20-8 包含一个完整程序，演示了如何丢弃子进程的输出。\n\n***清单 20-8.*** 丢弃进程的输出\n\n```java\n// DiscardProcessOutput.java\n\
    package com.jdojo.misc;\n\nimport java.io.IOException;\n\npublic class DiscardProcessOutput\
