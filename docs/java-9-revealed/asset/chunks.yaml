    which is in the jdk.incubator.


    httpclient module.


    Chapter 14 ■ the http/2 Client api


    Three abstract classes, HttpClient, HttpRequest, and HttpResponse, and the WebSocket
    interface are central to the HTTP/2 Client API. Instances of these types are created
    using builders. The HttpClient class is immutable. An instance of the HttpClient
    class stores HTTP connection configurations that can be reused for multiple HTTP
    requests. An instance of the HttpRequest class represents an HTTP request. An
    instance of the HttpResponse class represents an HTTP response received from a
    server. You can send and receive HTTP requests and responses synchronously or
    asynchronously.


    An instance of the WebSocket interface represents a WebSocket client endpoint.
    Communication


    with the WebSocket server endpoint is accomplished asynchronously. The WebSocket
    API is event-based.


    You need to specify a listener, which is an instance of the WebSocket.Listener
    interface, for a WebSocket client endpoint. The listener is notified—by invoking
    its appropriate methods—when an event occurs on the endpoint, for example, the
    listener is notified when the opening handshake with a peer is completed successfully
    by calling the onOpen() method of the listener. The API supports exchanging text
    as well as binary messages with peers. Messages can be exchanged in parts.


    **CHAPTER 15**


    **Enhanced Deprecation**


    In this chapter, you will learn:


    • How to deprecate your APIs


    • The roles of the @deprecate Javadoc tag and the @Deprecation annotation in


    deprecating APIs


    • The detailed rules that are used to generated deprecation warnings


    • Updates to the @Deprecation annotation in JDK 9


    • New deprecation warnings in JDK 9


    • How to use the @SuppressWarnings annotation to suppress different types of


    deprecation warnings in JDK 9


    • How to use the static analysis tool named jdeprscan to scan your compiled


    codebase to find the uses of deprecated JDK APIs


    What Is Deprecation?


    Deprecation in Java is a way to provide information about the lifecycle of the
    API. You can deprecate modules, packages, types, constructors, methods, fields,
    parameters, and local variables. When you deprecate an API, you are telling its
    users:


    • Not to use the API because it is dangerous.


    • To migrate away from the API because a better replacement for the API exists.


    • To migrate away from the API because the API will be removed in a future release.


    How to Deprecate an API


    The JDK has two constructs that are used to deprecate APIs:


    • The @deprecated Javadoc tag


    • The @Deprecated annotation


    © Kishori Sharan 2017


    K. Sharan, *Java 9 Revealed*, DOI 10.1007/978-1-4842-2592-9_15


    Chapter 15 ■ enhanCed depreCation


    The @deprecated Javadoc tag was added in JDK 1.1 and it lets you specify the details
    about the deprecation with a rich set of text formatting features of HTML. The
    java.lang.Deprecated annotation type was added to JDK 5.0 and it can be used on
    the API element, which is being deprecated. Before JDK 9, the annotation did not
    contain any elements. It is retained at runtime.


    The @deprecated tag and the @Deprecated annotation are supposed to be used together.
    Both should be present or both absent. The @Deprecation annotation does not let
    you specify a description of the deprecation, so you must use the @deprecated
    tag to provide the description.'
