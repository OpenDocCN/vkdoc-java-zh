    **CHAPTER 9**


    **Breaking Module Encapsulation**


    In this chapter, you will learn:


    • What breaking a module’s encapsulation is


    • How to add dependency (add requires) to a module using the command-line


    option


    • How to export non-exported packages of a module using the --add-exports


    command-line option and using the MANIFEST.MF file of an executable JAR


    • How to open non-open packages of a module using the --add-opens command-line


    option and using the MANIFEST.MF file of an executable JAR


    • How to increase readability of a module using the --add-reads command-line


    option


    What Is Breaking Module Encapsulation?


    One of the main goals of JDK 9 is to encapsulate types and resources in modules
    and export only those packages whose public types are intended to be accessed
    by other modules. Sometimes, you may need to break the encapsulation specified
    by a module to enable white-box testing or use unsupported JDK-internal APIs or
    libraries. This is possible by using non-standard command-line options at compile-time
    and runtime. Another reason for having these options is backward compatibility.
    Not all existing applications will be fully migrated to JDK 9 and will be modularized.
    If those applications need to use the JDK APIs or APIs provided by libraries that
    used to be public, but have been encapsulated in JDK 9, those applications have
    a way to keep working. A few of these options have corresponding attributes that
    can be added to the MANIFEST.MF file of the executable JARs to avoid using the
    command-line options.


    ■ **Tip** Every command-line option to break a module’s encapsulation is also
    supported programmatically using the Module API, which is covered in detail in
    Chapter [10](http://dx.doi.org/10.1007/978-1-4842-2592-9_10).


    Although it may sound like that these options do the same things as before JDK
    9, there is a word of caution when accessing JDK internal APIs without any restriction.
    If a package in a module is not exported or open, it means the module’s designer
    did not intend for these packages to be used outside the module.


    Such packages may be modified or even removed from the module without any notice.
    If you still use these packages by exporting or opening them using command-line
    options, you do so at the risk of breaking your application!


    © Kishori Sharan 2017


    K. Sharan, *Java 9 Revealed*, DOI 10.1007/978-1-4842-2592-9_9


