    Module Name: \" + moduleName);\n        System.out.println(\"Layer Name: \" +\
    \ layer);\n    }\n}\n```\n\n`LayerInfo`类非常简单。它将版本信息存储在一个名为`VERSION`的静态变量中。它在静态初始化器中打印一条包含版本信息的消息。此消息将帮助你了解正在加载的是哪个版本的`LayerInfo`类。`printInfo()`方法打印类的详细信息：版本、类名、类加载器、模块名称和层。\n\
