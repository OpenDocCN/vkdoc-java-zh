    # 栈遍历


    ## JDK 9 中的栈遍历


    JDK 9 引入了一个新的栈遍历 API，它由`java.lang`包中一个名为`StackWalker`的单一类组成。该类提供了简单高效的栈遍历功能。它为当前线程提供一个栈帧的顺序流。栈帧按顺序报告，从生成栈的最顶层帧到最底层帧。`StackWalker`类非常高效，因为它惰性地评估栈帧。它还包含一个便捷方法来获取调用者类的引用。`StackWalker`类包含以下成员：


    - `StackWalker.Option`嵌套枚举

    - `StackWalker.StackFrame`嵌套接口

    - 获取`StackWalker`类实例的方法

    - 处理栈帧的方法

    - 获取调用者类的方法


    我将在后续章节中详细解释`StackWalker`类的每个组件及其用途。


    ## 指定栈遍历选项


    你可以通过指定零个或多个选项来配置`StackWalker`。选项是`StackWalker.Option`枚举的常量之一。常量如下：


    - `RETAIN_CLASS_REFERENCE`

    - `SHOW_HIDDEN_FRAMES`

    - `SHOW_REFLECT_FRAMES`


    如果指定了`RETAIN_CLASS_REFERENCE`选项，则`StackWalker`返回的帧将包含声明该帧所表示方法的类的`Class`对象的引用。如果你还想获取方法调用者的`Class`对象引用，也需要指定此选项。默认情况下，此选项不存在。


    默认情况下，实现特定帧和反射帧不包含在`StackWalker`类返回的帧流中。使用`SHOW_HIDDEN_FRAMES`选项来包含所有隐藏帧。


    如果指定了`SHOW_REFLECT_FRAMES`选项，则`StackWalker`类返回的帧流将包含反射帧。使用此选项可能仍会隐藏实现特定帧，你可以使用`SHOW_HIDDEN_FRAMES`选项来显示它们。


    我将在后续章节中解释如何创建`StackWalker`类的实例时，向你展示如何使用这些选项及其效果。


    ## 表示栈帧


    在 JDK 9 之前，使用`StackTraceElement`类的实例来表示栈帧。JDK 9 中的`StackWalker` API 使用`StackWalker.StackFrame`接口的实例来表示栈帧。


    > **提示：** 没有可供你直接使用的`StackWalker.StackFrame`接口的具体实现类。当你检索栈帧时，JDK 中的栈遍历 API 会为你提供该接口的实例。


    `StackWalker.StackFrame`接口包含以下方法，其中大部分与`StackTraceElement`类中的方法相同：


    - `int getByteCodeIndex()`

    - `String getClassName()`

    - `Class<?> getDeclaringClass()`

    - `String getFileName()`

    - `int getLineNumber()`

    - `String getMethodName()`

    - `boolean isNativeMethod()`

    - `StackTraceElement toStackTraceElement()`


    在类文件中，每个方法都使用名为`method_info`的结构来描述。`method_info`结构包含一个属性表，该表持有一个可变长度的属性，名为`Code`。`Code`属性包含一个名为`code`的数组，该数组保存了方法的字节码指令。`getByteCodeIndex()`方法返回此帧所表示的执行点所在方法的`Code`属性中`code`数组的索引。对于本地方法，它返回`-1`。有关`code`数组和`Code`属性的更多信息，请参阅
    Java 虚拟机规范的第 4.7.3 节，网址为：


