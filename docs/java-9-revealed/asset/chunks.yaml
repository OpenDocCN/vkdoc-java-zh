    修正儒略日格式化器


    你可以在日期时间格式化模式中使用小写字母 `g`，它会将日期部分格式化为一个整数形式的修正儒略日。你可以重复使用多个 `g`，例如 `ggg`，如果结果中的数字位数少于指定的
    `g` 的数量，则会在结果左侧补零。网页 [`www.unicode.org/reports/tr35/tr35-41/tr35-dates.html#Date_Format_Patterns`](http://www.unicode.org/reports/tr35/tr35-41/tr35-dates.html#Date_Format_Patterns)
    定义了格式化器中字母 `g` 的含义如下：


    *修正儒略日。这与传统的儒略日编号有两个不同之处。首先，它以当地时区午夜而非格林尼治正午为分界点。其次，它是一个本地数字；也就是说，它依赖于本地时区。可以将其视为一个包含所有日期相关字段的单一数字。*


    ■ **提示** 大写字母 `G` 在 JDK 8 中被定义为日期和时间格式化器符号，它将输入格式化为 AD、Anno Domini、A、BC、Before
    Christ 和 B。


