    ## Chapter 2: The Module System


    In this chapter, you will learn:


    - How the Java source code used to be written, packaged, and deployed prior to
    JDK 9 and the underlying issues with that approach

    - What a module is in JDK 9

    - How to declare modules and their dependencies

    - How to package modules

    - What a module path is

    - What observable modules are

    - How to print the list of observable modules

    - How to print the description of a module


    This chapter is meant to give you a brief conceptual overview of the module system
    introduced in JDK 9. Subsequent chapters cover all these concepts in detail, with
    examples. Don’t worry if you do not understand all module-related concepts the
    first time. Once you gain experience developing modular code, you can come back
    and re-read this chapter.


    ### Life Before Java 9


    Prior to JDK 9, developing a Java application involved the following steps:


    - The Java source code was written in the form of Java types such as classes,
    interfaces, enums, and annotations.

    - Types were arranged into packages. A type always belonged to a package—explicitly
    or implicitly. A package was a logical collection of types, essentially providing
    a namespace for the types contained in it. A package may have public types, private
    types, and some types that are internal implementations even though declared public.

    - The compiled code for types was packaged into one or more JAR files, also known
    as'
