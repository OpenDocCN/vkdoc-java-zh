    \ 3-24）。C 点击“确定”关闭对话框。\n\n![](img/index-76_1.jpg)\n\n第 3 章 ■ 创建你的第一个模块\n\n***图\
    \ 3-24.** 配置 NetBeans 项目以运行*\n\n项目配置完成后，你可以选择“运行”➤“运行项目”或按 F6 键来运行项目。运行项目将执行你在项目运行配置中指定的主类。\n\
    \n总结\n\n使用模块开发 Java 应用程序并不会改变 Java 类型在包中的组织方式。模块的源代码在包层次结构的根目录下包含一个 `module-info.java`\
    \ 文件。也就是说，`module-info.java` 文件位于未命名包中。它包含模块声明。\n\nJDK 9 增强了 `javac` 编译器、`jar`\
    \ 工具和 `java` 启动器，使其能够与模块协同工作。`javac` 编译器接受新的选项，例如用于定位应用程序模块的 `--module-path`、用于定位模块源代码的\
    \ `--module-source-path`，以及用于指定正在编译模块版本的 `--module-version`。`jar` 工具允许你分别使用 `--main-class`\
    \ 和 `--module-version` 选项为模块化 JAR 指定主类和模块版本。`java` 启动器可以在类路径模式、模块模式或混合模式下运行。要运行模块中的类，你需要使用\
    \ `--module-path` 选项指定模块路径。你需要使用 `--module` 选项指定主类名称。主类以 `<module>/<main-class>`\
    \ 的形式指定，其中 `<module>` 是包含主类的模块，`<main-class>` 是包含作为应用程序入口点的 `main()` 方法的类的完全限定名。\n\
    \n在 JDK 9 中，每个类型都属于一个模块。如果某个类型是从类路径加载的，则它属于加载它的类加载器的未命名模块。在 JDK 9 中，每个类加载器维护一个未命名模块，其成员是该类加载器从类路径加载的所有类型。从模块路径加载的类型属于定义它的模块。\n\
    \n第 3 章 ■ 创建你的第一个模块\n\n`Module` 类的实例在运行时表示一个模块。`Module` 类位于 `java.lang` 包中。使用\
    \ `Module` 类可以在运行时了解关于模块的一切信息。JDK 9 增强了 `Class` 类。它的 `getModule()` 方法返回一个 `Module`\
    \ 实例，表示该类所属的模块。`Module` 类包含一个 `getName()` 方法，该方法以 `String` 形式返回模块名称；对于未命名模块，该方法返回\
    \ `null`。\n\nNetBeans IDE 正在更新以支持 JDK 9 和开发模块化 Java 应用程序。在撰写本文时，NetBeans 允许你创建模块、编译它们、将它们打包到模块化\
    \ JAR 中，并在 IDE 中运行它们。你需要为每个模块创建一个单独的 Java 项目。其最终版本将允许你在一个 Java 项目中拥有多个模块。IDE 支持添加\
    \ `module-info.java` 文件。IDE 有一个非常酷的功能，允许你查看和保存模块图！\n\n**第 4 章**\n\n**模块依赖**\n\n\
    在本章中，你将学习：\n\n• 如何声明模块依赖\n\n• 模块的隐式可读性意味着什么以及如何声明它\n\n• 非限定导出与限定导出的区别\n\n• 声明模块的运行时可选依赖\n\
    \n• 如何打开整个模块或其选定的包以进行深度反射\n\n• JDK 9 中的可访问性类型\n\n• 跨模块拆分包\n\n• 模块声明的限制\n\n• 不同类型的模块：命名模块、未命名模块、显式模块、自动模块、普通模块和开放模块\n\
    \n• 如何使用 `javap` 工具拆解模块的定义\n\n本章中的示例代码需要经过几个步骤。本书的源代码包含了最终步骤中使用的代码。如果你想在阅读本章时每一步都看到这些示例的实际效果，你需要稍微修改源代码，使其与你正在进行的步骤保持同步。\n\
    \n声明模块依赖\n\n如果一个模块需要使用另一个模块中包含的公共类型，则第二个模块需要导出包含这些类型的包，并且第一个模块需要读取第二个模块。请注意，两个模块中的依赖声明是不对称的——类型提供模块导出包含类型的*包*，而类型使用模块读取*模块*。\n\
    \n假设你有两个模块，分别名为 `com.jdojo.address` 和 `com.jdojo.person`。`com.jdojo.address` 模块包含一个名为\
    \ `com.jdojo.address` 的包，该包包含一个名为 `Address` 的类。`com.jdojo.person` 模块想要使用 `com.jdojo.address`\
    \ 模块中的 `Address` 类。图 4-1 显示了`com.jdojo.person` 模块的模块图。让我们逐步完成开发这些模块的步骤。\n\n© Kishori\
    \ Sharan 2017\nK. Sharan, *Java 9 揭秘*, DOI 10.1007/978-1-4842-2592-9_4\n\n![](img/index-79_1.jpg)\n\
    \n第 4 章 ■ 模块依赖\n\n***图 4-1.** com.jdojo.person 模块的模块图*\n\n在 NetBeans 中，你可以创建两个名为\
    \ `com.jdojo.address` 和 `com.jdojo.person` 的 Java 项目。每个项目将包含一个与项目同名的模块的代码。清单 4-1\
    \ 和清单 4-2 包含模块声明和 `Address` 类的代码。`Address` 类是一个简单的类，包含四个字段及其 getter 和 setter 方法。我为这些字段设置了默认值，这样你就不必在所有示例中都输入它们。\n\
    \n***清单 4-1.*** com.jdojo.address 模块的模块声明\n\n// module-info.java\n\nmodule com.jdojo.address\
    \ {\n\n    // 导出 com.jdojo.address 包\n\n    exports com.jdojo.address;\n\n}\n\n\
    ***清单 4-2.*** Address 类\n\n// Address.java\n\npackage com.jdojo.address;\n\npublic\
    \ class Address {\n\n    private String line1 = \"1111 Main Blvd.\";\n\n    private\
    \ String city = \"Jacksonville\";\n\n    private String state = \"FL\";\n\n  \
    \  private String zip = \"32256\";\n\n    public Address() {\n\n    }\n\n    public\
    \ Address(String line1, String line2, String city,\n\n                   String\
    \ state, String zip) {\n\n        this.line1 = line1;\n\n        this.city = city;\n\
    \n        this.state = state;\n\n        this.zip = zip;\n\n    }\n\n第 4 章 ■ 模块依赖\n\
    \n    public String getLine1() {\n\n        return line1;\n\n    }\n\n    public\
    \ void setLine1(String line1) {\n\n        this.line1 = line1;\n\n    }\n\n  \
    \  public String getCity() {\n\n        return city;\n\n    }\n\n    public void\
    \ setCity(String city) {\n\n        this.city = city;\n\n    }\n\n    public String\
    \ getState() {\n\n        return state;\n\n    }\n\n    public void setState(String\
    \ state) {\n\n        this.state = state;\n\n    }\n\n    public String getZip()\
    \ {\n\n        return zip;\n\n    }\n\n    public void setZip(String zip) {\n\n\
    \        this.zip = zip;\n\n    }\n\n    @Override\n\n    public String toString()\
    \ {\n\n        return \"[Line1:\" + line1 + \", State:\" + state +\n\n       \
    \        \", City:\" + city + \", ZIP:\" + zip + \"]\";\n\n    }\n\n}\n\n`exports`\
    \ 语句用于将包导出到所有其他模块或某些*命名模块*。导出包中的所有公共类型在编译时和运行时都是可访问的。在运行时，你可以使用反射仅访问公共类型的公共成员。即使在这些成员上使用\
    \ `setAccessible(true)` 方法，公共类型的非公共成员也无法通过反射访问。`exports` 语句的一般语法如下：\n\nexports\
    \ <package>;\n\n该语句将 `<package>` 中的所有公共类型导出到所有其他模块。也就是说，任何读取此模块的模块都将能够使用 `<package>`\
    \ 中的所有公共类型。\n\n`com.jdojo.address` 模块导出了 `com.jdojo.address` 包，因此 `Address` 类（它是公共的且位于\
    \ `com.jdojo.address` 包中）可以被其他模块使用。在本示例中，你将在 `com.jdojo.person` 模块中使用 `Address`\
    \ 类。\n\n第 4 章 ■ 模块依赖\n"
