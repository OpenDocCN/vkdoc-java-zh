    method. You can make this expression simpler in JDK 9 using the ofNullable() method:


    // In JDK 9


    Set<String> nonNullvalues = map.entrySet()


    .stream()


    .flatMap(e -> Stream.ofNullable(e.getValue()))


    .collect(toSet());


