    **访问资源**


    资源是你的应用程序使用的数据，例如图像、音频、视频、文本文件等。Java 提供了一种与位置无关的方式来访问资源，即通过在类路径上定位资源。你需要像将类文件打包到
    JAR 中一样打包资源，并将 JAR 添加到类路径中。通常，类文件和资源被打包在同一个 JAR 中。访问资源是每个 Java 开发人员都会执行的重要任务。在接下来的章节中，我将解释
    JDK 9 之前版本和 JDK 9 中可用的 API。


    **JDK 9 之前的资源访问**


    在本节中，我将解释在 JDK 9 之前版本中如何访问资源。如果你已经知道如何在 JDK 9 之前版本中访问资源，可以跳到下一节，该节描述了如何在 JDK 9
    中访问资源。


    在 Java 代码中，资源由资源名称标识，资源名称是由斜杠（`/`）分隔的字符串序列。对于存储在 JAR 中的资源，资源名称就是存储在 JAR 中的文件的路径。例如，在
    JDK 9 之前，存储在 `rt.jar` 中 `java.lang` 包下的 `Object.class` 文件就是一个资源，其资源名称为 `java/lang/Object.class`。


    在 JDK 9 之前，你可以使用以下两个类中的方法来访问资源：


    • `java.lang.Class`


    • `java.lang.ClassLoader`


    资源由 `ClassLoader` 定位。`Class` 类中的资源查找方法会委托给它的 `ClassLoader`。因此，一旦你理解了 `ClassLoader`
    使用的资源加载过程，使用 `Class` 类的方法就不会有问题。这两个类中都有两个名称不同的实例方法：


    • `URL getResource(String name)`


    • `InputStream getResourceAsStream(String name)`


    这两个方法以相同的方式查找资源。它们的区别仅在于返回类型。第一个方法返回一个 `URL`，而第二个方法返回一个 `InputStream`。第二个方法等效于调用第一个方法，然后对返回的
    `URL` 对象调用 `openStream()`。


    第 8 章 ■ JDK 9 的重大变更


    ■ **提示** 如果未找到指定的资源，所有资源查找方法都会返回 `null`。


    `ClassLoader` 类包含三个额外的静态方法来查找资源：


    • `static URL getSystemResource(String name)`


    • `static InputStream getSystemResourceAsStream(String name)`


    • `static Enumeration<URL> getSystemResources(String name)`


    这些方法使用系统类加载器（也称为应用程序类加载器）来查找资源。第一个方法返回找到的第一个资源的 URL。第二个方法返回找到的第一个资源的 `InputStream`。第三个方法返回一个
    `Enumeration`，其中包含所有具有指定资源名称的资源的 URL。


    要查找资源，你可以从两种类型的方法中进行选择——`getSystemResource*` 和 `getResource*`。在讨论哪种方法最好之前，理解有两种类型的资源非常重要：


    • 系统资源


    • 非系统资源


    你必须理解它们之间的区别，才能理解资源查找机制。

