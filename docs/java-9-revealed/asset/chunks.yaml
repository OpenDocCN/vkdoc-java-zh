    \ 6\n$2 ==> 54.0\n```\n\n第 11 章 ■ Java Shell\n\n```\njshell> ((Object)$1).getClass()\n\
    $3 ==> class java.lang.Integer\n\njshell> ((Object)$2).getClass()\n$4 ==> class\
    \ java.lang.Double\n\njshell>\n```\n\n有一种更简单的方法来确定 jshell 创建的变量的数据类型——你只需告诉 jshell\
    \ 给你详细的反馈，它就会打印它创建的变量的数据类型以及更多信息！以下命令将反馈模式设置为 verbose（详细）并评估相同的表达式：\n\n```\njshell>\
    \ /set feedback verbose\n|  Feedback mode: verbose\n\njshell> 2 + 2\n$1 ==> 4\n\
    |  created scratch variable $1 : int\n\njshell> 9.0 * 6\n$2 ==> 54.0\n|  created\
    \ scratch variable $2 : double\n\njshell>\n```\n"
- fmt: "Notice that `jshell` printed the data types of the variables named `$1` and\
    \ `$2` as `int` and `double`, respectively. It will be helpful for beginners to\
    \ execute the following command using a `-retain` option, so the verbose feedback\
    \ mode *persists* across the `jshell` sessions:\n\n```\njshell> /set feedback\
    \ -retain verbose\n```\n\nYou can also use the `/vars` command to list all variables\
    \ defined in `jshell`:\n\n```\njshell> /vars\n|    int $1 = 4\n|    double $2\
    \ = 54.0\njshell>\n```\n\nIf you want to use the normal feedback mode again, use\
    \ the following command:\n\n```\njshell> /set feedback -retain normal\n|    Feedback\
    \ mode: normal\nJshell>\n```\n\n## Chapter 11 ■ the Java Shell\n\nYou are not\
    \ limited to evaluating simple expressions such as `2 + 2`. You can evaluate any\
    \ Java expression. The following example evaluates string concatenation expressions\
    \ and uses methods of the `String` class. It also shows you how to use `for` loops:\n\
    \n```\njshell> \"Hello \" + \"world! \" + 2016\n$1 ==> \"Hello world! 2016\"\n\
    \njshell> $1.length()\n$2 ==> 17\n\njshell> $1.toUpperCase()\n$3 ==> \"HELLO WORLD!\
    \ 2016\"\n\njshell> $1.split(\" \")\n$4 ==> String[3] { \"Hello\", \"world!\"\
    , \"2016\" }\n\njshell> for(String s : $4) {\n   ...>     System.out.println(s);\n\
    \   ...> }\nHello\nworld!\njshell>\n```\n\n## Listing Snippets\n\nWhatever you\
    \ enter in `jshell` ends up being part of a snippet. Every snippet is assigned\
    \ a unique snippet ID, which you can use to refer to the snippet later, for example,\
    \ to drop the snippet. The `/list` command lists all snippets. It has the following\
    \ forms:\n\n- `/list`\n- `/list -all`\n- `/list -start`\n- `/list <snippet-name>`\n\
    - `/list <snippet-id>`\n\nThe `/list` command without an argument/option prints\
    \ all user-entered, active snippets, which may also have been opened from a file\
    \ using the `/open` command.\n\nUse the `-all` option to list all snippets—active,\
    \ inactive, erroneous, and startup.\n\nUse the `-start` option to list only the\
    \ startup snippets. The startup snippets are cached and the `-start` option prints\
    \ the cached snippets. It prints startup snippets even if you have dropped them\
    \ in the current session.\n\nSome of the snippet types have a name (e.g., variable/method\
    \ declarations) and all snippets have an ID.\n\nUsing the name or ID of a snippet\
    \ with the `/list` command prints the snippet identified by that name or ID.\n\
    \n## Chapter 11 ■ the Java Shell\n\nThe `/list` command prints a list of snippets\
    \ in the following format:\n\n```\n<snippet-id> : <snippet-source-code>\n<snippet-id>\
    \ : <snippet-source-code>\n<snippet-id> : <snippet-source-code>\n...\n```\n\n\
    The JShell tool generates unique snippet IDs. They are `s1`, `s2`, `s3`... for\
    \ startup snippets, `1`, `2`, `3`..., and so on for valid snippets, and `e1`,\
    \ `e2`, `e3`... for erroneous snippets. The following `jshell` session shows you\
    \ how to list snippets using the `/list` command. The examples use the `/drop`\
    \ command to drop snippets using a snippet name as well as a snippet ID.\n\n```\n\
    C:\\Java9Revealed>jshell\n|  Welcome to JShell -- Version 9-ea\n|  For an introduction\
    \ type: /help intro\n\njshell> /list\n\njshell> 2 + 2\n$1 ==> 4\n\njshell> /list\n\
    \   1 : 2 + 2\n\njshell> int x = 100\nx ==> 100\n\njshell> /list\n   1 : 2 + 2\n\
    \   2 : int x = 100;\n\njshell> /list -all\n   s1 : import java.io.*;\n   s2 :\
