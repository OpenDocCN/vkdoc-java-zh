    Using private field reference, Line1: 1111 Main Blvd.


    Notice that the warnings because of the --permit-illegal-access option and messages
    from the


    TestNonOpen class are mingled in the output.


    Using Manifest Attributes of a JAR


    An executable JAR is a JAR file that can be used to directly run a Java application
    using the -jar option like so: java -jar myapp.jar


    Here, myapp.jar is called an executable JAR. An executable JAR in its MANIFEST.MF
    file contains an attribute named Main-Class whose value is the fully qualified
    name of the main class that the java command is supposed to run. Recall that there
    are other kinds of JARs such as modular JARs and multi-release JARs. It does not
    matter which kind of JAR a JAR is based on; an executable JAR is defined only
    in the context of the way it is used to launch an application using the -jar option.


    Consider an existing application that is shipped as an executable JAR. Suppose
    the application uses deep reflection to access JDK internal APIs. It worked fine
    in JDK 8\. You want to run the executable JAR on JDK 9.


    JDK internal APIs in JDK 9 have been encapsulated, Now, you must use the --add-exports
    and --add-opens command-line options along with the -jar option to run the same
    executable JAR. Using new command-line options in JDK 9 provides a solution. However,
    it is little inconvenient for the end users of the executable JAR. To use JDK
    9, they need to know the new command-line options that they need to use. To ease
    such migrations, two new attributes for the MANIFEST.MF file of executable JARs
    have been added to JDK 9:


    • Add-Exports


    • Add-Opens


    These attributes are added to the main section of the manifest file. They are
    counterparts of the two command-line options: --add-exports and --add-opens. There
    is one difference in using these attributes.


    They export and open packages of modules to all unnamed modules. So, you specify
    a list of source modules and their packages without specifying target modules
    as values for these attributes. In other words, in a manifest file, you can export
    or open a package to all unnamed modules or none, but not to selected modules.
    Values of these attributes are space-separated lists of slash-separated module-name/package-name
    pairs. Here is an example:


    Add-Exports: m1/p1 m2/p2 m3/p3 m1/p1


    This entry will export the package p1 in module m1, package p2 in module m2, and
    package p3 in module m2 to all unnamed modules. Rules for parsing manifest files
    are lenient and allow for duplicates because historically it was allowed. Notice
    a duplicate entry m1/p1 in the value. At runtime, these packages will be exported
    to all unnamed modules.


    ChAPtEr 9 ■ BrEAkIng ModulE EnCAPsulAtIon


    Let’s walk through an example. I keep the example simple so you can focus on the
    use of these new attributes. The java.lang.Long class contains a private static
    field named serialVersionUID, which is declared as follows:


    private static final long serialVersionUID = 4290774380558885855L;


    Listing [9-4](#index_split_003.html#227) contains the code for a TestManifestAttributes
    class that uses deep reflection to access the Long.serialVersionUID field. The
    class is in the com.jdojo.intruder module. An existing application does not use
    modules and they will be developed using JDK version 8 or lower. However, for
    this example, it does not make any difference.


    ***Listing 9-4.*** A Class Named TestManifestAttributes


    // TestManifestAttributes.java


    package com.jdojo.intruder;


    import java.lang.reflect.Field;


    public class TestManifestAttributes {


    public static void main(String[] args) throws NoSuchFieldException,


    IllegalArgumentException, IllegalAccessException {


    Class<Long> cls = Long.class;


    Field svUid = cls.getDeclaredField("serialVersionUID");


    svUid.setAccessible(true);


    long svUidValue = (long)svUid.get(null);


    System.out.println("Long.serialVersionUID=" + svUidValue);


    }


    }'
