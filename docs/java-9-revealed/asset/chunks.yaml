    在图中，从 X 指向 Y 的箭头表示 X 是 Y 的父级，其中 X 和 Y 可以是类加载器或层。层是堆叠的——空层和启动层是最底部的两层。在后续讨论中，我将忽略空层，并将启动层视为层堆栈中的最底层。启动层是两个自定义层（名为层
    1 和层 2）的父层。


    堆栈中给定层中的模块可以读取其下方层中的模块。也就是说，层 1 和层 2 都可以读取启动层中的模块。然而，层 1 不能读取层 2 中的模块，因为它们是兄弟层。启动层也不能读取层
    1 和层 2 中的模块，因为启动层是它们的父层。如图 10-1 所示，两个用户定义层中的类加载器都以应用程序类加载器作为其父加载器，这通常是常见情况。将应用程序类加载器设置为自定义类加载器的父加载器，可确保后者能够读取启动层中所有模块的所有类型。当一个层中的模块读取其下方层中的模块时，模块的可读性属性会得到尊重。


    允许将模块组织成层适用于两种用例——覆盖机制和扩展机制——这两种机制在高级 Java 应用程序（如充当托管应用程序容器的 Java EE 应用/Web 服务器）中经常遇到。在覆盖机制中，托管应用程序需要覆盖容器提供的功能，例如使用同一模块的不同版本。


    在扩展机制中，托管应用程序需要补充容器已提供的功能，例如提供额外的服务提供者。在图 10-1 中，com.jdojo.test 模块同时存在于启动层和层 1
    中。这是模块覆盖的情况。层 1 将使用层 1 中的模块版本，而层 2 将使用启动层中该模块的版本。


    通常，容器需要允许托管应用程序提供它们自己的一组模块，这些模块可能会覆盖容器中嵌入的模块。这可以通过将托管应用程序的模块加载到容器层之上的一个层中来实现。加载到应用程序特定层中的模块将覆盖服务器级层中的模块。这样，你可以在同一个
    JVM 中使用同一模块的多个版本。


    第 10 章 ■ 模块 API


    托管应用程序可能希望使用与容器提供的不同的服务提供者。这可以通过将应用程序特定的服务提供者模块添加到容器层之上的一个层中来实现。你可以使用 `ServiceLoader`
