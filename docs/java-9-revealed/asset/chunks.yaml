    \n`x-xss-protection=[1; mode=block]`\n\n## Processing the Response Body\n\nProcessing\
    \ the body of an HTTP response is a two-step process:\n\n- You need to specify\
    \ a response body handler, which is an instance of the `HttpResponse.BodyHandler<T>`\
    \ interface, when you send a request using the `send()` or `sendAsync()` method\
    \ of the `HttpClient` class.\n- When the response status code and headers are\
    \ received, the `apply()` method of the response body handler is called. The response\
    \ status code and headers are passed to the `apply()` method. The `apply()` method\
    \ returns an instance of the `HttpResponse.BodyProcessor<T>` interface, which\
    \ reads the response body and converts the read data into the type `T`.\n\nDon’t\
    \ worry about these details of processing a response body. Several implementations\
    \ of the `HttpResponse.BodyHandler<T>` are provided. You can use one of the following\
    \ static factory methods of the `HttpResponse.BodyHandler` interface to gets its\
    \ instance for a different type parameter `T`:\n\n- `HttpResponse.BodyHandler<byte[]>\
    \ asByteArray()`\n- `HttpResponse.BodyHandler<Void> asByteArrayConsumer(Consumer<Optional<byte[]>>\
    \ consumer)`\n- `HttpResponse.BodyHandler<Path> asFile(Path file)`\n- `HttpResponse.BodyHandler<Path>\
    \ asFile(Path file, OpenOption... openOptions)`\n- `HttpResponse.BodyHandler<Path>\
    \ asFileDownload(Path directory, OpenOption... openOptions)`\n- `HttpResponse.BodyHandler<String>\
    \ asString()`\n- `HttpResponse.BodyHandler<String> asString(Charset charset)`\n\
    - `<U> HttpResponse.BodyHandler<U> discard(U value)`\n\nThese methods’ signatures\
    \ are intuitive enough to tell you what type of response body they handle. For\
    \ example, if you want to get the response body as a `String`, use the `asString()`\
    \ method to get a body handler.\n\nThe `discard(U value)` method returns a body\
    \ handler, which will discard the response body and return the specified value\
    \ as the body.\n\nThe `body()` method of the `HttpResponse<T>` class returns the\
    \ response body, which is of type `T`.\n\nThe following snippet of code sends\
    \ a GET request to the `http://google.com` URL and retrieves the response body\
    \ as a `String`. I ignored the exception handling logic.\n\n```java\nimport java.net.URI;\n\
    import jdk.incubator.http.HttpClient;\nimport jdk.incubator.http.HttpRequest;\n\
    import jdk.incubator.http.HttpResponse;\nimport static jdk.incubator.http.HttpResponse.BodyHandler.asString;\n\
    \n...\n\n// Build the request\nHttpRequest request = HttpRequest.newBuilder()\n\
    \        .uri(new URI(\"http://google.com\"))\n        .GET()\n        .build();\n\
    \n// Send the request and get a Response\nHttpResponse<String> response = HttpClient.newHttpClient()\n\
    \        .send(request, asString());\n\n// Get the response body and print it\n\
    String body = response.body();\nSystem.out.println(body);\n```\n\n`<HTML><HEAD><meta\
    \ http-equiv=\"content-type\"`\n\n`WARNING: Using incubator modules: jdk.incubator.httpclient`\n\
    \n`<HTML><HEAD><meta http-equiv=\"content-type\" content=\"text/html;charset=utf-8\"\
    >`\n`<TITLE>301 Moved</TITLE></HEAD><BODY>`\n`<H1>301 Moved</H1>`\n`The document\
    \ has moved`\n`<A HREF=\"http://www.google.com/\">here</A>.`\n`</BODY></HTML>`\n\
    \nThe example returns a response body with a status code of 301, which indicates\
    \ that the URL has moved. The output also contains the moved URL. If we had set\
    \ the following redirects policy in the `HttpClient` to `ALWAYS`, the request\
    \ would have been resubmitted to the moved URL. The following snippet of code\
    \ fixes this issue:\n\n```java\n// The request will follow the redirects issues\
    \ by the server\nHttpResponse<String> response = HttpClient.newBuilder()\n   \
    \     .followRedirects(HttpClient.Redirect.ALWAYS)\n        .build()\n       \
    \ .send(request, asString());\n```\n\nListing 14-3 contains a complete program\
    \ that shows you how to use a POST request with a body and process the response\
    \ asynchronously. The web application in the source code for this book contains\
    \ a servlet named `Calculator`. The source code for the `Calculator` servlet is\
    \ not shown here to save space. The servlet accepts three parameters in the request,\
    \ which are named `n1`, `n2`, and `op`, where `n1` and `n2` are two numbers and\
    \ `op` is an operator (`+`, `-`, `*`, or `/`). The response is a plain text and\
    \ summarizes the operator and its result.\n\nThe URL in the program assumes that\
    \ you have deployed the servlet locally on your machine and the web server is\
    \ running on port 8080. If these assumptions are not true, modify the program\
    \ accordingly. You will get the output shown here if the servlet is called successfully.\
    \ Otherwise, you will get different output.\n\n**Listing 14-3.** Processing an\
    \ HTTP Response’s Body Asynchronously\n\n```java\n// CalculatorTest.java\npackage\
    \ com.jdojo.http.client;\n\nimport java.io.IOException;\nimport java.net.URI;\n\
    import java.net.URISyntaxException;\nimport java.net.URLEncoder;\nimport jdk.incubator.http.HttpClient;\n\
    import jdk.incubator.http.HttpRequest;\nimport static jdk.incubator.http.HttpRequest.BodyProcessor.fromString;\n\
    import jdk.incubator.http.HttpResponse;\n\npublic class CalculatorTest {\n   \
    \ public static void main(String[] args) {\n        try {\n            URI calcUri\
    \ =\n                    new URI(\"http://localhost:8080/webapp/Calculator\");\n\
    \            String formData = \"n1=\" + URLEncoder.encode(\"10\",\"UTF-8\") +\n\
    \                    \"&n2=\" + URLEncoder.encode(\"20\",\"UTF-8\") +\n      \
    \              \"&op=\" + URLEncoder.encode(\"+\",\"UTF-8\") ;\n\n           \
    \ // Create a request\n            HttpRequest request = HttpRequest.newBuilder()\n\
    \                    .uri(calcUri)\n                    .header(\"Content-Type\"\
    , \"application/x-www-form-urlencoded\")\n                    .header(\"Accept\"\
    , \"text/plain\")\n                    .POST(fromString(formData))\n         \
    \           .build();\n\n            // Process the response asynchronously. When\
    \ the response\n            // is ready, the processResponse() method of this\
    \ class will\n            // be called.\n            HttpClient.newHttpClient()\n\
    \                    .sendAsync(request,\n                            HttpResponse.BodyHandler.asString())\n\
    \                    .whenComplete(CalculatorTest::processResponse);\n\n     \
    \       try {\n                // Let the current thread sleep for 5 seconds,\n\
    \                // so the async response processing is complete\n           \
    \     Thread.sleep(5000);\n            } catch (InterruptedException ex) {\n \
    \               ex.printStackTrace();\n            }\n        } catch (URISyntaxException\
    \ | IOException e) {\n            e.printStackTrace();\n        }\n    }\n\n \
    \   private static void processResponse(HttpResponse<String> response,\n     \
    \                                   Throwable t) {\n        if (t == null ) {\n\
    \            System.out.println(\"Response Status Code: \" +\n               \
    \     response.statusCode());\n            System.out.println(\"Response Body:\
    \ \" + response.body());\n        } else {\n            System.out.println(\"\
