- fmt: '`files`。`JAR`格式在JDK 9中得到了增强，以支持模块化`JAR`和多版本`JAR`。多版本`JAR`允许你打包同一个库或应用程序的同一版本，使其面向不同版本的JDK。例如，一个多版本`JAR`可能包含库版本1.2的代码，其中包含针对JDK
    8和JDK 9的代码。当多版本`JAR`在JDK 8上使用时，将使用JDK 8版本的库代码；当它在JDK 9上使用时，将使用JDK 9版本的库代码。特定于JDK版本`N`的文件存储在多版本`JAR`的`META-INF\versions\N`目录中。所有JDK版本通用的文件存储在根目录中。对于不支持多版本`JAR`的环境，此类`JAR`被视为常规`JAR`。在多版本`JAR`中，文件的搜索顺序有所不同——所有以当前平台主版本号开头的版本化目录会在根目录之前被搜索。


    `JMOD`文件旨在处理比`JAR`文件更多的内容类型。它们可以打包本地代码、配置文件、本地命令和其他类型的数据。在撰写本文时，`JMOD`格式基于`ZIP`格式，但未来将会改变。JDK
    9模块以`JMOD`格式打包，供你在编译时和链接时使用。`JMOD`格式在运行时不受支持。你可以使用`jmod`工具来处理`JMOD`文件。


    ## 第7章


    ## 创建自定义运行时镜像


    在本章中，你将学习：


    *   什么是自定义运行时镜像和`JIMAGE`格式

    *   如何使用`jlink`工具创建自定义运行时镜像

    *   如何指定命令名称来运行存储在自定义镜像中的应用程序

    *   如何将插件与`jlink`工具一起使用


    ### 什么是自定义运行时镜像？


    在JDK 9之前，Java运行时镜像是作为一个巨大的单体工件提供的——这增加了下载时间、启动时间和内存占用。单体`JRE`使得无法在内存较小的设备上使用Java。如果你将Java应用程序部署到云端，你需要为你使用的内存付费；通常情况下，单体`JRE`使用的内存超出所需，从而导致你为云服务支付更多费用。


    Java 8中引入的紧凑配置文件（Compact Profiles）通过允许你将`JRE`的子集打包到一个称为*紧凑配置文件*的自定义运行时镜像中，朝着减小`JRE`大小（从而减小运行时内存占用）迈出了一步。


    Java 9采用了一种整体方法来打包运行时镜像。所有平台代码都已模块化。你的应用程序代码也作为模块打包。在Java 9中，你可以创建一个自定义运行时，其中包含你的应用程序模块以及你的应用程序所使用的那些平台模块。你还可以在运行时镜像中打包本地命令。创建运行时镜像的另一个好处是，你只需向应用程序用户交付一个包——运行时镜像——他们无需下载和安装单独的`JRE`包即可运行你的应用程序。


