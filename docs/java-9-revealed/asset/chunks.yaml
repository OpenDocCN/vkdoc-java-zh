    ## 原生桌面特性


    Java SE 6 通过 `java.awt.Desktop` 类添加了平台特定的桌面支持。该类支持从 Java 应用程序执行以下操作：


    *   在用户默认浏览器中打开 URI

    *   在用户默认邮件客户端中打开 `mailto` URI

    *   使用注册的应用程序打开、编辑和打印文件


    第 20 章 ■ JDK 9 中的其他变化


    Java SE 9 进一步推进了平台特定的桌面支持，并为许多系统和应用程序事件通知添加了公共 API 支持（如果当前平台支持这些通知）。`java.awt.Desktop`
    类仍然是处理平台特定桌面特性的核心类。为了支持如此多新的桌面特性，Java SE 9 在 `java.desktop` 模块中添加了一个新包 `java.awt.desktop`。`java.awt.Desktop`
    类也新增了许多方法。这个新包包含 30 个类和接口。在 JDK 9 中，Desktop API 支持 24 种平台特定的桌面操作和通知，这些操作和通知由 `Desktop.Action`
    枚举的常量定义。举几个例子，如下所示：


    *   当连接的显示器进入或退出省电模式时的通知

    *   当系统进入睡眠或唤醒后的通知

    *   当用户会话更改（例如锁定/解锁用户会话）时的通知

    *   当应用程序的状态变为或不再是前台应用程序时的通知

    *   当应用程序被要求显示其“关于”对话框时的通知


    你可以使用这些特性来优化应用程序的资源使用。例如，如果系统进入睡眠模式，你可以停止动画，并在系统唤醒时恢复它们。本书不可能涵盖整个 Desktop API。我将通过一个逐步示例来引导你。有关更多信息，请参考
    `java.awt.Desktop` 类以及 `java.awt.desktop` 包中的类和接口的 API 文档。使用桌面特性时，典型步骤如下：


    *   使用 `Desktop` 类的静态方法 `isDesktopSupported()` 检查当前平台是否支持 `Desktop` 类。如果该方法返回
    `false`，则你无法使用任何桌面特性。

