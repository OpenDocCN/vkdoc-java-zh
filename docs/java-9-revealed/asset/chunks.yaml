    ![](img/index-116_1.jpg)


    第 4 章 ■ 模块依赖


    未命名模块到普通模块


    在本节中，我将向您展示如何从未命名模块访问命名模块中的类型。在 NetBeans 中创建一个名为 com.jdojo.unnamed 的 Java 项目。这不是一个模块化项目。它不包含包含模块声明的
    module-info.java 文件。它是一个您在 JDK 8 中使用的 Java 项目。向项目添加一个 Main 类，如清单 4-21 所示。该类使用了
    com.jdojo.reflect 包中的 Item 类，该包是现有项目 com.jdojo.reflect 的成员，该项目包含一个模块。


    ***清单 4-21.*** com.jdojo.unnamed NetBeans 项目中的主类


    // Main.java


    package com.jdojo.unnamed;


    import com.jdojo.reflect.Item;


    public class Main {


    public static void main(String[] args) {


    int v = Item.v;


    System.out.println("Item.v = " + v);


    }


    }


    主类无法编译。它不知道 Item 类在哪里。让我们将 com.jdojo.reflect 项目添加到 com.jdojo.unnamed 项目的模块路径中，如图
    4-17 所示。


    ***图 4-17.** 将 com.jdojo.reflect 项目添加到 com.jdojo.unnamed 项目的模块路径* 95


    ![](img/index-117_1.jpg)


    第 4 章 ■ 模块依赖


    尝试编译 com.jdojo.unnamed.Main 类会产生以下错误：


    C:\Java9Revealed\com.jdojo.unnamed\src\com\jdojo\unnamed\Main.java:4: 错误：包 com.jdojo.reflect
    不可见


    import com.jdojo.reflect.Item;


    （包 com.jdojo.reflect 在模块 com.jdojo.reflect 中声明，


    该模块不在模块图中）


    1 个错误


    编译时错误表明 Main 类无法导入 com.jdojo.reflect 包，因为它不可见。括号中的消息给出了实际原因和修复错误的提示。


    您已将 com.jdojo.reflect 模块添加到模块路径。但是，该模块并未添加到模块图中，因为没有其他模块声明对其的依赖。您可以通过使用 --add-modules
    编译器选项将 com.jdojo.reflect 模块添加到默认根模块集来修复此错误，如图 4-18 所示。现在，com.jdojo.unnamed.Main
    类将正常编译。


    ***图 4-18.** 在编译时，将 com.jdojo.reflect 模块添加到 com.jdojo.unnamed 项目的默认根模块集*


    ![](img/index-118_1.jpg)


