    \ + compTime);\n```\n\n```\nDuration: PT555H45M30S\n```\n\nAfter the days are\
    \ converted to hours by multiplying them by 24, as the output shows, this duration\
    \ represents 555 hours, 45 minutes, and 30 seconds.\n\n## Dividing a Duration\
    \ by Another Duration\n\nThere is only one method in this category:\n\n```\nlong\
    \ dividedBy(Duration divisor)\n```\n\nThe `dividedBy()` method lets you divide\
    \ a duration by another duration. It returns the number of times the specific\
    \ divisor occurs within the duration on which the method is called. To know how\
    \ many whole weeks are in this duration, you call the `dividedBy()` method using\
    \ seven days as the duration. The following snippet of code shows you how to compute\
    \ number of whole days, weeks, and hours in a duration:\n\n```\nlong wholeDays\
    \ = compTime.dividedBy(Duration.ofDays(1));\nlong wholeWeeks = compTime.dividedBy(Duration.ofDays(7));\n\
    long wholeHours = compTime.dividedBy(Duration.ofHours(7));\n\nSystem.out.println(\"\
    Number of whole days: \" + wholeDays);\nSystem.out.println(\"Number of whole weeks:\
    \ \" + wholeWeeks);\nSystem.out.println(\"Number of whole hours: \" + wholeHours);\n\
    ```\n\n```\nNumber of whole days: 23\nNumber of whole weeks: 3\nNumber of whole\
    \ hours: 79\n```\n\n## Converting and Retrieving Duration Parts\n\nThere are several\
    \ methods added to the `Duration` class in this category:\n\n- `long toDaysPart()`\n\
    - `int toHoursPart()`\n- `int toMillisPart()`\n- `int toMinutesPart()`\n- `int\
    \ toNanosPart()`\n- `long toSeconds()`\n- `int toSecondsPart()`\n\nThe `Duration`\
    \ class contains two sets of methods. They are named `toXxx()` and `toXxxPart()`,\
    \ where `Xxx` may be `Days`, `Hours`, `Minutes`, `Seconds`, `Millis`, and `Nanos`.\
    \ In this list, you may notice that `toDaysPart()` is included, but `toDays()`\
    \ is missing. If you see methods in one set missing for some `Xxx`, it means those\
    \ methods already existed in JDK 8. For example, the `toDays()` method has been\
    \ in the `Duration` class since JDK 8.\n\nMethods named `toXxx()` convert the\
    \ duration to the `Xxx` time unit and return the whole part. Methods named `toXxxPart()`\
    \ break down the duration in parts as days:hours:minutes:seconds:millis:nanos\
    \ and return the `Xxx` part from it. In this example, `toDays()` will convert\
    \ the duration to days and return the whole part, which will be 23. The `toDaysPart()`\
    \ will break down the duration to 23Days:3Hours:45Minutes:30Seconds:0Millis:0Nanos\
    \ and return the first part, which is 23. Let’s apply the same rules to `toHours()`\
