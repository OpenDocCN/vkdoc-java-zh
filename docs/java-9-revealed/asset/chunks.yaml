    and load service providers at runtime for a service interface of type S. The ServiceLoader
    class allows decoupling between the service consumers and the service providers.
    A service consumer knows only the service interface; the ServiceLoader class makes
    the instances of the service providers that are implementing the service interface
    available to consumers. Figur[e 5-1 sho](#index_split_002.html#127)ws a pictorial
