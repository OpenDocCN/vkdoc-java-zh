  trans: "\nloader 作为此方法创建的所有类加载器的父类加载器。你可以使用 `null` 作为第二个参数，以使用引导类加载器作为此方法创建的所有类加载器的父类加载器。此方法将为配置中的每个模块创建一个新的类加载器。\n\
    \n`defineModulesWithOneLoader(Configuration cf, ClassLoader parentClassLoader)`\
    \ 方法\n\n使用指定的配置创建一个层。它使用指定的父类加载器作为其父类加载器创建一个类加载器。它将配置中的所有模块映射到这一个类加载器。你可以使用 `null`\
    \ 作为第二个参数，以使用引导类加载器作为此方法创建的所有类加载器的父类加载器。\n\n以下代码片段创建了一个以引导层为父层的层。该层中的所有模块将由一个类加载器加载，其父类加载器是系统类加载器。\n\
    \n```java\nConfiguration config = /* 创建一个配置... */\n\nClassLoader sysClassLoader\
    \ = ClassLoader.getSystemClassLoader();\n\nModuleLayer parentLayer = ModuleLayer.boot();\n\
    \nModuleLayer layer = parentLayer.defineModulesWithOneLoader(config, sysClassLoader);\n\
    ```\n\n一旦创建了层，你需要从该层的模块中加载类。模块中的所有类型都由映射到该模块的类加载器加载。请注意，同一个模块可能定义在多个层中，但这些模块将被映射到不同的类加载器。`ModuleLayer`\
    \ 类包含一个 `findLoader(String moduleName)` 方法，该方法接受模块名称作为参数，并返回该模块的 `ClassLoader`。如果该模块未在层中定义，则会检查父层。如果该模块在此层或其祖先层中不存在，则会抛出\
    \ `IllegalArgumentException`。一旦获取了模块的 `ClassLoader`，就可以调用其 `loadClass(String className)`\
    \ 方法来从该模块加载类。以下代码片段（不包括异常处理逻辑）展示了如何在层中加载类：\n\n```java\nModuleLayer layer = /*\
    \ 创建一个层... */\n\n// 使用该层加载一个类\n\nString moduleName = \"com.jdojo.layer\";\n\n\
    String className = \"com.jdojo.layer.LayerInfo\";\n\nClass<?> cls = layer.findLoader(moduleName)\n\
    \n.loadClass(className);\n```\n\n一旦获取了 `Class` 对象，就可以使用它来实例化其对象并调用该对象的方法。\n\n\
    以下代码片段创建了所加载类的对象，并调用了该对象上名为 `printInfo` 的方法：\n\n```java\n// 一个打印对象详细信息的方法名\n\n\
    String methodName = \"printInfo\";\n\n// 使用无参构造函数实例化该类\n\nObject obj = cls.getConstructor().newInstance();\n\
    \n// 查找该方法\n\nMethod method = cls.getMethod(methodName);\n\n// 调用将打印详细信息的方法\n\n\
    method.invoke(obj);\n```\n\n第 10 章 ■ 模块 API\n\n`ModuleLayer` 类中的以下方法可用于获取关于层本身或层中包含的模块的信息：\n\
    \n*   `Optional<Module> findModule(String moduleName)`\n*   `Set<Module> modules()`\n\
    *   `List<ModuleLayer> parents()`\n\n`findModule()` 方法在层或其父层中查找具有指定名称的模块。`modules()`\
    \ 方法返回层中的模块集合，如果层不包含任何模块，则可能为空集合。`parent()` 方法返回此层的父层列表，对于空层，该列表将为空。\n\n接下来，我们将通过一个完整的示例来演示如何创建自定义层，以及如何在同一个应用程序的两个层中加载同一模块的两个版本。\n\
    \n模块名称为 `com.jdojo.layer`，它包含一个名为 `com.jdojo.layer` 的包，该包仅包含一个名为 `LayerInfo` 的类。你将拥有同一模块的两个版本，因此所有内容都将重复。我在源代码中创建了两个\
    \ NetBeans 项目，名称分别为 `com.jdojo.layer.v1` 和 `com.jdojo.layer.v2`。\n\n清单 10-13 和清单\
    \ 10-14 分别包含了 `com.jdojo.layer` 模块的 1.0 版模块定义和 `LayerInfo` 类的类声明。\n\n***清单 10-13.***\
    \ com.jdojo.layer 模块的 1.0 版\n\n```java\n// module-info.com 版本 1.0\n\nmodule com.jdojo.layer\
    \ {\n\n    exports com.jdojo.layer;\n\n}\n```\n\n***清单 10-14.*** com.jdojo.layer\
    \ 模块 1.0 版中的 LayerInfo 类\n\n```java\n// LayerInfo.java\n\npackage com.jdojo.layer;\n\
    \npublic class LayerInfo {\n\n    private final static String VERSION = \"1.0\"\
    ;\n\n    static {\n\n        System.out.println(\"正在加载 LayerInfo 版本 \" + VERSION);\n\
    \n    }\n\n    public void printInfo() {\n\n        Class cls = this.getClass();\n\
    \n        ClassLoader loader = cls.getClassLoader();\n\n        Module module\
    \ = cls.getModule();\n\n        String moduleName = module.getName();\n\n    \
    \    ModuleLayer layer = module.getLayer();\n\n        System.out.println(\"类版本:\
    \ \" + VERSION);\n\n        System.out.println(\"类名: \" + cls.getName());\n\n\
    \        System.out.println(\"类加载器: \" + loader);\n\n        System.out.println(\"\
    模块名: \" + moduleName);\n\n        System.out.println(\"层名: \" + layer);\n\n  \
    \  }\n\n}\n```\n\n第 10 章 ■ 模块 API\n\n`LayerInfo` 类非常简单。它将版本信息存储在一个名为 `VERSION`\
    \ 的静态变量中。它在静态初始化器中打印一条包含版本信息的消息。此消息将帮助你理解正在加载的是哪个版本的 `LayerInfo` 类。`printInfo()`\
    \ 方法打印类的详细信息：版本、类名、类加载器、模块名称和层。\n\n清单 10-15 和清单 10-16 分别包含了 `com.jdojo.layer`\
    \ 模块的 2.0 版模块定义和 `LayerInfo` 类的类声明。从该模块的 1.0 版到 2.0 版，只有一处发生了变化——静态变量 `VERSION`\
    \ 的值从 `1.0` 变为了 `2.0`。\n\n***清单 10-15.*** com.jdojo.layer 模块的 2.0 版\n\n```java\n\
    // module-info.com 版本 2.0\n\nmodule com.jdojo.layer {\n\n    exports com.jdojo.layer;\n\
    \n}\n```\n\n***清单 10-16.*** com.jdojo.layer 模块 2.0 版中的 LayerInfo 类\n\n```java\n\
    // LayerInfo.java\n\npackage com.jdojo.layer;\n\npublic class LayerInfo {\n\n\
    \    private final static String VERSION = \"2.0\";\n\n    static {\n\n      \
    \  System.out.println(\"正在加载 LayerInfo 版本 \" + VERSION);\n\n    }\n\n    public\
    \ void printInfo() {\n\n        Class cls = this.getClass();\n\n        ClassLoader\
    \ loader = cls.getClassLoader();\n\n        Module module = cls.getModule();\n\
    \n        String moduleName = module.getName();\n\n        ModuleLayer layer =\
    \ module.getLayer();\n\n        System.out.println(\"类版本: \" + VERSION);\n\n \
    \       System.out.println(\"类名: \" + cls.getName());\n\n        System.out.println(\"\
    类加载器: \" + loader);\n\n        System.out.println(\"模块名: \" + moduleName);\n\n\
    \        System.out.println(\"层名: \" + layer);\n\n    }\n\n}\n```\n\n现在，你可以测试层，并在同一个\
    \ JVM 中的两个不同层中加载 `com.jdojo.layer` 模块的两个版本。为此模块的 2.0 版创建一个模块化 JAR，将其命名为 `com.jdojo.layer.v2.jar`\
    \ 或你想要的任何其他名称，并将该模块化 JAR 放置在 `C:\\Java9Revealed\\customLib` 目录中。如果你将模块化 JAR 放在其他目录中，则需要更改清单\
    \ 10-18 代码中的路径。\n\n测试层的程序位于名为 `com.jdojo.layer.test` 的模块中，其声明如清单 10-17 所示。该模块声明了对\
    \ `com.jdojo.layer` 模块 1.0 版的依赖。\n\n如何确保 `com.jdojo.layer` 模块的 1.0 版与 `com.jdojo.layer.test`\
    \ 模块一起使用？你所要做的就是在运行 `com.jdojo.layer.test` 模块时，将 `com.jdojo.layer` 模块 1.0 版的代码放在模块路径上。要在\
