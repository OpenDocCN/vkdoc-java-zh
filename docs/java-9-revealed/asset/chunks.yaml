    Chapter 8 ■ Breaking Changes in JDk 9


    Using JDK Internal APIs


    The JDK consists of public APIs and internal APIs. Public APIs are meant to be
    used to develop portable Java applications. The java.*, javax.*, and org.* packages
    in the JDK contain public APIs. If your application uses only public APIs, it
    is guaranteed to work on all operating systems supporting the Java platform.


    Another guarantee offered by such an application is that if it worked in the JDK
    version *n*, it will continue to work in the JDK version *n* + 1.


    The com.sun.*, sun.*, and jdk.* packages are used to implement the JDK itself
    and they make up the internal APIs, which are not meant to be used by developers.
    Internal APIs are not guaranteed to work across all operating systems. Packages
    such as com.sun.* and sun.* are part of the Oracle JDK. These packages will not
    be available if you use a JDK from another vendor. Non-Oracle JDKs such as the
    JDK from IBM will use other package names to implement their internal APIs. Figur[e
    8-6 sho](#index_split_003.html#210)ws the JDK APIs in different categories.


    **JDK APIs**


    Public APIs


    Internal APIs


    java.*, javax.*, and org.*


    sun.*, com.sun.*, and jdk.*


    Critical APIs


    Non-critical APIs


    Available in the


    Encapsulated'
