    • There is no guarantee about the implementation class of the returned List. That


    is, do not expect the returned object to be of ArrayList or any other class that


    implements the List interface. Implementations of these methods are internal and


    you should make no assumption about their class names. For example, List.of()


    and List.of("A") may return objects of two different classes.


    The Collections class contains a static field named EMPTY_LIST representing an
    immutable empty list.


    It also contains a static method named emptyList() to obtain an immutable empty
    list. Its singletonList (T object) method returns an immutable singleton list
    with the specified element. The following snippet of code shows pre-JDK 9 and
    JDK 9 ways of creating immutable empty and singleton lists:


    // Creating an empty, immutable List before JDK 9


    List<Integer> emptyList1 = Collections.EMPTY_LIST;


    List<Integer> emptyList2 = Collections.emptyList();


    // Creating an empty list in JDK 9


    List<Integer> emptyList = List.of();


    // Creating a singleton, immutable List before JDK 9


    List<Integer> singletonList1 = Collections.singletonList(100);


    // Creating a singleton, immutable List in JDK 9


    List<Integer> singletonList = List.of(100);


    How do you use the of() method to create an unmodifiable list from an array? The
    answer depends on the list you want out of the array. You may want a list whose
    elements are the same as elements of the array or you may want a list with the
    array itself as the sole element in the list. Using List.of(array) will invoke
    the of(E... elements) method and the returned list will have its elements the
    same as the elements in the array.


    If you want the array itself to be the sole element in the list, you will need
    to use List.<array-type>of(array) method, which will invoke the of(E e1) method
    and the returned list will have one element, which would be the array itself.
