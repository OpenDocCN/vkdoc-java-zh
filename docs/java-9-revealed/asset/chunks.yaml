- fmt: "# How to Fix This Error Using the Class Path\n\nTo fix this error when using\
    \ the class path to run this application, use the `--add-open` command-line option:\n\
    \n```\nC:\\Java9Revealed>java --add-opens java.base/java.lang=ALL-UNNAMED\n--class-path\
    \ com.jdojo.intruder\\dist\\com.jdojo.intruder.jar com.jdojo.intruder.TestManifestAttributes\n\
    ```\n\n`Long.serialVersionUID=4290774380558885855`\n\n## Summary\n\nOne of the\
    \ main goals of JDK 9 is to encapsulate types and resources in modules and export\
    \ only those packages whose public types are intended to be accessed by other\
    \ modules. Sometimes, you may need to break the encapsulation specified by a module\
    \ to enable white-box testing or use unsupported JDK-internal APIs or libraries.\
    \ This is possible by using non-standard command-line options at compile-time\
    \ and runtime. Another reason for having these options is backward compatibility.\n\
    \nJDK 9 provides two command-line options, `--add-exports` and `--add-opens`,\
    \ that let you break encapsulation defined in a module declaration. The `--add-exports`\
    \ option lets you export a non-exported package in a module to other modules at\
    \ compile-time and runtime. The `--add-opens` option lets you open a non-open\
    \ package in a module to other modules for deep reflection at runtime. The value\
    \ for these options is of the form `<source-module>/<package>=<target-module-list>`,\
    \ where `<source-module>` is the module that exports or opens `<package>` to `<target-module-list>`,\
    \ which is a comma-separated list of target module names. You can use `ALL-UNNAMED`\
    \ as a special value for the list of target modules that exports or opens those\
    \ packages to all unnamed modules.\n\nThere are two new attributes named `Add-Exports`\
    \ and `Add-Opens` that can be used in the main section of the manifest file of\
    \ an executable JAR. Effects of using these attributes is the same as using the\
    \ similarly named command-line options, except that these attributes export or\
    \ open the specified packages to all unnamed modules. The value for these attributes\
    \ is a space-separated list of slash-separated `module-name/package-name` pairs.\
    \ For example, an `Add-Opens: java.base/java.lang` entry in the main section of\
    \ a manifest file of an executable JAR will open the `java.lang` package in the\
    \ `java.base` module for all unnamed modules.\n\nDuring testing and debugging,\
    \ it is sometimes required that a module read another module where the first module\
    \ does not use a `requires` statement in its declaration to read the second module.\
    \ This can be achieved using the `--add-reads` command-line option whose value\
    \ is specified in the form `<source-module>=<target-module-list>`. The `<source-module>`\
    \ is the module whose definition is updated to read the list of modules specified\
    \ in the `<target-module-list>`, which is a comma-separated list of target module\
    \ names. A special value of `ALL-UNNAMED` for the target module list makes the\
    \ source module read all unnamed modules.\n\n# Chapter 10: The Module API\n\n\
    In this chapter, you will learn:\n\n- What the Module API is\n- How to represent\
    \ a module and a module descriptor in a program\n- How to read a module descriptor\
    \ in a program\n- How to represent a module's version\n- How to read a module's\
    \ properties using the `Module` and `ModuleDescriptor` classes\n- How to update\
    \ a module's definition at runtime using the `Module` class\n- How to create annotations\
    \ that can be used on modules and how to read annotations used on modules\n- What\
    \ module layers and configurations are\n- How to create custom module layers and\
    \ load modules into them\n\n## What Is the Module API?\n\nThe Module API consists\
    \ of classes and interfaces that give you programmatic access to modules. Using\
    \ the API, you can programmatically:\n\n- Read, modify, and build module descriptors\n\
    - Load modules\n- Read modules' contents\n- Search for loaded modules\n- Create\
    \ new layers of modules\n\nThe Module API is small. It consists of about 15 classes\
    \ and interfaces spread across two packages:\n\n- `java.lang`\n- `java.lang.module`\n\
    \n© Kishori Sharan 2017  \nK. Sharan, *Java 9 Revealed*, DOI 10.1007/978-1-4842-2592-9_10"
  raw: 'How do you fix this error if you were to use the class path to run this application?
    Use the --add-open command-line option to fix it:


    C:\Java9Revealed>java --add-opens java.base/java.lang=ALL-UNNAMED


    --class-path com.jdojo.intruder\dist\com.jdojo.intruder.jar com.jdojo.intruder.


    TestManifestAttributes


    Long.serialVersionUID=4290774380558885855


    Summary


    One of the main goals of JDK 9 is to encapsulate types and resources in modules
    and export only those packages whose public types are intended to be accessed
    by other modules. Sometimes, you may need to break the encapsulation specified
    by a module to enable white-box testing or use unsupported JDK-internal APIs or
    libraries. This is possible by using non-standard command-line options at compile-time
    and runtime. Another reason for having these options is backward compatibility.


    JDK 9 provides two command-line options, --add-exports and --add-opens, that let
    you break


    encapsulation defined in a module declaration. The --add-exports option lets you
    export a non-exported package in a module to other modules at compile-time and
    runtime. The --add-opens option lets you open a non-open package in a module to
    other modules for deep reflection at runtime. The value for these options is of
    the form <source-module>/<package>=<target-module-list>, where <source-module>
    is the module that exports or opens <package> to <target-module-list>, which is
    a comma-separated list of target module names. You can use ALL-UNNAMED as a special
    value for the list of target modules that exports or opens those packages to all
    unnamed modules.


    There are two new attributes named Add-Exports and Add-Opens that can be used
    in the main section of the manifest file of an executable JAR. Effects of using
    these attributes is the same as using the similarly named command-line options,
    except that these attributes export or open the specified packages to all unnamed
    modules. The value for these attributes is a space-separated list of slash-separated
    module-name/package-name pairs. For example, an Add-Opens: java.base/java.lang
    entry in the main section of a manifest file of an executable JAR will open the
    java.lang package in the java.base module for all unnamed modules.


    During testing and debugging, it is sometimes required that a module read another
    module where the first module does not use a requires statement in its declaration
    to read the second module. This can be achieved using the --add-reads command-line
    option whose value is specified in the form <source-module>=<target-module-list>.
    The <source-module> is the module whose definition is updated to read the list
    of modules specified in the <target-module-list>, which is a comma-separated list
    of target module names. A special value of ALL-UNNAMED for the target module list
    makes the source module read all unnamed modules.


    **CHAPTER 10**


    **The Module API**


    In this chapter, you will learn:


    • What the Module API is


    • How to represent a module and a module descriptor in a program


    • How to read a module descriptor in a program


    • How to represent a module’s version


    • How to read a module’s properties using the Module and ModuleDescriptor classes


    • How to update a module’s definition at runtime using the Module class


    • How to create annotations that can be used on modules and how to read annotations


    used on modules


    • What module layers and configurations are


    • How to create custom module layers and load modules into them


    What Is the Module API?


    The Module API consists of classes and interfaces that give you programmatic access
    to modules. Using the API, you can programmatically:


    • Read, modify, and build module descriptors


    • Load modules


    • Read modules’ contents


    • Search for loaded modules


    • Create new layers of modules


    The Module API is small. It consists of about 15 classes and interfaces spread
    across two packages:


    • java.lang


    • java.lang.module


    © Kishori Sharan 2017


    K. Sharan, *Java 9 Revealed*, DOI 10.1007/978-1-4842-2592-9_10


    Chapter 10 ■ the Module apI'
