- fmt: "# `@SafeVarargs` Annotation on Such Methods\n\nBy adding this annotation to\
    \ the method declaration, you are assuring the method’s users and the compiler\
    \ that, in the method’s body, you are not performing any unsafe operations on\
    \ the non-reifiable var-args argument. Your assurance is good enough for the compiler\
    \ not to issue the warning. However, if your assurance proves to be untrue at\
    \ runtime, the runtime will throw an appropriate type of exception.\n\nBefore\
    \ JDK 9, you could use the `@SafeVarargs` annotation on the following executables\
    \ (constructors and methods):\n\n- Constructors\n- Static methods\n- Final methods\n\
    \nConstructors, static methods, and final methods are non-overridable. The idea\
    \ behind allowing the `@SafeVarargs` annotation only on non-overridable executables\
    \ was to safeguard against developers using this annotation on an overridden executable\
    \ that violates the annotation’s constraint on the overridden executable. Suppose\
    \ that you have a class `X`, which contains a method `m1()`, which contains a\
    \ `@SafeVarargs`. Further suppose that you have a class `Y` that inherits from\
    \ class `X`. Class `Y` may override the inherited method `m1()` and may have unsafe\
    \ operations. This will have runtime surprises because developers may write code\
    \ in terms of the superclass `X` and may not expect any unsafe operation as promised\
    \ by its method `m1()`.\n\nA private method is also non-overridable, so JDK 9\
    \ decided to allow the `@SafeVarargs` annotation also on private methods. Listing\
    \ [20-7 sho](#index_split_008.html#486)ws a class with a private method using\
    \ a `@SafeVarargs` annotation. The new list of executables that can have a `@SafeVarargs`\
    \ annotation in JDK 9 is as follows:\n\n- Constructors\n- Static methods\n- Final\
    \ methods\n- Private methods\n\n## Listing 20-7. Using the `@SafeVarargs` Annotation\
    \ on a Private Method in JDK 9\n\n```java\n// SafeVarargsTest.java\npackage com.jdojo.misc;\n\
    \npublic class SafeVarargsTest {\n    // Allowed in JDK 9\n    @SafeVarargs\n\
    \    private <T> void print(T... args) {\n        for(T element : args) {\n  \
    \          System.out.println(element);\n        }\n    }\n    // More code goes\
    \ here\n}\n```\n\nCompiling this class in JDK 8 generates the following error,\
    \ which states that the `@SafeVarargs` cannot be used on a non-final method, which\
    \ is a private method in this case. You need to compile the source code using\
    \ the `-Xlint:unchecked` option to see the errors.\n\n```\ncom\\jdojo\\misc\\\
    SafeVarargsTest.java:6: error: Invalid SafeVarargs annotation. Instance\nmethod\
    \ <T> print(T...) is not final.\nprivate <T> void print(T... args) {\n       ^\n\
    \  where T is a type-variable:\n    T extends Object declared in method <T>print(T...)\n\
    ```\n\n# Discarding Process Outputs\n\nJDK 9 added a new constant named `DISCARD`\
    \ to the `ProcessBuilder.Redirect` nested class. Its type is `ProcessBuilder.Redirect`.\
    \ You can use this as a destination for output and error streams of sub-processes\
    \ when you want to discard the outputs. Implementation discards the outputs by\
    \ writing to an operating system specific “null file”. Listing [20-8](#index_split_008.html#486)\
    \ contains a complete program that shows how to discard a sub-process’ outputs.\n\
    \n## Listing 20-8. Discarding a Process’ Outputs\n\n```java\n// DiscardProcessOutput.java\n\
    package com.jdojo.misc;\n\nimport java.io.IOException;\n\npublic class DiscardProcessOutput\
    \ {\n    public static void main(String[] args) {\n        System.out.println(\"\
    Using Redirect.INHERIT:\");\n        startProcess(ProcessBuilder.Redirect.INHERIT);\n\
    \n        System.out.println(\"\\nUsing Redirect.DISCARD:\");\n        startProcess(ProcessBuilder.Redirect.DISCARD);\n\
    \    }\n\n    public static void startProcess(ProcessBuilder.Redirect outputDest)\
    \ {\n        try {\n            ProcessBuilder pb = new ProcessBuilder()\n   \
    \             .command(\"java\", \"-version\")\n                .redirectOutput(outputDest)\n\
    \                .redirectError(outputDest);\n            Process process = pb.start();\n\
    \            process.waitFor();\n        } catch (IOException | InterruptedException\
    \ e) {\n            e.printStackTrace();\n        }\n    }\n}\n```\n\n```\nUsing\
    \ Redirect.INHERIT:\njava version \"9-ea\"\nJava(TM) SE Runtime Environment (build\
    \ 9-ea+157)\nJava HotSpot(TM) 64-Bit Server VM (build 9-ea+157, mixed mode)\n\n\
    Using Redirect.DISCARD:\n```"
