    public interface PrimeChecker {


    String getName();


    boolean isPrime(long n);


    static PrimeChecker newInstance();


    static PrimeChecker newInstance(String providerName)


    }


    The newInstance() method will return an instance of the PrimeChecker that is found
    first. Another version will return the instance of a service provider with the
    specified provider name.


    Let’s create a module named com.jdojo.prime. Listing [5-1](#index_split_002.html#132)
