    \ a3));\n        System.out.println(\"Arrays.compare(a1, 0, 2, a2, 0, 2): \" +\n\
    \                Arrays.compare(a1, 0, 2, a2, 0, 2));\n        // 查找数组中的不匹配索引\n\
    \        System.out.println(\"\\n 使用 mismatch() 方法查找不匹配:\");\n        System.out.println(\"\
    Arrays.mismatch(a1, a2): \" + Arrays.mismatch(a1, a2));\n        System.out.println(\"\
    Arrays.mismatch(a1, a3): \" + Arrays.mismatch(a1, a3));\n        System.out.println(\"\
    Arrays.mismatch(a1, 0, 5, a2, 0, 1): \" +\n                Arrays.mismatch(a1,\
    \ 0, 5, a2, 0, 1));\n    }\n}\n```\n\n三个数组:\na1: [1, 2, 3, 4, 5]\na2: [1, 2, 7,\
    \ 4, 5]\na3: [1, 2, 3, 4, 5]\n\n使用 equals() 方法比较数组:\nArrays.equals(a1, a2): false\n\
    Arrays.equals(a1, a3): true\nArrays.equals(a1, 0, 2, a2, 0, 2): true\n\n使用 compare()\
