  raw: 'In Java 9, several options have been added to the Java compiler tool, javac.
    It allows you to compile one module at a time or multiple modules at a time. If
    you want to compile multiple modules at a time, you *must* store the source code
    for each module under a directory, which has the same name as the name of the
    module. You can follow this source directory naming convention even if you have
    only one module.


    Suppose you want to compile the source code for the com.jdojo.contact module.
    You can store its source code in a directory named C:\j9r\src, which contains
    the following files:


    module-info.java


    com\jdojo\contact\info\Address.java


    com\jdojo\contact\info\Phone.java


    com\jdojo\contact\validator\Validator.java


    com\jdojo\contact\validator\AddressValidator.java


    com\jdojo\contact\validator\PhoneValidator.java


    Chapter 2 ■ the Module SySteM


    Note that you need to follow the package hierarchy to store the source files for
    interfaces and classes as you have been doing since Java 1.0.


    If you want to compile multiple modules at once, you must name the source code
    directory


    com.jdojo.contact, which is the same as the module’s name. In this case, you might
    store the module’s source code in a directory called C:\j9r\src, whose contents
    are as follows:


    com.jdojo.contact\module-info.java


    com.jdojo.contact\com\jdojo\contact\info\Address.java


    com.jdojo.contact\com\jdojo\contact\info\Phone.java


    com.jdojo.contact\com\jdojo\contact\validator\Validator.java


    com.jdojo.contact\com\jdojo\contact\validator\AddressValidator.java


    com.jdojo.contact\com\jdojo\contact\validator\PhoneValidator.java


    The compiled code for the module will follow the same directory hierarchy as you
    saw previously.


    Packaging Modules


    A module’s artifacts can be stored in:


    • A directory


    • A modular JAR file


    • A JMOD file, which is a new module-packaging format introduced in JDK 9


    A Module in a Directory


    When the compiled code for a module is stored in a directory, the root of the
    directory contains the module descriptor (the module-info.class file) and the
    sub-directories mirror the package hierarchy. Continuing from the example in the
    previous section, suppose you store the compiled code for the com.jdojo.contact
    module in the C:\j9r\mods\com.jdojo.contact directory. The directory’s contents
    would be as follows: module-info.class


    com\jdojo\contact\info\Address.class


    com\jdojo\contact\info\Phone.class


    com\jdojo\contact\validator\Validator.class


    com\jdojo\contact\validator\AddressValidator.class


    com\jdojo\contact\validator\PhoneValidator.class


    A Module in a Modular JAR


    The JDK ships with a jar tool to package Java code in a JAR (**J**ava **Ar**chive)
    file format. The JAR format is based on the ZIP file format. JDK 9 has enhanced
    the jar tool to package a module’s code in a JAR. When a JAR contains the compiled
    code for a module, the JAR is called a *modular JAR*. A modular JAR contains a
    module-info.class file at the root.


    Wherever you were using JARs before JDK 9, you can use modular JARs now. For example,
    modular JARs can be placed on the class path and, in that case, the module-info.class
    file in the modular JAR is ignored because module-info is not a valid class name
    in Java.


    Chapter 2 ■ the Module SySteM


    While packaging a modular JAR, you can use various options available in the jar
    tool, which were added in JDK 9, to add pieces of information to the module descriptor
    such as a module version and the main class name.


    ■ **Tip** a modular Jar is a Jar in all respects, except it contains a module
    descriptor at the root.


    Typically, a non-trivial Java application consists of multiple modules. A modular
    JAR can contain the compiled code for only *one* module. There is a need to package
    all modules of an application into a single JAR to simplify shipping an application
    in one artifact. At the time of this writing, this is an open issue, and it’s
    described a[t http://openjdk.java.net/projects/jigsaw/spec/issues/#MultiModuleExecutableJARs.](http://openjdk.java.net/projects/jigsaw/spec/issues/#MultiModuleExecutableJARs)


    Continuing the example from the previous section, the modular JAR’s contents for
    the com.jdojo.


    contact module is as follows. Note that a JAR always contains a MANIFEST.MF in
    the META-INF directory.


    module-info.class


    com/jdojo/contact/info/Address.class


    com/jdojo/contact/info/Phone.class


    com/jdojo/contact/validator/Validator.class


    com/jdojo/contact/validator/AddressValidator.class


    com/jdojo/contact/validator/PhoneValidator.class


    META-INF/MANIFEST.MF


    A Module in a JMOD File


    JDK 9 introduced a new format, called *JMOD*, to package modules. A JMOD file
    uses a .jmod extension. JDK


    modules are compiled into JMOD formats and are placed in the JDK_HOME\jmods directory;
    for example, you will find a java.base.jmod file that contains the contents of
    the java.base module. JMOD files are supported only at compile-time and link time.
    They are not supported at runtime. I will explain the JMOD


    format in detail in Chapter [6.](http://dx.doi.org/10.1007/978-1-4842-2592-9)


    Module Path


    The class path mechanism to look up types has existed since the beginning of the
    JDK. A class path is a series of directories, JAR files, and ZIP files. When Java
    needs to look up a type at various phases (compile-time, runtime, during usage
    of tools, etc.), it uses the entries from the class path to find the type.


    Java 9 types exist as part of modules. Java needs to look up modules during different
    phases, not types as it did prior to Java 9\. Java 9 introduced a new mechanism
    to look up modules and it is called *module path*.


    A *module path* is a sequence of path names containing modules, where a path name
    may be a path to a modular JAR, a JMOD file, or a directory. The path names are
    separated by a platform-specific path-separator character, which is a colon (:)
    on the UNIX-like platforms and a semicolon (;) on the Windows platform.


    Chapter 2 ■ the Module SySteM


    It is easy to understand when a path name is a modular JAR or a JMOD file. In
    this case, if the module descriptor in the JAR or JMOD file contains the module
    definition for the module being looked up, the module is found. If a path name
    is a directory, the following two cases exist:


    • If a class file exists at the root of the directory, the directory is considered
    to have


    a module definition. The class file at the root will be interpreted as the module


    descriptor. All other files and sub-directories will be interpreted as part of
    this one


    module. If multiple class files exist at the root, the first found file is interpreted
    as the module descriptor. After a few experiments, the JDK 9 build 126 seems to
    pick up the


    first class file in alphabetically sorted order. This way of storing a module
    compiled


    code is sure to give you a headache. Therefore, avoid adding a directory to the


    module path if the directory contains multiple class files at root.


    • If a class file does not exist at the root of the directory, the contents of
    the directory are interpreted differently. Each modular JAR or a JMOD file in
    the directory is considered


    a module definition. Each sub-directory, if it contains a module-info.class file
    at


    its root, is considered to have a module definition in exploded directory tree
    format.


    If a sub-directory does not contain a module-info.class file at its root, it is
    not


    interpreted as containing a module definition. Note that if a sub-directory contains
    a


    module definition, its name does not have to be the same as the module name. The


    module name is read from the module-info.class file.


    The following are valid module paths on Windows:


    • C:\mods


    • C:\mods\com.jdojo.contact.jar;C:\mods\com.jdojo.person.jar


    • C:\lib;C:\mods\com.jdojo.contact.jar;C:\mods\com.jdojo.person.jar


    The first module path contains the path to a directory named C:\mods. The second
    module path


    contains paths to two modular JARs—com.jdojo.contact.jar and com.jdojo.person.jar.
    The third'
  trans: '

    在 Java 9 中，Java 编译器工具 javac 新增了几个选项。它允许你一次编译一个模块或一次编译多个模块。如果你想一次编译多个模块，你*必须*将每个模块的源代码存储在一个目录下，该目录的名称与模块名称相同。即使你只有一个模块，也可以遵循这种源目录命名约定。


    假设你想编译 `com.jdojo.contact` 模块的源代码。你可以将其源代码存储在名为 `C:\j9r\src` 的目录中，该目录包含以下文件：


    module-info.java


    com\jdojo\contact\info\Address.java


    com\jdojo\contact\info\Phone.java


    com\jdojo\contact\validator\Validator.java


    com\jdojo\contact\validator\AddressValidator.java


    com\jdojo\contact\validator\PhoneValidator.java


    第 2 章 ■ 模块系统


    请注意，你需要像自 Java 1.0 以来一直做的那样，遵循包层次结构来存储接口和类的源文件。


    如果你想一次编译多个模块，则必须将源代码目录命名为 `com.jdojo.contact`，这与模块的名称相同。在这种情况下，你可以将模块的源代码存储在名为
    `C:\j9r\src` 的目录中，其内容如下：


    com.jdojo.contact\module-info.java


    com.jdojo.contact\com\jdojo\contact\info\Address.java


    com.jdojo.contact\com\jdojo\contact\info\Phone.java


    com.jdojo.contact\com\jdojo\contact\validator\Validator.java


    com.jdojo.contact\com\jdojo\contact\validator\AddressValidator.java


    com.jdojo.contact\com\jdojo\contact\validator\PhoneValidator.java


    模块的编译代码将遵循与你之前看到的相同的目录层次结构。


    **打包模块**


    模块的工件可以存储在：


    -   一个目录

    -   一个模块化 JAR 文件

    -   一个 JMOD 文件，这是 JDK 9 中引入的一种新的模块打包格式


    **目录中的模块**


    当模块的编译代码存储在一个目录中时，该目录的根目录包含模块描述符（`module-info.class` 文件），子目录则镜像了包层次结构。继续上一节的示例，假设你将
    `com.jdojo.contact` 模块的编译代码存储在 `C:\j9r\mods\com.jdojo.contact` 目录中。该目录的内容如下：


    module-info.class


    com\jdojo\contact\info\Address.class


    com\jdojo\contact\info\Phone.class


    com\jdojo\contact\validator\Validator.class


    com\jdojo\contact\validator\AddressValidator.class


    com\jdojo\contact\validator\PhoneValidator.class


    **模块化 JAR 中的模块**


    JDK 附带了一个 `jar` 工具，用于将 Java 代码打包成 JAR（**J**ava **Ar**chive）文件格式。JAR 格式基于 ZIP 文件格式。JDK
    9 增强了 `jar` 工具，可以将模块的代码打包到 JAR 中。当一个 JAR 包含模块的编译代码时，该 JAR 被称为*模块化 JAR*。模块化 JAR
    在其根目录包含一个 `module-info.class` 文件。


    无论你在 JDK 9 之前在哪里使用 JAR，现在都可以使用模块化 JAR。例如，模块化 JAR 可以放置在类路径上，在这种情况下，模块化 JAR 中的 `module-info.class`
    文件会被忽略，因为 `module-info` 在 Java 中不是有效的类名。


    第 2 章 ■ 模块系统


    在打包模块化 JAR 时，你可以使用 `jar` 工具中在 JDK 9 中新增的各种选项，向模块描述符添加信息片段，例如模块版本和主类名。


    ■ **提示** 模块化 JAR 在所有方面都是一个 JAR，只是它在根目录包含一个模块描述符。


    通常，一个非平凡的 Java 应用程序由多个模块组成。一个模块化 JAR 只能包含*一个*模块的编译代码。需要将应用程序的所有模块打包到一个 JAR 中，以简化将应用程序作为一个工件交付的过程。在撰写本文时，这是一个未解决的问题，在[此链接](http://openjdk.java.net/projects/jigsaw/spec/issues/#MultiModuleExecutableJARs)中有描述。


    继续上一节的示例，`com.jdojo.contact` 模块的模块化 JAR 内容如下。请注意，JAR 总是在 `META-INF` 目录中包含一个 `MANIFEST.MF`
    文件。


    module-info.class


    com/jdojo/contact/info/Address.class


    com/jdojo/contact/info/Phone.class


    com/jdojo/contact/validator/Validator.class


    com/jdojo/contact/validator/AddressValidator.class


    com/jdojo/contact/validator/PhoneValidator.class


    META-INF/MANIFEST.MF


    **JMOD 文件中的模块**


    JDK 9 引入了一种名为 *JMOD* 的新格式来打包模块。JMOD 文件使用 `.jmod` 扩展名。JDK 模块被编译成 JMOD 格式，并放置在 `JDK_HOME\jmods`
    目录中；例如，你会找到一个 `java.base.jmod` 文件，其中包含 `java.base` 模块的内容。JMOD 文件仅在编译时和链接时受支持。它们在运行时不受支持。我将在第
    [6](http://dx.doi.org/10.1007/978-1-4842-2592-9) 章中详细解释 JMOD 格式。


    **模块路径**


    自 JDK 诞生以来，用于查找类型的类路径机制就一直存在。类路径是一系列目录、JAR 文件和 ZIP 文件。当 Java 需要在不同阶段（编译时、运行时、使用工具期间等）查找类型时，它会使用类路径中的条目来查找该类型。


    Java 9 中的类型是作为模块的一部分存在的。Java 需要在不同阶段查找模块，而不是像 Java 9 之前那样查找类型。Java 9 引入了一种新的查找模块的机制，称为*模块路径*。


    *模块路径* 是一个包含模块的路径名序列，其中路径名可以是模块化 JAR、JMOD 文件或目录的路径。路径名由特定于平台的路径分隔符分隔，在类 UNIX 平台上为冒号（`:`），在
    Windows 平台上为分号（`;`）。


    第 2 章 ■ 模块系统


    当路径名是模块化 JAR 或 JMOD 文件时，很容易理解。在这种情况下，如果 JAR 或 JMOD 文件中的模块描述符包含正在查找的模块的模块定义，则找到该模块。如果路径名是一个目录，则存在以下两种情况：


    -   如果目录根目录下存在一个类文件，则该目录被视为包含一个模块定义。根目录下的类文件将被解释为模块描述符。所有其他文件和子目录将被解释为此模块的一部分。如果根目录下存在多个类文件，则找到的第一个文件被解释为模块描述符。经过几次实验，JDK
    9 build 126 似乎会按字母顺序排序后选取第一个类文件。这种存储模块编译代码的方式肯定会让你头疼。因此，如果目录根目录下包含多个类文件，请避免将该目录添加到模块路径。


    -   如果目录根目录下不存在类文件，则目录的内容将被不同地解释。目录中的每个模块化 JAR 或 JMOD 文件都被视为一个模块定义。每个子目录，如果其根目录下包含
    `module-info.class` 文件，则被视为以展开目录树格式包含一个模块定义。如果子目录的根目录下不包含 `module-info.class`
    文件，则它不被解释为包含模块定义。请注意，如果子目录包含模块定义，其名称不必与模块名称相同。模块名称是从 `module-info.class` 文件中读取的。


    以下是 Windows 上有效的模块路径：


    -   `C:\mods`

    -   `C:\mods\com.jdojo.contact.jar;C:\mods\com.jdojo.person.jar`

    -   `C:\lib;C:\mods\com.jdojo.contact.jar;C:\mods\com.jdojo.person.jar`


    第一个模块路径包含指向名为 `C:\mods` 的目录的路径。第二个模块路径包含指向两个模块化 JAR（`com.jdojo.contact.jar` 和
    `com.jdojo.person.jar`）的路径。第三个

    '
- fmt: '`module path`包含三个元素——指向`C:\lib`目录的路径，以及两个模块化JAR（`com.jdojo.contact.jar`和`com.jdojo.person.jar`）的路径。在类UNIX平台上，这些路径的等效形式如下所示：


    - `/usr/ksharan/mods`

    - `/usr/ksharan/mods/com.jdojo.contact.jar:/usr/ksharan/com.jdojo.person.jar`

    - `/usr/ksharan/lib:/usr/ksharan/mods/com.jdojo.contact.jar:/usr/ksharan/mods/com.jdojo.person.jar`


    避免模块路径问题的最佳方法是不要将展开的目录用作模块定义。


    将两个目录作为模块路径——一个目录包含所有应用程序模块化JAR，另一个目录包含所有外部库的模块化JAR。例如，在Windows上，你可以使用`C:\applib;C:\extlib`作为模块路径，其中`C:\applib`目录包含所有应用程序模块化JAR，`C:\extlib`目录包含所有外部库的模块化JAR。


    ## 第2章 ■ 模块系统


    JDK 9已更新其所有工具，以使用模块路径来查找模块。这些工具提供了新的选项来指定模块路径。在JDK 9之前，你看到的是以连字符（`-`）开头的UNIX风格选项，例如`-cp`和`-classpath`。随着JDK
    9中新增了如此多的选项，JDK设计者难以再为选项找到既简短又对开发者有意义的名称。因此，JDK 9开始使用GNU风格选项，即选项以两个连续的连字符开头，单词之间用连字符分隔。


    以下是GNU风格命令行选项的几个示例：


    - `--class-path`

    - `--module-path`

    - `--module-version`

    - `--main-class`

    - `--print-module-descriptor`


    **提示：** 要打印工具支持的所有标准选项列表，请使用`--help`或`-h`选项运行该工具；要打印所有非标准选项，请使用`-X`选项运行该工具。例如，`java
    -h`和`java -X`命令将分别打印`java`命令的标准和非标准选项列表。


    JDK 9中的大多数工具（如`javac`、`java`和`jar`）都支持两个选项来在命令行上指定模块路径。它们是`-p`和`--module-path`。现有的UNIX风格选项将继续得到支持以保持向后兼容性。以下两个命令展示了如何使用这两个选项为`java`工具指定模块路径：


    ```

    // 使用GNU风格选项

    C:\>java --module-path C:\applib;C:\lib other-args-go-here


    // 使用UNIX风格选项

    C:\>java -p C:\applib;C:\extlib other-args-go-here

    ```


    我在本书的所有示例中都使用GNU风格选项`--module-path`来指定模块路径。


    当你使用GNU风格选项时，可以通过以下两种形式之一指定选项的值：


    - `--<name> <value>`

    - `--<name>=<value>`


    之前的命令也可以写成如下形式：


    ```

    // 使用GNU风格选项

    C:\>java --module-path=C:\applib;C:\lib other-args-go-here

    ```


    当使用空格作为名称-值分隔符时，你需要至少使用一个空格。当你使用`=`作为分隔符时，其周围不得包含任何空格。选项`--module-path=C:\applib`是有效的。选项`--module-path
    =C:\applib`是无效的，因为`=C:\applib`将被解释为模块路径，而这是一个无效路径。


    ## 第2章 ■ 模块系统


    ### 可观察模块


    在模块查找过程中，模块系统使用不同类型的模块路径来定位模块。在模块路径上找到的模块集与系统模块一起被称为*可观察模块*。你可以将可观察模块视为在特定阶段（例如编译时、链接时和运行时）可供模块系统使用或可供工具使用的所有模块的集合。


    JDK 9为`java`命令添加了一个名为`--list-modules`的新选项。该选项可用于打印两种信息：可观察模块的列表以及一个或多个模块的描述。该选项有两种使用形式：


    - `--list-modules`

    - `--list-modules <module1>,<module2>...`


    在第一种形式中，选项后面不跟任何模块名称。它会打印可观察模块的列表。在第二种形式中，选项后面跟一个逗号分隔的模块名称列表，这会打印指定模块的模块描述符。


    以下命令打印可观察模块的列表，其中仅包含系统模块：


    ```

    c:\Java9Revealed> java --list-modules

    java.base@9-ea

    java.se.ee@9-ea

    java.sql@9-ea

    javafx.base@9-ea

    javafx.controls@9-ea

    jdk.jshell@9-ea

    jdk.unsupported@9-ea

    ...

    ```


    显示的输出是部分内容。输出中的每个条目包含两部分——模块名称和版本字符串，两者由`@`符号分隔。第一部分是模块名称，第二部分是模块的版本字符串。例如，在`java.base@9-ea`中，`java.base`是模块名称，`9-ea`是版本字符串。


    在版本字符串中，数字`9`代表JDK 9，`ea`代表*早期访问*。当你运行该命令时，可能会得到不同的版本字符串输出。


    我将三个模块化JAR放在了我的`C:\Java9Revealed\lib`目录中。如果我将`C:\Java9Revealed\lib`作为模块路径提供给`java`命令，这些模块将被包含在可观察模块列表中。


    以下命令展示了当指定模块路径时，可观察模块列表如何变化。这里，`lib`是一个相对路径，`C:\Java9Revealed`是当前目录。


    ```

    C:\Java9Revealed>java --module-path lib --list-modules

    claim (file:///C:/Java9Revealed/lib/claim.jar)

    policy (file:///C:/Java9Revealed/lib/policy.jar)

    java.base@9-ea

    java.xml@9-ea

    javafx.base@9-ea

    jdk.unsupported@9-ea

    jdk.zipfs@9-ea

    ...

    ```


    请注意，对于应用程序模块，`--list-modules`选项还会打印它们的位置。当你在排查问题、得到意外结果且不知道正在使用哪些模块以及它们来自何处时，此信息非常有用。


    以下命令将`com.jdojo.intro`模块作为参数传递给`--list-modules`选项，以打印该模块的描述：


    ```

    C:\Java9Revealed>java --module-path lib --list-modules claim

    module claim (file:///C:/Java9Revealed/lib/claim.jar)

    exports com.jdojo.claim

    requires java.sql (@9-ea)

    requires mandated java.base (@9-ea)

    contains pkg3

    ```


    输出的第一行包含模块名称和包含该模块的模块化JAR位置。第二行表示该模块导出了`com.jdojo.claim`包。第三行表示该模块需要`java.sql`模块。第四行表示该模块依赖于强制的`java.base`模块。回想一下，每个模块（除了`java.base`模块）都依赖于`java.base`模块。你会在每个模块的描述中看到`requires
    mandated java.base`这一行，但`java.base`模块除外。第五行说明该模块包含一个名为`pkg3`的包，该包既未导出也未开放。


    你也可以使用`--list-modules`打印系统模块（例如`java.base`和`java.sql`）的描述。以下命令打印`java.sql`模块的描述。


    ```

    C:\Java9Revealed>java --list-modules java.sql

    module java.sql@9-ea

    exports java.sql

    exports javax.sql

    exports javax.transaction.xa

    requires transitive java.xml

    requires mandated java.base

    requires transitive java.logging

    uses java.sql.Driver

    ```


    ## 总结


    在Java中，包一直被用作类型的容器。一个应用程序由放置在类路径上的几个JAR组成。包充当类型的容器，但并未强制执行任何可访问性边界。'
  raw: 'module path contains three elements—the path to a directory C:\lib and the
    paths to two modular JARs—com.jdojo.contact.jar and com.jdojo.person.jar. The
    equivalent of these paths on a UNIX-like platform are shown:


    • /usr/ksharan/mods


    • /usr/ksharan/mods/com.jdojo.contact.jar:/usr/ksharan/com.jdojo.person.jar


    • /usr/ksharan/lib:/usr/ksharan/mods/com.jdojo.contact.jar:/usr/ksharan/


    mods/com.jdojo.person.jar


    The best way to avoid module path problems is not to use an exploded directory
    as a module definition.


    Have two directories as the module path—one directory containing all application
    modular JARs and another containing all modular JARs for external libraries. For
    example, you can use C:\applib;C:\extlib as a module path on Windows where the
    C:\applib directory contains all application modular JARs and the C:\extlib directory
    contains all external libraries’ modular JARs.


    Chapter 2 ■ the Module SySteM


    JDK 9 has updated all its tools to use a module path to look up modules. Those
    tools provide new options to specify a module path. Until JDK 9, you have seen
    UNIX-style options that start with a hyphen (-), for example, -cp and -classpath.
    With so many additional options in JDK 9, JDK designers were running out of short
    names for options that were also meaningful to developers. Therefore, JDK 9 started
    using GNU-style options where an option starts with two consecutive hyphens and
    the words are separated by hyphens.


    Here are a few examples of GNU-style command-line options:


    • --class-path


    • --module-path


    • --module-version


    • --main-class


    • --print-module-descriptor


    ■ **Tip** to print a list of all standard options supported by a tool, run the
    tool with the --help or -h option and, for all non-standard options, run the tool
    with the -X option. For example, the java -h and java -X commands will print a
    list of standard and non-standard options for the java command, respectively.


    Most of the tools in JDK 9, such as javac, java, and jar, support two options
    to specify a module path on the command line. They are -p and --module-path. The
    existing UNIX-style options will continue to be supported for backward compatibility.
    The following two commands show you how to use the two options for specifying
    the module path for the java tool:


    // Using the GNU-style option


    C:\>java --module-path C:\applib;C:\lib other-args-go-here


    // Using the UNIX-style option


    C:\>java -p C:\applib;C:\extlib other-args-go-here


    I use the GNU-style option, --module-path, to specify the module path in all the
    examples in this book.


    When you use the GNU-style option, you can specify the value for the option in
    one of two forms:


    • --<name> <value>


    • --<name>=<value


    The previous command can also be written as follows:


    // Using the GNU-style option


    C:\>java --module-path**=**C:\applib;C:\lib other-args-go-here


    When using spaces as name-value separators, you need to use at least one space.
    When you are using a


    = as a separator, you must not include any spaces around it. The option --module-path=C:\applib
    is valid.


    The option --module-path =C:\applib is invalid because =C:\applib will be interpreted
    as a module path, which is an invalid path.


    Chapter 2 ■ the Module SySteM


    Observable Modules


    During the module lookup process, the module system uses different types of module
    paths to locate modules. The set of modules found on the module paths together
    with system modules are known as *observable modules*. You can think of observable
    modules as a set of all the modules available to the module system in a specific
    phase, for example, compile-time, link time, and runtime, or available to a tool.


    JDK 9 added a new option named --list-modules for the java command. The option
    can be used to print two types of information: the list of observable modules
    and a description of one or more modules. The option can be used in two forms:


    • --list-modules


    • --list-modules <module1>,<module2>...


    In the first form, the option is not followed with any module names. It prints
    the list of observable modules. In the second form, the option is followed with
    a comma-separated list of module names, which prints the module descriptors for
    the specified modules.


    The following command prints the list of observable modules, which includes only
    the system modules: c:\Java9Revealed> java --list-modules


    java.base@9-ea


    java.se.ee@9-ea


    java.sql@9-ea


    javafx.base@9-ea


    javafx.controls@9-ea


    jdk.jshell@9-ea


    jdk.unsupported@9-ea


    ...


    The output shown is partial. Each entry in the output contains two parts—a module
    name and a version string separated by an @ sign. The first part is the module
    name and the second part is the version string of the module. For example, in
    java.base@9-ea, java.base is the module name and 9-ea is the version string.


    In the version string, the number 9 stands for JDK 9 and ea stands for *early
    access*. You may get a different output for version strings when you run the command.


    I placed three modular JARs in my C:\Java9Revealed\lib directory. If I provide
    C:\Java9Revealed\lib as the module path to the java command, those modules will
    be included in the list of observable modules.


    The following command shows how the list of observable modules changes when you
    specify a module path.


    Here, lib is a relative path and C:\Java9Revealed is the current directory.


    C:\Java9Revealed>java --module-path lib --list-modules


    claim (file:///C:/Java9Revealed/lib/claim.jar)


    policy (file:///C:/Java9Revealed/lib/policy.jar)


    java.base@9-ea


    java.xml@9-ea


    javafx.base@9-ea


    jdk.unsupported@9-ea


    jdk.zipfs@9-ea


    ...


    Chapter 2 ■ the Module SySteM


    Note that, for application modules, the --list-modules option also prints their
    location. This information is helpful in troubleshooting when you are getting
    unexpected results and you do not know which modules are being used and from which
    locations.


    The following command specifies the com.jdojo.intro module as an argument to the
    --list-modules option to print the module’s description:


    C:\Java9Revealed>java --module-path lib --list-modules claim


    module claim (file:///C:/Java9Revealed/lib/claim.jar)


    exports com.jdojo.claim


    requires java.sql (@9-ea)


    requires mandated java.base (@9-ea)


    contains pkg3


    The first line of the output contains the module name and the modular JAR location
    containing the module. The second line indicates that the module exports the com.jdojo.claim
    module. The third line indicates that the module requires the java.sql module.
    The fourth line indicates that the module depends on the mandated java.base module.
    Recall that every module, except the java.base module, depends on the java.base
    module. You will see the requires mandated java.base line in every module’s description,
    except for the java.base module. The fifth line states that the module contains
    a package named pkg3, which is neither exported nor opened.


    You can also print the description of system modules, for example, java.base and
    java.sql, using the


    --list-modules. The following command prints the description of the java.sql module.


    C:\Java9Revealed>java --list-modules java.sql


    module java.sql@9-ea


    exports java.sql


    exports javax.sql


    exports javax.transaction.xa


    requires transitive java.xml


    requires mandated java.base


    requires transitive java.logging


    uses java.sql.Driver


    Summary


    Packages in Java have been used as containers for types. An application consisted
    of several JARs placed on the class path. Packages acted as containers for types
    without enforcing any accessibility boundaries.'
