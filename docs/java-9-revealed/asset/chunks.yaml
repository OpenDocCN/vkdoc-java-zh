- fmt: '# Reactive Streams


    These four interfaces contain the same methods as shown in Listing [17-1. T](#index_split_007.html#428)he
    `Flow` class contains a static method named `defaultBufferSize()` that returns
    the default size for buffers used by publishers and subscribers. Currently, it
    returns 256.


    The `SubmissionPublisher<T>` class is an implementation class for the `Flow.Publisher<T>`
    interface. The class implements the `AutoCloseable` interface, so you can manage
    its instances using a try-with-resources block. JDK 9 does not provide an implementation
    class for the `Flow.Subscriber<T>` interface; you will need to implement it yourself.
    However, the `SubmissionPublisher<T>` class contains a `consume(Consumer<? super
    T> consumer)` method that you can use to process all items published by this publisher.
    I explain it in more detail with examples later.


    ## Publisher-Subscriber Interactions


    Before you start using the JDK API, it is important to understand the sequence
    of events that occurs in a typical publisher-subscriber session using Reactive
    Streams. I include the methods that are used in each event. A publisher can have
    zero or more subscribers. For the purpose of this discussion, I use only one subscriber.


    - You create a publisher and a subscriber and they are instances of the `Flow.Publisher`
    and `Flow.Subscriber` interfaces, respectively.

    - The subscriber attempts to subscribe to the publisher by calling the `subscribe()`
    method of the publisher. If the subscription is successful, the publisher asynchronously
    calls the `onSubscribe()` method of the subscriber with a `Flow.Subscription`.
    If the attempt to subscribe fails, the `onError()` method of the subscriber is
    called with an `IllegalStateException` and the publisher-subscriber interaction
    ends.

    - The subscriber sends a request to the publisher for N items by calling the `request(N)`
    method of the `Subscription`. The subscriber can send multiple requests for more
    items to the publisher without waiting for its earlier requested to be fulfilled.

    - The publisher calls the `onNext(T item)` method of the subscriber up to the
    number of items requested by the subscriber in all its previous requests—sending
    an item to the subscriber in each call. If the publisher has no more items to
    send to the subscriber, the publisher calls the `onComplete()` method of the subscriber
    to signal the end of stream, thus ending the publisher-subscriber interaction.
    If a subscriber requests `Long.MAX_VALUE` elements, it is effectively an unbounded
    request and the stream is effectively a push stream.

    - If the publisher encounters an error at any time, it calls the `onError()` method
    of the subscriber.

    - The subscriber can cancel its subscription by calling the `cancel()` method
    of its `Flow.Subscription`. Once a subscription is cancelled, the publisher-subscriber
    interaction ends. However, it is possible for the subscriber to receive items
    after canceling its subscription if there were pending requests before requesting
    the cancellation.


    To summarize the previous steps for terminal conditions, once the `onComplete()`
    or `onError()` method is called on the subscriber, the subscriber does not receive
    any more notifications from the publisher.


    After the `subscribe()` method of the publisher is called, the following sequence
    of method calls on the subscriber is guaranteed, assuming that the subscriber
    does not cancel its subscription:


    ```

    onSubscribe onNext* (onError | onComplete)?

    ```


    Here, the symbols, `*` and `?`, are used as keywords in a regular expression—an
    `*` meaning zero or more occurrences and a `?` meaning zero or one occurrence.


    The first method call on the subscriber is the `onSubscribe()` method, which is
    a notification for a successful subscription to the publisher. The `onNext()`
    method of the subscriber may be called zero of more times, each call indicating
    publication of an item. One of the `onComplete()` and `onError()` methods may
    be called zero or one times to indicate a terminate state; one of these methods
    is called as long as the subscriber does not cancel its subscription.'
