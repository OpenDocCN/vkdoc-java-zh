    • ModuleLayer defineModulesWithManyLoaders(Configuration cf, ClassLoader


    parentClassLoader)


    • static ModuleLayer.Controller defineModulesWithManyLoaders(Configuration


    cf, List<ModuleLayer> parentLayers, ClassLoader parentLoader)


    • ModuleLayer defineModulesWithOneLoader(Configuration cf, ClassLoader


    parentClassLoader)


    • static ModuleLayer.Controller defineModulesWithOneLoader(Configuration


    cf, List<ModuleLayer> parentLayers, ClassLoader parentLoader)


