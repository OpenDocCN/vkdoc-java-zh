- fmt: '# `jdk.unsupported` Module


    ## In JDK 9


    ***Figure 8-6.** Categories of JDK APIs based on their intended use*


    Before modularization in JDK 9, it was possible to use any public classes from
    any JAR, even if those classes made up the JDK internal APIs. Developers and a
    few widely used libraries have been using JDK internal APIs for convenience or
    because the functionalities provided by those APIs were difficult to implement
    outside the JDK. Examples of such classes are `BASE64Encoder` and `BASE64Decoder`.
    They were used by developers for convenience because they were available as the
    JDK internal APIs in the `sun.misc` package, even though they were not difficult
    to develop. Another widely used class was the `Unsafe` class from the `sun.misc`
    package. It was difficult to develop a class outside the JDK to replace the `Unsafe`
    class because it accessed JDK internals.


    Internal APIs that are used merely for convenience are not used outside the JDK
    or the supported replacements that exist for them have been categorized as non-critical
    internal APIs and they have been encapsulated in JDK 9. Examples are the `BASE64Encoder`
    and `BASE64Decoder` classes in the `sun.misc` package, which were added to JDK
    8 in the `java.util` package as the `Base64.Encoder` and `Base64.Decoder` classes
    as part of the public APIs.


    ## Chapter 8 ■ Breaking Changes in JDK 9


    Internal APIs that were widely used but difficult to develop outside the JDK are
    categorized as critical internal APIs. They have been encapsulated in JDK 9 if
    their replacements exist. Critical internal APIs that are encapsulated in JDK
    9 but can be used using a command-line option have been annotated with the `@jdk.Exported`
    annotation. JDK 9 does not provide replacements for the following classes, which
    are considered critical internal APIs. They are accessible through the `jdk.unsupported`
    module.


    - `com.sun.nio.file.ExtendedCopyOption`

    - `com.sun.nio.file.ExtendedOpenOption`

    - `com.sun.nio.file.ExtendedWatchEventModifier`

    - `com.sun.nio.file.SensitivityWatchEventModifier`

    - `sun.misc.Signal`

    - `sun.misc.SignalHandler`

    - `sun.misc.Unsafe`

    - `sun.reflect.Reflection`

    - `sun.reflect.ReflectionFactory`


    > **Tip** In JDK 9, most of the JDK internal APIs have been encapsulated in modules
    and are not accessible by default. You can still access them using the `--add-reads`
    non-standard command-line option.


    The `addPropertyChangeListener()` and `removePropertyChangeListener()` methods
    in the following classes were deprecated in JDK 8 and have been removed from JDK
    9:


    - `java.util.logging.LogManager`

    - `java.util.jar.Pack200.Packer`

    - `java.util.jar.Pack200.Unpacker`


    You can use the `jdeps` tool, which is located in the `JAVA_HOME\bin` directory,
    to find the class-level dependency of your code on the JDK internal APIs. You
    also need to use the `--jdk-internals` option as shown:


    ```

    jdeps --jdk-internals --class-path <class-path> <input-path>

    ```


    ## Chapter 8 ■ Breaking Changes in JDK 9


    Here, `<input-path>` can be a path to a class file, a directory, or a JAR file.
    The command analyzes all classes on the `<input-path>` and `<class-path>`. The
    following command prints the usage of JDK internal APIs in the `jersey-common.jar`
    file, assuming that the JAR is in the `C:\Java9Revealed\extlib` directory.


    A partial output is shown:


    ```

    C:\Java9Revealed>jdeps --jdk-internals extlib\jersey-common.jar


    jersey-common.jar -> jdk.unsupported


    org.glassfish.jersey.internal.util.collection.ConcurrentHashMapV8 -> sun.misc.Unsafe
    JDK internal API (jdk.unsupported)


    org.glassfish.jersey.internal.util.collection.ConcurrentHashMapV8$TreeBin -> sun.misc.Unsafe
    JDK internal API (jdk.unsupported)


    ...

    ```


    ## Patching Module Contents


    Sometimes, you may want to replace class files and resources of specific modules
    with another version for testing and debugging purposes. Before JDK 9, you were
    able to achieve this using the `-Xbootclasspath/p` option. This option has been
    removed in JDK 9. In JDK 9, you need to use the `--patch-module` non-standard
    command-line option. This option is available with `javac` and `java` commands.
    Its syntax is as follows:'
