    \ API 支持（如果当前平台支持这些功能）。为了支持如此多的新桌面功能，Java SE 9 在 `java.desktop` 模块中添加了一个新包 `java.awt.desktop`。`java.awt.Desktop`\
    \ 类也新增了许多方法。在 JDK 9 中，`Desktop` API 支持 24 种平台特定的桌面操作和通知，例如当连接的显示器进入或退出省电模式时、系统进入睡眠模式后或系统唤醒后等通知。\n\
    \n为了解决反序列化带来的安全风险，JDK 9 引入了对象输入过滤器的概念，可用于验证正在反序列化的对象，如果未通过测试，则可以停止反序列化过程。对象输入过滤器是新接口\
    \ `java.io.ObjectInputFilter` 的实例。您可以指定一个系统范围的全局过滤器，该过滤器可在反序列化任何对象时使用。可以使用新的 `jdk.serialFilter`\
    \ 系统属性、`JAVA_HOME\\conf\\security\\java.security` 文件中名为 `jdk.serialFilter` 的属性，或使用\
    \ `ObjectInputFilter.Config` 类的 `setSerialFilter()` 方法来指定全局过滤器。可以使用 `ObjectInputStream`\
    \ 的 `setObjectInputFilter()` 方法在其上设置本地过滤器，该过滤器会覆盖全局过滤器。\n\n`java.io.InputStream`\
