    \n## `--add-reads`选项\n\n`--add-reads`选项并非用于打破封装，而是用于增加模块的可读性。在测试和调试过程中，有时一个模块需要读取另一个模块，即使前者并不依赖于后者。模块声明中的`requires`语句用于声明当前模块对另一个模块的依赖。你可以使用`--add-reads`命令行选项为从一个模块到另一个模块添加可读性边。这相当于在第一个模块中添加一条`requires`语句。其语法如下：\n\
