    ## Chapter 7: Creating Custom Runtime Images


    Let’s create a runtime image that contains the four modules for the prime checker
    application and the required platform modules, which includes only the `java.base`
    module. Note that the following command includes only three modules from the prime
    checker application. The fourth one will be added because these three depend on
    that fourth module. The text following the command explains this in detail.


    ```

    C:\Java9Revealed>jlink --module-path jmods;C:\java9\jmods

    --add-modules com.jdojo.prime.client,com.jdojo.prime.generic,com.jdojo.prime.faster

    --launcher runprimechecker=com.jdojo.prime.client

    --output primechecker

    ```


    Before I explain all the options for this command, let’s verify that the runtime
    image was created successfully. The command is supposed to copy the runtime image
    to the `C:\Java9Revealed\primechecker` folder. Run the following command to verify
    that the runtime image contains the five modules:


    ```

    C:\Java9Revealed>primechecker\bin\java --list-modules

    com.jdojo.prime@1.0

    com.jdojo.prime.client@1.0

    com.jdojo.prime.faster@1.0

    com.jdojo.prime.generic@1.0

    java.base@9-ea

    ```


    If you get an output, which is similar to the shown here, the runtime image was
    created correctly. The module version number, which is shown after the `@` sign
    in the output, may be different for you.


    The `--module-path` option specifies two directories, `jmods` and `C:\java9\jmods`.
    I saved the four JMOD files for the prime checker application in the `C:\Java9Revealed\jmods`
    directory. The first element in the module path lets the `jlink` tool find all
    application modules. I installed the JDK 9 in the `C:\java9` directory, so the
    second element in the module path lets the tool find the platform modules. If
    you do not specify the second part, you get an error:


    ```

    Module java.base not found.

    ```


    The `--add-modules` option specifies three modules of the prime checker application.
    You might wonder why we did not specify the fourth module `com.jdojo.prime` with
    this option. This list contains root modules, not just the modules to be included
    in the runtime image. The `jlink` tool will resolve all dependencies transitively
    for these root modules and include all the resolved dependent modules into the
    runtime image.


    The three modules depend on the `com.jdojo.prime` module, which will be resolved
    by locating it on the module path and, hence, will be included in the runtime
    image. The image will also contain the `java.base` module because all application
    modules implicitly depend on it.


    The `--output` option specifies the directory where the runtime image will be
    copied. The command will copy the runtime image to the `C:\Java9Revealed\primechecker`
    directory. The output directory contains the following subdirectories and a file
    named `release`:


    - `bin`

    - `conf`

    - `include`

    - `legal`

    - `lib`


    The `bin` directory contains executable files. On Windows, it also contains dynamically-linked
    native libraries (`.dll` files).


    The `conf` directory contains the editable configuration files such as `.properties`
    and `.policy` files.


    The `include` directory contains C/C++ header files.


    The `legal` directory contains legal notices.


    The `lib` directory contains, among other files, the modules added to the runtime
    image. On Mac, Linux, and Solaris, it will also contain the system’s dynamically-linked
    native libraries.


    You used the `--launcher` option with the `jlink` command. You specified a command
    name, `runprimechecker`, and the module name was `com.jdojo.prime.client`. The
    `--launcher` option makes `jlink` create a platform-specific executable such as
    a `runprimechecker.bat` file on Windows in the `bin` directory. You can use this
    executable to run your application. The file contents are simply a wrapper for
    running the main class in this module. You can use this file to run the application:


    ```

    C:\Java9Revealed> primechecker\bin\runprimechecker

    Using jdojo.faster.primechecker:

    3 is a prime.

    4 is not a prime.

    121 is not a prime.

    977 is a prime.

    Using jdojo.faster.primechecker:

    3 is a prime.

    4 is not a prime.

    121 is not a prime.

    977 is a prime.

    A PrimeChecker service provider with the name ''jdojo.probable.primechecker''
    was not found.

    ```


    You can also use the `java` command, which is copied to the `bin` directory by
    the `jlink` tool, to launch your application:


    ```

    C:\Java9Revealed>primechecker\bin\java --module com.jdojo.prime.client

    ```


    The output of this command will be the same as that of the previous command. Notice
    that you did not have to specify the module path. The linker, the `jlink` tool,
    took care of the module path when the runtime image was created. When you run
    the `java` command of the generated runtime image, it knows where to find the
    modules. Also notice that you did not have to specify the main class name to the
    command. You just specified the module name. You had already set the `main-class`
    attribute for the `com.jdojo.prime.client` module. When you run a module without
    specifying the main class, the `main-class` attribute set in the `module-info.class`
    file for that module is used as the main class.


    ### Binding Services


    In the previous section, you created a runtime image for the prime service client
    application. You had to specify the names of all service provider modules with
    the `--add-modules` option that you wanted to include in the image. In this section,
    I will show you how to bind services automatically while creating a runtime image
    using the `--bind-services` option with the `jlink` tool. This time, you need
    to add the module, which is the `com.jdojo.prime` module, to the module graph
    and the `jlink` tool will take care of the rest. The `com.jdojo.prime.client`
    module reads the `com.jdojo.prime` module, so adding the former into the module
    graph will also resolve the latter. The following command prints the list of suggested
    service providers for the runtime image. A partial output is shown.


    ```

    C:\Java9Revealed>jlink --module-path jmods;C:\java9\jmods

    --add-modules com.jdojo.prime.client

    --suggest-providers

    module com.jdojo.prime located (file:///C:/Java9Revealed/jmods/com.jdojo.prime.jmod)

    uses com.jdojo.prime.PrimeChecker

    module com.jdojo.prime.client located (file:///C:/Java9Revealed/jmods/com.jdojo.prime.client.jmod)

    module java.base located (file:///C:/java9/jmods/java.base.jmod)

    uses java.lang.System$LoggerFinder

    uses java.net.ContentHandlerFactory

    ...

    Suggested providers:

    module com.jdojo.prime.faster provides com.jdojo.prime.PrimeChecker, used by com.jdojo.prime

    module com.jdojo.prime.generic provides com.jdojo.prime.PrimeChecker, used by
    com.jdojo.prime

    module com.jdojo.prime.probable provides com.jdojo.prime.PrimeChecker, used by
    com.jdojo.prime

    module java.desktop provides java.net.ContentHandlerFactory, used by java.base

    ...

    ```


    The command specifies only the `com.jdojo.prime.client` module to the `--add-modules`
    option. The `com.jdojo.prime` and `java.base` modules are resolved because the
    `com.jdojo.prime.client` module reads them. All resolved modules are scanned for
    the `uses` statement and, subsequently, all modules in the module path are scanned
    for service providers for the services specified in the `uses` statement. All
    service providers that are found are printed.'
