- fmt: "# 排版后的内容\n\nLower than N are searched. This process continues for all sub-directories\
    \ under the `META-INF/versions` directory.\n\n- When R is not found in the `META-INF/versions/N`\
    \ sub-directories, the root directory of the MRJAR is searched for R.\n\nLet’s\
    \ take an example using the previously shown structure of the MRJAR. Suppose the\
    \ program is looking for `C3.class` and the current version of the JDK is 10.\
    \ The search will start at `META-INF/versions/10`, where `C3.class` is not found.\
    \ The search continues in `META-INF/versions/9`, where `C3.class` is not found.\
    \ Now the search continues in the root directory, where `C3.class` is found.\n\
    \nAs another example, suppose you want to find `C2.class` when the JDK version\
    \ is 10. The search starts at `META-INF/versions/10`, where `C2.class` is found\
    \ and returned.\n\nAs another example, suppose you want to find `C2.class` when\
    \ the JDK version is 9. The search starts at `META-INF/versions/9`, where `C2.class`\
    \ is found and returned.\n\nAs another example, suppose you want to find `C2.class`\
    \ when the JDK version is 8. There is no JDK 8 specific directory named `META-INF/versions/8`.\
    \ So, the search starts at the root directory, where `C2.class` is found and returned.\n\
    \n**Tip:** In JDK 9, all tools that process Jars—such as `java`, `javac`, and\
    \ `javap`—have been modified to work with multi-release Jars. APIs dealing with\
    \ Jars have also been updated to deal with multi-release Jars.\n\n## Creating\
    \ Multi-Release JARs\n\nOnce you know the search order of the directories in a\
    \ MRJAR when a resource or class file is searched on a specific JDK version, it\
    \ is easy to understand how classes and resources are found. There are some rules\
    \ on the contents of JDK version-specific directories. I describe those rules\
    \ in subsequent sections. In this section, I focus on creating MRJARs.\n\nTo run\
    \ this example, you need JDK 8 and JDK 9 installed on your machine. If you do\
    \ not have JDK 8, any other JDK in addition to JDK 9 will do. For the JDK other\
    \ than version 8, you will need to change the code in the example, so the code\
    \ will compile with your JDK.\n\nI use a MRJAR to store the JDK 8 and JDK 9 versions\
    \ of an application. The application consists of the following two classes:\n\n\
    - `com.jdojo.mrjar.Main`\n- `com.jdojo.mrjar.TimeUtil`\n\nThe `Main` class creates\
    \ an object of the `TimeUtil` class and calls a method in it. The `Main` class\
    \ can be used as a main class to run the application. The `TimeUtil` class contains\
    \ a `getLocalDate(Instant now)` method that takes an `Instant` as an argument\
    \ and returns a `LocalDate` interpreting the instant in the current time zone.\
    \ JDK 9 has added a new method to the `LocalDate` class, which is named `ofInstant(Instant\
    \ instant, ZoneId zone)`. We will update the application to use JDK 9 to take\
    \ advantage of this new method in JDK 9 and will keep the old application that\
    \ used the JDK 8 Time API for the same purpose.\n\nThe source code contains two\
    \ NetBeans projects named `com.jdojo.mrjar.jdk8` and `com.jdojo.mrjar.jdk9`, which\
    \ are configured to use JDK 8 and JDK 9, respectively. Listing 6-1 and Listing\
    \ 6-2 contain the code for the `TimeUtil` and `Main` class for JDK 8. In NetBeans,\
    \ you need to change the Sources and Libraries properties for the `com.jdojo.mrjar.jdk8`\
    \ project to JDK 8 and for the `com.jdojo.mrjar.jdk9` project to JDK 9. The source\
    \ code for these projects is simple, so I will not provide any explanation. I\
    \ could have made the `getLocalDate()` method in the `TimeUtil` class a static\
    \ method. I kept it as an instance method, so you can see in the output (discussed\
    \ later) which version of the class is instantiated. When you run the `Main` class,\
    \ it prints the current local date, which may be different when you run this example.\n\
    \n**Listing 6-1.** A TimeUtil Class for JDK 8\n\n```java\n// TimeUtil.java\npackage\
    \ com.jdojo.mrjar;\n\nimport java.time.Instant;\nimport java.time.LocalDate;\n\
    import java.time.ZoneId;\n\npublic class TimeUtil {\n    public TimeUtil() {\n\
    \        System.out.println(\"Creating JDK 8 version of TimeUtil...\");\n    }\n\
    }\n```"
