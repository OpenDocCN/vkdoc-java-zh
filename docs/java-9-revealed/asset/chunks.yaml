    设置启动代码片段


    您可以使用带有 `start` 参数的 `/set` 命令来设置您的启动代码片段和命令。


    启动代码片段和命令会在您启动 jshell 时自动执行。您已经看到了默认的启动代码片段，它们从几个常用包中导入类型。通常，您会使用 `/env` 命令设置类路径和模块路径，并将
    import 语句添加到您的启动脚本中。


    您可以使用 `/list -start` 命令打印默认启动代码片段的列表。请注意，此命令打印的是默认启动代码片段，而不是当前的启动代码片段。请记住，您也可以删除启动代码片段。默认启动代码片段包括您启动
    jshell 时获得的内容。当前启动代码片段包括默认启动代码片段减去您在当前 jshell 会话中删除的那些。


    您可以使用以下 `/set` 命令形式之一来设置启动代码片段/命令：


    • `/set start [-retain] <file>`


    • `/set start [-retain] -default`


    • `/set start [-retain] -none`


    使用 `-retain` 选项是可选的。如果使用，该设置将在多个 jshell 会话间持久保留。


    第一种形式用于从文件设置启动代码片段/命令。当在当前会话中执行 `/reset` 或 `/reload` 命令时，文件的内容将用作启动代码片段/命令。


    一旦您从文件设置了启动代码，jshell 会缓存文件内容以供将来使用。修改文件内容不会影响启动代码，直到您再次设置启动代码片段/命令。


    第二种形式用于将启动代码片段/命令设置为内置默认值。


    第三种形式用于设置空的启动内容。也就是说，启动时将不会执行任何代码片段/命令。

    '
- fmt: '`/set start`命令不带任何选项或文件时，会显示当前的启动设置。如果启动设置是从文件设置的，它会显示文件名、启动片段以及设置启动片段的时间。


    考虑以下场景。本书源代码中的`com.jdojo.jshell`目录包含一个`com.jdojo.jshell.Person`类。让我们在`jshell`中测试这个类，并使用`java.time`包中的类型。为此，你的启动设置将如清单[11-3](#index_split_005.html#316)所示。


    **清单 11-3.** 名为`startup.jsh`的文件内容


    ```

    /env -class-path C:\Java9Revealed\com.jdojo.jshell\build\classes


    import java.io.*

    import java.math.*

    import java.net.*

    import java.nio.file.*

    import java.util.*

    import java.util.concurrent.*

    import java.util.function.*

    import java.util.prefs.*

    import java.util.regex.*

    import java.util.stream.*

    import java.time.*;

    import com.jdojo.jshell.*;


    void printf(String format, Object... args) { System.out.printf(format, args);
    }

    ```


    将设置保存在当前目录下名为`startup.jsh`的文件中。如果保存在其他目录，在处理此示例时可以使用该文件的绝对路径。请注意，第一条命令是`/env -class-path`命令（针对Windows系统），假设你将源代码存储在`C:\`目录下。请根据你的平台以及本书源代码在你计算机上的位置更改类路径值。


    注意`startup.jsh`文件中的最后一个片段。它定义了一个名为`printf()`的顶级函数，该函数是`System.out.printf()`方法的包装器。`printf()`函数最初默认包含在`JShell`工具的初始构建中，后来被移除了。如果你想使用简短的方法名（例如`printf()`）代替`System.out.printf()`来在标准输出上打印消息，可以将此片段包含在你的启动脚本中。如果你想在`jshell`中默认使用`println()`和`printf()`顶级方法，你需要按如下方式启动`jshell`：


    ```

    C:\Java9Revealed>jshell --start DEFAULT --start PRINTING

    ```


    `DEFAULT`参数将包含所有默认的导入语句，`PRINTING`参数将包含`print()`、`println()`和`printf()`方法的所有版本。使用此命令启动`jshell`后，执行`/list
