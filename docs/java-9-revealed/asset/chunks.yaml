    \ Module\n\n```java\n// module-info.java\nmodule com.jdojo.person {\n    // Read\
    \ the com.jdojo.address module\n    requires transitive com.jdojo.address;\n \
    \   // Export the com.jdojo.person package\n    exports com.jdojo.person;\n}\n\
    ```\n\nNow, you can remove the `requires` statement that reads the `com.jdojo.address`\
