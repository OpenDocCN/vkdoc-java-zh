    我将按方法解释 `LayerTest` 类中的逻辑。`main()` 方法声明了一个名为 `CUSTOM_MODULE_LOCATION` 的变量，该变量存储了
    `com.jdojo.layer` 模块版本 2.0 的位置。您必须更改此路径，使其指向您电脑上包含 `com.jdojo.layer` 模块版本 2.0
    编译后模块代码的目录。


