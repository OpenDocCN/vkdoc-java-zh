- fmt: "JDK 9 向`Map`接口添加了一个重载的`of()`静态工厂方法。它提供了一种简单且紧凑的方式来创建不可修改的映射。这些方法的实现针对性能进行了微调。\n\
    \n以下是`of()`方法的11个版本，允许你创建包含零到十个键值条目的不可修改`Map`：\n\n- `static <K,V> Map<K,V> of()`\n\
    - `static <K,V> Map<K,V> of(K k1, V v1)`\n- `static <K,V> Map<K,V> of(K k1, V\
    \ v1, K k2, V v2)`\n- `static <K,V> Map<K,V> of(K k1, V v1, K k2, V v2, K k3,\
    \ V v3)`\n- `static <K,V> Map<K,V> of(K k1, V v1, K k2, V v2, K k3, V v3, K k4,\
    \ V v4)`\n- `static <K,V> Map<K,V> of(K k1, V v1, K k2, V v2, K k3, V v3, K k4,\
    \ V v4, K k5, V v5)`\n- `static <K,V> Map<K,V> of(K k1, V v1, K k2, V v2, K k3,\
    \ V v3, K k4, V v4, K k5, V v5, K k6, V v6)`\n- `static <K,V> Map<K,V> of(K k1,\
    \ V v1, K k2, V v2, K k3, V v3, K k4, V v4, K k5, V v5, K k6, V v6, K k7, V v7)`\n\
    - `static <K,V> Map<K,V> of(K k1, V v1, K k2, V v2, K k3, V v3, K k4, V v4, K\
    \ k5, V v5, K k6, V v6, K k7, V v7, K k8, V v8)`\n- `static <K,V> Map<K,V> of(K\
    \ k1, V v1, K k2, V v2, K k3, V v3, K k4, V v4, K k5, V v5, K k6, V v6, K k7,\
    \ V v7, K k8, V v8, K k9, V v9)`\n- `static <K,V> Map<K,V> of(K k1, V v1, K k2,\
    \ V v2, K k3, V v3, K k4, V v4, K k5, V v5, K k6, V v6, K k7, V v7, K k8, V v8,\
    \ K k9, V v9, K k10, V v10)`\n\n注意`of()`方法中参数的位置。第一个和第二个参数分别是映射中第一个键值条目的键和值；第三个和第四个参数分别是映射中第二个键值条目的键和值；以此类推。请注意，没有像`List`和`Set`中那样的`of()`方法的可变参数版本。这是因为一个`Map`条目包含两个值（键和值），而在Java中一个方法只能有一个可变参数。以下代码片段展示了如何使用`of()`方法创建映射：\n\
    \n```java\n// 一个空的、不可修改的 Map\nMap<Integer, String> emptyMap = Map.of();\n\n//\
    \ 一个单例的、不可修改的 Map\nMap<Integer, String> singletonMap = Map.of(1, \"One\");\n\n\
    // 一个包含两个条目的不可修改 Map\nMap<Integer, String> luckyNumbers = Map.of(1, \"One\", 2,\
    \ \"Two\");\n```\n\n为了创建一个包含任意数量条目的不可修改`Map`，JDK 9 在`Map`接口中提供了一个名为`ofEntries()`的静态方法，其签名如下：\n\
    \n`<K,V> Map<K,V> ofEntries(Map.Entry<? extends K,? extends V>... entries)`\n\n\
    要使用`ofEntries()`方法，你需要将每个映射条目包装在一个`Map.Entry`实例中。JDK 9 在`Map`接口中提供了一个方便的`entry()`静态方法来创建`Map.Entry`的实例。`entry()`方法的签名如下：\n\
    \n`<K,V> Map.Entry<K,V> entry(K k, V v)`\n\n为了使表达式可读且紧凑，你需要对`Map.entry`方法使用静态导入，并使用类似下面的语句来创建一个包含任意数量条目的不可修改`Map`：\n\
    \n```java\nimport java.util.Map;\nimport static java.util.Map.entry;\n\n// ...\n\
    \n// 使用 Map.ofEntries() 和 Map.entry() 方法\n// 创建一个不可修改的 Map\nMap<Integer, String>\
    \ numberToWord =\n    Map.ofEntries(entry(1, \"One\"),\n                  entry(2,\
    \ \"Two\"),\n                  entry(3, \"Three\"));\n```\n\n从`Map`接口的`of()`和`ofEntries()`方法返回的映射具有以下特性：\n\
    \n- 它们在结构上是不可变的。尝试添加、替换或删除条目会抛出`UnsupportedOperationException`。\n- 它们不允许键或值为`null`。如果映射中的键或值为`null`，则会抛出`NullPointerException`。\n\
    - 如果所有键和值都是可序列化的，则它们是可序列化的。\n- 它们不允许重复的键。指定重复的键会抛出`IllegalArgumentException`。\n\
    - 映射的迭代顺序是未指定的。\n- 不保证返回的`Map`的实现类。也就是说，不要期望返回的对象是`HashMap`或任何其他实现`Map`接口的类。这些方法的实现是内部的，你不应对它们的类名做任何假设。例如，`Map.of()`和`Map.of(1,\
    \ \"One\")`可能返回两个不同类的对象。\n\n`Collections`类包含一个名为`EMPTY_MAP`的静态字段，表示一个不可变的空映射。它还包含一个名为`emptyMap()`的静态方法，用于获取一个不可变的空映射。其`singletonMap(K\
    \ key, V value)`方法返回一个包含指定键和值的不可变单例映射。以下代码片段展示了在JDK 9之前和JDK 9中创建不可变空映射和单例映射的方法：\n\
    \n```java\n// 在 JDK 9 之前创建一个空的、不可变的 Map\nMap<Integer,String> emptyMap1 = Collections.EMPTY_MAP;\n\
    Map<Integer,String> emptyMap2 = Collections.emptyMap();\n\n// 在 JDK 9 中创建一个空的\
    \ Map\nMap<Integer,String> emptyMap = Map.of();\n\n// 在 JDK 9 之前创建一个单例的、不可变的 Map\n\
    Map<Integer,String> singletonMap1 =\n    Collections.singletonMap(1, \"One\");\n\
    \n// 在 JDK 9 中创建一个单例的、不可变的 Map\nMap<Integer,String> singletonMap = Map.of(1, \"\
    One\");\n```\n\n清单 [13-4](#index_split_005.html#351) 包含一个完整的程序，展示了如何使用`Map`接口的`of()`、`ofEntries()`和`entry()`静态方法来创建不可修改的映射。请注意映射中指定日期的顺序以及它们在输出中显示的顺序。它们可能不匹配，因为映射不像集合那样保证其条目的检索顺序。\n\
    \n***清单 13-4.*** 使用 `Map.of()`、`Map.ofEntries()` 和 `Map.entry()` 静态方法创建不可修改的映射\n\
    \n```java\n// MapTest.java\npackage com.jdojo.collection;\n\nimport java.util.Map;\n\
    import static java.util.Map.entry;\n\npublic class MapTest {\n    public static\
    \ void main(String[] args) {\n        // 创建几个不可修改的映射\n        Map<Integer,String>\
    \ emptyMap = Map.of();\n        Map<Integer,String> luckyNumber = Map.of(19, \"\
    Nineteen\");\n        Map<Integer,String> numberToWord =\n            Map.of(1,\
    \ \"One\", 2, \"Two\", 3, \"Three\");\n        Map<String,String> days = Map.ofEntries(\n\
    \            entry(\"Mon\", \"Monday\"),\n            entry(\"Tue\", \"Tuesday\"\
    ),\n            entry(\"Wed\", \"Wednesday\"),\n            entry(\"Thu\", \"\
    Thursday\"),\n            entry(\"Fri\", \"Friday\"),\n            entry(\"Sat\"\
    , \"Saturday\"),\n            entry(\"Sun\", \"Sunday\"));\n\n        System.out.println(\"\
    emptyMap = \" + emptyMap);\n        System.out.println(\"singletonMap = \" + luckyNumber);\n\
    \        System.out.println(\"numberToWord = \" + numberToWord);\n        System.out.println(\"\
    days = \" + days);\n\n        try {\n            // 尝试使用 null 值\n            Map<Integer,String>\
    \ map = Map.of(1, null);\n        } catch(NullPointerException e) {\n        \
    \    System.out.println(\"Nulls not allowed in Map.of().\");\n        }\n\n  \
    \      try {\n            // 尝试使用重复的键\n            Map<Integer,String> map = Map.of(1,\
    \ \"One\", 1, \"On\");\n        } catch(IllegalArgumentException e) {\n      \
    \      System.out.println(e.getMessage());\n        }\n\n        try {\n     \
    \       // 尝试添加一个条目\n            luckyNumber.put(8, \"Eight\");\n        } catch(UnsupportedOperationException\
    \ e) {\n            System.out.println(\"Cannot add an entry.\");\n        }\n\
    \n        try {\n            // 尝试移除一个条目\n            luckyNumber.remove(0);\n\
    \        } catch(UnsupportedOperationException e) {\n            System.out.println(\"\
    Cannot remove an entry.\");\n        }\n    }\n}\n```\n\n```\nemptyMap = {}\n\
    singletonMap = {19=Nineteen}\nnumberToWord = {1=One, 3=Three, 2=Two}\ndays = {Sat=Saturday,\
    \ Tue=Tuesday, Thu=Thursday, Sun=Sunday, Wed=Wednesday,\nFri=Friday, Mon=Monday}\n\
    Nulls not allowed in Map.of().\nduplicate key: 1\nCannot add an entry.\nCannot\
    \ remove an entry.\n```\n\n## 总结"
  raw: 'JDK 9 added an overloaded of() static factory method to the Map interface.
    It provides a simple and compact way to create unmodifiable maps. The methods’
    implementations are fine-tuned for performance.


    The following are 11 versions of the of() method that let you create an unmodifiable
    Map of zero to ten key-value entries:


    • static <K,V> Map<K,V> of()


    • static <K,V> Map<K,V> of(K k1, V v1)


    • static <K,V> Map<K,V> of(K k1, V v1, K k2, V v2)


    • static <K,V> Map<K,V> of(K k1, V v1, K k2, V v2, K k3, V v3)


    • static <K,V> Map<K,V> of(K k1, V v1, K k2, V v2, K k3, V v3, K k4, V v4)


    • static <K,V> Map<K,V> of(K k1, V v1, K k2, V v2, K k3, V v3, K k4, V v4,


    K k5, V v5)


