    \ 2 is executed, it already existed. Note that it declares the same variable named\
    \ `x` with a different data type. Its previous status was `VALID` and its current\
    \ status is `VALID` too. The execution of this snippet changes the status of snippet\
    \ 1, whose status changes from `VALID` to `OVERWRITTEN`, because you cannot have\
