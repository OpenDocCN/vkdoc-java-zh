    for a major release that that contains significant new features. For example,
    the major release for JDK 8 is 8 and for JDK 9 it’s 9\. When the major version
    number is incremented, all other parts in the version number are removed. For
    example, if you have a version number of 9.2.2.1, the new version number will
    be 10 when the major version number is incremented from 9 to 10.


    The $minor element represents the minor version of a JDK release. It is incremented
    for a minor update release such as for bug fixes, new garbage collectors, new
    JDK-specific APIs, etc.


    The $security element represents the security-level updates of a JDK release.
    It is incremented for a security update. This element is not reset when the minor
    version number is incremented. A higher value of $security for a given $major
    always indicates a more secure release. For example, a JDK release 9.1.7 is as
    secure as the JDK release 9.5.7 because the security level for both releases is
    the same, which is 7\. As another example, the JDK release 9.2.2 is more secure
    than 9.2.1 because, for the same major version 9, the former’s security level
    of 2 is greater than the latter’s security level of 1.


    Chapter 8 ■ Breaking Changes in JDk 9


    The following rules apply to version numbers:


    • All elements must be a non-negative integer.


    • The first three elements are treated as major version, minor version, and security


    level, respectively; the rest, if present, are treated as additional information
    such as


    numbers indicating patch releases.


    • Only the major version element is mandatory.


    • Elements of a version number cannot contain leading zeros. For example, the
    major


    version of the JDK 9 is 9, not 09.


    • Trailing elements cannot be zero. That is, you cannot have a version number
    as 9.0.0.


    It can be 9, 9.2, or 9.0\. *x*, where *x* is a positive integer.


    Prerelease Information


    The $pre element in a version string is a prerelease identifier such as ea for
    an early-access release, snapshot for a prerelease snapshot, and internal for
    a developer internal build. It is optional. If it is present, it is prefixed with
    a hyphen (-) and must be an alphanumeric string matching the regular expression
    ([a-zA-Z0-9]+). The following version string contains 9 as a version number and
    ea as prerelease information.


    9-ea


    Build Information


    The $build element in a version string is a build number incremented for each
    promoted build. It is optional. It is reset to 1 when any part of the version
    number is incremented. If it is present, it is prefixed with a plus sign (+) and
    must match the regular expression (0|[1-9][0-9]*). The following version string
    contains 154 as the build number.


    9-ea+154


    Additional Information'
