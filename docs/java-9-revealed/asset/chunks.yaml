    \ to traverse stack frames of the current thread. The `getCallerClass()` method\
    \ of the `StackWalker` instance returns the caller class reference. You must configure\
    \ a `StackWalker` instance with the `RETAIN_CLASS_REFERENCE` if you want the reference\
    \ of the class representing the stack frame and the reference of the caller’s\
    \ class. By default, all reflection frames and implementation-specific frames\
    \ are not reported by a `StackWalker`. Use the `SHOW_REFLECT_FRAMES` and `SHOW_HIDDEN_FRAMES`\
    \ options to configure a `StackWalker` if you want those frames to be included\
    \ in stack traversal. Using the `SHOW_HIDDEN_FRAMES` option also includes reflection\
    \ frames.\n\nWhen a Java security manager is present and you configure a `StackWalker`\
    \ with the `RETAIN_CLASS_REFERENCE` option, a permission check is performed to\
    \ make sure that the codebase is granted a `java.lang.StackFramePermission` with\
    \ a value of `retainClassReference`. A `SecurityException` is thrown if the permission\
    \ is not granted. The permission check is performed at the time the `StackWalker`\
    \ instance is created, not when the stack walking is performed.\n\n## CHAPTER\
    \ 17\n\n## Reactive Streams\n\nIn this chapter, you will learn:\n\n- What a stream\
    \ is\n- What the Reactive Streams initiative is and its specification and Java\
    \ API"
