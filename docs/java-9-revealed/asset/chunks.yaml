    Chapter 15 ■ enhanCed depreCation


    Dynamic Analysis of Deprecated APIs


    The jdeprscan tool is a static analysis tool so it will skip dynamic uses of deprecated
    APIs. For example, you can call a deprecated method using reflection, which this
    tool will miss during scanning. You can also call deprecated methods in providers
    loaded by a ServiceLoader, which will be missed by this tool.


    In a future release, the JDK may provide a dynamic analysis tool named jdeprdetect
    that will track the uses of deprecated APIs at runtime. The tool will be useful
    to find dead code referencing deprecated APIs that are reported by the static
    analysis tool jdeprscan.


    No Deprecation Warnings on Imports


    Until JDK 9, the compiler generated a warning if you imported deprecated constructs
    using import statements, even if you used a @SuppressWarnings annotation on all
    use-sites of the deprecated, imported constructs. This was an annoyance if you
    were trying to get rid of all deprecation warnings in your code. You just could
    not get rid of them because you cannot annotate import statements. JDK 9 improved
    on this by *omitting* the deprecation warnings on imports.


    Consider the class named ImportDeprecationWarning, as shown in Listing [15-5](#index_split_006.html#405).
    It used the deprecated class named StringBufferInputStream in three places:


