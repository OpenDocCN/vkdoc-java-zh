    used to execute/evaluate snippet. Run the `jshell` program with a `--help` option
    to see a list of all available standard options. Run it with a `--help-extra`
    or `-X` option to see a list of all available non-standard options.


    For example, using these options, you can set class path and module path for the
    JShell tool. I explain these options later in this chapter.


    You can also customize the startup scripts for the `jshell` tool using the command-line
    `--start` option.


    You can use `DEFAULT` and `PRINTING` as arguments to this option. The `DEFAULT`
    argument starts `jshell` with several import statements, so you do not need to
    import commonly used classes while you use `jshell`. The following two commands
    launch the `jshell` the same way:


    - `jshell`

    - `jshell --start DEFAULT`


    You can use `System.out.println()` method to print messages to the standard output.
    You can launch `jshell` using the `--start` option with a `PRINTING` argument,
    which will include all versions of the `System.out.print()`, `System.out.println()`,
    and `System.out.printf()` methods as `print()`, `println()`, and `printf()` top-level
    methods. This will allow you to use `print()`, `println()`, and `printf()` methods
    on `jshell` instead of their longer versions, `System.out.print()`, `System.out.println()`,
    and `System.out.printf()`.


    ```bash

    C:\Java9Revealed>jshell --start PRINTING

    | Welcome to JShell -- Version 9-ea

    | For an introduction type: /help intro


    jshell> println("hello")

    hello


    jshell>

    ```


    You can repeat the `--start` option when you launch `jshell` to include the default
    import statements and the printing methods:


    ```bash

    C:\Java9Revealed>jshell --start DEFAULT --start PRINTING

    | Welcome to JShell -- Version 9-ea

    | For an introduction type: /help intro


    jshell>

    ```


    ## Exiting the JShell Tool


    To exit `jshell`, enter `/exit` on the `jshell` prompt and press Enter. The command
    prints a goodbye message, exits the tool, and returns you to the command prompt:


    ```bash

    C:\Java9Revealed>jshell

    | Welcome to JShell -- Version 9-ea

    | For an introduction type: /help intro


    jshell> /exit

    | Goodbye


    C:\Java9Revealed>

    ```


    The JShell tool is forgiving in a number of ways. If you use a keyword in a Java
    construct that is not supported, it simply ignores it. You can use partial commands.
    If the partial command you entered can be auto-completed to a unique command name,
    the tool would work as if you entered the full command. For example, `/edit` and
    `/exit` are two commands starting with `/e`. If you enter `/ex` instead of `/exit`,
    `jshell` will interpret it as an `/exit` command for you.


    ```bash

    jshell> /ex

    | Goodbye


    C:\Java9Revealed>

    ```


    If you enter `/e`, you will receive an error because there are two possible commands
    starting with `/e`:


    ```bash

    jshell> /e

    | Command: ''/e'' is ambiguous: /edit, /exit

    | Type /help for help.


    jshell>

    ```


    ## What Are Snippets and Commands?


    You can use the JShell tool to:


    - Evaluate snippets of Java code, which are simply called *snippets* in JShell
    terminology.

    - Execute commands, which are used to query the JShell state and set the JShell
    environment.


    To distinguish commands from snippets, all commands start with a slash (`/`).
    You have already seen a few of them in previous sections such as `/exit` and `/help`.
    Commands are used to interact with the tool itself, such as to customize its output,
    print help, exit the tool, and print the history of commands and snippets. I explain
    more commands later. If you are interested in learning all about the available
    commands, use the `/help` command.


    Using the JShell tool, you write a fragment of Java code at a time and evaluate
    it. Those fragments of code are known as *snippets*. Snippets must follow the
    syntax specified in the Java Language Specification.


    Snippets can be:


    - Import declarations

    - Class declarations

    - Interface declarations

    - Method declarations

    - Field declarations

    - Statements

    - Expressions


    > **Tip** You can use all Java language constructs in JShell, except for package
    declarations. All snippets in a JShell occur in an internal package named `REPL`
    and inside an internal synthetic class.


    The JShell tool knows when you are done entering a snippet. When you press Enter,
    the tool will either execute the snippet if it is complete or take you to the
    next line and wait for you to complete the snippet. If a line begins with `...>`,
    it means the snippet is not complete and you need to enter more text to complete
    the snippet. The default prompt for more input, which is `...>`, can be customized.
    Here are a few examples:


    ```bash

    C:\Java9Revealed>jshell

    | Welcome to JShell -- Version 9-ea

    | For an introduction type: /help intro


    jshell> 2 + 2

    $1 ==> 4


    jshell> 2 +

    ...> 2

    $2 ==> 4


    jshell> 2

    $3 ==> 2


    jshell>

    ```


    When you enter `2 + 2` and press Enter, `jshell` considers it as a complete snippet
    (an expression). It evaluates the expression and prints feedback that the expression
    was evaluated to `4` and the result was assigned to a variable named `$1`. The
    variable named `$1` was automatically generated by the JShell tool. I explain
    variables generated by tools in more detail later. When you enter `2 +` and press
    Enter, `jshell` prompts you to enter more input because `2 +` is not a complete
    snippet in Java. When you enter `2` on the second line, the snippet is complete;
    `jshell` evaluates the snippet and prints feedback. When you enter `2` and press
    Enter, `jshell` evaluates the snippet because `2` is a complete expression by
    itself.


    ## Evaluating Expressions


    You can execute any valid Java expression in `jshell`. The following examples
    evaluate two expressions that add and multiply numbers:


    ```bash

    jshell> 2 + 2

    $1 ==> 4


    jshell> 9.0 * 6

    $2 ==> 54.0

    ```


    When you evaluate an expression, `jshell` prints feedback if the expression evaluates
    to a value. In these cases, `2 + 2` evaluates to `4` and `9.0 * 6` evaluates to
    `54.0`. The value of an expression is assigned to a variable. The feedback contains
    the name of the variable and the value of the expressions. In the first case,
    the feedback `$1 ==> 4` means that the expression `2 + 2` evaluated to `4` and
    the result was assigned to a variable named `$1`. Similarly, the expression `9.0
    * 6` was evaluated to `54.0` and the value was assigned to a variable named `$2`.
    You can use these variable names in other expressions. You can print their values
    by simply entering their names:


    ```bash

    jshell> $1

    $1 ==> 4


    jshell> $2

    $2 ==> 54.0


    jshell> System.out.println($1)

    4


    jshell> System.out.println($2)

    54.0

    ```


    > **Tip** In `jshell`, you do not need to terminate a statement with a semicolon
    as you do in a Java program. The tool will insert the missing semicolons for you.


    In Java, every variable has a data type. In these examples, what are the data
    types of the variables named `$1` and `$2`? In Java, `2 + 2` evaluates to an `int`
    and `9.0 * 6` evaluates to a `double`. Therefore, the data types for the `$1`
    and `$2` variables should be `int` and `double`, respectively. How do you verify
    this? Let’s first do it the hard way. You can cast `$1` and `$2` to an `Object`
    and invoke the `getClass()` method on them, which should give you `Integer` and
    `Double`. Note that primitive values of `int` and `double` types are boxed to
    `Integer` and `Double` reference types in these examples when you cast them as
    an `Object`:


    ```bash

    jshell> 2 + 2

    $1 ==> 4


    jshell> 9.0 * 6

    $2 ==> 54.0


    jshell> ((Object)$1).getClass()

    $3 ==> class java.lang.Integer


    jshell> ((Object)$2).getClass()

    $4 ==> class java.lang.Double


    jshell>

    ```


    There is an easier way to determine the data type of variables created by `jshell`—you
    just tell `jshell` to give you verbose feedback and it will print the data type
    of the variables it creates and much more! The following commands set the feedback
    mode to verbose and evaluate the same expressions:


    ```bash

    jshell> /set feedback verbose

    | Feedback mode: verbose


    jshell> 2 + 2

    $1 ==> 4

    | created scratch variable $1 : int


    jshell> 9.0 * 6

    $2 ==> 54.0

    | created scratch variable $2 : double


    jshell>

    ```'
