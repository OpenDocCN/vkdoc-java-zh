- fmt: '# 版本字符串格式


    `$pre)?(\+($build)?(-$opt)?)?`定义了版本字符串的格式。短版本字符串仅包含前两个元素：一个版本号，可选地后跟预发布信息。版本字符串可以短至`"9"`（仅包含主版本号），也可以长至`"9.0.1-ea+154-20170130.07.36am"`（包含版本字符串的所有元素）。


    JDK 9 添加了一个名为`Runtime.Version`的静态嵌套类，其实例表示 JDK 版本字符串。该类没有公共构造函数。获取其实例的唯一方法是调用其静态方法`parse(String
    vstr)`。如果版本字符串为`null`或无效，该方法可能抛出运行时异常。该类包含多个方法来获取版本的不同部分。


    JDK 9 更改了 JDK 和 JRE 安装的目录布局。现在，JDK 和 JRE 安装之间没有区别，除了 JDK 安装包含开发工具和一份 JMOD 格式的平台模块副本（JRE
    不包含这些）。你可以使用`jlink`工具构建自己的 JRE，并且它可以包含 JRE 中所需的任何 JDK 部分。


    在 Java SE 9 之前，你可以使用“认可标准覆盖机制”来使用实现认可标准或独立 API 的类和接口的更新版本。这些包括`javax.rmi.CORBA`包和
    Java API for XML Processing (JAXP)，它们是在 Java Community Process 之外创建的。Java SE 9
    仍然支持此机制。在 Java SE 9 中，你需要使用`--upgrade-module-path`命令行选项。此选项的值是一个目录列表，其中包含用于认可标准和独立
    API 的模块。


    在版本 9 之前的 Java SE 中，允许一种扩展机制，你可以通过将 JAR 文件放置在系统属性`java.ext.dirs`指定的目录中来扩展运行时映像。如果未设置此系统属性，则默认使用`jre\lib\ext`目录。Java
    SE 9 不支持扩展机制。如果你需要类似的功能，可以将这些 JAR 文件放在类路径的前面。


    在版本 9 之前，JDK 使用三个类加载器来加载类：引导类加载器、扩展类加载器和系统类加载器。它们按层次结构排列——引导类加载器没有父加载器，扩展类加载器以引导类加载器为父加载器，系统类加载器以扩展类加载器为父加载器。类加载器在尝试加载类型本身之前，会先将类型加载请求委托给其父加载器（如果有）。JDK
    9 为了向后兼容保留了三个类加载器的安排。JDK 9 不支持扩展机制，因此扩展类加载器没有意义。JDK 9 已将扩展类加载器重命名为平台类加载器，可以通过`ClassLoader`类的静态方法`getPlatformClassLoader()`获取其引用。在
    JDK 9 中，每个类加载器加载不同类型的模块。


    在 JDK 9 中，命名模块中的资源默认是封装的。只有当一个资源位于未命名、无效或开放的包中时，另一个模块中的代码才能访问该命名模块中的资源。命名模块中所有名称以`.class`结尾的资源（所有类文件）都可以被其他模块中的代码访问。你可以使用`jrt`方案的
