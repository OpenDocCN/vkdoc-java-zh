    Terminating Processes


    You can terminate a process using the destroy() or destroyForcibly() method of
    the ProcessHandle interface and the Process class. Both methods return true if
    the request to terminate the process was successful, false otherwise. The destroy()
    method requests a normal termination, whereas the destroyForcibly() method request
    a forced termination. It is possible for the isAlive() method to return true for
    a brief period after a request to terminate the process has been made.


    ■ **Tip** You cannot terminate the current process. Calling the destroy() or the
    destroyForcibly() method on the current process throws an IllegalStateException.
    the operating system access controls may prevent a process from being terminated.


