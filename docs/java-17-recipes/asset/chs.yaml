  ```


  最终，如果任何一条语句执行失败，所有事务都会被回滚。但如果所有语句都成功执行，则一切都会被提交。


  ### 工作原理


  事务管理在应用程序中扮演着重要角色。这一点对于执行相互依赖的不同任务的应用程序尤其如此。在许多情况下，如果事务中执行的任务之一失败，那么整个事务失败比仅部分完成更可取。例如，假设你正在向应用程序数据库添加数据库用户记录。现在，假设为你的应用程序添加一个用户需要修改几个不同的数据库表，可能是一个角色表等等。如果你的第一个表修改正确，而第二个表修改失败，会发生什么？你会得到一个部分完成的应用程序用户添加操作，你的用户很可能无法按预期访问应用程序。在这种情况下，如果其中一个更新失败，最好回滚所有已完成的数据库修改，以便数据库保持干净状态，并可以再次尝试该事务。


  默认情况下，`Connection`对象设置为自动提交开启。这意味着每个数据库的`INSERT`、`UPDATE`或`DELETE`语句都会立即提交。通常，这是你希望应用程序运行的方式。但是，当你有许多相互依赖的数据库语句时，关闭自动提交以便所有语句可以一次性提交就变得很重要。为此，调用`Connection`对象的`setAutoCommit()`方法并传入`false`值。正如你在本解决方案中看到的，调用了`setAutoCommit()`方法并传入`false`值，然后执行数据库语句。这样做会使所有数据库语句的更改变为临时性的，直到调用`Connection`对象的`commit()`方法。这允许你在发出`commit()`之前确保所有语句都正确执行。请查看本解决方案中`TransactionExample`类的`main()`方法中包含的事务管理代码。


  ```

  boolean successFlag = false;

  ...

  CreateConnection createConn = new CreateConnection();

  conn = createConn.getConnection();

  conn.setAutoCommit(false);

  queryDbRecipes();

  successFlag = insertRecord(

  "12-6",

  "Simplifying and Adding Security with Prepared Statements",

  "Working with Prepared Statements");

  if (successFlag == true){

  successFlag = insertRecord(

  null,

  "Simplifying and Adding Security with Prepared Statements",

  "Working with Prepared Statements");

  }

  // 提交事务

  if (successFlag == true)

  conn.commit();

  else

  conn.rollback();

  conn.setAutoCommit(true);

  ```


  请注意，仅当所有事务语句都成功处理时，才会调用`commit()`方法。如果其中任何一个失败，`successFlag`将等于`false`，这将导致调用`rollback()`方法。在本解决方案中，第二次调用`insertRecord()`尝试向`RECIPE_NUMBER`列插入一个`NULL`值，这是不允许的。因此，该插入操作失败，并且所有内容（包括之前的插入操作）都会被回滚。


  ## 12.9 创建可滚动的 ResultSet




  ### 问题


  你已查询数据库并获得了一些结果。你想将这些结果存储在一个对象中，以便能够向前和向后遍历结果，并根据需要更新值。


  ### 解决方案


  创建一个可滚动的 `ResultSet` 对象，然后你就可以读取下一条、第一条、最后一条和上一条记录。使用可滚动的 `ResultSet` 对象允许以任意方向获取查询结果，从而按需检索数据。下面的示例方法演示了如何创建一个可滚动的
  `ResultSet` 对象。


  ```

  private static void queryDbRecipes(){

  String sql = "SELECT ID, RECIPE_NUMBER, RECIPE_NAME, DESCRIPTION " +

  "FROM RECIPES";

  try(PreparedStatement pstmt =conn.prepareStatement(sql,

  ResultSet.TYPE_SCROLL_INSENSITIVE, ResultSet.CONCUR_READ_ONLY);

  ResultSet rs = pstmt.executeQuery()) {

  rs.first();

  System.out.println(rs.getString(2) + ": " + rs.getString(3) +

  " - " + rs.getString(4));

  rs.next();

  System.out.println(rs.getString(2) + ": " + rs.getString(3) +

  " - " + rs.getString(4));

  rs.previous();

  System.out.println(rs.getString(2) + ": " + rs.getString(3) +

  " - " + rs.getString(4));

  rs.last();

  System.out.println(rs.getString(2) + ": " + rs.getString(3) +

  " - " + rs.getString(4));

  } catch (SQLException ex) {

  ex.printStackTrace();

  }

  }

  主方法如下：

  public static void main(String[] args) {

  boolean successFlag = false;

  try {

  CreateConnection createConn = new CreateConnection();

  conn = createConn.getConnection();

  // 执行可滚动查询

  queryDbRecipes();

  } catch (java.sql.SQLException ex) {

  System.out.println(ex);

  } finally {

  if (conn != null) {

  try {

  conn.close();

  } catch (SQLException ex) {

  ex.printStackTrace();

  }

  }

  }

  }

  ```


  执行此方法，使用本章最初加载的数据将产生以下输出。


  ```

  Successfully connected

  12-1: Connecting to a Database - DriverManager and DataSource Implementations -
  More to Come

  12-2: Querying a Database and Retrieving Results - Obtaining and Using Data from
  a DBMS

  12-1: Connecting to a Database - DriverManager and DataSource Implementations -
  More to Come

  12-3: Handling SQL Exceptions - Using SQLException

  ```


  ### 工作原理


  普通的 `ResultSet` 对象只允许向前获取结果。应用程序可以从检索到的第一条记录开始，一直处理到默认 `ResultSet` 对象的最后一条记录。有时，应用程序在遍历
  `ResultSet` 对象时需要更多功能。例如，假设你想编写一个应用程序，允许用户显示检索到的第一条或最后一条记录，或者通过结果进行向前或向后翻页。使用标准的
  `ResultSet` 很难做到这一点。然而，通过创建一个可滚动的 `ResultSet`，你可以轻松地在结果中向后和向前移动。


  要创建可滚动的 `ResultSet` 对象，你必须首先创建一个能够生成可滚动 `ResultSet` 的 `Statement` 或 `PreparedStatement`
  实例。创建 `Statement` 时，必须将 `ResultSet` 滚动类型常量值传递给 `Connection` 对象的 `createStatement()`
  方法。同样，在使用 `PreparedStatement` 时，必须将滚动类型常量值传递给 `Connection` 对象的 `prepareStatement()`
  方法。


  你还必须传递一个 `ResultSet` 并发常量，以告知 `ResultSet` 是否可更新。默认值是 `ResultSet.CONCUR_READ_ONLY`，这意味着
  `ResultSet` 对象不可更新。另一种并发类型是 `ResultSet.CONCUR_UPDATABLE`，表示一个可更新的 `ResultSet` 对象。


  在本技巧的解决方案中，使用了 `PreparedStatement` 对象。创建一个能够生成可滚动 `ResultSet` 的 `PreparedStatement`
  对象，代码如下所示。


  ```

  pstmt = conn.prepareStatement(sql, ResultSet.TYPE_SCROLL_INSENSITIVE,

  ResultSet.CONCUR_READ_ONLY);

  ```


  一旦创建了 `PreparedStatement` 对象，就会返回一个可滚动的 `ResultSet`。你可以通过调用 `ResultSet` 的方法来指示要移动的方向或要定位的位置，从而使用可滚动的
  `ResultSet` 在多个方向上进行遍历。以下代码行检索 `ResultSet` 中的第一条记录。


  ```

  ResultSet rs = pstmt.executeQuery();

  rs.first();

  ```


  本技巧的解决方案演示了几种不同的滚动方向。具体来说，你可以看到调用了 `ResultSet` 的 `first()`、`next()`、`last()` 和 `previous()`
  方法，以移动到 `ResultSet` 中的不同位置。


  可滚动的 `ResultSet` 对象在应用程序开发中有一席之地。它们是那种在你需要时就能派上用场的便利功能，但也是你可能并不经常需要的东西。


  ## 12.10 创建可更新的 ResultSet


  ### 问题


  一个应用程序任务已查询数据库并获得了结果。你将这些结果存储到了一个 `ResultSet` 对象中，并且想要更新 `ResultSet` 中的某些值，然后将它们提交回数据库。


  ### 解决方案


  让你的 `ResultSet` 对象可更新，然后在遍历结果时根据需要更新行。下面的示例方法演示了如何使 `ResultSet` 可更新，以及如何更新该 `ResultSet`
  中的内容，并最终将其持久化到数据库中。


  ```

  private static void queryAndUpdateDbRecipes(String recipeNumber){

  String sql = "SELECT ID, RECIPE_NUMBER, RECIPE_NAME, DESCRIPTION " +

  "FROM RECIPES " +

  "WHERE RECIPE_NUMBER = ?";

  ResultSet rs = null;

  try (PreparedStatement pstmt =

  conn.prepareStatement(sql, ResultSet.TYPE_SCROLL_SENSITIVE, ResultSet.CONCUR_UPDATABLE);){

  pstmt.setString(1, recipeNumber);

  rs = pstmt.executeQuery();

  while(rs.next()){

  String desc = rs.getString(4);

  System.out.println("Updating row" + desc);

  rs.updateString(4, desc + " -- More to come");

  rs.updateRow();

  }

  } catch (SQLException ex) {

  ex.printStackTrace();

  } finally {

  if (rs != null){

  try {

  rs.close();

  } catch (SQLException ex) {

  ex.printStackTrace();

  }

  }

  }

  主方法如下：

  public class UpdateResultSetExample {

  public static Connection conn = null;

  public static void main(String[] args) {

  boolean successFlag = false;

  try {

  CreateConnection createConn = new CreateConnection();

  conn = createConn.getConnection();

  // 执行初始查询

  queryDbRecipes();

  // 更新 ResultSet 行

  queryAndUpdateDbRecipes("12-1");

  // 查询以查看最终结果

  queryDbRecipes();

  } catch (java.sql.SQLException ex) {

  System.out.println(ex);

  } finally {

  if (conn != null) {

  try {

  conn.close();

  } catch (SQLException ex) {

  ex.printStackTrace();

  }

  }

  }

  }

  ```


  调用此方法时，可以传递一个包含配方编号的字符串值。假设将配方编号 `"12-1"` 传递给此方法，将得到以下输出结果。


  ```

  Successfully connected

  12-1: Installing MySQL - Downloading and installation of a MySQL Database

  12-2: Connecting to a Database - DriverManager and DataSource Implementations

  12-3: Handling SQL Exceptions - Using SQLException

  12-4: Querying a Database and Retrieving Results - Obtaining and using data from
  a DBMS

  Updating row:Downloading and installation of a MySQL Database

  12-1: Installing MySQL - Downloading and installation of a MySQL Database -- More
  to come

  12-2: Connecting to a Database - DriverManager and DataSource Implementations

  12-3: Handling SQL Exceptions - Using SQLException

  12-4: Querying a Database and Retrieving Results - Obtaining and using data from
  a DBMS

  ```




  ### 工作原理


  有时你需要在解析数据的同时更新数据。通常，这种技术涉及测试从数据库返回的值，并在与另一个值进行比较后对其进行更新。最简单的方法是通过将 `ResultSet.CONCUR_UPDATABLE`
  常量传递给 `Connection` 对象的 `createStatement()` 或 `prepareStatement()` 方法，使 `ResultSet`
  对象可更新。这样做会使 `Statement` 或 `PreparedStatement` 生成一个可更新的 `ResultSet`。


  注意


  某些数据库 JDBC 驱动程序不支持可更新的 `ResultSet`。有关更多信息，请参阅你的 JDBC 驱动程序文档。此代码是在 Oracle 数据库 11.2
  版本上使用 Oracle 的 `ojdbc6.jar` JDBC 驱动程序运行的。


  创建生成可更新 `ResultSet` 的 `Statement` 对象的格式是：将 `ResultSet` 类型作为第一个参数传递，将 `ResultSet`
  并发模式作为第二个参数传递。滚动类型必须为 `TYPE_SCROLL_SENSITIVE`，以确保 `ResultSet` 对任何更新都敏感。以下代码通过创建一个生成可滚动且可更新的
  `ResultSet` 对象的 `Statement` 对象来演示此技术。


  ```

  Statement stmt = conn.createStatement(ResultSet.TYPE_SCROLL_SENSITIVE,

  ResultSet.CONCUR_UPDATABLE);

  ```


  创建生成可更新 `ResultSet` 的 `PreparedStatement` 对象的格式是：将 SQL 字符串作为第一个参数传递，将 `ResultSet`
  类型作为第二个参数传递，将 `ResultSet` 并发模式作为第三个参数传递。本技巧的解决方案通过以下代码行演示了此技术。


  ```

  pstmt = conn.prepareStatement(sql, ResultSet.TYPE_SCROLL_SENSITIVE,

  ResultSet.CONCUR_UPDATABLE);

  ```


  本节讨论的两行代码都会生成可滚动且可更新的 `ResultSet` 对象。一旦你获得了可更新的 `ResultSet`，就可以像使用普通 `ResultSet`
  一样用它来获取从数据库中检索到的值。此外，你可以调用 `ResultSet` 对象的某个 `updateXXX()` 方法来更新 `ResultSet` 中的任何值。在本技巧的解决方案中，调用了
  `updateString()` 方法，将查询中值的位置作为第一个参数传递，将更新后的文本作为第二个参数传递。在此例中，更新的是 SQL 查询中列出的第四个元素列。


  ```

  rs.updateString(4, desc + " -- More to come");

  ```


  最后，要持久化你所更改的值，请调用 `ResultSet` 的 `updateRow()` 方法，如本技巧的解决方案所示。


  ```

  rs.updateRow();

  ```


  创建可更新的 `ResultSet` 并非每天都需要做的事情。事实上，你可能永远都不需要创建可更新的 `ResultSet`。然而，在需要这种策略的情况下，此技术会非常有用。


  ## 12.11 缓存数据以便在断开连接时使用


  ### 问题


  你希望在断开连接的状态下处理来自数据库管理系统（DBMS）的数据。也就是说，你正在一台未连接到数据库的设备上工作，但仍希望能够像连接时一样处理一组数据。例如，你正在便携式设备上处理数据，并且你离开了办公室，没有网络连接。你希望能够查询、插入、更新和删除数据，即使没有连接。一旦连接可用，你希望你的设备能够同步在断开连接期间所做的任何数据库更改。


  ### 解决方案


  使用 `CachedRowSet` 对象来存储你希望在离线时处理的数据。这允许你的应用程序像连接到数据库一样处理数据。一旦你的连接恢复，或者你重新连接到数据库，将
  `CachedRowSet` 中更改的数据与数据库存储库进行同步。以下示例类演示了 `CachedRowSet` 的使用。在此场景中，`main()` 方法执行该示例。不过，假设没有
  `main()` 方法，而是便携式设备上的另一个应用程序调用此类的各个方法。请跟随示例中的代码，并考虑在未连接到数据库的情况下处理存储在 `CachedRowSet`
  中的结果。例如，假设你在办公室时已连接到网络并开始了一些工作，现在你离开了办公室，网络信号不稳定，无法保持与数据库的持续连接。




  ```

  package org.java17recipes.chapter12.recipe12_10;

  import java.sql.Connection;

  import java.sql.SQLException;

  import javax.sql.rowset.CachedRowSet;

  import javax.sql.rowset.RowSetFactory;

  import javax.sql.rowset.RowSetProvider;

  import javax.sql.rowset.spi.SyncProviderException;

  import org.java17recipes.chapter12.recipe12_01.CreateConnection;

  public class CachedRowSetExample {

  public static Connection conn = null;

  public static CreateConnection createConn;

  public static CachedRowSet crs = null;

  public static void main(String[] args) {

  boolean successFlag = false;

  try {

  createConn = new CreateConnection();

  conn = createConn.getConnection();

  // 执行可滚动查询

  queryWithRowSet();

  // 更新 CachedRowSet

  updateData();

  // 同步更改

  syncWithDatabase();

  } catch (java.sql.SQLException ex) {

  System.out.println(ex);

  } finally {

  if (conn != null) {

  try {

  conn.close();

  } catch (SQLException ex) {

  ex.printStackTrace();

  }

  }

  }

  }

  /**

  * 调用此方法将 CachedRowSet 中使用的数据与数据库同步

  */

  public static void syncWithDatabase() {

  try {

  crs.acceptChanges(conn);

  } catch (SyncProviderException ex) {

  // 如果同步时发生冲突，将抛出此异常

  ex.printStackTrace();

  } finally {

  // 通过关闭 CachedRowSet 清理资源

  if (crs != null) {

  try {

  crs.close();

  } catch (SQLException ex) {

  ex.printStackTrace();

  }

  }

  }

  }

  public static void queryWithRowSet() {

  RowSetFactory factory;

  try  {

  // 创建一个新的 RowSetFactory

  factory = RowSetProvider.newFactory();

  // 使用工厂创建一个 CachedRowSet 对象

  crs = factory.createCachedRowSet();

  // 或者填充 CachedRowSet 的连接设置

  // crs.setUsername(createConn.getUsername());

  // crs.setPassword(createConn.getPassword());

  // crs.setUrl(createConn.getJdbcUrl());

  // 填充一个查询，用于获取将要使用的数据

  crs.setCommand("select id, recipe_number, recipe_name, description from recipes");

  // 设置键列

  int[] keys = {1};

  crs.setKeyColumns(keys);

  crs.execute(conn);

  // 现在可以在断开连接的状态下处理对象内容

  while (crs.next()) {

  System.out.println(crs.getString(2) + ": " + crs.getString(3) + " - " + crs.getString(4));

  }

  } catch (SQLException ex) {

  ex.printStackTrace();

  }

  }

  public static boolean updateData() {

  boolean returnValue = false;

  try {

  // 移动到结果集中第一行之前的位置

  crs.beforeFirst();

  // 遍历结果集

  while (crs.next()) {

  // 如果 recipe_num 等于 11-2，则进行更新

  if (crs.getString("RECIPE_NUMBER").equals("12-2")) {

  System.out.println("正在更新配方 12-2");

  crs.updateString("description", "Subject to change");

  crs.updateRow();

  }

  }

  returnValue = true;

  // 移动到结果集中第一行之前的位置

  crs.beforeFirst();

  // 遍历结果集以查看更改

  while (crs.next()) {

  System.out.println(crs.getString(2) + ": " + crs.getString(3) + " - " + crs.getString(4));

  }

  } catch (SQLException ex) {

  returnValue = false;

  ex.printStackTrace();

  }

  return returnValue;

  }

  }

  ```


  运行此示例代码将显示类似于以下代码的输出，但文本可能因数据库中的值而异。请注意，在更新 `CachedRowSet` 后，配方 12-2 的数据库记录描述已更改。


  ```

  成功连接

  12-1: 安装 MySQL - MySQL 数据库的下载与安装 -- 更多内容待续

  12-2: 连接数据库 - DriverManager 和 DataSource 实现

  12-3: 处理 SQL 异常 - 使用 SQLException

  12-4: 查询数据库并检索结果 - 从 DBMS 获取和使用数据

  正在更新配方 12-2

  12-1: 安装 MySQL - MySQL 数据库的下载与安装 -- 更多内容待续

  12-2: 连接数据库 - 可能会更改

  12-3: 处理 SQL 异常 - 使用 SQLException

  12-4: 查询数据库并检索结果 - 从 DBMS 获取和使用数据

  ```




  ### 工作原理


  在移动设备上旅行时，不可能始终保持互联网连接。如今，有些设备允许你在移动中完成大量工作，即使没有直接连接到数据库。在这种情况下，像 `CachedRowSet`
  对象这样的解决方案就可以派上用场。`CachedRowSet` 与常规的 `ResultSet` 对象相同，区别在于它无需维持与数据库的连接即可保持可用状态。你可以查询数据库、获取结果，并将它们放入
  `CachedRowSet` 对象中；然后在未连接数据库的情况下处理这些数据。如果数据在任何时候发生了更改，这些更改稍后可以与数据库同步。


  创建 `CachedRowSet` 有几种方法。本方案使用 `RowSetFactory` 来实例化一个 `CachedRowSet`。不过，你也可以使用 `CachedRowSet`
  的默认构造函数来创建新实例。具体代码如下所示。


  ```

  CachedRowSet crs = new CachedRowSetImpl();

  ```


  实例化后，你需要建立与数据库的连接。同样有几种方法可以实现这一点。可以设置所用连接的属性，本方案在注释中演示了这种技术。以下摘自方案的代码片段使用 `CachedRowSet`
  对象的 `setUsername()`、`setPassword()` 和 `setUrl()` 方法设置连接属性。每个方法都接受一个字符串值，在示例中，该字符串从
  `CreateConnection` 类获取。


  ```

  // 或者填充 CachedRowSet 的连接设置

  // crs.setUsername(createConn.getUsername());

  // crs.setPassword(createConn.getPassword());

  // crs.setUrl(createConn.getJdbcUrl());

  ```


  另一种设置连接的方法是等到执行查询时，将 `Connection` 对象传递给 `executeQuery()` 方法。这是本方案中使用的方法。但在执行查询之前，必须使用
  `setCommand()` 方法设置查询，该方法接受一个字符串值。在本例中，该字符串是你需要执行的 SQL 查询。


  ```

  crs.setCommand("select id, recipe_number, recipe_name, description from recipes");

  ```


  接下来，如果 `CachedRowSet` 用于更新，则应使用 `setKeys()` 方法记录主键值。该方法接受一个包含键列位置索引的 int 数组。这些键用于标识唯一列。在本例中，查询中列出的第一列
  `ID` 是主键。


  ```

  int[] keys = {1};

  crs.setKeyColumns(keys);

  ```


  最后，使用 `execute()` 方法执行查询并填充 `CachedRowSet`。如前所述，`execute()` 方法可选地接受一个 `Connection`
  对象，这允许 `CachedRowSet` 获取数据库连接。


  ```

  crs.execute(conn);

  ```


  一旦查询执行完毕，`CachedRowSet` 被填充后，它就可以像任何其他 `ResultSet` 一样使用。你可以使用它向前或向后获取记录，或者通过指定要检索行的绝对位置来获取。


  可以在 `CachedRowSet` 中插入和更新行。要插入行，请使用 `moveToInsertRow()` 方法移动到新的行位置。然后使用与行中正在填充的列数据类型相对应的各种方法（`CachedRowSet`、`updateString()`、`updateInt()`
  等）来填充一行。填充完行中所有必需的列后，调用 `insertRow()` 方法，接着调用 `moveToCurrentRow()` 方法。以下代码行演示了向
  `RECIPES` 表中插入一条记录。


  ```

  crs.moveToInsertRow();

  crs.updateInt(1, sequenceValue); // 通过先前的查询获取当前序列值

  crs.updateString(2, "12-x");

  crs.updateString(3, "This is a new recipe title");

  crs.insertRow();

  crs.moveToCurrentRow();

  ```


  更新行类似于使用可更新的 `ResultSet`。只需使用 `CachedRowSet` 对象中与行中正在更新的列数据类型相对应的方法 [`updateString()`、`updateInt()`
  等] 来更新值。更新完行中的一列或多列后，调用 `updateRow()` 方法。本方案中演示了这种技术。


  ```

  crs.updateString("description", "Subject to change");

  crs.updateRow();

  ```


  要将任何更新或插入传播到数据库，必须调用 `acceptChanges()` 方法。此方法可以接受一个可选的 `Connection` 参数来连接数据库。调用后，所有更改都会刷新到数据库。不幸的是，由于自上次为
  `CachedRowSet` 检索数据以来可能已经过了一段时间，因此可能会出现冲突。如果发生此类冲突，则会抛出 `SyncProviderException`。你可以捕获这些异常，并使用
  `SyncResolver` 对象手动处理冲突。但是，解决冲突超出了本方案的范围。


  有关更多信息，请参阅 [`http://download.oracle.com/javase/tutorial/jdbc/basics/cachedrowset.html`](http://download.oracle.com/javase/tutorial/jdbc/basics/cachedrowset.html)
  上的文档。


  `CachedRowSet` 对象为处理数据提供了极大的灵活性，尤其是在使用并非始终连接到数据库的设备时。但是，在可以简单地使用标准 `ResultSet` 甚至可滚动的
  `ResultSet` 的情况下，它们也可能显得大材小用。


  ## 12.12 获取用于数据库的日期


  ### 问题


  你想要正确地将 `LocalDate` 对象转换后插入到数据库记录中。


  ### 解决方案


  利用静态方法 `java.sql.Date.valueOf(LocalDate)` 将 `LocalDate` 对象转换为 `java.sql.Date` 对象，JDBC
  可以使用该对象进行数据库的插入或查询。在以下示例中，当前日期被插入到类型为 `Date` 的数据库列中。


  ```

  public class DatesTimes {

  static CreateConnection createConn = new CreateConnection();

  public static void main(String[] args) {

  insertRecord(

  "Java 17 Recipes",

  "APRESS");

  }

  private static void insertRecord(

  String title,

  String publisher) {

  String sql = "INSERT INTO PUBLICATION VALUES("

  + "null, ?,?,?)";

  LocalDate pubDate = LocalDate.now();

  try (Connection conn = createConn.getConnection();

  PreparedStatement pstmt = conn.prepareStatement(sql);) {

  pstmt.setString(1, title);

  pstmt.setDate(2,  java.sql.Date.valueOf(pubDate));

  pstmt.setString(3, publisher);

  pstmt.executeUpdate();

  System.out.println("Record successfully inserted.");

  } catch (SQLException ex) {

  ex.printStackTrace();

  }

  }

  }

  ```


  ### 工作原理


  在 Java 8 中，新的日期时间 API（第 4 章）是处理日期和时间的首选 API。因此，在处理日期值和数据库时，JDBC API 必须在 SQL 日期和新的日期时间
  `LocalDate` 对象之间进行转换。本方案的解决方案演示了要从 `LocalDate` 对象获取 `java.sql.Date` 实例，只需调用静态方法
  `java.sql.Date.valueOf()`，并传入相关的 `LocalDate` 对象即可。


  ## 12.13 自动关闭资源


  ### 问题


  你希望应用程序为你处理此类样板代码，而不是在每次数据库调用时手动打开和关闭资源。




  ### 解决方案


  使用 `try-with-resources` 语法自动关闭已打开的资源。以下代码块在完成资源使用后，利用此策略自动关闭 `Connection`、`Statement`
  和 `ResultSet` 资源。


  ```

  public class TryWithResourcesExample {

  public static CreateConnection createConn;

  public static void main(String[] args) {

  createConn = new CreateConnection();

  queryDatabase();

  }

  public static void queryDatabase() {

  String qry = "select recipe_number, recipe_name, description from recipes";

  try (Connection conn = createConn.getConnection();

  Statement stmt = conn.createStatement();

  ResultSet rs = stmt.executeQuery(qry);) {

  while (rs.next()) {

  String recipe = rs.getString("RECIPE_NUMBER");

  String name = rs.getString("RECIPE_NAME");

  String desc = rs.getString("DESCRIPTION");

  System.out.println(recipe + "\t" + name + "\t" + desc);           }

  } catch (SQLException e) {

  e.printStackTrace();

  }

  }

  }

  ```


  运行此代码的输出结果应类似于以下内容。


  ```

  Successfully connected

  12-1 Connecting to a Database DriverManager and DataSource Implementations - More
  to Come

  12-2 Querying a Database and Retrieving Results Subject to Change

  12-3 Handling SQL Exceptions Using SQLException

  ```


  ### 工作原理


  Java 7 引入了使用 `try-with-resources` 的自动资源管理。通过这种技术，开发者不再需要手动关闭每个资源，这一改变可以减少许多行代码。


  要使用此技术，您必须在 `try` 子句后的一对圆括号内实例化所有希望启用自动处理的资源。在本方案的解决方案中，声明的资源是 `Connection`、`Statement`
  和 `ResultSet`。


  ```

  try (Connection conn = createConn.getConnection();

  Statement stmt = conn.createStatement();

  ResultSet rs = stmt.executeQuery(qry);) {

  ```


  一旦这些资源超出作用域，它们就会被自动关闭。这意味着不再需要编写 `finally` 块来确保资源被关闭。自动资源处理适用于数据库操作以及任何符合新 `java.lang.Autocloseable`
  API 的资源。其他操作，如文件 I/O，也遵循新的 API。`java.lang.Autoclosable` 中有一个单一的 `close()` 方法来管理资源的关闭。实现了
  `java.io.Closeable` 接口的类可以遵循此 API。


  ## 12.14 总结


  在许多应用程序中，数据库已成为存储重要信息的关键。充分理解如何在应用程序中使用数据库至关重要。本章从基础开始，涵盖了数据库访问入门的方案。接着讨论了重要主题，如安全访问和修改数据、事务管理以及离线时的数据访问。现在，您应该对在
  Java 解决方案中处理数据的一些技术有了扎实的理解。请记住，数据访问解决方案有很多，本章中的方案仅涵盖了应对信息管理这一难题的部分方法。


