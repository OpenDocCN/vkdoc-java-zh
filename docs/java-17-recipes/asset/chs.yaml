  ### 解决方案 2


  你可以使用 `CountDownLatch` 对象来控制主线程何时继续执行。在以下代码中，创建了一个初始值为 2 的 `CountDownLatch`；然后创建并启动两个线程，分别用于加载库存和加载订单信息。当这两个线程各自执行完毕后，它们会调用
  `CountDownLatch` 的 `countDown()` 方法，该方法将锁存器的值减一。主线程会一直等待，直到 `CountDownLatch` 的值变为
  0，此时主线程恢复执行。


  ```

  public static void main(String[] args) {

  Recipe10_7_2 recipe = new Recipe10_7_2();

  recipe.start();

  }

  CountDownLatch latch = new CountDownLatch(2);

  private void start() {

  loadItems();

  Thread inventoryThread = new Thread(() -> {

  System.out.println("Loading Inventory from Database...");

  loadInventory();

  latch.countDown();

  });

  inventoryThread.start();

  Thread ordersThread = new Thread(() -> {

  System.out.println("Loading Orders from XML Web service...");

  loadOrders();

  latch.countDown();

  });

  ordersThread.start();

  try {

  latch.await();

  } catch (InterruptedException e) {

  e.printStackTrace();

  }

  processOrders();

  }

  ```


