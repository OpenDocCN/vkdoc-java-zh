- "# 9. 异常与日志\n\n异常是描述程序中特殊情况的一种方式。它们表明发生了意外（异常）情况。因此，异常能有效地中断当前程序流程，并提示有需要关注的问题。正因如此，合理使用异常的程序能获得更好的控制流，变得更健壮，并为用户提供更多信息。即便如此，不加区分地使用异常可能会导致性能下降。\n\
  \n在 Java 中，异常可以被*抛出*或*捕获*。抛出异常意味着向代码指示遇到了异常，使用 `throw` 关键字通知 JVM 在当前栈中寻找能够处理此异常情况的代码。捕获异常则是告诉编译器哪些异常可以被处理，以及应该监控代码的哪一部分以捕获这些异常。这通过\
  \ Java 的 `try`/`catch` 块（如配方 9-1 所述）来表示。\n\n所有异常都继承自 `Throwable` 类，并且可以在 `try`/`catch`\
  \ 语句的 `catch` 子句中定义。JVM 主要使用 `Error` 类来表示严重和/或致命的错误。根据 Java 文档，应用程序不应捕获 `Error`\
  \ 异常，因为它们被认为是致命的（可以想象成计算机着火了）。Java 程序中的大多数异常都继承自 `Exception` 类。\n\n在 JVM 中，有两种类型的异常：受检异常和非受检异常。方法强制要求受检异常。你可以在方法签名中指定该方法可能抛出的异常。这要求该方法的任何调用者都必须创建一个\
  \ `try`/`catch` 块来处理方法签名中声明的异常。非受检异常不需要严格的约定，可以在任何地方自由抛出，而无需实现 `try`/`catch` 块。即便如此，通常不鼓励使用非受检异常（如配方\
  \ 9-7 所述），因为它们可能导致线程崩溃（如果没有捕获到异常）以及问题可见性差。继承自 `RuntimeException` 的异常类被视为非受检异常，而直接继承自\
  \ `Exception` 的异常类则被视为受检异常。\n\n请注意，抛出异常的操作开销很大（与其他语言结构替代方案相比），因此，用异常来代替控制流是一种糟糕的做法。例如，你不应该抛出异常来表示方法调用的预期结果（例如，像\
