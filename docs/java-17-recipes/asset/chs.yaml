  ## 4.1 将浮点数和双精度值四舍五入为整数


  ### 问题


  你需要在应用程序中将浮点数或双精度数四舍五入为整数值。


  ### 解决方案


  使用 `java.lang.Math` 的 `round()` 方法之一将数字四舍五入为你需要的格式。`Math` 类有两个方法可用于四舍五入浮点数或双精度值。以下代码演示了如何使用这些方法。


  ```

  public static int roundFloatToInt(float myFloat){

  return Math.round(myFloat);

  }

  public static long roundDoubleToLong(double myDouble){

  return Math.round(myDouble);

  }

  ```


  第一个方法 `roundFloatToInt()` 接受一个浮点数，并使用 `java.lang.Math` 类将其四舍五入为 int 类型。第二个方法 `roundDoubleToLong()`
  接受一个双精度值，并使用 `java.lang.Math` 类将该双精度值四舍五入为 long 类型。


  以下是主类：


  ```

  public static void main(String[] args){

  Float floatValue =  7.82f;

  Double doubleValue = 9.9d;

  System.out.println(roundFloatToInt(floatValue));

  System.out.println(roundDoubleToLong(doubleValue));

  }

  结果如下：


  ```




  ### 工作原理


  `java.lang.Math` 类包含大量辅助方法，让我们在处理数字时更加得心应手。`round()` 方法也不例外，它可以轻松地对浮点数或双精度值进行四舍五入。`java.lang.Math
  round()` 方法的一个版本接受一个 `float` 类型的参数。它会将浮点数四舍五入为最接近的 `int` 值，并采用向上舍入的规则。如果参数是*非数字*（NaN），则返回零。当正无穷大或负无穷大的参数传入
  `round()` 方法时，会分别返回等于 `Integer.MAX_VALUE` 或 `Integer.MIN_VALUE` 的结果。`java.lang.Math
  round()` 方法的第二个版本接受一个 `double` 值，该值会被四舍五入为最接近的 `long` 值，同样采用向上舍入的规则。与另一个 `round()`
  方法类似，如果参数是 NaN，则返回零。同样，当正无穷大或负无穷大的参数传入 `round()` 方法时，会返回等于 `Long.MAX_VALUE` 或 `Long.MIN_VALUE`
  的结果。


  注意


  NaN、POSITIVE_INFINITY 和 NEGATIVE_INFINITY 是在 `Float` 和 `Double` 类中定义的常量值。NaN（非数字）是一个未定义或无法表示的值。例如，将
  `0.0f` 除以 `0.0f` 会产生一个 NaN 值。POSITIVE_INFINITY 和 NEGATIVE_INFINITY 表示的值，指的是由某些操作产生的、特定类型（浮点型或双精度型）的极大或极小值，这些值无法正常表示：输出结果为
  Infinity 或 –Infinity。例如，1.0/0.0 或 –1.0/0.0 会产生这样的值。实际上，Java 使用一些特殊的数值来处理此类浮点运算的结果，这是由其除法运算的规范决定的。另一方面，对于整数运算，则会抛出
  `ArithmeticException` 错误。测试以下代码。


  ```

  public static void main(String[] args){

  Float floatValue1 =  1.0f;

  Float floatValue1n =  -1.0f;

  Float floatValue0 =  0.0f;

  System.out.println(floatValue1/floatValue0);

  System.out.println(floatValue0/floatValue0);

  System.out.println(floatValue1n/floatValue0);

  Double doubleValue1 =  1.0d;

  Double doubleValue1n =  -1.0d;

  Double doubleValue0 =  0.0d;

  System.out.println(doubleValue1/doubleValue0);

  System.out.println(doubleValue0/doubleValue0);

  System.out.println(doubleValue1n/doubleValue0);

  }

  ```


  输出结果如下。


  ```

  Infinity

  NaN

  -Infinity

  Infinity

  NaN

  -Infinity

  ```


  ## 4.2 格式化双精度和长整型小数值


  ### 问题


  你需要在应用程序中格式化 `double` 和 `long` 类型的数字。


  ### 解决方案


  使用 `DecimalFormat` 类来格式化和四舍五入数值，使其达到应用程序所需的精度。在下面的方法中，接受一个 `double` 值，并打印出一个格式化后的字符串值。


  ```

  public static void formatDouble(double myDouble){

  NumberFormat numberFormatter = new DecimalFormat("##.000");

  String result = numberFormatter.format(myDouble);

  System.out.println(result);

  }

  主类是：

  public static void main(String[] args) {

  formatDouble(Double.valueOf("345.9372"));

  }

  ```


  例如，如果传入 `formatDouble()` 方法的 double 值是 345.9372，结果将是 345.937。类似地，如果传入 .7697，结果将是
  .770。


  每个结果都使用指定的模式进行格式化，然后相应地四舍五入。


  ### 工作原理


  `DecimalFormat` 类可以与 `NumberFormat` 类一起使用，对 `double` 或 `long` 值进行四舍五入和/或格式化。`NumberFormat`
  是一个抽象类，提供了格式化和解析数字的接口。该类提供了为每个区域设置格式化和解析数字的能力，并能获取货币、百分比、整数和数字的格式。`NumberFormat`
  类本身非常有用，因为它包含获取格式化数字的工厂方法。实际上，只需很少的工作就能获得格式化的字符串。例如，以下代码演示了在 `NumberFormat` 类上调用一些工厂方法。


  ```

  // 获取 NumberFormat 类的实例

  NumberFormat format = NumberFormat.getInstance();

  // 为当前区域设置格式化一个 double 值

  String result = format.format(83.404);

  System.out.println(result);

  // 为意大利区域设置格式化一个 double 值

  result = format.getInstance(Locale.ITALIAN).format(83.404);

  System.out.println(result);

  // 将字符串解析为数字

  try {

  Number num = format.parse("75.736");

  System.out.println(num);

  } catch (java.text.ParseException ex){

  System.out.println(ex);

  }

  输出结果是：

  当前区域设置: 83,404

  意大利区域设置: 83,404

  现在是一个数字: 75736

  ```


  要使用模式进行格式化，可以将 `DecimalFormat` 类与 `NumberFormat` 一起使用。在本节的解决方案中，你看到通过向 `DecimalFormat`
  的构造函数传递一个模式来创建其实例，会返回一个 `NumberFormat` 类型。这是因为 `DecimalFormat` 扩展了 `NumberFormat`
  类。由于 `NumberFormat` 类是抽象的，`DecimalFormat` 包含了 `NumberFormat` 的所有功能，以及用于处理模式的附加功能。因此，它可以像你在前面的演示中看到的那样，处理来自不同区域设置的不同格式。这为处理
  `double` 或 `long` 类型的格式化提供了极大的灵活性。


  如前所述，`DecimalFormat` 类可以在其构造函数中接受一个基于字符串的模式。你也可以在事后使用 `applyPattern()` 方法将模式应用于
  `Format` 对象。每个模式都包含一个前缀、数字部分和后缀，允许你将特定的小数值格式化为所需的精度，并包含前导数字和逗号。每个模式还包含一个正子模式和一个负子模式。这两个子模式由分号（`;`）分隔，负子模式是可选的。如果没有负子模式，则使用本地化的负号。例如，一个完整的模式示例是
  `###,##0.00;(###,##0.00)`。


  注意


  构造函数 `Double(string)`、`Float(float)`、`Integer(int)`、`Long(long)`、`Character(char)`、`Short(short)`、`Byte(byte)`
  和 `Boolean(boolean)` 自版本 9 起已被弃用，并标记为待移除。可以使用


  `Float floatValue = 7.82f;`


  `Float floatValue = Float.valueOf("7.82");`


  来代替


  `new Double("345.9372");`


