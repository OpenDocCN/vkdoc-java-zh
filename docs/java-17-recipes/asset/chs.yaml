  example.start();

  }

  private void start() {

  ExternalizableProgramSettings settings = new ExternalizableProgramSettings(new Point(10,10),new
  Dimension(300,200), Color.blue, "The title of the application" );

  saveSettings(settings,"settingsExternalizable.bin");

  ExternalizableProgramSettings loadedSettings = loadSettings("settingsExternalizable.bin");

  System.out.println("设置是否相等？ :"+loadedSettings.equals(settings));

  }

  private void saveSettings(ExternalizableProgramSettings settings, String filename)
  {

  try {

  FileOutputStream fos = new FileOutputStream(filename);

  try (ObjectOutputStream oos = new ObjectOutputStream(fos)) {

  oos.writeObject(settings);

  }

  } catch (IOException e) {

  e.printStackTrace();

  }

  }

  private ExternalizableProgramSettings loadSettings(String filename) {

  try {

  FileInputStream fis = new FileInputStream(filename);

  ObjectInputStream ois = new ObjectInputStream(fis);

  return (ExternalizableProgramSettings) ois.readObject();

  } catch (IOException | ClassNotFoundException e) {

  e.printStackTrace();

  }

  return null;

  }

  }

  ```


  ### 工作原理


  Java 序列化框架允许你指定序列化对象的实现方式。它要求实现 `Externalizable` 接口，而不是 `Serializable` 接口。`Externalizable`
  接口包含两个方法：`writeExternal(ObjectOutput out)` 和 `readExternal(ObjectInput in)`。通过实现这些方法，你告诉框架如何编码/解码你的对象。你可以选择实现
  `Externalizable` 接口而非 `Serializable` 接口，因为 Java 的默认序列化效率非常低下。这是因为 Java 序列化框架需要确保每个对象（及其依赖对象）都被序列化。它甚至会写入具有默认值或可能为空和/或
  null 的对象。实现 `Externalizable` 接口还能让你更精细地控制类的序列化方式。在我们的示例中，`Serializable` 版本创建了 439
  字节的设置，而 `Externalizable` 版本仅占 103 字节！


  ## 8.3 将 Java 对象序列化为 XML


  ### 问题


  尽管你很喜欢序列化框架，但你希望创建至少是跨语言兼容（或人类可读）的内容。你希望使用 XML 来保存和加载对象。


  ### 解决方案


  在此示例中，`XMLEncoder` 对象对包含程序设置信息的 `Settings` 对象进行编码，并将其写入 `settings.xml` 文件。`XMLDecoder`
  对象获取 `settings.xml` 文件并将其作为流读取，从而解码 `Settings` 对象。`FileSystem` 获取对机器文件系统的访问权限。`FileOutputStream`
  将文件写入系统。`FileInputStream` 从文件系统中的文件获取输入字节。在此示例中，这三个文件对象创建新的 XML 文件并读取它们以进行处理。


  ```

  public static void main(String[] args) {

  Ch_8_3_XMLExample example = new Ch_8_3_XMLExample();

  example.start();

  }

  private void start() {

  ProgramSettings settings = new ProgramSettings(new Point(10,10),new Dimension(300,200),
  Color.blue, "The title of the application" );

  try {

  //编码

  FileSystem fileSystem = FileSystems.getDefault();

  try (FileOutputStream fos = new FileOutputStream("settings.xml"); XMLEncoder encoder
  =

  new XMLEncoder(fos)) {

  encoder.setExceptionListener((Exception e) -> {

  System.out.println("异常！ :"+e.toString());

  });

  encoder.writeObject(settings);

  }

  // 解码

  try (FileInputStream fis = new FileInputStream("settings.xml"); XMLDecoder decoder
  =

  new XMLDecoder(fis)) {

  ProgramSettings decodedSettings = (ProgramSettings) decoder.readObject();

  System.out.println("是否相同？ "+settings.equals(decodedSettings));

  }

  Path file= fileSystem.getPath("settings.xml");

  List xmlLines = Files.readAllLines(file, Charset.defaultCharset());

  xmlLines.stream().forEach((line) -> {

  System.out.println(line);

  });

  } catch (IOException e) {

  e.printStackTrace();

  }

  }

  ```




  ### 工作原理


  `XMLEncoder` 和 `XMLDecoder` 与序列化框架类似，使用反射来确定要写入哪些字段，但并非以二进制形式写入字段，而是将其写入为 XML。被编码的对象无需可序列化，但必须遵循
  JavaBeans 规范。


  JavaBeans 是指任何符合以下约定的对象。


  *   对象包含一个公共的空（`无参`）构造函数。

  *   对象为每个受保护/私有属性提供公共的 getter 和 setter 方法，其命名格式为 `get{属性}()` 和 `set{属性}()`。


  `XMLEncoder` 和 `XMLDecoder` 仅对具有公共访问器（`get{属性}, set{属性}`）的 bean 属性进行编码/解码，因此任何私有且没有访问器的属性都不会被编码/解码。


  提示


  在编码/解码时注册一个异常监听器是一个好习惯。


  `XMLEncoder` 会创建正在序列化的类的新实例（请记住，它们需要是 JavaBeans，因此必须有一个空的`无参`构造函数），然后找出哪些属性是可访问的（通过
  `get{属性}, set{属性}`）。如果新实例化类的某个属性与原始类的该属性包含相同的值（即具有相同的默认值），则 `XMLEncoder` 不会写入该属性。换句话说，如果某个属性的默认值没有改变，`XMLEncoder`
  就不会写入它。这提供了在不同版本之间更改“默认”值的灵活性。例如，如果某个属性的默认值在对象编码时为 2，而之后默认属性从 2 更改为 4，则解码后的对象将包含新的默认属性值
  4（这可能不正确）。


  `XMLEncoder` 还会跟踪引用。如果一个对象在对象图中被持久化时出现多次（例如，一个对象既在主类的 `Map` 中，又作为 `DefaultValue`
  属性存在），那么 `XMLEncoder` 只会对其进行一次编码，并通过在 XML 中放置一个链接来关联引用。`XMLEncoder`/`XMLDecoder`
  类比序列化框架宽容得多。在解码时，如果某个属性类型发生更改、被删除/添加/移动/重命名，解码过程会“尽可能多地”解码，同时跳过无法解码的属性。


  建议不要持久化你的主类（即使 `XMLEncoder` 更宽容），而是创建一些简单的、持有基本信息的、并且自身不执行太多任务的特殊对象。


  ## 8.4 创建 Socket 连接并通过网络发送可序列化对象


  ### 问题


  你需要打开一个网络连接来发送/接收对象。


  ### 解决方案


  使用 Java 的新输入/输出 API 版本 2（NIO.2）来发送和接收对象。以下解决方案利用了 NIO.2 的非阻塞套接字特性（使用 `Future` 任务）。


  ```

  public class Ch_8_4_AsyncChannel {

  private AsynchronousSocketChannel clientWorker;

  InetSocketAddress hostAddress;

  public Ch_8_4_AsyncChannel() {

  }

  private void start() throws IOException, ExecutionException, TimeoutException, InterruptedException
  {

  hostAddress = new InetSocketAddress(InetAddress.getByName("127.0.0.1"), 2583);

  Thread serverThread = new Thread(() -> {

  serverStart();

  });

  serverThread.start();

  Thread clientThread = new Thread(() -> {

  clientStart();

  });

  clientThread.start();

  }

  private void clientStart() {

  try {

  try (AsynchronousSocketChannel clientSocketChannel = AsynchronousSocketChannel.open())
  {

  Future connectFuture = clientSocketChannel.connect(hostAddress);

  connectFuture.get();            // 等待直到连接完成。

  OutputStream os = Channels.newOutputStream(clientSocketChannel);

  try (ObjectOutputStream oos = new ObjectOutputStream(os)) {

  for (int i = 0; i  serverFuture  = serverSocketChannel.accept();

  final AsynchronousSocketChannel clientSocket = serverFuture.get();

  System.out.println("已连接！");

  if ((clientSocket != null) && (clientSocket.isOpen())) {

  try (InputStream connectionInputStream = Channels.newInputStream(clientSocket))
  {

  ObjectInputStream ois = null;

  ois = new ObjectInputStream(connectionInputStream);

  while (true) {

  Object object = ois.readObject();

  if (object.equals("EOF")) {

  clientSocket.close();

  break;

  }

  System.out.println("收到 :" + object);

  }

  ois.close();

  }

  }

  } catch (IOException | InterruptedException | ExecutionException | ClassNotFoundException
  e) {

  e.printStackTrace();

  }

  }

  public static void main(String[] args) throws IOException, ExecutionException, TimeoutException,
  InterruptedException {

  Ch_8_4_AsyncChannel example = new Ch_8_4_AsyncChannel();

  example.start();

  }

  }

  输出结果为：

  已连接！

  收到 :Look at me 0

  收到 :Look at me 1

  收到 :Look at me 2

  收到 :Look at me 3

  收到 :Look at me 4

  ```




  ### 工作原理


  在最基本的层面上，套接字需要类型、IP 地址和端口。虽然关于套接字的文献已经浩如烟海，但其核心思想却相当直接。就像邮局一样，套接字通信依赖于地址。这些地址负责传递数据。在本例中，我们选择了回环地址（即程序运行所在的同一台计算机）（127.0.0.1）和一个随机端口号（2583）。


  新的 NIO.2 的优势在于其异步性。通过使用异步调用，您可以扩展应用程序，而无需为每个连接创建数千个线程。在我们的示例中，我们使用了异步调用并等待连接，为了示例的简洁性，这实际上使其变成了单线程，但请不要因此限制您使用更多异步调用来增强此示例。（请参阅本书多线程部分的技巧。）


  客户端要建立连接，需要一个套接字通道。NIO.2 API 允许创建异步套接字通道。一旦创建了套接字通道，它就需要一个要连接的地址。`socketChannel.connect()`
  操作不会阻塞；相反，它会返回一个 `Future` 对象（这与传统的 NIO 不同，在传统 NIO 中，调用 `socketChannel.connect()`
  会阻塞，直到连接建立）。`Future` 对象允许 Java 程序继续执行其任务，并简单地查询已提交任务的状态。进一步打个比方，这就像您不必在前门等待邮件到达，而是可以做其他事情，并定期检查邮件是否已到达。Future
  对象具有 `isDone()` 和 `isCancelled()` 等方法，可让您了解任务是已完成还是已取消。它还有 `get()` 方法，允许您等待任务完成。在我们的示例中，我们使用
  `Future.get()` 来等待客户端连接建立。


  一旦连接建立，就使用 `Channels.newOutputStream()` 创建一个输出流来发送信息。使用装饰器模式，用 `ObjectOutputStream`
  装饰 `outputStream`，以便最终通过套接字发送对象。


  服务器端代码稍微复杂一些。服务器套接字连接允许多个连接同时发生。因此，它们监听或接收连接，而不是发起连接。出于这个原因，服务器通常异步等待连接。


  服务器首先建立其监听的地址（127.0.0.1:2583）并接受连接。调用 `serverSocketChannel.accept()` 会返回另一个 `Future`
  对象，它为您灵活处理传入连接提供了便利。在我们的示例中，服务器连接简单地调用了 `future.get()`，该方法会阻塞（停止程序执行），直到有连接被接受。


  服务器获取套接字通道后，通过调用 `Channels.newInputStream(socket)` 创建一个 `inputStream`，然后用 `ObjectInputStream`
  包装该输入流。然后，服务器进入循环，读取来自 `ObjectInputStream` 的每个对象。如果接收到的对象的 `toString()` 方法等于 `EOF`，服务器将停止循环，并关闭连接。


  注意


  使用 `ObjectOutputStream` 和 `ObjectInputStream` 发送和接收大量对象可能会导致内存泄漏。`ObjectOutputStream`
  会保留已发送对象的副本以提高效率。如果您再次发送同一个对象，`ObjectOutputStream` 和 `ObjectInputStream` 不会再次发送该对象，而是发送一个先前发送过的对象
  ID。这种发送对象 ID 而非整个对象的行为会引发两个问题。


  第一个问题是，就地更改（可变）的对象在通过网络发送时，不会在接收客户端反映更改。原因是，由于该对象已被发送过一次，`ObjectOutputStream` 认为该对象已经传输完毕，因此只发送其
  ID，从而忽略了自发送以来对该对象所做的任何更改。为避免这种情况，请不要对通过网络发送的对象进行更改。此规则也适用于对象图中的子对象。


  第二个问题是，由于 `ObjectOutputStream` 维护了一个已发送对象及其对象 ID 的列表，如果您发送大量对象，已发送对象到键的字典会无限增长，导致长时间运行的程序内存不足。为了缓解这个问题，您可以调用
  `ObjectOutputStream.reset()`，它会清空已发送对象的字典。或者，您可以调用 `ObjectOutputStream.writeUnshared()`，这样就不会在
  `ObjectOutputStream` 字典中缓存该对象。


