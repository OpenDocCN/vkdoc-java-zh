  \ value) {\nthis.id = value;\n}\n}\n```\n\n上述代码会写入以下文件内容。\n\n```\n\nJohn Smith\n\
  Common Cold\n\nJane Doe\nBroken ankle\n\nJack Brown\nFood allergy\n\n```\n\n工作原理\n\
  \nJava 标准库提供了多种编写 XML 文档的方式。本方法使用了 `javax.xml.stream` 包中定义的 StAX。编写 XML 文档需要五个步骤。\n\
  \n1.  创建文件输出流。\n2.  创建 XML 输出工厂和 XML 输出流写入器。\n3.  将文件流包装到 XML 流写入器中。\n4.  使用 XML\
  \ 流写入器的写入方法创建文档并写入 XML 元素。\n5.  关闭输出流。\n\n使用 `java.io.FileOutputStream` 类创建文件输出流。你可以使用\
  \ `try-block` 来打开和关闭此流。\n`javax.xml.stream.XMLOutputFactory` 提供了一个静态方法来创建输出工厂。使用该工厂创建一个\
  \ `javax.xml.stream.XMLStreamWriter`。\n\n获得写入器后，将文件流对象包装到 XML 写入器实例中。你使用各种写入方法来创建\
  \ XML 文档元素和属性。最后，在完成文件写入后，只需关闭写入器即可。`XMLStreamWriter` 实例的一些更有用的方法如下。\n\n*   `writeStartDocument()`\n\
  *   `writeStartElement()`\n*   `writeEndElement()`\n*   `writeEndDocument()`\n*\
  \   `writeAttribute()`\n\n创建文件和 `XMLStreamWriter` 后，应始终通过调用 `writeStartDocumentMethod()`\
  \ 方法来开始文档。然后，结合使用 `writeStartElement()` 和 `writeEndElement()` 方法来写入各个元素。当然，元素可以包含嵌套元素。你需要按正确的顺序调用这些方法，以创建格式良好的文档。使用\
  \ `writeAttribute()` 方法将属性名称和值放入当前元素。应在调用 `writeStartElement()` 方法后立即调用 `writeAttribute()`。最后，使用\
  \ `writeEndDocument()` 方法标记文档结束，并关闭 `Writer` 实例。\n使用 `XMLStreamWriter` 的一个有趣之处在于它不会格式化文档输出。除非你专门使用\
  \ `writeCharacters()` 方法来输出空格和换行符，否则输出流将输出为单个未格式化的行。当然，这不会使生成的 XML 文件无效，但确实会给人类阅读带来不便和困难。因此，你应该考虑使用\
  \ `writeCharacters()` 方法根据需要输出间距和换行符，以创建人类可读的文档。如果你不需要文档供人类阅读，则可以安全地忽略这种写入额外空白和换行符的方法。无论格式如何，XML\
  \ 文档都将是格式良好的，因为它遵循正确的 XML 语法。\n\n以下是此示例代码的命令行使用模式。\n\n```\njava org.java17recipes.chapter15.recipe15_1.DocWriter\
  \ \n```\n\n按以下方式调用此应用程序以创建名为 `patients.xml` 的文件。\n\n```\njava org.java17recipes.chapter15.recipe15_1.DocWriter\
  \ patients.xml\n```\n\n15.2 读取 XML 文件\n\n问题\n你需要解析 XML 文档，检索已知的元素和属性。\n\n解决方案 1\n\
  \n使用 `javax.xml.stream.XMLStreamReader` 接口读取文档。使用此 API，你的代码使用类似于 SQL 中游标的接口来拉取 XML\
  \ 元素，以依次处理每个元素。以下来自 `org.java17recipes.DocReader` 的代码片段演示了如何读取上一个方法中生成的 `patients.xml`\
  \ 文件。\n\n\n\n```\npublic void cursorReader(String xmlFile)\nthrows FileNotFoundException,\
  \ IOException, XMLStreamException {\nXMLInputFactory factory = XMLInputFactory.newFactory();\n\
  try (FileInputStream fis = new FileInputStream(xmlFile)) {\nXMLStreamReader reader\
  \ = factory.createXMLStreamReader(fis);\nboolean inName = false;\nboolean inDiagnosis\
  \ = false;\nString id = null;\nString name = null;\nString diagnosis = null;\nwhile\
  \ (reader.hasNext()) {\nint event = reader.next();\nswitch (event) {\ncase XMLStreamConstants.START_ELEMENT:\n\
  String elementName = reader.getLocalName();\nswitch (elementName) {\ncase \"patient\"\
  :\nid = reader.getAttributeValue(0);\nbreak;\ncase \"name\":\ninName = true;\nbreak;\n\
  case \"diagnosis\":\ninDiagnosis = true;\nbreak;\ndefault:\nbreak;\n}\nbreak;\n\
  case XMLStreamConstants.END_ELEMENT:\nString elementname = reader.getLocalName();\n\
  if (elementname.equals(\"patient\")) {\nSystem.out.printf(\"Patient: %s\\nName:\
  \ %s\\nDiagnosis: %s\\n\\n\",id, name,\ndiagnosis);\nid = name = diagnosis = null;\n\
  inName = inDiagnosis = false;\n}\nbreak;\ncase XMLStreamConstants.CHARACTERS:\n\
  if (inName) {\nname = reader.getText();\ninName = false;\n} else if (inDiagnosis)\
  \ {\ndiagnosis = reader.getText();\ninDiagnosis = false;\n}\nbreak;\ndefault:\n\
  break;\n}\n}\nreader.close();\n}\n}\n```\n\n**方案 2**\n\n使用 `XMLEventReader` 通过事件驱动的接口来读取和处理事件。该\
  \ API 也被称为*迭代器驱动* API。以下代码与方案 1 中的代码非常相似，不同之处在于它使用了事件驱动 API 而非游标驱动 API。此代码片段同样来自方案\
  \ 1 中使用的 `org.java17recipes.chapter15.recipe15_1.DocReader` 类。\n\n```\npublic void\
  \ eventReader(String xmlFile)\nthrows FileNotFoundException, IOException, XMLStreamException\
  \ {\nXMLInputFactory factory = XMLInputFactory.newFactory();\nXMLEventReader reader\
  \ = null;\ntry(FileInputStream fis = new FileInputStream(xmlFile)) {\nreader = factory.createXMLEventReader(fis);\n\
  boolean inName = false;\nboolean inDiagnosis = false;\nString id = null;\nString\
  \ name = null;\nString diagnosis = null;\nwhile(reader.hasNext()) {\nXMLEvent event\
  \ = reader.nextEvent();\nString elementName = null;\nswitch(event.getEventType())\
  \ {\ncase XMLEvent.START_ELEMENT:\nStartElement startElement = event.asStartElement();\n\
  elementName = startElement.getName().getLocalPart();\nswitch(elementName) {\ncase\
  \ \"patient\":\nid = startElement.getAttributeByName(QName.valueOf(\"id\")).getValue();\n\
  break;\ncase \"name\":\ninName = true;\nbreak;\ncase \"diagnosis\":\ninDiagnosis\
  \ = true;\nbreak;\ndefault:\nbreak;\n}\nbreak;\ncase XMLEvent.END_ELEMENT:\nEndElement\
  \ endElement = event.asEndElement();\nelementName = endElement.getName().getLocalPart();\n\
  if (elementName.equals(\"patient\")) {\nSystem.out.printf(\"Patient: %s\\nName:\
  \ %s\\nDiagnosis: %s\\n\\n\",id, name, diagnosis);\nid = name = diagnosis = null;\n\
  inName = inDiagnosis = false;\n}\nbreak;\ncase XMLEvent.CHARACTERS:\nString value\
  \ = event.asCharacters().getData();\nif (inName) {\nname = value;\ninName = false;\n\
  } else if (inDiagnosis) {\ndiagnosis = value;\ninDiagnosis = false;\n}\nbreak;\n\
  }\n}\n}\nif(reader != null) {\nreader.close();\n}\n}\n```\n\n`main` 方法如下：\n\n```java\n\
  public static void main(String[] args) {\nString fileName = null;\nif (args.length\
  \ != 1) {\nSystem.out.printf(\"用法: java org.java8recipes.chapter20.recipe20_2.DocReader\
  \ \\n\");\nfileName = \"patients.xml\";\n} else {\nfileName = args[0];\n}\nDocReader\
  \ app = new DocReader();\ntry {\napp.run(fileName);\n} catch (FileNotFoundException\
  \ ex) {\nex.printStackTrace();\n} catch (IOException | XMLStreamException ioex)\
  \ {\nioex.printStackTrace();\n}\n}\npublic void run(String xmlFile) throws FileNotFoundException,\
  \ IOException, XMLStreamException {\ncursorReader(xmlFile);\neventReader(xmlFile);\n\
  }\n```\n\nXML 文件内容如下：\n\n```xml\n\nJohn Smith\nCommon Cold\n\nJane Doe\nBroken Ankle\n\
  \nJack Brown\nFood Allergy\n\n```\n\n输出结果为：\n\n```\nPatient: 1\nName: John Smith\n\
  Diagnosis: Common Cold\nPatient: 2\nName: Jane Doe\nDiagnosis: Broken Ankle\nPatient:\
  \ 3\nName: Jack Brown\nDiagnosis: Food Allergy\n```\n\n**工作原理**\n\nJava 提供了多种读取\
  \ XML 文档的方式。其中一种是使用 StAX，这是一种流式模型。它优于较旧的 SAX API，因为它允许你读取和写入 XML 文档。尽管 StAX 不如 DOM\
  \ API 强大，但它是一种出色且高效的 API，对内存资源的消耗较小。\n\nStAX 提供了两种读取 XML 文档的方法：游标 API 和迭代器 API。游标驱动的\
  \ API 使用一个游标，可以从头到尾遍历 XML 文档，一次指向一个元素，并且始终向前移动。迭代器 API 将 XML 文档流表示为一组离散的事件对象，这些对象按照它们在源\
  \ XML 中被读取的顺序提供。事件驱动的迭代器 API 比游标 API 更受青睐，因为它提供了 `XMLEvent` 对象，具有以下优点。\n\n*   `XMLEvent`\
  \ 对象是不可变的，即使 StAX 解析器已经处理到后续事件，它们仍然可以持久存在。你可以将这些 `XMLEvent` 对象传递给其他进程，或者将它们存储在列表、数组和映射中。\n\
  \n*   你可以继承 `XMLEvent`，根据需要创建你自己的专用事件。\n\n*   你可以通过添加或删除事件来修改传入的事件流，这比游标 API 更加灵活。\n\
  \n要使用 StAX 读取文档，请在文件输入流上创建一个 XML 事件读取器。使用 `hasNext()` 方法检查是否还有可用的事件，并使用 `nextEvent()`\
  \ 方法读取每个事件。`nextEvent()` 方法返回特定类型的 `XMLEvent`，该事件对应于 XML 文件中的开始和结束元素、属性以及值数据。完成这些对象的操作后，请记得关闭读取器和文件流。\n\
  \n**15.3 转换 XML**\n\n**问题**\n\n你想将 XML 文档转换为其他格式，例如 HTML。\n\n**解决方案**\n\n使用 `javax.xml.transform`\
  \ 包将 XML 文档转换为另一种文档格式。\n\n以下代码演示了如何读取源文档、应用可扩展样式表语言（XSL）转换文件，并生成转换后的新文档。使用 `org.java17recipes.chapter15.recipe15_3.TransformXml`\
  \ 类中的示例代码来读取 `patients.xml` 文件并创建 `patients.html` 文件。以下代码片段展示了该类的关键部分。\n\n```java\n\
  import javax.xml.transform.TransformerConfigurationException;\nimport javax.xml.transform.TransformerException;\n\
  import javax.xml.transform.TransformerFactory;\nimport javax.xml.transform.Transformer;\n\
  import javax.xml.transform.Source;\nimport javax.xml.transform.stream.StreamResult;\n\
  import javax.xml.transform.stream.StreamSource;\n...\npublic void run(String xmlFile,\
  \ String xslFile, String outputFile)\nthrows FileNotFoundException, TransformerConfigurationException,\
  \ TransformerException {\nInputStream xslInputStream = new FileInputStream(xslFile);\n\
  Source xslSource = new StreamSource(xslInputStream);\nTransformerFactory factory\
  \ = TransformerFactory.newInstance();\nTransformer transformer = factory.newTransformer(xslSource);\n\
  InputStream xmlInputStream = new FileInputStream(xmlFile);\nStreamSource in = new\
  \ StreamSource(xmlInputStream);\nStreamResult out = new StreamResult(outputFile);\n\
  transformer.transform(in, out);\n}\npublic static void main(String[] args) {\nString\
  \ fileName = null;\nString fileName2 = null;\nString fileName3 = null;\nif (args.length\
  \ != 3) {\nSystem.out.printf(\"用法: java org.java17recipes.chapter15.recipe15_03.TransformXml\
  \   \\n\");\nfileName = \"patients.xml\";\nfileName2 = \"patients.xsl\";\nfileName3\
  \ = \"patients.html\";\n} else {\nfileName = args[0];\nfileName2 = args[1];\nfileName3\
  \ = args[2];\n}\nTransformXml app = new TransformXml();\ntry {\napp.run(fileName,\
  \ fileName2, fileName3);\n} catch (FileNotFoundException ex) {\nex.printStackTrace();\n\
  } catch (TransformerConfigurationException ex) {\nex.printStackTrace();\n} catch\
  \ (TransformerException ex) {\nex.printStackTrace();\n}\n}\n```\n\n输出结果为 `patients.html`\
  \ 文件。\n\n\n\n工作原理\n`javax.xml.transform` 包包含了将 XML 文档转换为任何其他文档类型所需的所有类。最常见的用例是将面向数据的\
  \ XML 文档转换为用户可读的 HTML 文档。\n\n从一种文档类型转换到另一种文档类型需要三个文件。\n\n*   一个 XML 源文档\n*   一个\
  \ XSL 转换文档，用于将 XML 元素映射到新文档元素\n*   一个目标输出文件\n\nXML 源文档当然是您的源数据文件。它通常包含易于以编程方式解析的面向数据的内容。然而，人们不容易阅读\
  \ XML 文件，尤其是复杂、数据丰富的文件。相反，人们更习惯于阅读正确渲染的 HTML 文档。\nXSL 转换文档指定了 XML 文档应如何转换为不同的格式。XSL\
  \ 文件通常包含一个 HTML 模板，该模板指定了保存源 XML 文件提取内容的动态字段。\n\n在本示例的源代码中，您将找到两个源文档。\n\n*   `chapter15/recipe15_3/patients.xml`\n\
  *   `chapter15/recipe15_3/patients.xsl`\n\n`patients.xml` 文件很短，包含以下数据。\n\n```\n\n\
  John Smith\nCommon Cold\n\nJane Doe\nBroken ankle\n\nJack Brown\nFood allergy\n\n\
  ```\n\n`patients.xml` 文件定义了一个名为 `patients` 的根元素。它有三个嵌套的 `patient` 元素。`patient` 元素包含三部分数据。\n\
  \n*   作为 `patient` 元素的 `id` 属性提供的患者标识符\n*   作为 `name` 子元素提供的患者姓名\n*   作为 `diagnosis`\
  \ 子元素提供的患者诊断\n\n转换 XSL 文档 (`patients.xsl`) 也很小，它只是使用 XSL 将患者数据映射为更用户可读的 HTML 格式。\n\
  \n```\n\nPatients\n\nId\nName\nDiagnosis\n\n```\n\n使用此样式表，示例代码将 XML 转换为包含所有患者及其数据的\
  \ HTML 表格。在浏览器中渲染时，HTML 表格应如图 15-1 所示。\n\n![](img/323910_4_En_15_Fig1_HTML.jpg)\n\
  \n图 15-1 HTML 表格的常见渲染效果\n\n使用此 XSL 文件将 XML 转换为 HTML 文件的过程很简单，但每个步骤都可以通过添加额外的错误检查和处理来增强。对于此示例，请参考解决方案部分中的先前代码。\n\
  \n以下是最基本的转换步骤。\n\n1.  将 XSL 文档作为 `Source` 对象读入您的 Java 应用程序。\n2.  创建一个 `Transformer`\
  \ 实例，并提供您的 XSL `Source` 实例以供其操作期间使用。\n3.  创建一个表示源 XML 内容的 `SourceStream`。\n4.  为您的输出文档（本例中为\
  \ HTML 文件）创建一个 `StreamResult` 实例。\n5.  使用 `Transformer` 对象的 `transform()` 方法执行转换。\n\
  6.  根据需要关闭所有相关的流和文件实例。\n\n如果您选择执行示例代码，应使用 `patients.xml`、`patients.xsl` 和 `patients.html`\
  \ 作为参数，按以下方式调用它。\n\n```\njava org.java17recipes.chapter15.recipe15_3.TransformXml\
  \ \n```\n\n15.4 验证 XML\n\n问题\n您希望确认您的 XML 是有效的——即它符合已知的文档定义或模式。\n\n解决方案\n\n使用 `javax.xml.validation`\
  \ 包验证您的 XML 是否符合特定模式。以下来自 `org.java17recipes.chapter15.recipe15_4.ValidateXml` 的代码片段演示了如何针对\
  \ XML 模式文件进行验证。\n\n```\nimport java.io.File;\nimport java.io.IOException;\nimport\
  \ javax.xml.XMLConstants;\nimport javax.xml.transform.Source;\nimport javax.xml.transform.stream.StreamSource;\n\
  import javax.xml.validation.Schema;\nimport javax.xml.validation.SchemaFactory;\n\
  import javax.xml.validation.Validator;\nimport org.xml.sax.SAXException;\n...\n\
  public void run(String xmlFile, String validationFile) {\nboolean valid = true;\n\
  SchemaFactory sFactory =\nSchemaFactory.newInstance(XMLConstants.W3C_XML_SCHEMA_NS_URI);\n\
  try {\nSchema schema = sFactory.newSchema(new File(validationFile));\nValidator\
  \ validator = schema.newValidator();\nSource source = new StreamSource(new File(xmlFile));\n\
  validator.validate(source);\n} catch (SAXException | IOException | IllegalArgumentException\
  \ ex) {\nvalid = false;\n}\nSystem.out.printf(\"XML file is %s.\\n\", valid ? \"\
  valid\" : \"invalid\");\n}\npublic static void main(String[] args) {\nif (args.length\
  \ != 2) {\nSystem.out.println(\"Usage: java org.java17recipes.chapter15.recipe15_04.ValidateXml\
  \  \");\nSystem.exit(1);\n}\nValidateXml app = new ValidateXml();\napp.run(args[0],\
  \ args[1]);\n}\n```\n\n工作原理\n\n在使用 XML 时，对其进行验证以确保语法正确且 XML 文档是指定 XML 模式的一个实例非常重要。验证过程涉及比较模式和\
  \ XML 文档以发现任何差异。`javax.xml.validation` 包提供了可靠地针对各种模式验证 XML 文件所需的所有类。您用于 XML 验证的最常见模式在\
  \ `XMLConstants` 类中定义为常量 URI。\n\n*   `XMLConstants.W3C_XML_SCHEMA_NS_URI`\n*   `XMLConstants.RELAXNG_NS_URI`\n\
  \n首先为特定类型的模式定义创建一个 `SchemaFactory`。`SchemaFactory` 知道如何解析特定的模式类型，并为其验证做好准备。使用 `SchemaFactory`\
  \ 实例创建一个 `Schema` 对象。`Schema` 对象是模式定义语法的内存表示。您可以使用 `Schema` 实例检索一个理解此语法的 `Validator`\
  \ 实例。最后，使用 `validate()` 方法检查您的 XML。如果在验证过程中出现任何问题，该方法调用会生成多个异常。否则，`validate()` 方法会静默返回，您可以继续使用该\
  \ XML 文件。\n\n注意\n\nXML Schema 于 2001 年率先获得万维网联盟 (W3C) 的“推荐”状态。此后出现了竞争性的模式。一种竞争性模式是下一代正则语言\
  \ (RELAX NG) 模式。RELAX NG 可能是一种更简单的模式，其规范还定义了一种非 XML 的紧凑语法。本示例使用了 XML 模式。\n\n使用以下命令行语法运行示例代码，最好使用作为\
  \ `resources/patients.xml` 和 `patients.xsl` 提供的示例 `.xml` 文件和验证文件，其中 XSL 如下所示。\n\n\
  ```\n\nPatients\n\nId\nName\nDiagnosis\n\n```\n\n15.5 使用 JSON\n\n问题\n您有兴趣在 Java\
  \ 应用程序中使用 JSON。\n\n解决方案\nJSON 是一种源自 JavaScript 的免费且独立的数据格式。它通常用于从 Web 服务器读取数据并在网页上显示数据，仅仅因为其格式仅为文本。有不同的库可以在您的\
  \ Java 项目中管理 JSON。从 [`https://github.com/stleary/JSON-java`](https://github.com/stleary/JSON-java)\
  \ 下载 `org.json` 库，并将其作为依赖项添加到您的 Java 应用程序中。\n\n工作原理\n`org.JSON` 包实现了编码器和解码器，用于将\
  \ JSON 文档解析为 Java 对象，并从 Java 类生成 JSON 文档，还包括在 JSON 和 XML 之间进行转换的功能。通过将下载的 JAR 文件添加到\
  \ CLASSPATH 中，也很容易包含该 API。Java 中有许多 JSON 包（例如，[`https://github.com/google/gson`](https://github.com/google/gson)\
  \ 上的 GSON），但 Java 社区尚未标准化其中一个。\n\n\n\n15.6 构建一个\nJSON 对象\n\n问题\n你希望在 Java 应用程序中构建一个\
  \ JSON 对象。\n\n解决方案\n\n利用 JSON API 来构建一个 JSON 对象。在以下代码中，构建了一个与书籍相关的 JSON 对象。\n\n\
  ```\npublic class BuildingJSONObject {\npublic static void main(String[] args) {\n\
  JSONObject json = new JSONObject();\njson.put(\"title\", \"Java 17 Recipes\");\n\
  JSONObject authorName = new JSONObject();\nauthorName.put(\"firstName\",\"Luciano\"\
  );\nauthorName.put(\"lastName\",\"Manelli\");\njson.put(\"author\", authorName);\n\
  JSONObject editor1 = new JSONObject();\neditor1.put(\"firstName\", \"Steve\");\n\
  editor1.put(\"lastName\", \"Anglin\");\nJSONObject editor2 = new JSONObject();\n\
  editor2.put(\"firstName\",\"Matthew\");\neditor2.put(\"lastName\",\"Moodie\");\n\
  JSONArray editors = new JSONArray();\neditors.put(editor1);\neditors.put(editor2);\n\
  json.put(\"editor\", editors);\nSystem.out.println(json.toString());\n}\n}\n```\n\
  \n以下是输出结果。\n\n```\n{\"editor\":[{\"firstName\":\"Steve\",\"lastName\":\"Anglin\"\
  },{\"firstName\":\"Matthew\",\"lastName\":\"Moodie\"}],\"author\":{\"firstName\"\
  :\"Luciano\",\"lastName\":\"Manelli\"},\"title\":\"Java 17 Recipes\"}\n```\n\n工作原理\n\
  JSON API 使用构建器模式创建 JSON 对象。通过使用 JSON 对象，可以借助一系列 `put` 方法调用来构建 JSON 对象，这些调用相互叠加。一旦\
  \ JSON 对象构建完成，它就可以被使用或作为字符串打印出来。\n\n在本示例中，你构建了一个提供书籍详细信息的 JSON 对象。`put` 方法用于添加更多的名称/值属性（很像\
  \ `Map` 的 `put` 方法）。因此，下面这行代码添加了一个名为 `title`、值为“Java 17 Recipes”的属性。\n\n```\n.put(\"\
  title\", \"Java 17 Recipes\")\n```\n\n对象可以相互嵌套，在一个 JSON 对象内部创建子部分的分层结构。例如，在第一次调用\
  \ `put`() 之后，可以通过调用一个新的 JSON 对象作为 `put()` 操作的值，并传入该嵌套对象的名称，将另一个对象嵌入到初始 JSON 对象中。嵌套对象也可以包含属性（`authorName`），因此要向嵌套对象添加属性，可以在该嵌套对象内部调用\
  \ `put`() 方法。JSON 对象可以根据需要包含任意数量的嵌套对象。一个 JSON 对象也可能包含一个相关子对象的数组。要添加一个子对象数组，可以调用\
  \ `JSONArray()` 方法，并将数组名称作为参数传入。数组可以由对象、对象层级结构、数组等组成。一旦创建了 JSON 对象，它就可以被使用并传递给客户端。\n\
  \n15.7 将 JSON 对象写入文件\n\n问题\n你已经生成或解析了一个 JSON 对象，并希望将其以文件格式存储在磁盘上。\n\n解决方案\n\n利用\
  \ JSON API 构建一个 JSON 对象，然后将其存储到文件系统中。该类与 `java.io.Writer` 包配合使用，使得在磁盘上创建文件并将 JSON\
  \ 写入该文件成为可能。在以下示例中，使用此技术将配方 15-6 中生成的 JSON 对象写入磁盘。\n\n```\npublic class BuildingJSONObject\
  \ {\npublic static void main(String[] args) {\nJSONObject json = new JSONObject();\n\
  json.put(\"title\", \"Java 17 Recipes\");\nJSONObject authorName = new JSONObject();\n\
  authorName.put(\"firstName\",\"Luciano\");\nauthorName.put(\"lastName\",\"Manelli\"\
  );\njson.put(\"author\", authorName);\nJSONObject editor1 = new JSONObject();\n\
  editor1.put(\"firstName\", \"Steve\");\neditor1.put(\"lastName\", \"Anglin\");\n\
  JSONObject editor2 = new JSONObject();\neditor2.put(\"firstName\",\"Matthew\");\n\
  editor2.put(\"lastName\",\"Moodie\");\nJSONArray editors = new JSONArray();\neditors.put(editor1);\n\
  editors.put(editor2);\njson.put(\"editor\", editors);\ntry {\nWriter jsonWriter\
  \ = json.write(new FileWriter(\"Book.json\")) ;\njsonWriter.flush();\n} catch (IOException\
  \ ex) {\nSystem.out.println(ex);\n}\n}\n}\n```\n输出结果是 Book.json 文件：\n```\n{\"editor\"\
  :[{\"firstName\":\"Steve\",\"lastName\":\"Anglin\"},{\"firstName\":\"Matthew\",\"\
  lastName\":\"Moodie\"}],\"author\":{\"firstName\":\"Luciano\",\"lastName\":\"Manelli\"\
  },\"title\":\"Java 17 Recipes\"}\n```\n\n工作原理\n`.write` 方法可用于将 JSON 对象写入 Java 的\
  \ Writer 对象。它通过将一个 `Writer` 对象作为参数传递给 `Json.write()` 方法来实例化。创建 `jsonWriter` 之后，可以调用\
  \ flush 方法来写入 JSON 文件。\n\n15.8 解析一个 JSON 对象\n\n问题\n\n你创建的应用程序需要能够读取一个 JSON 对象并相应地解析它。使用以下\
  \ JSON 脚本。\n\n```\n{\n\"title\":\"Java 17 Recipes\",\n\"author\":{\"firstName\"\
  :\"Luciano\",\"lastName\":\"Manelli\"},\n\"projectCoordinator\":{\"firstName\":\"\
  Mark\",\"lastName\":\"Powers\"},\n\"editor\":[{\"firstName\":\"Welmoed\",\"lastName\"\
  :\"Spahr\"},{\"firstName\":\"Steve\",\"lastName\":\"Anglin\"},{\"firstName\":\"\
  Matthew\",\"lastName\":\"Moodie\"}],\n\"technicalReviewer\":[{\"firstName\":\"Manuel\"\
  ,\"lastName\":\"Jordan\"}]\n}\n```\n\n解决方案\n\n利用 `JSONObject` 类将 JSON 字符串转换为 JSON\
  \ 对象，读取 JSON 对象，然后使用 `getJSONObject` 和 `getJSONArray` 方法对 JSON 数据执行操作。以下示例演示了如何解析\
  \ JSON 字符串以显示一些内容。\n\n```\npublic void parseObject() {\nString json = \"{\\\"title\\\
  \":\\\"Java EE 17 Recipes\\\",\\\"author\\\":{\\\"firstName\\\":\\\"Luciano\\\"\
  ,\\\"lastName\\\":\\\"Manelli\\\"},\\\"projectCoordinator\\\":{\\\"firstName\\\"\
  :\\\"Mark\\\",\\\"lastName\\\":\\\"Powers\\\"},\\\"editor\\\":[{\\\"firstName\\\"\
  :\\\"Welmoed\\\",\\\"lastName\\\":\\\"Spahr\\\"},{\\\"firstName\\\":\\\"Steve\\\"\
  ,\\\"lastName\\\":\\\"Anglin\\\"},{\\\"firstName\\\":\\\"Matthew\\\",\\\"lastName\\\
  \":\\\"Moodie\\\"}],\\\"technicalReviewer\\\":[{\\\"firstName\\\":\\\"Manuel\\\"\
  ,\\\"lastName\\\":\\\"Jordan\\\"}]}\";\nSystem.out.println(json);\nJSONObject parserJson\
  \ = new JSONObject(json);\nString author = parserJson.getJSONObject(\"author\").getString(\"\
  lastName\");\nSystem.out.println(\"Author:\"+author);\nJSONArray arr = parserJson.getJSONArray(\"\
  editor\");\nfor (int i = 0; i < arr.length(); i++) {\nString editor = arr.getJSONObject(i).getString(\"\
  lastName\");\nSystem.out.println(editor);\n}\n}\n```\n\n在该示例中，JSON 字符串被解析。以下是输出结果。\n\
  \n```\nAuthor:Manelli\neditor:Spahr\neditor:Anglin\neditor:Moodie\n```\n\n工作原理\n\
  JSON 方法生成一个 JSON 对象。要执行某些任务，必须解析 JSON 对象，以仅找出当前任务所需且有用的内容。使用 JSON 解析器可以使此类工作更简单，因为解析器可以将对象分解成多个部分，以便根据需要检查每个不同的部分，从而产生所需的结果。\n\
  在本例中，我们使用了 `getJSONArray` 来遍历对象数组，并使用 `getJSONObject` 来解析对象。\n\n\n\n15.9 小结\nXML\
  \ 常用于在不同应用程序之间传输数据，或将某种数据存储到文件中。因此，理解在应用程序开发平台中处理 XML 的基础知识至关重要。本章概述了如何使用 Java 执行一些处理\
  \ XML 的关键任务。本章首先介绍了 XML 读写的基础知识。此外，本章还涉及了 JSON，演示了如何生成、写入和解析 JSON 数据。\n\n16. 网络\n\
  \n如今，编写一个完全不通过互联网进行通信的应用程序已十分罕见。从向另一台机器发送数据，到从远程网页抓取信息，网络在当今的计算世界中扮演着不可或缺的角色。Java\
  \ 利用新的 I/O (NIO) 和 Java 平台的众多 I/O 特性 (NIO.2) API，使得通过网络进行通信变得简单。本章并不试图涵盖 Java 语言中所有的网络特性，因为这个主题非常庞大。然而，它确实提供了一些对广大开发者最为有用的实用方法。你将了解一些标准的网络概念，例如套接字，以及\
  \ Java 语言最新版本中引入的一些较新概念。如果你觉得本章内容有趣，并想了解更多关于 Java 网络的知识，可以在网上找到大量资源。\n\n16.1 监听服务器上的连接\n\
  \n问题\n你想要创建一个监听远程客户端连接的服务器应用程序。\n\n解决方案\n\n建立一个服务器端应用程序，使用 `java.net.ServerSocket`\
  \ 在指定端口上监听请求。以下 Java 类代表了可部署到服务器上的典型类，它监听 `1234` 端口上的传入请求。当收到请求时，传入的消息会打印到命令行，并向客户端发送回响应。\n\
  \n```\nimport java.io.BufferedReader;\nimport java.io.IOException;\nimport java.io.InputStreamReader;\n\
  import java.io.PrintWriter;\nimport java.net.ServerSocket;\nimport java.net.Socket;\n\
  public class SocketServer {\npublic static void main(String a[]) {\nfinal int httpd\
  \ = 1234;\nServerSocket ssock = null;\ntry {\nssock = new ServerSocket(httpd);\n\
  System.out.println(\"have opened port 1234 locally\");\nSocket sock = ssock.accept();\n\
  System.out.println(\"client has made socket connection\");\ncommunicateWithClient(sock);\n\
  System.out.println(\"closing socket\");\n} catch (Exception e) {\nSystem.out.println(e);\n\
  } finally {\ntry{\nssock.close();\n} catch (IOException ex) {\nSystem.out.println(ex);\n\
  }\n}\n}\npublic static void communicateWithClient(Socket socket) {\nBufferedReader\
  \ in = null;\nPrintWriter out = null;\ntry {\nin = new BufferedReader(\nnew InputStreamReader(socket.getInputStream()));\n\
  out = new PrintWriter(\nsocket.getOutputStream(), true);\nString s = null;\nout.println(\"\
  Server received communication!\");\nwhile ((s = in.readLine()) != null) {\nSystem.out.println(\"\
  received from client: \" + s);\nout.flush();\nbreak;\n}\n} catch (Exception e) {\n\
  e.printStackTrace();\n} finally {\ntry {\nin.close();\nout.close();\n} catch (IOException\
  \ ex) {\nex.printStackTrace();\n}\n}\n}\n}\n```\n\n本方法需与方案 16-2 配合使用。此示例启动服务器，执行此程序仅会打印“have\
  \ opened port 1234 locally”。但若与方案 16-2 中构建的客户端一起执行，则会在 `SocketServer` 中产生以下输出。\n\
  \n```\nhave opened port 1234 locally\nclient has made socket connection\nreceived\
  \ from client: Here is a test.\nclosing socket\n```\n\n注意\n\n要使这两个方案协同工作，请先启动 SocketServer\
  \ 程序（打开一个命令窗口并输入 **java SocketServer**），以便客户端能够使用服务器程序中打开的端口创建套接字。SocketServer 启动后，再启动\
  \ SocketClient（打开另一个命令窗口并输入 **java SocketClient**）程序，即可看到两者协同工作。\n\n警告\n\n此 SocketServer\
  \ 程序会在你的机器上打开一个端口（1234）。请确保你的机器上已设置并运行防火墙；否则，你将向所有人开放 1234 端口。这可能导致你的机器受到攻击。开放的端口会为攻击者入侵机器创造漏洞，就像在你家里敞开一扇门一样。请注意，本方案中的示例攻击面很小，因为服务器只运行一次，并且在会话关闭前仅打印来自客户端的一条消息。\n\
  \n工作原理\n服务器应用程序可以通过一个或多个客户端应用程序的直接通信来执行工作。客户端应用程序通常与服务器应用程序通信，向服务器发送消息或数据进行处理，然后断开连接。服务器应用程序通常监听客户端应用程序，并在收到并接受连接后，根据客户端请求进行处理。要使客户端应用程序连接到服务器应用程序，服务器应用程序必须正在监听连接，并以某种方式处理连接数据。你不能简单地针对任意给定的主机和端口号组合运行客户端，因为这样做很可能会导致连接被拒绝的错误。服务器端应用程序必须做三件事：打开一个端口，接受并建立客户端连接，然后以某种方式与客户端连接进行通信。在本方案的解决方案中，`SocketServer`\
  \ 类完成了这三件事。\n\n从 `main()` 方法开始，该类在 1234 端口上打开一个新的套接字。这是通过创建 `ServerSocket` 的新实例并向其传递端口号来完成的。该端口号不得与服务器上当前正在使用的任何其他端口冲突。需要注意的是，低于\
  \ 1024 的端口通常保留给操作系统使用，因此请选择该范围以上的端口号。如果你尝试打开一个已被占用的端口，服务器套接字将无法成功创建，程序将失败。接下来，调用\
  \ `ServerSocket` 对象的 `accept()` 方法，该方法返回一个新的 `Socket` 对象。调用 `accept()` 方法后，在客户端尝试连接到已设置端口的服务器程序之前，该方法不会执行任何操作。`accept()`\
  \ 方法会空闲等待，直到有连接请求，然后返回绑定到服务器套接字所设置端口的新 `Socket` 对象。此套接字还包含尝试连接的客户端的远程端口和主机名。它包含两个端点的信息，并唯一标识了传输控制协议\
  \ (TCP) 连接。\n\n此时，服务器程序可以与客户端程序通信，它通过使用 `PrintWriter` 和 `BufferedReader` 对象来实现。在本方案的解决方案中，`communicateWithClient()`\
  \ 方法包含了接受来自客户端程序的消息、向客户端发送回消息以及将控制权返回给关闭服务器套接字的 `main()` 方法所需的所有代码。可以通过使用套接字的输入流生成一个新的\
  \ `InputStreamReader` 实例来创建新的 `BufferedReader` 对象。类似地，可以使用套接字的输出流创建新的 `PrintWriter`\
  \ 对象。请注意，如果这些对象未能成功创建，则必须将此代码包装在 `try-catch` 块中。\n\n```\nin = new BufferedReader(\n\
  new InputStreamReader(socket.getInputStream()));\nout = new PrintWriter(\nsocket.getOutputStream(),\
  \ true);\n```\n\n一旦这些对象成功创建，服务器就可以与客户端通信了。它使用一个循环来实现这一点，从 `BufferedReader` 对象（客户端输入流）读取数据，并使用\
  \ `PrintWriter` 对象将消息发送回客户端。在本方案的解决方案中，服务器通过发出 `break` 来关闭连接，这会导致循环结束。然后控制权返回到 `main()`\
  \ 方法。\n\n\n\n```\nout.println(\"Server received communication!\");\nwhile ((s =\
  \ in.readLine()) != null) {\nSystem.out.println(\"received from client: \" + s);\n\
  out.flush();\nbreak;\n}\n```\n\n在实际的服务器程序中，服务器通常会持续监听，而不会使用 `break` 来结束通信。每个客户端连接都会生成一个独立的线程来处理通信，以支持多个并发客户端。服务器还会对客户端通信进行有用的处理。在\
  \ HTML 服务器中，它会向客户端发回一条 HTML 消息。在 SMTP 服务器中，客户端会向服务器发送一封电子邮件，然后服务器处理该邮件并将其发送出去。套接字通信几乎用于所有\
  \ TCP 传输，客户端和服务器都会创建新的套接字以成功完成通信。\n\n16.2 定义到服务器的网络连接\n\n问题\n你需要建立与远程服务器的连接。\n\n\
  解决方案\n使用远程服务器的名称和端口号创建套接字连接，以监听传入的客户端请求。以下示例类创建了一个到远程服务器的套接字连接。代码随后向服务器发送一条文本消息并接收响应。在该示例中，客户端尝试联系的服务器名为\
  \ `server-name`，端口号为 1234。\n\n提示\n\n要连接到客户端机器上运行的本地程序，请将服务器名称设置为 127.0.0.1。本技巧的源代码列表中已包含此设置。通常，此类本地连接仅用于测试目的。\n\
  \n```\npublic class SocketClient {\npublic static Socket socket = null;\npublic\
  \ static PrintWriter out;\npublic static BufferedReader in;\npublic static void\
  \ main(String[] args) {\ncreateConnection(\"127.0.0.1\", 1234);\n}\npublic static\
  \ void createConnection(String host, int port) {\ntry {\n//创建套接字连接\nsocket = new\
  \ Socket(host, port);\n// 获取套接字输出的句柄\nout = new PrintWriter(socket.getOutputStream(),\n\
  true);\n// 获取套接字输入的句柄\nin = new BufferedReader(new InputStreamReader(\nsocket.getInputStream()));\n\
  testConnection();\nSystem.out.println(\"正在关闭连接...\");\nout.flush();\nout.close();\n\
  in.close();\nsocket.close();\nSystem.exit(0);\n} catch (UnknownHostException e)\
  \ {\nSystem.out.println(e);\nSystem.exit(1);\n} catch (IOException e) {\nSystem.out.println(e);\n\
  System.exit(1);\n}\n}\npublic static void testConnection() {\nString serverResponse\
  \ = null;\nif (socket != null && in != null && out != null) {\nSystem.out.println(\"\
  连接成功，正在测试...\");\ntry {\n// 向服务器发送数据\nout.println(\"Here is a test.\");\n// 从服务器接收数据\n\
  while((serverResponse = in.readLine()) != null)\nSystem.out.println(serverResponse);\n\
  } catch (IOException e) {\nSystem.out.println(e);\nSystem.exit(1);\n}\n}\n}\n}\n\
  ```\n\n如果你针对一个成功接受请求的服务器测试此客户端，你将看到以下结果。\n\n```\n连接成功，正在测试...\nServer received communication!\n\
  正在关闭连接...\n```\n\n注意\n\n此程序本身不执行任何操作。要创建一个接受此连接以进行完整测试的服务器端套接字应用程序，请参阅技巧 16-1。如果你尝试运行此类，但未指定在提供的端口上监听的服务器主机，你将收到此异常：`java.net.ConnectException:\
  \ Connection refused`。\n\n工作原理\n每个客户端/服务器连接都通过一个*套接字*发生，套接字是两个不同程序之间通信链路的一个端点。套接字被分配了端口号，这些端口号作为\
  \ TCP/IP 层在尝试连接时使用的标识符。接受客户端请求的服务器程序通常在指定的端口号上监听新连接。当客户端想要向服务器发出请求时，它会利用服务器的主机名和服务器正在监听的端口创建一个新的套接字，并尝试与该套接字建立连接。如果服务器接受该套接字，则连接成功。\n\
  \n本技巧讨论了套接字连接的客户端部分，因此我们不会深入探讨服务器端发生的情况。然而，有关连接服务器端的更多信息将在技巧 16-1 中介绍。本技巧解决方案中的示例类展示了客户端程序如何尝试并建立与服务器端程序的连接。在本技巧中，`createConnection()`\
  \ 方法执行实际的连接。它接受服务器主机名和端口号，从而创建套接字。在 `createConnection()` 方法内部，服务器主机名和端口号被传递给 `Socket`\
  \ 类构造函数，创建一个新的 `Socket` 对象。接下来，使用 `Socket` 对象的输出流创建一个 `PrintWriter` 对象，并使用 `Socket`\
  \ 对象的输入流创建一个 `BufferedReader` 对象。\n\n```\n//创建套接字连接\nsocket = new Socket(host, port);\n\
  // 获取套接字输出的句柄\nout = new PrintWriter(socket.getOutputStream(),\ntrue);\n// 获取套接字输入的句柄\n\
  in = new BufferedReader(new InputStreamReader(\nsocket.getInputStream()));\n```\n\
  \n创建套接字并获取套接字的输出流和输入流之后，客户端可以向 `PrintWriter` 写入数据以发送数据到服务器。同样，为了接收来自服务器的响应，客户端从\
  \ `BufferedReader` 对象读取数据。`testConnection()` 方法使用新创建的套接字模拟客户端和服务器程序之间的对话。为此，会检查\
  \ `socket`、`in` 和 `out` 变量，确保它们不等于 `null`。如果它们不等于 `null`，客户端尝试通过向输出流发送消息 `out.println(\"\
  Here is a test.\")` 来向服务器发送消息。然后创建一个循环，通过调用 `in.readLine()` 方法监听来自服务器的响应，直到没有更多内容接收。然后打印接收到的消息。\n\
  \n```\nif (socket != null && in != null && out != null) {\nSystem.out.println(\"\
  连接成功，正在测试...\");\ntry {\n// 向服务器发送数据\nout.println(\"Here is a test.\");\n// 从服务器接收数据\n\
  while((serverResponse = in.readLine()) != null)\nSystem.out.println(serverResponse);\n\
  } catch (IOException e) {\nSystem.out.println(e);\nSystem.exit(1);\n}\n}\n```\n\n\
  `java.net.Socket` 类符合 Java 编程语言的特性。它使开发人员能够针对独立于平台的 API 进行编码，以与特定于不同平台的网络协议进行通信。它向开发人员抽象了每个平台的细节，并提供了一个简单且一致的实现，用于实现客户端/服务器通信。\n\
  \n16.3 向一组接收者广播\n\n问题\n你想要向由单个地址标识的零个或多个主机广播数据报。\n\n解决方案\n\n使用 `DatagramChannel`\
  \ 类进行数据报多播。`DatagramChannel` 类允许多个客户端连接到一个组并监听从服务器广播的数据报。以下代码集使用客户端/服务器方法演示了此技术。该类演示了一个多播客户端。\n\
  \n\n\n```\npackage org.java17recipes.chapter16.recipe16_4;\nimport java.io.IOException;\n\
  import java.net.InetAddress;\nimport java.net.InetSocketAddress;\nimport java.net.NetworkInterface;\n\
  import java.net.StandardProtocolFamily;\nimport java.net.StandardSocketOptions;\n\
  import java.nio.ByteBuffer;\nimport java.nio.channels.DatagramChannel;\nimport java.nio.channels.MembershipKey;\n\
  public class MulticastClient {\npublic MulticastClient() {\n}\npublic static void\
  \ main(String[] args) {\ntry {\n// 获取支持的网络接口\nNetworkInterface networkInterface\
  \ = null;\njava.util.Enumeration enumNI = NetworkInterface.getNetworkInterfaces();\n\
  java.util.Enumeration enumIA;\nNetworkInterface ni;\nInetAddress ia;\nILOOP:\nwhile\
  \ (enumNI.hasMoreElements()) {\nni = enumNI.nextElement();\nenumIA = ni.getInetAddresses();\n\
  while (enumIA.hasMoreElements()) {\nia = enumIA.nextElement();\nif (ni.isUp() &&\
  \ ni.supportsMulticast()\n&& !ni.isVirtual() && !ni.isLoopback()\n&& !ia.isSiteLocalAddress())\
  \ {\nnetworkInterface = ni;\nbreak ILOOP;\n}\n}\n}\n// 地址在范围内\nint port = 5239;\n\
  InetAddress group = InetAddress.getByName(\"226.18.84.25\");\nfinal DatagramChannel\
  \ client = DatagramChannel.open(StandardProtocolFamily.INET);\nclient.setOption(StandardSocketOptions.SO_REUSEADDR,\
  \ true);\nclient.bind(new InetSocketAddress(port));\nclient.setOption(StandardSocketOptions.IP_MULTICAST_IF,\
  \ networkInterface);\nSystem.out.println(\"加入组: \" + group + \" 使用网络接口 \" + networkInterface);\n\
  // 多播加入\nMembershipKey key = client.join(group, networkInterface);\nclient.open();\n\
  // 作为客户端接收消息\nfinal ByteBuffer buffer = ByteBuffer.allocateDirect(4096);\nbuffer.clear();\n\
  System.out.println(\"等待接收消息\");\n// 将客户端配置为被动且非阻塞\n// client.configureBlocking(false);\n\
  client.receive(buffer);\nSystem.out.println(\"客户端收到消息:\");\nbuffer.flip();\nbyte[]\
  \ arr = new byte[buffer.remaining()];\nbuffer.get(arr, 0, arr.length);\nSystem.out.println(new\
  \ String(arr));\nSystem.out.println(\"断开连接...仅执行单次测试\");\nclient.disconnect();\n\
  } catch (IOException ex) {\nex.printStackTrace();\n}\n}\n}\n```\n\n接下来，一个服务器类向多播客户端连接的地址广播数据报。以下代码演示了一个多播服务器。\n\
  \n```\npackage org.java17recipes.chapter16.recipe16_4;\nimport java.io.IOException;\n\
  import java.net.InetAddress;\nimport java.net.InetSocketAddress;\nimport java.nio.ByteBuffer;\n\
  import java.nio.channels.DatagramChannel;\npublic class MulticastServer extends\
  \ Thread {\nprotected ByteBuffer message = null;\npublic MulticastServer() {\n}\n\
  public static void main(String[] args) {\nMulticastServer server = new MulticastServer();\n\
  server.start();\n}\n@Override\npublic void run() {\ntry {\n// 将响应发送到\"address\"\
  和\"port\"指定的客户端\nInetAddress address = InetAddress.getByName(\"226.18.84.25\");\n\
  int port = 5239;\nDatagramChannel server = DatagramChannel.open().bind(null);\n\
  System.out.println(\"向组 \" + address + \" 的端口 \" + port + \" 发送数据报包\");\nmessage\
  \ = ByteBuffer.wrap(\"Hello to all listeners\".getBytes());\nserver.send(message,\
  \ new InetSocketAddress(address, port));\nserver.disconnect();\n} catch (IOException\
  \ e) {\ne.printStackTrace();\n}\n}\n}\n```\n\n服务器可以向组内的每个客户端广播消息。一旦服务器启动，它就会广播消息，客户端接收该消息。\n\
  \n在本方案中，两个类——`MulticastServer` 和 `MulticastClient`——协同工作，因此当执行 MulticastClient 时，会产生以下输出。\n\
  \n```\n加入组: /226.18.84.25 使用网络接口名称: networkName\n等待接收消息\n```\n\nMulticastClient\
  \ 程序启动后，您可以执行 MulticastServer 程序来观察两者协同工作。以下是 MulticastServer 的输出。\n\n```\n向组 /226.18.84.25\
  \ 的端口 5239 发送数据报包\n```\n\nMulticastClient 的输出更新如下。\n\n```\n客户端收到消息:\nHello to all\
  \ listeners\n```\n\n工作原理\n多播是指通过单次传输向一组监听者广播消息的能力。多播的一个很好的类比是无线电广播。成千上万的人可以收听同一个广播事件，听到相同的消息。计算机在向监听者发送消息时也可以做类似的事情。一组客户端机器可以调谐到相同的地址和端口号，以接收服务器向该地址和端口广播的消息。Java\
  \ 语言通过数据报消息传递提供多播功能。数据报是独立的、不保证送达的消息，可以通过网络传递给客户端。（*不保证送达*意味着到达、到达时间和内容都是不可预测的。）与通过\
  \ TCP 发送的消息不同，发送数据报是一个非阻塞事件，发送者不会收到消息已接收的通知。数据报使用用户数据报协议（UDP）而非 TCP 发送。如果消息的顺序、可靠性和数据完整性不是关键任务，那么通过\
  \ UDP 发送多播消息的能力是相对于 TCP 的一个优势。\n\nJava 通过 `MulticastChannel` 接口支持多播消息传递。实现 `MulticastChannel`\
  \ 接口的类启用了多播功能，因此可以向组广播并接收组广播。其中一个这样的类是 `DatagramChannel`，它是一个面向数据报套接字的可选通道。在本方案的解决方案中，客户端和服务器程序都通过多播消息传递进行通信。通信双方都使用了\
  \ `DatagramChannel` 类。`DatagramChannel` 必须以特定方式配置才能用于接收多播消息。具体来说，需要在打开的 `DatagramChannel`\
  \ 客户端上设置一些选项。我们稍后将讨论这些选项。创建接收多播消息的客户端需要以下步骤。\n\n1.  打开一个数据报通道。\n2.  设置多播所需的数据报通道选项。\n\
  3.  将客户端加入多播组并返回一个 `MembershipKey` 对象。\n4.  打开客户端。\n\n在本方案的解决方案中，客户端应用程序首先获取接收广播消息的网络接口的引用。多播需要设置一个\
  \ `NetworkInterface`。接下来，选择一个端口号和一个多播 IP 地址。组或已注册的监听者使用该 IP 地址监听广播。端口号必须未被占用；否则会抛出异常。对于\
  \ IPv4 多播，IP 地址必须在 224.0.0.0 到 239.255.255.255（含）范围内。此端口和 IP 地址与服务器广播消息时使用的相同。接下来，使用\
  \ `StandardProtocolFamily.INET` 打开一个新的数据报通道。打开数据报通道的选择是 `StandardProtocolFamily.INET`\
  \ 或 `StandardProtocolFamily.INET6`，分别对应 IPv4 和 IPv6。在数据报通道上设置的第一个选项是 `StandardSocketOptions.SO_REUSEADDR`，并将其设置为\
  \ `true`。这表示多个客户端可以“重用”该地址或同时使用它。必须设置此选项才能进行多播。然后，客户端使用一个新的 `InetSocketAddress`\
  \ 实例绑定到该端口。最后，将 `StandardSocketOptions.IP_MULTICAST_IF` 选项设置为所使用的网络接口。此选项表示数据报导向套接字发送多播数据报时的传出接口。\n\
  \n```\nclient.setOption(StandardSocketOptions.SO_REUSEADDR, true);\nclient.bind(new\
  \ InetSocketAddress(port));\nclient.setOption(StandardSocketOptions.IP_MULTICAST_IF,\
  \ networkInterface);\n```\n\n\n\n一旦设置了这些选项并将端口绑定到数据报通道，它就可以加入监听器组了。这可以通过调用 `DatagramChanneljoin(InetAddress,\
  \ NetworkInterface)` 方法来实现，并传入客户端使用的组地址和网络接口。结果会生成一个 `java.nio.channels.MembershipKey`\
  \ 对象。这是一个代表 IP 多播组成员身份的令牌。最后，调用 `DatagramChannelopen()` 方法，该方法会打开通道以监听广播。此时，客户端已准备好接收多播消息，并等待接收消息。\n\
  \n```\nMembershipKey key = client.join(group, networkInterface);\nclient.open();\n\
  ```\n\n客户端接下来的几行代码负责接收来自服务器的消息。为了接收广播消息，会创建一个字节缓冲区，然后将其传递给 `DatagramChannel` 类的\
  \ `receive()` 方法。一旦调用了 `receive()` 方法，客户端就会暂停，直到收到消息。你可以通过调用 `DatagramChannel configureBlocking(boolean)`\
  \ 方法并传入 `false` 值来禁用此功能。接着，`ByteBuffer` 会被转换为字符串值并打印出来，方法是使用 `flip()` 方法将缓冲区索引重置为\
  \ 0，然后将从索引 0 到最后一个索引的文本提取到 `byte[]` 中。最后，请确保在完成后断开客户端连接。至此，客户端代码部分结束。\n\n```\n//\
  \ 将客户端配置为被动且非阻塞\n// client.configureBlocking(false);\nclient.receive(buffer);\n\
  // 客户端暂停，直到收到消息...在此情况下\nSystem.out.println(\"客户端收到消息：\");\nbuffer.flip();\nbyte[]\
  \ arr = new byte[buffer.remaining()];\nbuffer.get(arr, 0, arr.length);\nSystem.out.println(new\
  \ String(arr));\nSystem.out.println(\"正在断开连接...仅执行单次测试\");\nclient.disconnect();\n\
  ```\n\n注意\n\n在本技巧的示例中，仅执行单次传递，然后客户端断开连接。对于长时间监听，你需要一个带有超时机制的循环，并为结束状态提供测试。\n\n服务器代码相当基础。你可以看到\
  \ `MulticastServer` 类继承了 `Thread`。这意味着此服务器应用程序可以在与应用程序中其他代码分离的线程中运行。如果另一个类启动了 `MulticastServer`\
  \ 类的 `run()` 方法，它将在与启动它的类分离的线程中运行。任何继承 `Thread` 的类都必须包含 `run()` 方法。\n\n服务器代码的主体部分位于\
  \ `run()` 方法中。使用客户端注册加入多播组时所用的相同 IP 地址创建一个新的 `InetAddress` 对象。服务器代码中也声明了相同的端口号。这两个对象稍后在代码块中用于发送消息。打开一个新的数据报通道并绑定到\
  \ `null`。`null` 值很重要，因为通过将 `SocketAddress` 设置为 `null`，套接字会绑定到一个自动分配的地址。接下来，创建一个包含消息的字节缓冲区，该消息将广播给所有监听器。然后使用\
  \ `DatagramChannel` 类的 `send(ByteBuffer, InetSocketAddress)` 方法发送消息。解决方案中的 `send()`\
  \ 方法接受一个 `ByteBuffer` 对象作为消息，以及一个使用代码块开头声明的地址和端口创建的新 `InetSocketAddress` 实例。我们说过会回到这些内容！\n\
  \n```\nserver.send(message, new InetSocketAddress(address, port));\n```\n\n此时，客户端将收到服务器发送的消息。对于本技巧解决方案中演示的客户端，它随后会断开连接。在现实场景中，很可能由另一个类来启动服务器。其\
  \ `run()` 方法将包含一个循环，该循环会持续执行，直到所有消息都已广播或循环被指示停止。客户端可能不会断开连接，直到用户发起关闭操作。\n\n注意\n\n\
  如果你的笔记本电脑或服务器使用不同于标准 IPv4 的网络协议，则结果可能会有所不同。在将代码发送到生产环境之前，请务必进行充分的测试。\n\n16.4 生成和读取\
  \ URL\n\n问题\n你希望在应用程序中以编程方式生成 URL。创建 URL 后，你希望从中读取数据以供应用程序使用。\n\n解决方案\n\n使用 `java.net.URL`\
  \ 类来创建 URL。根据你要处理的地址，有几种不同的生成 URL 的方法。本解决方案演示了其中一些创建 URL 对象的选项，并附有注释说明差异。创建 URL\
  \ 对象后，其中一个 URL 会被读入 `BufferedReader` 并打印到命令行。\n\n```\nimport java.io.BufferedReader;\n\
  import java.io.IOException;\nimport java.io.InputStreamReader;\nimport java.net.MalformedURLException;\n\
  import java.net.URL;\npublic class GenerateAndReadUrl {\npublic static void main(String[]\
  \ args) {\ntry {\n// 生成绝对 URL\nURL url1 = new URL(\"https://openjdk.java.net\");\n\
  System.out.println(url1.toString());\n// 为具有共同基础的页面生成 URL\nURL url2 = new URL(url1,\
  \ \" projects/jdk/17\");\n// 从不同的数据片段生成 URL\nURL url3 = new URL(\"http\", \"openjdk.java.net\"\
  , \"projects/jdk/17\");\nreadFromUrl(url1);\n} catch (MalformedURLException ex)\
  \ {\nex.printStackTrace();\n}\n}\n/**\n* 将 URL 流作为输入流打开，并将内容打印到命令行。\n*\n* @param\
  \ url\n*/\npublic static void readFromUrl(URL url) {\ntry {\nBufferedReader in =\
  \ new BufferedReader(\nnew InputStreamReader(\nurl.openStream()));\nString inputLine;\n\
  while ((inputLine = in.readLine()) != null) {\nSystem.out.println(inputLine);\n\
  }\nin.close();\n} catch (IOException ex) {\nex.printStackTrace();\n}\n}\n}\n```\n\
  \n运行此程序会将标识为 `url1` 的 URL 资源中的 HTML 打印到命令行，如图 16-1 所示的控制台输出。\n\n![](img/323910_4_En_16_Fig1_HTML.jpg)\n\
  \n图 16-1\n技巧 16-4 的输出\n\n工作原理\n得益于 `java.net.URL` 类，在 Java 代码中创建 URL 相当简单，该类完成了所有繁重的工作。URL\
  \ 是一个指向互联网资源的字符串。有时，在 Java 代码中创建 URL 以读取 URL 指向的互联网资源的内容，或将内容推送到该资源是很有用的。在本技巧的解决方案中，创建了几个不同的\
  \ URL 对象，演示了可用的不同构造函数。\n\n创建 URL 最简单的方法是将互联网上资源的标准可读 URL 字符串传递给 `java.net.URL` 类，以创建一个新的\
  \ URL 实例。在解决方案中，将一个绝对 URL 传递给构造函数以创建 `url1` 对象。\n\n```\nURL url1 = new URL(\"https://openjdk.java.net\
  \ \");\n```\n\n另一种创建 URL 的有用方法是向 URL 构造函数传递两个参数来创建相对 URL。基于另一个 URL 的位置来创建相对 URL\
  \ 非常有用。例如，如果某个特定站点有多个不同的页面，你可以创建一个指向相对于主站点 URL 的某个子页面的 URL。本技巧解决方案中的 `url2` 对象就是这种情况。\n\
  \n```\nURL url2 = new URL(url1, \"projects/jdk/17\");\n```\n\n\n\n如你所见，路径 `search/node/jdk8`\
  \ 是相对于名为 `url1` 的 URL 的。最终，`url2` 对象的人类可读格式表示为 [`http://www.java.net/search/node/jdk8`](http://www.java.net/search/node/jdk8)。还有几个用于创建\
  \ URL 对象的构造函数，它们接受两个以上的参数。这些构造函数如下所示。\n\n```\nnew URL (String protocol, String host,\
  \ String port, String path);\nnew URL (String protocol, String host, String path);\n\
  ```\n\n在解决方案中，演示了这两个构造函数中的第二个。资源的协议、主机名和路径被传递给构造函数以创建 `url3` 对象。当你动态生成 URL 时，这最后两个构造函数通常最有用。\n\
  \n16.5 解析 URL\n\n问题\n你希望以编程方式从 URL 中为你的应用程序收集信息。\n\n解决方案\n\n使用内置的 URL 类方法解析 URL。在下面名为\
  \ `ParseUrl` 的示例类中，创建了一个 URL 对象，然后使用内置的 URL 类方法对其进行解析，以收集有关该 URL 的信息。从 URL 检索到信息后，它会将其打印到命令行并创建另一个\
  \ URL。\n\n```\nimport java.net.MalformedURLException;\nimport java.net.URL;\npublic\
  \ static void main(String[] args) {\nURL url1 = null;\ntry {\n// 生成绝对 URL\nurl1\
  \ = new URL(\"https://link.springer.com/search?query=Manelli+Java\");\nString host\
  \ = url1.getHost();\nString path = url1.getPath();\nString query = url1.getQuery();\n\
  String protocol = url1.getProtocol();\nString authority = url1.getAuthority();\n\
  String ref = url1.getRef();\nSystem.out.println(\"URL \" + url1.toString() + \"\
  \ 解析结果如下：\\n\");\nSystem.out.println(\"主机: \" + host + \"\\n\");\nSystem.out.println(\"\
  路径: \" + path + \"\\n\");\nSystem.out.println(\"查询: \" + query + \"\\n\");\nSystem.out.println(\"\
  协议: \" + protocol + \"\\n\");\nSystem.out.println(\"权限: \" + authority + \"\\n\"\
  );\nSystem.out.println(\"引用: \" + ref + \"\\n\");\n} catch (IOException ex) {\n\
  ex.printStackTrace();\n}\n}\n```\n\n当此代码执行时，将显示以下行。\n\n```\nThe URL https://link.springer.com/search?query=Manelli+Java\
  \ parses to the following:\nHost: link.springer.com\nPath: /search\nQuery: query=Manelli+Java\n\
  Protocol: https\nAuthority: link.springer.com\nReference: null\n```\n\n工作原理\n\n\
  在应用程序中构造和使用 URL 时，有时提取与 URL 相关的信息会很有用。使用内置的 URL 类方法可以轻松完成此操作，这些方法可以调用给定的 URL 并返回信息字符串。表\
  \ 16-1 解释了 URL 类中可用于获取信息的访问器方法。\n\n表 16-1\n用于查询 URL 的访问器方法\n\n方法 |\n 返回的 URL 信息\
  \ |\n\n| --- | --- | --- | --- | --- |\n\n`getAuthority()` |\n 权限组件 |\n\n`getFile()`\
  \ |\n 文件名组件 |\n\n`getHost()` |\n 主机名组件 |\n\n`getPath()` |\n 路径组件 |\n\n`getProtocol()`\
  \ |\n 协议标识符组件 |\n\n`getRef()` |\n 引用组件 |\n\n`getQuery()` |\n 查询组件 |\n\n这些访问器方法中的每一个都返回一个字符串值，该值可用于提供信息或像示例中那样动态构造其他\
  \ URL。如果你查看本解决方案的结果，可以看到通过表 16-1 中列出的访问器方法获得的关于该 URL 的信息。大多数访问器方法都是不言自明的。然而，其中几个可能需要进一步解释。`getFile()`\
  \ 方法返回 URL 的文件名。文件名等同于将 `getPath()` 返回的值与 `getQuery()` 返回的值连接起来。`getRef()` 方法可能不太直观。通过调用\
  \ `getRef()` 方法返回的引用组件指的是可能附加到 URL 末尾的“片段”。例如，片段使用井号（`#`）后跟一个通常对应于特定网页上某个子部分的字符串来表示。给定如下\
  \ URL，使用 `getRef()` 方法将返回 `recipe16_6`。\n\n```\nhttp://www.java17recipes.org/chapters/chapter16#recipe16_6\n\
  ```\n\n虽然并非总是需要，但解析 URL 以获取信息的能力有时会非常方便。由于 Java 语言在 `java.net.URL` 类中内置了辅助方法，这使得收集\
  \ URL 信息变得轻而易举。\n\n16.6 小结\n本章介绍了 Java 语言中一些强大且易于使用的基本网络特性，从使用套接字连接和 URL 到通过 `DatagramChannel`\
