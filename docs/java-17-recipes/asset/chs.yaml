  Order # 3 has been fulfilled

  Order # 4 has been fulfilled

  Order # 5 has been fulfilled

  Order # 6 has been fulfilled

  Order # 7 has been fulfilled

  Order # 8 has been fulfilled

  Order # 9 has been fulfilled

  Order # 10 has been fulfilled

  Order # 11 has been fulfilled

  Order # 12 has been fulfilled

  Order # 13 has been fulfilled

  ...

  ```




  ### 工作原理


  在 Java 中，协调线程的方式有很多种，而这些协调工作都依赖于让线程等待。当线程等待时，它会暂停执行（不会继续执行下一条指令，并从 JVM 的线程调度器中移除）。如果线程正在等待，可以通过通知来唤醒它。在
  Java 的并发术语中，*通知*一词意味着线程恢复执行（JVM 将该线程重新加入线程调度器）。因此，在线程协调的自然流程中，最常见的事件序列是主线程等待，然后辅助线程通知主线程继续（或唤醒）。即便如此，等待中的线程仍有可能被其他事件中断。当线程被中断时，它不会继续执行下一条指令，而是抛出
  `InterruptedException`，这表示即使线程正在等待某事发生，但发生了其他需要线程关注的事件。下面的例子能更好地说明这一点。


  ```

  BlockingQueue queue = new LinkedBlockingQueue();

  while (true) {

  synchronized (this) {

  Object itemToProcess = queue.take();

  processItem (itemToProcess);

  }

  }

  ```


  如果你查看上述代码，执行它的线程将永远不会终止，因为它会无限循环并等待处理某个项目。如果 `Queue<E>` 中没有项目，主线程会一直等待，直到另一个线程向
  `Queue<E>` 中添加了内容。你无法优雅地关闭上述代码（特别是当运行该循环的线程不是守护线程时）。


  ```

  BlockingQueue queue = new LinkedBlockingQueue();

  while (true) {

  synchronized (this) {

  Object itemToProcess = null;

  try {

  itemToProcess = queue.take();

  } catch (InterruptedException e) {

  return;

  }

  processItem (itemToProcess);

  }

  }

  ```


  新的代码现在可以“跳出”无限循环。你可以从另一个线程调用 `thread.interrupt()`，这会抛出 `InterruptedException`，然后被主线程的
  `catch` 子句捕获。在这个子句中，可以退出无限循环。


  `InterruptedExceptions` 是一种向等待（或睡眠）中的线程发送额外信息的方式，以便它们能够处理不同的场景（例如，有序的程序关闭）。因此，每个将线程状态更改为睡眠/等待的操作都必须被一个能够捕获
  `InterruptedException` 的 `try/catch` 块包围。这是 `InterruptedException` 异常并非错误，而更像是一种在线程之间传递信号、表明发生了需要关注的事情的情况之一。


  解决方案 1 展示了最常见（最古老）的协调形式。该方案需要让一个线程等待并暂停执行，直到该线程被另一个线程通知（或唤醒）。


  要使解决方案 1 生效，发起线程需要获取一个锁。这个锁随后将成为另一个线程可以用来通知发起线程唤醒的“电话号码”。发起线程获取锁（电话号码）后，便开始等待。一旦调用了
  `wait()` 方法，锁就会被释放，从而允许其他线程获取同一个锁。然后，辅助线程获取该锁（电话号码）并通知（这就像拨打唤醒电话）发起线程。通知之后，发起线程恢复执行。


  在解决方案 1 的代码中，锁是一个被标识为 `objectToSync` 的虚拟对象。在实践中，用于等待和通知的锁对象可以是 Java 中任何有效的实例对象；例如，我们可以使用
  `this` 引用来让主线程等待。


  使用这种技术的主要优势在于，可以明确地控制等待谁以及何时通知（并且能够通知所有等待在同一对象上的线程；请参见下面的提示）。


  提示


  多个线程可以等待同一个锁（同一个被唤醒的电话号码）。当辅助线程调用 `notify()` 方法时，它会唤醒其中一个“等待”线程（不保证哪个线程被唤醒）。有时你需要通知所有线程；可以调用
  `notifyAll()` 方法代替 `notify()` 方法。这通常用于准备让多个线程执行某些工作，但工作尚未完成设置的情况。


  解决方案 2 采用了一种更现代的通知方法，因为它涉及 `CountDownLatch`。在设置时，指定锁存器将拥有的“计数”数量。然后，主线程通过调用 `CountDownLatch`
  的 `await()` 方法来等待（停止执行），直到锁存器计数到 0。当锁存器达到 0 时，主线程被唤醒并继续执行。当工作线程完成时，调用 `latch.countdown()`
  方法，该方法会递减锁存器的当前计数值。如果锁存器的当前值达到 0，等待在 `CountDownLatch` 上的主线程就会被唤醒并继续执行。


  使用 `CountDownLatches` 的主要优势在于，可以同时生成多个任务并等待它们全部完成。（在解决方案示例中，我们不需要等待其中一个或另一个线程完成后再继续；它们都被启动了，当锁存器为
  0 时，主线程继续执行。）


  解决方案 3 允许你访问想要等待的线程。对于主线程来说，只需调用辅助线程的 `join()` 方法即可。然后主线程等待（停止执行），直到辅助线程完成。


  这种方法的优势在于，它不需要辅助线程了解任何同步机制。只要辅助线程终止执行，主线程就可以等待它们。


  ## 10.8 创建线程安全对象


  ### 问题


  你需要创建一个从多个线程访问的线程安全对象。


  ### 解决方案 1


  使用同步的 getter 和 setter，并保护改变状态的临界区域。在下面的示例中，创建了一个对象，其每个内部变量都有同步的 getter 和 setter。临界区域通过使用
  `synchronized(this)` 锁来保护。


  ```

  public class CustomerOrder {

  private String itemOrdered;

  private int quantityOrdered;

  private String customerName;

  public CustomerOrder() {

  }

  public double calculateOrderTotal (double price) {

  synchronized (this) {

  return getQuantityOrdered()*price;

  }

  }

  public synchronized String getItemOrdered() {

  return itemOrdered;

  }

  public synchronized int getQuantityOrdered() {

  return quantityOrdered;

  }

  public synchronized String getCustomerName() {

  return customerName;

  }

  public synchronized void setItemOrdered(String itemOrdered) {

  this.itemOrdered = itemOrdered;

  }

  public synchronized void setQuantityOrdered(int quantityOrdered) {

  this.quantityOrdered = quantityOrdered;

  }

  public synchronized void setCustomerName(String customerName) {

  this.customerName = customerName;

  }

  }

  ```


  ### 解决方案 2


  创建一个不可变对象（一个一旦创建，其内部状态就不会改变的对象）。在下面的代码中，对象的内部变量被声明为 final，并在构造时赋值。通过这样做，保证了对象是不可变的。


  ```

  public class ImmutableCustomerOrder {

  final private String itemOrdered;

  final private int quantityOrdered;

  final private String customerName;

  ImmutableCustomerOrder(String itemOrdered, int quantityOrdered, String customerName)
  {

  this.itemOrdered = itemOrdered;

  this.quantityOrdered = quantityOrdered;

  this.customerName = customerNam e;

  }

  public String getItemOrdered() {

  return itemOrdered;

  }

  public int getQuantityOrdered() {

  return quantityOrdered;

  }

  public String getCustomerName() {

  return customerName;

  }

  public double calculateOrderTotal (double price) {

  return getQuantityOrdered()*price;

  }

  }

  ```




  ### 工作原理


  解决方案 1 依赖于锁保护对象任何变更的原则。使用 `synchronized` 关键字是编写 `synchronized (this)` 表达式的快捷方式。通过同步
  getter 和 setter（以及任何其他改变对象内部状态的操作），可以确保对象的一致性。此外，任何应作为整体执行的操作（例如同时修改两个集合的操作）都必须在对象的方法内完成，并通过
  `synchronized` 关键字进行保护。


  例如，如果一个对象提供了 `getSize()` 方法和 `getItemNumber(int index)` 方法，那么编写以下代码 `object.getItemNumber
  (object.getSize()-1)` 是不安全的。尽管这条语句看起来简洁，但另一个线程可能在获取大小和获取元素编号之间修改对象的内容。相反，创建一个 `object.getLastElement()`
  方法更为安全，该方法可以原子性地计算出大小和最后一个元素。


  解决方案 2 依赖于不可变对象的特性。不可变对象不能改变其内部状态，而无法改变内部状态的对象（即*不可变*对象）是线程安全的。如果由于某个事件需要修改不可变对象，请创建一个具有更改后属性的新对象，而不是显式地更改其属性。然后，这个新对象将取代旧对象，在后续对该对象的请求中，将返回这个新的不可变对象。这是创建线程安全代码最简单（尽管可能冗长）的方法。


  ## 10.9 实现线程安全计数器


  ### 问题


  你需要一个线程安全的计数器，以便能够在不同的执行线程中对其进行递增操作。


  ### 解决方案


  使用天生线程安全的对象可以创建一个保证线程安全且具有优化同步策略的计数器。在以下代码中，创建了一个 `Order` 对象，它需要一个使用 `AtomicLong
  incrementAndGet()` 方法生成的唯一订单 ID。


  ```

  AtomicLong orderIdGenerator = new AtomicLong(0);

  for (int i =0;i  {

  for (int i1 = 0; i1 < 10; i1++) {

  createOrder(Thread.currentThread().getName());

  }

  });

  orderCreationThread.setName("订单创建线程 "+i);

  orderCreationThread.start();

  }

  private void createOrder(String name) {

  long orderId = orderIdGenerator.incrementAndGet();

  Order order = new Order(name, orderId);

  orders.add(order);

  }

  public  class Order {

  String orderName;

  long orderId;

  Order(String orderName, long orderId) {

  this.orderName = orderName;

  this.orderId = orderId;

  }

  public String getOrderName() {

  return orderName;

  }

  public long getOrderId() {

  return orderId;

  }

  }

  ```


  以下是输出结果。


  ```

  订单 id:9

  订单 id:2

  订单 id:8

  订单 id:11

  订单 id:12

  订单 id:13

  订单 id:14

  订单 id:15

  订单 id:16

  订单 id:18

  订单 id:19

  订单 id:21

  订单 id:22

  订单 id:7

  订单 id:23

  订单 id:24

  ...

  ```


  ### 工作原理


  `AtomicLong`（及其同类 `AtomicInteger`）被设计用于在并发环境中安全使用。它们提供了原子性地递增（并获取）更改后值的方法。即使有成百上千个线程调用
  `AtomicLong increment()` 方法，返回的值也是唯一的。


  如果你需要做出决策并更新变量，请始终使用 `AtomicLong` 提供的原子操作；例如 `compareAndSet`。否则，你的代码就不是线程安全的（因为任何检查后执行的操作都需要是原子性的），除非你使用自己的锁从外部保护该原子引用。


  更改一个 long 值可能通过两次内存写操作完成（Java 内存模型允许这样做）。因此，两个线程可能会在看似线程安全的代码中重叠执行这两次操作。结果将得到一个完全出乎意料（并且很可能是错误）的
  long 值。


  ```

  long counter = 0;

  public long incrementCounter() {

  return counter++;

  }

  ```


  尽管看起来只有一次递增计数器的操作，但实际上，在机器语言层面发生了两次操作（先读取变量，然后递增）。两个或多个线程可能获得相同的值，因为它们都读取了变量但尚未递增它。然后所有线程都将计数器递增到相同的数值。


  ## 10.10 跨多个线程更新公共值


  ### 问题


  你的应用程序需要安全地维护一个跨多个线程的单一求和值。


  ### 解决方案


  利用 `DoubleAdder` 或 `LongAdder` 来保存跨多个线程求和的值，以确保安全处理。在以下示例中，两个线程同时向 `DoubleAdder`
  添加值。最后，对值进行求和并显示。


  ```

  public static void main(String[] args) {

  Recipe10_10 recipe10_10 = new Recipe10_10();

  recipe10_10.start();

  }

  DoubleAdder da = new DoubleAdder();

  private void start() {

  Thread thread1 = new Thread(() -> {

  for (int i1 = 0; i1  {

  for (int i1 = 0; i1 < 10; i1++) {

  da.add(i1);

  System.out.println("添加 " + i1);

  }

  });

  thread1.start();

  thread2.start();

  try {

  System.out.println("求和时休眠....");

  Thread.sleep(10000);

  } catch (InterruptedException e) {

  e.printStackTrace();

  }

  System.out.println("总和是: " + da.doubleValue());

  }

  }

  ```


  以下是结果。


  ```

  添加 0

  添加 1

  添加 2

  添加 3

  添加 4

  添加 5

  添加 6

  添加 7

  添加 0

  添加 8

  添加 9

  添加 1

  添加 2

  添加 3

  添加 4

  添加 5

  添加 6

  添加 7

  添加 8

  添加 9

  总和是: 90.0

  ```


  ### 工作原理


  在 Java 8 之前，跨多个线程处理值时，使用原子数字非常重要。原子变量可以防止线程干扰，而不会像同步访问在某些情况下可能造成阻塞那样。Java 8 引入了一系列新的原子变量，它们比标准原子变量提供更高的吞吐量。在大多数情况下，当值可能被跨多个线程访问和更新时，`java.util.concurrent.atomic.DoubleAdder`
  和 `java.util.concurrent.atomic.LongAdder` 类优于 `AtomicDouble` 和 `AtomicLong`。`DoubleAdder`
  和 `LongAdder` 都扩展了 Number 类，它们在跨线程求和时非常有用，尤其是在高竞争情况下。


  在解决方案中，`DoubleAdder` 对来自两个不同线程的数字进行求和。使用 `add()` 方法，将各种数字“添加”到 `DoubleAdder` 的值中。在线程有足够时间完成其工作后，调用
  `doubleValue()` 方法以 double 形式返回所有值的总和。


  `DoubleAdder` 和 `LongAdder` 类都包含类似的方法，尽管 `LongAdder` 确实包含一些额外的辅助方法，用于递增和递减 `adder`
  的值。


  ## 10.11 异步执行多个任务


  ### 问题


  你的应用程序需要以异步方式同时执行多个任务，使得这些任务之间互不阻塞。




  ### 解决方案


  利用 `CompletableFuture<T>` 对象来表示当前正在执行的每个任务的状态。每个 `CompletableFuture` 对象在指定或由应用程序决定的后台线程上运行，完成后向原始调用方法发出回调。


  在以下解决方案中，调用方法调用了两个长时间运行的任务，它们各自利用 `CompletableFuture` 在任务完成后报告状态。


  ```

  public class Recipe10_11 {

  public static void main(String[] args) {

  try {

  CompletableFuture tasks = performWork()

  .thenApply(work -> {

  String newTask = work + " 第二个任务完成！";

  System.out.println(newTask);

  return newTask;

  }).thenApply(finalTask -> finalTask + " 最终任务完成！");

  CompletableFuture future = performSecondWork("Java 9 太棒了！ ");

  while(!tasks.isDone()){

  System.out.println(future.get());

  }

  System.out.println(tasks.get());

  } catch (ExecutionException | InterruptedException ex) {

  }

  }

  /**

  * 返回一个 CompletableFuture 对象。

  * @return

  */

  public static CompletableFuture performWork() {

  CompletableFuture resultingWork = CompletableFuture.supplyAsync(

  () -> {

  String taskMessage = "第一个任务完成！";

  try {

  Thread.sleep(1000);

  } catch (InterruptedException ex) {

  System.out.println(ex);

  }

  System.out.println(taskMessage);

  return taskMessage;

  });

  return resultingWork;

  }

  /**

  * 接受一个字符串并返回一个 CompletableFuture。

  * @param message

  * @return

  */

  public static CompletableFuture performSecondWork(String message) {

  CompletableFuture resultingWork = CompletableFuture.supplyAsync(

  () -> {

  String taskMessage = message + " 另一个任务完成！";

  try {

  Thread.sleep(1000);

  } catch (InterruptedException ex) {

  System.out.println(ex);

  }

  return taskMessage;

  });

  return resultingWork;

  }

  }

  ```


  以下是运行结果。


  ```

  第一个任务完成！

  第一个任务完成！第二个任务完成！

  Java 9 太棒了！另一个任务完成！

  第一个任务完成！第二个任务完成！最终任务完成！

  ```


  ### 工作原理


  `CompletableFuture<T>` 是在 Java 8 中新增的，用于支持异步任务。`CompletableFuture<T>` 是 `Future<T>`
  的扩展，它增加了许多方法来促进异步、事件驱动的编程模型，并且允许随时设置值。后一项功能意味着，如果应用程序将来需要使用 `CompletableFuture`
  对象，可以在需要之前创建它。


  创建 `CompletableFuture` 对象有几种选择，可以手动创建，也可以通过工厂方法创建。手动创建可以不绑定到任何线程。当应用程序需要为将来发生的事件设置占位符时，这种策略非常有用。以下代码演示了如何手动创建
  `CompletableFuture` 对象。


  ```

  final CompletableFuture completableFuture = new CompletableFuture();

  ```


  可以使用工厂生成一个 `CompletableFuture`，以返回一个面向特定任务或结果的对象。有几种不同的工厂方法可以调用来返回这样的对象。有些工厂方法接受参数，有些则不接受。例如，`CompletableFuture.runAsync(Runnable)`
  方法返回一个 `CompletableFuture`，它首先执行提供的 `Runnable`，然后由在 `ForkJoinPool.commonPool()`
  中运行的任务异步完成。`runAsync()` 方法的另一个变体同时接受 `Runnable` 和 `Executor`，它首先执行提供的 `Runnable`，然后由给定
  `Executor` 中的任务异步完成。


  `CompletableFuture` 对象还包含几个类似于标准 `Future<T>` 对象的方法。例如，`isDone()`、`cancel()` 和 `isCompletedExceptionally()`
  方法都返回 `boolean` 以指示对象的状态。还可以通过调用 `thenApply()` 方法（该方法接受 lambda 表达式和方法引用）来使用 `CompletableFuture`
  对象堆叠异步任务。本配方的解决方案演示了如何利用 `thenApply()` 方法从一个异步任务调用另一个异步任务。首先，执行名为 `performWork()`
  的 `CompletableFuture` 对象，然后执行一个 lambda 表达式，基于 `performWork()` 中生成的字符串创建一个拼接字符串。第二个任务完成后，会调用另一个任务向字符串追加更多文本。然后在循环中调用
  `future.get()` 方法，以查看字符串随时间被应用程序转换的过程。最后，打印完全完成的任务的结果。


  ## 10.12 总结


  在开发应用程序时，理解并发的基础知识非常重要。没有什么比成功测试应用程序，然后一旦发布到生产环境就因死锁而失败更糟糕的了。本章从基础开始，演示了如何生成后台任务。


