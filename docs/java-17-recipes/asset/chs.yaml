- '# 5. 面向对象的 Java


  面向对象的程序由许多不同的代码片段组成，它们协同工作。面向对象的理念不是编写一个包含长串语句和命令的程序，而是将功能分解到各个独立组织的对象中。每个对象都包含与其自身相关的功能，当这些对象组合在一起时，就可以用来开发复杂的解决方案。在本章中，我们将探讨
  Java 语言的一些关键面向对象特性。从涵盖访问修饰符的基础方案，到处理内部类的高级方案，本章包含的方案将帮助你理解 Java 的面向对象方法论。


  ## 5.1 控制类成员的访问


  ### 问题


  你想创建一些其他类无法访问的类成员。


  ### 解决方案


  创建 `private` 实例成员，而不是让它们对其他类可用（`public` 或 `protected`）。例如，假设你正在创建一个应用程序来管理一支运动队的球员。你创建了一个名为
  `Player` 的类来表示球队中的一名球员。你不希望该类的字段能被任何其他类访问。以下代码演示了如何声明一些实例成员，使其仅能在定义它们的类内部被访问。


  ```

  private String firstName;

  private String lastName;

  private String position;

  private int status = -1;

  ```


  ### 工作原理


  要将类成员指定为 `private`，请在其声明或签名前使用 `private` 关键字。`private` 访问修饰符会隐藏类的成员，使得外部类无法访问它们。任何标记为
  `private` 的类成员仅对同一类的其他成员可用。任何外部类都不能访问被指定为 `private` 的字段或方法，并且使用代码补全功能的 IDE 也无法看到它们。


  如本方案解决方案中所述，声明类成员时可以使用三种不同的访问修饰符。这些修饰符是 `public`、`protected` 和 `private`。声明为 `public`
  的成员对任何其他类都可用。声明为 `protected` 的成员对同一包内的任何其他类以及子类都可用。最好只将那些需要从另一个类直接访问的类成员声明为 `public`
  或 `protected`。使用 `private` 访问修饰符隐藏类成员有助于强化更好的面向对象设计。此外，当类元素未被指定作用域时，会存在一个默认作用域，该作用域对包和类本身是可访问的。


  ## 5.2 使私有字段对其他类可访问


  ### 问题


  你想创建 `private` 实例成员，以便外部类不能直接访问它们。但是，你也希望以受控的方式使这些 `private` 成员可访问。


  ### 解决方案


  通过为 `private` 字段创建 getter 和 setter 方法来封装它们。以下代码演示了如何声明一个 `private` 字段，然后定义访问器（getter）和修改器（setter）方法，这些方法允许外部类获取或设置该字段的值。


  ```

  private String firstName;

  /**

  * @return firstName

  */

  public String getFirstName() {

  return firstName;

  }

  /**

  * @param firstName 要设置的 firstName

  */

  public void setFirstName(String firstName) {

  this.firstName = firstName;

  }

  ```


  外部类可以使用 `getFirstName()` 方法来获取 `firstName` 字段的值。同样，外部类可以使用 `setFirstName(String
  firstName)` 方法来设置 `firstName` 字段的值。


  ### 工作原理


  通常，当类中的字段被标记为 `private` 时，仍然需要让外部类能够设置或检索它们的值。那么为什么不直接使用这些字段并将它们设为 `public` 呢？直接操作其他类的字段并不是良好的编程实践，因为通过使用访问器（getter）和修改器（setter）可以以受控的方式授予访问权限。通过不直接针对另一个类的成员进行编码，你还有助于解耦代码，这有助于确保如果一个对象发生变化，依赖它的其他对象不会受到不利影响。正如本方案解决方案中的示例所示，隐藏字段并使用
  `public` 方法来访问这些字段相当容易。只需创建两个方法：一个用于获取 `private` 字段的值，即 *getter* 或访问器方法；另一个用于设置
  `private` 字段的值，即 *setter* 或修改器方法。在本方案的解决方案中，getter 返回 `private` 字段中包含的未经修改的值。类似地，setter
  通过接受一个与 `private` 字段相同数据类型的参数，然后将 `private` 字段的值设置为该参数的值。


  使用 getter 或 setter 访问字段的类不需要了解这些方法背后的任何细节。例如，如果需要，getter 或 setter 方法可以包含更多功能。此外，这些方法的细节可以在不更改任何访问它们的代码的情况下进行修改。


  注意


  使用 getter 和 setter 并不能完全解耦代码。事实上，许多人认为使用 getter 和 setter 并不是一种良好的编程实践。使用访问器方法的对象仍然需要知道它们正在操作的实例字段的类型。话虽如此，getter
  和 setter 是向外部提供对对象 `private` 实例字段访问的标准技术。为了以更面向对象的方式使用访问器方法，可以在接口中声明它们，并针对接口而不是对象本身进行编码。


  ## 5.3 创建只有一个实例的类


  ### 问题


  你想创建一个在整个应用程序中只能存在一个实例的类，以便所有应用程序用户都与该类的同一个实例进行交互。




  ### 解决方案 1


  使用单例模式创建类。实现单例模式的类只允许存在一个实例，并提供对该实例的单一访问点。假设你想创建一个 `Statistics` 类，用于计算有组织运动中每个队伍和球员的统计数据。在应用程序中拥有该类的多个实例是没有意义的，因此你希望将
  `Statistics` 类创建为单例，以防止生成多个实例。以下类展示了单例模式。


  ```

  package org.java17recipes.chapter05.recipe05_03;

  import java.util.ArrayList;

  import java.util.List;

  import java.io.Serializable;

  public class Statistics implements Serializable {

  private static final long serialVersionUID = 1L;

  // 类实例的定义

  private static final Statistics INSTANCE = new Statistics();

  private List teams = new ArrayList ();

  /**

  * 构造函数已被设为私有，以防止外部类访问并实例化更多的 Statistics 实例。

  */

  private Statistics(){

  }

  /**

  * Statistics 类的访问器。只允许创建该类的一个实例。

  * @return

  */

  public static Statistics getInstance(){

  return INSTANCE ;

  }

  /**

  * @return the teams

  */

  public List getTeams() {

  return teams;

  }

  /**

  * @param teams the teams to set

  */

  public void setTeams(List teams) {

  this.teams = teams;

  }

  }

  ```


  如果另一个类试图创建该类的实例，它会使用 `getInstance()` 访问器方法来获取单例实例。需要注意的是，解决方案代码演示了**饿汉式**实例化，这意味着实例会在单例被加载时立即创建。对于**懒汉式**实例化（即在首次请求时创建实例），你必须注意同步
  `getInstance()` 方法，使其成为线程安全的。以下代码演示了懒汉式实例化的示例。


  ```

  public static Statistics getInstance(){

  synchronized(Statistics.class){

  if (instance == null){

  instance = new Statistics();

  }

  }

  return instance;

  }

  ```


  ### 解决方案 2


  首先，创建一个 `enum`，并在其中声明一个名为 `INSTANCE` 的单一元素。接着，在 `enum` 中声明其他字段，用于存储应用程序所需的值。以下 `enum`
  表示一个与解决方案 1 具有相同能力的单例。


  ```

  import java.util.ArrayList;

  import java.util.List;

  public enum StatisticsSingleton {

  INSTANCE;

  private List teams = new ArrayList ();

  /**

  * @return the teams

  */

  public List getTeams() {

  return teams;

  }

  /**

  * @param teams the teams to set

  */

  public void setTeams(List teams) {

  this.teams = teams;

  }

  }

  主类是：

  public static void main(String[] args){

  StatisticsSingleton stats = StatisticsSingleton.INSTANCE;

  System.out.println("使用 stats 对象向列表添加对象");

  List mylist = stats.getTeams();

  mylist.add("One");

  mylist.add("Two");

  System.out.println("使用 stats2 对象从列表读取对象");

  StatisticsSingleton stats2 = StatisticsSingleton.INSTANCE;

  List mylist2 = stats2.getTeams();

  for(Object name : mylist2){

  System.out.println(name.toString());

  }

  输出是：

  Adding objects to the list using stats object

  Reading objects from the list using stats2 object

  One

  Two

  ```


  注意


  在 `recipe05_03` 包中有一个测试类，你可以用它来使用 `enum` 单例解决方案。


  ### 工作原理


  单例模式创建的类不能被任何其他类实例化。当你希望整个应用程序只使用一个类的实例时，这会非常有用。可以通过以下三个步骤将单例模式应用于一个类。首先，将类的构造函数设为
  `private`，这样外部类就无法实例化它。接着，定义一个 `private static volatile` 字段，用于表示该类的一个实例。`volatile`
  关键字保证了每个线程都使用同一个实例。创建该类的一个实例并将其赋值给该字段。在本方案的解决方案中，类名为 `Statistics`，字段定义如下。


  ```

  private static volatile Statistics instance = new Statistics();

  ```


  最后，实现一个名为 `getInstance()` 的访问器方法，该方法简单地返回实例字段。以下代码演示了这样一个访问器方法。


  ```

  public static Statistics getInstance(){

  return instance;

  }

  ```


  要从另一个类中使用该单例，请调用单例的 `getInstance()` 方法。这将返回该类的一个实例。以下代码展示了另一个类获取本方案解决方案 1 中定义的 `Statistics`
  单例实例的示例。


  ```

  Statistics statistics = Statistics.getInstance();

  List teams = statistics.getTeams();

  ```


  任何调用 `getInstance()` 方法的类都会获得同一个实例。因此，在整个应用程序中，每次调用 `getInstance()` 时，单例中包含的字段都具有相同的值。


  如果单例被序列化然后反序列化，会发生什么？这种情况可能会导致反序列化时返回另一个对象实例。为了防止此问题发生，请务必实现 `readResolve()` 方法，如解决方案
  1 所示。该方法在对象被反序列化时被调用，简单地返回该实例即可确保不会生成另一个实例。


  解决方案 2 演示了创建单例的另一种方式，即使用 Java `enum` 而不是类。使用这种方法是有益的，因为 `enum` 提供了序列化支持，禁止了多次实例化，并且允许你更简洁地编写代码来实现
  `enum` 单例：创建一个 `enum` 并声明一个 `INSTANCE` 元素。这是一个静态常量，它会向引用它的类返回 `enum` 的一个实例。然后，你可以向
  `enum` 中添加元素，这些元素可以被应用程序中的其他类用来存储值。


  与任何编程解决方案一样，实现目标的方法不止一种。有些人认为解决方案 1 中演示的标准单例模式并非最理想的解决方案。另一些人则出于不同原因不喜欢 `enum` 解决方案。尽管你可能会发现在某些情况下其中一种比另一种效果更好，但两者都是可行的。


  ## 5.4 生成类的实例


  ### 问题


  在你的一个应用程序中，你希望提供动态生成对象实例的能力。对象的每个实例都应该立即可用，并且对象的创建者不需要了解对象创建的细节。




  ### 解决方案


  使用工厂方法模式来实例化类的实例，同时将创建过程与对象创建者解耦。创建工厂后，可以在调用时返回类的新实例。以下类代表一个简单工厂，每次调用其 `createPlayer(String)`
  方法时，都会返回一个 `Player` 子类的新实例。返回的 `Player` 子类取决于传递给 `createPlayer` 方法的字符串值。


  ```

  public class PlayerFactory {

  public static Player createPlayer(String playerType){

  Player returnType;

  switch(playerType){

  case "GOALIE":

  returnType = new Goalie();

  break;

  case "LEFT":

  returnType = new LeftWing();

  break;

  case "RIGHT":

  returnType = new RightWing();

  break;

  case "CENTER":

  returnType = new Center();

  break;

  case "DEFENSE":

  returnType = new Defense();

  break;

  default:

  returnType = new AllPlayer();

  }

  return returnType;

  }

  }

  ```


  如果某个类想使用该工厂，只需调用静态的 `createPlayer` 方法，并传入一个代表 `Player` 新实例的字符串值。以下代码展示了其中一个 `Player`
  子类；其他子类可以非常类似。


  ```

  public class Goalie extends Player {

  private int totalSaves;

  public Goalie(){

  this.setPosition("GOALIE");

  }

  /**

  * @return the totalSaves

  */

  public int getTotalSaves() {

  return totalSaves;

  }

  /**

  * @param totalSaves the totalSaves to set

  */

  public void setTotalSaves(int totalSaves) {

  this.totalSaves = totalSaves;

  }

  }

  Player 类如下：

  package org.java17recipes.chapter05.recipe05_04;

  public abstract class Player implements PlayerType {

  private String firstName;

  private String lastName;

  private String position;

  private int status = -1;

  public Player(){

  }

  public Player (String position, int status){

  this.position = position;

  this.status = status;

  }

  protected String playerStatus(){

  String returnValue = null;

  switch(getStatus()){

  case 0:

  returnValue = "ACTIVE";

  case 1:

  returnValue = "INACTIVE";

  case 2:

  returnValue = "INJURY";

  default:

  returnValue = "ON_BENCH";

  }

  return returnValue;

  }

  public String playerString(){

  return getFirstName() + " " + getLastName() + " - " + getPosition();

  }

  /**

  * @return the firstName

  */

  public String getFirstName() {

  return firstName;

  }

  /**

  * @param firstName the firstName to set

  */

  public void setFirstName(String firstName) {

  if (firstName.length() > 30){

  this.firstName = firstName.substring(0, 29);

  } else {

  this.firstName = firstName;

  }

  }

  /**

  * @return the lastName

  */

  public String getLastName() {

  return lastName;

  }

  /**

  * @param lastName the lastName to set

  */

  public void setLastName(String lastName) {

  this.lastName = lastName;

  }

  /**

  * @return the position

  */

  @Override

  public String getPosition() {

  return position;

  }

  /**

  * @param position the position to set

  */

  public void setPosition(String position) {

  this.position = position;

  }

  /**

  * @return the status

  */

  public int getStatus() {

  return status;

  }

  /**

