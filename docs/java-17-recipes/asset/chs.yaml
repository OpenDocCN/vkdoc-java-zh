  \nHello World!\nuser-agent \" + userAgent);\n%>\n\n清单 13-6\nhello.jsp\n```\n\n`<%\
  \ ... %>` 对中的代码是用 Java 编写的小脚本。当 Tomcat 的 JSP 引擎解释此模块时，它会创建一个如清单 13-7 所示的 Java Servlet（已移除一些缩进和空行）。\n\
  \n```\nout.write(\"\\r\\n\");\nout.write(\"\\r\\n\");\nout.write(\"Hello World 动态\
  \ HTML \\r\\n\");\nout.write(\"\\r\\n\");\nString userAgent = request.getHeader(\"\
  user-agent\");\nout.println(\"User-agent: \" + userAgent);\nout.write(\"\\r\\n\"\
  );\nout.write(\"Hello World!\\r\\n\");\nout.write(\"\\r\\n\");\nout.write(\"\\r\\\
  n\");\n清单 13-7\n来自“Hello World!” JSP 页面的 Java 代码\n```\n\n工作原理\n如果没有 JSP，要更新纯静态 HTML\
  \ 页面的外观或内容，你必须始终手动操作。即使你只想更改日期或图片，也必须编辑 HTML 文件并输入修改内容。没有人会为你做这件事，而使用 JSP，你可以使内容依赖于许多因素，包括一天中的时间、用户提供的信息、用户与你的网站交互的历史记录，甚至用户的浏览器类型。这种能力对于提供在线服务至关重要，你可以根据查看者的偏好和要求，为每个提出请求的查看者定制响应。\n\
  \n以下步骤解释了 Web 服务器如何创建网页。\n\n1.  你的浏览器向 Web 服务器发送一个 HTTP 请求。这在 JSP 中不会改变，尽管 URL 可能以\
  \ `.jsp` 结尾，而不是 `.html` 或 `.htm`。\n\n2.  Web 服务器是一个 Java 服务器，具有识别和处理 Java Servlet\
  \ 所需的扩展。Web 服务器识别出 HTTP 请求是针对 JSP 页面的，并将其转发给 JSP 引擎。\n\n3.  JSP 引擎从磁盘加载 JSP 页面，并将其转换为\
  \ Java Servlet。从这一点开始，这个 Servlet 与任何其他直接用 Java（而非 JSP）开发的 Servlet 没有区别。然而，JSP Servlet\
  \ 自动生成的 Java 代码并不总是易于阅读，你绝不应手动修改它。\n\n4.  JSP 引擎将 Servlet 编译成可执行类，并将原始请求转发给 Web\
  \ 服务器的另一部分，称为 *Servlet 引擎*。请注意，JSP 引擎仅在发现 JSP 页面自上次请求以来发生更改时，才会将 JSP 页面转换为 Java\
  \ 并重新编译 Servlet。\n\n\n\n5.  Servlet 引擎加载 Servlet 类并执行它。在执行过程中，Servlet 会生成 HTML 格式的输出，Servlet\
  \ 引擎会将其放入 HTTP 响应中传递给 Web 服务器。\n\n6.  Web 服务器将 HTTP 响应转发到您的浏览器。\n\n7.  您的 Web 浏览器处理\
  \ HTTP 响应中动态生成的 HTML 页面，就像处理静态页面一样。实际上，静态和动态网页的格式是相同的。\n\n到达您浏览器的是 Servlet 生成的输出（即转换并编译后的\
  \ JSP 页面），而不是 JSP 页面本身。同一个 Servlet 会根据 HTTP 请求的参数和其他因素生成不同的输出。例如，假设您正在浏览一家在线商店提供的产品。当您点击产品图片时，您的浏览器会生成一个\
  \ HTTP 请求，其中包含产品代码作为参数。结果，Servlet 会生成一个包含该产品描述的 HTML 页面。服务器无需为每个产品代码重新编译 Servlet。Servlet\
  \ 会查询包含所有产品详细信息的数据库，获取您感兴趣产品的描述，并用这些数据格式化一个 HTML 页面。这就是动态 HTML 的全部意义所在！纯 HTML 无法查询数据库，但\
  \ Java 可以，而 JSP 为您提供了在 HTML 页面中包含 Java 代码片段的方法。\n\nJSP 的一个演进是 JavaServer Faces (JSF)\
  \ API，用于为 Java Web 应用程序创建基于组件的用户界面。在 MVC 应用程序架构中，JSF 扮演控制器的角色，从而调解 JSP（视图）与封装应用程序数据的模型之间的每一次交互。JSF\
  \ 通过让您从一组连接到服务器端对象的标准 UI 组件创建用户界面，并提供四个自定义标签库来处理这些 UI 组件，从而简化了 Web 应用程序的开发。JSF 会透明地保存\
  \ UI 组件的状态信息，并在表单重新显示时重新填充它们。这是可能的，因为组件的状态生命周期超越了 HTTP 请求的生命周期。JSF 通过提供一个控制器 Servlet\
  \ 和一个包含事件处理、服务器端验证、数据转换和组件渲染的组件模型来运作。\n\nJSF 不会改变您从 JSP 中已经了解的基本页面生命周期：客户端发出 HTTP\
  \ 请求，服务器回复一个动态生成的 HTML 页面。请注意，JSF 并不容易使用，并且需要付出不可忽视的初始努力才能让它运行起来。\n\n有关全面的 Java\
  \ Web 应用程序开发以及 JSP 和 JSF 如何在 Jakarta EE 平台（配合 Eclipse）中成为关键技术的更多信息，请参阅 Luciano Manelli\
  \ 和 Giulio Zambon 所著的 *Beginning Jakarta EE Web Development*（Apress，2020 年）。\n\n\
  13.4 列出 HTML 请求参数\n\n问题\n您想要在 JSP 页面上列出 HTML 请求的参数。\n\n解决方案\n使用 JSP，您可以生成动态网页。这是确定的。但动态页面的实用性远不止于识别查看者使用的浏览器或在不同日期显示不同信息。根据查看者是谁以及查看者想要什么来调整网页内容才是关键所在。\n\
  每个 HTML 请求都包含一系列参数，这些参数通常是查看者在表单中输入内容后点击“提交”按钮的结果。额外的参数也可以是 URL 本身的一部分。例如，多语言网站中的页面有时会以“`?lang=en`”结尾的\
  \ URL 来告诉服务器以英文格式化所请求的页面。\n\n清单 13-8 展示了一个简单的 JSP 页面，它列出了所有 HTML 请求参数。这是一个有用的小工具，可以轻松检查您的\
  \ HTML 页面发送给服务器的内容。\n\n```\n\n请求参数\n映射大小 =\n\n映射元素参数名称参数值[s]\n\" + k + \"'\" + keys[k]\
  \ + \"'\");\nfor (int j = 0; j  0) out.print(\", \");\nout.print(\"'\" + pars[j]\
  \ + \"'\");\n}\nout.println(\"\");\n}\n%>\n\n清单 13-8\nreq_params.jsp\n```\n\n工作原理\n\
  有趣的部分在于以粗体突出显示的行。第一行告诉您参数存储在一个类型为 `Map` 的对象中，并向您展示如何检索参数名称列表。\n第二行突出显示的行向您展示了如何通过将\
  \ Java 变量值包含在 `<%=` 和 `%>` 这对标签之间，将其直接插入到输出中（即插入到 HTML 页面中）。这与使用脚本小程序不同——在脚本小程序中，您可以使用\
  \ JSP 为网页构建动态性。\n\n第三行突出显示的行展示了如何请求您知道名称的每个参数的值。这里使用 *values* 一词而不是 *value*，因为每个参数可以在同一个请求中出现多次。例如，将\
  \ JSP 保存在 `\\apache-tomcat-10.0.13\\webapps\\` 中创建的 test 文件夹中。输入以下 URL 以获取图 13-7\
  \ 所示的内容。\n\n![](img/323910_4_En_13_Fig7_HTML.jpg)\n\n图 13-7\nreq_params.jsp 的输出\n\
  \n```\nhttp://localhost:8080/test/req_params.jsp?a=b&c=d&a=zzz&empty=&empty=&1=22\n\
  ```\n\n请注意，恰如其名地命名为 `empty` 的参数在查询字符串中出现了两次，这导致参数映射中出现两个空字符串。另外，查看 `a` 参数，您会注意到这些值按照它们在查询字符串中出现的顺序返回。\n\
