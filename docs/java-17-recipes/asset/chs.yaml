  \ Java 9 中新增的低级别 JVM 日志记录。\n\n## 9.1 捕获异常\n\n### 问题\n\n你希望优雅地处理代码中产生的任何异常。\n\n###\
  \ 解决方案\n\n使用内置的 `try`/`catch` 语言结构来 `catch`（捕获）异常。具体做法是将任何可能抛出异常的代码块包裹在 `try/catch`\
  \ 块中。下面的示例生成一个布尔值，用于指示指定字符串的长度是否大于五个字符。如果作为参数传入的字符串是 `null`，则 `length()` 方法会抛出 `NullPointerException`（`RuntimeException`\
  \ 类型），并在 `catch` 块中被捕获。\n\n```\npublic class Recipe9_1 {\npublic static void main(String[]\
  \ args) {\nRecipe9_1 recipe = new Recipe9_1();\nrecipe.start();\n}\nprivate void\
  \ start() {\nSystem.out.println(\"字符串 1234 长度是否大于 5 个字符？:\"+\nisStringShorterThanFiveCharacters(\"\
  1234\"));\nSystem.out.println(\"字符串 12345 长度是否大于 5 个字符？:\"+\nisStringShorterThanFiveCharacters(\"\
  12345\"));\nSystem.out.println(\"字符串 123456 长度是否大于 5 个字符？:\"+\nisStringShorterThanFiveCharacters(\"\
  123456\"));\nSystem.out.println(\"字符串 null 长度是否大于 5 个字符？:\"+\nisStringShorterThanFiveCharacters(null));\n\
  }\nprivate boolean isStringShorterThanFiveCharacters(String aString) {\ntry {\n\
  return aString.length() > 5;\n} catch (NullPointerException e) {\nSystem.err.println(\"\
  发生异常：\" + e);\nreturn false;\n}\n}\n}\n```\n\n### 工作原理\n\n`try` 关键字指定了被包含的代码段可能引发异常。`catch`\
  \ 子句放在 `try` 子句的末尾。每个 `catch` 子句指定了要捕获的异常。如果没有为受检异常提供 `catch` 子句，编译器会生成错误。两种可能的解决方案是：添加一个\
  \ `catch` 子句，或者将异常包含在封闭方法的 `throws` 子句中。任何被抛出但未被捕获的受检异常都会沿着调用栈向上传播。如果此方法没有捕获该异常，执行该代码的线程将终止。如果该线程是程序中唯一的线程，则程序将终止执行。\n\
  \n如果一个 `try` 子句需要捕获多个异常，可以指定多个异常，用竖线字符分隔。例如，以下 `try/catch` 块可用于同时捕获 `NumberFormatException`（一种\
  \ `RuntimeException` 类型）和 `NullPointerException`。\n\n```\ntry {\n// 此处代码\n} catch\
  \ (NumberFormatException|NullPointerException ex) {\n// 日志记录\n}\n```\n\n注意\n\n抛出异常时要小心。如果抛出的异常未被捕获，它会沿着调用栈向上传播；如果没有能够处理该异常的\
  \ `catch` 子句，它将导致运行中的线程终止（也称为*崩溃*）。如果你的程序只有一个主线程，未捕获的异常将终止你的程序。\n\n## 9.2 确保代码块被执行\n\
  \n### 问题\n\n你希望编写一段代码，当控制权离开某个代码段时（即使是因为抛出错误或代码段异常终止而离开），这段代码也能执行。例如，你获取了一个锁，并希望确保能正确地释放它。你希望在发生错误或没有错误的情况下都能释放该锁。\n\
  \n\n\n### 解决方案\n\n使用 `try`/`catch`/`finally` 代码块来正确释放在代码段中获取的锁和其他资源。将无论是否发生异常都希望执行的代码放入\
  \ `finally` 子句中。在示例中，`finally` 关键字指定了一个始终执行的代码块，无论 `try` 块中是否抛出了异常。在 `finally` 块中，通过调用\
  \ `lock.unlock()` 释放锁。\n\n```\npublic class Recipe9_2 {\n    Lock myLock = new ReentrantLock();\n\
  \    Random random = new Random();\n    public static void main(String[] args) {\n\
  \        Recipe9_2 recipe = new Recipe9_2();\n        recipe.start();\n    }\n \
  \   private void start() {\n        for (int i = 0; i < 10; i++) {\n           \
  \ callFunctionThatHoldsLock();\n        }\n    }\n    private void callFunctionThatHoldsLock()\
  \ {\n        myLock.lock();\n        try {\n            int number = random.nextInt(5);\n\
  \            int result = 100 / number;\n            System.out.println(\"A result\
  \ is \" + result);\n            FileOutputStream file = new FileOutputStream(\"\
  file.out\");\n            file.write(result);\n            file.close();\n     \
  \   } catch (FileNotFoundException e) {\n            e.printStackTrace();\n    \
  \    } catch (IOException e) {\n            e.printStackTrace();\n        } catch\
  \ (Exception e) {\n            e.printStackTrace();\n        } finally {\n     \
  \       myLock.unlock();\n        }\n    }\n}\n```\n\n### 工作原理\n\n放置在 `try`/`catch`/`finally`\
  \ 块的 `finally` 子句中的代码始终会被执行。在此示例中，在函数开头获取锁并在 `finally` 块中释放它，可以确保无论是否抛出异常（已检查或未检查），锁都会在函数结束时被释放。总之，获取的锁应始终在\
  \ `finally` 块中释放。在示例中，假设 `mylock.unlock()` 函数调用不在 `finally` 块中（而是在 `try` 块的末尾）；如果在这种情况下发生异常，则不会执行\
  \ `mylock.unlock()` 调用，因为代码执行会在异常发生的位置中断。在这种情况下，锁将永远被持有而无法释放。\n\n**注意**\n\n如果需要在方法中返回值，请避免在\
  \ `finally` 块中返回。`finally` 块中的 `return` 语句始终会执行，无论 `try` 块中可能已经执行了任何其他 `return`\
  \ 语句。\n\n## 9.3 抛出异常\n\n### 问题\n\n当应用程序中出现特定情况时，希望通过抛出异常来中止当前代码路径的执行。\n\n### 解决方案\n\
  \n当特定情况发生时，使用 `throw` 关键字抛出指定的异常。使用 `throw` 关键字，可以通知当前线程查找 `try`/`catch` 块（在当前层级及调用栈上层），这些块可以处理抛出的异常。在以下示例中，如果传入的参数为\
  \ `null`，`callSomeMethodThatMightThrow` 方法会抛出一个 `NullPointerException`（`RuntimeException`\
  \ 类型）。\n\n```\npublic class Recipe9_3 {\n    public static void main(String[] args)\
  \ {\n        Recipe9_3 recipe = new Recipe9_3();\n        recipe.start();\n    }\n\
  \    private void start() {\n        try {\n            callSomeMethodThatMightThrow(null);\n\
  \        } catch (IllegalArgumentException e) {\n            System.err.println(\"\
  存在非法参数异常！\");\n        }\n    }\n    private void callSomeFunctionThatMightThrow(Object\
  \ o) {\n        if (o == null) throw new NullPointerException(\"对象为空\");\n    }\n\
  ```\n\n在此代码示例中，`callSomeMethodThatMightThrow` 方法检查是否传入了有效参数。如果参数为 `null`，则抛出 `NullPointerException（RuntimeException`\
  \ 类型`）`，表示该方法的调用者使用了错误的参数调用它。\n\n### 工作原理\n\n`throw` 关键字允许显式生成异常条件。当当前线程抛出异常时，它不会执行\
  \ `throw` 语句之后的任何代码，而是将控制权转移到 `catch` 子句（如果有的话），或者终止线程。\n\n**注意**\n\n抛出异常时，请确保你确实有意这样做。如果异常在向上传播过程中未被捕获，它将终止正在执行的线程（也称为*展开*）。如果你的程序只有一个主线程，未捕获的异常将终止你的程序。\n\
  \n## 9.4 捕获多个异常\n\n### 问题\n\n应用程序中的代码块可能抛出多个异常。希望捕获 `try` 块中可能发生的每个异常。\n\n### 解决方案\
  \ 1\n\n当同一个块中可能遇到多个异常时，可以指定多个 `catch` 子句。每个 `catch` 子句可以指定要处理的不同异常，以便对每个异常进行不同的处理。在以下代码中，两个\
  \ `catch` 子句分别处理 `IOException` 和 `ClassNotFoundException`。\n\n```\npublic static\
  \ void main(String[] args) {\n    Recipe9_4 recipe = new Recipe9_4();\n    recipe.startClassic();\n\
  }\nprivate void startClassic() {\n    try {\n        Class stringClass = Class.forName(\"\
  java.lang.String\");\n        FileInputStream in = new FileInputStream(\"myFile.log\"\
  ) ; // 可能抛出 IOException\n        in.read();\n    } catch (IOException e) {\n   \
  \     System.err.println(\"发生异常 \"+e);\n    } catch (ClassNotFoundException e) {\n\
  \        System.err.println(\"发生异常 \"+e);\n    }\n}\n```\n\n### 解决方案 2\n\n如果应用程序倾向于在单个块中抛出多个异常，则可以使用竖线运算符（`|`）以相同的方式处理每个异常。在以下示例中，`catch`\
  \ 子句指定了多个异常类型，用竖线（`|`）分隔，以相同的方式处理每个异常。\n\n```\npublic static void main(String[]\
  \ args) {\n    Recipe9_4 recipe = new Recipe9_4();\n    recipe.start();\n}\nprivate\
  \ void start() {\n    try {\n        Class stringClass = Class.forName(\"java.lang.String\"\
  );\n        FileInputStream in = new FileInputStream(\"myFile.log\") ;\n       \
  \ // 可能抛出 IOException\n        in.read();\n    } catch (IOException | ClassNotFoundException\
  \ e) {\n        System.out.println(\"抛出了类型为 \"+e.getClass()+\" 的异常！ \"+e);\n   \
  \ }\n}\n```\n\n### 工作原理\n\n处理可能抛出多个异常的情况有多种不同的方式。可以指定单独的 `catch` 子句来分别处理每个异常。要以相同的方式处理每个异常，可以使用单个\
  \ `catch` 子句，并用竖线运算符分隔每个异常。\n\n**注意**\n\n如果在多个 `catch` 块中捕获异常（解决方案 1），请确保 `catch`\
  \ 块的定义顺序是从最具体到最通用。不遵循此约定将导致异常无法处理更具体的块。当存在 `catch (Exception e)` 块（几乎捕获所有异常）时，这一点最为重要。\n\
  \n使用 `catch (Exception e)` 块——称为*捕获所有*或*宝可梦异常处理器*（必须捕获所有）——通常是糟糕的做法，因为这样的块会捕获所有异常类型并同等对待。这会产生问题，因为该块可能会捕获调用栈深处可能发生的、你本意并非要捕获的其他异常（例如\
  \ `OutOfMemoryException`）。最好指定每个可能的异常，而不是指定一个捕获所有异常的处理器。\n\n## 9.5 捕获未捕获的异常\n\n\
  ### 问题\n\n希望在线程因未捕获的异常（例如 `NullPointerException`）而终止时得到通知。\n\n\n\n### 方案 1\n\n创建\
  \ Java 线程时，有时需要确保任何异常都能被捕获并妥善处理，以帮助确定线程终止的原因。以下代码演示了如何为每个线程注册异常处理器。\n\n```\npublic\
  \ static void main(String[] args) {\nRecipe9_5 recipe = new Recipe9_5();\nrecipe.start();\n\
  recipe.startForCurrentThread();\n}\nprivate void start() {\nThread.setDefaultUncaughtExceptionHandler((Thread\
  \ t, Throwable e) -> {\nSystem.out.println(\"哇！某处抛出了异常！\"+t.getName()+\": \"+e);\n\
  });\nfinal Random random = new Random();\nfor (int j = 0; j < 10; j++) {\nint divisor\
  \ = random.nextInt(4);\nSystem.out.println(\"200 / \" + divisor + \" 等于 \" + (200\
  \ / divisor));\n}\n}\n```\n\n以下是输出结果。\n\n```\n200 / 2 等于 100\n哇！某处抛出了异常！main: java.lang.ArithmeticException:\
  \ / by zero\n```\n\n该线程中的 `for` 循环会正常执行，直到遇到异常时，`DefaultUncaughtExceptionHandler`\
  \ 被调用。`UncaughtExceptionHandler` 是一个函数式接口，因此可以使用 lambda 表达式来实现异常处理器。\n\n### 方案 2\n\
  \n可以在特定线程中注册 `UncaughtExceptionHandler`。注册后，该线程内任何未被捕获的异常都将由 `uncaughtException()`\
  \ 方法处理。以下是一个示例。\n\n```\nprivate void startForCurrentThread() {\nThread.currentThread().setUncaughtExceptionHandler((Thread\
  \ t, Throwable e) -> {\nSystem.out.println(\"在线程 \"+t.getName()+\" 中抛出了异常 \"+e);\n\
  });\nThread someThread = new Thread(() -> {\nSystem.out.println(200/0);\n});\nsomeThread.setName(\"\
  某个倒霉线程\");\nsomeThread.start();\nSystem.out.println(\"在主线程中 \"+ (200/0));\n}\n```\n\
  \n以下是输出结果。\n\n```\n在线程 main 中抛出了异常 java.lang.ArithmeticException: / by zero\n```\n\
  \n在上述代码中，`UncaughtExceptionHandler` 被注册在 `currentThread` 上。与方案 1 相同，`UncaughtExceptionHandler`\
  \ 是一个函数式接口，因此可以使用 lambda 表达式来实现异常处理器。\n\n### 工作原理\n\n对于每个未被捕获的非检查型异常，都会调用 `Thread.defaultUncaughtExceptionHandler()`。当\
  \ `UncaughtExceptionHandler()` 处理异常时，意味着没有 `try`/`catch` 块来捕获该异常。因此，异常会沿着线程栈向上冒泡。这是该线程终止前执行的最后一段代码。当异常被线程自身的或默认的\
  \ `UncaughtExceptionHandler()` 捕获时，线程就会终止，该处理器会记录异常信息，以帮助定位异常原因。\n\n在方案 2 中，`UncaughtExceptionHandler()`\
  \ 专门为当前线程设置。当线程抛出未被捕获的异常时，它会向上冒泡到线程中的 `UncaughtExceptionHandler()`。如果该处理器不存在，则会继续冒泡到\
  \ `defaultUncaughtExceptionHandler()`。同样，在这两种情况下，抛出异常的线程都会终止。\n\n提示\n\n在处理多线程时，明确地为线程命名始终是一个好习惯。这能让我们更容易地确定是哪个线程导致了异常，而不必去追踪一个名为\
  \ `Thread-##`（未命名线程的默认命名模式）的未知线程。\n\n## 9.6 使用 try/catch 块管理资源\n\n### 问题\n\n当发生异常时，需要确保\
  \ `try`/`catch` 块中使用的所有资源都被释放。\n\n### 方案\n\n使用自动资源管理（ARM）特性，该特性可以通过 `try`-`with`-`resources`\
  \ 语句来指定。使用该语句时，`try` 子句中指定的任何资源在块终止时都会自动释放。在以下代码中，`FileOutputStream`、`BufferedOutputStream`\
  \ 和 `DataOutputStream` 资源由 `try`-`with`-`resources` 块自动管理。\n\n```\npublic class\
  \ Recipe9_6 {\npublic static void main(String []args) {\nRecipe9_6 recipe = new\
  \ Recipe9_6();\nrecipe.start();\n}\nprivate void start() {\ntry (\nFileOutputStream\
  \ fos = new FileOutputStream(\"out.log\");\nBufferedOutputStream bos = new BufferedOutputStream(fos);\n\
  DataOutputStream dos = new DataOutputStream(bos)\n) {\ndos.writeUTF(\"正在写入内容\");\n\
  } catch (Exception e) {\nSystem.out.println(\"发生了一些糟糕的异常\");\n}\n}\n```\n\n### 工作原理\n\
  \n在大多数情况下，你希望在 `try`/`catch` 块执行完毕后，干净地关闭/释放块内获取的资源。如果程序没有关闭/释放其资源，或者操作不当，资源可能会被无限期占用，从而导致内存泄漏等问题。大多数资源都是有限的（如文件句柄或数据库连接），因此会导致性能下降（并引发更多异常）。为了避免这些情况，Java\
  \ 提供了一种在 `try`/`catch` 块内发生异常时自动释放资源的方法。通过声明一个 `try-with-resources` 块，如果块内抛出异常，则\
  \ `try` 块所检查的资源会被关闭。Java 内置的大多数资源都能在 `try-with-resources` 语句中正常工作（完整列表请参见 `java.lang.AutoCloseable`\
  \ 接口的实现者）。此外，第三方实现者可以通过实现 `AutoCloseable` 接口来创建能与 `try-with-resources` 语句配合使用的资源。\n\
  \n`try-with-resources` 语句的语法包括 `try` 关键字，后跟一个左括号，然后是所有希望在发生异常或块完成时释放的资源声明，最后以右括号结束。如果你尝试声明一个未实现\
  \ `AutoCloseable` 接口的资源/变量，编译器会报错。在右括号之后，`try`/`catch` 块的语法与普通块相同。\n\n`try-with-resources`\
  \ 特性的主要优势在于它允许更干净地释放资源。通常，在获取资源时，存在许多相互依赖关系（例如创建文件处理器，然后包装到输出流中，再包装到缓冲流中）。在异常情况下正确关闭和释放这些资源需要检查每个依赖资源的状态并小心处理，这需要编写大量代码。相比之下，`try-with-resources`\
  \ 结构允许 JVM 即使在异常情况下也能正确地释放资源。\n\n注意\n\n`try-with-resources` 块始终会关闭定义的资源，即使没有抛出任何异常。\n\
  \n## 9.7 创建异常类\n\n### 问题\n\n你想要创建一种新的异常类型，用于指示特定事件。\n\n### 方案 1\n\n创建一个继承 `java.lang.RuntimeException`\
  \ 的类，以创建一个可以随时抛出的异常类。在以下代码中，名为 `IllegalChatServerException` 的类继承了 `RuntimeException`，并在构造函数中接受一个字符串参数。当代码中发生指定事件时，就会抛出该异常。\n\
  \n```\nclass IllegalChatServerException extends RuntimeException {\nIllegalChatServerException(String\
  \ message) {\nsuper(message);\n}\n}\nprivate void disconnectChatServer(Object chatServer)\
  \ {\nif (chatServer == null) throw new IllegalChatServerException(\"聊天服务器为空\");\n\
  }\n```\n\n\n\n### 解决方案 2\n\n创建一个继承自 `java.lang.Exception` 的类，以生成一个受检异常类。受检异常必须在调用栈中被捕获或重新抛出。在以下示例中，一个名为\
  \ `ConnectionUnavailableException` 的类继承了 `java.lang.Exception`，并在构造函数中接受一个字符串作为参数。随后，该受检异常由代码中的一个方法抛出。\n\
  \n```\nclass ConnectionUnavailableException extends Exception {\nConnectionUnavailableException(String\
  \ message) {\nsuper(message);\n}\n}\nprivate void sendChat(String chatMessage) throws\
  \ ConnectionUnavailableException {\nif (chatServer == null)\nthrow new ConnectionUnavailableException(\"\
  Can't find the chat server\");\n}\n```\n\n主方法如下所示。\n\n```\nObject chatServer = null;\n\
  public static void main (String[] args) {\nRecipe9_7 recipe = new Recipe9_7();\n\
  recipe.start();\n}\nprivate void start() {\ntry {\nsendChat(\"Hello, how are you?\"\
  );\n} catch (ConnectionUnavailableException e) {\nSystem.out.println(\"捕获到一个连接不可用异常！\"\
  );\n}\ndisconnectChatServer(chatServer);\n}\n```\n\n### 工作原理\n\n有时需要创建自定义异常，尤其是在创建\
  \ API 时。通常的建议是使用 JDK 提供的现有 `Exception` 类之一。例如，对于 I/O 相关问题使用 `IOException`，对于非法参数使用\
  \ `IllegalArgumentException`。如果没有完全匹配的 JDK 异常，你总是可以继承 `java.lang.Exception` 或 `java.lang.RuntimeException`\
  \ 并实现自己的异常体系。\n\n根据基类的不同，创建 `Exception` 类相当直接。继承 `RuntimeException` 允许你在任何时候抛出生成的异常，而无需在调用栈中捕获它。这样做的好处是\
  \ `RuntimeException` 是一种更宽松的契约，但如果异常未被捕获，抛出此类异常可能导致线程终止。而继承 `Exception` 则强制任何抛出该异常的代码在\
  \ `catch` 子句中处理它。受检异常通过契约强制实现 `catch` 处理器，从而可能避免线程终止。\n\n在实践中，我们不鼓励继承 `RuntimeException`，因为它可能导致糟糕的异常处理。我们的经验法则是：如果可以从异常中恢复，你应该通过继承\
  \ `Exception` 来创建相关的异常类。如果开发者无法合理地从此异常中恢复（例如 `NullPointerException`），则继承 `RuntimeException`。\n\
  \n## 9.8 在应用程序中记录事件\n\n### 问题\n\n你希望在应用程序中记录事件、调试消息、错误条件以及其他事件。\n\n### 解决方案\n\n\
  在你的应用程序中使用 Java 日志 API 来实现日志记录方案。以下示例首先创建了一个名为 `recipeLogger` 的日志记录器对象。在此示例中，Java\
  \ 日志记录器记录了一条信息性消息、一条警告消息和一条错误消息。\n\n```\nprivate void loadLoggingConfiguration()\
  \ {\nFileInputStream ins = null;\ntry {\nins = new FileInputStream(new File(\"logging.properties\"\
  ));\nLogManager.getLogManager().readConfiguration(ins);\n} catch (IOException e)\
  \ {\ne.printStackTrace();\n}\n}\nprivate void start() {\nloadLoggingConfiguration();\n\
  Logger logger = Logger.getLogger(\"recipeLogger\");\nlogger.info(\"首次记录日志！\");\n\
  logger.warn(\"一个需要发出的警告\");\nlogger.severe(\"这是一个错误！\");\n}\npublic static void\
  \ main (String[] args) {\nRecipe9_8 recipe = new Recipe9_8();\nrecipe.start();\n\
  }\n```\n\n以下输出定义在 `logging.properties` 文件中。\n\n```\ndic 02, 2021 10:27:38 PM org.java17recipes.chapter09.recipe09_08.Recipe9_8\
  \ start\nINFO: 首次记录日志！\ndic 02, 2021 10:27:38 PM org.java17recipes.chapter09.recipe09_08.Recipe9_8\
  \ start\nWARNING: 一个需要发出的警告\ndic 02, 2021 10:27:38 PM org.java17recipes.chapter09.recipe09_08.Recipe9_8\
  \ start\nSEVERE: 这是一个错误！\n```\n\n使用 JDK 在 conf 文件夹中的默认属性文件，并将其复制到你的项目文件夹中。\n\n以下是项目主文件夹中的\
  \ `logging.properties` 文件。\n\n```\nhandlers = java.util.logging.FileHandler\nrecipeLogger.level=INFO\n\
  .level=ALL\njava.util.logging.FileHandler.formatter=java.util.logging.SimpleFormatter\n\
  java.util.logging.FileHandler.pattern=LogApplication%g.log\njava.util.logging.FileHandler.limit=50000\n\
  java.util.logging.FileHandler.count=4\n```\n\n### 工作原理\n\n在示例中，`loadLoggingConfiguration()`\
  \ 函数打开一个指向 `logging.properties` 文件的流，并将其传递给 `java.util.logging.LogManager()`。这样做可以配置\
  \ `java.util.logging` 框架，使其使用 `logging.properties` 文件中指定的设置。然后，在解决方案的 start 方法中，代码获取一个名为\
  \ `recipeLogger` 的 `logger` 对象。该示例继续通过 `recipeLogger` 记录消息。\n\n注意\n\n`java.util.logging`\
  \ 框架由属性日志文件配置。\n\n## 9.9 日志轮转与清理\n\n### 问题\n\n你已经开始记录日志信息，但记录的信息持续增长，失去控制。你希望只保留日志文件中最后\
  \ 250 KB 的日志条目。\n\n### 解决方案\n\n使用 `java.util.logging` 配置滚动日志。在此示例中，一个名为 `recipeLogger`\
  \ 的日志记录器记录了许多消息。输出会生成滚动的日志文件，最新的日志信息保存在重要的 `Log0.log` 文件中。\n\n```\npublic static\
  \ void main (String[] args) throws IOException {\nRecipe9_9 recipe = new Recipe9_9();\n\
  recipe.start();\n}\nprivate void start() {\nloadLoggingConfiguration();\nLogger\
  \ logger = LoggerFactory.getLogger(\"recipeLogger\");\nlogger.info(\"首次记录日志！\");\n\
  logger.warn(\"一个需要发出的警告\");\nlogger.severe(\"这是一个错误！\");\nLogger rollingLogger =\
  \ Logger.getLogger(\"rollingLogger\");\nfor (int i =0;i < 5000;i++) {\nrollingLogger.info(\"\
  记录事件，编号为：\"+i);\n}\n}\nprivate void loadLoggingConfiguration() {\nFileInputStream\
  \ ins = null;\ntry {\nins = new FileInputStream(new File(\"logging.properties\"\
  ));\nLogManager.getLogManager().readConfiguration(ins);\n} catch (IOException e)\
  \ {\ne.printStackTrace();\n}\n}\n```\n\n以下是项目主文件夹中的 `logging.properties` 文件。\n\n\
  ```\nhandlers = java.util.logging.FileHandler\nrecipeLogger.level=INFO\n.level=ALL\n\
  java.util.logging.FileHandler.formatter=java.util.logging.SimpleFormatter\njava.util.logging.FileHandler.pattern=LogApplication%g.log\n\
  java.util.logging.FileHandler.limit=50000\njava.util.logging.FileHandler.count=4\n\
  ```\n\n\n\n### 工作原理\n\n要控制日志文件的大小，可配置 `java.util.logging` 框架并指定滚动日志文件。选择滚动日志文件选项后，最新信息将保存在\
  \ `LogApplication0.log` 中。较早的信息则依次保存在 `LogApplication1.log`、`LogApplication2.log`\
  \ 等文件中。当 `LogApplication0.log` 填满您指定的上限（本例中为 50,000 字节）时，其文件名将轮转为 `LogApplicationLog1.log`，其他文件也会相应向下轮转。要保留的日志文件数量由\
  \ `java.util.logging.FileHandler.count` 属性决定，在本示例中该属性设置为 `4`。用于区分轮转日志的 `FileHandler`\
  \ 配置参数是 `\"%g\"`（一个代际编号）。如果在属性文件中未指定该参数，且计数大于 1（本例中为 4），则代际编号会附加在文件名末尾（点号之后）。\n\n\
  `logging.properties` 文件首先定义了 `java.util.logging` 框架使用的处理器。处理器是负责处理日志消息的对象。本示例中指定了\
  \ `FileHandler`，它将日志消息写入文件。接下来定义了日志级别。在日志框架中，存在独立的 `logger` 对象这一概念。一个日志记录器可以携带不同的配置（例如不同的日志级别），并在日志文件中被标识。该示例将\
  \ `recipeLogger` 的级别设置为 `info`。相比之下，根 `logger` 的级别为 `ALL`（在 `java.util.logging`\
  \ 框架中，根日志记录器通过属性前无前缀来表示）。另一方面，`OFF` 则禁用日志记录。\n\n`logging.properties` 文件的下一部分定义了\
  \ `FileHandler` 的配置。格式化器指示日志信息如何写入磁盘。`simpleFormatter` 以纯文本形式写入信息，包含一行日期和时间、一行日志级别以及要记录的消息。在格式化器之后，定义了\
  \ `FileHandler` 的模式。这指定了日志文件的名称和位置（`%g` 会被替换为滚动日志编号 [0 ~ 3]）。`Limit` 属性定义了日志在轮转前可以拥有的字节数（50,000\
  \ 字节 ~ 50kb）。`count` 定义了要保留的日志文件的最大索引（在本示例中为 4）。\n\n## 9.10 记录异常\n\n在之前的示例中，您学习了如何捕获异常并记录信息。本示例将这两者结合起来。\n\
  \n### 问题\n\n您希望在日志文件中记录异常。\n\n### 解决方案\n\n配置您的应用程序以使用 SLF4J。利用 `try`/`catch` 块在错误日志中记录异常。在以下示例中，一个\
  \ SLF4J 日志记录器从异常处理器内部记录消息。\n\n```\npublic static void main (String [] args) {\n\
  Recipe9_10 recipe = new Recipe9_10();\nrecipe.start();\n}\nstatic Logger rootLogger\
  \ = Logger.getLogger(\"\");\nprivate void start() {\nloadLoggingConfiguration();\n\
  Thread.setDefaultUncaughtExceptionHandler((Thread t, Throwable e) -> {\nrootLogger.error(\"\
  Error in thread \"+t+\" caused by \"+e);\n});\nint c = 20/0;\n}\nprivate void loadLoggingConfiguration()\
  \ {\nFileInputStream ins = null;\ntry {\nins = new FileInputStream(new File(\"logging.properties\"\
  ));\nLogManager.getLogManager().readConfiguration(ins);\n} catch (IOException e)\
  \ {\ne.printStackTrace();\n}\n}\n```\n\n### 工作原理\n\n该示例演示了如何使用 `UncaughtExceptionHandler`\
  \ 将异常记录到日志文件中。记录异常时，最好包含显示异常抛出位置的堆栈跟踪。在示例中，一个线程包含 `UncaughtExceptionHandler`，它使用了一个包含日志记录器的\
  \ lambda 表达式。该日志记录器将所有捕获到的异常写入日志文件。\n\n## 9.11 总结\n\n本章探讨了应用程序开发中最重要的阶段之一——异常处理。讨论了如何处理单个和多个异常，以及如何记录这些异常。\n\
  \n"
- '# 10. 并发


  *并发*是程序同时执行不同（或相同）指令的能力。一个并发程序可以被拆分并在多个 CPU 上运行。通过编写并发程序，您可以充分利用当今的多核 CPU。即使在 I/O
  密集型的单核 CPU 上，您也能看到其好处。并发是现代计算机编程中最难处理的主题之一；理解并发需要具备抽象思考的能力，而调试并发问题就像试图通过航位推测法驾驶飞机一样困难。即便如此，随着
  Java 的现代版本发布，编写无错误的并发代码已经变得更容易（也更普及）。


  本章介绍了并发任务最常见的需求——从运行后台任务到将计算拆分为工作单元。在本章中，您将找到在 Java 中实现并发的最新方法。


  ## 10.1 启动后台任务


  ### 问题


  您有一个需要在主线程之外运行的任务。


  ### 解决方案


  创建一个包含需要在不同线程中运行的任务的类实现。在任务实现类中实现一个 `Runnable` 函数式接口，并启动一个新线程。在以下示例中，一个计数器模拟活动，同时一个独立的任务在后台运行。


  ```

  public class Recipe10_1 {

  public static void main(String[] args) {

  Recipe10_1 recipe = new Recipe10_1();

  recipe.startProcess();

  }

  private void startProcess() {

  Thread backgroundThread = new Thread(new Runnable() {

  public void run() {

  doSomethingInBackground();

  }

  },"Background Thread");

  System.out.println("Start");

  backgroundThread.start();

  for (int i= 0;i < 10;i++) {

  System.out.println(Thread.currentThread().getName()+": is counting "+i);

  }

  System.out.println("Done");

  }

  private void doSomethingInBackground() {

  System.out.println(Thread.currentThread().getName()+

  ": is Running in the background");

  }

  }

  ```


  如果代码被执行多次，输出结果会因时而异。后台线程独立执行，因此其消息在每次运行时的打印顺序都不同。


  如果您使用 lambda 表达式，创建后台线程的相同代码可以编写如下。


  ```

  Thread backgroundThread = new Thread(this::doSomethingInBackground, "Background
  Thread");

  ```


  以下是输出结果。


  ```

  Start

  main: is counting 0

  main: is counting 1

  main: is counting 2

  main: is counting 3

  main: is counting 4

  main: is counting 5

  main: is counting 6

  main: is counting 7

  main: is counting 8

  main: is counting 9

  Done

  Background Thread: is Running in the background

  ```




  ### 工作原理


  `Thread` 类允许在与当前线程不同的新线程（执行路径）中执行代码。`Thread` 构造函数需要一个实现了 `Runnable` 接口的类作为参数。`Runnable`
  接口只需要实现一个方法：`public void run()`。因此，它是一个函数式接口，这便于使用 lambda 表达式。当调用 `Thread.start()`
  方法时，它会创建一个新线程，并调用 `Runnable` 接口中的 `run()` 方法。


  JVM 中有两种类型的线程：用户线程和守护线程。用户线程会一直执行，直到其 `run()` 方法完成，而守护线程在应用程序需要退出时可以被终止。如果 JVM 中只有守护线程在运行，应用程序就会退出。当你开始创建多线程应用程序时，必须了解这些区别，并理解何时使用每种类型的线程。


  通常，守护线程的 `Runnable` 接口不会完成；例如，一个 `while (true)` 循环。这使得这些线程能够在程序整个生命周期内定期检查或执行某个条件，并在程序执行完毕时被丢弃。如果你的程序没有按预期关闭和/或退出，你可能需要检查正在活跃运行的线程。要将线程设置为守护线程，请在调用
  `thread.start()` 方法之前使用 `thread.setDaemon(true)`。


  ## 10.2 更新（和迭代）Map


  ### 问题


  你需要从多个线程更新一个 `Map<K,V>` 对象，并且希望确保更新不会破坏 `Map` 对象的内容，且 `Map` 对象始终处于一致状态。你还希望在其他线程更新
  `Map` 对象的同时，遍历（查看）`Map` 对象的内容。


  ### 解决方案


  使用 `ConcurrentMap<K,V>` 来更新 map 条目。以下示例创建了 1000 个线程。然后每个线程同时尝试修改 map。主线程等待一秒钟，然后开始迭代
  map（即使其他线程仍在修改 map）。


  ```

