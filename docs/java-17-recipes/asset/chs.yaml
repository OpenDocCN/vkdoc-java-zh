  \ IDE 的情况下开发 Java EE Web 应用程序，但使用开发环境可以使这项任务变得非常简单。在本节中，Eclipse EE IDE 负责配置 Web\
  \ 应用程序。\n\n13.6 创建 Servlet\n\n问题\n您想为 Web 应用程序项目创建一个控制器。\n\n解决方案\n通过“文件” ➤ “新建”\
  \ ➤ “Servlet”创建一个 Java Servlet。在 `org.java17recipes.chapter13` 包中定义 `FirstServlet`（按照惯例，类和\
  \ servlet 名称首字母大写）。检查 servlet 中的 `init` 和 `destroy` 方法非常重要。\n\n以下显示了新创建的 servlet\
  \ 的 Java 代码。\n\n```\npackage org.java17recipes.chapter13;\nimport java.io.IOException;\n\
  import jakarta.servlet.ServletConfig;\nimport jakarta.servlet.ServletException;\n\
  import jakarta.servlet.annotation.WebServlet;\nimport jakarta.servlet.http.HttpServlet;\n\
  import jakarta.servlet.http.HttpServletRequest;\nimport jakarta.servlet.http.HttpServletResponse;\n\
  /**\n* Servlet implementation class FirstServlet\n*/\npublic class FirstServlet\
  \ extends HttpServlet {\nprivate static final long serialVersionUID = 1L;\n/**\n\
  * Default constructor.\n*/\npublic FirstServlet() {\n// TODO Auto-generated constructor\
  \ stub\n}\n/**\n* @see Servlet#init(ServletConfig)\n*/\npublic void init(ServletConfig\
  \ config) throws ServletException {\n// TODO Auto-generated method stub\n}\n/**\n\
  * @see Servlet#destroy()\n*/\npublic void destroy() {\n// TODO Auto-generated method\
  \ stub\n}\n/**\n* @see HttpServlet#doGet(HttpServletRequest request, HttpServletResponse\
  \ response)\n*/\nprotected void doGet(HttpServletRequest request, HttpServletResponse\
  \ response) throws ServletException, IOException {\n// TODO Auto-generated method\
  \ stub\nresponse.getWriter().append(\"Served at: \").append(request.getContextPath());\n\
  }\n/**\n* @see HttpServlet#doPost(HttpServletRequest request, HttpServletResponse\
  \ response)\n*/\nprotected void doPost(HttpServletRequest request, HttpServletResponse\
  \ response) throws ServletException, IOException {\n// TODO Auto-generated method\
  \ stub\ndoGet(request, response);\n}\n}\n```\n\n输出如图 13-15 所示，您可以在其中看到粗体行。\n\n![](img/323910_4_En_13_Fig15_HTML.jpg)\n\
  \n图 13-15\n第一个 servlet 的浏览器输出\n\n注意\n\n如果您曾使用过 javax.* 包，它已重命名为 jakarta.* 包。如果您针对的是\
  \ Servlet API 5.0 或更新版本（Tomcat 10 中使用的 Jakarta EE 9 的一部分），则需要替换包才能使其编译。否则，您可能会遇到“在\
  \ Java 构建路径上未找到超类“javax.servlet.http.HttpServlet””的错误。\n\n工作原理\nServlet 是 Java 类，它们在\
  \ *servlet* *容器*（例如，Tomcat、TomEE 9、WildFly、GlassFish）中运行，并作为标准 Web 资源公开。这些类处理来自\
  \ HTML 表单的数据，并处理一个或多个客户端的请求和响应。最新版本是 2020 年发布的 Jakarta Servlet 5.0。Servlet 对应于 MVC\
  \ 架构中的控制器，并实现了许多复杂的功能。我们可以使用单个 servlet 来处理不同的行为，或者为每个行为使用多个 servlet。\n简而言之，客户端向（Web\
  \ 应用程序服务器中的）servlet 发送请求。Servlet 被实例化（仅第一次），启动一个线程来处理通信，并构建转发给客户端的响应。如果 servlet\
  \ 已加载，它会创建一个与新客户端关联的附加线程。Servlet 内部通常没有算法代码，而是委托给其他类。请求和响应由 `jakarta.Servlet.http.HttpServletRequest`（从客户端环境获取信息）和\
  \ `jakarta.Servlet.http.HttpServletResponse`（向客户端发送响应）接口管理。另一个组件（`jakarta.Servlet.ServletContext`）用于查找应用程序上下文的引用。\n\
  \nServlet 具有一个生命周期，其特征如下元素和方法。\n\n*   Servlet 的初始化（`init()` 方法），仅由 servlet 引擎在第一次调用\n\
  *   对 POST 请求的响应（`doPost(HttpServletRequestrequest req`, `HttpServletResponseresponse\
  \ res)` 方法）\n*   对 GET 请求的响应（`doGet(HttpServletRequestrequest req, HttpServletResponseresponse\
  \ res)` 方法）\n*   Servlet 上下文的销毁（`destroy()` 方法）\n\n让我们创建一个单一的 servlet，根据来自数据输入表单的参数实现不同的行为。这些操作是方法调用（`doGet`\
  \ 方法或 `doPost` 方法）的结果。\n\n\n\n必须使用部署描述符来调用不同的 Web 应用程序对象（监听器、Servlet 和过滤器）。部署描述符即\
  \ `web.xml` 文件。\n在本例中，其内容如下。\n\n```\n\nFirstServlet\nFirstServlet\norg.java17recipes.chapter13.FirstServlet\n\
  \nFirstServlet\n/FirstServlet\n\n```\n\n加粗的 `<url-pattern>`\n标签是在浏览器中显示的字符串。\n有关\
  \ Jakarta Servlet 5.0 的更多信息，请参阅其规范文档\n[`https://jakarta.ee/specifications/servlet/5.0/`](https://jakarta.ee/specifications/servlet/5.0/)。\n\
  \n13.7 使用\nServlet 表示值\n\n问题\n你想使用 Servlet 和 JSP 来处理 Web 应用程序中表单的数据。\n\n解决方案\n创建一个包含表单的\
  \ JSP 页面。转到 文件 ➤ 新建 ➤ JSP 文件。\n将文件命名为 `formExample.jsp`。\n\n清单 13-10 是 Java\n代码。\n\
  \n```\n\n表单示例\n\n名：\n\n姓：\n\n清单 13-10\nJava 代码\n```\n\n这里有两个表单，分别通过两种方法（POST 和 GET）、两个\n\
  不同的输入字段以及两个提交按钮来区分。\n\nJSP 的输出如图 13-16 所示。\n\n![](img/323910_4_En_13_Fig16_HTML.jpg)\n\
  \n图 13-16\n输出表单\n\n以下是 `FirstServlet.java`\n代码。\n\n```\nprotected void doGet(HttpServletRequest\
  \ request, HttpServletResponse response) throws ServletException, IOException {\n\
  // TODO Auto-generated method stub\nSystem.out.println(\"GET\");\nString lastname\
  \ = request.getParameter(\"lastname\");\nSystem.out.println(\"lastname (GET):\"\
  +lastname);\nPrintWriter out = response.getWriter();\njava.util.Date today = new\
  \ java.util.Date();\nout.println(\"\" + today  +\n\" GET parameter: \" + lastname\
  \ + \"\");\nresponse.getWriter().append(\"Served at: \").append(request.getContextPath());\n\
  }\nprotected void doPost(HttpServletRequest request, HttpServletResponse response)\
  \ throws ServletException, IOException {\n// TODO Auto-generated method stub\n//doGet(request,\
  \ response);\nSystem.out.println(\"POST\");\nString firstname = request.getParameter(\"\
  firstname\");\nSystem.out.println(\"firstname (POST):\"+firstname);\nPrintWriter\
  \ out = response.getWriter();\njava.util.Date today = new java.util.Date();\nout.println(\"\
  \" + today +\n\" POST parameter: \" + firstname+ \"\");\n}\n```\n\n如果你点击 **GET SUBMIT**\
  \ 按钮，它会向 Servlet 发送一个 GET 消息，\n你将在浏览器中得到如图 13-17 所示的结果。\n\n![](img/323910_4_En_13_Fig17_HTML.jpg)\n\
  \n图 13-17\n输出 GET\n\n点击 **POST SUBMIT** 按钮，它会向 Servlet 发送一个 POST 消息，\n在浏览器中得到如图\
  \ 13-18 所示的结果。\n\n![](img/323910_4_En_13_Fig18_HTML.jpg)\n\n图 13-18\n输出 POST\n\n\
  工作原理\n该 Servlet 使用两个方法：`doGet` 和 `doPost`，它们管理来自请求（`HttpServletRequest`）的消息，\n并使用\
  \ `request.getParameter(\"firstname\")`\n方法。如果你想查看 Servlet 成功处理的数据，只需使用 `System.out.println`\n\
  命令，它允许你在 Eclipse 控制台上查看数据。在下面的示例中，还使用了 `response.getWriter()`\n方法在浏览器上显示发送的参数。\n\
  \n13.8 总结\n在本章中，你学习了如何安装 Java、Tomcat，并检查它们是否正常工作。然后，你学习了如何安装 Eclipse EE\nIDE，配置它以使用最新版本的\
  \ Java 和 Tomcat，并从零开始创建 JSP 和 Servlet。你学习了如何使用 JSP 来\n显示 HTTP 请求参数，以及如何使用 Servlet\
  \ 来管理 POST 和 GET 请求。\n\n14. 电子邮件\n\n电子邮件通知是当今企业系统不可或缺的一部分。Java 通过提供 JavaMail API\
  \ 来实现电子邮件通知功能。使用此\nAPI，你可以响应事件（例如，已完成的表单或\n已完成的脚本）发送电子邮件\n通信。你还可以使用 JavaMail API\
  \ 来检查 IMAP\n或 POP3 邮箱。\n要学习本章中的技巧，请确保你已\n设置好防火墙以允许电子邮件通信。大多数情况下，\n防火墙允许向电子邮件服务器进行出站通信而不会出现问题。但是，如果你正在运行自己的本地\
  \ SMTP（电子邮件）服务器，\n你可能需要配置防火墙以允许电子邮件服务器正常运行。\n\n14.1 安装\nJavaMail\n\n问题\n你想安装 JavaMail，以便你的\n\
  应用程序在发送电子邮件通知时使用。\n\n解决方案\n从 Oracle 的 JavaMail 网站下载 JavaMail。你需要的下载地址\n在 [`https://javaee.github.io/javamail/`](https://javaee.github.io/javamail/)。\n\
  下载后，解压缩并将 `JavaMail.jar` 文件添加为\n项目的依赖项。你还需要从 [`https://eclipse-ee4j.github.io/jaf/`](https://eclipse-ee4j.github.io/jaf/)\n\
  下载 JavaBeans 激活框架\n作为项目的依赖项：它被 [JavaMail](https://javaee.github.io/javamail) 用于数据处理。\n\
  它允许你确定数据类型、将数据作为流或对象访问、识别数据的 MIME 类型，并实例化\n适当的 bean 来执行所需和必需的操作。\n\n工作原理\n通过下载并添加依赖项，你可以访问强大的\n\
  电子邮件 API，该 API 允许你发送和接收电子邮件。\n\n14.2 发送\n电子邮件\n\n问题\n你的应用程序需要发送一封电子邮件。\n\n解决方案\n\
  \n使用 `Transport()`\n方法，你可以向\n特定收件人发送电子邮件。在此解决方案中，构建一封电子邮件消息并通过 `smtp.somewhere.com`\n\
  服务器发送。\n\n```\nprivate void start() {\nProperties properties = new Properties();\n\
  properties.put(\"mail.smtp.host\", \"smtp.somewhere.com\");\nproperties.put(\"mail.smtp.auth\"\
  , \"true\");\nproperties.put(\"mail.smtp.port\", \"465\");\nproperties.put(\"mail.smtp.ssl.enable\"\
  , \"true\")\nSession session = Session.getInstance(properties, new javax.mail.Authenticator()\
  \ {\nprotected PasswordAuthentication getPasswordAuthentication() {\nreturn new\
  \ PasswordAuthentication(\"username\", \"password\");\n}\n});\nsession.setDebug(true);\n\
  Message message = new MimeMessage(session);\ntry {\nmessage.setFrom(new InternetAddress(\"\
  someone@somewhere.com\"));\nmessage.setRecipient(Message.RecipientType.TO, new InternetAddress(\"\
  someone@somewhere.com\"));\nmessage.setSubject(\"Subject\");\nmessage.setContent(\"\
  This is a test message\", \"text/plain\");\nTransport.send(message);\n} catch (MessagingException\
  \ e) {\ne.printStackTrace();\n}\n}\nmain 方法是：\npublic static void main(String[]\
  \ args) {\nRecipe14_2 recipe = new Recipe14_2();\nrecipe.start();\n}\n```\n\n在接下来的示例中，我使用了\
  \ `smtp.gmail.com` 以及一个 Gmail 用户名和密码。\n\n\n\n工作原理\n要使用 JavaMail API，首先需要创建一个 `Properties`\
  \ 对象，该对象作为标准的 `Map` 对象（实际上，它继承自 `Map`）。你可以设置 JavaMail 服务可能需要的各种属性。主机名通过 `mail.smtp.host`\
  \ 属性设置，如果主机需要身份验证，则必须将 `mail.smtp.auth` 属性设置为 true。对于邮件提交代理，端口号为 465。若要在连接建立时协商\
  \ TLS/SSL，请将 SSL 属性设置为 true。配置好属性对象后，获取一个 `javax.mail.Session` 来保存电子邮件的连接信息。\n创建会话时，如果服务需要身份验证，你可以指定登录信息。这在连接到局域网外部的\
  \ SMTP 服务时可能是必需的。要指定登录信息，必须创建一个 `Authenticator` 对象，其中包含 `getPasswordAuthentication()`\
  \ 方法。通过让 `getPasswordAuthentication()` 方法返回一个 `PasswordAuthentication` 对象，你可以指定用于\
  \ SMTP 服务的用户名/密码。你可以使用 `Session.setDebug(true)` 来调试 SMTP 问题。\n`Message` 对象（`javax.mail`\
  \ 包）代表一封实际的电子邮件，并公开了诸如发件人/收件人/主题和内容等电子邮件属性。设置这些属性后，调用 `Transport.send()` 静态方法来发送电子邮件。\n\
  \n14.3 向电子邮件附加文件\n\n问题\n你需要向电子邮件中附加一个或多个文件。\n\n解决方案\n\n创建包含不同部分的消息（称为*多部分消息*）允许你发送附件，例如文件和图像。你可以指定电子邮件正文和附件。包含不同部分的消息称为多用途互联网邮件扩展（MIME）消息。它们在\
  \ `javax.mail API` 中由 `MimeMessage` 类表示。以下代码创建了这样一条消息。\n\n```\npublic static void\
  \ main(String[] args) {\nRecipe14_3 recipe = new Recipe14_3();\nrecipe.start();\n\
  }\nprivate void start() {\nString host = \"smtp.somewhere.com\";\nString username\
  \ = \"username\";\nString password = \"password\";\nString from = \"someone@somewhere.com\"\
  ;\nString to = \"anotherone@somewhere.com\";\nProperties properties = new Properties();\n\
  properties.put(\"mail.smtp.host\", host);\nproperties.put(\"mail.smtp.port\", \"\
  465\");\nproperties.put(\"mail.smtp.ssl.enable\", \"true\");\nproperties.put(\"\
  mail.smtp.auth\", \"true\");\nSession session = Session.getInstance(properties,\
  \ new javax.mail.Authenticator() {\nprotected PasswordAuthentication getPasswordAuthentication()\
  \ {\nreturn new PasswordAuthentication(username, password);\n}\n});\nsession.setDebug(true);\n\
  try {\nMessage message = new MimeMessage(session);\nmessage.setFrom(new InternetAddress(from));\n\
  message.setRecipient(Message.RecipientType.TO, new InternetAddress(to));\nmessage.setSubject(\"\
  Subject\");\n// 创建 Mime \"消息\" 部分\nMimeBodyPart messageBodyPart = new MimeBodyPart();\n\
  messageBodyPart.setContent(\"This is a test message\", \"text/plain\");\n// 创建 Mime\
  \ \"文件\" 部分\nMimeBodyPart fileBodyPart = new MimeBodyPart();\nfileBodyPart.attachFile(System.getProperty(\"\
  user.dir\")+ File.separator + \"attach.txt\");\nMimeBodyPart fileBodyPart2 = new\
  \ MimeBodyPart();\nfileBodyPart2.attachFile(System.getProperty(\"user.dir\")+ File.separator\
  \ + \"attach2.txt\");\n// 将各个正文部分组合在一起\nMultipart multipart = new MimeMultipart();\n\
  multipart.addBodyPart(messageBodyPart);\nmultipart.addBodyPart(fileBodyPart);\n\
  // 添加另一个正文部分以提供另一个附件\nmultipart.addBodyPart(fileBodyPart2);\n// 将消息的内容设置为 MultiPart\n\
  message.setContent(multipart);\nTransport.send(message);\nSystem.out.println(\"\
  Sent message successfully....\");\n} catch (MessagingException | IOException e)\
  \ {\ne.printStackTrace();\n}\n}\n```\n\n工作原理\n在 JavaMail API 中，你可以创建一封 MIME 电子邮件。这种类型的消息允许包含不同的正文部分。在示例中，生成了一个纯文本正文部分（包含电子邮件显示的文本），然后创建了两个包含你要发送的附件的附件正文部分。根据附件的类型，Java\
  \ API 会自动为附件正文部分选择合适的编码。\n创建每个正文部分后，通过创建一个 `MultiPart` 对象并添加每个部分（纯文本和附件）来将它们组合在一起。一旦\
  \ `MultiPart` 对象组装完毕并包含所有部分，它就被分配给 `MimeMessage` 的内容并发送（如配方 14-2 所示）。\n\n14.4 发送\
  \ HTML 电子邮件\n\n问题\n你想要发送一封包含 HTML 内容的电子邮件。\n\n解决方案\n\n你将电子邮件的内容类型指定为 `text`/`html`，并发送一个\
  \ HTML 字符串作为消息正文。在以下示例中，使用 HTML 内容构建一封电子邮件，然后发送。\n\n```\npublic static void main(String[]\
  \ args) {\nRecipe14_4 recipe = new Recipe14_4();\nrecipe.start();\n}\nprivate void\
  \ start() {\nString host = \"smtp.gmail.com\";\nString username = \"mymailusername\"\
  ;\nString password = \"mygmailpassword\";\nString from = \"mygmailusername@gmail.com\"\
  ;\nString to = \"someuser@somewhere.com\";\nProperties properties = new Properties();\n\
  properties.put(\"mail.smtp.host\", host);\nproperties.put(\"mail.smtp.port\", \"\
  465\");\nproperties.put(\"mail.smtp.auth\", \"true\");\nproperties.put(\"mail.smtp.ssl.enable\"\
  , \"true\");\nSession session = Session.getInstance(properties, new javax.mail.Authenticator()\
  \ {\nprotected PasswordAuthentication getPasswordAuthentication() {\nreturn new\
  \ PasswordAuthentication(username, password);\n}\n});\nsession.setDebug(true);\n\
  try {\nMimeMessage message = new MimeMessage(session);\nmessage.setFrom(new InternetAddress(from));\n\
  message.setRecipient(Message.RecipientType.TO, new InternetAddress(to));\nmessage.setSubject(\"\
  Subject Test\");\n// 创建 Mime 内容\nMimeBodyPart messageBodyPart = new MimeBodyPart();\n\
  String html = \"Important Message\" +\n\"This is an important message...\"+\n\"\"\
  \ +\n\"Be sure to code your Java today!\" +\n\"It is the right thing to do!\";\n\
  messageBodyPart.setContent(html, \"text/html; charset=utf-8\");\nMimeBodyPart fileBodyPart\
  \ = new MimeBodyPart();\nfileBodyPart.attachFile(\"/path-to/attach.txt\");\nMimeBodyPart\
  \ fileBodyPart2 = new MimeBodyPart();\nfileBodyPart2.attachFile(\"/path-to/attach2.txt\"\
  );\nMultipart multipart = new MimeMultipart();\nmultipart.addBodyPart(messageBodyPart);\n\
  multipart.addBodyPart(fileBodyPart);\n// 添加另一个正文部分以提供另一个附件\nmultipart.addBodyPart(fileBodyPart2);\n\
  message.setContent(multipart);\nTransport.send(message);\n} catch (MessagingException\
  \ | IOException e) {\ne.printStackTrace();\n}\n}\n```\n\n工作原理\n发送包含 HTML 内容的电子邮件与发送标准文本的电子邮件几乎相同——唯一的区别在于内容类型。在电子邮件的消息正文部分，将内容设置为\
  \ text/HTML，以便将其视为 HTML。构建 HTML 内容有多种方式，包括链接、图片或任何其他有效的 HTML 标记。本示例中将几个基本的 HTML\
  \ 标签嵌入到一个字符串中。\n尽管示例代码在实际系统中可能不太有用，但生成动态 HTML 内容以包含在电子邮件中很容易。在最基本的形式中，动态生成的 HTML\
  \ 可以是拼接起来形成 HTML 的文本字符串。\n\n14.5 向一组收件人发送电子邮件\n\n问题\n你想要向多个收件人发送同一封电子邮件。\n\n解决方案\n\
  \n使用 JavaMail API 中的 `setRecipients()` 方法向多个收件人发送电子邮件。`setRecipients()` 方法允许你一次指定多个收件人。以下是一个示例。\n\
  \n\n\n```\npublic static void main(String[] args) {\nRecipe14_5 recipe = new Recipe14_5();\n\
  recipe.start();\n}\nprivate void start() {\nList emails = getEmails();\nString host\
  \ = \"smtp.gmail.com\";\nString username = \"mymailusername\";\nString password\
  \ = \"mygmailpassword\";\nString from = \"mygmailusername@gmail.com\";\nProperties\
  \ properties = new Properties();\nproperties.put(\"mail.smtp.host\", host);\nproperties.put(\"\
  mail.smtp.port\", \"465\");\nproperties.put(\"mail.smtp.auth\", \"true\");\nproperties.put(\"\
  mail.smtp.ssl.enable\", \"true\");\nSession session = Session.getInstance(properties,\
  \ new javax.mail.Authenticator() {\nprotected PasswordAuthentication getPasswordAuthentication()\
  \ {\nreturn new PasswordAuthentication(username, password);\n}\n});\nsession.setDebug(true);\n\
  try {\nMimeMessage message = new MimeMessage(session);\nmessage.setFrom(new InternetAddress(from));\n\
  message.setRecipients(Message.RecipientType.BCC, getRecipients(emails));\nmessage.setSubject(\"\
  Subject\");\nmessage.setContent(\"This is a test message\", \"text/plain\");\nTransport.send(message);\n\
  } catch (MessagingException e) {\ne.printStackTrace();\n}\n}\nprivate Address[]\
  \ getRecipients(List emails) throws AddressException {\nAddress[] addresses = new\
  \ Address[emails.size()];\nfor (int i =0;i  getEmails() {\nArrayList emails = new\
  \ ArrayList();\nemails.add(\"jack@hill.com\");\nemails.add(\"jill@hill.com\");\n\
  emails.add(\"water@hill.com\");\nreturn emails;\n}\n```\n\n工作原理\n通过使用 `Message`\
  \ 对象的 `setRecipients()` 方法，可以在同一封邮件中指定多个收件人。`setRecipients()` 方法接受一个 `Address` 对象数组。在本方案中，由于你有一个字符串集合，因此需要创建一个与该集合大小相同的数组，并用\
  \ `InternetAddress` 对象填充该数组。使用多个电子邮件地址发送邮件（与单独发送邮件相比）效率更高，因为从你的客户端到目标邮件服务器只发送了一封邮件。然后，每个目标邮件服务器会将邮件投递到其拥有邮箱的所有收件人。例如，如果你要发送给五个不同的\
  \ Yahoo.com 账户，Yahoo.com 邮件服务器只需接收一份邮件副本，然后将其投递给邮件中指定的所有 `yahoo.com` 收件人。\n\n提示\n\
  \n如果你想要发送批量邮件，建议将收件人类型指定为 BCC（密送），这样收件人收到的邮件中不会显示其他收件人。为此，请在 `setRecipients()` 方法中指定\
  \ `Message.RecipientType.BCC`。\n\n14.6 检查电子邮件\n\n问题\n你需要检查指定电子邮件账户是否有新邮件到达。\n\n\
  解决方案\n你可以使用 `javax.mail.Store` 来连接、查询和检索来自互联网消息访问协议（IMAP）电子邮件账户的邮件。例如，以下代码连接到一个\
  \ IMAP 账户，检索该账户中的最后五封邮件，并将这些邮件标记为“已读”。\n\n```\npublic static void main(String[]\
  \ args) {\nRecipe14_6 recipe = new Recipe14_6();\nrecipe.start();\n}\nprivate void\
  \ start() {\nString username = \"username\";\nString password = \"password\";\n\
  String folder = \"Inbox\";\nString host = \"imap.host.com\";\nProperties properties\
  \ = new Properties();\nproperties.put(\"mail.imap.host\", host);\nproperties.put(\"\
  mail.imap.ssl.enable\", \"true\");\nproperties.put(\"mail.imap.auth\", \"true\"\
  );\ntry {\nSession session = Session.getInstance(properties, new javax.mail.Authenticator()\
  \ {\nprotected PasswordAuthentication getPasswordAuthentication() {\nreturn new\
  \ PasswordAuthentication(username, password);\n}\n});\nsession.setDebug(true);\n\
  Store store = session.getStore(\"imap\");\nstore.connect(host,username,password);\n\
  System.out.println(store);\nFolder inbox = store.getFolder(folder);\ninbox.open(Folder.READ_WRITE);\n\
  int messageCount = inbox.getMessageCount();\nint startMessage = messageCount - 10;\n\
  if (startMessage< 1) startMessage =1;\nMessage messages[]  = inbox.getMessages(startMessage,\
  \ messageCount);\nfor (Message message : messages) {\nboolean hasBeenRead = false;\n\
  for (Flags.Flag flag : message.getFlags().getSystemFlags()) {\nif (flag == Flags.Flag.SEEN)\
  \ {\nhasBeenRead = true;\nbreak;\n}\n}\nmessage.setFlag(Flags.Flag.SEEN, false);\n\
  System.out.println(message.getSubject() + \" \"+ (hasBeenRead? \"(read)\" : \"\"\
  ) + message.getContent());\n}\ninbox.close(true);\n} catch (MessagingException |\
  \ IOException e) {\ne.printStackTrace();\n}\n}\n```\n\n工作原理\n`Store` 对象允许你访问电子邮件邮箱信息。通过创建一个\
  \ `Store` 对象，然后请求 Inbox（收件箱）文件夹，你就可以访问 IMAP 账户主邮箱中的邮件。利用文件夹对象，你可以使用 `getMessages(start,\
  \ end)` 方法请求下载收件箱中的邮件。收件箱还提供了一个 `getMessageCount()` 方法，用于了解收件箱中有多少封邮件。请注意，邮件的索引从\
  \ 1 开始。\n每封邮件都有一组标志，可以指示邮件是否已被阅读（`Flags.Flag.SEEN`）或是否已被回复（`Flags.Flag.ANSWERED`）。通过解析\
  \ `SEEN` 标志，你可以处理之前未读的邮件。\n要将邮件标记为已读（或已回复），请调用 `message.setFlag()` 方法。此方法允许你设置（或重置）邮件标志。如果你要设置邮件标志，需要以\
  \ `READ_WRITE`（读写）模式打开文件夹，以便更改邮件标志。你还需要在代码末尾调用 `inbox.close(true)`，以告知 JavaMail\
  \ API 将更改刷新到 IMAP 存储中。\n\n14.7 总结\n电子邮件在我们今天使用的许多系统中都扮演着重要角色。Java 语言包含了 JavaMail\
  \ API，使开发人员能够在其 Java 应用程序中包含强大的电子邮件功能。本章中的方案涵盖了从安装到高级用法的 JavaMail API。\n\n15. JSON\
  \ 与 XML 处理\n\nJSON 是用于两台或多台机器之间通信的最广泛使用的媒体格式之一。其全称是 JavaScript Object Notation（JavaScript\
  \ 对象表示法）。只需包含 JSON 库（该库已包含在 Java EE 中），就可以非常轻松地处理 JSON 数据。XML API 一直对 Java 开发人员可用，通常作为第三方库提供，可以添加到运行时类路径中。你将遇到的最基本的\
  \ XML 处理任务只涉及少数几个用例：编写和读取 XML 文档、验证这些文档，以及使用 JAXB 来辅助 Java 对象的编组/解组。\n本章提供了执行 XML\
  \ 和 JSON 任务的方案。JSON 方案需要包含 JSON API，这可以通过向 Maven 应用程序添加依赖项来完成。在本章中，你将学习如何创建 JSON、将其写入磁盘以及执行解析。\n\
  \n15.1 编写 XML 文件\n\n问题\n你想要创建一个 XML 文档来存储应用程序数据。\n\n\n\n解决方案\n要编写 XML 文档，请使用 `javax.xml.stream.XMLStreamWriter`\
  \ 接口。以下代码遍历 `Patient` 对象数组，并将数据写入 `.xml` 文件。要使用此 Java 类，你需要 JAXB 库，它提供了一种高效且标准的方式来实现\
  \ XML 与 Java 代码之间的映射。访问 [`https://eclipse-ee4j.github.io/jaxb-ri/`](https://eclipse-ee4j.github.io/jaxb-ri/)，下载\
  \ `jakarta.xml.bind-api.jar` 3.0.0 库，并将其复制到你的 `lib` 项目文件夹或服务器中。\n\n此示例代码来自 `org.java17recipes.chapter15.recipe15_1.DocWriter`\
  \ 示例。\n\n```\nimport javax.xml.stream.XMLOutputFactory;\nimport javax.xml.stream.XMLStreamException;\n\
  import javax.xml.stream.XMLStreamWriter;\n...\npublic void run(String outputFile)\
  \ throws FileNotFoundException, XMLStreamException,\nIOException {\nList patients\
  \ = new ArrayList();\nPatient p1 = new Patient();\nPatient p2 = new Patient();\n\
  Patient p3 = new Patient();\np1.setId(BigInteger.valueOf(1));\np1.setName(\"John\
  \ Smith\");\np1.setDiagnosis(\"Common Cold\");\np2.setId(BigInteger.valueOf(2));\n\
  p2.setName(\"Jane Doe\");\np2.setDiagnosis(\"Broken Ankle\");\np3.setId(BigInteger.valueOf(3));\n\
  p3.setName(\"Jack Brown\");\np3.setDiagnosis(\"Food Allergy\");\npatients.add(p1);\n\
  patients.add(p2);\npatients.add(p3);\nXMLOutputFactory factory = XMLOutputFactory.newFactory();\n\
  try (FileOutputStream fos = new FileOutputStream(outputFile)) {\nXMLStreamWriter\
  \ writer = factory.createXMLStreamWriter(fos, \"UTF-8\");\nwriter.writeStartDocument();\n\
  writer.writeCharacters(\"\\n\");\nwriter.writeStartElement(\"patients\");\nwriter.writeCharacters(\"\
  \\n\");\nfor (Patient p : patients) {\nwriter.writeCharacters(\"\\t\");\nwriter.writeStartElement(\"\
  patient\");\nwriter.writeAttribute(\"id\", String.valueOf(p.getId()));\nwriter.writeCharacters(\"\
  \\n\\t\\t\");\nwriter.writeStartElement(\"name\");\nwriter.writeCharacters(p.getName());\n\
  writer.writeEndElement();\nwriter.writeCharacters(\"\\n\\t\\t\");\nwriter.writeStartElement(\"\
  diagnosis\");\nwriter.writeCharacters(p.getDiagnosis());\nwriter.writeEndElement();\n\
  writer.writeCharacters(\"\\n\\t\");\nwriter.writeEndElement();\nwriter.writeCharacters(\"\
  \\n\");\n}\nwriter.writeEndElement();\nwriter.writeEndDocument();\nwriter.close();\n\
  }\n}\npublic static void main(String[] args) {\nString fileName = null;\nif (args.length\
  \ != 1) {\nSystem.out.printf(\"Usage: java org.java17recipes.chapter15.recipe15_01.DocWriter\
  \ \\n\");\nfileName = \"patients.xml\";\n} else {\nfileName = args[0];\n}\nDocWriter\
  \ app = new DocWriter();\ntry {\napp.run(fileName);\n} catch (FileNotFoundException|XMLStreamException\
  \ ex) {\nLogger.getLogger(DocWriter.class.getName()).log(Level.SEVERE, null, ex);\n\
  } catch (IOException ex) {\nLogger.getLogger(DocWriter.class.getName()).log(Level.SEVERE,\
  \ null, ex);\n}\n}\nPatient 类的代码如下：\nimport jakarta.xml.bind.annotation.*;\npublic\
  \ class Patient {\n@XmlElement(required = true)\nprotected String name;\n@XmlElement(required\
  \ = true)\nprotected String diagnosis;\n@XmlAttribute(name = \"id\", required =\
  \ true)\nprotected BigInteger id;\npublic String getName() {\nreturn name;\n}\n\
  public void setName(String value) {\nthis.name = value;\n}\npublic String getDiagnosis()\
