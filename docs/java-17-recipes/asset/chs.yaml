  ### 工作原理


  数据库由组织化的数据构成，即数据本身以及提供数据结构的模式。如今，大多数数据库都组织成由行和列组成的表。这是一种自然的数据组织方式，你可能通过使用电子表格对此已有所了解。你可以独立于将要存储的实际数据来定义表的特性。字段是表中的一个独立数据项，对应于行与列的交集。可以将一个或多个列指定为唯一键，用于标识每条记录。为此，你可以使用前面提到的某一列，或者使用名字、姓氏和出生日期的组合。优先于其他键使用的唯一键称为表的主键。


  数据库管理系统（DBMS），例如 MySQL，是一个软件包，它允许你创建、读取、更新和删除（CRUD）数据项以及模式元素。


  因此，在谈论数据库时，你需要区分三个方面。


  *   它所包含的数据。

  *   你为高效执行 CRUD 操作而施加于数据之上的结构。

  *   允许你操作数据本身和数据库结构的软件（即 DBMS）。


  使用数据库意味着你正在与其 DBMS 进行交互。你可以通过命令行界面（CLI）、DBMS 供应商和第三方提供的图形用户界面（GUI），或者通过 API 以编程方式来实现。


  DBMS 可以为每个键构建一个*索引*，以便更快地检索数据。这会减慢行的插入和删除（即新记录）速度，因为 DBMS 需要花费时间来更新索引。大多数数据库被查询的频率高于被修改的频率。因此，定义索引通常是值得的，至少那些能够加速最常见查询的索引是如此。


  结构化查询语言（SQL）是与 DBMS 交互时使用最广泛的语言。大多数 DBMS 并不支持完整的 SQL 标准。此外，供应商有时会添加非标准元素，这实际上阻碍了不同
  DBMS 之间的完全可移植性。总的来说，无论我们谈论的是数据库组织、表结构还是实际数据，你都需要执行四种 CRUD 操作。相应的 SQL 语句以标识操作的关键字开头（例如，INSERT、SELECT、UPDATE
  或 DELETE），必要时后跟指定操作针对何种实体类型的关键字（例如，DATABASE、TABLE 或 INDEX），以及附加元素。你使用 SELECT 语句来检索信息。


  你可以使用 CREATE 语句创建数据库、表和索引，使用 ALTER 语句更新它们，使用 DROP 语句删除它们。类似地，你可以使用 CREATE 和 DROP
  创建和删除视图，但一旦创建了视图，就无法更新它们。你使用 INSERT 在表中创建新行，使用 DELETE 删除它们。UPDATE 语句允许你修改整行或行中的一个或多个字段。


  用于修改结构的语句统称为数据定义语言（DDL）。用于修改内容的语句称为数据操作语言（DML）。


  在许多应用程序中，数据库、表、索引和视图的结构一旦初始定义后便保持不变。因此，在你的应用程序中，你通常只需要操作行和字段的语句。无论如何，你肯定需要 SELECT
  语句，它用于查询数据库的结构及其包含的数据。最后，为了完整列出开发应用程序时可能需要的语句，还有 START TRANSACTION、COMMIT 和 ROLLBACK，这些语句用于处理事务。


  当你想要检索、更新或删除行时，必须标识它们。你可以使用 WHERE 关键字后跟`<where_condition>`来实现。


  在本章的示例中，我们选择使用*MySQL*作为 DBMS，首先是因为它是免费提供的，其次是因为它是免费 DBMS 中使用最广泛的一个。因此，它已被证明能够在各种环境中可靠运行。不过，最终你可以开发能够与其他传统关系型数据库管理系统（RDBMS）配合使用的
  Java 应用程序，例如 Oracle Database 或 PostgreSQL。


  ## 12.2 连接数据库


  ### 问题


  你希望从桌面 Java 应用程序中连接到数据库。




  ### 解决方案


  使用 JDBC 的 `Connection` 对象来获取连接。具体做法是创建一个新的连接对象，然后加载特定数据库供应商所需的驱动程序。连接对象准备就绪后，调用其
  `getConnection()` 方法。以下代码演示了如何获取与 MySQL 数据库的连接：通常，连接取决于指定的驱动程序。


  ```

  package org.java17recipes.chapter12.recipe12_02;

  import java.sql.Connection;

  import java.sql.DriverManager;

  import java.sql.SQLException;

  import java.util.Properties;

  public class CreateConnection {

  static Properties props = new Properties();

  String hostname = "localhost";

  String port = "3306";

  String database = "apressbooks";

  String username = "root";

  String password = "root";

  public Connection getConnection() throws SQLException {

  Connection conn = null;

  String jdbcUrl;

  jdbcUrl = "jdbc:mysql://" + this.hostname + ":" +

  this.port  + "/" + this.database;

  System.out.println(jdbcUrl);

  conn = DriverManager.getConnection(jdbcUrl, this.username, this.password);

  System.out.println("Successfully connected");

  return conn;

  }

  public static void main(String[] args) {

  CreateConnection createConnection = new CreateConnection();

  try {

  createConnection.getConnection();

  } catch (SQLException e){

  e.printStackTrace();

  }

  }

  }

  ```


  此示例中展示的方法返回一个 `Connection` 对象，该对象已准备好用于数据库访问。


  ### 工作原理


  创建 JDBC 连接涉及几个步骤。首先，你需要确定需要哪个数据库驱动程序。确定所需驱动程序后，下载包含该驱动程序的 JAR 文件并将其放入类路径中。每个数据库供应商都提供不同的
  JDBC 驱动程序，这些驱动程序打包在名称各异的 JAR 文件中；请查阅数据库文档以获取更多信息。对于本方案，你可以从 [`https://dev.mysql.com/downloads/connector/j/`](https://dev.mysql.com/downloads/connector/j/)
  下载连接器。确保所选平台为“平台无关”：这对于在不同系统上分发软件非常重要。接下来，使用 JDBC 的 `DriverManager` 类来获取与数据库的连接。


  要使用 `DriverManager` 类获取与数据库的连接，你需要向其传递一个包含 JDBC URL 的字符串。JDBC URL 由数据库供应商名称、托管数据库的服务器名称、数据库名称、数据库端口号以及有权访问你要使用的模式或数据库对象的有效数据库用户名和密码组成。创建
  JDBC URL 的值通常从 `Properties` 文件中获取，以便在需要时可以轻松更改。为解决方案 1 创建 MySQL 数据库 JDBC URL 的代码如下所示。


  ```

  String jdbcUrl = "jdbc:mysql:thin:@" + this.hostname + ":" +

  this.port  + ":" + this.database;

  ```


  将所有变量替换到字符串中后，它看起来如下所示。


  ```

  jdbc:mysql://localhost:3306/apressbooks

  ```


  创建 JDBC URL 后，可以将其传递给 `DriverManager.getConnection()` 方法以获取 `java.sql.Connection`
  对象。如果传递给 `getConnection()` 方法的信息不正确，则会抛出 `java.sql.SQLException`；否则，将返回一个有效的 `Connection`
  对象。


  ## 12.3 处理连接和 SQL 异常


  ### 问题


  应用程序中的数据库活动引发了异常。你需要处理 SQL 异常，以免应用程序崩溃。


  ### 解决方案


  使用 `try-catch` 块来捕获并处理 JDBC 连接或 SQL 查询抛出的任何 SQL 异常。以下代码演示了如何实现 `try-catch` 块来捕获
  SQL 异常。


  ```

  try {

  // 执行数据库任务

  } catch (java.sql.SQLException){

  // 执行异常处理

  }

  ```


  ### 工作原理


  标准的 `try-catch` 块可以捕获 `java.sql.SQLException` 异常。如果这些异常未被处理，你的代码将无法编译。妥善处理这些异常是一个好主意，以防止在抛出此类异常时应用程序崩溃。几乎任何针对
  `java.sql.Connection` 对象执行的工作都需要包含错误处理，以确保正确处理数据库异常。通常需要嵌套的 `try-catch` 块来处理所有可能的异常。你需要确保在完成工作且不再使用
  `Connection` 对象后关闭连接。同样，关闭 `java.sql.Statement` 对象以清理内存分配也是一个好主意。


  由于 `Statement` 和 `Connection` 对象需要关闭，因此通常会看到 `try-catch-finally` 块确保所有资源都按需得到处理。你可能会看到类似以下风格的旧版
  JDBC 代码。


  ```

  try {

  // 执行数据库任务

  } catch (java.sql.SQLException ex) {

  // 执行异常处理

  } finally {

  try {

  // 关闭 Connection 和 Statement 对象

  } catch (java.sql.SQLException ex){

  // 执行异常处理

  }

  }

  ```


  较新的代码应利用 `try-with-resources` 语句编写，该语句允许将资源管理委托给 Java，而不是手动关闭。以下代码演示了如何使用 `try-with-resources`
  打开连接、创建语句，然后在完成后关闭连接和语句。


  ```

  try (Connection conn = createConn.getConnection();

  Statement stmt = conn.createStatement();) {

  ResultSet rs = stmt.executeQuery(qry);

  while (rs.next()) {

  // 执行一些工作

  }

  } catch (SQLException e) {

  e.printStackTrace();

  }

  ```


  如前面的伪代码所示，通常需要嵌套的 `try-catch` 块来清理未使用的资源。正确的异常处理有时会使 JDBC 代码编写起来相当繁琐，但它也能确保需要数据库访问的应用程序不会失败，从而导致数据丢失。


  ## 12.4 查询数据库并检索结果


  ### 问题


  应用程序中的某个进程需要查询数据库表中的数据。


  ### 解决方案


  获取 JDBC 连接，然后使用 `java.sql.Connection` 对象创建一个 `Statement` 对象。`java.sql.Statement`
  对象包含 `executeQuery()` 方法，该方法解析文本字符串并使用它来查询数据库。执行查询后，你可以在 `ResultSet` 对象中检索结果。以下示例查询名为
  `RECIPES` 的数据库表并打印结果。


  ```

  public class QueryDatabase {

  private static CreateConnection createConn;

  public static void main(String[] args) {

  createConn = new CreateConnection();

  queryDatabase();

  }

  public static void queryDatabase() {

  String qry = "select recipe_num, recipe_name, description from recipes";

  try (Connection conn = createConn.getConnection();

  Statement stmt = conn.createStatement();) {

  ResultSet rs = stmt.executeQuery(qry);

  while (rs.next()) {

  String recipe = rs.getString("RECIPE_NUM");

  String name = rs.getString("RECIPE_NAME");

  String desc = rs.getString("DESCRIPTION");

  System.out.println(recipe + "\t" + name + "\t" + desc);

  }

  } catch (SQLException e) {

  e.printStackTrace();

  }

  }

  }

  ```


  如果你使用第 12 章附带的数据库脚本执行此代码，你将收到以下结果。


  ```

  12-1 安装 MySQL 下载并安装 MySQL 数据库

  12-2 连接到数据库 DriverManager 和 DataSource 实现

  12-3 处理 SQL 异常 使用 SQLException

  12-4 查询数据库并检索结果 从 DBMS 获取和使用数据

  ```




  ### 工作原理


  对数据库执行的最常见操作之一就是查询。使用 JDBC 执行数据库查询相当简单，尽管每次执行查询时都需要使用一些样板代码。首先，你需要为要查询的数据库和模式获取一个
  `Connection` 对象。接下来，你需要构建一个查询并将其存储为字符串格式。然后，`Connection` 对象会创建一个 `Statement` 对象。你的查询字符串被传递给
  `Statement` 对象的 `executeQuery()` 方法来查询数据库。下面展示了在不使用 `try-with-resources` 进行资源管理时的代码样式。


  ```

  String qry = "select recipe_num, recipe_name, description from recipes";

  Connection conn;

  Statement stmt = null;

  try {

  conn = createConn.getConnection()

  stmt = conn.createStatement();

  ResultSet rs = stmt.executeQuery(qry);

  ...

  ```


  同样的代码可以更高效地编写如下。


  ```

  try (Connection conn = createConn.getConnection();

  Statement stmt = conn.createStatement();) {

  ResultSet rs = stmt.executeQuery(qry);

  ...

  ```


  如你所见，`Statement` 对象的 `executeQuery()` 方法接受一个字符串并返回一个 `ResultSet` 对象。`ResultSet`
  对象使得处理查询结果、以任意顺序获取所需信息变得容易。如果你查看示例中的下一行代码，会在 `ResultSet` 对象上创建一个 `while` 循环。这个循环持续调用
  `ResultSet` 对象的 `next()` 方法，每次迭代获取查询返回的下一行数据。在这个例子中，`ResultSet` 对象被命名为 `rs`。因此，只要
  `rs.next()` 返回 true，循环就会继续处理。一旦所有返回的行都被处理完毕，`rs.next()` 返回 false，表示没有更多行需要处理了。


  在 `while` 循环内部，每一行返回的数据都会被处理。每次遍历时，都会解析 `ResultSet` 对象以获取指定列名的值。请注意，如果预期列返回的是字符串，你必须调用
  `ResultSet getString()` 方法，并以字符串格式传递列名。类似地，如果预期列返回的是整数，你需要调用 `ResultSet getInt()`
  方法，并以字符串格式传递列名。其他数据类型也是如此。这些方法返回相应的列值。在本节解决方案的示例中，这些值被存储到局部变量中。


  ```

  String recipe = rs.getString("RECIPE_NUM");

  String name = rs.getString("RECIPE_NAME");

  String desc = rs.getString("DESCRIPTION");

  ```


  一旦获取了列值，你就可以对存储在局部变量中的值进行任何操作。在这个例子中，它们通过 `System.out()` 方法被打印出来。


  ```

  System.out.println(recipe + "\t" + name + "\t" + desc);

  ```


  尝试查询数据库时可能会抛出 `java.sql.SQLException`（例如，如果 `Connection` 对象没有正确获取，或者你试图查询的数据库表不存在）。你必须提供异常处理来处理这些情况下的错误。因此，所有数据库处理代码都应放在
  `try` 块内。然后 `catch` 块处理 `SQLException`；因此，如果抛出异常，将使用 `catch` 块中的代码进行处理。听起来很简单，对吧？确实如此，但每次执行数据库查询时都必须这样做——这会产生大量样板代码。


  如果语句和连接处于打开状态，关闭它们总是一个好主意。使用 `try-with-resources` 结构是资源管理最高效的解决方案。完成后关闭资源有助于确保系统能够根据需要重新分配资源，并对数据库保持尊重。尽快关闭连接非常重要，以便其他进程可以使用它们。


  ## 12.5 执行 CRUD 操作


  ### 问题


  你需要在应用程序中具备执行标准数据库操作的能力。也就是说，你需要能够对数据库记录进行 CRUD 操作。


  ### 解决方案


  创建一个 `Connection` 对象并获取数据库连接，然后使用从 `java.sql.Connection` 对象获得的 `java.sql.Statement`
  对象执行 CRUD 操作。用于这些操作的数据库表格式如下。


  ```

  RECIPES (

  id              int not null,

  recipe_number   varchar(10) not null,

  recipe_name     varchar(100) not null,

  description     varchar(500),

  constraint recipes_pk primary key (id) enable

  );

  ```


  以下代码片段演示了如何使用 JDBC 执行每个 CRUD 操作。


  ```

  import java.sql.Connection;

  import java.sql.ResultSet;

  import java.sql.SQLException;

  import java.sql.Statement;

  import org.java17recipes.chapter12.recipe12_01.CreateConnection;

  public class CrudOperations {

  static CreateConnection createConn;

  public static void main(String[] args) {

  createConn = new CreateConnection();

  performCreate();

  performRead();

  performUpdate();

  performDelete();

  System.out.println("-- 最终状态 --");

  performRead();

  }

  private static void performCreate(){

  String sql = "INSERT INTO RECIPES VALUES(" +

  "NULL, " +

  "''12-5'', " +

  "''Performing CRUD Operations'', " +

  "''How to perform create, read, update, delete functions'')";

  try (Connection conn = createConn.getConnection();

  Statement stmt = conn.createStatement();) {

  // 返回行数，如果不成功则返回 0

  int result = stmt.executeUpdate(sql);

  if (result == 1{

  System.out.println("-- 记录已创建 --");

  } else {

  System.err.println("!! 记录未创建 !!");

  }

  } catch (SQLException e) {

  e.printStackTrace();

  }

  }

  private static void performRead(){

  String qry = "select recipe_number, recipe_name, description from recipes";

  try (Connection conn = createConn.getConnection();

  Statement stmt = conn.createStatement();) {

  ResultSet rs = stmt.executeQuery(qry);

  while (rs.next()) {

  String recipe = rs.getString("RECIPE_NUMBER");

  String name = rs.getString("RECIPE_NAME");

  String desc = rs.getString("DESCRIPTION");

  System.out.println(recipe + "\t" + name + "\t" + desc);

  }

  } catch (SQLException e) {

  e.printStackTrace();

  }

  }

  private static void performUpdate(){

  String sql = "UPDATE RECIPES " +

  "SET RECIPE_NUMBER = ''12-5'' " +

  "WHERE RECIPE_NUMBER = ''12-4''";

  try (Connection conn = createConn.getConnection();

  Statement stmt = conn.createStatement();) {

  int result = stmt.executeUpdate(sql);

  if (result  == 1){

  System.out.println("-- 记录已更新 --");

  } else {

  System.out.println("!! 记录未更新 !!");

  }

  } catch (SQLException e) {

  e.printStackTrace();

  }

  }

  private static void performDelete(){

  String sql = "DELETE FROM RECIPES WHERE RECIPE_NUMBER = ''12-5''";

  try (Connection conn = createConn.getConnection();

  Statement stmt = conn.createStatement();) {

  int result = stmt.executeUpdate(sql);

  if (result > 0){

  System.out.println("-- 记录已删除 --");

  } else {

  System.out.println("!! 记录未删除 !!");

  }

  } catch (SQLException e) {

  e.printStackTrace();

  }

  }

  }

  ```


  以下是运行代码的结果。


  ```

  -- 记录已创建 –

  12-1 Installing MySQL 下载并安装 MySQL 数据库

  12-2 Connecting to a Database DriverManager 和 DataSource 实现

  12-3 Handling SQL Exceptions 使用 SQLException

  12-4 Querying a Database and Retrieving Results 从 DBMS 获取和使用数据

  12-5 Performing CRUD Operations 如何执行创建、读取、更新、删除功能

  -- 记录已更新 --

  -- 记录已删除 –

  -- 最终状态 --

  12-1 Installing MySQL  下载并安装 MySQL 数据库

  12-2 Connecting to a Database DriverManager 和 DataSource 实现

  12-3 Handling SQL Exceptions 使用 SQLException

  ```




  ### 工作原理


  执行几乎所有数据库任务都使用相同的基本代码格式。格式如下：


  1.  获取数据库连接。

  2.  从连接创建语句对象。

  3.  使用语句对象执行数据库任务。

  4.  处理数据库任务的结果。

  5.  关闭语句对象（如果不再使用，也关闭数据库连接）。


  使用 JDBC 执行查询与执行 DML 的主要区别在于，根据要执行的操作，需要在 `Statement` 对象上调用不同的方法。要执行查询，需要调用 `Statement`
  对象的 `executeQuery()` 方法。要执行插入、更新和删除等 DML 任务，则调用 `executeUpdate()` 方法。


  本方案中的 `performCreate()` 方法演示了如何向数据库插入一条记录。要向数据库插入记录，需要以字符串形式构建一条 SQL `INSERT` 语句。要执行插入操作，请将
  SQL 字符串传递给 `Statement` 对象的 `executeUpdate()` 方法。如果 `INSERT` 执行成功，将返回一个 int 值，指定已插入的行数。如果
  `INSERT` 操作未成功执行，则返回零，或者抛出 `SQLException`，表明语句或数据库连接存在问题。


  本方案中的 `performRead()` 方法演示了如何查询数据库。要执行查询，请调用 `Statement` 对象的 `executeQuery()` 方法，并以字符串形式传递一条
  SQL 语句。结果是一个 `ResultSet` 对象，可用于处理返回的数据。有关执行查询的更多信息，请参见方案 12-4。


  本方案中的 `performUpdate()` 方法演示了如何更新数据库表中的记录。首先，以字符串形式构建一条 SQL `UPDATE` 语句。然后，要执行更新操作，请将
  SQL 字符串传递给 `Statement` 对象的 `executeUpdate()` 方法。如果 `UPDATE` 成功执行，将返回一个 int 值，指定已更新的记录数。如果
  `UPDATE` 操作未成功执行，则返回零，或者抛出 `SQLException`，表明语句或数据库连接存在问题。


  最后一个需要介绍的数据库操作是 `DELETE` 操作。本方案中的 `performDelete()` 方法演示了如何从数据库中删除记录。首先，以字符串形式构建一条
  SQL `DELETE` 语句。然后，要执行删除操作，请将 SQL 字符串传递给 `Statement` 对象的 `executeUpdate()` 方法。如果删除成功，将返回一个
  int 值，指定已删除的行数。否则，如果删除失败，则返回零，或者抛出 `SQLException`，表明语句或数据库连接存在问题。


  几乎每个数据库应用程序在某个时候都会至少使用一种 CRUD 操作。这是在 Java 应用程序中处理数据库时需要了解的基础 JDBC 知识。即使你不直接使用 JDBC
  API，了解这些基础知识也是有益的。


  ## 12.6 简化连接管理


  ### 问题


  你的应用程序需要使用数据库，并且每次交互都需要打开一个连接。你希望使用一个单一的类来执行此任务，而不是每次需要访问数据库时都编写打开数据库连接的逻辑。


  ### 解决方案


  编写一个类来处理应用程序中的所有连接管理。这样做允许你调用该类来获取连接，而不是每次需要访问数据库时都设置一个新的 `Connection` 对象。请执行以下步骤为你的
  JDBC 应用程序设置连接管理环境。


  1.  创建一个名为 `CreateConnection.java` 的类，该类封装了应用程序的连接逻辑。

  2.  创建一个 `Properties` 文件来存储你的连接信息。将该文件放在类路径上的某个位置，以便 `CreateConnection` 类可以加载它。

  3.  使用 `CreateConnection` 类获取你的数据库连接。


  以下 `CreateConnection` 类的代码可用于集中式连接管理。


  ```

  import java.io.File;

  import java.io.IOException;

  import java.io.InputStream;

  import java.nio.file.FileSystems;

  import java.nio.file.Files;

  import java.sql.Connection;

  import java.sql.DriverManager;

  import java.sql.SQLException;

  import java.util.Properties;

  public class CreateConnection {

  static Properties props = new Properties();

  String hostname = null;

  String port = null;

  String database = null;

  String username = null;

  String password = null;

  public CreateConnection(){

  try (InputStream in = Files.newInputStream(FileSystems.getDefault().

  getPath(System.getProperty("user.dir") +

  File.separator + "db_props.properties")); ) {

  props.load(in);

  in.close();

  } catch (IOException ex) {

  ex.printStackTrace();

  }

  loadProperties();

  }

  public final void loadProperties(){

  this.hostname = props.getProperty("host_name");

  port = props.getProperty("port_number");

  database = props.getProperty("db_name");

  username = props.getProperty("username");

  password = props.getProperty("password");

  }

  public Connection getConnection() throws SQLException {

  Connection conn = null;

  String jdbcUrl;

  jdbcUrl = "jdbc:mysql://" + this.hostname + ":" +

  this.port  + "/" + this.database;

  System.out.println(jdbcUrl);

  conn = DriverManager.getConnection(jdbcUrl, this.username, this.password);

  System.out.println("Successfully connected");

  return conn;

  }

  public static void main(String[] args) {

  CreateConnection createConnection = new CreateConnection();

  try {

  Connection conn = createConnection.getConnection();

  if (conn != null) {

  System.out.println("Closing Connection...");

  conn.close();

  }

  } catch (SQLException e){

  e.printStackTrace();

  }

  }

  }

  ```


  以下是输出结果。


  ```

  jdbc:mysql://localhost:3306/apressbooks

  Successfully connected

  Closing Connection...

  ```


  接下来，以下文本行是用于获取数据库连接的属性文件内容的示例。在此示例中，属性文件名为 `db_props.properties`。


  ```

  host_name=your_db_server_name

  db_name=your_db_name

  username=db_username

  password=db_username_password

  port_number=db_port_number

  ```


  最后，使用 `CreateConnection` 类为你的应用程序获取连接。以下代码演示了这一概念。


  ```

  CreateConnection createConn = new CreateConnection();

  try(Connection conn = createConn.getConnection()) {

  performDbTask();

  } catch (java.sql.SQLException ex) {

  ex.printStackTrace();

  }

  ```


  此代码使用了 `try-with-resources` 语句，以便在执行数据库任务后自动关闭连接。




  ### 工作原理


  在数据库应用程序中获取连接可能涉及大量代码。此外，如果每次获取连接时都重新输入代码，这个过程很容易出错。通过将数据库连接逻辑封装在单个类中，你可以在需要连接数据库时复用相同的连接代码。这能提高你的工作效率，减少输入错误的机会，并增强可维护性。如果需要进行更改，只需在一个地方修改，而不是在多个不同位置。


  创建一种策略性的连接方法对你以及未来可能需要维护你代码的其他人都有好处。虽然在使用应用服务器时，数据源是管理数据库连接的首选技术，但本解决方案演示了如何使用标准
  JDBC `DriverManager` 连接。使用 `DriverManager` 的一个安全问题是，你需要将数据库凭据存储在某个地方供应用程序使用。以纯文本形式存储这些凭据在任何地方都不安全，将其嵌入应用程序代码中也不安全，因为代码将来可能会被反编译。如解决方案所示，一个属性文件在磁盘上存储了数据库凭据。假设该属性文件在部署到服务器之前的某个时刻已被加密，并且应用程序能够处理解密。


  如解决方案所示，代码从属性文件中读取数据库凭据、主机名、数据库名称和端口号。然后将这些信息拼接起来，形成一个 JDBC URL，`DriverManager`
  可以使用该 URL 获取与数据库的连接。一旦获取到连接，就可以在任何地方使用它，然后关闭。


  你可以开发一个 JDBC 应用程序，使得获取连接所需的代码在整个程序中硬编码。相反，本解决方案将所有获取连接的代码封装在单个类中，这样开发人员就不必为此担心。这种技术还使代码更易于维护。例如，如果应用程序最初使用
  `DriverManager` 部署，但后来具备了使用 `DataSource` 的能力，那么只需更改很少的代码。


  ## 12.7 防范 SQL 注入


  ### 问题


  你的应用程序执行数据库任务。为了降低 SQL 注入攻击的风险，你需要确保没有未经过滤的文本字符串被附加到 SQL 语句中并针对数据库执行。


  提示


  虽然预编译语句是本解决方案的核心，但它们的用途不仅限于防范 SQL 注入。它们还提供了一种集中化并更好地控制应用程序中使用的 SQL 的方法。例如，与其创建同一查询的多个可能不同的版本，不如将查询创建为预编译语句一次，然后在代码中的许多不同位置调用它。对查询逻辑的任何更改只需在准备该语句时进行。


  ### 解决方案


  使用 `PreparedStatement` 对象来执行数据库任务。它们向 DBMS 发送预编译的 SQL 语句，而不是字符串。以下代码演示了如何使用 `java.sql.PreparedStatement`
  对象执行数据库查询和数据库更新。


  在以下代码示例中，`PreparedStatement` 查询数据库中给定的记录。假设一个包含配方编号的 `String[]` 数组作为变量传递给此代码。


  ```

  private static void queryDbRecipe(String[] recipeNumbers) {

  String sql = "SELECT ID, RECIPE_NUMBER, RECIPE_NAME, DESCRIPTION "

  + "FROM RECIPES "

  + "WHERE RECIPE_NUMBER = ?";

  try (PreparedStatement pstmt = conn.prepareStatement(sql)) {

  for (String recipeNumber : recipeNumbers) {

  pstmt.setString(1, recipeNumber);

  ResultSet rs = pstmt.executeQuery();

  while (rs.next()) {

  System.out.println(rs.getString(2) + ": " + rs.getString(3)

  + " - " + rs.getString(4));

  }

  }

  } catch (SQLException ex) {

  ex.printStackTrace();

  }

  }

  ```


  下一个示例演示了一个向数据库插入记录的 `PreparedStatement` 对象。假设配方编号、标题和描述作为变量传递给此代码。`ID` 列被声明为 NOT
  NULL 和 AUTO-INCREMENT，因此也可以为该列分配 NULL 以生成序列号。


  ```

  private static void insertRecord(String recipeNumber,

  String title,

  String description) {

  String sql = "INSERT INTO RECIPES VALUES(" +

  "null, ?,?,?)";

  try(PreparedStatement pstmt = conn.prepareStatement(sql);) {

  pstmt.setString(1, recipeNumber);

  pstmt.setString(2, title);

  pstmt.setString(3, description);

  pstmt.executeUpdate();

  System.out.println("Record successfully inserted.");

  } catch (SQLException ex){

  ex.printStackTrace();

  }

  }

  ```


  在最后一个示例中，一个 `PreparedStatement` 对象从数据库中删除一条记录。同样，假设 `recipeNumber` 字符串作为变量传递给此代码。


  ```

  private static void deleteRecord(String recipeNumber) {

  String sql = "DELETE FROM RECIPES WHERE " +

  "RECIPE_NUMBER = ?";

  try(PreparedStatement pstmt = conn.prepareStatement(sql);) {

  pstmt.setString(1, recipeNumber);

  pstmt.executeUpdate();

  System.out.println("Recipe " + recipeNumber + " successfully deleted.");

  } catch (SQLException ex){

  ex.printStackTrace();

  }

  }

  main 方法如下：

  public static void main(String[] args) {

  try {

  CreateConnection createConn = new CreateConnection();

  conn = createConn.getConnection();

  String[] recipeArr = new String[1];

  recipeArr[0] ="12-1";

  queryDbRecipe(recipeArr);

  insertRecord(

  "12-6",

  "Simplifying and Adding Security with Prepared Statements",

  "Working with Prepared Statements");

  recipeArr[0] ="12-6";

  queryDbRecipe(recipeArr);

  deleteRecord("12-6");

  } catch (java.sql.SQLException ex) {

  System.out.println(ex);

  } finally {

  if (conn != null) {

  try {

  conn.close();

  } catch (SQLException ex) {

  ex.printStackTrace();

  }

  }

  }

  }

  ```


  以下是输出结果。


  ```

  12-1: Installing MySQL - Downloading and installation of a MySQL Database

  Record successfully inserted.

  12-6: Simplifying and Adding Security with Prepared Statements - Working with Prepared
  Statements

  Recipe 12-6 successfully deleted.

  ```


  如你所见，`PreparedStatement` 对象与标准的 JDBC 语句对象非常相似，但它向 DBMS 发送的是预编译的 SQL，而不是文本字符串。




  ### 工作原理


  虽然标准的 JDBC 语句能够完成任务，但残酷的现实是，它们有时可能不安全且使用起来很繁琐。例如，如果动态 SQL 语句查询数据库，就可能发生糟糕的情况。用户输入的字符串被赋值给一个变量，并与预期的
  SQL 字符串拼接在一起。在大多数普通情况下，用户输入的字符串会被拼接，SQL 字符串会按预期查询数据库。然而，攻击者可能会决定在字符串中放置恶意代码（即 SQL
  注入），然后这些代码会通过标准的 `Statement` 对象被无意中发送到数据库。


  使用 `PreparedStatement` 可以防止此类恶意字符串被拼接到 SQL 字符串中并传递给 DBMS，因为它们采用了不同的方法。`PreparedStatement`
  使用替换变量而非拼接来使 SQL 字符串动态化。它们还会被预编译，这意味着在 SQL 发送到 DBMS 之前，会先形成一个有效的 SQL 字符串。此外，`PreparedStatement`
  可以帮助你的应用程序获得更好的性能，因为如果相同的 SQL 需要运行多次，它只需编译一次。之后，替换变量可以互换，但整个 SQL 可以被 `PreparedStatement`
  非常快速地执行。


  让我们看看 `PreparedStatement` 对象在实际中是如何工作的。如果你查看本方案解决方案中的第一个示例，可以看到正在查询数据库表 `RECIPES`，传入一个
  `RECIPE_NUMBER` 并检索匹配记录的结果。SQL 字符串如下所示。


  ```

  String sql = "SELECT ID, RECIPE_NUMBER, RECIPE_NAME, DESCRIPTION " +

  "FROM RECIPES " +

  "WHERE RECIPE_NUM = ?";

  ```


  除了字符串末尾的问号（`?`）之外，SQL 文本看起来一切标准。在 SQL 字符串中放置问号表示在执行 SQL 时，会使用一个替换变量来代替该问号。使用 `PreparedStatement`
  对象的下一步是声明一个 `PreparedStatement` 类型的变量。这可以通过以下代码行看到。


  ```

  PreparedStatement pstmt = null;

  ```


  `PreparedStatement` 实现了 `AutoCloseable`，因此它可以在 `try-with-resources` 块的上下文中使用。一旦声明了
  `PreparedStatement`，就可以使用它了。然而，使用 `PreparedStatement` 可能不会抛出异常。因此，如果没有使用 `try-with-resources`，`PreparedStatement`
  应该出现在 `try-catch` 块中，以便能够优雅地处理任何异常。例如，如果数据库连接因某种原因不可用，或者 SQL 字符串无效，就可能发生异常。与其让应用程序因此类问题崩溃，不如在
  `catch` 块中明智地处理异常。下面的 `try-catch` 块包含了将 SQL 字符串发送到数据库并检索结果所需的代码。


  ```

  try(PreparedStatement pstmt = conn.prepareStatement(sql);) {

  pstmt.setString(1, recipeNumber);

  ResultSet rs = pstmt.executeQuery();

  while(rs.next()){

  System.out.println(rs.getString(2) + ": " + rs.getString(3) +

  " - " + rs.getString(4));

  }

  } catch (SQLException ex) {

  ex.printStackTrace();

  }

  ```


  首先，可以看到 `Connection` 对象实例化了一个 `PreparedStatement` 对象。SQL 字符串在创建时被传递给 `PreparedStatement`
  对象的构造函数。由于 `PreparedStatement` 是在 `try-with-resources` 结构中实例化的，当它不再使用时会被自动关闭。接下来，`PreparedStatement`
  对象为已放入 SQL 字符串中的任何替换变量设置值。如你所见，示例中使用了 `PreparedStatement setString()` 方法来将位置 1 的替换变量设置为
  `recipeNumber` 变量的内容。替换变量的位置与 SQL 字符串中问号（`?`）的位置相关联。字符串中的第一个问号被分配给第一个位置，第二个问号分配给第二个位置，依此类推。如果分配了多个替换变量，则会对
  `PreparedStatement` 对象进行多次调用，依次分配每个变量，直到所有变量都被处理完毕。`PreparedStatement` 对象可以接受多种不同数据类型的替换变量。例如，如果将一个
  int 值分配给替换变量，则需要调用 `setInt(position, variable)` 方法。有关使用 `PreparedStatement` 对象分配替换变量的完整方法集，请参阅在线文档或
  IDE 的代码补全功能。


  一旦所有变量都分配完毕，就可以执行 SQL 字符串了。`PreparedStatement` 对象包含一个 `executeQuery()` 方法，该方法执行一个代表查询的
  SQL 字符串。`executeQuery()` 方法返回一个 `ResultSet` 对象，其中包含针对特定 SQL 查询从数据库获取的结果。接下来，可以遍历
  `ResultSet` 来获取从数据库中检索到的值。同样，通过调用 `ResultSet` 对象相应的 getter 方法并传入你想要获取的列值的位置，来进行位置分配以检索结果。位置由列名在
  SQL 字符串中出现的顺序决定。在示例中，第一个位置对应 `RECIPE_NUMBER` 列，第二个位置对应 `RECIPE_NAME` 列，依此类推。如果 `recipeNumber`
  字符串变量等于 12-1，那么执行示例中查询的结果将如下所示。


  ```

  12-1: Installing MySQL - downloading and installation of a MySQL Database

  ```


  当然，如果替换变量设置不正确，或者 SQL 字符串有问题，就会抛出异常。这将导致执行 `catch` 块中包含的代码。你还应该确保在使用完 `PreparedStatement`
  后进行清理，即在使用完毕后关闭该语句。如果你没有使用 `try-with-resources` 结构，最佳实践是将所有清理代码放在 `finally` 块中，以确保
  `PreparedStatement` 对象被正确关闭，即使抛出了异常也是如此。在示例中，`finally` 块如下所示。


  ```

  finally {

  if (pstmt != null){

  try {

  pstmt.close();

  } catch (SQLException ex) {

  ex.printStackTrace();

  }

  }

  }

  ```


  你可以看到，会检查已实例化的 `PreparedStatement` 对象 `pstmt` 是否为 `NULL`。如果不是，则通过调用 `close()` 方法将其关闭。


  通过处理本方案解决方案中的代码，你可以看到类似的代码处理数据库的 `INSERT`、`UPDATE` 和 `DELETE` 语句。在这些情况下，唯一的区别是调用的是
  `PreparedStatement executeUpdate()` 方法，而不是 `executeQuery()` 方法。`executeUpdate()`
  方法返回一个 int 值，表示受 SQL 语句影响的行数。


  使用 `PreparedStatement` 对象优于使用 JDBC `Statement` 对象。这是因为它们更安全且性能更好。它们还可以使你的代码更易于理解和维护。


  ## 12.8 执行事务


  ### 问题


  你的应用程序的结构要求按顺序处理任务。一个任务依赖于另一个任务，并且每个进程执行不同的数据库操作。如果途中的某个任务失败，则需要撤销已经发生的数据库处理。




  ### 解决方案


  将你的`Connection`对象的自动提交设置为`false`，然后执行你想要完成的事务。成功执行每个事务后，手动提交`Connection`对象；否则，回滚所有已发生的事务。以下代码示例演示了事务管理。如果你查看`TransactionExample`类的`main()`方法，会发现`Connection`对象的`autoCommit()`偏好已被设置为`false`，以便将数据库语句分组形成一个事务。如果事务中的所有语句都成功执行，则通过调用`commit()`方法手动提交`Connection`对象；否则，通过调用`rollback()`方法回滚所有语句。默认情况下，`autoCommit`设置为`true`，这会自动将每条语句视为一个单独的事务。


  ```

  import java.sql.Connection;

  import java.sql.PreparedStatement;

  import java.sql.ResultSet;

  import java.sql.SQLException;

  import org.java17recipes.chapter12.recipe12_01.CreateConnection;

  public class TransactionExample {

  public static Connection conn = null;

  public static void main(String[] args) {

  boolean successFlag = false;

  try {

  CreateConnection createConn = new CreateConnection();

  conn = createConn.getConnection();

  conn.setAutoCommit(false);

  queryDbRecipes();

  successFlag = insertRecord(

  "12-6",

  "Simplifying and Adding Security with Prepared Statements",

  "Working with Prepared Statements");

  if (successFlag == true){

  successFlag = insertRecord(

  null,

  "Simplifying and Adding Security with Prepared Statements",

  "Working with Prepared Statements");

  }

  // 提交事务

  if (successFlag == true)

  conn.commit();

  else

  conn.rollback();

  conn.setAutoCommit(true);

  queryDbRecipes();

  } catch (java.sql.SQLException ex) {

  System.out.println(ex);

  } finally {

  if (conn != null) {

  try {

  conn.close();

  } catch (SQLException ex) {

  ex.printStackTrace();

  }

  }

  }

  }

  private static void queryDbRecipes(){

  String sql = "SELECT ID, RECIPE_NUMBER, RECIPE_NAME, DESCRIPTION " +

  "FROM RECIPES";

  try(PreparedStatement pstmt = conn.prepareStatement(sql);) {

  ResultSet rs = pstmt.executeQuery();

  while(rs.next()){

  System.out.println(rs.getString(2) + ": " + rs.getString(3) + " - " + rs.getString(4));

  }

  } catch (SQLException ex) {

  ex.printStackTrace();

  }

  }

  private static boolean insertRecord(String recipeNumber,

  String title,

  String description){

  String sql = "INSERT INTO RECIPES VALUES(" +

  "NULL, ?,?,?)";

  boolean success = false;

  try(PreparedStatement pstmt = conn.prepareStatement(sql);) {

  pstmt.setString(1, recipeNumber);

  pstmt.setString(2, title);

  pstmt.setString(3, description);

  pstmt.executeUpdate();

  System.out.println("Record successfully inserted.");

  success = true;

  } catch (SQLException ex){

  success = false;

  ex.printStackTrace();

  }

  return success;

  }

  }

  ```


  以下是输出结果。


  ```

  12-2: Connecting to a Database - DriverManager and DataSource Implementations

  12-3: Handling SQL Exceptions - Using SQLException

  Record successfully inserted.

  java.sql.SQLIntegrityConstraintViolationException: Column ''recipe_number'' cannot
  be null

  at mysql.connector.java@8.0.27/com.mysql.cj.jdbc.exceptions.SQLError.createSQLException(SQLError.java:117)

  at mysql.connector.java@8.0.27/com.mysql.cj.jdbc.exceptions.SQLExceptionsMapping.translateException(SQLExceptionsMapping.java:122)

  at mysql.connector.java@8.0.27/com.mysql.cj.jdbc.ClientPreparedStatement.executeInternal(ClientPreparedStatement.java:953)

  at mysql.connector.java@8.0.27/com.mysql.cj.jdbc.ClientPreparedStatement.executeUpdateInternal(ClientPreparedStatement.java:1098)

  at mysql.connector.java@8.0.27/com.mysql.cj.jdbc.ClientPreparedStatement.executeUpdateInternal(ClientPreparedStatement.java:1046)

  at mysql.connector.java@8.0.27/com.mysql.cj.jdbc.ClientPreparedStatement.executeLargeUpdate(ClientPreparedStatement.java:1371)

  at mysql.connector.java@8.0.27/com.mysql.cj.jdbc.ClientPreparedStatement.executeUpdate(ClientPreparedStatement.java:1031)

  at org.java17recipes.chapter12.recipe12_08.TransactionExample.insertRecord(TransactionExample.java:83)

