  本章提供了一些技巧，帮助 Java 语言新手以及有其他语言经验的程序员熟悉 Java 17。你将学习如何安装 Java 并配置集成开发环境（IDE），以便开发应用程序并试验本书提供的解决方案。出于安全原因，除非绝对必要，我们不建议安装任何东西。在没有其他选择的情况下，下载压缩版本并运行相应操作系统的相关脚本会更简单、更安全。你应该能够根据我们的说明，毫无问题地安装本书中提到的所有软件包的任何未来最新版本和发行版。你将学习
  Java 的基础知识，例如创建类和接受键盘输入。文档编写常常被忽视，但在本章中，你还会快速学习如何为你的 Java 代码创建出色的文档。


  注意


  *《Java 17 技巧》* 并非一本完整的教程。相反，它涵盖了 Java 语言的关键概念。如果你确实是 Java 新手，你可能想阅读 Iuliana Cosmina
  所著的 *《Java 17 绝对入门》*（Apress，2022 年）。


  ## 1.1 安装 Java


  ### 问题


  你想安装 Java 并尝试使用该语言。


  ### 解决方案


  安装 Java 开发工具包 17（JDK），它提供了该语言和编译器。


  没有 Java，一切都无法运行。运行时环境（JRE）让你能够执行 Java。JDK 让你能够将 Java 源代码编译成可执行的类。有两个主要发行版：Oracle
  JDK 和 OpenJDK。我们选择了 GNU 通用公共许可证下的第二个版本，因为 Oracle JDK 的许可证在 2019 年 4 月发布的版本中发生了变化，仅允许某些免费使用。但是，你可以从
  Oracle 技术网络下载 Oracle 在非开源许可证下提供的 JDK 商业构建版本。


  从 [`https://jdk.java.net/17/`](https://jdk.java.net/17/) 下载适用于你平台的 OpenJDK 发行版，如图
  1-1 所示，并将存档文件解压到你的 PC 上。


  ![](img/323910_4_En_1_Fig1_HTML.jpg)


  图 1-1


  OpenJDK 17 主页


  ### 工作原理


  *Java* 是 Oracle 公司拥有的商标。该语言本身是开源的，其演进由 Java 社区流程（JCP）控制。你可以在 [`www.jcp.org/en/home/index`](http://www.jcp.org/en/home/index)
  上阅读相关信息。虽然 Oracle 公司不拥有该语言，但其核心开发往往由该公司主导。正是 Oracle 公司运营着 JCP 并拥有 jcp.org 域名。


  Java `home` 文件夹包含 `bin` 子文件夹，它帮助你使用 Java 语言开发和执行程序（包含工具和实用程序），并支持执行用 Java 编程语言编写的程序（包含
  Java 运行时环境（JRE）的实现、类库和其他文件）。从 Java 11 开始，Oracle 和 OpenJDK 团队决定只分发 JDK，并停止在 JRE 文件夹中复制
  JDK 中的某些内容。


  Java 有许多版本，例如移动版（ME）（[`www.oracle.com/java/technologies/javameoverview.html`](http://www.oracle.com/java/technologies/javameoverview.html)）和企业版（EE）（[`www.oracle.com/it/java/technologies/java-ee-glance.html`](http://www.oracle.com/it/java/technologies/java-ee-glance.html)）。Java
  SE 是标准版，代表了该语言的核心。我们为 Java SE 程序员编写了本书中的技巧。那些对开发嵌入式设备应用程序感兴趣的人可能想进一步了解 Java ME。同样，那些对开发
  Web 应用程序和使用企业解决方案感兴趣的人可能想进一步了解 Java EE。


  OpenJDK 和 Oracle JDK 的二进制文件是兼容且非常接近的，但存在一些差异。


  *   Oracle JDK 源代码包含以下文本：“ORACLE PROPRIETARY/CONFIDENTIAL. Use is subject to license
  terms.” OpenJDK 则引用 GPL 许可证条款。


  *   Oracle JDK 中 Java 版本的输出包含 Oracle 特定的标识符。OpenJDK 不包含 Oracle 特定的标识符。


  *   Oracle JDK 使用 Java 加密扩展（JCE）代码签名证书。OpenJDK 允许未签名的第三方加密提供程序。


  *   OpenJDK 仅以压缩存档形式提供。Oracle JDK 提供安装程序。


  有关 Oracle JDK 的更多信息，请访问 [`www.oracle.com/java/technologies/javase/17-relnote-issues.html`](http://www.oracle.com/java/technologies/javase/17-relnote-issues.html)。


  ## 1.2 配置 PATH


  ### 问题


  你想测试 Java 安装并从命令行编译 Java。


  ### 解决方案


  将 JDK 路径添加到 PATH 环境变量中。你应该将 jdk-17 文件夹放在操作系统驱动器的根目录或自定义位置。


  在 Windows 中，搜索并选择控制面板。单击高级系统设置，然后选择环境变量。在系统变量部分，找到 PATH 环境变量并选中它。在编辑系统变量字段或新建系统变量字段中，在“变量值”字段中输入文本
  **C:\jdk-17\bin;**。你也可以将 JAVA_HOME 设置为 C:\jdk-17，然后在 Path 中设置值 %JAVA_HOME%\bin）。文本末尾的分号至关重要，因为它将新路径与现有路径分隔开。前后不要插入额外的空格。


  在 Unix 和 Linux 系统中，你编辑环境文件并修改 PATH 变量。在这种情况下，你执行如下命令。


  ```

  export PATH=/usr/local/jdk-17/ /bin

  ```


  最后，要确定路径是否正确设置，请打开一个命令行窗口，进入命令提示符，并输入以下命令。


  ```

  java -version.

  ```


  如果你看到如图 1-2 所示的屏幕，则说明已安装正确的 Java 版本。


  注意


  *终端*（或在 Windows 中称为命令提示符）是一种命令行界面，允许你通过使用命令提示符来控制操作系统。


  ![](img/323910_4_En_1_Fig2_HTML.jpg)


  图 1-2


  测试 Java 版本




  ### 工作原理


  要编译和执行 Java 程序，必须将 JDK 路径添加到 PATH 环境变量中（在 Windows 中，该变量是一个由分号分隔的路径字符串；在 Unix 操作系统中，则由冒号分隔）。所有操作系统都使用
  PATH 环境变量来确定可执行文件在系统中的位置，以便执行个人计算机上存储或下载的任何文件。该变量告诉操作系统，当用户执行文件时，要运行的程序位于何处。环境变量还可以存储应用程序或操作系统使用的信息。


  PATH 包含一个由目录组成的字符串，在 Windows 中用分号分隔，在 Unix 操作系统中用冒号分隔。使用 PATH 的原因是，PATH 中列出的目录中的任何可执行文件都可以在不指定文件完整路径的情况下执行。这允许你仅通过文件名从命令行运行这些可执行文件，或者允许其他应用程序在不知道其目录路径的情况下运行这些可执行文件。


  因此，当你执行一个文件时，需要指定该文件的完整路径，但如果命令不包含路径，操作系统会使用 PATH 中与你文件匹配的可执行文件。


  ## 1.3 测试 Java


  ### 问题


  你想从命令行编译 Java。


  ### 解决方案


  使用清单 1-1 中所示的小型应用程序。在此示例中，你可以使用像 Notepad++ 这样的智能编辑器或其他文本编辑器。


  要创建第一个 Java 程序的源代码，必须执行以下操作。


  1.  声明一个名为 Hello 的类。


  2.  声明 `public static void main(String args[])` 或 `String... args` 作为主方法。


  3.  输入 `System.out.println("Hello World")` 命令，在命令提示符窗口中显示“Hello World”。


  ```

  public class Hello {

  public static void main(String args[]){

  System.out.println("Hello World");

  }

  }

  清单 1-1

  Hello.java

  ```


  现在，将该文件保存为工作文件夹中的 Hello.java。打开命令窗口。切换到工作目录后，输入以下内容来编译应用程序。


  ```

  javac Hello.java

  ```


  它应该返回提示符，不显示任何信息。这也意味着你已正确更新了 `Path` 系统变量。如果你想了解更多关于 `javac` 编译器正在做什么的信息，请在 `javac`
  和文件名之间输入 `-verbose`（`javac -verbose Hello.java`）。你会在工作目录中看到一个名为 `Hello.class` 的文件。


  在命令提示符中输入以下内容来运行应用程序（参见图 1-3）。


  ```

  java Hello

  ```


