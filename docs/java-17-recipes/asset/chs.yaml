  */

  public void setStatus(int status) {

  this.status = status;

  }

  }

  PlayerType 接口如下：

  public interface PlayerType {

  public String position=””;

  public String getPosition();

  }

  ```


  其他每个 `Player` 子类都与 `Goalie` 类非常相似。最值得注意的代码是工厂方法 `createPlayer`，它可以创建 `Player` 类的新实例。


  注意


  要进一步扩展此示例，可以限制可访问的方法。通过返回 `PlayerType` 类型的对象，并仅在该接口中声明可访问的方法来实现这一点。


  ### 工作原理


  工厂用于生成对象。它们通常用于将对象的创建与其创建者解耦。当创建者不需要了解生成新对象的实际实现细节时，这会非常有用。当需要对对象的创建进行受控访问时，工厂模式也很有用。要实现工厂，请创建一个包含至少一个用于返回新创建对象的方法的类。


  在本解决方案中，`PlayerFactory` 类包含一个 `createPlayer(String)` 方法，该方法返回一个新创建的 `Player` 对象。此方法在幕后并没有做任何特殊处理；它只是根据传递给该方法的字符串值实例化一个新的
  `Player` 实例。另一个可以访问 `PlayerFactory` 类的对象可以使用 `createPlayer` 返回新的 `Player` 对象，而无需了解对象是如何创建的。虽然这在
  `createPlayer` 方法的情况下并没有隐藏太多内容，但 `PlayerFactory` 抽象了正在实例化的类的细节，因此开发人员只需关心获取一个新的
  `Player` 对象即可。


  工厂模式有效地控制了对象的创建方式，并使创建特定类型的对象变得更加容易。想象一下，如果一个对象的构造函数需要的参数不止几个；创建需要多个参数的新对象可能会变得很麻烦。生成一个工厂来创建这些对象，这样你就不必在每次实例化时硬编码所有参数，这可以大大提高你的工作效率！


  ## 5.5 创建可重用对象


  ### 问题


  你想要生成一个可以代表应用程序中某些内容的对象。此外，你还希望重用该对象来表示多个实例。例如，假设你创建了一个为不同运动队生成统计数据和联赛信息的应用程序。在这种情况下，你想要创建一个代表球队的对象。


  ### 解决方案


  创建一个代表你想要创建的对象的 JavaBean。JavaBean 对象提供了将对象字段声明为 `private` 的能力，并且还允许读取和更新属性，以便对象可以在应用程序中传递和使用。本解决方案演示了如何创建一个名为
  `Team` 的 JavaBean。`Team` 对象包含几个可以包含信息的字段。


  ```

  public class Team implements TeamType {

  private List players;

  private String name;

  private String city;

  /**

  * @return the players

  */

  public List getPlayers() {

  return players;

  }

  /**

  * @param players the players to set

  */

  @Override

  public void setPlayers(List players) {

  this.players = players;

  }

  /**

  * @return the name

  */

  public String getName() {

  return name;

  }

  /**

  * @param name the name to set

  */

  @Override

  public void setName(String name) {

  this.name = name;

  }

  /**

  * @return the city

  */

  public String getCity() {

  return city;

  }

  /**

  * @param city the city to set

  */

  @Override

  public void setCity(String city) {

  this.city = city;

  }

  }

  TeamType 接口如下：

  public interface TeamType {

  void setPlayers(List players);

  void setName(String name);

  void setCity(String city);

  }

  ```


  如你所见，此解决方案中的对象包含三个字段，并且每个字段都被声明为 `private`。然而，每个字段都有两个访问器方法——getter 和 setter——使得这些字段可以间接访问。




  ### 工作原理


  JavaBean 是一个持有信息的对象，以便在应用程序中传递和使用。JavaBean 最重要的方面之一是其字段被声明为 `private`。这禁止了其他类直接访问这些字段。相反，每个字段都应通过定义的方法进行封装，使其能够被其他类访问。这些方法必须遵循以下命名约定。


  *   用于访问字段数据的方法应使用 `get` 前缀命名，后跟字段名。


  *   用于设置字段数据的方法应使用 `set` 前缀命名，后跟字段名。


  例如，在本节方案的解决方案中，`Team` 对象包含一个存储球员姓名的字段。要访问该字段，应声明一个 `getPlayers` 方法。它应返回 `players`
  字段中包含的数据。同样，应声明一个 `setPlayers` 方法来填充 `players` 字段。它应接受一个与 `players` 字段类型相同的参数，并将
  `players` 字段的值设置为该参数。这可以在以下代码中看到。


  ```

  public List getPlayers() {

  return players;

  }

  void setPlayers(List players) {

  this.players = players;

  }

  ```


  JavaBean 可以填充写入数据库记录的数据列表，或用于其他各种功能。使用 JavaBean 使代码更易于阅读和维护。它还有助于增加未来代码增强的可能性，因为只需要很少的代码实现。使用
  JavaBean 的另一个好处是，大多数主流 IDE 会自动为你完成字段的封装。


  ## 5.6 为类定义接口


  ### 问题


  你想要创建一组方法签名和字段，它们可以作为通用模板，用来暴露一个类所实现的方法和字段。


  ### 解决方案


  生成一个 Java 接口，声明一个类必须实现的每个字段和方法。这样的接口随后可以被一个类实现，并代表一种对象类型。以下代码是一个接口，声明了 `Team` 对象必须实现的方法。


  ```

  public interface TeamType {

  void setPlayers(List players);

  void setName(String name);

  void setCity(String city);

  String getFullName();

  }

  ```


  接口中的所有方法都是隐式抽象的。也就是说，只提供了方法签名。在接口中也可以包含 `static final` 字段声明。


  ### 工作原理


  Java 接口是一种构造，它定义了类必须实现的结构，无论是字段还是方法。在大多数情况下，接口不包含方法实现；相反，它们只包含方法签名。接口可以包含隐式为 `static`
  和 `final` 的变量。


  在本节方案的解决方案中，该接口不包含任何常量字段声明。然而，它包含了四个方法签名。所有方法签名都没有指定访问修饰符，因为接口内的所有声明都是隐式 `public`
  的。接口暴露了一组功能；因此，接口内暴露的所有方法都必须是隐式 `public` 的。任何实现接口的类都必须实现接口中声明的所有方法签名，除非是默认方法和抽象类，在这种情况下，接口可以将实现留给其子类之一。


  虽然 Java 语言不允许多重继承，但一个 Java 类可以实现多个接口，从而允许一种受控形式的多重继承。抽象类也可以实现接口。以下代码演示了一个类实现接口：`Team`
  对象声明实现了 `TeamType` 接口。


  ```

  public class Team implements TeamType {

  private List players;

  private String name;

  private String city;

  /**

  * @return the players

  */

  public List getPlayers() {

  return players;

  }

  /**

  * @param players the players to set

  */

  @Override

  public void setPlayers(List players) {

  this.players = players;

  }

  /**

  * @return the name

  */

  public String getName() {

  return name;

  }

  /**

  * @param name the name to set

  */

  @Override

  public void setName(String name) {

  this.name = name;

  }

  /**

  * @return the city

  */

  public String getCity() {

  return city;

  }

  /**

  * @param city the city to set

  */

  @Override

  public void setCity(String city) {

  this.city = city;

  }

  public String getFullName() {

  return this.name + " - " + this.city;

  }

  }

  ```


  接口可以声明对象的类型。任何声明为具有接口类型的对象都必须遵守接口中声明的所有实现，除非存在默认实现。例如，以下字段声明定义了一个包含 `TeamType` 接口中声明的所有属性的对象。


  ```

  TeamType team;

  ```


  接口也可以扩展其他接口（因此提供了与多重继承相同的理论）。然而，由于接口中没有方法实现，在 Java 类中实现多个接口比在 C++ 中扩展多个类要安全得多。


  接口是 Java 语言中最重要的构造之一。它们提供了用户与类实现之间的接口。虽然可以在不使用接口的情况下创建整个应用程序，但它们有助于促进面向对象，并隐藏其他类的方法实现。


  ## 5.7 在不破坏现有代码的情况下修改接口


  ### 问题


  你有一个实现了某个接口的工具类，并且工具库中的许多不同类都实现了该接口。假设你想向该工具类添加一个新方法，并使其通过其接口可供其他类使用。然而，更改接口很可能会破坏一些已经实现了该接口的现有类。


  ### 解决方案


  将新方法及其实现作为默认方法添加到工具类接口中。这样做之后，每个实现该接口的类都会自动使用这个新方法，并且由于存在默认实现，它们不会被强制要求实现它。以下类接口包含一个默认方法，任何实现该接口的类都可以使用它。


  ```

  public interface TeamType {

  List getPlayers();

  void setPlayers(List players);

  void setName(String name);

  void setCity(String city);

  String getFullName();

  default void listPlayers() {

  getPlayers().stream().forEach((player) -> {

  System.out.println(player.getFirstName() + " " + player.getLastName());

  });

  }

  }

  ```


  接口 `TeamType` 包含一个名为 `listPlayers()` 的默认方法。任何实现 `TeamType` 的类都不需要实现此方法，因为接口内部已经提供了默认实现。




  ### 工作原理


  在 Java 的早期版本中，接口只能包含方法签名和常量变量，无法在接口内定义方法实现。这在大多数情况下是可行的，因为接口是一种旨在强制类型安全并抽象实现细节的构造。然而，在某些情况下，允许接口包含默认方法实现是有益的。例如，如果许多类实现了一个现有接口，那么当该接口发生变更时，大量代码可能会被破坏。这将导致无法实现向后兼容。在这种情况下，将默认方法实现放入接口中，而不是强制所有类实现接口中的新方法，是更合理的做法。这就是默认方法成为必要特性并被纳入
  Java 8 版本的原因。


  要在接口中创建默认方法（也称为*防御方法*），请在方法签名中使用关键字 `default`，并包含方法实现。一个接口可以包含零个或多个默认方法。在本解决方案中，`listPlayers()`
  方法是 `TeamType` 接口中的一个默认方法，任何实现 `TeamType` 的类都会自动继承该默认实现。理论上，任何实现 `TeamType` 的类都不会受到添加
  `listPlayers()` 默认方法的影响。这使你能够在不破坏向后兼容性的情况下修改接口，这具有极大的价值。


  ## 5.8 使用不同值构造同一类的实例


  ### 问题


  你的应用程序需要能够构造同一对象的多个实例，但每个实例必须包含不同的值，从而创建同一对象的不同类型。


  ### 解决方案


  使用构建器模式，按照逐步流程构建同一对象的不同类型。例如，假设你希望为一个体育联盟创建不同的队伍。每支队伍必须包含相同的属性，但这些属性的值因队伍而异。因此，你需要创建许多相同类型的对象，但每个对象都是独一无二的。以下代码演示了构建器模式，用于创建所需的队伍。


  首先，你需要定义每支队伍需要包含的一组属性。为此，应创建一个 Java 接口，其中包含需要应用于每个 `Team` 对象的不同属性。以下是此类接口的一个示例。


  ```

  public interface TeamType {

  public void setPlayers(List players);

  public void setName(String name);

  public void setCity(String city);

  public String getFullName();

  }

  ```


  接下来，定义一个类来表示一支队伍。该类需要实现刚刚创建的 `TeamType` 接口，以确保其符合构建队伍所需的格式。


  ```

  public class Team implements TeamType {

  private List players;

  private String name;

  private String city ;

  private int wins

  private int losses

  private int ties

  /**

  * @return the players

  */

  public List getPlayers() {

  return players;

  }

  /**

  * @param players the players to set

  */

  @Override

  public void setPlayers(List players) {

  this.players = players;

  }

  /**

  * @return the name

  */

  public String getName() {

  return name;

  }

  /**

  * @param name the name to set

  */

  @Override

  public void setName(String name) {

  this.name = name;

  }

  /**

  * @return the city

  */

  public String getCity() {

  return city;

  }

  /**

  * @param city the city to set

  */

  @Override

  public void setCity(String city) {

  this.city = city;

  }

  public String getFullName(){

  return this.name + "  – "  + this.city;

  }

  }

  ```


  现在 `Team` 类已经定义完毕，需要创建一个构建器。构建器对象的目的是允许逐步创建 `Team` 对象。应创建一个构建器类接口来抽象构建对象的细节。该接口应定义构建对象所需的所有方法，以及一个返回完整构建对象的方法。在本例中，该接口定义了构建新
  `Team` 对象所需的每个方法，然后由构建器实现类来实现此接口。


  ```

  public interface TeamBuilder {

  public void buildPlayerList();

  public void buildNewTeam(String teamName);

  public void designateTeamCity(String city);

  public Team getTeam();

  }

  ```


  以下代码演示了一个构建器类的实现。虽然以下代码不会创建自定义的球员列表，但它包含了实现构建器模式所需的所有功能。创建更自定义的球员列表的细节可以稍后完善，可能通过允许用户通过键盘输入来创建球员。此外，`TeamBuilder`
  接口可以为不同的运动项目实现队伍。以下类名为 `HockeyTeamBuilder`，但类似的实现 `TeamBuilder` 的类可以命名为 `FootballTeamBuilder`，以此类推。


  ```

  public class HockeyTeamBuilder implements TeamBuilder {

  private Team team;

  public HockeyTeamBuilder(){

  this.team = new Team();

  }

  @Override

  public void buildPlayerList() {

  List players = new ArrayList();

  for(int x = 0; x <= 10; x++){

  players.add(PlayerFactory.getPlayer());

  }

  team.setPlayers(players);

  }

  @Override

  public void buildNewTeam(String teamName) {

  team.setName(teamName);

  }

  @Override

  public void designateTeamCity(String city){

  team.setCity(city);

  }

  @Override

  public Team getTeam(){

  return this.team;

  }

  }

  ```


  最后，通过调用构建器接口中定义的方法来使用构建器创建队伍。以下代码演示了该构建器如何创建一支队伍。你可以使用本解决方案源码中的 `Roster` 类来测试此代码。


  ```

  public Team createTeam(String teamName, String city){

  TeamBuilder builder = new HockeyTeamBuilder();

  builder.buildNewTeam(teamName);

  builder.designateTeamCity(city);

  builder.buildPlayerList();

  return builder.getTeam();

  }

  ```


  尽管这个构建器模式的演示相对简短，但它展示了如何隐藏对象的实现细节，从而使对象更易于构建。你无需了解构建器内部方法的具体实现，只需调用它们即可。




  ### 工作原理


  建造者模式提供了一种以程序化方式生成对象新实例的方法。它抽象了对象创建的细节，因此创建者无需执行任何特定工作即可生成新实例。通过将工作分解为一系列步骤，建造者模式允许对象以不同方式实现其建造方法。由于对象创建者只能访问建造方法，这使得创建不同类型的对象变得更加容易。


  使用建造者模式需要几个类和接口。首先，你需要定义一个类及其不同的属性。正如本方案解决方案所展示的，该类可以遵循 JavaBean 模式。你可以通过创建 JavaBean，使用其
  setter 和 getter 方法来填充对象。接下来，你应该创建一个接口，用于访问你所创建对象的 setter 方法。每个 setter 方法都应在接口中定义，然后对象本身应实现该接口。如解决方案所示，`Team`
  对象包含以下 setter 方法，并且每个方法都在 `TeamType` 接口中定义。


  ```

  public void setPlayers(List players);

  public void setName(String name);

  public void setCity(String city);

  ```


  在现实生活中，一个团队可能包含更多属性。例如，你可能希望设置吉祥物以及主场体育馆的名称和地址。此示例中的代码可以被认为是简化的，因为它演示了创建通用“团队对象”的过程，而不是向你展示创建真实团队所需的所有代码。由于
  `Team` 类实现了在 `TeamType` 接口中定义的这些 setter 方法，因此可以调用接口方法与 `Team` 类的实际方法进行交互。


  在对象及其接口编码完成后，需要创建实际的建造者。建造者由一个接口及其实现类组成。首先，你必须定义你希望其他类在构建对象时调用的方法。例如，在本方案的解决方案中，`buildNewTeam()`、`designateTeamCity()`
  和 `buildPlayerList()` 方法在名为 `TeamBuilder` 的建造者接口中定义。当某个类稍后想要构建这些对象之一时，它只需要调用这些定义好的方法。接下来，定义一个建造者类的实现。实现类实现了建造者接口中定义的方法，向对象创建者隐藏了这些实现的所有细节。在本方案的解决方案中，建造者类
  `HockeyTeamBuilder` 实现了 `TeamBuilder` 接口。当某个类想要创建一个新的 `Team` 对象时，它只需实例化一个新的建造者类。


  ```

  TeamBuilder builder = new HockeyTeamBuilder();

  ```


  为了填充新创建的类对象，需要调用其建造者方法。


  ```

  builder.buildNewTeam(teamName);

  builder.designateTeamCity(city);

  builder.buildPlayerList();

  ```


  使用这种技术可以为对象提供逐步创建的过程。构建该对象的实现细节对对象创建者是隐藏的。不同的建造者实现可以轻松地使用相同的 `TeamBuilder` 接口来为不同类型构建
  `Team` 对象。例如，可以编写一个建造者实现来生成足球队的 `Team` 对象，另一个可以定义来生成棒球队的 `Team` 对象。每个 `Team` 对象的实现都会不同。然而，两者都可以实现相同的接口——`TeamBuilder`——并且创建者只需调用建造者方法，而无需关心细节。


  ## 5.9 通过接口与类交互


  ### 问题


  你已经创建了一个实现接口或类类型的类。你想通过调用接口中声明的方法来与该类的方法进行交互，而不是直接操作该类。


  ### 解决方案


  声明一个与接口类型相同的字段。然后，你可以将实现该接口的类赋值给你声明的字段，并调用接口中声明的方法来执行工作。在以下示例中，一个字段被声明为 `TeamType`
  类型。使用与方案 5-8 中相同的类，你可以看到 `Team` 类实现了 `TeamType` 接口。在以下示例中创建的字段持有一个指向新 `Team` 对象的引用。


  由于 `Team` 类实现了 `TeamType` 接口，因此可以使用接口中暴露的方法。


  ```

  public class InterfaceTester {

  static TeamType team = new Team();

  public static void main(String[] args){

  team.setCity("SomeCity");

  team.setName("SomeName");

  team.setPlayers(null);

  System.out.println(team.getFullName());

  }

  }

  ```


  其中接口为


  ```

  public interface TeamType {

  void setPlayers(List players);

  void setName(String name);

  void setCity(String city);

  String getFullName();

  }

  ```


  产生的输出如下。


  ```

  SomeName - SomeCity

  ```


  ### 工作原理


  接口之所以有用，原因有很多。接口最重要的两个用例是一致性和抽象。接口定义了一个模型，任何实现该接口的类都必须符合该模型。因此，如果在接口中定义了一个常量，则该常量会自动在类中可用。如果在接口中定义了一个方法，除非已定义了默认实现，否则该类必须实现该方法。接口提供了一种很好的方式，让类能够符合标准。


  接口向任何不需要看到它的类隐藏了不必要的信息。接口中定义的任何方法都被设置为 `public`，并且对任何类都是可访问的。如本方案解决方案所示，创建了一个对象并声明了接口类型。示例中的接口
  `TeamType` 仅包含 `Team` 对象中可用方法的一小部分。因此，对于任何针对声明为 `TeamType` 类型的对象进行操作的类来说，唯一可访问的方法就是接口中定义的那些方法。使用此接口类型的类无法访问任何其他方法或常量，也不需要访问。接口是隐藏其他类不需要使用的逻辑的好方法。另一个很好的副作用：实现接口的类可以被更改和重新编译，而不会影响针对该接口编写的代码。但是，如果接口被更改，则可能会影响任何实现它的类。因此，如果
  `getFullName()` 方法的实现发生了变化，任何针对 `TeamType` 接口编写的类都不会受到影响，因为接口没有改变。实现会在幕后发生变化，任何针对该接口工作的类都会开始使用新的实现，而无需知晓。


  最后，接口有助于提升安全性。它们向任何可能使用接口调用该方法的类隐藏了接口中声明的方法的实现细节。如上一段所述，如果一个类针对 `TeamType` 接口调用了
  `getFullName()` 方法，只要按预期返回了结果，它就不需要知道该方法的实现细节。


  较旧的 Enterprise JavaBean (EJB) 模型使用接口与执行数据库工作的方法进行交互。这种模型非常适用于隐藏其他类使用时不必要或不关键的细节和逻辑。其他框架也使用类似的模型，通过
  Java 接口暴露功能。接口的使用已被证明是一种编写软件的明智方式，因为它促进了可重用性、灵活性和安全性。


  ## 5.10 使类可克隆


  ### 问题


  你想让一个类能够被另一个类克隆或复制。




  ### 解决方案


  在需要克隆的类中实现 `Cloneable` 接口，然后调用该对象的 clone 方法进行复制。以下代码演示了如何使 `Team` 类可克隆。


  ```

  public class Team implements TeamType, Cloneable, Serializable {

  private String name;

  private String city;

  /**

  * @return the name

  */

  public String getName() {

  return name;

  }

  /**

  * @param name the name to set

  */

  @Override

  public void setName(String name) {

  this.name = name;

  }

  /**

  * @return the city

  */

  public String getCity() {

  return city;

  }

  /**

  * @param city the city to set

  */

  @Override

  public void setCity(String city) {

  this.city = city;

  }

  public String getFullName() {

  return this.name + " - " + this.city;

  }

  /**

  * 重写 Object 的 clone 方法以创建深拷贝

  *

  * @return

  */

  @Override

  public Team clone() {

  Team obj = null;

  try {

  ByteArrayOutputStream baos = new ByteArrayOutputStream();

  ObjectOutputStream oos = new ObjectOutputStream(baos);

  oos.writeObject(this);

  oos.close();

  ByteArrayInputStream bais = new ByteArrayInputStream(baos.toByteArray());

  ObjectInputStream ois = new ObjectInputStream(bais);

  obj = (Team) ois.readObject();

  ois.close();

  } catch (IOException e) {

  e.printStackTrace();

  } catch (ClassNotFoundException cnfe) {

  cnfe.printStackTrace();

  }

  return obj;

  }

  /**

  * 重写 Object 的 clone 方法以创建浅拷贝

  *

  * @return

  */

  public Team shallowCopyClone() {

  try {

  return (Team) super.clone();

  } catch (CloneNotSupportedException ex) {

  return null;

  }

  }

  @Override

  public boolean equals(Object obj) {

  if (this == obj) {

  return true;

  }

  if (obj instanceof Team) {

  Team other = (Team) obj;

  return other.getName().equals(this.getName())

  && other.getCity().equals(this.getCity());

  } else {

  return false;

  }

  }

  }

  ```


  要对 `Team` 对象进行深拷贝，需要调用该对象的 `clone()` 方法。要对对象进行浅拷贝，则必须调用 `shallowCopyClone()` 方法。以下代码演示了这些技术。


  ```

  public static void main(String[] args){

  Team team1 = new Team();

  Team team2 = new Team();

  team1.setCity("Boston");

  team1.setName("Bandits");

  team2.setCity("Chicago");

  team2.setName("Wildcats");

  Team team3 = team1;

  Team team4 = team2.clone();

  Team team5 = team1.shallowCopyClone();

  System.out.println("Team 3:");

  System.out.println(team3.getCity());

  System.out.println(team3.getName());

  System.out.println("Team 4:");

  System.out.println(team4.getCity());

  System.out.println(team4.getName());

  // 球队迁至不同城市

  team1.setCity("St. Louis");

  team2.setCity("Orlando");

  System.out.println("Team 3:");

  System.out.println(team3.getCity());

  System.out.println(team3.getName());

  System.out.println("Team 4:");

  System.out.println(team4.getCity());

  System.out.println(team4.getName());

  System.out.println("Team 5:");

  System.out.println(team5.getCity());

  System.out.println(team5.getName());

  if (team1 == team3){

  System.out.println("team1 和 team3 相等");

  } else {

  System.out.println("team1 和 team3 不相等");

  }

  if (team1 == team5){

  System.out.println("team1 和 team5 相等");

  } else {

  System.out.println("team1 和 team5 不相等");

  }

  }

  ```


  此代码演示了如何克隆一个对象。运行结果如下所示。


  ```

  Team 3:

  Boston

  Bandits

  Team 4:

  Chicago

  Wildcats

  Team 3:

  St. Louis

  Bandits

  Team 4:

  Chicago

  Wildcats

  Team 5:

  Boston

  Bandits

  team1 和 team3 相等

  team1 和 team5 不相等

  ```


  ### 工作原理


  复制对象有两种不同的策略：浅拷贝和深拷贝。*浅拷贝*可以在不复制对象任何内容或数据的情况下复制对象。相反，所有变量都通过引用传递给复制的对象。创建对象的浅拷贝后，原始对象和复制对象中的对象引用相同的数据和内存。因此，修改原始对象的内容也会修改复制的对象。默认情况下，调用对象的
  `super.clone()` 方法会执行浅拷贝。本方案中的 `shallowCopyClone()` 方法演示了此技术。


  第二种复制类型是*深拷贝*，它会复制对象及其所有内容。因此，每个对象引用内存中不同的空间，修改一个对象不会影响另一个对象。深拷贝和浅拷贝之间的区别在本方案的解决方案中得到了演示。首先，创建
  `team1` 和 `team2` 对象。接着，为它们填充一些值。然后，将 `team3` 对象设置为等于 `team1` 对象，并将 `team4` 对象设置为
  `team2` 对象的克隆。当 `team1` 对象中的值发生更改时，`team3` 对象中的值也会更改，因为两个对象的内容引用相同的内存空间。这是对象浅拷贝的一个示例。当
  `team2` 对象中的值发生更改时，`team4` 对象中的值保持不变，因为每个对象都有自己的变量，这些变量引用不同的内存空间。这是深拷贝的一个示例。


  要制作对象的精确副本（深拷贝），必须序列化该对象，以便将其写入磁盘。基础 `Object` 类实现了 `clone()` 方法。默认情况下，`Object` 类的
  `clone()` 方法是 `protected` 的。要使对象可克隆，它必须实现 `Cloneable` 接口并重写默认的 `clone()` 方法。您可以通过一系列步骤序列化对象来制作深拷贝，例如将对象写入输出流，然后通过输入流将其读回。本方案解决方案的
  `clone()` 方法中显示的步骤正是这样做的。对象被写入 `ByteArrayOutputStream`，然后使用 `ByteArrayInputStream`
  读取。完成后，对象已被序列化，从而创建了深拷贝。本方案解决方案中的 `clone()` 方法已被重写以创建深拷贝。


  完成这些步骤并且对象实现了 `Cloneable` 并重写了默认的 `clone()` 方法后，就可以克隆该对象了。要制作对象的深拷贝，只需调用该对象重写的 `clone()`
  方法，如解决方案所示。如果您只是从 `clone()` 方法返回对象，则需要进行类型转换，如下所示。


  ```

  Team team4 = (Team) team2.clone();

  ```


  克隆对象并不困难，但理解对象复制可能产生的差异非常重要。


  ## 5.11 比较对象


  ### 问题


  您的应用程序需要比较两个或多个对象以查看它们是否相同。


  ### 解决方案 1


  要确定两个对象引用是否指向同一个对象，请使用 `==` 和 `!=` 运算符。以下解决方案演示了比较两个对象引用以确定它们是否引用同一个对象。


  ```

  public static void main(String[] args){

  // 比较两个对象是否包含相同的值

  Team team1 = new Team();

  Team team2 = new Team();

  team1.setName("Jokers");

  team1.setCity("Crazyville");

  team2.setName("Jokers");

  team2.setCity("Crazyville");

  if (team1 == team2){

  System.out.println("这些对象引用指向同一个对象。");

  } else {

  System.out.println("这些对象引用不指向同一个对象。");

  }

  // 比较两个对象以查看它们是否引用同一个对象

  Team team3 = team1;

  Team team4 = team1;

  if (team3 == team4){

  System.out.println("这些对象引用指向同一个对象。");

  } else {

  System.out.println("这些对象引用不指向同一个对象。");

  }

  }

  ```


  以下是运行代码的结果。


  ```

  这些对象引用不指向同一个对象。

  这些对象引用指向同一个对象。

  ```




  ### 解决方案 2


  要判断两个对象是否包含相同的值，请使用 `equals()` 方法。被比较的对象必须实现 `equals()` 和 `hashCode()` 方法，此方案才能正常工作。以下是重写了这两个方法的
  `Team` 类的代码。


  ```

  public class Team implements TeamType, Cloneable {

  private List players;

  private String name;

  private String city;

  // 出于性能考虑，由 hashCode 方法使用

  private volatile int cachedHashCode = 0;

  /**

  * @return 球员列表

  */

  public List getPlayers() {

  return players;

  }

  /**

  * @param players 要设置的球员列表

  */

  public void setPlayers(List players) {

  this.players = players;

  }

  /**

  * @return 队名

  */

  public String getName() {

  return name;

  }

  /**

  * @param name 要设置的队名

  */

  @Override

  public void setName(String name) {

  this.name = name;

  }

  /**

  * @return 城市

  */

  public String getCity() {

  return city;

  }

  /**

  * @param city 要设置的城市

  */

  @Override

  public void setCity(String city) {

  this.city = city;

  }

  public String getFullName() {

  return this.name + " - " + this.city;

  }

  /**

  * 重写 Object 的 clone 方法

  *

  * @return

  */

  public Object clone() {

  try {

  return super.clone();

  } catch (CloneNotSupportedException ex) {

  return null;

  }

  }

  @Override

  public boolean equals(Object obj) {

  if (this == obj) {

  return true;

  }

  if (obj instanceof Team) {

  Team other = (Team) obj;

  return other.getName().equals(this.getName())

  && other.getCity().equals(this.getCity())

  && other.getPlayers().equals(this.getPlayers());

  } else {

  return false;

  }

  }

  @Override

  public int hashCode() {

  int hashCode = cachedHashCode;

  if (hashCode == 0) {

  String concatStrings = name + city;

  if (players.size() > 0) {

  for (Player player : players) {

  concatStrings = concatStrings

  + player.getFirstName()

  + player.getLastName()

  + player.getPosition()

  + String.valueOf(player.getStatus());

  }

  }

  hashCode = concatStrings.hashCode();

  }

  return hashCode;

  }

  }

  ```


  以下方案演示了如何比较两个包含相同值的对象。


  ```

  public static void main(String[] args){

  // 比较两个对象是否包含相同的值

  Team team1 = new Team();

  Team team2 = new Team();

  // 构建球员列表

  Player newPlayer = new Player("Josh", "Juneau");

  playerList.add(0, newPlayer);

  newPlayer = new Player("Jonathan", "Gennick");

  playerList.add(1, newPlayer);

  newPlayer = new Player("Joe", "Blow");

  playerList.add(1, newPlayer);

  newPlayer = new Player("John", "Smith");

  playerList.add(1, newPlayer);

  newPlayer = new Player("Paul", "Bunyan");

  playerList.add(1, newPlayer);

  team1.setName("Jokers");

  team1.setCity("Crazyville");

  team1.setPlayers(playerList);

  team2.setName("Jokers");

  team2.setCity("Crazyville");

  team2.setPlayers(playerList);

  if (team1.equals(team2)){

  System.out.println("这些对象引用包含相同的值。");

  } else {

  System.out.println("这些对象引用不包含相同的值。");

  }

  }

  ```


  以下是运行此代码的结果。


  ```

  这些对象引用不指向同一个对象。

  这些对象引用包含相同的值。

  这些对象引用指向同一个对象。

  ```


  ### 工作原理


  比较运算符 `(==)` 可以判断两个对象是否相等。这种相等性不涉及对象的值，而是指对象的引用。应用程序通常更关心对象的值；在这种情况下，`equals()`
  方法是首选，因为它比较的是对象中包含的值，而不是对象的引用。


  比较运算符查看对象引用，并判断它是否指向与被比较的对象引用相同的对象。如果两个对象相等，则返回布尔值 true；否则，返回布尔值 false。在解决方案 1 中，`team1`
  对象引用与 `team2` 对象引用之间的第一次比较返回 false，因为这两个对象在内存中是分开的，即使它们包含相同的值。解决方案 1 中 `team3` 对象引用与
  `team4` 对象引用之间的第二次比较返回 true，因为这两个引用都指向 `team1` 对象。


  `equals()` 方法测试两个对象是否包含相同的值。要使用 `equals()` 方法进行比较，被比较的对象应重写 `Object` 类的 `equals()`
  和 `hashCode()` 方法。`equals()` 方法应实现对对象中包含的值的比较，这些值应能产生 true 的比较结果。以下代码是重写后的 `equals()`
  方法示例，已放入 `Team` 对象中。


  ```

  @Override

  public boolean equals(Object obj) {

  if (this == obj) {

  return true;

  }

  if (obj instanceof Team) {

  Team other = (Team) obj;

  return other.getName().equals(this.getName())

  && other.getCity().equals(this.getCity())

  && other.getPlayers().equals(this.getPlayers());

  } else {

  return false;

  }

  }

  ```


  如您所见，重写后的 `equals()` 方法首先检查作为参数传入的对象是否引用了与它进行比较的同一个对象。如果是，则返回 `true` 结果。如果两个对象在内存中不引用同一个对象，`equals()`
  方法会检查字段是否相等。在这种情况下，任何在 name 和 city 字段中包含相同值的两个 `Team` 对象都将被视为相等。一旦重写了 `equals()`
  方法，就可以执行两个对象的比较，如本技巧的解决方案 2 所示。


  `hashCode()` 方法返回一个 int 值，该值始终返回相同的整数。计算对象的 `hashCode` 有多种方法。在网上搜索这个主题，您会发现各种技术。实现
  `hashCode()` 方法最基本的方法之一是将对象的所有变量连接成字符串格式，并返回结果字符串的 `hashCode()`。最好缓存 `hashCode`
  的值以备后用，因为初始计算可能需要一些时间。解决方案 2 中的 `hashCode()` 方法演示了这种策略。


  考虑到有多种方法可以比较 Java 对象，这可能会变得令人困惑。如果您要进行的比较是针对对象标识的，请使用比较 (`==`) 运算符。但是，如果您想比较对象内部的值或对象的状态，那么
  `equals()` 方法是正确的选择。


  ## 5.12 扩展类的功能


  ### 问题


  您的某个应用程序包含一个类，您希望将其用作另一个类的基类。您希望新类包含与该基类相同的功能，但同时包含额外的功能。




  ### 解决方案


  通过使用 `extends` 关键字，后跟要扩展的类名，来扩展基类的功能。以下示例展示了两个类。第一个类名为 `HockeyStick`，代表一个曲棍球杆对象。第二个类名为
  `WoodenStick`，它扩展了第一个类。通过这种方式，`WoodenStick` 类继承了 `HockeyStick` 类中的所有属性和功能，但私有变量和具有默认访问级别的变量除外。`WoodenStick`
  类成为 `HockeyStick` 的子类。首先，让我们看一下 `HockeyStick` 类，它包含标准曲棍球杆的基本属性。


  ```

  public class HockeyStick {

  private int length;

  private boolean curved;

  private String material;

  public HockeyStick(int length, boolean curved, String material){

  this.length = length;

  this.curved = curved;

  this.material = material;

  }

  /**

  * @return the length

  */

  public int getLength() {

  return length;

  }

  /**

  * @param length the length to set

  */

  public void setLength(int length) {

  this.length = length;

  }

  /**

  * @return the curved

  */

  public boolean isCurved() {

  return curved;

  }

  /**

  * @param curved the curved to set

  */

  public void setCurved(boolean curved) {

  this.curved = curved;

  }

  /**

  * @return the material

  */

  public String getMaterial() {

  return material;

  }

  /**

  * @param material the material to set

  */

  public void setMaterial(String material) {

  this.material = material;

  }

  }

  ```


  接下来，看一下 `HockeyStick` 的子类，一个名为 `WoodenStick` 的类。


  ```

  public class WoodenStick extends HockeyStick {

  private static final String material = "WOOD";

  private int lie;

  private int flex;

  public WoodenStick(int length, boolean isCurved){

  super(length, isCurved, material);

  }

  public WoodenStick(int length, boolean isCurved, int lie, int flex){

  super(length, isCurved, material);

  this.lie = lie;

  this.flex = flex;

  }

  /**

  * @return the lie

  */

  public int getLie() {

  return lie;

  }

  /**

  * @param lie the lie to set

  */

  public void setLie(int lie) {

  this.lie = lie;

  }

  /**

  * @return the flex

  */

  public int getFlex() {

  return flex;

  }

  /**

  * @param flex the flex to set

  */

  public void setFlex(int flex) {

  this.flex = flex;

  }

  }

  ```


  注意


  在此示例中，我们假设可能存在多种类型的 `HockeyStick`。在这种情况下，我们扩展 `HockeyStick` 来创建 `WoodenStick`，但我们也可以扩展
  `HockeyStick` 来创建其他类型的 `HockeyStick`，例如 `AluminumStick` 或 `GraphiteStick`。


  ### 工作原理


  对象继承是任何面向对象语言中的基本技术。从基类继承很有价值，因为它允许代码在多个地方重用。这有助于使代码管理更加容易。如果在基类中进行了更改，它会自动被子类继承。另一方面，如果你的应用程序中散布着重复的功能，一个微小的更改可能意味着你必须在许多地方更改代码。对象继承还可以轻松地将一个基类指定给一个或多个子类，以便每个类可以包含相似的字段和功能。


  Java 语言允许一个类仅扩展另一个类。这在概念上不同于其他语言，例如 C++，后者包含多重继承。尽管有些人将单类继承视为对语言的阻碍，但它的设计目的是为语言增加安全性和易用性。当一个子类包含多个超类时，可能会产生混淆。


  ## 5.13 定义供类扩展的模板


  ### 问题


  你想要定义一个模板，用于生成包含类似功能的对象。


  ### 解决方案


  定义一个 `abstract` 类，其中包含可在其他类中使用的字段和功能。`abstract` 类还可以包含未实现的方法，称为 *抽象方法*，这些方法需要由 `abstract`
  类的子类来实现。以下示例演示了 `abstract` 类的概念。示例中的 `abstract` 类代表一个团队日程表，它包含每个团队日程表都需要使用的一些基本字段声明和功能。然后，`TeamSchedule`
  类扩展了 `Schedule` 类，该类为每个团队实现了特定的功能。首先，让我们看一下 `abstract Schedule` 类。


  ```

  public abstract class Schedule {

  public String scheduleYear;

  public String teamName;

  public List teams;

  public Map gameMap;

  public Schedule(){}

  public Schedule(String teamName){

  this.teamName = teamName;

  }

  abstract void calculateDaysPlayed(int month);

  }

  ```


  接下来，`TeamSchedule` 扩展了 `abstract` 类的功能。


  ```

  public class TeamSchedule extends Schedule {

  public TeamSchedule(String teamName) {

  super(teamName);

  }

  @Override

  void calculateDaysPlayed(int month) {

  int totalGamesPlayedInMonth = 0;

  for (Map.Entry entry : gameMap.entrySet()) {

  if (entry.getKey().equals(teamName)

  && entry.getValue().getMonth().equals(month)) {

  totalGamesPlayedInMonth++;

  }

  }

  System.out.println("Games played in specified month: " + totalGamesPlayedInMonth);

  }

  }

  ```


  如你所见，`TeamSchedule` 类可以使用 `abstract Schedule` 类中包含的所有字段和方法。它还实现了 `Schedule` 类中包含的
  `abstract` 方法。


  ### 工作原理


  抽象类被如此标记，它们包含可在子类中使用的字段声明和方法。它们与常规类的不同之处在于，它们包含 `abstract` 方法，这些方法是只有声明而没有实现的方法。本方案中的解决方案包含一个名为
  `calculateDaysPlayed()` 的 `abstract` 方法。抽象类可以包含也可以不包含 `abstract` 方法。它们也可以包含字段和完全实现的方法。抽象类不能被实例化；其他类只能扩展它们。当一个类扩展一个
  `abstract` 类时，它会获得 `abstract` 类的所有字段和功能。但是，在 `abstract` 类中声明的任何 `abstract` 方法都必须由子类实现。


  你可能会想，为什么 `abstract` 类不直接包含该方法的实现，以便其所有子类都可以使用它。如果你思考一下这个概念，就会发现这完全合理。一种类型的对象可能以不同于另一种对象的方式执行任务。使用
  `abstract` 方法强制扩展 `abstract` 类的类实现它，但它允许自定义实现方式的能力。


  ## 5.14 增强类的封装性


  ### 问题


  你的一个类需要使用另一个类的功能。但是，没有其他类需要使用相同的功能。与其创建一个包含此额外功能的单独类，不如生成一个只能由需要它的类使用的实现，同时将代码放在一个逻辑位置。




  ### 解决方案


  在需要其功能的类内部创建一个*内部类*。


  ```

  import java.util.ArrayList;

  import java.util.List;

  /**

  * 内部类示例。此示例演示了如何使用内部类对象构建团队对象。

  *

  * @author juneau

  */

  public class TeamInner {

  private Player player;

  private List playerList;

  private int size = 4;

  /**

  * 表示 Player 对象的内部类

  */

  class Player {

  private String firstName ;

  private String lastName ;

  private String position ;

  private int status = -1;

  public Player() {

  }

  public Player(String position, int status) {

  this.position = position;

  this.status = status;

  }

  protected String playerStatus() {

  String returnValue = null;

  switch (getStatus()) {

  case 0:

  returnValue = "ACTIVE";

  break;

  case 1:

  returnValue = "INACTIVE";

  break;

  case 2:

  returnValue = "INJURY";

  break;

  default:

  returnValue = "ON_BENCH";

  break;

  }

  return returnValue;

  }

  public String playerString() {

  return getFirstName() + " " + getLastName() + " - " + getPosition();

  }

  /**

  * @return the firstName

  */

  public String getFirstName() {

  return firstName;

  }

  /**

  * @param firstName the firstName to set

  */

  public void setFirstName(String firstName) {

  this.firstName = firstName;

  }

  /**

  * @return the lastName

  */

  public String getLastName() {

  return lastName;

  }

  /**

  * @param lastName the lastName to set

  */

  public void setLastName(String lastName) {

  this.lastName = lastName;

  }

  /**

  * @return the position

  */

  public String getPosition() {

  return position;

  }

  /**

  * @param position the position to set

  */

  public void setPosition(String position) {

  this.position = position;

  }

  /**

  * @return the status

  */

  public int getStatus() {

  return status;

  }

  /**

  * @param status the status to set

  */

  public void setStatus(int status) {

  this.status = status;

  }

  @Override

  public String toString(){

  return this.firstName + " " + this.lastName + " - "+

  this.position + ": " + this.playerStatus();

  }

  }

  public TeamInner() {

  final int ACTIVE = 0;

  // 实际上，这里可能会使用循环从数据库读取记录……但在此示例中，我们将手动输入球员数据。

  playerList = new ArrayList();

  playerList.add(constructPlayer("Josh", "Juneau", "Right Wing", ACTIVE));

  playerList.add(constructPlayer("Joe", "Blow", "Left Wing", ACTIVE));

  playerList.add(constructPlayer("John", "Smith", "Center", ACTIVE));

  playerList.add(constructPlayer("Bob","Coder", "Defense", ACTIVE));

  playerList.add(constructPlayer("Jonathan", "Gennick", "Goalie", ACTIVE));

  }

  public Player constructPlayer(String first, String last, String position, int status){

  Player player = new Player();

  player.firstName = first;

  player.lastName = last;

  player.position = position;

  player.status = status;

  return player;

  }

  public List getPlayerList() {

  return this.playerList;

  }

  public static void main(String[] args) {

  TeamInner inner = new TeamInner();

  System.out.println("Team Roster");

  System.out.println("===========");

  for(Player player:inner.getPlayerList()){

  System.out.println(player.playerString());

  }

  }

  }

  ```


  运行此代码的结果会列出团队中的球员。


  ```

  Team Roster

  ===========

  Josh Juneau - Right Wing

  Joe Blow - Left Wing

  John Smith - Center

  Bob Coder - Defense

  Jonathan Gennick - Goalie

  ```


  ### 工作原理


  有时，将功能封装在单个类中非常重要。为仅在一个其他类中使用的功能单独创建一个类是没有意义的。想象一下，你正在开发一个 GUI，并且需要使用一个类来支持一个按钮的功能。如果该按钮类中没有可重用的代码，那么创建一个单独的类并将该功能暴露给其他类使用是没有意义的。相反，将该类封装在需要该功能的类内部才是有意义的。这种理念就是内部类（也称为*嵌套类*）的一个用例。


  内部类是一个包含在另一个类内部的类。内部类可以像其他任何类一样被声明为 `public`、`private` 或 `protected`。它可以包含与普通类相同的功能；唯一的区别在于内部类包含在一个封闭类中，该封闭类也被称为*外部类*。本方案中的示例演示了这种技术。`TeamInner`
  类包含一个名为 `Player` 的内部类。`Player` 类是一个表示 `Player` 对象的 JavaBean 类。`Player` 对象可以继承其包含类的功能，包括其
  `private` 字段。这是因为内部类包含对外部类的隐式引用。它也可以通过包含 `TeamInner` 类来访问，正如 `constructPlayer()`
  方法中所演示的那样。


  ```

  public Player constructPlayer(String first, String last, String position, int status){

  Player player = new Player();

  player.firstName = first;

  player.lastName = last;

  player.position = position;

  player.status = status;

  return player;

  }

  ```


  外部类可以根据需要多次实例化内部类。在示例中，`constructPlayer()` 方法可以被调用任意次数，每次都会实例化一个新的内部类实例。然而，当外部类被实例化时，并不会实例化任何内部类实例。类似地，当外部类不再使用时，所有内部类实例都会被销毁。


  内部类可以通过引用外部类及其想要调用的方法来引用外部类的方法。以下代码行使用本方案示例中表示的相同对象演示了这种引用。假设 `Player` 类需要从外部类获取球员列表，你可以编写类似如下的代码。


  ```

  TeamInner.this.getPlayerList();

  ```


  虽然不常用，但外部类以外的类可以通过以下语法访问 `public` 内部类。


  ```

  TeamInner outerClass = new TeamInner();

  outerClass.player = outerClass.new Player();

  ```


  静态内部类略有不同，它们不能直接引用其封闭类的任何实例变量或方法。以下是一个静态内部类的示例。


  ```

  public class StaticInnerExample {

  static String hello = "Hello";

  public static void sayHello(){

  System.out.println(hello);

  }

  static class InnerExample {

  String goodBye = "Good Bye";

  public void sayGoodBye(){

  System.out.println(this.goodBye);

  }

  }

  public static void main (String[] args){

  StaticInnerExample.sayHello();

  StaticInnerExample.InnerExample inner =

  new StaticInnerExample.InnerExample();

  inner.sayGoodBye();

  }

  }

  ```


  内部类有助于提供逻辑封装。此外，它们允许继承 `private` 字段，这是使用标准类无法实现的。


  ## 5.15 总结


  Java 是一种面向对象的语言。要充分利用该语言的能力，你必须学会精通面向对象编程。本章涵盖了诸如类创建和访问修饰符等基础知识。还涵盖了封装、接口以及帮助开发者利用面向对象强大功能的相关方案。




  '
- '# 6. Lambda 表达式


  创建匿名函数的一种便捷方式是使用 *lambda 表达式*，它通过一个表达式或一系列语句来实现。Lambda 表达式基于函数式接口构建，这类接口包含一个单一的抽象方法，且该方法没有实现体。


  它们可以应用于多种场景，从简单的匿名函数到对集合进行排序和过滤。此外，lambda 表达式可以赋值给变量，然后传递给其他对象。


  在本章中，你将学习如何创建 lambda 表达式，并会看到许多关于它们如何在常见场景中应用的示例。你还将学习如何生成 lambda 表达式的构建块，以便构建应用程序来促进其使用。阅读本章后，你将看到
  lambda 表达式对 Java 语言的影响。它们通过让开发者更高效，并在许多领域开辟新的可能性，使语言现代化。Lambda 表达式翻开了 Java 的新篇章，使这门语言与其他一些早已拥有类似结构的语言一样，焕发出新的光彩。这些语言为
  lambda 表达式在 Java 语言中的出现铺平了道路。毫无疑问，lambda 表达式将继续为许多优雅的解决方案铺平道路。


  注意


  函数式接口是在 Java 8 中引入的。它是一个恰好包含一个抽象方法的接口（即，任何只有一个抽象方法的接口都是函数式接口）。此外，建议函数式接口带有信息性的 `@FunctionalInterface`
  注解。


  ## 6.1 编写一个简单的 Lambda 表达式


  ### 问题


  你想要封装一个打印简单消息的功能。


  ### 解决方案


  编写一个 lambda 表达式，它接受一个包含要打印消息的单一参数，并在 lambda 内部实现打印功能。在以下示例中，一个函数式接口 `HelloType`
  通过 lambda 表达式实现，并赋值给 `helloLambda` 变量。最后，调用该 lambda，打印消息。


  ```

  public class HelloLambda {

  /**

  * 函数式接口

  */

  @FunctionalInterface

  public interface HelloType {

  /**

  * 将在 lambda 内部实现的函数

  * @param text

  */

  void hello(String text);

  }

  public static void main(String[] args){

  // 创建 lambda，向 hello() 方法传递一个名为 "text" 的参数，返回字符串。

  // 该 lambda 被赋值给 helloLambda 变量。

  HelloType helloLambda =

  (String text) -> {System.out.println("Hello " + text);};

  // 调用方法

  helloLambda.hello("Lambda");

  }

  }

  ```


  结果如下。


  ```

  Hello Lambda

  ```


  ### 工作原理


  Lambda 表达式是一个匿名的代码块，它封装了一个表达式或一系列语句，并返回一个结果。Lambda 表达式在其他一些语言中也称为*闭包*。它们可以接受零个或多个参数，这些参数可以带类型说明传递，也可以不带，因为类型可以从上下文中自动推导。


  Lambda 表达式的语法包括一个参数列表、一个语言中新增的字符“箭头标记”（`->`）和一个主体。以下模型表示了 lambda 表达式的结构。


  ```

  (argument list) -> { body }

  ```


  Lambda 表达式的参数列表可以包含零个或多个参数。如果没有参数，则使用一对空括号。如果只有一个参数，则不需要括号。列表中的每个参数可以包含可选的类型说明。如果省略了参数的类型，则类型从当前上下文中推导。


  在本配方的解决方案中，花括号包围了一个包含多个表达式的主体。如果主体只包含一个表达式，则不需要花括号。解决方案中的花括号本可以省略，但为了便于阅读而保留。主体被简单地求值然后返回。如果
  lambda 的主体是一个表达式而不是语句，则隐式包含 `return`。相反，如果主体包含多个语句，则必须指定 `return`，它标志着将控制权返回给调用者。


  以下代码演示了一个不包含任何参数的 lambda 表达式。


  ```

  StringReturn msg = () ->  "This is a test";

  ```


  lambda 使用的 `StringReturn` 接口也是一个函数式接口。


  ```

  /**

  * 返回字符串的函数式接口

  */

  @FunctionalInterface

  public interface StringReturn {

  String returnMessage();

  }

  ```


  让我们看看这个 lambda 表达式是如何工作的。在上面的代码中，从 lambda 表达式返回了一个 `StringReturn` 类型的对象。空括号表示没有参数传递给表达式。`return`
  是隐式的，字符串 `"This is a test"` 从 lambda 表达式返回给调用者。示例中的表达式被赋值给一个名为 `msg` 的变量。假设函数式接口
  `StringReturn` 包含一个标识为 `returnMessage()` 的抽象方法，如代码所示。在这种情况下，可以调用 `msg.returnMessage()`
  方法来返回该字符串。


  Lambda 表达式的主体可以包含普通方法可能包含的任何 Java 构造。例如，假设一个字符串作为参数传递给 lambda 表达式，并且你想要返回一个依赖于该字符串参数的某个值。以下
  lambda 表达式主体包含一个代码块，根据传递给表达式的参数（字符串值）返回一个 int。


  ```

  ActionCode code = (codestr) -> {

  switch(codestr){

  case "ACTIVE": return 0;

  case "INACTIVE": return 1;

  default:

  return -1;

  }

  };

  ```


  在这个例子中，`ActionCode` 函数式接口推断出 lambda 表达式的返回类型。为了澄清，让我们看看这个接口的样子。


  ```

  @FunctionalInterface

  public interface ActionCode{

  int returnCode(String codestr);

  }

  ```


  这段代码表明，lambda 表达式实现了 `ActionCode` 接口中定义的 `returnCode` 方法。该方法接受一个字符串参数（`codestr`），该参数被传递给
  lambda 表达式，并返回一个 int。因此，从这个例子中，你可以看到 lambda 可以封装一个方法体的功能。


  虽然不使用 lambda 表达式，用 Java 语言编写的代码也可以继续前进，但它们是重要的补充，极大地提高了整体的可维护性、可读性和开发者的生产力。Lambda
  表达式是 Java 语言的一次进化性变革，因为它们朝着语言现代化的方向又迈进了一步，并有助于使其与其他语言保持同步。


  注意


  Lambda 表达式可以包含普通 Java 方法包含的任何语句。但是，`continue` 和 `break` 关键字在 lambda 表达式的主体中是不合法的。


  ## 6.2 启用 Lambda 表达式的使用


  ### 问题


  你有兴趣编写能够启用 lambda 表达式使用的代码。




  ### 解决方案 1


  编写可通过 lambda 表达式实现的自定义函数式接口。所有 lambda 表达式都实现一个函数式接口（即仅包含一个抽象方法声明）。以下代码演示了一个包含单个方法声明的函数式接口。


  ```

  @FunctionalInterface

  public interface ReverseType {

  String reverse(String text);

  }

  ```


  该函数式接口包含一个抽象方法声明，标识为 `String reverse(String text)`。以下包含 lambda 表达式的代码演示了如何实现 `ReverseType`。


  ```

  ReverseType newText = (testText) -> {

  String tempStr = "";

  for (String part : testText.split(" ")) {

  tempStr += new StringBuilder(part).reverse().toString() + " ";

  }

  return tempStr;

  };

  ```


  以下代码可调用该 lambda 表达式。


  ```

  System.out.println(newText.reverse("HELLO WORLD"));

  ```


  这是运行结果。


  ```

  OLLEH DLROW

  ```


  ### 解决方案 2


  使用 `java.util.function` 包中包含的函数式接口来实现 lambda 表达式，以满足应用程序的需求。以下示例使用 `Function<T,R>`（其中
  T 是输入类型，R 是结果类型）接口执行与解决方案 1 中演示的相同任务。此示例接受一个字符串参数并返回一个字符串结果。


  ```

  Function newText2 = (testText) -> {

  String tempStr = "";

  for (String part : testText.split(" ")) {

  tempStr += new StringBuilder(part).reverse().toString() + " ";

  }

  return tempStr;

  };

  ```


  此 lambda 表达式被赋值给 `newText2` 变量，其类型为 `Function<String,String>`。因此，一个字符串作为参数传入，并从
  lambda 表达式返回一个字符串。`Function<T,R>` 的函数式接口包含一个名为 `apply()` 的抽象方法声明。要调用此 lambda 表达式，请使用以下语法。


  ```

  System.out.println(newText2.apply("HELLO WORLD"));

  ```


  以下是运行结果。


  ```

  OLLEH DLROW

  ```


  ### 工作原理


  lambda 表达式的基本构建块是函数式接口。这个标准的 Java 接口包含一个抽象方法声明，并为 lambda 表达式和方法引用提供了目标类型。函数式接口可以包含默认方法实现，但只能有一个抽象声明。然后，该抽象方法由
  lambda 表达式隐式实现。因此，lambda 表达式可以赋值给与函数式接口类型相同的变量。之后可以在该赋值变量上调用该方法，从而调用 lambda 表达式。遵循此模式，lambda
  表达式就是可以通过名称调用的方法实现。它们也可以作为参数传递给其他方法。


  此时，您可能会想，是否必须为每个可能适合使用 lambda 表达式的情况都开发一个函数式接口。事实并非如此，因为许多函数式接口已经可供使用。一些示例包括 `java.lang.Runnable`、`javafx.event.EventHandler<T
  extends Event>` 和 `java.util.Comparator<T>`。请参阅本章中的其他技巧，了解使用实现这些接口的 lambda 表达式的示例。然而，还有更多函数式接口不那么具体，使它们能够根据特定需求进行定制。`java.util.function`
  包包含几个在实现 lambda 表达式时可能有用的函数式接口。该包中包含的函数式接口在整个 JDK 中都有使用，也可以在开发人员应用程序中使用。利用 `java.util.function`
  包中包含的函数式接口可以大大减少您需要编写的代码量。这些函数式接口针对大多数情况下执行的任务进行了优化。它们还使用泛型编写，可以在许多不同的上下文中应用。解决方案
  2 演示了这样一个示例，其中 `Function<T,R>` 接口实现了一个接受字符串参数并返回字符串结果的 lambda 表达式。


  ## 6.3 按名称调用现有方法


  ### 问题


  您正在开发一个 lambda 表达式，它仅仅调用传递给 lambda 的对象中已存在的方法。与其编写调用该方法的完整仪式代码，不如使用最少的代码。


  ### 解决方案


  使用方法引用来调用现有方法，而不是编写 lambda 表达式。在以下场景中，`Player` 对象包含一个名为 `compareByGoal()` 的静态方法，该方法接受两个
  `Player` 对象并比较每个对象的进球数。然后返回一个表示结果的整数。`compareByGoal()` 方法与 `Comparator<T>` 相同。


  ```

  public class Player {

  private String firstName ;

  private String lastName ;

  private String position ;

  private int status = -1;

  private int goals;

  public Player(){

  }

  public Player(String position, int status){

  this.position = position;

  this.status = status;

  }

  public String findPlayerStatus(int status){

  String returnValue = null;

  switch(status){

  case 0:

  returnValue = "ACTIVE";

  case 1:

  returnValue = "INACTIVE";

  case 2:

  returnValue = "INJURY";

  default:

  returnValue = "ON_BENCH";

  }

  return returnValue;

  }

  public String playerString(){

  return getFirstName() + " " + getLastName() + " - " + getPosition();

  }

  // ** 为简洁起见，省略了 getter 和 setter **

  /**

  * 如果玩家 A 的进球数多于玩家 B，则返回正整数

  * 如果玩家 A 的进球数少于玩家 B，则返回负整数

  * 如果玩家 A 和玩家 B 的进球数相同，则返回零

  */

  public static int compareByGoal(Player a, Player b){

  int eval;

  if(a.getGoals() > b.getGoals()){

  eval = 1;

  } else if (a.getGoals() < b.getGoals()){

  eval = -1;

  } else {

  eval = 0;

  }

  return eval;

  }

  }

  ```


  `Player.compareByGoal()` 方法可以对 `Player` 对象数组进行排序。为此，将 `Player` 对象数组（`Player[]`）作为第一个参数传递给
  `Arrays.sort()` 方法，并将方法引用 `Player::compareByGoal` 作为第二个参数传递。结果将得到一个按进球数升序排列的 `Player`
  对象列表。以下代码行展示了如何完成此任务。


  ```

  Arrays.sort(teamArray, Player::compareByGoal);

  ```




  ### 工作原理


  假设你的 lambda 表达式将通过名称调用单个方法，并可能返回一个结果。如果 lambda 表达式符合这种情况，那么它就是使用方法引用的理想候选。方法引用是
  lambda 表达式的一种简化形式，它指定类名或实例名，后跟要调用的方法，格式如下。


  ```

  ::

  ```


  双冒号（`::`）运算符用于指定方法引用。由于方法引用是简化的 lambda 方法，因此它必须实现一个函数式接口。接口中的抽象方法必须与被引用的方法具有相同的参数列表和返回类型。任何参数随后都从方法引用的上下文中推导得出。例如，考虑与解决方案相同的场景，即希望通过调用
  `Player.compareByGoal()` 方法来执行进球数比较，从而对 `Player` 对象数组进行排序。以下代码可以通过 lambda 表达式实现此功能。


  ```

  Arrays.sort(teamArray, (p1, p2) -> Player.compareByGoal(p1,p2));

  ```


  在这段代码中，数组作为第一个参数传递给 `Arrays.sort()`。第二个参数是一个 lambda 表达式，它将两个 `Player` 对象传递给 `Player.compareByGoal()`
  方法。该 lambda 表达式使用了函数式接口 `Comparator<Player>.compare`，该接口利用了 `(Player, Player)` 参数列表。`compareByGoal()`
  方法包含相同的参数列表。同样，`compareByGoal()` 的返回类型与函数式接口中的返回类型匹配。因此，参数列表无需在代码中显式指定。它可以从 `Player::compareByGoal`
  方法引用的上下文中推断出来。


  方法引用有四种不同的类型。表 6-1 列出了每一种类型。


  表 6-1


  方法引用类型


  | 类型 | 描述 |

  | --- | --- |

  | 静态引用 | 使用对象的静态方法 |

  | 实例引用 | 使用对象的实例方法 |

  | 任意对象方法 | 用于特定类型的任意对象，而非特定对象 |

  | 构造器引用 | 通过使用 `new` 关键字调用构造器来生成新对象 |


  在解决方案中，演示了静态方法引用类型，因为 `compareByGoal()` 是 `Player` 类中的一个静态方法。也可以使用实例引用来调用对象实例的方法。考虑以下类，它包含一个用于比较
  `Player` 对象中进球数的非静态方法。


  ```

  public class PlayerUtility {

  public int compareByGoal(Player a, Player b){

  int eval;

  if(a.getGoals() > b.getGoals()){

  eval = 1;

  } else if (a.getGoals() < b.getGoals()){

  eval = -1;

  } else {

  eval = 0;

  }

  return eval;

  }

  }

  ```


  可以实例化此类，新的实例引用 `compareByGoals()` 方法，类似于本方案中使用的技术。


  ```

  Player[] teamArray2 = team.toArray(new Player[team.size()]);

  PlayerUtility utility = new PlayerUtility();

  Arrays.sort(teamArray2, utility::compareByGoal);

  ```


  假设你的应用程序包含一个任意类型的列表，并且你想对该列表中的每个对象应用一个方法。在这种情况下，如果对象包含适合通过引用使用的方法，则可以使用方法引用。在以下示例中，`Arrays.sort()`
  方法应用于一个整数值列表。一个方法引用将 `Integer compare()` 方法应用于列表中的元素。因此，结果列表被排序，并且方法引用自动传递整数参数并返回整数比较结果。


  ```

  Integer[] ints = {3,5,7,8,51,33,1};

  Arrays.sort(ints, Integer::compare);

  ```


  最后一种方法引用类型可用于引用对象的构造器。当通过工厂创建新对象时，这种类型的方法引用尤其有用。让我们看一个例子。假设 `Player` 对象包含以下构造器。


  ```

  public Player(String position, int status, String first, String last){

  this.position = position;

  this.status = status;

  this.firstName = first;

  this.lastName = last;

  }

  ```


  你想使用工厂模式动态生成 `Player` 对象。以下代码演示了一个函数式接口的示例，该接口包含一个名为 `createPlayer()` 的抽象方法，该方法接受与
  `Player` 对象构造器相同的参数列表。


  ```

  @FunctionalInterface

  public interface PlayerFactory {

  Player createPlayer(String position,

  int status,

  String firstName,

  String lastName);

  }

  ```


  现在可以从 lambda 表达式创建工厂，然后创建新对象。以下几行代码演示了这一点。


  ```

  PlayerFactory player1 = Player::new;

  Player newPlayer = player1.createPlayer("CENTER", 0, "Constructor", "Referenceson");

  ```


  Java 8 中引入的双冒号运算符（`::`）简化了新实例的创建。尽管 lambda 表达式有更多的用例，但方法引用可能是 Java 8 中引入的最重要的新特性之一。它们提供了一种易于阅读、简化的技术来生成
  lambda 表达式，并且在大多数 lambda 仅通过名称调用单个方法的情况下都能很好地工作。


  ## 6.4 用更少的代码行进行排序


  ### 问题


  你的应用程序包含一个曲棍球队的 `Player` 对象列表。你想按照进球数最多的球员对该列表进行排序，并且希望使用简洁且易于理解的代码来实现。


  ### 解决方案 1


  使用 `Player` 对象中包含的访问器方法为要排序的字段创建一个比较器。在这种情况下，你想按进球数排序，因此比较器应基于 `getGoals()` 返回的值。以下代码行展示了如何使用
  `Comparator` 接口和方法引用来创建这样的比较器。


  ```

  public static void main(String[] args) {

  loadTeam();

  Comparator byGoals = Comparator.comparing(Player::getGoals);

  ```


  接下来，结合使用 lambda 表达式和流（有关流的更多信息，请参见第 7 章）以及 `forEach()` 方法，对 `Player` 对象列表应用指定的排序。在以下代码行中，从列表中获取一个流，这允许你对元素应用函数式风格的操作。


  ```

  team.stream().sorted(byGoals)

  .map(p -> p.getFirstName() + " " + p.getLastName() + " - "

  + p.getGoals())

  .forEach(element -> System.out.println(element));

  ```


  假设由 `team` 引用的列表已加载了 `Player` 对象，则上一行代码首先按球员进球数对该列表进行排序，然后打印每个对象的信息。


  以下是排序结果。


  ```

  == 按进球数排序 ==

  Jonathan Gennick - 1

  Josh Juneau - 5

  Steve Adams - 7

  Duke Java - 15

  Bob Smith - 18

  ```




  ### 解决方案 2


  利用 `Collections.sort()` 方法，传入待排序的列表以及一个用于比较列表元素的 lambda 表达式。以下代码演示了如何使用 `Collections.sort()`
  技术完成此任务。


  ```

  public static void main(String[] args) {

  loadTeam();

  Collections.sort(team, (p1, p2)

  -> p1.getLastName().compareTo(p2.getLastName()));

  team.stream().forEach((p) -> {

  System.out.println(p.getLastName());

  });

  ```


  以下是运行结果。


  ```

  == 按姓氏排序 ==

  Adams

  Gennick

  Java

  Juneau

  Smith

  其中 loadTeam 函数为：

  public class Sorter {

  static List team;

  private static void loadTeam() {

  System.out.println("Loading team...");

  team = new ArrayList();

  Player player1 = new Player();

  player1.setFirstName("Josh");

  player1.setLastName("Juneau");

  player1.setGoals(5);

  Player player2 = new Player();

  player2.setFirstName("Duke");

  player2.setLastName("Java");

  player2.setGoals(15);

  Player player3 = new Player();

  player3.setFirstName("Jonathan");

  player3.setLastName("Gennick");

  player3.setGoals(1);

  Player player4 = new Player();

  player4.setFirstName("Bob");

  player4.setLastName("Smith");

  player4.setGoals(18);

  Player player5 = new Player();

  player5.setFirstName("Steve");

  player5.setLastName("Adams");

  player5.setGoals(7);

  team.add(player1);

  team.add(player2);

  team.add(player3);

  team.add(player4);

  team.add(player5);

  }

  ...

  }

  ```


  ### 工作原理


  Java 8 引入了新特性，极大地提升了开发者对集合进行排序的效率。本解决方案中演示了三个特性：lambda 表达式、方法引用和流。我们将在本书的其他章节中更详细地探讨流，但此处也会简要介绍以帮助理解本方案。流可应用于数据集合，并允许对集合中的元素应用增强的函数式操作。流本身不存储任何数据，而是为从流中获取的集合提供更多功能。


  在解决方案 1 中，生成了一个比较器，用于评估 `Player` 对象的进球数（`getGoals`）。然后，从作为团队引用的 `List<Player>` 生成一个流。该流提供了
  `sorted()` 函数，该函数接受一个比较器来对数据流进行排序。最初生成的比较器被传递给 `sorted()` 函数，然后对结果调用 `map()` 函数。`map()`
  函数可以对流中的每个元素应用一个表达式。因此，在 map 中，该解决方案利用 lambda 表达式创建了一个包含每个 `Player` 对象的 `firstName`、`lastName`
  和 `goals` 字段的字符串。最后，由于 `List<Player>` 是可迭代的，它包含了 `forEach()` 方法。`forEach()` 方法允许对列表中的每个元素应用一个表达式或一组语句。在此例中，列表中的每个元素都会被打印到命令行。由于
  `map()` 函数已应用于流，列表中的每个元素随后会根据 `map()` 中应用的算法进行打印。最终结果是，球员的名字、姓氏以及每个球员的进球数都会被打印在命令行上。


  解决方案 2 使用了不同的技术来完成类似的任务。在列表上调用了 `Collections.sort()` 方法。`Collections.sort()` 的第一个参数是列表本身，第二个参数是以
  lambda 表达式形式实现的比较逻辑。此例中的 lambda 表达式接收两个参数，均为 `Player` 对象，并比较第一个球员的姓氏与第二个球员的姓氏。因此，排序是基于
  `Player` 对象的 `lastName` 字段按升序进行的。为了完成解决方案 2，排序后的列表被打印出来。为此，从排序后的列表生成一个流，然后对流数据调用
  `forEach()` 方法，打印出每个球员的姓氏。


  ## 6.5 过滤数据集合


  ### 问题


  你有一个数据列表，希望对其应用一些过滤，以便提取出符合指定条件的对象。


  ### 解决方案


  从数据列表创建一个流，并应用过滤器，传入所需的谓词（也称为*条件表达式*）。最后，将每个符合指定过滤条件的对象添加到一个新列表中。在以下示例中，对一个 `Player`
  对象列表进行过滤，仅捕获那些进球数达到十个或以上的球员。


  ```

  public static void main(String[] args){

  loadTeam();

  // 创建数组存储匹配结果

  List gteTenGoals = new ArrayList();

  team.stream().filter(

  p -> p.getGoals() >= 10

  && p.getStatus() == 0)

  .forEach(element -> gteTenGoals.add(element));

  System.out.println("符合筛选条件的球员数量: " + gteTenGoals.size());

  其中 loadTeam 函数为：

  public class Filter {

  static List team;

  private static void loadTeam() {

  System.out.println("Loading team...");

  team = new ArrayList();

  Player player1 = new Player();

  player1.setFirstName("Josh");

  player1.setLastName("Juneau");

  player1.setGoals(5);

  player1.setStatus(0);

  Player player2 = new Player();

  player2.setFirstName("Duke");

  player2.setLastName("Java");

  player2.setGoals(15);

  player2.setStatus(0);

  Player player3 = new Player();

  player3.setFirstName("Jonathan");

  player3.setLastName("Gennick");

  player3.setGoals(1);

  player3.setStatus(0);

  Player player4 = new Player();

  player4.setFirstName("Bob");

  player4.setLastName("Smith");

  player4.setGoals(18);

  player4.setStatus(0);

  Player player5 = new Player();

  player5.setFirstName("Steve");

  player5.setLastName("Adams");

  player5.setGoals(7);

  player5.setStatus(1);

  team.add(player1);

  team.add(player2);

  team.add(player3);

  team.add(player4);

  team.add(player5);

  }

  ```


  ### 工作原理


  本方案的解决方案利用了数据流，因为它包含一个易于使用的过滤函数。数据集合 `team` 生成一个流，然后对其调用过滤函数，该函数接受一个谓词来过滤集合中的数据。该谓词以
  lambda 表达式形式编写，包含两个过滤条件。lambda 表达式将 `Player` 对象作为参数传入，然后根据进球数大于等于十以及活跃状态来过滤数据。


  数据过滤完成后，`forEach()` 方法将每个符合过滤条件的元素添加到一个列表中。这也是使用 lambda 表达式完成的。要添加到列表中的元素作为参数传递给
  lambda 表达式，随后在表达式主体内被添加到列表中。


  Lambda 表达式非常适合在流函数中使用。它们不仅使业务逻辑的开发更加容易，还使集合过滤更易于阅读和维护。


  ## 6.6 实现 Runnable


  ### 问题


  你想以简洁的方式创建一段可运行的代码。




  ### 解决方案


  利用 lambda 表达式实现 `java.util.Runnable` 接口。`java.util.Runnable` 接口非常适合 lambda 表达式，因为它只包含一个抽象方法
  `run()`。本方案对比了传统技术（创建新的 `Runnable` 接口）和使用 lambda 表达式的新技术。


  以下代码演示了如何使用传统技术实现一段新的 `Runnable` 代码。


  ```

  public static void main(String[] args) {

  Runnable oldRunnable = new Runnable() {

  @Override

  public void run() {

  int x = 5 * 3;

  System.out.println("The variable using the old way equals: " + x);

  }

  };

  Runnable lambdaRunnable = () -> {

  int x = 5 * 3;

  System.out.println("The variable using the lambda equals: " + x);

  };

  // 调用 runnable

  oldRunnable.run();

  lambdaRunnable.run();

  }

  ```


  以下是输出结果。


  ```

  The variable using the old way equals: 15

  The variable using the lambda equals: 15

  ```


  现在来看看如何使用 lambda 表达式来编写这段代码。


  ```

  Runnable lambdaRunnable = () -> {

  int x = 5 * 3;

  System.out.println("The variable using the lambda equals: " + x);

  };

  ```


  如你所见，实现 `Runnable` 的传统过程比使用 lambda 表达式实现 `Runnable` 需要多写几行代码。lambda 表达式也使 `Runnable`
  的实现更易于阅读和维护。


  ### 工作原理


  由于 `java.util.Runnable` 是一个函数式接口，实现 `run()` 方法的样板代码可以使用 lambda 表达式进行抽象。以下是使用 lambda
  表达式实现 `Runnable` 的通用格式。


  ```

  Runnable assignment = () -> {expression or statements};

  ```


  `Runnable` 接口可以使用一个零参数的 lambda 表达式来实现，该表达式在 lambda 主体中包含一个表达式或一系列语句。关键在于该实现不接受任何参数且不返回任何内容。


  ## 6.7 从 Lambda 表达式访问类变量


  ### 问题


  你正在编写的类包含实例变量，并且你希望这些变量能够通过类内的 lambda 表达式使用。


  ### 解决方案


  根据需要，在 lambda 表达式中使用封闭类中包含的实例变量。在下面的类中，`VariableAccessInner.InnerClass.lambdaInMethod()`
  方法中包含的 lambda 表达式可以访问所有封闭类的实例变量。因此，如果需要，它可以打印 `VariableAccessInner CLASSA` 变量。


  ```

  public class VariableAccessInner {

  public String CLASSA = "Class-level A";

  class InnerClass {

  public String CLASSA = "Class-level B";

  void lambdaInMethod(String passedIn) {

  String METHODA = "Method-level A";

  Consumer l1 = x -> {

  System.out.println(x);

  System.out.println("CLASSA Value: " + CLASSA);

  System.out.println("METHODA Value: " + METHODA);

  };

  l1.accept(CLASSA);

  l1.accept(passedIn);

  }

  }

  }

  ```


  现在，使用以下代码执行 `lambdaInMethod`。


  ```

  VariableAccessInner vai = new VariableAccessInner();

  VariableAccessInner.InnerClass inner = vai.new InnerClass();

  inner.lambdaInMethod("Hello");

  ```


  主类如下所示。


  ```

  public class MainClass {

  public static void main(String[] args){

  System.out.println("==VariableAccessInner==");

  VariableAccessInner vai = new VariableAccessInner();

  VariableAccessInner.InnerClass inner = vai.new InnerClass();

  inner.lambdaInMethod("Hello");

  }

  }

  ```


  以下是结果。


  ```

  ==VariableAccessInner==

  Class-level B

  CLASSA Value: Class-level B

  METHODA Value: Method-level A

  Hello

  CLASSA Value: Class-level B

  METHODA Value: Method-level A

  ```


  注意


  `CLASSA` 变量被 `InnerClass` 类中使用相同标识符的变量覆盖了。因此，属于 `VariableAccessInner` 的 `CLASSA`
  实例变量不会在 lambda 表达式内被打印。


  ### 工作原理


  Lambda 表达式可以访问位于封闭类中的变量。因此，类方法中包含的 lambda 表达式可以访问封闭类的任何实例变量。Lambda 表达式不会添加额外的作用域，因此它可以访问封闭作用域的字段、方法和局部变量。在解决方案中，`lambdaInMethod()`
  方法中包含的 lambda 表达式可以访问在两个类中声明的所有字段。这是因为内部类和外部类都封闭了该 lambda。需要注意的一点是，如果内部类包含一个与外部类中声明的变量同名的实例变量，那么
  lambda 会使用其封闭类的变量。因此，在解决方案中，从 lambda 表达式内部访问的是 `InnerClass CLASSA` 字段，而不是外部类的引用。


  从 lambda 表达式内部引用的局部变量必须是 final 或 effectively final 的。当 lambda 表达式试图访问在封闭方法上下文中被更改的变量时，会发生错误。例如，假设解决方案中的方法被更改为以下内容。


  ```

  void lambdaInMethod(String passedIn) {

  String METHODA = "Method-level A";

  passedIn = "test";

  Consumer l1 = x -> {

  System.out.println(x);

  System.out.println("CLASSA Value: " + CLASSA);

  System.out.println("METHODA Value: " + METHODA);

  System.out.println(passedIn);

  };

  l1.accept(CLASSA);

  l1.accept(passedIn);

  }

  ```


  请注意，在调用 lambda 表达式之前，传递给 `lambdaInMethod()` 的字符串被赋予了新值。因此，`passedIn` 变量不再是 effectively
  final 的，并且 lambda 表达式不能引入新的作用域级别。因此，lambda 表达式无法从表达式上下文内部访问 `passedIn` 变量。


  ## 6.8 将 Lambda 表达式传递给方法


  ### 问题


  已经创建了一个 lambda 表达式来封装某些功能。你希望将该功能作为参数传递给一个方法，以便该方法实现可以利用该表达式。




  ### 解决方案


  通过实现函数式接口并将 lambda 表达式赋值给与该接口类型相同的变量，可以创建可移植的函数。该变量可以作为参数传递给其他对象。


  下面的 `PassingLambdaFunctions` 类包含一个 `calculate()` 方法，该方法可以对给定的值数组执行任意类型的计算。请注意，`calculate()`
  方法接受一个 `Function<List<Double>,Double>` 和一个 `Double` 值数组作为参数。


  ```

  public class PassingLambdaFunctions {

  /**

  * 根据传入的计算函数计算一个值。

  * @param f1 Double 输入值

  * @param args  Double 输入值

  * @return

  */

  public Double calculate(Function, Double> f1,

  Double [] args){

  Double returnVal;

  List varList = new ArrayList();

  int idx = 0;

  while (idx < args.length){

  varList.add(args[idx]);

  idx++;

  }

  returnVal=f1.apply(varList);

  return returnVal;

  }

  }

  ```


  要使用 `calculate` 方法，必须将一个实现了 `Function<List<Double>,Double>` 的 lambda 表达式作为第一个参数传递给
  `calculate()` 方法，同时传递一个包含计算所需值的 `Double` 参数数组。在下面的类中，使用 lambda 表达式生成了一个用于计算体积的函数。它被赋值给一个标识为
  `volumeCalc` 的 `Function<List<Double>,Double>` 类型变量。另一个 lambda 表达式创建了一个用于计算面积的函数，并将其赋值给一个相同类型、标识为
  `areaCalc` 的变量。在单独的调用中，这些变量与一个值数组一起被传递给 `PassingLambdaFunctions.calculate()` 方法，从而得到计算结果。


  ```

  public class MainClass {

  public static void main(String[] args){

  double x = 16.0;

  double y = 30.0;

  double z = 4.0;

  // 使用 lambda 创建体积计算函数。计算器会检查数组是否包含计算所需的三个必要元素。

  Function, Double> volumeCalc = list -> {

  if(list.size() == 3){

  return list.get(0) * list.get(1) * list.get(2);

  } else {

  return Double.valueOf("-1");

  }

  };

  Double[] argList = new Double[3];

  argList[0] = x;

  argList[1] = y;

  argList[2] = z;

  // 使用 lambda 创建面积计算函数。这个特定的计算器会检查数组是否只包含两个元素。

  Function, Double> areaCalc = list -> {

  if(list.size() == 2){

  return list.get(0) * list.get(1);

  } else {

  return Double.valueOf("-1");

  }

  };

  Double[] argList2 = new Double[2];

  argList2[0] = x;

  argList2[1] = y;

  PassingLambdaFunctions p1 = new PassingLambdaFunctions();

  // 将 lambda 表达式和参数列表传递给 calculate() 方法。

  System.out.println("体积是: " + p1.calculate(volumeCalc, argList));

  System.out.println("面积是: " + p1.calculate(areaCalc, argList2));

  }

  }

  ```


  以下是输出结果。


  ```

  体积是: 1920.0

  面积是: 480.0

  ```


  ### 工作原理


  Lambda 表达式可以赋值给与所实现的函数式接口类型相同的变量。此类表达式可以包含单行表达式或多语句体。由于 lambda 表达式可以接受参数，因此存在一些用例，可以将此类表达式赋值给变量，然后将这些变量传递给其他对象以修改功能。这种模式对于创建包含多个实现的解决方案非常有用。本技巧的解决方案演示了这一概念。


  在解决方案中，`PassingLambdaFunctions` 类包含一个 `calculate()` 方法，该方法对作为参数传入的 `Double` 值执行计算。然而，`calculate()`
  方法本身不包含任何计算功能。相反，计算功能是通过 lambda 表达式以 `Function<List<Double>,Double>` 类型的参数形式传递的。此类型是
  `java.util.function` 包中的标准函数式接口之一，该接口可以由 lambda 表达式实现，然后通过调用其唯一的 `apply()` 方法来调用。查看
  `calculate()` 方法中的代码，首先将 `Double[]` 中包含的参数添加到一个列表中。接着，调用 lambda 表达式的 `apply()` 方法，传入新的值列表，并将结果返回到
  `returnVal` 中。最后，将 `returnVal` 返回给方法调用者。


  ```

  returnVal=f1.apply(varList);

  return returnVal;

  ```


  为了在解决方案中实现计算功能，在另一个名为 `MainClass` 的类中创建了 lambda 表达式。每个表达式接受一个参数列表，然后计算列表中的值，并返回结果。例如，在
  `MainClass` 中生成的第一个 lambda 通过将参数列表中的所有值相乘来计算体积并返回结果。然后，此功能被赋值给一个 `Function<List<Double>,Double>`
  类型的变量，随后被传递到 `PassingLambdaFunctions.calculate()` 方法中。


  任何功能都可以在 lambda 表达式中实现，然后传递给不同的对象使用。这是促进代码重用和高可维护性的绝佳方式。


  ## 6.9 局部变量


  ### 问题


  您希望跳过参数类型，使用 `var` 局部变量。


  ### 解决方案


  您可以跳过参数类型，将 lambda 从以下形式


  ```

  (String str1, String str2) -> s1 + s2

  ```


  重写为以下形式。


  ```

  (var str1, var str2) -> str1 + str2

  ```


  您可以使用 `var` 将技巧 6-1 重写为以下形式。


  ```

  public static void main(String[] args){

  // 创建 lambda，将一个名为 "text" 的参数传递给

  // hello() 方法，返回该字符串。该 lambda 被赋值给

  // helloLambda 变量。

  HelloType helloLambda =

  (var text) -> {System.out.println("Hello " + text);};

  // 调用方法

  helloLambda.hello("Lambda");

  }

  ```


  以下是输出结果。


  ```

  Hello Lambda

  ```


  在这种情况下，变量 `text` 的类型由编译器根据上下文推断，输出结果相同。它不会产生警告或错误。


  ### 工作原理


  Java 11 引入了用于 lambda 参数的局部变量语法，以使隐式类型 lambda 表达式中的参数声明语法与局部变量声明语法保持一致。这无疑使我们的代码*更*具可读性。有关
  `var` 关键字的更多信息，请参阅 [`https://openjdk.java.net/jeps/323`](https://openjdk.java.net/jeps/323)
  上的文档。


  ## 6.10 Switch 表达式


  ### 问题


  您希望高效地使用 switch 表达式，而无需使用 `break`。


  ### 解决方案


  您可以简单地为您的表达式使用 lambda 风格的语法。因此，您可以将 lambda 从以下形式


  ```

  switch(input_variable) {

  case one:

  returnValue = 12

  break;

  case two:

  returnValue = 75

  break;

  default:

  // default 块的代码

  }

  ```


  重写为以下形式：


  ```

  int numLetters = switch (input_variable) {

  case one -> 12;

  case two -> 75;

  default -> {// default 块的代码 }

  };

  ```


  您可以使用 lambda 风格的语法将技巧 6-4 从以下 switch 表达式


  ```

  switch(status){

  case 0:

  returnValue = "ACTIVE";

  case 1:

  returnValue = "INACTIVE";

  case 2:

  returnValue = "INJURY";

  default:

  returnValue = "ON_BENCH";

  }

  ```


  重写为以下形式。


  ```

  returnValue =switch(status){

  case 0  -> "ACTIVE";

  case 1  -> "INACTIVE";

  case 2  -> "INJURY";

  default -> "ON_BENCH";

  };

  ```


  输出结果相同。


  ### 工作原理


  此增强功能在 Java 12 中提出，并在 Java 14 (JEP 361) 中正式发布。此功能引入了一种新形式的 switch 标签，如果匹配到该标签，则仅执行标签右侧（`->`）的代码。


  有关 `var` 关键字的信息，请参阅 [`https://openjdk.java.net/jeps/361`](https://openjdk.java.net/jeps/361)
  上的文档。




  ## 6.11 小结


  Lambda 表达式在 Java 8 中引入，为 Java 语言注入了新的活力，提供了过去 Java 开发者无法获得的能力。无论是桌面、移动还是企业级应用的开发者，现在都可以利用
  lambda 表达式来创建更健壮、更复杂的解决方案。Lambda 表达式是语言的一次革命性变革，对整个平台的开发产生了深远影响。


