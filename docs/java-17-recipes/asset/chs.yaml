  ### 工作原理


  Java 支持*序列化*，即获取一个对象并创建其字节表示形式，以便后续恢复该对象的能力。借助内部序列化机制，序列化对象的大部分准备工作都已自动完成。Java 将对象的属性转换为字节流，随后可将其保存到文件或通过网络传输。


  注意


  原始的 Java 序列化框架使用反射来序列化对象，因此如果频繁进行序列化/反序列化操作，可能会引发问题。目前有许多开源框架可供选择，最佳方案取决于你的需求（速度
  vs. 体积 vs. 易用性）。参见 [`https://github.com/eishay/jvm-serializers/wiki/`](https://github.com/eishay/jvm-serializers/wiki/)。


  要使一个类可序列化，它需要实现 `Serializable` 接口，这是一个*标记接口*。它不包含任何方法，而是告知序列化机制允许你的类被序列化。虽然一开始并不明显，但序列化会暴露你类的所有内部工作细节（包括受保护和私有成员），因此如果你希望保密核弹发射的授权代码，你可能需要让包含此类信息的任何类都不可序列化。


  此外，类的所有属性（例如成员、变量或字段）也必须都是可序列化的（和/或瞬态的，我们稍后会讲到）。所有基本类型——`int`、`long`、`double` 和
  `float`（及其包装类）——以及 `String` 类在设计上都是可序列化的。其他 Java 类则需根据具体情况判断是否可序列化。例如，你不能序列化任何 `Swing`
  组件（如 `JButton` 或 `JSpinner`），也不能序列化 `File` 对象，但你可以序列化 `Color` 类（更准确地说，是 `awt.color`）。


  作为设计原则，你不应该序列化主类，而应创建仅包含你想要序列化的属性的类。这能省去大量调试时的麻烦，因为序列化会变得非常具有渗透性。如果你将一个主类标记为可序列化（`implements
  Serializable`），并且该类包含许多其他属性，那么你也需要将这些类声明为可序列化。如果你的 Java 类继承自另一个类，父类也应该是可序列化的。如果父类不可序列化，则父类的属性将不会被序列化。


  如果你想将某个属性标记为不可序列化，可以将其标记为 *transient*。瞬态属性告诉 Java 编译器你对该属性的保存/加载不感兴趣，因此它会被忽略。某些属性是作为瞬态属性的理想候选，例如缓存的计算结果或你总是实例化为相同值的日期格式化器。


  根据序列化框架的特性，静态属性是不可序列化的；静态类也是如此。原因在于静态类无法被实例化，尽管公共静态内部类可以被实例化。因此，如果你同时保存并加载静态类，你实际上加载了该静态类的另一个副本，这会导致
  JVM 陷入混乱。


  Java 序列化机制在幕后工作，以转换并遍历类中标记为 `Serializable` 的每个对象。如果应用程序包含对象中的对象，甚至可能包含交叉引用的对象，序列化框架会解析这些对象，并仅存储任何对象的单个副本。每个属性都被转换为
  `byte[]` 表示形式。字节数组的格式包括实际的类名（例如，`com.somewhere.over.the.rainbow.preferences.UserPreferences`），后跟属性的编码（这些属性又可能编码另一个对象类及其属性，等等，*以此类推*）。


  对于好奇者来说，如果你查看生成的文件（即使是在文本编辑器中），你几乎可以在文件的开头部分看到类名。


  注意


  序列化非常脆弱。默认情况下，序列化框架会生成一个*流唯一标识符 (SUID)*，该标识符捕获了关于类中存在哪些字段、它们的类型（public/protected）、哪些是瞬态的以及其他信息。即使是对类进行看似微小的修改（例如，将
  `int` 属性改为 `long` 属性）也会生成一个新的 SUID。使用先前 SUID 保存的类无法在新的 SUID 上反序列化。这样做是为了保护序列化/反序列化机制，同时也保护了设计者。


  你可以指示 Java 类使用特定的 SUID。这允许你序列化类、修改它们，然后在实现一些向后兼容性的同时反序列化原始类。你面临的风险是反序列化必须向后兼容。重命名或删除字段会在反序列化类时生成异常。如果你在可序列化类上指定了自己的
  SUID，请确保每次更改类时都进行一些向后兼容性的单元测试。


  由于序列化的性质，不要期望在反序列化对象时会调用构造函数。如果你的构造函数中包含对象正常运行所需的初始化代码，你可能需要将代码从构造函数中重构出来，以便在构造后正确执行。原因在于，在反序列化过程中，反序列化的对象是在内部“恢复”的（而非创建），并且不会调用构造函数。


  ## 8.2 更高效地序列化 Java 对象


  ### 问题


  你想要序列化一个类，但希望输出比内置序列化方法生成的结果更高效或体积更小。




  ### 解决方案


  通过让对象实现 `Externalizable` 接口，你可以指示 Java 虚拟机使用自定义的序列化/反序列化机制，如下例中 `readExternal`/`writeExternal`
  方法所提供的那样。


  ```

  public class ExternalizableProgramSettings implements Externalizable {

  private Point locationOnScreen;

  private Dimension frameSize;

  private Color defaultFontColor;

  private String title;

  // 空构造函数，Externalizable 实现者必需

  public ExternalizableProgramSettings() {

  }

  @Override

  public void writeExternal(ObjectOutput out) throws IOException {

  out.writeInt(locationOnScreen.x);

  out.writeInt(locationOnScreen.y);

  out.writeInt(frameSize.width);

  out.writeInt(frameSize.height);

  out.writeInt(defaultFontColor.getRGB());

  out.writeUTF(title);

  }

  @Override

  public void readExternal(ObjectInput in) throws IOException, ClassNotFoundException
  {

  locationOnScreen = new Point(in.readInt(), in.readInt());

  frameSize = new Dimension(in.readInt(), in.readInt());

  defaultFontColor = new Color(in.readInt());

  title = in.readUTF();

  }

  // 为简洁起见，省略了 getter 和 setter

  }

  主类如下：

  package org.java17recipes.chapter08.recipe08_02;

  import java.awt.*;

  import java.io.*;

