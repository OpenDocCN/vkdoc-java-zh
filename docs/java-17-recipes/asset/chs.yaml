  if (this == o) return true;

  if (o == null || getClass() != o.getClass()) return false;

  ProgramSettings that = (ProgramSettings) o;

  if (defaultFontColor != null ? !defaultFontColor.equals(that.defaultFontColor) :
  that.defaultFontColor != null)

  return false;

  if (frameSize != null ? !frameSize.equals(that.frameSize) : that.frameSize != null)
  return false;

