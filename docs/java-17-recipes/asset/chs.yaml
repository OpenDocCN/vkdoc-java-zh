  ### 工作原理


  Java 是一种面向对象的编程语言，基于具有属性和方法的类和对象。类是创建对象所必需的。要创建一个 Java 程序（即 .class 文件），你必须创建一个 .java
  文件。.java 文件是一个可读的文本文件，而 .class 文件是一个二进制文件，其中包含可以在 Java 虚拟机（JVM）上执行的 Java 字节码，由 Java
  编译器从 .java 文件生成。


  提示


  你必须编译源代码。源代码保存在后缀为 `.java` 的文件中，因此你的操作系统的文件和目录路径表示法是合适的。你执行的是一个类。类是语言中的一个抽象概念，因此其点表示法是合适的（即，需要在类的实例名称后面写一个点（.），后跟要使用的方法）。请记住这个区别，以帮助自己记住何时使用哪种表示法。


  #### 主程序


  `public static void main(...)` 这个咒语在公共类中使用，用于表示 Java 程序的入口点。该声明开始一个名为 `main` 的可执行方法。你必须指定一个参数，该参数是一个字符串数组，通常该参数被定义为
  `String[] args`。当你执行当前选定的类时，JVM 将控制权转移到 `main()` 方法，该方法调用 `System.out.println()`
  来显示命令窗口中显示的 Hello World 消息。


