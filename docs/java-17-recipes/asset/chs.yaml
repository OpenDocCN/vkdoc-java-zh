  \nJava 的日志记录非常成熟。许多开源项目被广泛接受为日志记录的事实标准。在本章的配方中，你将使用 Java 的 Logback 框架和 Java 简单日志门面（SLF4J）。这两个项目共同为大多数日志记录需求提供了一个足够好的解决方案。对于涉及\
