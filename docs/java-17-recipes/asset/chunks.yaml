    **工作原理**


    Java 提供了多种读取 XML 文档的方式。其中一种是使用 StAX，这是一种流式模型。它优于较旧的 SAX API，因为它允许你读取和写入 XML 文档。尽管
    StAX 不如 DOM API 强大，但它是一种出色且高效的 API，对内存资源的消耗较小。


    StAX 提供了两种读取 XML 文档的方法：游标 API 和迭代器 API。游标驱动的 API 使用一个游标，可以从头到尾遍历 XML 文档，一次指向一个元素，并且始终向前移动。迭代器
    API 将 XML 文档流表示为一组离散的事件对象，这些对象按照它们在源 XML 中被读取的顺序提供。事件驱动的迭代器 API 比游标 API 更受青睐，因为它提供了
    `XMLEvent` 对象，具有以下优点。


    *   `XMLEvent` 对象是不可变的，即使 StAX 解析器已经处理到后续事件，它们仍然可以持久存在。你可以将这些 `XMLEvent` 对象传递给其他进程，或者将它们存储在列表、数组和映射中。


    *   你可以继承 `XMLEvent`，根据需要创建你自己的专用事件。


    *   你可以通过添加或删除事件来修改传入的事件流，这比游标 API 更加灵活。


    要使用 StAX 读取文档，请在文件输入流上创建一个 XML 事件读取器。使用 `hasNext()` 方法检查是否还有可用的事件，并使用 `nextEvent()`
    方法读取每个事件。`nextEvent()` 方法返回特定类型的 `XMLEvent`，该事件对应于 XML 文件中的开始和结束元素、属性以及值数据。完成这些对象的操作后，请记得关闭读取器和文件流。


    **15.3 转换 XML**


    **问题**


    你想将 XML 文档转换为其他格式，例如 HTML。


    **解决方案**


    使用 `javax.xml.transform` 包将 XML 文档转换为另一种文档格式。


    以下代码演示了如何读取源文档、应用可扩展样式表语言（XSL）转换文件，并生成转换后的新文档。使用 `org.java17recipes.chapter15.recipe15_3.TransformXml`
    类中的示例代码来读取 `patients.xml` 文件并创建 `patients.html` 文件。以下代码片段展示了该类的关键部分。


    ```java

    import javax.xml.transform.TransformerConfigurationException;

    import javax.xml.transform.TransformerException;

    import javax.xml.transform.TransformerFactory;

    import javax.xml.transform.Transformer;

    import javax.xml.transform.Source;

    import javax.xml.transform.stream.StreamResult;

    import javax.xml.transform.stream.StreamSource;

    ...

    public void run(String xmlFile, String xslFile, String outputFile)

    throws FileNotFoundException, TransformerConfigurationException, TransformerException
    {

    InputStream xslInputStream = new FileInputStream(xslFile);

    Source xslSource = new StreamSource(xslInputStream);

    TransformerFactory factory = TransformerFactory.newInstance();

    Transformer transformer = factory.newTransformer(xslSource);

    InputStream xmlInputStream = new FileInputStream(xmlFile);

    StreamSource in = new StreamSource(xmlInputStream);

    StreamResult out = new StreamResult(outputFile);

    transformer.transform(in, out);

    }

    public static void main(String[] args) {

    String fileName = null;

    String fileName2 = null;

    String fileName3 = null;

