    服务器代码相当基础。可以看到`MulticastServer`类继承了`Thread`。这意味着该服务器应用程序可以在应用程序中与其他代码分离的线程中运行。如果另一个类启动了`MulticastServer`类的`run()`方法，它将在与启动它的类不同的线程中运行。任何继承`Thread`的类都必须存在`run()`方法。


