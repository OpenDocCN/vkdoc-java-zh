    ```


    ### 工作原理


    Java 提供了许多并发集合选项。选择哪种集合取决于在你的应用程序上下文中，读取操作与写入操作的比较情况。如果写入操作相比读取操作发生得很少且间隔时间长，那么使用`CopyOnWriteArrayList<E>`实例效率最高，因为它不会*阻塞*（停止）其他线程读取列表，并且遍历它是线程安全的（遍历时不会抛出`ConcurrentModificationException`）。如果写入和读取的次数相同，那么`Collections`类中的`synchronizedList`方法是首选。


    在解决方案 1 中，`CopyOnWriteArrayList<E>`在你遍历列表时被更新。由于该方案使用了`CopyOnWriteArrayList`实例，因此在遍历集合时无需担心线程安全问题（如本方案中使用
    stream 所做的那样）。值得注意的是，`CopyOnWriteArrayList<E>`在遍历时提供的是某个时间点的快照。如果你在遍历列表时另一个线程修改了它，那么在遍历过程中很可能看不到修改后的列表。


    注意


    正确的锁定取决于所使用的集合类型。任何通过使用`Collections.synchronized`返回的集合都可以通过集合本身进行锁定（`synchronized
    (collectionInstance)`）。然而，一些更高效（更新）的并发集合，如`ConcurrentMap`，不能以这种方式使用，因为它们的内部实现不会在对象本身上锁定。


    解决方案 2 创建了一个同步列表，该列表是通过使用`Collections`辅助类创建的。`Collection.synchronizedList()`方法将一个`List`对象（可以是`ArrayList<E>`、`LinkedList<E>`或其他`List<E>`实现）包装成一个同步列表操作的列表。每次你需要遍历一个列表（无论是使用`stream`、`for`循环还是迭代器），都必须注意该列表迭代器的并发影响。`CopyOnWriteArrayList<E>`是安全可遍历的（如
    JavaDoc 中所述）。但是，`Collections`类中`synchronizedList`方法的迭代器必须手动同步（同样在 JavaDoc `Collections.synchronizedList`迭代器中指定）。在解决方案中，在`synchronized(list)`块内部可以安全地遍历列表。当在列表上同步时，在`synchronized(list)`块完成之前，不能进行任何读取/更新/其他迭代操作。


