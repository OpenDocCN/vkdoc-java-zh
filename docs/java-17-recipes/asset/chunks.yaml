- fmt: '### How It Works


    All Java classes that are executable from the command line or terminal contain
    a `main()` method. If you look at the signature for the `main()` method, you can
    see that it accepts a `String[]` argument. In other words, you can pass an array
    of `String` objects into the `main()` method. Command-line interpreters such as
    the Windows command prompt and the various Linux and Unix shells build an array
    of strings out of your command-line arguments and pass that array to the `main()`
    method on your behalf.


    The `main()` method in the example displays each passed argument. First, the length
    of the array named `args` is tested to see whether it is greater than zero. If
    it is, the method loop through each of the arguments in the array executes a `for`
    loop, displaying each argument along the way. If there are no arguments passed,
    the length of the `args` array is zero, and a message indicating this is printed;
    otherwise, you see a different message followed by a list of arguments.


    Command-line interpreters recognize spaces and sometimes other characters as delimiters.
    It’s generally safe to pass numeric values as arguments delimited by spaces without
    bothering to enclose each value within quotes. However, as shown in the final
    solution example, you should get into the habit of enclosing character-string
    arguments in double quotes. Do that to eliminate any ambiguity over where each
    argument begins and ends.


    **Note**


    Java sees all arguments as character strings. If you pass numeric values as parameters,
    they enter Java as character strings in human-readable form. You can convert them
    into their appropriate numeric types using the conversion methods shown in Recipe
    1-9.


    ## 1.11 Accepting Input from the Keyboard


    ### Problem


    You are interested in writing a command-line or terminal application that accept
    user input from the keyboard.


    ### Solution


    Use the `java.io.BufferedReader` and `java.io.InputStreamReader` classes to read
    keyboard entry and store it into local variables. Listing [1-9](#323910_4_En_1_Chapter.xhtml#PC39)
    shows a program that keeps prompting for input until you enter some characters
    representing a valid value of type `long`.


    ```

    package org.java17recipes.chapter01.recipe01_11;

    import java.io.*;

    public class AcceptingInput {

    public static void main(String[] args){

    BufferedReader readIn = new BufferedReader(

    new InputStreamReader(System.in)

    );

    String numberAsString = "";

    long numberAsLong = 0;

    boolean numberIsValid = false;

    do {

    /* Ask the user for a number. */

    System.out.println("Please enter a number: ");

    try {

    numberAsString = readIn.readLine();

    System.out.println("You entered " + numberAsString);

    } catch (IOException ex){

    System.out.println(ex);

    }

    /* Convert the number into binary form. */

    try {

    numberAsLong = Long.parseLong(numberAsString);

    numberIsValid = true;

    } catch (NumberFormatException nfe) {

    System.out.println ("Not a number!");

    }

    } while (numberIsValid == false);

    }

    }

    Listing 1-9

    Keyboard Input and Exception Handling

    ```


    The following is an example run of this program.


    ```

    Please enter a number:

    No

    You entered No

    Not a number!

    Please enter a number:

    Yes

    You entered Yes

    Not a number!

    Please enter a number:


    You entered 75

    ```


    The first two inputs did not represent valid values in the `long` data type. The
    third value was valid, and the run ended.


    ### How It Works


    Quite often, our applications need to accept user input of some kind. Granted,
    most applications are not used from the command line or terminal nowadays, but
    having the ability to create an application that reads input from the command
    line or terminal helps lay a good foundation and may be useful in some applications
    or scripts. Terminal input can also be useful in developing administrative applications
    that you or a system administrator may use.


    Two helper classes were used in the solution to this recipe. They are `java.io.BufferedReader`
    and `java.io.InputStreamReader`. The early portion of the code that uses those
    classes is especially important.


    ```

    BufferedReader readIn = new BufferedReader(

    new InputStreamReader(System.in)

    );

    ```


    The innermost object in this statement is `System.in`. It represents the keyboard.
    You do not need to declare `System.in`. Java’s runtime environment creates the
    object for you. It is simply available to be used.


    `System.in` provides access to raw bytes of data from the input device, which
    is the keyboard in our example. The `InputStreamReader` class’s job is to take
    those bytes and convert them into characters in your current character set. `System.in`
    is passed to the `InputStreamReader()` constructor to create an `InputStreamReader`
    object.


    `InputStreamReader` knows about characters but not about lines. The `BufferedReader`
    class’s job is to detect line breaks in the input stream and enable you to conveniently
    read a line at a time. `BufferedReader` also aids efficiency by allowing physical
    reads from the input device to be done in different-size chunks than when your
    application consumes the data. This aspect can make a difference when the input
    stream is a large file rather than the keyboard.


    The following shows how the program in Listing [1-9](#323910_4_En_1_Chapter.xhtml#PC39)
    uses an instance (named `readIn`) of the `BufferedReader` class to read a line
    of input from the keyboard.


    ```

    numberAsString = readIn.readLine();

    ```


    Executing this statement triggers the following sequence.


    1.  `System.in` returns a sequence of bytes.


    2.  `InputStreamReader` converts those bytes into characters.


    3.  `BufferedReader` breaks the character stream into lines of input.


    4.  `readLine()` returns one line of input to the application.


    I/O calls must be wrapped in `try-catch` blocks. These blocks catch any exceptions
    that may occur. The `try` part in the example fails if a conversion is unsuccessful.
    A failure prevents the `numberIsValid` flag from being set to `true`, which causes
    the `do` loop to make another iteration so that the user can try again at entering
    a valid value. To learn more about catching exceptions, please see Chapter [9](#323910_4_En_9_Chapter.xhtml).


    The following statement at the top of Listing [1-9](#323910_4_En_1_Chapter.xhtml#PC39)
    deserves some attention.


    ```

    import java.io.*;

    ```


    This statement makes available the classes and methods defined in the `java.io`
    package. These include `InputStreamReader` and `BufferedReader`. Also included
    is the `IOException` class used in the first `try-catch` block. `NumberFormatException`
    (used in the second `try-catch` block) belongs to the `java.lang` package.


