    InetSocketAddress)`方法发送消息。解决方案中的`send()`方法接受一个`ByteBuffer`对象作为消息，以及一个使用代码块开头声明的地址和端口创建的新`InetSocketAddress`实例。我们说过会回到这些内容！


    ```

    server.send(message, new InetSocketAddress(address, port));

    ```


    此时，客户端将收到服务器发送的消息。对于本示例解决方案中演示的客户端，它随后会断开连接。在真实场景中，很可能由另一个类启动服务器。其`run()`方法将包含一个循环，该循环会持续执行，直到所有消息都已广播或循环被告知停止。客户端可能不会断开连接，直到用户发起关闭。


    > **注意**：如果你的笔记本电脑或服务器使用非标准IPv4的其他网络协议，则结果可能会有所不同。在将代码发送到生产环境之前，请务必进行充分的测试。


    ## 16.4 生成和读取URL


    ### 问题

    你希望在应用程序中以编程方式生成URL。创建URL后，你希望从中读取数据以供应用程序使用。


    ### 解决方案

    使用`java.net.URL`类来创建URL。根据你要处理的地址，有几种不同的生成URL的方法。本解决方案演示了创建URL对象的一些选项，并注释说明了差异。创建URL对象后，其中一个URL被读入`BufferedReader`并打印到命令行。


    ```

    import java.io.BufferedReader;

    import java.io.IOException;

    import java.io.InputStreamReader;

    import java.net.MalformedURLException;

    import java.net.URL;

    public class GenerateAndReadUrl {

    public static void main(String[] args) {

    try {

    // Generate absolute URL

    URL url1 = new URL("https://openjdk.java.net");

    System.out.println(url1.toString());

    // Generate URL for pages with a common base

    URL url2 = new URL(url1, " projects/jdk/17");

    // Generate URL from different pieces of data

    URL url3 = new URL("http", "openjdk.java.net", "projects/jdk/17");

    readFromUrl(url1);

    } catch (MalformedURLException ex) {

    ex.printStackTrace();

    }

    }

    /**

    * Open URL stream as an input stream and print contents to command line.

    *

    * @param url

    */

    public static void readFromUrl(URL url) {

    try {

    BufferedReader in = new BufferedReader(

    new InputStreamReader(

    url.openStream()));

    String inputLine;

    while ((inputLine = in.readLine()) != null) {

    System.out.println(inputLine);

    }

    in.close();

    } catch (IOException ex) {

    ex.printStackTrace();

    }

    }

    }

    ```


