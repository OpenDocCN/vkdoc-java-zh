- fmt: "### How It Works\n\n`switch`语句是一种控制流语句，允许你根据`switch`表达式的值执行不同的代码块。它类似于`if-then-else`语句，但`switch`语句只能有一个测试表达式。表达式类型被限制为几种不同的类型之一。当`switch`语句执行时，它会将表达式与`switch`语句的`case`标签中包含的常量进行比较。这些`case`标签是代码中的分支点。如果表达式的值等于某个`case`标签常量的值，控制权将转移到与该`case`标签对应的代码段。从该点开始的所有代码语句都会被执行，直到遇到`switch`语句的末尾或`break`语句。`break`语句会导致`switch`语句终止，控制权转移到`switch`语句之后的语句。可选地，`switch`语句可以包含一个`default`标签，当没有`case`标签常量与`switch`表达式的值相等时，它提供一个分支点。\n\
    \n`SwitchTypeChecker.isValidSwitchType()`方法演示了将字符串用作`switch`测试表达式。如果你仔细研究`isValidSwitchType()`方法，你会发现它测试一个`Class`对象是否代表与有效`switch`表达式类型之一相对应的类型。该方法还演示了如何将`case`标签分组以实现逻辑或条件测试。如果某个`case`标签没有关联的代码且没有`break`语句，执行流程会落入下一个包含可执行语句的`case`标签，从而允许在`switch`表达式的结果与分组`case`常量中的任何一个匹配时执行公共代码。\n\
    \n`RockPaperScissors`类实现了一个命令行猜拳游戏，与计算机对战。该类中有两个方法演示了`switch`语句。`getHand()`方法展示了在`switch`表达式中使用枚举变量。`playHands()`方法旨在说明，虽然`switch`表达式通常是一个变量，但它可以是任何结果属于允许的`switch`类型之一的表达式。在这种情况下，表达式使用了一个返回`int`值的三元运算符。\n\
