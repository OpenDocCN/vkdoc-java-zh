- fmt: '### How It Works


    To control the size of log files, configure the `java.util.logging` framework
    and specify rolling log files. Choosing the rolling log files option causes the
    latest information to be kept in `LogApplication0.log`. Progressively older information
    is in `LogApplication1.log`, `LogApplication2.log`, and so forth. When `LogApplication0.log`
    fills to the limit you specify (50,000 bytes in this example), its name is rotated
    to `LogApplicationLog1.log`, and the other files have their names similarly rotated
    downward. The number of log files to maintain is determined by the `java.util.logging.FileHandler.count`
    property, which is set to `4` in this recipe’s example. The `FileHandler` configuration
    parameter to distinguish rotated logs is `"%g"` (a generation number). If it is
    not specified in the properties file, and the count is greater than 1 (4 in this
    recipe), the generation number is added to the end of the file name—after a dot.


    The `logging.properties` file begins by defining the handlers that the `java.util.logging`
    framework use. Handlers are objects that take care of logging messages. `FileHandler`
    is specified in the recipe, which logs messages to files. Next, the logging levels
    are defined. Within a logging framework, there is the concept of separate `logger`
    objects. A logger can carry different configurations (for example, different logging
    levels) and be identified in the log file. The example configures the `recipeLogger`’s
    level to `info`. In contrast, the root `logger`’s level is `ALL` (root loggers
    in the `java.util.logging` framework are denoted by no prefix before the property).
    On the other side, `OFF` disables logging.


    The next section of the `logging.properties` file defines the `FileHandler` configuration.
    The formatter indicates how the log information is written to disk. The `simpleFormatter`
    writes the information as plain text, with a line indicating the date and time,
    a line with the logging level, and the message to be logged. Following the formatter,
    the `FileHandler` pattern is defined. This specifies the file name and location
    of the log files (the `%g` is replaced by the rolling log number [0 ~ 3]). The
    `Limit` property defines how many bytes the log can have before rolling over (50,000
    bytes ~ 50kb). The count defines the maximum index of log files to keep (in this
    recipe’s case, 4).


    ## 9.10 Logging Exceptions


    In the previous recipes, you learned how to catch exceptions and log information.
    This recipe put these two recipes together.


    ### Problem


    You want to record exceptions in your log file.


    ### Solution


    Configure your application to use SLF4J. Utilize `try`/`catch` blocks to log exceptions
    within the error log. In the following example, an SLF4J Logger logs messages
    from within an exception handler.


    ```

    public static void main (String [] args) {

    Recipe9_10 recipe = new Recipe9_10();

    recipe.start();

    }

    static Logger rootLogger = Logger.getLogger("");

    private void start() {

    loadLoggingConfiguration();

    Thread.setDefaultUncaughtExceptionHandler((Thread t, Throwable e) -> {

    rootLogger.error("Error in thread "+t+" caused by "+e);

    });

    int c = 20/0;

    }

    private void loadLoggingConfiguration() {

    FileInputStream ins = null;

    try {

    ins = new FileInputStream(new File("logging.properties"));

    LogManager.getLogManager().readConfiguration(ins);

    } catch (IOException e) {

    e.printStackTrace();

    }

    }

    ```


    ### How It Works


    The example demonstrates how to use `UncaughtExceptionHandler` to log exceptions
    to a logging file. When logging an exception, it is good to include the stack
    trace showing where the exception was thrown. In the example, a thread contains
    `UncaughtExceptionHandler`, which utilizes a lambda expression containing a logger.
    The logger writes any caught exceptions to a log file.


    ## 9.11 Summary


    This chapter looked at one of the most important phases in application development,
    exception handling. It discussed how to handle single and multiple exceptions
    and log those exceptions.


    # 10. Concurrency


    *Concurrency* is the ability of a program to execute different (or the same) instructions
    at the same time. A concurrent program can be split up and run on multiple CPUs.
    By making concurrent programs, you take advantage of today’s multicore CPUs. You
    can even see the benefit on single-core CPUs that are I/O intensive. Concurrency
    is one of the toughest topics to handle in modern computer programming; understanding
    concurrency requires the capacity of thinking abstractly, and debugging concurrent
    problems is like trying to pilot an airplane by dead reckoning. Even so, with
    modern releases of Java, it has become easier (and more accessible) to write bug-free
    concurrent code.


    This chapter presents the most common need for concurrency tasks—from running
    a background task to splitting a computation into work units. Throughout the chapter,
    you find the most up-to-date recipes for accomplishing concurrency in Java.


    ## 10.1 Starting a Background Task


    ### Problem


    You have a task that needs to run outside of your main thread.


    ### Solution


    Create a class implementation that includes the task that needs to be run in a
    different thread. Implement a `Runnable` functional interface in the task implementation
    class and start a new thread. In the following example, a counter simulates activity,
    as a separate task is run in the background.


    ```

    public class Recipe10_1 {

    public static void main(String[] args) {

    Recipe10_1 recipe = new Recipe10_1();

    recipe.startProcess();

    }

    private void startProcess() {

    Thread backgroundThread = new Thread(new Runnable() {

    public void run() {

    doSomethingInBackground();

    }

    },"Background Thread");

    System.out.println("Start");

    backgroundThread.start();

    for (int i= 0;i < 10;i++) {

    System.out.println(Thread.currentThread().getName()+": is counting "+i);

    }

    System.out.println("Done");

    }

    private void doSomethingInBackground() {

    System.out.println(Thread.currentThread().getName()+

    ": is Running in the background");

    }

    }

    ```


    If the code is executed more than once, the output should be different from time
    to time. The background thread executes separately, so its message is printed
    differently across each run.


    The same code for creating the background thread can be written as follows if
    you’re using lambda expressions.


    ```

    Thread backgroundThread = new Thread(this::doSomethingInBackground, "Background
    Thread");

    ```


    The following is the output.


    ```

    Start

    main: is counting 0

    main: is counting 1

    main: is counting 2

    main: is counting 3

    main: is counting 4

    main: is counting 5

    main: is counting 6

    main: is counting 7

    main: is counting 8

    main: is counting 9

    Done

    Background Thread: is Running in the background

    ```'
