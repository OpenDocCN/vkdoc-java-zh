    \ (Chrome in the example).\n\n![](images/323910_4_En_13_Chapter/323910_4_En_13_Fig14_HTML.jpg)\n\
    \nFigure 13-14  \nThe first project home page in a browser\n\nA second choice\
    \ is to use Tomcat externally. To see the output of the `test` project outside\
    \ Eclipse, first, stop the “internal” Tomcat by right-clicking it under the Servers\
    \ tab of the Workbench and selecting `Stop`. Then, start the Tomcat service in\
    \ Windows. Right-click the test project folder as you did to launch it within\
