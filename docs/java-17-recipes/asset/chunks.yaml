    `INSERT` statement in string format. To perform the insert, pass the SQL string
    to the `Statement` object’s `executeUpdate()` method. If the `INSERT` is performed,
    an int value is returned that specifies the number of rows that have been inserted.
    If the `INSERT` operation is not performed successfully, either a zero is returned,
    or `SQLException` is thrown, indicating a problem with the statement or database
    connection.


    The `performRead()` method in the solution to this recipe demonstrates querying
    the database. To execute a query, call the `Statement` object’s `executeQuery()`
    method, passing a SQL statement in string format. The result is a `ResultSet`
    object, which can then work with the returned data. For more information on performing
    queries, see Recipe 12-4.


    The `performUpdate()` method in the solution to this recipe demonstrates updating
    records within a database table. First, construct a SQL `UPDATE` statement in
    string format. Next, to perform the update operation, pass the SQL string to the
    `Statement` object’s `executeUpdate()` method. If the `UPDATE` is successfully
    performed, an int value is returned, which specifies the number of updated records.
    If the `UPDATE` operation is not performed successfully, either a zero is returned,
    or `SQLException` is thrown, indicating a problem with the statement or database
    connection.


    The last database operation that needs to be covered is the `DELETE` operation.
    The `performDelete()` method in the solution to this recipe demonstrates deleting
    records from the database. First, construct a SQL `DELETE` statement in string
    format. Next, to execute the deletion, pass the SQL string to the `Statement`
    object’s `executeUpdate()` method. If the deletion is successful, an int value
    specifying the number of rows deleted is returned. Otherwise, if the deletion
    fails, a zero is returned, or `SQLException` is thrown, indicating a problem with
    the statement or database connection.


    Almost every database application uses at least one of the CRUD operations at
    some point. This is foundational JDBC that needs to be known if you are working
    with databases within Java applications. Even if you do not work directly with
    the JDBC API, it is good to know these foundational basics.


    ## 12.6 Simplifying Connection Management


    ### Problem


    Your application requires the use of a database, and to work with the database,
    you need to open a connection for each interaction. Rather than code the logic
    to open a database connection every time you need to access the database, you
    want to use a single class to perform that task.


    ### Solution


    Write a class to handle all the connection management within your application.
    Doing so allows you to call that class to obtain a connection, rather than setting
    up a new `Connection` object each time you need access to the database. Perform
    the following steps to set up a connection management environment for your JDBC
    application.


    1.  Create a class named `CreateConnection.java` that encapsulates your application’s
    connection logic.


    2.  Create a `Properties` file to store your connection information. Place the
    file somewhere on your classpath so that the `CreateConnection` class can load
    it.


    3.  Use the `CreateConnection` class to obtain your database connections.


    The following code of the `CreateConnection` class can be used for centralized
    connection management.


    ```

    import java.io.File;

    import java.io.IOException;

    import java.io.InputStream;

    import java.nio.file.FileSystems;

    import java.nio.file.Files;

    import java.sql.Connection;

    import java.sql.DriverManager;

    import java.sql.SQLException;

    import java.util.Properties;

    public class CreateConnection {

    static Properties props = new Properties();

    String hostname = null;

    String port = null;

    String database = null;

    String username = null;

    String password = null;

    public CreateConnection(){

    try (InputStream in = Files.newInputStream(FileSystems.getDefault().

    getPath(System.getProperty("user.dir") +

    File.separator + "db_props.properties")); ) {

    props.load(in);

    in.close();

    } catch (IOException ex) {

    ex.printStackTrace();

    }

    loadProperties();

    }

    public final void loadProperties(){

    this.hostname = props.getProperty("host_name");

    port = props.getProperty("port_number");

    database = props.getProperty("db_name");

    username = props.getProperty("username");

    password = props.getProperty("password");

    }

    public Connection getConnection() throws SQLException {

    Connection conn = null;

    String jdbcUrl;

    jdbcUrl = "jdbc:mysql://" + this.hostname + ":" +

    this.port  + "/" + this.database;

    System.out.println(jdbcUrl);

    conn = DriverManager.getConnection(jdbcUrl, this.username, this.password);

    System.out.println("Successfully connected");

    return conn;

    }

    public static void main(String[] args) {

    CreateConnection createConnection = new CreateConnection();

    try {

    Connection conn = createConnection.getConnection();

    if (conn != null) {

    System.out.println("Closing Connection...");

    conn.close();

    }

    } catch (SQLException e){

    e.printStackTrace();

    }

    }

    }

    ```


    The following is the output.


    ```

    jdbc:mysql://localhost:3306/apressbooks

    Successfully connected

    Closing Connection...

    ```


    Next, the following lines of text are an example of what should be contained in
    the properties file that is used for obtaining a connection to the database. For
    this example, the properties file is named `db_props.properties`.


    ```

    host_name=your_db_server_name

    db_name=your_db_name

    username=db_username

    password=db_username_password

    port_number=db_port_number

    ```


    Finally, use the `CreateConnection` class to obtain connections for your application.
    The following code demonstrates this concept.


    ```

    CreateConnection createConn = new CreateConnection();

    try(Connection conn = createConn.getConnection()) {

    performDbTask();

    } catch (java.sql.SQLException ex) {

    ex.printStackTrace();

    }

    ```


    This code uses `try-with-resources` to automatically close the connection after
    performing the database task.'
