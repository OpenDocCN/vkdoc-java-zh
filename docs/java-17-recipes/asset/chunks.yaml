  trans: '

    ### 解决方案


    通过实现函数式接口并将 lambda 表达式赋值给与该接口类型相同的变量，可以创建可移植的函数。该变量可以作为参数传递给其他对象。


    下面的 `PassingLambdaFunctions` 类包含一个 `calculate()` 方法，该方法可以对给定的值数组执行任意类型的计算。请注意，`calculate()`
    方法接受一个 `Function<List<Double>,Double>` 和一个 `Double` 值数组作为参数。


    ```

    public class PassingLambdaFunctions {

    /**

    * 根据传入的计算函数计算一个值。

    * @param f1 Double 输入值

    * @param args  Double 输入值

    * @return

    */

    public Double calculate(Function, Double> f1,

    Double [] args){

    Double returnVal;

    List varList = new ArrayList();

    int idx = 0;

    while (idx < args.length){

    varList.add(args[idx]);

    idx++;

    }

    returnVal=f1.apply(varList);

    return returnVal;

    }

    }

    ```


    要使用 `calculate` 方法，必须将一个实现了 `Function<List<Double>,Double>` 的 lambda 表达式作为第一个参数传递给
    `calculate()` 方法，同时传递一个包含计算所需值的 `Double` 参数数组。在下面的类中，使用 lambda 表达式生成了一个用于计算体积的函数。它被赋值给一个标识为
    `volumeCalc` 的 `Function<List<Double>,Double>` 类型变量。另一个 lambda 表达式创建了一个用于计算面积的函数，并将其赋值给一个相同类型、标识为
    `areaCalc` 的变量。在单独的调用中，这些变量与一个值数组一起被传递给 `PassingLambdaFunctions.calculate()` 方法，从而得到计算结果。


    ```

    public class MainClass {

    public static void main(String[] args){

    double x = 16.0;

    double y = 30.0;

    double z = 4.0;

    // 使用 lambda 创建体积计算函数。计算器会检查数组是否包含计算所需的三个必要元素。

    Function, Double> volumeCalc = list -> {

    if(list.size() == 3){

    return list.get(0) * list.get(1) * list.get(2);

    } else {

    return Double.valueOf("-1");

    }

    };

    Double[] argList = new Double[3];

    argList[0] = x;

    argList[1] = y;

    argList[2] = z;

    // 使用 lambda 创建面积计算函数。这个特定的计算器会检查数组是否只包含两个元素。

    Function, Double> areaCalc = list -> {

    if(list.size() == 2){

    return list.get(0) * list.get(1);

    } else {

    return Double.valueOf("-1");

    }

    };

    Double[] argList2 = new Double[2];

    argList2[0] = x;

    argList2[1] = y;

    PassingLambdaFunctions p1 = new PassingLambdaFunctions();

    // 将 lambda 表达式和参数列表传递给 calculate() 方法。

    System.out.println("体积是: " + p1.calculate(volumeCalc, argList));

    System.out.println("面积是: " + p1.calculate(areaCalc, argList2));

    }

    }

    ```


    以下是输出结果。


    ```

    体积是: 1920.0

    面积是: 480.0

    ```


    ### 工作原理


    Lambda 表达式可以赋值给与所实现的函数式接口类型相同的变量。此类表达式可以包含单行表达式或多语句体。由于 lambda 表达式可以接受参数，因此存在一些用例，可以将此类表达式赋值给变量，然后将这些变量传递给其他对象以修改功能。这种模式对于创建包含多个实现的解决方案非常有用。本技巧的解决方案演示了这一概念。


    在解决方案中，`PassingLambdaFunctions` 类包含一个 `calculate()` 方法，该方法对作为参数传入的 `Double` 值执行计算。然而，`calculate()`
    方法本身不包含任何计算功能。相反，计算功能是通过 lambda 表达式以 `Function<List<Double>,Double>` 类型的参数形式传递的。此类型是
    `java.util.function` 包中的标准函数式接口之一，该接口可以由 lambda 表达式实现，然后通过调用其唯一的 `apply()` 方法来调用。查看
    `calculate()` 方法中的代码，首先将 `Double[]` 中包含的参数添加到一个列表中。接着，调用 lambda 表达式的 `apply()`
    方法，传入新的值列表，并将结果返回到 `returnVal` 中。最后，将 `returnVal` 返回给方法调用者。


    ```

    returnVal=f1.apply(varList);

    return returnVal;

    ```


    为了在解决方案中实现计算功能，在另一个名为 `MainClass` 的类中创建了 lambda 表达式。每个表达式接受一个参数列表，然后计算列表中的值，并返回结果。例如，在
    `MainClass` 中生成的第一个 lambda 通过将参数列表中的所有值相乘来计算体积并返回结果。然后，此功能被赋值给一个 `Function<List<Double>,Double>`
    类型的变量，随后被传递到 `PassingLambdaFunctions.calculate()` 方法中。


    任何功能都可以在 lambda 表达式中实现，然后传递给不同的对象使用。这是促进代码重用和高可维护性的绝佳方式。


    ## 6.9 局部变量


    ### 问题


    您希望跳过参数类型，使用 `var` 局部变量。


    ### 解决方案


    您可以跳过参数类型，将 lambda 从以下形式


    ```

    (String str1, String str2) -> s1 + s2

    ```


    重写为以下形式。


    ```

    (var str1, var str2) -> str1 + str2

    ```


    您可以使用 `var` 将技巧 6-1 重写为以下形式。


    ```

    public static void main(String[] args){

    // 创建 lambda，将一个名为 "text" 的参数传递给

    // hello() 方法，返回该字符串。该 lambda 被赋值给

    // helloLambda 变量。

    HelloType helloLambda =

    (var text) -> {System.out.println("Hello " + text);};

    // 调用方法

    helloLambda.hello("Lambda");

    }

    ```


    以下是输出结果。


    ```

    Hello Lambda

    ```


    在这种情况下，变量 `text` 的类型由编译器根据上下文推断，输出结果相同。它不会产生警告或错误。


    ### 工作原理


    Java 11 引入了用于 lambda 参数的局部变量语法，以使隐式类型 lambda 表达式中的参数声明语法与局部变量声明语法保持一致。这无疑使我们的代码*更*具可读性。有关
    `var` 关键字的更多信息，请参阅 [`https://openjdk.java.net/jeps/323`](https://openjdk.java.net/jeps/323)
    上的文档。


    ## 6.10 Switch 表达式


    ### 问题


    您希望高效地使用 switch 表达式，而无需使用 `break`。


    ### 解决方案


    您可以简单地为您的表达式使用 lambda 风格的语法。因此，您可以将 lambda 从以下形式


    ```

    switch(input_variable) {

    case one:

    returnValue = 12

    break;

    case two:

    returnValue = 75

    break;

    default:

    // default 块的代码

    }

    ```


    重写为以下形式：


    ```

    int numLetters = switch (input_variable) {

    case one -> 12;

    case two -> 75;

    default -> {// default 块的代码 }

    };

    ```


    您可以使用 lambda 风格的语法将技巧 6-4 从以下 switch 表达式


    ```

    switch(status){

    case 0:

    returnValue = "ACTIVE";

    case 1:

    returnValue = "INACTIVE";

    case 2:

    returnValue = "INJURY";

    default:

    returnValue = "ON_BENCH";

    }

    ```


    重写为以下形式。


    ```

    returnValue =switch(status){

    case 0  -> "ACTIVE";

    case 1  -> "INACTIVE";

    case 2  -> "INJURY";

    default -> "ON_BENCH";

    };

    ```


    输出结果相同。


    ### 工作原理


    此增强功能在 Java 12 中提出，并在 Java 14 (JEP 361) 中正式发布。此功能引入了一种新形式的 switch 标签，如果匹配到该标签，则仅执行标签右侧（`->`）的代码。


    有关 `var` 关键字的信息，请参阅 [`https://openjdk.java.net/jeps/361`](https://openjdk.java.net/jeps/361)
    上的文档。

    '
- fmt: '## 6.11 Summary


    Lambda expressions brought new life to the Java language with their introduction
    in Java 8, providing capabilities unavailable to Java developers in the past.
    Developers of desktop, mobile, and enterprise applications alike can now take
    advantage of the lambda expression to create more robust and sophisticated solutions.
    Lambda expressions are a revolutionary change to the language, and they have a
    significant impact on development across the platform.


    # 7. Data Sources and Collections


    Applications use data structures to store data that can be utilized throughout
    the lifetime of an application instance. The Java language contains several data
    structures known as collection types, and they can be utilized for this purpose.
    These data structures implement the `java.util.Collection<E>` interface, which
    provides a variety of methods that are useful for adding, removing, and performing
    tasks against the data that is used with the collection. This chapter introduces
    some of the data structures that can be utilized within a Java application for
    the storage of user data. It discusses some of the data structures in detail and
    introduces operations performed on the data. The concepts of pipelines and streams
    are introduced in this chapter, and it provides recipes that demonstrate their
    usage.


    ## 7.1 Defining a Fixed Set of Related Constants


    ### Problem


    You need a type that can represent a fixed set of related constants.


    ### Solution


    Use an enum type. The following example defines an enum type, called `FieldType`,
    to represent various form fields you might find on the GUI of an application.


    ```

    public enum FieldType { PASSWORD, EMAIL_ADDRESS, PHONE_NUMBER, SOCIAL_SECURITY_NUMBER
    }

    ```


    This is the simplest form of an enum type, which often suffice when needed is
    a related set of named constants. In the following code, a `field` variable of
    type `FieldType` is declared and initialized to the `FieldType.EMAIL_ADDRESS`
    enum constant. Next, the code prints the results from calling various methods
    that are defined for all enum types.


    ```

    public static void main(String[] args) {

    FieldType field = FieldType.EMAIL_ADDRESS;

    System.out.println("field.name(): " + field.name());

    System.out.println("field.ordinal(): " + field.ordinal());

    System.out.println("field.toString(): " + field.toString());

    System.out.println("field.isEqual(EMAIL_ADDRESS): " +

    field.equals(FieldType.EMAIL_ADDRESS));

    System.out.println("field.isEqual(\"EMAIL_ADDRESS\"''): " + field.equals("EMAIL_ADDRESS"));

    System.out.println("field == EMAIL_ADDRESS: " + (field == FieldType.EMAIL_ADDRESS));

    // Won''t compile – illustrates type safety of enum

    // System.out.println("field == \"EMAIL_ADDRESS\": " + (field == "EMAIL_ADDRESS"));

    System.out.println("field.compareTo(EMAIL_ADDRESS): " +

    field.compareTo(FieldType.EMAIL_ADDRESS));

    System.out.println("field.compareTo(PASSWORD): " + field.compareTo(FieldType.PASSWORD));

    System.out.println("field.valueOf(\"EMAIL_ADDRESS\"): " + field.valueOf("EMAIL_ADDRESS"));

    try {

    System.out.print("field.valueOf(\"email_address\"): ");

    System.out.println(FieldType.valueOf("email_address"));

    } catch (IllegalArgumentException e) {

    System.out.println(e.toString());

    }

    System.out.println("FieldType.values(): " + Arrays.toString(FieldType.values()));

    }

    ```


    Running this code result in the following output.


    ```

    field.name(): EMAIL_ADDRESS

    field.ordinal(): 1

    field.toString(): EMAIL_ADDRESS

    field.isEqual(EMAIL_ADDRESS): true

    field.isEqual("EMAIL_ADDRESS"''): false

    field == EMAIL_ADDRESS: true

    field.compareTo(EMAIL_ADDRESS): 0

    field.compareTo(PASSWORD): 1

    field.valueOf("EMAIL_ADDRESS"): EMAIL_ADDRESS

    field.valueOf("email_address"): java.lang.IllegalArgumentException: No enum constant
    org.java17recipes.chapter07.recipe07_01.BasicEnumExample.FieldType.email_address

    FieldType.values(): [PASSWORD, EMAIL_ADDRESS, PHONE_NUMBER, SSN]

    ```'
