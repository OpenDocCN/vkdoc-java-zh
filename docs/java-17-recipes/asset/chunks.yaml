    ## 2.13 处理 try-with-resources 结构


    ### 问题


    你希望轻松管理有效最终变量的关闭。


    ### 解决方案


    `try-with-resources` 结构是在 Java 7 中引入的，允许轻松进行资源管理。在 Java 9 版本中，它变得更加容易，因为无需为了该结构而有效地创建一个新变量。在以下代码中，`writeFile()`
    方法接受一个 `BufferedWriter` 作为参数，由于它被传入方法并准备使用，因此它是有效最终的。这意味着它可以简单地列在 `try-with-resources`
    中，而无需创建新变量。


    ```

    public static void main(String[] args) {

    try {

    writeFile(new BufferedWriter(

    new FileWriter("Easy TryWithResources")),

    "This is easy since Java 9");

    } catch (IOException ioe) {

    System.out.println(ioe);

    }

    }

    public static void writeFile(BufferedWriter writer, String text) {

    try (writer) {

    writer.write(text);

    } catch (IOException ioe) {

    System.out.println(ioe);

    }

    }

    ```


    这段代码创建了一个名为 EasyTryWithResources 的新文件。它添加了文本“This is easy in Java 9”。


    ### 工作原理


    `try-with-resources` 结构在 Java 9 中变得更加容易，允许非常轻松地处理资源的打开和关闭。如果我们有一个资源，例如数据库连接或 `BufferedStream`，明智地管理它是很好的。换句话说，打开资源，然后相应地使用它，最后在完成后关闭资源以确保没有资源泄漏。`try-with-resources`
    结构允许在 try 块内打开一个资源，并在完成后自动清理它。


    解决方案在 Java 9 中展示。如果一个资源作为参数或最终字段传入方法，则可以简单地在 `try-with-resources` 结构中使用它。虽然这不是一个重大的语言变更，但它确实使处理资源变得稍微容易一些，使
    `try-with-resources` 块更容易理解。


