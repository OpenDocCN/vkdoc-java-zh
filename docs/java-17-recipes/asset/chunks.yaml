    ConcurrentMap concurrentMap = new ConcurrentHashMap();

    for (int i = 0; i  {

    System.out.println("Key :" + entry.getKey() + " Value:" + entry.getValue());

    });

    }

    private void startUpdateThread(final int i, final ConcurrentMap concurrentMap)
    {

    Thread thread = new Thread(() -> {

    int randomInt = random.nextInt(20);

    String previousEntry = concurrentMap.putIfAbsent(randomInt, "Thread # " + i +
    " has made it!");

    if (previousEntry != null) {

    System.out.println("Thread # " + i + " tried to update it but guess what, we''re
    too late!");

    } else {

    System.out.println("Thread # " + i + " has made it!");

    }

    });

    thread.start();

    }

    }

