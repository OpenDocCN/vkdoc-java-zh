- fmt: "### Solution\n\n通过让对象实现`Externalizable`接口，你可以指示Java虚拟机使用自定义的序列化/反序列化机制，如下例中`readExternal`/`writeExternal`方法所示。\n\
    \n```java\npublic class ExternalizableProgramSettings implements Externalizable\
    \ {\n    private Point locationOnScreen;\n    private Dimension frameSize;\n \
    \   private Color defaultFontColor;\n    private String title;\n\n    // Empty\
    \ constructor, required for Externalizable implementors\n    public ExternalizableProgramSettings()\
    \ {\n    }\n\n    @Override\n    public void writeExternal(ObjectOutput out) throws\
    \ IOException {\n        out.writeInt(locationOnScreen.x);\n        out.writeInt(locationOnScreen.y);\n\
    \        out.writeInt(frameSize.width);\n        out.writeInt(frameSize.height);\n\
    \        out.writeInt(defaultFontColor.getRGB());\n        out.writeUTF(title);\n\
    \    }\n\n    @Override\n    public void readExternal(ObjectInput in) throws IOException,\
    \ ClassNotFoundException {\n        locationOnScreen = new Point(in.readInt(),\
    \ in.readInt());\n        frameSize = new Dimension(in.readInt(), in.readInt());\n\
    \        defaultFontColor = new Color(in.readInt());\n        title = in.readUTF();\n\
    \    }\n    // getters and setters omitted for brevity\n}\n```\n\n主类如下：\n\n```java\n\
    package org.java17recipes.chapter08.recipe08_02;\n\nimport java.awt.*;\nimport\
    \ java.io.*;\n\npublic class Ch_8_2_ExternalizableExample {\n    public static\
    \ void main(String[] args) {\n        Ch_8_2_ExternalizableExample example = new\
    \ Ch_8_2_ExternalizableExample();\n        example.start();\n    }\n\n    private\
    \ void start() {\n        ExternalizableProgramSettings settings = new ExternalizableProgramSettings(\n\
    \            new Point(10,10), new Dimension(300,200), Color.blue, \n        \
    \    \"The title of the application\"\n        );\n        saveSettings(settings,\
    \ \"settingsExternalizable.bin\");\n        ExternalizableProgramSettings loadedSettings\
    \ = loadSettings(\"settingsExternalizable.bin\");\n        System.out.println(\"\
    Are settings are equal? :\" + loadedSettings.equals(settings));\n    }\n\n   \
    \ private void saveSettings(ExternalizableProgramSettings settings, String filename)\
    \ {\n        try {\n            FileOutputStream fos = new FileOutputStream(filename);\n\
    \            try (ObjectOutputStream oos = new ObjectOutputStream(fos)) {\n  \
    \              oos.writeObject(settings);\n            }\n        } catch (IOException\
    \ e) {\n            e.printStackTrace();\n        }\n    }\n\n    private ExternalizableProgramSettings\
    \ loadSettings(String filename) {\n        try {\n            FileInputStream\
    \ fis = new FileInputStream(filename);\n            ObjectInputStream ois = new\
    \ ObjectInputStream(fis);\n            return (ExternalizableProgramSettings)\
    \ ois.readObject();\n        } catch (IOException | ClassNotFoundException e)\
    \ {\n            e.printStackTrace();\n        }\n        return null;\n    }\n\
    }\n```\n\n### How It Works\n\nJava序列化框架允许你指定序列化对象的实现方式。它要求实现`Externalizable`接口而非`Serializable`接口。`Externalizable`接口包含两个方法：`writeExternal(ObjectOutput\
    \ out)`和`readExternal(ObjectInput in)`。通过实现这些方法，你告诉框架如何编码/解码你的对象。你可能选择实现`Externalizable`接口而不是`Serializable`接口，因为Java的默认序列化效率非常低。Java序列化框架需要确保每个对象（及其依赖对象）都被序列化，它甚至会写入具有默认值或可能为空/`null`的对象。实现`Externalizable`接口还能让你更精细地控制类的序列化方式。在我们的示例中，`Serializable`版本创建了439字节的设置，而`Externalizable`版本仅占103字节！\n\
    \n## 8.3 将Java对象序列化为XML\n\n### Problem\n\n尽管你很喜欢序列化框架，但希望创建至少跨语言兼容（或人类可读）的内容。你希望使用XML来保存和加载对象。\n\
