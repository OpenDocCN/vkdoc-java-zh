    won’t be creating your own generic types. However, if you understand how generics
    are used with the `Collection` interfaces and classes, you can create your own
    generic types.


    The first thing to understand and remember about Java generics is that they are
    strictly a compile-time feature that aids the developer in creating more type-safe
    code. All the type information that you specify when you parameterize a generic
    type gets “erased” by the compiler when the code is compiled down to byte code.
    You’ll see this described as *type erasure* . Let’s look at an example of a generic
    `Collection` type: the `List. List` is an interface defined as follows.


