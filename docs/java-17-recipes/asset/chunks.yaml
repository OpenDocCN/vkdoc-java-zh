    ## 4.5 Comparing Floating-Point Numbers


    ### Problem


    You need to compare two or more floating-point values in an application.


    ### Solution 1


    Use the `Float` object’s `compareTo()` method to compare one `float` against another.
    The following example shows the `compareTo()` method in action.


    ```

    public static void compareFloat(){

    Float float1 = Float.valueOf ("9.675");

    Float float2 = Float.valueOf ("7.3826");

    Float float3 = Float.valueOf ("23467.373");

    System.out.println(float1.compareTo(float3));  // Result: -1

    System.out.println(float2.compareTo(float3));  // Result: -1

    System.out.println(float1.compareTo(float1));  // Result: 0

    System.out.println(float3.compareTo(float2));  // Result: 1

    }

    The main class is:

    public static void main(String[] args){

    compareFloat();

    }

    ```


    The result of calling the `compareTo()` method is an integer value. A negative
    result indicates that the first `float` is less than the `float` being compared
    against. A zero indicates that the two `float` values are equal. Lastly, a positive
    result indicates that the first `float` is greater than the `float` being compared
    against.


    ### Solution 2


    Use the `Float` class `compare()` method to perform the comparison. The following
    example demonstrates the `Float.compare(float, float)` method.


    ```

    System.out.println(Float.compare(float1, float3)); // Result: -1

    System.out.println(Float.compare(float2, float3)); // Result: -1

    System.out.println(Float.compare(float1, float1)); // Result: 0

    System.out.println(Float.compare(float3, float2)); // Result: 1

    ```


    ### How It Works


    The most useful way to compare two `Float` objects is to use the `compareTo()`
    method. This method performs a numeric comparison against the given `Float` objects.
    The result is an integer value indicating whether the first `float` is numerically
    greater than, equal to, or less than the `float` it is compared against. If a
    `float` value is `NaN`, it is considered equal to other `NaN` values or greater
    than all other `float` values. Also, a `float` value of `0.0f` is greater than
    a `float` value of `–0.0f`.


    An alternative to using `compareTo()` is the `compare()` method, which is also
    native to the `Float` class. The `compare()` method was introduced in Java 1.4,
    and it is a static method that compares two `float` values in the same manner
    as `compareTo()`. It only makes the code read a bit differently. The format for
    the `compare()` method is as follows.


    ```

    Float.compare(primitiveFloat1, primitiveFloat2)

    ```


    The `compare()` method shown makes the following call using `compareTo()`.


    ```

    new Float(float1).compareTo(new Float(float2));

    ```


    In the end, the same result is returned using either `compareTo()` or `compare()`.


    ## 4.6 Randomly Generating Values


    ### Problem


    An application that you are developing requires the use of randomly generated
    numbers.


    ### Solution 1


    Use the `java.util.Random` class to help generate the random numbers. The `Random`
    class was developed to generate random numbers for a handful of the Java numeric
    data types. This code demonstrates the use of the `Random` class to generate such
    numbers.


    ```

    public static void randomExamples() {

    // Create a new instance of the Random class

    Random random = new Random();

    System.out.println("Random: " + random);

    // Generates a random Integer

    int myInt = random.nextInt();

    System.out.println("Random int: " + myInt);

    // Generates a random Double value

    double myDouble = random.nextDouble();

    System.out.println("Random double: " + myDouble);

    // Generates a random float

    float myFloat = random.nextFloat();

    System.out.println("Random float: " + myFloat);

    // Generates a random Gaussian double

    // mean 0.0 and standard deviation 1.0

    // from this random number generator''s sequence.

    double gausDouble = random.nextGaussian();

    System.out.println("Random Gaussian double: " + gausDouble);

    // Generates a random Long

    long myLong = random.nextLong();

    System.out.println("Random long: " + myLong);

    // Generates a random boolean

    boolean myBoolean = random.nextBoolean();

    System.out.println("Random boolean: " + myBoolean);

    }

    The main class is:

    public static void main(String[] args){

    randomExamples();

    }

    An output is:

    Random: java.util.Random@17f052a3

    Random int: 626546817

    Random double: 0.3717917526454104

    Random float: 0.23121738

    Random Gaussian double: -0.48108588194060814

    Random long: 686366349321458218

    Random boolean: false

    ```


    ### Solution 2


    Use the `Math.random()` method. This produces a `double` value greater than `0.0`,
    but less than `1.0`. The following code demonstrates the use of this method.


    ```

    double rand = Math.random();

    ```


    ### How It Works


    The `java.util.Random` class uses a 48-bit seed to generate a series of pseudorandom
    values. As you can see from the example in the solution to this recipe, the `Random`
    class can generate many different types of random number values based on the given
    seed. By default, the seed is generated based on a calculation derived from the
    number of milliseconds that the machine has been active. However, the seed can
    be set manually using the `Random.setSeed()` method. If two `Random` objects have
    the same seed, they produce the same results.


    It should be noted that there are cases in which the `Random` class might not
    be the best choice for generating random values. For instance, if you are attempting
    to use a thread-safe instance of `java.util.Random`, you might run into performance
    issues if you’re working with many threads. In such a case, you might consider
    using the `ThreadLocalRandom` class instead. Similarly, if you require the use
    of a cryptographically secure `Random` object, consider using `SecureRandom`.


    The `java.util.Random` class comes in very handy when you need to generate a type-specified
    random value. Not only is it easy to use, but it also provides a wide range of
    options for the return type. Another easy technique is to use the `Math.random()`
    method, which produces a `double` value within the range of `0.0` to `1.0`, as
    demonstrated in solution 2. Both techniques provide a good means of generating
    random values. However, if you need to generate random numbers of a specific type,
    `java.util.Random` is the best choice.


