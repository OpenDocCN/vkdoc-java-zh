- fmt: "# 部署描述符与 Servlet 示例\n\n## 13.6 部署描述符\n\n必须使用部署描述符来调用不同的 Web 应用程序对象（监听器、Servlet\
    \ 和过滤器）。部署描述符是`web.xml`文件。在本例中，内容如下：\n\n```xml\n<servlet>\n  <servlet-name>FirstServlet</servlet-name>\n\
    \  <servlet-class>org.java17recipes.chapter13.FirstServlet</servlet-class>\n</servlet>\n\
    <servlet-mapping>\n  <servlet-name>FirstServlet</servlet-name>\n  <url-pattern>/FirstServlet</url-pattern>\n\
    </servlet-mapping>\n```\n\n加粗的`<url-pattern>`标签是浏览器中显示的字符串。有关 Jakarta Servlet\
    \ 5.0 的更多信息，请参阅 [`https://jakarta.ee/specifications/servlet/5.0/`](https://jakarta.ee/specifications/servlet/5.0/)\
    \ 上的规范。\n\n## 13.7 使用 Servlet 表示值\n\n### 问题\n您希望使用 Servlet 和 JSP 处理 Web 应用程序中表单的数据。\n\
    \n### 解决方案\n创建包含表单的 JSP 页面。转到 **File ➤ New ➤ JSP files**。将文件命名为`formExample.jsp`。\n\
    \n清单 [13-10](#323910_4_En_13_Chapter.xhtml#PC27) 是 Java 代码。\n\n```jsp\n<form action=\"\
    FirstServlet\" method=\"get\">\n  first name: <input type=\"text\" name=\"firstname\"\
    ><br>\n  last name: <input type=\"text\" name=\"lastname\"><br>\n  <input type=\"\
    submit\" value=\"Submit\">\n</form>\n```\n\n**清单 13-10** Java 代码\n\n这里有两个表单，分别由两种方法（`POST`和`GET`）、两个不同的输入字段和两个提交按钮来表征。\n\
