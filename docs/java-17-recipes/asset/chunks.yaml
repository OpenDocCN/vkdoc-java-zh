    `javac`. You must reside within the same directory as the source file or prepend
    the file’s name with the path to where the file is located.


    The output is shown in Figure [1-17](#323910_4_En_1_Chapter.xhtml#Fig17).


    ![](images/323910_4_En_1_Chapter/323910_4_En_1_Fig17_HTML.jpg)


    Figure 1-17


    JavaDoc example in Eclipse IDE


    ### How It Works


    Generating documentation for applications from scratch can be quite tedious. Maintaining
    documentation can be even more troublesome. The JDK comes packaged with an extensive
    system for documentation known as JavaDoc. Placing special comments throughout
    your code source and running a simple command-line tool makes it easy to generate
    useful documentation and keep it current. Even if some of the classes, methods,
    or fields in an application are not specifically commented on by the JavaDoc utility,
    default documentation is produced for these elements.


    #### Formatting the Documentation


    To create a JavaDoc comment, begin with the characters `/**`. Although optional
    since Java 1.4, a common practice is to include an asterisk as the first character
    of every subsequent line within the comment. Another good practice is to indent
    the comment to align with the code that is being documented. Lastly, close the
    comment with the characters `*/`.


    JavaDoc comments should begin with a short description of the class or method.
    Fields are rarely commented using JavaDoc unless they are declared `public static
    final` (constants), in which case it is a good idea to supply a comment. A comment
    can be several lines long and can even contain more than one paragraph. If you
    want to break comments into paragraphs, then separate those paragraphs using the
    `<p>` tag. Comments can include several tags that indicate various details regarding
    the method or class being commented. JavaDoc tags begin with an ampersand `(@)`,
    and some of the common tags are as follows.


    ```

    @param: Name and description of a parameter

    @return: What is returned from the method

    @see: Reference to another piece of code

    ```


    You may also include inline links within JavaDoc to reference URLs. To include
    an inline link, use the tag `{@link My Link}`, where `link` is the actual URL
    that you want to point at, and `My Link` is the text that you want to appear.
    Many other tags can be used within JavaDoc comments, including `{@literal}`, `{@code}`,
    `{@value org}`, and many others.


    #### Executing the Tool


    The JavaDoc tool can be run against entire packages or sources. Simply pass a
    package name to the JavaDoc tool rather than individual source file names. For
    instance, if an application includes a package named `org.luciano.beans`, all
    source files within that package can be documented by running the tool, as follows.


    ```

    javadoc org.luciano.beans

    ```


    By default, the JavaDoc tool generates HTML and places it into the same package
    as documented code. That result can become a cluttered nightmare if you like to
    have source files separate from the documentation. Instead, you can set up a destination
    for the generated documentation by passing the `–d` flag to the JavaDoc tool.


    ## 1.13 Reading Environment Variables


    ### Problem


    The application you are developing needs to make use of some environment variables.
    You want to read the values that have been set from the operating-system level.


    ### Solution


    Use the Java `System` class to retrieve any environment variable values. The `System`
    class has a method called `getenv()` that accepts a `String` argument corresponding
    to the name of a system environment variable. The method then returns the value
    of the given variable. If no matching environment variable exists, a `NULL` value
    is returned. Listing [1-11](#323910_4_En_1_Chapter.xhtml#PC49) is an example.
    The `ReadOneEnvVariable` class accepts an environment variable name as a parameter
    and displays the variable’s value that has been set at the operating-system level.


    ```

    package org.java17recipes.chapter1.recipe1_13;

    public class ReadOneEnvVariable {

    public static void main(String[] args) {

    if (args.length > 0) {

    String value = System.getenv(args[0]);

    if (value != null) {

    System.out.println(args[0].toUpperCase() + " = " + value);

    } else {

    System.out.println("No such environment variable exists");

    }

    } else {

    System.out.println("No arguments passed");

    }

    }

    }

    Listing 1-11

    Reading an Environment Variable’s Value

    ```


    If you are interested in retrieving the entire list of environment variables defined
    on a system, do not pass any arguments to the `System.getenv()` method . You receive
    an object of type `Map` having all the values. You can iterate through them, as
    shown in Listing [1-12](#323910_4_En_1_Chapter.xhtml#PC50).


    ```

    package org.java17recipes.chapter1.recipe1_13;

    import java.util.Map;

    public class ReadAllEnvVariables {

    public static void main(String[] args){

    if(args.length > 0){

    String value = System.getenv(args[0]);

    if (value != null) {

    System.out.println(args[0].toUpperCase() + " = " + value);

    } else {

    System.out.println("No such environment variable exists");

    }

    } else {

    Map vars = System.getenv();

    for(String var : vars.keySet()){

    System.out.println(var + " = " + vars.get(var));

    }

    }

    }

    }

    Listing 1-12

    Iterating Through a Map of Environment Variables

    ```'
