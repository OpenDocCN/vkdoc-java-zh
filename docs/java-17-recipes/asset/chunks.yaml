    ## 8.8 遍历目录中的文件


    ### 问题


    你需要扫描一个目录中的文件。该目录下可能还有包含更多文件的子目录。你希望将这些子目录也纳入扫描范围。


    ### 解决方案


    使用 NIO.2，创建一个 [java.​nio.​file](https://docs.oracle.com/en/java/javase/17/docs/api/java.base/java/nio/file/package-summary.html).FileVisitor<T>
    接口对象，并在其 `visitFile` 方法中执行所需的实现。接着，获取默认的 `FileSystem` 对象，并通过 `getPath()` 方法获取你想要扫描的路径引用。最后，调用
    `Files.walkFileTree()` 方法，传入你创建的 `Path` 和 `FileVisitor<T>`。以下代码演示了如何执行这些任务。


    ```

    public class Ch_8_8_TraverseDirectory {

    private void start() {

    FileVisitor myFileVisitor = new SimpleFileVisitor() {

    @Override

    public FileVisitResult visitFile(Path file, BasicFileAttributes attrs)

    throws IOException {

    System.out.println("Visited File: "+file.toString());

    return FileVisitResult.CONTINUE;

    }

    };

    FileSystem fileSystem = FileSystems.getDefault();

    Path directory= fileSystem.getPath(".");

    try {

    Files.walkFileTree(directory, myFileVisitor);

    } catch (IOException e) {

    e.printStackTrace();

    }

    }

    public static void main (String args[]) {

    Ch_8_8_TraverseDirectory traverseDirectory = new Ch_8_8_TraverseDirectory();

    traverseDirectory.start();

    }

    ```


    ### 工作原理


    在 NIO.2 出现之前，尝试遍历目录树需要用到递归，而且根据实现方式的不同，代码可能非常脆弱。获取文件夹内文件的调用是同步的。它们需要先扫描整个目录才能返回，这会导致应用程序用户感觉方法调用无响应。有了
    NIO.2，你可以指定从哪个文件夹开始遍历，而 NIO.2 的调用会处理递归的细节。你只需要向 NIO.2 API 提供一个类，告诉它在找到文件/文件夹时该做什么（即
    [java.​nio.​file](https://docs.oracle.com/en/java/javase/17/docs/api/java.base/java/nio/file/package-summary.html).SimpleFileVisitor<T>
    类的实现）。NIO.2 使用了“访问者”模式，因此它不需要预先扫描整个文件夹，而是在迭代处理文件的同时进行处理。


    将 `SimpleFileVisitor<T>` 类实现为匿名内部类时，需要重写 `visitFile(Path file, BasicFileAttributesattrs()`
    方法。重写此方法后，你就可以指定在遇到文件时要执行的任务。


    `visitFile` 方法返回一个 `FileVisitReturn` 枚举。这个枚举会告诉 `FileVisitor<T>` 接下来要执行哪个操作。


    *   `CONTINUE` 继续遍历目录树。

    *   `TERMINATE` 停止遍历。

    *   `SKIP_SUBTREE` 停止从当前树层级继续向下深入（仅当在 `preVisitDirectory()` 方法中返回此枚举时有用）。

    *   `SKIP_SIBLINGS` 跳过与当前目录处于同一树层级的其他目录。


    除了 `visitFile()` 方法之外，`SimpleFileVisitor<T>` 类还包含以下方法：


    *   `preVisitDirectory` 在进入要遍历的目录之前调用。

    *   `postVisitDirectory` 在完成遍历一个目录后调用。

    *   `visitFile` 在访问文件时调用，如示例代码所示。

    *   `visitFileFailed` 在无法访问文件时调用，例如发生 I/O 错误时。


