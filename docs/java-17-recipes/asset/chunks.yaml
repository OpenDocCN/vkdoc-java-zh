    提示


    在编码/解码时注册一个异常监听器是一个好习惯。


    `XMLEncoder` 会创建正在序列化的类的新实例（请记住，它们需要是 JavaBeans，因此必须有一个空的`无参`构造函数），然后找出哪些属性是可访问的（通过
    `get{属性}, set{属性}`）。如果新实例化类的某个属性与原始类的该属性包含相同的值（即具有相同的默认值），则 `XMLEncoder` 不会写入该属性。换句话说，如果某个属性的默认值没有改变，`XMLEncoder`
    就不会写入它。这提供了在不同版本之间更改“默认”值的灵活性。例如，如果某个属性的默认值在对象编码时为 2，而之后默认属性从 2 更改为 4，则解码后的对象将包含新的默认属性值
    4（这可能不正确）。


    `XMLEncoder` 还会跟踪引用。如果一个对象在对象图中被持久化时出现多次（例如，一个对象既在主类的 `Map` 中，又作为 `DefaultValue`
    属性存在），那么 `XMLEncoder` 只会对其进行一次编码，并通过在 XML 中放置一个链接来关联引用。`XMLEncoder`/`XMLDecoder`
    类比序列化框架宽容得多。在解码时，如果某个属性类型发生更改、被删除/添加/移动/重命名，解码过程会“尽可能多地”解码，同时跳过无法解码的属性。


    建议不要持久化你的主类（即使 `XMLEncoder` 更宽容），而是创建一些简单的、持有基本信息的、并且自身不执行太多任务的特殊对象。


    ## 8.4 创建 Socket 连接并通过网络发送可序列化对象


    ### 问题


    你需要打开一个网络连接来发送/接收对象。


    ### 解决方案


    使用 Java 的新输入/输出 API 版本 2（NIO.2）来发送和接收对象。以下解决方案利用了 NIO.2 的非阻塞套接字特性（使用 `Future`
    任务）。


    ```

    public class Ch_8_4_AsyncChannel {

    private AsynchronousSocketChannel clientWorker;

    InetSocketAddress hostAddress;

    public Ch_8_4_AsyncChannel() {

    }

    private void start() throws IOException, ExecutionException, TimeoutException,
    InterruptedException {

    hostAddress = new InetSocketAddress(InetAddress.getByName("127.0.0.1"), 2583);

    Thread serverThread = new Thread(() -> {

    serverStart();

    });

    serverThread.start();

    Thread clientThread = new Thread(() -> {

    clientStart();

    });

    clientThread.start();

    }

    private void clientStart() {

    try {

    try (AsynchronousSocketChannel clientSocketChannel = AsynchronousSocketChannel.open())
    {

    Future connectFuture = clientSocketChannel.connect(hostAddress);

    connectFuture.get();            // 等待直到连接完成。

    OutputStream os = Channels.newOutputStream(clientSocketChannel);

    try (ObjectOutputStream oos = new ObjectOutputStream(os)) {

    for (int i = 0; i  serverFuture  = serverSocketChannel.accept();

    final AsynchronousSocketChannel clientSocket = serverFuture.get();

    System.out.println("已连接！");

    if ((clientSocket != null) && (clientSocket.isOpen())) {

    try (InputStream connectionInputStream = Channels.newInputStream(clientSocket))
    {

    ObjectInputStream ois = null;

    ois = new ObjectInputStream(connectionInputStream);

    while (true) {

    Object object = ois.readObject();

    if (object.equals("EOF")) {

    clientSocket.close();

    break;

    }

    System.out.println("收到 :" + object);

    }

    ois.close();

    }

    }

    } catch (IOException | InterruptedException | ExecutionException | ClassNotFoundException
    e) {

    e.printStackTrace();

    }

    }

    public static void main(String[] args) throws IOException, ExecutionException,
    TimeoutException, InterruptedException {

    Ch_8_4_AsyncChannel example = new Ch_8_4_AsyncChannel();

    example.start();

    }

    }

    输出结果为：

    已连接！

    收到 :Look at me 0

    收到 :Look at me 1

    收到 :Look at me 2

    收到 :Look at me 3

    收到 :Look at me 4

    ```

