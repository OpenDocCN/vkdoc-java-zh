    \ reason: Eclipse doesn’t always display everything. It should copy all files\
    \ from the project folder to a Tomcat work directory, but it doesn’t! It tends\
    \ to “lose” CSS files and images. This means that, except for a quick check of\
    \ simple features, you might also want to use Tomcat in Eclipse with an external\
    \ browser.\n\nOpen a browser and type `localhost:8080/test`. You should see the\
