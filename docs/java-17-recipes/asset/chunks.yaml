    ## 2.3 Writing a Text Block


    ### Problem


    You want to write a string in multiple lines in a smart way.


    ### Solution


    A smart form for writing a multiline string in a simple text block was introduced
    in Java 15 (JEP 378), though first proposed in Java 13.


    The following is an example.


    ```

    public class MultipleLineStringEx {

    public static void main (String[] args) {

    String writeTextStandard = "\n" +

    "      Ciao, hello\n" +

    "\n";

    String writeTextSmart = """


    Ciao, hello


    """;

    System.out.println(writeTextStandard);

    System.out.println(writeTextSmart);

    }

    }

    ```


    The output is the same.


    ### How It Works


    Java 13 introduced an enhancement to make multiline strings more readable. So,
    text block efficiently eliminates the concatenation of multiple strings together.
    The need was to choose a way to visually text blocks and string literals: the
    delimiter """ was chosen. Moreover, indentation was removed and replaced with
    whitespace characters.


    For more information on text blocks, see the documentation at [https://​openjdk.​java.​net/​jeps/​378](https://openjdk.java.net/jeps/378).


