  raw: '### Solution


    Use a `try`/`catch`/`finally` block to properly release locks and other resources
    that you acquire in a code segment. Place the code that you want to have executed
    regardless of exceptions into the `finally` clause. In the example, the `finally`
    keyword specifies a code block that always executes, regardless of whether an
    exception was thrown in the `try` block. Within the `finally` block, the lock
    is released by calling `lock.unlock().`


    ```

    public class Recipe9_2 {

    Lock myLock = new ReentrantLock();

    Random random = new Random();

    public static void main(String[] args) {

    Recipe9_2 recipe = new Recipe9_2();

    recipe.start();

    }

    private void start() {

    for (int i = 0; i < 10; i++) {

    callFunctionThatHoldsLock();

    }

    }

    private void callFunctionThatHoldsLock() {

    myLock.lock();

    try {

    int number = random.nextInt(5);

    int result = 100 / number;

    System.out.println("A result is " + result);

    FileOutputStream file = new FileOutputStream("file.out");

    file.write(result);

    file.close();

    } catch (FileNotFoundException e) {

    e.printStackTrace();

    } catch (IOException e) {

    e.printStackTrace();

    } catch (Exception e) {

    e.printStackTrace();

    } finally {

    myLock.unlock();

    }

    }

    }

    ```


    ### How It Works


    Code placed within the `finally` clause of a `try`/`catch`/`finally` block is
    always executed. In this example, acquiring the lock at the beginning of the function
    and releasing it in the `finally` block guarantees that it is released at the
    end of the function, regardless of whether an exception (checked or unchecked)
    is thrown. In all, acquired locks should always be released in a `finally` block.
    In the example, suppose that the `mylock.unlock()` function call was not in the
    `finally` block (but at the end of the `try` block); if an exception were to happen
    in this case, the call to `mylock.unlock()` would not happen because code execution
    would be interrupted in the location where the exception happened. In that case,
    the lock would be forever acquired and never released.


    Caution


    If you need to return a value on a method, avoid returning values in the `finally`
    block. A `return` statement in the `finally` block always executes, regardless
    of any other `return` statements that might have happened within the `try` block.


    ## 9.3 Throwing Exceptions


    ### Problem


    You want to abort the execution of the current code path by throwing an exception
    if a certain situation occurs within your application.


    ### Solution


    Use the `throw` keyword to throw a specified exception when the situation occurs.
    Using the `throw` keyword, you can signal the current thread to look for `try`/`catch`
    blocks (at the current level and up the stack), which can process the thrown exception.
    In the following example, the `callSomeMethodThatMightThrow` throws a `NullPointerException`
    (RuntimeException type) if the parameter passed in is `null`.


    ```

    public class Recipe9_3 {

    public static void main(String[] args) {

    Recipe9_3 recipe = new Recipe9_3();

    recipe.start();

    }

    private void start() {

    try {

    callSomeMethodThatMightThrow(null);

    } catch (IllegalArgumentException e) {

    System.err.println("There was an illegal argument exception!");

    }

    }

    private void callSomeFunctionThatMightThrow(Object o) {

    if (o == null) throw new NullPointerException("The object is null");

    }

    ```


    In this code example, the `callSomeMethodThatMightThrow` method checks to ensure
    that a valid argument was passed to it. If the argument is `null`, it then throws
    a `NullPointerException (RuntimeException` type`)`, signaling that the caller
    of this method invoked it with the wrong parameters.


    ### How It Works


    The `throw` keyword allows you to explicitly generate an exceptional condition.
    When the current thread throws an exception, it doesn’t execute anything beyond
    the `throw` statement and instead transfers control to the `catch` clause (if
    there are any) or terminates the thread.


    Note


    When throwing an exception, be sure that you intend to do so. If an exception
    is not caught as it propagates up the stack, it terminates the executing thread
    (also known as *unraveling*). If your program has only one main thread, an uncaught
    exception terminates your program.


    ## 9.4 Catching Multiple Exceptions


    ### Problem


    A block of code in your application has the possibility of throwing multiple exceptions.
    You want to catch each of the exceptions that may occur within a `try` block.


    ### Solution 1


    More than one `catch` clause can be specified when multiple exceptions may be
    encountered within the same block. Each `catch` clause can specify a different
    exception to handle so that each exception can be handled differently. In the
    following code, two `catch` clauses handle `IOException` and a `ClassNotFoundException`
    .


    ```

    public static void main(String[] args) {

    Recipe9_4 recipe = new Recipe9_4();

    recipe.startClassic();

    }

    private void startClassic() {

    try {

    Class stringClass = Class.forName("java.lang.String");

    FileInputStream in = new FileInputStream("myFile.log") ; // Can throw IOException

    in.read();

    } catch (IOException e) {

    System.err.println("There was an exception "+e);

    } catch (ClassNotFoundException e) {

    System.err.println("There was an exception "+e);

    }

    }

    ```


    ### Solution 2


    If your application tends to throw multiple exceptions within a single block,
    then a vertical bar operator (`|`) can be utilized for handling each of the exceptions
    in the same manner. In the following example, the `catch` clause specifies multiple
    exception types separated with a vertical bar (`|`) to handle each exception in
    the same manner.


    ```

    public static void main(String[] args) {

    Recipe9_4 recipe = new Recipe9_4();

    recipe.start();

    }

    private void start() {

    try {

    Class stringClass = Class.forName("java.lang.String");

    FileInputStream in = new FileInputStream("myFile.log") ;

    // Can throw IOException

    in.read();

    } catch (IOException | ClassNotFoundException e) {

    System.out.println("An exception of type "+e.getClass()+" was thrown! "+e);

    }

    }

    ```


    ### How It Works


    There are many different ways to handle situations where multiple exceptions may
    be thrown. You can specify separate `catch` clauses to handle each of the exceptions
    differently. To handle each exception in the same manner, you can utilize a single
    `catch` clause and specify each exception separated with a vertical bar operator.


    Note


    If you’re catching an exception in multiple `catch` blocks (solution 1), make
    sure that the `catch` blocks are defined from the most specific to the most general.
    Failure to follow this convention prevents an exception from handling the more
    specific blocks. This is most important when there are `catch (Exception e)` blocks,
    which catch almost all exceptions.


    Having a catch (`Exception e`) block—called a *catch-all* or *Pokémon exception
    handler* (gotta catch them all)—is usually poor practice because such a block
    catches every exception type and treats them all the same. This becomes a problem
    because the block can catch other exceptions that may occur deeper within the
    call stack that you may not have intended the block to catch (`OutOfMemoryException`).
    It is best to specify each possible exception rather than specifying a catch-all
    exception handler to catch all exceptions.


    ## 9.5 Catching the Uncaught Exceptions


    ### Problem


    You want to know when a thread is terminated due to an uncaught exception such
    as `NullPointerException`.'
