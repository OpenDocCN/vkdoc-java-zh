  raw: '## Who This Book Is For


    This book is intended for anyone interested in learning the Java programming language
    and/or who already knows the language, but would like some information regarding
    Java features even if they have no experience with algorithms. Those who have
    not yet programmed in the Java language can read this book, and will allow them
    to get up and running quickly. Intermediate and advanced Java developers looking
    to update their arsenal with the latest features that Java makes available to
    them can also read the book to update and refresh their skill set. There is, of
    course, a myriad of other essential topics that will be useful to Java developers
    of any type.


    ## How This Book Is Structured


    This book is structured such that it does not have to be read from cover to cover.
    It is structured so that developers can choose which topics they wish to read
    about and jump right to them. Each recipe contains a problem to solve, one or
    more solutions to solve that problem, and an explanation of how the solution works.
    The book is designed to allow developers to quickly get a solution up and running
    so that they can be home in time for dinner.


    ## Source Code


    You can access the source code for this book at `github.com/apress/java17-recipes`.


    About the Authors About the Technical Reviewer


    # 1. Getting Started with Java 17


    This chapter presents a handful of recipes to help programmers who are new to
    the Java language and those with experience in other languages become accustomed
    to Java 17\. You learn to install Java and configure an integrated development
    environment (IDE) from which you develop applications and experiment with the
    solutions provided in this book. For security reasons, we don’t recommend installing
    something unless absolutely necessary. With no alternative, it is easier and safer
    to download a compressed version and run the relevant scripts for the respective
    operating system. You should be able to adapt our instructions to install in the
    future any latest versions and releases of all the packages mentioned in the book
    without any problem. You learn the basics of Java, such as creating a class and
    accepting keyboard input. Documentation is often overlooked, but you also quickly
    learn how to create great documentation for your Java code in this chapter.


    Note


    *Java 17 Recipes* is not intended as a complete tutorial. Rather, it covers key
    concepts of the Java language. If you are truly new to Java, you may want to pick
    up *Java 17 for Absolute Beginners* by Iuliana Cosmina (Apress, 2022).


    ## 1.1 Installing Java


    ### Problem


    You want to install Java and experiment with the language.


    ### Solution


    Install Java Development Kit 17 (JDK), which provides the language and a compiler.


    Nothing runs without Java. The runtime environment (JRE) lets you execute Java.
    The JDK lets you compile Java sources into executable classes. There are two main
    distributions: Oracle JDK and OpenJDK. We chose the second one under the GNU General
    Public License because the Oracle JDK license changed for releases starting in
    April 2019, permitting only certain uses at no cost. However, you can download
    the commercial builds of JDK from Oracle under a non-open-source license at the
    Oracle Technology Network.


    Download the OpenJDK release for your platform from [`https://jdk.java.net/17/`](https://jdk.java.net/17/),
    shown in Figure [1-1](#323910_4_En_1_Chapter.xhtml#Fig1) and extract the archive
    file on your PC.


    ![](images/323910_4_En_1_Chapter/323910_4_En_1_Fig1_HTML.jpg)


    Figure 1-1


    OpenJDK 17 home page


    ### How It Works


    *Java* is a trademark owned by the Oracle Corporation. The language itself is
    open source, and its evolution is controlled by the Java Community Process (JCP).
    You can read about it at [`www.jcp.org/en/home/index`](http://www.jcp.org/en/home/index).
    While Oracle Corporation does not own the language, its core development tends
    to be steered by that company. It is Oracle Corporation that runs the JCP and
    owns the jcp.org domain.


    The Java `home` folder has the `bin` subfolder that help you to develop and execute
    programs in Java language (with tools and utilities) and that supports the execution
    of programs written in the Java programming language (with an implementation of
    the Java Runtime Environment (JRE), class libraries, and other files). Since Java
    11, Oracle and the OpenJDK team decided to distribute only the JDK and stop duplicating
    some of the things in JDK in the JRE folder.


    There are many editions of Java, such as the Mobile Edition (ME) ([`www.oracle.com/java/technologies/javameoverview.html`](http://www.oracle.com/java/technologies/javameoverview.html))
    and the Enterprise Edition (EE) ([`www.oracle.com/it/java/technologies/java-ee-glance.html`](http://www.oracle.com/it/java/technologies/java-ee-glance.html)).
    Java SE is the Standard Edition and represents the heart of the language. We built
    the recipes in this book for Java SE programmers. Those interested in developing
    embedded applications for devices may be interested in learning more about Java
    ME. Similarly, those interested in developing web applications and working with
    enterprise solutions may be interested in learning more about Java EE.


    OpenJDK and Oracle JDK binaries are compatible and close to each other, but there
    are some differences.


    *   Oracle JDK source code includes the following text: “ORACLE PROPRIETARY/CONFIDENTIAL.
    Use is subject to license terms.” The OpenJDK refers to the GPL license terms.


    *   The output of Java the version in Oracle JDK includes the Oracle-specific
    identifier. OpenJDK does not include the Oracle-specific identifier.


    *   Oracle JDK uses the Java Cryptography Extension (JCE) Code Signing Certificate.
    OpenJDK allows unsigned third-party crypto providers.


    *   OpenJDK is offered only as a compressed archive. Oracle JDK offers installers.


    Go to [`www.oracle.com/java/technologies/javase/17-relnote-issues.html`](http://www.oracle.com/java/technologies/javase/17-relnote-issues.html)
    for more information on the Oracle JDK.


    ## 1.2 Configuring the PATH


    ### Problem


    You want to test the Java installation and compile Java from the command line.


    ### Solution


    Add the JDK path to the PATH environment variable . You should have the jdk-17
    folder at the root of your OS drive or a custom location.


    In Windows, search and for select the control panel. Click the Advanced System
    settings and then Environment Variables. In the System Variables section, find
    the PATH environment variable and select it. In the Edit System Variable field
    or the New System Variable field, insert the text **C:\jdk-17\bin;** in the field
    “Variable value”. You can also set the JAVA_HOME with the value of C:\jdk-17 and,
    then, set in the Path the value %JAVA_HOME%\bin). The semicolon at the end of
    the text is essential because it separates the new path from the existing ones.
    Do not insert additional spaces before or after.


    In Unix and Linux systems, you edit the environment file and modify the PATH variable.
    In this case, you execute a command such as the following.


    ```

    export PATH=/usr/local/jdk-17/ /bin

    ```


    At last, to find out if the path is properly set, open a command-line window,
    go to the command prompt, and type the following command.


    ```

    java -version.

    ```


    If you see a screen like the one shown in Figure [1-2](#323910_4_En_1_Chapter.xhtml#Fig2),
    the correct Java version is installed.


    Note


    A *terminal* (or command prompt in Windows) is a command-line interface that allows
    you to control your operating system by using a command prompt.


    ![](images/323910_4_En_1_Chapter/323910_4_En_1_Fig2_HTML.jpg)


    Figure 1-2


    Testing Java version'
