  raw: '### How It Works


    One of the most commonly performed operations against a database is a query. Performing
    database queries using JDBC is quite easy, although there is a bit of boilerplate
    code that needs to be used each time a query is executed. First, you need to obtain
    a `Connection` object for the database and schema that you want to run the query
    against. Next, you need to form a query and store it in string format. The `Connection`
    object then creates a `Statement` object. Your query string is passed to the `Statement`
    object’s `executeQuery()` method to query the database. Here, you can see what
    this looks like without `try-with-resources` for resource management.


    ```

    String qry = "select recipe_num, recipe_name, description from recipes";

    Connection conn;

    Statement stmt = null;

    try {

    conn = createConn.getConnection()

    stmt = conn.createStatement();

    ResultSet rs = stmt.executeQuery(qry);

    ...

    ```


    The same code can be more efficiently written as follows.


    ```

    try (Connection conn = createConn.getConnection();

    Statement stmt = conn.createStatement();) {

    ResultSet rs = stmt.executeQuery(qry);

    ...

    ```


    As you can see, the `Statement` object’s `executeQuery()` method accepts a string
    and returns a `ResultSet` object. The `ResultSet` object makes it easy to work
    with the query results to obtain the information you need in any order. If you
    look at the next line of code in the example, a `while` loop is created on the
    `ResultSet` object. This loop continues to call the `ResultSet` object’s `next()`
    method, obtaining the next row returned from the query with each iteration. In
    this case, the `ResultSet` object is named `rs`. So while `rs.next()` returns
    true, the loop continues to be processed. Once all the returned rows have been
    processed, `rs.next()` return a false to indicate that there are no more rows
    to be processed.


    Within the `while` loop, each returned row is processed. The `ResultSet` object
    is parsed to obtain the values of the given column names with each pass. Notice
    that if the column is expected to return a string, you must call the `ResultSet
    getString()` method, passing the column name in string format. Similarly, if the
    column is expected to return an int, you’d call the `ResultSet getInt()` method,
    passing the column name in string format. The same holds true for the other data
    types. These methods return the corresponding column values. In the example in
    the solution to this recipe, those values are stored into local variables.


    ```

    String recipe = rs.getString("RECIPE_NUM");

    String name = rs.getString("RECIPE_NAME");

    String desc = rs.getString("DESCRIPTION");

    ```


    Once the column value has been obtained, you can do what you want with the values
    you have stored within local variables. In this case, they are printed out using
    the `System.out()` method.


    ```

    System.out.println(recipe + "\t" + name + "\t" + desc);

    ```


    `java.sql.SQLException` could be thrown when attempting to query a database (for
    instance, if the `Connection` object has not been properly obtained or if the
    database tables that you are trying to query do not exist). You must provide exception
    handling to handle errors in these situations. Therefore, all database-processing
    code should be placed within a `try` block. The `catch` block then handles `SQLException`;
    so if thrown, the exception is handled using the code within the `catch` block.
    Sounds easy enough, right? It is, but you must do it each time you perform a database
    query—lots of boilerplate code.


    It is always a good idea to close statements and connections if they are open.
    Using the `try-with-resources` construct is the most efficient solution to resource
    management. Closing resources when finished helps ensure that the system can reallocate
    resources as needed, and act respectfully on the database. It is important to
    close connections as soon as possible so that other processes can use them.


    ## 12.5 Performing CRUD Operations


    ### Problem


    You need to have the ability to perform standard database operations within your
    application. That is, you need the ability to CRUD database records.


    ### Solution


    Create a `Connection` object and obtain a database connection, then perform the
    CRUD operation using a `java.sql.Statement` object that is obtained from the `java.sql.Connection`
    object. The database table that is used for these operations has the following
    format.


    ```

    RECIPES (

    id              int not null,

    recipe_number   varchar(10) not null,

    recipe_name     varchar(100) not null,

    description     varchar(500),

    constraint recipes_pk primary key (id) enable

    );

    ```


    The following code excerpts demonstrate how to perform each of the CRUD operations
    using JDBC.


    ```

    import java.sql.Connection;

    import java.sql.ResultSet;

    import java.sql.SQLException;

    import java.sql.Statement;

    import org.java17recipes.chapter12.recipe12_01.CreateConnection;

    public class CrudOperations {

    static CreateConnection createConn;

    public static void main(String[] args) {

    createConn = new CreateConnection();

    performCreate();

    performRead();

    performUpdate();

    performDelete();

    System.out.println("-- Final State --");

    performRead();

    }

    private static void performCreate(){

    String sql = "INSERT INTO RECIPES VALUES(" +

    "NULL, " +

    "''12-5'', " +

    "''Performing CRUD Operations'', " +

    "''How to perform create, read, update, delete functions'')";

    try (Connection conn = createConn.getConnection();

    Statement stmt = conn.createStatement();) {

    // Returns row-count or 0 if not successful

    int result = stmt.executeUpdate(sql);

    if (result == 1{

    System.out.println("-- Record created --");

    } else {

    System.err.println("!! Record NOT Created !!");

    }

    } catch (SQLException e) {

    e.printStackTrace();

    }

    }

    private static void performRead(){

    String qry = "select recipe_number, recipe_name, description from recipes";

    try (Connection conn = createConn.getConnection();

    Statement stmt = conn.createStatement();) {

    ResultSet rs = stmt.executeQuery(qry);

    while (rs.next()) {

    String recipe = rs.getString("RECIPE_NUMBER");

    String name = rs.getString("RECIPE_NAME");

    String desc = rs.getString("DESCRIPTION");

    System.out.println(recipe + "\t" + name + "\t" + desc);

    }

    } catch (SQLException e) {

    e.printStackTrace();

    }

    }

    private static void performUpdate(){

    String sql = "UPDATE RECIPES " +

    "SET RECIPE_NUMBER = ''12-5'' " +

    "WHERE RECIPE_NUMBER = ''12-4''";

    try (Connection conn = createConn.getConnection();

    Statement stmt = conn.createStatement();) {

    int result = stmt.executeUpdate(sql);

    if (result  == 1){

    System.out.println("-- Record Updated --");

    } else {

    System.out.println("!! Record NOT Updated !!");

    }

    } catch (SQLException e) {

    e.printStackTrace();

    }

    }

    private static void performDelete(){

    String sql = "DELETE FROM RECIPES WHERE RECIPE_NUMBER = ''12-5''";

    try (Connection conn = createConn.getConnection();

    Statement stmt = conn.createStatement();) {

    int result = stmt.executeUpdate(sql);

    if (result > 0){

    System.out.println("-- Record Deleted --");

    } else {

    System.out.println("!! Record NOT Deleted!!");

    }

    } catch (SQLException e) {

    e.printStackTrace();

    }

    }

    }

