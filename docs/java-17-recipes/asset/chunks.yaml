    Utilize the new Java `takeWhile()` and `dropWhile()` constructs with your stream.
    Suppose we have the following collection of data, and we wish to retrieve all
    the elements before the element containing the word *Java*.


    ```

    List myLangs = Arrays.asList("Jython is great","Groovy is awesome",

    "Scala is functional", "JRuby is productive","Java is streamlined","","Kotlin
    is interesting");

    ```


    To retrieve all elements prior to the element containing the “Java” string, we
    could use the `takeWhile()` construct, as follows.


    ```

    Stream.of("Jython is great","Groovy is awesome","Scala is functional",

    "JRuby is productive","Java is streamlined","","Kotlin is interesting")

    .takeWhile(s -> !s.contains("Java"))

    .forEach(System.out::println);

    ```


    Let’s suppose that we wish to retrieve all elements that occur after the element
    containing the “Java” string. We could use the `dropWhile()` construct, as follows.


    ```

    Stream.of("Jython is great","Groovy is awesome","Scala is functional",

    "JRuby is productive","Java is streamlined","","Kotlin is interesting")

    .dropWhile(s -> !s.contains("Java"))

    .forEach(System.out::println);

    ```


    The following is the main class.


    ```

    public static void main(String[] args){

    List myLangs = Arrays.asList("Jython is great","Groovy is awesome","Scala is functional","JRuby
    is productive","Java is streamlined","","Kotlin is interesting");

    System.out.println("Collection Data: " + myLangs);

    takeWhileExample();

    dropWhileExample();

    }

    ```


    The following is the output.


    ```

    Collection Data: [Jython is great, Groovy is awesome, Scala is functional, JRuby
    is productive, Java is streamlined, , Kotlin is interesting]

    takeWhileExample:

    Jython is great

    Groovy is awesome

    Scala is functional

    JRuby is productive

    dropWhileExample:

    Java is streamlined

    Kotlin is interesting

    ```


    ## How It Works


    Streams changed how we develop code and handle data collections in Java. The original
    set of filters available for use with streams was fairly generous. However, from
    Java 8, more options have been added, making it even easier to refine data with
    streams. The `takeWhile()` and `dropWhile()` constructs allow streams to be parsed.
    On one side they return a new stream that contains all elements before the first
    one that fails the specified predicate condition. On the other side they return
    a new stream containing all elements including and after the first element that
    fails a specified predicate, respectively.


    The solution to this recipe parses the list of strings and prints each element
    to the terminal window for the first pass. The `takeWhile()` construct is then
    applied to the same stream of strings, and the elements from the stream before
    the element that fails the specified condition are printed to the terminal window.
    The `takeWhile()` accepts a predicate condition, which it then applies to each
    element in the stream. Then only those elements that are iterated before the predicate
    condition that is not matched is returned. All elements that reside in the stream
    at and after the position where the condition is not met are not returned.


    The opposite result occurs when using the `dropWhile()` construct. In the solution,
    all stream elements are ignored until the first element upon which the specified
    condition that is no longer met is returned. Each subsequent element in the stream
    is also returned.


    The `takeWhile` and `dropWhile` constructs are very similar to the filter, except
    that only one failed condition causes the remaining elements to be ignored or
    returned, respectively.


    # 2.15 Utilizing Factory Methods to Create Immutable Collections


    ## Problem


    You wish to generate an immutable collection (its state does not change after
    it is constructed) of values.


    ## Solution


    Utilize the `Collection.of()` construct to generate an immutable collection. In
    the following example, two collections are created. The first is an immutable
    `List<String>`, and the second is an immutable `Map<Integer, String>`.


    ```

    public static void main(String[] args){

    List jvmLanguages = List.of("Java", "Scala", "JRuby", "Groovy", "Jython", "Kotlin");

    System.out.println(jvmLanguages);

    try {

    jvmLanguages.add("Exception");

    } catch (UnsupportedOperationException uoe){

    System.out.println(uoe);

    }

    Map  players = Map.of(1, "Josh Juneau", 2, "Jonathan Gennick", 3, "Freddy Guime",
    4, "Carl Dea", 5, "Luciano Manelli");

    System.out.println(players.values());

    System.out.println("Player 5: " + players.get(5));

    try {

    players.put(6,"Exception");

    } catch (UnsupportedOperationException uoe){

    System.out.println(uoe);

    }

    }

    ```


    The output looks like the following. Note that the example includes a `try-catch`
    block to catch the `UnsupportedOperationException` thrown when there is an attempt
    to modify the list and the map.


    ```

    [Java, Scala, JRuby, Groovy, Jython, Kotlin]

    java.lang.UnsupportedOperationException

    [Josh Juneau, Jonathan Gennick, Freddy Guime, Carl Dea, Luciano Manelli]

    Player 5: Luciano Manelli

    java.lang.UnsupportedOperationException

    ```


    ## How It Works


    Java has historically been a verbose language for performing small tasks. In the
    past, constructing a populated collection of data took a few lines of code. On
    the first line, the collection must be initialized, followed by a line of code
    for each item that was added to it. Java adds the convenient API for quickly producing
    an unmodifiable collection of data, whereby one can now initialize and populate
    the construct in one line of code.


    Factory methods have been added to `List<E>`, `Set<E>`, and `Map<K,V>` interfaces
    for creating such unmodifiable collections of data. The factory methods consist
    of the `of()` method, which accepts up to ten values, quickly creating an immutable
    collection. The `Map` factory method accepts ten key/value pairs. Furthermore,
    no null values can populate as elements, keys, or values.


    # 2.16 Pattern Matching for switch (Preview)


    ## Problem


    You want to efficiently test the same variable against a different number of values.


    ## Solution


    The `switch` command will not support this feature until Java 17, and as a preview.
    For now, you use a chain of `if-else` tests. The following is an example.


    ```

    public static void main(String[] args){

    Object inputObject  = 500L;

    String formattedObject =”input object is not formatted corretly!”;

    if (inputObject instanceof Integer i) {

    formattedObject = String.format("Integer %d", i);

    } else if (inputObject instanceof String s) {

    formattedObject = String.format("String %s", s);

    } else if (inputObject instanceof Long l) {

    formattedObject = String.format("Long %d", l);

    } else if (inputObject instanceof Double d) {

    formattedObject = String.format("Double %f", d);

    }

    ```


    The code can be rewritten smartly and reliably in Java 17, as follows.


    ```

    Object inputObject  = 500L;

    String formattedObject = switch (inputObject ) {

    case Integer i -> String.format("int %d", i);

    case Long l    -> String.format("long %d", l);

    case Double d  -> String.format("double %f", d);

    case String s  -> String.format("String %s", s);

    default        -> inputObject .toString();

    };

    ```


