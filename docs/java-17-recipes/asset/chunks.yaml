- fmt: '### How It Works


    Java NIO.2 allows much more flexibility in getting and setting file attributes
    than older I/O techniques. NIO.2 abstracts the different operating system attributes
    into both a “common” and an “OS-specific” set of attributes. The standard attributes
    are the following.


    * `isDirectory` is true if it’s a directory

    * `isRegularFile` returns false if the file isn’t considered a regular file, the
    file doesn’t exist, or it can’t be determined whether it’s a regular file.

    * `isSymbolicLink` is true if the link is symbolic (most prevalent in Unix systems).

    * `isHidden` is true if the file is considered hidden in the operating system.

    * `LastModifiedTime` is the time the file was last updated.

    * `Owner` is the file’s owner per the operating system.


    Also, NIO.2 allows entering the specific attributes of the underlying operating
    system. To do so, you first need to get a view representing the operating system’s
    file attributes (in this example, it is a `DosFileAttributeView`). Once you get
    the view, you can query and change the OS-specific attributes.


    ## 8.10 Monitoring a Directory for Content Changes


    ### Problem


    You need to keep track when a directory’s content has changed (for example, a
    file was added, changed, or deleted) and act on those changes.


    ### Solution


    By using a `java.nio.file.WatchService` interface, you can subscribe to be notified
    about events occurring within a folder. In the following example, we subscribe
    for `ENTRY_CREATE`, `ENTRY_MODIFY`, and `ENTRY_DELETE` events.


    ```

    public class Ch_8_10_MonitorFolder {

    private void start() {

    try {

    System.out.println("Watch Event, press q to exit");

    FileSystem fileSystem = FileSystems.getDefault();

    WatchService service = fileSystem.newWatchService();

    Path path = fileSystem.getPath(".");

    System.out.println("Watching :"+path.toAbsolutePath());

    path.register(service, StandardWatchEventKinds.ENTRY_CREATE, StandardWatchEventKinds.ENTRY_DELETE,
    StandardWatchEventKinds.ENTRY_MODIFY);

    boolean shouldContinue = true;

    while(shouldContinue) {

    WatchKey key = service.poll(250, TimeUnit.MILLISECONDS);

    // Code to stop the program

    while (System.in.available() > 0) {

    int readChar = System.in.read();

    if ((readChar == ''q'') || (readChar == ''Q'')) {

    shouldContinue = false;

    break;

    }

    }

    if (key == null) continue;

    key.pollEvents().stream()

    .filter((event) -> !(event.kind() == StandardWatchEventKinds.OVERFLOW))

    .map((event) -> (WatchEvent)event).forEach((ev) -> {

    Path filename = ev.context();

    System.out.println("Event detected :"+filename.toString()+" "+ev.kind());

    });

    boolean valid = key.reset();

    if (!valid) {

    break;

    }

    }

    } catch (IOException | InterruptedException e) {

    e.printStackTrace();

    }

    }

    public static void main (String[] args) {

    Ch_8_10_MonitorFolder monitorFolder = new Ch_8_10_MonitorFolder();

    monitorFolder.start();

    }

    }

    }

    ```


