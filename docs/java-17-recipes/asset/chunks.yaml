    easier to create objects of a certain type. Imagine if a constructor for an object
    took more than just a handful of arguments; creating new objects that require
    more than just a couple of arguments can become a hassle. Generating a factory
    to create those objects so that you do not have to hard-code all the arguments
    with each instantiation can make you much more productive!


    ## 5.5 Creating Reusable Objects


    ### Problem


    You want to generate an object that could represent something within your application.
    Furthermore, you want to reuse the object to represent multiple instances. For
    instance, suppose that you create an application that generates statistics and
    league information for different sports teams. In this case, you want to create
    an object representing a team.


    ### Solution


    Create a JavaBean that represents the object that you want to create. JavaBean
    objects provide the capability for object fields to be declared as `private`,
    and they also allow the attributes to be read and updated so that an object can
    be passed around and used within an application. This recipe demonstrates the
    creation of a JavaBean named `Team`. The `Team` object contains a few different
    fields that can contain information.


    ```

    public class Team implements TeamType {

    private List players;

    private String name;

    private String city;

    /**

    * @return the players

    */

    public List getPlayers() {

    return players;

    }

    /**

    * @param players the players to set

    */

    @Override

    public void setPlayers(List players) {

    this.players = players;

    }

    /**

    * @return the name

    */

    public String getName() {

    return name;

    }

    /**

    * @param name the name to set

    */

    @Override

    public void setName(String name) {

    this.name = name;

    }

    /**

    * @return the city

    */

    public String getCity() {

    return city;

    }

    /**

    * @param city the city to set

    */

    @Override

    public void setCity(String city) {

    this.city = city;

    }

    }

    ```


    The `TeamType` interface is:


    ```

    public interface TeamType {

    void setPlayers(List players);

    void setName(String name);

    void setCity(String city);

    }

    ```


    As you can see, the object in this solution contains three fields, and each of
    those fields is declared as `private`. However, each field has two accessor methods—getters
    and setters—that allow the fields to be indirectly accessible.'
