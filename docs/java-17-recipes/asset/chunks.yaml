    classes make it easy to convert a date into just about any format.


    ### How It Works


    Date formatting is a common concern when it comes to any program. People like
    to see their dates in a certain format for different situations. The Java language
    contains a couple of handy utilities for properly formatting date-time data. Specifically,
    the newer API includes the `DateTimeFormatter` class, and previous editions of
    Java SE include the `SimpleDateFormat` class, each of which can come in handy
    for performing formatting processes.


    The `DateTimeFormatter` class is a final class with the primary purpose of printing
    and formatting date-time objects. To obtain a `DateTimeFormatter` that can be
    applied to objects, call the `DateTimeFormatter.ofPattern()` method, passing the
    string-based pattern representing the desired output. The `SimpleDateFormat` class
    was created in previous editions of Java, so you don’t have to perform manual
    translations for a given date.


    **Note**


    Different date formats are used within different locales, and the `SimpleDateFormat`
    class facilitates locale-specific formatting.


    To use the class, an instance must be instantiated either by passing a string-based
    pattern as an argument to the constructor or by passing no argument to the constructor
    at all. The string-based pattern provides a template that should be applied to
    the given date, and then a string representing the date in the given pattern style
    is returned. A pattern consists of many different characters strung together.


    Any pattern characters can be placed together in a string and then passed to the
    `SimpleDateFormat` class. If the class is instantiated without passing a pattern,
    the pattern can be applied later using the class’s `applyPattern()` method. The
    `applyPattern()` method also comes in handy when you want to change the pattern
    of an instantiated `SimpleDateFormat` object, as seen in the solution to this
    recipe. The following excerpts of code demonstrate the application of a pattern.


    ```

    SimpleDateFormat dateFormatter1 = new SimpleDateFormat("MMMMM dd yyyy");

    dateFormatter1.applyPattern("MM/dd/YY hh:mm:ss");

    ```


    Once a pattern has been applied to a `SimpleDateFormat` object, a long value representing
    time can be passed to the `SimpleDateFormat` object’s `format()` method. The `format()`
    method returns the given date/time formatted using the applied pattern. The string-based
    result can then be used however your application requires.


    ## 4.18 Writing Readable Numeric Literals


    ### Problem


    Some of the numeric literals in your application are rather long and you want
    to make it easier to tell how large a number is at a glance.


    ### Solution


    Use underscores in place of commas or decimals in larger numbers to make them
    more readable. The following code shows some examples of making your numeric literals
    more readable by using underscores in place of commas.


    ```

    public static void main(String[] args) {

    int million = 1_000_000;

    int billion = 1_000_000_000;

    float ten_pct = 1_0f;

    double exp = 1_234_56.78_9e2;

    System.out.println(million);

    System.out.println(billion);

    System.out.println(ten_pct);

    System.out.println(exp);

    }

    The output is:


    10.0

    1.23456789E7

    ```


    **Note**


    Decimal point values automatically default to a double value unless a trailing
    `f` indicates that the value is a float.


    ### How It Works


    Sometimes working with large numbers can become cumbersome and difficult to read.
    Since Java 7, underscores can be used with numeric literals to make code a bit
    easier to read. The underscores can appear anywhere between digits in a numeric
    literal. This allows underscores in place of commas or spaces to separate the
    digits and make them easier to read.


    **Note**


    Underscores cannot be placed at the beginning or the end of a number, adjacent
    to a decimal point or floating-point literal, before an `F` or `L` suffix, or
    in positions where a string of digits is expected.


    ## 4.19 Declaring Binary Literals


    ### Problem


    You are working on an application that requires the declaration of binary numbers.


    ### Solution


    Use binary literals to make your code readable. The following code segment demonstrates
    the use of binary literals.


    ```

    public static void main(String[] args) {

    int bin1 = 0b1100;

    short bin2 = 0B010101;

    short bin3 = (short) 0b1001100110011001;

    System.out.println(bin1);

    System.out.println(bin2);

    System.out.println(bin3);

    }

    ```


    This result in the following output.


    ```


    ```


    ### How It Works


    Binary literals became part of the Java language starting in Java 7. The byte,
    short, int, and long types can be expressed using the binary number system. This
    feature can help to make binary numbers easier to recognize in code. To use the
    binary format, simply prefix the number with `0b` or `0B`.


    ## 4.20 Period of Day


    ### Problem


    You want to express the periods of a day not as a.m. or p.m. but as “in the morning”
    or “in the afternoon” or “at night”.


    ### Solution


    Java 16 addresses that goal with a new formatter pattern, called `B`. In the following
    example, the period of the day is translated into text according to the time of
    the day.


    ```

    public static void main(String[] args) {

    final String whatPeriodOfTheDay     = DateTimeFormatter.ofPattern("B").format(LocalTime.now());

    System.out.println("Pattern B: " + whatPeriodOfTheDay);

    }

    ```


    The following is the output in Italian.


    ```

    Pattern B: del pomeriggio (in the afternoon)

    ```


    ### How It Works


    In Java 16, the period of the day was added to `java.time` formats.'
