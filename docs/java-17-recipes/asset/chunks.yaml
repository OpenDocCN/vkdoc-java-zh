- fmt: '### How It Works


    The `JavaBean` is an object that holds information so that it can be passed around
    and used within an application. One of the most important aspects of a `JavaBean`
    is that its fields are declared as `private`. This prohibits other classes from
    accessing the fields directly. Instead, each field should be encapsulated by methods
    defined to make them accessible to other classes. These methods must adhere to
    the following naming conventions.


    - Methods used for accessing the field data should be named using a `get` prefix,
    followed by the field name.

    - Methods used for setting the field data should be named using a `set` prefix,
    followed by the field name.


    For instance, in the solution to this recipe, the `Team` object contains a field
    with players’ names. To access that field, a `getPlayers` method should be declared.
    It should return the data that is contained within the `players` field. Likewise,
    a `setPlayers` method should be declared to populate the `players` field. It should
    accept an argument of the same type as the `players` field, and it should set
    the value of the `players` field equal to the argument. This can be seen in the
    following code.


    ```

    public List getPlayers() {

    return players;

    }

    void setPlayers(List players) {

    this.players = players;

    }

    ```


    `JavaBeans` can populate lists of data written to a database record or for a myriad
    of other functions. Using `JavaBeans` makes code easier to read and maintain.
    It also helps to increase the likelihood of future code enhancements because very
    little code implementation is required. Another benefit of using `JavaBeans` is
    that most major IDEs autocomplete the encapsulation of the fields for you.


    ## 5.6 Defining an Interface for a Class


    ### Problem


    You want to create a set of method signatures and fields that can be used as a
    common template to expose the methods and fields that a class implements.


    ### Solution


    Generate a Java interface to declare each field and method that a class must implement.
    Such an interface can then be implemented by a class and represent an object type.
    The following code is an interface that declares the methods that the `Team` object
    must implement.


    ```

    public interface TeamType {

    void setPlayers(List players);

    void setName(String name);

    void setCity(String city);

    String getFullName();

    }

    ```


    All the methods in the interface are implicitly abstract. That is, only a method
    signature is provided. It is also possible to include `static final` field declarations
    in an interface.


    ### How It Works


    A Java interface is a construct that defines the structures, be it fields or methods
    that a class must implement. In most cases, interfaces do not include method implementations;
    rather, they only include method signatures. Interfaces can include variables
    that are implicitly `static` and `final`.


    The interface does not include any constant field declarations in the solution
    to this recipe. However, it includes four method signatures. All the method signatures
    have no access modifier specified because all declarations within an interface
    are implicitly `public`. Interfaces expose a set of functionalities; therefore,
    all methods exposed within an interface must be implicitly `public`. Any class
    that implements an interface must implement any method signatures declared in
    the interface, except default methods and abstract classes, in which case an interface
    may leave the implementation for one of its subclasses.


    While the Java language does not allow multiple inheritance, a Java class can
    implement multiple interfaces, allowing for a controlled form of multiple inheritance.
    Abstract classes can also implement interfaces. The following code demonstrates
    a class implementing an interface: the `Team` object declaration implements the
    `TeamType` interface.


    ```

    public class Team implements TeamType {

    private List players;

    private String name;

    private String city;

    /**

    * @return the players

    */

    public List getPlayers() {

    return players;

    }

    /**

    * @param players the players to set

    */

    @Override

    public void setPlayers(List players) {

    this.players = players;

    }

    /**

    * @return the name

    */

    public String getName() {

    return name;

    }

    /**

    * @param name the name to set

    */

    @Override

    public void setName(String name) {

    this.name = name;

    }

    /**

    * @return the city

    */

    public String getCity() {

    return city;

    }

    /**

    * @param city the city to set

    */

    @Override

    public void setCity(String city) {

    this.city = city;

    }

    public String getFullName() {

    return this.name + " - " + this.city;

    }

    }

    ```


    Interfaces can declare a type for an object. Any object declared to have an interface
    type must adhere to all the implementations declared in the interface unless a
    default implementation exists. For instance, the following field declaration defines
    an object containing all the properties declared within the `TeamType` interface.


    ```

    TeamType team;

    ```


    Interfaces can also extend other interfaces (thus the same type of theory provided
    by multiple inheritance). However, because no method implementation is present
    in an interface, it is much safer to implement multiple interfaces in a Java class
    than extending multiple classes in C++.


    Interfaces are some of the single most important constructs of the Java language.
    They provide the interfaces between the user and the class implementations. Although
    it is possible to create entire applications without using interfaces, they help
    promote object orientation and hide method implementations from other classes.


    ## 5.7 Modifying Interfaces Without Breaking Existing Code


    ### Problem


    You’ve got a utility class that implements an interface, and many different classes
    within the utility library implement that interface. Suppose that you want to
    add a new method to the utility class and make it available for other classes
    via its interface. However, changing the interface likely breaks some existing
    classes that already implement that interface.


    ### Solution


    Add the new method and its implementation to the utility class interface as a
    default method. By doing so, each class that implements the interface automatically
    uses the new method and is not forced to implement it since a default implementation
    exists. The following class interface contains a default method, which can be
    used by any class that implements the interface.


    ```

    public interface TeamType {

    List getPlayers();

    void setPlayers(List players);

    void setName(String name);

    void setCity(String city);

    String getFullName();

    default void listPlayers() {

    getPlayers().stream().forEach((player) -> {

    System.out.println(player.getFirstName() + " " + player.getLastName());

    });

    }

    }

    ```


    The interface `TeamType` contains a default method named `listPlayers()`. This
    method does not need to be implemented by any classes implementing `TeamType`
    since there is a default implementation within the interface.'
