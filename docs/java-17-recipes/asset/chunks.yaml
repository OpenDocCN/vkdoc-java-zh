    \ 总结\n\n在许多应用程序中，数据库已成为存储重要信息的关键。充分理解如何在应用程序中使用数据库至关重要。本章从基础开始，涵盖了数据库访问入门的方案。接着讨论了重要主题，如安全访问和修改数据、事务管理以及离线时的数据访问。现在，您应该对在\
    \ Java 解决方案中处理数据的一些技术有了扎实的理解。请记住，数据访问解决方案有很多，本章中的方案仅涵盖了应对信息管理这一难题的部分方法。\n\n# 13.\
    \ Java Web 应用程序\n\nJava 开发并不仅仅局限于桌面端。如今，Web 应用程序和移动应用可被视为私人和政府组织中现代技术的基石。事实上，通过与远程服务器交互，可以找到所需信息或在线购物，总的来说，可以为工作或个人生活使用许多服务。成千上万的企业应用程序使用\
    \ Java 编写，从而能够开发复杂、健壮且安全的应用程序。\n\n本章介绍基于 Jakarta EE（一种在应用服务器上运行的 Java 类）的 Java\
    \ Servlet 和 JSP（一种动态构建网页的文件）。它展示了它们如何在 Tomcat 内协同工作以生成动态网页。\n\n由于 Web 应用程序开发包含多个相互关联的过程，建议使用集成开发环境，如\
    \ Eclipse EE（[`www.eclipse.org/downloads/packages`](http://www.eclipse.org/downloads/packages)），以便更轻松地组织\
    \ Web 项目。本章演示了使用 Eclipse 解决一些方案的方法。但是，您可以将这些相同的基本概念应用于使用任何 Java IDE 的项目。\n\n##\
    \ 13.1 安装 Tomcat\n\n### 问题\n\n您希望下载并配置用于创建和配置简单 Java Web 应用程序项目的主要组件。\n\n### 解决方案\n\
    \n要运行本章中的示例，您需要安装以下组件。\n\n*   Tomcat Web 服务器\n\n*   Eclipse 开发环境 EE\n\n让我们安装 Tomcat。它是\
    \ Apache Tomcat 服务的 Java Web 服务器，是一个允许您运行 JSP 且 Java 代码可在其中运行的 Servlet 容器（Tomcat\
    \ 10 是最新版本）。下载压缩版本并运行相应操作系统的相关脚本更简单、更安全。\n\nTomcat 监听您电脑的三个主要通信端口（8005、8009 和\
    \ 8080）。在安装 Tomcat 之前，您应该检查是否有其他应用程序已经在监听这些端口中的一个或多个。为此，请使用 `netstat` 命令，该命令显示有关您电脑网络通信的信息。在\
    \ Windows 中，您可以打开一个终端窗口并输入 `netstat /a` 命令。它会以表格形式显示活动连接列表。表格的第二列如下所示。\n\n```\n\
    Local Address\n0.0.0.0:135\n0.0.0.0:445\n0.0.0.0:3306\n```\n\n端口号是冒号后的数字。安装后，如果您看到\
    \ Tomcat 使用的一个或多个端口，则必须更改它监听的端口。\n\n以下是正确安装 Tomcat 10 的方法。\n\n1.  访问 [`https://tomcat.apache.org/download-10.cgi`](https://tomcat.apache.org/download-10.cgi)。在“快速导航”下方，您会看到四个链接：KEYS、10.0.13、Browse\
    \ 和 Archives。\n\n2.  点击 **10.0.13** 将您带到同一页面底部一个具有相同版本号的标题处。在版本标题下方，您会看到“核心”副标题。在其下方，您会看到\
    \ zip 下载的链接，排列如下：zip (pgp, sha512) apache-tomcat-10.0.13.zip。点击 zip 链接下载 apache-tomcat-10.0.13.zip（12.2\
    \ MB）文件。\n\n3.  将下载的文件解压到根目录。此时，您应该拥有 `C:\\apache-tomcat-10.0.13` 文件夹。我们倾向于保留默认文件夹名称，以便在不混淆的情况下使用不同的服务器版本。业务场景包括不同的环境（如开发、测试和交付），因此请记住保持服务器版本之间的一致性，以防止出现错误或不同行为。\n\
    \n4.  在 `C:\\apache-tomcat-10.0.13\\bin` 文件夹中的 `setenv.bat` 文件中使用以下代码配置服务器。\n\n\
