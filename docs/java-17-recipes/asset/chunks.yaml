    ### How It Works


    Transaction management can play an important role in an application. This holds
    true especially for applications that perform different tasks that depend on each
    other. In many cases, if one of the tasks performed within a transaction fails,
    it is preferable for the entire transaction to fail rather than having it only
    partially complete. For instance, imagine that you were adding database user records
    to your application database. Now let’s say that adding a user for your application
    required a couple of different database tables to be modified, maybe a table for
    roles, and so on. What would happen if your first table was modified correctly
    and the second table modification failed? You would be left with a partially complete
    application user addition, and your user would most likely not be able to access
    the application as expected. In such a situation, it would be nicer to roll back
    all the already-completed database modifications if one of the updates failed
    so that the database was left in a clean state and the transaction could be attempted
    once again.


    By default, a `Connection` object is set up so that autocommit is turned on. That
    means that each database `INSERT`, `UPDATE`, or `DELETE` statement is committed
    right away. Usually, this is the way that you want your applications to function.
    However, when you have many database statements that rely on one another, it is
    important to turn off autocommit so that all the statements can be committed at
    once. To do so, call the `Connection` object’s `setAutoCommit()` method and pass
    a `false` value. As you can see in the solution to this recipe, the `setAutoCommit()`
    method is called passing a `false` value, the database statements are executed.
    Doing so cause all the database statement changes to be temporary until the `Connection`
    object’s `commit()` method is called. This allows you to ensure that all the statements
    execute properly before issuing `commit()`. Take a look at this transaction management
    code contained within the `main()` method of the `TransactionExample` class within
    the solution to this recipe.


    ```

    boolean successFlag = false;

    ...

    CreateConnection createConn = new CreateConnection();

    conn = createConn.getConnection();

    conn.setAutoCommit(false);

    queryDbRecipes();

    successFlag = insertRecord(

    "12-6",

    "Simplifying and Adding Security with Prepared Statements",

    "Working with Prepared Statements);

    if (successFlag == true){

    successFlag = insertRecord(

    null,

    "Simplifying and Adding Security with Prepared Statements",

    "Working with Prepared Statements);

    }

    // Commit Transactions

    if (successFlag == true)

    conn.commit();

    else

    conn.rollback();

    conn.setAutoCommit(true);

    ```


    Note that the `commit()` method is called only if all transaction statements were
    processed successfully. If any of them fail, the `successFlag` is equal to `false`,
    which would cause the `rollback()` method to be called instead. In the solution
    to this recipe, the second call to `insertRecord()` attempts to insert a `NULL`
    value into the `RECIPE_NUMBER` column, which is not allowed. Therefore, that insert
    fails, and everything, including the previous insert, gets rolled back.


