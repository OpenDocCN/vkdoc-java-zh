    are located in this directory. If this is the case, you would execute a command
    such as the following.


    ```

    set CLASSPATH=C:\JAVA_DEV\some-jar.jar

    ```


    Use the following in Unix and Linux systems.


    ```

    export CLASSPATH=/JAVA_DEV/some-jar.jar

    ```


    Alternately, the `javac` command provides an option for specifying the location
    of resources to be loaded for an application. On all platforms, setting the `CLASSPATH`
    using this technique can be done via the `-classpath` option as follows.


    ```

    javac –classpath /JAVA_DEV/some-jar.jar...

    ```


    Of course, the file path uses the backslash (\) on Microsoft Windows machines.


    Note


    The `javac –cp` option may be used, rather than specifying the `-classpath` option.'
  trans: '

    #### 包


    解决方案示例首先创建了一个 Java *包*。


    ```

    package org.java17recipes.chapter01.recipe01_05;

    ```


    包是一种将相关类分组到共享命名空间中的方式。其理念是通过按组织域名的逆序逐级深入，实现全局唯一性。通常也习惯将包名全部小写。


    Eclipse 会创建一个目录结构来模拟你的包路径。在本例中，Eclipse 创建了以下目录路径。


    ```

    C:\eclipse-workspace\java17Recipes\src\org\java17recipes\chapter01\recipe01_05

    ```


    关于此路径，需要注意以下几点：


    *   前半部分是 `C:\eclipse-workspace`。Eclipse 会在一个工作区目录下创建所有项目，该目录可以更改。开发者可以指定不同的路径。


    *   接下来是首次出现的 `java17Recipes`。这对应着项目名称（参见图 1-10）。


    *   你创建的任何源文件都放入 `src` 目录。Eclipse 在此层级还会创建其他目录。例如，Eclipse 会创建一个 `bin` 目录，其下有一个
    `classes` 子目录，用于存放编译后的类文件。


    *   最后是与你指定的包路径相对应的目录，在本例中为 `org\java17recipes\chapter01\recipe01_05`。当你编译代码时，`bin\classes`
    目录下也会创建相同的结构。请注意，如果使用其他 IDE，创建的目录可能会有所不同。


    你需要显式地创建一个包。在开发任何重要应用程序时，组织结构和审慎选择的命名约定都至关重要。


    #### JavaBeans 风格的类


    解决方案示例中的下一个内容是一个遵循 JavaBeans 模式的类定义。`HelloMessage` 的定义遵循了你在 Java 编程中经常遇到的一种模式，我们将其包含在内也是出于这个原因。这个类很简单，能够持有一个名为
    `message` 的字符串字段。


    该类中定义了三个方法。


    *   `HelloMessage()`。这个方法，也称为构造器，其名称与类名相同。在本例中，它不接受任何参数。每当你创建该类的一个新对象时，它会被自动调用。请注意，这被称为无参或*无参数*构造器，因为它在类中被显式写出且不接受参数。如果你没有提供构造器，JVM
    会自动提供一个默认构造器（同样不接受参数）。


    *   `setMessage(String)`。这个访问器方法以单词 `set` 开头。它接受一个参数。它指定了将由对应的 `get` 方法返回的消息。


    *   `getMessage()`。这个访问器方法返回当前定义的消息。在此示例中，我们选择将消息转换为大写。


    注意


    访问器方法在 JavaBeans 类中用于访问任何私有声明的类成员。在本例中，可以使用这些方法访问标识为 `message` 的私有变量。访问器方法通常更常被称为
    getter 和 setter。


    以 `set` 和 `get` 开头的方法就是 *setter* 和 *getter* 方法。IDE 会生成这些方法。`message` 变量对于该类是私有的，这意味着你无法从类外部直接访问
    `message`。


    你在类中看到了 `this` 关键字。它是 Java 中的一个特殊关键字，用于引用当前对象。它的使用是冗余的，但如果任何方法恰好创建了也名为 `message`
    的变量，则必须使用它：由于参数名称的原因，setter 是强制性的。通常的做法是在 getter 和 setter 方法中使用 `this` 关键字来引用类成员，主要是在
    setter 方法中。


    在 Java 中，像我们的示例那样通过 setter 和 getter 方法来中介对类变量的访问是很常见的。这些方法代表了与其他类及主程序之间的一种契约：公共方法允许读取或写入类的状态，但外部代码并不知道映射关系。它们的好处是，你可以随心所欲地更改
    `HelloMessage` 的存储实现。它的字段和状态信息可以独立于存储类型进行保存和恢复。只要保持 `setMessage()` 和 `getMessage()`
    的外部行为不变，其他依赖于 `HelloMessage` 的代码就能继续正常工作。


    #### 主程序


    当你执行当前选中的类时，Eclipse 会将代码编译成一组二进制文件，然后将控制权转移给 `main()` 方法。Eclipse 也可以配置为在保存时重新编译，这同样会导致控制权转移给
    `main()` 方法。该方法随后会执行以下操作：


    1.  执行 `HelloMessage` 来创建一个名为 `hm` 的变量，该变量可以持有 `HelloMessage` 类的一个实例。此时 `hm` 变量为
    null。


    2.  调用 `new HelloMessage()` 来创建该类的一个对象。执行无参构造器，并将 `"Default Message"` 设置为问候文本。新对象现在存储在
    `hm` 变量中。


    3.  调用 `System.out.println()` 来显示对象的无参构造器确实已按预期执行。getter 将文本转换为大写并返回值。在控制台窗格中显示问候语
    `"DEFAULT MESSAGE"`。


    4.  将消息设置为传统的 `"Hello, World"` 文本。


    5.  再次调用 `System.out.println()` 来输出刚刚设置的新消息。现在你会看到问候语 `"HELLO, WORLD"` 被添加到控制台窗格中，并且已变为大写。


    解决方案中的这种模式在 Java 编程中很常见。`main()` 方法是执行的起点。定义变量，并使用 `new` 运算符创建对象。对象变量通常使用 setter
    和 getter 方法进行设置和获取。


    ## 1.6 配置 CLASSPATH


    ### 问题


    你想要执行一个 Java 程序，或者在你正在执行的应用程序中包含一个外部 Java 库。


    ### 解决方案


    将 `CLASSPATH` 变量设置为你需要访问的用户自定义 Java 类或 Java 归档（JAR）文件所在的目录位置，以便执行你的应用程序。假设你有一个名为
    `JAVA_DEV` 的目录，位于操作系统驱动器的根目录下，并且你的应用程序需要访问的所有文件都位于此目录中。如果是这种情况，你可以执行如下命令。


    ```

    set CLASSPATH=C:\JAVA_DEV\some-jar.jar

    ```


    在 Unix 和 Linux 系统中使用以下命令。


    ```

    export CLASSPATH=/JAVA_DEV/some-jar.jar

    ```


    或者，`javac` 命令提供了一个选项，用于指定应用程序要加载的资源的路径。在所有平台上，可以通过 `-classpath` 选项使用此技术来设置 `CLASSPATH`，如下所示。


    ```

    javac –classpath /JAVA_DEV/some-jar.jar...

    ```


    当然，在 Microsoft Windows 机器上，文件路径使用反斜杠（\）。


    注意


    可以使用 `javac –cp` 选项，而不是指定 `-classpath` 选项。

