- fmt: "```java\npublic void cursorReader(String xmlFile)\nthrows FileNotFoundException,\
    \ IOException, XMLStreamException {\nXMLInputFactory factory = XMLInputFactory.newFactory();\n\
    try (FileInputStream fis = new FileInputStream(xmlFile)) {\nXMLStreamReader reader\
    \ = factory.createXMLStreamReader(fis);\nboolean inName = false;\nboolean inDiagnosis\
    \ = false;\nString id = null;\nString name = null;\nString diagnosis = null;\n\
    while (reader.hasNext()) {\nint event = reader.next();\nswitch (event) {\ncase\
    \ XMLStreamConstants.START_ELEMENT:\nString elementName = reader.getLocalName();\n\
    switch (elementName) {\ncase \"patient\":\nid = reader.getAttributeValue(0);\n\
    break;\ncase \"name\":\ninName = true;\nbreak;\ncase \"diagnosis\":\ninDiagnosis\
    \ = true;\nbreak;\ndefault:\nbreak;\n}\nbreak;\ncase XMLStreamConstants.END_ELEMENT:\n\
    String elementname = reader.getLocalName();\nif (elementname.equals(\"patient\"\
    )) {\nSystem.out.printf(\"Patient: %s\\nName: %s\\nDiagnosis: %s\\n\\n\",id, name,\n\
    diagnosis);\nid = name = diagnosis = null;\ninName = inDiagnosis = false;\n}\n\
    break;\ncase XMLStreamConstants.CHARACTERS:\nif (inName) {\nname = reader.getText();\n\
    inName = false;\n} else if (inDiagnosis) {\ndiagnosis = reader.getText();\ninDiagnosis\
    \ = false;\n}\nbreak;\ndefault:\nbreak;\n}\n}\nreader.close();\n}\n}\n```\n\n\
    ## Solution 2\n\nUse the `XMLEventReader` to read and process events using an\
    \ event-oriented interface. This API is called an *iterator-oriented* API as well.\
    \ The following code is much like the code in solution 1, except it uses the event-oriented\
    \ API instead of the cursor-oriented API. This code snippet is available from\
    \ the same `org.java17recipes.chapter15.recipe15_1.DocReader` class used in solution\
    \ 1.\n\n```java\npublic void eventReader(String xmlFile)\nthrows FileNotFoundException,\
    \ IOException, XMLStreamException {\nXMLInputFactory factory = XMLInputFactory.newFactory();\n\
    XMLEventReader reader = null;\ntry(FileInputStream fis = new FileInputStream(xmlFile))\
    \ {\nreader = factory.createXMLEventReader(fis);\nboolean inName = false;\nboolean\
    \ inDiagnosis = false;\nString id = null;\nString name = null;\nString diagnosis\
    \ = null;\nwhile(reader.hasNext()) {\nXMLEvent event = reader.nextEvent();\nString\
    \ elementName = null;\nswitch(event.getEventType()) {\ncase XMLEvent.START_ELEMENT:\n\
    StartElement startElement = event.asStartElement();\nelementName = startElement.getName().getLocalPart();\n\
    switch(elementName) {\ncase \"patient\":\nid = startElement.getAttributeByName(QName.valueOf(\"\
    id\")).getValue();\nbreak;\ncase \"name\":\ninName = true;\nbreak;\ncase \"diagnosis\"\
    :\ninDiagnosis = true;\nbreak;\ndefault:\nbreak;\n}\nbreak;\ncase XMLEvent.END_ELEMENT:\n\
    EndElement endElement = event.asEndElement();\nelementName = endElement.getName().getLocalPart();\n\
    if (elementName.equals(\"patient\")) {\nSystem.out.printf(\"Patient: %s\\nName:\
    \ %s\\nDiagnosis: %s\\n\\n\",id, name, diagnosis);\nid = name = diagnosis = null;\n\
    inName = inDiagnosis = false;\n}\nbreak;\ncase XMLEvent.CHARACTERS:\nString value\
    \ = event.asCharacters().getData();\nif (inName) {\nname = value;\ninName = false;\n\
    } else if (inDiagnosis) {\ndiagnosis = value;\ninDiagnosis = false;\n}\nbreak;\n\
    }\n}\n}\nif(reader != null) {\nreader.close();\n}\n}\n```\n\nThe main method is:\n\
    \n```java\npublic static void main(String[] args) {\nString fileName = null;\n\
    if (args.length != 1) {\nSystem.out.printf(\"Usage: java org.java8recipes.chapter20.recipe20_2.DocReader\
    \ \\n\");\nfileName = \"patients.xml\";\n} else {\nfileName = args[0];\n}\nDocReader\
    \ app = new DocReader();\ntry {\napp.run(fileName);\n} catch (FileNotFoundException\
    \ ex) {\nex.printStackTrace();\n} catch (IOException | XMLStreamException ioex)\
    \ {\nioex.printStackTrace();\n}\n}\n\npublic void run(String xmlFile) throws FileNotFoundException,\
    \ IOException, XMLStreamException {\ncursorReader(xmlFile);\neventReader(xmlFile);\n\
    }\n```\n\nThe XML file is:\n\n```xml\n<patients>\n    <patient id=\"1\">\n   \
    \     <name>John Smith</name>\n        <diagnosis>Common Cold</diagnosis>\n  \
    \  </patient>\n    <patient id=\"2\">\n        <name>Jane Doe</name>\n       \
    \ <diagnosis>Broken Ankle</diagnosis>\n    </patient>\n    <patient id=\"3\">\n\
    \        <name>Jack Brown</name>\n        <diagnosis>Food Allergy</diagnosis>\n\
    \    </patient>\n</patients>\n```\n\nThe output is:\n\n```\nPatient: 1\nName:\
    \ John Smith\nDiagnosis: Common Cold\nPatient: 2\nName: Jane Doe\nDiagnosis: Broken\
    \ Ankle\nPatient: 3\nName: Jack Brown\nDiagnosis: Food Allergy\n```\n\n## How\
    \ It Works\n\nJava provides several ways to read XML documents. One way is to\
    \ use StAX, a streaming model. It is better than the older SAX API because it\
    \ allows you to read and write XML documents. Although StAX is not quite as powerful\
    \ as a DOM API, it is an excellent and efficient API that is less taxing on memory\
    \ resources.\n\nStAX provides two methods for reading XML documents: a cursor\
    \ API and an iterator API. The cursor-oriented API utilizes a cursor that can\
    \ walk an XML document from start to finish, pointing to one element at a time,\
    \ and always moving forward. The iterator API represents an XML document stream\
    \ as a set of discrete event objects, provided in the order that they are read\
    \ in the source XML. The event-oriented iterator API is preferred over the cursor\
    \ API because it provides `XMLEvent` objects with the following benefits.\n\n\
    *   The `XMLEvent` objects are immutable and can persist even though the StAX\
    \ parser has moved on to subsequent events. You can pass these `XMLEvent` objects\
    \ to other processes or store them in lists, arrays, and maps.\n*   You can subclass\
    \ `XMLEvent`, creating your specialized events as needed.\n*   You can modify\
    \ the incoming event stream by adding or removing events, which is more flexible\
    \ than the cursor API.\n\nTo use StAX to read documents, create an XML event reader\
    \ on your file input stream. Check that events are still available with the `hasNext()`\
    \ method and read each event using the `nextEvent()` method. The `nextEvent()`\
    \ method returns a specific type of `XMLEvent` that corresponds to the start and\
    \ stop elements, attributes, and value data in the XML file. Remember to close\
    \ your readers and file streams when you’re finished with those objects.\n\n##\
    \ 15.3 Transforming XML\n\n### Problem\n\nYou want to convert an XML document\
    \ to another format, such as HTML.\n\n### Solution\n\nUse the `javax.xml.transform`\
    \ package to transform an XML document to another document format.\n\nThe following\
    \ code demonstrates how to read a source document, apply an Extensible Stylesheet\
    \ Language (XSL) transform file, and produce the transformed, new document. Use\
    \ the sample code from the `org.java17recipes.chapter15.recipe15_3.TransformXml`\
    \ class to read the `patients.xml` file and create a `patients.html` file. The\
    \ following snippet shows the important pieces of this class.\n\n```java\nimport\
    \ javax.xml.transform.TransformerConfigurationException;\nimport javax.xml.transform.TransformerException;\n\
