    ### 方案 1


    创建 Java 线程时，有时需要确保任何异常都能被捕获并妥善处理，以帮助确定线程终止的原因。以下代码演示了如何为每个线程注册异常处理器。


    ```

    public static void main(String[] args) {

    Recipe9_5 recipe = new Recipe9_5();

    recipe.start();

    recipe.startForCurrentThread();

    }

    private void start() {

    Thread.setDefaultUncaughtExceptionHandler((Thread t, Throwable e) -> {

    System.out.println("哇！某处抛出了异常！"+t.getName()+": "+e);

    });

    final Random random = new Random();

    for (int j = 0; j < 10; j++) {

    int divisor = random.nextInt(4);

    System.out.println("200 / " + divisor + " 等于 " + (200 / divisor));

    }

    }

    ```


    以下是输出结果。


    ```

    200 / 2 等于 100

    哇！某处抛出了异常！main: java.lang.ArithmeticException: / by zero

    ```


    该线程中的 `for` 循环会正常执行，直到遇到异常时，`DefaultUncaughtExceptionHandler` 被调用。`UncaughtExceptionHandler`
    是一个函数式接口，因此可以使用 lambda 表达式来实现异常处理器。


    ### 方案 2


    可以在特定线程中注册 `UncaughtExceptionHandler`。注册后，该线程内任何未被捕获的异常都将由 `uncaughtException()`
    方法处理。以下是一个示例。


    ```

    private void startForCurrentThread() {

    Thread.currentThread().setUncaughtExceptionHandler((Thread t, Throwable e) ->
    {

    System.out.println("在线程 "+t.getName()+" 中抛出了异常 "+e);

    });

    Thread someThread = new Thread(() -> {

    System.out.println(200/0);

    });

    someThread.setName("某个倒霉线程");

    someThread.start();

    System.out.println("在主线程中 "+ (200/0));

    }

    ```


    以下是输出结果。


    ```

    在线程 main 中抛出了异常 java.lang.ArithmeticException: / by zero

    ```


    在上述代码中，`UncaughtExceptionHandler` 被注册在 `currentThread` 上。与方案 1 相同，`UncaughtExceptionHandler`
    是一个函数式接口，因此可以使用 lambda 表达式来实现异常处理器。


    ### 工作原理


    对于每个未被捕获的非检查型异常，都会调用 `Thread.defaultUncaughtExceptionHandler()`。当 `UncaughtExceptionHandler()`
    处理异常时，意味着没有 `try`/`catch` 块来捕获该异常。因此，异常会沿着线程栈向上冒泡。这是该线程终止前执行的最后一段代码。当异常被线程自身的或默认的
    `UncaughtExceptionHandler()` 捕获时，线程就会终止，该处理器会记录异常信息，以帮助定位异常原因。


    在方案 2 中，`UncaughtExceptionHandler()` 专门为当前线程设置。当线程抛出未被捕获的异常时，它会向上冒泡到线程中的 `UncaughtExceptionHandler()`。如果该处理器不存在，则会继续冒泡到
    `defaultUncaughtExceptionHandler()`。同样，在这两种情况下，抛出异常的线程都会终止。


    提示


    在处理多线程时，明确地为线程命名始终是一个好习惯。这能让我们更容易地确定是哪个线程导致了异常，而不必去追踪一个名为 `Thread-##`（未命名线程的默认命名模式）的未知线程。


    ## 9.6 使用 try/catch 块管理资源


    ### 问题


    当发生异常时，需要确保 `try`/`catch` 块中使用的所有资源都被释放。


    ### 方案


    使用自动资源管理（ARM）特性，该特性可以通过 `try`-`with`-`resources` 语句来指定。使用该语句时，`try` 子句中指定的任何资源在块终止时都会自动释放。在以下代码中，`FileOutputStream`、`BufferedOutputStream`
    和 `DataOutputStream` 资源由 `try`-`with`-`resources` 块自动管理。


    ```

    public class Recipe9_6 {

    public static void main(String []args) {

    Recipe9_6 recipe = new Recipe9_6();

    recipe.start();

    }

    private void start() {

    try (

    FileOutputStream fos = new FileOutputStream("out.log");

    BufferedOutputStream bos = new BufferedOutputStream(fos);

    DataOutputStream dos = new DataOutputStream(bos)

    ) {

    dos.writeUTF("正在写入内容");

    } catch (Exception e) {

    System.out.println("发生了一些糟糕的异常");

    }

    }

    ```


    ### 工作原理


    在大多数情况下，你希望在 `try`/`catch` 块执行完毕后，干净地关闭/释放块内获取的资源。如果程序没有关闭/释放其资源，或者操作不当，资源可能会被无限期占用，从而导致内存泄漏等问题。大多数资源都是有限的（如文件句柄或数据库连接），因此会导致性能下降（并引发更多异常）。为了避免这些情况，Java
    提供了一种在 `try`/`catch` 块内发生异常时自动释放资源的方法。通过声明一个 `try-with-resources` 块，如果块内抛出异常，则
    `try` 块所检查的资源会被关闭。Java 内置的大多数资源都能在 `try-with-resources` 语句中正常工作（完整列表请参见 `java.lang.AutoCloseable`
    接口的实现者）。此外，第三方实现者可以通过实现 `AutoCloseable` 接口来创建能与 `try-with-resources` 语句配合使用的资源。


    `try-with-resources` 语句的语法包括 `try` 关键字，后跟一个左括号，然后是所有希望在发生异常或块完成时释放的资源声明，最后以右括号结束。如果你尝试声明一个未实现
    `AutoCloseable` 接口的资源/变量，编译器会报错。在右括号之后，`try`/`catch` 块的语法与普通块相同。


    `try-with-resources` 特性的主要优势在于它允许更干净地释放资源。通常，在获取资源时，存在许多相互依赖关系（例如创建文件处理器，然后包装到输出流中，再包装到缓冲流中）。在异常情况下正确关闭和释放这些资源需要检查每个依赖资源的状态并小心处理，这需要编写大量代码。相比之下，`try-with-resources`
    结构允许 JVM 即使在异常情况下也能正确地释放资源。


    注意


    `try-with-resources` 块始终会关闭定义的资源，即使没有抛出任何异常。


    ## 9.7 创建异常类


    ### 问题


    你想要创建一种新的异常类型，用于指示特定事件。


    ### 方案 1


    创建一个继承 `java.lang.RuntimeException` 的类，以创建一个可以随时抛出的异常类。在以下代码中，名为 `IllegalChatServerException`
    的类继承了 `RuntimeException`，并在构造函数中接受一个字符串参数。当代码中发生指定事件时，就会抛出该异常。


    ```

    class IllegalChatServerException extends RuntimeException {

    IllegalChatServerException(String message) {

    super(message);

    }

    }

    private void disconnectChatServer(Object chatServer) {

    if (chatServer == null) throw new IllegalChatServerException("聊天服务器为空");

    }

    ```

