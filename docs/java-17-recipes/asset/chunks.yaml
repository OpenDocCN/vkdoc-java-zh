    ## 6.6 实现 Runnable


    ### 问题


    你想以简洁的方式创建一段可运行的代码。

    '
- fmt: '### Solution


    Utilize a lambda expression to implement the `java.util.Runnable` interface. The
    `java.util.Runnable` interface is a perfect match for lambda expressions since
    it contains only a single abstract method, `run()`. This solution compares the
    legacy technique, creating a new `Runnable` interface, and the new technique using
    a lambda expression.


    The following lines of code demonstrate how to implement a new `Runnable` piece
    of code using the legacy technique.


    ```

    public static void main(String[] args) {

    Runnable oldRunnable = new Runnable() {

    @Override

    public void run() {

    int x = 5 * 3;

    System.out.println("The variable using the old way equals: " + x);

    }

    };

    Runnable lambdaRunnable = () -> {

    int x = 5 * 3;

    System.out.println("The variable using the lambda equals: " + x);

    };

    // Calling the runnables

    oldRunnable.run();

    lambdaRunnable.run();

    }

    ```


    The following is the output.


    ```

    The variable using the old way equals: 15

    The variable using the lambda equals: 15

    ```


    Now take a look at how this can be written using a lambda expression instead.


    ```

    Runnable lambdaRunnable = () -> {

    int x = 5 * 3;

    System.out.println("The variable using the lambda equals: " + x);

    };

    ```


    As you can see, the legacy procedure for implementing a `Runnable` takes a few
    more lines of code than implementing `Runnable` with a lambda expression. The
    lambda expression also makes the `Runnable` implementation easier to read and
    maintain.


    ### How It Works


    Since `java.util.Runnable` is a functional interface, the boilerplate of implementing
    the `run()` method can be abstracted away using a lambda expression. The following
    is the general format for implementing a `Runnable` with a lambda expression.


    ```

    Runnable assignment = () -> {expression or statements};

    ```


    A `Runnable` interface can be implemented using a zero-argument lambda expression
    containing an expression or a series of statements within the lambda body. The
    key is that the implementation takes zero arguments and returns nothing.


    ## 6.7 Accessing Class Variables from a Lambda Expression


    ### Problem


    The class you are writing contains instance variables, and you want to make them
    available for use via a lambda expression within the class.


    ### Solution


    Use instance variables contained in enclosing classes, as needed, from within
    lambda expressions. In the following class, the lambda expression contained within
    the `VariableAccessInner.InnerClass.lambdaInMethod()` method can access all enclosing
    class instance variables. Thus, it can print the `VariableAccessInner CLASSA`
    variable, if needed.


    ```

    public class VariableAccessInner {

    public String CLASSA = "Class-level A";

    class InnerClass {

    public String CLASSA = "Class-level B";

    void lambdaInMethod(String passedIn) {

    String METHODA = "Method-level A";

    Consumer l1 = x -> {

    System.out.println(x);

    System.out.println("CLASSA Value: " + CLASSA);

    System.out.println("METHODA Value: " + METHODA);

    };

    l1.accept(CLASSA);

    l1.accept(passedIn);

    }

    }

    }

    ```


    Now, let’s execute `lambdaInMethod` using the following code.


    ```

    VariableAccessInner vai = new VariableAccessInner();

    VariableAccessInner.InnerClass inner = vai.new InnerClass();

    inner.lambdaInMethod("Hello");

    ```


    The main class is as follows.


    ```

    public class MainClass {

    public static void main(String[] args){

    System.out.println("==VariableAccessInner==");

    VariableAccessInner vai = new VariableAccessInner();

    VariableAccessInner.InnerClass inner = vai.new InnerClass();

    inner.lambdaInMethod("Hello");

    }

    }

    ```


    The following is the result.


    ```

    ==VariableAccessInner==

    Class-level B

    CLASSA Value: Class-level B

    METHODA Value: Method-level A

    Hello

    CLASSA Value: Class-level B

    METHODA Value: Method-level A

    ```


    **Note**


    The `CLASSA` variable is overridden by a variable using the same identifier within
    the `InnerClass` class. Therefore, the `CLASSA` instance variable that belongs
    to `VariableAccessInner` is not printed within the lambda expression.


    ### How It Works


    Lambda expressions have access to the variables located within the enclosing class.
    Thus, a lambda expression contained within a class method can access any instance
    variables of the enclosing class. No additional scope is added to a lambda expression,
    so it can access fields, methods, and local variables of the enclosing scope.
    In the solution, the lambda expression contained within the `lambdaInMethod()`
    method can access all of the fields that are declared within either class. This
    is because both the inner and outer classes enclose the lambda. One thing to note
    is that if an inner class contains an instance variable of the same name as a
    variable that has been declared in the outer class, then the lambda uses the variable
    of its enclosing class. Therefore, in the solution, the `InnerClass CLASSA` field
    is accessed from within the lambda expression rather than the outer class reference.


    Local variables referenced from within a lambda expression must be either final
    or effectively final. An error occurs when a lambda expression attempts to access
    a variable that was changed within the context of an enclosing method. For instance,
    suppose that the method in the solution was changed to the following.


    ```

    void lambdaInMethod(String passedIn) {

    String METHODA = "Method-level A";

    passedIn = "test";

    Consumer l1 = x -> {

    System.out.println(x);

    System.out.println("CLASSA Value: " + CLASSA);

    System.out.println("METHODA Value: " + METHODA);

    System.out.println(passedIn);

    };

    l1.accept(CLASSA);

    l1.accept(passedIn);

    }

    ```


    Note that the string passed into `lambdaInMethod()` is assigned a new value just
    before the lambda expression is invoked. Therefore, the `passedIn` variable is
    no longer effectively final, and lambda expressions cannot introduce a new scope
    level. Consequently, the lambda expression does not have access to the `passedIn`
    variable from within the context of the expression.


