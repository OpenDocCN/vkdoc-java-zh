    System.out.println(rs.getString(2) + ": " + rs.getString(3) +

    " - " + rs.getString(4));

    rs.previous();

    System.out.println(rs.getString(2) + ": " + rs.getString(3) +

    " - " + rs.getString(4));

    rs.last();

    System.out.println(rs.getString(2) + ": " + rs.getString(3) +

    " - " + rs.getString(4));

    } catch (SQLException ex) {

    ex.printStackTrace();

    }

    }

    主方法如下：

