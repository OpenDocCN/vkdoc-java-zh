- fmt: '### How It Works


    The builder pattern provides a way to generate new instances of an object in a
    procedural fashion. It abstracts away the details of object creation, so the creator
    does not need to do any specific work to generate new instances. By breaking the
    work down into a series of steps, the builder pattern allows objects to implement
    its builder methods in different ways. Because the object creator only has access
    to the builder methods, it makes creating different object types much easier.


    A few classes and interfaces are necessary for using the builder pattern. First,
    you need to define a class and its different attributes. As the solution to this
    recipe demonstrates, the class may follow the JavaBean pattern. You can populate
    the object by using its setters and getters by creating a JavaBean. Next, you
    should create an interface that can be used to access the setters of the object
    you created. Each setter method should be defined in the interface, and then the
    object itself should implement that interface. As seen in the solution, the `Team`
    object contains the following setters, and each of them is defined in the `TeamType`
    interface.


    ```

    public void setPlayers(List players);

    public void setName(String name);

    public void setCity(String city);

    ```


    In real life, a team probably contains more attributes. For instance, you’d probably
    want to set up a mascot and a home stadium name and address. The code in this
    example can be thought of as abbreviated because it demonstrates the creation
    of a generic “team object” rather than showing you all the code for creating a
    team that is true to life. Because the `Team` class implements these setters that
    are defined within the `TeamType` interface, the interface methods can be called
    on to interact with the actual methods of the `Team` class.


    After the object and its interface have been coded, the actual builder needs to
    be created. The builder consists of an interface and its implementation class.
    To start, you must define the methods you want other classes to call on when building
    your object. For instance, in the solution to this recipe, the `buildNewTeam()`,
    `designateTeamCity()`, and `buildPlayerList()` methods are defined within the
    builder interface named `TeamBuilder`. When a class wants to build one of these
    objects later, it only needs to call these defined methods. Next, define a builder
    class implementation. The implementation class implements the methods defined
    within the builder interface, hiding all the details of those implementations
    from the object creator. The builder class, `HockeyTeamBuilder`, implements the
    `TeamBuilder` interface in the solution to this recipe. When a class wants to
    create a new `Team` object, it simply instantiates a new builder class.


    ```

    TeamBuilder builder = new HockeyTeamBuilder();

    ```


    To populate the newly created class object, the builder methods are called upon
    it.


    ```

    builder.buildNewTeam(teamName);

    builder.designateTeamCity(city);

    builder.buildPlayerList();

    ```


    Using this technique provides a step-by-step creation for an object. The implementation
    details for building that object are hidden from the object creator. It would
    be easy for a different builder implementation to use the same `TeamBuilder` interface
    to build `Team` objects for different types. For instance, a builder implementation
    could be written for generating `Team` objects for soccer, and another one could
    be defined for generating `Team` objects for baseball. Each of the `Team` object
    implementations would be different. However, both could implement the same interface—`TeamBuilder`—and
    the creator could simply call on the builder methods without caring about the
    details.


    ## 5.9 Interacting with a Class via Interfaces


    ### Problem


    You have created a class that implements an interface or class type. You want
    to interact with the methods of that class by calling on methods declared within
    the interface rather than working directly with the class.


    ### Solution


    Declare a field of the same type as an interface. You can then assign classes
    that implement the interface to the field you had declared and call upon the methods
    declared in the interface to perform work. In the following example, a field is
    declared to be of type `TeamType`. Using the same classes from Recipe 5-8, you
    can see that the class `Team` implements the `TeamType` interface. The field that
    is created in the following example holds a reference to a new `Team` object.


    Because the `Team` class implements the `TeamType` interface, the methods that
    are exposed in the interface can be used.


    ```

    public class InterfaceTester {

    static TeamType team = new Team();

    public static void main(String[] args){

    team.setCity("SomeCity");

    team.setName("SomeName");

    team.setPlayers(null);

    System.out.println(team.getFullName());

    }

    }

    ```


    Where the interface is


    ```

    public interface TeamType {

    void setPlayers(List players);

    void setName(String name);

    void setCity(String city);

    String getFullName();

    }

    ```


    The resulting output is as follows.


    ```

    SomeName - SomeCity

    ```


    ### How It Works


    Interfaces are useful for many reasons. Two of the most important use cases for
    interfaces are conformity and abstraction. Interfaces define a model, and any
    class that implements the interface must conform to that model. Therefore, if
    a constant is defined within the interface, it is automatically available for
    use in the class. If there is a method defined within the interface, the class
    must implement that method unless a default implementation has been defined. Interfaces
    provide a nice way to allow classes to conform to a standard.


    Interfaces hide unnecessary information from any class that does not need to see
    it. Any method defined within the interface is made `public` and accessible to
    any class. As demonstrated in the solution to this recipe, an object was created
    and declared the type of an interface. The interface in the example, `TeamType`,
    only includes a small subset of available methods within the `Team` object. Therefore,
    the only methods that are accessible to any class working against an object declared
    to be of `TeamType` are the ones defined within the interface. The class using
    this interface type does not have access to any of the other methods or constants,
    nor does it need to. Interfaces are a great way for hiding logic that does not
    need to be used by other classes. Another great side effect: A class that implements
    an interface can be changed and recompiled without affecting code that works against
    the interface. However, if an interface is changed, there could be an effect on
    any classes that implement it. Therefore, if the `getFullName()` method implementation
    changes, any class coded against the `TeamType` interface is not affected because
    the interface is unchanged. The implementation changes behind the scenes, and
    any class working against the interface begins to use the new implementation without
    needing to know.


    Lastly, interfaces help to promote security. They hide implementation details
    of methods declared in an interface from any class that may call upon that method
    using the interface. As mentioned in the previous paragraph, if a class calls
    the `getFullName()` method against the `TeamType` interface, it does not need
    to know the implementation details of that method as long as a result is returned
    as expected.


