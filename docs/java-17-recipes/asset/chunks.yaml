    # 3. Strings


    This chapter focuses on some of the most common `String` methods and techniques
    for working with `String` objects. In fact, they are one of the most used data
    types in any programming language. They can be used to obtain text from a keyboard,
    print messages to a command line, and much more. Given that strings are used so
    often, there have been many features added to the `String` object over time to
    make them easier to work with. After all, a string is an object in Java, so it
    contains methods that can manipulate the contents of the string.


    ## 3.1 Compact Strings


    Since the Java language was introduced, strings have been stored into an array
    of type UTF-16 `char`. The `char` array contains two bytes for each character,
    which eventually produces a large memory heap since strings are often used in
    our applications. In Java 9, strings are stored in an array of type `byte`, and
    stored characters are encoded either as ISO-8859-1/Latin-1 (one byte per character)
    or as UTF-16 (two bytes per character). There is also an encoding flag on the
    `char` array, indicating which type of encoding is used for the string. These
    changes are otherwise known as *compact strings*.


    ## 3.2 Obtaining a Subsection of a String


    ### Problem


    You want to retrieve a portion of a string.


    ### Solution


    Use the `substring()` method to obtain a portion of the string between two different
    positions. In the following solution, a string is created, and then various portions
    of the string are printed out using the `substring()` method.


    ```

    public static void substringExample(){

    String originalString = "This is the original String";

    System.out.println(originalString.substring(0, originalString.length()));

    System.out.println(originalString.substring(5, 20));

    System.out.println(originalString.substring(12));

    }

    ```


    Running this method would yield the following results.


    ```

    This is the original String

    is the original

    original String

    ```


    ### How It Works


    The `String` object contains many helper methods. One such method is `substring()`,
    which can return portions of the string. There are two variations of the `substring()`
    method. One of them accepts a single argument, that being the starting index.
    The other accepts two arguments: `startingindex` and `endingindex`. Having two
    variations of the `substring()` method makes it seem as though the second argument
    is optional; if it is not specified, the length of the calling string is used
    in its place. It should be noted that indices begin with 0, so the first position
    in a string has an index of 0, and so on.


    As you can see from the solution to this recipe, the first use of `substring()`
    prints out the entire contents of the string. This is because the first argument
    passed to the `substring()` method is 0, and the second argument passed is the
    length of the original string. In the second example of `substring()`, an index
    of 5 is used as the first argument, and an index of 20 is used as the second argument.
    This effectively causes only a portion of the string to be returned, beginning
    with the character in the string that is located in the sixth position, or index
    5 because the first position has an index of 0; and ending with the character
    in the string that is located in the twentieth position, the index of 19. The
    third example specifies only one argument; therefore, the original string begins
    with the position specified by that argument.


    Note


    The `substring()` method only accepts positive integer values. If you attempt
    to pass a negative value, a `java.lang.StringIndexOutOfBoundsException` is thrown.


    ## 3.3 Comparing Strings


    ### Problem


    An application that you are writing needs to have the ability to compare two or
    more string values.


    ### Solution


    Use the built-in `equals()`, `equalsIgnoreCase()`, `compareTo()`, and `compareToIgnoreCase()`
    methods to compare the values contained within the strings. The following is a
    series of tests using different string-comparison operations.


    As you can see, various `if` statements are used to print messages if the comparisons
    are equal.


    ```

    String one = "one";

    String two = "two";

    String var1 = "one";

    String var2 = "Two";

    String pieceone = "o";

    String piecetwo = "ne";

    // Comparison is equal

    if (one.equals(var1)){

    System.out.println ("String one equals var1 using equals");

    }

    // Comparison is NOT equal

    if (one.equals(two)){

    System.out.println ("String one equals two using equals");

    }

    // Comparison is NOT equal

    if (two.equals(var2)){

    System.out.println ("String two equals var2 using equals");

    }

    // Comparison is equal, but is not directly comparing String values using ==

    if (one == var1){

    System.out.println ("String one equals var1 using ==");

    }

    // Comparison is equal

    if (two.equalsIgnoreCase(var2)){

    System.out.println ("String two equals var2 using equalsIgnoreCase");

    }

    String piecedTogether = pieceone + piecetwo;

    // Comparison is equal

    if (one.equals(piecedTogether)){

    System.out.println("The strings contain the same value using equals");

    }

    // Comparison is NOT equal using ==

    if (one == piecedTogether) {

    System.out.println("The string contain the same value using == ");

    }

    // Comparison is equal

    if (one.compareTo(var1) == 0){

    System.out.println("One is equal to var1 using compareTo()");

    }

    if (one.compareToIgnoreCase(var1) == 0){

    System.out.println("One is equal to var1 using compareToIgnoreCase()");

    }

    ```


    Results in the following output.


    ```

    String one equals var1 using equals

    String one equals var1 using ==

    String two equals var2 using equalsIgnoreCase

    The Strings contain the same value using equals

    One is equal to var1 using compareTo()

    One is equal to var1 using compareToIgnoreCase()

    ```'
