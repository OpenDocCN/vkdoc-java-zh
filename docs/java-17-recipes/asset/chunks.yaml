    #### 主程序


    `public static void main(...)` 这个咒语在公共类中使用，用于表示 Java 程序的入口点。该声明开始一个名为 `main` 的可执行方法。你必须指定一个参数，该参数是一个字符串数组，通常该参数被定义为
    `String[] args`。当你执行当前选定的类时，JVM 将控制权转移到 `main()` 方法，该方法调用 `System.out.println()`
    来显示命令窗口中显示的 Hello World 消息。


    ## 1.4 安装 Eclipse


    ### 问题


    你想安装一个合适的 IDE 来配合使用。


    ### 解决方案


    安装 Eclipse IDE 以提供更高效的工作环境。


    首先，你需要下载软件包。访问 [www.​eclipse.​org/​downloads/​packages/​](http://www.eclipse.org/downloads/packages/)
    并点击 **Eclipse IDE for Java Developers**，如图 1-4 所示。


    ![](img/323910_4_En_1_Fig4_HTML.jpg)


