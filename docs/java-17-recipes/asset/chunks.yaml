    # 2. Enhancements from Java 9 Through Java 17


    Since Java 9, newer versions of Java follow every six months, but this is a long-term
    support (LTS). It receives support for at least eight years and surely until the
    next LTS version in 2023. Each release of the JDK brings new enhancements and
    capabilities to the Java platform. Since the last version of this book, many enhancements
    have occurred. This book includes several recipes covering the new features from
    Java 9 to Java 17. Each release also carries backward compatibility with previous
    releases. This chapter showcases a few of the top enhancements to whet your appetite.
    By no means is this chapter a complete listing of all Java enhancements. Rather,
    it is a jump start to get you going on some of the hot new features of Java up
    to the last version.


    ## 2.1 Introduction to the var Keyword


    ### Problem


    You want to use a keyword detecting the data type of a variable based on the surrounding
    context.


    ### Solution


    Use the local variable type inference introduced in Java 10. Listing [2-1](#323910_4_En_2_Chapter.xhtml#PC1)
    is an example.


    ```

    org.java17recipes.chapter01.recipe02_01;

    public class KeywordVar {

    public static void main (String[] args) {

    var num = 1;

    var city = "Taranto";

    System.out.println(num);

    System.out.println(city);

    }

    }

    Listing 2-1

    Declarations Local Variable Type Inference Package

    ```


    Now you should see the following output.


    ```

    Taranto

    ```


    ### How It Works


    Prior to Java 10, you declared in the following way.


    ```

    String city = "Taranto";

    ```


    Next, you can declare the following.


    ```

    var city = "Taranto"

    ```


    It allows programmers to declare the type of the local variable instead of the
    actual type and increases code readability. The compiler decides the type based
    on the value assigned to the variable. In Java 11, the usage of `var` uniform
    was extended to lambda parameters, as explained in Chapter [6](#323910_4_En_6_Chapter.xhtml).


    The local variable type inference cannot be used as a global variable. In fact,
    if you use the following, the IDE raises a compilation error.


    ```

    // instance variable

    var x = 50;

    public static void main(String[] args)

    {

    System.out.println(x);

    }

    ```


    The output is an error.


    ```

    ''var'' is not allowed here

    ```


    For more information on the `var` keyword, see the documentation at [http://openjdk.java.net/jeps/286](http://openjdk.java.net/jeps/286).


    **Note**


    The JEP–JDK Enhancement Proposal collects proposals for enhancements to the JDK
    and allows OpenJDK to develop more informally changes. It does not replace JCP,
    however, which is required to approve changes in Java API.


    ## 2.2 Reading the Contents of Files


    ### Problem


    You want to read the contents of a file.


    ### Solution


    Use the `java.nio.file.Files` class, which provides static methods operating on
    files and directories (see Listing [2-2](#323910_4_En_2_Chapter.xhtml#PC7)).


    ```

    import java.nio.file.Path;

    import java.nio.file.Paths;

    import java.nio.file.Files;

    import java.io.IOException;

    class ReadContentsFile

    {

    public static void main(String[] args)

    {

    Path filePathHello = Paths.get("C:/hello.txt");

    try

    {

    String contents = Files.readString(filePath filePathHello);

    System.out.println(contents);

    }

    catch (IOException err)

    {

    err.printStackTrace();

    }

    }

    }

    Listing 2-2

    Reading Content of File

    ```


    The following is the output.


    ```

    Ciao da

    Luciano Manelli

    Taranto

    ITALY

    ```


    This is the content of a text file on the author’s computer.


    ### How It Works


    Java 11 included some new `Files` class methods to read content from a file. The
    `Files.readString(Path)` method reads characters from a file, accepts the file’s
    path, and returns a string with the file’s contents. It throws an `IOException`
    if an error occurs. The used charset for the decoding is the UTF-8.


    You can also use the `Files.readString(Path, Charset)` method. It is used for
    using a specific charset to decode bytes to characters. It reads from the file
    and throws an `IOException`. The `Files.readString(Path)` method is equal to `readString(path,
    StandardCharsets.UTF_8)`.


    Listing [2-3](#323910_4_En_2_Chapter.xhtml#PC9) is an example.


    ```

    import java.nio.file.Path;

    import java.nio.file.Paths;

    import java.nio.file.Files;

    import java.io.IOException;

    import java.nio.charset.StandardCharsets;

    public class Main

    {

    public static void main(String[] args)

    {

    Path filePathHello = Paths.get("C:/hello.txt");

    try

    {

    String contents = Files.readString(filePath filePathHello, StandardCharsets.UTF_8);

    System.out.println(contents);

    }

    catch (IOException err)

    {

    err.printStackTrace();

    }

    }

    }

    Listing 2-3

    Reading the File Content with charset

    ```


    ## 2.3 Writing a Text Block


    ### Problem


    You want to write a string in multiple lines in a smart way.


    ### Solution


    A smart form for writing a multiline string in a simple text block was introduced
    in Java 15 (JEP 378), though first proposed in Java 13.


    The following is an example.


    ```

    public class MultipleLineStringEx {

    public static void main (String[] args) {

    String writeTextStandard = "\n" +

    "      Ciao, hello\n" +

    "\n";

    String writeTextSmart = """


    Ciao, hello


    """;

    System.out.println(writeTextStandard);

    System.out.println(writeTextSmart);

    }

    }

    ```


    The output is the same.


    ### How It Works


    Java 13 introduced an enhancement to make multiline strings more readable. So,
    text block efficiently eliminates the concatenation of multiple strings together.
    The need was to choose a way to visually text blocks and string literals: the
    delimiter `"""` was chosen. Moreover, indentation was removed and replaced with
    whitespace characters.


    For more information on text blocks, see the documentation at [https://openjdk.java.net/jeps/378](https://openjdk.java.net/jeps/378).


    ## 2.4 The Enhancement of NullPointerException


    ### Problem


    You want to know which variable is null when a `NullPointerException` occurs.


    ### Solution


    Java 14 improved the `NullPointerException` functionalities generated when an
    error occurs.


    The following is an example.


    ```

    Line 1:package org.java17recipes.chapter02.recipe02_04;

    Line 2:

    Line 3:public class NullPointerExample {

    Line 4:        public static void main (String[] args) {

    Line 5:                String professor= null;

    Line 6:                System.out.println(professor.length());

    Line 7:        }

    Line 8:}

    ```


    The following is the output.


    ```

    Exception in thread "main" java.lang.NullPointerException:

    Cannot invoke "String.length()" because "professor" is null

    at org.java17recipes.chapter02.recipe02_04.NullPointExample.main(NullPointerExample.java:6)

    ```'
