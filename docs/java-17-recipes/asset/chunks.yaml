    ### 工作原理


    Java 平台为许多传统字符集编码提供了转换支持。当你从字节数组创建 `String` 实例时，必须向 `String` 构造函数提供 `charset`
    参数，以便平台知道如何执行从传统编码到 Unicode 的映射。所有 Java 字符串都使用 Unicode 作为其原生编码。


    原始数组中的字节数通常不等于结果字符串中的字符数。在本示例中，原始数组包含 18 个字节。Shift-JIS 编码需要这 18 个字节来表示日文文本。然而，转换后，结果字符串包含九个字符。字节和字符之间不存在
    1:1 的关系。在此示例中，每个字符在原始 Shift-JIS 编码中需要两个字节。


    有数百种不同的 `charset` 编码。编码的数量取决于你的 Java 平台实现。但是，你可以保证获得几种最常见编码的支持，并且你的平台很可能包含比这个最小集合多得多的编码。


    *   US-ASCII


    *   ISO-8859-1


    *   UTF-8


    *   UTF-16BE


    *   UTF-16LE


    *   UTF-16


    在构造 `charset` 时，你应该准备好处理当字符集不受支持时可能出现的异常。


    *   `java.nio.charset.IllegalCharsetNameException`，当 `charset` 名称非法时抛出

    *   `java.lang.IllegalArgumentException`，当 `charset` 名称为 `null` 时抛出

    *   `java.nio.charset.UnsupportedCharsetException`，当你的 JVM 不支持目标 `charset` 时抛出


    ## 11.7 转换字符流和缓冲区


    ### 问题


    你需要将大块的 Unicode 字符文本与任意面向字节的编码进行相互转换。大块文本可能来自流或文件。


    ### 解决方案 1


    使用 `java.io.InputStreamReader` 将字节流解码为 Unicode 字符。使用 `java.io.OutputStreamWriter`
    将 Unicode 字符编码为字节流。


    以下代码使用 `InputStreamReader` 从类路径中的文件读取并转换可能很大的文本字节块。`org.java17recipes.chapter11.recipe11_07.StreamConversion`
    类提供了此示例的完整代码。


    ```

    public static void main(String[] args) {

    StreamConversion app = new StreamConversion();

    app.run();

    }

    public void run() {

    try {

    String input = readStream();

    System.out.printf("Input stream: %s\n", input);

    writeStream(input);

    } catch (IOException ex) {

    Logger.getLogger(StreamConversion.class.getName()).log(Level.SEVERE, null, ex);

    }

    }

    public String readStream() throws IOException {

    InputStream is = getClass().getResourceAsStream("/resources/helloworld.sjis.txt");

    StringBuilder sb = new StringBuilder();

    if (is != null) {

    try (InputStreamReader reader =

    new InputStreamReader(is, Charset.forName("SJIS"))) {

    int ch = reader.read();

    while (ch != -1) {

    sb.append((char) ch);

    ch = reader.read();

    }

    }

    }

    return sb.toString();

    }

    ```


    类似地，你可以使用 `OutputStreamWriter` 将文本写入字节流。以下代码将一个字符串写入 UTF-8 编码的字节流。


    ```

    public void writeStream(String text) throws IOException {

    FileOutputStream fos = new FileOutputStream("helloworld.utf8.txt");

    try (OutputStreamWriter writer

    = new OutputStreamWriter(fos, Charset.forName("UTF-8"))) {

    writer.write(text);

    }

    }

    ```


    ### 解决方案 2


    使用 `java.nio.charset.CharsetEncoder` 和 `java.nio.charset.CharsetDecoder` 将 Unicode
    字符缓冲区与字节缓冲区进行相互转换。通过 `newEncoder()` 或 `newDecoder()` 方法从 `charset` 实例获取编码器或解码器。然后使用编码器的
    `encode()` 方法创建字节缓冲区。使用解码器的 `decode()` 方法创建字符缓冲区。以下来自 `org.java17recipes.chapter11.recipe11_07.BufferConversion`
    类的代码对缓冲区中的字符集进行编码和解码。


    ```

    public static void main(String[] args) {

    BufferConversion app = new BufferConversion();

    app.run();

    }

    public void run() {

    try {

    System.out.printf("Original string: %s\n", unicodeString);

    CharBuffer srcBuffer = CharBuffer.wrap(unicodeString);

    ByteBuffer targetBytes = encodeBuffer("UTF8", srcBuffer);

    printBytes(targetBytes);

    CharBuffer roundtripBuffer = decodeBuffer("UTF8", targetBytes);

    printCharBuffer(roundtripBuffer);

    } catch (CharacterCodingException ex) {

    Logger.getLogger(BufferConversion.class.getName()).log(Level.SEVERE, null, ex);

    }

    }

    public ByteBuffer encodeBuffer(String charsetName, CharBuffer charBuffer)

    throws CharacterCodingException {

    Charset charset = Charset.forName(charsetName);

    CharsetEncoder encoder = charset.newEncoder();

    ByteBuffer targetBuffer = encoder.encode(charBuffer);

    return targetBuffer;

    }

    public CharBuffer decodeBuffer(String charsetName, ByteBuffer srcBuffer)

    throws CharacterCodingException {

    Charset charset = Charset.forName(charsetName);

    CharsetDecoder decoder = charset.newDecoder();

    CharBuffer charBuffer = decoder.decode(srcBuffer);

    return charBuffer;

    }

    ```


    ### 工作原理


    `java.io` 和 `java.nio.charset` 包包含几个类，可以帮助你对大型文本流或缓冲区执行编码转换。流是方便的抽象，可以帮助你使用各种源和目标转换文本。流可以表示
    HTTP 连接甚至文件中的传入或传出文本。


    如果你使用 `InputStream` 来表示底层源文本，则将该流包装在 `InputStreamReader` 中以执行从字节流的转换。读取器实例执行从字节到
    Unicode 字符的转换。


    使用 `OutputStream` 实例表示目标文本，将流包装在 `OutputStreamWriter` 中。写入器将你的 Unicode 文本转换为目标流中的面向字节的编码。


    要有效使用 `OutputStreamWriter` 或 `InputStreamReader`，你必须知道目标或源文本的字符编码。当你使用 `OutputStreamWriter`
    时，源文本始终是 Unicode，并且你必须提供一个 `charset` 参数来告诉写入器如何转换为目标面向字节的文本编码。当你使用 `InputStreamReader`
    时，目标编码始终是 Unicode。你必须提供源文本编码作为参数，以便读取器理解如何转换文本。


    注意


    Java 平台的 `String` 以 Unicode 的 UTF-16 编码表示字符。Unicode 可以有多种编码，包括 UTF-16、UTF-8，甚至
    UTF-32。在本讨论中，转换为 Unicode 始终意味着转换为 UTF-16。转换为面向字节的编码通常意味着传统的非 Unicode `charset`
    编码。然而，一种常见的面向字节的编码是 UTF-8，使用 `InputStreamReader` 或 `OutputStreamWriter` 类将 Java
    的“原生”UTF-16 Unicode 字符与 UTF-8 进行相互转换是完全合理的。


    执行编码转换的另一种方法是使用 `CharsetEncoder` 和 `CharsetDecoder` 类。`CharsetEncoder` 将你的 Unicode
    `CharBuffer` 实例编码为 `ByteBuffer` 实例。`CharsetDecoder` 将 `ByteBuffer` 实例解码为 `CharBuffer`
    实例。无论哪种情况，你都必须提供一个 `charset` 参数。


    ## 11.8 总结


    国际化是开发具有文化适应性的应用程序的关键。它允许更改应用程序文本，以符合使用该应用程序的文化和语言。本章提供了一些示例，说明如何使用国际化技术来克服跨文化开发的细微差别。

