    \ This is\nwhat dynamic HTML is all about! Plain HTML is not capable of\ninterrogating\
    \ a database, but Java is, and JSP gives you the means of\nincluding snippets\
    \ of Java inside an HTML page.\nAn evolution of JSP is the JavaServer Faces (JSF)\n\
    API for creating component-based UIs for Java web applications. Within\nthe MVC\
    \ application architecture, JSF takes e place of the controller,\nthereby mediating\
    \ every interaction between JSP (the view) and the\nmodel, which encapsulates\
