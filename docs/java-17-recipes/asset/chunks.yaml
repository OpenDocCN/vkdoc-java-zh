    **方案 2**


    使用 `XMLEventReader` 通过事件驱动的接口来读取和处理事件。该 API 也被称为*迭代器驱动* API。以下代码与方案 1 中的代码非常相似，不同之处在于它使用了事件驱动
    API 而非游标驱动 API。此代码片段同样来自方案 1 中使用的 `org.java17recipes.chapter15.recipe15_1.DocReader`
    类。


    ```

    public void eventReader(String xmlFile)

    throws FileNotFoundException, IOException, XMLStreamException {

    XMLInputFactory factory = XMLInputFactory.newFactory();

    XMLEventReader reader = null;

    try(FileInputStream fis = new FileInputStream(xmlFile)) {

    reader = factory.createXMLEventReader(fis);

    boolean inName = false;

    boolean inDiagnosis = false;

    String id = null;

    String name = null;

    String diagnosis = null;

    while(reader.hasNext()) {

    XMLEvent event = reader.nextEvent();

    String elementName = null;

    switch(event.getEventType()) {

    case XMLEvent.START_ELEMENT:

    StartElement startElement = event.asStartElement();

    elementName = startElement.getName().getLocalPart();

    switch(elementName) {

    case "patient":

    id = startElement.getAttributeByName(QName.valueOf("id")).getValue();

    break;

    case "name":

    inName = true;

    break;

    case "diagnosis":

    inDiagnosis = true;

    break;

    default:

    break;

    }

    break;

    case XMLEvent.END_ELEMENT:

    EndElement endElement = event.asEndElement();

    elementName = endElement.getName().getLocalPart();

    if (elementName.equals("patient")) {

    System.out.printf("Patient: %s\nName: %s\nDiagnosis: %s\n\n",id, name, diagnosis);

    id = name = diagnosis = null;

    inName = inDiagnosis = false;

    }

    break;

    case XMLEvent.CHARACTERS:

    String value = event.asCharacters().getData();

    if (inName) {

    name = value;

    inName = false;

    } else if (inDiagnosis) {

    diagnosis = value;

    inDiagnosis = false;

    }

    break;

    }

    }

    }

    if(reader != null) {

    reader.close();

    }

    }

