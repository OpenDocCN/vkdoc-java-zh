    Java 17 引入了一个用于向量计算的 API，其性能优于等效的标量计算。以下是两个数组求和的标椎代码。


    ```

    static void nonVectorSumInt(int[] arrayOne, int[] arrayTwo, int[] s) {

    for (int i = 0; i < arrayOne.length; i++) {

    s[i] = (arrayOne[i]  +  arrayTwo[i]) ;

    }

    }

