- fmt: '### Solution 2


    Use the regular expression `Pattern` and `Matcher` classes for a better-performing
    and more versatile matching solution than the `matches()` method. Although the
    `matches()` method gets the job done most of the time, there are some occasions
    in which you require a more flexible way of matching. Using this solution is a
    three-step process.


    1. Compile a pattern into a `Pattern` object.

    2. Construct a `Matcher` object using the `matcher()` method on the `Pattern`
    object.

    3. Call the `matches()` method on the `Matcher` object.


    The `Pattern` object and `Matcher` object techniques are demonstrated in the following
    example code.


    ```

    String str = "I love Java 17!";

    boolean result = false;

    Pattern pattern = Pattern.compile("I love .*[ 0-9]!");

    Matcher matcher = pattern.matcher(str);

    result = matcher.matches();

    System.out.println(result);

    ```


    The previous example yields a `TRUE` value, just like its variant, which was demonstrated
    in solution 1.


    ### How It Works


    Regular expressions are a great way to find matches because they allow patterns
    to be defined so that an application does not have to explicitly find an exact
    string match. They can be very useful for finding matches against some text that
    a user may be typing into your program. However, they could be overkill if you
    are trying to match strings against a string constant you have defined in your
    program because the `String` class provides many methods that could be used for
    such tasks. Nevertheless, there certainly comes a time in almost every developer’s
    life when regular expressions can come in handy. They can be found in just about
    every programming language used today. Java makes them easy to use and understand.


    **Note**


    Although regular expressions are used in many different languages today, the expression
    syntax for each language varies.


    The easiest way to use regular expressions is to call the `matches()` method on
    the `String` object. Passing a regular expression to the `matches()` method yields
    a Boolean result that indicates whether the string matches the given regular expression
    pattern or not. At this point, it is useful to know what a regular expression
    is and how it works.


    A *regular expression* is a string pattern that can be matched against other strings
    to determine its contents. Regular expressions can contain several different patterns
    that enable them to be dynamic in that they can have the ability to match many
    different strings that contain the same format. For instance, in the solution
    to this recipe, the following code can match several different strings.


    ```

    result = str.matches("I love Java [0-9]!");

    ```


    The regular expression string in this example is `"I love Java [0-9]!"`, and it
    contains the pattern `[0-9]`, which represents any number between 0 and 9. Therefore,
    any string that reads `"I love Java"` followed by the numbers 0 through 9 and
    an exclamation point matches the regular expression string. To see a listing of
    all the different patterns used in a regular expression, see the online documentation
    available at the URL in the previous note.


    A combination of `Pattern` and `Matcher` objects can also achieve similar results
    as the string `matcher()` method. The `Pattern` object can compile a string into
    a regular expression pattern. A compiled pattern can provide performance gains
    to an application if the pattern is used multiple times. You can pass the same
    string-based regular expressions to the `Pattern.compile()` method as you would
    pass to the string `matches()` method. The result is a compiled `Pattern` object
    that can be matched against a string for comparison. A `Matcher` object can be
    obtained by calling the `Pattern` object’s `matcher()` method against a given
    string. Once a `Matcher` object is obtained, it can match a given string against
    a pattern using any of the following three methods, which each return a Boolean
    value indicating a match. The following three lines of solution 2 could be used
    as an alternate solution to using the `Pattern.matches()` method, minus the reusability
    of the compiled pattern.


    - The `Matcher` object’s `matches()` method attempts to match the entire input
    string with the pattern.

    - The `Matcher` object’s `lookingAt()` method attempts to match the input string
    to the pattern starting at the beginning.

    - The `Matcher` object’s `find()` method scans the input sequence looking for
    the next matching sequence in the string.


    ```

    Pattern pattern = Pattern.compile("I love .*[ 0-9]!");

    Matcher matcher = pattern.matcher(str);

    result = matcher.matches();

    ```


    In the solution to this recipe, the `matches()` method is called against the `Matcher`
    object to match the entire string. Regular expressions can be very useful for
    matching strings against patterns in any event. The technique used for working
    with the regular expressions can vary in different situations, using whichever
    method works best.


    ## 3.14 Replacing All Text Matches


    ### Problem


    You have searched a body of text for a particular sequence of characters, and
    you are interested in replacing all matches with another string value.


    ### Solution


    Use a regular expression pattern to obtain a `Matcher` object; then use the `Matcher`
    object’s `replaceAll()` method to replace all matches with another string value.
    The following example demonstrates this technique.


    ```

    String str = "I love Java 8!  It is my favorite language.  Java 8 is the " + "8th
    version of this great programming language.";

    Pattern pattern = Pattern.compile("[0-9]");

    Matcher matcher = pattern.matcher(str);

