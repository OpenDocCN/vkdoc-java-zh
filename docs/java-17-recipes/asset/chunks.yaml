    The built-in `format()` method allows one to position a placeholder within a string,
    such that the placeholder is replaced with dynamic content at runtime. The format
    method accepts a string and a series of variables that displaces the placeholders
    within the string with dynamic content at runtime. The placeholders must be designated
    specifically for the type of content with which they are displaced. Each placeholder
    must begin with a % character to denote a placeholder within the string. The placeholder
    can also contain flags, width, and precision indicators to help format the dynamic
    value. The following format should build each placeholder.


    ```

    %[flags][width][.precision]conversion_indicator

    ```


    The second solution demonstrates how to utilize the `System.out.printf()` method
    , which accepts the same arguments as the `System.format()` method. The main difference
    is that the `System.out.printf()` method is handy for printing formatted content.
    If your application requires storing a formatted value, you are more likely to
    use the `String.format()` method.


