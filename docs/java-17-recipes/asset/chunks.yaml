- fmt: '### How It Works


    Sometimes you need to update data as you are parsing it. Usually, this technique
    involves testing the values returned from the database and updating them after
    comparison with another value. The easiest way is to make the `ResultSet` object
    updatable by passing the `ResultSet.CONCUR_UPDATABLE` constant to the `Connection`
    object’s `createStatement()` or `prepareStatement()` method. Doing so causes the
    `Statement` or `PreparedStatement` to produce an updatable `ResultSet`.


    **Note:** Some database JDBC drivers do not support updatable `ResultSets`. See
    the documentation of your JDBC driver for more information. This code was run
    using Oracle’s `ojdbc6.jar` JDBC driver on Oracle database 11.2 release.


    The format for creating a `Statement` object that produces an updatable `ResultSet`
    is to pass the `ResultSet` type as the first argument and the `ResultSet` concurrency
    as the second argument. The scroll type must be `TYPE_SCROLL_SENSITIVE` to ensure
    that `ResultSet` is sensitive to any updates. The following code demonstrates
    this technique by creating a `Statement` object that produces a scrollable and
    updatable `ResultSet` object.


    ```

    Statement stmt = conn.createStatement(ResultSet.TYPE_SCROLL_SENSITIVE,

    ResultSet.CONCUR_UPDATABLE);

    ```


    The format for creating a `PreparedStatement` object that produces an updatable
    `ResultSet` is to pass the SQL string as the first argument, the `ResultSet` type
    as the second argument, and the `ResultSet` concurrency as the third argument.
    The solution to this recipe demonstrates this technique using the following line
    of code.


    ```

    pstmt = conn.prepareStatement(sql, ResultSet.TYPE_SCROLL_SENSITIVE,

    ResultSet.CONCUR_UPDATABLE);

    ```


    Both lines of code discussed in this section produce scrollable and updatable
    `ResultSet` objects. Once you have obtained an updatable `ResultSet`, you can
    use it just like an ordinary `ResultSet` for fetching values retrieved from the
    database. In addition, you can call one of the `ResultSet` object’s `updateXXX()`
    methods to update any value within the `ResultSet`. In the solution to this recipe,
    the `updateString()` method is called, passing the position of the value from
    the query as the first argument and the updated text as the second argument. In
    this case, the fourth element column listed in the SQL query is updated.


    ```

    rs.updateString(4, desc + " -- More to come");

    ```


    Finally, to persist the values that you have changed, call the `ResultSet.updateRow()`
    method, as seen in the solution to this recipe.


    ```

    rs.updateRow();

    ```


    Creating an updatable `ResultSet` is not something that you need to do every day.
    In fact, you might never need to create an updatable `ResultSet`. However, for
    the cases in which such a strategy is needed, this technique can come in very
    handy.


    ## 12.11 Caching Data for Use When Disconnected


    ### Problem


    You want to work with data from a DBMS when you are in a disconnected state. That
    is, you are working on a device that is not connected to the database, and you
    still want to have the ability to work with a set of data as though you are connected.
    For instance, you are working with data on a portable device, and you are away
    from the office without a connection. You want to have the ability to query, insert,
    update, and delete data, even though there is no connection. Once a connection
    becomes available, you want to have your device synchronize any database changes
    that have been made while you were disconnected.


    ### Solution


    Use a `CachedRowSet` object to store the data that you want to work with while
    offline. This allows your application to work with data as though it were connected
    to a database. Once your connection is restored, or you connect back to the database,
    synchronize the data changed within the `CachedRowSet` with the database repository.
    The following example class demonstrates the use of a `CachedRowSet`. In this
    scenario, the `main()` method executes the example. Suppose that there was no
    `main()` method, though, and that another application on a portable device was
    to invoke the methods of this class. Follow the code in the example and consider
    working with the results stored within the `CachedRowSet` while not connected
    to the database. For instance, suppose that you began some work in the office
    while connected to the network and are now outside of the office, where the network
    is spotty, and you cannot maintain a constant connection to the database.'
