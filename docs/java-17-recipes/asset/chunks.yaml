  raw: '### How It Works


    `XMLEncoder` and `XMLDecoder` , like the Serialization framework, use reflection
    to determine which fields are to be written, but instead of writing the fields
    as binary, they are written as XML. Objects that are encoded do not need to be
    serializable, but they need to follow the JavaBeans specification.


    JavaBeans is the name of any object that conforms to the following contract.


    *   The object contains a public empty (`no-arg`) constructor.


    *   The object contains public getters and setters for each protected/private
    property that takes the name of `get{Property}()` and `set{Property}()`.


    `XMLEncoder` and `XMLDecoder` encode/decode only the properties of the bean that
    have public accessors (`get{property}, set{property}`), so any properties that
    are private and do not have accessors are not encoded/decoded.


    Tip


    It is a good idea to register an exception listener when encoding/decoding.


    `XMLEncoder` creates a new instance of the class that is being serialized (remember
    that they need to be JavaBeans, so they must have an empty `no-arg` constructor),
    and then figures out which properties are accessible (via `get{property}, set{property}`).
    And if a property of the newly instantiated class contains the same value as the
    property of the original class (i.e., has the same default value), `XMLEncoder`
    doesn’t write that property. In other words, if the default value of a property
    hasn’t changed, `XMLEncoder` does not write it. This provides the flexibility
    of changing what a “default” value is between versions. For example, if the default
    value of a property is 2 when an object is encoded and later decoded after the
    default property changes from 2 to 4, the decoded object contains the new default
    property of 4 (which might not be correct).


    `XMLEncoder` also keeps track of references. If an object appears more than once
    when being persisted in the object graph (for example, an object is inside a `Map`
    from the main class but is also as the `DefaultValue` property), then `XMLEncoder`
    only encodes it once and link up a reference by putting a link in the XML. The
    `XMLEncoder`/`XMLDecoder` class is much more forgiving than the Serialization
    framework. When decoding, if a property type is changed or deleted/added/moved/renamed,
    the decoding decodes “as much as it can” while skipping the properties that it
    couldn’t decode.


    The recommendation is to not persist your main classes (even though `XMLEncoder`
    is more forgiving) but to create special objects that are simple, hold the basic
    information, and do not perform many tasks by themselves.


    ## 8.4 Creating a Socket Connection and Sending Serializable Objects Across the
    Wire


    ### Problem


    You need to open a network connection to send/receive objects.


    ### Solution


    Use Java’s New Input/Output API version 2 (NIO.2) to send and receive objects.
    The following solution utilizes the NIO.2 features of nonblocking sockets (using
    `Future` tasks ).


    ```

    public class Ch_8_4_AsyncChannel {

    private AsynchronousSocketChannel clientWorker;

    InetSocketAddress hostAddress;

    public Ch_8_4_AsyncChannel() {

    }

    private void start() throws IOException, ExecutionException, TimeoutException,
    InterruptedException {

    hostAddress = new InetSocketAddress(InetAddress.getByName("127.0.0.1"), 2583);

    Thread serverThread = new Thread(() -> {

    serverStart();

    });

    serverThread.start();

    Thread clientThread = new Thread(() -> {

    clientStart();

    });

    clientThread.start();

    }

    private void clientStart() {

    try {

    try (AsynchronousSocketChannel clientSocketChannel = AsynchronousSocketChannel.open())
    {

    Future connectFuture = clientSocketChannel.connect(hostAddress);

    connectFuture.get();            // Wait until connection is done.

    OutputStream os = Channels.newOutputStream(clientSocketChannel);

    try (ObjectOutputStream oos = new ObjectOutputStream(os)) {

    for (int i = 0; i  serverFuture  = serverSocketChannel.accept();

    final AsynchronousSocketChannel clientSocket = serverFuture.get();

    System.out.println("Connected!");

    if ((clientSocket != null) && (clientSocket.isOpen())) {

    try (InputStream connectionInputStream = Channels.newInputStream(clientSocket))
    {

    ObjectInputStream ois = null;

    ois = new ObjectInputStream(connectionInputStream);

    while (true) {

    Object object = ois.readObject();

    if (object.equals("EOF")) {

    clientSocket.close();

    break;

    }

    System.out.println("Received :" + object);

    }

    ois.close();

    }

    }

    } catch (IOException | InterruptedException | ExecutionException | ClassNotFoundException
    e) {

    e.printStackTrace();

    }

    }

    public static void main(String[] args) throws IOException, ExecutionException,
    TimeoutException, InterruptedException {

    Ch_8_4_AsyncChannel example = new Ch_8_4_AsyncChannel();

    example.start();

    }

    }

    The output is:

    Connected!

    Received :Look at me 0

    Received :Look at me 1

    Received :Look at me 2

    Received :Look at me 3

    Received :Look at me 4

    ```'
