    一旦设置了这些选项并将端口绑定到数据报通道，它就可以加入监听器组了。这可以通过调用 `DatagramChanneljoin(InetAddress, NetworkInterface)`
    方法来实现，并传入客户端使用的组地址和网络接口。结果会生成一个 `java.nio.channels.MembershipKey` 对象。这是一个代表 IP
    多播组成员身份的令牌。最后，调用 `DatagramChannelopen()` 方法，该方法会打开通道以监听广播。此时，客户端已准备好接收多播消息，并等待接收消息。


    ```

    MembershipKey key = client.join(group, networkInterface);

    client.open();

    ```


    客户端接下来的几行代码负责接收来自服务器的消息。为了接收广播消息，会创建一个字节缓冲区，然后将其传递给 `DatagramChannel` 类的 `receive()`
    方法。一旦调用了 `receive()` 方法，客户端就会暂停，直到收到消息。你可以通过调用 `DatagramChannel configureBlocking(boolean)`
    方法并传入 `false` 值来禁用此功能。接着，`ByteBuffer` 会被转换为字符串值并打印出来，方法是使用 `flip()` 方法将缓冲区索引重置为
    0，然后将从索引 0 到最后一个索引的文本提取到 `byte[]` 中。最后，请确保在完成后断开客户端连接。至此，客户端代码部分结束。


    ```

    // 将客户端配置为被动且非阻塞

    // client.configureBlocking(false);

    client.receive(buffer);

    // 客户端暂停，直到收到消息...在此情况下

    System.out.println("客户端收到消息：");

    buffer.flip();

    byte[] arr = new byte[buffer.remaining()];

    buffer.get(arr, 0, arr.length);

    System.out.println(new String(arr));

    System.out.println("正在断开连接...仅执行单次测试");

    client.disconnect();

    ```


    注意


    在本技巧的示例中，仅执行单次传递，然后客户端断开连接。对于长时间监听，你需要一个带有超时机制的循环，并为结束状态提供测试。


    服务器代码相当基础。你可以看到 `MulticastServer` 类继承了 `Thread`。这意味着此服务器应用程序可以在与应用程序中其他代码分离的线程中运行。如果另一个类启动了
    `MulticastServer` 类的 `run()` 方法，它将在与启动它的类分离的线程中运行。任何继承 `Thread` 的类都必须包含 `run()`
    方法。


    服务器代码的主体部分位于 `run()` 方法中。使用客户端注册加入多播组时所用的相同 IP 地址创建一个新的 `InetAddress` 对象。服务器代码中也声明了相同的端口号。这两个对象稍后在代码块中用于发送消息。打开一个新的数据报通道并绑定到
    `null`。`null` 值很重要，因为通过将 `SocketAddress` 设置为 `null`，套接字会绑定到一个自动分配的地址。接下来，创建一个包含消息的字节缓冲区，该消息将广播给所有监听器。然后使用
    `DatagramChannel` 类的 `send(ByteBuffer, InetSocketAddress)` 方法发送消息。解决方案中的 `send()`
    方法接受一个 `ByteBuffer` 对象作为消息，以及一个使用代码块开头声明的地址和端口创建的新 `InetSocketAddress` 实例。我们说过会回到这些内容！


    ```

    server.send(message, new InetSocketAddress(address, port));

    ```


    此时，客户端将收到服务器发送的消息。对于本技巧解决方案中演示的客户端，它随后会断开连接。在现实场景中，很可能由另一个类来启动服务器。其 `run()` 方法将包含一个循环，该循环会持续执行，直到所有消息都已广播或循环被指示停止。客户端可能不会断开连接，直到用户发起关闭操作。


    注意


    如果你的笔记本电脑或服务器使用不同于标准 IPv4 的网络协议，则结果可能会有所不同。在将代码发送到生产环境之前，请务必进行充分的测试。


    16.4 生成和读取 URL


    问题

    你希望在应用程序中以编程方式生成 URL。创建 URL 后，你希望从中读取数据以供应用程序使用。


    解决方案


    使用 `java.net.URL` 类来创建 URL。根据你要处理的地址，有几种不同的生成 URL 的方法。本解决方案演示了其中一些创建 URL 对象的选项，并附有注释说明差异。创建
    URL 对象后，其中一个 URL 会被读入 `BufferedReader` 并打印到命令行。


    ```

    import java.io.BufferedReader;

    import java.io.IOException;

    import java.io.InputStreamReader;

    import java.net.MalformedURLException;

    import java.net.URL;

    public class GenerateAndReadUrl {

    public static void main(String[] args) {

    try {

    // 生成绝对 URL

    URL url1 = new URL("https://openjdk.java.net");

    System.out.println(url1.toString());

    // 为具有共同基础的页面生成 URL

    URL url2 = new URL(url1, " projects/jdk/17");

    // 从不同的数据片段生成 URL

    URL url3 = new URL("http", "openjdk.java.net", "projects/jdk/17");

    readFromUrl(url1);

    } catch (MalformedURLException ex) {

    ex.printStackTrace();

    }

    }

    /**

    * 将 URL 流作为输入流打开，并将内容打印到命令行。

    *

    * @param url

    */

    public static void readFromUrl(URL url) {

    try {

    BufferedReader in = new BufferedReader(

    new InputStreamReader(

    url.openStream()));

    String inputLine;

    while ((inputLine = in.readLine()) != null) {

    System.out.println(inputLine);

    }

    in.close();

    } catch (IOException ex) {

    ex.printStackTrace();

    }

    }

    }

    ```


    运行此程序会将标识为 `url1` 的 URL 资源中的 HTML 打印到命令行，如图 16-1 所示的控制台输出。


    ![](img/323910_4_En_16_Fig1_HTML.jpg)


    图 16-1

    技巧 16-4 的输出


    工作原理

    得益于 `java.net.URL` 类，在 Java 代码中创建 URL 相当简单，该类完成了所有繁重的工作。URL 是一个指向互联网资源的字符串。有时，在
    Java 代码中创建 URL 以读取 URL 指向的互联网资源的内容，或将内容推送到该资源是很有用的。在本技巧的解决方案中，创建了几个不同的 URL 对象，演示了可用的不同构造函数。


    创建 URL 最简单的方法是将互联网上资源的标准可读 URL 字符串传递给 `java.net.URL` 类，以创建一个新的 URL 实例。在解决方案中，将一个绝对
    URL 传递给构造函数以创建 `url1` 对象。


    ```

    URL url1 = new URL("https://openjdk.java.net ");

    ```


    另一种创建 URL 的有用方法是向 URL 构造函数传递两个参数来创建相对 URL。基于另一个 URL 的位置来创建相对 URL 非常有用。例如，如果某个特定站点有多个不同的页面，你可以创建一个指向相对于主站点
    URL 的某个子页面的 URL。本技巧解决方案中的 `url2` 对象就是这种情况。


    ```

    URL url2 = new URL(url1, "projects/jdk/17");

    ```

