    \ `%CATALINA_HOME%\\webapps\\test.war`, and click Finish.\n\nIn a browser, type\
    \ `http://localhost:8080/test` to see the output of the project. This works because\
    \ Tomcat automatically expands all WAR files it discovers in its `webapps` folder,\
    \ without any need to restart it. And because by default, Tomcat looks for `index.html`,\
    \ `index.htm`, and `index.jsp`. If you want, you can change the default by adding\
    \ the following element to the body of the `web-app` element of `web.xml`.\n\n\
    ```\nwhatever.jsp\n```\n\n## How It Works\n\nThe development of web applications\
    \ requires the orchestration of several different files. While it is possible\
    \ to develop a Java EE web application without using an IDE, using a development\
    \ environment makes it almost a trivial task. In this recipe, the Eclipse EE IDE\
    \ configures web applications.\n\n## 13.6 Creating a Servlet\n\n### Problem\n\n\
    You want to create a controller for a web application project.\n\n### Solution\n\
    \nCreate a Java servlet at File ➤ New ➤ Servlet. Define `FirstServlet` in the\
    \ `org.java17recipes.chapter13` package (conventionally, class and servlet names\
    \ are capitalized). It is important to check the `init` and `destroy` methods\
    \ in a servlet.\n\nThe following shows the Java code of the newly created servlet.\n\
    \n```java\npackage org.java17recipes.chapter13;\nimport java.io.IOException;\n\
    import jakarta.servlet.ServletConfig;\nimport jakarta.servlet.ServletException;\n\
    import jakarta.servlet.annotation.WebServlet;\nimport jakarta.servlet.http.HttpServlet;\n\
    import jakarta.servlet.http.HttpServletRequest;\nimport jakarta.servlet.http.HttpServletResponse;\n\
    /**\n* Servlet implementation class FirstServlet\n*/\npublic class FirstServlet\
    \ extends HttpServlet {\nprivate static final long serialVersionUID = 1L;\n/**\n\
    * Default constructor.\n*/\npublic FirstServlet() {\n// TODO Auto-generated constructor\
    \ stub\n}\n/**\n* @see Servlet#init(ServletConfig)\n*/\npublic void init(ServletConfig\
    \ config) throws ServletException {\n// TODO Auto-generated method stub\n}\n/**\n\
    * @see Servlet#destroy()\n*/\npublic void destroy() {\n// TODO Auto-generated\
    \ method stub\n}\n/**\n* @see HttpServlet#doGet(HttpServletRequest request, HttpServletResponse\
    \ response)\n*/\nprotected void doGet(HttpServletRequest request, HttpServletResponse\
    \ response) throws ServletException, IOException {\n// TODO Auto-generated method\
    \ stub\nresponse.getWriter().append(\"Served at: \").append(request.getContextPath());\n\
    }\n/**\n* @see HttpServlet#doPost(HttpServletRequest request, HttpServletResponse\
    \ response)\n*/\nprotected void doPost(HttpServletRequest request, HttpServletResponse\
    \ response) throws ServletException, IOException {\n// TODO Auto-generated method\
    \ stub\ndoGet(request, response);\n}\n}\n```\n\nThe output is shown in Figure\
    \ [13-15](#323910_4_En_13_Chapter.xhtml#Fig15), where you can see the bold line.\n\
    \n![](images/323910_4_En_13_Chapter/323910_4_En_13_Fig15_HTML.jpg)\n\nFigure 13-15\
    \  \nThe first servlet browser output\n\n> **Note**  \n> If you have worked with\
    \ the `javax.*` package, it has been renamed to `jakarta.*` package. If you’re\
    \ targeting the Servlet API version 5.0 or newer (part of Jakarta EE 9 used in\
    \ Tomcat 10), you need to replace the package to get it to compile. Otherwise,\
    \ you might risk facing the “superclass `javax.servlet.http.HttpServlet` was not\
    \ found on the Java Build Path” error.\n\n### How It Works\n\nServlets are Java\
    \ classes, which run in a *servlet container* (e.g., Tomcat, TomEE 9, WildFly,\
    \ GlassFish) and are exposed as standard web resources. These classes process\
    \ data from the HTML form and handle requests and responses for one or more clients.\
    \ The latest version is Jakarta Servlet 5.0, released in 2020. A servlet corresponds\
    \ to the controller in the MVC architecture, and it implements many complex functionalities.\
    \ We can use a single servlet to handle different behaviors or many servlets for\
    \ each behavior.\n\nBriefly, a client sends a request to a servlet (in a web application\
    \ server). The servlet is instantiated (only the first time), starts a thread\
    \ to handle the communication, and builds the response forwarded to the client.\
    \ If the servlet has already loaded, it creates an additional thread associated\
    \ to the new client. The servlet usually has no algorithmic code inside, but it\
    \ is delegated to other classes. Request and response are managed by the `jakarta.Servlet.http.HttpServletRequest`\
    \ (obtains information from the client environment) and `jakarta.Servlet.http.HttpServletResponse`\
    \ (sends a response to the client) interfaces. Another component (`jakarta.Servlet.ServletContext`)\
    \ finds the reference to the context of an application.\n\nServlets have a life\
    \ cycle characterized by the following elements and methods.\n\n*   Initialization\
    \ of the servlet (`init()` method) called, only the first time, from the servlet\
    \ engine\n*   Response to POST requests (`doPost(HttpServletRequest request req,\
    \ HttpServletResponse response res)` method)\n*   Response to GET requests (`doGet(HttpServletRequest\
    \ request req, HttpServletResponse response res)` method)\n*   Destruction of\
    \ the servlet context (`destroy()` method)\n\nLet’s create a single servlet with\
    \ different behaviors according to the parameters from data entry forms. The actions\
    \ are consequences of method calls (`doGet` method or `doPost` method)."
