    is currently being performed. Each `CompletableFuture` object runs on a designated
    or application-determined background thread, issuing a callback to the original
    calling method once completed.


    In the following solution, two long-running tasks are invoked by a calling method,
    and they each utilize the `CompletableFuture` to report status once the task has
    been completed.


    ```

    public class Recipe10_11 {

    public static void main(String[] args) {

    try {

    CompletableFuture tasks = performWork()

    .thenApply(work -> {

    String newTask = work + " Second task complete!";

    System.out.println(newTask);

    return newTask;

    }).thenApply(finalTask -> finalTask + " Final Task Complete!");

    CompletableFuture future = performSecondWork("Java 9 is Great! ");

    while(!tasks.isDone()){

    System.out.println(future.get());

    }

    System.out.println(tasks.get());

    } catch (ExecutionException | InterruptedException ex) {

    }

    }

    /**

    * Returns a CompleableFuture object.

    * @return

    */

    public static CompletableFuture performWork() {

    CompletableFuture resultingWork = CompletableFuture.supplyAsync(

    () -> {

    String taskMessage = "First task complete!";

    try {

    Thread.sleep(1000);

    } catch (InterruptedException ex) {

    System.out.println(ex);

    }

    System.out.println(taskMessage);

    return taskMessage;

    });

    return resultingWork;

    }

    /**

    * Accepts a String and returns a CompletableFuture.

    * @param message

    * @return

    */

    public static CompletableFuture performSecondWork(String message) {

    CompletableFuture resultingWork = CompletableFuture.supplyAsync(

    () -> {

    String taskMessage = message + " Another task complete!";

    try {

    Thread.sleep(1000);

    } catch (InterruptedException ex) {

    System.out.println(ex);

    }

    return taskMessage;

    });

    return resultingWork;

    }

    }

    ```


    The following are the results.


    ```

    First task complete!

    First task complete! Second task complete!

    Java 9 is Great! Another task complete!

    First task complete! Second task complete! Final Task Complete!

    ```


    ### How It Works


    `CompletableFuture<T>` was added in Java 8 to support asynchronous tasks. `CompletableFuture<T`>
    is an extension of `Future<T>`, which adds many methods to promote asynchronous,
    event-driven programming models, and also allows for values to be set at any time.
    The latter functionality means that a `CompletableFuture` object can be created
    before it is required if an application needs to use it in the future.


    There are a couple of options for creating a `CompletableFuture` object, either
    manually or via factory methods. Manual creation can be done without binding to
    any thread. Such a tactic is useful when an application requires a placeholder
    for an event that occurs in the future. The following code demonstrates how to
    create a `CompletableFuture` object manually.


    ```

    final  completableFuture = new CompletableFuture();

    ```


    One would utilize a factory to generate a `CompletableFuture` to return an object
    geared toward a specific task or outcome. There are several different factory
    methods to call on to return such an object. Some of the factory methods accept
    arguments, and others do not. For instance, the `CompletableFuture.runAsync(Runnable)`
    method returns a `CompletableFuture` that first executes the provided `Runnable`
    and then asynchronously completes it by a task running in the `ForkJoinPool.commonPool()`.
    Another variation of the `runAsync()` method accepts both `Runnable` and `Executor`,
    which first executes the provided `Runnable`, then asynchronously completes by
    a task within the given `Executor`.


    The `CompletableFuture` object also contains several methods similar to that of
    the standard `Future<T>` object. For instance, the `isDone()`, `cancel()`, and
    `isCompletedExceptionally()` methods each return `boolean` to indicate a status
    on the object. It is also possible to stack asynchronous tasks with a `CompletableFuture`
    object by calling on the `thenApply()` method, which accepts lambda expressions
    and method references. The solution to this recipe demonstrates how to utilize
    the `thenApply`() method to invoke an asynchronous task from another. First, a
    `CompletableFuture` object named `performWork()` is executed, then a lambda expression
    is executed, creating a concatenated string based on the string generated within
    `performWork()`. Once the second task has been completed, another task is invoked
    to append more text to the string. The `future.get()` method is then called within
    a loop to see the string being transformed by the application over time. Lastly,
    the outcome of the fully completed task is printed.


    ## 10.12 Summary


    It is important to understand the fundamentals of concurrency when developing
    applications. There is nothing worse than testing an application successfully
    and then having it fail with a deadlock once it is released into production. This
    chapter started with the basics, demonstrating how to spawn a background task.


