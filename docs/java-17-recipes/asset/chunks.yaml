    ### 工作原理


    所有可从命令行或终端执行的 Java 类都包含一个 `main()` 方法。查看 `main()` 方法的签名，你会发现它接受一个 `String[]` 参数。换句话说，你可以将
    `String` 对象数组传递给 `main()` 方法。命令行解释器（如 Windows 命令提示符以及各种 Linux 和 Unix shell）会根据你的命令行参数构建一个字符串数组，并将该数组代你传递给
    `main()` 方法。


    示例中的 `main()` 方法会显示每个传递的参数。首先，它会检查名为 `args` 的数组长度是否大于零。如果大于零，该方法会遍历数组中的每个参数，执行一个
    `for` 循环，并依次显示每个参数。如果没有传递任何参数，`args` 数组的长度为零，则会打印一条提示信息；否则，你会看到一条不同的消息，后跟参数列表。


    命令行解释器将空格以及有时其他字符视为分隔符。通常，传递由空格分隔的数值参数是安全的，无需将每个值用引号括起来。但是，如最终解决方案示例所示，你应该养成将字符串参数用双引号括起来的习惯。这样做可以消除参数起始和结束位置上的任何歧义。


    注意


    Java 将所有参数视为字符串。如果你传递数值作为参数，它们会以人类可读的字符串形式进入 Java。你可以使用配方 1-9 中所示的转换方法将它们转换为适当的数值类型。


    ## 1.11 从键盘接受输入


    ### 问题


    你希望编写一个从键盘接受用户输入的命令行或终端应用程序。


    ### 解决方案


    使用 `java.io.BufferedReader` 和 `java.io.InputStreamReader` 类来读取键盘输入并将其存储到局部变量中。清单
    1-9 展示了一个程序，它会持续提示输入，直到你输入一些代表有效 `long` 类型值的字符为止。


    ```

    package org.java17recipes.chapter01.recipe01_11;

    import java.io.*;

    public class AcceptingInput {

    public static void main(String[] args){

    BufferedReader readIn = new BufferedReader(

    new InputStreamReader(System.in)

    );

    String numberAsString = "";

    long numberAsLong = 0;

    boolean numberIsValid = false;

    do {

    /* 向用户请求一个数字。 */

    System.out.println("请输入一个数字: ");

    try {

    numberAsString = readIn.readLine();

    System.out.println("你输入了 " + numberAsString);

    } catch (IOException ex){

    System.out.println(ex);

    }

    /* 将数字转换为二进制形式。 */

    try {

    numberAsLong = Long.parseLong(numberAsString);

    numberIsValid = true;

    } catch (NumberFormatException nfe) {

    System.out.println ("不是数字！");

    }

    } while (numberIsValid == false);

    }

    }

    清单 1-9

    键盘输入与异常处理

    ```


    以下是该程序的一次运行示例。


    ```

    请输入一个数字:

    No

    你输入了 No

    不是数字！

    请输入一个数字:

    Yes

    你输入了 Yes

    不是数字！

    请输入一个数字:


    你输入了 75

    ```


    前两次输入不代表 `long` 数据类型中的有效值。第三个值是有效的，运行结束。


    ### 工作原理


    很多时候，我们的应用程序需要接受某种用户输入。诚然，如今大多数应用程序并非在命令行或终端中使用，但能够创建一个从命令行或终端读取输入的应用程序，有助于打下良好的基础，并且可能在某些应用程序或脚本中很有用。终端输入在开发你或系统管理员可能使用的管理应用程序时也很有用。


    本配方的解决方案中使用了两个辅助类。它们是 `java.io.BufferedReader` 和 `java.io.InputStreamReader`。代码中使用这些类的早期部分尤其重要。


    ```

    BufferedReader readIn = new BufferedReader(

    new InputStreamReader(System.in)

    );

    ```


    此语句中最内层的对象是 `System.in`。它代表键盘。你无需声明 `System.in`。Java 的运行时环境会为你创建该对象。它可以直接使用。


    `System.in` 提供对来自输入设备（在我们的示例中是键盘）的原始字节数据的访问。`InputStreamReader` 类的工作是获取这些字节并将其转换为当前字符集中的字符。`System.in`
    被传递给 `InputStreamReader()` 构造函数以创建一个 `InputStreamReader` 对象。


    `InputStreamReader` 了解字符，但不了解行。`BufferedReader` 类的工作是检测输入流中的换行符，并使你能够方便地一次读取一行。`BufferedReader`
    还通过允许以与应用程序消耗数据时不同大小的块对输入设备进行物理读取来提高效率。当输入流是一个大文件而不是键盘时，这方面会产生影响。


    以下展示了清单 1-9 中的程序如何使用 `BufferedReader` 类的一个实例（名为 `readIn`）从键盘读取一行输入。


    ```

    numberAsString = readIn.readLine();

    ```


    执行此语句会触发以下序列。


    1.  `System.in` 返回一个字节序列。


    2.  `InputStreamReader` 将这些字节转换为字符。


    3.  `BufferedReader` 将字符流分解为输入行。


    4.  `readLine()` 向应用程序返回一行输入。


    I/O 调用必须包装在 `try-catch` 块中。这些块会捕获可能发生的任何异常。如果转换不成功，示例中的 `try` 部分会失败。失败会阻止 `numberIsValid`
    标志被设置为 `true`，这会导致 `do` 循环进行另一次迭代，以便用户可以再次尝试输入有效值。要了解有关捕获异常的更多信息，请参阅第 9 章。


    清单 1-9 顶部的以下语句值得注意。


    ```

    import java.io.*;

    ```


    此语句使 `java.io` 包中定义的类和方法可用。其中包括 `InputStreamReader` 和 `BufferedReader`。还包括第一个
    `try-catch` 块中使用的 `IOException` 类。`NumberFormatException`（在第二个 `try-catch` 块中使用）属于
    `java.lang` 包。


    ## 1.12 为代码编写文档


    ### 问题


    你希望为一些 Java 类编写文档，以方便未来的维护工作。

