    \ circumstances within a program. They are an indicator that something unexpected\
    \ (exceptional) has occurred. For that reason, exceptions are efficient at interrupting\
    \ the current flow of the program and signaling that there is something that requires\
    \ attention. As such, programs that utilize exceptions judiciously benefit from\
    \ a better control flow and become more robust and informative for the user. Even\
    \ so, using exceptions indiscriminately can cause performance degradation.\n\n\
    Within Java, exceptions can be *thrown* or *caught*. Throwing an exception involves\
    \ indicating to the code that an exception has been encountered, using the `throw`\
    \ keyword to signal the JVM to find any code capable of handling this exceptional\
    \ circumstance within the current stack. Catching an exception involves telling\
    \ the compiler which exceptions can be handled and which part of the code should\
    \ be monitored for these exceptions to occur. This is denoted within the `try`/`catch`\
    \ Java block (described in Recipe 9-1).\n\nAll exceptions inherit from the `Throwable`\
    \ class and can be defined in the catch clause of a `try`/`catch` statement. The\
    \ JVM primarily uses the `Error` classes to denote serious and/or fatal errors.\
    \ According to the Java documentation, applications are not expected to catch\
    \ `Error` exceptions since they are considered fatal (think of a computer being\
    \ on fire). The bulk of exceptions within a Java program are inherited from the\
    \ `Exception` class.\n\nWithin the JVM, there are two types of exceptions: checked\
    \ and unchecked. Methods enforce checked exceptions. You can specify the exceptions\
    \ a method can throw in the method signature. This requires any caller of the\
    \ method to create a `try`/`catch` block, which handles the exceptions declared\
    \ within the method signature. Unchecked exceptions do not require a stringent\
    \ convention and are free to be thrown anywhere without implementing a `try`/`catch`\
    \ block. Even so, unchecked exceptions (as described in Recipe 9-7) are usually\
    \ discouraged because they can lead to threads unraveling (if nothing catches\
    \ the exception) and poor visibility of problems. Exception classes that inherit\
    \ from `RuntimeException` are considered unchecked exceptions, whereas exception\
    \ classes that inherit directly from `Exception` are considered checked exceptions.\n\
    \nBe aware that the act of throwing exceptions is expensive (compared with other\
    \ language construct alternatives), and as such, throwing exceptions makes a poor\
    \ substitute for control flow. For example, you shouldn’t throw an exception to\
    \ indicate an expected result of a method call (e.g., a method like `isUsernameValid(String\
    \ username)`). It is better to call the method and return a Boolean with the result\
    \ than throwing `InvalidUsernameException` to indicate failure.\n\nWhile exceptions\
    \ play an essential role in solid software development, logging exceptions can\
    \ be just as important. Logging within an application helps the developer understand\
    \ what events occur without debugging the code. This is especially true in production\
    \ environments where there isn’t the opportunity for live debugging. In that sense,\
    \ logging collects clues on what is occurring (most likely what went wrong) and\
    \ helps you troubleshoot production problems. Many developers utilize a structured\
    \ logging framework to provide more robust logging for an application. A solid\
    \ logging framework with a solid methodology saves many late nights at work wondering,\
    \ “what happened?”\n\nLogging for Java is very mature. Many open source projects\
    \ are widely accepted as the de facto standard for logging. In the recipes in\
    \ this chapter, you use Java’s Logback framework and the Simple Logging Facade\
    \ for Java (SLF4J). Both of these projects together create a good-enough solution\
    \ for most logging needs. For the recipes involving SLF4J and Log4j, download\
    \ SLF4J ([`www.slf4j.org`](http://www.slf4j.org)) and put it in your project’s\
    \ dependency path. This chapter also touches upon the lower-level JVM logging\
    \ added in Java 9.\n\n## 9.1 Catching Exceptions\n\n### Problem\n\nYou want to\
    \ gracefully handle any exceptions generated from your code.\n\n### Solution\n\
    \nUse the built-in `try`/`catch` language construct to `catch` exceptions. Do\
    \ so by wrapping any blocks of code that may throw an exception within a `try`/`catch`\
    \ block. The following example generates a Boolean value to indicate whether a\
    \ specified string is greater than five characters long. If the string passed\
    \ as an argument is `null`, a `NullPointerException` (`RuntimeException` type)\
    \ is thrown by the `length()` method and caught within the `catch` block.\n\n\
    ```\npublic class Recipe9_1 {\n    public static void main(String[] args) {\n\
    \        Recipe9_1 recipe = new Recipe9_1();\n        recipe.start();\n    }\n\
    \n    private void start() {\n        System.out.println(\"Is th string 1234 longer\
    \ than 5 chars?:\" +\n                isStringShorterThanFiveCharacters(\"1234\"\
    ));\n        System.out.println(\"Is th string 12345 longer than 5 chars?:\" +\n\
    \                isStringShorterThanFiveCharacters(\"12345\"));\n        System.out.println(\"\
    Is th string 123456 longer than 5 chars?:\" +\n                isStringShorterThanFiveCharacters(\"\
    123456\"));\n        System.out.println(\"Is th string null longer than 5 chars?:\"\
    \ +\n                isStringShorterThanFiveCharacters(null));\n    }\n\n    private\
    \ boolean isStringShorterThanFiveCharacters(String aString) {\n        try {\n\
    \            return aString.length() > 5;\n        } catch (NullPointerException\
    \ e) {\n            System.err.println(\"An Exception Occurred: \" + e);\n   \
    \         return false;\n        }\n    }\n}\n```\n\n### How It Works\n\nThe `try`\
    \ keyword specifies that the enclosed code segment can raise an exception. The\
    \ `catch` clause is placed at the end of the `try` clause. Each `catch` clause\
    \ specifies which exception is being caught. The compiler generates an error if\
    \ a catch clause is not provided for a checked exception. Two possible solutions\
    \ are to add a `catch` clause or to include the exception in the `throws` clause\
    \ of the enclosing method. Any checked exceptions that are thrown but not caught\
    \ propagate up the call stack. If this method doesn’t catch the exception, the\
    \ thread that executed the code terminates. If the thread terminating is the only\
    \ thread in the program, it terminates its execution.\n\nIf a `try` clause needs\
    \ to catch more than one exception, more than one exception can be specified,\
    \ separated by a bar character. For instance, the following `try`/`catch` block\
    \ could be used for catching both `NumberFormatException` (a `RuntimeException`\
    \ type) and `NullPointerException`.\n\n```\ntry {\n    // code here\n} catch (NumberFormatException|NullPointerException\
    \ ex) {\n    // logging\n}\n```\n\nNote\n\nBe careful when throwing an exception.\
    \ If the thrown exception is not caught, it propagates up the call stack; and\
    \ if there isn’t any `catch` clause capable of handling the exception, it causes\
    \ the running thread to terminate (also known as *unraveling*). If your program\
    \ has only one main thread, an uncaught exception terminates your program.\n\n\
