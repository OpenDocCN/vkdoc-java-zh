- fmt: '### How It Works


    Consider that your lambda expression will invoke a single method by name, perhaps
    returning a result. If a lambda expression fits this scenario, it is a prime candidate
    for use with a method reference. A method reference is a simplified form of a
    lambda expression, which specifies the class name or instance name, followed by
    the method to be called in the following format.


    ```

    ::

    ```


    The double colon (`::`) operator specifies a method reference. Since a method
    reference is a simplified lambda method, it must implement a functional interface.
    The abstract method within the interface must have the same argument list and
    return type as the method being referenced. Any arguments are subsequently derived
    from the context of the method reference. For instance, consider the same scenario
    as the solution, whereby you wanted to sort an array of `Player` objects by calling
    on the `Player.compareByGoal()` method to perform goal comparisons. The following
    code could enable this functionality via a lambda expression.


    ```

    Arrays.sort(teamArray, (p1, p2) -> Player.compareByGoal(p1,p2));

    ```


    In this code, the array is passed as the first argument to `Arrays.sort()`. The
    second argument is a lambda expression that passes two `Player` objects to the
    `Player.compareByGoal()` method. The lambda expression uses the functional interface
    `Comparator<Player>.compare`, which utilizes the `(Player, Player)` parameter
    list. The `compareByGoal()` method contains that same parameter list. Likewise,
    the return type of `compareByGoal()` matches the return type within the functional
    interface. Therefore, the parameter list does not need to be specified in the
    listing. It can be inferred from the context of the `Player::compareByGoal` method
    reference instead.


    There are four different types of method references. Table [6-1](#323910_4_En_6_Chapter.xhtml#Tab1)
    lists each of them.


    **Table 6-1** Method Reference Types


    | Type | Description |

    | --- | --- |

    | Static Reference | Uses a static method of an object |

    | Instance Reference | Uses an instance method of an object |

    | Arbitrary Object Method | Used on an arbitrary object of a particular type,
    rather than a particular object |

    | Constructor Reference | Generates a new object by invoking a constructor with
    the `new` keyword |


    In the solution, the static method reference type is demonstrated since `compareByGoal()`
    is a static method within the `Player` class. It is possible to invoke a method
    of an object instance using an instance reference. Consider the following class,
    which contains a nonstatic method for comparing goals within `Player` objects.


    ```

    public class PlayerUtility {

    public int compareByGoal(Player a, Player b){

    int eval;

    if(a.getGoals() > b.getGoals()){

    eval = 1;

    } else if (a.getGoals() < b.getGoals()){

    eval = -1;

    } else {

    eval = 0;

    }

    return eval;

    }

    }

    ```


    This class can be instantiated, and the new instance references the `compareByGoals()`
    method, similar to the technique used in the solution to this recipe.


    ```

    Player[] teamArray2 = team.toArray(new Player[team.size()]);

    PlayerUtility utility = new PlayerUtility();

    Arrays.sort(teamArray2, utility::compareByGoal);

    ```


    Suppose that your application contained a list of an arbitrary type, and you want
    to apply a method to each of the objects in that list. Method references can be
    used in this scenario, given the object contains methods that are candidates for
    use via reference. In the following example, the `Arrays.sort()` method is applied
    to a list of int values. A method reference applies the `Integer compare()` method
    to the elements within the list. Thus, the resulting list is sorted, and the method
    reference automatically passes the int arguments and returns the int comparison.


    ```

    Integer[] ints = {3,5,7,8,51,33,1};

    Arrays.sort(ints, Integer::compare);

    ```


    The last type of method reference can be utilized for referencing the constructor
    of an object. This type of method reference can be especially useful when creating
    new objects via a factory. Let’s take a look at an example. Suppose that the `Player`
    object contained the following constructor.


    ```

    public Player(String position, int status, String first, String last){

    this.position = position;

    this.status = status;

    this.firstName = first;

    this.lastName = last;

    }

    ```


    You want to generate `Player` objects on the fly using a factory pattern. The
