    ## Solution


    Utilize one of the `compareTo()` methods that are part of the Date-Time API classes.
    In the following solution, two `LocalDate` objects are compared and an appropriate
    message is displayed.


    ```

    public static void compareDates(LocalDate ldt1,

    LocalDate ldt2) {

    int comparison = ldt1.compareTo(ldt2);

    if (comparison > 0) {

    System.out.println(ldt1 + " is larger than " + ldt2);

    } else if (comparison < 0) {

    System.out.println(ldt1 + " is smaller than " + ldt2);

    } else {

    System.out.println(ldt1 + " is equal to " + ldt2);

    }

    }

    ```


    Similarly, there are convenience methods for use when performing date comparison.
    Specifically, the `isAfter()`, `isBefore()`, and `isEqual()` methods can compare
    in the same manner as `compareTo()`, as seen in the following example.


    ```

