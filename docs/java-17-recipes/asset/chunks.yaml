    ## 2.11 Avoiding Redundancy in Interface Code


    ### Problem


    You want to implement two or more default methods within an interface with very
    similar code. Rather than copying code into each of the different default methods
    and maintaining each default method separately, you’d like to encapsulate the
    similar code into its own method for reuse.


    ### Solution


    Use a private method in an interface to alleviate this issue. Java 9 provides
    the ability to include private methods within an interface. A private method is
    only available within that interface, and it cannot be used by any class that
    implements the interface. However, each default method implementation that is
    part of the interface can use the private method.


