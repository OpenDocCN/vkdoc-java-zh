  trans: '

    # 12. 使用数据库


    几乎所有重要的应用程序都包含某种数据库。有些应用程序使用内存数据库，而另一些则使用传统的关系型数据库管理系统（RDBMS）。无论哪种情况，每个 Java 开发人员都必须具备一些使用数据库的技能。多年来，Java
    数据库连接（JDBC）API 已经发生了很大的变化，并且在过去的几个版本中，出现了一些重大的进步。


    本章介绍使用 JDBC 进行数据库操作的基础知识。你将学习如何执行所有标准数据库操作以及一些用于操作数据的高级技术。


    ## 12.1 安装 MySQL


    ### 问题


    你想在个人电脑上安装一个数据库。


    ### 解决方案


    安装 MySQL。选择手动安装，因为它提供了一些好处和更多的控制权。你可以在几秒钟内备份或移动数据库，并且可以在任何地方（包括 U 盘）安装和重新安装 MySQL。


    要安装 MySQL，请执行以下步骤。


    1.  访问 [`https://dev.mysql.com/downloads/mysql/`](https://dev.mysql.com/downloads/mysql/)（MySQL
    社区服务器网页）并同意隐私政策。


    2.  确保所选平台是你的操作系统（我们使用的是 Windows 操作系统），然后点击下载按钮。对于 Windows，在“其他下载”部分下选择不带安装程序的版本——Windows
    (x86, 64-bit), ZIP Archive。


    3.  以用户身份登录，或注册，或者，如果你愿意，可以跳过此步骤。


    4.  下载不带安装程序的版本。（我们下载时的最新版本是 `mysql-8.0.27-winx64.zip`；大小为 209 MB。）此软件包包含 MySQL
    数据库服务器。


    5.  将 zip 文件解压到你的根文件夹驱动器。将文件夹名称从 `mysql-8.0.27-winx64` 重命名为 `mysql`。


    6.  创建“data”文件夹。我选择在同一个 `mysql` 文件夹中，尽管我们建议始终将数据文件夹放在另一个驱动器上。这可以防止数据丢失，并允许轻松重新安装。


    7.  在 MySQL 可以启动之前，手动初始化数据目录。打开一个命令窗口，并在 bin 文件夹下输入以下内容。


    ```

    C:\mysql\bin>mysqld --console --initialize

    ```


    `--console` 选项允许将诊断输出写入控制台（如果你省略此选项，服务器会将输出写入数据文件夹中的错误日志）。


    清单 12-1 是控制台上显示的结果。


    ```

    2021-10-31T19:30:01.391296Z 0 [System] [MY-013169] [Server] C:\mysql\bin\mysqld.exe
    (mysqld 8.0.27) initializing of server in progress as process 3816

    2021-10-31T19:30:01.599643Z 1 [System] [MY-013576] [InnoDB] InnoDB initialization
    has started.

    2021-10-31T19:30:19.281112Z 1 [System] [MY-013577] [InnoDB] InnoDB initialization
    has ended.

    2021-10-31T19:30:49.726138Z 6 [Note] [MY-010454] [Server] A temporary password
    is generated for root@localhost: )r%Crfs1reOS

    清单 12-1

    数据库初始化日志

    ```


    以粗体突出显示的字符串是为 root 用户（MySQL 授权系统中的默认管理帐户）生成的密码，该密码在初始化期间显示在流中。现在，你可以开始使用你的数据库了。


    打开两个控制台窗口。在第一个窗口中，使用以下命令启动数据库。


    ```

    C:\mysql\bin>mysqld.exe --console

    ```


    清单 12-2 显示了服务器的启动过程。`--console` 命令让你可以看到正在打印的启动日志。


    ```

    C:\mysql\bin>mysqld.exe --console

    2021-10-31T19:39:25.558678Z 0 [System] [MY-010116] [Server] C:\mysql\bin\mysqld.exe
    (mysqld 8.0.27) starting as process 5500

    2021-10-31T19:39:25.597447Z 1 [System] [MY-013576] [InnoDB] InnoDB initialization
    has started.

    2021-10-31T19:39:29.188084Z 1 [System] [MY-013577] [InnoDB] InnoDB initialization
    has ended.

    2021-10-31T19:39:31.625112Z 0 [Warning] [MY-010068] [Server] CA certificate ca.pem
    is self signed.

    2021-10-31T19:39:31.842513Z 0 [System] [MY-011323] [Server] X Plugin ready for
    connections. Bind-address: ''::'' port: 33060

    2021-10-31T19:39:31.842945Z 0 [System] [MY-010931] [Server] C:\mysql\bin\mysqld.exe:
    ready for connections. Version: ''8.0.27''  socket: ''''  port: 3306  MySQL Community
    Server - GPL.

    清单 12-2

    数据库启动日志

    ```


    在第二个控制台窗口中，使用用户名和密码连接到数据库，并使用以下命令启动 MySQL 控制台。


    ```

    C:\mysql\bin>mysql -u root -p

    ```


    在提示时输入密码后（Enter password: ************），你会在控制台上看到欢迎消息，如清单 12-3 所示。


    ```

    C:\mysql\bin>mysql -u root -p

    Enter password: ************

    Enter password: ************

    Welcome to the MySQL monitor.  Commands end with ; or \g.

    Your MySQL connection id is 8

    Server version: 8.0.27

    Copyright (c) 2000, 2021, Oracle and/or its affiliates.

    Oracle is a registered trademark of Oracle Corporation and/or its

    affiliates. Other names may be trademarks of their respective

    owners.

    Type ''help;'' or ''\h'' for help. Type ''\c'' to clear the current input statement.
    mysql>

    清单 12-3

    数据库连接日志

    ```


    现在*命令行界面*（CLI）已激活，请注意突出显示的提示命令的变化。


    我们建议使用以下命令更改密码。


    ```

    mysql> ALTER USER ''root''@''localhost'' IDENTIFIED BY ''root'';

    ```


    以粗体突出显示的字符串是新密码。


    然后，运行以下命令。


    ```

    mysql> FLUSH PRIVILEGES;

    ```


    它告诉服务器重新加载授权表，从而使你的新更改生效。


    最后，如果你想停止数据库，请在提示符中输入 exit 来停止命令行客户端，然后输入以下内容。


    ```

    C:\mysql\bin>mysqladmin.exe -u root -p shutdown

    Enter password: ****

    ```


    `mysqladmin` 命令调用管理实用程序，以 root 用户身份连接到 MySQL 服务器并告诉它关闭。


    清单 12-4 是控制台上显示的消息。


    ```

    2021-10-31T19:46:01.347489Z 8 [System] [MY-013172] [Server] Received SHUTDOWN
