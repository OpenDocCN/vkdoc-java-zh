    # 5. Object-Oriented Java


    Object-oriented programs consist of many different pieces of code that all work
    together in unison. Rather than write a program that contains a long list of statements
    and commands, an object-oriented philosophy is to break functionality into separate
    organized objects. Each of the objects contains functionality that pertains to
    it, and as the objects are pieced together, they can be used to develop sophisticated
    solutions. In this chapter, we touch on some of the key object-oriented features
    of the Java language. From the basic recipes covering access modifiers to the
    advanced recipes that deal with inner classes, this chapter contains recipes that
    help you understand Java’s object-oriented methodologies.


    ## 5.1 Controlling Access to Members of a Class


    ### Problem


    You want to create members of a class that are not accessible from any other class.


    ### Solution


    Create `private` instance members rather than making them available to other classes
    (`public` or `protected`). For instance, suppose you are creating an application
    to manage a team of players for a sport. You create a class named `Player` that
    represents a player on the team. You do not want the fields for that class to
    be accessible from any other class. The following code demonstrates the declaration
    of some instance members, making them accessible only from within the class in
    which they were defined.


    ```

    private String firstName;

    private String lastName;

    private String position;

    private int status = -1;

    ```


    ### How It Works


    To designate a class member as `private`, prefix its declaration or signature
    using the `private` keyword. The `private` access modifier hides members of a
    class so that outside classes cannot access them. Any members of a class marked
    as `private` are available only to other members of the same class. Any outside
    class cannot access fields or methods designated as `private`, and an IDE that
    uses code completion cannot see them.


    As mentioned in the solution to this recipe, three different access modifiers
    can be used when declaring members of a class. Those modifiers are `public`, `protected`,
    and `private`. Members that are declared as `public` are available for any other
    class. Those declared as `protected` are available for any other class within
    the same package and subclasses. It is best to declare `public` or `protected`
    only those class members that need to be directly accessed from another class.
    Hiding members of a class using the `private` access modifier helps to enforce
    better object-orientation. Moreover, a default scope is accessible from the package
    and the class— that occurs when it is not assigned scope to a class element.


    ## 5.2 Making Private Fields Accessible to Other Classes


    ### Problem


    You want to create `private` instance members so that outside classes cannot access
    them directly. However, you would also like to make those `private` members accessible
    in a controlled manner.


    ### Solution


    Encapsulate the `private` fields by making getters and setters to access them.
    The following code demonstrates the declaration of a `private` field, followed
    by accessor (getter) and mutator (setter) methods that obtain or set the value
    of that field from an outside class.


    ```

    private String firstName;

    /**

    * @return the firstName

    */

    public String getFirstName() {

    return firstName;

    }

    /**

    * @param firstName the firstName to set

    */

    public void setFirstName(String firstName) {

    this.firstName = firstName;

    }

    ```


    The `getFirstName()` method can be used by an outside class to obtain the value
    of the `firstName` field. Likewise, an outside class can use the `setFirstName(String
    firstName)` method to set the value of the `firstName` field.


    ### How It Works


    Often when fields are marked as `private` within a class, they still need to be
    made accessible to outside classes to set or retrieve their value. Why not just
    work with the fields directly and make them `public` then? It is not good programming
    practice to work directly with fields of other classes because access can be granted
    in a controlled fashion by using accessors (getters) and mutators (setters). By
    not coding directly against members of another class, you also help decouple the
    code, which helps to ensure that if an object changes, others that depend on it
    are not adversely affected. As you can see from the example in the solution to
    this recipe, hiding fields and working with `public` methods to access those fields
    is fairly easy. Simply create two methods; one to obtain the value of the `private`
    field, the *getter* or accessor method. And the other to set the value of the
    `private` field, the *setter* or mutator method. In the solution to this recipe,
    the getter returns the unaltered value contained within the `private` field. Similarly,
    the setter sets the value of the `private` field by accepting an argument of the
    same data type as the `private` field and then setting the value of the `private`
    field to the value of the argument.


    The class using the getters or setters for access to the fields does not know
    any details behind the methods. For instance, a getter or setter method could
    contain more functionality if required. Furthermore, the details of these methods
    can be changed without altering any code that accesses them.


    Note


    Using getters and setters does not completely decouple code. In fact, many people
    argue that using getters and setters is not a good programming practice. Objects
    that use the accessor methods still need to know the type of instance field they
    are working against. That said, getters and setters are standard techniques for
    providing external access to `private` instance fields of an object. To make the
    use of accessor methods in a more object-oriented manner, declare them within
    interfaces and code against the interface rather than the object itself.


