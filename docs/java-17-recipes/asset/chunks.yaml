    ### 工作原理


    要控制日志文件的大小，可配置 `java.util.logging` 框架并指定滚动日志文件。选择滚动日志文件选项后，最新信息将保存在 `LogApplication0.log`
    中。较早的信息则依次保存在 `LogApplication1.log`、`LogApplication2.log` 等文件中。当 `LogApplication0.log`
    填满您指定的上限（本例中为 50,000 字节）时，其文件名将轮转为 `LogApplicationLog1.log`，其他文件也会相应向下轮转。要保留的日志文件数量由
    `java.util.logging.FileHandler.count` 属性决定，在本示例中该属性设置为 `4`。用于区分轮转日志的 `FileHandler`
    配置参数是 `"%g"`（一个代际编号）。如果在属性文件中未指定该参数，且计数大于 1（本例中为 4），则代际编号会附加在文件名末尾（点号之后）。


    `logging.properties` 文件首先定义了 `java.util.logging` 框架使用的处理器。处理器是负责处理日志消息的对象。本示例中指定了
    `FileHandler`，它将日志消息写入文件。接下来定义了日志级别。在日志框架中，存在独立的 `logger` 对象这一概念。一个日志记录器可以携带不同的配置（例如不同的日志级别），并在日志文件中被标识。该示例将
    `recipeLogger` 的级别设置为 `info`。相比之下，根 `logger` 的级别为 `ALL`（在 `java.util.logging`
    框架中，根日志记录器通过属性前无前缀来表示）。另一方面，`OFF` 则禁用日志记录。


    `logging.properties` 文件的下一部分定义了 `FileHandler` 的配置。格式化器指示日志信息如何写入磁盘。`simpleFormatter`
    以纯文本形式写入信息，包含一行日期和时间、一行日志级别以及要记录的消息。在格式化器之后，定义了 `FileHandler` 的模式。这指定了日志文件的名称和位置（`%g`
    会被替换为滚动日志编号 [0 ~ 3]）。`Limit` 属性定义了日志在轮转前可以拥有的字节数（50,000 字节 ~ 50kb）。`count` 定义了要保留的日志文件的最大索引（在本示例中为
    4）。


    ## 9.10 记录异常


    在之前的示例中，您学习了如何捕获异常并记录信息。本示例将这两者结合起来。


    ### 问题


    您希望在日志文件中记录异常。


    ### 解决方案


    配置您的应用程序以使用 SLF4J。利用 `try`/`catch` 块在错误日志中记录异常。在以下示例中，一个 SLF4J 日志记录器从异常处理器内部记录消息。


    ```

    public static void main (String [] args) {

    Recipe9_10 recipe = new Recipe9_10();

    recipe.start();

    }

    static Logger rootLogger = Logger.getLogger("");

    private void start() {

    loadLoggingConfiguration();

    Thread.setDefaultUncaughtExceptionHandler((Thread t, Throwable e) -> {

    rootLogger.error("Error in thread "+t+" caused by "+e);

    });

    int c = 20/0;

    }

    private void loadLoggingConfiguration() {

    FileInputStream ins = null;

    try {

    ins = new FileInputStream(new File("logging.properties"));

    LogManager.getLogManager().readConfiguration(ins);

    } catch (IOException e) {

    e.printStackTrace();

    }

    }

    ```


    ### 工作原理


    该示例演示了如何使用 `UncaughtExceptionHandler` 将异常记录到日志文件中。记录异常时，最好包含显示异常抛出位置的堆栈跟踪。在示例中，一个线程包含
    `UncaughtExceptionHandler`，它使用了一个包含日志记录器的 lambda 表达式。该日志记录器将所有捕获到的异常写入日志文件。


    ## 9.11 总结


    本章探讨了应用程序开发中最重要的阶段之一——异常处理。讨论了如何处理单个和多个异常，以及如何记录这些异常。


    # 10. 并发


    *并发*是程序同时执行不同（或相同）指令的能力。一个并发程序可以被拆分并在多个 CPU 上运行。通过编写并发程序，您可以充分利用当今的多核 CPU。即使在
    I/O 密集型的单核 CPU 上，您也能看到其好处。并发是现代计算机编程中最难处理的主题之一；理解并发需要具备抽象思考的能力，而调试并发问题就像试图通过航位推测法驾驶飞机一样困难。即便如此，随着
    Java 的现代版本发布，编写无错误的并发代码已经变得更容易（也更普及）。


    本章介绍了并发任务最常见的需求——从运行后台任务到将计算拆分为工作单元。在本章中，您将找到在 Java 中实现并发的最新方法。


    ## 10.1 启动后台任务


    ### 问题


    您有一个需要在主线程之外运行的任务。


    ### 解决方案


    创建一个包含需要在不同线程中运行的任务的类实现。在任务实现类中实现一个 `Runnable` 函数式接口，并启动一个新线程。在以下示例中，一个计数器模拟活动，同时一个独立的任务在后台运行。


    ```

    public class Recipe10_1 {

    public static void main(String[] args) {

    Recipe10_1 recipe = new Recipe10_1();

    recipe.startProcess();

    }

    private void startProcess() {

    Thread backgroundThread = new Thread(new Runnable() {

    public void run() {

    doSomethingInBackground();

    }

    },"Background Thread");

    System.out.println("Start");

    backgroundThread.start();

    for (int i= 0;i < 10;i++) {

    System.out.println(Thread.currentThread().getName()+": is counting "+i);

    }

    System.out.println("Done");

    }

    private void doSomethingInBackground() {

    System.out.println(Thread.currentThread().getName()+

    ": is Running in the background");

    }

    }

    ```


    如果代码被执行多次，输出结果会因时而异。后台线程独立执行，因此其消息在每次运行时的打印顺序都不同。


    如果您使用 lambda 表达式，创建后台线程的相同代码可以编写如下。


    ```

    Thread backgroundThread = new Thread(this::doSomethingInBackground, "Background
    Thread");

    ```


    以下是输出结果。


    ```

    Start

    main: is counting 0

    main: is counting 1

    main: is counting 2

    main: is counting 3

    main: is counting 4

    main: is counting 5

    main: is counting 6

    main: is counting 7

    main: is counting 8

    main: is counting 9

    Done

    Background Thread: is Running in the background

    ```

