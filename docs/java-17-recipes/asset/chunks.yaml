    ### 工作原理


    在 Java 8 之前，无法在 Java 接口中包含代码实现。接口是 Java 中的一种引用类型，类似于类。然而，其最初的设计意图只允许抽象方法、常量、静态方法和嵌套类型。因此，实现接口的类必须实现每一个抽象方法。在
    Java 8 中，这一限制被解除，可以通过默认方法的形式包含方法实现。默认方法可以在接口中包含实现，或者实现类可以重写其实现以进行完全覆盖或添加扩展。因此，术语*默认方法*的含义是：如果实现类没有提供实现，则默认方法实现存在于接口中。接口中不允许有私有方法。


    在某些情况下，接口内的多个默认方法可能包含相似的代码。现在，这些代码可以封装在接口内的私有方法实现中。私有方法实现不能在接口外部使用。在本节方案的解决方案中，`volumeCalc()`
    方法使用标准公式返回正方形或长方形游泳池的计算体积。接口内的每个默认方法都可以利用 `volumeCalc()` 方法来计算体积。但是，`volumeCalc()`
    方法在接口外部不可用。


    这似乎存在争议，因为接口最初仅用于字段和方法声明。也可以认为，在多个默认方法实现中复制相同的代码是一种不良实践。你可以自行判断，这个特性使得在接口内重用代码更加容易，从而减少了出错的机会，并使维护变得更加简单。


    ## 2.12 轻松检索操作系统进程信息


    ### 问题


    你希望能够查找有关操作系统进程的信息。


    ### 解决方案


    使用更新后的 Process API。新的 `ProcessHandle` 接口让你可以轻松获取操作系统进程的信息。在以下代码中，所有操作系统进程都被列出并打印到终端窗口。


    ```

    public static void listProcesses(){

    ProcessHandle.allProcesses()

    .forEach(System.out::println);

    }

    ```


    然而，这并没有太大帮助，因为它只是列出了每个操作系统的进程号，这并不十分有用。要获取有关进程的更多详细信息，我们需要获取 `ProcessHandle` 并调用其辅助方法，这非常简单。以下代码打印了关于每个进程的更多信息，因为它打印了
    `ProcessHandle.Info` 本身。


    ```

    public static void detailListProcesses(){

    ProcessHandle.allProcesses()

    .forEach(h->System.out.println(formattedProcess(h)));

    }

    public static String formattedProcess(ProcessHandle handle){

    long pid = handle.pid();

    boolean alive = handle.isAlive();

    Optional cpuDuration = handle.info().totalCpuDuration();

    Optional handleName = handle.info().command();

    return pid + " " + alive + " " + handleName + ":"+ cpuDuration;

    }

    ```


