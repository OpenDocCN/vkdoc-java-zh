    ## 2.6 Using Record


    ### Problem


    You want to declare classes with simple management of the main and standard methods.


    ### Solution


    Use Record classes, which efficiently model classes. In the following, there is
    a standard code for an entity class.


    ```

    public class Professor {

    private Integer id;

    private String name;

    private String surname;

    public Professor () {

    }

    public Integer getId() {

    return id;

    }

    public void setId(Integer id) {

    this.id = id;

    }

    public String getName() {

    return name;

    }

    public void setName(String name) {

    this.name = name;

    }

    public String getSurname() {

    return surname;

    }

    public void setSurname(String surname) {

    this.surname = surname;

    }

    }

    ```


    Since Java 14, this lengthy class can be defined as follows.


    ```

    record Professor (Integer id, String name, String surname) {}

    ```


    So, you can simply create a new prof.


    ```

    Professor prof = new Professor (1, "Luciano", "Manelli");

    ```


    And not in a standard old way.


    ```

    Professor prof = new Professor ();

    prof.setId(1);

    prof.setName("Luciano");

    prof.setSurname("Manelli");

    ```


    The following is the main class.


    ```

    public class Main {

    public static void main (String[] args) {

    Professor prof = new Professor ();

    prof.setId(1);

    prof.setName("Luciano");

    prof.setSurname("Manelli");

    System.out.println("Prof "+prof.getId()+":"+prof.getName()+" "+prof.getSurname());

    record ProfessorRecord (Integer id, String name, String surname) {};

    ProfessorRecord profRecord = new ProfessorRecord (1, "Luciano", "Manelli");

    System.out.println("Prof using Record "+profRecord.id()+":"+profRecord.name()+"
    "+profRecord.surname());

    }

    }

    ```


    ### How It Works


    This enhancement was proposed in Java 14 and became a standard feature in Java
    16 (JEP 394). It helps developers by providing a compact syntax for declaring
    classes, avoiding the well-known verbosity of the Java language.


    In some cases, it is useful to preserve the immutability of data creating equals,
    `hashCode`, and `toString` methods. The first method verifies the equality for
    objects when all fields match the same class. The second method returns a unique
    integer value when all fields match. The third method gives a string derived from
    the name of the class and the names and values of each component.


    For more information on the Record class, see the documentation at [https://​openjdk.​java.​net/​jeps/​395](https://openjdk.java.net/jeps/395).


    ## 2.7 Restore Always-Strict Floating-Point Semantics


    ### Problem


    You want to ensure the same precision and result on every platform for floating
    points.


    ### Solution


    Java 17 restores the default always-strict function, making the floating-point
    operations uniformly strict. So, you can ensure platform-independent floating-point
    computations; for example, the following is the old version.


    ```

    strictfp class  AppliedClass{}//strict floating point applied on class

    strictfp interface AppliedInterface{}// strict floating point applied on interface

    ```


    And simply, the new version is as follows.


    ```

    class AppliedClass{}//strictfp applied on class

    interface AppliedInterface{}//strictfp applied on interface

    ```


    The following is an example.


    ```

    public strictfp class SumFPnumbersStrict {

    public double sumNumbers(double fpOne, double fpTwo) {

    return fpOne + fpTwo;

    }

    ```


    It becomes the following.


    ```

    public class sumFPnumbers {

    public double SumNumbers(double fpOne, double fpTwo) {

    return fpOne + fpTwo;

    }

    ```


    The following is an example of the main class.


    ```

    public class Main {

    public static void main (String[] args) {

    SumFPnumbers sn = new SumFPnumbers ();

    System.out.println("SUM :  "+sn.sumNumbers(1.2,3.4));

    SumFPnumbersStrict sns = new SumFPnumbersStrict();

    System.out.println("SUM :  "+sns.sumNumbers(1.2,3.4));

    }

    }

    ```


    ### How It Works


    Since Java 17, floating-point computations were platform-dependent (i.e., depends
    on the hardware). This enhancement helps avoid strictfp behavior and not make
    all floating-point operations uniformly strict. Existing Java code using strictfp
    could be used without the modifier.


    For more information on floating points, see the documentation at [https://​openjdk.​java.​net/​jeps/​306](https://openjdk.java.net/jeps/306).


    ## 2.8 Pseudorandom Number Generators


    ### Problem


    You want to create random numbers.


    ### Solution


    Java 17 improves the functionality by providing new interface types and implementations
    for pseudorandom number generators (PRNGs) and preserving previous behavior of
    the `java.util.Random` class.


    An example is the creation of a pseudorandom integer number.


    ```

    import java.util.random.RandomGenerator;

    import java.util.Random;

    public class UseNewPRNGs implements RandomGenerator {

    static UseNewPRNGs testGen = new UseNewPRNGs();

    public static void main(String[] args){

    for (int i = 0; i < 5; i++) {

    System.out.println(testGen.nextBoolean());

    System.out.println(testGen.nextDouble());

    System.out.println(testGen.nextInt());

    System.out.println(testGen.nextLong());

    }

    }

    @Override

    public long nextLong() {

    //Returns a pseudorandomly chosen long value.

    Random r= new Random();

    return r.nextLong();

    }

    }

    ```


    The following is the output.


    ```

    false

    0.4134883035327678


    true

    0.37651481128199904


    true

    0.8508900370304876


    true

    0.10116382711133465


    false

    0.01988848947697064


    ```


    ### How It Works


    Java 17 provides a new interface, RandomGenerator, which supplies a uniform API
    for all existing and new PRNGs. It has default methods, and in the previous code
    was only overridden the `nextLong` method. It provides a common protocol for objects
    that generate random or pseudorandom sequences of numbers or Boolean values. This
    enhancement mainly aims to use various PRNG algorithms interchangeably in applications
    and preserve the existing behavior of the `java.util.Random` class.


    For more information on PRNGs, see the documentation at [https://​openjdk.​java.​net/​jeps/​356](https://openjdk.java.net/jeps/356).


