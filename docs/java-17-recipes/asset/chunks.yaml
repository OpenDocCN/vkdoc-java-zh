    ## 9.8 在应用程序中记录事件


    ### 问题


    你希望在应用程序中记录事件、调试消息、错误条件以及其他事件。


    ### 解决方案


    在你的应用程序中使用 Java 日志 API 来实现日志记录方案。以下示例首先创建了一个名为 `recipeLogger` 的日志记录器对象。在此示例中，Java
    日志记录器记录了一条信息性消息、一条警告消息和一条错误消息。


    ```

    private void loadLoggingConfiguration() {

    FileInputStream ins = null;

    try {

    ins = new FileInputStream(new File("logging.properties"));

    LogManager.getLogManager().readConfiguration(ins);

    } catch (IOException e) {

    e.printStackTrace();

    }

    }

    private void start() {

    loadLoggingConfiguration();

    Logger logger = Logger.getLogger("recipeLogger");

    logger.info("首次记录日志！");

    logger.warn("一个需要发出的警告");

    logger.severe("这是一个错误！");

    }

