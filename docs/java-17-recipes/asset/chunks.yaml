- fmt: '### How It Works


    Sometimes it is necessary to obtain the current system time. The `LocalTime` class
    obtains the current time by calling its `now()` method. Similar to the `LocalDate`
    class, the `LocalTime.now()` method can be called to return a `LocalTime` object
    that is equal to the current time. The `LocalTime` class also contains several
    methods that can be utilized to manipulate the time. The examples contained in
    the solution provide a brief overview of the available methods.


    Let’s look at a handful of examples to provide some context for how the `LocalTime`
    methods are invoked. To obtain a `LocalTime` object set to a specific time, invoke
    the `LocalTime.of(int, int)` method, passing int parameters representing the hour
    and minute.


    ```

    // of(int hours, int min): obtain a specific time

    LocalTime pastTime = LocalTime.of(1, 10);

    ```


    The `atDate(LocalDate)` instance method applies a `LocalDate` object to a `LocalTime`
    instance, returning a `LocalDateTime` object.


    ```

    LocalDateTime ldt = time.atDate(LocalDate.of(2021,Month.NOVEMBER,12);

    ```


    There are several methods that can obtain portions of the time. For instance,
    the `getHour()`, `getMinute()`, `getNano()`, and `getSecond()` methods return
    those specified portions of the `LocalTime` object.


    ```

    int hour = time.getHour();

    int min  = time.getMinute();

    int nano = time.getNano();

    int sec  = time.getSecond();

    ```


    Several comparison methods are also available for use. For example, the `compareTo(LocalTime)`
    method compares one `LocalTime` object to another. `isAfter(LocalTime)` determines
    if the time is after another, and `isBefore(LocalTime)` specifies the opposite.


    ## 4.11 Obtaining and Using the Date and Time Together


    ### Problem


    In your application, you want to display the current date and the current time.


    ### Solution 1


    Use the `LocalDateTime` class, which is part of the new Date-Time API, to capture
    and display the current date and time. The `LocalDateTime` class contains a method
    named `now()`, which obtains the current date and time. The following lines of
    code demonstrate how to do so.


    ```

    LocalDateTime ldt = LocalDateTime.now();

    System.out.println("Local Date and Time: " + ldt);

    ```


    The resulting `LocalDateTime` object contains both the date and time but no time
    zone information. The `LocalDateTime` class also contains additional methods that
    provide options for working with date-time data. For instance, to return a `LocalDateTime`
    object with a specified date and time, pass parameters of int type to the `LocalDateTime.of()`
    method, as follows.


    ```

    // Obtain the LocalDateTime object of the date 11/11/2021 at 12:00

    LocalDateTime ldt2 = LocalDateTime.of(2021, Month.NOVEMBER, 11, 12, 00);

    ```


    The following examples demonstrate a handful of the methods that are available
    in a `LocalDateTime` object.


    ```

    public static void obtainDatesWithTime(){

    LocalDateTime ldt = LocalDateTime.now();

    System.out.println("Local Date and Time: " + ldt);

    // Obtain the LocalDateTime object of the date 11/11/2021 at 12:00

    LocalDateTime ldt2 = LocalDateTime.of(2021, Month.NOVEMBER, 11, 12, 00);

    System.out.println("Specified Date and Time: " + ldt2);

    // Obtain the month from LocalDateTime object

    Month month = ldt.getMonth();

    int monthValue = ldt.getMonthValue();

    System.out.println("Month: " + month);

    System.out.println("Month Value: " + monthValue);

    // Obtain day of Month, Week, and Year

    int day = ldt.getDayOfMonth();

    DayOfWeek dayWeek = ldt.getDayOfWeek();

    int dayOfYr = ldt.getDayOfYear();

    System.out.println("Day: " + day);

    System.out.println("Day Of Week: " + dayWeek);

    System.out.println("Day of Year: " + dayOfYr);

    // Obtain year

    int year = ldt.getYear();

    System.out.println("Date: " + monthValue + "/" + day + "/" + year);

    int hour = ldt.getHour();

    int minute = ldt.getMinute();

    int second = ldt.getSecond();

    System.out.println("Current Time: " + hour + ":" + minute + ":" + second);

    // Calculation of Months, etc.

    LocalDateTime currMinusMonths = ldt.minusMonths(12);

    LocalDateTime currMinusHours = ldt.minusHours(10);

    LocalDateTime currPlusDays = ldt.plusDays(30);

    System.out.println("Current Date and Time Minus 12 Months: " + currMinusMonths);

    System.out.println("Current Date and Time MInus 10 Hours: " + currMinusHours);

    System.out.println("Current Date and Time Plus 30 Days:" + currPlusDays);

    }

    ```


    Here’s the result.


    ```

    Local Date and Time: 2021-12-06T19:37:53.422560400

    Specified Date and Time: 2021-11-11T12:00

    Month: DECEMBER

    Month Value: 12

    Day: 6

    Day Of Week: MONDAY

    Day of Year: 340

    Date: 12/6/2021

    Current Time: 19:37:53

    Current Date and Time Minus 12 Months: 2020-12-06T19:37:53.422560400

    Current Date and Time MInus 10 Hours: 2021-12-06T09:37:53.422560400

    Current Date and Time Plus 30 Days:2022-01-05T19:37:53.422560400

    The main is:

    public static void main(String[] args){

    obtainDatesWithTime();

    }

    ```


    ### Solution 2


    If you only need to obtain the current date without going into calendar details,
    use the `java.util.Date` class to generate a new `Date` object. Doing so generates
    a new `Date` object that is equal to the current system date. In the following
    code, you can see how easy it is to create a new `Date` object and obtain the
    current date.


    ```

    Date date = new Date();

    System.out.println("Using java.util.Date(): " + date);

    System.out.println("Getting time from java.util.Date(): " + date.getTime());

    ```


    The result is a `Date` object that contains the current date and time taken from
    the system that the code is run on, including the time zone information, as shown
    in the following example. The time is the number of milliseconds since January
    1, 1970, 00:00:00 GMT.


    ```

    Using java.util.Date(): Mon Dec 06 19:37:53 CET 2021

    Getting time from java.util.Date(): 1638815873430

    ```


    ### Solution 3


    If you need to be more precise regarding the calendar, use the `java.util.Calendar`
    class. Although working with the `Calendar` class makes your code longer, the
    results are more granular than using `java.util.Date`. The following code demonstrates
    just a handful of the capabilities of using this class to obtain the current date.


    ```

    Calendar gCal = Calendar.getInstance();

    // Month is based upon a zero index, January is equal to 0,

    // so we need to add one to the month for it to be in

    // a standard format

    int month = gCal.get(Calendar.MONTH) + 1;int day = gCal.get(Calendar.DATE);

    int yr = gCal.get(Calendar.YEAR);

    String dateStr = month + "/" + day + "/" + yr;

    System.out.println(dateStr);

    int dayOfWeek = gCal.get(Calendar.DAY_OF_WEEK);

    // Print out the integer value for the day of the week

    System.out.println(dayOfWeek);

    int hour = gCal.get(Calendar.HOUR);

    int min  = gCal.get(Calendar.MINUTE);

    int sec = gCal.get(Calendar.SECOND);

    // Print out the time

    System.out.println(hour + ":" + min + ":" + sec);

    // Create new DateFormatSymbols instance to obtain the String

    // value for dates

    DateFormatSymbols symbols = new DateFormatSymbols();

    String[] days = symbols.getWeekdays();

    System.out.println(days[dayOfWeek]);

    // Get crazy with the date!

    int dayOfYear = gCal.get(Calendar.DAY_OF_YEAR);

    System.out.println(dayOfYear);

    // Print the number of days left in the year

    System.out.println("Days left in " + yr + ": " + (365-dayOfYear));

    int week = gCal.get(Calendar.WEEK_OF_YEAR);

    // Print the week of the year

    System.out.println(week);

    ```


    This code demonstrates that it is possible to obtain more detailed information
    regarding the current date when using the `Calendar` class. The results of running
    the code look like the following.


    ```

    12/6/2021


    7:37:53

    lunedì


    Days left in 2021: 25

    ```'
