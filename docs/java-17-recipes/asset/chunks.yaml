    9 到 Java 17 的新特性。每个版本也保持了与先前版本的向后兼容性。本章展示了一些最重要的增强特性，以激发你的兴趣。本章绝非 Java 所有增强功能的完整列表。相反，它是一个快速入门指南，帮助你了解
