- fmt: '# How It Works


    The `javax.xml.transform` package contains all the classes you need to transform
    an XML document into any other document type. The most common use case is to convert
    data-oriented XML documents into user-readable HTML documents.


    Transforming from one document type to another requires three files.


    - An XML source document

    - An XSL transformation document that maps XML elements to the new document elements

    - A target output file


    The XML source document is, of course, your source data file. It most often contains
    data-oriented content that is easy to parse programmatically. However, people
    don’t easily read XML files, especially complex, data-rich files. Instead, people
    are much more comfortable reading properly rendered HTML documents. The XSL transformation
    document specifies how an XML document should be transformed into a different
    format. An XSL file usually contains an HTML template that specifies dynamic fields
    that hold the extracted contents of a source XML file.


    In this example’s source code, you’ll find two source documents.


    - `chapter15/recipe15_3/patients.xml`

    - `chapter15/recipe15_3/patients.xsl`


    The `patients.xml` file is short and contains the following data.


    ```

    John Smith

    Common Cold


    Jane Doe

    Broken ankle


    Jack Brown

    Food allergy

    ```


    The `patients.xml` file defines a root element called `patients`. It has three
    nested `patient` elements. The `patient` elements contain three pieces of data.


    - The patient identifier provided as the `id` attribute of the `patient` element

    - The patient name provided as the `name` subelement

    - The patient diagnosis provided as the `diagnosis` subelement


    The transformation XSL document (`patients.xsl`) is quite small as well, and it
    simply maps the patient data to a more user-readable HTML format using XSL.


    ```

    Patients


    Id

    Name

    Diagnosis

    ```


    Using this style sheet, the sample code transforms the XML into an HTML table
    containing all the patients and their data. Rendered in a browser, the HTML table
    should look like Figure [15-1](#323910_4_En_15_Chapter.xhtml#Fig1).


    ![](images/323910_4_En_15_Chapter/323910_4_En_15_Fig1_HTML.jpg)


    Figure 15-1 A common rendering of an HTML table


    The process for using this XSL file to convert the XML to an HTML file is straightforward,
    but every step can be enhanced with additional error checking and processing.
    For this example, refer to the previous code in the solution section.


    The following are the most basic transformation steps.


    1. Read the XSL document into your Java application as a `Source` object.

    2. Create a `Transformer` instance and provide your XSL `Source` instance to use
    during its operation.

    3. Create a `SourceStream` that represents the source XML contents.

    4. Create a `StreamResult` instance for your output document, which is an HTML
    file in this case.

    5. Use the `Transformer` object’s `transform()` method to perform the conversion.

    6. Close all the relevant streams and file instances, as needed.


    If you choose to execute the sample code, you should invoke it in the following
    way, using `patients.xml`, `patients.xsl`, and `patients.html` as arguments.


    ```

    java org.java17recipes.chapter15.recipe15_3.TransformXml

    ```


    ## 15.4 Validating XML


    ### Problem


    You want to confirm that your XML is valid—that it conforms to a known document
    definition or schema.


    ### Solution


    Validate that your XML conforms to a specific schema by using the `javax.xml.validation`
    package. The following code snippet from `org.java17recipes.chapter15.recipe15_4.ValidateXml`
    demonstrates how to validate against an XML schema file.


    ```

    import java.io.File;

    import java.io.IOException;

    import javax.xml.XMLConstants;

    import javax.xml.transform.Source;

    import javax.xml.transform.stream.StreamSource;

    import javax.xml.validation.Schema;

    import javax.xml.validation.SchemaFactory;

    import javax.xml.validation.Validator;

    import org.xml.sax.SAXException;

    ...

    public void run(String xmlFile, String validationFile) {

    boolean valid = true;

    SchemaFactory sFactory =

    SchemaFactory.newInstance(XMLConstants.W3C_XML_SCHEMA_NS_URI);

    try {

    Schema schema = sFactory.newSchema(new File(validationFile));

    Validator validator = schema.newValidator();

    Source source = new StreamSource(new File(xmlFile));

    validator.validate(source);

    } catch (SAXException | IOException | IllegalArgumentException ex) {

    valid = false;

    }

    System.out.printf("XML file is %s.\n", valid ? "valid" : "invalid");

    }

    public static void main(String[] args) {

    if (args.length != 2) {

    System.out.println("Usage: java org.java17recipes.chapter15.recipe15_04.ValidateXml
    <xmlFile> <validationFile>");

    System.exit(1);

    }

    ValidateXml app = new ValidateXml();

    app.run(args[0], args[1]);

    }

    ```


    ### How It Works


    When utilizing XML, it is important to validate it to ensure that the correct
    syntax is in place and that an XML document is an instance of the specified XML
    schema. The validation process involves comparing the schema and the XML document
    to find any discrepancies. The `javax.xml.validation` package provides all the
    classes needed to reliably validate an XML file against a variety of schemas.
    The most common schemas that you use for XML validation are defined as constant
    URIs within the `XMLConstants` class.


    - `XMLConstants.W3C_XML_SCHEMA_NS_URI`

    - `XMLConstants.RELAXNG_NS_URI`


    Begin by creating a `SchemaFactory` for a specific type of schema definition.
    A `SchemaFactory` knows how to parse a particular schema type and prepares it
    for validation. Use the `SchemaFactory` instance to create a `Schema` object.
    The `Schema` object is an in-memory representation of the schema definition grammar.
    You can use the `Schema` instance to retrieve a `Validator` instance that understands
    this grammar. Finally, use the `validate()` method to check your XML. The method
    call generates several exceptions if anything goes wrong during the validation.
    Otherwise, the `validate()` method returns quietly, and you can continue to use
    the XML file.


    **Note:** The XML Schema was the first to receive “Recommendation” status from
    the World Wide Web consortium (W3C) in 2001. Competing schemas have since become
    available. One competing schema is the Regular Language for XML Next Generation
    (RELAX NG) schema. RELAX NG may be a simpler schema and its specification also
    defines a non-XML, compact syntax. This recipe’s example uses the XML schema.


    Run the example code using the following command-line syntax, preferably with
    the sample `.xml` file and validation files provided as `resources/patients.xml`
    and `patients.xsl`, where the XSL is as follows.


    ```

    Patients


    Id

    Name

    Diagnosis

    ```


    ## 15.5 Working with JSON


    ### Problem


    You are interested in working with JSON in your Java application.


    ### Solution


    JSON is a free and independent data format derived from JavaScript. It is regularly
    used to read data from a web server and display the data on a web page, simply
    because its format is only text. There are different libraries to manage JSON
    in your Java project. Download the `org.json` library from [https://github.com/stleary/JSON-java](https://github.com/stleary/JSON-java)
    and add it as a dependency to your Java application.


    ### How It Works


    The `org.JSON` package implements encoders and decoders to parse JSON documents
    into Java objects and generate JSON documents from the Java classes and also includes
    the capability to convert between JSON and XML. It is also easy to include the
    API by adding the downloaded JAR files to the CLASSPATH. There are many JSON packages
    in Java (for example, GSON at [https://github.com/google/gson](https://github.com/google/gson)),
    but the Java community has not standardized one yet.'
  raw: "How It Works\nThe `javax.xml.transform`\npackage contains all the classes\
    \ you need to transform an XML document\ninto any other document type. The most\
    \ common use case is to convert\ndata-oriented XML documents into user-readable\
    \ HTML documents.\n\nTransforming from one document type to another requires three\
    \ files.\n\n*   An XML source document\n\n*   An XSL transformation document that\
    \ maps XML elements to the new\n    document elements\n\n*   A target output file\n\
    \nThe XML source document is, of course, your source data file. It most\noften\
    \ contains data-oriented content that is easy to parse\nprogrammatically. However,\
    \ people don’t easily read XML files,\nespecially complex, data-rich files. Instead,\
    \ people are much more\ncomfortable reading properly rendered HTML documents.\n\
    The XSL transformation document specifies how an XML document should\nbe transformed\
    \ into a different format. An XSL file usually contains an\nHTML template that\
    \ specifies dynamic fields that hold the extracted\ncontents of a source XML file.\n\
    \nIn this example’s source code, you’ll find two source documents.\n\n*   `chapter15/recipe15_3/patients.xml`\n\
    \n*   `chapter15/recipe15_3/patients.xsl`\n\nThe `patients.xml`\nfile  is short\n\
    and contains the following data.\n\n```\n\nJohn Smith\nCommon Cold\n\nJane Doe\n\
    Broken ankle\n\nJack Brown\nFood allergy\n\n```\n\nThe `patients.xml` file\ndefines\
    \ a root element called `patients`. It has\nthree nested `patient` elements. The\n\
    `patient`\nelements contain three pieces of data.\n\n*   The patient identifier\
    \ provided as the `id` attribute of the\n    `patient`\n    element\n\n*   The\
    \ patient name provided as the `name`\n    subelement\n\n*   The patient diagnosis\
    \ provided as the `diagnosis`\n    subelement\n\nThe transformation XSL document\
    \ (`patients.xsl`) is\nquite small as well, and it simply maps the patient data\
    \ to a more\nuser-readable HTML\nformat using XSL.\n\n```\n\nPatients\n\nId\n\
    Name\nDiagnosis\n\n```\n\nUsing this style sheet, the sample code transforms the\
    \ XML into an HTML\ntable containing all the patients and their data. Rendered\
    \ in a browser,\nthe HTML table should look like Figure [15-1](#323910_4_En_15_Chapter.xhtml#Fig1)\
    \ .\n\n![](images/323910_4_En_15_Chapter/323910_4_En_15_Fig1_HTML.jpg)\n\nFigure\
    \ 15-1\nA common rendering of an HTML table\n\nThe process for using this XSL\
    \ file to convert the XML to an HTML\nfile is straightforward, but every step\
    \ can be enhanced with additional\nerror checking and processing. For this example,\
    \ refer to the previous\ncode in the solution section.\n\nThe following are the\
    \ most basic transformation steps.\n\n1.  Read the XSL document into your Java\
    \ application as a `Source` object.\n\n2.  Create a `Transformer` instance\n \
    \   and provide your XSL `Source` instance to\n    use during its operation.\n\
    \n3.  Create a `SourceStream` that\n    represents the source XML contents.\n\n\
    4.  Create a `StreamResult` instance\n    for your output document, which is an\
    \ HTML file in this case.\n\n5.  Use the `Transformer` object’s\n    `transform()`\n\
    \    method to perform the conversion.\n\n6.  Close all the relevant streams and\
    \ file instances, as needed.\n\nIf you choose to execute the sample code, you\
    \ should invoke it in the\nfollowing way, using `patients.xml`, `patients.xsl`,\
    \ and\n`patients.html`\nas arguments.\n\n```\njava org.java17recipes.chapter15.recipe15_3.TransformXml\
    \ \n```\n\n15.4 Validating\nXML\n\nProblem\nYou want to confirm that your XML\
    \ is valid—that it conforms to a\nknown document definition or schema.\n\nSolution\n\
    \nValidate  that\nyour XML conforms to a specific schema by using the `javax.xml.validation`\n\
    package. The following code snippet from `org.java17recipes.chapter15.recipe15_4.ValidateXml`\n\
    demonstrates how to validate against an XML schema file.\n\n```\nimport java.io.File;\n\
    import java.io.IOException;\nimport javax.xml.XMLConstants;\nimport javax.xml.transform.Source;\n\
    import javax.xml.transform.stream.StreamSource;\nimport javax.xml.validation.Schema;\n\
    import javax.xml.validation.SchemaFactory;\nimport javax.xml.validation.Validator;\n\
    import org.xml.sax.SAXException;\n...\npublic void run(String xmlFile, String\
    \ validationFile) {\nboolean valid = true;\nSchemaFactory sFactory =\nSchemaFactory.newInstance(XMLConstants.W3C_XML_SCHEMA_NS_URI);\n\
    try {\nSchema schema = sFactory.newSchema(new File(validationFile));\nValidator\
    \ validator = schema.newValidator();\nSource source = new StreamSource(new File(xmlFile));\n\
    validator.validate(source);\n} catch (SAXException | IOException | IllegalArgumentException\
    \ ex) {\nvalid = false;\n}\nSystem.out.printf(\"XML file is %s.\\n\", valid ?\
    \ \"valid\" : \"invalid\");\n}\npublic static void main(String[] args) {\nif (args.length\
    \ != 2) {\nSystem.out.println(\"Usage: java org.java17recipes.chapter15.recipe15_04.ValidateXml\
    \  \");\nSystem.exit(1);\n}\nValidateXml app = new ValidateXml();\napp.run(args[0],\
    \ args[1]);\n}\n```\n\nHow It Works\n\nWhen utilizing XML, it is important to\
    \ validate it to ensure that the\ncorrect syntax is in place and that an XML document\
    \ is an instance of\nthe specified XML schema. The validation process involves\
    \ comparing the\nschema and the XML document to find any discrepancies. The `javax.xml.validation`\n\
    package provides all the classes needed to reliably validate an XML file\nagainst\
    \ a variety of schemas. The most common schemas that you use for\nXML validation\
    \ are defined as constant URIs within the `XMLConstants` class.\n\n*   `XMLConstants.W3C_XML_SCHEMA_NS_URI`\n\
    \n*   `XMLConstants.RELAXNG_NS_URI`\n\nBegin by creating a `SchemaFactory` for\
    \ a\nspecific type of schema definition. A `SchemaFactory` knows\nhow to parse\
    \ a particular schema type and prepares it for validation.\nUse the `SchemaFactory`\n\
    instance to create a `Schema` object. The\n`Schema` object\nis an in-memory representation\
    \ of the schema definition grammar. You can\nuse the `Schema`\ninstance to retrieve\
    \ a `Validator` instance\nthat understands this grammar. Finally, use the `validate()`\
    \ method to\ncheck your XML. The method call generates several exceptions if anything\n\
    goes wrong during the validation. Otherwise, the `validate()` method\nreturns\
    \ quietly, and you can continue to use the XML file.\n\nNote\n\nThe XML Schema\
    \ was the first to receive “Recommendation” status from\nthe World Wide Web consortium\
    \ (W3C) in 2001\\. Competing schemas have\nsince become available. One competing\
    \ schema is the Regular Language for\nXML Next Generation (RELAX NG) schema. RELAX\
    \ NG may be a simpler schema\nand its specification also defines a non-XML, compact\
    \ syntax. This\nrecipe’s example uses the XML schema.\n\nRun the example code\
    \ using the following command-line syntax, preferably\nwith the sample `.xml`\
    \ file and\nvalidation files provided as `resources/patients.xml`\nand `patients.xsl`,\
    \ where\nthe XSL is as follows.\n\n```\n\nPatients\n\nId\nName\nDiagnosis\n\n\
    ```\n\n15.5 Working with\nJSON\n\nProblem\nYou are interested in working with\
    \ JSON in\nyour Java application.\n\nSolution\nJSON is a free and independent\
    \ data format derived from JavaScript.\nIt is regularly used to read data from\
    \ a web server and display the data\non a web page, simply because its format\
    \ is only text. There are\ndifferent libraries to manage JSON in your Java project.\
    \ Download the\n`org.json`\nlibrary from [`https://github.com/stleary/JSON-java`](https://github.com/stleary/JSON-java)\n\
    and add it as a dependency to your Java application.\n\nHow It Works\nThe `org.JSON`\n\
    package implements encoders and decoders to parse JSON documents into\nJava objects\
    \ and generate JSON documents from the Java classes and also\nincludes the capability\
    \ to convert between JSON and XML. It is also easy\nto include the API by adding\
    \ the downloaded JAR files to the CLASSPATH.\nThere are many JSON packages in\
    \ Java (for example, GSON at [`https://github.com/google/gson`](https://github.com/google/gson)),\n\
    but the Java community has not standardized one yet."
  trans: "\n工作原理\n`javax.xml.transform` 包包含了将 XML 文档转换为任何其他文档类型所需的所有类。最常见的用例是将面向数据的\
    \ XML 文档转换为用户可读的 HTML 文档。\n\n从一种文档类型转换到另一种文档类型需要三个文件。\n\n*   一个 XML 源文档\n*   一个\
    \ XSL 转换文档，用于将 XML 元素映射到新文档元素\n*   一个目标输出文件\n\nXML 源文档当然是您的源数据文件。它通常包含易于以编程方式解析的面向数据的内容。然而，人们不容易阅读\
    \ XML 文件，尤其是复杂、数据丰富的文件。相反，人们更习惯于阅读正确渲染的 HTML 文档。\nXSL 转换文档指定了 XML 文档应如何转换为不同的格式。XSL\
    \ 文件通常包含一个 HTML 模板，该模板指定了保存源 XML 文件提取内容的动态字段。\n\n在本示例的源代码中，您将找到两个源文档。\n\n*   `chapter15/recipe15_3/patients.xml`\n\
    *   `chapter15/recipe15_3/patients.xsl`\n\n`patients.xml` 文件很短，包含以下数据。\n\n```\n\
    \nJohn Smith\nCommon Cold\n\nJane Doe\nBroken ankle\n\nJack Brown\nFood allergy\n\
    \n```\n\n`patients.xml` 文件定义了一个名为 `patients` 的根元素。它有三个嵌套的 `patient` 元素。`patient`\
    \ 元素包含三部分数据。\n\n*   作为 `patient` 元素的 `id` 属性提供的患者标识符\n*   作为 `name` 子元素提供的患者姓名\n\
    *   作为 `diagnosis` 子元素提供的患者诊断\n\n转换 XSL 文档 (`patients.xsl`) 也很小，它只是使用 XSL 将患者数据映射为更用户可读的\
    \ HTML 格式。\n\n```\n\nPatients\n\nId\nName\nDiagnosis\n\n```\n\n使用此样式表，示例代码将 XML\
    \ 转换为包含所有患者及其数据的 HTML 表格。在浏览器中渲染时，HTML 表格应如图 15-1 所示。\n\n![](img/323910_4_En_15_Fig1_HTML.jpg)\n\
    \n图 15-1 HTML 表格的常见渲染效果\n\n使用此 XSL 文件将 XML 转换为 HTML 文件的过程很简单，但每个步骤都可以通过添加额外的错误检查和处理来增强。对于此示例，请参考解决方案部分中的先前代码。\n\
    \n以下是最基本的转换步骤。\n\n1.  将 XSL 文档作为 `Source` 对象读入您的 Java 应用程序。\n2.  创建一个 `Transformer`\
    \ 实例，并提供您的 XSL `Source` 实例以供其操作期间使用。\n3.  创建一个表示源 XML 内容的 `SourceStream`。\n4.\
    \  为您的输出文档（本例中为 HTML 文件）创建一个 `StreamResult` 实例。\n5.  使用 `Transformer` 对象的 `transform()`\
    \ 方法执行转换。\n6.  根据需要关闭所有相关的流和文件实例。\n\n如果您选择执行示例代码，应使用 `patients.xml`、`patients.xsl`\
    \ 和 `patients.html` 作为参数，按以下方式调用它。\n\n```\njava org.java17recipes.chapter15.recipe15_3.TransformXml\
    \ \n```\n\n15.4 验证 XML\n\n问题\n您希望确认您的 XML 是有效的——即它符合已知的文档定义或模式。\n\n解决方案\n\n使用\
    \ `javax.xml.validation` 包验证您的 XML 是否符合特定模式。以下来自 `org.java17recipes.chapter15.recipe15_4.ValidateXml`\
    \ 的代码片段演示了如何针对 XML 模式文件进行验证。\n\n```\nimport java.io.File;\nimport java.io.IOException;\n\
    import javax.xml.XMLConstants;\nimport javax.xml.transform.Source;\nimport javax.xml.transform.stream.StreamSource;\n\
    import javax.xml.validation.Schema;\nimport javax.xml.validation.SchemaFactory;\n\
    import javax.xml.validation.Validator;\nimport org.xml.sax.SAXException;\n...\n\
    public void run(String xmlFile, String validationFile) {\nboolean valid = true;\n\
    SchemaFactory sFactory =\nSchemaFactory.newInstance(XMLConstants.W3C_XML_SCHEMA_NS_URI);\n\
    try {\nSchema schema = sFactory.newSchema(new File(validationFile));\nValidator\
    \ validator = schema.newValidator();\nSource source = new StreamSource(new File(xmlFile));\n\
    validator.validate(source);\n} catch (SAXException | IOException | IllegalArgumentException\
    \ ex) {\nvalid = false;\n}\nSystem.out.printf(\"XML file is %s.\\n\", valid ?\
    \ \"valid\" : \"invalid\");\n}\npublic static void main(String[] args) {\nif (args.length\
    \ != 2) {\nSystem.out.println(\"Usage: java org.java17recipes.chapter15.recipe15_04.ValidateXml\
    \  \");\nSystem.exit(1);\n}\nValidateXml app = new ValidateXml();\napp.run(args[0],\
    \ args[1]);\n}\n```\n\n工作原理\n\n在使用 XML 时，对其进行验证以确保语法正确且 XML 文档是指定 XML 模式的一个实例非常重要。验证过程涉及比较模式和\
    \ XML 文档以发现任何差异。`javax.xml.validation` 包提供了可靠地针对各种模式验证 XML 文件所需的所有类。您用于 XML 验证的最常见模式在\
    \ `XMLConstants` 类中定义为常量 URI。\n\n*   `XMLConstants.W3C_XML_SCHEMA_NS_URI`\n* \
    \  `XMLConstants.RELAXNG_NS_URI`\n\n首先为特定类型的模式定义创建一个 `SchemaFactory`。`SchemaFactory`\
    \ 知道如何解析特定的模式类型，并为其验证做好准备。使用 `SchemaFactory` 实例创建一个 `Schema` 对象。`Schema` 对象是模式定义语法的内存表示。您可以使用\
    \ `Schema` 实例检索一个理解此语法的 `Validator` 实例。最后，使用 `validate()` 方法检查您的 XML。如果在验证过程中出现任何问题，该方法调用会生成多个异常。否则，`validate()`\
    \ 方法会静默返回，您可以继续使用该 XML 文件。\n\n注意\n\nXML Schema 于 2001 年率先获得万维网联盟 (W3C) 的“推荐”状态。此后出现了竞争性的模式。一种竞争性模式是下一代正则语言\
    \ (RELAX NG) 模式。RELAX NG 可能是一种更简单的模式，其规范还定义了一种非 XML 的紧凑语法。本示例使用了 XML 模式。\n\n使用以下命令行语法运行示例代码，最好使用作为\
    \ `resources/patients.xml` 和 `patients.xsl` 提供的示例 `.xml` 文件和验证文件，其中 XSL 如下所示。\n\
    \n```\n\nPatients\n\nId\nName\nDiagnosis\n\n```\n\n15.5 使用 JSON\n\n问题\n您有兴趣在 Java\
    \ 应用程序中使用 JSON。\n\n解决方案\nJSON 是一种源自 JavaScript 的免费且独立的数据格式。它通常用于从 Web 服务器读取数据并在网页上显示数据，仅仅因为其格式仅为文本。有不同的库可以在您的\
    \ Java 项目中管理 JSON。从 [`https://github.com/stleary/JSON-java`](https://github.com/stleary/JSON-java)\
    \ 下载 `org.json` 库，并将其作为依赖项添加到您的 Java 应用程序中。\n\n工作原理\n`org.JSON` 包实现了编码器和解码器，用于将\
    \ JSON 文档解析为 Java 对象，并从 Java 类生成 JSON 文档，还包括在 JSON 和 XML 之间进行转换的功能。通过将下载的 JAR\
    \ 文件添加到 CLASSPATH 中，也很容易包含该 API。Java 中有许多 JSON 包（例如，[`https://github.com/google/gson`](https://github.com/google/gson)\
    \ 上的 GSON），但 Java 社区尚未标准化其中一个。\n"
- fmt: "# 15.6 Building a JSON Object\n\n## Problem\nYou want to build a JSON object\
    \ within your Java application.\n\n## Solution\nUtilize the JSON API to build\
    \ a JSON object. In the following code, a JSON object pertaining to a book is\
    \ built.\n\n```java\npublic class BuildingJSONObject {\n    public static void\
    \ main(String[] args) {\n        JSONObject json = new JSONObject();\n       \
    \ json.put(\"title\", \"Java 17 Recipes\");\n        JSONObject authorName = new\
    \ JSONObject();\n        authorName.put(\"firstName\",\"Luciano\");\n        authorName.put(\"\
    lastName\",\"Manelli\");\n        json.put(\"author\", authorName);\n        JSONObject\
    \ editor1 = new JSONObject();\n        editor1.put(\"firstName\", \"Steve\");\n\
    \        editor1.put(\"lastName\", \"Anglin\");\n        JSONObject editor2 =\
    \ new JSONObject();\n        editor2.put(\"firstName\",\"Matthew\");\n       \
    \ editor2.put(\"lastName\",\"Moodie\");\n        JSONArray editors = new JSONArray();\n\
    \        editors.put(editor1);\n        editors.put(editor2);\n        json.put(\"\
    editor\", editors);\n        System.out.println(json.toString());\n    }\n}\n\
    ```\n\nThe following is the output.\n\n```json\n{\"editor\":[{\"firstName\":\"\
    Steve\",\"lastName\":\"Anglin\"},{\"firstName\":\"Matthew\",\"lastName\":\"Moodie\"\
    }],\"author\":{\"firstName\":\"Luciano\",\"lastName\":\"Manelli\"},\"title\":\"\
    Java 17 Recipes\"}\n```\n\n## How It Works\nThe JSON API creates JSON objects\
    \ using the builder pattern. Using the `JSONObject`, JSON objects can be built\
    \ using a series of `put` method calls, each building upon each other. Once the\
    \ JSON object has been built, it is ready to be used or printed as a string.\n\
    \nIn this recipe’s example, you construct a JSON object that provides details\
    \ regarding a book. The `put` method adds more name/value properties (much like\
    \ `Map`’s). Therefore, the following line adds a property named `title` with “Java\
    \ 17 Recipes” value.\n\n```java\n.put(\"title\", \"Java 17 Recipes\")\n```\n\n\
    Objects can be embedded inside each other, creating a hierarchy of subsections\
    \ within one JSON object. For example, after the first call to `put()`, another\
    \ object can be embedded inside the initial JSON object by calling a new `JSONObject`\
    \ as the value to a `put()` operation and passing the name of the embedded object.\
    \ Embedded objects can also contain properties (`authorName`), so to add properties\
    \ to the embedded object, call the `put()` method within the embedded object.\
    \ JSON objects can embody as many embedded objects as needed. It is also possible\
    \ that a JSON object may have an array of related subobjects. To add an array\
    \ of subobjects, call the `JSONArray()` method, passing the name of the array\
    \ as an argument. Arrays can consist of objects and hierarchies of objects, arrays,\
    \ and so forth. Once a JSON object has been created, it can be used and passed\
    \ to a client.\n\n# 15.7 Writing a JSON Object to File\n\n## Problem\nYou’ve generated\
    \ or parsed a JSON object, and you want to store it on disk in file format.\n\n\
    ## Solution\nUtilize the JSON API to build a JSON object, and then store it to\
    \ the file system. The class, working with the `java.io.Writer` package, makes\
    \ it possible to create a file on disk, and then write the JSON to that file.\
    \ In the following example, the JSON object that was generated in Recipe 15-6\
    \ is written to disk using this technique.\n\n```java\npublic class BuildingJSONObject\
    \ {\n    public static void main(String[] args) {\n        JSONObject json = new\
    \ JSONObject();\n        json.put(\"title\", \"Java 17 Recipes\");\n        JSONObject\
    \ authorName = new JSONObject();\n        authorName.put(\"firstName\",\"Luciano\"\
    );\n        authorName.put(\"lastName\",\"Manelli\");\n        json.put(\"author\"\
    , authorName);\n        JSONObject editor1 = new JSONObject();\n        editor1.put(\"\
    firstName\", \"Steve\");\n        editor1.put(\"lastName\", \"Anglin\");\n   \
    \     JSONObject editor2 = new JSONObject();\n        editor2.put(\"firstName\"\
    ,\"Matthew\");\n        editor2.put(\"lastName\",\"Moodie\");\n        JSONArray\
    \ editors = new JSONArray();\n        editors.put(editor1);\n        editors.put(editor2);\n\
    \        json.put(\"editor\", editors);\n        try {\n            Writer jsonWriter\
    \ = json.write(new FileWriter(\"Book.json\"));\n            jsonWriter.flush();\n\
    \        } catch (IOException ex) {\n            System.out.println(ex);\n   \
    \     }\n    }\n}\n```\n\nThe output is the `Book.json` file:\n\n```json\n{\"\
    editor\":[{\"firstName\":\"Steve\",\"lastName\":\"Anglin\"},{\"firstName\":\"\
    Matthew\",\"lastName\":\"Moodie\"}],\"author\":{\"firstName\":\"Luciano\",\"lastName\"\
    :\"Manelli\"},\"title\":\"Java 17 Recipes\"}\n```\n\n## How It Works\nThe `.write`\
    \ method can be utilized to write a JSON object to a Java writer object. It is\
    \ instantiated by passing a `Writer` object as an argument to the `Json.write()`\
    \ method. After that `jsonWriter` has been created, the `flush` method can be\
    \ invoked to write the JSON file.\n\n# 15.8 Parsing a JSON Object\n\n## Problem\n\
    The application you’ve created requires the ability to read a JSON object and\
    \ parse it accordingly. Use the following JSON script.\n\n```json\n{\n    \"title\"\
    :\"Java 17 Recipes\",\n    \"author\":{\"firstName\":\"Luciano\",\"lastName\"\
    :\"Manelli\"},\n    \"projectCoordinator\":{\"firstName\":\"Mark\",\"lastName\"\
    :\"Powers\"},\n    \"editor\":[{\"firstName\":\"Welmoed\",\"lastName\":\"Spahr\"\
    },{\"firstName\":\"Steve\",\"lastName\":\"Anglin\"},{\"firstName\":\"Matthew\"\
    ,\"lastName\":\"Moodie\"}],\n    \"technicalReviewer\":[{\"firstName\":\"Manuel\"\
    ,\"lastName\":\"Jordan\"}]\n}\n```\n\n## Solution\nUtilize a `JSONObject` class\
    \ to convert the JSON string into a JSON object, read a JSON object, and then\
    \ use the `getJSONObject` and `getJSONArray` methods to perform actions against\
