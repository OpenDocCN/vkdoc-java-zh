  trans: '

    ### 解决方案


    数字、日期和时间的显示格式因地区而异，并取决于用户的语言和文化区域。此外，文本排序规则也因语言而异。`java.util.Locale` 最终类代表世界上特定的语言和区域。通过确定并使用客户的区域设置，你可以将该区域设置应用于各种格式类，这些类能够以预期的形式创建用户可见的数据。使用
    `Locale` 实例来修改其行为以适应特定语言或区域的类被称为*区域敏感*类。你可以在第 4 章中了解更多关于区域敏感类的信息。该章向你展示了如何在 `NumberFormat`
    和 `DateFormat` 类中使用 `Locale` 实例。然而，在本方案中，你将学习创建这些 `Locale` 实例的不同选项。


    你可以通过以下任何一种方式创建 `Locale` 实例。


    *   使用 `Locale.Builder` 类来配置和构建一个 `Locale` 对象。

    *   使用静态的 `Locale.forLanguageTag()` 方法。

    *   使用 `Locale` 构造器来创建对象。

    *   使用预配置的静态 `Locale` 对象。


    Java 的 `Locale.Builder` 类拥有 setter 方法，用于创建可以转换为格式良好的最佳实践（BCP）47 语言标签的区域设置。“工作原理”部分会更详细地描述
    BCP 47 标准。现在，你只需简单理解 `Builder` 创建的是符合该标准的 `Locale` 实例。


    以下来自 `org.java17recipes.chapter11.recipe11_02.Recipe11_2` 类的代码片段演示了如何创建 `Builder`
    和 `Locale` 实例。你在区域敏感类中创建区域设置，以生成文化上正确的显示格式。


    ```

    private static final long number = 123456789L;

    private static final Date now = new Date();

    public static void main(String[] args) {

    Recipe11_2 app = new Recipe11_2();

    app.run();

    }

    public void run() {

    createFromBuilder();

    createFromLanguageTag();

    createFromConstructor();

    createFromStatics();

    }

    private void createFromBuilder() {

    System.out.printf("Creating from Builder...\n\n");

    String[][] langRegions = {{"fr", "FR"}, {"ja", "JP"}, {"en", "US"}};

    Builder builder = new Builder();

    Locale l = null;

    NumberFormat nf = null;

    DateFormat df = null;

    for (String[] lr: langRegions) {

    builder.clear();

    builder.setLanguage(lr[0]).setRegion(lr[1]);

    l = builder.build();

    nf = NumberFormat.getInstance(l);

    df = DateFormat.getDateTimeInstance(DateFormat.LONG, DateFormat.LONG, l);

    System.out.printf("Locale: %s\nNumber: %s\nDate: %s\n\n",

    l.getDisplayName(),

    nf.format(number),

    df.format(now));

    }

    ```


    上述代码在标准控制台输出以下内容。


    ```

    Creating from Builder...

    Locale: French (France)

    Number: 123 456 789

    Date: 14 septembre 2016 00:08:06 PDT

    Locale: Japanese (Japan)

    Number: 123,456,789

    Date: 2016/09/14 0:08:06 PDT

    Locale: English (United States)

    Number: 123,456,789

    Date: September 14, 2016 12:08:06 AM PDT

    ```


    另一种创建 `Locale` 实例的方法是使用静态的 `Locale.forLanguageTag()` 方法。此方法允许你使用 BCP 47 语言标签参数。以下代码使用
    `forLanguageTag()` 方法从其对应的语言标签创建了三个区域设置。


    ```

    ...

    System.out.printf("Creating from BCP 47 language tags...\n\n");

    String[] bcp47LangTags= {"fr-FR", "ja-JP", "en-US"};

    Locale l = null;

    NumberFormat nf = null;

    DateFormat df = null;

    for (String langTag: bcp47LangTags) {

    l = Locale.forLanguageTag(langTag);

    nf = NumberFormat.getInstance(l);

    df = DateFormat.getDateTimeInstance(DateFormat.LONG, DateFormat.LONG, l);

    System.out.printf("Locale: %s\nNumber: %s\nDate: %s\n\n",

    l.getDisplayName(),

    nf.format(number),

    df.format(now));

    }

    ...

    ```


