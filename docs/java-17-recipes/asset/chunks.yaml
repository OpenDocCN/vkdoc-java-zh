- fmt: '### How It Works


    `ThreadPoolExecutor` consists of two components: `Queue<E>`, the tasks to be executed,
    and `Executor`, which tells how to execute the tasks. `Queue<E>` is filled with
    `Runnable` objects, on which the `run()` method contains the code to be executed.


    The `Queue<E>` component used by `ThreadPoolExecutor` is an implementer of the
    `BlockingQueue<E>` interface, which denotes a queue in which the consumers of
    the queue wait (be suspended) if there are no elements within `Queue<E>`. This
    is necessary for `ThreadPoolExecutor` to work efficiently.


    The first step is to fill `Queue<E>` with the tasks that need to be executed in
    parallel. This is done by calling `Queue<E>`’s `add()` method and passing a class
    that implements the `Runnable` interface. Once that’s done, the executor is initialized.


    After `ThreadPoolExecutor` is initialized, you call the `prestartAllCoreThreads()`
    method, which “warms up” `ThreadPoolExecutor` by creating the number of threads
    specified in `CorePoolSize` and actively starts consuming tasks from `Queue<E>`
    if it is not empty.


    Call the `shutdown()` method from `ThreadPoolExecutor` to wait for all the tasks
    to complete. By calling this method, `ThreadPoolExecutor` is instructed to accept
    no new events from the queue (previously submitted events finish processing).
    This is the first step in the orderly termination of `ThreadPoolExecutor`. Call
    the `awaitTermination()` method to wait for all the tasks in `ThreadPoolExecutor`
    to be done. This method forces the main thread to wait until all `Runnable` objects
    in `ThreadPoolExecutor`’s queue have completed executing. After all `Runnable`
    objects have been executed, the main thread wakes up and continues.


    ## 10.7 Coordinating Threads


    ### Problem


    Your application requires that two or more threads be coordinated to work in unison.


    ### Solution 1


    With wait/notify for thread synchronization, threads can be coordinated. In this
    solution, the main thread waits for the `objectToSync` object until the database-loading
    thread is finished executing. Once the database-loading thread is finished, it
    notifies the `objectToSync` that whoever is waiting on it can continue executing.
    The same process occurs when loading the orders into our system. The main thread
    waits on `objectToSync` until the orders-loading thread notifies `objectToSync`
    to continue by calling the `objectToSync.notify()` method. After ensuring that
    both the inventory and the orders are loaded, the main thread executes the `processOrder()`
    method to process all orders.


    ```

    public static void main(String[] args) {

    Recipe10_7_1 recipe = new Recipe10_7_1();

    recipe.start();

    }

    private final Object objectToSync = new Object();

    private void start() {

    loadItems();

    Thread inventoryThread = new Thread(() -> {

    System.out.println("Loading Inventory from Database...");

    loadInventory();

    synchronized (objectToSync) {

    objectToSync.notify();

    }

    });

    synchronized (objectToSync) {

    inventoryThread.start();

    try {

    objectToSync.wait();

    } catch (InterruptedException e) {

    e.printStackTrace();

    }

    }

    Thread ordersThread = new Thread(() -> {

    System.out.println("Loading Orders from XML Web service...");

    loadOrders();

    synchronized (objectToSync) {

    objectToSync.notify();

    }

    });

    synchronized (objectToSync) {

    ordersThread.start();

    try {

    objectToSync.wait();

    } catch (InterruptedException e) {

    e.printStackTrace();

    }

    }

    processOrders();

    }

