    \ fieldValue, field.validate(fieldValue));\nfieldName = FieldType.emailFieldName;\n\
    fieldValue = \"john@doe\";  // 无效 - 缺少句点\nfield = lookup(fieldName);\nprintValid(field,\
    \ fieldValue, field.validate(fieldValue));\nfieldName = FieldType.ssnFieldName;\n\
    fieldValue = \"111-11-1111\";  // 有效\nfield = lookup(fieldName);\nprintValid(field,\
    \ fieldValue, field.validate(fieldValue));\n}\n}\n```\n\n运行上述代码将产生以下输出。\n\n```\n\
    password(\"1Cxy9\") valid: false\nphone(\"1-800-555-1234\") valid: true\nemail(\"\
    john@doe\") valid: false\nssn(\"111-11-1111\") valid: true\n```\n\n### 工作原理\n\n\
    请注意，增强后的 `FieldType` 枚举定义了一个 `fieldName` 实例变量和一个带有 `fieldName` 字符串参数的构造函数，用于初始化该实例变量。每个枚举常量（每个常量都是\
    \ `FieldType` 的一个实例）都必须使用 `fieldName` 进行实例化。`FieldType` 还定义了一个 `abstract validate(String)`\
    \ 方法，每个枚举常量都必须实现该方法以执行字段验证。在这里，每个 `FieldType` 的 `validate()` 方法都对字段值应用正则表达式匹配，并返回匹配的\
    \ `Boolean` 结果。想象一下，以下表单输入字段对应于我们的 `FieldType` 实例。\n\n输入字段的 `name` 属性值标识了 `FieldType`；在实例化每个\
    \ `FieldType` 枚举常量时，你使用了相同的名称。当提交表单时，你可以访问每个输入字段的名称和字段中输入的值。你需要将字段名称映射到字段类型，并使用输入值调用\
    \ `validate()` 方法。为此，声明并初始化了类变量 `nameToFieldTypeMap`。对于每个 `FieldType` 枚举常量，`nameToFieldTypeMap`\
    \ 存储一个条目，其中字段名称为键，字段类型为值。`lookup(String)` 类方法使用此映射从字段名称查找字段类型。验证输入值为 `john@doe.com`\
    \ 的电子邮件输入字段的代码非常简洁。\n\n```\n// \nString fieldName = FieldType.emailFieldName;\n\
    String fieldValue = \"john@doe.com\";\nboolean valid = FieldType.lookup(fieldName).validate(fieldValue);\n\
    ```\n\n`main()` 方法展示了每个 `FieldType` 的验证示例。`printValid()` 方法打印字段名称、字段值以及字段的验证结果。\n\
    \n本技巧展示了枚举类型远不止定义一组命名常量的能力。枚举类型拥有普通类的所有功能，外加一些额外特性，允许你创建封装良好且智能的常量。\n\n## 7.3\
    \ 根据指定值执行代码\n\n### 问题\n\n你想根据单个表达式的值执行不同的代码块。\n"
