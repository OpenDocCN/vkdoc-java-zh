    ### 工作原理


    `Map` 对象包含一组键/值对。当你需要存储一个索引（键）并将其与特定值关联时，`Map` 会非常有用。`Map` 对象不能包含任何重复的键，且每个键只能映射到一个值。解决方案的源代码（`StockPortfolio1.java`）演示了如何向映射中添加和删除条目。它还包含了本方案中列出的源代码，演示了如何使用传统技术以及利用
    lambda 表达式和流的新语法来迭代映射条目。


    `summary()` 方法使用 `foreach` 循环实现来迭代投资组合映射的 `Entry` 集合。要使用传统代码进行迭代，`Map entrySet()`
    方法会返回一个 `Map.Entry` 对象的 `Set`。在循环内部，你可以通过在该条目上分别调用 `key()` 和 `value()` 方法来访问当前
    `Map.Entry` 的键和值。当你需要在迭代时同时访问映射的键和值，并且不需要从映射中删除元素时，请使用此迭代方法。观察新语法，你会发现同样的迭代可以用一行代码完成。新语法利用了
    `forEach()` 方法，该方法是在 Java 8 中添加到 `Map` 接口的。它将一个 lambda 表达式应用于列表中的每个条目。该 lambda
    表达式将键和值都作为参数，并将它们打印出来。


    `alertListLegacy()` 方法使用 `foreach` 循环实现来迭代投资组合映射的值。`Map values()` 方法返回映射值的集合；在本例中，是一个股票集合。当你只需要访问映射值，并且不需要从列表中删除元素时，请使用此迭代方法。类似地，如果你只需要访问映射键（同样，无需删除元素），你可以使用
    `keySet()` 方法进行迭代。


    ```

    for (String symbol : portfolio.keySet()) {

    ...

    }

    ```


    如果你在通过键集迭代时还需要访问映射值，请避免以下做法，因为它效率非常低。相反，应使用 `summary()` 方法中展示的迭代方式。


    ```

    for (String symbol : portfolio.keySet()) {

    Stock stock = portfolio.get(symbol);

    ...

    }

    ```


    观察解决方案中的 `alertList()` 方法，你会发现使用流、过滤器和收集器的组合，可以用更少的工作完成同样的迭代。在 `alertList()` 中，首先生成一个流，然后以
    lambda 表达式的形式对该流应用一个过滤器。最后，对过滤器应用一个收集器，创建一个 `List<Stock>` 作为返回值。


    `remove(List<String>)` 方法接收一个代表要从投资组合中移除的股票符号列表。该方法使用 `keySet()` 迭代器遍历投资组合映射的键，如果当前映射条目中的股票在待移除列表中，则将其移除。请注意，映射元素是通过迭代器的
    `remove()` 方法移除的。这是可行的，因为映射支持键集，因此通过键集迭代器所做的更改会反映在映射中。你也可以使用其 `values()` 迭代器来遍历投资组合映射。


    ```

    Iterator valueIter = portfolio.values().iterator();

    while (valueIter.hasNext()) {

    if (sellList.contains(valueIter.next().getSymbol())) {

    valueIter.remove();

    }

    }

    ```


    与键集一样，值集合也由映射支持，因此通过值迭代器调用 `remove()` 会导致从投资组合映射中移除当前条目。


    总之，如果你需要在遍历映射时从中删除元素，请使用映射的某个集合迭代器进行遍历，并通过该迭代器删除映射元素，如 `remove(List<String>)`
    方法所示。这是在迭代期间安全删除映射元素的唯一方法。否则，如果你不需要删除映射元素，你可以使用 `foreach` 循环以及本方案解决方案中展示的迭代方法之一。


    ## 7.10 并行执行流


    ### 问题


    你想要并行迭代一个集合，以便将工作分布到多个 CPU 上。


    ### 解决方案


    在集合上使用流结构，并调用 `parallelStream()` 作为第一个中间操作，以利用多 CPU 处理能力。以下类演示了 `parallelStream()`
    操作的多种用法。


    ```

    public class StockPortfolio2 {

    static List myStocks = new ArrayList();

    private static void createStocks(){

    myStocks.add(new Stock("ORCL", "Oracle", 500.0));

    myStocks.add(new Stock("AAPL", "Apple", 200.0));

    myStocks.add(new Stock("GOOG", "Google", 100.0));

    myStocks.add(new Stock("IBM", "IBM", 50.0));

    myStocks.add(new Stock("MCD", "McDonalds", 300.0));

    }

    public static void main(String[] args){

    createStocks();

    // 遍历每个元素并打印股票名称

    myStocks.stream()

    .forEach(s->System.out.println(s.getName()));

    boolean allGt = myStocks.parallelStream()

    .allMatch(s->s.getShares() > 100.0);

    System.out.println("所有股票持股数均大于 100 股？ " + allGt);

    // 打印所有持股数超过 100 股的股票

    System.out.println("== 我们持有超过 100 股的股票如下：");

    myStocks.parallelStream()

    .filter(s -> s.getShares() > 100.0)

    .forEach(s->System.out.println(s.getName()));

    System.out.println("== 以下股票按持股数排序：");

    Comparator byShares = Comparator.comparing(Stock::getShares);

    Stream sortedByShares = myStocks.parallelStream()

    .sorted(byShares);

    sortedByShares.forEach(s -> System.out.println("股票: " + s.getName() + " - 持股数:
    " + s.getShares()));

    // 可能返回一个值，也可能不返回

    Optional maybe = myStocks.parallelStream()

    .findFirst();

    System.out.println("第一只股票: " + maybe.get().getName());

    List newStocks = new ArrayList();

    Optional maybeNot = newStocks.parallelStream()

    .findFirst();

    Consumer myConsumer = (s) ->

    {

    System.out.println("第一只股票 (Optional): " + s.getName());

    };

    maybeNot.ifPresent(myConsumer);

    if(maybeNot.isPresent()){

    System.out.println(maybeNot.get().getName());

    }

    newStocks.add(new Stock("MCD", "McDonalds", 300.0));

    Optional maybeNow = newStocks.stream()

    .findFirst();

    maybeNow.ifPresent(myConsumer);

    }

    }

    ```


    ### 工作原理


    默认情况下，操作是在串行流中执行的。但是，你可以指定 Java 运行时将操作拆分为多个子任务，从而利用多个 CPU 来提高性能。当操作以这种方式执行时，它们就是“并行”执行的。Java
    运行时可以通过调用 `parallelStream()` 中间操作将流分区为多个子流。调用此操作后，聚合操作可以处理多个子流，最后再将结果合并。你也可以通过调用
    `BaseStream.parallel()` 操作来并行执行流。自然，并行流比串行流有更高的开销，因此它们只在需要解决性能问题时才使用。


    ## 7.11 总结


    本章探讨了各种数据结构以及如何使用它们。首先，我们了解了 `Enums` 并学习了如何有效地使用它们。接下来，我们介绍了 `Arrays` 和 `ArrayList`
    的基础知识，并学习了如何在这些结构中迭代元素。本章还涵盖了 Java 泛型，它允许你将对象类型与容器类型解耦，从而提供更类型安全和高效的代码。最后，本章介绍了
    Streams API，这是 Java 8 中为处理集合而引入的最重要的更新之一。

