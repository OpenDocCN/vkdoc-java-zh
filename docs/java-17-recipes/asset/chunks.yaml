    Write custom functional interfaces that can be implemented via lambda expressions.
    All lambda expressions implement a functional interface (i.e., a single abstract
    method declaration). The following lines of code demonstrate a functional interface
    that contains a single method declaration.


    ```

    @FunctionalInterface

    public interface ReverseType {

    String reverse(String text);

    }

    ```


    The functional interface contains a single abstract method declaration, identified
    as `String reverse(String text)`. The following code, which contains a lambda
    expression, demonstrates how to implement `ReverseType`.


    ```

    ReverseType newText = (testText) -> {

    String tempStr = "";

    for (String part : testText.split(" ")) {

    tempStr += new StringBuilder(part).reverse().toString() + " ";

    }

    return tempStr;

    };

    ```


    The following code could invoke the lambda expression.


    ```

    System.out.println(newText.reverse("HELLO WORLD"));

    ```


    This is the result.


    ```

    OLLEH DLROW

    ```


    ### Solution 2


    Use a functional interface that is contained within the `java.util.function` package
    to implement a lambda expression to suit the application’s needs. The following
    example uses `Function<T,R>` (where T is the input type and R is the result type)
    interface to perform the same task as the one demonstrated in solution 1\. This
    example accepts a string argument and returns a string result.


    ```

    Function newText2 = (testText) -> {

    String tempStr = "";

    for (String part : testText.split(" ")) {

    tempStr += new StringBuilder(part).reverse().toString() + " ";

    }

    return tempStr;

    };

    ```


    This lambda expression is assigned to the `newText2` variable, which is of type
    `Function<String,String>`. Therefore, a string is passed as an argument, and a
    string is returned from the lambda expression. The functional interface of `Function<T,R>`
    contains an abstract method declaration of `apply()`. To invoke this lambda expression,
    use the following syntax.


    ```

    System.out.println(newText2.apply("HELLO WORLD"));

    ```


    The following is the result.


    ```

    OLLEH DLROW

    ```


    ### How It Works


    A basic building block of a lambda expression is the functional interface. This
    standard Java interface contains a single abstract method declaration and provides
    a target type for lambda expressions and method references. A functional interface
    may contain default method implementations, but only one abstract declaration.
    The abstract method is then implicitly implemented by the lambda expression. As
    a result, the lambda expression can be assigned to a variable of the same type
    as the functional interface. The method can be called on from the assigned variable
    later, thus invoking the lambda expression. Following this pattern, lambda expressions
    are method implementations that can be invoked by name. They can also be passed
    as arguments to other methods.


    At this point, you may be wondering if you are required to develop a functional
    interface for each situation that may be suitable for use with a lambda expression.
    This is not the case since many functional interfaces are already available for
    use. Some examples include `java.lang.Runnable`, `javafx.event.EventHandler<T
    extends Event>,` and `java.util.Comparator<T>`. See some of the other recipes
    in this chapter for examples using lambda expressions that implement these interfaces.
    However, many more functional interfaces are less specific, enabling them to be
    tailored to suit the needs of a particular requirement. The `java.util.function`
    package contains several functional interfaces that can be useful when implementing
    lambda expressions. The functional interfaces contained within the package are
    utilized throughout the JDK and can also be utilized in developer applications.
    Utilizing functional interfaces contained within the `java.util.function` package
    can greatly reduce the amount of code you need to write. The functional interfaces
    are geared toward tasks performed a high percentage of the time. They are also
    written using generics, which can be applied in many different contexts. Solution
    2 demonstrates such an example, whereby the `Function<T,R>` interface implements
    a lambda expression that accepts a string argument and returns a string result.


    ## 6.3 Invoking Existing Methods by Name


    ### Problem


    You are developing a lambda expression that merely invokes a method that already
    exists in the object being passed to the lambda. Rather than write out the entire
    ceremony to invoke the method, you’d like to utilize a minimal amount of code.


    ### Solution


    Rather than writing a lambda expression, use a method reference to call an existing
    method. In the following scenario, the `Player` object contains a static method
    named `compareByGoal()`, which takes two `Player` objects and compares the number
    of goals each contains. It then returns an integer representing the outcome. The
    `compareByGoal()` method is the same as `Comparator<T>`.


    ```

    public class Player {

    private String firstName ;

    private String lastName ;

    private String position ;

    private int status = -1;

    private int goals;

    public Player(){

    }

    public Player(String position, int status){

    this.position = position;

    this.status = status;

    }

    public String findPlayerStatus(int status){

    String returnValue = null;

    switch(status){

    case 0:

    returnValue = "ACTIVE";

    case 1:

    returnValue = "INACTIVE";

    case 2:

    returnValue = "INJURY";

    default:

    returnValue = "ON_BENCH";

    }

    return returnValue;

    }

    public String playerString(){

    return getFirstName() + " " + getLastName() + " - " + getPosition();

    }

    // ** getters and setters removed for brevity **

    /**

    * Returns a positive integer if Player A has more goals than Player B

    * Returns a negative integer if Player A has fewer goals than Player B

    * Returns a zero if both Player A and Player B have the same number of goals

    */

    public static int compareByGoal(Player a, Player b){

    int eval;

    if(a.getGoals() > b.getGoals()){

    eval = 1;

    } else if (a.getGoals() < b.getGoals()){

    eval = -1;

    } else {

    eval = 0;

    }

    return eval;

    }

    }

    ```


    The `Player.compareByGoal()` method could sort an array of `Player` objects. To
    do so, pass an array of `Player` objects (`Player[]`) to the `Arrays.sort()` method
    as the first argument, and pass a method reference `Player::compareByGoal` as
    the second argument. The result is a sorted list (in ascending order) of `Player`
    objects by the number of goals. The following line of code shows how to accomplish
    this task.


    ```

    Arrays.sort(teamArray, Player::compareByGoal);

    ```'
