    ### How It Works


    The Date-Time API makes it easy to obtain the current date, without including
    other information. To do so, import the `java.time.LocalTime` class and call on
    its `now()` method. The `LocalTime` class cannot be instantiated, as it is immutable
    and thread-safe. A call to the `now()` method returns another `LocalDate` object,
    containing the current date in the year-month-day format.


    Another version of the `now()` method accepts a `java.time.Clock` object as a
    parameter and returns the date based on that clock. For instance, the following
    lines of code demonstrate how to obtain a `Clock` object that represents the system
    time.


    ```

    public static void newDateFromClock() {

    Clock clock = Clock.systemUTC();

    LocalDate date = LocalDat.now(clock);

    System.out.println("Date from clock: " + date);

    }

    ```


