- fmt: '### How It Works


    It is not possible to remain connected to the Internet all the time if you are
    working on a mobile device and traveling. Nowadays, some devices allow you to
    perform substantial work while on the go, even when you are not connected directly
    to a database. In such cases, solutions like the `CachedRowSet` object can come
    into play. The `CachedRowSet` is the same as a regular `ResultSet` object, except
    it does not have to maintain a connection to a database to remain usable. You
    can query the database, obtain the results, and place them into a `CachedRowSet`
    object; and then work with them while not connected to the database. If changes
    are made to the data at any point, those changes can be synchronized with the
    database later.


    There are a couple of ways to create a `CachedRowSet`. The solution to this recipe
    uses a `RowSetFactory` to instantiate a `CachedRowSet`. However, you can also
    use the `CachedRowSet` default constructor to create a new instance. Doing so
    would look like the following line of code.


    ```

    CachedRowSet crs = new CachedRowSetImpl();

    ```


    Once instantiated, you need to set up a connection to the database. There are
    also a couple of ways to do this. Properties could be set for the connection used,
    and the solution to this recipe demonstrates this technique within comments. The
    following excerpt from the solution sets the connection properties using the `CachedRowSet`
    object’s `setUsername()`, `setPassword()`, and `setUrl()` methods. Each of them
    accepts a string value, and in the example, that string is obtained from the `CreateConnection`
    class.


    ```

    // Alternatively populate the CachedRowSet connection settings

    // crs.setUsername(createConn.getUsername());

    // crs.setPassword(createConn.getPassword());

    // crs.setUrl(createConn.getJdbcUrl());

    ```


    Another way to set up the connection is to wait until the query is executed and
    pass a `Connection` object to the `executeQuery()` method. This is the technique
    that is used in the solution to this recipe. But before you can execute the query,
    it must be set using the `setCommand()` method, which accepts a string value.
    In this case, the string is the SQL query that you need to execute.


    ```

    crs.setCommand("select id, recipe_number, recipe_name, description from recipes");

    ```


    Next, if a `CachedRowSet` is used for updates, the primary key values should be
    noted using the `setKeys()` method. This method accepts an int array that includes
    the positional indices of the key columns. These keys identify unique columns.
    In this case, the first column listed in the query, `ID`, is the primary key.


    ```

    int[] keys = {1};

    crs.setKeyColumns(keys);

    ```


    Finally, execute the query and populate the `CachedRowSet` using the `execute()`
    method. As mentioned previously, the `execute()` method optionally accepts a `Connection`
    object, which allows the `CachedRowSet` to obtain a database connection.


    ```

    crs.execute(conn);

    ```


    Once the query has been executed, and `CachedRowSet` has been populated, it can
    be used just like any other `ResultSet`. You can use it to fetch records forward
    and backward or by specifying the absolute position of the row you’d like to retrieve.


    It is possible to insert and update rows within a `CachedRowSet`. To insert rows,
    use the `moveToInsertRow()` method to move to a new row position. Then populate
    a row by using the various methods (`CachedRowSet`, `updateString()`, `updateInt()`,
    and so on) that correspond to the data type of the column you are populating within
    the row. Once you have populated each of the required columns within the row,
    call the `insertRow()` method, followed by the `moveToCurrentRow()` method. The
    following lines of code demonstrate inserting a record into the `RECIPES` table.


    ```

    crs.moveToInsertRow();

    crs.updateInt(1, sequenceValue); // obtain current sequence values with a prior
    query

    crs.updateString(2, "12-x");

    crs.updateString(3, "This is a new recipe title");

    crs.insertRow();

    crs.moveToCurrentRow();

    ```


    Updating rows is similar to using an updatable `ResultSet`. Simply update the
    values using the `CachedRowSet` object’s methods [`updateString()`, `updateInt()`,
    and so on] that correspond to the data type of the column that you are updating
    within the row. Once you have updated the column or columns within the row, call
    the `updateRow()` method. This technique is demonstrated in the solution to this
    recipe.


    ```

    crs.updateString("description", "Subject to change");

    crs.updateRow();

    ```


    To propagate any updates or inserts to the database, the `acceptChanges()` method
    must be called. This method can accept an optional `Connection` argument to connect
    to the database. Once called, all changes are flushed to the database. Unfortunately,
    there could be conflicts because time might have elapsed since the data was last
    retrieved for `CachedRowSet`. If such a conflict arises, `SyncProviderException`
    is thrown. You can catch these exceptions and handle the conflicts manually using
    a `SyncResolver` object. However, resolving conflicts is out of the scope of this
    recipe.


    For more information, see the documentation at [`http://download.oracle.com/javase/tutorial/jdbc/basics/cachedrowset.html`](http://download.oracle.com/javase/tutorial/jdbc/basics/cachedrowset.html).


    `CachedRowSet` objects provide great flexibility for working with data, especially
    when you are using a device that is not always connected to the database. However,
    they can also be overkill in situations where you can simply use a standard `ResultSet`
    or even a scrollable `ResultSet`.


    ## 12.12 Obtaining Dates for Database Use


    ### Problem


    You want to convert a `LocalDate` object properly to insert it into a database
    record.


    ### Solution


    Utilize the static `java.sql.Date.valueOf(LocalDate)` method to convert a `LocalDate`
    object to a `java.sql.Date` object, which can be utilized by JDBC for insertion
    or querying of the database. In the following example, the current date is inserted
    into a database column of type `Date`.


    ```

    public class DatesTimes {

    static CreateConnection createConn = new CreateConnection();

    public static void main(String[] args) {

    insertRecord(

    "Java 17 Recipes",

    "APRESS");

    }

    private static void insertRecord(

    String title,

    String publisher) {

    String sql = "INSERT INTO PUBLICATION VALUES("

    + "null, ?,?,?)";

    LocalDate pubDate = LocalDate.now();

    try (Connection conn = createConn.getConnection();

    PreparedStatement pstmt = conn.prepareStatement(sql);) {

    pstmt.setString(1, title);

    pstmt.setDate(2,  java.sql.Date.valueOf(pubDate));

    pstmt.setString(3, publisher);

    pstmt.executeUpdate();

    System.out.println("Record successfully inserted.");

    } catch (SQLException ex) {

    ex.printStackTrace();

    }

    }

    }

    ```


    ### How It Works


    In Java 8, the new Date-Time API (Chapter [4](#323910_4_En_4_Chapter.xhtml)) is
    the preferred API for working with dates and times. Therefore, when working with
    date values and databases, the JDBC API must convert between SQL dates and new
    Date-Time `LocalDate` objects. The solution to this recipe demonstrates that to
    obtain an instance of `java.sql.Date` from a `LocalDate` object, you simply invoke
    the static `java.sql.Date.valueOf()` method, passing the pertinent `LocalDate`
    object.


    ## 12.13 Closing Resources Automatically


    ### Problem


    Rather than manually opening and closing resources with each database call, you
    would prefer to have the application handle such boilerplate code for you.'
