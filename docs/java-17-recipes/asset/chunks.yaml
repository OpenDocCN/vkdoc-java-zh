  trans: '

    ### 工作原理


    在移动设备上旅行时，不可能始终保持互联网连接。如今，有些设备允许你在移动中完成大量工作，即使没有直接连接到数据库。在这种情况下，像 `CachedRowSet`
    对象这样的解决方案就可以派上用场。`CachedRowSet` 与常规的 `ResultSet` 对象相同，区别在于它无需维持与数据库的连接即可保持可用状态。你可以查询数据库、获取结果，并将它们放入
    `CachedRowSet` 对象中；然后在未连接数据库的情况下处理这些数据。如果数据在任何时候发生了更改，这些更改稍后可以与数据库同步。


    创建 `CachedRowSet` 有几种方法。本方案使用 `RowSetFactory` 来实例化一个 `CachedRowSet`。不过，你也可以使用
    `CachedRowSet` 的默认构造函数来创建新实例。具体代码如下所示。


    ```

    CachedRowSet crs = new CachedRowSetImpl();

    ```


    实例化后，你需要建立与数据库的连接。同样有几种方法可以实现这一点。可以设置所用连接的属性，本方案在注释中演示了这种技术。以下摘自方案的代码片段使用 `CachedRowSet`
    对象的 `setUsername()`、`setPassword()` 和 `setUrl()` 方法设置连接属性。每个方法都接受一个字符串值，在示例中，该字符串从
    `CreateConnection` 类获取。


    ```

    // 或者填充 CachedRowSet 的连接设置

    // crs.setUsername(createConn.getUsername());

    // crs.setPassword(createConn.getPassword());

    // crs.setUrl(createConn.getJdbcUrl());

    ```


    另一种设置连接的方法是等到执行查询时，将 `Connection` 对象传递给 `executeQuery()` 方法。这是本方案中使用的方法。但在执行查询之前，必须使用
    `setCommand()` 方法设置查询，该方法接受一个字符串值。在本例中，该字符串是你需要执行的 SQL 查询。


    ```

    crs.setCommand("select id, recipe_number, recipe_name, description from recipes");

    ```


    接下来，如果 `CachedRowSet` 用于更新，则应使用 `setKeys()` 方法记录主键值。该方法接受一个包含键列位置索引的 int 数组。这些键用于标识唯一列。在本例中，查询中列出的第一列
    `ID` 是主键。


    ```

    int[] keys = {1};

    crs.setKeyColumns(keys);

    ```


    最后，使用 `execute()` 方法执行查询并填充 `CachedRowSet`。如前所述，`execute()` 方法可选地接受一个 `Connection`
    对象，这允许 `CachedRowSet` 获取数据库连接。


    ```

    crs.execute(conn);

    ```


    一旦查询执行完毕，`CachedRowSet` 被填充后，它就可以像任何其他 `ResultSet` 一样使用。你可以使用它向前或向后获取记录，或者通过指定要检索行的绝对位置来获取。


    可以在 `CachedRowSet` 中插入和更新行。要插入行，请使用 `moveToInsertRow()` 方法移动到新的行位置。然后使用与行中正在填充的列数据类型相对应的各种方法（`CachedRowSet`、`updateString()`、`updateInt()`
    等）来填充一行。填充完行中所有必需的列后，调用 `insertRow()` 方法，接着调用 `moveToCurrentRow()` 方法。以下代码行演示了向
    `RECIPES` 表中插入一条记录。


    ```

    crs.moveToInsertRow();

    crs.updateInt(1, sequenceValue); // 通过先前的查询获取当前序列值

    crs.updateString(2, "12-x");

    crs.updateString(3, "This is a new recipe title");

    crs.insertRow();

    crs.moveToCurrentRow();

    ```


    更新行类似于使用可更新的 `ResultSet`。只需使用 `CachedRowSet` 对象中与行中正在更新的列数据类型相对应的方法 [`updateString()`、`updateInt()`
    等] 来更新值。更新完行中的一列或多列后，调用 `updateRow()` 方法。本方案中演示了这种技术。


    ```

    crs.updateString("description", "Subject to change");

    crs.updateRow();

    ```


    要将任何更新或插入传播到数据库，必须调用 `acceptChanges()` 方法。此方法可以接受一个可选的 `Connection` 参数来连接数据库。调用后，所有更改都会刷新到数据库。不幸的是，由于自上次为
    `CachedRowSet` 检索数据以来可能已经过了一段时间，因此可能会出现冲突。如果发生此类冲突，则会抛出 `SyncProviderException`。你可以捕获这些异常，并使用
    `SyncResolver` 对象手动处理冲突。但是，解决冲突超出了本方案的范围。


    有关更多信息，请参阅 [`http://download.oracle.com/javase/tutorial/jdbc/basics/cachedrowset.html`](http://download.oracle.com/javase/tutorial/jdbc/basics/cachedrowset.html)
    上的文档。


    `CachedRowSet` 对象为处理数据提供了极大的灵活性，尤其是在使用并非始终连接到数据库的设备时。但是，在可以简单地使用标准 `ResultSet`
    甚至可滚动的 `ResultSet` 的情况下，它们也可能显得大材小用。


    ## 12.12 获取用于数据库的日期


    ### 问题


    你想要正确地将 `LocalDate` 对象转换后插入到数据库记录中。


    ### 解决方案


    利用静态方法 `java.sql.Date.valueOf(LocalDate)` 将 `LocalDate` 对象转换为 `java.sql.Date`
    对象，JDBC 可以使用该对象进行数据库的插入或查询。在以下示例中，当前日期被插入到类型为 `Date` 的数据库列中。


    ```

    public class DatesTimes {

    static CreateConnection createConn = new CreateConnection();

    public static void main(String[] args) {

    insertRecord(

    "Java 17 Recipes",

    "APRESS");

    }

    private static void insertRecord(

    String title,

    String publisher) {

    String sql = "INSERT INTO PUBLICATION VALUES("

    + "null, ?,?,?)";

    LocalDate pubDate = LocalDate.now();

    try (Connection conn = createConn.getConnection();

    PreparedStatement pstmt = conn.prepareStatement(sql);) {

    pstmt.setString(1, title);

    pstmt.setDate(2,  java.sql.Date.valueOf(pubDate));

    pstmt.setString(3, publisher);

    pstmt.executeUpdate();

    System.out.println("Record successfully inserted.");

    } catch (SQLException ex) {

    ex.printStackTrace();

    }

    }

    }

    ```


    ### 工作原理


    在 Java 8 中，新的日期时间 API（第 4 章）是处理日期和时间的首选 API。因此，在处理日期值和数据库时，JDBC API 必须在 SQL 日期和新的日期时间
    `LocalDate` 对象之间进行转换。本方案的解决方案演示了要从 `LocalDate` 对象获取 `java.sql.Date` 实例，只需调用静态方法
    `java.sql.Date.valueOf()`，并传入相关的 `LocalDate` 对象即可。


    ## 12.13 自动关闭资源


    ### 问题


    你希望应用程序为你处理此类样板代码，而不是在每次数据库调用时手动打开和关闭资源。

    '
- fmt: '# Solution


    Use the `try-with-resources` syntax to automatically close the resources that
    you open. The following block of code uses this tactic to automatically close
    the `Connection`, `Statement`, and `ResultSet` resources when it is finished using
    them.


    ```

    public class TryWithResourcesExample {

    public static CreateConnection createConn;

    public static void main(String[] args) {

    createConn = new CreateConnection();

    queryDatabase();

    }

    public static void queryDatabase() {

    String qry = "select recipe_number, recipe_name, description from recipes";

    try (Connection conn = createConn.getConnection();

    Statement stmt = conn.createStatement();

    ResultSet rs = stmt.executeQuery(qry);) {

    while (rs.next()) {

    String recipe = rs.getString("RECIPE_NUMBER");

    String name = rs.getString("RECIPE_NAME");

    String desc = rs.getString("DESCRIPTION");

    System.out.println(recipe + "\t" + name + "\t" + desc);           }

    } catch (SQLException e) {

    e.printStackTrace();

    }

    }

    }

    ```


    The resulting output from running this code should look similar to the following.


    ```

    Successfully connected

    12-1 Connecting to a Database DriverManager and DataSource Implementations - More
    to Come

    12-2 Querying a Database and Retrieving Results Subject to Change

    12-3 Handling SQL Exceptions Using SQLException

    ```


    ## How It Works


    Java 7 introduced automatic resource management using `try-with-resources`. Through
    this technique, the developer no longer needs to close each resource manually,
    which is a change that can cut down on many lines of code.


    To use this technique, you must instantiate all the resources you want to have
    automatic handling enabled within a set of parentheses after a `try` clause. In
    the solution to this recipe, the declared resources are `Connection`, `Statement`,
    and `ResultSet`.


    ```

    try (Connection conn = createConn.getConnection();

    Statement stmt = conn.createStatement();

    ResultSet rs = stmt.executeQuery(qry);) {

    ```


    Once those resources are out of scope, they are automatically closed. This means
    there is no longer a requirement to code a `finally` block to ensure that resources
    are closed. The automatic resource handling is available to database work and
    any resource that complies with the new `java.lang.Autocloseable` API. Other operations
    such as file I/O adhere to the new API as well. There is a single `close()` method
    within `java.lang.Autoclosable` that manages the closing of the resource. Classes
    that implement the `java.io.Closeable` interface can adhere to the API.


    ## 12.14 Summary


    In many applications, databases have become essential for storing important information.
    It is important to have a good understanding of how to utilize databases for use
    within applications. This chapter started from the beginning, covering recipes
    on getting started with database access. It then covered important topics such
    as securely accessing and modifying data, transaction management, and data access
    when not connected to a network. You should now have a sound understanding of
    some techniques for working with data for your Java solutions. Keep in mind that
    there are many data access solutions, and the recipes in this chapter cover only
    some of the ways to tackle the beast of information management.


    # 13. Java Web Applications


    Java development is not done on the desktop alone. Nowadays, web applications
    and apps can be considered the cornerstone of modern technology in private and
    government organizations. In fact, by interacting with a remote server, it is
    possible to find the needed information or purchase something online and, in general,
    use many services for your job or personal life. Thousands of enterprise applications
    are written using Java, enabling the development of sophisticated, robust, and
    secure applications.


    This chapter introduces the Java servlet based on Jakarta EE (a Java class that
    runs on an application server) and JSP (a file that builds web pages dynamically).
    It shows how they work together within Tomcat to generate dynamic web pages.


    Since web application development contains several interconnected processes, it
    is recommended to utilize an integrated development environment such as Eclipse
    EE (`www.eclipse.org/downloads/packages`) to more easily organize web projects.
    This chapter demonstrates some solutions to the recipes utilizing Eclipse. However,
    you can apply these same basic concepts to projects using any number of Java IDEs.


    ## 13.1 Installing Tomcat


    ### Problem


    You want to download and configure the main components for creating and configuring
    a simple Java web application project.


    ### Solution


    To run the examples in this chapter, you need to install the following components.


    - Tomcat web server

    - Eclipse development environment EE


    Let''s install Tomcat. It is the Java web server of Apache''s Tomcat service,
    which is the servlet container that allows you to run JSP and in which Java code
    can run (Tomcat 10 is the latest version). It is easier and safer to download
    a compressed version and run the relevant scripts for the respective operating
    system.


    Tomcat listens to three main communication ports of your PC (8005, 8009, and 8080).
    Before installing Tomcat, you should check whether any of your other applications
    already listen to one or more of those ports. To do so, use the `netstat` command
    that displays information about your computer''s network communications. In Windows,
    you can open a terminal window and type the `netstat /a` command. It displays
    a list of active connections in tabular form. The second column of the table looks
    like the following.


    ```

    Local Address

    0.0.0.0:135

    0.0.0.0:445

    0.0.0.0:3306

    ```


    The port numbers are the numbers after the colon. After installation, if you see
    one or more of the ports Tomcat uses, you must change the ports it listens to.


    Here''s how to install Tomcat 10 correctly.


    1. Go to `https://tomcat.apache.org/download-10.cgi`. Below Quick Navigation,
    you see four links: KEYS, 10.0.13, Browse, and Archives.


    2. Click **10.0.13** to take you toward the bottom of the same page to a heading
    with the same version number. Below the version heading, you see the Core subheading.
    Below that, you see the link for the zip download, arranged as follows: zip (pgp,
    sha512) `apache-tomcat-10.0.13.zip`. Click the zip link to download the `apache-tomcat-10.0.13.zip`
    (12.2 MB) file.


    3. Unzip the downloaded file in the root. At this point, you should have the `C:\apache-tomcat-10.0.13`
    folder. We prefer to maintain the default folder name, in this case, to use different
    server versions without confusion. A business situation includes different environments
    (such as development, test, and delivery), so remember to maintain consistency
    between the server versions to prevent bugs or different behaviors.


    4. Configure the server in the `setenv.bat` file in the `C:\apache-tomcat-10.0.13\bin`
    folder with the following code.


    ```

    set "JRE_HOME=C:\jdk-17"

    set "JAVA_HOME=C:\jdk-17"

    exit /b 0

    ```


    Note


    Tomcat 10.0 requires Java 8 or later.


    Now the server is ready to start. Go to `C:\apache-tomcat-10.0.13\bin` and double-click
    the `startup.bat` file. Or, open a command window, go to the `bin` folder, and
    type `startup.bat`. A second window is generated with the log of our applications.


    To check that Tomcat is working properly, open a browser and type `localhost:8080`.
    You should see the page shown in Figure 13-1.


    Figure 13-1


    The localhost home page'
