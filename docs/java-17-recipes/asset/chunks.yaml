    JavaMail API。


    15. JSON 与 XML 处理


    JSON 是用于两台或多台机器之间通信的最广泛使用的媒体格式之一。其全称是 JavaScript Object Notation（JavaScript 对象表示法）。只需包含
    JSON 库（该库已包含在 Java EE 中），就可以非常轻松地处理 JSON 数据。XML API 一直对 Java 开发人员可用，通常作为第三方库提供，可以添加到运行时类路径中。你将遇到的最基本的
    XML 处理任务只涉及少数几个用例：编写和读取 XML 文档、验证这些文档，以及使用 JAXB 来辅助 Java 对象的编组/解组。

    本章提供了执行 XML 和 JSON 任务的方案。JSON 方案需要包含 JSON API，这可以通过向 Maven 应用程序添加依赖项来完成。在本章中，你将学习如何创建
    JSON、将其写入磁盘以及执行解析。


