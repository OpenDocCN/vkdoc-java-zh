    示例代码将结果打印到控制台。由于字体或平台差异，你的控制台可能无法显示本例中展示的所有字符字形。但是，这些字符会被正确地转换为整数。


    ### 工作原理


    Unicode 字符集包含超过一百万个唯一的码点，其整数值范围从 0x0000 到 0x10FFFF。每个字符值都有一组属性。其中一个属性是 `isDigit`。如果此属性为
    `true`，则该字符代表一个从 0 到 9 的数字。例如，码点值为 0x30 到 0x39 的字符，其字形为 0、1、2、3、4、5、6、7、8 和 9。如果你简单地将这些码值转换为其对应的整数值，你会得到十六进制值
    0x30 到 0x39。对应的十进制值是 48 到 57。然而，这些字符也代表数字。在计算中使用它们时，这些字符代表值 0 到 9。


    当一个字符具有 `digit` 属性时，使用 `Character.digit()` 静态方法将其转换为对应的整型数字值。请注意，`digit()` 方法被重载，可以接受
    `char` 或 `int` 参数。此外，该方法需要一个基数（radix）。基数常见的值有 2、10 和 16。有趣的是，尽管字符 a–f 和 A–F 不具有
    `digit` 属性，但它们可以在基数为 16 的情况下作为数字使用。对于这些字符，`digit()` 方法会返回预期的整数值 10 到 15。


    要完全理解 Unicode 字符集和 Java 的实现，需要熟悉几个新术语：字符（character）、码点（code point）、char、编码（encoding）、序列化编码（serialization
    encoding）、UTF-8 和 UTF-16。这些术语超出了本配方的范围，但你可以从 Unicode 网站 [`http://unicode.org`](http://unicode.org)
    或 `Character` 类的 Java API 文档中了解更多关于这些以及其它 Unicode 概念的知识。


    ## 11.2 创建和使用 Locale


    ### 问题


    你希望以符合客户语言和文化习惯的用户友好方式显示数字、日期和时间。

    '
- fmt: '# Solution


    The display format for numbers, dates, and time varies across the world and depends
    on your user’s language and cultural region. Additionally, text collation rules
    vary by language. The `java.util.Locale` final class represents a specific language
    and region of the world. By determining and using your customer’s locale, you
    can apply that locale to a variety of format classes, which can create user-visible
    data in expected forms. Classes that use `Locale` instances to modify their behavior
    for a particular language or region are called *locale-sensitive* classes. You
    can learn more about locale-sensitive classes in Chapter [4](#323910_4_En_4_Chapter.xhtml).
    That chapter shows you how to use `Locale` instances in the `NumberFormat` and
    `DateFormat` classes. In this recipe, however, you learn different options for
    creating these `Locale` instances.


    You can create a `Locale` instance in any of the following ways.


    - Use the `Locale.Builder` class to configure and build a `Locale` object.

    - Use the static `Locale.forLanguageTag()` method.

    - Use the `Locale` constructors to create an object.

    - Use preconfigured static `Locale` objects.


    The Java `Locale.Builder` class has setter methods to create locales that can
    be transformed into well-formed Best Common Practices (BCP) 47 language tags.
    The “How It Works” section describes the BCP 47 standard in more detail. For now,
    you should simply understand that a `Builder` creates `Locale` instances that
    comply with that standard.


    The following code snippet from the `org.java17recipes.chapter11.recipe11_02.Recipe11_2`
    class demonstrates how to create `Builder` and `Locale` instances. You create
    locales in locale-sensitive classes to produce culturally correct display formats.


    ```

    private static final long number = 123456789L;

    private static final Date now = new Date();

    public static void main(String[] args) {

    Recipe11_2 app = new Recipe11_2();

    app.run();

    }

    public void run() {

    createFromBuilder();

    createFromLanguageTag();

    createFromConstructor();

    createFromStatics();

    }

    private void createFromBuilder() {

    System.out.printf("Creating from Builder...\n\n");

    String[][] langRegions = {{"fr", "FR"}, {"ja", "JP"}, {"en", "US"}};

    Builder builder = new Builder();

    Locale l = null;

    NumberFormat nf = null;

    DateFormat df = null;

    for (String[] lr: langRegions) {

    builder.clear();

    builder.setLanguage(lr[0]).setRegion(lr[1]);

    l = builder.build();

    nf = NumberFormat.getInstance(l);

    df = DateFormat.getDateTimeInstance(DateFormat.LONG, DateFormat.LONG, l);

    System.out.printf("Locale: %s\nNumber: %s\nDate: %s\n\n",

    l.getDisplayName(),

    nf.format(number),

    df.format(now));

    }

    ```


    The previous code prints the following to the standard console.


    ```

    Creating from Builder...

    Locale: French (France)

    Number: 123 456 789

    Date: 14 septembre 2016 00:08:06 PDT

    Locale: Japanese (Japan)

    Number: 123,456,789

    Date: 2016/09/14 0:08:06 PDT

    Locale: English (United States)

    Number: 123,456,789

    Date: September 14, 2016 12:08:06 AM PDT

    ```


    Another way to create `Locale` instances is by using the static `Locale.forLanguageTag()`
    method. This method allows you to use BCP 47 language tag arguments. The following
    code uses the `forLanguageTag()` method to create three locales from their corresponding
    language tags.


    ```

    ...

    System.out.printf("Creating from BCP 47 language tags...\n\n");

    String[] bcp47LangTags= {"fr-FR", "ja-JP", "en-US"};

    Locale l = null;

    NumberFormat nf = null;

    DateFormat df = null;

    for (String langTag: bcp47LangTags) {

    l = Locale.forLanguageTag(langTag);

    nf = NumberFormat.getInstance(l);

    df = DateFormat.getDateTimeInstance(DateFormat.LONG, DateFormat.LONG, l);

    System.out.printf("Locale: %s\nNumber: %s\nDate: %s\n\n",

    l.getDisplayName(),

    nf.format(number),

    df.format(now));

    }

    ...

    ```


    The output is similar to the results created from the `Builder`-generated `Locale`
    instance.


    ```

    Creating from BCP 47 language tags...

    Locale: French (France)

    Number: 123 456 789

    Date: 14 septembre 2016 01:07:22 PDT

    ...

    ```


    You can also use constructors to create instances. The following code shows how
    to do this.


    ```

    Locale l = new Locale("fr", "FR");

    ```


    Other constructors allow you to pass fewer or more arguments. The argument parameters
    can include language, region, and optional variant codes.


    Finally, the `Locale` class has many predefined static instances for some commonly
    used cases. Because the instances are predefined, your code needs to reference
    only the static instances. For example, the following example shows how to reference
    existing static instances representing `fr-FR`, `ja-JP`, and `en-US` locales.


    ```

    Locale frenchInFrance = Locale.FRANCE;

    Locale japaneseInJapan = Locale.JAPAN;

    Locale englishInUS = Locale.US;

    ```


    ## How It Works


    The `Locale` class gives locale-sensitive classes the context to perform culturally
    appropriate data formatting and parsing. Some of the locale-sensitive classes
    include the following.


    - `java.text.NumberFormat`

    - `java.text.DateFormat`

    - `java.util.Calendar`


    A `Locale` instance identifies a specific language and can be finely tuned to
    identify languages written in a particular script or spoken in a specific world
    region. It is an important and necessary element for creating anything that depends
    on language or regional influences.


    The Java `Locale` class is always being enhanced to support modern BCP 47 language
    tags. BCP 47 defines the best common practices for using ISO standards for language,
    region, script, and variant identifiers. Although the existing `Locale` constructors
    continue to be compatible with prior versions of the Java platform, the constructors
    do not support the additional script tags. For example, only the more recently
    added `Locale.Builder` class and `Locale.forLanguageTag()` method support the
    newer functionality that identifies scripts. Because the `Locale` constructors
    do not enforce strict BCP 47 compliance, you should avoid the constructors in
    any new code. Instead, developers should use the `Builder` class and the `forLanguageTag()`
    method.


    A `Locale.Builder` instance has a variety of setter methods that help you configure
    it to create a valid, BCP 47–compliant `Locale` instance.


    - `public Locale.Builder setLanguage(String language)`

    - `public Locale.Builder setRegion(String region)`

    - `public Locale.Builder setScript(String script)`


    Each of these methods throws a `java.util.IllFormedLocaleException` if its argument
    is not a well-formed element of the BCP 47 standard. The language parameter must
    be a valid two- or three-letter ISO 639 language identifier. The region parameter
    must be a valid two-letter ISO 3166 region code or a three-digit M.49 United Nations
    “area” code. Finally, the script parameter must be a valid four-letter ISO 15924
    script code.


    The `Builder` lets you configure it to create a specific BCP 47–compliant locale.
    Once you set all the configurations, the `build()` method creates and returns
    a `Locale` instance. Notice that all the setters can be chained together for a
    single statement. The `Builder` pattern works by having each configuration method
    return a reference to the current instance, on which further configuration methods
    may be called.


    ```

    Locale aLocale = new Builder().setLanguage("fr").setRegion("FR").build();

    ```


    The BCP 47 document and the standards that comprise it can be found at the following
    locations.


    - ISO 3166 (region identifiers): [`www.iso.org/iso-3166-country-codes.html`](http://www.iso.org/iso-3166-country-codes.html)

    - ISO 15924 (script identifiers): [`https://unicode.org/iso15924/`](https://unicode.org/iso15924/)

    - United Nations M.49 (area identifiers): [`https://unstats.un.org/unsd/methods/m49/m49.htm`](https://unstats.un.org/unsd/methods/m49/m49.htm)


    ## 11.3 Matching and Filtering Locales


    ### Problem


    You want to match against or filter a list of locales and return only those that
    meet the specified criteria.'
