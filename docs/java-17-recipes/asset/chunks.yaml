    The `java.lang.Math` class contains plenty of helper methods to make our lives
    easier when working with numbers. The `round()` methods are no exception since
    they can easily round floating-point or double values. One version of the `java.lang.Math
    round()` method accepts a float as an argument. It rounds the float to the closest
    int value, with ties rounding up. If the argument is *not a number* (NaN), a zero
    is returned. When arguments that are positive or negative infinity are passed
    into a `round()` method, a result equal to the value of `Integer.MAX_VALUE` or
    `Integer.MIN_VALUE`, respectively, is returned. The second version of the `java.lang.Math
    round()` method accepts a double value, which is rounded to the closest long value,
    with ties rounding up. Like the other `round()` method, if the argument is NaN,
    a zero is returned. Similarly, when positive or negative infinity arguments are
    passed into a `round()` method, a result is equal to a `Long.MAX_VALUE` or `Long.MIN_VALUE`
    value is returned.


    Note


    NaN, POSITIVE_INFINITY, and NEGATIVE_INFINITY are constant values defined within
    the `Float` and `Double` classes. NaN (Not a Number) is an undefined or unrepresentable
    value. For example, a NaN value can be produced by dividing `0.0f` by `0.0f`.
    The values represented by POSITIVE_INFINITY and NEGATIVE_INFINITY refer to values
    produced by operations that generate such extremely large or negative values of
    a particular type (floating-point or double) that they cannot be represented normally:
    the output is Infinity or –Infinity. For instance, 1.0/0.0 or –1.0/0.0 would produce
    such values. In fact, Java uses some special numeric values to handle the floating-point
    arithmetic results of such an operation due to its specification of the division
    operations. On the other hand, an ArithmeticException error is thrown for the
    integer. Test the following code.


    ```

    public static void main(String[] args){

