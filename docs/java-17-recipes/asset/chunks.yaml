    ### 工作原理


    普通的 `ResultSet` 对象只允许向前获取结果。应用程序可以从检索到的第一条记录开始，一直处理到默认 `ResultSet` 对象的最后一条记录。有时，应用程序在遍历
    `ResultSet` 对象时需要更多功能。例如，假设你想编写一个应用程序，允许用户显示检索到的第一条或最后一条记录，或者通过结果进行向前或向后翻页。使用标准的
    `ResultSet` 很难做到这一点。然而，通过创建一个可滚动的 `ResultSet`，你可以轻松地在结果中向后和向前移动。


    要创建可滚动的 `ResultSet` 对象，你必须首先创建一个能够生成可滚动 `ResultSet` 的 `Statement` 或 `PreparedStatement`
    实例。创建 `Statement` 时，必须将 `ResultSet` 滚动类型常量值传递给 `Connection` 对象的 `createStatement()`
    方法。同样，在使用 `PreparedStatement` 时，必须将滚动类型常量值传递给 `Connection` 对象的 `prepareStatement()`
    方法。


    你还必须传递一个 `ResultSet` 并发常量，以告知 `ResultSet` 是否可更新。默认值是 `ResultSet.CONCUR_READ_ONLY`，这意味着
    `ResultSet` 对象不可更新。另一种并发类型是 `ResultSet.CONCUR_UPDATABLE`，表示一个可更新的 `ResultSet`
    对象。


    在本技巧的解决方案中，使用了 `PreparedStatement` 对象。创建一个能够生成可滚动 `ResultSet` 的 `PreparedStatement`
    对象，代码如下所示。


    ```

    pstmt = conn.prepareStatement(sql, ResultSet.TYPE_SCROLL_INSENSITIVE,

    ResultSet.CONCUR_READ_ONLY);

    ```


    一旦创建了 `PreparedStatement` 对象，就会返回一个可滚动的 `ResultSet`。你可以通过调用 `ResultSet` 的方法来指示要移动的方向或要定位的位置，从而使用可滚动的
    `ResultSet` 在多个方向上进行遍历。以下代码行检索 `ResultSet` 中的第一条记录。


    ```

    ResultSet rs = pstmt.executeQuery();

    rs.first();

    ```


    本技巧的解决方案演示了几种不同的滚动方向。具体来说，你可以看到调用了 `ResultSet` 的 `first()`、`next()`、`last()` 和
    `previous()` 方法，以移动到 `ResultSet` 中的不同位置。


    可滚动的 `ResultSet` 对象在应用程序开发中有一席之地。它们是那种在你需要时就能派上用场的便利功能，但也是你可能并不经常需要的东西。


