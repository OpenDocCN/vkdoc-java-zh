  trans: '

    Eclipse 会在项目资源管理器窗格中显示新创建的文件，并在工作台的中央窗格中打开该文件供您编辑。清单 13-9 显示了其内容。


    ```


    在此处插入标题


    清单 13-9

    java17recipe 项目 index.jsp

    ```


    将“在此处插入标题”替换为 **我的第一个项目**（或者您喜欢的任何内容），并在 `<body>` 和 `</body>` 之间输入 **来自 Eclipse
    的问候！**。然后保存文件。


    注意


    在 Eclipse 内部使用 Tomcat 之前，您必须在 Windows 中停止 Tomcat 服务，反之亦然。


    将光标定位在项目资源管理器中显示的测试项目文件夹上，右键单击，然后选择“运行方式” ➤ “在服务器上运行”，如图 13-12 所示。


    ![](img/323910_4_En_13_Fig12_HTML.jpg)


    图 13-12

    Eclipse——第一个项目在 Tomcat 上运行


    当屏幕出现时，单击“完成”。您将看到如图 13-13 所示的结果。


    ![](img/323910_4_En_13_Fig13_HTML.jpg)


    图 13-13

    Eclipse——第一个项目的输出


    Eclipse 能够启动 Tomcat 并在工作台内显示输出，这看起来可能非常方便。但实际上，它有几个缺点。首先，由于侧边和底部窗格的存在，中央窗格可用的空间有限。因此，大多数网页会“过于拥挤”而无法正确显示。您可以通过双击标题栏来最大化网页面板，但还有一个更重要的原因：Eclipse
    并不总是显示所有内容。它应该将项目文件夹中的所有文件复制到 Tomcat 的工作目录，但它并没有！它往往会“丢失”CSS 文件和图像。这意味着，除了快速检查简单功能外，您可能还想在
    Eclipse 中使用 Tomcat 配合外部浏览器。


    打开浏览器并输入 `localhost:8080/test`。您应该在浏览器页面上看到相同的结果，如图 13-14 所示（示例中为 Chrome 浏览器）。


    ![](img/323910_4_En_13_Fig14_HTML.jpg)


    图 13-14

    浏览器中的第一个项目主页


    第二种选择是在外部使用 Tomcat。要在 Eclipse 外部查看 `test` 项目的输出，首先，通过右键单击工作台“服务器”选项卡下的“内部”Tomcat
    并选择 `停止` 来停止它。然后，在 Windows 中启动 Tomcat 服务。

    像在 Eclipse 内部启动时一样，右键单击测试项目文件夹，但这次选择“导出” ➤ “WAR 文件”。当“WAR 导出”屏幕出现时，您只需浏览并选择目标位置，该位置应为
    `%CATALINA_HOME%\webapps\test.war`，然后单击“完成”。


    在浏览器中，输入 `http://localhost:8080/test` 以查看项目的输出。这是可行的，因为 Tomcat 会自动解压其在 `webapps`
    文件夹中发现的所有 WAR 文件，无需重新启动。并且，默认情况下，Tomcat 会查找 `index.html`、`index.htm` 和 `index.jsp`。如果您愿意，可以通过将以下元素添加到
    `web.xml` 的 `web-app` 元素主体中来更改默认设置。


    ```

    whatever.jsp


    ```


    工作原理

    Web 应用程序的开发需要协调多个不同的文件。虽然可以在不使用 IDE 的情况下开发 Java EE Web 应用程序，但使用开发环境可以使这项任务变得非常简单。在本节中，Eclipse
    EE IDE 负责配置 Web 应用程序。


    13.6 创建 Servlet


    问题

    您想为 Web 应用程序项目创建一个控制器。


    解决方案

    通过“文件” ➤ “新建” ➤ “Servlet”创建一个 Java Servlet。在 `org.java17recipes.chapter13` 包中定义
    `FirstServlet`（按照惯例，类和 servlet 名称首字母大写）。检查 servlet 中的 `init` 和 `destroy` 方法非常重要。


    以下显示了新创建的 servlet 的 Java 代码。


    ```

    package org.java17recipes.chapter13;

    import java.io.IOException;

    import jakarta.servlet.ServletConfig;

    import jakarta.servlet.ServletException;

    import jakarta.servlet.annotation.WebServlet;

    import jakarta.servlet.http.HttpServlet;

    import jakarta.servlet.http.HttpServletRequest;

    import jakarta.servlet.http.HttpServletResponse;

    /**

    * Servlet implementation class FirstServlet

    */

    public class FirstServlet extends HttpServlet {

    private static final long serialVersionUID = 1L;

    /**

    * Default constructor.

    */

    public FirstServlet() {

    // TODO Auto-generated constructor stub

    }

    /**

    * @see Servlet#init(ServletConfig)

    */

    public void init(ServletConfig config) throws ServletException {

    // TODO Auto-generated method stub

    }

    /**

    * @see Servlet#destroy()

    */

    public void destroy() {

    // TODO Auto-generated method stub

    }

    /**

    * @see HttpServlet#doGet(HttpServletRequest request, HttpServletResponse response)

    */

    protected void doGet(HttpServletRequest request, HttpServletResponse response)
    throws ServletException, IOException {

    // TODO Auto-generated method stub

    response.getWriter().append("Served at: ").append(request.getContextPath());

    }

    /**

    * @see HttpServlet#doPost(HttpServletRequest request, HttpServletResponse response)

    */

    protected void doPost(HttpServletRequest request, HttpServletResponse response)
    throws ServletException, IOException {

    // TODO Auto-generated method stub

    doGet(request, response);

    }

    }

    ```


    输出如图 13-15 所示，您可以在其中看到粗体行。


    ![](img/323910_4_En_13_Fig15_HTML.jpg)


    图 13-15

    第一个 servlet 的浏览器输出


    注意


    如果您曾使用过 javax.* 包，它已重命名为 jakarta.* 包。如果您针对的是 Servlet API 5.0 或更新版本（Tomcat 10 中使用的
    Jakarta EE 9 的一部分），则需要替换包才能使其编译。否则，您可能会遇到“在 Java 构建路径上未找到超类“javax.servlet.http.HttpServlet””的错误。


    工作原理

    Servlet 是 Java 类，它们在 *servlet* *容器*（例如，Tomcat、TomEE 9、WildFly、GlassFish）中运行，并作为标准
    Web 资源公开。这些类处理来自 HTML 表单的数据，并处理一个或多个客户端的请求和响应。最新版本是 2020 年发布的 Jakarta Servlet
    5.0。Servlet 对应于 MVC 架构中的控制器，并实现了许多复杂的功能。我们可以使用单个 servlet 来处理不同的行为，或者为每个行为使用多个
    servlet。

    简而言之，客户端向（Web 应用程序服务器中的）servlet 发送请求。Servlet 被实例化（仅第一次），启动一个线程来处理通信，并构建转发给客户端的响应。如果
    servlet 已加载，它会创建一个与新客户端关联的附加线程。Servlet 内部通常没有算法代码，而是委托给其他类。请求和响应由 `jakarta.Servlet.http.HttpServletRequest`（从客户端环境获取信息）和
    `jakarta.Servlet.http.HttpServletResponse`（向客户端发送响应）接口管理。另一个组件（`jakarta.Servlet.ServletContext`）用于查找应用程序上下文的引用。


    Servlet 具有一个生命周期，其特征如下元素和方法。


    *   Servlet 的初始化（`init()` 方法），仅由 servlet 引擎在第一次调用

    *   对 POST 请求的响应（`doPost(HttpServletRequestrequest req`, `HttpServletResponseresponse
    res)` 方法）

    *   对 GET 请求的响应（`doGet(HttpServletRequestrequest req, HttpServletResponseresponse
    res)` 方法）

    *   Servlet 上下文的销毁（`destroy()` 方法）


    让我们创建一个单一的 servlet，根据来自数据输入表单的参数实现不同的行为。这些操作是方法调用（`doGet` 方法或 `doPost` 方法）的结果。

