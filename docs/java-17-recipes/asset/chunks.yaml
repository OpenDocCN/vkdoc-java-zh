  trans: '

    ### 工作原理


    `ThreadPoolExecutor` 由两个组件构成：`Queue<E>`（待执行的任务队列）和 `Executor`（定义任务执行方式）。`Queue<E>`
    中填充了 `Runnable` 对象，其 `run()` 方法包含了待执行的代码。


    `ThreadPoolExecutor` 使用的 `Queue<E>` 组件实现了 `BlockingQueue<E>` 接口，该接口表示一种队列：当 `Queue<E>`
    中没有元素时，队列的消费者会等待（被挂起）。这对于 `ThreadPoolExecutor` 的高效运行是必要的。


    第一步是将需要并行执行的任务填充到 `Queue<E>` 中。这通过调用 `Queue<E>` 的 `add()` 方法并传入一个实现了 `Runnable`
    接口的类来完成。完成后，执行器（executor）即被初始化。


    `ThreadPoolExecutor` 初始化后，调用 `prestartAllCoreThreads()` 方法，该方法会创建 `CorePoolSize`
    指定数量的线程来“预热” `ThreadPoolExecutor`，并在队列非空时主动开始从 `Queue<E>` 中消费任务。


    调用 `ThreadPoolExecutor` 的 `shutdown()` 方法以等待所有任务完成。通过调用此方法，`ThreadPoolExecutor`
    被指示不再接受队列中的新事件（之前提交的事件会继续处理完毕）。这是 `ThreadPoolExecutor` 有序终止的第一步。调用 `awaitTermination()`
    方法以等待 `ThreadPoolExecutor` 中的所有任务完成。该方法会强制主线程等待，直到 `ThreadPoolExecutor` 队列中的所有
    `Runnable` 对象执行完毕。所有 `Runnable` 对象执行完成后，主线程被唤醒并继续执行。


    ## 10.7 协调线程


    ### 问题


    你的应用程序需要协调两个或更多线程，使其同步工作。


    ### 解决方案 1


    通过使用 wait/notify 进行线程同步，可以协调线程。在此方案中，主线程等待 `objectToSync` 对象，直到数据库加载线程执行完毕。数据库加载线程完成后，它会通知
    `objectToSync`，告知所有等待该对象的线程可以继续执行。将订单加载到系统中时也采用相同流程。主线程等待 `objectToSync`，直到订单加载线程通过调用
    `objectToSync.notify()` 方法通知 `objectToSync` 继续执行。确保库存和订单都加载完成后，主线程执行 `processOrder()`
    方法来处理所有订单。


    ```

    public static void main(String[] args) {

    Recipe10_7_1 recipe = new Recipe10_7_1();

    recipe.start();

    }

    private final Object objectToSync = new Object();

    private void start() {

    loadItems();

    Thread inventoryThread = new Thread(() -> {

    System.out.println("Loading Inventory from Database...");

    loadInventory();

    synchronized (objectToSync) {

    objectToSync.notify();

    }

    });

    synchronized (objectToSync) {

    inventoryThread.start();

    try {

    objectToSync.wait();

    } catch (InterruptedException e) {

    e.printStackTrace();

    }

    }

    Thread ordersThread = new Thread(() -> {

    System.out.println("Loading Orders from XML Web service...");

    loadOrders();

    synchronized (objectToSync) {

    objectToSync.notify();

    }

    });

    synchronized (objectToSync) {

    ordersThread.start();

    try {

    objectToSync.wait();

    } catch (InterruptedException e) {

    e.printStackTrace();

    }

    }

    processOrders();

    }

    private void processOrders() {

    orderList.stream().forEach((order) -> {

    boolean fulfillable = canFulfill(order);

    if (fulfillable) {

    doFulfill (order);

    System.out.println("Order # " + String.valueOf(order.getOrderId()) + " has been
    fulfilled");

    } else {

    System.out.println("Order # "+String.valueOf(order.getOrderId())+" CANNOT be fulfilled");

    }

    });

    }

    ```


    输出如下：


    ```

    Loading Inventory from Database...

    Loading Orders from XML Web service...

    Order # 0 has been fulfilled

    Order # 1 has been fulfilled

    Order # 2 has been fulfilled

    Order # 3 has been fulfilled

    Order # 4 has been fulfilled

    Order # 5 CANNOT be fulfilled

    Order # 6 has been fulfilled

    Order # 7 has been fulfilled

    Order # 8 has been fulfilled

    Order # 9 has been fulfilled

    Order # 10 has been fulfilled

    Order # 11 has been fulfilled

    Order # 12 has been fulfilled

    Order # 13 CANNOT be fulfilled

    Order # 14 has been fulfilled

    Order # 15 CANNOT be fulfilled

    Order # 16 CANNOT be fulfilled

    Order # 17 has been fulfilled

    Order # 18 has been fulfilled

    Order # 19 has been fulfilled

    Order # 20 has been fulfilled

    Order # 21 has been fulfilled

    Order # 22 has been fulfilled

    ...

    ```


    ### 解决方案 2


    你可以使用 `CountDownLatch` 对象来控制主线程何时继续执行。在以下代码中，创建了一个初始值为 2 的 `CountDownLatch`；然后创建并启动两个线程，分别用于加载库存和加载订单信息。当这两个线程各自执行完毕后，它们会调用
    `CountDownLatch` 的 `countDown()` 方法，该方法将锁存器的值减一。主线程会一直等待，直到 `CountDownLatch` 的值变为
    0，此时主线程恢复执行。


    ```

    public static void main(String[] args) {

    Recipe10_7_2 recipe = new Recipe10_7_2();

    recipe.start();

    }

    CountDownLatch latch = new CountDownLatch(2);

    private void start() {

    loadItems();

    Thread inventoryThread = new Thread(() -> {

    System.out.println("Loading Inventory from Database...");

    loadInventory();

    latch.countDown();

    });

    inventoryThread.start();

    Thread ordersThread = new Thread(() -> {

    System.out.println("Loading Orders from XML Web service...");

    loadOrders();

    latch.countDown();

    });

    ordersThread.start();

    try {

    latch.await();

    } catch (InterruptedException e) {

    e.printStackTrace();

    }

    processOrders();

    }

    ```


    输出如下：


    ```

    Loading Inventory from Database...

    Loading Orders from XML Web service...

    Order # 0 has been fulfilled

    Order # 1 has been fulfilled

    Order # 2 has been fulfilled

    Order # 3 has been fulfilled

    Order # 4 has been fulfilled

    Order # 5 has been fulfilled

    Order # 6 has been fulfilled

    Order # 7 has been fulfilled

    Order # 8 has been fulfilled

    Order # 9 has been fulfilled

    Order # 10 has been fulfilled

    Order # 11 has been fulfilled

    Order # 12 has been fulfilled

    Order # 13 has been fulfilled

    ...

    ```


    ### 解决方案 3


    `Thread.join()` 允许你等待一个线程执行完毕。以下示例中有一个用于加载库存的线程和另一个用于加载订单的线程。每个线程启动后，调用 `inventoryThread.join()`
    会使主线程等待 `inventoryThread` 执行完毕后再继续。


    ```

    public static void main(String[] args) {

    Recipe10_7_3 recipe = new Recipe10_7_3();

    recipe.start();

    }

    private void start() {

    loadItems();

    Thread inventoryThread = new Thread(() -> {

    System.out.println("Loading Inventory from Database...");

    loadInventory();

    });

    inventoryThread.start();

    try {

    inventoryThread.join();

    } catch (InterruptedException e) {

    e.printStackTrace();

    }

    Thread ordersThread = new Thread(() -> {

    System.out.println("Loading Orders from XML Web service...");

    loadOrders();

    });

    ordersThread.start();

    try {

    ordersThread.join();

    } catch (InterruptedException e) {

    e.printStackTrace();

    }

    processOrders();

    }

