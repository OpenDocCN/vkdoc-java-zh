- fmt: '### How It Works


    Java packages are useful for organizing source files, controlling access to different
    classes, and ensuring that there are no naming conflicts. Packages are represented
    by a series of physical directories on a file system, and they can contain any
    number of Java source files. Each source file must contain a `package` statement
    before any other statements in the file. This `package` statement lists the name
    of the package in which the source file resides. The source included the following
    package statement in the solution to this recipe.


    ```

    package org.javabook;

    ```


    This `package` statement indicates that the source file resides within a directory
    named `javabook`, which resides within a directory named `org`. Package naming
    conventions can vary by company or organization. However, words must be in all
    lowercase so that they do not conflict with any Java class file names. Many companies
    or organizations use the reverse of their domain name for package naming. However,
    underscores should be used if a domain name includes hyphens.


    Note


    When a class resides within a Java package, it is no longer referenced by only
    the class name; instead, the package name is prepended to the class name, known
    as the *fully qualified* name. For instance, the class that resides within the
    file `JavaBookWidgets.java` is contained within the `org.javabook` package. The
    class is referenced using `org.javabook.JavaBookWidgets`, not simply `JavaBookWidgets`.
    An identically named class can reside within a different package (e.g., `org.java17recipes.JavaBookWidgets`).


    Packages are very useful for establishing levels of security as well as organization.
    By default, different classes that reside within the same package have access
    to each other. If a source file resides within a package different from another
    file it needs to use, an `import` statement must be declared at the top of the
    source file (underneath the package statement) to import that other file. And
    the source file must declare the class/interface/enum element type as `public`;
    otherwise, the fully qualified `package.class` name must be used within the code.
    Classes may be imported separately, as demonstrated in the following `import`
    statement.


    ```

    import org.javabook.JavaBookWidgets;

    ```


    However, it is often likely that all classes and type files that reside within
    a package need to be used. A single `import` statement utilizing a wildcard character
    (`*`) can import all files within a named package as follows.


    ```

    import org.javabook.*;

    ```


    Although it is possible to import all files, it is not recommended unless necessary.
    It is considered a poor programming practice to include many `import` statements
    that use the wildcard. Instead, classes and type files should be imported individually.


    Organizing classes within packages can prove to be very helpful. Suppose that
    the widget application described in the solution to this recipe includes different
    Java classes for each widget object. Each widget class could be grouped into a
    single package named `org.javabook.widgets`. Similarly, each of the widgets could
    extend some Java type or interface. All such interfaces could be organized into
    a package named `org.javabook.interfaces`.


    Any substantial Java application includes packages. Any Java library or application
    programming interface (API) that you use includes packages. When you import classes
    or types from those libraries and APIs, you are really importing packages.


    ## 1.8 Declaring Variables and Access Modifiers


    ### Problem


    You want to create some variables and manipulate data within your program. Furthermore,
    you wish to make some of the variables available to only the current class, whereas
    others should be available to all classes or only the other classes within the
    current package.


    ### Solution


    Java implements eight primitive data types. There is also special support for
    the `String` class type. Listing [1-4](#323910_4_En_1_Chapter.xhtml#PC24) shows
    an example declaration of each. Draw from the example to declare the variables
    needed in your own application.


    ```

    package org.java17recipes.chapter01.recipe01_08;

    public class DeclarationsExample {

    public static void main (String[] args) {

    boolean booleanVal = true;  /* Default is false */

    char charval = ''G'';         /* Unicode UTF-16 */

    charval = ''\u0490'';         /* Ukrainian letter Ghe(Ґ) */

    byte byteval;       /*  8 bits, -127 to 127 */

    short shortval;     /* 16 bits, -32,768 to 32,768 */

    int intval;         /* 32 bits, -2147483648 to 2147483647 */

    long longval;       /* 64 bits, -(2^64) to 2^64 - 1 */

    float   floatval = 10.123456F;        /* 32-bit IEEE 754 */

    double doubleval = 10.12345678987654; /* 64-bit IEEE 754 */

    String message = "Darken the corner where you are!";

    message = message.replace("Darken", "Brighten");

    }

    }

    Listing 1-4

    Declarations for Primitive and String Types

    ```


    Note


    If you’re curious about the Ukrainian letter in Listing [1-4](#323910_4_En_1_Chapter.xhtml#PC24),
    it is the Cyrillic letter *Ghe with upturn*. You can read about its history at
    [`http://en.wikipedia.org/wiki/Ghe_with_upturn`](http://en.wikipedia.org/wiki/Ghe_with_upturn).
    You can find its code point value in the chart at [`www.unicode.org/charts/PDF/U0400.pdf`](http://www.unicode.org/charts/PDF/U0400.pdf).
    And the URL [`www.unicode.org/charts/`](http://www.unicode.org/charts/) is a good
    place to start whenever you need to find the code point corresponding to a given
    character.


    Variables are subject to the concept of *visibility*. Those created in Listing
    [1-5](#323910_4_En_1_Chapter.xhtml#PC25) are visible from the `main()` method
    after being created, and they are deallocated when the `main()` method ends. They
    have no “life” beyond the `main()` method and are not accessible from outside
    of `main()`.


    Variables created at the class level are a different story. Such variables can
    be termed as *class fields or class members*, as in *fields or members of the
    class*. The use of a member can be restricted to objects of the class in which
    it is declared or to the package in which it is declared, or it can be accessed
    from any class in any package.


    ```

    package org.java17recipes.chapter01.recipe01_08;

    class TestClass {

    private long visibleOnlyInThisClass;

    double visibleFromEntirePackage;

    void setLong (long val) {

    visibleOnlyInThisClass = val;

    }

    long getLong () {

    return visibleOnlyInThisClass;

    }

    }

    public class VisibilityExample {

    public static void main(String[] args) {

    TestClass tc = new TestClass();

    tc.setLong(32768);

    tc.visibleFromEntirePackage = 3.1415926535;

    System.out.println(tc.getLong());

    System.out.println(tc.visibleFromEntirePackage);

    }

    }

    Listing 1-5

    Visibility and the Concept of Fields

    ```


    The following is the output.


    ```

    32768

    3.1415926535

    ```


    Members are typically bound to an object of a class. Each class object contains
    an instance of each member in the class. However, you can also define *static*
    fields that occur only once and with a single value that is shared by all instances
    of the given class. Listing [1-6](#323910_4_En_1_Chapter.xhtml#PC27) illustrates
    the difference.


    ```

    package org.java17recipes.chapter01.recipe01_08;

    class StaticDemo {

    public static boolean oneValueForAllObjects = false;

    }

    public class StaticFieldsExample {

    public static void main (String[] args) {

    StaticDemo sd1 = new StaticDemo();

    StaticDemo sd2 = new StaticDemo();

    System.out.println(sd1.oneValueForAllObjects);

    System.out.println(sd2.oneValueForAllObjects);

    sd1.oneValueForAllObjects = true;

    System.out.println(sd1.oneValueForAllObjects);

    System.out.println(sd2.oneValueForAllObjects);

    }

    }

    Listing 1-6

    Static Fields

    ```


    Listing [1-6](#323910_4_En_1_Chapter.xhtml#PC27) produces the following output.


    ```

    false

    false

    true

    true

    ```'
