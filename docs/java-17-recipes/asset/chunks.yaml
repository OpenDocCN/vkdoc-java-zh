    You want to obtain a specified date’s year, year-month, or month.


    ### Solution 1


    To obtain the year-month of a specified date, use the `java.time.YearMonth` class.
    This class represents the month of a specific year. In the following lines of
    code, the `YearMonth` object obtains the year and month of the current date and
    another specified date.


    ```

    public static void obtainYearMonth() {

    YearMonth yearMo = YearMonth.now();

    System.out.println("Current Year and month:" + yearMo);

    YearMonth specifiedDate = YearMonth.of(2021, Month.NOVEMBER);

    System.out.println("Specified Year-Month: " + specifiedDate);

    }

    ```


    Here is the result.


    ```

    Current Year and month:2021-10

    Specified Year-Month: 2021-11

    ```


    ### Solution 2


    To obtain the month-day for the current date or a specified date, simply use the
    `java.time.MonthDay` class. The following lines of code demonstrate how to obtain
    a month-day combination.


    ```

    public static void obtainMonthDay(){

    MonthDay monthDay = MonthDay.now();

    System.out.println("Current month and day: " + monthDay);

    MonthDay specifiedDate = MonthDay.of(Month.NOVEMBER, 12);

    System.out.println("Specified Month-Day: " + specifiedDate);

    }

    ```


    Here’s the result.


    ```

    Current month and day: --10-24

    Specified Month-Day: --11-12

    ```


    The main is:


    ```

    public static void main(String[] args) {

    obtainYearMonth();

    obtainMonthDay();

    }

    ```


    Note that by default, `MonthDay` does not return a very useful format.


    ### How It Works


    The Date-Time API includes classes that make it easy to obtain the date information
    that your application requires. Two of those are the `YearMonth` and `MonthDay`
    classes. The `YearMonth` class obtains the date in year-month format. It contains
    a few methods that obtain the year-month combination. As demonstrated in the solution,
    you can call the `now()` method to obtain the current year-month combination.
    Like the `LocalDate` class, `YearMonth` also contains an `of()` method that accepts
    a year in `int` format and a number that represents the month of the year. In
    the solution, `Month` enum obtains the month value.


    Like the `YearMonth` class, `MonthDay` obtains the date in a month-day format.
    It also contains a few different methods for obtaining the month-day combination.
    Solution 2 demonstrates two such techniques. Obtaining the current month-day combination
    by calling the `now()` method and using the `of()` method to obtain a month-day
    combination for a specified date. The `of()` method accepts an `int` value for
    the month of the year as its first parameter, and for the second parameter it
    accepts an `int` value indicating the day of the month.


    ## 4.10 Obtaining and Calculating Times Based on the Current Time


    ### Problem


    You want to obtain the current time to stamp a given record. You would also like
    to perform calculations based on that time.


    ### Solution


    Use the `LocalTime` class, which is part of the new Date-Time API, to obtain and
    display the current time. In the following lines of code, the `LocalTime` class
    is demonstrated.


    ```

    public static void currentTime(){

    LocalTime time = LocalTime.now();

    System.out.println("Current Time: " + time);

    }

    ```


    Once the time has been obtained, methods can be called against the `LocalTime`
    instance to achieve the desired result. In the following lines of code, there
    are some examples of using the `LocalTime` methods.


    ```

    // atDate(LocalDate): obtain the local date and time

    LocalDateTime ldt = time.atDate(LocalDate.of(2021,Month.NOVEMBER,12));

    System.out.println("Local Date Time object: " + ldt);

    // of(int hours, int min): obtain a specific time

    LocalTime pastTime = LocalTime.of(1, 10);

    // compareTo(LocalTime): compare two times.  Positive

    // return value returned if greater

    System.out.println("Comparing times: " + time.compareTo(pastTime));

    // getHour(): return hour in int value (24-hour format)

    int hour = time.getHour();

    System.out.println("Hour: " + hour);

    // isAfter(LocalTime): return Boolean comparison

    System.out.println("Is local time after pastTime? " + time.isAfter(pastTime));

    // minusHours(int): Subtract Hours from LocalTime

    LocalTime minusHrs = time.minusHours(5);

    System.out.println("Time minus 5 hours: " + minusHrs);

    // plusMinutes(int): Add minutes to LocalTime

    LocalTime plusMins = time.plusMinutes(30);

    System.out.println("Time plus 30 mins: " + plusMins);

    ```


    Here are the results.


    ```

    Current Time: 12:43:58.048247

    Local Date Time object: 2021-11-12T12:43:58.048247

    Comparing times: 1Hour: 12

    Is local time after pastTime? true

    Time minus 5 hours: 07:43:58.048247

    Time plus 30 mins: 13:13:58.048247

    ```


    The main is:


    ```

    public static void main(String[] args){

    currentTime();

    }

    ```'
