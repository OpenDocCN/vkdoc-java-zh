    执行这段代码的结果演示了使用流的概念。遍历数据集合不再需要外部迭代（`for` 循环）。


    ### 工作原理


    在 Java 8 之前，遍历集合需要某种循环块。这被称为*外部迭代*，也称为按顺序的*程序化循环*。在大多数情况下，`for` 循环会遍历集合中的每个元素，并根据应用程序的需求处理每个元素。虽然
    `for` 循环是执行迭代的合理解决方案，但它既不够直观，又过于冗长。自 Java 8 发布以来，遍历集合的样板代码被移除，同时也不再需要详细说明迭代是如何完成的。编译器已经知道如何迭代集合，那么为什么还要精确地告诉它怎么做呢？为什么不直接告诉编译器你想要迭代集合并对每个元素执行一个任务呢？流的概念实现了这种放手式的迭代方法。


    让编译器来处理不直观的循环，只需将任务交给编译器，并告诉它对每个元素执行什么操作。这个概念被称为*内部迭代*。通过内部迭代，你的应用程序决定需要迭代什么，而
    JDK 决定如何执行迭代。内部迭代不仅减轻了编写循环逻辑的需求，还具有其他优势。其中一个优势是内部迭代不限于按顺序迭代元素。因此，JDK 决定如何迭代，为手头的任务选择最佳算法。内部迭代也更容易利用并行计算。这个概念涉及将任务细分为更小的问题，同时解决每个问题，然后合并结果。


    流是在所有集合类型上生成的对象引用序列。Stream API 使得对这些对象引用执行一系列聚合操作成为可能，并返回结果或内联地将更改应用于对象。这也被称为*管道*。生成和使用流的伪代码如下所示。


    ```

    Collection -> (Stream) -> (零个或多个中间操作) -> (终端操作)

    ```


    让我们把这个伪代码放到一个真实的例子中。在解决方案中，一个 `Stock` 对象列表用于演示流迭代。假设你想打印出每个股数超过指定阈值（本例中为 100 股）的股票。你可以使用以下代码来执行此任务。


    ```

    myStocks.stream()

    .filter(s -> s.getShares() > 100.0)

    .forEach(s->System.out.println(s.getName()));

    ```


    在前面的例子中，一个称为 `filter()` 的*中间*操作对元素施加了一个限制，从而过滤掉所有不匹配所提供谓词的元素。该谓词以 lambda 表达式形式编写；它测试每个元素并返回一个布尔结果。该示例中的*终端*操作使用
    `forEach()` 来打印每个匹配的元素。终端操作是管道中的最后一个操作，它产生一个非流的结果，例如一个原始值、集合或根本不产生值。在示例中，没有返回任何结果。


    要在 `Collection` 类型上生成流，请调用 `stream()` 方法，该方法返回一个 `Stream` 类型。在大多数情况下，`Stream`
    类型不是期望的结果，因此 Stream API 使得可以在流上调用零个或多个中间操作，形成一个操作管道。例如，在解决方案中，`Stock` 对象列表使用以下代码按股数排序。请注意，`Comparator
    byShares` 被应用于流中的每个对象，并返回 `Stream<Stock>` 作为结果。


    ```

    Stream sortedByShares = myStocks.stream()

    .sorted(byShares);

    ```


    在前面的示例中，对流执行了一个单一的中间操作 `sorted()`。如前所述，可以有多个中间操作链接到这个管道，从而对满足前一个操作条件的对象执行下一个操作。每个中间操作都返回一个
    `Stream` 类型。每个管道可以包含一个终端操作，从而将终端操作应用于每个结果流对象。如前所述，终端操作可能会也可能不会返回结果。在前面的示例中，没有应用终端操作。


    注意


    Stream 的文档（[`https://docs.oracle.com/en/java/javase/17/docs/api/java.base/java/util/stream/Stream.html`](https://docs.oracle.com/en/java/javase/17/docs/api/java.base/java/util/stream/Stream.html)）列出了流上所有可用的中间操作和终端操作。


    流对 Java 编程语言来说是一个革命性的变化。它们改变了开发者对程序的思考方式，使开发者更高效，代码更高效。虽然像 `for` 循环这样的传统迭代技术仍然被认为是有效的过程，但在使用
    Java 8 或更高版本时，流是首选的迭代技术。


    ## 7.9 遍历 Map


    ### 问题


    你使用了某个 `Map` 类，例如 `HashMap` 或 `TreeMap`，并且需要遍历其键、值或两者。你还希望在遍历映射的同时从中移除元素。

    '
- fmt: '### Solution


    There are multiple ways to iterate a `Map` class. The method you choose should
    depend on which portions of the map you need to access and whether you need to
    remove elements from the map while iterating. The `StockPortfolio1` class is a
    continuation of the `StockPorfolio` class shown in the previous recipe. It adds
    three methods—`summary()`, `alertList()`, and `remove(List<String>)`—that demonstrate
    alternative methods for iterating over the portfolio map: `Map<String, Stock>
    portfolio = new HashMap<>();`.


    The following is the class.


    ```java

    import org.java17recipes.chapter07.recipe07_07.Stock;

    import org.java17recipes.chapter07.recipe07_06.StockScreener;

    import java.util.ArrayList;

    import java.util.HashMap;

    import java.util.Iterator;

    import java.util.List;

    import java.util.Map;

    import java.util.stream.Collectors;

    public class StockPortfolio1 implements Iterable {

    Map portfolio = new HashMap();

    public void add(Stock stock) {

    portfolio.put(stock.getSymbol(), stock);

    }

    public void add(List stocks) {

    for (Stock s : stocks) {

    portfolio.put(s.getSymbol(), s);

    }

    }

    public void remove(String stock) {

    portfolio.remove(stock);

    }

    public void remove(List sellList) {

    Iterator keyIter = portfolio.keySet().iterator();

    while (keyIter.hasNext()) {

    if (sellList.contains(keyIter.next())) {

    keyIter.remove();

    }

    }

    }

    /**

    * Utilize for-loop to traverse Map keys and apply filter to obtain desired

    * stocks

    * @return

    */

    public List alertListLegacy() {

    System.out.println("==Legacy technique for filtering and collecting==");

    List alertList = new ArrayList();

    for (Stock stock : portfolio.values()) {

    if (!StockScreener.screen(stock.getSymbol(), StockScreener.Screen.PE, 20)) {

    alertList.add(stock);

    }

    }

    return alertList;

    }

    /**

    * Utilize stream and filters to obtain desired stocks

    * @return

    */

    public List alertList(){

    return

    portfolio.values().stream()

    .filter(s->!StockScreener.screen(s.getSymbol(), StockScreener.Screen.PE, 20))

    .collect(Collectors.toList());

    }

    public void summary() {

    System.out.println("==Legacy technique for traversing Map.Entry==");

    for (Map.Entry entry : portfolio.entrySet()) {

    System.out.println("Stock = " + entry.getKey() + ", Shares = " + entry.getValue().getShares());

    }

    System.out.println("==Utilization of new foreach and lambda combination==");

    portfolio.forEach((k,v)->System.out.println("Stock = " + k + ", Shares = " + v.getShares()));

    }

    @Override

    public Iterator iterator() {

    return portfolio.values().iterator();

    }

    public static void main(String[] args) {

    StockPortfolio1 myPortfolio = new StockPortfolio1();

    myPortfolio.add(new Stock("ORCL", "Oracle", 500.0));

    myPortfolio.add(new Stock("AAPL", "Apple", 200.0));

    myPortfolio.add(new Stock("GOOG", "Google", 100.0));

    myPortfolio.add(new Stock("IBM", "IBM", 50.0));

    myPortfolio.add(new Stock("MCD", "McDonalds", 300.0));

    // foreach loop (uses Iterator returned from iterator() method)

    for (Stock stock : myPortfolio) {

    System.out.println(stock);

    }

    myPortfolio.forEach((stock)->System.out.println(stock));

    List sellList = new ArrayList();

    sellList.add("IBM");

    sellList.add("GOOG");

    myPortfolio.remove(sellList);

    System.out.println("Portfolio Summary:");

    myPortfolio.summary();

    System.out.println("Alerts:");

    for (Stock stock : myPortfolio.alertList()) {

    System.out.println("Alert: " + stock.getSymbol());

    }

    }

    }

    ```


    The output is:


    ```

    100.0 shares of GOOG (Google)

    200.0 shares of AAPL (Apple)

    50.0 shares of IBM (IBM)

    500.0 shares of ORCL (Oracle)

    300.0 shares of MCD (McDonalds)

    100.0 shares of GOOG (Google)

