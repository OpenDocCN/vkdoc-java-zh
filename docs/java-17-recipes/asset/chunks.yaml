    ### How It Works


    Ordinary `ResultSet` objects allow results to be fetched in a forward direction.
    An application can process a default `ResultSet` object from the first record
    retrieved forward to the last. Sometimes an application requires more functionality
    when it comes to traversing a `ResultSet` object. For instance, let’s say you
    want to write an application that allows someone to display the first or last
    record retrieved, or perhaps page forward or backward through results. You could
    not do this very easily using a standard `ResultSet`. However, by creating a scrollable
    `ResultSet`, you can easily move backward and forward through the results.


    To create a scrollable `ResultSet` object, you must first create an instance of
    `Statement` or `PreparedStatement` that can create a scrollable `ResultSet`. When
    creating the `Statement`, you must pass the `ResultSet` scroll type constant value
    to the `Connection` object’s `createStatement()` method. Likewise, you must pass
    the scroll type constant value to the `Connection` object’s `prepareStatement()`
    method when using `PreparedStatement`.


    You must also pass a `ResultSet` concurrency constant to advise whether `ResultSet`
    is intended to be updatable. The default is `ResultSet.CONCUR_READ_ONLY`, which
    means that the `ResultSet` object is not updatable. The other concurrency type
    is `ResultSet.CONCUR_UPDATABLE`, which signifies an updatable `ResultSet` object.


    In the solution to this recipe, a `PreparedStatement` object is used. Creating
    a `PreparedStatement` object that can generate a scrollable `ResultSet` looks
    like the following line.


    ```

    pstmt = conn.prepareStatement(sql, ResultSet.TYPE_SCROLL_INSENSITIVE,

    ResultSet.CONCUR_READ_ONLY);

    ```


    Once the `PreparedStatement` object has been created, a scrollable `ResultSet`
    is returned. You can traverse in several directions using a scrollable `ResultSet`
    by calling the `ResultSet` methods indicating the direction you want to move or
    the placement that you want to be. The following line of code retrieves the first
    record within the `ResultSet`.


    ```

    ResultSet rs = pstmt.executeQuery();

    rs.first();

    ```


    The solution to this recipe demonstrates a few different scroll directions. Specifically,
    you can see that the `ResultSet.first()`, `next()`, `last()`, and `previous()`
    methods are called to move to different positions within the `ResultSet`.


    Scrollable `ResultSet` objects have a niche in application development. They are
    one of those niceties that are there when you need them, but they are also something
    that you might not need very often.


    ## 12.10 Creating an Updatable ResultSet


    ### Problem


    An application task has queried the database and obtained results. You have stored
    those results into a `ResultSet` object, and you want to update some of those
    values in `ResultSet` and commit them back to the database.


    ### Solution


    Make your `ResultSet` object updatable, and then update the rows as needed while
    iterating through the results. The following example method demonstrates how to
    make `ResultSet` updatable and then how to update content within that `ResultSet`,
    eventually persisting it in the database.


    ```

    private static void queryAndUpdateDbRecipes(String recipeNumber){

    String sql = "SELECT ID, RECIPE_NUMBER, RECIPE_NAME, DESCRIPTION " +

    "FROM RECIPES " +

    "WHERE RECIPE_NUMBER = ?";

    ResultSet rs = null;

    try (PreparedStatement pstmt =

    conn.prepareStatement(sql, ResultSet.TYPE_SCROLL_SENSITIVE, ResultSet.CONCUR_UPDATABLE);){

    pstmt.setString(1, recipeNumber);

    rs = pstmt.executeQuery();

    while(rs.next()){

    String desc = rs.getString(4);

    System.out.println("Updating row" + desc);

    rs.updateString(4, desc + " -- More to come");

    rs.updateRow();

    }

    } catch (SQLException ex) {

    ex.printStackTrace();

    } finally {

    if (rs != null){

    try {

    rs.close();

    } catch (SQLException ex) {

    ex.printStackTrace();

    }

    }

    }

    }

    ```


    The main method is:


    ```

    public class UpdateResultSetExample {

    public static Connection conn = null;

    public static void main(String[] args) {

    boolean successFlag = false;

    try {

    CreateConnection createConn = new CreateConnection();

    conn = createConn.getConnection();

    // Perform Initial Query

    queryDbRecipes();

    // Update Resultset Row

    queryAndUpdateDbRecipes("12-1");

    // Query to see final results

    queryDbRecipes();

    } catch (java.sql.SQLException ex) {

    System.out.println(ex);

    } finally {

    if (conn != null) {

    try {

    conn.close();

    } catch (SQLException ex) {

    ex.printStackTrace();

    }

    }

    }

    }

    }

    ```


    This method could be called passing a string value containing a recipe number.
    Suppose that the recipe number `"12-1"` was passed to this method; the following
    output would be the result.


    ```

