    ### 工作原理


    许多应用程序需要使用当前日历日期，通常还需要获取当前时间。实现这一目标有多种方法，本攻略的解决方案展示了其中三种。日期时间 API 包含一个`LocalDateTime`类，通过调用其`now()`方法即可捕获当前日期和时间。若要获取指定的日期和时间，可在调用`LocalDateTime.of()`时传入相应的整数和月份类型参数。此外，通过`LocalDateTime`实例还可使用多种方法，例如`getHours()`、`getMinutes()`、`getNanos()`和`getSeconds()`，这些方法允许对日期和时间进行更精细的控制。`LocalDateTime`实例还包含用于执行计算、转换、比较等操作的方法。本攻略的解决方案
    1 演示了`LocalDateTime`的使用，展示了如何执行计算以及获取日期和时间的部分信息以供进一步使用。


    默认情况下，`java.util.Date`类可以在无参实例化时返回当前日期和时间。`Date`类也可以通过`getTime()`方法返回当前时间。如解决方案所述，`getTime()`方法返回自
    1970 年 1 月 1 日 00:00:00 GMT 以来所使用`Date`对象表示的毫秒数。针对`Date`对象，还可以调用其他几种方法，将当前日期和时间分解为更细粒度的时间间隔。例如，`Date`类拥有`getHours()`、`getMinutes()`、`getSeconds()`、`getMonth()`、`getDay()`、`getTimezoneOffset()`和`getYear()`方法。但除`getTime()`外，不建议使用这些方法中的任何一个，因为它们都已通过`java.time.LocalDateTime`和`java.util.Calendar
    get()`方法被标记为弃用。当某个方法或类被弃用时，不应再继续使用，因为它可能会在 Java 语言的未来版本中被移除。不过，`Date`类中包含的少数方法尚未被标记为弃用，因此`Date`类很可能会包含在
    Java 的未来版本中。这些保留不变的方法包括`after()`、`before()`、`compareTo()`、`setTime()`和`equals()`比较方法。本攻略的解决方案
    2 演示了实例化一个 Date 对象并打印出当前日期和时间。


    如前所述，`Date`类有许多方法已被弃用，不应再使用。在本攻略的解决方案 3 中，演示了`java.util.Calendar`类作为获取这些信息的一个后继者。`Calendar`类是在
    JDK 1.1 中引入的，当时许多`Date`方法被弃用。从解决方案 3 可以看出，`Calendar`类包含了`Date`类中的所有相同功能，但`Calendar`类更加灵活。`Calendar`类包含用于在特定时间和日期之间进行转换以及以各种方式操作日历的方法。`Calendar`类在
    Java 8 中新增了几个方法，其中一个新方法是`java.util`。


    对于某些应用程序来说，`Date`类已经足够。例如，在处理时间戳时，`Date`类可能很有用。但是，如果应用程序需要对日期和时间进行详细操作，则建议使用`LocalDateTime`或`Calendar`类，它们都包含了`Date`类的所有功能以及更多特性。本攻略中的所有解决方案在技术上都是合理的；请选择最适合您应用程序需求的那个。


    ## 4.12 获取机器时间戳


    ### 问题


    您需要从系统获取一个基于机器的时间戳。


    ### 解决方案


    使用`Instant`类，它表示基于机器时间的时间线上纳秒的起点。在以下示例中，`Instant`类获取系统时间戳。`Instant`类也用于其他场景，例如基于`Instant`计算不同日期。


    ```

    public static void instants(){

    Instant timestamp = Instant.now();

    System.out.println("当前时间戳: " + timestamp);

    //现在减去三天

    Instant minusThree = timestamp.minus(3, ChronoUnit.DAYS);

    System.out.println("现在减去三天:" + minusThree);

    ZonedDateTime atZone = timestamp.atZone(ZoneId.of("GMT"));

    System.out.println(atZone);

    Instant yesterday = Instant.now().minus(24, ChronoUnit.HOURS);

    System.out.println("昨天: " + yesterday);

    }

    ```


    以下是输出结果。


    ```

    当前时间戳: 2021-10-13T21:06:50.203477900Z

    现在减去三天:2021-10-10T21:06:50.203477900Z

    2021-10-13T21:06:50.203477900Z[GMT]

