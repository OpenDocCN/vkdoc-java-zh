- fmt: '### How It Works


    One of the trickier parts of using a programming language can come when comparing
    two or more values, particularly string values. In the Java language, comparing
    strings can be fairly straightforward, keeping in mind that you should *not* use
    the `==` for string comparison. This is because the comparison operator (`==`)
    compares references, not values of strings. One of the most tempting things to
    do when programming with strings in Java is to use the comparison operator, but
    you must not because the results can vary.


    **Note:** Java uses interning of strings to speed up performance. This means that
    the JVM contains a table of interned strings, and each time the `intern()` method
    is called on a string, a lookup is performed on that table to find a match. The
    interning returns a canonical representation of the string. If no matching string
    resides within the table, the string is added, and a reference is returned. If
    the string already resides within the table, the reference is returned. Java automatically
    interns string literals, which can cause variations when using the `==` comparison
    operator.


    In the solution to this recipe, you can see various techniques for comparing string
    values. The `equals()` method is a part of every Java object. The Java string
    `equals()` method has been overridden to compare the values contained within the
    string rather than the object itself. As you can see from the following examples
    that have been extracted from the solution to this recipe, the `equals()` method
    is a safe way to compare strings.


    ```

    // Comparison is equal

    if (one.equals(var1)){

    System.out.println ("String one equals var1 using equals");

    }

    // Comparison is NOT equal

    if (one.equals(two)){

    System.out.println ("String one equals two using equals");

    }

    ```


    The `equals()` method first checks whether the strings reference the same object
    using the `==` operator; it returns `true` if they do. If they do not reference
    the same object, `equals()` compare each string character by character to determine
    whether the strings being compared to each other contain the same values. What
    if one of the strings has a different case setting than another? Do they still
    compare equal to each other using `equals()`? The answer is no, and that is why
    the `equalsIgnoreCase()` method was created. Comparing two values using `equalsIgnoreCase()`
    causes each of the characters to be compared without paying attention to the case.
    The following examples have been extracted from the solution to this recipe.


    ```

    // Comparison is NOT equal

    if (two.equals(var2)){

    System.out.println ("String two equals var2 using equals");

    }

    // Comparison is equal

    if (two.equalsIgnoreCase(var2)){

    System.out.println ("String two equals var2 using equalsIgnoreCase");

    }

    ```


    The `compareTo()` and `compareToIgnoreCase()` methods perform a lexicographical
    comparison of the strings. This comparison is based on the Unicode value of each
    character contained within the strings. The result is a negative integer if the
    string lexicographically precedes the argument string. The result is a positive
    integer if the string lexicographically follows the argument string. The result
    is zero if both strings are lexicographically equal. The following excerpt from
    the solution to this recipe demonstrates the `compareTo()` method.


    ```

    // Comparison is equal

    if (one.compareTo(var1) == 0){

    System.out.println("One is equal to var1 using compareTo()");

    }

    ```


    Inevitably, many applications contain code that must compare strings at some level.
    The next time you have an application requiring string comparison, consider the
    information discussed in this recipe before writing the code.


    ## 3.4 Trimming Whitespace


    ### Problem


    One of the strings you are working with contains some whitespace on either end.
    You want to get rid of that whitespace.


    ### Solution


    Use the string `trim()` method to eliminate the whitespace. In the following example,
    a sentence is printed, including whitespace on either side. The same sentence
    is then printed again using the `trim()` method to remove the whitespace so that
    the changes can be seen.


    ```

    String myString = " This is a String that contains whitespace.   ";

    System.out.println(myString);

    System.out.println(myString.trim());

    ```


    The output print as follows.


    ```

    This is a String that contains whitespace.

    This is a String that contains whitespace.

    ```


    ### How It Works


    Regardless of how careful we are, whitespace can always become an issue when working
    with strings of text. This is especially the case when comparing strings against
    matching values. If a string contains an unexpected whitespace character, that
    could be disastrous for a pattern-searching program. Luckily, the Java `String`
    object contains the `trim()` method that can automatically remove whitespace from
    each end of any given string.


    The `trim()` method is very easy to use. As you can see from the solution to this
    recipe, all that is required to use the `trim()` method is a call against any
    given string. `String` objects contain many helper methods, making them very easy
    to work with. After all, strings are one of the most commonly used data types
    in any programming language, so they’d better be easy to use! The `trim()` method
    returns a copy of the original string with all leading and trailing whitespace
    removed. If, however, there is no whitespace to be removed, the `trim()` method
    returns the original string instance. It does not get much easier than that!


    ## 3.5 Discovering Blank Strings


    ### Problem


    You want to know if the string is empty or contains whitespace.


    ### Solution


    Use the `java.lang.String.isBlank()` method that returns a Boolean variable.


    ```

    boolean blank = string.isBlank();

    ```


    In the following examples, the method returns `true` only when the strings are
    empty or have only whitespace characters.


    The following is an example.


    ```

    System.out.println("".isBlank());

    prints True in the Console pane, while:

    System.out.println(" ".isBlank());

    prints True in the Console pane:

    but:

    System.out.println("Luciano Manelli".isBlank());

    prints False in the Console pane.

    ```


    ### How It Works


    Before Java 11, there was only the `java.lang.String.isEmpty()` method, which
    checks if this string is empty. It returns `true` if the length is 0; otherwise,
    it is `false`.


    The following is an example.


    ```

    System.out.println("".isEmpty());

    prints True in the Console pane, while:

    System.out.println(" ".isEmpty());

    prints False in the Console pane.

    In Java 11 the new isBlank() method is equal to trim().isEmpty().

    ```


    ## 3.6 Stripping Whitespace


    ### Problem


    You want to remove whitespace.


    ### Solution


    Use the `java.lang.String.strip()` method, which deletes whitespaces, as shown
    in Listing 3-1.


    ```

    class StripClassExample

    {

    public static void main(String[] args)

    {

    String nameString = "  Ciao Sara!   ";

    System.out.println( nameString.strip() );

    System.out.println( nameString.stripLeading() );

    System.out.println( nameString.stripTrailing() );

    }

    }

    ```


    **Listing 3-1** Using the `strip` Method


    It returns the following output.


    ```

    //"Ciao Sara!"

    //"Ciao Sara!   "

    //"  Ciao Sara!"

    ```


    ### How It Works


    The `strip` method was introduced in Java 11 to remove the whitespace from both,
    beginning and the end of the string. It produces the same result of `trim()`,
    while `stripLeading()` removes the whitespace from the beginning and `stripTrailing()`
    removes the whitespace from the end.


    ## 3.7 Breaking String Lines


    ### Problem


    You want to break the string into lines.'
