    14.6 检查电子邮件


    问题

    你需要检查指定电子邮件账户是否有新邮件到达。


    解决方案

    你可以使用 `javax.mail.Store` 来连接、查询和检索来自互联网消息访问协议（IMAP）电子邮件账户的邮件。例如，以下代码连接到一个 IMAP
    账户，检索该账户中的最后五封邮件，并将这些邮件标记为“已读”。


    ```

    public static void main(String[] args) {

    Recipe14_6 recipe = new Recipe14_6();

    recipe.start();

    }

    private void start() {

    String username = "username";

    String password = "password";

    String folder = "Inbox";

    String host = "imap.host.com";

    Properties properties = new Properties();

    properties.put("mail.imap.host", host);

    properties.put("mail.imap.ssl.enable", "true");

    properties.put("mail.imap.auth", "true");

    try {

    Session session = Session.getInstance(properties, new javax.mail.Authenticator()
    {

    protected PasswordAuthentication getPasswordAuthentication() {

    return new PasswordAuthentication(username, password);

    }

    });

    session.setDebug(true);

    Store store = session.getStore("imap");

    store.connect(host,username,password);

    System.out.println(store);

    Folder inbox = store.getFolder(folder);

    inbox.open(Folder.READ_WRITE);

    int messageCount = inbox.getMessageCount();

    int startMessage = messageCount - 10;

    if (startMessage< 1) startMessage =1;

    Message messages[]  = inbox.getMessages(startMessage, messageCount);

    for (Message message : messages) {

    boolean hasBeenRead = false;

    for (Flags.Flag flag : message.getFlags().getSystemFlags()) {

    if (flag == Flags.Flag.SEEN) {

    hasBeenRead = true;

    break;

    }

    }

    message.setFlag(Flags.Flag.SEEN, false);

    System.out.println(message.getSubject() + " "+ (hasBeenRead? "(read)" : "") +
    message.getContent());

    }

    inbox.close(true);

    } catch (MessagingException | IOException e) {

    e.printStackTrace();

    }

    }

    ```


    工作原理

    `Store` 对象允许你访问电子邮件邮箱信息。通过创建一个 `Store` 对象，然后请求 Inbox（收件箱）文件夹，你就可以访问 IMAP 账户主邮箱中的邮件。利用文件夹对象，你可以使用
    `getMessages(start, end)` 方法请求下载收件箱中的邮件。收件箱还提供了一个 `getMessageCount()` 方法，用于了解收件箱中有多少封邮件。请注意，邮件的索引从
    1 开始。

    每封邮件都有一组标志，可以指示邮件是否已被阅读（`Flags.Flag.SEEN`）或是否已被回复（`Flags.Flag.ANSWERED`）。通过解析
    `SEEN` 标志，你可以处理之前未读的邮件。

    要将邮件标记为已读（或已回复），请调用 `message.setFlag()` 方法。此方法允许你设置（或重置）邮件标志。如果你要设置邮件标志，需要以 `READ_WRITE`（读写）模式打开文件夹，以便更改邮件标志。你还需要在代码末尾调用
    `inbox.close(true)`，以告知 JavaMail API 将更改刷新到 IMAP 存储中。


