- fmt: '### Packages


    The solution example begins by creating a Java *package*.


    ```

    package org.java17recipes.chapter01.recipe01_05;

    ```


    Packages are a way of grouping related classes together into a shared namespace.
    The idea is to achieve universal uniqueness by working your way down your organization’s
    domain name in reverse order. It is also customary to write package names in all
    lowercase.


    Eclipse creates a directory structure to imitate your package path. In this case,
    Eclipse created the following directory path.


    ```

    C:\eclipse-workspace\java17Recipes\src\org\java17recipes\chapter01\recipe01_05

    ```


    The following are some things to notice about this path.


    - The front part is `C:\eclipse-workspace`. Eclipse creates all projects under
    a workspace directory that you can change. Developers specify different paths.

    - Next is the first occurrence of `java17Recipes`. This corresponds to the project
    name (see Figure [1-10](#323910_4_En_1_Chapter.xhtml#Fig10)).

    - Any source files you create go into the `src` directory. Eclipse creates other
    directories at this level. For example, Eclipse creates a `bin` directory, and
    then underneath it is a `classes` subdirectory to hold your compiled class files.

    - The directories mirroring the package path that you specify are last, in this
    case, `org\java17recipes\chapter01\recipe01_05`. An identical structure is created
    under the `bin\classes` directory when you compile your code. Note that if using
    another IDE, you may see differences in the directories that are created.


    You need to explicitly create a package. Organization and a judiciously chosen
    naming convention are important when developing any significant application.


    ### JavaBeans-style Classes


    Next in the solution example is a class definition following the JavaBeans pattern.
    The definition of `HelloMessage` follows a pattern that you often encounter in
    Java programming, and we include it for that reason. The class is simple, capable
    of holding a single string field named `message`.


    Three methods are defined in the class.


    - `HelloMessage()`. This method, also known as the constructor, is named the same
    as the class. In this case, it takes no arguments. It’s automatically invoked
    whenever you create a new object of the class. Note that this is known as a no-arg
    or *no-argument* constructor because it is typed out within the class and takes
    no arguments. If you do not supply a constructor, the JVM supply a default constructor
    (also takes no arguments) automatically.

    - `setMessage(String)`. This accessor method begins with the word `set`. It takes
    one parameter. It specifies the message to be returned by the corresponding `get`
    method.

    - `getMessage()`. This accessor method returns the currently defined message.
    In this example, we chose to make the message uppercase.


    Note


    Accessor methods are used in JavaBeans classes to access any privately declared
    class members. In this case, the private variable identified as `message` can
    be accessed using these methods. Accessor methods are more commonly referred to
    as getters and setters.


    Methods beginning with `set` and `get` are the *setter* and *getter* methods.
    The IDE generates these methods. The `message` variable is private to the class,
    which means you have no direct access to `message` from outside the class.


    You see the `this` keyword used in the class. It is a special keyword in Java
    that references the current object. Its use is redundant but would be needed if
    any of the methods happened to create variables of their own that were also named
    `message`: the setter is mandatory due to the parameter name. It is common practice
    to use the `this` keyword to reference the class members from within the getter
    and setter methods, mostly for the latter.


    It is common in Java to mediate access to class variables through setter and getter
    methods like in our example. Those methods represent a contract of sorts with
    other classes and your main program: public methods let the class state to be
    read or written, but the external code is unaware of the mapping. Their benefit
    is that you can change the storage implementation of `HelloMessage` however you
    like. It has its fields and state information saved and restored independently
    from the type of storage. The other code that depends on `HelloMessage` continues
    to work properly so long as you maintain the external behavior of `setMessage()`
    and `getMessage()`.


    ### The Main Program


    When you execute the currently selected class, Eclipse compiles the code to a
    set of binary files and then transfers control to the `main()` method. Eclipse
    can also be configured to recompile on save, which would then cause the transfer
    of control to the `main()` method. That method, in turn, does the following.


    1. Executes `HelloMessage` to create a variable named `hm` that can hold an instance
    of the `HelloMessage` class. The `hm` variable is null at this point.

    2. Invokes `new HelloMessage()` to create an object of the class by that name.
    The no-argument constructor is executed, and `"Default Message"` is now set as
    the greeting text. The new object is now stored in the `hm` variable.

    3. Makes a call to `System.out.println()` to show that the object’s no-argument
    constructor has indeed executed as expected. The getter changes to uppercase the
    text and returns the value. The `"DEFAULT MESSAGE"` greeting is displayed in the
    Console pane.

    4. Sets the message to be the traditional `"Hello, World"` text.

    5. Makes another call to `System.out.println()` to output the new message that
    was just set. Now you see the greeting `"HELLO, WORLD"` added to the Console pane
    has become uppercase.


    The pattern in the solution is common in Java programming. The `main()` method
    is where execution begins. Variables are defined, and objects are created using
    the `new` operator. Object variables are often set and retrieved using setter
    and getter methods.


    ## 1.6 Configuring the CLASSPATH


    ### Problem


    You want to execute a Java program or include an external Java library in the
    application you are executing.


    ### Solution


    Set the `CLASSPATH` variable equal to the directory location of the user-defined
    Java classes or Java Archive (JAR) files you need to have access to to execute
    your application. Let’s say that you have a directory named `JAVA_DEV` located
    at the root of your OS drive, and all the files your applications need to access
    are located in this directory. If this is the case, you would execute a command
    such as the following.


    ```

    set CLASSPATH=C:\JAVA_DEV\some-jar.jar

    ```


    Use the following in Unix and Linux systems.


    ```

    export CLASSPATH=/JAVA_DEV/some-jar.jar

    ```


    Alternately, the `javac` command provides an option for specifying the location
    of resources to be loaded for an application. On all platforms, setting the `CLASSPATH`
    using this technique can be done via the `-classpath` option as follows.


    ```

    javac –classpath /JAVA_DEV/some-jar.jar...

    ```


    Of course, the file path uses the backslash (\) on Microsoft Windows machines.


    Note


    The `javac –cp` option may be used, rather than specifying the `-classpath` option.'
