    The Java regular expressions are similar to those used in the Perl language. Although
    there is a lot to learn about Java regular expressions, the most important points
    to understand from this recipe are the following.


    *   Your regular expressions can contain non-ASCII characters from the full range
    of Unicode characters.


    *   Because of a peculiarity of how the Java language compiler understands the
    backslash character, you must use two backslashes in your code instead of one
    for the predefined character class expressions.


    The most convenient and readable way to use non-ASCII characters in regular expressions
    is to type them directly into your source files using your keyboard input methods.
    Operating systems and editors differ in how they allow you to enter complex text
    outside of ASCII. Regardless of the operating system, you should save the file
    in the UTF-8 encoding if your editor allows it. As an alternate but more difficult
    way to use non-ASCII regular expressions, you can encode characters using the
    `\uXXXX` notation. Using this notation, instead of directly typing the character
    using your keyboard, you enter **\u** or **\U**, followed by the hexadecimal representation
    of the Unicode code point. This recipe’s code sample uses the Japanese word “文字”
    (pronounced *mo-ji*). As the example shows, you can use the actual characters
    in the regular expression or look up the Unicode code point values. For this particular
    Japanese word, the encoding is `\u6587\u5B57`.


    The Java language’s regular expression support includes special character classes.
    For example, `\d` and `\w` are shortcut notations for the regular expressions
    `[0-9]` and `[a-zA-Z_0-9]`, respectively. However, because of the Java compiler’s
    special handling of the backslash character, you must use an extra backslash when
    using predefined character classes such as `\d` (digits), `\w` (word characters),
    and `\s` (space characters). To use them in source code, for example, you enter
    **\\d**, **\\w**, and **\\s**, respectively. The sample code used the double backslash
    in Solution 1 to represent the `\w` character class.


    ```

    String enRegEx = "^The \\w+ cat.*";

    ```


    ## 11.5 Overriding the Default Currency


    ### Problem


    You want to display a number value using a currency not associated with the default
    locale.


    ### Solution


    Take control of which currency is printed with a formatted currency value by explicitly
    setting the currency used in a `NumberFormat` instance. The following example
    assumes that the default locale is `Locale.JAPAN`. It changes the currency by
    calling the `setCurrency(Currency c)` method of its `NumberFormat` instance. This
    example comes from the `org.java17recipes.chapter11.recipe11_05.Recipe11_5` class.


    ```

    public static void main(String[] args) {

    Recipe11_5 app  = new Recipe11_5();

    app.run();

    }

    public void run() {

    BigDecimal value = new BigDecimal(12345);

    System.out.printf("Default locale: %s\n", Locale.getDefault().getDisplayName());

    NumberFormat nf = NumberFormat.getCurrencyInstance();

    String formattedCurrency = nf.format(value);

    System.out.printf("%s\n", formattedCurrency);

    Currency c = Currency.getInstance(Locale.US);

    nf.setCurrency(c);

    formattedCurrency = nf.format(value);

    System.out.printf("%s\n\n", formattedCurrency);

    }

    ```


    The previous code prints out the following.


    ```

    Default locale: 日本語 (日本)

    ¥12,345

    USD12,345

    ```


    ### How It Works


    You use a `NumberFormat` instance to format currency values. You should explicitly
    call the `getCurrencyInstance()` method to create a formatter for currencies.


    ```

    NumberFormat nf = NumberFormat.getCurrencyInstance();

    ```


    The previous formatter uses your default locale’s preferences for formatting numbers
    as currency values. Also, it uses a currency symbol associated with the locale’s
    region. However, one common use case involves formatting a value for a different
    region’s currency.


    Use the `setCurrency()` method to explicitly set the currency in the number formatter.


    ```

    nf.setCurrency(aCurrencyInstance); // requires a Currency instance

    ```


    Note that the `java.util.Currency` final class is a factory. It allows you to
    create currency objects in two ways.


    *   `Currency.getInstance(Locale locale)`


    *   `Currency.getInstance(String currencyCode)`


    The first `getInstance` call uses a `Locale` instance to retrieve a currency object.
    The Java platform associates a default currency with the locale’s region. In this
    case, the default currency currently associated with the United States is the
    US dollar.


    ```

    Currency c1 = Currency.getInstance(Locale.US);

    ```


    The second `getInstance` call uses a valid ISO 4217 currency code. The currency
    code for the US dollar is USD.


    ```

    Currency c2 = Currency.getInstance("USD");

    ```


    Once you have a currency instance, you simply have to use that instance in your
    formatter.


    ```

    nf.setCurrency(c2);

    ```


    This formatter is configured to use the default locale’s number format symbols
    and patterns to format the number value, but it displays the targeted currency
    code as part of the displayable text. This allows you to mix the default number
    format patterns with other currency codes.


    ## 11.6 Converting Byte Arrays to and from Strings


    ### Problem


    You need to convert characters in a byte array from a legacy character set encoding
    to a Unicode string.


    ### Solution


    Convert legacy character encodings from a byte array to a Unicode string using
    the `String` class. The following code snippet from the `org.java17recipes.chapter11.recipe11_06.Recipe11_6`
    class demonstrates how to convert a legacy Shift-JIS encoded byte array to a string.
    Later in this same example, the code demonstrates how to convert Unicode back
    to the Shift-JIS byte array.


    ```

    public static void main(String[] args) {

    Recipe11_6 app = new Recipe11_6();

    app.run();

    }

    public void run() {

    byte[] legacySJIS = {(byte)0x82,(byte)0xB1,(byte)0x82,(byte)0xF1,

    (byte)0x82,(byte)0xC9,(byte)0x82,(byte)0xBF,

    (byte)0x82,(byte)0xCD,(byte)0x81,(byte)0x41,

    (byte)0x90,(byte)0xA2,(byte)0x8A,(byte)0x45,

    (byte)0x81,(byte)0x49};

    // Convert a byte[] to a String

    Charset cs =Charset.forName("SJIS");

    String greeting = new String(legacySJIS, cs);

    System.out.printf("Greeting: %s\n", greeting);

    ```


    This code prints out the converted text, which is “Hello, world!” in Japanese.


    ```

    Greeting: こんにちは、世界!

    ```


    Use the `getBytes()` method to convert characters from a string to a byte array.
    Building on the previous code, convert back to the original encoding with the
    following code and compare the results.


    ```

    // Convert a String to a byte[]

    byte[] toSJIS = greeting.getBytes(cs);

    // Confirm that the original array and newly converted array are same

    Boolean same = false;

    if (legacySJIS.length == toSJIS.length) {

    for (int x=0; x< legacySJIS.length; x++) {

    if(legacySJIS[x] != toSJIS[x]) break;

    }

    same = true;

    }

    System.out.printf("Same: %s\n", same.toString());

    ```


    As expected, the output indicates that the round-trip conversion back to the legacy
    encoding was successful. The original byte array and the converted byte array
    contain the same bytes.


    ```

    Same: true

    ```'
