    Eclipse 环境提高你的编程技能非常重要，Eclipse 是一个著名的免费开源 Java IDE，包含一个用于开发应用程序的工作区，你可以从 [`www.eclipse.org`](http://www.eclipse.org)
    下载。你可以在与相应章节同名的文件夹中找到这些示例。


    ### 工作原理


    Java 是一种面向对象的编程语言，基于具有属性和方法的类和对象。类是创建对象所必需的。要创建一个 Java 程序（即 .class 文件），你必须创建一个
