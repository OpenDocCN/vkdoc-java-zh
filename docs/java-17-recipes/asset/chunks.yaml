    }

    }

    }

    如果创建了一个文档然后将其删除，输出如下：

    Watch Event, press q to exit

    Watching :C:\eclipse-workspace\java17Recipes\.

    Event detected :test.txt ENTRY_CREATE

    Event detected :test.txt ENTRY_DELETE

    ```


    ### 工作原理


    NIO.2 包含一个内置的轮询机制，用于监控文件系统的变化。使用轮询机制，你可以等待事件并在指定的时间间隔内轮询更新。一旦事件发生，你可以处理并消费它。一个被消费的事件会通知
    NIO.2 框架，你已经准备好处理新的事件了。


    要开始监控一个文件夹，首先创建一个 `WatchService`，你可以用它来轮询变化。创建 `WatchService` 后，将 `WatchService`
    注册到一个路径上。路径代表文件系统中的一个文件夹。当 `WatchService` 注册到该路径时，你需要定义要监控的事件类型（参见表 8-1）。这些事件类型在
    `java.nio.file` 包的 `StandardWatchEventKinds` 类中声明。


    表 8-1


    watchEvents 的类型


    | WatchEvent | 描述 |

    | --- | --- |

    | `OVERFLOW` | 已溢出的事件（忽略） |

    | `ENTRY_CREATE` | 创建了一个目录或文件 |

    | `ENTRY_DELETE` | 删除了一个目录或文件 |

    | `ENTRY_MODIFY` | 修改了一个目录或文件 |


    将 `WatchService` 注册到路径后，你可以“轮询”`WatchService` 以获取事件发生情况。通过调用 `watchService.poll()`
    方法，你会等待该路径上发生文件/文件夹事件。使用 `watchService.poll(int timeout, Timeunit timeUnit)` 方法，会等待直到指定的超时时间到达才继续执行。如果
    `WatchService` 接收到事件，或者允许的时间已过，则继续执行。如果没有事件且超时时间已到，`watchService.poll(int timeout)`
    返回的 `WatchKey` 对象为 null；否则，返回的 `WatchKey` 对象包含已发生事件的相关信息。


    由于许多事件可能同时发生（例如，移动整个文件夹或将一堆文件粘贴到一个文件夹中），`WatchKey` 对象可能包含多个事件。你可以通过调用 `key.pollEvents()`
    方法，使用 `key` 来获取与该对象键关联的所有事件。


    `watchKey.pollEvents()` 调用返回一个可迭代的 `watchEvents` 列表。每个 `watchEvent` 包含事件所引用的实际文件或文件夹的信息（例如，整个子文件夹可能已被移动或删除）以及事件类型（添加、编辑、删除）。只有那些在
    `WatchService` 中注册的事件才会被处理。


    一旦事件被处理，调用 `EventKey.reset()` 非常重要。reset 返回一个布尔值，用于确定 `WatchKey` 是否仍然有效。如果 `WatchKey`
    被取消或其源 `WatchService` 被关闭，则该 `WatchKey` 变为无效。如果 `eventKey` 返回 false，你应该跳出监控循环。


    ## 8.11 读取属性文件


    ### 问题


    你想为应用程序建立一些配置设置。你想手动或以编程方式修改这些设置。此外，你希望某些配置可以在不重新编译和重新部署的情况下进行更改。

    '
- fmt: '### Solution


    创建一个属性文件来存储应用程序配置。使用`Properties`对象，加载存储在属性文件中的属性以供应用程序处理。属性也可以在属性文件中更新和修改。以下示例演示了如何读取名为`properties.conf`的属性文件，加载值供应用程序使用，最后设置一个属性并将其写入文件。


    ```java

    public class Ch_8_11_PropertiesExample {

    private void start() {

    File file = new File("properties.conf");

    Properties properties = null;

    try {

    if (!file.exists()) {

    file.createNewFile();

    }

    properties = new Properties();

    properties.load(new FileInputStream("properties.conf"));

    } catch (IOException e) {

    e.printStackTrace();

    }

    boolean shouldWakeUp = false;

    int startCounter = 100;

    String shouldWakeUpProperty = properties.getProperty("ShouldWakeup");

    shouldWakeUp = (shouldWakeUpProperty == null) ? false : Boolean.parseBoolean(shouldWakeUpProperty.trim());

    String startCounterProperty = properties.getProperty("StartCounter");

    try {

    startCounter = Integer.parseInt(startCounterProperty);

    } catch (Exception e) {

    System.out.println("Couldn''t read startCounter, defaulting to " + startCounter);

    }

    String dateFormatStringProperty = properties.getProperty("DateFormatString", "MMM
    dd yy");

    System.out.println("Should Wake up? " + shouldWakeUp);

    System.out.println("Start Counter: " + startCounter);

    System.out.println("Date Format String:" + dateFormatStringProperty);

    //setting property

    properties.setProperty("StartCounter", "250");

    try {

    properties.store(new FileOutputStream("properties.conf"), "Properties Description");

    } catch (IOException e) {

    e.printStackTrace();

    }

    properties.list(System.out);

    }

    public static void main(String[] args) {

    Ch_8_11_PropertiesExample propertiesExample = new Ch_8_11_PropertiesExample();

    propertiesExample.start();

    }

    }

    ```


    输出为：

    ```

    Should Wake up? false

    Start Counter: 250

    Date Format String:MMM dd yy

    -- listing properties --

    StartCounter=250

    ```


    ### 工作原理


    Java的`Properties`类帮助你管理程序属性。它允许你通过外部修改（有人编辑属性文件）或内部使用`Properties.store()`方法来管理属性。


    `Properties`对象可以在没有文件或预加载文件的情况下实例化。`Properties`对象读取的文件格式为`[name]=[value]`，并以文本形式表示。如果需要以其他格式存储值，则必须从字符串写入和读取。


    如果你期望文件在程序外部被修改（用户直接打开文本编辑器更改值），请务必对输入进行清理，例如修剪多余的空格，并在必要时忽略大小写。


    要以编程方式查询不同的属性，可以调用`getProperty(String)`方法，传入要检索值的属性的字符串名称。如果未找到该属性，该方法返回`null`。或者，你可以调用`getProperty(String,
    String)`方法，如果`Properties`对象中未找到该属性，则返回第二个参数作为其值。如果文件没有特定键的条目，指定默认值是一个好习惯。


    查看生成的属性文件时，你会注意到前两行指示了文件的描述和修改日期。这两行以`#`开头，在Java属性文件中相当于注释。`Properties`对象在处理文件时会跳过任何以`#`开头的行。


    > **注意**：如果允许用户直接修改配置文件，那么在从`Properties`对象检索属性时进行验证非常重要。属性值中最常见的问题之一是前导和/或尾随空格。如果指定布尔或整数属性，请确保它们可以从字符串解析。至少，在尝试解析时捕获异常，以应对非常规值（并记录违规值）。


    ## 8.12 解压文件


    ### 问题


    你的应用程序需要从压缩的`.zip`文件中解压和提取文件。


    ### 解决方案


    使用`java.util.zip`包，你可以打开一个`.zip`文件并遍历其条目。在遍历条目时，可以为目录条目创建目录。以下代码行演示了如何执行解压和文件迭代技术，如所述。


    ```java

    public class Ch_8_12_ZipExample {

    public static void

    main(String[] args) {

    Ch_8_12_ZipExample example = new Ch_8_12_ZipExample();

    example.start();

    }

    private void start() {

    ZipFile file = null;

    try {

    file = new ZipFile("file.zip");

    FileSystem fileSystem = FileSystems.getDefault();

    Enumeration entries = file.entries();

    String uncompressedDirectory = "uncompressed/";

    Files.createDirectory(fileSystem.getPath(uncompressedDirectory));

    while (entries.hasMoreElements()) {

    ZipEntry entry = entries.nextElement();

    if (entry.isDirectory()) {

    System.out.println("Creating Directory:" + uncompressedDirectory + entry.getName());

    Files.createDirectories(fileSystem.getPath(uncompressedDirectory +

    entry.getName()));

    } else {

    InputStream is = file.getInputStream(entry);

    System.out.println("File :" + entry.getName());

    BufferedInputStream bis = new BufferedInputStream(is);

    String uncompressedFileName = uncompressedDirectory + entry.getName();

    Path uncompressedFilePath = fileSystem.getPath(uncompressedFileName);

    Files.createFile(uncompressedFilePath);

    try (FileOutputStream fileOutput = new FileOutputStream(uncompressedFileName))
    {

    while (bis.available() > 0) {

    fileOutput.write(bis.read());

    }

    }

    System.out.println("Written :" + entry.getName());

    }

    }

    } catch (IOException e) {

    e.printStackTrace();

    }

    }

    }

    ```


    ### 工作原理


    要处理`.zip`存档的内容，请创建一个`ZipFile`对象。`ZipFile`对象可以通过将`.zip`存档的名称传递给构造函数来实例化。创建对象后，你可以访问指定的`.zip`文件信息。每个`ZipFile`对象包含代表存档中目录和文件的条目。通过遍历条目，你可以获取每个压缩文件的信息。每个`ZipEntry`实例都有压缩和未压缩的大小、名称以及未压缩字节的输入流。


    通过生成`InputStream`，可以将未压缩的字节读入字节缓冲区，然后（在我们的例子中）写入文件。使用`FileStream`，可以确定在不阻塞进程的情况下可以读取多少字节。一旦读取了确定的字节数，这些字节就会被写入输出文件。此过程持续进行，直到读取完所有字节。


    > **注意**：如果文件非常大，将整个文件读入内存可能不是一个好主意。如果需要处理大文件，最好先将其以未压缩格式写入磁盘（如示例所示），然后打开并分块加载。如果你处理的文件不大（可以通过检查`getSize()`方法来限制大小），则可能可以将其加载到内存中。


    ## 8.13 总结


    本章演示了在Java中处理文件和网络I/O的几个示例。你学习了如何序列化文件以存储到磁盘，以及如何使用Java API操作主机的文件系统。本章还涵盖了如何读写属性文件以及执行文件压缩。最后，本章简要介绍了Java
    9中新增的Process API特性。'
  raw: '### Solution


    Create a properties file to store the application configurations. Using the `Properties`
    object, load properties stored within the properties file for application processing.
    Properties can also be updated and modified within the properties file. The following
    example demonstrates how to read a properties file named `properties.conf`, load
    the values for application use, and finally set a property and write it to the
    file.


    ```

    public class Ch_8_11_PropertiesExample {

    private void start() {

    File file = new File("properties.conf");

    Properties properties = null;

    try {

    if (!file.exists()) {

    file.createNewFile();

    }

    properties = new Properties();

    properties.load(new FileInputStream("properties.conf"));

    } catch (IOException e) {

    e.printStackTrace();

    }

    boolean shouldWakeUp = false;

    int startCounter = 100;

    String shouldWakeUpProperty = properties.getProperty("ShouldWakeup");

    shouldWakeUp = (shouldWakeUpProperty == null) ? false : Boolean.parseBoolean(shouldWakeUpProperty.trim());

    String startCounterProperty = properties.getProperty("StartCounter");

    try {

    startCounter = Integer.parseInt(startCounterProperty);

    } catch (Exception e) {

    System.out.println("Couldn''t read startCounter, defaulting to " + startCounter);

    }

    String dateFormatStringProperty = properties.getProperty("DateFormatString", "MMM
    dd yy");

    System.out.println("Should Wake up? " + shouldWakeUp);

    System.out.println("Start Counter: " + startCounter);

    System.out.println("Date Format String:" + dateFormatStringProperty);

    //setting property

    properties.setProperty("StartCounter", "250");

    try {

    properties.store(new FileOutputStream("properties.conf"), "Properties Description");

    } catch (IOException e) {

    e.printStackTrace();

    }

    properties.list(System.out);

    }

    public static void main(String[] args) {

    Ch_8_11_PropertiesExample propertiesExample = new Ch_8_11_PropertiesExample();

    propertiesExample.start();

    }

    }

    An output is:

    Should Wake up? false

    Start Counter: 250

    Date Format String:MMM dd yy

    -- listing properties --

    StartCounter=250

    ```


    ### How It Works


    The Java `Properties` class helps you manage program properties. It allows you
    to manage the properties either via external modification (someone editing a property
    file) or internally by using the `Properties.store()` method.


    The `Properties` object can be instantiated either without a file or with a preloaded
    file. The files that the `Properties` object read are in the form of `[name]=[value]`
    and are textually represented. If you need to store values in other formats, you
    must write to and read from a string.


    If you are expecting the files to be modified outside the program (the user directly
    opens a text editor and changes the values), be sure to sanitize the inputs, like
    trimming the values for extra spaces and ignoring the case if need be.


    To query the different properties programmatically, you call the `getProperty(String)`
    method, passing the string-based name of the property whose value you want to
    retrieve. The method returns null if the property is not found. Alternatively,
    you can invoke the `getProperty (String,String)` method, on which if the property
    is not found in the `Properties` object, it returns the second parameter as its
    value. It is a good practice to specify default values if the file doesn’t have
    an entry for a particular key.


    Upon looking at a generated property file, you notice that the first two lines
    indicate the description of the file and the date when it was modified. These
    two lines start with `#`, which in Java property files is the equivalent of a
    comment. The `Properties` object skips any line starting with `#` when processing
    the file.


    Note


    If you allow users to modify your configuration files directly, it is important
    to have validation when retrieving properties from the `Properties` object. One
    of the most common issues encountered in the value of properties is leading and/or
    trailing spaces. If specifying a Boolean or integer property, be sure that they
    can be parsed from a string. At a minimum, catch an exception when trying to parse
    to survive an unconventional value (and log the offending value).


    ## 8.12 Uncompressing Files


    ### Problem


    Your application has the requirement to decompress and extract files from a compressed
    `.zip` file.


    ### Solution


    Using the `java.util.zip` package, you can open a `.zip` file and iterate through
    its entries. While traversing the entries, directories can be created for directory
    entries. The following lines of code demonstrate how to perform the decompress
    and file iteration technique, as described.


    ```

    public class Ch_8_12_ZipExample {

    public static void

    main(String[] args) {

    Ch_8_12_ZipExample example = new Ch_8_12_ZipExample();

    example.start();

    }

    private void start() {

    ZipFile file = null;

    try {

    file = new ZipFile("file.zip");

    FileSystem fileSystem = FileSystems.getDefault();

    Enumeration entries = file.entries();

    String uncompressedDirectory = "uncompressed/";

    Files.createDirectory(fileSystem.getPath(uncompressedDirectory));

    while (entries.hasMoreElements()) {

    ZipEntry entry = entries.nextElement();

    if (entry.isDirectory()) {

    System.out.println("Creating Directory:" + uncompressedDirectory + entry.getName());

    Files.createDirectories(fileSystem.getPath(uncompressedDirectory +

    entry.getName()));

    } else {

    InputStream is = file.getInputStream(entry);

    System.out.println("File :" + entry.getName());

    BufferedInputStream bis = new BufferedInputStream(is);

    String uncompressedFileName = uncompressedDirectory + entry.getName();

    Path uncompressedFilePath = fileSystem.getPath(uncompressedFileName);

    Files.createFile(uncompressedFilePath);

    try (FileOutputStream fileOutput = new FileOutputStream(uncompressedFileName))
    {

    while (bis.available() > 0) {

    fileOutput.write(bis.read());

    }

    }

    System.out.println("Written :" + entry.getName());

    }

    }

    } catch (IOException e) {

    e.printStackTrace();

    }

    }

    ```


    ### How It Works


    To work with the contents of a .`zip` archive, create a `ZipFile` object. A `ZipFile`
    object can be instantiated, passing the name of a .`zip` archive to the constructor.
    After creating the object, you access the specified `.zip` file information. Each
    `ZipFile` object contains entries representing the directories and files contained
    within the archive. By iterating through the entries, you can obtain information
    on each compressed file. Each `ZipEntry` instance has the compressed and uncompressed
    size, the name, and the input stream of the uncompressed bytes.


    The uncompressed bytes can be read into a byte buffer by generating an `InputStream`,
    and later (in our case) written to a file. Using the `FileStream`, it is possible
    to determine how many bytes can be read without blocking the process. Once the
    determined number of bytes has been read, those bytes are written to the output
    file. This process continues until the total number of bytes has been read.


    Note


    Reading the entire file into memory may not be a good idea if the file is extremely
    large. If you need to work with a large file, it’s best to first write it in an
    uncompressed format to disk (as in the example) and then open it and load it in
    chunks. If the file you are working on is not large (you can limit the size by
    checking the `getSize()` method), you can probably load it in memory.


    ## 8.13 Summary


    This chapter demonstrated several examples for working with file and network I/O
    in Java. You learned how to serialize files to be stored to disk and how to manipulate
    a host’s file system with the Java APIs. The chapter also covered how to read
    and write property files and perform file compression. Lastly, the chapter touched
    on the new features of the Process API added in Java 9.'
