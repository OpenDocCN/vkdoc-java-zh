- fmt: '### How It Works


    Although it’s possible to build web applications by compiling Java modules from
    the command line, it’s more efficient to use an IDE. This way, you can concentrate
    on the more creative part of developing software rather than fix inconsistency
    and fiddle with folder hierarchies.


    An IDE integrates all the applications that you need to develop software—from
    a source editor and a compiler to tools to automate the application building process
    and a debugger—into a single application. When developing in Java or another object-oriented
    language, an IDE also includes tools to visualize class and object structure and
    inheritance and containment. Another advantage of using an IDE is that it propagates
    changes you make to individual modules. For example, if you rename a class, the
    IDE can automatically update its occurrences throughout your project files.


    As the applications you develop become more complex, it makes more and more sense
    to use an IDE. That’s why, before continuing to the next project, let’s discuss
    how to install and configure Eclipse.


    Eclipse is an extremely powerful and extensible IDE, well suited for web application
    development. The Eclipse Foundation makes a new release four times a year (in
    March, June, September, and December) due to continuous integration and delivery
    in the software industry (called the *rolling release*). Once you’ve installed
    Eclipse to develop your applications, you can also use it for any other software
    development task, such as developing and debugging applications written in Java,
    C++, Python through a plug-in, or Fortran, which is widely used in the scientific
    community.


    Furthermore, whatever task related to software development you need to perform,
    it’s likely that somebody has already developed an Eclipse plug-in for it. The
    Eclipse Marketplace website ([http://marketplace.eclipse.org](http://marketplace.eclipse.org))
    lists about 2,000 plug-ins organized in dozens of categories. Eclipse consists
    of a core platform that executes plug-ins, plus a series of plug-ins that implement
    most of its functionality. Therefore, the standard packages available for download
    from the Eclipse website include dozens of plug-ins.


    ## 1.5 Getting to “Hello, World”


    ### Problem


    You’ve installed Java SE 17 and the Eclipse IDE. Now you want to run a simple
    Java program to verify that your installation is working properly.


    ### Solution


    Begin by opening the Eclipse IDE. You may see some projects in the left pane if
    you’ve already been working on projects within the IDE.


    Go to the File menu and select New ➤ Java Project, as shown in Figure [1-9](#323910_4_En_1_Chapter.xhtml#Fig9).


    ![](images/323910_4_En_1_Chapter/323910_4_En_1_Fig9_HTML.jpg)


    Figure 1-9


    Selecting Java project


    The dialog is shown in Figure [1-10](#323910_4_En_1_Chapter.xhtml#Fig10).


    ![](images/323910_4_En_1_Chapter/323910_4_En_1_Fig10_HTML.jpg)


    Figure 1-10


    Creating a new Java project


    Name your project `java17Recipes`. Enter the project name in the text box at the
    top of the dialog, as shown in Figure [1-10](#323910_4_En_1_Chapter.xhtml#Fig10).


    In the JRE section, select the installed JDK (i.e., the `JavaSE-17` that you just
    configured). Press Finish to complete the wizard and create a skeleton project.


    Tip


    Java is case-sensitive. Moreover, by convention, project names should start with
    a lowercase letter.


    Now, create a new package. Go to the File menu and select New ➤ Package, as shown
    in Figure [1-11](#323910_4_En_1_Chapter.xhtml#Fig11).


    ![](images/323910_4_En_1_Chapter/323910_4_En_1_Fig11_HTML.jpg)


    Figure 1-11


    Creating a new package in Eclipse IDE


    Name the package `org.java17recipes.chapter01.recipe01_05` as shown in Figure
    [1-12](#323910_4_En_1_Chapter.xhtml#Fig12).


    ![](images/323910_4_En_1_Chapter/323910_4_En_1_Fig12_HTML.jpg)


    Figure 1-12


    Naming the package in Eclipse IDE


    Tip


    By convention, package names usually start with a lowercase letter.


    Next, create a new class. Go to the File menu, select New ➤ Class, and name the
    class `HelloWorld`, as shown in Figure [1-13](#323910_4_En_1_Chapter.xhtml#Fig13).


    ![](images/323910_4_En_1_Chapter/323910_4_En_1_Fig13_HTML.jpg)


    Figure 1-13


    Creating and naming a new class in Eclipse IDE


    Tip


    You can create package and class in the same configuration window by simply creating
    a new class and typing package and class name in the Name field. Moreover, by
    convention, class names usually start with an uppercase letter.


    Make sure that you enter the project name, the package name, and the class name
    exactly as we provide them here because the code to follow depends on your doing
    so. Make sure the project name is `java17Recipes`. Make sure the package is `org.java17recipes.chapter01.recipe01_05`.
    Make sure the class is `HelloWorld`.


    Next, you should look at a Java source file. Skeleton code is generated for you,
    and your Eclipse IDE window should resemble the one shown in Figure [1-14](#323910_4_En_1_Chapter.xhtml#Fig14).


    ![](images/323910_4_En_1_Chapter/323910_4_En_1_Fig14_HTML.jpg)


    Figure 1-14


    Viewing the skeleton code generated by Eclipse


    Place your cursor anywhere in the source code pane. Press `Ctrl+A` to select all
    the skeleton code. Then press `Delete` to get rid of it. Replace the deleted code
    with that from Listing [1-2](#323910_4_En_1_Chapter.xhtml#PC6). Then, create another
    class, name it `HelloMessage`, and copy the code from Listing [1-3](#323910_4_En_1_Chapter.xhtml#PC7).


    You can find the code in Listing [1-2](#323910_4_En_1_Chapter.xhtml#PC6) and Listing
    [1-3](#323910_4_En_1_Chapter.xhtml#PC7) as part of our example download for the
    book. There are two files named `HelloMessage.java` and `HelloWorld.java`, which
    reside in a Java package named `org.java17recipes.chapter01.recipe01_05`. Note
    that all recipe solutions of substance throughout this book are in that example
    download.


    The class is named `HelloWorld`, and it initiates the program.


    ```

    package org.java17recipes.chapter01.recipe01_05;

    public class HelloWorld {

    /* The main method begins in this class */

    public static void main(String[] args) {

    HelloMessage hm;

    hm = new HelloMessage();

    System.out.println(hm.getMessage());

    hm.setMessage("Hello, World");

    System.out.println(hm.getMessage());

    }

    }

    Listing 1-2

    A “Hello, World” Example

    ```


    The second class, `HelloMessage`, is a container class that holds a string-based
    message.


    ```

    package org.java17recipes.chapter01.recipe01_05;

    public class HelloMessage {

    private String message = "";

    public HelloMessage() {

    this.message = "Default Message";

    }

    public void setMessage (String m) {

    this.message = m;

    }

    public String getMessage () {

    //it changes the message to uppercase

    return message.toUpperCase();

    }

    }

    Listing 1-3

    A “Message” Example

    ```


    Make sure you have pasted (or typed) the code. Compile and run the program. Right-click
    in the project and select Run As ➤ Java Application, as shown in Figure [1-15](#323910_4_En_1_Chapter.xhtml#Fig15).


    ![](images/323910_4_En_1_Chapter/323910_4_En_1_Fig15_HTML.jpg)


    Figure 1-15


    Running a project in Eclipse IDE


    Now you should see the following output.


    ```

    DEFAULT MESSAGE

    HELLO, WORLD

    ```


    This output appears in a new view named Console, which Eclipse opens at the bottom
    of the IDE window, as shown in Figure [1-16](#323910_4_En_1_Chapter.xhtml#Fig16).


    ![](images/323910_4_En_1_Chapter/323910_4_En_1_Fig16_HTML.jpg)


    Figure 1-16


    Console view in Eclipse IDE


    ### How It Works


    You can run almost all the solutions in this chapter using the same general technique
    shown in this recipe. For that reason, we show the step-by-step screenshots this
    one time.'
