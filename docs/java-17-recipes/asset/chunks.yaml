    ```

    Date from clock: 2021-11-30

    ```


    The main class is:


    ```

    public static void main(String[] args) {

    newDate();

    newDateFromClock();

    }

    ```


    There were other ways to obtain the current date in previous releases, but usually,
    the time came with the date, and then formatting had to be done to remove the
    unneeded time digits. The new `java.time.LocalDate` class makes it possible to
    work with dates separate from times.


    ## 4.8 Obtaining a Date Object Given Date Criteria


    ### Problem


    You want to obtain a `Date` object, given a year-month-day specification.


    ### Solution


    Invoke the `LocalDate.of()` method for the year, month, and day you want to obtain
    the object. For example, suppose that you want to obtain a `Date` object for a
    specified date in November of 2021. You could pass the date criteria to the `LocalDate.of()`
    method, as demonstrated in the following lines of code.


    ```

    public static void newSpecifiedDate() {

    LocalDate date = LocalDate.of(2021, Month.NOVEMBER, 12);

    System.out.println("Date from specified date: " + date);

    }

    ```


    The main is:


    ```

    public static void main(String[] args) {

    newSpecifiedDate();

    }

    ```


    Here’s the result.


    ```

    Date from specified date: 2021-11-12

    ```


    ### How It Works


    The `LocalDate.of()` method accepts three values as parameters. Those parameters
    represent the year, month, and day. The year parameter is always treated as an
    `int` value. The month parameter can be presented as an `int` value, corresponding
    to an enum representing the month. The `Month` enum returns an `int` value for
    each month, with `JANUARY` returning a 1 and `DECEMBER` returning a 12. Therefore,
    `Month.NOVEMBER` returns an 11. A `Month` object could also be passed as the second
    parameter instead of an `int` value. Lastly, the day of the month is specified
    by passing an `int` value as the third parameter to the `of()` method.


    ## 4.9 Obtaining a Year-Month-Day Date Combination


