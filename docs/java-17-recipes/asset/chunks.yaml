    of Shape: Triangle.java, Square.java, and Rectangle.java. In addition, because
    Square is a sealed class, the compiler also needs access to ColorSquare.java.
    Moreover, if an “invalid” class tries to extend LineShape, as shown in the following
    example, the compiler gives a warning: “The type Rhombus extending a sealed class
    LineShape should be a permitted subtype of LineShape.”


    ```

    public final class Rhombus extends LineShape {}

    ```


    This feature introduces three new keywords in the Java language: sealed, permits,
    and non-sealed.


    For more information on sealed classes, see the documentation at [https://​openjdk.​java.​net/​jeps/​409](https://openjdk.java.net/jeps/409).


    ## 2.10 The Vector API


    ### Problem


    You want a portable API for expressing vector computations.


    ### Solution


    Java 17 introduces an API for vector computations achieving performance superior
    to equivalent scalar computations. The following is standard code for summing
    two arrays.


    ```

    static void nonVectorSumInt(int[] arrayOne, int[] arrayTwo, int[] s) {

    for (int i = 0; i < arrayOne.length; i++) {

    s[i] = (arrayOne[i]  +  arrayTwo[i]) ;

    }

    }

    ```


    The following is the code using vector.


    ```

    static final VectorSpecies SPECIES = IntVector.SPECIES_PREFERRED;

    static void vectorSumInt(int[] arrayOne, int[] arrayTwo, int[] s) {

    int i = 0;

    int upperBound = SPECIES.loopBound(arrayOne.length);

    for (; i < upperBound; i += SPECIES.length()) {

    var vIntaOne = IntVector.fromArray(SPECIES, arrayOne, i);

    var vIntaTwo = IntVector.fromArray(SPECIES, arrayTwo, i);

    var vs = vIntaOne.add(vIntaTwo);

    vs.intoArray(s, i);

    }

    for (; i < arrayOne.length; i++) {

    s[i] = (arrayOne[i]  + arrayTwo[i] );

