  trans: "\n各种类型的 `input` 元素允许用户输入文本字符串或密码、勾选一个或多个复选框、选择多个单选按钮之一、提交表单或重置表单字段。`textarea`\
    \ 元素允许用户输入多行文本，而 `fieldset` 元素则允许你将多个输入字段分组到一个或多个标题下。要呈现多个选项，你可以使用 `select` 元素，其中包含一个\
    \ `option` 元素对应每个选项。清单 13-3 是图 13-4 的源代码。\n\n```\n\n输入表单示例\n\ntd.h {font-size:\
    \ 120%; font-weight: bold}\n\n元素属性\n结果\n\ninputtype=\"text\"\n\ninputtype=\"password\"\
    \n\ninputtype=\"checkbox\"\n\nA\nB\nC\n\ninputtype=\"radio\"\n\n是\n否\n\ninputtype=\"\
    submit\"\n\ninputtype=\"reset\"\n\ninputtype=\"button\"\n\ntextarea\n默认文本\n\n\
    fieldset\n\n尺寸：\n宽度 \n高度\n\nselect / option\n\n披萨\n意大利面\n\n清单 13-3\nform.html\n\
    ```\n\n我们高亮了两行。第一行包含 `form` 元素，显示 `action` 属性被设置为空字符串。`action` 属性定义了必须处理请求表单的页面的\
    \ URL。空字符串意味着显示表单的同一页面也处理该表单。第二行高亮显示了你如何使用 `input` 元素设置参数，而用户对此毫不知情（除非他或她偷看源代码）。\n\
    \n如果你填写图 13-4 中所示的表单并点击提交按钮（或按下 `Enter` 键），你会在浏览器的地址栏中看到 URL 末尾出现以下字符串（为了可读性，我们插入了换行符）。\n\
    \n```\n?agent=007\n&t=bla+bla+bla\n&p=abc\n&abc=a\n&abc=c\n&yn=n\n&ta=ciao!\n\
    &w=1\n&h=2\n&food=pizza\n```\n\n浏览器已将每个 `input` 元素转换为一个 `参数名=参数值` 字符串。请注意，文本字段中的每个空格都被替换为加号，包括密码中的空格。另外，请注意\
    \ `abc` 参数出现了两次，因为三个可用复选框中有两个被选中。为了避免在浏览器中看到所有参数，请在 `form` 元素中使用属性 `method=\"\
    POST\"`。此外，POST 方法更安全，因为数据存储在 HTTP 请求体中，并且对数据长度没有限制。如需更多信息，你可以直接访问 [`www.w3schools.com`](http://www.w3schools.com)，这是\
    \ Web 开发方面最重要且最全面的网站之一。\n\n工作原理\n许多网站都解释 HTML 以及 CSS 和 JavaScript 等组件。因此，这里不会涵盖所有相关知识，而是为刚开始学习\
    \ Web 开发的人介绍几个关键概念。超文本标记语言（HTML）是用于创建 HTML 页面（扩展名为 `.htm` 或 `.html`）的标准“标签”标记语言。因此，它是\
    \ JSP 页面的基础。浏览器解释页面中包含的 HTML 代码，并从服务器请求非文本组件（如图像和视频剪辑），以在用户窗口中显示所有内容。\n\n13.3\
    \ 创建 JSP 页面\n\n问题\n你想要创建并配置一个简单的动态网页。\n\n解决方案\nJSP 是一种允许你向网页添加动态内容的技术。\n\n清单 13-4\
    \ 是一个纯 HTML 页面，它会在浏览器窗口中显示“Hello World!”。\n\n```\n\nHello World 静态 HTML\n\nHello\
    \ World!\n\n清单 13-4\nhello.html\n```\n\n创建 `%CATALINA_HOME%\\webapps\\ROOT\\tests\\\
    ` 文件夹，并将 `hello.html` 存储在其中。然后在浏览器中输入以下 URL 以查看网页。\n\n```\nhttp://localhost:8080/tests/hello.html\n\
    ```\n\n通常，要让浏览器检查页面语法是否符合万维网联盟（W3C）的 XHTML 标准，你需要以以下行开头页面。\n\n你还需要将\n\n```\n\n\
    替换为\n\n```\n\n然而，对于这个简单的示例，让我们将代码保持在必要的范围内。图 13-5 显示了该页面在浏览器中的显示效果。\n\n![](img/323910_4_En_13_Fig5_HTML.jpg)\n\
    \n图 13-5\n纯 HTML 中的“Hello World!”\n\n如果你让浏览器显示页面源代码，毫不意外，你会看到清单 13-4 中显示的内容。要使用\
    \ JSP 页面获得相同的结果，你只需在第一行之前插入一个 JSP 指令，如清单 13-5 所示，并将文件扩展名从 `.html` 更改为 `.jsp`。\n\
    \n```\n\nHello World 动态 HTML\n\nHello World!\n\n清单 13-5\n“Hello World!” 在一个简单的\
    \ JSP 页面中\n```\n\n与 `hello.html` 一样，你可以通过将 `hello.jsp` 放置在 Tomcat 的 `ROOT\\tests`\
    \ 文件夹中来查看它。在浏览器中输入以下 URL 以查看网页（见图 13-6）。\n\n![](img/323910_4_En_13_Fig6_HTML.jpg)\n\
    \n图 13-6\nJSP 中的“Hello World!”\n\n```\nhttp://localhost:8080/tests/hello.jsp\n\
    ```\n\n对于如此简单的页面，使用 JSP 意义不大。只有当你包含动态内容时，使用 JSP 才值得。请查看清单 13-6 以获取更丰富的内容。\n\n\
    ```\n\nHello World 动态 HTML\n\nHello World!\nuser-agent \" + userAgent);\n%>\n\n\
    清单 13-6\nhello.jsp\n```\n\n`<% ... %>` 对中的代码是用 Java 编写的小脚本。当 Tomcat 的 JSP 引擎解释此模块时，它会创建一个如清单\
    \ 13-7 所示的 Java Servlet（已移除一些缩进和空行）。\n\n```\nout.write(\"\\r\\n\");\nout.write(\"\
    \\r\\n\");\nout.write(\"Hello World 动态 HTML \\r\\n\");\nout.write(\"\\r\\n\");\n\
    String userAgent = request.getHeader(\"user-agent\");\nout.println(\"User-agent:\
    \ \" + userAgent);\nout.write(\"\\r\\n\");\nout.write(\"Hello World!\\r\\n\");\n\
    out.write(\"\\r\\n\");\nout.write(\"\\r\\n\");\n清单 13-7\n来自“Hello World!” JSP\
    \ 页面的 Java 代码\n```\n\n工作原理\n如果没有 JSP，要更新纯静态 HTML 页面的外观或内容，你必须始终手动操作。即使你只想更改日期或图片，也必须编辑\
    \ HTML 文件并输入修改内容。没有人会为你做这件事，而使用 JSP，你可以使内容依赖于许多因素，包括一天中的时间、用户提供的信息、用户与你的网站交互的历史记录，甚至用户的浏览器类型。这种能力对于提供在线服务至关重要，你可以根据查看者的偏好和要求，为每个提出请求的查看者定制响应。\n\
    \n以下步骤解释了 Web 服务器如何创建网页。\n\n1.  你的浏览器向 Web 服务器发送一个 HTTP 请求。这在 JSP 中不会改变，尽管 URL\
    \ 可能以 `.jsp` 结尾，而不是 `.html` 或 `.htm`。\n\n2.  Web 服务器是一个 Java 服务器，具有识别和处理 Java\
    \ Servlet 所需的扩展。Web 服务器识别出 HTTP 请求是针对 JSP 页面的，并将其转发给 JSP 引擎。\n\n3.  JSP 引擎从磁盘加载\
    \ JSP 页面，并将其转换为 Java Servlet。从这一点开始，这个 Servlet 与任何其他直接用 Java（而非 JSP）开发的 Servlet\
    \ 没有区别。然而，JSP Servlet 自动生成的 Java 代码并不总是易于阅读，你绝不应手动修改它。\n\n4.  JSP 引擎将 Servlet\
    \ 编译成可执行类，并将原始请求转发给 Web 服务器的另一部分，称为 *Servlet 引擎*。请注意，JSP 引擎仅在发现 JSP 页面自上次请求以来发生更改时，才会将\
    \ JSP 页面转换为 Java 并重新编译 Servlet。\n"
- fmt: "5.  The servlet engine loads the servlet class and executes it. During execution,\
    \ the servlet produces an output in HTML format, which the servlet engine passes\
    \ to the web server inside an HTTP response.\n\n6.  The web server forwards the\
    \ HTTP response to your browser.\n\n7.  Your web browser handles the dynamically\
    \ generated HTML page inside the HTTP response exactly as if it were a static\
    \ page. In fact, static and dynamic web pages are in the same format.\n\nWhat\
    \ reaches your browser is the output generated by the servlet (the converted and\
    \ compiled JSP page), not the JSP page itself. The same servlet produces different\
    \ outputs depending on the parameters of the HTTP request and other factors. For\
    \ example, suppose you’re browsing the products offered by an online shop. When\
    \ you click the product’s image, your browser generates an HTTP request with the\
    \ product code as a parameter. As a result, the servlet generates an HTML page\
    \ with that product’s description. The server doesn’t need to recompile the servlet\
    \ for each product code. The servlet queries a database containing the details\
    \ of all the products, obtains the description of the product you’re interested\
    \ in, and formats an HTML page with that data. This is what dynamic HTML is all\
    \ about! Plain HTML is not capable of interrogating a database, but Java is, and\
    \ JSP gives you the means of including snippets of Java inside an HTML page.\n\
    \nAn evolution of JSP is the JavaServer Faces (JSF) API for creating component-based\
    \ UIs for Java web applications. Within the MVC application architecture, JSF\
    \ takes the place of the controller, thereby mediating every interaction between\
    \ JSP (the view) and the model, which encapsulates the application data. JSF makes\
    \ the development of web applications easier by letting you create user interfaces\
    \ from a set of standard UI components wired to server-side objects and making\
    \ available four custom tag libraries to handle those UI components. JSF transparently\
    \ saves state information of the UI components and repopulates forms when they\
    \ redisplay. This is possible because the states of the components live beyond\
    \ the lifespan of HTTP requests. JSF operates by providing a controller servlet\
    \ and a component model that includes event handling, server-side validation,\
    \ data conversion, and component rendering.\n\nJSF doesn’t change the basic page\
    \ life cycle that you already know from JSP: the client makes an HTTP request,\
    \ and the server replies with a dynamically generated HTML page. Be warned that\
    \ JSF isn’t very easy to use, and it requires a non-negligible initial effort\
    \ to get it going.\n\nFor more information on comprehensive Java web application\
    \ development and how JSP and JSF are key technologies in the Jakarta EE platform\
    \ with Eclipse, check out *Beginning Jakarta EE Web Development* by Luciano Manelli\
    \ and Giulio Zambon (Apress, 2020).\n\n## 13.4 Listing the HTML-Request Parameters\n\
    \n### Problem\nYou want to list the parameters of an HTML request on a JSP page.\n\
    \n### Solution\nWith JSP, you can generate dynamic web pages. That’s settled.\
    \ But the utility of dynamic pages goes well beyond recognizing what browser the\
    \ viewer is using or displaying different information on different days. Adapting\
    \ the content of a web page based on who the viewer is and what the viewer wants\
    \ is what matters.\n\nEach HTML request includes a series of parameters, which\
    \ are usually the results of what the viewer enters in a form before hitting the\
    \ Submit button. Additional parameters can also be part of the URL itself. For\
    \ example, pages in multilingual websites sometimes have URLs ending with `?lang=en`\
    \ to tell the server to format the requested page in English.\n\nListing [13-8](#323910_4_En_13_Chapter.xhtml#PC21)\
    \ shows a simple JSP page that lists all the HTML-request parameters. It is a\
    \ useful little tool to easily check what your HTML pages send to the server.\n\
    \n```\nRequest Parameters\nMap size =\n\nMap elementPar namePar value[s]\n\" +\
    \ k + \"'\" + keys[k] + \"'\");\nfor (int j = 0; j  0) out.print(\", \");\nout.print(\"\
    '\" + pars[j] + \"'\");\n}\nout.println(\"\");\n}\n%>\n\nListing 13-8\nreq_params.jsp\n\
    ```\n\n### How It Works\nThe interesting bits are in the lines are highlighted\
    \ in bold. The first one tells you that the parameters are stored in an object\
    \ of type `Map` and shows you how to retrieve the list of the parameter names.\n\
    \nThe second highlighted line shows you how to insert the value of a Java variable\
    \ directly into the output (i.e., into the HTML page) by enclosing it between\
    \ the pair `<%=` and `%>`. This is different from using a scriptlet—in which you\
