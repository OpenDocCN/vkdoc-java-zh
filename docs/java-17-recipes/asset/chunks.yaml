    ### 工作原理


    对数据库执行的最常见操作之一就是查询。使用 JDBC 执行数据库查询相当简单，尽管每次执行查询时都需要使用一些样板代码。首先，你需要为要查询的数据库和模式获取一个
    `Connection` 对象。接下来，你需要构建一个查询并将其存储为字符串格式。然后，`Connection` 对象会创建一个 `Statement` 对象。你的查询字符串被传递给
    `Statement` 对象的 `executeQuery()` 方法来查询数据库。下面展示了在不使用 `try-with-resources` 进行资源管理时的代码样式。


    ```

    String qry = "select recipe_num, recipe_name, description from recipes";

    Connection conn;

    Statement stmt = null;

    try {

    conn = createConn.getConnection()

    stmt = conn.createStatement();

    ResultSet rs = stmt.executeQuery(qry);

    ...

    ```


    同样的代码可以更高效地编写如下。


    ```

    try (Connection conn = createConn.getConnection();

    Statement stmt = conn.createStatement();) {

    ResultSet rs = stmt.executeQuery(qry);

    ...

    ```


    如你所见，`Statement` 对象的 `executeQuery()` 方法接受一个字符串并返回一个 `ResultSet` 对象。`ResultSet`
    对象使得处理查询结果、以任意顺序获取所需信息变得容易。如果你查看示例中的下一行代码，会在 `ResultSet` 对象上创建一个 `while` 循环。这个循环持续调用
    `ResultSet` 对象的 `next()` 方法，每次迭代获取查询返回的下一行数据。在这个例子中，`ResultSet` 对象被命名为 `rs`。因此，只要
    `rs.next()` 返回 true，循环就会继续处理。一旦所有返回的行都被处理完毕，`rs.next()` 返回 false，表示没有更多行需要处理了。


    在 `while` 循环内部，每一行返回的数据都会被处理。每次遍历时，都会解析 `ResultSet` 对象以获取指定列名的值。请注意，如果预期列返回的是字符串，你必须调用
    `ResultSet getString()` 方法，并以字符串格式传递列名。类似地，如果预期列返回的是整数，你需要调用 `ResultSet getInt()`
    方法，并以字符串格式传递列名。其他数据类型也是如此。这些方法返回相应的列值。在本节解决方案的示例中，这些值被存储到局部变量中。


    ```

    String recipe = rs.getString("RECIPE_NUM");

    String name = rs.getString("RECIPE_NAME");

    String desc = rs.getString("DESCRIPTION");

    ```


    一旦获取了列值，你就可以对存储在局部变量中的值进行任何操作。在这个例子中，它们通过 `System.out()` 方法被打印出来。


    ```

    System.out.println(recipe + "\t" + name + "\t" + desc);

    ```


    尝试查询数据库时可能会抛出 `java.sql.SQLException`（例如，如果 `Connection` 对象没有正确获取，或者你试图查询的数据库表不存在）。你必须提供异常处理来处理这些情况下的错误。因此，所有数据库处理代码都应放在
    `try` 块内。然后 `catch` 块处理 `SQLException`；因此，如果抛出异常，将使用 `catch` 块中的代码进行处理。听起来很简单，对吧？确实如此，但每次执行数据库查询时都必须这样做——这会产生大量样板代码。


    如果语句和连接处于打开状态，关闭它们总是一个好主意。使用 `try-with-resources` 结构是资源管理最高效的解决方案。完成后关闭资源有助于确保系统能够根据需要重新分配资源，并对数据库保持尊重。尽快关闭连接非常重要，以便其他进程可以使用它们。


    ## 12.5 执行 CRUD 操作


    ### 问题


    你需要在应用程序中具备执行标准数据库操作的能力。也就是说，你需要能够对数据库记录进行 CRUD 操作。


    ### 解决方案


    创建一个 `Connection` 对象并获取数据库连接，然后使用从 `java.sql.Connection` 对象获得的 `java.sql.Statement`
    对象执行 CRUD 操作。用于这些操作的数据库表格式如下。


    ```

    RECIPES (

    id              int not null,

    recipe_number   varchar(10) not null,

    recipe_name     varchar(100) not null,

    description     varchar(500),

    constraint recipes_pk primary key (id) enable

    );

    ```


    以下代码片段演示了如何使用 JDBC 执行每个 CRUD 操作。


    ```

    import java.sql.Connection;

    import java.sql.ResultSet;

    import java.sql.SQLException;

    import java.sql.Statement;

    import org.java17recipes.chapter12.recipe12_01.CreateConnection;

    public class CrudOperations {

    static CreateConnection createConn;

    public static void main(String[] args) {

    createConn = new CreateConnection();

    performCreate();

    performRead();

    performUpdate();

    performDelete();

    System.out.println("-- 最终状态 --");

    performRead();

    }

    private static void performCreate(){

    String sql = "INSERT INTO RECIPES VALUES(" +

    "NULL, " +

    "''12-5'', " +

    "''Performing CRUD Operations'', " +

    "''How to perform create, read, update, delete functions'')";

    try (Connection conn = createConn.getConnection();

    Statement stmt = conn.createStatement();) {

    // 返回行数，如果不成功则返回 0

    int result = stmt.executeUpdate(sql);

    if (result == 1{

    System.out.println("-- 记录已创建 --");

    } else {

    System.err.println("!! 记录未创建 !!");

    }

    } catch (SQLException e) {

    e.printStackTrace();

    }

    }

    private static void performRead(){

    String qry = "select recipe_number, recipe_name, description from recipes";

    try (Connection conn = createConn.getConnection();

    Statement stmt = conn.createStatement();) {

    ResultSet rs = stmt.executeQuery(qry);

    while (rs.next()) {

    String recipe = rs.getString("RECIPE_NUMBER");

    String name = rs.getString("RECIPE_NAME");

    String desc = rs.getString("DESCRIPTION");

    System.out.println(recipe + "\t" + name + "\t" + desc);

    }

    } catch (SQLException e) {

    e.printStackTrace();

    }

    }

    private static void performUpdate(){

    String sql = "UPDATE RECIPES " +

    "SET RECIPE_NUMBER = ''12-5'' " +

    "WHERE RECIPE_NUMBER = ''12-4''";

    try (Connection conn = createConn.getConnection();

    Statement stmt = conn.createStatement();) {

    int result = stmt.executeUpdate(sql);

    if (result  == 1){

    System.out.println("-- 记录已更新 --");

    } else {

    System.out.println("!! 记录未更新 !!");

    }

    } catch (SQLException e) {

    e.printStackTrace();

    }

    }

    private static void performDelete(){

    String sql = "DELETE FROM RECIPES WHERE RECIPE_NUMBER = ''12-5''";

    try (Connection conn = createConn.getConnection();

    Statement stmt = conn.createStatement();) {

    int result = stmt.executeUpdate(sql);

    if (result > 0){

    System.out.println("-- 记录已删除 --");

    } else {

    System.out.println("!! 记录未删除 !!");

    }

    } catch (SQLException e) {

    e.printStackTrace();

    }

    }

    }

    ```


    以下是运行代码的结果。


    ```

    -- 记录已创建 –

