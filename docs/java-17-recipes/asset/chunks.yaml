- fmt: '### Solution


    Make use of the new locale matching and filtering methods that have been introduced
    in the `java.util.Locale` class in Java 8. If you’re given a comma-separated list
    of locales in string format, you can apply a filter or “priority list” to that
    string to return only those locales within the string that meet the filter. In
    the following example, a list of language tags is filtered using the `java.util.Locale.filterTag()`
    method, returning the matching tags in string format.


    ```

    public static void main(String[] args) {

    filterTags();

    localeMatching();

    }

    public static void filterTags(){

    List list1 = Locale.LanguageRange.parse("ja-JP, en-US");

    list1.stream().forEach((range) -> {

    System.out.println("Range:" + range.getRange());

    });

    ArrayList localeList = new ArrayList();

    localeList.add("en-US");

    localeList.add("en-JP");

    List tags1 = Locale.filterTags(list1, localeList);

    System.out.println("The following is the filtered list of locales:");

    tags1.stream().forEach((tag) -> {

    System.out.println(tag);

    });

    }

    ```


    These are the results.


    ```

    Range:ja-jp

    Range:en-us

    The following is the filtered list of Locales:

    en-us

    ```


    The `filter()` method of the `Locale` classes allows you to return a list of matching
    `Locale` instances. In the following example, a list of locale language tags filters
    `Locale` classes out of a list of locales.


    ```

    public static void localeMatching(){

    String localeTags = Locale.ENGLISH.toLanguageTag() + "," +

    Locale.CANADA.toLanguageTag();

    List list1 = Locale.LanguageRange.parse(localeTags);

    list1.stream().forEach((range) -> {

    System.out.println("Range:" + range.getRange());

    });

    ArrayList localeList = new ArrayList();

    localeList.add(new Locale("en"));

    localeList.add(new Locale("en-JP"));

    List tags1 = Locale.filter(list1, localeList);

    System.out.println("The following is the matching list of Locales:");

    tags1.stream().forEach((tag) -> {

    System.out.println(tag);

    });

    }

    ```


    Here are the results.


    ```

    Range:en

    Range:en-ca

    The following is the matching list of locales:

    en

    ```


    ### How It Works


    In Java 8, methods were added to the `java.util.Locale` class to filter `Locale`
    instances or language tags based on a supplied priority list in `List<Locale.LanguageRange>`
    format. The following list contains a short summary of these filtering methods.


    *   `filter(List<Locale.LanguageRange>, Collection<Locale>)`


    ```

    filter(List, Collection, Locale.FilteringMode)

    ```


    (Returns matching list of `Locale` instances)


    *   `filterTags(List<Locale.LanguageRange>, Collection<String>)`


    ```

    filterTags(List, Collection, Locale.FilteringMode)

    ```


    (Returns matching list of language tags)


    To work with each method, a sorted priority order should be sent as the first
    parameter. This priority order is a list of `Locale.LanguageRange` objects should
    be sorted in descending order, based on priority or weight. The second argument
    in the `filter()` methods is a collection of locales. This collection contains
    the locales that will be filtered. The optional third argument contains a `Locale.FilteringMode`.


    ## Searching Unicode with Regular Expressions


    ### Problem


    You want to find or match Unicode characters in a string. You want to do that
    using regular expression syntax.


    ### Solution 1


    The easiest way to find or match characters is to use the `String` class. `String`
    instances store Unicode character sequences and provide relatively simple operations
    for finding, replacing, and tokenizing characters using regular expressions.


    To determine whether a string matches a regular expression, use the `matches()`
    method. The `matches()` method returns `true` if the entire string matches the
    regular expression exactly.


    The following code from the `org.java17recipes.chapter11.recipe11_04.Recipe11_4`
    class uses two different expressions with two strings. The regular expression
    matches simply confirm that the strings match a particular pattern as defined
    in the `enRegEx` and `jaRegEx` variables.


    ```

    private String enText = "The fat cat sat on the mat with a brown rat.";

    private String jaText = "Fight 文字化け!";

    String enRegEx = "^The \\w+ cat.*";

    String jaRegEx = ".*文字.*";

    String jaRegExEscaped = ".*\u6587\u5B57.*";

    public static void main(String[] args) {

    Recipe11_4 app = new Recipe11_4();

    app.run();

    }

    public void run() {

    demoStringMatch();

    demoStringReplace();

    demoStringSplit();

    demoSimple();

    demoComplex();

    }

    public void demoStringMatch() {

    boolean found = false;

    found = enText.matches(enRegEx);

    if (found) {

    System.out.printf("Matches %s.\n", enRegEx);

    }

    found = jaText.matches(jaRegEx);

    if (found) {

    System.out.printf("Matches %s.\n", jaRegEx);

    }

    found = jaText.matches(jaRegExEscaped);

    if (found) {

    System.out.printf("Matches %s.\n", jaRegExEscaped);

    }

    }

    ```


    This code prints the following.


    ```

    Matches ^The \w+ cat.*.

    Matches .*文字.*.

    Matches .*文字.*.

    ```


    Use the `replaceFirst()` method to create a new `String` instance in which the
    first occurrence of the regular expression in the target text is replaced with
    the replacement text. The code demonstrates how to use this method.


    ```

    String replaced = jaText.replaceFirst("文字化け", "mojibake");

    System.out.printf("Replaced: %s\n", replaced);

    ```


    The replacement text is shown in the output.


    ```

    Replaced: Fight mojibake!

    ```


    The `replaceAll()` method replaces all occurrences of the expression with the
    replacement text.


    Finally, the `split()` method creates a `String[]` that contains text separated
    by the matched expression. In other words, it returns text that is delimited by
    the expression. Optionally, you can provide a `limit` argument that constrains
    the number of times the delimiter is applied in the source text. The following
    code demonstrates the `split()` method splitting on space characters.


    ```

    String[] matches = enText.split("\\s", 3);

    for(String match: matches) {

    System.out.printf("Split: %s\n",match);

    }

    ```


    The code’s output is as follows.


    ```

    Split: The

    Split: fat

    Split: cat sat on the mat with a brown rat.

    ```


    ### Solution 2


    When the simple `String` methods aren’t sufficient, you can use the more powerful
    `java.util.regex` package to work with regular expressions. Create a regular expression
    using the `Pattern` class. A `Matcher` works on a `String` instance using the
    pattern. All `Matcher` operations perform their functions using `Pattern` and
    `String` instances.


    The following code demonstrates how to search for ASCII and non-ASCII text in
    two separate strings. See the `org.java17recipes.chapter11.recipe11_04.Recipe11_4`
    class for the complete source code. The `demoSimple()` method finds text with
    any character followed by `".at"`. The `demoComplex()` method finds two Japanese
    symbols in a string.


    ```

    public void demoSimple() {

    Pattern p = Pattern.compile(".at");

    Matcher m = p.matcher(enText);

    while(m.find()) {

    System.out.printf("%s\n", m.group());

    }

    }

    public void demoComplex() {

    Pattern p = Pattern.compile("文字");

    Matcher m = p.matcher(jaText);

    if (m.find()) {

    System.out.println(m.group());

    }

    }

    ```


    Running these two methods on the previously defined English and Japanese text
    shows the following.


    ```

    fat

    cat

    sat

    mat

    rat

    文字

    ```'
