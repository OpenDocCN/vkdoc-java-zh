- fmt: '# 12. Working with Databases


    Almost any nontrivial application contains a database of some sort. Some applications
    use an in-memory database, while others use a traditional relational database
    management system (RDBMS). Whatever the case, it is essential that every Java
    developer have some skills working with databases. Over the years, the Java Database
    Connectivity (JDBC) API has evolved quite a bit, and over the past couple of releases,
    there have been some major advancements.


    This chapter covers the basics of using JDBC for working with databases. You learn
    how to perform all the standard database operations and some advanced techniques
    for manipulating data.


    ## 12.1 Installing MySQL


    ### Problem


    You want to install a database on your personal computer.


    ### Solution


    Install MySQL. Select the manual installation because it offers some benefits
    and more control. You can back up or move databases in seconds, and you can install
    and reinstall MySQL anywhere (including a USB drive).


    To install MySQL, do the following.


    1. Go to [`https://dev.mysql.com/downloads/mysql/`](https://dev.mysql.com/downloads/mysql/)
    (the MySQL Community Server web page) and agree to the privacy policy.


    2. Ensure that the selected platform is your OS (we used Windows OS) and click
    the Download button. For Windows, select the version without the installer —Windows
    (x86, 64-bit), ZIP Archive—under the Other Downloads section.


    3. Log in as a user, or register, or, if you want, you can skip this step.


    4. Download the version without the installer. (The latest version when we downloaded
    was `mysql-8.0.27-winx64.zip`; it had a dimension of 209 MB.) This package contains
    the MySQL database server.


    5. Extract the zip file into your root folder drive. Rename the folder from `mysql-8.0.27-winx64`
    to `mysql`.


    6. Create the "data" folder. I chose in the same `mysql` folder, even if we recommend
    always placing the data folder on another drive. This prevents loss of data and
    allows easy reinstallation.


    7. Initialize the data directory manually before MySQL can be started. Open a
    command window and type the following under the `bin` folder.


    ```

    C:\mysql\bin>mysqld --console --initialize

    ```


    The `--console` option enables writing the diagnostic output to console (if you
    omit this option, the server writes output to the error log in the data folder).


    Listing [12-1](#323910_4_En_12_Chapter.xhtml#PC2) is the result shown on the console.


    ```

    2021-10-31T19:30:01.391296Z 0 [System] [MY-013169] [Server] C:\mysql\bin\mysqld.exe
    (mysqld 8.0.27) initializing of server in progress as process 3816

    2021-10-31T19:30:01.599643Z 1 [System] [MY-013576] [InnoDB] InnoDB initialization
    has started.

    2021-10-31T19:30:19.281112Z 1 [System] [MY-013577] [InnoDB] InnoDB initialization
    has ended.

    2021-10-31T19:30:49.726138Z 6 [Note] [MY-010454] [Server] A temporary password
    is generated for root@localhost: )r%Crfs1reOS

    Listing 12-1

    Log of Database Initialization

    ```


    The string highlighted in bold is the generated password for the root user (the
    default administrative account in the MySQL grant system) displayed in the stream
    during the initialization. Now, you are ready to work with your database.


    Open two console windows. In the first, start the database with the following
    command.


    ```

    C:\mysql\bin>mysqld.exe --console

    ```


    Listing [12-2](#323910_4_En_12_Chapter.xhtml#PC4) shows the starting up of the
    server. The `--console` command lets you see the start-up logs being printed.


    ```

    C:\mysql\bin>mysqld.exe --console

    2021-10-31T19:39:25.558678Z 0 [System] [MY-010116] [Server] C:\mysql\bin\mysqld.exe
    (mysqld 8.0.27) starting as process 5500

    2021-10-31T19:39:25.597447Z 1 [System] [MY-013576] [InnoDB] InnoDB initialization
    has started.

    2021-10-31T19:39:29.188084Z 1 [System] [MY-013577] [InnoDB] InnoDB initialization
    has ended.

    2021-10-31T19:39:31.625112Z 0 [Warning] [MY-010068] [Server] CA certificate ca.pem
    is self signed.

    2021-10-31T19:39:31.842513Z 0 [System] [MY-011323] [Server] X Plugin ready for
    connections. Bind-address: ''::'' port: 33060

    2021-10-31T19:39:31.842945Z 0 [System] [MY-010931] [Server] C:\mysql\bin\mysqld.exe:
    ready for connections. Version: ''8.0.27''  socket: ''''  port: 3306  MySQL Community
    Server - GPL.

    Listing 12-2

    Log of Database Starting Up

    ```


    In the second console window, connect to the database with user and password and
    start the MySQL console with the following command.


    ```

    C:\mysql\bin>mysql -u root -p

    ```


    After typing the password when prompted (`Enter password: ************`), you
    see the welcome message on the console, as you can see in Listing [12-3](#323910_4_En_12_Chapter.xhtml#PC6).


    ```

    C:\mysql\bin>mysql -u root -p

    Enter password: ************

    Enter password: ************

    Welcome to the MySQL monitor.  Commands end with ; or \g.

    Your MySQL connection id is 8

    Server version: 8.0.27

    Copyright (c) 2000, 2021, Oracle and/or its affiliates.

    Oracle is a registered trademark of Oracle Corporation and/or its

    affiliates. Other names may be trademarks of their respective

    owners.

    Type ''help;'' or ''\h'' for help. Type ''\c'' to clear the current input statement.
    mysql>

    Listing 12-3

    Log of Database Connection

    ```


    Now the *command-line interface* (CLI) is activated, note the change in the highlighted
    prompt command.


    We recommend changing the password with the following command.


    ```

    mysql> ALTER USER ''root''@''localhost'' IDENTIFIED BY ''root'';

    ```


    The string highlighted in bold is the new password.


    Then, run the following command.


    ```

    mysql> FLUSH PRIVILEGES;

    ```


    It tells the server to reload the grant tables, which puts your new changes into
    effect.


    Finally, if you want to stop the database enter `exit` in the prompt to stop the
    command-line client and then type the following.


    ```

    C:\mysql\bin>mysqladmin.exe -u root -p shutdown

    Enter password: ****

    ```


    The `mysqladmin` command invokes the administrative utility to connect to MySQL
    server as root user and tell it to shut down.


    Listing [12-4](#323910_4_En_12_Chapter.xhtml#PC10) is the message shown on the
    console.


    ```

    2021-10-31T19:46:01.347489Z 8 [System] [MY-013172] [Server] Received SHUTDOWN
    from user root. Shutting down mysqld (Version: 8.0.27).

    2021-10-31T19:46:01.347680Z 0 [System] [MY-013105] [Server] C:\mysql\bin\mysqld.exe:
    Normal shutdown.

    2021-10-31T19:46:01.970912Z 0 [System] [MY-010910] [Server] C:\mysql\bin\mysqld.exe:
    Shutdown complete (mysqld 8.0.27)  MySQL Community Server - GPL.

    Listing 12-4

    Log of Server Shutdown

    ```


    Now you can create and populate your database and follow along with the examples
    in this chapter. Run the `ApressBookDatabase_create.sql` script to create a database
    user schema and populate it.


    We suggest you work with the database we created in MySQL, even if you are able
    to develop Java applications that work with Oracle database, PostgreSQL, and all
    traditional RDBMSs.


    First, define a simple database called `apressBooks` with recipes and publications
    tables. The logic design of the database is shown in Table [12-1](#323910_4_En_12_Chapter.xhtml#Tab1)
    and Table [12-2](#323910_4_En_12_Chapter.xhtml#Tab2), characterized by name, length,
    type of data, and constraints (i.e., a field is a primary key and another must
    be not null).


    **Table 12-2** Publications


    | Field Name | Length | Type | Constraints |

    | --- | --- | --- | --- |

    | `id` | - | `INT` | Primary Key, Not null |

    | `book_title` | 500 | `VARCHAR` | Not Null |

    | `publish_date` | - | `DATE` | Default Null |

    | `publish_co` | 100 | `VARCHAR` | Default Null |


    **Table 12-1** Recipes


    | Field Name | Length | Type | Constraints |

    | --- | --- | --- | --- |

    | `id` | - | `INT` | Primary Key, Not null |

    | `recipe_number` | 10 | `VARCHAR` | Not Null |

    | `recipe_name` | 100 | `VARCHAR` | Not Null |

    | `description` | 500 | `VARCHAR` | Default Null |


    Listing [12-5](#323910_4_En_12_Chapter.xhtml#PC11) shows the SQL script for the
    creation of the `apressBooks` database.'
