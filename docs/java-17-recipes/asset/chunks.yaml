- fmt: '### How It Works


    At its basic level, sockets require a type, IP address, and port. While sockets
    literature has consumed whole books, the main idea is pretty straightforward.
    Like the post office, socket communication relies on addresses. These addresses
    deliver data. In this example, we picked the loopback (the same computer where
    the program is running) address (`127.0.0.1`) and chose a random port number (`2583`).


    The advantage of the new NIO.2 is that it is asynchronous. By using asynchronous
    calls, you can scale your application without creating thousands of threads for
    each connection. In our example, we take the asynchronous calls and wait for a
    connection, effectively making it single-threaded for the sake of the example,
    but don’t let that stop you from enhancing this example with more asynchronous
    calls. (Check the recipes on the multithreaded section of this book.)


    For a client to connect, it requires a socket channel. The NIO.2 API allows the
    creation of asynchronous socket channels. Once a socket channel is created, it
    needs an address to connect to. The `socketChannel.connect()` operation does not
    block; instead, it returns a `Future` object (this is a different from traditional
    NIO, where calling `socketChannel.connect()` block until a connection is established).
    The `Future` object allows a Java program to continue what it is doing and simply
    query the status of the submitted task. To take the analogy further, instead of
    waiting at the front door for your mail to arrive, you do other stuff and check
    periodically to see whether the mail has arrived. `Future` objects have methods
    like `isDone()` and `isCancelled()` that let you know if the task is done or canceled.
    It also has the `get()` method, which allows you to wait for the task to finish.
    In our example, we use `Future.get()` to wait for the client connection to be
    established.


    Once the connection is established, use `Channels.newOutputStream()` to create
    an output stream to send information. Using the decorator pattern, decorate `outputStream`
    with `ObjectOutputStream` to finally send objects through the socket.


    The server code is a little more elaborate. Server socket connections allow more
    than one connection to occur. Thus they monitor or receive connections instead
    of initiating a connection. For this reason, the server is usually waiting for
    a connection asynchronously.


    The server begins by establishing the address it listens to (`127.0.0.1:2583`)
    and accepting connections. The call to `serverSocketChannel.accept()` returns
    another `Future` object that gives you the flexibility to deal with incoming connections.
    In our example, the server connection simply calls `future.get()`, which blocks
    (stop the program’s execution) until a connection is accepted.


    After the server acquires a socket channel, it creates an `inputStream` by calling
    `Channels.newInputStream(socket)` and then wrapping that input stream with an
    `ObjectInputStream`. The server then proceeds to loop and read each object coming
    from the `ObjectInputStream`. If the object received’s `toString()` method equals
    `EOF`, the server stops looping, and the connection is closed.


    **Note**


    Using `ObjectOutputStream` and `ObjectInputStream` to send and receive a lot of
    objects can lead to memory leaks. `ObjectOutputStream` keeps a copy of the sent
    object for efficiency. If you were to send the same object again, `ObjectOutputStream`
    and `ObjectInputStream` do not send the same object again, but instead, send a
    previously sent Object ID. This behavior or sending the Object ID instead of the
    whole object raises two issues.


    The first issue is that objects that are changed in place (mutable) do not reflect
    the change in the receiving client when sent through the wire. The reason is that
    because the object was sent once, `ObjectOutputStream` believes that the object
    is already transmitted and only sends the ID, negating any changes to the object
    that have happened since it was sent. To avoid this, don’t make changes to objects
    sent down the wire. This rule also applies to subobjects from the object graph.


    The second issue is that because `ObjectOutputStream` maintains a list of sent
    objects and their Object IDs, if you send a lot of objects, the dictionary of
    sent objects to keys grows indefinitely, causing memory starvation on a long-running
    program. To alleviate this issue, you can call `ObjectOutputStream.reset()`, which
    clears the dictionary of sent objects. Alternatively, you can invoke `ObjectOutputStream.writeUnshared()`
    to not cache the object in the `ObjectOutputStream` dictionary.


    ## 8.5 Obtaining the Java Execution Path


    ### Problem


    You want to get the path where the Java program is running.


    ### Solution


    Invoke the `System` class’s `getProperty` method. The following is an example.


    ```

    String path = System.getProperty("user.dir");

    The main class is:

    public class Ch_8_5_path {

    public static void main(String[] args) {

    String path = System.getProperty("user.dir");

    System.out.println(path);

    }

    }

    And the output in a windows OS is:

    C:\eclipse-workspace\java17Recipes

    ```


    ### How It Works


    When a Java program starts, the JRE updates the `user.dir` system property to
    record where the JRE was invoked. The solution example passes the `"user.dir"`
    property name to the `getProperty` method, which returns the value.


    ## 8.6 Copying a File


    ### Problem


    You need to copy a file from one folder to another.


    ### Solution


    From the default [`java.nio.file`](https://docs.oracle.com/en/java/javase/17/docs/api/java.base/java/nio/file/package-summary.html)`.FileSystem`
    abstract class, you create the “to” and “from” paths where the files/folders exist
    and then use the `Files.copy` static method to copy files between the created
    paths.


    ```

    public static void main (String[] args) {

    Ch_8_6_CopyFileExample exampleCh86 = new Ch_8_6_CopyFileExample();

    exampleCh86.copyFile();

    }

    private void copyFile() {

    FileSystem fileSystem = FileSystems.getDefault();

    Path sourcePath = fileSystem.getPath("file.log");

    Path targetPath = fileSystem.getPath("file2.log");

    System.out.println("Copy from "+sourcePath.toAbsolutePath().toString()+

    " to "+targetPath.toAbsolutePath().toString());

    try {

    Files.copy(sourcePath, targetPath, StandardCopyOption.REPLACE_EXISTING);

    } catch (IOException e) {

    e.printStackTrace();

    }

    }

    ```


    ### How It Works


    In the new NIO.2 libraries, Java works with an abstraction level that allows for
    more direct manipulation of file attributes belonging to the underlying operating
    system. `FileSystems.getDefaults()` gets the usable abstract system on which you
    can do file operations.


    After getting the default `FileSystem` object, you can query for file objects.
    In the NIO.2 file, folders and links are all called *paths*. Once you get a path,
    you can perform operations with it. In this example, `Files.copy` is called with
    the source and destination paths. The last parameter refers to the different copy
    options. The different copy options are file system dependent, so make sure that
    the one you choose is compatible with the operating system you intend to run the
    application in.


    ## 8.7 Moving a File


    ### Problem


    You need to move a file from one file system location to another.'
