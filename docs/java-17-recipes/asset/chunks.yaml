    There are multiple ways to iterate a `Map` class. The method you choose should
    depend on which portions of the map you need to access and whether you need to
    remove elements from the map while iterating. The `StockPortfolio1` class is a
    continuation of the `StockPorfolio` class shown in the previous recipe. It adds
    three methods—`summary()`, `alertList()`, and `remove(List<String>)—`that demonstrate
    alternative methods for iterating over the portfolio map: `Map<String, Stock>
    portfolio = new HashMap<>();`.


    The following is the class.


    ```

    import org.java17recipes.chapter07.recipe07_07.Stock;

    import org.java17recipes.chapter07.recipe07_06.StockScreener;

    import java.util.ArrayList;

    import java.util.HashMap;

    import java.util.Iterator;

    import java.util.List;

    import java.util.Map;

    import java.util.stream.Collectors;

    public class StockPortfolio1 implements Iterable {

    Map portfolio = new HashMap();

    public void add(Stock stock) {

    portfolio.put(stock.getSymbol(), stock);

    }

    public void add(List stocks) {

    for (Stock s : stocks) {

    portfolio.put(s.getSymbol(), s);

    }

    }

    public void remove(String stock) {

    portfolio.remove(stock);

    }

    public void remove(List sellList) {

    Iterator keyIter = portfolio.keySet().iterator();

    while (keyIter.hasNext()) {

    if (sellList.contains(keyIter.next())) {

    keyIter.remove();

    }

    }

    }

    /**

