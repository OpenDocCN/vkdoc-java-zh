    ## 2.17 本章小结


    本章介绍了 Java 17 中的一些新特性和增强功能。虽然这并非新特性的完整列表，但本章深入探讨了一些最受期待的特性，包括向量和 switch 模式匹配。建议阅读全书以更全面地了解新特性。不过，本章已让你初步领略了未来的发展方向。


    # 3. 字符串


    本章重点介绍一些最常见的 `String` 方法以及处理 `String` 对象的技术。事实上，字符串是任何编程语言中最常用的数据类型之一。它们可用于从键盘获取文本、向命令行打印消息等。鉴于字符串的使用如此频繁，随着时间的推移，`String`
    对象中添加了许多功能，使其更易于使用。毕竟，字符串在 Java 中是一个对象，因此它包含可以操作字符串内容的方法。


    ## 3.1 紧凑字符串


    自 Java 语言问世以来，字符串一直以 UTF-16 `char` 类型的数组形式存储。char 数组为每个字符占用两个字节，由于字符串在我们的应用程序中经常使用，这最终会导致较大的内存堆。在
    Java 9 中，字符串以 byte 类型的数组形式存储，存储的字符要么编码为 ISO-8859-1/Latin-1（每个字符一个字节），要么编码为 UTF-16（每个字符两个字节）。char
    数组上还有一个编码标志，指示字符串使用了哪种编码类型。这些更改也称为*紧凑字符串*。


    ## 3.2 获取字符串的子部分


    ### 问题


    你想要检索字符串的一部分。


    ### 解决方案


    使用 `substring()` 方法获取两个不同位置之间的字符串部分。在以下解决方案中，创建了一个字符串，然后使用 `substring()` 方法打印出该字符串的不同部分。


    ```

    public static void substringExample(){

    String originalString = "This is the original String";

    System.out.println(originalString.substring(0, originalString.length()));

    System.out.println(originalString.substring(5, 20));

    System.out.println(originalString.substring(12));

    }

    ```


    运行此方法将产生以下结果。


    ```

    This is the original String

    is the original

    original String

    ```


    ### 工作原理


    `String` 对象包含许多辅助方法。其中一种方法是 `substring()`，它可以返回字符串的部分内容。`substring()` 方法有两种变体。一种接受单个参数，即起始索引。另一种接受两个参数：`startingindex`
    和 `endingindex`。`substring()` 方法有两种变体，使得第二个参数看起来是可选的；如果未指定，则使用调用字符串的长度代替。需要注意的是，索引从
    0 开始，因此字符串中的第一个位置的索引为 0，依此类推。


    从本技巧的解决方案中可以看出，第一次使用 `substring()` 打印出了字符串的全部内容。这是因为传递给 `substring()` 方法的第一个参数是
    0，第二个参数是原始字符串的长度。在 `substring()` 的第二个示例中，使用索引 5 作为第一个参数，索引 20 作为第二个参数。这实际上只返回了字符串的一部分，从字符串中位于第六个位置（即索引
    5，因为第一个位置的索引为 0）的字符开始，到字符串中位于第二十个位置（索引 19）的字符结束。第三个示例仅指定了一个参数；因此，原始字符串从该参数指定的位置开始。


    注意


    `substring()` 方法只接受正整数。如果你尝试传递负值，则会抛出 `java.lang.StringIndexOutOfBoundsException`
    异常。


    ## 3.3 比较字符串


    ### 问题


    你正在编写的应用程序需要能够比较两个或多个字符串值。


    ### 解决方案


    使用内置的 `equals()`、`equalsIgnoreCase()`、`compareTo()` 和 `compareToIgnoreCase()`
    方法来比较字符串中包含的值。以下是使用不同字符串比较操作的一系列测试。


    如你所见，使用了各种 `if` 语句在比较相等时打印消息。


    ```

    String one = "one";

    String two = "two";

    String var1 = "one";

    String var2 = "Two";

    String pieceone = "o";

    String piecetwo = "ne";

    // 比较相等

    if (one.equals(var1)){

    System.out.println ("使用 equals 方法，字符串 one 等于 var1");

    }

    // 比较不相等

