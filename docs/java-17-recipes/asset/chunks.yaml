    ### 工作原理


    虽然可以通过命令行编译 Java 模块来构建 Web 应用程序，但使用 IDE 效率更高。这样，你可以专注于软件开发中更具创造性的部分，而不是修复不一致性和摆弄文件夹层次结构。


    IDE 将开发软件所需的所有应用程序——从源代码编辑器和编译器，到自动化应用程序构建过程的工具和调试器——集成到一个单一的应用程序中。当使用 Java 或其他面向对象语言进行开发时，IDE
    还包含用于可视化类和对象结构、继承以及包含关系的工具。使用 IDE 的另一个优点是，它能传播你对单个模块所做的更改。例如，如果你重命名一个类，IDE 可以自动更新整个项目文件中所有出现该类的地方。


    随着你开发的应用程序变得越来越复杂，使用 IDE 的意义也越来越大。这就是为什么在继续下一个项目之前，我们先讨论如何安装和配置 Eclipse。


    Eclipse 是一个极其强大且可扩展的 IDE，非常适合 Web 应用程序开发。由于软件行业的持续集成和交付（称为*滚动发布*），Eclipse 基金会每年发布四次新版本（分别在三月、六月、九月和十二月）。一旦你安装了
    Eclipse 来开发应用程序，你也可以将它用于任何其他软件开发任务，例如通过插件开发和调试用 Java、C++、Python 编写的应用程序，或者调试在科学界广泛使用的
    Fortran 语言。


    此外，无论你需要执行什么与软件开发相关的任务，很可能已经有人为此开发了 Eclipse 插件。Eclipse Marketplace 网站（[`​marketplace.​eclipse.​org`](http://marketplace.eclipse.org)）列出了大约
    2,000 个插件，分为数十个类别。Eclipse 由一个执行插件的核心平台，以及一系列实现其大部分功能的插件组成。因此，可从 Eclipse 网站下载的标准软件包包含数十个插件。


    ## 1.5 实现“Hello, World”


    ### 问题


    你已经安装了 Java SE 17 和 Eclipse IDE。现在你想运行一个简单的 Java 程序来验证你的安装是否正常工作。


    ### 解决方案


    首先打开 Eclipse IDE。如果你已经在 IDE 中处理过一些项目，你可能会在左侧窗格中看到一些项目。


    转到“文件”菜单，选择“新建” ➤ “Java 项目”，如图 1-9 所示。


    ![](img/323910_4_En_1_Fig9_HTML.jpg)


    图 1-9


    选择 Java 项目


    弹出的对话框如图 1-10 所示。


    ![](img/323910_4_En_1_Fig10_HTML.jpg)


    图 1-10


    创建一个新的 Java 项目


    将你的项目命名为 **java17Recipes**。在对话框顶部的文本框中输入项目名称，如图 1-10 所示。


    在 JRE 部分，选择已安装的 JDK（即你刚刚配置的 JavaSE-17）。按“完成”按钮完成向导并创建一个骨架项目。


    提示


    Java 是区分大小写的。此外，按照惯例，项目名称应以小写字母开头。


    现在，创建一个新的包。转到“文件”菜单，选择“新建” ➤ “包”，如图 1-11 所示。


    ![](img/323910_4_En_1_Fig11_HTML.jpg)


    图 1-11


    在 Eclipse IDE 中创建新包


    将包命名为 `org.java17recipes.chapter01.recipe01_05`，如图 1-12 所示。


    ![](img/323910_4_En_1_Fig12_HTML.jpg)


    图 1-12


    在 Eclipse IDE 中命名包


    提示


    按照惯例，包名通常以小写字母开头。


    接下来，创建一个新的类。转到“文件”菜单，选择“新建” ➤ “类”，并将该类命名为 `HelloWorld`，如图 1-13 所示。


    ![](img/323910_4_En_1_Fig13_HTML.jpg)


    图 1-13


    在 Eclipse IDE 中创建并命名一个新类


    提示


    你可以通过简单地创建一个新类并在“名称”字段中输入包名和类名，在同一个配置窗口中创建包和类。此外，按照惯例，类名通常以大写字母开头。


    请确保你完全按照我们这里提供的方式输入项目名称、包名称和类名称，因为后续的代码依赖于你的正确输入。确保项目名称是 `java17Recipes`。确保包是
    `org.java17recipes.chapter01.recipe01_05`。确保类是 `HelloWorld`。


    接下来，你应该查看一个 Java 源文件。系统会为你生成骨架代码，你的 Eclipse IDE 窗口应该类似于图 1-14 所示。


    ![](img/323910_4_En_1_Fig14_HTML.jpg)


    图 1-14


    查看 Eclipse 生成的骨架代码


    将光标放在源代码窗格中的任意位置。按 Ctrl+A 选择所有骨架代码。然后按 Delete 键将其删除。用清单 1-2 中的代码替换已删除的代码。然后，创建另一个类，将其命名为
    `HelloMessage`，并从清单 1-3 中复制代码。


    你可以在本书的示例下载中找到清单 1-2 和清单 1-3 中的代码。有两个文件，名为 `HelloMessage.java` 和 `HelloWorld.java`，它们位于名为
    `org.java17recipes.chapter01.recipe01_05` 的 Java 包中。请注意，本书中所有实质性的解决方案都包含在该示例下载中。


    该类名为 `HelloWorld`，它启动程序。


    ```

    package org.java17recipes.chapter01.recipe01_05;

    public class HelloWorld {

    /* main 方法从这个类开始 */

    public static void main(String[] args) {

    HelloMessage hm;

    hm = new HelloMessage();

    System.out.println(hm.getMessage());

    hm.setMessage("Hello, World");

    System.out.println(hm.getMessage());

    }

    }

    清单 1-2

    一个“Hello, World”示例

    ```


    第二个类 `HelloMessage` 是一个容器类，用于保存基于字符串的消息。


    ```

    package org.java17recipes.chapter01.recipe01_05;

    public class HelloMessage {

    private String message = "";

    public HelloMessage() {

    this.message = "Default Message";

    }

    public void setMessage (String m) {

    this.message = m;

    }

    public String getMessage () {

    //它将消息转换为大写

    return message.toUpperCase();

    }

    }

    清单 1-3

    一个“消息”示例

    ```


    确保你已经粘贴（或输入）了代码。编译并运行程序。在项目中右键单击，选择“运行方式” ➤ “Java 应用程序”，如图 1-15 所示。


    ![](img/323910_4_En_1_Fig15_HTML.jpg)


    图 1-15


    在 Eclipse IDE 中运行项目


    现在你应该看到以下输出。


    ```

    DEFAULT MESSAGE

    HELLO, WORLD

    ```


    此输出出现在一个名为“控制台”的新视图中，Eclipse 会在 IDE 窗口底部打开该视图，如图 1-16 所示。


    ![](img/323910_4_En_1_Fig16_HTML.jpg)


    图 1-16


    Eclipse IDE 中的控制台视图


    ### 工作原理


    你可以使用本示例中展示的相同通用技术来运行本章中几乎所有的解决方案。因此，我们仅在此处展示一次分步截图。

