    工作原理

    多播是指通过单次传输向一组监听者广播消息的能力。多播的一个很好的类比是无线电广播。成千上万的人可以收听同一个广播事件，听到相同的消息。计算机在向监听者发送消息时也可以做类似的事情。一组客户端机器可以调谐到相同的地址和端口号，以接收服务器向该地址和端口广播的消息。Java
    语言通过数据报消息传递提供多播功能。数据报是独立的、不保证送达的消息，可以通过网络传递给客户端。（*不保证送达*意味着到达、到达时间和内容都是不可预测的。）与通过
    TCP 发送的消息不同，发送数据报是一个非阻塞事件，发送者不会收到消息已接收的通知。数据报使用用户数据报协议（UDP）而非 TCP 发送。如果消息的顺序、可靠性和数据完整性不是关键任务，那么通过
    UDP 发送多播消息的能力是相对于 TCP 的一个优势。


    Java 通过 `MulticastChannel` 接口支持多播消息传递。实现 `MulticastChannel` 接口的类启用了多播功能，因此可以向组广播并接收组广播。其中一个这样的类是
    `DatagramChannel`，它是一个面向数据报套接字的可选通道。在本方案的解决方案中，客户端和服务器程序都通过多播消息传递进行通信。通信双方都使用了
    `DatagramChannel` 类。`DatagramChannel` 必须以特定方式配置才能用于接收多播消息。具体来说，需要在打开的 `DatagramChannel`
    客户端上设置一些选项。我们稍后将讨论这些选项。创建接收多播消息的客户端需要以下步骤。


    1.  打开一个数据报通道。

    2.  设置多播所需的数据报通道选项。

    3.  将客户端加入多播组并返回一个 `MembershipKey` 对象。

    4.  打开客户端。


    在本方案的解决方案中，客户端应用程序首先获取接收广播消息的网络接口的引用。多播需要设置一个 `NetworkInterface`。接下来，选择一个端口号和一个多播
    IP 地址。组或已注册的监听者使用该 IP 地址监听广播。端口号必须未被占用；否则会抛出异常。对于 IPv4 多播，IP 地址必须在 224.0.0.0 到
    239.255.255.255（含）范围内。此端口和 IP 地址与服务器广播消息时使用的相同。接下来，使用 `StandardProtocolFamily.INET`
    打开一个新的数据报通道。打开数据报通道的选择是 `StandardProtocolFamily.INET` 或 `StandardProtocolFamily.INET6`，分别对应
    IPv4 和 IPv6。在数据报通道上设置的第一个选项是 `StandardSocketOptions.SO_REUSEADDR`，并将其设置为 `true`。这表示多个客户端可以“重用”该地址或同时使用它。必须设置此选项才能进行多播。然后，客户端使用一个新的
    `InetSocketAddress` 实例绑定到该端口。最后，将 `StandardSocketOptions.IP_MULTICAST_IF` 选项设置为所使用的网络接口。此选项表示数据报导向套接字发送多播数据报时的传出接口。


    ```

    client.setOption(StandardSocketOptions.SO_REUSEADDR, true);

    client.bind(new InetSocketAddress(port));

    client.setOption(StandardSocketOptions.IP_MULTICAST_IF, networkInterface);

    ```

