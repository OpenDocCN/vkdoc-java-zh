    \            FileOutputStream file = new FileOutputStream(\"file.out\");\n   \
    \         file.write(result);\n            file.close();\n        } catch (FileNotFoundException\
    \ e) {\n            e.printStackTrace();\n        } catch (IOException e) {\n\
    \            e.printStackTrace();\n        } catch (Exception e) {\n         \
    \   e.printStackTrace();\n        } finally {\n            myLock.unlock();\n\
    \        }\n    }\n}\n```\n\n### 工作原理\n\n放置在 `try`/`catch`/`finally` 块的 `finally`\
    \ 子句中的代码始终会被执行。在此示例中，在函数开头获取锁并在 `finally` 块中释放它，可以确保无论是否抛出异常（已检查或未检查），锁都会在函数结束时被释放。总之，获取的锁应始终在\
    \ `finally` 块中释放。在示例中，假设 `mylock.unlock()` 函数调用不在 `finally` 块中（而是在 `try` 块的末尾）；如果在这种情况下发生异常，则不会执行\
    \ `mylock.unlock()` 调用，因为代码执行会在异常发生的位置中断。在这种情况下，锁将永远被持有而无法释放。\n\n**注意**\n\n如果需要在方法中返回值，请避免在\
    \ `finally` 块中返回。`finally` 块中的 `return` 语句始终会执行，无论 `try` 块中可能已经执行了任何其他 `return`\
    \ 语句。\n\n## 9.3 抛出异常\n\n### 问题\n\n当应用程序中出现特定情况时，希望通过抛出异常来中止当前代码路径的执行。\n\n### 解决方案\n\
    \n当特定情况发生时，使用 `throw` 关键字抛出指定的异常。使用 `throw` 关键字，可以通知当前线程查找 `try`/`catch` 块（在当前层级及调用栈上层），这些块可以处理抛出的异常。在以下示例中，如果传入的参数为\
    \ `null`，`callSomeMethodThatMightThrow` 方法会抛出一个 `NullPointerException`（`RuntimeException`\
    \ 类型）。\n\n```\npublic class Recipe9_3 {\n    public static void main(String[]\
    \ args) {\n        Recipe9_3 recipe = new Recipe9_3();\n        recipe.start();\n\
    \    }\n    private void start() {\n        try {\n            callSomeMethodThatMightThrow(null);\n\
    \        } catch (IllegalArgumentException e) {\n            System.err.println(\"\
    存在非法参数异常！\");\n        }\n    }\n    private void callSomeFunctionThatMightThrow(Object\
    \ o) {\n        if (o == null) throw new NullPointerException(\"对象为空\");\n   \
    \ }\n```\n\n在此代码示例中，`callSomeMethodThatMightThrow` 方法检查是否传入了有效参数。如果参数为 `null`，则抛出\
    \ `NullPointerException（RuntimeException` 类型`）`，表示该方法的调用者使用了错误的参数调用它。\n\n### 工作原理\n\
    \n`throw` 关键字允许显式生成异常条件。当当前线程抛出异常时，它不会执行 `throw` 语句之后的任何代码，而是将控制权转移到 `catch` 子句（如果有的话），或者终止线程。\n\
    \n**注意**\n\n抛出异常时，请确保你确实有意这样做。如果异常在向上传播过程中未被捕获，它将终止正在执行的线程（也称为*展开*）。如果你的程序只有一个主线程，未捕获的异常将终止你的程序。\n\
    \n## 9.4 捕获多个异常\n\n### 问题\n\n应用程序中的代码块可能抛出多个异常。希望捕获 `try` 块中可能发生的每个异常。\n\n###\
    \ 解决方案 1\n\n当同一个块中可能遇到多个异常时，可以指定多个 `catch` 子句。每个 `catch` 子句可以指定要处理的不同异常，以便对每个异常进行不同的处理。在以下代码中，两个\
    \ `catch` 子句分别处理 `IOException` 和 `ClassNotFoundException`。\n\n```\npublic static\
    \ void main(String[] args) {\n    Recipe9_4 recipe = new Recipe9_4();\n    recipe.startClassic();\n\
    }\nprivate void startClassic() {\n    try {\n        Class stringClass = Class.forName(\"\
    java.lang.String\");\n        FileInputStream in = new FileInputStream(\"myFile.log\"\
    ) ; // 可能抛出 IOException\n        in.read();\n    } catch (IOException e) {\n \
    \       System.err.println(\"发生异常 \"+e);\n    } catch (ClassNotFoundException\
    \ e) {\n        System.err.println(\"发生异常 \"+e);\n    }\n}\n```\n\n### 解决方案 2\n\
    \n如果应用程序倾向于在单个块中抛出多个异常，则可以使用竖线运算符（`|`）以相同的方式处理每个异常。在以下示例中，`catch` 子句指定了多个异常类型，用竖线（`|`）分隔，以相同的方式处理每个异常。\n\
    \n```\npublic static void main(String[] args) {\n    Recipe9_4 recipe = new Recipe9_4();\n\
    \    recipe.start();\n}\nprivate void start() {\n    try {\n        Class stringClass\
    \ = Class.forName(\"java.lang.String\");\n        FileInputStream in = new FileInputStream(\"\
    myFile.log\") ;\n        // 可能抛出 IOException\n        in.read();\n    } catch\
    \ (IOException | ClassNotFoundException e) {\n        System.out.println(\"抛出了类型为\
    \ \"+e.getClass()+\" 的异常！ \"+e);\n    }\n}\n```\n\n### 工作原理\n\n处理可能抛出多个异常的情况有多种不同的方式。可以指定单独的\
    \ `catch` 子句来分别处理每个异常。要以相同的方式处理每个异常，可以使用单个 `catch` 子句，并用竖线运算符分隔每个异常。\n\n**注意**\n\
    \n如果在多个 `catch` 块中捕获异常（解决方案 1），请确保 `catch` 块的定义顺序是从最具体到最通用。不遵循此约定将导致异常无法处理更具体的块。当存在\
    \ `catch (Exception e)` 块（几乎捕获所有异常）时，这一点最为重要。\n\n使用 `catch (Exception e)` 块——称为*捕获所有*或*宝可梦异常处理器*（必须捕获所有）——通常是糟糕的做法，因为这样的块会捕获所有异常类型并同等对待。这会产生问题，因为该块可能会捕获调用栈深处可能发生的、你本意并非要捕获的其他异常（例如\
    \ `OutOfMemoryException`）。最好指定每个可能的异常，而不是指定一个捕获所有异常的处理器。\n\n## 9.5 捕获未捕获的异常\n\n\
    ### 问题\n\n希望在线程因未捕获的异常（例如 `NullPointerException`）而终止时得到通知。\n"
- fmt: '### Solution 1


    When creating a Java thread, sometimes you need to ensure that any exception is
    caught and handled properly to help determine the reason for the thread termination.
    The following code demonstrates registering an exception handler on a per-thread
    basis.


    ```

    public static void main(String[] args) {

    Recipe9_5 recipe = new Recipe9_5();

    recipe.start();

    recipe.startForCurrentThread();

    }

    private void start() {

    Thread.setDefaultUncaughtExceptionHandler((Thread t, Throwable e) -> {

    System.out.println("Woa! there was an exception thrown somewhere! "+t.getName()+":
    "+e);

    });

    final Random random = new Random();

    for (int j = 0; j < 10; j++) {

    int divisor = random.nextInt(4);

    System.out.println("200 / " + divisor + " Is " + (200 / divisor));

    }

    }

    ```


    The following is the output.


    ```

    200 / 2 Is 100

    Woa! there was an exception thrown somewhere! main: java.lang.ArithmeticException:
    / by zero

    ```


    The `for` loop in this thread executes properly until an exception is encountered,
    when `DefaultUncaughtExceptionHandler` is invoked. `UncaughtExceptionHandler`
    is a functional interface, so utilizing a lambda expression to implement the exception
    handler is possible.


    ### Solution 2


    It is possible to register `UncaughtExceptionHandler` in a specific thread. After
    doing so, any exception within the thread that has not been caught is handled
    by the `uncaughtException()` method. The following is an example.


    ```

    private void startForCurrentThread() {

    Thread.currentThread().setUncaughtExceptionHandler((Thread t, Throwable e) ->
    {

    System.out.println("In this thread "+t.getName()+" an exception was thrown "+e);

    });

    Thread someThread = new Thread(() -> {

    System.out.println(200/0);

    });

    someThread.setName("Some Unlucky Thread");

    someThread.start();

    System.out.println("In the main thread "+ (200/0));

    }

    ```


    The following is the output.


    ```

    In this thread main an exception was thrown java.lang.ArithmeticException: / by
    zero

    ```


    In the previous code, `UncaughtExceptionHandler` is registered on `currentThread`.
    As in solution 1, `UncaughtExceptionHandler` is a functional interface, so utilizing
    a lambda expression to implement the exception handler is possible.


    ### How It Works


    `Thread.defaultUncaughtExceptionHandler()` is invoked for each unchecked exception
    that has not been caught. When `UncaughtExceptionHandler()` handles an exception,
    it means that there was no `try`/`catch` block in place to catch the exception.
    As such, the exception bubbled up the thread stack. This is the last code executed
    on that thread before it terminates. The thread terminates when an exception is
    caught on either the thread’s or the default’s `UncaughtExceptionHandler()`, which
    logs information on the exception to help pinpoint the reason for the exception.


    In solution 2, `UncaughtExceptionHandler()` is set up specifically for the current
    thread. When the thread throws an exception that is not caught, it bubbles up
    to `UncaughtExceptionHandler()` in the thread. If this is not present, it bubbles
    up to `defaultUncaughtExceptionHandler()`. Again, in either situation, the thread
    originating the exception terminates.


    **Tip**


    When dealing with multiple threads, it is always good practice to explicitly name
    the threads. It makes life easier to know exactly which thread caused the exception,
    rather than having to trace down an unknown thread named like `Thread-##` (the
    default naming pattern of unnamed threads).


    ## 9.6 Managing Resources with try/catch Blocks


    ### Problem


    In the event of an exception, you need to ensure that any resources used within
    a `try`/`catch` block are released.


    ### Solution


    Use the Automatic Resource Management (ARM) feature, which can be specified with
    a `try`-`with`-`resources` statement. When using that statement, any resources
    specified within the `try` clause are automatically released when the block terminates.
    In the following code, the `FileOutputStream`, `BufferedOutputStream`, and `DataOutputStream`
    resources are automatically handled by the `try`-`with`-`resources` block.


    ```

    public class Recipe9_6 {

    public static void main(String []args) {

    Recipe9_6 recipe = new Recipe9_6();

    recipe.start();

    }

    private void start() {

    try (

    FileOutputStream fos = new FileOutputStream("out.log");

    BufferedOutputStream bos = new BufferedOutputStream(fos);

    DataOutputStream dos = new DataOutputStream(bos)

    ) {

    dos.writeUTF("This is being written");

    } catch (Exception e) {

    System.out.println("Some bad exception happened ");

    }

    }

    ```


    ### How It Works


    In most cases, you want to cleanly close/dispose of resources acquired within
    a `try`/`catch` block after the block execution is complete. If a program does
    not close/dispose of its resources or does so improperly, the resources could
    be acquired indefinitely, causing issues such as memory leaks. Most resources
    are limited (file handles or database connections), and as such, cause performance
    degradation (and more exceptions to be thrown). To avoid these situations, Java
    provides a means of automatically releasing resources when an exception occurs
    within a `try`/`catch` block. By declaring a `try-with-resources` block, the resource
    on which the `try` block was checked is closed if an exception is thrown within
    the block. Most of the resources built into Java work properly within a `try-with-resources`
    statement (for a full list, see implementers of the `java.lang.AutoCloseable`
    interface). Also, third-party implementers can create resources that work with
    the `try-with-resources` statements by implementing the `AutoCloseable` interface.


    The syntax for the `try-with-resources` statement involves the `try` keyword,
    followed by an opening parenthesis and then followed by all the resource declarations
    that you want to have released in the event of an exception or when the block
    completes and ending with a closing parenthesis. You receive a compiler error
    if you try to declare a resource/variable that doesn’t implement the `AutoCloseable`
    interface. After the closing parenthesis, the syntax of the `try`/`catch` block
    is the same as a normal block.


    The main advantage of the `try-with-resources` feature is that it allows a cleaner
    release of resources. Usually, when acquiring a resource, there are a lot of interdependencies
    (creating file handlers, which are wrapped in output streams, which are wrapped
    in buffered streams). Properly closing and disposing of these resources in exceptional
    conditions requires checking the status of each dependent resource and carefully
    disposing of it, and doing so requires that you write a lot of code. By contrast,
    the `try-with-resources` construct allows the JVM to properly dispose of resources,
    even in exceptional conditions.


    **Note**


    A `try-with-resources` block always closes the defined resources, even if no exceptions
    were thrown.


    ## 9.7 Creating an Exception Class


    ### Problem


    You want to create a new type of exception that indicates a particular event.


    ### Solution 1


    Create a class that extends `java.lang.RuntimeException` to create an exception
    class that can be thrown at any time. In the following code, a class identified
    by `IllegalChatServerException` extends `RuntimeException` and accepts a string
    as an argument to the constructor. The exception is then thrown when a specified
    event occurs within the code.


    ```

    class IllegalChatServerException extends RuntimeException {

    IllegalChatServerException(String message) {

    super(message);

    }

    }

    private void disconnectChatServer(Object chatServer) {

    if (chatServer == null) throw new IllegalChatServerException("Chat server is empty");

    }

    ```'
