    ## 2.1 var 关键字简介


    ### 问题


    你想使用一个能够根据上下文推断变量数据类型的关键字。


    ### 解决方案


    使用 Java 10 中引入的局部变量类型推断。清单 2-1 是一个示例。


    ```

    org.java17recipes.chapter01.recipe02_01;

    public class KeywordVar {

    public static void main (String[] args) {

    var num = 1;

    var city = "Taranto";

    System.out.println(num);

    System.out.println(city);

    }

    }

    清单 2-1

    声明局部变量类型推断包

    ```


    现在你应该会看到以下输出。


    ```

    1

    Taranto

    ```


    ### 工作原理


    在 Java 10 之前，你按以下方式声明。


    ```

    String city = "Taranto";

    ```


    接着，你可以按以下方式声明。


    ```

    var city = "Taranto"

    ```


    它允许程序员声明局部变量的类型而非实际类型，从而提高了代码的可读性。编译器根据分配给变量的值来决定类型。在 Java 11 中，`var` 的用法被统一扩展到
    lambda 参数，如第 6 章所述。


    局部变量类型推断不能用作全局变量。事实上，如果你使用以下代码，IDE 会引发编译错误。


    ```

    // 实例变量

    var x = 50;

    public static void main(String[] args)

    {

    System.out.println(x);

    }

    ```


    输出是一个错误。


    ```

    ''var'' is not allowed here

    ```


    有关 `var` 关键字的更多信息，请参阅 [`​openjdk.​java.​net/​jeps/​286`](http://openjdk.java.net/jeps/286)
    上的文档。


    注意


    JEP（JDK 增强提案）收集对 JDK 的增强建议，并允许 OpenJDK 以更非正式的方式开发变更。然而，它并不能取代 JCP，JCP 是批准 Java
    API 变更所必需的。


