    }

    ```


    ### 工作原理


    与大多数编程技术一样，Java 有多种执行日期计算的方法。Java 8 中引入的日期时间 API 包含了用于确定时间间隔的新技术。`Period` 类确定指定对象之间两个单位的差值周期。要获取两个日期时间对象之间的周期，请调用
    `Period.between()` 方法，并传入你想要获取周期的两个日期时间对象。`Period` 类有多个方法可以将间隔分解为不同的单位。例如，可以使用
    `getDays()` 方法获取两个日期时间对象中的天数。类似地，可以调用 `getMonths()` 和 `getYears()` 方法来返回该周期中的月数或年数。


    最有用的技术之一是基于给定日期的时间（以毫秒为单位）执行计算。这提供了最精确的计算，因为它在一个非常小的间隔（毫秒）上工作。可以通过对 `Calendar`
    对象调用 `getTimeInMillis()` 方法来获取当前时间（以毫秒为单位）。同样，`Date` 对象通过调用 `getTime()` 方法返回其以毫秒表示的值。从本配方的解决方案中可以看出，第一个计算是找出给定日期之间的毫秒差。获取该值然后取其绝对值，就为执行日期计算提供了基础。


