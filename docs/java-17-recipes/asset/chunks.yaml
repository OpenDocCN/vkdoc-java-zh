- fmt: '### How It Works


    Concurrently updating a map is difficult because it involves two operations: a
    *check-then-act* type of operation. First, the map must be checked to see whether
    an entry already exists in it. If the entry doesn’t exist, you can put the key
    and the value into the map. On the other hand, if the key exists, the value for
    the key is retrieved. To do so, we use the `ConcurrentMap`’s `putIfAbsent` atomic
    operation. This ensures that the key was present, so the value is not overwritten,
    or the key was not present, so the value is set. For the JDK implementations of
    `ConcurrentMap`, the `putIfAbsent()` method returns `null` if there was no value
    for the key or returns the current value if the key has a value. By asserting
    that the `putIfAbsent()` method returns `null`, you are assured that the operation
    was successful and that a new entry in the map has been created.


    There are cases when `putIfAbsent()` might not be efficient to execute. For example,
    if the result is a large database query, executing the database query all the
    time and then invoking `putIfAbsent()` will not be efficient. In this kind of
    scenario, you could first call the map’s `containsKey()` method to ensure that
    the key is not present. If it’s not present, call the `putIfAbsent()` with the
    expensive database query. There might be a chance that the `putIfAbsent()` didn’t
    put the entry, but this type of check reduces the number of potentially expensive
    value creation.


    Note the following code snippet.


    ```

    keyPresent = concurrentMap.containsKey(randomInt);

    if (!keyPresent)  {

    concurrentMap.putIfAbsent(randomInt, "Thread # " + i + " has made it!");

    }

    ```


    In this code, the first operation is to check whether the key is already in the
    map. If it is, it doesn’t execute the `putIfAbsent()` operation. If the key is
    not present, we can execute the `putIfAbsent()` operation.


    If you are accessing the map’s values from different threads, you should make
    sure that the values are thread-safe. This is most evident when using collections
    as values because they could be accessed from different threads. Ensuring that
    the main map is thread-safe prevent concurrent modifications to the map. However,
    once you gain access to the map’s values, you must exercise good concurrency practices
    around the map’s values.


    ## 10.4 Iterating Through a Changing Collection


    ### Problem


    You need to iterate over each element in a collection. However, other threads
    are constantly updating the collection.


    ### Solution 1


    By using `CopyOnWriteArrayList<E>`, you can safely iterate through the collection
    without worrying about concurrency. In the following solution, the `startUpdatingThread()`
    method creates a new thread, which actively changes the list passed to it. While
    `startUpdatingThread()` modifies the list, it is concurrently iterated using the
    `stream forEach()` function.


    ```

    public class Recipe10_4 {

    public static void main(String[] args) {

    Recipe10_4 recipe = new Recipe10_4();

    recipe.start();

    }

    private void start() {

    System.out.println("Using CopyOnWrite");

    copyOnWriteSolution();

    }

    private void stopUpdatingThread() {

    updatingThread.interrupt();

    }

    Random random = new Random();

    Thread updatingThread ;

    private void startUpdatingThread(final List list) {

    updatingThread = new Thread(() -> {

    long counter =0;

    while (!Thread.interrupted()) {

    int size = list.size();

    if (random.nextBoolean()) {

    if (size > 1) {

    list.remove(random.nextInt(size - 1));

    }

    } else {

    if (size  list = new CopyOnWriteArrayList();

    startUpdatingThread(list);

    list.stream().forEach((element) -> {

    System.out.println("Element :" + element);

    });

    stopUpdatingThread();

    }

    }

    ```


    ### Solution 2


    Using a `synchronizedList()` method allows you to atomically change the collection.
    It also provides a way to synchronize safely on the list while iterating through
    it (which is done in the stream). The following is an example.


    ```

    public class Recipe10_4 {

    public static void main(String[] args) {

    Recipe10_4 recipe = new Recipe10_4();

    recipe.start();

    }

    private void start() {

    System.out.println("Using SynchronizedList");

    synchronizedListSolution();

    }

    private void stopUpdatingThread() {

    updatingThread.interrupt();

    }

    Random random = new Random();

    Thread updatingThread ;

    private void startUpdatingThread(final List list) {

    updatingThread = new Thread(() -> {

    long counter =0;

    while (!Thread.interrupted()) {

    int size = list.size();

    if (random.nextBoolean()) {

    if (size > 1) {

    list.remove(random.nextInt(size - 1));

    }

    } else {

    if (size  list = Collections.synchronizedList(new ArrayList());

    startUpdatingThread(list);

    synchronized (list) {

    list.stream().forEach((element) -> {

    System.out.println("Element :" + element);

    });

    }

    stopUpdatingThread();

    }

    }

    ```


    The following is the output.


    ```

    Using CopyOnWrite

    Element :Random string 731774

    Using SynchronizedList

    Element :Random string 1100164

    Element :Random string 1100177

    Element :Random string 1100180

    ```


    ### How It Works


    Java comes with many concurrent collection options. Which collection to use depends
    on how the read operations compare with the write operations within the context
    of your application. If writing occurs far and in-between compared with reads,
    using a `CopyOnWriteArrayList<E>` instance is most efficient because it doesn’t
    *block* (stop) other threads from reading the list and is thread-safe to iterate
    over (no `ConcurrentModificationException` is thrown when iterating through it).
    If there are the same number of writes and reads, the `SynchronizedList` method
    from the `Collections` class is the preferred choice.


    In solution 1, the `CopyOnWriteArrayList<E>` is being updated while you traverse
    the list. Because the recipe uses the `CopyOnWriteArrayList` instance, there is
    no need to worry about thread safety when iterating through the collection (as
    done in this recipe by using the stream). It is good to note that `CopyOnWriteArrayList<E>`
    offers a snapshot in time when iterating through it. If another thread modifies
    the list as you’re iterating through it, the modified list is likely not visible
    when iterating.


    Note


    Locking properly depends on the type of collection being used. Any collections
    returned as a result of using `Collections.synchronized` can be locked via the
    collection itself (`synchronized (collectionInstance)`). However, some more efficient
    (newer) concurrent collections such as the `ConcurrentMap` cannot be used in this
    fashion because their internal implementations don’t lock in the object itself.


    Solution 2 creates a synchronized list, which is created by using the `Collections`
    helper class. The `Collection.synchronizedList()` method wraps a `List` object
    (it can be `ArrayList<E>`, `LinkedList<E>`, or another `List<E>` implementation)
    into a list that synchronizes the access to the list operations. Each time you
    need to iterate over a list (either by using the `stream`, a `for` loop, or an
    iterator), you must be aware of the concurrency implications for that list’s iterator.
    `CopyOnWriteArrayList<E>` is safe to iterate over (as specified in the JavaDoc).
    But, the iterator of the `SynchronizedList` method from the `Collections` class
    must be synchronized manually (also specified in the JavaDoc `Collections.synchronizedList`
    iterator). In the solution, the list can safely be iterated while inside the `synchronized(list)`
    block. When synchronizing on the list, no read/updates/other iterations can occur
    until the `synchronized(list)` block is completed.


    ## 10.5 Coordinating Different Collections


    ### Problem


    You need to modify different but related collections at the same time, and you
    want to ensure that no other threads can see these modifications until they have
    been completed.'
