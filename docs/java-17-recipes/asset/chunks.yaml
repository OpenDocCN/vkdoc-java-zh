    public final class ColorSquare extends Square {}

    ```


    ### How It Works


    This enhancement was proposed in Java 15 and finalized in Java 17 (JEP 409) with
    no changes from the last version. The sealed scope modifier allows controlling
    the permitted subtypes for classes and interfaces. A class can also be non-sealed
    (i.e., it can be extended by any unknown subclasses).


    A sealed class sets three constraints on its permitted subclasses (i.e., the Rectangle
    and Triangle subclasses) must belong to the same module as the sealed class, they
    must extend the sealed class (Rectangle extends LineShape and public non-sealed
    class Triangle extends LineShape). The subclass must define a modifier: final,
