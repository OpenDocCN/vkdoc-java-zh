    \ write code that executes when control leaves a code segment, even if control\
    \ leaves due to an error being thrown or the segment ending abnormally. For example,\
    \ you have acquired a lock and want to be sure that you are releasing it correctly.\
    \ You want to release the lock in the event of an error or no error."
