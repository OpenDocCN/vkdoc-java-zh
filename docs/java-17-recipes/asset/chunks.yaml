- fmt: '### How It Works


    Obtaining a connection within a database application can be code-intensive. Moreover,
    the process can be prone to error if you retype the code each time you obtain
    a connection. By encapsulating database connection logic within a single class,
    you can reuse the same connection code when you require a connection to the database.
    This increases your productivity, reduces the chances of typing errors, and enhances
    manageability. If you have to make a change, it can occur in one place rather
    than in several different locations.


    Creating a strategic connection methodology is beneficial to you and others who
    might need to maintain your code in the future. Although data sources are the
    preferred technique for managing database connections when using an application
    server, the solution to this recipe demonstrates the use of standard JDBC `DriverManager`
    connections. One of the security implications of using `DriverManager` is that
    you need to store the database credentials somewhere for use by the application.
    It is not safe to store those credentials in plain text anywhere, and it is also
    not safe to embed them in application code, which might be decompiled at some
    point in the future. As seen in the solution, a properties file that on disk stores
    the database credentials. Assume that this properties file is encrypted at some
    point before deployment to a server and that the application can handle decryption.


    As seen in the solution, the code reads the database credentials, hostname, database
    name, and port number from the properties file. That information is then pieced
    together to form a JDBC URL that `DriverManager` can use to obtain a connection
    to the database. Once obtained, that connection can be used anywhere and then
    closed.


    You could develop a JDBC application so that the code used to obtain a connection
    needs to be hard-coded throughout. Instead, this solution enables all the code
    for obtaining a connection to be encapsulated by a single class so that the developer
    does not need to worry about it. Such a technique also allows the code to become
    more maintainable. For instance, if the application were originally deployed using
    `DriverManager`, but then later had the ability to use `DataSource`, very little
    code would need to be changed.


    ## 12.7 Guarding Against SQL Injection


    ### Problem


    Your application performs database tasks. To reduce the chances of a SQL injection
    attack, you need to ensure that no unfiltered strings of text are being appended
    to SQL statements and executed against the database.


    **Tip**


    Although prepared statements are the solution to this recipe, they can be used
    more than protecting against SQL injection. They also provide a way to centralize
    and better control the SQL used in an application. Instead of creating multiple,
    possibly different, versions of the same query, for example, you can create the
    query once as a prepared statement and invoke it from many different places throughout
    your code. Any change to the query logic needs to happen only when you prepare
    the statement.


    ### Solution


    Use `PreparedStatement` objects for performing the database tasks. They send a
    precompiled SQL statement to the DBMS rather than a string. The following code
    demonstrates how to perform a database query and a database update using a `java.sql.PreparedStatement`
    object.


    In the following code example, `PreparedStatement` queries a database for a given
    record. Assume that the `a String[]` of recipe numbers is passed to this code
    as a variable.


    ```

    private static void queryDbRecipe(String[] recipeNumbers) {

    String sql = "SELECT ID, RECIPE_NUMBER, RECIPE_NAME, DESCRIPTION "

    + "FROM RECIPES "

    + "WHERE RECIPE_NUMBER = ?";

    try (PreparedStatement pstmt = conn.prepareStatement(sql)) {

    for (String recipeNumber : recipeNumbers) {

    pstmt.setString(1, recipeNumber);

    ResultSet rs = pstmt.executeQuery();

    while (rs.next()) {

    System.out.println(rs.getString(2) + ": " + rs.getString(3)

    + " - " + rs.getString(4));

    }

    }

    } catch (SQLException ex) {

    ex.printStackTrace();

    }

    }

    ```


    The next example demonstrates a `PreparedStatement` object that inserts a record
    into the database. Assume that the recipe number, title, and description are passed
    to this code as variables. The ID column is declared NOT NULL and AUTO-INCREMENT,
    so it is also possible to assign NULL to the column to generate sequence numbers.


    ```

    private static void insertRecord(String recipeNumber,

    String title,

    String description) {

    String sql = "INSERT INTO RECIPES VALUES(" +

    "null, ?,?,?)";

    try(PreparedStatement pstmt = conn.prepareStatement(sql);) {

    pstmt.setString(1, recipeNumber);

    pstmt.setString(2, title);

    pstmt.setString(3, description);

    pstmt.executeUpdate();

    System.out.println("Record successfully inserted.");

    } catch (SQLException ex){

    ex.printStackTrace();

    }

    }

    ```


    In this last example, a `PreparedStatement` object deletes a record from the database.
    Again, assume that the `recipeNumber` string is passed to this code as a variable.


    ```

    private static void deleteRecord(String recipeNumber) {

    String sql = "DELETE FROM RECIPES WHERE " +

    "RECIPE_NUMBER = ?";

    try(PreparedStatement pstmt = conn.prepareStatement(sql);) {

    pstmt.setString(1, recipeNumber);

    pstmt.executeUpdate();

    System.out.println("Recipe " + recipeNumber + " successfully deleted.");

    } catch (SQLException ex){

    ex.printStackTrace();

    }

    }

    ```


    The main method is:


    ```

    public static void main(String[] args) {

    try {

    CreateConnection createConn = new CreateConnection();

    conn = createConn.getConnection();

    String[] recipeArr = new String[1];

    recipeArr[0] ="12-1";

    queryDbRecipe(recipeArr);

    insertRecord(

    "12-6",

    "Simplifying and Adding Security with Prepared Statements",

    "Working with Prepared Statements");

    recipeArr[0] ="12-6";

    queryDbRecipe(recipeArr);

    deleteRecord("12-6");

    } catch (java.sql.SQLException ex) {

    System.out.println(ex);

    } finally {

    if (conn != null) {

    try {

    conn.close();

    } catch (SQLException ex) {

    ex.printStackTrace();

    }

    }

    }

    }

    ```


    The following is the output.


    ```

    12-1: Installing MySQL - Downloading and installation of a MySQL Database

    Record successfully inserted.

    12-6: Simplifying and Adding Security with Prepared Statements - Working with
    Prepared Statements

    Recipe 12-6 successfully deleted.

    ```


    As you can see, a `PreparedStatement` object is very much the same as a standard
    JDBC statement object, but instead, it sends precompiled SQL to the DBMS rather
    than strings of text.'
