- fmt: '### How It Works


    Java implements the concept of a *classpath*. This is a directory search path
    that you can specify system-wide using the `CLASSPATH` environment variable. You
    can also specify the classpath for a specific invocation of the JVM via the `java`
    command’s `-classpath` option.


    When executing Java programs, the JVM finds and loads classes as needed using
    the following search order.


    1. The classes that are fundamental to the Java platform and are contained in
    the Java installation directory

    2. Any packages or JAR files that are located within the extension directory of
    the JDK

    3. Packages, classes, JAR files, and libraries that are loaded somewhere on the
    specified classpath


    You may need to access more than one directory or JAR file for an application.
    This could be the case if your dependencies are located in more than one location.
    To do so, simply use the delimiter for your operating system (a `;` for Windows
    and a `:` for Unix OS) as a separator between the locations specified by the `CLASSPATH`
    variable. The following is an example of specifying multiple JAR files in the
    `CLASSPATH` environment variable on Unix and Linux systems.


    ```

    export CLASSPATH=/JAVA_DEV/some-jar.jar:/JAVA_LIB/myjar.jar

    ```


    Alternatively, you can specify the classpath via a command-line option.


    ```

    javac –classpath /JAVA_DEV/some-jar.jar:/JAVA_LIB/myjar.jar...

    ```


    When loading the resources for a Java application, the JVM loads all the classes
    and packages specified in the first location, followed by the second, and so on.
    This is important because the order of loading may make a difference in some instances
    to avoid interfering with one another.


    **Note**


    JAR files package applications and Java libraries into a distributable format.
    If you have not packaged your application in that manner, you may simply specify
    the directory or directories in which your `.class` files reside.


    Sometimes you want to include all JAR files within a specified directory. Do that
    by specifying the wildcard character (`*`) after the directory containing the
    files. The following is an example.


    ```

    javac –classpath /JAVA_DEV/*:/JAVA_LIB/myjar.jar...

    ```


    Specifying a wildcard tells the JVM that it should only load JAR files. It does
    not load class files located in a directory specified with the wildcard character.
    You need to specify a separate path entry for the same directory if you also want
    the class files. The following is an example.


    ```

    javac –classpath /JAVA_DEV/*:/JAVA_DEV

    ```


    Subdirectories within the classpath are not searched. To load files contained
    within subdirectories, those subdirectories and/or files must be explicitly listed
    in the classpath. However, Java packages that are equivalent to the subdirectory
    structure *are* loaded. Therefore, any Java classes that reside within a Java
    package that is equivalent to the subdirectory structure are loaded.


    **Note**


    It is a good idea to organize your code; it is also good to organize where you
    place your code on the computer. A good practice is to place all your Java projects
    within the same directory; it can become your workspace. Place all the Java libraries
    that are contained in JAR files into the same directory for easier management.
    You can also use tools like Maven and Gradle to organize your project.


    ## Organizing Code with Packages


    ### Problem


    Your application consists of Java classes, interfaces, and other types. You want
    to organize these source files to make them easier to maintain and avoid potential
    class-naming conflicts.


    ### Solution


    Create Java packages and place source files within them. Java packages can organize
    logical groups of source files within an application. Packages can help organize
    code, reduce naming conflicts among different classes and other Java-type files,
    and provide access control. To create a package, simply create a directory within
    the root of your application source folder and name it. Packages are usually nested
    within each other and conform to a standard naming convention. For this recipe,
    assume that the organization is named JavaBook and makes widgets. To organize
    all the code for the widget application, create a group of nested packages conforming
    to the following directory structure.


    ```

    /org/javabook

    ```


    Any source files placed within a package must contain the `package` statement
    as the first line in the source. The `package` statement lists the name of the
    package in which the source file is contained. For instance, suppose that the
    main class for the widget application is named `JavaBookWidgets.java`. To place
    this class into a package named `org.javabook`, physically move the source file
    into a directory named `javabook`, which resides within the `org` directory, which
    resides within the root of the source folder for the application. The directory
    structure should look like the following.


    ```

    /org/javabook/JavaBookWidgets.java

    ```


    The source for `JavaBookWidgets.java` is as follows.


    ```

    package org.javabook;

    /**

    * The main class for the JavaBook Widgets application.

    * @author

    */

    public class JavaBookWidgets {

    public static void main(String[] args){

    System.out println("Welcome to my app!");

    }

    }

    ```


    The first line in the source contains the `package` statement, which lists the
    name of the package that the source file is located within. The entire package
    path is listed in the statement, and dots separate the names in the path.


    **Note**


    A `package` statement must be the first statement listed within the Java source.
    However, a comment or JavaDoc comment may be written before the `package` statement.


    An application can consist of any number of packages. If the widget application
    contains a few classes representing widget objects, they could be placed within
    the `org.javabook.widget` package. The application may have interfaces that interact
    with the widget objects. In this case, a package named `org.javabook.interfaces`
    may also contain any such interfaces.'
