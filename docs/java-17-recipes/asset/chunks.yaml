    客户端接下来的代码行负责接收来自服务器的消息。要接收广播消息，需要创建一个字节缓冲区，然后将其传递给`DatagramChannel`类的`receive()`方法。一旦调用了`receive()`方法，客户端就会暂停，直到收到消息。你可以通过调用`DatagramChannel.configureBlocking(boolean)`方法并传入`false`值来禁用此功能。接下来，`ByteBuffer`被转换为字符串值并打印出来，方法是使用`flip()`方法将缓冲区索引重置为0，然后将从索引0到最后一个索引的文本提取到`byte[]`中。最后，确保在完成后断开客户端连接。客户端代码部分到此结束。


