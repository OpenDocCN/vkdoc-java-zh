    ## 3.16 Making a String That Can Contain Dynamic Information


    ### Problem


    You want to generate a string that can contain a dynamic placeholder such that
    the string can change depending on application data variations.


    ### Solution 1


    Utilize the built-in `format()` method for generating a string containing placeholders
    for dynamic data. The following example demonstrates a string that contains a
    dynamic placeholder that allows different data to be inserted into the same string.
    As the `temperature` variable changes, the string is dynamically altered.


    ```

    public static void main(String[] args){

    double temperature = 37.1;

    String temperatureString = "The current temperature is %.1f degrees Celsius.";

    System.out.println(String.format(temperatureString, temperature));

    temperature = 38.4;

    System.out.println(String.format(temperatureString, temperature));

    }

    ```


    It returns the following output.


    ```

    The current temperature is 37.1 degrees Celsius.

    The current temperature is 38.4 degrees Celsius.

    ```


    ### Solution 2


    If you wish to print the contents of the string out, rather than store them for
    later use, the `System.out.printf()` method can position dynamic values within
    a string. The following example demonstrates the same concept as that in solution
    1, except this time, rather than using the `String.format()` method, a string
    is simply printed out, and the placeholders passed to the `System.out.printf()`
    method are replaced with the dynamic content at runtime.


    ```

    public static void main(String[] args){

    double temperature = 37.1;

    System.out.printf("The current temperature is %.1f degrees Celsius.\n", temperature);

    temperature = 38.4;

    System.out.printf("The current temperature is %.1f degrees Celsius.", temperature);

    }

    ```


    It returns the following output.


    ```

    The current temperature is 37.1 degrees Celsius.

    The current temperature is 38.4 degrees Celsius.

    ```


    ### How It Works


    When you require dynamic string content, the `format()` utility can come in handy.
    The built-in `format()` method allows one to position a placeholder within a string,
    such that the placeholder is replaced with dynamic content at runtime. The `format()`
    method accepts a string and a series of variables that displaces the placeholders
    within the string with dynamic content at runtime. The placeholders must be designated
    specifically for the type of content with which they are displaced. Each placeholder
    must begin with a `%` character to denote a placeholder within the string. The
    placeholder can also contain flags, width, and precision indicators to help format
    the dynamic value. The following format should build each placeholder.


    ```

    %[flags][width][.precision]conversion_indicator

    ```


    The second solution demonstrates how to utilize the `System.out.printf()` method,
    which accepts the same arguments as the `String.format()` method. The main difference
    is that the `System.out.printf()` method is handy for printing formatted content.
    If your application requires storing a formatted value, you are more likely to
    use the `String.format()` method.


