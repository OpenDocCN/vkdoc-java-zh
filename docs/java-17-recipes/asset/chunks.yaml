    ### 解决方案


    日期时间 API 通过 `Time Zone` 和 `Offset` 类提供了处理时区数据的适当工具。在以下场景中，假设应用程序处理的是车辆租赁的预订。你可以在一个时区租车，然后在另一个时区还车。以下代码行演示了如何在此类场景中打印个人的预订信息。名为
    `scheduleReport` 的方法接受代表办理取车和还车日期/时间的 `LocalDateTime` 对象，以及各自对应的 `ZoneId`。航空公司可以使用此方法来打印特定航班的时区信息。


    ```

    public static void scheduleReport(LocalDateTime checkOut, ZoneId checkOutZone,

    LocalDateTime checkIn, ZoneId checkInZone){

