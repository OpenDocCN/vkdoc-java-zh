  trans: '

    5.  Servlet 引擎加载 Servlet 类并执行它。在执行过程中，Servlet 会生成 HTML 格式的输出，Servlet 引擎会将其放入 HTTP
    响应中传递给 Web 服务器。


    6.  Web 服务器将 HTTP 响应转发到您的浏览器。


    7.  您的 Web 浏览器处理 HTTP 响应中动态生成的 HTML 页面，就像处理静态页面一样。实际上，静态和动态网页的格式是相同的。


    到达您浏览器的是 Servlet 生成的输出（即转换并编译后的 JSP 页面），而不是 JSP 页面本身。同一个 Servlet 会根据 HTTP 请求的参数和其他因素生成不同的输出。例如，假设您正在浏览一家在线商店提供的产品。当您点击产品图片时，您的浏览器会生成一个
    HTTP 请求，其中包含产品代码作为参数。结果，Servlet 会生成一个包含该产品描述的 HTML 页面。服务器无需为每个产品代码重新编译 Servlet。Servlet
    会查询包含所有产品详细信息的数据库，获取您感兴趣产品的描述，并用这些数据格式化一个 HTML 页面。这就是动态 HTML 的全部意义所在！纯 HTML 无法查询数据库，但
    Java 可以，而 JSP 为您提供了在 HTML 页面中包含 Java 代码片段的方法。


    JSP 的一个演进是 JavaServer Faces (JSF) API，用于为 Java Web 应用程序创建基于组件的用户界面。在 MVC 应用程序架构中，JSF
    扮演控制器的角色，从而调解 JSP（视图）与封装应用程序数据的模型之间的每一次交互。JSF 通过让您从一组连接到服务器端对象的标准 UI 组件创建用户界面，并提供四个自定义标签库来处理这些
    UI 组件，从而简化了 Web 应用程序的开发。JSF 会透明地保存 UI 组件的状态信息，并在表单重新显示时重新填充它们。这是可能的，因为组件的状态生命周期超越了
    HTTP 请求的生命周期。JSF 通过提供一个控制器 Servlet 和一个包含事件处理、服务器端验证、数据转换和组件渲染的组件模型来运作。


    JSF 不会改变您从 JSP 中已经了解的基本页面生命周期：客户端发出 HTTP 请求，服务器回复一个动态生成的 HTML 页面。请注意，JSF 并不容易使用，并且需要付出不可忽视的初始努力才能让它运行起来。


    有关全面的 Java Web 应用程序开发以及 JSP 和 JSF 如何在 Jakarta EE 平台（配合 Eclipse）中成为关键技术的更多信息，请参阅
    Luciano Manelli 和 Giulio Zambon 所著的 *Beginning Jakarta EE Web Development*（Apress，2020
    年）。


    13.4 列出 HTML 请求参数


    问题

    您想要在 JSP 页面上列出 HTML 请求的参数。


    解决方案

    使用 JSP，您可以生成动态网页。这是确定的。但动态页面的实用性远不止于识别查看者使用的浏览器或在不同日期显示不同信息。根据查看者是谁以及查看者想要什么来调整网页内容才是关键所在。

    每个 HTML 请求都包含一系列参数，这些参数通常是查看者在表单中输入内容后点击“提交”按钮的结果。额外的参数也可以是 URL 本身的一部分。例如，多语言网站中的页面有时会以“`?lang=en`”结尾的
    URL 来告诉服务器以英文格式化所请求的页面。


    清单 13-8 展示了一个简单的 JSP 页面，它列出了所有 HTML 请求参数。这是一个有用的小工具，可以轻松检查您的 HTML 页面发送给服务器的内容。


    ```


    请求参数

    映射大小 =


    映射元素参数名称参数值[s]

    " + k + "''" + keys[k] + "''");

    for (int j = 0; j  0) out.print(", ");

    out.print("''" + pars[j] + "''");

    }

    out.println("");

    }

    %>


    清单 13-8

    req_params.jsp

    ```


    工作原理

    有趣的部分在于以粗体突出显示的行。第一行告诉您参数存储在一个类型为 `Map` 的对象中，并向您展示如何检索参数名称列表。

    第二行突出显示的行向您展示了如何通过将 Java 变量值包含在 `<%=` 和 `%>` 这对标签之间，将其直接插入到输出中（即插入到 HTML 页面中）。这与使用脚本小程序不同——在脚本小程序中，您可以使用
    JSP 为网页构建动态性。


    第三行突出显示的行展示了如何请求您知道名称的每个参数的值。这里使用 *values* 一词而不是 *value*，因为每个参数可以在同一个请求中出现多次。例如，将
    JSP 保存在 `\apache-tomcat-10.0.13\webapps\` 中创建的 test 文件夹中。输入以下 URL 以获取图 13-7 所示的内容。


    ![](img/323910_4_En_13_Fig7_HTML.jpg)


    图 13-7

    req_params.jsp 的输出


    ```

    http://localhost:8080/test/req_params.jsp?a=b&c=d&a=zzz&empty=&empty=&1=22

    ```


    请注意，恰如其名地命名为 `empty` 的参数在查询字符串中出现了两次，这导致参数映射中出现两个空字符串。另外，查看 `a` 参数，您会注意到这些值按照它们在查询字符串中出现的顺序返回。


    13.5 创建和配置 Web 项目


    问题

    您想要创建并配置一个使用 JSP 的简单 Java Web 应用程序项目。


    解决方案

    创建 Web 应用程序有多种不同的项目格式。Eclipse 是一个极其强大且可扩展的 IDE，也非常适合 Web 应用程序开发。


    注意


    您需要从 [`www.eclipse.org/downloads/packages/`](http://www.eclipse.org/downloads/packages/)
    下载适用于企业 Java 和 Web 开发人员的 Eclipse IDE，并选择您的操作系统版本，如第 1 章所述。


    创建完成后，新的 `eclipseEE` 文件夹会启动 IDE。


    看到工作台屏幕后，选择“服务器”选项卡，然后单击“新建服务器向导”链接，如图 13-8 所示。


    ![](img/323910_4_En_13_Fig8_HTML.jpg)


    图 13-8

    Eclipse – 工作台屏幕


    接下来出现的屏幕是您告诉 Eclipse 使用 Tomcat 10 的地方，如图 13-9 所示。


    ![](img/323910_4_En_13_Fig9_HTML.jpg)


    图 13-9

    Eclipse – 选择 Tomcat 10 作为本地主机


    接下来（也是最后一步），您需要告诉 Eclipse 在哪里找到 Tomcat 9 以及使用哪个版本的新安装的 JDK 17，如图 13-10 所示。


    ![](img/323910_4_En_13_Fig10_HTML.jpg)


    图 13-10

    Eclipse – 完成 Tomcat 配置


    如果您一切操作正确，Tomcat 10 应该会出现在 Eclipse 的“服务器”选项卡下（见图 13-11）。


    ![](img/323910_4_En_13_Fig11_HTML.jpg)


    图 13-11

    Eclipse 中的“服务器”选项卡


    解释此配置过程是因为 Eclipse 是一个非常复杂的应用程序，很容易在众多选项中迷失方向。

    在工作台的菜单栏中，选择“文件” ➤ “新建” ➤ “动态 Web 项目”，输入项目名称（例如 `java17recipe`），然后单击“下一步”按钮。在名为“Java”的新屏幕中，单击“下一步”按钮。在“Web
    模块”屏幕上，单击“完成”按钮。

    新项目会出现在工作台的“项目资源管理器”窗格中。

    接下来，右键单击“WebContent”文件夹，然后选择“新建” ➤ “JSP 文件”。在出现的新 `JSP` 屏幕中，将默认名称 `NewFile.jsp`
    替换为 `index.jsp`，然后单击“完成”按钮。

