- fmt: '### Solution


    Create portable functions using lambda expressions by implementing a functional
    interface and assigning the lambda expression to a variable of the same type as
    the interface. The variable can be passed to other objects as an argument.


    The following class, `PassingLambdaFunctions`, contains a `calculate()` method,
    which performs calculations of any type given an array of values. Note that the
    `calculate()` method accepts a `Function<List<Double>,Double>` and an array of
    `Double` values as arguments.


    ```java

    public class PassingLambdaFunctions {

    /**

    * Calculates a value based upon the calculation function that is passed

    * in.

    * @param f1 Double input value

    * @param args  Double input value

    * @return

    */

    public Double calculate(Function, Double> f1,

    Double [] args){

    Double returnVal;

    List varList = new ArrayList();

    int idx = 0;

    while (idx < args.length){

    varList.add(args[idx]);

    idx++;

    }

    returnVal=f1.apply(varList);

    return returnVal;

    }

    }

    ```


    To use the `calculate` method, a lambda expression that implements `Function<List<Double>,Double>`
    must be passed as the first argument to the `calculate()` method, along with an
    array of `Double` arguments that contains the value to be used within the calculation.
    In the following class, a function for calculating volume is generated using a
    lambda expression. It is assigned to a variable identified as `volumeCalc` of
    type `Function<List<Double>,Double>`. Another lambda expression creates a function
    for calculating area, and it is assigned to a variable of the same type, identified
    as `areaCalc`. In separate calls, these variables are then passed to the `PassingLambdaFunctions.calculate()`
    method, along with an array of values, resulting in the calculated answer.


    ```java

    public class MainClass {

    public static void main(String[] args){

    double x = 16.0;

    double y = 30.0;

    double z = 4.0;

    // Create volume calculation function using a lambda.  The calculator

    checks to ensure that the array contains the three necessary elements

    for the calculation.

    Function, Double> volumeCalc = list -> {

    if(list.size() == 3){

    return list.get(0) * list.get(1) * list.get(2);

    } else {

    return Double.valueOf("-1");

    }

    };

    Double[] argList = new Double[3];

    argList[0] = x;

    argList[1] = y;

    argList[2] = z;

    // Create area calculation function using a lambda.  This particular

    calculator checks to ensure that the array only contains two elements.

    Function, Double> areaCalc = list -> {

    if(list.size() == 2){

    return list.get(0) * list.get(1);

    } else {

    return Double.valueOf("-1");

    }

    };

    Double[] argList2 = new Double[2];

    argList2[0] = x;

    argList2[1] = y;

    PassingLambdaFunctions p1 = new PassingLambdaFunctions();

    // Pass the lambda expressions to the calculate() method, along with the

    argument lists.

    System.out.println("The volume is: " + p1.calculate(volumeCalc, argList));

    System.out.println("The area is: " + p1.calculate(areaCalc, argList2));

    }

    }

    ```


    The following is the result.


    ```

    The volume is: 1920.0

    The area is: 480.0

    ```


    ### How It Works


    Lambda expressions can be assigned to variables of the same type as the implemented
    functional interface. Such expressions can contain a single-line expression or
    a multistatement body. Since the lambda expression can accept arguments, there
    are use cases for assigning such expressions to variables and then passing those
    variables into other objects to modify functionality. This pattern is useful for
    creating solutions containing more than one implementation. The solution to this
    recipe demonstrates this concept.


    In the solution, the `PassingLambdaFunctions` class contains a `calculate()` method,
    which performs calculations on `Double` values passed into it as arguments. However,
    the `calculate()` method contains no calculation functionality at all. Rather,
    the calculation functionality is passed as an argument of type `Function<List<Double>,Double>`
    via a lambda expression. This type is one of the standard functional interfaces
    within the `java.util.function` package and the interface can be implemented by
    lambda expressions and then invoked later by calling its solo `apply()` method.
    Looking at the code in the `calculate()` method, the arguments contained within
    the `Double[]` are first added to a list. Next, lambda expression’s `apply()`
    method is invoked, passing the new list of values and returning a result into
    `returnVal`. Finally, `returnVal` is returned to the method invoker.


    ```java

    returnVal=f1.apply(varList);

    return returnVal;

    ```


    To implement the calculation functionality within the solution, lambda expressions
    are created in a separate class named `MainClass`. Each expression accepts a list
    of arguments and then calculates the values in the list, returning a result. For
    instance, the first lambda generated in `MainClass` calculates volume by multiplying
    together all of the values in the argument list and returning the result. This
    functionality is then assigned to a variable of type `Function<List<Double>,Double>`,
    and then it is passed into the `PassingLambdaFunctions.calculate()` method later
    on.


    Any functionality can be implemented within a lambda expression and then passed
    around to different objects for use. This is an excellent way to promote code
    reuse and high maintainability.


    ## 6.9 Local Variable


    ### Problem


    You want to skip the parameter types and use the `var` local variable.


    ### Solution


    You can skip the parameter types and rewrite the lambda from this form


    ```java

    (String str1, String str2) -> s1 + s2

    ```


    to the following form.


    ```java

    (var str1, var str2) -> str1 + str2

    ```


    You can rewrite Recipe 6-1 using `var` in the following form.


    ```java

    public static void main(String[] args){

    // Create the lambda, passing a parameter named "text" to the

    // hello() method, returning the string.  The lambda is assigned

    // to the helloLambda variable.

    HelloType helloLambda =

    (var text) -> {System.out.println("Hello " + text);};

    // Invoke the method call

    helloLambda.hello("Lambda");

    }

    ```


    The following is the output.


    ```

    Hello Lambda

    ```


    In this case, the type of the variable `text` is inferred from context by the
    compiler, and the output is the same. It does not create warnings or errors.


    ### How It Works


    Java 11 introduced the local variable syntax for lambda parameters to align the
    syntax of a parameter declaration in an implicitly typed lambda expression with
    the syntax of a local variable declaration. It surely makes our code *more* readable.
    For more information on the `var` keyword, see the documentation at [`https://openjdk.java.net/jeps/323`](https://openjdk.java.net/jeps/323).


    ## 6.10 Switch Expressions


    ### Problem


    You want to efficiently use a switch expression issues without the `break`.


    ### Solution


    Simply you can use a lambda-style syntax for your expressions. So, you can rewrite
    the lambda from this form.


    ```java

    switch(input_variable) {

    case one:

    returnValue = 12

    break;

    case two:

    returnValue = 75

    break;

    default:

    // code of default block

    }

    ```


    To that form:


    ```java

    int numLetters = switch (input_variable) {

    case one -> 12;

    case two -> 75;

    default -> {// code of default block }

    };

    ```


    You can rewrite Recipe 6-4 using lambda-style syntax for switch expression from


    ```java

    switch(status){

    case 0:

    returnValue = "ACTIVE";

    case 1:

    returnValue = "INACTIVE";

    case 2:

    returnValue = "INJURY";

    default:

    returnValue = "ON_BENCH";

    }

    ```


    to the following form.


    ```java

    returnValue =switch(status){

    case 0  -> "ACTIVE";

    case 1  -> "INACTIVE";

    case 2  -> "INJURY";

    default -> "ON_BENCH";

    };

    ```


    The output is the same.


    ### How It Works


    This enhancement was proposed in Java 12 and in production in Java 14 (JEP 361).
    This functionality introduces a new form of switch label, where only the code
    to the right of the label (`->`) is to be executed if the label is matched.


    For information on the `var` keyword, see the documentation at [`https://openjdk.java.net/jeps/361`](https://openjdk.java.net/jeps/361).'
