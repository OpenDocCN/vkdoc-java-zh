    ## 4.15 Finding the Interval Between Dates and Times


    ### Problem


    You need to determine how many hours, days, weeks, months, or years have elapsed
    between two dates or times.


    ### Solution 1


    Utilize the Date-Time API to determine the difference between two dates. Specifically,
    use the `Period` class to determine the period of time, in days, between two dates.
    The following example demonstrates how to obtain the interval of days, months,
    and years between two dates.


    **Note**


    This example shows the difference in days, months, and years, but not the cumulative
    days or months between two dates. To determine the total cumulative days, months,
    and years between two dates, read on for solutions #2 and #3.


    ```

    public static void intervals(){

    LocalDate anniversary = LocalDate.of(2015, Month.NOVEMBER, 11);

    LocalDate today = LocalDate.now();

    Period period = Period.between(anniversary, today);

    System.out.println("Number of Days Difference: " +  period.getDays());

    System.out.println("Number of Months Difference: " + period.getMonths());

    System.out.println("Number of Years Difference: " + period.getYears());

    }

    ```


    Here is the difference result for today’s date (`2021-12-06`).


    ```

    Number of Days Difference: 25

    Number of Months Difference: 0

    Number of Years Difference: 6

    ```


    ### Solution 2


    Use `java.util.concurrent.TimeUnit enum` to perform calculations between given
    dates. Using this `enum`, you can obtain the integer values for days, hours, microseconds,
    milliseconds, minutes, nanoseconds, and seconds. Doing so allow you to perform
    the necessary calculations.


    ```

    public static void compareDatesCalendar() {

    // Obtain two instances of the Calendar class

    Calendar cal1 = Calendar.getInstance();

    Calendar cal2 = Calendar.getInstance();

    // Set the date to 01/01/2010:12:00

    cal2.set(2010,0,1,12,0,0);

    Date date1 = cal2.getTime();

    System.out.println(date1);

    System.out.println(cal1.getTime());

    long mill = Math.abs(cal1.getTimeInMillis() - date1.getTime());

    // Convert to hours

    long hours = TimeUnit.MILLISECONDS.toHours(mill);

    // Convert to days

    Long days = TimeUnit.HOURS.toDays(hours);

    String diff = String.format("%d hour(s) %d min(s)", hours,

    TimeUnit.MILLISECONDS.toMinutes(mill) - TimeUnit.HOURS.toMinutes(hours));

    System.out.println(diff);

    diff = String.format("%d days", days);

    System.out.println(diff);

    // Divide the number of days by seven for the weeks

    int weeks = days.intValue()/7;

    diff = String.format("%d weeks", weeks);

    System.out.println(diff);

    }

    ```


    Here is the result for today’s date (`2021-12-06 19:42`).


    ```

    Fri Jan 01 12:00:00 CET 2010

    Mon Dec 06 19:42:17 CET 2021

    104575 hour(s) 42 min(s)

    4357 days

    622 weeks

    Years between dates: 6

    Days between dates:2216

    ```


    The output of this code is formatted to display strings of text that indicate
    the differences between the current date and the `Date` object that is created.


    The following is the main class.


    ```

    public static void main(String[] args){

    intervals();

    compareDatesCalendar();

    }

    ```


    ### How It Works


    As with most programmatic techniques, Java has more than one way to perform date
    calculations. The Date-Time API introduced in Java 8 includes new techniques for
    determining time intervals. The `Period` class determines the difference period
    between two units for specified objects. To obtain a period between two date-time
    objects, call the `Period.between()` method, passing the two date-time objects
    for which you’d like to obtain the period. The `Period` class has several methods
    to break down the intervals into different units. For instance, the number of
    days in the two date-time objects can be obtained using the `getDays()` method.
    Similarly, the `getMonths()` and `getYears()` methods can be called to return
    the number of months or years in the period.


    One of the most useful techniques is to perform calculations based on the given
    date’s time in milliseconds. This provides the most accurate calculation because
    it works at a very small interval: milliseconds. The current time in milliseconds
    can be obtained from a `Calendar` object by calling the `getTimeInMillis()` method
    against it. Likewise, a `Date` object returns its value represented in milliseconds
    by calling the `getTime()` method. As you can see from the solution to this recipe,
    the first calculation finds the difference between the given dates in milliseconds.
    Obtaining that value and then taking its absolute value provides the base needed
    to perform the date calculations.


    ## 4.16 Obtaining Date-Time from a Specified String


    ### Problem


    You want to parse a string into a date-time object.


    ### Solution


    Utilize the `parse()` method of a temporal date-time class to parse a string using
    a predefined or custom format. The following lines of code demonstrate how to
    parse a string into a date or date-time object using variations of the `parse()`
    method.


    ```

    public static void parseDateTime(){

    // Parse a string to form a Date-Time object

    LocalDate ld = LocalDate.parse("2019-12-28");

    LocalDateTime ldt = LocalDateTime.parse("2019-12-28T08:44:00");

    System.out.println("Parsed Date: " + ld);

    System.out.println("Parsed Date-Time: " + ldt);

    // Using a different Parser

    LocalDate ld2 = LocalDate.parse("2019-12-28", DateTimeFormatter.ISO_DATE);

    System.out.println("Different Parser: " + ld2);

    // Custom Parser

    String input = "12/28/2019";

    try {

    DateTimeFormatter formatter = DateTimeFormatter.ofPattern("MM/dd/yyyy");

    LocalDate ld3 = LocalDate.parse(input, formatter);

    System.out.println("Custom Parsed Date: " + ld3);

    } catch (DateTimeParseException ex){

    System.out.println("Not parsable: " + ex);

    }

    }

    ```


    Here is the result.


    ```

    Parsed Date: 2019-12-28

    Parsed Date-Time: 2019-12-28T08:44

    Different Parser: 2019-12-28

    Custom Parsed Date: 2019-12-28

    The main is:

    public static void main(String[] args) {

    parseDateTime();

    }

    ```


    ### How It Works


    The temporal classes of the Date-Time API include a `parse()` method, which parses
    a given input string using a specified format. By default, the `parse()` method
    format is based on the target object’s default `DateTimeFormatter`. For example,
    to parse the string `"2019-01-01"`, the default `LocalDate.parse()` method can
    be called.


    ```

    LocalDate date = LocalDate.parse("2019-01-01");

    ```


    However, another `DateTimeFormatter` can be specified as a second argument to
    the `parse()` method. `DateTimeFormatter` is a final class used for formatting
    and printing dates and times. It contains several built-in formatters that can
    be specified to coerce strings into date-time objects. Often, it is necessary
    to parse strings of text into date-time objects. Such tasks are made easy with
    the `parse()` method built into many core date-time classes.


