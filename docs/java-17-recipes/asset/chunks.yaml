    ## 7.6 使用动态数组


    ### 问题


    你需要一种灵活的数据结构，能够存储可变数量的数据，并支持便捷的插入和删除操作。


    ### 解决方案


    考虑使用 `ArrayList<E>`。以下示例代码是 `StockScreener` 类，它允许你根据特定的筛选参数（市盈率、收益率和贝塔系数）和筛选值来筛选股票列表或单只股票。该类使用
    `ArrayList<E>` 来存储股票字符串。一个示例筛选条件可能是：“告诉我这个列表中哪些股票的市盈率（P/E）小于等于 15。”如果你不熟悉这些股市术语，不必担心。但无论如何，请**不要**使用这个类来做出你的股票投资决策！


    ```

    public class StockScreener {

    enum Screen { PE, YIELD, BETA };

    public static boolean screen(String stock, Screen screen, double threshold) {

    double screenVal = 0;

    boolean pass = false;

    switch (screen) {

    case PE:

    screenVal = Math.random() * 25;

    pass = screenVal = threshold;

    break;

    case BETA:

    screenVal = Math.random() * 2;

    pass = screenVal  stocks, Screen screen, double threshold) {

    Iterator iter = stocks.iterator();

    while (iter.hasNext()) {

    String stock = iter.next();

    if (!screen(stock, screen, threshold)) {

    iter.remove();

    }

    }

    }

    public static void main(String[] args) {

    List stocks = new ArrayList();

    stocks.add("ORCL");

    stocks.add("AAPL");

    stocks.add("GOOG");

    stocks.add("IBM");

    stocks.add("MCD");

    System.out.println("Screening stocks: " + stocks);

    if (stocks.contains("GOOG") &&

    !screen("GOOG", Screen.BETA, 1.1)) {

    stocks.remove("GOOG");

    }

    System.out.println("First screen: " + stocks);

    StockScreener.screen(stocks, Screen.YIELD, 3.5);

    System.out.println("Second screen: " + stocks);

    StockScreener.screen(stocks, Screen.PE, 22);

    System.out.println("Third screen: " + stocks);

    System.out.println("Buy List: " + stocks);

    }

    }

    ```


    运行这段代码的输出会有所不同，因为它会随机分配股票的筛选结果值。以下是运行该类的一个输出示例。


    ```

    Screening stocks: [ORCL, AAPL, GOOG, IBM, MCD]

    GOOG: BETA = 1.9223516769748348

    First screen: [ORCL, AAPL, IBM, MCD]

    ORCL: YIELD = 6.140018494585904

    AAPL: YIELD = 7.875759429097191

    IBM: YIELD = 7.715436753622726

    MCD: YIELD = 2.419792753509281

    Second screen: [ORCL, AAPL, IBM]

    ORCL: PE = 4.396013965331994

    AAPL: PE = 14.200385457743778

    IBM: PE = 7.6981860501796175

    Third screen: [ORCL, AAPL, IBM]

    Buy List: [ORCL, AAPL, IBM]

    ```


    ### 工作原理


    `ArrayList<E>` 是 Java 集合框架中最常用的类之一。`ArrayList<E>` 类实现了 `List<E>` 接口，而 `List<E>`
    接口又实现了 `Collection<E>` 接口。`Collection<E>` 接口定义了所有集合类型的通用操作集，`List<E>` 接口则定义了面向列表的
    `Collection<E>` 类型特有的操作集。集合框架大量使用了 Java 泛型。


    `StockScreener main()` 方法首先声明了一个 `List<E>` 类型的股票列表，并通过泛型类型参数指定该列表的元素类型为 `String`。请注意，实际的列表类型是使用菱形语法创建的
    `ArrayList<E>`。该股票列表存储了数量可变的股票，用它们的股票市场代码（字符串）表示。


    ```

    List stocks = new ArrayList();

    ```


    既然你已经指定了股票列表只能包含字符串，那么所有 `List<E>` 方法也会相应地参数化，只允许操作字符串。因此，接下来代码多次调用 `ArrayList<E>`
    的 `add(String)` 方法向列表中添加股票。之后，根据 GOOG（谷歌）的贝塔系数（衡量股票风险的指标）对其进行筛选；如果未通过筛选，则调用 `List
    remove(String)` 方法将该股票从列表中移除。接着，对整个股票列表再进行两次筛选，以获取市盈率小于等于 22.0 且收益率大于等于 3.5% 的股票列表。用于这些筛选的
    `screen()` 方法接受一个 `List<String>` 类型的参数。它需要遍历列表，对每只股票执行筛选，并移除那些未通过筛选的股票。请注意，为了在遍历
    `Collection<E>` 时安全地移除元素，你必须使用 `Collection<E>` 的 `Iterator<E>` 进行迭代，该迭代器可以通过调用其
    `iterator()` 方法获得。这里，我们展示了使用 `while` 循环来遍历股票列表（也可以类似地使用 `for` 循环）。只要没有到达列表末尾（`iter.hasNext()`），你就可以从列表中获取下一个股票（`iter.next()`），执行筛选，如果筛选未通过，则从列表中移除该元素（`iter.remove()`）。


    注意


    你可能会发现，在遍历列表时直接调用列表的 `remove()` 方法似乎也能工作。问题在于这并不能保证总是有效，并且可能会产生意外结果。在某些情况下，即使没有多个线程访问同一个列表，代码也会抛出
    `ConcurrentModificationException`。请记住，在遍历任何 `Collection<E>` 时，始终通过迭代器来移除元素。


    `ArrayList<E>` 是一种非常有用的数据结构，通常应替代数组类型使用。它比简单的数组提供了更大的灵活性，因为可以轻松地动态添加和移除元素。虽然 `ArrayList<E>`
    内部确实使用了数组，但你可以受益于其为你实现的经过优化的 `add()` 和 `remove()` 操作。此外，`ArrayList<E>` 还实现了许多其他非常有用的方法。


    更多信息请参考 Java 文档（[`https://docs.oracle.com/en/java/javase/17/docs/api/java.base/java/util/ArrayList.html`](https://docs.oracle.com/en/java/javase/17/docs/api/java.base/java/util/ArrayList.html)）。


    ## 7.7 让你的对象可迭代


    ### 问题


    你创建了一个自定义的基于集合的类，该类包装（而非继承）了底层的集合类型。在不暴露类内部实现细节的情况下，你希望该类的对象变得可迭代，特别是能够使用 `foreach`
    语句。

