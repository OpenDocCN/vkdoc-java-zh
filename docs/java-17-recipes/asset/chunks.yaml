    ### How It Works


    NIO.2 includes a built-in polling mechanism to monitor for changes in the file
    system. Using a poll mechanism allows you to wait for events and poll for updates
    at a specified interval. Once an event occurs, you can process and consume it.
    A consumed event tells the NIO.2 framework that you are ready to handle a new
    event.


    To start monitoring a folder, create a `WatchService` that you can use to poll
    for changes. After the `WatchService` has been created, register the `WatchService`
    with a path. A path symbolizes a folder in the file system. When the `WatchService`
    is registered with the path, you define the kinds of events you want to monitor
    (see Table [8-1](#323910_4_En_8_Chapter.xhtml#Tab1)). They are declared on the
    `java.nio.file` package’s `StandardWatchEventKinds` class.


    **Table 8-1** Types of watchEvents


    | WatchEvent | Description |

    | --- | --- |

    | `OVERFLOW` | An event that has overflown (ignore) |

    | `ENTRY_CREATE` | A directory or file was created |

    | `ENTRY_DELETE` | A directory or file has been deleted |

    | `ENTRY_MODIFY` | A directory or file has been modified |


    After registering the `WatchService` with the path, you can “poll” the `WatchService`
    for event occurrences. By calling the `watchService.poll()` method, you wait for
    a file/folder event to occur on that path. Using the `watchService.poll(int timeout,
    Timeunit timeUnit)` wait until the specified timeout is reached before continuing.
    If the `WatchService` receives an event, or if the allowed time has passed, then
    it continues execution. If there were no events and the timeout was reached, the
    `WatchKey` object returned by the `watchService.poll(int timeout)` is null; otherwise,
    the `WatchKey` object returned contains the relevant information for the event
    that has occurred.


    Because many events can occur at the same time (for example, moving an entire
    folder or pasting a bunch of files into a folder), the `WatchKey` object key might
    contain more than one event. You can use the `key` to obtain all the events associated
    with that object key by calling the `key.pollEvents()` method.


    The `watchKey.pollEvents()` call returns a list of `watchEvents` that can be iterated.
    Each `watchEvent` contains information on the actual file or folder to which the
    event refers (for example, an entire subfolder could have been moved or deleted)
    and the event type (add, edit, delete). Only those events that were registered
    in `WatchService` are processed.


    Once an event has been processed, it is important to call the `EventKey.reset()`.
    The reset returns a Boolean value determining whether the `WatchKey` is still
    valid. A `WatchKey` becomes invalid if it is canceled or if its originating `WatchService`
    is closed. If the `eventKey` returns false, you should break from the watch loop.


