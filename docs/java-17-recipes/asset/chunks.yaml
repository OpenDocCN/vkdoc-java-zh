  raw: '### Solution


    Have your class extend the `Iterable<T>` interface, where `T` is the element type
    of the collection to be iterated. Implement the `iterator()` method to return
    the `Iterator<E>` object from this collection. The example for this recipe is
    the `StockPortfolio` class. Internally, `StockPortfolio` manages a collection
    of `Stock` objects. We want users of our class to treat `StockPortfolio` objects
    as iterable objects using a `foreach` statement. The `StockPortfolio` class follows.


    ```

    public class StockPortfolio implements Iterable {

    Map portfolio = new HashMap();

    public void add(Stock stock) {

    portfolio.put(stock.getSymbol(), stock);

    }

    public void add(List stocks) {

    for (Stock s : stocks) {

    portfolio.put(s.getSymbol(), s);

    }

    }

    @Override

    public Iterator iterator() {

    return portfolio.values().iterator();

    }

    public static void main(String[] args) {

    StockPortfolio myPortfolio = new StockPortfolio();

    myPortfolio.add(new Stock("ORCL", "Oracle", 500.0));

    myPortfolio.add(new Stock("AAPL", "Apple", 200.0));

    myPortfolio.add(new Stock("GOOG", "Google", 100.0));

    myPortfolio.add(new Stock("IBM", "IBM", 50.0));

    myPortfolio.add(new Stock("MCD", "McDonalds", 300.0));

    // foreach loop (uses Iterator returned from iterator() method)

    System.out.println("====Print using legacy for-each loop====");

    for (Stock stock : myPortfolio) {

    System.out.println(stock);

    }

    System.out.println("====Print using Java 8 foreach implementation====");

    myPortfolio.forEach(s->System.out.println(s));

    }

    }

    ```


    The following code is that of the `Stock` class.


    ```

    public class Stock {

    private String symbol;

    private String name;

    private double shares;

    public Stock(String symbol, String name, double shares) {

    this.symbol = symbol;

    this.name = name;

    this.shares = shares;

    }

    public String getSymbol() {

    return symbol;

    }

    public String getName() {

    return name;

    }

    public double getShares() {

    return shares;

    }

    public String toString() {

    return shares + " shares of " + symbol + " (" + name + ")";

    }

    }

    ```


    The `main()` method creates a `StockPortfolio` and then calls the `add()` method
    to add several stocks to the portfolio. Both variations of the `foreach` loop
    (legacy and `forEach` implementation) then loop over and print all the stocks
    in the portfolio. Running the `StockPortfolio` class results in the following
    output.


    ```

    100.0 shares of GOOG (Google)

    200.0 shares of AAPL (Apple)

    50.0 shares of IBM (IBM)

    500.0 shares of ORCL (Oracle)

    300.0 shares of MCD (McDonalds)

    ```


    Note


    The order of the lines in the output may differ when you run the `StockPortfolio`
    class in your environment because the underlying implementation uses a HashMap
    <k>. A HashMap <k>does not guarantee the order of the elements stored in the map,
    and this extends to its iterators. If you wanted the iterator to return elements
    sorted by the stock symbol, you could use one of the sorted collections, such
    as TreeMap <k>or TreeSet <e>, instead of HashMap.</e></k></k></k>


    ### How It Works


    The `Iterable<T>` interface was introduced in Java 5 to support the enhanced `for`
    loop, which was introduced at the same time. Along with these enhancements to
    the language, all `Collection<E>` classes were retrofitted to implement the `Iterable`
    interface, thus allowing `Collection<E>` classes to be iterable using the `foreach`
    loop. The `Iterable<T>` interface is a generic type defined as follows.


    ```

    public interface Iterable {

    Iterator iterator();

    }

    ```


    Any class that implements `Iterable<T>` must implement the `iterator()` method
    to return an `Iterator<T>` object. Typically, the iterator returned is the default
    iterator of the underlying collection; however, it may also return an instance
    of a custom `Iterator <E>`. In the `StockPortfolio` class, a `Map<K,V>` represents
    the stock portfolio. The key for each map entry is the stock symbol, and the value
    associated with each key is a `Stock` object. `Maps` in Java are not iterable;
    they are not `Collection` <e>classes. Therefore, they do not implement</e> `Iterable
    <T>`. However, both the keys and the values of a map are collections, and therefore
    are `Iterables`. We want our implementation of the `Iterable<T> iterator()` method
    to return an `Iterator<E>` over the values (stock references) of the portfolio
    map; therefore, our `Iterable<T>` implementation is parameterized by the stock
    type.


    ```

    public class StockPortfolio implements Iterable

    ```


    The `Map<K,V> values()` method returns the `Collection<E>` of map values; in this
    case, a `Collection<E>` of `Stocks`. The `iterator()` method implementation can
    then simply return the `Iterator<E>` for this `Collection<T>`.


    ```

    @Override

    public Iterator iterator() {

    return portfolio.values().iterator();

    }

    ```


    With this implementation of `Iterable<Stock>`, either the legacy a `foreach` loop,
    or the `forEach` implementation can iterate a `StockPortfolio` instance and print
    each stock.


    ```

    myPortfolio.forEach(s->System.out.println(s));

    ```


    The `forEach` method was new to the `Iterable<T>` interface with the release of
    Java 8\. The method performs the specified action for each element within the
    `Iterable` until all elements have been processed, or the specified action throws
    an exception. In this solution, the specified action is a lambda expression (see
    Chapter [6](#323910_4_En_6_Chapter.xhtml)), which prints the value of each element
    within the `myPortfolio` iterable.


    You notice that `StockPortfolio` also contains the `add(List<Stock>)` method,
    which allows the portfolio to be populated from a `List`<e>. This method also
    uses a</e> `foreach` loop to iterate the input `List <T>`. Again, this is possible
    because `Lists` are `Iterables`. (Note that this method is never called in the
    code; it exists only for illustration purposes.)


    Note


    There’s one issue with our implementation of StockPortfolio. We have gone to great
    lengths not to expose the internal implementation details of our class (the portfolio
    map). This allows us to change the implementation without affecting the StockPortfolio
    client code. However, when we implemented `Iterable <T>`, we effectively exported
    the underlying portfolio map through the `iterator()` method. Unfortunately, Java
    does not provide an `UnmodifiableIterator` class that could wrap an iterator and
    prevent modification of the underlying collection. However, it would be simple
    to implement such a class that forward the `hasNext()` and next() calls to the
    wrapped iterator but leaves the `remove()` method unimplemented (per the iterator
    Java documentation, `UnsupportedOperationException` should be thrown). Alternatively,
    your `iterator()` method could return the Iterator <e>from an unmodifiable</e>
    `Collection<E>` obtained through a call to the `Collections.unmodifiableCollection()`
    class method. You are encouraged to explore these two options. To give you a start,
    one possible implementation of `UnmodifiableIterator` has been provided in the
    source code download (see `UnmodifiableIterator.java`).


    As you have seen in this recipe, the `Iterable<T>` interface allows you to create
    iterable objects compatible with a `foreach` implementation. This is very useful
    when designing a custom collection-based class that encapsulates implementation
    details. Keep in mind that to enforce the encapsulation and prevent modification
    of your underlying collection, you should implement one of the solutions mentioned
    in the preceding note.


    ## 7.8 Iterating Collections


    ### Problem


    Your application contains Collection<E> types, and you want to iterate the elements
    within them.'
  trans: '

    ### 解决方案


    让你的类实现 `Iterable<T>` 接口，其中 `T` 是待遍历集合的元素类型。实现 `iterator()` 方法以返回该集合的 `Iterator<E>`
    对象。本方案中的示例是 `StockPortfolio` 类。在内部，`StockPortfolio` 管理着一个 `Stock` 对象的集合。我们希望类的使用者能够通过
    `foreach` 语句将 `StockPortfolio` 对象视为可迭代对象。`StockPortfolio` 类的代码如下。


    ```

    public class StockPortfolio implements Iterable {

    Map portfolio = new HashMap();

    public void add(Stock stock) {

    portfolio.put(stock.getSymbol(), stock);

    }

    public void add(List stocks) {

    for (Stock s : stocks) {

    portfolio.put(s.getSymbol(), s);

    }

    }

    @Override

    public Iterator iterator() {

    return portfolio.values().iterator();

    }

    public static void main(String[] args) {

    StockPortfolio myPortfolio = new StockPortfolio();

    myPortfolio.add(new Stock("ORCL", "Oracle", 500.0));

    myPortfolio.add(new Stock("AAPL", "Apple", 200.0));

    myPortfolio.add(new Stock("GOOG", "Google", 100.0));

    myPortfolio.add(new Stock("IBM", "IBM", 50.0));

    myPortfolio.add(new Stock("MCD", "McDonalds", 300.0));

    // foreach 循环（使用从 iterator() 方法返回的 Iterator）

    System.out.println("====使用传统 for-each 循环打印====");

    for (Stock stock : myPortfolio) {

    System.out.println(stock);

    }

    System.out.println("====使用 Java 8 foreach 实现打印====");

    myPortfolio.forEach(s->System.out.println(s));

    }

    }

    ```


    以下是 `Stock` 类的代码。


    ```

    public class Stock {

    private String symbol;

    private String name;

    private double shares;

    public Stock(String symbol, String name, double shares) {

    this.symbol = symbol;

    this.name = name;

    this.shares = shares;

    }

    public String getSymbol() {

    return symbol;

    }

    public String getName() {

    return name;

    }

    public double getShares() {

    return shares;

    }

    public String toString() {

    return shares + " shares of " + symbol + " (" + name + ")";

    }

    }

    ```


    `main()` 方法创建了一个 `StockPortfolio` 对象，然后调用 `add()` 方法向投资组合中添加了几只股票。两种 `foreach`
    循环变体（传统循环和 `forEach` 实现）随后遍历并打印投资组合中的所有股票。运行 `StockPortfolio` 类将产生以下输出。


    ```

    100.0 shares of GOOG (Google)

    200.0 shares of AAPL (Apple)

    50.0 shares of IBM (IBM)

    500.0 shares of ORCL (Oracle)

    300.0 shares of MCD (McDonalds)

    ```


    注意


    在你的环境中运行 `StockPortfolio` 类时，输出行的顺序可能不同，因为底层实现使用了 `HashMap<K,V>`。`HashMap<K,V>`
    不保证映射中存储元素的顺序，这同样适用于其迭代器。如果你希望迭代器按股票代码返回排序后的元素，可以使用排序集合，例如 `TreeMap<K,V>` 或 `TreeSet<E>`，来代替
    `HashMap<K,V>`。


    ### 工作原理


    `Iterable<T>` 接口是在 Java 5 中引入的，用于支持同时期引入的增强型 `for` 循环。随着这些语言增强，所有 `Collection<E>`
    类都被改造以实现 `Iterable` 接口，从而允许 `Collection<E>` 类通过 `foreach` 循环进行迭代。`Iterable<T>`
    接口是一个泛型类型，定义如下。


    ```

    public interface Iterable {

    Iterator iterator();

    }

    ```


    任何实现 `Iterable<T>` 的类都必须实现 `iterator()` 方法以返回一个 `Iterator<T>` 对象。通常，返回的迭代器是底层集合的默认迭代器；然而，它也可以返回一个自定义
    `Iterator<E>` 的实例。在 `StockPortfolio` 类中，`Map<K,V>` 代表了股票投资组合。每个映射条目的键是股票代码，与每个键关联的值是一个
    `Stock` 对象。Java 中的 `Map` 是不可迭代的；它们不是 `Collection<E>` 类。因此，它们不实现 `Iterable<T>`。然而，映射的键和值都是集合，因此是
    `Iterable` 的。我们希望 `Iterable<T> iterator()` 方法的实现返回一个遍历投资组合映射中值（股票引用）的 `Iterator<E>`；因此，我们的
    `Iterable<T>` 实现以股票类型进行参数化。


    ```

    public class StockPortfolio implements Iterable

    ```


    `Map<K,V> values()` 方法返回映射值的 `Collection<E>`；在本例中，是一个 `Stock` 的 `Collection<E>`。然后，`iterator()`
    方法的实现可以简单地返回此 `Collection<T>` 的 `Iterator<E>`。


    ```

    @Override

    public Iterator iterator() {

    return portfolio.values().iterator();

    }

    ```


    通过这种 `Iterable<Stock>` 的实现，无论是传统的 `foreach` 循环还是 `forEach` 实现，都可以迭代 `StockPortfolio`
    实例并打印每只股票。


    ```

    myPortfolio.forEach(s->System.out.println(s));

    ```


    `forEach` 方法是 Java 8 发布时新增到 `Iterable<T>` 接口中的。该方法对 `Iterable` 中的每个元素执行指定的操作，直到所有元素都被处理完毕，或者指定的操作抛出异常。在本解决方案中，指定的操作是一个
    lambda 表达式（参见第 6 章），它打印 `myPortfolio` 可迭代对象中每个元素的值。


    你会注意到 `StockPortfolio` 还包含 `add(List<Stock>)` 方法，该方法允许从 `List<E>` 填充投资组合。此方法也使用
    `foreach` 循环来迭代输入的 `List<T>`。同样，这是可行的，因为 `List` 是 `Iterable` 的。（请注意，此方法在代码中从未被调用；它仅用于说明目的。）


    注意


    我们的 `StockPortfolio` 实现存在一个问题。我们费了很大力气不暴露类的内部实现细节（投资组合映射）。这允许我们在不影响 `StockPortfolio`
    客户端代码的情况下更改实现。然而，当我们实现 `Iterable<T>` 时，我们实际上通过 `iterator()` 方法导出了底层的投资组合映射。不幸的是，Java
    没有提供 `UnmodifiableIterator` 类来包装迭代器并防止修改底层集合。不过，实现这样一个类很简单，它将 `hasNext()` 和 `next()`
    调用转发给被包装的迭代器，但让 `remove()` 方法保持未实现状态（根据迭代器 Java 文档，应抛出 `UnsupportedOperationException`）。或者，你的
    `iterator()` 方法可以返回一个通过调用 `Collections.unmodifiableCollection()` 类方法获得的不可修改 `Collection<E>`
    的 `Iterator<E>`。我们鼓励你探索这两种选择。为了给你一个起点，在源代码下载中提供了一个可能的 `UnmodifiableIterator` 实现（参见
    `UnmodifiableIterator.java`）。


    正如你在本方案中所见，`Iterable<T>` 接口允许你创建与 `foreach` 实现兼容的可迭代对象。这在设计封装了实现细节的自定义基于集合的类时非常有用。请记住，为了强制封装并防止修改底层集合，你应该实现前面注意事项中提到的解决方案之一。


    ## 7.8 迭代集合


    ### 问题


    你的应用程序包含 `Collection<E>` 类型，并且你想要迭代其中的元素。

    '
- fmt: '### Solution


    Generate a stream on any type that extends or implements `java.util.Collection`,
    and then perform the desired task(s) on each element of the collection. In the
    following code, an `ArrayList` loaded with `Stock` objects demonstrates the concept
    of streams.


    ```

    public class StreamExample {

    static List myStocks = new ArrayList();

    private static void createStocks(){

    myStocks.add(new Stock("ORCL", "Oracle", 500.0));

    myStocks.add(new Stock("AAPL", "Apple", 200.0));

    myStocks.add(new Stock("GOOG", "Google", 100.0));

    myStocks.add(new Stock("IBM", "IBM", 50.0));

    myStocks.add(new Stock("MCD", "McDonalds", 300.0));

    }

    public static void main(String[] args){

    createStocks();

    // Iterate over each element and print the stock names

    myStocks.stream()

    .forEach(s->System.out.println(s.getName()));

    boolean allGt = myStocks.stream()

    .allMatch(s->s.getShares() > 100.0);

    System.out.println("All Stocks Greater Than 100.0 Shares? " + allGt);

    // Print out all stocks that have more than 100 shares

    System.out.println("== We have more than 100 shares of the following:");

    myStocks.stream()

    .filter(s -> s.getShares() > 100.0)

    .forEach(s->System.out.println(s.getName()));

    System.out.println("== The following stocks are sorted by shares:");

    Comparator byShares = Comparator.comparing(Stock::getShares);

    Stream sortedByShares = myStocks.stream()

    .sorted(byShares);

    sortedByShares.forEach(s -> System.out.println("Stock: " + s.getName() + " - Shares:
    " + s.getShares()));

    // May or may not return a value

    Optional maybe = myStocks.stream()

    .findFirst();

    System.out.println("First Stock: " + maybe.get().getName());

    List newStocks = new ArrayList();

    Optional maybeNot = newStocks.stream()

    .findFirst();

    Consumer myConsumer = (s) ->

    {

    System.out.println("First Stock (Optional): " + s.getName());

    };

    maybeNot.ifPresent(myConsumer);

    if(maybeNot.isPresent()){

    System.out.println(maybeNot.get().getName());

    }

    newStocks.add(new Stock("MCD", "McDonalds", 300.0));

    Optional maybeNow = newStocks.stream()

    .findFirst();

    maybeNow.ifPresent(myConsumer);

    }

    }

    ```


    The output is:


    ```

    Oracle

    Apple

    Google

    IBM

    McDonalds

    All Stocks Greater Than 100.0 Shares? false

    == We have more than 100 shares of the following:

    Oracle

    Apple

    McDonalds

    == The following stocks are sorted by shares:

    Stock: IBM - Shares: 50.0

    Stock: Google - Shares: 100.0

    Stock: Apple - Shares: 200.0

    Stock: McDonalds - Shares: 300.0

    Stock: Oracle - Shares: 500.0

    First Stock: Oracle

    First Stock (Optional): McDonalds

