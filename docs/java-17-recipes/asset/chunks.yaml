- fmt: '### How It Works


    The Java platform provides conversion support for many legacy character set encodings.
    When you create a `String` instance from a byte array, you must provide a `charset`
    argument to the `String` constructor so that the platform knows how to perform
    the mapping from the legacy encoding to Unicode. All Java strings use Unicode
    as their native encoding.


    The number of bytes in the original array does not usually equal the number of
    characters in the result string. In this recipe’s example, the original array
    contains 18 bytes. The Shift-JIS encoding needs the 18 bytes to represent the
    Japanese text. However, after conversion, the result string contains nine characters.
    There is not a 1:1 relationship between bytes and characters. Each character requires
    two bytes in the original Shift-JIS encoding in this example.


    There are hundreds of different `charset` encodings. The number of encodings is
    dependent on your Java platform implementation. However, you are guaranteed support
    of several of the most common encodings, and your platform most likely contains
    many more than this minimal set.


    - US-ASCII

    - ISO-8859-1

    - UTF-8

    - UTF-16BE

    - UTF-16LE

    - UTF-16


    When constructing a `charset`, you should be prepared to handle the possible exceptions
    when the character set is not supported.


    - `java.nio.charset.IllegalCharsetNameException`, thrown when the `charset` name
    is illegal

    - `java.lang.IllegalArgumentException`, thrown when the `charset` name is `null`

    - `java.nio.charset.UnsupportedCharsetException`, thrown when your JVM doesn’t
    support the targeted `charset`


    ## 11.7 Converting Character Streams and Buffers


    ### Problem


    You need to convert large blocks of Unicode character text to and from an arbitrary
    byte-oriented encoding. Large blocks of text may come from streams or files.


    ### Solution 1


    Use `java.io.InputStreamReader` to decode a byte stream to Unicode characters.
    Use `java.io.OutputStreamWriter` to encode Unicode characters to a byte stream.


    The following code uses `InputStreamReader` to read and convert a potentially
    large block of text bytes from a file in the classpath. The `org.java17recipes.chapter11.recipe11_07.StreamConversion`
    class provides the complete code for this example.


    ```

    public static void main(String[] args) {

    StreamConversion app = new StreamConversion();

    app.run();

    }

    public void run() {

    try {

    String input = readStream();

    System.out.printf("Input stream: %s\n", input);

    writeStream(input);

    } catch (IOException ex) {

    Logger.getLogger(StreamConversion.class.getName()).log(Level.SEVERE, null, ex);

    }

    }

    public String readStream() throws IOException {

    InputStream is = getClass().getResourceAsStream("/resources/helloworld.sjis.txt");

    StringBuilder sb = new StringBuilder();

    if (is != null) {

    try (InputStreamReader reader =

    new InputStreamReader(is, Charset.forName("SJIS"))) {

    int ch = reader.read();

    while (ch != -1) {

    sb.append((char) ch);

    ch = reader.read();

    }

    }

    }

    return sb.toString();

    }

    ```


    Similarly, you can use an `OutputStreamWriter` to write text to a byte stream.
    The following code writes a string to a UTF-8 encoded byte stream.


    ```

    public void writeStream(String text) throws IOException {

    FileOutputStream fos = new FileOutputStream("helloworld.utf8.txt");

    try (OutputStreamWriter writer

    = new OutputStreamWriter(fos, Charset.forName("UTF-8"))) {

    writer.write(text);

    }

    }

    ```


    ### Solution 2


    Use `java.nio.charset.CharsetEncoder` and `java.nio.charset.CharsetDecoder` to
    convert Unicode character buffers to and from byte buffers. Retrieve an encoder
    or decoder from a `charset` instance with the `newEncoder()` or `newDecoder()`
    method. Then use the encoder’s `encode()` method to create byte buffers. Use the
    decoder’s `decode()` method to create character buffers. The following code from
    the `org.java17recipes.chapter11.recipe11_07.BufferConversion` class encodes and
    decodes character sets from buffers.


    ```

    public static void main(String[] args) {

    BufferConversion app = new BufferConversion();

    app.run();

    }

    public void run() {

    try {

    System.out.printf("Original string: %s\n", unicodeString);

    CharBuffer srcBuffer = CharBuffer.wrap(unicodeString);

    ByteBuffer targetBytes = encodeBuffer("UTF8", srcBuffer);

    printBytes(targetBytes);

    CharBuffer roundtripBuffer = decodeBuffer("UTF8", targetBytes);

    printCharBuffer(roundtripBuffer);

    } catch (CharacterCodingException ex) {

    Logger.getLogger(BufferConversion.class.getName()).log(Level.SEVERE, null, ex);

    }

    }

    public ByteBuffer encodeBuffer(String charsetName, CharBuffer charBuffer)

    throws CharacterCodingException {

    Charset charset = Charset.forName(charsetName);

    CharsetEncoder encoder = charset.newEncoder();

    ByteBuffer targetBuffer = encoder.encode(charBuffer);

    return targetBuffer;

    }

    public CharBuffer decodeBuffer(String charsetName, ByteBuffer srcBuffer)

    throws CharacterCodingException {

    Charset charset = Charset.forName(charsetName);

    CharsetDecoder decoder = charset.newDecoder();

    CharBuffer charBuffer = decoder.decode(srcBuffer);

    return charBuffer;

    }

    ```


    ### How It Works


    The `java.io` and `java.nio.charset` packages contain several classes that can
    help you perform encoding conversions on large text streams or buffers. Streams
    are convenient abstractions that can assist you in converting text using a variety
    of sources and targets. A stream can represent incoming or outgoing text in an
    HTTP connection or even a file.


    If you use an `InputStream` to represent the underlying source text, you wrap
    that stream in an `InputStreamReader` to perform conversions from a byte stream.
    The reader instance performs the conversion from bytes to Unicode characters.


    Using an `OutputStream` instance to represent the target text, wrap the stream
    in an `OutputStreamWriter`. A writer converts your Unicode text to a byte-oriented
    encoding in the target stream.


    To effectively use either an `OutputStreamWriter` or an `InputStreamReader`, you
    must know the character encoding of your target or source text. When you use an
    `OutputStreamWriter`, the source text is always Unicode, and you must supply a
    `charset` argument to tell the writer how to convert to the target byte-oriented
    text encoding. When you use an `InputStreamReader`, the target encoding is always
    Unicode. You must supply the source text encoding as an argument so that the reader
    understands how to convert the text.


    Note


    The Java platform’s `String` represents characters in the UTF-16 encoding of Unicode.
    Unicode can have several encodings, including UTF-16, UTF-8, and even UTF-32.
    Converting to Unicode in this discussion always means converting to UTF-16. Converting
    to a byte-oriented encoding usually means a legacy non–Unicode `charset` encoding.
    However, a common byte-oriented encoding is UTF-8, and it is entirely reasonable
    to convert Java’s “native” UTF-16 Unicode characters to or from UTF-8 using the
    `InputStreamReader` or `OutputStreamWriter` class.


    Yet another way to perform encoding conversions is to use the `CharsetEncoder`
    and `CharsetDecoder` classes. `CharsetEncoder` encodes your Unicode `CharBuffer`
    instances to `ByteBuffer` instances. `CharsetDecoder` decodes `ByteBuffer` instances
    into `CharBuffer` instances. In either case, you must provide a `charset` argument.


    ## 11.8 Summary


    Internationalization is a key to developing culturally responsive applications.
    It allows application text to be changed to adhere to the culture and language
    in which the application is being used. This chapter provided some examples of
    how to use internationalization techniques to overcome the nuances of cross-culture
    development.'
