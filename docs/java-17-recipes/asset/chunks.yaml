- fmt: '# 15.9 Summary


    XML is commonly used to transfer data between disparate applications or store
    data of some kind to a file. Therefore, it is important to understand the fundamentals
    for working with XML in your application development platform. This chapter provided
    an overview of performing some key tasks for working with XML using Java. This
    chapter began with the basics of writing and reading XML. The chapter also worked
    with JSON demonstrating how to generate, write, and parse JSON data.


    # 16. Networking


    Today, writing an application that does not communicate over the Internet in some
    fashion is rare. From sending data to another machine to scraping information
    off remote web pages, networking plays an integral part in today’s computing world.
    Java makes it easy to communicate over a network using the new I/O (NIO) and many
    I/O features for the Java platform (NIO.2) APIs. This chapter does not attempt
    to cover every networking feature that is part of the Java language, as the topic
    is quite large. However, it does provide a handful of recipes that are the most
    useful to a broad base of developers. You learn about a few of the standard networking
    concepts, such as sockets, and some newer concepts introduced with the latest
    release of the Java language. If you find this chapter interesting and want to
    learn more about Java networking, you can find lots of resources online.


    ## 16.1 Listening for Connections on the Server


    ### Problem


    You want to create a server application that listens for connections from a remote
    client.


    ### Solution


    Set up a server-side application that uses `java.net.ServerSocket` to listen for
    requests on a specified port. The following Java class is representative of one
    that would be deployed onto a server, and it listens for incoming requests on
    port `1234`. When a request is received, the incoming message is printed to the
    command line, and a response is sent back to the client.


    ```

    import java.io.BufferedReader;

    import java.io.IOException;

    import java.io.InputStreamReader;

    import java.io.PrintWriter;

    import java.net.ServerSocket;

    import java.net.Socket;

    public class SocketServer {

    public static void main(String a[]) {

    final int httpd = 1234;

    ServerSocket ssock = null;

    try {

    ssock = new ServerSocket(httpd);

    System.out.println("have opened port 1234 locally");

    Socket sock = ssock.accept();

    System.out.println("client has made socket connection");

    communicateWithClient(sock);

    System.out.println("closing socket");

    } catch (Exception e) {

    System.out.println(e);

    } finally {

    try{

    ssock.close();

    } catch (IOException ex) {

    System.out.println(ex);

    }

    }

    }

    public static void communicateWithClient(Socket socket) {

    BufferedReader in = null;

    PrintWriter out = null;

    try {

    in = new BufferedReader(

    new InputStreamReader(socket.getInputStream()));

    out = new PrintWriter(

    socket.getOutputStream(), true);

    String s = null;

    out.println("Server received communication!");

    while ((s = in.readLine()) != null) {

    System.out.println("received from client: " + s);

    out.flush();

    break;

    }

    } catch (Exception e) {

    e.printStackTrace();

    } finally {

    try {

    in.close();

    out.close();

    } catch (IOException ex) {

    e.printStackTrace();

    }

    }

    }

    }

    ```


    This recipe works in concert with Recipe 16-2. This example initiates the server,
    and executing this program simply prints "have opened port 1234 locally." But
    executing it along with the client built in Recipe 16-2 results in the following
    output from the `SocketServer`.


    ```

    have opened port 1234 locally

    client has made socket connection

    received from client: Here is a test.

    closing socket

    ```


    **Note:** To run the two recipes so that they work with each other, first start
    the `SocketServer` program (open a command window and type **java SocketServer**)
    so that the client can create a socket using the port opened in the server program.
    After the `SocketServer` starts, initiate the `SocketClient` (open another command
    window and type **java SocketClient**) program to see the two work together.


    **Caution:** This `SocketServer` program opens a port on your machine (1234).
    Be sure that you have a firewall set running on your machine; otherwise, you open
    port 1234 to everyone. This could result in your machine being attacked. Open
    ports create vulnerabilities for attackers to break into machines, kind of like
    leaving a door in your house open. Note that the example in this recipe has a
    minimal attack profile because the server is run through only one pass and prints
    only a single message from the client before the session is closed.


    ### How It Works


    Server applications can enable work to be performed via direct communication from
    one or more client applications. Client applications normally communicate to the
    server application, send messages or data to the server for processing, and then
    disconnect. The server application typically listens for client applications and
    then performs processing against a client request once a connection is received
    and accepted. For a client application to connect to a server application, the
    server application must be listening for connections and then processing the connection
    data somehow. You cannot simply run a client against any given host and port number
    combination because doing so would likely result in a refused connection error.
    The server-side application must do three things: open a port, accept and establish
    client connections, and then communicate with the client connection in some way.
    In the solution to this recipe, the `SocketServer` class does all three.


    Starting with the `main()` method, the class opens a new socket on port 1234.
    This is done by creating a new instance of `ServerSocket` and passing a port number
    to it. The port number must not conflict with any other port currently in use
    on the server. It is important to note that ports below 1024 are usually reserved
    for operating system use, so choose a port number above that range. If you attempt
    to open a port already in use, the server socket will not be successfully created,
    and the program will fail. Next, the `ServerSocket` object''s `accept()` method
    is called, returning a new `Socket` object. Calling the `accept()` method does
    nothing until a client attempts to connect to the server program on the port that
    has been set up. The `accept()` method waits idly until a connection is requested,
    and then it returns the new `Socket` object bound to the port set up on the server
    socket. This socket also contains the remote port and hostname of the client attempting
    the connection. It contains the information on two endpoints and uniquely identifies
    the Transmission Control Protocol (TCP) connection.


    At this point, the server program can communicate with the client program, and
    it does so using the `PrintWriter` and `BufferedReader` objects. In the solution
    to this recipe, the `communicateWithClient()` method contains all the code necessary
    to accept messages from the client program, sends messages back to the client,
    and returns control to the `main()` method that closes the server socket. A new
    `BufferedReader` object can be created by generating a new `InputStreamReader`
    instance using the socket''s input stream. Similarly, a new `PrintWriter` object
    can be created using the socket''s output stream. Notice that this code must be
    wrapped in a `try-catch` block if these objects are not successfully created.


    ```

    in = new BufferedReader(

    new InputStreamReader(socket.getInputStream()));

    out = new PrintWriter(

    socket.getOutputStream(), true);

    ```


    Once these objects have been successfully created, the server can communicate
    with the client. It uses a loop to do so, reading from the `BufferedReader` object
    (the client input stream) and sending messages back to the client using the `PrintWriter`
    object. In the solution to this recipe, the server closes the connection by issuing
    a `break`, which causes the loop to end. Control then returns to the `main()`
    method.'
