- fmt: '### How It Works


    A `Map` object contains a collection of key/value pairs. Maps can be beneficial
    when you need to store an index (key) and associate it with a particular value.
    A `Map` object must not contain any duplicate keys and each key maps to exactly
    one value. The source code for the solution (`StockPortfolio1.java`) demonstrates
    how to add and remove entries from a map. It also contains the source listed in
    the solution to this recipe, demonstrating how to iterate map entries using legacy
    techniques and newer syntax that takes advantage of lambda expressions and streams.


    The `summary()` method uses a `foreach` loop implementation to iterate the portfolio
    map’s `Entry` set. To iterate using the legacy code, the `Map entrySet()` method
    returns a `Set` of `Map.Entry` objects. Within the loop, you then have access
    to the key and value for the current `Map.Entry` by calling the respective `key()`
    and `value()` methods on that entry. Use this method of iterating when you need
    to access both the map keys and values while iterating, and you don’t need to
    remove elements from the map. Looking at the newer syntax, you can see that the
    same iteration can be performed in a single line of code. The newer syntax utilizes
    the `forEach()` method, which was added to the `Map` interface in Java 8. It applies
    a lambda expression to each entry within the list. The lambda expression takes
    both the key and value as arguments and prints them out.


    The `alertListLegacy()` method uses a `foreach` loop implementation to iterate
    the values of the portfolio map. The `Map values()` method returns a collection
    of the map values; in this case, a collection of stocks. Use this method of iterating
    when you only need access to the map values, and you don’t need to remove elements
    from the list. Similarly, if you only need access to the map keys (again, without
    the need to remove elements), you can iterate using the `keySet()` method.


    ```

    for (String symbol : portfolio.keySet()) {

    ...

    }

    ```


    If you also need to access the map value while iterating using the key set, avoid
    the following, as it is very inefficient. Instead, use the method of iteration
    shown in the `summary()` method.


    ```

    for (String symbol : portfolio.keySet()) {

    Stock stock = portfolio.get(symbol);

    ...

    }

    ```


    Looking at the `alertList()` method in the solution, you can see that the same
    iteration can be performed with much less work using a combination of streams,
    filters, and collectors. In `alertList()`, a stream is generated, and then a filter,
    in the form of a lambda expression, is applied to that stream. Finally, a collector
    is applied to the filter, creating a `List<Stock>` to return.


    The `remove(List<String>)` method takes a list of stock symbols representing the
    stocks to be removed from the portfolio. This method iterates over the portfolio
    map keys using the `keySet()` iterator, removing the current map entry if one
    of the stocks specified for removal. Notice that the map element is removed through
    the iterator’s `remove()` method. This is possible because the map backs the key
    set, so changes made through the key set’s iterator are reflected in the map.
    You could also iterate the portfolio map using its `values()` iterator.


    ```

    Iterator valueIter = portfolio.values().iterator();

    while (valueIter.hasNext()) {

    if (sellList.contains(valueIter.next().getSymbol())) {

    valueIter.remove();

    }

    }

    ```


    As with the key set, the values collection is backed by the map, so calling `remove()`
    through the values iterator results in removing the current entry from the portfolio
    map.


    In summary, if you need to remove elements from a map while iterating over the
    map, iterate using one of the map’s collection iterators and remove map elements
    through the iterator, as shown in the `remove(List<String>)` method. This is the
    only safe way to remove map elements during iteration. Otherwise, if you don’t
    need to remove map elements, you can use a `foreach` loop and one of the methods
    of iteration shown in the solution to this recipe.


    ## 7.10 Executing Streams in Parallel


    ### Problem


    You want to iterate a collection parallel to distribute the work over multiple
    CPUs.


    ### Solution


    Utilize a stream construct on the collection, and invoke `parallelStream()` as
    the first intermediate operation in order to take advantage of multiple CPU processing.
    The following class demonstrates multiple uses of the `parallelStream()` operation.


    ```

    public class StockPortfolio2 {

    static List myStocks = new ArrayList();

    private static void createStocks(){

    myStocks.add(new Stock("ORCL", "Oracle", 500.0));

    myStocks.add(new Stock("AAPL", "Apple", 200.0));

    myStocks.add(new Stock("GOOG", "Google", 100.0));

    myStocks.add(new Stock("IBM", "IBM", 50.0));

    myStocks.add(new Stock("MCD", "McDonalds", 300.0));

    }

    public static void main(String[] args){

    createStocks();

    // Iterate over each element and print the stock names

    myStocks.stream()

    .forEach(s->System.out.println(s.getName()));

    boolean allGt = myStocks.parallelStream()

    .allMatch(s->s.getShares() > 100.0);

    System.out.println("All Stocks Greater Than 100.0 Shares? " + allGt);

    // Print out all stocks that have more than 100 shares

    System.out.println("== We have more than 100 shares of the following:");

    myStocks.parallelStream()

    .filter(s -> s.getShares() > 100.0)

    .forEach(s->System.out.println(s.getName()));

    System.out.println("== The following stocks are sorted by shares:");

    Comparator byShares = Comparator.comparing(Stock::getShares);

    Stream sortedByShares = myStocks.parallelStream()

    .sorted(byShares);

    sortedByShares.forEach(s -> System.out.println("Stock: " + s.getName() + " - Shares:
    " + s.getShares()));

    // May or may not return a value

    Optional maybe = myStocks.parallelStream()

    .findFirst();

    System.out.println("First Stock: " + maybe.get().getName());

    List newStocks = new ArrayList();

    Optional maybeNot = newStocks.parallelStream()

    .findFirst();

    Consumer myConsumer = (s) ->

    {

    System.out.println("First Stock (Optional): " + s.getName());

    };

    maybeNot.ifPresent(myConsumer);

    if(maybeNot.isPresent()){

    System.out.println(maybeNot.get().getName());

    }

    newStocks.add(new Stock("MCD", "McDonalds", 300.0));

    Optional maybeNow = newStocks.stream()

    .findFirst();

    maybeNow.ifPresent(myConsumer);

    }

    }

    ```


    ### How It Works


    By default, operations are executed in a serial stream. However, you can specify
    that the Java runtime splits the operations between multiple subtasks, thus taking
    advantage of multiple CPUs for performance. When operations are executed in this
    manner, they are executed in “parallel.” The Java runtime can partition streams
    into multiple substreams by invoking the `parallelStream()` intermediate operation.
    When this operation is invoked, aggregate operations can process the multiple
    substreams, and then the results are combined in the end. You can also execute
    a stream in parallel by invoking the operation `BaseStream.parallel()`. Naturally,
    parallel streams have higher overhead compared to serial streams, so they are
    used if there is a performance problem to be addressed.


    ## 7.11 Summary


    This chapter looked at various data structures and how to work with them. First,
    you took a look at `Enums` and learned how to utilize them effectively. Next,
    we covered the basics of `Arrays` and `ArrayList` and learned how to iterate elements
    within these structures. The chapter also covered Java generics, which allow you
    to decouple object types from container types, providing more type-safe and efficient
    code. Lastly, this chapter covered the Streams API, one of the most important
    updates introduced in Java 8 for working with collections.'
