    ### 工作原理


    数据库由组织化的数据构成，即数据本身以及提供数据结构的模式。如今，大多数数据库都组织成由行和列组成的表。这是一种自然的数据组织方式，你可能通过使用电子表格对此已有所了解。你可以独立于将要存储的实际数据来定义表的特性。字段是表中的一个独立数据项，对应于行与列的交集。可以将一个或多个列指定为唯一键，用于标识每条记录。为此，你可以使用前面提到的某一列，或者使用名字、姓氏和出生日期的组合。优先于其他键使用的唯一键称为表的主键。


    数据库管理系统（DBMS），例如 MySQL，是一个软件包，它允许你创建、读取、更新和删除（CRUD）数据项以及模式元素。


    因此，在谈论数据库时，你需要区分三个方面。


    *   它所包含的数据。

    *   你为高效执行 CRUD 操作而施加于数据之上的结构。

    *   允许你操作数据本身和数据库结构的软件（即 DBMS）。


    使用数据库意味着你正在与其 DBMS 进行交互。你可以通过命令行界面（CLI）、DBMS 供应商和第三方提供的图形用户界面（GUI），或者通过 API 以编程方式来实现。


    DBMS 可以为每个键构建一个*索引*，以便更快地检索数据。这会减慢行的插入和删除（即新记录）速度，因为 DBMS 需要花费时间来更新索引。大多数数据库被查询的频率高于被修改的频率。因此，定义索引通常是值得的，至少那些能够加速最常见查询的索引是如此。


    结构化查询语言（SQL）是与 DBMS 交互时使用最广泛的语言。大多数 DBMS 并不支持完整的 SQL 标准。此外，供应商有时会添加非标准元素，这实际上阻碍了不同
    DBMS 之间的完全可移植性。总的来说，无论我们谈论的是数据库组织、表结构还是实际数据，你都需要执行四种 CRUD 操作。相应的 SQL 语句以标识操作的关键字开头（例如，INSERT、SELECT、UPDATE
    或 DELETE），必要时后跟指定操作针对何种实体类型的关键字（例如，DATABASE、TABLE 或 INDEX），以及附加元素。你使用 SELECT 语句来检索信息。


    你可以使用 CREATE 语句创建数据库、表和索引，使用 ALTER 语句更新它们，使用 DROP 语句删除它们。类似地，你可以使用 CREATE 和 DROP
    创建和删除视图，但一旦创建了视图，就无法更新它们。你使用 INSERT 在表中创建新行，使用 DELETE 删除它们。UPDATE 语句允许你修改整行或行中的一个或多个字段。


    用于修改结构的语句统称为数据定义语言（DDL）。用于修改内容的语句称为数据操作语言（DML）。


    在许多应用程序中，数据库、表、索引和视图的结构一旦初始定义后便保持不变。因此，在你的应用程序中，你通常只需要操作行和字段的语句。无论如何，你肯定需要 SELECT
    语句，它用于查询数据库的结构及其包含的数据。最后，为了完整列出开发应用程序时可能需要的语句，还有 START TRANSACTION、COMMIT 和 ROLLBACK，这些语句用于处理事务。


    当你想要检索、更新或删除行时，必须标识它们。你可以使用 WHERE 关键字后跟`<where_condition>`来实现。


    在本章的示例中，我们选择使用*MySQL*作为 DBMS，首先是因为它是免费提供的，其次是因为它是免费 DBMS 中使用最广泛的一个。因此，它已被证明能够在各种环境中可靠运行。不过，最终你可以开发能够与其他传统关系型数据库管理系统（RDBMS）配合使用的
    Java 应用程序，例如 Oracle Database 或 PostgreSQL。


    ## 12.2 连接数据库


    ### 问题


    你希望从桌面 Java 应用程序中连接到数据库。

    '
- fmt: '### Solution


    Use a JDBC `Connection` object to obtain the connection. Do this by creating a
    new connection object, and then load the driver that you need to use for your
    particular database vendor. Once the connection object is ready, call its `getConnection()`
    method. The following code demonstrates how to obtain a connection to a MySQL
    database: in general, the connection depends on the specified driver.


    ```

    package org.java17recipes.chapter12.recipe12_02;

    import java.sql.Connection;

    import java.sql.DriverManager;

    import java.sql.SQLException;

    import java.util.Properties;

    public class CreateConnection {

    static Properties props = new Properties();

    String hostname = "localhost";

    String port = "3306";

    String database = "apressbooks";

    String username = "root";

    String password = "root";

    public Connection getConnection() throws SQLException {

    Connection conn = null;

    String jdbcUrl;

    jdbcUrl = "jdbc:mysql://" + this.hostname + ":" +

    this.port  + "/" + this.database;

    System.out.println(jdbcUrl);

    conn = DriverManager.getConnection(jdbcUrl, this.username, this.password);

    System.out.println("Successfully connected");

    return conn;

    }

    public static void main(String[] args) {

    CreateConnection createConnection = new CreateConnection();

    try {

    createConnection.getConnection();

    } catch (SQLException e){

    e.printStackTrace();

    }

    }

    }

    ```


    The method portrayed in this example returns a `Connection` object that is ready
    to be used for database access.


    ### How It Works


    Creating a JDBC connection involves a few steps. First, you need to determine
    which database driver you need. After you’ve determined which driver you need,
    you download the JAR file containing that driver and place it into your classpath.
    Each database vendor provides different JDBC drivers packaged in JAR files with
    different names; consult the documentation for your database for more information.
    For this recipe, you can download the connector at [`https://dev.mysql.com/downloads/connector/j/`](https://dev.mysql.com/downloads/connector/j/).
    Ensure that the selected platform is “Platform Independent”: this is important
    for distributing the software on different systems. Next, use a JDBC `DriverManager`
    class to obtain a connection to the database.


    To obtain a connection to your database using the `DriverManager` class, you need
    to pass a string containing the JDBC URL to it. The JDBC URL consists of the database
    vendor name, along with the name of the server that hosts the database, the name
    of the database, the database port number, and a valid database username and password
    that has access to the schema or database objects that you want to work with.
    The values to create the JDBC URL are often obtained from a `Properties` file
    so that they can be easily changed if needed. The code that creates the MySQL
    database JDBC URL for solution 1 looks like the following.


    ```

    String jdbcUrl = "jdbc:mysql:thin:@" + this.hostname + ":" +

    this.port  + ":" + this.database;

    ```


    Once all the variables have been substituted into the string, it looks like the
    following.


    ```

    jdbc:mysql://localhost:3306/apressbooks

    ```


    Once the JDBC URL has been created, it can be passed to the `DriverManager.getConnection()`
    method to obtain a `java.sql.Connection` object. If incorrect information has
    been passed to the `getConnection()` method, `java.sql.SQLException` is thrown;
    otherwise, a valid `Connection` object is returned.


    ## 12.3 Handling Connection and SQL Exceptions


    ### Problem


    A database activity in your application has thrown an exception. You need to handle
    the SQL exception so that your application does not crash.


    ### Solution


    Use a `try-catch` block to capture and handle any SQL exceptions thrown by your
    JDBC connection or SQL queries. The following code demonstrates how to implement
    a `try-catch` block to capture SQL exceptions.


    ```

    try {

    // perform database tasks

    } catch (java.sql.SQLException){

    // perform exception handling

    }

    ```


    ### How It Works


    A standard `try-catch` block can catch `java.sql.SQLException` exceptions. Your
    code will not compile if these exceptions are not handled. It is a good idea to
    handle them properly to prevent your application from crashing if one of these
    exceptions is thrown. Almost any work that is performed against a `java.sql.Connection`
    object needs to contain error handling to ensure that database exceptions are
    handled correctly. Nested `try-catch` blocks are often required to handle all
    the possible exceptions. You need to ensure that connections are closed once work
    has been performed and the `Connection` object is no longer used. Similarly, it
    is a good idea to close `java.sql.Statement` objects for memory allocation cleanup
    as well.


    Because `Statement` and `Connection` objects need to be closed, it is common to
    see `try-catch-finally` blocks ensure that all resources have been tended to as
    needed. It is likely that you see older JDBC code that resembles the following
    style.


    ```

    try {

    // perform database tasks

    } catch (java.sql.SQLException ex) {

    // perform exception handling

    } finally {

    try {

    // close Connection and Statement objects

    } catch (java.sql.SQLException ex){

    // perform exception handling

    }

    }

    ```


    Newer code should be written to take advantage of the `try-with-resources` statement,
    which allows one to offload resource management to Java, rather than performing
    manual closes. The following code demonstrates how to use `try-with-resources`
    to open a connection, create a statement, and then close both the connection and
    statement when finished.


    ```

    try (Connection conn = createConn.getConnection();

    Statement stmt = conn.createStatement();) {

    ResultSet rs = stmt.executeQuery(qry);

    while (rs.next()) {

    // PERFORM SOME WORK

    }

    } catch (SQLException e) {

    e.printStackTrace();

    }

    ```


    As seen in the previous pseudocode, nested `try-catch` blocks are often required
    to clean unused resources. Proper exception handling sometimes makes JDBC code
    rather laborious to write, but it also ensures that an application requiring database
    access does not fail, causing data to be lost.


    ## 12.4 Querying a Database and Retrieving Results


    ### Problem


    A process in your application needs to query a database table for data.


    ### Solution


    Obtain a JDBC connection, and then use the `java.sql.Connection` object to create
    a `Statement` object. A `java.sql.Statement` object contains the `executeQuery()`
    method, which parses a string of text and uses it to query a database. Once you’ve
    executed the query, you can retrieve the results in a `ResultSet` object. The
    following example queries a database table named `RECIPES` and prints the results.


    ```

    public class QueryDatabase {

    private static CreateConnection createConn;

    public static void main(String[] args) {

    createConn = new CreateConnection();

    queryDatabase();

    }

    public static void queryDatabase() {

    String qry = "select recipe_num, recipe_name, description from recipes";

    try (Connection conn = createConn.getConnection();

    Statement stmt = conn.createStatement();) {

    ResultSet rs = stmt.executeQuery(qry);

    while (rs.next()) {

    String recipe = rs.getString("RECIPE_NUM");

    String name = rs.getString("RECIPE_NAME");

    String desc = rs.getString("DESCRIPTION");

    System.out.println(recipe + "\t" + name + "\t" + desc);

    }

    } catch (SQLException e) {

    e.printStackTrace();

    }

    }

    }

    ```


    If you execute this code using the database script included with Chapter 12, you
    receive the following results.


    ```

    12-1 Installing MySQL Downloading and installation of a MySQL Database

    12-2 Connecting to a Database DriverManager and DataSource Implementations

    12-3 Handling SQL Exceptions Using SQLException

    12-4 Querying a Database and Retrieving Results Obtaining and using data from
    a DBMS

    ```'
