    ## 8.8 Iterating Over Files in a Directory


    ### Problem


    You need to scan files from a directory. There are possibly subdirectories with
    more files. You want to include those in your scan.


    ### Solution


    Using the NIO.2, creates a `java.nio.file.FileVisitor<T>` interface object and
    performs the desired implementation within its `visitFile()` method. Next, obtain
    the default `FileSystem` object and grab a reference to the path you’d like to
    scan via the `getPath()` method. Lastly, invoke the `Files.walkFileTree()` method,
    passing the `Path` and the `FileVisitor<T>` that you created. The following code
    demonstrates how to perform these tasks.


    ```

    public class Ch_8_8_TraverseDirectory {

    private void start() {

    FileVisitor myFileVisitor = new SimpleFileVisitor() {

    @Override

    public FileVisitResult visitFile(Path file, BasicFileAttributes attrs)

    throws IOException {

    System.out.println("Visited File: "+file.toString());

    return FileVisitResult.CONTINUE;

    }

    };

    FileSystem fileSystem = FileSystems.getDefault();

    Path directory= fileSystem.getPath(".");

    try {

    Files.walkFileTree(directory, myFileVisitor);

    } catch (IOException e) {

    e.printStackTrace();

    }

    }

    public static void main (String args[]) {

    Ch_8_8_TraverseDirectory traverseDirectory = new Ch_8_8_TraverseDirectory();

    traverseDirectory.start();

    }

    ```


    ### How It Works


    Before NIO.2, trying to traverse a directory tree involved recursion, and depending
    on the implementation, it could be very brittle. The calls to get files within
    a folder were synchronous. They required scanning the whole directory before returning,
    generating what would appear to be an unresponsive method call to an application
    user. With NIO.2, one can specify which folder to start traversing on, and the
    NIO.2 calls handle the recursion details. The only item you provide to the NIO.2
    API is a class that tells it what to do when a file/folder is found (`java.nio.file.SimpleFileVisitor<T>`
    class implementation). NIO.2 uses a `Visitor` pattern, so it isn’t required to
    prescan the entire folder but instead processes files as they are being iterated
    over.


    The implementation of the `SimpleFileVisitor<T>` class as an anonymous inner class
    includes overriding the `visitFile(Path file, BasicFileAttributes attrs)` method.
    When you override this method, you can specify the tasks to perform when a file
    is encountered.


    The `visitFile()` method returns a `FileVisitResult` enum. This enum then tells
    the `FileVisitor<T>` which action to take.


    - `CONTINUE` continues with the traversing of the directory tree.

    - `TERMINATE` stops the traversing.

    - `SKIP_SUBTREE` stops going deeper from the current tree level (useful only if
    this enum is returned on the `preVisitDirectory()` method).

    - `SKIP_SIBLINGS` skips the other directories at the same tree level as the current.


    The `SimpleFileVisitor<T>` class, aside from the `visitFile()` method, also contains
    the following.


    - `preVisitDirectory()` is called before entering a directory to be traversed.

    - `postVisitDirectory()` is called after finished traversing a directory.

    - `visitFile()` is called as it visits the file, as in the example code.

    - `visitFileFailed()` is called if the file cannot be visited; for example, on
    an I/O error.


    ## 8.9 Querying (and Setting) File Metadata


    ### Problem


    You need to get information about a particular file, such as file size, whether
    it is a directory, and so on. Also, you might want to mark a file as *archived*
    in the Windows operating system or grant-specific POSIX file permissions in the
    *nix operating system.


    ### Solution


    Using Java NIO.2, you can obtain any file information by simply invoking methods
    on the `java.nio.file.Files` utility class, passing the path you’d like to obtain
    the metadata. You can obtain attribute information by calling the `Files.getFileAttributeView()`
    method, passing the specific implementation for the attribute view that you would
    like to use. The following code demonstrates these techniques for obtaining metadata.


    ```

    public class Ch_8_09_MetadataInfo {

    private void start() {

    Path path = FileSystems.getDefault().getPath("./file2.log");

    try {

    // General file attributes, supported by all Java systems

    System.out.println("File Size:"+Files.size(path));

    System.out.println("Is Directory:"+Files.isDirectory(path));

    System.out.println("Is Regular File:"+Files.isRegularFile(path));

    System.out.println("Is Symbolic Link:"+Files.isSymbolicLink(path));

    System.out.println("Is Hidden:"+Files.isHidden(path));

    System.out.println("Last Modified Time:"+Files.getLastModifiedTime(path));

    System.out.println("Owner:"+Files.getOwner(path));

    // Specific attribute views.

    DosFileAttributeView view = Files.getFileAttributeView(path,

    DosFileAttributeView.class);

    System.out.println("DOS File Attributes\n");

    System.out.println("------------------------------------\n");

    System.out.println("Archive  :"+view.readAttributes().isArchive());

    System.out.println("Hidden   :"+view.readAttributes().isHidden());

    System.out.println("Read-only:"+view.readAttributes().isReadOnly());

    System.out.println("System   :"+view.readAttributes().isSystem());

    view.setArchive(false);

    } catch (IOException e) {

    e.printStackTrace();

    }

    }

    public static void main(String[] args) {

    Ch_8_09_MetadataInfo info = new Ch_8_09_MetadataInfo();

    info.start();

    }

    ```'
