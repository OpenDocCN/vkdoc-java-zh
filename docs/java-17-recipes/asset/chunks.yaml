    ### How It Works


    Factories generate objects. They are generally used to abstract the creation of
    an object from its creators. This can come in very handy when the creator does
    not need to know about the actual implementation details of generating the new
    object. The factory pattern can also be useful when controlled access to the creation
    of an object is required. To implement a factory, create a class containing at
    least one method used for returning a newly created object.


    In the solution to this recipe, the `PlayerFactory` class contains a `createPlayer(String)`
    method that returns a newly created `Player` object. This method doesn’t do anything
    special behind the scenes; it simply instantiates a new `Player` instance depending
    on the string value passed to the method. Another object with access to the `PlayerFactory`
    class can use `createPlayer` to return new `Player` objects without knowing how
    the object is created. While this does not hide much in the case of the `createPlayer`
    method, the `PlayerFactory` abstracts the details of which class is being instantiated
    so that the developer only has to worry about obtaining a new `Player` object.


