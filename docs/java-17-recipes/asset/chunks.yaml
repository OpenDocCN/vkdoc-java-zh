  trans: '

    ### 工作原理


    解决方案代码演示了泛型的一些基本用例。配方源码中包含的 `GenericsDemo.java` 文件中的示例更详细地展示了泛型在 Java 集合中的使用，而不是教你如何创建泛型类型。除非你开发库
    API，否则你可能不需要创建自己的泛型类型。然而，如果你理解了泛型如何与 `Collection` 接口和类一起使用，你就可以创建自己的泛型类型了。


    关于 Java 泛型，首先要理解并记住的是：它们严格来说是一种编译时特性，旨在帮助开发者创建类型更安全的代码。当你参数化一个泛型类型时指定的所有类型信息，在代码编译成字节码时都会被编译器“擦除”。你会看到这被称为*类型擦除*。让我们看一个泛型
    `Collection` 类型的例子：`List`。`List` 是一个定义如下的接口。


    ```

    public interface List extends Collection { ... };

    ```


    这个语法很奇怪，特别是因为没有对象或类型被标识为 `E`。事实证明，`E` 被称为*类型参数*，它是一个占位符，用于向编译器指示在运行时将某个类型分配给该对象。类型参数通常是大写字母，表示正在定义的参数的类型。有各种不同的类型参数需要注意，但请记住，这些仅适用于定义泛型类型时。在大多数情况下，只有在开发库或
    API 时才会定义泛型类型。


    *   E – 元素

    *   K – 键

    *   N – 数字

    *   T – 类型

    *   V – 值

    *   S、U、V 等——第二、第三、第四种类型


    要为 `List`（或任何 `Collection` 类型）指定元素类型，只需在声明和实例化对象时，将类型名称放在尖括号中。当你这样做时，你就是在指定一个*参数化类型*。以下代码声明了一个整数列表。声明了一个参数化类型
    `List<Integer>` 的变量 `aList`，然后用从参数化类型 `LinkedList<Integer>`（也称为*具体参数化类型*）的实例化中获得的引用对其进行初始化。


    ```

    List aList = new LinkedList();

    ```


    现在你已经将这些类型参数化，将元素类型限制为 `Integer`，`List add(E e)` 方法就变成了：


    ```

    boolean add(Integer e);

    ```


    如果你尝试向 `aList` 添加除整数之外的任何内容，编译器会生成一个错误。


    ```

    aList.add(new Integer(121));

    aList.add(42);      // 由于自动装箱，42 等同于 new Integer(42)。

    aList.add("Java");  // 无法编译，类型错误

    ```


    需要注意的是，编译时检查的是引用类型，因此以下代码也会导致编译器错误。


    ```

    Number aNum = new Integer("7");

    aList.add(aNum);  // 无法编译，类型错误

    ```


    这是一个编译错误，因为 `aNum` 可以引用任何 `Number` 对象。如果编译器允许这样做，你最终可能会得到一个包含 double、float 等类型的集合，这将违反你在创建
    `aList` 时指定的 Integer 参数约束。当然，简单的类型转换可以让你绕过编译器错误，但在不兼容的 `Number` 对象之间进行转换时，这肯定会导致意想不到的后果。泛型旨在减少你必须在代码中进行的显式类型转换的数量，因此，如果你发现在使用参数化类型的方法时使用了显式类型转换，这表明你的代码可能存在潜在危险。


    ```

    aList.add((Integer)aNum);  // 可以编译，但不要这样做。

    ```


    使用泛型类型时需要注意的其他事情是编译器警告。它们可能表明你正在做一些不推荐的事情，并且通常表明你的代码存在潜在的运行时错误。一个例子可以帮助说明这一点。以下代码可以编译，但会产生两个编译器警告。


    ```

    List rawList = new LinkedList();

    aList = rawList;

    ```


    首先，你创建了 `rawList`，它是一个*原始类型*，即未参数化的泛型类型。当泛型被引入该语言时，语言设计者决定为了保持与泛型之前代码的兼容性，他们需要使用原始类型。然而，强烈不鼓励在新代码（Java
    5 之后）中使用原始类型，因此如果你使用它们，编译器会生成原始类型警告。接下来，`rawList` 被赋值给使用参数化类型创建的 `aList`。同样，编译器允许这样做（由于泛型类型擦除和向后兼容性）。会为这个赋值生成一个“未检查的转换”警告，以标记潜在的运行时类型不兼容。想象一下，如果
    `rawList` 包含字符串。稍后，如果你尝试从 `aList` 中检索整数元素，你将收到一个运行时错误。


    关于类型兼容性，它不适用于泛型类型参数。例如，以下不是有效的赋值。


    ```

    List bList = new LinkedList();  // 无法编译；类型不兼容

    ```


    尽管整数是数字（`Integer` 是 `Number` 的子类型），并且 `LinkedList` 是 `List` 的子类型，但 `LinkedList<Integer>`
    不是 `List<Number>` 的子类型。幸运的是，如果你不小心编写了这样的代码，它不会逃过你的眼睛。编译器会生成一个“类型不兼容”的警告。


    所以你可能会想，是否有办法实现类似于我们在上一行代码中尝试的变体子类型关系。答案是肯定的，通过使用一个称为*通配符*的泛型特性。通配符通过在类型参数尖括号内使用问号（`?`）来表示。通配符声明了有界或无界的参数化类型。以下是一个有界参数化类型的声明示例。


    ```

    List cList;

    ```


    当通配符与 `extends` 关键字一起使用时，就为类型参数建立了一个上界。在这个例子中，`? extends Number` 表示任何是 `Number`
    或 `Number` 子类型的类型。因此，以下赋值是有效的，因为 `Integer` 和 `Double` 都是 `Number` 的子类型。


    ```

    cList = new LinkedList();

    cList = new LinkedList();

    cList = new LinkedList();

    ```


    所以，`cList` 可以持有对任何元素类型与 `Number` 兼容的 `List` 实例的引用。`cList` 甚至可以引用一个原始类型。这使得编译器很难强制执行类型安全以允许向
    `cList` 添加元素。因此，编译器不允许向使用 `? extends` 参数化的集合类型添加元素（除了 null）。以下代码会导致编译器错误。


    ```

    cList.add(new Integer(5));  // 不允许 add()；cList 可能是 LinkedList

    ```


    但是，你可以毫无问题地从列表中获取元素。


    ```

    Number cNum = cList.get(0);

    ```


    这里唯一的限制是，你从列表中获取的引用必须被视为一个数字。请记住，`cList` 可能指向一个整数列表、一个双精度浮点数列表或任何其他 `Number` 子类型的列表。


    通配符也可以与 `super` 关键字一起使用。在这种情况下，为类型参数建立了一个下界。


    ```

    List dList;

    ```


    在这个例子中，`? super Integer` 表示任何是 `Integer` 或 `Integer` 的任何超类型的类型。因此，以下赋值是有效的，因为
    `Number` 和 `Object` 是 `Integer` 仅有的超类型。


    ```

    dList = new LinkedList();

    dList = new LinkedList();

    dList = new LinkedList();

    ```


    所以，你看 `Integer` 是下界。这个下界现在限制了你从列表中检索元素。因为 `dList` 可以引用前面任何一个参数化类型，如果对正在检索的元素类型做出假设，编译器将无法强制执行类型安全。因此，编译器不得允许对使用
    `? super` 参数化的集合类型调用 `get()`，以下代码会导致编译器错误。


    ```

    Integer n = dList.get(0);  // 不允许 get()；dList.get(0) 可能是 Number 或 Object

    ```


    然而，现在你可以向列表中添加元素，但下界 `Integer` 仍然适用。只能添加 `Integer`，因为 `Integer` 与 `Number` 和 `Object`
    兼容。


    ```

    dList.add(new Integer(5));  // 可以

    Number dNum = new Double(7);

    dList.add(dNum);  // 无法编译；dList 可能是 LinkedList

    ```


    你会在整个集合类型中看到通配符与 `extends` 和 `super` 一起使用。你经常看到它们用于方法参数类型，例如为所有集合定义的 `addAll()`
    方法。有时你会看到集合类型单独使用通配符（`?`）作为类型参数，这被称为*无界通配符*。集合的 `removeAll()` 方法就是这样一个例子。在大多数情况下，这种用法是不言自明的。你可能不会（可能不应该）使用无界通配符定义自己的参数化类型。如果你尝试这样做，你很快就会了解到你无法用它做太多事情。如果你理解了具体参数化类型、通配符参数化类型以及有界和无界类型的概念（如本配方所述），你就掌握了使用泛型集合类型所需的大部分知识，并且如果你愿意，也可以创建自己的泛型类型。


    既然我们已经讨论了很多关于参数化类型的内容，我们打算让你忘记其中的一些。当 Java 7 发布时，引入了一个称为*菱形*（有时称为菱形运算符，尽管它在 Java
    中不被视为运算符）的新特性。菱形允许编译器从参数化类型使用的上下文中推断类型参数。以下是一个简单的菱形使用示例。


    ```

    List eList = new ArrayList();

    ```


    注意，在实例化 `ArrayList` 时，尖括号之间没有指定类型参数。编译器可以根据赋值或初始化器的上下文轻松推断出类型是整数。Integer 是此上下文中唯一可行的类型。事实上，Java
    编译器（以及大多数兼容的 IDE）会在你可以使用菱形但未使用时发出警告。另一个更复杂的例子更好地展示了其优势。


    ```

    Map> aMap = new HashMap();  // 很好！

    ```


    菱形同样可以用于 `return` 语句以及方法参数中。


    ```

    // 方法返回中的菱形

    public static List getEmptyList() {

    return new ArrayList();

    }

    // 方法参数中的菱形

    List> gList = new ArrayList();

    gList.set(0, new ArrayList(Arrays.asList("a", "b")));

    ```


    请注意，此处使用菱形与使用原始类型不同。以下代码不等同于使用菱形的 `aMap` 声明；它会导致编译器发出“未检查的转换”警告，甚至可能是原始类型警告。


    ```

    Map> bMap = new HashMap();   // 编译器警告；避免原始类型

    ```


    关于为什么这与菱形示例不同的讨论超出了本配方的范围。如果你记住要避免使用原始类型，你就不必担心这个。尽可能使用菱形，以节省一些输入，并使你的代码更健壮、更易读、更简洁。

