  raw: '### How It Works


    To compile and execute a Java program, you must add the JDK path to the PATH environment
    variable (a string of paths separated by semicolons in Windows and colons in Unix
    OS). All operating systems use the PATH environment variable to determine where
    executable files are located on your system to execute any stored or downloaded
    file on your personal computer. This variable tells the operating systems where
    the to-run programs reside when a user executes a file. The environment variables
    can also be stored information used by applications or operating systems.


    PATH contains a string of directories separated by semicolons in Windows and colons
    in Unix OS. PATH is used because any executable file in the directories listed
    in PATH can be executed without specifying the full path to the file. This allows
    you to run those executables with only the file name from the command line or
    for other applications to run those executables without knowledge of their directory
    path.


    So, when you execute a file, you need to specify the full path to that file, but
    if the command does not include the path, the OS uses the executable file that
    matches your file in the PATH.


    ## 1.3 Testing Java


    ### Problem


    You want to compile Java from the command line.


    ### Solution


    Use the little application shown in Listing [1-1](#323910_4_En_1_Chapter.xhtml#PC3).
    You can use a smart editor like Notepad++ or a different text editor in this example.


    To create the source code for your first Java program, you must do the following.


    1.  Declare a class named Hello.


    2.  Declare public static void `main(String args[])` or `String... args` as the
    main method.


    3.  Enter the System.out.println(“Hello World”`)` command to display “Hello World”
    in the command prompt window.


    ```

    public class Hello {

    public static void main(String args[]){

    System.out.println("Hello World");

    }

    }

    Listing 1-1

    Hello.java

    ```


    Now, save the file as Hello.java in your working folder. Open the command window.
    After changing to your work directory, enter the following to compile the application.


    ```

    javac Hello.java

    ```


    It should return the prompt without saying anything. It also means that you have
    correctly updated the `Path` system variable. If you want to know more about what
    the `javac` compiler is doing, type `-verbose` between `javac` and the name of
    the file (`javac -verbose Hello.java`). You see a file named `Hello.class` in
    your work directory.


    Enter the following in the command prompt to run the application (see Figure [1-3](#323910_4_En_1_Chapter.xhtml#Fig3)).


    ```

    java Hello

    ```


    ![](images/323910_4_En_1_Chapter/323910_4_En_1_Fig3_HTML.jpg)


    Figure 1-3


    Testing a Java class


    Note


    All the code described in this book is available for download from `github.com/apress/java17-recipes`.
    In this case, you can simply type the code; in others, you don’t need to retype
    it. It is important that you improve your programming skills using the Eclipse
    Environment, which is a famous free and open source Java IDE, containing a workspace
    for developing applications, that you can download at [`www.eclipse.org`](http://www.eclipse.org).
    You can find the examples in folders with the same names as the corresponding
    chapters.


    ### How It Works


    Java is an object-oriented programming language based on classes and objects with
    attributes and methods. A class is necessary for creating objects. To create a
    Java program (i.e., a .class file), you must create a .java file. A .java file
    is a readable text file, while a .class file is a binary file, which is a file
    containing Java bytecode that can be executed on the Java Virtual Machine (JVM),
    and that is produced by a Java compiler from the .java file.


    Tip


    You must compile source code. Source code is kept in files with a `.java` suffix,
    so your operating system’s file and directory path notation are appropriate. One
    executes a class. A class is an abstract concept in the language, so its dot-notation
    becomes appropriate (i.e., it is necessary to write a dot (.) after the name of
    the instance of a class followed by the method to be used). Keep this distinction
    in mind to help yourself remember when to use which notation.


    #### The Main Program


    The incantation `public static void main(...)` is used from within a public class
    to denote the entry point of a Java program. That declaration begins an executable
    method named `main`. You must specify one parameter that is an array of strings,
    and typically that parameter is defined as `String[] args`. When you execute the
    currently selected class, the JVM transfers control to the `main()` method, which
    makes a call to `System.out.println()` to show the Hello World message displayed
    in the command window.


    ## 1.4 Installing Eclipse


    ### Problem


    You want to install a reasonable IDE to use with it.


    ### Solution


    Install the Eclipse IDE to provide a more productive working environment.


    First, you need to download the package. Go to [www.​eclipse.​org/​downloads/​packages/​](http://www.eclipse.org/downloads/packages/)
    and click **Eclipse IDE for Java Developers**, as shown in Figure [1-4](#323910_4_En_1_Chapter.xhtml#Fig4).


    ![](images/323910_4_En_1_Chapter/323910_4_En_1_Fig4_HTML.jpg)


    Figure 1-4


    Downloading Eclipse


    The website suggests a mirror site for the download. The installation of Eclipse
    is very easy: expand the downloaded file in the root of your personal computer.
    When you execute Eclipse, it asks you to select a workspace. The workspace is
    the folder where Eclipse stores your development projects. Therefore, it makes
    sense to place it on a drive or in a directory that you back up regularly. Before
    clicking the OK button, select the **Use this as the default and do not ask again**
    check box. It makes your life easier. You can choose the root and use the `eclipse-workspace`
    default folder, which is the user’s home directory. The first time it executes,
    Eclipse displays a Welcome screen. To enter the screen where you do development,
    click the Workbench icon, as shown in Figure [1-5](#323910_4_En_1_Chapter.xhtml#Fig5).


    ![](images/323910_4_En_1_Chapter/323910_4_En_1_Fig5_HTML.jpg)


    Figure 1-5


    Eclipse–the Welcome screen


    The IDE is ready. You should see a workspace resembling the one in Figure [1-6](#323910_4_En_1_Chapter.xhtml#Fig6).


    ![](images/323910_4_En_1_Chapter/323910_4_En_1_Fig6_HTML.jpg)


    Figure 1-6


    Opening the Eclipse IDE


    Next, you need to tell Eclipse what version of JDK to use. In Windows OS, go to
    the Windows menu and select Preferences. Select Java and then Installed JREs.
    You see the dialog shown in Figure [1-7](#323910_4_En_1_Chapter.xhtml#Fig7). Click
    Edit and select the installed JDK.


    ![](images/323910_4_En_1_Chapter/323910_4_En_1_Fig7_HTML.jpg)


    Figure 1-7


    Eclipse–JDK configuration


    You can verify that Eclipse uses the correct JDK. Go to Help ➤ About Eclipse IDE
    and click the Installation Detail button. You can see the path and the name of
    the installed and used JDK, as shown in Figure [1-8](#323910_4_En_1_Chapter.xhtml#Fig8).


    ![](images/323910_4_En_1_Chapter/323910_4_En_1_Fig8_HTML.jpg)


    Figure 1-8


    Eclipse installation details'
