    allows multiple threads to modify the hash table concurrently and safely. `ConcurrentHashMap`
    is a hash table supporting full concurrency for retrievals and adjustable expected
    concurrency for updates. In the example, 1,000 threads make modifications to the
    map over a short period of time. The `ConcurrentHashMap` iterator, as well as
    streams that are generated on a `ConcurrentHashMap`, allows safe iteration over
    its contents. When using the `ConcurrentMap`’s iterator, you do not have to worry
    about locking the contents of the `ConcurrentMap` while iterating over it.


    ## 10.3 Inserting a Key into a Map Only If the Key Is Not Already Present


    ### Problem


    A map within your application is continuously updated, and you need to put a key/value
    pair into it if the key does not exist. Therefore, you need to check for the key’s
    presence, and you need assurance that some other thread doesn’t insert the same
    key in the meantime.


    ### Solution


    Using the `ConcurrentMap.putIfAbsent()` method, you can determine whether the
    map was modified atomically. For example, the following code uses this method
    to check and insert in a single step, thus avoiding the concurrency problem.


