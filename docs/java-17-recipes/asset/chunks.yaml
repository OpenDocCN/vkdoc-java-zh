- fmt: '# The field `oneValueForAllObjects` was set to `true` only for the class instance
    named `sd1`. Yet it is true, for instance, `sd2` also. This is because of the
    keyword `static` used in declaring that field. Static fields occur one time for
    all objects of their class. Moreover, the compiler in the IDE raises a warning
    about that. In fact, it should be used through `StaticDemo.oneValueForAllObjects`.


    ## How It Works


    Listing [1-6](#323910_4_En_1_Chapter.xhtml#PC27) illustrates the basic format
    of a variable declaration.


    ```

    type variable;

    ```


    It’s common to initialize variables when declaring them, so you often see the
    following.


    ```

    type variable = initialValue;

    ```


    Modifiers can precede field declarations. The following is an example.


    ```

    public static variable = initialValue;

    protected variable;

    private variable;

    ```


    It’s common to put the visibility modifier—`public`, `protected`, or `private`—first,
    but you are free to list the modifiers in any order you like. By default, if no
    modifier has been specified, the class or member is made package-private, meaning
    that only other classes within the package have access to the member.


    **Note**


    If a class member is specified as `protected`, then it is also package-private,
    except that any subclass of its class in another package also has access.


    The `String` type is special in Java. It’s a class type, but syntactically you
    can treat it as a primitive type. Java automatically creates a `String` object
    whenever you enclose a string of characters within double quotes (`"..."`). You
    aren’t required to invoke a constructor or specify the `new` keyword. Yet `String`
    is a class, and there are methods in that class that are available to you. One
    such method is the `replace()` method shown at the end of Listing [1-4](#323910_4_En_1_Chapter.xhtml#PC24).


    Strings are composed of characters. Java’s `char` type is a two-byte construct
    for storing a single character in Unicode’s UTF-16 encoding. You can generate
    literals of the `char` type in two ways.


    *   If a character is easy to type, enclose it within single quotes (e.g., `''G''`).

    *   Otherwise, specify the four-digit UTF-16 *code point* value prefaced by `\u`
    (e.g., `''\u0490''`).


    Some Unicode code points require five digits. These cannot be represented in a
    single `char` value. See Chapter [12](#323910_4_En_12_Chapter.xhtml) if you need
    more information on Unicode and internationalization.


    Avoid using any of the primitive types for monetary values. Especially avoid either
    of the floating-point types for that purpose. Refer instead to Chapter [12](#323910_4_En_12_Chapter.xhtml)
    and its recipe on using the Java Money API to calculate monetary amounts (Recipe
    12-10). `BigDecimal` can also be useful anytime you need accurate, fixed-decimal
    arithmetic.


    If you are new to Java, you may be unfamiliar with the `String[]` array notation,
    as demonstrated in the examples. Please see Chapter [7](#323910_4_En_7_Chapter.xhtml)
    for more information on arrays. It covers enumerations, arrays, and generic data
    types. Also in that chapter are examples showing how to write iterative code to
    work with collections of values such as an array.


    ## 1.9 Converting to and from a String


    ### Problem


    You have a value stored within a primitive data type, and you want to represent
    that value as a human-readable string. Or, you want to go in the other direction
    by converting a human-readable string into a primitive data type.


    ### Solution


    Follow one of the patterns from Listing [1-7](#323910_4_En_1_Chapter.xhtml#PC32).
    The listing shows the conversion from a string to a double-precision floating-point
    value and shows two methods for getting back to a string again.


    ```

    package org.java17recipes.chapter01.recipe01_09;

    public class StringConversion {

    public static void main (String[] args) {

    double pi;

    String strval;

    pi = Double.parseDouble("3.14");

    System.out.println(strval = String.valueOf(pi));

    System.out.println(Double.toString(pi));

    }

    }

    The output is 3.14.

    Listing 1-7

    General Pattern for String Conversions

    ```


    ### How It Works


    The solution illustrates some conversion patterns that work for all the primitive
    types. First, there is converting a floating-point number from its human-readable
    representation into the IEEE 754 format used by the Java language for floating-point
    arithmetic.


    ```

    pi = Double.parseDouble("3.14");

    ```


    Notice the pattern. You can replace `Double` with `Float` or `Long`, or whatever
    other type your target data type is. Each primitive type has a corresponding wrapper
    class by the same name but the initial letter is uppercase. The primitive type
    here is a `double`, and the corresponding wrapper is `Double`. The wrapper classes
    implement helper methods such as `Double.parseDouble()`, `Long.parseLong()`, `Boolean.parseBoolean()`,
    and so forth. These parse methods convert human-readable representations into
    values of the respective types.


    Going the other way, it is often easiest to invoke `String.valueOf()`. The `String`
    class implements this method, which is overloaded for each of the primitive data
    types. Alternatively, the wrapper classes also implement `toString()` methods
    that you can invoke to convert values of the underlying type into their human-readable
    forms. It’s your preference as to which approach to take.


    Conversions targeting the numeric types require some exception handling to be
    practical. You generally need to gracefully accommodate a case in which a character-string
    value is expected to be a valid numeric representation, but it’s not. Chapter
    [9](#323910_4_En_9_Chapter.xhtml) covers exception handling in detail, and the
    upcoming Recipe 1-10 provides a simple example to get you started.


    **Caution**


    Literals for the `Boolean` type are `"true"` and `"false"`. They are case-sensitive.
    Any value other than these two is silently interpreted as `false` when converting
    from a string using the `Boolean.parseBoolean()` conversion method.


