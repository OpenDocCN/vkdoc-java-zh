    ## 2.5 Pattern Matching for instanceof


    ### Problem


    你希望简化从对象中有条件地提取组件的操作。


    ### Solution


    Java 14 改进了该功能，使类型转换更加简洁。


    在以下示例中，前几行代表该功能的旧版本。


    ```

    public class InstanceOfExample {

    public static void main (String[] args) {

    Object selectedObject="I love Taranto";

    if (selectedObject instanceof String) {

    String selectedString = (String) selectedObject;

    System.out.println(selectedString.length());

    }

    if (selectedObject instanceof String selectedString) {

    System.out.println(selectedString.length());

    }

    }

    }

    ```


    ### How It Works


    此增强功能在 Java 14 中提出，并在 Java 16（JEP 394）中正式发布。它是一种可读性强且简洁的形式，改进了 `instanceof` 运算符的模式匹配。


    新版本提高了代码的可读性，避免了多次重复类型名称以及产生错误的可能性。


    有关 `instanceof` 运算符模式匹配的更多信息，请参阅文档：[https://openjdk.java.net/jeps/394](https://openjdk.java.net/jeps/394)。


    ## 2.6 Using Record


    ### Problem


    你希望声明具有简单管理主要和标准方法的类。


    ### Solution


    使用 `Record` 类，它可以高效地对类进行建模。以下是一个实体类的标准代码。


    ```

    public class Professor {

    private Integer id;

    private String name;

    private String surname;

    public Professor () {

    }

    public Integer getId() {

    return id;

    }

    public void setId(Integer id) {

    this.id = id;

    }

    public String getName() {

    return name;

    }

    public void setName(String name) {

    this.name = name;

    }

    public String getSurname() {

    return surname;

    }

    public void setSurname(String surname) {

    this.surname = surname;

    }

    }

    ```


    从 Java 14 开始，这个冗长的类可以定义如下。


    ```

    record Professor (Integer id, String name, String surname) {}

    ```


    因此，你可以简单地创建一个新的 `prof`。


    ```

    Professor prof = new Professor (1, "Luciano", "Manelli");

    ```


    而不是使用标准的旧方式。


    ```

    Professor prof = new Professor ();

    prof.setId(1);

    prof.setName("Luciano");

    prof.setSurname("Manelli");

    ```


    以下是主类。


    ```

    public class Main {

    public static void main (String[] args) {

    Professor prof = new Professor ();

    prof.setId(1);

    prof.setName("Luciano");

    prof.setSurname("Manelli");

    System.out.println("Prof "+prof.getId()+":"+prof.getName()+" "+prof.getSurname());

    record ProfessorRecord (Integer id, String name, String surname) {};

    ProfessorRecord profRecord = new ProfessorRecord (1, "Luciano", "Manelli");

    System.out.println("Prof using Record "+profRecord.id()+":"+profRecord.name()+"
    "+profRecord.surname());

    }

    }

    ```


    ### How It Works


    此增强功能在 Java 14 中提出，并在 Java 16（JEP 394）中成为标准特性。它通过提供一种紧凑的类声明语法来帮助开发者，避免了 Java 语言众所周知的冗长性。


    在某些情况下，保留数据的不可变性并创建 `equals`、`hashCode` 和 `toString` 方法非常有用。第一个方法验证当所有字段匹配同一类时对象的相等性。第二个方法在所有字段匹配时返回一个唯一的整数值。第三个方法返回一个由类名以及每个组件的名称和值派生出的字符串。


    有关 `Record` 类的更多信息，请参阅文档：[https://openjdk.java.net/jeps/395](https://openjdk.java.net/jeps/395)。


    ## 2.7 Restore Always-Strict Floating-Point Semantics


    ### Problem


    你希望确保浮点数在每个平台上具有相同的精度和结果。


    ### Solution


    Java 17 恢复了默认的始终严格功能，使浮点运算统一严格。因此，你可以确保平台无关的浮点计算；例如，以下是旧版本。


    ```

    strictfp class  AppliedClass{}//strict floating point applied on class

    strictfp interface AppliedInterface{}// strict floating point applied on interface

    ```


    而新版本则简单如下。


    ```

    class AppliedClass{}//strictfp applied on class

    interface AppliedInterface{}//strictfp applied on interface

    ```


    以下是一个示例。


    ```

    public strictfp class SumFPnumbersStrict {

    public double sumNumbers(double fpOne, double fpTwo) {

    return fpOne + fpTwo;

    }

    ```


    它变成了以下形式。


    ```

    public class sumFPnumbers {

    public double SumNumbers(double fpOne, double fpTwo) {

    return fpOne + fpTwo;

    }

    ```


    以下是主类的一个示例。


    ```

    public class Main {

    public static void main (String[] args) {

    SumFPnumbers sn = new SumFPnumbers ();

    System.out.println("SUM :  "+sn.sumNumbers(1.2,3.4));

    SumFPnumbersStrict sns = new SumFPnumbersStrict();

    System.out.println("SUM :  "+sns.sumNumbers(1.2,3.4));

    }

    }

    ```


    ### How It Works


    在 Java 17 之前，浮点计算是平台相关的（即依赖于硬件）。此增强功能有助于避免 `strictfp` 行为，并使所有浮点运算统一严格。使用 `strictfp`
    的现有 Java 代码可以在不使用该修饰符的情况下使用。


    有关浮点数的更多信息，请参阅文档：[https://openjdk.java.net/jeps/306](https://openjdk.java.net/jeps/306)。


    ## 2.8 Pseudorandom Number Generators


    ### Problem


    你希望生成随机数。


    ### Solution


    Java 17 通过为伪随机数生成器（PRNG）提供新的接口类型和实现，并保留 `java.util.Random` 类的先前行为，改进了该功能。


    一个创建伪随机整数的示例如下。


    ```

    import java.util.random.RandomGenerator;

    import java.util.Random;

    public class UseNewPRNGs implements RandomGenerator {

    static UseNewPRNGs testGen = new UseNewPRNGs();

    public static void main(String[] args){

    for (int i = 0; i < 5; i++) {

    System.out.println(testGen.nextBoolean());

    System.out.println(testGen.nextDouble());

    System.out.println(testGen.nextInt());

    System.out.println(testGen.nextLong());

    }

    }

    @Override

    public long nextLong() {

    //Returns a pseudorandomly chosen long value.

    Random r= new Random();

    return r.nextLong();

    }

    }

    ```


    以下是输出结果。


    ```

    false

    0.4134883035327678


    true

    0.37651481128199904


    true

    0.8508900370304876


    true

    0.10116382711133465


    false

    0.01988848947697064


    ```


    ### How It Works


    Java 17 提供了一个新接口 `RandomGenerator`，它为所有现有和新的 PRNG 提供了统一的 API。它具有默认方法，在上述代码中仅重写了
    `nextLong` 方法。它为生成随机或伪随机数字或布尔值序列的对象提供了通用协议。此增强功能主要旨在使各种 PRNG 算法在应用程序中可互换使用，并保留
    `java.util.Random` 类的现有行为。


    有关 PRNG 的更多信息，请参阅文档：[https://openjdk.java.net/jeps/356](https://openjdk.java.net/jeps/356)。


