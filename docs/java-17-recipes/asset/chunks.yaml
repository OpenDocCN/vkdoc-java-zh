  raw: '### Solution 2


    Create a class that extends `java.lang.Exception` to generate a checked exception
    class. A checked exception is required to be caught or rethrown up the stack.
    In the following example, a class identified as `ConnectionUnavailableException`
    extends `java.lang.Exception` and accepts a string as an argument to the constructor.
    The checked exception is then thrown by a method in the code.


    ```

    class ConnectionUnavailableException extends Exception {

    ConnectionUnavailableException(String message) {

    super(message);

    }

    }

    private void sendChat(String chatMessage) throws ConnectionUnavailableException
    {

    if (chatServer == null)

    throw new ConnectionUnavailableException("Can''t find the chat server");

    }

    ```


    The main method is as follows.


    ```

    Object chatServer = null;

    public static void main (String[] args) {

    Recipe9_7 recipe = new Recipe9_7();

    recipe.start();

    }

    private void start() {

    try {

    sendChat("Hello, how are you?");

    } catch (ConnectionUnavailableException e) {

    System.out.println("Caught a connection unavailable Exception!");

    }

    disconnectChatServer(chatServer);

    }

    ```


    ### How It Works


    Sometimes there is a requirement to create a custom exception, especially when
    creating an API. The usual recommendation is to use one of the available `Exception`
    classes provided by the JDK. For example, use `IOException` for I/O-related issues
    or `IllegalArgumentException` for illegal parameters. If there isn’t a JDK exception
    that fits cleanly, you can always extend `java.lang.Exception` or `java.lang.RuntimeException`
    and implement its own family of exceptions.


    Depending on the base class, creating an `Exception` class is fairly straightforward.
    Extending `RuntimeException` allows you to throw the resulting exception any time
    without requiring it to be caught up in the stack. This is advantageous in that
    `RuntimeException` is a more lax contract to work with, but throwing such an exception
    can lead to thread termination if the exception is not caught. Extending `Exception`
    instead allows you to force any code that throws the exception to handle it within
    a `catch` clause. The checked exception is then forced by contract to implement
    a `catch` handler, potentially avoiding a thread termination.


    In practice, we discourage extending `RuntimeException` because it can lead to
    poor exception handling. Our rule of thumb is that if it’s possible to recover
    from an exception, you should create the associated exception class by extending
    `Exception`. If a developer cannot reasonably recover from the exception (i.e.,
    `NullPointerException`), extend `RuntimeException`.


    ## 9.8 Logging Events Within Your Application


    ### Problem


    You want to log events, debug messages, error conditions, and other events within
    your application.


    ### Solution


    Utilize the Java Logging API within your application to implement a logging solution.
    The following example first creates a logger object named `recipeLogger`. In this
    example, the Java Logger logs an informational message, a warning message, and
    an error message.


    ```

    private void loadLoggingConfiguration() {

    FileInputStream ins = null;

    try {

    ins = new FileInputStream(new File("logging.properties"));

    LogManager.getLogManager().readConfiguration(ins);

    } catch (IOException e) {

    e.printStackTrace();

    }

    }

    private void start() {

    loadLoggingConfiguration();

    Logger logger = Logger.getLogger("recipeLogger");

    logger.info("Logging for the first Time!");

    logger.warn("A warning to be had");

    logger. severe ("This is an error!");

    }

    public static void main (String[] args) {

    Recipe9_8 recipe = new Recipe9_8();

    recipe.start();

    }

    ```


    The following output is defined in the `logging.properties` file .


    ```

    dic 02, 2021 10:27:38 PM org.java17recipes.chapter09.recipe09_08.Recipe9_8 start

    INFO: Logging for the first Time!

    dic 02, 2021 10:27:38 PM org.java17recipes.chapter09.recipe09_08.Recipe9_8 start

    WARNING: A warning to be had

    dic 02, 2021 10:27:38 PM org.java17recipes.chapter09.recipe09_08.Recipe9_8 start

    SEVERE: This is an error!

    ```


    Use the default properties file of the JDK in the conf folder and copy it in your
    project folder.


    The following is the `logging.propertie`s file in the main folder of the project.


    ```

    handlers = java.util.logging.FileHandler

    recipeLogger.level=INFO

    .level=ALL

    java.util.logging.FileHandler.formatter=java.util.logging.SimpleFormatter

    java.util.logging.FileHandler.pattern=LogApplication%g.log

    java.util.logging.FileHandler.limit=50000

    java.util.logging.FileHandler.count=4

    ```


    ### How It Works


    In the example, `loadLoggingConfiguration()` function opens a stream to the `logging.properties`
    file and passes it to `java.util.logging.LogManager()`. Doing so configures the
    `java.util.logging` framework to use the settings specified in the `logging.properties`
    file. Then, within the start method of the solution, the code acquires a `logger`
    object named `recipeLogger`. The example proceeds to log messages through `recipeLogger`.


    Note


    The `java.util.logging` framework is configured by the properties log file.


    ## 9.9 Rotating and Purging Logs


    ### Problem


    You have started to log information, but the information logged continues growing
    out of control. You would like to keep only the last 250 KB worth of log entries
    within your log files.


    ### Solution


    Use `java.util.logging` to configure rolling logs. In this example, a logger named
    `recipeLogger` logs many messages. The output produces rolled log files with the
    most recent logged information in the important `Log0.log` file.


    ```

    public static void main (String[] args) throws IOException {

    Recipe9_9 recipe = new Recipe9_9();

    recipe.start();

    }

    private void start() {

    loadLoggingConfiguration();

    Logger logger = LoggerFactory.getLogger("recipeLogger");

    logger.info("Logging for the first Time!");

    logger.warn("A warning to be had");

    logger.severe("This is an error!");

    Logger rollingLogger = Logger.getLogger("rollingLogger");

    for (int i =0;i < 5000;i++) {

    rollingLogger.info("Logging for an event with :"+i);

    }

    }

    private void loadLoggingConfiguration() {

    FileInputStream ins = null;

    try {

    ins = new FileInputStream(new File("logging.properties"));

    LogManager.getLogManager().readConfiguration(ins);

    } catch (IOException e) {

    e.printStackTrace();

    }

    }

    ```


    The following is the `logging.properties` file in the main folder of the project.


    ```

    handlers = java.util.logging.FileHandler

    recipeLogger.level=INFO

    .level=ALL

    java.util.logging.FileHandler.formatter=java.util.logging.SimpleFormatter

    java.util.logging.FileHandler.pattern=LogApplication%g.log

    java.util.logging.FileHandler.limit=50000

    java.util.logging.FileHandler.count=4

    ```'
