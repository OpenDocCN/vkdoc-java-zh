  trans: "\n如你所见，路径 `search/node/jdk8` 是相对于名为 `url1` 的 URL 的。最终，`url2` 对象的人类可读格式表示为\
    \ [`http://www.java.net/search/node/jdk8`](http://www.java.net/search/node/jdk8)。还有几个用于创建\
    \ URL 对象的构造函数，它们接受两个以上的参数。这些构造函数如下所示。\n\n```\nnew URL (String protocol, String\
    \ host, String port, String path);\nnew URL (String protocol, String host, String\
    \ path);\n```\n\n在解决方案中，演示了这两个构造函数中的第二个。资源的协议、主机名和路径被传递给构造函数以创建 `url3` 对象。当你动态生成\
    \ URL 时，这最后两个构造函数通常最有用。\n\n16.5 解析 URL\n\n问题\n你希望以编程方式从 URL 中为你的应用程序收集信息。\n\n\
    解决方案\n\n使用内置的 URL 类方法解析 URL。在下面名为 `ParseUrl` 的示例类中，创建了一个 URL 对象，然后使用内置的 URL 类方法对其进行解析，以收集有关该\
    \ URL 的信息。从 URL 检索到信息后，它会将其打印到命令行并创建另一个 URL。\n\n```\nimport java.net.MalformedURLException;\n\
    import java.net.URL;\npublic static void main(String[] args) {\nURL url1 = null;\n\
    try {\n// 生成绝对 URL\nurl1 = new URL(\"https://link.springer.com/search?query=Manelli+Java\"\
    );\nString host = url1.getHost();\nString path = url1.getPath();\nString query\
    \ = url1.getQuery();\nString protocol = url1.getProtocol();\nString authority\
    \ = url1.getAuthority();\nString ref = url1.getRef();\nSystem.out.println(\"URL\
    \ \" + url1.toString() + \" 解析结果如下：\\n\");\nSystem.out.println(\"主机: \" + host\
    \ + \"\\n\");\nSystem.out.println(\"路径: \" + path + \"\\n\");\nSystem.out.println(\"\
    查询: \" + query + \"\\n\");\nSystem.out.println(\"协议: \" + protocol + \"\\n\");\n\
    System.out.println(\"权限: \" + authority + \"\\n\");\nSystem.out.println(\"引用:\
    \ \" + ref + \"\\n\");\n} catch (IOException ex) {\nex.printStackTrace();\n}\n\
    }\n```\n\n当此代码执行时，将显示以下行。\n\n```\nThe URL https://link.springer.com/search?query=Manelli+Java\
    \ parses to the following:\nHost: link.springer.com\nPath: /search\nQuery: query=Manelli+Java\n\
    Protocol: https\nAuthority: link.springer.com\nReference: null\n```\n\n工作原理\n\n\
    在应用程序中构造和使用 URL 时，有时提取与 URL 相关的信息会很有用。使用内置的 URL 类方法可以轻松完成此操作，这些方法可以调用给定的 URL 并返回信息字符串。表\
    \ 16-1 解释了 URL 类中可用于获取信息的访问器方法。\n\n表 16-1\n用于查询 URL 的访问器方法\n\n方法 |\n 返回的 URL 信息\
    \ |\n\n| --- | --- | --- | --- | --- |\n\n`getAuthority()` |\n 权限组件 |\n\n`getFile()`\
    \ |\n 文件名组件 |\n\n`getHost()` |\n 主机名组件 |\n\n`getPath()` |\n 路径组件 |\n\n`getProtocol()`\
    \ |\n 协议标识符组件 |\n\n`getRef()` |\n 引用组件 |\n\n`getQuery()` |\n 查询组件 |\n\n这些访问器方法中的每一个都返回一个字符串值，该值可用于提供信息或像示例中那样动态构造其他\
    \ URL。如果你查看本解决方案的结果，可以看到通过表 16-1 中列出的访问器方法获得的关于该 URL 的信息。大多数访问器方法都是不言自明的。然而，其中几个可能需要进一步解释。`getFile()`\
    \ 方法返回 URL 的文件名。文件名等同于将 `getPath()` 返回的值与 `getQuery()` 返回的值连接起来。`getRef()` 方法可能不太直观。通过调用\
    \ `getRef()` 方法返回的引用组件指的是可能附加到 URL 末尾的“片段”。例如，片段使用井号（`#`）后跟一个通常对应于特定网页上某个子部分的字符串来表示。给定如下\
    \ URL，使用 `getRef()` 方法将返回 `recipe16_6`。\n\n```\nhttp://www.java17recipes.org/chapters/chapter16#recipe16_6\n\
    ```\n\n虽然并非总是需要，但解析 URL 以获取信息的能力有时会非常方便。由于 Java 语言在 `java.net.URL` 类中内置了辅助方法，这使得收集\
    \ URL 信息变得轻而易举。\n\n16.6 小结\n本章介绍了 Java 语言中一些强大且易于使用的基本网络特性，从使用套接字连接和 URL 到通过 `DatagramChannel`\
    \ 类广播消息。\n\n索引\n\nA, B\n\n自动资源管理 (ARM)\n\nC\n\n捕获异常\n\n集合类型\n\nalertListLegacy()\
    \ 方法\n\n数组\n\n具体参数化类型\n\n菱形运算符\n\n动态数组\n\n枚举类型\n\nequals() 方法\n\n外部迭代\n\nFieldType\
