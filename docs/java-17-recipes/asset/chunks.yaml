    # 9. 异常与日志


    异常是描述程序中特殊情况的一种方式。它们表明发生了意外（异常）情况。因此，异常能有效地中断当前程序流程，并提示有需要关注的问题。正因如此，合理使用异常的程序能获得更好的控制流，变得更健壮，并为用户提供更多信息。即便如此，不加区分地使用异常可能会导致性能下降。


    在 Java 中，异常可以被*抛出*或*捕获*。抛出异常意味着向代码指示遇到了异常，使用 `throw` 关键字通知 JVM 在当前栈中寻找能够处理此异常情况的代码。捕获异常则是告诉编译器哪些异常可以被处理，以及应该监控代码的哪一部分以捕获这些异常。这通过
    Java 的 `try`/`catch` 块（如配方 9-1 所述）来表示。


    所有异常都继承自 `Throwable` 类，并且可以在 `try`/`catch` 语句的 `catch` 子句中定义。JVM 主要使用 `Error`
    类来表示严重和/或致命的错误。根据 Java 文档，应用程序不应捕获 `Error` 异常，因为它们被认为是致命的（可以想象成计算机着火了）。Java 程序中的大多数异常都继承自
    `Exception` 类。


    在 JVM 中，有两种类型的异常：受检异常和非受检异常。方法强制要求受检异常。你可以在方法签名中指定该方法可能抛出的异常。这要求该方法的任何调用者都必须创建一个
    `try`/`catch` 块来处理方法签名中声明的异常。非受检异常不需要严格的约定，可以在任何地方自由抛出，而无需实现 `try`/`catch` 块。即便如此，通常不鼓励使用非受检异常（如配方
    9-7 所述），因为它们可能导致线程崩溃（如果没有捕获到异常）以及问题可见性差。继承自 `RuntimeException` 的异常类被视为非受检异常，而直接继承自
    `Exception` 的异常类则被视为受检异常。


    请注意，抛出异常的操作开销很大（与其他语言结构替代方案相比），因此，用异常来代替控制流是一种糟糕的做法。例如，你不应该抛出异常来表示方法调用的预期结果（例如，像
    `isUsernameValid(String username)` 这样的方法）。更好的做法是调用该方法并返回一个布尔值作为结果，而不是抛出 `InvalidUsernameException`
    来表示失败。


    虽然异常在可靠的软件开发中扮演着重要角色，但记录异常也同样重要。应用程序中的日志记录有助于开发人员在不调试代码的情况下了解发生了哪些事件。这在无法进行实时调试的生产环境中尤其如此。从这个意义上说，日志记录收集了关于正在发生的事情（很可能是出了什么问题）的线索，并帮助你排查生产问题。许多开发人员使用结构化的日志框架来为应用程序提供更健壮的日志记录。一个可靠的日志框架配合扎实的方法论，可以省去许多深夜加班思考“到底发生了什么？”的烦恼。


    Java 的日志记录非常成熟。许多开源项目被广泛接受为日志记录的事实标准。在本章的配方中，你将使用 Java 的 Logback 框架和 Java 简单日志门面（SLF4J）。这两个项目共同为大多数日志记录需求提供了一个足够好的解决方案。对于涉及
    SLF4J 和 Log4j 的配方，请下载 SLF4J（[`www.slf4j.org`](http://www.slf4j.org)）并将其放入项目的依赖路径中。本章还会涉及
    Java 9 中新增的低级别 JVM 日志记录。


    ## 9.1 捕获异常


    ### 问题


    你希望优雅地处理代码中产生的任何异常。


    ### 解决方案


    使用内置的 `try`/`catch` 语言结构来 `catch`（捕获）异常。具体做法是将任何可能抛出异常的代码块包裹在 `try/catch` 块中。下面的示例生成一个布尔值，用于指示指定字符串的长度是否大于五个字符。如果作为参数传入的字符串是
    `null`，则 `length()` 方法会抛出 `NullPointerException`（`RuntimeException` 类型），并在 `catch`
    块中被捕获。


    ```

    public class Recipe9_1 {

    public static void main(String[] args) {

    Recipe9_1 recipe = new Recipe9_1();

    recipe.start();

    }

    private void start() {

    System.out.println("字符串 1234 长度是否大于 5 个字符？:"+

    isStringShorterThanFiveCharacters("1234"));

    System.out.println("字符串 12345 长度是否大于 5 个字符？:"+

    isStringShorterThanFiveCharacters("12345"));

    System.out.println("字符串 123456 长度是否大于 5 个字符？:"+

    isStringShorterThanFiveCharacters("123456"));

    System.out.println("字符串 null 长度是否大于 5 个字符？:"+

    isStringShorterThanFiveCharacters(null));

    }

    private boolean isStringShorterThanFiveCharacters(String aString) {

    try {

    return aString.length() > 5;

    } catch (NullPointerException e) {

    System.err.println("发生异常：" + e);

    return false;

    }

    }

    }

    ```


    ### 工作原理


    `try` 关键字指定了被包含的代码段可能引发异常。`catch` 子句放在 `try` 子句的末尾。每个 `catch` 子句指定了要捕获的异常。如果没有为受检异常提供
    `catch` 子句，编译器会生成错误。两种可能的解决方案是：添加一个 `catch` 子句，或者将异常包含在封闭方法的 `throws` 子句中。任何被抛出但未被捕获的受检异常都会沿着调用栈向上传播。如果此方法没有捕获该异常，执行该代码的线程将终止。如果该线程是程序中唯一的线程，则程序将终止执行。


    如果一个 `try` 子句需要捕获多个异常，可以指定多个异常，用竖线字符分隔。例如，以下 `try/catch` 块可用于同时捕获 `NumberFormatException`（一种
    `RuntimeException` 类型）和 `NullPointerException`。


    ```

    try {

    // 此处代码

    } catch (NumberFormatException|NullPointerException ex) {

    // 日志记录

    }

    ```


    注意


    抛出异常时要小心。如果抛出的异常未被捕获，它会沿着调用栈向上传播；如果没有能够处理该异常的 `catch` 子句，它将导致运行中的线程终止（也称为*崩溃*）。如果你的程序只有一个主线程，未捕获的异常将终止你的程序。


    ## 9.2 确保代码块被执行


    ### 问题


    你希望编写一段代码，当控制权离开某个代码段时（即使是因为抛出错误或代码段异常终止而离开），这段代码也能执行。例如，你获取了一个锁，并希望确保能正确地释放它。你希望在发生错误或没有错误的情况下都能释放该锁。

