    \ `T` is the element type of the collection to be iterated. Implement the `iterator()`\
    \ method to return the `Iterator<E>` object from this collection. The example\
    \ for this recipe is the `StockPortfolio` class. Internally, `StockPortfolio`\
    \ manages a collection of `Stock` objects. We want users of our class to treat\
    \ `StockPortfolio` objects as iterable objects using a `foreach` statement. The\
    \ `StockPortfolio` class follows.\n\n```\npublic class StockPortfolio implements\
