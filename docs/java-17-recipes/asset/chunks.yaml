    Utilize the `Collections.sort()` method, passing the list to sort along with a
    lambda expression that performs the comparisons on the list elements. The following
    code demonstrates how to accomplish this task using the `Collections.sort()` technique.


    ```

    public static void main(String[] args) {

    loadTeam();

    Collections.sort(team, (p1, p2)

    -> p1.getLastName().compareTo(p2.getLastName()));

    team.stream().forEach((p) -> {

    System.out.println(p.getLastName());

    });

    ```


    The following is the result.


    ```

    == Sort by Last Name ==

    Adams

    Gennick

    Java

    Juneau

    Smith

    ```


    Where the function `loadTeam` is:


    ```

    public class Sorter {

    static List team;

    private static void loadTeam() {

    System.out.println("Loading team...");

    team = new ArrayList();

    Player player1 = new Player();

    player1.setFirstName("Josh");

    player1.setLastName("Juneau");

    player1.setGoals(5);

    Player player2 = new Player();

    player2.setFirstName("Duke");

    player2.setLastName("Java");

    player2.setGoals(15);

    Player player3 = new Player();

    player3.setFirstName("Jonathan");

    player3.setLastName("Gennick");

    player3.setGoals(1);

    Player player4 = new Player();

    player4.setFirstName("Bob");

    player4.setLastName("Smith");

    player4.setGoals(18);

    Player player5 = new Player();

    player5.setFirstName("Steve");

    player5.setLastName("Adams");

    player5.setGoals(7);

    team.add(player1);

    team.add(player2);

    team.add(player3);

    team.add(player4);

    team.add(player5);

    }

    ...

    }

    ```


    ### How It Works


    Java 8 introduced new features that greatly increase developer productivity for
    sorting collections. Three features are demonstrated in the solution to this recipe:
    lambda expressions, method references, and streams. We look into streams in more
    detail within other recipes in this book, but we also briefly describe them here
    to help you understand this recipe. Streams can be applied to data collections,
    and they allow enhanced functional-style operations to be applied to the elements
    within the collections. Streams do not store any data; rather, they enable more
    functionality on the collections obtained from them.


    In solution 1, a comparator is generated, by which the `Player` objects are evaluated
    for the number of goals scored (`getGoals`). A stream is then generated from a
    `List<Player>` that is referenced as a team. The stream provides the `sorted()`
    function, which accepts a comparator to perform a sort on a stream of data. The
    comparator that was initially generated is passed to the `sorted()` function,
    and then the `map()` function is called on the result. The `map()` function can
    apply an expression to each element within the stream. Therefore, within the map,
    this solution utilizes a lambda expression to create a string that contains each
    `Player` object’s `firstName`, `lastName`, and `goals` fields. Lastly, since `List<Player>`
    is iterable, it contains the `forEach()` method. The `forEach()` method enables
    an expression or group of statements to be applied to each element within the
    list. In this case, each element in the list is printed to the command line. Since
    the `map()` function was applied to the stream, each element in the list is subsequently
    printed per the algorithm applied within `map()`. The result is that the players’
    first and last names and the number of goals each has scored are printed on the
    command line.


    Solution 2 uses a different technique to accomplish a similar task. The `Collections.sort()`
    method is invoked on the list. The first argument to `Collections.sort()` is the
    list itself, and the second argument is the comparison implementation in the form
    of a lambda expression. The lambda expression, in this case, has two parameters
    passed to it, both `Player` objects, and it compares the last name of the first
    player to the last name of the second player. Therefore, the sort is performed
    on the `lastName` field of the `Player` object, in ascending order. To finish
    solution 2, the sorted list is printed out. To do this, a stream is generated
    from the sorted list, and the `forEach()` method is then invoked on the stream
    of data, printing out each player’s last name.


    ## 6.5 Filtering a Collection of Data


    ### Problem


    You have a list of data to which you’d like to apply some filtering so that you
    can extract objects meeting the specified criteria.


    ### Solution


    Create a stream from the list of data and apply a filter, passing the desired
    predicate, otherwise known as a *conditional expression*. Finally, add each object
    matching the specified filter criteria to a new list. In the following example,
    a list of `Player` objects is being filtered to capture only those players who
    have scored ten or more goals.


    ```

    public static void main(String[] args){

    loadTeam();

    // Create Array to store the matching results

    List gteTenGoals = new ArrayList();

    team.stream().filter(

    p -> p.getGoals() >= 10

    && p.getStatus() == 0)

    .forEach(element -> gteTenGoals.add(element));

    System.out.println("Number of Players Matching Criteria: " + gteTenGoals.size());

    ```


    Where the function `loadTeam` is:


    ```

    public class Filter {

    static List team;

    private static void loadTeam() {

    System.out.println("Loading team...");

    team = new ArrayList();

    Player player1 = new Player();

    player1.setFirstName("Josh");

    player1.setLastName("Juneau");

    player1.setGoals(5);

    player1.setStatus(0);

    Player player2 = new Player();

    player2.setFirstName("Duke");

    player2.setLastName("Java");

    player2.setGoals(15);

    player2.setStatus(0);

    Player player3 = new Player();

    player3.setFirstName("Jonathan");

    player3.setLastName("Gennick");

    player3.setGoals(1);

    player3.setStatus(0);

    Player player4 = new Player();

    player4.setFirstName("Bob");

    player4.setLastName("Smith");

    player4.setGoals(18);

    player4.setStatus(0);

    Player player5 = new Player();

    player5.setFirstName("Steve");

    player5.setLastName("Adams");

    player5.setGoals(7);

    player5.setStatus(1);

    team.add(player1);

    team.add(player2);

    team.add(player3);

    team.add(player4);

    team.add(player5);

    }

    ```


    ### How It Works


    The solution to this recipe makes use of a data stream since it contains an easy-to-use
    filter function. The collection of data, `team`, generates a stream, and then
    the filter function is called on it, accepting a predicate to filter the data
    within the collection. The predicate is written as a lambda expression that contains
    two such filtering criteria. The lambda expression passes a `Player` object as
    an argument and then filters the data based on the number of goals greater than
    or equal to ten and an active status.


    Once the data has been filtered, the `forEach()` method adds each element that
    meets the filtering criteria to a list. This is also done using a lambda expression.
    The element added to the list is passed to the lambda expression as an argument
    and subsequently added to the list within the body of the expression.


    Lambda expressions are very well suited for working within stream functions. Not
    only do they enable easier development of business logic, but they also make collections
    filtering easier to read and maintain.


