- fmt: '# 7.6 Working with Dynamic Arrays


    ## Problem


    You need a flexible data structure that can store a variable amount of data and
    allow for easy insertion and deletion of data.


    ## Solution


    Consider using an `ArrayList<E>`. The following example code is the `StockScreener`
    class, which allows you to screen a list of stocks or a single stock based on
    a specific screen parameter (`P/E`, `Yield`, and `Beta`) and screen value. The
    class uses an `ArrayList<E>` for containing stock strings. An example screen might
    be “Tell me which of the stocks in this list has a P/E (price-to-earnings ratio)
    of 15 or less.” Don’t worry if you’re not familiar with these stock market terms.
    Whatever you do, don’t use this class to make your stock investment decisions!


    ```

    public class StockScreener {

    enum Screen { PE, YIELD, BETA };

    public static boolean screen(String stock, Screen screen, double threshold) {

    double screenVal = 0;

    boolean pass = false;

    switch (screen) {

    case PE:

    screenVal = Math.random() * 25;

    pass = screenVal = threshold;

    break;

    case BETA:

    screenVal = Math.random() * 2;

    pass = screenVal  stocks, Screen screen, double threshold) {

    Iterator iter = stocks.iterator();

    while (iter.hasNext()) {

    String stock = iter.next();

    if (!screen(stock, screen, threshold)) {

    iter.remove();

    }

    }

    }

    public static void main(String[] args) {

    List stocks = new ArrayList();

    stocks.add("ORCL");

    stocks.add("AAPL");

    stocks.add("GOOG");

    stocks.add("IBM");

    stocks.add("MCD");

    System.out.println("Screening stocks: " + stocks);

    if (stocks.contains("GOOG") &&

    !screen("GOOG", Screen.BETA, 1.1)) {

    stocks.remove("GOOG");

    }

    System.out.println("First screen: " + stocks);

    StockScreener.screen(stocks, Screen.YIELD, 3.5);

    System.out.println("Second screen: " + stocks);

    StockScreener.screen(stocks, Screen.PE, 22);

    System.out.println("Third screen: " + stocks);

    System.out.println("Buy List: " + stocks);

    }

    }

    ```


    The output from running this code varies because it randomly assigns a stock’s
    screen result value. Here is one sample of output from running the class.


    ```

    Screening stocks: [ORCL, AAPL, GOOG, IBM, MCD]

    GOOG: BETA = 1.9223516769748348

    First screen: [ORCL, AAPL, IBM, MCD]

    ORCL: YIELD = 6.140018494585904

    AAPL: YIELD = 7.875759429097191

    IBM: YIELD = 7.715436753622726

    MCD: YIELD = 2.419792753509281

    Second screen: [ORCL, AAPL, IBM]

    ORCL: PE = 4.396013965331994

    AAPL: PE = 14.200385457743778

    IBM: PE = 7.6981860501796175

    Third screen: [ORCL, AAPL, IBM]

    Buy List: [ORCL, AAPL, IBM]

    ```


    ## How It Works


    The `ArrayList<E>` is one of the most often used classes in the Java collections
    framework. The `ArrayList<E>` class implements the `List<E>` interface, which,
    in turn, implements the `Collection<E>` interface. The `Collection<E>` interface
    defines the set of common operations for all collection types, and the `List<E>`
    interface defines the set of operations that are specific to the list-oriented
    `Collection<E>` types. The collections framework makes heavy use of Java generics.


    The `StockScreener main()` method starts by declaring a `List<E>` of stocks, and
    specifying with the generic type parameter, that the stocks list elements are
    of type `String`. Notice that the actual list type is an `ArrayList<E>` created
    using the diamond. The stocks list holds a variable number of stocks, represented
    by their stock market symbol (a string).


    ```

    List stocks = new ArrayList();

    ```


    Now that you’ve specified that the stocks list can only hold strings, all the
    `List<E>` methods, in turn, get parameterized to only allow strings. So, next,
    the code makes several calls to the `ArrayList<E>`’s `add(String)` method to add
    the stocks to the list. After that, a screen is run on GOOG (Google) based on
    its beta (a measure of stock risk); if it does not pass the screen, the `List
    remove(String)` method is called to remove the stock from the stock list. Two
    more screens are then run on the entire stock list to get a list of stocks with
    a P/E of 22.0 or less and a yield of 3.5% or more. The `screen()` method used
    for these screens takes a parameter of type `List<String>`. It has to iterate
    the list, run the screen for each stock, and remove those stocks that do not pass
    the screen. Note that to safely remove an element from a `Collection<E>` while
    iterating over it, you must use iterate using the `Collection<E>`’s `Iterator<E>`,
    which can be obtained by calling its `iterator()` method. Here, we show the use
    of a `while` loop to iterate the stocks list (a `for` loop could similarly be
    used). As long as you’re not to the end of the list (`iter.hasNext()`), you can
    get the next stock from the list (`iter.next()`), run the screen, and remove the
    element from the list (`iter.remove()`) if the screen didn’t pass.


    **Note**


    You may find that calling the list’s `remove()` method while iterating the list
    seems to work. The problem is that it’s not guaranteed to work and produce unexpected
    results. At some point, the code also throws `ConcurrentModificationException`,
    regardless of whether you have multiple threads accessing the same list. Remember
    to always remove elements through the iterator when iterating over any `Collection<E>`.


    The `ArrayList<E>` is a very useful data structure that should normally be used
    in place of the array type. It provides more flexibility than a simple array because
    elements can be added and removed dynamically with ease. While it is true that
    `ArrayList<E>` uses an array internally, you benefit from optimized `add()` and
    `remove()` operations that are implemented for you. Also, `ArrayList<E>` implements
    many other very useful methods.


    Refer to Java documentation for more information (`https://docs.oracle.com/en/java/javase/17/docs/api/java.base/java/util/ArrayList.html`).


    # 7.7 Making Your Objects Iterable


    ## Problem


    You have created a custom collection–based class that wraps (instead of extends)
    the underlying collection type. Without exposing the internal implementation details
    of your class, you want objects of your class to become iterable, especially with
    the use of a `foreach` statement.'
