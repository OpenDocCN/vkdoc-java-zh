    0.4134883035327678


    true

    0.37651481128199904


    true

    0.8508900370304876


    true

    0.10116382711133465


    false

    0.01988848947697064


    ```


    ### 工作原理


    Java 17 提供了一个新接口 `RandomGenerator`，它为所有现有和新的 PRNG 提供了统一的 API。它具有默认方法，在前面的代码中只重写了
    `nextLong` 方法。它为生成随机或伪随机数字或布尔值序列的对象提供了通用协议。此增强功能主要旨在使各种 PRNG 算法在应用程序中可互换使用，并保留
    `java.util.Random` 类的现有行为。


    有关 PRNG 的更多信息，请参阅文档 [`​openjdk.​java.​net/​jeps/​356`](https://openjdk.java.net/jeps/356)。


