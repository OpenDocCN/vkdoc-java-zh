    \n![](images/323910_4_En_13_Chapter/323910_4_En_13_Fig13_HTML.jpg)\n\nFigure 13-13\
    \  \nEclipse—the output of the first project\n\nIt might seem very convenient\
    \ that Eclipse can launch Tomcat and show the output within the Workbench. In\
    \ practice, though, it has a couple of drawbacks. First, the space available in\
