    Set your `Connection` object autocommit to false and perform the transactions
    you want to complete. Once you’ve successfully performed each of the transactions,
    manually commit the `Connection` object; otherwise, roll back each of the transactions
    that have taken place. The following code example demonstrates transaction management.
    If you look at the `main()` method of the `TransactionExample` class, you see
    that the `Connection` object’s `autoCommit()` preference has been set to false
    so that database statements are grouped together to form one transaction. If all
    the statements within the transaction are successful, the `Connection` object
    is manually committed by calling the `commit()` method; otherwise, all the statements
    are rolled back by calling the `rollback()` method. By default, `autoCommit` is
    set to true, which automatically treats every statement as a single transaction.


    ```

    import java.sql.Connection;

    import java.sql.PreparedStatement;

    import java.sql.ResultSet;

    import java.sql.SQLException;

    import org.java17recipes.chapter12.recipe12_01.CreateConnection;

    public class TransactionExample {

    public static Connection conn = null;

    public static void main(String[] args) {

    boolean successFlag = false;

    try {

    CreateConnection createConn = new CreateConnection();

    conn = createConn.getConnection();

    conn.setAutoCommit(false);

    queryDbRecipes();

    successFlag = insertRecord(

    "12-6",

