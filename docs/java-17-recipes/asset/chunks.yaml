    ## How It Works


    Multicasting is the ability to broadcast a message to a group of listeners in
    a single transmission. A good analogy of multicasting is radio. Thousands of people
    can tune in to a single broadcast event and listen to the same message. Computers
    can do similar things when sending messages to listeners. A group of client machines
    can tune in to the same address and port number to receive a message that a server
    broadcasts to that address and port. The Java language provides multicasting functionality
    via datagram messaging. Datagrams are independent, nonguaranteed messages that
    can be delivered over the network to clients. (Being *nonguaranteed* means that
    the arrival, arrival time, and content are not predictable.) Unlike messages sent
    over TCP, sending a datagram is a nonblocking event, and the sender is not notified
    of the receipt of the message. Datagrams are sent using the User Datagram Protocol
    (UDP) rather than TCP. The ability to send multicast messages via UDP is one benefit
    over TCP, if the ordering, reliability, and data integrity of the message are
    not mission-critical.


    Java facilitates multicast messaging via the `MulticastChannel` interface. Classes
    that implement the `MulticastChannel` interface have multicasting enabled and
    can therefore broadcast to groups and receive group broadcasts. One such class
    is the `DatagramChannel`, which is a selectable channel for datagram-oriented
    sockets. In the solution to this recipe, both a client and a server program communicate
    via multicast messaging. The `DatagramChannel` class is used on both sides of
    the communication. A `DatagramChannel` must be configured in a specific way to
    be used for accepting multicast messages. Specifically, some options need to be
    set on the open `DatagramChannel` client. We discuss those options shortly. The
    following steps are required for creating a client that receives multicast messages.


    1. Open a datagram channel.

    2. Set the datagram channel options that are required to multicast.

    3. Join the client to a multicast group and return a `MembershipKey` object.

    4. Open the client.


    In the solution to this recipe, the client application begins by obtaining a reference
    to the network interface that receives the broadcast messages. Setting up a `NetworkInterface`
    is required for multicasting. Next, a port number and a multicasting IP address
    are chosen. The group or registered listeners use the IP address to listen for
    broadcasts. The port number must not be in use; otherwise, an exception is thrown.
    For IPv4 multicasting, the IP address must range from `224.0.0.0` to `239.255.255.255`,
    inclusive. This port and IP address is the same one used by a server to broadcast
    the message. Next, a new datagram channel is opened using `StandardProtocolFamily.INET`.
    The choices for opening a datagram channel are `StandardProtocolFamily.INET` or
    `StandardProtocolFamily.INET6`, corresponding to IPv4 and IPv6, respectively.
    The first option that is set on the datagram channel is `StandardSocketOptions.SO_REUSEADDR`,
    and it is set to `true`. This indicates that multiple clients can “reuse” the
    address or use it simultaneously. This needs to be set for a multicast to occur.
    The client is then bound to the port using a new `InetSocketAddress` instance.
    Last, the `StandardSocketOptions.IP_MULTICAST_IF` option is set to the network
    interface that is used. This option represents the outgoing interface for multicast
    datagrams sent by the datagram-oriented socket.


    ```java

    client.setOption(StandardSocketOptions.SO_REUSEADDR, true);

    client.bind(new InetSocketAddress(port));

    client.setOption(StandardSocketOptions.IP_MULTICAST_IF, networkInterface);

