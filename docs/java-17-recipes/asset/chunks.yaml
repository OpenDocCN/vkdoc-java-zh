    Many applications require the use of the current calendar date. It is often also
    necessary to obtain the current time. There are different ways to do that, and
    the solution to this recipe demonstrates three of them. The Date-Time API includes
    a `LocalDateTime` class that enables you to capture the current date and time
    by invoking its `now()` method. A specified date and time can be obtained by specifying
    the corresponding int and month type parameters when calling `LocalDateTime.of()`.
    There are also a multitude of methods available for use via a `LocalDateTime`
    instance, such as `getHours()`, `getMinutes()`, `getNanos()`, and `getSeconds()`,
    which allow for finer-grained control of the date and time. An instance of `LocalDateTime`
    also contains methods for performing calculations, conversions, comparisons, and
    more. Solution 1 to this recipe demonstrates the use of the `LocalDateTime`, showcasing
    how to perform calculations and obtain portions of the date and time for further
    use.


    By default, the `java.util.Date` class can be instantiated with no arguments to
    return the current date and time. The `Date` class can also return the current
    time via the `getTime()` method. As mentioned in the solution, the `getTime()`
    method returns the number of milliseconds since January 1, 1970, 00:00:00 GMT,
    represented by the `Date` object that is in use. Several other methods can be
    called against a `Date` object with regard to breaking down the current date and
    time into more granular intervals. For instance, the `Date` class has the `getHours()`,
    `getMinutes()`, `getSeconds()`, `getMonth()`, `getDay()`, `getTimezoneOffset()`,
    and `getYear()` methods. However, it is not advisable to use any of these methods,
    except `getTime()`, because each has been deprecated using `java.time.LocalDateTime`
    and the `java.util.Calendar get()` methods. When a method or class is deprecated,
    it should no longer be used because it might be removed in some future release
    of the Java language. However, a few of the methods contained within the `Date`
    class have not been tagged as deprecated, so the `Date` class most likely be included
    in future releases of Java. The methods that were left intact include the `after()`,
    `before()`, `compareTo()`, `setTime()`, and `equals()` comparison methods. Solution
    2 to this recipe demonstrates instantiating a `Date` object and printing out the
    current date and time.


    As mentioned previously, the `Date` class has many methods that have become deprecated
    and should no longer be used. In solution 3 of this recipe, the `java.util.Calendar`
    class is demonstrated as one successor for obtaining much of this information.
    The `Calendar` class was introduced in JDK 1.1, at which time many of the `Date`
    methods were deprecated. As you can see from solution 3, the `Calendar` class
    contains all the same functionality included in the `Date` class, except the `Calendar`
    class is much more flexible. The `Calendar` class contains methods used for converting
    between a specific time and date and manipulating the calendar in various ways.
    The `Calendar` class gained a few new methods in Java 8. One new method was `java.util`.


    For some applications, the `Date` class works fine. For instance, the `Date` class
    can be useful when working with timestamps. However, if the application requires
    detailed manipulation of dates and times, then it is advisable to use a `LocalDateTime`
    or the `Calendar` class, which both include all the functionality of the `Date`
    class and more features as well. All solutions to this recipe are technically
    sound; choose the one that best suits the needs of your application.


    ## 4.12 Obtaining a Machine Timestamp


    ### Problem


    You need to obtain a machine-based timestamp from the system.


    ### Solution


    Utilize an `Instant` class, which represents the start of a nanosecond on the
    timeline based on machine time. In the following example, an `Instant` class obtains
    the system timestamp. The `Instant` class is also utilized in other scenarios,
    such as when calculating different dates based on the `Instant`.


    ```

    public static void instants(){

    Instant timestamp = Instant.now();

    System.out.println("The current timestamp: " + timestamp);

    //Now minus three days

    Instant minusThree = timestamp.minus(3, ChronoUnit.DAYS);

    System.out.println("Now minus three days:" + minusThree);

    ZonedDateTime atZone = timestamp.atZone(ZoneId.of("GMT"));

    System.out.println(atZone);

    Instant yesterday = Instant.now().minus(24, ChronoUnit.HOURS);

    System.out.println("Yesterday: " + yesterday);

    }

    ```


    Here is the result.


    ```

    The current timestamp: 2021-10-13T21:06:50.203477900Z

    Now minus three days:2021-10-10T21:06:50.203477900Z

    2021-10-13T21:06:50.203477900Z[GMT]

    Yesterday: 2021-10-12T21:06:50.221430600Z

    ```


    ### How It Works


    The Date-Time API introduces a new class named `Instant`, which represents the
    start of a nanosecond on the timeline in machine-based time. Based on machine
    time, the value in an `Instant` class counts from EPOCH (January 1, 1970 00:00:00Z).
    Any values prior to the EPOCH are negative, and after the EPOCH the values are
    positive. The `Instant` class is perfect for obtaining a machine timestamp, as
    it includes all pertinent date and time information to the nanosecond.


    An `Instant` class is static and immutable, so the `now()` method can be called
    to obtain the current timestamp. Doing so returns a copy of the current `Instant`.
    The `Instant` class also includes conversion and calculation methods. Each returns
    copies of the `Instant` class or other types. In the solution, the `now()` method
    returns the current timestamp, and then a couple of examples follow, showing how
    to perform calculations and obtain information on the `Instant`.


    The `Instant` class is an important new feature in Java 8 because it makes it
    easy to work with the current time and date data. The other date and time classes,
    such as `LocalDateTime`, are also useful. However, the `Instant` class is the
    most accurate timestamp because it’s based on nanosecond accuracy.


    ## 4.13 Converting Dates and Times Based on the Time Zone


    ### Problem


    The application you are developing has the potential to be utilized throughout
    the world. In some areas of the application, static dates and times need to be
    displayed, rather than the system date and time. In such cases, those static dates
    and times need to be converted to suit the particular time zone in which the application
    user is currently residing.'
