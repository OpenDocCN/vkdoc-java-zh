    ### 工作原理


    有时需要创建自定义异常，尤其是在创建 API 时。通常的建议是使用 JDK 提供的现有 `Exception` 类之一。例如，对于 I/O 相关问题使用 `IOException`，对于非法参数使用
    `IllegalArgumentException`。如果没有完全匹配的 JDK 异常，你总是可以继承 `java.lang.Exception` 或 `java.lang.RuntimeException`
    并实现自己的异常体系。


    根据基类的不同，创建 `Exception` 类相当直接。继承 `RuntimeException` 允许你在任何时候抛出生成的异常，而无需在调用栈中捕获它。这样做的好处是
    `RuntimeException` 是一种更宽松的契约，但如果异常未被捕获，抛出此类异常可能导致线程终止。而继承 `Exception` 则强制任何抛出该异常的代码在
    `catch` 子句中处理它。受检异常通过契约强制实现 `catch` 处理器，从而可能避免线程终止。


