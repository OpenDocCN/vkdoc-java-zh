    ### 工作原理


    从头开始为应用程序生成文档可能相当繁琐。维护文档可能更加麻烦。JDK 附带了一个名为 JavaDoc 的广泛文档系统。在源代码中放置特殊注释并运行一个简单的命令行工具，可以轻松生成有用的文档并使其保持最新。即使应用程序中的某些类、方法或字段没有被
    JavaDoc 工具特别注释，也会为这些元素生成默认文档。


    #### 格式化文档


    要创建 JavaDoc 注释，请以字符 `/**` 开头。虽然自 Java 1.4 以来这是可选的，但常见的做法是在注释中后续每一行的第一个字符处包含一个星号。另一个好的做法是缩进注释，使其与正在记录的代码对齐。最后，使用字符
    `*/` 结束注释。


    JavaDoc 注释应以类或方法的简短描述开头。字段很少使用 JavaDoc 进行注释，除非它们被声明为 `public static final`（常量），在这种情况下，提供注释是一个好主意。注释可以有多行，甚至可以包含多个段落。如果你想将注释分成段落，请使用
    `<p>` 标签分隔这些段落。注释可以包含多个标签，这些标签指示有关被注释的方法或类的各种详细信息。JavaDoc 标签以 `@` 符号开头，一些常见的标签如下。


    ```

    @param: 参数的名称和描述

    @return: 方法返回的内容

    @see: 对另一段代码的引用

    ```


    你也可以在 JavaDoc 中包含内联链接以引用 URL。要包含内联链接，请使用标签 `{@link My Link}`，其中 `link` 是你想要指向的实际
    URL，`My Link` 是你想要显示的文本。JavaDoc 注释中还可以使用许多其他标签，包括 `{@literal}`、`{@code}`、`{@value
    org}` 等。


    #### 执行工具


    JavaDoc 工具可以针对整个包或源文件运行。只需将包名传递给 JavaDoc 工具，而不是单个源文件名。例如，如果一个应用程序包含一个名为 `org.luciano.beans`
    的包，则可以通过运行该工具来记录该包中的所有源文件，如下所示。


    ```

    javadoc org.luciano.beans

    ```


    默认情况下，JavaDoc 工具会生成 HTML 并将其放置在与被记录代码相同的包中。如果你希望将源文件与文档分开，那么结果可能会变得混乱不堪。相反，你可以通过向
    JavaDoc 工具传递 `–d` 标志来为生成的文档设置目标位置。


