    ### 解决方案


    如果你的变量或表达式结果属于允许的 `switch` 类型之一，并且你想与类型兼容的常量进行相等性测试，可以考虑使用 `switch` 语句。以下示例展示了
    `switch` 语句的多种用法，包括 Java 7 中新增的一项功能：对字符串进行 `switch` 操作。首先，我们来玩一局石头剪刀布游戏！`RockPaperScissors`
    类展示了两种不同的 `switch` 语句：一种以 `int` 作为 `switch` 表达式类型，另一种以枚举类型作为表达式类型。


    ```

    public class RockPaperScissors {

    enum Hand { ROCK, PAPER, SCISSORS, INVALID };

    private static void getHand(int handVal) {

    Hand hand;

    try {

    hand = Hand.values()[handVal - 1];

    }

    catch (ArrayIndexOutOfBoundsException ex) {

    hand = Hand.INVALID;

    }

    switch (hand) {

    case ROCK:

    System.out.println("Rock");

    break;

    case PAPER:

    System.out.println("Paper");

    break;

    case SCISSORS:

    System.out.println("Scissors");

    break;

    default:

    System.out.println("Invalid");

    }

    }

    private static void playHands(int yourHand, int myHand) {

    // Rock = 1

    // Paper = 2

    // Scissors = 3

    // Hand combinations:

    // 1,1; 2,2; 3,3 => Draw

    // 1,2 => sum = 3 => Paper

    // 1,3 => sum = 4 => Rock

    // 2,3 => sum = 5 => Scissors

    //

    switch ((yourHand == myHand) ? 0 : (yourHand + myHand)) {

    case 0:

    System.out.println("Draw!");

    break;

    case 3:

    System.out.print("Paper beats Rock. ");

    printWinner(yourHand, 2);

    break;

    case 4:

    System.out.print("Rock beats Scissors. ");

    printWinner(yourHand, 1);

    break;

    case 5:

    System.out.print("Scissors beats Paper. ");

    printWinner(yourHand, 3);

    break;

    default:

    System.out.print("You cheated! ");

