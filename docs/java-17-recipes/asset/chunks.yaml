    类的 `clone()` 方法是 `protected` 的。要使对象可克隆，它必须实现 `Cloneable` 接口并重写默认的 `clone()` 方法。您可以通过一系列步骤序列化对象来制作深拷贝，例如将对象写入输出流，然后通过输入流将其读回。本方案解决方案的
