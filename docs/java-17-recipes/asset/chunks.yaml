    team1 and team5 are NOT equal\n```\n\n### How It Works\n\n复制对象有两种不同的策略：浅拷贝和深拷贝。*浅拷贝*可以在不复制对象任何内容或数据的情况下进行复制。相反，所有变量都通过引用传递给复制的对象。创建对象的浅拷贝后，原始对象和复制对象中的变量引用相同的数据和内存。因此，修改原始对象的内容也会修改复制的对象。默认情况下，调用对象的`super.clone()`方法执行浅拷贝。本方案中的`shallowCopyClone()`方法演示了此技术。\n\
