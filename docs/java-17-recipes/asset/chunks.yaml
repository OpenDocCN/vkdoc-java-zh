    ### 工作原理


    表示一组固定相关常量的常见模式是将每个常量定义为 int、string 或其他数据类型。通常，这些常量定义在专门用于封装常量的类或接口中。无论如何，常量有时会使用
    `static` 和 `final` 修饰符进行定义，如下所示。


    ```

    // 输入字段常量

    public static final int PASSWORD = 0;

    public static final int EMAIL_ADDRESS = 1;

    public static final int PHONE_NUMBER = 2;

    public static final int SOCIAL_SECURITY_NUMBER = 3;

    ```


    这种模式存在多个问题，主要问题在于缺乏类型安全性。通过将这些常量定义为 int 类型，可能会将一个无效值赋给本应只允许持有其中一个常量值的变量。


    ```

    int inputField = PHONE_NUMBER;  // 正确

    inputField = 4;  // 错误 - 没有值为 4 的输入字段常量；编译时无错误

    ```


    如你所见，编译器不会产生任何错误或警告来告知你这种无效赋值。很可能，你会在运行时，当应用程序尝试使用 `inputField` 且为其分配了错误值时才发现这个问题。相比之下，Java
    枚举类型提供了编译时的类型安全性。也就是说，如果试图将错误类型的值赋给枚举变量，会导致编译错误。在本方案的解决方案中，`FieldType.EMAIL_ADDRESS`
    枚举常量被赋给了 `field` 变量。试图赋一个非 `FieldType` 类型的值自然会导致编译错误。


    ```

    FieldType field = FieldType.EMAIL_ADDRESS;  // 正确

    field = "EMAIL_ADDRESS"; // 类型错误 - 编译错误

    ```


    枚举本质上是一种特殊的类。在底层，Java 将枚举类型实现为 `abstract` 和 `final` 的 `java.lang.Enum` 类的子类。因此，枚举类型不能直接实例化（在枚举类型外部）或继承。枚举类型定义的常量是其自身的实例。`java.lang.Enum`
    类定义了几个所有枚举类型都继承的 `final` 方法。此外，所有枚举类型都有两个隐式声明的 `static` 方法：`values()` 和 `valueOf(String)`。解决方案代码演示了这些
    `static` 方法以及一些更常用的实例方法。


    这些方法大多不言自明，但你应该牢记以下几点。


    *   每个枚举常量都有一个序数值，表示其在枚举声明中的相对位置。声明中的第一个常量被分配序数值 0。`ordinal()` 方法可以获取枚举常量的序数值；但出于可维护性原因，不建议应用程序依赖此值。


    *   `name()` 方法和 `toString()` 方法的默认实现都返回枚举常量的字符串表示形式（`toString()` 实际上调用了 `name()`）。通常，`toString()`
    会被重写，以提供更友好的枚举常量字符串表示形式。出于此原因以及可维护性原因，建议优先使用 `toString()` 而非 `name()`。


    *   在测试相等性时，请注意 `equals()` 方法和 == 都执行引用比较。它们可以互换使用。然而，建议使用 == 以利用编译时类型安全性。解决方案代码中对此进行了说明。例如，使用字符串参数执行
    `equals()` 比较可能会使错误被忽略；它能编译通过，但始终返回 false。相反，使用 == 比较枚举和字符串会在编译时导致错误。当你选择更早地捕获错误（在编译时而非运行时）时，请选择前者。


    *   隐式声明的 `values()` 和 `valueOf(String)` 静态方法不会出现在 Java 文档或 `java.lang.Enum` 类的源代码中。然而，Java
    语言规范确实详细说明了它们所需的实现。总结这些方法：`values()` 返回一个数组，其中包含按声明顺序排列的枚举常量。`valueOf(String)`
    方法返回名称（区分大小写）与字符串参数值匹配的枚举常量，如果没有指定名称的枚举常量，则抛出 `IllegalArgumentException`。


    有关 `java.lang.Enum` 及其每个方法的更多信息，请参阅 Java 文档（[`https://docs.oracle.com/en/java/javase/17/docs/api/java.base/java/lang/Enum.html`](https://docs.oracle.com/en/java/javase/17/docs/api/java.base/java/lang/Enum.html)）。正如下一个方案所展示的，枚举类型作为完整的
    Java 类，可以构建更智能的常量。


    ## 7.2 设计智能常量


    ### 问题


    你需要一个能够表示一组固定相关常量的类型，并且希望以面向对象的方式围绕常量构建一些状态和行为（逻辑）。


    ### 解决方案


    使用枚举类型并利用类型安全性，因为枚举类型是完整的 Java 类。枚举类型可以像任何其他类一样拥有状态和行为，而枚举常量本身作为枚举类型的实例，会继承这些状态和行为。一个例子最能说明这一点。让我们扩展上一个方案中的示例。假设你需要处理并验证提交的
