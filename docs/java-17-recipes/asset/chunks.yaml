- fmt: '# 8. Input and Output


    The file and network I/O have evolved over the years into a much better framework
    for handling files, network scalability, and ease of use. Java can monitor folders,
    access OS-dependent methods, and create scalable asynchronous network sockets.
    This is in addition to the already robust library for handling input and output
    streams and serializing (and deserializing) object information.


    This chapter covers recipes that demonstrate different input and output processes.
    You learn about the serialization of files, sending files over the network, file
    manipulation, and much more. After reading the recipes in this chapter, you are
    armed to develop applications containing sophisticated input and output tasks.


    ## Streams and the Decorator Pattern


    I/O streams are the foundation of most Java I/O and include a plethora of ready-made
    streams for just about any occasion, but they are very confusing to use if some
    context is not provided. A stream (like a river) represents an inflow/outflow
    of data. Think about it this way. You create a stream of characters that the system
    receives (input stream) as you type. When the system produces sounds, it sends
    them to the speaker (output stream). The system could be receiving keystrokes
    and sending sound all day long, and thus the streams can be either processing
    data or waiting for more data.


    When a stream doesn’t receive any data, it waits (nothing else to do, right?).
    As soon as data comes in, the stream starts processing this data. The stream then
    stops and waits for the next data item to come. This keeps going until this proverbial
    river becomes dry (the stream is closed).


    Like a river, streams can be connected to each other (this is the decorator pattern).
    For the content of this chapter, there are mainly two input streams that you care
    about. One is the file input stream, and the other is the network socket input
    stream. These two streams are a source of data for your I/O programs. Their corresponding
    output streams are also file output stream and the network socket output streams
    (creative, isn’t it?). Like a plumber, you can hook them together and create something
    new. For example, you could weld together a file input stream to a network output
    stream to send the contents of the file through a network socket. Or you could
    do the opposite and connect a network input stream (data coming in) to a file
    output stream (data being written to disk). In I/O parlance, the input streams
    are called *sources*, while the output streams are called *sinks*.


    There are other input and output streams that can be glued together. For example,
    there is a `BufferedInputStream`, which allows you to read the data in chunks
    (it’s more efficient than reading it byte by byte), and `DataOutputStream` allows
    you to write Java primitives to an output stream (instead of just writing bytes).
    One of the most useful streams is the `ObjectInputStream` and `ObjectOutputStream`
    pair, which allow you to serialize/deserialize objects (there is a recipe for
    that in this chapter).


    The decorator pattern allows you to keep plucking streams together to get many
    different effects. The beauty of this design is that you can create a stream that
    takes any input and produce any output and then can be thrown together with every
    other stream.


    ## 8.1 Serializing Java Objects


    ### Problem


    You need to serialize a class (save the contents of the class) so that you can
    restore it at a later time.


    ### Solution


    Java implements a built-in serialization mechanism. You access that mechanism
    via the `ObjectOutputStream` class. In the following example, the `saveSettings()`
    method uses `ObjectOutputStream` to serialize the settings object to write the
    object to disk.


    ```

    public class Ch_8_1_SerializeExample {

    public static void main(String[] args) {

    Ch_8_1_SerializeExample example = new Ch_8_1_SerializeExample();

    example.start();

    }

    private void start() {

    ProgramSettings settings = new ProgramSettings(new Point(10,10),

    new Dimension(300,200),   Color.blue,

    "The title of the application" );

    saveSettings(settings,"settings.bin");

    ProgramSettings loadedSettings = loadSettings("settings.bin");

    if(loadedSettings != null)

    System.out.println("Are settings are equal? :"+loadedSettings.equals(settings));

    }

    private void saveSettings(ProgramSettings settings, String filename) {

    try {

    FileOutputStream fos = new FileOutputStream(filename);

    try (ObjectOutputStream oos = new ObjectOutputStream(fos)) {

    oos.writeObject(settings);

    }

    } catch (IOException e) {

    e.printStackTrace();

    }

    }

    private ProgramSettings loadSettings(String filename) {

    try {

    FileInputStream fis = new FileInputStream(filename);

    ObjectInputStream ois = new ObjectInputStream(fis);

    return (ProgramSettings) ois.readObject();

    } catch (IOException | ClassNotFoundException e) {

    e.printStackTrace();

    }

    return null;

    }

    }

    ```


    The following is the `ProgramSetting` class.


    ```

    package org.java17recipes.chapter08.recipe08_01;

    import java.awt.*;

    import java.io.Serializable;

    public class ProgramSettings implements Serializable {

    private static final long serialVersionUID = 1L;

    private Point locationOnScreen;

    private Dimension frameSize;

    private Color defaultFontColor;

    private String title;

    // Empty constructor

    public ProgramSettings() {

    }

    public ProgramSettings(Point locationOnScreen, Dimension frameSize, Color defaultFontColor,
    String title) {

    this.locationOnScreen = locationOnScreen;

    this.frameSize = frameSize;

    this.defaultFontColor = defaultFontColor;

    this.title = title;

    }

    public Point getLocationOnScreen() {

    return locationOnScreen;

    }

    public void setLocationOnScreen(Point locationOnScreen) {

    this.locationOnScreen = locationOnScreen;

    }

    public Dimension getFrameSize() {

    return frameSize;

    }

    public void setFrameSize(Dimension frameSize) {

    this.frameSize = frameSize;

    }

    public Color getDefaultFontColor() {

    return defaultFontColor;

    }

    public void setDefaultFontColor(Color defaultFontColor) {

    this.defaultFontColor = defaultFontColor;

    }

    public String getTitle() {

    return title;

    }

    public void setTitle(String title) {

    this.title = title;

    }

    @Override

    public boolean equals(Object o) {

    if (this == o) return true;

    if (o == null || getClass() != o.getClass()) return false;

    ProgramSettings that = (ProgramSettings) o;

    if (defaultFontColor != null ? !defaultFontColor.equals(that.defaultFontColor)
    : that.defaultFontColor != null)

    return false;

    if (frameSize != null ? !frameSize.equals(that.frameSize) : that.frameSize !=
    null) return false;

    if (locationOnScreen != null ? !locationOnScreen.equals(that.locationOnScreen)
    : that.locationOnScreen != null)

    return false;

    if (title != null ? !title.equals(that.title) : that.title != null) return false;

    return true;

    }

    @Override

    public int hashCode() {

    int result = locationOnScreen != null ? locationOnScreen.hashCode() : 0;

    result = 31 * result + (frameSize != null ? frameSize.hashCode() : 0);

    result = 31 * result + (defaultFontColor != null ? defaultFontColor.hashCode()
    : 0);

    result = 31 * result + (title != null ? title.hashCode() : 0);

    return result;

    }

    }

    ```'
