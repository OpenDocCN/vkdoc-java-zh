    files and directories (see Listing [2-2](#323910_4_En_2_Chapter.xhtml#PC7)).


    ```

    import java.nio.file.Path;

    import java.nio.file.Paths;

    import java.nio.file.Files;

    import java.io.IOException;

    class ReadContentsFile

    {

    public static void main(String[] args)

    {

    Path filePathHello = Paths.get("C:/hello.txt");

    try

    {

    String contents = Files.readString(filePath filePathHello);

    System.out.println(contents);

    }

    catch (IOException err)

    {

    err.printStackTrace();

    }

    }

    }

    Listing 2-2

    Reading Content of File

    ```


    The following is the output.


    ```

    Ciao da

    Luciano Manelli

    Taranto

    ITALY

    ```


    This is the content of a text file on the author’s computer.


    ### How It Works


    Java 11 included some new `Files` class methods to read content from a file. The
    `Files.readString(Path)` method reads characters from a file, accepts the file’s
    path, and returns a string with the file’s contents. It throws an IOException
    if an error occurs. The used charset for the decoding is the UTF-8.


    You can also use the `Files.readString(Path, Charset)` method. It is used for
    using a specific charset to decode bytes to characters. It reads from the file
    and throws an IOException. The `Files.readString(Path)` method is equal to `readString(path,
    StandardCharsets.UTF_8)`.


    Listing [2-3](#323910_4_En_2_Chapter.xhtml#PC9) is an example.


    ```

    import java.nio.file.Path;

    import java.nio.file.Paths;

    import java.nio.file.Files;

    import java.io.IOException;

    import java.nio.charset.StandardCharsets;

    public class Main

    {

    public static void main(String[] args)

    {

    Path filePathHello = Paths.get("C:/hello.txt");

    try

    {

    String contents = Files.readString(filePath filePathHello, StandardCharsets.UTF_8);

    System.out.println(contents);

    }

    catch (IOException err)

    {

    err.printStackTrace();

    }

    }

    }

