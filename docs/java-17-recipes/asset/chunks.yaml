    ### 工作原理


    `switch` 语句是一种控制流语句，允许你根据 `switch` 表达式的值执行不同的代码块。它类似于 `if-then-else` 语句，区别在于 `switch`
    语句只能有一个测试表达式。该表达式的类型被限制为几种特定类型之一。当 `switch` 语句执行时，它会将表达式与 `switch` 语句的 `case`
    标签中包含的常量进行比较。这些 `case` 标签是代码中的分支点。如果表达式的值等于某个 `case` 标签常量的值，控制权就会转移到与该匹配 `case`
    标签对应的代码段。从该点开始的所有代码语句都会被执行，直到遇到 `switch` 语句的结尾或 `break` 语句。`break` 语句会导致 `switch`
    语句终止，控制权转移到 `switch` 语句之后的语句。可选地，`switch` 语句可以包含一个 `default` 标签，当没有 `case` 标签常量等于
    `switch` 表达式的值时，它提供一个分支点。


    `SwitchTypeChecker isValidSwitchType()` 方法演示了如何使用字符串作为 `switch` 测试表达式。如果你仔细研究
    `isValidSwitchType()` 方法，你会发现它测试一个 `Class` 对象是否代表与有效 `switch` 表达式类型之一相对应的类型。该方法还演示了如何将
    `case` 标签分组以实现逻辑或条件测试。如果一个 `case` 标签没有关联的代码可执行，也没有 `break` 语句，执行流程会落入下一个最近的包含可执行语句的
    `case` 标签，从而允许在 `switch` 表达式的结果与分组 `case` 常量中的任何一个匹配时执行公共代码。


    `RockPaperScissors` 类实现了一个命令行版的石头剪刀布游戏，与计算机对战。该类中有两个方法演示了 `switch` 语句。`getHand()`
    方法展示了在 `switch` 表达式中使用枚举变量。`playHands()` 方法旨在说明，尽管 `switch` 表达式通常是一个变量，但它可以是任何结果属于允许的
    `switch` 类型之一的表达式。在这个例子中，表达式使用了一个返回 `int` 值的三元运算符。


    ## 7.4 使用固定大小的数组


    ### 问题


    你需要一个简单的数据结构，能够存储固定（且可能很大）数量的同类型数据，并提供快速的顺序访问。


    ### 解决方案


    考虑使用数组。虽然 Java 提供了更复杂、更灵活的 `Collection` 类型，但数组类型对于许多应用来说仍然是一种有用的数据结构。下面的例子演示了使用数组的简便性。`GradeAnalyzer`
    类提供了一种计算各种与成绩相关的统计数据的方法，例如平均分、最低分和最高分。


    ```

    public class GradeAnalyzer {

    // 内部成绩数组

    private int[] grades;

    public void setGrades(int[] grades) {

    this.grades = grades;

    }

    // 返回克隆的成绩数组，以防止调用者修改我们内部的成绩数组

    public int[] getGrades() {

    return grades != null ? grades.clone() : null;

    }

    public int meanGrade() {

    int mean = 0;

    if (grades != null && grades.length > 0) {

    int sum = 0;

    for (int i = 0; i < grades.length; i++) {

    sum += grades[i];

    }

    mean = sum / grades.length;

    }

    return mean;

    }

    public int minGrade() {

    int min = grades[0];

    for (int i = 1; i < grades.length; i++) {

    if (grades[i] < min) {

    min = grades[i];

    }

    }

    return min;

    }

    public int maxGrade() {

    int max = grades[0];

    for (int index = 1; index < grades.length; index++) {

    if (grades[index] > max) {

    max = grades[index];

    }

    }

    return max;

    }

    static int[] initGrades1() {

    int[] grades = new int[5];

    grades[0] = 77;

    grades[1] = 48;

    grades[2] = 69;

    grades[3] = 92;

    grades[4] = 87;

    return grades;

    }

    static int[] initGrades2() {

    int[] grades = { 57, 88, 67, 95, 99, 74, 81 };

    return grades;

    }

    static int[] initGrades3() {

    return new int[]{ 100, 70, 55, 89, 97, 98, 82 };

    }

    public static void main(String... args) {

    GradeAnalyzer ga = new GradeAnalyzer();

    ga.setGrades(initGrades1());

    System.out.println("成绩组 1:");

    System.out.println("所有成绩的平均分是 " + ga.meanGrade());

    System.out.println("最低分是 " + ga.minGrade());

    System.out.println("最高分是 " + ga.maxGrade());

    ga.setGrades(initGrades2());

    System.out.println("成绩组 2:");

    System.out.println("所有成绩的平均分是 " + ga.meanGrade());

    System.out.println("最低分是 " + ga.minGrade());

    System.out.println("最高分是 " + ga.maxGrade());

    ga.setGrades(initGrades3());

    System.out.println("成绩组 3:");

    System.out.println("所有成绩的平均分是 " + ga.meanGrade());

    System.out.println("最低分是 " + ga.minGrade());

    System.out.println("最高分是 " + ga.maxGrade());

    Object testArray = ga.getGrades();

    Class testClass = testArray.getClass();

    System.out.println("isArray: " + testClass.isArray());

    System.out.println("getClass: " + testClass.getName());

    System.out.println("getSuperclass: " + testClass.getSuperclass().getName());

    System.out.println("getComponentType: " + testClass.getComponentType());

    System.out.println("Arrays.toString: " + Arrays.toString((int[])testArray));

    }

    }

    ```


    运行这段代码会产生以下输出。


    ```

    成绩组 1:

    所有成绩的平均分是 74

    最低分是 0

    最高分是 92

    成绩组 2:

    所有成绩的平均分是 80

    最低分是 0

    最高分是 99

    成绩组 3:

    所有成绩的平均分是 84

    最低分是 0

    最高分是 100

    isArray: true

    getClass: [I

    getSuperclass: class java.lang.Object

    getComponentType: int

    Arrays.toString: [100, 70, 55, 89, 97, 98, 82]

    ```

