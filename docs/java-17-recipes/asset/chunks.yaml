  raw: '### How It Works


    The Java `array` type works differently than Java’s `ArrayList` (part of the Java
    collections framework). Java arrays hold a fixed amount of data. When an array
    is created, you must specify how much data it can hold. Once an array has been
    created, you cannot insert or remove array items or otherwise change the size
    of the array. However, an array may be a good choice if you have a fixed amount
    (and especially a very large amount) of data that you need to work on while iterating
    over it sequentially.


    The first thing you need to know about the Java `array` type is that it is an
    `Object` type. Regardless of the type of data they contain, all arrays have `Object`
    type as their superclass. The elements of an array may be of any type if all elements
    are of the same type—either primitive or object reference. Regardless of the array
    type, the memory for an array is always allocated out of the heap space for the
    application. The heap is the area of memory used by the JVM for dynamic memory
    allocation.


    Note


    It is possible to create an array of `Objects` (`Object[]`) that can hold references
    to objects of different types; however, this is not recommended. It requires you
    to check the type of elements and perform explicit type casting when retrieving
    elements from the array.


    There are two steps to completely defining an array object in Java: array variable
    declaration, which specifies the array element type, and array creation, which
    allocates the memory for the array. Once an array is declared and the memory is
    allocated, it can be initialized. There are multiple ways to initialize an array,
    which are shown in the solution to this recipe. If you know in advance what data
    you need to store in the array, you can combine array declaration, creation, and
    initialization in one step using a shortcut syntax you see demonstrated in the
    solution.


    Let’s walk through the `GradeAnalyzer` class and examine the various ways to declare,
    create, initialize, and access arrays. First, notice that the class has one instance
    variable to hold the grades to be analyzed.


    ```

    private int[] grades;

    ```


    Like all uninitialized `Object` reference instance variables, the `grades` array
    instance variable is automatically initialized to `null`. Before you can start
    analyzing grades, you have to set the `grades` instance variable to reference
    the grades data you want to analyze. This is done using the `setGrades(int[])`
    method. Once `GradeAnalyzer` has a collection of grades to analyze, the `meanGrade()`,
    `minGrade()`, and `maxGrade()` methods can be called on to compute their respective
    statistics. Together, these three methods demonstrate how to iterate the elements
    of an array, how to access elements of an array, and how to determine the number
    of elements an array can hold. To determine the number of elements an array can
    hold, simply access the implicitly defined, final instance variable, `length`,
    which is available for all arrays.


    ```

    grades.length

    ```


    To iterate the elements of an array, simply use a `for` loop, whose index variable
    goes through all possible indices of the array. Array indices start at 0, so the
    last array index is always (`grades.length - 1`). While iterating over the array,
    you can access the array element at the current index by using the name of the
    array variable followed by the current index enclosed in brackets (often called
    an *array subscript*).


    ```

    // From the meanGrade() method:

    for (int i = 0; i < grades.length; i++) {

    sum += grades[i];

    }

    ```


    Alternatively, the enhanced `for` loop, also known as the `foreach` loop, could
    iterate the array.


    ```

    for (int grade : grades) {

    sum += grade;

    }

    ```


    Notice that to determine the min and max grade, the grades are first sorted in
    their natural (ascending) order using the utility sort method from the `java.util.Arrays`
    class. After sorting, the min grade is simply the first element (at index 0) of
    the array, and the max grade is the last element (at index length –1) of the array.


    The three static class methods in the solution—`initGrades1()`, `initGrades2()`,
    and `initGrades3()`—demonstrate three different ways of creating and initializing
    the array data you use to “seed” the `GradeAnalyzer` class. The `initGrades1()`
    method declares and creates an array (using new) that can hold five grades, then
    manually sets the value at each element index to an integer grade value. The `initGrades2()`
    method combines array creation and initialization in one line using the special
    array initializer syntax.


    ```

    int[] grades = { 57, 88, 67, 95, 99, 74, 81 };

    ```


    This syntax creates an array with a length of 7 and initializes the elements from
    index 0 through index 6 with the integer values shown. Note that this syntax can
    be used only in an array declaration, so the following is not allowed.


    ```

    int[] grades;

    grades = { 57, 88, 67, 95, 99, 74, 81 }; // won''t compile

    ```


    The `initGrades3()` method looks very similar to `initGrades2()` but is slightly
    different. This code creates and returns an anonymous (unnamed) array.


    ```

    return new int[]{ 100, 70, 55, 89, 97, 98, 82 };

    ```


    With this syntax, you use the new keyword with the array element type, but the
    size of the array is not explicitly specified. Similar to the array initializer
    syntax shown in the `initGrades2()` method, the number of elements given within
    the initializer brackets implies the array size. So, again, this code is creating
    and returning an array with a length of 7.


    After computing the grade statistics for the three sets of grades data, the remainder
    of the `GradeAnalyzer` class `main()` method demonstrates various methods to determine
    array type information and convert an array to a printable string. You see that
    the code first assigns the array returned from a call to the `getGrades()` instance
    method to an `Object` variable called `testArray`.


    ```

    Object testArray = ga.getGrades();

    ```


    You can make this assignment because, as stated previously, an array is an Object.
    You can also see this from the call to `testArray.getSuperclass()`. The call to
    `testArray.getClass().getName()` is also interesting; it returns “I.” The left
    bracket means “I am an array type”, and the “I” means “with a component type of
    integer.” This is also backed up by the call to `testArray.getComponentType()`.
    Finally, you call the `Arrays.toString(int[])` method, which returns a nicely
    formatted string representation of the array and its contents. Notice that `testArray`
    is an Object reference, so it must be cast to an int array for the `Arrays.toString(int[])`
    method. (See the Java documentation for the `java.util.Arrays` class for other
    useful utility methods that can be used with arrays).


    ## 7.5 Safely Enabling Types or Methods to Operate on Objects of Various Types


    ### Problem


    Your application uses many different object types, and there are containers within
    your class that are available for holding each of these different types. You are
    interested in ensuring your application remains bug-free, yet you want to dynamically
    change the type of object a particular container may hold. In other words, you
    want to define a generic container, but can specify its type each time a new instance
    of the container is instantiated.'
  trans: '

    ### 工作原理


    Java 的 `array` 类型与 Java 的 `ArrayList`（Java 集合框架的一部分）的工作方式不同。Java 数组保存固定数量的数据。创建数组时，必须指定它可以容纳多少数据。一旦创建了数组，就不能插入或删除数组项，也不能改变数组的大小。然而，如果你有固定数量（尤其是非常大量）且需要按顺序迭代处理的数据，数组可能是一个不错的选择。


    关于 Java 的 `array` 类型，你需要了解的第一件事是它是一个 `Object` 类型。无论它们包含的数据类型是什么，所有数组都以 `Object`
    类型作为其超类。如果所有元素类型相同（无论是基本类型还是对象引用），数组的元素可以是任何类型。无论数组类型如何，数组的内存总是从应用程序的堆空间中分配。堆是
    JVM 用于动态内存分配的内存区域。


    注意


    可以创建一个 `Objects` 数组（`Object[]`），它可以保存对不同类型对象的引用；但是，不建议这样做。它要求你在从数组中检索元素时检查元素类型并执行显式类型转换。


    在 Java 中完全定义一个数组对象有两个步骤：数组变量声明（指定数组元素类型）和数组创建（为数组分配内存）。一旦声明了数组并分配了内存，就可以对其进行初始化。有多种初始化数组的方法，本方案中展示了这些方法。如果你事先知道需要存储在数组中的数据，可以使用解决方案中演示的快捷语法，将数组声明、创建和初始化合并为一步。


    让我们逐步了解 `GradeAnalyzer` 类，并检查声明、创建、初始化和访问数组的各种方法。首先，注意该类有一个实例变量来保存要分析的成绩。


    ```

    private int[] grades;

    ```


    与所有未初始化的 `Object` 引用实例变量一样，`grades` 数组实例变量会自动初始化为 `null`。在开始分析成绩之前，你必须设置 `grades`
    实例变量以引用你想要分析的成绩数据。这是通过 `setGrades(int[])` 方法完成的。一旦 `GradeAnalyzer` 有了要分析的成绩集合，就可以调用
    `meanGrade()`、`minGrade()` 和 `maxGrade()` 方法来计算各自的统计数据。这三个方法共同演示了如何迭代数组元素、如何访问数组元素以及如何确定数组可以容纳的元素数量。要确定数组可以容纳的元素数量，只需访问隐式定义的最终实例变量
    `length`，该变量对所有数组都可用。


    ```

    grades.length

    ```


    要迭代数组的元素，只需使用一个 `for` 循环，其索引变量遍历数组的所有可能索引。数组索引从 0 开始，因此最后一个数组索引始终是 (`grades.length
    - 1`)。在迭代数组时，你可以通过使用数组变量名称后跟方括号括起来的当前索引（通常称为*数组下标*）来访问当前索引处的数组元素。


    ```

    // 来自 meanGrade() 方法：

    for (int i = 0; i < grades.length; i++) {

    sum += grades[i];

    }

    ```


    或者，增强型 `for` 循环（也称为 `foreach` 循环）也可以迭代数组。


    ```

    for (int grade : grades) {

    sum += grade;

    }

    ```


    请注意，为了确定最小和最大成绩，首先使用 `java.util.Arrays` 类中的实用排序方法按自然（升序）顺序对成绩进行排序。排序后，最小成绩就是数组的第一个元素（索引
    0），最大成绩就是数组的最后一个元素（索引 length – 1）。


    解决方案中的三个静态类方法——`initGrades1()`、`initGrades2()` 和 `initGrades3()`——演示了创建和初始化用于“播种”`GradeAnalyzer`
    类的数组数据的三种不同方式。`initGrades1()` 方法声明并创建一个可以容纳五个成绩的数组（使用 new），然后手动将每个元素索引处的值设置为一个整数成绩值。`initGrades2()`
    方法使用特殊的数组初始化器语法将数组创建和初始化合并为一行。


    ```

    int[] grades = { 57, 88, 67, 95, 99, 74, 81 };

    ```


    此语法创建一个长度为 7 的数组，并使用显示的整数值初始化索引 0 到索引 6 的元素。请注意，此语法只能在数组声明中使用，因此以下操作是不允许的。


    ```

    int[] grades;

    grades = { 57, 88, 67, 95, 99, 74, 81 }; // 无法编译

    ```


    `initGrades3()` 方法看起来与 `initGrades2()` 非常相似，但略有不同。此代码创建并返回一个匿名（未命名）数组。


    ```

    return new int[]{ 100, 70, 55, 89, 97, 98, 82 };

    ```


    使用此语法，你将 new 关键字与数组元素类型一起使用，但未显式指定数组的大小。与 `initGrades2()` 方法中显示的数组初始化器语法类似，初始化器括号内给出的元素数量隐含了数组大小。因此，这段代码再次创建并返回一个长度为
    7 的数组。


    在计算了三组成绩数据的成绩统计数据之后，`GradeAnalyzer` 类的 `main()` 方法的其余部分演示了确定数组类型信息并将数组转换为可打印字符串的各种方法。你会看到代码首先将从调用
    `getGrades()` 实例方法返回的数组赋值给一个名为 `testArray` 的 `Object` 变量。


    ```

    Object testArray = ga.getGrades();

    ```


    你可以进行此赋值，因为如前所述，数组是一个 Object。你也可以从对 `testArray.getSuperclass()` 的调用中看到这一点。对 `testArray.getClass().getName()`
    的调用也很有趣；它返回“I”。左括号表示“我是一个数组类型”，而“I”表示“组件类型为整数”。这也得到了对 `testArray.getComponentType()`
    调用的支持。最后，你调用 `Arrays.toString(int[])` 方法，该方法返回数组及其内容的格式良好的字符串表示形式。请注意，`testArray`
    是一个 Object 引用，因此必须将其转换为 int 数组才能用于 `Arrays.toString(int[])` 方法。（有关可与数组一起使用的其他实用方法，请参阅
    `java.util.Arrays` 类的 Java 文档。）


    ## 7.5 安全地使类型或方法能够操作各种类型的对象


    ### 问题


    你的应用程序使用许多不同的对象类型，并且你的类中有可用于保存这些不同类型中每一种的容器。你希望确保应用程序保持无错误，同时又希望动态更改特定容器可能保存的对象类型。换句话说，你想定义一个泛型容器，但可以在每次实例化容器的新实例时指定其类型。

    '
- fmt: '### Solution


    Use generic types to decouple the type from the container. Generics are a way
    to abstract over object types, not explicitly declaring the type of an object
    or container. All collection types are parameterized to allow you to specify,
    at the time of instantiation, the type of elements the collection can hold. The
    following example code demonstrates how to use generics in various scenarios.
    The comments in the code indicate where the generics are utilized.


    ```

    public class MainClass {

    static List team;

    private static void loadTeam() {

    System.out.println("Loading team...");

    // Use of the diamond operator

    team = new ArrayList();

    Player player1 = new Player("Josh", "Juneau", 5);

    Player player2 = new Player("Duke", "Java", 15);

    Player player3 = new Player("Jonathan", "Gennick", 1);

    Player player4 = new Player("Bob", "Smith", 18);

    Player player5 = new Player("Steve", "Adams", 7);

    team.add(player1);

    team.add(player2);

    team.add(player3);

    team.add(player4);

    team.add(player5);

    }

    public static void main(String[] args) {

    loadTeam();

    // Create a list without specifying a type

    List objectList = new ArrayList();

    Object obj1 = "none";

    objectList.add(obj1);

    // Create a List that can be of type that is any superclass of Player (or only
    Player type itself)

    List myTeam = objectList;

    for (Object p : myTeam) {

    System.out.println("Printing the objects...");

    System.out.println(p.toString());

    }

    // Create a Map of String keys and String values

    Map strMap = new HashMap();

    strMap.put("first", "Josh");

    strMap.put("last", "Juneau");

    System.out.println(strMap.values());

    }

    }

    ```


    **Note**


    When we generally talk about a *collection* or a *collection type*, you can read
    this as those types that make up the Java collections framework. This includes
    all the classes and interfaces from the `Collection` and `Map` interfaces. Collection
    types generally refer to types that descend from the `Collection` interface.'
