    An unchecked conversion warning is generated for the assignment to flag potential
    runtime type incompatibility. Imagine if `rawList` contained strings. Later, if
    you tried to retrieve integer elements from `aList`, you would get a runtime error.


    Regarding type compatibility, it doesn’t apply to generic type parameters. For
    example, the following is not a valid assignment.


    ```

    List bList = new LinkedList();  // won''t compile; incompatible types

    ```


