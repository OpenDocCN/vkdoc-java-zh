    15.9 小结

    XML 常用于在不同应用程序之间传输数据，或将某种数据存储到文件中。因此，理解在应用程序开发平台中处理 XML 的基础知识至关重要。本章概述了如何使用 Java
    执行一些处理 XML 的关键任务。本章首先介绍了 XML 读写的基础知识。此外，本章还涉及了 JSON，演示了如何生成、写入和解析 JSON 数据。


    16. 网络


    如今，编写一个完全不通过互联网进行通信的应用程序已十分罕见。从向另一台机器发送数据，到从远程网页抓取信息，网络在当今的计算世界中扮演着不可或缺的角色。Java
    利用新的 I/O (NIO) 和 Java 平台的众多 I/O 特性 (NIO.2) API，使得通过网络进行通信变得简单。本章并不试图涵盖 Java 语言中所有的网络特性，因为这个主题非常庞大。然而，它确实提供了一些对广大开发者最为有用的实用方法。你将了解一些标准的网络概念，例如套接字，以及
    Java 语言最新版本中引入的一些较新概念。如果你觉得本章内容有趣，并想了解更多关于 Java 网络的知识，可以在网上找到大量资源。


    16.1 监听服务器上的连接


    问题

    你想要创建一个监听远程客户端连接的服务器应用程序。


    解决方案


    建立一个服务器端应用程序，使用 `java.net.ServerSocket` 在指定端口上监听请求。以下 Java 类代表了可部署到服务器上的典型类，它监听
    `1234` 端口上的传入请求。当收到请求时，传入的消息会打印到命令行，并向客户端发送回响应。


    ```

    import java.io.BufferedReader;

    import java.io.IOException;

    import java.io.InputStreamReader;

    import java.io.PrintWriter;

    import java.net.ServerSocket;

    import java.net.Socket;

    public class SocketServer {

    public static void main(String a[]) {

    final int httpd = 1234;

    ServerSocket ssock = null;

    try {

    ssock = new ServerSocket(httpd);

    System.out.println("have opened port 1234 locally");

    Socket sock = ssock.accept();

    System.out.println("client has made socket connection");

    communicateWithClient(sock);

    System.out.println("closing socket");

    } catch (Exception e) {

    System.out.println(e);

    } finally {

    try{

    ssock.close();

    } catch (IOException ex) {

    System.out.println(ex);

    }

    }

    }

    public static void communicateWithClient(Socket socket) {

    BufferedReader in = null;

    PrintWriter out = null;

    try {

    in = new BufferedReader(

    new InputStreamReader(socket.getInputStream()));

    out = new PrintWriter(

    socket.getOutputStream(), true);

    String s = null;

    out.println("Server received communication!");

    while ((s = in.readLine()) != null) {

    System.out.println("received from client: " + s);

    out.flush();

    break;

    }

    } catch (Exception e) {

    e.printStackTrace();

    } finally {

    try {

    in.close();

    out.close();

    } catch (IOException ex) {

    ex.printStackTrace();

    }

    }

    }

    }

    ```


    本方法需与方案 16-2 配合使用。此示例启动服务器，执行此程序仅会打印“have opened port 1234 locally”。但若与方案 16-2
    中构建的客户端一起执行，则会在 `SocketServer` 中产生以下输出。


    ```

    have opened port 1234 locally

    client has made socket connection

    received from client: Here is a test.

    closing socket

    ```


    注意


    要使这两个方案协同工作，请先启动 SocketServer 程序（打开一个命令窗口并输入 **java SocketServer**），以便客户端能够使用服务器程序中打开的端口创建套接字。SocketServer
    启动后，再启动 SocketClient（打开另一个命令窗口并输入 **java SocketClient**）程序，即可看到两者协同工作。


    警告


    此 SocketServer 程序会在你的机器上打开一个端口（1234）。请确保你的机器上已设置并运行防火墙；否则，你将向所有人开放 1234 端口。这可能导致你的机器受到攻击。开放的端口会为攻击者入侵机器创造漏洞，就像在你家里敞开一扇门一样。请注意，本方案中的示例攻击面很小，因为服务器只运行一次，并且在会话关闭前仅打印来自客户端的一条消息。


    工作原理

    服务器应用程序可以通过一个或多个客户端应用程序的直接通信来执行工作。客户端应用程序通常与服务器应用程序通信，向服务器发送消息或数据进行处理，然后断开连接。服务器应用程序通常监听客户端应用程序，并在收到并接受连接后，根据客户端请求进行处理。要使客户端应用程序连接到服务器应用程序，服务器应用程序必须正在监听连接，并以某种方式处理连接数据。你不能简单地针对任意给定的主机和端口号组合运行客户端，因为这样做很可能会导致连接被拒绝的错误。服务器端应用程序必须做三件事：打开一个端口，接受并建立客户端连接，然后以某种方式与客户端连接进行通信。在本方案的解决方案中，`SocketServer`
    类完成了这三件事。


    从 `main()` 方法开始，该类在 1234 端口上打开一个新的套接字。这是通过创建 `ServerSocket` 的新实例并向其传递端口号来完成的。该端口号不得与服务器上当前正在使用的任何其他端口冲突。需要注意的是，低于
    1024 的端口通常保留给操作系统使用，因此请选择该范围以上的端口号。如果你尝试打开一个已被占用的端口，服务器套接字将无法成功创建，程序将失败。接下来，调用
    `ServerSocket` 对象的 `accept()` 方法，该方法返回一个新的 `Socket` 对象。调用 `accept()` 方法后，在客户端尝试连接到已设置端口的服务器程序之前，该方法不会执行任何操作。`accept()`
    方法会空闲等待，直到有连接请求，然后返回绑定到服务器套接字所设置端口的新 `Socket` 对象。此套接字还包含尝试连接的客户端的远程端口和主机名。它包含两个端点的信息，并唯一标识了传输控制协议
    (TCP) 连接。


    此时，服务器程序可以与客户端程序通信，它通过使用 `PrintWriter` 和 `BufferedReader` 对象来实现。在本方案的解决方案中，`communicateWithClient()`
    方法包含了接受来自客户端程序的消息、向客户端发送回消息以及将控制权返回给关闭服务器套接字的 `main()` 方法所需的所有代码。可以通过使用套接字的输入流生成一个新的
    `InputStreamReader` 实例来创建新的 `BufferedReader` 对象。类似地，可以使用套接字的输出流创建新的 `PrintWriter`
    对象。请注意，如果这些对象未能成功创建，则必须将此代码包装在 `try-catch` 块中。


    ```

    in = new BufferedReader(

    new InputStreamReader(socket.getInputStream()));

    out = new PrintWriter(

    socket.getOutputStream(), true);

    ```


    一旦这些对象成功创建，服务器就可以与客户端通信了。它使用一个循环来实现这一点，从 `BufferedReader` 对象（客户端输入流）读取数据，并使用 `PrintWriter`
    对象将消息发送回客户端。在本方案的解决方案中，服务器通过发出 `break` 来关闭连接，这会导致循环结束。然后控制权返回到 `main()` 方法。

