    引言


    本书教授 Java 编程语言的众多特性，从 Java 1.0 引入的特性到 Java 17 中新增的特性。Java 开发工具包（JDK）17 于 2021
    年 9 月发布，是一个长期支持（LTS）版本（即稳定支持数年的版本）。Java 具有向后兼容性。即使每六个月发布一个新 Java 版本，你也不需要专门学习某个特定版本。相反，你需要扎实掌握所有语言特性，以便在应用程序中使用它们。自本书上一版以来，发生了许多改进。本书新增了涵盖
    Java 9 到 Java 17 特性的示例。你实现的示例始终使用开源工具，例如 OpenJDK 和 Eclipse。


    本书涵盖 Java 开发的基础知识，例如安装 JDK、编写类和运行应用程序。它深入探讨了面向对象结构的开发、异常处理、单元测试和本地化等基本主题。本书可作为解决普通
    Java 开发人员可能遇到的某些问题的指南，可作为首次学习 Java 的入门起点，也可供已使用 Java 语言一段时间、希望精进 Java 开发技能的开发人员使用。它还将有助于高级
    Java 应用程序开发人员了解该语言新特性的一两个要点，甚至可能偶然发现一些过去未曾使用的技术。本书讨论的主题范围广泛，所涵盖问题的解决方案简洁明了。无论你的技能水平如何，本书都是一本随手可得的参考书，用于解决日常编程中遇到的问题。


    Java 编程语言由 Sun Microsystems 于 1995 年推出。Java 源自 C 和 C++等语言，其设计目标比旧语言更直观、更易用，特别是由于其简化的对象模型和自动化的内存管理等功能。当时，Java
    因其面向对象、并发的架构、出色的安全性和可扩展性，以及用 Java 语言开发的应用程序可在任何包含 JVM 的操作系统上运行，而引起了开发者的兴趣。自诞生以来，Java
    就被描述为一种允许开发者“一次编写，到处运行”的语言，因为代码被编译成包含字节码的类文件。生成的类文件可以在任何兼容的 JVM 上运行。这一概念使 Java
    在桌面开发领域立即获得成功，后来在多年间又衍生出不同的技术解决方案，例如基于 Web 的应用程序。如今，Java 已部署在广泛的设备上，包括手机、打印机、医疗设备等。


    Java 平台由一系列组件层级构成，从 JDK 开始，JDK 由 Java 运行时环境（JRE）、Java 编程语言以及开发和运行 Java 应用程序所需的平台工具组成。JRE
    包含 JVM，以及有助于开发 Java 应用程序的 Java 应用程序编程接口（API）和库。JVM 是编译后的 Java 类文件运行的基础，负责解释编译后的
    Java 类并执行代码。每个能够运行 Java 代码的操作系统都有自己的 JVM 版本。为此，任何运行本地 Java 桌面或独立 Java 应用程序的系统都必须安装
    JRE。但这不成问题，因为大多数主流操作系统都提供了 JRE 实现。每个操作系统都可以有自己的 JRE 风格。例如，移动设备可以运行完整 JRE 的精简版本，该版本针对运行
    Java 移动版（ME）和 Java SE 嵌入式应用程序进行了优化。Java 平台 API 和库是所有 Java 应用程序使用的预定义类的集合。任何在 JVM
    上运行的应用程序都会使用 Java 平台 API 和库。这使得应用程序能够使用预定义并加载到 JVM 中的功能，让开发者有更多时间关注其特定应用程序的细节。构成
    Java 平台 API 和库的类允许 Java 应用程序使用一组类与底层操作系统通信。因此，Java 平台负责将 Java 应用程序提供的一组指令解释为执行该应用程序的机器所需的操作系统命令。这为
    Java 开发者创建了一个外观，使他们能够编写代码，开发出可以一次编写、在任何包含相关 JVM 的机器上运行的应用程序。


    JVM 以及 Java 平台 API 和库在每个 Java 应用程序的生命周期中扮演着关键角色。已有整本书籍专门探讨平台和 JVM。本书侧重于用于开发 Java
    应用程序的 Java 语言，尽管在需要时会引用 JVM 和 Java 平台 API 和库。Java 语言是一种健壮、安全且现代的面向对象语言，可以开发在 JVM
    上运行的应用程序。Java 编程语言经过多次迭代的完善，每个新版本都变得更加强大、安全和现代。


    本书的官方参考是 OpenJDK，这是 Java 平台标准版（Java SE）的一个开源实现。对于示例，你使用 Eclipse，这是一个开源的 Java 集成开发环境（IDE），用于开发软件应用程序，并带有用于
    C/C++、JavaScript、PHP、HTML5、Python 和 Java 编程语言的各种插件。


    我们希望你喜欢阅读本书。'
- fmt: "# Who This Book Is For\n\nThis book is intended for anyone interested in learning\
    \ the Java programming language and/or who already knows the language, but would\
    \ like some information regarding Java features even if they have no experience\
    \ with algorithms. Those who have not yet programmed in the Java language can\
    \ read this book, and will allow them to get up and running quickly. Intermediate\
    \ and advanced Java developers looking to update their arsenal with the latest\
    \ features that Java makes available to them can also read the book to update\
    \ and refresh their skill set. There is, of course, a myriad of other essential\
    \ topics that will be useful to Java developers of any type.\n\n# How This Book\
    \ Is Structured\n\nThis book is structured such that it does not have to be read\
    \ from cover to cover. It is structured so that developers can choose which topics\
    \ they wish to read about and jump right to them. Each recipe contains a problem\
    \ to solve, one or more solutions to solve that problem, and an explanation of\
    \ how the solution works. The book is designed to allow developers to quickly\
    \ get a solution up and running so that they can be home in time for dinner.\n\
    \n# Source Code\n\nYou can access the source code for this book at `github.com/apress/java17-recipes`.\n\
    \nAbout the Authors About the Technical Reviewer\n\n# 1. Getting Started with\
    \ Java 17\n\nThis chapter presents a handful of recipes to help programmers who\
    \ are new to the Java language and those with experience in other languages become\
    \ accustomed to Java 17. You learn to install Java and configure an integrated\
    \ development environment (IDE) from which you develop applications and experiment\
    \ with the solutions provided in this book. For security reasons, we don’t recommend\
    \ installing something unless absolutely necessary. With no alternative, it is\
    \ easier and safer to download a compressed version and run the relevant scripts\
    \ for the respective operating system. You should be able to adapt our instructions\
    \ to install in the future any latest versions and releases of all the packages\
    \ mentioned in the book without any problem. You learn the basics of Java, such\
    \ as creating a class and accepting keyboard input. Documentation is often overlooked,\
    \ but you also quickly learn how to create great documentation for your Java code\
    \ in this chapter.\n\n> **Note**  \n> *Java 17 Recipes* is not intended as a complete\
    \ tutorial. Rather, it covers key concepts of the Java language. If you are truly\
    \ new to Java, you may want to pick up *Java 17 for Absolute Beginners* by Iuliana\
    \ Cosmina (Apress, 2022).\n\n## 1.1 Installing Java\n\n### Problem\n\nYou want\
    \ to install Java and experiment with the language.\n\n### Solution\n\nInstall\
    \ Java Development Kit 17 (JDK), which provides the language and a compiler.\n\
    \nNothing runs without Java. The runtime environment (JRE) lets you execute Java.\
    \ The JDK lets you compile Java sources into executable classes. There are two\
    \ main distributions: Oracle JDK and OpenJDK. We chose the second one under the\
    \ GNU General Public License because the Oracle JDK license changed for releases\
    \ starting in April 2019, permitting only certain uses at no cost. However, you\
    \ can download the commercial builds of JDK from Oracle under a non-open-source\
    \ license at the Oracle Technology Network.\n\nDownload the OpenJDK release for\
    \ your platform from [`https://jdk.java.net/17/`](https://jdk.java.net/17/), shown\
    \ in Figure 1-1 and extract the archive file on your PC.\n\n![Figure 1-1](images/323910_4_En_1_Chapter/323910_4_En_1_Fig1_HTML.jpg)\n\
    \n**Figure 1-1** OpenJDK 17 home page\n\n### How It Works\n\n*Java* is a trademark\
    \ owned by the Oracle Corporation. The language itself is open source, and its\
    \ evolution is controlled by the Java Community Process (JCP). You can read about\
    \ it at [`www.jcp.org/en/home/index`](http://www.jcp.org/en/home/index). While\
    \ Oracle Corporation does not own the language, its core development tends to\
    \ be steered by that company. It is Oracle Corporation that runs the JCP and owns\
    \ the `jcp.org` domain.\n\nThe Java `home` folder has the `bin` subfolder that\
    \ help you to develop and execute programs in Java language (with tools and utilities)\
    \ and that supports the execution of programs written in the Java programming\
    \ language (with an implementation of the Java Runtime Environment (JRE), class\
    \ libraries, and other files). Since Java 11, Oracle and the OpenJDK team decided\
    \ to distribute only the JDK and stop duplicating some of the things in JDK in\
    \ the JRE folder.\n\nThere are many editions of Java, such as the Mobile Edition\
    \ (ME) ([`www.oracle.com/java/technologies/javameoverview.html`](http://www.oracle.com/java/technologies/javameoverview.html))\
