    \ **startup.bat**。将生成第二个窗口，其中包含我们应用程序的日志。\n\n要检查 Tomcat 是否正常工作，请打开浏览器并输入 **localhost:8080**。您应该会看到如图\
    \ 13-1 所示的页面。\n\n![](img/323910_4_En_13_Fig1_HTML.jpg)\n\n图 13-1\n\n本地主机主页\n"
- fmt: "### How It Works\n\nThe following steps show what happens when you request\
    \ your browser to view a web page (e.g., `http://localhost:8080/`) on your browser.\n\
    \n1. When you type an address such as `www.website.com` into the address field,\
    \ your browser resolves into the corresponding Internet Protocol (IP) address,\
    \ usually by asking the Domain Name System provided by your Internet Service Provider\
    \ (ISP). Then your browser sends an HTTP (HyperText Transfer Protocol) request\
    \ to the newly found IP address to receive the content required.\n\n2. In reply,\
    \ the web server sends an HTTP response containing a plain-text HTML (HyperText\
    \ Markup Language) page. Images and other non-textual components, such as sound\
    \ and video clips, only appear on the page as hyperlinks to those resources stored\
    \ either on the same server or another server on the internet. The browser receives\
    \ the response, interprets the HTML code contained in the page, requests the non-textual\
    \ components from the server, and displays it to your screen.\n\nA URL like `http://localhost:8080/`\
    \ specifies that on the host side, the port number for HTTP is 8080 instead of\
    \ 80, which is the standard port for HTTP. This is because Tomcat expects and\
    \ routes HTTP traffic through port 8080. This is appropriate if you intend to\
    \ use Tomcat to handle requests for HTML/JSP pages and place it behind a server\
    \ (typically, the Apache web server) that handles static HTTP/HTTPS. But if you\
    \ intend to use Tomcat to handle HTTP/HTTPS, you should change its default ports\
    \ 8080 and 8443 to 80 and 443, respectively.\n\n### MVC (MODEL-VIEW-CONTROLLER)\n\
    \nThe most widely used pattern in application development is MVC (Model-View-Controller).\
    \ This pattern was described by Xerox, for the first time, in several publications\
    \ in the late eighties. The most important aspect is the separation into three\
    \ distinct components.\n\n- **Model** is related to the application logic and\
    \ persistence of data manipulation.\n- **View** is related to the presentation,\
    \ that is, the interface with the end user.\n- **Controller** is related to the\
    \ processing of requests.\n\nThis level of separation is important both for reasons\
    \ of stability and security of the application. In this chapter, the development\
    \ of Java web applications is based on the following main components.\n\n- **MySQL**\
    \ is a powerful relational database (RDBMS) for creating and managing databases\
    \ for web applications: in fact, any non-trivial web application is likely to\
    \ need handling data.\n- **JavaServer Pages (JSP)** is a technology that helps\
    \ you create such dynamically generated pages by converting script files into\
    \ executable Java modules.\n- **Tomcat** is a server application that can execute\
    \ your code and act as a web server for your dynamic pages.\n\n## 13.2 Creating\
    \ an HTML Page\n\n### Problem\n\nYou want to create a simple HTML page.\n\n###\
    \ Solution\n\nHTML documents are organized as a hierarchy of elements that normally\
    \ consist of content enclosed between a pair of start and end tags.\n\nThe following\
    \ is the schema.\n\n```\n<tag>contents</tag>\n```\n\nYou can nest HTML elements\
    \ inside each other. In fact, without nesting, no HTML page would be possible.\
    \ The tag can be organized in the following way (with indentation).\n\n```\n<outer>\n\
    \    <inner>content 2</inner>\n</outer>\n```\n\nFor example, the `<html>` and\
    \ `</html>` tags delimit the whole HTML document. However, some elements are empty,\
    \ in which case you can usually replace the end tag with a slash immediately before\
    \ the closing bracket of the start tag, as in `<img src=\"mypict.gif\"/>`.\n\n\
    You can insert comments in the following way.\n\n```\n<!-- This is a comment -->\n\
    ```\n\nEach tag can have attributes with values.\n\n```\n<tag attribute=\"value\"\
    >content</tag>\n```\n\nThe HTML document presents two sections.\n\n```\n<head>...</head>\n\
    <body>...</body>\n```\n\nThe following are the definitions.\n\n- Bold characters:\
    \ `<b>`\n- Underline characters: `<u>`\n- Italic characters: `<i>`\n- Newline:\
    \ `<br>`\n- Paragraph: `<p>`\n- Heading: from `<h1>` to `<h6>`\n\nThe `<title>`\
    \ tag defines a title for the HTML document. The `<style>` tag defines style information\
    \ for the HTML document. It can be inline for a section of the page or general\
    \ (in this case, it is defined in the `<head>` tag of the HTML page).\n\nListing\
    \ 13-1 shows the simplest possible HTML page. Copy the code in a text document\
    \ and then change the extension in HTML. Double-click the file, and the HTML page\
    \ opens in the predefined browser.\n\n```\n<html>\n<head>\n    <title>Page title</title>\n\
    \    <style>\n        body {background-color:gray; font-size=10pt;}\n    </style>\n\
    </head>\n<body>\n    <b>Bold characters</b><br>\n    <u>Underline characters</u><br>\n\
    \    <i>Italic characters</i><br>\n    A newline<br>\n    <p>A paragraph</p>\n\
    \    <h1>A heading</h1>\n</body>\n</html>\n\nListing 13-1\nbasic.html\n```\n\n\
    You can directly open a page or insert it in the `apache-tomcat-10.0.13\\webapps\\\
    examples` folder (see Figure 13-2) that shows the outcome of Listing 13-2.\n\n\
    ![Figure 13-2](images/323910_4_En_13_Chapter/323910_4_En_13_Fig2_HTML.jpg)\n\n\
    **Figure 13-2** A basic HTML page\n\nEssentially, an HTML document consists of\
    \ text, images, audio and video clips, active components such as scripts and executables,\
    \ and hyperlinks. A browser then interprets and renders the components in sequence,\
    \ mostly without inserting any empty space or newline between them.\n\nThe following\
    \ are the defining tables.\n\n- `<table>...</table>` opens/closes a table\n- `<tr>...</tr>`\
    \ (table row) creates a row\n- `<td>...</td>` (table data) creates a cell\n\n\
    A table consists of rows and columns containing text, images, and other components.\
    \ In almost every chapter of this book, you’ll find examples of tables. Tables\
    \ are an easy way to present components in an organized fashion.\n\nListing 13-2\
    \ is an example.\n\n```\n<table>\n    <tr>\n        <td>content 1</td>\n     \
    \   <td>content 2</td>\n    </tr>\n    <tr>\n        <td>content 3</td>\n    \
    \    <td>content 4</td>\n    </tr>\n</table>\n\nListing 13-2\ntable.html\n```\n\
    \nListing 13-2 generates the simple table shown in Figure 13-3.\n\n![Figure 13-3](images/323910_4_En_13_Chapter/323910_4_En_13_Fig3_HTML.jpg)\n\
    \n**Figure 13-3** An HTML-generated table\n\nTo turn your web pages into an interactive\
    \ experience, you must give users the ability to make choices and type or upload\
    \ information (i.e., when you create a new email, you type data in an online form).\
    \ To achieve this, you use the `<form>` element, which accepts data from the user\
    \ and sends it to the server.\n\nThis book is full of examples of input forms.\
    \ In Figure 13-4, the browser is Firefox.\n\n![Figure 13-4](images/323910_4_En_13_Chapter/323910_4_En_13_Fig4_HTML.png)\n\
    \n**Figure 13-4** An HTML form with examples of all input elements"
  raw: "### How It Works\n\nThe following steps show what happens when you request\
    \ your browser to view a web page (e.g., `http://localhost:8080/`) on your browser.\n\
    \n1.  When you type an address such as [`www.website.com`](http://www.website.com)\
    \ into the address field, your browser resolves into the corresponding Internet\
    \ Protocol (IP) address, usually by asking the Domain Name System provided by\
    \ your Internet Service Provider (ISP). Then your browser sends an HTTP (HyperText\
    \ Transfer Protocol) request to the newly found IP address to receive the content\
    \ required.\n\n2.  In reply, the web server sends an HTTP response containing\
    \ a plain-text HTML (HyperText Markup Language) page. Images and other non-textual\
    \ components, such as sound and video clips, only appear on the page as hyperlinks\
    \ to those resources stored either on the same server or another server on the\
    \ internet. The browser receives the response, interprets the HTML code contained\
    \ in the page, requests the non-textual components from the server, and displays\
    \ it to your screen.\n\nA URL like `http://localhost:8080`/ specifies that on\
    \ the host side, the port number for HTTP is 8080 instead of 80, which is the\
    \ standard port for HTTP. This is because Tomcat expects and routes HTTP traffic\
    \ through port 8080\\. This is appropriate if you intend to use Tomcat to handle\
    \ requests for HTML/JSP pages and place it behind a server (typically, the Apache\
    \ web server) that handles static HTTP/HTTPS. But if you intend to use Tomcat\
    \ to handle HTTP/HTTPS, you should change its default ports 8080 and 8443 to 80\
    \ and 443, respectively.\n\nMVC (MODEL-VIEW-CONTROLLER)\n\nThe most widely used\
    \ pattern in application development is MVC (Model-View-Controller ). This pattern\
    \ was described by Xerox, for the first time, in several publications in the late\
    \ eighties. The most important aspect is the separation into three distinct components.\n\
    \n*   Model is related to the application logic and persistence of data manipulation.\n\
    \n*   View is related to the presentation, that is, the interface with the end\
    \ user.\n\n*   Controller is related to the processing of requests.\n\nThis level\
    \ of separation is important both for reasons of stability and security of the\
    \ application. In this chapter, the development of Java web applications is based\
    \ on the following main components.\n\n*   MySQL is a powerful relational database\
    \ (RDBMS) for creating and managing databases for web applications: in fact, any\
    \ non-trivial web application is likely to need handling data.\n\n*   JavaServer\
    \ Pages (JSP) is a technology that helps you create such dynamically generated\
    \ pages by converting script files into executable Java modules.\n\n*   Tomcat\
    \ is a server application that can execute your code and act as a web server for\
    \ your dynamic pages.\n\n## 13.2 Creating an HTML Page\n\n### Problem\n\nYou want\
    \ to create a simple HTML page.\n\n### Solution\n\nHTML documents are organized\
    \ as a hierarchy of elements that normally consist of content enclosed between\
    \ a pair of start and end tags.\n\nThe following is the schema.\n\n```\ncontents\n\
    ```\n\nYou can nest HTML elements inside each other. In fact, without nesting,\
    \ no HTML page would be possible. The tag can be organized in the following way\
    \ (with indentation).\n\n```\n\ncontent 2\n\n```\n\nFor example, the `<html>`\
    \ and `</html>` tags delimit the whole HTML document. However, some elements are\
    \ empty, in which case you can usually replace the end tag with a slash immediately\
    \ before the closing bracket of the start tag, as in `<img src=\"mypict.gif\"\
    />`.\n\nYou can insert comments in the following way.\n\n```\n\nEach tag can have\
    \ attributes with values.\n\n```\n\nThe HTML document presents two sections.\n\
    \n```\n...\n...\n```\n\nThe following are the definitions.\n\n*   Bold characters:\
    \ <b>\n\n*   Underline characters: <u>\n\n*   Italic characters: <i>\n\n*   Newline:\
    \ <br>\n\n*   Paragraph: `<p>`\n\n*   `Heading: from <h1> to <h6>`\n\nThe title\
    \ tag\ndefines a title for the HTML document.\nThe style tag defines style information\
    \ for the HTML document. It can\nbe inline for a section of the page or general\
    \ (in this case, it is\ndefined in the head tag of the HTML page).\n\nListing\
    \ [13-1](#323910_4_En_13_Chapter.xhtml#PC8) shows the\nsimplest possible HTML\
    \ page. Copy the code in a text document and then\nchange the extension in HTML.\
    \ Double-click the file, and the HTML page\nopens in the predefined browser.\n\
    \n```\nPage title\n\nbody {background-color:gray; font-size=10pt;}\n\nBold characters\n\
    Underline characters\nItalic characters\nA newline\nA paragraph\nA heading\n\n\
    Listing 13-1\nbasic.html\n```\n\nYou can directly open a page or insert it in\
    \ the `apache-tomcat-10.0.13\\webapps\\examples`\nfolder (see Figure [13-2](#323910_4_En_13_Chapter.xhtml#Fig2))\
    \ that shows\nthe outcome of Listing [13-2](#323910_4_En_13_Chapter.xhtml#PC9).\n\
    \n![](images/323910_4_En_13_Chapter/323910_4_En_13_Fig2_HTML.jpg)\n\nFigure 13-2\n\
    A basic HTML page\n\nEssentially, an HTML document consists of text, images, audio\
    \ and\nvideo clips, active components such as scripts and executables, and\nhyperlinks.\
    \ A browser then interprets and renders the components  in sequence, mostly\n\
    without inserting any empty space or newline between them.\n\nThe following are\
    \ the defining tables.\n\n*   `<table>...</table>`\n    opens/closes a table\n\
    \n*   `<tr>...</tr>`\n    (table row) creates a row\n\n*   `<td>...</td>`\n  \
    \  (table data) creates a cell\n\nA table consists of rows and columns containing\
    \ text, images, and\nother components. In almost every chapter of this book, you’ll\
    \ find\nexamples of tables. Tables are an easy way to present components in an\n\
    organized fashion.\n\nListing [13-2](#323910_4_En_13_Chapter.xhtml#PC9) is an\
    \ example.\n\n```\n\ncontent 1\ncontent 2\n\ncontent 3\ncontent 4\n\nListing 13-2\n\
    table.html\n```\n\nListing [13-2](#323910_4_En_13_Chapter.xhtml#PC9) generates\
    \  the simple table\nshown in Figure [13-3](#323910_4_En_13_Chapter.xhtml#Fig3).\n\
    \n![](images/323910_4_En_13_Chapter/323910_4_En_13_Fig3_HTML.jpg)\n\nFigure 13-3\n\
    An HTML-generated table\n\nTo turn your web pages into an interactive experience,\
    \ you must give\nusers the ability to make choices and type or upload information\
    \ (i.e.,\nwhen you create a new email, you type data in an online form). To\n\
    achieve this, you use the form element, which accepts data from the user\nand\
    \ sends it to the server.\n\nThis book is full of examples of input forms. In\
    \ Figure [13-4](#323910_4_En_13_Chapter.xhtml#Fig4), the browser\nis Firefox.\n\
    \n![](images/323910_4_En_13_Chapter/323910_4_En_13_Fig4_HTML.png)\n\nFigure 13-4\n\
    An HTML form with examples of all input elements"
  trans: "\n### 工作原理\n\n以下步骤展示了当您在浏览器中请求查看网页（例如 `http://localhost:8080/`）时发生的情况。\n\
    \n1.  当您在地址栏中输入诸如 [`www.website.com`](http://www.website.com) 之类的地址时，您的浏览器通常会通过询问您的互联网服务提供商（ISP）提供的域名系统（DNS）来解析出相应的互联网协议（IP）地址。然后，您的浏览器会向新找到的\
    \ IP 地址发送一个 HTTP（超文本传输协议）请求，以获取所需的内容。\n\n2.  作为响应，Web 服务器会发送一个包含纯文本 HTML（超文本标记语言）页面的\
    \ HTTP 响应。图像和其他非文本组件（例如声音和视频剪辑）仅作为指向这些资源的超链接出现在页面上，这些资源可以存储在同一台服务器或互联网上的另一台服务器上。浏览器接收响应，解释页面中包含的\
    \ HTML 代码，从服务器请求非文本组件，并将其显示在您的屏幕上。\n\n像 `http://localhost:8080`/ 这样的 URL 指定了在主机端，HTTP\
    \ 的端口号是 8080，而不是标准的 HTTP 端口 80。这是因为 Tomcat 期望并通过端口 8080 路由 HTTP 流量。如果您打算使用 Tomcat\
    \ 处理 HTML/JSP 页面的请求，并将其置于处理静态 HTTP/HTTPS 的服务器（通常是 Apache Web 服务器）之后，这样做是合适的。但是，如果您打算使用\
    \ Tomcat 直接处理 HTTP/HTTPS，则应将默认端口 8080 和 8443 分别更改为 80 和 443。\n\nMVC（模型-视图-控制器）\n\
    \n应用程序开发中使用最广泛的模式是 MVC（模型-视图-控制器）。这种模式由施乐公司在八十年代末期的几份出版物中首次描述。其最重要的方面是分离为三个不同的组件。\n\
    \n*   **模型** 与应用程序逻辑和数据操作的持久性相关。\n*   **视图** 与表示层相关，即与最终用户的界面。\n*   **控制器** 与请求的处理相关。\n\
    \n这种分离级别对于应用程序的稳定性和安全性都很重要。在本章中，Java Web 应用程序的开发基于以下主要组件。\n\n*   **MySQL** 是一个强大的关系数据库（RDBMS），用于为\
    \ Web 应用程序创建和管理数据库：实际上，任何非平凡的 Web 应用程序都可能需要处理数据。\n*   **JavaServer Pages (JSP)**\
    \ 是一种技术，通过将脚本文件转换为可执行的 Java 模块，帮助您创建此类动态生成的页面。\n*   **Tomcat** 是一个服务器应用程序，可以执行您的代码并充当您的动态页面的\
    \ Web 服务器。\n\n## 13.2 创建 HTML 页面\n\n### 问题\n\n您想创建一个简单的 HTML 页面。\n\n### 解决方案\n\
    \nHTML 文档被组织成元素的层次结构，这些元素通常由包含在一对开始和结束标签之间的内容组成。\n\n以下是其模式。\n\n```\n内容\n```\n\n\
    您可以将 HTML 元素相互嵌套。实际上，没有嵌套，就不可能存在 HTML 页面。标签可以按以下方式组织（带缩进）。\n\n```\n\n内容 2\n\n\
    ```\n\n例如，`<html>` 和 `</html>` 标签界定了整个 HTML 文档。但是，有些元素是空元素，在这种情况下，您通常可以用一个斜杠替换结束标签，紧跟在开始标签的结束尖括号之前，如\
    \ `<img src=\"mypict.gif\"/>`。\n\n您可以按以下方式插入注释。\n\n```\n\n每个标签都可以有带值的属性。\n\n```\n\
    \nHTML 文档包含两个部分。\n\n```\n...\n...\n```\n\n以下是定义。\n\n*   粗体字符：<b>\n*   下划线字符：<u>\n\
    *   斜体字符：<i>\n*   换行：<br>\n*   段落：`<p>`\n*   `标题：从 <h1> 到 <h6>`\n\n标题标签\n为 HTML\
    \ 文档定义标题。\n样式标签为 HTML 文档定义样式信息。它可以\n是页面某个部分的内联样式，也可以是全局样式（在这种情况下，它\n定义在 HTML 页面的\
    \ head 标签中）。\n\n清单 13-1 展示了\n最简单的 HTML 页面。将代码复制到文本文档中，然后将\n扩展名改为 HTML。双击该文件，HTML\
    \ 页面\n将在预定义的浏览器中打开。\n\n```\n页面标题\n\nbody {background-color:gray; font-size=10pt;}\n\
    \n粗体字符\n下划线字符\n斜体字符\n一个换行\n一个段落\n一个标题\n\n清单 13-1\nbasic.html\n```\n\n您可以直接打开一个页面，或者将其插入到\
    \ `apache-tomcat-10.0.13\\webapps\\examples`\n文件夹中（见图 13-2），该图展示了\n清单 13-2 的结果。\n\
    \n![](img/323910_4_En_13_Fig2_HTML.jpg)\n\n图 13-2\n一个基本的 HTML 页面\n\n本质上，一个 HTML\
    \ 文档由文本、图像、音频和\n视频剪辑、活动组件（如脚本和可执行文件）以及\n超链接组成。然后，浏览器会按顺序解释和渲染这些组件，大多数情况下\n不会在它们之间插入任何空格或换行。\n\
    \n以下是定义表格的标签。\n\n*   `<table>...</table>`\n    打开/关闭一个表格\n*   `<tr>...</tr>`\n\
    \    （表格行）创建一个行\n*   `<td>...</td>`\n    （表格数据）创建一个单元格\n\n一个表格由包含文本、图像和\n其他组件的行和列组成。在本书的几乎每一章中，您都会找到\n\
    表格的示例。表格是以有组织的方式呈现组件的一种简单方法。\n\n清单 13-2 是一个示例。\n\n```\n\n内容 1\n内容 2\n\n内容 3\n\
    内容 4\n\n清单 13-2\ntable.html\n```\n\n清单 13-2 生成了图 13-3 中所示的简单表格。\n\n![](img/323910_4_En_13_Fig3_HTML.jpg)\n\
    \n图 13-3\n一个由 HTML 生成的表格\n\n要将您的网页转变为交互式体验，您必须赋予\n用户做出选择、输入或上传信息的能力（例如，\n当您创建新电子邮件时，您会在在线表单中输入数据）。为了\n\
    实现这一点，您可以使用表单元素，它接受来自用户的数据\n并将其发送到服务器。\n\n本书包含大量输入表单的示例。在图 13-4 中，浏览器\n是 Firefox。\n\
    \n![](img/323910_4_En_13_Fig4_HTML.png)\n\n图 13-4\n一个包含所有输入元素示例的 HTML 表单\n"
- fmt: "The various types of `input` elements let the user enter a string of text\
    \ or a password, check one or more check boxes, choose one of several radio buttons,\
    \ submit a form or reset a form’s fields. The `textarea` element lets the user\
    \ enter several lines of text, while the `fieldset` element lets you group several\
    \ input fields under one or more headings. To present multiple choices, you use\
    \ the `select` element, which contains one `option` element for each alternative.\
    \ Listing [13-3](#323910_4_En_13_Chapter.xhtml#PC10) is the source code for Figure\
    \ [13-4](#323910_4_En_13_Chapter.xhtml#Fig4).\n\n```\nExample of input form\n\n\
    td.h {font-size: 120%; font-weight: bold}\n\nElementAttribute\nResult\n\ninputtype=\"\
    text\"\n\ninputtype=\"password\"\n\ninputtype=\"checkbox\"\n\nA\nB\nC\n\ninputtype=\"\
    radio\"\n\nyes\nno\n\ninputtype=\"submit\"\n\ninputtype=\"reset\"\n\ninputtype=\"\
    button\"\n\ntextarea\nDefault text\n\nfieldset\n\nDimensions:\nWidth \nHeight\n\
    \nselect / option\n\nPizza\nSpaghetti\n\nListing 13-3\nform.html\n```\n\nWe’ve\
    \ highlighted two lines. The first line, which contains the `form` element, shows\
    \ that the `action` attribute is set to the empty string. The `action` attribute\
    \ defines the URL of the page that must handle the request form. An empty string\
    \ means that the same page displaying the form also handles it. The second highlighted\
    \ line shows how you can use the `input` element to set parameters without the\
    \ user being aware of it (unless he or she peeks at the source, that is).\n\n\
    If you fill in the form shown in Figure [13-4](#323910_4_En_13_Chapter.xhtml#Fig4)\
    \ and click the Submit button (or hit the `Enter` key), you’ll see in the address\
    \ field of your browser that the following string appears at the end of the URL\
    \ (we’ve inserted newlines for readability).\n\n```\n?agent=007\n&t=bla+bla+bla\n\
    &p=abc\n&abc=a\n&abc=c\n&yn=n\n&ta=ciao!\n&w=1\n&h=2\n&food=pizza\n```\n\nThe\
    \ browser has translated each `input` element into a `parameter-name=parameter-value`\
    \ string. Notice that each space in the text fields has been replaced by a plus\
    \ sign, including the spaces within the password. Also, notice that the `abc`\
    \ parameter appears twice because two of the three available check boxes are checked.\
    \ To avoid seeing all the parameters in the browser, use in the `form` element\
    \ the attribute `method=\"POST\"`. Moreover, the POST method is more secure because\
    \ data are stored in the HTTP request body, and it has no restrictions on data\
    \ length. For more information, you can simply go to [`www.w3schools.com`](http://www.w3schools.com),\
    \ one of the more important and complete sites for web development.\n\n## How\
    \ It Works\n\nSeveral web sites explain HTML and components like CSS and JavaScript.\
    \ Therefore, instead of covering everything there is to know about them, a few\
    \ key concepts are introduced here for anyone beginning the study of web development.\
    \ HyperText Markup Language (HTML) is the standard “tag” markup language used\
    \ for creating HTML pages (with an `.htm` or `.html` extension). Therefore, it\
    \ is the base for JSP pages. The browser interprets the HTML code contained in\
    \ the page and requests the non-textual components from the server to display\
    \ everything, such as images and video clips, to the user window.\n\n## 13.3 Creating\
    \ a JSP Page\n\n### Problem\n\nYou want to create and configure a simple dynamic\
    \ web page.\n\n### Solution\n\nJSP is a technology that lets you add dynamic content\
    \ to web pages.\n\nListing [13-4](#323910_4_En_13_Chapter.xhtml#PC12) is a plain\
    \ HTML page that displays “Hello World!” in your browser’s window.\n\n```\nHello\
    \ World static HTML\n\nHello World!\n\nListing 13-4\nhello.html\n```\n\nCreate\
    \ the `%CATALINA_HOME%\\webapps\\ROOT\\tests\\` folder and store in it `hello.html`.\
    \ Then type the following URL in your browser to see the web page.\n\n```\nhttp://localhost:8080/tests/hello.html\n\
    ```\n\nNormally, to ask your browser to check that the syntax of the page conforms\
    \ to the XHTML standard of the World Wide Web Consortium (W3C), you would have\
    \ to start the page with the following lines.\n\nYou’d also have to replace\n\n\
    ```\n\nwith\n\n```\n\nHowever, for this simple example, let’s keep the code to\
    \ what’s essential. Figure [13-5](#323910_4_En_13_Chapter.xhtml#Fig5) shows how\
    \ this page appears in a browser.\n\n![](images/323910_4_En_13_Chapter/323910_4_En_13_Fig5_HTML.jpg)\n\
    \nFigure 13-5 “Hello World!” in plain HTML\n\nIf you direct your browser to show\
    \ the page source, not surprisingly, you’ll see what’s shown in Listing [13-4](#323910_4_En_13_Chapter.xhtml#PC12).\
    \ To obtain the same result with a JSP page, you only need to insert a JSP directive\
    \ before the first line, as shown in Listing [13-5](#323910_4_En_13_Chapter.xhtml#PC17),\
    \ and change the file extension from `.html` to `.jsp`.\n\n```\nHello World dynamic\
    \ HTML\n\nHello World!\n\nListing 13-5\n“Hello World!” in a Boring JSP Page\n\
    ```\n\nAs with `hello.html`, you can view `hello.jsp` by placing it in Tomcat’s\
    \ `ROOT\\tests` folder. Type the following URL in your browser to see the web\
    \ page (see Figure [13-6](#323910_4_En_13_Chapter.xhtml#Fig6)).\n\n![](images/323910_4_En_13_Chapter/323910_4_En_13_Fig6_HTML.jpg)\n\
    \nFigure 13-6 “Hello World!” in JSP\n\n```\nhttp://localhost:8080/tests/hello.jsp\n\
    ```\n\nThere isn’t much point in using JSP for such a simple page. It only pays\
    \ to use JSP if you include dynamic content. Check out Listing [13-6](#323910_4_En_13_Chapter.xhtml#PC19)\
    \ for something juicier.\n\n```\nHello World dynamic HTML\n\nHello World!\nuser-agent\
    \ \" + userAgent);\n%>\n\nListing 13-6\nhello.jsp\n```\n\nThe code within the\
    \ `<% ... %>` pair is a scriptlet written in Java. When Tomcat’s JSP engine interprets\
    \ this module, it creates a Java servlet like that shown in Listing [13-7](#323910_4_En_13_Chapter.xhtml#PC20)\
    \ (with some indentation and empty lines removed).\n\n```\nout.write(\"\\r\\n\"\
    );\nout.write(\"\\r\\n\");\nout.write(\"Hello World dynamic\nHTML \\r\\n\");\n\
    out.write(\"\\r\\n\");\nString userAgent = request.getHeader(\"user-agent\");\n\
    out.println(\"User-agent: \" + userAgent);\nout.write(\"\\r\\n\");\nout.write(\"\
    Hello World!\\r\\n\");\nout.write(\"\\r\\n\");\nout.write(\"\\r\\n\");\nListing\
    \ 13-7\nJava Code from the “Hello World!” JSP Page\n```\n\n### How It Works\n\n\
    In absence of JSP, to update the appearance or the content of plain static HTML\
    \ pages, you must always do it by hand. Even if all you want to do is change a\
    \ date or a picture, you must edit the HTML file and type in your modifications.\
    \ Nobody is going to do it for you, whereas with JSP, you can make the content\
    \ dependent on many factors, including the time of the day, the information provided\
    \ by the user, the user’s history of interaction with your web site, and even\
    \ the user’s browser type. This capability is essential to provide online services\
    \ in which you can tailor each response to the viewer who made the request, depending\
    \ on the viewer’s preferences and requirements.\n\nThe following steps explain\
    \ how the web server creates the web page.\n\n1.  Your browser sends an HTTP request\
    \ to the web server. This doesn’t change with JSP, although the URL probably ends\
    \ in `.jsp` instead of `.html` or `.htm`.\n\n2.  The web server is a Java server,\
    \ with the extensions necessary to identify and handle Java servlets. The web\
    \ server recognizes that the HTTP request is for a JSP page and forwards it to\
    \ a JSP engine.\n\n3.  The JSP engine loads the JSP page from the disk and converts\
    \ it into a Java servlet. From this point on, this servlet is indistinguishable\
    \ from any other servlet developed directly in Java rather than JSP. However,\
    \ the automatically generated Java code of a JSP servlet is not always easy to\
    \ read, and you should never modify it by hand.\n\n4.  The JSP engine compiles\
    \ the servlet into an executable class and forwards the original request to another\
    \ part of the web server called the *servlet engine*. Note that the JSP engine\
    \ only converts the JSP page to Java and recompiles the servlet if it finds that\
    \ the JSP page has changed since the last request."
  raw: "The various types of `input` elements let\nthe user enter a string of text\
    \ or a password, check one or more check\nboxes, choose one of several radio buttons,\
