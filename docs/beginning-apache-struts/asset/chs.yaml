  \ U T S 标 签 参 考\n\n**461**\n\n示例\n\n考虑下面的布局页面（mylayout.jsp）片段：\n\n<table>\n\n<tr><td><tiles:insert\
  \ attribute=\"header\"/></td></tr>\n\n<tr><td><tiles:insert attribute=\"body\"/></td></tr>\n\
  \n<tr><td><tiles:insert attribute=\"footer\"/></td></tr>\n\n</table>\n\n此布局指定了三个元素（header、body\
  \ 和 footer）的相对位置。\n\n要使用此布局，您可以在共享的 JSP 页面（shared-layouts.jsp）中像这样声明一个 `<tiles:definition>`：\n\
  \n\n\n<tiles:definition id=\".basic\" page=\"/mylayout.jsp\" /> 这按原样声明了页面，未做任何自定义。然而，通常来说，在声明布局时对其进行自定义是合理的。在前面的示例中，我们可能希望为\
  \ header 和 footer 元素指定内容：\n\n<tiles:definition id=\".basic\" page=\"/mylayout.jsp\"\
  >\n\n<tiles:put name=\"header\" value=\"/navbar.jsp\" />\n\n<tiles:put name=\"footer\"\
  \ value=\"/terms-of-use.jsp\" />\n\n</tiles:definition>\n\n在这段代码片段中，header 现在指向\
  \ navbar.jsp，而 footer 指向 terms-of-use.jsp。\n\n因此，剩下的元素 body 是未定义的。要使用已声明的定义，你需要包含共享的\
  \ JSP，然后使用 <tiles:insert>：\n\n<%@ include file=\"shared-layouts.jsp\" %>\n\n<tiles:insert\
  \ definition=\".basic\">\n\n<tiles:put name=\"body\" value=\"hello-world.jsp\" />\n\
  \n</tiles:insert>\n\n请注意，现在 body 被定义为指向 hello-world.jsp。\n\n**put**\n\nput 在布局中定义一个命名属性。这允许你自定义布局以进行显示。\n\
  \n使用限制\n\nput 标签必须嵌套在 <tiles:insert> 或 <tiles:definition> 中。你还必须指定 name（指布局中的属性）以及该属性的\
  \ content。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048AppC.fm\
  \ 第 462 页 2006 年 1 月 17 日星期二 下午 4:46\n\n**462**\n\n附录 C ■ STRUTS 标签参考\n\n属性\n\n\
  • name：put 定义的属性名称。\n\n• value/content：表示属性内容的 URL 或字符串。value 和 content 是同义词。\n\n\
  • beanName/beanProperty/beanScope：用于定位被查询的对象，以确定此 put 的值。详情请参考表 C-14。这些属性可以替代 value\
  \ 或 content 使用。\n\n• type：指示此 put 值的含义——它是 JSP 页面的 URL（type=\"page\" 或 type=\"template\"\
  ）、Tiles 定义（type=\"definition\" 或 type=\"instance\"）还是字符串（type=\"string\"）？如果未指定，则默认为\
  \ type=\"page\"，除非 direct=\"true\"，此时 type=\"string\"。\n\n• direct：如果设置为 true，则\
  \ value 将被解释为字面字符串，而不是需要求值的引用（JSP 页面的 URL 或 Tiles 定义）。默认值为 false。\n\n• role：一个角色，必须与远程用户的任一角色匹配，此\
  \ put 才会被处理。关于角色的简要讨论，请参考 <logic:present> 条目。\n\n示例\n\n请参考 <tiles:definition> 条目中的示例，了解\
  \ put 的典型用法。\n\n你也可以像这样在 put 的标签体内指定其值：\n\n<tiles:put name=\"myPageTitle\">Here's\
  \ looking at you!</tiles:put> 当你需要指定不符合 XML 属性格式的文本时，这种形式很有用。\n\n**putList 和 add**\n\
  \nputList 创建一个项目列表，并为该列表指定一个名称。一个或多个 add 标签嵌套在 putList 中，用于向列表添加元素。\n\n使用限制\n\n\
  你必须为 putList 指定 name 属性。\n\n属性\n\nputList 只有一个属性 name，即列表的名称。add 标签与 <tiles:put>\
  \ 具有完全相同的属性，但 name 属性除外。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  Doray_6048AppC.fm 第 463 页 2006 年 1 月 17 日星期二 下午 4:46\n\n附录 C ■ STRUTS 标签参考\n\n**463**\n\
  \n示例\n\n你应该理解，putList 和 add 不能像 <tiles:put> 那样轻松地用于自定义布局。例如，你可能期望能够像这样定义布局的自定义：\n\
  \n<tiles:insert page=\"mylayout.jsp\">\n\n<tiles:putList name=\"sideBarItems\">\n\
  \n<tiles:add value=\"/sidebar1.jsp\"/>\n\n<tiles:add value=\"/sidebar2.jsp\"/>\n\
  \n<tiles:add value=\"/sidebar3.jsp\"/>\n\n</tiles:putList>\n\n</tiles:insert>\n\n\
  然后，在布局页面（mylayout.jsp）中，你可能期望这样做：\n\n<tiles:importAttribute />\n\n<logic:iterate\
  \ name=\"sideBarItems\" id=\"item\">\n\n<tiles:insert name=\"item\"/> //错误！！\n\n\
  </logic:iterate>\n\n\n\n这种方法行不通：你不能在 `<logic:iterate>` 内部嵌套 `<tiles:insert>`（会抛出\
  \ ServletException）。你只能退而求其次，使用脚本小程序来遍历这些项目：\n\n<tiles:importAttribute />\n\n<%\n\
  \nfor(Iterator items = sideBarItems.iterator(); items.hasNext();){\n\nString item\
  \ = items.next().toString();\n\n%>\n\n<tiles:insert name=\"<%=item %>\"/>\n\n<%\
  \ } %>\n\n这种做法的可读性差得多。\n\n**get**\n\nget 从 Tile 的 ComponentContext 中读取 name 属性（该属性通过\
  \ `<tiles:put>` 或 `<tiles:putList>` 设置），将值解释为一个 JSP 页面或 Tiles 定义，并将其输出写入响应流。\n\n\
  使用限制\n\n你需要指定要显示的内容，因此 name 属性是必需的。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048AppC.fm 第 464 页 2006 年 1 月 17 日，星期二 下午 4:46\n\n**464**\n\n附录 C ■ STRUTS\
  \ 标签参考\n\n属性\n\n• name：要包含的 Tiles 属性的名称。\n\n• ignore：如果找不到 name 指定的属性，设置 ignore=\"\
  true\" 会静默失败。否则，将抛出异常，这是默认行为。\n\n• flush：其含义与通常相同（参见表 C-14）。\n\n• role：其含义与通常相同（参见表\
  \ C-14）。\n\n示例\n\n考虑以下代码片段：\n\n<tiles:insert page=\"one.jsp\">\n\n<tiles:put name=\"\
  myTilesAttr\" value=\"two.jsp\"/>\n\n</tiles:insert>\n\n<tiles:get name=\"myTilesAttr\"\
  \ />\n\n这会导致在 one.jsp 的内容之后显示 two.jsp 的内容。\n\n**getAsString**\n\n此标签与 `<tiles:get>`\
  \ 类似，但 Tiles 属性被解释为字面字符串。这对于显示静态文本非常有用（例如，用于网页的 `<title>` 部分）。\n\n使用限制\n\n你需要指定要显示的内容，因此\
  \ name 属性是必需的。\n\n属性\n\n• name：要显示的 Tiles 属性的名称。如果找不到，将抛出异常。\n\n• flush：其含义与通常相同（参见表\
  \ C-14）。\n\n• role：其含义与通常相同（参见表 C-14）。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048AppC.fm 第 465 页 2006 年 1 月 17 日，星期二 下午 4:46\n\n附录 C ■ STRUTS 标签参考\n\n\
  **465**\n\n示例\n\n考虑以下代码片段：\n\n<tiles:insert page=\"one.jsp\">\n\n<tiles:put name=\"\
  myTilesAttr\" value=\"two.jsp\"/>\n\n</tiles:insert>\n\n<tiles:getAsString name=\"\
  myTilesAttr\" />\n\n这会导致在 one.jsp 的内容之后显示字符串 “two.jsp”。\n\n**useAttribute**\n\n\
  此标签将一个 Tiles 属性暴露为具有指定作用域的 Java 变量。请将此与 `<tiles:importAttribute>` 进行对比。\n\n使用限制\n\
  \n你需要指定要暴露的 Tiles 属性的名称。\n\n属性\n\n• name：要暴露的 Tiles 属性的名称。必需。\n\n• id：脚本小程序或其他标签将用来识别该\
  \ Tiles 属性的名称。如果省略，id 默认为 Tiles 属性的名称。\n\n• scope：暴露变量的 JSP 作用域（page、request、session\
  \ 或 application）。默认为 page 作用域。\n\n• classname：暴露变量的类名。\n\n• ignore：如果为 true，则在找不到\
  \ Tiles 属性时静默失败。默认行为是抛出异常。\n\n示例\n\n考虑以下代码片段：\n\n<tiles:insert page=\"mylayout.jsp\"\
  >\n\n<tiles:put name=\"myTilesAttr\" value=\"one\"/>\n\n</tiles:insert>\n\n<tiles:useAttribute\
  \ name=\"myTilesAttr\" id=\"x\"/>\n\n<%= x %>\n\n在这里，我们将 Tiles 属性 myTilesAttr 暴露为一个名为\
  \ x 的脚本变量。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048AppC.fm\
  \ 第 466 页 2006 年 1 月 17 日，星期二 下午 4:46\n\n**466**\n\n附录 C ■ STRUTS 标签参考\n\n**importAttribute**\n\
  \nimportAttribute 将指定的 Tiles 属性（使用 `<tiles:put>` 或 `<tiles:putList>` 声明）复制到指定的作用域中。回想一下，每个\
  \ Tile 将其属性存储在一个 ComponentContext 实例中，而不是直接存储在 request、session、page 或 application\
  \ 作用域中。因此，你需要将属性从 ComponentContext 复制到 request、session、page 或 application 作用域中，以便非\
  \ Tiles 标签能够读取这些属性。importAttribute 正是执行此操作。\n\n使用限制\n\n\n\n`importAttribute` 需要一个\
  \ `ComponentContext` 来读取数据，如果找不到实例，则会抛出异常。这意味着你必须将 `<tiles:importAttribute>` 放置在\
  \ `<tiles:insert>` 之后，或者放置在由 `<tiles:insert>` 调用的页面内，以确保 `ComponentContext` 已被创建。\n\
  \n属性\n\n• `name`: 指定要复制的属性名称。如果省略，则 `ComponentContext` 的所有属性都会被复制到指定的作用域中。\n\n•\
  \ `scope`: 指定要将属性复制到的作用域（`request`、`session`、`page` 或 `application`）。\n\n如果省略，则使用页面作用域（`page`）。\n\
  \n• `ignore`: 如果找不到指定的属性，默认情况下会抛出异常。\n\n设置 `ignore=\"true\"` 会使 `importAttribute`\
  \ 静默失败。\n\n示例\n\n考虑以下代码片段：\n\n<tiles:insert page=\"mylayout.jsp\">\n\n<tiles:put\
  \ name=\"object1\" value=\"one\"/>\n\n<tiles:put name=\"object2\" value=\"two\"\
  />\n\n<tiles:put name=\"object3\" value=\"three\"/>\n\n<tiles:put name=\"object4\"\
  \ value=\"four\"/>\n\n</tiles:insert>\n\n<bean:write name=\"object1\"/> //错误！！\n\
  \n发生错误是因为 `<bean:write>` 无法在任何作用域中找到 `object1`。\n\n要使其正常工作，你需要使用 `<tiles:importAttribute>`：\n\
  \n<tiles:importAttribute />\n\n<bean:write name=\"object1\"/> //正确\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048AppC.fm Page 467 Tuesday, January 17, 2006 4:46 PM\n\n附录 C ■ STRUTS\
  \ 标签参考\n\n**467**\n\n**initComponentDefinitions**\n\n此标签用于初始化 Tiles 子系统。回想一下，Tiles\
  \ 最初并非 Struts 的一部分，实际上它可以独立使用。因此，此标签仅在你于 Struts 之外使用 Tiles 时才有用。例如，如果你编写自己的 Servlet，此标签就很有用，因为它允许你初始化\
  \ Tiles 子系统，而无需依赖 Struts 来完成。\n\n坦率地说，Tiles 现在与 Struts 的集成度如此之高，以至于这个标签已不再非常实用。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048AppC.fm Page 468\
  \ Tuesday, January 17, 2006 4:46 PM\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048AppD.fm Page 469 Tuesday, January 24, 2006 4:45 PM\n\n附录 D\n\n■ ■ ■\n\
  \n答案\n\n**本**附录列出了正文中提出问题的答案。\n\n**第 1 章：引言**\n\n**问题：** 如果将执行不同功能的代码片段分别打包，并为它们提供标准化的相互通信方式，那么人们就可以维护或处理\
  \ Web 应用的某些部分，而无需过多担心其他部分。你能理解这是为什么吗？\n\n**答案：** 打个比方可能会有所帮助：想想你上次填写所得税申报表的情景。这不是一件令人愉快的事，但想象一下，如果没有这样的表格作为指导，你必须申报收入，情况会糟糕多少。很可能，你会遗漏某些内容，然后你和你最喜欢的国税局（IRS）工作人员之间就会来回沟通问题和答案。这可不是一种高效的征税或纳税方式！税务表格背后的神奇之处在于，它标准化了你和国税局之间的沟通。\n\
  \n使用表格的另一个巨大优势是，你无需了解国税局是如何运作的。例如，你无需知道你的所得税是如何处理的。你只需要知道如何填写税务表格。因此，通过税务表格，你可以为了缴纳所得税而与国税局进行有效沟通，而无需了解太多关于他们的信息，也无需猜测他们想要你提供什么信息。\n\
  \n同样的理念也适用于代码，并且适用于构建应用程序不同部分的人员。沿着功能边界划分代码，并为生成的代码单元提供标准化的相互通信方式（用 Java 术语来说，就是*接口*），可以简化所需的代码（就像你不需要知道国税局如何运作一样），并促进应用程序构建者之间的沟通，使他们更容易并行构建或维护应用程序。\n\
  \n总之，按功能分离代码*以及*使用标准化的通信方法意味着更简单的开发和维护，因为 **469**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048AppD.fm Page 470 Tuesday, January 24, 2006 4:45 PM\n\n**470**\n\n附录\
  \ D ■ 答案\n\n• 一个代码模块需要了解与之通信的模块内部细节更少。\n\n• 需要了解更少意味着代码更简单。\n\n**第 3 章：理解作用域**\n\
  \n以下答案针对应用程序、会话、请求和页面作用域回答了这些问题：\n\n• Audrey 是第一个查看 First.jsp 的人。**她会看到什么？**\n\n\
  **• Brenda 随后从另一台机器查看 First.jsp。她看到了什么？**\n\n**• 如果 Audrey 在 Brenda **之后*再次*查看 First.jsp，她会看到什么？**\n\
  \n**• 如果 Brenda 现在直接加载 Second.jsp 会怎样？\n\n应用程序作用域的答案：\n\n• Audrey 看到 12。每个页面都将其数字追加到\
  \ myVariable。\n\n• Brenda 看到 1212。Brenda 将 12 追加到 Audrey 的 12 之后。\n\n• Audrey 看到\
  \ 121212。\n\n• Brenda 看到 1212122。最后一个 2 没有对应的 1，因为 Brenda 没有加载 First.jsp。\n\n会话作用域的答案：\n\
  \n• Audrey 看到 12。每个页面都将其数字追加到 myVariable。\n\n• Brenda 看到 12。Brenda 获得了一个全新的 myVariable\
  \ 副本。\n\n• Audrey 看到 1212，因为 myVariable 在整个会话期间都存在。\n\n• Brenda 看到 12122。最后一个 2\
  \ 没有对应的 1，因为 Brenda 没有加载 First.jsp。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048AppD.fm Page 471 Tuesday, January 24, 2006 4:45 PM\n\n附录 D ■ 答案\n\n\
  **471**\n\n请求作用域的答案：\n\n• Audrey 看到 12。每个页面都将其数字追加到 myVariable。请求作用域的变量在页面转发后仍然存在。\n\
  \n• Brenda 看到 12。Brenda 获得了一个全新的 myVariable 副本。\n\n• Audrey 看到 12，因为她看到的是 myVariable\
  \ 的一个新副本。\n\n• Brenda 看到 2。这个 2 前面没有 1，因为 Brenda 没有加载 First.jsp。\n\n页面作用域的答案：在每种情况下，Audrey\
  \ 和 Brenda 都只看到 2，因为页面作用域的变量只存在于最后调用的页面上。\n\n`<% int x = 7; %>` 中的变量 `x` 具有隐式的页面作用域。\n\
