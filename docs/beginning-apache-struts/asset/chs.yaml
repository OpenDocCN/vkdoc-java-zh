  \n**S**truts 构建在 Servlet 技术之上，而 Servlet 技术是使用 Java 平台构建 Web 应用的基础设施。\n\n\n\n这项技术实际上是\
  \ Sun 公司制定的一项规范，详细描述了一个名为 **servlet 容器**的程序的行为。Servlet 容器负责解析 HTTP 请求、管理会话以及编译 JavaServer\
  \ Pages (JSP) 等任务。\n\n**Servlet** 是你编写的用于处理 HTTP 请求和响应的 Java 类。\n\n这些类通常是 `HttpServlet`\
  \ 的子类，`HttpServlet` 提供了许多便捷函数来帮助你的 servlet 子类完成工作。\n\n任何人都可以实现 Sun 的 Servlet 规范，事实上，市面上有许多可用的\
  \ servlet 容器。流行的包括 IBM 的 WebLogic 以及 Apache 软件基金会 (ASF) 免费提供的开源 Tomcat。\n\nStruts\
  \ 的优点之一在于，尽管它依赖于 servlet 技术，但你可以在不必深入了解 servlet 的情况下开发 Struts 应用程序！本章将为你提供后续学习所需的所有\
  \ servlet 知识。\n\n你需要做的第一件事是在你的机器上安装一个 servlet 容器。\n\n**实验 2：安装 Tomcat**\n\n在本实验中，你将在你的\
