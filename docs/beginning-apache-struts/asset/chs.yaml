  \ %>\n\n<frameset rows=\"10%,*\">\n\n<html:frame action=\"/NavBar.do\" scrolling=\"\
  no\" frameName=\"navbar\" />\n\n<html:frame page=\"/index.jsp\" scrolling=\"yes\"\
  \ frameName=\"main\" />\n\n</frameset>\n\n等价标签\n\n无。\n\n**hidden**\n\n此标签表示一个隐藏的表单字段。\n\
  \n使用限制\n\nproperty 属性是必需的。它必须是<html:form>的子标签。\n\n属性\n\n前五个通用属性集（evt-attrs、acc-attrs、ren-attrs、struts-attrs\
  \ 和 init-attr）均被接受，并具有其通常含义。\n\n除此之外，还有 write 属性，如果设置为 true，则会显示隐藏字段的值。这对于调试非常有用。\n\
