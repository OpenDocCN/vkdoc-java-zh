  \ Web 应用程序框架），几乎不可能在 Web 应用程序代码中干净地实现 MVC 分离。\n\n请注意，我只是说 Struts（或一个 Web 应用程序框架）使\
  \ MVC 成为*可能*。\n\n不要误解为 Struts 能杜绝糟糕的代码！即使你使用了 Struts，仍然可以轻易地违反 MVC 原则。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
