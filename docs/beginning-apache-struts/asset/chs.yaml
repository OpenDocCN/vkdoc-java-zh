  \n等价物\n\n无。\n\n**Bean 标签库**\n\nBean 标签库包含用于读取 JavaBeans 属性和写入文本的标签。\n\n\n\n使用 Bean\
  \ 标签而非在 JSP 中硬编码文本有两个原因。其一是为了实现国际化，其二是为了避免使用脚本小程序。\n\n表 C-10 基于 Apache 文档，给出了 Bean\
  \ 库中标签的概要说明。Apache 许可证副本请参阅 www.apache.org/licenses/LICENSE-2.0。\n\n**表 C-10.**\
  \ *Bean 标签库概要*\n\n**标签**\n\n**用法/说明**\n\nmessage\n\n根据给定的键写入静态文本。\n\nwrite\n\n写入指定\
  \ JavaBean 属性的值。\n\ncookie/header/parameter\n\n每个标签根据指定的 cookie/header/parameter\
  \ 变量的值暴露一个脚本变量。\n\ndefine\n\n每个标签根据指定的 JavaBean 的值暴露一个脚本变量。\n\npage\n\n每个标签根据指定的页面作用域变量的值暴露一个脚本变量。\n\
  \ninclude\n\n允许你调用一个外部的 JSP、全局转发或 URL，并将得到的响应数据作为一个变量提供。被调用页面的响应不会写入响应流。\n\nresource\n\
  \n允许你从当前 Web 应用中读取任何文件，并将其作为 String 变量或 InputStream 暴露。\n\nsize\n\n定义一个新的 JavaBean，其中包含指定\
  \ Collection/Map/array 中的元素数量。\n\nstruts\n\n将指定的 Struts 内部配置对象作为 JavaBean 暴露。\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048AppC.fm 第 422 页 2006\
  \ 年 1 月 17 日 星期二 下午 4:46\n\n**422**\n\n附录 C ■ STRUTS 标签参考\n\n**Bean 标签库的 Struts-EL\
  \ 标签**\n\nBean 库中只有以下标签具有支持 EL 的版本：include、message、page、resource、size 和 struts。（注意：支持\
  \ EL 的标签是指允许你使用 EL 表达式的标签。示例请参阅第 10 章。）\n\n**cookie/header/parameter**\n\n每个标签根据指定的\
  \ cookie/header/parameter 的值暴露一个脚本变量。\n\n使用限制\n\nid 和 name 属性是必需的。\n\n属性\n\n• name：要检索的\
  \ cookie/header/parameter 的名称。\n• id：暴露变量的名称。脚本小程序和其他自定义标签将能够使用此名称访问 cookie/header/parameter\
  \ 的属性。\n• value：当找不到给定名称的 cookie/header/parameter 时返回的默认值。\n• multiple：指定如何处理多个同名的\
  \ cookie/header/parameter。此属性的确切值不重要。如果存在 multiple 属性，那么由 id 暴露的变量是一个相应类型的数组（Cookie[]/String[]/String[]）。如果不存在\
  \ multiple 属性，则将第一个出现的 cookie/header/parameter 绑定到暴露的变量。\n\n示例\n\n考虑以下 URL：\n\n\
  http://www.kenyir.org/mypage.jsp?command=test&action=save&id=12345\n\n以下是如何暴露请求\
  \ URL 上名为 command 的参数：\n\n<bean:parameter name=\"command\" id=\"cmd\" value=\"\"\
  \ /> Command is: <%=cmd%>\n\n如果有多个名为 command 的参数，例如：http://www.kenyir.org/mypage.jsp?command=print&command=save\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048AppC.fm 第 423 页\
  \ 2006 年 1 月 17 日 星期二 下午 4:46\n\n附录 C ■ STRUTS 标签参考\n\n**423**\n\n你可以通过以下方式访问所有参数：\n\
  \n<bean:parameter name=\"command\" id=\"cmd\" value=\"\" multiple=\"true\"/>\n\n\
  <logic:iterate name=\"cmd\" id=\"aCommand\">\n\n<bean:write name=\"aCommand\"/>\n\
  \n</logic:iterate>\n\n其他标签（header 和 cookie）也有类似的示例。\n\n等价标签\n\nJSTL 的 `<c:set>`\
  \ 可以替代这些标签。\n\n以下是在未指定 multiple 属性的情况下，如何使用 `<c:set>` 作为等价标签。暴露的变量称为 myVar*，对应的\
  \ cookie/header/parameter 的名称始终是 myAttr。\n\n<c:set var=\"myVar1\" value=\"${cookie.myAttr}\"\
  \ />\n\n<c:set var=\"myVar2\" value=\"${header.myAttr}\" />\n\n<c:set var=\"myVar3\"\
  \ value=\"${param.myAttr}\" />\n\n如果指定了 multiple 属性，则应改用以下方式之一：\n\n\n\n<c:set var=\"\
  myVar4\" value=\"${pageContext.request.cookies.myAttr}\" />\n\n<c:set var=\"myVar5\"\
  \ value=\"${headerValues.myAttr}\" />\n\n<c:set var=\"myVar6\" value=\"${paramValues.myAttr}\"\
  \ /> 注意，还有一个 `<c:remove>` 用于删除已声明的变量。\n\n**define**\n\n此标签基于（1）给定的字符串或（2）另一个 JavaBean\
  \ 的数据来暴露一个变量。\n\n脚本小程序和其他标签可以像访问其他变量一样访问这个暴露的变量。这看起来可能没什么用，但实际上很有用。详情请参考示例。\n\n\
  另请参阅 cookie/header/parameter 和 page 的相关条目，这些是相关的标签。\n\n使用限制\n\n`id` 属性是必需的，作为暴露变量的名称。你还需要指定\
  \ `name/property/scope`，或 `value`，或将暴露变量的值嵌套在 `<bean:define>` 标签体内。\n\n另外，请注意，一个变量只能定义一次。尝试在同一页面上使用相同名称定义新变量将导致抛出异常。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048AppC.fm Page 424\
  \ Tuesday, January 17, 2006 4:46 PM\n\n**424**\n\n附录 C ■ STRUTS 标签参考\n\n属性\n\n•\
  \ `id`：暴露变量的名称。脚本小程序和其他自定义标签将能够使用此名称访问新变量。\n\n• `name/property/scope`：这些属性用于定位要暴露的对象，需要指定名称以及可选的属性和作用域。如果未指定\
  \ `scope`，则会在所有作用域中搜索该命名对象。\n\n• `value`：要暴露的字符串值。这将使用 `id` 属性暴露的变量绑定到 `value` 属性指定的字符串。\n\
  \n• `toScope`：放置新变量的作用域。可以是 `page`、`request`、`session` 或 `application`。\n\n• `type`：使用\
  \ `id` 属性暴露的变量的完全限定类名。如果未指定，则在同时指定 `value` 属性时使用 `java.lang.String`。当使用嵌套技术时（参见示例），也会隐含此类型。如果使用\
  \ `name/property/scope` 方法，则隐含的类名是 `java.lang.Object`。\n\n示例\n\n以下是一些如何使用 `<bean:define>`\
  \ 暴露字符串或变量的示例：\n\n<bean:define id=\"myVar1\" name=\"myAttr\"\n\nproperty=\"myProp\"\
  \ scope=\"session\"/>\n\n<bean:define id=\"myVar2\" name=\"myAttr\" scope=\"session\"\
  />\n\n<bean:define id=\"myVar3\" value=\"Hello World\" toScope=\"request\" />\n\n\
  <bean:define id=\"myVar4\">Here's looking at you kid!</bean:define>\n\n<bean:define\
  \ id=\"myVar5\">\n\n<bean:write name=\"myAttr\" property=\"myProp\"/>\n\n</bean:define>\n\
  \n在最后一个示例中，如果 `myAttr.getMyProp()` 返回 `null`，则会抛出异常。否则，`myVar5` 等于调用时 `myAttr.getMyProp()`\
  \ 的值。\n\n如果你将 `<bean:define>` 与 Struts-EL 标签一起使用，它可以帮助你本地化验证（参见第 12 章）。回顾第 12 章关于本地化验证主题的讨论，我们解释过可以使用将本地化格式字符串与表单数据一起嵌入的技巧（参见清单\
  \ 12-3）。使用 Action 来填充隐藏字段。一种更优雅的填充隐藏字段的方法是使用 `<bean:define>` 和 `<html-el:hidden>`，如下所示：\n\
  \n<bean:define id=\"dateFormat\">\n\n<bean:message key=\"myapp.formats.dateFormat\"\
  />\n\n</bean:define>\n\n<html-el:hidden property=\"${dateFormat}\" /> `myapp.formats.dateFormat`\
  \ 指向的消息是日期格式，当然，这由 Struts 自动本地化。无需 Action 子类！\n\n等价物\n\nJSTL 的 `<c:set>` 可用于替代 `<bean:define>`。之前的示例移植到\
  \ `<c:set>` 将是：\n\n<c:set var=\"myVar1\" value=\"${sessionScope.myAttr.myProp}\"\
  />\n\n<c:set var=\"myVar2\" value=\"${sessionScope.myAttr}\"/>\n\n<c:set var=\"\
  myVar3\" value=\"Hello World\" scope=\"request\" />\n\n<c:set var=\"myVar4\">Here's\
  \ looking at you kid!</c:set>\n\n<c:set var=\"myVar5\">\n\n<bean:write name=\"myAttr\"\
  \ property=\"myProp\"/>\n\n</c:set>\n\n最后一个示例类似：\n\n<c:set var=\"dateFormat\">\n\
  \n<bean:message key=\"myapp.formats.dateFormat\"/>\n\n</c:set>\n\n<html-el:hidden\
  \ property=\"${dateFormat}\" /> **include**\n\n这个有趣的标签允许你调用一个外部的 JSP、全局转发或 URL，并将得到的响应数据作为变量提供。被调用页面的响应不会写入响应流。\n\
  \n如果暴露的变量使用 `<bean:write>` 显示，则接收到的输出会被 HTML 编码（`<` 被替换为 `&lt;` 等）。\n\n使用限制\n\n\
  你必须指定 `id` 属性，以及 `forward`、`page` 或 `href` 中的一个。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048AppC.fm Page 426 Tuesday, January 17, 2006 4:46 PM\n\n**426**\n\n附录\
  \ C ■ STRUTS 标签参考\n\n属性\n\n• `id`：暴露变量的名称。脚本小程序和其他自定义标签将能够使用此名称访问新变量。得到的变量是页面作用域的。\n\
  \n• `forward`：要调用的全局转发的名称。\n\n• `page`：当前 Web 应用中要调用的 JSP 页面的名称。此名称是模块相关的，并且需要以斜杠开头。\n\
  \n• `href`：外部页面的绝对 URL——例如：`http://www.kenyir.org/code/index.html`。\n\n• `anchor`：被调用页面上的\
  \ HTML 锚点名称。\n\n• `transaction`：如果设置为 `true`，则在响应中包含事务令牌（有关说明，请参见 `<logic:redirect>`\
  \ 条目）。\n\n示例\n\n此示例读取给定的外部页面，然后显示实际内容。请记住，任何接收到的 HTML 都会被编码：\n\n<bean:include id=\"\
  myPage\" href=\"http://localhost:8080/lilldep/\"/>\n\n<bean:write name=\"myPage\"\
  \ />\n\n等价物\n\n最接近的等价物是 JSTL 的 `<c:import>`，它调用一个 URL 并将接收到的数据作为字符串或 Reader 暴露。\n\
  \n之前的示例可以很容易地使用 JSTL 进行转换：\n\n<c:import var=\"myPage\" url=\"http://localhost:8080/lilldep/\"\
  \ />\n\n<c:out value=\"${myPage}\"/>\n\n请注意，你还可以使用嵌套的 `<c:param>` 标签对接收到的数据执行参数替换。\n\
  \n**message**\n\n此标签显示国际化消息。你可以指定最多五个替换参数。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048AppC.fm Page 427 Tuesday, January 17, 2006 4:46 PM\n\n附录 C ■ STRUTS\
  \ 标签参考\n\n**427**\n\n使用限制\n\n你必须指定 `key` 属性或 `name/property/scope` 组合。\n\n属性\n\n\
  • `key`：要显示的消息资源的键。如果未指定 `locale/bundle` 组合，则使用默认的消息资源文件和用户的当前语言环境来确定要显示的消息资源。\n\
  \n• `name/property/scope`：这些属性用于基于具有给定名称以及可选属性和作用域的对象来派生一个键。如果未指定 `scope`，则会在所有作用域中搜索该命名对象。\n\
  \n• `locale/bundle`：这些属性用于指定不同的 Locale 对象或消息资源文件。`locale` 指定一个键，可用于查找存储在当前会话上的 Locale\
  \ 对象。`bundle` 属性将在下一小节中更详细地解释。\n\n• `arg0/arg1/arg2/arg3/arg4`：这些是第一个、第二个、第三个、第四个和第五个替换参数的值。\n\
  \n使用多个消息资源文件\n\nStruts 允许你声明多个消息资源文件（即，针对同一语言环境的多个 `Application.properties` 文件）。每个这样的消息资源文件都有一个唯一的名称，在\
  \ Struts 标签中使用 `bundle` 属性引用。默认的消息资源文件没有名称，如果未指定 `bundle` 属性，则使用该文件。\n\n你应该注意，使用多个消息资源文件存在一些问题：\n\
  \n• 有报告称，使其与 Validator 框架一起工作存在问题。\n\n\n\n• 这会使维护变得更加困难。因为除了指定键名之外，你还必须指明资源包名称（如果不是默认资源包的话）。如果日后你决定将某条消息从一个文件移动到另一个文件（这在整合应用以确保显示消息或提示的一致性时很常见），那么你就必须修改所有使用了该特定消息的标签的\
  \ bundle 属性值。\n\n因此，应尽可能避免使用此功能。\n\n另一种方案是为键名采用命名约定，例如本书中为消息键使用的点号命名约定（如 `app.error.prompt.login`）。这允许你创建独立的命名空间，从而无需使用多个消息资源文件。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048AppC.fm Page 428\
  \ Tuesday, January 17, 2006 4:46 PM\n\n**428**\n\n附录 C ■ STRUTS 标签参考\n\n既然你已经了解了风险，下面介绍如何在\
  \ `struts-config.xml` 文件中声明多个消息资源文件：\n\n<message-resources parameter=\"Application\"\
  \ />\n\n<message-resources parameter=\"Application2\"\n\nkey=\"myOtherResourceFile\"\
  />\n\n在此示例中，第二个消息资源文件是 `Application2.properties`，并且与默认的 `Application.properties`\
  \ 文件存储在相同位置（即 `/WEB-INF/classes/` 目录下）。\n\n要从默认文件中显示提示，请使用：\n\n<bean:message key=\"\
  app.error.prompt.login\" />\n\n要从第二个文件中显示提示，请使用：\n\n<bean:message bundle=\"myOtherResourceFile\"\
  \n\nkey=\"app.prompt.checkdata\" />\n\n额外的 `bundle` 属性告诉 Struts 使用哪个消息资源文件。\n\n\
  示例\n\n以下是显示消息的方法：\n\n<bean:message key=\"app.prompt.login\" />\n\n以下是使用一个 `toString()`\
  \ 方法返回键名的 JavaBean 的方法：\n\n<bean:message name=\"myLoginMessageKey\" />\n\n以下是使用一个属性提供键名的\
  \ JavaBean 的方法：\n\n<bean:message name=\"MyBean\" property=\"formatKey\" />\n\n此示例调用\
  \ `MyBean.getFormatKey()` 并将其结果用作消息键名。如有必要，会对返回值调用 `toString()` 方法。\n\n如果消息包含替换参数，例如：\n\
  \napp.prompt.logoff=注销 {0}\n\n你可以使用以下方法进行替换（使用 EL 表达式）：\n\n<bean:message-el key=\"\
  app.prompt.logoff\" arg0=\"${user.name}\" />\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048AppC.fm Page 429 Tuesday, January 17, 2006 4:46 PM\n\n附录 C ■ STRUTS\
  \ 标签参考\n\n**429**\n\n等价实现\n\n在 JSTL 和 JSF 中都有对应的等价实现。使用 JSTL 时，你可以使用格式化标签库：\n\n\
  <fmt:bundle basename=\"Application\">\n\n<fmt:message key=\"app.prompt.logoff\"\
  >\n\n<fmt:param value=\"${user.name}\"/>\n\n</fmt:message>\n\n</fmt: bundle>\n\n\
  此代码片段是上一个示例（包含单个替换参数）的等价实现。\n\n如果你使用 JSF，可能会发现使用 Struts-Faces 集成库（参见第 20 章）来暴露默认消息资源文件会很方便：\n\
  \n<s:loadMessages var=\"messages\"/>\n\n<h:outputFormat value=\"#{messages['app.prompt.logoff']}\"\
  >\n\n<f:param value=\"#{user.name}\"/>\n\n</h:outputFormat>\n\n这是前面 JSTL 示例的等价实现。\n\
  \n最后，还有来自 Struts-Faces 集成库的 `<s:message>` 标签。\n\n**page**\n\n这个便捷的标签将页面上下文中的对象暴露为变量，这些变量可以通过脚本或自定义标签进行访问。\n\
  \n`PageContext` 对象是当前页面所有状态的中央存储库。这包括第 2 章中描述的会话（`HttpSession`）和请求（`HttpServletRequest`）。此外还有：\n\
  \n• `application`：`javax.servlet.ServletContext` 对象，通过调用 `pageContext.getServletContext()`\
  \ 获得。\n• `config`：`javax.servlet.ServletConfig` 对象，通过调用 `pageContext.getServletConfig()`\
  \ 获得。不要将其与 Struts 的内部配置对象混淆。\n• `response`：与页面关联的 `HttpServletResponse` 对象。\n\n\
  你应该查阅最新的 Servlet 参考资料（或通过 Google 搜索类名获取 JavaDoc）以了解更多关于这些对象的信息。\n\n使用限制\n\n\n\n\
  `id` 和 `property` 属性都是必需的。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048AppC.fm Page 430 Tuesday, January 17, 2006 4:46 PM\n\n**430**\n\n附录\
  \ C ■ STRUTS 标签参考\n\n属性\n\n• `id`：公开变量的名称。脚本片段和其他自定义标签将能够使用此名称访问新变量。此属性是必需的。\n\n\
  • `property`：值为 `application`、`session`、`request`、`config` 或 `response`；用于从页面上下文中获取关联的对象。此属性是必需的。\n\
  \n示例\n\n代码片段\n\n<bean:page id=\"myVar\" property=\"session\" /> 将与包含页面关联的会话对象（`HttpSession`）公开为一个名为\
  \ `myVar` 的 bean。其他页面上下文对象也类似地公开。\n\n等效项\n\nJSTL 的 `<c:set>` 可用于替代 `<bean:page>`。让我们看一些示例。\n\
  \n要公开应用程序，请使用以下代码：\n\n<c:set var=\"myVar\" value=\"${pageContext.servletContext}\"\
  /> 要公开会话，请使用以下代码：\n\n<c:set var=\"myVar\" value=\"${pageContext.session}\"/> 要公开请求，请使用以下代码：\n\
  \n<c:set var=\"myVar\" value=\"${pageContext.request}\"/> 要公开配置对象，请使用以下代码：\n\n<c:set\
  \ var=\"myVar\" value=\"${pageContext.servletConfig}\"/> 要公开响应，请使用以下代码：\n\n<c:set\
  \ var=\"myVar\" value=\"${pageContext.response}\"/> 您应该注意，JSTL 隐式对象 `sessionScope`\
  \ 与 `pageContext.session` 不同。前者是一个包含键/值对的 `Map`，而后者是实际的 `HttpSession` 对象，您可以读取其属性。\n\
  \n**resource**\n\n`resource` 允许您从当前 Web 应用程序读取任何文件，并将其公开为 `String` 变量或 `InputStream`。另请参阅\
  \ `<bean:include>`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048AppC.fm\
  \ Page 431 Tuesday, January 17, 2006 4:46 PM\n\n附录 C ■ STRUTS 标签参考\n\n**431**\n\n\
  使用限制\n\n`id` 和 `name` 属性是必需的。\n\n属性\n\n• `id`：公开变量的名称。脚本片段和其他自定义标签将能够使用此名称访问新变量。此属性是必需的。\n\
  \n• `name`：要加载的资源的模块相对名称。\n\n• `input`：如果存在此属性（实际值无关紧要），则公开的变量类型为 `InputStream`；否则为\
  \ `String`。\n\n示例\n\n坦率地说，除非您使用其他可以读取和解析 `InputStream` 的自定义标签，否则很难看出此标签的用处。以下是一个示例，使用假设的\
  \ RSS 源（`/myRss.xml`，包含 RSS 标记）和假设的 `<rss>` 自定义标签来解析和显示输出：\n\n<bean:resource id=\"\
  rssSrc\" name=\"/myRss.xml\" input=\"yes\" />\n\n<rss:write name=\"rssSrc\" />\n\
  \n等效项\n\n最接近的等效项是 JSTL 的 `<c:import>`，它调用一个 URL 并将接收到的数据公开为 `String` 或 `Reader`。前面的示例可以很容易地使用\
  \ JSTL 进行转换：\n\n<c:import varReader=\"rssSrc\" url=\"myRss.xml\" />\n\n<rss:write\
  \ value=\"${rssSrc}\"/>\n\n**size**\n\n此标签将给定 `Collection`、`Map` 或数组的大小公开为一个变量（类型为\
  \ `Integer`），该变量可通过脚本片段或自定义标签访问。\n\n使用限制\n\n`id` 属性是必需的，并且您必须使用 `collection` 属性或\
  \ `name`/`property`/`scope` 组合来指定要测量其大小的数组/`Collection`/`Map`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048AppC.fm Page 432 Tuesday, January 17, 2006 4:46 PM\n\n**432**\n\n附录\
  \ C ■ STRUTS 标签参考\n\n属性\n\n• `id`：公开变量的名称。脚本片段和其他自定义标签将能够使用此名称访问新变量。此属性是必需的。\n\n\
  • `name`/`property`/`scope`：这些属性用于定位 `Collection`/`Map`/数组，使用给定的名称以及可选的 `property`\
  \ 和 `scope`。如果未指定 `scope`，则会在所有作用域中搜索命名对象。\n\n\n\n• collection: 这是 name/property/scope\
  \ 组合的一个非常便捷的替代方案。你可以使用脚本小程序来计算此属性的值，例如：\n\n<bean:size id=\"mySize\"\n\ncollection=\"\
  <%=MyObject.calculateCollection() %>\" />\n\n• 此属性背后的原理在 <logic:iterate> 的条目中进行了讨论。\n\
  \n示例\n\n以下是一个简单的示例，它暴露了给定集合的大小：\n\n<bean:size id=\"mySize\" name=\"MyCollection\"\
  />\n\n<bean:write name=\"mySize\"/>\n\n等价标签\n\n你可以将 JSTL 的 <c:set> 与 JSTL 的 length\
  \ 函数结合使用：\n\n<c:set var=\"myVar\" value=\"${fn:length(MyCollection)}\" /> 记得声明 JSTL\
  \ 函数标签库。\n\n**struts**\n\n此标签将一个 Struts 全局转发、表单 bean 或表单处理器（表单处理器的 ActionMapping）作为一个变量暴露出来，可供脚本小程序和其他标签访问。如果你希望\
  \ JSTL 访问 Struts 的内部变量，这会很有用。\n\n使用限制\n\nid 属性是必需的。你还必须指定 forward、formBean 或 mapping\
  \ 属性。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048AppC.fm Page\
  \ 433 Tuesday, January 17, 2006 4:46 PM\n\n附录 C ■ STRUTS 标签参考\n\n**433**\n\n属性\n\
  \n• id: 被暴露变量的名称。脚本小程序和其他自定义标签将能够使用此名称访问新变量。此属性是必需的。\n\n• forward: 要暴露的全局转发的名称。\n\
  \n• formBean: 要暴露的已声明表单 bean 的名称。\n\n• mapping: 要暴露的表单处理器的名称。\n\n示例\n\n考虑以下 struts-config.xml\
  \ 片段：\n\n<form-beans>\n\n<form-bean name=\"RegistrationFormBean\"\n\ntype=\"net.thinksquared.reg.RegistrationFormBean\"\
  \ />\n\n</form-beans>\n\n<global-forwards>\n\n<forward name=\"myForward\" path=\"\
  /index.jsp\" />\n\n</global-forwards>\n\n<action-mappings>\n\n<action path=\"/Login\"\
  \n\ntype=\"net.thinksquared.reg.RegistrationAction\"\n\nvalidate=\"true\"\n\nname=\"\
  RegistrationFormBean\"\n\ninput=\"myInput.jsp\">\n\n<forward name=\"success\" path=\"\
  registered.jsp\" />\n\n<forward name=\"new-user\" path=\"new-user.jsp\" />\n\n</action>\n\
  \n</action-mappings>\n\n以下是你如何暴露全局转发：\n\n<bean:struts id=\"fwd\" forward=\"myForward\"\
  />\n\n<bean:write name=\"fwd\"/>\n\n<bean:write name=\"fwd\" property=\"path\" />\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048AppC.fm Page 434\
  \ Tuesday, January 17, 2006 4:46 PM\n\n**434**\n\n附录 C ■ STRUTS 标签参考\n\n以及表单 bean：\n\
  \n<bean:struts id=\"fbean\" formBean=\"RegistrationFormBean\"/>\n\n<bean:write name=\"\
  fbean\"/>\n\n<bean:write name=\"fbean\" property=\"type\" /> 以及表单处理器：\n\n<bean:struts\
  \ id=\"fhandler\" mapping=\"/Login\"/>\n\n<bean:write name=\"fhandler\"/>\n\n<bean:write\
  \ name=\"fhandler\" property=\"input\" /> 等价标签\n\n无。\n\n**write**\n\n此标签将指定的 bean\
  \ 属性写入响应流。它允许对给定的 bean 属性进行一些格式化。\n\n使用限制\n\nname 属性是必需的。\n\n属性\n\n• name/property/scope:\
  \ 这些属性用于定位具有给定名称以及可选属性和作用域的 JavaBean。如果未指定 scope，则会在所有作用域中搜索命名对象。\n\n• ignore: 如果为\
  \ true，则在未找到命名的 JavaBean 时静默失败。默认值 (false) 会导致抛出异常。\n\n其余属性用于格式化 bean 的属性：\n\n•\
  \ filter: 如果设置为 true，则会导致属性的 String 值被 HTML 编码。例如，与符号 (&) 将被编码为 &，而 > 将被编码为 &gt;。默认值为\
  \ true。\n\n• format/formatKey: 两者都指定一个用于格式化 bean 属性的格式字符串。format 将其值直接用作格式字符串。formatKey\
  \ 将其值用作键，以在消息资源文件中查找实际的格式字符串。除非指定了 locale/bundle 组合，否则将使用当前用户的 locale 和默认的消息资源包。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048AppC.fm Page 435\
  \ Tuesday, January 17, 2006 4:46 PM\n\n附录 C ■ STRUTS 标签参考\n\n**435**\n\n\n\n• locale/bundle：这些属性用于指定不同的\
  \ Locale 对象或消息资源文件。locale 指定一个键，可用于查找存储在当前会话中的 Locale 对象。bundle 属性在 <bean:message>\
  \ 的条目中有更详细的说明。你可以将它们与 formatKey 结合使用，以指定与当前用户不同的区域设置，或与默认消息资源文件不同的文件。\n\n示例\n\n\
  代码\n\n<bean:write name=\"myString\" />\n\n将显示 myString 所引用的字符串。\n\n<bean:write name=\"\
  MyBean\" property=\"message\" /> 将显示 MyBean.getMessage() 的值。\n\n<bean:write name=\"\
  myFloat\" format=\"#.##\" /> 将显示 myFloat = 3.1416 为 3.14。\n\n<bean:write name=\"\
  myCalendar\" format=\"dd/mm/yyyy\" /> 将把 myCalendar 表示的日期格式化为 dd/mm/yyyy。例如，2006\
  \ 年 2 月 20 日\n\n将显示为 20/02/2006。\n\n<bean:write name=\"myCalendar\" formatKey=\"\
  app.format.dateFormat\" /> 将使用消息键 app.format.dateFormat 的值作为格式字符串。\n\n等价写法\n\n你可以使用\
  \ JSTL 的 <c:out> 来显示 bean 的属性：\n\n<c:out value=\"${MyBean.message}\"/>\n\n显示 MyBean.getMessage()\
  \ 的值。要格式化输出，你可以使用 JSTL 的格式化标签库：\n\n<fmt:formatNumber value=\"${myFloat}\" pattern=\"\
  #.##\" /> 作为前面数字格式化的等价写法，或者\n\n<fmt:formatDate value=\"${myCalendar}\" pattern=\"\
  dd/mm/yyyy\" /> JSTL 的格式化标签库在格式化字符串、日期、货币和数字方面有许多变体。如果你有兴趣了解更多，应查阅最新规范。\n\n最后，来自\
  \ Struts-Faces 集成库的 <s:write> 标签是另一个等价写法。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048AppC.fm Page 436 Tuesday, January 17, 2006 4:46 PM\n\n**436**\n\n附 录\
  \ C ■ STRUTS 标签参考\n\n**逻辑标签库**\n\n逻辑标签库提供了用于条件处理、循环和流程控制的标签。\n\n• 条件处理：equal/notEqual、empty/notEmpty、greaterEqual/lessEqual/greaterThan/lessThan、match/notMatch、messagesPresent/messagesNotPresent\
  \ 和 present/notPresent。\n• 循环：iterate 标签。\n• 流程控制：forward 和 redirect 标签。\n\n除了涉及流程控制的标签外，所有这些标签都有\
  \ JSTL 的等价写法，因此如果可能，你应该使用 JSTL 版本。\n\n**通用属性集**\n\n逻辑标签库有两个通用属性集。第一个，我们称之为基础对象属性集（或简称为\
  \ **base-attrs**），在表 C-11 中说明，适用于相应标签所应用的 JavaBean 对象。\n\n**表 C-11.** *base-attrs\
  \ 属性集*\n\n**属性名称**\n\n**用法**\n\nname\n\n基础对象的名称。如果省略此属性，则使用隐式基础对象（如果有）。如果标签包含在 <html:form>\
  \ 中，则隐式基础对象是与该表单关联的表单 bean。\n\nproperty\n\n基础对象上的属性，其值用于标签的功能。例如，如果标签是比较标签，则使用基础对象上\
  \ property 的值进行比较。这假设基础对象上存在相应的 getXXX() 函数。\n\nscope\n\n搜索由 name 属性指定的对象的作用域。\n\
  \n如果 scope 未声明，则搜索所有作用域以查找由 name 属性指定的对象。有效的作用域是 page、request、session 和 application。\n\
  \n某些标签允许你使用来自其他来源（即基础对象上的 property 之外）的值来完成其工作。这些扩展属性（**exprop-attrs**）列在表 C-12\
  \ 中。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048AppC.fm Page\
  \ 437 Tuesday, January 17, 2006 4:46 PM\n\n附 录 C ■ STRUTS 标签参考\n\n**437**\n\n**表\
  \ C-12.** *exprop-attrs 属性集*\n\n**属性名称**\n\n**用法**\n\ncookie\n\n要使用的 cookie 的名称。\n\
  \nheader\n\n\n\n要使用的 HTTP 请求头变量名称。名称匹配不区分大小写。\n\nparameter\n\n要使用的 URL 请求参数名称。如果存在多个，则使用第一个出现的参数。\n\
  \n**选择器属性**\n\nLogic 库中的许多标签都使用选择器属性。这些属性用于选择要执行该标签功能的对象或属性。选择器属性包括 cookie、header、name/property\
  \ 和 parameter。\n\nStruts 按此顺序查询这些属性。例如，如果同时指定了 cookie 和 parameter，则仅使用 cookie 属性来执行标签的任务。\n\
  \n请注意，name/property 属性在此方面被视为一对。也就是说，如果指定了 name，则可以选择性地同时指定 property。不能仅指定 property——如果它们作为选择器属性发挥作用，则必须同时指定\
  \ name。每个标签的参考文档会告知您是否属于这种情况。\n\n**Logic 标签库的 Struts-EL 标签**\n\nLogic 库中只有以下标签具有支持\
  \ EL 的版本：forward、iterate、match/notMatch、messagesPresent/messagesNotPresent、present/notPresent\
  \ 和 redirect。\n\n其他标签有更简单的 JSTL 等效项。\n\n■**注意** 支持 EL 的标签是那些允许您使用 EL 表达式的标签。有关示例，请参阅第\
  \ 10 章。\n\n**empty/notEmpty**\n\n如果指定的属性（或基础对象）为 null、零长度字符串、空 Collection 或空 Map，则\
  \ empty 会条件性地执行其主体。如果未指定 property 属性，则针对由 name 属性给出的基础对象进行测试。\n\nnotEmpty 与 empty\
  \ 相反。\n\n使用限制\n\n即使嵌套在<html:form>中，也必须指定 name 属性。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048AppC.fm Page 438 Tuesday, January 17, 2006 4:46 PM\n\n**438**\n\n附录\
  \ C ■ STRUTS 标签参考\n\n属性\n\n仅适用 base-attrs 属性集。\n\n示例\n\n以下示例展示了当 MyCollection 为空时，使用<logic:empty>标签条件性地处理嵌套的<bean:write>标签：\n\
  \n<logic:empty name=\"MyCollection\">\n\n<bean:write name=\"MyCollection\" property\
  \ = \"myproperty[13]\" />\n\n</logic:empty>\n\n下一个示例说明了 property 标签的使用：\n\n<logic:empty\
  \ name=\"contact\" property=\"email\">\n\n<bean:write name=\"contact\" property=\"\
  email\"/>\n\n</logic:empty>\n\n仅当 getEmail()函数返回 null 或零长度字符串时，才会执行<bean:write>。您还可以使用\
  \ scope 变量来指定查找 bean 的作用域：\n\n<logic:notEmpty name=\"MyBean\" scope=\"request\"\
  >\n\n<bean:write name=\"MyBean\" property = \"myproperty\" />\n\n</logic:empty>\n\
  \n在前面的示例中，如果在请求作用域中可以找到 MyBean，则会在基础对象上调用<bean:write>。\n\n等效项\n\n您可以使用 JSTL 的<c:if>或<c:choose>...<c:when>轻松创建\
  \ empty 和 notEmpty 的等效项。例如，使用<c:if>，前面的示例将变为：\n\n<c:if test=\"${empty MyCollection}\"\
  >\n\n<bean:write name=\"MyCollection\" property = \"myproperty[13]\" />\n\n</c:if>\n\
  \n以及\n\n<c:if test=\"${empty contact.email}\">\n\n<bean:write name=\"contact\" property=\"\
  email\"/>\n\n</c:if>\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048AppC.fm\
  \ Page 439 Tuesday, January 17, 2006 4:46 PM\n\n附录 C ■ STRUTS 标签参考\n\n**439**\n\n\
  您必须使用 JSTL 的隐式对象（requestScope、sessionScope 等）来指定作用域：\n\n<c:if test=\"${ not empty\
  \ requestScope.MyBean}\">\n\n<bean:write name=\"MyBean\" property = \"myproperty\"\
  \ />\n\n</c:if>\n\n**equal/notEqual**\n\nequal 检查给定的属性（或扩展属性）是否等于给定值。如果是，则执行 equal\
  \ 标签的主体。notEqual 与 equal 相反。\n\n使用限制\n\nvalue 属性是必需的。您还必须指定一个选择器属性（有关定义，请参阅本节开头）。\n\
  \n属性\n\n\n\n`base-attrs` 和 `exprop-attrs` 属性均可接受。此外还有一个额外的 `value` 属性，它是一个常量值，用于与属性或扩展属性进行比较。\n\
  \n示例\n\n以下示例展示了 `<logic:equal>` 标签的用法：当变量 `client` 等于字符串 `\"Joe\"` 时，条件性地处理嵌套的 `<bean:write>`\
  \ 标签：\n\n<logic:equal name=\"client\" value=\"Joe\">\n\n<bean:write name=\"client\"\
  \ />\n\n</logic:equal>\n\n下一个示例说明了 `parameter` 属性的用法：\n\n<logic:equal parameter=\"\
