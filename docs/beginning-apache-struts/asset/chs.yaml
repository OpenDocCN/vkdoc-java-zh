  \nDoray_6048C08.fm Page 79 Thursday, January 12, 2006 10:59 AM\n\n第 8 章\n\n■ ■ ■\n\
  \n基本 Struts 标签\n\n**S**truts 完全通过使用自定义标签（实际上，正确的术语是自定义*动作*，但我认为自定义*标签*这个术语传达的意义更多，并且与\
  \ Struts Actions 混淆的可能性更小）来实现 MVC 设计模式的视图组件。这些标签应用于构成 webapp 视图组件的 JSP 中。Struts\
  \ 标签被捆绑到*五个*标签库中：\n\n• **HTML**：HTML 库中的自定义标签本质上与普通的 HTML `<form>` 标签及其相关的输入标签（如各种\
  \ `<input>` 标签）一一对应。此标签库的目的是使你能够将视图组件连接到第 6 章和第 7 章中描述的控制器组件。实际的连接细节将在第 9 章中描述。\n\
  \n• **Bean**：此库主要包含用于编写文本的自定义标签。使用 Bean 标签而不是将文本硬编码到 JSP 中有两个原因。第一个是为了实现国际化，即以多种语言显示视图组件。我们将在第\
  \ 12 章中展示 Struts 如何帮助你国际化你的 webapp。第二个原因是避免使用 scriptlet 来显示存储在请求或会话对象上的对象内容。\n\n\
  • **Logic**：此库提供用于条件处理和循环的标签。你使用 Logic 库中的标签来代替使用 scriptlet。逻辑库标签更易于使用，并能生成可读性显著更高的代码。\n\
  \n• **Nested**：此库包含用于显示表单或对象的“嵌套”属性的标签。我们将在第 10 章中详细描述这一点。\n\n• **Tiles**：此库包含允许你创建布局的标签。你将在第\
  \ 14 章中了解如何使用 Tiles 标签库。\n\n**79**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C08.fm Page 80 Thursday, January 12, 2006 10:59 AM\n\n**80**\n\n第 8\
  \ 章 ■ 基本 Struts 标签\n\n■**注意** 附录 C 是所有 Struts 标签的全面参考。\n\n在本章中，我们将仅讨论来自 HTML 和 Bean\
  \ 库中最常用的标签。\n\n在我们深入每个标签的细节之前，你首先必须了解 Struts 如何处理 JSP 页面。\n\n**页面处理生命周期**\n\n当 Struts\
  \ 被请求一个页面时，它首先将该页面上的所有 Struts 标签替换为必要的文本数据。这种替换过程的底层机制在第 4 章中已经描述过。并非所有 Struts 标签都会显示在页面上。有些标签有前置条件，只有满足条件时才会显示。例如，`<html:errors>`\
  \ 标签仅当存在要显示的错误消息时才会显示。\n\n对于不包含表单的页面，此标签替换阶段就结束了该页面的处理生命周期。\n\n如果一个页面*确实*包含表单，那么\
  \ Struts 会处理表单数据。这基本上分两个阶段进行，这也是前两章的主题：简单验证和业务逻辑处理。\n\n表单数据首先经过简单验证（在你的 ActionForm\
  \ 子类上）。如果验证失败，页面*通常*会自动重新显示。\n\n■**注意** 是否确实执行简单验证，以及如果执行，重新显示哪个输入页面，都由 Struts 配置文件控制，这将在第\
  \ 9 章中描述。\n\n因为页面现在包含验证错误，页面上任何相关的 `<html:errors>` 标签都会显示其错误消息。\n\n一旦用户更正并重新提交表单，数据将再次被验证。和之前一样，如果表单仍然包含错误，页面将再次重新显示。这种重新显示表单和验证的循环会一直持续，直到表单数据没有简单验证错误为止。\n\
  \n当这种情况发生时，Struts 将表单数据发送给业务逻辑处理（由你的 Action 子类处理），并显示“下一个”页面。请注意，“下一个”页面可能是一个错误页面，或者在发生复杂验证错误时可能包含错误消息。\n\
  \n图 8-1 总结了这些步骤。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C08.fm\
  \ Page 81 Thursday, January 12, 2006 10:59 AM\n\n第 8 章 ■ 基本 Struts 标签\n\n**81**\n\
  \n为了使这些概念更具体，我们将继续使用前几章的 Registration webapp 示例。在此过程中，我们将向你展示如何使用来自 HTML 和 Bean\
  \ 库的最基本的 Struts 标签。再次说明，附录 C 是所有 Struts 标签的全面参考。\n\n**图 8-1.** *典型的 Struts 页面处理生命周期*\
  \ **评估、替换和发送**\n\n当请求一个 Struts JSP 页面时，其处理*不*涉及主 Struts servlet（ActionServlet）。只有表单数据的提交才涉及主\
  \ servlet。正是这个 servlet 填充你的 ActionForm 子类，并在你的 Action 子类上调用 `execute()`。\n\n当然，Struts\
  \ 类参与了页面的渲染，但这些只是代表每个标签的 `BodyTagSupport` 和 `TagSupport` 类（参见第 4 章）。这些类知道的唯一状态存储在服务器端的\
  \ `HttpServletRequest` 和 `HttpSession` 对象中，分别代表当前请求和会话。\n\n正如你在第 4 章中看到的，`BodyTagSupport`\
  \ 或 `TagSupport` 负责标签视觉外观的最终渲染。不过，并非所有 Struts 标签都有视觉外观。例如，来自 Logic 库（在第 10 章中讨论）的标签执行条件处理，以选择性地显示*确实*有视觉外观的其他标签。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C08.fm Page 82 Thursday,\
  \ January 12, 2006 10:59 AM\n\n**82**\n\n第 8 章 ■ 基本 Struts 标签\n\nStruts JSP 页面的处理可以总结为三个步骤：\n\
  \n• **评估**：一些 Struts 标签（来自 Logic 库）或 `<html:errors>` 标签评估自身以确定是否应该显示。\n\n• **替换**：从请求或会话对象（或全局转发）中读取数据——\n\
  \n\n\n更多内容请参见第 9 章）并粘贴到渲染后的页面中。例如，`<html:errors>` 会粘贴相应的错误信息。\n\n• **发送**：最终页面被发送给用户。\n\
  \n当请求一个 Struts JSP 页面时，始终会涉及这三个步骤。\n\n**注册 Web 应用的视图组件**\n\n注册 Web 应用的视图组件（参见第 5\
  \ 章）由单个页面 `registration.jsp` 组成，该页面包含一个带有三个输入字段的表单：一个用于用户 ID 的文本输入框，以及两个密码字段。\n\n\
  其 JSP 代码如清单 8-1 所示，用户看到的可视化输出如图 8-2 所示。在继续阅读之前，请花些时间研究这两者。\n\n**清单 8-1.** *Registration.jsp*\n\
