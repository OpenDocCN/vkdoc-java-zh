  \n在清单 6-3 中，你可以看到错误消息键如何与实际错误消息关联。你还可以看到，用户界面中显示的提示信息可以存储在属性文件中。本质上，使用属性文件是一种简单、通用的方式，用于为任何\
  \ Java 应用程序存储静态键/值对。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C06.fm\
  \ 第 59 页 2006 年 1 月 23 日星期一 下午 1:10\n\n第 6 章 ■ 简单验证\n\n**59**\n\n■**注意** 属性键的点分记法（例如，reg.error.userid.bad）只是一种约定。这种约定很有用，因为它为你的属性文件形成了一个命名空间。如果你有两个或更多属性文件，遵循此约定可以防止你（或你的开发团队）重复使用相同的键。\n\
  \n该约定也很有用，因为它能让你大致了解该键可能引用的内容。\n\n`ActionMessage`构造函数的字符串参数*必须*是属性文件中的一个键。这看起来可能有些限制，但这样做有充分的理由。这正是\
  \ Struts 使应用程序易于本地化的方式。\n\n例如，如果你想要一个德语版的注册 Web 应用程序，你只需将这个属性文件（registration.properties）交给翻译人员。\n\
  \n你可以将翻译后的版本保存为 registration_de.properties，并将其与 Web 应用程序打包在一起。德语用户将看到德语版的注册 Web\
  \ 应用程序，而其他用户则会看到默认的英文版。本地化 Web 应用程序从未如此简单！我们将在第 12 章中进一步看到实际应用。\n\n■**注意** 使用属性文件还能使你的\
  \ Web 应用程序更加一致，因为它减少了你在一个错误消息中显示“您的用户 ID 有误”，而在另一个表单中对同一错误显示“您的用户 ID 无效”的可能性。\n\n\
  但`ActionMessages`只是错误消息显示谜题的一半。\n\n另一半关键部分是`ActionMessage`存储在`ActionErrors`实例中时所使用的**键**。参考清单\
  \ 6-1：\n\nerrors.add(**\"password\"** , new ActionMessage(...)); 正如你可能猜到的，该键对应于与该错误关联的表单属性的名称。这只是一个有用的约定，并非必需。Struts\
  \ 使用一个名为`<errors>`的特殊 Struts 标签，该标签带有一个名为`property`的属性，你可以将其与错误键匹配，如下所示：\n\n<html:errors\
  \ property=**\"password\"** />\n\n你可以将此标签放在包含表单的 JSP 页面中，靠近密码字段的位置。我将在第 8 章中更详细地介绍这一点，届时我会描述\
  \ Struts 的视图组件。\n\n图 6-2 总结了`ActionErrors`、`ActionMessage`、属性文件、错误键和错误标签之间的关系。\n\
