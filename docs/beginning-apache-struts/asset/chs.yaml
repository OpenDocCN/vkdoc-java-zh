  \n**41**\n\n第一个选项会违反 MVC 关于视图和控制器严格分离的规则，因为 JavaScript 必须放置在需求 1 中的 HTML 或 JSP 代码中。即使你将\
  \ JavaScript 验证器提取到一个单独的 .js 文件中，你仍然需要在 HTML/JSP 视图代码中添加控制器代码，以将表单值传递给 JavaScript\
  \ 验证器。请不要误解我的意思；我*并不是*说客户端 JavaScript 是从地狱深处爬出来的邪恶之物。我只是说，*手工编写*的客户端 JavaScript\
  \ 来执行验证违反了 MVC。\n\n违反 MVC，*无论理由多么充分*，都会以降低可维护性为代价。\n\n幸运的是，鱼与熊掌可以兼得。Struts 为你提供了*自动生成*客户端\
  \ JavaScript 的选项，而不是使用手工编写的客户端 JavaScript。这将大大减少控制器/视图的重叠。当我们在第 15 章介绍 Validator\
  \ 框架时，你将看到它的实际应用。\n\n或者，我们可以简单地快刀斩乱麻，在服务器上完成所有验证。不幸的是，这并不总是一个选项，尤其是在客户端-服务器连接速度较慢的情况下。\n\
  \n**需求 3**\n\n进一步检查数据以确保没有其他用户使用该用户 ID。\n\n讨论\n\n与需求 2 一样，我们显然需要控制器代码来运行验证。与需求 2\
  \ 不同的是，客户端验证不太可行，因为我们可能需要与数据库核对以查明给定的用户 ID 是否存在。\n\n这也意味着我们需要模型代码来从数据库读取用户 ID。模型代码具有如下函数：\n\
  \npublic boolean exists(String userid)\n\n用于运行用户 ID 检查。我们的控制器代码将使用此函数来运行验证。\n\n\
  **需求 4**\n\n\n\n如果在任何阶段出现错误，用户将看到相同的起始页面，并附带相应的错误消息（见图 5-3）。否则，用户的用户 ID 和密码将被存储。\n\
