  \n例如，在清单 4-1 中，通过查看 `<bean:write>`，你可以推断出相应的 Java 处理器类具有 `getProperty()` 和 `setProperty()`\
  \ 函数。清单 4-3 说明了这一点。\n\n**清单 4-3.** *<bean:write> 标签的 Java 处理器类部分代码* import javax.servlet.jsp.tagext.*;\n\
