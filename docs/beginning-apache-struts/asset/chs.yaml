  \n如你所见，它包含一个替换变量 `{0}`，我们希望将其替换为用户输入的 ID。例如，如果用户输入了用户 ID “Kermit”，我们希望最终的错误消息显示为：\n\
  \n用户 ID Kermit 已被占用，请尝试其他 ID。\n\nJava 有一个名为 `MessageFormat` 的函数可以为你执行此替换。这正是我们在前两行中所做的：\n\
  \nObject[] params = {_uid};\n\nString msg = MessageFormat.format(\n\nbundle.getString(\"\
  user_exists\"),params);\n\n`ResourceBundle` 上的 `getString()` 函数会获取与给定键（`user_exists`）对应的错误消息。然后我们使用\
  \ `MessageFormat` 将 `{0}` 替换为 `_uid`（即用户 ID）。因此，`msg` 变量保存了最终的错误消息。我们如何让它显示在页面上呢？这就是后续几行代码的作用。\n\
  \n首先，我们需要知道在*哪里*显示错误消息。使用 Struts 时，这很容易。但在 JSF 中，由于我们可能使用第三方组件，这就有点棘手了。理解其原因将有助于你更好地掌握\
  \ JSF，因此我们在此稍作展开。\n\n回顾一下，在 JSF 中，页面上的所有信息都存储在一个 UI 树中。树上的每个节点（`javax.faces.component.UIComponent`\
  \ 的实例）都可以使用 `id` 属性进行标记。显然，标签只有在唯一时才有意义——这是定位所需节点的唯一方法。挑战在于确保唯一性的同时，还要允许自定义组件。\n\
  \n为什么？嗯，一个自定义组件可能由许多子组件组成，每个子组件都必须有唯一的标签。使用 Struts 时，确保唯一性很容易，因为你只需读取页面的 JSP，并在需要时更改\
  \ ID 即可。但在 JSF 中使用自定义组件时，这并不总是有效，因为 JSP 上的标签与 UI 树中的节点之间并非一一对应。\n\n我们之前讨论过的树视图组件就是一个例子。树视图\
  \ UI 组件会在*运行时*在 UI 树中创建新节点。它可能会为这些节点分配唯一的标签，而难点就在这里——如果这些节点的名称与另一个自定义组件的节点名称冲突怎么办？\n\
  \nJSF 通过使用*命名容器*来解决这些问题。命名容器是 UI 树上的一个普通节点，它会为其所有子节点的 ID 附加一个额外的前缀。此前缀由 JSF 确定，因此节点的最终标签确实是唯一的。\n\
  \n大多数情况下，我们只知道节点的*未*加前缀的 ID。为了使用其未加前缀的 ID 搜索特定节点，我们必须：\n\n• 拥有对该节点所在命名容器的引用\n\n\
  • 拥有对同一命名容器内另一个子节点的引用\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C20.fm\
