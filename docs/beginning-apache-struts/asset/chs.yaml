  \ 相同。\n\n**看，不用手！：LazyValidatorForm**\n\n**(Struts 1.2.6+)**\n\nStruts 1.2.6 版本引入了一种新型动态表单，称为`LazyValidatorForm`。顾名思义，`LazyValidatorForm`使用\
  \ Validator 框架来执行验证。如果需要，您可以继承`LazyValidatorForm`并编写自己的`validate()`函数。\n\n`LazyValidatorForm`的特殊之处在于，您无需声明*任何*表单属性——无论是简单属性、映射属性还是索引属性。对于这些属性，如果不存在，`LazyValidatorForm`会自动创建必要的简单、映射或索引属性。\n\
  \n当然，如果您使用嵌套属性，则必须声明它，因为`LazyValidatorForm`绝对无法知道该属性应使用哪个 bean 类。其声明方式与传统动态表单相同。\n\
  \n但是，如果您*希望*声明一个属性（任何类型），您可以使用通常的`<form-property>`标签来实现。您可能希望这样做的原因有三个：\n\n• 您希望使用与`LazyValidatorForm`内部使用的**不同的**\
  \ Map **或** List **实现**。您可能出于效率考虑（您的代码比`LazyValidatorForm`使用的实现更快）或为了默认实现不具备的额外功能（例如，日志记录或调试）而这样做。\n\
  \n• 您希望利用**自动类型转换**。除非您明确要求，否则数据始终以`String`实例形式存储。为了让`LazyValidatorForm`知道要将给定属性转换为哪种类型，您必须使用`<form-property>`指定其类型。顺便说一句，如果您指定了数组类型，`LazyValidatorForm`会在填充表单时自动为您扩展该数组。很简洁！\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C16.fm 第 233 页 2006\
  \ 年 1 月 24 日星期二 上午 10:14\n\n第 16 章 ■ 动态表单\n\n**233**\n\n• 您不希望将**一个** null **的 List\
  \ 传递给 Validator 框架**。如果用户没有为索引属性传递任何值，该属性的值将为 null。这将导致 Validator 框架抛出异常。解决方法是使用`<form-property>`声明索引属性。这会告诉`LazyValidatorForm`创建一个您声明的类型的零长度数组或空\
  \ List。这能让 Validator 框架保持满意。\n\n**清单 16-6 展示了如果使用`LazyValidatorForm`，清单 16-1 会是什么样子。\n\
  \n**清单 16-6.** *使用 LazyValidatorForm 声明动态表单*\n\n```xml\n<form-bean name=\"MyFormBean\"\
  \n\ntype=\"org.apache.struts.validator.LazyValidatorForm\">\n\n<form-property name=\"\
  MySimpleProp\"\n\ntype=\"java.lang.String\"\n\ninitial=\"Hello\" />\n\n<form-property\
  \ name=\"MySimpleIntProp\"\n\ntype=\"int\" />\n\n<form-property name=\"MyIndexedProp\"\
  \n\ntype=\"java.lang.String[]\" />\n\n<form-property name=\"MyNestedProp\"\n\ntype=\"\
  com.myco.myapp.MyBean\" />\n\n</form-bean>\n```\n\n现在，清单 16-6 与清单 16-1 相比变化不大，但通常情况并非如此。在许多情况下，自动类型转换并非必需（就像\
  \ LILLDEP 的`ContactForm`那样），初始值也非必需。在这种情况下，清单 16-7 展示了我们如何精简清单 16-6。\n\n**清单 16-7.**\
  \ *使用 LazyValidatorForm 声明动态表单，第二版*\n\n```xml\n<form-bean name=\"MyFormBean\"\n\n\
  type=\"org.apache.struts.validator.LazyValidatorForm\">\n\n<form-property name=\"\
  MyNestedProp\"\n\ntype=\"com.myco.myapp.MyBean\" />\n\n</form-bean>\n```\n\n如您所见，清单\
  \ 16-7 要好得多。嵌套属性的声明仍然保留，因为这是让`LazyValidatorForm`知道使用哪个 bean 类的唯一方法。\n\n**使用 LazyValidatorForm\
  \ 的缺点**\n\n`LazyValidatorForm`具有传统动态表单的所有缺点，并且还多了一个：您失去了传统动态表单的“防火墙”属性，我稍后会解释。\n\
  \n如果提交给 Struts 的表单数据包含*比已声明属性更多的*属性（更大的数组数据或新属性），那么 Struts 会抛出异常。使用`LazyValidatorForm`则不会发生这种情况。这意味着恶意用户可以制作一个包含大量虚假“数据”的\
  \ HTML 页面并将其提交给您的 Web 应用程序，并且它会被接受。如果您的代码不加思索地将这些表单数据直接转储到数据库中，问题可能会很严重。如果数据处理需要时间，您的\
  \ Web 应用程序可能会变慢。在极端情况下，您的 Web 应用程序可能会崩溃。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
