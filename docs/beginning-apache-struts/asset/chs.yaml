  \ 标签参考\n\n等价标签\n\n来自 Struts-Faces 集成库的 <s:errors> 标签是等效的。\n\n**file**\n\n此标签允许轻松上传文件。\n\
  \n■**注意** 第 11 章对此有用标签有更全面的阐述。\n\n使用限制\n\nproperty 属性是必需的。它必须是 <html:form> 的子标签。\n\
  \n属性\n\n所有通用属性集（evt-attrs、acc-attrs、ren-attrs、struts-attrs、init-attr 以及新的 err-attrs）均被接受，并具有其通常含义。\n\
  \n除此之外，还有一些特定于 file 的属性：\n\n• accept: 一个以逗号分隔的“可接受”文件扩展名列表。这些扩展名由浏览器显示。不幸的是，大多数浏览器会忽略此信息。\n\
  \n• size: 显示字段的长度。如果省略，则由浏览器决定。\n\n• maxlength: 要接受的最大字符数。默认允许无限数量的字符。大多数 Web 浏览器会忽略此属性。\n\
  \n示例\n\n示例请参考第 11 章。\n\n等价标签\n\n没有纯 JSF 的等价标签，但 MyFaces 提供了一个名为 <x:inputFileUpload>\
  \ 的扩展来实现此功能。访问上传文件的机制与 Struts 的 FormFile 非常相似（它被称为 UploadedFile）。然而，这可能会让你陷入困境，因为当前的\
  \ Struts-Faces 集成库（1.0）无法与 MyFaces 配合使用。\n\n**form**\n\n表示一个 HTML 表单。它也是许多输入标签的必需父元素。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048AppC.fm 第 395 页\
  \ 2006 年 1 月 17 日星期二 下午 4:46\n\n附录 C ■ STRUTS 标签参考\n\n**395**\n\n使用限制\n\naction\
  \ 属性是必需的。\n\n属性\n\n除了 ren-attrs 属性外，form 还接受以下属性：\n\n• action: 处理此表单数据的表单处理程序的名称。此属性是必需的。\n\
  \n• method: 此表单的 HTTP 提交方式——POST 或 GET，默认为 POST。\n\n\n\n• focus/focusIndex：focus\
  \ 指定表单首次加载时应获得焦点的表单字段名称。Struts 会自动生成实现此功能的 JavaScript。如果未指定 focus 属性，则不会自动生成此类 JavaScript。\n\
  \nfocusIndex 适用于带索引的输入元素。您可以指定获得焦点的元素的索引。\n\n• enctype：指定提交此表单数据时使用的编码。仅当表单中包含 `<html:file>`\
  \ 输入元素时才需要设置此属性（更多详情请参见对应条目，或参考第 11 章）。\n\n• onsubmit/onreset：这些是表单提交或重置时要调用的 JavaScript\
  \ 事件处理程序的名称。\n\n• acceptCharset：此表单有效的字符编码（自 Struts 1.2.7 起）。这是一个标准的 HTML 属性。\n\n\
  • readonly：如果为 true，表示表单数据不可编辑。\n\n• scriptLanguage：如果设置为 false，则生成的 `<script>`\
  \ 标签中省略 language 属性。如果指定了 XHTML 渲染，则忽略此属性。\n\n• target：提交此表单数据的目标窗口名称。这是一个标准的 HTML\
  \ 属性。\n\n示例\n\n最常见的情况是，您会指定 action 和 focus 属性：\n\n<html:form action=\"MyFormHandler.do\"\
  \ focus=\"email\"> 请输入您的电子邮件地址： <html:text property=\"email\"/>\n\n...\n\n</html:form>\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048AppC.fm Page 396\
