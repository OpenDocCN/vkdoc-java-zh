  \n**redirect**\n\n此标签执行页面重定向。该标签没有标签体。另请参见 `<logic:forward>`。\n\n使用限制\n\n你必须指定 `forward`、`href`、`action`\
  \ 或 `page` 来指定要重定向到的基 URL。\n\n属性\n\n有两组主要属性。第一组指定要重定向到的页面的基 URL。有四种方式可以做到这一点：\n\n\
  • `forward`：要重定向到的全局转发的名称（例如，`forward=\"login\"`）。\n\n• `href`：要重定向到的原始 URL（例如，`href=\"\
  http://www.kenyir.org\"`）。\n\n• `action`：要重定向到的表单处理器（即动作映射）的名称。必须以斜杠开头，因为它是相对于默认模块的（例如，`action=\"\
  /Logoff\"`）。（有关模块的更多信息，请参见第 17 章。）\n\n• `page`：当前 Web 应用程序中要重定向到的网页的路径。此路径相对于 Web\
  \ 应用程序的基文件夹。路径必须以斜杠开头（例如，`page=\"/index.jsp\"`）。\n\n`redirect` 还允许你在重定向的 URL 上指定参数：\n\
  \n• `anchor`：允许你指定锚点的名称。锚点是标准的 HTML。它们用于标记长网页的各个部分，以便于导航。\n\n• `name/property/scope`：这些属性用于在请求或会话中定位一个\
  \ `Map` 实例。Map 的键是参数的名称，值是对应参数的值。如果值是数组，则会向 URL 写入多个参数，每个参数名称相同但值不同。\n\n如果你想创建多个\
  \ URL 参数，可以组合使用这三个变量。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048AppC.fm\
  \ 第 450 页 2006 年 1 月 17 日星期二 下午 4:46\n\n**450**\n\n附录 C ■ STRUTS 标签参考\n\n• `paramName`、`paramProperty`、`paramScope`\
  \ 和 `paramId`：前三个属性用于在当前请求或会话中定位单个对象。如果此对象不是数组，则调用其 `toString()` 方法，并将其作为单个参数值。如果对象是数组，则创建多个名称相同但值不同的参数。参数的名称由\
  \ `paramId` 给出。\n\n其余属性是 `useLocalEncoding` 和 `transaction`。如果 `useLocalEncoding`\
  \ 设置为 `true`，则告诉 Struts 使用当前 `HttpServletResponse` 的任何字符编码。`transaction` 属性需要一些详细说明。\n\
  \n事务令牌\n\nStruts 有一种机制可以防止表单被多次提交。如果用户快速连续两次单击表单的提交按钮，就可能发生这种情况。通常，Struts 会将其视为两次独立的提交。这当然是一个错误。此问题的标准解决方案是使用*事务令牌*。\n\
  \n你必须使用两个 `Action` 子类。第一个 `Action` 子类在请求表单时被激活。它在请求和会话上都放置一个唯一的字符串。这个唯一的字符串就是事务令牌。`Action`\
  \ 具有函数\n\n`saveToken(HttpServletRequest request)`\n\n\n\n为您实现此功能。该函数会自动生成事务令牌，并将其放置在请求和会话的相应键下。以下是该\
  \ Action 子类的 `execute()` 方法的简单示例：\n\npublic ActionForward execute(...){\n\n//创建事务令牌\n\
  \nsaveToken(request);\n\n//为用户提供要填写的表单\n\nreturn mapping.findForward(\"success\"\
  );\n\n}\n\n第二个 Action 子类负责在用户提交表单后处理表单数据。其 `execute()` 方法如下所示：\n\npublic ActionForward\
  \ execute(...){\n\nif(isTokenValid(request,true)){\n\nreturn mapping.findForward(\"\
  duplicate-submission\");\n\n}\n\n//照常处理表单数据。\n\n...\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048AppC.fm Page 451 Tuesday, January 17, 2006 4:46 PM\n\n附录 C ■ STRUTS\
  \ 标签参考\n\n**451**\n\n函数 `isTokenValid(request,true)` 用于检查请求上的事务令牌与会话上的令牌是否匹配。检查完成后，它会销毁会话上的副本。这意味着，如果用户第二次点击提交按钮，会话上将没有副本，导致\
  \ `isTokenValid()` 返回 false。\n\n然而，您应该意识到，前面章节中概述的简单解决方案有一个重大缺陷：返回给用户的错误页面（duplicate-submission）可能会让他认为表单数据根本没有被处理！仔细措辞错误信息可能会有所帮助，但您仍然无法向用户显示真正的成功页面。\n\
  \n更复杂的解决方案也会解决此类用户交互问题。\n\n回到事务属性，如果将其设置为 true，则请求上的事务令牌的值将作为 URL 参数发送。\n\n示例\n\n\
  以下是一个使用全局转发的名称进行简单重定向的示例：\n\n<logic:redirect forward=\"login\" />\n\n接下来是一个添加单个\
  \ URL 参数的示例。参数名称（paramId）是 email-address。参数的值通过调用 `contact.getEmail()` 确定：\n\n<logic:redirect\
  \ action=\"/MyFormHandler\" paramId=\"email-address\"\n\nparamName=\"contact\" paramProperty=\"\
  email\" /> 以下是如何基于 Map 添加多个 URL 参数。该 Map 通过调用 `contact.getAttributes()` 获取，该属性位于会话范围内：\n\
  \n<logic:redirect action=\"/mypage.jsp\" name=\"contact\"\n\nproperty=\"attributes\"\
  \ scope=\"session\" /> 等价物\n\n无。JSTL 或 JSF 中没有单个标签能执行 `<logic:redirect>` 的所有功能。\n\
  \n**嵌套标签库**\n\n嵌套标签库允许您相对于一个对象应用标签。您可以使用嵌套属性来模拟完全相同的功能（详细说明请参见第 10 章）。\n\n不幸的是，对于程序员来说，嵌套标签库可能感觉像是一个权宜之计。例如，假设您想要写入\n\
  \nMyBean.getMyPropertyA().getMyPropertyB()\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048AppC.fm Page 452 Tuesday, January 17, 2006 4:46 PM\n\n**452**\n\n附录\
  \ C ■ STRUTS 标签参考\n\n您可能期望能够这样做：\n\n<nested:root name=\"MyBean\">\n\n<nested:nest\
  \ property=\"myPropertyA\">\n\n**<bean:write property=”myPropertyB”/> //错误！！**\n\
  \n</nested:nest>\n\n</nested:root>\n\n相反，嵌套标签库为 `<bean:write>` 和许多其他标签提供了替代标签。因此，执行此任务的正确代码是\n\
  \n<nested:root name=\"MyBean\">\n\n<nested:nest property=\"myPropertyA\">\n\n**<nested:write\
  \ property=”myPropertyB”/>**\n\n</nested:nest>\n\n</nested:root>\n\n`<bean:write>`\
  \ 的替代品是 `<nested:write>`。嵌套标签库的大部分内容由替代标签组成。这些标签是其他标签库中对应标签的精确副本：\n\n*   **HTML\
  \ 的替代品**：checkbox, errors, file, form, hidden, image, img, link, messages, multibox,\
  \ options, optionsCollection, password, radio, select, submit, text, 和 textarea\n\
  *   **Bean 的替代品**：define, message, size, 和 write\n*   **Logic 的替代品**：empty, equal,\
  \ greaterEqual, greaterThan, iterate, lessEqual, lessThan, match, messagesNotPresent,\
  \ messagesPresent, notEmpty, notEqual, notMatch, notPresent, 和 present\n\n由于这些标签是原始标签的精确副本，我在此不再重复它们的功能。您应查阅本附录中原始标签的参考。排除这些替代标签，嵌套标签库只有三个需要解释的自有标签。接下来的部分将处理这个任务。\n\
  \n**嵌套标签库的 Struts-EL 标签**\n\n嵌套标签库没有 Struts-EL 标签。\n\n■**注意** 启用 EL 的标签是那些允许您使用\
  \ EL 表达式的标签。示例请参见第 10 章。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  Doray_6048AppC.fm Page 453 Tuesday, January 17, 2006 4:46 PM\n\n附录 C ■ STRUTS 标签参考\n\
  \n**453**\n\n**nest**\n\n此标签允许将嵌套向上移动一级。当前 `<nested:nest>` 标签内的所有替代标签将以此标签的 `property`\
  \ 属性指示的值作为其基础对象。\n\n使用限制\n\n无，但您显然需要指定 `property` 属性才能完成任何操作。\n\n属性\n\n只有一个属性：`property`，它指示当前隐式基础对象上的属性，所有子嵌套标签将以此为基础对象。\n\
  \n示例\n\n假设您想在 `<html:form>` 中使用 `<bean:write>` 访问一个嵌套属性。\n\n<html:form action=...\n\
  \n<bean:write property=\"contact.name\"/>\n\n<bean:write property=\"contact.email\"\
  />\n\n<bean:write property=\"contact.company\"/>\n\n</html:form>\n\n您可以改用 `<nested:nest>`\
  \ 和 `<nested:write>` 标签：\n\n<html:form action=...\n\n<nested:nest property=\"contact\"\
  >\n\n<nested:write property=\"name\"/>\n\n<nested:write property=\"email\"/>\n\n\
  <nested:write property=\"company\"/>\n\n</nested:nest>\n\n</html:form>\n\n在这两个代码片段中，隐式基础对象由外层的\
  \ `<html:form>` 决定。\n\n基础对象就是与该表单关联的表单 Bean 实例。如果您想更改基础对象，则必须使用 `<nested:root>`。\n\
  \n等价物\n\n无。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048AppC.fm\
  \ Page 454 Tuesday, January 17, 2006 4:46 PM\n\n**454**\n\n附录 C ■ STRUTS 标签参考\n\n\
  **writeNesting**\n\n此标签用于将当前嵌套级别写入响应流（即渲染后的 HTML 页面），或使其作为页面范围的变量可用。\n\n使用限制\n\n\
  无。\n\n属性\n\n此标签有三个属性：\n\n*   `property`：此属性的值会盲目地附加到嵌套级别的末尾，并以点号作为前缀。\n*   `id`：当指定了\
  \ `id` 时，嵌套级别不会写入最终的 HTML 页面，而是作为一个页面范围的 String 变量公开，其名称由 `id` 的值决定。\n*   `filter`：此属性接受值\
  \ `true` 或 `false`。如果为 `true`，则对嵌套级别进行编码。例如，与符号 (&) 显示为 `&`。尽管 Apache 在线文档如此说明，但不会执行\
  \ URL 编码——例如，空格不会编码为 `%20%` 等。\n\n这些属性最好通过 JSP 示例来说明。\n\n示例\n\n只有在与 `<nested:nest>`\
  \ 标签结合使用时，使用 `writeNesting` 才有意义，如下面的代码片段所示：\n\n<html:form ...>\n\n<nested:nest\
  \ property=\"contact\">\n\n<nested:nest property=\"company\">\n\n**嵌套级别是：<nested:writeNesting\
  \ />**\n\n</nested:nest>\n\n</nested:nest>\n\n</html:form>\n\n在此示例中，显示的 HTML 将包含文本\n\
  \n嵌套级别是：contact.company\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  Doray_6048AppC.fm Page 455 Tuesday, January 17, 2006 4:46 PM\n\n附录 C ■ STRUTS 标签参考\n\
  \n**455**\n\n\n\n如果我们使用了 <nested:writeNesting id=\"dummy\" />，那么输出将会是空白。这是因为在页面作用域中创建了一个名为\
  \ dummy 的变量，而不是将其显示在页面上。要显示它，你需要在与定义该变量的 <nested:writeNesting> 相同的嵌套层级内嵌入一个脚本片段。例如：\n\
  \n<html:form ...>\n\n<nested:nest property=\"contact\">\n\n<nested:nest property=\"\
  company\">\n\n**<nested:writeNesting id=\"dummy\"/>** **嵌套层级为：<%= dummy %>**\n\n\
  </nested:nest>\n\n</nested:nest>\n\n</html:form>\n\n请注意，如果你将脚本片段放在不同的嵌套层级中，将会出现错误：\n\
  \n<html:form ...>\n\n<nested:nest property=\"contact\">\n\n<nested:nest property=\"\
  company\">\n\n**<nested:writeNesting id=\"dummy\"/>**\n\n</nested:nest>\n\n**嵌套层级为：<%=\
  \ dummy %> //错误！！**\n\n</nested:nest>\n\n</html:form>\n\n最后，`property` 属性只是将给定的值附加到嵌套层级的末尾。因此，代码片段\n\
  \n<html:form ...>\n\n<nested:nest property=\"contact\">\n\n<nested:nest property=\"\
  company\">\n\n**嵌套层级为：<nested:writeNesting property=\"hello\" />**\n\n</nested:nest>\n\
  \n</nested:nest>\n\n</html:form>\n\n在 HTML 页面上显示为\n\n嵌套层级为：contact.company.hello\n\
  \n等价标签\n\n无。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048AppC.fm\
