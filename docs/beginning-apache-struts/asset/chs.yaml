  \ 标签参考\n\n**445**\n\n属性\n\n接受 `base-attrs` 和 `exprop-attrs`，并保持其通常含义。除此之外，还有两个额外属性：\n\
  \n• `value`：一个常量子字符串，用于匹配属性或扩展属性。例如，如果属性或扩展属性结果为字符串“Visit Zimbabwe”，则 `value=\"\
  im\"` 会匹配成功，而 `value=\"Zic\"` 则不会。\n\n• `location`：值为 `start` 或 `end`，指定匹配应在源字符串中的位置。如果省略，则任何位置的匹配都会成功。\n\
