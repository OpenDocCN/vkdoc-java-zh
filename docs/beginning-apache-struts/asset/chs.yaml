  \ 页面的路径。server 属性会渲染为 <base> 的 href 属性。\n\n• target：如果你的应用使用了框架，则可以在定义框架的页面中指定此基础\
  \ URL 所应用的框架名称。\n\n示例\n\n最简单且最有用的示例是单独使用 <html:base /> 标签：\n\n<head>\n\n<html:base\
