  \ `struts-config.xml` 中的声明，立即知道关联的 Action 上提供了哪些功能。\n\n**使用全局转发**\n\n在第 9 章中，我向你展示了如何声明全局转发。这些转发可以在\
  \ `struts-config.xml` 文件中的任何位置访问，*并且*可以在 `<html:link>` 中使用。后者正是全局转发的优势所在。\n\n你可以在\
  \ `<html:link>` 中使用全局转发，而不是硬编码*路径*。\n\n举个例子，许多 Web 应用都有通用的静态导航链接。LILLDEP 主页就是一个很好的例子。它包含几个导航链接：Full、MNC、Listing、Import\
