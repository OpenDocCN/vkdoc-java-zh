  \n\nname=\"ContactFormBean\"\n\nscope=\"request\"\n\nvalidate=\"true\"\n\ninput=\"\
  /**{1}**.jsp\">\n\n<forward name=\"success\" path=\"/**{1}**.jsp\"/>\n\n</action>\n\
  \n路径中的 * 是一个通配符，匹配零个或多个*不包含*斜杠 (/) 字符的字符。你可以使用 ** 来匹配包含斜杠的情况。你必须做出这种区分，因为斜杠在路径中使用时具有特殊含义（你将在下一小节中看到）。\n\
  \n在清单 17-15 中，我只使用了一个通配符。也可以使用多个通配符；例如：\n\n<action path=\"/*FormHandler_*\" ...\n\
  \n将匹配诸如 ContactFormHandler_full 或 SearchFormHandler_mnc 之类的路径。你可以使用 {1} 和 {2} 来访问匹配的字符串。对于\
  \ ContactFormHandler_full，{1} 将等于 Contact，{2} 将等于 full。总共允许使用九个通配符。\n\n■**注意** {0}\
  \ 通配符返回完整的请求 URI。\n\n如果多个 <action> 匹配同一个请求，则使用在 struts-config.xml 中最后声明的那个。此规则有一个例外：如果某个\
  \ <action> 不包含通配符并且匹配请求，则*始终*使用它。\n\n**简而言之...**\n\n在命名你的 <action> 时，请努力以未来使用通配符的视角来命名。不过，不要过度使用通配符，因为它们会使你的系统更难以管理。\n\
  \n一个好的遵循规则是每个 <action> 最多使用一个通配符。\n\n\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C17.fm 第 263 页 2006 年 1 月 24 日 星期二 上午 10:14\n\n第 17 章 ■ 杂 项\n\n**263**\n\
  \n**拆分 struts-config.xml**\n\n随着项目规模的增长，尤其是在团队协作中，你可能会希望将 `struts-config.xml` 拆分成多个文件。你可能希望这样做有几个原因：\n\
  \n-   **可管理性**：当 `config.xml` 文件变得过大时，Web 应用程序的控制流会变得不够清晰。你可能希望将 `struts-config.xml`\
  \ 拆分成不同的部分，每个部分可能代表整个 Web 应用程序中某个有限部分的控制流。\n-   **分离命名空间**：有两个或更多团队负责 Web 应用程序的不同方面，你希望这些团队能够彼此独立地工作。这里主要关注的是为每个团队提供不同的*命名空间*。不同的命名空间有助于避免两个团队创建同名但不同的表单\
  \ Bean 的问题。\n-   **源代码控制**：一些设计不佳的源代码控制系统只允许单个签出。如果你在一个大型团队中工作，这可能会非常受限，因为很可能不止一个人想要同时编辑\
  \ `struts-config.xml`。\n\n拆分 `struts-config.xml` 的第一种方法就是直接拆分。你可以创建多个 `struts-config.xml`\
  \ 文件（当然，使用不同的名称！），并指示 Struts 将它们视为一个文件。为此，你需要编辑 servlet 配置文件 `web.xml`。\n\n例如，假设你有多个配置文件：`struts-config.xml`、`struts-config-admin.xml`\
  \ 和 `struts-config-logon.xml`。清单 17-16 展示了如何在 `web.xml` 中声明它们。你只需要在每个 Struts 配置文件之间放置一个逗号。很简单！\n\
  \n**清单 17-16.** *在 web.xml 中声明多个 Struts 配置文件*\n\n<servlet>\n\n<servlet-name>action</servlet-name>\n\
  \n<servlet-class>\n\norg.apache.struts.action.ActionServlet\n\n</servlet-class>\n\
  \n<init-param>\n\n<param-name>config</param-name>\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C17.fm 第 264 页 2006 年 1 月 24 日 星期二 上午 10:14\n\n**264**\n\n第 17 章 ■ 杂\
  \ 项\n\n**<param-value>**\n\n**/WEB-INF/struts-config.xml,**\n\n**/WEB-INF/struts-config-admin.xml,**\n\
  \n**/WEB-INF/struts-config-logon.xml**\n\n**</param-value>**\n\n</init-param>\n\n\
  </servlet>\n\n现在，这种方法解决了可管理性和源代码控制问题，但它没有解决命名空间问题，因为 Struts 会在内部将所有声明的配置文件合并在一起。因此，虽然对你来说它们看起来是两个或多个文件，但对\
  \ Struts 来说它们是一个文件。\n\nStruts 有一个称为模块的功能，允许你将 Struts 配置文件拆分成不同的模块。一个模块代表 Web 应用程序中的一个*逻辑*拆分。每个模块都有自己的命名空间，因此这解决了命名空间问题。使用前面的例子，假设我们希望为每个\
  \ Struts 配置文件提供独立的命名空间：为 `struts-config.xml` 中声明的项提供默认命名空间，为 `struts-config-admin.xml`\
  \ 提供 admin 命名空间，为 `struts-config-logon.xml` 提供 logon 命名空间。在 `web.xml` 中得到的声明如清单\
  \ 17-17 所示。\n\n**清单 17-17.** *在 web.xml 中声明多个子模块*\n\n<servlet>\n\n<servlet-name>action</servlet-name>\n\
  \n<servlet-class>\n\norg.apache.struts.action.ActionServlet\n\n</servlet-class>\n\
  \n<init-param>\n\n**<param-name>config</param-name>**\n\n**<param-value>/WEB-INF/struts-config.xml</param-value>**\n\
  \n</init-param>\n\n<init-param>\n\n**<param-name>config/admin</param-name>**\n\n\
  **<param-value>/WEB-INF/struts-config-admin.xml</param-value>**\n\n</init-param>\n\
  \n<init-param>\n\n**<param-name>config/logon</param-name>**\n\n**<param-value>/WEB-INF/struts-config-logon.xml</param-value>**\n\
