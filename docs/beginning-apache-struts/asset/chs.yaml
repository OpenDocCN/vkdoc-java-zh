  \n**IncludeAction 和 ForwardAction**\n\n使用 Struts 的一个令人信服的理由是，它提供了一个验证用户输入的框架。如果你有以\
  \ Servlet 或 JSP 形式存在的遗留代码（业务逻辑），这是个好消息：可以在遗留代码处理之前，包含一个 Struts 前端来彻底验证用户输入。\n\n\n\
  \n你可以轻松地构建自己的前端解决方案，但 Struts 提供了一个立即可用的方案。`IncludeAction` 和 `ForwardAction` 使得将\
  \ Struts 与遗留的 Servlet 或 JSP 集成变得简单。\n\n你可以像使用其他 Action 一样使用它们，只需在 `<action>` 标签中添加一个\
  \ `parameter` 属性。这个 `parameter` 属性是一个路径，指向包含你想要调用的业务逻辑的 Servlet 或 JSP 的位置，一旦 Struts\
  \ 完成用户输入的验证。\n\n例如，假设你的遗留代码（一个 Servlet）执行用户登录，并且你想放置一个 Struts 前端来执行简单的验证，就像第 6 章清单\
  \ 6-1（Registration webapp）中那样。使用 `IncludeAction` 并将 `LoginForm`（用于保存和验证用户数据）与遗留\
  \ Servlet `com.myco.myapp.MyLoginServlet` 关联起来的 `<action>` 声明将是：\n\n```xml\n<action\
  \ path=\"/Login\"\n        type=\"org.apache.struts.actions.IncludeAction\"\n  \
  \      name=\"LoginForm\"\n        validate=\"true\"\n        input=\"/login.jsp\"\
  \n        parameter=\"/WEB-INF/classes/com/myco/myapp/MyLoginServlet\" />\n```\n\
  \n请注意，与 `DownloadAction` 一样，你不能指定 `<forward>`，因为遗留 Servlet 负责生成“下一个”页面。*但是*，*你可以指定异常处理器。*\n\
  \n*[www.it-ebooks.info](http://www.it-ebooks.info/)*\n\nDoray_6048C17.fm 第 248 页\
  \ 2006 年 1 月 24 日，星期二，上午 10:14\n\n**248**\n\n第 17 章 ■ 杂项\n\n**国际化**\n\n不幸的是，使用这种技术对遗留应用进行国际化没有简单的方法，因为你几乎无法控制遗留代码的输出。\n\
  \n如果你的遗留代码编写良好，业务逻辑在 Servlet 中，视图代码在 JSP 中，那么可以将遗留 JSP 迁移到使用 Struts 标签，并使用 `IncludeAction`\
  \ 或 `ForwardAction` 在 Struts 和遗留 Servlet 之间进行协调。当然，这假设遗留代码能正确处理非 ASCII 字符。但情况通常*并非*如此，不过如果你的目标语言只使用\
  \ Latin-1，那么你或许足够幸运，它们能够处理。\n\n使用 `ForwardAction` 的 `<action>` 声明类似——你只需将 `org.apache.struts.actions.IncludeAction`\
  \ 替换为 `org.apache.struts.actions.ForwardAction`。\n\n这就引出了一个问题：两者有什么区别？\n\n`IncludeAction`\
  \ 执行程序化的“包含”。这意味着两件事：\n\n*   **被调用的遗留代码*不能修改*发送给客户端的 Cookie 或头信息。** 发送给客户端的头和 Cookie\
  \ 由 Struts 决定。在某些场景下，保留头或 Cookie 信息至关重要——例如，当你使用 Struts 指定了请求的作用域时。\n*   **你可以继承\
  \ `IncludeAction` 来向响应对象写入内容。** 当然，你需要在某个时刻调用 `super.execute()` 以确保遗留代码被调用。你可以在任何时候执行此操作，无论是在向响应对象写入内容之前、之后，还是之间。\n\
  \n`ForwardAction` 执行程序化的“转发”，这意味着对发送给客户端的数据的*完全控制权*被移交给遗留代码。Struts *不能*决定头或 Cookie\
  \ 信息，并且你*不能*像使用 `IncludeAction` 那样，通过继承 `ForwardAction` 来向客户端写入数据。`ForwardAction`\
  \ 只是将对响应对象的所有控制权传递给遗留代码。\n\n**简而言之...**\n\n在大多数需要为遗留代码添加前端的情况下，你可能会使用 `IncludeAction`，因为它提供了更大的灵活性。它也很实用，因为即使在遗留代码发送其输出后，你仍然可以向客户端写入数据。\n\
  \n当遗留代码需要写入头或 Cookie 信息才能正常工作时（例如，如果它需要将内容类型设置为 `text/html` 以外的其他类型），`ForwardAction`\
  \ 是唯一的出路。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C17.fm\
  \ 第 249 页 2006 年 1 月 24 日，星期二，上午 10:14\n\n第 17 章 ■ 杂项\n\n**249**\n\n**LookupDispatchAction**\n\
  \n有时你可能希望在一个表单上放置多个提交按钮，每个按钮指示服务器端代码对提交的数据执行不同的操作。\n\n实现此目的的一种常见技术是使用 JavaScript\
  \ 设置表单上隐藏字段的值，从而允许服务器端处理代码判断用户点击了哪个提交按钮。\n\n例如，考虑下面的页面，它包含两个提交按钮（Save 和 Update）、一个隐藏字段以及根据点击的按钮更改隐藏字段值的\
  \ JavaScript：\n\n```jsp\n<%@ page contentType=\"text/html;charset=UTF-8\" %>\n<%@\
  \ taglib uri=\"/tags/struts-html\" prefix=\"html\" %>\n<html:html>\n<head>\n<script\
  \ language=\"JavaScript\">\nfunction changeMode(formName, src){\n    document.forms[formName].elements[\"\
  mode\"].value = src;\n}\n</script>\n</head>\n<body>\n<html:form action=\"MyFormHandler.do\"\
  >\n//... 表单上的其他字段，已省略\n<html:hidden property=\"mode\" value=\"unknown\"/>\n<html:submit\
  \ value=\"Save\"\n             onclick=\"changeMode('MyFormBean','save')\" />\n\
  <html:submit value=\"Update\"\n             onclick=\"changeMode('MyFormBean','update')\"\
  \ />\n</html:form>\n</body>\n</html:html>\n```\n\n这种自制的做法有三个缺点：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C17.fm 第 250 页 2006 年 1 月 24 日，星期二，上午 10:14\n\n**250**\n\n第 17 章 ■ 杂项\n\
  \n*   如果用户关闭了 JavaScript，它将无法工作。\n*   每次你有两个或更多提交按钮时，都必须复制服务器端代码，以便根据 `<html:hidden>`\
  \ 字段的值进行分发处理。你可以创建自己的 Action 子类来做到这一点，但正如你很快会看到的，这将是重复造轮子，而且造出来的轮子更差。\n*   另一个令人烦恼的是，你必须在每个具有此功能的\
  \ JSP 上粘贴或“包含”或“导入”该 JavaScript。并且你必须记得为每个提交按钮放入隐藏字段和 `onsubmit` 属性。\n\nStruts 提供了一种避免所有这些麻烦的方法。`LookupDispatchAction`\
  \ 允许你在 HTML 表单上拥有多个操作，*而无需*编写任何 JavaScript。\n\n`LookupDispatchAction` 的魔力在于，当你使用带有\
  \ `property` 属性的 `<html:submit>` 时，提交按钮上显示的文本会在表单提交时作为 URL 中的一个参数传递。提交的参数名称就是 `property`\
  \ 属性的值。这就是 `LookupDispatchAction` 知道表单上哪个提交按钮被点击的方式。\n\n使用 `LookupDispatchAction`\
  \ 很容易。我们考虑一个具体的例子：一个包含两个提交按钮的表单：Print 用于打印表单数据，Save 用于保存数据。\n\n你要做的第一件事是实现表单（参见清单\
  \ 17-5）。\n\n**清单 17-5.** *构建表单*\n\n```jsp\n<html:form action=\"MyFormHandler.do\"\
  >\n... // 表单属性在此处\n<html:submit property=\"action\">\n    <bean:message key=\"myapp.submit.button.print\"\
  \ />\n</html:submit>\n<html:submit property=\"action\">\n    <bean:message key=\"\
  myapp.submit.button.save\" />\n</html:submit>\n</html:form>\n```\n\n关于清单 17-5，唯一可能令人惊讶的是在\
  \ `<html:submit>` 按钮中使用了 `property` 属性。这表示 Struts 应该将提交按钮的*文本*（在本例中，是 `myapp.submit.button.print`\
  \ 或 `myapp.submit.button.save` 的*值*）作为请求 URL 中的一个参数传递，参数名为 `action`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C17.fm 第 251 页 2006 年 1 月 24 日，星期二，上午 10:14\n\n第 17 章 ■ 杂项\n\n**251**\n\
  \n例如，如果点击了 Print 按钮，请求 URL 将是 `http://..../MyFormHandler.do?action=Print`，当然，这假设用户当前所选语言环境中\
  \ `myapp.submit.button.print` 的值是 `Print`。\n\n■**注意** 我在清单 17-5 中使用了 `property=\"\
  action\"`，但你可以使用不同的值。\n\n\n\nLookupDispatchAction 利用 URL 中包含的信息来判断哪个按钮被点击。在实际应用中，URL\
  \ 中可能还会传递其他参数，因此你需要告诉 LookupDispatchAction 使用*哪个*参数名。这在你声明表单处理器时完成，如清单 17-6 所示。\n\
  \n**清单 17-6.** *声明表单处理器*\n\n<action path=\"/MyFormHandler\"\n\ntype=\"myco.myapp.struts.MyLookupDispatchAction\"\
  \n\n**parameter=\"action\"**\n\n...\n\n清单 17-6 展示了如何声明表单处理器。唯一额外信息是 `parameter=\"\
  action\"`，它告诉你的 LookupDispatchAction 子类，应使用请求 URL 中名为 `action` 的参数来判断哪个提交按钮被点击。\n\
  \n最后，你需要实现 LookupDispatchAction 子类，用于处理“打印”和“保存”请求。你还必须实现 `getKeyMethodMap()` 函数，该函数告诉\
  \ LookupDispatchAction 当特定提交按钮被点击时应调用哪个函数，如清单 17-7 所示。\n\n**清单 17-7.** *子类化 LookupDispatchAction*\n\
  \nimport org.apache.struts.actions.LookupDispatchAction;\n\n...\n\npublic class\
  \ MyLookupDispatchAction extends LookupDispatchAction{\n\n/**\n\n* 告诉 LookupDispatchAction\
  \ 当某个“提交”按钮被点击时\n\n* 应使用哪个函数。\n\n*\n\n* 注意：此函数仅由基类的 execute() 调用一次，\n\n* 因此无需保存返回的映射副本。\n\
  \n**/\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C17.fm Page\
  \ 252 Tuesday, January 24, 2006 10:14 AM\n\n**252**\n\n第 17 章 ■ 杂项\n\nprotected\
  \ Map getKeyMethodMap(){\n\nMap m = new HashMap();\n\nm.put(\"myapp.submit.button.print\"\
  ,\"print\"); m.put(\"myapp.submit.button.save\",\"save\"); return m;\n\n}\n\npublic\
  \ ActionForward print(ActionMapping mapping,\n\nActionForm form,\n\nHttpServletRequest\
  \ request,\n\nHttpServletResponse response)\n\nthrows IOException, ServletException\
  \ {\n\n//此处为打印代码。\n\n//记得返回“下一个”页面。\n\n}\n\npublic ActionForward save(ActionMapping\
  \ mapping,\n\nActionForm form,\n\nHttpServletRequest request,\n\nHttpServletResponse\
  \ response)\n\nthrows IOException, ServletException {\n\n//此处为保存代码。\n\n//记得返回“下一个”页面。\n\
  \n}\n\n}\n\n如清单 17-7 所示：\n\n• `getKeyMethodMap()` 返回一个 Map 实例，其中包含每个提交按钮文本对应的消息键。此消息键与你的\
  \ LookupDispatchAction 子类中需要被调用的函数名称相关联。请注意，`getKeyMethodMap()` 仅被调用一次，因此无需保存返回的\
  \ Map 实例副本。实际上，基类会自动为你保存返回的实例。\n\n• 存在 `print()` 和 `save()` 函数，它们具有与 `execute()`\
  \ 相同的签名。这些函数负责打印和保存提交的表单数据。具体调用哪个函数取决于用户点击的提交按钮。\n\n*没有* **`execute()` 的实现，因为我们希望隐式使用基类的\
  \ `execute()` 来调用 `print()` 或 `save()`。**\n\n**[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C17.fm Page 253 Tuesday, January 24, 2006 10:14 AM\n\n第 17 章 ■ 杂项\n\n\
  **253**\n\n除了几个零散问题外，使用 LookupDispatchAction 就这些内容：\n\n• 如果请求 URL 不包含 `action` 参数，则会抛出异常。与其听天由命，不如通过实现一个名为\
  \ `unspecified()` 的函数（具有与 `execute()` 相同的签名）来捕获此类错误，这或许更为便捷。你*不应*在 `getKeyMethodMap()`\
  \ 中声明此函数。\n\n• 某些表单使用取消按钮。你可以在表单中使用 `<html:cancel>` 来实现此功能。你可以通过实现一个名为 `cancelled()`\
  \ 的函数（具有与 `execute()` 相同的签名）来处理被取消的表单。你*不应*在 `getKeyMethodMap()` 中声明此函数。\n\n使用 `unspecified()`\
  \ 和 `cancelled()`，清单 17-7 可以重写为清单 17-8 所示。\n\n**清单 17-8.** *包含 unspecified() 和 cancelled()\
  \ 的 MyLookupDispatchAction* import org.apache.struts.actions.LookupDispatchAction;\n\
  \n...\n\npublic class MyLookupDispatchAction extends LookupDispatchAction{\n\n//此处无变化\n\
  \nprotected Map getKeyMethodMap(){\n\nMap m = new HashMap();\n\nm.put(\"myapp.submit.button.print\"\
  ,\"print\"); m.put(\"myapp.submit.button.save\",\"save\"); return m;\n\n}\n\npublic\
  \ ActionForward print(...)\n\nthrows IOException, ServletException {\n\n//此处为打印代码。\n\
  \n}\n\npublic ActionForward save(...)\n\nthrows IOException, ServletException {\n\
  \n//此处为保存代码。\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C17.fm\
  \ Page 254 Tuesday, January 24, 2006 10:14 AM\n\n**254**\n\n第 17 章 ■ 杂项\n\npublic\
  \ ActionForward unspecified(ActionMapping mapping,\n\nActionForm form,\n\nHttpServletRequest\
  \ request,\n\nHttpServletResponse response)\n\nthrows IOException, ServletException\
  \ {\n\nmapping.findForward(\"page-not-found\");\n\n}\n\npublic ActionForward cancelled(ActionMapping\
  \ mapping,\n\nActionForm form,\n\nHttpServletRequest request,\n\nHttpServletResponse\
  \ response)\n\nthrows IOException, ServletException {\n\nmapping.findForward(\"\
  main-page\");\n\n}\n\n}\n\nLookupDispatchAction 是使用隐藏字段处理多操作表单的一种优雅替代方案。它也是一种更健壮的替代方案，因为它不依赖于客户端机器上启用的\
  \ JavaScript。\n\n**DispatchAction**\n\n顾名思义，DispatchAction 是 LookupDispatchAction\
  \ 的基类，它根据 URL 参数执行方法分发。\n\nDispatchAction 最常见的用法是从 HTML 链接中调用它，参数嵌入在链接中。与 LookupDispatchAction\
