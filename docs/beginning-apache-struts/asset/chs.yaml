  \n**275**\n\n**实验 18f：在搜索中上下导航**\n\n从集合的列表页面（`list-search.jsp`）中，我们希望编辑集合中的联系人，并使用“上一个”和“下一个”按钮进行导航。\n\
  \n也就是说，我们希望集合的列表是一组链接（如同第 13 章中的“完整列表”页面——另见图 18-4）。如果点击某个链接，将显示该联系人的详细信息。用户可以在集合中上下移动，通过页面顶部的“下一个”或“上一个”按钮查看每个联系人的详细信息。图\
  \ 18-6 显示了联系人编辑页面。用户可以随时修改联系人的详细信息。修改后，更改将保存到数据库，并重新显示*同一个*联系人的详细信息。\n\n主要的设计挑战是如何访问集合中的特定联系人（当用户点击链接时），然后沿着集合向前/向后导航以显示其他联系人进行编辑（当用户点击“下一个”或“上一个”时）。\n\
  \n在继续阅读之前，请花几分钟思考这些问题的解决方案。\n\n（*提示*：你需要查看 `Scroller` 接口的源代码。）第一个问题很容易解决，因为 `Scroller`\
  \ 接口有一个 `absolute()` 函数，允许我们根据联系人在集合中的“偏移量”定位到所需的联系人。\n\n■**注意** `Scroller` 的 `absolute()`\
  \ 函数之所以如此命名，是因为具体的 `Scroller` 实现包含一个 `java.sql.ResultSet` 实例，该实例也有一个 `absolute()`\
