  **通过链接切换区域设置**\n\n让用户更改其网络浏览器中的区域设置并不总是可取的，甚至可能无法实现。在这种情况下，你可能希望他们点击一个链接，告诉服务器切换到所需的区域设置。实现此目的的方法是将区域设置编码为链接上的参数。例如：\n\
  \n<a href=\"/ChangeLocale.do?language=ta\">泰米尔语</a> 在此链接中，ChangeLocale 是一个表单处理器，它没有关联的表单\
  \ bean。在 struts-config.xml 中的声明将是\n\n<action path=\"/ChangeLocale\"\n\ntype=\"com.mycompany.myapp.ChangeLocaleAction\"\
  >\n\n<forward name=\"success\" path=\"/index.jsp\"/>\n\n</action>\n\nChangeLocaleAction\
  \ 是一个 Action 子类，具有以下 execute() 方法： public ActionForward execute(...){\n\nString\
  \ language = request.getParameter(\"language\"); String country = request.getParameter(\"\
  country\"); if(null == country){\n\nsetLocale(request, new Locale(language));\n\n\
  }else{\n\nsetLocale(request, new Locale(language,country));\n\n}\n\nreturn new ActionForward(mapping.findForward(\"\
  success\"));\n\n}\n\n当用户点击链接（该链接包含新的语言代码，以及可选的新的国家代码）时，控制权将传递给 ChangeLocaleAction，它会将该用户会话的默认区域设置设置为所需的组合。请注意，java.util.Locale\
