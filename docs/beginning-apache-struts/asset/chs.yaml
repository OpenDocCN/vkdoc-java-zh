  \nStruts 标签参考\n\n**本**附录是 Struts 1.2 所有标签的参考手册，涵盖五个标签库：HTML、Bean、Logic、Nested 和\
  \ Tiles。我们提供了使用示例以及关于 Struts-EL 和 JSTL（两者均见第 10 章）的信息，并在适当位置提供了与 JSF 和 Struts-Faces\
  \ 集成库（两者均见第 20 章）等效的标签。本参考手册*不*包含已过时的 Template 标签库，该库已被 Tiles 标签库取代。\n\n为使本参考手册更加紧凑，我们将出现在多个标签中的属性归入一个或多个*公共属性集*。这些属性集将在描述每个标签库的章节开头进行介绍。\n\
  \n**HTML 标签库**\n\nHTML 标签库中的自定义标签本质上与普通的 HTML `<form>` 标签及其相关的输入标签（如各种 `<input>`\
  \ 标签）一一对应。\n\n此标签库的目的是使您能够将 Struts Web 应用的视图层连接到控制器层。两者之间的连接在 struts-config.xml\
  \ 中静态完成。\n\nHTML 标签库中的标签可根据功能分为四组：\n\n\n\n• **表单标签**：这些标签用于将数据从视图层传输到控制器层。这些标签大多与对应的\
  \ HTML 标签（`<form>` 和各种 HTML 数据输入标签）一一对应，但也有一些 Struts 特有的标签（例如 multibox），它们能更便捷地实现视图层与控制器层之间的数据传输。\n\
  \n• **消息标签**：这些标签用于在视图层显示来自控制器的消息。\n\n• **URL 标签**：这些标签是普通 HTML 中需要 URL 才能工作的标签的对应版本。Struts\
  \ 版本的存在主要是为了允许你使用全局转发的名称，而不是实际的 URL。\n\n• **其他标签**：这些标签没有明确的功能分组，需要单独处理。\n\n**381**\n\
