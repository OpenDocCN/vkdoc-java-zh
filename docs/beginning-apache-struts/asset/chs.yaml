  \ 第 19 页 2006 年 1 月 23 日星期一 上午 11:45\n\n第 3 章 ■ 理解作用域\n\n**19**\n\n我希望这个小小的*思想实验*能让你清楚地理解各种作用域的工作原理。为了消除你可能存在的任何疑虑，请在实际环境中尝试一下：**1.**\
  \ 将位于 Apress 网站 http://www.apress.com 源代码部分的 lab3.war 文件复制到 Tomcat 的`\\webapps\\\
  `目录中。\n\n**2.** 启动 Tomcat（如果尚未运行）。\n\n**3.** 使用你喜欢的 Web 浏览器，导航到 http://localhost:8080/lab3/。\n\
  \n你应该会看到一个主页面，其中包含指向 First.jsp 四个版本的链接，每个版本对应一种作用域（见图 3-1）。请尝试操作该应用程序，直到你*绝对*确定理解了各种作用域之间的区别。\n\
  \n**图 3-1.** *作用域 Web 应用程序起始页面* 最后一个问题：如果我们在 JSP 页面上使用脚本片段创建一个变量，如下所示：\n\n<% int\
  \ x = 7; %>\n\n它隐式地具有什么作用域？\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C03.fm 第 20 页 2006 年 1 月 23 日星期一 上午 11:45\n\n**20**\n\n第 3 章 ■ 理解作用域\n\
  \n**以防你好奇...**\n\n你可能已经注意到我们为`myVariable`使用了`StringBuffer`，并且你可能想知道是否可以使用`String`。我们不能。\n\
  \n原因是你无法重新分配使用`<jsp:useBean>`声明的变量。`String`是不可变的，因此每次你尝试使用`myVariable += \"1\"`这样的语句更改`String`时，你都在尝试重新分配变量。\n\
  \n然而，调用变量上的函数是可以的，因为我们没有重新分配任何东西。因此，`myVariable.append(\"1\")`是可接受的，因为我们只是在变量引用的对象上调用一个函数。该变量引用的是与之前相同的对象实例——没有进行重新分配。\n\
  \n**会话和请求作用域内部机制**\n\n在上一章中，我们遇到了两个 Servlet 类：`HttpServletRequest`和`HttpSession`，正如我所解释的，它们代表了\
  \ Web 应用程序中对象的生命周期。\n\n如果当时这个评论显得有些隐晦，那么现在我想澄清一下。\n\n\n\n这两个类都提供了 `setAttribute()`\
  \ 和 `getAttribute()` 方法（详见附录 B），用于在对象上存储和检索数据，这与 HashMap 的 `put()` 和 `get()` 方法非常相似。存储在\
  \ `HttpServletRequest` 上的对象具有**请求作用域**，而存储在 `HttpSession` 上的对象则具有**会话作用域**。\n\n\
  当你在 JSP 页面中创建变量时（如清单 3-1 所示），根据你所使用的作用域，你实际上是在隐式地调用相应对象（`HttpServletRequest` 或 `HttpSession`\
  \ 的实例）上的 `setAttribute()` 方法。\n\n类似地，当你在 First.jsp 和 Second.jsp 中嵌入的脚本片段中使用 `myVariable`\
  \ 时，Servlet 容器会通过调用相应对象上的 `getAttribute(\"myVariable\")` 方法来检索该变量。\n\n因此，如果你*以某种方式*获取到\
  \ `HttpServletRequest` 或 `HttpSession` 的实例，就可以将对象存入其中，而这些对象原则上可以从你的 JSP 页面中检索出来。事实上，你只需要一个\
  \ `HttpServletRequest` 实例，因为你可以通过调用 `HttpServletRequest` 上的 `getSession()` 方法来获取关联的\
  \ `HttpSession` 实例。\n\n“以某种方式”将在后续章节中变得清晰。目前，请注意这是在你构建 Web 应用的 Java 类和 JSP 之间传递数据的一种方式。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C03.fm Page 21 Monday,\
  \ January 23, 2006 11:45 AM\n\n第 3 章 ■ 理解作用域\n\n**21**\n\n**总结**\n\n• 作用域描述了变量的生命周期和可见性。\n\
  • **会话**和**请求**作用域是最常用的作用域。\n• 会话作用域的变量在用户与系统的整个会话期间存在。\n• 请求作用域的变量仅在一次页面请求（包括重定向）期间存在。\n\
  • 会话作用域的变量存储在 `HttpSession` 的实例中。\n• 请求作用域的变量存储在 `HttpServletRequest` 的实例中。\n• `HttpServletRequest`\
  \ 和 `HttpSession` 可用于在 Java 类和 JSP 之间传递数据。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
