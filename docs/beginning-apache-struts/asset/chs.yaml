  \nDoray_6048.book 第 93 页 2006 年 1 月 10 日星期二 下午 5:10\n\n第 9 章\n\n■ ■ ■\n\n配置 Struts\n\
  \n**到**目前为止，我已经按照 MVC 设计模式介绍了 Struts 的各个部分。在实验 6、7 和 8 中，您已经为 LILLDEP Web 应用自行实现了这些部分。缺少的是\
  \ Struts 如何将各种模型-视图-控制器部分连接起来的方式。\n\nStruts 使用一个名为 struts-config.xml 的单一配置文件来存储这些信息。Struts\
  \ 发行版附带了此文件的示例，您可以复制并根据自己的需要进行修改。\n\n**struts-config.xml 的结构**\n\n毫不意外，struts-config.xml\
  \ 以 XML 格式保存数据。它包含几个部分，每个部分处理 Struts 特定部分的配置：\n\n• **表单 Bean 声明**：在此处将您的 ActionForm\
  \ 子类映射到一个名称。您可以在 struts-config.xml 文件的其余部分甚至 JSP 页面上使用此名称作为 ActionForm 的别名。\n\n\
  • **全局异常**：此部分定义处理过程中抛出的异常的处理程序。\n\n• **全局转发**：此部分将 Web 应用中的页面映射到一个名称。您可以使用此名称来引用实际页面。这避免了在\
  \ Web 页面上硬编码 URL。\n\n• **表单处理程序**：还记得我在上一章提到的表单处理程序吗？\n\n\n\n这里是声明它们的地方。表单处理器也称为“动作映射”。\n\
  \n• **控制器** **声明**：此部分配置 Struts 内部机制。在实际应用中很少使用。\n\n• **消息资源**：此部分告诉 Struts 在哪里找到你的属性文件，这些文件包含提示信息和错误消息。\n\
  \n**93**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048.book\
  \ 第 94 页 2006 年 1 月 10 日，星期二，下午 5:10\n\n**94**\n\n第 9 章 ■ 配置 STRUTS\n\n• **插件**\
  \ **声明**：这是声明 Struts 扩展的地方。你将使用两个重要的插件：**Tiles** 和 **Validator**。\n\n这些部分必须按此顺序放置。并非所有部分都必须存在。例如，你可能不想利用全局异常处理功能。在这种情况下，你的\
  \ `struts-config.xml` 文件将不包含全局异常部分。\n\n■**注意** 早期版本的 Struts 在表单 Bean 声明之前有一个“数据源”部分。此数据源部分允许你为\
  \ Web 应用预配置 JDBC 数据源。该部分现已弃用。\n\n在这七个部分中，表单 Bean、表单处理器（或动作映射）和消息资源部分是最重要的，你必须掌握它们才能使用\
  \ Struts。\n\n在我介绍各个部分之前，让我们先看一个简单的 `struts-config.xml` 文件，即 Registration Web 应用所使用的文件。\n\
  \n**配置 Registration Web 应用**\n\nRegistration Web 应用的 `struts-config.xml` 文件（如清单\
  \ 9-1 所示）只需要表单 Bean、全局异常、全局转发、表单处理器（或动作映射）和消息资源部分。\n\n**清单 9-1.** *Registration\
  \ Web 应用的 struts-config.xml*\n\n<?xml version=\"1.0\" encoding=\"ISO-8859-1\" ?>\n\
  \n<!DOCTYPE struts-config PUBLIC\n\n\"-//Apache Software Foundation//DTD Struts\
  \ Configuration 1.1//EN\"\n\n\"http://jakarta.apache.org/struts/dtds/struts-config_1_1.dtd\"\
  >\n\n<struts-config>\n\n<form-beans>\n\n<form-bean\n\nname=\"RegistrationForm\"\n\
  \ntype=\"net.thinksquared.registration.struts.RegistrationForm\"/>\n\n</form-beans>\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048.book 第 95 页 2006\
  \ 年 1 月 10 日，星期二，下午 5:10\n\n第 9 章 ■ 配置 STRUTS\n\n**95**\n\n<global-exceptions>\n\
  \n<exception key=\"reg.error.io-unknown\"\n\ntype=\"java.io.IOException\"\n\nhandler=\"\
  net.thinksquared.registration.ErrorHandler\"/>\n\n<exception key=\"reg.error.unknown\"\
  \n\ntype=\"java.lang.Exception\"\n\npath=\"/errors.jsp\" />\n\n</global-exceptions>\n\
  \n<global-forwards>\n\n<forward name=\"ioError\" path=\"/errors.jsp\"/>\n\n</global-forwards>\n\
  \n<action-mappings>\n\n<action\n\npath=\"/Registration\"\n\ntype=\"net.thinksquared.registration.struts.RegistrationAction\"\
  \n\nname=\"RegistrationForm\"\n\nscope=\"request\"\n\nvalidate=\"true\"\n\ninput=\"\
  /Registration.jsp\">\n\n<forward name=\"success\" path=\"/Success.jsp\"/>\n\n</action>\n\
  \n</action-mappings>\n\n<message-resources parameter=\"Application\"/>\n\n</struts-config>\n\
  \n在清单 9-1 中，三个主要部分应该一目了然：表单 Bean 部分由 `<form-beans>` 标签包围，表单处理器部分由 `<action-mappings>`\
  \ 标签包围，而单个消息资源部分由 `<message-resources>` 标签包围。接下来我将详细描述这些部分。\n\n**声明表单 Bean**\n\n\
  表单 Bean 部分是你为 `ActionForm` 子类命名的地方，这些名称既可以在 `struts-config.xml` 中使用，也可以在 JSP 页面中使用。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048.book 第 96 页 2006\
  \ 年 1 月 10 日，星期二，下午 5:10\n\n**96**\n\n第 9 章 ■ 配置 STRUTS\n\n该声明由一个封闭的 `<form-beans>`\
  \ 标签（注意是复数形式）和一个或多个 `<form-bean>`（注意是单数形式）标签组成，如清单 9-2 所示。\n\n**清单 9-2.** *表单 Bean\
  \ 部分*\n\n<form-beans>\n\n<form-bean\n\nname=\"RegistrationForm\"\n\ntype=\"net.thinksquared.registration.struts.RegistrationForm\"\
  />\n\n</form-beans>\n\n一个 `<form-bean>` 标签有两个属性：\n\n\n\n• name：name 属性是 ActionForm\
  \ 子类的唯一标签。在清单 9-2 中，name 是 RegistrationForm，但你可以使用任何你喜欢的名称，只要它在其他 form bean 声明中是唯一的，并且符合\
  \ XML 属性值的要求。\n\n• type：type 属性是该 ActionForm 子类的完全限定类名。\n\n通过此声明，你可以使用名称 RegistrationForm\
  \ 来引用 ActionForm 子类 net.thinksquared.registration.struts.RegistrationForm。\n\n**声明全局异常**\n\
  \n全局异常允许你捕获 Action 子类中未捕获的运行时异常，并使用自定义错误消息显示它们。与默认的 Tomcat 错误页面相比，这无疑为你的应用程序增添了一些精致感。清单\
  \ 9-3 展示了定义异常处理器的两种方式。\n\n**清单 9-3.** *声明全局异常处理器*\n\n<global-exceptions>\n\n<exception\
  \ key=\"reg.error.io-unknown\"\n\ntype=\"java.io.IOException\"\n\nhandler=\"net.thinksquared.registration.IOErrorHandler\"\
  />\n\n<exception key=\"reg.error.unknown\"\n\ntype=\"java.lang.Exception\"\n\npath=\"\
  /errors.jsp\"/>\n\n</global-exceptions>\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048.book 第 97 页 2006 年 1 月 10 日，星期二，下午 5:10\n\n第 9 章 ■ 配置 STRUTS\n\n**97**\n\
  \n<global-exceptions> 标签包含全局异常处理器，每个处理器由一个 <exception> 标签表示。每个 <exception> 标签有两个必需属性：\n\
  \n• key：错误键。当异常处理器被触发时，会创建一个带有此键的 ActionMessage 并放入请求中。此错误消息会被粘贴到包含 <html:errors>\
  \ 标签的 JSP 页面上，最终显示出来。请注意，key 是一个必需属性，即使你不使用它也必须指定。\n\n• type：描述被捕获的错误类型。Struts 会首先尝试查找与声明类型匹配的错误类。如果没有完全匹配的，Struts\
  \ 会沿着该错误的超类树向上查找，直到找到与声明的异常匹配的项。\n\n有两种方式可以处理捕获的异常：使用 path 属性指向一个显示错误消息的 JSP 页面，或者使用\
  \ handler 属性，该属性是你的 ExceptionHandler 子类的完全限定类名——即你的处理器子类：\n\norg.apache.struts.action.ExceptionHandler\n\
  \n你只需要重写 execute() 函数：\n\npublic ActionForward execute(**Exception ex,**\n\n**ExceptionConfig\
  \ ae,**\n\nActionMapping mapping,\n\nActionForm form,\n\nHTTPRequestServlet request,\n\
  \nHTTPResponseServlet response)\n\n如你所见，除了额外的前两个参数外，这与 Action.execute() 几乎相同。你应该在\
  \ <global-forwards> 部分（见下一节）中声明“下一个”页面，以便 mapping 可以解析它。\n\n在大多数情况下，使用自定义的 ExceptionHandler\
  \ 子类有些过度，除非你有特殊需求。\n\n**声明全局转发**\n\n你可以使用全局转发来定义所有 Action 或 ExceptionHandler 可访问的转发路径。实际上，只要你有一个由\
  \ Struts 初始化的 ActionMapping 实例，所有这些路径都是可访问的。对于 Action 或 ExceptionHandler 中的 execute()\
  \ 函数来说，情况确实如此。\n\n全局转发定义在一个封闭的 <global-forwards> 标签内，你可以在其中放置任意数量的 <forward> 标签，如清单\
  \ 9-4 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048.book\
  \ 第 98 页 2006 年 1 月 10 日，星期二，下午 5:10\n\n**98**\n\n第 9 章 ■ 配置 STRUTS\n\n**清单 9-4.**\
  \ *声明全局转发*\n\n<global-forwards>\n\n<forward name=\"ioError\" path=\"/errors.jsp\"\
  />\n\n</global-forwards>\n\n每个 <forward> 标签有两个属性：\n\n• name：此转发的全局唯一名称。\n\n• path：此转发所指向的\
  \ JSP 或表单处理器的路径。在这两种情况下，路径都必须以斜杠 (/) 开头。\n\n在清单 9-4 中，声明了一个名为 ioError 的转发，它指向路径\
  \ errors.jsp。你可以通过 execute() 中可用的 mapping 对象访问此路径：**mapping.findForward(\"ioError\"\
  )**\n\n**声明表单处理器**\n\n表单处理器定义在一个单一的 <action-mappings> 封闭标签内，如清单 9-5 所示。\n\n**清单\
  \ 9-5.** *表单处理器声明*\n\n<action-mappings>\n\n<action\n\npath=\"/**Registration**\"\
  \n\ntype=\"net.thinksquared.registration.struts.RegistrationAction\"\n\nname=\"\
  RegistrationForm\"\n\nscope=\"request\"\n\nvalidate=\"true\"\n\ninput=\"/Registration.jsp\"\
  >\n\n<forward name=\"success\" path=\"/Success.jsp\"/>\n\n</action>\n\n</action-mappings>\n\
  \n<action-mappings> 标签作为每个表单处理器的容器，每个处理器由一个 <action> 标签描述。<action> 标签包含几个配置处理器的属性：\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048.book 第 99 页 2006\
  \ 年 1 月 10 日，星期二，下午 5:10\n\n第 9 章 ■ 配置 STRUTS\n\n**99**\n\n• path：描述表单处理器的名称。\n\n\
  • type：处理业务逻辑的 Action 子类的完全限定类名。\n\n• name：与此处理器关联的 form bean 的名称。\n\n• validate：告诉\
  \ Struts 是否应对表单数据执行简单验证。\n\n• scope：设置表单数据的作用域。只允许 request 或 session 作用域。\n\n• input：构成此页面输入的页面的相对路径。\n\
  \npath 属性必须以斜杠开头。这有一个含义，我将在后面的章节中介绍。你可能想回忆一下表单处理器在你的 JSP 中是如何使用的，即 <html:form> 标签的\
  \ action 属性：\n\n<html:form action=\" **Registration**.do\" ...> 在此代码片段中，表单处理器是 Registration，这对应于清单\
  \ 9-5 中表单处理器声明的 path 属性。.do 扩展名告诉 servlet 容器这是一个 Struts 表单处理器。此扩展名是默认的，并在 Struts\
  \ 分发的 web.xml 文件中定义。\n\n就像在 form bean 声明中一样，type 属性是处理业务逻辑的 Action 子类的完全限定名称。在这种情况下，它是\
  \ RegistrationAction。\n\nname 属性是与处理器关联的 form bean 的名称。在这种情况下，它是 RegistrationForm，这是\
  \ RegistrationForm 子类的一个明显别名。\n\nvalidate 属性可以是 true 或 false，它告诉 Struts 是否应调用 form\
  \ bean 的 ActionForm 子类上的 validate() 方法。换句话说，只有当 validate=\"true\" 时，Struts 才会执行简单验证。\n\
  \nscope 属性可以是 request 或 session，它告诉 Struts 将包含表单数据的 form bean 放入哪个作用域。\n\n最后，input\
  \ 属性只是输入页面的路径。这就是 mapping.getInputForward()（参见第 7 章）知道输入页面是什么的方式。在清单 9-5 中，输入页面是\
  \ Registration.jsp。\n\n请注意，输入页面的路径必须以斜杠开头，这表示 webapp 的“根”目录。这对应于你为部署 webapp 而创建的\
  \ WAR 文件中的根目录。或者，换一种方式来看，当 webapp 安装后，根目录就是 servlet 容器下托管的 \\webapps\\<app name>\\\
  \ 目录。\n\n例如，如果 Registration webapp 部署在一个名为 registration.war 的 WAR 文件中，那么 servlet\
  \ 容器上的根目录将是 \\webapps\\registration\\。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048.book 第 100 页 2006 年 1 月 10 日，星期二，下午 5:10\n\n**100**\n\n第 9 章 ■ 配置 STRUTS\n\
  \n关于 input 属性的最后一点。如果我把它放在全局转发部分，我可以为 Registration.jsp 声明一个全局转发，并使用该全局转发的名称作为 input\
  \ 的值。\n\n**转发**\n\n每个 <action> 标签可以包含零个或多个 <forward> 标签。这些转发与\n\n\n\n在全局转发部分声明的\
  \ `<forward>` 仅对包含它的表单处理器可见。而在全局转发部分声明的 `<forward>` 则全局可见。\n\n`<forward>` 代表该表单处理器可能跳转的“下一个”页面。与全局转发部分中的\
  \ `<forward>` 类似，每个 `<forward>` 标签都有两个属性：\n\n• name：为“下一个”页面指定一个名称\n\n• path：实际页面的路径，相对于\
  \ Web 应用的根目录。name 属性用于在关联该表单处理器的 Action 子类中标识这个“下一个”页面。这就是 `mapping.findForward()`\
  \ 的工作方式（参见清单 7-2）：`return mapping.findForward(\"success\");`\n\n这里的标签 `success`\
  \ 就是 name 属性的值。\n\n如果 path 是真实路径，则必须以斜杠开头。如果你将该页面声明为全局转发，那么你可以直接使用全局转发的名称。在这种情况下，路径值开头不能有斜杠，因为它只是一个标签，而非真实路径。\n\
  \n**控制器声明**\n\n控制器部分可能是七个部分中使用最少的。它用于手动覆盖 Struts 的一些默认设置。这里我只提几个有用的设置：\n\n• maxFileSize：指定上传文件的大小上限。你可以使用数字后跟\
  \ K、M 或 G 来分别表示千字节、兆字节或吉字节。例如，`maxFileSize=\"2M\"` 将文件大小限制为 2MB。我们将在第 11 章中处理文件上传。\n\
  \n• nocache：告诉 Struts 是否应该缓存内容。设置 `nocache=\"true\"` 会禁用内容缓存。\n\n• contentType：指定页面的默认内容类型。例如，如果你默认提供\
  \ XML 页面，则设置 `contentType=\"text/xml\"`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048.book Page 101 Tuesday, January 10, 2006 5:10 PM\n\n第 9 章 ■ 配置 STRUTS\n\
  \n**101**\n\n• 以下代码片段展示了如何声明一个控制器部分：\n\n<controller maxFileSize=\"1.618M\" contentType=\"\
  text/svg\" /> 这将最大可上传文件大小设置为黄金比例的 1.618MB，并将默认内容类型设置为 SVG。\n\n**消息资源**\n\n消息资源部分声明了存储应用程序键/值对的属性文件的位置。回想一下，这个属性文件的内容被隐式地用于创建错误消息：\n\
  \n`errors.add(\"userid\",new ActionMessage(\"reg.error.userid.exists\"));` 以及 JSP\
  \ 页面上的提示：\n\n`<bean:message key=\"registration.jsp.prompt.userid\"/>` 与前两个部分不同，这一部分*没有*包含标签。\n\
  \n`<message-resources parameter=\"Application\"/>` `<message-resources>` 标签的主要属性是\
  \ `parameter` 属性，它指定了应用程序属性文件相对于 Web 应用 `\\WEB-INF\\classes\\` 目录的位置。因此，在上面的声明中，消息资源文件是\n\
  \n`\\WEB-INF\\classes\\Application.properties`\n\n请注意，在声明中，`.properties` 扩展名是隐含的。如果你将属性文件放在更深的包中，例如：\n\
  \n`\\WEB-INF\\classes\\net\\thinksquared\\registration\\struts\\resources\\` 那么\
  \ `parameter` 属性的值将是：\n\n`net.thinksquared.registration.struts.resources.Application`\n\
  \n**声明插件**\n\n插件是 Struts 的自定义扩展。一个例子是 Tiles 框架，它是独立于 Struts 开发的。在 Struts 的早期（1.2\
  \ 之前）版本中，Tiles 必须单独下载。尽管它现在是 1.2 发行版的一部分，但其早期独立存在的痕迹仍然很明显，因为你必须为 Tiles 声明一个插件部分才能在\
  \ Struts 中使用它。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048.book\
  \ Page 102 Tuesday, January 10, 2006 5:10 PM\n\n**102**\n\n第 9 章 ■ 配置 STRUTS\n\n\
  插件部分告诉 Struts 要初始化哪些插件以及它们需要哪些数据（通常是插件所需的各种配置文件的路径）。清单 9-6 显示了一个典型的插件声明。\n\n**清单\
  \ 9-6.** *一个可能的 Tiles 插件声明*\n\n<plug-in className=\"org.apache.struts.tiles.TilesPlugin\"\
  \ >\n\n<set-property property=\"definitions-config\"\n\nvalue=\"/WEB-INF/tiles-defs.xml\"\
  />\n\n</plug-in>\n\n每个 `<plug-in>` 标签声明一个插件。在你的 `struts-config.xml` 文件中可以有多少个这样的标签没有限制。`className`\
  \ 属性是必需的，它指向 Struts 调用的插件类。这个类对于每个插件都是唯一的。\n\n每个 `<plug-in>` 标签可以包含零个或多个 `<set-property>`\
  \ 标签来设置插件所需的各种属性。这里只有两个属性：\n\n• property：定义正在设置的属性\n\n• value：指定相应的值\n\n不用说，每个插件都需要不同的配置，你需要从插件的文档中获取详细信息。\n\
  \n**实验 9a：配置 LILLDEP**\n\n在本实验中，你将配置 LILLDEP 并将其部署到 Tomcat 上。对 LILLDEP 的 `\\web\\\
  WEB-INF\\struts-config.xml` 文件进行以下更改：\n\n**1.** 为你实验 6 中实现的 ActionForm 子类声明一个名为\
  \ `ContactFormBean` 的表单 Bean。\n\n**2.** 为 `full.jsp` 中的表单声明一个表单处理器。这个表单处理器的名称应该是什么？\n\
  \n**3.** 该表单处理器的 Action 子类应该是你在实验 7 中实现的那个。使用的表单 Bean 应该是步骤 1 中的那个。\n\n**4.** 将\
  \ `scope` 属性设置为 `request`。\n\n**5.** 为表单处理器的 `input` 属性提供一个值。这个属性在哪里使用？如果从表单处理器的声明中省略这个属性会发生什么？\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00026.png)\n\nDoray_6048.book\
  \ Page 103 Tuesday, January 10, 2006 5:10 PM\n\n第 9 章 ■ 配置 STRUTS\n\n**103**\n\n\
  **6.** 为此表单处理器创建一个指向 `full.jsp` 页面的转发。这个转发的 `name` 属性应该是什么？（提示：检查 Action 子类的代码。）如果省略这个转发声明会发生什么？\n\
  \n**7.** 运行 `compile.bat` 生成 WAR 文件，然后部署并测试你的应用程序。\n\n图 9-1 显示了 LILLDEP 起始页面应该是什么样子。你应该能够向\
  \ LILLDEP 输入数据。测试你在实验 6 中编写的简单验证。\n\n**图 9-1.** *LILLDEP 起始页面*\n\n**代码复用**\n\n在\
  \ `struts-config.xml` 文件中声明表单处理器而不是硬编码的原因之一是为了促进代码复用。\n\n在实验 9a 中，你实现了一个特定于 `full.jsp`\
  \ 页面的表单处理器。但是，如果你希望另一个页面将数据提交到这个表单处理器呢？显然你现在做不到，因为这个表单处理器的唯一“下一个”页面是 `full.jsp`。\n\
  \n一种方法是声明一个新的 `<forward>`，并修改 `ContactAction` 以分派到与输入页面相对应的转发。这个“解决方案”并不是一个好方法，因为每次你想要添加或删除一个页面时，都必须修改并重新编译\
  \ `ContactAction`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048.book\
  \ Page 104 Tuesday, January 10, 2006 5:10 PM\n\n**104**\n\n第 9 章 ■ 配置 STRUTS\n\n\
  Struts 提供的解决方案要好得多。其思想是在 `struts-config.xml` 中声明一个*新的*表单处理器来处理来自不同页面的输入。然后，你可以在这个新的表单处理器中重用表单\
  \ Bean 和 Action 子类，但使用不同的 `<forward>`。\n\n下一个实验课程将向你展示如何做到这一点。\n\n**实验 9b：MNC 页面**\n\
  \n在 LILLDEP 中，用户经常需要填写来自跨国公司（MNC）的联系人。对于这些公司，用户希望有一个单独的表单，只包含以下七个字段：\n\n• 姓名\n\n\
  • 职位\n\n• 部门\n\n• 电子邮件\n\n• 公司\n\n• 地址\n\n• 邮政编码\n\n“分类”字段应*自动*设置为字符串值 `mnc`。你可以使用\
  \ `<html:hidden>` 标签\n\n\n\n<html:hidden property=\"myFormProperty\" value=\"myFixedValue\"\
  /> 用于自动设置分类字段。其他字段应留空。图 9-2 展示了 MNC 页面在用户眼中的显示效果。\n\n**1.** 完成 mnc.jsp 的实现。表单处理器应命名为\
  \ ContactFormHandlerMNC。\n\n**2.** 在 struts-config.xml 中添加一个新的表单处理器，用于接收来自 mnc.jsp\
  \ 的数据。（单个）转发应指向 mnc.jsp。该转发的名称应是什么？（提示：ContactAction 只知道一个转发标签。）\n\n**3.** 运行 compile.bat\
  \ 以生成 WAR 文件。\n\n**4.** 停止 Tomcat，然后删除 \\webapps\\lilldep\\ 文件夹。之后重新部署 LILLDEP Web\
  \ 应用程序。\n\n按照实验 9a 中的方式测试你的应用程序。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00008.png)\n\nDoray_6048.book 第 105 页 2006 年 1 月 10 日星期二 下午 5:10\n\n第\
  \ 9 章 ■ 配置 STRUTS\n\n**105**\n\n**图 9-2.** *MNC 数据输入页面*\n\n**总结**\n\n在本章中，你学习了配置\
  \ Struts 的基础知识：\n\n• struts-config.xml 文件将 Web 应用程序的视图和控制器部分连接在一起。\n\n• struts-config.xml\
  \ 部署在 Web 应用程序的 \\WEB-INF\\ 目录中。\n\n• ActionForm 子类通过表单 Bean 声明暴露给 Web 应用程序。\n\n\
  • 表单处理器声明将表单 Bean、Action 子类以及一个或多个“下一个”页面连接在一起。\n\n• 应用程序的属性文件在 struts-config.xml\
  \ 的消息资源部分中声明。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048.book\
  \ 第 106 页 2006 年 1 月 10 日星期二 下午 5:10\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C10.fm 第 107 页 2006 年 1 月 24 日星期二 上午 10:12\n\n第 10 章\n\n■ ■ ■\n\n更多标签\n\
  \n**第** 8 章我们介绍了基本的 Struts 标签：用于显示静态文本、辅助表单数据输入以及显示错误消息的标签。\n\n本章中我们将探讨的内容会稍微复杂一些。自\
  \ Struts 首次开发以来，Java/JSP 领域发生了两次范式转变：JSP 标准模板库（JSTL）和 JavaServer Faces（JSF）。\n\n\
  JSTL 旨在创建一套标准化的 JSP 标签，用于执行某些通用任务，例如迭代、条件处理、格式化、国际化、XML 处理和数据访问。在 JSTL 出现之前，像 Struts\
  \ 这样的每个 JSP 相关技术都必须从头开始创建自定义标签来完成这些工作。\n\n这种“自己动手”的方法有两个主要缺点：\n\n• **更陡峭的学习曲线**：刚接触此类\
  \ JSP 相关技术的开发者必须学习如何使用该技术的自定义标签来执行通用操作。\n\n• **不完整或不灵活的标签库**：由于新技术的重点*并非*在于做好通用功能，这意味着这些自定义标签库通常在灵活性和功能上有所欠缺。开发者常常不得不借助脚本小程序（scriptlet）的笨拙技巧来获得所需的功能。\n\
  \nJSTL 通过提供执行许多通用功能的标签很好地解决了这些问题。它还大量使用了一种称为表达式语言（EL）（来自新的 JSP 2.0 规范）的“迷你语言”，这使得这些标签非常灵活。因此，当\
  \ JSTL 与自定义 Struts 标签功能重叠时，它是首选技术。\n\n不幸的是，JSTL 需要符合 JSP 2.0 规范的 Servlet 容器才能工作。这对于那些必须使用不符合\
  \ JSP 2.0 规范的“遗留”Servlet 安装环境的开发者来说是个问题。\n\n另一个并行发展的是 JavaServer Faces（JSF），这是 Sun\
  \ 公司的一项规范，它（除其他功能外）提供了一套自定义标签来显示各种客户端界面，其丰富程度远超 Struts HTML 和 Bean 标签库中那可怜的一小部分。Apache\
  \ Shale 项目（更多内容见第 20 章）是基于 JSF 规范对 Struts 进行的彻底重写。未来 Shale 中的某些标签很可能会被引入 Struts。\n\
  \n**107**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C10.fm\
  \ 第 108 页 2006 年 1 月 24 日星期二 上午 10:12\n\n**108**\n\n第 10 章 ■ 更多标签\n\n本章将介绍另外两个 Struts\
  \ 标签库，以及 Struts 与 JSTL 之间的一些相关重叠部分。我们还将探讨如何让 Struts 标签接受 EL 表达式。\n\n我们将在第 20 章中描述\
  \ JSF 和 Shale。\n\n但首先，这里有一些指导原则来指引方向。\n\n**最佳实践**\n\n在标签和标签库的泥沼中很容易迷失方向，因此我希望你考虑两条我认为有用的经验法则，以便在面临选择时决定使用哪个标签库：\n\
  \n• **警惕脚本小程序**：脚本小程序本身并非“邪恶”，但如果你发现自己使用它们来弥补标签的不足，那么是时候考虑寻找替代方案了。\n\n• **使用“定制的通用解决方案”**（请原谅这个矛盾修辞法）：尽可能使用像\
  \ JSTL 这样的通用解决方案。\n\n我希望这两个启发式方法背后的理由显而易见。自定义标签的存在就是为了消除使用脚本小程序的需要。因此，如果你发现自己不得不使用脚本小程序，那么你正在使用的自定义标签并没有很好地完成它们的工作。\n\
  \n**剩余的 2 + 1 个 Struts 库**\n\n在第 8 章中，你了解了如何使用 HTML 和 Bean 标签库。还有另外三个 Struts 标签库：**Logic**、**Nested**\
  \ 和 **Tiles** 标签库。\n\n■**注意** 在 Struts 1.2 之前的旧版本中，你可能会遇到一个“template”标签库。Tiles 库取代了这个较旧的“template”标签库。\n\
  \n在本章中，我们只介绍 Logic 和 Nested 标签库。Tiles 标签需要单独用一整章来介绍（第 14 章）。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
