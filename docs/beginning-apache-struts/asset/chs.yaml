  \n无。\n\n**Tiles 标签库**\n\nTiles 标签库支持 Tiles 插件，该插件用于创建布局和可重用的 GUI 组件。第 14 章详细解释了\
  \ Tiles，你应该查阅该章以了解如何使用 Tiles。\n\n表 C-13 给出了 Tiles 标签库中所有标签的概要。表 C-13 基于 Apache 文档。请参阅\
  \ www.apache.org/licenses/LICENSE-2.0 获取 Apache 许可证副本。\n\n**表 C-13.** *Tiles 标签库概要*\n\
  \n**标签**\n\n**用法/注释**\n\ninsert\n\n插入一个布局或 Tile。\n\n\n\ndefinition\n\n声明一个布局或自定义布局，供后续使用。\n\
  \nput\n\n向当前上下文添加一个 Tiles 属性。\n\nputList 和 add\n\nputList 在当前上下文中定义一个列表属性。add 用于向该列表添加项目。\n\
  \nget\n\n将指定的 JSP 或 Tiles 定义写入响应流。\n\ngetAsString\n\n将指定的 Tiles 属性作为字面字符串写入响应流。\n\
  \nuseAttribute\n\n将 Tiles 属性暴露给脚本小程序或其他自定义标签。\n\nimportAttribute\n\n允许脚本小程序或其他自定义标签读取\
