  \ 与 STRUTS SHALE\n\n**321**\n\n<h:inputText value=\"#{user.userId}\"/>\n\nJSF 使用一种表达式语言语法（参见第\
  \ 10 章）。请注意，这与 JSTL 的“EL”语法不同，因为它以井号（#）开头。\n\n*方法绑定*是这一思想的扩展。它允许你的 JSF 标签调用表单 Bean（JSF\
  \ 术语为*支持 Bean*）上的函数。例如：\n\n<h:commandButton action=\"#{user.Logon}\" />\n\n描述了一个按钮，如果点击它，将调用\
  \ `user` 支持 Bean 上的 `Logon()` 函数。\n\n这种技术很强大，因为你可以在一个表单上定义多个按钮，并将它们绑定到不同的函数，每个函数以不同的方式处理表单数据。\n\
  \n**快速测验**\n\n在 Struts 中你会如何做同样的事情？\n\n正因如此，支持 Bean 有时就像是 ActionForm 和 Action 的结合体。\n\
  \n当你阅读 JSF 文献时，肯定会遇到*受管 Bean* 这个术语。受管 Bean 是一种其实例化由 JSF 控制的支持 Bean。\n\n这类似于 Struts\
  \ 中的表单 Bean。表单 Bean（在 Struts 中）和受管 Bean（JSF 中）的共同特点是，两者的实例化都由各自的框架执行。\n\n在 faces-config.xml（JSF\
  \ 配置文件）中声明受管 Bean 的方式也有所不同。你不会使用\n\n<form-bean name=\"user\" type=\"net.thinksquared.reg.User\"\
  \ />\n\n而是会这样写\n\n<managed-bean>\n\n<managed-bean-name>user</managed-bean-name>\n\
  \n<managed-bean-class>net.thinksquared.reg.User</managed-bean-class>\n\n</managed-bean>\n\
  \nJSF 的风格更加冗长，因为它不使用属性，而是使用单独的标签。\n\n**导航**\n\n在 Struts 中，导航信息（`<forward>`）与处理声明（`<action>`）混合在一起。JSF\
  \ 在表示导航信息方面做得更好。\n\n事实上，与 Struts 相比，整个 JSF 导航模型更容易理解和使用。JSF 不使用像 ActionForward 这样的专用类，而是使用普通的\
