  \ destroy(){/* 不执行任何操作 */}\n\n}\n\n如你所见，`DynaFormsPlugIn` 包含三个函数：一个用于 `pathnames`\
  \ 属性的 setter 方法，该属性是一个以逗号分隔的文件名列表（请参阅前面的“实现路线图”一节）。这些文件名指向包含表单 Bean 声明的文件。\n\n`destroy()`\
  \ 函数是一个“空操作”实现（意味着它不执行任何操作）。\n\n大部分操作都在 `init()` 函数中。此函数执行以下操作：\n\n• 获取 `ServletContext`\
  \ 的引用。解析文件路径需要用到此类。在我们的案例中，我们有包含表单 Bean 声明的 XML 文件，需要读取它们。插件声明只会指定它们相对于 Web 应用根目录的路径，例如\
  \ `/WEB-INF/form-beans-def.xml`。显然，这个路径是不够的。要读取文件，我们需要文件的完整路径。这就是 `ServletContext`\
  \ 发挥作用的地方。它有一个 `getRealPath()` 函数，可以解析给定相对文件路径的完整路径。\n\n• 从 `DynaFormsLoaderFactory`\
  \ 获取一个 `DynaFormsLoader` 实例。`DynaFormsLoader` 实际上是一个我们需要实现的接口。这是一个良好的设计：如果你需要使用*你自己的*\
  \ `DynaFormsLoader` 来加载表单 Bean，你可以这样做。`DynaFormsLoaderFactory` 根据 `<form-beans>`\
  \ 的 `type` 属性决定使用哪个加载器。你很快就会看到这是如何完成的。\n\n• `DynaFormsLoader` 上的 `load()` 函数执行实际工作：读取表单\
  \ Bean 声明，并将必要的 `FormBeanConfig` 实例添加到 `ModuleConfig`。\n\n总结一下，`init()` 函数使用逗号分隔符解析\
  \ `pathnames` 变量。每个文件的完整路径通过 `ServletContext` 的 `getRealPath()` 函数确定。此文件名被传递给 `DynaFormsLoaderFactory`，后者为我们提供一个\
  \ `DynaActionForm` 实例。我们对该实例调用 `load()` 来解析表单 Bean 声明并将其加载到 `ModuleConfig` 中。`load()`\
  \ 函数还将解析每个表单 Bean 的 `extends` 属性，并执行前面“Struts 如何处理表单 Bean”一节中描述的 `DynaActionForms`\
  \ 的特殊处理。\n\n在我们继续之前，你必须了解如何使用 Apache 的 Digester 框架读取 XML 文件。这个易于使用的框架在 Struts 内部被广泛使用。Digester\
  \ 框架的 JAR 文件位于 Struts 发行版中（`commons-digester.jar`）。这是使用 Digester 而不是其他 XML 解析工具（例如优秀的\
  \ JDOM）的另一个好理由。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C19.fm\
  \ Page 288 Monday, January 16, 2006 3:20 PM\n\n**288**\n\n第 19 章 ■ 开发插件\n\n**使用\
  \ Apache 的 Digester 读取 XML**\n\nApache 的 Digester 框架为你提供了一种读取 XML 文档部分内容的简单方法。读取的数据存储在你提供给\
  \ Digester 的 JavaBean 中。\n\n\n\n通常，你需要为读取的每种标签定义一个 JavaBean 类，但这并非强制要求。你*可以*让一个\
  \ JavaBean 对应多个标签。不过在本章中，我们将为每个标签使用一个 JavaBean。\n\n你还需要指示 Digester 你想要读取 XML 文件的*哪些*部分。\n\
  \n这些部分会存储在你的 JavaBean 对象中。例如，假设你的 XML 文件（名为 myfile.xml）*仅*包含如下所示的标签：\n\n<user id=\"\
  albert\" password=\"relativity\" desc=\"Albert Einstein\" /> 现在，你想要将这些数据读取到清单 19-8\
  \ 所示的 User JavaBean 中。\n\n**清单 19-8.** *User Bean*\n\npublic class User{\n\nprotected\
  \ String _id = null;\n\nprotected String _password = null;\n\npublic void setId(String\
  \ id){ _id = id; }\n\npublic String getId(){ return _id; }\n\npublic void setPassword(String\
  \ pwd){ _password = pwd; }\n\npublic String getPassword(){ return _password; }\n\
  \n}\n\n请注意，desc 属性并未被存储。清单 19-9 展示了如何使用 Digester 实现这一操作。\n\n**清单 19-9.** *使用 Digester\
  \ 创建单个 User*\n\n//步骤 1：创建新的 Digester 实例：\n\nDigester digester = new Digester();\n\
  \n//步骤 2：将 <user> 标签与 User bean 关联：\n\ndigester.addObjectCreate(\"user\", \"User\"\
  );\n\n//步骤 3：告知 Digester 读取 User bean 中\n\n// 所有必需的属性：\n\ndigester.addSetProperties(\"\
  user\");\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C19.fm\
  \ Page 289 Monday, January 16, 2006 3:20 PM\n\n第 19 章 ■ 开发插件\n\n**289**\n\n//步骤\
  \ 4：实际解析文件\n\nUser u = (User) digester.parse(new File(\"myfile.xml\"));\n\n//步骤\
  \ 5：我们的 User bean 包含了来自 XML 文件的数据！\n\nSystem.out.println(\"ID=\" + u.getId() + \"\
  \ pwd=\" + u.getPassword()); Digester 类（org.apache.commons.digester.Digester）中的\
  \ parse() 函数会解析输入的 XML 文件，并返回一个已填充数据的 User 实例。有两个函数需要你特别留意：\n\n• addObjectCreate(path,\
  \ bean)：接收 XML 文件中的一个路径以及一个 JavaBean，该 JavaBean 将根据该路径被填充数据。在我们之前的例子中，路径就是 user，我们希望从中读取数据并返回一个填充好的\
  \ User 对象。\n\n• addSetProperties(path)：这告诉 Digester，你希望将给定路径所指示标签的属性读取到通过 addObjectCreate()\
  \ 与该路径关联的 JavaBean 中。因此，在我们之前的例子中，如果你省略了 addSetProperties()，返回的 User bean 将不包含任何信息。\n\
  \n处理多个 user 声明也很容易。例如，假设我们现在修改了 myfile.xml，如清单 19-10 所示。\n\n**清单 19-10.** *修改后的\
  \ XML 文件，包含多个 User*\n\n<users>\n\n<user id=\"albert\" password=\"relativity\" desc=\"\
  Albert Einstein\" />\n\n<user id=\"marie\" password=\"radioactivity\" desc=\"Marie\
  \ Curie\" />\n\n<user id=\"paul\" password=\"qed\" desc=\"Paul Dirac\" />\n\n</users>\n\
  \n要读取此文件中的所有 User，我们可以将它们存储到一个 Users 类中，如清单 19-11 所示。\n\n**清单 19-11.** *Users Bean*\n\
  \npublic class Users extends java.util.ArrayList{\n\npublic void addUser(User u){\n\
  \nadd(u);\n\n}\n\npublic User getUser(int i){\n\nreturn (User) get(i);\n\n}\n\n\
  }\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C19.fm Page 290\
  \ Monday, January 16, 2006 3:20 PM\n\n**290**\n\n第 19 章 ■ 开发插件\n\n如清单 19-11 所示，Users\
  \ bean 只是 User bean 的一个集合。我们希望 Digester 根据新的 XML（参见清单 19-8）创建 User bean，并将它们放入包含它们的\
  \ Users bean 中。为此，我们需要修改清单 19-9，如清单 19-12 所示。\n\n**清单 19-12.** *使用 Digester 创建多个\
  \ User*\n\n//步骤 1：创建新的 Digester 实例：\n\nDigester digester = new Digester();\n\n//步骤\
  \ 2：将 <users> 标签与 Users 类关联。\n\ndigester.addObjectCreate(\"users\", \"Users\");\n\
  \n//步骤 3：将 <user> 标签与 User bean 关联。\n\n// 注意，这里指明了 <user> 标签的路径。\n\ndigester.addObjectCreate(\"\
  users/user\", \"User\");\n\n//步骤 4：告知 Digester 读取 User bean 中\n\n// 所有必需的属性：\n\n\
  \n\ndigester.addSetProperties(\"users/user\");\n\n//步骤 5：告诉 Digester 将所有新创建的\n\n\
  // User bean 通过调用\n\n// Users.addUser(aNewUserBean)放入 Users 类中\n\n**digester.addSetNext(\"\
  users/user\", \"addUser\");**\n\n//步骤 6：实际解析文件\n\nUsers users = (Users) digester.parse(new\
  \ File(\"myfile.xml\"));\n\n//步骤 7：打印出 Users bean 中的每个 User：\n\nfor(int i = users.size()\
