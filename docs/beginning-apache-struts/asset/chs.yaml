  \ C ■ S T R U T S 标 签 参 考\n\n**textarea**\n\n此标签表示一个多行文本输入字段。\n\n使用限制\n\n`property`\
  \ 属性是必需的。它必须是 `<html:form>` 的子标签。\n\n属性\n\n所有通用属性集（`evt-attrs`、`acc-attrs`、`ren-attrs`、`struts-attrs`、`init-attr`\
  \ 以及新的 `err-attrs`）均被支持，并具有其通常含义。\n\n除此之外，还有几个特定于 `textarea` 的属性：\n\n• `cols`/`rows`：要显示的列数（`cols`）或行数（`rows`）。如果省略其中任何一个，则由浏览器决定。\n\
  • `readonly`：如果为 `true`，则文本字段不可编辑。\n\n示例\n\n代码\n\n<html:textarea property=\"memo\"\
  \ cols=\"8\" rows=\"3\"/>\n\n为当前表单 bean 上名为 `memo` 的属性指定了一个文本区域输入字段。\n\n等价物\n\n\
