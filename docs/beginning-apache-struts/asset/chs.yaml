  \n**PropertyUtils**\n\nApache Commons Beans 子项目包含一些非常有用的类（你在上一章已经见过 BeanUtils），其中就包括\
  \ PropertyUtils 类。这个类公开了一些静态方法，帮助你从 JavaBean 读取数据或向 JavaBean 写入数据。该 JAR 文件（`commons-beanutils.jar`）随\
  \ Struts 二进制文件一起提供，因此你可以在 Struts 应用中立即使用 PropertyUtils。\n\n它不使用类型转换，因此你无需在设计时知道\
  \ JavaBean 的类。相反，PropertyUtils 利用 Java 的内省特性来完成其工作。\n\n■**注意** PropertyUtils 实际上将其所有工作委托给\
  \ PropertyUtilsBean。后者负责解析属性和内省 JavaBean 的实际工作。PropertyUtils 只是为 PropertyUtilsBean\
  \ 的函数（这些函数不是静态的）提供了便捷的静态访问方式。\n\nPropertyUtils 最有用的函数包括：\n\n• `boolean isReadable(Object\
  \ bean, String property)`：如果可以在 bean 上读取给定属性，则返回 **true**，否则返回 **false**。这暗示存在相应的\
  \ `getXXX` 函数。\n\n• `boolean isWritable(Object bean, String property)`：如果可以向 bean\
  \ 写入给定属性，则返回 **true**，否则返回 **false**。这暗示存在相应的 `setXXX` 函数。\n\n• `Class getPropertyType(Object\
  \ bean, String property)`：返回与给定属性关联的 **Class** 对象。\n\n• `Object getProperty(Object\
  \ bean, String property)`：返回给定属性的值。\n\n• `setProperty(Object bean, String name,\
  \ Object value)`：将给定值写入 bean。\n\n这些函数接受简单、索引、映射、嵌套甚至混合属性（其他属性类型的组合）。这些函数中的每一个都可能抛出：\n\
  \n• `IllegalAccessException`：如果调用代码无法调用相关的 `setXXX` 或 `getXXX` 函数（尽管该函数存在）\n\n•\
  \ `NoSuchMethodException`：如果 bean 上不存在所需的属性\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C17.fm 第 241 页 2006 年 1 月 24 日 星期二 上午 10:14\n\n第 17 章 ■ 杂项\n\n**241**\n\
  \n• `InvocationTargetException`：如果 bean 上的 get/set 函数抛出异常\n\n• `IllegalArgumentException`：如果\
  \ bean 或 property 为 null\n\n**使用 PropertyUtils**\n\n这一切都很好，但 PropertyUtils 在 Struts\
  \ 编程中如何发挥作用呢？回想一下，你的 ActionForm 子类（包括你的 DynaActionForm 子类）也是 JavaBean。在之前的实验课程中，为了读取（或写入）ActionForm\
  \ 的属性，我们必须进行类型转换，如清单 17-1 所示。\n\n**清单 17-1.** *读取 ActionForm 属性的类型转换惯用法*\n```java\n\
  public ActionForward execute(ActionMapping mapping,\n                          \
  \    ActionForm form,\n                              HttpServletRequest request,\n\
  \                              HttpServletResponse response){\n    //获取用户 ID 和密码\n\
  \    RegistrationForm rForm = (RegistrationForm) form;\n    String userid = rForm.getUserId();\n\
  \    String password = rForm.getPassword();\n    ...\n```\n\n清单 17-1 展示了我在本书中一直使用的一种惯用法。要读取\
  \ ActionForm 子类中的属性，你必须执行以下操作：\n\n• 执行类型转换。\n\n• 读取表单的属性。\n\n我使用这种惯用法主要是为了清晰起见，因为它简化了示例和实验课程代码。如果可维护性对你很重要，那么在将其用于生产代码之前，你应该三思。这是因为使用清单\
  \ 17-1 中的类型转换有两个很大的缺点：\n\n• **不支持动态表单**：你不能轻易地将 ActionForm 替换为等效的动态表单。你必须修改 Action\
  \ 代码。你在第 16 章中已经看到了这一点，当时我讨论了动态表单，并将 Registration Web 应用移植为使用动态表单。请参考清单 16-5，了解如何修改清单\
  \ 17-1 才能使其与动态表单一起工作。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C17.fm\
  \ 第 242 页 2006 年 1 月 24 日 星期二 上午 10:14\n\n**242**\n\n第 17 章 ■ 杂项\n\n• **紧密耦合**：它将你的\
  \ Action 类过于死板地绑定到你的 ActionForm 类，从而阻止了 Action 与其他 ActionForm 的重用。例如，如果你想重用清单 17-1\
  \ 中的 Action，你必须确保所有传入其 `execute()` 方法的 ActionForm 都是 `RegistrationForm` 类型。在某些场景下，这个约束可能过于严格。\n\
  \n除了这种方法，你可以使用 PropertyUtils 来规避这两个缺点。PropertyUtils 让你能够将 Action 与特定的 ActionForm\
  \ 子类（包括动态表单）完全解耦。\n\n使用 PropertyUtils，清单 17-1 现在看起来像清单 17-2。\n\n**清单 17-2.** *使用\
  \ PropertyUtils 读取 ActionForm 属性*\n```java\nimport org.apache.commons.beanutils.PropertyUtils;\n\
  ...\npublic ActionForward execute(ActionMapping mapping,\n                     \
  \         ActionForm form,\n                              HttpServletRequest request,\n\
  \                              HttpServletResponse response)\n    throws Exception{\n\
  \    //获取用户 ID 和密码\n    String userid = PropertyUtils.getProperty(form,\"userid\"\
  );\n    String password = PropertyUtils.getProperty(form,\"password\");\n    ...\n\
  ```\n\n如清单 17-2 所示使用 PropertyUtils，将 `RegistrationActionForm` 替换为等效的动态表单会容易得多——你无需修改你的\
  \ Action 子类代码。\n\n**简而言之...**\n\n使用 PropertyUtils 的一个缺点是，与动态 bean 一样，你会失去编译时检查。你本质上是用编译时检查换取了类之间的更松散耦合。\n\
  \n然而，在大多数情况下，所获得的优势（更松散的耦合*以及*以后切换到动态表单的能力）远远超过了这一损失。\n\n因此，除非你有非常充分的理由，否则请使用 PropertyUtils\
  \ 来访问表单或 bean 属性。从长远来看，一致地使用它会使你的代码更易于维护。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C17.fm 第 243 页 2006 年 1 月 24 日 星期二 上午 10:14\n\n第 17 章 ■ 杂项\n\n**243**\n\
  \n**DownloadAction (Struts 1.2.6+)**\n\n\n\n有时您可能需要让用户从您的 Web 应用中下载数据。如果只是静态文件，这不成问题——只需在网页上放置一个文件链接即可。然而，通常需要下载的数据是按需生成的。在这种情况下，您必须自行处理下载过程。\n\
  \n这并不困难（您需要编写一个有效的 HTTP 头，然后将数据放入 `execute()` 方法附带的 `HttpServletResponse` 对象中），但有点繁琐。新引入的（自\
  \ 1.2.6 版本起）`DownloadAction` 类简化了这项工作。您只需提供：\n\n• 一个包含待下载数据的 `InputStream`。\n• 一个描述数据格式的“内容类型”字符串（例如\
  \ `text/html` 或 `image/png`）。有关内容类型字符串的列表，请参阅“有用链接”部分。\n\n`DownloadAction` 有一个名为\
  \ `StreamInfo` 的内部静态接口：\n```java\npublic static interface StreamInfo {\n    public\
  \ abstract String **getContentType()**;\n    public abstract InputStream **getInputStream()**\
  \ throws IOException;\n}\n```\n该接口通过 `getContentType()` 暴露内容类型，并通过 `getInputStream()`\
  \ 暴露 `InputStream`。要使用 `DownloadAction`，您需要：\n\n• 实现 `StreamInfo`。\n• 通过继承 `DownloadAction`\
  \ 并重写其 `getStreamInfo()` 方法来暴露它。\n• 在 `struts-config.xml` 文件中添加一个表单处理器（`<action>`\
  \ 标签），将您的 `DownloadAction` 子类与一个路径关联。不需要 `<forward>` 元素。（您能说出原因吗？）\n\n作为额外奖励，`DownloadAction`\
  \ 附带两个内部类：`FileStreamInfo` 和 `ResourceStreamInfo`，它们都实现了 `StreamInfo` 接口。\n\n您可以使用\
  \ `FileStreamInfo` 来允许下载静态文件。`FileStreamInfo` 的构造函数为：\n```java\npublic FileStreamInfo(String\
  \ contentType, File file)\n```\n其含义不言自明。\n\n`ResourceStreamInfo` 允许用户下载 Web 应用根目录内的文件：\n\
  ```java\npublic ResourceStreamInfo(String contentType,\n                       \
  \   ServletContext context, String path)\n```\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C17.fm 第 244 页 2006 年 1 月 24 日星期二 上午 10:14\n\n**244**\n\n第 17 章 ■ 杂项\n\
  \n`ServletContext` 包含有关 Web 应用路径等信息。您可以通过 `HttpSession` 对象获取 Web 应用的实例：\n```java\n\
  ServletContext context = response.getSession().getServletContext();\n```\n因此，您只需指定内容类型和待下载文件的相对路径即可。\n\
  \n当然，在大多数情况下，您可能更倾向于使用 HTML 链接，而不是 `FileStreamInfo` 或 `ResourceStreamInfo`。如果出于某种原因无法暴露待下载文件的链接，您会发现这些类非常有用。清单\
  \ 17-3 展示了一个如何继承 `DownloadAction` 并使用匿名类实现 `StreamInfo` 的示例。\n\n**清单 17-3.** *扩展\
  \ DownloadAction*\n\n```java\npackage com.myco.myapp.struts;\n\nimport java.io.*;\n\
