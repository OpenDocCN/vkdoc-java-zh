  \ <html:errors> 标签使用（如果需要任何消息）。\n\nActionMessages errors)\n\n**org.apache.struts.action.ActionForm**\n\
  \nActionForm 是一个 JavaBean，可选地与一个或多个 ActionMapping 关联。在调用相应的 Action.execute() 函数之前，此类\
  \ bean 的属性将从相应的请求参数中初始化。\n\n当此 bean 的属性被填充后，但在调用 Action 的 execute() 函数之前，将调用此 bean\
  \ 的 validate() 函数，这使 bean 有机会验证用户提交的属性是否正确有效。如果此函数发现问题，它将返回一个封装了这些问题的错误消息对象，并且 Struts\
  \ 会将控制权返回给相应的输入表单。否则，validate() 函数返回 null，表示一切可接受，并且应调用相应的 Action.execute() 函数。\n\
