  \n<c:if test=\"${fn:endsWith(MyBean.email,'.sg')}\"> 我猜你来自新加坡！\n\n</c:if>\n\n以及\n\
  \n<c:if test=\"${fn:contains(header.user-agent,'Windows')}\"> 现在试试 knoppix：http://www.knoppix.net\n\
