  \ FACES 与 STRUTS SHALE\n\n**清单 20-18.** *User.init() 的一个实现*\n\npublic void init(){\n\
  \n//获取 faces 上下文\n\nFacesContext context = FacesContext.getCurrentInstance();\n\n\
  //创建到数据库的连接 _connection。\n\nValueBinding vb =\n\ncontext.getApplication()\n\n.createValueBinding(\"\
  #{jndi['jdbc/MyCoPersonnelDB'].connection}\"); _connection = (Connection) vb.getValue(context);\n\
  \n}\n\n**使用 Clay 实现可复用的视图**\n\nClay 是 Shale 的一个子框架。它本质上是一个自定义的 JSF UI 组件，充当在其他地方定义的子\
  \ UI 树的占位符。这个想法对你来说应该不陌生。Tiles 做了类似的事情——你在 `tiles-def.xml` 文件中定义 UI，然后使用一个 Tiles\
  \ 标签来指示你希望 UI 放置的位置。\n\nClay 做了同样的事情，但为你构建 UI 树提供了更多选项。任何对 Clay 有意义的探索本身都需要一整章的篇幅，所以我将留给你自己去探索这项有趣的技术。\n\
  \n**服务器端 Ajax 支持**\n\nAjax 并非单一技术，而是指一系列广泛的技术，其特点在于使用客户端 JavaScript 和 XML 在客户端和服务器之间传递数据。\n\
  \n服务器端 Ajax 支持（也称为*远程处理*）涉及从模型层提取数据，并将其序列化为 XML 以交付给客户端。\n\nShale 的远程处理支持主要集中在向客户端交付\
  \ XML 数据（例如，用于编写 XML 的 `org.apache.shale.remote.ResponseWrapper` 类）以及管理远程会话上。\n\n\
  **测试框架**\n\n单元测试是增量构建和测试代码的过程。在单元测试范式中，你编写一点代码，然后测试一点，如此反复，直到应用程序完成。\n\n你创建的测试是需要按顺序运行的\
  \ Java 类，每个类测试代码的一部分。JUnit（参见“有用链接”）是 Java 世界中普遍使用的单元测试框架。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C20.fm 第 355 页 2006 年 1 月 16 日，星期一，下午 3:21\n\n第 20 章 ■ JAVASERVER FACES\
  \ 与 STRUTS SHALE\n\n**355**\n\n相信我，单元测试可以为你省去很多麻烦，即使是中等复杂程度的应用程序也是如此。一旦你尝试过，你会惊讶于自己过去是如何成功编写\
  \ Java 代码的。\n\n不幸的是，单元测试在 Web 应用程序测试方面进展甚微。Shale 通过提供一组模拟对象和 JUnit 测试用例基类来支持单元测试。更多详情请查看\
  \ JUnit 网站。\n\n**练习**\n\n下载最新的 Shale 发行版（参见“有用链接”），并尝试运行示例用例 Web 应用程序。\n\n**JSF\
  \ vs. Shale vs. Struts**\n\n\n\n最终选择哪种技术（JSF、Shale 或 Struts）取决于你的需求。话虽如此，如果你对 Apache\
  \ 的产品感到满意，那么你很可能会倾向于选择 Shale 而非纯 JSF。Shale 带来的优势如此之多，以至于使用它而非纯 JSF 是显而易见的决定。\n\n\
  Shale 的致命弱点在于它像任何新软件一样，仍处于不断变化的状态。\n\n在撰写本文时，许多服务都被标记为“开发中”，这意味着它们随时可能发生变化。我预计当你读到这本书时，Shale\
  \ 肯定已经发生了重大变化。因此，如果你计划使用 Shale，应仔细研究所需要的功能，确保它们足够稳定。Struts 邮件列表（Shale 与经典 Struts\
  \ 共享此列表，因此你应在邮件中标注 [Shale]）以及 Shale 文档都是很好的资源。\n\n在 Struts 和 Shale 之间做出选择则更为困难。如果你已有现有的\
  \ Struts Web 应用，建议继续使用 Struts，因为将现有 JSP 页面迁移到使用 JSF 标签的成本通常高得令人望而却步。\n\n对于新项目，很难给出明确的答案。Struts\
  \ 开发者自身以及参与 JSF 和 Shale 的人员似乎都无条件地主张迁移到 Shale 或 JSF。我会更加谨慎，因为正如你所见，JSF（以及因此的 Shale）比\
  \ Struts 更复杂。这并非高深莫测，但确实存在陡峭的学习曲线。\n\n然而，如果你发现自己一直在使用各种奇技淫巧来强行让 Struts 将 Web 应用表现得像桌面应用，那么\
  \ Shale 绝对是你值得探索的选项，同时也可以考虑其他 Web 应用框架，比如 Spring。\n\n我避免对 Struts、JSF 和 Shale 进行逐项功能对比。\n\
  \n尽管它们广义上都是 Web 应用框架，但各自的“最佳适用场景”（它们大放异彩的场景）是不同的。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C20.fm Page 356 Monday, January 16, 2006 3:21 PM\n\n**356**\n\n第 20\
  \ 章 ■ JavaServer Faces 与 Struts Shale\n\n相反，表 20-3 对经典 Struts、JSF 和 Shale 进行了比较，以帮助你回答一个简单的问题：“我正在启动一个新项目。应该使用\
  \ Struts、Shale 还是 JSF？”请将评分视为*相对*于彼此而言。请不要以任何绝对意义来理解它们——例如，“容易”意味着“与其他选项相比更容易”。\n\
  \n表 20-3 未考虑 Struts-Faces 集成库。即使考虑了，可能也不会有太大变化。Struts 存在一些难以轻易消除的设计问题。这些缺陷（可扩展性差、代码模块化程度低和代码复用性差）在开发更复杂的应用时会凸显出来。Struts-Faces\
  \ 库虽然有用，但并未解决架构问题。\n\n**表 20-3.** *Struts、JSF 和 Shale 的对比矩阵* **因素**\n\n**Struts**\n\
  \n**JSF**\n\n**Shale**\n\n**备注**\n\n**(MyFaces)**\n\n学习曲线\n\n平缓\n\n中等\n\n陡峭\n\n\
  Shale 的学习曲线最陡峭，因为它在 JSF 之上引入了额外的服务。\n\n开发简单\n\n容易\n\n困难\n\n中等\n\n所谓“简单”Web 应用，我指的是复杂度类似\n\
  \nWeb 应用\n\nLILLDEP 的应用。目前许多 Web 应用都属于此类。Shale 凭借其对话框管理器，改进了页面转换的维护。这相对于纯 JSF 是一个明显的优势。\n\
  \n开发复杂\n\n非常\n\n中等\n\n中等/容易\n\n所谓“复杂”Web 应用，我指的是（例如）复\n\nWeb 应用\n\n困难\n\n制了 OpenOffice\
  \ Writer（或 Word）全部功能的 Web 应用。Shale 凭借其可扩展性和额外功能（如对 Ajax、对话框等的支持），让开发体验好得多。\n\n可扩展性\n\
  \n差\n\n非常好\n\n良好\n\nStruts 仅提供插件用于扩展（以及通过配置文件的自定义加载器实现更有限的扩展性）。你可以利用 Struts 提供的扩展点做很多事情，但有时不得不重新发明轮子，就像我在第\
  \ 19 章中所做的那样。JSF 和 Shale 都提供了结构更完善的\n\n\n\n您可以扩展它们的具体方式。\n\n**寿命**\n\n高\n\n非常高\n\
  \n中等/低 所谓寿命，我指的是“这个框架五年后还在使用的概率有多大？”以下是我的预测：鉴于 Sun 公司将其作为规范并作为 Java 平台上唯一可信的基于组件的\
  \ Web 框架予以支持，JSF 的存续是确定无疑的。经典的 Struts 可能会因其庞大的用户群而存活下来。Shale 可能会被同一细分领域中的竞争技术所掩盖，这些技术并不自称是“Struts\
  \ 的继任者”。因此，它被命名为 *Struts* Shale 是非常不幸的。人们往往会从 Struts 经典版与 Struts Shale 的角度来思考，而实际上，它们最适合应用于不同的细分领域。\n\
