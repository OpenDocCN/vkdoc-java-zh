  \ *索引属性与 EL*\n\n**EL 表达式**\n\n**值**\n\n`${myArray[2718].name}`\n\n`myArray[2718].getName()`\n\
  \n`${myMap['exp'].value}`\n\n`myMap.get(\"exp\").getValue()`\n\n`${myArray[myOffset]}`\n\
  \n返回 `myArray` 中索引等于变量 `myOffset` 的元素。\n\n最后，EL 暴露了几个*隐式对象*，这些是内置对象，你的 EL 表达式\n\n\
  始终可以访问它们。这类对象数量不少，我不会逐一介绍。要了解更多信息，请参考 Sun 的 J2EE 教程（参见“有用链接”）。\n\n■**注意** 一个常见的陷阱是使用与隐式对象名称相同的变量名。例如，将自己的变量命名为“requestScope”是不允许的。还有一些你必须避免的保留关键字。这些关键字在\
  \ Sun 的教程中列出（参见“有用链接”）。\n\n最重要的隐式对象中包括那些代表各种作用域的对象。\n\n这些对象允许你按作用域显式访问变量。这些作用域对象包括\
  \ `pageScope`、`requestScope`、`sessionScope` 和 `applicationScope`。假设你想访问一个名为 `myObject`\
  \ 的会话作用域变量。方法如下：`${sessionScope.myObject}`\n\n其他作用域中的变量以类似方式访问。\n\n在本节中，我们将探讨 EL\
  \ 在 JSTL 标签 `<forEach>`、`<if>`、\n\n`<choose>...<when>` 和 `<out>` 中的使用，这些标签与 Struts\
  \ 相关。希望阅读完本节后，你对 EL 有足够的了解，能够很好地使用它。\n\n**<c:out> 标签**\n\n`<c:out>` 标签用于输出文本，在许多情况下可以替代\
  \ `<bean:write>`。\n\n这个标签的使用很简单，因为它只有一个 `value` 属性：\n\n`<c:out value=\"${myObject.myProperty}\"\
  >`\n\n快速浏览附录 C 会发现，`<bean:write>` 并非只有单一功能——它拥有一些属性可用于格式化显示的值。仅用 `<c:out>` 无法做到这一点；你需要使用\
  \ JSTL 格式化标签库。使用这个标签库需要对 JSTL 进行比此处更深入的讲解。同样，如果你有兴趣了解更多，请查阅 *Pro JSP 2, 第 4 版*。\n\
