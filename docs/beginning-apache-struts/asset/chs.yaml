  \n在清单 10-2 中，列出了每个联系人的姓名、公司和电话号码。\n\n`<logic:iterate>` 标签有三个主要属性：\n\n*   `name`：引用你放置在请求上的可迭代对象。在此实例中，它是\
  \ `search_results`。\n*   `id`：指定一个名称，代表可迭代对象上的单个元素。在这种情况下，`id` 是 `contact`。即使你不使用它，此属性也是必需的。\n\
  *   `indexId`（可选）：指定一个代表当前迭代次数的数字。我在这里使用它的唯一原因是为了使用 `<bean:write>` 写出迭代次数。当你想要使用*索引属性*时，`indexId`\
  \ 很重要，我将在下一节中讨论这个主题。\n\n`<bean:write>` 写出给定联系人的姓名、公司和电话。\n\n请注意，`<bean:write>` 的\
  \ `name` 属性引用了由 `<logic:iterate>` 的 `id` 属性暴露的单个元素。有关 `<bean:write>` 的详细说明，请参考附录\
  \ C。\n\n**遍历 HASHMAPS**\n\n如果可迭代对象是 `HashMap` 或实现了 `Map` 的类，则元素是 `Map.Entry` 的实例。此接口包含\
  \ `getKey()` 和 `getValue()` 函数，因此你可以使用\n\n`<bean:write name=\"xxx\" **property=\"\
  key\"** />` 来显示键，以及\n\n`<bean:write name=\"xxx\" **property=\"value\"** />` 来显示对应的值。\n\
  \n我想重申（请原谅这个双关语），`<logic:iterate>` 提供的功能与 JSTL 的 `<forEach>` 标签有重叠。我们将在后面的章节中讨论这一点。\n\
  \n**简单、嵌套、索引和映射属性**\n\n许多 Struts 标签接受一个 `property` 属性，该属性引用它们所操作对象上的一个属性。我们已经在实践中看到了这一点，例如，在上一节的\
  \ `<bean:write>` 标签中：\n\n`<bean:write name=\"contact\" property=\"company\"/>` 正如这里使用的，`<bean:write>`\
  \ 尝试显示在名为 `contact` 的对象上调用的 `getCompany()` 的返回值。这是一个*简单属性*的示例。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C10.fm 第 112 页 2006 年 1 月 24 日星期二 上午 10:12\n\n**112**\n\n第 10 章 ■ 更多标签\n\
  \n简单属性是那些隐式地在当前考虑的对象上调用 `getXXX()` 函数的属性。\n\nStruts 支持其他三种类型的属性：*嵌套*、*索引*和*映射*属性。\n\
  \n**嵌套属性**允许你引用一个属性的属性。例如，如果在我们之前的例子中，`getCompany()` 的返回值是一个 JavaBean 对象，那么嵌套属性将允许你引用此对象上的一个属性：\n\
  \n`<bean:write name=\"contact\" property**=**\" **company.name**\"/>` 正如这里使用的，`<bean:write>`\
  \ 尝试显示 `getCompany().getName()` 的返回值。\n\n**索引属性**类似于简单属性，但它们假设应调用的函数是 `getXXX(int\
  \ index)` 而不是 `getXXX()`。因此，如果 `contact` 对象支持 `getCompany(index)` 函数，你可以这样调用它：\n\
  \n`<bean:write name=\"contact\" property=\" **company[41]**\"/>` 正如这里使用的，`<bean:write>`\
  \ 尝试显示 `getCompany(41)` 的返回值。\n\n这个例子引出了一个问题，即如何将索引属性与 `<logic:iterator>` 一起使用，例如，显示一个值列表。你可以这样做：\n\
  \n<logic:iterate name=\"companies\" id=\"company\" indexId=\"cnt\">\n\n<bean:write\
  \ name=\"companies\" property=\" **company[<%=cnt%>]**\"/>\n\n</logic:iterate>\n\
  \n这个例子假设 `companies` 对象有一个 `getCompany(index)` 函数。\n\n这个例子也应该在你的脑海中敲响警钟：它使用了一个脚本小程序！一定有更好的方法——确实有。在这个特定的例子中，你有两个选择：使用\
  \ `<forEach>` 和 `<out>` JSTL 标签（我们稍后会介绍），或者使用 Struts-EL 标签（我们稍后也会介绍），它们是普通 Struts\
  \ 标签的增强版本：\n\n<logic-el:iterate name=\"companies\" id=\"company\" indexId=\"cnt\"\
  >\n\n<bean-el:write name=\"companies\" property=\" **company[${cnt}]**\"/>\n\n</logic-el:iterate>\n\
  \n在这个例子中，变化几乎察觉不到，但在更实际的情况下，生成的代码会更容易阅读。\n\n**映射属性**类似于索引属性，不同之处在于假设调用的函数是 `getXXX(String\
  \ s)`。例如，如果前面例子中的 `contact` 对象有一个 `getMobile(String mobileType)` 函数，你可以使用\n\n`<bean:write\
  \ name=\"contact\" property=\" **mobile(home)**\"/>`\n\n`<bean:write name=\"contact\"\
  \ property=\" **mobile(office)**\"/>` 这些例子将分别调用 `getMobile(\"home\")` 和 `getMobile(\"\
  office\")`。\n\n你也可以混合使用各种类型的属性：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C10.fm 第 113 页 2006 年 1 月 24 日星期二 上午 10:12\n\n第 10 章 ■ 更多标签\n\n**113**\n\
  \n`<bean:write name=\"contacts\" property=\" **contact[5772]**. **company**\"/>`\
  \ 这是对 `getContact(5772).getCompany()` 的隐式调用。\n\n表 10-1 总结了各种属性类型。\n\n**表 10-1.**\
  \ *简单、嵌套、索引和映射属性* **类型**\n\n**用法**\n\n**调用的函数**\n\n简单\n\nproperty=\"myProperty\"\
  \n\ngetMyProperty()\n\n嵌套\n\nproperty=\"myProperty.mySubProperty\"\n\ngetMyProperty().getMySubProperty()\n\
  \n索引\n\nproperty=\"myProperty[5772] \"\n\ngetMyProperty(5772)\n\n映射\n\nproperty=\"\
  myProperty(myString) \"\n\ngetMyProperty(\"myString\")\n\n**条件处理**\n\nLogic 标签库有许多用于执行条件处理的标签。这些可以分为三类：\n\
  \n*   **测试：** present, empty, messagesPresent\n*   **比较：** equal, lessThan, lessEqual,\
  \ greaterThan, greaterEqual\n*   **字符串匹配：** match\n\n\n\n这些标签（用于测试和字符串匹配）中有些带有否定形式：`notPresent`、`notEmpty`、`messagesNotPresent`\
  \ 和 `notMatch`。所有这些标签在使用时都遵循相同的结构。用伪代码表示：\n\n<tag>\n\n// 此处为条件处理的代码\n\n</tag>\n\n\
  此外，所有这些标签都有两个共同的属性：\n\n• name：指定标签所操作对象的名称。假设之前的 Action 已将该对象放置在请求中。前面关于迭代的章节展示了如何实现这一点。\n\
  \n• property：对应 name 属性所引用对象上的简单、嵌套、索引或映射属性。此属性为可选。\n\n需要进行比较或匹配的标签还会接受一个额外的 value\
  \ 属性。让我们看几个使用这些标签的示例：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C10.fm\
  \ 第 114 页 2006 年 1 月 24 日星期二 上午 10:12\n\n**114**\n\n第 10 章 ■ 更多标签\n\n<logic:empty\
  \ name=\"search_results\">\n\n<i>抱歉，此邮政编码下没有联系人</i>\n\n</logic:empty>\n\n<logic:notEmpty\
  \ name=\"search_results\">\n\n</logic:notEmpty>\n\n`empty` 和 `notEmpty` 标签仅检查给定的可迭代对象是否包含元素，因此不需要\
  \ value 属性。下面是另一个示例：\n\n<logic:lessThan name=\"myConstants\" property=\"pi\" value=\"\
  3.14\">\n\n<i>你的圆周率少了一些！</i>\n\n</logic:lessThan>\n\n如果 `myConstants.getPi()` 小于\
  \ 3.14，这段代码会显示消息“你的圆周率少了一些！”。\n\n表 10-2 总结了这些标签。\n\n**表 10-2.** *条件处理标签总结* **标签**\n\
  \n**含义**\n\npresent\n\n测试请求中是否存在某个变量。\n\nempty\n\n测试数组或 Collection 是否为空。\n\nmessagesPresent\n\
  \n测试请求中是否存在消息（一个 ActionMessage 实例）。消息的名称在 value 属性中给出。\n\n比较标签\n\n测试给定属性是否通过给定的比较。用于比较的值（equal、lessEqual\
  \ 等）在 value 属性中提供。\n\nmatch\n\n检查给定属性是否包含 value 属性作为子字符串。\n\n表 10-2 中标签的否定形式为 `notPresent`、`notEmpty`、`messagesNotPresent`\
  \ 和 `notMatch`。附录 C 更详细地描述了所有这些标签。\n\n最后，请注意 JSTL 有一个 `<if>` 标签，可以用来替代这些标签中的许多。我们将在本章后面部分介绍它。\n\
  \n**流程控制**\n\n执行流程控制（实际上是重定向）的两个标签是 `<logic:redirect>` 及其简化版本 `<logic:forward>`。在\
  \ JSP 页面上使用它们会将控制权传递给另一个页面。例如：\n\n<logic:forward name=\"someOtherPage\"/>\n\n会将控制重定向到一个名为\
  \ `someOtherPage` 的全局转发（请参考第 9 章）。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C10.fm 第 115 页 2006 年 1 月 24 日星期二 上午 10:12\n\n第 10 章 ■ 更多标签\n\n**115**\n\
  \n`<logic:redirect>` 也会将控制重定向到另一个页面，但提供了更多执行重定向的选项。有关这些标签的更多详细信息，请参考附录 C。\n\n请注意，没有等效的\
  \ JSTL 标签可以利用在 `struts-config.xml` 中声明的全局转发。\n\n**嵌套标签库**\n\n嵌套标签库允许你*相对于*一个对象应用标签。在某些情况下，这可以大大简化你的服务器端\
  \ ActionForm 代码，正如你将在本章的实验环节中看到的那样。\n\n■**注意** 如果你曾使用 Visual Basic 编程，你可能用过 `With`\
