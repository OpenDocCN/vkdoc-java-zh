  `iterate` 标签使用 `base-attrs` 来指定代表要遍历的 Collection/Map/Enumeration/array/Iterator\
  \ 的基础对象。除此之外，还可以使用以下几个其他属性：\n\n• `collection`：`name/property` 组合仅允许你遍历那些可以作为 JavaBean\
  \ 属性读取的可迭代对象。这可能相当受限。例如：\n\n<logic:iterate name=\"MyBean\" property=\"myCollection\"\
  \ ...\n\n会隐式调用函数\n\nMyBean.getMyCollection()\n\n• 以确定可迭代对象。然而，许多 Java 类并不使用 JavaBeans\
  \ 的 `getXXX()` 约定，因此需要为它们采用不同的方法。\n\n解决方案是将 `collection` 属性与 scriptlet 结合使用：\n\n\
  <logic:iterate collection=\"<%=MyObject.iterator()%>\" ...\n\n• `id`：这是从可迭代对象中读取的单个元素所赋予的名称。\n\
  \n• `indexId`：当前索引；从零开始。\n\n• `length`：要从可迭代对象中读取的最大元素数量。如果未指定，则读取所有元素。\n\n• `offset`：要从可迭代对象中返回的第一个元素的索引。例如，如果可迭代对象是一个数组\
  \ [a, b, c]，使用 `offset=\"1\"` 会使循环仅读取 b 和 c。请注意，与 Java 中一样，偏移量是从零开始的。\n\n• `type`：从可迭代对象中读取的元素的完全限定类名。如果某个元素与此类名不匹配，则会抛出\
  \ `ClassCastException`。\n\n示例\n\n以下是基本用法：\n\n<logic:iterate name=\"MyBean\" property=\"\
  myCollection\" id=\"anElement\">\n\n<bean:write name=\"anElement\" />\n\n</logic:iterate>\n\
