  \n`password` 标签有一个额外的布尔属性 `redisplay`，其默认值为 `true`。这会导致之前输入的密码（当表单因验证错误而重新显示时）以星号形式出现。不幸的是，实际的密码也会嵌入到该页面的\
  \ HTML 中。您应将 `redisplay` 设置为 `false`，以防止密码从缓存页面中被获取。\n\n示例\n\n代码\n\n<html:text property=\"\
