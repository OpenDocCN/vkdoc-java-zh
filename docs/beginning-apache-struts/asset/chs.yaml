  \ C ■ STRUTS 标签参考\n\n等效标签\n\n来自 Struts-Faces 集成库的 `<s:javascript>` 标签是等效标签。\n\n\
  **link**\n\n此标签用于渲染一个 HTML 链接。\n\n使用限制\n\n必须指定 action/module、href、page、forward 或\
  \ linkName 其中之一。\n\n属性\n\n接受前三个通用属性集：evt-attrs、acc-attrs 和 ren-attrs。\n\n除此之外，还有几个\
  \ link 特有的属性：\n\n• action/module、href、page、forward、linkName：用于指定链接的 URL。action/module\
  \ 对用于指定表单处理器。action 必须以斜杠开头，如果要指定模块，请使用 module 属性。href 是链接的 URL。page 是相对于模块的链接 URL（因此必须以斜杠开头）。forward\
  \ 是全局转发的名称。linkName 是同一页面上另一个链接的名称。该链接的 URL 将用于当前链接。\n\n• anchor：链接的可选 HTML 锚点。\n\
  \n• bundle：用于指定不同的消息资源文件。bundle 属性在 `<bean:message>` 条目中有更详细的说明。\n\n• transaction：如果为\
  \ true，则将当前事务令牌作为请求参数附加到链接的 URL。有关事务令牌的详细信息，请参阅 `<logic:present>` 条目。\n\n• paramName、paramProperty、paramScope\
  \ 和 paramId：用于创建单个请求参数。该请求参数会附加到链接的最终 URL 中。前三个属性用于在当前请求或会话中定位单个对象。该对象的 toString()\
  \ 方法返回值即为单个参数值。参数名称由 paramId 指定。\n\n• name/property/scope：用于创建多个请求参数。这些请求参数会附加到链接的最终\
  \ URL 中。这些属性用于定位一个 `java.util.Map` 类型的对象。Map 的键是参数名称，对应的值是参数值。如果指定了 property，则必须同时指定\
  \ name。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048AppC.fm\
  \ Page 405 Tuesday, January 17, 2006 4:46 PM\n\n附录 C ■ STRUTS 标签参考\n\n**405**\n\n\
  • useLocalEncoding：如果设置为 true，则告诉 Struts 使用当前 `HttpServletResponse` 的字符编码。\n\n示例\n\
  \n以下是一个使用全局转发的简单示例：\n\n<html:link forward=\"success\" />\n\n渲染后的链接将指向 success 全局转发的实际位置。您还可以为链接包含请求参数：\n\
  \n<html:link page=\"/mypage.jsp\" paramName=\"myRequestValue\"\n\nparamId=\"action\"\
  \ />\n\n此代码片段将渲染一个链接，其中包含一个名为 action 的请求参数，其值由对 bean myRequestValue 调用 toString()\
  \ 的结果给出。\n\n以下是创建多个请求参数的方法：\n\n<html:link href=\"http://www.kenyir.org/index.jsp\"\
  \ name=\"myMap\"/>\n\n等效标签\n\n来自 Struts-Faces 集成库的 `<s:commandLink>` 标签是等效标签。您也可以使用\
  \ JSF 的 `<h:commandLink>`，但会失去使用全局转发和表单处理器的能力。\n\n**messages**\n\nmessages 是用于遍历\
  \ *错误消息* 和 *消息* 的迭代器——请参阅 `<logic:messagesPresent>` 条目以了解这两个术语的解释。默认情况下，`<html:messages>`\
  \ 遍历错误消息，但您可以通过将 messages 属性设置为 true 来遍历消息。\n\n`<html:messages>` 本身不会打印出错误消息或消息。您必须在其内部嵌套一个合适的标签（例如\
  \ `<bean:write>`）来实现打印。\n\n使用限制\n\nid 属性是必需的。\n\n属性\n\n• id：其行为类似于 `<logic:iterate>`\
  \ 的 id 属性——它暴露一个引用单个消息的变量。\n\n• message：一个布尔属性，指示是遍历错误消息（false 或省略）还是遍历消息（true）。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048AppC.fm Page 406\
  \ Tuesday, January 17, 2006 4:46 PM\n\n**406**\n\n附录 C ■ STRUTS 标签参考\n\n• property：用于检索消息的键。请注意，同一个属性下可能保存了多条消息。如果未指定\
  \ property，则显示所有消息。这个技巧对于调试非常有用。\n\n• name：保存消息的对象的名称。如果您希望使用 Action 的 `saveErrors()`\
  \ 或 `saveMessages()`，请不要指定此属性。\n\n• header/footer：两者都是消息资源键，指向将在迭代开始和结束时渲染的文本。仅当有多个错误消息需要显示时才会发生。有关详细信息，请参阅\
  \ `<html:errors>` 条目。\n\n• locale/bundle：用于指定不同的 Locale 对象或消息资源文件。locale 指定一个键，可用于查找存储在当前会话上的\
  \ Locale 对象。bundle 属性在 `<bean:message>` 条目中有更详细的说明。您可以使用这些属性来指定与当前用户区域设置不同的区域设置，或与默认消息资源文件不同的文件。\n\
  \n示例\n\n以下是一个显示所有错误消息的简单示例：\n\n<html:messages id=\"anError\">\n\n<bean:write name=\"\
  anError\" />\n\n</html:messages>\n\n请记住，错误消息要么来自简单的验证失败（参见第 6 章），要么是使用 Action 的\
  \ `saveErrors()` 注册的（参见第 7 章）。\n\n以下是显示消息的方法：\n\n<html:messages id=\"aMessage\"\
  \ message=\"true\">\n\n<bean:write name=\"aMessage\" />\n\n</html:messages>\n\n\
  消息的创建方式与错误消息完全相同，但使用 Action 的 `saveMessages()` 注册，该方法的签名与 `saveErrors()` 相同。\n\n\
  以下是显示页眉和页脚的方法（如果有任何错误消息要显示）：\n\n<html:messages id=\"anError\" header=\"err.header\"\
  \ footer=\"err.footer\">\n\n<bean:write name=\"anError\" />\n\n</html:messages>\n\
  \n这假设消息资源键 err.footer 和 err.header 已在您的 Application.properties 文件中定义：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048AppC.fm Page 407 Tuesday, January 17, 2006 4:46 PM\n\n附录 C ■ STRUTS\
  \ 标签参考\n\n**407**\n\nerr.header=<b>\n\nerr.footer=</b>\n\n因此，HTML 粗体标签（`<b>`）会在迭代的开始和结束时打印。\n\
  \n等效标签\n\n没有等效标签，但很容易创建一个粗糙的替代方案：错误消息存储在键 `Globals.ERROR_KEY` 下，消息存储在 `Globals.MESSAGE_KEY`\
  \ 下。两者都存储在请求上。`Globals` 是一个 Struts 类（`org.apache.struts.Globals`），包含各种常量。存储的对象是\
  \ `ActionMessages` 或 `ActionErrors` 实例。\n\n您可以使用 JSTL 的 `<c:set>` 轻松创建对此对象的引用，并在页面中使用定义的消息对象。\n\
  \n**multibox**\n\n此标签基于底层数组渲染一个或多个复选框输入字段。\n\n另请参阅 `<html:checkbox>`。但请注意，与 `<html:checkbox>`\
  \ 不同，`ActionForm` 上对应的属性不必是布尔类型。任何类型的数组都可以。\n\n使用限制\n\n此标签必须位于 `<html:form>` 标签内部。property\
  \ 属性是必需的。\n\n属性\n\n接受所有通用属性集（evt-attrs、acc-attrs、ren-attrs、struts-attrs、init-attr\
  \ 和新的 err-attrs），并具有其通常的含义。\n\n需要注意的几个要点：\n\n• 返回值可以通过 value 属性或标签主体内嵌套的内容来指定。\n\
  \n\n\n• 要使用此标签，通常需要将其嵌套在 `<logic:iterate>`（或任何其他兼容的循环结构，如 JSTL 的 `<c:forEach>`）中，并使用脚本或支持\
  \ EL 的此标签版本来动态设置 `value` 属性（如果需要嵌套内容，则必须使用脚本）。\n\n• 仅当复选框被选中时，其值才会被提交。这意味着，为了检测到已清除的复选框，您需要将底层数组设置为零长度数组。有关更多信息，请参见以下示例。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048AppC.fm Page 408\
  \ Tuesday, January 17, 2006 4:46 PM\n\n**408**\n\n附 录 C ■ S T R U T S 标 签 参 考\n\n\
  示例\n\n考虑表单上的 `<html:multibox>`：\n\n<html-el:form ...>\n\n<logic:iterate name=\"\
  contacts\" id=\"contact\">\n\n<html-el:multibox property=\"ids\" value=\"${contact.getId()}\"\
  \ />\n\n</logic:iterate>\n\n</html-el:form>\n\n以及关联的 `ActionForm` 子类：\n\npublic\
  \ SelectedContactIds extends ActionForm{\n\nprotected String[] _ids;\n\npublic void\
