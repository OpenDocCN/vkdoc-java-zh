  \ 项\n\n• trace()：用于记录非常详细的信息\n• debug()：用于记录调试消息\n• info()：用于在运行时标记“有趣”的事件，如启动或关闭\n\
  • warn()：用于表示发生了接近错误但尚未出错的情况\n• error()：用于标记处理过程中抛出的异常\n• fatal()：用于标记致命错误，导致系统提前关闭\n\
  \n每个函数都有两种形式。第一种形式（以 trace() 为例）：\ntrace(Object message)\n用于打印出给定的消息；而第二种形式：\ntrace(Object\
  \ message, Throwable ex)\n允许你在打印消息的同时打印异常信息。最终实际记录的消息取决于所使用的底层日志系统。请记住，Commons Logging\
  \ 只是执行实际工作的日志系统的一个包装器。\n\n这里列出的每个函数也代表一个*优先级级别*：“trace”优先级最低，“fatal”优先级最高。这种优先级系统使得可以有选择地决定从哪个类或包记录哪些消息。\n\
  \n例如，Log4j 允许你（使用属性文件）精确地定义给定类或包允许记录哪些优先级的消息，如清单 17-13 所示。\n\n**清单 17-13.** *Log4j\
  \ 的一些设置*\n\nlog4j.logger.com.myco.myapp=INFO\n\nlog4j.logger.com.myco.myapp.struts.database.Database=ERROR\n\
  \n清单 17-13 中的设置意味着，包 com.myco.myapp 中的类允许记录 fatal、error、warn 和 info 消息，但*不*允许记录\
  \ debug 或 trace 消息。第二行意味着 Database 类只允许记录 fatal 或 error 消息。\n\n我想强调，清单 17-13 仅用于说明，并不适用于所有日志系统，仅适用于\
  \ Log4j。每个底层日志系统都需要以不同的方式进行配置，这*不能*由 Commons Logging 控制。Commons Logging 只是某个正确配置的日志系统的一个*包装器*。\n\
  \n你应该查阅你所使用的日志系统的文档，以确定如何配置它。Commons Logging 只为你提供了可移植性，它并不会简化日志系统的设置过程。\n\n现在，由于某些类可能被配置为低于给定级别的日志优先级，因此在尝试记录日志之前先检测这一点是合理的。这主要是因为调用日志函数（trace()、debug()\
  \ 等）通常涉及创建额外的系统资源。为了避免这种不必要的开销，最好先测试是否允许在所需级别进行日志记录。代码：\n\nif(log.isErrorEnabled()){\n\
  \nlog.error(\"发生 IO 异常！\",ioe);\n\n}\n\n首先检查 MyAction 是否具有包含 error 及以上级别的日志记录权限。\n\
  \n**简而言之...**\n\nCommons Logging 是一种易于使用、可移植的方式，用于在你的 Struts（或其他）应用程序中执行日志记录。请使用它，而不是直接使用某个特定的日志解决方案。\n\
