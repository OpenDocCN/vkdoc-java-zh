  \ ID 和密码字段的表单。视图代码的输出将是 HTML。视图代码本身可能是这个显示的 HTML，或者是由 Servlet 容器转换为 HTML 的 JSP。\n\
  \n**需求 2**\n\n验证表单数据以检查格式错误的用户 ID 或密码。还会检查表单以确保两次输入的密码相同且长度正确。\n\n讨论\n\n你将需要控制器代码来执行验证。需要注意的一个重要点是，这些检查可以在不引用数据库的情况下完成。这意味着你可以在客户端（Web\
  \ 浏览器）上进行验证（可能使用 JavaScript），或者使用驻留在服务器上的 Java 类。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
