  \ `<html:link>` 条目。\n\n等价物\n\n无。\n\n**select，以及 option、options 和 optionsCollection**\n\
  \n`select` 显示一个 HTML 选择框。\n\n其他选项标签嵌套在其中，以便为包含它的 `select` 元素渲染选项：\n\n• `option`：渲染单个选项。有一些属性可用于帮助本地化显示的文本。\n\
