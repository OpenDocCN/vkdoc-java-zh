  \n**193**\n\n**总结**\n\n• Tiles 是一种用于创建布局和组件的机制。\n\n• 布局有助于简化 Web 应用程序的外观和感觉。\n\n\
  • Tiles 组件是一种创建可重用 GUI 组件的方式。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C14.fm Page 194 Tuesday, January 24, 2006 10:13 AM\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C15.fm Page 195 Tuesday, January 24, 2006 10:13 AM\n\n第 15 章\n\n■ ■\
  \ ■\n\n验证器框架\n\n**验**证器框架是一个 Struts 插件，最初由 David Winterfeldt 创建，它提供了一组*通用验证*，你可以使用它们来运行各种简单的验证。\n\
  \n\n\n与其在 ActionForm 子类中实现 validate() 函数，不如将验证规则声明在 XML 文件中。\n\n因此，Validator 框架消除了在\
  \ ActionForm 子类中实现 validate() 的必要性。（你仍然需要 ActionForm 子类来存储表单数据。）与在 ActionForm 子类中编写单独的\
  \ validate() 函数相比，使用 Validator 框架能带来诸多好处：\n\n• **更好的可维护性**：由于新的 XML 格式验证都集中在一个文件中，你可以更轻松地维护这些验证规则。\n\
  \n• **标准化**：许多简单的验证需要执行相同的检查。例如，用户 ID 和密码字段可能都需要检查以确保它们仅由字母数字组成。如果这些检查分散在多个 validate()\
  \ 函数中，标准化将是一项挑战。正如你将看到的，Validator 框架能让你更轻松地标准化验证规则。\n\n• **正确的实现**：一些“简单”的验证实际上很难正确实现！一个典型的例子是验证电子邮件地址是否符合\
  \ RFC-2822 规范（该规范涉及电子邮件地址格式等）。与其重新发明轮子，不如直接利用 Validator 框架提供的验证功能。\n\n• **更少的代码重复**：同样，由于\
  \ Validator 框架提供了一套相当全面的验证规则，你可以减少代码重复。你无需在每个 Web 应用程序中自行实现信用卡号等内容的验证代码。你可能会说，可以一次性编写这些验证，放入一个类中，然后在所有应用程序中复用。确实如此，但这意味着团队新成员需要学习更多内容才能高效工作。\n\
  \n在最坏的情况下，一些开发者可能会忘记共享的验证库，而在自己的 validate() 函数中重复编写验证逻辑。\n\n**195**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C15.fm Page 196 Tuesday, January 24, 2006 10:13 AM\n\n**196**\n\n第 15\
  \ 章 ■ VALIDATOR 框架\n\n• **自动客户端验证**：只需在 JSP 中放置一个 `<html:javascript/>` 标签，即可自动生成客户端的\
  \ JavaScript 验证。Validator 框架会自动为你生成这些验证。不过，Validator 框架的这一功能仍处于开发阶段；目前无法指定*仅*进行客户端验证。\n\
  \nValidator 框架提供了一套相当全面的通用验证规则，你应该能够用 XML 声明替换所有 validate() 函数。\n\n然而，如果无法完全替换，你也可以在\
  \ Validator 框架声明的验证规则*之外*，运行自己的自定义验证。此外，还可以*扩展* Validator 框架提供的标准验证规则集。\n\n**声明\
  \ Validator 插件**\n\n与 Tiles（参见第 14 章）类似，Validator 框架独立于 Struts。它属于 Apache Commons\
  \ 项目（参见本章末尾的“有用链接”），该项目旨在创建一组可重用的框架，Validator 框架便是其中之一。\n\n实际上，Validator 框架的内部实现存储在\
  \ Struts 发行版附带的 commons-validator.jar 文件中。该 JAR 文件包含了框架的所有 Java 类以及用于运行客户端验证的 JavaScript。\n\
  \n要在 Struts 应用程序中使用 Validator 框架，你需要声明它。这意味着需要在 struts-config.xml 文件中添加 `<plug-in>`\
  \ 声明（参见清单 15-1）。\n\n**清单 15-1.** *struts-config.xml 中 Validator 框架的插件声明*\n\n<plug-in\
  \ className=\"org.apache.struts.validator.ValidatorPlugIn\" >\n\n<set-property property=\"\
  pathnames\"\n\nvalue=\"/WEB-INF/validator-rules.xml,/WEB-INF/validation.xml\"/>\n\
  \n</plug-in>\n\n\n\n请注意，这里是 `ValidatorPlugIn`（大写字母 I）。一个常见的错误来源是使用小写字母“i”，就像 `TilesPlugin`\
  \ 中那样。\n\n`<set-property>` 标签设置了一个名为 `pathnames` 的单一属性，该属性对插件是可访问的。\n\n`pathnames`\
  \ 的值是一组以逗号分隔的文件：\n\n• `validator-rules.xml` 是一组为 Validator 框架声明的通用验证规则。该文件已随 Struts\
  \ 发行版提供。\n\n• `validation.xml` 将你的 `ActionForm` 子类（更准确地说，是声明的表单 bean）中的每个字段，与从 `validator-rules.xml`\
  \ 中声明的规则里选取的一个或多个验证规则关联起来。因此，`validation.xml` 就是你替换 `ActionForm` 子类中 `validate()`\
  \ 函数的地方。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C15.fm\
  \ 第 197 页 2006 年 1 月 24 日，星期二，上午 10:13\n\n第 15 章 ■ 验证器框架\n\n**197**\n\n正如声明所示，你需要将这两个文件都放在\
  \ Web 应用的 `/WEB-INF/` 文件夹中。\n\n`validator-rules.xml` 和 `validation.xml` 具有相同的结构——也就是说，它们由相同的\
  \ XML 文档标签定义（DTD）来描述。\n\n■**注意** DTD 包含在 `commons-validator.jar` 文件中，该文件随 Struts\
  \ 发行版提供，路径为 `/org/apache/commons/resources/validator_1_1_3.dtd`。\n\n由于它们结构相同，你完全可以创建一个包含两者信息的单一文件。当然，这会导致维护问题。\n\
  \n或者，你也可以将 `validation.xml` 文件拆分成多个文件。要使用它们，只需更改插件声明即可。例如，如果你有三个验证文件，分别名为 `A.xml`、`B.xml`\
  \ 和 `C.xml`，那么代码清单 15-1 将更改为代码清单 15-2 所示。Struts 在处理之前，会将代码清单 15-2 中声明的所有*四个*文件拼接在一起。\n\
  \n**代码清单 15-2.** *将 validation.xml 文件拆分为三部分*\n\n<plug-in className=\"org.apache.struts.validator.ValidatorPlugIn\"\
  \ >\n\n<set-property property=\"pathnames\"\n\nvalue=\"/WEB-INF/validator-rules.xml,\n\
  \n/WEB-INF/A.xml,\n\n/WEB-INF/B.xml,\n\n/WEB-INF/C.xml\"/>\n\n</plug-in>\n\n如果你的项目包含子项目，拆分\
  \ `validation.xml` 文件会很有用。管理并维护几个较小的文件（每个文件包含来自单个子项目的表单）比管理一个包含所有项目验证规则的大文件要容易得多。\n\
  \n**Validator DTD 基础**\n\n由于 `validator-rules.xml` 和 `validation.xml` 文件在 Validator\
  \ 框架中扮演核心角色，你必须理解它们的结构。代码清单 15-3 是 Validator DTD 的一个片段，它描述了 Validator XML 结构的主要划分。\n\
  \n**代码清单 15-3.** *Validator XML 结构的顶层节点*\n\n<!ELEMENT form-validation (global*,\
  \ formset*)>\n\n<!ELEMENT global (validator*, constant*)>\n\n<!ELEMENT formset (constant*,\
  \ form+)>\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C15.fm\
  \ 第 198 页 2006 年 1 月 24 日，星期二，上午 10:13\n\n**198**\n\n第 15 章 ■ 验证器框架\n\n`<form-validation>`\
  \ 标签是根标签，所有其他标签都包含在其中。`<form-validation>` 的重要子标签包括：\n\n• `<global>`，它又包含“全局”常量的声明（我们稍后会讲到）或验证器的声明。\n\
  \n• `<formset>`，代表针对某个区域设置的验证规则。我们将在本章末尾讨论这一点。\n\n• `<form>`，它是 `<formset>` 的子标签，包含你对\
  \ `struts-config.xml` 中声明的任何表单 bean 上字段的验证规则。你将在 `validation.xml` 文件中声明这些规则。\n\n\
  在 `validator-rules.xml` 文件中，你只会看到 `<validator>` 声明，每个声明对应 Validator 框架中可用的一个通用验证器。\n\
  \n你的 `validation.xml` 文件应仅包含 `<form>` 或 `<constant>` 声明。这种在 `validator-rules.xml`\
  \ 和 `validation.xml` 之间的标签划分纯粹是为了可维护性：你将所有声明的验证规则放在 `validator-rules.xml` 中，而将你对验证规则的*使用*放在\
  \ `validation.xml` 中。\n\n\n\n在向您展示如何使用和扩展 Validator 框架时，我将更详细地描述这些标签。\n\n**使用 Validator\
  \ 框架**\n\n使用 Validator 框架非常简单：\n\n• 对于每个需要验证的表单 bean，您需要在 `validation.xml` 文件中添加一个新的\
  \ `<form>` 标签。`<form>` 标签的 `name` 属性应与表单 bean 的名称相同。\n\n• 对于表单 bean 中每个需要验证的字段，您需要在\
  \ `<form>` 标签内添加一个 `<field>` 子标签。`<field>` 标签的 `property` 属性应与您要验证的字段名称相同。`property`\
  \ 属性支持嵌套字段（有关嵌套字段/属性的详细信息，请参阅第 10 章）。\n\n• `<field>` 标签还有一个 `depends` 属性，您可以使用该属性指定要为此字段运行的验证。验证的名称以逗号分隔的列表形式指定。\n\
  \n• `<field>` 标签可能包含可选的子标签，用于自定义错误消息或验证器使用的变量（例如，字段的最小长度）。\n\n• 确保您的表单 bean 是 `org.apache.struts.validator.ValidatorForm`\
  \ 的子类。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C15.fm 第\
  \ 199 页 2006 年 1 月 24 日，星期二，上午 10:13\n\n第 15 章 ■ VALIDATOR 框架\n\n**199**\n\n就是这样！为了了解其工作原理，让我们探讨如何使用\
  \ Validator 框架来验证 `RegistrationForm`，这是 Registration webapp 的唯一表单 bean（参见第 6 章中的清单\
  \ 6-1）。\n\n**示例：验证 RegistrationForm**\n\n`RegistrationForm`（参见清单 6-1）有三个需要验证的字段。在本节中，我将创建一个使用\
  \ Validator 框架的 `RegistrationForm` 版本。新的 `RegistrationForm.java` 类如清单 15-4 所示。\n\
  \n**清单 15-4.** *用于 Validator 框架的 RegistrationForm.java*\n```java\npackage net.thinksquared.registration.struts;\n\
  \nimport org.apache.struts.validator.*;\n\npublic final class RegistrationForm extends\
  \ ValidatorForm{\n\n    private String _userid = null;\n    private String _pwd\
  \ = null;\n    private String _pwd2 = null;\n\n    /**\n     * 与表单属性对应的 getXXX 和\
  \ setXXX 函数\n     */\n    public String getUserid(){ return _userid; }\n    public\
  \ void setUserid(String userid){ _userid = userid; }\n    public String getPassword(){\
  \ return _pwd; }\n    public void setPassword(String pwd){ _pwd = pwd; }\n    public\
  \ String getPassword2(){ return _pwd2; }\n    public void setPassword2(String pwd2){\
  \ _pwd2 = pwd2; }\n}\n```\n\n如果将清单 15-4 与清单 6-1 进行比较，您会注意到一些变化：\n\n• `RegistrationForm`\
  \ 现在继承自 `org.apache.struts.validator.ValidatorForm`，而不是 `org.apache.struts.action.ActionForm`。\n\
  • `validate()` 函数已经消失。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C15.fm\
  \ 第 200 页 2006 年 1 月 24 日，星期二，上午 10:13\n\n**200**\n\n第 15 章 ■ VALIDATOR 框架\n\n您需要继承\
  \ `ValidatorForm`，因为此基类将运行您在 `validation.xml` 文件中声明的验证。这也解释了 `validate()` 函数消失的原因——Struts\
  \ 将改为调用 `ValidatorForm` 上的 `validate()` 方法。\n\n■**注意** `RegistrationForm` 的表单 bean\
  \ 声明将保持不变。\n\n为了理解如何声明验证，请考虑 `RegistrationForm` 有三个字段：`userid`、`password` 和 `password2`。清单\
  \ 6-1 中运行的检查是为了确保 `userid` 已填写，并且 `password` 和 `password2` 匹配。\n\n这些验证并不完整。我们将为\
  \ `userid` 和 `password` 添加最大/最小长度检查，并检查 `userid` 和 `password` 是否仅限于字母数字字符。包含所有这些检查的\
  \ `validation.xml` 文件如清单 15-5 所示。\n\n**清单 15-5.** *为 RegistrationForm 声明验证*\n\n\
  ```xml\n<?xml version=\"1.0\" encoding=\"ISO-8859-1\" ?>\n<!DOCTYPE form-validation\
  \ PUBLIC ... *//* 为清晰起见已截断\n\n<form-validation>\n    <formset>\n        <form name=\"\
  RegistrationForm\">\n            <field property=\"userid\"\n                depends=\"\
  required,mask,maxLength,minLength\">\n                <msg name=\"required\" key=\"\
  reg.error.userid.missing\" />\n                <msg name=\"mask\" key=\"reg.error.userid.alphanum\"\
  />\n```\n\n\n<msg name=\"minLength\" key=\"reg.error.userid.length\" />\n\n<msg\
  \ name=\"maxLength\" key=\"reg.error.userid.length\" />\n\n<arg name=\"minLength\"\
  \ key=\"${var:minlength}\" position=\"0\"\n\nresource=\"false\"/>\n\n<arg name=\"\
  minLength\" key=\"${var:maxlength}\" position=\"1\"\n\nresource=\"false\"/>\n\n\
  <arg name=\"maxLength\" key=\"${var:minlength}\" position=\"0\"\n\nresource=\"false\"\
  />\n\n<arg name=\"maxLength\" key=\"${var:maxlength}\" position=\"1\"\n\nresource=\"\
  false\"/>\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C15.fm\
  \ 第 201 页 2006 年 1 月 24 日星期二 上午 10:13\n\n第 15 章 ■ 验证器框架\n\n**201**\n\n<var>\n\n\
  <var-name>mask</var-name>\n\n<var-value>^[a-zA-Z0-9]*$</var-value>\n\n</var>\n\n\
  <var>\n\n<var-name>minlength</var-name>\n\n<var-value>5</var-value>\n\n</var>\n\n\
  <var>\n\n<var-name>maxlength</var-name>\n\n<var-value>10</var-value>\n\n</var>\n\
  \n</field>\n\n<field property=\"password\"\n\ndepends=\"required,mask,maxLength,minLength\"\
  >\n\n*//* 与 userid 的验证类似，\n\n*// 为清晰起见，此处省略。*\n\n*</field>\n\n<field property=\"\
  password2\" depends=\"validwhen\">\n\n<msg name=\"validwhen\" key=\"reg.error.password.mismatch\"\
  />\n\n<var>\n\n<var-name>test</var-name>\n\n<var-value>(password == *this*)</var-value>\n\
  \n</var>\n\n</field>\n\n</form>\n\n</formset>\n\n</form-validation>\n\n如您所见，这里只有一个\
  \ `<formset>` 标签，这意味着我们尚未对任何验证进行本地化。请不要误解——*错误消息*是本地化了的，因为清单 15-5 明显使用了属性文件中的键。但验证本身并未本地化。\n\
  \n要理解其中的区别，请参考第 12 章中关于“本地化验证”的讨论。\n\n大多数情况下，您不需要本地化验证，因此您的 `validation.xml` 文件将只包含一个\
  \ `<formset>` 标签。我将在本章末尾描述如何使用多个 `<formset>` 标签来帮助您本地化验证。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C15.fm 第 202 页 2006 年 1 月 24 日星期二 上午 10:13\n\n**202**\n\n第 15 章 ■ 验证器框架\n\
  \n嵌套的 `<form>` 标签是实际操作发生的地方。在清单 15-5 中，只有一个 `<form>` 标签，对应于需要验证的 `RegistrationForm`\
  \ 表单 Bean。如果您有其他需要验证的表单 Bean，那么 `<formset>` 将包含更多的 `<form>` 标签，每个表单 Bean 对应一个。\n\
  \n每个字段的验证是分开进行的。`password` 字段的验证与 `userid` 的验证非常相似，因此我省略了这个字段。从 `userid` 字段的 `<field>`\
  \ 声明中，您可以看出我运行了四个验证：\n\n<field property=\"userid\"\n\ndepends=\"required,mask,maxLength,minLength\"\
  >\n\n`required` 验证器检查该字段是否由用户填写。它不需要额外的信息即可运行。如果 `required` 验证失败，以下 `<msg>` 标签\n\
  \n<msg name=\"required\" key=\"reg.error.userid.missing\"/> 确保显示由键 `reg.error.userid.missing`\
  \ 指定的错误消息。\n\n可以使用 `resource=false` 属性强制显示静态字符串（但不建议这样做）：\n\n<msg name=\"required\"\
  \ key=\"Userid is missing!\" resource=\"false\"/> `mask` 验证器检查字段的值是否与给定的正则表达式匹配。\n\
  \n■**注意** 正则表达式是一种紧凑表达任何字符串的方式。例如，DOS 正则表达式 `*.*` 匹配所有带扩展名的文件名。正则表达式语言因提供者而异，因此在验证器框架中使用\
  \ `*.*` 将 ***不会*** 匹配每个带扩展名的文件名。验证器框架使用一种更强大的正则表达式语言，类似于 Perl 编程语言中使用的语言。有关参考，请参阅本章末尾的“有用链接”部分。\n\
  \n这个正则表达式在 `var` 标签中给出：\n\n<var>\n\n<var-name>mask</var-name>\n\n<var-value>^[a-zA-Z0-9]*$</var-value>\n\
  \n</var>\n\n这声明了一个名为 `mask` 的*变量*，其值为 `^[a-zA-Z0-9]*$`。`mask` *验证器*需要定义此变量才能工作。在这种情况下，正则表达式匹配字母数字字符串（包含罗马字母和阿拉伯数字\
  \ 0 到 9 的字符串）。\n\n类似地，`maxLength` 和 `minLength` 验证器分别需要变量 `maxlength` 和 `minlength`。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C15.fm 第 203 页 2006\
