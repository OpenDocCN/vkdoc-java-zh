  \ C ■ STRUTS 标签参考\n\n**button**\n\n<html:button> 表示一个 HTML 按钮。单独的 <html:button>\
  \ 不执行任何操作——例如，它不会提交表单。你必须使用一个（或多个）事件处理属性（参见 evt-attrs）来激活某些 JavaScript，才能执行任何有趣的操作。\n\
  \n\n\n■**注意** 尽管当前 Apache Struts 在线文档有说明，但按钮的值并不会作为 URL 参数发送。\n\n如果希望显示由图形定义的按钮，请改用\
  \ `<html:image>`。\n\n使用限制\n\n此标签必须位于 `<html:form>` 标签内部。必须指定 `property` 属性。\n\n\
  属性\n\n前四组属性（`evt-attrs`、`acc-attrs`、`ren-attrs` 和 `struts-attrs`）均被接受。\n\n唯一必需的属性是\
  \ `property`。如果未指定 `value`，且 `<html:button>` 标签体内没有渲染文本，则按钮文本默认为“Click”。\n\n示例\n\
  \n以下代码片段将渲染一个文本标签为“Click”的 HTML 按钮，点击时会调用 JavaScript 函数 `changeMode()`：\n\n<html:button\
  \ onclick=\"changeMode(src)\" property=\"button1\" /> 在此片段中，假设的 JavaScript 函数可能通过测试\
  \ `src.name == \"button1\"` 来判断哪个按钮被点击。\n\n下一个示例展示了三个按钮，它们的文本均为“Click Me”。最后一个按钮使用\
  \ `<html:bean>` 来本地化其文本：\n\n<html:button property=\"button1\" value=\"Click Me\"\
  \ />\n\n<html:button property=\"button2\">Click Me</html:button>\n\n<html:button\
  \ property=\"button3\">\n\n<html:bean message=\"msg.click-me\"/>\n\n</html:button>\n\
