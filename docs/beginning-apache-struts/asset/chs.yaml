  \ 年 1 月 16 日，星期一，下午 3:21\n\n第 20 章\n\n■ ■ ■\n\nJavaServer Faces 与\n\nStruts Shale\n\
  \n**本**章我们将探讨一项名为 JavaServer Faces（JSF）的 Web 应用技术，该技术在未来多年内将在 Java Web 应用框架领域扮演重要角色。\n\
  \n我们还将预览一项名为 Struts Shale 的新技术，除了名称相似外，它与你所知的 Struts 几乎毫无共同之处。Struts Shale（简称 Shale）是众多继承\
  \ Struts 血统但拥抱 JSF 优势的新 Web 应用框架中的先行者。\n\n除这两者外，我们还将带你一窥 Struts-Faces 集成库，它允许你在“经典”Struts（即本书所描述的\
  \ Struts）中同时使用 JSF。\n\n在深入探讨激动人心的细节之前，我想先让你对本章的两个主角——JSF 和 Shale——有一个宏观的了解。\n\n\
  **JSF 概述**\n\nJSF 是一个 Web 应用框架，其核心关注点是 MVC 设计模式中的视图层。\n\n事实上，JSF 的*首要目标*是为*基于 Web\
  \ 的用户界面（UI）组件*提供一套*标准架构*。\n\n这听起来有些拗口，我们不妨逐一解析这些关键词：\n\n• **首要目标**：作为一个功能完备的 Web\
  \ 应用框架，JSF 除了视图层之外还处理许多其他事务，例如控制流和验证。但切勿被误导——它的核心仍是视图层。我认为从一开始就把握这一核心精神有助于你更好地理解\
  \ JSF。JSF 与 Struts 是截然不同的东西，最好避免过早地对它们进行比较。\n\n• **标准**：JSF *并非*软件。它是一个规范（类似于 Servlet\
  \ 规范或 JSP 规范），任何人都可以基于它创建具体的实现。\n\n目前已有两种实现：Sun 公司的 JSF 参考实现，以及本章将使用的 Apache MyFaces。\n\
  \n**307**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C20.fm\
  \ 第 308 页 2006 年 1 月 16 日，星期一，下午 3:21\n\n**308**\n\n第 20 章 ■ JAVASERVER FACES 与\
  \ STRUTS SHALE\n\n• **架构**：JSF 的重点在于架构——各个组件如何相互通信、请求如何处理等等。重点不在于具体的组件（如下拉列表、选项卡视图或电子邮件地址验证器）。事实上，JSF\
  \ 被特意设计为可扩展的。\n\n• **基于 Web 的 UI 组件**：举个例子或许有帮助。我使用 OpenOffice 作为文字处理器。我自定义了工具栏，使其在每次加载\
  \ OpenOffice 时显示某些按钮。某些按钮会高亮显示，例如“对齐”按钮，以指示当前激活的对齐方式。此外，当我点击“另存为”时，OpenOffice 会记住我上次保存文件的目录，并弹出已选中该文件夹的“保存”对话框。现在想象一下在你的\
  \ Web 应用中实现所有这些功能。你该从何入手？现实情况是，让基于 Web 的应用表现得像普通桌面应用一样极具挑战性。基于 Web 的 UI 组件及其背后的请求处理机制能帮助你实现这一目标。\n\
  \n与通常只提供一两种方式来完成特定任务的 Struts 不同，JSF 规范非常灵活，你可以从众多组合中选择一种来完成任务。这种灵活性可能会造成一种错觉，认为\
  \ JSF 过于复杂而难以使用。\n\n从某种意义上说，这确实如此。JSF 很复杂，但大部分复杂性对使用它构建 Web 应用的页面开发者和应用开发者来说是隐藏的。只有在你扩展\
  \ JSF 时——例如，创建新的 UI 组件，或提供与其他框架（如 Commons Validator 框架或 Spring）的集成点时——复杂性才会显现出来。\n\
  \n\n\n简而言之，使用 JSF 构建 Web 应用相当容易，但对其进行重大扩展则更为困难。而在扩展 JSF 的多种可能方式中，对 UI 组件和验证器进行扩展可能是最简单的。\n\
  \n**Shale 概述**\n\n与作为规范的 JSF 不同，Shale 是你可以立即使用的实际软件。\n\nShale 被标榜为 Struts（为清晰起见，我们有时会称之为“经典”Struts）的彻底重写。这次重写非常彻底，Struts\
  \ 开发者很可能认不出它还是 Struts！\n\nShale 基于 JSF。我的意思是，JSF 之于 Shale，就如同 JSP 之于 Struts。没有 JSF，就没有\
  \ Shale。你需要一个 JSF 的实现（如 MyFaces）才能让 Shale 工作。我不想过分强调这一点，但理解这一点至关重要。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C20.fm 第 309 页 2006 年 1 月 16 日，星期一，下午 3:21\n\n第 20 章 ■ JAVASERVER FACES\
  \ 与 STRUTS SHALE\n\n**309**\n\n**STRUTS TI 与 STRUTS OVERDRIVE**\n\nStruts Shale\
  \ 并非唯一的“新式 Struts”——“Struts Ti”和“Struts OverDrive”也都在开发中。\n\nStruts Ti（Titanium\
  \ 的简称）是经典 Struts 与 WebWork 的融合。WebWork 是一个开源 Web 应用框架，通常被认为在技术上比 Struts 更可靠，但又与\
  \ Struts 足够相似，因此可以合并。在撰写本文时，关于 Struts OverDrive 的信息很少，但我猜测它是使用 Nexus 框架进行视图/控制器通信的\
  \ Struts。Nexus 框架处理文本格式化、本地化和类型转换。这个框架实际上适用于许多不同的 Web 应用框架（Spring、Struts 等）和表示层（JSP、ASP.NET\
  \ 等）。OverDrive 是赋予利用 Nexus 框架的应用程序的品牌名称。有关 Ti 和 OverDrive 的详细信息，请参阅“有用链接”。\n\n与\
  \ Shale 一样，这些项目与你从本书中了解的 Struts 相比，差异很大。\n\n以我（诚然是持怀疑态度的）观点来看，它们加上“Struts”前缀是为了利用庞大的现有\
  \ Struts 用户群。\n\n但我担心这是一个错误。拆分品牌名称只有在每个拆分都针对明确、可识别的细分市场时才有意义。微软的桌面/服务器产品就是一个很好的例子。每个产品在“Windows”这个总品牌下都针对一个明显不同的细分市场。但在\
  \ Web 应用框架的情况下，并没有明显的多重细分市场，因此拥有*四个*都叫“Struts”的框架只会造成混乱，实际上是在稀释 Struts 品牌。我相信大多数\
  \ CIO 会坚持使用久经考验的经典 Struts，或者如果他们打算迁移，会考虑更成熟的框架，如 Spring 或基于标准的 JSF。很少有人会去探索 Struts\
  \ X。事实上，他们更有可能选择原始的 WebWork，而不是它与 Struts 的融合体（即 Struts Ti）。现在，他们很可能两者都不会考虑。\n\n\
  在我看来，能够与 Struts 1.*x* 保持向后兼容，同时随着时间的推移引入重大改进的项目，才能赢得胜利——或者更确切地说，赢得用户。在撰写本文时，这匹获胜的黑马看起来像是\
  \ Struts 1.*x*。如果 Struts-Faces 集成库（本章后面会介绍）得到更多开发，这种可能性还会增加。Shale 可能会紧随其后，因为它提供了卓越的功能。\n\
  \nShale 有三个主要设计目标：\n\n• **将 JSF 扩展到视图层之外**：Shale 为 JSF 规范未能很好解决的领域（例如验证用户输入的实际操作）提供支持。回想一下，JSF\
  \ 主要关注视图层，因此 Shale 必须做相当多的工作，才能使 JSF 被习惯于 Validator 框架、动态表单和 Tiles 这些便利功能的长期 Struts\
  \ 开发者所接受。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C20.fm\
  \ 第 310 页 2006 年 1 月 16 日，星期一，下午 3:21\n\n**310**\n\n\n\n第 20 章 ■ JAVASERVER FACES\
  \ 与 STRUTS SHALE\n\n• **添加 Struts 此前不具备的功能**：例如，Struts 无法处理跨多个页面请求的用户交互。Shale 通过一项名为“对话”（借鉴自\
  \ Spring 的“webflow”）的功能实现了这一点。\n\n• **与其他 Web 应用框架集成**：主要是 Spring 框架。\n\n此外，还提供对\
  \ Ajax 技术的部分支持。\n\n请注意！Shale *并非*“经典”Struts 的自然演进——你不能简单地将 Struts Web 应用“升级”为 Shale。\n\
  \n那么为什么还要保留“Struts”前缀呢？原因可能是 Struts 中最有用的部分已被成功重构为 Apache Commons 项目（Validator 框架和动态表单），或者在很大程度上已独立于\
  \ Struts（如 Tiles）。Shale 重用了这些组件，以提供 JSF 规范中不具备的重要便利功能。从这个意义上说，经典 Struts 是 Shale\
  \ 的一部分。另请注意我们在侧边栏“Struts Ti 与 Struts OverDrive”中讨论过的另一种更尖锐的观点。\n\n**学习 Struts 是浪费时间吗？**\n\
  \n上述介绍可能会让你思考：学习 Struts 是否在浪费时间？\n\n绝非如此！\n\n“经典”Struts 是迄今为止最流行的 Web 应用框架，并且很可能在相当长一段时间内与\
  \ JSF 和 Shale 共存。正如你将在本章后面看到的，JSF 在验证和动态表单等多个领域不如 Struts 完善。这是有意为之，因为 JSF 专注于视图层，而将其他领域的不足留给其他技术去解决。这实际上正是\
  \ Shale 存在的理由*。遗憾的是，在撰写本文时，Shale 仅处于 1.0 版本，远未达到经典 Struts 的成熟度。*\n\n此外，经典 Struts\
  \ 仍在积极开发中，因此很可能会有新功能和改进，进一步推动那些不需要 JSF 或 Shale 高级功能的用户采用它。\n\n最后，扎实掌握 Struts 知识能让你在学习新技术时占据优势，并为你评估这些技术是否满足自身需求提供更好的视角。\n\
  \n**JavaServer Faces (JSF)**\n\n正如你现在可能已经了解的，JSF 专注于视图层。从 Struts 开发者的角度来看，这种专注意味着\
  \ JSF 与 Struts 之间存在两个重要差异。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C20.fm 第 311 页 2006 年 1 月 16 日星期一 下午 3:21\n\n第 20 章 ■ JAVASERVER FACES\
  \ 与 STRUTS SHALE\n\n**311**\n\n• **更复杂的请求处理生命周期**：由于 JSF 使用服务器端 UI 组件，它处理传入 HTTP\
  \ 请求的方式与 Struts 不同。JSF 的请求处理生命周期分为多个*阶段*。这与 Struts 不同，Struts 只有两个阶段：一个用于验证 ActionForm，另一个用于调用\
  \ Action 的 execute()函数。此外，JSF 允许你自己的类在每个阶段结束时监听*事件*（更多内容将在后续小节中介绍）。这是对 Struts 的巨大改进，也是\
  \ JSF 如此可扩展的原因。\n\n• **部分配置信息从配置文件移至 JSP**：\n\n**JSF 没有验证框架、动态表单或 Tiles 的概念，因此不存在这些组件的配置文件。相反，验证（以及你将看到的许多其他内容）是在构成\
  \ Web 应用的 JSP 中指定的。与 Struts 一样，JSF 确实有一个名为 faces-config.xml 的配置文件，因此并非所有配置信息都移到了\
  \ JSP 中。\n\n注意这两点非常重要，有助于减轻你（作为 Struts 开发者）在学习 JSF 时可能遇到的认知失调。\n\n**服务器端 UI 组件**\n\
  \n当页面提交到 Struts Web 应用时，页面上的表单数据会存储在 ActionForm 子类中。通常，我们会将 ActionForm 视为目标数据在模型层的临时存储区域。\n\
  \n\n\n虽然完全正确，但看待 ActionForm 的另一种方式是，它存储了视图层在服务器端的*状态*。这些状态信息可用于在必要时（例如，当出现简单的验证错误时）以原始状态重新显示页面。\n\
  \n例如，在注册 Web 应用程序（参见第 5 章）中，当用户输入错误的密码时，页面会重新显示，并保留最初输入的用户 ID。\n\n根据我们新的理解方式，可以说保存在\
  \ ActionForm 上的数据被用来将视图的状态（重新显示原始用户 ID）恢复为其原始状态。\n\nJSF 将这种看待事物的方式发挥到了极致。JSF 拥有各种\
  \ UI 组件的标签，就像 Struts 拥有其 `<html:xxx>` 和 `<bean:xxx>` 标签一样。最大的区别在于，*每个 JSF 标签都会在服务器端创建一个对象*。这个对象用于保存\
  \ UI 组件的状态。我们稍后将详细说明。\n\nJSF 另一个发挥到极致的方面是 JSF 标签的组织方式。在 Struts 中，我们习惯于简单的两级嵌套层次结构：一个\
  \ `<html:form>` 可以包含像 `<html:input>` 或 `<html:submit>` 这样的元素，如下面的代码片段所示：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C20.fm 第 312 页 2006 年 1 月 16 日，星期一，下午 3:21\n\n**312**\n\n第 20 章 ■ JAVASERVER\
  \ FACES 与 STRUTS 的对比\n\n<html:form action=\"MyHandler.do\">\n\n<bean:message key=\"\
  myapp.prompt.name\"/></td>\n\n<html:text property=\"name\" size=\"60\" />\n\n<html:errors\
  \ property=\"name\"/>\n\n<html:submit>\n\n<bean:message key=\"myapp.prompt.submit\"\
  />\n\n</html:submit>\n\n</html:form>\n\n这反映了 Struts 显示标签与普通 HTML 标签紧密对应的事实。\n\n\
  另一方面，JSF 的层次结构要丰富得多，并且通常有更多层级，如清单 20-1 所示。\n\n**清单 20-1.** *展示层次化组织的 JSF 标签片段*\n\
  \n<f:view>\n\n<h:panelGroup>\n\n<h:messages style=\"color:red\" globalOnly=\"true\"\
  />\n\n<h:outputText value=\"#{reg_messages['title_reg']}\" />\n\n<h:form binding=\"\
  #{user.container}\">\n\n<h:outputText value=\"#{reg_messages['user_id']}\"/>\n\n\
  <h:inputText id=\"userId\"\n\nvalue=\"#{user.userId}\" required=\"true\">\n\n<x:validateRegExpr\
  \ pattern='^[A-Za-z0-9]{5,10}$' />\n\n</h:inputText>\n\n<h:message for=\"userId\"\
  \ />\n\n...\n\n这种层次化组织（层次结构通过嵌套定义）允许你精细地控制页面如何渲染以呈现给用户。你将在本章后面了解其原因。\n\n目前，需要注意的重要一点是，清单\
  \ 20-1 中的页面创建的相应服务器端对象也以树状方式嵌套，如图 20-1 所示。\n\n当第一次请求一个 JSF 页面时，对象树——我们称之为“UI 树”——会在服务器端创建。JSF\
  \ 使用 UI 树来生成所请求页面的 HTML。\n\n当*下一次*请求同一个页面时（由同一个用户在同一个会话中），这个 UI 树会在服务器端重新创建，并用页面中的数据填充。这些数据不一定只是要传递给模型层的用户输入，还可以包括每个\
  \ UI 组件的状态。\n\n例如，假设一个 JSF 页面包含一个树形视图 UI 组件的标签，就像你可能在 Microsoft Explorer 或 Outlook\
  \ 中使用过的那样。请求该页面的用户看到树形视图并点击了其中的一个节点。树形视图展开，用户继续点击，暴露出树的更多部分，如图 20-2 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00007.png)\n\nDoray_6048C20.fm 第 313 页 2006 年 1 月 16 日，星期一，下午 3:21\n\n\
  第 20 章 ■ JAVASERVER FACES 与 STRUTS 的对比\n\n**313**\n\n**图 20-1.** *服务器上对应的 UI 树*\
  \ **图 20-2.** *MyFaces 中的树形视图*\n\n当页面被提交时，树形视图的状态——换句话说，用户展开了哪些节点——会与其他表单数据一起，以不引人注目的方式发送出去。这些数据存储在代表树形视图组件的服务器端对象上。\n\
  \n\n\n总而言之，与 Struts 将页面数据放入单个 ActionForm 不同，JSF 会创建一个服务器端 UI *树*来保存数据——既包括发往模型层的数据，也包括表示视图状态的数据。JSF\
  \ 对这两者不加区分。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C20.fm\
  \ Page 314 Monday, January 16, 2006 3:21 PM\n\n**314**\n\n第 20 章 ■ JAVASERVER FACES\
  \ 与 STRUTS SHALE\n\n因此，需要处理的是 UI 树，就像 Struts 处理 ActionForms 一样。UI 树中包含的用户提交数据需要经过验证和处理，才能交付给模型层。接下来我们将了解这是如何完成的。\n\
  \n**请求处理生命周期**\n\nJSF 的请求处理生命周期描述了如何处理来自客户端的 HTTP 请求，以由服务器生成响应。JSF 的请求处理生命周期分为几个*阶段*。图\
  \ 20-3 对此进行了说明。\n\n■**提示** 你需要非常熟悉本节内容，因为现有的 JSF 文档以及基于 JSF 的技术（如 Shale）的文档，经常引用\
  \ JSF 请求处理生命周期的各个阶段。\n\n**图 20-3.** *JSF 的请求处理[生命周期](http://www.it-ebooks.info/)*\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C20.fm Page 315\
  \ Monday, January 16, 2006 3:21 PM\n\n第 20 章 ■ JAVASERVER FACES 与 STRUTS SHALE\n\
  \n**315**\n\n总共有六个阶段（图 20-3 中的实线框），每个阶段及其关联的*事件*在后续阶段开始之前都会完全处理完毕。\n\n■**注意** *事件*和*事件监听器*是\
  \ JSF 将其内部机制暴露给第三方类的机制。它们是 JSF 的一个重要扩展点。我们将在下一节中描述这两者。\n\n在图 20-3 中，我们标记了两种方式（验证错误和转换错误），通过这些方式，处理过程会快速进入“渲染响应”阶段。实际上，在*任何*阶段之后立即处理事件的事件监听器都可能导致\
  \ JSF 进入“渲染响应”阶段。\n\n**FACES 请求**\n\n并非所有发送到服务器的 HTTP 请求都按照图 20-3 进行处理，只有那些请求 JSF\
  \ 页面的请求才会如此。此类请求被称为 *faces 请求*。这类似于并非每个 HTTP 请求都由 Struts 处理，只有那些带有 .do 扩展名（默认情况下）的请求才会被处理。JSF\
  \ 对应的扩展名是 .jsf。（同样，这取决于你如何配置 web.xml。JSF 扩展名的另一个常见选择是 .faces。）\n\n你的页面不必具有 .jsf\
  \ 扩展名，但对它们的调用必须使用该扩展名。例如，假设你有一个包含 JSF 标记的 JSP 页面，名为 mypage.jsp。要正确调用此页面，你需要请求\n\n\
  http://www.mycompany.com/mypage. **jsf**\n\n如果你直接请求 http://www.mycompany.com/mypage.jsp，则会收到错误消息。\n\
  \n你可以将页面命名为 .jsf 扩展名，但这在符合 JSP 1.2 规范的 servlet 容器中*无法*工作。JSP 1.2 要求 JSP 页面具有 .jsp\
  \ 扩展名。因此，最可移植的方法是将你的 JSF 页面命名为 .jsp，并以 .jsf 扩展名请求它们。\n\n让我们详细看看每个阶段。如果我的某些评论目前看起来晦涩难懂，请不要担心。我将在以下小节中解释这些晦涩的部分。\n\
  \n• **恢复视图**：如果这是用户第一次请求此页面，则会创建 *UI 树*（请参阅上一小节的讨论）。如果这是第二次创建该页面，则会使用先前保存的状态重新创建\
  \ UI 树。每个 UI 组件的*值绑定*也会在此阶段进行处理。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C20.fm Page 316 Monday, January 16, 2006 3:21 PM\n\n**316**\n\n第 20\
  \ 章 ■ JAVASERVER FACES 与 STRUTS SHALE\n\n• **应用请求值**：UI 树上的每个 UI 组件都有机会根据传入的 HTTP\
  \ 请求中包含的信息更新其状态。\n\n• **处理验证**：在此阶段，处理验证。如果存在错误，则处理过程直接进入“渲染响应”阶段。\n\n• **更新模型值**：顾名思义，在此阶段，模型层会使用\
  \ UI 树中的数据进行更新。JSF 知道哪些 UI 组件保存了发往模型层的数据，因为你已在 JSF 标记中指定了这一点。数据转换错误将导致处理过程直接进入“渲染响应”阶段。\n\
  \n• **调用应用程序**：根据先前阶段发布的*动作事件*执行导航。你也可以对 JSF 进行自定义，将其他处理代码添加到此阶段。\n\n• **渲染响应**：根据导航结果或现有的\
  \ UI 树（如果页面需要重新显示）生成 HTML 输出。UI 树的状态也会被保存，以便在后续请求中进行处理。\n\n在每个阶段（恢复视图和渲染响应阶段除外）之后，都会处理该阶段可能生成的事件。\n\
  \n事件是包含指示特定处理状态信息的 Java 对象。\n\n事件由 UI 树上的 UI 组件或你附加到任何阶段的自定义处理代码生成。事件的处理由 JSF 本身或事件监听器完成。\n\
  \n接下来我们将了解这是如何完成的。\n\n**事件与事件监听器**\n\n在本书中，你已经遇到过两种设计模式：MVC 设计模式和单例设计模式（在第 19 章中）。事件和事件监听器属于一种简单但强大的设计模式，称为*观察者模式*。\n\
  \n在观察者设计模式中，有两个角色。第一个是发布者，一个会不时更新的数据源。第二个是订阅者，表示对获取发布者最新数据感兴趣的实体。\n\n让订阅者获取最新数据的一种糟糕方式是让它们定期轮询发布者。这种称为轮询的技术显然效率低下：轮询太快会浪费\
  \ CPU 时间；轮询太慢则可能过晚获取数据或完全丢失数据。\n\n观察者设计模式没有采用轮询，而是采用了“别找我们，我们会找你”的原则。对从发布者获取数据感兴趣的订阅者首先向发布者*注册*。当新数据到达时，发布者会*通知*所有已注册的订阅者。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C20.fm Page 317\
  \ Monday, January 16, 2006 3:21 PM\n\n第 20 章 ■ JAVASERVER FACES 与 STRUTS SHALE\n\
  \n**317**\n\n让我们举一个具体的例子。像 Swing 或抽象窗口工具包（AWT）这样的 GUI 框架拥有表示可视化 UI 组件的类，例如按钮、复选框等。这些\
  \ GUI 组件中的每一个都需要发出某些用户交互的信号，例如在按钮上单击鼠标，或在文本输入框中按下某个键。每个这样的活动都称为一个*事件*。\n\n一个事件通常由一个\
  \ Java 类表示，该类包含描述该事件数据的字段。例如，对于鼠标单击，MouseClickEvent 可能包含鼠标单击的 X 和 Y 坐标，如清单 20-2\
  \ 所示。\n\n**清单 20-2.** *表示鼠标单击的类*\n\npublic class MouseClickEvent{\n\nprivate int\
  \ _x, _y;\n\npublic MouseClickEvent(int x, int y){\n\n_x = x; _y = y;\n\n}\n\npublic\
  \ int getX(){ return _x; }\n\npublic int getY(){ return _y; }\n\n}\n\n请注意，表示事件的类通常是*不可变的*，这意味着一旦创建，你只能从中读取数据。这样做的原因是因为一个事件可能在多个订阅者之间共享。你不希望任何订阅者修改该事件。\n\
  \n\n\n现在我们有了一个表示鼠标点击的类。太棒了！但如何保证订阅者能够理解这个事件中包含的数据呢？很简单——让它们实现一个标准接口，如清单 20-3 所示。\n\
