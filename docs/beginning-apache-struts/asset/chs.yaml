  \n**131**\n\n**一次上传固定数量的文件**\n\n从我们目前的讨论来看，应该很清楚：由于上传的文件只是 `ActionForm` 的一个属性，因此你可以在单个表单上上传多个文件。如果这些文件需要被同等对待，最佳方式是使用索引属性，如清单\
  \ 11-2 所示。\n\n**清单 11-2.** *用于上传固定数量文件的简单表单*\n\n<%@ taglib uri=\"/tags/struts-html\"\
  \ prefix=\"html\" %>\n\n<html>\n\n<body>\n\n<html:form enctype=\"multipart/form-data\"\
  \ action=\"/FileUpload.do\">\n\n<h1>上传四个文件</h1>\n\n文件 1:<html:file property=\"file[0]\"\
  \ size=\"20\"/><br> 文件 2:<html:file property=\"file[1]\" size=\"20\"/><br> 文件 3:<html:file\
  \ property=\"file[2]\" size=\"20\"/><br> 文件 4:<html:file property=\"file[3]\" size=\"\
  20\"/>\n\n<html:submit/><br>\n\n</html:form>\n\n</body>\n\n</html>\n\n与清单 11-2 关联的\
  \ `ActionForm` 在清单 11-3 中描述。\n\n**清单 11-3.** *与清单 11-2 关联的 ActionForm*\n\nimport\
  \ org.apache.struts.upload.FormFile;\n\npublic class FileUploadForm extends ActionForm{\n\
  \nprotected FormFile[] _files;\n\npublic FileUploadForm(){\n\n_files = new FormFile[4];\n\
