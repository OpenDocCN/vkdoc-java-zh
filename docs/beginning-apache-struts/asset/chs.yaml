  \ mapping,\n\nHttpServletRequest request){\n\n_x = _y = UNKNOWN;\n\n}\n\n}\n\n等价标签\n\
  \n无。\n\n**img**\n\n此标签渲染一个 HTML `<img>`。\n\n使用限制\n\n必须指定以下属性之一：`action`、`module`\
  \ 或 `src/srcKey`，或 `page/pageKey`。\n\n属性\n\n接受前三个通用属性集：`evt-attrs`、`acc-attrs` 和\
  \ `ren-attrs`。\n\n除此之外，还有一些特定于 `img` 的属性：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048AppC.fm Page 401 Tuesday, January 17, 2006 4:46 PM\n\n附录 C ■ STRUTS\
  \ 标签参考\n\n**401**\n\n• action、module 或 src/srcKey，或 page/pageKey：用于定位要显示的图像。第一个\
  \ `action/module` 对指定一个表单处理器。`action` 当然必须以斜杠开头，如果要指定模块，请使用 `module` 属性。`src` 是图像的\
  \ URL。`page` 是图像的模块相对 URL（因此必须以斜杠开头）。带 `Key` 的版本是消息资源键，指向实际的 URL。它们对于显示本地化图像非常有用。\n\
  \n• border：指定显示图像周围边框的宽度。单位为像素。\n\n• locale/bundle：用于指定不同的 `Locale` 对象或消息资源文件。`locale`\
  \ 指定一个键，用于查找当前会话中存储的 `Locale` 对象。`bundle` 属性在 `<bean:message>` 条目中有更详细的说明。\n\n•\
  \ align：指定图像相对于周围文本的对齐方式。这是 `<img>` 元素的标准 HTML 属性。有效值为 `left`、`right`、`top`、`texttop`、`bottom`、`absbottom`、`middle`\
  \ 和 `absmiddle`。请查阅 HTML 参考以了解这些设置的作用。\n\n• height/width：以像素为单位指定最终显示图像的高度和宽度。图像的缩放由浏览器完成。\n\
  \n• hspace/vspace：图像与周围元素之间的水平空间（`hspace`）和垂直空间（`vspace`）。单位为像素。\n\n• imageName：在\
  \ `<img>` 标签中渲染一个 `name` 属性：`name=<imageName>`。用于脚本编写。\n\n• ismap：此布尔属性是 HTML `<img>`\
  \ 标签的 `ismap` 属性的对应项。用于指示服务器端图像映射——仅用于那些不理解 HTML `<map>` 元素的古老 Web 浏览器。因此，你极不可能使用\
  \ `ismap`。\n\n• usemap：要使用的 HTML `<map>` 元素的名称。这会将图像转换为可点击的图像映射。请参阅 HTML 参考了解如何创建\
  \ `<map>`。用户点击图像时浏览器的行为完全在客户端处理。不涉及服务器端处理。如果你想将鼠标点击位置传递给服务器端代码，请改用 `<html:image>`。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\n\nDoray_6048AppC.fm 第 402\
  \ 页 2006 年 1 月 17 日星期二 下午 4:46\n\n**402**\n\n附录 C ■ STRUTS 标签参考\n\n• paramName、paramProperty、paramScope\
  \ 和 paramId：用于创建单个请求参数。该请求参数会附加到图片的最终 URL 中。前三个属性用于定位当前请求或会话中的单个对象。该对象的 `toString()`\
  \ 方法返回值即为单个参数值。参数名称由 paramId 指定。\n\n• name/property/scope：用于创建多个请求参数。这些请求参数会附加到图片的最终\
  \ URL 中。这些属性用于定位一个 `java.util.Map` 类型的对象。Map 的键作为参数名称，对应的值作为参数值。如果指定了 property，则必须同时指定\
  \ name。\n\n• useLocalEncoding：如果设置为 true，则告知 Struts 使用当前 `HttpServletResponse` 的字符编码。\n\
  \n示例\n\n以下是渲染本地化图片的方法：\n\n<html:img srcKey=\"app.images.companylogo\" /> 要了解如何在图片\
  \ URL 上创建单个或多个请求参数，请参考 <html:link> 条目。\n\n等价标签\n\nJSF 的 `<h:graphicImage>` 是等价标签。\n\
  \n**javascript**\n\n此标签用于生成客户端验证的 JavaScript。该标签与 Validator 框架紧密关联。\n\n使用限制\n\n\
  此标签仅在与 `<html:form>` 配合使用时才有意义，因为生成的 JavaScript 用于客户端表单验证。JavaScript 代码由 Validator\
  \ 框架自动生成。因此，要使此标签正常工作，您的 ActionForm 子类也必须继承自 ValidatorForm。\n\n属性\n\n此标签最常见的用法是不定义任何属性。不过，您可以通过以下属性对生成的\
  \ JavaScript 进行少量自定义：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048AppC.fm\
  \ 第 403 页 2006 年 1 月 17 日星期二 下午 4:46\n\n附录 C ■ STRUTS 标签参考\n\n**403**\n\n• bundle：指定用于生成错误消息的消息资源包（参见表\
  \ C-8）。此属性在 Struts 1.2.7 版本中新增。另请参见 <bean:message> 条目。\n\n• htmlComment：如果设置为 true，则将\
  \ JavaScript 包裹在 HTML 注释分隔符（`<!--` 和 `-->`）中。这是为了防止非常旧的浏览器在页面上渲染 JavaScript。如果您使用了\
  \ `<html:xhtml>` 或 `<html:html xhtml=\"true\">`，此设置将被忽略。默认值为 true。\n\n• cdata：如果\
  \ `cdata=\"true\"`，并且您使用了 `<html:xhtml>` 或 `<html:html xhtml=\"true\">`，则生成的 JavaScript\
  \ 会被 XML 的 `CDATA[...]` 分隔符包裹。\n\n• method：为自动生成的 JavaScript 名称指定不同的前缀。使用此属性可防止您自己的\
  \ JavaScript 与 Struts 生成的 JavaScript 代码之间发生名称冲突。\n\n• scriptLanguage：如果设置为 false，则省略生成的\
  \ `<script>` 标签中的 language 属性。\n\n• staticJavascript/dynamicJavascript：这两个属性都接受布尔值。staticJavascript（默认值为\
  \ true）指定是否将 Validator 框架中的静态 JavaScript 代码粘贴到页面中。类似地，dynamicJavascript（默认值为 true）指定是否为表单生成的动态\
  \ JavaScript 代码粘贴到页面中。通常情况下，您可以省略这两个属性。\n\n• src：此属性会在渲染后的 `<script>` 标签中添加一个 HTML\
  \ src 属性。您可以使用它来指定希望在浏览器显示页面时加载的自定义 JavaScript 文件。\n\n• page/formName：Validator\
  \ 框架允许您创建多页验证（本书不涉及此主题）。此功能在创建简化复杂数据填写的多页向导时非常有用。通常，用户每次只会看到一个子表单，每个子表单都带有“下一步”和“上一步”按钮。page\
  \ 属性是当前页面的编号，formName 属性是表单 bean 的名称。\n\n示例\n\n\n\n最常见的用法是要求进行所有验证。只需不指定任何属性即可实现：\n\
  \n<html:javascript />\n\n将其粘贴到页面的任何位置均可生效。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
