  \ + u.getId() +\n\n\" pwd=\" + u.getPassword());\n\n}\n\n除了路径和 parse()返回的 bean 有明显变化外，最显著的改变是调用了\
  \ Digester 的 addSetNext(path, myFunction)函数。\n\n当 Digester 完成对单个`<user>`标签的解析后，它会询问“接下来做什么？”这个问题的答案由你在\
  \ addSetNext()中提供的信息给出。Digester 会在与 addSetNext()所定义路径的*父级*相关联的对象上调用 myFunction()。该函数的参数\n\
