  \n**问题**：在大多数情况下，编写一个 `validate()` 函数就足够了。只有在深思熟虑后才使用第二种替代方案，因为验证器应该是*通用的*，至少在你的\
  \ Web 应用的问题域内如此。否则，你可能会遇到潜在的维护问题。你能明白为什么吗？\n\n**答案**：如果某个特定的验证只使用一次，那么为验证器框架编写扩展就没有意义。这是因为此类扩展的维护开销（你需要在\
  \ `validation-rules.xml` 中声明新的验证器，创建必要的 Java 代码，并在 `validations.xml` 中使用该验证器）远高于使用\
  \ `validate()` 函数。\n\n当然，如果同一个验证被多次使用（即验证器是*通用的*），那么在 `validate()` 中重复代码，甚至将必要的验证器代码重构到单独的类中，其成本会更高。后一种选择看似成本较低，但你仍然需要在每个使用的表单上实现\
  \ `validate()`。\n\n**第 17 章：大杂烩**\n\n**问题**：你现在应该知道，`unspecified()` 处理的是请求的函数在 `PrintingAction`\
  \ 上不存在的情况。（问题：这怎么会发生？）**答案**：如果 JSP 代码中存在错误（即 JSP 代码在 URL 中省略了 `dispatch` 参数），或者用户手动输入了错误的\
  \ URL（同样，在 URL 中省略了 `dispatch` 参数），就可能发生这种情况。\n\n`unspecified()` *不会*处理 `dispatch`\
  \ 参数值对应函数不存在的情况。在这种情况下，会抛出异常，除非你使用全局（或局部——参见第 18 章）异常处理器捕获了它，否则你会看到标准的 JSP 错误页面。使用异常处理器的替代方案是扩展\
  \ `LookupDispatchAction`（就像我在实验 14 的 `TilesLookupDispatchAction` 中所做的那样），以包含一个处理这种可能性的\
  \ `unknown()` 函数。\n\n**第 20 章：JavaServer Faces 和 Struts Shale**\n\n**快速测验**：在 Struts\
  \ 中你会如何做同样的事情？\n\n**答案**：使用 `LookupDispatchAction`。JSF 的方法使用起来要容易得多。无需经历子类化 `LookupDispatchAction`\
  \ 并在 `struts-config.xml` 中声明特殊参数的麻烦，使用 JSF 你只需告诉 JSF 在 `commandButton` 的 `action`\
  \ 属性中调用哪个函数即可。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048AppD.fm\
