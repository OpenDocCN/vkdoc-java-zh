  \nDoray_6048C12.fm 第 143 页 2006 年 1 月 12 日，星期四，上午 11:04\n\n第 12 章\n\n■ ■ ■\n\n国际化\n\
  \n简单来说，国际化（简称 *i18n*，因为 *internationalization* 一词中 *i* 和 *n* 之间有 18 个字母），或本地化，就是让应用程序能够支持除当前目标语言之外的其他语言的工作。\n\
  \n本地化一个 Web 应用程序绝非易事。除了简单地将网页翻译成新语言之外，还有许多细微之处。要理解这些问题，请考虑在本地化应用程序时需要解决的四个领域：\n\n\
  • **处理输入**：由于输入数据来自 Web 浏览器，你的 Web 应用程序必须能够正确处理不同的*字符编码*（下一节将详细介绍）。\n\n• **验证**：使用新语言的用户可能对日期或数字采用不同的约定。你的验证逻辑必须能正确处理这些情况。\n\
  \n• **输出**：对话框、提示信息、按钮标签和其他文本必须翻译成新语言。理想情况下，用户应该能够选择与 Web 应用程序交互的语言。Struts 在这方面解决得特别好。\n\
  \n• **数据存储及相关问题**：你可能需要确保数据库能够处理多字节字符编码。当你的 Web 应用程序将数据传递给其他应用程序时，也会出现类似的问题——你必须确保这些应用程序能够接受新语言和字符编码的文本。\n\
  \n在本章中，你将看到 Struts 如何通过解决前三个领域来极大地简化本地化 Web 应用程序的任务。但首先，我需要定义一些术语。\n\n**字符编码、Unicode\
  \ 和 UTF-8**\n\n**字符**是一个抽象实体，对应于一种语言或文字中的一个书写单位。例如，字母“A”或“A”或“A”都代表同一个字符。\n\n**143**\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C12.fm 第 144 页 2006\
  \ 年 1 月 12 日，星期四，上午 11:04\n\n**144**\n\n第 12 章 ■ 国际化\n\n不过，“A”和“a”代表不同的字符，因为它们具有不同的含义。字符还包括标点符号和文字中的其他符号。\n\
  \n**字符集**是一组字符的集合，并为每个字符分配一个唯一的数字标识符。换句话说，字符集只是（字符，标识符）对的集合。一个字符集中的字符可能来自一种或多种语言或文字。\n\
  \n**Unicode** 是一个旨在涵盖所有人类语言和文字中字符的字符集。\n\n■**注意** 听起来可能很奇怪，但一种语言可能有多种文字。例如，维吾尔语（来自中亚）有三种文字：古老的阿拉伯文字、前苏联国家使用的类似西里尔字母的文字，以及中国政府发明、现在维吾尔人在互联网上交流使用的拉丁文字。\n\
  \nUnicode（当前版本为 4.0）由 Unicode 联盟定义，该组织由许多（主要是美国）公司支持。该联盟已经识别了地球上每种（嗯，几乎是每种）语言中的每一个字符，并为每个字符分配了一个唯一的数字。编号方式使得每种语言获得一个或多个连续的编号块。\n\
  \n**字符编码**将字符集中的每个数字标识符转换为另一个称为**字符代码**的数字。这样做是因为字符代码在计算机上存储更方便或更高效。因此，字符编码只是（字符，字符代码）对的集合。\n\
  \n现在，如果*不需要*进行转换——直接使用字符集的数字标识符——那么字符编码和字符集当然是相同的。ASCII 就是一个例子，它同时定义了字符编码和字符集。其他例子包括\
  \ Latin 1 和各种语言的 ISO 编码。\n\n回到 Unicode：其缺点在于，对于日常编程来说，它作为*字符编码*实际上毫无用处，因为现有的字符编码（尤其是\
  \ ASCII）根深蒂固。许多现有的程序或软件库只接受 ASCII 输入，无法使用 Unicode 的数字标识符。\n\n**UTF-8** *是一种针对 Unicode\
  \ 的*字符编码*，它解决了这个问题。UTF-8 将每个 Unicode 定义的数字标识符转换为可能占用一个或多个字节存储空间的字符代码。UTF-8 的绝妙之处在于，同时属于\
  \ Unicode 和 ASCII 的字符被赋予了相同的字符代码。*\n\n*这意味着你的“支持 UTF-8”的程序可以利用 Unicode，同时仍然可以与只接受\
  \ ASCII 的旧程序或库一起工作。当然，这并不能解决让旧程序接受 Unicode 的问题。关键在于，你*不会* *完全*失去与旧软件协作的能力。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C12.fm 第 145 页 2006 年 1 月 12 日，星期四，上午 11:04\n\n第 12 章 ■ 国际化\n\n**145**\n\
  \n这引出了两个问题。如果程序实际上并不使用 Unicode 定义的数字标识符，那么 Unicode 有什么用？为什么需要将 Unicode 与 UTF-8 分开？\n\
  \n\n\n要理解 Unicode 的优势，你必须认识到它是一个*被广泛接受的* *标准*，用于为*所有*字符分配唯一的数字标识符。因此，如果 Web 浏览器和服务器约定它们之间传输的文本数据代表\
  \ Unicode 字符，你就可以开发能够处理*任何*语言的 Web 应用。如果没有一个被广泛接受的标准来涵盖所有字符，这是不可能实现的。在 Unicode 出现之前，字符集要么未被广泛接受，要么没有包含所有字符。\n\
  \n要理解为什么 Unicode 必须与 UTF-8 分离，你必须明白它们各自不同的目标。Unicode 数字标识符代表一个字符，因此具有*含义*。而 UTF-8\
  \ 字符编码则关乎让现有程序能够正常工作。\n\n这些是不同的目标，最好用不同的方式来解决。\n\n例如，并非所有遗留软件都使用 ASCII（想想前苏联地区），因此将\
  \ UTF-8 字符编码硬编码到 Unicode 中（即让 Unicode 数字标识符等于 UTF-8 字符编码）对所有人来说并非都有利。此外，对于非拉丁语系语言，Unicode\
  \ 的其他编码在存储空间方面更高效。将 UTF-8 硬编码到 Unicode 中会迫使这些语言的使用者（想想中国）使用比必要更多的存储空间。这两个因素都会阻碍\
  \ Unicode 的广泛采用。\n\n因此，Unicode 与其任何编码（如 UTF-8）之间的分离，为用户带来了既能就数据含义达成一致*又能*灵活选择最符合其需求的字符编码的好处。\n\
  \n***那纯文本呢？**\n\n如果你所说的“纯文本”是指没有任何编码的文本数据，我希望通过前面的讨论你能意识到，世界上根本不存在所谓的“纯文本”！\n\n\
  任何文本数据都有一个隐含的字符编码。在西方世界，这可能是 ASCII。\n\n需要理解的重要一点是，你可以*假设*一种编码——大多数程序和软件都假设一种编码，比如\
  \ ASCII——或者你可以明确指定一种编码，就像 XML 或 HTML 文档的头部那样。然而，确保*声明的*编码与（由文本编辑器完成的）*实际*编码相匹配是另一个问题。\n\
  \n最后，就像 Java 整数的二进制值可以显示为字符串一样，Unicode 字符的数字标识符也可以显示为字符串。这些通常以 ASCII 编码显示为十六进制数，例如\n\
  \n\\u7528。这在一定程度上规避了在遗留软件中“使用”Unicode 的问题。\n\n你将在后面的章节（“本地化输出”）中了解更多相关内容。*不要*将 Unicode\
  \ 数字标识符的这种 ASCII 表示与 UTF-8 混淆。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C12.fm 第 146 页 2006 年 1 月 12 日，星期四，上午 11:04\n\n**146**\n\n第 12 章 ■ 国际化\n\
  \n**区域设置**\n\n在上一节中，我描述了如何使用 Unicode 和 UTF-8 编码使客户端-服务器程序能够以任何语言通信数据。\n\n然而，这还不够。还需要一种机制，让用户能够*选择*他们想要的语言。例如，如果你说中文，你可能希望我的\
  \ Web 应用以中文呈现给你。\n\n**区域设置**是实现这一目标的广泛使用的机制。区域设置是语言或语言变体的标识符。例如，美国英语的标识符是 en_US\n\
  \n而斯瓦希里语的标识符是 sw。\n\n区域设置字符串本身是语言代码和可能的国家/地区代码的组合。语言代码是来自 ISO 639 标准的两个字母的字符串。国家/地区代码（例如\
  \ en_US 中的 US）取自 ISO 3166 标准。请注意，两个字母的语言代码是小写的，两个字母的国家/地区代码是大写的，用下划线连接。\n\n本质上，Web\
  \ 浏览器在 HTTP 标头中指定所需的区域设置作为额外参数。如果可能，服务器会以该区域设置向该用户发送所有页面作为响应。\n\n区域设置是 Struts 中本地化的主要基础。Struts\
  \ 的所有国际化特性都旨在让你能够轻松地按区域设置自定义应用程序。\n\n你将在本章以及后续章节中看到它的实际应用。\n\n既然你已经了解了字符编码、Unicode、UTF-8\
  \ 和区域设置的基础知识，是时候继续解决在尝试本地化 Struts Web 应用时会遇到的三个主要关注领域了。\n\n**处理输入**\n\nWeb 浏览器可能会使用多种字符编码，具体取决于用户的默认区域设置或偏好。由于你要处理的输入数据来自\
  \ Web 浏览器，你的 Web 应用可能需要处理任意的字符编码。\n\n现在，你最不想做的事情就是接受和处理不同的字符编码。\n\n为什么不呢？假设你将来自不同编码的文本存储到数据库中。以后你怎么知道它们来自哪种编码？你必须将编码信息与你保存的每个文本数据一起存储。这可不妙。\n\
  \n显而易见的解决方案是使用一种能够处理*所有*语言的单一编码——比如 UTF-8。\n\n然而，这里你遇到了一个问题：你*无法*固定从用户 Web 浏览器接收到的字符编码。浏览器会以任何旧的字符编码提交表单数据，对此你无能为力。\n\
  \n■**注意** 根据 HTML 4.0 规范，Web 服务器可以在 HTTP 响应中设置 accept-charset 参数，\n\n但大多数浏览器会忽略此参数。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C12.fm 第 147 页 2006\
  \ 年 1 月 12 日，星期四，上午 11:04\n\n第 12 章 ■ 国际化\n\n**147**\n\n你可以做出的一个合理假设是，浏览器会使用它们从服务器接收到的相同编码进行响应。因此，如果你的\
  \ HTML 表单是 UTF-8 编码的，那么可以稳妥地假设响应也将是 UTF-8 编码。但这并不总是成立，因为 Web 浏览器为用户提供了更改默认编码的选项。\n\
  \n因此，这里有一个值得坚持的好规则。*在你的整个应用程序中，在每个 JSP、HTML、XML 页面等中，始终如一地使用单一的通用字符编码（如 UTF-8）。*\n\
  \n对于你的 JSP，你可以使用 <%@ page 声明：\n\n<%@ page contentType=\"text/html; **charset=UTF-8**\"\
  \ %> 或者你可以在你的 struts-config.xml 中使用 <controller> 标签（参见第 9 章）：\n\n<controller contentType=\"\
  text/html; **charset=UTF-8**\" /> 第二种方法意味着你无需在所有 JSP 中嵌入 <%@ page 声明。\n\n当然，如果你绕过\
  \ Struts 直接调用 JSP，这个技巧就不起作用了。如果你通过 JSP 的名称（例如 myPage.jsp）调用它，你就是在绕过 Struts。如果页面是通过\
  \ <forward> 或 .do 扩展名传递的，那么你就没有绕过 Struts，这个技巧就会生效。\n\n对于你的静态 HTML 页面，你可以使用 <meta>\
  \ 标签来指定编码：\n\n<head>\n\n<meta http-equiv=\"content-type\" content=\"text/html; charset=UTF-8\"\
  >\n\n</head>\n\n这里你必须小心谨慎，因为必须确保 HTML 文件的实际编码（由编写 HTML 的文本编辑器决定）与声明的编码（在 <meta>\
  \ 标签中声明）相同。如果一个表单声明是 UTF-8 编码但实际上却是另一种编码，你无法知道浏览器会以什么编码进行响应。\n\n**本地化验证**\n\n我所说的“本地化验证”是指执行特定于区域设置的验证。例如，如果一位德国用户（区域设置\
  \ de）输入了一个日期，你可能希望根据 dd.mm.yyyy 格式来验证输入。对于美国用户，你可能会使用不同的格式，可能是 mm/dd/yyyy。\n\n\n\
  \n目前，Struts 对实现这一功能的支持非常有限。在第 15 章介绍验证器框架时，你会看到 Struts 对本地化验证的*唯一*支持。\n\n公平地说，需要本地化验证的场景并不多。事实上，在很多情况下，这样做反而是错误的！例如，有些用户使用\
  \ en_US 语言环境，但实际并不居住在美国。因此，你无法可靠地通过语言环境来验证依赖于地理位置的字段，比如邮政编码（美国的 zip code）。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C12.fm 第 148 页 2006 年 1 月 12 日星期四 上午 11:04\n\n**148**\n\n第 12 章 ■ 国际化\n\
  \n然而，对于日期、货币值或数字这类内容，本地化验证*可能*是必要的。本节包含了我个人收集的一些技巧，希望对你有所帮助。\n\n第一个技巧是在你的 ActionForm\
  \ 子类中针对每个特殊语言环境进行测试（见清单 12-1）。\n\n**清单 12-1.** *暴力本地化验证* String locale = getLocale();\n\
  \nString date = getDate();\n\nboolean dateOK = false;\n\nif (\"de\".equals(locale))\
