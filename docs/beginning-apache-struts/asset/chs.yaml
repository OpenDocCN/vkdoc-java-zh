  \n如果页面上有多个 Tiles 组件会怎样？清单 14-20 中的强制转换 `LogonForm lForm = (LogonForm) form;` 会抛出异常吗？答案是不会，因为传递给\
  \ Tiles 控制器的 `ActionForm` 类型（更准确地说，是表单 bean）必须与 `struts-config.xml` 中声明的类型匹配。如果没有提交这样的表单\
  \ bean，则会创建一个空白的表单 bean 并传递给 Tiles 控制器。这意味着只要声明正确，强制转换将*始终有效*。\n\n这有一个有趣的推论：假设表单数据被发送到与表单\
  \ bean X 关联的表单处理器。那么，同一页面上所有也与此表单 bean X 关联的 Tiles 组件都将收到该表单数据的副本。\n\n例如，考虑以下一组表单处理器声明：\n\
  \n<action path=\"MyAction\" name=\"MyFormBean\" type=\"...\">\n\n<action path=\"\
  MyTileControllerA\" name=\"MyFormBean\" type=\"...\">\n\n<action path=\"MyTileControllerB\"\
  \ name=\"MyFormBean\" type=\"...\">\n\n<action path=\"MyTileControllerC\" name=\"\
  DifferentFormBean\" type=\"...\">\n\n以及以下 JSP 页面片段：\n\n<html:form action=\"/MyAction.do\"\
  >\n\n...\n\n</html:form>\n\n<tiles:insert definition=\".myTilesComponentA\"/>\n\n\
  <tiles:insert definition=\".myTilesComponentB\"/>\n\n<tiles:insert definition=\"\
  .myTilesComponentC\"/>\n\n当表单数据被提交时，它首先被存储在一个 `MyFormBean` 实例中，然后由与 `MyAction` 关联的\
  \ `Action` 子类处理。\n\n不太明显的是，`MyTileControllerA` 和 `MyTileControllerB` 上的 `execute()`\
  \ 函数会接收到 `MyFormBean` 的*独立副本*。`MyTilesControllerC` 的 `execute()` 函数会接收到一个新的 `DifferentFormBean`\
  \ 实例。\n\n您将在接下来的实验环节中使用这个技巧，让 Tiles 组件从外部表单接收数据。\n\n**实验 14：查找功能**\n\n我们希望向 `full.jsp`\
