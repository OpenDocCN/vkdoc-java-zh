  **281**\n\n**Struts 处理表单 Bean 的方式**\n\n当 Struts 首次加载时，会创建 `ActionServlet` 的单个实例，该实例负责处理\
  \ Struts 的所有后续初始化工作，包括读取 `struts-config.xml`。这个类是 Struts 内部的，但由于它在 `web.xml` 中声明，因此\
  \ Servlet 容器能够识别它。清单 19-3 展示了 `web.xml` 中的声明。你还可以看到，Struts 配置文件名 `struts-config.xml`\
  \ 作为初始化参数传递给了 `ActionServlet`。\n\n■**注意** 如果目前还不清楚，清单 19-3、19-4 和 19-5 均摘自 Apache\
  \ 软件基金会慷慨提供的代码。Apache 许可证可在 http://www.apache.org/licenses/LICENSE-2.0 获取。\n\n**清单\
