  \ 使用专门解决 JSF 缺陷的框架。Shale 就是这样一个框架。\n\n**值绑定与方法绑定**\n\nJSF 引入了两种非常强大的技术，称为*值绑定*和*方法绑定*。\n\
  \n你在 Struts 中已经有过一些值绑定的经验。还记得如何在 Struts 标签中从表单 Bean 读取和写入属性吗？例如，如果你希望一个 `<html:text>`\
  \ 将一个名为 `userId` 的属性保存到名为 `user` 的表单 Bean 中，你会这样做：\n\n<html:text property=\"userId\"\
  />\n\n其中 `user` 表单 Bean 是隐式的。这就是值绑定的含义。然而，JSF 的语法是不同的：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
