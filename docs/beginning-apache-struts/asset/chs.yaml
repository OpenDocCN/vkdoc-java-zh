  \ 10-10 的输出结果为：\n\ntrue false 1 0\n\nfalse false 2 2\n\nfalse true 3 4\n\n我们将要介绍的最后两个\
  \ JSTL 标签是用于条件处理的 `<c:if>` 和 `<c:choose>...<c:when>`。\n\n**<c:if> 和 <c:choose>...<c:when>\
  \ 标签**\n\n`<c:if>` 允许你在测试条件通过时处理单个代码块。该测试本身是一个由 `test` 属性引用的 EL 表达式，如清单 10-11 所示。\n\
  \n**清单 10-11.** *<c:if> 的实际应用*\n\n<c:if **test=\"${(empty user.userid || empty user.password)}\"\
  ** > 请输入您的用户 ID 和密码。\n\n</c:if>\n\n在清单 10-11 中，如果用户 ID 或密码为空，则会显示该消息。`<if>` 标签不支持\
  \ `else` 或 `if else` 块。如果你需要这些功能，则必须使用更笨拙的 `<choose> ... <when>` 标签（参见清单 10-12）。如果你使用过可扩展样式表语言（XSL），对此应该非常熟悉。\n\
  \n**清单 10-12.** *<c:choose>...<c:when> 的实际应用*\n\n<c:choose>\n\n<c:when test=\"${empty\
  \ user.userid}\">\n\n请输入您的用户 ID。\n\n</c:when>\n\n<c:when test=\"${empty user.password}\"\
  >\n\n请输入您的密码。\n\n</c:when>\n\n<c:when test=\"${not user.loggedIn}\">\n\n抱歉，无法为您登录。\n\
  \n</c:when>\n\n<c:otherwise>\n\n您已登录成功！\n\n</c:otherwise>\n\n</c:choose>\n\n在清单\
  \ 10-12 中，有两个 `when` 子句分别测试用户 ID 和密码是否为空，另一个测试用户是否已登录。最后的 `otherwise` 标签是一个兜底块。请注意，`otherwise`\
  \ 块是可选的。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C10.fm\
