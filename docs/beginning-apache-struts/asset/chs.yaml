  \n最明智的做法是增量迁移，并使用单元测试框架（参见“有用链接”）来测试更改。\n\n**本地化验证**\n\n\n\n在某些情况下，你可能需要本地化验证逻辑。这种情况很少见，而且在大多数你可能想要这样做的场景中（例如检查邮政编码），验证可能会产生误导。我在第\
  \ 12 章中讨论了本地化验证的陷阱，并为你提供了一些有用的技巧，以便在需要时实现这一点。\n\nValidator 框架确实提供了对本地化验证的支持，但解决方案并不理想。我必须赶紧补充一点，这并非一个重大缺陷，因为在决定本地化任何验证之前，你应该三思（甚至四思！）。\n\
  \n■**注意** 不要将本地化验证与本地化输出（例如错误消息）混淆。Validator 框架通过使用 `Application.properties` 中的键/值对，为本地化错误消息提供了良好的支持。\n\
  \n回想一下，`<formset>` 标签是一个容器标签，用于包含所有声明的验证。为了创建特定于某个区域设置的验证，你必须在包含 `<form-validation>`\
  \ 标签的根元素中放入一个新的 `<formset>`。\n\n这个新的 `<formset>` 标签将包含新区域设置的*所有*必要验证（关于区域设置的讨论，请参阅第\
  \ 12 章）。请注意“所有”一词的强调——你无法选择性地仅覆盖少数几个字段的验证；你必须在新 `<formset>` 中为*每个*字段再次指定验证。\n\n\
  `<formset>` 标签接受三个可选属性，可用于指定区域设置：\n\n• `language`：这是一个 ISO-639 语言标识符。例如，`en` 代表英语，`zh`\
  \ 代表中文。\n\n• `country`：这是一个 ISO-3166 国家标识符。例如，代码 `US` 指代美国。\n\n• `variant`：这是特定语言/国家组合的变体。用户通常无法在\
  \ Web 浏览器中设置此项。\n\n如果所有这些属性都未指定，则 `<formset>` 元素被视为默认元素。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
