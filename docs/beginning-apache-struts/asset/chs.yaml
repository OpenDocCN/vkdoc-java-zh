  \ `<logic:iterate>` 中 `var` 和 `items` 的对应项是什么吗？\n\n**答案**：`var` **暴露了可迭代对象中的单个元素，因此它在\
  \ `<logic:iterate>` 中的对应项是 `id`。而由于 `items` 指的是可迭代对象的名称，它在 `<logic:iterate>` 中的对应项是\
  \ `name`。**\n\n**现在你来操作**：为 `equal`、`present`、`empty`、`lessThan`、`lessEqual`、`greaterThan`\
  \ 和 `greaterEqual` 以及上述所有条件的否定形式（`notEqual`、`notPresent` 等）构建 JSTL 等价表达式。\n\n**答案**：以上所有内容都应能轻松构建。例如，`<logic:lessThan\
  \ name=\"myConstants\" property=\"pi\" value=\"3.14\">` 的 JSTL 测试应为：\n\n\n\ntest=\"\
  ${myConstants.pi < 3.14}\"\n\n其他标签的构造方式类似，但 `<logic:present>` 是个例外。该标签用于测试当前请求中是否存在某个项。有两种*不等价*的方式可以测试这一点。你可以使用\n\
  \ntest=\"${myVariable != null}\"\n\n来测试变量 myVariable 的引用是否存在。或者你也可以使用 test=\"${not\
  \ empty myVariable}\"\n\n后一种检查不仅会在 myVariable 不存在时返回 true，还会在 myVariable 存在但为空时返回\
  \ true，即它为零长度的字符串、空数组或空集合。\n\n另一个不太容易找到对应 JSTL 替换的 Struts 标签是\n\n<logic:messagesPresent>。该标签用于测试是否存在\
  \ Struts 消息。例如：\n\n<logic:messagesPresent property=\"emailMsg\">...\n\n检查是否存在名为\
  \ emailMsg 的消息。为了使用 JSTL 模拟此标签，我们必须知道 Struts 消息存储在请求对象的哪个位置。快速比较相关的 Struts 源代码文件（org.apache.struts.taglib.logic.\n\
  \nPresentTag、org.apache.struts.taglib.logic.MessagesPresentTag 和 org.apache.\n\n\
  struts.taglib.TagUtils）可以发现，这些测试本质上是相同的。因此，之前的两种解决方案也适用于 `<logic:messagesPresent>`。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048AppD.fm 第 475 页\
