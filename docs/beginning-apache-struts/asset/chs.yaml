  \n\n\n**在**上一章中，你学习了如何对用户输入进行简单的验证。在 Struts 框架（实际上，在任何合理的框架中）中，只有当所有简单验证都通过后，数据才能被系统处理。这种处理通常被称为“业务逻辑”，包含三大类任务：\n\
  \n• **复杂验证**：这些是需要进一步运行的验证，但与简单验证不同，它们不具有通用性。它们需要特定领域的处理，或与 Web 应用的模型组件进行通信。\n\n\
  • **数据转换**：这包括进行计算、保存数据以及准备输出数据。这是特定任务的核心部分。\n\n• **导航**：**这涉及在任务完成时决定接下来向用户显示哪个页面。**\n\
  \n**Struts 将这三项任务集中在一个名为 Action 的单一控制器类中。**\n\n**1,2,3 Action！**\n\n正如简单验证由你的 ActionForm\
  \ 子类执行一样，业务逻辑的处理则由你的\n\norg.apache.struts.action**.Action** 子类完成。\n\n在 MVC 范式中，你的\
  \ Action 子类是一个控制器（参见第 5 章，图 5-5），因为它通过定义良好的接口与 Web 应用的模型和视图组件进行通信。\n\n你的 Action\
  \ 子类所处理的输入数据是用户提交的表单数据。正如你在上一章中回忆的那样，用户提交的表单数据由 Struts 自动传输给你的 ActionForm 子类。这个\
  \ ActionForm 子类实例包含了你的 Action 子类的输入数据。ActionForm 子类是一个 JavaBean，这意味着它具有与 HTML 表单上每个属性相对应的\
  \ getXXX() 和 setXXX() 函数。你的 Action 子类可以使用这些 getXXX() 函数来读取表单数据。图 7-1 说明了这一数据流。\n\
  \n**图 7-1.** *从表单到 Action 的数据流*\n\n实际上，对于你定义的每个 Action 子类，你可以关联任意数量的 ActionForm\
  \ 子类，所有这些子类都是该 Action 子类的潜在输入。你将在第 9 章中了解这种关联是如何建立的。\n\n**Action 的无状态性**\n\n关于 Action，需要了解的一个非常重要的事情是它必须是无状态的。你绝不能在你的\
  \ Action 子类中存储数据。换句话说，你的 Action 子类绝不能有*实例变量*（函数内的变量是可以的）。清单 7-1 说明了你*绝不能*做的事情。\n\
  \n**清单 7-1.** *绝不要在 Action 子类中使用实例变量！*\n\npublic class MyBadAction extends Action{\n\
  \n**private String myBadVariable; // 绝对不要这样做！**\n\nprotected void myFunction(){\n\
  \nString s = null; //函数内的变量是可以的。\n\n...\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C07.fm Page 69 Tuesday, January 24, 2006 10:12 AM\n\n第 7 章 ■ 处理业务逻辑\n\
  \n**69**\n\n}\n\n...//Action 的其余部分\n\n}\n\nStruts 管理你的 Action 子类的创建，并且这些子类会被池化（重用）以高效地服务用户请求。因此，你不能使用实例变量。无法保证你在实例变量中存储的数据适用于给定的请求。\n\
  \n**子类化 Action**\n\n在你的 Action 子类中，你只需要重写一个方法，那就是 execute()（参见清单 7-2）。\n\n**清单 7-2.**\
  \ *execute() 函数*\n\npublic ActionForward execute(ActionMapping mapping,\n\nActionForm\
  \ form,\n\nHttpServletRequest request,\n\nHttpServletResponse response)\n\n■**注意**\
  \ 在旧版本的 Struts（1.0 及更早版本）中，execute() 被称为 perform()。\n\n在 ActionForm 上的 validate()\
  \ 方法通过后，Struts 会调用与该表单关联的 Action 上的 execute()。如你所见，有五个类在此函数中发挥作用：\n\n\n\n• ActionForward：表示要显示的“下一个”页面。这是\
  \ `execute()` 的返回值。\n\n• ActionMapping：表示此 Action 与其可能的“下一个”页面之间的关联。\n\n• ActionForm：包含输入表单数据。\n\
  \n• HttpServletRequest：包含请求范围和会话范围的数据。你也可以使用此类将会话数据放入其中。请注意，并非所有数据都来自提交的表单。其他数据可以放在表单的“action”URL\
