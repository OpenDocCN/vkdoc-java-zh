  \ Web 应用程序问题域中普遍存在的变量。\n\n很好的例子是*标识符*，例如产品代码、ISBN 号、IP 地址或邮政编码（在美国以外被称为“postal codes”）。虽然这些可以使用标准的掩码验证器进行验证，但这样做并不总是容易的，特别是如果你需要处理规则的例外情况（例如，邮政编码），或者变量可能随时间改变格式（例如，IP\
  \ 地址）。\n\n扩展验证器框架比实现 validate()函数要好得多，因为你显然想要*重用*这些验证。例如，邮政编码字段可能出现在多个表单中，或者存在于你可能创建的许多不同\
  \ Web 应用程序中。\n\n创建一个新的验证器很简单：\n\n**1.** 实现实际执行验证的 Java 处理程序类。\n\n**2.** 可选地创建用于表单验证的\
  \ JavaScript。本书不涉及此主题。\n\n**3.** 在 validator-rules.xml 中使用<validator>标签声明新的处理程序。\n\
  \n**实现 Java 处理程序**\n\n这是创建自定义验证器整个过程中最棘手的部分。大部分复杂性源于你必须处理嵌套和索引属性的可能性，并且你必须使用辅助类（Resources、GenericValidator\
  \ 等）来读取验证输入数据所需的信息，或者重用验证器框架中可用的验证。\n\n你的 Java 处理程序可以是*任何*Java 对象，只要满足以下条件：\n\n\
  • 它实现了 java.io.Serializable。\n\n• 执行自定义验证的函数具有公共访问权限。它还必须是一个返回布尔值的静态函数，如果验证失败则返回\
  \ false，否则返回 true。\n\n你可以随意命名这个函数。标准方法签名如清单 15-12 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
