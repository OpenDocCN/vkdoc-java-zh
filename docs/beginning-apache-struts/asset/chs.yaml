  **总结**\n\n• Tomcat 的`.\\webapps`目录是部署 Web 应用程序的位置。\n\n• Web 应用程序以 WAR 文件形式部署，WAR\
  \ 文件只是扩展名为`.war`的 JAR 文件。\n\n• WAR 文件包含一个`.\\WEB-INF`目录，其中包含用于配置 Tomcat 的`web.xml`文件。\n\
  \n• 你的 Java 类和第三方 JAR 文件分别放入`WEB-INF\\classes`和`WEB-INF\\lib`目录。\n\n• 两个非常重要的 Servlet\
