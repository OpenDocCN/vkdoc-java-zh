  scope=\"request\"\n\nvalidate=\"true\"\n\ninput=\"/full.jsp\">\n\n<forward name=\"\
  success\" path=\"/full.jsp\"/>\n\n</action>\n\n<action path=\"/ContactFormHandler_mnc\"\
  \n\ntype=\"net.thinksquared.lilldep.struts.ContactAction\"\n\nname=\"ContactFormBean\"\
  \n\nscope=\"request\"\n\nvalidate=\"true\"\n\ninput=\"/mnc.jsp\">\n\n<forward name=\"\
