  \nAction 是传入 HTTP 请求的内容与处理该请求应执行的相应业务逻辑之间的适配器。Struts 将为每个请求选择一个合适的 Action，创建一个实例（如有必要），并调用\
  \ execute() 函数。Action 必须以线程安全的方式编程，因为 Struts 会为多个并发请求共享同一个实例。这意味着你在设计时应牢记以下几点：\n\
  \n• 实例变量和静态变量*不得*用于存储与特定请求状态相关的信息。\n\n• 它们*可以*用于在同一个 Action 的多个请求之间共享全局资源。\n\n•\
  \ 如果其他资源（JavaBeans、会话变量等）需要保护，则*必须*对其进行同步访问。（但通常，资源类应设计为在必要时提供自身的保护。）\n\n**返回类型**\n\
  \n**函数**\n\n**说明**\n\nActionForward\n\nexecute(ActionMapping mapping,\n\n处理指定的 HTTP\
  \ 请求，并创建相应的 HTTP 响应（或转发到另一个将创建该响应的 Web 组件），同时提供处理业务逻辑抛出的异常的功能。\n\nActionForm form,\n\
