  \nDoray_6048C03.fm 第 17 页 2006 年 1 月 23 日星期一 上午 11:45\n\n第 3 章\n\n■ ■ ■\n\n理解作用域\n\
  \n**在**Servlet 术语中，变量的“作用域”指的是它在 Web 应用程序中的*生命周期*——即变量在用户与系统交互过程中存在的时间长短。变量的作用域还决定了它的*可见性*——谁可以读取和修改该变量。Web\
  \ 应用程序经常使用这一概念，因此你必须彻底熟悉它。本章将帮助你做到这一点。\n\nServlet 技术使用四种作用域。按生命周期递减顺序排列如下：\n\n•\
  \ **应用程序作用域**：应用程序作用域的变量对 Web 应用程序的*每个*页面*始终*可见。该变量对系统的*所有*用户可见，并跨多个用户会话存在。换句话说，不同用户可能在任何时间、从任何页面查看和修改同一个变量。\n\
  \n• **会话作用域**：会话作用域的变量仅存在于单个用户会话中，但对该会话中的每个页面可见。用户**不能**查看或修改彼此变量实例的值。\n\n• **请求作用域**：请求作用域的变量仅存在于单个请求中。这包括页面重定向。因此，如果第一个页面上的请求作用域变量`x\
  \ = 7`被重定向到第二个页面，那么第二个页面上`x = 7`。\n\n• **页面作用域**：页面作用域的变量仅存在于当前页面。这**不**包括重定向。因此，如果第一个页面上的页面作用域变量`x\
  \ = 8`被重定向到第二个页面，那么第二个页面上`x`未定义。\n\n■**注意** **重定向**发生在当你请求一个页面但实际得到另一个页面时。你请求的页面将你重定向到你实际获得的页面。你可以在\
  \ JSP 中使用`<jsp:forward>`标签实现这一点，你将在本章后面的实验 3 中看到它的实际应用。\n\n**17**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C03.fm 第 18 页 2006 年 1 月 23 日星期一 上午 11:45\n\n**18**\n\n第 3 章 ■ 理解作用域\n\
  \n**会话**和**请求**作用域是 Struts 中最重要的两个作用域。为了检验你是否真正理解了这些概念，请尝试以下实验。\n\n**实验 3：作用域测验**\n\
  \n考虑以下两个 JSP 页面（清单 3-1 和 3-2），并假设它们已加载到 Servlet 容器中。你的任务是预测当两个用户 Audrey 和 Brenda\
  \ 与系统交互时屏幕上的输出。\n\n**清单 3-1.** *First.jsp*\n\n<jsp:useBean id=\"myVariable\"\n\n\
  scope=\"application\" class=\"java.lang.StringBuffer\" />\n\n<%\n\nmyVariable.append(\"\
  1\");\n\n%>\n\n<jsp:forward page=\"Second.jsp\" />\n\n**清单 3-2.** **Second.jsp**\n\
  \n*<jsp:useBean id=\"myVariable\"\n\nscope=\"application\" class=\"java.lang.StringBuffer\"\
  \ />\n\n<%\n\nmyVariable.append(\"2\");\n\n%>\n\n<%= myVariable.toString() %>\n\n\
  `<jsp:useBean>`标签只是定义了一个具有给定作用域的新 JSP 变量。`<jsp:forward>`将用户重定向到给定页面。尝试回答以下问题：\n\n\
  • Audrey 是第一个查看 First.jsp 的人。**她会看到什么？**\n\n**• Brenda 随后从另一台机器查看 First.jsp。她看到了什么？**\n\
  \n**• 如果 Audrey 在 Brenda 之后*再次*查看 First.jsp，她会看到什么？**\n\n**• 如果 Brenda 现在直接加载 Second.jsp\
  \ 呢？**\n\n将你的答案与附录 D 中的答案进行比较。\n\n当你确定理解了应用程序作用域的工作原理后，考虑如果将 First.jsp 和 Second.jsp\
  \ 中的`scope`属性分别改为`session`、`request`和`page`会发生什么。在每种情况下，先检查你的答案，然后再继续下一个作用域。\n\n\
