  \n我希望你明白我们在这里做什么。我们想将查询保存到会话作用域中，以便能够在页面间查看 Find 结果。我们不能简单地保存 Scroller（并在每次需要时使用\
  \ `absolute()` 重置它），因为我们可能会更改 Contact 的详细信息，使其不再匹配查询。\n\n这一步中有几个微妙之处：\n\n• 注意，我们必须保存查询的克隆，而不是查询本身。这是因为\
  \ Struts 会重置查询对象本身的字段。这是 Struts 工作方式的一部分。因此，为了避免持有一个被清空的表单，我们必须克隆它。\n\n• 当 URL 中的\
  \ `command` 参数指向 Tiles Controller（即 FindAction）上不存在的函数时，会调用 `unknown()` 函数（你可以从\
  \ `TilesLookupDispatchAction` 中看到此行为）。在我们的例子中，当用户点击 Submit 而不是 Find 时，会调用 `unknown()`。\n\
