  \n**每**当需要为用户输入创建新表单时，通常都必须编写一个新的 ActionForm 子类。这很快就会变得繁琐，尤其是当您的表单包含许多 getter 和\
  \ setter 函数时。（希望您在实验 6 中已经体会到了这有多糟糕，当时您必须实现包含 14 个 getter 和 setter 的 ContactActionForm。）\n\
  \n在前面的章节中，我向您展示了如何通过重用表单（实验 9a）或使用嵌套属性（实验 10a）来避免在 ActionForm 子类中编写多余的 getter 和\
  \ setter 函数，从而稍微缓解这些问题。\n\n但这些方法只能帮您到这里。本章的主题——*动态表单*——是一种完全消除编写 Java 代码的方法。相反，您可以在\
  \ `struts-config.xml` 中为每个要创建的表单声明额外的 XML。涉及的 XML 是对您熟悉的常规 `<form-bean>` 声明的扩展：您需要为表单中的每个属性添加\
  \ `<form-property>` 标签。\n\n与生活中的其他事物一样，使用动态表单既有优点也有缺点。主要优点当然是您不必为表单声明 getter 和 setter。如果您的应用程序需要大量表单，这可能是一个相当大的优势。然而，正如您稍后将看到的，动态表单也有许多重要的缺点。\n\
  \n在本章末尾，我们还将介绍 Struts（自 Struts 1.2.6 起）的几个最新补充，它们将动态表单的理念发挥到了极致。使用 `LazyValidatorForm`，您甚至不必在表单中声明属性！\n\
  \n本章不会完全涵盖动态表单的所有内容。在第 19 章中，我将向您展示如何实现一个插件，为动态表单提供有趣的扩展。\n\n**声明动态表单**\n\n要创建动态表单，您只需在\
  \ `struts-config.xml` 文件中声明它即可。\n\n声明动态表单很简单：在表单的 `<form-bean>` 声明中，为表单上的每个属性添加额外的\
  \ `<form-property>` 标签。\n\n您可以通过这种方式声明*简单*、*索引*、*映射*或*嵌套*属性（参见第 10 章）。\n\n清单 16-1\
  \ 展示了如何声明一个包含简单（String）、索引（数组）和映射属性（使用 HashMap）的表单 Bean。\n\n**221**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
