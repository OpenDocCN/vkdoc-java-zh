  \nJSPIntro7.html\n\n• 因在 JSTL 中有对应功能而未启用 EL 的 Struts 标签列表：http://struts.apache.org/struts-doc-1.2.x/faqs/struts-el.html\
  \ **总结**\n\n• Logic 库包含用于迭代、条件处理和流程控制的标签。这些标签大多在 JSTL 中有对应功能。\n\n• Nested 标签库用于切换属性所引用的隐式基础对象。你可以使用嵌套属性来实现类似效果。\n\
  \n• JSTL 包含四个标签库（核心、格式化、XML 处理和数据库访问），你可以用它们替代部分 Struts 标签。\n\n• JSTL 核心标签库中的 `<c:forEach>`、`<c:if>`、`<c:choose>...<c:when>`\
  \ 和 `<c:out>` 标签可用于替换 Logic 标签库中的 Struts `<logic:iterate>` 和条件处理标签。\n\n• `<c:out>`\
  \ 可用于替换 `<bean:write>`，但需要 JSTL 格式化标签库中的辅助标签来完全替代 `<bean:write>`。\n\n• EL 是一种为启用\
  \ EL 的标签提供动态属性的方式。EL 有几个特殊关键字来帮助实现这一点。\n\n• 有一些启用 EL 的 Struts 标签，你可以与原始的 Struts\
  \ 标签一起使用。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00027.png)\n\
