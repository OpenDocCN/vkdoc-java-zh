  \ Tuesday, January 24, 2006 10:13 AM\n\n第 2 部分\n\n■ ■ ■\n\n高级 Struts\n\n*随着 Struts\
  \ 成为 Java 平台新开发者的常见起点，一个有趣的现象正在发生——对于许多开发者来说，使用 Struts 的关键感知价值被认为是用于 HTML 表单的 JSP\
  \ 自定义标签。虽然这些标签非常有用，但它们并不能构成一个健壮的用户界面组件模型，这导致了需要创建或集成第三方标签库来满足更复杂的展示需求。对我来说，核心价值始终在于控制器层——请求处理生命周期，以及该生命周期所启用的功能，例如用于可重用外观的\
  \ Tiles 框架，以及用于客户端和服务器端表单验证业务规则执行的 Validator 框架。*\n\n—Craig McClanahan\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C14.fm Page 160 Tuesday, January 24, 2006 10:13 AM\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C14.fm Page 161 Tuesday, January 24, 2006 10:13 AM\n\n第 14 章\n\n■ ■\
  \ ■\n\nTiles\n\n\n\n**T**iles 是一个 Struts *插件*——一款独立于 Struts 开发的软件，用于扩展 Struts 的基本功能。\n\
  \nTiles 最初由 Cedric Dumoulin 开发，但现在（自 1.2 版本起）已集成到 Struts 中。事实上，它取代了较早的“模板”库，该库仅提供有限的布局能力。唯一能暴露其先前独立存在痕迹的是，它作为一个插件，因此需要进行一些配置。\n\
  \nTiles 为 Struts 应用程序提供了两项新能力：\n\n• **布局**：能够轻松为 Struts 应用程序提供统一的“外观和感觉”。在大多数 Web\
  \ 应用程序中，页面遵循相似的*布局*——例如，它们可能具有共同的页眉、页脚或侧边栏。Tiles 拥有优雅的继承机制，使得创建和维护此类布局（即使是复杂的布局）变得容易。\n\
  \n• **组件**：能够构建可重用的 GUI 组件，并轻松嵌入到 JSP 页面中。组件为您提供了显示*动态内容*的灵活性——这些内容可以根据用户交互或外部数据源而变化。例如，显示各个城市的天气预报列表、用户感兴趣的新闻条目或定向营销内容。\n\
  \n简而言之，布局提供了共同的外观和感觉，而组件则允许以可重用的包形式提供动态内容。\n\nTiles 的强大之处在于，您可以混合使用这两项能力：您的布局可以包含组件。例如，您可以指定一个布局，将组件作为包含用户搜索列表的侧边栏显示。合理使用，这可以构建出易于使用的应用程序。在本章的实验部分，您将亲自创建这样一个组件。\n\
  \n当然，布局和组件行为也可以通过其他方式模拟。例如，您可以通过简单地在 JSP 页面中粘贴相应的 HTML 来强制实现统一的外观和感觉。您可以通过在 JSP\
  \ 中剪切和粘贴脚本片段来实现“组件”！\n\n**161**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C14.fm Page 162 Tuesday, January 24, 2006 10:13 AM\n\n**162**\n\n第 14\
  \ 章 ■ T I L E S\n\n如果您仔细阅读了第 5 章关于 MVC 的讨论，这些方法的缺点应该显而易见。MVC 的核心是根据功能分离代码，违反这一原则会导致后续维护的麻烦。这些临时方法也是如此。使用它们，对布局或组件进行全站范围的更改会很困难，因为您必须修改每个页面。\n\
  \n正如您将看到的，Tiles 做得更好——也更简单。\n\n**安装 Tiles**\n\n要使用 Tiles，您必须在 struts-config.xml\
  \ 中声明它。清单 14-1 显示了一个典型的声明。\n\n■**注意** 请记住，插件声明必须放在 struts-config.xml 文件的*最后*。将其放在任何其他位置都会导致\
  \ Struts 启动时抛出异常。\n\n**清单 14-1.** *在 struts-config.xml 中的 Tiles 声明*\n\n<plug-in\
  \ className=\"org.apache.struts.tiles.TilesPlugin\" >\n\n<set-property property=\"\
  definitions-config\"\n\nvalue=\"/WEB-INF/tiles-defs.xml\"/>\n\n</plug-in>\n\n清单\
  \ 14-1 中的声明做了两件事。首先，它告诉 Struts 要实例化哪个*插件类*。在本例中，是 org.apache.struts.tiles.TilesPlugin。这个插件类负责\
  \ Struts 的初始化。\n\n其次，<plug-in> 标签包含一个或多个 <set-property> 标签，每个标签向插件类传递一个参数-值对。在清单\
  \ 14-1 中，传递给 org.apache.struts.tiles.TilesPlugin 的唯一参数是 definitions-config 参数，它指向\
  \ Tiles 定义文件的相对位置。在本例中，是 /WEB-INF/tiles-defs.xml。\n\n这个 tiles-def.xml 文件（如果您愿意，可以将其命名为其他名称——只需更改\
  \ value 属性即可）是您为 Tiles 声明布局和组件的地方。您可以将其视为 struts-config.xml 的 Tiles 对应物。\n\n\n\n\
  ■**注意** Struts 发行版中包含一个 `tiles-documentation.war` 文件。该文件在 `/WEB-INF/` 文件夹下包含一个可用的示例\
  \ `tiles-def.xml` 文件。\n\n清单 14-2 展示了 `tiles-def.xml` 文件的格式。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C14.fm Page 163 Tuesday, January 24, 2006 10:13 AM\n\n第 14 章 ■ T I L\
  \ E S\n\n**163**\n\n**清单 14-2.** *一个空白的 Tiles 定义文件*\n\n```xml\n<?xml version=\"\
  1.0\" encoding=\"ISO-8859-1\" ?>\n\n<!DOCTYPE tiles-definitions PUBLIC\n\n\"-//Apache\
  \ Software Foundation//DTD Tiles Configuration 1.1//EN\"\n\n\"http://struts.apache.org/dtds/tiles-config_1_1.dtd\"\
  >\n\n<tiles-definitions>\n\n</tiles-definitions>\n```\n\n根标签是 `<tiles-definitions>`，它包含一个或多个\
  \ `<definition>` 标签，用于声明布局或组件。接下来的两节将展示如何操作。\n\n■**注意** Tiles DTD（文档类型定义）存储在 Struts\
  \ 发行版附带的 `struts.jar` 文件中。在该 JAR 文件中，DTD 的路径为 `/org/apache/struts/resources/tiles-config_1_1.dtd`。此文件还包含清单\
  \ 14-2 中使用的 `DOCTYPE` 元素。该 DTD 也存在于 Struts 发行版 zip 文件的 `/lib` 文件夹中。\n\n你可以将 Tiles\
  \ 定义拆分成多个文件。这对于需要多组外观或需要单独维护组件的大型项目非常有用。每个这样的 Tiles 定义文件都必须遵循清单 14-2 的格式，并且你需要在插件声明中声明每个文件。只需在\
  \ `<set-property>` 标签中用逗号分隔文件名即可。例如，如果你有三个 Tiles 定义文件：`A.xml`、`B.xml` 和 `C.xml`，那么\
  \ `<set-property>` 标签应写为：\n\n```xml\n<set-property property=\"definitions-config\"\
  \n              value=\"/WEB-INF/A.xml,/WEB-INF/B.xml,/WEB-INF/C.xml\"/>\n```\n\n\
  最后，Tiles 还使用一个自定义标签库 `struts-tiles.tld`。你需要在 `web.xml` 文件中声明它（参见第 3 章），以便在你的 JSP\
  \ 中使用该标签库。\n\n**用于布局的 Tiles**\n\n布局是为你的 Web 应用程序创建统一外观的一种方式。例如，你可能希望所有 JSP 页面都包含一个包含版权信息的页脚、一个侧边导航栏以及一个带有公司徽标的页眉。\n\
  \n在 Tiles 中，布局就是 JSP 页面。布局的 JSP 页面定义了各个部分（正文、页眉、页脚、侧边栏等）在显示页面上的相对位置。每个部分的内容由指向其他包含内容的\
  \ HTML 或 JSP 页面的 `<tiles:insert>` 标签定义。清单 14-3 是一个包含标题、页眉、正文和页脚部分的简单布局。\n\n**清单\
  \ 14-3.** *simple-layout.jsp，一个包含标题、页眉、正文和页脚的简单布局*\n\n```jsp\n<%@ taglib uri=\"\
  /tags/struts-tiles\" prefix=\"tiles\" %>\n<html>\n<head>\n<title>**<tiles:getAsString\
  \ name=\"title\"/>**</title>\n</head>\n<body>\n<table>\n<tr><td>**<tiles:insert\
  \ attribute=\"header\"/>**</td></tr>\n<tr><td>**<tiles:insert attribute=\"body\"\
  />**</td></tr>\n<tr><td>**<tiles:insert attribute=\"footer\"/>**</td></tr>\n</table>\n\
  </body>\n</html>\n```\n\n如清单 14-3 所示，布局仅定义了内容的*相对位置*，而非实际内容本身。图 14-1 展示了布局中各个组件的相对位置。\n\
  \n**图 14-1.** *simple-layout.jsp 中页眉、正文和页脚的相对位置*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C14.fm Page 165 Tuesday, January 24, 2006 10:13 AM\n\n第 14 章 ■ T I L\
  \ E S\n\n**165**\n\n`<tiles:getAsString>` 标签显示标题的内容，而 `<tiles:insert>` 标签则显示与 `attribute`\
  \ 或 `name` 属性对应的内容。这些属性指向的实际内容可以在被调用的 JSP 或 Tiles 定义文件中定义。\n\n例如，假设 `myPage.jsp`\
  \ 想要使用清单 14-3 中的布局（`simple-layout.jsp`）。清单 14-4 展示了 `myPage.jsp` 可能的内容。\n\n**清单\
  \ 14-4.** *myPage.jsp，它使用了 simple-layout.jsp*\n\n```jsp\n<%@ taglib uri=\"/tags/struts-tiles\"\
  \ prefix=\"tiles\" %>\n<tiles:insert page=\"/layouts/simple-layout.jsp\">\n  <tiles:put\
  \ name=\"title\" value=\"A simple page\" />\n  <tiles:put name=\"header\" value=\"\
  /common/header.jsp\" />\n  <tiles:put name=\"footer\" value=\"/common/footer.jsp\"\
  \ />\n  <tiles:put name=\"body\" value=\"/mypage-content.jsp\" />\n</tiles:insert>\n\
  ```\n\n`myPage.jsp` 所做的只是（使用 `<tiles:put>` 嵌套标签）指定*哪些*文件与页眉、页脚和正文属性相关联。标题被指定为一个字符串，在此例中为\
  \ \"A simple page\"。\n\n请注意清单 14-3 和 14-4 中 `<tiles:insert>` 用法的区别：\n\n*   在布局 JSP（清单\
  \ 14-3）中，使用 `attribute` 属性来告诉 Struts 它应该使用什么内容来替换外层的 `<tiles:insert>` 标签。例如，当 Struts\
  \ 处理清单 14-3 中的 `<tiles:insert attribute=\"header\"/>` 时，它本质上是在请求对象上查找 `header` 的值。然后它使用这个值（一个\
  \ JSP 页面，或者如我们将在下一节中看到的，一个组件）并将该页面或组件的内容粘贴到 `<tiles:insert>` 标签的位置。\n*   在被调用的 JSP（清单\
  \ 14-4）中，使用 `page` 属性来指定一个布局，并且该布局的输出用于替换 `<tiles:insert>` 标签。嵌套的 `<tiles:put>`\
  \ 标签在请求对象上定义 Tiles 属性。布局读取这些属性以创建其输出。例如，当 Struts 处理清单 14-4 中的 `<tiles:insert>` 时，它知道必须使用布局文件\
  \ `/layouts/simple-layout.jsp`。在这个布局文件中，有几个 `<tiles:insert>` 标签需要创建 `header`、`footer`\
  \ 和 `body` 属性。每个属性的值都在调用 JSP 中使用 `<tiles:put>` 标签定义。\n\n需要注意的是，使用 `<tiles:put>`\
  \ 标签定义的属性仅适用于外层 `<tiles:insert page=\"...\">` 标签中定义的布局。在极少数情况下，如果你的被调用 JSP 页面中有两个\
  \ `<tiles:insert page=\"...\">` 标签，则必须分别为每个标签指定属性。这两个标签之间的属性是不共享的。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C14.fm Page 166 Tuesday, January 24, 2006 10:13 AM\n\n**166**\n\n第 14\
  \ 章 ■ T I L E S\n\n■**注意** `<tiles:insert>` 标签的 `page`、`template` 和 `component`\
  \ 属性是同义词。你可以使用不同的同义词来指示使用的是布局还是 Tiles 组件（参见下一节）。这仅仅是为了提高可读性。\n\n指定 `attribute` 或\
  \ `name` 属性值的另一种方法是在 Tiles 定义文件中创建一个定义。例如，你可以将清单 14-4 的一部分移到 Tiles 定义文件中，如清单 14-5\
  \ 所示。\n\n**清单 14-5.** *tiles-def.xml，包含一个单一的定义*\n\n```xml\n<?xml version=\"1.0\"\
  \ encoding=\"ISO-8859-1\" ?>\n\n<!DOCTYPE tiles-definitions PUBLIC\n\n\"-//Apache\
  \ Software Foundation//DTD Tiles Configuration 1.1//EN\"\n\n\"http://struts.apache.org/dtds/tiles-config_1_1.dtd\"\
  >\n\n<tiles-definitions>\n\n  <definition name=\".simple\" path=\"/layouts/simple-layout.jsp\"\
  >\n    <tiles:put name=\"header\" value=\"/common/header.jsp\" />\n    <tiles:put\
  \ name=\"footer\" value=\"/common/footer.jsp\" />\n  </definition>\n\n</tiles-definitions>\n\
  ```\n\n清单 14-5 展示了一个名为 `.simple` 的 Tiles 定义文件（前导点的含义稍后会变得明显）。这个定义只定义了两个属性：`header`\
  \ 和 `footer`。\n\n要在 JSP 中使用 `.simple` 定义，请参见清单 14-6。\n\n**清单 14-6.** *myPage2.jsp，它使用了\
  \ Tiles 定义*\n\n```jsp\n<%@ taglib uri=\"/tags/struts-tiles\" prefix=\"tiles\" %>\n\
  <tiles:insert **definition=\".simple\"** >\n  <tiles:put name=\"title\" value=\"\
  A simple page\" />\n  <tiles:put name=\"body\" value=\"/mypage-content.jsp\" />\n\
  </tiles:insert>\n```\n\n\n\n清单 14-5 和 14-6 共同展示了如何使用 Tiles 定义替代布局路径。共享属性是在 Tiles\
  \ 定义文件中定义的，而特定于被调用 JSP 页面的属性则在该页面中定义。这样做是合理的，因为您可能希望固定页眉和页脚，但更改显示页面的标题和正文。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C14.fm 第 167 页 2006 年 1 月 24 日星期二 上午 10:13\n\n第 14 章 ■ TILES\n\n**167**\n\
  \n**快速测验**\n\n这种方法（清单 14-5 和 14-6）相比之前的方法（清单 14-4）有什么优势？\n\nTiles 布局定义甚至可以“被子类化”。例如，假设我们想要一个与旧定义（清单\
  \ 14-5）相似的新定义，但标题是固定的，并且页脚被更改。清单 14-7 显示了修改后的定义文件。\n\n**清单 14-7.** *包含新定义的 tiles-def.xml*\n\
  \n<?xml version=\"1.0\" encoding=\"ISO-8859-1\" ?>\n\n<!DOCTYPE tiles-definitions\
  \ PUBLIC\n\n\"-//Apache Software Foundation//DTD Tiles Configuration 1.1//EN\"\n\
  \n\"http://struts.apache.org/dtds/tiles-config_1_1.dtd\">\n\n<tiles-definitions>\n\
  \n<definition name=\".simple\" path=\"/layouts/simple-layout.jsp\">\n\n<tiles:put\
  \ name=\"header\" value=\"/common/header.jsp\" />\n\n<tiles:put name=\"footer\"\
  \ value=\"/common/footer.jsp\" />\n\n</definition>\n\n<definition name=\".simple.admin\"\
  \ extends=\".simple\" >\n\n<tiles:put name=\"title\" value=\"Admin Zone\" />\n\n\
  <tiles:put name=\"footer\" value=\"/common/admin-footer.jsp\" />\n\n</definition>\n\
  \n</tiles-definitions>\n\n`extends`属性表示名为`.simple.admin`的新定义从基础定义`.simple`中借用了所有属性和特性。\n\
  \n■**注意** 这就是使用`.`分隔符的原因——您可以立即看出`.simple`没有祖先定义，而`.simple.admin`直接继承自`.simple`。\n\
  \n嵌套的`<tiles:put>`标签要么覆盖某些属性（如`footer`），要么添加新属性（如`title`）。新定义的使用方式与旧定义完全相同。\n\n\
  定义和使用布局的最后一种方式是在 Tiles 定义文件中*完全*定义它们。接续清单 14-7：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C14.fm 第 168 页 2006 年 1 月 24 日星期二 上午 10:13\n\n**168**\n\n第 14 章 ■ TILES\n\
  \n<definition name=\".simple.admin.main\" extends=\".simple.admin\" >\n\n<tiles:put\
  \ name=\"body\" value=\"/admin/body.jsp\" />\n\n</definition>\n\n在这种情况下，您不需要一个 JSP\
  \ 页面来嵌入定义，因为这个新定义定义了显示布局所需的所有属性。您可以通过在`struts-config.xml`中的`<forward>`调用它来使用此定义：\n\
  \n<forward name=\"success\" path=\".simple.admin.main\" />\n\n或者作为输入页面，如下所示：\n\n\
  <action path=\"/MyFormHandler\" input=\".simple.admin.main\" ...\n\n**在布局中使用样式表**\n\
  \n大多数专业的 Web 应用程序使用层叠样式表（CSS）来实现统一的字体和颜色。当您尝试在 Tiles 布局中使用样式表时，可能会遇到问题。例如，假设您的样式表是`\\\
  styles\\styles.css`，并且您的布局引用了此样式表，如清单 14-8 所示。\n\n**清单 14-8.** *包含静态样式表引用的 simple-layout.jsp\
  \ 片段*\n\n<%@ taglib uri=\"/tags/struts-tiles\" prefix=\"tiles\" %>\n\n<html>\n\n\
  <head>\n\n<style type=\"text/css\" media=\"screen\">\n\n@import **\"./styles/styles.css\"\
  ** ;\n\n</style>\n\n<title> <tiles:getAsString name=\"title\"/> </title>\n\n</head>\n\
  \n...\n\n如果所有使用此布局的 JSP 文件都位于 Web 应用程序的根文件夹中，那么此样式表声明是可行的。但对于较大的应用程序，这可能不可行。例如，您可能希望将“admin”页面放在单独的`\\\
  admin\\`子文件夹中。这样做意味着对样式表的引用现在变成了`../styles/styles.css`（注意前面的`..`）。清单 14-8 中的静态样式表引用将无法工作。\n\
  \n一个有用的技巧是使用`request`对象上的`getContextPath()`函数来绕过此限制。清单 14-8 中的样式表声明现在变为：\n\n\n\n\
  <style type=\"text/css\" media=\"screen\">\n\n@import \" **<%= request.getContextPath()\
  \ %>** /styles/styles.css\";\n\n</style>\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C14.fm 第 169 页 2006 年 1 月 24 日星期二 上午 10:13\n\n第 14 章 ■ 磁贴\n\n**169**\n\
  \n每次使用布局时，都会计算出样式表的正确路径。一种较差的实现方式是硬编码完整的 URL：\n\n<style type=\"text/css\" media=\"\
  screen\">\n\n@import \" **http://www.mycompany.com/myapp/**styles/styles.css\";\n\
  \n</style>\n\n这种方法效果较差，因为服务器使用的端口或应用程序名称可能在部署时发生变化。无论哪种情况，硬编码的解决方案都无法生效。\n\n**磁贴组件**\n\
  \n在前面的章节中，你已经了解了如何使用磁贴开发布局。接下来，我们将探讨磁贴的一种截然不同的用途：构建组件。\n\n在磁贴中，*组件*是显示在用户 Web 浏览器内的矩形区域（这也是“磁贴”名称的由来），能够渲染*动态*内容。例如，显示选定股票价格的组件、广告组件、用户搜索列表组件，或用户访问过的页面列表组件……可能性是无限的！\n\
  \n关于磁贴组件，有两点需要注意：\n\n• **易于嵌入**：使用方便的`<tiles:insert>`标签，可以将磁贴组件嵌入到任何 JSP 页面中。想要在你的\
  \ JSP 页面上添加一个天气预报磁贴组件？只需插入一个带有正确属性的`<tiles:insert>`标签即可。\n\n• **独立性**：为了发挥作用，磁贴组件应独立于其环境（即嵌入它的\
  \ JSP 页面）运行。*有时可以打破这一规则（正如你将在本章实验部分看到的那样），但这总是以牺牲可重用性为代价的。*\n\n***创建磁贴组件**\n\n与创建和声明磁贴布局相比，创建磁贴组件涉及更多步骤。共需五个步骤：\n\
  \n**1\\. 创建磁贴*控制器***。这是一个用于创建动态内容或处理用户输入的 Java 类。\n\n**2\\. 在 struts-config.xml\
  \ 中声明磁贴控制器**。\n\n**3\\. 创建磁贴“视图”。** 这是显示磁贴控制器输出结果的 JSP 页面。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C14.fm 第 170 页 2006 年 1 月 24 日星期二 上午 10:13\n\n**170**\n\n第 14 章 ■ 磁贴\n\
  \n**4\\. 声明一个磁贴** `<definition>`，将 JSP 页面与控制器关联起来。\n\n一个控制器可以在多个定义中使用。这完全类似于一个 Action\
  \ 子类可以在多个表单处理器中使用。\n\n**5\\. 在 JSP 页面中使用组件**，方法是在页面中嵌入`<tiles:insert>`标签。\n\n要创建磁贴控制器，你需要继承\
  \ TilesAction 基类：org.apache.struts. **tiles**.action**s**.TilesAction\n\n注意，这里是\
  \ tiles.actions（复数形式）。接下来我将更详细地描述这五个步骤，然后以一个具体的示例应用程序作为总结。\n\n步骤 1：创建磁贴控制器\n\n你需要重写的函数名为\
  \ execute()（意料之中！），但其签名与 Action.execute()略有不同，如清单 14-9 所示。\n\n**清单 14-9.** *TilesAction\
  \ 上的 execute()*\n\npublic ActionForward execute(**ComponentContext context**, ActionMapping\
  \ mapping,\n\nActionForm form,\n\nHttpServletRequest request,\n\nHttpServletResponse\
  \ response)\n\n**throws IOException, ServletException**{ ...\n\n你只需重写这一个函数来处理用户输入或准备输出数据。\n\
  \n在 execute()中传入的 org.apache.struts.tiles.ComponentContext 实例，充当了为磁贴组件准备数据的存储区域。你可以通过该类的\
  \ putAttribute()和 getAttribute()方法存储和检索数据。只有 ActionForward 返回值所代表的 JSP 页面才能直接访问放置在此\
  \ ComponentContext 实例上的数据。这有助于保持磁贴组件相对于其环境的独立性。\n\n\n\n总而言之，`ComponentContext` 的主要用途是作为从\
  \ Tiles 控制器到其转发到的 JSP 页面之间的通信渠道。\n\n这与 `HttpServletRequest` 作为 `Action` 子类与转发的 JSP\
  \ 之间通信方式类似。Tile 控制器也可以将数据放入 `HttpServletRequest` 对象，但这会破坏该 Tiles 组件的独立性，因为页面上的其他\
  \ Tiles 组件可能会覆盖放入请求对象中的数据。\n\n最后需要注意的一点是，此 `execute()` 方法被标记为会抛出 `IOException` 和\
  \ `javax.servlet.ServletException`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C14.fm 第 171 页 2006 年 1 月 24 日，星期二，上午 10:13\n\n第 14 章 ■ T I L E S\n\n\
  **171**\n\n第二步：声明控制器\n\nTiles 控制器的声明与任何表单处理器的声明完全相同。例如，清单 14-10 展示了一个不接受任何输入数据，并且有两个可能视图的简单控制器。\n\
  \n**清单 14-10.** *一个控制器，两个视图*\n\n<action path=\"/MyTilesController\"\n\ntype=\"com.mycompany.myapp.tiles.MyTilesController\"\
  >\n\n<forward name=\"success\" path=\"/tiles/my-tiles-view.jsp\"/>\n\n<forward name=\"\
  failure\" path=\"/tiles/error.jsp\"/>\n\n</action>\n\n或许唯一的区别在于，当声明一个 Tiles 控制器时，如果该\
  \ Tiles 组件只关联了一个 JSP 视图，那么*可以*省略声明任何 `<forward>`。清单 14-11 展示了一个示例。\n\n**清单 14-11.**\
  \ *一个控制器，一个视图*\n\n<action path=\"/MyTilesController\"\n\ntype=\"com.mycompany.myapp.tiles.MyTilesController\"\
  \ /> 在这种情况下，控制器的 `execute()` 函数（清单 14-9）返回 `null`，并且与此组件关联的 Tiles `<definition>`\
  \ 与清单 14-10 中 Tiles 组件关联多个 JSP 视图的情况略有不同。\n\n我稍后将描述这个区别。\n\n第三步：创建 Tiles 视图\n\n\
  Tiles 视图就是显示 Tiles 控制器输出的 JSP。这类似于与 `Action` 子类关联的“下一个”JSP 页面。\n\n当然，主要区别在于 JSP\
  \ 页面通常会被解析为 HTML 片段，而不是完整的 HTML 页面。这是因为 JSP 页面的输出将被嵌入到一个完整的 HTML 页面中。\n\n第四步：声明\
  \ Tiles `<definition>`\n\nTiles `<definition>` 使得控制器能够在 `<tiles:insert>` 标签中被*方便地*使用。可以直接在\
  \ `<tiles:insert>` 中使用已在 `struts-config.xml` 中声明的 Tiles 控制器，就像在清单 14-4 中直接使用布局一样。例如：\n\
  \n<tiles:insert path=\"/MyTilesController.do\"/> 使用 Tiles 定义的好处是，你可以避免在所有 JSP 中硬编码处理器的路径。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C14.fm 第 172 页 2006\
  \ 年 1 月 24 日，星期二，上午 10:13\n\n**172**\n\n第 14 章 ■ T I L E S\n\n声明的定义将取决于该组件是仅使用单个视图页面（如清单\
  \ 14-11 所示）还是多个视图（清单 14-10）。\n\n在典型的单视图情况下，定义如清单 14-12 所示进行声明。\n\n**清单 14-12.**\
  \ *具有单个视图的 Tiles 组件*\n\n<definition name=\".myTile\"\n\npath=\"/tiles/my-tiles-view.jsp\"\
  \n\ncontrollerUrl=\"/MyTilesController.do\">\n\n<put name=\"title\" value=\"This\
  \ is My Tile\"/>\n\n</definition>\n\n按此方式声明后，控制器 `execute()` 的返回值应为 `null`，并且 `path`\
  \ 属性中的 JSP 页面将用作视图。`controllerUrl` 属性用于指定在 `struts-config.xml` 中声明的 Tiles 处理器。你可以定义供视图使用的属性（在清单\
  \ 14-12 中，定义了 `title` 属性）。\n\n如果组件有多个视图，则它们必须全部在 `struts-config.xml` 中声明为 `<forward>`，如清单\
  \ 14-10 所示。在这种情况下，Tiles `<definition>` 更简单，如清单 14-13 所示。\n\n**清单 14-13.** *具有多个视图的\
  \ Tiles 组件*\n\n<definition name=\".myTile\"\n\n\n\npath=\"/MyTilesController.do\"\
  >\n\n<put name=\"title\" value=\"这是我的 Tile\"/>\n\n</definition>\n\n请注意，path 现在指向在\
  \ struts-config.xml 中声明的 Tiles 控制器。\n\n同样，你可以使用嵌套的 `<put>` 标签来定义任意一个视图所需的属性。\n\n\
  **第 5 步：使用组件**\n\n正如我在本节引言中所说，使用 tile 非常简单。你只需在 JSP 中声明使用 Tiles 标签库：\n\n<%@ taglib\
  \ uri=\"/tags/struts-tiles\" prefix=\"tiles\" %>\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C14.fm Page 173 Tuesday, January 24, 2006 10:13 AM\n\n第 14 章 ■ TILES\n\
  \n**173**\n\n然后在 JSP 页面的任意位置使用 `<tiles:insert definition=\"...\">`。例如，要使用清单 14-12\
  \ 或清单 14-13 中声明的 Tiles 组件，请使用以下代码：\n\n<tiles:insert definition=\".myTile\"/>\n\n\
  你还可以通过嵌套的 `<tiles:put>` 标签为视图页面指定更多属性，如清单 14-6 所示。\n\n**示例：“登录”Tiles**\n\nTiles\
  \ 组件非常有用。如果使用得当，它们可以极大地简化你的代码和代码维护。\n\n到目前为止，我们的讨论有点抽象，这也很合理，因为创建和使用 Tiles 组件有多种方式，我希望你能对整个事情有一个全局的概览。\n\
  \n在本节中，我将介绍如何将我们的老朋友——Registration Web 应用——制作成一个 Tiles 组件。为什么要这样做？因为它让你可以自由地将用户登录功能放置在你的\
  \ Web 应用的任何位置。如果用户需要在你的 Web 应用的多个地方登录，那么为用户登录创建一个 Tiles 组件将是一个自然的选择。\n\n我实际要实现的，是\
  \ Registration Web 应用的一个非平凡变体。\n\n图 14-2 描述了这个增强版新应用的控制流程，或许将其命名为“登录”Tiles 组件更为恰当。\n\
