  \ 5-3.** *向用户发送错误信号*\n\n讨论\n\n你需要一个控制器来决定出现错误时该怎么做：是显示错误页面还是保存数据？\n\n你还需要一个视图来显示错误消息。这正是强制严格\
  \ MVC 分离导致问题复杂化的地方。例如，是否需要从需求 1 中复制视图代码来重新显示表单数据？如何重新填充之前输入的表单数据？在图 5-3 中，用户 ID\
  \ 字段并非空白——它包含了之前输入的用户 ID。\n\n实际上，如果我们抛弃 MVC 并将控制器和视图代码混合在一起，就可以处理需求 2 中的错误，正如我在需求\
  \ 2 的讨论中所述。尽管这仍然无法解决需求 3 中出现的相同显示问题，但我们可以通过将模型和控制器代码与视图代码合并（例如在 JSP 视图代码中嵌入脚本）来拼凑出一个解决方案。\n\
