  **150**\n\n第 12 章 ■ 国际化\n\n**本地化输出**\n\n本地化输出是 Struts 非常擅长的事情。如果你一直注意使用\n\n\n\n\
  在应用程序的 JSP 页面中（而非使用静态文本）统一使用 `<bean:message>` 标签后，通过 Struts 实现应用程序输出的本地化就变得非常简单。\n\
  \n由于应用程序的所有文本都存储在 `Application.properties` 文件中，因此要支持新语言，只需执行以下步骤：\n\n• **翻译** `Application.properties`\
  \ 文件至新语言环境的语言。翻译时需保持键（key）不变，仅修改消息内容。如果翻译人员使用了 ASCII 以外的字符编码，则在使用前必须对翻译后的文件进行后处理。稍后将详细说明这一点。\n\
  \n• **将语言环境标识符**追加到翻译后的文件名中。例如，日语翻译必须命名为 `Application_jp.properties`。附加的 `_jp` 标识表明此翻译属于日语语言环境。\n\
  \n• **安装**新的属性文件到默认 `Application.properties` 文件所在的*同一文件夹*中（参见图 12-1）。\n\n仅此而已！当用户的浏览器设置为所需语言环境（例如\
  \ jp）时，Struts 将使用正确的属性文件（本例中为 `Application_jp.properties`）为该用户提供服务。所有提示、按钮、对话框和文本都将以日语显示。\n\
  \n**图 12-1.** *已安装的各种 Application.properties 文件*\n\n■**注意** 如果您正在为美国英语（关联语言环境为 en_US）编写应用程序，则属性文件应命名为\
  \ `Application_en_US.properties`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C12.fm 第 151 页 2006 年 1 月 12 日 星期四 上午 11:04\n\n第 12 章 ■ 国际化\n\n**151**\n\
  \n在我展示如何做出此选择之前，让我们先解决一个遗留问题——翻译后的 `Application.properties` 文件的字符编码。\n\n**处理翻译后的\
  \ Application.properties 文件**\n\nJava 编程语言仅接受 ISO 8859-1 字符编码的源代码和属性文件。这里我指的是实际的源代码——而非\
  \ Java 字符串的内部表示，后者不受此编码限制。\n\nISO 8859-1（又称 Latin 1）可以编码大多数西欧语言，并且在大多数用途上与 ASCII\
  \ 类似。更准确地说，同时存在于 ASCII 和 ISO 8859-1 中的字符具有相同的字符代码。\n\n您的 `Application.properties`\
  \ 文件也必须采用此编码。我们如何用这种受限的编码来表示其他语言呢？答案是使用一个名为 `native2ascii` 的工具。该程序位于 JDK 的 `bin`\
  \ 目录中。\n\n当您收到翻译后的 `Application.properties` 文件时，它很可能不是 ASCII 或 ISO 8859-1 编码。获取此信息的唯一可靠途径是询问翻译人员。一旦您知道了源编码，就可以使用\
  \ `native2ascii`：\n`native2ascii -encoding UTF-8 jp.properties Application_jp.properties`\n\
  在此示例中，翻译后的文件是 `jp.properties`，它采用 UTF-8 编码。最终输出是 `Application_jp.properties`，您可以直接使用。\n\
  \n`native2ascii` 背后的“魔法”在于，它会用其字符串的 Unicode 版本“转义”非 ISO 8859-1 字符。这在您的属性文件中显示为 `\\\
  uxxxx` 序列。\n\n当 Struts 创建要传递给用户的 HTML 页面时，会使用页面中通过 `<%@ page ...` 指令指定的编码：\n`<%@\
  \ page contentType=\"text/html; **charset=UTF-8**\" %>`\n或者，您可以在 `struts-config.xml`\
  \ 中使用 `<controller>` 标签（参见第 9 章）：\n`<controller contentType=\"text/html; **charset=UTF-8**\"\
  \ />`\n在这两种情况下，都会使用 UTF-8 字符编码来编码传递给用户的 HTML 页面。\n\n**从浏览器中选择语言环境**\n\n大多数现代浏览器允许用户选择默认语言环境。图\
  \ 12-2 和 12-3 分别展示了 Mozilla 和 Internet Explorer 中的设置。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
