  \ 17-14，它是为 LILLDEP 的 Full 和 MNC 页面声明的 <action> 的一个变体。\n\n**清单 17-14.** *LILLDEP\
  \ 中 Full 和 MCN 页面处理程序声明的变体*\n\n<action path=\"/ContactFormHandler_full\"\n\ntype=\"\
