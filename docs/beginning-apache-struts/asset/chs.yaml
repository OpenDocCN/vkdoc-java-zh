  <servlet-name>action</servlet-name>\n\n<servlet-class>\n\n**org.apache.struts.action.ActionServlet**\n\
  \n</servlet-class>\n\n<init-param>\n\n<param-name>config</param-name>\n\n<param-value>/WEB-INF/struts-config.xml</param-value>\n\
  \n</init-param>\n\n</servlet>\n\n一旦创建了 `ActionServlet` 实例，就会调用其 `init()` 函数，利用 `struts-config.xml`\
  \ 中包含的信息来初始化 Struts。实际读取 `struts-config.xml` 的相关代码如清单 19-4 所示。\n\n**清单 19-4.** *在\
  \ init() 中初始化 Struts*\n\npublic void init() throws ServletException {\n\n...\n\n\
  // 根据需要初始化模块\n\nModuleConfig moduleConfig = initModuleConfig(\"\", config); initModuleMessageResources(moduleConfig);\n\
  \ninitModuleDataSources(moduleConfig);\n\ninitModulePlugIns(moduleConfig);\n\nmoduleConfig.freeze();\n\
  \n...\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C19.fm\
