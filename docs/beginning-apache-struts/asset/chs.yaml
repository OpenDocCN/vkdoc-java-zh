  \ 签 参 考\n\n使用限制\n\n`select` 标签必须位于 `<html:form>` 标签内部，并且各种选项标签必须嵌套在 `<html:select>`\
  \ 标签内。还有其他一些限制：\n\n• `select` 的 `property` 属性是必需的。\n• `option` 的 `value` 属性是必需的。\n\
  \nselect 的属性\n\n\n\n所有通用属性集（`evt-attrs`、`acc-attrs`、`ren-attrs`、`struts-attrs`、`init-attr`\
  \ 以及新增的 `err-attrs`）均被接受，并具有其常规含义。除此之外，还有几个特定于 `select` 的属性：\n\n• `multiple`：如果指定该属性（实际值不重要），则启用多选功能。\n\
  \n如果指定了 `multiple` 属性，则底层属性必须是一个数组。与 `<html:multibox>` 类似，如果你希望检测到未选中的项目，则必须在 `ActionForm`\
  \ 的 `reset()` 方法中将底层属性设置为一个零长度数组。详情请参见 `<html:multibox>` 的条目。\n\n• `size`：一次显示的选项数量。\n\
  \n**option 的属性**\n\n`option` 标签接受 `ren-attrs` 属性集。除此之外，以下属性是 `option` 特有的：\n\n•\
  \ `value`：提交的值。此属性是必需的。\n\n• `key`：指定选项标签的消息资源键。如果省略，则标签为 `option` 标签主体内嵌套的文本。\n\
  \n• `locale`/`bundle`：这些属性用于指定不同的 `Locale` 对象或消息资源文件。`locale` 指定一个键，可用于查找当前会话中存储的\
  \ `Locale` 对象。`bundle` 属性在 `<bean:message>` 的条目中有更详细的说明。你可以使用这些属性来指定与当前用户不同的区域设置，或与默认消息资源文件不同的文件。\n\
  \n**options 的属性**\n\n`option` 标签接受 `ren-attrs` 属性集，但 `styleId` 属性除外。（省略此属性是因为 `options`\
  \ 标签可能会渲染多个 HTML `<option>` 元素，而 HTML 标准禁止存在两个具有相同 `id` 的元素。）\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
