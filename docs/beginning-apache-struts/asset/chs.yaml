  Struts-Faces 的 `<s:form>` 是 `<html:form>` 的最佳替代品。详情请参考第 20 章。\n\n**frame**\n\n渲染一个\
  \ HTML `<frame>`。使用 `<html:frame>` 的优势在于，您可以使用全局转发或表单处理程序轻松地将内容放入框架中。\n\n使用限制\n\n\
  您必须指定 action/module、href、page 或 forward 其中之一。\n\n属性\n\n• action/module、href、page\
  \ 或 forward：用于指定框架的 URL。action/module 对指定一个表单处理程序。action 必须以斜杠开头，如果要指定模块，请使用 module\
  \ 属性。href 是相对或绝对 URL。page 是模块相对 URL（因此必须以斜杠开头）。forward 是全局转发的名称。\n\n• anchor：链接的可选\
  \ HTML 锚点。\n\n• paramName、paramProperty、paramScope 和 paramId：用于创建单个请求参数。该请求参数会附加到最终\
  \ URL 上。前三个属性用于在当前请求或会话中定位单个对象。该对象的 toString() 方法返回值即为单个参数值。参数名称由 paramId 指定。示例请参考\
  \ `<html:link>`。\n\n• name/property/scope：用于创建多个请求参数。这些请求参数会附加到最终 URL 上。这些属性用于定位一个类型为\
  \ `java.util.Map` 的对象。Map 的键是参数名称，对应的值是参数值。如果指定了 property，则必须同时指定 name。示例请参考 `<html:link>`。\n\
  \n• transaction：如果为 true，则将当前事务令牌作为请求参数附加到 URL 上。事务令牌的详细信息请参考 `<logic:present>`\
  \ 条目。\n\n• title/titleKey：详情请参考 acc-attrs。\n\n• style/styleClass/styleId：详情请参考 ren-attrs。\n\
  \n• scrolling：指定是否在必要时创建滚动条（scrolling=\"auto\"），或者始终创建（yes）或从不创建（no）。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048AppC.fm Page 397 Tuesday, January 17, 2006 4:46 PM\n\n附录 C ■ STRUTS\
  \ 标签参考\n\n**397**\n\n• marginheight/marginwidth：指定顶部和底部边距的高度（marginheight）或左右边距的宽度（marginwidth）。使用的单位是像素。\n\
  \n• frameborder：指定是否需要渲染边框（frameborder=\"1\"）或不需要（frameborder=\"0\"）。\n\n• frameName：渲染后的\
  \ `<frame>` 的名称。\n\n\n\n• noresize: 一个布尔属性，指示此框架是否可以调整大小（false）或尺寸是否固定（true）。\n\n\
  • longdesc: 指向此框架更详细描述的 URL。此属性是标准 HTML 属性，详情请查阅 HTML 参考文档。\n\n• bundle: 允许您选择与默认不同的消息资源文件。\n\
  \nbundle 属性在<bean:message>条目中有更详细的说明。\n\n示例\n\n以下是一个包含两个框架的页面：\n\n<%@ page contentType=\"\
