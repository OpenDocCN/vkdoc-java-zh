  \n• java.lang.String\n\n• java.sql.Date\n\n• java.sql.Time\n\n• java.sql.Timestamp\n\
  \n（此列表可在 Struts 文档站点上找到。请参考本章末尾的“有用链接”。）你可以选择使用`initial`属性为简单属性指定默认值。例如，在清单 16-1\
  \ 中，简单属性 MySimpleProp 的默认值是 Hello。\n\n**声明索引属性**\n\n要创建索引属性，只需在类名（或原始类型）后加上`[]`。\n\
  \n你还需要为数组指定一个大小。如果需要*灵活*长度的数组，有两种方法可以实现。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C16.fm 第 224 页 2006 年 1 月 24 日星期二 上午 10:14\n\n**224**\n\n第 16 章 ■ 动态表单\n\
  \n第一种方法是省略`size`属性。由于未指定大小，新创建的表单 Bean 的此索引属性将为 null。因此，你必须在 Action 子类中“初始化”表单 Bean（一个\
  \ DynaActionForm 实例），然后才能用它存储数据。你在第 10 章中已经见过这种技术的变体。\n\n当请求一个页面时，实际上是对表单处理器的请求。该表单处理器（一个\
  \ Action 子类）会创建一个正确类型和长度的数组，并将其插入到表单 Bean 中。只有在此之后，控制权才会传递给 JSP 页面，由该页面填充表单。DynaActionForm\
  \ 有一个名为`set(String propertyName, Object value)`的函数，你可以用它来初始化表单 Bean。清单 16-2 演示了这种技术的实际应用。\n\
  \n**清单 16-2.** *在运行时设置数组长度*\n\npublic ActionForward execute(...){\n\nDynaActionForm\
  \ dForm = (DynaActionForm) form;\n\n/* 以某种方式获取所需的数组长度 */\n\nint length = ...;\n\n\
  /* 创建新数组 */\n\nString[] myProp = new String[length];\n\n/* 将数组插入表单 */\n\ndForm.set(\"\
  MyIndexedProp\", myProp);\n\n/* 转发到 JSP */\n\nreturn mapping.findForward(\"success\"\
  );\n\n}\n\n由`success`指向的 JSP 页面将能够使用表单的 MyIndexedProp 属性。\n\n毋庸置疑，你需要使用会话作用域才能使其生效。\n\
  \n第二种实现灵活数组的方法是使用实现了`java.util.List`接口的类（例如`ArrayList`）作为`<form-property>`的类型：\n\
  \n<form-property name=\"MyIndexedProperty\" type=\"java.util.ArrayList\" />\n\n\
  不幸的是，使用这种方法会丢失 Struts 的自动类型转换，因为存储在 List 中的所有数据都将作为 String 实例存储。\n\n**声明映射属性**\n\
  \n映射属性通过使用实现了`java.util.Map`接口的类型（例如`HashMap`）来定义：\n\n<form-property name=\"MyMappedProperty\"\
  \ type=\"java.util.HashMap\" />\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C16.fm 第 225 页 2006 年 1 月 24 日星期二 上午 10:14\n\n第 16 章 ■ 动态表单\n\n**225**\n\
  \n**声明嵌套属性**\n\n最后，嵌套属性使用`type`属性定义，该属性是一个 JavaBean，假定它包含在 JSP 中使用的嵌套属性：\n\n<form-property\
  \ name=\"MyNestedProperty\" type=\"com.myco.myapp.MyBean\" />\n\n关于嵌套属性，唯一需要注意的是，你必须确保嵌套属性最终解析为前面为简单属性列出的受支持原始类型或\
  \ Java 类之一。这应该不足为奇，因为即使是普通的 ActionForm，你也会期望如此。\n\n**访问动态属性**\n\n在某些时候，你需要从动态表单中读取（或写入）数据。DynaActionForm\
  \ 基类提供了三个与简单、索引和映射属性相对应的 getter 方法：\n\n• `get(String property)` **返回给定属性的 Object\
  \ 值。此访问器用于简单属性。**\n\n• `get(String property, int index)` **返回给定属性在给定索引处的 Object\
  \ 值。此访问器用于索引属性。**\n\n• `get(String property, String key)` **返回给定属性上给定键的 Object 值。此访问器用于映射属性。**\n\
  \n类似地，还有`set(String property, Object value)`、`set(String property, int index, Object\
  \ value)`和`set(String property, String key, Object value)`。\n\n如果你对属性使用了原始类型，那么`get()`返回的\
  \ Object 类型和`set()`的参数类型将是该原始类型对应的 Java 类。例如，如果你声明了一个`int`类型的属性，那么你应该期望`get()`返回一个`Integer`，并且你应该在`set()`中传递一个`Integer`实例。\n\
  \n**将属性传输到 JavaBean**\n\n在许多情况下，你只想对动态表单 Bean 执行的操作是将属性值传输到 JavaBean 实例中。这通常发生在以下情况：\n\
  \n• 你正在使用 Struts 作为现有应用程序的基于 Web 的前端。现有应用程序通常已经拥有用于保存数据的 JavaBean 类。你希望将属性从动态表单传输到此\
  \ JavaBean。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C16.fm\
  \ 第 226 页 2006 年 1 月 24 日星期二 上午 10:14\n\n**226**\n\n第 16 章 ■ 动态表单\n\n• 你希望将数据传输到数据对象中。如果你正在使用像\
  \ Torque 或 Lisptorq 这样的模型框架（它们通过数据对象暴露数据），就会出现这种情况。详情请参见第 5 章和附录 A。\n\nApache Commons\
  \ 的 Bean 项目（参见“有用链接”）提供了一个实用工具类，可以帮助你轻松完成此传输。以下代码：\n\norg.apache.commons.bean.BeanUtils.\
  \ **copyProperties**(myJavaBean , form)\n\n会将 DynaActionForm 实例（form）的属性复制到你的 JavaBean\
  \ 类（myJavaBean）中。\n\n当然，只会复制 myJavaBean 上存在的属性。Apache Bean 类的 JAR 文件随 Struts 一起打包在`commons-beanutils.jar`中。\n\
  \n**动态表单的缺点**\n\n与普通的 ActionForm 相比，动态表单有一些显著的局限性：\n\n• **使用 EL 时必须使用不同的语法属性**：如果你使用\
  \ EL，则必须在表单的属性前加上`map`前缀。例如，你不能使用`${myform.myproperty}`，而必须使用`${myform.map.myproperty}`。这适用于简单、索引、映射和嵌套属性。仅在使用\
  \ EL 引用属性时才需要这样做。在原始或支持 EL 的 Struts 标签中引用属性时，无需更改。例如，`<bean:write name=\"myform\"\
  \ property=\"myproperty\"/>`可以正常工作。\n\n• **不能使用常规的 getter 和 setter 方法**：如果你继承 DynaActionForm（例如，为了运行自定义验证），则不能在你的子类中使用常规的\
  \ getter 和 setter 方法，并期望它们能与 Struts 标签一起工作。Struts 处理 DynaActionForm 及其子类的方式与处理普通\
  \ ActionForm 不同。如果你需要直接处理表单数据，这可能是一个严重的问题。动态表单的设计理念假设你*不会*直接处理它们的数据。相反，你应该使用上一小节中描述的\
  \ BeanUtils 技术，将表单的属性传输到合适的 JavaBean 中。\n\n\n\n• **无法进行编译时检查**：使用动态表单会失去编译时检查的能力。例如，由于\
  \ `DynaActionForm` 的 `get()` 方法返回值均为 `Object` 类型，因此无法*在编译时*判断返回值是否被赋给了错误的类型。而传统\
  \ getter 方法则不存在此问题，因为其返回值类型通常非常明确（如 `String` 或 `Double` 等），赋值类型不匹配的情况会被 Java 编译器捕获。setter\
  \ 方法也存在类似情况。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C16.fm\
  \ Page 227 Tuesday, January 24, 2006 10:14 AM\n\n第 16 章 ■ 动态表单\n\n**227**\n\n**何时使用动态表单**\n\
  \n那么，究竟*何时*该使用动态表单呢？Apache Struts 用户指南（参见“实用链接”）对此有详细说明：\n\n*DynaActionForm 旨在为常见问题提供简便解决方案：当你的\
  \ ActionForm 仅使用简单属性和标准验证，且只需将这些属性传递给另一个 JavaBean 时……DynaActionForm 并非 ActionForm\
  \ 的即插即用替代品……*\n\n第一句话指的是使用 BeanUtils 将属性传递给 JavaBean 的过程。你在上一小节中已经看到过实际应用。\n\n使用“标准验证”意味着采用\
  \ Validator 框架。这是*推荐做法*，因为频繁访问表单属性需要调用 `DynaActionForm` 的 `get()` 方法，而由于失去了代码的编译时检查能力，这种方法容易出错。`get()`\
  \ 方法本身并不容易出错，但你的代码可能存在 bug，且无法在编译时发现。而使用传统 ActionForm 时，编译器会为你进行检查，因此不存在此问题。\n\n\
  第二句话指的是动态表单的属性在 EL 引用方式上与传统 ActionForm 的属性不同。如果你试图在大量使用 EL 的应用程序中替换常规 ActionForm，这可能会成为一道障碍。\n\
  \n**验证动态表单**\n\n与普通 ActionForm 类似，动态表单中的数据验证有两种方式：\n\n• 实现一个包含 `validate()` 方法的\
  \ `DynaActionForm` 子类。\n\n• 使用 `org.apache.struts.validator.DynaValidatorForm` 子类（它基于\
  \ Validator 框架，详见第 15 章）。\n\n与使用 Validator 框架的 ActionForm 一样，你可以通过继承 `DynaValidatorForm`\
  \ 并在子类的 `validate()` 方法中调用 `super.validate()` 来运行自定义验证逻辑。我在第 15 章中已经介绍过这种技术。\n\n\
  结合 Validator 框架和 BeanUtils 使用动态表单，可以完全消除为表单 Bean 编写 Java 代码的需求。但在深入探讨之前，我将先展示如何使用动态表单实现\
  \ Registration 网络应用程序（参见第 5 章）。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
