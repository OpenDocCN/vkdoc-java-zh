  \n传统动态表单不会出现此问题，因为 Struts 确切地知道需要哪些属性，以及这些属性的长度——除了可能由 List 或 Map 支持的属性，但您可以首先避免使用它们。使用`LazyValidatorForm`，您没有*不*使用这些选项的选择。\n\
  \n缓解此问题的一种方法是使用前面描述的`BeanUtils`技术，将数据从`LazyValidatorForm`实例传输到 JavaBean 类。这样，只有合法数据才会被处理。当然，这意味着您不能接受映射或\
  \ List 支持的索引属性，因为这样做会允许恶意用户向您提供大量虚假数据列表。\n\n**BeanValidatorForm 的隐藏力量**\n\n**(Struts\
  \ 1.2.6+)**\n\n`LazyValidatorForm`的基类是`BeanValidatorForm`，它本身也有有趣的用途。这个类是`ValidatorForm`的基类，因此使用\
  \ Validator 框架进行简单验证。\n\n`BeanValidatorForm`的有趣之处在于，它在其构造函数中接受一个 JavaBean，并自动用用户的表单数据填充这个\
  \ JavaBean。自 1.2.6 版本起，如果`<form-bean>`的`type`属性不是`ActionForm`的子类，Struts 会在幕后自动将实例化的对象“包装”在`BeanValidatorForm`实例中。\n\
  \n要了解这在实际中的意义，假设您要*隐式地*使用`BeanValidatorForm`重做实验 6。您无需创建`ContactForm`类，而是首先像这样声明表单\
