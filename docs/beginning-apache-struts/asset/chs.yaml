  \nDoray_6048C05.fm 第 46 页 2006 年 1 月 23 日，星期一，上午 11:46\n\n**46**\n\n第 5 章 ■ MVC\
  \ 设计模式\n\n**哪个优先？**\n\n当你使用 MVC 设计模式开发 Web 应用时，你会首先指定和设计哪个部分（模型/视图/控制器）？为什么？\n\n\
  在阅读下面的讨论之前，请合上书，给自己几分钟时间来回答这个问题。\n\n这个问题没有“正确”答案，但大多数人会从视图代码或模型代码开始。很少有人会从控制器的设计开始，因为它依赖于视图和模型组件。\n\
  \n我个人偏好首先指定和设计模型代码。这意味着在早期阶段定义*要存储什么数据*以及*如何通过数据访问方法（如清单 5-1 中的 exists() 方法）向其他代码暴露数据*。我持此立场的原因如下：\n\
  \n**• 如果没有明确指定*要存储什么数据*，你就无法设计应用程序的其余部分。\n\n• 如果没有指定*如何访问数据*，就很难实现模型和控制器之间的清晰分离。例如，如果你使用关系型数据库，最终可能会在控制器中出现\
  \ SQL 代码。这违反了 MVC 中定义良好接口的原则。\n\n许多人（尤其是新开发者）更喜欢先设计视图代码，可能是因为这有助于他们理解应用程序的输入和控制流。在这种方法中，视图优先，然后是控制器，最后是模型。虽然这种方法完全有效，但我认为它容易陷入某些陷阱：\n\
  \n• **数据库中存储了冗余信息**。就像谚语中三个盲人摸象一样，使用视图代码来驱动模型设计是不好的，因为你缺乏对应用程序数据需求的全局视图。在复杂的应用程序中尤其如此，你可能会在两个不同的表中存储相同的信息两次。\n\
  \n• **数据库表组织混乱**，因为模型代码和数据组织是为了符合视图需求而设计的，这可能无法反映模型元素之间的自然关系。\n\n• **代码的未来适应性较差**，因为视图代码的更改可能需要修改模型代码和数据库设计。本质上，模型代码与视图代码耦合过紧。\n\
  \n所有这些都源于那些采用“视图优先”方法的人使用视图代码或原型来间接了解模型需求的事实。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C05.fm 第 47 页 2006 年 1 月 23 日，星期一，上午 11:46\n\n第 5 章 ■ MVC 设计模式\n\n**47**\n\
  \n话虽如此，在许多情况下，“模型优先”的方法可能*看起来*不切实际。例如，在许多企业 IT 部门，开发人员并不完全理解问题领域。相反，他们必须依赖并经常与非\
  \ IT 人员（如经理或行政人员，即“领域专家”）沟通，以理解系统的需求。\n\n在这种情况下，应用程序自然是由视图驱动的，因为原型被用作开发人员和领域专家之间的沟通工具。我给处于这种情况的人的建议是，在与领域专家每次讨论后，*逐步*构建模型代码和数据的图景。不要把模型设计留到最后。\n\
  \n无论你选择哪种方式，模型优先还是视图优先，我相信理解你为什么以这种方式做事很重要，仅仅因为这有助于你成为更好的程序员。\n\n在下一节中，我将描述 Struts\
  \ 如何融入 MVC 设计模式。\n\n**Struts 与 MVC**\n\n在 Struts 中，**模型**代码由普通的旧 Java 对象（POJOs）组成。\n\
  \n换句话说，Struts 对你如何编写 Web 应用的模型部分没有限制。你应该将数据访问/持久化封装到模型类中，但 Struts 并不强制你这样做。请记住，Struts\
  \ 是为了帮助你尽可能轻松地实现 MVC 的完美境界。显然，你并不真的需要帮助来将模型与视图和控制器分离。\n\n**视图**代码由 JSP 和 Struts\
  \ 提供的一组自定义标签组成。这些自定义标签使你能够将视图与控制器分离，因为它们解决了我在之前尝试将 MVC 应用于注册 Web 应用时提出的所有问题。\n\n\
  使用 Struts，**控制器**代码分为三大类：\n\n• **简单验证**由你的 Struts 基类 ActionForm 的子类执行。检查密码长度或电子邮件地址格式就是此类例子。在本书后面，你将看到\
  \ Struts 如何通过 Validator 框架极大地简化验证。\n\n• **复杂验证和业务逻辑**在你的 Struts 基类 Action 的子类中完成。注册\
  \ Web 应用中重复用户 ID 的检查就是复杂验证的一个例子。业务逻辑的一个例子是在购物车 Web 应用中计算购买后的应付总金额。\n\n• **流程控制**也由你的\
  \ Action 子类决定，但仅限于在名为 struts-config.xml 的 Struts 配置文件中声明的路径。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C05.fm 第 48 页 2006 年 1 月 23 日，星期一，上午 11:46\n\n**48**\n\n第 5 章 ■ MVC\
  \ 设计模式\n\n随着本书的深入，你将了解更多关于 ActionForm、Action 和 struts-config.xml 的内容。在这个阶段，你只需理解\
  \ MVC 如何映射到 Struts 中。\n\n图 5-6 描绘了这种映射。\n\n**图 5-6.** *MVC 如何映射到 Struts*\n\n**Struts\
  \ 请求的生命周期**\n\n当用户提交表单数据生成传入的 HTTP 请求时，这三类处理（简单/复杂验证、业务逻辑和流程控制）就会发挥作用。\n\n使用 Servlet\
  \ 技术，所有这些处理都由 Servlet 完成。正如我在第 2 章中提到的，Servlet 只是 Java 对象，*通常*是你的 HttpServlet 子类。\n\
  \n即使是 JSP 页面也会在运行时转换为 Servlet 类——实际的 .java 源文件。这些自动生成的 Java 源文件随后会被编译。\n\n由于 Struts\
  \ 构建在 Servlet 技术之上，它也不例外。所有提交到 Struts 应用程序的表单数据都由一个*单一的*“主”Servlet 拦截，该 Servlet\
  \ 是 ActionServlet 的一个实例，是 Struts 的一部分。\n\n这个主 Servlet 负责将应用程序的实际工作委托给你的 ActionForm\
  \ 和 Action 子类（参见图 5-6）。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  Doray_6048C05.fm 第 49 页 2006 年 1 月 23 日，星期一，上午 11:46\n\n第 5 章 ■ MVC 设计模式\n\n**49**\n\
  \n**“通常”？**\n\nServlet 技术相当通用，这意味着它完全不局限于处理 HTTP 请求，尽管这是迄今为止最常见的用途。\n\n\n\n这是因为\
  \ Servlet 解决了许多源于客户端-服务器通信的*通用*问题，例如对象池和会话管理。你的 Servlet 类可以从头实现基本的 Servlet 接口，或者继承\
  \ GenericServlet 基类。如果你想利用 Servlet 技术解决这些通用问题，就可以这样做。\n\n如果你主要关注网页的处理和显示，那么 HttpServlet\
  \ 就是你要继承的基类。\n\n■**注意** 除此之外，ActionServlet 及其辅助类还负责许多其他幕后工作，例如为了效率而池化 Action 子类、读取配置数据，或初始化称为插件的\
  \ Struts 扩展。这些活动对 Struts 开发者来说是不可见的，这也是 Struts 如此易于使用的一个重要原因。你不需要知道时钟的工作原理也能看时间！\n\
  \n传入的表单数据按阶段处理：\n\n• **数据传输**：表单数据传输到你的 ActionForm 子类。\n\n• **简单验证**：该子类中的表单数据会经过简单验证。如果简单验证失败，则会自动向用户显示带有详细错误信息的表单。这是一个*典型*场景，但具体细节取决于你如何配置\
  \ Struts。我们将在第 6 章介绍简单验证的机制，并在第 9 章讨论配置。\n\n• **进一步处理**：表单数据随后发送到你的 Action 子类，进行复杂验证和业务逻辑处理。我们将在第\
  \ 7 章讨论这一点。\n\n你的 Action 子类还会指定要显示的“下一个”页面，至此单个请求的处理结束。\n\n**模型框架**\n\n在上一节中，我强调了优先设计\
  \ Web 应用模型部分的好处，因此 Struts 在这一领域的不足可能会让人有些失望。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C05.fm Page 50 Monday, January 23, 2006 11:46 AM\n\n**50**\n\n第 5 章\
  \ ■ MVC 设计模式\n\nStruts 存在这一明显缺陷的一个原因是，已经有多个框架可以帮助你进行数据访问和持久化。这些框架被称为“持久化框架/层”或“对象/关系（O/R）持久化服务”。这些框架存在的目的是持久化数据，并且要*出色地*完成这一任务。你可以将其中任何一个与\
  \ Struts 结合使用。所以你看，这根本不是缺陷，而是良好的设计。\n\n数据持久化有两种不同的方法：\n\n• **持久化类**：**这种方法允许你将任何\
  \ Java 对象存储到关系数据库或从中检索。你会获得一组类，必须使用它们来持久化和检索你自己的 Java 类。这种方法的一个例子是来自 Apache 的 Hibernate。**\n\
  \n• **持久化类**：在这种方法中，你为数据库表及其相互关系指定描述。持久化框架会*自动生成*与数据库表有映射关系的 Java 类（源代码）。这些自动生成的类具有\
  \ save()、select() 和 delete() 函数，用于持久化和检索数据对象。这种方法的一个典型例子是同样来自 Apache 的 Torque。\n\
  \n“持久化类”方法显然是两者中更灵活的一种，因为你可能持久化任何 Java 类，包括遗留类或第三方类。而“持久化类”方法则缺乏这种能力，但能在模型和控制器之间产生更清晰的分离。\n\
  \n我应该提醒你，虽然这两种方法之间的比较是有效的，但你不能用它来在 Hibernate 和 Torque 等产品之间做出选择。例如，Hibernate 提供了许多超出我在此描述的功能。在选择持久化框架时，这些额外功能才是你需要考虑的。\n\
  \n\n在附录 A 中，我提供了如何使用 Hibernate 和 Torque 的简单示例，同时（厚颜无耻地推销）还介绍了一个名为 Lisptorq 的简单开源“持久化类”框架，该框架由我所在的公司开发。\n\
  \n**实用链接**\n\n• Hibernate: www.hibernate.org/\n\n• Torque: http://db.apache.org/torque/\n\
  \n• Lisptorq: www.thinksquared.net/dev/lisptorq/\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
