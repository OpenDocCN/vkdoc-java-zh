  >...\n\n...\n\n你应该使用：\n\n<html:link forward=\"listing\">...\n\n<html:link forward=\"\
  import\">...\n\n\n\n...并将全局转发声明为\n\n<global-forwards>\n\n<forward name=\"listing\"\
  \ path=\"/Listing.do\"/>\n\n<forward name=\"import\" path=\"/import.jsp\"/>\n\n\
  ...\n\n</global-forwards>\n\n这种方法的优势在于，如果你将某个 JSP 或 HTML 页面从一个位置移动到另一个位置，无需修改指向该页面的每个链接，只需更改全局转发的路径即可。这极大地提高了\
  \ Web 应用的可维护性。\n\n**日志记录**\n\nStruts 使用 Apache Commons Logging 接口进行日志记录。这是一个针对多种日志系统的统一*接口*。\n\
