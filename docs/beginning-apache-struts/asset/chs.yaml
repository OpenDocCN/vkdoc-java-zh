  \nDoray_6048C02.fm Page 13 Tuesday, January 24, 2006 2:09 PM\n\n第 2 章 ■ Servlet\
  \ 和 JSP 预览\n\n**13**\n\n**JavaServer Pages (JSP)**\n\n\n\n之前我提到过，Servlet 是能够对 HTTP\
  \ 请求生成适当响应的 Java 类。这个响应通常是一个显示计算结果的 HTML 页面。\n\n遗憾的是，纯 Java 类通常不是生成 HTML 的最简便方式。典型的网页包含大量文本，而你的\
  \ Servlet 子类必须在某处包含或访问这些文本。在最坏的情况下，你会得到包含大量文本和 HTML 标签的 Java 类。别忘了，你还得对每个双引号进行转义。\n\
  \n相信我，这可不是什么好看的景象。\n\n问题在于，Java 类（以及 Servlet 子类）是*以代码为中心*的，并不适合让程序员轻松显示像网页这样的大量文本。\n\
  \nJavaServer Pages（JSP）就是针对这个问题的解决方案。JSP 页面是*以文本为中心*的，但允许开发者通过*脚本片段*（scriptlets）完全访问\
  \ Java 编程语言。这些脚本片段由嵌入在 JSP 文件中、位于特殊标记标签 `<% ... %>` 之间的 Java 代码组成，如清单 2-1 所示。\n\n\
  ■**注意** Servlet 容器（如 Tomcat）实际上会将 JSP 页面转换为常规的 Servlet，然后在后台编译它。每当 JSP 页面发生更改时，都会执行此操作。\n\
  \n在非 Java 的世界里，与 JSP 最接近的类比是 PHP 或活动服务器页面（ASP）。\n\n清单 2-1 展示了一个简单的 JSP 页面，我将在以下小节中对其进行简要分析：\n\
  \n**清单 2-1.** *Hello.jsp*\n\n<%@ page contentType=\"text/html;charset=UTF-8\" language=\"\
  java\" %>\n\n<%@ taglib uri=\"/tags/time\" prefix=\"time\" %>\n\n<html>\n\n<h1>Hello\
  \ <%= \"world\".toUpperCase() %></h1>, and the time is now\n\n<time:now format=\"\
  hh:mm\"/>.\n\n</html>\n\n图 2-5 显示了 Hello.jsp 在 Web 浏览器中可能呈现的样子。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00019.png)\n\nDoray_6048C02.fm Page 14 Tuesday, January 24, 2006 2:09\
  \ PM\n\n**14**\n\n第 2 章 ■ Servlet 与 JSP 预览\n\n**图 2-5.** *在 Web 浏览器中查看的 Hello.jsp*\n\
  \n**解构 Hello.jsp**\n\nHello.jsp 中的第一行是一个头部，指明了输出类型（text/html，使用 UTF-8 编码）以及所使用的脚本语言（Java）。\n\
  \n<%@ page contentType=\"text/html;charset=UTF-8\" language=\"java\" %> 紧随这个头部之后的是一个标签库声明：\n\
  \n<%@ taglib uri=\"/tags/time\" prefix=\"time\" %> 这个声明告诉 Servlet 容器，该 JSP 页面使用了一个标签库。标签库定义了你可以创建和使用的*自定义标签*，以便将一些预打包的功能放入\
  \ JSP 页面中。\n\n■**注意** 在本书中，我将使用术语*自定义标签*，但正确的术语是*自定义动作*。我避免使用政治正确的说法，因为“动作”在 Struts\
  \ 中是一个常用词。此外，我发现*自定义标签*这个术语更直观。\n\n在这个例子中，预打包的功能是一个时间显示：\n\n<time:now format=\"\
  hh:mm\"/>\n\n我应该提醒你，这个“time”标签库完全是虚构的。我编造它只是为了向你展示自定义标签可能如何使用。Struts 广泛使用了自定义标签，我将在第\
  \ 4 章中详细介绍。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C02.fm\
  \ Page 15 Tuesday, January 24, 2006 2:09 PM\n\n第 2 章 ■ Servlet 与 JSP 预览\n\n**15**\n\
  \n最后，如清单 2-1 所示，我随意使用了一个脚本片段：\n\n<%= \"world\".toUpperCase() %>\n\n这仅仅是 Java 代码在\
  \ JSP 页面中的嵌入。请注意脚本片段标签 `<%` 开始后那个至关重要的等号（=）。这意味着 Java 代码的计算结果将被显示出来。也可以有那些不显示任何内容，而是产生某些副作用的脚本片段，如清单\
  \ 2-2 所示。\n\n**清单 2-2.** *脚本片段实战*\n\n<%@ page contentType=\"text/html;charset=UTF-8\"\
  \ language=\"java\" %>\n\n<%\n\ndouble g = (Math.sqrt(5) + 1)/2;\n\n%>\n\n黄金比例是：<%=\
  \ g %>\n\n在清单 2-2 中有两个脚本片段。第一个静默地计算了一个数字（没有 = 号），第二个显示了计算出的值（带有 = 号）。\n\n\n\n清单\
  \ 2-2 的另一个启发之处在于，它演示了如何在一个脚本片段中定义变量，并在同一页面的其他脚本片段中访问该变量。\n\n■**注意** 每个 JSP 页面都有一个名为`request`的预定义变量，它是与当前页面关联的`HttpServletRequest`实例。\n\
  \n当前 JSP 的发展趋势是尝试用自定义标签替代脚本片段的使用。\n\n这主要是因为使用脚本片段会导致 JSP 的可读性低于使用自定义标签。我将在第 10 章再次探讨这个观点，届时将介绍\
  \ JSP 标准标签库（JSTL）。\n\n**最终思考**\n\n对于稍有 JSP 使用经验的读者来说，本节内容应该已是老生常谈。如果你来自 ASP/PHP\
  \ 阵营，应该不难将你在那些技术中的知识映射到 JSP 上。\n\n接下来的两章将深入探讨 JSP 技术的两个方面，即使是许多经验丰富的 JSP 开发者也可能未能完全掌握，但这些内容对于理解\
  \ Struts 至关重要。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C02.fm\
