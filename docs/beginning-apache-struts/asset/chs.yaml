  \n**Logic 标签库**\n\nLogic 库包含以下标签：\n\n• **迭代**：iterate 标签\n\n• **条件处理**：equal、present、match、empty、notEqual、notPresent、notMatch、notEmpty、messagesNotPresent、messagesPresent、lessThan、lessEqual、greaterThan\
  \ 和 greaterEqual 标签\n\n• **流程控制**：redirect 和 forward 标签\n\n■**注意** 除了用于流程控制的标签外，所有这些标签在\
  \ JSTL 中都有对应的版本，我们将在本章后面介绍。应尽可能使用 JSTL 版本。\n\n接下来我们逐一介绍这三类标签。\n\n**迭代**\n\n<logic:iterate>\
  \ 标签可用于遍历集合、枚举、数组或迭代器。我们将这些统称为“可迭代”对象。要使用 <logic:iterate> 标签，你必须：\n\n**1. 创建可迭代对象**：这在你\
  \ Action 子类中完成，因为这是控制器代码。永远不要忘记 MVC 模式。\n\n**2. 将可迭代对象放入请求中**：回想一下，在你的 Action 的\
  \ execute() 函数中，你有一个对请求对象的引用。你可以将对象放入此请求对象或其关联的会话对象中，并为该对象指定一个*名称*。\n\n**3. 转发到包含**\
  \ <logic:iterate> **标签的 JSP 页面**：**由 Action 调用的 JSP 页面将能够通过你指定的名称访问这些对象。**\n\n**即使你使用\
  \ JSTL 进行迭代，这三个步骤也是相同或相似的，因此请务必仔细研究以下说明这些步骤的代码清单。**\n\n\n\n我们将继续完善本书中一直在开发的 LILLDEP\
