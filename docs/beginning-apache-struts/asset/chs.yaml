  status\"\n\nvalue=\"${LogonForm.statusLogOff}\"/>\n\n</html-el:form>\n\n请注意，注销视图（success.jsp）将数据提交给名为\
  \ Logoff.do 的表单处理器，这与前两个视图不同，它们将数据提交给 Login.do。这是因为我们不需要对注销操作进行验证，因此在 struts-config.xml\
  \ 中，Logoff.do 的声明设置了 validate=\"false\"且没有输入页面。\n\n接下来，我们检查 struts-config.xml 文件（见清单\
  \ 14-19）。为清晰起见，我只展示 form-beans 和 action-mappings 部分。\n\n**清单 14-19.** *struts-config.xml\
  \ 的 form-beans 和 action-mappings 部分*\n\n<form-beans>\n\n<form-bean name=\"LogonForm\"\
  \n\ntype=\"net.thinksquared.login.struts.LogonForm\"/>\n\n</form-beans>\n\n<action-mappings>\n\
  \n<action path=\"/Login\"\n\ntype=\"org.apache.struts.actions.ForwardAction\"\n\n\
  name=\"LogonForm\"\n\nscope=\"session\"\n\nvalidate=\"true\"\n\ninput=\"/index.jsp\"\
  \n\nparameter=\"/index.jsp\"/>\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C14.fm 第 182 页 2006 年 1 月 24 日星期二 上午 10:13\n\n**182**\n\n第 14 章 ■ TILES\n\
  \n<action path=\"/Logoff\"\n\ntype=\"org.apache.struts.actions.ForwardAction\"\n\
  \nname=\"LogonForm\"\n\nscope=\"session\"\n\nvalidate=\"false\"\n\nparameter=\"\
  /index.jsp\"/>\n\n<action path=\"/LoginController\"\n\ntype=\"net.thinksquared.login.struts.UserLoginAction\"\
  \n\nname=\"LogonForm\"\n\nscope=\"session\"\n\nvalidate=\"false\">\n\n<forward name=\"\
  success\" path=\"/userlogin/success.jsp\"/>\n\n<forward name=\"new-user\" path=\"\
  /userlogin/newuser.jsp\"/>\n\n<forward name=\"regular\" path=\"/userlogin/regular.jsp\"\
  />\n\n</action>\n\n</action-mappings>\n\n这里的声明有点复杂，所以请务必仔细注意。首先，声明了 LogonForm。这你应该很熟悉，无需进一步解释。\n\
  \n接下来是三个表单处理器。前两个，Login.do 和 Logoff.do，由三个视图上的表单直接调用。常规视图和新用户视图提交到 Login.do，而注销视图提交到\
