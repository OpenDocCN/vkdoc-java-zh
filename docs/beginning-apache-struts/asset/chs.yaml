  \n在本实验课程中，我们仅仅触及了 Struts-Faces 集成库的皮毛。\n\n如果你感兴趣，应该尝试一下发行版附带的示例应用程序。\n\n你可能还注意到，除了使用\
  \ `ActionErrors` 之外，你无需修改应用程序中的 `Action` 或 `ActionForm` 子类。这当然是一个巨大的优势，并且在大多数情况下，比迁移到像\
  \ Shale 这样的全新框架更可取。\n\n然而，你应该意识到 Struts-Faces 库并非总是有效。在本节的初稿中，我尝试迁移第 14 章的登录 Web\
  \ 应用程序，结果发现你无法移植那些将视图转发到其他 JSP 的 Tiles，而这正是登录 Web 应用程序所做的。这可能是 JSF 的限制，因此很难看出此类问题如何在\
  \ Struts-Faces 库的未来版本中得到解决。也许可以修改 Tiles 标签，使其与 Struts-Faces 集成库更好地配合使用。\n\n这里的教训是，你需要一个能够解决此类问题的新框架——一个从头开始重写的\
  \ Struts。这正是 Shale 的全部意义所在。\n\n**Struts Shale 预览**\n\n正如我们之前提到的，Shale 基于 JSF。这意味着它继承了\
  \ JSF 的所有优点，例如高度可定制的视图层。但 Shale 在 JSF 之上增加了许多优势。\n\n在本节中，我们将带你了解 Shale 的主要增值领域。这些领域分为两大类：\n\
  \n• 一组服务和服务选项。（不要将这些与 Web 服务混淆。这里的服务类似于 Struts 插件，而服务选项只是配置 Shale 及其服务的方式。）服务包括与\
  \ Validator 框架的集成，以及 Tiles 的重写（现在称为“Clay”）。在这些之上一个重要的新增功能是 Shale 的对话框管理器，它使控制流更加透明。这些服务在设计时考虑到了可定制性，因此与\
  \ Struts 相比，Shale 更易于定制和扩展。\n\n• 与其他框架和技术的集成（Spring、Ajax、JNDI 等）。\n\n在我看来，这些优势加上\
  \ JSF 的优点，使 Shale 成为 Struts 当之无愧的继承者。不幸的是，仅凭技术优势并不能保证生存，而且由于我们在本章开头侧边栏（“Struts Ti\
  \ 和 Struts OverDrive”）中概述的原因，Shale 对经典 Struts 的“继承”绝非板上钉钉。\n\n**ViewController**\n\
  \n在 JSF 中，支持 Bean 是普通的旧 Java 对象（POJO）。这为你创建支持 Bean 提供了很大的灵活性，但也意味着你的 Bean 必须“手动”完成很多事情。\n\
  \n一个很好的例子是用户支持 Bean 的实际实现（参见清单 20-10）。\n\n在我的实现中，我使用了一个 `HashMap` 来模拟数据库。在实际实现中，你可能需要创建和释放数据库连接，而这些操作最好集中处理，而不是在\
  \ `Logon()` 和 `Register()` 等函数中重复。\n\nShale 提供了一个名为 `ViewController` 的*接口*（参见清单\
  \ 20-13），其中包含一些事件处理函数和一个名为 `postback` 的变量。\n\n**清单 20-13.** *Shale 的 ViewController\
  \ 接口*\n\n```java\n/**********************************************************************\n\
