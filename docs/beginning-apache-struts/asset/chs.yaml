  \n**75**\n\n如你所见，使用 Model 类写入数据能够生成简洁的代码。Model 类并非 Struts 的一部分，因为这项任务最好交由专门的持久化框架（如\
  \ Hibernate 或 Torque）来处理。详情请参考附录 A。\n\n**导航**\n\n导航指的是决定下一步向用户显示哪个页面的编程逻辑。在 RegistrationAction\
  \ 中，只有两个可能的“下一个”页面：包含已提交表单的页面（重新显示并附带错误信息），以及表示注册成功的“您已注册！”页面。\n\n到达每个页面所用的代码略有不同。清单\
  \ 7-6 展示了所涉及的导航逻辑。\n\n**清单 7-6.** *RegistrationAction 中的导航*\n\nif(User.exists(userid)){\n\
  \n...\n\n//导航：重新显示用户表单。\n\n**return mapping.getInputForward();**\n\n}else{\n\n...\n\
  \n//导航：显示“您已注册”页面\n\nreturn mapping.findForward(\"success\");\n\n}\n\nActionForward\
  \ 是 execute() 方法的返回值，它是对“下一个”页面的引用。清单 7-6 展示了实例化它的两种最重要方式。\n\n■**注意** 如果你查阅 ActionForward\
  \ 的 JavaDocs，会发现实际上存在多种不同的 ActionForward 构造器。每个构造器都允许你更改默认设置，例如页面是否为重定向。甚至还有 ActionForward\
  \ 的子类，用于创建具有更常见选项的 ActionForward。\n\n第一种方式涉及创建指向包含已提交表单页面的 ActionForward 引用。你可能需要这样做的唯一原因，是在复杂验证失败时重新显示表单：\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C07.fm Page 76 Tuesday,\
  \ January 24, 2006 10:12 AM\n\n**76**\n\n第 7 章 ■ 处理业务逻辑\n\nmapping.getInputForward()\n\
  \n要获取输入页面的引用，你可以在 ActionMapping 实例（即 mapping）上使用 getInputForward() 函数。回想一下，mapping\
  \ 是由 Struts 提供给你的，因为它是 execute() 方法中的一个参数。\n\n请注意，与简单验证中由 Struts 自动处理重新显示不同，这里你需要“手动”操作，这意味着你必须自己指定错误页面。这是因为简单验证和复杂验证的本质截然不同。例如，你可能会在执行任务前检查用户的账户余额。如果余额不足，自动重新显示输入页面是没有意义的。更合适的响应是显示一个“余额不足”页面。\n\
  \n第二种实例化 ActionForward 的方式是让它指向一个*命名的*“下一个”页面：\n\nmapping.findForward(\"success\"\
  )\n\n在这里，名称 success 指向一个命名页面，这是我绑定到 RegistrationAction 的一个可能的“下一个”页面。我将在第 9 章中描述如何实现这一点。\n\
  \n这种间接引用页面的方式可能看起来过于复杂。为什么不直接使用像这样的直接引用呢？\n\nnew ActionForward(\"/mywebapp/registered.jsp\"\
  )\n\n有两个充分的理由说明为什么应该避免使用直接引用。第一，间接方法使你的 Web 应用更易于维护；第二，它促进了代码复用。\n\n要理解第一个理由，你需要知道命名页面是在一个名为\
  \ struts-config.xml 的文件中指定的。因此，如果你移动了一个页面，只需修改这一个文件即可。如果路径是硬编码的，你就需要更改多个 Action\
  \ 并重新编译你的应用！这并不好。\n\n第二个理由更为微妙，但也更有说服力。通常你需要在不同的上下文中复用同一个 Action。根据上下文的不同，你可能希望显示不同的“成功”页面。将“下一个”页面硬编码到\
  \ Action 中会消除这种可能性。\n\n总结一下，有两种重要的方式来显示“下一个”页面：\n\n\n• **输入页面**：`mapping.getInputForward()`\n\
  \n• **命名页面**：`mapping.findForward(...)`\n\n**实验 7：为 LILLDEP 实现 ContactAction**\n\
  \n本实验从实验 6 结束的地方继续。ContactAction 是与实验 6 的 ContactForm 相关联的 Action 子类。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
