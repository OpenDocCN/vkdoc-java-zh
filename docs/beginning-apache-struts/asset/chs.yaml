  \ Page 23 Monday, December 12, 2005 3:47 PM\n\n第 4 章\n\n■ ■ ■\n\n自定义标签\n\n**自**定义标签是你创建的\
  \ JSP 标签，允许你为 JSP 定义新的功能。例如，假设我们有一个名为 `<temp:F>` 的自定义标签，用于将摄氏度转换为华氏度。我们可以在 JSP 中使用它：水在\
  \ 100 摄氏度时沸腾，即 `<temp:F>100</temp:F>` 华氏度。\n\n显示为：\n\n水在 100 摄氏度时沸腾，即 212 华氏度。\n\
  \n虽然这只是一个用于说明自定义标签概念的简单示例，但实际上，自定义标签之所以有用，有以下几个原因：\n\n• 它们促进了代码复用，因为减少了 JSP 中代码的重复。\n\
  • 它们使 JSP 更易于维护，因为可以避免使用脚本片段。\n• 它们的使用简化了网页设计师的工作，因为无需使用更难编写和使用的脚本片段。\n• 它们是促进关注点分离的关键工具（参见第\
  \ 1 章）。大多数（如果不是全部）Web 应用框架，包括 Struts 和 JavaServer Faces，都因此使用自定义标签。\n\n由于 Struts\
  \ 广泛使用自定义标签，了解如何创建和使用自定义标签对你是有利的。\n\n**自定义标签基础**\n\n标签有一个在 JSP 页面上定义的**前缀**（在前面的示例中，前缀是\
  \ `temp`）和一个**标签名**（在示例中是 `F`），后者在标签的 **TLD**（**T**ag **L**ibrary **D**escriptor，标签库描述符）**文件**中是固定的。\n\
  \n**在 JSP 上使用标签之前，必须在页面开头声明该标签。例如，`<temp:F>` 标签的声明可能如下所示：** **23**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C04.fm Page 24 Monday, December 12, 2005 3:47 PM\n\n**24**\n\n第 4 章\
  \ ■ 自定义标签\n\n`<%@ taglib uri=\"/tags/temperature\" prefix=\"temp\" %>` 我们将在下一节中解析这个声明。现在，只需注意前缀是在\
  \ JSP 中定义的。\n\n■**注意** 标签的前缀用于防止标签名冲突。例如，如果你必须使用两个来自不同标签库但名称相同的不同标签，你可以为它们指定不同的前缀以区分。因此，前缀是灵活的，你可以在单个\
  \ JSP 上定义它们。另一方面，标签名不能更改，并且在标签的 TLD 文件中定义。\n\n标签也可以有属性，例如：\n\n`<msg:echo message=\"\
  Hi\" />`\n\n最后，多个标签可以收集到一个 TLD **文件**中。这就是为什么它被称为标签**库**描述符文件。接下来，我们来看一个典型标签的生命周期。\n\
  \n**自定义标签的处理方式**\n\n假设我们有一个包含自定义标签的 JSP。它是如何转换成我们在屏幕上看到的文本的呢？当 Servlet 容器首次解析 JSP\
  \ 时，它会遇到自定义标签，例如：\n\n`<bean:write property=\"companyName\"/>`\n\nServlet 容器期望并在\
  \ JSP 页面上查找相应的 **taglib 声明**。例如：\n\n`<%@ taglib uri=\"/tags/struts-bean\" prefix=\"\
  bean\" %>`\n\nJSP 页面上可能有多个这样的 taglib 声明。Servlet 容器通过将标签上的前缀与 taglib 声明中的 `prefix`\
  \ 属性进行匹配，来知道使用哪一个，如清单 4-1 所示。\n\n**清单 4-1.** *一个包含 Taglib 声明和自定义标签的 JSP 示例*\n\n\
  `<%@ taglib uri=\"/tags/struts-bean\" prefix=\"bean\" %>`\n\n`<bean:write property=\"\
  companyName\"/>`\n\ntaglib 声明只是将一个前缀**与一个 URI**（**U**niform **R**esource **I**dentifier，统一资源标识符**）**关联起来，该\
  \ URI 是指向标签 TLD 文件的*逻辑*路径。`uri` **属性是一个逻辑路径而非真实路径，因为它指向 web.xml（标准 Servlet 配置文件）中的一个特定条目，而不是硬盘上的某个位置。****\n\
  \n****[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C04.fm Page\
  \ 25 Monday, December 12, 2005 3:47 PM\n\n第 4 章 ■ 自定义标签\n\n**25**\n\n**web.xml **文件必须包含\
  \ `uri` 属性所指示的标签库的实际位置。在这种情况下，web.xml 中的相关信息在 `<taglib>` 标签中给出（参见清单 4-2）。****\n\n\
  ******清单 4-2.** *web.xml 中的 Taglib 部分*\n\n`<taglib>`\n\n`<taglib-uri>/tags/struts-bean</taglib-uri>`\n\
  \n`<taglib-location>/WEB-INF/struts-bean.tld</taglib-location>`\n\n`</taglib>`\n\
  \n从清单 4-2 中需要注意的主要几点是：\n\n• `taglib-uri` **的主体必须与 JSP 文件中给出的 taglib 声明的 `uri` 属性匹配。**\n\
  \n**• `taglib-location` 的主体必须包含 TLD **文件的相对路径。在前面的示例中，TLD 文件是 `struts-bean.tld`。**\n\
  \n**TLD 文件的物理位置始终相对于 Web 应用 WAR 文件的根文件夹（或相对于 Servlet 容器 `webapps` 目录中 Web 应用的子目录）。因此，在清单\
  \ 4-2 中，我们看到 TLD 文件位于 `WEB-INF` 文件夹中，名为 `struts-bean.tld`。\n\n最后，TLD 文件只是一个 XML\
  \ 文档，包含描述库中标签的元数据。这些元数据包括：\n\n• 标签的名称（在清单 4-1 中将是 `write`）。\n• 标签的可选和必需属性（以及清单 4-1\
  \ 中的 `property`）。\n• 处理标签属性和主体以生成输出的 Java 处理程序类。这些 Java 类通常打包在一个 JAR 文件中，你需要将其放置在\
  \ Web 应用的 `WEB-INF\\lib` 目录中。\n\n我们将在实验环节中详细介绍 TLD 文件的细节。图 4-1\n\n总结了自定义标签的处理流程。\n\
  \n在最后一步，Servlet 容器调用 Java 标签处理程序上的某些函数，该处理程序负责生成自定义标签的输出。\n\n如你所见，即使是最简单的自定义标签的处理流程也有些复杂。\n\
  \n\n\n我建议在继续之前，将本节内容反复阅读几遍，直到你对细节有足够把握为止。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C04.fm 第 26 页 2005 年 12 月 12 日 星期一 下午 3:47\n\n**26**\n\n第 4 章 ■ 自定义标签\n\
  \n**图 4-1.** *自定义标签的简化处理流程* **Java 处理器类**\n\n将自定义标签的主体和属性转换为 HTML 代码的实际工作，是由你必须实现的\
  \ Java 处理器类完成的。\n\n根据标签的需求，你的处理器类需要继承两个基类之一。\n\n如果你的自定义标签**没有主体**，那么你应该继承 `javax.servlet.jsp.tagext.TagSupport`。这个基类代表没有主体但可能包含属性的自定义标签。\n\
  \n如果你的自定义标签有主体，那么你必须继承 `javax.servlet.jsp.tagext.BodyTagSupport`。当然，使用 `BodyTagSupport`\
  \ 并不意味着你的标签在 JSP 中使用时必须有主体。它的真正含义是，你必须实现一个额外的处理器函数来处理标签的主体。\n\n为了简单起见，在接下来的内容中，我们将重点讨论\
  \ `BodyTagSupport`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C04.fm\
  \ 第 27 页 2005 年 12 月 12 日 星期一 下午 3:47\n\n第 4 章 ■ 自定义标签\n\n**27**\n\n■**注意** 这里我稍微简化了事实。无论你的自定义标签是否有主体，你都可以继承\
  \ `BodyTagSupport` 或 `TagSupport`。只是 `BodyTagSupport` 提供了额外的功能，让你可以方便地读取标签的主体。`TagSupport`\
  \ 不具备这个能力。但这种便利是有代价的，因为 Servlet 容器需要做额外的工作并占用更多内存。这就解释了为什么如果你的自定义标签没有主体，你应该继承 `TagSupport`，只有在必要时才使用\
  \ `BodyTagSupport`。\n\n这个额外的函数是 `doAfterBody()`，它在 Servlet 容器读取标签主体后被调用。这个函数是你读取标签主体、进行所有必要处理并显示输出的地方。标签必须返回一个名为\
  \ `EVAL_PAGE` 的整数标志，该标志已在 `BodyTagSupport` 中为你定义。这个标志告诉 Servlet 容器继续处理页面的其余部分。\n\
  \n你的处理器类必须满足的另一个要求是，它们必须具有与自定义标签支持的属性相对应的额外 `getXXX` 和 `setXXX` 函数。\n\n■**注意** 换句话说，除了是\
