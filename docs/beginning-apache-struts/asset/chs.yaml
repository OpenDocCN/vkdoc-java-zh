  \n引言\n\n**本**书介绍了一个名为 Apache Struts 的 Web 应用框架，使用它可以*轻松*构建*健壮*、*可维护*的 Web 应用程序。这里三个斜体的形容词并非夸大其词：\n\
  \n• **简单性**：Struts 相对容易上手并有效使用。投入学习 Struts 的努力，你会获得丰厚的回报。\n\n• **健壮性**：Struts 提供了创建\
  \ Web 应用所需的大部分基础设施。你可以依赖这套基于坚实设计原则、经过测试的代码，而不必自己寻找解决方案。\n\n• **可维护性**：Struts 围绕模型-视图-控制器（MVC）设计模式构建，该模式促进了\
  \ Web 应用各部分之间的分离。这大大有助于使你的代码易于维护。\n\n除此之外，Struts 拥有庞大的用户群，并且是许多基于 Java 的企业级 Web\
  \ 应用解决方案中的关键组件。它将在未来一段时间内持续存在。\n\n\n\n为了确保我们达成共识，先了解一下什么是 Web 应用可能会有所帮助。\n\n**什么是\
  \ Web 应用？**\n\n在本书中，术语 *Web 应用*（或 *webapp*）指的是用户界面托管在 Web 浏览器上的任何应用。将 Web 应用视为位于一个连续谱（见图\
  \ 1-1）上的某个位置是很有用的。在这个连续谱的一端，是提供静态内容的 Web 应用。大多数网站就是这类应用的例子。而在另一端，则是行为与普通桌面应用完全一致的\
  \ Web 应用。Struts 在构建位于该连续谱右半部分的 Web 应用时非常有用。\n\n**3**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C01.fm Page 4 Thursday, January 12, 2006 10:49 AM\n\n**4**\n\n第 1 章\
  \ ■ 引言\n\n**图 1-1.** *Web 应用框架的连续谱* 因此，如果你计划构建一个几乎不需要用户输入或输入验证、无需数据访问、无需复杂业务规则、也无需国际化的\
  \ Web 应用，那么你可能不必使用 Struts。但如果这些需求中有部分或全部是必要的，那么你的应用使用 Struts 将大有裨益。\n\n■**注意** 我希望图\
  \ 1-1 不会引起混淆。衡量特定框架的维度有很多（易用性、对特定功能的支持、成本、平台独立性等），而图 1-1 仅在一个维度上对这些技术进行了定位。\n\n\
  我应该提醒你，连续谱的*最*右端也并非 Struts 能完全解决的。像 JavaServer Faces (JSF) 和 Ajax（异步 JavaScript\
  \ 和 XML）这样的新兴技术正试图弥补这一不足。\n\n类似地，某些 Web 应用可能需要混合使用多种技术才能工作，而 Struts 则作为基础组件。例如，使用\
  \ Enterprise JavaBeans (EJB) 处理业务逻辑，或使用像 Velocity 这样的模板引擎处理文本。不过，在大多数情况下，仅用 Struts\
  \ 就能胜任工作。\n\n在本书中，我将概述一些可与 Struts 协同工作的技术，其中包括 Torque、Hibernate（见附录 A）以及 JSF（我将在第\
  \ 18 章与 Shale 一起详细讲解）。\n\n**Struts 能为你做什么**\n\nCraig McClanahan 创建 Struts 是因为他受命将一个面向美国市场的应用移植到欧洲。他需要为该应用提供\
  \ Web 界面，并使其能够轻松翻译成四种欧洲语言（关于这一点以及其他有趣细节，请参阅本章末尾“有用链接”中的 Craig 博客）。因此，毋庸置疑，国际化是 Struts\
  \ 特别擅长处理的事情。但 Struts 能提供的远不止于此。\n\nStruts 为诸如用户输入验证、错误处理与报告以及流程控制等功能提供了广泛的基础设施，而这些正是构建\
  \ Web 应用的核心工作。根据我的经验，构建 Web 应用大约有 30% 到 50% 的时间（以及 100% 的繁琐工作）\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048C01.fm Page 5 Thursday, January 12, 2006 10:49 AM\n\n第 1 章 ■ 引言\n\n\
  **5**\n\n都围绕着这些活动，因此大幅削减这部分时间确实是一件大好事。\n\nStruts 允许拥有不同技能的人员——Web 设计师、系统分析师、系统工程师、数据库工程师——并行工作。Struts\
  \ 通过强制实施“关注点分离”来实现这一点：执行不同功能的代码片段被分别打包，并赋予它们之间标准化的通信方式。这样，人们就可以维护或处理 Web 应用的某些部分，而无需过多担心其他部分。\n\
  \n你能明白这是为什么吗？\n\n即使你是一名独立开发者，Struts 强制实施的关注点分离也会转化为模块化程度更高、因此更易于维护的代码。虽然这听起来像是你在\
  \ Java 中一直在做的事情，但 Struts 能帮助你在多种语言——Java、JSP、JavaScript 和 SQL——中实现这一点。\n\n\n\nStruts\
  \ 实现了所有这些功能，*而且*易于学习，这无疑促成了它的流行。\n\n事实上，还有其他 Web 应用框架，既有开源的也有专有的，但 Struts 的增长速度远超其竞争对手，如今已拥有非常庞大的用户群。因此，如果你在\
  \ Struts 上遇到棘手的问题，可以随时在互联网上获取海量的知识资源。\n\n**关于你**\n\n在撰写本书时，我冒昧地对你的编程背景做了一些假设。具体来说，我假设你具备以下条件：\n\
