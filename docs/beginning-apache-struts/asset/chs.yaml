  \n• MappingDispatchAction：帮助你将在相关功能分组到一个 Action 中。\n\n• **全局转发**：关于如何有效使用全局转发的第二种方法。\n\
  \n• **日志记录**：Struts 捆绑了 Apache Commons Logging，你可以用它来执行日志记录。\n\n• **通配符**：一个有助于减少\
