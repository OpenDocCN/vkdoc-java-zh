  \ 插入一个布局。请注意前导斜杠：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048AppC.fm\
  \ Page 460 Tuesday, January 17, 2006 4:46 PM\n\n**460**\n\n附 录 C ■ S T R U T S 标\
  \ 签 参 考\n\n<tiles:insert page=\"/mypage.jsp\" />\n\n您也可以类似地插入一个 Tiles 定义：\n\n<tiles:insert\
  \ definition=\".basic\" />\n\n有关使用 `<tiles:insert>` 的更多示例，请参阅第 14 章。\n\n**definition**\n\
  \n此标签声明一个布局或其自定义版本，使其能够被重用。您从 `<tiles:insert>` 调用该定义以实际使用它。\n\n通常，您首先在共享的 JSP 页面中声明定义，然后使用\
  \ `<%@ include file=\"...\" %>` 将该 JSP 页面包含到您使用该定义的页面中。\n\n`<tiles:definition>`\
  \ 还允许您自定义现有的布局或现有的定义，然后在您自己的一个或多个 JSP 页面中重用该自定义版本。您可以使用 `<tiles:put>` 和相关标签执行自定义。\n\
  \n请注意，我在第 14 章中没有讨论 `<tiles:definition>` 标签的使用，因为更好的替代方案是在 `tiles-defs.xml` 文件中声明您的定义。这使得您的定义的维护更容易跟踪，并且无需使用共享的\
  \ JSP 页面。\n\n使用限制\n\n`id` 属性是必需的。\n\n属性\n\n• id：为此定义指定一个唯一名称。\n\n• scope：指定定义创建后的\
  \ JSP 作用域。默认作用域是 page。将值设置为生命周期更长的作用域（例如 session）将允许您在整个用户会话中使用 `<tiles:insert>`\
  \ 访问该定义。当然，如果使用不当，这种自由会导致“高维护”的 Web 应用程序。\n\n• template/page：保存实际布局的 JSP 页面的名称。请记住，定义只声明一个布局。实际的布局本身包含在一个\
  \ JSP 页面中。该页面通常包含 `<tiles:insert attribute=\"...\"/>` 标签来指定命名项的位置。有关示例，请参阅清单 14-3。\n\
  \n• role：一个角色，必须与远程用户的任何一个角色匹配，此定义才能被处理。有关角色的简要讨论，请参阅 `<logic:present>` 条目。\n\n\
  • extends：您想要进一步自定义的“父”定义的名称。请参阅清单 14-7 了解其工作原理。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
