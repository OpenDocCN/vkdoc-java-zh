  \ size=\"60\" /> 使得属性引用相对于 monkey 属性。因此<nested:text>的 property 标签实际上是 monkey.name。\n\
  \n看到<nested:text>时你应该会眼前一亮。是的，没错。Nested 标签库包含了*所有*HTML 标签库、大部分 bean 标签库以及除流程控制标签外的所有\
  \ Logic 标签库的“嵌套”对应版本。附录 C 列出了 Nested 标签库所支持的 HTML、bean 和 logic 标签库中的标签。\n\n显然，使用\
  \ Nested 标签库能实现的功能，使用嵌套*属性*（参见前文）也都能实现。例如，清单 10-4 展示了如何在不使用嵌套标签的情况下重写清单 10-3。但在复杂场景下，使用\
  \ Nested 标签库能让你的代码更简洁一些。\n\n**清单 10-4.** *MonkeyPreferences.jsp，第二版*\n\n<%@ page\
  \ contentType=\"text/html;charset=UTF-8\" language=\"java\" %>\n\n<%@ taglib uri=\"\
  /tags/struts-html\" prefix=\"html\" %>\n\n<html:html>\n\n<body>\n\n<html:form action=\"\
  MonkeyPreferencesForm.do\"> Monkey 的名称：\n\n**<html:text property=\"monkey.name\"\
