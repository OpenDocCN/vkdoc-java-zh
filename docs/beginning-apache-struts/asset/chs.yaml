  \ 8-2 对 Bean 标签库做了同样的说明。你可以在附录 C 中找到每个标签的详细信息。表 8-1 和表 8-2 基于 Apache 软件基金会提供的文档。Apache\
  \ 许可证可在 http://www.apache.org/licenses/LICENSE-2.0 获取。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
