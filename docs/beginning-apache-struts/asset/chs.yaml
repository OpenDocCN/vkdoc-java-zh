  \ 年 1 月 16 日星期一 下午 3:20\n\n第 19 章 ■ 开发插件\n\n**291**\n\n是最近创建的对象。这是理解 addSetNext()工作原理的关键，可能有点令人困惑，所以我们一步一步来理解。\n\
  \n再看清单 19-12，指令\n\ndigester.addObjectCreate(\"users\", \"Users\"); 将路径/users（我加了前导/来表示这是一个路径）映射到\
  \ Users 类。\n\n因此，每次 Digester 遇到/users 标签时，它都会创建一个新的 Users 对象。我们继续往下看：digester.addSetNext(\"\
  users/user\", \"addUser\"); 这告诉 Digester，在解析完路径为/users/user 的标签（并因此创建了一个 User bean）后，它必须调用与/users/user\
  \ 的*父路径*相关联的对象上的 addUser()函数。/users/user 的父路径显然是/users，并且我们知道与/users 路径关联的对象是 Users\
  \ 对象。因此，addUser()函数会在该 Users bean 上被调用，并将最新的 User 作为 addUser()的参数。\n\n请注意，无需实现循环来读取每个\
  \ User。每次 Digester 遇到与你使用 addObjectCreate()、addSetProperties()或 addSetNext()声明的路径相匹配的路径时，它都会执行函数所指示的相应操作。\n\
