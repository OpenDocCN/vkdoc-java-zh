  \ 表单 Bean 在函数 `initModuleConfig()` 中被读取。\n*   插件由 `initModulePlugIns()` 按顺序处理。稍后你将看到，所有插件都将有机会查询和操作\
  \ `ModuleConfig` 实例。\n*   在读取 `struts-config.xml` 文件后，`ModuleConfig` 实例会被“冻结”。`ModuleConfig`\
