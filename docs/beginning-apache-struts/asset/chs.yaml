  \ SHALE\n\n**331**\n\n我们选择了第二条路径。这正是 `setContainer()` 函数的作用所在。它允许 JSF 保存一个 UI 组件的副本——即\
  \ `<h:form>` UI 组件——该组件与我们希望定位的 `<h:message>` 标签属于同一个命名容器。在清单 20-10 中，我们将这个保存的副本命名为\
  \ `_container`，因为 `<h:form>` 包含了我们感兴趣的所有其他 UI 组件（参见清单 20-11）。\n\nJSF 如何知道它需要调用这个函数？如果你查看清单\
  \ 20-11，`<h:form>` 的声明是：\n\n<h:form binding=\"#{user.container}\">\n\n这会导致与 `<h:form>`\
  \ 对应的 UI 组件通过 `setContainer()` 方法保存到 `User` 类上。\n\n不幸的是，故事并未就此结束！当我们的某个页面被重新加载，或者当你从一个页面导航到另一个页面时，JSF\
  \ 还会使用 `getContainer()` 方法从用户后台 Bean 中检索出 UI 组件并进行嫁接。它会将之前存储的 `<h:form>` UI 组件及其所有子节点，嫁接到它看到绑定被创建的位置。\n\
  \nJSF 这样做是为了允许后台 Bean 改变页面的外观。如果使用得当，这是一种创建动态视图的非常强大的技术。你可以利用这种技术在 Web 应用中添加、移除或重新定位元素（如工具栏、按钮或迷你窗口）。\n\
  \n然而，在我们的案例中，我们并不希望出现这种行为，因此我们必须将 `getContainer()` 的返回值设置为 `null`。这会告诉 JSF 不要嫁接任何东西，而是调用\
  \ `setContainer()` 并保存 `<h:form>` 的一个副本。\n\n有了这些背景知识，接下来的两行代码应该很容易理解：\n\nString\
  \ clientId = _container.findComponent(\"userId\").getClientId(context);\ncontext.addMessage(clientId,\
  \ new FacesMessage(msg));\n\n第一行使用 `_container` 通过 `findComponent()` 方法定位名为 `userId`\
  \ 的 UI 组件。然后在该 UI 组件上调用 `getClientId()` 方法，以获取绝对 ID（并添加了命名容器的前缀）。下一行使用这个绝对 ID（clientId）为该\
  \ UI 组件附加一条错误消息。\n\n我们做的最后一件事是返回 `null`。这向 JSF 表明没有“下一个”页面——当前页面需要重新显示。这是相对于 Struts\
  \ 的一个优势，Struts 要求你在 `struts-config.xml` 中声明“输入”页面。\n\n这引出了一个有趣的话题：JSF 究竟是如何知道它应该将\
