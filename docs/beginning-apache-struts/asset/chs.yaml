  \ 与 Struts**\n\n如前所述，JSTL 的创建是为了给 JSP 开发者提供一套全面的标签来执行各种通用任务。其最终目标是让 JSP 开发者完全避免使用脚本片段。\n\
  \n你可能会问，是什么让 JSTL 成为比脚本片段更具吸引力的替代方案。请看清单 10-5，然后对比清单 10-6（JSTL 版本）。\n\n**清单 10-5.**\
  \ *数到 99*\n\n<%@ page contentType=\"text/html;charset=UTF-8\" language=\"java\"\
  \ %>\n\n<html>\n\n<body>\n\n<%\n\nfor(int i = 1; i <= 99; i++){\n\n%>\n\n这是第 <%=\
  \ i %> 次迭代\n\n<%\n\n}\n\n%>\n\n</body>\n\n</html>\n\n**清单 10-6.** *使用 JSTL 数到 99*\n\
  \n<%@ page contentType=\"text/html;charset=UTF-8\" language=\"java\" %>\n\n\n\n\
  <%@ taglib uri=\"http://java.sun.com/jstl/core\" prefix=\"c\" %>\n\n<html>\n\n<body>\n\
  \n<c:forEach var=\"i\" begin=\"1\" end=\"99\" step=\"1\"> 这是第 <c:out value=\"${i}\"\
  /> 次迭代\n\n</c:forEach>\n\n</body>\n\n</html>\n\n即使在这个简单的示例中，也能明显看出 JSTL 示例（清单 10-6）比使用脚本小程序的清单\
  \ 10-5 更具可读性。\n\n现在，正如我所说，JSTL 是一个庞大的实用标签库，要有效覆盖它们需要一整本书的篇幅。\n\n■**注意** 你可以参考《Pro\
