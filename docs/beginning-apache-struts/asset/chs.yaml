  \n需要注意以下四点：\n\n• `ActionForm` 子类上对应的属性必须是布尔类型。\n\n• `value` 属性指定了当复选框被选中时，传递给 `setXXX()`\
  \ 方法的参数。因此，如果你指定 `value=\"true\"`（或 `on` 或 `yes`），那么当复选框被选中时，会调用 `setXXX(true)`。如果你为\
  \ `value` 使用了任何其他设置，那么当复选框被选中时，会调用 `setXXX(false)`。\n\n• 只有当 `value` 等于 `getXXX()`\
  \ 的返回值时，复选框才会显示为选中状态。因此，如果 `value=\"true\"`（或 `on` 或 `yes`）且 `getXXX()` 也返回 `true`，那么复选框会显示为选中状态。类似地，如果\
  \ `value` 不是 `true`（或 `on` 或 `yes`）且 `getXXX()` 返回 `false`，那么复选框也会显示为选中状态。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
