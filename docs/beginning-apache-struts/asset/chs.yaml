  \ 章 ■ 基本 Struts 标签\n\n**图 8-3.** *显示错误*\n\n要显示一个不与任何实际表单属性关联的通用错误消息，你可以使用一个特殊的*全局属性*。在你的\
  \ `ActionForm` 或 `Action` 中，你可以使用键 `ActionMessages.GLOBAL_MESSAGE`：\n\n`errors.add(ActionMessages.GLOBAL_MESSAGE,\
  \ new ActionMessage(...));` 并在 `<html:errors>` 标签上使用属性值 `org.apache.struts.action.GLOBAL_MESSAGE`：\n\
  \n`<html:errors property=\"org.apache.struts.action.GLOBAL_MESSAGE\"/>` **HTML 和\
