  \ Monday, January 16, 2006 3:20 PM\n\n**280**\n\n第 19 章 ■ 开发插件\n\n我们希望在 DynaForms\
  \ 插件中实现其他一些功能：\n\n• “子表单 bean”可以覆盖 <form-property> 的初始值或类型。\n\n• DynaForms 不得对表单\
  \ bean 的类类型施加任何限制。你应该能够使用 DynaForms 声明*任何*表单 bean。\n\n• 应该有一种机制来防止“祖先”表单 bean（这些\
  \ bean 永远不会在你的 struts-config.xml 文件中使用）被实例化。这可以节省系统资源。为了实现这一点，我将在 <form-bean> 中添加另一个名为\
  \ create 的属性。\n\n将 create 设置为 false 将禁止创建该表单 bean。例如，如果我们想禁止创建清单 19-2 中的 .vehicle，我们可以使用\n\
  \n<form-bean name=\".vehicle\" create=\"false\" ....\n\n总之，除了 extends 和 create 属性之外，新的表单\
  \ bean 声明看起来与原始的 Struts 声明完全相同。\n\n此外，我还将做一个大的简化：新的表单 bean 声明将不支持 <set-property>\
