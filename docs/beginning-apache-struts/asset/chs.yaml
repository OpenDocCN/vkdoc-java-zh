  \ 之外，唯一重要的类是 `ActionErrors`。我们将在后续章节中再讨论另外两个类。\n\n`ActionErrors` 是 `validate()`\
  \ 的返回值，它本质上就像一个 `HashMap`，用于按键存储错误消息。如果 `validate()` 返回 `null` 值（或一个空的 `ActionErrors`\
