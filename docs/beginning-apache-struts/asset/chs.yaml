  \n**插**件是扩展 Struts 基本功能的绝佳方式。在前面的章节中，你已经见识过插件的作用——在 Tiles 和 Validator 框架中。在本章中，我将引导你开发一个名为\
  \ DynaForms 的实用且非平凡的插件。本质上，DynaForms 插件为动态表单 Bean 带来了类似 Tiles 的继承机制。稍后我将更详细地解释这意味着什么。\n\
  \n这个想法的灵感来源于两篇优秀的文章：Samudra Gupta 撰写的《为 Struts 增添趣味》第 1 部分和第 2 部分（参见本章末尾的“有用链接”）。\n\
  \nSamudra 针对实现动态表单 Bean 继承机制问题的解决方案涉及对 Struts 基础类（主要是 `ActionServlet`）进行子类化。\n\n\
  不幸的是，正如 Samudra 在其文章中所讨论的，他的解决方案存在几个缺点：继承声明有些笨拙且受限。如果你有兴趣了解更多，可以查阅这些文章的详细信息。\n\n\
  在本章中，我们将采取一条不同的路线，希望是一条更清晰的路线——这意味着你将更多地了解 Struts 的内部工作原理。我们将创建一个插件，允许开发者在 `struts-config.xml`\
  \ *之外* 的 XML 文件中创建具有继承性的表单 Bean。\n\n为了更好地理解讨论内容，建议你手头有一份最新的 Struts 源代码副本（下载站点请参见“有用链接”；本章我将使用\
  \ 1.2.7 版本），并将其放入 Eclipse（或类似 IDE）的项目中。像 Eclipse 这样的 IDE（再次参见“有用链接”）对于轻松追踪函数调用、声明和类层次结构是绝对必要的。你也可以用记事本完成，但那会非常无趣。\n\
  \n**当前任务**\n\n考虑图 19-1 中所示的实体层次结构（Samudra 第一篇文章中主要示例的变体）。\n\n**277**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
