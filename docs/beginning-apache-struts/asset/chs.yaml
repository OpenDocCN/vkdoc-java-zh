  \ >\n\n此页面存在错误！\n\n</logic:messagesPresent>\n\n或者，你可以测试特定的错误消息：\n\n<logic:messagesPresent\
  \ property=\"email\">\n\n电子邮件地址字段存在错误！\n\n</logic:messagesPresent>\n\n如果你的 Action\
