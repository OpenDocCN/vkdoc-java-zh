  **messagesPresent/messagesNotPresent**\n\n`messagesPresent` 是一个条件标签，当当前请求中存在指定消息或错误消息时，执行其标签体。`messagesNotPresent`\
  \ 是 `messagesPresent` 的反向操作。\n\n请注意以下术语：\n\n• “错误消息”是存储在 `ActionMessages/ActionErrors`\
  \ 实例中的 `ActionMessage` 实例，而该实例又存储在请求中 `Globals.ERROR_KEY` 键下。\n\n• “消息”是存储在 `ActionMessages/ActionErrors`\
  \ 实例中的 `ActionMessage` 实例，而该实例又存储在请求中 `Globals.MESSAGE_KEY` 键下。\n\n例如，你的 `ActionForm`\
  \ 的 `validate()` 方法可能返回一个包含一个或多个 `ActionMessage` 实例的 `ActionErrors` 实例。这些 `ActionMessage`\
  \ 实例按键存储，正如你在第 6 章和第 7 章中看到的那样。该键称为相应错误消息/消息的“名称”。\n\n错误消息和消息都可以通过 `<html:errors>`\
  \ 显示，或通过 `<html:messages>` 迭代。\n\n使用限制\n\n无。\n\n属性\n\n共有三个属性：`name`、`property` 和\
  \ `message`。\n\n\n\n请注意，`name` 和 `property` 属性并不具有其通常的含义。相反，会根据这些属性的设置进行以下检查：\n\n\
  • 如果未指定任何属性，`messagesPresent` 仅检查当前请求中是否存在错误消息。如果存在错误消息，则执行其标签体。\n\n设置 `message=\"\
  true\"` 会使 `messagesPresent` 转而检查是否存在任何消息。\n\n• 如果指定了 `property` 属性，`messagesPresent`\
  \ 会检查是否存在具有该名称的错误消息。同样，设置 `message=\"true\"` 会转而检查是否存在相应的消息。\n\n• `name` 属性允许你在请求中查找错误消息/消息，但使用的键不是\
  \ `Globals.ERROR_KEY` 或 `Globals.MESSAGE_KEY`。请注意，如果你指定了 `message` 属性，则 `name` 属性将被忽略。\n\
  \n• 如果指定了 `name` 属性，那么即使请求中的是字符串或字符串数组，也会匹配成功。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
