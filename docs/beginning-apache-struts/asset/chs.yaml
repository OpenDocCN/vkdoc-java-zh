  **root**\n\n此标签用于指定一个基础对象。\n\n你可以使用 `root` 来指定一个与当前对象不同的基础对象（例如在 `<html:form>` 标签内部的情况），或者在没有基础对象时定义一个基础对象（例如在\
  \ `<html:form>` 外部的任何地方）。\n\n使用限制\n\n无，但显然你需要指定 `name` 属性才能实现任何功能。\n\n属性\n\n只有一个属性\
  \ `name`，它是当前请求中 JavaBean 的名称。\n\n该 Bean 被用作所有由 `<nested:root>` 包裹的嵌套标签的新基础对象。\n\
  \n示例\n\n假设你想在 `<html:form>` 中使用 `<bean:write>` 访问一个嵌套属性，但希望基础对象是名为 `MyBean` 的对象，而不是\
  \ `<html:form>` 隐含的基础对象。\n\n你可以这样做：\n\n<html:form action=...\n\n<bean:write name=\"\
  MyBean\" property=\"contact.name\"/>\n\n<bean:write name=\"MyBean\" property=\"\
  contact.email\"/>\n\n<bean:write name=\"MyBean\" property=\"contact.company\"/>\n\
  \n</html:form>\n\n要使用嵌套标签实现同样的效果，你需要使用 `<nested:root>`：\n\n<html:form action=...\n\
  \n<nested:root name=\"MyBean\">\n\n<nested:nest property=\"contact\">\n\n<nested:write\
  \ property=\"name\"/>\n\n<nested:write property=\"email\"/>\n\n<nested:write property=\"\
  company\"/>\n\n</nested:nest>\n\n</nested:root>\n\n</html:form>\n\n如你所知（参见相应参考），`<html:form>`\
  \ 定义了一个隐式的基础对象，即与该表单关联的表单 Bean。`<nested:root>` 允许你临时重新定义这个基础对象。这在 `<html:form>`\
  \ 外部也同样有效。例如，代码片段\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048AppC.fm\
