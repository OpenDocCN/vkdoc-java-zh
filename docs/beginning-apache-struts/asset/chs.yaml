  \n(\n\n(user\n\n(user_id (REQUIRED PRIMARY (VARCHAR 32)))\n\n(password (REQUIRED\
  \ (VARCHAR 32)))\n\n)\n\n)\n\n清单 A-2 应该是不言自明的。user_id 和 password 字段都是必填字段，并且 user_id\
  \ 字段被用作主键。\n\n当在清单 A-2 描述的模式上运行 Lisptorq 时（我将在下面的实验中向你展示如何操作），输出将是*四个*模型类，外加四个其他辅助类。通常，对于数据库模式中的每个表，会生成四个模型类。\n\
  \n\n\n前两个类被称为*数据对象*类，本质上是为表中每一列提供属性的 JavaBean。持久化操作由*对等类*处理，这些类包含用于在数据库中保存、删除和搜索数据对象的方法。因此，使用\
  \ Lisptorq 为清单 A-2 生成的 Model 类如下：\n\n• BaseUser：包含 user_id 和 password 的 getter 和\
  \ setter 方法。它还包含一个 save() 方法，用于将类中的数据持久化。\n\n• BaseUserPeer：包含用于持久化 BaseUser 类的函数。它包含\
  \ doSave()、doDelete() 和 doSelect() 等函数，分别用于保存、删除和搜索用户。\n\n• User：一个表示用户的空类。你可以在此类中编写自己的附加函数。User\
  \ 继承自 BaseUser。\n\n• UserPeer：BaseUserPeer 的一个空子类。此类允许你扩展 BaseUserPeer 的功能。\n\n\
  为一个数据库实体拥有四个类可能看起来有点复杂，但这种看似疯狂的做法自有其道理。User 类（数据对象）保存数据，而 UserPeer 类（对等类）用于从数据库中保存、删除或检索数据对象。\n\
  \nBase 类包含自动生成的函数，负责执行实际工作。非 Base 类（User 和 UserPeer）则提供给你，以便在 Base 类的基础上添加额外的功能。\n\
