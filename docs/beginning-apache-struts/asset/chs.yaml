  \ *子类化 ActionForm*\n\n\n\n当用户提交表单时，Struts 会用数据填充对应的 `ActionForm` 子类，然后调用 `validate()`\
  \ 来执行所需的简单验证。该函数如下所示：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C06.fm\
