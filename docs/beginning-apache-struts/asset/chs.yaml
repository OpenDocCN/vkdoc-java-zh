  \ndateOK = validateDate(date,\"mm/dd/yyyy\");\n\n}else{ //捕获所有日期验证\n\ndateOK = validateDate(date,\"\
  dd/mm/yyyy\");\n\n}\n\n在清单 12-1 中，`getLocale()` 是 ActionForm 基类的一个函数。`validateDate()`\
