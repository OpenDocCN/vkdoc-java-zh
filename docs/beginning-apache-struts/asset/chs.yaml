  \n    /**\n     * 在此 ViewController 支持 Bean 被实例化，并且上述所有属性设置器被调用之后，但在 JSF 请求处理生命周期开始之前调用。\n\
  \     */\n    public void init();\n\n    /**\n     * 在 UI 树恢复后调用。因此，如果页面是第一次显示，则*不会*调用此方法。\n\
  \     */\n    public void preprocess();\n\n    /**\n     * 在“渲染响应”阶段之前调用。此方法仅对实际将要渲染的视图调用。例如，如果你已导航到不同的视图，则不会调用此方法。\n\
  \     */\n    public void prerender();\n}\n```\n\n如果你的*受管* Bean 实现了 `ViewController`\
  \ 接口，Shale 将在适当的时候调用你的 `ViewController` 实现上的事件处理函数（请参考清单 20-13 中的注释）。\n\n其理念是让你在这些函数中集中处理资源的创建或销毁活动。\n\
  \n■**注意** `AbstractViewController` 类实现了 `ViewController`，为 `isPostBack()` 和 `setPostBack()`\
  \ 提供了可运行的实现，并为事件处理程序提供了空操作实现。如果需要，你可以为了方便而扩展此类。\n\n一个重要的陷阱是，你必须为你的 `<managed-bean>`\
  \ 使用正确的名称。\n\n\n\n名字可不能随便取！你的受管 Bean 的名称（这里指的是在 `faces-config.xml` 中声明的名称，而非后台 Bean\
  \ 的类名）必须与关联的 JSP 页面名称（称为*视图标识符*）相匹配。以下是一些示例：\n\n• 如果视图标识符是 `/logon.jsp`，那么受管 Bean\
  \ 必须命名为 `logon`。\n\n• 如果视图标识符是 `/admin/logon.jsp`，那么受管 Bean 必须命名为 `admin$logon`。\n\
  \n• 如果视图标识符是 `/header.jsp`，那么受管 Bean 必须命名为 `_header`，因为单独的 `header` 在 JSF 中是保留字。\n\
  \n由此可见，受管 Bean 与 JSP 页面之间存在一一对应的关系。这与我们在注册 Web 应用中使用的一对多关系形成了对比。\n\n所有这些可能看起来有点抽象，因此我们将把\
  \ ViewController 思想应用到一个“实际”的例子中——注册 Web 应用，该应用需要创建和释放数据库连接。清单 20-14 展示了这个类，为了清晰起见，省略了其中的逻辑。\n\
  \n**清单 20-14.** *用户后台 Bean，第二版*\n\n```java\npackage net.thinksquared.reg;\n\n//...其他导入语句已省略\n\
  \norg.apache.shale.view.AbstractViewController;\n\npublic class User extends AbstractViewController{\n\
  \n    Connection _connection; //数据库连接\n\n    //...其他私有变量\n\n    //...构造函数\n\n  \
  \  //...数据 get/set 方法\n\n    //...UI get/set 方法\n\n    //-------------------------------------\
  \ 动作\n\n    public String Register(){\n        //使用 _connection 读写数据库\n    }\n\n\
  \    public String Logon(){\n        //使用 _connection 读写数据库\n    }\n\n    //-------------------------------------\
  \ 用于 ViewController\n\n    public void init(){\n        //创建数据库连接 _connection。\n\
  \    }\n\n    public void destroy(){\n        //释放数据库连接 _connection。\n    }\n\n\
  }\n```\n\n在清单 20-14 中，你可以看到我们如何利用 ViewController 提供的功能来集中管理数据库连接的创建和释放。\n\n当然，由于\
  \ Shale 假定受管 Bean 与视图之间是一一映射的关系，因此 `<managed-bean>` 声明（参见清单 20-8）必须按照清单 20-15 所示进行更改。\n\
  \n**清单 20-15.** *注册 Web 应用的新 `<managed-bean>` 声明*\n\n```xml\n<managed-bean>\n  \
  \  <managed-bean-name> **logon**</managed-bean-name>\n    <managed-bean-class>net.thinksquared.reg.User</managed-bean-class>\n\
  \    <managed-bean-scope>request</managed-bean-scope>\n</managed-bean>\n\n<managed-bean>\n\
  \    <managed-bean-name> **register**</managed-bean-name>\n    <managed-bean-class>net.thinksquared.reg.User</managed-bean-class>\n\
  \    <managed-bean-scope>request</managed-bean-scope>\n</managed-bean>\n```\n\n\
  如你所见，我们使用了前面讨论过的命名规则。此外，`register.jsp` 和 `logon.jsp` 中的 `binding` 和 `value` 属性也需要更改。不再使用\
  \ `#{used.XXX}`，而必须根据情况使用 `#{logon.XXX}` 或 `#{register.XXX}`。\n\n**对话框管理器**\n\n\
  根据 Shale 网站的描述，Shale 的对话框管理器是一种“定义与用户‘对话’的机制，该对话需要多个 HTTP 请求来实现，并以状态图的形式建模”。\n\n\
  因此，*对话框* 是一种跨越多个 HTTP 请求与用户的交互。Shale 允许你在一个 XML 文件（通常命名为 `dialog-config.xml`）中为对话框建模（你可以定义多个对话框）。你必须在\
  \ `web.xml` 文件中像这样声明它：\n\n```xml\n<context-param>\n    <param-name>org.apache.shale.dialog.CONFIGURATION</param-name>\n\
  \    <param-value>/WEB-INF/dialog-config.xml</param-value>\n</context-param>\n```\n\
  \n如果你有多个对话框配置文件，只需使用逗号作为分隔符将它们添加到声明中即可。\n\n每个“对话框”都以状态图的形式建模。清单 20-16 展示了我们如何为注册\
  \ Web 应用定义几个对话框。\n\n**清单 20-16.** *注册 Web 应用的对话框（dialog-config.xml）*\n\n```xml\n\
  <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE dialogs PUBLIC\n    \"-//Apache\
  \ Software Foundation//DTD Shale Dialog Configuration 1.0//EN\"\n    \"http://struts.apache.org/dtds/shale-dialog-config_1_0.dtd\"\
  >\n\n<dialogs>\n    <dialog name=\"Logon\" start=\"Perform Logon\">\n        <action\
  \ name=\"Perform Logon\" method=\"#{logon.Logon}\">\n            <transition outcome=\"\
  success\" target=\"Exit\"/>\n            <transition outcome=\"register\" target=\"\
  Register User\"/>\n        </action>\n        <subdialog name=\"Register User\"\
  \ dialogName=\"Register User\">\n            <transition outcome=\"success\" target=\"\
  Exit\"/>\n        </subdialog>\n        <end name=\"Exit\" viewId=\"/success.jsp\"\
  />\n    </dialog>\n\n    <dialog name=\"Register User\" start=\"Registration Form\"\
  >\n        <view name=\"Registration Form\" viewId=\"/register.jsp\">\n        \
  \    <transition outcome=\"register\" target=\"Perform Registration\"/>\n      \
  \  </view>\n        <action name=\"Perform Registration\" method=\"#{register.Register}\"\
  >\n            <transition outcome=\"success\" target=\"Exit\"/>\n        </action>\n\
  \        <end name=\"Exit\" viewId=\"/success.jsp\"/>\n    </dialog>\n</dialogs>\n\
  ```\n\n清单 20-16 的逻辑应该很清晰。请注意，我们在这里使用了清单 20-15 中新的 `<managed-bean>` 声明。\n\n■**注意**\
  \ 注册 Web 应用并未完全展示 Shale 对话框的实用性，因为用户交互仅跨越了几个页面。\n\n请注意，在清单 20-16 中，所有转换信息都包含在 `dialog-config.xml`\
  \ 文件中。但在我们之前的 JSF 实现中，JSP 页面直接像这样调用用户后台 Bean 上的函数：\n\n```jsp\n<h:commandButton action=\"\
  #{user.Logon}\" ... //参见清单 20-11\n<h:commandLink action=\"register\"> ... //参见清单\
  \ 20-11\n<h:commandButton action=\"#{user.Register}\" ... //参见清单 20-12\n```\n\n\
  我们必须将它们更改为：\n\n```jsp\n<h:commandButton action=\"dialog:Logon\" ...\n<h:commandLink\
  \ action=\"dialog:Register User\"> ...\n<h:commandButton action=\"register\" ...\n\
  ```\n\n因为现在导航是使用 Shale 的对话框管理器执行的，而不是由 JSF 的默认导航处理器执行。请注意，`action` 属性现在以 `dialog:XXX`\
  \ 开头，其中 `XXX` 是对话框的“名称”。提交注册信息的命令按钮（在 `register.jsp` 上）：\n\n```jsp\n<h:commandButton\
  \ action=\"register\" ...\n```\n\n有所不同，因为它需要返回一个逻辑结果，而不是直接进入一个对话框：\n\n```xml\n<view\
  \ name=\"Registration Form\" viewId=\"/register.jsp\">\n    <transition **outcome=\"\
  register\"** target=\"Perform Registration\"/>\n</view>\n```\n\n最后，请注意，你可以混合使用 JSF\
  \ 类型的导航和 Shale 基于对话框的导航。要进入 Shale 对话框，你只需使用名为 `dialog:XXX` 的逻辑结果即可。在我们的例子中，我们已经将所有导航元素从清单\
  \ 20-8 移到了对话框配置文件中，因此 `faces-config.xml` 文件现在应该只包含 `<managed-bean>` 声明。\n\n**练习**\n\
  \n下载最新版本的 Shale 发行版（参见“有用链接”），并按照我们到目前为止讨论的方式实现注册 Web 应用。\n\n**与验证器框架的集成**\n\n在撰写本文时，与验证器框架的集成*不*包括使用\
  \ `validations.xml` 文件来声明验证规则。\n\n\n\n相反，Shale 与 Validator 框架的集成方式与 MyFaces 创建 JSF\
  \ 扩展的方法非常相似。Shale 的一大优势是，你可以像使用 Struts 一样创建客户端验证。\n\n然而，对于服务器端验证，至少目前来看，MyFaces\
  \ 的方法更简洁。Shale 仍是一个不断变化的目标！\n\n以下是使用 Shale 验证器标签的方法：\n\n**1.** 将 Commons Validator\
  \ 发行版中的 `validator-rules.xml` 文件添加到你的 `WEB-INF` 目录。你可以使用经典 Struts 自带的那个文件。\n\n**2.**\
  \ 添加这个标签库声明：`<%@ taglib uri=\"http://struts.apache.org/shale/core\" prefix=\"s\"\
  \ %>`。\n\n**3.** 使用 `<s:commonsValidator>` 将 Shale 的验证器添加到 JSF 输入组件中。\n\n如果你想要客户端验证，需要在\
  \ `<h:form>` 中添加额外的属性 `onsubmit='validateForm(this)'` 和子标签 `<s:validatorScript functionName=\"\
  validateForm\"/>`。前者调用 JavaScript 函数来验证表单，后者指示 Shale 粘贴 JavaScript 验证代码。\n\n清单 20-17\
  \ 展示了如何使用 Shale 的 Validator 框架重写 `logon.jsp`（参见清单 20-11）。像往常一样，我们删除了 `<f:verbatim>`\
  \ 标签。\n\n**清单 20-17.** *使用 Shale 的 logon.jsp*\n\n```jsp\n<%@ taglib uri=\"http://java.sun.com/jsf/html\"\
  \ prefix=\"h\"%>\n<%@ taglib uri=\"http://java.sun.com/jsf/core\" prefix=\"f\"%>\n\
  <%@ taglib uri=\"http://struts.apache.org/shale/core\" prefix=\"s\"%>\n\n<f:loadBundle\
  \ basename=\"net.thinksquared.reg.messages\"\n  var=\"reg_messages\"/>\n\n<html>\n\
  <body>\n<f:view>\n  <h:panelGroup>\n    <h:messages style=\"color:red\" globalOnly=\"\
  true\"/>\n    <h:outputText value=\"#{reg_messages['title_reg']}\"\n      style=\"\
  font-weight:bold\" />\n    <h:form binding=\"#{user.container}\"\n      onsubmit=\"\
  validateForm(this)\">\n      <h:outputText value=\"#{reg_messages['user_id']}\"\
  />\n      <h:inputText id=\"userId\"\n        value=\"#{logon.userId}\" required=\"\
  true\">\n        <s:commonsValidator type=\"mask\"\n          mask=\"^[A-Za-z0-9]{5,10}$\"\
  \n          arg=\"#{reg_messages['bad_user_id']}\"\n          server=\"true\"\n\
  \          client=\"true\"/>\n      </h:inputText>\n      <h:message for=\"userId\"\
  \ />\n      <h:outputText value=\"#{reg_messages['password']}\"/>\n      <h:inputText\
  \ id=\"password\" value=\"#{logon.password}\"\n        required=\"true\">\n    \
  \    <s:commonsValidator type=\"mask\"\n          mask=\"^[A-Za-z0-9\\-\\_]{5,10}$\"\
  \n          arg=\"#{reg_messages['bad_user_id']}\"\n          server=\"true\"\n\
  \          client=\"true\"/>\n      </h:inputText>\n      <h:message for=\"password\"\
  \ />\n      <h:commandButton action=\"dialog:Logon\"\n        value=\"#{reg_messages['logon']}\"\
  />\n      <s:validatorScript functionName=\"validateForm\"/>\n    </h:form>\n  \
  \  <h:commandLink action=\"dialog:Register User\">\n      <h:outputText value=\"\
  #{reg_messages['new_user']}\" />\n    </h:commandLink>\n  </h:panelGroup>\n</f:view>\n\
  </body>\n</html>\n```\n\n请注意，我们加入了前两个小节中所做的更改。\n\n**JNDI 集成**\n\nJNDI（Java 命名和目录接口）是\
  \ Java 企业版的一项功能，用于获取在 `web.xml` 或应用服务器配置设置中声明的资源的句柄。\n\n对 JNDI 的详细讨论超出了本书的范围。不过，Shale\
  \ 网站提供了几个简单的示例，我们将在此描述其变体。\n\nJNDI 涉及*环境条目*的概念，这些条目本质上就是 `web.xml` 中的变量声明。例如，假设你的\
  \ Web 应用需要在每个页面上显示公司徽标。你可以使用消息资源来存储 URL，但另一种方法是使用环境条目（我不推荐这种方法，仅用作示例）。\n\n首先，在 `web.xml`\
  \ 中声明环境条目：\n\n```xml\n<env-entry>\n  <description>公司徽标 GIF 的 URL</description>\n\
  \  <env-entry-name>logo</env-entry-name>\n```\n\n\n\n<env-entry-value>http://www.myco.myapp/logo.gif</env-entry-value>\n\
  \n<env-entry-type>java.lang.String<env-entry-type>\n\n</env-entry>\n\n你的 JSF 标签可以利用\
  \ Shale 的 JNDI 集成特性来访问这个环境条目：\n\n<h:graphicImage value=**#{jndi:logo}** />\n\n就是这样。`jndi:`\
  \ 前缀告诉 Shale，该绑定引用的是一个 JNDI 资源，在本例中，就是名为 `logo` 的环境条目。\n\n一个更实际的场景是获取数据库连接。JNDI\
  \ 允许你在 `web.xml` 中声明*数据源引用*。例如，你可以像下面这样为公司的员工数据库定义一个数据源引用：\n\n<resource-ref>\n\n\
  <description>MyCo 员工数据库</description>\n\n<res-ref-name>jdbc/MyCoPersonnelDB</res-ref-name>\n\
  \n<res-type>javax.sql.DataSource</res-type>\n\n<res-auth>Container</res-auth>\n\n\
  </resource-ref>\n\n通常，你需要在后台 bean 中创建和释放数据库连接。\n\n清单 20-18 展示了如何使用 Shale 的 JNDI\
  \ 集成来提供清单 20-14 中 `init()` 方法的实现。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
