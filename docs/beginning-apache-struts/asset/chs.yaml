  **Servlet 容器基础**\n\n既然你已经安装了 Tomcat，你需要知道如何在其上安装你的 Web 应用程序。本节中的信息适用于任何符合规范的 servlet\
  \ 容器，而不仅仅是 Tomcat。\n\n除了存放 `startup.bat` 和 `shutdown.bat` 的 `bin` 目录外，最重要的目录是 `webapps`\
  \ 目录，它将包含你的 Web 应用程序。\n\n一个 Web 应用程序被打包成一个 WAR 文件（**W**eb **A**pplication a**R**chive\
  \ 的缩写），它只是一个扩展名为 `.war` 的普通 JAR 文件。要部署一个 Web 应用程序，你只需将其 WAR 文件放入 `webapps` 目录，然后奇迹就发生了！Tomcat\
  \ 会自动为你安装它。\n\n你之所以知道这一点，是因为 Tomcat 会在 `webapps` 下创建一个与你的 Web 应用程序同名的*子目录*。\n\n\
  ■**注意** 如果你想**重新部署**一个 Web 应用程序，你必须**删除**现有 Web 应用程序的子目录。大多数 servlet 容器不会覆盖现有的子目录。\n\
  \nWAR 归档文件必须包含以下内容：\n\n• 一个 `WEB-INF` 目录，你需要在其中放入一个名为 `web.xml` 的文件，用于配置你的 Web 应用程序。Struts\
  \ 附带了一个你必须使用的 `web.xml` 文件。\n\n• 一个 `WEB-INF\\lib` 目录，你需要在其中放入所有 Struts JAR 文件，包括你的应用程序使用的任何第三方\
  \ JAR 文件。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C02.fm\
  \ Page 11 Tuesday, January 24, 2006 2:09 PM\n\n第 2 章 ■ Servlet 和 JSP 预览\n\n**11**\n\
  \n• 一个 `WEB-INF\\classes` 目录，用于存放你的 Web 应用程序的 `.class` 文件。\n\n• 你的 JSP、HTML、图像、CSS\
  \ 和其他文件。JSP 和 HTML 文件通常位于 WAR 归档文件的“根目录”，CSS 通常放在 `styles` 子目录中，而图像则放在（猜对了！）`images`\
  \ 子目录中。\n\n图 2-3 说明了这些信息。\n\n**图 2-3.** *简单 WAR 文件的结构*\n\n暂时不必过于担心需要记住这些细节。未来的实验会让你对它们了如指掌。\n\
