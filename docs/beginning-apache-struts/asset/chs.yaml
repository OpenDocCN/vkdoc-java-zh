  \ property 属性除外（稍后说明）。\n\nimage 有几个特定属性：\n\n• property: 指定基础对象上的函数，该函数返回一个 JavaBean，该\
  \ JavaBean 具有 setX(int x)和 setY(int y)函数，用于保存图像输入字段的鼠标点击坐标(x,y)。如果您想直接在基础对象上使用 setX()和\
  \ setY()，只需设置 property=\"\"。\n\n\n\n• src/srcKey/page/pageKey：使用其中一项来指定要使用的图像。`src`\
  \ 是图像的 URL。`page` 是图像的模块相对 URL（因此必须以斜杠开头）。带 `Key` 的版本是消息资源键，指向实际的 URL。\n\n• border：显示图像周围边框的宽度。单位为像素。\n\
  \n• locale：指定一个键，用于查找当前会话中存储的 `Locale` 对象。该对象用于确定任何已使用键的值。如果省略，则使用默认的 Struts 消息资源文件。\n\
