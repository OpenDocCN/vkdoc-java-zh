  \n我在这里要讨论的是 JSTL 与 Struts 标签之间的*交集*。幸运的是，这个交集是可管理的。JSTL 包含四个标签库：核心标签库、格式化标签库、XML\
  \ 处理标签库和数据库访问标签库。其中，只有核心标签库和格式化标签库属于这个交集。在这些标签库中，只有少数几个标签与我们相关。它们分为三类：\n\n• **输出**：由\
  \ `<c:out>` 标签执行。在 Struts 中，你会使用 `<bean:write>`。此外，格式化标签库中还有一些标签用于格式化文本和显示资源消息。\n\
  \n• **迭代**：由 `<c:forEach>` 标签执行。与之类似的 Struts 标签是 `<c:iterate>`。\n\n• **条件处理**：由\
  \ `<c:if>` 和 `<c:choose>...<c:when>` 标签执行。Struts Logic 标签库中有大量标签与之对应。\n\n在描述这三个\
  \ JSTL 标签之前，我们先来看看表达式语言（EL）。\n\nJSTL 的强大功能很大程度上归功于在其标签内部使用 EL。\n\n■**注意** 虽然我在这里结合\
  \ JSTL 标签介绍 EL，但这纯粹是出于教学目的。EL 独立于 JSTL，是 JSP 2.0 规范的一部分。\n\n**表达式语言（EL）**\n\nEL\
  \ 允许“支持 EL 的”标签的属性具有动态值。在 EL 出现之前，如果你想要动态属性，就必须在属性中嵌入脚本小程序或自定义标签（见清单 10-7），这会导致代码难以阅读。\n\
  \n清单 10-7 展示了一个典型场景，其中动态属性非常重要，以及如何使用脚本小程序来实现此功能。该代码片段使用一个（虚构的）自定义标签 `<h:tr>` 交替将表格行的颜色设为灰色，并输出带有一些花哨格式的\
  \ HTML 表格行。\n\n**清单 10-7.** *将表格行交替着色为灰色*\n\n<% for(int i = 0; i < 10; i++){ %>\n\
  \n<h:tr **bgcolor=\"#<%= (i%2 == 0)? 'FFFFFF' : 'DDDDDD' %>\"** >\n\n<td> 这是第 <%=\
  \ i %> 行 </td>\n\n</h:tr>\n\n<% } %>\n\n除非你是 Perl 程序员，否则我相信你会同意清单 10-7 难以阅读。EL 通过允许支持\
  \ EL 的标签拥有动态属性来解决这个问题。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C10.fm\
  \ 第 120 页 2006 年 1 月 24 日星期二 上午 10:12\n\n**120**\n\n第 10 章 ■ 更多标签\n\n例如，如果 `<h:tr>`\
  \ 是一个支持 EL 的标签，那么清单 10-7 可以重写为清单 10-8 所示，这样更具可读性。\n\n**清单 10-8.** *使用 EL 和 JSTL\
  \ 将表格行交替着色为灰色*\n\n<c:forEach var=\"i\" begin=\"0\" end=\"9\" step=\"1\">\n\n<h:tr\
  \ bgcolor=\"#**${(i%2 == 0)? 'FFFFFF' : 'DDDDDD'}**\">\n\n<td> 这是第 <c:out value=\"\
  ${i}\"/> 行 </td>\n\n</h:tr>\n\n</c:forEach>\n\n现在，EL 不仅仅是使用 `${...}` 分隔符代替 `<%...%>`\
  \ 分隔符的脚本小程序。EL 包含几个关键字和运算符，有助于实现为标签赋予动态属性的功能。我们接下来看看这些内容。\n\n**使用 EL**\n\nEL 表达式在\
  \ `${...}` 分隔符内进行求值。在 EL 表达式中，你可以使用许多常见运算符：\n\n• **算术运算符**：+、–、% 或 mod、*、/ 或 div\n\
  • **逻辑运算符**：and 或 &&、or 或 ||、not 或 !\n• **比较运算符**：< 或 lt、<= 或 le、== 或 eq、!= 或 ne、>\
  \ 或 gt、>= 或 ge\n• **条件求值**：(condition) ? A : B 如果 condition 为真则返回 A，否则返回 B\n\n\n\
  \n否则，A 或 B 可以是固定字符串（例如 `astring`）、变量或数值。\n\n不过，为了让代码更具可读性，请保持简洁。\n\n• **empty**\
  \ 运算符：在对象名称前加上 `empty`，用于判断该对象是否为空（数组、Collection、Enumeration、HashMap 或 Iterator）或为\
  \ null（其他任何对象）。\n\n这些运算符无需进一步解释，因为它们与 Java 中的运算符类似。\n\n你也可以在 EL 中使用*嵌套*属性和*索引*属性。嵌套属性与\
  \ Struts 中的相同：名称中的 `.` 分隔符表示嵌套属性。例如：`${myObject.myProperty}`\n\n返回 `myObject.getMyProperty()`\
  \ 的值。这里没什么特别的。\n\nEL 中的索引属性具有双重功能。你可以使用数值、字符串或变量进行索引。使用字符串进行索引等同于使用映射属性。表 10-3\n\
  \n提供了一些示例。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C10.fm\
