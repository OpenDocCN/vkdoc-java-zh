  • `name/property/scope`：您可以使用这些来创建多个请求参数。这些请求参数会被附加到最终的 URL。这些属性用于定位一个 `java.util.Map`\
  \ 类型的对象。Map 的键是参数名称，对应的值是参数值。如果您指定了 `property`，则还必须指定 `name`。\n\n• `useLocalEncoding`：如果设置为\
  \ `true`，则告诉 Struts 使用当前 `HttpServletResponse` 的任何字符编码。\n\n示例\n\n以下是使用全局转发的简单示例：\n\
