  \ C ■ S T R U T S 标 签 参 考\n\n**通用属性**\n\n与其他 Struts 标签库不同，Tiles 没有真正意义上的通用属性集。然而，确实存在一些通用属性。这些属性在表\
  \ C-14 中进行了描述。\n\n**表 C-14.** *Tiles 标签库中常用的属性* **属性**\n\n**描述**\n\ntemplate/component/page\n\
  \n这些是同义词，都指代包含布局信息的 JSP 页面。\n\nbeanName/beanProperty/beanScope\n\n这些属性用于在指定的 JSP\
  \ 作用域（application、session、request、page）或 Tile 的 ComponentContext 上（此时使用 beanScope=tile/component/template——这些也都是同义词）定位一个\
  \ JavaBean 实例（使用 beanName 和可选的 beanProperty）。如果未指定 beanScope，则会搜索所有作用域（首先是 ComponentContext，然后是所有\
  \ JSP 作用域）以查找命名的 JavaBean 实例。\n\nrole\n\n一个身份验证角色（参见 `<logic:present>` 条目中关于身份验证角色的讨论），远程用户必须拥有该角色，包含该标签的标签才会被处理。如果远程用户没有指定的角色，则跳过包含该标签的标签。\n\
  \nignore\n\n如果为 true（默认为 false），则如果找不到包含该标签的标签的数据（该数据通过标签的 name 属性确定；此 name 属性的解释因标签而异），则直接跳过对包含该标签的标签的进一步处理。ignore\
  \ 的默认值为 false，这意味着如果找不到标签的数据，则会抛出异常。\n\nflush\n\n如果为 true，则在处理标签之前刷新 OutputStream。此属性用于修复某些\
  \ Servlet 容器的问题。默认值为 false。\n\n**关于等效标签的说明**\n\n您应该注意，Tiles 没有纯粹的 JSF（或 JSTL）等效项。因此，我在所有条目中都省略了“等效项”部分。\n\
  \n**Tiles 标签库的 Struts-EL 标签**\n\n所有 Tiles 标签都有支持 EL 的版本。\n\n■**注意** 支持 EL 的标签是那些允许您使用\
  \ EL 表达式的标签。有关示例，请参阅第 10 章。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nDoray_6048AppC.fm Page 459 Tuesday, January 17, 2006 4:46 PM\n\n附 录 C ■ S T R\
  \ U T S 标 签 参 考\n\n**459**\n\n**insert**\n\n此标签将一个页面、Tiles 布局或控制器插入到包含它的页面中。您可以使用嵌套的\
  \ `<tiles:put>` 标签自定义布局。\n\n使用限制\n\n您必须指定要插入的内容。您可以使用 template/component/page 这些同义词，或者\
  \ definition、attribute 或 name 属性来实现。\n\n属性\n\n除了常用的 role、flush 和 ignore 属性（见表 C-14）之外，以下属性指定了要插入的内容：\n\
  \n• template/component/page：要插入的 JSP 页面的名称。\n\n• definition：要插入的 Tiles 定义的名称。\n\n\
  • attribute：引用要插入的 JSP 页面或 Tiles 定义的已定义属性。使用此属性假定您已在其他地方使用 `<tiles:put>` 定义了该属性。请参阅清单\
  \ 14-3 和 14-4 了解如何使用此属性。\n\n• name：要插入的 JSP 页面、Tiles 定义或 `<tiles:put>` 定义的属性的名称。\n\
  \n• beanName/beanProperty/beanScope：这些属性用于定位一个对象（参见表 C-14 了解如何操作）。定位到的对象以两种方式之一使用：(1)\
  \ 如果该对象是 `org.apache.struts.tiles.AttributeDefinition` 或 `org.apache.struts.tiles.ComponentDefinition`\
  \ 的实例，则它们代表要插入的 JSP 页面或 Tiles 定义。坦率地说，很难看出此选项何时有用。(2) 否则，将调用该对象的 `toString()` 方法，其结果用作要插入的\
  \ JSP 页面、Tiles 定义或 `<tiles:put>` 定义的属性的名称。\n\n您还可以在执行插入之前调用控制器代码来准备数据或显示消息。为此，您可以指定以下属性之一：\n\
  \n• controllerUrl：可以是表单处理程序的名称或 URL。\n\n• controllerClass：任何实现了 `org.apache.struts.tiles.Controller`\
