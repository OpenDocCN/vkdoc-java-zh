  \ January 12, 2006 10:59 AM\n\n**84**\n\n第 8 章 ■ 基本 Struts 标签\n\n在实验 4 中编写过自定义标签后，这对你来说应该不陌生。\n\
  \nTLD 文件和 Java 处理器都打包在你的 Struts 发行版中：\n\n• TLD 文件应放置在 `\\WEB-INF\\` 目录下。\n• Struts\
  \ 附带了一个你应该使用的 `web.xml` 文件。在撰写本文时，该 `web.xml` 文件已包含为你方便而声明的适当 `<taglib>` 部分。\n\n\
  但你应该始终自行检查，并在必要时为五个标签库插入 `<taglib>` 部分。\n\n• 这些标签的 Java 处理器类位于构成 Struts 二进制文件的各个\
  \ JAR 文件中，你应将其放置在你的 Web 应用的 `\\lib\\` 目录下（参见第 2 章）。\n\n■**警告** 请*不要*将 Struts JAR\
  \ 文件放在 Servlet 容器的“共享”或“公共”目录中。\n\n它们*不得*被共享。你必须在每个 Web 应用的 `\\lib\\` 目录中部署一套全新的文件。在某些情况下，共享可能导致\
  \ Servlet 容器抛出 `ClassNotFoundException`。\n\n**显示静态文本**\n\n你在清单 8-1 中可能首先注意到的是，图\
  \ 8-2 中的提示文本（如“注册新用户”等）并未出现在清单中。相反，`registration.jsp` 使用 `<bean:message>` 标签来显示这些内容。例如，标签\n\
  \n<bean:message key=\"registration.jsp.prompt.userid\"/> 显示为\n\n请输入用户 ID（5 到 15\
  \ 个字符之间）\n\n`<bean:message>` 标签可用于任何位置以显示静态文本。该标签上的 `key` 属性指向资源文件 `Application.properties`\
  \ 中的一个键值对，就像第 6 章和第 7 章中错误消息的情况一样。\n\n当然，你也可以在 JSP 中硬编码文本，但这会使你的应用更难以国际化和维护。\n\n\
  ■**注意** Struts 显示静态文本的简单方法只能帮你到这里。如果你有*大量*静态文本需要显示，那么使用像 FreeMarker 或 Velocity 这样的模板引擎（本书*不会*涵盖这两者）将是必要的。请参考“有用链接”部分获取一些网络资源。\n\
