  \n**表单与表单处理器**\n\nWeb 应用的核心在于获取用户输入并处理它们。在 Struts 中（与 HTML 一样），主要方式是通过*表单*。\n\n\
  在 Struts 中，表单在 `<html:form>` 容器标签内声明。这与你在 HTML 中声明表单的方式类似。`<html:form>` 元素具有 `action`\
  \ 属性，用于描述处理表单数据的处理器：\n\n<html:form action=\"Registration.do\" ...\n\n在此代码片段中，处理器名为\
  \ Registration。处理器是你的 `ActionForm` 子类（执行简单验证）与你的 `Action` 子类（执行业务逻辑）的*特定组合*。你将在下一章了解如何声明处理器。目前，你只需理解\
  \ `action` 属性指向你已定义的处理器。\n\n处理器传统上以 `.do` 前缀结尾，这告诉 Servlet 容器该动作将由 Struts 处理。此映射在\
  \ `web.xml` 中完成，如清单 8-2 所示（该清单也显示了 Struts ActionServlet 的声明）。这些声明已在 Struts 附带的 `web.xml`\
  \ 文件中为你完成。然而，对细节有一个高层次的理解是有用的，因此我将稍微偏离主题来讨论这一点。\n\n■**注意** 如果不清楚，清单 8-2 是 Apache\
  \ 软件基金会慷慨提供的 `web.xml` 文件的摘录。Apache 许可证可在 http://www.apache.org/licenses/LICENSE-2.0\
  \ 获取。\n\n**清单 8-2.** *Struts 的标准 Servlet 和 Servlet 映射声明*\n\n<servlet>\n\n<servlet-name>action</servlet-name>\n\
  \n<servlet-class>\n\norg.apache.struts.action.ActionServlet\n\n</servlet-class>\n\
