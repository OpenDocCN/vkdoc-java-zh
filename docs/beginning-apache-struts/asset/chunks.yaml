    ## Lab 18f: Up and Down a Search


    From a collection’s listing page (`list-search.jsp`), we’d like to edit the contacts
    in a collection, and navigate with **Previous** and **Next** buttons.


    That is, we want the collection’s listings to be a list of links (as it was for
    the **Full Listing** page in Chapter 13—see also Figure 18-4). If a link was clicked,
    the contact’s details would be displayed. The user can move up and down the collection,
    viewing the details of each contact using **Next** or **Previous** buttons at
    the top of the page. Figure 18-6 shows the **Contact Editing** page. The user
    can at any point make changes to a contact’s details. Doing so would cause the
    changes to be saved to the database, and the *same* contact’s details to be redisplayed.


    The main design challenge is accessing a given contact on the collection (when
    the user clicks the link), then navigating forward/backward along the collection
    to display other contacts for editing (when the user clicks **Next** or **Previous**).


    Before reading further, give yourself a few minutes to think of solutions to these
    problems.


    (*Hint*: You will have to look at the source for the `Scroller` interface.) The
    first problem is easily solved, since the `Scroller` interface has an `absolute()`
    function that allows us to go to the required contact on a collection, given the
    contact’s “offset” on the collection.


    > **Note** `Scroller`’s `absolute()` function is so named because concrete `Scroller`
    implementations contain a `java.sql.ResultSet` instance, which also has an `absolute()`
    function. `Scroller`’s `absolute()` function calls the underlying `ResultSet`’s
    `absolute()` function.


    Also, `<logic:iterate>` exposes an index variable (using the attribute `indexId`;
    see Chapter 10), which we can use to label the links on the listing. The `absolute()`
    function, along with an offset may be used to navigate up and down the collection’s
    listing. As we will see, this is simpler than it sounds!


    We’ll use `DispatchAction` (see Chapter 17) here, so be sure you understand how
    it works before proceeding. Complete the following:


    1. Amend `list-collection.jsp` so that the company name is now a link, pointing
    to `CollectionNav.do&action=go`, with a parameter called `offset` equal to the
    iterator’s index, and a parameter called `id` for the contact’s ID.

    2. Complete the implementation of `CollectionNavAction` so that if `action=go`,
    it initializes the form (a `ContactFormBean`) with the `Contact` determined from
    the given `id` parameter. Save the `offset` parameter on the session under a suitable
    key.


