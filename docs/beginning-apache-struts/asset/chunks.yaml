- fmt: '# Struts Tag Reference


    ## The Logic Tag Library


    The Logic tag library provides tags for conditional processing, looping, and flow
    control.


    - **Conditional processing**: `equal`/`notEqual`, `empty`/`notEmpty`, `greaterEqual`/`lessEqual`/`greaterThan`/`lessThan`,
    `match`/`notMatch`, `messagesPresent`/`messagesNotPresent` and `present`/`notPresent`.

    - **Looping**: The `iterate` tag.

    - **Flow control**: The `forward` and `redirect` tags.


    All of these tags, except the ones that involve flow control, have JSTL equivalents,
    so you should use the JSTL versions if you can.


    ### Common Attribute Sets


    There are two common attribute sets for the Logic tag library. The first, which
    we’ll call the Base Object attribute set (or `base-attrs` for short) is illustrated
    in Table C-11, and pertains to the JavaBean object that the corresponding tags
    apply to.


    **Table C-11.** *The `base-attrs` Attribute Set*


    | Attribute Name | Usage |

    | --- | --- |

    | `name` | The name of the base object. If this is omitted, then the implicit
    base object (if any) is used. If the tag is enclosed in an `<html:form>`, the
    implicit base object is the form bean associated with the form. |

    | `property` | The property on the base object, whose value is used in the functioning
    of the tag. For example, if the tag were a comparison tag, then the value of `property`
    on the base object is used in the comparison. This assumes a corresponding `getXXX()`
    function on the base object. |

    | `scope` | The scope on which to search for the object given by the `name` property.
    If `scope` is undeclared, then all scopes are searched for the object specified
    by the `name` property. The valid scopes are `page`, `request`, `session`, and
    `application`. |


    Some tags allow you to use values from other sources (that is, other than the
    property on the base object) in order to do their job. These Extended Property
    attributes (`exprop-attrs`) are listed in Table C-12.


    **Table C-12.** *The `exprop-attrs` Attribute Set*


    | Attribute Name | Usage |

    | --- | --- |

    | `cookie` | The name of the cookie to use. |

    | `header` | The name of the HTTP header to use. |


    ---


    ### `locale` / `bundle` Attributes


    These attributes are used to specify a different `Locale` object or message resource
    file. `locale` specifies a key that can be used to look up the `Locale` object
    stored on the current session. The `bundle` attribute is explained in more detail
    in the entry for `<bean:message>`. You’d use these in conjunction with `formatKey`
    to specify a locale different from the current user’s locale or a message resource
    file different from the default one.


    ### Examples


    The code:


    ```

    <bean:write name="myString" />

    ```


    will display the `String` referred to by `myString`.


    ```

    <bean:write name="MyBean" property="message" />

    ```


    will display the value of `MyBean.getMessage()`.


    ```

    <bean:write name="myFloat" format="#.##" />

    ```


    will display `myFloat = 3.1416` as `3.14`.


    ```

    <bean:write name="myCalendar" format="dd/mm/yyyy" />

    ```


    will format the date represented by `myCalendar` as `dd/mm/yyyy`. For example,
    20 Feb 2006 will be displayed as `20/02/2006`.


    ```

    <bean:write name="myCalendar" formatKey="app.format.dateFormat" />

    ```


    will use the value of the message key `app.format.dateFormat` as a format string.


    ### Equivalents


    You can use JSTL’s `<c:out>` to display a bean’s properties:


    ```

    <c:out value="${MyBean.message}"/>

    ```


    displays the value of `MyBean.getMessage()`. To format the output, you’d use JSTL’s
    Formatting tag library:


    ```

    <fmt:formatNumber value="${myFloat}" pattern="#.##" />

    ```


    as an equivalent to the number formatting given earlier, or:


    ```

    <fmt:formatDate value="${myCalendar}" pattern="dd/mm/yyyy" />

    ```


    JSTL’s Formatting tag library has numerous variations on formatting strings, dates,
    currencies, and numbers. You should consult the latest specification if you’re
    interested in learning more.


    Lastly, the `<s:write>` tag from the Struts-Faces integration library is yet another
    equivalent.


    ---


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    *Doray_6048AppC.fm Page 436 Tuesday, January 17, 2006 4:46 PM*


