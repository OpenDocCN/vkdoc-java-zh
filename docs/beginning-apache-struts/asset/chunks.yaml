    \ 和 `ResourceStreamInfo`，它们都实现了 `StreamInfo` 接口。\n\n您可以使用 `FileStreamInfo` 来允许下载静态文件。`FileStreamInfo`\
    \ 的构造函数为：\n```java\npublic FileStreamInfo(String contentType, File file)\n```\n\
    其含义不言自明。\n\n`ResourceStreamInfo` 允许用户下载 Web 应用根目录内的文件：\n```java\npublic ResourceStreamInfo(String\
    \ contentType,\n                          ServletContext context, String path)\n\
    ```\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C17.fm 第 244\
