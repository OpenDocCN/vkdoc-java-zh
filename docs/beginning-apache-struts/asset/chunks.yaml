    \ 14-2.** *一个空白的 Tiles 定义文件*\n\n```xml\n<?xml version=\"1.0\" encoding=\"ISO-8859-1\"\
    \ ?>\n\n<!DOCTYPE tiles-definitions PUBLIC\n\n\"-//Apache Software Foundation//DTD\
    \ Tiles Configuration 1.1//EN\"\n\n\"http://struts.apache.org/dtds/tiles-config_1_1.dtd\"\
    >\n\n<tiles-definitions>\n\n</tiles-definitions>\n```\n\n根标签是 `<tiles-definitions>`，它包含一个或多个\
    \ `<definition>` 标签，用于声明布局或组件。接下来的两节将展示如何操作。\n\n■**注意** Tiles DTD（文档类型定义）存储在 Struts\
    \ 发行版附带的 `struts.jar` 文件中。在该 JAR 文件中，DTD 的路径为 `/org/apache/struts/resources/tiles-config_1_1.dtd`。此文件还包含清单\
    \ 14-2 中使用的 `DOCTYPE` 元素。该 DTD 也存在于 Struts 发行版 zip 文件的 `/lib` 文件夹中。\n\n你可以将 Tiles\
    \ 定义拆分成多个文件。这对于需要多组外观或需要单独维护组件的大型项目非常有用。每个这样的 Tiles 定义文件都必须遵循清单 14-2 的格式，并且你需要在插件声明中声明每个文件。只需在\
    \ `<set-property>` 标签中用逗号分隔文件名即可。例如，如果你有三个 Tiles 定义文件：`A.xml`、`B.xml` 和 `C.xml`，那么\
    \ `<set-property>` 标签应写为：\n\n```xml\n<set-property property=\"definitions-config\"\
    \n              value=\"/WEB-INF/A.xml,/WEB-INF/B.xml,/WEB-INF/C.xml\"/>\n```\n\
    \n最后，Tiles 还使用一个自定义标签库 `struts-tiles.tld`。你需要在 `web.xml` 文件中声明它（参见第 3 章），以便在你的\
    \ JSP 中使用该标签库。\n\n**用于布局的 Tiles**\n\n布局是为你的 Web 应用程序创建统一外观的一种方式。例如，你可能希望所有 JSP\
    \ 页面都包含一个包含版权信息的页脚、一个侧边导航栏以及一个带有公司徽标的页眉。\n\n在 Tiles 中，布局就是 JSP 页面。布局的 JSP 页面定义了各个部分（正文、页眉、页脚、侧边栏等）在显示页面上的相对位置。每个部分的内容由指向其他包含内容的\
    \ HTML 或 JSP 页面的 `<tiles:insert>` 标签定义。清单 14-3 是一个包含标题、页眉、正文和页脚部分的简单布局。\n\n**清单\
    \ 14-3.** *simple-layout.jsp，一个包含标题、页眉、正文和页脚的简单布局*\n\n```jsp\n<%@ taglib uri=\"\
    /tags/struts-tiles\" prefix=\"tiles\" %>\n<html>\n<head>\n<title>**<tiles:getAsString\
    \ name=\"title\"/>**</title>\n</head>\n<body>\n<table>\n<tr><td>**<tiles:insert\
    \ attribute=\"header\"/>**</td></tr>\n<tr><td>**<tiles:insert attribute=\"body\"\
    />**</td></tr>\n<tr><td>**<tiles:insert attribute=\"footer\"/>**</td></tr>\n</table>\n\
    </body>\n</html>\n```\n\n如清单 14-3 所示，布局仅定义了内容的*相对位置*，而非实际内容本身。图 14-1 展示了布局中各个组件的相对位置。\n\
    \n**图 14-1.** *simple-layout.jsp 中页眉、正文和页脚的相对位置*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nDoray_6048C14.fm Page 165 Tuesday, January 24, 2006 10:13 AM\n\n第 14 章 ■ T I\
    \ L E S\n\n**165**\n\n`<tiles:getAsString>` 标签显示标题的内容，而 `<tiles:insert>` 标签则显示与\
    \ `attribute` 或 `name` 属性对应的内容。这些属性指向的实际内容可以在被调用的 JSP 或 Tiles 定义文件中定义。\n\n例如，假设\
    \ `myPage.jsp` 想要使用清单 14-3 中的布局（`simple-layout.jsp`）。清单 14-4 展示了 `myPage.jsp`\
    \ 可能的内容。\n\n**清单 14-4.** *myPage.jsp，它使用了 simple-layout.jsp*\n\n```jsp\n<%@ taglib\
    \ uri=\"/tags/struts-tiles\" prefix=\"tiles\" %>\n<tiles:insert page=\"/layouts/simple-layout.jsp\"\
    >\n  <tiles:put name=\"title\" value=\"A simple page\" />\n  <tiles:put name=\"\
    header\" value=\"/common/header.jsp\" />\n  <tiles:put name=\"footer\" value=\"\
    /common/footer.jsp\" />\n  <tiles:put name=\"body\" value=\"/mypage-content.jsp\"\
    \ />\n</tiles:insert>\n```\n\n`myPage.jsp` 所做的只是（使用 `<tiles:put>` 嵌套标签）指定*哪些*文件与页眉、页脚和正文属性相关联。标题被指定为一个字符串，在此例中为\
    \ \"A simple page\"。\n\n请注意清单 14-3 和 14-4 中 `<tiles:insert>` 用法的区别：\n\n*   在布局\
    \ JSP（清单 14-3）中，使用 `attribute` 属性来告诉 Struts 它应该使用什么内容来替换外层的 `<tiles:insert>` 标签。例如，当\
    \ Struts 处理清单 14-3 中的 `<tiles:insert attribute=\"header\"/>` 时，它本质上是在请求对象上查找 `header`\
    \ 的值。然后它使用这个值（一个 JSP 页面，或者如我们将在下一节中看到的，一个组件）并将该页面或组件的内容粘贴到 `<tiles:insert>` 标签的位置。\n\
    *   在被调用的 JSP（清单 14-4）中，使用 `page` 属性来指定一个布局，并且该布局的输出用于替换 `<tiles:insert>` 标签。嵌套的\
    \ `<tiles:put>` 标签在请求对象上定义 Tiles 属性。布局读取这些属性以创建其输出。例如，当 Struts 处理清单 14-4 中的 `<tiles:insert>`\
    \ 时，它知道必须使用布局文件 `/layouts/simple-layout.jsp`。在这个布局文件中，有几个 `<tiles:insert>` 标签需要创建\
    \ `header`、`footer` 和 `body` 属性。每个属性的值都在调用 JSP 中使用 `<tiles:put>` 标签定义。\n\n需要注意的是，使用\
    \ `<tiles:put>` 标签定义的属性仅适用于外层 `<tiles:insert page=\"...\">` 标签中定义的布局。在极少数情况下，如果你的被调用\
    \ JSP 页面中有两个 `<tiles:insert page=\"...\">` 标签，则必须分别为每个标签指定属性。这两个标签之间的属性是不共享的。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C14.fm Page 166\
    \ Tuesday, January 24, 2006 10:13 AM\n\n**166**\n\n第 14 章 ■ T I L E S\n\n■**注意**\
    \ `<tiles:insert>` 标签的 `page`、`template` 和 `component` 属性是同义词。你可以使用不同的同义词来指示使用的是布局还是\
    \ Tiles 组件（参见下一节）。这仅仅是为了提高可读性。\n\n指定 `attribute` 或 `name` 属性值的另一种方法是在 Tiles 定义文件中创建一个定义。例如，你可以将清单\
    \ 14-4 的一部分移到 Tiles 定义文件中，如清单 14-5 所示。\n\n**清单 14-5.** *tiles-def.xml，包含一个单一的定义*\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"ISO-8859-1\" ?>\n\n<!DOCTYPE tiles-definitions\
    \ PUBLIC\n\n\"-//Apache Software Foundation//DTD Tiles Configuration 1.1//EN\"\
    \n\n\"http://struts.apache.org/dtds/tiles-config_1_1.dtd\">\n\n<tiles-definitions>\n\
    \n  <definition name=\".simple\" path=\"/layouts/simple-layout.jsp\">\n    <tiles:put\
    \ name=\"header\" value=\"/common/header.jsp\" />\n    <tiles:put name=\"footer\"\
    \ value=\"/common/footer.jsp\" />\n  </definition>\n\n</tiles-definitions>\n```\n\
    \n清单 14-5 展示了一个名为 `.simple` 的 Tiles 定义文件（前导点的含义稍后会变得明显）。这个定义只定义了两个属性：`header`\
    \ 和 `footer`。\n\n要在 JSP 中使用 `.simple` 定义，请参见清单 14-6。\n\n**清单 14-6.** *myPage2.jsp，它使用了\
    \ Tiles 定义*\n\n```jsp\n<%@ taglib uri=\"/tags/struts-tiles\" prefix=\"tiles\"\
    \ %>\n<tiles:insert **definition=\".simple\"** >\n  <tiles:put name=\"title\"\
    \ value=\"A simple page\" />\n  <tiles:put name=\"body\" value=\"/mypage-content.jsp\"\
    \ />\n</tiles:insert>\n```\n"
- fmt: "# Listings 14-5 and 14-6\n\nListings 14-5 and 14-6 together show how to use\
    \ a Tiles definition instead of a layout path. Shared attributes are the ones\
    \ defined in the Tiles definitions file, while attributes specific to a called\
    \ JSP page are defined on that page. This makes sense, because you might want\
    \ to fix the header and footer but change the title and body of the displayed\
    \ page.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**Quick Quiz**\n\
    \nWhat advantage does this approach (Listings 14-5 and 14-6) have over the earlier\
    \ one (Listing 14-4)?\n\nTiles layout definitions can even be “subclassed.” For\
    \ example, suppose we wanted a new definition similar to the old one (in Listing\
    \ 14-5), but where the title was fixed and the footer was changed. Listing 14-7\
    \ shows the amended definitions file.\n\n**Listing 14-7.** *tiles-def.xml, with\
    \ a New Definition*\n\n```xml\n<?xml version=\"1.0\" encoding=\"ISO-8859-1\" ?>\n\
    \n<!DOCTYPE tiles-definitions PUBLIC\n  \"-//Apache Software Foundation//DTD Tiles\
    \ Configuration 1.1//EN\"\n  \"http://struts.apache.org/dtds/tiles-config_1_1.dtd\"\
    >\n\n<tiles-definitions>\n  <definition name=\".simple\" path=\"/layouts/simple-layout.jsp\"\
    >\n    <tiles:put name=\"header\" value=\"/common/header.jsp\" />\n    <tiles:put\
    \ name=\"footer\" value=\"/common/footer.jsp\" />\n  </definition>\n\n  <definition\
    \ name=\".simple.admin\" extends=\".simple\" >\n    <tiles:put name=\"title\"\
    \ value=\"Admin Zone\" />\n    <tiles:put name=\"footer\" value=\"/common/admin-footer.jsp\"\
    \ />\n  </definition>\n</tiles-definitions>\n```\n\nThe `extends` property indicates\
    \ that the new definition named `.simple.admin` borrows all properties and attributes\
    \ from the base `.simple` definition.\n\n> **Note:** That’s the rationale behind\
    \ the `.` separator—you can tell at once that `.simple` has no ancestor definitions,\
    \ and that `.simple.admin` descends directly from `.simple`.\n\nThe nested `<tiles:put>`\
    \ tags either override certain attributes (`footer`) or add new ones (`title`).\
    \ The new definition is used in exactly the same way as the old one.\n\nThe last\
    \ way to define and use layouts is to define them *completely* in the Tiles definitions\
    \ file. Continuing from Listing 14-7:\n\n```xml\n<definition name=\".simple.admin.main\"\
    \ extends=\".simple.admin\" >\n  <tiles:put name=\"body\" value=\"/admin/body.jsp\"\
    \ />\n</definition>\n```\n\nIn this case, you have no need for a JSP page in which\
    \ to embed the definition, since this new definition defines all attributes needed\
    \ to display the layout. You may use this definition by calling it from either\
    \ a `<forward>` in `struts-config.xml`:\n\n```xml\n<forward name=\"success\" path=\"\
    .simple.admin.main\" />\n```\n\nor as an input page like so:\n\n```xml\n<action\
    \ path=\"/MyFormHandler\" input=\".simple.admin.main\" ...\n```\n\n## Using Stylesheets\
    \ with Layouts\n\nMost professional web apps use Cascading Style Sheets (CSS)\
    \ to achieve common fonts and colors. When you attempt to use stylesheets with\
    \ Tiles layouts, you might run into problems. For example, suppose your stylesheet\
    \ is `\\styles\\styles.css`, and your layout references this stylesheet, as shown\
    \ in Listing 14-8.\n\n**Listing 14-8.** *Snippet of simple-layout.jsp with Static\
    \ Stylesheet Reference*\n\n```jsp\n<%@ taglib uri=\"/tags/struts-tiles\" prefix=\"\
    tiles\" %>\n<html>\n<head>\n  <style type=\"text/css\" media=\"screen\">\n   \
    \ @import \"./styles/styles.css\";\n  </style>\n  <title> <tiles:getAsString name=\"\
    title\"/> </title>\n</head>\n...\n```\n\nThis stylesheet declaration is fine if\
    \ all your JSPs that use this layout are in the root folder of the web application.\
    \ This may not be feasible for larger applications. For example, you might want\
    \ to place “admin” pages in a separate `\\admin\\` subfolder. Doing so would mean\
    \ that the reference to the stylesheet is now `../styles/styles.css` (note the\
    \ leading `..`). The static stylesheet reference in Listing 14-8 won’t do.\n\n\
    A useful hack is to use the `getContextPath()` function on the `request` object\
    \ to get around this limitation. The stylesheet declaration of Listing 14-8 now\
    \ becomes:"
