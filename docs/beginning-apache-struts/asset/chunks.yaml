    toString() 方法返回值即为单个参数值。参数名称由 paramId 指定。


    • name/property/scope：用于创建多个请求参数。这些请求参数会附加到链接的最终 URL 中。这些属性用于定位一个 `java.util.Map`
    类型的对象。Map 的键是参数名称，对应的值是参数值。如果指定了 property，则必须同时指定 name。


