    \ L E\n\n**331**\n\nWe’ve taken the second route. That’s what the `setContainer()`\
    \ function is for. It allows JSF to save a copy of a UI component—the `<h:form>`\
    \ UI component—which belongs to the same naming container as the `<h:message>`\
    \ tags we wish to locate. In Listing 20-10, we’ve called this saved copy `_container`\
    \ because `<h:form>` contains all the other UI components we’re interested in\
    \ (see Listing 20-11).\n\nHow does JSF know it needs to call this function? If\
    \ you look at Listing 20-11, the declaration for `<h:form>` is\n\n```\n<h:form\
    \ binding=\"#{user.container}\">\n```\n\nThis causes the UI component corresponding\
    \ to `<h:form>` to be saved on the `User` class using `setContainer()`.\n\nUnfortunately,\
    \ this isn’t the end of the story! When one of our pages is reloaded, or if you\
    \ navigate from one page to another, JSF also grafts the UI component retrieved\
    \ from the user backing bean using `getContainer()`. It grafts the previously\
    \ stored `<h:form>` UI component and all its child nodes into the place it sees\
    \ the `binding` being made.\n\nJSF does this to allow backing beans to alter the\
    \ appearance of a page. Used correctly, this is a very powerful technique for\
    \ creating dynamic Views. You can use this technique to add or remove or reposition\
    \ elements (like toolbars, buttons, or mini-windows) in your webapp.\n\nIn our\
    \ case, though, we don’t want this behavior, so we must set the return value of\
    \ `getContainer()` to `null`. This tells JSF not to graft anything but to call\
    \ `setContainer()` and save a copy of the `<h:form>` instead.\n\nWith all this\
    \ background, the next two lines should be easy to interpret:\n\n```\nString clientId\
    \ = _container.findComponent(\"userId\").getClientId(context);\ncontext.addMessage(clientId,\
    \ new FacesMessage(msg));\n```\n\nThe first line uses `_container` to locate the\
    \ UI component named `userId` using `findComponent()`. `getClientId()` is then\
    \ called on this UI component in order to get the absolute id (with the naming\
    \ container’s prefix added). The next line uses this absolute id (`clientId`)\
    \ to attach an error message for that UI component.\n\nThe last thing we do is\
    \ to return `null`. This indicates to JSF that there is no “next” page—the current\
    \ page needs to be redisplayed. This is an advantage over Struts, which requires\
    \ you to declare the “input” page in `struts-config.xml`.\n\nThis brings us to\
    \ an interesting topic: how exactly does JSF know that it should interpret the\
    \ return value of `Register()` as a “next” page? The answer is the JSF tag that\
    \ calls `Register()`:\n\n```\n<h:commandButton action=\"#{user.Register}\" ...\n\
    ```\n\nYou can see that the button calls `user.Register()`, and interprets it\
    \ as an “action.” Essentially, the UI component corresponding to this `<h:commandButton>`\
    \ calls `Register()`, then creates an `ActionEvent` (similar to Struts’ `ActionForward`).\
    \ `ActionEvent`s are processed during the Invoke Application phase. An `ActionEvent`\
    \ with a `null` logical outcome causes the page to be redisplayed.\n\nThis section\
    \ contains a lot of information to take in one go, so don’t be discouraged if\
    \ you’re not confident about the details. I recommend you tackle the next section\
    \ (after a short break!) and then try out the Registration webapp exercise at\
    \ the end of this section.\n\n## The View\n\nThe main Views in the Registration\
    \ webapp are `logon.jsp` (Listing 20-11), to perform user logon, and `register.jsp`\
    \ (Listing 20-12), to register new users.\n\n### Listing 20-11. *logon.jsp*\n\n\
    ```\n<%@ taglib uri=\"http://java.sun.com/jsf/html\" prefix=\"h\"%>\n<%@ taglib\
    \ uri=\"http://java.sun.com/jsf/core\" prefix=\"f\"%>\n<%@ taglib uri=\"http://myfaces.apache.org/extensions\"\
    \ prefix=\"x\"%>\n<f:loadBundle basename=\"net.thinksquared.reg.messages\"\n \
    \   var=\"reg_messages\"/>\n<html>\n<body>\n<f:view>\n<h:panelGroup>\n<h:messages\
    \ style=\"color:red\" globalOnly=\"true\"/>\n<h:outputText value=\"#{reg_messages['title']}\"\
    \n    style=\"font-weight:bold\" />\n```"
