- fmt: "# Tiles Tag Library Reference\n\n## `definition`\n\nDeclares a layout or customized\
    \ layout for later use.\n\n## `put`\n\nAdds a Tiles attribute to the current context.\n\
    \n## `putList` and `add`\n\n`putList` defines a list attribute in the current\
    \ context. `add` is used to add items to the list.\n\n## `get`\n\nWrites a specified\
    \ JSP or Tiles definition to the response stream.\n\n## `getAsString`\n\nWrites\
    \ a specified Tiles attribute as a literal string to the response stream.\n\n\
    ## `useAttribute`\n\nExposes a Tiles attribute to scriptlets or other custom tags.\n\
    \n## `importAttribute`\n\nAllows scriptlets or other custom tags to read Tiles\
    \ attributes.\n\n## `initComponentDefinitions`\n\nLegacy tag that allows the use\
    \ of Tiles outside of Struts.\n\n---\n\n## Common Attributes\n\nUnlike the other\
    \ Struts tag libraries, Tiles has no real common attribute sets. However, there\
    \ are a number of common attributes. These are described in Table C-14.\n\n**Table\
    \ C-14.** *Commonly Used Attributes in the Tiles Tag Library*\n\n| Attribute |\
    \ Description |\n|-----------|-------------|\n| `template`/`component`/`page`\
    \ | These are synonymous, and they all refer to a JSP page containing layout information.\
    \ |\n| `beanName`/`beanProperty`/`beanScope` | These attributes are used to locate\
    \ a JavaBean instance (using `beanName` and optionally `beanProperty`) on a specified\
    \ JSP scope (`application`, `session`, `request`, `page`) or on the Tile's `ComponentContext`\
    \ (in which case you use `beanScope=tile`/`component`/`template`—these are all\
    \ synonymous). If `beanScope` isn't specified, then all scopes (first the `ComponentContext`\
    \ and then all JSP scopes) are searched for the named JavaBean instance. |\n|\
    \ `role` | An authentication role (see the discussion on authentication roles\
    \ in the entry for `<logic:present>`) that the remote user must have in order\
    \ for the enclosing tag to be processed. If the remote user does not have the\
    \ specified role, the enclosing tag is skipped. |\n| `ignore` | If `true` (the\
    \ default is `false`), then if data for the enclosing tag (which is determined\
    \ using the `name` attribute for the tag; this `name` attribute will have interpretations\
    \ that vary by tag) is not found, simply skip further processing for the enclosing\
    \ tag. The default value of `ignore` is `false`, which means that an exception\
    \ is thrown if the tag's data can't be found. |\n| `flush` | If `true`, causes\
    \ the `OutputStream` to be flushed before the tag is processed. This attribute\
    \ is needed to fix problems with some servlet containers. The default is `false`.\
    \ |\n\n## A Note on Equivalent Tags\n\nYou should note that there are no pure\
    \ JSF (or JSTL) equivalents for Tiles. So, I've omitted the \"Equivalents\" section\
    \ on all entries.\n\n## Struts-EL Tags for the Tiles Tag Library\n\nAll Tiles\
    \ tags have EL-enabled versions.\n\n> **Note** EL-enabled tags are those that\
    \ allow you to use EL expressions. Refer to Chapter 10 for examples.\n\n---\n\n\
    ## `insert`\n\nThis tag inserts a page or Tiles layout or controller into the\
    \ enclosing page. You can customize a layout using nested `<tiles:put>` tags.\n\
    \n### Usage Restrictions\n\nYou must specify what to insert. You do this using\
    \ either the `template`/`component`/`page` synonyms or `definition` or `attribute`\
    \ or `name` attributes.\n\n### Attributes\n\nBesides the commonly used `role`,\
    \ `flush`, and `ignore` attributes (see Table C-14), the following attributes\
    \ specify what to insert:\n\n- `template`/`component`/`page`: The name of the\
    \ JSP page to insert.\n- `definition`: The name of the Tiles definition to insert.\n\
    - `attribute`: The defined property referring to a JSP page or Tiles definition\
    \ to insert. The use of this property assumes that you've defined the attribute\
    \ elsewhere using `<tiles:put>`. Refer to Listings 14-3 and 14-4 to see how to\
    \ use this attribute.\n- `name`: The name of the JSP page, Tiles definition, or\
    \ `<tiles:put>` defined property to insert.\n- `beanName`/`beanProperty`/`beanScope`:\
    \ These attributes are used to locate an object (see C-14 on how this is done).\
    \ The located object is used in one of two ways: (1) If the object is an instance\
    \ of `org.apache.struts.tiles.AttributeDefinition` or `org.apache.struts.tiles.ComponentDefinition`,\
    \ then these represent a JSP page or Tiles definition to insert. Frankly, it is\
    \ difficult to see when this option might be useful. (2) Otherwise, the object's\
    \ `toString()` is called, and this is used as the name of the JSP page, Tiles\
    \ definition, or `<tiles:put>` defined property to insert.\n\nYou can also call\
    \ controller code to prepare data or display messages before the insert is performed.\
    \ To do this, you can specify one of these attributes:\n\n- `controllerUrl`: This\
    \ can be a form handler's name or a URL.\n- `controllerClass`: Any class that\
    \ implements the `org.apache.struts.tiles.Controller` interface. This interface\
    \ has a single `execute()` method, as described in Listing 14-9.\n\n### Examples\n\
    \nThis code inserts a layout using `template`/`component`/`page`. Note the leading\
    \ slash:\n\n```\n<tiles:insert page=\"/mypage.jsp\" />\n```\n\nYou can also similarly\
    \ insert a Tiles definition:\n\n```\n<tiles:insert definition=\".basic\" />\n\
    ```\n\nFor more examples using `<tiles:insert>`, refer to Chapter 14.\n\n---\n\
    \n## `definition`\n\nThis tag declares a layout, or a customization of it, enabling\
    \ it to be reused. You call the definition from a `<tiles:insert>` to actually\
    \ use it.\n\nUsually, you first declare the definition in a shared JSP page, then\
    \ use `<%@ include file=\"...\" %>` to include that JSP in your pages that utilize\
    \ that definition.\n\n`<tiles:definition>` also allows you to customize an existing\
    \ layout or existing definition, then reuse that customized version in one or\
    \ more JSP pages of your own. You perform customization using `<tiles:put>` and\
    \ related tags.\n\nNotice that I haven't discussed the use of the `<tiles:definition>`\
    \ tag in Chapter 14 because a much better alternative is to declare your definitions\
    \ in the `tiles-defs.xml` file instead. This makes maintenance of your definitions\
    \ easier to track, and obviates the need to use shared JSP pages.\n\n### Usage\
