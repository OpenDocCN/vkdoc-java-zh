    The last two JSTL tags we’ll look at are <c:if> and <c:choose>...<c:when> for
    conditional processing.


    **The <c:if> and <c:choose>...<c:when> Tags**


    <c:if> allows you to process a single block of code if a test passes. The test
    itself is an EL


    expression referred to by the test attribute, as shown in Listing 10-11.


    **Listing 10-11.** *<c:if> in Action*


    <c:if **test="${(empty user.userid || empty user.password)}"** > Please key in
    your User ID and password.


    </c:if>


    In Listing 10-11, the message is displayed if the user ID or password are null.
    The <if> tag doesn’t support an else or if else block. If you want these, then
    you have to use the clumsier <choose> ... <when> tags (see Listing 10-12). If
    you’ve used Extensible Stylesheet Language (XSL), this should be very familiar.


    **Listing 10-12.** *<c:choose>...<c:when> in Action*


    <c:choose>


    <c:when test="${empty user.userid}">


    Please key in your userid.


    </c:when>


    <c:when test="${empty user.password}">


    Please key in your password.


    </c:when>


    <c:when test="${not user.loggedIn}">


    Sorry, couldn''t log you in.


    </c:when>


    <c:otherwise>


    You''re logged in!


    </c:otherwise>


    </c:choose>


    In Listing 10-12 there are two when clauses that test if the user ID and password
    are null, and another that tests whether the user is logged in. The last otherwise
    tag is a catchall block. Note that the otherwise block is optional.


