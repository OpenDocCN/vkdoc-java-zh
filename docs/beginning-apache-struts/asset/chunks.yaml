    **459**


    **insert**


    This tag inserts a page or Tiles layout or controller into the enclosing page.
    You can customize a layout using nested <tiles:put> tags.


    Usage Restrictions


    You must specify what to insert. You do this using either the template/component/page
    synonyms or definition or attribute or name attributes.


    Attributes


    Besides the commonly used role, flush, and ignore attributes (see Table C-14),
    the following attributes specify what to insert:


    • template/component/page: The name of the JSP page to insert.


    • definition: The name of the Tiles definition to insert.


    • attribute: The defined property referring to a JSP page or Tiles definition
    to insert.


    The use of this property assumes that you’ve defined the attribute elsewhere using


    <tiles:put>. Refer to Listings 14-3 and 14-4 to see how to use this attribute.


    • name: The name of the JSP page, Tiles definition, or <tiles:put> defined property
    to insert.


    • beanName/beanProperty/beanScope: These attributes are used to locate an object
    (see C-14 on how this is done). The located object is used in one of two ways:
    (1) If the object is an instance of org.apache.struts.tiles.AttributeDefinition
    or org.apache.struts.tiles.ComponentDefinition, then these represent a JSP page
    or Tiles definition to insert. Frankly, it is difficult to see when this option
    might be useful. (2) Otherwise, the object’s toString() is called, and this is
    used as the name of the JSP page, Tiles definition, or <tiles:put> defined property
    to insert.


    You can also call controller code to prepare data or display messages before the
    insert is performed. To do this, you can specify one of these attributes:


    • controllerUrl: This can be a form handler’s name or a URL.


    • controllerClass: Any class that implements the org.apache.struts.tiles.


    Controller interface. This interface has a single execute() method, as described
    in Listing 14-9.


    Examples


    This code inserts a layout using template/component/page. Note the leading slash:


