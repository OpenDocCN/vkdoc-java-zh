- fmt: '# 最终选择：JSF、Shale 还是 Struts？


    最终，选择哪种技术（`JSF`、`Shale` 或 `Struts`）取决于你的需求。话虽如此，如果你对 Apache 的产品感到满意，那么你很可能会倾向于使用
    `Shale` 而非纯 `JSF`。`Shale` 带来的优势如此之多，以至于使用它而不是纯 `JSF` 是一个无需思考的决定。


    `Shale` 的致命弱点在于它像任何新软件一样，处于不断变化的状态。


    在撰写本文时，许多服务被标记为“开发中”，这意味着它们随时可能发生变化。我确信当你读到这本书时，`Shale` 已经发生了重大变化。因此，如果你计划使用 `Shale`，你应该仔细研究你需要的功能，以确保它们相当稳定。`Struts`
    邮件列表（`Shale` 与经典 `Struts` 共享此列表，因此你应该在邮件中标注 `[Shale]`）以及 `Shale` 文档都是很好的资源。


    在 `Struts` 和 `Shale` 之间做出选择更加困难。如果你有一个现有的 `Struts` Web 应用程序，建议继续使用 `Struts`，因为将现有
    `JSP` 页面移植到使用 `JSF` 标签的成本通常高得令人望而却步。


    对于新项目，很难给出一个明确的答案。`Struts` 开发者自身以及参与 `JSF` 和 `Shale` 的人似乎无条件地倡导转向 `Shale` 或 `JSF`。我会更加谨慎，因为正如你所见，`JSF`（以及因此的
    `Shale`）比 `Struts` 更复杂。这并非高深莫测，但确实存在一个陡峭的学习曲线。


    然而，如果你发现自己一直在使用奇怪的技巧来迫使 `Struts` 让你的 Web 应用程序表现得像桌面应用程序，那么 `Shale` 绝对是你想要探索的，同时还有像
    `Spring` 这样的其他 Web 应用程序框架。


    我避免给你一个 `Struts`、`JSF` 和 `Shale` 的逐项功能比较。


    尽管它们从广义上讲都是 Web 应用程序框架，但它们的“最佳适用点”（它们大放异彩的场景）是不同的。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


