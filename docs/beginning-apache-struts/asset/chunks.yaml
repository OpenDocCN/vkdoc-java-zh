    ## 第8章 基本Struts标签


    ### 显示错误


    要显示一个不与任何实际表单属性关联的通用错误消息，可以使用特殊的*全局属性*。在`ActionForm`或`Action`中，使用键`ActionMessages.GLOBAL_MESSAGE`：


    ```java

    errors.add(ActionMessages.GLOBAL_MESSAGE, new ActionMessage(...));

    ```


    并在`<html:errors>`标签上使用属性值`org.apache.struts.action.GLOBAL_MESSAGE`：


    ```jsp

    <html:errors property="org.apache.struts.action.GLOBAL_MESSAGE"/>

    ```


    ## HTML和Bean标签库概要


    上一节描述了在Struts Web应用中70%时间会使用的所有标签。其余30%将在第10、11和14章中描述。附录C是所有标签的全面参考。


    在此，对HTML和Bean标签进行概要总结对您会很有帮助。表8-1列出了HTML标签库中的标签及其用途。表8-2对Bean标签库做了同样的事情。每个标签的详细信息可在附录C中找到。表8-1和表8-2基于Apache
    Software Foundation提供的文档。Apache许可证可在`http://www.apache.org/licenses/LICENSE-2.0`获取。


    **表8-1.** *HTML标签库概要*


    | 标签 | 用途/说明 |

