    bindings appear as `value=#{...}` on the input fields.) This is similar to how
    you’d link Struts tag inputs to `ActionForms`.


    The second section consists of a single getter and setter for a *UI component*.
    This should be entirely new to you since Struts does not have UI components. We’ve
    bound the `<h:form>` UI component to the user bean. (See Listings 20-11 and 20-12.
