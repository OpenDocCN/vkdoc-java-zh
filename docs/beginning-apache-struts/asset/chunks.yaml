    第 5 章


    ■ ■ ■


    MVC 设计模式


    **S**ervlet 技术是使用 Java 创建 Web 应用程序的主要基础。JavaServer Pages（JSP）技术基于 Servlet 技术，但通过允许轻松创建
    HTML 内容对其进行了扩展。


    请注意，JSP 技术并*不取代* Servlet 技术，而是*在其基础上构建*，以解决其某些缺陷。Struts 遵循这种模式，并在 Servlet 和 JSP
    技术的基础上构建，以解决它们的不足之处。这些不足之处主要体现在两个大的方面：


    • **创建“关注点分离”**：执行不同功能的代码片段被分别打包，并赋予标准化的相互通信方式。


    • **Web 应用程序的基础设施**：这包括验证用户输入、处理和报告错误以及管理流程控制等内容。


    如果这些不足之处得到解决，构建 Web 应用程序（健壮性、可维护性、本地化等）时遇到的实际问题就会变得更容易处理。


    一种可用于在解决这些问题上取得进展的工具是一种称为 **M**odel-**V**iew-**C**ontroller（MVC）设计模式的组织原则。


    **什么是设计模式？**


    设计模式本质上是解决通用编码问题的“配方”。它们不是算法，而是软件的*组织原则*。


    使用“设计模式”解决常见软件工程问题的想法最初因《设计模式：可复用面向对象软件的基础》（Addison-Wesley Professional, 1995）一书而声名鹊起，该书作者为
    Erich Gamma、Richard Helm、Ralph Johnson 和 John Vlissides。作者们将设计模式用于软件的灵感归功于建筑师
    Christopher Alexander 的早期著作《建筑模式语言》（牛津大学出版社，1977）。


    MVC 设计模式（本章的主题）最初于 20 世纪 80 年代在一种名为 Smalltalk 的 AI 语言中使用，用于解决与我们在此讨论的 Web 应用程序类似的问题。纯
    MVC 模式的一种变体也用于 Swing（Java 的独立于平台的 GUI 工具包）中。


    **37**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C05.fm Page 38 Monday, January 23, 2006 11:46 AM


    **38**


    第 5 章 ■ MVC 设计模式


    MVC 设计模式要求根据代码的功能进行分离：


    • **模型（Model）**：控制数据访问和持久化的代码


    • **视图（View）**：处理如何向用户呈现数据的代码


    • **控制器（Controller）**：处理模型和视图之间数据流和转换的代码 图 5-1 说明了 MVC。


    **图 5-1.** *MVC 设计模式*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C05.fm Page 39 Monday, January 23, 2006 11:46 AM


    第 5 章 ■ MVC 设计模式


    **39**


    除了这种分离之外，模型、视图和控制器代码还遵循一些隐含的约束：


    • 视图仅通过控制器从模型获取数据。


    • 控制器通过定义良好且最好是标准化的方式与视图和模型通信。例如，直接在控制器代码中嵌入 SQL 代码违反了这种标准化通信原则。使用公开数据访问函数的模型类则是控制器与模型之间标准化通信的一个例子。


    你可能不会立即明白这如何解决问题，但我希望你随着学习的深入，能够逐渐体会到 MVC 方法的力量。目前，你只需接受应用 MVC 设计模式有助于我们实现关注点分离这一更大的目标，而这极大地简化了
    Web 应用程序的构建。


    到目前为止，我们的讨论是有意保持相当通用的。*任何* Web 应用程序框架都会使用 MVC 原则，因此，理解它（独立于 Struts 对其的实现）对你是有好处的。


    稍后，我们将讨论 Struts 如何实现 MVC 设计模式。但在此之前，我将给你一个如何应用 MVC 设计模式的例子。


    **注册 Web 应用程序**


    许多 Web 应用程序都有“用户注册”功能。我相信你以前见过这个。例如，一些在线新闻网站有烦人的要求，即你必须“订阅”才能查看其内容。


    我将这个功能称为“注册 Web 应用程序”。我将做的是指定此 Web 应用程序的需求，对于每个需求，我将确定可能需要的代码类型（模型、视图或控制器）。


    **需求 1**


    要求用户指定用户 ID（userid）和密码，以及密码确认，如图 5-2 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00037.png)


    Doray_6048C05.fm Page 40 Monday, January 23, 2006 11:46 AM


    **40**


    第 5 章 ■ MVC 设计模式


    **图 5-2.** *注册 Web 应用程序主页面*


    讨论


    显然，你需要视图代码来创建包含用户 ID 和密码字段的表单。视图代码的输出将是 HTML。视图代码本身可能是这个显示的 HTML，或者是由 Servlet
    容器转换为 HTML 的 JSP。


    **需求 2**


    验证表单数据以检查格式错误的用户 ID 或密码。还会检查表单以确保两次输入的密码相同且长度正确。


    讨论


    你将需要控制器代码来执行验证。需要注意的一个重要点是，这些检查可以在不引用数据库的情况下完成。这意味着你可以在客户端（Web 浏览器）上进行验证（可能使用
    JavaScript），或者使用驻留在服务器上的 Java 类。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C05.fm Page 41 Monday, January 23, 2006 11:46 AM


    第 5 章 ■ MVC 设计模式


    **41**


    第一个选项会违反 MVC 关于视图和控制器严格分离的规则，因为 JavaScript 必须放置在需求 1 中的 HTML 或 JSP 代码中。即使你将 JavaScript
    验证器提取到一个单独的 .js 文件中，你仍然需要在 HTML/JSP 视图代码中添加控制器代码，以将表单值传递给 JavaScript 验证器。请不要误解我的意思；我*并不是*说客户端
    JavaScript 是从地狱深处爬出来的邪恶之物。我只是说，*手工编写*的客户端 JavaScript 来执行验证违反了 MVC。


    违反 MVC，*无论理由多么充分*，都会以降低可维护性为代价。


    幸运的是，鱼与熊掌可以兼得。Struts 为你提供了*自动生成*客户端 JavaScript 的选项，而不是使用手工编写的客户端 JavaScript。这将大大减少控制器/视图的重叠。当我们在第
    15 章介绍 Validator 框架时，你将看到它的实际应用。


    或者，我们可以简单地快刀斩乱麻，在服务器上完成所有验证。不幸的是，这并不总是一个选项，尤其是在客户端-服务器连接速度较慢的情况下。


    **需求 3**


    进一步检查数据以确保没有其他用户使用该用户 ID。


    讨论


    与需求 2 一样，我们显然需要控制器代码来运行验证。与需求 2 不同的是，客户端验证不太可行，因为我们可能需要与数据库核对以查明给定的用户 ID 是否存在。


    这也意味着我们需要模型代码来从数据库读取用户 ID。模型代码具有如下函数：


    public boolean exists(String userid)


    用于运行用户 ID 检查。我们的控制器代码将使用此函数来运行验证。


    **需求 4**

