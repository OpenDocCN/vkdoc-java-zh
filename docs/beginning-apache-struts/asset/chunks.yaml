    \ Page 23 Monday, December 12, 2005 3:47 PM\n\n第4章 自定义标签\n\n**自定义标签**是你创建的JSP标签，允许你为JSP定义新功能。例如，假设我们有一个名为`<temp:F>`的自定义标签，用于将摄氏度转换为华氏度。我们可以在JSP中使用它：水在100摄氏度时沸腾，即`<temp:F>100</temp:F>`华氏度。\n\
