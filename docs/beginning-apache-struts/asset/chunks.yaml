    \ JSTL uses the latter.\n\n• Failed to manually give unique IDs to *every* JSF\
    \ tag nested within any JSTL tags: The symptom of this is a \"Duplicate ID error\"\
    \ or something similar. In this case, simply give unique IDs to each JSF tag (or\
    \ JSF extension tag) nested within any JSTL tags. Usually, you can get away with\
    \ giving the `<s:form>` or `<h:form>` an ID.\n\nIf all else fails, don't be ashamed\
    \ to take a peek at the answers in the `lab-20-answers.zip` file in the Source\
    \ Code section of the Apress website.\n\n**Note** Due to licensing restrictions,\
    \ the answers zip file does not have the Sun JSF reference implementation. You\
    \ have to download this yourself.\n\n**Step 8: Put in the Necessary `<managed-bean>`\
    \ Declarations** This step addresses another shortcoming of the Struts-Faces integration\
    \ library that you might have noticed if you've got step 7 working: it's that\
    \ the `RegistrationForm` form bean does *not* get instantiated when you click\
    \ the browser's refresh button after successfully registering.\n\nThis can be\
    \ easily fixed by fooling JSF to create the necessary form bean for you. You do\
    \ this by creating a blank `faces-config.xml` file, then putting in a `<managed-bean>`\
    \ section with the bean name exactly the same as the one in `struts-config.xml`\
    \ (in our case, it's `RegistrationForm`).\n\nThis is a kludge, and I'm sure the\
    \ problem will be addressed in future iterations of the Struts-Faces library.\n\
    \n**In a Nutshell**\n\nWe've only scratched the surface of the Struts-Faces integration\
    \ library in this lab session. If you're interested, you should try out the sample\
    \ apps that come with the distribution.\n\nYou may also have noticed that except\
    \ for using `ActionErrors` you don't have to amend the `Action` or `ActionForm`\
    \ subclasses of your app. This of course is a huge plus, and is in most cases\
    \ much more desirable than migrating to a whole new framework like Shale.\n\n\
    However, you should be aware that the Struts-Faces library won't always work.\
    \ In an initial draft for this section, I attempted to migrate the login webapp\
    \ of Chapter 14, only to discover that you can't port Tiles that forward their\
    \ views to other JSPs, which is what the login webapp does. This is probably a\
    \ JSF restriction, so it's difficult to see how such issues might be resolved\
    \ in future versions of the Struts-Faces library. It might be possible to amend\
    \ the Tiles tags so that they work better with the Struts-Faces integration library.\n\
    \nThe lesson here is that you need a new framework that addresses such issues—a\
    \ reworking of Struts from the ground up. That's what Shale is all about.\n\n\
    **Struts Shale Preview**\n\nAs we've mentioned before, Shale is based on JSF.\
    \ This means it inherits all of JSF's advantages, like a highly customizable View\
    \ tier. But Shale adds many benefits on top of JSF.\n\nIn this section, we'll\
    \ walk you through the primary value-added areas of Shale. These fall into two\
    \ broad categories:\n\n• A set of services and service options. (Don't confuse\
    \ these with web services. The services here are akin to Struts plug-ins, and\
    \ service options are simply ways to configure Shale and its services.) Services\
    \ include integration with the Validator framework and a reworking of Tiles, now\
    \ called \"Clay.\" A significant new addition on top of these is Shale's Dialog\
    \ Manager, which makes control flow more transparent. The services were designed\
    \ with customization in mind, so Shale is easier to customize and extend compared\
    \ with Struts.\n\n• Integration with other frameworks and technologies (Spring,\
    \ Ajax, JNDI, etc.).\n\nIn my opinion, these and the advantages of JSF make Shale\
    \ a worthy successor of Struts. Unfortunately, technical superiority alone does\
    \ not guarantee survival, and for the reasons we've outlined in the sidebar at\
    \ the start of this chapter (\"Struts Ti and Struts OverDrive\"), Shale's \"successorship\"\
    \ from Struts classic is by no means a done deal.\n\n**ViewController**\n\nIn\
    \ JSF, backing beans are Plain Old Java Objects (POJOs). This gives you a lot\
    \ of flexibility in creating your backing beans, but it also means that your beans\
    \ have to do a lot of things \"by hand.\"\n\nA good example is a realistic implementation\
    \ of the user backing bean (see Listing 20-10). In my implementation, I used a\
    \ `HashMap` to simulate a database. In an actual implementation, you might have\
    \ to create and release database connections, and these might be best centralized\
    \ instead of being repeated in functions like `Logon()` and `Register()`.\n\n\
    Shale provides an *interface* called `ViewController` (see Listing 20-13), which\
    \ contains a few event-handling functions and a variable called `postback`.\n\n\
    **Listing 20-13.** *Shale's ViewController Interface*\n\n```\n/**********************************************************************\n\
    Licensed under the Apache License, Version 2.0 (the \"License\"); you may not\
    \ use this file except in compliance with the License. You may obtain a copy of\
    \ the License at\n\nhttp://www.apache.org/licenses/LICENSE-2.0\n\nUnless required\
    \ by applicable law or agreed to in writing, software distributed under the License\
    \ is distributed on an \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY\
    \ KIND, either express or implied.\n\nSee the License for the specific language\
    \ governing permissions and limitations under the License.\n**********************************************************************/\n\
    package org.apache.shale.view;\n\npublic interface ViewController{\n\n    /**\n\
    \     * Returns true if the page is called the second time around.\n     */\n\
    \    public boolean isPostBack();\n\n    /**\n     * Sets the \"post back\" flag.\n\
    \     */\n    public void setPostBack(boolean postBack);\n\n    /**\n     * Called\
    \ after the JSF request processing lifecycle has been\n     * completed for the\
    \ current request.\n     */\n    public void destroy();\n\n    /**\n     * Called\
    \ after this ViewController backing bean has been\n     * instantiated, and after\
    \ all of the property setters specified\n     * above have been called, but before\
    \ the JSF request processing\n     * lifecycle processing has started.\n     */\n\
    \    public void init();\n\n    /**\n     * Called after the UI tree has been\
    \ restored. So, it will NOT be\n     * called if the page is displayed for the\
    \ first time.\n     */\n    public void preprocess();\n\n    /**\n     * Called\
    \ before the \"Render Response\" phase. This method\n     * will be called only\
    \ for the view that will actually be\n     * rendered. For example, it will not\
    \ be called if you have\n     * performed navigation to a different view.\n  \
    \   */\n    public void prerender();\n}\n```\n\nIf your *managed* bean implements\
    \ the `ViewController` interface, Shale will call the event-handling functions\
    \ on your `ViewController` implementation at the appropriate times (refer to the\
    \ comments in Listing 20-13).\n\nThe idea is for you to centralize resource creation\
    \ or destruction activities in these functions.\n\n**Note** The class `AbstractViewController`\
    \ implements `ViewController`, with a functioning implementation for `isPostBack()`\
    \ and `setPostBack()`, and no-op implementations for the event handlers. If you\
    \ wish, you can extend this class for convenience.\n\nOne important gotcha is\
    \ that you have to have the right name for your `<managed-bean>`."
