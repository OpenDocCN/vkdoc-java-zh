    **119**


    What I will discuss here is the *intersection* between JSTL and Struts tags. Fortunately,
    this intersection is manageable. JSTL consists of four tag libraries: the Core,
    Formatting, XML Processing, and Database Access tag libraries. Of these, only
    the Core and Formatting tag libraries fall into the intersection. From these,
    only a few tags concern us. They fall into three categories:


    • **Output**: Performed by the <c:out> tag. In Struts, you’d use <bean:write>.
    There are also a number of tags from the Formatting tag library to format text
    and display resource messages.


    • **Iteration**: Performed by the <c:forEach> tag. The analogous Struts tag is


    <c:iterate>.


    • **Conditional processing**: Performed by the <c:if> and <c:choose>...<c:when>
    tags.


    These have a lot of tags from the Struts Logic library as counterparts.


    Before I describe these three JSTL tags, let’s take a look at the expression language
    (EL).


    Much of the power of JSTL is attributable to the use of EL within its tags.


    ■**Note** Although I’m introducing EL here with JSTL tags, this is for purely
    pedagogical reasons. EL is independent of JSTL and is part of the JSP 2.0 specification.


    **Expression Language (EL)**


    EL allows the attributes of “EL-enabled” tags to assume dynamic values. Before
    EL, if you wanted dynamic attributes, you had to embed scriptlets or custom tags
    within the attribute (see Listing 10-7), resulting in difficult-to-read code.


    Listing 10-7 illustrates a typical situation where dynamic attributes are important
    and how you might use scriptlets to achieve this functionality. The snippet alternately
    colors the rows of a table gray, using a (fictitious) custom tag, <h:tr>, to write
    out HTML table rows with some fancy formatting.


    **Listing 10-7.** *Alternately Coloring the Rows of a Table Gray*


    <% for(int i = 0; i < 10; i++){ %>


    <h:tr **bgcolor="#<%= (i%2 == 0)? ''FFFFFF'' : ''DDDDDD'' %>"** >


    <td> This is row number <%= i %> </td>


    </h:tr>


    <% } %>


    Unless you’re a Perl programmer, I’m sure you’ll agree that Listing 10-7 is difficult
    to read. EL solves this problem by allowing EL-enabled tags to have dynamic attributes.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C10.fm Page 120 Tuesday, January 24, 2006 10:12 AM


    **120**


    C H A P T E R 1 0 ■ M O R E T A G S


    For example, if <h:tr> were an EL-enabled tag, then Listing 10-7 could be rewritten
    as shown in Listing 10-8, which is more readable.


    **Listing 10-8.** *Alternately Coloring the Rows of a Table Gray, with EL and
    JSTL*


    <c:forEach var="i" begin="0" end="9" step="1">


    <h:tr bgcolor="#**${(i%2 == 0)? ''FFFFFF'' : ''DDDDDD''}**">


    <td> This is row number <c:out value="${i}"/> </td>


    </h:tr>


    </c:forEach>


    Now, EL isn’t just scriptlets with ${...} delimiters instead of <%...%> delimiters.
    EL


    includes several keywords and operators that aid in its role of endowing tags
    with dynamic attributes. We’ll take a look at this next.


    **Using EL**


    EL expressions are evaluated within the ${...} delimiters. Within an EL expression,
    you can use a number of common operators:


    • **Arithmetic operators**: +, –, % or mod, *, / or div


    • **Logical operators**: and or &&, or or ||, not or !


    • **Comparisons**: < or lt, <= or le, == or eq, != or ne, > or gt, >= or ge


    • **Conditional evaluation**: (condition) ? A : B returns A if condition is true
    and B'
