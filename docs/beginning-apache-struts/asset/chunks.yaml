- fmt: "# Processing Business Logic\n\nIn the previous chapter, you learned how to\
    \ run simple validations on user input. Within the Struts framework (or any sensible\
    \ framework, really), only after all simple validations pass is the data ready\
    \ to be processed by the system. This processing, usually referred to as “business\
    \ logic,” consists of three broad tasks:\n\n- **Complex validations**: These are\
    \ further validations that need to be run but, unlike simple validations, are\
    \ not generic. They require domain-specific processing, or communication with\
    \ the Model components of your webapp.\n- **Data transformations**: This includes\
    \ making calculations, saving data, and preparing data for output. This is the\
    \ meat of a particular task.\n- **Navigation**: This involves deciding what page\
    \ to display next to the user at the completion of the task.\n\nStruts centralizes\
    \ these three tasks in a single Controller class called `Action`.\n\n## 1,2,3\
    \ Action!\n\nJust as simple validation was performed by your subclass of `ActionForm`,\
    \ the processing of business logic is done by your subclass of `org.apache.struts.action.Action`.\n\
    \nWithin the MVC paradigm, your `Action` subclass is a Controller (see Chapter\
    \ 5, Figure 5-5), because it communicates with both the Model and View components\
    \ of your webapp through well-defined interfaces.\n\nThe input data upon which\
    \ your `Action` subclass acts is the form data submitted by the user. As you’ll\
    \ recall from the previous chapter, form data submitted by the user is automatically\
    \ transferred by Struts to your `ActionForm` subclass. This `ActionForm` subclass\
    \ instance contains the input data for your subclass of `Action`. The `ActionForm`\
    \ subclass is a JavaBean, meaning it has `getXXX()` and `setXXX()` functions corresponding\
    \ to each property on the HTML form. Your `Action` subclass can use these `getXXX()`\
    \ functions to read the form data. Figure 7-1 illustrates this data flow.\n\n\
    **Figure 7-1.** *Data flow from form to Action*\n\nIn fact, for each `Action`\
    \ subclass you define, you may associate any number of `ActionForm` subclasses,\
    \ all of which are potential inputs into that `Action` subclass. You’ll see how\
    \ this association is made in Chapter 9.\n\n## The Statelessness of Action\n\n\
    One very important thing to know about `Action` is that it must be stateless.\
    \ You must never store data in your `Action` subclass. In other words, your `Action`\
    \ subclass must never have *instance variables* (variables within a function are\
    \ OK). Listing 7-1 illustrates what you should *never* do.\n\n**Listing 7-1.**\
    \ *Never Use Instance Variables in an Action Subclass!*\n\n```\npublic class MyBadAction\
    \ extends Action{\n\n    private String myBadVariable; // NEVER EVER do this!\n\
    \n    protected void myFunction(){\n        String s = null; //variables in a\
    \ function are OK.\n        ...\n    }\n    ...//rest of Action\n}\n```\n\nStruts\
    \ manages the creation of your `Action` subclasses, and these are pooled (reused)\
    \ to efficiently service user requests. For this reason, you can’t use instance\
    \ variables. There is no way to guarantee that the data you store in an instance\
    \ variable applies to a given request.\n\n## Subclassing Action\n\nThere is just\
    \ one method you need to override in your `Action` subclass, and that’s `execute()`\
    \ (see Listing 7-2).\n\n**Listing 7-2.** *The execute() Function*\n\n```\npublic\
    \ ActionForward execute(ActionMapping mapping,\n                             ActionForm\
    \ form,\n                             HttpServletRequest request,\n          \
    \                   HttpServletResponse response)\n```\n\n> **Note** In older\
    \ versions of Struts (version 1.0 and earlier), `execute()` was called `perform()`.\n\
    \nAfter the `validate()` method on the `ActionForm` passes, Struts calls `execute()`\
    \ on the `Action` associated with the form. As you can see, five classes play\
    \ a role in this function."
