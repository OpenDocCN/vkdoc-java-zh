- fmt: '# Compile-time Checking and Dynamic Forms


    **Compile-time checking is not possible**: By using dynamic forms, you lose compile-time
    checking. For example, because the return value of `DynaActionForm`''s `get()`
    are all `Object`s, there''s no way to tell *at compile time* if you''ve assigned
    a return value to the wrong type. This would not be a problem with conventional
    getters because their return types are usually quite narrow (`String` or `Double`,
    etc.). A mismatch in assignment would be caught by the Java compiler. A similar
    situation occurs for setters as well.


    ## When to Use Dynamic Forms


    So, when *do* you use dynamic forms? The Apache Struts User''s Guide (see "Useful
    Links") spells this out in detail:


    > `DynaActionForm`s are meant as an easy solution to a common problem: Your `ActionForm`s
    use simple properties and standard validations, and you just pass these properties
    over to another `JavaBean`...`DynaActionForm`s are not a drop-in replacement for
    `ActionForm`s...


    The first sentence refers to the use of `BeanUtils` to transfer properties over
    to a `JavaBean`. You''ve seen this in action in the previous subsection.


    Using "standard validations" means using the Validator framework. This is *recommended*
    because frequent accessing of form properties requires you to use `DynaActionForm`''s
    `get()` functions, which is an error prone approach since you''ve lost compile-time
    checking of your code. The `get()` function isn''t error prone, but your code
    might have bugs and there''s no way to find this out at compile time. This problem
    just doesn''t exist when you use conventional `ActionForm`s, since the compiler
    does the check for you.


    The second sentence refers to the fact that a dynamic form''s properties have
    a different EL reference than the conventional `ActionForm`''s properties. This
    can be a brick wall if you''re trying to replace regular `ActionForm`s in an application
    that makes heavy use of EL.


    ## Validating Dynamic Forms


    Like ordinary `ActionForm`s, there are two ways to validate data in a dynamic
    form:


    - Implement a subclass of `DynaActionForm` with a `validate()` function.

    - Use a subclass of `DynaActionForm` called `org.apache.struts.validator.DynaValidatorForm`,
    which uses the Validator framework. (See Chapter 15 for details.)


    As with `ActionForm`s using the Validator framework, you can run your own custom
    validations on top of the `DynaValidatorForm` by simply subclassing it and calling
    `super.validate()` in your subclass''s `validate()` function. I''ve described
    this technique in Chapter 15.


    Used together with the Validator framework and `BeanUtils`, dynamic forms can
    completely eliminate the need to write any Java code for a form bean. But before
    we go into this, I''ll show you how the Registration webapp (see Chapter 5) might
    be implemented using dynamic forms.


    ## The Registration Webapp with Dynamic Forms


    In Chapter 5, I introduced the simple Registration webapp, which I expanded on
    in Chapter 14. In this section, I''ll use a simple variation on the Registration
    webapp to show you how you might use dynamic forms.


    The Registration webapp consists of a single page. This page has one form containing
    three fields: the user ID, the password, and the password retyped, as shown in
    Figure 16-1.


    **Figure 16-1.** *The Registration webapp main page*


    In Listing 16-3, I''ve reproduced the JSP code from Chapter 8 for your convenience.


