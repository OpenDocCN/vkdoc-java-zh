- fmt: "You might occasionally be required to let users download data from your webapp.\
    \ If it’s just a static file, this is a nonissue—just put in a link to the file\
    \ on a web page. However, it is often the case that the data in question is produced\
    \ on demand. In this case, you’ll have to handle the downloading process yourself.\n\
    \nThis isn’t difficult (you need to write a valid HTTP header and then place the\
    \ data into the `HttpServletResponse` object that comes with `execute()`), but\
    \ it’s a little tedious. The newly introduced (since 1.2.6) `DownloadAction` class\
    \ simplifies this work. All you need to supply are:\n\n- An `InputStream` containing\
    \ the data to be downloaded.\n- A “content type” string (e.g., `text/html` or\
    \ `image/png`) that describes the data’s format. For a list of content type strings,\
    \ take a look at the “Useful Links” section.\n\n`DownloadAction` has an inner\
    \ static interface called `StreamInfo`:\n\n```\npublic static interface StreamInfo\
    \ {\n    public abstract String getContentType();\n    public abstract InputStream\
    \ getInputStream() throws IOException;\n}\n```\n\nthat exposes the content type\
    \ via `getContentType()`, and the `InputStream` through `getInputStream()`. To\
    \ use `DownloadAction`, you need to:\n\n- Implement `StreamInfo`.\n- Expose it\
    \ by subclassing `DownloadAction` and overriding its `getStreamInfo()` function.\n\
    - Put in a form handler (`<action>` tag) in the `struts-config.xml` file, associating\
    \ your `DownloadAction` subclass with a path. No `<forward>` element is necessary.\
    \ (Can you tell why?)\n\nAs a double bonus, `DownloadAction` comes with two inner\
    \ classes, `FileStreamInfo` and `ResourceStreamInfo`, both of which implement\
    \ the `StreamInfo` interface.\n\nYou can use `FileStreamInfo` to allow downloading\
    \ of a static file. The constructor for `FileStreamInfo` is:\n\n```\npublic FileStreamInfo(String\
    \ contentType, File file)\n```\n\nwhich is self-explanatory.\n\n`ResourceStreamInfo`\
    \ allows users to download a file within a webapp’s root directory:\n\n```\npublic\
    \ ResourceStreamInfo(String contentType, ServletContext context, String path)\n\
    ```\n\nThe `ServletContext` contains information about a webapp’s paths, among\
    \ other things. You can obtain an instance for your webapp from the `HttpSession`\
    \ object:\n\n```\nServletContext context = response.getSession().getServletContext();\n\
    ```\n\nSo, all you need to specify are the content type and the relative path\
    \ to the file to be downloaded.\n\nOf course, in most cases you might prefer to\
    \ use HTML links instead of `FileStreamInfo` or `ResourceStreamInfo`. You’ll find\
    \ these classes useful if for some reason you can’t expose a link to the file\
    \ to be downloaded. Listing 17-3 shows an example of how you might subclass `DownloadAction`,\
    \ implementing `StreamInfo` using an anonymous class.\n\n**Listing 17-3.** *Extending\
    \ DownloadAction*\n\n```\npackage com.myco.myapp.struts;\n\nimport java.io.*;\n\
    import javax.servlet.http.*;\nimport org.apache.struts.action.*;\nimport org.apache.struts.actions.DownloadAction;\n\
    \npublic class MyDownloadAction extends DownloadAction {\n    protected StreamInfo\
    \ getStreamInfo(ActionMapping mapping,\n                                     \
    \  ActionForm form,\n                                       HttpServletRequest\
    \ request,\n                                       HttpServletResponse response)\n\
    \            throws Exception {\n        /* Get InputStream somehow, as a result\
    \ of processing request */\n        InputStream input = ...;\n        /* Similarly\
    \ get content type */\n        String contentType = ...;\n        return new StreamInfo()\
    \ {\n            public InputStream getInputStream() { return input; }\n     \
    \       public String getContentType() { return contentType; }\n        };\n \
    \   }\n}\n```\n\nYou’ll have to create a form handler as well:\n\n```\n<action\
    \ path=\"/MyFileDownloadHandler\"\n        form=\"MyDataForm\"\n        type=\"\
    com.myco.myapp.struts.MyDownloadAction\" />\n```\n\nThe form bean (`MyDataForm`)\
    \ is only necessary if you need to collect user input in order to create the downloadable\
    \ content. You don’t need a `<forward>` because the downloaded content is the\
    \ implicit “next” page."
