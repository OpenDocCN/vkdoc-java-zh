    # Chapter 5: The MVC Design Pattern


    ## Summary


    - The Model-View-Controller (MVC) design pattern brings many benefits to the webapp
    that implements it.

    - Implementing MVC is difficult, which is why you need a web application framework
    like `Struts`.

    - `Struts` only places restrictions on the View and Controller. You are free to
    implement the Model portion in any way you wish.

    - Two very popular persistence frameworks are `Hibernate` and `Torque`.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ---


    # Chapter 6: Simple Validation


    One common element of web applications is *form validation*. This involves running
    checks to ensure that user input conforms to the system’s expectations. In the
    previous chapter we saw how these checks naturally fall into two categories:


    - **Simple validation**: Validations that do not require complex processing or
    business logic. This includes, for example, checks that mandatory fields are filled,
    that user input conforms to the right format (email addresses, postal codes, or
    credit card numbers), and a variety of other checks.

    - **Complex validation**: Validations that are dependent on processing of business
    logic. For example, a check for a duplicate user ID would qualify as a complex
    validation because it involves reading data from a Model component.


    Also in the previous chapter, I briefly described how `Struts` fits into MVC.
    You also saw how for the Controller, `Struts` makes a distinction between “simple”
    and “complex” validations of user input by using different classes to perform
    them.


    `Struts` makes this distinction for two reasons. First, they involve significantly
    different operations and are usually maintained separately. The second reason
    is to give you a powerful tool (the `Validator` framework), which greatly relieves
    the tedium of doing simple validation.


    In this chapter, we’ll focus on the basics of simple validation.


    ## Processing Simple Validations


    In addition to using different classes for simple and complex validations, `Struts`
    processes these validations differently too.


    When a user submits a form, `Struts` first runs simple validations on it. If the
    validations fail, `Struts` sends the user the same form, with the same data the
    user keyed in but with error messages corresponding to each field with an error.


    Only after the simple validations pass will `Struts` send the form data for further
    processing. This might include performing complex validations or data transformations
    or storing data into the database.


    ## Anatomy of ActionForm


    The central class for performing simple validations is `org.apache.struts.action.ActionForm`.


    `Struts` requires you to associate each form displayed to the user with your subclass
    of `ActionForm`.


    Your subclass of `ActionForm` does two things:


    - **It holds all form data**: Your subclass of `ActionForm` must have getters
    and setters corresponding to each property of the form.

    - **It performs simple validation**: Your subclass must override the `validate()`
    function, *if* you want to perform any simple checks.


    Figure 6-1 illustrates this relationship between `ActionForm`, your `ActionForm`
    subclass, and the input HTML form for which your subclass stores data.


    **Figure 6-1.** *Subclassing ActionForm*


