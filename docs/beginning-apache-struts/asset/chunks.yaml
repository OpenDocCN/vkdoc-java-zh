    **Using Stylesheets with Layouts**


    Most professional web apps use Cascading Style Sheets (CSS) to achieve common
    fonts and colors. When you attempt to use stylesheets with Tiles layouts, you
    might run into problems. For example, suppose your stylesheet is \styles\styles.css,
    and your layout references this stylesheet, as shown in Listing 14-8.


    **Listing 14-8.** *Snippet of simple-layout.jsp with Static Stylesheet Reference*


    <%@ taglib uri="/tags/struts-tiles" prefix="tiles" %>


    <html>


    <head>


    <style type="text/css" media="screen">


    @import **"./styles/styles.css"** ;


    </style>


    <title> <tiles:getAsString name="title"/> </title>


    </head>


    ...


    This stylesheet declaration is fine if all your JSPs that use this layout are
    in the root folder of the web application. This may not be feasible for larger
    applications. For example, you might want to place “admin” pages in a separate
    \admin\ subfolder. Doing so would mean that the reference to the stylesheet is
    now ../styles/styles.css (note the leading


    ..). The static stylesheet reference in Listing 14-8 won’t do.


    A useful hack is to use the getContextPath() function on the request object to
    get around this limitation. The stylesheet declaration of Listing 14-8 now becomes:'
