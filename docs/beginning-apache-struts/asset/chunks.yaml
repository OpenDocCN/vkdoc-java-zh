- fmt: "# With the declaration in Listing 17-17, we may declare two different form\
    \ beans with the same name in two different submodules. The same applies to `<action>`s,\
    \ `<forward>`s, and other configuration elements.\n\nAccess to `<action>`s and\
    \ `<forward>`s would differ between submodules. For example, suppose we had an\
    \ `<action>` declared in the admin submodule:\n\n```\n<action path=\"Listing.do\"\
    \ ...\n```\n\nThen, you’d refer to it as `/admin/Listing.do` in your `<html:link>`s\
    \ or `<html:form>`s.\n\n**Note:** If you had the same `<action>` defined in the\
    \ default submodule, then you’d use `/Listing.do`.\n\nThis brings up an important\
    \ issue: in any well-designed application, you’re likely to have shared declarations\
    \ like shared global `<forward>`s or form beans. When you split your app using\
    \ multiple submodules, these are *not* shared between modules. To overcome this\
    \ problem, you should group together shared declarations in one Struts configuration\
    \ file.\n\nFor example, continuing our earlier example, let’s call this new file\
    \ `struts-config-shared.xml`. Listing 17-18 shows what you would do in order to\
    \ share the declarations in this file across submodules.\n\n**Listing 17-18.**\
    \ *Using a Shared Struts Configuration File Across Submodules*\n\n```\n<servlet>\n\
    \  <servlet-name>action</servlet-name>\n  <servlet-class>org.apache.struts.action.ActionServlet</servlet-class>\n\
    \  <init-param>\n    <param-name>config</param-name>\n    <param-value>\n    \
    \  /WEB-INF/struts-config-shared.xml,\n      /WEB-INF/struts-config.xml\n    </param-value>\n\
    \  </init-param>\n  <init-param>\n    <param-name>config/admin</param-name>\n\
    \    <param-value>\n      /WEB-INF/struts-config-shared.xml,\n      /WEB-INF/struts-config-admin.xml\n\
    \    </param-value>\n  </init-param>\n  <init-param>\n    <param-name>config/logon</param-name>\n\
    \    <param-value>/WEB-INF/struts-config-logon.xml</param-value>\n  </init-param>\n\
    </servlet>\n```\n\nIn Listing 17-18, I’ve shared `struts-config-shared.xml` across\
    \ the default and admin subapplications. This uses the same trick as the multiple\
    \ configurations file technique described earlier. You just have to separate the\
    \ filenames with a comma.\n\n## In a Nutshell...\n\nThere are two ways to split\
    \ up your Struts configuration file. Use the multiple files approach if your concerns\
    \ are only about manageability or source control. Use the multiple submodules\
    \ approach if you need separate namespaces as well.\n\nIn the latter, you can\
    \ declare common form beans, actions, forwards, and so forth in a single file\
    \ and share them between submodules. This prevents duplication of declarations\
    \ while giving you separate namespaces.\n\n## Useful Links\n\n- A compendium of\
    \ commonly used content type (MIME types) strings: http://www.utoronto.ca/webdocs/HTMLdocs/Book/Book-3ed/appb/mimetype.html\n\
    - Apache Commons Logging: http://jakarta.apache.org/commons/logging/\n- Log4j:\
    \ http://logging.apache.org/log4j/docs/\n\n## Summary\n\nStruts provides a number\
    \ of useful classes, features, and tricks to make writing webapps easier. This\
    \ chapter covers some of the ways you can take advantage of what’s available rather\
    \ than reinventing the wheel in your webapps.\n\n---\n\n# Review Lab: The Collection\
    \ Facility\n\nIn this lab session, you’ll implement a facility to group together\
    \ contacts into logical **collections**. This is essentially a tool to classify\
    \ and manage contacts within LILLDEP.\n\nThere are four parts in this Collection\
    \ facility:\n\n- The main **Collect** page displays a list of defined collections\
    \ as links. When a link is clicked, the user is given a listing of Contacts within\
    \ that collection. The Collect page also allows new collections to be defined.\
    \ Users access this page through the Collect navigation button (see Figure 18-1).\n\
    - The **New Collection** page prompts the user for a collection name, query, and\
    \ memo. This page results in a listing of the newly defined collection’s Contacts."
  raw: 'With the declaration in Listing 17-17, we may declare two different form beans
    with the same name in two different submodules. The same applies to <action>s,
    <forward>s, and other configuration elements.


    Access to <action>s and <forward>s would differ between submodules. For example,
    suppose we had an <action> declared in the admin submodule:


    <action path="Listing.do" ...


    Then, you’d refer to it as /admin/Listing.do in your <html:link>s or <html:form>s.


    ■**Note** If you had the same <action> defined in the default submodule, then
    you’d use /Listing.do.


    This brings up an important issue: in any well-designed application, you’re likely
    to have shared declarations like shared global <forward>s or form beans. When
    you split your app using multiple submodules, these are *not* shared between modules.
    To overcome this problem, you should group together shared declarations in one
    Struts configuration file.


    For example, continuing our earlier example, let’s call this new file struts-config-shared.xml.
    Listing 17-18 shows what you would do in order to share the declarations in this
    file across submodules.


    **Listing 17-18.** *Using a Shared Struts Configuration File Across Submodules*


    <servlet>


    <servlet-name>action</servlet-name>


    <servlet-class>


    org.apache.struts.action.ActionServlet


    </servlet-class>


    <init-param>


    <param-name>config</param-name>


    **<param-value>**


    **/WEB-INF/struts-config-shared.xml,**


    **/WEB-INF/struts-config.xml**


    **</param-value>**


    </init-param>


    <init-param>


    <param-name>config/admin</param-name>


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C17.fm Page 266 Tuesday, January 24, 2006 10:14 AM


    **266**


    C H A P T E R 1 7 ■ P O T P O U R R I


    **<param-value>**


    **/WEB-INF/struts-config-shared.xml,**


    **/WEB-INF/struts-config-admin.xml**


    **</param-value>**


    </init-param>


    <init-param>


    <param-name>config/logon</param-name>


    <param-value>/WEB-INF/struts-config-logon.xml</param-value>


    </init-param>


    </servlet>


    In Listing 17-18, I’ve shared struts-config-shared.xml across the default and
    admin subapplications. This uses the same trick as the multiple configurations
    file technique described earlier. You just have to separate the filenames with
    a comma.


    **In a Nutshell...**


    There are two ways to split up your Struts configuration file. Use the multiple
    files approach if your concerns are only about manageability or source control.
    Use the multiple submodules approach if you need separate namespaces as well.


    In the latter, you can declare common form beans, actions, forwards, and so forth
    in a single file and share them between submodules. This prevents duplication
    of declarations while giving you separate namespaces.


    **Useful Links**


    • A compendium of commonly used content type (MIME types) strings: http://


    www.utoronto.ca/webdocs/HTMLdocs/Book/Book-3ed/appb/mimetype.html


    • Apache Commons Logging: http://jakarta.apache.org/commons/logging/


    • Log4j: http://logging.apache.org/log4j/docs/


    **Summary**


    Struts provides a number of useful classes, features, and tricks to make writing
    webapps easier. This chapter covers some of the ways you can take advantage of
    what’s available rather than reinventing the wheel in your webapps.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


