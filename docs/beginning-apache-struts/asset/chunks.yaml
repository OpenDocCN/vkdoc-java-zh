    As in Requirement 2, we obviously need Controller code to run the validation.
    Unlike Requirement 2, a client-side validation is less feasible, because we might
    need to check with a database in order to find out if the given user ID exists.


    This also implies we need Model code to read user IDs off the database. The Model
