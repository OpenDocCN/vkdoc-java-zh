    this UI tree is re-created on the server, and is populated with data from the
    page. This data does not have to be only user input destined for the Model tier
    but can also include the states of each UI component.


    For example, suppose a JSF page contains a tag for a treeview UI component, as
    you might have used in Microsoft Explorer or Outlook. A user requesting the page
    sees the treeview and clicks a node on it. The treeview expands, and the user
    clicks further, exposing more of the tree, as in Figure 20-2.


