    国际化


    **简而言之，国际化（简称 *i18n*，因为 *internationalization* 一词中 *i* 和 *n* 之间有 18 个字母），或本地化，就是让应用程序能够支持除当前目标语言之外的其他语言的工作。**


    本地化一个 Web 应用程序绝非易事。其中涉及的微妙之处远不止将网页翻译成新语言那么简单。要理解这些问题，请考虑在本地化应用程序时需要解决的四个领域：


    - **处理输入**：由于输入数据来自 Web 浏览器，你的 Web 应用程序必须能够正确处理不同的*字符编码*（更多内容将在下一节介绍）。

    - **验证**：使用新语言的用户可能使用不同的日期或数字格式。你的验证逻辑必须能够正确处理这些格式。

    - **输出**：对话框、提示、按钮标签以及其他文本必须被翻译成新语言。理想情况下，用户应该能够选择与 Web 应用程序交互的语言。Struts 在这方面解决得特别好。

    - **数据存储及相关问题**：你可能需要确保你的数据库能够处理多字节字符编码。当你的 Web 应用程序将数据传递给其他应用程序时，也会出现类似的问题——你必须确保这些应用程序能够接受新语言和字符编码的文本。


    在本章中，你将看到 Struts 如何通过解决前三个领域的问题，极大地简化了本地化 Web 应用程序的任务。但首先，我需要定义一些术语。


    **字符编码、Unicode 和 UTF-8**


    一个**字符**是一个抽象实体，对应于一种语言或文字中的一个书写单位。例如，字母“A”、“A”或“A”都代表同一个字符。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C12.fm Page 144 Thursday, January 12, 2006 11:04 AM


    **144**


    第 12 章 ■ 国际化


    然而，“A”和“a”代表不同的字符，因为它们具有不同的含义。字符还包括标点符号和文字中的其他符号。


    一个**字符集**是一个字符的集合，并为每个字符分配一个唯一的数字标识符。换句话说，字符集只是一组（字符，标识符）对的集合。一个字符集中的字符可能来自一种或多种语言或文字。


    **Unicode** 是一个旨在包含所有人类语言和文字中字符的字符集。


    ■**注意** 听起来可能很奇怪，但一种语言可能拥有多种文字。例如，维吾尔语（来自中亚）有三种文字：古老的阿拉伯文字、前苏联国家使用的类似西里尔字母的文字，以及中国政府发明、现被维吾尔族用于互联网通信的拉丁文字。


    Unicode（当前版本为 4.0）由 Unicode 联盟定义，该联盟是一个由许多（主要是美国）公司支持的组织。该联盟已经识别了地球上每种（嗯，几乎是每种）语言中的每一个字符，并为每个字符分配了一个唯一的数字。编号方式使得每种语言获得一个或多个连续的编号块。


    一种**字符编码**将字符集中的每个数字标识符转换为另一个称为**字符代码**的数字。这样做是因为字符代码在计算机上存储更方便或更高效。因此，字符编码只是一组（字符，字符代码）对的集合。


    现在，如果*不需要*进行任何转换——直接使用字符集的数字标识符——那么字符编码和字符集当然是相同的。ASCII 就是一个例子，它同时定义了一种字符编码和一种字符集。其他例子包括
    Latin 1 和各种语言的 ISO 编码。


    回到 Unicode：其缺点在于，对于日常编程来说，它实际上毫无用处，因为现有的字符编码（尤其是 ASCII）已经根深蒂固。许多现有的程序或软件库只接受 ASCII
    输入，无法处理 Unicode 的数字标识符。


    **UTF-8** *是一种用于 Unicode 的*字符编码*，它解决了这个问题。UTF-8 获取每个 Unicode 定义的数字标识符，并将其转换为可能占用一个或多个字节存储空间的字符代码。UTF-8
    的绝妙之处在于，同时属于 Unicode 和 ASCII 的字符被赋予了相同的字符代码。*


    *这意味着，你的“支持 UTF-8”的程序可以利用 Unicode，同时仍然可以与只接受 ASCII 的旧程序或库一起工作。当然，这并不能解决让旧程序接受
    Unicode 的问题。关键在于，你*不会*完全失去与旧软件协作的能力。*


