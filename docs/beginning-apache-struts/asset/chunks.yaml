    ## Summary


    - Plug-ins, first introduced in Struts 1.1, are a good way to extend or amend
    the functionality of Struts.

    - A plug-in has to implement the `org.apache.struts.action.PlugIn` interface.

    - This interface has two functions: `init()`, which is called when the `PlugIn`
    implementation is instantiated, and `destroy()`, which is called when Struts shuts
    down.

