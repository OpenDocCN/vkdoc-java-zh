- fmt: "# HTTP Request Header Variable\n\nThe name of the HTTP request header variable\
    \ to use. The name match is case insensitive.\n\n# Parameter\n\nThe name of the\
    \ URL request parameter to use. If there are more than one, the first one that\
    \ occurs is used.\n\n## Selector Attributes\n\nMany tags in the Logic library\
    \ use selector attributes. These attributes are used to select the object or property\
    \ with which to perform that tag’s function. The selector attributes are `cookie`,\
    \ `header`, `name`/`property`, and `parameter`.\n\nStruts interrogates these attributes\
    \ in this sequence. For example, if you specify both `cookie` and `parameter`,\
    \ only the `cookie` attribute is used to perform the tag’s task.\n\nNote that\
    \ the `name`/`property` attributes are considered a pair in this respect. That\
    \ is, if you specify the `name`, you may optionally specify the `property` as\
    \ well. You cannot specify just the `property` alone—you must specify the `name`\
    \ as well, if they function as a selector attribute. The reference for each tag\
    \ will tell you if this is the case or not.\n\n## Struts-EL Tags for the Logic\
    \ Tag Library\n\nOnly the following tags in the Logic library have EL-enabled\
    \ versions: `forward`, `iterate`, `match`/`notMatch`, `messagesPresent`/`messagesNotPresent`,\
    \ `present`/`notPresent`, and `redirect`.\n\nOther tags have simpler JSTL equivalents.\n\
    \n**Note** EL-enabled tags are those that allow you to use EL expressions. Refer\
    \ to Chapter 10 for examples.\n\n## empty/notEmpty\n\n`empty` conditionally executes\
    \ its body if the specified property (or base object) is `null`, a zero-length\
    \ `String`, or an empty `Collection` or `Map`. If the `property` attribute isn’t\
    \ specified, then the test is run against the base object given by the `name`\
    \ attribute.\n\n`notEmpty` is the converse of `empty`.\n\n### Usage Restrictions\n\
    \nThe `name` attribute must be specified, even if nested within an `<html:form>`.\n\
    \n### Attributes\n\nOnly the `base-attrs` attribute set is applicable.\n\n###\
    \ Examples\n\nThe following example shows the use of the `<logic:empty>` tag to\
    \ conditionally process the nested `<bean:write>` tag if `MyCollection` is empty:\n\
    \n```\n<logic:empty name=\"MyCollection\">\n    <bean:write name=\"MyCollection\"\
    \ property = \"myproperty[13]\" />\n</logic:empty>\n```\n\nThe next example illustrates\
    \ the use of the `property` tag:\n\n```\n<logic:empty name=\"contact\" property=\"\
    email\">\n    <bean:write name=\"contact\" property=\"email\"/>\n</logic:empty>\n\
    ```\n\nThe `<bean:write>` is executed only if the `getEmail()` function returns\
    \ `null`, or a zero-length `String`. You can also use the `scope` variable to\
    \ specify a scope under which to look for a bean:\n\n```\n<logic:notEmpty name=\"\
    MyBean\" scope=\"request\">\n    <bean:write name=\"MyBean\" property = \"myproperty\"\
    \ />\n</logic:empty>\n```\n\nIn the previous example, the `<bean:write>` is called\
    \ on the base object if `MyBean` can be found on the `request` scope.\n\n### Equivalents\n\
    \nYou can easily create equivalents for `empty` and `notEmpty` using JSTL’s `<c:if>`\
    \ or `<c:choose>`...`<c:when>`. For example using `<c:if>`, the previous examples\
    \ would be:\n\n```\n<c:if test=\"${empty MyCollection}\">\n    <bean:write name=\"\
    MyCollection\" property = \"myproperty[13]\" />\n</c:if>\n```\n\nand\n\n```\n\
    <c:if test=\"${empty contact.email}\">\n    <bean:write name=\"contact\" property=\"\
    email\"/>\n</c:if>\n```\n\nYou’d have to use JSTL’s implicit objects (`requestScope`,\
    \ `sessionScope`, etc.) to specify a scope:\n\n```\n<c:if test=\"${ not empty\
    \ requestScope.MyBean}\">\n    <bean:write name=\"MyBean\" property = \"myproperty\"\
    \ />\n</c:if>\n```\n\n## equal/notEqual\n\n`equal` checks that the given property\
    \ (or extended property) is equal to a given value. If so, the body of the `equal`\
    \ tag is executed. `notEqual` is the converse of `equal`.\n\n### Usage Restrictions\n\
    \nThe `value` attribute is required. You must specify one selector attribute (see\
    \ the start of this section for a definition) as well."
  raw: 'The name of the HTTP request header variable to use. The name match is case
    insensitive.


    parameter


    The name of the URL request parameter to use. If there are more than one, the
    first one that occurs is used.


    **Selector Attributes**


    Many tags in the Logic library use selector attributes. These attributes are used
    to select the object or property with which to perform that tag’s function. The
    selector attributes are cookie, header, name/property, and parameter.


    Struts interrogates these attributes in this sequence. For example, if you specify
    both cookie and parameter, only the cookie attribute is used to perform the tag’s
    task.


    Note that the name/property attributes are considered a pair in this respect.
    That is, if you specify the name, you may optionally specify the property as well.
    You cannot specify just the property alone—you must specify the name as well,
    if they function as a selector attribute. The reference for each tag will tell
    you if this is the case or not.


    **Struts-EL Tags for the Logic Tag Library**


    Only the following tags in the Logic library have EL-enabled versions: forward,
    iterate, match/notMatch, messagesPresent/messagesNotPresent, present/notPresent,
    and redirect.


    Other tags have simpler JSTL equivalents.


    ■**Note** EL-enabled tags are those that allow you to use EL expressions. Refer
    to Chapter 10 for examples.


    **empty/notEmpty**


    empty conditionally executes its body if the specified property (or base object)
    is null, a zero-length String, or an empty Collection or Map. If the property
    attribute isn’t specified, then the test is run against the base object given
    by the name attribute.


    notEmpty is the converse of empty.


    Usage Restrictions


    The name attribute must be specified, even if nested within an <html:form>.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048AppC.fm Page 438 Tuesday, January 17, 2006 4:46 PM


    **438**


    A P P E N D I X C ■ S T R U T S T A G R E F E R E N C E


    Attributes


    Only the base-attrs attribute set is applicable.


    Examples


    The following example shows the use of the <logic:empty> tag to conditionally
    process the nested <bean:write> tag if MyCollection is empty:


    <logic:empty name="MyCollection">


    <bean:write name="MyCollection" property = "myproperty[13]" />


    </logic:empty>


    The next example illustrates the use of the property tag:


    <logic:empty name="contact" property="email">


    <bean:write name="contact" property="email"/>


    </logic:empty>


    The <bean:write> is executed only if the getEmail() function returns null, or
    a zero-length String. You can also use the scope variable to specify a scope under
    which to look for a bean:


    <logic:notEmpty name="MyBean" scope="request">


    <bean:write name="MyBean" property = "myproperty" />


    </logic:empty>


    In the previous example, the <bean:write> is called on the base object if MyBean
    can be found on the request scope.


    Equivalents


    You can easily create equivalents for empty and notEmpty using JSTL’s <c:if> or


    <c:choose>...<c:when>. For example using <c:if>, the previous examples would be


    <c:if test="${empty MyCollection}">


    <bean:write name="MyCollection" property = "myproperty[13]" />


    </c:if>


    and


    <c:if test="${empty contact.email}">


    <bean:write name="contact" property="email"/>


    </c:if>


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048AppC.fm Page 439 Tuesday, January 17, 2006 4:46 PM


    A P P E N D I X C ■ S T R U T S T A G R E F E R E N C E


    **439**


    You’d have to use JSTL’s implicit objects (requestScope, sessionScope, etc.) to
    specify a scope:


    <c:if test="${ not empty requestScope.MyBean}">


    <bean:write name="MyBean" property = "myproperty" />


    </c:if>


    **equal/notEqual**


    equal checks that the given property (or extended property) is equal to a given
    value. If so, the body of the equal tag is executed. notEqual is the converse
    of equal.


    Usage Restrictions


    The value attribute is required. You must specify one selector attribute (see
    the start of this section for a definition) as well.


    Attributes'
  trans: '

    要使用的 HTTP 请求头变量名称。名称匹配不区分大小写。


    parameter


    要使用的 URL 请求参数名称。如果存在多个，则使用第一个出现的参数。


    **选择器属性**


    Logic 库中的许多标签都使用选择器属性。这些属性用于选择要执行该标签功能的对象或属性。选择器属性包括 cookie、header、name/property
    和 parameter。


    Struts 按此顺序查询这些属性。例如，如果同时指定了 cookie 和 parameter，则仅使用 cookie 属性来执行标签的任务。


    请注意，name/property 属性在此方面被视为一对。也就是说，如果指定了 name，则可以选择性地同时指定 property。不能仅指定 property——如果它们作为选择器属性发挥作用，则必须同时指定
    name。每个标签的参考文档会告知您是否属于这种情况。


    **Logic 标签库的 Struts-EL 标签**


    Logic 库中只有以下标签具有支持 EL 的版本：forward、iterate、match/notMatch、messagesPresent/messagesNotPresent、present/notPresent
    和 redirect。


    其他标签有更简单的 JSTL 等效项。


    ■**注意** 支持 EL 的标签是那些允许您使用 EL 表达式的标签。有关示例，请参阅第 10 章。


    **empty/notEmpty**


    如果指定的属性（或基础对象）为 null、零长度字符串、空 Collection 或空 Map，则 empty 会条件性地执行其主体。如果未指定 property
    属性，则针对由 name 属性给出的基础对象进行测试。


    notEmpty 与 empty 相反。


    使用限制


    即使嵌套在<html:form>中，也必须指定 name 属性。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


