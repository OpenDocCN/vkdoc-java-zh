- fmt: "# Appendix C: Struts Tag Reference\n\n## Transaction Token Handling\n\nThe\
    \ function `saveToken(request)` automatically generates the transaction token\
    \ and places it on the request and session under appropriate keys. A simple example\
    \ of the `execute()` function of this Action subclass is as follows:\n\n```\n\
    public ActionForward execute(...){\n    //create the transaction token\n    saveToken(request);\n\
    \    //give the user the form to fill\n    return mapping.findForward(\"success\"\
    );\n}\n```\n\nThe second Action subclass is the one that processes the form data\
    \ once it is submitted by the user. This is what its `execute()` would look like:\n\
    \n```\npublic ActionForward execute(...){\n    if(isTokenValid(request,true)){\n\
    \        return mapping.findForward(\"duplicate-submission\");\n    }\n    //process\
    \ form data as usual.\n    ...\n}\n```\n\nThe function `isTokenValid(request,true)`\
    \ checks to ensure that the transaction token on the request matches that on the\
    \ session. Once the check is done, it destroys the copy on the session. This means\
    \ that if the user clicked the submit button a second time, there would be no\
    \ copy on the session, causing `isTokenValid()` to return false.\n\nHowever, you\
    \ should be aware that the simple solution outlined in the preceding section has\
    \ one big failing: the error page (`duplicate-submission`) sent back to the user\
    \ might make him think that the form data wasn't been processed at all! Careful\
    \ wording of the error message might help, but you still can't get the true success\
    \ page to the user.\n\nMore sophisticated solutions would solve such user interaction\
    \ issues as well.\n\nComing back to the transaction attribute, if it's set to\
    \ `true` then the value of the transaction token on the request is sent as a URL\
    \ parameter.\n\n## Examples\n\nHere is a simple redirect using the name of a global\
    \ forward:\n\n```\n<logic:redirect forward=\"login\" />\n```\n\nNext is an example\
    \ of adding a single URL parameter. The name of the parameter (`paramId`) is `email-address`.\
    \ The value of the parameter is determined by calling `contact.getEmail()`:\n\n\
    ```\n<logic:redirect action=\"/MyFormHandler\" paramId=\"email-address\"\n   \
    \ paramName=\"contact\" paramProperty=\"email\" />\n```\n\nHere's how you would\
    \ add multiple URL parameters, based on a Map. The Map is located by calling `contact.getAttributes()`,\
    \ which is located on the session scope:\n\n```\n<logic:redirect action=\"/mypage.jsp\"\
    \ name=\"contact\"\n    property=\"attributes\" scope=\"session\" />\n```\n\n\
    ## Equivalents\n\nNone. No single tag in JSTL or JSF perform all the functions\
    \ of `<logic:redirect>`.\n\n## The Nested Tag Library\n\nThe nested tag library\
    \ allows you to apply tags relative to an object. You can emulate exactly the\
    \ same functionality using nested properties (see Chapter 10 for a detailed exposition).\n\
    \nUnfortunately, to a programmer, the Nested taglib might feel like a kludge.\
    \ For instance, suppose you wanted to write the contents of `MyBean.getMyPropertyA().getMyPropertyB()`.\
    \ You might expect to be able to do this:\n\n```\n<nested:root name=\"MyBean\"\
    >\n    <nested:nest property=\"myPropertyA\">\n        **<bean:write property=\"\
    myPropertyB\"/> //WRONG!!**\n    </nested:nest>\n</nested:root>\n```\n\nInstead,\
    \ the Nested tag library provides replacement tags for `<bean:write>` and many\
    \ other tags. So, the correct code to perform the task is:\n\n```\n<nested:root\
    \ name=\"MyBean\">\n    <nested:nest property=\"myPropertyA\">\n        **<nested:write\
    \ property=\"myPropertyB\"/>**\n    </nested:nest>\n</nested:root>\n```\n\nThe\
    \ replacement for `<bean:write>` is `<nested:write>`. Most of the Nested tag library\
    \ consists of replacement tags. These are exact duplicates of their counterparts\
    \ in other tag libraries:\n\n- **Replacements for HTML**: `checkbox`, `errors`,\
    \ `file`, `form`, `hidden`, `image`, `img`, `link`, `messages`, `multibox`, `options`,\
    \ `optionsCollection`, `password`, `radio`, `select`, `submit`, `text`, and `textarea`\n\
    - **Replacements for Bean**: `define`, `message`, `size`, and `write`\n- **Replacements\
    \ for Logic**: `empty`, `equal`, `greaterEqual`, `greaterThan`, `iterate`, `lessEqual`,\
    \ `lessThan`, `match`, `messagesNotPresent`, `messagesPresent`, `notEmpty`, `notEqual`,\
    \ `notMatch`, `notPresent`, and `present`\n\nSince these tags are exact duplicates\
    \ of the originals, I won't repeat their functions here. You should consult the\
    \ original tag's reference in this appendix. Excluding these replacement tags,\
    \ the Nested tag library has just three tags of its own that require some explanation.\
    \ The section that follows tackles this task.\n\n### Struts-EL Tags for the Nested\
    \ Tag Library\n\nThere are no Struts-EL tags for the Nested tag library.\n\n>\
    \ **Note**: EL-enabled tags are those that allow you to use EL expressions. Refer\
    \ to Chapter 10 for examples.\n\n### nest\n\nThis tag allows the nesting to be\
    \ moved up by one level. All replacement tags within the current `<nested:nest>`\
    \ tag will take as their base object the value indicated by the `property` attribute\
    \ of this tag.\n\n#### Usage Restrictions\n\nNone, but you obviously need to specify\
    \ the `property` attribute in order to accomplish anything.\n\n#### Attributes\n\
    \nThere is just one attribute: `property`, which indicates the property on the\
    \ current implicit base object from which all child Nested tags will use their\
    \ base object.\n\n#### Examples\n\nSuppose you wanted to access a nested property\
    \ using, say, `<bean:write>`, in an `<html:form>`.\n\n```\n<html:form action=...\n\
    \    <bean:write property=\"contact.name\"/>\n    <bean:write property=\"contact.email\"\
    />\n    <bean:write property=\"contact.company\"/>\n</html:form>\n```\n\nYou can\
    \ use `<nested:nest>` and `<nested:write>` tags instead:\n\n```\n<html:form action=...\n\
    \    <nested:nest property=\"contact\">\n        <nested:write property=\"name\"\
    />\n        <nested:write property=\"email\"/>\n        <nested:write property=\"\
    company\"/>\n    </nested:nest>\n</html:form>\n```\n\nIn both snippets, the implicit\
    \ base object is determined by the enclosing `<html:form>`. The base object is\
    \ just the form bean instance associated with the form. If you wanted to change\
    \ the base object, you'd have to use `<nested:root>`.\n\n#### Equivalents\n\n\
    None.\n\n### writeNesting\n\nThis tag is used to write the current nesting level\
    \ either to the response stream (i.e., the rendered HTML page), or to make it\
    \ available as a page scoped variable.\n\n#### Usage Restrictions\n\nNone.\n\n\
    #### Attributes\n\nThis tag has three attributes:\n\n- `property`: The value of\
    \ this attribute is blindly appended to the end of the nesting level, prefixed\
    \ with a dot.\n- `id`: When `id` is specified, the nesting level is not written\
    \ to the final HTML page, but rather is exposed as a page-scoped String variable\
    \ with the value of `id` serving as the name.\n- `filter`: This attribute takes\
    \ the value `true` or `false`. If `true`, then the nesting level is encoded. For\
    \ example, the ampersand (`&`) appears as `&amp;`. Despite what the Apache online\
    \ documents say, URL encoding is not performed—for instance, spaces are not encoded\
    \ as `%20%`, etc.\n\nThese attributes are best illustrated with JSP examples.\n\
    \n#### Examples\n\nUsing `writeNesting` only makes sense when it's used in conjunction\
    \ with the `<nested:nest>` tag as in the following snippet:\n\n```\n<html:form\
    \ ...>\n    <nested:nest property=\"contact\">\n        <nested:nest property=\"\
    company\">\n            **Nesting level is: <nested:writeNesting />**\n      \
    \  </nested:nest>\n    </nested:nest>\n</html:form>\n```\n\nIn this example, the\
    \ displayed HTML will contain the text:\n\n```\nNesting level is: contact.company\n\
    ```"
