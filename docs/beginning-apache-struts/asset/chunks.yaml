    /**


    * 验证用户输入。由 Struts 框架


    * 自动调用。


    */


    public ActionErrors **validate**(ActionMapping mapping,


    HttpServletRequest request){


    // 创建一个空的 ActionErrors


    ActionErrors errors = new ActionErrors();


    // 检查用户 ID 是否为空


    if( null == _userid ){


    errors.add("userid",


    new ActionMessage("reg.error.userid.missing"));


    }


    // 检查密码 1 是否等于密码 2


    if( !_pwd.equals(_pwd2)){


    errors.add("password",


    new ActionMessage("reg.error.password.mismatch"));


    }


    return errors;


    }


    }


    回想一下，注册 Web 应用的用户输入包含三个字段：用户 ID、密码和密码确认。从清单 6-1 中首先要注意的是，这个 `ActionForm` 子类包含了这三个字段各自的
    getter 和 setter 方法。


    `validate()` 的主体遵循一个简单的模式：


    **1.** 创建一个空的 `ActionErrors` 实例。


    **2.** 对每个字段进行检查，并用错误消息填充 `ActionErrors` 实例。


    **3.** 返回 `ActionErrors` 实例。


    在清单 6-1 中，我只添加了对空用户 ID 的检查，以及测试密码和确认密码是否相同的检查。在实际应用中，你可能希望加入更多检查，以确保密码不会太短或太长，并且用户
    ID 不包含非字母数字字符。如你所见，即使对于这样一个简单的应用，也需要相当多的检查！


