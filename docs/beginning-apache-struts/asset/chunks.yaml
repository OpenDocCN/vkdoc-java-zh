    `<logic:iterate>` tag in `listing.jsp`.


    ## Step 1: Install the JSTL and Struts EL Tag Libraries


    Open the Struts distribution found in the Source Code section of the Apress website
    at `http://www.apress.com`; it’s contained in a zip file named `jakarta-struts-1.2.6.zip`.


    1. Copy all the JAR files in the `.\contrib\struts-el\lib\` folder to LILLDEP’s
    `\lib` folder, taking care to *overwrite* the existing files.

    2. Copy all TLD files to LILLDEP’s `\web\WEB-INF\` folder. Again, overwrite the
    older files.


    ## Step 2: Amend `web.xml`


    Add a `<taglib>` entry declaring the JSTL core tag library, `c.tld`. The recommended
    URI is `http://java.sun.com/jstl/core`, but of course, you’re free to use anything
    you like.


    ## Step 3: Amend `listing.jsp`


    In `listing.jsp`, use JSTL’s `<c:forEach>` tag rather than the `<logic:iterate>`
    tag. Remember to add a taglib declaration for the JSTL core tag library at the
    start of the page.


    As usual, compile, redeploy, and test your work.


    ## Useful Links


    - Struts Apache online reference for the Logic tag library: `http://struts.apache.org/struts-doc-1.2.x/userGuide/dev_logic.html`

    - Struts Apache online reference for the Nested tag library: `http://struts.apache.org/struts-doc-1.2.x/userGuide/dev_nested.html`

    - *Pro JSP 2, 4th Edition*, by Simon Brown, Sam Dalton, Daniel Jepp, Dave Johnson,
    Sing Li, and Matt Raible (Apress, 2005)

    - JSTL specs: `www.jcp.org/en/jsr/detail?id=052`

    - An EL tutorial from Sun: `http://java.sun.com/j2ee/1.4/docs/tutorial/doc/JSPIntro7.html`

    - A list of Struts tags that have not been EL-enabled because they have equivalents
    in JSTL: `http://struts.apache.org/struts-doc-1.2.x/faqs/struts-el.html`


    ## Summary


    - The Logic library has tags for iteration, conditional processing, and flow control.
    Most of these tags have JSTL equivalents.

    - The Nested tag library is used to shift the implicit base object that the `property`
    attribute refers to. You can use nested properties to achieve a similar effect.

    - JSTL consists of four tag libraries (Core, Formatting, XML Processing, and Database
    Access), which you can use in place of some Struts tags.

    - `<c:forEach>`, `<c:if>`, `<c:choose>...<c:when>`, and `<c:out>` tags from the
    JSTL core tag library can be used to replace the Struts `<logic:iterate>` and
    conditional processing tags in the Logic tag library.

    - `<c:out>` can be used to replace `<bean:write>`, but supporting tags from the
    JSTL Formatting tag library are needed to fully replace `<bean:write>`.

    - EL is a way to give EL-enabled tags dynamic attributes. EL has several special
    keywords to help it do this.

    - There are EL-enabled Struts tags you can use alongside the original Struts tags.


