    ■**Note** The page, template, and component properties of the <tiles:insert> tag
    are synonymous.


    You might want to use a different synonym to indicate if a layout or Tiles component
    (see the next section) is used. This simply improves readability.


    The other way to specify the values of the attribute or name property is to create
    a definition within the Tiles definitions file. For example, you could move part
    of Listing 14-4 into the Tiles definitions file, as shown in Listing 14-5.


    **Listing 14-5.** *tiles-def.xml, with a Single Definition*


    <?xml version="1.0" encoding="ISO-8859-1" ?>


    <!DOCTYPE tiles-definitions PUBLIC


    "-//Apache Software Foundation//DTD Tiles Configuration 1.1//EN"


    "http://struts.apache.org/dtds/tiles-config_1_1.dtd">


