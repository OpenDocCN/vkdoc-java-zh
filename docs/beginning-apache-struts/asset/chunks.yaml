    **308**


    第 20 章 ■ JAVASERVER FACES 与 STRUTS SHALE


    • **架构**：JSF 的重点在于架构——各个组件如何相互通信、请求如何处理等等。重点不在于具体的组件（如下拉列表、选项卡视图或电子邮件地址验证器）。事实上，JSF
    被特意设计为可扩展的。


    • **基于 Web 的 UI 组件**：举个例子或许有帮助。我使用 OpenOffice 作为文字处理器。我自定义了工具栏，使其在每次加载 OpenOffice
    时显示某些按钮。某些按钮会高亮显示，例如“对齐”按钮，以指示当前激活的对齐方式。此外，当我点击“另存为”时，OpenOffice 会记住我上次保存文件的目录，并弹出已选中该文件夹的“保存”对话框。现在想象一下在你的
    Web 应用中实现所有这些功能。你该从何入手？现实情况是，让基于 Web 的应用表现得像普通桌面应用一样极具挑战性。基于 Web 的 UI 组件及其背后的请求处理机制能帮助你实现这一目标。


    与通常只提供一两种方式来完成特定任务的 Struts 不同，JSF 规范非常灵活，你可以从众多组合中选择一种来完成任务。这种灵活性可能会造成一种错觉，认为
    JSF 过于复杂而难以使用。


    从某种意义上说，这确实如此。JSF 很复杂，但大部分复杂性对使用它构建 Web 应用的页面开发者和应用开发者来说是隐藏的。只有在你扩展 JSF 时——例如，创建新的
    UI 组件，或提供与其他框架（如 Commons Validator 框架或 Spring）的集成点时——复杂性才会显现出来。

