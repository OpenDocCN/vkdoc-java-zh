    Since all your application’s text is in the Application.properties file, here’s
    all you need to do to support a new language:


    • **Translate** the Application.properties file to the language for the new locale.
    The translation would leave the keys the same, and only affect the messages. If
    the translator used a character encoding other than ASCII, you will have to postprocess
    the translated file before you can use it. More on this shortly.


    • **Append the locale** **identifier** to the translated filename. For example,
    a Japanese translation must be called Application_jp.properties. The additional
    _jp identifies this translation as belonging to the Japanese locale.


    • **Install** the new properties file in the *same folder* as the default Application.properties
    file (see Figure 12-1).


    That’s it! When the user’s browser is set for the desired locale (say jp), Struts
    will use the right properties file (in this case, Application_jp.properties) for
    that user. All prompts, buttons, dialog boxes, and text will appear in Japanese.


    **Figure 12-1.** *Various installed Application.properties files*


    ■**Note** If you were writing an application for U.S. English (with the associated
    locale en_US), then the properties file would be Application_en_US.properties.


