    # Chapter 13


    ## Review Lab: Editing Contacts in LILLDEP


    **Congratulations!** You’ve made it halfway through this book. Before moving on
    to more advanced topics, I’d like to give you the opportunity to review some of
    the material in the preceding chapters.


    In this review lab, you’ll make it possible to edit Contacts in LILLDEP’s database.


    Specifically, you’ll build on the “full listing” page (`listing.jsp`), so that
    when a user clicks on a company name, they are taken to a page displaying the
    Contact’s full details. These details may be changed and resubmitted, causing
    the database entry to be updated.


    Try your best to answer questions 1–4:


    1. If you turn the company name into a link, how will you determine which company
    was clicked? (*Hint*: Look at the source code for `BaseContact`.)

    2. You obviously want to reuse `full.jsp` to display the data that’s going to
    be edited. Do you need to make any changes to it to support updating contact information?
    Why?

    3. Can you similarly reuse `ContactForm` and `ContactAction`? Do you need to make
    changes to them to support updating?

    4. What other classes would you need to complete the editing facility? (*Hint*:
    What creates the populated form for editing?)


    Compare your answers to the ones in Appendix D before proceeding.


    ### Implementing the Edit Facility


    All you need to do is populate and display the `full.jsp` form once the user clicks
    on the company name. You have already implemented the code for updating the Contact
    in the previous lab sessions. Complete the following:


    1. Amend `listing.jsp` to put in the link for the company name. Let the handler
    be `EditContact.do`.

    2. Complete the implementation of `EditContactAction` to load the form data. This
    Action should forward to `full.jsp`.

    3. Put in an action mapping to tie the path `EditContact` with `EditContactAction`
    and the form `ContactForm`.


    Test out your application to see if the form populates correctly. Also ensure
    that you can make changes to the contact’s details.


    ---


    # Part 2


    ## Advanced Struts


    *As Struts became a common starting point for developers new to the Java platform,
    an interesting phenomenon was occurring—for many developers, the key perceived
    value of using Struts was assumed to be the JSP custom tags for HTML forms. While
    these tags are quite useful, they do not constitute a robust user interface component
    model, which has led to the need to create or integrate third-party tag libraries
    for more complex presentation requirements. To me, the core value has always been
    in the controller tier—the request processing lifecycle, and the features which
    this lifecycle has enabled, such as the additions of the Tiles framework for reusable
    look and feel, and the Validator Framework for client-side and server-side enforcement
    of form validation business rules.*


    —Craig McClanahan


