- fmt: '**Q5**: If you changed the name of one of a form’s properties (say `zipcode`
    to `postcode`), would you have to change the corresponding error key for `ActionErrors`,
    that is, `errors.add("zipcode",...)` to `errors.add("postcode",...)`?


    **Answer**: You are not *required* to make the change, because the error keys
    are independent of the form property names. However, it would be *wise* to do
    so, to avoid confusion.


    **Q6**: If your answer to Q5 was “yes,” what other changes would you have to make?


    **Answer**: If you did make the change, you’d also have to change the `property`
    attribute on the `<errors>` tag. In other words, you’d have to change `<html:errors
    property="zipcode"/>` to `<html:errors property="postcode"/>`.


    **Q7**: If there were more than one validation error for a single property, which
    error message (if any) do you think would be displayed?


    **Answer**: If a property had more than one error message, all error messages
    for that property would be displayed. This is often confusing, so the trick in
    Q4 is useful.


    **Lab 8: Contact Entry Page for LILLDEP**


    **Step 1:** Which libraries would you use?


    **Answer**: The HTML and Bean tag libraries


    **Step 5:** What is the name of the handler for this form?


    **Answer**: `ContactFormHandler`


