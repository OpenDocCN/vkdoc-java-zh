    **Migrating Legacy Code**


    As your webapp grows, creating and maintaining individual validate() functions
    containing mainly generic validations can be a challenge. As I’ve discussed in
    the introduction to this chapter, using the Validator framework brings many benefits,
    so migrating your legacy code to the Validator framework might be something you’d
    want to do. Fortunately, this is a simple three-step process:


