    Your pages need not have the extension .jsf, but the call to them must. For example,
    suppose you have a JSP page containing JSF markup named mypage.jsp. To correctly
    call this page, you’d have to make a request for


    http://www.mycompany.com/mypage. **jsf**


    If you were to make a request for http://www.mycompany.com/mypage.jsp directly,
    you’d get an error message.


    You can name your pages with a .jsf extension, but this would *not* work with
    a JSP 1.2–compliant servlet container. JSP 1.2 requires JSP pages to have the
    .jsp extension. So, the most portable method is to name your JSF pages .jsp and
    request them as .jsf.


    Let’s look at each phase in detail. Don’t worry if some of my comments seem cryptic
    at the moment. I’ll explain the cryptic bits in the following subsections.


    • **Restore View**: If this is the first time the user requests this page, then
    the *UI tree* (see the discussion in the previous subsection) is created. If this
    is the second time the page is created, then the UI tree is re-created with the
    previously saved state. *Value* *bindings* for each UI component are also processed
    at this phase.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C20.fm Page 316 Monday, January 16, 2006 3:21 PM


    **316**


    C H A P T E R 2 0 ■ J A V A S E R V E R F A C E S A N D S T R U T S S H A L E


    • **Apply Request Values**: Each UI component on the UI tree is given a chance
    to update its state based on the information contained in the incoming HTTP request.


    • **Process Validations**: In this phase, validations are processed. If there
    are errors, then processing is taken directly to the Render Response phase.


    • **Update Model Values**: As its name implies, in this phase the Model tier is
    updated with the data from the UI tree. JSF knows which UI components hold data
    destined for the Model tier because you’ve specified this in the JSF markup. Data
    conversion errors will cause processing to proceed directly to the Render Response
    phase.


    • **Invoke Application**: Navigation is performed based on *action events* posted
    during previous phases. It is also possible for your customizations of JSF to
    add other processing code to this phase.


    • **Render Response**: The HTML output is created, based on either the navigation
    results or the existing UI tree (if the page is to be redisplayed). The state
    of the UI tree is also saved for processing on subsequent requests.


    After every phase (except for Restore View and Render Response), events that might
    have been generated during that phase are processed.


    Events are Java objects that contain information indicating a certain processing
    state.


    Events are generated by UI components on the UI tree, or by your own processing
    code attached to any phase. Processing of events is done either by JSF itself
    or by event listeners.


    We’ll see how this is done next.


    **Events and Event Listeners**


    In this book, you’ve come across two design patterns: the MVC design pattern and
    the Singleton design pattern (in Chapter 19). Events and event listeners fall
    under a simple but powerful design pattern called *Observer*.


    In the Observer design pattern, there are two roles. The first is that of a Publisher,
    a data source that gets updated from time to time. The second role is that of
    Subscriber, denoting entities interested in being updated with the latest data
    available on the Publisher.


    A bad way to get Subscribers updated with the latest data is for them to interrogate
    the Publisher at regular intervals. This technique, called polling, is obviously
    inefficient: poll too fast and you waste CPU time; poll too slowly and you risk
    getting the data too late or losing it altogether.


    Instead of polling, the Observer design pattern employs the “don’t call us, we’ll
    call you” maxim. Subscribers interested in getting data from the Publisher first
    *register* with the Publisher. When the new data arrives, the Publisher *informs*
    all its registered Subscribers.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C20.fm Page 317 Monday, January 16, 2006 3:21 PM


    C H A P T E R 2 0 ■ J A V A S E R V E R F A C E S A N D S T R U T S S H A L E


    **317**


    Let’s take a concrete example. GUI frameworks like Swing or Abstract Windowing
    Toolkit (AWT) have classes representing visually displayed UI components, like
    buttons, check boxes, and so forth. Each of these GUI components needs to signal
    certain user interactions, like a mouse click over a button, or a key pressed
    in a text input box. Each such activity is called an *event.*


    An event is usually represented by a Java class, which has fields containing data
    describing the event. For example, in the case of mouse clicks, a MouseClickEvent
    might contain the X and Y coordinates of the mouse click, as shown in Listing
    20-2.


    **Listing 20-2.** *A Class to Represent Mouse Clicks*


    public class MouseClickEvent{


    private int _x, _y;


    public MouseClickEvent(int x, int y){


    _x = x; _y = y;


    }


    public int getX(){ return _x; }


    public int getY(){ return _y; }


    }


    Notice that classes representing events are usually *immutable*, meaning that
    you can only read data from them once they are created. The reason for this is
    because an event could be shared among many Subscribers. You don’t want any Subscriber
    to amend the event.'
