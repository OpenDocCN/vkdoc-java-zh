    C H A P T E R 5 ■ T H E M V C D E S I G N P A T T E R N


    One reason for this glaring deficiency in Struts is because there are already
    several frameworks to help you with data access and persistence. These go under
    the monikers


    “persistence framework/layer” or “object/relational (O/R) persistence service.”
    The reason these frameworks exist is to persist data, and do it *well*. You may
    use any one of these in conjunction with Struts. So you see, it isn’t a deficiency
    at all but just good design.


    There are two different approaches to data persistence:


    • **Persist the classes**: **This approach lets you store and retrieve any Java
    object to/from a relational database. You are provided with a set of classes,
    which you must use to persist and retrieve your own Java classes. An example of
    this approach is Hibernate, from Apache.**


    **• **Classes that persist**: In this approach, you specify a description for
    your database tables and their interrelationships. The persistence framework *autogenerates*
    Java classes (source code), which have mappings to your database tables. These
    autogenerated classes have save(), select(), and delete() functions to allow persistence
    and retrieval of data objects. A prime example of this approach is Torque, also
    from Apache.


    The “persist the classes” approach is by far the more flexible of the two, since
    you could potentially persist any Java class, including legacy ones, or third-party
    classes. The “classes that persist” approach, on the other hand, lacks this capability
    but produces a cleaner separation between Model and Controller.


    I should warn you that while this comparison between approaches is valid, you
    can’t use it to choose between products like Hibernate and Torque. Hibernate,
    for example, provides many features beyond what I’ve described here. These extra
    features are what you’d want to consider when choosing a persistence framework.'
