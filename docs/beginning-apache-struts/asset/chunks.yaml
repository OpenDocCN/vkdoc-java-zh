    ■**注意** 注册 webapp 未使用 Tiles，因此我们使用了上一步中所示的控制器。


    然而，如果你的应用程序*确实*使用了 Tiles，请改用 FacesTilesRequestProcessor。


    **第 4 步：迁移你的 Struts JSP 页面**


    Struts-Faces TLD 文件包含了一些标签，你可以用它们来替代 Struts HTML 和 Bean 标签库。建议你使用 JSTL 替代 Struts
    Logic 标签库，并使用嵌套属性语法替代 Nested 标签库。上述说明同样适用于 Struts-EL 标签。不过，你应继续按原样使用 Tiles 标签库。


    如果你有一个现有的 Struts 应用程序，你可以*逐步*迁移到 JSF——不必一次性完成所有工作。无论你是要迁移现有应用还是创建新应用，每个页面都需要执行以下几步操作。


    首先，在你的 JSP 中声明 JSTL、JSF 和 Struts-Faces 标签库。它们必须按以下顺序声明：


    <%@ taglib prefix="c" uri="http://java.sun.com/jstl/core" %>


    <%@ taglib prefix="f" uri="http://java.sun.com/jsf/core" %>


    <%@ taglib prefix="h" uri="http://java.sun.com/jsf/html" %>


    <%@ taglib prefix="s" uri="http://struts.apache.org/tags-faces" %>


    显然，你应该移除页面上对 HTML、Bean、Nested 或 Logic 标签库的声明。


    接下来，放入替换标签。表 20-1 显示了 Struts-Faces 标签库中的标签，它们相当于 HTML 或 Bean 标签库中的某些标签。


    你可以使用 <s:loadMessages> 替代 <f:loadMessages>。两者的区别在于，<s:loadMessages> 会使你声明的 Struts
    Application.properties 文件对 JSF 标签可用。


    这些替换标签的属性与对应的 Struts 标签类似，但在某些情况下，它们相当基础。一个典型的例子是 <s:message>，它不允许像 <bean:message>
    那样使用替换参数。在这种情况下，你应该使用功能更强大的 <h:outputFormat> 标签，它允许使用替换参数。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


