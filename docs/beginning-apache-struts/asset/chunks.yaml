    one (Listing 14-4)?


    Tiles layout definitions can even be “subclassed.” For example, suppose we wanted
    a new definition similar to the old one (in Listing 14-5), but where the title
    was fixed and the footer was changed. Listing 14-7 shows the amended definitions
    file.


    **Listing 14-7.** *tiles-def.xml, with a New Definition*


    <?xml version="1.0" encoding="ISO-8859-1" ?>


    <!DOCTYPE tiles-definitions PUBLIC


    "-//Apache Software Foundation//DTD Tiles Configuration 1.1//EN"


    "http://struts.apache.org/dtds/tiles-config_1_1.dtd">


    <tiles-definitions>


    <definition name=".simple" path="/layouts/simple-layout.jsp">


    <tiles:put name="header" value="/common/header.jsp" />


    <tiles:put name="footer" value="/common/footer.jsp" />


    </definition>


    <definition name=".simple.admin" extends=".simple" >


    <tiles:put name="title" value="Admin Zone" />


    <tiles:put name="footer" value="/common/admin-footer.jsp" />


    </definition>


    </tiles-definitions>


    The extends property indicates that the new definition named .simple.admin borrows
    all properties and attributes from the base .simple definition.


    ■**Note** That’s the rationale behind the . separator—you can tell at once that
    .simple has no ancestor definitions, and that .simple.admin descends directly
    from .simple.


    The nested <tiles:put> tags either override certain attributes (footer) or add
    new ones (title). The new definition is used in exactly the same way as the old
    one.


    The last way to define and use layouts is to define them *completely* in the Tiles
    definitions file. Continuing from Listing 14-7:


