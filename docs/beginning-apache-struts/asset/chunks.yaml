    The next section provides a preview of the new Struts-Faces integration library.
    This library allows you to use JSF with Struts, and lets you gracefully “upgrade”
    your existing Struts applications.


    **Lab 20: The Struts-Faces Integration Library**


    The Struts-Faces integration library (“Useful Links” tells you where to download
    the latest distribution) has been around for some time, but it’s only recently
    seen active development.


    It’s essentially a separate JAR file that you can use to “JSF enable” your Struts
    apps with minimum fuss—at least in theory! The release we’ll review in this lab
    (version 1.0) has a few significant limitations, which we’ll discuss these as
    the lab progresses.


    The approach we’ll take is to let you apply the integration library yourself to
    a very simple “registration” Struts webapp.


    ■**Note** The code answers for this lab session are found in the Source Code section
    of the Apress website, in the file lab-20-answers.zip.


    **Step 1: Preparing the Development Environment**


    The registration webapp is a pure Struts webapp, which you’ll transform so that
    it uses JSF


    tags for the View tier instead of the rather limited Struts tags.


    **1.** Unzip the contents of the registration.zip file in the Source Code section
    of the Apress website, to a suitable development folder. This contains the source
    files for a simple registration webapp.


    **2.** Compile and deploy the registration webapp, then play with it so you know
    how it works.


    **Step 2: Install JSF, JSTL, and the Struts-Faces Integration** **Library**


    The Struts-Faces integration library requires a JSF 1.0+ implementation and JSTL
    installed.


    Unfortunately, the library *does not* work with MyFaces. Instead, you’d have to
    use Sun’s reference implementation, which is not included in the Source Code section
    of the Apress website due to licensing restrictions. Complete the following:


