    **151**


    Before I show you how this selection is made, let’s tie up one loose end—the character
    encoding for the translated Application.properties.


    **Processing Translated Application.properties Files**


    The Java programming language only accepts source code and properties files in
    the ISO


    8859-1 character encoding. I’m talking the actual source code here—not the internal
    representation of Java Strings, which are not restricted to this encoding.


    The ISO 8859-1 (aka Latin 1) can encode most western European languages, and is
    for most intents and purposes like ASCII. More precisely, characters that are
    in both ASCII and ISO 8859-1 are given the same character codes.


    Your Application.properties file must also be in this encoding. How do we represent
    other languages with this restrictive encoding? The answer is to use a tool called
    native2ascii.


    This program resides in the bin directory of your JDK.


    When you receive the translated Application.properties file, it might likely not
    be in the ASCII or ISO 8859-1 encoding. The only sure way of getting this information
    is from the translator. Once you know the source encoding, you can use native2ascii:
    native2ascii -encoding UTF-8 jp.properties Application_jp.properties In this example,
    the translated file is jp.properties, which is given in the UTF-8 encoding.


    The final output is Application_jp.properties, which you can actually use.


    The “magic” behind native2ascii is that it “escapes” non–ISO 8859-1 characters
    with the string Unicode version of it. This appears in your properties file as
    sequences of


    \uxxxx.


    When Struts creates the HTML page to be delivered to the user, the encoding specified
    on the page with the <%@ page ... directive is used:


    <%@ page contentType="text/html; **charset=UTF-8**" %> or, you could use the <controller>
    tag in your struts-config.xml (see Chapter 9):


    <controller contentType="text/html; **charset=UTF-8**" /> In both these cases,
    the UTF-8 character encoding is used to encode the HTML pages delivered to the
    user.


