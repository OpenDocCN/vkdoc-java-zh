    **244**


    C H A P T E R 1 7 ■ P O T P O U R R I


    The ServletContext contains information about a webapp’s paths, among other things.


    You can obtain an instance for your webapp from the HttpSession object: ServletContext
    context = response.getSession().getServletContext(); So, all you need to specify
    are the content type and the relative path to the file to be downloaded.


    Of course, in most cases you might prefer to use HTML links instead of FileStreamInfo
    or ResourceStreamInfo. You’ll find these classes useful if for some reason you
    can’t expose a link to the file to be downloaded. Listing 17-3 shows an example
    of how you might subclass DownloadAction, implementing StreamInfo using an anonymous
    class.


    **Listing 17-3.** *Extending DownloadAction*


    package com.myco.myapp.struts;


    import java.io.*;


    import javax.servlet.http.*;


    import org.apache.struts.action.*;


    import org.apache.struts.actions.DownloadAction;


    public class MyDownloadAction extends DownloadAction{


    protected StreamInfo getStreamInfo(ActionMapping mapping,


    ActionForm form,


    HttpServletRequest request,


    HttpServletResponse response)


    throws Exception{


    /* Get InputStream somehow, as a result of processing request */


    InputStream input = ...;


    /* Similarly get content type */


    String contentType = ...;


    return new StreamInfo{


    public InputStream getInputStream(){ return input; }


    public String getContentType(){ return contentType; }


    }


    }


    }


