    protected boolean _isPregnant, _isSmoker;


    public boolean getPregnant(){ return _isPregnant; }


    public void setPregnant(boolean isPregnant){


    _isPregnant = isPregnant;


    }


    public boolean getNonsmoker(){ return _isSmoker; }


    public void setNonsmoker(boolean isSmoker){


    _isSmoker = isSmoker;


    }


    public boolean isSmoker(){return _isSmoker;}


    public void reset(ActionMapping mapping,


    HttpServletRequest request){


    //clear the checkboxes


    setPregnant(false);


    setNonsmoker(true);


    }


    ... //rest of SurveyForm


    The pregnant property is straightforward: If the user checks the associated check
    box, then that translates directly to the pregnant property.


    The nonsmoker property is less obvious: The underlying property that is stored
    is actually the opposite of nonsmoker. This just is a convenience, but as you
    can see, it comes at the price of added confusion.


