- fmt: "# Understanding Unicode and UTF-8\n\nTo understand the advantages of Unicode,\
    \ you have to see that it’s a *widely accepted* *standard* for labeling *all*\
    \ characters with unique numeric identifiers. So, if a web browser and a server\
    \ agree that textual data between them represents Unicode characters, you could\
    \ develop webapps that handle *any* language. If there were no widely accepted\
    \ standard for all characters, then this would not be possible. Before Unicode,\
    \ character sets were either not widely accepted or did not include all characters.\n\
    \nTo see why Unicode has to be separate from UTF-8, you must understand the different\
    \ goals of each. The Unicode numeric identifiers represent a character and hence\
    \ have *meaning*. The UTF-8 character encoding is about getting existing programs\
    \ to work.\n\nThese are different goals and best solved in different ways.\n\n\
    For example, not all legacy software uses ASCII (think ex-Soviet Union), so hard-coding\
    \ the UTF-8 character encodings into Unicode (that is, making the Unicode numeric\
    \ identifier equal the UTF-8 character encoding) would not be beneficial to everyone.\
    \ Also, other encodings of Unicode are more efficient in terms of storage space\
    \ for non-Latin languages. Hard-coding UTF-8 into Unicode would force users of\
    \ these languages (think China) to use more storage space than necessary. Both\
    \ these factors would hinder the widespread adoption of Unicode.\n\nSo, the separation\
    \ between Unicode and any encoding of it (like UTF-8) gives users the benefit\
    \ of being able to agree on the meaning of data *and* the flexibility of choosing\
    \ a character encoding that best meets their needs.\n\n## What About Plain Text?\n\
    \nIf by “plain text” you mean textual data without any encoding, I hope from the\
    \ preceding discussion you realize that there’s no such thing as “plain text”!\n\
    \nAny textual data has an implicit character encoding. In the Western world, this\
    \ might be ASCII.\n\nThe important thing to understand is that you can either\
    \ *assume* an encoding—most programs and software assume an encoding, like ASCII—or\
    \ you can make an encoding explicit, as is the case in the headers of XML or HTML\
    \ documents. However, ensuring that the *declared* encoding matches the *actual*\
    \ encoding (done by the text editor) is a separate issue.\n\nLastly, just as it’s\
    \ possible for the binary value of a Java integer to be displayed as a string,\
    \ it’s possible for the numeric identifier of a Unicode character to be displayed\
    \ as a string. These are usually displayed in the ASCII encoding as a hexadecimal\
    \ number, like `\\u7528`. This partially circumvents the problem of “using” Unicode\
    \ in legacy software.\n\nYou’ll learn more about this in a later section (“Localizing\
    \ Output”). *Do not* confuse this ASCII representation of the Unicode numeric\
    \ identifier with UTF-8.\n\n---\n\n# Locales\n\nIn the previous section, I described\
    \ how using Unicode and the UTF-8 encoding would allow client-server programs\
    \ to communicate data in any language.\n\nHowever, this isn’t quite enough. What’s\
    \ needed is a mechanism for users to *select* the language they want. For example,\
    \ if you are a Chinese speaker, you might want to ask my web application to be\
    \ presented to you in Chinese.\n\n**Locales** are a widely used mechanism to achieve\
    \ this. A locale is an identifier for a language or a variant of a language. For\
    \ example, the identifier for U.S. English is `en_US` and the identifier for Swahili\
    \ is `sw`.\n\nThe local strings themselves are a combination of language code\
    \ and possibly country code. The language code is a two-letter string from the\
    \ ISO 639 standard. The country code (e.g., the `US` in `en_US`) is taken from\
    \ the ISO 3166 standard. Notice that the two-letter language code is in lowercase\
    \ and the two-letter country code is in uppercase, joined by an underscore.\n\n\
    Essentially, the web browser specifies the desired locale as an extra parameter\
    \ in the HTTP header. The server responds by sending that user all pages in that\
    \ locale, if possible.\n\nLocales are the primary basis for localization in Struts.\
    \ All of the internationalization features of Struts are geared toward easy customization\
    \ of your application by locale.\n\nYou’ll see this in action in this as well\
    \ as future chapters.\n\nNow that you understand the basics of character encodings,\
    \ Unicode, UTF-8, and locales, it’s time to move on to address the three primary\
    \ areas of concern you’ll encounter when you attempt to localize your Struts web\
    \ application.\n\n## Processing Input\n\nWeb browsers might use a variety of character\
    \ encodings, depending on the user’s default locale or preferences. Since the\
    \ input data you’re going to work with comes from a web browser, your webapp potentially\
    \ has to handle arbitrary character encodings.\n\nNow, the last thing you want\
    \ to do is accept and process different character encodings.\n\nAnd why not? Suppose\
    \ you store text from different encodings in your database. How will you ever\
    \ know later which encoding they come from? You’d have to store the encoding information\
    \ along with the each textual data you save. Not pretty.\n\nThe obvious solution\
    \ is to use a single encoding that handles *all* languages—like UTF-8.\n\nHowever,\
    \ here you run into a problem: there’s *no way* to fix the character encoding\
    \ you receive from the user’s web browser. Browsers will submit form data in any\
    \ old character encoding and there’s just no way around this.\n\n> **Note** With\
    \ the HTML 4.0 specification, web servers can set the `accept-charset` parameter\
    \ in the HTTP response, but most browsers will ignore this.\n\nOne reasonable\
    \ assumption you can make is that browsers will respond with the same encoding\
    \ they receive from the server. So, if your HTML form is in UTF-8, it’s a safe\
    \ bet that the responses will be in UTF-8 too. This isn’t always true, since web\
    \ browsers offer users the option to change the default encoding.\n\nSo, here’s\
    \ a good rule to stick to. *Use a single, universal character encoding (like UTF-8)\
    \ consistently throughout your application, in every JSP, HTML, XML page, and\
    \ so forth.*\n\nFor your JSPs you could use the `<%@ page` declaration:\n\n```jsp\n\
    <%@ page contentType=\"text/html; charset=UTF-8\" %>\n```\n\nor you could use\
    \ the `<controller>` tag in your `struts-config.xml` (see Chapter 9):\n\n```xml\n\
    <controller contentType=\"text/html; charset=UTF-8\" />\n```\n\nThis second method\
    \ means you need not embed the `<%@ page` declaration in all your JSPs.\n\nOf\
    \ course, this trick wouldn’t work if you call the JSP bypassing Struts. If you’re\
    \ calling the JSP by its name (e.g., `myPage.jsp`), you’re bypassing Struts. If\
    \ the page is delivered from a `<forward>` or a `.do` extension, then you are\
    \ not bypassing Struts, and the trick will work.\n\nFor your static HTML pages,\
    \ you could use the `<meta>` tag to specify the encoding:\n\n```html\n<head>\n\
    \  <meta http-equiv=\"content-type\" content=\"text/html; charset=UTF-8\">\n</head>\n\
    ```\n\nYou have to exercise caution here, because you must ensure that the actual\
    \ encoding of the HTML file (determined by your text editor that writes the HTML)\
    \ is the same as the declared encoding (declared in the `<meta>` tag). There’s\
    \ no way to tell what encoding a browser will respond with if given a form that\
    \ says it’s in UTF-8 but that is really in another encoding.\n\n## Localizing\
    \ Validations\n\nBy “localizing validations,” I mean performing validations specific\
    \ to a locale. For example, if a German user (locale `de`) keyed in a date, you\
    \ might want to validate the input according to the format `dd.mm.yyyy`. For a\
    \ U.S.-based user, you might use a different format, probably `mm/dd/yyyy`."
