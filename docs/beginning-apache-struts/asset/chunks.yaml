    A P P E N D I X C ■ S T R U T S T A G R E F E R E N C E


    **445**


    Attributes


    Both base-attrs and exprop-attrs are accepted, and have their usual meaning. Besides
    these, there are two additional attributes:


    • value: A constant substring that the property or extended property will be matched
    for. For example, if the property or extended property results in the string “Visit
    Zimbabwe”, then value="im" would cause a match, while value="Zic" would not.


    • location: The value is either start or end, and specifies where the matching
    should take place within the source string. If omitted, a match anywhere will
    succeed.


    Examples


    Here’s a simple example that looks for an email address with an .sg suffix:


    <logic:match name="MyBean" property="email"


    value=".sg" location="end">


    I see you''re from Singapore!


    </logic:match>


    Or you could interrogate the HTTP request header:


    <logic:notMatch header="user-agent" value="Windows"> Try knoppix now: http://www.knoppix.net


    </logic:notMatch>


    Equivalents


    You can easily create equivalents for these tags using JSTL’s <c:if> (or


    <c:choose>...<c:when>) in conjunction with JSTL functions. (This is a standard
    JSTL


    library of functions. You must declare the JSTL function taglib in order to use
    it.) For example, using <c:if> the previous examples would be


    <c:if test="${fn:endsWith(MyBean.email,''.sg'')}"> I see you''re from Singapore!


    </c:if>


    and


    <c:if test="${fn:contains(header.user-agent,''Windows'')}"> Try knoppix now: http://www.knoppix.net


    </c:if>


