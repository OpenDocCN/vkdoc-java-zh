    基本 Struts 标签


    **S**truts 完全通过使用自定义标签（实际上，正确的术语是自定义*动作*，但我认为自定义*标签*这个术语传达的意义更多，并且与 Struts Actions
    混淆的可能性更小）来实现 MVC 设计模式的视图组件。这些标签应用于构成 webapp 视图组件的 JSP 中。Struts 标签被捆绑到*五个*标签库中：


    • **HTML**：HTML 库中的自定义标签本质上与普通的 HTML `<form>` 标签及其相关的输入标签（如各种 `<input>` 标签）一一对应。此标签库的目的是使你能够将视图组件连接到第
    6 章和第 7 章中描述的控制器组件。实际的连接细节将在第 9 章中描述。


    • **Bean**：此库主要包含用于编写文本的自定义标签。使用 Bean 标签而不是将文本硬编码到 JSP 中有两个原因。第一个是为了实现国际化，即以多种语言显示视图组件。我们将在第
    12 章中展示 Struts 如何帮助你国际化你的 webapp。第二个原因是避免使用 scriptlet 来显示存储在请求或会话对象上的对象内容。


    • **Logic**：此库提供用于条件处理和循环的标签。你使用 Logic 库中的标签来代替使用 scriptlet。逻辑库标签更易于使用，并能生成可读性显著更高的代码。


    • **Nested**：此库包含用于显示表单或对象的“嵌套”属性的标签。我们将在第 10 章中详细描述这一点。


    • **Tiles**：此库包含允许你创建布局的标签。你将在第 14 章中了解如何使用 Tiles 标签库。


