    \ name=\"contact\" property=\"name\"/>\n        <bean:write name=\"contact\" property=\"\
    company\"/>\n        <bean:write name=\"contact\" property=\"tel\"/>\n    </p>\n\
    </logic:iterate>\n```\n\nIn Listing 10-2, the name, company, and telephone number\
    \ of each Contact is listed.\n\nThe `<logic:iterate>` tag has three main attributes:\n\
    \n* `name`: Refers to the iteratable object you’ve placed on the request. In this\
    \ instance, it’s `search_results`.\n* `id`: Specifies a name that represents a\
    \ single element on the iteratable object. In this case, the `id` is `contact`.\
    \ This attribute is required, even if you don’t use it.\n* `indexId` (optional):\
    \ Specifies a number representing the current iteration. The only reason I used\
    \ it here is to write out the iteration number using `<bean:write>`. The `indexId`\
    \ is important when you want to use *indexed properties*, a topic I will come\
    \ to in the next section.\n\nThe `<bean:write>`s write out the name, company,\
    \ and telephone of a given Contact.\n\nNote that the `name` attribute of `<bean:write>`\
    \ refers to the single element exposed by the `id` attribute of `<logic:iterate>`.\
    \ Refer to Appendix C for a thorough explanation of `<bean:write>`.\n\n## ITERATING\
    \ OVER HASHMAPS\n\nIf the iteratable object is a `HashMap` or a class implementing\
    \ a `Map`, the elements are instances of `Map.Entry`. This interface contains\
    \ `getKey()` and `getValue()` functions, so you can use\n\n```\n<bean:write name=\"\
    xxx\" property=\"key\" />\n```\n\nto display the key, and\n\n```\n<bean:write\
    \ name=\"xxx\" property=\"value\" />\n```\n\nto display the corresponding value.\n\
    \nI’d like to reiterate (pardon the pun) that the functionality provided by `<logic:iterate>`\
    \ overlaps with JSTL’s `<forEach>` tag. We’ll come to this in a later section.\n\
    \n## Simple, Nested, Indexed, and Mapped Properties\n\nMany Struts tags accept\
    \ a `property` attribute, which refers to a property on the object they’re operating\
    \ on. We’ve seen this in action, for example, in the `<bean:write>` tag in the\
    \ previous section:\n\n```\n<bean:write name=\"contact\" property=\"company\"\
    />\n```\n\nAs it’s used here, `<bean:write>` attempts to display the return value\
    \ of `getCompany()`, which is called on the object referred to as `contact`. This\
    \ is an example of a *simple property*.\n\nSimple properties are those that implicitly\
    \ call a `getXXX()` function on the object currently under consideration.\n\n\
    Struts supports three other types of properties: *nested*, *indexed*, and *mapped*\
    \ properties.\n\n**Nested properties** allow you to refer to a property of a property.\
    \ For example, if in our previous example the return value of `getCompany()` were\
    \ a JavaBean object, then nested properties would allow you to refer to a property\
    \ on this object:\n\n```\n<bean:write name=\"contact\" property=\"company.name\"\
    />\n```\n\nAs it’s used here, `<bean:write>` attempts to display the return value\
    \ of `getCompany().getName()`.\n\n**Indexed properties** are similar to simple\
    \ properties, but they assume that the function that should be called is `getXXX(int\
    \ index)` instead of just `getXXX()`. So, if the contact object supported a `getCompany(index)`\
    \ function, this is how you would call it:\n\n```\n<bean:write name=\"contact\"\
    \ property=\"company[41]\"/>\n```\n\nAs it’s used here, `<bean:write>` attempts\
    \ to display the return value of `getCompany(41)`.\n\nThis example begs the question\
    \ of how to use indexed properties with `<logic:iterator>`, for example, to display\
    \ a list of values. This is how you’d do it:\n\n```\n<logic:iterate name=\"companies\"\
    \ id=\"company\" indexId=\"cnt\">\n    <bean:write name=\"companies\" property=\"\
