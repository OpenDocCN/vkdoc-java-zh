    ## Message Resources


    Like Struts, JSF also supports internationalization by using message resource
    bundles.


    JSF’s support is much better than Struts. Instead of specifying the `application.properties`
    file in the configuration file, we can declare it in a JSP that uses the message
    resource.


    This means that we can use multiple message resources. You’ll see this in action
    shortly.


    Listing 20-9 shows the message resource for the Registration webapp. The file
    is stored as `net\thinksquared\reg\messages.properties`, and will therefore be
    referred to as `net.thinksquared.reg.messages`.


