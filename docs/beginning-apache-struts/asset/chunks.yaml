    `QUERY`字符串是Hibernate查询语言（HQL）的一个示例，它与SQL类似，但适用于持久化对象。


    这些示例甚至未能触及Hibernate能力的皮毛。


    但我希望至少能让您对Hibernate的使用方式有所了解。


    **简而言之……**


    在本节中，我简要概述了主要的持久化框架：Hibernate和Torque。这些框架非常复杂，有整本书专门介绍它们，因此本节中的介绍非常不完整。即便如此，我希望这能为您自己探索这一领域提供一个良好的起点。


    **自动生成LILLDEP模型类**


    我使用`Lisptorq`来生成LILLDEP模型类。相关代码位于主LILLDEP开发文件夹的`.\lisp\`子目录中。


    有三个数据库表：


    - `CONTACT`，存储联系信息（参见实验6）

    - `COLLECTION`，存储集合的名称和备注

    - `COLLECTION_MAP`，存储实际属于集合的联系人


    要使用`Lisptorq`生成这些类，首先需要创建一个描述这三个表的LISP文件，如清单A-11所示。


    **清单A-11.** *`models.lisp`，用于自动生成LILLDEP模型类的Lisptorq LISP文件*


    ```

    (import lisptorq.lisp)


    define database

    (

    (contact

    (contact_id (PRIMARY REQUIRED INTEGER AUTO))

    (name ((VARCHAR 1024)))

    (designation ((VARCHAR 1024)))

    (department ((VARCHAR 1024)))

    (email ((VARCHAR 255)))

    (tel ((VARCHAR 255)))

    (fax ((VARCHAR 255)))

    (company ((VARCHAR 1024)))

    (address ((VARCHAR 1024)))

    (postcode ((VARCHAR 16)))

    (website ((VARCHAR 255)))

    (activity ((VARCHAR 2048)))

    (classification ((VARCHAR 16)))

    (memo ((VARCHAR 2048)))

    )

    (collection

    (collection_id (PRIMARY REQUIRED INTEGER AUTO))

    (name ((VARCHAR 1024)))

    (memo ((VARCHAR 2048)))

    )

    (collection_map

    (collection_id (REQUIRED INTEGER (FOREIGN collection)))

    (contact_id (REQUIRED INTEGER (FOREIGN contact)))

    )

    )


    (lisptorq:set database-name lilldep)

    (lisptorq:set database-type derby)

    (lisptorq:set derby-home ./dbase)

    (lisptorq:set package net.thinksquared.lilldep.database)

    (lisptorq:generate database)

    ```


    要从此定义自动生成模型类，只需将JAR文件`jlisp.jar`和`lisptorq.jar`放入类路径，并调用`Loader`类，如下所示：


    ```

    java -classpath jlisp.jar;lisptorq.jar

    net.thinksquared.jlisp.Loader models.lisp

    ```


    这将生成所有模型类和辅助类，包括一个`DatabaseSetup`类，您可以调用它来在数据库中创建表。关于使用`Lisptorq`的教程，请访问`www.thinksquared.net/dev/lisptorq/`。


    不幸的是，对于LILLDEP，我们必须使用两个不同的`derby-home`：一个用于首次初始化数据库时，另一个用于在Tomcat上部署时。


    这意味着您必须创建该类两次，或者*手动*更改`Database.java`中设置`derby-home`的静态部分，使其与清单A-12中列出的内容一致。


    **清单A-12.** *对`Database.java`的调整*


    ```

    //set path to database

    String catalinaHome = System.getProperty("catalina.home");

    if(catalinaHome == null){

    //we are called from an pre-install program

    System.setProperty("derby.system.home","./dbase");

    }else{

    //we are on a Tomcat servlet

    System.setProperty("derby.system.home",

    catalinaHome + "/webapps/lilldep/dbase");

    }

    ```


