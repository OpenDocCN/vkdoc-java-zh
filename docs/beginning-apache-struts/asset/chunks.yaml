    第 4 章


    ■ ■ ■


    自定义标签


    **自**定义标签是你创建的 JSP 标签，允许你为 JSP 定义新的功能。例如，假设我们有一个名为 `<temp:F>` 的自定义标签，用于将摄氏度转换为华氏度。我们可以在
    JSP 中使用它：水在 100 摄氏度时沸腾，即 `<temp:F>100</temp:F>` 华氏度。


    显示为：


    水在 100 摄氏度时沸腾，即 212 华氏度。


    虽然这只是一个用于说明自定义标签概念的简单示例，但实际上，自定义标签之所以有用，有以下几个原因：


    • 它们促进了代码复用，因为减少了 JSP 中代码的重复。

    • 它们使 JSP 更易于维护，因为可以避免使用脚本片段。

    • 它们的使用简化了网页设计师的工作，因为无需使用更难编写和使用的脚本片段。

    • 它们是促进关注点分离的关键工具（参见第 1 章）。大多数（如果不是全部）Web 应用框架，包括 Struts 和 JavaServer Faces，都因此使用自定义标签。


    由于 Struts 广泛使用自定义标签，了解如何创建和使用自定义标签对你是有利的。


    **自定义标签基础**


    标签有一个在 JSP 页面上定义的**前缀**（在前面的示例中，前缀是 `temp`）和一个**标签名**（在示例中是 `F`），后者在标签的 **TLD**（**T**ag
    **L**ibrary **D**escriptor，标签库描述符）**文件**中是固定的。


    **在 JSP 上使用标签之前，必须在页面开头声明该标签。例如，`<temp:F>` 标签的声明可能如下所示：** **23**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C04.fm Page 24 Monday, December 12, 2005 3:47 PM


    **24**


    第 4 章 ■ 自定义标签


    `<%@ taglib uri="/tags/temperature" prefix="temp" %>` 我们将在下一节中解析这个声明。现在，只需注意前缀是在
    JSP 中定义的。


    ■**注意** 标签的前缀用于防止标签名冲突。例如，如果你必须使用两个来自不同标签库但名称相同的不同标签，你可以为它们指定不同的前缀以区分。因此，前缀是灵活的，你可以在单个
    JSP 上定义它们。另一方面，标签名不能更改，并且在标签的 TLD 文件中定义。


    标签也可以有属性，例如：


    `<msg:echo message="Hi" />`


    最后，多个标签可以收集到一个 TLD **文件**中。这就是为什么它被称为标签**库**描述符文件。接下来，我们来看一个典型标签的生命周期。


    **自定义标签的处理方式**


    假设我们有一个包含自定义标签的 JSP。它是如何转换成我们在屏幕上看到的文本的呢？当 Servlet 容器首次解析 JSP 时，它会遇到自定义标签，例如：


    `<bean:write property="companyName"/>`


    Servlet 容器期望并在 JSP 页面上查找相应的 **taglib 声明**。例如：


    `<%@ taglib uri="/tags/struts-bean" prefix="bean" %>`


    JSP 页面上可能有多个这样的 taglib 声明。Servlet 容器通过将标签上的前缀与 taglib 声明中的 `prefix` 属性进行匹配，来知道使用哪一个，如清单
    4-1 所示。


    **清单 4-1.** *一个包含 Taglib 声明和自定义标签的 JSP 示例*


    `<%@ taglib uri="/tags/struts-bean" prefix="bean" %>`


    `<bean:write property="companyName"/>`


    taglib 声明只是将一个前缀**与一个 URI**（**U**niform **R**esource **I**dentifier，统一资源标识符**）**关联起来，该
    URI 是指向标签 TLD 文件的*逻辑*路径。`uri` **属性是一个逻辑路径而非真实路径，因为它指向 web.xml（标准 Servlet 配置文件）中的一个特定条目，而不是硬盘上的某个位置。****


    ****[www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C04.fm Page 25 Monday, December 12, 2005 3:47 PM


    第 4 章 ■ 自定义标签


    **25**


    **web.xml **文件必须包含 `uri` 属性所指示的标签库的实际位置。在这种情况下，web.xml 中的相关信息在 `<taglib>` 标签中给出（参见清单
    4-2）。****


    ******清单 4-2.** *web.xml 中的 Taglib 部分*


    `<taglib>`


    `<taglib-uri>/tags/struts-bean</taglib-uri>`


    `<taglib-location>/WEB-INF/struts-bean.tld</taglib-location>`


    `</taglib>`


    从清单 4-2 中需要注意的主要几点是：


    • `taglib-uri` **的主体必须与 JSP 文件中给出的 taglib 声明的 `uri` 属性匹配。**


    **• `taglib-location` 的主体必须包含 TLD **文件的相对路径。在前面的示例中，TLD 文件是 `struts-bean.tld`。**


    **TLD 文件的物理位置始终相对于 Web 应用 WAR 文件的根文件夹（或相对于 Servlet 容器 `webapps` 目录中 Web 应用的子目录）。因此，在清单
    4-2 中，我们看到 TLD 文件位于 `WEB-INF` 文件夹中，名为 `struts-bean.tld`。


    最后，TLD 文件只是一个 XML 文档，包含描述库中标签的元数据。这些元数据包括：


    • 标签的名称（在清单 4-1 中将是 `write`）。

    • 标签的可选和必需属性（以及清单 4-1 中的 `property`）。

    • 处理标签属性和主体以生成输出的 Java 处理程序类。这些 Java 类通常打包在一个 JAR 文件中，你需要将其放置在 Web 应用的 `WEB-INF\lib`
    目录中。


    我们将在实验环节中详细介绍 TLD 文件的细节。图 4-1


    总结了自定义标签的处理流程。


    在最后一步，Servlet 容器调用 Java 标签处理程序上的某些函数，该处理程序负责生成自定义标签的输出。


    如你所见，即使是最简单的自定义标签的处理流程也有些复杂。

