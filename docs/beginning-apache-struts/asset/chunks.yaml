    # Chapter 10


    ## More Tags


    In Chapter 8 we covered the basic Struts tags: those used to display static text,
    to facilitate data entry on forms, and to display error messages.


    The story as we take it up in this chapter becomes a little more complex. Since
    Struts was first developed, a couple of paradigm shifts have occurred in the Java/JSP
    world: the JSP Standard Template Library (JSTL) and JavaServer Faces (JSF).


    JSTL is an attempt to create a set of standardized JSP tags to perform certain
    generic tasks, such as iteration, conditional processing, formatting, internationalization,
    XML processing, and data access. Prior to the advent of JSTL, each JSP-related
    technology like Struts had to create custom tags, from scratch, to do these things.


    This do-it-yourself approach has two big drawbacks:


    - **A steeper learning curve**: Developers new to such a JSP-related technology
    would have to learn how to perform generic things using that technology’s custom
    tags.

    - **Incomplete or inflexible tag libraries**: Because the thrust of the new technologies
    was *not* to do generic things well, it meant that these custom tag libraries
    were often lacking in flexibility and power. Developers would often have to resort
    to ugly tricks with scriptlets to get the functionality they needed.


    JSTL solves these problems by providing tags to perform many of these generic
    functions well. It also makes heavy use of a “mini-language” called the expression
    language (EL) (from the new JSP 2.0 specification), which makes these tags very
    flexible. For these reasons, JSTL is the preferred technology to use when it overlaps
    with custom Struts tags.


    Unfortunately, JSTL requires servlet containers that conform to the JSP 2.0 specification
    in order to work. This is a problem for those who have to work with “legacy” servlet
    installations that are not JSP 2.0 conformant.


    The other parallel development is JavaServer Faces (JSF), a specification by Sun,
    which (among other things) provides a set of custom tags to display a variety
    of client-side interfaces that far exceeds the paltry collection in the Struts
    HTML and Bean tag libraries. The Apache Shale project (more on this in Chapter
    20) is a ground-up rework of Struts around the JSF specification. It is certainly
    possible that some of the tags from Shale will make their way into Struts in the
    future.


    **107**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


