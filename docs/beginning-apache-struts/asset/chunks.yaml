- fmt: '# The Initial Bean Attribute Set


    The Initial Bean attribute set (`init-attr`) consists of just one attribute, `name`,
    which refers to a JavaBean whose corresponding property (specified by the `property`
    attribute of the element) is used as an initial value for the rendered element.
    The form bean associated with the enclosing form is the default bean for this
    task, and it is used if `name` is not specified.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # The Error Style Attribute Set (Struts 1.2.5+)


    The Error Style attribute set (`err-attrs`) was newly introduced with Struts 1.2.5.
    These attributes enable you to specify an error style if a given input element
    hits a validation error. Table C-9 describes these attributes.


    **Table C-9.** *The `err-attrs` Attribute Set*


    | Attribute Name | Usage |

    | --- | --- |

    | `errorKey` | The key under which the error messages are stored. You only need
    to specify this attribute if you also specified the associated `<html:errors>`’s
    `name` attribute. The two must be the same. |

    | `errorStyle` | The CSS style for the element if there is an error message for
    it. |

    | `errorStyleClass` | The name of the CSS style class for the element if there
    is an error message for it. |

    | `errorStyleId` | Assigns this new ID to the element, if there is an error message
    for it. |


    # Struts-EL Tags for the HTML Tag Library


    All tags in the HTML library have EL-enabled versions.


    > **Note** EL-enabled tags are those that allow you to use EL expressions. Refer
    to Chapter 10 for examples.


    ## `base`


    This tag is used to allow you to conveniently create an HTML `<base>` tag.


    The HTML `<base>` tag allows you to specify the base URL from which to calculate
    relative paths (e.g., `../../myscripts.js` or `mypage.html`) in your JSPs. You
    might think that such URLs are resolved using the absolute path of the enclosing
    JSP page, but this isn’t necessarily the case. The only way to guarantee this
    is to use the `<base>` tag, or much more conveniently, `<html:base>`.


    ### Usage Restrictions


    Both `<base>` and `<html:base>` must be a child tag of HTML’s `<head>` tag.


    ### Attributes


    - `server`: Specifies the base URL. If you omit the `server` attribute, then Struts
    pastes the path to the enclosing JSP page. The `server` attribute gets rendered
    as the `href` attribute of `<base>`.

    - `target`: If your app uses frames, then you can specify the name of the frame
    to which this base URL applies, in the page that defines the frame.


    ### Examples


    The simplest, and most useful, example is using the `<html:base />` tags by itself:


    ```html

    <head>

    <html:base />

    </head>

    ```


    The implied base is that of the JSP page itself. This gets rendered as:


    ```html

    <head>

    <base href="http://www.mycompany.com/mywebapp/">

    </head>

    ```


    Similarly, if you wanted to fix the base of a frame within the current webapp,
    use this:


    ```html

    <head>

    <html:base target="myframe" />

    </head>

    ```


    If you need to set the base to point to another server, then use the `server`
    attribute:


    ```html

    <head>

    <html:base server="http://www.myothercompany.com" />

    </head>

    ```


    ### Equivalents


    The Struts-Faces taglib (see Chapter 20) contains an `<s:base>` tag, which accepts
    a `target` attribute. There is no equivalent of the `server` attribute, though.


    A hack for the `<html:base/>` tag is:


    ```jsp

    <base href="<%= request.getScheme() %>://<%= request.getServerName() %>:

    <%= request.getServerPort() %>/

    <%= request.getContextPath() %>/">

    ```


    ## `button`


    `<html:button>` represents an HTML button. By itself, an `<html:button>` does
    nothing—it does not submit the form, for example. You have to use one (or more)
    of the event-handling attributes (see `evt-attrs`) to activate some JavaScript
    in order to do anything interesting.'
