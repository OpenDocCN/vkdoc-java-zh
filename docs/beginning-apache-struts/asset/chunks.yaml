- fmt: '# This technology is really a specification laid out by Sun, detailing the
    behavior of a program called a `servlet container`. A `servlet container` takes
    care of parsing HTTP requests, managing sessions, and compiling JavaServer Pages
    (JSPs), among other things.


    `Servlets` are Java classes you write in order to handle HTTP requests and responses.


    These classes are usually subclasses of `HttpServlet`, which has many convenience
    functions to help your servlet subclasses do their job.


    Anyone can implement Sun’s Servlet specification, and in fact, there are many
    servlet containers available. Popular ones include WebLogic from IBM and the freely
    available, open source Tomcat from the Apache Software Foundation (ASF).


    One of the beauties of Struts is that although it is dependent on servlet technology,
    you can develop Struts applications with having to know much about servlets! This
    chapter will equip you with everything you need to know about servlets for the
    journey ahead.


    The first thing you need to do is install a servlet container on your machine.


    ## Lab 2: Installing Tomcat


    In this lab session, you’ll install the Tomcat servlet container on your PC. Be
    sure to finish this lab because you will be using Tomcat in subsequent chapters.
    Complete the following:


    1. Choose a convenient location on your hard drive on which to perform the installation.


    Let’s call this the `INSTALL` directory. For example, you might want to use `C:\Tomcat\`
    as an `INSTALL` directory.


    2. From the Source Code section of the Apress website, found at `http://www.apress.com`,
    copy the file `jakarta-tomcat-5.0.28.zip` to the `INSTALL` directory.


    > **Note** If you’re already using Tomcat, be sure you’re using 4.x or (better)
    5.0.x, because higher versions (5.5.x and above) require JSDK 1.5 and versions
    lower than 4.x require some fiddling to work with Struts.


    3. Unzip the contents of the zip file, ensuring that the Create Folders option
    is selected.


    The directory `jakarta-tomcat-5.0.28` should appear.


    4. Locate the directory of your Java SDK installation. This directory is known
    as the `JAVA_HOME` directory.


    > **Note** I’m assuming you have installed the 1.4 JSDK.


    5. Open `.\jakarta-tomcat-5.0.28\bin\startup.bat` with a text editor such as Notepad
    and put in an extra line at the start to set up the `JAVA_HOME` path. For example,
    if the JDK is in `C:\jdk1.4.2\`, you’d use:


    ```

    JAVA_HOME=C:\jdk1.4.2\

    ```


    6. Repeat Step 5 for the `shutdown.bat` batch file.


    > **Note** If you’re using Linux or some *nix OS, the files to amend are `startup.sh`
    and `shutdown.sh`.


    Now test your Tomcat installation:


    7. Double-click on the `startup.bat` batch file. You should see a DOS screen appear
    (see Figure 2-1).


    8. Open the URL `http://localhost:8080` with your favorite web browser. You should
    see the default Tomcat welcome web page (Figure 2-2).


    9. When you’re done, double-click the `shutdown.bat` batch file to stop Tomcat.


    ![Tomcat starting up](images/00032.png)


    ![The Apache Tomcat welcome page](images/00030.png)


    ### Should You Encounter Problems...


    If you encounter problems, check the following:


    - That you’ve got the `JAVA_HOME` path right. If `startup.bat` terminates abruptly,
    this is likely the problem.

    - That you don’t have another web server (like IIS or PWS) or application latched
    on to port 8080.

    - If you have a firewall running on your PC, ensure that it isn’t blocking traffic
    to and from 8080. Also ensure that it doesn’t block `shutdown.bat`.


    If none of this works, try putting a `pause` DOS command at the end of the batch
    file to read the error message. Try using Google with the error message. Nine
    times out of ten, someone else has had the same problem and posted a solution
    on the Internet.


    ## Servlet Container Basics


    Now that you have installed Tomcat, you have to know how to install your web applications
    on it. The information in this section applies to any conformant servlet container,
    not just Tomcat.


    Apart from the `bin` directory in which `startup.bat` and `shutdown.bat` live,
    the most other important directory is the `webapps` directory, which will contain
    your web applications.


    A web application is bundled as a WAR file (for **W**eb **A**pplication a**R**chive),
    which is just an ordinary JAR file with the `.war` extension. To deploy a web
    application, you simply drop its WAR file in the `webapps` directory and presto!
    Tomcat automatically installs it for you.


    You know this because Tomcat will create a *subdirectory* of `webapps` with the
    same name as your web application.


    > **Note** If you want to **re-deploy** a web application, you have to **delete**
    the existing web application’s subdirectory. Most servlet containers will not
    overwrite an existing subdirectory.


    The WAR archive file must contain the following:


    - A `WEB-INF` directory, into which you put a file called `web.xml`, used to configure
    your webapp. Struts comes with a `web.xml` file that you must use.

    - A `WEB-INF\lib` directory, into which you put all Struts JAR files, including
    any third-party JAR files your application uses.

    - A `WEB-INF\classes` directory, into which go the `.class` files for your webapp.

    - Your JSP, HTML, image, CSS, and other files. JSP and HTML files are usually
    on the “root” of the WAR archive, CSS usually in a `styles` subdirectory, and
    images in a (surprise!) `images` subdirectory.


    Figure 2-3 illustrates this information.


    ![Structure of a simple WAR file](images/00032.png)


    Don’t worry too much about having to memorize these details for the time being.
    Future labs should make them second nature to you.


    ## Important Servlet Classes


    In the introduction to this chapter, I told you that you didn’t have to know much
    about servlets in order to use Struts.


    This is true, except for two servlet helper classes that are very important to
    Struts. You need to pay special attention to these. They will certainly be used
    in your Struts applications:


    - `HttpServletRequest`: Used to read parameter values on an incoming HTTP request
    and read or set “attributes” that you can access from your JSPs.

    - `HttpSession`: Represents the current user session. Like `HttpServletRequest`,
    `HttpSession` also has `get` and `set` functions for attributes but they are associated
    with the user session instead of the request.


    These objects represent “scopes,” or lifetimes, of variables on your webapp. I’ll
    explain scopes in more detail in the next chapter.


    Figure 2-4 illustrates the most used functions on these two classes.


    ![HttpServletRequest and HttpSession](images/00030.png)


    Note that you can obtain an instance of `HttpSession` from `HttpRequestServlet`
    using the latter’s `getSession()` function. The important functions on both classes
    are also listed in Appendix B.


