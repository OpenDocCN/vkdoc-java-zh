    ■**注意** Struts 如何定位这个属性文件的具体细节是第 9 章的主题，届时你将学习如何配置 Struts。


    属性文件只是包含键/值对的文本文件。在这种情况下，*键*是 `reg.error.password.mismatch`，而*值*可能是 `您输入的密码不匹配！`。


