- fmt: "# Dynamic Forms\n\nEvery time you need a new form for user input, you usually\
    \ have to write a new `ActionForm` subclass. This can get tedious quickly, especially\
    \ if your form has many getter and setter functions. (I hope you had a taste of\
    \ how bad it can get in Lab 6, where you had to implement `ContactActionForm`,\
    \ with 14 getters and setters.)\n\nIn previous chapters, I’ve shown you how to\
    \ alleviate these problems a little by reusing forms (Lab 9a) or by using nested\
    \ properties (Lab 10a) to avoid writing superfluous getter and setter functions\
    \ in your `ActionForm` subclasses.\n\nBut these get you only so far. *Dynamic\
    \ forms*, the subject of this chapter, are a way to eliminate writing Java code\
    \ entirely. Instead, you declare additional XML in `struts-config.xml` for each\
    \ form you want to create. The XML involved is an extension to the usual `<form-bean>`\
    \ declaration you’re familiar with: you add `<form-property>` tags for each property\
    \ in the form.\n\nLike everything else in life, there are advantages as well as\
    \ disadvantages to using dynamic forms. The primary advantage is, of course, that\
    \ you don’t have to declare getters and setters for your form. This can be quite\
    \ a big plus if your application requires a lot of forms. However, as you’ll see\
    \ later, dynamic forms also have a number of important shortcomings.\n\nToward\
    \ the end of this chapter, we’ll also look at a couple of recent additions to\
    \ Struts (since Struts 1.2.6) that take the dynamic forms idea to the extreme.\
    \ Using `LazyValidatorForm`, you don’t even have to declare the properties in\
    \ your forms!\n\nWe won’t be done with dynamic forms in this chapter. In Chapter\
    \ 19, I’ll show you how to implement a plug-in that makes interesting extensions\
    \ to dynamic forms.\n\n## Declaring Dynamic Forms\n\nTo create a dynamic form,\
    \ you need only to declare it in your `struts-config.xml` file.\n\nDeclaring a\
    \ dynamic form is easy: in your `<form-bean>` declaration of the form, put in\
    \ extra `<form-property>` tags for each property on the form.\n\nYou can declare\
    \ *simple*, *indexed*, *mapped*, or *nested* properties this way (see Chapter\
    \ 10).\n\nListing 16-1 shows how you might declare a form bean with a simple (`String`),\
    \ indexed (array), and mapped property (using a `HashMap`).\n\n**Listing 16-1.**\
    \ *Declaring a Dynamic Form*\n\n```\n<form-bean name=\"MyFormBean\"\n      type=\"\
    org.apache.struts.action.DynaActionForm\">\n  <form-property name=\"MySimpleProp\"\
    \n                 type=\"java.lang.String\"\n                 initial=\"Hello\"\
    \ />\n  <form-property name=\"MySimpleIntProp\"\n                 type=\"int\"\
    \ />\n  <form-property name=\"MyIndexedProp\"\n                 type=\"java.lang.String[]\"\
    \n                 size=\"314\" />\n  <form-property name=\"MyMappedProp\"\n \
    \                type=\"java.util.HashMap\" />\n  <form-property name=\"MyNestedProp\"\
    \n                 type=\"com.myco.myapp.MyBean\" />\n</form-bean>\n```\n\nThe\
    \ first thing to note is that the `type` attribute *must* be either `org.apache.struts.action.DynaActionForm`\
    \ (itself a subclass of `ActionForm`) or your subclass of `DynaActionForm`.\n\n\
    To put it another way, Struts disregards a `<form-bean>`’s `<form-property>` tags\
    \ *unless* the `ActionForm` subclass indicated by the `type` attribute is also\
    \ a subclass of `DynaActionForm`. For Struts versions later than 1.2.6, this is\
    \ not strictly true. See the note for details.\n\n**Note** In versions of Struts\
    \ later than 1.2.6, if the class indicated by the `type` attribute is of type\
    \ `BeanValidatorForm` or a subclass of it (like `LazyValidatorForm`), then the\
    \ `<form-property>` tags are read as well. I’ll describe both of these interesting\
    \ new additions toward the end of this chapter.\n\nYou may extend the `Validator`\
    \ framework either by implementing your own `validate()` function or by creating\
    \ a new validator."
