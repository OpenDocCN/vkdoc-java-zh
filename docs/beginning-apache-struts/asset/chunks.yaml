- fmt: "# 排版后的内容\n\nIf we had used `<nested:writeNesting id=\"dummy\" />`, then the\
    \ output would have been blank. This is because instead of being displayed on\
    \ the page, a page-scoped variable named `dummy` has been created. To display\
    \ it, you need to use a scriptlet embedded within the same nested level as the\
    \ `<nested:writeNesting>` that defined the variable. For example:\n\n```\n<html:form\
    \ ...>\n  <nested:nest property=\"contact\">\n    <nested:nest property=\"company\"\
    >\n      <nested:writeNesting id=\"dummy\"/>\n      Nesting level is: <%= dummy\
    \ %>\n    </nested:nest>\n  </nested:nest>\n</html:form>\n```\n\nNote that if\
    \ you placed the scriptlet in a different nesting level, you’d get an error:\n\
    \n```\n<html:form ...>\n  <nested:nest property=\"contact\">\n    <nested:nest\
    \ property=\"company\">\n      <nested:writeNesting id=\"dummy\"/>\n    </nested:nest>\n\
    \    Nesting level is: <%= dummy %> //ERROR!!\n  </nested:nest>\n</html:form>\n\
    ```\n\nLastly, the `property` attribute simply appends the given value to the\
    \ end of the nesting level. So the code snippet\n\n```\n<html:form ...>\n  <nested:nest\
    \ property=\"contact\">\n    <nested:nest property=\"company\">\n      Nesting\
    \ level is: <nested:writeNesting property=\"hello\" />\n    </nested:nest>\n \
    \ </nested:nest>\n</html:form>\n```\n\ndisplays on the HTML page as\n\n```\nNesting\
    \ level is: contact.company.hello\n```\n\n## Equivalents\n\nNone.\n\n---\n\n##\
    \ root\n\nThis tag is used to specify a base object.\n\nYou use `root` either\
    \ to specify a different base object from the current one (as is the case within\
    \ an `<html:form>` tag) or to define a base object if none exists (as is the case\
    \ anywhere outside an `<html:form>`).\n\n### Usage Restrictions\n\nNone, but you\
    \ obviously need to specify the `name` attribute in order to accomplish anything.\n\
    \n### Attributes\n\nThere is just one attribute, `name`, which is the name of\
    \ the JavaBean on the current request.\n\nThis bean is used as the new base object\
    \ for all Nested tags enclosed by `<nested:root>`.\n\n### Examples\n\nSuppose\
    \ you wanted to access a nested property using, say, `<bean:write>`, in an `<html:form>`,\
    \ but with the base object called `MyBean` instead of the base object implied\
    \ by `<html:form>`.\n\nHere’s how you would do it:\n\n```\n<html:form action=...>\n\
    \  <bean:write name=\"MyBean\" property=\"contact.name\"/>\n  <bean:write name=\"\
    MyBean\" property=\"contact.email\"/>\n  <bean:write name=\"MyBean\" property=\"\
    contact.company\"/>\n</html:form>\n```\n\nTo accomplish the same thing with the\
    \ Nested tags, you’d have to use `<nested:root>`:\n\n```\n<html:form action=...>\n\
    \  <nested:root name=\"MyBean\">\n    <nested:nest property=\"contact\">\n   \
    \   <nested:write property=\"name\"/>\n      <nested:write property=\"email\"\
    />\n      <nested:write property=\"company\"/>\n    </nested:nest>\n  </nested:root>\n\
    </html:form>\n```\n\nAs you know (see the corresponding reference), `<html:form>`\
    \ defines an implicit base object, which is the form bean associated with that\
    \ form. `<nested:root>` allows you to temporarily redefine the base object. This\
    \ would also work outside an `<html:form>`. For example, the snippet\n\n```\n\
    <bean:write name=\"MyBean\" property=\"contact.name\"/>\n<bean:write name=\"MyBean\"\
    \ property=\"contact.email\"/>\n<bean:write name=\"MyBean\" property=\"contact.company\"\
    />\n```\n\nmay be replaced with\n\n```\n<nested:root name=\"MyBean\">\n  <nested:nest\
    \ property=\"contact\">\n    <nested:write property=\"name\"/>\n    <nested:write\
    \ property=\"email\"/>\n    <nested:write property=\"company\"/>\n  </nested:nest>\n\
    </nested:root>\n```\n\n### Equivalents\n\nNone.\n\n---\n\n# The Tiles Tag Library\n\
    \nThe Tiles tag library supports the Tiles plug-in, which is used to create layouts\
    \ and reusable GUI components. Chapter 14 explains Tiles in detail, and you should\
    \ consult it to understand how to use Tiles.\n\nTable C-13 gives a synopsis of\
    \ all tags in the Tiles tag library. Table C-13 is based on the Apache documentation.\
    \ Please refer to `www.apache.org/licenses/LICENSE-2.0` for a copy of the Apache\
    \ License.\n\n**Table C-13.** *Synopsis of the Tiles Tag Library*\n\n| Tag | Usage/Comments\
    \ |\n|-----|----------------|\n| `insert` | Inserts a layout or Tile. |"
