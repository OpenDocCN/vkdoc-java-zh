    要理解 Unicode 的优势，你必须认识到它是一个*被广泛接受的* *标准*，用于为*所有*字符分配唯一的数字标识符。因此，如果 Web 浏览器和服务器约定它们之间传输的文本数据代表
    Unicode 字符，你就可以开发能够处理*任何*语言的 Web 应用。如果没有一个被广泛接受的标准来涵盖所有字符，这是不可能实现的。在 Unicode 出现之前，字符集要么未被广泛接受，要么没有包含所有字符。


    要理解为什么 Unicode 必须与 UTF-8 分离，你必须明白它们各自不同的目标。Unicode 数字标识符代表一个字符，因此具有*含义*。而 UTF-8
    字符编码则关乎让现有程序能够正常工作。


    这些是不同的目标，最好用不同的方式来解决。


    例如，并非所有遗留软件都使用 ASCII（想想前苏联地区），因此将 UTF-8 字符编码硬编码到 Unicode 中（即让 Unicode 数字标识符等于
    UTF-8 字符编码）对所有人来说并非都有利。此外，对于非拉丁语系语言，Unicode 的其他编码在存储空间方面更高效。将 UTF-8 硬编码到 Unicode
    中会迫使这些语言的使用者（想想中国）使用比必要更多的存储空间。这两个因素都会阻碍 Unicode 的广泛采用。


    因此，Unicode 与其任何编码（如 UTF-8）之间的分离，为用户带来了既能就数据含义达成一致*又能*灵活选择最符合其需求的字符编码的好处。


    ***那纯文本呢？**


    如果你所说的“纯文本”是指没有任何编码的文本数据，我希望通过前面的讨论你能意识到，世界上根本不存在所谓的“纯文本”！


    任何文本数据都有一个隐含的字符编码。在西方世界，这可能是 ASCII。


    需要理解的重要一点是，你可以*假设*一种编码——大多数程序和软件都假设一种编码，比如 ASCII——或者你可以明确指定一种编码，就像 XML 或 HTML
    文档的头部那样。然而，确保*声明的*编码与（由文本编辑器完成的）*实际*编码相匹配是另一个问题。


    最后，就像 Java 整数的二进制值可以显示为字符串一样，Unicode 字符的数字标识符也可以显示为字符串。这些通常以 ASCII 编码显示为十六进制数，例如


    \u7528。这在一定程度上规避了在遗留软件中“使用”Unicode 的问题。


    你将在后面的章节（“本地化输出”）中了解更多相关内容。*不要*将 Unicode 数字标识符的这种 ASCII 表示与 UTF-8 混淆。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C12.fm 第 146 页 2006 年 1 月 12 日，星期四，上午 11:04


    **146**


    第 12 章 ■ 国际化


    **区域设置**


    在上一节中，我描述了如何使用 Unicode 和 UTF-8 编码使客户端-服务器程序能够以任何语言通信数据。


    然而，这还不够。还需要一种机制，让用户能够*选择*他们想要的语言。例如，如果你说中文，你可能希望我的 Web 应用以中文呈现给你。


    **区域设置**是实现这一目标的广泛使用的机制。区域设置是语言或语言变体的标识符。例如，美国英语的标识符是 en_US


    而斯瓦希里语的标识符是 sw。


    区域设置字符串本身是语言代码和可能的国家/地区代码的组合。语言代码是来自 ISO 639 标准的两个字母的字符串。国家/地区代码（例如 en_US 中的 US）取自
    ISO 3166 标准。请注意，两个字母的语言代码是小写的，两个字母的国家/地区代码是大写的，用下划线连接。


    本质上，Web 浏览器在 HTTP 标头中指定所需的区域设置作为额外参数。如果可能，服务器会以该区域设置向该用户发送所有页面作为响应。


    区域设置是 Struts 中本地化的主要基础。Struts 的所有国际化特性都旨在让你能够轻松地按区域设置自定义应用程序。


    你将在本章以及后续章节中看到它的实际应用。


    既然你已经了解了字符编码、Unicode、UTF-8 和区域设置的基础知识，是时候继续解决在尝试本地化 Struts Web 应用时会遇到的三个主要关注领域了。


    **处理输入**


    Web 浏览器可能会使用多种字符编码，具体取决于用户的默认区域设置或偏好。由于你要处理的输入数据来自 Web 浏览器，你的 Web 应用可能需要处理任意的字符编码。


    现在，你最不想做的事情就是接受和处理不同的字符编码。


    为什么不呢？假设你将来自不同编码的文本存储到数据库中。以后你怎么知道它们来自哪种编码？你必须将编码信息与你保存的每个文本数据一起存储。这可不妙。


    显而易见的解决方案是使用一种能够处理*所有*语言的单一编码——比如 UTF-8。


    然而，这里你遇到了一个问题：你*无法*固定从用户 Web 浏览器接收到的字符编码。浏览器会以任何旧的字符编码提交表单数据，对此你无能为力。


    ■**注意** 根据 HTML 4.0 规范，Web 服务器可以在 HTTP 响应中设置 accept-charset 参数，


    但大多数浏览器会忽略此参数。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C12.fm 第 147 页 2006 年 1 月 12 日，星期四，上午 11:04


    第 12 章 ■ 国际化


    **147**


    你可以做出的一个合理假设是，浏览器会使用它们从服务器接收到的相同编码进行响应。因此，如果你的 HTML 表单是 UTF-8 编码的，那么可以稳妥地假设响应也将是
    UTF-8 编码。但这并不总是成立，因为 Web 浏览器为用户提供了更改默认编码的选项。


    因此，这里有一个值得坚持的好规则。*在你的整个应用程序中，在每个 JSP、HTML、XML 页面等中，始终如一地使用单一的通用字符编码（如 UTF-8）。*


    对于你的 JSP，你可以使用 <%@ page 声明：


    <%@ page contentType="text/html; **charset=UTF-8**" %> 或者你可以在你的 struts-config.xml
    中使用 <controller> 标签（参见第 9 章）：


    <controller contentType="text/html; **charset=UTF-8**" /> 第二种方法意味着你无需在所有 JSP 中嵌入
    <%@ page 声明。


    当然，如果你绕过 Struts 直接调用 JSP，这个技巧就不起作用了。如果你通过 JSP 的名称（例如 myPage.jsp）调用它，你就是在绕过 Struts。如果页面是通过
    <forward> 或 .do 扩展名传递的，那么你就没有绕过 Struts，这个技巧就会生效。


    对于你的静态 HTML 页面，你可以使用 <meta> 标签来指定编码：


    <head>


    <meta http-equiv="content-type" content="text/html; charset=UTF-8">


    </head>


    这里你必须小心谨慎，因为必须确保 HTML 文件的实际编码（由编写 HTML 的文本编辑器决定）与声明的编码（在 <meta> 标签中声明）相同。如果一个表单声明是
    UTF-8 编码但实际上却是另一种编码，你无法知道浏览器会以什么编码进行响应。


    **本地化验证**


    我所说的“本地化验证”是指执行特定于区域设置的验证。例如，如果一位德国用户（区域设置 de）输入了一个日期，你可能希望根据 dd.mm.yyyy 格式来验证输入。对于美国用户，你可能会使用不同的格式，可能是
    mm/dd/yyyy。

