    For more examples using <tiles:insert>, refer to Chapter 14.


    **definition**


    This tag declares a layout, or a customization of it, enabling it to be reused.
    You call the definition from a <tiles:insert> to actually use it.


    Usually, you first declare the definition in a shared JSP page, then use <%@ include
    file="..." %> to include that JSP in your pages that utilize that definition.


    <tiles:definition> also allows you to customize an existing layout or existing
    definition, then reuse that customized version in one or more JSP pages of your
    own. You perform customization using <tiles:put> and related tags.


    Notice that I haven’t discussed the use of the <tiles:defiinition> tag in Chapter
    14


    because a much better alternative is to declare your definitions in the tiles-defs.xml
    file instead. This makes maintenance of your definitions easier to track, and
    obviates the need to use shared JSP pages.


    Usage Restrictions


    The id attribute is required.


    Attributes


    • id: Specifies a unique name for this definition.


    • scope: Specifies the JSP scope of the definition, once it is created. The default
    scope is page. Setting the value to a scope with a longer lifetime (say session)
    would allow you to access that definition with <tiles:insert> throughout the user
    session.


    Of course, used unwisely, this freedom leads to “high maintenance” webapps.


    • template/page: The name of the JSP page that holds the actual layout. Remember
    that definitions only declare a layout. The actual layout itself is contained
    in a JSP


    page. This page usually contains <tiles:insert attribute="..."/> tags to dictate
    placement of named items. Refer to Listing 14-3 for an example of this.


    • role: A role that must match any one of the remote user’s roles in order for
    this definition to be processed. For a brief discussion on roles, refer to the
    entry for


    <logic:present>.


    • extends: The name of a “parent” definition that you want to further customize.


    See Listing 14-7 to see how this works.


