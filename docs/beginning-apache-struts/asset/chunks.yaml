    第 14 章 ■ 磁贴（TILES）


    我希望你明白我们在这里做什么。我们想将查询保存到会话作用域中，以便能够在页面间查看 Find 结果。我们不能简单地保存 Scroller（并在每次需要时使用
    `absolute()` 重置它），因为我们可能会更改 Contact 的详细信息，使其不再匹配查询。


    这一步中有几个微妙之处：


    • 注意，我们必须保存查询的克隆，而不是查询本身。这是因为 Struts 会重置查询对象本身的字段。这是 Struts 工作方式的一部分。因此，为了避免持有一个被清空的表单，我们必须克隆它。


    • 当 URL 中的 `command` 参数指向 Tiles Controller（即 FindAction）上不存在的函数时，会调用 `unknown()`
    函数（你可以从 `TilesLookupDispatchAction` 中看到此行为）。在我们的例子中，当用户点击 Submit 而不是 Find 时，会调用
    `unknown()`。


    • 当 `full.jsp` 页面被直接调用或被其他表单处理器（例如 `EditContact.do`）调用时，URL 中不存在 `command` 参数。这意味着会调用
    `TilesLookupDispatchAction` 上的 `unspecified()` 函数。因此，为了让 Find 工具正确更新自身，`unspecified()`
    必须调用 `unknown()`。


    **第 3 步：添加 Tiles Action 映射**


    **1.** 在 `struts-config.xml` 中创建一个新的表单处理器，以声明你刚刚创建的 Tiles controller。


    **2.** 将 `parameter` 属性设置为 `command`。这对于 `TilesLookupDispatchAction` 根据点击的提交按钮正确分发是必要的。


    **3.** 将表单处理器的 `scope` 设置为 `session`，以匹配主表单的作用域。


    **4.** 确保你的 Tiles controller 能够获取从主页面提交的表单副本。（请参阅“获取外部表单数据”一节了解如何实现。）**第 4 步：修改
    ContactAction**


    由于现在有*两个*提交按钮（Submit 和 Find），我们需要 ContactAction 处理 Submit 而忽略 Find。


