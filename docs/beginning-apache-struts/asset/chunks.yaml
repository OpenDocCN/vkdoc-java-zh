- fmt: '# Appendix C: Struts Tag Reference


    ## Table C-5. The `evt-attrs` Attribute Set


    | Attribute Name | Trigger |

    |----------------|---------|

    | `onblur` | Element loses focus. |

    | `onchange` | Element’s value changed and element has lost focus. |

    | `onclick` | Element is clicked. |

    | `ondblclick` | Element is double-clicked. |

    | `onfocus` | Element gains focus. |

    | `onkeydown` | Key pressed when element has focus. |

    | `onkeypress` | Key pressed then released when element has focus. |

    | `onkeyup` | Key released when element has focus. |

    | `onmousedown` | Mouse button is pressed while pointer is over element. |

    | `onmousemove` | Mouse pointer is moved over element. |

    | `onmouseout` | Mouse pointer leaves element. |

    | `onmouseover` | Mouse pointer enters element. |

    | `onmouseup` | Mouse button is released while pointer is over element. |


    ## The Accessibility Attribute Set


    The next set is also HTML related, and these attributes aid in accessibility.
    Table C-6 lists these tags, which we’ll refer to as the Accessibility attribute
    set, or `acc-attrs` for short.


    **Table C-6.** *The `acc-attrs` Attribute Set*


    | Attribute Name | Usage |

    |----------------|-------|

    | `accesskey` | Specifies the key that if pressed, causes this element to gain
    focus. |

    | `alt` | Specifies the alternate text for this element. |

    | `altKey` | Specifies the message resource key for the alternate text. |

    | `tabindex` | A positive integer that specifies the tab order for this element.
    |

    | `title` | Specifies the advisory title for this element. In most graphical browsers,
    the advisory title appears as a tooltip when the mouse pointer goes over the element.
    |

    | `titleKey` | Specifies the message resource key for the advisory title. |


    Most attributes in Table C-6 are simply mirror images of their HTML counterparts.
    The exceptions are `altKey` and `titleKey`, which use Struts’ message resource
    file to produce a localized version of the actual attribute (`alt` and `title`,
    respectively).


    ## The Rendering Attribute Set


    The Rendering attribute set (`ren-attrs`) consists of attributes that specify
    the final rendering of the underlying HTML elements that correspond to a tag.
    These are listed in Table C-7.


    **Table C-7.** *The `ren-attrs` Attribute Set*


    | Attribute Name | Usage |

    |----------------|-------|

    | `disabled` | This boolean attribute disables (`disabled = "true"`) an input
    element. In most graphical browsers, this causes the HTML element to be grayed
    out. |

    | `style` | Specifies the CSS styles for this element. |

    | `styleClass` | Specifies the CSS stylesheet class for this element. `styleClass`
    corresponds to the `class` HTML attribute. |

    | `styleId` | Specifies the HTML ID to be assigned to this element. That is, `styleId`
    corresponds to the `id` HTML attribute. |


    ## The Struts Attribute Set


    The Struts attribute set (`struts-attrs`) consists of commonly used attributes
    specific to Struts. These are listed in Table C-8.


    **Table C-8.** *The `struts-attrs` Attribute Set*


    | Attribute Name | Usage |

    |----------------|-------|

    | `bundle` | Specifies the message resources bundle to use. If this isn’t specified,
    the default `Application.properties` file is used. Bundles are a way for you to
    use multiple message resource files in your webapp. Note that the current support
    for this feature is uneven. Also, using it complicates maintenance. The `bundle`
    attribute is explained in more detail in the entry for `<bean:message>`. This
    attribute was newly introduced with Struts 1.2.5. |

    | `indexed` | This boolean attribute is valid only when the enclosing tag is nested
    inside the `<logic:iterate>` tag. If `true`, the name of the rendered HTML tag
    will be indexed, for example, `myProperty[12]`. The number in brackets will be
    incremented for every iteration of the enclosing `<logic:iterate>` tag. |

    | `property` | The name of the request parameter or HTML POST element that will
    be used when a form is submitted, set to the specified value (see the next entry).
    |

    | `value` | Value of the input element. This value is submitted to the Controller
    tier, either in the request parameter or in the HTML POST itself. |


    ## The Initial Bean Attribute Set'
