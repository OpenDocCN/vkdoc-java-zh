    开发文件夹中。这个 zip 文件应包含一个名为 Application_ms.properties 的文件；ms 是马来语的区域设置字符串，马来语是马来西亚使用的语言（印度尼西亚使用的是一种略有变体的语言）。将此
    zip 文件的内容解压到 .\web\resources\ 目录下。


