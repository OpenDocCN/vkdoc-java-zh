- fmt: "# The Validator Framework\n\n> **Note:** You can actually use *any subset*\
    \ of these six parameters, *in any order*! The `Validator` framework will resolve\
    \ the correct function at runtime, based on your declaration in the `<validator>`\
    \ tag for this validation.\n\nHowever, keeping the function signature consistent\
    \ makes maintenance that much easier.\n\nA typical validation function will run\
    \ through these steps:\n\n1. **Determine the value to be validated.** You will\
    \ use the helper class `org.apache.commons.validator.ValidatorUtils` to do this.\n\
    2. **Collect information about the environment** (such as the values of other\
    \ fields on the form), if necessary. You might do this with the `Field`, `ValidatorAction`,\
    \ and `Validator` instances sent in the function’s argument list.\n3. **Run the\
    \ custom validation.** Knowledge of the functions on `org.apache.commons.validator.GenericValidator`\
    \ is helpful, since it contains many useful validations you can reuse.\n4. **Locate\
    \ a suitable `ActionMessage` instance** (instead of calling `new`), and place\
    \ this instance on the given `ActionMessages` object. Use the helper class `org.apache.struts.validator.Resources`\
    \ to do this.\n\n**Listing 15-13.** *Java Handler to Validate Alphanumeric Strings*\n\
    \n```java\npackage com.mycompany.myapp.struts.validator;\n\nimport java.io.Serializable;\n\
    import org.apache.commons.validator.ValidatorAction;\nimport org.apache.commons.validator.Field;\n\
    import org.apache.commons.validator.Validator;\nimport org.apache.struts.action.ActionMessages;\n\
    import javax.servlet.http.HttpServletRequest;\nimport org.apache.commons.validator.util.ValidatorUtils;\n\
    import org.apache.commons.validator.GenericValidator;\nimport org.apache.struts.validator.Resources;\n\
    \npublic class MyValidations implements Serializable {\n\n    public static boolean\
    \ isAlphanumeric(Object bean,\n                                         ValidatorAction\
    \ va,\n                                         Field field,\n               \
    \                          ActionMessages errors,\n                          \
    \               Validator validator,\n                                       \
    \  HttpServletRequest request) {\n\n        // step 1: Determine value\n     \
    \   String value = null;\n        if (String.class.isInstance(bean)) {\n     \
    \       value = (String) bean;\n        } else {\n            value = ValidatorUtils.getValueAsString(bean,\
    \ field.getProperty());\n        }\n\n        // step 2: Collect info about the\
    \ environment\n        /* -------- not needed --------- */\n\n        // step\
    \ 3: Run the custom validation\n        try {\n            if (!(GenericValidator.isBlankOrNull(value)\
    \ ||\n                  GenericValidator.matchRegexp(value, \"^[a-zA-Z0-9]$\"\
    ))) {\n                errors.add(field.getKey(),\n                    /**\n \
    \                    * step 4: Locate a suitable ActionMessage instance.\n   \
    \                  */\n                    Resources.getActionMessage(validator,\
    \ request, va, field));\n                return false;\n            }\n      \
    \  } catch (Exception ignore) {}\n\n        return true;\n    }\n}\n```\n\nA systematic\
    \ and detailed exposition of the Apache Commons Validator classes is beyond the\
    \ scope of this book. In most cases, however, the following information will prove\
    \ useful:\n\n- `field.getProperty()` gives the property of the field being validated.\n\
    - `field.getKey()` gives the error message associated with this validator.\n-\
    \ `ValidatorUtils.getValueAsString(bean, property)` reads the simple/nested/indexed\
    \ property of the given bean.\n- `GenericValidator.isBlankOrNull(value)` returns\
    \ `true` if the value is blank or null.\n- `GenericValidator` has many other functions\
    \ you might find useful, like `matchRegexp(value, regexp)`, which returns `true`\
    \ if the value matches the given regular expression.\n- The Struts class `org.apache.struts.validator.FieldChecks`\
    \ is the Java handler class corresponding to every one of the Validator framework\
    \ standard validators.\n\nArmed with the information from this section, you should\
    \ be well equipped to pursue the topic further by reading the Commons Validator\
    \ source code, as well as `FieldChecks` from Struts.\n\n> **Note:** To compile\
    \ your code, you will need `commons-validator.jar`, `commons-beanutils.jar`, `servlet-apis.jar`,\
    \ and `struts.jar` on your classpath. These files are in the Struts distribution.\n\
    \nThe last step is to declare your validator in `validator-rules.xml`. Listing\
    \ 15-14 shows how this would look in the case of alphanumeric validation.\n\n\
    **Listing 15-14.** *Declaring the Alphanumeric Validator*\n\n```xml\n<form-validation>\n\
    \    <global>\n        <validator name=\"alphanumeric\"\n            classname=\"\
    com.mycompany.myapp.struts.validator.MyValidations\"\n            method=\"isAlphanumeric\"\
    \n            methodParams=\"java.lang.Object,\n                          org.apache.commons.validator.ValidatorAction,\n\
    \                          org.apache.commons.validator.Field,\n             \
    \             org.apache.struts.action.ActionMessages,\n                     \
    \     javax.servlet.http.HttpServletRequest\"\n            msg=\"errors.alphanumeric\"\
    />\n        // ... other <validator> declarations\n    </global>\n</form-validation>\n\
    ```\n\nThe `name` of the validator is what it will be called in your `validation.xml`\
    \ file. The `classname` attribute corresponds to the class containing the validation\
    \ function. The `method` attribute is the actual method used for this validator.\
    \ The `methodParams` attribute declares the method signature of the validation\
    \ function.\n\nThe `msg` parameter defines a *default* error message key that\
    \ the user has to implement in the `Application.properties` file. It is preferable,\
    \ however, to override this default message key and specify your own, as I’ve\
    \ done in Listing 15-4.\n\nYou may add a `depends` attribute to your `<validator>`\
    \ declaration. This functions just like `depends` on your `<field>` tags: the\
    \ comma-delimited list of validators are fired before your custom validation is\
    \ called. For example, in Listing 15-15 I’ve amended Listing 15-14 slightly.\n\
    \n**Listing 15-15.** *Using depends in the Alphanumeric Validator*\n\n```xml\n\
    <validator name=\"alphanumeric\"\n    classname=\"com.mycompany.myapp.struts.validator.MyValidations\"\
    \n    method=\"isAlphanumeric\"\n    methodParams=\"java.lang.Object,\n      \
    \            org.apache.commons.validator.ValidatorAction,\n                 \
    \ org.apache.commons.validator.Field,\n                  org.apache.struts.action.ActionMessages,\n\
    \                  javax.servlet.http.HttpServletRequest\"\n    msg=\"errors.alphanumeric\"\
    \n    depends=\"required\"/>\n// ... other <validator> declarations\n```\n\nThe\
    \ amended validator of Listing 15-15 would fail if the user entered a blank value,\
    \ since it depends on the `required` validator.\n\n## Migrating Legacy Code\n\n\
    As your webapp grows, creating and maintaining individual `validate()` functions\
    \ containing mainly generic validations can be a challenge. As I’ve discussed\
    \ in the introduction to this chapter, using the Validator framework brings many\
    \ benefits, so migrating your legacy code to the Validator framework might be\
    \ something you’d want to do. Fortunately, this is a simple three-step process:\n\
    \n1. **Change the base class** from `ActionForm` to `ValidatorForm`.\n2. **Comment\
    \ out the old `validate()` function** on the legacy code. This makes it easy for\
