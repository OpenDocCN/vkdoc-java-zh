    \ Tuesday, January 24, 2006 10:12 AM\n\n## Chapter 10 ■ More Tags\n\n**119**\n\
    \nWhat I will discuss here is the *intersection* between JSTL and Struts tags.\
    \ Fortunately, this intersection is manageable. JSTL consists of four tag libraries:\
    \ the Core, Formatting, XML Processing, and Database Access tag libraries. Of\
    \ these, only the Core and Formatting tag libraries fall into the intersection.\
    \ From these, only a few tags concern us. They fall into three categories:\n\n\
    - **Output**: Performed by the `<c:out>` tag. In Struts, you’d use `<bean:write>`.\
    \ There are also a number of tags from the Formatting tag library to format text\
    \ and display resource messages.\n- **Iteration**: Performed by the `<c:forEach>`\
    \ tag. The analogous Struts tag is `<c:iterate>`.\n- **Conditional processing**:\
    \ Performed by the `<c:if>` and `<c:choose>...<c:when>` tags. These have a lot\
    \ of tags from the Struts Logic library as counterparts.\n\nBefore I describe\
    \ these three JSTL tags, let’s take a look at the expression language (EL). Much\
    \ of the power of JSTL is attributable to the use of EL within its tags.\n\n>\
    \ **Note** Although I’m introducing EL here with JSTL tags, this is for purely\
    \ pedagogical reasons. EL is independent of JSTL and is part of the JSP 2.0 specification.\n\
    \n## Expression Language (EL)\n\nEL allows the attributes of “EL-enabled” tags\
    \ to assume dynamic values. Before EL, if you wanted dynamic attributes, you had\
    \ to embed scriptlets or custom tags within the attribute (see Listing 10-7),\
    \ resulting in difficult-to-read code.\n\nListing 10-7 illustrates a typical situation\
    \ where dynamic attributes are important and how you might use scriptlets to achieve\
    \ this functionality. The snippet alternately colors the rows of a table gray,\
    \ using a (fictitious) custom tag, `<h:tr>`, to write out HTML table rows with\
    \ some fancy formatting.\n\n**Listing 10-7.** *Alternately Coloring the Rows of\
    \ a Table Gray*\n\n```jsp\n<% for(int i = 0; i < 10; i++){ %>\n<h:tr bgcolor=\"\
