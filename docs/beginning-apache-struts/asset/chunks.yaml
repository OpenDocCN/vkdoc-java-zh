    这是一个指令，告诉 Struts *自动生成* JavaScript，使得当用户浏览器加载页面时，表单上的 userid 字段能够获得焦点（即光标出现在该字段中）。生成的
    JavaScript 细节并不重要，但 Struts 能够做到这一点本身*至关重要*。正如你将在本书中看到的，Struts 的强大之处很大程度上就体现在这类便捷的小功能上。


    **数据输入标签**


    接受数据输入的 Struts 标签必须放在 <html:form> 标签内。清单 8-1 包含了四个输入标签：


    • <html:text> 表示一个文本字段。

    • <html:password> 表示一个密码字段。该字段中的文本会以星号显示。

    • <html:submit> 表示提交按钮。

    • <html:reset> 表示重置按钮，用于清空表单。


    还有其他一些输入标签（例如，用于单选按钮、列表和下拉列表的标签），这些标签将在附录 C 以及后续章节的实验环节中详细描述。在本章中，我们只集中讨论这四个输入标签。


    文本字段标签 <html:text> 和 <html:password> 都有一个 property 属性，用于将它们与表单上的字段绑定。每个字段*必须*与处理该表单的
    ActionForm 子类中的 getXXX() 和 setXXX() 方法对相对应。至于表单处理器*如何*将 JSP 页面与 ActionForm 子类关联起来，这将是第
    9 章的主题。


    目前，只需假设每个 <html:form> 都有与 ActionForm 子类的属性相对应的输入字段即可。


    例如，从清单 8-1 我们可以推断出，处理注册数据的 ActionForm 子类必须包含 getUserid() 和 setUserid() 方法。而它确实包含这些方法（请参考清单
    6-1）。


    文本字段还接受一个 size 属性，允许你指定显示字段的物理尺寸。这与 HTML 中文本输入字段的预期行为完全一致。事实上，所有输入标签的属性都与它们对应的
    HTML 标签属性非常接近。


    <html:submit> 和 <html:reset> 标签分别代表表单上的提交按钮和重置按钮。这些标签内包含的 <bean:message> 标签告诉
    Struts 要在按钮上放置什么标签。同样，这种方法便于实现国际化，并且也能让你的 Web 应用外观更加统一。


    重置按钮会调用你的 ActionForm 子类上的 reset() 函数（参见实验 6 的第 4 步）。如果没有定义该函数，则会调用父类的 super.reset()
    函数，该函数只是简单地重新显示一个空白表单。


    **显示错误信息**


    在前两章中，你已经了解了验证错误信息是如何生成的。现在我们将描述它们是如何显示的。


    当表单验证失败时（无论是简单验证还是复杂验证），会创建一个包含错误信息的 ActionErrors 或 ActionMessages 对象。ActionErrors
    和 ActionMessages 的行为都类似于 Java 的 HashMap。HashMap 的键对应于 <html:errors> 标签的 property
    属性。关联的值就是错误信息本身。


    然而，与 HashMap 不同的是，它可以在同一个键下存储*多个*错误信息。如果单个字段关联了多个错误，这显然非常有用。


    当 Struts 加载一个页面时，它会检查该页面是否存在 ActionErrors 或 ActionMessages。如果存在，它会忠实地将错误信息粘贴到页面中正确的
    <html:errors> 标签里。图 8-3 展示了这一过程。


    正如你所见，只有那些键同时存在于 ActionErrors（或 ActionMessages）*和* JSP 页面中的错误才会被显示。所有其他的错误信息或错误标签都会被忽略。


    因此，在图 8-3 中，只有属性 userid 的错误信息被显示出来。属性 desc 的错误信息被忽略了，因为没有对应的 <html:errors> 标签。

