    还有一个名为 `varStatus` 的实用属性，它能提供当前迭代的相关信息。`varStatus` 有四个属性：


    • `first` 和 `last`，根据当前迭代是否为循环中的第一个或最后一个，分别返回 `true` 或 `false`。


    • `count`，**用于返回当前迭代的序号，从 1 开始计数。**


    **• `index`，用于返回当前迭代的绝对索引，从 0 开始计数，并根据 `step` 属性的值递增。**


