    \ `body` 是未定义的。要使用已声明的定义，你需要包含共享的 JSP，然后使用 `<tiles:insert>`：\n\n```\n<%@ include\
    \ file=\"shared-layouts.jsp\" %>\n<tiles:insert definition=\".basic\">\n  <tiles:put\
    \ name=\"body\" value=\"hello-world.jsp\" />\n</tiles:insert>\n```\n\n注意，`body`\
    \ 现在被定义为指向 `hello-world.jsp`。\n\n**`put`**\n\n`put` 在布局中定义一个命名属性。这允许你自定义布局以进行显示。\n\
    \n**使用限制**\n\n`put` 标签必须嵌套在 `<tiles:insert>` 或 `<tiles:definition>` 中。你还必须指定 `name`（它引用布局中的属性）以及该属性的\
    \ `content`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048AppC.fm\
    \ Page 462 Tuesday, January 17, 2006 4:46 PM\n\n**462** 附录 C ■ STRUTS 标签参考\n\n\
    **属性**\n\n*   `name`：`put` 定义的属性名称。\n*   `value`/`content`：表示属性内容的 URL 或字符串。`value`\
    \ 和 `content` 是同义词。\n*   `beanName`/`beanProperty`/`beanScope`：用于定位对象，该对象被查询以确定此\
    \ `put` 的值。详情请参考表 C-14。这些属性可以替代 `value` 或 `content` 使用。\n*   `type`：指示此 `put`\
    \ 的值的含义——它是 JSP 页面的 URL（`type=\"page\"` 或 `type=\"template\"`）、Tiles 定义（`type=\"\
    definition\"` 或 `type=\"instance\"`）还是字符串（`type=\"string\"`）？如果未指定，则默认为 `type=\"\
    page\"`，除非 `direct=\"true\"`，在这种情况下，`type=\"string\"`。\n*   `direct`：如果设置为 `true`，则导致\
    \ `value` 被解释为字面字符串，而不是需要求值的引用（JSP 页面的 URL 或 Tiles 定义）。默认值为 `false`。\n*   `role`：一个角色，必须与远程用户的任一角色匹配，此\
    \ `put` 才能被处理。关于角色的简要讨论，请参考 `<logic:present>` 条目。\n\n**示例**\n\n请参考 `<tiles:definition>`\
    \ 条目中的示例，了解 `put` 的典型用法。\n\n你也可以像这样在 `put` 的标签体中指定其值：\n\n```\n<tiles:put name=\"\
    myPageTitle\">Here's looking at you!</tiles:put>\n```\n\n当需要指定不符合 XML 属性格式的文本时，这种形式很有用。\n\
    \n**`putList` 和 `add`**\n\n`putList` 创建一个项目列表，并为该列表指定一个名称。一个或多个 `add` 标签嵌套在 `putList`\
    \ 内，用于向列表中添加元素。\n\n**使用限制**\n\n你必须为 `putList` 指定 `name` 属性。\n\n**属性**\n\n`putList`\
