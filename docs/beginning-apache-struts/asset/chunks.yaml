- fmt: '# Figure 10-1


    `Figure 10-1` describes an `ActionForm` subclass and its functions. The data on
    `MyActionForm` is held by two objects: `Monkey`, which in turn has a `Banana`
    object. Our webapp has to allow the user to key in a name for the `Monkey`, and
    a species for the `Monkey`''s `Banana` (`Figure 10-2`).


    **Figure 10-2.** *Form to enter the Monkey''s name and the Banana species*


    As `Listing 10-3` shows, the `Nested` tag library allows you to do this *without*
    having to include additional getters and setters for the name and species in `MyActionForm`.


    **Listing 10-3.** *MonkeyPreferences.jsp*


    ```

    <%@ page contentType="text/html;charset=UTF-8" language="java" %>

    <%@ taglib uri="/tags/struts-html" prefix="html" %>

    <%@ taglib uri="/tags/struts-nested" prefix="nested" %>

    <html:html>

    <body>

    <html:form action="MonkeyPreferencesForm.do">

    <nested:nest property="monkey">

    Monkey''s name:

    <nested:text property="name" size="60" />

    <br>

    <nested:nest property="banana">

    Species of Banana:

    <nested:text property="species" size="60" />

    </nested:nest>

    </nested:nest>

    <html:submit/>

    </html:form>

    </body>

    </html:html>

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    The `<html:form>` tag implicitly sets the *root object* as `MyActionForm`. This
    means that all properties are calculated relative to the `MyActionForm` instance.
    The `<nested:nest>` tag


    ```

    <nested:nest property="monkey">

    Monkey''s name:

    <nested:text property="name" size="60" />

    ```


    makes the property references relative to the `monkey` property instead. So the
    `<nested:text>`''s property tag is really `monkey.name`.


    Your eyes should widen at the `<nested:text>`. Yes, that''s right. The `Nested`
    tag library contains "nested" counterparts for *all* of the HTML tag library,
    most of the bean tag library, and all of the Logic tag library apart from the
    flow control tags. Appendix C lists the tags in the HTML, bean, and logic tag
    libraries supported by the `Nested` tag library.


    Obviously, there''s nothing you can''t achieve with the `Nested` tag library that
    you can''t already do with nested *properties* (see the earlier section). For
    example, `Listing 10-4` shows how `Listing 10-3` could be rewritten without using
    nested tags. In complicated scenarios, though, the use of the `Nested` tag library
    makes your code a little neater.


    **Listing 10-4.** *MonkeyPreferences.jsp, Take 2*


    ```

    <%@ page contentType="text/html;charset=UTF-8" language="java" %>

    <%@ taglib uri="/tags/struts-html" prefix="html" %>

    <html:html>

    <body>

    <html:form action="MonkeyPreferencesForm.do">

    Monkey''s name:

    <html:text property="monkey.name" size="60" />

    <br>

    Species of Banana:

    <html:text property="monkey.banana.species" size="60" />

    <html:submit/>

    </html:form>

    </body>

    </html:html>

    ```


    Lastly, there are times when you want to specify a different root object than
    the default one. You use the `<nested:root>` tag to do this:


    ```

    <nested:root name="myNewRoot">

    </nested:root>

    ```


    Of course, this example assumes that the object named `myNewRoot` has been placed
    on the request. This is usually done in your `Action` subclass. Refer to `Listing
    10-1` and the accompanying discussion to see how this is done.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # JSTL and Struts


    As we mentioned earlier, JSTL was created to give JSP developers a comprehensive
    set of tags to perform a variety of generic tasks. The ultimate goal is to allow
    JSP developers to avoid using scriptlets altogether.


    You might ask what makes JSTL a more compelling alternative to scriptlets. Consider
    `Listing 10-5` and then look at `Listing 10-6`, the JSTL version.


    **Listing 10-5.** *Counting to 99*


    ```

    <%@ page contentType="text/html;charset=UTF-8" language="java" %>

    <html>

    <body>

    <%

    for(int i = 1; i <= 99; i++){

    %>

    This is iteration number <%= i %>

    <%

    }

    %>

    </body>

    </html>

    ```


    **Listing 10-6.** *Counting to 99 with JSTL*


    ```

    <%@ page contentType="text/html;charset=UTF-8" language="java" %>

    ```'
