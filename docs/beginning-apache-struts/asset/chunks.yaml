    第 15 章 ■ VALIDATOR 框架


    验证器的名称就是它在你的 `validation.xml` 文件中被调用的名称。`classname` 属性对应于包含验证函数的类。`method` 属性是用于此验证器的实际方法。`methodParams`
    属性声明了验证函数的函数签名。


    `msg` 参数定义了一个*默认*的错误消息键，用户必须在 `Application.properties` 文件中实现该键。然而，更可取的做法是覆盖这个默认消息键并指定你自己的，就像我在清单
    15-4 中所做的那样。


    你可以向你的 `<validator>` 声明添加一个 `depends` 属性。它的功能与 `<field>` 标签上的 `depends` 类似：在调用你的自定义验证之前，会触发以逗号分隔的验证器列表。例如，在清单
    15-15 中，我对清单 15-14 进行了略微修改。


    **清单 15-15.** *在字母数字验证器中使用 depends*


    ```xml

    <validator name="alphanumeric"


    classname="com.mycompany.myapp.struts.validator.MyValidations"


    method="isAlphanumeric"


    methodParams="java.lang.Object,


    org.apache.commons.validator.ValidatorAction,


    org.apache.commons.validator.Field,


    org.apache.struts.action.ActionMessages,


    javax.servlet.http.HttpServletRequest"


    msg="errors.alphanumeric"


    **depends="required"/>**


    // ... 其他 <validator> 声明

    ```

    清单 15-15 中修改后的验证器在用户输入空值时会失败，因为它依赖于 `required` 验证器。


    **迁移遗留代码**


    随着你的 Web 应用程序的增长，创建和维护包含主要是通用验证的单独 `validate()` 函数可能是一项挑战。正如我在本章引言中讨论的那样，使用 Validator
    框架带来了许多好处，因此将你的遗留代码迁移到 Validator 框架可能是你想要做的事情。幸运的是，这是一个简单的三步过程：


    **1.** 将基类从 `ActionForm` 更改为 `ValidatorForm`。


    **2.** 注释掉遗留代码上的旧 `validate()` 函数。这样，如果你在新验证中发现错误，就可以轻松“回滚”到旧的验证。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C15.fm 第 217 页 2006 年 1 月 24 日，星期二，上午 10:13


    第 15 章 ■ VALIDATOR 框架


    **217**


    **3.** 像往常一样，在 `validation.xml` 中声明所需的验证。如果并非所有验证都可以迁移到 Validator 框架，请使用前面描述的两种技术来适应这些特殊情况。


    最明智的做法是增量迁移，并使用单元测试框架（参见“有用链接”）来测试更改。


