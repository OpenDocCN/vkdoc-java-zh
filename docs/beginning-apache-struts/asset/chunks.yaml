    Struts 标签参考


    **本**附录是 Struts 1.2 所有标签的参考手册，涵盖五个标签库：HTML、Bean、Logic、Nested 和 Tiles。我们提供了使用示例以及关于
    Struts-EL 和 JSTL（两者均见第 10 章）的信息，并在适当位置提供了与 JSF 和 Struts-Faces 集成库（两者均见第 20 章）等效的标签。本参考手册*不*包含已过时的
    Template 标签库，该库已被 Tiles 标签库取代。


    为使本参考手册更加紧凑，我们将出现在多个标签中的属性归入一个或多个*公共属性集*。这些属性集将在描述每个标签库的章节开头进行介绍。


    **HTML 标签库**


    HTML 标签库中的自定义标签本质上与普通的 HTML `<form>` 标签及其相关的输入标签（如各种 `<input>` 标签）一一对应。


    此标签库的目的是使您能够将 Struts Web 应用的视图层连接到控制器层。两者之间的连接在 struts-config.xml 中静态完成。


    HTML 标签库中的标签可根据功能分为四组：

    '
- fmt: '# Struts Tag Reference


    ## Form Tags

    These tags transfer data from View to Controller. The tags are mostly in one-to-one
    correspondence with their HTML equivalents (`<form>` and the various HTML data
    input tags), but there are extra Struts-specific tags (e.g., `multibox`) that
    do much more to facilitate the easy transfer of data between View and Controller.


    ## Message Tags

    These tags display (in the View tier) messages that originate from the Controller.


    ## URL Tags

    These tags are counterparts to ordinary HTML tags that require a URL to function.
    The Struts versions exist primarily to allow you to use the names of global forwards
    instead of actual URLs.


    ## Miscellaneous Tags

    These tags have no clear functional grouping and have to be treated individually.


    Tables C-1 to C-4 give a synopsis of these tags by their functional grouping.
    Tables C-1 to C-4 are based on the Apache documentation for those tags. A copy
    of the Apache License is available at `www.apache.org/licenses/LICENSE-2.0`.


    **Table C-1.** *Form Tags of the HTML Tag Library*


    | Tag | Usage |

    |-----|-------|

    | `form` | Defines a form. |

    | `checkbox` | Generates a checkbox input field. |

    | `file` | Generates a file selection input field. |

    | `hidden` | Generates a hidden field. |

    | `multibox` | Generates multiple checkbox input fields. |

    | `radio` | Generates a radio button input field. |

    | `select` and `option`, `options`, or `optionsCollection` | `select` generates
    a drop-down list. The `option` elements are nested within `select`, and generate
    the options for the enclosing `select` element. |

    | `text`/`password` | Generates a text/password input field. |

    | `textarea` | Generates an HTML `textarea` input field. |

    | `image` | Generates an image input field. |

    | `button` | Generates a button input field. |

    | `cancel` | Generates a cancel button. |

    | `submit` | Generates a submit button. |

    | `reset` | Generates a reset button. |


    **Table C-2.** *Message Tags of the HTML Tag Library*


    | Tag | Usage |

    |-----|-------|

    | `errors` | Displays error messages |

    | `messages` | Iterates through error messages and messages (refer to the entry
    for `<logic:iterate>` for a description of these terms) |


    **Table C-3.** *URL Tags of the HTML Tag Library*


    | Tag | Usage |

    |-----|-------|

    | `base` | Generates an HTML `<base>` tag. This creates a reference from which
    all relative paths in your JSP will be calculated. |

    | `img` | Generates an HTML `<img>` tag. |

    | `link` | Generates an HTML hyperlink. |

    | `rewrite` | Expands a given URI. Useful in creating URLs for input into your
    JavaScript functions. |


    **Table C-4.** *Miscellaneous Tags of the HTML Tag Library*


    | Tag | Usage |

    |-----|-------|

    | `html` | Generates an `<html>` tag. Also includes language attributes from the
    user’s session. |

    | `xhtml` | Tells other tags on the page to render themselves as XHTML 1.0–conformant
    tags. |

    | `frame` | Generates an HTML frame. |

    | `javascript` | Indicates the placement of autogenerated JavaScript. Used in
    conjunction with the Validator framework, described in Chapter 15. |


    ## Common Attribute Sets


    There are attributes that are common to more than one tag of the HTML library.
    These may be naturally grouped into few *common attribute sets*, which we’ll describe
    next. We’ll give each set an abbreviation, which we’ll use in subsequent descriptions
    of each tag.


    ### The Event Handler Attribute Set


    The biggest such attribute set consists of attributes corresponding to HTML event
    handler attributes. The Struts versions are exactly the same as the HTML versions.
    Let’s refer to these as the *Event Handler attribute set*, or `evt-attrs` for
    short. The attributes in this set are described in Table C-5. The value of each
    attribute in this set is a JavaScript function that is called when a particular
    action occurs (e.g., mouse clicks, loss of focus, etc.). If you’re familiar with
    HTML, Table C-5 should hold no surprises for you.'
  raw: '• **Form tags**: These tags transfer data from View to Controller. The tags
    are mostly in one-to-one correspondence with their HTML equivalents (<form> and
    the various HTML data input tags), but there are extra Struts-specific tags (e.g.,
    multibox) that do much more to facilitate the easy transfer of data between View
    and Controller.


    • **Message tags**: These tags display (in the View tier) messages that originate
    from the Controller.


    • **URL tags**: These tags are counterparts to ordinary HTML tags that require
    a URL to function. The Struts versions exist primarily to allow you to use the
    names of global forwards instead of actual URLs.


    • **Miscellaneous tags**: These tags have no clear functional grouping and have
    to be treated individually.


