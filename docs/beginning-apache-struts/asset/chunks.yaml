    C H A P T E R 2 0 ■ J A V A S E R V E R F A C E S A N D S T R U T S S H A L E


    **321**


    <h:inputText value="#{user.userId}"/>


    JSF uses an expression language syntax (see Chapter 10). Note that this is not
    the same as the JSTL “EL” syntax, since it begins with a hash symbol (#).


    *Method binding* is an extension of this idea. It allows your JSF tags to call
    functions on your form bean (the JSF term is *backing bean*). For example:


    <h:commandButton action="#{user.Logon}" />


    describes a button that, if clicked, calls the Logon() function on the user backing
    bean.


    This technique is powerful because you can define multiple buttons on a single
    form, and bind them to different functions, each to process the form data differently.


    **Quick Quiz**


    How would you do the same thing in Struts?


    Because of this, backing beans are sometimes like ActionForm and Action rolled
    into one.


    When you read the JSF literature, you will certainly come across the term *managed*
    *bean*. A managed bean is a backing bean whose instantiation is controlled by
    JSF.


    This is analogous to form beans in Struts. The common characteristic of form beans
    (in Struts) and managed beans (JSF) is that the instantiation of both is performed
    by their respective frameworks.


    The declaration of a managed bean in faces-config.xml (the JSF config file) is
    also different. Instead of


    <form-bean name="user" type="net.thinksquared.reg.User" /> you’d say


    <managed-bean>


    <managed-bean-name>user</managed-bean-name>


    <managed-bean-class>net.thinksquared.reg.User</managed-bean-class>


    </managed-bean>


    The JSF style is more verbose because rather than using attributes, it uses separate
    tags.


    **Navigation**


    In Struts, navigation information (<forward>s) is mixed with processing declarations
    (<action>s). JSF does a much better job at representing navigation information.


    In fact, the whole JSF navigation model is much easier to understand and use compared
    to Struts. Instead of a specialized class like ActionForward, JSF uses plain Java
    Strings.


