  trans: "\n• **在 JSTL 标签中使用** #{} **代替** ${}：JSF 标签使用前者，而 JSTL 使用后者。\n\n• **未能为嵌套在\
    \ JSTL 标签内的*每个* JSF 标签手动分配唯一 ID**：此问题的症状是出现“Duplicate ID error”或类似错误。在这种情况下，只需为嵌套在任何\
    \ JSTL 标签内的每个 JSF 标签（或 JSF 扩展标签）分配唯一 ID 即可。通常，你可以通过为 `<s:form>` 或 `<h:form>` 分配一个\
    \ ID 来解决问题。\n\n如果所有方法都失败，不妨查看 Apress 网站源代码部分中 `lab-20-answers.zip` 文件里的答案，这没什么不好意思的。\n\
    \n■**注意** 由于许可限制，答案压缩包中不包含 Sun JSF 参考实现。你需要自行下载。\n\n**第 8 步：添加必要的 <managed-bean>\
    \ 声明** 这一步解决了 Struts-Faces 集成库的另一个缺点（如果你已经完成了第 7 步，可能已经注意到）：即成功注册后，点击浏览器的刷新按钮时，`RegistrationForm`\
    \ 表单 Bean 并*不会*被实例化。\n\n这可以通过欺骗 JSF 为你创建必要的表单 Bean 来轻松解决。方法是创建一个空白的 `faces-config.xml`\
    \ 文件，然后添加一个 `<managed-bean>` 部分，其中的 Bean 名称与 `struts-config.xml` 中的完全一致（在我们的例子中，它是\
    \ `RegistrationForm`）。\n\n这是一个权宜之计，我相信这个问题将在 Struts-Faces 库的未来版本中得到解决。\n\n**简而言之**\n\
    \n在本实验课程中，我们仅仅触及了 Struts-Faces 集成库的皮毛。\n\n如果你感兴趣，应该尝试一下发行版附带的示例应用程序。\n\n你可能还注意到，除了使用\
    \ `ActionErrors` 之外，你无需修改应用程序中的 `Action` 或 `ActionForm` 子类。这当然是一个巨大的优势，并且在大多数情况下，比迁移到像\
    \ Shale 这样的全新框架更可取。\n\n然而，你应该意识到 Struts-Faces 库并非总是有效。在本节的初稿中，我尝试迁移第 14 章的登录 Web\
    \ 应用程序，结果发现你无法移植那些将视图转发到其他 JSP 的 Tiles，而这正是登录 Web 应用程序所做的。这可能是 JSF 的限制，因此很难看出此类问题如何在\
    \ Struts-Faces 库的未来版本中得到解决。也许可以修改 Tiles 标签，使其与 Struts-Faces 集成库更好地配合使用。\n\n这里的教训是，你需要一个能够解决此类问题的新框架——一个从头开始重写的\
    \ Struts。这正是 Shale 的全部意义所在。\n\n**Struts Shale 预览**\n\n正如我们之前提到的，Shale 基于 JSF。这意味着它继承了\
    \ JSF 的所有优点，例如高度可定制的视图层。但 Shale 在 JSF 之上增加了许多优势。\n\n在本节中，我们将带你了解 Shale 的主要增值领域。这些领域分为两大类：\n\
    \n• 一组服务和服务选项。（不要将这些与 Web 服务混淆。这里的服务类似于 Struts 插件，而服务选项只是配置 Shale 及其服务的方式。）服务包括与\
    \ Validator 框架的集成，以及 Tiles 的重写（现在称为“Clay”）。在这些之上一个重要的新增功能是 Shale 的对话框管理器，它使控制流更加透明。这些服务在设计时考虑到了可定制性，因此与\
    \ Struts 相比，Shale 更易于定制和扩展。\n\n• 与其他框架和技术的集成（Spring、Ajax、JNDI 等）。\n\n在我看来，这些优势加上\
    \ JSF 的优点，使 Shale 成为 Struts 当之无愧的继承者。不幸的是，仅凭技术优势并不能保证生存，而且由于我们在本章开头侧边栏（“Struts\
    \ Ti 和 Struts OverDrive”）中概述的原因，Shale 对经典 Struts 的“继承”绝非板上钉钉。\n\n**ViewController**\n\
    \n在 JSF 中，支持 Bean 是普通的旧 Java 对象（POJO）。这为你创建支持 Bean 提供了很大的灵活性，但也意味着你的 Bean 必须“手动”完成很多事情。\n\
    \n一个很好的例子是用户支持 Bean 的实际实现（参见清单 20-10）。\n\n在我的实现中，我使用了一个 `HashMap` 来模拟数据库。在实际实现中，你可能需要创建和释放数据库连接，而这些操作最好集中处理，而不是在\
    \ `Logon()` 和 `Register()` 等函数中重复。\n\nShale 提供了一个名为 `ViewController` 的*接口*（参见清单\
    \ 20-13），其中包含一些事件处理函数和一个名为 `postback` 的变量。\n\n**清单 20-13.** *Shale 的 ViewController\
    \ 接口*\n\n```java\n/**********************************************************************\n\
    Licensed under the Apache License, Version 2.0 (the \"License\"); you may not\
    \ use this file except in compliance with the License. You may obtain a copy of\
    \ the License at\n\nhttp://www.apache.org/licenses/LICENSE-2.0\n\nUnless required\
    \ by applicable law or agreed to in writing, software distributed under the License\
    \ is distributed on an \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY\
    \ KIND, either express or implied.\n\nSee the License for the specific language\
    \ governing permissions and limitations under the License.\n**********************************************************************/\n\
    package org.apache.shale.view;\n\npublic interface ViewController{\n\n    /**\n\
    \     * 如果页面是第二次被调用，则返回 true。\n     */\n    public boolean isPostBack();\n\n \
    \   /**\n     * 设置“回发”标志。\n     */\n    public void setPostBack(boolean postBack);\n\
    \n    /**\n     * 在当前请求的 JSF 请求处理生命周期完成后调用。\n     */\n    public void destroy();\n\
    \n    /**\n     * 在此 ViewController 支持 Bean 被实例化，并且上述所有属性设置器被调用之后，但在 JSF 请求处理生命周期开始之前调用。\n\
    \     */\n    public void init();\n\n    /**\n     * 在 UI 树恢复后调用。因此，如果页面是第一次显示，则*不会*调用此方法。\n\
    \     */\n    public void preprocess();\n\n    /**\n     * 在“渲染响应”阶段之前调用。此方法仅对实际将要渲染的视图调用。例如，如果你已导航到不同的视图，则不会调用此方法。\n\
    \     */\n    public void prerender();\n}\n```\n\n如果你的*受管* Bean 实现了 `ViewController`\
    \ 接口，Shale 将在适当的时候调用你的 `ViewController` 实现上的事件处理函数（请参考清单 20-13 中的注释）。\n\n其理念是让你在这些函数中集中处理资源的创建或销毁活动。\n\
    \n■**注意** `AbstractViewController` 类实现了 `ViewController`，为 `isPostBack()` 和 `setPostBack()`\
    \ 提供了可运行的实现，并为事件处理程序提供了空操作实现。如果需要，你可以为了方便而扩展此类。\n\n一个重要的陷阱是，你必须为你的 `<managed-bean>`\
    \ 使用正确的名称。\n"
- fmt: "# Not any old name will do!\n\nYour managed bean’s name (we’re referring to\
    \ the name declared in `faces-config.xml`, not the classname of the backing bean)\
    \ will have to match the name of the associated the JSP page (referred to as a\
    \ *view identifier*). Here are some examples:\n\n- If the view identifier is `/logon.jsp`,\
    \ then the managed bean must be named `logon`.\n- If the view identifier is `/admin/logon.jsp`,\
    \ then the managed bean must be named `admin$logon`.\n- If the view identifier\
    \ is named `/header.jsp`, then the managed bean must be named `_header`, because\
    \ `header` alone is reserved in JSF.\n\nFrom this, you can see that there’s a\
    \ one-to-one relationship between managed beans and your JSP pages. This is in\
    \ contrast to the one-to-many relationship we’ve used for the registration webapp.\n\
    \nAll this might seem a little abstract, so we’ll apply the `ViewController` idea\
    \ to a “realistic” example—the Registration webapp, where database connections\
    \ need to be created and released. Listing 20-14 shows this class, with the logic\
    \ stripped out for clarity.\n\n**Listing 20-14.** *User Backing Bean, Take 2*\n\
    \n```\npackage net.thinksquared.reg;\n\n//...other import statements omitted\n\
    \norg.apache.shale.view.AbstractViewController;\n\npublic class User extends AbstractViewController{\n\
    \n    Connection _connection; //connection to database\n\n    //...other private\
    \ variables\n\n    //...constructor\n\n    //...data get/set\n\n    //...UI get/set\n\
    \n    //------------------------------------- Actions\n\n    public String Register(){\n\
    \        //use _connection to read and write to database\n    }\n\n    public\
    \ String Logon(){\n        //use _connection to read and write to database\n \
    \   }\n\n    //------------------------------------- for ViewController\n\n  \
    \  public void init(){\n        //create _connection to database.\n    }\n\n \
    \   public void destroy(){\n        //release _connection to database.\n    }\n\
    }\n```\n\nYou can see in Listing 20-14 how we’ve taken advantage of the facilities\
    \ on `ViewController` to centralize creation and release of the database connection.\n\
    \nOf course, because Shale assumes a one-to-one mapping between managed beans\
    \ and Views, the `<managed-bean>` declaration (see Listing 20-8) has to be changed\
    \ as shown in Listing 20-15.\n\n**Listing 20-15.** *New `<managed-bean>` Declarations\
    \ for the Registration Webapp*\n\n```\n<managed-bean>\n    <managed-bean-name>logon</managed-bean-name>\n\
    \    <managed-bean-class>net.thinksquared.reg.User</managed-bean-class>\n    <managed-bean-scope>request</managed-bean-scope>\n\
    </managed-bean>\n\n<managed-bean>\n    <managed-bean-name>register</managed-bean-name>\n\
    \    <managed-bean-class>net.thinksquared.reg.User</managed-bean-class>\n    <managed-bean-scope>request</managed-bean-scope>\n\
    </managed-bean>\n```\n\nAs you can see, we’ve used the naming rule we discussed\
    \ earlier. Also, the `binding` and `value` attributes in `register.jsp` and `logon.jsp`\
    \ will have to change. Instead of using `#{used.XXX}`, you have to use either\
    \ `#{logon.XXX}` or `#{register.XXX}`, as appropriate.\n\n## Dialog Manager\n\n\
    According to the Shale website, Shale’s Dialog Manager is a “mechanism to define\
    \ a ‘conversation’ with a user that requires multiple HTTP requests to implement,\
    \ modeled as a state diagram.”\n\nSo, a *dialog* is an interaction with the user\
    \ spanning multiple HTTP requests. Shale lets you model a dialog (you can define\
    \ more than one dialog) in an XML file, usually called `dialog-config.xml`. You\
    \ must declare this in your `web.xml` file like so:\n\n```\n<context-param>\n\
    \    <param-name>org.apache.shale.dialog.CONFIGURATION</param-name>\n    <param-value>/WEB-INF/dialog-config.xml</param-value>\n\
    </context-param>\n```\n\nIf you have more than one dialog configuration file,\
    \ simply add them to the declaration using a comma as a separator.\n\nEach “dialog”\
    \ is modeled as a state diagram. Listing 20-16 shows how we might define a couple\
    \ of dialogs for the Registration webapp.\n\n**Listing 20-16.** *Dialogs for the\
    \ Registration Webapp (`dialog-config.xml`)*\n\n```\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<!DOCTYPE dialogs PUBLIC\n    \"-//Apache Software Foundation//DTD\
    \ Shale Dialog Configuration 1.0//EN\"\n    \"http://struts.apache.org/dtds/shale-dialog-config_1_0.dtd\"\
    >\n\n<dialogs>\n    <dialog name=\"Logon\" start=\"Perform Logon\">\n        <action\
    \ name=\"Perform Logon\" method=\"#{logon.Logon}\">\n            <transition outcome=\"\
    success\" target=\"Exit\"/>\n            <transition outcome=\"register\" target=\"\
    Register User\"/>\n        </action>\n        <subdialog name=\"Register User\"\
    \ dialogName=\"Register User\">\n            <transition outcome=\"success\" target=\"\
    Exit\"/>\n        </subdialog>\n        <end name=\"Exit\" viewId=\"/success.jsp\"\
    />\n    </dialog>\n\n    <dialog name=\"Register User\" start=\"Registration Form\"\
    >\n        <view name=\"Registration Form\" viewId=\"/register.jsp\">\n      \
    \      <transition outcome=\"register\" target=\"Perform Registration\"/>\n  \
    \      </view>\n        <action name=\"Perform Registration\" method=\"#{register.Register}\"\
    >\n            <transition outcome=\"success\" target=\"Exit\"/>\n        </action>\n\
    \        <end name=\"Exit\" viewId=\"/success.jsp\"/>\n    </dialog>\n</dialogs>\n\
    ```\n\nThe logic of Listing 20-16 should be obvious. Notice that we’ve used the\
    \ new `<managed-bean>` declarations of Listing 20-15 here.\n\n> **Note** The Registration\
    \ webapp doesn’t fully reveal the usefulness of Shale’s dialogs, because the user\
    \ interaction spans only a couple of pages.\n\nNotice that in Listing 20-16 all\
    \ the transition information is contained in the `dialog-config.xml` file. But\
    \ in our earlier JSF implementation, the JSP pages invoked the functions on the\
    \ user backing bean directly like so:\n\n```\n<h:commandButton action=\"#{user.Logon}\"\
    \ ... //see Listing 20-11\n<h:commandLink action=\"register\"> ... //see Listing\
    \ 20-11\n<h:commandButton action=\"#{user.Register}\" ... //see Listing 20-12\n\
    ```\n\nWe’ll have to change these to:\n\n```\n<h:commandButton action=\"dialog:Logon\"\
    \ ...\n<h:commandLink action=\"dialog:Register User\"> ...\n<h:commandButton action=\"\
    register\" ...\n```\n\nbecause the navigation is now performed using Shale’s Dialog\
    \ Manager, not by JSF’s default navigation handler. Notice that the `action` attributes\
    \ now begin with `dialog:XXX`, with `XXX` the “name” of the dialog. The command\
    \ button that submits the registration information (on `register.jsp`):\n\n```\n\
    <h:commandButton action=\"register\" ...\n```\n\nis different because it needs\
    \ to return a logical outcome and not enter into a dialog directly:\n\n```\n<view\
    \ name=\"Registration Form\" viewId=\"/register.jsp\">\n    <transition outcome=\"\
    register\" target=\"Perform Registration\"/>\n</view>\n```\n\nLastly, note that\
    \ you can mix both JSF-type navigation and Shale’s dialog-based navigation. All\
    \ you need to do in order to enter a Shale dialog is to use a logical outcome\
    \ named `dialog:XXX`. In our case, we’ve moved all the navigation elements from\
    \ Listing 20-8 into the dialog config file, so the `faces-config.xml` file should\
    \ now only contain the `<managed-bean>` declarations.\n\n## Exercise\n\nDownload\
    \ the latest copy of the Shale distribution (see “Useful Links”) and implement\
    \ the Registration webapp as we’ve discussed up to this point.\n\n## Integration\
    \ with the Validator Framework\n\nAt the time of this writing, the integration\
    \ with the Validator framework does *not* include the use of a `validations.xml`\
    \ file in which you can declare your validations."
  raw: 'Not any old name will do! Your managed bean’s name (we’re referring to the
    name declared in faces-config.xml, not the classname of the backing bean) will
    have to match the name of the associated the JSP page (referred to as a *view
    identifier*). Here are some examples:


    • If the view identifier is /logon.jsp, then the managed bean must be named logon.


    • If the view identifier is /admin/logon.jsp, then the managed bean must be named
    admin$logon.


    • If the view identifier is named /header.jsp, then the managed bean must be named
    _header, because header alone is reserved in JSF.


    From this, you can see that there’s a one-to-one relationship between managed
    beans and your JSP pages. This is in contrast to the one-to-many relationship
    we’ve used for the registration webapp.


    All this might seem a little abstract, so we’ll apply the ViewController idea
    to a “realistic”


    example—the Registration webapp, where database connections need to be created
    and released. Listing 20-14 shows this class, with the logic stripped out for
    clarity.


    **Listing 20-14.** *User Backing Bean, Take 2*


    package net.thinksquared.reg;


    //...other import statements omitted


    org.apache.shale.view.AbstractViewController;


    public class User extends AbstractViewController{


    Connection _connection; //connection to database


    //...other private variables


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C20.fm Page 347 Monday, January 16, 2006 3:21 PM


    C H A P T E R 2 0 ■ J A V A S E R V E R F A C E S A N D S T R U T S S H A L E


    **347**


    //...constructor


    //...data get/set


    //...UI get/set


    //------------------------------------- Actions


    public String Register(){


    //use _connection to read and write to database


    }


    public String Logon(){


    //use _connection to read and write to database


    }


    //------------------------------------- for ViewController


    public void init(){


    //create _connection to database.


    }


    public void destroy(){


    //release _connection to database.


    }


    }


    You can see in Listing 20-14 how we’ve taken advantage of the facilities on ViewController
    to centralize creation and release of the database connection.


    Of course, because Shale assumes a one-to-one mapping between managed beans and
    Views, the <managed-bean> declaration (see Listing 20-8) has to be changed as
    shown in Listing 20-15.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C20.fm Page 348 Monday, January 16, 2006 3:21 PM


    **348**


    C H A P T E R 2 0 ■ J A V A S E R V E R F A C E S A N D S T R U T S S H A L E


    **Listing 20-15.** *New <managed-bean> Declarations for the Registration Webapp*


    <managed-bean>


    <managed-bean-name> **logon**</managed-bean-name>


    <managed-bean-class>net.thinksquared.reg.User</managed-bean-class>


    <managed-bean-scope>request</managed-bean-scope>


    </managed-bean>


    <managed-bean>


    <managed-bean-name> **register**</managed-bean-name>


    <managed-bean-class>net.thinksquared.reg.User</managed-bean-class>


    <managed-bean-scope>request</managed-bean-scope>


    </managed-bean>


    As you can see, we’ve used the naming rule we discussed earlier. Also, the binding
    and value attributes in register.jsp and logon.jsp will have to change. Instead
    of using


    #{used.XXX}, you have to use either #{logon.XXX} or #{register.XXX}, as appropriate.


    **Dialog Manager**


    According to the Shale website, Shale’s Dialog Manager is a “mechanism to define
    a


    ‘conversation’ with a user that requires multiple HTTP requests to implement,
    modeled as a state diagram.”


    So, a *dialog* is an interaction with the user spanning multiple HTTP requests.
    Shale lets you model a dialog (you can define more than one dialog) in an XML
    file, usually called dialog-config.xml. You must declare this in your web.xml
    file like so:


    <context-param>


    <param-name>org.apache.shale.dialog.CONFIGURATION</param-name>


    <param-value>/WEB-INF/dialog-config.xml</param-value>


    </context-param>


    If you have more than one dialog configuration file, simply add them to the declaration
    using a comma as a separator.


    Each “dialog” is modeled as a state diagram. Listing 20-16 shows how we might
    define a couple of dialogs for the Registration webapp.


    **Listing 20-16.** *Dialogs for the Registration Webapp (dialog-config.xml)*


    <?xml version="1.0" encoding="UTF-8"?>


    <!DOCTYPE dialogs PUBLIC


    "-//Apache Software Foundation//DTD Shale Dialog Configuration 1.0//EN"


    "http://struts.apache.org/dtds/shale-dialog-config_1_0.dtd">


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C20.fm Page 349 Monday, January 16, 2006 3:21 PM


    C H A P T E R 2 0 ■ J A V A S E R V E R F A C E S A N D S T R U T S S H A L E


    **349**


    <dialogs>


    <dialog name="Logon" start="Perform Logon">


    <action name="Perform Logon" method="#{logon.Logon}">


    <transition outcome="success" target="Exit"/>


    <transition outcome="register" target="Register User"/>


    </action>


    <subdialog name="Register User" dialogName="Register User">


    <transition outcome="success" target="Exit"/>


    </subdialog>


    <end name="Exit" viewId="/success.jsp"/>


    </dialog>


    <dialog name="Register User" start="Registration Form">


    <view name="Registration Form" viewId="/register.jsp">


    <transition outcome="register" target="Perform Registration"/>


    </view>


    <action name="Perform Registration" method="#{register.Register}">


    <transition outcome="success" target="Exit"/>


    </action>


    <end name="Exit" viewId="/success.jsp"/>


    </dialog>


    </dialogs>


    The logic of Listing 20-16 should be obvious. Notice that we’ve used the new


    <managed-bean> declarations of Listing 20-15 here.


    ■**Note** The Registration webapp doesn’t fully reveal the usefulness of Shale’s
    dialogs, because the user interaction spans only a couple of pages.


