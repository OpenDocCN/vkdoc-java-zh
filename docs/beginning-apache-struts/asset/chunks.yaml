    C H A P T E R 1 2


    ■ ■ ■


    Internationalization


    **S**imply put, internationalization ( *i18n* for short, since there are 18 letters
    between the *i* and *n* of *internationalization*), or localization, is the job
    of getting an application to work for languages other than the one it currently
    targets.


    Localizing a web application is by no means a simple task. There are subtleties
    beyond merely translating web pages to a new language. To understand these issues,
    consider the four areas that need to be addressed when you localize an application:


    • **Processing input**: Since the input data comes from a web browser, your webapp
    has to be able to correctly handle different *character encodings* (more about
    this in the next section) *.*


    • **Validations**: Users in the new language group may use different conventions
    for dates or numbers. Your validations will have to correctly handle these.


    • **Output**: Dialog boxes, prompts, button labels, and other text have to be
    translated to the new language. Ideally, users should be able to choose the language
    with which they can interact with the webapp. Struts solves these problems particularly
    well.


    • **Data storage and related issues**: You might have to ensure that your database
    can handle multibyte character encodings. A similar issue crops up when your web
    application passes data to other applications—you have to ensure that these applications
    accept text in the new language and character encoding.


    In this chapter, you’ll see how Struts greatly simplifies the task of localizing
    a webapp by addressing the first three areas. But first, I’ll have to define a
    few terms.


    **Character Encodings, Unicode, and UTF-8**


    A **character** is an abstract entity, corresponding to a single written unit
    in a language or script. For example, the letters “A” or “A” or “A” all embody
    the same, single character.


    **143**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C12.fm Page 144 Thursday, January 12, 2006 11:04 AM


    **144**


    C H A P T E R 1 2 ■ I N T E R N A T I O N A L I Z A T I O N


    “A” and “a” represent different characters, though, because they carry different
    meanings.


    Characters also include punctuation marks and other symbols in a script.


    A **character set** is a collection of characters along with a unique numeric
    identifier for each character. In other words, a character set is just a collection
    of (character, identifier) pairs. The characters in a character set may come from
    one or more languages or scripts.


    **Unicode** is a character set that aspires to encompass characters from all human
    languages and scripts.


    ■**Note** Strange as it may sound, a single language may have more than one script.
    For example, the Uyghur language (from central Asia) has three scripts: the old
    Arabic script, the Cyrillic-like script used in ex-Soviet countries, and a Latin
    script invented by the Chinese government and now used by Uyghurs to communicate
    over the Internet.


    Unicode (currently in version 4.0) is defined by the Unicode Consortium, an organization
    backed by many (mainly U.S.) companies. This consortium has identified every single
    character in every (well, almost every) language on the planet and assigned to
    each character a unique number. The numbering is done so that each language gets
    one or more contiguous block of numbers.


    A **character encoding** transforms each numeric identifier in a character set
    into another number called a **character code**. This is done because the character
    code is more convenient or efficient for storage on computers. So, a character
    encoding is simply a collection of (character, character code) pairs.


    Now, if *no* transformation needs to be done—the numeric identifiers of the character
    set are used unchanged—then of course the character encoding and the character
    set are the same. An example of this is ASCII, which defines both a character
    encoding and a character set. Other examples are Latin 1 and ISO encodings for
    various languages.


    Back to Unicode: the downside is that it is practically useless as a *character
    encoding* for everyday programming since the existing character encodings, notably
    ASCII, are firmly entrenched. Many existing programs or software libraries accept
    only ASCII input and will not work with the Unicode numeric identifiers.


    **UTF-8** *is a *character encoding* for Unicode that solves this problem. UTF-8
    takes each Unicode-defined numeric identifier and transforms it into a character
    code that may occupy one or more bytes of storage. The brilliant thing about UTF-8
    is that characters belonging to both Unicode and ASCII are given the same character
    code.*


    *This means that your “UTF-8 enabled” program can take advantage of Unicode and
    still work with legacy programs or libraries that accept only ASCII. Of course,
    this doesn’t solve the problem of getting legacy programs to accept Unicode. The
    point is that you *don’t* *completely* lose the ability to work with legacy software.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


