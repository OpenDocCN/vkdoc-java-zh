    第 7 章 ■ 处理业务逻辑


    **69**


    }


    ...//Action 的其余部分


    }


    Struts 管理你的 Action 子类的创建，并且这些子类会被池化（重用）以高效地服务用户请求。因此，你不能使用实例变量。无法保证你在实例变量中存储的数据适用于给定的请求。


    **子类化 Action**


    在你的 Action 子类中，你只需要重写一个方法，那就是 execute()（参见清单 7-2）。


    **清单 7-2.** *execute() 函数*


    public ActionForward execute(ActionMapping mapping,


    ActionForm form,


    HttpServletRequest request,


    HttpServletResponse response)


    ■**注意** 在旧版本的 Struts（1.0 及更早版本）中，execute() 被称为 perform()。


    在 ActionForm 上的 validate() 方法通过后，Struts 会调用与该表单关联的 Action 上的 execute()。如你所见，有五个类在此函数中发挥作用：

    '
- fmt: "• `ActionForward`: Represents the “next” page to be displayed. This is the\
    \ return value of `execute()`.\n\n• `ActionMapping`: Represents associations between\
    \ this `Action` and its possible “next” pages.\n\n• `ActionForm`: Contains input\
    \ form data.\n\n• `HttpServletRequest`: Contains request-scoped and session-scoped\
    \ data. You can also place data on the session using this class. Note that not\
    \ all data goes on the submitted form. Other data could be placed on the form’s\
    \ “action” URL. You can read these with `HttpServletRequest`.\n\n• `HttpServletResponse`:\
    \ Allows you to write data to the user’s web browser. You are less likely to use\
    \ this class, unless you want to send, say, a generated PDF report back to the\
    \ user.\n\nThe important functions of each of these classes are listed in Appendix\
    \ B.\n\n## Business Logic in the Registration Webapp\n\nWe’ll now take up our\
    \ earlier example of the Registration webapp (see Chapters 5 and 6), and see how\
    \ we can process business logic. For the Registration webapp, this involves the\
    \ following:\n\n• **Complex validation**: Checking if the given user ID exists.\
    \ I gave you a solution in Chapter 6, Listing 6-2, which we’ll use here.\n\n•\
    \ **Data transformation**: Saving the user ID and password into the database,\
    \ using the `User` data object (see Listing 5-1 in Chapter 5).\n\n• **Navigation**:\
    \ Displaying the “You’re Registered!” page (Figure 7-2) if registration succeeds,\
    \ or redisplaying the form with an error message (Figure 7-3) if the user ID exists.\n\
    \n**Figure 7-2.** *The “You’re Registered!” page*\n\n**Figure 7-3.** *Redisplay\
    \ of form to user with error message*\n\nWe only need one `Action` subclass, called\
    \ `RegistrationAction`, which is shown in Listing 7-3.\n\n**Listing 7-3.** *RegistrationAction.java*\n\
    \n```java\npackage net.thinksquared.registration.struts;\n\nimport javax.servlet.http.*;\n\
    import org.apache.struts.action.*;\nimport net.thinksquared.registration.data.User;\n\
    \npublic class RegistrationAction extends Action{\n\n    public ActionForward\
    \ execute(ActionMapping mapping,\n                                  ActionForm\
    \ form,\n                                  HttpServletRequest request,\n     \
    \                             HttpServletResponse response){\n\n        //get\
    \ userid and password\n        RegistrationForm rForm = (RegistrationForm) form;\n\
    \        String userid = rForm.getUserId();\n        String password = rForm.getPassword();\n\
    \n        //complex validation: check if userid exists\n        if(User.exists(userid)){\n\
    \            ActionMessages errors = new ActionMessages();\n            errors.add(\"\
    userid\",\n                       new ActionMessage(\"reg.error.userid.exists\"\
    ));\n            saveErrors(request,errors);\n            //navigation: redisplay\
    \ the user form.\n            return mapping.getInputForward();\n        }else{\n\
    \            //data transformation: save the userid and password\n           \
    \ //to database:\n            User user = new User();\n            user.setUserId(userid);\n\
    \            user.setPassword(password);\n            user.save();\n         \
    \   //navigation: display \"you're registered\" page\n            return mapping.findForward(\"\
    success\");\n        }\n    }\n}\n```\n\nTake your time studying Listing 7-3,\
    \ because it is a pattern for every `Action` you’ll ever write.\n\nThe first thing\
    \ to note is the cast from `ActionForm` to `RegistrationForm`: `RegistrationForm\
    \ rForm = (RegistrationForm) form;`\n\nRecall that the `ActionForm` passed into\
    \ `execute()` is really a `RegistrationForm` instance (see Listing 6-1), and that\
    \ it contains form data that has passed simple validation. The cast is done so\
    \ that the `userid` and `password` properties of the form can be read.\n\n■**Note**\
    \ This isn’t the best way to read data from an `ActionForm`. In Chapter 17, I’ll\
    \ describe a better alternative."
