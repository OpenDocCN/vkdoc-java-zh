- fmt: '# The Validator Framework


    In some situations, you might need to localize your validations. It’s rare to
    want to do this, and in most scenarios where you might want to do so (such as
    checking for zip codes), the validation can be misleading. I’ve discussed the
    pitfalls of localizing validations in Chapter 12, and given you a couple of useful
    hacks to help you do this if you need to.


    The `Validator` framework does provide support for localizing validations, but
    the solution is a poor one. I should hasten to add that this isn’t a great failing
    since you should think twice (or three times!) before deciding to localize any
    validation.


    **Caution**: Do not confuse localizing validations with localizing output (e.g.,
    error messages). The `Validator` framework provides good support for localizing
    error messages through the use of keys/value pairs on `Application.properties`.


    Recall that the `<formset>` tag is a containing tag for all your declared validations.
    In order to create validations specific to a locale, you’d have to put in a new
    `<formset>` in the root containing the `<form-validation>` tag.


    This new `<formset>` tag would contain *all* necessary validations for the new
    locale (refer to Chapter 12 for a discussion on locales). Notice the emphasis
    on “all”—there’s no way for you to selectively override the validations for just
    a few fields; you’d have to specify the validations for *every* field again in
    the new `<formset>`.


    The `<formset>` tag accepts three optional properties that you can use to specify
    a locale:


    - `language`: This is an ISO-639 identifier for a language. Examples are `en`
    for English or `zh` for Chinese.

    - `country`: This is an ISO-3166 identifier for a country. For example, the code
    `US` refers to the United States.

    - `variant`: This is a variant on a given language/country combination. The user
    usually can’t set this within the web browser.


    If all these attributes are left unspecified, the `<formset>` element is taken
    to be the default one.


    The big disadvantage of using `<formset>` for localizing validations is that you
    can’t “override” the validations of just a few fields. So, if you really, really
    need to localize your validations, I’d recommend either one of the two hacks I
    presented in Chapter 12.


    ## Lab 15: Using the Validator Framework in LILLDEP


    In Lab 6, you hand-coded various validations for `ContactForm`. In this lab session,
    you’ll migrate `ContactForm` to using the `Validator` framework.


    1. Put in the plug-in section for the `Validator` in `struts-config.xml`. Use
    the name default name `validation.xml` for your validation set.

    2. Change the base class of `ContactForm` to `org.apache.struts.validator.ValidatorForm`.

    3. Comment out the existing `validate()` function.

    4. Complete `validation.xml` in `./web/WEB-INF`. Declare all the validations you
    implemented in Lab 6. If you completed Lab 10b, you would also need to amend the
    relevant JSPs.

    5. Compile, deploy, and test your changes.


    ## Useful Links


    - RFC-2822 for email: [http://rfc.net/rfc2822.html](http://rfc.net/rfc2822.html)

    - Struts’ Validator page: [http://struts.apache.org/struts-doc-1.2.x/userGuide/dev_validator.html](http://struts.apache.org/struts-doc-1.2.x/userGuide/dev_validator.html)

    - The Commons Validator framework project: [http://jakarta.apache.org/commons/validator/](http://jakarta.apache.org/commons/validator/)

    - A Regular Expressions tutorial: [http://www.regular-expressions.info/tutorial.html](http://www.regular-expressions.info/tutorial.html)

    - Some information on unit testing (also the homepage of JUnit, the Java unit
    testing framework): [www.junit.org](http://www.junit.org)

    - ISO-639 language codes: [http://en.wikipedia.org/wiki/ISO_639](http://en.wikipedia.org/wiki/ISO_639)

    - ISO 3166 country codes: [http://en.wikipedia.org/wiki/ISO_3166](http://en.wikipedia.org/wiki/ISO_3166)


    ## Summary


    - The `Validator` framework brings many benefits by simplifying the creation and
    maintenance of your webapp’s validations.'
