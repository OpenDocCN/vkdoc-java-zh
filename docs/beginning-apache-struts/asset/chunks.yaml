    属性


    接受前三个通用属性集：evt-attrs、acc-attrs 和 ren-attrs。


    除此之外，还有几个 link 特有的属性：


    • action/module、href、page、forward、linkName：用于指定链接的 URL。action/module 对用于指定表单处理器。action
