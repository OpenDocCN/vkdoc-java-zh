- fmt: "# URL Schemes\n\n`Field` is not a URL. Several protocols are supported. `schemes`\
    \ is a comma-delimited list of protocols, for example, `http,https,ftp,file,telnet,gopher`.\n\
    \n- `allowallschemes` (optional, defaults to `false`) makes any scheme acceptable\
    \ if `true`.\n- `allow2slashes` (defaults to `false`) accepts double backslashes\
    \ (`//`) in a scheme.\n- `nofragments` (defaults to `false`) *disallows* a fragment\
    \ of a URL.\n\n## `validwhen`\n\nThe test condition fails. See the following subsection\
    \ for more details.\n\n### `requiredif` (Deprecated)\n\nDeprecated—use `validwhen`\
    \ instead.\n\n### `range` (Deprecated)\n\nDeprecated—use `intRange` or `floatRange`\
    \ instead.\n\n## Using `validwhen`\n\nThe `validwhen` validator is useful when\
    \ validation of one field depends on another. With this validator, you can formulate\
    \ complex dependencies.\n\nI’ve always believed an example beats a thousand descriptions,\
    \ so Listing 15-6 shows an example of `validwhen` in action.\n\n**Listing 15-6.**\
    \ *Using `validwhen`*\n\n```\n<field property=\"mySecondField\" depends=\"validwhen\"\
    >\n  <var>\n    <var-name>test</var-name>\n    <var-value>\n      ((myFirstField\
    \ == null) or (*this* != null))\n    </var-value>\n  </var>\n</field>\n```\n\n\
    `mySecondField` is valid when `myFirstField` is blank or `mySecondField` is not\
    \ blank. The symbol `*this*` refers to the field being validated. Notice also\
    \ that the logical operators are `or` and `and`, *not* the usual Java `||` and\
    \ `&&`.\n\n> **Note:** This is an example of how to conditionally validate fields.\
    \ `mySecondField` only gets validated (checked for a blank value) if `myFirstField`\
    \ is blank. This is how you can use `validwhen` to replace the older (pre-1.2)\
    \ validator `requiredif`.\n\nClearly `validwhen` is a powerful solution to a variety\
    \ of problems. Consider the common problem of validating a twice-entered password\
    \ (see Listing 15-7).\n\n**Listing 15-7.** *Checking for Identical Fields*\n\n\
    ```\n<field property=\"password2\" depends=\"validwhen\">\n  <var>\n    <var-name>test</var-name>\n\
    \    <var-value>\n      (password == *this*)\n    </var-value>\n  </var>\n</field>\n\
    ```\n\n## Using `validwhen` with Indexed Fields\n\n`validwhen` also makes validating\
    \ dependent indexed fields and their properties unbelievably easy.\n\nFor example,\
    \ suppose your form had a table of values, such as a list of items in a shopping\
    \ cart. You could do this by using one of the following:\n\n- Separate arrays\
    \ for each column\n- A single array of containing objects that holds values for\
    \ a single row\n\nWe’ll tackle these two situations separately.\n\nIn the first\
    \ scenario, our shopping cart has two columns, each represented by arrays `itemID`\
    \ and `itemCount`. We want to check that each non-null `itemID` element has a\
    \ corresponding non-null `itemCount` element. The validator declaration to do\
    \ this appears in Listing 15-8.\n\n**Listing 15-8.** *Validating Indexed Fields*\n\
    \n```\n<field property=\"itemCount\" depends=\"validwhen\">\n  <var>\n    <var-name>test</var-name>\n\
    \    <var-value>\n      ((itemID[] == null) or (*this* != null))\n    </var-value>\n\
    \  </var>\n</field>\n```\n\nThe validator automatically runs the check for each\
    \ row of `itemCount` and `itemID`.\n\nIn the second scenario, we use an object\
    \ called `item` to hold a single row of data. This object has the properties `id`\
    \ and `count`.\n\n> **Note:** Recall that for this to work, `item` needs to be\
    \ a JavaBean. That is, it needs to have `getXXX` and `setXXX` functions for each\
    \ property, like `id` and `count`.\n\nListing 15-9 shows how we run the same validation.\n\
    \n**Listing 15-9.** *Validating Properties on Indexed Fields*\n\n```\n<field property=\"\
    count\"\n       indexedListProperty=\"item\" depends=\"validwhen\">\n  <var>\n\
    \    <var-name>test</var-name>\n    <var-value>\n      ((item.id[] == null) or\
    \ (*this* != null))\n    </var-value>\n  </var>\n</field>\n```"
