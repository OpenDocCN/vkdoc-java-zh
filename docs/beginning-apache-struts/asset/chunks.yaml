    URI is http://java.sun.com/jstl/core, but of course, you’re free to use anything
    you like.


    **Step 3: Amend listing.jsp**


    In listing.jsp, use JSTL’s <c:forEach> tag rather than the <logic:iterate> tag.
    Remember to add to add a taglib declaration for the JSTL core tag library at the
    start of the page.


    As usual, compile, redeploy, and test your work.


