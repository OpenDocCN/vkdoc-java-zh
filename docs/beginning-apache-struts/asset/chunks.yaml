  trans: "\n默认情况下，用于获取值的函数名为 `getValue()`，用于标签的函数名为 `getLabel()`。若希望为两者指定不同的名称，可使用\
    \ `value` 和 `label` 属性。例如，设置 `value=\"color\"` 将意味着调用 `getColor()` 函数来确定每个 `<option>`\
    \ 的值。\n\n**LabelValueBean 类**\n\n对于 `options` 和 `optionsCollection`，你需要一个包含用于值和标签的\
    \ `getXXX()` 函数的 JavaBean 类。Struts 提供了一个名为 `org.apache.struts.utility.LabelValueBean`\
    \ 的工具类，它正好实现了这一功能。该类包含 `getValue()` 和 `getLabel()` 函数，可直接与 `optionsCollection`\
    \ 配合使用。清单 C-1 展示了如何使用此类（可能是在 Action 子类中）。\n\n**清单 C-1.** *使用 LabelValueBean 类*\n\
    \n```java\n// 创建集合以保存值-标签对\nList labelValuePairs = new ArrayList();\n\n// 填充集合\n\
    labelValuePairs.add( new LabelValueBean(\"labelOne\", \"valueOne\"));\nlabelValuePairs.add(\
    \ new LabelValueBean(\"labelTwo\", \"valueTwo\"));\n\n// 以合适的标签保存到请求中\nrequest.setAttribute(\"\
    myOptions\", labelValuePairs);\n```\n\n**简单性能优化**\n\n出于性能考虑，你应该保存并重用单个集合实例，而不是在每个填充\
    \ Action 中重新创建它。\n\n不过，有时你的选择可能需要混合动态和静态选项。这种情况下的一个简单解决方案是使用多个 `<html:optionsCollection>`——一个用于来自缓存的静态选项，另一个用于引用动态创建的值-标签对。\n\
    \n即使在动态创建对的情况下，也可以进行一些优化。最耗时的任务是创建新的 `LabelValueBean` 对象。如果可能的值-标签组合是有限的，你可能希望将它们缓存在一个\
    \ `WeakHashMap` 中，该映射充当临时缓存。当然，以这种方式缓存 JavaBean 的好处可能会被从 `WeakHashMap` 中检索 bean\
    \ 时计算键所带来的性能损失所抵消。因此，当你手头已有可用的键时，此技术效果最佳。\n\n**国际化**\n\n使用 JavaBeans 而非 Struts\
    \ 的消息资源机制意味着选项标签无法轻易本地化。一个简单的解决方案是使用自定义类（参见清单 C-2）来处理集合（我们将使用 `Iterator`），并使用\
    \ `LabelValueBeans` 存储指向本地化标签的消息资源键，而非实际标签。\n\n从消息键到实际标签的转换，同时避免创建不必要的对象，需要一些技巧，如清单\
    \ C-2 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048AppC.fm\
