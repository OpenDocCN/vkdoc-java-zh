  raw: 'Both userid and password validations check that the values keyed in by the
    user are composed of alphanumerics. In Listing 15-5, the regular expression for
    each would be duplicated. Is there a way to “share” these? The answer is “yes,”
    and the way to do this is to declare the regular expression as a constant. You
    have two options open to you:


    • Define a global constant—a constant accessible to every field in every <formset>.


    • Define a constant accessible to every field within a single <formset>.


    To declare a global constant, you’d place the following XML *before* the first
    <formset> tag:


    <global>


    <constant>


    <constant-name>alphanumericMask</constant-name>


    <constant-value>^[a-zA-Z0-9]*$</constant-value>


    </constant>


    </global>


    This declares a constant named alphanumericMask with the value ^[a-zA-Z0-9]*$.
    Declaring the constant in a <formset> is similar:


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C15.fm Page 205 Tuesday, January 24, 2006 10:13 AM


    C H A P T E R 1 5 ■ T H E V A L I D A T O R F R A M E W O R K


    **205**


    <formset>


    <constant>


    <constant-name>alphanumericMask</constant-name>


    <constant-value>^[a-zA-Z0-9]*$</constant-value>


    </constant>


    <form name="RegistrationForm" ...


    Note that according to the DTD, <constant>s have to be declared at the start of
    the


    <formset> tag.


    To use the declared alphanumericMask constant in either case, you’d employ the
    ${constant-name} reference:


    <var>


    <var-name>mask</var-name>


    <var-value> **${alphanumericMask}**</var-value>


    </var>


    **Client-Side Validations**


    To create client-side validations, simply place a <html:javascript form="MyFormBean"/>
    tag anywhere on your JSP page so that Struts can paste JavaScript on the final
    web page in order to run client-side validations. Bear in mind, however, that
    there’s no easy way (apart from amending the validator itself, or perhaps writing
    a plug-in) to prevent a form from being passed through server-side validations.


    This might make you wonder whether the client-side validations are of any use!
    To be fair, the Validator framework is undergoing active development, and I’m
    sure we’ll see improvements in the area of client-side validations soon.


    We next look at the standard validators available on the Validator framework.


    **The Standard Validators**


    Table 15-1 lists all standard validators at the time of this writing (Struts 1.2.4
    to 1.2.7).


    However, as I mentioned the Validator framework is undergoing active development,
    so be sure to check the Struts Validator website (see the “Useful Links” section)
    for the latest.


    The first column of Table 15-1 shows the name of the validator. This is the name
    you’d use in the depends attribute of the <field> tag. The second column gives
    the list of variables the validator accepts. All variables listed in the second
    column are *required*. The last column gives “triggers” for the validator—conditions
    that if *met* will trigger the validator to fail.


    Almost every validator is easy to use, with the possible exception of the validwhen
    validator.


    We’ll tackle this next.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


