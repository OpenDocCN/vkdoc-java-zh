    **Table C-10.** *Synopsis of the Bean Tag Library*


    **Tag**


    **Usage/Comments**


    message


    Writes static text based on the given key.


    write


    Writes the value of the specified JavaBean property.


    cookie/header/parameter


    Each exposes a scripting variable based on the value of the specified cookie/header/parameter/
    variable.


    define


    Each exposes a scripting variable based on the value of the specified JavaBean.


    page


    Each exposes a scripting variable based on the value of the specified page-scoped
    variable.


    include


    Allows you to call an external JSP or global forward or URL and make the resulting
    response data available as a variable. The response of the called page is not
    written to the response stream.


    resource


    Allows you to read any file from the current webapp and expose it either as a
    String variable or an InputStream.


    size


    Defines a new JavaBean containing the number of elements in a specified Collection/Map/array.


    struts


    Exposes the specified Struts internal configuration object as a JavaBean.


