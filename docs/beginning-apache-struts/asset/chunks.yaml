- fmt: '# CHAPTER 7 ■ PROCESSING BUSINESS LOGIC


    **73**


    I haven’t yet shown you how Struts knows that the form data goes into and is validated
    by `RegistrationForm`. And I also haven’t shown you how Struts knows that the
    populated `RegistrationForm` needs to be sent to `RegistrationAction` for further
    processing. You’ll see how both these mappings are made in Chapter 9.


    I’ll analyze the rest of Listing 7-3 using the three broad tasks every `Action`
    subclass performs: complex validation, data transformation, and navigation.


    ## Complex Validation


    The relevant section performing complex validation in Listing 7-3 is shown in
    Listing 7-4.


    **Listing 7-4.** *Complex Validation in RegistrationAction*


    ```

    if(User.exists(userid)){


    ActionMessages errors = new ActionMessages();


    errors.add("userid",


    new ActionMessage("reg.error.userid.exists")); saveErrors(request,errors);


    //navigation: redisplay the user form.


    return mapping.getInputForward();


    }else{ ...

    ```


    The `User.exists()` function checks if the user ID given exists. This is typical
    of what I mean by “well-defined” interfaces between the Controller (`RegistrationAction`)
    and Model (`User` class).


    Struts does not prevent you from using raw SQL to check if a user ID exists, but
    this would be a poorer implementation of the MVC design pattern. Having a Model
    class handle data access like this makes your code cleaner, much more maintainable,
    and more future-proof. If you switched to a database that used a different variant
    of SQL, you would need to change at most the implementation of the `exists()`
    function and not every single SQL statement checking for a duplicate user ID.


    The next statement creates a blank list to hold error messages: `ActionMessages
    errors = new ActionMessages();`


    The use of `ActionMessages` to hold error messages instead of `ActionErrors` is
    rather unfortunate. In earlier versions of Struts, it would have indeed been `ActionErrors`,
    but later versions have deprecated the use of `ActionErrors` everywhere except
    as the return value of `validate()` in `ActionForm`.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C07.fm Page 74 Tuesday, January 24, 2006 10:12 AM


    **74**


    CHAPTER 7 ■ PROCESSING BUSINESS LOGIC


    After creating the holder for error messages, I next add an error message to it:
    `errors.add("userid", new ActionMessage("reg.error.userid.exists"));` This should
    be old hat to you by now. If you have difficulty understanding this statement,
    you should reread the “Using ActionErrors” section in Chapter 6.


    The last statement I’ll consider is `saveErrors(request,errors);`


    You signal a complex validation failure by using `saveErrors()` to save a list
    of errors.


    However, unlike simple validation where the form is automatically redisplayed,
    here the list of errors is used to populate the `<html:errors>` tags on the “next”
    page.


    > **Note:** `saveErrors()` actually saves the errors onto the request object,
    which is an instance of `HttpServletRequest` that was passed as a parameter into
    `execute()`.


    After `execute()` completes, Struts examines the request object for errors, then
    tries to display them in the “next” page indicated by the `ActionForward` instance
    returned by `execute()`.


    Struts knows *which* error messages to display and *where* to display them because
    the “next” page is assumed to contain our old friend, the `<html:errors>` tags.
    We’ll revisit this in detail the next chapter. If there are no `<html:errors>`
    tags, then no error messages are displayed.


    The astute reader may be wondering why it’s `saveErrors(request, errors)` instead
    of simply `saveErrors(errors)`. The answer is that `Action` subclasses must be
    stateless. The errors object must therefore be stored on request.


    ## Data Transformation


    In the `RegistrationAction` class, the only data transformation involved is saving
    the user ID and password to the database, as Listing 7-5 illustrates.


    **Listing 7-5.** *Data Transformation in RegistrationAction*


    ```

    User user = new User();


    user.setUserId(userid);


    user.setPassword(password);


    user.save();

    ```'
