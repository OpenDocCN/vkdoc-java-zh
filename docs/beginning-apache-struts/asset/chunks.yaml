  raw: 'importAttribute needs a ComponentContext to read from, and if an instance
    isn’t found, an exception is thrown. This means that you must place <tiles:importAttribute>
    after a <tiles:insert> or within a page called by a <tiles:insert>, to ensure
    that the ComponentContext has been created.


    Attributes


    • name: Specifies the name of the attribute to copy over. If omitted, all attributes
    of the ComponentContext are copied to the prescribed scope.


    • scope: Specifies a scope (request, session, page, or application) to copy attributes
    to.


    If omitted, the page scope is used.


    • ignore: If the named attribute can’t be found, an exception is thrown by default.


    Setting ignore="true" causes importAttribute to fail silently.


    Examples


    Consider this snippet:


    <tiles:insert page="mylayout.jsp">


    <tiles:put name="object1" value="one"/>


    <tiles:put name="object2" value="two"/>


    <tiles:put name="object3" value="three"/>


    <tiles:put name="object4" value="four"/>


    </tiles:insert>


    <bean:write name="object1"/> //ERROR!!


    The error occurs because <bean:write> will not be able to find object1 in any
    scope.


    For this to work, you need to use <tiles:importAttribute>:


    <tiles:importAttribute />


    <bean:write name="object1"/> //OK


    [www.it-ebooks.info](http://www.it-ebooks.info/)


