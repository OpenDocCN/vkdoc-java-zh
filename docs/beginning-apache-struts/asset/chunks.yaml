    控制器部分可能是七个部分中使用最少的。它用于手动覆盖 Struts 的一些默认设置。这里我只提几个有用的设置：


    • maxFileSize：指定上传文件的大小上限。你可以使用数字后跟 K、M 或 G 来分别表示千字节、兆字节或吉字节。例如，`maxFileSize="2M"`
    将文件大小限制为 2MB。我们将在第 11 章中处理文件上传。


    • nocache：告诉 Struts 是否应该缓存内容。设置 `nocache="true"` 会禁用内容缓存。


