    **Struts-EL Tags for the Bean Tag Library**


    Only the following tags in the Bean library have EL-enabled versions: include,
    message, page, resource, size, and struts. (Note: EL-enabled tags are those that
    allow you to use EL


    expressions. Refer to Chapter 10 for examples.)


    **cookie/header/parameter**


    Each exposes a scripting variable based on the value of the specified cookie/header/


    parameter.


    Usage Restrictions


    The id and name attributes are required.


    Attributes


    • name:The name of the cookie/header/parameter to retrieve.


    • id: The name of the exposed variable. Scriptlets and other custom tags will
    be able to access properties of the cookie/header/parameter using this name.


    • value: The default value to return in case the cookie/header/parameter of the
    given name can’t be found.


    • multiple: Specifies how multiple cookies/headers/parameters with the same name
    are to be handled. The exact value of this attribute is unimportant. If the multiple
    attribute is present, then the variable exposed by id is an array of the corresponding
    type (Cookie[]/String[]/String[]). If multiple is not present, then the first
    occurring cookie/header/parameter is bound to the exposed variable.


    Examples


    Consider the following URL:


    http://www.kenyir.org/mypage.jsp?command=test&action=save&id=12345


    Here’s how to expose the parameter named command on the requested URL:


    <bean:parameter name="command" id="cmd" value="" /> Command is: <%=cmd%>


    If there were more than one parameter named command, for example: http://www.kenyir.org/mypage.jsp?command=print&command=save


    [www.it-ebooks.info](http://www.it-ebooks.info/)


