    The only bit of code to perform complex validation (checking that the user ID
    doesn’t already exist) is in the clause of the if(...) statement. The body of
    the if() statement deals getting the error message to display in the right place!
    This might seem a little daunting at first, so let’s take it one step at a time.
    The error message in question is user_exists, which the message resource file
    (see Listing 20-9) tells us is user_exists = The userid {0} is taken. Please try
    another.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C20.fm Page 330 Monday, January 16, 2006 3:21 PM


    **330**


    C H A P T E R 2 0 ■ J A V A S E R V E R F A C E S A N D S T R U T S S H A L E


    As you can see, it contains a single replacement variable, {0}, which we want
    to replace with the user ID that the user keyed in. For example, if the user had
    keyed in the user ID


    “Kermit”, we want the final error message to read


    The userid Kermit is taken. Please try another.


    Java has a function called MessageFormat to perform this substitution for you.
    That’s what we’re doing in the first two lines:


    Object[] params = {_uid};


    String msg = MessageFormat.format(


    bundle.getString("user_exists"),params);


    The function getString() on the ResourceBundle gets the error message corresponding
    to the given key (user_exists). We then use MessageFormat to replace the {0} with
    the _uid, the user ID. So, the msg variable holds the final error message. How
    can we get this to display on the page? That’s what the subsequent lines do.


    First, we need to know *where* to display the error message. With Struts, this
    is easy. But in JSF, because there is the possibility that we’re using third-party
    components, it’s a little trickier. Understanding why will help you get a better
    feel for JSF, so we’ll make a little digression at this point.


    Recall that in JSF, all the information from a page is stored in a UI tree. Each
    node (instances of javax.faces.component.UIComponent) on the tree may be labeled
    using an id attribute. Obviously, labels only make sense if they are unique—that’s
    the only way to locate the node you want. The challenge is ensuring uniqueness
    while at the same time allowing custom components.


    Why? Well, a custom component might be composed of many subcomponents, each of
    which has to be labeled uniquely. With Struts, ensuring uniqueness is easy, because
    all you have to do is read the JSP for the page, and change the ids if needed.
    With custom components in JSF, this will not always work, because there isn’t
    a one-to-one correspondence between tags on the JSP and nodes in the UI tree.


    An example of this is the treeview component we discussed earlier. The treeview
    UI component creates new nodes in the UI tree *at runtime*. It might assign these
    nodes unique labels, and this is where the difficulty comes in—what if the names
    of these nodes clash with those from another custom component?


    JSF solves these issues by using *naming containers*. A naming container is an
    ordinary node on the UI tree that appends an additional prefix to all the ids
    of its child nodes. This prefix is determined by JSF, so the final label of a
    node is indeed unique.


    Most of the time, we’ll only know a node’s *un* prefixed id. In order to search
    for a particular node using its unprefixed id, we have to either


    • Have a reference to the naming container that contains the node


    • Have a reference to another child node within the same naming container


    [www.it-ebooks.info](http://www.it-ebooks.info/)


