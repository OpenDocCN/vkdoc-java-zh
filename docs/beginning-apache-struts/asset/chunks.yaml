- fmt: "# The most common usage is to require that all validations be made. You do\
    \ this by specifying no attributes:\n\n```\n<html:javascript />\n```\n\nThis would\
    \ work if pasted anywhere on the page.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## Equivalents\n\nThe `<s:javascript>` tag from the Struts-Faces integration\
    \ library is an equivalent.\n\n## link\n\nThis tag renders an HTML link.\n\n###\
    \ Usage Restrictions\n\nYou must specify either `action/module`, `href`, `page`,\
    \ `forward`, or `linkName`.\n\n### Attributes\n\nThe first three common attribute\
    \ sets are accepted: `evt-attrs`, `acc-attrs`, and `ren-attrs`.\n\nBesides these,\
    \ there are a few attributes specific to `link`:\n\n- `action/module`, `href`,\
    \ `page`, `forward`, `linkName`: Used to specify a URL for the link. The `action/module`\
    \ pair specifies a form handler. The `action`, of course, must begin with a slash,\
    \ and if you want to specify a module, use the `module` attribute. `href` is the\
    \ URL for the link. `page` is the module-relative URL for the link (and therefore\
    \ must begin with a slash). `forward` is the name of a global forward. `linkName`\
    \ is the name of another link on the same page. The URL for that link is used\
    \ for this one.\n- `anchor`: An optional HTML anchor for the link.\n- `bundle`:\
    \ Used to specify a different message resource file. The `bundle` attribute is\
    \ explained in more detail in the entry for `<bean:message>`.\n- `transaction`:\
    \ If `true`, appends the current transaction token to the link's URL as a request\
    \ parameter. Refer to the entry for `<logic:present>` for details on transaction\
    \ tokens.\n- `paramName`, `paramProperty`, `paramScope` and `paramId`: You use\
    \ these to create a single request parameter. The request parameter is appended\
    \ to the final URL for the link. The first set of three attributes is used to\
    \ locate a single object on the current request or session. This object's `toString()`\
    \ is the single parameter value. The name of the parameter is given by `paramId`.\n\
    - `name/property/scope`: You use these to create multiple request parameters.\
    \ The request parameters are appended to the final URL for the link. These attributes\
    \ are used to locate an object of type `java.util.Map`. The `Map`'s keys are the\
    \ parameter names, and the corresponding values are the parameter values. If you\
    \ specify `property`, you must also specify `name`.\n- `useLocalEncoding`: If\
    \ set to `true` tells Struts to use whatever the character encoding is for the\
    \ current `HttpServletResponse`.\n\n### Examples\n\nHere's a simple example using\
    \ a global forward:\n\n```\n<html:link forward=\"success\" />\n```\n\nThe rendered\
    \ link will have the true location for the success global forward. You can also\
    \ include request parameters for the link:\n\n```\n<html:link page=\"/mypage.jsp\"\
    \ paramName=\"myRequestValue\"\nparamId=\"action\" />\n```\n\nThis snippet will\
    \ render a link with a request parameter named `action`, whose value is given\
    \ by the value of `toString()` called on the bean `myRequestValue`.\n\nHere's\
    \ how you'd create multiple request parameters:\n\n```\n<html:link href=\"http://www.kenyir.org/index.jsp\"\
    \ name=\"myMap\"/>\n```\n\n### Equivalents\n\nThe `<s:commandLink>` tag from the\
    \ Struts-Faces integration library is an equivalent. You may also use JSF's `<h:commandLink>`,\
    \ but you lose the ability to use global forwards and form handlers.\n\n## messages\n\
    \n`messages` is an iterator for *error* *messages* and *messages*—please refer\
    \ to the entry for `<logic:messagesPresent>` for an explanation of these two terms.\
    \ By default, `<html:messages>` is an iterator over error messages, but you can\
    \ iterate over messages by setting the `messages` attribute to `true`.\n\nBy itself,\
    \ `<html:messages>` does not print out either error messages or messages. You\
    \ have to nest a suitable tag within it (e.g., `<bean:write>`) to do this.\n\n\
    ### Usage Restrictions\n\nThe `id` attribute is required.\n\n### Attributes\n\n\
    - `id`: This behaves just like the `id` attribute of `<logic:iterate>`—it exposes\
    \ a variable that refers to a single message.\n- `message`: A boolean attribute\
    \ that indicates whether to iterate over error messages (`false`, or omitted)\
    \ or messages (`true`).\n- `property`: The key with which to retrieve messages.\
    \ Note that there might be more than one message saved under the same property.\
    \ If `property` isn't specified, then all messages are displayed. This trick is\
    \ very useful for debugging.\n- `name`: The name of the object that holds messages.\
    \ Do not specify this attribute if you wish to use `Action`'s `saveErrors()` or\
    \ `saveMessages()`.\n- `header/footer`: Both are message resource keys to text\
    \ that will be rendered at the start and end of the iteration. This happens only\
    \ when there is more than one error message to be displayed. Refer to the entry\
    \ for `<html:errors>` for details.\n- `locale/bundle`: These are used to specify\
    \ a different `Locale` object or message resource file. `locale` specifies a key\
    \ that can be used to look up the `Locale` object stored on the current session.\
    \ The `bundle` attribute is explained in more detail in the entry for `<bean:message>`.\
    \ You'd use these attributes to specify a locale different from the current user's\
    \ locale or a message resource file different from the default one.\n\n### Examples\n\
    \nHere's a simple example that displays all error messages:\n\n```\n<html:messages\
    \ id=\"anError\">\n  <bean:write name=\"anError\" />\n</html:messages>\n```\n\n\
    Remember, error messages are present either from simple validation failure (see\
    \ Chapter 6) or registered using `Action`'s `saveErrors()` (see Chapter 7).\n\n\
    Here's how to display messages:\n\n```\n<html:messages id=\"aMessage\" message=\"\
    true\">\n  <bean:write name=\"aMessage\" />\n</html:messages>\n```\n\nMessages\
    \ are created in exactly the same way as error messages, but are registered using\
    \ `Action`'s `saveMessages()`, which has the same signature as `saveErrors()`.\n\
    \nHere's how to display a header and footer (if there are any error messages to\
    \ display):\n\n```\n<html:messages id=\"anError\" header=\"err.header\" footer=\"\
    err.footer\">\n  <bean:write name=\"anError\" />\n</html:messages>\n```\n\nThis\
    \ assumes that the message resource keys `err.footer` and `err.header` have been\
    \ defined in your `Application.properties` file:\n\n```\nerr.header=<b>\nerr.footer=</b>\n\
    ```\n\nSo the HTML bold tag (`<b>`) is printed at the start and end of the iteration.\n\
    \n### Equivalents\n\nThere are none, but it's easy to create an ugly hack: Error\
    \ messages are stored under the key `Globals.ERROR_KEY` and messages are stored\
    \ under `Globals.MESSAGE_KEY`. Both are stored on the request. `Globals` is a\
    \ Struts class (`org.apache.struts.Globals`) that contains various constants.\
    \ The stored object is either an `ActionMessages` or `ActionErrors` instance.\n\
    \nYou can easily create a reference to this object using JSTL's `<c:set>`, and\
    \ use the defined messages object in the page.\n\n## multibox\n\nThis tag renders\
    \ one or more check box input fields, based on an underlying array.\n\nSee also\
    \ `<html:checkbox>`. Note, however, that unlike `<html:checkbox>`, the corresponding\
    \ property on the `ActionForm` need not be a boolean. Any type of array will do.\n\
    \n### Usage Restrictions\n\nThis tag must be inside an `<html:form>` tag. The\
    \ `property` attribute is required.\n\n### Attributes\n\nAll common attribute\
    \ sets (`evt-attrs`, `acc-attrs`, `ren-attrs`, `struts-attrs`, `init-attr`, and\
    \ the new `err-attrs`) are accepted, and have their usual meanings.\n\nA few important\
    \ points to note:\n\n- The return value can be specified either by the `value`\
    \ attribute or the content nested in the body of the tag."
