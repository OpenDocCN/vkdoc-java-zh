    value attribute, which is a constant value that the property or extended property
    will be compared to.


    Examples


    The following example shows the use of the <logic:equal> tag to conditionally
    process the nested <bean:write> tag if the variable client is equal to the String
    “Joe”:


    <logic:equal name="client" value="Joe">


    <bean:write name="client" />


    </logic:equal>


    The next example illustrates the use of the parameter attribute:


    <logic:equal parameter="username" value="Susan"> Hello Susan!


    </logic:equal>


    The body is executed only if there is a parameter named username on the request
    URL with the value Susan. If there were more than one such parameter, the first
    one that occurs on the URL is used.


    You can also use the scope variable to specify a scope under which to look for
    a bean:


    <logic:notEqual name="MyBean" property="email"


    scope="session" value="joey@joey.com">


    <bean:write name="MyBean" property = "email" />


    </logic:notEqual>


