    我们使用注册 Web 应用仅仅是因为我们已经用 Struts 和 Tiles 实现了它。


    我希望这能为你提供一些思维框架，以便你掌握 JSF 中的新概念。我们将从配置 JSF 开始。


    **配置 JSF**


    与 Struts 一样，配置 JSF 时需要用到两个文件：web.xml（Servlet 配置文件）和 faces-config.xml。这两个文件都应放在
    WEB-INF 目录中。


    web.xml 文件包含的信息告诉 Servlet 容器哪些请求扩展名（如 .jsf）应该被转发到 JSF，以及状态存储在哪里（客户端或服务器）。MyFaces
    发行版中提供了一个带有默认设置的 web.xml 文件。你应该可以直接使用这个文件而无需任何修改。


    faces-config.xml 文件包含声明 `<managed-bean>`、`<navigation-rule>` 以及其他标签的信息，用于插入第三方
    UI 组件和验证器等。清单 20-8 显示了注册 Web 应用的 faces-config.xml 文件。


