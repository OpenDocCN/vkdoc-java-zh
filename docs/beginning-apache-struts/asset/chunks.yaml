    A P P E N D I X D ■ A N S W E R S


    **473**


    **Lab 9a: Configuring LILLDEP**


    **Step 2**: What should the name of the form handler be?


    **Answer**: There are two ways to answer this question:


    - The name by which this form will be known to Struts tags is `ContactFormHandler`,
    so the `path` attribute is declared as `path="/ContactFormHandler"`. (Throughout
    this book, this is what I mean when I refer to the “name” of a form handler.)

    - The `name` attribute of the form handler is `ContactFormBean`. This is simply
    a reference to the form bean for this handler. It is *not* the name by which this
    handler is called in the Struts tags.


    **Step 5**: Give a value for the form handler’s `input` attribute. Where is this
    used? What happens if you omit this attribute from the form handler’s declaration?


    **Answer**: The form handler’s `input` attribute should be `/full.jsp`. This value
    is used explicitly whenever `mapping.getInputForward()` is called, for example,
    in `ContactAction.java`. It is also used implicitly by Struts in order to redisplay
    the input page if there’s a simple validation error. If this value is omitted,
    then the input page does not display. A generic servlet error page is displayed
