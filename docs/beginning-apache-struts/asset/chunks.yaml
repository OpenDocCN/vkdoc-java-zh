    ## Longevity


    | Framework | Longevity |

    |-----------|-----------|

    | JSF | High |

    | Struts | Very high |

    | Shale | Moderate/Low |


    By longevity, I mean “What’s the probability of this framework being around in
    five years’ time?” These are my forecasts: `JSF`’s survival is assured, given
    Sun’s endorsement of it as a spec, and as the only credible components-based web
    framework for the Java platform. `Struts` classic will probably survive because
    of its huge user base. `Shale` might be overshadowed by competing technologies
    in the same niche, ones that don’t pretend to be a “Struts successor.” So it’s
    very unfortunate that it’s named `Struts Shale`. People then tend to think in
    terms of `Struts` classic versus `Struts Shale`, when in fact, they best apply
    to different niches.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


