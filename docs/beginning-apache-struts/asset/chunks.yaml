    **190** C H A P T E R 1 4 ■ T I L E S


    I hope you see what we’re doing here. We want to save the query in session scope
    so that we can view the Find results from page to page. We can’t simply save the
    `Scroller` (and use `absolute()` to reset it each time we need it) because we
    might change the `Contact`’s details so that it no longer matches the query.


    There are a few subtleties in this step:


    - Notice that we have to save a clone of the query, and not the query itself.
    This is because Struts resets the fields on the query object itself. This behavior
    is part of how Struts works. So, to avoid holding a blanked-out form, we have
    to clone it.

    - The `unknown()` function is called (you can see the behavior from `TilesLookupDispatchAction`)
    when the `command` parameter in the URL points to a function that does not exist
    on the Tiles Controller (i.e., `FindAction`). In our case, `unknown()` will be
    called when the user clicks Submit instead of Find.

    - When the `full.jsp` page is called directly or by other form handlers (e.g.,
    `EditContact.do`), then the `command` parameter isn’t present in the URL. This
    means that the `unspecified()` function on `TilesLookupDispatchAction` is called.
    So, in order for the Find utility to correctly update itself, `unspecified()`
    has to call `unknown()`.


    **Step 3: Put In the Tiles Action Mapping**


    1. Create a new form handler in `struts-config.xml` to declare the Tiles controller
    you just created.

    2. Set the `parameter` attribute to `command`. This is necessary for `TilesLookupDispatchAction`
    to correctly dispatch according to the submit button that was clicked.

    3. Set the scope of the form handler to `session`, in order to match that of the
    main form.

    4. Be sure that your Tiles controller will get a copy of the form submitted from
    the main page. (See the section “Getting External Form Data” to see how this is
    done.)


    **Step 4: Make Changes to ContactAction**


    Since there are now *two* submit buttons (Submit and Find), we require `ContactAction`
    to process Submit but ignore Find.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C14.fm Page 191 Tuesday, January 24, 2006 10:13 AM


    C H A P T E R 1 4 ■ T I L E S **191**


    1. We’ll use `LookupDispatchAction` to do this, so you’ll have to change the base
    class of `ContactAction` to `LookupDispatchAction`.

    2. Change the name of `execute()` to `save()`.

    3. Because there are now two submit buttons, we can’t rely on Struts to automatically
    validate the form for us. This means that we have to call the `validate` function
    from `save()` instead. Make the necessary changes to do this, taking care to set
    `validate=false` on the associated form handlers declared in `struts-config.xml`.

    4. Implement the function `find()`, which has the same signature and return type
    as `execute()`. This function should replace the form’s `Contact` with a clean
    instance and then return the forward called `success`.

    5. Implement `getKeyMethodMap()`.


    You also need to add an extra attribute called `parameter`, whose value is set
    to `command`, to the form handlers associated with `ContactAction` (there are
    two of them). This is required for `LookupDispatchAction` to correctly dispatch
    according to the submit button clicked.


    **Step 5: Write the Tiles JSP**


    1. Edit `find-tile.jsp` so that it displays the company name using the `Scroller`
    saved on the request by the name `JspConstants.FIND`. Hint: Use `<logic:iterate>`
    and simply iterate through, as you did for `listing.jsp`. Remember to check for
    a null `Scroller`.

    2. Make a link to `EditAction` for each company name, as you did in `listing.jsp`
    in Chapter 13.

    3. You get extra credit if you can get the background of the company name link
    to change color when it’s clicked (no JavaScript solutions—use Struts).


    **Step 6: Write the Tiles Definition**


    Add a new definition in the Tiles definitions file, `tiles-def.xml`. The definition
    should do the following:


    - Provide a unique name to the definition.

    - Link the Tiles form handler in step 2 to the Tiles JSP in step 4.


