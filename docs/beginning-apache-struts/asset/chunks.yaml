    **PropertyUtils**


    The Apache Commons Beans subproject has some very useful classes (you’ve met BeanUtils
    in the previous chapter), among them the PropertyUtils class. This class exposes
    static methods that help you read/write data from/to a JavaBean. The JAR file
    (commons-beanutils.jar) comes bundled with the Struts binaries, so you can use
    PropertyUtils right away in your Struts applications.


    No type conversions are used, so you don’t have to know the class of the JavaBean
    at design time. Instead, PropertyUtils uses Java’s introspection feature to accomplish
    its job.


    ■**Note** PropertyUtils actually delegates all its work to PropertyUtilsBean.
    This latter class does the actual work of parsing the property and introspecting
    the JavaBean. PropertyUtils simply provides convenient static access to PropertyUtilsBean’s
    functions (which are not static).


    The most useful functions on PropertyUtils are


    • boolean isReadable(Object bean, String property): **Returns true if the given
    property can be read on the bean, false otherwise. This implies the existence
    of an appropriate getXXX function.**


    **• boolean isWritable(Object bean, String property): **Returns true if the given
    property can be written to the bean, false otherwise. This implies the existence
    of an appropriate setXXX function.**


    **• Class getPropertyType(Object bean, String property): **Returns the Class object
    associated with the given property.**


    **• Object getProperty(Object bean, String property): **Returns the value of the
    given property.**


    **• setProperty(Object bean, String name, Object value): **Writes the given value
    to the bean.**


    **These functions accept simple, indexed, mapped, nested, or even mixed properties
    (a combination of the other types of properties). Each of these functions may
    throw


