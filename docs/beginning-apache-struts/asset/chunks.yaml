    第 3 章


    ■ ■ ■


    理解作用域


    **在**Servlet 术语中，变量的“作用域”指的是它在 Web 应用程序中的*生命周期*——即变量在用户与系统交互过程中存在的时间长短。变量的作用域还决定了它的*可见性*——谁可以读取和修改该变量。Web
    应用程序经常使用这一概念，因此你必须彻底熟悉它。本章将帮助你做到这一点。


    Servlet 技术使用四种作用域。按生命周期递减顺序排列如下：


    • **应用程序作用域**：应用程序作用域的变量对 Web 应用程序的*每个*页面*始终*可见。该变量对系统的*所有*用户可见，并跨多个用户会话存在。换句话说，不同用户可能在任何时间、从任何页面查看和修改同一个变量。


    • **会话作用域**：会话作用域的变量仅存在于单个用户会话中，但对该会话中的每个页面可见。用户**不能**查看或修改彼此变量实例的值。


    • **请求作用域**：请求作用域的变量仅存在于单个请求中。这包括页面重定向。因此，如果第一个页面上的请求作用域变量`x = 7`被重定向到第二个页面，那么第二个页面上`x
    = 7`。


    • **页面作用域**：页面作用域的变量仅存在于当前页面。这**不**包括重定向。因此，如果第一个页面上的页面作用域变量`x = 8`被重定向到第二个页面，那么第二个页面上`x`未定义。


    ■**注意** **重定向**发生在当你请求一个页面但实际得到另一个页面时。你请求的页面将你重定向到你实际获得的页面。你可以在 JSP 中使用`<jsp:forward>`标签实现这一点，你将在本章后面的实验
    3 中看到它的实际应用。


