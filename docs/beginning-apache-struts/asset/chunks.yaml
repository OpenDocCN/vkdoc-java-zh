    \ is My Tile\"/>\n</definition>\n```\n\nNotice that `path` now points to the Tiles\
    \ controller declared in `struts-config.xml`.\n\nAgain, you may define attributes\
    \ to be used by any one of the views, using nested `<put>`s.\n\n**Step 5: Using\
    \ the Component**\n\nAs I said in the introduction to this section, using a tile\
    \ is easy. All you have to do is to declare the use of the Tiles tag library in\
    \ your JSP:\n\n```\n<%@ taglib uri=\"/tags/struts-tiles\" prefix=\"tiles\" %>\n\
    ```\n\nand then use a `<tiles:insert definition=\"...\">` anywhere on your JSP\
    \ page. For example, to use the Tiles component declared in either Listing 14-12\
    \ or Listing 14-13, use the following:\n\n```\n<tiles:insert definition=\".myTile\"\
    />\n```\n\nYou can also specify further attributes for the view page by using\
    \ nested `<tiles:put>` tags, as in Listing 14-6.\n\n**Example: The \"Login\" Tiles**\n\
    \nTiles components are very useful. Used wisely, they can greatly simplify your\
    \ code and code maintenance.\n\nNow, the discussion so far has been a little abstract,\
    \ and rightly so, because there are a few ways to create and use Tiles components,\
    \ and I wanted you to have a bird's-eye view of the whole thing.\n\nIn this section,\
    \ I'll describe how our old friend the Registration webapp can be made into a\
    \ Tiles component. Why do this? Because it gives you the freedom to place a user\
    \ login anywhere on your webapp. If a user must log in several places in your\
    \ webapp, then a Tiles component for user login would be a natural choice.\n\n\
    What I'll actually implement is a nontrivial variation on the Registration webapp.\n\
    \nFigure 14-2 describes the control flow of this new souped-up version, perhaps\
    \ better named a \"Login\" Tiles component.\n\n**Figure 14-2.** *Control flow\
    \ of the Login component*\n\n![](images/00029.png)\n\nAs you can see in Figure\
    \ 14-2, there are three possible views:\n\n- A \"regular login\" form with fields\
    \ for user ID and password (see Figure 14-3)\n- A \"new user\" form for users\
    \ who don't have a user ID (Figure 14-4)\n- A \"logoff\" view, displayed if a\
    \ user has already logged on (Figure 14-5)\n\nAlso, unlike the Tiles components\
    \ we've discussed thus far, this component accepts user input—for example, a user\
    \ ID and password.\n\n**Figure 14-3.** *The regular login form*\n\n![](images/00004.png)\n\
    \n![](images/00025.png)\n\n**Figure 14-4.** *The new user form*\n\n**Figure 14-5.**\
    \ *The logoff view*\n\nBecause this is a more complex component, for pedagogical\
    \ reasons I'll describe each part of the component out of order, starting with\
    \ the simplest.\n\nFirst, Listing 14-14 shows how you'd embed the Login Tiles\
