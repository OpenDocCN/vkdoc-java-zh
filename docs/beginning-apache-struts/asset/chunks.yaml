    \ also set off alarm bells in your head: it uses a scriptlet! There’s got to be\
    \ a better way—and there is. In this particular example, you have two choices:\
    \ use `<forEach>` and `<out>` JSTL tags (which we’ll cover later) or use the Struts-EL\
    \ tags (we’ll also cover these later), which are souped-up versions of the ordinary\
    \ Struts tags:\n\n```\n<logic-el:iterate name=\"companies\" id=\"company\" indexId=\"\
