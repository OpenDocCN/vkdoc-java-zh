    of Struts, to extend the basic capabilities of Struts.


    Tiles was developed initially by Cedric Dumoulin but is now (since version 1.2)
    integrated into Struts. In fact, it supercedes an older “Template” library, which
    had provided limited layout capability. The only thing that betrays its previous
    independent existence is that it’s a plug-in and therefore requires some setup.


    Tiles gives Struts applications two new capabilities:


    • **Layouts**: The ability to easily provide a uniform “look and feel” to your
    Struts applications. In most web applications, pages follow a similar *layout*—for
    example, they might have a common header or footer or sidebars. Tiles has a elegant
    inheritance mechanism that allows such layouts, even complicated ones, to be created
    and maintained easily.


    • **Components**: The ability to build reusable GUI components that you can easily
    embed into your JSP pages. Components give you the flexibility to display *dynamic*
    *content*—content that can change depending on user interaction or on external
    data sources. An example is displaying a list of weather forecasts for various
    cities, or a news items that interest the user, or targeted marketing.


    In short, layouts provide a common look and feel, and components allow provision
    of dynamic content in a reusable package.


    The powerful thing about Tiles is that you can mix these two capabilities: your
    layouts may include components. For example, you can specify a layout that displays
    a component as a sidebar containing a user’s search list. Used wisely, this can
    lead to easy-to-use applications. You’ll create such a component yourself in the
    lab section of this chapter.


    Of course, both layouts and component behavior can be emulated in other ways.
    For example, you could enforce a common look and feel by simply pasting the appropriate
    HTML in your JSP pages. You could implement “components” by cutting and pasting
    scriptlets in your JSPs!


