    • 定义全局常量——一种对每个`<formset>`中的每个字段都可访问的常量。


    • 定义单个`<formset>`内每个字段都可访问的常量。


    要声明全局常量，你需要将以下 XML 放置在第一个`<formset>`标签*之前*：


