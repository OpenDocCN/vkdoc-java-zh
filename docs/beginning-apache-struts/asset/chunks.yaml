- fmt: "# Configuring Struts\n\n## Declaring Form Beans\n\n- **name**: The `name`\
    \ attribute is a unique label for an `ActionForm` subclass. In Listing 9-2, the\
    \ `name` is `RegistrationForm`, but it could be anything you like, as long as\
    \ it is unique among other form bean declarations and qualifies as an XML attribute\
    \ value.\n- **type**: The `type` attribute is the fully qualified class name for\
    \ that `ActionForm` subclass.\n\nWith this declaration, you can use the name `RegistrationForm`\
    \ to refer to the `ActionForm` subclass, `net.thinksquared.registration.struts.RegistrationForm`.\n\
    \n## Declaring Global Exceptions\n\nGlobal exceptions allow you to catch uncaught\
    \ runtime exceptions that occur in your `Action` subclasses, displaying them with\
    \ a custom error message. This certainly lends a little more polish to your application,\
    \ compared to the default Tomcat error page. Listing 9-3 shows two ways you can\
    \ define an exception handler.\n\n**Listing 9-3.** *Declaring Global Exception\
    \ Handlers*\n\n```\n<global-exceptions>\n    <exception key=\"reg.error.io-unknown\"\
    \n               type=\"java.io.IOException\"\n               handler=\"net.thinksquared.registration.IOErrorHandler\"\
    />\n    <exception key=\"reg.error.unknown\"\n               type=\"java.lang.Exception\"\
    \n               path=\"/errors.jsp\"/>\n</global-exceptions>\n```\n\nThe `<global-exceptions>`\
    \ tag contains global exception handlers, each represented by an `<exception>`\
    \ tag. Each `<exception>` tag has two required attributes:\n\n- **key**: An error\
    \ key. When an exception handler is fired, an `ActionMessage` with this key is\
    \ created and put on the request. This error message gets pasted on the JSP containing\
    \ an `<html:errors>` tag that is finally displayed. Note that `key` is a required\
    \ attribute, which you have to specify even if you don't use it.\n- **type**:\
    \ Describes the type of error that is caught. Struts will first try to find the\
    \ error class that matches the declared types. If none matches exactly, then Struts\
    \ goes up that error's superclass tree, until it finds a match with a declared\
    \ exception.\n\nThere are two ways you can handle the caught exceptions: using\
    \ a `path` attribute to point to a JSP page that displays the error message, or\
    \ using a `handler` attribute, which is a fully qualified class name of your `ExceptionHandler`\
    \ subclass—that is, your handler subclasses: `org.apache.struts.action.ExceptionHandler`\n\
    \nYou only have to override the `execute()` function:\n\n```\npublic ActionForward\
    \ execute(Exception ex,\n                             ExceptionConfig ae,\n  \
    \                           ActionMapping mapping,\n                         \
    \    ActionForm form,\n                             HTTPRequestServlet request,\n\
    \                             HTTPResponseServlet response)\n```\n\nAs you can\
    \ see, this is nearly identical to `Action.execute()`, apart from the extra first\
    \ two arguments. You should declare the \"next\" page in a `<global-forwards>`\
    \ section (see the next section), so that `mapping` can resolve it.\n\nIn most\
    \ instances, using a custom `ExceptionHandler` subclass is overkill unless you\
    \ have a special requirement to do so.\n\n## Declaring Global Forwards\n\nYou\
    \ use global forwards to define forwarding paths accessible to all `Action`s or\
    \ `ExceptionHandler`s. In fact, all such paths will be accessible as long as you\
    \ have an `ActionMapping` instance initialized by Struts. This is certainly the\
    \ case for the `execute()` functions in `Action` or `ExceptionHandler`.\n\nGlobal\
    \ forwards are defined within an enclosing `<global-forwards>` tag, within which\
    \ you may place as many `<forward>` tags as you wish, as shown in Listing 9-4.\n\
    \n**Listing 9-4.** *Declaring a Global Forward*\n\n```\n<global-forwards>\n  \
    \  <forward name=\"ioError\" path=\"/errors.jsp\"/>\n</global-forwards>\n```\n\
    \nEach `<forward>` tag has two attributes:\n\n- **name**: A globally unique name\
    \ for this forward.\n- **path**: The path to the JSP or form handler to which\
    \ this forward refers. In both cases, the paths must begin with a slash (`/`).\n\
    \nIn Listing 9-4, a forward named `ioError` is declared, which refers to the path\
    \ `errors.jsp`. You can access this path from the `mapping` object available in\
    \ `execute()`: `mapping.findForward(\"ioError\")`\n\n## Declaring Form Handlers\n\
    \nForm handlers are defined within a single `<action-mappings>` enclosing tag,\
    \ as shown in Listing 9-5.\n\n**Listing 9-5.** *The Form Handler Declaration*\n\
    \n```\n<action-mappings>\n    <action\n        path=\"/Registration\"\n      \
    \  type=\"net.thinksquared.registration.struts.RegistrationAction\"\n        name=\"\
    RegistrationForm\"\n        scope=\"request\"\n        validate=\"true\"\n   \
    \     input=\"/Registration.jsp\">\n        <forward name=\"success\" path=\"\
    /Success.jsp\"/>\n    </action>\n</action-mappings>\n```\n\nThe `<action-mappings>`\
    \ tag acts as a container for each form handler, described by an `<action>` tag.\
    \ The `<action>` tag contains a few attributes that configure the handler:\n\n\
    - **path**: Describes the name of the form handler.\n- **type**: The fully qualified\
    \ class name of the `Action` subclass that handles business logic.\n- **name**:\
    \ The name of the form bean associated with this handler.\n- **validate**: Tells\
    \ Struts whether it should perform simple validation on the form data.\n- **scope**:\
    \ Sets the scope of the form data. Only `request` or `session` scopes are allowed.\n\
    - **input**: The relative path of the page that forms the input of this page.\n\
    \nThe `path` attribute must start with a slash. This has a meaning I will cover\
    \ in a later chapter. You might want to recall how form handlers are used on your\
    \ JSPs, as the `action` attribute of the `<html:form>` tag:\n\n```\n<html:form\
    \ action=\"Registration.do\" ...>\n```\n\nIn this snippet, the form handler is\
    \ `Registration`, and this corresponds to the `path` attribute in the form handler\
    \ declaration of Listing 9-5. The `.do` extension tells the servlet container\
    \ that this is a Struts form handler. This extension is the default, and is defined\
    \ in the `web.xml` file distributed with Struts.\n\nJust as in the form bean declaration,\
    \ the `type` attribute is the fully qualified name of your `Action` subclass that\
    \ will process business logic. In this case, it is `RegistrationAction`.\n\nThe\
    \ `name` attribute is the name of the form bean associated with the handler. In\
    \ this case, it is `RegistrationForm`, which is an obvious alias to the `RegistrationForm`\
    \ subclass.\n\nThe `validate` attribute, which can either be `true` or `false`,\
    \ tells Struts whether the `validate()` method on the form bean's `ActionForm`\
    \ subclass should be called. In other words, Struts performs simple validation\
    \ only when `validate=\"true\"`.\n\nThe `scope` attribute, which can either be\
    \ `request` or `session`, tells Struts in which scope to put the form bean that\
    \ contains the form data.\n\nLastly, the `input` attribute is just the path to\
    \ the input page. This is how `mapping.getInputForward()` (see Chapter 7) knows\
    \ what the input page was. In Listing 9-5, the input page is `Registration.jsp`.\n\
    \nNote that the path to the input page must begin with a slash, which denotes\
    \ the \"root\" directory of the webapp. This corresponds to the root directory\
    \ on the WAR file you create to deploy the webapp. Or, as another way of looking\
    \ at it, when the webapp is installed, the root directory is just the `\\webapps\\\
    <app name>\\` directory hosted under the servlet container.\n\nFor example, if\
    \ the Registration webapp were deployed in a WAR file called `registration.war`,\
    \ then the root directory on the servlet container would be `\\webapps\\registration\\\
    `.\n\nOne last thing about the `input` attribute. If I had put in a global forwards\
    \ section, I could have declared a global forward for `Registration.jsp`, and\
    \ used the name of the global forward as the value of `input`.\n\n## Forwards\n\
    \nEach `<action>` tag can contain zero or more `<forward>` tags. These forwards\
    \ differ from the..."
