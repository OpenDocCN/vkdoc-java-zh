    in Chapter 6, Listing 6-2, which we’ll use here.


    • **Data transformation**: Saving the user ID and password into the database,
    using the User data object (see Listing 5-1 in Chapter 5).


    • **Navigation**: Displaying the “You’re Registered!” page (Figure 7-2) if registration
    succeeds, or redisplaying the form with an error message (Figure 7-3) if the user
    ID


    exists.


