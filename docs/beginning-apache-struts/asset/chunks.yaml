- fmt: '# Understanding Scopes


    The other instructive thing about Listing 2-2 is that it demonstrates how to define
    a variable in one scriptlet and access it in other scriptlets within the same
    page.


    > **Note:** Every JSP page has a predefined variable called `request` that is
    the `HttpServletRequest` instance associated with the current page.


    The current trend in JSP has been to try to replace the use of scriptlets with
    custom tags. This is largely because using scriptlets results in less readable
    JSPs than using custom tags. I’ll revisit this idea again in Chapter 10, where
    I’ll introduce the JSP Standard Tag Library (JSTL).


    ## Final Thoughts


    This section should be old hat to readers who have even a little experience using
    JSP. If you’re from the ASP/PHP camps, you should have little difficulty mapping
    your knowledge in those technologies to JSP.


    The next two chapters give you an in-depth look at two aspects of JSP technology
    that even many experienced JSP developers might not grasp fully, but that are
    crucial to your understanding of Struts.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ---


    ## Useful Links


    - The Tomcat website: [http://jakarta.apache.org/tomcat/](http://jakarta.apache.org/tomcat/)

    - Further information on servlets: [http://java.sun.com/products/servlet/docs.html](http://java.sun.com/products/servlet/docs.html)

    - The Servlet specification: [http://java.sun.com/products/servlet/download.html](http://java.sun.com/products/servlet/download.html)

    - *Pro Jakarta Struts* (Apress 2005): [http://www.apress.com/book/bookDisplay.html?bID=228](http://www.apress.com/book/bookDisplay.html?bID=228)


    ## Summary


    - Tomcat’s `.\webapps` directory is where you deploy your web application.

    - Webapps are deployed as WAR files, which are just JAR files with a `.war` extension.

    - WAR files contain a `.\WEB-INF` directory, with a `web.xml` file to configure
    Tomcat.

    - Your Java classes and third-party JAR files go into `WEB-INF\classes` and `WEB-INF\lib`,
    respectively.

    - Two very important servlet classes are `HttpServletRequest` and `HttpSession`.


    ---


    # Chapter 3: Understanding Scopes


    In servlet-speak, a variable’s “scope” refers to its *lifetime* in a web application—how
    long the variable exists in the course of a user’s interaction with the system.
    A variable’s scope also determines its *visibility*—who can read and change the
    variable. Web applications routinely utilize this concept, so you must become
    thoroughly familiar with it. You’ll do just that in this chapter.


    Servlet technology uses four types of scope. Listed in decreasing lifetimes, they
    are as follows:


    - **Application scope**: Application-scoped variables are visible to *every* page
    of the web application, *all* the time. The variable is visible to *all* users
    of the system and exists across multiple user sessions. In other words, different
    users can potentially view and change the same variable at any time and from any
    page.

    - **Session scope**: Session-scoped variables exist only for a single-user session,
    but they are visible to every page in that session. Users would **not** be able
    to view or change each other’s instance of the variable.

    - **Request scope**: Request-scoped variables exist only for a single request.
    This includes page redirects. So, if request-scoped variable `x = 7` on the first
    page is redirected to a second page, then `x = 7` on the second page too.

    - **Page scope**: A page-scoped variable exists only on the current page. This
    does **not** include redirects. So, if a page-scoped variable `x = 8` on the first
    page is redirected to a second page, then `x` is undefined on the second page.


    > **Note:** A **redirect** occurs when you ask for one page but are given another.
    The page you asked for redirects you to the page you actually get. You can do
    this in JSP with the `<jsp:forward>` tag, which you will see in action in Lab
    3 later in this chapter.


    **Session** and **request** scopes are the two most important scopes in Struts.
    To see if you really understand these ideas, try the following lab.


    ## Lab 3: Scopes Quiz


    Consider the following two JSP pages (Listings 3-1 and 3-2) and assume they’ve
    been loaded onto a servlet container. Your job is to predict the output on the
    screen as two users, Audrey and Brenda, interact with the system.


    **Listing 3-1.** *First.jsp*


    ```

    <jsp:useBean id="myVariable"

    scope="application" class="java.lang.StringBuffer" />

    <%

    myVariable.append("1");

    %>

    <jsp:forward page="Second.jsp" />

    ```


    **Listing 3-2.** *Second.jsp*


    ```

    <jsp:useBean id="myVariable"

    scope="application" class="java.lang.StringBuffer" />

    <%

    myVariable.append("2");

    %>

    <%= myVariable.toString() %>

    ```


    The `<jsp:useBean>` tag simply defines a new JSP variable, with the given scope.
    `<jsp:forward>` redirects the user to a given page. Try to answer the following
    questions:


    - Audrey is the first person to view `First.jsp`. **What will she see?**

    - Brenda next views `First.jsp` from a different machine. **What does she see?**

    - If Audrey again views `First.jsp` *after* Brenda, **what will she see?**

    - What if Brenda now loads `Second.jsp` directly?


    Compare your answers to the ones in Appendix D.


    When you’re sure you understand how application scope works, consider what happens
    if we change the `scope` attribute in both `First.jsp` and `Second.jsp` to `session`,
    then `request`, then `page`. In each instance, check your answers before proceeding
    with the next scope.


    ---


    I hope this little *Gedankenexperiment* gives you a clear understanding of how
    the various scopes work. To sweep away any lingering doubts you might have, try
    doing it in real life:


    1. Copy the `lab3.war` file found in the Source Code section of the Apress website,
    located at [http://www.apress.com](http://www.apress.com), into the Tomcat `\webapps\`
    directory.

    2. Start Tomcat, if it isn’t already running.

    3. With your favorite web browser, navigate to [http://localhost:8080/lab3/](http://localhost:8080/lab3/).


    You should see a main page with links to four versions of `First.jsp`, one for
    each scope (see Figure 3-1). Play around with the application until you’re *absolutely*
    sure you understand the difference between the various scopes.


    **Figure 3-1.** *The Scopes web application start page*


    One last question: If we created a variable with a scriptlet on our JSP page like
    so:


    ```

    <% int x = 7; %>

    ```


    what scope would it implicitly have?


    ---


    ## In Case You Were Wondering...


    You might have noticed that we used a `StringBuffer` for `myVariable`, and you
    might be wondering if we could have used a `String` instead. We can’t.


    The reason is that you cannot reassign a variable declared with `<jsp:useBean>`.
    A `String` is immutable, and so each time you try to change a `String` with a
    statement like `myVariable += "1"`, you’re attempting to reassign the variable.


    However, calling a function on a variable is OK since we’re not reassigning anything.
    So, `myVariable.append("1")` is acceptable, since we’re just calling a function
    on the object referred to by the variable. The variable refers to the same object
    instance as it did before—no reassignment done.


    ## Session and Request Scope Internals


    In the previous chapter, we came across two servlet classes, `HttpServletRequest`
    and `HttpSession`, which as I explained represent the lifetimes of objects on
    your webapp. If this comment seemed a little cryptic at that time, I’d like to
    clear the air now.'
