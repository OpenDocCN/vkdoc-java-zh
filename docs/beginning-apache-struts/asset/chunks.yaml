    ## Lab 10a: The LILLDEP Full Listing Page


    In this lab, you will create a page that lists all the entries in the LILLDEP
    database.


    ### Step 1: Complete `ListingAction`


    Complete the implementation of the Action subclass `ListingAction` so that it
    prepares an `Iterator` over the LILLDEP database. The following line of code shows
    how to get an `Iterator` containing all Contacts in the database:


    ```

    Iterator everything = ContactPeer.doSelect(new Criteria());

    ```


    (Refer to the sections on Lisptorq in Appendix A for details.) Ensure that your
    `ListingAction` implementation does the following:


    - Forwards to the page named `success`.

    - Puts the `Iterator` of Contacts on the request object (refer to the earlier
    section on `<logic:iterator>` to see how this is done). Instead of using an ad
    hoc name for the object, use a suitable name on the interface `JSPConstants`.
    This is helpful because all names shared between JSP and Action classes are stored
    in one file, `JSPConstants`.


    ### Step 2: Complete `listing.jsp`


    Complete the implementation of `listing.jsp`, using `<logic:iterate>` to list
    the following fields in a table:


    - `name`

    - `email`

    - `company`

    - `address`

    - `postcode`

    - `website`


    When users click on `website`, it should take them to the company’s website.


    ### Step 3: Amend `web.xml`


    Put in a declaration in `web.xml` for the Struts Logic tag library.


    ### Step 4: Amend `struts-config.xml`


    Put in a new action mapping in `struts-config.xml`:


    - The path should be `/Listing`.

    - This action mapping should tie together `ListingAction` and `listing.jsp`.


