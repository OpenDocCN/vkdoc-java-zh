    简而言之，使用 JSF 构建 Web 应用相当容易，但对其进行重大扩展则更为困难。而在扩展 JSF 的多种可能方式中，对 UI 组件和验证器进行扩展可能是最简单的。


    **Shale 概述**


    与作为规范的 JSF 不同，Shale 是你可以立即使用的实际软件。


    Shale 被标榜为 Struts（为清晰起见，我们有时会称之为“经典”Struts）的彻底重写。这次重写非常彻底，Struts 开发者很可能认不出它还是
    Struts！


    Shale 基于 JSF。我的意思是，JSF 之于 Shale，就如同 JSP 之于 Struts。没有 JSF，就没有 Shale。你需要一个 JSF 的实现（如
    MyFaces）才能让 Shale 工作。我不想过分强调这一点，但理解这一点至关重要。


