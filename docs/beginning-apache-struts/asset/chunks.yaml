    C H A P T E R 1 9


    ■ ■ ■


    Developing Plug-ins


    **P**lug-ins are a great way to extend the basic functionality of Struts. In previous
    chapters, you’ve seen plug-ins at work—in Tiles and the Validator framework. In
    this chapter, I’ll walk you through developing a nontrivial and useful plug-in
    called DynaForms. Essentially, the DynaForms plug-in brings Tiles-like inheritance
    to dynamic form beans. I’ll explain in more detail what this means shortly.


    The inspiration for this idea comes from an excellent pair of articles: “Adding
    Spice to Struts,” parts 1 and 2, by Samudra Gupta (see “Useful Links” at the end
    of this chapter).


    Samudra’s solution to the problem of implementing an inheritance mechanism for
    dynamic form beans involves subclassing fundamental Struts classes, primarily
    ActionServlet.


    Unfortunately, as Samudra discusses in his article, his solution has a couple
    of downsides: the inheritance declaration is a little kludgy and limited. If you’re
    interested in learning more, look up these articles for details.


    In this chapter, we’ll take a different route and, I hope, a more scenic one—meaning
    you get to see more of how Struts works under the hood. We’ll create a plug-in
    that allows developers to create form beans with inheritance in XML files *outside*
    of struts-config.xml.


    In order for you to better follow the discussion, it would be helpful to have
    a copy of the latest Struts sources handy (see “Useful Links” for the download
    site; I’ll be using release 1.2.7 in this chapter), and have them in a project
    within Eclipse (or a similar IDE). An IDE


    like Eclipse (again, see “Useful Links”) is absolutely essential to easily trace
    function calls, declarations, and class hierarchies. You can do it with Notepad,
    but it won’t be much fun.


    **The Task at Hand**


    Consider the hierarchy of entities shown in Figure 19-1 (a variation on the main
    example in Samudra’s first article).


