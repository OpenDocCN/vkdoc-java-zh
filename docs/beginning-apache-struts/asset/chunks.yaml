    C H A P T E R 1 7 ■ P O T P O U R R I


    **241**


    • InvocationTargetException: If the get/set function on the bean throws an Exception


    • IllegalArgumentException: If either bean or property is null **Using PropertyUtils**


    This is all very good, but how can PropertyUtils be useful in Struts programming?
    Recall that your ActionForm subclasses (including your DynaActionForm subclasses)
    are also JavaBeans. In previous lab sessions, to read (or write) an ActionForm’s
    properties, we had to perform type conversion, as shown in Listing 17-1.


    **Listing 17-1.** *Type Conversion Idiom to Read ActionForm Properties* public
    ActionForward execute(ActionMapping mapping,


    ActionForm form,


    HttpServletRequest request,


    HttpServletResponse response){


    //get userid and password


    **RegistrationForm rForm = (RegistrationForm) form;**


    String userid = rForm.getUserId();


    String password = rForm.getPassword();


    ...


    Listing 17-1 shows an idiom I’ve used throughout this book. To read the properties
    in an ActionForm subclass, you must do the following:


    • Perform a type conversion.


    • Read the form’s properties.


    I’ve used this idiom primarily for the sake of clarity, since it simplifies the
    examples and lab session code. You should think twice before using it in production
    code, if maintainability is important to you. This is because there are two big
    downsides to using type conversion as in Listing 17-1:


    • **No dynamic forms**: You can’t easily replace the ActionForm with a dynamic
    form equivalent. You’d have to amend the Action code. You’ve seen this in Chapter
    16, when I discussed dynamic forms, and I ported the Registration webapp to using
    dynamic forms. Refer to Listing 16-5 to see how you’d have to amend Listing 17-1


    in order to work with dynamic forms.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C17.fm Page 242 Tuesday, January 24, 2006 10:14 AM


    **242**


    C H A P T E R 1 7 ■ P O T P O U R R I


    • **Tight coupling**: It ties your Action class too rigidly to your ActionForm
    class, preventing reuse of the Action with other ActionForms. For example, if
    you wanted to reuse the Action of Listing 17-1, you’d have to ensure that all
    the ActionForms passed into its execute() were of type RegistrationForm. In some
    scenarios, this constraint might be too restrictive.


    Instead of this approach, you can use PropertyUtils to circumvent both these drawbacks.
    PropertyUtils lets you completely decouple your Action from a particular ActionForm
    subclass (this includes dynamic forms).


    Using PropertyUtils, Listing 17-1 would now look like Listing 17-2.


    **Listing 17-2.** *Using PropertyUtils to Read ActionForm Properties* **import
    org.apache.commons.beanutils.PropertyUtils;**


    ...


    public ActionForward execute(ActionMapping mapping,


    ActionForm form,


    HttpServletRequest request,


    HttpServletResponse response)


    throws Exception{


    //get userid and password


    **String userid = PropertyUtils.getProperty(form,"userid");** **String password
    = PropertyUtils.getProperty(form,"password");**


    ...


    Using PropertyUtils as shown in Listing 17-2, replacing RegistrationActionForm
    with an equivalent dynamic form would be much easier—you wouldn’t have to alter
    your Action subclass code.


    **In a Nutshell...**


    One downside of using PropertyUtils is that like with dynamic beans, you lose
    compile-time checking. You’ve essentially traded compile-time checking for looser
    coupling between classes.


    However, in most instances the advantages gained (looser coupling *and* the ability
    to switch to dynamic forms later) well outweigh this loss.


    So, unless you have a really good reason, use PropertyUtils to access form or
    bean properties. Using it consistently makes your code much more maintainable
    in the long run.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


