- fmt: "在`listing.jsp`中，我们希望在每个联系人列表的左侧放置复选框，以便用户选择要删除的联系人。你将使用动态表单和`<html:multibox>`来实现此功能。\n\
    \n`<html:multibox>`通常与`<logic:iterate>`一起使用，在每次迭代时渲染一个复选框，因此得名*multibox*。这些复选框与表单Bean上的一个索引属性绑定。例如：\n\
    \n```xml\n<form-bean name=\"myForm\"\n           type=\"org.apache.struts.action.DynaActionForm\"\
    >\n    <form-property name=\"myArray\" type=\"java.lang.String[]\" />\n</form-bean>\n\
    ```\n\n（此代码片段使用了动态表单，但你也可以使用常规的`ActionForm`。）对应的`<html:multibox>`用法可能如下：\n\n```jsp\n\
    <logic:iterate id=\"aBean\" name=\"myBeans\">\n    <html:multibox property=\"\
    myArray\"\n                   value=\"<%=((MyBean)aBean).myValue() %>\"/>\n</logic:iterate>\n\
    ```\n\n`multibox`上的`value`属性是复选框提交的实际值。*仅当*关联的复选框被选中时，该值才会被存储。\n\n另请注意，使用`<html:multibox>`时，*无需*使用显式的索引属性（例如`property=\"\
    myArray[..]\"`）来填充表单Bean。\n\n基于以上背景，请按以下步骤在完整列表页面上实现删除功能。\n\n**步骤 1：声明`SelectionForm`表单Bean**\n\
    \n`SelectionFormBean`是用于保存待删除联系人ID的表单Bean。\n\n将其声明为动态表单。它应包含一个名为`selected`的数组属性，类型为`java.lang.String[]`。\n\
    \n**步骤 2：修改`listing.jsp`**\n\n`listing.jsp`需要显示用于选择待删除联系人的复选框：  \n1. 在`listing.jsp`中添加`<html:form>`标签，使其提交到`DeleteContacts.do`。\
    \  \n2. 添加`<html:multibox>`标签，用于向`SelectionFormBean`输入数据。必要时可使用脚本片段。如果使用支持EL的Struts标签以避免脚本片段，则更佳。\n\
    \n提示：`<html:multibox>`提交的值应为待删除联系人的ID。\n\n**步骤 3：创建删除联系人的Action**\n\n完成`DeleteContactsAction`的实现，使其删除选中的联系人。几点提示：\n\
    \n- 使用`get(String property, int index)`从动态表单中读取值。\n- 如果索引大于可用列表项数，此函数会抛出`IndexOutOfBoundsException`。\n\
    \n完成后，为`DeleteContacts`添加一个新的Action映射。`success`应重定向到`Listing.do`（*而不是* `listing.jsp`！）。像往常一样，编译、部署并测试你的工作。\n\
    \n**有用链接**\n\n- `DynaActionForm`支持的类型列表：`http://struts.apache.org/struts-doc-1.2.x/userGuide/building_controller.html`\n\
    - `LazyValidatorForm` JavaDoc：`http://struts.apache.org/struts-doc-1.2.7/api/org/apache/struts/validator/LazyValidatorForm.html`\n\
    - `BeanValidatorForm` JavaDoc：`http://struts.apache.org/struts-doc-1.2.7/api/org/apache/struts/validator/BeanValidatorForm.html`\n\
    - Apache Commons BeanUtils 项目：`http://jakarta.apache.org/commons/beanutils/`\n\
