- fmt: '# Appendix B: Commonly Used Classes


    This appendix describes selected servlet and Struts classes. Please note that
    *not* all functions on a class are shown—only the ones I believe you might find
    useful.


    The documentation for the Struts classes (`Action`, `ActionForm`, `ActionMessage`,
    `ActionMessages`, `ActionError`, `ActionErrors`, `ActionMapping`, `FormFile`,
    `ComponentContext`, and `ExceptionHandler`) has been adapted from Apache’s JavaDocs
    for those classes, and is reproduced here for your convenience under the Apache
    License. A copy of the Apache License is available at `www.apache.org/licenses/LICENSE-2.0`.


    ## `javax.servlet.http.HttpServletRequest`


    This class encapsulates an incoming HTTP request. It is used to store or retrieve
    objects that have request scope (using `get/set/removeAttribute()`). You may also
    store session scope objects on it by first using `getSession()` to acquire an
    `HttpSession` object (see the next section).


    | Return Type | Function | Comments |

    |-------------|----------|----------|

    | `Object` | `getAttribute(String name)` | Returns the value of the named attribute
    as an `Object`, or `null` if no attribute of the given name exists |

    | `void` | `removeAttribute(String name)` | Removes an attribute from this request
    |

    | `void` | `setAttribute(String name, Object o)` | Stores an attribute in this
    request |

    | `HttpSession` | `getSession()` | Returns the current session associated with
    this request, or if the request does not have a session, creates one |

    | `String` | `getParameter(String name)` | Returns the value of a request parameter
    as a `String`, or `null` if the parameter does not exist |


    ## `javax.servlet.http.HttpSession`


    As its name implies, `HttpSession` is used to store session-scoped variables.
    It has `get/set/removeAttribute()` functions, identical to `HttpServletRequest`.


    | Return Type | Function | Comments |

    |-------------|----------|----------|

    | `Object` | `getAttribute(String name)` | Returns the object bound with the specified
    name in this session, or `null` if no object is bound under the name |

    | `void` | `removeAttribute(String name)` | Removes the object bound with the
    specified name from this session |

    | `void` | `setAttribute(String name, Object value)` | Binds an object to this
    session, using the name specified |

    | `String` | `getId()` | Returns a string containing the unique identifier assigned
    to this session |


    ## `org.apache.struts.action.ActionMessage`


    `ActionMessage` encapsulates a single locale-independent *message*. Only the constructors
    of `ActionMessage` are important to webapp developers.


    | Constructor | Comments |

    |-------------|----------|

    | `ActionMessage(String key)` | Constructs an action message with no replacement
    values |

    | `ActionMessage(String key, Object value0)` | Constructs an action message with
    the specified replacement values |

    | `ActionMessage(String key, Object[] values)` | Constructs an action message
    with the specified replacement values |

    | `ActionMessage(String key, Object value0, Object value1)` | Constructs an action
    message with the specified replacement values |

    | `ActionMessage(String key, Object value0, Object value1, Object value2)` | Constructs
    an action message with the specified replacement values |

    | `ActionMessage(String key, Object value0, Object value1, Object value2, Object
    value3)` | Constructs an action message with the specified replacement values
    |


    ## `org.apache.struts.action.ActionMessages`


    This class is used to store multiple `ActionMessage` objects.


    | Return Type | Function | Comments |

    |-------------|----------|----------|

    | `void` | `add(String property, ActionMessage message)` | Adds a message to the
    set of messages for the specified property |

    | `boolean` | `isEmpty()` | Returns `true` if there are no messages recorded in
    this collection, or `false` otherwise |'
