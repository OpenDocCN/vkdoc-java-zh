    清单 A-2 应该是不言自明的。user_id 和 password 字段都是必填字段，并且 user_id 字段被用作主键。


    当在清单 A-2 描述的模式上运行 Lisptorq 时（我将在下面的实验中向你展示如何操作），输出将是*四个*模型类，外加四个其他辅助类。通常，对于数据库模式中的每个表，会生成四个模型类。

