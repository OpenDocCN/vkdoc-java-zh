    \n## 标准验证器\n\n表15-1列出了撰写本文时（Struts 1.2.4到1.2.7）的所有标准验证器。然而，正如我提到的，Validator框架正在积极开发中，所以请务必查看Struts\
    \ Validator网站（参见“有用链接”部分）以获取最新信息。\n\n表15-1的第一列显示验证器的名称。这是你在`<field>`标签的`depends`属性中使用的名称。第二列给出了验证器接受的变量列表。第二列中列出的所有变量都是*必需的*。最后一列给出了验证器的“触发器”——如果*满足*这些条件，将触发验证器失败。\n\
    \n几乎每个验证器都很容易使用，但`validwhen`验证器可能是个例外。我们接下来将讨论它。\n\n**表15-1.** *标准验证器、它们的参数和触发器*\n\
    \n| 验证器 | 变量 | 触发器 |\n| --- | --- | --- |\n| `required` | - | 字段只有空白字符。 |\n| `mask`\
    \ | `mask` | 字段不匹配掩码。`mask`变量是一个正则表达式。 |\n| `intRange`, `floatRange` | `min`,\
    \ `max` | 字段 > `max` 或字段 < `min`。 |\n| `maxLength` | `maxLength` | 字段包含超过`maxLength`个字符。\
    \ |\n| `minLength` | `minLength` | 字段包含少于`minLength`个字符。 |\n| `double`, `float`,\
    \ `long`, `integer`, `short`, `byte` | - | 字段无法转换为关联的基本类型。 |\n| `date` | `datePattern`\
    \ 或 `datePatternStrict` | 字段不匹配给定的日期模式。注意：`datePatternStrict`要求模式中存在的任何前导零也必须在字段中存在。\
    \ |\n| `creditCard` | - | 字段不是信用卡号。 |\n| `email` | - | 字段不是符合规范的电子邮件地址。（注意：这实际上比在字段中测试单个`@`要复杂得多！）\
