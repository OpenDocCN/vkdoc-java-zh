- fmt: "# 排版后的内容\n\n与`LookupDispatchAction`或`DispatchAction`不同，`MappingDispatchAction`不会根据请求参数进行分发。相反，你可以声明多个表单处理器，它们使用同一个`MappingDispatchAction`子类来执行不同的操作。\n\
    \n例如，假设你想在你的Web应用中组合略微不同的打印功能：打印为PDF、打印为HTML和打印为文本。负责打印的`Action`子类将负责获取必要的数据，并将其发送给适当的辅助类，以便以正确的格式打印。在这种情况下，让三个不同的`Action`来处理数据是不自然的，因为代码很可能非常相似。你希望有一个`PrintingAction`，它包含三个函数，每个函数对应一种打印格式。\n\
    \n为此，你需要声明三个`<action>`元素，每个对应一种打印格式，如清单17-10所示。\n\n**清单17-10.** *`PrintingAction`的多个声明*\n\
    \n```\n<action path=\"/PrintToPDF\"\n      type=\"myco.myapp.struts.PrintingAction\"\
    \n      parameter=\"pdf\"\n      ...>\n<action path=\"/PrintToHTML\"\n      type=\"\
    myco.myapp.struts.PrintingAction\"\n      parameter=\"html\"\n      ...>\n<action\
    \ path=\"/PrintToText\"\n      type=\"myco.myapp.struts.PrintingAction\"\n   \
    \   parameter=\"text\"\n      ...>\n```\n\n清单17-10中的`parameter`属性指向`PrintingAction`上的实际函数名（参见清单17-11）。\n\
    \n**清单17-11.** *`PrintingAction`*\n\n```\nimport org.apache.struts.actions.MappingDispatchAction;\n\
    ...\npublic class PrintingAction extends MappingDispatchAction{\n    public ActionForward\
    \ pdf(ActionMapping mapping,\n                             ActionForm form,\n\
    \                             HttpServletRequest request,\n                  \
    \           HttpServletResponse response)\n            throws IOException, ServletException\
    \ {\n        //code for printing to PDF here.\n    }\n\n    public ActionForward\
    \ html(...)\n            throws IOException, ServletException {\n        //code\
    \ for printing to HTML here.\n    }\n\n    public ActionForward text(...)\n  \
    \          throws IOException, ServletException {\n        //code for printing\
    \ to text here.\n    }\n\n    public ActionForward unspecified(...)\n        \
    \    throws IOException, ServletException {\n        mapping.findForward(\"page-not-found\"\
    );\n    }\n}\n```\n\n`pdf()`、`html()`、`text()`和`unspecified()`的签名与`Action`的`execute()`相同。\n\
    \n> **注意** 与其他`DispatchActions`一样，你**不要**重写`execute()`。\n\n正如你现在应该知道的，`unspecified()`处理请求的函数在`PrintingAction`上不存在的情况。（问题：这种情况是如何发生的？）\n\
    \n## 简而言之...\n\n你可能已经注意到，`MappingDispatchAction`和`DispatchAction`非常相似。当然，两者都根据URL上的参数进行分发。区别在于你如何使用它们：\n\
    \n- **`MappingDispatchAction`**：当你希望为同一个`Action`定义多个表单处理器时使用。\n- **`DispatchAction`**：如果你出于任何原因不想定义多个表单处理器时使用（例如，为了使`struts-config.xml`更易于管理）。\n\
    \n在大多数情况下，选择它们主要取决于个人偏好。我倾向于在我的应用中使用`MappingDispatchAction`，因为你可以根据`struts-config.xml`中的声明，立即知道关联的`Action`上可用的功能。\n\
    \n## 使用全局转发\n\n在第9章中，我向你展示了如何声明全局转发。这些转发在`struts-config.xml`文件中的任何位置都可以访问，并且也可以从`<html:link>`中访问。后者正是全局转发发挥其优势的地方。\n\
    \n你可以在`<html:link>`中使用全局转发，而不是硬编码路径。\n\n例如，许多Web应用都有通用的静态导航链接。LILLDEP主页就是一个很好的例子。有几个导航链接：`Full`、`MNC`、`Listing`、`Import`和`Collect`。与其像这样硬编码：\n\
    \n```\n<a href=\"Listing.do\">...\n<a href=\"import.jsp\">...\n```\n\n你应该使用：\n\
    \n```\n<html:link forward=\"listing\">...\n<html:link forward=\"import\">...\n\
    ```"
