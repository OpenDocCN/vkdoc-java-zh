- fmt: '这是因为`servlet`解决了许多源于客户端-服务器通信的*通用*问题，例如对象池和会话管理。你的`servlet`类可以从头实现基本的`Servlet`接口，或者继承`GenericServlet`基类。如果你想利用`servlet`技术对这些通用问题的解决方案，就可以这样做。


    如果你主要关注处理和显示网页，`HttpServlet`是你应该继承的基类。


    ■**注意**：除此之外，`ActionServlet`及其辅助类还负责许多其他幕后工作，例如为了效率而池化`Action`子类、读取配置数据，或初始化称为插件的`Struts`扩展。这些活动对`Struts`开发者是不可见的，这也是`Struts`如此易用的一个重要原因。你不需要知道时钟如何工作就能看时间！


    传入的表单数据按阶段处理：


    - **数据传输**：表单数据传输到你的`ActionForm`子类。

    - **简单验证**：该子类中的表单数据通过简单验证。如果简单验证失败，用户会自动看到带有详细错误信息的表单。这是一个*典型*场景，但具体细节取决于你如何配置`Struts`。我们将在第6章介绍简单验证的机制，并在第9章讨论配置。

    - **进一步处理**：表单数据随后发送到你的`Action`子类，进行复杂验证和业务逻辑处理。我们将在第7章讨论这一点。


    你的`Action`子类还指定了要显示的“下一个”页面，这结束了对单个请求的处理。


    **模型的框架**


    在上一节中，我强调了首先设计`webapp`模型部分的乐趣，因此`Struts`在这一领域的不足可能会让人有些失望。


