    示例


    此示例显示了三个提交按钮，所有按钮的文本都是“Reset Me”。最后一个重置按钮使用 `<html:bean>` 标签来本地化其文本：


    <html:reset value="Reset Me" />


    <html:reset >Reset Me</html:reset >


    <html:reset >


    <html:bean message="msg.reset-me"/>


    </html:reset >


    在所有情况下，如果用户点击按钮，表单将被提交，关联的 `ActionForm` 的 `reset()` 函数将被调用，然后页面会重新显示。您的 `ActionForm`
    子类可以重写此函数以提供自定义的表单字段重置。


    等价物


    JSF 的 `<h:commandButton id="reset" type="RESET">` 允许您模拟 `<html:reset>` 按钮的功能。当然，要将其与
    Struts 一起使用，您需要将其嵌入到 Strut-Faces 的 `<s:form>` 标签中。有关 `<h:commandButton>` 和 `<s:form>`
    的详细信息，请参阅第 20 章。


    **rewrite**


    此标签解析并渲染一个 URL。使用的规则与 `<html:link>` 类似。


    但与 `<html:link>` 不同的是，URL 不会嵌入到 HTML `<a>` 标签中；URL 是单独渲染的。您可能会发现这对于调试或在脚本中使用很有用。


    使用限制


    您必须指定 `action/module`、`href`、`page` 或 `forward`。


    属性


    • `action/module`、`href`、`page` 或 `forward`：用于指定一个 URL。`action`、`module` 对指定一个表单处理器。`action`
    当然必须以斜杠开头，如果您想指定一个模块，请使用 `module` 属性。`href` 是相对或绝对 URL。`page` 是模块相对 URL（因此，必须以斜杠开头）。`forward`
    是全局转发的名称。


    • `anchor`：链接的可选 HTML 锚点。


    • `transaction`：如果为 `true`，则将当前事务令牌作为请求参数附加到 URL。有关事务令牌的详细信息，请参阅 `<logic:present>`
    条目。


