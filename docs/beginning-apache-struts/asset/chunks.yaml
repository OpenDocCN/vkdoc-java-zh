    指定此元素的建议标题。在大多数图形浏览器中，当鼠标指针悬停在元素上时，建议标题会显示为工具提示。


    titleKey


    指定建议标题的消息资源键。


    表 C-6 中的大多数属性只是其对应 HTML 属性的镜像。例外情况是 `altKey` 和 `titleKey`，它们使用 Struts 的消息资源文件来生成实际属性（分别为
