    **match/notMatch**


    match is a conditional tag that executes its body if the given property (or extended
    property) contains the value attribute as a substring. notMatch is the converse
    of match.


    Usage Restrictions


    The value attribute is required. You must specify one selector attribute (see
    the start of this section for a definition) as well.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


