- fmt: '# Struts Tag Reference


    ## `bean:page`


    Both `id` and `property` attributes are required.


    ### Attributes


    - `id`: The name of the exposed variable. Scriptlets and other custom tags will
    be able to access the new variable using this name. This attribute is required.

    - `property`: The value is `application`, `session`, `request`, `config`, or `response`;
    used to get the associated objects from the page context. This attribute is required.


    ### Examples


    The snippet `<bean:page id="myVar" property="session" />` exposes the session
    object (`HttpSession`) associated with the enclosing page as a bean named `myVar`.
    The other page context objects are similarly exposed.


    ### Equivalents


    JSTL’s `<c:set>` can be used to replace `<bean:page>`. Let’s look at some examples.


    To expose the application, use this:


    ```

    <c:set var="myVar" value="${pageContext.servletContext}"/>

    ```


    To expose the session, use this:


    ```

    <c:set var="myVar" value="${pageContext.session}"/>

    ```


    To expose the request, use this:


    ```

    <c:set var="myVar" value="${pageContext.request}"/>

    ```


    To expose the config object, use this:


    ```

    <c:set var="myVar" value="${pageContext.servletConfig}"/>

    ```


    To expose the response, use this:


    ```

    <c:set var="myVar" value="${pageContext.response}"/>

    ```


    You should note that the JSTL implicit object `sessionScope` is not the same as
    `pageContext.session`. The former is a `Map` containing key/value pairs, and the
    latter is the actual `HttpSession` object, whose properties you can read.


    ---


    ## `bean:resource`


    `resource` allows you to read any file from the current webapp and expose it either
    as a `String` variable or an `InputStream`. See also `<bean:include>`.


    ### Usage Restrictions


    The `id` and `name` attributes are required.


    ### Attributes


    - `id`: The name of the exposed variable. Scriptlets and other custom tags will
    be able to access the new variable using this name. This attribute is required.

    - `name`: The module-relative name of the resource to load.

    - `input`: If this attribute is present (the actual value is irrelevant), then
    the exposed variable is of type `InputStream`; otherwise it’s a `String`.


    ### Examples


    Frankly, it’s difficult to see how this tag can be useful, unless you’re using
    some other custom tags that can read and parse the `InputStream`. Here’s an example
    using a hypothetical RSS source (`/myRss.xml`, which contains RSS markup) and
    a hypothetical `<rss>` custom tag to parse and display the output:


    ```

    <bean:resource id="rssSrc" name="/myRss.xml" input="yes" />

    <rss:write name="rssSrc" />

    ```


    ### Equivalents


    The closest equivalent is JSTL’s `<c:import>`, which calls a URL and exposes the
    received data as either a `String` or a `Reader`. The previous example can easily
    be translated using JSTL:


    ```

    <c:import varReader="rssSrc" url="myRss.xml" />

    <rss:write value="${rssSrc}"/>

    ```


    ---


    ## `bean:size`


    This tag exposes the size of a given `Collection` or `Map` or array as a variable
    (of type `Integer`) that may be accessed with scriptlets or custom tags.


    ### Usage Restrictions


    The `id` attribute is required, and you must specify the array/Collection/Map
    whose size you want measured, using either the `collection` attribute or a `name`/`property`/`scope`
    combination.


    ### Attributes


    - `id`: The name of the exposed variable. Scriptlets and other custom tags will
    be able to access the new variable using this name. This attribute is required.

    - `name`/`property`/`scope`: These attributes are used to locate the Collection/Map/array,
    with the given name and optional property and scope. If `scope` isn’t specified,
    all scopes are searched for the named object.'
