    ## Chapter 15: The Validator Framework


    **Question**: In most cases, putting in a `validate()` function should suffice.
    Use the second alternative only after much thought, since validators should be
    *generic*, if only to the problem domain of your web application. Otherwise, you’d
    run into potential maintenance issues. Can you see why?


    **Answer**: If a particular validation is going to be used only once, it makes
    no sense to write an extension to the Validator framework. This is because the
    maintenance overhead for such an extension (you need to declare the new validator
    in `validation-rules.xml`, create the necessary Java code, and use the validator
    in `validations.xml`) is much higher compared to using a `validate()` function.


    Of course, if the same validation is used many times over (i.e., the validator
    is *generic*), then the cost of repeating the code in `validate()`, or even refactoring
    necessary validator code in a separate class, is higher. The latter option might
    seem to be lower in cost, but you’d still have to implement `validate()` on each
    form you use.


    ## Chapter 17: Potpourri


    **Question**: As you should know by now, `unspecified()` handles the case where
    the requested function does not exist on `PrintingAction`. (Question: how can
    this happen?) **Answer**: It can happen if there’s a bug in the JSP code (that
    is, the JSP code omits the dispatch parameter in the URL), or if the user manually
    keys in an incorrect URL (again, omitting the dispatch parameter in the URL).


    `unspecified()` *does not* handle a dispatch parameter value for which the corresponding
    function does not exist. In this case, an Exception is thrown and unless you’ve
    caught it using a global (or local—see Chapter 18) exception handler, you’ll see
    the standard JSP error page. An alternative to using exception handlers is to
    extend `LookupDispatchAction` (as I did in Lab 14’s `TilesLookupDispatchAction`)
    to include an `unknown()` function that handles this possibility.


    ## Chapter 20: JavaServer Faces and Struts Shale


    **Quick Quiz**: How would you do the same thing in Struts?


    **Answer**: Use `LookupDispatchAction`. The JSF approach is much easier to use.
    Instead of going through the trouble of subclassing `LookupDispatchAction` and
    declaring special parameters in `struts-config.xml`, all you need to do with JSF
    is to tell JSF which function to call in the `commandButton`’s action attribute.


