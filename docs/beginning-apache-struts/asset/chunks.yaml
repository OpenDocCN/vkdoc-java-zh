    C H A P T E R 4


    ■ ■ ■


    Custom Tags


    **C**ustom tags are JSP tags you create that allow you to define new functionality
    for your JSPs. For example, suppose we have a custom tag called <temp:F> that
    converts degrees Celsius to degrees Fahrenheit. We could use it in our JSPs: Water
    boils at 100 Celsius, which is <temp:F>100</temp:F> Fahrenheit.


    which displays as


    Water boils at 100 Celsius, which is 212 Fahrenheit.


    While this is a simple example meant to illustrate what custom tags are, in reality,
    custom tags are useful for a number of reasons:


    • They promote code reuse because they cut down duplication of code on your JSPs.


    • They make your JSPs more maintainable, because you can avoid using scriptlets.


    • Their usage simplifies the work of web designers, because they obviate the need
    for scriptlets, which are more difficult to write and use.


    • They are a key tool used to promote a separation of concerns (see Chapter 1).
    Most, if not all, web application frameworks, including Struts and JavaServer
    Faces, utilize custom tags for this reason.


    Because Struts uses custom tags extensively, it is to your advantage to understand
    how to create and use custom tags.


    **Custom Tag Basics**


    Tags have a **prefix** defined on the JSP page (in the preceding example, the
    prefix is temp) and a **tag name** (in the example, F), which is fixed in the
    tag’s **TLD** (**T**ag **L**ibrary **D**escriptor) **file.**


    **Before they can be used on a JSP, a tag has to be declared at the start of the
    page. For example, a declaration for the <temp:F> tag might be as follows: **23**


