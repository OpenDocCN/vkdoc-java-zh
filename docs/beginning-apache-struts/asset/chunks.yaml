    ## Lab 19: Test Driving the DynaForms Plug-in


    In this lab session, you’ll take the DynaForms plug-in for a test drive.


    1. Copy the file `dynaformstest.zip` from the Source code section of the Apress
    website into your development directory and unzip it.

    2. Besides the usual Struts JAR files in the `lib` folder, you’ll see the `dynaforms.jar`
    file, containing the DynaForms plug-in classes.

    3. Take a look at the `struts-config.xml` file. Can you tell what file contains
    the new form bean declarations?

    4. The `dynaformstest` webapp models the hierarchy of Listing 19-2. Compile and
    deploy the `dynaformstest` webapp. Play with the webapp and ensure that you understand
    how it works. Consult the source code for the DynaForms plug-in in `DynaFormsPlugIn.zip`
    if necessary.


    ## Extra Credit Lab: Handling `<set-property>`


    In this lab, you’ll extend the DynaForms plug-in so that it handles `<set-property>`
    tags in form bean declarations. This tag is used to pass initialization parameters
    into custom `FormBeanConfig` or `FormPropertyConfig`.


    According to the Struts configuration file 1.2 DTD (available in your Struts distribution),
    there are two places `<set-property>` occurs within a form bean declaration:


    - As a child node of `<form-bean>`

    - As a child node of `<form-property>`


    In both cases, Struts assumes that there’s a `setXXX` function corresponding to
    each `<set-property>`, on the custom `FormBeanConfig` or `FormPropertyConfig`.
    This is similar to how Struts expects a `setXXX` function on the `PlugIn` implementation
    class for each `<set-property>` tag used in a plug-in declaration.


    Of course, such `setXXX` functions won’t exist on either `FormBeanConfig` or `FormPropertyConfig`;
    they are assumed to exist on custom *subclasses* of these two.


    By default, Struts will use the base config objects (`FormBeanConfig` or `FormPropertyConfig`)
    to hold form bean and form property configuration information. However, if you
    specify the `className` attribute in either tag, then the class referred to by
    `className` is used instead. For example, the information from


    ```xml

    <form-bean name="ordinaryFormBean" ...

    ```


    which *doesn’t* specify a `className` attribute, will be placed in the default
    `FormBeanConfig`. But the information from


    ```xml

    <form-bean name="specialFormBean"

    className="com.myco.myapp.MyFormBeanConfig" ...

    ```


    will be placed in the class `MyFormBeanConfig`, which *must* be a subclass of
    `FormBeanConfig`.


    So, this declaration


    ```xml

    <form-bean name="specialFormBean"

    className="com.myco.myapp.MyFormBeanConfig">

    <set-property property="message" value="Hello World"/>

    ...

    ```


    will cause Struts to instantiate `MyFormBeanConfig`, then call `setMessage("Hello
    World")` on this object.


    Struts uses the Digester framework to call the appropriate `setXXX` functions
    on the `MyFormBeanConfig` object. Unfortunately, since we use our own custom Bean
    object to store the form bean data, we cannot take this approach. Instead, I’ll
    outline a possible solution, which I encourage you to implement.


    ## Solution Outline


    1. Add `get/setClassName()` functions to both the `Bean` and `Property` classes.
    This allows Digester to store the `className` information.

    2. Add a `HashMap` called `_properties` to both the `Bean` and `Property` classes.
    This will store the property/value pairs from a `<set-property>`.

    3. Create a new class called `Parameter` in the DynaForms definitions directory.
    This class corresponds to a `<set-property>` tag, and should have getters and
    setters for `property` and `value`.

    4. Add identical `addParameter(Parameter)` functions to both the `Bean` and `Property`
    classes. This function should take the property/value data in a `Parameter` and
    put the data on the `_properties` HashMap.

    5. Obviously, we want the `<set-property>`s to be inherited, too, just like `<form-property>`s.
    To do this, amend the `merge()` function on the `Bean` class so that it copies
    a property/value pair from the parent bean into the child bean, *only if* the
    property doesn’t exist on the child bean.

    6. We need to get Digester to call the `addParameter()` functions of step 4 when
    it encounters a `<set-property>` tag. Amend `DefaultDynaFormsLoader`’s `readBeans()`
    function so that it calls Digester’s `addObjectCreate()` to create a `Parameter`
    object. We need to call this twice, for a `<set-property>` in each `<form-bean>`
    and in each `<form-property>`. We also need to call `addSetProperties()` twice,
    to populate the `Parameter` object with the property/value pair. Finally, we must
    call `addSetNext()` twice so that `addParameter` is called on `Bean` and `Property`.

    7. Change the protected access of `DynaFormsLoaderFactory.instantiate()` to public
    access. We’ll use this function to instantiate custom subclasses of `FormBeanConfig`
    and `FormPropertyConfig`.

    8. Modify `getFormBeanConfig()` on the `Bean` class and `getFormPropertyConfig()`
    on the `Property` class so that they return the correct `FormBeanConfig`/`FormPropertyConfig`
    subclass, based on the value of the `className` variable of step 1. Use the `DynaFormsLoaderFactory.instantiate()`
    function to do this.

    9. At this point, the returned config objects of step 8 are unconfigured, since
    we haven’t passed them the information from `<set-property>`s. You can use the
    Apache Commons Bean framework to do this. Like Digester, the JAR file (`commons-beanutils.jar`)
    comes bundled with Struts. The class you want to use is `org.apache.commons.beanutils.BeanUtils`.
    To populate the custom config subclass with the information from the `_properties`
    HashMap of step 2, you call `BeanUtils.populate(config, _properties)`, where `config`
    is the custom config subclass of step 8. Make this change to both `getFormBeanConfig()`
    on the `Bean` class and `getFormPropertyConfig()` on the `Property` class so that
    the returned config object is properly configured.


    As usual, compile and test your work with your own custom `FormBeanConfig` or
    `FormPropertyConfig` classes, each with (for example) a `message` property. (Remember
    to make appropriate `<set-property>` additions to your form bean declaration file.)
    You can get the message to be displayed when the `getMessage()` function is called.


