    **Adding Custom Validations**


    Although the set of validations on the Validator framework are quite comprehensive,
    you might want to run your own validations alongside those available in the Validator
    framework. There are two ways of doing this:


    • Pu t in a validate() function on your ValidatorForm subclass. You’d take this
    approach if the custom validation isn’t likely to be reused in other parts of
    your application.


    • Extend the Validator framework itself by creating a new validator. You’d take
    this route if there’s a strong case for reuse.


    In most cases, putting in a validate() function should suffice. Use the second
    alternative only after much thought, since validators should be *generic*, if
    only to the problem domain of your web application. Otherwise, you’d run into
    potential maintenance issues. Can you see why?


    We’ll take a look at both approaches in this section.


    **Implementing validate()**


    As I mentioned earlier, one way of implementing your own validations in addition
    to the standard ones is to implement the validate() function.


    We’ll take up the RegistrationForm class again (see Listing 15-4), and add custom
    validations to detect that the given password isn’t in a list of common words
    like “password”


