    **133**


    The advantage of Listing 11-4 is that you don’t have to hard-code the number of
    files to be uploaded into the ActionForm subclass. Notice also that setFile()
    only accepts a file of nonzero length.


    The downside of this approach is that there’s no guarantee Struts will call the
    setFile() function in either ascending or descending order of the index variable.
    This means that subsequent retrievals of the uploaded files might not be in the
    order specified by the user.


    The main drawback with both these simple techniques is that you have to know before-hand
    the number of files to be uploaded. Even with the second technique, the number
    of


    <html:file> tags had to be hard-coded in the JSP. There’s no way for a user to
    upload an arbitrary number of files. In some applications (e.g., a webmail app),
    this might be too restrictive. I’ll show you how to overcome this shortcoming
    next.


    **RESTRICTING THE SIZE OF UPLOADED FILES**


    In Chapter 9, I described how you can limit the maximum allowable file size to
    accept in a single upload.


    You use the <controller> tag of struts-config.xml to do this. For example:


    <controller maxFileSize="2M" />


    sets a limit of 2MB. You use a numeric value followed by K, M, or G to indicate
    a size in kilobytes, megabytes, or gigabytes.


    **Uploading Any Number of Files**


    Struts does not provide a one-stop solution for uploading an arbitrary number
    of files.


    However, it does provide adequate tools for you to “roll your own” solution. In
    this section, I’ll describe one solution to this interesting problem. (For expositional
    clarity, the solution I’ll describe will *not* preserve the order of the uploaded
    files, but it isn’t too difficult to fix this.) The heart of the solution is to
    have *two* submit buttons for the file upload form:


    • The first submit button is an Upload More Files button (or something equivalent,
    like a link). This button simply forces Struts to save the uploaded files, and
    then redisplays the input page with the list of files uploaded thus far. The values
    keyed in on other fields are also displayed. Because this round-trip may take
    time, it is usually advisable to give the user more than one input field to upload
    files.


    • The second button is the true submit button, which sends all the form data (including
    all uploaded files) for processing.


