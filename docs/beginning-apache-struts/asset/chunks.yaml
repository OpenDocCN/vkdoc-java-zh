- fmt: '# 确保我们达成共识


    首先，理解什么是 Web 应用程序可能会有所帮助。


    ## 什么是 Web 应用程序？


    在本书中，术语 *Web 应用程序*（或 *webapp*）指的是用户界面托管在 Web 浏览器中的任何应用程序。将 Web 应用程序视为位于一个连续谱上（见图
    1-1）是很有用的。在这个连续谱的一端是提供静态内容的 Web 应用程序，大多数网站就是这样的例子。在另一端则是行为与普通桌面应用程序完全相同的 Web 应用程序。`Struts`
    在构建位于该连续谱右半部分的 Web 应用程序时非常有用。


    **图 1-1.** *Web 应用程序框架的连续谱*


    因此，如果你计划构建一个几乎不需要用户输入或输入验证、不需要数据访问、不需要复杂业务规则，或者不需要国际化的 Web 应用程序，那么你可能不必使用 `Struts`。如果上述某些或全部需求是必要的，那么你的应用程序肯定会从使用
    `Struts` 中受益。


    > **注意** 我希望图 1-1 不会引起混淆。有很多维度可以用来衡量一个特定的框架（易用性、对特定功能的支持、成本、平台独立性等），而图 1-1 仅在一个维度上对这些技术进行了定位。


    我应该提醒你，连续谱的*最*右端也不是 `Struts` 能完全解决的。像 `JavaServer Faces`（`JSF`）和 `Ajax`（异步 JavaScript
    和 XML）这样的新兴技术试图解决这一不足。


    类似地，一些 Web 应用程序可能需要混合使用多种技术才能工作，而 `Struts` 是其中的基本组成部分。例如，使用 `Enterprise JavaBeans`（`EJB`）处理业务逻辑，或使用像
    `Velocity` 这样的模板引擎处理文本。不过，在大多数情况下，普通的 `Struts` 就能胜任。


    在本书中，我将概述一些与 `Struts` 配合使用的技术，其中包括 `Torque`、`Hibernate`（见附录 A）和 `JSF`（我将在第 18
    章中与 `Shale` 一起详细讲解）。


    ## `Struts` 能为你做什么


    `Craig McClanahan` 创建 `Struts` 是因为他被要求将一个面向美国的应用程序移植到欧洲。他需要为该应用程序提供 Web 界面，并使其能够轻松翻译成四种欧洲语言（关于这一点以及其他有趣的内容，请参阅本章末尾“有用链接”中的
    `Craig` 博客）。因此，不用说，国际化是 `Struts` 特别容易实现的功能。但 `Struts` 提供的远不止这些。


    `Struts` 为诸如用户输入验证、错误处理与报告以及流程控制等提供了广泛的基础设施，这些都是构建 Web 应用程序的核心工作。根据我的经验，构建 Web
    应用程序大约有 30%–50% 的时间（以及 100% 的繁琐工作）都花在这些活动上，因此大幅削减这部分时间确实是一件非常好的事情。


    `Struts` 允许具有不同技能的人——Web 设计师、系统分析师、系统工程师、数据库工程师——并行工作。`Struts` 通过强制实施“关注点分离”来实现这一点：执行不同功能的代码被分别打包，并赋予标准化的通信方式。这样，人们可以在不必过多担心其他部分的情况下维护或处理
    Web 应用程序的某些部分。


    你能明白为什么吗？


    即使你是一个独立的开发者，`Struts` 强制实施的关注点分离也会转化为模块化且因此更易于维护的代码。虽然这听起来像是你在 `Java` 中一直在做的事情，但
    `Struts` 帮助你在多种语言——`Java`、`JSP`、`JavaScript` 和 `SQL`——中实现这一点。'
  raw: 'Just to make sure we’re all on the same page, it might be helpful to understand
    what a web application is.


    **What Is a Web Application?**


    In this book, the term *web application*, or *webapp*, refers to any application
    whose user interface is hosted on a web browser. It is useful to think of webapps
    as falling somewhere on a continuum (see Figure 1-1). At one end of this continuum
    are webapps that deliver static content. Most websites are an example of this.
    On the other extreme are webapps that behave just like ordinary desktop applications.
    Struts is useful in building webapps on this right half of the continuum.


    **3**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C01.fm Page 4 Thursday, January 12, 2006 10:49 AM


    **4**


    C H A P T E R 1 ■ I N T R O D U C T I O N


    **Figure 1-1.** *The continuum of web application frameworks* So, if you’re planning
    to build a webapp requiring little or no user input or input validation, no data
    access, no complex business rules, or no need for internationalization, you probably
    don’t have to use Struts. If some or all of these are necessary, then your application
    would definitely benefit from using Struts.


    ■**Note** I hope Figure 1-1 isn’t cause for confusion. There are many dimensions
    on which to place a particular framework (ease of use, support for a specific
    feature, cost, platform independence, etc.), and Figure 1-1 places the technologies
    on just one dimension.


    I should warn you that the *extreme* right half of the continuum is not something
    Struts fully addresses either. Emerging technologies like JavaServer Faces (JSF)
    and Ajax (Asynchronous JavaScript and XML) attempt to address this deficiency.


    Similarly, some web applications might require a mix of technologies to work,
    with Struts as a basic ingredient. The use of Enterprise JavaBeans (EJBs) for
    processing of business logic, or a template engine like Velocity to process text,
    are examples. In most cases, though, plain ol’ Struts will do the job.


    In the course of this book, I’ll give you an overview of a number of technologies
    that work with Struts, among them Torque, Hibernate (in Appendix A), and JSF (which
    I’ll cover in detail in Chapter 18, along with Shale).


    **What Struts Can Do for You**


    Craig McClanahan created Struts because he was asked to port a U.S.-centric application
    to Europe. He had to give the application a web interface as well as allow it
    to be easily translated to four European languages (for this and other interesting
    bits, see Craig’s blog in “Useful Links” at the end of this chapter). So, needless
    to say, internationalization is something that Struts makes particularly easy
    to do. But Struts has much to offer beyond this.


    Struts provides an extensive infrastructure for things like user input validation,
    error handling and reporting, and flow control, all of which are the bread and
    butter of building webapps. In my experience, about 30–50 percent of the time
    (and 100 percent of the tedium)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C01.fm Page 5 Thursday, January 12, 2006 10:49 AM


    C H A P T E R 1 ■ I N T R O D U C T I O N


    **5**


    used to build webapps revolves around these activities, so trimming it down substantially
    is a Very Good Thing Indeed.


    Struts allows people with different skill sets—web designers, system analysts,
    system engineers, database engineers—to work in parallel. Struts does this by
    enforcing a “separation of concerns”: pieces of code that do different things
    are bundled separately and given standardized ways of communicating between themselves.
    This way, people can maintain or work on some parts of the webapp without having
    to worry too much about other parts.


    Can you see why?


    Even if you’re a lone developer, Struts’ enforcement of a separation of concerns
    translates into modularized and therefore more maintainable code. Although this
    might sound like something you’ve always been doing in Java, Struts helps you
    do it across a smorgasbord of languages—Java, JSP, JavaScript, and SQL.'
