    Doray_6048AppC.fm Page 401 Tuesday, January 17, 2006 4:46 PM


    A P P E N D I X C ■ S T R U T S T A G R E F E R E N C E


    **401**


    • action, module or src/srcKey, or page/pageKey: Used to locate the image to display.


    The first action/module pair specifies a form handler. The action, of course,
    must begin with a slash, and if you want to specify a module use the module attribute.
    src is the URL for the image. page is the module-relative URL for the image (and
    therefore, must begin with a slash). The key versions are message resource keys
    that point to the actual URL. They are very useful to display localized images.


    • border: Specifies the width of the border around the displayed image. The units
    are pixels.


    • locale/bundle: These are used to specify a different Locale object or message
    resource file. locale specifies a key that can be used to look up the Locale object
    stored on the current session. The bundle attribute is explained in more detail
    in the entry for <bean:message>.


    • align: Specifies the alignment of the image relative to surrounding text. This
    is a standard HTML attribute for the <img> element. Valid values are left, right,
    top, texttop, bottom, absbottom, middle, and absmiddle. Consult an HTML reference
    to understand what these settings do.


    • height/width: Specifies the height and width of the finally displayed image
    in pixels.


    The resizing of the image is done by the browser.


    • hspace/vspace: The amount of horizontal space (hspace) and vertical space (vspace)
    between the image and surrounding elements. The units are pixels.


    • imageName: Renders a name attribute in the <img> tag: name=<imageName>. Used
    for scripting.


    • ismap: This boolean attribute is the counterpart of the ismap attribute of HTML’s


    <img> tag. It’s used to indicate a server-side image map—which is used only for
    ancient web browsers that don’t understand the HTML <map> element. For this reason,
    you are extremely unlikely to use ismap.


    • usemap: The name of the HTML <map> element to use. This turns the image into
    a clickable image map. Refer to an HTML reference on how to create a <map>. The
    browser’s behavior when the user clicks the image is entirely processed on the
    client. No server-side processing is involved. If you want to pass mouse click
    posi-tions to server-side code, use <html:image> instead.


    [www.it-ebooks.info](http://www.it-ebooks.info/)'
