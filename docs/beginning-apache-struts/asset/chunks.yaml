    清单 14-5 和 14-6 共同展示了如何使用 Tiles 定义替代布局路径。共享属性是在 Tiles 定义文件中定义的，而特定于被调用 JSP 页面的属性则在该页面中定义。这样做是合理的，因为您可能希望固定页眉和页脚，但更改显示页面的标题和正文。


