- fmt: "• `src`/`srcKey`/`page`/`pageKey`: You use one of these to specify the image\
    \ to be used. `src` is the URL for the image. `page` is the module-relative URL\
    \ for the image (and therefore, must begin with a slash). The key versions are\
    \ message resource keys that point to the actual URL.\n\n• `border`: The width\
    \ of the border around the displayed image. The units are pixels.\n\n• `locale`:\
    \ Specifies a key that can be used to look up the `Locale` object stored on the\
    \ current session. This object is used to determine the value of any keys used.\
    \ If omitted, the default Struts message resource file is used.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**400**\n\nAPPENDIX C ■ STRUTS TAG REFERENCE\n\n## Examples\n\nThe code that\
    \ follows shows an image input field in your JSP:\n\n```jsp\n<html:form ...>\n\
    \  <html:image page=\"/myMapImage.jpg\" property=\"\" />\n</html:form>\n```\n\n\
    The `ActionForm` subclass might be:\n\n```java\npublic MapActionForm extends ActionForm\
    \ {\n  public final int UNKNOWN = Integer.MAX_VALUE;\n  protected int _x, _y;\n\
    \n  public int getX() { return _x; }\n  public void setX(int x) { _x = x; }\n\
    \  public int getY() { return _y; }\n  public void setY(int y) { _y = y; }\n\n\
    \  public void reset(ActionMapping mapping, HttpServletRequest request) {\n  \
    \  _x = _y = UNKNOWN;\n  }\n}\n```\n\n## Equivalents\n\nNone.\n\n## `img`\n\n\
    This tag renders an HTML `<img>`.\n\n### Usage Restrictions\n\nYou must specify\
    \ one of these attributes: `action`, `module` or `src`/`srcKey`, or `page`/`pageKey`.\n\
    \n### Attributes\n\nThe first three common attribute sets are accepted: `evt-attrs`,\
    \ `acc-attrs`, and `ren-attrs`.\n\nBesides these, there are a few attributes specific\
    \ to `img`:\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**401**\n\n\
    APPENDIX C ■ STRUTS TAG REFERENCE\n\n• `action`, `module` or `src`/`srcKey`, or\
    \ `page`/`pageKey`: Used to locate the image to display. The first `action`/`module`\
    \ pair specifies a form handler. The `action`, of course, must begin with a slash,\
    \ and if you want to specify a module use the `module` attribute. `src` is the\
    \ URL for the image. `page` is the module-relative URL for the image (and therefore,\
    \ must begin with a slash). The key versions are message resource keys that point\
    \ to the actual URL. They are very useful to display localized images.\n\n• `border`:\
    \ Specifies the width of the border around the displayed image. The units are\
    \ pixels.\n\n• `locale`/`bundle`: These are used to specify a different `Locale`\
    \ object or message resource file. `locale` specifies a key that can be used to\
    \ look up the `Locale` object stored on the current session. The `bundle` attribute\
    \ is explained in more detail in the entry for `<bean:message>`.\n\n• `align`:\
    \ Specifies the alignment of the image relative to surrounding text. This is a\
    \ standard HTML attribute for the `<img>` element. Valid values are `left`, `right`,\
    \ `top`, `texttop`, `bottom`, `absbottom`, `middle`, and `absmiddle`. Consult\
    \ an HTML reference to understand what these settings do.\n\n• `height`/`width`:\
    \ Specifies the height and width of the finally displayed image in pixels. The\
    \ resizing of the image is done by the browser.\n\n• `hspace`/`vspace`: The amount\
    \ of horizontal space (`hspace`) and vertical space (`vspace`) between the image\
    \ and surrounding elements. The units are pixels.\n\n• `imageName`: Renders a\
    \ `name` attribute in the `<img>` tag: `name=<imageName>`. Used for scripting.\n\
    \n• `ismap`: This boolean attribute is the counterpart of the `ismap` attribute\
    \ of HTML’s `<img>` tag. It’s used to indicate a server-side image map—which is\
    \ used only for ancient web browsers that don’t understand the HTML `<map>` element.\
    \ For this reason, you are extremely unlikely to use `ismap`.\n\n• `usemap`: The\
