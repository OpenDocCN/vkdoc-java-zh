    \n**[www.it-ebooks.info](http://www.it-ebooks.info/)**\n\nDoray_6048C04.fm Page\
    \ 25 Monday, December 12, 2005 3:47 PM\n\n第4章 自定义标签\n\n**25**\n\n**`web.xml`**文件必须包含`uri`属性所指示的标签库的实际位置。在这种情况下，`web.xml`中的相关信息在`<taglib>`标签中给出（见清单4-2）。**\n\
    \n******清单4-2.** *`web.xml`中的标签库部分*\n\n```\n<taglib>\n    <taglib-uri>/tags/struts-bean</taglib-uri>\n\
    \    <taglib-location>/WEB-INF/struts-bean.tld</taglib-location>\n</taglib>\n\
    ```\n\n从清单4-2中需要注意的主要几点是：\n\n- `taglib-uri`**的主体必须与JSP文件中给出的标签库声明的`uri`属性匹配。**\n\
