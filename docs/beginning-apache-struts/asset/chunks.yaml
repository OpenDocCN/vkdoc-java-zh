- fmt: "# Appendix C: Struts Tag Reference\n\n## Attributes\n\n- `property`: The key\
    \ with which to retrieve the error messages. Note that there might be more than\
    \ one error message saved under the same property. If `property` isn’t specified,\
    \ then all error messages are displayed. This trick is very useful for debugging.\n\
    - `locale`/`bundle`: These attributes are used to specify a different locale object\
    \ or message resource file. The `locale` specifies a key that can be used to look\
    \ up the `Locale` object stored on the current session. The `bundle` attribute\
    \ is explained in more detail in the entry for `<bean:message>`. You’d use these\
    \ attributes to specify a locale different from the current user’s locale or a\
    \ message resource file different from the default one.\n- `name`: The name of\
    \ the object that holds error messages. Do not specify this attribute if you wish\
    \ to use Struts’ default error-reporting mechanism.\n- `prefix`/`suffix`: Both\
    \ are keys to text that will be rendered before and after each individual error\
    \ message. For example, you might set:\n\n```\nmyapp.errors.prefix=<font color=red>\n\
    myapp.errors.suffix=</font>\n```\n\nand you would use these attributes like this:\n\
    \n```\n<html:errors property=\"email\"\n             prefix=\"myapp.errors.prefix\"\
    \n             suffix=\"myapp.errors.suffix\" />\n```\n\nand the error message\
    \ would be displayed as:\n\n```\n<font color=red>Wrong email format</font>\n```\n\
    \n- `header`/`footer`: These attributes are similar to `prefix`/`suffix`, but\
    \ they apply to the start and end of a list of error messages. This happens when\
    \ more than one error message is to be displayed.\n\n## Examples\n\nUsually, you’d\
    \ place an `<html:errors>` near an input element like so:\n\n```\n<html:text name=\"\
    contact\" property=\"postcode\" />\n<html:errors property=\"postcode\"/>\n```\n\
    \n## Equivalents\n\nThe `<s:errors>` tag from the Struts-Faces integration library\
    \ is an equivalent.\n\n---\n\n## `file`\n\nThis tag allows easy file uploading.\n\
    \n> **Note:** Chapter 11 contains a much fuller exposition on this useful tag.\n\
    \n### Usage Restrictions\n\nThe `property` attribute is required. It must be a\
    \ child tag of `<html:form>`.\n\n### Attributes\n\nAll common attribute sets (`evt-attrs`,\
    \ `acc-attrs`, `ren-attrs`, `struts-attrs`, `init-attr`, and the new `err-attrs`)\
    \ are accepted, and have their usual meanings.\n\nBesides these, there are a few\
    \ attributes specific to `file`:\n\n- `accept`: A comma-delimited list of “acceptable”\
    \ file extensions. These are displayed by the browser. Unfortunately, most browsers\
    \ ignore this information.\n- `size`: The length of the displayed field. If omitted,\
    \ the decision is left to the browser.\n- `maxlength`: The maximum number of characters\
    \ to accept. The default is to allow an unlimited number of characters. Most web\
    \ browsers ignore this attribute.\n\n### Examples\n\nPlease refer to Chapter 11\
    \ for examples.\n\n### Equivalents\n\nThere is no pure-JSF equivalent, but MyFaces\
    \ sports an extension called `<x:inputFileUpload>` that does the trick. The mechanism\
    \ used to access the uploaded file is very similar to Struts’ `FormFile` (it’s\
    \ called `UploadedFile` instead). However, this leaves you in a bit of a bind\
    \ because the current Struts-Faces integration library (1.0) doesn’t work with\
    \ MyFaces.\n\n---\n\n## `form`\n\nRepresents an HTML form. It is also the mandatory\
    \ parent element for many input tags.\n\n### Usage Restrictions\n\nThe `action`\
    \ attribute is required.\n\n### Attributes\n\nBesides the `ren-attrs` attributes,\
    \ `form` accepts the following attributes:\n\n- `action`: The name of the form\
    \ handler that handles processing for this form’s data. This attribute is required.\n\
    - `method`: The HTTP submission for this form—either `POST` or `GET`, with `POST`\
    \ being the default."
