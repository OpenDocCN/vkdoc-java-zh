    confident of the details before proceeding.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C04.fm Page 26 Monday, December 12, 2005 3:47 PM


    **26**


    C H A P T E R 4 ■ C U S T O M T A G S


    **Figure 4-1.** *Summarized processing flow of a custom tag* **The Java Handler
    Classes**


    The actual work of transforming the custom tag’s body and attributes into HTML
    code is done by Java handler classes that you must implement.


    Your handler classes would subclass one of two base classes, depending on the
    requirements of your tag.


    If your custom tag has **no body**, then you’d subclass javax.servlet.jsp.tagext.


    TagSupport. This base handler class represents custom tags having no body, but
    possibly having attributes.


    If your custom class has a body, then you’d have to subclass javax.servlet.jsp.


    tagext.BodyTagSupport instead. Of course, using BodyTagSupport doesn’t mean your
    tags must have a body when they are used on JSPs. What it does mean is that you
    have to implement an extra handler function to process the tag’s body.


    To keep things simple, in what follows we will focus on BodyTagSupport.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C04.fm Page 27 Monday, December 12, 2005 3:47 PM


    C H A P T E R 4 ■ C U S T O M T A G S


    **27**


    ■**Note** I’ve bent the truth a little here. You can subclass either BodyTagSupport
    or TagSupport, regardless of whether or not your custom tag has a body. It’s just
    that BodyTagSupport has extra facilities to allow you to conveniently read your
    tag’s body. TagSupport does not have this ability. But this convenience comes
    at a price, since the servlet container has to do extra work and use more memory.
    This explains why you should subclass TagSupport if your custom tag doesn’t have
    a body, and use BodyTagSupport only if necessary.


    That extra function is doAfterBody(), which is called after the servlet container
    reads in the tag’s body. This function is where you read the tag’s body, do all
    necessary processing, and display the output. The tag must return an integer flag
    called EVAL_PAGE, defined for you on BodyTagSupport. This flag tells the servlet
    container to go ahead and process the rest of the page.


    The other requirement your handler classes must satisfy is that they must have
    additional getXXX and setXXX functions corresponding to attributes supported by
    your custom tag.


    ■**Note** In other words, in addition to being a subclass of either BodyTagSupport
    or TagSupport, your handler class needs to be a JavaBean, with properties corresponding
    to attributes supported by your custom tag.


    For example, in Listing 4-1, by looking at the <bean:write> you can infer that
    the corresponding Java handler class has the functions getProperty() and setProperty().
    Listing 4-3


    illustrates this.


    **Listing 4-3.** *Part of the Java Handler Class for the <bean:write> Tag* import
    javax.servlet.jsp.tagext.*;


    public class BeanWriteTagHandler extends TagSupport{


    protected String _property = null;


    public String getProperty(){


    return _property;


    }


    public void setProperty(String property){


    _property = property;


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C04.fm Page 28 Monday, December 12, 2005 3:47 PM


    **28**


    C H A P T E R 4 ■ C U S T O M T A G S


    //other code omitted.


    ...


    }


    When the JSP that contains your tag loads, the servlet container calls all the
    necessary setXXX() functions so that attributes of your tag are accessible to
    your tag’s Java code. Using the <bean:write> tag as an example again, at runtime,
    you could call the getProperty() function or just look at _property to read the
    value of the property attribute of the


    <bean:write> tag.


    **Helper Classes**


    In order for your Java handler classes to do anything useful, such as reading
    the contents of a tag’s body or writing your tag’s output, there are a couple
    of helper classes you need to know about.'
