    ## JNDI 集成\n\nJNDI（Java 命名和目录接口）是 Java 企业版的一个特性，用于获取在 `web.xml` 或应用服务器配置设置中声明的资源的句柄。\n\
    \n对 JNDI 的详细讨论超出了本书的范围。然而，Shale 网站提供了一些简单的示例，我们将在此描述其中的一些变体。\n\nJNDI 涉及*环境条目*的概念，这些条目只是\
    \ `web.xml` 中的变量声明。例如，假设你的 Web 应用需要在每个页面上显示公司徽标。你可以使用消息资源来存储 URL，但另一种方法是使用环境条目（我不推荐这种方法，仅作为示例说明）。\n\
    \n首先，在 `web.xml` 中声明环境条目：\n\n```\n<env-entry>\n    <description>URL to company\
    \ logo GIF</description>\n    <env-entry-name>logo</env-entry-name>\n```"
