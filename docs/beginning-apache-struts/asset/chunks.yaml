- fmt: '`text` represents a one-line text input field. `password` represents a password
    field. The only difference between the two is that with `<html:password>`, the
    character keyed in by the user is not displayed; only asterisks or some other
    placeholder are displayed.


    ## Usage Restrictions


    The `property` attribute is required. It must be a child tag of `<html:form>`.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048AppC.fm Page 419 Tuesday, January 17, 2006 4:46 PM


    A P P E N D I X C ■ S T R U T S T A G R E F E R E N C E


    **419**


    ## Attributes


    All common attribute sets (`evt-attrs`, `acc-attrs`, `ren-attrs`, `struts-attrs`,
    `init-attr`, and the new `err-attrs`) are accepted, and have their usual meanings.


    Besides these, there are a few attributes specific to both `text` and `password`:


    - `size`: The length of the displayed field. If omitted, the decision is left
    to the browser.

    - `readonly`: If `true`, the text field may not be edited.

    - `maxlength`: Maximum number of characters to accept. The default is to allow
    an unlimited number of characters.


    The `password` tag has an additional boolean attribute called `redisplay`, which
    defaults to `true`. This causes the previously keyed password (when a form is
    redisplayed because of validation errors) to appear as asterisks. Unfortunately,
    the actual password is also embedded in the HTML for that page. You should set
    `redisplay=false` to prevent passwords being harvested from cached pages.


    ## Examples


    The code


    ```

    <html:text property="email" />

    ```


    specifies a text input field for the property called `email` on the current form
    bean.


    ```

    <html:password property="pwd" />

    ```


    specifies a password field.


    ## Equivalents


    JSF’s `<h:inputText>` is an equivalent for `<html:text>`, but you need to enclose
    it within the Struts-Faces `<s:form>` tag so that the associated form bean is
    populated with the submitted value:


    ```

    <s:form ...

    <h:inputText id="email" binding="#{MyFormBean.email}" />

    <h:inputSecret id="pwd" binding="#{MyFormBean.pwd}" />

    ...

    </s:form>

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


