    • `paramName`、`paramProperty`、`paramScope` 和 `paramId`：前三个属性用于在当前请求或会话中定位单个对象。如果此对象不是数组，则调用其
    `toString()` 方法，并将其作为单个参数值。如果对象是数组，则创建多个名称相同但值不同的参数。参数的名称由 `paramId` 给出。


    其余属性是 `useLocalEncoding` 和 `transaction`。如果 `useLocalEncoding` 设置为 `true`，则告诉
    Struts 使用当前 `HttpServletResponse` 的任何字符编码。`transaction` 属性需要一些详细说明。


    事务令牌


    Struts 有一种机制可以防止表单被多次提交。如果用户快速连续两次单击表单的提交按钮，就可能发生这种情况。通常，Struts 会将其视为两次独立的提交。这当然是一个错误。此问题的标准解决方案是使用*事务令牌*。


    你必须使用两个 `Action` 子类。第一个 `Action` 子类在请求表单时被激活。它在请求和会话上都放置一个唯一的字符串。这个唯一的字符串就是事务令牌。`Action`
    具有函数


    `saveToken(HttpServletRequest request)`

