- fmt: "`Login.do`和`Logoff.do`都与`ForwardAction`关联，后者会转发到表单处理器的`parameter`属性所指定的页面。对于`ForwardAction`来说，`parameter`属性是**必需的**。除此之外，`ForwardAction`不执行任何处理。\n\
    \n因此，从清单14-19的声明中可以明显看出，`Login.do`和`Logoff.do`除了立即重新显示输入页面外，什么也不做！\n\n这看起来可能有点奇怪。为什么提交的页面会立即重新显示，而显然没有经过任何处理？答案当然是，输入页面（清单14-14）包含一个嵌入的`<tiles:insert>`。当输入页面重新显示时，嵌入的Tiles组件也会被更新。在此更新过程中，关联的Tiles控制器会被调用，表单数据才会被实际处理。\n\
    \n从清单14-14中我们看到，被调用的定义是`.login`。该定义的声明如下：\n\n```\n<definition name=\".login\"\
    \ path=\"/LoginController.do\" />\n```\n\n因此，Tiles控制器就是名为`LoginController.do`的表单处理器：\n\
    \n```\n<action path=\"/LoginController\"\n      type=\"net.thinksquared.login.struts.UserLoginAction\"\
    \n      name=\"LogonForm\"\n      scope=\"session\"\n      **validate=\"false\"\
    ** >\n   <forward name=\"success\" path=\"/userlogin/success.jsp\"/>\n   <forward\
    \ name=\"new-user\" path=\"/userlogin/newuser.jsp\"/>\n   <forward name=\"regular\"\
    \ path=\"/userlogin/regular.jsp\"/>\n</action>\n```\n\n`UserLoginAction`是`TilesAction`的子类，我稍后会进行描述。`LoginController`本身**不**执行简单的验证（`validate=\"\
    false\"`），这不应引起任何疑问，因为简单的验证已经由页面的主表单处理器`Login.do`完成了。\n\n所有表单处理器——`Login.do`、`Logoff.do`和`LoginController.do`——都设置为会话作用域。这是合理的，因为我们希望登录信息在用户与系统交互期间持续存在。这样做还有一个额外的好处：如果**另一个**JSP页面嵌入了Login组件，将会显示正确的视图。用户只需登录一次，所有其他包含Login组件的页面也会正确地反映这一点。\n\
    \n最后，我们来看`UserLoginAction`类（见清单14-20），用户数据的处理和流程控制都在这里完成。\n\n**清单14-20.** *UserLoginAction.java*\n\
    \n```java\npackage net.thinksquared.login.struts;\n\nimport java.io.IOException;\n\
    import javax.servlet.*;\nimport javax.servlet.http.*;\nimport org.apache.struts.tiles.*;\n\
    import org.apache.struts.tiles.actions.*;\nimport org.apache.struts.action.*;\n\
    \npublic final class UserLoginAction extends TilesAction{\n   public ActionForward\
    \ execute(ComponentContext ctx,\n                                 ActionMapping\
    \ mapping,\n                                 ActionForm form,\n              \
    \                   HttpServletRequest request,\n                            \
    \     HttpServletResponse response)\n         throws IOException,ServletException{\n\
    \n      LogonForm lForm = (LogonForm) form;\n      String cmd = request.getParameter(\"\
    command\");\n      if(cmd != null){\n         return mapping.findForward(\"new-user\"\
    );\n      }\n      if(lForm.getStatus() == LogonForm.UNDEFINED){\n         return\
    \ mapping.findForward(\"regular\");\n      }\n      if(lForm.getStatus() == LogonForm.LOGGED_ON){\n\
    \         return mapping.findForward(\"success\");\n      }\n      if(lForm.getStatus()\
    \ == LogonForm.LOG_OFF){\n         System.out.println(\"Logging off \" + lForm.getUserid());\n\
    \         lForm.clear();\n         return mapping.findForward(\"regular\");\n\
    \      }\n      if(lForm.getStatus() == LogonForm.NEW_USER){\n         if(lForm.hasErrors()){\n\
    \            return mapping.findForward(\"new-user\");\n         }else{\n    \
    \        System.out.println(\"Creating New User \" + lForm.getUserid());\n   \
    \         return mapping.findForward(\"success\");\n         }\n      }\n    \
    \  if(lForm.getStatus() == LogonForm.REGULAR){\n         if(lForm.hasErrors()){\n\
    \            return mapping.findForward(\"regular\");\n         }else{\n     \
    \       System.out.println(\"Logging on regular user \" +\n                  lForm.getUserid());\n\
    \            return mapping.findForward(\"success\");\n         }\n      }\n```"
  raw: 'Both Login.do and Logoff.do are associated with ForwardAction, which forwards
    to the page specified in the parameter attribute of the form handler. This parameter
    attribute is *required* for ForwardAction. No processing is done by ForwardAction
    apart from this.


    So, from the declarations in Listing 14-19, it is apparent that both Login.do
    and Logoff.do do nothing but immediately redisplay the input page!


    This might seem a little strange. Why immediately redisplay a submitted page with
    apparently no processing? The answer, of course, is that the input page (Listing
    14-14) contains an embedded Login <tiles:insert>. When the input page is redisplayed,
    the embedded Tiles component is updated too. In this updating, the associated
    Tiles controller is called, and the form data is actually processed.


    We see from Listing 14-14 that the called definition is .login. The declaration
    for this definition is


    <definition name=".login" path="/LoginController.do" /> So, the Tiles controller
    is the form handler called LoginController.do:


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C14.fm Page 183 Tuesday, January 24, 2006 10:13 AM


    C H A P T E R 1 4 ■ T I L E S


    **183**


    <action path="/LoginController"


    type="net.thinksquared.login.struts.UserLoginAction"


    name="LogonForm"


    scope="session"


    **validate="false"** >


    <forward name="success" path="/userlogin/success.jsp"/>


    <forward name="new-user" path="/userlogin/newuser.jsp"/>


    <forward name="regular" path="/userlogin/regular.jsp"/>


    </action>


    UserLoginAction is a TilesAction subclass, which I’ll describe shortly. LoginController
    itself performs *no* simple validation (validate="false"), which should not raise
    any eyebrows, since simple validation has been done by the main Login.do form
    handler for the page.


    All the form handlers—Login.do, Logoff.do, and LoginController.do—are all set
    for session scope. This makes sense because we want the login information to persist
    for as long as the user interacts with the system. The added bonus to this is
    that if *another* JSP


    page embeds the Login component, the correct view will be displayed. The user
    need only log on once, and all other pages with the Login component will correctly
    reflect this too.


    Lastly, we come to the UserLoginAction class (see Listing 14-20), where the processing
    of user data and flow control is done.


    **Listing 14-20.** *UserLoginAction.java*


