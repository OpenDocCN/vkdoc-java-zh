- fmt: "`<load-on-startup>1</load-on-startup>`\n\n`</servlet>`\n\nYou need to pay\
    \ special attention to the `<load-on-startup>` value; it has to be the lowest\
    \ one declared. If you have other servlets declared, then ensure that their `<load-on-startup>`\
    \ values are greater than the one associated for `FacesServlet`. This ensures\
    \ that `FacesServlet` gets initialized first.\n\n**2.** Put in the standard JSF\
    \ servlet mapping. In `web.xml`, put in the following servlet mapping:\n\n```\n\
    <servlet-mapping>\n    <servlet-name>faces</servlet-name>\n    <url-pattern>*.faces</url-pattern>\n\
    </servlet-mapping>\n```\n\nThis tells Tomcat that the page URLs ending with `.faces`\
    \ should be shuttled to the servlet called `faces`, which as you can see from\
    \ the earlier `<servlet>` declaration is `FacesServlet`.\n\n**3.** Put in a special\
    \ Struts Controller. In your `struts-config.xml` file, put in the following `<controller>`\
    \ element (just *before* the `<message-resource>` tag):\n\n```\n<controller>\n\
    \    <set-property property=\"processorClass\"\n        value=\"org.apache.struts.faces.application.FacesRequestProcessor\"\
    />\n</controller>\n```\n\n> **Note** The registration webapp doesn’t use Tiles,\
    \ so we’ve used the controller shown in the last step. However, if your application\
    \ *does* use Tiles, use `FacesTilesRequestProcessor` instead.\n\n**Step 4: Migrate\
    \ Your Struts JSP Pages**\n\nThe Struts-Faces TLD file contains tags that you\
    \ can use in place of the Struts HTML and Bean tag libraries. You are expected\
    \ to use JSTL instead of the Struts Logic tag library and nested properties syntax\
    \ instead of the Nested tag library. The preceding comments apply to the Struts-EL\
    \ tags as well. You should continue to use the Tiles tag library as it is, though.\n\
    \nIf you have an existing Struts application, you can migrate to JSF *incrementally*—you\
    \ don’t have to do it all in one go. If you have to migrate an existing app or\
    \ you’re creating a new one, there are a few things you need to do for each page.\n\
    \nFirst, declare the JSTL, JSF, and Struts-Faces taglibs in your JSPs. These must\
    \ be in the following order:\n\n```\n<%@ taglib prefix=\"c\" uri=\"http://java.sun.com/jstl/core\"\
    \ %>\n<%@ taglib prefix=\"f\" uri=\"http://java.sun.com/jsf/core\" %>\n<%@ taglib\
