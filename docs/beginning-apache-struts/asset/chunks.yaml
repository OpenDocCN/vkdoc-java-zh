    20) is a ground-up rework of Struts around the JSF specification. It is certainly
    possible that some of the tags from Shale will make their way into Struts in the
    future.


    **107**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C10.fm Page 108 Tuesday, January 24, 2006 10:12 AM


    **108**


    C H A P T E R 1 0 ■ M O R E T A G S


    This chapter covers two more Struts tag libraries, and some of the relevant overlaps
    between Struts and JSTL. We’ll also look at an effort to get Struts tags to accept
    EL expressions.


    We’ll describe JSF and Shale in Chapter 20.


    But first, here are a couple of guiding lights to lead the way.


    **Best Practices**


    It’s easy to get lost in the morass of tags and tag libraries, so I’d like you
    to consider two rules of thumb I believe are useful in deciding which tag library
    to go with when you have a choice:


    • **Beware the scriptlet**: Scriptlets are not inherently “evil,” but if you find
    yourself using them to overcome deficiencies in a tag, it’s time to consider scouting
    for an alternative.


    • **Use “custom-built generic solutions”** (pardon the oxymoron): Use generic
    solutions like JSTL whenever possible.


    I hope the rationale behind these two heuristics is obvious. Custom tags are there
    to obviate the need to use scriptlets. So, if you find yourself having to use
    scriptlets, the custom tags you’re using aren’t doing their job well enough.


    **The 2 + 1 Remaining Struts Libraries**


    In Chapter 8, you saw how to use the HTML and Bean tag libraries. There are three
    other Struts tag libraries: the **Logic**, **Nested**, and **Tiles** tag libraries.


    ■**Note** In older versions of Struts, prior to 1.2, you might come across a “template”
    tag library. The Tiles library supersedes this older “template” tag library.


    In this chapter, we’ll only cover the Logic and Nested tag libraries. The Tiles
    tags warrant an entire chapter of their own (Chapter 14).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C10.fm Page 109 Tuesday, January 24, 2006 10:12 AM


    C H A P T E R 1 0 ■ M O R E T A G S


    **109**


    **The Logic Tag Library**


    The Logic library has tags for


    • **Iteration**: The iterate tag


    • **Conditional processing**: The equal, present, match, empty, notEqual, notPresent,
    notMatch, notEmpty, messagesNotPresent, messagesPresent, lessThan, lessEqual,
    greaterThan, and greaterEqual tags


    • **Flow control**: The redirect and forward tags


    ■**Note** All of these tags, apart from the ones for flow control, have counterparts
    in JSTL, which we will cover later in this chapter. You should use the JSTL versions
    whenever possible.


    Let’s tackle these three classes of tags next.


    **Iteration**


    The <logic:iterate> tag can be used to iterate over collections, enumerations,
    arrays, or iterators. We’ll refer to any of these as an “iteratable” object. To
    use the <logic:iterate> tag, you have to


    **1\. Create the iteratable object**: This is done in your Action subclass, since
    this is Controller code. Never forget the MVC.


    **2\. Place the iteratable object on the request**: Recall that in your Action’s
    execute() function, you have a reference to the request object. You can place
    objects on this request object, or on its associated session object, giving the
    object a *name*.


    **3\. Forward to the JSP page that contains the** <logic:iterate> **tag**: **The
    JSP page called by the Action would be able to access these objects by the name
    you gave them.**


    **These three steps are the same or similar even if you’re using JSTL for iteration,
    so be sure to study carefully the following code listings that illustrate these
    steps.'
