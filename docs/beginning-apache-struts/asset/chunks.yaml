- fmt: 'Table 20-2 contains a few common JSF replacements you can use.


    **Table 20-2.** *Struts Tags and Their JSF Equivalents*


    | **Struts Tag Name** | **JSF Replacement** |

    | --- | --- |

    | `<html:text property="myProp">` | `<h:inputText id="myprop" value="#{myFormBean.myProp}">`
    |

    | `<html:password ...>` | `<h:inputSecret ...>` |

    | `<html:hidden ...>` | `<h:inputHidden ...>` |

    | `<html:submit>` | `<h:commandButton id="submit" type="SUBMIT"...>` |

    | `<html:reset>` | `<h:commandButton id="reset" type="RESET"...>` |

    | `<html:cancel>` | `<h:commandButton id="cancel" type="SUBMIT"...>` |


    In your migration efforts, you’ll have to follow standard JSF rules, like putting
    in the enclosing `<f:view>` tag. If you’re migrating Struts-EL tags, be sure to
    replace `${...}` with the JSF EL’s `#{...}`. The same applies, of course, to the
    Struts-Faces tags, since they are just JSF extensions.


    Now, change the form handler names. In your `<s:form>`s, you need to change the
    form handler name from `*.do` to the path declared in `struts-config.xml`. For
    example, if you had


    ```

    <html:form action="MyFormHandler.do" ...

    ```


    this would now be


    ```

    <s:form action="/MyFormHandler" ...

    ```


    Note the leading slash.


    Finally, make the necessary changes to `.\registration\web\index.jsp`. You’ll
    probably have to refer to the JSF examples and notes from the previous section.


    **Step 5: Migrate the `<forward>`s and Inputs**


    Lastly, you need to migrate the `<forward>`s that point to the JSPs you’ve migrated.


    > **Caution** Please pay careful attention here—*only* change a `<forward>` if
    you’ve migrated the JSP it points to!


    For each such forward, change the `.jsp` suffix of the target page to `.faces`.
    For example, change


    ```

    <forward name="login" path="/login.jsp" />

    ```


    to


    ```

    <forward name="login" path="/login.faces" />

    ```


    Do *not* amend the actual extensions of the corresponding JSP pages! Similarly,
    you need to change declarations of all affected input attributes on your `<action-mapping>`s
    to use the `.faces` extension. For example, you’d change


    ```

    <action .... input="/login.jsp" ...

    ```


    to


    ```

    <action .... input="/login.faces" ...

    ```


    You should only change the inputs that point to migrated pages.


    **Step 6: Make Entry Points Forward to `*.faces`**


    All entry points to your webapp must forward to `*.faces` if that page was migrated
    to JSF.


    For example, suppose the start page for your app was `registration.jsp`, which
    contained Struts tags. You then migrate this page to JSF. You can’t call the page
    directly (refer to the sidebar “Faces Requests” in the JSF introduction section
    earlier for details) from the browser.


    You need to call it indirectly from another page, say `index.jsp`. This page would
    contain a forward to `registration.faces`:


    ```

    <jsp:forward page="registration.faces" />

    ```


    Note that there is no leading slash. Make the appropriate change for the Registration
    webapp.


    **Step 7: Amend Actions if Necessary**


    Throughout this book, we’ve asked you to use `ActionMessages` if you want to report
    complex validation errors in your `Action` subclasses—and rightly so, since the
    old `ActionErrors` class has been deprecated.


    Unfortunately, the Struts-Faces integration library (version 1.0) only works with
    this deprecated `ActionErrors` class! If you use the kosher `ActionMessages` class,
    a `ClassCastException` is thrown when you redisplay a page after a complex validation
    failure.


    I’m sure that this will be remedied in the next version of the library, but in
    this lab, you’re stuck with changing the `ActionMessages` instance in `RegistrationAction`
    to `ActionErrors`.


    Do this now, then compile and deploy your app. You should be able to register
    a user.


    Test that all simple and complex validations work. If you can’t get everything
    to work, ensure that you haven’t made the following mistakes:'
