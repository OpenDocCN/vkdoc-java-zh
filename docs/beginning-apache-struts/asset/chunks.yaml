    第 20 章 ■ JAVASERVER FACES 与 STRUTS SHALE


    **309**


    **STRUTS TI 与 STRUTS OVERDRIVE**


    Struts Shale 并非唯一的“新式 Struts”——“Struts Ti”和“Struts OverDrive”也都在开发中。


    Struts Ti（Titanium 的简称）是经典 Struts 与 WebWork 的融合。WebWork 是一个开源 Web 应用框架，通常被认为在技术上比
    Struts 更可靠，但又与 Struts 足够相似，因此可以合并。在撰写本文时，关于 Struts OverDrive 的信息很少，但我猜测它是使用 Nexus
    框架进行视图/控制器通信的 Struts。Nexus 框架处理文本格式化、本地化和类型转换。这个框架实际上适用于许多不同的 Web 应用框架（Spring、Struts
    等）和表示层（JSP、ASP.NET 等）。OverDrive 是赋予利用 Nexus 框架的应用程序的品牌名称。有关 Ti 和 OverDrive 的详细信息，请参阅“有用链接”。


    与 Shale 一样，这些项目与你从本书中了解的 Struts 相比，差异很大。


    以我（诚然是持怀疑态度的）观点来看，它们加上“Struts”前缀是为了利用庞大的现有 Struts 用户群。


    但我担心这是一个错误。拆分品牌名称只有在每个拆分都针对明确、可识别的细分市场时才有意义。微软的桌面/服务器产品就是一个很好的例子。每个产品在“Windows”这个总品牌下都针对一个明显不同的细分市场。但在
    Web 应用框架的情况下，并没有明显的多重细分市场，因此拥有*四个*都叫“Struts”的框架只会造成混乱，实际上是在稀释 Struts 品牌。我相信大多数
    CIO 会坚持使用久经考验的经典 Struts，或者如果他们打算迁移，会考虑更成熟的框架，如 Spring 或基于标准的 JSF。很少有人会去探索 Struts
    X。事实上，他们更有可能选择原始的 WebWork，而不是它与 Struts 的融合体（即 Struts Ti）。现在，他们很可能两者都不会考虑。


    在我看来，能够与 Struts 1.*x* 保持向后兼容，同时随着时间的推移引入重大改进的项目，才能赢得胜利——或者更确切地说，赢得用户。在撰写本文时，这匹获胜的黑马看起来像是
    Struts 1.*x*。如果 Struts-Faces 集成库（本章后面会介绍）得到更多开发，这种可能性还会增加。Shale 可能会紧随其后，因为它提供了卓越的功能。


    Shale 有三个主要设计目标：


    • **将 JSF 扩展到视图层之外**：Shale 为 JSF 规范未能很好解决的领域（例如验证用户输入的实际操作）提供支持。回想一下，JSF 主要关注视图层，因此
    Shale 必须做相当多的工作，才能使 JSF 被习惯于 Validator 框架、动态表单和 Tiles 这些便利功能的长期 Struts 开发者所接受。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


