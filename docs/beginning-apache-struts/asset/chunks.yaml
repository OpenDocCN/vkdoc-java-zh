- fmt: '# Shale Overview


    In short, it’s quite easy to use `JSF` to build webapps, but it’s more difficult
    to make significant extensions to it. And among the possible ways to extend `JSF`,
    it’s probably easiest to make extensions to the UI components and validators.


    Unlike `JSF`, which is a specification, `Shale` is actual software that you can
    use immediately.


    `Shale` is touted to be a complete reworking of `Struts` (which we’ll sometimes
    refer to as “classic” `Struts` for clarity). The reworking has been quite thorough,
    and it’s unlikely that a `Struts` developer will recognize it as `Struts`!


    `Shale` is based on `JSF`. By this, I mean `JSF` is to `Shale` what `JSP` is to
    `Struts`. There would be no `Shale` without `JSF`. You need an implementation
    of `JSF` (like `MyFaces`) in order for `Shale` to work. I don’t mean to belabor
    the point, but it is crucial that you understand this.


    ## Struts Ti and Struts OverDrive


    `Struts Shale` isn’t the only “nouveau `Struts`” around—“`Struts Ti`” and “`Struts
    OverDrive`” are both under development.


    `Struts Ti` (short for Titanium) is a merging of classic `Struts` and `WebWork`.
    `WebWork` is an open source web application framework, generally viewed as being
    technically sounder than `Struts`, yet similar enough to it for a merging to be
    possible. At the time of this writing, information on `Struts OverDrive` is scarce,
    but I’m guessing that it’s `Struts` using the `Nexus` framework for View/Controller
    communication. The `Nexus` framework handles text formatting, localization, and
    type conversions. This framework actually applies to many different webapp frameworks
    (`Spring`, `Struts`, etc.) and presentation layers (`JSP`, `ASP.NET`, etc.). `OverDrive`
    is the brand name given to applications that utilize the `Nexus` framework. Refer
    to “Useful Links” for details on both `Ti` and `OverDrive`.


    As with `Shale`, these projects are quite different compared to `Struts` as you
    know it from this book.


    In my (admittedly cynical) view, they have a “`Struts`” prefix to tap into the
    large existing `Struts` user base.


    But I fear this is a mistake. Splitting a brand name only makes sense if there
    are distinct, clearly identifiable niches that each split addresses. Microsoft’s
    desktop/server offerings are a good example. Each addresses a clearly different
    niche under the “Windows” umbrella. But in the case of webapp frameworks, no clear
    multiplicity of niches is apparent, so having *four* frameworks called “`Struts`”
    simply creates confusion, actually diluting the `Struts` brand. I believe most
    CIOs would stick with the tried-and-tested classic `Struts`, or if they were intending
    to migrate, consider more mature frameworks like `Spring` or standards-based `JSF`.
    Very few would explore `Struts X`. In fact, it is more likely that they would
    have chosen the original `WebWork` instead of its morph with `Struts` (that is,
    `Struts Ti`). Now, they are likely to look at neither one.


    In my opinion, it’s the project that remains backward compatible with `Struts
    1.x`, while introducing major improvements over time, that will win the day—or
    rather, the users. At the time of this writing, that winning horse looks like
    `Struts 1.x`. This likelihood is increased if the `Struts-Faces` integration library
    (described later in this chapter) sees more development. `Shale` might come in
    a close second because of the superior features it offers.


    ## Shale’s Design Objectives


    `Shale` has three major design objectives:


    - **Expanding JSF past the View tier**: `Shale` provides support for areas poorly
    addressed by the `JSF` specification (like the practicalities of validating user
    input). Recall that `JSF` is mainly about the View tier, so `Shale` has to do
    a fair bit to make `JSF` palatable to longtime `Struts` developers used to the
    comforts of the `Validator` framework, dynamic forms, and `Tiles`.'
