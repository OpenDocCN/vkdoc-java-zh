  raw: 'In listing.jsp, we want to put in check boxes at the left of each contact
    listing, to allow the user to select contacts for deletion. You will implement
    this functionality with dynamic forms and <html:multibox>.


    <html:multibox> is usually used with <logic:iterate> to render a check box at
    each iteration, hence the name *multibox*. These check boxes are tied to an indexed
    property on the form bean. For example:


    <form-bean name="myForm"


    type="org.apache.struts.action.DynaActionForm">


    <form-property name="myArray" type="java.lang.String[]" />


    </form-bean>


    (This snippet uses a dynamic form, but you could also use a regular ActionForm.)
    The corresponding <html:multibox> usage might be


    <logic:iterate id="aBean" name="myBeans">


    <html:multibox property="myArray"


    value="<%=((MyBean)aBean).myValue() %>"/>


    </logic:iterate>


    The value attribute on the multibox is the actual value submitted by a check box
    of the multibox. A value is stored *only* if the associated check box is selected.


    Also notice that with <html:multibox>, there’s *no need* to use an explicit indexed
    property (e.g., property="myArray[..]" ) in order to populate the form bean.


    Armed with this background, complete the following steps in order to implement
    the deleting functionality on the full listing page.


    **Step 1: Declare the SelectionForm Form Bean**


    SelectionFormBean is the form bean that will hold the IDs of the Contacts selected
    for deletion.


    Declare this as a dynamic form. It should have a single array property called
    selected, of type java.lang.String[].


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C16.fm Page 237 Tuesday, January 24, 2006 10:14 AM


    C H A P T E R 1 6 ■ D Y N A M I C F O R M S


    **237**


    **Step 2: Amend listing.jsp**


    listing.jsp needs to display the check boxes to choose Contacts for deletion:
    **1.** Put an <html:form> tag into listing.jsp so that it submits to DeleteContacts.do.


    **2.** Put in an <html:multibox> tag for input into SelectionFormBean. Use a scriptlet
    if necessary. Extra credit if you use EL-enabled Struts tags to avoid using scriptlets.


    Hint: The values submitted by the <html:multibox> should be the IDs of the Contacts
    to be deleted.


    **Step 3: Create the Action to Delete Contacts**


    Complete the implementation of DeleteContactsAction, so that it deletes the selected
    contacts. A couple of hints:


    • Use get(String property, int index) to read values from the dynamic form.


    • This function throws an IndexOutOfBoundsException if the index is larger than
    the available list of items.


    When you’re done, put in a new action mapping for DeleteContacts. success should
    lead back to Listing.do ( *not* listing.jsp!). As usual, compile, deploy, and
    test your work.


    **Useful Links**


    • List of supported types for DynaActionForm: http://struts.apache.org/


    struts-doc-1.2.x/userGuide/building_controller.html


    • LazyValidatorForm JavaDoc: http://struts.apache.org/struts-doc-1.2.7/api/


    org/apache/struts/validator/LazyValidatorForm.html


    • BeanValidatorForm JavaDoc: http://struts.apache.org/struts-doc-1.2.7/api/


    org/apache/struts/validator/BeanValidatorForm.html


    • Apache Commons ’ BeanUtils project: http://jakarta.apache.org/commons/


    beanutils/


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C16.fm Page 238 Tuesday, January 24, 2006 10:14 AM


    **238**


    C H A P T E R 1 6 ■ D Y N A M I C F O R M S


    **Summary**


    • Dynamic forms are a way for you to create form beans without any Java code.


    • Dynamic forms work best when you have simple properties, validated with the
    Validator framework. You are expected to transfer data to a JavaBean for processing.


    • Dynamic forms may not be used in place of ActionForms in certain situations,
    particularly when using EL.


    • LazyValidatorForm is a new (1.2.6) addition to Struts that removes the need
    to even declare properties in a form bean.


    • Since 1.2.6, you can use a JavaBean as the type of a <form-bean>, and Struts
    will wrap the bean in a BeanValidatorForm. This will automatically populate the
    bean’s data for you.


    [www.it-ebooks.info](http://www.it-ebooks.info/)'
