    • <h:outputText> 显示文本。它类似于 `<bean:write>` 或 `<bean:message>`，具体取决于你如何分配 `value`
    属性。在清单 20-11 中，我们仅用它来显示来自消息资源包的提示或标签。


    • <h:form> 允许你提交表单数据。


    • <f:verbatim> 简单地输出其主体中的文本。从某种角度来看，这是 JSF 的一个缺陷，因为 `<f:verbatim>` 标签会使你的 JSP
    变得非常难以阅读（我们在清单 20-12 中已将其剥离，以便你更容易看到重要部分）。另一方面，它可能会迫使你使用像 CSS 这样的布局技术来处理 webapp
    的布局。请访问 Zen Garden 网站（参见“有用链接”），了解 CSS 在充分发挥潜力时有多强大。


    • <h:inputText> 渲染一个输入文本字段。`required=true` 表示该字段是必填的。如果你提交一个空值，将为此 UI 组件发布一条错误消息。


    • <x:validateRegExpr> 是 MyFaces 对 JSF 的扩展，允许你基于正则表达式验证用户输入。这就是为组件定义验证器的方式——你将验证器的标签嵌套在
    UI 组件的标签中。


    • <h:commandButton> 显示一个按钮。`action` 属性必须是一个表示逻辑结果的字符串，或者绑定到一个类的方法上，该方法的字符串返回值被解释为逻辑结果。


    • <h:message> 显示与 `for` 属性引用的 UI 组件关联的第一条消息。`<h:message>` 应该与 `for` 属性指示的组件位于同一个命名容器中。


    • <h:commandLink> 显示一个超链接，其目标为给定的结果。


    我们在上一节中已经解释了较难的属性。对于作为 Struts 开发者的你来说，理解这些标签的工作原理应该不会太难。


    接下来，让我们看看 `register.jsp` 页面。用于控制布局的大量 `<f:verbatim>` 标签可能会使代码难以阅读，因此在清单 20-12
    中，我们将其剥离了。


