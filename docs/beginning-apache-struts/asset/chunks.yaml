    `reg.prompt.userid=User ID`


    `reg.prompt.password=Password`


    `reg.prompt.password.confirmation=Password Confirmation`


    In Listing 6-3, you can see how error message keys are associated with the actual
    error messages. You can also see how prompts that go into the user interface can
    be stored in the properties file. Essentially, using properties files is a simple,
    general-purpose way to store static key/value pairs for any Java application.


    ---


    ■**Note** The dotted notation for the property keys (e.g., `reg.error.userid.bad`)
    is just a convention. This convention is useful because it forms a namespace for
    your properties files. If you had two or more properties files, following this
    convention would prevent you (or your development team) from using the same key
    twice. The convention is also useful because it gives you an idea of what the
    key might refer to.


    The string argument of the `ActionMessage` constructor *must* be a key on a properties
    file. This might seem restrictive, but there’s a very good reason for this. This
    is how Struts makes it easy to localize an application.


    For example, if you wanted a German version of the Registration webapp, all you’d
    have to do would be hand over this properties file (`registration.properties`)
    for translation. You’d save the translated version as `registration_de.properties`,
    and bundle it with your webapp. German users would see the German version of the
    Registration webapp and everyone else would see the default English version. Localizing
    a webapp was never so easy! We’ll see this in action further down the road in
    Chapter 12.


    ■**Note** The use of properties files also makes your webapp more consistent,
    since it lessens your chances of displaying “Your user ID is bad” in one error
    message and “Your user ID isn’t valid” for the same error in a different form.


    But `ActionMessages` are only one half of the puzzle of how error messages are
    displayed. The other crucial bit is the **key** under which the `ActionMessage`
    is stored on the `ActionErrors` instance. With reference to Listing 6-1:


    ```

    errors.add("password", new ActionMessage(...));

    ```


    As you might guess, the key corresponds to the name of the form property associated
    with the error. This is only a helpful convention, not a necessity. Struts uses
    a special Struts tag called `<errors>` with an attribute called `property` that
    you match with the error key, like so:


    ```

    <html:errors property="password" />

    ```


    You’d place this tag on the JSP containing the form, near the password field.
    I’ll go into this in more detail in Chapter 8, when I describe the View components
    of Struts.


    Figure 6-2 summarizes the relationship between `ActionErrors`, `ActionMessage`,
    properties files, error keys, and the error tag.


    **Figure 6-2.** *How ActionErrors ties error messages to the View component*


    To summarize, when the user submits a form, Struts calls `validate()` on the associated
    `ActionForm` subclass, which returns an `ActionErrors` instance. This is just
    a collection of `ActionMessages`, each of which references error messages stored
    in properties files. When Struts redisplays the page, it uses special `<errors>`
    tags you’ve embedded on the page to locate exactly where to display the error
    messages. The `<errors>` tags on the page are distinguished by their `property`
    attribute, which forms the link between the tag and a particular `ActionMessage`
    instance stored on the `ActionErrors` collection.


    That’s quite a lot to take in one go! You might want to try the quiz that follows
    to see if you’ve really understood the preceding material.


    ## Simple Validation Quiz


    **Q1:** Suppose validating a certain field requires a numerical calculation. Would
    this qualify as a simple validation? You should give clear reasons for your answer.


    **Q2:** When is `validate()` called? Before Struts populates the `ActionForm`
    or after?


    **Q3:** If `validate()` returns an empty `ActionErrors` instance, will the form
    be redisplayed?


    **Q4:** Rewrite Listing 6-1 so that Struts only displays the error message for
    the *first* validation error encountered.


    **Q5:** If you changed the name of one of a form’s properties (say `zipcode` to
    `postcode`), would you have to change the corresponding error key for `ActionErrors`,
    that is, `errors.add("zipcode",...)` to `errors.add("postcode",...)`?


    **Q6:** If your answer to Q5 was yes, what other changes would you have to make?


    **Q7:** If there were more than one validation error for a single property, which
    error message (if any) do you think would be displayed?


    Check your answers with those in Appendix D. Once you’re confident of the material,
    try out Lab 6.


    ## Lab 6: ContactForm for LILLDEP


    LILLDEP (Little Data Entry Program) is a webapp that maintains a database of *contacts*.
    Each contact has the following 14 properties:


    - name of contact

    - designation of contact (e.g., “Senior Engineer”)

    - department

    - email **address**

    - **tel number**

    - fax number

    - company to which contact belongs to

    - address of contact’s company

    - postcode of company address (“zip code” in the United States)

    - country of company site

    - website of contact’s company

    - activity engaged in by contact’s company

    - classification **of contact’s company**

    - **memo**, which contains miscellaneous notes for this contact


    Figure 6-3 shows the form data as it is seen by a user.


    **Figure 6-3.** *The LILLDEP start page*


    The associated `ActionForm` subclass that handles validation for this contact
    data is called `ContactForm`. In this lab, you’ll complete the implementation
    for `ContactForm`. There are three things you will need to do:


    - Put in the `getXXX` and `setXXX` functions corresponding to each of the 14 properties.

    - Complete the `validate()` function.

    - Complete the implementation of a `reset()` function, which resets the values
    of the `ContactForm`.


    Complete this lab by following these steps.


    ### Step 1: Prepare the Development Environment and Scripts


    1. Copy the `lilldep.zip` file from the Source Code section of the Apress website,
    found at http://www.apress.com, into the Struts directory you created in Lab 4.

