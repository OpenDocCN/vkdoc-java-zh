    就能在最终的网页中嵌入 JavaScript，以运行客户端验证。但请记住，没有简单的方法（除了修改验证器本身，或者编写插件）可以阻止表单通过服务器端验证。


    这可能会让你怀疑客户端验证是否还有用！公平地说，验证器框架正在积极开发中，我相信我们很快会看到客户端验证方面的改进。


