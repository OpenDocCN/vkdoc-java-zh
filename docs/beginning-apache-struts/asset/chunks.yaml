- fmt: "# Struts Tag Reference\n\n## `bean:size`\n\n- **collection**: This is a very\
    \ handy alternative to the `name`/`property`/`scope` combination. You use a scriptlet\
    \ to calculate the value of this attribute, for example:\n\n```\n<bean:size id=\"\
    mySize\"\n  collection=\"<%=MyObject.calculateCollection() %>\" />\n```\n\n- The\
    \ rationale behind this attribute is discussed in the entry for `<logic:iterate>`.\n\
    \n### Examples\n\nHere’s a simple example that exposes the size of a given collection:\n\
    \n```\n<bean:size id=\"mySize\" name=\"MyCollection\"/>\n<bean:write name=\"mySize\"\
    />\n```\n\n### Equivalents\n\nYou can use JSTL’s `<c:set>` in conjunction with\
    \ the JSTL `length` function:\n\n```\n<c:set var=\"myVar\" value=\"${fn:length(MyCollection)}\"\
    \ />\n```\n\nRemember to declare the JSTL function tag library.\n\n---\n\n## `bean:struts`\n\
    \nThis tag exposes a Struts global forward, or form bean or form handler (the\
    \ `ActionMapping` for the form handler) as a variable, accessible to scriptlets\
    \ and other tags. This can be useful if you want JSTL to access Struts’ internal\
    \ variables.\n\n### Usage Restrictions\n\nThe `id` attribute is required. You\
    \ must also specify the `forward`, `formBean`, or `mapping` attribute.\n\n###\
    \ Attributes\n\n- **id**: The name of the exposed variable. Scriptlets and other\
    \ custom tags will be able to access the new variable using this name. This attribute\
    \ is required.\n- **forward**: The name of the global forward to expose.\n- **formBean**:\
    \ The name of the declared form bean to expose.\n- **mapping**: The name of the\
    \ form handler to expose.\n\n### Examples\n\nConsider this `struts-config.xml`\
    \ snippet:\n\n```\n<form-beans>\n  <form-bean name=\"RegistrationFormBean\"\n\
    \    type=\"net.thinksquared.reg.RegistrationFormBean\" />\n</form-beans>\n\n\
    <global-forwards>\n  <forward name=\"myForward\" path=\"/index.jsp\" />\n</global-forwards>\n\
    \n<action-mappings>\n  <action path=\"/Login\"\n    type=\"net.thinksquared.reg.RegistrationAction\"\
    \n    validate=\"true\"\n    name=\"RegistrationFormBean\"\n    input=\"myInput.jsp\"\
    >\n    <forward name=\"success\" path=\"registered.jsp\" />\n    <forward name=\"\
    new-user\" path=\"new-user.jsp\" />\n  </action>\n</action-mappings>\n```\n\n\
    Here’s how you would expose the global forward:\n\n```\n<bean:struts id=\"fwd\"\
    \ forward=\"myForward\"/>\n<bean:write name=\"fwd\"/>\n<bean:write name=\"fwd\"\
    \ property=\"path\" />\n```\n\nand the form bean:\n\n```\n<bean:struts id=\"fbean\"\
    \ formBean=\"RegistrationFormBean\"/>\n<bean:write name=\"fbean\"/>\n<bean:write\
    \ name=\"fbean\" property=\"type\" />\n```\n\nand the form handler:\n\n```\n<bean:struts\
    \ id=\"fhandler\" mapping=\"/Login\"/>\n<bean:write name=\"fhandler\"/>\n<bean:write\
    \ name=\"fhandler\" property=\"input\" />\n```\n\n### Equivalents\n\nNone.\n\n\
    ---\n\n## `bean:write`\n\nThis tag writes the specified bean property to the response\
    \ stream. It allows for some formatting of the given bean property.\n\n### Usage\
    \ Restrictions\n\nThe `name` attribute is required.\n\n### Attributes\n\n- **name**/**property**/**scope**:\
    \ These attributes are used to locate the JavaBean with the given `name` and optional\
    \ `property` and `scope`. If `scope` isn’t specified, all scopes are searched\
    \ for the named object.\n- **ignore**: If `true`, silently fails if the named\
    \ JavaBean is not found. The default value (`false`) causes an exception to be\
    \ thrown.\n\nThe remaining attributes are used to format the bean’s property:\n\
    \n- **filter**: If set to `true`, causes the property’s `String` value to be HTML\
    \ encoded. For example, the ampersand (`&`) would be encoded as `&amp;` and `>`\
    \ would be encoded as `&gt;`. The default is `true`.\n- **format**/**formatKey**:\
    \ Both specify a format string that is used to format the bean’s property. `format`\
    \ uses its value literally as a format string. `formatKey` uses its value as a\
    \ key to look up the actual format string stored in the message resources file.\
    \ Unless the `locale`/`bundle` combination is specified, the current user’s locale\
    \ and the default message resource bundle is used."
  raw: '• collection: This is a very handy alternative to the name/property/scope
    combination. You use a scriptlet to calculate the value of this attribute, for
    example:


    <bean:size id="mySize"


    collection="<%=MyObject.calculateCollection() %>" />


    • The rationale behind this attribute is discussed in the entry for <logic:iterate>.


    Examples


    Here’s a simple example that exposes the size of a given collection:


    <bean:size id="mySize" name="MyCollection"/>


    <bean:write name="mySize"/>


    Equivalents


    You can use JSTL’s <c:set> in conjunction with the JSTL length function:


    <c:set var="myVar" value="${fn:length(MyCollection)}" /> Remember to declare the
    JSTL function tag library.


    **struts**


    This tag exposes a Struts global forward, or form bean or form handler (the ActionMapping
    for the form handler) as a variable, accessible to scriptlets and other tags.
    This can be useful if you want JSTL to access Struts’ internal variables.


    Usage Restrictions


    The id attribute is required. You must also specify the forward, formBean, or
    mapping attribute.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


