    这两个类都提供了 `setAttribute()` 和 `getAttribute()` 方法（详见附录 B），用于在对象上存储和检索数据，这与 HashMap
    的 `put()` 和 `get()` 方法非常相似。存储在 `HttpServletRequest` 上的对象具有**请求作用域**，而存储在 `HttpSession`
    上的对象则具有**会话作用域**。


    当你在 JSP 页面中创建变量时（如清单 3-1 所示），根据你所使用的作用域，你实际上是在隐式地调用相应对象（`HttpServletRequest` 或
    `HttpSession` 的实例）上的 `setAttribute()` 方法。


    类似地，当你在 First.jsp 和 Second.jsp 中嵌入的脚本片段中使用 `myVariable` 时，Servlet 容器会通过调用相应对象上的
    `getAttribute("myVariable")` 方法来检索该变量。


    因此，如果你*以某种方式*获取到 `HttpServletRequest` 或 `HttpSession` 的实例，就可以将对象存入其中，而这些对象原则上可以从你的
    JSP 页面中检索出来。事实上，你只需要一个 `HttpServletRequest` 实例，因为你可以通过调用 `HttpServletRequest`
    上的 `getSession()` 方法来获取关联的 `HttpSession` 实例。


    “以某种方式”将在后续章节中变得清晰。目前，请注意这是在你构建 Web 应用的 Java 类和 JSP 之间传递数据的一种方式。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C03.fm Page 21 Monday, January 23, 2006 11:45 AM


    第 3 章 ■ 理解作用域


    **21**


    **总结**


    • 作用域描述了变量的生命周期和可见性。

    • **会话**和**请求**作用域是最常用的作用域。

    • 会话作用域的变量在用户与系统的整个会话期间存在。

    • 请求作用域的变量仅在一次页面请求（包括重定向）期间存在。

    • 会话作用域的变量存储在 `HttpSession` 的实例中。

    • 请求作用域的变量存储在 `HttpServletRequest` 的实例中。

    • `HttpServletRequest` 和 `HttpSession` 可用于在 Java 类和 JSP 之间传递数据。


