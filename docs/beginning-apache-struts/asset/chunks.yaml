- fmt: "Both `base-attrs` and `exprop-attrs` are accepted. There is also an additional\
    \ `value` attribute, which is a constant value that the property or extended property\
    \ will be compared to.\n\n## Examples\n\nThe following example shows the use of\
    \ the `<logic:equal>` tag to conditionally process the nested `<bean:write>` tag\
    \ if the variable `client` is equal to the String \"Joe\":\n\n```\n<logic:equal\
    \ name=\"client\" value=\"Joe\">\n  <bean:write name=\"client\" />\n</logic:equal>\n\
    ```\n\nThe next example illustrates the use of the `parameter` attribute:\n\n\
    ```\n<logic:equal parameter=\"username\" value=\"Susan\">\n  Hello Susan!\n</logic:equal>\n\
    ```\n\nThe body is executed only if there is a parameter named `username` on the\
    \ request URL with the value `Susan`. If there were more than one such parameter,\
    \ the first one that occurs on the URL is used.\n\nYou can also use the `scope`\
    \ variable to specify a scope under which to look for a bean:\n\n```\n<logic:notEqual\
    \ name=\"MyBean\" property=\"email\"\n                scope=\"session\" value=\"\
    joey@joey.com\">\n  <bean:write name=\"MyBean\" property=\"email\" />\n</logic:notEqual>\n\
    ```\n\nIn this example, the `<bean:write>` is called on the base object if there\
    \ is a bean on the session scope called `MyBean`, and its `getEmail()` function\
    \ returns a value equal to `joey@joey.com`. Note that if `MyBean` is null, or\
    \ does not have a `getEmail()` function, an exception is thrown.\n\n## Equivalents\n\
    \nYou can easily create equivalents for `equal` and `notEqual` using JSTL's `<c:if>`\
    \ or `<c:choose>...<c:when>`. For example using `<c:if>`, the previous examples\
    \ would be:\n\n```\n<c:if test=\"${client == 'Joe'}\">\n  <bean:write name=\"\
    client\" />\n</c:if>\n```\n\nThe next example illustrates the use of the `parameter`\
    \ attribute:\n\n```\n<c:if test=\"${param.username == 'Susan'}\">\n  Hello Susan!\n\
    </c:if>\n```\n\nYou can also use the `scope` variable to specify a scope under\
    \ which to look for a bean:\n\n```\n<c:if test=\"${sessionScope.MyBean.email !=\
    \ 'joey@joey.com'}\">\n  <bean:write name=\"MyBean\" property=\"email\" />\n</c:if>\n\
    ```\n\nAlso note that unlike the Struts tags that only admit a constant value,\
    \ the JSTL equivalents have no such restriction. Here's an example of comparing\
    \ a variable against another (this is impossible to implement with the Struts\
    \ tags because `value` must be constant—unless of course, you're willing to use\
    \ scriptlets):\n\n```\n<c:if test=\"${cookie.userlogin != MyBean.userlogin}\"\
    >\n  <bean:message key=\"error.myapp.login\" />\n</c:if>\n```\n\n## `forward`\n\
    \nThis tag causes the page to be forwarded to the specified global forward (see\
    \ Chapters 9 and 17). This tag has no body. See also `<logic:redirect>`.\n\n###\
    \ Usage Restrictions\n\nThe `name` attribute is required.\n\n### Attributes\n\n\
    The `name` attribute is the name of the global forward to use.\n\n> **Note** If\
    \ you wish to forward to a Tiles definition, a hack is to do this from an `Action`\
    \ subclass, which is in turn exposed as a global forward.\n\n### Examples\n\n\
    Consider the global forwards declared in `struts-config.xml`:\n\n```\n<global-forwards>\n\
    \  <forward name=\"login\" path=\"/login.jsp\"/>\n  <forward name=\"logoff\" path=\"\
    /Logoff.do\"/>\n</global-forwards>\n```\n\nThen, the forward\n\n```\n<logic:forward\
    \ name=\"login\"/>\n```\n\nwould cause the page `login.jsp` to be displayed. Similarly,\
    \ the forward\n\n```\n<logic:forward name=\"logoff\"/>\n```\n\nwould cause the\
    \ `Logoff.do` form handler to be called. You can use this to load a Tiles definition.\n\
    \n### Equivalents\n\nNone.\n\n## `greaterEqual`/`lessEqual`/`greaterThan`/`lessThan`\n\
    \n`greaterEqual` is a conditional tag that executes its body if the given property\
    \ (or extended property) is greater than or equal to the constant value given\
    \ by the `value` attribute. The other tags in this group are similarly defined.\n\
    \nNote that if `value` is not a numeric value, it is interpreted as a String,\
    \ and a comparison between Strings (using Java's standard comparisons between\
    \ Strings) will be performed.\n\n### Usage Restrictions"
