    **Getting External Form Data**


    What if there was more than one Tiles component on the page? Would the cast LogonForm
    lForm = (LogonForm) form;


    in Listing 14-20 throw an exception? The answer is no, because the type of ActionForm
    (more precisely, the form bean) passed to the Tiles controller must match the
    one declared in struts-config.xml. If no such form bean was submitted, then a
    blank one is created, and passed to the Tiles controller. This means the cast
    will *always work* as long as the declaration is correct.


    This has an interesting implication: suppose form data is sent to a form handler
    associated with form bean X. Then, *all* Tiles components on that same page that
    also are associated with that form bean X will receive carbon copies of that form
    data.


    For example, consider the following set of form-handler declarations:


    <action path="MyAction" name="MyFormBean" type="...">


    <action path="MyTileControllerA" name="MyFormBean" type="...">


    <action path="MyTileControllerB" name="MyFormBean" type="...">


    <action path="MyTileControllerC" name="DifferentFormBean" type="..."> and the
    following JSP page snippet:


    <html:form action="/MyAction.do">


    ...


    </html:form>


    <tiles:insert definition=".myTilesComponentA"/>


    <tiles:insert definition=".myTilesComponentB"/>


    <tiles:insert definition=".myTilesComponentC"/> When the form data is submitted,
    it is first stored in an instance of MyFormBean and then processed by the Action
    subclass associated with MyAction.


    What is less obvious is that the execute() functions on MyTileControllerA and
    MyTileControllerB are passed *separate copies* of MyFormBean. The execute() function
    of MyTilesControllerC is passed a new instance of DifferentFormBean.


    You will use this trick in the following lab session, to get a Tiles component
    to receive data from the external form.


