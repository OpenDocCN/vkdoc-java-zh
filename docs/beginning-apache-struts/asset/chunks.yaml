- fmt: "# Tiles Overview\n\n`Tiles` is a Struts *plug-in*—a piece of software developed\
    \ independently of Struts, to extend the basic capabilities of Struts.\n\n`Tiles`\
    \ was developed initially by Cedric Dumoulin but is now (since version 1.2) integrated\
    \ into Struts. In fact, it supercedes an older “Template” library, which had provided\
    \ limited layout capability. The only thing that betrays its previous independent\
    \ existence is that it’s a plug-in and therefore requires some setup.\n\n`Tiles`\
    \ gives Struts applications two new capabilities:\n\n- **Layouts**: The ability\
    \ to easily provide a uniform “look and feel” to your Struts applications. In\
    \ most web applications, pages follow a similar *layout*—for example, they might\
    \ have a common header or footer or sidebars. `Tiles` has a elegant inheritance\
    \ mechanism that allows such layouts, even complicated ones, to be created and\
    \ maintained easily.\n- **Components**: The ability to build reusable GUI components\
    \ that you can easily embed into your JSP pages. Components give you the flexibility\
    \ to display *dynamic* *content*—content that can change depending on user interaction\
    \ or on external data sources. An example is displaying a list of weather forecasts\
    \ for various cities, or a news items that interest the user, or targeted marketing.\n\
    \nIn short, layouts provide a common look and feel, and components allow provision\
    \ of dynamic content in a reusable package.\n\nThe powerful thing about `Tiles`\
    \ is that you can mix these two capabilities: your layouts may include components.\
    \ For example, you can specify a layout that displays a component as a sidebar\
    \ containing a user’s search list. Used wisely, this can lead to easy-to-use applications.\
    \ You’ll create such a component yourself in the lab section of this chapter.\n\
    \nOf course, both layouts and component behavior can be emulated in other ways.\
    \ For example, you could enforce a common look and feel by simply pasting the\
    \ appropriate HTML in your JSP pages. You could implement “components” by cutting\
    \ and pasting scriptlets in your JSPs!\n\nIf you’ve followed the discussion on\
    \ MVC in Chapter 5 closely, the shortcomings of these approaches should be obvious.\
    \ MVC is all about separating code according to their functionality, and violating\
    \ this principle leads to maintenance woes down the road. So it is with these\
    \ ad hoc approaches. With them, making site-wide changes to layouts or components\
    \ are difficult because you’d have to amend each page.\n\nAs you will see, `Tiles`\
    \ does it better—and easier.\n\n## Installing Tiles\n\nTo use `Tiles`, you have\
    \ to declare it in `struts-config.xml`. Listing 14-1 shows a typical declaration.\n\
    \n> **Note**: Remember, plug-in declarations come *last* in your `struts-config.xml`\
    \ file. Placing it anywhere else will result in an exception being thrown when\
    \ Struts starts up.\n\n**Listing 14-1.** *Tiles Declaration in struts-config.xml*\n\
    \n```\n<plug-in className=\"org.apache.struts.tiles.TilesPlugin\" >\n  <set-property\
    \ property=\"definitions-config\"\n                value=\"/WEB-INF/tiles-defs.xml\"\
    />\n</plug-in>\n```\n\nThe declaration in Listing 14-1 does two things. First,\
    \ it tells Struts what *plug-in class* to instantiate. In this case, it’s `org.apache.struts.tiles.TilesPlugin`.\
    \ This plug-in class is responsible for the initialization of Struts.\n\nSecond,\
    \ the `<plug-in>` tag contains one or more `<set-property>` tags, each of which\
    \ passes a parameter-value pair to the plug-in class. In Listing 14-1, the only\
    \ parameter passed to `org.apache.struts.tiles.TilesPlugin` is the `definitions-config`\
    \ parameter, which points to the relative location of the Tiles definitions file.\
    \ In this case, it’s `/WEB-INF/tiles-defs.xml`.\n\nThis `tiles-def.xml` file (you\
    \ may call it something else, if you wish—just change the `value` property if\
    \ you do) is where you declare layouts and components for Tiles. You can think\
    \ of it as the Tiles counterpart of `struts-config.xml`."
