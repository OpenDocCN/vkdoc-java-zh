    Doray_6048C14.fm Page 192 Tuesday, January 24, 2006 10:13 AM


    **192** C H A P T E R 1 4 ■ T I L E S


    **Step 7: Put In the Find Tile**


    Now, you need to put the Find tile in your JSPs. We’ll start with `full.jsp`:


    1. Look at the layout specs (Figure 14-6), and put in a table with two cells.
    One cell will hold the existing data entry panel, and the other (on the right)
    will hold the Find button and the results window.

    2. Put in a Find button (look up the key in `Application.properties`!), which
    is an `<html:submit>`.

    3. You need to add `property="command"` to the new Find button as well as the
    existing Submit button.

    4. Put in the taglib declaration for the Tiles tag library.

    5. Repeat steps 1–3 for `mnc.jsp`.


    **Step 8: Deploy and Test**


    Compile and deploy your webapp. Verify the following:


    - Does the Find utility work? In other words, do you see a list of companies when
    you use Find?

    - Does the form populate when you click the company name links?

    - Does the company name’s background color change when you click on it?

    - Does the contact update correctly when you make a change?

    - Does the Find result change when you make an update? For example, if you perform
    a Find operation for a company name, and then change the company name, does the
    Find listing change?

    - Does Find work correctly on both `full.jsp` and `mnc.jsp`?

    - If you use the full/MNC entry forms to enter a new contact, does the database
    correctly create new contacts?


