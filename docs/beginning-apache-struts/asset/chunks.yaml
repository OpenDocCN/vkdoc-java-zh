- fmt: "This won’t work: you can’t nest `<tiles:insert>` inside a `<logic:iterate>`\
    \ (a `ServletException` is thrown). You’d have to resort to using scriptlets that\
    \ loop through the items:\n\n```\n<tiles:importAttribute />\n\n<%\nfor(Iterator\
    \ items = sideBarItems.iterator(); items.hasNext();){\n    String item = items.next().toString();\n\
    %>\n<tiles:insert name=\"<%=item %>\"/>\n<% } %>\n```\n\nwhich is much less readable.\n\
    \n## `get`\n\n`get` reads the `name` attribute from the `ComponentContext` for\
    \ the Tile (placed there using `<tiles:put>` or `<tiles:putList>`), interprets\
    \ the value as a JSP page or a Tiles definition, and writes the output of either\
    \ to the response stream.\n\n### Usage Restrictions\n\nYou need to specify what\
    \ to display, so the `name` attribute is required.\n\n### Attributes\n\n- `name`:\
    \ The name of the Tiles attribute to include.\n- `ignore`: If the attribute specified\
    \ by `name` can’t be found, `ignore=\"true\"` causes a silent failure. Otherwise,\
    \ an exception is thrown, which is the default behavior.\n- `flush`: This has\
    \ its usual meaning (see Table C-14).\n- `role`: This has its usual meaning (see\
    \ Table C-14).\n\n### Examples\n\nConsider the snippet\n\n```\n<tiles:insert page=\"\
    one.jsp\">\n    <tiles:put name=\"myTilesAttr\" value=\"two.jsp\"/>\n</tiles:insert>\n\
    <tiles:get name=\"myTilesAttr\" />\n```\n\nThis will cause the contents of `two.jsp`\
    \ to be displayed after the contents of `one.jsp`.\n\n## `getAsString`\n\nThis\
    \ tag is similar to `<tiles:get>`, but the Tiles attribute is interpreted as a\
    \ literal string. This is useful to display static text (used for example, in\
    \ `<title>` sections of web pages).\n\n### Usage Restrictions\n\nYou need to specify\
    \ what to display, so the `name` attribute is required.\n\n### Attributes\n\n\
    - `name`: The name of the Tiles attribute to display. If this isn’t found, an\
    \ exception is thrown.\n- `flush`: This has its usual meaning (see Table C-14).\n\
    - `role`: This has its usual meaning (see Table C-14).\n\n### Examples\n\nConsider\
    \ the snippet:\n\n```\n<tiles:insert page=\"one.jsp\">\n    <tiles:put name=\"\
    myTilesAttr\" value=\"two.jsp\"/>\n</tiles:insert>\n<tiles:getAsString name=\"\
    myTilesAttr\" />\n```\n\nThis will cause the string “two.jsp” to be displayed\
    \ after the contents of `one.jsp`.\n\n## `useAttribute`\n\nThis tag exposes a\
    \ Tiles attribute as a Java variable with a given scope. Contrast this with `<tiles:importAttribute>`.\n\
    \n### Usage Restrictions\n\nYou need to specify the name of the Tiles attribute\
    \ to expose.\n\n### Attributes\n\n- `name`: The name of the Tiles attribute to\
    \ expose. Required.\n- `id`: The name by which the Tiles attribute will be known\
    \ to scriptlets or other tags. If omitted, `id` defaults to the name of the Tiles\
    \ attribute.\n- `scope`: The JSP scope of the exposed variable (`page`, `request`,\
    \ `session`, or `application`). The default is `page` scope.\n- `classname`: The\
    \ classname of the exposed variable.\n- `ignore`: If `true`, fails silently if\
    \ the Tiles attribute can’t be found. The default is to throw an exception.\n\n\
    ### Examples\n\nConsider this snippet:\n\n```\n<tiles:insert page=\"mylayout.jsp\"\
    >\n    <tiles:put name=\"myTilesAttr\" value=\"one\"/>\n</tiles:insert>\n<tiles:useAttribute\
    \ name=\"myTilesAttr\" id=\"x\"/>\n<%= x %>\n```\n\nHere, we’ve exposed the Tiles\
    \ attribute `myTilesAttr` as a scripting variable named `x`.\n\n## `importAttribute`\n\
    \n`importAttribute` copies specified Tiles attributes (declared with `<tiles:put>`\
    \ or `<tiles:putList>`) into the specified scope. Recall that each Tile stores\
    \ its attributes into a `ComponentContext` instance, and not directly on the `request`,\
    \ `session`, `page`, or `application` scope. Because of this, you need to copy\
    \ attributes from the `ComponentContext` into the `request`, `session`, `page`,\
    \ or `application` scope in order for non-Tiles tags to read the attributes. `importAttribute`\
    \ does just this.\n\n### Usage Restrictions"
