- fmt: "前两个类被称为*数据对象*（`data object`）类，它们实际上是 JavaBean，其属性对应表中的每一列。持久化由*对等类*（`peer\
    \ classes`）处理，这些类提供了在数据库中保存、删除和搜索数据对象的方法。因此，对于清单 A-2，使用 Lisptorq 生成的 Model 类将是：\n\
    \n- `BaseUser`：包含 `user_id` 和 `password` 的 getter 和 setter 方法。它还包含一个 `save()`\
    \ 方法，用于将数据持久化到类中。\n- `BaseUserPeer`：包含用于持久化 `BaseUser` 类的函数。它包含诸如 `doSave()`、`doDelete()`\
    \ 和 `doSelect()` 之类的函数，这些函数用于保存、删除和搜索用户。\n- `User`：一个表示用户的空类。你可以在这个类中编写自己的附加函数。`User`\
    \ 继承自 `BaseUser`。\n- `UserPeer`：`BaseUserPeer` 的一个空子类。这个类允许你扩展 `BaseUserPeer`\
    \ 的功能。\n\n为一个数据库实体拥有四个类可能看起来有点复杂，但这种疯狂是有方法的。`User` 类（一个数据对象）保存数据，而 `UserPeer`\
    \ 类（对等类）用于从数据库中保存、删除或检索数据对象。\n\n`Base` 类包含自动生成的、执行实际工作的函数。非 `Base` 类（`User` 和\
    \ `UserPeer`）提供给你，以便在 `Base` 类的基础上添加额外的功能。\n\n清单 A-3 展示了如何使用 `User` 类保存用户 ID 和密码数据。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**362**\n\n**附录 A ■ 模型框架**\n\
    \n**清单 A-3.** *保存一个 Lisptorq 生成的 User Bean*\n```\nUser u = new User();\nu.setUserId(\"\
    kolmogorov\");\nu.setPassword(\"turbulence23\");\nu.save();\n```\n这几行代码在幕后做了很多工作：生成了\
    \ SQL 来保存用户 ID 和密码。使用 Model 类可以让你免于自己编写一行 SQL！\n\n除了这四个模型类（记住，每个表会创建四个类），Lisptorq\
    \ 总是生成四个辅助类：`Criteria`、`Database`、`DatabaseSetup` 和 `Scroller`：\n\n- `Criteria`\
    \ 允许你无需使用 SQL 即可创建查询。\n- `Database` 管理数据库的连接。\n- `DatabaseSetup` 为你提供了一个 `main()`\
    \ 函数，你可以调用它来设置数据库。你显然只需要使用这个类一次。\n- `Scroller` 是一个*接口*，它扩展了 `java.util.Iterator`。它代表一个迭代器，可以向前迭代（使用通常的\
    \ `hasNext()` 和 `next()`）或向后迭代（使用 `hasPrevious()` 和 `previous()`）。你也可以使用 `absolute()`\
    \ 来定位“游标”。\n\n清单 A-4 是使用 `Criteria` 类以及 `User` 和 `UserPeer` Model 类对清单 A-1 中 `exists()`\
    \ 函数的一个实现。\n\n**清单 A-4.** *使用 Criteria 和 Model 类实现的 exists()*\n```\npublic static\
    \ boolean exists(String userId){\n    Criteria crit = new Criteria();\n    crit.add(User.USER_ID,userId);\n\
    \    return UserPeer.doSelect(crit).iterator().hasNext();\n}\n```\nLisptorq 目前生成的代码针对\
    \ Derby SQL 进行了优化。Derby 是一个 Java 嵌入式数据库，目前在 Apache 进行“孵化”。它由 IBM 捐赠，以前是专有的 Java\
    \ 嵌入式数据库，称为 Cloudscape。它是少数支持原子性、一致性、隔离性和持久性（ACID）的开源数据库之一（参见“有用链接”）。Derby 的 JAR\
    \ 文件（`derby.jar`）位于 Apress 网站的源代码部分，网址为 http://www.apress.com。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**363**\n\n**附录 A ■ 模型框架**\n\n**实验 A：测试驱动 Lisptorq**\n\n我希望上一节已经激起了你对使用 Model\
    \ 类的兴趣。为了让你小试牛刀，在这个实验环节中，你将开发一个简单的应用程序，使用 Lisptorq 生成的 Model 类来存储和检索数据。\n\n为了完成这个实验，你必须参考位于\
    \ www.thinksquared.net/dev/lisptorq/ 的 Lisptorq 手册。"
  raw: 'The first two are called *data object* classes, which are really JavaBeans
    with properties for each column on the table. Persistence is handled by *peer
    classes*, which have methods for saving, deleting, and searching for data objects
    on the database. So, the generated Model classes for Listing A-2 using Lisptorq
    would be


    • BaseUser: Contains getters and setters for user_id and password. It also contains
    a save() method to persist the data in the class.


    • BaseUserPeer: Contains functions to persist a BaseUser class. It contains functions
    like doSave(), doDelete(), and doSelect(), which save, delete, and search for
    Users.


    • User: An empty class representing the user. You can write your own additional
    functions in this class. User extends BaseUser.


    • UserPeer: An empty subclass of BaseUserPeer. This class lets you extend the
    functionality of BaseUserPeer.


    Having four classes for one database entity might seem a little complicated, but
    there’s a method to the madness. The User class (a data object) holds data while
    the UserPeer classes (peer classes) are used to save, delete, or retrieve data
    objects from the database.


    The Base classes contain autogenerated functions that do the real work. The non-Base
    classes (User and UserPeer) are given to you to add additional functionality on
    top of the Base classes.


    Listing A-3 shows how you might save the user ID and password data using the User
    class.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048AppA.fm Page 362 Monday, January 16, 2006 3:22 PM


    **362**


    A P P E N D I X A ■ F R A M E W O R K S F O R T H E M O D E L


    **Listing A-3.** *Saving a Lisptorq-Generated User Bean* User u = new User();


    u.setUserId("kolmogorov");


    u.setPassword("turbulence23");


    u.save();


    These few lines do a lot behind the scenes: SQL is generated to save the user
    ID and password. Using Model classes saves you from writing a single line of SQL
    yourself!


    In addition to the four model classes (remember, four are created per table),
    Lisptorq always generates four helper classes: Criteria, Database, DatabaseSetup,
    and Scroller:


    • Criteria allows you to create queries without using SQL.


    • Database manages connections to the database.


    • DatabaseSetup gives you a main() function you can call to set up your database.


    You’d obviously need to use this class just once.


    • Scroller is an *interface* that extends java.util.Iterator. It represents an
    iterator that can iterate either forward (using the usual hasNext() and next())
    or backward (using hasPrevious() and previous()). You may also position the “cursor”
    using absolute().


    Listing A-4 is an implementation of the exists() function of Listing A-1 using
    the Criteria class as well as the User and UserPeer Model classes.


    **Listing A-4.** *An Implementation of exists() using the Criteria and Model Classes*
    public static boolean exists(String userId){


    Criteria crit = new Criteria();


    crit.add(User.USER_ID,userId);


    return UserPeer.doSelect(crit).iterator().hasNext();


    }


    Lisptorq currently produces generated code optimized for Derby SQL. Derby is a
    Java embedded database, currently being “incubated” at Apache. It was donated
    by IBM, and was previously the proprietary Java embedded database called Cloudscape.
    It is one of the few open source databases available that support Atomicity, Consistency,
    Isolation, and Durability, or ACID (See “Useful Links”). The JAR file for Derby
    (derby.jar) is in the Source Code section of the Apress website at http://www.apress.com.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048AppA.fm Page 363 Monday, January 16, 2006 3:22 PM


    A P P E N D I X A ■ F R A M E W O R K S F O R T H E M O D E L


    **363**


    **Lab A: Test Driving Lisptorq**


    I hope the previous section has piqued your interest in using Model classes. To
    get your toes wet, in this lab session you’ll develop a simple application to
    store and retrieve data using Lisptorq-generated Model classes.


    In order for you to complete this lab, you must refer to the Lisptorq manual at
    www.thinksquared.net/dev/lisptorq/.'
