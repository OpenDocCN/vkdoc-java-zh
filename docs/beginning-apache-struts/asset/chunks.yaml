    第 15 章


    ■ ■ ■


    验证器框架


    **验**证器框架是一个 Struts 插件，最初由 David Winterfeldt 创建，它提供了一组*通用验证*，你可以使用它们来运行各种简单的验证。

    '
- fmt: "# 使用验证器框架替代 `validate()` 方法\n\n与其在 `ActionForm` 子类中实现 `validate()` 函数，你可以在\
    \ XML 文件中声明验证规则。\n\n因此，验证器框架消除了在 `ActionForm` 子类中实现 `validate()` 的需求。（你仍然需要 `ActionForm`\
    \ 子类来存储表单数据。）与在 `ActionForm` 子类中编写单独的 `validate()` 函数相比，使用验证器框架能带来诸多好处：\n\n- **更好的可维护性**：由于新的\
    \ XML 格式验证都集中在一个文件中，你可以更轻松地维护验证规则。\n- **标准化**：许多简单的验证需要相同的检查。例如，`userid` 和 `password`\
    \ 字段可能都需要检查以确保它们由字母数字组成。如果这些检查分散在几个 `validate()` 函数中，标准化它们将是一个挑战。正如你将看到的，验证器框架使标准化验证变得更加容易。\n\
    - **正确的实现**：一些“简单”的验证实际上很难正确实现！一个典型的例子是验证电子邮件地址是否符合 RFC-2822 规范（该规范涉及电子邮件地址格式等）。与其重新发明轮子，不如利用验证器框架提供的验证功能。\n\
    - **更少的代码重复**：同样，因为验证器框架提供了一套相当全面的验证功能，你可以减少代码重复。你无需在每个 Web 应用程序中实现自己的代码来验证信用卡号等内容。你可能会争辩说，可以一次性编写这些验证，将它们放在一个类中，并在所有应用程序中重用。确实如此，但这意味着你的团队新成员需要学习更多东西才能提高生产力。\n\
    \n在最坏的情况下，一些开发人员可能会忘记共享的验证库，并在他们的 `validate()` 函数中重复编写验证。\n\n**195**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n`Doray_6048C15.fm Page 196 Tuesday, January 24, 2006 10:13 AM`\n\n**196**\n\n\
    第 15 章 验证器框架\n\n- **自动客户端验证**：你可以通过在 JSP 中放置一个 `<html:javascript/>` 标签来自动生成客户端的\
    \ JavaScript 验证。验证器框架将自动为你生成验证。验证框架的这一功能仍不完善；你无法指定*仅*进行客户端验证。\n\n验证器框架提供的一组通用验证非常全面，你应该能够用\
    \ XML 声明替换所有 `validate()` 函数。\n\n然而，如果你无法做到这一点，也可以在你使用验证器框架声明的验证*之外*运行自己的自定义验证。还可以*扩展*验证器框架提供的标准验证集。\n\
    \n## 声明验证器插件\n\n与 Tiles（参见第 14 章）一样，验证器框架独立于 Struts。它属于 Apache Commons 项目（参见本章末尾的“有用链接”），该项目旨在创建一组可重用的框架，验证器框架就是其中之一。\n\
    \n实际上，验证器框架的内部实现存储在 Struts 发行版附带的 `commons-validator.jar` 文件中。此 JAR 文件包含框架的所有\
    \ Java 类和用于运行客户端验证的 JavaScript。\n\n要在 Struts 应用程序中使用验证器框架，你需要声明它。这意味着在 `struts-config.xml`\
    \ 文件中进行 `<plug-in>` 声明（参见清单 15-1）。\n\n**清单 15-1.** *struts-config.xml 中验证器框架的插件声明*\n\
    \n```\n<plug-in className=\"org.apache.struts.validator.ValidatorPlugIn\" >\n\
    \  <set-property property=\"pathnames\"\n                value=\"/WEB-INF/validator-rules.xml,/WEB-INF/validation.xml\"\
    />\n</plug-in>\n```"
  raw: 'Instead of implementing validate() functions in your ActionForm subclasses,
    you declare your validations in an XML file.


    So, the Validator framework eliminates the need for implementing validate() in
    your ActionForm subclasses. (You still need your ActionForm subclasses to store
    form data.) You reap a number of benefits when you use the Validator framework,
    as opposed to writing individual validate() functions on your ActionForm subclasses:


    • **Better maintainability**: Since the new XML format validations are all placed
    in one file, you should be able to maintain your validations more easily.


    • **Standardization**: Many simple validations require the same checks. For example,
    both userid and password fields might require checks to ensure they are composed
    of alphanumerics. If these checks were spread throughout a few validate() functions,
    standardizing them would be a challenge. As you’ll see, the Validator framework
    makes it easier for you to standardize your validations.


    • **Correct implementation**: Some “simple” validations are quite difficult to
    implement correctly! A prime example is validating an email address so that it
    conforms to the RFC-2822 specification (this specification deals with email address
    formats, among other things). Rather than reinventing the wheel, you can take
    advantage of validations provided by the Validator framework.


    • **Less code duplication**: Similarly, because the Validator framework provides
    a fairly comprehensive set of validations, you can cut down code duplication.
    You don’t need to implement your own code to validate things like credit card
    numbers in each of your web applications. You could argue that it’s possible to
    write these validations once, put them in a single class, and reuse them for all
    your apps. True, but this means that new members of your team would have more
    to learn before they could become productive.


    In the worst-case scenario, some developers might forget about the shared library
    of validations and duplicate validations in their validate() functions.


    **195**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C15.fm Page 196 Tuesday, January 24, 2006 10:13 AM


    **196**


    C H A P T E R 1 5 ■ T H E V A L I D A T O R F R A M E W O R K


    • **Automatic client-side validations**: You can automatically generate JavaScript
    validations on your client by placing a single <html:javascript/> tag in your
    JSPs. The validator framework will automatically generate the validations for
    you. This feature of the Validation framework is still underdeveloped; there’s
    no way for you to specify client-side validation *only*.


    The set of generic validations provided by the Validator framework is quite comprehensive,
    and you should be able to replace all your validate() functions with XML declarations.


    However, in case you can’t, it’s possible to run your own custom validations *alongside*
    the ones you’ve declared using the Validator framework. It’s also possible to
    *extend* the set of standard validations provided by the Validator framework.


    **Declaring the Validator Plug-in**


    Like Tiles (see Chapter 14), the Validator framework is independent of Struts.
    It belongs to the Apache Commons project (see “Useful Links” at the end of this
    chapter), which aims to create a set of reusable frameworks, the Validator framework
    being one of them.


    Indeed, the Validator framework internals are stored in the commons-validator.jar
    file that comes with the Struts distribution. This JAR file contains all the Java
    classes for the framework and the JavaScript to run client-side validations.


    To use the Validator framework in your Struts applications, you need to declare
    it. This means a <plug-in> declaration in the struts-config.xml file (see Listing
    15-1).


    **Listing 15-1.** *Plug-in Declaration for the Validator Framework in struts-config.xml*


    <plug-in className="org.apache.struts.validator.ValidatorPlugIn" >


    <set-property property="pathnames"


    value="/WEB-INF/validator-rules.xml,/WEB-INF/validation.xml"/>


    </plug-in>'
