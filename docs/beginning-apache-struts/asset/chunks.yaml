    ## Summary


    - `JSF` is the new Java standard for the View tier of modern Java webapps.

    - `JSF` is a specification. One open source implementation is `MyFaces` from Apache.

    - The primary purpose of `JSF` is the management of UI components as displayed
    in a web browser.

    - `JSF` goes a long way in allowing the creation of webapps that behave like desktop
    applications.

    - `Shale` extends `JSF` past the View tier to include integration with Apache
    Commons projects (like `Validator`), improves complex navigation (using dialogs),
    and much more.

    - Despite its name, `Struts Shale` is not a “drop-in” replacement for classic
    `Struts`.'
