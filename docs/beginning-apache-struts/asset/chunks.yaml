    see in the lab sessions of this chapter.


    > **Note:** If you’ve programmed in Visual Basic, you might have used the `With`
    keyword. The Nested tag library is an inelegant implementation of this.


    To illustrate how the Nested tag library works, let’s first consider the class
    diagram shown in Figure 10-1.


    **Figure 10-1.** *The `MyActionForm`, `Monkey`, and `Banana` classes*'
