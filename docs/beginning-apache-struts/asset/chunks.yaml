- fmt: '# All Common Attribute Sets


    All common attribute sets (`evt-attrs`, `acc-attrs`, `ren-attrs`, `struts-attrs`,
    `init-attr`, and the new `err-attrs`) are accepted, and have their usual meanings.
    Besides these, there are a couple of attributes specific to `select`:


    - `multiple`: Enables multiple selections if specified (the actual value is unimportant).


    The underlying property must be an array if the `multiple` attribute is specified.
    As with `<html:multibox>`, you must set the underlying property to a zero-length
    array in your `ActionForm`''s `reset()` if you want to detect an unselected item.
    See the entry for `<html:multibox>` for details.


    - `size`: The number of options to display at once.


    ## Attributes for `option`


    The `option` tag accepts the `ren-attrs` attribute set. Besides this, the following
    attributes are specific to `option`:


    - `value`: The submitted value. This attribute is required.

    - `key`: The message resource key that specifies the label for the option. If
    omitted, the label is the text nested within the `option` tag''s body.

    - `locale`/`bundle`: These attributes are used to specify a different `Locale`
    object or message resource file. `locale` specifies a key that can be used to
    look up the `Locale` object stored on the current session. The `bundle` attribute
    is explained in more detail in the entry for `<bean:message>`. You''d use these
    attributes to specify a locale different from the current user''s locale or a
    message resource file different from the default one.


    ## Attributes for `options`


    The `option` tag accepts the `ren-attrs` attribute set, except for the `styleId`
    attribute. (This attribute is left out because the `options` tag might render
    more than one HTML `<option>` element, and the HTML standard forbids you from
    having two elements with the same `id`.)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    *Doray_6048AppC.fm Page 413 Tuesday, January 17, 2006 4:46 PM*


    **A P P E N D I X C ■ S T R U T S T A G R E F E R E N C E**


    **413**


    There are two ways to specify the values and labels to use for each rendered `<option>`
    element:


    - **Specify the `collection`/`property`/`labelProperty` attributes**: The `collection`
    attribute gives the name of a collection of JavaBeans, each holding the value
    and label for a single `<option>`. The `property` attribute is the name of the
    `getXXX()` function that is called on each bean to obtain the value for an `<option>`.
    Similarly, the `labelProperty` attribute is the name of the `getXXX()` function
    that is called on each bean to obtain the label for an `<option>`. If `labelProperty`
    is omitted, the `<option>`''s value is used as a label.


    - **Specify `name`/`property` and `labelName`/`labelProperty` attributes**: The
    `name` and `property` pair specifies a collection in any scope from which to get
    the values for each rendered `<option>`. If you specify the `property` attribute
    only, then the `ActionForm` subclass is the implicit base object. Similarly, the
    `labelName` and `labelProperty` pair specifies a collection from which to get
    the labels for each rendered `<option>`. If only `labelProperty` is specified,
    then the `ActionForm` subclass is the implicit base object.


    If neither `labelName` nor `labelProperty` is specified, the labels are the same
    as the values.


    The remaining attribute of `<html:options>` is `filter`, which if `true` filters
    the labels for HTML reserved characters (like `<`, `>`, or `&`). The default is
    `true`.


    ## Attributes for `optionsCollection`


    `optionsCollection` is a simplified, streamlined version of `<html:options>`.
    Like `<html:options>`, the `optionsCollection` tag accepts the `ren-attrs` attribute
    set, except for the `styleId` attribute. It also has the `filter` attribute, like
    `<html:options>`.


    `optionsCollection` assumes that the values and labels for each rendered `<option>`
    are stored in a collection of JavaBeans. This collection is specified using the
    `name` and `property` attributes. If you specify the `property` attribute only,
    then the `ActionForm` subclass associated with the enclosing form is the implicit
    base object. Each JavaBean is assumed to have two `getXXX()` functions from which
    to obtain the value and label for a single `<option>` tag.'
