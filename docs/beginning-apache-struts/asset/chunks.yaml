    should take focus when the form first loads. Struts autogenerates the JavaScript
    for this to happen. If the focus attribute isn’t specified, then no such JavaScript
    is autogenerated.


    focusIndex applies to input elements that are indexed. You can specify the index
    of the element that takes focus.


    • enctype: Specifies the encoding used when submitting this form’s data. You only
    need to set this when you have an <html:file> input element in the form (see the
