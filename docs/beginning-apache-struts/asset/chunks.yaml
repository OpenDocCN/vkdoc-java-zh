    Bean 声明的文件。


    `destroy()` 函数是一个“空操作”实现（意味着它不执行任何操作）。


    大部分操作都在 `init()` 函数中。此函数执行以下操作：


    • 获取 `ServletContext` 的引用。解析文件路径需要用到此类。在我们的案例中，我们有包含表单 Bean 声明的 XML 文件，需要读取它们。插件声明只会指定它们相对于
    Web 应用根目录的路径，例如 `/WEB-INF/form-beans-def.xml`。显然，这个路径是不够的。要读取文件，我们需要文件的完整路径。这就是
    `ServletContext` 发挥作用的地方。它有一个 `getRealPath()` 函数，可以解析给定相对文件路径的完整路径。


    • 从 `DynaFormsLoaderFactory` 获取一个 `DynaFormsLoader` 实例。`DynaFormsLoader` 实际上是一个我们需要实现的接口。这是一个良好的设计：如果你需要使用*你自己的*
    `DynaFormsLoader` 来加载表单 Bean，你可以这样做。`DynaFormsLoaderFactory` 根据 `<form-beans>`
    的 `type` 属性决定使用哪个加载器。你很快就会看到这是如何完成的。


    • `DynaFormsLoader` 上的 `load()` 函数执行实际工作：读取表单 Bean 声明，并将必要的 `FormBeanConfig` 实例添加到
    `ModuleConfig`。


