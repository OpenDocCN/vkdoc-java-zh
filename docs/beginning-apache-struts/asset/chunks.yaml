    **31**


    **表4-2.** `<tag>`的子标签


    | **标签** | **含义** |

    | --- | --- |

    | `name` | 此标签的名称。 |

    | `tagclass` | Java处理程序类的名称。注意，这是处理程序类的完全限定名，例如`net.thinksquared.tags.MessageWriteTagHandler`。
    |

    | `bodycontent` | 此标签正文内容的类型。使用`JSP`。 |

    | `attribute` | 包含此标签上单个属性的元数据。 |


    **表4-3.** `<attribute>`的子标签


    | **标签** | **含义** |

    | --- | --- |

    | `name` | 此属性的名称。显然，这在标签上必须是唯一的。 |

    | `required` | 指示此标签是必需的（`true`）还是可选的（`false`）。 |


    ## 实验4：温度转换标签


    在本实验环节中，你将创建、部署并测试一个温度转换标签。以下是相关说明：


    - 标签库将只包含一个名为`convert`的标签，它有一个可选属性。

    - 可选属性`to`指示要转换到的温度标度。

    - 默认情况下，`to`为华氏度。

    - 转换是从摄氏度到华氏度或开尔文。


    > **注意**：在生产实现中，你应该包含一些错误报告。


    例如，以下所有代码都将100摄氏度转换为212华氏度：


    ```

    <temp:convert to="Fahrenheit">100</temp:convert>

    <temp:convert to="F">100</temp:convert>

    <temp:convert>100</temp:convert>

    ```


    而以下代码将100摄氏度转换为373开尔文：


    ```

    <temp:convert to="Kelvin">100</temp:convert>

    <temp:convert to="K">100</temp:convert>

    ```


    要创建并使用此标签，你需要：


    1. 准备开发目录和脚本。

    2. 编写Java标签处理程序。

    3. 编写描述标签的TLD文件。

    4. 编写JSP以测试自定义标签。

    5. 修改`web.xml`以注册你的TLD文件。

    6. 将应用程序安装到Tomcat上。


    ### 步骤1：准备开发环境和脚本


    1. 在硬盘上的方便位置创建一个`Struts`目录。

    2. 将光盘上的`lab4.zip`文件复制到此`Struts`目录中。

    3. 解压内容，确保保留了目录结构。

    4. 你应该会看到一个名为`.\Struts\lab4\`的子目录。

    5. 在文本编辑器中打开`.\Struts\lab4\compile.bat`，并修改`PATH`环境变量，使其指向你的JDK安装目录。


    > **注意**：在Windows XP、ME或2000（具有内置解压功能）上，zip文件可能会在解压路径中添加一个额外的`lab4`目录。因此，`compile.bat`文件的路径将是`.\Struts\lab4\lab4\compile.bat`。你可以将`lab4`文件夹上移一层，或者继续使用当前路径。编译脚本应该都能正常工作。


    通过点击`compile.bat`来测试你的更改。你应该不会看到任何错误，并且应该在`.\Struts\lab4\`中看到一个名为`lab4.war`的文件。


    在接下来的内容中，我将引用所有相对于`.\Struts\lab4\`的路径。


    ### 步骤2：编写Java标签处理程序


    1. 在你喜欢的文本编辑器中打开文件`.\src\Converter.java`。

    2. 添加一个名为`_to`的私有`String`变量。这将对应于自定义标签的`to`属性。

    3. 创建`getTo()`和`setTo()`方法来获取和设置`_to`的值。Servlet容器将使用这些方法来获取/设置变量`_to`与`to`属性的值。

    4. 根据说明完成`doAfterBody()`方法。你需要使用辅助类来完成此操作（参见清单4-4）。

    5. 注意，`doAfterBody()`必须返回整数标志`EVAL_PAGE`，以指示JSP页面的其余部分将被评估。

    6. 通过点击`compile.bat`编译你的工作。


    ### 步骤3：编写标签库描述符文件


    1. 在你喜欢的文本编辑器中打开`.\web\WEB-INF\lab4-converter.tld`。'
