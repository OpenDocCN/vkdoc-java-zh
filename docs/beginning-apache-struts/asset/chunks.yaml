    \ CHAPTER 4 ■ CUSTOM TAGS\n\n当包含你的标签的JSP加载时，Servlet容器会调用所有必要的`setXXX()`函数，以便你的标签的属性可以被标签的Java代码访问。再次以`<bean:write>`标签为例，在运行时，你可以调用`getProperty()`函数或直接查看`_property`来读取`<bean:write>`标签的`property`属性的值。\n\
