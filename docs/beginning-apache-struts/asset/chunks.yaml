    \ you’ll agree that Listing 10-7 is difficult to read. EL solves this problem\
    \ by allowing EL-enabled tags to have dynamic attributes.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nDoray_6048C10.fm Page 120 Tuesday, January 24, 2006 10:12 AM\n\n**120** Chapter\
    \ 10 ■ More Tags\n\nFor example, if `<h:tr>` were an EL-enabled tag, then Listing\
