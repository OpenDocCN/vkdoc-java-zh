    not dispatch on a request parameter. Instead, you declare form handlers with the
    same MappingDispatchAction subclass to perform different actions.


    As an example, suppose you wanted to group slightly different printing functionality
    in your webapp: Print to PDF, Print to HTML, and Print to Text. The Action subclass
    handling printing would be responsible for obtaining the necessary data and sending
    it off to appropriate helper classes in order to print to the right format. In
    this scenario, it would be unnatural to have the data be handled by three different
    Actions, since the code is likely to be very similar. You’d want to have *one*
    PrintingAction with three functions, one for each print format.


