    \ `getXXX` 和 `setXXX` 函数。\n\n■**注意** 换句话说，除了是 `BodyTagSupport` 或 `TagSupport`\
    \ 的子类之外，你的处理器类还需要是一个 JavaBean，其属性与自定义标签支持的属性相对应。\n\n例如，在清单 4-1 中，通过查看 `<bean:write>`，你可以推断出相应的\
    \ Java 处理器类具有 `getProperty()` 和 `setProperty()` 函数。清单 4-3 说明了这一点。\n\n**清单 4-3.**\
    \ *<bean:write> 标签的 Java 处理器类部分代码* import javax.servlet.jsp.tagext.*;\n\npublic\
    \ class BeanWriteTagHandler extends TagSupport{\n\n    protected String _property\
    \ = null;\n\n    public String getProperty(){\n        return _property;\n   \
    \ }\n\n    public void setProperty(String property){\n        _property = property;\n\
    \    }\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C04.fm\
    \ 第 28 页 2005 年 12 月 12 日 星期一 下午 3:47\n\n**28**\n\n第 4 章 ■ 自定义标签\n\n    //其他代码省略。\n\
    \    ...\n}\n\n当包含你的标签的 JSP 加载时，Servlet 容器会调用所有必要的 `setXXX()` 函数，以便你的标签的 Java\
    \ 代码可以访问其属性。再次以 `<bean:write>` 标签为例，在运行时，你可以调用 `getProperty()` 函数，或者直接查看 `_property`\
    \ 来读取 `<bean:write>` 标签的 `property` 属性值。\n\n**辅助类**\n\n为了让你的 Java 处理器类能够执行有用的操作，例如读取标签主体的内容或写入标签的输出，你需要了解几个辅助类。\n"
- fmt: "# Custom Tags\n\nThe first is `javax.servlet.jsp.tagext.BodyContent`, which\
    \ you use to read your tag’s body, among other things. The function `getString()`\
    \ returns your custom tag’s body (assuming it has one) as a `String`. You can\
    \ get an instance of `BodyContent`, if you’ve subclassed `BodyTagSupport`, by\
    \ calling the function that has been implemented for you on the base class `BodyTagSupport`.\n\
    \n`BodyContent` also gives a `Writer` instance with which you can write the output\
    \ of your tag’s transformed body. Calling `getEnclosingWriter()` on the `BodyContent`\
    \ instance will give you a `Writer` subclass—specifically, a subclass of `javax.servlet.jsp.JSPWriter`.\n\
    \nTo see how all this works, consider a simple `<message:write>` tag, used like\
    \ this:\n\n`<message:write font-color=\"red\">Hello World!</message:write>`\n\n\
    We need the message “Hello World!” to be displayed in the given font color—red,\
    \ in this instance. A Java handler to accomplish this is shown in Listing 4-4.\n\
    \n**Listing 4-4.** *Implementation of `<message:write>`’s Handler Class*\n\n```\n\
    package net.thinksquared.tags;\n\nimport javax.servlet.jsp.tagext.*;\nimport javax.servlet.jsp.*;\n\
    \npublic class MessageWriteTagHandler extends BodyTagSupport{\n\n    protected\
    \ String _fontColor = \"black\"; //default font color\n    public String getFontColor(){\n\
    \        return _fontColor;\n    }\n\n    public void setFontColor(String fontColor){\n\
    \        _fontColor = fontColor;\n    }\n\n    public int doAfterBody(){\n   \
    \     try{\n            BodyContent bc = getBodyContent();\n            JSPWriter\
    \ out = bc.getEnclosingWriter();\n            out.write(\"<font color=\\\"\");\n\
    \            out.write(_fontColor);\n            out.write(\"\\\">\");\n     \
    \       out.write(bc.getString());\n            out.write(\"</font>\");\n    \
    \    }catch(Exception ignore){}\n        //tell the servlet container to continue\n\
    \        //processing the rest of the page:\n        return EVAL_PAGE;\n    }\n\
    }\n```\n\n## The TLD File\n\nThe last piece of the custom tag puzzle is the TLD\
    \ (**T**ag **L**ibrary **D**escriptor) file. Each tag you create has to be declared\
    \ in a TLD file, and this file has to be deployed along with the tag’s Java handler\
    \ classes. As we’ve seen in the previous section, the servlet container knows\
    \ where you’ve placed the TLD file because you’ve declared the path in `web.xml`,\
    \ the standard servlet configuration file.\n\n> **Note** I’ve included this section\
    \ mainly for your reference. If you’re itching to write your own custom tag, you\
    \ may safely skip this section and proceed to Lab 4.\n\nConsider the TLD file\
    \ declaring the `<message:write>` tag we developed earlier, as shown in Listing\
    \ 4-5.\n\n**Listing 4-5.** *TLD File Declaring `<message:write>`*\n\n```\n<?xml\
    \ version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE taglib\n    PUBLIC \"-//Sun\
    \ Microsystems, Inc.//DTD JSP Tag Library 1.1//EN\"\n    \"http://java.sun.com/j2ee/dtds/web-jsptaglibrary_1_1.dtd\"\
    >\n<taglib>\n    <tlibversion>0.0</tlibversion>\n    <jspversion>1.1</jspversion>\n\
    \    <shortname>message</shortname>\n    <tag>\n        <name>write</name>\n \
    \       <tagclass>\n            net.thinksquared.tags.MessageWriteTagHandler\n\
    \        </tagclass>\n        <bodycontent>JSP</bodycontent>\n        <attribute>\n\
    \            <name>font-color</name>\n            <required>false</required>\n\
    \        </attribute>\n    </tag>\n</taglib>\n```\n\nAs you can see, the TLD file\
    \ is just an XML file. The root tag is `<taglib>`, and this contains one or more\
    \ `<tag>` tags, which declare your custom tag. Tables 4-1, 4-2, and 4-3 explain\
    \ each tag on the TLD file. Note that each `<taglib>` must contain one or more\
    \ `<tag>` declarations.\n\n**Table 4-1.** *Tags on the TLD File*\n\n| Tag | Meaning\
    \ |\n|-----|---------|\n| `taglib` | Root tag for the TLD file. |\n| `tlibversion`\
    \ | Your version number for this tag library. |\n| `jspversion` | The JSP version\
    \ this tag library depends on. Use 1.1. |\n| `shortname` | The preferred or suggested\
    \ prefix for tags on this tag library, when you use the tag on your JSP pages.\
    \ You are of course free to ignore this suggestion. |\n| `tag` | Contains metadata\
    \ for a single tag in this tag library. |"
