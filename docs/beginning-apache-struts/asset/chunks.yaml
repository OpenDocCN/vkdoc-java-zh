    **76**


    ## CHAPTER 7 ■ PROCESSING BUSINESS LOGIC


    `mapping.getInputForward()`


    To get a reference to the input page you use the `getInputForward()` function
    on the `ActionMapping` instance, `mapping`. Recall that `mapping` is supplied
    for you by Struts, because it’s a parameter in `execute()`.


    Notice that unlike simple validation where redisplay was automatically handled
    by Struts, here you’re on “manual,” meaning you have to specify the error page
    yourself. This is because of the very different natures of simple and complex
    validation. For example, you might check a user’s account balance before performing
    a task. If there are insufficient funds, it makes no sense to automatically redisplay
    the input page. A more appropriate response would be to display an “insufficient
    funds” page.


    The second way you’d want to instantiate `ActionForward` is for it to point to
    a *named* “next” page:


    `mapping.findForward("success")`


    Here, the name `success` refers to a named page, which is one possible “next”
    page I’ve bound to `RegistrationAction`. I’ll describe how this is done in Chapter
    9.


    This indirect way of referring to a page might seem overly complicated. Why not
    just use a direct reference like


    `new ActionForward("/mywebapp/registered.jsp")`


    There are two good reasons why you should avoid using a direct reference. The
    first is because the indirect method makes your webapp more maintainable, and
    the second is that it promotes code reuse.


    To understand the first reason, you’d have to know that the named pages are specified
    in one file called `struts-config.xml`. So, if you moved a page, you’d only have
    to amend this one file. If the paths were hardwired, you’d have to change several
    Actions and recompile your app! Not good.


    The second reason is more subtle, but more compelling. It is often the case that
    you want to reuse an Action in different contexts. Depending on the context, you
    would want a different “success” page to be displayed. Hardwiring a “next” page
    into an Action obviates the possibility of doing this.


    To recap, there are two important ways to display the “next” page:'
