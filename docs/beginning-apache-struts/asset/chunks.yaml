    和 `absmiddle`。请查阅 HTML 参考以了解这些设置的作用。


    • height/width：以像素为单位指定最终显示图像的高度和宽度。图像的缩放由浏览器完成。


    • hspace/vspace：图像与周围元素之间的水平空间（`hspace`）和垂直空间（`vspace`）。单位为像素。


