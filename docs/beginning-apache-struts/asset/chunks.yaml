    <forward>s represent the possible “next” pages for that form handler. Like the
    <forward>s in the global forwards section, each <forward> tag has two attributes:


    • name: A name for the “next” page


    • path: The actual page’s path, relative to the webapp’s root directory The name
    attribute identifies this “next” page in the Action subclass associated with the
    form handler. This is how mapping.findForward() works (see Listing 7-2): return
    mapping.findForward("success");


    The label success is just the value of the name attribute.


    The path must start with a slash if it’s a true path. If you had declared the
    page as a global forward, then you could use the name of the global forward instead.
    In this case, you’d have no initial slash, because the path value is just a label,
    not a true path.


    **Controller Declaration**


    The controller section is probably the least used among the seven sections. It
    is used to manually override some default Struts settings. I will only mention
    a few useful ones here:


    • maxFileSize: Specifies the upper size limit on uploaded files. You can use a
    number followed by K, M, or G to indicate a size in kilobytes, megabytes, or gigabytes,
    respectively. For example, maxFileSize="2M" limits the file size to 2MB. We will
    deal with file uploading in Chapter 11.


    • nocache: Tells Struts whether it should cache content. Setting nocache="true"


    disables content caching.


    • contentType: Specifies the default content type of pages. For example, if you’re
    delivering XML pages by default, set contentType="text/xml".


