    First, notice that the constructor has only private access. This is a design pattern
    called *Singleton* and it prevents DynaFormsLoaderFactory from being instantiated.
    Instantiating DynaFormsLoaderFactory is a waste of resources, since all the action
    goes on in *static* functions on this class.


    **THE SINGLETON DESIGN PATTERN**


    In its original formulation, the Singleton design pattern was a solution to the
    problem of ensuring that *only one* instance of a class was made. But the essence
    of the Singleton design pattern is that it allows you to control the number of
    instances of a given class, hence my use of this term in the text.


    To do this, all constructors of the class are marked as private, so the class
    cannot be directly instantiated using the new keyword. Instead, the class provides
    a static function (usually cal ed getInstance()) that controls instantiation of
    the class. The fol owing code gives a skeleton of a typical singleton: public
    class MySingleton{


    private static MySingleton _self = new MySingleton();


    private MySingleton(){


    /* initialization code here */


    }


    public static MySingleton getInstance(){


    return _self;


    }


    }


    Notice that I’ve had to create the _self instance at the start. One other option
    is to test for a _self


    == null in getInstance() and only then create the MySingleton instance. This approach
    might fail in a multithreaded application, unless getInstance() is marked as synchronized.


    The only public function is getLoader(), which returns a concrete implementation
    of DynaFormsLoader. This function takes as a parameter the filename of the form
    beans declaration file. With


