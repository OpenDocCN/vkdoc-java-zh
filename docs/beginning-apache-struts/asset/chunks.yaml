    Struts Tag Reference


    **T**his appendix is a reference on all Struts 1.2 tags, from the five tag libraries:
    HTML, Bean, Logic, Nested, and Tiles. We’ve included usage examples and information
    on Struts-EL and JSTL (see Chapter 10 for both), as well as JSF and Struts-Faces
    Integration Library (see Chapter 20 for both) equivalent tags where appropriate.
    This reference does *not* include the obsolete Template tag library, which has
    been superseded by the Tiles tag library.


    To make this reference more compact, we’ve collected attributes that occur in
    more than one tag under one or more *common attribute sets*. These are introduced
    at the start of each section describing a tag library.


    ## The HTML Tag Library


    The custom tags in the HTML library are essentially in one-to-one relationship
    to the ordinary HTML `<form>` tag and its associated input tags, like the various
    `<input>` tags.


    The purpose of this tag library is to enable you to connect the View tier to the
    Controller tier of your Struts webapp. The linkage between the two is done statically
    in `struts-config.xml`.


    The tags in the HTML library can be divided into four groups based on function:'
