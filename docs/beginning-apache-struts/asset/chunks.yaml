- fmt: "# Summary\n\nTo summarize, the primary purpose of the `ComponentContext` is\
    \ as a channel of communication from the Tiles controller to the JSP page it forwards\
    \ to.\n\nThis is analogous to the way the `HttpServletRequest` is a means of communication\
    \ between an `Action` subclass and the forwarded JSP. A Tile controller could\
    \ also place data on the `HttpServletRequest` object, but this would break the\
    \ independence of that Tiles component, since other Tiles components on the page\
    \ might overwrite the data placed on the request object.\n\nThe last point to\
    \ note is that this `execute()` is marked to throw `IOException` and `javax.servlet.ServletException`.\n\
    \n# Step 2: Declaring the Controller\n\nThe declaration for a Tiles controller\
    \ is exactly the same as for any form handler. For example, Listing 14-10 shows\
    \ a simple controller that doesn’t accept any input data, and that has two possible\
    \ views.\n\n**Listing 14-10.** *One Controller, Two Views*\n\n```\n<action path=\"\
    /MyTilesController\"\n      type=\"com.mycompany.myapp.tiles.MyTilesController\"\
    >\n  <forward name=\"success\" path=\"/tiles/my-tiles-view.jsp\"/>\n  <forward\
    \ name=\"failure\" path=\"/tiles/error.jsp\"/>\n</action>\n```\n\nPerhaps the\
    \ only difference is that when you declare a Tiles controller, it is *possible*\
    \ to omit declaring any `<forward>`s, if there is only one JSP view associated\
    \ with the Tiles component. Listing 14-11 shows an example.\n\n**Listing 14-11.**\
    \ *One Controller, One View*\n\n```\n<action path=\"/MyTilesController\"\n   \
    \   type=\"com.mycompany.myapp.tiles.MyTilesController\" />\n```\n\nIn this case,\
    \ the controller’s `execute()` function (Listing 14-9) returns `null`, and the\
    \ Tiles `<definition>` associated with this component is slightly different compared\
    \ to the case where there are multiple JSP views associated with the Tiles component,\
    \ as in Listing 14-10. I’ll describe this difference shortly.\n\n# Step 3: Creating\
    \ the Tiles View\n\nThe Tiles view is just the JSP that displays the output of\
    \ the Tiles controller. This is analogous to the “next” JSP page associated with\
    \ an `Action` subclass.\n\nThe primary difference, of course, is that the JSP\
    \ page typically will evaluate to an HTML fragment, not a complete HTML page.\
    \ This is because the JSP page’s output will be embedded within a full HTML page.\n\
    \n# Step 4: Declaring the Tiles `<definition>`\n\nThe Tiles `<definition>` enables\
    \ the controller to be used *conveniently* in a `<tiles:insert>` tag. It is possible\
    \ to use a Tiles controller already declared in `struts-config.xml` directly in\
    \ a `<tiles:insert>`, just as a layout was used directly in Listing 14-4. For\
    \ example:\n\n```\n<tiles:insert path=\"/MyTilesController.do\"/>\n```\n\nThe\
    \ advantage of using a Tiles definition is that you can avoid hard-coding the\
    \ handler’s path in all your JSPs.\n\nThe declared definition will depend on whether\
    \ the component uses just a single view page (as in Listing 14-11) or multiple\
    \ views (Listing 14-10).\n\nIn the single view case, which is typical, the definition\
    \ is declared as shown in Listing 14-12.\n\n**Listing 14-12.** *A Tiles Component\
    \ with a Single View*\n\n```\n<definition name=\".myTile\"\n          path=\"\
    /tiles/my-tiles-view.jsp\"\n          controllerUrl=\"/MyTilesController.do\"\
    >\n  <put name=\"title\" value=\"This is My Tile\"/>\n</definition>\n```\n\nDeclared\
    \ this way, the return value of the controller’s `execute()` should be `null`,\
    \ and the JSP page in the `path` attribute is used as a view. The `controllerUrl`\
    \ attribute is used to specify the Tiles handler declared in `struts-config.xml`.\
    \ You may define attributes (in Listing 14-12, the `title` attribute is defined)\
    \ to be used by the view.\n\nIf the component has multiple views, they must all\
    \ be declared in `struts-config.xml` as `<forward>`s, as in Listing 14-10. In\
    \ this case, the Tiles `<definition>` is simpler, as Listing 14-13 shows.\n\n\
    **Listing 14-13.** *A Tiles Component with Multiple Views*\n\n```\n<definition\
    \ name=\".myTile\"\n```"
