    Each time the layout is used, the right path to the stylesheet is computed. A
    poorer way of doing the same is to hard-code the full URL:


    <style type="text/css" media="screen">


    @import " **http://www.mycompany.com/myapp/**styles/styles.css";


    </style>


    This method is less effective because the port used on the server or the application
    name might be changed upon deployment. In either case, the hard-coded solution
    won’t work.


    **Tiles Components**


    In the previous sections, you’ve seen how to develop layouts using Tiles. Next,
    we’ll explore a quite different use of Tiles: building components.


    In Tiles, a *component* is a rectangular area displayed within the user’s web
    browser (this is why “Tiles” is so named), capable of rendering *dynamic* content.
    Examples are components that display selected stock prices, or ads, or a user
    search list, or a list of pages the user has visited... The possibilities are
    endless!


    There are two main points to note concerning Tiles components:


    • **Easy embedding**: A Tiles component can be embedded into any JSP page using
    the handy <tiles:insert> tag. Want a weather report Tiles component on your JSP


    page? Slap in a single <tiles:insert> tag with the right attributes.


    • **Independence**: To be useful, a Tiles component should function independently
    of its environment—the JSP page in which it is embedded. *There are times when
    this rule can be broken (as you will see in the lab section of this chapter),
    but this is always at the expense of reusability.*


    ***Creating a Tiles Component**


    Creating a Tiles component is more involved compared to creating and declaring
    a Tiles layout. Five steps are involved:


    **1\. Create the Tiles *controller****.* This is a Java class that creates dynamic
    content or processes user input.


    **2\. Declare the Tiles controller** in struts-config.xml.


    **3\. Create the Tiles “view.”** This is the JSP page that displays the results
    of the Tiles controller’s output.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C14.fm Page 170 Tuesday, January 24, 2006 10:13 AM


    **170**


    C H A P T E R 1 4 ■ T I L E S


    **4\. Declare a Tiles** <definition> that associates the JSP page with the controller.


    A controller may be used in more than one definition. This is exactly analogous
    to the way an Action subclass may be used in more than one form handler.


    **5\. Use the component** on your JSP pages by embedding the <tiles:insert> tag
    in them.


    To create the Tiles controller, you subclass the TilesAction base class: org.apache.struts.
    **tiles**.action**s**.TilesAction


    Notice that it’s tiles.actions (plural). I’ll describe these five steps in more
    detail next and then wrap up with a concrete example application.


    Step 1: Creating the Tiles Controller


    The function you need to override is called (surprise!) execute(), but with a
    slightly different signature compared to Action.execute(), as shown in Listing
    14-9.


    **Listing 14-9.** *execute() on TilesAction*


    public ActionForward execute(**ComponentContext context**, ActionMapping mapping,


    ActionForm form,


    HttpServletRequest request,


    HttpServletResponse response)


    **throws IOException, ServletException**{ ...


    All you have to do is to override this one function to process user input or prepare
    data for output.


    The org.apache.struts.tiles.ComponentContext instance passed in execute() functions
    as a storage area for data intended for your Tiles component. You can store and
    retrieve data with putAttribute() and getAttribute() on this class. Only the JSP
    page represented by the ActionForward return value has direct access to data placed
    on this ComponentContext instance. This helps preserve the independent existence
    of the Tiles component from its environment.'
