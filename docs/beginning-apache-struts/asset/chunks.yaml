    as it is, with no customizations made. Usually, however, it makes sense to customize
    a layout when you declare it. In the previous example, we might want to specify
    the content for the elements header and footer:


    <tiles:definition id=".basic" page="/mylayout.jsp">


    <tiles:put name="header" value="/navbar.jsp" />


    <tiles:put name="footer" value="/terms-of-use.jsp" />


    </tiles:definition>


    In this snippet, the header now points to navbar.jsp and the footer to terms-of-use.jsp.


    So, the remaining element, body, is undefined. To use the declared definition,
    you’d include the shared JSP and then use <tiles:insert>:


    <%@ include file="shared-layouts.jsp" %>


    <tiles:insert definition=".basic">


    <tiles:put name="body" value="hello-world.jsp" />


    </tiles:insert>


    Note that the body is now defined to point to hello-world.jsp.


    **put**


    put defines a named attribute in a layout. This allows you to customize a layout
    for display.


    Usage Restrictions


    The put tag must be nested within a <tiles:insert> or <tiles:definition>. You
    must also specify name, which refers to the attribute in the layout, and content
    for that attribute.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048AppC.fm Page 462 Tuesday, January 17, 2006 4:46 PM


    **462**


    A P P E N D I X C ■ S T R U T S T A G R E F E R E N C E


    Attributes


    • name: The name of the attribute that the put defines.


    • value/content: A URL or String representing the content for an attribute. value
    and content are synonymous.


    • beanName/beanProperty/beanScope: Used to locate the object that is interrogated
    in order to determine the value for this put. Refer to Table C-14 for details.
    These attributes can be used instead of value or content.


    • type: Indicates the meaning of the value for this put—is it a URL to a JSP page
    (type="page" or type="template") or a Tiles definition (type="definition" or type="instance")
    or a String (type="string")? If unspecified, implies type="page", unless direct="true",
    in which case, type="string".


    • direct: If set to true, causes value to be interpreted as a literal String instead
    of a reference (URL to a JSP page or Tiles definition) to be evaluated. The default
    is false.


    • role: A role that must match any one of the remote user’s roles in order for
    this put to be processed. For a brief discussion on roles, refer to the entry
    for <logic:present>.


    Examples


    Refer to the examples in the entry for <tiles:definition> to see how put is typically
    used.


    You may also specify the value of a put in its body like so:


    <tiles:put name="myPageTitle">Here''s looking at you!</tiles:put> This form is
    useful when you need to specify text that doesn’t conform to XML’s attribute format.


    **putList and add**


    putList creates a list of items, and specifies a name for that list. One or more
    add tags are nested within a putList, and are used to add elements to the list.


    Usage Restrictions


    You must specify the name attribute for the putList.


    Attributes


    putList has just one attribute, name, which is the name of the list. The add tag
    has exactly the same attributes as <tiles:put>, except that for the name attribute.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048AppC.fm Page 463 Tuesday, January 17, 2006 4:46 PM


    A P P E N D I X C ■ S T R U T S T A G R E F E R E N C E


    **463**


    Examples


    You should understand that putList and add can’t be used to easily customize layout,
    as you could with <tiles:put>. For example, you’d expect to be able to define
    a customization of a layout like so:


    <tiles:insert page="mylayout.jsp">


    <tiles:putList name="sideBarItems">


    <tiles:add value="/sidebar1.jsp"/>


    <tiles:add value="/sidebar2.jsp"/>


    <tiles:add value="/sidebar3.jsp"/>


    </tiles:putList>


    </tiles:insert>


    Then, in the layout page (mylayout.jsp), you’d expect to do this:


    <tiles:importAttribute />


    <logic:iterate name="sideBarItems" id="item">


    <tiles:insert name="item"/> //ERROR!!


    </logic:iterate>'
