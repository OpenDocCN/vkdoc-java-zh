    **write**


    此标签将指定的 bean 属性写入响应流。它允许对给定的 bean 属性进行一些格式化。


    使用限制


    name 属性是必需的。


    属性


    • name/property/scope: 这些属性用于定位具有给定名称以及可选属性和作用域的 JavaBean。如果未指定 scope，则会在所有作用域中搜索命名对象。


    • ignore: 如果为 true，则在未找到命名的 JavaBean 时静默失败。默认值 (false) 会导致抛出异常。


    其余属性用于格式化 bean 的属性：


    • filter: 如果设置为 true，则会导致属性的 String 值被 HTML 编码。例如，与符号 (&) 将被编码为 &，而 > 将被编码为 &gt;。默认值为
    true。


    • format/formatKey: 两者都指定一个用于格式化 bean 属性的格式字符串。format 将其值直接用作格式字符串。formatKey 将其值用作键，以在消息资源文件中查找实际的格式字符串。除非指定了
    locale/bundle 组合，否则将使用当前用户的 locale 和默认的消息资源包。


