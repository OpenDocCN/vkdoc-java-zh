    简单属性是那些隐式地在当前考虑的对象上调用 `getXXX()` 函数的属性。


    Struts 支持其他三种类型的属性：*嵌套*、*索引*和*映射*属性。


    **嵌套属性**允许你引用一个属性的属性。例如，如果在我们之前的例子中，`getCompany()` 的返回值是一个 JavaBean 对象，那么嵌套属性将允许你引用此对象上的一个属性：


    `<bean:write name="contact" property**=**" **company.name**"/>` 正如这里使用的，`<bean:write>`
    尝试显示 `getCompany().getName()` 的返回值。


    **索引属性**类似于简单属性，但它们假设应调用的函数是 `getXXX(int index)` 而不是 `getXXX()`。因此，如果 `contact`
    对象支持 `getCompany(index)` 函数，你可以这样调用它：


    `<bean:write name="contact" property=" **company[41]**"/>` 正如这里使用的，`<bean:write>`
    尝试显示 `getCompany(41)` 的返回值。


    这个例子引出了一个问题，即如何将索引属性与 `<logic:iterator>` 一起使用，例如，显示一个值列表。你可以这样做：


    <logic:iterate name="companies" id="company" indexId="cnt">


    <bean:write name="companies" property=" **company[<%=cnt%>]**"/>


    </logic:iterate>


    这个例子假设 `companies` 对象有一个 `getCompany(index)` 函数。


    这个例子也应该在你的脑海中敲响警钟：它使用了一个脚本小程序！一定有更好的方法——确实有。在这个特定的例子中，你有两个选择：使用 `<forEach>` 和
    `<out>` JSTL 标签（我们稍后会介绍），或者使用 Struts-EL 标签（我们稍后也会介绍），它们是普通 Struts 标签的增强版本：


    <logic-el:iterate name="companies" id="company" indexId="cnt">


    <bean-el:write name="companies" property=" **company[${cnt}]**"/>


    </logic-el:iterate>


    在这个例子中，变化几乎察觉不到，但在更实际的情况下，生成的代码会更容易阅读。


    **映射属性**类似于索引属性，不同之处在于假设调用的函数是 `getXXX(String s)`。例如，如果前面例子中的 `contact` 对象有一个
    `getMobile(String mobileType)` 函数，你可以使用


    `<bean:write name="contact" property=" **mobile(home)**"/>`


    `<bean:write name="contact" property=" **mobile(office)**"/>` 这些例子将分别调用 `getMobile("home")`
    和 `getMobile("office")`。


    你也可以混合使用各种类型的属性：


    [www.it-ebooks.info](http://www.it-ebooks.info/)


