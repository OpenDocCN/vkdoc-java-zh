    C H A P T E R 1 0 ■ M O R E T A G S


    This chapter covers two more Struts tag libraries, and some of the relevant overlaps
    between Struts and JSTL. We’ll also look at an effort to get Struts tags to accept
    EL expressions.


    We’ll describe JSF and Shale in Chapter 20.


    But first, here are a couple of guiding lights to lead the way.


    ## Best Practices


    It’s easy to get lost in the morass of tags and tag libraries, so I’d like you
    to consider two rules of thumb I believe are useful in deciding which tag library
    to go with when you have a choice:


    - **Beware the scriptlet**: Scriptlets are not inherently “evil,” but if you find
    yourself using them to overcome deficiencies in a tag, it’s time to consider scouting
    for an alternative.

    - **Use “custom-built generic solutions”** (pardon the oxymoron): Use generic
    solutions like JSTL whenever possible.


    I hope the rationale behind these two heuristics is obvious. Custom tags are there
    to obviate the need to use scriptlets. So, if you find yourself having to use
    scriptlets, the custom tags you’re using aren’t doing their job well enough.


    ## The 2 + 1 Remaining Struts Libraries


    In Chapter 8, you saw how to use the HTML and Bean tag libraries. There are three
    other Struts tag libraries: the **Logic**, **Nested**, and **Tiles** tag libraries.


    > **Note** In older versions of Struts, prior to 1.2, you might come across a
    “template” tag library. The Tiles library supersedes this older “template” tag
    library.


    In this chapter, we’ll only cover the Logic and Nested tag libraries. The Tiles
    tags warrant an entire chapter of their own (Chapter 14).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


