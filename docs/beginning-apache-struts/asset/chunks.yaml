    onfocus


    元素获得焦点。


    onkeydown


    当元素获得焦点时按下按键。


    onkeypress


    当元素获得焦点时按下并释放按键。


    onkeyup


    当元素获得焦点时释放按键。


    onmousedown


    当指针位于元素上方时按下鼠标按钮。


    onmousemove


    鼠标指针在元素上方移动。


    onmouseout


    鼠标指针离开元素。


    onmouseover


    鼠标指针进入元素。


    onmouseup


    当指针位于元素上方时释放鼠标按钮。


    无障碍属性集


    下一个属性集也与 HTML 相关，这些属性有助于实现无障碍访问。


    表 C-6 列出了这些标签，我们将其称为无障碍属性集，或简称为 **acc-attrs**。


    **表 C-6.** *acc-attrs 属性集*


    **属性名称**


    **用途**


    accesskey


    指定按下后可使此元素获得焦点的按键。


    alt


    指定此元素的替代文本。


    altKey


    指定替代文本的消息资源键。


