    ```


    This is simply an embedding of Java code in the JSP page. Notice the all-important
    equal sign (`=`) right after the start of the scriptlet tag `<%`. This means the
    evaluated value of the Java code is to be displayed. It is also possible to have
    scriptlets that do not display anything but instead produce some side effect,
    as shown in Listing 2-2.


    **Listing 2-2.** *Scriptlets in Action*


    ```

