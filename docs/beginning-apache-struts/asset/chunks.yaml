- fmt: "# `noresize`\n\n- `noresize`: A boolean attribute indicating if this frame\
    \ can be resized (`false`) or if its size is fixed (`true`).\n- `longdesc`: The\
    \ URL to a longer description for this frame. This attribute is a standard HTML\
    \ one, and you should consult an HTML reference for details.\n- `bundle`: Allows\
    \ you to select a message resource file different from the default one. The `bundle`\
    \ attribute is explained in more detail in the entry for `<bean:message>`.\n\n\
    ## Examples\n\nHere’s a page with two frames:\n\n```\n<%@ page contentType=\"\
    text/html;charset=UTF-8\" %>\n<%@ taglib uri=\"/tags/struts-html\" prefix=\"html\"\
    \ %>\n<frameset rows=\"10%,*\">\n  <html:frame action=\"/NavBar.do\" scrolling=\"\
    no\" frameName=\"navbar\" />\n  <html:frame page=\"/index.jsp\" scrolling=\"yes\"\
    \ frameName=\"main\" />\n</frameset>\n```\n\n## Equivalents\n\nNone.\n\n---\n\n\
    # `hidden`\n\nThis tag represents a hidden form field.\n\n## Usage Restrictions\n\
    \nThe `property` attribute is required. It must be a child tag of `<html:form>`.\n\
    \n## Attributes\n\nThe first five common attribute sets (`evt-attrs`, `acc-attrs`,\
    \ `ren-attrs`, `struts-attrs`, and `init-attr`) are accepted, and have their usual\
    \ meanings. Besides these, there is the `write` attribute, which if set to `true`\
    \ causes the value of the hidden field to be displayed. This is useful for debugging.\n\
    \n## Examples\n\nThe code:\n\n```\n<html:hidden property=\"clientId\" />\n```\n\
    \nspecifies a hidden field that holds the value for the property called `clientId`\
    \ on the current form bean.\n\nYou can also specify a `value` attribute like so:\n\
    \n```\n<html:hidden property=\"command\" value=\"update\" />\n```\n\nYour `Action`\
    \ subclass that reads the form data can then dispatch on the hidden value. Look\
    \ at the entry for `<bean:define>` for another useful example.\n\n## Equivalents\n\
    \nJSF’s `<h:inputHidden>` is an equivalent for `<html:hidden>`, but you need to\
    \ enclose it within the Struts-Faces `<s:form>` tag so that the associated form\
    \ bean is populated with the submitted value:\n\n```\n<s:form ...>\n  <h:inputHidden\
    \ id=\"clientId\" binding=\"#{MyFormBean.clientId}\" />\n</s:form>\n```\n\n---\n\
    \n# `html`\n\nThis tag inserts `<html>` and `</html>` tags, with language attributes\
    \ from the current user’s locale.\n\n## Usage Restrictions\n\nNone—if you use\
    \ it, other Struts tags should be nested within it.\n\n## Attributes\n\n- `xhtml`:\
    \ If set to `true`, causes nested Struts tags to render themselves as XHTML 1.0.\
    \ (See also `<html:xhtml>`.)\n- `lang`: (since Struts 1.2.0). If set to `true`,\
    \ puts in a `lang` attribute in the final `<html>` tag. The value is searched\
    \ for in the following order: (1) The current session’s `Locale`, (2) the `accept-language`\
    \ HTTP request header, and (3) the server’s default locale. Consult an HTML reference\
    \ to understand how to use HTML’s `lang` attribute.\n\n## Examples\n\nHere’s how\
    \ to render an XHTML 1.0–conformant page:\n\n```\n<html:html xhtml=\"true\">\n\
    \  ...\n</html:html>\n```\n\n## Equivalents\n\nThe `<s:html>` tag from the Struts-Faces\
    \ integration library is an equivalent.\n\n---\n\n# `image`\n\nThis tag renders\
    \ an HTML image input field. Clicking on the displayed image causes the containing\
    \ form to be submitted.\n\n## Usage Restrictions\n\nThis tag must be inside an\
    \ `<html:form>` tag. You need to specify `src`, `srcKey`, `page`, or `pageKey`.\n\
    \n## Attributes\n\nThe first four common attribute sets (`evt-attrs`, `acc-attrs`,\
    \ `ren-attrs`, and `struts-attrs`) are accepted, and have their usual meanings,\
    \ except for the `property` attribute (explained in a bit). There are a few attributes\
    \ specific to `image`:\n\n- `property`: This specifies the function on the base\
    \ object that returns a JavaBean, which has `setX(int x)` and `setY(int y)` functions,\
    \ to save the (x,y) coordinate of the mouse click for the image input field. If\
    \ you want to use `setX()` and `setY()` on the base object, simply use `property=\"\
    \"`."
  raw: '• noresize: A boolean attribute indicating if this frame can be resized (false)
