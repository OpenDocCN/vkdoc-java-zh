    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C04.fm Page 24\
    \ Monday, December 12, 2005 3:47 PM\n\n**24**\n\n第4章 自定义标签\n\n```\n<%@ taglib\
    \ uri=\"/tags/temperature\" prefix=\"temp\" %>\n```\n\n我们将在下一节中解析这个声明。现在，只需注意前缀是在JSP中定义的。\n\
    \n■**注意** 标签的前缀用于防止标签名冲突。例如，如果你必须使用两个不同标签库中同名的不同标签，你可以为它们指定不同的前缀以区分。因此，前缀是灵活的，你在单个JSP上定义它们。另一方面，标签名不能更改，并在标签的TLD文件中定义。\n\
    \n标签也可以有属性，例如：\n\n```\n<msg:echo message=\"Hi\" />\n```\n\n最后，多个标签可以收集到一个TLD**文件**中。这就是为什么它被称为标签**库**描述符文件。接下来，我们来看一下典型标签的生命周期。\n\
    \n**自定义标签的处理方式**\n\n假设我们有一个包含自定义标签的JSP。它是如何转换为我们在屏幕上看到的文本的呢？当Servlet容器首次解析JSP时，它会遇到自定义标签，例如：\n\
