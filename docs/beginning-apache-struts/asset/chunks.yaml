    在我向您展示如何进行此选择之前，让我们先解决一个遗留问题——翻译后的 `Application.properties` 文件的字符编码。


    **处理翻译后的 `Application.properties` 文件**


    Java 编程语言仅接受 ISO 8859-1 字符编码的源代码和属性文件。这里我指的是实际的源代码——而不是 Java 字符串的内部表示，后者不受此编码限制。


    ISO 8859-1（又名 Latin 1）可以编码大多数西欧语言，并且在大多数情况下与 ASCII 类似。更准确地说，同时存在于 ASCII 和 ISO
    8859-1 中的字符具有相同的字符代码。


    您的 `Application.properties` 文件也必须采用此编码。我们如何用这种受限的编码来表示其他语言？答案是使用一个名为 `native2ascii`
    的工具。该程序位于 JDK 的 `bin` 目录中。


    当您收到翻译后的 `Application.properties` 文件时，它很可能不是 ASCII 或 ISO 8859-1 编码。获取此信息的唯一可靠方法是从翻译人员那里获得。一旦您知道了源编码，就可以使用
    `native2ascii`：

    ```

    native2ascii -encoding UTF-8 jp.properties Application_jp.properties

    ```

    在此示例中，翻译后的文件是 `jp.properties`，它采用 UTF-8 编码。最终输出是 `Application_jp.properties`，您可以实际使用它。


    `native2ascii` 背后的“魔法”在于，它使用字符串的 Unicode 版本“转义”非 ISO 8859-1 字符。这在您的属性文件中显示为 `\uxxxx`
    序列。


    当 Struts 创建要交付给用户的 HTML 页面时，会使用 `<%@ page ...` 指令在页面上指定的编码：

    ```

    <%@ page contentType="text/html; charset=UTF-8" %>

    ```

    或者，您可以在 `struts-config.xml` 中使用 `<controller>` 标签（参见第 9 章）：

    ```

    <controller contentType="text/html; charset=UTF-8" />

    ```

    在这两种情况下，都使用 UTF-8 字符编码来编码交付给用户的 HTML 页面。


