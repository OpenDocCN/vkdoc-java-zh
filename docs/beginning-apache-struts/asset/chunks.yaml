    LILLDEP main page.


    **Figure 5-5.** *The LILLDEP main page*


    Have a look at the three requirements that follow and try to identify the Model-ViewController
    parts that might be relevant. Imagine a possible implementation for each, as I
    did in the previous section, and identify where you might need help to enforce
    strict MVC code separation.


    • **Requirement 1**: A page to collect information about a contact


    • **Requirement 2**: **Code to check contact details (postal code, email, or required
    fields) after submission and display errors**


    **• **Requirement 3**: Code to store and retrieve data into a database


