    (see the start of this section for a definition) as well.


    ## Attributes


    Both `base-attrs` and `exprop-attrs` are accepted. There is also an additional
    `value` attribute, which is a constant value that the property or extended property
    will be compared to.


    ## Examples


    The example that follows shows the use of the `<logic:greaterThan>` tag to conditionally
    process the nested tags (not shown) if the variable `hits` is greater or equal
    to 10:


    ```

    <logic:greaterEqual name="hits" value="10">

    //other tags here.

    </logic:greaterEqual>

    ```


    The next example illustrates the use of the `cookie` attribute:


    ```

    <logic:greaterThan cookie="logintries" value="3">

    <bean:message key= "error.myapp.login.tries-exceeded" />

    </logic:greaterThan>

    ```


    The `<bean:message>` is executed only if the cookie called `logintries` is greater
    than 3.


    ## Equivalents


    You can easily create equivalents for these tags using JSTL’s `<c:if>` or `<c:choose>...<c:when>`.
    For example using `<c:if>`, the previous examples would be:


    ```

    <c:if test="${hits >= 10}">

    //other tags here.

    </c:if>

    ```


    The next example illustrates the use of the `cookie` attribute:


    ```

    <c:if test="${cookie.logintries > 3}">

    //other tags here.

    </c:if>

    ```


    Also note that unlike the Struts tags that only admit a constant value, the JSTL
    equivalents have no such restriction.


    ## `iterate`


    The `<logic:iterate>` tag can be used to iterate over Collections, Maps, Enumerations,
    arrays, or Iterators (referred to as the “iteratable object”). The tags (or static
    text) nested within an `<logic:iterate>` are executed into the JSP’s response
    stream (i.e., written to the final HTML page).


    ### Usage Restrictions


    The `id` attribute is required. You must also specify the iteratable object (using
    either the `name`/`property` attributes or the `collection` attribute).


    ### Attributes


    The `iterate` tag uses `base-attrs` to specify the base object that represents
    the Collection/Map/Enumeration/array/Iterator to iterate over. Besides these,
    several other attributes can be used:


    - `collection`: The `name`/`property` combination only allows you to loop over
    iteratable objects that may be read as JavaBean properties. This can be quite
    restrictive. For example:


    ```

    <logic:iterate name="MyBean" property="myCollection" ...

    ```


    implicitly calls the function `MyBean.getMyCollection()` in order to determine
    the iteratable object. Many Java classes however, do not use the JavaBeans `getXXX()`
    convention, so a different approach is needed for them. The solution is to use
    the `collection` attribute in combination with a scriptlet:


    ```

    <logic:iterate collection="<%=MyObject.iterator()%>" ...

    ```


    - `id`: This is the name given to a single element read from the iteratable object.

    - `indexId`: The current index; starts from zero.

    - `length`: The maximum number of elements to read from the iteratable object.
    If not present, all elements are read.

    - `offset`: The index of the first element to return from the iteratable object.
    For example, if the iteratable object is an array `[a, b, c]`, using `offset="1"`
    makes the loop read `b` and `c` only. Note that the offset is zero based, as it
    is in Java.

    - `type`: The fully qualified classname of the elements read from the iteratable
    object. If an element doesn’t match this classname, a `ClassCastException` is
    thrown.


    ### Examples


    Here’s the basic usage:


    ```

    <logic:iterate name="MyBean" property="myCollection" id="anElement">

    <bean:write name="anElement" />

    </logic:iterate>

    ```


    and with the `collection` attribute:


    ```

    <logic:iterate collection="<%=MyObject.iterator()%>" id="anElement">

    <bean:write name="anElement" />

    </logic:iterate>

    ```'
