    **343**


    does *not* get instantiated when you click the browser’s refresh button after
    successfully registering.


    This can be easily fixed by fooling JSF to create the necessary form bean for
    you. You do this by creating a blank faces-config.xml file, then putting in a
    <managed-bean> section with the bean name exactly the same as the one in struts-config.xml
    (in our case, it’s RegistrationForm).


    This is a kludge, and I’m sure the problem will be addressed in future iterations
    of the Struts-Faces library.


    **In a Nutshell**


    We’ve only scratched the surface of the Struts-Faces integration library in this
    lab session.


    If you’re interested, you should try out the sample apps that come with the distribution.


    You may also have noticed that except for using ActionErrors you don’t have to
    amend the Action or ActionForm subclasses of your app. This of course is a huge
    plus, and is in most cases much more desirable than migrating to a whole new framework
    like Shale.


    However, you should be aware that the Struts-Faces library won’t always work.
    In an initial draft for this section, I attempted to migrate the login webapp
    of Chapter 14, only to discover that you can’t port Tiles that forward their views
    to other JSPs, which is what the login webapp does. This is probably a JSF restriction,
    so it’s difficult to see how such issues might be resolved in future versions
    of the Struts-Faces library. It might be possible to amend the Tiles tags so that
    they work better with the Struts-Faces integration library.


    The lesson here is that you need a new framework that addresses such issues—a
    reworking of Struts from the ground up. That’s what Shale is all about.


    **Struts Shale Preview**


    As we’ve mentioned before, Shale is based on JSF. This means it inherits all of
    JSF’s advantages, like a highly customizable View tier. But Shale adds many benefits
    on top of JSF.


    In this section, we’ll walk you through the primary value-added areas of Shale.
    These fall into two broad categories:


    • A set of services and service options. (Don’t confuse these with web services.
    The services here are akin to Struts plug-ins, and service options are simply
    ways to configure Shale and its services.) Services include integration with the
    Validator framework and a reworking of Tiles, now called “Clay.” A significant
    new addition on top of these is Shale’s Dialog Manager, which makes control flow
    more transparent. The services were designed with customization in mind, so Shale
    is easier to customize and extend compared with Struts.


    • Integration with other frameworks and technologies (Spring, Ajax, JNDI, etc.).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


