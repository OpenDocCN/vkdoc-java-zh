- fmt: "I’ll describe these tags in more detail as I show you how to use and extend\
    \ the `Validator` framework.\n\n## Using the Validator Framework\n\nUsing the\
    \ `Validator` framework is easy:\n\n- For each form bean needing validation, you\
    \ add a new `<form>` tag to your `validation.xml` file. The `name` attribute of\
    \ the `<form>` should be the same as the name of the form bean.\n- For each field\
    \ requiring validation in the form bean, you add a `<field>` subtag to the `<form>`.\
    \ The `property` attribute of the `<field>` tag should be the same as the name\
    \ of the field you want to validate. The `property` attribute supports nested\
    \ fields (see Chapter 10 for details on nested fields/properties).\n- The `<field>`\
    \ tag also has a `depends` attribute, with which you specify the validations you\
    \ want to run for this field. The names of the validations are specified as a\
    \ comma-delimited list.\n- The `<field>` tag may contain optional subtags for\
    \ custom error messages or variables used by a validator (e.g., minimum length\
    \ of a field).\n- Ensure that your form bean is a subclass of `org.apache.struts.validator.ValidatorForm`.\n\
    \nThat’s it! To see how this works, let’s explore how you’d use the `Validator`\
    \ framework to validate `RegistrationForm`, the only form bean for the Registration\
    \ webapp (see Listing 6-1 in Chapter 6).\n\n## Example: Validating RegistrationForm\n\
    \n`RegistrationForm` (refer to Listing 6-1) has three fields that need to be validated.\
    \ In this section, I’ll create a version of `RegistrationForm` that uses the `Validator`\
    \ framework. The new `RegistrationForm.java` class is shown in Listing 15-4.\n\
    \n**Listing 15-4.** *RegistrationForm.java for the Validator Framework*\n\n```java\n\
    package net.thinksquared.registration.struts;\n\nimport org.apache.struts.validator.*;\n\
    \npublic final class RegistrationForm extends ValidatorForm{\n\n    private String\
    \ _userid = null;\n    private String _pwd = null;\n    private String _pwd2 =\
    \ null;\n\n    /**\n     * getXXX and setXXX functions\n     * corresponding to\
    \ form properties\n     */\n    public String getUserid(){ return _userid; }\n\
    \    public void setUserid(String userid){ _userid = userid; }\n    public String\
    \ getPassword(){ return _pwd; }\n    public void setPassword(String pwd){ _pwd\
    \ = pwd; }\n    public String getPassword2(){ return _pwd2; }\n    public void\
    \ setPassword2(String pwd2){ _pwd2 = pwd2; }\n}\n```\n\nIf you compare Listing\
    \ 15-4 with Listing 6-1, you’ll notice a couple of changes:\n\n- `RegistrationForm`\
    \ now extends `org.apache.struts.validator.ValidatorForm` instead of `org.apache.struts.action.ActionForm`.\n\
    - The `validate()` function has disappeared.\n\nYou need to subclass `ValidatorForm`\
    \ because this base class will run validations declared in your `validation.xml`\
    \ file. This also explains the disappearance of the `validate()` function—Struts\
    \ will call `validate()` on `ValidatorForm` instead.\n\n> **Note** The form bean\
    \ declaration for `RegistrationForm` would be unchanged.\n\nTo understand how\
    \ to declare validations, consider that `RegistrationForm` has three fields: `userid`,\
    \ `password`, and `password2`. The checks run in Listing 6-1 are to ensure that\
    \ the `userid` is filled in and that `password` and `password2` match.\n\nThese\
    \ validations are hardly complete. We’ll add a max/min check for the `userid`\
    \ and `password`, and a check that `userid` and `password` are restricted to alphanumerics.\
    \ The `validation.xml` file incorporating all these checks appears in Listing\
    \ 15-5.\n\n**Listing 15-5.** *Declaring Validations for RegistrationForm*\n\n\
    ```xml\n<?xml version=\"1.0\" encoding=\"ISO-8859-1\" ?>\n<!DOCTYPE form-validation\
    \ PUBLIC ... *//* truncated for clarity\n\n<form-validation>\n    <formset>\n\
    \        <form name=\"RegistrationForm\">\n            <field property=\"userid\"\
    \n                   depends=\"required,mask,maxLength,minLength\">\n        \
    \        <msg name=\"required\" key=\"reg.error.userid.missing\" />\n        \
    \        <msg name=\"mask\" key=\"reg.error.userid.alphanum\"/>\n```"
  raw: 'I’ll describe these tags in more detail as I show you how to use and extend
    the Validator framework.


    **Using the Validator Framework**


    Using the Validator framework is easy:


    • For each form bean needing validation, you add a new <form> tag to your validation.xml
    file. The name attribute of the <form> should be the same as the name of the form
    bean.


    • For each field requiring validation in the form bean, you add a <field> subtag
    to the


    <form>. The property attribute of the <field> tag should be the same as the name
    of the field you want to validate. The property attribute supports nested fields
    (see Chapter 10 for details on nested fields/properties).


    • The <field> tag also has a depends attribute, with which you specify the validations
    you want to run for this field. The names of the validations are specified as
    a comma-delimited list.


    • The <field> tag may contain optional subtags for custom error messages or variables
    used by a validator (e.g., minimum length of a field).


    • Ensure that your form bean is a subclass of org.apache.struts.validator.


    ValidatorForm.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C15.fm Page 199 Tuesday, January 24, 2006 10:13 AM


    C H A P T E R 1 5 ■ T H E V A L I D A T O R F R A M E W O R K


    **199**


    That’s it! To see how this works, let’s explore how you’d use the Validator framework
    to validate RegistrationForm, the only form bean for the Registration webapp (see
    Listing 6-1 in Chapter 6).


    **Example: Validating RegistrationForm**


    RegistrationForm (refer to Listing 6-1) has three fields that need to be validated.
    In this section, I’ll create a version of RegistrationForm that uses the Validator
    framework. The new RegistrationForm.java class is shown in Listing 15-4.


    **Listing 15-4.** *RegistrationForm.java for the Validator Framework* package
    net.thinksquared.registration.struts;


    import org.apache.struts.validator.*;


    public final class RegistrationForm extends ValidatorForm{


    private String _userid = null;


    private String _pwd = null;


    private String _pwd2 = null;


    /**


    * getXXX and setXXX functions


    * corresponding to form properties


    */


    public String getUserid(){ return _userid; }


    public void setUserid(String userid){ _userid = userid; }


    public String getPassword(){ return _pwd; }


    public void setPassword(String pwd){ _pwd = pwd; }


    public String getPassword2(){ return _pwd2; }


    public void setPassword2(String pwd2){ _pwd2 = pwd2; }


    }


    If you compare Listing 15-4 with Listing 6-1, you’ll notice a couple of changes:


    • RegistrationForm now extends org.apache.struts.validator.ValidatorForm instead
    of org.apache.struts.action.ActionForm.


    • The validate() function has disappeared.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C15.fm Page 200 Tuesday, January 24, 2006 10:13 AM


    **200**


    C H A P T E R 1 5 ■ T H E V A L I D A T O R F R A M E W O R K


    You need to subclass ValidatorForm because this base class will run validations
    declared in your validation.xml file. This also explains the disappearance of
    the validate() function—


    Struts will call validate() on ValidatorForm instead.


    ■**Note** The form bean declaration for RegistrationForm would be unchanged.


    To understand how to declare validations, consider that RegistrationForm has three
    fields: userid, password, and password2\. The checks run in Listing 6-1 are to
    ensure that the userid is filled in and that password and password2 match.


    These validations are hardly complete. We’ll add a max/min check for the userid
    and password, and a check that userid and password are restricted to alphanumerics.
    The validation.xml file incorporating all these checks appears in Listing 15-5.


    **Listing 15-5.** *Declaring Validations for RegistrationForm*


    <?xml version="1.0" encoding="ISO-8859-1" ?>


    <!DOCTYPE form-validation PUBLIC ... *//* truncated for clarity


    <form-validation>


    <formset>


    <form name="RegistrationForm">


    <field property="userid"


    depends="required,mask,maxLength,minLength">


    <msg name="required" key="reg.error.userid.missing" />


    <msg name="mask" key="reg.error.userid.alphanum"/>'
  trans: "\n在向您展示如何使用和扩展 Validator 框架时，我将更详细地描述这些标签。\n\n**使用 Validator 框架**\n\n使用\
    \ Validator 框架非常简单：\n\n• 对于每个需要验证的表单 bean，您需要在 `validation.xml` 文件中添加一个新的 `<form>`\
    \ 标签。`<form>` 标签的 `name` 属性应与表单 bean 的名称相同。\n\n• 对于表单 bean 中每个需要验证的字段，您需要在 `<form>`\
    \ 标签内添加一个 `<field>` 子标签。`<field>` 标签的 `property` 属性应与您要验证的字段名称相同。`property` 属性支持嵌套字段（有关嵌套字段/属性的详细信息，请参阅第\
    \ 10 章）。\n\n• `<field>` 标签还有一个 `depends` 属性，您可以使用该属性指定要为此字段运行的验证。验证的名称以逗号分隔的列表形式指定。\n\
    \n• `<field>` 标签可能包含可选的子标签，用于自定义错误消息或验证器使用的变量（例如，字段的最小长度）。\n\n• 确保您的表单 bean 是\
    \ `org.apache.struts.validator.ValidatorForm` 的子类。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nDoray_6048C15.fm 第 199 页 2006 年 1 月 24 日，星期二，上午 10:13\n\n第 15 章 ■ VALIDATOR\
    \ 框架\n\n**199**\n\n就是这样！为了了解其工作原理，让我们探讨如何使用 Validator 框架来验证 `RegistrationForm`，这是\
    \ Registration webapp 的唯一表单 bean（参见第 6 章中的清单 6-1）。\n\n**示例：验证 RegistrationForm**\n\
    \n`RegistrationForm`（参见清单 6-1）有三个需要验证的字段。在本节中，我将创建一个使用 Validator 框架的 `RegistrationForm`\
    \ 版本。新的 `RegistrationForm.java` 类如清单 15-4 所示。\n\n**清单 15-4.** *用于 Validator 框架的\
    \ RegistrationForm.java*\n```java\npackage net.thinksquared.registration.struts;\n\
    \nimport org.apache.struts.validator.*;\n\npublic final class RegistrationForm\
    \ extends ValidatorForm{\n\n    private String _userid = null;\n    private String\
    \ _pwd = null;\n    private String _pwd2 = null;\n\n    /**\n     * 与表单属性对应的 getXXX\
    \ 和 setXXX 函数\n     */\n    public String getUserid(){ return _userid; }\n   \
    \ public void setUserid(String userid){ _userid = userid; }\n    public String\
    \ getPassword(){ return _pwd; }\n    public void setPassword(String pwd){ _pwd\
    \ = pwd; }\n    public String getPassword2(){ return _pwd2; }\n    public void\
    \ setPassword2(String pwd2){ _pwd2 = pwd2; }\n}\n```\n\n如果将清单 15-4 与清单 6-1 进行比较，您会注意到一些变化：\n\
    \n• `RegistrationForm` 现在继承自 `org.apache.struts.validator.ValidatorForm`，而不是 `org.apache.struts.action.ActionForm`。\n\
    • `validate()` 函数已经消失。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
    Doray_6048C15.fm 第 200 页 2006 年 1 月 24 日，星期二，上午 10:13\n\n**200**\n\n第 15 章 ■ VALIDATOR\
    \ 框架\n\n您需要继承 `ValidatorForm`，因为此基类将运行您在 `validation.xml` 文件中声明的验证。这也解释了 `validate()`\
    \ 函数消失的原因——Struts 将改为调用 `ValidatorForm` 上的 `validate()` 方法。\n\n■**注意** `RegistrationForm`\
    \ 的表单 bean 声明将保持不变。\n\n为了理解如何声明验证，请考虑 `RegistrationForm` 有三个字段：`userid`、`password`\
    \ 和 `password2`。清单 6-1 中运行的检查是为了确保 `userid` 已填写，并且 `password` 和 `password2` 匹配。\n\
    \n这些验证并不完整。我们将为 `userid` 和 `password` 添加最大/最小长度检查，并检查 `userid` 和 `password` 是否仅限于字母数字字符。包含所有这些检查的\
    \ `validation.xml` 文件如清单 15-5 所示。\n\n**清单 15-5.** *为 RegistrationForm 声明验证*\n\n\
    ```xml\n<?xml version=\"1.0\" encoding=\"ISO-8859-1\" ?>\n<!DOCTYPE form-validation\
    \ PUBLIC ... *//* 为清晰起见已截断\n\n<form-validation>\n    <formset>\n        <form\
    \ name=\"RegistrationForm\">\n            <field property=\"userid\"\n       \
    \         depends=\"required,mask,maxLength,minLength\">\n                <msg\
    \ name=\"required\" key=\"reg.error.userid.missing\" />\n                <msg\
    \ name=\"mask\" key=\"reg.error.userid.alphanum\"/>\n```"
- fmt: "```xml\n<msg name=\"minLength\" key=\"reg.error.userid.length\" />\n<msg name=\"\
    maxLength\" key=\"reg.error.userid.length\" />\n<arg name=\"minLength\" key=\"\
    ${var:minlength}\" position=\"0\" resource=\"false\" />\n<arg name=\"minLength\"\
    \ key=\"${var:maxlength}\" position=\"1\" resource=\"false\" />\n<arg name=\"\
    maxLength\" key=\"${var:minlength}\" position=\"0\" resource=\"false\" />\n<arg\
    \ name=\"maxLength\" key=\"${var:maxlength}\" position=\"1\" resource=\"false\"\
    \ />\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C15.fm Page\
    \ 201 Tuesday, January 24, 2006 10:13 AM\n\n# CHAPTER 15 ■ THE VALIDATOR FRAMEWORK\n\
    \n**201**\n\n```xml\n<var>\n  <var-name>mask</var-name>\n  <var-value>^[a-zA-Z0-9]*$</var-value>\n\
    </var>\n<var>\n  <var-name>minlength</var-name>\n  <var-value>5</var-value>\n\
    </var>\n<var>\n  <var-name>maxlength</var-name>\n  <var-value>10</var-value>\n\
    </var>\n</field>\n\n<field property=\"password\" depends=\"required,mask,maxLength,minLength\"\
    >\n  // similar to validations for userid,\n  // omitted for clarity.\n</field>\n\
    \n<field property=\"password2\" depends=\"validwhen\">\n  <msg name=\"validwhen\"\
    \ key=\"reg.error.password.mismatch\" />\n  <var>\n    <var-name>test</var-name>\n\
    \    <var-value>(password == *this*)</var-value>\n  </var>\n</field>\n</form>\n\
    </formset>\n</form-validation>\n```\n\nAs you can see, there’s just one `<formset>`\
    \ tag and this means that we haven’t localized any validations. Don’t get me wrong—the\
    \ *error messages* are localized, since Listing 15-5 obviously uses keys from\
    \ the properties file. But the validations themselves are not localized. To understand\
    \ the difference, refer to the discussion on “Localizing Validations” in Chapter\
    \ 12. Most of the time, you won’t be localizing validations, so your `validation.xml`\
    \ file will contain just one `<formset>` tag. I’ll describe how to use multiple\
    \ `<formset>` tags to help you localize validations toward the end of this chapter.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C15.fm Page 202\
    \ Tuesday, January 24, 2006 10:13 AM\n\n**202**\n\n## CHAPTER 15 ■ THE VALIDATOR\
    \ FRAMEWORK\n\nThe nested `<form>` tag is where the action happens. In Listing\
    \ 15-5, there’s just one `<form>` tag, corresponding to the `RegistrationForm`\
    \ form bean that needs validating. If you had other form beans that needed validating,\
    \ then the `<formset>` would contain more `<form>` tags, one for each of these\
    \ form beans.\n\nThe validations for each field are done separately. The validations\
    \ for the `password` field are very similar to the ones for `userid`, so I’ve\
    \ left this field out. From the `<field>` declaration for the `userid` field,\
    \ you can tell I’ve run four validations:\n\n```xml\n<field property=\"userid\"\
    \ depends=\"required,mask,maxLength,minLength\">\n```\n\nThe `required` validator\
    \ checks that the field is filled in by the user. It requires no extra information\
    \ to run. If the `required` validator fails, the following `<msg>` tag\n\n```xml\n\
    <msg name=\"required\" key=\"reg.error.userid.missing\" />\n```\n\nensures that\
    \ the error message specified by the key `reg.error.userid.missing` is displayed.\n\
    \nIt’s possible (but not advisable) to force the display of a static string using\
    \ the `resource=\"false\"` attribute:\n\n```xml\n<msg name=\"required\" key=\"\
    Userid is missing!\" resource=\"false\" />\n```\n\nThe `mask` validator checks\
    \ that the field’s value matches a given regular expression.\n\n> **Note:** A\
    \ regular expression is a way to compactly express any string. For example, the\
    \ DOS regular expression `*.*` matches all filenames with an extension. Regular\
    \ expression languages vary by provider, so `*.*` will **not** match every filename\
    \ with an extension if used in the Validator framework. The Validator framework\
    \ uses a much more powerful regular expression language, similar to the one used\
    \ in the Perl programming language. Refer to the “Useful Links” section at the\
    \ end of this chapter for a reference.\n\nThis regular expression is given in\
    \ a `var` tag:\n\n```xml\n<var>\n  <var-name>mask</var-name>\n  <var-value>^[a-zA-Z0-9]*$</var-value>\n\
    </var>\n```\n\nThis declares a *variable* named `mask`, with the value `^[a-zA-Z0-9]*$`.\
    \ The `mask` *validator* requires this variable to be defined in order to work.\
    \ In this case, the regular expression matches alphanumeric strings (strings containing\
    \ roman alphabets and Arabic numerals, 0 through 9).\n\nSimilarly, the `maxLength`\
    \ and `minLength` validators require variables `maxlength` and `minlength`, respectively.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C15.fm Page 203\
    \ Tuesday, January 24, 2006 10:13 AM\n\n## CHAPTER 15 ■ THE VALIDATOR FRAMEWORK\n\
    \n**203**\n\nThe error messages for these checks require some explanation. For\
    \ example, the custom error message for `minLength` is declared by\n\n```xml\n\
