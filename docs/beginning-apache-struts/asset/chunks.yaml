    preceding discussion you realize that there’s no such thing as “plain text”!


    Any textual data has an implicit character encoding. In the Western world, this
    might be ASCII.


    The important thing to understand is that you can either *assume* an encoding—most
    programs and software assume an encoding, like ASCII—or you can make an encoding
    explicit, as is the case in the headers of XML or HTML documents. However, ensuring
    that the *declared* encoding matches the *actual* encoding (done by the text editor)
    is a separate issue.


    Lastly, just as it’s possible for the binary value of a Java integer to be displayed
    as a string, it’s possible for the numeric identifier of a Unicode character to
    be displayed as a string. These are usually displayed in the ASCII encoding as
    a hexadecimal number, like


    \u7528\. This partially circumvents the problem of “using” Unicode in legacy software.


    You’ll learn more about this in a later section (“Localizing Output”). *Do not*
    confuse this ASCII representation of the Unicode numeric identifier with UTF-8.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C12.fm Page 146 Thursday, January 12, 2006 11:04 AM


    **146**


    C H A P T E R 1 2 ■ I N T E R N A T I O N A L I Z A T I O N


    **Locales**


    In the previous section, I described how using Unicode and the UTF-8 encoding
    would allow client-server programs to communicate data in any language.


    However, this isn’t quite enough. What’s needed is a mechanism for users to *select*
    the language they want. For example, if you are a Chinese speaker, you might want
    to ask my web application to be presented to you in Chinese.


    **Locales** are a widely used mechanism to achieve this. A locale is an identifier
    for a language or a variant of a language. For example, the identifier for U.S.
    English is en_US


    and the identifier for Swahili is sw.


    The local strings themselves are a combination of language code and possibly country
    code. The language code is a two-letter string from the ISO 639 standard. The
    country code (e.g., the US in en_US) is taken from the ISO 3166 standard. Notice
    that the two-letter language code is in lowercase and the two-letter country code
    is in uppercase, joined by an underscore.


    Essentially, the web browser specifies the desired locale as an extra parameter
    in the HTTP header. The server responds by sending that user all pages in that
    locale, if possible.


    Locales are the primary basis for localization in Struts. All of the internationalization
    features of Struts are geared toward easy customization of your application by
    locale.


    You’ll see this in action in this as well as future chapters.


    Now that you understand the basics of character encodings, Unicode, UTF-8, and
    locales, it’s time to move on to address the three primary areas of concern you’ll
    encounter when you attempt to localize your Struts web application.


    **Processing Input**


    Web browsers might use a variety of character encodings, depending on the user’s
    default locale or preferences. Since the input data you’re going to work with
    comes from a web browser, your webapp potentially has to handle arbitrary character
    encodings.


    Now, the last thing you want to do is accept and process different character encodings.


    And why not? Suppose you store text from different encodings in your database.
    How will you ever know later which encoding they come from? You’d have to store
    the encoding information along with the each textual data you save. Not pretty.


    The obvious solution is to use a single encoding that handles *all* languages—like
    UTF-8.


    However, here you run into a problem: there’s *no way* to fix the character encoding
    you receive from the user’s web browser. Browsers will submit form data in any
    old character encoding and there’s just no way around this.


    ■**Note** With the HTML 4.0 specification, web servers can set the accept-charset
    parameter in the HTTP


    response, but most browsers will ignore this.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C12.fm Page 147 Thursday, January 12, 2006 11:04 AM


    C H A P T E R 1 2 ■ I N T E R N A T I O N A L I Z A T I O N


    **147**


    One reasonable assumption you can make is that browsers will respond with the
    same encoding they receive from the server. So, if your HTML form is in UTF-8,
    it’s a safe bet that the responses will be in UTF-8 too. This isn’t always true,
    since web browsers offer users the option to change the default encoding.


    So, here’s a good rule to stick to. *Use a single, universal character encoding
    (like UTF-8)* *consistently throughout your application, in every JSP, HTML, XML
    page, and so forth.*


    For your JSPs you could use the <%@ page declaration:


    <%@ page contentType="text/html; **charset=UTF-8**" %> or you could use the <controller>
    tag in your struts-config.xml (see Chapter 9):


    <controller contentType="text/html; **charset=UTF-8**" /> This second method means
    you need not embed the <%@ page declaration in all your JSPs.


    Of course, this trick wouldn’t work if you call the JSP bypassing Struts. If you’re
    calling the JSP by its name (e.g., myPage.jsp), you’re bypassing Struts. If the
    page is delivered from a


    <forward> or a .do extension, then you are not bypassing Struts, and the trick
    will work.


    For your static HTML pages, you could use the <meta> tag to specify the encoding:


    <head>


    <meta http-equiv="content-type" content="text/html; charset=UTF-8">


    </head>


    You have to exercise caution here, because you must ensure that the actual encoding
    of the HTML file (determined by your text editor that writes the HTML) is the
    same as the declared encoding (declared in the <meta> tag). There’s no way to
    tell what encoding a browser will respond with if given a form that says it’s
    in UTF-8 but that is really in another encoding.


    **Localizing Validations**


    By “localizing validations,” I mean performing validations specific to a locale.
    For example, if a German user (locale de) keyed in a date, you might want to validate
    the input according to the format dd.mm.yyyy. For a U.S.-based user, you might
    use a different format, probably mm/dd/yyyy.'
