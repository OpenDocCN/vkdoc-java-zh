    In my opinion, these and the advantages of JSF make Shale a worthy successor of
    Struts. Unfortunately, technical superiority alone does not guarantee survival,
    and for the reasons we’ve outlined in the sidebar at the start of this chapter
    (“Struts Ti and Struts OverDrive”), Shale’s “successorship” from Struts classic
    is by no means a done deal.


    **ViewController**


    In JSF, backing beans are Plain Old Java Objects (POJOs). This gives you a lot
    of flexibility in creating your backing beans, but it also means that your beans
    have to do a lot of things


    “by hand.”


    A good example is a realistic implementation of the user backing bean (see Listing
    20-10).


    In my implementation, I used a HashMap to simulate a database. In an actual implementation,
    you might have to create and release database connections, and these might be
    best centralized instead of being repeated in functions like Logon() and Register().


    Shale provides an *interface* called ViewController (see Listing 20-13), which
    contains a few event-handling functions and a variable called postback.


