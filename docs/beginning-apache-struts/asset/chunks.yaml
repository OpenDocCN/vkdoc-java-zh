    本质上，`DefaultDynaFormsLoader` 的 `getLoader()` 方法首先从给定文件中读取所有表单 bean：


    Beans beans = readBeans(filename);


    `beans` 对象是一个 `Bean` 对象集合（参见清单 19-16），这些 `Bean` 对象又可能包含 `Property` 对象（参见清单 19-17）。`beans`
    对象对应于 `<form-beans>` 根标签。`Bean` 类对应于一个 `<form-bean>` 声明，而 `Property` 类对应于 `<form-bean>`
    内部的 `<form-property>` 标签。


    此时，bean 容器中的每个 bean 对象都是*未解析的*，这意味着 bean 的继承属性尚未确定。接下来的代码正是处理此问题：


    for(Iterator beanz = beans.values().iterator(); beanz.hasNext();){


    Bean b = resolve(beans, (Bean)beanz.next());


    if(b.getCreate()){


    config.addFormBeanConfig(createFormBeanConfig(b));


    }


    }


    这段代码遍历 bean 容器中的所有 bean 对象，解析每个 bean，然后根据解析后的 bean 创建一个 `FormBeanConfig` 实例。最后，通过
    `addFormBeanConfig()` 将此 `FormBeanConfig` 对象添加到 `ModuleConfig` 实例中。


    请注意：


    • `resolve()` 函数递归地将一个 bean 的属性与其祖先 bean 的属性合并。属性的实际合并操作在 `bean.merge()` 中执行（参见清单
    19-16）。


    • `createFormBeanConfig()` 根据给定的已解析 bean 创建一个 `FormBeanConfig` 对象。

