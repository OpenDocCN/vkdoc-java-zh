    **示例：“登录”Tiles**


    Tiles 组件非常有用。如果使用得当，它们可以极大地简化你的代码和代码维护。


    到目前为止，我们的讨论有点抽象，这也很合理，因为创建和使用 Tiles 组件有多种方式，我希望你能对整个事情有一个全局的概览。


    在本节中，我将介绍如何将我们的老朋友——Registration Web 应用——制作成一个 Tiles 组件。为什么要这样做？因为它让你可以自由地将用户登录功能放置在你的
    Web 应用的任何位置。如果用户需要在你的 Web 应用的多个地方登录，那么为用户登录创建一个 Tiles 组件将是一个自然的选择。


    我实际要实现的，是 Registration Web 应用的一个非平凡变体。


