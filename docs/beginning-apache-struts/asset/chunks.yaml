    **111**


    在清单 10-2 中，列出了每个联系人的姓名、公司和电话号码。


    `<logic:iterate>` 标签有三个主要属性：


    *   `name`：引用你放置在请求上的可迭代对象。在此实例中，它是 `search_results`。

    *   `id`：指定一个名称，代表可迭代对象上的单个元素。在这种情况下，`id` 是 `contact`。即使你不使用它，此属性也是必需的。

    *   `indexId`（可选）：指定一个代表当前迭代次数的数字。我在这里使用它的唯一原因是为了使用 `<bean:write>` 写出迭代次数。当你想要使用*索引属性*时，`indexId`
    很重要，我将在下一节中讨论这个主题。


    `<bean:write>` 写出给定联系人的姓名、公司和电话。


    请注意，`<bean:write>` 的 `name` 属性引用了由 `<logic:iterate>` 的 `id` 属性暴露的单个元素。有关 `<bean:write>`
    的详细说明，请参考附录 C。


    **遍历 HASHMAPS**


    如果可迭代对象是 `HashMap` 或实现了 `Map` 的类，则元素是 `Map.Entry` 的实例。此接口包含 `getKey()` 和 `getValue()`
    函数，因此你可以使用


    `<bean:write name="xxx" **property="key"** />` 来显示键，以及


    `<bean:write name="xxx" **property="value"** />` 来显示对应的值。


    我想重申（请原谅这个双关语），`<logic:iterate>` 提供的功能与 JSTL 的 `<forEach>` 标签有重叠。我们将在后面的章节中讨论这一点。


    **简单、嵌套、索引和映射属性**


    许多 Struts 标签接受一个 `property` 属性，该属性引用它们所操作对象上的一个属性。我们已经在实践中看到了这一点，例如，在上一节的 `<bean:write>`
    标签中：


    `<bean:write name="contact" property="company"/>` 正如这里使用的，`<bean:write>` 尝试显示在名为
    `contact` 的对象上调用的 `getCompany()` 的返回值。这是一个*简单属性*的示例。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C10.fm 第 112 页 2006 年 1 月 24 日星期二 上午 10:12


