    and then use a <tiles:insert definition="..."> anywhere on your JSP page. For
    example, to use the Tiles component declared in either Listing 14-12 or Listing
    14-13, use the following:


    <tiles:insert definition=".myTile"/>


    You can also specify further attributes for the view page by using nested <tiles:put>
    tags, as in Listing 14-6.


    **Example: The “Login” Tiles**


    Tiles components are very useful. Used wisely, they can greatly simplify your
    code and code maintenance.


    Now, the discussion so far has been a little abstract, and rightly so, because
    there are a few ways to create and use Tiles components, and I wanted you to have
    a bird’s-eye view of the whole thing.


    In this section, I’ll describe how our old friend the Registration webapp can
    be made into a Tiles component. Why do this? Because it gives you the freedom
    to place a user login anywhere on your webapp. If a user must log in several places
    in your webapp, then a Tiles component for user login would be a natural choice.


    What I’ll actually implement is a nontrivial variation on the Registration webapp.


    Figure 14-2 describes the control flow of this new souped-up version, perhaps
    better named a “Login” Tiles component.


