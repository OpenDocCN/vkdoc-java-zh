    **389**


    等价标签


    JSF 的 `<h:commandButton>` 功能更强大，允许你通过 `action` 属性轻松将按钮链接到服务器端函数：


    <h:commandButton action="#{myManagedBean.myFunction}" ...


    当然，要在 Struts 中使用此标签，你需要将其嵌入到 Strut-Faces 的 `<s:form>` 标签中。有关 `<h:commandButton>`
    和 `<s:form>` 的详细信息，请参阅第 20 章。


    **cancel**


    此标签在表单上显示一个“取消”按钮。点击此按钮会提交包含它的表单，但会跳过简单验证。不过，为了显示“下一个”页面，会调用表单 Action 的 `execute()`
    函数。这当然意味着 Action 子类必须包含特殊逻辑来判断“取消”按钮是否被点击（详见本节“示例”部分）。


    当表单数据提交时，“取消”按钮上显示的文本会作为请求 URL 的参数发送。


    使用限制


    此标签必须位于 `<html:form>` 标签内部。*不得*指定 `property` 属性。


    如果指定了该属性，Struts 将无法识别此按钮为“取消”按钮。


