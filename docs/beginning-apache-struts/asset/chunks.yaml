- fmt: "**Note** Despite what the current Apache Struts online documents say, the\
    \ value of the button is not sent as a URL parameter.\n\nIf you want to display\
    \ a button defined by a graphic, then use `<html:image>` instead.\n\n## Usage\
    \ Restrictions\n\nThis tag must be inside an `<html:form>` tag. You must specify\
    \ the `property` attribute.\n\n## Attributes\n\nThe first four attribute sets\
    \ (`evt-attrs`, `acc-attrs`, `ren-attrs`, and `struts-attrs`) are accepted.\n\n\
    The only required attribute is `property`. If `value` isn’t specified and if there\
    \ is no text rendered in the body of the `<html:button>`, then the button text\
    \ defaults to “Click”.\n\n## Examples\n\nThis snippet will render an HTML button\
    \ with the text label “Click”, which calls the JavaScript function `changeMode()`\
    \ when clicked:\n\n```\n<html:button onclick=\"changeMode(src)\" property=\"button1\"\
    \ />\n```\n\nIn this snippet, the imaginary JavaScript function might determine\
    \ which button was clicked by using the test `src.name == \"button1\"`.\n\nThe\
    \ next example shows three buttons, all of which have the text “Click Me”. The\
    \ last button uses an `<html:bean>` to localize its text:\n\n```\n<html:button\
    \ property=\"button1\" value=\"Click Me\" />\n\n<html:button property=\"button2\"\
    >Click Me</html:button>\n\n<html:button property=\"button3\">\n  <html:bean message=\"\
    msg.click-me\"/>\n</html:button>\n```\n\n## Equivalents\n\nThe JSF `<h:commandButton>`\
    \ is much more powerful, and allows you to easily link a button to a server-side\
    \ function, using the `action` attribute:\n\n```\n<h:commandButton action=\"#{myManagedBean.myFunction}\"\
    \ ...\n```\n\nOf course, for you to use this with Struts, you need to embed it\
    \ within the Strut-Faces `<s:form>` tag. Refer to Chapter 20 for details on `<h:commandButton>`\
    \ and `<s:form>`.\n\n## cancel\n\nThis tag displays a Cancel button on a form.\
    \ Clicking this button causes the enclosing form to be submitted but simple validation\
    \ is bypassed. However, the `execute()` function of the form’s `Action` is called\
    \ in order for the “next” page to be displayed. This means, of course, that the\
    \ `Action` subclass must have special logic to determine if the Cancel button\
    \ was clicked (see “Examples” in this section for details).\n\nWhen the form data\
    \ is submitted, the text appearing on the Cancel button is sent as a parameter\
    \ on the request URL.\n\n### Usage Restrictions\n\nThis tag must be inside an\
    \ `<html:form>` tag. You must *not* specify the `property` attribute. Doing so\
    \ would cause the Cancel button not to be recognized as such by Struts.\n\n###\
    \ Attributes\n\nThe first four attribute sets (`evt-attrs`, `acc-attrs`, `ren-attrs`,\
    \ and `struts-attrs`) are accepted. However, do *not* specify the `property` attribute.\
    \ If `value` isn’t specified and if there is no text rendered in the body of the\
    \ `<html:cancel>`, then the button text defaults to “Cancel”.\n\n### Examples\n\
    \nThe following example shows three buttons, all of which have the text “Cancel\
    \ Me”. The last Cancel button uses an `<html:bean>` to localize its text:\n\n\
    ```\n<html:cancel value=\"Cancel Me\" />\n\n<html:cancel>Cancel Me</html:cancel>\n\
    \n<html:cancel>\n  <html:bean message=\"msg.cancel-me\"/>\n</html:cancel>\n```\n\
    \nIn order for you to detect a Cancel button being clicked, you’d use this code\
    \ in your `Action`’s `execute()`:\n\n```\npublic ActionForward execute(... HttpServletRequest\
    \ request, ...){\n  if (isCancelled(request)){\n    //A Cancel button was pressed.\
    \ Ignore form data\n    return mapping.findForward(\"cancelled\");\n  }\n  //normal\
    \ form processing code here.\n  ...\n}\n```\n\n### Equivalents\n\nThe JSF `<h:commandButton\
    \ id=\"cancel\" type=\"SUBMIT\">` allows you to emulate the functionality of the\
    \ `<html:cancel>` button. Of course, to use this with Struts, you need to embed\
    \ it within the Strut-Faces `<s:form>` tag. Refer to Chapter 20 for details on\
    \ `<h:commandButton>` and `<s:form>`.\n\n## checkbox\n\nThis tag renders a single\
    \ check box input field within a form. See also `<html:multibox>`.\n\n### Usage\
    \ Restrictions"
