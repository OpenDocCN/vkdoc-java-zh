    You need to pay special attention to the <load-on-startup> value; it has to be
    the lowest one declared. If you have other servlets declared, then ensure that
    their


    <load-on-startup> values are greater than the one associated for FacesServlet.


    This ensures that FacesServlet gets initialized first.


    **2.** Put in the standard JSF servlet mapping. In web.xml, put in the following
    servlet mapping:


    <servlet-mapping>


    <servlet-name>faces</servlet-name>


    <url-pattern>*.faces</url-pattern>


    </servlet-mapping>


    This tells Tomcat that the page URLs ending with .faces should be shuttled to
    the servlet called faces, which as you can see from the earlier <serlvet> declaration
    is FacesServlet.


