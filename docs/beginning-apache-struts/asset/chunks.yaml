    **writeNesting**


    This tag is used to write the current nesting level either to the response stream
    (i.e., the rendered HTML page), or to make it available as a page scoped variable.


    Usage Restrictions


    None.


    Attributes


    This tag has three attributes:


    • property: The value of this attribute is blindly appended to the end of the
    nesting level, prefixed with a dot.


    • id: When id is specified, the nesting level is not written to the final HTML
    page, but rather is exposed as a page-scoped String variable with the value of
    id serving as the name.


    • filter: This attribute takes the value true or false. If true, then the nesting
    level is encoded. For example, the ampersand (&) appears as &. Despite what the
    Apache online documents say, URL encoding is not performed—for instance, spaces
    are not encoded as %20%, etc.


    These attributes are best illustrated with JSP examples.


    Examples


    Using writeNesting only makes sense when it’s used in conjunction with the <nested:nest>
    tag as in the following snippet:


    <html:form ...>


    <nested:nest property="contact">


    <nested:nest property="company">


    **Nesting level is: <nested:writeNesting />**


    </nested:nest>


    </nested:nest>


    </html:form>


    In this example, the displayed HTML will contain the text


    Nesting level is: contact.company


