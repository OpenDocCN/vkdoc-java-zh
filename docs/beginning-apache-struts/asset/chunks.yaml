    page (see Figure 5-4).


    **Figure 5-4.** *Successful registration*


    Discussion


    You’ll need View code to display the page. Plain ol’ HTML would do, unless you’re
    embedding this message within a larger page, as is often the case in real life.
    Like Requirement 4, this latter possibility also complicates strict MVC enforcement.


    But again, Struts comes to your rescue. As you’ll see in Part 2 of this book,
    Struts has an extension (“plug-in” in Struts-speak) to give you just this functionality.


    I hope this simple example gives you a good idea how to classify your code with
    the MVC worldview. I also hope it gives you an idea of why you’d need a framework
    to help you actually enforce MVC. To give you a little more practice, try the
