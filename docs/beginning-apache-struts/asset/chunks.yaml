- fmt: "# Chapter 20: JavaServer Faces and Struts Shale\n\n- **Try out the MyFaces\
    \ examples**: MyFaces provides many useful components and validators. The interested\
    \ reader is encouraged to download the `myfaces-examples.war` file available at\
    \ the Apache site (see \"Useful Links\") and give it a go. We haven't included\
    \ this in the Source Code section of the Apress website because the MyFaces team\
    \ is adding interesting new components all the time, and we don't want you to\
    \ miss out on the latest goodies.\n\n- The JSF central site has many good JSF\
    \ tutorials. I've also found the JSF FAQ website very helpful. See \"Useful Links\"\
    \ for both.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nThe next section\
    \ provides a preview of the new Struts-Faces integration library. This library\
    \ allows you to use JSF with Struts, and lets you gracefully \"upgrade\" your\
    \ existing Struts applications.\n\n## Lab 20: The Struts-Faces Integration Library\n\
    \nThe Struts-Faces integration library (\"Useful Links\" tells you where to download\
    \ the latest distribution) has been around for some time, but it's only recently\
    \ seen active development.\n\nIt's essentially a separate JAR file that you can\
    \ use to \"JSF enable\" your Struts apps with minimum fuss—at least in theory!\
    \ The release we'll review in this lab (version 1.0) has a few significant limitations,\
    \ which we'll discuss as the lab progresses.\n\nThe approach we'll take is to\
    \ let you apply the integration library yourself to a very simple \"registration\"\
    \ Struts webapp.\n\n> **Note**: The code answers for this lab session are found\
    \ in the Source Code section of the Apress website, in the file `lab-20-answers.zip`.\n\
    \n### Step 1: Preparing the Development Environment\n\nThe registration webapp\
    \ is a pure Struts webapp, which you'll transform so that it uses JSF tags for\
    \ the View tier instead of the rather limited Struts tags.\n\n1. Unzip the contents\
    \ of the `registration.zip` file in the Source Code section of the Apress website,\
    \ to a suitable development folder. This contains the source files for a simple\
    \ registration webapp.\n\n2. Compile and deploy the registration webapp, then\
    \ play with it so you know how it works.\n\n### Step 2: Install JSF, JSTL, and\
    \ the Struts-Faces Integration Library\n\nThe Struts-Faces integration library\
    \ requires a JSF 1.0+ implementation and JSTL installed. Unfortunately, the library\
    \ *does not* work with MyFaces. Instead, you'd have to use Sun's reference implementation,\
    \ which is not included in the Source Code section of the Apress website due to\
    \ licensing restrictions. Complete the following:\n\n1. Go to the Sun JSF download\
    \ site (`http://java.sun.com/j2ee/javaserverfaces/download.html`) and download\
    \ the latest JSF reference implementation. Extract the relevant JSF binaries,\
    \ `jsf-api.jar` and `jsf-impl.jar`, and place them in the `.\\registration\\lib`\
    \ folder.\n\n2. Extract `jstl.jar` and `standard.jar`, which are the JSTL binaries,\
    \ from the Struts distribution zip file in the Source Code section of the Apress\
    \ website to the `.\\registration\\lib\\` folder.\n\n3. From the `struts-faces.zip`\
    \ file in the Source Code section of the Apress website, extract the JAR file\
    \ called `struts-faces.jar`, and place it in `.\\registration\\lib`.\n\nAs you\
    \ should know by now, the scripts for the Registration webapp copy the files in\
    \ `.\\registration\\lib` and place them in the webapp's `/WEB-INF/lib` folder\
    \ upon deployment.\n\n### Step 3: Edit `web.xml` and `struts-config.xml`\n\nTo\
    \ initialize JSF and get the Struts-Faces library and `struts-config.xml` files\
    \ to work, you'll need to follow these steps:\n\n1. Declare the Standard Faces\
    \ servlet. In `web.xml`, put in the following declaration:\n\n```xml\n<servlet>\n\
    \    <servlet-name>faces</servlet-name>\n    <servlet-class>javax.faces.webapp.FacesServlet</servlet-class>\n\
    </servlet>\n```"
