  raw: '• To use this tag, you’d usually nest it within a <logic:iterate> (or any
    other compatible looping construct like JSTL’s <c:forEach>), and use scriptlets
    or the EL-enabled version of this tag to dynamically set the value attribute (if
    you need to nest the content instead, then you must use scriptlets).


    • The values are submitted only if a check box is checked. This means that in
    order to detect a cleared check box, you’d need to set the underlying array to
    a zero-length array. See the following examples for more on this.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048AppC.fm Page 408 Tuesday, January 17, 2006 4:46 PM


    **408**


    A P P E N D I X C ■ S T R U T S T A G R E F E R E N C E


    Examples


    Consider the <html:multibox> on a form:


    <html-el:form ...>


    <logic:iterate name="contacts" id="contact">


    <html-el:multibox property="ids" value="${contact.getId()}" />


    </logic:iterate>


    </html-el:form>


    and the associated ActionForm subclass:


    public SelectedContactIds extends ActionForm{


    protected String[] _ids;


    public void setIds(String[] ids){ _ids = ids; }


    public String[] getIds(){return _ids;}


    public void reset(ActionMapping mapping,


    HttpServletRequest request){


    // We use a new String array instead


    // of just null to allow easy migration to


    // the Validator framework, which requires


    // a non-null value for arrays.


    _ids = new String[0];


    }


    }


    The length of the _ids variable isn’t fixed—it depends on how many of the rendered
    check boxes were checked.


    Equivalents


    None.


    **radio**


    This tag renders a radio button input field.


    Usage Restrictions


    This tag must be inside an <html:form> tag. The property and value attributes
    are required.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048AppC.fm Page 409 Tuesday, January 17, 2006 4:46 PM


    A P P E N D I X C ■ S T R U T S T A G R E F E R E N C E


    **409**


    Attributes


    All common attribute sets (evt-attrs, acc-attrs, ren-attrs, struts-attrs , init-attr,
    and the new err-attrs) are accepted, and have their usual meanings.


    In addition to these, there is the idName attribute, which points to a JavaBean.
    When idName is specified, the value attribute is used as a property name for this
    JavaBean. The combination is used to specify a return value for the radio button.


    Examples


    Here’s an example of a few radio buttons on a form. Notice how all radio buttons
    refer to the same property (color), thereby allowing the user to select one color
    from a list:


    <html:radio property = "color" value="Red"/>Red<br>


    <html:radio property = "color" value="Yellow"/>Yellow<br>


    <html:radio property = "color" value="Blue"/>Blue<br> Here’s the same example
    but using the idName attribute:


    <logic:iterate name="colors" id="c">


    <html:radio idName="c" value="color"/>


    <bean:write name="c" property="color"/><br>


    </logic:iterate>


    In this second example, colors is an iteratable object (see the entry for <logic:iterate>)
    and holds JavaBeans (exposed in the snippet by the variable c), which have a getColor()
    function.


    Equivalents


    JSF’s <h:selectOneRadio> is an equivalent.


    **reset**


    This tag displays a button that if clicked, causes the enclosing form’s fields
    to be cleared.


    Usage Restrictions


    This tag should be inside an <html:form> tag.


    Attributes


    The first four attribute sets (evt-attrs, acc-attrs, ren-attrs, and struts-attrs)
    are accepted.


    If value isn’t specified and if there is no text rendered in the body of the <html:reset>
    tag, then the button text defaults to “Reset”.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048AppC.fm Page 410 Tuesday, January 17, 2006 4:46 PM


    **410**


    A P P E N D I X C ■ S T R U T S T A G R E F E R E N C E


    Examples


    This example shows three submit buttons, all of which have the text “Reset Me”.
    The last reset button uses an <html:bean> tag to localize its text:


    <html:reset value="Reset Me" />


    <html:reset >Reset Me</html:reset >


    <html:reset >


    <html:bean message="msg.reset-me"/>


    </html:reset >


    In all cases, if the user clicks the button, the form gets submitted, the associated
    ActionForm’s reset() function is invoked, and the page is then redisplayed. Your
    ActionForm subclasses might override this function to provide custom resetting
    of the form’s fields.


    Equivalents


    The JSF’s <h:commandButton id="reset" type="RESET"> allows you to emulate the
    functionality of the <html:reset> button. Of course, for you to use this with
    Struts, you need to embed it within the Strut-Faces <s:form> tag. Refer to Chapter
    20 for details on <h:commandButton> and <s:form>.


    **rewrite**


    This tag resolves and renders a URL. The rules used are similar to those for <html:link>.


    Unlike <html:link>, though, the URL isn’t embedded within an HTML <a> tag; the
    URL is rendered by itself. You might find this useful for debugging or for use
    in scripts.


    Usage Restrictions


    You must specify either action/module, href, page, or forward.


    Attributes


    • action/module, href, page, or forward: Used to specify a URL. The action, module
    pair specifies a form handler. The action, of course, must begin with a slash,
    and if you want to specify a module, use the module attribute. href is either
    a relative or absolute URL. page is a module-relative URL (and therefore, must
    begin with a slash). forward is the name of a global forward.


    • anchor: An optional HTML anchor for the link.


    • transaction: If true, appends the current transaction token to the URL as a
    request parameter. Refer to the entry for <logic:present> for details on transaction
    tokens.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048AppC.fm Page 411 Tuesday, January 17, 2006 4:46 PM


    A P P E N D I X C ■ S T R U T S T A G R E F E R E N C E


    **411**


    • paramName,paramProperty,paramScope and paramId: You use these to create a single
    request parameter. The request parameter is appended to the final URL. The first
    set of three attributes is used to locate a single object on the current request
    or session. This object’s toString() is the single parameter value. The name of
    the parameter is given by paramId.


    • name/property/scope: You use these to create multiple request parameters. The
    request parameters are appended to the final URL. These attributes are used to
    locate an object of type java.util.Map. The Map’s keys are the parameter names,
    and the corresponding values are the parameter values. If you specify property,
    you must also specify name.


    • useLocalEncoding: If set to true, tells Struts to use whatever the character
    encoding is for the current HttpServletResponse.


    Examples


    Here’s a simple example using a global forward:


    <html:rewrite forward="success" />


    The rendered string will be the true URL for the success global forward. For more
    examples, refer to the entry for <html:link>.


    Equivalents


    None.


    **select, with option, options, and optionsCollection**


    select displays an HTML selection.


    The other option tags are nested within it in order to render options for the
    enclosing select element:


    • option: Renders a single option. There are attributes you can use to help with
    localizing the displayed text.


    • options: Displays a list of options, populated from a JavaBean.


    • optionsCollection: A more streamlined version of options. Also displays a list
    of options populated from a JavaBean.


    Each rendered <option> has a value and a label. The value is the value submitted
    if that option is selected. The label is the text presented to users in order
    for them to make the selection.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048AppC.fm Page 412 Tuesday, January 17, 2006 4:46 PM


    **412**


    A P P E N D I X C ■ S T R U T S T A G R E F E R E N C E


    Usage Restrictions


    The select tag must be inside an <html:form> tag, and the various option tags
    must be nested within an <html:select> tag. There are a couple other restrictions:


    • The property attribute is required for select.


    • The value attribute is required for option.


    Attributes for select'
