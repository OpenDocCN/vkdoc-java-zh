    20


    for details.


    **frame**


    Renders an HTML <frame>. The advantage of using <html:frame> is that you can use
    global forwards or form handlers to easily put content into your frames.


    Usage Restrictions


    You must specify either action/module, href, page, or forward.


    Attributes


    • action/module, href, page, or forward: Used to specify a URL for the frame.
    The action/module pair specifies a form handler. The action, of course, must begin
    with a slash, and if you want to specify a module, use the module attribute. href
    is either a relative or absolute URL. page is a module-relative URL (and therefore,
    must begin with a slash). forward is the name of a global forward.


    • anchor: An optional HTML anchor for the link.


    • paramName,paramProperty,paramScope and paramId: You use these to create a single
    request parameter. The request parameter is appended to the final URL. The first
    set of three attributes is used to locate a single object on the current request
    or session. This object’s toString() is the single parameter value. The name of
    the parameter is given by paramId. Refer to <html:link> for an example.


    • name/property/scope: You use these to create multiple request parameters. The
    request parameters are appended to the final URL. These attributes are used to
    locate an object of type java.util.Map. The Map’s keys are the parameter names,
    and the corresponding values are the parameter values. If you specify property,
    you must also specify name. Refer to <html:link> for an example.


    • transaction: If true, appends the current transaction token to the URL as a
    request parameter. Refer to the entry for <logic:present> for details on transaction
    tokens.


    • title/titleKey: Refer to acc-attrs for details on these.


    • style/styleClass/styleId: Refer to ren-attrs for details on these.


    • scrolling: Specifies if scrollbars are to be created when necessary (scrolling="auto"),
    or always (yes) or never (no).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


