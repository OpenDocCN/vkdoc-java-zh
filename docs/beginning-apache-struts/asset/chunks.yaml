    </logic-el:iterate>\n```\n\nIn this example, the change is hardly perceptible,\
    \ but in more realistic cases the resulting code would be much simpler to read.\n\
    \n**Mapped properties** are similar to indexed properties, except that the function\
    \ called is assumed to be `getXXX(String s)`. For example, if the contact object\
    \ in the previous examples had a `getMobile(String mobileType)` function, you\
    \ could use\n\n```\n<bean:write name=\"contact\" property=\"mobile(home)\"/>\n\
    <bean:write name=\"contact\" property=\"mobile(office)\"/>\n```\n\nThese examples\
    \ would call `getMobile(\"home\")` and `getMobile(\"office\")`, respectively.\n\
    \nYou can also mix the various types of properties:\n\n```\n<bean:write name=\"\
    contacts\" property=\"contact[5772].company\"/>\n```\n\nwhich is an implicit call\
    \ to `getContact(5772).getCompany()`.\n\nTable 10-1 summarizes the various property\
    \ types.\n\n**Table 10-1.** *Simple, Nested, Indexed, and Mapped Properties*\n\
    \n| Type | Usage | Function Called |\n|------|-------|-----------------|\n| simple\
    \ | `property=\"myProperty\"` | `getMyProperty()` |\n| nested | `property=\"myProperty.mySubProperty\"\
    ` | `getMyProperty().getMySubProperty()` |\n| indexed | `property=\"myProperty[5772]\"\
    ` | `getMyProperty(5772)` |\n| mapped | `property=\"myProperty(myString)\"` |\
    \ `getMyProperty(\"myString\")` |\n\n## Conditional Processing\n\nThe Logic tag\
    \ library has a number of tags for performing conditional processing. These may\
    \ be grouped into three categories:\n\n* **Tests:** `present`, `empty`, `messagesPresent`\n\
    * **Comparisons:** `equal`, `lessThan`, `lessEqual`, `greaterThan`, and `greaterEqual`\n\
    * **String matching:** `match`"
