    Some of these tags (for tests and string matching) have negative counterparts:
    `notPresent`, `notEmpty`, `messagesNotPresent`, and `notMatch`. All these tags
    follow a common structure in their usage. In pseudocode:


    ```

    <tag>

    // conditionally processed code here.

    </tag>

    ```


    In addition, all these tags have two attributes in common:


    - `name`: Specifies the name of the object that the tag operates on. It is assumed
    that a previous Action had placed the object on the request. The earlier section
    on iteration shows how this might be done.

    - `property`: Corresponds to a simple, nested, indexed, or mapped property on
    the object referred to by the `name` attribute. This attribute is optional.


    Tags that require a comparison or a match will also accept an additional `value`
    attribute. Let’s look at a couple of examples of how these tags are used:


    ```

    <logic:empty name="search_results">

    <i>Sorry, there are no contacts with this postcode</i>

    </logic:empty>


    <logic:notEmpty name="search_results">

    </logic:notEmpty>

    ```


    The `empty` and `notEmpty` tags simply check if the given iteratable object contains
    elements, and therefore don’t require a `value` attribute. Here’s another example:


    ```

    <logic:lessThan name="myConstants" property="pi" value="3.14">

    <i>Some of your pi is missing!</i>

    </logic:lessThan>

    ```


    This code displays the message “Some of your pi is missing” if `myConstants.getPi()`
    is less than 3.14.


    Table 10-2 summarizes these tags.


    **Table 10-2.** *Summary of the Conditional Processing Tags*


    | Tag | Meaning |

    | --- | --- |

    | `present` | Tests if a variable is present on the request. |

    | `empty` | Tests if an array or Collection is empty. |

    | `messagesPresent` | Tests if a message (an `ActionMessage` instance) is on the
    request. The name of the message is given in the `value` attribute. |

    | Comparison tags | Tests if the given property passes the given comparison. The
    value (`equal`, `lessEqual`, etc.) to be compared with is provided in the `value`
    attribute. |

    | `match` | Checks if the given property has the `value` attribute as a substring.
    |


    The negative counterparts of the tags in Table 10-2 are `notPresent`, `notEmpty`,
    `messagesNotPresent`, and `notMatch`. Appendix C describes all these tags in more
    detail.


    Lastly, note that JSTL has an `<if>` tag that you can use in place of many of
    these tags. We’ll come to this later on in this chapter.


    ## Flow Control


    The two tags that perform flow control (actually, redirection) are `<logic:redirect>`
    and the simplified version of it, called `<logic:forward>`. Their use on a JSP
    page causes control to be passed to a different page. For example:


    ```

    <logic:forward name="someOtherPage"/>

    ```


    would redirect control to a global forward (refer to Chapter 9) called `someOtherPage`.


    `<logic:redirect>` also redirects control to a different page, but gives you more
    options for performing the redirect. For more details on each of these tags, refer
    to Appendix C.


    Note that there are no equivalent JSTL tags that can utilize global forwards declared
    in `struts-config.xml`.


