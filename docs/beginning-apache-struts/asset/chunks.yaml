    ## textarea


    This tag represents a multiple-line text input field.


    ### Usage Restrictions


    The `property` attribute is required. It must be a child tag of `<html:form>`.


    ### Attributes


    All common attribute sets (`evt-attrs`, `acc-attrs`, `ren-attrs`, `struts-attrs`,
    `init-attr`, and the new `err-attrs`) are accepted, and have their usual meanings.


    Besides these, there are a few attributes specific to `textarea`:


    - `cols`/`rows`: The number of columns (`cols`) or rows to display. The browser
    makes the decision if either is omitted.

    - `readonly`: If `true`, the text field may not be edited.


    ### Examples


    The code


    ```

    <html:textarea property="memo" cols="8" rows="3"/>

    ```


    specifies a textarea input field for the property called `memo` on the current
    form bean.


    ### Equivalents


    JSF’s `<h:inputTextarea>` is an equivalent for `<html:textarea>`, but you need
    to enclose it within the Struts-Faces `<s:form>` tag so that the associated form
    bean is populated with the submitted value:


