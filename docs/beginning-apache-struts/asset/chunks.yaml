- fmt: "# Chapter 17: Potpourri\n\nA potpourri (pronounced *poh*-poo-ri) is a mix\
    \ of spices and flower petals in a cloth bag, valued for its pleasing aroma. This\
    \ chapter is similarly a mix of useful Struts techniques, which I hope will help\
    \ your Struts apps “smell” that much better! In order of appearance (and likelihood\
    \ that you might find them useful), they are:\n\n- `PropertyUtils`: A way to read\
    \ properties on JavaBeans in general, and `ActionForms` in particular, without\
    \ resorting to type conversions.\n- `DownloadAction`: An `Action` subclass that\
    \ simplifies downloading data to a web client. This data might be dynamically\
    \ generated by your webapp or a static file on the server.\n- `LocaleAction`:\
    \ Yet another way to allow users to switch locales.\n- `IncludeAction` and `ForwardAction`:\
    \ Help you to put a Struts front-end to legacy servlets or JSPs.\n- `LookupDispatchAction`:\
    \ Allows you to have multiple actions on your HTML form *without* using JavaScript.\n\
    - `DispatchAction`: A neat way to perform conditional processing in your `Action`,\
    \ based on the request URL.\n- `MappingDispatchAction`: Helps you group related\
    \ functionality in one `Action`.\n- **Global forwards**: A second take on how\
    \ to use global forwards effectively.\n- **Logging**: Struts comes bundled with\
    \ the Apache Commons Logging, which you can use to perform logging.\n- **Wildcards**:\
    \ A useful trick to help cut down the declarations in a `struts-config.xml` file.\n\
    - **Splitting up** `struts-config.xml`: As a webapp grows, the need to split up\
    \ `struts-config.xml` increases. I’ll describe a couple of ways to do this.\n\n\
    ## PropertyUtils\n\nThe Apache Commons Beans subproject has some very useful classes\
    \ (you’ve met `BeanUtils` in the previous chapter), among them the `PropertyUtils`\
    \ class. This class exposes static methods that help you read/write data from/to\
    \ a JavaBean. The JAR file (`commons-beanutils.jar`) comes bundled with the Struts\
    \ binaries, so you can use `PropertyUtils` right away in your Struts applications.\n\
    \nNo type conversions are used, so you don’t have to know the class of the JavaBean\
    \ at design time. Instead, `PropertyUtils` uses Java’s introspection feature to\
    \ accomplish its job.\n\n> **Note**: `PropertyUtils` actually delegates all its\
    \ work to `PropertyUtilsBean`. This latter class does the actual work of parsing\
    \ the property and introspecting the JavaBean. `PropertyUtils` simply provides\
    \ convenient static access to `PropertyUtilsBean`’s functions (which are not static).\n\
    \nThe most useful functions on `PropertyUtils` are:\n\n- `boolean isReadable(Object\
    \ bean, String property)`: Returns `true` if the given property can be read on\
    \ the bean, `false` otherwise. This implies the existence of an appropriate `getXXX`\
    \ function.\n- `boolean isWritable(Object bean, String property)`: Returns `true`\
    \ if the given property can be written to the bean, `false` otherwise. This implies\
    \ the existence of an appropriate `setXXX` function.\n- `Class getPropertyType(Object\
    \ bean, String property)`: Returns the `Class` object associated with the given\
    \ property.\n- `Object getProperty(Object bean, String property)`: Returns the\
    \ value of the given property.\n- `setProperty(Object bean, String name, Object\
    \ value)`: Writes the given value to the bean.\n\nThese functions accept simple,\
    \ indexed, mapped, nested, or even mixed properties (a combination of the other\
    \ types of properties). Each of these functions may throw:\n\n- `IllegalAccessException`:\
    \ If the calling code cannot call the associated `setXXX` or `getXXX` function,\
    \ although it exists\n- `NoSuchMethodException`: If the required property does\
    \ not exist on the bean\n- `InvocationTargetException`: If the get/set function\
    \ on the bean throws an `Exception`\n- `IllegalArgumentException`: If either `bean`\
    \ or `property` is `null`\n\n### Using PropertyUtils\n\nThis is all very good,\
    \ but how can `PropertyUtils` be useful in Struts programming? Recall that your\
    \ `ActionForm` subclasses (including your `DynaActionForm` subclasses) are also\
    \ JavaBeans. In previous lab sessions, to read (or write) an `ActionForm`’s properties,\
    \ we had to perform type conversion, as shown in Listing 17-1.\n\n**Listing 17-1.**\
    \ *Type Conversion Idiom to Read ActionForm Properties*\n\n```java\npublic ActionForward\
    \ execute(ActionMapping mapping,\n                             ActionForm form,\n\
    \                             HttpServletRequest request,\n                  \
    \           HttpServletResponse response){\n    //get userid and password\n  \
    \  RegistrationForm rForm = (RegistrationForm) form;\n    String userid = rForm.getUserId();\n\
    \    String password = rForm.getPassword();\n    ...\n}\n```\n\nListing 17-1 shows\
    \ an idiom I’ve used throughout this book. To read the properties in an `ActionForm`\
    \ subclass, you must do the following:\n\n- Perform a type conversion.\n- Read\
    \ the form’s properties.\n\nI’ve used this idiom primarily for the sake of clarity,\
    \ since it simplifies the examples and lab session code. You should think twice\
    \ before using it in production code, if maintainability is important to you.\
    \ This is because there are two big downsides to using type conversion as in Listing\
    \ 17-1:\n\n- **No dynamic forms**: You can’t easily replace the `ActionForm` with\
    \ a dynamic form equivalent. You’d have to amend the `Action` code. You’ve seen\
    \ this in Chapter 16, when I discussed dynamic forms, and I ported the Registration\
    \ webapp to using dynamic forms. Refer to Listing 16-5 to see how you’d have to\
    \ amend Listing 17-1 in order to work with dynamic forms.\n- **Tight coupling**:\
    \ It ties your `Action` class too rigidly to your `ActionForm` class, preventing\
    \ reuse of the `Action` with other `ActionForms`. For example, if you wanted to\
    \ reuse the `Action` of Listing 17-1, you’d have to ensure that all the `ActionForms`\
    \ passed into its `execute()` were of type `RegistrationForm`. In some scenarios,\
    \ this constraint might be too restrictive.\n\nInstead of this approach, you can\
    \ use `PropertyUtils` to circumvent both these drawbacks. `PropertyUtils` lets\
    \ you completely decouple your `Action` from a particular `ActionForm` subclass\
    \ (this includes dynamic forms).\n\nUsing `PropertyUtils`, Listing 17-1 would\
    \ now look like Listing 17-2.\n\n**Listing 17-2.** *Using PropertyUtils to Read\
    \ ActionForm Properties*\n\n```java\nimport org.apache.commons.beanutils.PropertyUtils;\n\
    ...\npublic ActionForward execute(ActionMapping mapping,\n                   \
    \          ActionForm form,\n                             HttpServletRequest request,\n\
    \                             HttpServletResponse response)\n    throws Exception{\n\
    \    //get userid and password\n    String userid = PropertyUtils.getProperty(form,\"\
    userid\");\n    String password = PropertyUtils.getProperty(form,\"password\"\
    );\n    ...\n}\n```\n\nUsing `PropertyUtils` as shown in Listing 17-2, replacing\
    \ `RegistrationActionForm` with an equivalent dynamic form would be much easier—you\
    \ wouldn’t have to alter your `Action` subclass code.\n\n### In a Nutshell...\n\
    \nOne downside of using `PropertyUtils` is that like with dynamic beans, you lose\
    \ compile-time checking. You’ve essentially traded compile-time checking for looser\
    \ coupling between classes.\n\nHowever, in most instances the advantages gained\
    \ (looser coupling *and* the ability to switch to dynamic forms later) well outweigh\
    \ this loss.\n\nSo, unless you have a really good reason, use `PropertyUtils`\
    \ to access form or bean properties. Using it consistently makes your code much\
    \ more maintainable in the long run.\n\n## DownloadAction (Struts 1.2.6+)"
