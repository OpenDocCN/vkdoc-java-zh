    ## CHAPTER 9 ■ Configuring Struts


    Up until now, I’ve presented portions of Struts along the lines of the MVC design
    pattern. In Labs 6, 7, and 8, you’ve implemented these portions yourself for the
    LILLDEP webapp. What’s missing is the way Struts ties together the various Model-View-Controller
    portions. Struts uses a single configuration file called `struts-config.xml` to
    store this information. The Struts distribution comes bundled with samples of
    this file, which you can copy and amend for your own use.


    ### The Structure of `struts-config.xml`


    Unsurprisingly, `struts-config.xml` holds data in XML format. There are several
    sections, each of which handles configuration for specific portions of Struts:


    - **Form bean declarations**: This is where you map your `ActionForm` subclass
    to a name. You use this name as an alias for your `ActionForm` throughout the
    rest of the `struts-config.xml` file, and even on your JSP pages.

    - **Global exceptions**: This section defines handlers for exceptions thrown during
    processing.

    - **Global forwards**: This section maps a page on your webapp to a name. You
    can use this name to refer to the actual page. This avoids hardcoding URLs on
    your web pages.

    - **Form handlers**: Remember the form handlers I mentioned in the previous chapter?'
