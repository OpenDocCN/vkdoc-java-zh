- fmt: "This tag must be inside an `<html:form>` tag. The `property` attribute is\
    \ required. The corresponding property on the `ActionForm` must be a boolean.\n\
    \n### Attributes\n\nAll common attribute sets (`evt-attrs`, `acc-attrs`, `ren-attrs`,\
    \ `struts-attrs`, `init-attr`, and the new `err-attrs`) are accepted, and have\
    \ their usual meanings.\n\nThere are four important things to note:\n\n- The corresponding\
    \ property on the `ActionForm` subclass must be a boolean.\n- The `value` attribute\
    \ specifies the argument to put in `setXXX()` if the check box is checked. So,\
    \ if you specify `value=\"true\"` (or `on` or `yes`), then `setXXX(true)` is called\
    \ if the check box is checked. If you use any other setting for `value`, then\
    \ `setXXX(false)` is called if the check box is checked.\n- The check box is rendered\
    \ as checked only if `value` equals the return value of `getXXX()`. So, if `value=\"\
    true\"` (or `on` or `yes`) and `getXXX()` also returns `true`, then the check\
    \ box is rendered as checked. Similarly, if `value` is not `true` (or `on` or\
    \ `yes`) and `getXXX()` returns `false`, then the check box is also rendered as\
    \ checked.\n- The corresponding `setXXX()` function on the `ActionForm` subclass\
    \ is only called if the check box is checked. This means that in order for your\
    \ app to detect an unchecked check box, you need to call `setXXX()` in your `ActionForm`'s\
    \ `reset()` function. `reset()` is automatically called by Struts before a form\
    \ is (re)displayed, and before any `setXXX()` functions are called.\n\n### Examples\n\
    \nThe code\n\n```\n<html:checkbox property=\"pregnant\" />\n<html:checkbox property=\"\
    nonsmoker\" value=\"false\" />\n```\n\nrenders two check box fields. The corresponding\
    \ `ActionForm` might be\n\n```\npublic SurveyForm extends ActionForm{\n    protected\
    \ boolean _isPregnant, _isSmoker;\n    public boolean getPregnant(){ return _isPregnant;\
    \ }\n    public void setPregnant(boolean isPregnant){\n        _isPregnant = isPregnant;\n\
    \    }\n    public boolean getNonsmoker(){ return _isSmoker; }\n    public void\
    \ setNonsmoker(boolean isSmoker){\n        _isSmoker = isSmoker;\n    }\n    public\
    \ boolean isSmoker(){return _isSmoker;}\n    public void reset(ActionMapping mapping,\n\
    \                      HttpServletRequest request){\n        //clear the checkboxes\n\
    \        setPregnant(false);\n        setNonsmoker(true);\n    }\n    ... //rest\
    \ of SurveyForm\n```\n\nThe `pregnant` property is straightforward: If the user\
    \ checks the associated check box, then that translates directly to the `pregnant`\
    \ property.\n\nThe `nonsmoker` property is less obvious: The underlying property\
    \ that is stored is actually the opposite of `nonsmoker`. This just is a convenience,\
    \ but as you can see, it comes at the price of added confusion.\n\nAn alternate,\
    \ less confusing way of coding both the JSP form and `ActionForm` subclass would\
    \ be\n\n```\n<html:checkbox property=\"pregnant\" />\n<html:checkbox property=\"\
    nonsmoker\"/>\n```\n\nNote the removed `value=\"false\"`. The `ActionForm` subclass\
    \ is now\n\n```\npublic SurveyForm2 extends ActionForm{\n    protected boolean\
    \ _isPregnant, _isNonSmoker;\n    public boolean getPregnant(){ return _isPregnant;\
    \ }\n    public void setPregnant(boolean isPregnant){\n        _isPregnant = isPregnant;\n\
    \    }\n    public boolean getNonsmoker(){ return _isNonSmoker; }\n    public\
    \ void setNonsmoker(boolean isNonSmoker){\n        _isNonSmoker = isNonSmoker;\n\
    \    }\n    public boolean isSmoker(){return !_isNonSmoker;}\n    public void\
    \ reset(ActionMapping mapping,\n                      HttpServletRequest request){\n\
    \        //clear the checkboxes\n        setPregnant(false);\n        setNonsmoker(false);\n\
    \    }\n    ... //rest of SurveyForm2\n```\n\n### Equivalents\n\nJSF's `<h:selectBooleanCheckbox>`\
    \ is an equivalent. Enclose it in the Struts-Faces `<s:form>` element so that\
    \ Struts processes the submitted value.\n\n### errors\n\nThis tag displays one\
    \ or more error messages. If no matching error message is found, nothing is displayed.\
    \ See also `<html:messages>`, which loops through error and ordinary messages.\n\
    \n### Usage Restrictions\n\nNone."
