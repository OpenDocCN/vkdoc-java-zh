    ## CHAPTER 7 ■ PROCESSING BUSINESS LOGIC


    **75**


    As you can see, using Model classes to write data results in clean code. Model
    classes are not part of Struts, because this is a task best left to dedicated
    persistence frameworks like Hibernate or Torque. You should refer to Appendix
    A for details.


    ### Navigation


    Navigation refers to programming logic deciding what page to display next to the
    user. In `RegistrationAction`, there are just two possible “next” pages: the page
    containing the submitted form (redisplayed with error messages) and the “You’re
    Registered!” page indicating successful registration.


    The code used to reach each is slightly different. Listing 7-6 shows the navigation
    logic involved.


    **Listing 7-6.** *Navigation in RegistrationAction*


    ```

    if(User.exists(userid)){


    ...


    //navigation: redisplay the user form.


    return mapping.getInputForward();


    }else{


    ...


    //navigation: display "You''re registered" page


    return mapping.findForward("success");


    }

    ```


    `ActionForward`, the return value of `execute()`, is a reference to the “next”
    page. Illustrated in Listing 7-6 are the two most important ways of instantiating
    it.


    > **Note** If you look up the JavaDocs for `ActionForward`, you’ll find that there
    are in fact a number of different constructors for `ActionForward`. Each constructor
    allows you to change defaults such as whether or not the page is a redirect. There
    are even subclasses of `ActionForward` that create `ActionForward`s with the more
    common choices.


    The first involves creating an `ActionForward` reference to the page containing
    the submitted form. Possibly the only reason you’d want to do this is to redisplay
    a form if it fails complex validation:


    [www.it-ebooks.info](http://www.it-ebooks.info/)


