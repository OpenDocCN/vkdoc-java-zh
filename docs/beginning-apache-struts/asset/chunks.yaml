- fmt: "# Declaring Simple Properties\n\nFrom Listing 16-1, you can easily see that\
    \ simple properties can either be supported Java classes or primitive types. Java\
    \ classes and primitive types supported by `DynaActionForm` are:\n\n- `java.lang.BigDecimal`\n\
    - `java.lang.BigInteger`\n- `boolean` and `java.lang.Boolean`\n- `byte` and `java.lang.Byte`\n\
    - `char` and `java.lang.Character`\n- `java.lang.Class`\n- `double` and `java.lang.Double`\n\
    - `float` and `java.lang.Float`\n- `int` and `java.lang.Integer`\n- `long` and\
    \ `java.lang.Long`\n- `short` and `java.lang.Short`\n- `java.lang.String`\n- `java.sql.Date`\n\
    - `java.sql.Time`\n- `java.sql.Timestamp`\n\n(This list is available on the Struts\
    \ documentation site. Refer to “Useful Links” at the end of this chapter.) You\
    \ may optionally specify a default value for the simple property using the `initial`\
    \ attribute. For example, in Listing 16-1, the default value for the simple property\
    \ `MySimpleProp` is `Hello`.\n\n# Declaring Indexed Properties\n\nTo create an\
    \ indexed property, simply put `[]` after the classname (or primitive type). You\
    \ also need to specify a size for the array. If you need *flexible* length arrays,\
    \ there are two ways to do it.\n\nIn the first method, you omit the `size` attribute.\
    \ Since the size isn’t specified, a newly created form bean will have a `null`\
    \ value for this indexed property. So, you have to “prime” the form bean (a `DynaActionForm`\
    \ instance) in an `Action` subclass before it can be used to store data. You’ve\
    \ seen a variation of this technique in Chapter 10.\n\nWhen a page is requested,\
    \ it’s really a request to a form handler. This form handler (an `Action` subclass)\
    \ creates an array of the right type and length and inserts it into the form bean.\
    \ Only then is control passed to a JSP page, which populates the form. `DynaActionForm`\
    \ has a function called `set(String propertyName, Object value)`, which you can\
    \ use to prime the form bean. Listing 16-2 illustrates this technique in action.\n\
    \n**Listing 16-2.** *Setting Array Lengths at Runtime*\n\n```\npublic ActionForward\
    \ execute(...){\n    DynaActionForm dForm = (DynaActionForm) form;\n    /* somehow\
    \ get the needed array length */\n    int length = ...;\n    /* create the new\
    \ array */\n    String[] myProp = new String[length];\n    /* insert array into\
    \ form */\n    dForm.set(\"MyIndexedProp\", myProp);\n    /* forward to JSP */\n\
    \    return mapping.findForward(\"success\");\n}\n```\n\nThe JSP page pointed\
    \ to by `success` will be able to use the form’s `MyIndexedProp` property. Needless\
    \ to say, you need to use session scope for this to work.\n\nThe second method\
    \ for flexible arrays is to use a class that implements the `java.util.List` interface\
    \ (e.g., `ArrayList`) as the `<form-property>`’s `type`:\n\n```\n<form-property\
    \ name=\"MyIndexedProperty\" type=\"java.util.ArrayList\" />\n```\n\nUnfortunately,\
    \ with this approach you lose Struts’s automatic type conversion, since all data\
    \ stored in the `List` are stored as `String` instances.\n\n# Declaring Mapped\
    \ Properties\n\nMapped properties are defined by using a type that implements\
    \ the `java.util.Map` interface (e.g., `HashMap`):\n\n```\n<form-property name=\"\
    MyMappedProperty\" type=\"java.util.HashMap\" />\n```\n\n# Declaring Nested Properties\n\
    \nLastly, nested properties are defined using a `type` attribute, which is a JavaBean,\
    \ assumed to contain nested properties used in your JSPs:\n\n```\n<form-property\
    \ name=\"MyNestedProperty\" type=\"com.myco.myapp.MyBean\" />\n```\n\nThe only\
    \ thing to note about nested properties is that you must ensure that the nested\
    \ property finally resolves to one of the supported primitive types or Java classes\
    \ listed earlier for simple properties. This should hardly come as a surprise,\
    \ since this is what you’d expect even with ordinary `ActionForms`.\n\n# Accessing\
    \ Dynamic Properties\n\nAt some point, you will need to read (or write) data from\
    \ your dynamic form. The `DynaActionForm` base class exposes three getters corresponding\
    \ to simple, indexed, and mapped properties:\n\n- `get(String property)` returns\
    \ an `Object` value of the given property. This accessor is for simple properties.\n\
    - `get(String property, int index)` returns an `Object` value of the given property\
    \ with the given index. This accessor is for indexed properties.\n- `get(String\
    \ property, String key)` returns an `Object` value for the given key on the given\
    \ property. This accessor is for mapped properties.\n\nSimilarly, there are `set(String\
    \ property, Object value)`, `set(String property, int index, Object value)`, and\
    \ `set(String property, String key, Object value)`.\n\nIf you’ve used a primitive\
    \ type for a property, then the `Object` type in the return of `get()` and the\
    \ argument of `set()` would be the corresponding Java class for that primitive\
    \ type. For example, if you’ve declared a property of type `int`, then you should\
    \ expect an `Integer` to be returned from `get()` and you should pass an instance\
    \ of `Integer` in `set()`.\n\n# Transferring Properties to a JavaBean\n\nIn many\
    \ instances, all you want to do with a dynamic form bean is to transfer the property\
    \ values into a JavaBean instance. This is often the case if:\n\n- You’re using\
    \ Struts as a web-based front-end to an existing application. The existing application\
    \ usually would already have JavaBean classes to hold data. You want to transfer\
    \ properties from your dynamic form to this JavaBean.\n- You want to transfer\
    \ data into a data object. This is the case if you’re using a Model framework\
    \ like Torque or Lisptorq, which exposes data through data objects. See Chapter\
    \ 5 and Appendix A for details.\n\nThe Apache Commons’ Bean project (see “Useful\
    \ Links”) provides a utility class to help you to do this transfer easily. The\
    \ following:\n\n```\norg.apache.commons.bean.BeanUtils.copyProperties(myJavaBean,\
    \ form)\n```\n\nwill copy the properties of the `DynaActionForm` instance (`form`)\
    \ into your JavaBean class (`myJavaBean`). Of course, only properties existing\
    \ on `myJavaBean` will be copied over. The JAR file for Apache Bean classes are\
    \ bundled with Struts in `commons-beanutils.jar`.\n\n# Dynamic Form Disadvantages\n\
    \nDynamic forms have a few significant limitations compared to ordinary `ActionForms`:\n\
    \n- **You must use different syntax properties when using EL**: If you’re using\
    \ EL, you have to prefix `map` to a form’s property. For example, instead of using\
    \ `${myform.myproperty}`, you’d have to use `${myform.map.myproperty}`. This applies\
    \ to simple, indexed, mapped, and nested properties. This is only necessary when\
    \ referring to a property using EL. No change would be necessary when referring\
    \ to a property within either the original or EL-enabled Struts tags. For example,\
    \ `<bean:write name=\"myform\" property=\"myproperty\"/>` would work fine.\n-\
    \ **You can’t use conventional getters and setters**: If you subclass `DynaActionForm`\
    \ (in order to run custom validations, for example), you can’t use conventional\
    \ getters and setters on your subclass and expect them to work with Struts tags.\
    \ Struts handles `DynaActionForm` and its subclass differently from normal `ActionForms`.\
    \ This can be a serious problem if you need to work directly with form data. The\
    \ design philosophy of dynamic forms assumes that you *won’t* have to work with\
    \ their data directly. Rather, you are expected to transfer the form’s properties\
    \ to a suitable JavaBean, using the `BeanUtils` technique described in the previous\
    \ subsection."
