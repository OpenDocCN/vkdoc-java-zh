- fmt: "# Step 1: Preparing the Development Environment\n\n**1.** Create a folder\
    \ in your development environment called `lisptorq`.\n\n**2.** Create a `.\\lib`\
    \ subfolder within this folder.\n\n**3.** Extract `jlisp.jar`, the LISP interpreter\
    \ found in `jlisp_0.2.zip` in the Source Code section of the Apress website at\
    \ http://www.apress.com, into `.\\lib`.\n\n**4.** Save `lisptorq.jar` in the Source\
    \ Code section of the Apress website into `.\\lib`.\n\n**5.** Save `derby.jar`,\
    \ the Derby database driver in the Source Code section of the Apress website,\
    \ into the development `.\\lib` folder.\n\n# Step 2: Writing the Database Schema\n\
    \nIn what follows, we will create a simple bookstore app, in which we’ll store\
    \ books along with publisher and author information. (This app originally appeared\
    \ in Apache Torque’s tutorial.) The database has three tables:\n\n- `author`:\
    \ Has four columns: `author_id`, `first_name`, `last_name`, and `full_name`. Make\
    \ `author_id` an autogenerated field. It should also be a primary key for this\
    \ table.\n- `publisher`: Has just two columns: `publisher_id` and `name`. Make\
    \ `publisher_id` an autogenerated field. It should also be a primary key for this\
    \ table.\n- `book`: Has four columns: `title` and `ISBN` to hold data; `author_id`,\
    \ which is a foreign key to the `author_id` column in the `author` table; and\
    \ `publisher_id`, which is a foreign key to the `publisher` table.\n\nIt should\
    \ be fairly transparent what the three tables represent. Apart from the three\
    \ ID columns, which should be `INTEGER`s, the other columns should be (`VARCHAR\
    \ 255`).\n\nYou need to complete the following:\n\n1. Create a new text file called\
    \ `main.lisp` in the Lisptorq development folder.\n2. Open this up with Notepad\
    \ (or your favorite IDE), and write the Lisptorq database schema for this database.\
    \ You will certainly need help—please refer to the Lisptorq manual at www.thinksquared.net/dev/lisptorq/.\n\
    \n# Step 3: Specifying the Database Settings\n\nDerby is an embedded database,\
    \ so you have to give it a folder to store the database files, and you have to\
    \ specify a system property called `derby-home`. These tasks are done for you\
    \ by Lisptorq’s generated helper classes, but you have to supply the information.\n\
    \nHere are the configuration parameters you must specify:\n\n- `database-type`\
    \ should be set to `derby`.\n- `database-name` should be set to `bookstore`.\n\
    - `derby-home` should be set to `./bookstore`.\n- `package` should be set to `net.bookstore`.\n\
    \nAgain, refer to the online manual for help on how to set these configuration\
    \ parameters. `database-type` is set to `derby` because we’re using the Derby\
    \ database for this lab. `database-name` specifies how the generated classes will\
    \ internally refer to the database. The `derby-home` setting is required by Derby,\
    \ and is a path that points to the folder that contains the database files. You\
    \ do *not* have to create this folder yourself; it will be done for you by the\
    \ `DatabaseSetup` program. Finally, the `package` setting is the package in which\
    \ you would like to place the generated classes.\n\n# Step 4: Generate the Java\
    \ Files\n\nFirst, enter `(lisptorq:generate database)` at the end of `main.lisp`.\
    \ This command is a request to generate the Model classes. Next, run `main.lisp`\
    \ in order to generate all the Model tier source code files:\n\n```\njava -classpath\
    \ .\\lib\\jlisp.jar;.\\lib\\lisptorq.jar\nnet.thinksquared.jlisp.Loader main.lisp\n\
    ```\n\nIf all goes well, you should see 16 files (four for each table plus four\
    \ helper classes) in the development folder.\n\nThe next step is to write a test\
    \ program to write and retrieve records.\n\n# Step 5: Writing the Test Program\n\
    \nWrite a simple test program in the file `Test.java` to store the following information:\n\
    \n- Authors: Lewis Carroll, Harold Edwards, Arthur Conan Doyle\n- Publishers:\
    \ Dover Books, Macmillan Publishers\n- Books:\n  - *Alice in Wonderland*, by Lewis\
    \ Carroll, Dover Books\n  - *Riemann’s Zeta Function*, by Harold Edwards, Dover\
    \ Books\n  - *The Sherlock Holmes Casebook*, by A. C. Doyle, Macmillan Publishers\n\
    \  - *Through the Looking Glass*, by Lewis Carroll, Macmillan Publishers\n\nEnter\
    \ this information into the relevant data objects, and then save them. Remember\
    \ that Books require foreign keys. How will you specify these?\n\nOnce the data\
    \ is saved, run the following queries:\n\n- List all books and their authors from\
    \ Dover Books.\n- List all the publishers that carry books by Lewis Carroll.\n\
    \nAgain, you should refer to the online manual for help.\n\n# Step 6: Initializing\
    \ the Database\n\nCompile your work (`javac *.java`) and then run `DatabaseSetup`\
    \ to create the database:\n\n```\njava -classpath ./lib/derby.jar org.bookstore.DatabaseSetup\n\
    ```\n\nYou should see the database files created in the `.\\bookstore` folder.\n\
    \n# Step 7: Running the Test Program\n\nFinally, run your `Test` program with\
    \ the command\n\n```\njava -classpath ./lib/derby.jar org.bookstore.Test\n```\n\
    \nPlay with this simple application, until you are thoroughly familiar with the\
    \ Model classes. Try to extend the functionality beyond that described here. Examine\
    \ the database schema for LILLDEP (described in a later section in this appendix).\n\
    \nNext, let’s see how to use Torque for the Registration webapp.\n\n# Using Torque\
    \ for the Registration Webapp\n\nLike Lisptorq, Torque also autogenerates Java\
    \ source code for you. In fact, the data object and peer classes and the functions\
    \ on them are very similar to those generated by Lisptorq (that is, in fact, where\
    \ the *torq* in *Lisptorq* comes from).\n\nI won’t discuss the installation and\
    \ setup of Torque here—you should refer to the Torque website (see “Useful Links”)\
    \ for details. However, I will illustrate its use with the Registration webapp.\
    \ Unlike Lisptorq, Torque uses XML to specify the database schema.\n\nThe `user`\
    \ table is described in Torque’s XML schema in Listing A-5.\n\n**Listing A-5.**\
    \ *Torque’s XML Description of the user Table*\n\n```xml\n<?xml version=\"1.0\"\
    \ encoding=\"ISO-8859-1\" standalone=\"no\"?>\n<!DOCTYPE database SYSTEM\n\"http://db.apache.org/torque/dtd/database_3_1.dtd\"\
    >\n<database name=\"registration\">\n<table name=\"user\" description=\"Table\
    \ of registered users\">\n<column\nname=\"user_id\"\nrequired=\"true\"\nprimaryKey=\"\
    true\"\ntype=\"VARCHAR\"\nsize=\"32\"/>\n<column\nname=\"password\"\nrequired=\"\
    true\"\ntype=\"VARCHAR\"\nsize=\"32\"/>\n</table>\n</database>\n```\n\nThe XML\
    \ is quite self-explanatory. Torque’s output from this XML consists of the usual\
    \ four classes (data object and peer classes), as it did for Lisptorq. So if you\
    \ know how to use Lisptorq, you know how to use Torque.\n\nFor example, the `exists()`\
    \ function (see Listing A-4) using Torque is provided in Listing A-6. As you can\
    \ see, compared with Listing A-4 there is very little difference.\n\n**Listing\
    \ A-6.** *An Implementation of `exists()` Using Torque*\n\n```java\npublic static\
    \ boolean exists(String userId){\nCriteria crit = new Criteria();\ncrit.add(UserPeer.USER_ID,userId);\n\
    return UserPeer.doSelect(crit).iterator().hasNext();\n}\n```\n\nThe central idea\
    \ behind both these frameworks is that you have special Model classes, custom\
    \ built by the framework for your webapp. Hibernate takes a different tack, allowing\
    \ you to persist *any* JavaBean. Unfortunately, with flexibility comes more complexity,\
    \ but Hibernate does an admirable job of keeping this to a minimum. We’ll see\
    \ how Hibernate works for the Registration webapp next.\n\n# Using Hibernate for\
    \ the Registration Webapp"
