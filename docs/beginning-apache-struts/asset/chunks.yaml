    • JSF 是一个规范。一个开源实现是来自 Apache 的 MyFaces。


    • JSF 的主要目的是管理在 Web 浏览器中显示的 UI 组件。


    • JSF 在允许创建行为类似于桌面应用程序的 Web 应用方面取得了长足进步。


    • Shale 将 JSF 扩展到了视图层之外，包括与 Apache Commons 项目（如 Validator）的集成，改进了复杂导航（使用对话框），以及更多功能。


