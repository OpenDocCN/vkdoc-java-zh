    **35**


    **Professional Java Tools**


    In this book, I’ve used Windows batch files to compile and prepare WAR files.
    I’ve done this to keep things as simple as possible. However, in the real world,
    batch files are not the best way to compile your web applications. A much, much
    better option is to use Apache Ant (see “Useful Links” for the website).


    Ant gives you a platform-independent way of compiling your Java source code. But
    Ant does much more. You can create different compile configurations easily with
    Ant. Also, many valuable Java tools integrate with Ant. While using Ant is beyond
    the scope of this book, I encourage you to download it and try to use it in your
    projects.


    The other area I encourage you to explore is using a real Java integrated development
    environment (IDE), rather than plain ol’ Notepad. Most IDEs provide tools to simplify
    creating and editing Java, HTML, and XML, thus making you more productive.


    One IDE I highly recommend is the open source Eclipse (see “Useful Links” for
    the website). A copy of this IDE is on the accompanying CD-ROM.


    **Useful Links**


    • Apache Ant website: http://ant.apache.org


    • Eclipse website: www.eclipse.org


    **Summary**


    • Custom tags are a central piece in Java-based web application frameworks.


    • Custom tag functionality is implemented by your subclass of either TagSupport
    or BodyTagSupport.


    • Use TagSupport if your custom tag doesn’t have a body and BodyTagSupport if
    it does.


    • You need to declare your custom tag in a Tag Library Descriptor (TLD) file.


    • You might have to register the TLD file’s location in web.xml.


