    **162**


    C H A P T E R 1 4 ■ T I L E S


    If you’ve followed the discussion on MVC in Chapter 5 closely, the shortcomings
    of these approaches should be obvious. MVC is all about separating code according
    to their functionality, and violating this principle leads to maintenance woes
    down the road. So it is with these ad hoc approaches. With them, making site-wide
    changes to layouts or components are difficult because you’d have to amend each
    page.


    As you will see, Tiles does it better—and easier.


    **Installing Tiles**


    To use Tiles, you have to declare it in struts-config.xml. Listing 14-1 shows
    a typical declaration.


    ■**Note** Remember, plug-in declarations come *last* in your struts-config.xml
    file. Placing it anywhere else will result in an exception being thrown when Struts
    starts up.


    **Listing 14-1.** *Tiles Declaration in struts-config.xml*


    <plug-in className="org.apache.struts.tiles.TilesPlugin" >


    <set-property property="definitions-config"


    value="/WEB-INF/tiles-defs.xml"/>


    </plug-in>


    The declaration in Listing 14-1 does two things. First, it tells Struts what *plug-in
    class* to instantiate. In this case, it’s org.apache.struts.tiles.TilesPlugin.
    This plug-in class is responsible for the initialization of Struts.


    Second, the <plug-in> tag contains one or more <set-property> tags, each of which
    passes a parameter-value pair to the plug-in class. In Listing 14-1, the only
    parameter passed to org.apache.struts.tiles.TilesPlugin is the definitions-config
    parameter, which points to the relative location of the Tiles definitions file.
    In this case, it’s /WEB-INF/


    tiles-defs.xml.


    This tiles-def.xml file (you may call it something else, if you wish—just change
    the value property if you do) is where you declare layouts and components for
    Tiles. You can think of it as the Tiles counterpart of struts-config.xml.'
  trans: '

    **T**iles 是一个 Struts *插件*——一款独立于 Struts 开发的软件，用于扩展 Struts 的基本功能。


    Tiles 最初由 Cedric Dumoulin 开发，但现在（自 1.2 版本起）已集成到 Struts 中。事实上，它取代了较早的“模板”库，该库仅提供有限的布局能力。唯一能暴露其先前独立存在痕迹的是，它作为一个插件，因此需要进行一些配置。


    Tiles 为 Struts 应用程序提供了两项新能力：


    • **布局**：能够轻松为 Struts 应用程序提供统一的“外观和感觉”。在大多数 Web 应用程序中，页面遵循相似的*布局*——例如，它们可能具有共同的页眉、页脚或侧边栏。Tiles
    拥有优雅的继承机制，使得创建和维护此类布局（即使是复杂的布局）变得容易。


    • **组件**：能够构建可重用的 GUI 组件，并轻松嵌入到 JSP 页面中。组件为您提供了显示*动态内容*的灵活性——这些内容可以根据用户交互或外部数据源而变化。例如，显示各个城市的天气预报列表、用户感兴趣的新闻条目或定向营销内容。


    简而言之，布局提供了共同的外观和感觉，而组件则允许以可重用的包形式提供动态内容。


    Tiles 的强大之处在于，您可以混合使用这两项能力：您的布局可以包含组件。例如，您可以指定一个布局，将组件作为包含用户搜索列表的侧边栏显示。合理使用，这可以构建出易于使用的应用程序。在本章的实验部分，您将亲自创建这样一个组件。


    当然，布局和组件行为也可以通过其他方式模拟。例如，您可以通过简单地在 JSP 页面中粘贴相应的 HTML 来强制实现统一的外观和感觉。您可以通过在 JSP
    中剪切和粘贴脚本片段来实现“组件”！


    **161**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C14.fm Page 162 Tuesday, January 24, 2006 10:13 AM


    **162**


    第 14 章 ■ T I L E S


    如果您仔细阅读了第 5 章关于 MVC 的讨论，这些方法的缺点应该显而易见。MVC 的核心是根据功能分离代码，违反这一原则会导致后续维护的麻烦。这些临时方法也是如此。使用它们，对布局或组件进行全站范围的更改会很困难，因为您必须修改每个页面。


    正如您将看到的，Tiles 做得更好——也更简单。


    **安装 Tiles**


    要使用 Tiles，您必须在 struts-config.xml 中声明它。清单 14-1 显示了一个典型的声明。


    ■**注意** 请记住，插件声明必须放在 struts-config.xml 文件的*最后*。将其放在任何其他位置都会导致 Struts 启动时抛出异常。


    **清单 14-1.** *在 struts-config.xml 中的 Tiles 声明*


    <plug-in className="org.apache.struts.tiles.TilesPlugin" >


    <set-property property="definitions-config"


    value="/WEB-INF/tiles-defs.xml"/>


    </plug-in>


    清单 14-1 中的声明做了两件事。首先，它告诉 Struts 要实例化哪个*插件类*。在本例中，是 org.apache.struts.tiles.TilesPlugin。这个插件类负责
    Struts 的初始化。


    其次，<plug-in> 标签包含一个或多个 <set-property> 标签，每个标签向插件类传递一个参数-值对。在清单 14-1 中，传递给 org.apache.struts.tiles.TilesPlugin
    的唯一参数是 definitions-config 参数，它指向 Tiles 定义文件的相对位置。在本例中，是 /WEB-INF/tiles-defs.xml。


    这个 tiles-def.xml 文件（如果您愿意，可以将其命名为其他名称——只需更改 value 属性即可）是您为 Tiles 声明布局和组件的地方。您可以将其视为
    struts-config.xml 的 Tiles 对应物。

    '
- fmt: "■**Note** The Struts distribution contains a `tiles-documentation.war` file.\
    \ It contains an example `tiles-def.xml` file you can use, in the `/WEB-INF/`\
    \ folder of that WAR file.\n\nListing 14-2 shows the format of the `tiles-def.xml`\
    \ file.\n\n**Listing 14-2.** *A Blank Tiles Definitions File*\n\n```xml\n<?xml\
    \ version=\"1.0\" encoding=\"ISO-8859-1\" ?>\n\n<!DOCTYPE tiles-definitions PUBLIC\n\
    \  \"-//Apache Software Foundation//DTD Tiles Configuration 1.1//EN\"\n  \"http://struts.apache.org/dtds/tiles-config_1_1.dtd\"\
    >\n\n<tiles-definitions>\n\n</tiles-definitions>\n```\n\nThe root tag is `<tiles-definitions>`,\
    \ and it contains one or more `<definition>` tags, with which you declare layouts\
    \ or components. The next two sections show you how to do this.\n\n■**Note** The\
    \ Tiles DTD (Document Tag Definition) is stored in the `struts.jar` file that\
    \ comes with the Struts distribution. In this JAR file, the path to the DTD is\
    \ `/org/apache/struts/resources/tiles-config_1_1.dtd`. This file also contains\
    \ the `DOCTYPE` element used in Listing 14-2. It is also present in the `/lib`\
    \ folder of the Struts distribution zip file.\n\nYou may split your Tiles definitions\
    \ into more than one file. This is useful for large projects requiring several\
    \ sets of look-and-feels or components that have to be maintained separately.\
    \ Each such Tiles definitions file must follow the format of Listing 14-2, and\
    \ you’ll have to declare each file in your plug-in declaration. Simply separate\
    \ the filenames with commas in the `<set-property>` tag. For example, if you had\
    \ three Tiles definitions files, `A.xml`, `B.xml`, and `C.xml`, the `<set-property>`\
    \ tag would read:\n\n```xml\n<set-property property=\"definitions-config\"\n \
    \             value=\"/WEB-INF/A.xml,/WEB-INF/B.xml,/WEB-INF/C.xml\"/>\n```\n\n\
    Lastly, Tiles also uses a custom tag library, `struts-tiles.tld`. You will have\
    \ to declare this in your `web.xml` file (refer to Chapter 3) in order to use\
    \ this library on your JSPs.\n\n## Tiles for Layout\n\nLayouts are a way to create\
    \ a common look-and-feel for your web application. For example, you might want\
    \ all JSP pages to have a footer containing copyright information, a side navigation\
    \ bar, and a header with the company logo.\n\nIn Tiles, layouts are just JSP pages.\
    \ The JSP page for a layout defines the relative placement of sections (body,\
    \ header, footer, sidebars, etc.) on the displayed page. The content of each section\
    \ is defined by `<tiles:insert>` tags, which point to other HTML or JSP pages\
    \ holding content. Listing 14-3 is a simple layout containing a title, header,\
    \ body, and footer sections.\n\n**Listing 14-3.** *simple-layout.jsp, a Simple\
    \ Layout with Title, Header, Body, and Footer*\n\n```jsp\n<%@ taglib uri=\"/tags/struts-tiles\"\
    \ prefix=\"tiles\" %>\n\n<html>\n<head>\n<title><tiles:getAsString name=\"title\"\
    /></title>\n</head>\n<body>\n<table>\n<tr><td><tiles:insert attribute=\"header\"\
    /></td></tr>\n<tr><td><tiles:insert attribute=\"body\"/></td></tr>\n<tr><td><tiles:insert\
    \ attribute=\"footer\"/></td></tr>\n</table>\n</body>\n</html>\n```\n\nAs Listing\
    \ 14-3 clearly demonstrates, a layout defines just the *relative placement* of\
    \ content, not the actual content itself. Figure 14-1 shows the relative placement\
    \ of the various components of the layout.\n\n**Figure 14-1.** *The relative placement\
    \ of header, body, and footer in simple-layout.jsp*\n\nThe `<tiles:getAsString>`\
    \ tag displays content for the title, and the `<tiles:insert>` tags display the\
    \ content corresponding to the `attribute` or `name` property. The actual content\
    \ pointed to by these properties can be defined in either the called JSP or the\
    \ Tiles definitions file.\n\nFor example, suppose `myPage.jsp` wanted to use the\
    \ layout of Listing 14-3 (`simple-layout.jsp`). Listing 14-4 shows what the contents\
    \ of `myPage.jsp` might be.\n\n**Listing 14-4.** *myPage.jsp, Which Uses simple-layout.jsp*\n\
    \n```jsp\n<%@ taglib uri=\"/tags/struts-tiles\" prefix=\"tiles\" %>\n\n<tiles:insert\
    \ page=\"/layouts/simple-layout.jsp\">\n  <tiles:put name=\"title\" value=\"A\
    \ simple page\" />\n  <tiles:put name=\"header\" value=\"/common/header.jsp\"\
    \ />\n  <tiles:put name=\"footer\" value=\"/common/footer.jsp\" />\n  <tiles:put\
    \ name=\"body\" value=\"/mypage-content.jsp\" />\n</tiles:insert>\n```\n\nAll\
    \ `myPage.jsp` does is specify (using the `<tiles:put>` nested tags) *which* files\
    \ are to be associated with the `header`, `footer`, and `body` attributes. The\
    \ title is specified as a string, in this case, `\"A simple page\"`.\n\nNotice\
    \ the differences in how `<tiles:insert>` is used in Listings 14-3 and 14-4:\n\
    \n- In the layout JSP (Listing 14-3), the `attribute` property is used to tell\
    \ Struts what content it should use to replace the enclosing `<tiles:insert>`\
    \ tag. For example, when Struts processes `<tiles:insert attribute=\"header\"\
    />` in Listing 14-3, it essentially looks for the value of `header` on the request\
    \ object. It then uses this value (a JSP page, or as we will see in the next section,\
    \ a component) and pastes the content from that page or component in place of\
    \ the `<tiles:insert>` tag.\n- In the called JSP (Listing 14-4), the `page` property\
    \ is used to specify a layout, and the output from this layout is used to replace\
    \ the `<tiles:insert>` tag. The nested `<tiles:put>` tags define Tiles attributes\
    \ on the request object. The layout reads these attributes in order to create\
    \ its output. For example, when Struts processes the `<tiles:insert>` in Listing\
    \ 14-4, it knows it must use the layout file `/layouts/simple-layout.jsp`. In\
    \ this layout file, there are a few `<tiles:insert>` tags that require the `header`,\
    \ `footer`, and `body` attributes to be created. The values for each is defined\
    \ in the calling JSP using `<tiles:put>` tags.\n\nIt is important to note that\
    \ the attributes defined using a `<tiles:put>` tag will only apply to the layout\
    \ defined in the enclosing `<tiles:insert page=\"...\">` tag. In the unlikely\
    \ event that you had two `<tiles:insert page=\"...\">` tags on your called JSP\
    \ page, you would have to specify the attributes for each separately. The attributes\
    \ between these two tags are not shared.\n\n■**Note** The `page`, `template`,\
    \ and `component` properties of the `<tiles:insert>` tag are synonymous. You might\
    \ want to use a different synonym to indicate if a layout or Tiles component (see\
    \ the next section) is used. This simply improves readability.\n\nThe other way\
    \ to specify the values of the `attribute` or `name` property is to create a definition\
    \ within the Tiles definitions file. For example, you could move part of Listing\
    \ 14-4 into the Tiles definitions file, as shown in Listing 14-5.\n\n**Listing\
    \ 14-5.** *tiles-def.xml, with a Single Definition*\n\n```xml\n<?xml version=\"\
    1.0\" encoding=\"ISO-8859-1\" ?>\n\n<!DOCTYPE tiles-definitions PUBLIC\n  \"-//Apache\
    \ Software Foundation//DTD Tiles Configuration 1.1//EN\"\n  \"http://struts.apache.org/dtds/tiles-config_1_1.dtd\"\
    >\n\n<tiles-definitions>\n  <definition name=\".simple\" path=\"/layouts/simple-layout.jsp\"\
    >\n    <tiles:put name=\"header\" value=\"/common/header.jsp\" />\n    <tiles:put\
    \ name=\"footer\" value=\"/common/footer.jsp\" />\n  </definition>\n</tiles-definitions>\n\
    ```\n\nListing 14-5 shows a Tiles definitions file called `.simple` (the meaning\
    \ of the leading dot will be obvious shortly). This definition defines just two\
    \ attributes, `header` and `footer`.\n\nTo use the `.simple` definition in a JSP,\
    \ see Listing 14-6.\n\n**Listing 14-6.** *myPage2.jsp, Which Uses a Tiles Definition*\n\
    \n```jsp\n<%@ taglib uri=\"/tags/struts-tiles\" prefix=\"tiles\" %>\n\n<tiles:insert\
    \ definition=\".simple\">\n  <tiles:put name=\"title\" value=\"A simple page\"\
    \ />\n  <tiles:put name=\"body\" value=\"/mypage-content.jsp\" />\n</tiles:insert>\n\
    ```"
