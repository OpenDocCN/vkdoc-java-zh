    When a Struts JSP page is requested, its processing does *not* involve the main
    Struts servlet (ActionServlet). Only submissions of form data involve the main
    servlet. It is this servlet that populates your ActionForm subclass and invokes
    execute() on your Action subclass.


    Of course, Struts classes are involved in a page’s rendering, but these are just
    the BodyTagSupport and TagSupport classes representing each tag (see Chapter 4).
    The only state that these classes know about is stored on the server-side HttpServletRequest
    and HttpSession objects, representing the current request and session, respectively.


    As you’ve seen in Chapter 4, BodyTagSupport or TagSupport are responsible for
    the final rendering of a tag’s visual appearance. Not all Struts tags have a visual
    appearance, though.


    Those from the Logic library (discussed in Chapter 10), for example, perform conditional
    processing to selectively display other tags that *do* have a visual appearance.


