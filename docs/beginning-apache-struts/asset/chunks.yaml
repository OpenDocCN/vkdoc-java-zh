    **419**


    Attributes


    All common attribute sets (evt-attrs, acc-attrs, ren-attrs, struts-attrs, init-attr,
    and the new err-attrs) are accepted, and have their usual meanings.


    Besides these, there are a few attributes specific to both text and password:


    • size: The length of the displayed field. If omitted, the decision is left to
    the browser.


    • readonly: If true, the text field may not be edited.


    • maxlength: Maximum number of characters to accept. The default is to allow an
    unlimited number of characters.


    The password tag has an additional boolean attribute called redisplay, which defaults
    to true. This causes the previously keyed password (when a form is redisplayed
    because of validation errors) to appear as asterisks. Unfortunately, the actual
    password is also embedded in the HTML for that page. You should set redisplay=false
    to prevent passwords being harvested from cached pages.


    Examples


    The code


    <html:text property="email" />


    specifies a text input field for the property called email on the current form
    bean.


    <html:password property="pwd" />


    specifies a password field.


