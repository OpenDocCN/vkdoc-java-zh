- fmt: '# CHAPTER 20 ■ JAVASERVER FACES AND STRUTS SHALE


    - **Adding features previously unavailable in Struts**: For example, Struts does
    not address user interactions spanning multiple page requests. Shale has a feature
    called “dialogs” (borrowed from Spring’s “webflow”) to do this.

    - **Integration with other webapp frameworks**: Primarily the Spring framework.


    There is also some support for Ajax technologies.


    So beware! Shale is *not* a natural evolution of “classic” Struts—you can’t just
    “upgrade” your Struts webapp to Shale.


    So why the “Struts” prefix? The reason is probably because the most useful parts
    of Struts have been successfully refactored into Apache Commons projects (the
    Validator framework and dynamic forms), or are largely independent of Struts (like
    Tiles is). Shale reuses these to provide important conveniences not present in
    the JSF specification. In this sense, classic Struts is part of Shale. Note also
    a more cynical alternative we’ve discussed in the sidebar, “Struts Ti and Struts
    OverDrive.”


    ## Learning Struts a Waste of Time?


    The preceding introduction might give you pause for thought: is learning Struts
    a waste of time?


    By no means!


    “Classic” Struts is by far the most popular webapp framework to date, and will
    very likely coexist with both JSF and Shale for some time yet. As you’ll see later
    in this chapter, there are a number of areas (like validation and dynamic forms)
    that JSF does not address as well as Struts. This was intentional, since JSF focuses
    on the View tier, and leaves it to other technologies to addresses its deficiencies
    in other areas. This in fact is the raison d’être *for Shale. Unfortunately, at
    the time of this writing, Shale is just at version 1.0, nowhere near the maturity
    of classic Struts.*


    *Also, classic Struts is still under active development, so new features and improvements
    are likely, further spurring its adoption by those who do not need the advanced
    features of JSF or Shale.


    Lastly, a good working knowledge of Struts gives you an edge in picking up the
    newer technologies, and gives you a better vantage point from which to evaluate
    their effectiveness for your needs.


    ## JavaServer Faces (JSF)


    As you might gather by now, JSF focuses on the View tier. Viewed from a Struts
    developer’s eyes, this focus implies two important differences between JSF and
    Struts.


    - **A more complex request processing lifecycle**: Because JSF uses server-side
    UI components, it processes incoming HTTP requests differently from Struts. JSF’s
    request processing lifecycle is divided into several *phases.* This is unlike
    Struts, which has just two phases: one for when the `ActionForm` gets validated
    and the other when the `Action`’s `execute()` function is called. Also, JSF allows
    your own classes to listen for *events* at the end of each phase (more on this
    in the following subsections). This is a huge improvement over Struts, and is
    what makes JSF so extensible.


    - **Some configuration information moved away from configuration files into JSPs**:
    JSF has no notion of the Validation framework, dynamic forms, or Tiles, so config
    files for these do not exist. Instead, validations, for example (and as you will
    see, many other things), are specified in JSPs that make up the webapp. Like Struts,
    JSF does have a config file, called `faces-config.xml`, so not all the configuration
    information goes out to JSPs.


    It is important to take note of these two points to help lessen the cognitive
    dissonance you (as a Struts developer) might experience when learning JSF.


    ### Server-Side UI Components


    When a page is submitted to a Struts webapp, the form data on the page is stored
    in an `ActionForm` subclass. Normally, we’d think of the `ActionForm` as a temporary
    storage area for data destined for the Model tier.'
