    第5章 ■ MVC设计模式


    `Struts`中这一明显缺陷的一个原因是，已经有几个框架可以帮助你进行数据访问和持久化。它们被称为“持久化框架/层”或“对象/关系（O/R）持久化服务”。这些框架存在的目的是持久化数据，并且要*做好*。你可以将其中任何一个与`Struts`结合使用。所以你看，这根本不是缺陷，而是良好的设计。


    有两种不同的数据持久化方法：


    - **持久化类**：这种方法让你将任何`Java`对象存储到关系数据库或从中检索。你获得一组类，必须使用它们来持久化和检索你自己的`Java`类。这种方法的一个例子是来自`Apache`的`Hibernate`。

    - **类持久化**：在这种方法中，你为数据库表及其相互关系指定描述。持久化框架*自动生成*`Java`类（源代码），这些类与你的数据库表有映射关系。这些自动生成的类具有`save()`、`select()`和`delete()`函数，以允许数据对象的持久化和检索。这种方法的一个典型例子是同样来自`Apache`的`Torque`。


    “持久化类”方法远为灵活，因为你可能持久化任何`Java`类，包括遗留类或第三方类。而“类持久化”方法则缺乏这种能力，但能在模型和控制器之间产生更清晰的分离。


    我应该提醒你，虽然这两种方法之间的比较是有效的，但你不能用它来在`Hibernate`和`Torque`等产品之间做出选择。例如，`Hibernate`提供了许多超出我在此描述的功能。在选择持久化框架时，这些额外功能才是你需要考虑的。'
  raw: 'This is because servlets solve a number of *generic* problems that stem from
    client-server communication, such as object pooling and session management. Your
    servlet classes could implement the basic Servlet interface from scratch, or subclass
    the GenericServlet base class. You’d do this if you wanted to take advantage of
    servlet technology’s solutions to these generic problems.


    If you’re primarily concerned with processing and displaying web pages, HttpServlet
    is the base class you’d subclass.


    ■**Note** In addition to this, ActionServlet and its helper classed are responsible
    for many other behind-the-scenes things like pooling Action subclasses for efficiency,
    reading configuration data, or initializing Struts extensions called plug-ins.
    These activities are invisible to Struts developers, and are one good reason why
    Struts is so easy to use. You don’t have to know how the clock works to tell the
    time!


    The incoming form data is processed in stages:


    • **Data transfer**: Form data is transferred to your ActionForm subclass.


    • **Simple validation**: The form data in this subclass is passed through simple
    validation. If simple validation fails, then the user is automatically presented
    with the form with the error messages detailing the errors. This is a *typical*
    scenario, but the details would depend on how you configured Struts. We’ll go
    through the mechanics of simple validation in Chapter 6 and tackle configuration
    in Chapter 9.


    • **Further processing**: Form data is next sent to your Action subclass for complex
    validation and the processing of business logic. We’ll discuss this in Chapter
    7.


    Your Action subclass also specifies the “next” page to be displayed, and this
    ends the processing of a single request.


    **Frameworks for the Model**


    In a previous section, I sang the joys of designing the Model portions of your
    webapp first, so Struts’ lack in this area might come as a bit of a letdown.


