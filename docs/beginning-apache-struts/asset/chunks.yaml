    I hope this short introduction has succeeded in whetting your interest in JSF.
    Here are a few pointers on where to go next:


    * **Download the spec**: The JSF spec is available for download. The spec is quite
    readable, and I’ve found it helpful as a reference. However, you should be aware
    that it’s aimed at those wanting to implement JSF, so it’s not really an introduction
    to JSF.

    * **Download the source for MyFaces**: I’ve found this immensely valuable as a
    guide to the inner workings of JSF. You might hit a slight bump downloading the
    source, though: at the time of this writing you need a Subversion client (see
    “Useful Links”) to download the source. You also need Ant (again, see “Useful
    Links”) to automatically download the dependencies (library JAR files) for MyFaces.
    This can be a pain, so we’ve done this for you. We’ve put a copy of the MyFaces
    1.1.1 source code in the Source Code section of the Apress website. Also on the
    Apress website in the Source Code section is a copy of Ant, which you must install
    in order to compile MyFaces. The Ant distribution contains documentation on how
    to use Ant. Note that the MyFaces Ant build file needs an Internet connection
    in order to work.'
