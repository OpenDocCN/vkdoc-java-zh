    3. You should see a subdirectory called `.\Struts\lilldep\`.

    4. Open `.\Struts\lilldep\compile.bat` in a text editor and amend the `PATH` environment
    variable so that it points to your JDK installation.


    ■**Note** On Windows XP, ME, or 2000, which have built-in unzipping capabilities,
    the zip file may add an extra `lilldep` directory in the unzipped path. So, the
    `compile.bat` file’s path would be `.\Struts\lilldep\lilldep\compile.bat`. You
    could move the `lilldep` folder up or just continue. The compile scripts should
    work regardless.


    Test your changes by clicking on `compile.bat`. You should get no errors, and
    you should see a file called `lilldep.war` in `.\Struts\lilldep\`. In what follows,
    I’ll refer to all paths relative to `.\Struts\lilldep\`.


    ### Step 2: Implement Getters and Setters for ContactForm


    A skeleton for `ContactForm` has been created for you, in the directory `net\thinksquared\lilldep\struts`.'
