    **拆分 struts-config.xml**


    随着项目规模的增长，尤其是在团队协作中，你可能会希望将 `struts-config.xml` 拆分成多个文件。你可能希望这样做有几个原因：


    -   **可管理性**：当 `config.xml` 文件变得过大时，Web 应用程序的控制流会变得不够清晰。你可能希望将 `struts-config.xml`
    拆分成不同的部分，每个部分可能代表整个 Web 应用程序中某个有限部分的控制流。

    -   **分离命名空间**：有两个或更多团队负责 Web 应用程序的不同方面，你希望这些团队能够彼此独立地工作。这里主要关注的是为每个团队提供不同的*命名空间*。不同的命名空间有助于避免两个团队创建同名但不同的表单
    Bean 的问题。

    -   **源代码控制**：一些设计不佳的源代码控制系统只允许单个签出。如果你在一个大型团队中工作，这可能会非常受限，因为很可能不止一个人想要同时编辑 `struts-config.xml`。


    拆分 `struts-config.xml` 的第一种方法就是直接拆分。你可以创建多个 `struts-config.xml` 文件（当然，使用不同的名称！），并指示
    Struts 将它们视为一个文件。为此，你需要编辑 servlet 配置文件 `web.xml`。


    例如，假设你有多个配置文件：`struts-config.xml`、`struts-config-admin.xml` 和 `struts-config-logon.xml`。清单
    17-16 展示了如何在 `web.xml` 中声明它们。你只需要在每个 Struts 配置文件之间放置一个逗号。很简单！


    **清单 17-16.** *在 web.xml 中声明多个 Struts 配置文件*


    <servlet>


    <servlet-name>action</servlet-name>


    <servlet-class>


    org.apache.struts.action.ActionServlet


    </servlet-class>


    <init-param>


    <param-name>config</param-name>


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C17.fm 第 264 页 2006 年 1 月 24 日 星期二 上午 10:14


    **264**


    第 17 章 ■ 杂 项


    **<param-value>**


    **/WEB-INF/struts-config.xml,**


    **/WEB-INF/struts-config-admin.xml,**


    **/WEB-INF/struts-config-logon.xml**


    **</param-value>**


    </init-param>


    </servlet>


    现在，这种方法解决了可管理性和源代码控制问题，但它没有解决命名空间问题，因为 Struts 会在内部将所有声明的配置文件合并在一起。因此，虽然对你来说它们看起来是两个或多个文件，但对
    Struts 来说它们是一个文件。


    Struts 有一个称为模块的功能，允许你将 Struts 配置文件拆分成不同的模块。一个模块代表 Web 应用程序中的一个*逻辑*拆分。每个模块都有自己的命名空间，因此这解决了命名空间问题。使用前面的例子，假设我们希望为每个
    Struts 配置文件提供独立的命名空间：为 `struts-config.xml` 中声明的项提供默认命名空间，为 `struts-config-admin.xml`
    提供 admin 命名空间，为 `struts-config-logon.xml` 提供 logon 命名空间。在 `web.xml` 中得到的声明如清单
    17-17 所示。


    **清单 17-17.** *在 web.xml 中声明多个子模块*


    <servlet>


    <servlet-name>action</servlet-name>


    <servlet-class>


    org.apache.struts.action.ActionServlet


    </servlet-class>


    <init-param>


    **<param-name>config</param-name>**


    **<param-value>/WEB-INF/struts-config.xml</param-value>**


    </init-param>


    <init-param>


    **<param-name>config/admin</param-name>**


    **<param-value>/WEB-INF/struts-config-admin.xml</param-value>**


    </init-param>


    <init-param>


    **<param-name>config/logon</param-name>**


    **<param-value>/WEB-INF/struts-config-logon.xml</param-value>**


    </init-param>


    </servlet>


