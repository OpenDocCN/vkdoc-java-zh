    **表单与表单处理器**


    Web 应用的核心在于获取用户输入并处理它们。在 Struts 中（与 HTML 一样），主要方式是通过*表单*。


    在 Struts 中，表单在 `<html:form>` 容器标签内声明。这与你在 HTML 中声明表单的方式类似。`<html:form>` 元素具有 `action`
    属性，用于描述处理表单数据的处理器：


    <html:form action="Registration.do" ...


    在此代码片段中，处理器名为 Registration。处理器是你的 `ActionForm` 子类（执行简单验证）与你的 `Action` 子类（执行业务逻辑）的*特定组合*。你将在下一章了解如何声明处理器。目前，你只需理解
    `action` 属性指向你已定义的处理器。


