    \ 子类映射到一个名称。您可以在 struts-config.xml 文件的其余部分甚至 JSP 页面上使用此名称作为 ActionForm 的别名。\n\n\
    • **全局异常**：此部分定义处理过程中抛出的异常的处理程序。\n\n• **全局转发**：此部分将 Web 应用中的页面映射到一个名称。您可以使用此名称来引用实际页面。这避免了在\
    \ Web 页面上硬编码 URL。\n\n• **表单处理程序**：还记得我在上一章提到的表单处理程序吗？\n"
