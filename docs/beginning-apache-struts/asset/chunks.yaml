- fmt: '# ActionMessages


    `ActionMessages` also has a static `String` variable called `GLOBAL_MESSAGE`,
    which is a property name marker to use for global messages (as opposed to those
    related to a specific property).


    ## `org.apache.struts.action.ActionErrors`


    `ActionErrors` is a subclass of `ActionMessages`, and its sole use is as the return
    value of `ActionForm`''s `validate()`. All of the functions and properties on
    this class have been deprecated. You should refer to functions or properties on
    `ActionMessages` instead.


    ## `org.apache.struts.action.ActionMapping`


    `ActionMapping` holds information about the valid "next" pages for a particular
    form handler.


    | Return Type | Function | Comments |

    | --- | --- | --- |

    | `ActionForward` | `findForward(String name)` | Finds and returns the `ActionForward`
    instance defining how forwarding to the specified logical name should be handled
    |

    | `ActionForward` | `getInputForward()` | Gets the context-relative path of the
    input form to which control should be returned if a validation error is encountered
    |


    ## `org.apache.struts.action.Action`


    An `Action` is an adapter between the contents of an incoming HTTP request and
    the corresponding business logic that should be executed to process this request.
    Struts will select an appropriate `Action` for each request, create an instance
    (if necessary), and call the `execute()` function. Actions must be programmed
    in a thread-safe manner, because Struts will share the same instance for multiple
    simultaneous requests. This means you should design with the following points
    in mind:


    - Instance and static variables *must not* be used to store information related
    to the state of a particular request.

    - They *may* be used to share global resources across requests for the same `Action`.

    - Access to other resources (JavaBeans, session variables, etc.) *must* be synchronized
    if those resources require protection. (Generally, however, resource classes should
    be designed to provide their own protection where necessary.)


    | Return Type | Function | Comments |

    | --- | --- | --- |

    | `ActionForward` | `execute(ActionMapping mapping, ActionForm form, HttpServletRequest
    request, HttpServletResponse response)` | Processes the specified HTTP request,
    and creates the corresponding HTTP response (or forward to another web component
    that will create it), with provision for handling exceptions thrown by the business
    logic |

    | `void` | `addErrors(HttpServletRequest request, ActionMessages errors)` | Adds
    the specified errors keys into the appropriate request attribute for use by the
    `<html:errors>` tag, if any messages are required |

    | `void` | `saveErrors(HttpServletRequest request, ActionMessages errors)` | Saves
    the specified error messages keys into the appropriate request attribute for use
    by the `<html:errors>` tag, if any messages are required |


    ## `org.apache.struts.action.ActionForm`


    An `ActionForm` is a JavaBean optionally associated with one or more `ActionMappings`.
    Such a bean will have had its properties initialized from the corresponding request
    parameters before the corresponding `Action.execute()` function is called.


    When the properties of this bean have been populated, but before the `execute()`
    function of the `Action` is called, this bean''s `validate()` function will be
    called, which gives the bean a chance to verify that the properties submitted
    by the user are correct and valid. If this function finds problems, it returns
    an error messages object that encapsulates those problems, and Struts will return
    control to the corresponding input form. Otherwise, the `validate()` function
    returns `null`, indicating that everything is acceptable and the corresponding
    `Action.execute()` function should be called.


    The `ActionForm` class *must* be subclassed in order to be instantiated.'
