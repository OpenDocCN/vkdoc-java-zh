    **1.** 我们将使用 `LookupDispatchAction` 来实现这一点，因此你需要将 ContactAction 的基类更改为 `LookupDispatchAction`。


    **2.** 将 `execute()` 方法的名称更改为 `save()`。


    **3.** 因为现在有两个提交按钮，我们不能依赖 Struts 自动为我们验证表单。这意味着我们必须从 `save()` 中调用 `validate` 函数。进行必要的更改以实现这一点，并注意在
    `struts-config.xml` 中将关联表单处理器的 `validate` 设置为 `false`。


    **4.** 实现 `find()` 函数，其签名和返回类型与 `execute()` 相同。此函数应将表单的 Contact 替换为一个干净的实例，然后返回名为
    `success` 的 forward。


    **5.** 实现 `getKeyMethodMap()`。


    你还需要向与 ContactAction 关联的表单处理器（有两个）添加一个名为 `parameter` 的额外属性，其值设置为 `command`。这是
