    **submit**


    This tag displays a button that if clicked causes the enclosing form to be submitted
    for processing.


    Usage Restrictions


    This tag must be inside an <html:form> tag.


    Attributes


    The first four attribute sets (evt-attrs, acc-attrs, ren-attrs, and struts-attrs)
    are accepted.


    If value isn’t specified and if there is no text rendered in the body of the <html:submit>,
    then the button text defaults to “Submit”.


    Examples


    This example shows three submit buttons, all of which have the text “Submit Me”.
    The last submit button uses an <html:bean> to localize its text:


    <html:submit value="Submit Me" />


    <html:submit >Submit Me</html:submit>


    <html:submit >


    <html:bean message="msg.submit-me"/>


    </html:submit >


    The last technique is especially useful if your form uses more than one submit
    button for different actions. Refer to Chapter 17’s section on LookupDispatchAction
    for details.


    Equivalents


    The JSF <h:commandButton id="submit" type="SUBMIT"> allows you to emulate the
    functionality of the <html:submit> button. Of course, for you to use this with
    Struts, you need to embed it within the Strut-Faces <s:form> tag. Refer to Chapter
    20 for details on


    <h:commandButton> and <s:form>.


