    request.setAttribute("myOptions", labelValuePairs); Simple Performance Optimizations


    For performance reasons, you should save and reuse a single collection instance,
    and not re-create it in each populating Action.


    Sometimes, though, your selection may require a mix of dynamic and static options.


    One simple solution in this situation is to use more than one <html:optionsCollection>—


    one for the static options that come from a cache, and another that refers to
    dynamically created value-label pairs.


    Even in the case of dynamically created pairs, some optimization is possible.
    The most time-consuming task is creating the new LabelValueBean objects. If the
    possible value-label combinations are finite, you might want to cache them in
    a WeakHashMap, which acts as a temporary cache. Of course, the benefits of caching
    the JavaBeans this way might be outweighed by the performance hit in calculating
    the keys to retrieve the bean from the WeakHashMap. So, this technique works best
    when you already have a usable key at hand.


    Internationalization


    The use of JavaBeans instead of Struts’ message resource mechanism means that
    the option labels can’t be readily localized. One simple solution is to use a
    custom class (see Listing C-2) for the collection (we’ll use an Iterator), and
    to use LabelValueBeans to store message resource keys pointing to the localized
    label instead of the actual label.


    The translation from message key to actual label while at the same time not creating
    unnecessary objects requires some trickery, as you can see from Listing C-2.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


