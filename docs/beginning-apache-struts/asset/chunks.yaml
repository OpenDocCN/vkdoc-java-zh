- fmt: '# Doray_6048AppC.fm Page 402 Tuesday, January 17, 2006 4:46 PM


    **402**


    ## APPENDIX C ■ STRUTS TAG REFERENCE


    - `paramName`, `paramProperty`, `paramScope` and `paramId`: You use these to create
    a single request parameter. The request parameter is appended to the final URL
    for the image. The first set of three attributes is used to locate a single object
    on the current request or session. This object’s `toString()` is the single parameter
    value. The name of the parameter is given by `paramId`.

    - `name`/`property`/`scope`: You use these to create multiple request parameters.
    The request parameters are appended to the final URL for the image. These attributes
    are used to locate an object of type `java.util.Map`. The `Map`’s keys are the
    parameter names, and the corresponding values are the parameter values. If you
    specify `property`, you must also specify `name`.

    - `useLocalEncoding`: If set to `true`, tells Struts to use whatever the character
    encoding is for the current `HttpServletResponse`.


    ### Examples


    Here’s how to render a localized image:


    ```

    <html:img srcKey="app.images.companylogo" />

    ```


    To understand how to create single or multiple request parameters on the image’s
    URL, refer to the entry for `<html:link>`.


    ### Equivalents


    JSF’s `<h:graphicImage>` is an equivalent.


    ### `javascript`


    This tag causes the generation of JavaScript for client-side validation. This
    tag is very closely tied to the Validator framework.


    #### Usage Restrictions


    Using this tag only makes sense when it’s accompanying an `<html:form>`, since
    the generated JavaScript is used for client-side form validations. The JavaScript
    code is autogenerated by the Validator framework. Therefore, your `ActionForm`
    subclasses must be subclasses of `ValidatorForm` as well in order for this tag
    to work.


    #### Attributes


    The most common use of this tag is without any attributes defined. However, you
    can customize the generated JavaScript a little by using the following attributes:


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048AppC.fm Page 403 Tuesday, January 17, 2006 4:46 PM


    **403**


    - `bundle`: Specifies a message resource bundle (see Table C-8) to use in generating
    error messages. This attribute was added in Struts 1.2.7. See also the entry for
    `<bean:message>`.

    - `htmlComment`: If set to `true`, enclose the JavaScript with HTML comment delimiters
    (`<!--` and `-->`). This is needed to prevent very old browsers from rendering
    JavaScript on to the page. This setting is ignored if you’ve used `<html:xhtml>`
    or `<html:html xhtml="true">`. The default is `true`.

    - `cdata`: If `cdata="true"`, and if you’ve used `<html:xhtml>` or `<html:html
    xhtml="true">`, the generated JavaScript is enclosed by XML’s `CDATA[...]` delimiter.

    - `method`: Specifies a different prefix for the names of the autogenerated JavaScript.
    Use this attribute to prevent name clashes between your own JavaScript and the
    Struts-generated JavaScript code.

    - `scriptLanguage`: If set to `false`, omits the `language` attribute in the generated
    `<script>` tag.

    - `staticJavascript`/`dynamicJavascript`: Both of these take boolean values. `staticJavascript`
    (default is `true`) specifies whether the static JavaScript code from the Validator
    framework needs to be pasted into the page. Similarly, `dynamicJavascript` (the
    default is `true`) specifies if the dynamic JavaScript code generated for the
    form should be pasted into the page. Ordinarily, you’d leave out both these attributes.

    - `src`: This puts an HTML `src` attribute into the rendered `<script>` tag. You’d
    use this to specify your own JavaScript files you want loaded when the page is
    displayed by the browser.

    - `page`/`formName`: The Validator framework allows you to create multipage validations
    (this topic is not covered in this book). This feature is useful in creating multipage
    wizards that simplify filling in complex data. Typically, the user is presented
    with one subform at a time, each with “next” and “back” buttons. The `page` attribute
    is the number of the current page, and the `formName` attribute is the name of
    the form bean.


    ### Examples'
