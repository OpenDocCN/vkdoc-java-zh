    **JSF Tag Libraries**


    There are just two standard JSF tag libraries:


    • The Core tag library deals with JSF functionality that is independent of the
    way the View is rendered. Remember, JSF is very flexible, and it need not work
    with just HTML as its view medium. It’s possible to use JSF to render to Wireless
    Markup Language (WML), for example. The Core taglib contains, for example, tags
    to run validations or tags to load message resources.


    • The HTML tag library defines tags specifically describing the View tier, specifically
    for HTML output.


    I''d like to remind you that the set of “standard” UI components and validators
    is fairly limited. To create complex webapps, you will likely want to extend JSF.
    There are two ways to do this:


    • Use third-party UI components and validators. MyFaces comes with a few of these.


    • Use a framework that specifically addresses deficiencies in JSF. Shale is one
    such framework.


    **Value and Method Binding**


    JSF introduces two very powerful techniques called *value* and *method binding*.


    You’ve had some experience with value binding in Struts. Remember how you could
    read and write properties from your form bean in your Struts tags? For example,
    if you wanted an <html:text> to save a property called userId to a form bean called
    user, you’d do this:


    <html:text property="userId"/>


    where the user form bean is implicit. That’s what value binding is about. However,
    the JSF


    syntax is different:


