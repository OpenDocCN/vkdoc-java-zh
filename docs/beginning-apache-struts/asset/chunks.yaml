    **82** CHAPTER 8 ■ BASIC STRUTS TAGS


    The processing of a Struts JSP page may be summarized in three steps:


    - **Evaluation**: Some Struts tags (from the Logic library) or the `<html:errors>`
    tag evaluate themselves to determine if they should indeed be displayed.

    - **Replacement**: Data is read from the request or session objects (or global
    forwards)'
