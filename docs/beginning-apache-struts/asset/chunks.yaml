    **IncludeAction 和 ForwardAction**


    使用 Struts 的一个令人信服的理由是，它提供了一个验证用户输入的框架。如果你有以 Servlet 或 JSP 形式存在的遗留代码（业务逻辑），这是个好消息：可以在遗留代码处理之前，包含一个
    Struts 前端来彻底验证用户输入。

