    So, in what situations would extending the Validator framework be appropriate?
    Actually, only when you can justify reuse of the custom validator. This usually
    means that the custom validator checks a variable prevalent in your webapp’s problem
    domain.


    Good examples are *identifiers*, like product codes, ISBN numbers, IP addresses,
    or zip codes (or “postal codes” as they are known outside the United States).
    While these can be validated using the standard mask validator, it may not always
    be easy to do so, especially if you need to take care of exceptions to the rule
    (e.g., postal codes), or if the variable can change format over time (e.g., IP
    addresses).


    You’d be much better off extending the Validator framework than implementing the
    validate() function because you obviously want to *reuse* the validations. A zip
    code field, for example, could appear in more than one form, or be present in
    many different webapps you might create.


    Creating a new validator is easy:


