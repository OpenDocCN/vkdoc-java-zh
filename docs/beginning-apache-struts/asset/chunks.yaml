- fmt: "# Struts Tag Reference\n\n## `focus`/`focusIndex`\n\n`focus` specifies the\
    \ name of the field on the form that should take focus when the form first loads.\
    \ Struts autogenerates the JavaScript for this to happen. If the `focus` attribute\
    \ isn’t specified, then no such JavaScript is autogenerated.\n\n`focusIndex` applies\
    \ to input elements that are indexed. You can specify the index of the element\
    \ that takes focus.\n\n## `enctype`\n\nSpecifies the encoding used when submitting\
    \ this form’s data. You only need to set this when you have an `<html:file>` input\
    \ element in the form (see the corresponding entry for more details, or refer\
    \ to Chapter 11).\n\n## `onsubmit`/`onreset`\n\nThese are the names of JavaScript\
    \ event handlers to invoke when the form is submitted or reset.\n\n## `acceptCharset`\n\
    \nCharacter encodings that are valid for this form (since Struts 1.2.7). This\
    \ is a standard HTML attribute.\n\n## `readonly`\n\nIf `true`, means the form\
    \ data may not be edited.\n\n## `scriptLanguage`\n\nIf set to `false`, omits the\
    \ `language` attribute in the generated `<script>` tag. This attribute is ignored\
    \ if you’ve specified XHTML rendering.\n\n## `target`\n\nThe name of the window\
    \ to which this form’s data is submitted. This is a standard HTML attribute.\n\
    \n## Examples\n\nMost commonly, you’d specify the `action` and `focus` attributes:\n\
    \n```html\n<html:form action=\"MyFormHandler.do\" focus=\"email\">\n    Key in\
    \ your email address: <html:text property=\"email\"/>\n    ...\n</html:form>\n\
    ```\n\n## Equivalents\n\nThe Struts-Faces `<s:form>` is the best replacement for\
    \ `<html:form>`. Refer to Chapter 20 for details.\n\n---\n\n# `frame`\n\nRenders\
    \ an HTML `<frame>`. The advantage of using `<html:frame>` is that you can use\
    \ global forwards or form handlers to easily put content into your frames.\n\n\
    ## Usage Restrictions\n\nYou must specify either `action`/`module`, `href`, `page`,\
    \ or `forward`.\n\n## Attributes\n\n- **`action`/`module`, `href`, `page`, or\
    \ `forward`**: Used to specify a URL for the frame. The `action`/`module` pair\
    \ specifies a form handler. The `action`, of course, must begin with a slash,\
    \ and if you want to specify a module, use the `module` attribute. `href` is either\
    \ a relative or absolute URL. `page` is a module-relative URL (and therefore,\
    \ must begin with a slash). `forward` is the name of a global forward.\n\n- **`anchor`**:\
    \ An optional HTML anchor for the link.\n\n- **`paramName`, `paramProperty`, `paramScope`\
    \ and `paramId`**: You use these to create a single request parameter. The request\
    \ parameter is appended to the final URL. The first set of three attributes is\
    \ used to locate a single object on the current request or session. This object’s\
    \ `toString()` is the single parameter value. The name of the parameter is given\
    \ by `paramId`. Refer to `<html:link>` for an example.\n\n- **`name`/`property`/`scope`**:\
    \ You use these to create multiple request parameters. The request parameters\
    \ are appended to the final URL. These attributes are used to locate an object\
    \ of type `java.util.Map`. The `Map`’s keys are the parameter names, and the corresponding\
    \ values are the parameter values. If you specify `property`, you must also specify\
    \ `name`. Refer to `<html:link>` for an example.\n\n- **`transaction`**: If `true`,\
    \ appends the current transaction token to the URL as a request parameter. Refer\
    \ to the entry for `<logic:present>` for details on transaction tokens.\n\n- **`title`/`titleKey`**:\
    \ Refer to `acc-attrs` for details on these.\n\n- **`style`/`styleClass`/`styleId`**:\
    \ Refer to `ren-attrs` for details on these.\n\n- **`scrolling`**: Specifies if\
    \ scrollbars are to be created when necessary (`scrolling=\"auto\"`), or always\
    \ (`yes`) or never (`no`).\n\n- **`marginheight`/`marginwidth`**: Specifies the\
    \ height of the top and bottom margins (`marginheight`) or the left and right\
    \ margins (`marginwidth`). The units used are pixels.\n\n- **`frameborder`**:\
    \ Specifies if a border needs to be rendered (`frameborder=\"1\"`) or not (`frameborder=\"\
    0\"`).\n\n- **`frameName`**: The name of the rendered `<frame>`."
