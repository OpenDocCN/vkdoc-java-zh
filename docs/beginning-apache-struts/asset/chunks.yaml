    \ ■ CUSTOM TAGS\n\n**27**\n\n■**Note** 我在这里稍微简化了事实。无论你的自定义标签是否有主体，你都可以继承`BodyTagSupport`或`TagSupport`。只是`BodyTagSupport`提供了额外的功能，允许你方便地读取标签的主体。`TagSupport`没有这个能力。但这种便利是有代价的，因为Servlet容器需要做额外的工作并使用更多内存。这就解释了为什么如果你的自定义标签没有主体，你应该继承`TagSupport`，只在必要时使用`BodyTagSupport`。\n\
