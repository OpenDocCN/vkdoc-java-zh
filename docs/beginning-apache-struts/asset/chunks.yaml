    **Reusable Views with Clay**


    Clay is a subframework of Shale. It is essentially a custom JSF custom UI component,
    which acts as a stand-in for a sub-UI tree defined elsewhere. This idea should
    not be new to you. Tiles does something similar—you define the UI in a tiles-def.xml
    file, then use a Tiles tag to indicate where you want the UI placed.


    Clay does the same, but provides more options for you to build the UI tree. Any
    mean-ingful exploration of Clay would require a whole chapter by itself, so I
    will leave it to you to explore this interesting technology on your own.


    **Server-Side Ajax Support**


    Ajax is not a single technology but refers to a broad spectrum of technologies
    character-ized by their use of client-side JavaScripts and XML to pass data between
    client and server.


    Server-side Ajax support (aka *remoting*) involves extracting data from the Model
    tier and serializing it as XML for delivery to the client.


    Shale’s remoting support is mainly focused on the delivery of XML data to the
    client (e.g., the org.apache.shale.remote.ResponseWrapper class to write XML),
    and management of the remote sessions.


    **Test Framework**


    Unit testing is the process of incrementally building and testing your code. In
    the unit-testing paradigm, you code a little, then test a little, and continue
    until your app is done.


    The tests you create are Java classes that you need to run in sequence, each testing
    portions of your code. JUnit (see “Useful Links”) is *the* universally used unit-testing
    framework of the Java world.


