    \n如果自定义类有主体，那么你必须继承`javax.servlet.jsp.tagext.BodyTagSupport`。当然，使用`BodyTagSupport`并不意味着你的标签在JSP中使用时必须带有主体。它意味着你必须实现一个额外的处理函数来处理标签的主体。\n\
