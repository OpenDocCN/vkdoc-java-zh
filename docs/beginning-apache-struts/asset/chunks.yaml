    • path: The path to the JSP or form handler to which this forward refers. In both
    cases, the paths must begin with a slash (/).


    In Listing 9-4, a forward named ioError is declared, which refers to the path
    errors.jsp.


    You can access this path from the mapping object available in execute(): **mapping.findForward("ioError")**


    **Declaring Form Handlers**


    Form handlers are defined within a single <action-mappings> enclosing tag, as
    shown in Listing 9-5.


    **Listing 9-5.** *The Form Handler Declaration*


    <action-mappings>


    <action


    path="/**Registration**"


    type="net.thinksquared.registration.struts.RegistrationAction"


    name="RegistrationForm"


    scope="request"


    validate="true"


    input="/Registration.jsp">


    <forward name="success" path="/Success.jsp"/>


    </action>


    </action-mappings>


    The <action-mappings> tag acts as a container for each form handler, described
    by an


    <action> tag. The <action> tag contains a few attributes that configure the handler:


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048.book Page 99 Tuesday, January 10, 2006 5:10 PM


    C H A P T E R 9 ■ C O N F I G U R I N G S T R U T S


    **99**


    • path: Describes the name of the form handler.


    • type: The fully qualified class name of the Action subclass that handles business
    logic.


    • name: The name of the form bean associated with this handler.


    • validate: Tells Struts whether it should perform simple validation on the form
    data.


    • scope: Sets the scope of the form data. Only request or session scopes are allowed.


    • input: The relative path of the page that forms the input of this page.


    The path attribute must start with a slash. This has a meaning I will cover in
    a later chapter. You might want to recall how form handlers are used on your JSPs,
    as the action attribute of the <html:form> tag:


    <html:form action=" **Registration**.do" ...> In this snippet, the form handler
    is Registration, and this corresponds to the path attribute in the form handler
    declaration of Listing 9-5\. The .do extension tells the servlet container that
    this is a Struts form handler. This extension is the default, and is defined in
    the web.xml file distributed with Struts.


    Just as in the form bean declaration, the type attribute is the fully qualified
    name of your Action subclass that will process business logic. In this case, it
    is RegistrationAction.


    The name attribute is the name of the form bean associated with the handler. In
    this case, it is RegistrationForm, which is an obvious alias to the RegistrationForm
    subclass.


    The validate : attribute, which can either be true or false, tells Struts whether
    the validate() method on the form bean’s ActionForm subclass should be called.
    In other words, Struts performs simple validation only when validate="true".


    The scope : attribute, which can either be request or session, tells Struts in
    which scope to put the form bean that contains the form data.


    Lastly, the input attribute is just the path to the input page. This is how mapping.


    getInputForward() (see Chapter 7) knows what the input page was. In Listing 9-5,
    the input page is Registration.jsp.


    Note that the path to the input page must begin with a slash, which denotes the
    “root”


    directory of the webapp. This corresponds to the root directory on the WAR file
    you create to deploy the webapp. Or, as another way of looking at it, when the
    webapp is installed, the root directory is just the \webapps\<app name>\ directory
    hosted under the servlet container.


    For example, if the Registration webapp were deployed in a WAR file called registration.war,
    then the root directory on the servlet container would be \webapps\ registration\.


