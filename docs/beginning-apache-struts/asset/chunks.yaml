    it stores the *state* of the View tier on the server. This state information can
    be used to redisplay the page if necessary (e.g., when you have simple validation
    errors) in its original condition.


    For example, in the Registration webapp (see Chapter 5), when the user keys in
    an incorrect password, the page is redisplayed with the user ID that was originally
    keyed in.


    With our new way of seeing things, we’d say that the data saved on the ActionForm
    was used to put the state of the View (the original user ID redisplayed) back
    into its original state.


    JSF takes this way of seeing things to the extreme. JSF has tags for various UI
    components just like Struts has, with its <html:xxx> and <bean:xxx> tags. The
    big difference is that *each JSF tag causes an object to be created on the server*.
    This object is used to hold the UI component’s state. We’ll elaborate on this
    shortly.


    One other thing that JSF takes to the extreme is the organization of the JSF tags.
    In Struts, we’re accustomed to a simple two-level nested hierarchy: an <html:form>
    can contain elements like an <html:input> or <html:submit>, as in this snippet:


