    use it.


    • indexId (optional): Specifies a number representing the current iteration. The
    only reason I used it here is to write out the iteration number using <bean:write>.
    The indexId is important when you want to use *indexed properties*, a topic I
    will come to in the next section.


    The <bean:write>s write out the name, company, and telephone of a given Contact.


    Note that the name attribute of <bean:write> refers to the single element exposed
    by the id attribute of <logic:iterate>. Refer to Appendix C for a thorough explanation
    of <bean:write>.


