    **196**


    第 15 章 ■ VALIDATOR 框架


    • **自动客户端验证**：只需在 JSP 中放置一个 `<html:javascript/>` 标签，即可自动生成客户端的 JavaScript 验证。Validator
    框架会自动为你生成这些验证。不过，Validator 框架的这一功能仍处于开发阶段；目前无法指定*仅*进行客户端验证。


    Validator 框架提供了一套相当全面的通用验证规则，你应该能够用 XML 声明替换所有 validate() 函数。


    然而，如果无法完全替换，你也可以在 Validator 框架声明的验证规则*之外*，运行自己的自定义验证。此外，还可以*扩展* Validator 框架提供的标准验证规则集。


    **声明 Validator 插件**


    与 Tiles（参见第 14 章）类似，Validator 框架独立于 Struts。它属于 Apache Commons 项目（参见本章末尾的“有用链接”），该项目旨在创建一组可重用的框架，Validator
    框架便是其中之一。


    实际上，Validator 框架的内部实现存储在 Struts 发行版附带的 commons-validator.jar 文件中。该 JAR 文件包含了框架的所有
    Java 类以及用于运行客户端验证的 JavaScript。


    要在 Struts 应用程序中使用 Validator 框架，你需要声明它。这意味着需要在 struts-config.xml 文件中添加 `<plug-in>`
    声明（参见清单 15-1）。


    **清单 15-1.** *struts-config.xml 中 Validator 框架的插件声明*


    <plug-in className="org.apache.struts.validator.ValidatorPlugIn" >


    <set-property property="pathnames"


    value="/WEB-INF/validator-rules.xml,/WEB-INF/validation.xml"/>


    </plug-in>

    '
- fmt: "注意这里使用的是`ValidatorPlugIn`（大写字母 I）。一个常见的错误来源是使用小写字母“i”，就像`TilesPlugin`中那样。\n\
    \n`<set-property>`标签设置一个名为`pathnames`的单一属性，该属性对插件可访问。\n\n`pathnames`的值是一组以逗号分隔的文件：\n\
    \n- `validator-rules.xml`是一组为Validator框架声明的通用验证规则。该文件由Struts发行版提供。\n- `validation.xml`将`ActionForm`子类（更准确地说，是已声明的表单bean）中的每个字段与从`validator-rules.xml`中声明的验证规则中选取的一个或多个验证关联起来。因此，`validation.xml`是你替换`ActionForm`子类中`validate()`函数的地方。\n\
    \n根据声明，你需要将这两个文件都放在Web应用程序的`/WEB-INF/`文件夹中。\n\n`validator-rules.xml`和`validation.xml`具有相同的结构——也就是说，它们由同一个XML文档类型定义（DTD）描述。\n\
    \n**注意**：该DTD包含在`commons-validator.jar`文件中，该文件随Struts发行版提供，路径为`/org/apache/commons/resources/validator_1_1_3.dtd`。\n\
    \n由于它们结构相同，你完全可以创建一个包含两者信息的单一文件。当然，这会导致维护问题。\n\n或者，你也可以将`validation.xml`文件拆分成多个文件。要使用它们，只需更改插件声明即可。例如，如果你有三个验证文件，分别名为`A.xml`、`B.xml`和`C.xml`，那么代码清单15-1将更改为清单15-2所示。Struts在处理之前会将清单15-2中声明的所有*四个*文件合并在一起。\n\
    \n**清单15-2.** *将你的validation.xml文件拆分为三部分*\n\n```\n<plug-in className=\"org.apache.struts.validator.ValidatorPlugIn\"\
    \ >\n    <set-property property=\"pathnames\"\n                  value=\"/WEB-INF/validator-rules.xml,\n\
    \                         /WEB-INF/A.xml,\n                         /WEB-INF/B.xml,\n\
    \                         /WEB-INF/C.xml\"/>\n</plug-in>\n```\n\n如果你的项目包含子项目，拆分`validation.xml`文件会很有用。管理并维护几个较小的文件（每个文件包含来自单个子项目的表单）比管理一个包含所有项目验证规则的大文件要容易得多。\n\
    \n**Validator DTD基础**\n\n由于`validator-rules.xml`和`validation.xml`文件在Validator框架中扮演核心角色，你必须理解它们的结构。清单15-3是Validator\
    \ DTD的一个片段，它描述了Validator XML结构的主要划分。\n\n**清单15-3.** *Validator XML结构的顶层节点*\n\n\
    ```\n<!ELEMENT form-validation (global*, formset*)>\n<!ELEMENT global (validator*,\
    \ constant*)>\n<!ELEMENT formset (constant*, form+)>\n```\n\n`<form-validation>`标签是根标签，所有其他标签都包含在其中。`<form-validation>`的重要子标签包括：\n\
    \n- `<global>`，它内部包含“全局”常量的声明（我们稍后会讲到）或验证器的声明。\n- `<formset>`，代表针对某个区域设置的验证。我们将在本章末尾讨论这一点。\n\
    - `<form>`，它是`<formset>`的子标签，包含你对`struts-config.xml`中声明的任何表单bean上的字段的验证。你将在`validation.xml`文件中声明这些内容。\n\
    \n在`validator-rules.xml`文件中，你只会看到`<validator>`声明，每个声明对应Validator框架中一个可用的通用验证器。\n\
    \n你的`validation.xml`文件应仅包含`<form>`或`<constant>`声明。这种在`validator-rules.xml`和`validation.xml`之间的标签划分纯粹是为了可维护性：你将所有声明的验证规则放在`validator-rules.xml`中，而将你对验证规则的*使用*放在`validation.xml`中。"
  raw: 'Notice that it’s ValidatorPlugIn (capital I). A common source of frustration
    is to use the lowercase “i” as it is in TilesPlugin.


    The <set-property> tag sets a single property called pathnames accessible to the
    plug-in.


    The value of pathnames is a set of comma-separated files:


    • validator-rules.xml is a set of declared generic validations for the Validator
    framework. This file is provided for you in the Struts distribution.


    • validation.xml links each field in your ActionForm subclass (more precisely,
    the declared form bean) to one or more validations drawn from those declared in
    validator-rules.xml. So, validation.xml is where you replace the validate() functions
    of your ActionForm subclasses.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C15.fm Page 197 Tuesday, January 24, 2006 10:13 AM


    C H A P T E R 1 5 ■ T H E V A L I D A T O R F R A M E W O R K


    **197**


    As the declaration suggests, you need to place both these files in the /WEB-INF/
    folder of your web application.


    Both validator-rules.xml and validation.xml have the same structure—that is, they
    are described by the same XML document tag definition (DTD).


    ■**Note** The DTD is contained in the commons-validator.jar file, which comes
    with the Struts distribution, under the path /org/apache/commons/resources/validator_1_1_3.dtd.


    Since they have the same structure, there’s no reason why you can’t create a single
    file containing information from both. Of course, this leads to maintenance issues.


    Alternatively, you could split your validation.xml file into several files. To
    use them, just change the plug-in declaration. For example, if you had three validation
    files, called A.xml, B.xml, and C.xml, then the code Listing 15-1 would be changed
    to that shown in Listing 15-2\. Struts pieces together all *four* files declared
    in Listing 15-2 before processing them.


    **Listing 15-2.** *Splitting Your validation.xml file into Three Parts*


    <plug-in className="org.apache.struts.validator.ValidatorPlugIn" >


    <set-property property="pathnames"


    value="/WEB-INF/validator-rules.xml,


    /WEB-INF/A.xml,


    /WEB-INF/B.xml,


    /WEB-INF/C.xml"/>


    </plug-in>


    Splitting your validation.xml file is useful if your project contains subprojects.
    It is easier to manage and maintain a few smaller files, each containing forms
    from a single subproject, than one huge file containing validations for all projects.


    **Validator DTD Basics**


    Since the validator-rules.xml and validation.xml files play a central role in
    the Validator framework, you have to understand their structure. Listing 15-3
    is a fragment of the validator DTD, and it describes the major divisions of the
    validator XML structure.


    **Listing 15-3.** *Top Nodes of the Validator XML Structure*


    <!ELEMENT form-validation (global*, formset*)>


    <!ELEMENT global (validator*, constant*)>


    <!ELEMENT formset (constant*, form+)>


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C15.fm Page 198 Tuesday, January 24, 2006 10:13 AM


    **198**


    C H A P T E R 1 5 ■ T H E V A L I D A T O R F R A M E W O R K


    The <form-validation> tag is the root tag, and all other tags are contained within
    it. The important subtags of <form-validation> are


    • <global>, which in turn contains declarations of “global” constants (we’ll come
    to this shortly) or declarations for validators.


    • <formset>, which represents validations for a locale. We’ll discuss this at
    the end of this chapter.


    • <form>, which is a subtag of <formset>, which contains your validations of fields
    on any form beans declared in struts-config.xml. You will declare these in your
    validation.xml file.


    In the validator-rules.xml file, you will only see <validator> declarations, one
    for each generic validator available on the Validator framework.


    Your validation.xml file should contain only <form> or <constant> declarations.
    This division of tags between validator-rules.xml and validation.xml is purely
    for maintainability: you put all declared validations in validator-rules.xml,
    and your *use* of the validations in validation.xml.'
