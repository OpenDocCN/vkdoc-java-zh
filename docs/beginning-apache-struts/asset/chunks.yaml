    C H A P T E R 1 6 ■ D Y N A M I C F O R M S


    **223**


    **Declaring Simple Properties**


    From Listing 16-1, you can easily see that simple properties can either be supported
    Java classes or primitive types. Java classes and primitive types supported by
    DynaActionForm are


    • java.lang.BigDecimal


    • java.lang.BigInteger


    • boolean and java.lang.Boolean


    • byte and java.lang.Byte


    • char and java.lang.Character


    • java.lang.Class


    • double and java.lang.Double


    • float and java.lang.Float


    • int and java.lang.Integer


    • long and java.lang.Long


    • short and java.lang.Short


    • java.lang.String


    • java.sql.Date


    • java.sql.Time


    • java.sql.Timestamp


    (This list is available on the Struts documentation site. Refer to “Useful Links”
    at the end of this chapter.) You may optionally specify a default value for the
    simple property using the initial attribute. For example, in Listing 16-1, the
    default value for the simple property MySimpleProp is Hello.


    **Declaring Indexed Properties**


    To create an indexed property, simply put [] after the classname (or primitive
    type).


    You also need to specify a size for the array. If you need *flexible* length arrays,
    there are two ways to do it.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C16.fm Page 224 Tuesday, January 24, 2006 10:14 AM


    **224**


    C H A P T E R 1 6 ■ D Y N A M I C F O R M S


    In the first method, you omit the size attribute. Since the size isn’t specified,
    a newly created form bean will have a null value for this indexed property. So,
    you have to “prime”


    the form bean (a DynaActionForm instance) in an Action subclass before it can
    be used to store data. You’ve seen a variation of this technique in Chapter 10.


    When a page is requested, it’s really a request to a form handler. This form handler
    (an Action subclass) creates an array of the right type and length and inserts
    it into the form bean. Only then is control passed to a JSP page, which populates
    the form. DynaActionForm has a function called set(String propertyName,Object
    value), which you can use to prime the form bean. Listing 16-2 illustrates this
    technique in action.


    **Listing 16-2.** *Setting Array Lengths at Runtime*


    public ActionForward execute(...){


    DynaActionForm dForm = (DynaActionForm) form;


    /* somehow get the needed array length */


    int length = ...;


    /* create the new array */


    String[] myProp = new String[length];


    /* insert array into form */


    dForm.set("MyIndexedProp", myProp);


    /* forward to JSP */


    return mapping.findForward("success");


    }


    The JSP page pointed to by success will be able to use the form’s MyIndexedProp
    property.


    Needless to say, you need to use session scope for this to work.


    The second method for flexible arrays is to use a class that implements the java.util.List
    interface (e.g., ArrayList) as the <form-property>’s type:


    <form-property name="MyIndexedProperty" type="java.util.ArrayList" /> Unfortunately,
    with this approach you lose Struts’s automatic type conversion, since all data
    stored in the List are stored as String instances.


    **Declaring Mapped Properties**


    Mapped properties are defined by using a type that implements the java.util.Map
    interface (e.g., HashMap):


    <form-property name="MyMappedProperty" type="java.util.HashMap" />


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C16.fm Page 225 Tuesday, January 24, 2006 10:14 AM


    C H A P T E R 1 6 ■ D Y N A M I C F O R M S


    **225**


    **Declaring Nested Properties**


    Lastly, nested properties are defined using a type attribute, which is a JavaBean,
    assumed to contain nested properties used in your JSPs:


    <form-property name="MyNestedProperty" type="com.myco.myapp.MyBean" /> The only
    thing to note about nested properties is that you must ensure that the nested
    property finally resolves to one of the supported primitive types or Java classes
    listed earlier for simple properties. This should hardly come as a surprise, since
    this is what you’d expect even with ordinary ActionForms.


    **Accessing Dynamic Properties**


    At some point, you will need to read (or write) data from your dynamic form. The
    DynaActionForm base class exposes three getters corresponding to simple, indexed,
    and mapped properties:


    • get(String property) **returns an Object value of the given property. This accessor
    is for simple properties.**


    **• get(String property,int index) returns an Object value of the given property
    with the given index. This accessor is for indexed properties.


    • get(String property,String key) returns an Object value for the given key on
    the given property. This accessor is for mapped properties.


    Similarly, there are set(String property, Object value), set(String property,
    int index, Object value), and set(String property, String key, Object value).


    If you’ve used a primitive type for a property, then the Object type in the return
    of get() and the argument of set() would be the corresponding Java class for that
    primitive type.


    For example, if you’ve declared a property of type int, then you should expect
    an Integer to be returned from get() and you should pass an instance of Integer
    in set().


    **Transferring Properties to a JavaBean**


    In many instances, all you want to do with a dynamic form bean is to transfer
    the property values into a JavaBean instance. This is often the case if:


    • You’re using Struts as a web-based front-end to an existing application. The
    existing application usually would already have JavaBean classes to hold data.
    You want to transfer properties from your dynamic form to this JavaBean.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C16.fm Page 226 Tuesday, January 24, 2006 10:14 AM


    **226**


    C H A P T E R 1 6 ■ D Y N A M I C F O R M S


    • You want to transfer data into a data object. This is the case if you’re using
    a Model framework like Torque or Lisptorq, which exposes data through data objects.
    See Chapter 5 and Appendix A for details.


    The Apache Commons’ Bean project (see “Useful Links”) provides a utility class
    to help you to do this transfer easily. The following


    org.apache.commons.bean.BeanUtils. **copyProperties**(myJavaBean , form) will
    copy the properties of the DynaActionForm instance (form) into your JavaBean class
    (myJavaBean).


    Of course, only properties existing on myJavaBean will be copied over. The JAR
    file for Apache Bean classes are bundled with Struts in commons-beanutils.jar.


    **Dynamic Form Disadvantages**


    Dynamic forms have a few significant limitations compared to ordinary ActionForms:


    • **You must use different syntax properties when using EL**: If you’re using
    EL, you have to prefix map to a form’s property. For example, instead of using
    ${myform.


    myproperty}, you’d have to use ${myform.map.myproperty}. This applies to simple,
    indexed, mapped, and nested properties. This is only necessary when referring
    to a property using EL. No change would be necessary when referring to a property
    within either the original or EL-enabled Struts tags. For example, <bean:write
    name="myform" property="myproperty"/> would work fine.


    • **You can’t use conventional getters and setters**: If you subclass DynaActionForm
    (in order to run custom validations, for example), you can’t use conventional
    getters and setters on your subclass and expect them to work with Struts tags.
    Struts handles DynaActionForm and its subclass differently from normal ActionForms.
    This can be a serious problem if you need to work directly with form data. The
    design philosophy of dynamic forms assumes that you *won’t* have to work with
    their data directly.


    Rather, you are expected to transfer the form’s properties to a suitable JavaBean,
    using the BeanUtils technique described in the previous subsection.'
