- fmt: "# Appendix A: Frameworks for the Model\n\n`Struts` and `JSF/Shale` serve different\
    \ niches. `Struts` works well for simple webapps, but not for more complex ones.\
    \ `Shale` addresses the needs of more complicated web applications.\n\nIf you’re\
    \ interested in using `JSF` *incrementally* with `Struts` without having to completely\
    \ redesign your webapp, consider using the `Struts-Faces` integration library.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nIn this appendix, I’ll provide\
    \ simple examples of how to use `Hibernate` and `Torque`, and also (shameless\
    \ plug) a simple, open source, “classes that persist” framework called `Lisptorq`,\
    \ developed by the company I work for.\n\nI’ll illustrate the use of these persistence\
    \ frameworks with the `Registration` webapp I first introduced in Chapter 5. I’ll\
    \ show you how to persist different versions of the `User` class outlined in Listing\
    \ A-1.\n\n**Listing A-1.** *Skeleton for the Registration Webapp Model*\n\n```\n\
    public class User{\n\n    protected String _userId = null;\n\n    protected String\
    \ _password = null;\n\n    /* Bean-like getters and setters */\n\n    public String\
    \ getUserId(){\n        return _userId;\n    }\n\n    public String setUserId(String\
    \ userId){\n        _userId = userId;\n    }\n\n    public String getPassword(){\n\
    \        return _password;\n    }\n\n    public String setPassword(String password){\n\
    \        _password = password;\n    }\n\n    /**\n     * Checks if the userid\
    \ exists.\n     */\n    public static boolean exists(String userid){\n       \
    \ //implementation omitted\n    }\n\n    /**\n     * Saves the _userid and _password\
    \ pair\n     */\n    public void save() throws Exception{\n        //implementation\
    \ omitted\n    }\n}\n```\n\n## Getting the Software\n\nAll three persistence frameworks\
    \ discussed here are open source, and may be obtained freely from their websites:\n\
    \n- **Hibernate**: [www.hibernate.org](http://www.hibernate.org)\n- **Torque**:\
    \ [http://db.apache.org/torque/](http://db.apache.org/torque/)\n- **Lisptorq**:\
    \ [www.thinksquared.net/dev/lisptorq/](http://www.thinksquared.net/dev/lisptorq/)\n\
    \nBoth `Hibernate` and `Torque` require some setup in order for you to use them\
    \ in your projects. Consult their respective websites for installation instructions.\n\
    \n`Lisptorq`, on the other hand, was specially designed to be easy to use and\
    \ experiment with. You have to copy only two `JAR` files: a Java Lisp interpreter\
    \ called `jlisp` and the `Lisptorq` `JAR` file, `lisptorq.jar`, which contains\
    \ the `LISP` programs that constitute `Lisptorq`. Both of these are in the Source\
    \ Code section of the Apress website, found at [http://www.apress.com](http://www.apress.com),\
    \ but you should download the latest files from the URL listed earlier.\n\nBecause\
    \ `Lisptorq` is simple to understand and use, I’ll introduce it first, and give\
    \ you some practice using it in Lab A. I’ll then redo the `Registration` webapp\
    \ using `Hibernate` and `Torque`.\n\n## Lisptorq\n\n`Lisptorq` is a *code generator,*\
    \ and it produces Java source code given a database schema. These generated classes\
    \ constitute the Model tier of your webapp.\n\nAs an example, Listing A-2 shows\
    \ how you might define the database schema for the `Registration` webapp using\
    \ `Lisptorq`. There’s just one table called `user` with two fields, `user_id`\
    \ and `password`.\n\n**Listing A-2.** *Defining the user Table in Lisptorq*\n\n\
    ```\ndefine database\n(\n    (user\n        (user_id (REQUIRED PRIMARY (VARCHAR\
    \ 32)))\n        (password (REQUIRED (VARCHAR 32)))\n    )\n)\n```\n\nListing\
    \ A-2 should be self-explanatory. Both the `user_id` and `password` fields are\
    \ mandatory, and the `user_id` field is used as a primary key.\n\nWhen `Lisptorq`\
    \ is run on the schema described by Listing A-2 (I’ll show you how in the following\
    \ lab), the output is *four* Model classes, plus four other helper classes. In\
    \ general, for each table on the database schema, four Model classes are generated."
