    **411**


    • `paramName`、`paramProperty`、`paramScope` 和 `paramId`：您可以使用这些来创建一个请求参数。该请求参数会被附加到最终的
    URL。前三个属性用于在当前请求或会话上定位单个对象。此对象的 `toString()` 就是单个参数值。参数的名称由 `paramId` 给出。


    • `name/property/scope`：您可以使用这些来创建多个请求参数。这些请求参数会被附加到最终的 URL。这些属性用于定位一个 `java.util.Map`
    类型的对象。Map 的键是参数名称，对应的值是参数值。如果您指定了 `property`，则还必须指定 `name`。


    • `useLocalEncoding`：如果设置为 `true`，则告诉 Struts 使用当前 `HttpServletResponse` 的任何字符编码。


    示例


    以下是使用全局转发的简单示例：


    <html:rewrite forward="success" />


    渲染出的字符串将是 `success` 全局转发的真实 URL。更多示例，请参阅 `<html:link>` 条目。


