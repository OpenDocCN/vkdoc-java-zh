    (simple-layout.jsp). Listing 14-4 shows what the contents of myPage.jsp might
    be.


    **Listing 14-4.** *myPage.jsp, Which Uses simple-layout.jsp*


    <%@ taglib uri="/tags/struts-tiles" prefix="tiles" %>


    <tiles:insert page="/layouts/simple-layout.jsp">


    <tiles:put name="title" value="A simple page" />


    <tiles:put name="header" value="/common/header.jsp" />


    <tiles:put name="footer" value="/common/footer.jsp" />


    <tiles:put name="body" value="/mypage-content.jsp" />


    </tiles:insert>


    All myPage.jsp does is specify (using the <tiles:put> nested tags) *which* files
    are to be associated with the header, footer, and body attributes. The title is
    specified as a string, in this case, "A simple page".


    Notice the differences in how <tiles:insert> is used in Listings 14-3 and 14-4:


    • In the layout JSP (Listing 14-3), the attribute property is used to tell Struts
    what content it should use to replace the enclosing <tiles:insert> tag. For example,
    when Struts processes <tiles:insert attribute="header"/> in Listing 14-3, it essentially
    looks for the value of header on the request object. It then uses this value (a
    JSP page, or as we will see in the next section, a component) and pastes the content
    from that page or component in place of the <tiles:insert> tag.


    • In the called JSP (Listing 14-4), the page property is used to specify a layout,
    and the output from this layout is used to replace the <tiles:insert> tag. The
    nested


    <tiles:put> tags define Tiles attributes on the request object. The layout reads
    these attributes in order to create its output. For example, when Struts processes
    the <tiles:insert> in Listing 14-4, it knows it must use the layout file /layouts/


    simple-layout.jsp. In this layout file, there are a few <tiles:insert> tags that
    require the header, footer, and body attributes to be created. The values for
    each is defined in the calling JSP using <tiles:put> tags.


    It is important to note that the attributes defined using a <tiles:put> tag will
    only apply to the layout defined in the enclosing <tiles:insert page="..."> tag.
    In the unlikely event that you had two <tiles:insert page="..."> tags on your
    called JSP page, you would have to specify the attributes for each separately.
    The attributes between these two tags are not shared.


