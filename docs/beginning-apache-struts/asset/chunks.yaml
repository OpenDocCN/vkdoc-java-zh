    是 MyFaces 对 JSF 扩展的又一个例子。


    关于清单 20-12，另一个有趣的地方是，重新输入的密码从未保存到用户支持 bean 中。相反，该值在相等性验证运行后被丢弃。


    **动手试试！**


    注册 webapp 可在 Apress 网站源代码部分找到，网址为 http://www.apress.com，文件名为 `jsf-registration-webapp.zip`。将其复制并解压到你的开发文件夹中，然后测试该
    webapp。通过添加新字段、验证和新功能来尝试修改代码。


    **下一步去哪里？**


    我希望这篇简短的介绍成功地激发了你对 JSF 的兴趣。以下是一些关于下一步去哪里的建议：


    • **下载规范**：JSF 规范可供下载。该规范相当易读，我发现它作为参考很有帮助。但是，你应该注意，它针对的是那些想要实现 JSF 的人，因此它并不是真正的
    JSF 入门指南。


    • **下载 MyFaces 的源代码**：我发现这对于了解 JSF 的内部工作原理非常有价值。不过，下载源代码时可能会遇到一点小麻烦：在撰写本文时，你需要一个
    Subversion 客户端（参见“有用链接”）来下载源代码。你还需要 Ant（同样，参见“有用链接”）来自动下载 MyFaces 的依赖项（库 JAR 文件）。这可能有点麻烦，所以我们为你做好了。我们在
    Apress 网站的源代码部分放置了一份 MyFaces 1.1.1 源代码的副本。同样在 Apress 网站的源代码部分，还有一份 Ant 的副本，你必须安装它才能编译
    MyFaces。


    Ant 发行版包含关于如何使用 Ant 的文档。请注意，MyFaces 的 Ant 构建文件需要互联网连接才能工作。

