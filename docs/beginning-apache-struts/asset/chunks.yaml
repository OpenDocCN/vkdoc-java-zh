    # PART 1


    ## Basic Struts


    Struts grew out of a personal need (open source developers often call this *scratching
    your own itch*) to support the development of an application that I was responsible
    for...


    I began the process of open sourcing this idea of a web application framework
    at the Apache Software Foundation. What happened next was nothing short of extraordinary—Struts
    quickly became the de facto standard web application architecture in the J2EE
    space (the number of significant Internet applications built with it is substantial,
    but is dwarfed by the number of intranet applications that use it), integrated
    into nearly all the major app servers and tools, supported by a rich ecosystem
    of knowledgeable professionals and skilled developers, backed by significant documentation
    in the form of books and articles, and the basis for a large user community centered
    around the Struts User mailing list...


    —Craig McClanahan


    # Chapter 1


    ## Introduction


    This book describes a web application framework called Apache Struts, with which
    you can *easily* build *robust*, *maintainable* web applications. Now, the three
    italicized adjectives aren’t just hype:


    - **Simplicity**: Struts is relatively easy to pick up and use effectively. You
    get a lot out of Struts for the effort you put in to learn it.

    - **Robustness**: Struts provides much of the infrastructure you need to create
    webapps. You can rely on this tested body of code built on solid design principles,
    instead of having to come up with solutions of your own.

    - **Maintainability**: Struts is built around the Model-View-Controller (MVC)
    design pattern, which promotes separation between various portions of your webapp.
    This goes a long way to making your code maintainable.


    Besides this, Struts has a huge user base and is a vital component in many Java-based
    enterprise web application solutions. It’s here to stay for some time to come.'
