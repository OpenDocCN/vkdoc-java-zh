- fmt: 'Now, *unlike* the example with the Registration webapp (Listing 6-1) where
    the form data was stored in private variables such as `_userid` and `_pwd`, the
    getters and setters of `ContactForm` must store data in a bean called `Contact`.


    > **Note** The `Contact` bean was autogenerated using `Lisptorq`. If you’d like
    details on how it and other Model classes were created, refer to Appendix A.


    The `Contact` bean also contains getters and setters for each of the 14 properties
    listed earlier. Your getters/setters for `ContactForm` should call the corresponding
    getters/setters for the `Contact` bean contained in `ContactForm`. This may seem
    a little strange, but this simplifies the code in later lab sessions.


    Complete the following steps:


    1. Put in the getters and setters for `ContactForm`.

    2. Put in an extra pair of functions, `getContact()` and `setContact()`, to get
    and set the `Contact` bean instance.

    3. Run `compile.bat` to ensure you have no errors.


    ## Step 3: Implement `validate()`


    You need to implement a few validations:


    1. Ensure that the company name isn’t blank. The error key is `lilldep.error.company`.

    2. Ensure that the contact’s name isn’t blank. The error key is `lilldep.error.name`.

    3. Ensure that the email address, **if** not blank, is a valid email address.
    The error key is `lilldep.error.email`.


    Check that your work compiles without errors.


    These are only a few possible validations you might in reality run on `ContactForm`.
    In Chapter 15, you’ll see how to write simple validations *without* having to
    use Java.


    ## Step 4: Implement `reset()`


    In addition to `validate()`, `ActionForm` exposes another function, called `reset()`,
    which resets the `ActionForm`’s values to defaults you define. `reset()` can be
    called by View code using a Reset button.


    The skeleton for this function is in `ContactForm`. Complete the implementation
    to reset the properties of the `Contact` bean. (Hint: You should peruse the source
    code for `Contact` to find a suitable function that does this.)


    As usual, compile your code to ensure that it’s free of errors.


    ## What Has Struts Done for You Today?


    Just as in life, “counting your blessings” often puts your problems in perspective,
    so it may be helpful to consider what Struts has done thus far to make writing
    web applications easier:


    - **Automatically transfers form data into your app**: When the user submits a
    form, the data is automatically read from the form and put into your `ActionForm`
    subclass. Struts even performs type castings for you.

    - **Centralizes simple validations**: All your simple validations go into the
    `validate()` function. It can’t get any simpler. Well, it can, as you’ll see in
    Chapter 15.

    - **Automatically redisplays badly filled forms with errors messages**: Without
    Struts, you had to do this yourself. Consider for a few moments how you might
    do this yourself without Struts. I hope you can see this is a very big plus!

    - **Enables easy localization of error messages**: This occurs through the use
    of properties files.


    ## Summary


    - `ActionForm` is the central class for simple validation.

    - Your `ActionForm` subclass must have getters and setters for each form property,
    and must override `validate()` to run simple validations.

    - `ActionErrors` is the return value of `validate()` and holds error messages.

    - Individual error messages are represented by instances of `ActionMessage`.

    - The actual error message is stored in properties files.'
