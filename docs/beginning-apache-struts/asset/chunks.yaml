    ## The Logic Tag Library


    The Logic library has tags for:


    - **Iteration**: The `iterate` tag

    - **Conditional processing**: The `equal`, `present`, `match`, `empty`, `notEqual`,
    `notPresent`, `notMatch`, `notEmpty`, `messagesNotPresent`, `messagesPresent`,
    `lessThan`, `lessEqual`, `greaterThan`, and `greaterEqual` tags

    - **Flow control**: The `redirect` and `forward` tags


    > **Note** All of these tags, apart from the ones for flow control, have counterparts
    in JSTL, which we will cover later in this chapter. You should use the JSTL versions
    whenever possible.


    Let’s tackle these three classes of tags next.


    ### Iteration


    The `<logic:iterate>` tag can be used to iterate over collections, enumerations,
    arrays, or iterators. We’ll refer to any of these as an “iteratable” object. To
    use the `<logic:iterate>` tag, you have to:


    1. **Create the iteratable object**: This is done in your `Action` subclass, since
    this is Controller code. Never forget the MVC.

    2. **Place the iteratable object on the request**: Recall that in your `Action`’s
    `execute()` function, you have a reference to the request object. You can place
    objects on this request object, or on its associated session object, giving the
    object a *name*.

    3. **Forward to the JSP page that contains the** `<logic:iterate>` **tag**: The
    JSP page called by the `Action` would be able to access these objects by the name
    you gave them.


    These three steps are the same or similar even if you’re using JSTL for iteration,
    so be sure to study carefully the following code listings that illustrate these
    steps.'
