    第 11 章


    ■ ■ ■


    上传文件


    **本**章中，我将讨论几种可用于*上传*文件到服务器的技术。如果你曾尝试使用 JSP 和 Servlet 创建此功能，就会知道这并不容易。


    Struts 提供了一种非常简便的文件上传方式。但在展示具体方法之前，先了解一下用户尝试上传文件时后台发生的情况是很有益的。


    任何允许文件上传的 Web 应用的起点都是用于上传文件的 HTML 元素：


    <input type="file">


    在大多数图形浏览器中，这会被渲染为一个文本输入字段，后跟一个“浏览”按钮，如图 11-1 所示。


    **图 11-1.** *Mozilla 中显示的文件上传输入字段* 用户可以直接在给定字段中输入文件名，或单击“浏览”按钮，该按钮会启动一个对话框，允许用户直观地导航到所需文件。

    '
- fmt: "当用户点击包含表单的提交按钮时，Web浏览器会读取文件并使用合适的编码（如`uuencode`，参见“有用链接”）对每个字节进行编码，然后将编码后的数据连同任何提交的表单数据一起发送到服务器。根据文件长度，文件也可能被分割成多个部分。\n\
    \n因此，从服务器端来看，上传的数据被编码并分割成多个部分。要重建原始文件，必须正确解析输入数据，重新拼接分割的部分，最后解码所有内容。这相当麻烦！\n\n\
    `Struts`让事情变得简单得多。首先，在JSP页面中，放入一个`<html:file>`标签：\n\n```html\n<html:file property=\"\
    myFile\"/>\n```\n\n通常，`property`属性对应`ActionForm`子类中接受上传文件的属性。在上述代码片段中，该属性名为`myFile`。\n\
    \n第二个改动是在包含的`<html:form>`中添加一个特殊属性：\n\n```html\n<html:form enctype=\"multipart/form-data\"\
    \ action=...\n```\n\n这个新属性告诉`Struts`，表单提交的数据将被编码并分成多个部分。\n\n接下来，在`ActionForm`子类中，需要声明一个属性来接受文件数据，如清单11-1所示。\n\
    \n**清单11-1.** *`MyActionForm`片段*\n\n```java\nimport org.apache.struts.upload.FormFile;\n\
    \npublic class MyActionForm extends ActionForm{\n\n    protected FormFile _file;\n\
    \n    public FormFile getMyFile(){\n        return _file;\n    }\n\n    public\
    \ void setMyFile(FormFile f){\n        _file = f;\n    }\n\n    ... // MyActionForm的其余部分\n\
    }\n```\n\n在清单11-1中，`FormFile`是`Struts`中处理下载文件访问的类。其完全限定类名为`org.apache.struts.upload.FormFile`。\n\
    \n`FormFile`有两个重要函数：\n\n- `getInputStream()`：返回下载文件的`InputStream`。用于读取文件本身。\n\
    - `destroy()`：删除下载文件。下载文件保存在临时目录中，因此务必调用`destroy()`以释放磁盘空间。\n\n`FormFile`还有其他一些函数，这些函数列在附录B中。\n\
    \n**一次上传固定数量的文件**\n\n从目前的讨论来看，由于上传文件只是`ActionForm`的一个属性，因此可以在单个表单上上传多个文件。如果这些文件需要同等对待，最佳方式是使用索引属性，如清单11-2所示。\n\
    \n**清单11-2.** *上传固定数量文件的简单表单*\n\n```jsp\n<%@ taglib uri=\"/tags/struts-html\"\
    \ prefix=\"html\" %>\n<html>\n<body>\n<html:form enctype=\"multipart/form-data\"\
    \ action=\"/FileUpload.do\">\n<h1>上传四个文件</h1>\nFile 1:<html:file property=\"file[0]\"\
    \ size=\"20\"/><br>\nFile 2:<html:file property=\"file[1]\" size=\"20\"/><br>\n\
    File 3:<html:file property=\"file[2]\" size=\"20\"/><br>\nFile 4:<html:file property=\"\
    file[3]\" size=\"20\"/>\n<html:submit/><br>\n</html:form>\n</body>\n</html>\n\
    ```\n\n与清单11-2关联的`ActionForm`在清单11-3中描述。\n\n**清单11-3.** *与清单11-2关联的`ActionForm`*\n\
    \n```java\nimport org.apache.struts.upload.FormFile;\n\npublic class FileUploadForm\
    \ extends ActionForm{\n\n    protected FormFile[] _files;\n\n    public FileUploadForm(){\n\
    \        _files = new FormFile[4];\n    }\n\n    public FormFile getFile(int i){\n\
    \        return _files[i];\n    }\n\n    public void setFile(int i, FormFile f){\n\
    \        _files[i] = f;\n    }\n\n    ... // FileUploadForm的其余部分\n}\n```\n\n从清单11-3中需要注意的一点是`setFile()`中参数的顺序。一个常见错误是颠倒顺序：\n\
    \n```java\nsetFile(FormFile f , int i) // 错误！！参数顺序颠倒。\n```\n\n除此之外，清单11-2和11-3应该没有其他令人困惑的地方。"
  raw: 'When the user clicks the submit button of the enclosing form, the web browser
    reads the file and encodes each byte with a suitable encoding, like uuencode (see
    “Useful Links”), and sends this to the server, along with any posted form data.
    Depending on its length, the file might also be broken into pieces.


    So, seen from the server end the uploaded data is encoded and broken into several
    parts. To reconstruct the original file, you’d have to correctly parse the input
    data, rejoining broken parts, and finally decode everything. Ouch!


    Struts makes things much, much easier. First, on the JSP page, you put in an


    <html:file> tag:


    <html:file property="myFile"/>


    **129**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C11.fm Page 130 Thursday, January 12, 2006 11:02 AM


    **130**


    C H A P T E R 1 1 ■ U P L O A D I N G F I L E S


    As usual, the property attribute corresponds to a property on your ActionForm
    subclass that accepts the uploaded file. In the previous snippet, that property
    name is myFile.


    The second change you make is to add a special property on the enclosing <html:form>:


    <html:form **enctype="multipart/form-data"** action=...


    This new property tells Struts that the data submitted by the form will be encoded
    and in parts.


    Next, on your ActionForm subclass, you’ll have to declare a property to accept
    the file data, as shown in Listing 11-1.


    **Listing 11-1.** *Snippet of MyActionForm*


    import org.apache.struts.upload.FormFile;


    public class MyActionForm extends ActionForm{


    protected **FormFile** _file;


    public FormFile getMyFile(){


    return _file;


    }


    public void setMyFile(FormFile f){


    _file = f;


    }


    ... //rest of MyActionForm


    In Listing 11-1, FormFile is the Struts class that handles access to the downloaded
    file.


    The fully qualified class name is


    org.apache.struts.upload.FormFile


    FormFile has two important functions:


    • getInputStream(): Returns an InputStream to the downloaded file. You use this
    to read the file itself.


    • destroy(): Deletes the downloaded file. The downloaded file is saved in a temporary
    directory, so be sure to call destroy() to free up disk space.


    FormFile has a few other functions; these are listed in Appendix B.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C11.fm Page 131 Thursday, January 12, 2006 11:02 AM


    C H A P T E R 1 1 ■ U P L O A D I N G F I L E S


    **131**


    **Uploading a Fixed Number of Files at Once**


    From our discussion so far, it should be clear that since the uploaded file is
    just a property of the ActionForm, you can upload more than one file on a single
    form. If the files are to be treated equally, the best way to do this is to use
    indexed properties, as shown in Listing 11-2.


    **Listing 11-2.** *A Simple Form to Upload a Fixed Number of Files*


    <%@ taglib uri="/tags/struts-html" prefix="html" %>


    <html>


    <body>


    <html:form enctype="multipart/form-data" action="/FileUpload.do">


    <h1>Upload Four Files</h1>


    File 1:<html:file property="file[0]" size="20"/><br> File 2:<html:file property="file[1]"
    size="20"/><br> File 3:<html:file property="file[2]" size="20"/><br> File 4:<html:file
    property="file[3]" size="20"/>


    <html:submit/><br>


    </html:form>


    </body>


    </html>


    The ActionForm associated with Listing 11-2 is described in Listing 11-3.


    **Listing 11-3.** *ActionForm Associated with Listing 11-2*


    import org.apache.struts.upload.FormFile;


    public class FileUploadForm extends ActionForm{


    protected FormFile[] _files;


    public FileUploadForm(){


    _files = new FormFile[4];


    }


    public FormFile getFile(int i){


    return _files[i];


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C11.fm Page 132 Thursday, January 12, 2006 11:02 AM


    **132**


    C H A P T E R 1 1 ■ U P L O A D I N G F I L E S


    public void setFile(int i, FormFile f){


    _files[i] = f;


    }


    ... //rest of FileUploadForm


    One important thing to note from Listing 11-3 is the order of the arguments in
    setFile().


    A common mistake is to reverse the order:


    setFile(FormFile f , int i) //WRONG!! Arguments reversed.


    Apart from this, Listings 11-2 and 11-3 should hold no surprises.'
