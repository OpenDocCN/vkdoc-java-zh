  raw: 'Both classes have setAttribute() and getAttribute() functions (see Appendix
    B for details) to store and retrieve objects on them, very much like a HashMap’s
    put() and get() functions. Objects stored on HttpServletRequest have request scope
    while objects stored on HttpSession have session scope.


    When you create a variable on your JSP page, as in Listing 3-1, you’re implicitly
    calling setAttribute() on the appropriate object (an instance of either HttpServletRequest
    or HttpSession) depending on the scope you used.


    Similarly, when you used myVariable in the scriptlets embedded in First.jsp and
    Second.jsp, the servlet container retrieves the variable by calling getAttribute("myVariable")
    on the appropriate object.


    So, if you *somehow* manage to get an instance of either HttpServletRequest or
    HttpSession, you could stuff them with objects that could in principle be retrieved
    from your JSP pages. In fact, all you need is an instance of HttpServletRequest,
    since you could get the associated HttpSession instance by calling getSession()
    on HttpServletRequest.


    The “somehow” will become obvious in later chapters. For now, note that this is
    one way you could pass data between the Java classes and JSPs that make up your
    webapp.


