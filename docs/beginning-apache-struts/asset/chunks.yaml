    The corresponding property on the ActionForm must be a boolean.


    Attributes


    All common attribute sets (evt-attrs, acc-attrs, ren-attrs, struts-attrs , init-attr,
    and the new err-attrs) are accepted, and have their usual meanings.


    There are four important things to note:


    • The corresponding property on the ActionForm subclass must be a boolean.


    • The value attribute specifies the argument to put in setXXX() if the check box
    is checked. So, if you specify value="true" (or on or yes), then setXXX(true)
    is called if the check box is checked. If you use any other setting for value,
    then setXXX(false) is called if the check box is checked.


    • The check box is rendered as checked only if value equals the return value of
    getXXX(). So, if value="true" (or on or yes) and getXXX() also returns true, then
    the check box is rendered as checked. Similarly, if value is not true (or on or
    yes) and getXXX() returns false, then the check box is also rendered as checked.


