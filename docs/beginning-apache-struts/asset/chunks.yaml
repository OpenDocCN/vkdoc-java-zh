    **3.** 打开 Internet Explorer，然后选择“工具” ➤ “Internet 选项” ➤ “语言”（参见图 12-2）。如果你使用的是
    Mozilla 或其他浏览器，则需要自行找到此设置。添加马来语 (ms) 并移除所有其他语言。


    **4.** 关闭所有 Internet Explorer 实例，然后打开一个并导航到 LILLDEP 页面。你应该会看到所有提示和按钮都显示为马来语（参见图
