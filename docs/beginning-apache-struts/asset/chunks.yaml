- fmt: '# The Collection Facility


    ## Collection Listing Page


    The `Collection Listing` page lists the Contacts within a collection. It also
    allows the user to add an arbitrary Contact from a full listing or click the company
    name to get into the `Collection Full Display` page.


    ## Collection Full Display Page


    The `Collection Full Display` page displays the Contact''s details, with Previous
    and Next buttons to navigate up and down the collection.


    ## Database Tables


    There are two database tables used to store data for a single collection. The
    `collection` table stores the collection''s name, memo, and autogenerated collection
    ID. The `collection_map` table holds the Contact ID and collection ID as pairs.


    > **Note:** We''ll be using Lisptorq-generated Model classes to store and retrieve
    data from these tables, so be sure to read Appendix A''s section on Lisptorq.


    There''s quite a bit to implement, so we''ve broken down this lab into six subparts.
    The source code answers for this lab (found in the Source Code section of the
    Apress website, located at `http://www.apress.com`) are similarly divided into
    six parts.


    **Figure 18-1.** *The navigation button for the Collection facility*


    ## Lab 18a: The Main Collect Page


    The main Collect page allows users to create, view, and edit collections. Figure
    18-2 shows this page with a couple of collections defined. This lab sets up the
    basic page, and subsequent labs implement the viewing and editing facilities.


    1. Complete the implementation of `CollectAction` to prepare the list of collections
    to be displayed. (*Hint:* You need to use the `Criteria` class to retrieve all
    Collection data objects stored in the database.) Use an appropriate constant from
    `JSPConstants` for an attribute name under which to store the list of Collection
    data objects.


    2. Put in an action mapping so that a link to `Collect.do` displays the list of
    collections. The success forward should point to `collect.jsp`.


    3. Complete `collect.jsp` so that it displays the names of all defined collections.
    (*Hint:* The `Scroller` interface extends `Iterator`, so you should be able to
    use `<logic:iterate>` with it.)


    4. Each collection listed by `collect.jsp` should have a delete link on its left
    linked to `DeleteCollection.do`. This link should pass the collection''s ID as
    a parameter called `id`.


    5. Complete the implementation of `DeleteCollectionAction` so that it deletes
    the selected collection. (*Hint:* Refer to Appendix B to see how to retrieve the
    value of the `id` parameter from `HttpServletRequest`.)


    6. Put in an action mapping so that `DeleteCollection.do` maps to `DeleteCollectionAction`.
    `success` should forward to `Collect.do` (and *not* `collect.jsp`).


    Ensure that your work compiles before proceeding.


    **Figure 18-2.** *The main Collect page, showing some collections*


    ## Lab 18b: The New Collection Page


    Each collection has a *name* by which it is known and a *memo* for holding the
    user''s notes. In addition, a collection contains any number of Contacts. In order
    to bootstrap a collection, the user needs to specify a SQL *query*:


    - The queries are SQL-like—for example, `postcode<>''''` and `email like''%mit%''`
    would fetch all contacts with nonblank postcodes and whose email addresses contained
    the string `mit`.

    - Each query results in a list of contacts matching the query string. The user
    may subsequently add, remove, or edit contacts within the collection.


    Figure 18-3 shows the New Collection page.'
