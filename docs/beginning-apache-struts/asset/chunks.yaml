    **使用 LocaleAction 切换区域设置**


    另一种允许用户切换区域设置的方法是使用 Struts 类 LocaleAction。要*有效*地使用这个类，你首先需要理解动态表单（参见第 16 章），因此我将把对
    LocaleAction 的讨论推迟到第 17 章。


    **实验 12：面向马来西亚市场的 LILLDEP**


    在本实验中，你将看到将 LILLDEP 移植到马来西亚（或印度尼西亚）市场是多么容易。


