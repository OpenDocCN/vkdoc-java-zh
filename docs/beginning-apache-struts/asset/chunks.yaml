    **Listing C-1.** *Using the LabelValueBean Class*


    //create collection to hold value-label pairs


    List labelValuePairs = new ArrayList();


    //populate collection


    labelValuePairs.add( new LabelValueBean("labelOne", "valueOne")); labelValuePairs.add(
