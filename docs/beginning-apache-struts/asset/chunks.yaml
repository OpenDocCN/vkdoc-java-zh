- fmt: '```xml

    <form-property name="class" type="java.lang.String" initial="Car"/>

    <form-property name="height" type="java.lang.Integer" initial="1000"/>

    <form-property name="width" type="java.lang.Integer" initial="0"/>

    <form-property name="make" type="java.lang.String"/>

    <form-property name="year" type="java.lang.Integer"/>

    </form-bean>


    There’s a lot of duplication in the declarations. This becomes much worse if there
    are more “subentities” of `Vehicle`. Our goal is to allow Listing 19-1 to be simplified
    as shown in Listing 19-2.


    **Listing 19-2.** *Using the extends Attribute*


    ```xml

    <form-bean name=".vehicle"

    type="org.apache.struts.action.DynaActionForm">

    <form-property name="class" type="java.lang.String"

    initial="Unknown Class"/>

    <form-property name="height" type="java.lang.Integer" initial="0"/>

    <form-property name="width" type="java.lang.Integer" initial="0"/>

    </form-bean>


    <form-bean name=".vehicle.ship" extends=".vehicle">

    <form-property name="class" initial="Ship"/>

    <form-property name="height" initial="1000"/>

    <form-property name="name" type="java.lang.String"/>

    </form-bean>


    <form-bean name=".vehicle.car" extends=".vehicle">

    <form-property name="class" initial="Car"/>

    <form-property name="make" type="java.lang.String"/>

    <form-property name="year" type="java.lang.Integer"/>

    </form-bean>

    ```


    Much better! As you can see, this really cuts down the code duplication. The `extends`
    attribute functions like its counterpart in Tiles, where you could “extend” one
    Tiles definition from another. Notice that I’ve used a dot naming system for the
    form names, similar to the one used for Tiles.


    We’ll want to have a few other things in the DynaForms plug-in:


    - A “sub form bean” can override both the initial value or the type of a `<form-property>`.

    - DynaForms must place no restrictions on the class type of the form bean. You
    should be able to declare *any* form bean with DynaForms.

    - There should be a mechanism to prevent “ancestor” form beans, which are never
    used in your `struts-config.xml` file, from being instantiated. This saves system
    resources. To accomplish this, I’ll add another attribute called `create` into
    `<form-bean>`.


    Setting `create=false` would suppress creation of that form bean. For example,
    if we wanted to suppress creation of `.vehicle` in Listing 19-2, we’d use:


    ```xml

    <form-bean name=".vehicle" create="false" ....

    ```


    In summary, apart from the `extends` and `create` attributes, the new form bean
    declarations look just like the original Struts ones.


    In addition, I’ll make one big simplification: the new form bean declarations
    won’t support the `<set-property>` tag. Adding support for `<set-property>` is
    not *too* difficult. You are encouraged to attempt this on your own at the end
    of the chapter.


    Lastly, we can’t place our new form beans in `struts-config.xml` itself, since
    this will require subclassing `ActionServlet`. Instead, we’ll have to place them
    in another XML file (or in multiple XML files).


    Now that the goals of the DynaForms plug-in are clear, the next step is deciding
    how to achieve them.


    ## Implementation Road Map


    Essentially, the implementation of the DynaForms plug-in would have to:


    - Parse the input XML files (there might be more than one). So the plug-in declaration
    will require at least a `pathnames` property, like the Validator framework, which
    is a comma-separated list of filenames.

    - Resolve the inherited properties of a form bean.

    - Somehow get Struts to recognize these as if they had been declared in `struts-config.xml`.


    For the first, I’ll show you how to use the Apache Digester, which is an easy
    way to read XML files. Digester is also used internally by Struts. The second
    step is relatively straightforward, but the last requires some knowledge of how
    Struts reads and declares form beans. We’ll tackle this last step first.'
