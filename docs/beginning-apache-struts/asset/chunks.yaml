- fmt: "# CHAPTER 15: THE VALIDATOR FRAMEWORK\n\nLastly, note that you can explicitly\
    \ refer to a specific row on an indexed field. Listing 15-10 shows an example.\n\
    \n**Listing 15-10.** *Referring to an Explicit Row on an Indexed Field*\n\n```\n\
