    <c:set var="myVar" value="${fn:length(MyCollection)}" /> 记得声明 JSTL 函数标签库。


    **struts**


    此标签将一个 Struts 全局转发、表单 bean 或表单处理器（表单处理器的 ActionMapping）作为一个变量暴露出来，可供脚本小程序和其他标签访问。如果你希望
