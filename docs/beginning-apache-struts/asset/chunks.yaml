    ## Chapter 14: Tiles


    **Quick Quiz**: What advantage does this approach (Listings 14-5 and 14-6) have
    over the earlier one (Listing 14-4)?


    **Answer**: Listing 14-4 applies a layout to a single page. It can’t be reused.
    More precisely, you can reuse the *page* in your webapp of course, but you can’t
    reuse the *layout* in your other JSP pages. To reuse the layout, you’d have to
    define the layout in your Tiles definitions file. This is what Listing 14-5 does;
    it defines a layout that may be applied to any number of pages, as it is in Listing
    14-6.


