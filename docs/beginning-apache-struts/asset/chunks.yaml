    **Splitting up struts-config.xml**


    As your project grows, and especially if you work in a team, you might find yourself
    wishing that it were possible to break up struts- config.xml into several pieces.
    There are a few reasons why you might want to do this:


    • **Manageability**: As the config.xml file becomes too big, the control flow
    of your webapp becomes less transparent. You’d want to break up struts-config.xml
    into separate sections, each of which perhaps represents control flow of a limited
    portion of the overall webapp.


    • **Separate namespaces**: You have two or more teams working on different aspects
    of the webapp, and you’d like these teams to work independently of each other.
    The primary concern here is to give each team different *namespaces.* Distinct
    namespaces would help avoid the problem of two teams creating two different form
    beans with the same name.


    • **Source control**: Some poorly designed source control systems allow only single
    checkouts. If you’re working in a large team, this is potentially very restrictive,
    since it’s likely that more than one person might want to edit struts-config.xml
    at the same time.


    The first way to split up struts-config.xml is to simply do just that. You can
    create multiple struts-config.xml files (with different names, of course!) and
    instruct Struts that they are to be regarded as one file. To do this, you have
    to edit web.xml, the servlet configuration file.


    For example, suppose you had multiple configuration files: struts-config.xml,
    struts-config-admin.xml, and struts-config-logon.xml. Listing 17-16 shows how
    you’d declare them both in web.xml. All you need to do is to put a comma between
    each Struts configuration file. Easy!


    **Listing 17-16.** *Declaring Multiple Struts Configuration Files in web.xml*


    <servlet>


    <servlet-name>action</servlet-name>


    <servlet-class>


    org.apache.struts.action.ActionServlet


    </servlet-class>


    <init-param>


    <param-name>config</param-name>


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C17.fm Page 264 Tuesday, January 24, 2006 10:14 AM


    **264**


    C H A P T E R 1 7 ■ P O T P O U R R I


    **<param-value>**


    **/WEB-INF/struts-config.xml,**


    **/WEB-INF/struts-config-admin.xml,**


    **/WEB-INF/struts-config-logon.xml**


    **</param-value>**


    </init-param>


    </servlet>


    Now, this approach solves manageability and source control issues, but it does
    not solve namespace problems because Struts will internally merge together all
    the declared configuration files. So, although they appear as two or more files
    to you, they appear as one to Struts.


    There is a Struts feature called modules that allows you to split a Struts configuration
    files into different modules. A module represents a *logical* split in your webapp.
    Each module gets its own namespace, so this solves namespace issues. Using the
    previous example, suppose we want to give each Struts config file separate namespaces:
    the default namespace for items declared in struts-config.xml, the admin namespace
    for struts-config-admin.xml, and the logon namespace for struts-config-logon.xml.
    The resulting declaration in web.xml appears in Listing 17-17.


    **Listing 17-17.** *Declaring Multiple Submodules in web.xml*


    <servlet>


    <servlet-name>action</servlet-name>


    <servlet-class>


    org.apache.struts.action.ActionServlet


    </servlet-class>


    <init-param>


    **<param-name>config</param-name>**


    **<param-value>/WEB-INF/struts-config.xml</param-value>**


    </init-param>


    <init-param>


    **<param-name>config/admin</param-name>**


    **<param-value>/WEB-INF/struts-config-admin.xml</param-value>**


    </init-param>


    <init-param>


    **<param-name>config/logon</param-name>**


    **<param-value>/WEB-INF/struts-config-logon.xml</param-value>**


    </init-param>


    </servlet>


