    **227**


    **何时使用动态表单**


    那么，究竟*何时*该使用动态表单呢？Apache Struts 用户指南（参见“实用链接”）对此有详细说明：


    *DynaActionForm 旨在为常见问题提供简便解决方案：当你的 ActionForm 仅使用简单属性和标准验证，且只需将这些属性传递给另一个 JavaBean
    时……DynaActionForm 并非 ActionForm 的即插即用替代品……*


    第一句话指的是使用 BeanUtils 将属性传递给 JavaBean 的过程。你在上一小节中已经看到过实际应用。


    使用“标准验证”意味着采用 Validator 框架。这是*推荐做法*，因为频繁访问表单属性需要调用 `DynaActionForm` 的 `get()`
    方法，而由于失去了代码的编译时检查能力，这种方法容易出错。`get()` 方法本身并不容易出错，但你的代码可能存在 bug，且无法在编译时发现。而使用传统
    ActionForm 时，编译器会为你进行检查，因此不存在此问题。


    第二句话指的是动态表单的属性在 EL 引用方式上与传统 ActionForm 的属性不同。如果你试图在大量使用 EL 的应用程序中替换常规 ActionForm，这可能会成为一道障碍。


    **验证动态表单**


    与普通 ActionForm 类似，动态表单中的数据验证有两种方式：


    • 实现一个包含 `validate()` 方法的 `DynaActionForm` 子类。


    • 使用 `org.apache.struts.validator.DynaValidatorForm` 子类（它基于 Validator 框架，详见第 15
    章）。


    与使用 Validator 框架的 ActionForm 一样，你可以通过继承 `DynaValidatorForm` 并在子类的 `validate()`
    方法中调用 `super.validate()` 来运行自定义验证逻辑。我在第 15 章中已经介绍过这种技术。


    结合 Validator 框架和 BeanUtils 使用动态表单，可以完全消除为表单 Bean 编写 Java 代码的需求。但在深入探讨之前，我将先展示如何使用动态表单实现
    Registration 网络应用程序（参见第 5 章）。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


