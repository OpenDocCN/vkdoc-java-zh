    组件——该组件与我们希望定位的 `<h:message>` 标签属于同一个命名容器。在清单 20-10 中，我们将这个保存的副本命名为 `_container`，因为
    `<h:form>` 包含了我们感兴趣的所有其他 UI 组件（参见清单 20-11）。


    JSF 如何知道它需要调用这个函数？如果你查看清单 20-11，`<h:form>` 的声明是：


    <h:form binding="#{user.container}">


    这会导致与 `<h:form>` 对应的 UI 组件通过 `setContainer()` 方法保存到 `User` 类上。


    不幸的是，故事并未就此结束！当我们的某个页面被重新加载，或者当你从一个页面导航到另一个页面时，JSF 还会使用 `getContainer()` 方法从用户后台
    Bean 中检索出 UI 组件并进行嫁接。它会将之前存储的 `<h:form>` UI 组件及其所有子节点，嫁接到它看到绑定被创建的位置。


    JSF 这样做是为了允许后台 Bean 改变页面的外观。如果使用得当，这是一种创建动态视图的非常强大的技术。你可以利用这种技术在 Web 应用中添加、移除或重新定位元素（如工具栏、按钮或迷你窗口）。


    然而，在我们的案例中，我们并不希望出现这种行为，因此我们必须将 `getContainer()` 的返回值设置为 `null`。这会告诉 JSF 不要嫁接任何东西，而是调用
    `setContainer()` 并保存 `<h:form>` 的一个副本。


