    The other tags are similarly constructed. The exception is `<logic:present>`.
    This tag tests for the presence of an item in the current request. There are two
    *nonequivalent* ways to test for this. You could use


    `test="${myVariable != null}"`


    to test if the variable `myVariable` reference exists. Or you could use `test="${not
    empty myVariable}"`


    This latter check will return `true` not only if the `myVariable` does not exist
    but also if the `myVariable` exists but is empty, meaning it is a zero length
    `String`, or an empty array or `Collection`.


    Another Struts tag with a not-so-obvious JSTL replacement is


    `<logic:messagesPresent>`. This tag tests for the presence of a Struts message.
    For example:


    `<logic:messagesPresent property="emailMsg">`...


    checks for the presence of a message named `emailMsg`. In order to emulate this
    tag using JSTL, we have to know where Struts messages are stored on the request
    object. A quick comparison of the Struts source code files involved (`org.apache.struts.taglib.logic.PresentTag`,
    `org.apache.struts.taglib.logic.MessagesPresentTag`, and `org.apache.struts.taglib.TagUtils`)
    shows that the tests are essentially the same. So, the previous two solutions
    would also apply to `<logic:messagesPresent>`.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


