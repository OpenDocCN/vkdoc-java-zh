    equal sign (=) right after the start of the scriptlet tag <%. This means the evaluated
    value of the Java code is to be displayed. It is also possible to have scriptlets
    that do not display anything but instead produce some side effect, as shown in
    Listing 2-2.


    **Listing 2-2.** *Scriptlets in Action*


    <%@ page contentType="text/html;charset=UTF-8" language="java" %>


    <%


    double g = (Math.sqrt(5) + 1)/2;


    %>


    The golden ratio is: <%= g %>


    In Listing 2-2 there are two scriptlets. The first silently calculates a number
    (no = sign), and the second displays the calculated value (with an = sign).'
