    示例


    以下是一个使用全局转发的简单示例：


    <html:link forward="success" />


    渲染后的链接将指向 success 全局转发的实际位置。您还可以为链接包含请求参数：


    <html:link page="/mypage.jsp" paramName="myRequestValue"


