    overlaps with JSTL’s <forEach> tag. We’ll come to this in a later section.


    **Simple, Nested, Indexed, and Mapped Properties**


    Many Struts tags accept a property attribute, which refers to a property on the
    object they’re operating on. We’ve seen this in action, for example, in the <bean:write>
    tag in the previous section:


    <bean:write name="contact" property="company"/> As it’s used here, <bean:write>
    attempts to display the return value of getCompany(), which is called on the object
    referred to as contact. This is an example of a *simple property*.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C10.fm Page 112 Tuesday, January 24, 2006 10:12 AM


    **112**


    C H A P T E R 1 0 ■ M O R E T A G S


    Simple properties are those that implicitly call a getXXX() function on the object
    currently under consideration.


    Struts supports three other types of properties: *nested*, *indexed*, and *mapped*
    properties.


    **Nested properties** allow you to refer to a property of a property. For example,
    if in our previous example the return value of getCompany() were a JavaBean object,
    then nested properties would allow you to refer to a property on this object:


    <bean:write name="contact" property**=**" **company.name**"/> As it’s used here,
    <bean:write> attempts to display the return value of getCompany().getName().


    **Indexed properties** are similar to simple properties, but they assume that
    the function that should be called is getXXX(int index) instead of just getXXX().
    So, if the contact object supported a getCompany(index) function, this is how
    you would call it:


    <bean:write name="contact" property=" **company[41]**"/> As it’s used here, <bean:write>
    attempts to display the return value of getCompany(41).


    This example begs the question of how to use indexed properties with <logic:iterator>,
    for example, to display a list of values. This is how you’d do it:


    <logic:iterate name="companies" id="company" indexId="cnt">


    <bean:write name="companies" property=" **company[<%=cnt%>]**"/>


    </logic:iterate>


    This example assumes that the companies object has a getCompany(index) function.


    This example should also set off alarm bells in your head: it uses a scriptlet!
    There’s got to be a better way—and there is. In this particular example, you have
    two choices: use


    <forEach> and <out> JSTL tags (which we’ll cover later) or use the Struts-EL tags
    (we’ll also cover these later), which are souped-up versions of the ordinary Struts
    tags:


    <logic-el:iterate name="companies" id="company" indexId="cnt">


    <bean-el:write name="companies" property=" **company[${cnt}]**"/>


    </logic-el:iterate>


    In this example, the change is hardly perceptible, but in more realistic cases
    the resulting code would be much simpler to read.


    **Mapped properties** are similar to indexed properties, except that the function
    called is assumed to be getXXX(String s). For example, if the contact object in
    the previous examples had a getMobile(String mobileType) function, you could use


    <bean:write name="contact" property=" **mobile(home)**"/>


    <bean:write name="contact" property=" **mobile(office)**"/> These examples would
    call getMobile("home") and getMobile("office"), respectively.


    You can also mix the various types of properties:


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C10.fm Page 113 Tuesday, January 24, 2006 10:12 AM


    C H A P T E R 1 0 ■ M O R E T A G S


    **113**


    <bean:write name="contacts" property=" **contact[5772]**. **company**"/> which
    is an implicit call to getContact(5772).getCompany().


    Table 10-1 summarizes the various property types.


    **Table 10-1.** *Simple, Nested, Indexed, and Mapped Properties* **Type**


    **Usage**


    **Function Called**


    simple


    property="myProperty"


    getMyProperty()


    nested


    property="myProperty.mySubProperty"


    getMyProperty().getMySubProperty()


    indexed


    property="myProperty[5772] "


    getMyProperty(5772)


    mapped


    property="myProperty(myString) "


    getMyProperty("myString")


    **Conditional Processing**


    The Logic tag library has a number of tags for performing conditional processing.
    These may be grouped into three categories:


    • **Tests:** present, empty, messagesPresent


    • **Comparisons**: equal, lessThan, lessEqual, greaterThan, and greaterEqual


    • **String matching**: match'
