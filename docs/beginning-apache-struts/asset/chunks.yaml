    **413**


    有两种方法可以指定每个渲染的 `<option>` 元素要使用的值和标签：


    • 指定 `collection`/`property`/`labelProperty` 属性：`collection` 属性给出一个 JavaBean 集合的名称，每个
    JavaBean 包含单个 `<option>` 的值和标签。`property` 属性是在每个 bean 上调用的 `getXXX()` 函数的名称，用于获取
    `<option>` 的值。类似地，`labelProperty` 属性是在每个 bean 上调用的 `getXXX()` 函数的名称，用于获取 `<option>`
    的标签。如果省略 `labelProperty`，则 `<option>` 的值将用作标签。


    • 指定 `name`/`property` 和 `labelName`/`labelProperty` 属性：`name` 和 `property` 对指定了任意作用域中的一个集合，用于获取每个渲染的
    `<option>` 的值。如果仅指定 `property` 属性，则 `ActionForm` 子类是隐式的基础对象。类似地，`labelName` 和
    `labelProperty` 对指定了一个集合，用于获取每个渲染的 `<option>` 的标签。如果仅指定 `labelProperty`，则 `ActionForm`
    子类是隐式的基础对象。


    如果既未指定 `labelName` 也未指定 `labelProperty`，则标签与值相同。


    `<html:options>` 的其余属性是 `filter`，如果为 `true`，则会过滤标签中的 HTML 保留字符（如 `<`、`>` 或 `&`）。默认值为
    `true`。


    **optionsCollection 的属性**


    `optionsCollection` 是 `<html:options>` 的简化、流线型版本。与 `<html:options>` 类似，`optionsCollection`
    标签接受 `ren-attrs` 属性集，但 `styleId` 属性除外。它也具有 `filter` 属性，与 `<html:options>` 相同。


    `optionsCollection` 假设每个渲染的 `<option>` 的值和标签都存储在一个 JavaBean 集合中。此集合使用 `name` 和
    `property` 属性指定。如果仅指定 `property` 属性，则与封闭表单关联的 `ActionForm` 子类是隐式的基础对象。每个 JavaBean
    都被假定具有两个 `getXXX()` 函数，用于获取单个 `<option>` 标签的值和标签。

