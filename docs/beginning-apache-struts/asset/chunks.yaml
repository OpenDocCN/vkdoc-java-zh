- fmt: 'Struts does all this *and* is easy to learn, which certainly contributes to
    its popularity.


    There are, in fact, other web application frameworks, both open source and proprietary,
    but Struts has seen explosive growth over competing frameworks and now has a very
    large user base. So, if you’re ever stuck with a sticky Struts problem, you have
    ready access to a very large body of knowledge on the Internet.


    ## About You


    In writing this book, I’ve been presumptuous enough to make a few assumptions
    about your programming background. In particular, I’ve assumed that you have


    - **No experience with servlets**: If you *have* worked with servlets, then you
    have an advantage, but not much, since Struts does an admirable job of hiding
    most of the underlying servlet infrastructure.

    - **Some experience with JSP**: If you’ve only used ASP or PHP, not to worry;
    you should be able to pick up JSP essentials as the book progresses.

    - **A working knowledge of Java**: You don’t have to be a Java expert, but a sound
    knowledge of Java (1.4) basics is absolutely essential. If you can’t tell when
    to use a `Reader` and when to use an `InputStream`, you might find this book difficult
    to follow.


    ## How to Read This Book


    A friend of mine once compared programming to carpentry. I couldn’t agree more.
    Perhaps the only way to acquire new skills in either discipline is by application
    to nontrivial projects. Would you buy furniture built by someone who “learned”
    carpentry through correspondence?


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C01.fm Page 6 Thursday, January 12, 2006 10:49 AM


    **6**


    C H A P T E R 1 ■ I N T R O D U C T I O N


    In the same spirit, this book takes a very hands-on approach in teaching you Struts.


    The lab sessions and exercises are an *integral* part of the book.


    > **Note** I can’t overemphasize this: You won’t learn a thing from this book
    if you don’t attempt the labs!


    Having said that, I’ve tried to make the lab sessions challenging and interesting,
    but not overly complicated. Past the first few preliminary chapters, subsequent
    lab sessions involve building a nontrivial, real-life data entry and display application.
    I hope you enjoy seeing the final product emerge as you progress.


    Every lab session has solutions, which have been carefully checked and independently
    reviewed, and which can be found in the Source Code section of the Apress website
    (http://www.apress.com). Questions raised in either the lab sessions or in the
    main text are in Appendix D.


    There are two parts to this book, and each part ends with “review” labs, to help
    you solidify what you’ve learned.


    The first part of the book covers Struts basics, as well as JSP and Servlet prerequisites.


    The second part of the book covers the more “advanced” portions of Struts like
    Tiles, the Validator framework, and how to build your own plug-ins, among other
    things. We’ll also study JSF and Struts Shale in the latter half of the book.


    ## Useful Links


    - You’ll find the Apache Struts website at http://struts.apache.org.

    - Ted Husted’s website, http://husted.com/struts, contains many nuggets on Struts
    best practices.

    - The ServerSide, www.theserverside.com: has useful articles and discussions on
    Struts.

    - You’ll find Craig McClanahan’s blog at http://blogs.sun.com/roller/page/craigmcc.

    - Spring is another web application framework; learn about it at www.springframework.org.

    - *Pro Jakarta Struts*, from Apress, is now in its second edition: http://www.apress.com/book/bookDisplay.html?bID=228.

    - Also check out *Foundations of Ajax* (http://www.apress.com/book/bookDisplay.html?bID=10042)
    and *Pro Jakarta Velocity:From Professional to Expert* (http://www.apress.com/book/bookDisplay.html?bID=347),
    both from Apress.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


