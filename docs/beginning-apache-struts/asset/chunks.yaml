- fmt: "你可以轻松地自行构建前端解决方案，但 Struts 提供了一个立即可用的方案。`IncludeAction` 和 `ForwardAction` 使得将\
    \ Struts 与遗留的 Servlet 或 JSP 集成变得简单。\n\n你可以像使用其他 `Action` 一样使用它们，只需在 `<action>`\
    \ 标签中添加一个 `parameter` 属性。该 `parameter` 属性是一个路径，指向包含你想要调用的业务逻辑的 Servlet 或 JSP 的位置，一旦\
    \ Struts 完成用户输入的验证。\n\n例如，假设你的遗留代码（一个 Servlet）执行用户登录，并且你想放置一个 Struts 前端来运行简单的验证，如第\
    \ 6 章清单 6-1（Registration webapp）所示。使用 `IncludeAction` 并将 `LoginForm`（用于保存和验证用户数据）与遗留\
    \ Servlet `com.myco.myapp.MyLoginServlet` 关联起来的 `<action>` 声明将是：\n\n```xml\n<action\
    \ path=\"/Login\"\n        type=\"org.apache.struts.actions.IncludeAction\"\n\
    \        name=\"LoginForm\"\n        validate=\"true\"\n        input=\"/login.jsp\"\
    \n        parameter=\"/WEB-INF/classes/com/myco/myapp/MyLoginServlet\" />\n```\n\
    \n请注意，就像 `DownloadAction` 一样，你不能指定 `<forward>`，因为遗留 Servlet 负责生成“下一个”页面。但是，*你可以指定异常处理器*。\n\
    \n*[www.it-ebooks.info](http://www.it-ebooks.info/)*\n\nDoray_6048C17.fm Page\
    \ 248 Tuesday, January 24, 2006 10:14 AM\n\n**248**\n\nC H A P T E R 1 7 ■ P O\
    \ T P O U R R I\n\n**国际化**\n\n不幸的是，使用这种技术没有简单的方法来国际化遗留应用程序，因为你几乎无法控制遗留代码的输出。\n\
    \n如果你的遗留代码编写良好，业务逻辑在 Servlet 中，视图代码在 JSP 中，那么可以将遗留 JSP 迁移到使用 Struts 标签，并使用 `IncludeAction`\
    \ 或 `ForwardAction` 在 Struts 和遗留 Servlet 之间进行协调。当然，这假设遗留代码能正确处理非 ASCII 字符。情况通常*并非如此*，但如果你的目标语言只使用\
    \ Latin-1，那么你可能足够幸运，它们能正确处理。\n\n使用 `ForwardAction` 的 `<action>` 声明类似——你只需将 `org.apache.struts.actions.IncludeAction`\
    \ 替换为 `org.apache.struts.actions.ForwardAction`。\n\n这就引出了一个问题：两者有什么区别？\n\n`IncludeAction`\
    \ 执行程序化的“包含”。这意味着两件事：\n\n*   被调用的遗留代码*不能更改*发送给客户端的 Cookie 或头信息。发送给客户端的头和 Cookie\
    \ 由 Struts 决定。在某些场景下（例如，当你使用 Struts 指定了请求的作用域时），保留头或 Cookie 信息至关重要。\n*   你可以子类化\
    \ `IncludeAction` 以向响应对象写入内容。当然，你需要在某个时刻调用 `super.execute()` 以确保调用遗留代码。你可以在任何时候执行此操作，无论是在向响应对象写入内容之前、之后还是之间。\n\
    \n`ForwardAction` 执行程序化的“转发”，这意味着对发送给客户端的数据的*完全控制权*被传递给遗留代码。Struts *不能*决定头或 Cookie\
    \ 信息，并且你*不能*像使用 `IncludeAction` 那样，通过子类化 `ForwardAction` 来向客户端写入数据。`ForwardAction`\
    \ 只是将对响应对象的所有控制权传递给遗留代码。\n\n**简而言之...**\n\n在大多数需要为遗留代码放置前端的情况下，你可能会使用 `IncludeAction`，因为它提供了更大的灵活性。它也很实用，因为即使在遗留代码发送其输出后，你仍然可以向客户端写入数据。\n\
    \n当遗留代码需要写入头或 Cookie 信息才能正常工作时（例如，如果它需要将内容类型设置为 `text/html` 以外的其他类型），`ForwardAction`\
    \ 是唯一的选择。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C17.fm\
    \ Page 249 Tuesday, January 24, 2006 10:14 AM\n\nC H A P T E R 1 7 ■ P O T P O\
    \ U R R I\n\n**249**\n\n**LookupDispatchAction**\n\n有时你可能希望在一个表单上放置多个提交按钮，每个按钮指示服务器端代码对提交的数据执行不同的操作。实现此目的的一种常见技术是使用\
    \ JavaScript 设置表单上隐藏字段的值，从而允许服务器端处理代码判断用户点击了哪个提交按钮。\n\n例如，考虑下面的页面，它包含两个提交按钮（Save\
    \ 和 Update）、一个隐藏字段以及根据点击的按钮更改隐藏字段值的 JavaScript：\n\n```jsp\n<%@ page contentType=\"\
    text/html;charset=UTF-8\" %>\n<%@ taglib uri=\"/tags/struts-html\" prefix=\"html\"\
    \ %>\n<html:html>\n<head>\n<script language=\"JavaScript\">\nfunction changeMode(formName,\
    \ src){\n    document.forms[formName].elements[\"mode\"].value = src;\n}\n</script>\n\
    </head>\n<body>\n<html:form action=\"MyFormHandler.do\">\n//... 表单上的其他字段，已省略\n\
    <html:hidden property=\"mode\" value=\"unknown\"/>\n<html:submit value=\"Save\"\
    \n             onclick=\"changeMode('MyFormBean','save')\" />\n<html:submit value=\"\
    Update\"\n             onclick=\"changeMode('MyFormBean','update')\" />\n</html:form>\n\
    </body>\n</html:html>\n```\n\n这种自制的做法有三个缺点：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nDoray_6048C17.fm Page 250 Tuesday, January 24, 2006 10:14 AM\n\n**250**\n\n\
    C H A P T E R 1 7 ■ P O T P O U R R I\n\n*   如果用户关闭了 JavaScript，它将无法工作。\n*   每次你有两个或更多提交按钮时，都必须复制服务器端代码以根据\
    \ `<html:hidden>` 字段的值来分发处理。你可以创建自己的 `Action` 子类来做到这一点，但正如你很快会看到的，你是在重复造轮子，而且造出来的轮子更差。\n\
    *   另一个令人烦恼的问题是，你必须在每个具有此功能的 JSP 上粘贴或“包含”或“导入” JavaScript。并且你必须记得为每个提交按钮放入隐藏字段和\
    \ `onsubmit` 属性。\n\nStruts 提供了一种避免所有这些不愉快的方法。`LookupDispatchAction` 允许你在 HTML\
    \ 表单上拥有多个操作，*无需*编写任何 JavaScript。\n\n`LookupDispatchAction` 的魔力在于，当你使用带有 `property`\
    \ 属性的 `<html:submit>` 时，提交按钮上显示的文本会在表单提交时作为参数传递到 URL 中。提交的参数名称是 `property` 属性的值。这就是\
    \ `LookupDispatchAction` 知道表单上哪个提交按钮被点击的方式。\n\n使用 `LookupDispatchAction` 很容易。我们将考虑一个具体的例子：一个包含两个提交按钮的表单：`Print`\
    \ 用于打印表单数据，`Save` 用于保存数据。\n\n你要做的第一件事是实现表单（参见清单 17-5）。\n\n**清单 17-5.** *构建表单*\n\
    \n```jsp\n<html:form action=\"MyFormHandler.do\">\n... // 表单属性在此处\n<html:submit\
    \ property=\"action\">\n    <bean:message key=\"myapp.submit.button.print\" />\n\
    </html:submit>\n<html:submit property=\"action\">\n    <bean:message key=\"myapp.submit.button.save\"\
    \ />\n</html:submit>\n</html:form>\n```\n\n关于清单 17-5，可能唯一令人惊讶的是在 `<html:submit>`\
    \ 按钮中使用了 `property` 属性。这表示 Struts 应该将提交按钮的*文本*（在本例中，是 `myapp.submit.button.print`\
    \ 或 `myapp.submit.button.save` 的*值*）作为参数传递到请求 URL 中，参数名为 `action`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nDoray_6048C17.fm Page 251 Tuesday, January 24, 2006 10:14 AM\n\nC H A P T E\
    \ R 1 7 ■ P O T P O U R R I\n\n**251**\n\n例如，如果点击了 `Print` 按钮，请求 URL 将是 `http://..../MyFormHandler.do?action=Print`，当然，这假设\
    \ `myapp.submit.button.print` 在用户当前选择的区域设置中的值是 `Print`。\n\n■**注意** 我在清单 17-5 中使用了\
    \ `property=\"action\"`，但你可以使用不同的值。"
  raw: 'You can easily roll your own front-end solution, but Struts has one you can
    use immediately. IncludeAction and ForwardAction make it easy to integrate Struts
    with legacy servlets or JSPs.


    You’d use them like any other Action, with the addition of a parameter attribute
    in the


    <action> tag. This parameter attribute is a path pointing to the location of the
    servlet or JSP


    that contains the business logic you want to invoke, once Struts has finished
    validating user input.


    For example, suppose your legacy code (a servlet) performs user login, and you
    want to put a Struts front-end to run simple validations, as in Chapter 6, Listing
    6-1 (the Registration webapp). The <action> declaration using IncludeAction and
    linking LoginForm (to hold and validate user data) with a legacy servlet com.myco.myapp.MyLoginServlet
    would be


    <action path="/Login"


    type="org.apache.struts.actions.IncludeAction"


    name="LoginForm"


    validate="true"


    input="/login.jsp"


    parameter="/WEB-INF/classes/com/myco/myapp/MyLoginServlet" /> Notice that just
    as with DownloadAction, you can’t specify a <forward> because the legacy servlet
    is responsible for producing a “next” page. You *can*, *however, specify exception
    handlers.*


    *[www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C17.fm Page 248 Tuesday, January 24, 2006 10:14 AM


    **248**


    C H A P T E R 1 7 ■ P O T P O U R R I


    **INTERNATIONALIZATION**


    Unfortunately, there’s no easy way for you to internationalize legacy applications
    with this technique since you have little control over output of legacy code.


    If your legacy code is well written, with business logic in servlets and view
    code in JSPs, then it’s possible to migrate the legacy JSPs to using Struts tags
    and use IncludeAction or ForwardAction to mediate between Struts and the legacy
    servlets. This assumes, of course, that the legacy code correctly processes non-ASCII
    characters. This is often *not* the case, but if your target languages only use
    Latin-1, then you might be lucky enough that they do.


    The <action> declaration using ForwardAction is similar—you just replace org.apache.


    struts.actions.IncludeAction with org.apache.struts.actions.ForwardAction.


    This begs the question: what is the difference between the two?


    IncludeAction performs a programmatic “include.” This means two things:


    • The called legacy code *cannot alter* cookies or header information sent to
    the client.


    The headers and cookies sent to the client are dictated by Struts. Preserving
    header or cookie information is crucial in some scenarios—for example, when you’ve
    specified the scope of a request with Struts.


    • You may subclas s IncludeAction to write content to the response object. Of
    course, you need to call super.execute() at some point to ensure that the legacy
    code is called. You can do this at any time, either before or after or in between
    writing content to the response object.


    ForwardAction performs a programmatic “forward,” meaning that *total control*
    over the data sent to the client is passed to the legacy code. Struts *cannot*
    dictate the header or cookie information, and you may *not* subclass ForwardAction
    in order to write data to the client, like you could with IncludeAction. ForwardAction
    simply passes all control of the response object to the legacy code.


    **In a Nutshell...**


    In most cases where you need to put a front-end to legacy code, you’d probably
    use IncludeAction, since this gives you greater flexibility. It’s also useful
    since you can still write data to the client after the legacy code has sent its
    output.


    ForwardAction is the only way out when the legacy code needs to write header or
    cookie information in order to work correctly (for example, if it needs to set
    the content type to something other than text/html).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C17.fm Page 249 Tuesday, January 24, 2006 10:14 AM


    C H A P T E R 1 7 ■ P O T P O U R R I


    **249**


    **LookupDispatchAction**


    You might sometimes want to put more than one submit button on a single form,
    each instructing the server-side code to perform a different action with the submitted
    data.


    One common technique to accomplish this is to use JavaScript to set the value
    of a hidden field on the form, allowing the server-side processing code to tell
    which submit button was clicked by the user.


    As an example, consider the page that follows, which features two submit buttons
    (Save and Update), a hidden field, and JavaScript to change the hidden field’s
    value depending on which button was clicked:


    <%@ page contentType="text/html;charset=UTF-8" %>


    <%@ taglib uri="/tags/struts-html" prefix="html" %>


    <html:html>


    <head>


    <script language="JavaScript">


    function changeMode(formName, src){


    document.forms[formName].elements["mode"].value = src;


    }


    </script>


    </head>


    <body>


    <html:form action="MyFormHandler.do">


    //... other fields on the form, omitted


    <html:hidden property="mode" value="unknown"/>


    <html:submit value="Save"


    onclick="changeMode(''MyFormBean'',''save'')" />


    <html:submit value="Update"


    onclick="changeMode(''MyFormBean'',''update'')" />


    </html:form>


    </body>


    </html:html>


    This homebrew approach has three drawbacks:


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C17.fm Page 250 Tuesday, January 24, 2006 10:14 AM


    **250**


    C H A P T E R 1 7 ■ P O T P O U R R I


    • It won’t work if the user has switched off JavaScript.


    • Each time you had two or more submit buttons, you’d have to duplicate server-side
    code to dispatch processing according to the value of the <html:hidden> field.


    You could create your own Action subclass to do this, but as you’ll see shortly,
    you’d be reinventing the wheel, and a poorer one at that.


    • Another irritation is that you’d have to paste or “include” or “import” the
    JavaScript on each JSP that has this functionality. And you’d have to remember
    to put in the hidden field and the onsubmit properties for each submit button.


    Struts gives you a way to avoid all this unpleasantness. LookupDispatchAction
    allows you to have multiple actions on your HTML form *without* having to code
    any JavaScript.


    LookupDispatchAction does its magic by using the fact that when you use <html:submit>
    with a property attribute, the text displayed on the submit button is passed as
    a parameter in the URL when the form is submitted. The name of the parameter submitted
    is the value of the property attribute. This is how LookupDispatchAction knows
    which submit button was clicked on a form.


    Using LookupDispatchAction is easy. We’ll consider the concrete example of having
    a form with two submit buttons: Print to print the form data and Save to save
    the data.


    The first thing you’ll do is implement the form (see Listing 17-5).


    **Listing 17-5.** *Constructing the Form*


    <html:form action="MyFormHandler.do">


    ... // form properties here


    <html:submit property=" **action**">


    <bean:message key=" **myapp.submit.button.print**" />


    </html:submit>


    <html:submit property=" **action**">


    <bean:message key=" **myapp.submit.button.save**" />


    </html:submit>


    </html:form>


    Perhaps the only surprising thing about Listing 17-5 is the use of the property
    attribute in the <html:submit> buttons. These signal that Struts should pass the
    *text* of the submit button (in this case, the *value* of either myapp.submit.button.print
    or myapp.submit.


    button.save) as a parameter in the request URL, with the parameter name of action.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C17.fm Page 251 Tuesday, January 24, 2006 10:14 AM


    C H A P T E R 1 7 ■ P O T P O U R R I


    **251**


    For example, if the Print button was clicked, the request URL would be http://..../MyFormHandler.do?action=Print


    assuming, of course that the value of myapp.submit.button.print in the user’s
    currently selected locale is Print.


    ■**Note** I’ve used property="action" in Listing 17-5, but you can use a different
    value.'
  trans: "\n你可以轻松地构建自己的前端解决方案，但 Struts 提供了一个立即可用的方案。`IncludeAction` 和 `ForwardAction`\
    \ 使得将 Struts 与遗留的 Servlet 或 JSP 集成变得简单。\n\n你可以像使用其他 Action 一样使用它们，只需在 `<action>`\
    \ 标签中添加一个 `parameter` 属性。这个 `parameter` 属性是一个路径，指向包含你想要调用的业务逻辑的 Servlet 或 JSP\
    \ 的位置，一旦 Struts 完成用户输入的验证。\n\n例如，假设你的遗留代码（一个 Servlet）执行用户登录，并且你想放置一个 Struts 前端来执行简单的验证，就像第\
    \ 6 章清单 6-1（Registration webapp）中那样。使用 `IncludeAction` 并将 `LoginForm`（用于保存和验证用户数据）与遗留\
    \ Servlet `com.myco.myapp.MyLoginServlet` 关联起来的 `<action>` 声明将是：\n\n```xml\n<action\
    \ path=\"/Login\"\n        type=\"org.apache.struts.actions.IncludeAction\"\n\
    \        name=\"LoginForm\"\n        validate=\"true\"\n        input=\"/login.jsp\"\
    \n        parameter=\"/WEB-INF/classes/com/myco/myapp/MyLoginServlet\" />\n```\n\
    \n请注意，与 `DownloadAction` 一样，你不能指定 `<forward>`，因为遗留 Servlet 负责生成“下一个”页面。*但是*，*你可以指定异常处理器。*\n\
    \n*[www.it-ebooks.info](http://www.it-ebooks.info/)*\n\nDoray_6048C17.fm 第 248\
    \ 页 2006 年 1 月 24 日，星期二，上午 10:14\n\n**248**\n\n第 17 章 ■ 杂项\n\n**国际化**\n\n不幸的是，使用这种技术对遗留应用进行国际化没有简单的方法，因为你几乎无法控制遗留代码的输出。\n\
    \n如果你的遗留代码编写良好，业务逻辑在 Servlet 中，视图代码在 JSP 中，那么可以将遗留 JSP 迁移到使用 Struts 标签，并使用 `IncludeAction`\
    \ 或 `ForwardAction` 在 Struts 和遗留 Servlet 之间进行协调。当然，这假设遗留代码能正确处理非 ASCII 字符。但情况通常*并非*如此，不过如果你的目标语言只使用\
    \ Latin-1，那么你或许足够幸运，它们能够处理。\n\n使用 `ForwardAction` 的 `<action>` 声明类似——你只需将 `org.apache.struts.actions.IncludeAction`\
    \ 替换为 `org.apache.struts.actions.ForwardAction`。\n\n这就引出了一个问题：两者有什么区别？\n\n`IncludeAction`\
    \ 执行程序化的“包含”。这意味着两件事：\n\n*   **被调用的遗留代码*不能修改*发送给客户端的 Cookie 或头信息。** 发送给客户端的头和\
    \ Cookie 由 Struts 决定。在某些场景下，保留头或 Cookie 信息至关重要——例如，当你使用 Struts 指定了请求的作用域时。\n*\
    \   **你可以继承 `IncludeAction` 来向响应对象写入内容。** 当然，你需要在某个时刻调用 `super.execute()` 以确保遗留代码被调用。你可以在任何时候执行此操作，无论是在向响应对象写入内容之前、之后，还是之间。\n\
    \n`ForwardAction` 执行程序化的“转发”，这意味着对发送给客户端的数据的*完全控制权*被移交给遗留代码。Struts *不能*决定头或 Cookie\
    \ 信息，并且你*不能*像使用 `IncludeAction` 那样，通过继承 `ForwardAction` 来向客户端写入数据。`ForwardAction`\
    \ 只是将对响应对象的所有控制权传递给遗留代码。\n\n**简而言之...**\n\n在大多数需要为遗留代码添加前端的情况下，你可能会使用 `IncludeAction`，因为它提供了更大的灵活性。它也很实用，因为即使在遗留代码发送其输出后，你仍然可以向客户端写入数据。\n\
    \n当遗留代码需要写入头或 Cookie 信息才能正常工作时（例如，如果它需要将内容类型设置为 `text/html` 以外的其他类型），`ForwardAction`\
    \ 是唯一的出路。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C17.fm\
    \ 第 249 页 2006 年 1 月 24 日，星期二，上午 10:14\n\n第 17 章 ■ 杂项\n\n**249**\n\n**LookupDispatchAction**\n\
    \n有时你可能希望在一个表单上放置多个提交按钮，每个按钮指示服务器端代码对提交的数据执行不同的操作。\n\n实现此目的的一种常见技术是使用 JavaScript\
    \ 设置表单上隐藏字段的值，从而允许服务器端处理代码判断用户点击了哪个提交按钮。\n\n例如，考虑下面的页面，它包含两个提交按钮（Save 和 Update）、一个隐藏字段以及根据点击的按钮更改隐藏字段值的\
    \ JavaScript：\n\n```jsp\n<%@ page contentType=\"text/html;charset=UTF-8\" %>\n\
    <%@ taglib uri=\"/tags/struts-html\" prefix=\"html\" %>\n<html:html>\n<head>\n\
    <script language=\"JavaScript\">\nfunction changeMode(formName, src){\n    document.forms[formName].elements[\"\
    mode\"].value = src;\n}\n</script>\n</head>\n<body>\n<html:form action=\"MyFormHandler.do\"\
    >\n//... 表单上的其他字段，已省略\n<html:hidden property=\"mode\" value=\"unknown\"/>\n<html:submit\
    \ value=\"Save\"\n             onclick=\"changeMode('MyFormBean','save')\" />\n\
    <html:submit value=\"Update\"\n             onclick=\"changeMode('MyFormBean','update')\"\
    \ />\n</html:form>\n</body>\n</html:html>\n```\n\n这种自制的做法有三个缺点：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nDoray_6048C17.fm 第 250 页 2006 年 1 月 24 日，星期二，上午 10:14\n\n**250**\n\n第 17 章 ■\
    \ 杂项\n\n*   如果用户关闭了 JavaScript，它将无法工作。\n*   每次你有两个或更多提交按钮时，都必须复制服务器端代码，以便根据 `<html:hidden>`\
    \ 字段的值进行分发处理。你可以创建自己的 Action 子类来做到这一点，但正如你很快会看到的，这将是重复造轮子，而且造出来的轮子更差。\n*   另一个令人烦恼的是，你必须在每个具有此功能的\
    \ JSP 上粘贴或“包含”或“导入”该 JavaScript。并且你必须记得为每个提交按钮放入隐藏字段和 `onsubmit` 属性。\n\nStruts\
    \ 提供了一种避免所有这些麻烦的方法。`LookupDispatchAction` 允许你在 HTML 表单上拥有多个操作，*而无需*编写任何 JavaScript。\n\
    \n`LookupDispatchAction` 的魔力在于，当你使用带有 `property` 属性的 `<html:submit>` 时，提交按钮上显示的文本会在表单提交时作为\
    \ URL 中的一个参数传递。提交的参数名称就是 `property` 属性的值。这就是 `LookupDispatchAction` 知道表单上哪个提交按钮被点击的方式。\n\
    \n使用 `LookupDispatchAction` 很容易。我们考虑一个具体的例子：一个包含两个提交按钮的表单：Print 用于打印表单数据，Save\
    \ 用于保存数据。\n\n你要做的第一件事是实现表单（参见清单 17-5）。\n\n**清单 17-5.** *构建表单*\n\n```jsp\n<html:form\
    \ action=\"MyFormHandler.do\">\n... // 表单属性在此处\n<html:submit property=\"action\"\
    >\n    <bean:message key=\"myapp.submit.button.print\" />\n</html:submit>\n<html:submit\
    \ property=\"action\">\n    <bean:message key=\"myapp.submit.button.save\" />\n\
    </html:submit>\n</html:form>\n```\n\n关于清单 17-5，唯一可能令人惊讶的是在 `<html:submit>` 按钮中使用了\
    \ `property` 属性。这表示 Struts 应该将提交按钮的*文本*（在本例中，是 `myapp.submit.button.print` 或 `myapp.submit.button.save`\
    \ 的*值*）作为请求 URL 中的一个参数传递，参数名为 `action`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nDoray_6048C17.fm 第 251 页 2006 年 1 月 24 日，星期二，上午 10:14\n\n第 17 章 ■ 杂项\n\n**251**\n\
    \n例如，如果点击了 Print 按钮，请求 URL 将是 `http://..../MyFormHandler.do?action=Print`，当然，这假设用户当前所选语言环境中\
    \ `myapp.submit.button.print` 的值是 `Print`。\n\n■**注意** 我在清单 17-5 中使用了 `property=\"\
    action\"`，但你可以使用不同的值。\n"
- fmt: '`LookupDispatchAction` uses this information contained in the URL to tell
    which button was clicked. In real life, there may be other parameters passed in
    the URL, so you need to tell `LookupDispatchAction` *which* parameter name to
    use. This is done when you declare the form handler, as shown in Listing 17-6.


    **Listing 17-6.** *Declaring the Form Handler*


    ```

    <action path="/MyFormHandler"

    type="myco.myapp.struts.MyLookupDispatchAction"

    parameter="action"

    ...

    ```


    Listing 17-6 shows how to declare the form handler. The only additional information
    is the `parameter="action"`, which tells your `LookupDispatchAction` subclass
    that it should use the parameter named `action` in the request URL to tell which
    submit button was clicked.


    Lastly, you need to implement the `LookupDispatchAction` subclass, which processes
    the “Print” and “Save” requests. You also have to implement the function `getKeyMethodMap()`,
    which tells `LookupDispatchAction` which function to call when a particular submit
    button is clicked, as Listing 17-7 shows.


    **Listing 17-7.** *Subclassing LookupDispatchAction*


    ```

    import org.apache.struts.actions.LookupDispatchAction;

    ...

    public class MyLookupDispatchAction extends LookupDispatchAction{

    /**

    * Tells LookupDispatchAction which function to

    * use when a given "submit" button is clicked.

    *

    * NOTE: This function is called only once by the

    * base class''s execute(), so there''s no need to

    * save a copy of the returned map.

    **/

    protected Map getKeyMethodMap(){

    Map m = new HashMap();

    m.put("myapp.submit.button.print","print"); m.put("myapp.submit.button.save","save");
    return m;

    }

    public ActionForward print(ActionMapping mapping,

    ActionForm form,

    HttpServletRequest request,

    HttpServletResponse response)

    throws IOException, ServletException {

    //code to print here.

    //remember to return the "next" page.

    }

    public ActionForward save(ActionMapping mapping,

    ActionForm form,

    HttpServletRequest request,

    HttpServletResponse response)

    throws IOException, ServletException {

    //code to save here.

    //remember to return the "next" page.

    }

    }

    ```


    As you can see in Listing 17-7:


    - `getKeyMethodMap()` returns a `Map` instance, which contains the message keys
    used for each submit button’s text. This message key is associated with the name
    of the function in your `LookupDispatchAction` subclass, which needs to be called.
    Note that `getKeyMethodMap()` is called only once, so there’s no need to save
    a copy of the returned `Map` instance. In fact, the base class automatically saves
    the returned instance for you.

    - There are functions, `print()` and `save()`, with the same signature as `execute()`.
    These do the work of printing and saving the submitted form data. Which function
    is called depends on the submit button clicked by the user.

    - There is *no* implementation of `execute()`, since we want to implicitly use
    the base class’s `execute()` in order to call either `print()` or `save()`.


    That’s all there is to using `LookupDispatchAction`, apart from a couple of loose
    strings:


    - If the request URL contains no `action` parameter, then an `Exception` is thrown.
    Rather than leave this to chance, you might find it expedient to trap such errors
    by implementing a function called `unspecified()`, with the same signature as
    `execute()`. You should *not* declare this function in `getKeyMethodMap()`.

    - Some forms use a cancel button. You can implement this using `<html:cancel>`
    on your form. You can handle a canceled form by implementing a function called
    `cancelled()`, with the same signature as `execute()`. You should *not* declare
    this function in `getKeyMethodMap()`.


    Using `unspecified()` and `cancelled()`, Listing 17-7 could be rewritten as shown
    in Listing 17-8.


    **Listing 17-8.** *MyLookupDispatchAction with unspecified() and cancelled()*


    ```

    import org.apache.struts.actions.LookupDispatchAction;

    ...

    public class MyLookupDispatchAction extends LookupDispatchAction{

    //no changes here

    protected Map getKeyMethodMap(){

    Map m = new HashMap();

    m.put("myapp.submit.button.print","print"); m.put("myapp.submit.button.save","save");
    return m;

    }

    public ActionForward print(...)

    throws IOException, ServletException {

    //code to print here.

    }

    public ActionForward save(...)

    throws IOException, ServletException {

    //code to save here.

    }

    public ActionForward unspecified(ActionMapping mapping,

    ActionForm form,

    HttpServletRequest request,

    HttpServletResponse response)

    throws IOException, ServletException {

    mapping.findForward("page-not-found");

    }

    public ActionForward cancelled(ActionMapping mapping,

    ActionForm form,

    HttpServletRequest request,

    HttpServletResponse response)

    throws IOException, ServletException {

    mapping.findForward("main-page");

    }

    }

    ```


    `LookupDispatchAction` is an elegant alternative to using hidden fields for handling
    forms with multiple actions. It’s also a more robust alternative since it does
    not depend on JavaScript being enabled on the client’s machine.


    ## `DispatchAction`


    As the name implies, `DispatchAction` is the base class of `LookupDispatchAction`,
    and it performs method dispatching on a URL parameter.


    The most common usage of `DispatchAction` is to call it from an HTML link, with
    the parameters embedded in the link. As with `LookupDispatchAction`, dispatching
    is done using the parameter name declared in the `<action>` tag using the `parameter`
    attribute:


    ```

    <action path="/MyHandler"

    type="myco.myapp.struts.MyDispatchAction"

    parameter="command"

    ...

    ```


    And again, for each possible value of the `command` parameter, there has to be
    a corresponding function. The difference here with `LookupDispatchAction` is that
    there is *no* `getKeyMethodMap()`. This is because the values of `command` in
    the URL must correspond exactly with functions defined in the `DispatchAction`
    subclass.


    As a concrete example, suppose `command` can take the value `detailed` or `summary`
    (detailed or summarized versions of data for the user to view). The links might
    be:


    ```

    <a href="MyHandler.do?command=detailed&id=35 >View Details</a>

    <a href="MyHandler.do?command=summary&id=35 >View Summary</a>

    ```


    Your subclass of `DispatchAction` must implement the functions `detailed()` and
    `summary()`, with the same signature as `execute()`. You should *not* override
    `execute()`, and you may implement `unspecified()` and `cancelled()` if you wish,
    as Listing 17-9 shows.


    **Listing 17-9.** *MyDispatchAction*


    ```

    import org.apache.struts.actions.DispatchAction;

    ...

    public class MyDispatchAction extends DispatchAction{

    public ActionForward detailed(ActionMapping mapping,

    ActionForm form,

    HttpServletRequest request,

    HttpServletResponse response)

    throws IOException, ServletException {

    //code for detailed view here.

    }

    public ActionForward summary(...)

    throws IOException, ServletException {

    //code for summarized view here.

    }

    public ActionForward unspecified(...)

    throws IOException, ServletException {

    mapping.findForward("page-not-found");

    }

    }

    ```


    ## `MappingDispatchAction`


    This `Action` subclass helps you group related functionality in one `Action`.
    Like `LookupDispatchAction`, `MappingDispatchAction` is also a `DispatchAction`
    subclass. Like the former two classes, you also have to subclass the base class
    (`MappingDispatchAction`) in order to use it.'
