    \ context = response.getSession().getServletContext();\n```\n因此，您只需指定内容类型和待下载文件的相对路径即可。\n\
    \n当然，在大多数情况下，您可能更倾向于使用 HTML 链接，而不是 `FileStreamInfo` 或 `ResourceStreamInfo`。如果出于某种原因无法暴露待下载文件的链接，您会发现这些类非常有用。清单\
    \ 17-3 展示了一个如何继承 `DownloadAction` 并使用匿名类实现 `StreamInfo` 的示例。\n\n**清单 17-3.** *扩展\
    \ DownloadAction*\n\n```java\npackage com.myco.myapp.struts;\n\nimport java.io.*;\n\
    import javax.servlet.http.*;\nimport org.apache.struts.action.*;\nimport org.apache.struts.actions.DownloadAction;\n\
    \npublic class MyDownloadAction extends DownloadAction{\n    protected StreamInfo\
    \ getStreamInfo(ActionMapping mapping,\n                                     \
    \  ActionForm form,\n                                       HttpServletRequest\
    \ request,\n                                       HttpServletResponse response)\n\
    \        throws Exception{\n        /* 以某种方式获取 InputStream，作为处理请求的结果 */\n    \
    \    InputStream input = ...;\n        /* 类似地获取内容类型 */\n        String contentType\
    \ = ...;\n        return new StreamInfo{\n            public InputStream getInputStream(){\
    \ return input; }\n            public String getContentType(){ return contentType;\
    \ }\n        }\n    }\n}\n```\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nDoray_6048C17.fm 第 245 页 2006 年 1 月 24 日星期二 上午 10:14\n\n第 17 章 ■ 杂项\n\n**245**\n\
    \n您还需要创建一个表单处理器：\n\n```xml\n<action path=\"/MyFileDownloadHandler\"\n        form=\"\
    MyDataForm\"\n        type=\"com.myco.myapp.struts.MyDownloadAction\" />\n```\n\
    表单 Bean（`MyDataForm`）仅在您需要收集用户输入以创建可下载内容时才必要。您不需要 `<forward>`，因为下载的内容就是隐式的“下一个”页面。\n"
- fmt: "用户看到的具体内容取决于浏览器。例如，假设你的下载处理器提供的是PDF文件。如果用户点击调用该处理器的链接，浏览器可能会在安装了Adobe浏览器插件的情况下，在浏览器内显示PDF文件。如果没有安装插件，用户可能会导航到一个空白页面并看到下载对话框。具体行为取决于所使用的浏览器。\n\
    \n如果用户选择“另存为”而不是打开文件，则不会导航到“下一个”页面。用户只会看到下载对话框。因此，你应该用正在下载的数据类型来标记此类链接，以便用户做出适当的选择（是点击链接还是“另存为”）。\n\
    \n## `LocaleAction`\n\n在第12章末尾，我提到还有另一种切换区域设置的方法。该方法是使用Struts类`LocaleAction`。与我在第12章中概述的服务器端解决方案不同，使用`LocaleAction`无需编写任何Java代码。\n\
    \n以下是需要执行的操作：\n\n- 实现动态表单，每个你想允许用户切换到的区域设置对应一个表单。\n  这些表单*必须*包含一个表示区域设置语言代码的`language`属性（参见第12章）。你必须将此属性的初始值设置为该区域设置的语言代码（例如，日语为`jp`，英语为`en`）。你*可以*选择性地为区域设置的国家代码指定一个`country`属性（参见第12章）。同样，`country`属性的初始值必须设置为国家代码（例如，`US`）。\n\
    \n- 为每个动态表单放置一个表单处理器（`<action>`标签）。单个`<forward>`标签应命名为`success`，并且必须指向你想以新语言显示的页面。\n\
    \n例如，假设我们允许用户在英语和日语之间切换。`struts-config.xml`文件的声明如清单17-4所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nDoray_6048C17.fm Page 246 Tuesday, January 24, 2006 10:14 AM\n\n**246**\n\n\
    C H A P T E R 1 7 ■ P O T P O U R R I\n\n**清单17-4.** 使用`LocaleAction`\n\n```xml\n\
    <form-beans>\n  <form-bean name=\"English\"\n             type=\"org.apache.struts.action.DynaActionForm\"\
    >\n    <form-property name=\"language\" type=\"String\" initial=\"en\" />\n  \
    \  <form-property name=\"country\" type=\"String\" initial=\"US\" />\n  </form-bean>\n\
    \  <form-bean name=\"Japanese\"\n             type=\"org.apache.struts.action.DynaActionForm\"\
    >\n    <form-property name=\"language\" type=\"String\" initial=\"jp\" />\n  </form-bean>\n\
    \  ... //other form beans\n</form-beans>\n\n<action-mappings>\n  <action path=\"\
    /ToEnglish\"\n          name=\"English\"\n          type=\"org.apache.struts.actions.LocaleAction\"\
    >\n    <forward name=\"success\" path=\"/mystartpage.jsp\" />\n  </action>\n \
    \ <action path=\"/ToJapanese\"\n          name=\"Japanese\"\n          type=\"\
    org.apache.struts.actions.LocaleAction\">\n    <forward name=\"success\" path=\"\
    /mystartpage.jsp\" />\n  </action>\n  ... //other form handlers\n</action-mappings>\n\
    ```\n\n不言而喻，`mystartpage.jsp`应该使用Struts进行本地化。另一种方法是使用普通的（但已本地化的）HTML或JSP页面作为`<forward>`的目标。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nDoray_6048C17.fm Page 247\
    \ Tuesday, January 24, 2006 10:14 AM\n\nC H A P T E R 1 7 ■ P O T P O U R R I\n\
    \n**247**\n\n要允许用户切换区域设置，你需要在相关的表单处理器中放置`<html:link>`（参见附录C）：\n\n```jsp\n<html:link\
    \ action=\"/ToJapanese\">\n  <bean:message key=\"prompt.to.japanese\" />\n</html:link>\n\
    <html:link action=\"/ToEnglish\" >\n  <bean:message key=\"prompt.to.english\"\
    \ />\n</html:link>\n```\n\n`LocaleAction`使用与第12章（在“使用链接切换区域设置”小节中）描述的相同技术，为用户会话切换区域设置。\n\
    \n## `IncludeAction`和`ForwardAction`\n\n使用Struts的一个令人信服的理由是，它提供了一个用于验证用户输入的框架。如果你有以Servlet或JSP形式存在的遗留代码（业务逻辑），这无疑是个好消息：可以在遗留代码处理之前，包含一个Struts前端来彻底验证用户输入。"
  raw: 'Exactly what the user sees onscreen would depend on the browser. For example,
    suppose your download handler delivers a PDF file. If the user clicks the link
    invoking the handler, the browser might display the PDF file within the browser
    *if* there’s an Adobe browser plug-in installed. If there isn’t a plug-in installed,
    he might navigate to a blank page and get a download dialog box. The exact behavior
    would depend on the browser involved.


    If the user clicks Save As instead of opening the file, then no navigation to
    a “next” page is performed. The user only gets a download dialog box. For this
    reason, you should mark such links with the type of data that’s being downloaded
    so that the user can make the appropriate choice (whether to click the link or
    Save As).


    **LocaleAction**


    Toward the end of Chapter 12, I mentioned that there’s another way to switch locales.
    The way to do it is to use the Struts class, LocaleAction. Unlike the server-side
    solution I outlined in Chapter 12, you don’t have to write any Java code in order
    to use LocaleAction.


    Here’s what you need to do:


    • Implement dynamic forms, one for each locale you want to allow users to switch
    to.


    These forms *must* contain a language property representing the locale’s language
    code (see Chapter 12). You must set the initial value of this property to the
    locale’s language code (e.g., jp for Japanese, en for English). You may *optionally*
    specify a country attribute for the locale’s country code (see Chapter 12). Again,
    the initial value of the country property must be set to the country code (e.g.,
    US).


    • Put in a form handler (<action> tag) for each of these dynamic forms. The single


    <forward> tag should be named success and must point to the page you want displayed
    in the new language.


    As an example, suppose we want to allow users to switch between English or Japanese.


    The struts-config.xml file declarations are shown in Listing 17-4.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C17.fm Page 246 Tuesday, January 24, 2006 10:14 AM


    **246**


    C H A P T E R 1 7 ■ P O T P O U R R I


    **Listing 17-4.** *Using LocaleAction*


    <form-beans>


    <form-bean name="English"


    type="org.apache.struts.action.DynaActionForm">


    <form-property name="language" type="String" initial="en" />


    <form-property name="country" type="String" initial="US" />


    </form-bean>


    <form-bean name="Japanese"


    type="org.apache.struts.action.DynaActionForm">


    <form-property name="language" type="String" initial="jp" />


    </form-bean>


    ... //other form beans


    </form-beans>


    <action-mappings>


    <action path="/ToEnglish"


    name="English"


    type="org.apache.struts.actions.LocaleAction">


    <forward name="success" path="/mystartpage.jsp" />


    </action>


    <action path="/ToJapanese"


    name="Japanese"


    type="org.apache.struts.actions.LocaleAction">


    <forward name="success" path="/mystartpage.jsp" />


    </action>


    ... //other form handlers


    </action-mappings>


    It goes without saying that mystartpage.jsp should be localized using Struts.
    The alternative is to use ordinary (but localized) HTML or JSP pages for the <forward>s.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C17.fm Page 247 Tuesday, January 24, 2006 10:14 AM


    C H A P T E R 1 7 ■ P O T P O U R R I


    **247**


    To allow users to switch locales, you’d have to put in <html:link>s (see Appendix
    C) to the relevant form handler:


    <html:link action="/ToJapanese">


    <bean:message key="prompt.to.japanese" />


    </html:link>


    <html:link action="/ToEnglish" >


    <bean:message key="prompt.to.english" />


    </html:link>


    LocaleAction makes the switch in locales for the user’s session, using the same
    technique described in Chapter 12 (in the subsection “Switching Locales with a
    Link”).


    **IncludeAction and ForwardAction**


    One compelling reason to use Struts is that it provides a framework for validating
    user input. This is good news if you have legacy code (business logic) in the
    form of servlets or JSPs: it’s possible to include a Struts front-end to thoroughly
    validate user input before it reaches the legacy code.'
