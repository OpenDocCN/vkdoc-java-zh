  raw: 'Ultimately, which technology you choose (JSF, Shale, or Struts) depends on
    your requirements. Having said that, if you’re comfortable with the Apache offerings,
    then you’re likely to commit to Shale over pure JSF. Shale brings so much to the
    table that using it over pure JSF is a no-brainer.


    The Achilles’ heel of Shale is that it’s in a state of flux, like any new piece
    of software.


    At the time of this writing many of the services are marked as “Developing,” meaning
    they could change at any time. I certainly expect Shale to change substantially
    by the time you read this book. So, if you’re planning to use Shale, you should
    carefully research the features you need to ensure that they are fairly stable.
    The Struts mailing list (Shale shares this with classic Struts, so you should
    mark your emails with [Shale]) and the Shale documentation are good resources.


    The choice between Struts and Shale is more difficult to make. If you have an
    existing Struts webapp, it’s advisable to continue using Struts, because the cost
    of porting your existing JSP pages to using JSF tags is usually prohibitive.


    For new projects, it’s difficult to give a clear answer. The Struts developers
    themselves and those involved in JSF and Shale appear to unconditionally advocate
    moving to Shale or JSF. I would be more circumspect, because as you’ve seen, JSF
    (and therefore Shale) is more complex than Struts. It isn’t rocket science, but
    there’s definitely a sharp learning curve involved.


    However, if you find you’ve been using strange tricks to force Struts into getting
    your webapp to behave like a desktop application, then Shale is definitely something
    you’d want to explore along with other web application frameworks like Spring.


    I’ve avoided giving you a feature-by-feature comparison of Struts, JSF, and Shale.


    Although they are all, broadly speaking, web application frameworks, their “sweetspots”


    (the scenarios in which they shine) are different.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


