    **24**


    C H A P T E R 4 ■ C U S T O M T A G S


    <%@ taglib uri="/tags/temperature" prefix="temp" %> We’ll deconstruct this declaration
    in the following section. For now, simply note that the prefix is defined in the
    JSP.


    ■**Note** A tag’s prefix is used to prevent tag name clashes. For example, if
    you had to use two different tags (from different tag libraries) with the same
    name, you could give them different prefixes, to distinguish between them. So,
    prefixes are flexible and you define them on an individual JSP. Tag names, on
    the other hand, can’t be changed and are defined in the tag’s TLD file.


    Tags may also have attributes, for example:


    <msg:echo message="Hi" />


    Lastly, several tags may be collected together, into a TLD **file. That’s why
    it’s called a Tag **Library** Descriptor file. We next take a look at the lifecycle
    of a typical tag.**


    ****How Custom Tags Are Processed**


    Suppose we have a JSP with a custom tag on it. How does it get converted to text
    we can see on screen? Well, when the servlet container parses the JSP for the
    first time, it encounters the custom tag, for example:


    <bean:write property="companyName"/>


    The servlet container expects, and looks for, a corresponding **taglib declaration**
    on the JSP page. For example:


    <%@ taglib uri="/tags/struts-bean" prefix="bean" %> There may be several such
    taglib declarations on the JSP page. The servlet container knows which to use
    by matching the prefix on the tag with the prefix attribute in the taglib declaration,
    as shown in Listing 4-1.


    **Listing 4-1.** *A Sample JSP with a Taglib Declaration and a Custom Tag*


    <%@ taglib uri="/tags/struts-bean" prefix="bean" %>


    <bean:write property="companyName"/>


    The taglib declaration simply associates a prefix **with a URI **(U**niform **R**esource
    **I**dentifier**)**, which is a *logical* path to the tag’s TLD file. The uri
    **attribute is a logical and not a real path because it points to a specific entry
    in web.xml, the standard servlet configuration file, and not some location on
    your hard drive.****


    ****[www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C04.fm Page 25 Monday, December 12, 2005 3:47 PM


    C H A P T E R 4 ■ C U S T O M T A G S


    **25**


    The **web.xml **file must contain the actual location of the tag library indicated
    by the uri attribute. In this case, the relevant information in web.xml is given
    in a <taglib> tag (see Listing 4-2).****


    ******Listing 4-2.** *A Taglib Section in web.xml*


    <taglib>


    <taglib-uri>/tags/struts-bean</taglib-uri>


    <taglib-location>/WEB-INF/struts-bean.tld</taglib-location>


    </taglib>


    The main points to notice from Listing 4-2 are


    • The taglib-uri **body must match the uri attribute of the taglib declaration
    given in the JSP file.**


    **• The taglib-location body must contain the relative path to the TLD **file.
    In the previous example, the TLD file is struts-bean.tld.**


    **The physical location of the TLD file is always relative to the root folder
    of the webapp’s WAR file (or relative to your web application’s subdirectory in
    the servlet container’s webapps directory). So, in Listing 4-2, we see that the
    TLD file resides in the WEB-INF folder and is called struts-bean.tld.


    Finally, the TLD file is just an XML document containing metadata describing the
    tags in the library. This metadata is


    • A tag’s name (which in Listing 4-1 would be write).


    • A tag’s optional and required attributes and (property from Listing 4-1).


    • The Java handler class that processes the tag’s attributes and body to produce
    the output. These Java classes are usually bundled in a JAR file that you place
    in your webapp’s WEB-INF\lib directory.


    We’ll go through the nitty-gritty details of the TLD file in the lab session.
    Figure 4-1


    summarizes the processing flow of a custom tag.


    In the final step, the servlet container calls certain functions on the Java tag
    handler, which is responsible for producing the custom tag’s output.


    As you can see, the processing flow of even the simplest custom tag is a little
    involved.'
