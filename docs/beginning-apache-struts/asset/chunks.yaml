    **101**


    • The following snippet shows how you’d declare a controller section:


    <controller maxFileSize="1.618M" contentType="text/svg" /> This sets the maximum
    uploadable file size to a golden 1.618MB, and the default content type to SVG.


    **Message Resources**


    The message resources section declares the location of your properties file that
    stores the key/value pairs of your application. Recall that the contents of this
    properties file was implicitly used to create error messages:


    errors.add("userid",new ActionMessage("reg.error.userid.exists")); and prompts
    on the JSP page:


    <bean:message key="registration.jsp.prompt.userid"/> Unlike the previous two sections,
    this one does *not* have an enclosing tag.


    <message-resources parameter="Application"/> The main attribute of the <message-resources>
    tag is the parameter attribute, which gives the location of the properties file
    for your application relative to the \WEB-INF\classes\ directory of your webapp.
    So, in the previous declaration, the message resource file is


    \WEB-INF\classes\Application.properties


    Note that in the declaration, the .properties extension is implied. If you had
    placed the properties file further up the package, say, in


    \WEB-INF\classes\net\thinksquared\registration\struts\resources\ the parameter
    attribute value would be


    net.thinksquared.registration.struts.resources.Application


    **Declaring Plug-ins**


    Plug-ins are custom extensions to Struts. An example is the Tiles framework, which
    was developed independently of Struts. In earlier (pre-1.2) versions of Struts,
    Tiles had to be downloaded separately. Although it is now part of the 1.2 distribution,
    its earlier independent existence is still apparent because you have to declare
    a plug-in section for Tiles in order for you to use it in Struts.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048.book Page 102 Tuesday, January 10, 2006 5:10 PM


    **102**


    C H A P T E R 9 ■ C O N F I G U R I N G S T R U T S


    The plug-in section tells Struts what plug-ins to initialize and what data they
    require (usually paths to various configuration files required by the plug-in).
    Listing 9-6 shows a typical plug-in declaration.


    **Listing 9-6.** *A Possible Plug-in Declaration for Tiles*


    <plug-in className="org.apache.struts.tiles.TilesPlugin" >


    <set-property property="definitions-config"


    value="/WEB-INF/tiles-defs.xml"/>


    </plug-in>


    Each <plug-in> tag declares a single plug-in. There is no limit to how many of
    these you might have in your struts-config.xml file. The className attribute is
    required, and it points to the plug-in class that Struts calls. This class is
    unique to each plug-in.


    Each <plug-in> tag may contain zero or more <set-property> tags to set the various
    properties needed by the plug-in. There are only two attributes here:


    • property: Defines the property being set


    • value: Specifies the corresponding value


    Needless to say, each plug-in will have to be configured differently, and you’ll
    have to get the details from the plug-in’s manual.


