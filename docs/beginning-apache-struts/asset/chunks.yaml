    Doray_6048C05.fm Page 46 Monday, January 23, 2006 11:46 AM


    **46**


    C H A P T E R 5 ■ T H E M V C D E S I G N P A T T E R N


    **Which Comes First?**


    When you develop your webapp with the MVC design pattern, which portion (Model/


    View/Controller) would you specify and design first? Why?


    Close the book and give yourself a few minutes to answer this before reading the
    following discussion.


    There’s no “right” answer to this one, but most people start with either View
    code or Model code. Rarely would you start with a design for the Controller since
    it depends on View and Model components.


    My personal preference is to specify and design Model code first. This means defining
    at an early stage *what* data to store and *how* **to expose data with data access
    methods (like the exists() method in Listing 5-1) to other code. Here are my reasons
    for holding this position:**


    **• Without a clear specification of *what* data to store, you can’t design the
    rest of the application.


    • Without a specification of *how* to access data, a clear separation between
    Model and Controller is difficult to achieve. For example, if you’re using a relational
    database, you might end up with SQL code in the Controller. This violates the
    MVC principle of well-defined interfaces.


    Many people (especially new developers) prefer to design View code first, possibly
    because this helps them understand the application’s inputs and control flow.
    In this approach, View comes first, then Controller, and Model last. Though it’s
    perfectly valid, I believe this approach is prone to certain pitfalls:


    • **Redundant information** being stored in the database. Like the proverbial
    three blind men describing the elephant, using View code to drive Model design
    is bad because you lack a global view of the application’s data requirements.
    This is especially so in complex applications, where you could store the same
    information twice, in two different tables.


    • **Poorly organized database tables**, because the Model code and data organization
    is designed to conform to View requirements, which may not reflect the natural
    relationships between Model elements.


    • **Less future-proof code,** because a change in the View code may necessitate
    a revamp of Model code and the database design. Essentially, Model code is too
    strongly coupled to View code.


    All these stem from the fact that those who take the “View first” approach use
    View code or mockups to indirectly educate them about Model requirements.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C05.fm Page 47 Monday, January 23, 2006 11:46 AM


    C H A P T E R 5 ■ T H E M V C D E S I G N P A T T E R N


    **47**


    Having said that, there are many situations where a “Model first” approach may
    *seem* impractical. For example, in many corporate IT departments, developers
    don’t have a full understanding of the problem domain. Instead, they have to rely
    on and frequently communicate with non-IT personnel like managers or admin staff
    (“domain experts”) in order to understand the system’s requirements.


    In this scenario, the application is naturally View driven because mockups are
    used as a communication tool between developers and domain experts. My advice
    to those in such a situation is to *incrementally* build a picture of the Model
    code and data immediately after each discussion with domain experts. Don’t leave
    Model design to the last.


    Whichever way you choose, Model-first or View-first, I believe it’s important
    to understand why you do things the way you do, simply because this helps you
    become a better programmer.


    In the following section, I’ll describe how Struts fits into the MVC design pattern.


    **Struts and MVC**


    In Struts, **Model** code consists of plain old Java objects (POJOs).


    In other words, Struts places no restrictions on how you code the Model portion
    of your webapp. You should encapsulate data access/persistence into Model classes,
    but Struts does not force you to do this. Remember, Struts is here to help you
    achieve MVC nirvana as easily as possible. Apparently, you don’t really need help
    to separate Model from View and Controller.


    **View** code consists of JSPs and a set of custom tags supplied by Struts. These
    custom tags enable you to separate View from Controller, because they address
    all the issues I raised earlier when I tried to apply MVC to the Registration
    webapp.


    With Struts, **Controller** code falls into three broad categories:


    • **Simple validations** are performed by your subclasses of the Struts base class
    called ActionForm. Checks for password length or email address format are examples
    of this. Later in this book, you’ll see how Struts greatly simplifies validation
    with the Validator framework.


    • **Complex validations and business logic** are done in your subclasses of the
    Struts base class called Action. The check for the duplicate user ID for the Registration
    webapp is an example of complex validation. An example of business logic is calculating
    the total amount due after a purchase in a shopping cart webapp.


    • **Flow control** is also decided by your Action subclasses, restricted to paths
    declared in the Struts configuration file called struts-config.xml.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C05.fm Page 48 Monday, January 23, 2006 11:46 AM


    **48**


    C H A P T E R 5 ■ T H E M V C D E S I G N P A T T E R N


    You’ll learn more about ActionForm, Action, and struts-config.xml as this book
    progresses. At this stage, you should simply understand how MVC maps into Struts.


    Figure 5-6 depicts this mapping.


    **Figure 5-6.** *How MVC maps into Struts*


    **Lifecycle of a Struts Request**


    The three categories of processing (simple/complex validation, business logic,
    and flow control) come into play when an incoming HTTP request is generated by
    a user submitting form data.


    With servlet technology all such processing is done by servlets. As I mentioned
    in Chapter 2, Servlets are just Java objects, *usually* your subclasses of HttpServlet.


    Even JSP pages are converted at runtime into servlet classes—actual .java source
    files.


    These autogenerated Java source files are later compiled.


    Since Struts is built on servlet technology, it is no exception to this rule.
    All submissions of form data to a Struts application are intercepted by a *single*
    “master” servlet, an instance of ActionServlet, which is a part of Struts.


    This master servlet is responsible for delegating the actual work of your application
    to your subclasses of ActionForm and Action (see Figure 5-6).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C05.fm Page 49 Monday, January 23, 2006 11:46 AM


    C H A P T E R 5 ■ T H E M V C D E S I G N P A T T E R N


    **49**


    **USUALLY?**


    Servlet technology is quite generic, meaning it is not at all tied to processing
    HTTP requests, although this is by far the most common use.'
