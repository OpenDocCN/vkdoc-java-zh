    第 20 章 ■ JAVASERVER FACES 与 STRUTS SHALE


    • **添加 Struts 此前不具备的功能**：例如，Struts 无法处理跨多个页面请求的用户交互。Shale 通过一项名为“对话”（借鉴自 Spring
    的“webflow”）的功能实现了这一点。


    • **与其他 Web 应用框架集成**：主要是 Spring 框架。


    此外，还提供对 Ajax 技术的部分支持。


    请注意！Shale *并非*“经典”Struts 的自然演进——你不能简单地将 Struts Web 应用“升级”为 Shale。


    那么为什么还要保留“Struts”前缀呢？原因可能是 Struts 中最有用的部分已被成功重构为 Apache Commons 项目（Validator 框架和动态表单），或者在很大程度上已独立于
    Struts（如 Tiles）。Shale 重用了这些组件，以提供 JSF 规范中不具备的重要便利功能。从这个意义上说，经典 Struts 是 Shale
    的一部分。另请注意我们在侧边栏“Struts Ti 与 Struts OverDrive”中讨论过的另一种更尖锐的观点。


    **学习 Struts 是浪费时间吗？**


    上述介绍可能会让你思考：学习 Struts 是否在浪费时间？


    绝非如此！


    “经典”Struts 是迄今为止最流行的 Web 应用框架，并且很可能在相当长一段时间内与 JSF 和 Shale 共存。正如你将在本章后面看到的，JSF
    在验证和动态表单等多个领域不如 Struts 完善。这是有意为之，因为 JSF 专注于视图层，而将其他领域的不足留给其他技术去解决。这实际上正是 Shale
    存在的理由*。遗憾的是，在撰写本文时，Shale 仅处于 1.0 版本，远未达到经典 Struts 的成熟度。*


    此外，经典 Struts 仍在积极开发中，因此很可能会有新功能和改进，进一步推动那些不需要 JSF 或 Shale 高级功能的用户采用它。


    最后，扎实掌握 Struts 知识能让你在学习新技术时占据优势，并为你评估这些技术是否满足自身需求提供更好的视角。


    **JavaServer Faces (JSF)**


    正如你现在可能已经了解的，JSF 专注于视图层。从 Struts 开发者的角度来看，这种专注意味着 JSF 与 Struts 之间存在两个重要差异。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048C20.fm 第 311 页 2006 年 1 月 16 日星期一 下午 3:21


    第 20 章 ■ JAVASERVER FACES 与 STRUTS SHALE


    **311**


    • **更复杂的请求处理生命周期**：由于 JSF 使用服务器端 UI 组件，它处理传入 HTTP 请求的方式与 Struts 不同。JSF 的请求处理生命周期分为多个*阶段*。这与
    Struts 不同，Struts 只有两个阶段：一个用于验证 ActionForm，另一个用于调用 Action 的 execute()函数。此外，JSF
    允许你自己的类在每个阶段结束时监听*事件*（更多内容将在后续小节中介绍）。这是对 Struts 的巨大改进，也是 JSF 如此可扩展的原因。


    • **部分配置信息从配置文件移至 JSP**：


    **JSF 没有验证框架、动态表单或 Tiles 的概念，因此不存在这些组件的配置文件。相反，验证（以及你将看到的许多其他内容）是在构成 Web 应用的 JSP
    中指定的。与 Struts 一样，JSF 确实有一个名为 faces-config.xml 的配置文件，因此并非所有配置信息都移到了 JSP 中。


    注意这两点非常重要，有助于减轻你（作为 Struts 开发者）在学习 JSF 时可能遇到的认知失调。


    **服务器端 UI 组件**


    当页面提交到 Struts Web 应用时，页面上的表单数据会存储在 ActionForm 子类中。通常，我们会将 ActionForm 视为目标数据在模型层的临时存储区域。

