    现在，与 Find 磁贴相关的 Controller 类是 FindAction，它是 `net.thinksquarded.lilldep.struts.TilesLookupDispatchAction`
    的子类。这个基类的使用方式与 LookupDispatchAction（参见第 17 章）大致相同，但它是专门为 Tiles 设计的。


    **1.** 完成 FindAction 中 `find()` 方法的实现，使其从给定的 ActionForm 中提取 Contact 实例。将 Contact
    的*克隆*版本保存到当前会话中，键为 `JSPConstants.FIND_QUERY`。使用 `Contact.klone()` 方法来克隆 Contact。


    **2.** 使用 `ContactPeer.find()` 方法，利用此 Contact 创建一个 Scroller 对象。将此 Scroller 对象放置到当前请求中，键为
    `JspConstants.FIND_RESULTS`。


    **3.** `find()` 应返回 `null`，因为导航由表单的主处理器决定。


    **4.** 完成 FindAction 中 `unknown()` 方法的实现，使其在会话中查找键为 `JspConstants.FIND_QUERY`
    的 Contact。如果该 Contact 存在，则使用它通过 `ContactPeer.find()` 获取一个 Scroller。将 Scroller
    保存到当前请求中。`unknown()` 应返回 `null`。


    **5.** 实现 `getKeyMethodMap()` 函数，其要求与 `LookupDispatchAction.getKeyMethodMap()`
    相同。


    **6.** 使用 `compile.bat` 检查你的代码是否能编译通过。


