    **nest**


    This tag allows the nesting to be moved up by one level. All replacement tags
    within the current <nested:nest> tag will take as their base object the value
    indicated by the property attribute of this tag.


    Usage Restrictions


    None, but you obviously need to specify the property attribute in order to accomplish
    anything.


    Attributes


    There is just one attribute: property, which indicates the property on the current
    implicit base object from which all child Nested tags will use their base object.


    Examples


    Suppose you wanted to access a nested property using, say, <bean:write>, in an
    <html:form>.


    <html:form action=...


    <bean:write property="contact.name"/>


    <bean:write property="contact.email"/>


    <bean:write property="contact.company"/>


    </html:form>


    You can use <nested:nest> and <nested:write> tags instead:


    <html:form action=...


    <nested:nest property="contact">


    <nested:write property="name"/>


    <nested:write property="email"/>


    <nested:write property="company"/>


    </nested:nest>


    </html:form>


    In both snippets, the implicit base object is determined by the enclosing <html:form>.


    The base object is just the form bean instance associated with the form. If you
    wanted to change the base object, you’d have to use <nested:root>.


    Equivalents


    None.


