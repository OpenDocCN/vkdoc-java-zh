    **353**


    **JNDI Integration**


    JNDI (Java Naming and Directory Interface) is a Java Enterprise Edition feature
    that obtains handles to resources that are declared in either web.xml or configuration
    settings of an application server.


    A thorough discussion of JNDI is outside the scope of this book. However, the
    Shale website gives a couple of simple examples, variations of which we’ll describe
    here.


    JNDI addresses the concept of *environment entries*, which are simply variable
    declarations in web.xml. For example, suppose your webapp had to display your
    company’s logo on each page. You could use a message resource to store the URL,
    but another way is to use an environment entry (I’m not recommending this method,
    but just using it as an illustration).


    First, you declare the environment entry in web.xml:


    <env-entry>


    <description>URL to company logo GIF</description>


    <env-entry-name>logo</env-entry-name>'
