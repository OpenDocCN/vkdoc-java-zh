    **3.** Put in a special Struts Controller. **In your struts-config.xml file, put
    in the following**


    **<controller> element (just *before* the <message-resource> tag):


    <controller>


    <set-property property="processorClass"


    value="org.apache.struts.faces.application.FacesRequestProcessor"/>


    </controller>


    ■**Note** The registration webapp doesn’t use Tiles, so we’ve used the controller
    shown in the last step.


    However, if your application *does* use Tiles, use FacesTilesRequestProcessor
    instead.


    **Step 4: Migrate Your Struts JSP Pages**


    The Struts-Faces TLD file contains tags that you can use in place of the Struts
    HTML and Bean tag libraries. You are expected to use JSTL instead of the Struts
    Logic tag library and nested properties syntax instead of the Nested tag library.
    The preceding comments apply to the Struts-EL tags as well. You should continue
    to use the Tiles tag library as it is, though.


    If you have an existing Struts application, you can migrate to JSF *incrementally*—you
    don’t have to do it all in one go. If you have to migrate an existing app or you’re
    creating a new one, there are a few things you need to do for each page.


    First, declare the JSTL, JSF, and Struts-Faces taglibs in your JSPs. These must
    be in the following order:


    <%@ taglib prefix="c" uri="http://java.sun.com/jstl/core" %>


    <%@ taglib prefix="f" uri="http://java.sun.com/jsf/core" %>


    <%@ taglib prefix="h" uri="http://java.sun.com/jsf/html" %>


    <%@ taglib prefix="s" uri="http://struts.apache.org/tags-faces" %> Obviously,
    you should remove declarations to HTML, Bean, Nested, or Logic tag libraries on
    the page.


    Next, put in the replacement tags. Table 20-1 shows the tags in the Struts-Faces
    taglib, which are equivalents of certain tags in the HTML or Bean taglib.


    You could use <s:loadMessages> instead of <f:loadMessages>. The difference between
    the two is that <s:loadMessages> will make your Struts-declared Application.properties
    file available to JSF tags.


    These replacement tags have attributes similar to their Struts counterparts, but
    in some cases, they are quite rudimentary. A prime example is <s:message>, which
    does not allow replacement arguments, as <bean:message> does. In this instance,
    you should use the much more powerful <h:outputFormat> tag, which does allow replacement
    arguments.


