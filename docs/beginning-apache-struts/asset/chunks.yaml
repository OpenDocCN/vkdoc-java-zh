    3. **As usual, declare the required validations** in `validation.xml`. If not\
    \ all validations can be moved to the Validator framework, use the two techniques\
    \ described earlier to accommodate these special cases.\n\nIt’s wisest to do migrate\
    \ incrementally, and use a unit-testing framework (see “Useful Links”) to test\
    \ the changes.\n\n## Localizing Validations"
