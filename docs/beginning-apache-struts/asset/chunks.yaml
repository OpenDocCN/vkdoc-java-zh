    <html:form action="MyHandler.do">


    <bean:message key="myapp.prompt.name"/></td>


    <html:text property="name" size="60" />


    <html:errors property="name"/>


    <html:submit>


    <bean:message key="myapp.prompt.submit"/>


    </html:submit>


    </html:form>


    This is a reflection of the fact that Struts display tags closely mirror ordinary
    HTML tags.


    The hierarchy for JSF, on the other hand, is much richer and you typically have
    more levels, as shown in Listing 20-1.


    **Listing 20-1.** *A Snippet of JSF Tags Showing a Hierarchical Organization*


    <f:view>


    <h:panelGroup>


    <h:messages style="color:red" globalOnly="true"/>


    <h:outputText value="#{reg_messages[''title_reg'']}" />


    <h:form binding="#{user.container}">


    <h:outputText value="#{reg_messages[''user_id'']}"/>


    <h:inputText id="userId"


    value="#{user.userId}" required="true">


    <x:validateRegExpr pattern=''^[A-Za-z0-9]{5,10}$'' />


    </h:inputText>


    <h:message for="userId" />


    ...


    This hierarchical organization (the hierarchy is defined through nesting) allows
    you to finely control how the page is rendered for display to the user. You’ll
    see why later in this chapter.


    For now, the important thing to note is that the corresponding server-side objects
    created by the page in Listing 20-1 are also nested in a tree-like fashion, as
    shown in Figure 20-1.


    The first time a JSF page is requested, the tree of objects—let’s call it the
    “UI tree”—is created on the server. JSF uses the UI tree to create the HTML for
    the requested page.


