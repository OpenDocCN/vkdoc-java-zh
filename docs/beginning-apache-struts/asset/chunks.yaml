    <jsp:forward page="registration.faces" />


    注意没有开头的斜杠。请为 Registration Web 应用进行相应的更改。


    **步骤 7：必要时修改 Actions**


    在本书中，我们一直要求你在 Action 子类中报告复杂的验证错误时使用 `ActionMessages`——这是正确的做法，因为旧的 `ActionErrors`
    类已被弃用。


    不幸的是，Struts-Faces 集成库（1.0 版本）仅能与此已弃用的 `ActionErrors` 类一起工作！如果你使用规范的 `ActionMessages`
    类，那么在复杂验证失败后重新显示页面时，会抛出 `ClassCastException`。


    我相信这将在该库的下一个版本中得到修复，但在此实验中，你只能将 `RegistrationAction` 中的 `ActionMessages` 实例改为
    `ActionErrors`。


