- fmt: 'LILLDEP (Little Data Entry Program) 是一个简单的数据录入程序，用于存储和管理联系人数据库。这是许多中小企业（SMEs）中常见的一种
    Web 应用类型。图 5-5 展示了基本的 LILLDEP 主页面。


    **图 5-5.** *LILLDEP 主页面*


    查看以下三个需求，并尝试识别可能相关的模型-视图-控制器（Model-View-Controller）部分。想象一下每个部分的可能实现，就像我在上一节中所做的那样，并确定在哪些方面可能需要帮助来强制执行严格的
    MVC 代码分离。


    - **需求 1**：一个用于收集联系人信息的页面

    - **需求 2**：提交后检查联系人详细信息（邮政编码、电子邮件或必填字段）并显示错误的代码

    - **需求 3**：用于在数据库中存储和检索数据的代码


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ---


    **哪个优先？**


    当你使用 MVC 设计模式开发 Web 应用时，你会首先指定和设计哪个部分（模型/视图/控制器）？为什么？


    在阅读下面的讨论之前，合上书，给自己几分钟时间来回答这个问题。


    这个问题没有“正确”答案，但大多数人会从视图代码或模型代码开始。很少有人会从控制器的设计开始，因为它依赖于视图和模型组件。


    我个人偏好首先指定和设计模型代码。这意味着在早期阶段定义*存储什么数据*以及*如何通过数据访问方法（如清单 5-1 中的 `exists()` 方法）向其他代码暴露数据*。我持此立场的原因如下：


    - 如果没有明确指定*存储什么数据*，你就无法设计应用程序的其余部分。

    - 如果没有指定*如何访问数据*，就很难实现模型和控制器之间的清晰分离。例如，如果你使用关系型数据库，最终可能会在控制器中出现 SQL 代码。这违反了 MVC
    关于良好定义接口的原则。


    许多人（尤其是新开发者）更喜欢先设计视图代码，可能是因为这有助于他们理解应用程序的输入和控制流。在这种方法中，视图优先，然后是控制器，最后是模型。虽然这种方法完全有效，但我认为它容易陷入某些陷阱：


    - **数据库中存储了冗余信息**。就像寓言中三个盲人摸象一样，使用视图代码来驱动模型设计是不好的，因为你缺乏对应用程序数据需求的全局视图。在复杂的应用程序中尤其如此，你可能会在两个不同的表中存储相同的信息两次。

    - **数据库表组织混乱**，因为模型代码和数据组织是为了符合视图需求而设计的，这可能无法反映模型元素之间的自然关系。

    - **代码的未来适应性较差**，因为视图代码的更改可能需要彻底修改模型代码和数据库设计。本质上，模型代码与视图代码耦合过紧。


    所有这些都源于那些采用“视图优先”方法的人使用视图代码或原型来间接了解模型需求。


    ---


    话虽如此，在许多情况下，“模型优先”的方法可能*看起来*不切实际。例如，在许多企业 IT 部门，开发者对问题领域没有完全的理解。相反，他们必须依赖并经常与非
    IT 人员（如经理或行政人员，即“领域专家”）沟通，以理解系统的需求。


    在这种场景下，应用程序自然是由视图驱动的，因为原型被用作开发者和领域专家之间的沟通工具。我给处于这种情况的人的建议是，在与领域专家每次讨论后，*逐步*构建模型代码和数据的图景。不要把模型设计留到最后。


    无论你选择哪种方式，模型优先还是视图优先，我认为理解你为何以某种方式做事很重要，仅仅因为这有助于你成为更好的程序员。


    在下一节中，我将描述 Struts 如何融入 MVC 设计模式。


    **Struts 与 MVC**


    在 Struts 中，**模型**代码由普通的 Java 对象（POJOs）组成。


    换句话说，Struts 对你如何编写 Web 应用的模型部分没有限制。你应该将数据访问/持久化封装到模型类中，但 Struts 并不强制你这样做。请记住，Struts
    旨在帮助你尽可能轻松地实现 MVC 的完美境界。显然，你并不真正需要帮助来将模型与视图和控制器分离。


    **视图**代码由 JSP 和 Struts 提供的一组自定义标签组成。这些自定义标签使你能够将视图与控制器分离，因为它们解决了我之前在尝试将 MVC 应用于注册
    Web 应用时提出的所有问题。


    使用 Struts，**控制器**代码分为三大类：


    - **简单验证**由你的 `ActionForm` 子类执行，`ActionForm` 是 Struts 的一个基类。检查密码长度或电子邮件地址格式就是此类验证的例子。在本书后面，你将看到
    Struts 如何通过 Validator 框架极大地简化验证。

    - **复杂验证和业务逻辑**在你的 `Action` 子类中完成，`Action` 是 Struts 的另一个基类。注册 Web 应用中检查重复用户 ID
    就是复杂验证的一个例子。业务逻辑的一个例子是在购物车 Web 应用中计算购买后的应付总金额。

    - **流程控制**也由你的 `Action` 子类决定，但仅限于在名为 `struts-config.xml` 的 Struts 配置文件中声明的路径。


    随着本书的深入，你将了解更多关于 `ActionForm`、`Action` 和 `struts-config.xml` 的内容。在这个阶段，你只需理解 MVC
    如何映射到 Struts 中。


    图 5-6 描述了这种映射。


    **图 5-6.** *MVC 如何映射到 Struts*


    **Struts 请求的生命周期**


    当用户提交表单数据生成一个传入的 HTTP 请求时，这三类处理（简单/复杂验证、业务逻辑和流程控制）就会发挥作用。


    使用 Servlet 技术，所有这些处理都由 Servlet 完成。正如我在第 2 章中提到的，Servlet 只是 Java 对象，*通常*是你的 `HttpServlet`
    子类。


    即使是 JSP 页面，在运行时也会被转换为 Servlet 类——实际的 `.java` 源文件。这些自动生成的 Java 源文件随后会被编译。


    由于 Struts 构建在 Servlet 技术之上，它也不例外。所有向 Struts 应用提交的表单数据都由一个*单一的*“主”Servlet 拦截，该
    Servlet 是 `ActionServlet` 的一个实例，它是 Struts 的一部分。


    这个主 Servlet 负责将应用程序的实际工作委托给你的 `ActionForm` 和 `Action` 子类（见图 5-6）。


    ---


    **通常？**


    Servlet 技术相当通用，这意味着它完全不局限于处理 HTTP 请求，尽管这是迄今为止最常见的用途。'
