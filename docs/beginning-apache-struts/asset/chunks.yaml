    `UserLoginAction` 是 `TilesAction` 的子类，我稍后会进行描述。`LoginController` 本身*不*执行简单的验证（`validate="false"`），这不应引起任何疑问，因为简单的验证已由页面的主表单处理器
    `Login.do` 完成。


    所有表单处理器——`Login.do`、`Logoff.do` 和 `LoginController.do`——都设置为会话作用域。这是合理的，因为我们希望登录信息在用户与系统交互期间持续存在。这样做还有一个额外的好处：如果*另一个*
