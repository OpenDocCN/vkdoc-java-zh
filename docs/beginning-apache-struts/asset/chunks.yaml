    第 14 章 ■ TILES


    <definition name=".simple.admin.main" extends=".simple.admin" >


    <tiles:put name="body" value="/admin/body.jsp" />


    </definition>


    在这种情况下，您不需要一个 JSP 页面来嵌入定义，因为这个新定义定义了显示布局所需的所有属性。您可以通过在`struts-config.xml`中的`<forward>`调用它来使用此定义：


    <forward name="success" path=".simple.admin.main" />


    或者作为输入页面，如下所示：


    <action path="/MyFormHandler" input=".simple.admin.main" ...


    **在布局中使用样式表**


    大多数专业的 Web 应用程序使用层叠样式表（CSS）来实现统一的字体和颜色。当您尝试在 Tiles 布局中使用样式表时，可能会遇到问题。例如，假设您的样式表是`\styles\styles.css`，并且您的布局引用了此样式表，如清单
    14-8 所示。


    **清单 14-8.** *包含静态样式表引用的 simple-layout.jsp 片段*


    <%@ taglib uri="/tags/struts-tiles" prefix="tiles" %>


    <html>


    <head>


    <style type="text/css" media="screen">


    @import **"./styles/styles.css"** ;


    </style>


    <title> <tiles:getAsString name="title"/> </title>


    </head>


    ...


    如果所有使用此布局的 JSP 文件都位于 Web 应用程序的根文件夹中，那么此样式表声明是可行的。但对于较大的应用程序，这可能不可行。例如，您可能希望将“admin”页面放在单独的`\admin\`子文件夹中。这样做意味着对样式表的引用现在变成了`../styles/styles.css`（注意前面的`..`）。清单
    14-8 中的静态样式表引用将无法工作。


    一个有用的技巧是使用`request`对象上的`getContextPath()`函数来绕过此限制。清单 14-8 中的样式表声明现在变为：

    '
- fmt: "<style type=\"text/css\" media=\"screen\">\n\n@import \"`<%= request.getContextPath()\
    \ %>`/styles/styles.css\";\n\n</style>\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nEach time the layout is used, the right path to the stylesheet is computed.\
    \ A poorer way of doing the same is to hard-code the full URL:\n\n<style type=\"\
    text/css\" media=\"screen\">\n\n@import \"`http://www.mycompany.com/myapp/`styles/styles.css\"\
    ;\n\n</style>\n\nThis method is less effective because the port used on the server\
    \ or the application name might be changed upon deployment. In either case, the\
    \ hard-coded solution won’t work.\n\n## Tiles Components\n\nIn the previous sections,\
    \ you’ve seen how to develop layouts using Tiles. Next, we’ll explore a quite\
    \ different use of Tiles: building components.\n\nIn Tiles, a *component* is a\
    \ rectangular area displayed within the user’s web browser (this is why “Tiles”\
    \ is so named), capable of rendering *dynamic* content. Examples are components\
    \ that display selected stock prices, or ads, or a user search list, or a list\
    \ of pages the user has visited... The possibilities are endless!\n\nThere are\
    \ two main points to note concerning Tiles components:\n\n- **Easy embedding**:\
    \ A Tiles component can be embedded into any JSP page using the handy `<tiles:insert>`\
    \ tag. Want a weather report Tiles component on your JSP page? Slap in a single\
    \ `<tiles:insert>` tag with the right attributes.\n- **Independence**: To be useful,\
    \ a Tiles component should function independently of its environment—the JSP page\
    \ in which it is embedded. *There are times when this rule can be broken (as you\
    \ will see in the lab section of this chapter), but this is always at the expense\
    \ of reusability.*\n\n### Creating a Tiles Component\n\nCreating a Tiles component\
    \ is more involved compared to creating and declaring a Tiles layout. Five steps\
    \ are involved:\n\n1. **Create the Tiles *controller***. This is a Java class\
    \ that creates dynamic content or processes user input.\n2. **Declare the Tiles\
    \ controller** in `struts-config.xml`.\n3. **Create the Tiles “view.”** This is\
    \ the JSP page that displays the results of the Tiles controller’s output.\n4.\
    \ **Declare a Tiles `<definition>`** that associates the JSP page with the controller.\
    \ A controller may be used in more than one definition. This is exactly analogous\
    \ to the way an `Action` subclass may be used in more than one form handler.\n\
    5. **Use the component** on your JSP pages by embedding the `<tiles:insert>` tag\
    \ in them.\n\nTo create the Tiles controller, you subclass the `TilesAction` base\
    \ class: `org.apache.struts.tiles.actions.TilesAction`\n\nNotice that it’s `tiles.actions`\
    \ (plural). I’ll describe these five steps in more detail next and then wrap up\
    \ with a concrete example application.\n\n#### Step 1: Creating the Tiles Controller\n\
    \nThe function you need to override is called (surprise!) `execute()`, but with\
    \ a slightly different signature compared to `Action.execute()`, as shown in Listing\
    \ 14-9.\n\n**Listing 14-9.** `execute()` on `TilesAction`\n\n```\npublic ActionForward\
    \ execute(ComponentContext context, ActionMapping mapping,\n                 \
    \            ActionForm form,\n                             HttpServletRequest\
    \ request,\n                             HttpServletResponse response)\n     \
    \   throws IOException, ServletException {\n    ...\n}\n```\n\nAll you have to\
    \ do is to override this one function to process user input or prepare data for\
    \ output.\n\nThe `org.apache.struts.tiles.ComponentContext` instance passed in\
    \ `execute()` functions as a storage area for data intended for your Tiles component.\
    \ You can store and retrieve data with `putAttribute()` and `getAttribute()` on\
    \ this class. Only the JSP page represented by the `ActionForward` return value\
    \ has direct access to data placed on this `ComponentContext` instance. This helps\
    \ preserve the independent existence of the Tiles component from its environment."
