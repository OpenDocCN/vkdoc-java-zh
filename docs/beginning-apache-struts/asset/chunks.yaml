- fmt: "# `importAttribute`\n\n`importAttribute` needs a `ComponentContext` to read\
    \ from, and if an instance isn't found, an exception is thrown. This means that\
    \ you must place `<tiles:importAttribute>` after a `<tiles:insert>` or within\
    \ a page called by a `<tiles:insert>`, to ensure that the `ComponentContext` has\
    \ been created.\n\n## Attributes\n\n- **name**: Specifies the name of the attribute\
    \ to copy over. If omitted, all attributes of the `ComponentContext` are copied\
    \ to the prescribed scope.\n- **scope**: Specifies a scope (`request`, `session`,\
    \ `page`, or `application`) to copy attributes to. If omitted, the page scope\
    \ is used.\n- **ignore**: If the named attribute can't be found, an exception\
    \ is thrown by default. Setting `ignore=\"true\"` causes `importAttribute` to\
    \ fail silently.\n\n## Examples\n\nConsider this snippet:\n\n```\n<tiles:insert\
    \ page=\"mylayout.jsp\">\n  <tiles:put name=\"object1\" value=\"one\"/>\n  <tiles:put\
    \ name=\"object2\" value=\"two\"/>\n  <tiles:put name=\"object3\" value=\"three\"\
    />\n  <tiles:put name=\"object4\" value=\"four\"/>\n</tiles:insert>\n\n<bean:write\
    \ name=\"object1\"/> //ERROR!!\n```\n\nThe error occurs because `<bean:write>`\
    \ will not be able to find `object1` in any scope. For this to work, you need\
    \ to use `<tiles:importAttribute>`:\n\n```\n<tiles:importAttribute />\n<bean:write\
    \ name=\"object1\"/> //OK\n```\n\n---\n\n# `initComponentDefinitions`\n\nThis\
    \ tag is used to initialize the Tiles subsystem. Recall that Tiles was originally\
    \ not part of Struts, and can actually be used by itself. So, this tag is only\
    \ useful if you're using Tiles outside of Struts. For example, if you write your\
    \ own servlets, this tag is useful because it allows you to initialize the Tiles\
    \ subsystem without having to rely on Struts to do it for you.\n\nFrankly, Tiles\
    \ is now so much integrated with Struts that this tag is no longer very practical.\n\
    \n---\n\n# Appendix D: Answers\n\nListed in this appendix are answers to questions\
