    ## CHAPTER 8 ■ Basic Struts Tags


    **S**truts implements the View component of the MVC design pattern entirely through
    the use of custom tags (actually, the correct term is custom *action*, but I think
    the term custom *tag* conveys more meaning, and leaves less room for confusion
    with Struts Actions). These tags are applied to the JSPs that constitute the View
    component of your webapp. The Struts tags are bundled into *five* tag libraries:


    - **HTML**: The custom tags in the HTML library are essentially in one-to-one
    relationship to the ordinary HTML `<form>` tag and its associated input tags,
    like the various `<input>` tags. The purpose of this tag library is to enable
    you to connect your View component to the Controller components described in Chapters
    6 and 7. The actual connecting details are described in Chapter 9.

    - **Bean**: This library has custom tags primarily for writing text. There are
    two reasons why you''d use the Bean tags instead of hard-coding text into your
    JSPs. The first is to enable internationalization, that is, the display of the
    View component in multiple languages. We''ll show how Struts helps you internationalize
    your webapps in Chapter 12. The second reason is to avoid using scriptlets to
    display the contents of objects stored on the request or session objects.

    - **Logic**: This library provides tags for conditional processing and looping.
    You use tags in the Logic library in lieu of using scriptlets. The logic library
    tags are much easier to use and result in significantly more readable code.

    - **Nested**: This library has tags for displaying "nested" properties of a form
    or object. We''ll describe this in detail in Chapter 10.

    - **Tiles**: This library contains tags that allow you to create layouts. You''ll
    see how to use the Tiles tag library in Chapter 14.


