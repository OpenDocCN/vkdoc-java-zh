    # Chapter 20


    ## JavaServer Faces and Struts Shale


    In this chapter, we’ll take a look at a web application technology called JavaServer
    Faces (JSF) that will play a huge role in the Java webapp framework scene for
    many years to come.


    We’ll also preview a newer technology called Struts Shale, which apart from the
    common moniker, shares little with Struts as you know it. Struts Shale, or Shale,
    for short, is the first among many new webapp frameworks that have a Struts heritage
    but embrace the advantages of JSF.


    Besides these two, we’ll also give you a peek at the Struts-Faces integration
    library, which allows you to use JSF alongside “classic” Struts (that is, Struts
    as described in this book).


    Before we delve into the exciting details, I’d like to give you a bird’s-eye view
    of the two main players in this chapter, JSF and Shale.


    ## JSF Overview


    JSF is a webapp framework whose focus is the View tier of the MVC design pattern.


    In fact, JSF’s *primary goal* is to provide a *standard* *architecture* for *web-based
    user* *interface (UI) components*.


    That’s quite a mouthful, and it might help to tackle the key words one at a time:


    - **Primary goal**: Because it is a fully functional webapp framework, JSF does
    a bunch of other things apart from the View tier, like control flow and validation.
    But don’t be fooled—it’s primarily about the View tier. I believe having this
    zeitgeist at the outset helps you understand JSF better. JSF and Struts are quite
    different things, and you would do well to avoid making premature comparisons
    between them.


    - **Standard**: JSF is *not* software. It is a specification (like the Servlet
    specification or the specification for JSP) that anyone can use to create an actual
    implementation.


    Two are available now: the JSF reference implementation from Sun, and Apache’s
    MyFaces, which we’ll use in this chapter.


    - **Architecture**: The emphasis of JSF is on architecture—how the various components
    talk among themselves, how requests are processed, and so forth. The emphasis
    is not on specific components (like a drop-down list, a tab view, or a validator
    for email addresses). In fact, JSF is specifically designed to be extended.


    - **Web-based UI components**: An example might help. I use OpenOffice as my word
    processor. I’ve customized the toolbar so that it displays certain buttons every
    time I load OpenOffice. Some buttons are highlighted, like the Align button to
    indicate the currently active alignment. Also, when I click Save As, OpenOffice
    remembers the directory I last saved a file in and gives me a Save dialog box
    with that folder selected. Now imagine implementing all these features in your
    own webapp. Where would you start? The reality is that making a web-based application
    behave like an ordinary desktop app is very challenging. Web-based UI components
    and the request processing machinery behind them help you achieve this goal.


    Unlike Struts, which usually gives you just one or two ways to accomplish a given
    task, the JSF specification is very flexible, and there are many combinations
    you can pick from to accomplish a task. This flexibility might create the false
    impression that JSF is too complex to work with.


    In one sense this is true. JSF is complex, but most of the complexity is hidden
    from page developers and application developers who use it to build webapps. The
    complexity only becomes apparent when you’re extending JSF—for example, by creating
    new UI components, or providing integration points to other frameworks (e.g.,
    the Commons Validator framework or Spring).'
