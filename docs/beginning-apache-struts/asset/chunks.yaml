- fmt: "# Summary\n\nTo summarize, unlike Struts, where a page's data goes into a\
    \ single `ActionForm`, in JSF a server-side UI *tree* is created to hold data—both\
    \ the data destined for the Model tier and the data representing the state of\
    \ the View. JSF makes no distinction between the two.\n\nSo, it is the UI tree\
    \ that needs to be processed, just as Struts processes `ActionForms`. The user-submitted\
    \ data contained in the UI tree needs to be validated and processed for delivery\
    \ into the Model tier. We'll see how this is done next.\n\n## Request Processing\
    \ Lifecycle\n\nJSF's request processing lifecycle describes how HTTP requests\
    \ from a client are processed to generate a response by the server. JSF's request\
    \ processing lifecycle is divided into several *phases*. Figure 20-3 illustrates\
    \ this.\n\n> **Tip** You need to know the material in this section very well,\
    \ because the available documentation on JSF and documentation for technologies\
    \ based on JSF, like Shale, frequently refer to the various phases of JSF's request\
    \ processing lifecycle.\n\n**Figure 20-3.** *JSF's request processing lifecycle*\n\
    \nThere are six phases in all (the solid boxes in Figure 20-3), and each phase\
    \ and the *events* associated with it are completely processed before the subsequent\
    \ phase is started.\n\n> **Note** *Events* and *event listeners* are the mechanism\
    \ by which JSF exposes its internals to third-party classes. They are an important\
    \ extension point of JSF. We'll describe both of these in the following section.\n\
    \nIn Figure 20-3, we've marked two ways (validation errors and conversion errors)\
    \ by which processing gets fast-tracked to the Render Response phase. In truth,\
    \ event listeners that process events immediately after *any* phase may cause\
    \ JSF to move into the Render Response phase.\n\n## Faces Requests\n\nNot all\
    \ HTTP requests sent to the server are processed according to Figure 20-3, but\
    \ only those requesting a JSF page. Such requests are termed *faces requests*.\
    \ This is analogous to the way not every HTTP request is processed by Struts,\
    \ but only those with the `.do` extension (by default). The corresponding extension\
    \ for JSF is `.jsf`. (Again, this depends on how you've configured `web.xml`.\
    \ Another common choice for a JSF extension is `.faces`.)\n\nYour pages need not\
    \ have the extension `.jsf`, but the call to them must. For example, suppose you\
    \ have a JSP page containing JSF markup named `mypage.jsp`. To correctly call\
    \ this page, you'd have to make a request for:\n\n`http://www.mycompany.com/mypage.jsf`\n\
    \nIf you were to make a request for `http://www.mycompany.com/mypage.jsp` directly,\
    \ you'd get an error message.\n\nYou can name your pages with a `.jsf` extension,\
    \ but this would *not* work with a JSP 1.2–compliant servlet container. JSP 1.2\
    \ requires JSP pages to have the `.jsp` extension. So, the most portable method\
    \ is to name your JSF pages `.jsp` and request them as `.jsf`.\n\nLet's look at\
    \ each phase in detail. Don't worry if some of my comments seem cryptic at the\
    \ moment. I'll explain the cryptic bits in the following subsections.\n\n- **Restore\
    \ View**: If this is the first time the user requests this page, then the *UI\
    \ tree* (see the discussion in the previous subsection) is created. If this is\
    \ the second time the page is created, then the UI tree is re-created with the\
    \ previously saved state. *Value bindings* for each UI component are also processed\
    \ at this phase.\n\n- **Apply Request Values**: Each UI component on the UI tree\
    \ is given a chance to update its state based on the information contained in\
    \ the incoming HTTP request.\n\n- **Process Validations**: In this phase, validations\
    \ are processed. If there are errors, then processing is taken directly to the\
    \ Render Response phase.\n\n- **Update Model Values**: As its name implies, in\
    \ this phase the Model tier is updated with the data from the UI tree. JSF knows\
    \ which UI components hold data destined for the Model tier because you've specified\
    \ this in the JSF markup. Data conversion errors will cause processing to proceed\
    \ directly to the Render Response phase.\n\n- **Invoke Application**: Navigation\
    \ is performed based on *action events* posted during previous phases. It is also\
    \ possible for your customizations of JSF to add other processing code to this\
    \ phase.\n\n- **Render Response**: The HTML output is created, based on either\
    \ the navigation results or the existing UI tree (if the page is to be redisplayed).\
    \ The state of the UI tree is also saved for processing on subsequent requests.\n\
    \nAfter every phase (except for Restore View and Render Response), events that\
    \ might have been generated during that phase are processed. Events are Java objects\
    \ that contain information indicating a certain processing state. Events are generated\
    \ by UI components on the UI tree, or by your own processing code attached to\
    \ any phase. Processing of events is done either by JSF itself or by event listeners.\
    \ We'll see how this is done next.\n\n## Events and Event Listeners\n\nIn this\
    \ book, you've come across two design patterns: the MVC design pattern and the\
    \ Singleton design pattern (in Chapter 19). Events and event listeners fall under\
    \ a simple but powerful design pattern called *Observer*.\n\nIn the Observer design\
    \ pattern, there are two roles. The first is that of a Publisher, a data source\
    \ that gets updated from time to time. The second role is that of Subscriber,\
    \ denoting entities interested in being updated with the latest data available\
    \ on the Publisher.\n\nA bad way to get Subscribers updated with the latest data\
    \ is for them to interrogate the Publisher at regular intervals. This technique,\
    \ called polling, is obviously inefficient: poll too fast and you waste CPU time;\
    \ poll too slowly and you risk getting the data too late or losing it altogether.\n\
    \nInstead of polling, the Observer design pattern employs the \"don't call us,\
    \ we'll call you\" maxim. Subscribers interested in getting data from the Publisher\
    \ first *register* with the Publisher. When the new data arrives, the Publisher\
    \ *informs* all its registered Subscribers.\n\nLet's take a concrete example.\
    \ GUI frameworks like Swing or Abstract Windowing Toolkit (AWT) have classes representing\
    \ visually displayed UI components, like buttons, check boxes, and so forth. Each\
    \ of these GUI components needs to signal certain user interactions, like a mouse\
    \ click over a button, or a key pressed in a text input box. Each such activity\
    \ is called an *event*.\n\nAn event is usually represented by a Java class, which\
    \ has fields containing data describing the event. For example, in the case of\
    \ mouse clicks, a `MouseClickEvent` might contain the X and Y coordinates of the\
    \ mouse click, as shown in Listing 20-2.\n\n**Listing 20-2.** *A Class to Represent\
    \ Mouse Clicks*\n\n```java\npublic class MouseClickEvent{\n    private int _x,\
    \ _y;\n    public MouseClickEvent(int x, int y){\n        _x = x; _y = y;\n  \
    \  }\n    public int getX(){ return _x; }\n    public int getY(){ return _y; }\n\
    }\n```\n\nNotice that classes representing events are usually *immutable*, meaning\
    \ that you can only read data from them once they are created. The reason for\
    \ this is because an event could be shared among many Subscribers. You don't want\
    \ any Subscriber to amend the event."
