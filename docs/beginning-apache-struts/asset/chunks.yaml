    A P P E N D I X C ■ S T R U T S T A G R E F E R E N C E


    **433**


    Attributes


    • id: The name of the exposed variable. Scriptlets and other custom tags will
    be able to access the new variable using this name. This attribute is required.


    • forward: The name of the global forward to expose.


    • formBean: The name of the declared form bean to expose.


    • mapping: The name of the form handler to expose.


    Examples


    Consider this struts-config.xml snippet:


    <form-beans>


    <form-bean name="RegistrationFormBean"


    type="net.thinksquared.reg.RegistrationFormBean" />


    </form-beans>


    <global-forwards>


    <forward name="myForward" path="/index.jsp" />


    </global-forwards>


    <action-mappings>


    <action path="/Login"


    type="net.thinksquared.reg.RegistrationAction"


    validate="true"


    name="RegistrationFormBean"


    input="myInput.jsp">


    <forward name="success" path="registered.jsp" />


    <forward name="new-user" path="new-user.jsp" />


    </action>


    </action-mappings>


    Here’s how you would expose the global forward:


    <bean:struts id="fwd" forward="myForward"/>


    <bean:write name="fwd"/>


    <bean:write name="fwd" property="path" />


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048AppC.fm Page 434 Tuesday, January 17, 2006 4:46 PM


    **434**


    A P P E N D I X C ■ S T R U T S T A G R E F E R E N C E


    and the form bean:


    <bean:struts id="fbean" formBean="RegistrationFormBean"/>


    <bean:write name="fbean"/>


    <bean:write name="fbean" property="type" /> and the form handler:


    <bean:struts id="fhandler" mapping="/Login"/>


    <bean:write name="fhandler"/>


    <bean:write name="fhandler" property="input" /> Equivalents


    None.


    **write**


    This tag writes the specified bean property to the response stream. It allows
    for some formatting of the given bean property.


    Usage Restrictions


    The name attribute is required.


    Attributes


    • name/property/scope: These attributes are used to locate the JavaBean with the
    given name and optional property and scope. If scope isn’t specified, all scopes
    are searched for the named object.


    • ignore: If true, silently fails if the named JavaBean is not found. The default
    value (false) causes an exception to be thrown.


    The remaining attributes are used to format the bean’s property:


    • filter: If set to true causes the property’s String value to be HTML encoded.
    For example, the ampersand (&) would be encoded as & and > would be encoded as


    >. The default is true.


    • format/formatKey: Both specify a format string that is used to format the bean’s
    property. format uses its value literally as a format string. formatKey uses its
    value as a key to look up the actual format string stored in the message resources
    file. Unless the locale/bundle combination is specified, the current user’s locale
    and the default message resource bundle is used.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048AppC.fm Page 435 Tuesday, January 17, 2006 4:46 PM


