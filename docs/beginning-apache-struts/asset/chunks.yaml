    • `options`：显示一个选项列表，从 JavaBean 中填充。


    • `optionsCollection`：`options` 的更精简版本。也显示一个从 JavaBean 填充的选项列表。


    每个渲染出的 `<option>` 都有一个 `value` 和一个 `label`。`value` 是如果该选项被选中时提交的值。`label` 是呈现给用户以便他们进行选择的文本。


