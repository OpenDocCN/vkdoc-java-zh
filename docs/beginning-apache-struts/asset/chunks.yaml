- fmt: 'So we now have a class to represent mouse clicks. Great! But how to guarantee
    that Subscribers can actually understand the data contained in this event? Simple—have
    them implement a standard interface, shown in Listing 20-3.


    **Listing 20-3.** *The `MouseClickListener` Interface*


    ```

    public interface MouseClickListener{


    public mouseClicked(MouseClickEvent mce);


    }

    ```


    So, a Subscriber implementing `MouseClickListener` explicitly declares that it
    understands how to process mouse clicks. Listing 20-4 shows an example of a Subscriber
    implementing `MouseClickListener`.


    **Listing 20-4.** *Example of Subscriber Implementing `MouseClickListener`*


    ```

    public class MySubscriber implements MouseClickListener{


    public mouseClicked(MouseClickEvent mce){


    System.out.println(“x coordinate = “ + mce.getX());


    System.out.println(“y coordinate = “ + mce.getY());


    }


    }

    ```


    What about Publishers? Do they have to implement any interface? Usually not, but
    Publishers should have a function to add or remove event listeners. Subscribers
    would have to know these functions and call them; an example is shown in Listing
    20-5.


    **Listing 20-5.** *Fragment of a GUI Widget That Generates Mouse Click Events*


    ```

    public class MyGuiWidget{


    private Set _mouseClickListeners = new HashSet();


    public addMouseClickListener(MouseClickListener mcl){


    _mouseClickListeners.add(mcl);


    }


    public removeMouseClickListener(MouseClickListener mcl){


    _mouseClickListeners.remove(mcl);


    }


    protected void broadcastMouseClick(int x, int y){


    if(_mouseClickListeners.isEmpty()) return;


    MouseClickEvent mce = new MouseClickEvent(x,y);


    for(Iterator listeners = _mouseClickListeners.iterator();


    listeners.hasNext();){


    ((MouseClickListener) listeners.next()).mouseClicked(mce);


    }


    }


    // other functions that receive mouse clicks from the screen


    // and then call broadcastMouseClick()


    ...


    }

    ```


    **IS `MouseClickEvent` REALLY NECESSARY?**


    You might realize by now that the `MouseClickEvent` class is not strictly necessary.
    In fact, it’s possible to eliminate this class completely, and instead put in
    the X and Y coordinates as arguments of `mouseClicked()`:


    ```

    public interface MouseClickListener{


    public mouseClicked(int x, int y);


    }

    ```


    Both approaches are valid, and JSF uses both, but most often the first.


    Your Java application would hook up `MyGuiWidget` and `MySubscriber`(s) as shown
    in Listing 20-6.


    **Listing 20-6.** *Fragment of a GUI Widget That Generates Mouse Click Events*


    ```

    MyGuiWidget widget = new MyGuiWidget();


    MySubscriber sub1 = new MySubscriber();


    MySubscriber sub2 = new MySubscriber();


    widget.addMouseClickListener(sub1);


    widget.addMouseClickListener(sub2);

    ```


    Now that you understand all this, you might be wondering how it relates to JSF.
    Well, at each phase (except Restore View and Render Response), events would be
    generated.


    These events might relate to the change in phase (`PhaseEvent`) or indicate that
    the user requires a certain action to be performed, such as navigating to a next
    page or calling a function on one of your classes (`ActionEvent`) or signaling
    that a UI component’s value has changed (`ValueChangedEvent`).


    Also, as the sidebar points out, it’s possible to flag events without having an
    explicit “event” object. Validations and Model tier updates are done this way.
    Essentially, you create listeners for each of these and somehow (you’ll see how
    shortly) register them with JSF. JSF will call these listeners at the appropriate
    phases.


    So, the million-dollar question is how do we register listeners for the various
    events?'
