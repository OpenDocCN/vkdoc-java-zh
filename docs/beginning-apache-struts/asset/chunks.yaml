    **messagesPresent/messagesNotPresent**


    messagesPresent is a conditional tag that executes its body if the given message
    or error message exists on the current request. messagesNotPresent is the converse
    of messagesPresent.


    Note the following terminology:


    • “Erro r messages” are ActionMessage instances stored in an ActionMessages/


    ActionErrors instance, which in turn is stored under the key Globals.ERROR_KEY


    in the request.


    • “Messages ” are ActionMessage instances stored in an ActionMessages/ActionErrors
    instance, which in turn is stored under the key Globals.MESSAGE_KEY in the request.


    For example, your ActionForm’s validate() might return an ActionErrors instance
    that contains one or more ActionMessage instances. These ActionMessage instances
    are stored by key, as you’ve seen in Chapters 6 and 7\. The key is called the
    “name” of the corresponding error message/message.


    Both error messages and messages may be displayed with <html:errors>, or iterated
    with <html:messages>.


    Usage Restrictions


    None.


    Attributes


    There are three attributes: name, property, and message.'
