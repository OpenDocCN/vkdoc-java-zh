    **messagesPresent/messagesNotPresent**


    `messagesPresent` 是一个条件标签，当当前请求中存在指定消息或错误消息时，执行其标签体。`messagesNotPresent` 是 `messagesPresent`
    的反向操作。


    请注意以下术语：


    • “错误消息”是存储在 `ActionMessages/ActionErrors` 实例中的 `ActionMessage` 实例，而该实例又存储在请求中
    `Globals.ERROR_KEY` 键下。


    • “消息”是存储在 `ActionMessages/ActionErrors` 实例中的 `ActionMessage` 实例，而该实例又存储在请求中 `Globals.MESSAGE_KEY`
    键下。


    例如，你的 `ActionForm` 的 `validate()` 方法可能返回一个包含一个或多个 `ActionMessage` 实例的 `ActionErrors`
    实例。这些 `ActionMessage` 实例按键存储，正如你在第 6 章和第 7 章中看到的那样。该键称为相应错误消息/消息的“名称”。


    错误消息和消息都可以通过 `<html:errors>` 显示，或通过 `<html:messages>` 迭代。


    使用限制


    无。


    属性


    共有三个属性：`name`、`property` 和 `message`。

    '
- fmt: 'Note that the `name` and `property` attributes don’t have their usual meaning.
    Instead, the following checks are made depending on the settings of these attributes:


    - If no attributes are specified, `messagesPresent` simply checks if there any
    error messages in the current request. It executes its body if there are error
    messages.

    - Setting `message="true"` causes `messagesPresent` to check for any messages
    instead.

    - If the `property` attribute is specified, `messagesPresent` checks if there
    are any error messages with that name. Again, setting `message="true"` causes
    a check for the appropriate message instead.

    - The `name` attribute allows you to look for error messages/messages on the request,
    under a key other than `Globals.ERROR_KEY` or `Globals.MESSAGE_KEY`. Note that
    if you specify the `message` attribute, the `name` attribute is ignored.

    - If the `name` attribute is specified, then even a `String` or `String` array
    in the request will result in a match.


    The various combinations are probably best illustrated with examples.


    ### Examples


    The simplest example tests for the presence of error messages:


    ```

    <logic:messagesPresent >

    There are errors on this page!

    </logic:messagesPresent>

    ```


    Or you could test for a specific error message:


    ```

    <logic:messagesPresent property="email">

    The email address field has an error!

    </logic:messagesPresent>

    ```


    If your `Action` posts messages, you can test for these as well:


    ```

    <logic:messagesNotPresent property="alerts" messages=true "> The are no alerts
    for you.

    </logic:messagesNotPresent>

    ```


    And you can look for error messages or messages or `String`s or `String` arrays
    under a specific key on the request:


    ```

    <logic:messagesPresent name="mywebapp_debug_messages">

    The debug message is: <bean:write name="mywebapp_debug_messages"/>

    </logic:messagesPresent>

    ```


    ### Equivalents


    None. There are, of course, hacks using scriptlets in combination with JSTL’s
    `<c:if>`.


    ## `present`/`notPresent`


    `present` checks the request for the presence of an object under the specified
    property or extended property. If the object is present, the body of the tag is
    executed. `notPresent` is the converse of `present`.


    ### Usage Restrictions


    You must specify a selector attribute (see the start of this section for a definition)
    or `user` or `role`.


    ### Attributes


    Both `base-attrs` and `exprop-attrs` are accepted, and have their usual interpretation.
    If the `property` attribute is specified, `present` checks that the return value
    is not `null`.


    In addition to these, there are other `user` and `role` attributes. These depend
    on the underlying servlet technology’s facility to authenticate a user, and specify
    one or more roles for that user. How this is done is outside the scope of this
    book, so if you’re interested in learning more, you should consult a recent reference
    on servlets. The `user` attribute specifies the name of the remote user for the
    current request. The `role` attribute is a comma-delimited string of roles. `present`
    evaluates its body if any one of these roles is a valid role of the current user.


    ### Examples


    The simplest usage checks for the presence of an object on the request:


    ```

    <logic:present name="myobject">

    My object is present!

    </logic:present>

    ```


    Similarly, the use of the `property` attribute ensures that the given property
    is not `null`:


    ```

    <logic:present name="contact" property="designation">

    The contact''s designation is:

    <bean:write name="contact" property="designation"/>

    </logic:present>

    ```


    You can also check the current authenticated username:


    ```

    <logic:present user="donquixote">

    Hi Don!

    </logic:present>

    ```


    or that the current authenticated user has any of the specified roles:


    ```

    <logic:notPresent role="admin,staff">

    Sorry, you are not allowed to view this page!

    </logic:notPresent>

    ```


    ### Equivalents


    You can easily create equivalents for these tags using JSTL’s `<c:if>` or `<c:choose>...<c:when>`.
    For example using `<c:if>`, the previous examples would be:


    ```

    <c:if test="${myobject != null}">

    My object is present!

    </c:if>

    ```


    ```

    <c:if test="${contact != null && contact.designation != null}">

    The contact''s designation is:

    <c:out value="${contact.designation}"/>

    </c:if>

    ```


    ```

    <c:if test="${pageContext.request.remoteUser == ''donquixote''}">

    Hi Don!

    </c:if>

    ```


    The last example—checking roles—unfortunately has no JSTL equivalent. However,
    there is a JSF extension for security that handles this case neatly. Check out
    `http://jsf-security.sourceforge.net` if you’re interested.


    ## `redirect`


    This tag performs a page redirect. The tag has no body. See also `<logic:forward>`.


    ### Usage Restrictions


    You must specify either `forward`, `href`, `action`, or `page` to specify the
    base URL to redirect to.


    ### Attributes


    There are two main sets of attributes. The first set specifies the base URL of
    the page to redirect to. You have four ways to do this:


    - `forward`: The name of the global forward to redirect to (e.g., `forward="login"`).

    - `href`: The raw URL to redirect to (e.g., `href="http://www.kenyir.org"`).

    - `action`: The name of the form handler (that is, action mapping) to redirect
    to. This must begin with a slash because it’s relative to the default module (e.g.,
    `action="/Logoff"`). (See Chapter 17 for more on modules.)

    - `page`: The path to the web page on the current webapp to redirect to. This
    path is relative to the webapp’s base folder. The path must begin with a slash
    (e.g., `page="/index.jsp"`).


    `redirect` also allows you to specify parameters on the redirected URL:


    - `anchor`: Lets you specify the name of an anchor. Anchors are standard HTML.
    They are used to label sections of a long web page for easy navigation.

    - `name`/`property`/`scope`: These attributes are used to locate a `Map` instance
    on the request or session. The key of the map is the parameter’s name, and the
    value is the corresponding parameter’s value. In the case that the value is an
    array, multiple parameters are written to the URL, each with the same name but
    different values. You use a combination of these three variables if you want to
    create more than one URL parameter.

    - `paramName`, `paramProperty`, `paramScope` and `paramId`: The first set of three
    attributes is used to locate a single object on the current request or session.
    If this object is not an array, its `toString()` is called and this is the single
    parameter value. If the object is an array, then you’re creating multiple parameters
    with the same name but different values. The name of the parameter is given by
    `paramId`.


    The remaining attributes are `useLocalEncoding` and `transaction`. `useLocalEncoding`,
    if set to `true`, tells Struts to use whatever the character encoding is for the
    current `HttpServletResponse`. The `transaction` attribute requires some elaboration.


    ### Transaction Tokens


    Struts has a mechanism to prevent a form from being submitted more than once.
    This might happen if the user clicks the form’s submit button twice in quick succession.
    Ordinarily, Struts would treat this as two separate submissions. This, of course,
    is an error. A standard solution to this problem is to use a *transaction token*.


    You have to use two `Action` subclasses. The first `Action` subclass is activated
    when the form is requested. It places a unique string on both the request and
    the session. This unique string is the transaction token. `Action` has the function
    `saveToken(HttpServletRequest request)`.'
