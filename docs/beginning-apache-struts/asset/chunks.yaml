    • The corresponding setXXX() function on the ActionForm subclass is only called
    if the check box is checked. This means that in order for your app to detect an
    unchecked check box, you need to call setXXX() in your ActionForm’s reset() function.
    reset() is automatically called by Struts before a form is (re)displayed, and
    before any setXXX() functions are called.


    Examples


