    - **安装**新的属性文件到默认 `Application.properties` 文件所在的*同一文件夹*中（见图 12-1）。


    就是这样！当用户的浏览器设置为所需语言环境（例如 `jp`）时，Struts 将使用正确的属性文件（本例中为 `Application_jp.properties`）为该用户提供服务。所有提示、按钮、对话框和文本都将以日语显示。


    **图 12-1.** *已安装的各种 `Application.properties` 文件*


    ■**注意** 如果您正在为美国英语（关联语言环境 `en_US`）编写应用程序，则属性文件应为 `Application_en_US.properties`。


