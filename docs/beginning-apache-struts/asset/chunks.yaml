    **35**


    **专业 Java 工具**


    在本书中，我使用了 Windows 批处理文件来编译和准备 WAR 文件。这样做是为了尽可能保持简单。然而，在现实世界中，批处理文件并不是编译 Web 应用的最佳方式。一个更好的选择是使用
    Apache Ant（请参阅“有用链接”获取网站地址）。


    Ant 提供了一种与平台无关的方式来编译你的 Java 源代码。但 Ant 的功能远不止于此。你可以使用 Ant 轻松创建不同的编译配置。此外，许多有价值的
    Java 工具都与 Ant 集成。虽然使用 Ant 超出了本书的范围，但我鼓励你下载它并尝试在你的项目中使用。


    我鼓励你探索的另一个领域是使用真正的 Java 集成开发环境（IDE），而不是普通的记事本。大多数 IDE 都提供了简化创建和编辑 Java、HTML 和
    XML 的工具，从而提高你的工作效率。


    我强烈推荐的一个 IDE 是开源的 Eclipse（请参阅“有用链接”获取网站地址）。随附的 CD-ROM 上有一份该 IDE 的副本。


    **有用链接**


    • Apache Ant 网站：http://ant.apache.org


    • Eclipse 网站：www.eclipse.org


    **总结**


    • 自定义标签是基于 Java 的 Web 应用框架的核心组成部分。


    • 自定义标签的功能由你的 TagSupport 或 BodyTagSupport 子类实现。


    • 如果你的自定义标签没有主体，则使用 TagSupport；如果有主体，则使用 BodyTagSupport。


    • 你需要在标签库描述符（TLD）文件中声明你的自定义标签。


    • 你可能需要在 web.xml 中注册 TLD 文件的位置。


