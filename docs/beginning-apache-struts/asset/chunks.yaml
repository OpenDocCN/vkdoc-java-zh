    **80** CHAPTER 8 ■ BASIC STRUTS TAGS


    > **Note** Appendix C is a comprehensive reference for all Struts tags.


    In this chapter, we''ll only discuss the most frequently used tags from just the
    HTML and Bean libraries.


    Before we go into the details of each of these tags, you first have to understand
    how a JSP page is processed by Struts.


    ## Page Processing Lifecycle


    When Struts is asked for a page, it first replaces all Struts tags on that page
    with the necessary textual data. The underlying mechanism of this replacement
    process was described in Chapter 4. Not all Struts tags will show up on the displayed
    page. Some have preconditions, and will only display if they are satisfied. For
    example, the `<html:errors>` tag displays only if there are error messages to
    be displayed.


    For a page that doesn''t contain a form, this tag replacement stage ends that
    page''s processing lifecycle.


    If a page *does* contain a form, then Struts handles processing of the form data.
    This happens in essentially two stages, which have been the subject of the previous
    two chapters: simple validation and the processing of business logic.


    The form data is first run through simple validation (on your `ActionForm` subclass).
    If this fails, the page is *typically* redisplayed automatically.


    > **Note** Whether simple validations are indeed performed and which, if any,
    input page is redisplayed are all controlled by the Struts configuration file,
    to be described in Chapter 9.


    Because the page now contains validation errors, any relevant `<html:errors>`
    tags on the page will display their error messages.


    Once the user corrects and resubmits the form, the data is again validated. As
    before, if the form still contains errors the page is redisplayed yet again. This
    cycle of redisplaying the form and validating it continues until the form data
    is free of simple validation errors.


    When this happens, Struts sends the form data for business logic processing (by
    your `Action` subclass), and the "next" page is displayed. Note that the "next"
    page could be an error page or could have error messages in the event of complex
    validation errors.


    Figure 8-1 summarizes these steps.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


