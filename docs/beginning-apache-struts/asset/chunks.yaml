    附录 A ■ 模型框架


    **清单 A-3.** *保存 Lisptorq 生成的 User Bean* User u = new User();


    u.setUserId("kolmogorov");


    u.setPassword("turbulence23");


    u.save();


    这几行代码在幕后做了大量工作：生成了用于保存用户 ID 和密码的 SQL。使用 Model 类让你无需自己编写一行 SQL！


    除了这四个模型类（记住，每个表会创建四个类），Lisptorq 总是生成四个辅助类：Criteria、Database、DatabaseSetup 和 Scroller：


    • Criteria 允许你无需使用 SQL 即可创建查询。


    • Database 管理数据库连接。


    • DatabaseSetup 为你提供了一个 main() 函数，你可以调用它来设置数据库。显然，你只需要使用这个类一次。


    • Scroller 是一个*接口*，扩展了 java.util.Iterator。它表示一个迭代器，可以向前迭代（使用通常的 hasNext() 和 next()）或向后迭代（使用
    hasPrevious() 和 previous()）。你还可以使用 absolute() 定位“游标”。


    清单 A-4 是使用 Criteria 类以及 User 和 UserPeer 模型类对清单 A-1 中 exists() 函数的实现。


    **清单 A-4.** *使用 Criteria 和 Model 类实现的 exists()* public static boolean exists(String
    userId){


    Criteria crit = new Criteria();


    crit.add(User.USER_ID,userId);


    return UserPeer.doSelect(crit).iterator().hasNext();


    }


    Lisptorq 目前生成的代码针对 Derby SQL 进行了优化。Derby 是一个 Java 嵌入式数据库，目前正在 Apache 进行“孵化”。它由
    IBM 捐赠，之前是名为 Cloudscape 的专有 Java 嵌入式数据库。它是少数支持原子性、一致性、隔离性和持久性（即 ACID，参见“有用链接”）的开源数据库之一。Derby
    的 JAR 文件（derby.jar）位于 Apress 网站的源代码部分，网址为 http://www.apress.com。


