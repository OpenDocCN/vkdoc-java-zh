    \        <var-value>\n            ((item.id[1] == null) or (*this* != null))\n\
    \        </var-value>\n    </var>\n</field>\n```\n\nIn the next section, we’ll\
    \ look at how to run your own validations alongside the standard ones you’ve used\
    \ in `validation.xml`.\n\n## Adding Custom Validations\n\nAlthough the set of\
    \ validations on the Validator framework are quite comprehensive, you might want\
    \ to run your own validations alongside those available in the Validator framework.\
    \ There are two ways of doing this:\n\n- Put in a `validate()` function on your\
    \ `ValidatorForm` subclass. You’d take this approach if the custom validation\
    \ isn’t likely to be reused in other parts of your application.\n- Extend the\
    \ Validator framework itself by creating a new validator. You’d take this route\
    \ if there’s a strong case for reuse.\n\nIn most cases, putting in a `validate()`\
    \ function should suffice. Use the second alternative only after much thought,\
    \ since validators should be *generic*, if only to the problem domain of your\
    \ web application. Otherwise, you’d run into potential maintenance issues. Can\
    \ you see why?\n\nWe’ll take a look at both approaches in this section.\n\n###\
    \ Implementing `validate()`\n\nAs I mentioned earlier, one way of implementing\
    \ your own validations in addition to the standard ones is to implement the `validate()`\
    \ function.\n\nWe’ll take up the `RegistrationForm` class again (see Listing 15-4),\
    \ and add custom validations to detect that the given password isn’t in a list\
    \ of common words like “password” or “secret.” Listing 15-11 shows the `validate()`\
    \ function that you’d add to `RegistrationForm` in order to achieve this functionality.\n\
    \n**Listing 15-11.** *Checking for Common Words as Passwords*\n\n```\npublic ActionErrors\
    \ validate(ActionMapping mapping,\n                             HttpServletRequest\
    \ request){\n    //run the validations declared in validation.xml first\n    ActionErrors\
    \ errors = super.validate(mapping,request);\n    if(errors != null && !errors.isEmpty())\
    \ return errors;\n    errors = (errors == null)? new ActionErrors() : errors;\n\
    \    //run your custom validations next\n    for(int i = commonWords.length -\
    \ 1; i >= 0; i--){\n        if (_password.toUpper().equals(commonWords[i])){\n\
    \            errors.add(\"password\",\n                new ActionMessage(\"reg.error.password.toocommon\"\
    , commonWords[i]));\n            return errors;\n        }\n    }\n    return\
    \ (errors.isEmpty())? null : errors;\n}\n```\n\nIn Listing 15-11, `validate()`\
    \ is called on the base class (`ValidatorForm`), which runs the validations defined\
    \ in `validation.xml`. The end result is an `ActionErrors` object, to which we\
    \ can add new error messages of our own. Notice the use of the second constructor\
    \ of `ActionMessage` (see Appendix B), in order to customize the error message\
    \ with the common word that was rejected in the validation.\n\n### Extending the\
    \ Validator Framework\n\nInstead of implementing `validate()` as in Listing 15-11,\
    \ we could extend the Validator framework. Do this sparingly. For the `Registration`\
    \ webapp example, it would be overkill—implementing `validate()` would suffice.\
    \ However, in this subsection, I will extend the Validator framework for the same\
    \ functionality, simply so you can compare the two approaches.\n\nSo, in what\
    \ situations would extending the Validator framework be appropriate? Actually,\
    \ only when you can justify reuse of the custom validator. This usually means\
    \ that the custom validator checks a variable prevalent in your webapp’s problem\
    \ domain.\n\nGood examples are *identifiers*, like product codes, ISBN numbers,\
    \ IP addresses, or zip codes (or “postal codes” as they are known outside the\
    \ United States). While these can be validated using the standard mask validator,\
    \ it may not always be easy to do so, especially if you need to take care of exceptions\
    \ to the rule (e.g., postal codes), or if the variable can change format over\
    \ time (e.g., IP addresses).\n\nYou’d be much better off extending the Validator\
    \ framework than implementing the `validate()` function because you obviously\
    \ want to *reuse* the validations. A zip code field, for example, could appear\
    \ in more than one form, or be present in many different webapps you might create.\n\
    \nCreating a new validator is easy:\n\n1. Implement the Java handler class that\
    \ actually performs the validation.\n2. Optionally create JavaScript for form\
    \ validation. I won’t cover this topic in this book.\n3. Declare the new handler\
    \ in `validator-rules.xml` with the `<validator>` tag.\n\n#### Implementing the\
    \ Java Handler\n\nThis is the trickiest part of the whole process of creating\
    \ a custom validator. Most of the complexity arises because you must handle the\
    \ possibility of nested and indexed properties and because you have to use helper\
    \ classes (`Resources`, `GenericValidator`, etc.) to read the information you\
    \ need to validate an input datum or to reuse validations available in the Validator\
    \ framework.\n\nYour Java handler can be *any* Java object, as long as the following\
    \ conditions are met:\n\n- It implements `java.io.Serializable`.\n- The function\
    \ performing the custom validation has `public` access. It must also be a `static`\
    \ function that returns a `boolean`, which is `false` if validation fails and\
    \ `true` otherwise.\n\nYou can call this function anything you like. The standard\
    \ method signature is shown in Listing 15-12.\n\n**Listing 15-12.** *Standard\
    \ Signature for the Custom Validation Function*\n\n```\npublic static boolean\n\
    myValidationFunction(Object bean, ValidatorAction va,\n                     Field\
    \ field, ActionMessages errors,\n                     Validator validator, HttpServletRequest\
    \ request){\n```\n\nThe function’s six arguments are the following parameters:\n\
    \n- `java.lang.Object`: This can be a `String` or a JavaBean-conformant object.\
    \ It holds the value(s) to be validated. If it’s a JavaBean, the value to be validated\
    \ resides on one of the bean’s properties. Your validation function will have\
    \ to handle each of these possibilities.\n- `org.apache.commons.validator.ValidatorAction`:\
    \ This class contains information declared within the `<validator>`. You’ll probably\
    \ never call functions on this class, but an initialized instance of it is needed\
    \ when you want to load pooled error messages saved in Struts’ `Resource` class.\
    \ Without such an instance, you’d have to resort to calling a new `ActionMessage(...)`\
    \ each time you wanted to create an error message, which isn’t efficient.\n- `org.apache.commons.validator.Field`:\
    \ This contains data pertaining to the field being validated. With this instance,\
    \ you can find out the name of the property being validated and any other information\
    \ contained in the `<field>` tag.\n- `ActionMessages`: This is simply a container\
    \ for you to place your error messages. Struts manages the creation of `ActionMessages`\
    \ objects, enabling these objects to be pooled for efficiency.\n- `org.apache.commons.validator.Validator`:\
    \ This is an instance of the Validator framework itself, which you can use to\
    \ read other fields in the `<form>`. You might need to use this to perform field-dependent\
    \ validations (as is the case with `validwhen`). Like `ValidatorAction`, an instance\
    \ is needed to load pooled `ActionMessage` instances for efficiency.\n- `HttpServletRequest`:\
    \ This is the request object associated with the current request."
