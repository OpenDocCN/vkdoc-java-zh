- fmt: 'Now, the relevant Controller class for the Find tile is `FindAction`, which
    is a subclass of `net.thinksquarded.lilldep.struts.TilesLookupDispatchAction`.
    This base class is used much in the same way as `LookupDispatchAction` (see Chapter
    17), but is specifically for Tiles.


    1. Complete the implementation of `find()` on `FindAction`, so that it extracts
    the `Contact` instance from the given `ActionForm`. Save a *cloned* version of
    this `Contact` in the current session, under the key `JSPConstants.FIND_QUERY`.
    Use `Contact.klone()`, which clones the `Contact`.


    2. Use `ContactPeer.find()` to create a `Scroller` object using this `Contact`.
    You should place this `Scroller` object in the current request, under the key
    `JspConstants.FIND_RESULTS`.


    3. `find()` should return `null`, because navigation is determined by the main
    handler for the form.


    4. Complete the implementation of `unknown()` on `FindAction`, so that it checks
    the session for a `Contact`, under the key `JspConstants.FIND_QUERY`. If the `Contact`
    exists, then use it to get a `Scroller` using `ContactPeer.find()`. Save the `Scroller`
    on the current request. `unknown()` should return `null`.


    5. Implement the function `getKeyMethodMap()`, which has the same requirements
    as `LookupDispatchAction.getKeyMethodMap()`.


    6. Use `compile.bat` to see if your work compiles.


