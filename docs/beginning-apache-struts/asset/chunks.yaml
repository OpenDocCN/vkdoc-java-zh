- fmt: '# Struts Tags


    This is a directive telling Struts to *autogenerate* JavaScript to cause the `userid`
    field on the form to grab focus (that is, the cursor appears in this field) when
    the page loads in the user’s web browser. The details of the generated JavaScript
    aren’t important, but the fact that Struts does this at all *is*. As you will
    see in this book, much of the power of Struts is in little conveniences like this.


    ## Data Input Tags


    Struts tags that accept data input must be placed within the `<html:form>` tag.
    Listing 8-1 contains four input tags:


    - `<html:text>` represents a text field.

    - `<html:password>` represents a password field. The text in this field is displayed
    as asterisks.

    - `<html:submit>` represents the submit button.

    - `<html:reset>` represents a reset button to clear the form.


    There are a number of other input tags (e.g., for radio buttons, lists, and drop-down
    lists), which are described in detail in Appendix C and in the lab sessions of
    subsequent chapters. In this chapter, we’ll concentrate on these four input tags
    only.


    The textual field tags `<html:text>` and `<html:password>` all have a `property`
    attribute that ties them to the field on the form. Each field *must* correspond
    to a `getXXX()` and `setXXX()` pair on the `ActionForm` subclass associated with
    the form handler. Exactly how the form handler links the JSP page with an `ActionForm`
    subclass is the subject of Chapter 9. For now, simply assume that each `<html:form>`
    has input fields corresponding to properties of an `ActionForm` subclass.


    For example, from Listing 8-1, we can deduce that the `ActionForm` subclass that
    handles the Registration data must have the functions `getUserid()` and `setUserid()`.
    And it does (refer to Listing 6-1).


    The text fields also accept a `size` attribute to allow you to specify the physical
    extent of the displayed field. This is just as you would expect for a text input
    field in HTML. In fact, all the input tags have attributes closely matching their
    HTML counterparts.


    The `<html:submit>` and `<html:reset>` tags represent the submit and reset buttons
    on the form, respectively. The `<bean:message>` tags enclosed by these tags tells
    Struts what labels to place on the buttons. Again, this approach allows easy internationalization,
    and also lends a more uniform look to your webapp.


    The reset button calls the `reset()` function on your `ActionForm` subclass (see
    step 4 of Lab 6). If one isn’t defined, the `super.reset()` function is called,
    which simply redisplays a blank form.


    ## Displaying Errors


    In the previous two chapters, you saw how validation error messages are generated.
    We’ll now describe how they are displayed.


    When a form fails validation (either simple or complex), an `ActionErrors` or
    `ActionMessages` object is created containing the error messages. Both `ActionErrors`
    and `ActionMessages` behave like Java `HashMap`s. The key of the `HashMap` corresponds
    to the `property` attribute of the `<html:errors>` tag. The associated value is
    the error message itself.


    However, unlike a `HashMap`, it’s possible to store *more* than one error message
    under the same key. This is obviously useful if there’s more than one error associated
    with a single field.


    When Struts loads a page, it checks if there are `ActionErrors` or `ActionMessages`
    for the page. If there are, it dutifully pastes the error messages in the right
    `<html:errors>` tags of the page. Figure 8-3 shows this process in action.


    As you can see, only errors whose keys are on *both* the `ActionErrors` (and `ActionMessages`)
    *and* the JSP page will be displayed. Every other error message or error tag is
    ignored.


    So, in Figure 8-3, only the error message for the property `userid` gets displayed.
    The error message for the property `desc` is ignored because there’s no corresponding
    `<html:errors>` tag.'
