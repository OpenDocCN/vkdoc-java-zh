    \ If you later decide to move a message from one file to another (common if you’re\
    \ consolidating an app to ensure uniformity of displayed messages or prompts),\
    \ then you’d have to change the bundle value of every tag that used that particular\
    \ message.\n\nSo you should try to avoid using this feature if possible.\n\nAn\
    \ alternative is to use a naming convention for keys, like the dot naming convention\
    \ (e.g., `app.error.prompt.login`) I’ve used for message keys throughout this\
    \ book. This lets you to create separate namespaces, and so obviates the need\
    \ for multiple message resource files.\n\nNow that you’re aware of the dangers,\
    \ here’s how you’d declare multiple message resource files in your `struts-config.xml`\
    \ file:\n\n```\n<message-resources parameter=\"Application\" />\n<message-resources\
    \ parameter=\"Application2\"\n    key=\"myOtherResourceFile\"/>\n```\n\nIn this\
    \ example, the second message resource file is `Application2.properties`, and\
    \ is stored in the same place as the default `Application.properties` file (that\
    \ is, in `/WEB-INF/classes/`).\n\nTo display a prompt from the default file, you’d\
    \ use\n\n```\n<bean:message key=\"app.error.prompt.login\" />\n```\n\nTo display\
    \ a prompt from the second file, you’d use\n\n```\n<bean:message bundle=\"myOtherResourceFile\"\
    \n    key=\"app.prompt.checkdata\" />\n```\n\nThe extra `bundle` attribute tells\
    \ Struts which message resource file to use.\n\n## Examples\n\nHere’s how to display\
    \ a message:\n\n```\n<bean:message key=\"app.prompt.login\" />\n```\n\nHere’s\
    \ how to use a JavaBean whose `toString()` results in a key:\n\n```\n<bean:message\
    \ name=\"myLoginMessageKey\" />\n```\n\nHere’s how to use a JavaBean whose property\
    \ gives a key:\n\n```\n<bean:message name=\"MyBean\" property=\"formatKey\" />\n\
    ```\n\nThis example calls `MyBean.getFormatKey()` and uses it as the message key.\
    \ `toString()` is called on the return value if necessary.\n\nIf the message has\
    \ replacement parameters, for example:\n\n```\napp.prompt.logoff=Logoff {0}\n\
    ```\n\nyou can use the following to perform the replacement (using EL):\n\n```\n\
    <bean:message-el key=\"app.prompt.logoff\" arg0=\"${user.name}\" />\n```\n\n##\
    \ Equivalents\n\nThere are equivalents in both JSTL and JSF. With JSTL, you’d\
    \ use the Formatting library:\n\n```\n<fmt:bundle basename=\"Application\">\n\
    \    <fmt:message key=\"app.prompt.logoff\">\n        <fmt:param value=\"${user.name}\"\
    />\n    </fmt:message>\n</fmt:bundle>\n```\n\nThis snippet is an equivalent for\
    \ the last example, with a single replacement parameter.\n\nIf you’re using JSF,\
    \ you might find it convenient to use the Struts-Faces library (see Chapter 20)\
    \ to expose the default message resource file:\n\n```\n<s:loadMessages var=\"\
    messages\"/>\n<h:outputFormat value=\"#{messages['app.prompt.logoff']}\">\n  \
    \  <f:param value=\"#{user.name}\"/>\n</h:outputFormat>\n```\n\nThis is the equivalent\
    \ of the previous JSTL example.\n\nLastly, there is `<s:message>` from the Struts-Faces\
    \ integration library.\n\n## `page`\n\nThis handy tag exposes objects from the\
    \ page context as variables that may be accessed with scriptlets or custom tags.\n\
    \nThe `PageContext` object is the central repository of all state for the current\
    \ page. This includes the session (`HttpSession`) and request (`HttpServletRequest`)\
    \ that were described in Chapter 2. There is more:\n\n- `application`: The `javax.servlet.ServletContext`\
    \ object, obtained by calling `pageContext.getServletContext()`.\n- `config`:\
    \ The `javax.servlet.ServletConfig` object, obtained by calling `pageContext.getServletConfig()`.\
    \ Don’t confuse this with Struts’ internal configuration objects.\n- `response`:\
    \ The `HttpServletResponse` object associated with the page.\n\nYou should consult\
    \ a recent reference on servlets (or Google the classname to get the JavaDoc)\
    \ to find out more about these objects.\n\n## Usage Restrictions"
  raw: '• It makes maintenance more difficult. This is because in addition to specifying
    the key, you’d have to indicate the bundle name (if it’s not the default one).
    If you later decide to move a message from one file to another (common if you’re
    consolidating an app to ensure uniformity of displayed messages or prompts), then
    you’d have to change the bundle value of every tag that used that particular message.


    So you should try to avoid using this feature if possible.


    An alternative is to use a naming convention for keys, like the dot naming convention
    (e.g., app.error.prompt.login) I’ve used for message keys throughout this book.
    This lets you to create separate namespaces, and so obviates the need for multiple
    message resource files.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048AppC.fm Page 428 Tuesday, January 17, 2006 4:46 PM


    **428**


    A P P E N D I X C ■ S T R U T S T A G R E F E R E N C E


    Now that you’re aware of the dangers, here’s how you’d declare multiple message
    resource files in your struts-config.xml file:


    <message-resources parameter="Application" />


    <message-resources parameter="Application2"


    key="myOtherResourceFile"/>


    In this example, the second message resource file is Application2.properties,
    and is stored in the same place as the default Application.properties file (that
    is, in /WEB-INF/


    classes/).


    To display a prompt from the default file, you’d use


    <bean:message key="app.error.prompt.login" /> To display a prompt from the second
    file, you’d use


    <bean:message bundle="myOtherResourceFile"


    key="app.prompt.checkdata" />


    The extra bundle attribute tells Struts which message resource file to use.


    Examples


    Here’s how to display a message:


    <bean:message key="app.prompt.login" />


    Here’s how to use a JavaBean whose toString() results in a key:


    <bean:message name="myLoginMessageKey" />


    Here’s how to use a JavaBean whose property gives a key:


    <bean:message name="MyBean" property="formatKey" /> This example calls MyBean.getFormatKey()
    and uses it as the message key. toString() is called on the return value if necessary.


    If the message has replacement parameters, for example:


    app.prompt.logoff=Logoff {0}


    you can use the following to perform the replacement (using EL):


    <bean:message-el key="app.prompt.logoff" arg0="${user.name}" />


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Doray_6048AppC.fm Page 429 Tuesday, January 17, 2006 4:46 PM


    A P P E N D I X C ■ S T R U T S T A G R E F E R E N C E


    **429**


    Equivalents


    There are equivalents in both JSTL and JSF. With JSTL, you’d use the Formatting
    library:


    <fmt:bundle basename="Application">


    <fmt:message key="app.prompt.logoff">


    <fmt:param value="${user.name}"/>


    </fmt:message>


    </fmt: bundle>


    This snippet is an equivalent for the last example, with a single replacement
    parameter.


    If you’re using JSF, you might find it convenient to use the Struts-Faces library
    (see Chapter 20) to expose the default message resource file:


    <s:loadMessages var="messages"/>


    <h:outputFormat value="#{messages[''app.prompt.logoff'']}">


    <f:param value="#{user.name}"/>


    </h:outputFormat>


    This is the equivalent of the previous JSTL example.


    Lastly, there is <s:message> from the Struts-Faces integration library.


    **page**


    This handy tag exposes objects from the page context as variables that may be
    accessed with scriptlets or custom tags.


    The PageContext object is the central repository of all state for the current
    page. This includes the session (HttpSession) and request (HttpServletRequest)
    that were described in Chapter 2\. There is more:


    • application: The javax.servlet.ServletContext object, obtained by calling pageContext.getServletContext().


    • config: The javax.servlet.ServletConfig object, obtained by calling pageContext.getServletConfig().
    Don’t confuse this with Struts’ internal configuration objects.


    • response: The HttpServletResponse object associated with the page.


    You should consult a recent reference on servlets (or Google the classname to
    get the JavaDoc) to find out more about these objects.


    Usage Restrictions'
