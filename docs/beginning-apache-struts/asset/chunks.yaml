    HTML 页面并将其提交给您的 Web 应用程序，并且它会被接受。如果您的代码不加思索地将这些表单数据直接转储到数据库中，问题可能会很严重。如果数据处理需要时间，您的
    Web 应用程序可能会变慢。在极端情况下，您的 Web 应用程序可能会崩溃。


