    `Login.do` 和 `Logoff.do` 都与 `ForwardAction` 关联，后者会转发到表单处理器 `parameter` 属性所指定的页面。对于
    `ForwardAction` 而言，此 `parameter` 属性是*必需的*。除此之外，`ForwardAction` 不执行任何处理。


    因此，从清单 14-19 的声明中可以明显看出，`Login.do` 和 `Logoff.do` 除了立即重新显示输入页面外，什么也不做！


    这看起来可能有点奇怪。为什么提交的页面会立即重新显示，而显然没有经过任何处理？答案当然是，输入页面（清单 14-14）包含一个嵌入的 Login `<tiles:insert>`。当输入页面重新显示时，嵌入的
    Tiles 组件也会被更新。在此更新过程中，会调用关联的 Tiles 控制器，表单数据才会被实际处理。


    我们从清单 14-14 中看到，被调用的定义是 `.login`。该定义的声明如下：


    <definition name=".login" path="/LoginController.do" /> 因此，Tiles 控制器就是名为 `LoginController.do`
    的表单处理器：


