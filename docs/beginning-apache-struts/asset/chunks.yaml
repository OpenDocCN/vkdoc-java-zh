    |--------|--------|-----|-------|---------------------|

    | Ease of upgrading | Easy | Easy | Difficult | If classic `Struts` remains backward
    compatible, then obviously it’s easy to upgrade. `JSF` is a mature spec, so you
    shouldn’t expect surprises there either. `Shale`, on the other hand, is changing
    (at the time of this writing), so you might experience difficulty upgrading to
    a newer version. |

    | Code reuse | Low | High | Average | Code reuse becomes important in more complex
    projects, so the ratings given here apply mainly to them. `JSF` was built with
    reuse and extensibility foremost. |

    | Modular Code | Low | Average | Average | It’s difficult to make modular code
    with `Struts` for complex webapps. You might have gotten a glimpse of this in
    Lab 14. It’s easy to create modular code with `JSF` if you know how, but it’s
    also easy to make a mess of it. Code modularity impacts maintenance and development.
    The more modular the code, the easier it is to maintain and develop. See the answer
    for the question raised in Chapter 1, given in Appendix D, for a short discussion
    of this. |


