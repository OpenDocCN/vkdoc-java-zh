  ***图 9-9.  **熟悉的 API 和结构**


  在接下来的代码清单中，主要有两个你之前没有真正见过的新结构。首先，你可以使用 `&` 符号（与符号）为自定义数据类型或结构体分配引用，而不是引用结构体本身。


  Poller: &telegram.LongPoller{Timeout: 10 * time.Second}


  你主要在两种情况下使用指针而不是结构体字面量：


  •  当结构体很大并且你将其传递时

  •  当结构体需要被共享时，即所有修改都影响该结构体，而不是影响其副本


