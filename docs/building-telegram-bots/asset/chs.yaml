  \ empty Git repository in /Users/niko/APRESS/crystal/mybot/.git/\n```\n\n![](img/index-61_1.jpg)\n\
  \n![](img/index-61_2.png)\n\n第 3 章 第 3 周：Crystal\n\n现在，如果你在 Visual Studio Code 中打开该文件夹并重新创建\
