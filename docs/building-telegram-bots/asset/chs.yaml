  \n**第二个 Nim 程序（仍然不是机器人）**\n\n在第二个示例中，我们将向一个远程站点发送 HTTP 请求，并将结果打印在命令行上。这个新程序需要来自不同\
  \ Nim 模块 `httpclient` 的一些代码，该模块包含可以发送 HTTP 请求并读取返回值的对象。你将使用关键字 `import` 来实现这一点。\n\
  \n代码的其余部分与 Python 语法非常相似，很容易阅读。\n\n```nim\nimport httpclient\n\nconst URL = \"https://api.github.com/search/repositories\"\
  \ &\n            \"?q=cat\" &\n            \"&sort=stars\" &\n            \"&order=desc\"\
  \n\nlet\n    client = newHttpClient()\necho client.getContent(URL)\n```\n\n![](img/index-38_1.jpg)\n\
  \n![](img/index-38_2.jpg)\n\n第 2 章 第 2 周：Nim\n\n我们首先看到创建了一个常量字符串 `URL`，它将是 HTTP\
  \ 请求的目标。`let` 定义了一个作用域变量，即 HTTP 客户端。最后，我们通过调用 HTTP 客户端的 `getContent` 方法，检索来自 HTTP\
  \ `get` 请求的响应体。\n\n现在让我们运行它，通过从命令面板调用 `Nim: Run selected file` 命令（图 2-7）。\n\n***图\
  \ 2-7.** 运行 HTTP 客户端*\n\n不幸的是，事情似乎进展不顺利，一条红色文本的消息显示出来，如图 2-8 所示。\n\n***图 2-8.**\
  \ 执行失败*\n\n幸运的是，它明确地告诉了你哪里出了问题，这对于一种编程语言来说相当不寻常。去问问 Java 开发者吧。\n\n![](img/index-39_1.jpg)\n\
  \n![](img/index-39_2.jpg)\n\n第 2 章 第 2 周：Nim\n\n发生的情况是，HTTP 连接需要 SSL，因为我们是通过 HTTPS\
  \ 连接的。在 Nim 源文件的编译步骤中，默认情况下不包含 SSL。\n\n要包含 SSL 支持，我们必须为 `nim` 命令定义一个符号，使用 `-d:ssl`\
  \ 标志，这样它将包含执行 HTTPS 请求所需的代码。\n\n如果你想在命令行或终端中尝试这个，你可以使用以下完整命令：\n\n```\nnim c -d:ssl\
  \ -r getsome.nim\n```\n\n上述命令将按预期编译并运行代码，最终输出从 `get` 请求返回的多行 JSON。\n\n但是……我知道你的感受。你想从\
