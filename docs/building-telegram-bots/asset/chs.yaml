  与此同时，你可能听说过 Elixir 有一个非常优秀的 Web 框架，名为 Phoenix。


  [`phoenixframework.org/`](https://phoenixframework.org/)


  你可以使用 `mix` 的 `phoenix.new` 子命令为 Phoenix 生成一个可直接编码的项目模板。


