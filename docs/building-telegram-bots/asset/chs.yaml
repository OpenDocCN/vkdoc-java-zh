  因为我不希望本章仅仅是一系列要点，我将重点放在 Erlang 运行时——虚拟机，而不是语言上。为了在 Erlang VM 上编码，我们将使用前缀为 Elixir
  的语言，该语言学习曲线较低，但也展现了强大的函数式编程概念（参见图 10-1 的漂亮徽标）。


