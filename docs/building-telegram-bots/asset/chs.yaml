  \ Telegram 库的代码所必需的。但是我们如何安装外部包呢？\n\n这是通过 Nimble 完成的。让我们看看它是如何工作的。\n\n**使用 Nimble\
  \ 安装 Nim 包**\n\n记住，你在本章开头安装了 Nimble。你现在将使用它来安装一个 Telegram API 的包装器。\n\n你可以使用 `search`\
