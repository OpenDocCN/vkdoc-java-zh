  \  Success: telebot installed successfully.\n```\n\n当然，你可以检查包是否已安装到你的机器上，使用：\n\n\
  ```\nnimble list -i\n```\n\n第 2 章 第 2 周：Nim\n\n或者使用 `uninstall` 移除包：\n\n```\nnimble\
  \ uninstall telebot\n```\n\n现在，你所需的一切都已安装到你的机器上，让我们终于开始用 Nim 编写我们的机器人吧！\n\n**第一个\
  \ Nim 机器人**\n\n在 Nim 中，你使用 `proc` 定义一个函数或过程。`proc` 接受一个函数名，这里是 `updateHandler`；一些参数，这里是类型为\
  \ `telebot` 的 `b` 和类型为 `Update` 的 `u`（都来自 `telebot` 模块）；以及有时一些元数据（或 pragma），这里是\
  \ `{.async.}`。\n\n你可以在 `nim-lang.org` 上找到任何模块的文档。例如，`asyncdispatch` 模块在这里：\n\n[`nim-lang.org/docs/asyncdispatch.html`](https://nim-lang.org/docs/asyncdispatch.html)\n\
  \n我们在这里使用 async 模块的原因是为了编写我们的 Telegram 机器人。\n\n**注意** 异步过程消除了处理回调的痛苦。它们允许你以与编写同步代码相同的方式编写异步代码。\n\
  \n`slurp` 函数获取文件的内容并将其转换为字符串——这里，是你在上一章中从 BotFather 收到的机器人 `API_KEY`。是的，你应该将你的密钥粘贴到一个新的\
  \ `secret.key` 文件中。以下是一个简单机器人的几行代码，它对你发送给它的任何内容都回复“hello”。\n\n```nim\nimport telebot,\
  \ asyncdispatch, options\n\nconst API_KEY = slurp(\"secret.key\")\n\nproc updateHandler(b:\
  \ Telebot, u: Update) {.async.} =\n```\n\n![](img/index-46_1.jpg)\n\n第 2 章 第 2 周：Nim\n\
  \n```nim\n    let\n     response = u.message.get\n     message = newMessage(response.chat.id,\
  \ \"hello\")\n    discard await b.send(message)\n\nlet bot = newTeleBot(API_KEY)\n\
  bot.onUpdate(updateHandler)\nbot.poll(300)\n```\n\n与你现有的机器人或向机器人父亲注册的新机器人开始一个新的聊天，将产生如图\
  \ 2-16 所示的对话。\n\n***图 2-16.** hello*\n\n![](img/index-47_1.jpg)\n\n第 2 章 第 2 周：Nim\n\
  \n**回复 Nim 机器人**\n\n既然你已经掌握了整个设置，创建第二个 Nim 机器人将相当简单。这个新机器人将内联回复，就像你直接回复另一个用户发送的消息一样。这是通过设置创建的消息对象上的\
  \ `replyToMessageId` 属性来完成的。\n\n请注意，如果你将消息对象保留在 `let` 块中声明，编译器会“抱怨”（双关语）该消息无法更新，因为它是不可变的（图\
  \ 2-17）。\n\n***图 2-17.** 使用 `let` 而不是 `var` 导致的编译错误*\n\n这是因为它是用 `let` 创建的，这使得对象不可变。为了解决这个问题，你只需用\
  \ `var` 声明消息对象即可。\n\n![](img/index-48_1.jpg)\n\n第 2 章 第 2 周：Nim\n\n```nim\nimport\
  \ telebot, asyncdispatch, options\n\nconst API_KEY = slurp(\"secret.key\")\n\nproc\
  \ updateHandler(b: Telebot, u: Update) {.async.} =\n  var response = u.message.get\n\
  \  if response.text.isSome:\n    let\n      text = response.text.get\n    var message\
  \ = newMessage(response.chat.id, text)\n    message.replyToMessageId = response.messageId\n\
  \    discard await b.send(message)\n\nlet bot = newTeleBot(API_KEY)\nbot.onUpdate(updateHandler)\n\
  bot.poll(300)\n```\n\n机器人现在会告诉你它正在回复哪条消息（图 2-18）。\n\n***图 2-18.** hello, hello*\n\
  \n**猫和狗 Nim 机器人**\n\n下一个机器人只是对前一个机器人的轻微更新。我们将使用 `newPhoto` 而不是 `newMessage` 来创建消息，这允许我们在发送给用户的消息中嵌入一张图片。\n\
  \n为此，你必须在 Nim 文件旁边有动物的图片（例如 `cat.jpg` 和 `dog.jpg`）。\n\n第 2 章 第 2 周：Nim\n\n在 Nim\
  \ 代码中，文件的路径以 `file://` 为前缀，我们还通过设置照片消息的 `caption` 字段为图片添加标题。\n\n这给出了：\n\n```nim\n\
  import telebot, asyncdispatch, options\n\nconst API_KEY = slurp(\"secret.key\")\n\
  \nproc updateHandler(bot: TeleBot, update: Update) {.async.} =\n  var response =\
  \ update.message.get\n  if response.text.isSome:\n    let\n         animal = response.text.get\n\
  \         file = \"file://\" & animal & \".jpg\"\n    var message = newPhoto(response.chat.id,\
  \ file)\n    message.caption = animal\n    discard await bot.send(message)\n\nlet\n\
  \  bot = newTeleBot(API_KEY)\nbot.onUpdate(updateHandler)\nbot.poll(300)\n```\n\n\
  启动这个机器人后，当你向它发送关键字时，它会回复一张给定关键字的加载好的图片，并附上动物的标题（图 2-19）。\n\n![](img/index-50_1.jpg)\n\
  \n第 2 章 第 2 周：Nim\n\n***图 2-19.** 猫和狗*\n\n当然，如果你输入一个没有对应文件的动物，机器人将无法回答。\n\n所以，一个小练习是向用户发送一个回复，例如“找不到该文件。”\n\
  \n在这个 Nim 章节中，我们花了很多时间设置 Visual Studio Code，但现在你比以往任何时候都更有准备去应对其他语言的机器人。\n\n**第\
  \ 3 章**\n\n**第 3 周：Crystal**\n\n*彗星，带来时代和状态的变迁，*\n\n*在天空中挥舞你水晶般的发丝，……*\n\n—William\
  \ Shakespeare\n《亨利六世》第一部，第一幕，第一场\n\nCrystal 是一种新的编程语言，其语法深受 Ruby 影响，以至于感觉就像在写 Ruby。与\
  \ Ruby 的主要区别在于 Crystal 被编译成 C，因此速度非常快。\n\nCrystal 具有许多优点，例如完全支持简单的并发模型、宏、强类型检查，以及我最喜欢的一点：通过直接\
  \ Git 访问完全支持依赖项，无需打包，也无需总是中断的中央仓库。\n\n在本章中，除了使用 Crystal 开发机器人之外，你还将学习编写你的第一个机器人命令。你会记得我们在与机器人父亲对话时使用过命令来创建我们的机器人。是的，它们是相同的！（见图\
  \ 3-1）。\n\n© Nicolas Modrzyk 2019\nN. Modrzyk, *构建 Telegram 机器人*, `doi.org/10.1007/978-1-4842-4197-4_3`\n\
  \n![](img/index-52_1.png)\n\n第 3 章 第 3 周：Crystal\n\n***图 3-1.** BotFather 命令*\n\n\
  **设置 Crystal**\n\nCrystal 网站上已经有一堆安装步骤，所以我们在这里尽量简化。\n\n[`crystal-lang.org/docs/installation/index.html`](https://crystal-lang.org/docs/installation/index.html)\n\
  \n但是请注意，对于 Windows 用户，Crystal 只能与 Windows Subsystem for Linux (WSL) 一起使用，这需要最新版本的\
  \ Windows 10。在 macOS 上，Crystal 可以通过 homebrew 轻松安装，如下所示：\n\n```\nbrew install crystal\n\
  ```\n\n第 3 章 第 3 周：Crystal\n\n当你使用 homebrew 安装 Crystal 时，你可以看到 Crystal 编译器本身是用 Crystal\
  \ 编写的，`.cr` 是 Crystal 文件的常见扩展名。\n\n```\nbin/crystal build -D without_openssl -D\
  \ without_zlib -o .build/crystal src/compiler/crystal.cr --release --no-debug\n\
  ```\n\n在我最喜欢的基于 Arch Linux 的 Manjaro Linux 上，Pacman 也直接提供了它。\n\n```\npacman -S crystal\
  \ shards\n```\n\n在其他发行版上，你必须在运行 `yum`、`apt-get` 等之前安装一个新的仓库。\n\n一旦 Crystal 安装完毕，你应该检查\
  \ `crystal` 以及 Crystal 包管理器 `shards` 是否已安装。\n\n```\nSuperPinkicious:withcrystal\
  \ niko$ crystal --version\nCrystal 0.26.1 (2018-09-06)\nLLVM: 6.0.1\nDefault target:\
  \ x86_64-apple-macosx\n\nSuperPinkicious:withcrystal niko$ shards --version\nShards\
  \ 0.8.1 (2018-09-06)\n```\n\n**在游乐场小试牛刀**\n\n安装后，Crystal 实际上可以作为独立环境在所谓的游乐场中使用。你可以使用\
  \ `play` 命令将训练环境作为 Web 服务器启动。\n\n```\ncrystal play\n```\n\n这将在默认端口 8080 上启动一个 Web\
  \ 服务器。你也可以使用 `-p` 标志在不同的端口上启动游乐场。\n\n```\ncrystal play -p 8090\n```\n\n![](img/index-54_1.jpg)\n\
  \n![](img/index-54_2.jpg)\n\n第 3 章 第 3 周：Crystal\n\n你可以在左侧面板中键入代码，并直接在右侧看到逐行执行的结果（图\
  \ 3-2）。\n\n***图 3-2.** Crystal 嵌入式开发环境*\n\nCrystal 的纯粹速度可以通过运行一些 CPU 密集型函数来快速体会到，例如，老牌的斐波那契数列（图\
  \ 3-3）。\n\n***图 3-3.** 斐波那契*\n\n第 3 章 第 3 周：Crystal\n\n包含基准测试代码的列表如下：\n\n```crystal\n\
  require \"benchmark\"\n\ndef fib(n : UInt64)\n  raise \"fib not defined for negative\
  \ numbers\" if n < 0\n  new, old = 1_u64, 0_u64\n  n.times {new, old = new + old,\
  \ new}\n  old\nend\n\ndef time(&block)\n  puts Benchmark.measure(&block).real\n\
  end\n\ntime { fib(1000000000_u64) }\n```\n\n当执行时，就像这里一样，在一台简单的 MacBook 上，它花费的时间远少于五秒。所以，我们在这里，Crystal\
  \ 是一种简单而快速的语言。\n\n但是，让我们回过头来，在使用 Visual Studio Code 编写和键入代码时欣赏它。\n\n**再次使用 Visual\
  \ Studio Code**\n\n你将编写一个小程序，根据 GitHub 搜索查询获取 GitHub 项目的 URL。从对 GitHub 的 HTTP 请求返回的数据将是\
  \ JSON 格式，因此我们也必须使用一些 JSON 解析来解码它。\n\n在一个新文件 `requesting.cr` 中，让我们编写将发送请求并在控制台中显示它的代码。\n\
  \n```crystal\nrequire \"http/client\"\nrequire \"json\"\n```\n\n![](img/index-56_1.jpg)\n\
  \n第 3 章 第 3 周：Crystal\n\n```crystal\ndef search_github(q : String)\n  url = \"https://api.github.com/search/repositories?q=#{q}\"\
  \n  HTTP::Client.get(url) do |response|\n    res = response.body_io.gets.to_s\n\
  \    json = JSON.parse(res)\n    json[\"items\"][0][\"url\"]\n  end\nend\n\nputs\
  \ search_github(\"dog\")\n```\n\n正如你所欣赏的，语法真的、真的非常接近 Ruby。同时，请注意参数的可选类型标注 `q : String`。\n\
  \nHTTP 客户端和 JSON 解析器是核心语言的一部分，因此，运行此代码片段不需要第三方库。\n\n一旦你在文件中键入了代码，Visual Studio Code\
  \ 会像往常一样，建议你在 Marketplace 中寻找一个插件（图 3-4）。\n\n***图 3-4.** 在 Marketplace 中寻找 crystals*\n\
  \n![](img/index-57_1.png)\n\n第 3 章 第 3 周：Crystal\n\n我使用 Gerardo Ortega 的 Crystal\
