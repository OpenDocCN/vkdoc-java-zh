  \ 空的——真的，真的，空的——机器人*\n\n这可能不是你见过的最激动人心的程序。让我们稍微更新一下 `mybot.cr` 的代码，在文件底部添加一个打印语句。\n\
  \n```crystal\nputs Mybot::VERSION\n```\n\n当然，你可以直接从 Visual Studio Code 执行它（图 3-11）。\n\
  \n***图 3-11.** 打印版本*\n\n第 3 章 第 3 周：Crystal\n\n你也可以使用 `run` 子命令从命令行执行。\n\n```\n\
  SuperPinkicious:mybot niko$ crystal run src/mybot.cr\n0.1.0\n```\n\n有趣的是，你也可以使用\
  \ `build` 命令将相同的代码编译成二进制文件。\n\n```\ncrystal build src/mybot.cr\n```\n\n然后，直接调用编译后的文件将执行相同的打印语句，但这次是作为二进制文件，不依赖于\
  \ Crystal 构建系统。\n\n```\n./mybot\n>0.1.0\n```\n\n你用 `build` 命令编译的任何代码都会给你一个可以随意重用的可执行文件。这包括即将到来的\
  \ Telegram 机器人。太棒了。\n\n现在，我们最初想要创建一个 Crystal 项目的原因是为了能够添加机器人 API 依赖项来编写 Crystal\
  \ 代码。在项目文件夹中，有一个名为 `shard.yml` 的文件。这是负责处理项目的元数据文件，类似于 Java 中的 `pom.xml` 或 `build.gradle`，或\
  \ JavaScript 中的 `package.json` 文件。\n\n`shard.yml` 文件的内容如下所示，末尾添加了 `telegram_bot`\
  \ 依赖项。\n\n```yaml\nname: mybot\nversion: 0.1.0\nauthors:\n  - Nicolas Modrzyk <hellonico\
  \ at gmail.com>\ntargets:\n  mybot:\n    main: src/mybot.cr\n```\n\n第 3 章 第 3 周：Crystal\n\
  \n```yaml\ncrystal: 0.26.1\nlicense: MIT\ndependencies:\n  telegram_bot:\n    github:\
  \ hangyas/telegram_bot\n```\n\n依赖项在项目的 `shard.yml` 文件中定义后，你现在可以使用 Crystal 的包管理器\
  \ `shards` 命令来检索该依赖项。\n\n```\nSuperPinkicious:mybot niko$ shards\nFetching https://github.com/hangyas/telegram_bot.git\n\
  Installing telegram_bot (0.1.0 at HEAD)\n```\n\n你会注意到已经创建了一个锁文件，其中包含依赖项以及每个依赖项所引用的提交哈希。\n\
  \n```yaml\nversion: 1.0\nshards:\n  telegram_bot:\n    github: hangyas/telegram_bot\n\
  \    commit: 722bab24876d13a661f513b09c4569916f7a81c1\n```\n\n这几乎就是你编写基于 Crystal\
  \ 的 Telegram 机器人所需的全部内容，所以让我们通过一个简单的回声机器人来看看所有这些是如何运作的。\n\n第 3 章 第 3 周：Crystal\n\
  \n**回声机器人**\n\n结合你在本章和上一章中看到的所有内容，接下来的代码应该不难阅读。我们首先在构造函数 `initialize` 函数中设置机器人的名称和秘密的\
  \ Telegram API 密钥。然后我们继续实现 `handle` 函数，该函数接收一个消息作为参数，并使用传入消息中读取的文本进行回复。最后，我们创建一个新的机器人，并将其连接定义为轮询。\n\
  \n```crystal\nrequire \"telegram_bot\"\n\nclass EchoBot < TelegramBot::Bot\n  def\
  \ initialize\n    super(\"MyBot\", File.read(\"secret.key\"))\n  end\n\n  def handle(message\
  \ : TelegramBot::Message)\n    if text = message.text\n      reply message, text\n\
  \    end\n  end\nend\n\nEchoBot.new.polling\n```\n\n然后我们再次使用 Command(Ctrl)+Shift+B\
  \ 快捷键执行机器人（图 3-12）。\n\n![](img/index-65_1.jpg)\n\n第 3 章 第 3 周：Crystal\n\n***图 3-12.**\
  \ 启动机器人*\n\n回到与这个新机器人的聊天。你可以确认找到了一只漂亮的鹦鹉，无论你说什么，它都会重复（图 3-13）。\n\n![](img/index-66_1.jpg)\n\
  \n第 3 章 第 3 周：Crystal\n\n***图 3-13.** echo, echo, hello, hello*\n\n那是一个简单的机器人。让我们继续做一些更令人兴奋的事情，使用命令机器人。\n\
  \n**命令机器人**\n\nTelegram 理解命令的概念。简单地说，命令就是发送给机器人的一条消息。然而，我们知道，它接受一系列参数，这有助于我们编写更易读的代码，而无需对消息进行复杂的解析。\n\
  \n当收到一条传入消息时，机器人会首先尝试为其找到一个已实现的命令。如果没有找到，它将使用标准的 `handle` 函数。\n\n第 3 章 第 3 周：Crystal\n\
  \n我们的第一个机器人将实现一个 `hello` 命令，该命令不接受参数，只回复消息，就像 `handle` 函数会做的那样。\n\n代码如下：\n\n```crystal\n\
  require \"telegram_bot\"\n\nclass CommandOneBot < TelegramBot::Bot\n  include TelegramBot::CmdHandler\n\
  \n  def initialize\n    super(\"MyBot\", File.read(\"secret.key\"))\n    cmd \"\
  hello\" do |msg|\n      send_message msg.chat.id, \"world\"\n    end\n  end\nend\n\
  \nmy_bot = CommandOneBot.new\nmy_bot.polling\n```\n\n与你目前看到的代码的唯一区别是 `cmd` 块。该块接受一个字符串作为标识符，在其最简单的形式中，消息作为块的参数。从聊天中发送命令只需要一个前缀和发送给机器人的命令名称（图\
  \ 3-14）。\n\n![](img/index-68_1.png)\n\n第 3 章 第 3 周：Crystal\n\n***图 3-14.** hello\
  \ 命令*\n\n现在，进入我们的第二个机器人。第二个机器人将使用传递给命令的参数来发送图像作为回复。\n\n这次，我们将使用 `send_photo` 而不是\
  \ `send_message`，根据参数将图像发送回聊天。\n\n```crystal\nrequire \"telegram_bot\"\n\nclass\
  \ CommandOneBot < TelegramBot::Bot\n  include TelegramBot::CmdHandler\n\n  def initialize\n\
  \    super(\"MyBot\", File.read(\"secret.key\"))\n    cmd \"animals\" do |msg, params|\n\
  \        send_photo msg.chat.id, File.new(\"#{params[0]}.jpg\")\n    end\n  end\n\
  end\n\nmy_bot = CommandOneBot.new\nmy_bot.polling\n```\n\n现在，假设你的项目文件夹中有一些与动物名称匹配的图片，`/animals`\
  \ 命令将获取图像文件并将其发送回聊天室（图 3-15）。\n\n![](img/index-69_1.jpg)\n\n第 3 章 第 3 周：Crystal\n\
  \n***图 3-15.** /animals 很可爱！*\n\n现在，你可以尝试一些不同的命令，使用其他机器人 API 功能。\n\nCrystal 的 `telegram_bot`\
  \ 实现了大部分 Telegram 机器人 API，以下是可用于向聊天发送消息和媒体类型的不同函数列表。\n\n• `send_message`\n• `send_photo`\n\
  \n第 3 章 第 3 周：Crystal\n\n• `send_audio`\n• `send_document`\n• `send_sticker`\n•\
