  \ package)\n\n│   ├── gettext ~> 0.10 (Hex package)\n\n│   └── tzdata ~> 0.1.8 or\
  \ ~> 0.5 (Hex package)\n\n│       └── hackney ~> 1.0 (Hex package)\n\n│        \
  \   ├── certifi 2.4.2 (Hex package)\n\n│           │   └── parse_trans ~>3.3 (Hex\
  \ package)\n\n│           ├── idna 6.0.0 (Hex package)\n\n│           │   └── unicode_util_compat\
  \ 0.4.1 (Hex package)\n\n│           ├── metrics 1.0.1 (Hex package)\n\n│      \
  \     ├── mimerl 1.0.2 (Hex package)\n\n│           └── ssl_verify_fun 1.1.4 (Hex\
  \ package)\n\n└── telegram (https://github.com/visciang/telegram.git)\n\n    ├──\
  \ tesla ~> 1.0 (Hex package)\n\n    │   ├── hackney ~> 1.6 (Hex package)\n\n   \
  \ │   ├── jason >= 1.0.0 (Hex package)\n\n    │   └── mime ~> 1.0 (Hex package)\n\
  \n    ├── hackney ~> 1.9 (Hex package)\n\n    └── jason ~> 1.0 (Hex package)\n\n\
  Telegram 有时似乎也需要事先重新编译依赖项，这可以通过 `mix deps.compile` 完成（如果需要，也可以事先执行 `mix deps.clean`）。\n\
  \n第 10 章 第 10 周：Elixir\n\n$ mix deps.compile\n\n===> Compiling parse_trans\n\n===>\
  \ Compiling mimerl\n\n===> Compiling metrics\n\n===> Compiling unicode_util_compat\n\
  \n===> Compiling idna\n\n===> Compiling ssl_verify_fun\n\n===> Compiling certifi\n\
  \n===> Compiling hackney\n\n现在，终于到了更有趣的部分：使用 `mix` 和 Telegram。\n\n** 获取某些内容**\n\n\
  在本节中，我们将直接向 Telegram API 发送一些请求。为了进行身份验证，所有这些调用都将使用机器人令牌。\n\n** GetMe**\n\n让我们尝试使用我们的本地机器人向\
  \ Telegram API 发送一个简单的请求。你会记得下面的 `GetMe` 方法：\n\n[`core.telegram.org/bots/api#getme`](https://core.telegram.org/bots/api#getme).\n\
  \n我们将从一个 `iex/mix` 会话发送请求。\n\n$ iex -S mix\n\n首先，我们从配置文件中加载令牌，所以请确保此时你已经将令牌正确插入到\
  \ `config/config.exs` 中。\n\niex(1)> token = Application.get_env(:telegrambot, :token)\n\
  \n\"585672177:..\"\n\n第 10 章 第 10 周：Elixir\n\n然后，我们可以使用令牌和 `getMe` 请求调用 Telegram\
  \ API。\n\niex(2)> Telegram.Api.request(token, \"getMe\")\n\n{:ok,\n\n %{\n\n   \"\
  first_name\" => \"chapter01\",\n\n   \"id\" => 585672177,\n\n   \"is_bot\" => true,\n\
  \n   \"username\" => \"chapter01bot\"\n\n }}\n\n请求已成功发送，我们可以使用标准的 Telegram `User`\
  \ 对象，其中包含机器人名称和机器人 ID。\n\n** GetChat**\n\n`getChat` Telegram 函数的文档位于 [`core.telegram.org/bots/api#getchat`](https://core.telegram.org/bots/api#getchat)。与无需参数即可调用的\
  \ `getMe` 函数不同，`getChat` 需要一个 `chat_id`。\n\n使用 Telegram 库发送请求时附带的参数只需附加到请求调用中即可。\n\
  \n让我们在同一个 `iex` 会话中看看实际效果。\n\niex(8)> Telegram.Api.request(token, \"getChat\", chat_id:\
  \ 121843071)\n\n{:ok,\n\n %{\n\n   \"first_name\" => \"Nico\",\n\n   \"id\" =>1218430..,\n\
  \n   \"last_name\" => \"Nico\",\n\n   \"photo\" => %{\n\n     \"big_file_id\" =>\n\
  \n\"AQADBQADQakxG38tQwcACAox1TIABLM4sAnsmf3pPM4AAgI\",\n\n第 10 章 第 10 周：Elixir\n\
  \n     \"small_file_id\" =>\n\n\"AQADBQADQakxG38tQwcACAox1TIABCSohuBN4Zh1Os4AAgI\"\
  \n\n   },\n\n   \"type\" => \"private\",\n\n   \"username\" => \"hellonico\"\n\n\
  \ }}\n\n像往常一样，响应状态和结构会打印在会话的输出中。\n\n** GetFile**\n\n你可能已经注意到，在前面的代码片段中调用 `getChat`\
  \ 时，用户资料中有一个文件 ID。让我们尝试使用 `getFile` 检索该文件。\n\n`getFile` 函数的详细信息位于机器人 API 中：\n\n\
  [`core.telegram.org/bots/api#getfile`](https://core.telegram.org/bots/api#getfile)\n\
  \n因此，在同一个 `iex` 会话中，我们使用以下代码：\n\nTelegram.Api.request(token, \"getFile\", file_id:\n\
  \n\"AQADBQADQakxG38tQwcACAox1TIABLM4sAnsmf3pPM4AAgI\")\n\n{:ok,\n\n %{\n\n   \"\
  file_id\" =>\n\n\"AQADBQADQakxG38tQwcACAox1TIABLM4sAnsmf3pPM4AAgI\",\n\n   \"file_path\"\
  \ => \"profile_photos/file_10.jpg\",\n\n   \"file_size\" => 35814\n\n }}\n\n啊，对了……Telegram\
  \ API 总是返回一个文件路径，用于从其网站下载。\n\n![](img/index-230_1.jpg)\n\n第 10 章 第 10 周：Elixir\n\
  \n** 使用 Elixir 的系统命令**\n\n要下载上述文件路径，请记住之前使用的技巧，避免需要额外的第三方库。我们只需使用 `curl`，此时它应该已经安装在本地机器上。\n\
  \n在 Elixir 中，调用系统命令是通过 `System.cmd` 完成的。从 `file_path` 下载文件的 HTTP URL 使用以下规则构建：\n\
  \n[`api.telegram.org/file/bot<token>/<file_path>`](https://api.telegram.org/file/bot)\n\
  \n其中 `file_path` 的形式为：`profile_photos/file_10.jpg`。这样就得到了完整的代码。\n\n{:ok, res} =\
  \ Telegram.Api.request(token, \"getChat\", chat_id: 121843071)\n\nfileId = res[\"\
  photo\"][\"big_file_id\"]\n\n{:ok, res2} = Telegram.Api.request(token, \"getFile\"\
  , file_id:\n\n\"#{fileId}\")\n\nSystem.cmd(\"curl\",\n\n[\"-O\", \"https://api.telegram.org/file/bot#{token}/#{res2[\"\
  file_\n\npath\"]}\"])\n\n然后显示了作者的个人资料图片（图 10-5）。\n\n***图 10-5. 沙滩球，不是 OS X 的那个***\n\
  \n![](img/index-231_1.jpg)\n\n第 10 章 第 10 周：Elixir\n\n** SendPhoto**\n\n有时候，重要的不是你能得到什么，而是你能给予什么。遵循相同的模式，你可以使用\
  \ `sendPhoto` 发送图片，其构造完全相同。\n\ntoken = Application.get_env(:telegrambot, :token)\n\
  \nchat_id = 121843071\n\nphoto = \"cat.jpg\"\n\nTelegram.Api.request(token, \"sendPhoto\"\
  , chat_id: chat_id, photo: {:file, photo})\n\n只要你已将 `cat.jpg` 复制到你的项目文件夹中，Telegram\
  \ 聊天中就会显示常见的猫咪图片（图 10-6）。\n\n***图 10-6. 这不是 Marcel，但这是一只猫***\n\n你可能已经意识到，所有这些都可以直接从\
  \ Visual Studio Code 中运行，使用本章开头定义的用于运行 .exs 文件的任务。试试看（图 10-7）。\n\n![](img/index-232_1.jpg)\n\
  \n第 10 章 第 10 周：Elixir\n\n***图 10-7. 直接从你的编辑器运行……***\n\n** Telegram 机器人**\n\n本章的篇幅已经超出了最佳页数，所以我将快速介绍一下如何创建和运行一个机器人，以及如何为这个新机器人实现几个命令。\n\
  \n** 机器人 1：无所不包**\n\n第一个机器人会将接收到的更新的完整数据结构发送回聊天。看看在调用 `use` 之后，令牌是如何传递给 `Telegram.Bot`\
  \ 库的？\n\ndefmodule Bot1 do\n\n  use Telegram.Bot,\n\n    token: Application.get_env(:telegrambot,\
  \ :token),\n\n    username: \"chapter01bot\",\n\n    purge: true\n\n第 10 章 第 10\
  \ 周：Elixir\n\n  message do\n\n    request(\n\n      \"sendMessage\",\n\n      chat_id:\
  \ update[\"chat\"][\"id\"],\n\n      text: \"嘿！你发给我一条消息：#{inspect(update)}\"\n\n\
  \    )\n\n  end\n\nend\n\n{:ok, _} = Bot1.start_link()\n\nProcess.sleep(:infinity)\n\
  \n最后两行在一个单独的线程中启动机器人，并告诉主线程永远休眠。还要注意，对 `sendMessage` 的请求是上一节所做操作的重复。\n\n** 机器人 2：斐波那契**\n\
  \n我们的第二个机器人将实现一个命令，可以为你计算斐波那契数并将结果发送回聊天。使用 Telegram 库的命令只需使用 `command` 定义即可。命令名称是\
  \ `command` 的第一个参数，后面跟着可能的参数。\n\n`command` 块本身可以访问来自 Telegram 的更新对象。尽管你不太容易看到，但\
  \ Elixir 在底层具有函数式编程的基因，大多数调用都是使用 `apply` 完成的。\n\n这一点在你必须使用 `Enum.at` 来获取列表中特定元素的索引时尤为明显，这里是第一个元素，所以索引为\
  \ 0。\n\n    command \"fib\", args do\n\n        {intVal, \"\"} = Integer.parse(Enum.at(args,0))\n\
  \n         request(\"sendMessage\", chat_id: update[\"chat\"][\"id\"], text: \"\
  Fib[#{intVal}] = #{Fib.fib(intVal)}\")\n\n    end\n\n第 10 章 第 10 周：Elixir\n\n这里，`Fib`\
  \ 在一个单独的 `Fib` 模块中定义，如下面的完整代码所示，其中添加了一个简单的递归斐波那契实现。\n\ndefmodule Fib do\n\n    def\
  \ fib(0) do 0 end\n\n    def fib(1) do 1 end\n\n    def fib(n) do fib(n-1) + fib(n-2)\
  \ end\n\nend\n\ndefmodule Bot2 do\n\n  use Telegram.Bot,\n\n    token: Application.get_env(:telegrambot,\
  \ :token),\n\n    username: \"chapter01bot\",\n\n    purge: true\n\n    command\
  \ \"fib\", args do\n\n        {intVal, \"\"} = Integer.parse(Enum.at(args,0))\n\n\
  \         request(\"sendMessage\", chat_id: update[\"chat\"][\"id\"], text: \"Fib[#{intVal}]\
  \ = #{Fib.fib(intVal)}\")\n\n    end\n\n    any do\n\n       IO.puts \"not found\"\
  \n\n    end\n\nend\n\n{:ok, _} = Bot2.start_link()\n\nProcess.sleep(:infinity)\n\
  \n另外，避免在第二个机器人的底部使用 `any` 函数来处理所有消息。\n\n最后，你可以在你的新机器人中定义 Telegram API 支持的所有其他消息，为了方便起见，这里直接从\
  \ Telegram 库中重新列出了可以放在机器人中的可能块列表。\n\n第 10 章 第 10 周：Elixir\n\n  edited_message do\n\
  \n    # 处理代码\n\n  end\n\n  channel_post do\n\n    # 处理代码\n\n  end\n\n  edited_channel_post\
  \ do\n\n    # 处理代码\n\n  end\n\n  inline_query _query do\n\n    # 处理代码\n\n  end\n\
  \n  chosen_inline_result _query do\n\n    # 处理代码\n\n  end\n\n  callback_query do\n\
  \n    # 处理代码\n\n  end\n\n  shipping_query do\n\n    # 处理代码\n\n  end\n\n  pre_checkout_query\
  \ do\n\n    # 处理代码\n\n  end\n\n此外，`api.ex` 文件中的代码还有一些与键盘和内联查询相关的代码结构示例。\n\n[`github.com/visciang/telegram/blob/master/lib/api.ex`](https://github.com/visciang/telegram/blob/master/lib/api.ex)\n\
  \n**第 11 章**\n\n**第 11 周：Node.js**\n\n*“JavaScript 的优势在于你可以做任何事情。*\n\n*其劣势在于你确实会去做。”*\n\
  \n—Reg Braithwaite\n\n为了内容的完整性，本书也介绍了 Node.js 和 Telegraf，这是从 Node.js 处理 Telegram\
  \ 的库。使用 Telegraf，Node.js 可能拥有与 Telegram 交互的最简单的库之一的特权。\n\n在本章中，我将主要关注如何在 RunKit.com\
  \ 上运行 Telegram Bot。RunKit 是一项云服务，允许你在云端运行一个 Node.js 实例，而无需在本地安装任何东西，从而将编写和部署 Telegram\
  \ 机器人所需的时间缩短到几分钟。\n\n在云端运行也使我们能够为 Telegram 设置必要的 webhook。基本上，webhook 是对你迄今为止看到的\
  \ Telegram 机器人轮询方法的替代，它使用一个 URL，Telegram API 会在有新消息时调用该 URL，从而避免不必要的轮询流量。为了提供一个能够响应\
  \ Telegram 的 POST 请求的最小运行服务器，我们将使用 Koa 库（ExpressJS 的替代品）来设置与 Telegraf 的集成。\n\n兴奋吗？让我们踏上\
  \ Node.js 之路。\n\n© Nicolas Modrzyk 2019\n\nN. Modrzyk, *构建 Telegram 机器人*, `doi.org/10.1007/978-1-4842-4197-4_11`\n\
  \n![](img/index-237_1.png)\n\n第 11 章 第 11 周：Node.js\n\n** 认识 RunKit**\n\n在本节中，你将了解如何创建\
  \ RunKit 帐户、运行第一个 Node.js 程序，然后编写并发布一个基于 Koa 的简单服务。\n\nRunKit 最初是一个浏览器中的 Node.js\
  \ 游乐场。你可以访问 RunKit 主页 [`runkit.com`](https://runkit.com)（图 11-1）。\n\n***图 11-1.\
  \ RunKit 主页***\n\nRunKit 用于编写测试代码、获取和显示数据、共享代码以及直接在云端运行服务器代码。\n\n** 创建帐户**\n\n要创建帐户，你可以在\
  \ RunKit.com 上注册，使用你的 GitHub 帐户或标准的用户名密码组合（图 11-2）。\n\n![](img/index-238_1.png)\n\
  \n第 11 章 第 11 周：Node.js\n\n***图 11-2. 创建你的 RunKit 帐户***\n\n登录后，你会看到一个简单的界面，左侧有一个菜单，主要用于创建新的游乐场，页面中央是你已经（将要）创建的游乐场列表（图\
  \ 11-3）。\n\n![](img/index-239_1.png)\n\n![](img/index-239_2.png)\n\n第 11 章 第 11\
  \ 周：Node.js\n\n***图 11-3. RunKit 个人页面***\n\n如果你按下左侧的 + 按钮，你会被引导到一个空的游乐场页面（图 11-4）。\n\
  \n***图 11-4. RunKit 空游乐场页面***\n\n![](img/index-240_1.png)\n\n第 11 章 第 11 周：Node.js\n\
  \n** RunKit 上的第一段代码**\n\n毫不意外，你可以直接输入任何你想写的 JavaScript 代码。那么，让我们从打个招呼开始，如图 11-5\
  \ 所示。\n\n***图 11-5. 用 RunKit 说“hello”***\n\n执行可以通过点击运行按钮或按 shift+return 键完成。执行的每一行结果都会显示在下方。\n\
  \n假设你想快速计算一些斐波那契数……你可以自己实现，一个可能的实现如下所示。\n\nfunction myfibonacci(num) {\n\n  if (num\
  \ <= 1) return 1;\n\n  return myfibonacci(num - 1) + myfibonacci(num - 2);\n\n}\n\
  \nconsole.log(myfibonacci(39));\n\n或者，你也可以通过 RunKit 引入一个 Node.js 库（你可以在 [`npm.runkit.com`](https://npm.runkit.com)\
  \ 查看）。\n\n例如，你可以简单地引入一个库，比如 `fibonacci-fast`，直接从游乐场计算这些数字。\n\n![](img/index-241_1.jpg)\n\
  \n第 11 章 第 11 周：Node.js\n\nvar fibonacci = require('fibonacci-fast');\n\nvar result\
  \ = fibonacci.get(39    ).number.toString();\n\nconsole.log(result);\n\n游乐场会使该库对你的笔记本可用，而无需你安装或下载任何东西。无论是否使用库，效果都一样，如图\
  \ 11-6 所示。\n\n***图 11-6. 自己编写或引入库***\n\n注意，导入到笔记本中的库版本会显示在 `require` 语句旁边。\n\n**\
  \ 某种 Koa 框架**\n\nKoa 是 Node.js 的下一代 Web 框架。它建立在 Express JS 多年经验的基础上，更易于学习和维护。Koa\
  \ 的主页可以在 [`koajs.com/#application`](https://koajs.com/#application) 找到。\n\n![](img/index-242_1.png)\n\
  \n第 11 章 第 11 周：Node.js\n\n根据你对 RunKit 游乐场的了解，你可能已经感觉到你可以引入 Koa 库并启动一个服务器。\n\n下面是从\
  \ Koa 示例中摘取的一个简短代码片段：\n\nconst Koa = require('koa');\n\nconst app = new Koa();\n\
  \napp.use(async ctx => {\n\n  ctx.body = 'Hello World';\n\n});\n\napp.listen(3000);\n\
  \n创建一个简单的 Koa 应用程序有四个主要步骤。\n\n• 引入 `koa`\n\n• 创建一个新的 Koa 应用\n\n• 创建一个异步处理器\n\n•\
  \ 让应用开始监听（在一个端口上）\n\n如果你在一个新的笔记本中执行上述代码片段，你可以直接从浏览器实例化一个服务器（图 11-7）。\n\n***图 11-7.\
  \ 在 RunKit 上运行服务器***\n\n![](img/index-243_1.png)\n\n第 11 章 第 11 周：Node.js\n\n是的，这个服务器已经在监听请求了。所以，如果你点击笔记本中可用的端点，你将打开一个页面，其中包含一个分配给\
  \ Koa 应用程序的临时 URL，预期的 Hello World 消息会再次显示在这里（图 11-8）。\n\n***图 11-8. 在云端运行的 Koa***\n\
  \n** 发布一些 Koa 代码**\n\n发布到临时 URL 是可以的，但要与 Telegram Bot 一起工作，你必须有一个相对永久且公开的 URL。这可以通过在\
  \ RunKit 中使用“发布”链接来实现。点击该链接会弹出一个对话框，要求你为应用程序输入一个语义化的版本号（图 11-9）。\n\n![](img/index-244_1.jpg)\n\
