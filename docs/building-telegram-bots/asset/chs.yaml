  \n**第 5 章**\n\n**第 5 周：D 语言**\n\n*“至于困难，”弗格森用严肃的语气回答道，“它们就是用来被克服的。”*\n\n—儒勒·凡尔纳\n\
  《气球上的五星期》\n\n老实说，我还没有将 D 语言用于重量级项目，但在经历了一些小的编码挑战之后，D 语言的纯粹执行速度给我留下了深刻的印象。\n\nD 是一种静态类型语言，非常类似于\
  \ C++ 和 Java，并带有一些额外的便利。对于有这两种语言经验的人来说，学习曲线不会那么陡峭。\n\n在 D 语言网站 ([`tour.dlang.org/`](https://tour.dlang.org/))\
  \ 上列出的功能中，强调了以下特点：\n\n• *高级* 构造，提供强大的建模能力\n• *高性能*，编译型语言\n• 静态类型\n• 直接接口到操作系统 API\
  \ 和硬件\n• 极快的编译速度\n• 内存安全子集 (SafeD)\n\n© Nicolas Modrzyk 2019\nN. Modrzyk, *构建 Telegram\
  \ 机器人*, `doi.org/10.1007/978-1-4842-4197-4_5`\n\n第 5 章 第 5 周：D 语言\n\n• *可维护*、*易于理解*\
  \ 的代码\n• 渐进式学习曲线（类似 C 的语法，类似于 Java 等）\n• 与 C 应用程序二进制接口兼容\n• 与 C++ 应用程序二进制接口有限兼容\n\
  • 多范式（命令式、结构化、面向对象、泛型、函数式编程纯度，甚至汇编）\n• 内置错误检测（契约、单元测试）\n\nD 语言还附带一个高度多线程的 Web 框架，名为\
  \ vibe.d，我不会在这里详细介绍，但你应该看看用它构建的服务器的简洁性。\n\n在我进入机器人编程之前，我们将回顾一些基本的 D 语言结构和代码示例，当然，包括一些斐波那契数列。\n\
