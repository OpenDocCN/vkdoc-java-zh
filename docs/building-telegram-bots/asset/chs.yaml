  \n是的，我们想要用于 Telegram 机器人的库就是找到的那个，所以请访问：\n\n[`github.com/visciang/telegram`](https://github.com/visciang/telegram)\n\
  \n按照库网站的建议，你可以使用 Git 仓库地址和标签，直接将库添加到 `mix.exs` 文件中，如下所示：\n\n{:telegram, git: \"\
  https://github.com/visciang/telegram.git\", tag: \"0.5.0\"}\n\n到目前为止，你的 `deps` 块应该如下所示：\n\
  \ndefp deps do\n\n    [\n\n      {:timex, \"~> 3.0\"},\n\n       {:telegram, git:\
  \ \"https://github.com/visciang/telegram.\n\ngit\", tag: \"0.5.0\"}\n\n    ]\n\n\
  \  end\n\n第 10 章 第 10 周：Elixir\n\n再次使用 `mix deps.get` 来检索依赖项，它会透明地在本地为你检出 Telegram\
  \ 项目。下面的 `mix deps.tree` 命令确认了该库的存在，你还可以在命令的输出中看到 Telegram 的 Git 仓库。\n\n$ mix deps.tree\n\
