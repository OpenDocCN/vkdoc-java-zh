  第 4 章 第 4 周：Rust\n\n***图 4-5.** 安装构建工具*\n\nRust 有一个快速的六周更新周期，所以当你读到这篇文章时，版本会有所不同，但在撰写本文时，这是通过\
  \ `rustup show` 命令获得的 Rust 当前版本：\n\n```\nSuperPinkicious:rust-01 niko$ rustup show\n\
  Default host: x86_64-apple-darwin\nstable-x86_64-apple-darwin (default)\nrustc 1.28.0\
  \ (9634041f0 2018-07-30)\n```\n\n现在让我们看看如何编译你的第一个 Rust 程序。\n\n第 4 章 第 4 周：Rust\n\
  \n**第一个或两个 Rust 程序**\n\n第一个 Rust 程序将打印一条简单的 Hello World 消息。这并不复杂，但它将帮助你熟悉 Rust 的编译和执行工具链。\n\
  \n**你好 Rust**\n\n这个，我们的第一个 Rust 程序：\n\n• 使用 `fn` 声明一个 `main` 函数\n• 使用 `println!`\
  \ 函数（注意感叹号）打印到标准输出\n• 语句以分号 (`;`) 结束\n\n这给你提供了以下简单而简短的代码片段：\n\n```rust\nfn main()\
  \ {\n    println!(\"Hello World!\");\n}\n```\n\n你可以将代码片段保存在一个文件中，例如命名为 `first.rs`。\n\
  \n顺便提一下，如果你在 Visual Studio Code 中键入上述代码片段，编辑器会识别出 `rs` 文件扩展名，并会要求你安装一个相关的插件来处理 `rs`\
  \ 文件（图 4-6）。\n\n![](img/index-77_1.jpg)\n\n第 4 章 第 4 周：Rust\n\n***图 4-6.** Visual\
  \ Studio Code Rust 插件*\n\nRust 是一种编译型语言，因此在执行代码之前，你必须先处理编译步骤。这是通过 `rustc` 命令完成的，该命令在你安装\
  \ `rustup` 时已安装。命令如下：\n\n```\nrustc first.rs\n```\n\n在你运行该命令的同一个文件夹中，你会注意到现在有一个新的二进制文件，没有\
  \ `.rs` 文件扩展名。执行二进制文件只需输入命令名称。\n\n```\n$ ./first\nHello World!\n```\n\n这适用于 Windows\
  \ 和 macOS/Linux，但是，当然，你不能将一个平台上的二进制文件直接拿到另一个平台上运行。你必须重新编译。虽然 `rustup` 可以帮助你为其他平台进行交叉编译，但这超出了本书的范围。\n\
  \n第 4 章 第 4 周：Rust\n\n对于其他入门示例，请务必查看优秀的 Rust by Example 网站 ([`doc.rust-lang.org/rust-by-example/hello.html`](https://doc.rust-lang.org/rust-by-example/hello.html))，它包含了你开始学习该语言结构所需的一切。\n\
  \n接下来，让我们回顾一下如何使用 Rust 富有表现力地生成老牌的斐波那契数列。\n\n**斐波那契**\n\nRust 有非常方便的模式匹配分支，可以用恰如其名的\
  \ `match` 来编写。我们将使用这个结构来编写斐波那契生成器。\n\n在一个新文件 `fibo.rs` 中，我们声明 `fibonacci` 函数，包括输入和输出的参数类型——这里，输入和输出都是\
  \ 64 位整数——以避免溢出。\n\n另外，请注意在以下代码片段中，你如何使用 `_` 来匹配 `n` 的任何其他值。\n\n```rust\nfn fibonacci(n:\
  \ u64) -> u64 {\n    match n {\n        0 => 0,\n        1 => 1,\n        _ => fibonacci(n\
  \ - 1) + fibonacci(n - 2)\n    }\n}\n```\n\n让我们将这段代码与一个 main 函数放在一起，这样我们就可以通过命令行输入来调用该程序。\n\
  \n```rust\nuse std::env;\n\nfn main() {\n    if let Some(arg1) = env::args().nth(1)\
  \ {\n        let myint = arg1.parse().unwrap();\n```\n\n第 4 章 第 4 周：Rust\n\n```rust\n\
  \        println!(\"{}\", fibonacci(myint));\n    } else {\n        println!(\"\
  missing input\")\n    }\n}\n```\n\n在上面的代码片段中，请注意如何通过使用 `Some` 来避免显式的空值检查，以及如何使用\
  \ `parse` 和 `unwrap` 将字符串参数转换为整数 `myint`。\n\n`unwrap` 用于将 `Some(something_inside)`\
  \ 转换为 `something_inside`。这里，我们有一个 `if/else` 块来确认我们是否有一个值作为参数。\n\n如果你不确定在 `Some`\
  \ 之后是否有值，你也可以使用 `unwrap_or` 来提供一个默认值。\n\n编译会像之前的 Hello World 示例一样生成一个可执行文件。\n\n\
  ```\nrustc fibo.rs\n```\n\n运行显示斐波那契生成器程序按预期工作。\n\n```\n$ ./fibo 10\n$ ./fibo 15\n\
  $ ./fibo 30\n```\n\n虽然 Rust 可以独立使用，但你通常会使用 Rust 构建工具 `cargo` 来创建项目结构和管理项目依赖项。\n\n\
  第 4 章 第 4 周：Rust\n\n**驾驭 cargo**\n\n`cargo` 是一个命令行工具，也由 `rustup` 安装和设置。`cargo` 负责创建新项目、管理项目结构、添加依赖项、生成二进制文件、运行代码、测试代码等。\n\
  \n以下是一些最重要的 `cargo` 子命令的列表：\n\n一些常见的 cargo 命令是（使用 --list 查看所有命令）：\n\n    build \
  \      编译当前项目\n    clean       移除 target 目录\n    doc         构建此项目及其依赖项的文档\n   \
  \ new         创建一个新的 cargo 项目\n    init        在现有目录中创建一个新的 cargo 项目\n    run  \
  \       构建并执行 src/main.rs\n    test        运行测试\n    bench       运行基准测试\n    update\
  \      更新 Cargo.lock 中列出的依赖项\n    search      在注册表中搜索 crates\n    publish     打包并将此项目上传到注册表\n\
  \    install     安装一个 Rust 二进制文件\n    uninstall   卸载一个 Rust 二进制文件\n\n作为第一个 `cargo`\
  \ 测试，让我们编写一个程序，使用名为 `chrono` 的第三方库来显示协调世界时 (UTC) 和本地时间。\n\n**我们有时间**\n\n显然，在向项目添加库之前，我们首先需要一个项目。这是通过\
  \ `cargo` 的 `new` 子命令完成的。\n\n第 4 章 第 4 周：Rust\n\n```\n$ cargo new we-have-time\n\
  Created binary (application) `we-have-time` project\n```\n\n`cargo` 生成的项目类型默认是二进制应用程序，但你也可以准备一个没有可运行入口点的库。\n\
  \n一旦生成了项目，你可以看到一个非常基本的项目结构和一些文件和文件夹。\n\n```\n$ tree -L 2\n.\n├── Cargo.toml\n└──\
  \ src\n    └── main.rs\n```\n\n上面，`Cargo.toml` 是项目元数据，`main.rs` 是我们到目前为止看到的同一种 Rust\
  \ 源文件。`Cargo.toml` 是添加依赖项的地方。\n\n```\n$ cat Cargo.toml\n[package]\nname = \"we-have-time\"\
  \nversion = \"0.1.0\"\nauthors = [\"Nicolas Modrzyk <myemail@gmail.com>\"]\n\n[dependencies]\n\
  ```\n\n现在，因为我们想处理日期和时区，让我们再次使用 `cargo` 来搜索一个 `time` 库。\n\n```\n$ cargo search time\n\
  \     Updating registry `https://github.com/rust-lang/crates.io-index`\ntime = \"\
  0.1.40\"              # Utilities for working with time-related functions in Rust.\n\
  ```\n\n第 4 章 第 4 周：Rust\n\n```\nexonum-time = \"0.9.2\"        #  The time oracle\
  \ service for Exonum.\nchrono = \"0.4.6\"            # Date and time library for\
  \ Rust\nfaster_path = \"0.0.2\"       # Alternative to Pathname\nspecs_time = \"\
  0.5.1\"        # time resource for specs\n... and 1738 crates more (use --limit\
  \ N to see more)\n```\n\n`chrono` 使得在不同时区显示日期变得容易，所以我们就使用这个库。要使 `chrono` 对你的项目可用，你将其名称和版本添加到\
  \ `Cargo.toml` 文件的 dependencies 部分。\n\n这给出了：\n\n```toml\n[dependencies]\nchrono\
  \ = \"0.4.6\"\n```\n\n在添加库之后，或者为了验证项目中编写的代码，你通常可以使用 `cargo check`。这在添加依赖项后也很有用，以确保它已正确下载并安装到你的本地机器上。\n\
  \n```\n$ cargo check\n   Compiling num-traits v0.2.5\n   Compiling num-integer v0.1.39\n\
  \    Checking libc v0.2.43\n    Checking time v0.1.40\n    Checking chrono v0.4.6\n\
  \     Checking we-have-time v0.1.0 (file:///Users/niko/Dropbox/BOOKS2/APRESS/04-rust/we-have-time)\n\
  \    Finished dev [unoptimized + debuginfo] target(s) in 7.69s\n```\n\n现在让我们继续编码，并更新位于\
  \ `main.rs` 中的 Rust 代码，以使用 `chrono` 库。\n\n第 4 章 第 4 周：Rust\n\n1. 首先，我们必须告诉程序我们正在使用一个外部库，Rust\
  \ 称之为 `crate`。这是使用 `extern crate chrono` 表示法完成的。这在程序的生命周期中只执行一次。\n2. 接下来，我们必须将 Rust\
  \ 符号导入到当前文件/命名空间中，这是通过 `use` 完成的。\n3. `let` 定义不可变变量，每个变量都有自己的类型。\n4. 并且，和之前一样，`println!`\
  \ 将其打印到标准输出。\n\n这给出了以下代码片段（同样在 `main.rs` 文件中）：\n\n```rust\nextern crate chrono;\n\
  \nuse chrono::prelude::*;\n\nfn main() {\n    let utc: DateTime<Utc> = Utc::now();\n\
  \    println!(\"{}\", utc);\n    let local: DateTime<Local> = Local::now();\n  \
  \  println!(\"{}\", local);\n}\n```\n\n因为我们使用 `cargo` 来管理我们的项目，现在有一些快捷方式可以利用来运行代码，例如直接使用\
  \ `cargo run` 运行代码。\n\n```\n$ cargo run\n   Compiling num-traits v0.2.5\n   Compiling\
  \ num-integer v0.1.39\n   Compiling libc v0.2.43\n   Compiling time v0.1.40\n  \
  \ Compiling chrono v0.4.6\n```\n\n第 4 章 第 4 周：Rust\n\n```\n   Compiling we-have-time\
  \ v0.1.0 (file://we-have-time)\n    Finished dev [unoptimized + debuginfo] target(s)\
  \ in 9.11s\n     Running `target/debug/we-have-time`\n2018-09-12 05:41:56.872180\
  \ UTC\n2018-09-12 14:41:56.872309 +09:00\n```\n\n看到编译步骤结束时显示的两个日期了吗？这些是程序的标准输出。\n\
  \n`run` 是快速编写和运行 Rust 程序的事实上的子命令。要创建最终版本，`cargo` 有内置的子任务 `build`。`build` 负责创建一个独立的二进制文件。\n\
  \n```\n$ cargo build\nFinished dev [unoptimized + debuginfo] target(s) in 0.16s\n\
  ```\n\n还要注意，`cargo` 支持增量编译，只会重新编译自上次执行以来更改过的代码。\n\n运行二进制文件会得到相同的输出——一切运行得如此顺利。这实际上令人耳目一新。\n\
  \n```\n$ ./target/debug/we-have-time\n2018-09-12 06:01:54.100082 UTC\n2018-09-12\
  \ 15:01:54.100176 +09:00\n```\n\n稍后你还会看到如何使用相同的 `cargo build` 命令生成程序的发布版本，但带有额外的标志。\n\
  \n现在，让我们先绕个弯，看看如何在同一个 cargo 项目中声明多个目标，即不同的执行入口点。\n\n**多个 Cargo 目标**\n\n你可能已经注意到，每个运行的命令都将\
  \ `main.rs` 文件作为默认输入。有一段时间，我一直在寻找一种运行不同文件的方法，实际上你不能直接将文件传递给 `cargo`。在 70\n\n第 4\
  \ 章 第 4 周：Rust\n\n`Cargo.toml` 文件中，你必须定义所谓的二进制目标。这是通过在 `.toml` 文件中使用 `[[bin]]` 定义一个块来完成的。\n\
  \n至少，该块需要一个名称和一个路径，所以让我们定义两个二进制目标，一个使用现有的 `main.rs` 文件，另一个使用一个新的 Rust 源代码文件：`main2.rs`。\n\
  \n```toml\n[[bin]]\nname = \"main1\"\npath = \"src/main.rs\"\n\n[[bin]]\nname =\
  \ \"main2\"\npath = \"src/main2.rs\"\n```\n\n为了多个目标的目的，我们将在此处保持 `main2.rs` 源代码极其精简，仅输出\
  \ UTC 时区的当前日期，但当然，它可以像你能编码的那样复杂。\n\n```rust\nextern crate chrono;\n\nuse chrono::prelude::*;\n\
  \nfn main() {\n    let utc: DateTime<Utc> = Utc::now();\n    println!(\"{}\", utc);\n\
  }\n```\n\n现在，在运行 cargo 命令时，你可以通过向 `cargo` 指定 `--bin` 标志来指定要运行哪个二进制目标，如下面的代码中所示两次，一次使用目标二进制\
  \ `main1`：\n\n```\n$ cargo run --bin main1\n    Finished dev [unoptimized + debuginfo]\
  \ target(s) in 0.16s\n     Running `target/debug/main1`\n```\n\n第 4 章 第 4 周：Rust\n\
  \n```\n2018-09-12 06:26:11.634208 UTC\n2018-09-12 15:26:11.634336 +09:00\n```\n\n\
  第二次使用目标二进制 `main2`：\n\n```\n$ cargo run --bin main2\n    Finished dev [unoptimized\
  \ + debuginfo] target(s) in 0.05s\n     Running `target/debug/main2`\n2018-09-12\
  \ 06:26:13.387135 UTC\n```\n\n作为奖励，这里是你可以用于 Virtual Studio Code 的 `tasks.json`，以便从\
  \ Visual Studio Code 运行两个二进制目标中的任何一个。\n\n```json\n{\n    \"version\": \"2.0.0\"\
  ,\n    \"tasks\":\n        [\n            {\n                \"label\": \"main1\"\
  ,\n                \"command\": \"cargo\",\n                \"args\": [\n      \
  \              \"run\",\n                    \"--bin\",\n                    \"\
  main1\"\n                ],\n                \"options\": {\n                  \
  \  \"cwd\": \"${workspaceRoot}\"\n                },\n                \"group\"\
  : {\n                    \"kind\": \"build\",\n                    \"isDefault\"\
  : true\n                }\n            },\n```\n\n![](img/index-87_1.jpg)\n\n第 4\
  \ 章 第 4 周：Rust\n\n```json\n            {\n                \"label\": \"main2\",\n\
  \                \"command\": \"cargo\",\n                \"args\": [\n        \
  \            \"run\",\n                    \"--bin\",\n                    \"main2\"\
  \n                ],\n                \"options\": {\n                    \"cwd\"\
  : \"${workspaceRoot}\"\n                },\n                \"group\": {\n     \
  \               \"kind\": \"build\",\n                    \"isDefault\": true\n\
