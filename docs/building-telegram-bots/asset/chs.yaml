  ```\n\n为了构建我们的机器人，我们将使用第一个、使用最广泛的库 `telebot`，这可以通过使用 Nimble 的 `install` 命令来完成。\n\
  \n```\nnimble install telebot\n```\n\n这会产生以下输出：\n\n```\nSuperPinkicious:02-nim niko$\
  \ nimble install telebot\nDownloading https://github.com/ba0f3/telebot.nim using\
