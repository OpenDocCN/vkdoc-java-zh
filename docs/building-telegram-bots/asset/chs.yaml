  \n但是，你必须等到下周，才能看到内联消息的实际应用。\n\n**第 4 章**\n\n**第 4 周：Rust**\n\n*没有一项旨在改变世界的伟大运动能够承受被嘲笑或贬低。嘲弄是一种锈蚀，会腐蚀它所触及的一切。*\n\
  \n—米兰·昆德拉\n\n如果你还没有听说过 Rust 编程语言，我认为你应该了解一下。Rust 在 2016、2017 和 2018 年的 [Stack Overflow\
  \ 开发者调查](https://en.wikipedia.org/wiki/Stack_Overflow)中获得了“最受喜爱的编程语言”第一名。\n\n正如\
  \ Rust 网站 ([www.rust-lang.org](http://www.rust-lang.org)) 所指出的，该语言具有一长串优点，例如：\n\n\
  • 零成本抽象\n• 移动语义\n• 保证内存安全\n• 无数据竞争的线程\n• 基于 trait 的泛型\n• 模式匹配\n• 类型推断\n• 最小运行时\n\
  • 高效的 C 绑定\n\n© Nicolas Modrzyk 2019\nN. Modrzyk, *构建 Telegram 机器人*, `doi.org/10.1007/978-1-4842-4197-4_4`\n\
  \n第 4 章 第 4 周：Rust\n\nRust 由 Mozilla 赞助，但不仅仅由一家公司支持，它还有一个非常支持和活跃的社区共同编写。Rust 非常关注健壮的线程环境和相关的内存安全问题。这些特别适合解决与为机器人开发并发端点相关的问题，本章将对此进行探讨。\n\
  \n**Rust 安装和第一步**\n\nRust 在你的本地机器上使用 `rustup` 进行维护和管理。是的，这是一个特定于 Rust 的环境管理器。它类似于\
  \ Ruby Version Manager (RVM)，但完全是 Rust 工具链的一部分，而不是第三方团队，所以感觉非常集成。\n\n**安装**\n\n\
  以下两个链接是获取 `rustup` 并在你的机器上安装 Rust 的入口点：\n\nwww.rust-lang.org/en-US/install.html\n\
  www.rust-lang.org/en-US/other-installers.html\n\n根据你使用的是 macOS/Linux（图 4-1）还是 Windows（图\
  \ 4-2），你会看到不同的页面，但安装过程非常相似。\n\n![](img/index-73_1.png)\n\n![](img/index-73_2.jpg)\n\
  \n第 4 章 第 4 周：Rust\n\n***图 4-1.** OSX/Linux 上的安装框*\n\n***图 4-2.** Windows 上的安装框*\n\
