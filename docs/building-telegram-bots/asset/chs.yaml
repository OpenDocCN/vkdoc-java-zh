  ** 让我们开始斐波那契**


  对于这个斐波那契 Go 程序，我们将使用递归方法。与我们刚刚执行的第一个简单程序相比，此实现引入了四个新步骤。


  首先，我们将定义一个与 `main` 分离的新函数，名为 `Fibonacci`，它将简单地使用不同的参数 `n-1` 和 `n-2` 递归调用自身。然后，我们将实现
  `main` 函数，该函数将检索发送给程序的第一个参数。接着，我们将使用 `strconv` 包中名为 `Atoi` 的函数，将其值从字符串转换为整数。


  最后，我们将使用整数参数调用 `Fibonacci` 函数，并将调用 `Fibonacci` 函数的结果打印到标准输出。


  Go 代码片段如下：


  package main


  import (


      "fmt"


      "os"


      "strconv"


  )


  // Fibonacci computes fibonacci by recursion


  func Fibonacci(n int) int {


      if n <= 1 {


          return n


      }


      return Fibonacci(n-1) + Fibonacci(n-2)


  }


  func main() {


      i, _ := strconv.Atoi(os.Args[1])


      fmt.Println(Fibonacci(i))


  }


