  \  tags:        telebot, telegram, bot, api, client, async\n  description: Async\
  \ Telegram Bot API Client\n  license:     MIT\n  website:     https://github.com/ba0f3/telebot.nim\n\
  \nnim_telegram_bot:\n  url:          https://github.com/juancarlospaco/nim-telegram-bot\
  \  (git)\n  tags:        telegram, bot, telebot, async, multipurpose, chat\n   description:\
  \  Generic Configurable Telegram Bot for Nim, with builtin basic functionality and\
