    ** The Project Metadata in project.clj**


    A good point with Leiningen and Clojure is that the project metadata is in the
    same language as the code itself, meaning the project configuration is in Clojure.
    It’s actually more or less a big hash map. Consistency is a key (pun intended),
    and it’s reassuring to find the file with that constant structure.


    In project.clj, you start by defining a Clojure project with 


    defproject, passing a project name (here, mytelegrambot), a version number, and
    a map of different things, in which each key is prefixed with :.


    Among the different things used to define a project, we can find


    •   *Dependencies*: A list of third-party libraries to import and use in your
    project


    •   *Plug-ins*: A list of plug-ins for Leiningen


    •  main: The main file, actually namespace, to compile 


    and or run


    Just as with project names, dependencies come with a project name 


    and a version number, and this is actually the same format used. The full project.clj file
    that has been generated is copied here.


    (defproject mytelegrambot "0.1.0-SNAPSHOT"


      :description "FIXME: write description"


      :url "http://example.com/FIXME"


    Chapter 7   Week 7: Clojure


      :license {:name "Eclipse Public License"


                :url "http://www.eclipse.org/legal/epl-v10.html"}


      :dependencies [[org.clojure/clojure "1.8.0"]


                     [environ             "1.1.0"]


                     [morse               "0.2.4"]]


      :plugins [[lein-environ "1.1.0"]]


      :main ^:skip-aot mytelegrambot.core


      :target-path "target/%s"


      :profiles {:uberjar {:aot :all}})


    Now, let’s have a look at the code itself, located in core.clj.


    ** The Clojure Code in core.clj**


    Let’s break this source file in smaller parts. First, Clojure project source files
    start with a namespace definition, namedasns, and then a list of other namespaces
    to use in the current context.


    (ns mytelegrambot.core


      (:require [clojure.core.async :refer [<!!]]


                [clojure.string :as str]


                [environ.core :refer [env]]


                [morse.handlers :as h]


                [morse.polling :as p]


                [morse.api :as t])


      (:gen-class))


    You will notice namespace for async code, string manipulation, easy retrieval
    of environment variables, and different namespaces from Morse, the third-party
    library responsible for doing low-level communication with the Telegram API. Note,
    too, how each namespace also defines a prefix, 143


    Chapter 7   Week 7: Clojure


    such as p, t, or h, which you can use as shortcuts, instead of using the full
    namespace name. Finally, gen-class is used to tell Clojure code that it has to
    turn itself into something the Java runtime understands natively, namely, a Java
    class.


