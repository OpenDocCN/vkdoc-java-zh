    \ 聊天中就会显示常见的猫咪图片（图 10-6）。\n\n***图 10-6. 这不是 Marcel，但这是一只猫***\n\n你可能已经意识到，所有这些都可以直接从\
    \ Visual Studio Code 中运行，使用本章开头定义的用于运行 .exs 文件的任务。试试看（图 10-7）。\n\n![](img/index-232_1.jpg)\n\
    \n第 10 章 第 10 周：Elixir\n\n***图 10-7. 直接从你的编辑器运行……***\n\n** Telegram 机器人**\n\n\
    本章的篇幅已经超出了最佳页数，所以我将快速介绍一下如何创建和运行一个机器人，以及如何为这个新机器人实现几个命令。\n\n** 机器人 1：无所不包**\n\n\
    第一个机器人会将接收到的更新的完整数据结构发送回聊天。看看在调用 `use` 之后，令牌是如何传递给 `Telegram.Bot` 库的？\n\ndefmodule\
    \ Bot1 do\n\n  use Telegram.Bot,\n\n    token: Application.get_env(:telegrambot,\
    \ :token),\n\n    username: \"chapter01bot\",\n\n    purge: true\n\n第 10 章 第 10\
    \ 周：Elixir\n\n  message do\n\n    request(\n\n      \"sendMessage\",\n\n     \
    \ chat_id: update[\"chat\"][\"id\"],\n\n      text: \"嘿！你发给我一条消息：#{inspect(update)}\"\
    \n\n    )\n\n  end\n\nend\n\n{:ok, _} = Bot1.start_link()\n\nProcess.sleep(:infinity)\n\
    \n最后两行在一个单独的线程中启动机器人，并告诉主线程永远休眠。还要注意，对 `sendMessage` 的请求是上一节所做操作的重复。\n\n** 机器人\
    \ 2：斐波那契**\n\n我们的第二个机器人将实现一个命令，可以为你计算斐波那契数并将结果发送回聊天。使用 Telegram 库的命令只需使用 `command`\
    \ 定义即可。命令名称是 `command` 的第一个参数，后面跟着可能的参数。\n\n`command` 块本身可以访问来自 Telegram 的更新对象。尽管你不太容易看到，但\
    \ Elixir 在底层具有函数式编程的基因，大多数调用都是使用 `apply` 完成的。\n\n这一点在你必须使用 `Enum.at` 来获取列表中特定元素的索引时尤为明显，这里是第一个元素，所以索引为\
    \ 0。\n\n    command \"fib\", args do\n\n        {intVal, \"\"} = Integer.parse(Enum.at(args,0))\n\
    \n         request(\"sendMessage\", chat_id: update[\"chat\"][\"id\"], text: \"\
    Fib[#{intVal}] = #{Fib.fib(intVal)}\")\n\n    end\n\n第 10 章 第 10 周：Elixir\n\n\
    这里，`Fib` 在一个单独的 `Fib` 模块中定义，如下面的完整代码所示，其中添加了一个简单的递归斐波那契实现。\n\ndefmodule Fib do\n\
    \n    def fib(0) do 0 end\n\n    def fib(1) do 1 end\n\n    def fib(n) do fib(n-1)\
    \ + fib(n-2) end\n\nend\n\ndefmodule Bot2 do\n\n  use Telegram.Bot,\n\n    token:\
    \ Application.get_env(:telegrambot, :token),\n\n    username: \"chapter01bot\"\
    ,\n\n    purge: true\n\n    command \"fib\", args do\n\n        {intVal, \"\"\
    } = Integer.parse(Enum.at(args,0))\n\n         request(\"sendMessage\", chat_id:\
    \ update[\"chat\"][\"id\"], text: \"Fib[#{intVal}] = #{Fib.fib(intVal)}\")\n\n\
    \    end\n\n    any do\n\n       IO.puts \"not found\"\n\n    end\n\nend\n\n{:ok,\
    \ _} = Bot2.start_link()\n\nProcess.sleep(:infinity)\n\n另外，避免在第二个机器人的底部使用 `any`\
    \ 函数来处理所有消息。\n\n最后，你可以在你的新机器人中定义 Telegram API 支持的所有其他消息，为了方便起见，这里直接从 Telegram\
    \ 库中重新列出了可以放在机器人中的可能块列表。\n\n第 10 章 第 10 周：Elixir\n\n  edited_message do\n\n  \
    \  # 处理代码\n\n  end\n\n  channel_post do\n\n    # 处理代码\n\n  end\n\n  edited_channel_post\
    \ do\n\n    # 处理代码\n\n  end\n\n  inline_query _query do\n\n    # 处理代码\n\n  end\n\
    \n  chosen_inline_result _query do\n\n    # 处理代码\n\n  end\n\n  callback_query\
    \ do\n\n    # 处理代码\n\n  end\n\n  shipping_query do\n\n    # 处理代码\n\n  end\n\n\
    \  pre_checkout_query do\n\n    # 处理代码\n\n  end\n\n此外，`api.ex` 文件中的代码还有一些与键盘和内联查询相关的代码结构示例。\n\
    \n[`github.com/visciang/telegram/blob/master/lib/api.ex`](https://github.com/visciang/telegram/blob/master/lib/api.ex)\n\
    \n**第 11 章**\n\n**第 11 周：Node.js**\n\n*“JavaScript 的优势在于你可以做任何事情。*\n\n*其劣势在于你确实会去做。”*\n\
    \n—Reg Braithwaite\n\n为了内容的完整性，本书也介绍了 Node.js 和 Telegraf，这是从 Node.js 处理 Telegram\
    \ 的库。使用 Telegraf，Node.js 可能拥有与 Telegram 交互的最简单的库之一的特权。\n\n在本章中，我将主要关注如何在 RunKit.com\
    \ 上运行 Telegram Bot。RunKit 是一项云服务，允许你在云端运行一个 Node.js 实例，而无需在本地安装任何东西，从而将编写和部署 Telegram\
    \ 机器人所需的时间缩短到几分钟。\n\n在云端运行也使我们能够为 Telegram 设置必要的 webhook。基本上，webhook 是对你迄今为止看到的\
    \ Telegram 机器人轮询方法的替代，它使用一个 URL，Telegram API 会在有新消息时调用该 URL，从而避免不必要的轮询流量。为了提供一个能够响应\
    \ Telegram 的 POST 请求的最小运行服务器，我们将使用 Koa 库（ExpressJS 的替代品）来设置与 Telegraf 的集成。\n\n\
    兴奋吗？让我们踏上 Node.js 之路。\n\n© Nicolas Modrzyk 2019\n\nN. Modrzyk, *构建 Telegram 机器人*,\
    \ `doi.org/10.1007/978-1-4842-4197-4_11`\n\n![](img/index-237_1.png)\n\n第 11 章\
    \ 第 11 周：Node.js\n\n** 认识 RunKit**\n\n在本节中，你将了解如何创建 RunKit 帐户、运行第一个 Node.js 程序，然后编写并发布一个基于\
    \ Koa 的简单服务。\n\nRunKit 最初是一个浏览器中的 Node.js 游乐场。你可以访问 RunKit 主页 [`runkit.com`](https://runkit.com)（图\
    \ 11-1）。\n\n***图 11-1. RunKit 主页***\n\nRunKit 用于编写测试代码、获取和显示数据、共享代码以及直接在云端运行服务器代码。\n\
    \n** 创建帐户**\n\n要创建帐户，你可以在 RunKit.com 上注册，使用你的 GitHub 帐户或标准的用户名密码组合（图 11-2）。\n\n\
    ![](img/index-238_1.png)\n\n第 11 章 第 11 周：Node.js\n\n***图 11-2. 创建你的 RunKit 帐户***\n\
    \n登录后，你会看到一个简单的界面，左侧有一个菜单，主要用于创建新的游乐场，页面中央是你已经（将要）创建的游乐场列表（图 11-3）。\n\n![](img/index-239_1.png)\n\
    \n![](img/index-239_2.png)\n\n第 11 章 第 11 周：Node.js\n\n***图 11-3. RunKit 个人页面***\n\
    \n如果你按下左侧的 + 按钮，你会被引导到一个空的游乐场页面（图 11-4）。\n\n***图 11-4. RunKit 空游乐场页面***\n\n![](img/index-240_1.png)\n\
    \n第 11 章 第 11 周：Node.js\n\n** RunKit 上的第一段代码**\n\n毫不意外，你可以直接输入任何你想写的 JavaScript\
    \ 代码。那么，让我们从打个招呼开始，如图 11-5 所示。\n\n***图 11-5. 用 RunKit 说“hello”***\n\n执行可以通过点击运行按钮或按\
    \ shift+return 键完成。执行的每一行结果都会显示在下方。\n\n假设你想快速计算一些斐波那契数……你可以自己实现，一个可能的实现如下所示。\n\
    \nfunction myfibonacci(num) {\n\n  if (num <= 1) return 1;\n\n  return myfibonacci(num\
    \ - 1) + myfibonacci(num - 2);\n\n}\n\nconsole.log(myfibonacci(39));\n\n或者，你也可以通过\
    \ RunKit 引入一个 Node.js 库（你可以在 [`npm.runkit.com`](https://npm.runkit.com) 查看）。\n\
    \n例如，你可以简单地引入一个库，比如 `fibonacci-fast`，直接从游乐场计算这些数字。\n\n![](img/index-241_1.jpg)\n\
    \n第 11 章 第 11 周：Node.js\n\nvar fibonacci = require('fibonacci-fast');\n\nvar result\
    \ = fibonacci.get(39    ).number.toString();\n\nconsole.log(result);\n\n游乐场会使该库对你的笔记本可用，而无需你安装或下载任何东西。无论是否使用库，效果都一样，如图\
    \ 11-6 所示。\n\n***图 11-6. 自己编写或引入库***\n\n注意，导入到笔记本中的库版本会显示在 `require` 语句旁边。\n\n\
    ** 某种 Koa 框架**\n\nKoa 是 Node.js 的下一代 Web 框架。它建立在 Express JS 多年经验的基础上，更易于学习和维护。Koa\
    \ 的主页可以在 [`koajs.com/#application`](https://koajs.com/#application) 找到。\n\n![](img/index-242_1.png)\n\
    \n第 11 章 第 11 周：Node.js\n\n根据你对 RunKit 游乐场的了解，你可能已经感觉到你可以引入 Koa 库并启动一个服务器。\n\n\
    下面是从 Koa 示例中摘取的一个简短代码片段：\n\nconst Koa = require('koa');\n\nconst app = new Koa();\n\
    \napp.use(async ctx => {\n\n  ctx.body = 'Hello World';\n\n});\n\napp.listen(3000);\n\
    \n创建一个简单的 Koa 应用程序有四个主要步骤。\n\n• 引入 `koa`\n\n• 创建一个新的 Koa 应用\n\n• 创建一个异步处理器\n\n\
    • 让应用开始监听（在一个端口上）\n\n如果你在一个新的笔记本中执行上述代码片段，你可以直接从浏览器实例化一个服务器（图 11-7）。\n\n***图 11-7.\
    \ 在 RunKit 上运行服务器***\n\n![](img/index-243_1.png)\n\n第 11 章 第 11 周：Node.js\n\n\
    是的，这个服务器已经在监听请求了。所以，如果你点击笔记本中可用的端点，你将打开一个页面，其中包含一个分配给 Koa 应用程序的临时 URL，预期的 Hello\
    \ World 消息会再次显示在这里（图 11-8）。\n\n***图 11-8. 在云端运行的 Koa***\n\n** 发布一些 Koa 代码**\n\n\
    发布到临时 URL 是可以的，但要与 Telegram Bot 一起工作，你必须有一个相对永久且公开的 URL。这可以通过在 RunKit 中使用“发布”链接来实现。点击该链接会弹出一个对话框，要求你为应用程序输入一个语义化的版本号（图\
    \ 11-9）。\n\n![](img/index-244_1.jpg)\n\n![](img/index-244_2.png)\n\n第 11 章 第 11\
    \ 周：Node.js\n\n***图 11-9. 准备好发布了吗，Koa？***\n\n现在，Koa 应用程序可以在一个易于记忆的位置访问，格式如下：\n\
    \n[`runkit.io/hellonico/simple-koa/branches/master`](https://runkit.io/hellonico/simple-koa/branches/master)\n\
    \n你可以从浏览器可靠地访问它。请注意，你实际上会被重定向到 RunKit 内部映射的 URL（见图 11-10）。\n\n***图 11-10. 已发布！***\n\
    \n![](img/index-245_1.png)\n\n第 11 章 第 11 周：Node.js\n\n另外，请注意 URL 是通过 HTTPS 协议的，这一点非常重要，因为\
    \ Telegram 不接受纯 HTTP 端点。\n\n从这里开始，你应该多练习一下 Koa 和 RunKit，一旦你准备好了，让我们看看如何使用 RunKit、Koa\
    \ 和神秘的 Telegram webhook 编写第一个 Telegram 机器人。\n\n** 使用 Webhooks 的 Telegram 机器人**\n\
    \n那么，首先，webhooks……它们是什么？Webhooks 的工作方向与轮询相反。轮询是你的客户端机器人定期向 Telegram 服务器询问是否有新消息到达，而使用\
    \ webhooks，你要求 Telegram 服务器在有新消息发送到聊天室（你的机器人应该知道）时，向你发送一条更新消息。\n\n流程总结在图 11-11\
    \ 中。\n\n***图 11-11. 轮询 vs. webhooks***\n\n第 11 章 第 11 周：Node.js\n\n知道了这一点，我们只需要知道是否有一个\
    \ Telegram Bot API 方法可以告知你的应用程序端点——这里有一个：\n\n[`core.telegram.org/bots/api#setwebhook`](https://core.telegram.org/bots/api#setwebhook)\n\
    \n在下面的代码片段中，你可以看到如何使用 `setWebhook` 函数将 URL 公开给机器人 API。\n\nconst Telegraf = require('telegraf')\n\
    \nconst Koa = require('koa')\n\nconst koaBody = require('koa-body')\n\nconst bot\
    \ = new Telegraf(process.env.BOT_TOKEN)\n\nbot.on('text', ({ reply }) => reply('这里的时间是\
    \ ::'+ new\n\nDate()))\n\nbot.telegram.setWebhook('https://runkit.io/hellonico/koa-bot/\n\
    \nbranches/master')\n\nconst app = new Koa()\n\napp.use(koaBody())\n\napp.use((ctx,\
    \ next) => ctx.method === 'POST' || ctx.url === '/\n\nsecret-path'\n\n  ? bot.handleUpdate(ctx.request.body,\
    \ ctx.response)\n\n  : next()\n\n)\n\napp.listen(3000)\n\n![](img/index-247_1.jpg)\n\
    \n第 11 章 第 11 周：Node.js\n\n它将在 Koa 中显示，如图 11-12 所示。\n\n***图 11-12. RunKit 上的第一个机器人***\n\
    \n现在，我可以解释代码中缺失的两个部分。第一个是我们将 HTTP POST 请求与 Telegraf 机器人粘合在一起的地方，使用 `handleUpdate`，它做两件事：\n\
    \n• 将 `ctx.request.body` 映射到机器人的输入请求\n\n• 将 `ctx.response` 映射到机器人的输出响应\n\napp.use(koaBody())\n\
    \napp.use((ctx, next) => ctx.method === 'POST' || ctx.url\n\n=== '/secret-path'\n\
    \n  ? bot.handleUpdate(ctx.request.body, ctx.response)\n\n  : next()\n\n)\n\n\
    ![](img/index-248_1.png)\n\n第 11 章 第 11 周：Node.js\n\n缺失的第二个部分与本书中介绍的其他 API 类似。\n\
    \nbot.on('text', ({ reply }) => reply('这里的时间是 ::'+ new\n\nDate()))\n\n每当有文本到达机器人时，我们有一个回调函数，带有一个解构后的\
    \ `reply` 对象（由 Telegraf 准备），我们可以用它来向聊天发送消息。在运行这个机器人之前，你会注意到代码需要一个从启动 Node.js 进程的环境中检索到的令牌。\n\
    \nconst bot = new Telegraf(process.env.BOT_TOKEN)\n\nRunKit 允许你通过为你的笔记本设置环境变量来做到这一点（是的！）。\n\
    \n要访问设置页面，请导航到你自己的 RunKit 设置页面（图 11-13）。\n\n***图 11-13. 设置页面***\n\n![](img/index-249_1.jpg)\n\
    \n第 11 章 第 11 周：Node.js\n\n在该页面上，有一个环境变量部分，你可以在其中设置所需的 `BOT_TOKEN` 变量来实例化 Telegraf\
    \ 机器人（图 11-14）。\n\n***图 11-14. 使用你自己的令牌设置 `BOT_TOKEN` 变量***\n\n现在，你可以一起启动 RunKit/Koa/Telegram\
    \ 机器人，并像往常一样开始与你的机器人聊天（图 11-15）。\n\n![](img/index-250_1.jpg)\n\n第 11 章 第 11 周：Node.js\n\
    \n***图 11-15. Telegraf，与 RunKit 上的 Koa 机器人一起使用***\n\n** 更多关于 Telegraf 库的内容**\n\
    \n我还没有详细回顾 Telegraf 库。提醒一下，它的 GitHub URL 如下：\n\n[`github.com/telegraf/telegraf/`](https://github.com/telegraf/telegraf/)\n\
    \n你可以在其 examples 文件夹中找到关于游戏和内联键盘的大量示例。\n\n[`github.com/telegraf/telegraf/tree/develop/docs/examples`](https://github.com/telegraf/telegraf/tree/develop/docs/examples)\n\
    \n** 图片到聊天的示例**\n\n图片命令示例是一个即时自我满足的胜利。你可以直接在刚刚定义的 RunKit 机器人中尝试。\n\nconst bot\
    \ = new Telegraf(process.env.BOT_TOKEN)\n\nbot.command('image',\n\n![](img/index-251_1.jpg)\n\
    \n第 11 章 第 11 周：Node.js\n\n(ctx) =>\n\nctx.replyWithPhoto({ url: 'https://picsum.\n\
    \nphotos/200/300/?random' }))\n\n一旦命令部署完毕，你可以向机器人发送 `/image` 命令，并从 Picsum 网站获取一张随机图片。还要注意\
    \ `replyWithPhoto` 是如何与 URL 参数一起使用的，以向聊天发送图片（图 11-16）。\n\n***图 11-16. 随机图片***\n\
    \n** RegExp、内联键盘和嵌入式表情符号**\n\nTelegraf 有一个很酷的内置功能，允许你根据 RegExp 匹配消息，并根据这些匹配执行操作。这是通过在\
    \ `.hears`（用于发送到聊天群组的消息）或 `.on`（直接发送给机器人的消息）回调中使用正则表达式来完成的。\n\n第 11 章 第 11 周：Node.js\n\
    \n在下面的例子中，在群聊消息中搜索“like”，并显示一个内联键盘。\n\nconst { Markup } = Telegraf\n\nconst inlineMessageRatingKeyboard\
    \ = Markup.inlineKeyboard([\n\n    Markup.callbackButton('<', 'like'),\n\n   \
    \ Markup.callbackButton('=', 'dislike')\n\n]).extra()\n\nbot.hears(/like (.+)/,\
    \ (ctx) => ctx.telegram.sendMessage(\n\n    ctx.from.id,\n\n    '喜欢?',\n\n   \
    \ inlineMessageRatingKeyboard)\n\n)\n\n回调本身的动作可以在之后定义。这里，我们使用 API 函数 `editMessageText`\
    \ 编辑最后一条消息，即带有内联键盘的那条。\n\nbot.action('like', (ctx) => ctx.editMessageText('••\
    \ 太棒了! ••'))\n\nbot.action('dislike', (ctx) => ctx.editMessageText('好吧'))\n\n\
    当代码运行时，每当机器人发现以“like”开头的消息时，它会通知你，如图 11-17 所示。\n\n![](img/index-253_1.png)\n\n\
    第 11 章 第 11 周：Node.js\n\n***图 11-17. 喜欢我还是不喜欢？***\n\n请注意，你也可以通过在回调中使用 `match`\
    \ 来使用匹配的模式。\n\nbot.hears(/reverse (.+)/,\n\n({ match, reply }) => reply(match[1].split(\"\
    ).reverse().\n\njoin(\")))\n\n最后，让我们看看如何在本地或我们自己的服务器上运行这个机器人。\n\n** 在本地运行 Node.js**\n\
    \n在 RunKit 中运行了所有示例之后，你可能确实希望将代码托管在 RunKit 之外的其他地方，例如你自己的机器上。为此，我们需要安装 Node.js。\n\
    \n![](img/index-254_1.png)\n\n第 11 章 第 11 周：Node.js\n\n** 设置 Node.js**\n\n安装 Node.js\
    \ 非常简单——可以从主页获取必要的包，\n\n[`nodejs.org/en/`](https://nodejs.org/en/)\n\n或者从你常用的包管理器安装。\n\
    \n另外，虽然使用 NPM 已经足够，但如今，Node.js 的 yarn 构建工具非常流行，你可以从以下地址找到/安装它：\n\n[`yarnpkg.com/en/docs/install#mac-stable`](https://yarnpkg.com/en/docs/install#mac-stable)\n\
    \n安装完成后，你可以进行一些版本检查。\n\n$ node -v\n\nv10.4.0\n\n$ yarn -v\n\n1.7.0\n\n$ npm -v\n\
    \n6.2.0\n\n工具设置好后，你可以使用“下载此笔记本”按钮下载你在 RunKit 中处理的笔记本（图 11-18）。\n\n***图 11-18.\
    \ 将 RunKit 笔记本下载到你的机器上***\n\n243\n\n![](img/index-255_1.jpg)\n\n第 11 章 第 11 周：Node.js\n\
    \n解压归档文件的内容后，你会看到类似于图 11-19 的内容。\n\n***图 11-19. 来自 RunKit 的 `mykoa-bot` zip 文件的内容***\n\
    \n** 使用本地隧道**\n\n要运行这个机器人，你可以使用轮询，但让我们尝试一些更具挑战性的方法。每当你启动 Koa 应用程序时，你的应用程序会将监听主机绑定到\
    \ `localhost`，并且（通常默认情况下）绑定到端口 3000。\n\n如果有什么东西能让这个精彩的 Koa 站点立即可供全世界访问，那不是很好吗？这就是\
    \ LocalTunnel 的用武之地。LocalTunnel 为你创建一个 URL，并将发送到该 URL 的所有请求重定向到你本地正在监听的监听器。\n\n\
    使用 NPM 安装如下：\n\nnpm install -g localtunnel\n\n然后使用以下命令启动它：\n\nlt --port 3000\n\
    \n第 11 章 第 11 周：Node.js\n\n它会给你一个临时的类似 Heroku 的 URL，例如：\n\n[`short-cougar-89.localtunnel.me`](https://short-cougar-89.localtunnel.me)\n\
    \n然后你可以告诉 Koa 应用将其注册为 webhook。\n\nconst Telegraf = require('telegraf')\n\nconst\
    \ Koa = require('koa')\n\nconst koaBody = require('koa-body')\n\nconst bot = new\
    \ Telegraf(process.env.BOT_TOKEN)\n\nbot.command('image', (ctx) => ctx.replyWithPhoto({\
    \ url:\n\n'https://picsum.photos/200/300/?random' }))\n\nbot.telegram.setWebhook('https://short-cougar-89.localtunnel.me')\n\
    \nconst app = new Koa()\n\napp.use(koaBody())\n\napp.use((ctx, next) => ctx.method\
    \ === 'POST' || ctx.url === '/\n\nsecret-path'\n\n  ? bot.handleUpdate(ctx.request.body,\
    \ ctx.response)\n\n  : next()\n\n)\n\napp.listen(3000)\n\n![](img/index-257_1.jpg)\n\
    \n第 11 章 第 11 周：Node.js\n\n在图 11-20 中，我们又回到了随机图片！\n\n***图 11-20. 通过 localtunnel\
    \ 运行，使用 webhook 设置的 Telegram 机器人返回的随机图片***\n\n![](img/index-258_1.png)\n\n**第\
    \ 12 章**\n\n**第 12 周：Python**\n\n*总是看到生活光明的一面。*\n\n—蒙提·派森\n\nPython 正朝着成为 21 世纪最广泛使用的编程语言的方向发展。爱好者喜欢它，分析师喜欢它，甚至刚开始学习编程的孩子现在也使用\
    \ Python。\n\n凭借其简单的语法和数不胜数的可用库，选择 Python 不会错。最近，许多这些库重新聚焦于机器学习、人工智能、数据科学……以至于\
    \ Python 这门语言本身几乎不需要过多介绍。话虽如此，这里还是有一个介绍（图 12-1）。\n\n***图 12-1. 你好，Python***\n\n\
    © Nicolas Modrzyk 2019\n\nN. Modrzyk, *构建 Telegram 机器人*, `doi.org/10.1007/978-1-4842-4197-4_12`\n\
    \n第 12 章 第 12 周：Python\n\n虽然我也喜欢 Python，但很多代码虽然容易编写，却难以维护。所以，我通常会切换到其他语言，但很难找到能与\
    \ Python 可用的库数量相匹配的语言——OpenCV、TensorFlow……所有这些都带有顶级的 Python 封装。\n\n** 安装**\n\n\
