    ** First Nim Bot**


    In Nim, you define a function or procedure using proc. proc takes a function name,
    here, updateHandler; some parameters, here, b of type telebot and u of type Update (both
    from the telebot module); and 


    sometimes some metadata (or pragma), here, {.async.}.


    You can find the documentation for any module on nim-lang.org. For example, the asyncdispatch module
    is here:


    [https://nim-lang.org/docs/asyncdispatch.html](https://nim-lang.org/docs/asyncdispatch.html)


    The reason we use the async module here is to write our Telegram bot.


    **Note**  asynchronous procedures remove the pain of working with callbacks. they
    do this by allowing you to write asynchronous code the same way as you would synchronous
    code.


    The slurp function takes the content of a file and turns it into a string—here,
    the bot API_KEY that you receive from BotFather in the previous chapter. And,
    yes, you should paste your key in a new secret.key file. That gives the following
    few lines of code for a simple bot that returns 


    “hello” to whatever you sent to him.


    import telebot, asyncdispatch, options


    const API_KEY = slurp("secret.key")


    proc updateHandler(b: Telebot, u: Update) {.async.} =


    ![](index-46_1.jpg)


    Chapter 2   Week 2: Nim


        let


         response = u.message.get


         message = newMessage(response.chat.id, "hello")


        discard await b.send(message)


    let bot = newTeleBot(API_KEY)


    bot.onUpdate(updateHandler)


    bot.poll(300)


    Starting a new chat with your existing bot, or a new bot registered with the bot
    father, would result in a conversation such as that shown in Figur[e 2-16.](#index_split_000.html#p46)


    ***Figure 2-16.  **hello*


    ![](index-47_1.jpg)


    Chapter 2   Week 2: Nim


    ** Replying to Nim Bot**


    Now that you have the whole setup at hand, creating the second Nim bot is going
    to be fairly simple. This new bot will inline the reply, as when you are replying
    directly to a message sent by another user. This is done by setting the replyToMessageId property
    on the created message object.


    Note that if you keep the message object declared in the let block, the compiler
    will “compilain” (pun intended) that the message cannot be updated, because it
    is immutable (Figur[e 2-17).](#index_split_000.html#p47)


    ***Figure 2-17.  **Compilation error that results when using let instead* *of var*


    This is because it was created with let, which makes the object 


    immutable. To work around this problem, you simply declare the message object
    with var instead.


    ![](index-48_1.jpg)


    Chapter 2   Week 2: Nim


    import telebot, asyncdispatch, options


    const API_KEY = slurp("secret.key")


    proc updateHandler(b: Telebot, u: Update) {.async.} =


      var response = u.message.get


      if response.text.isSome:


        let


          text = response.text.get


        var message = newMessage(response.chat.id, text)


        message.replyToMessageId = response.messageId


        discard await b.send(message)


    let bot = newTeleBot(API_KEY)


    bot.onUpdate(updateHandler)


    bot.poll(300)


    The bot now tells you which message it is replying to (Figur[e 2-18](#index_split_000.html#p48)).


    ***Figure 2-18.  **hello, hello*


    ** Cats and Dogs Nim Bot**


    This next bot is only a slight update from the previous bot. Instead of creating
    a message with newMessage, we will use newPhoto, which allows us to embed a picture
    in the message sent to the user.


    For this to work, you must have pictures of animals located along the Nim file
    (cat.jpg and dog.jpg, for example).


    Chapter 2   Week 2: Nim


    In the Nim code, the path to the file is prefixed with file://, and we also add
    a caption to the picture, by setting the caption field of the photo message.


    This gives


    import telebot, asyncdispatch, options


    const API_KEY = slurp("secret.key")


    proc updateHandler(bot: TeleBot, update: Update) {.async.} =


      var response = update.message.get


      if response.text.isSome:


        let


             animal = response.text.get


             file = "file://" & animal & ".jpg"


        var message = newPhoto(response.chat.id, file)


        message.caption = animal


        discard await bot.send(message)


    let


      bot = newTeleBot(API_KEY)


    bot.onUpdate(updateHandler)


    bot.poll(300)


    After starting this bot, when you send keywords to it, it will reply with a loaded
    picture of the given keyword, along with a caption of the animal (Figure [2-19).](#index_split_000.html#p50)


    ![](index-50_1.jpg)


    Chapter 2   Week 2: Nim


    ***Figure 2-19.  **Cat and dog*


    Of course, if you enter an animal that does not have a corresponding file, the
    bot won’t be able to answer.


    So, a small exercise would be to send a response to the user, such as 


    “The file could not be found.”


