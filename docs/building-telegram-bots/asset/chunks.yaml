    ** Telegram Bot with Webhooks**


    So, first, webhooks...What are they? Webhooks work in the opposite direction as
    polling. Where polling is your client bot periodically asking the Telegram server
    if any new message has arrived, with webhooks, you ask the Telegram server to
    send you an update message whenever a new message that your bot should know about
    has been sent to a chat room.


    The flow is summarized in Figur[e 11-11](#index_split_001.html#p245).


    ***Figure 11-11.  **Polling vs. webhooks*


    Chapter 11   Week 11: Node.js


    Knowing this, we just need to know if there is a Telegram Bot API 


    method to tell about your application end point—and there is one here:


    [https://core.telegram.org/bots/api#setwebhook](https://core.telegram.org/bots/api#setwebhook)


    In the following snippet, you can see how the setWebhook function is used to publicize
    the URL to the bot API.


    const Telegraf = require(''telegraf'')


    const Koa = require(''koa'')


    const koaBody = require(''koa-body'')


    const bot = new Telegraf(process.env.BOT_TOKEN)


    bot.on(''text'', ({ reply }) => reply(''The time here is ::''+ new 


    Date()))


    bot.telegram.setWebhook(''https://runkit.io/hellonico/koa-bot/


    branches/master'')


    const app = new Koa()


    app.use(koaBody())


    app.use((ctx, next) => ctx.method === ''POST'' || ctx.url === ''/


    secret-path''


      ? bot.handleUpdate(ctx.request.body, ctx.response)


      : next()


    )


    app.listen(3000)


