    \n            public int process(List<Update> updates) {\n\n                System.out.println(updates.toString());\n\
    \n                  // DO SOMETHING HERE.\n\n                return UpdatesListener.CONFIRMED_UPDATES_ALL;\n\
    \n            }\n\n        });\n\n    }\n\n}\n\n**发送一些文本**\n\n我们的第一个交互将是向聊天发送一些文本。你可以像使用其他语言一样浏览来自\
    \ Telegram 的更新消息。你会找到与之前看到的相同结构的常见消息。\n\nUpdate{update_id=573518674, message=Message{message_id=956,\
    \ \n\nfrom=User{id=121843071, is_bot=false, first_name='Nico', last_\n\nname='Nico',\
    \ username='hellonico', language_code='en-JP'} , \n\ndate=1537602748, chat=Chat{id=121843071,..\n\
    \n从那里，我们可以获取聊天 ID\n\nint id = updates.get(0).message().chat().id().intValue();\n\
    \n并向聊天室发送一条消息。请注意，我们使用 `bot.execute` 并带有一个请求和一个回调，因此结果是异步的。\n\n第 8 章   第 8 周：Java\n\
    \nSendMessage requestText =\n\nnew SendMessage(id, \"*hello from java*\").parseMode(ParseMode.\n\
    \nMarkdown);\n\nbot.execute(requestText, new Callback<SendMessage, \n\nSendResponse>()\
    \ {\n\n@Override\n\npublic void onResponse(SendMessage request, SendResponse \n\
    \nresponse) {}\n\n@Override\n\n  public void onFailure(SendMessage request, IOException\
    \ e) {}\n\n});\n\n在启动机器人之前，你必须组织导入或手动完成列表。完整的列表如下所示，应位于源文件的顶部。\n\nimport java.io.BufferedReader;\n\
    \nimport java.io.FileReader;\n\nimport java.io.IOException;\n\nimport java.util.List;\n\
    \nimport java.util.stream.Collectors;\n\nimport com.pengrad.telegrambot.Callback;\n\
    \nimport com.pengrad.telegrambot.TelegramBot;\n\nimport com.pengrad.telegrambot.UpdatesListener;\n\
    \nimport com.pengrad.telegrambot.model.Update;\n\nimport com.pengrad.telegrambot.model.request.ParseMode;\n\
    \nimport com.pengrad.telegrambot.request.SendMessage;\n\nimport com.pengrad.telegrambot.response.SendResponse;\n\
    \n通过点击 Run 或 Debug 启动机器人，这将在聊天中显示一些 Markdown 格式的文本（图 [8-6）。\n\n![](img/index-182_1.png)\n\
    \n第 8 章   第 8 周：Java\n\n***图 8-6. 你的 Java 机器人正在运行！***\n\n**发送图片**\n\n发送图片和发送文本一样简单，这次我们将使用同步版本来向\
    \ Telegram 发送请求。因为代码不再是异步的，所以在异步版本中可用的 `onFailure` 回调中无法处理失败。因此，最好用 `try/catch`\
    \ 块包围请求。\n\nSendPhoto requestPhoto = new SendPhoto(id, new File(\"resources/\n\
    \ncat.jpg\"));\n\ntry {\n\nSendResponse response = bot.execute(requestPhoto);\n\
    \n} catch (Exception e) {\n\ne.printStackTrace();\n\n}\n\n猫咪图片被发送到聊天，如图 8-7 所示。\n\
    \n![](img/index-183_1.jpg)\n\n第 8 章   第 8 周：Java\n\n***图 8-7. 猫咪回来了！***\n\n现在让我们尝试生成一个发票并使用\
    \ Java 机器人进行一些支付。\n\n**具有发票功能的机器人**\n\nTelegram 添加了一个支付 API，可以直接从聊天室接受付款。这是一个非常棒的汇款设置，服务领域的交易将大大受益于其扩展。\n\
    \n**请求权限**\n\n在使用这些功能之前，你必须再次从万能的 BotFather 那里获得权限，方法是更改你机器人的支付设置（见图 8-8）。\n\n\
    ![](img/index-184_1.png)\n\n![](img/index-184_2.png)\n\n第 8 章   第 8 周：Java\n\n\
    ***图 8-8. BotFather 机器人设置中的支付部分*** 更新机器人的支付设置后，BotFather 会给你一个支付令牌，如图 8-9 所示。\n\
    \n***图 8-9. 支付详情已更新***\n\n请注意，这里给了你另一个令牌。这是你在发送发票消息时必须使用的令牌。\n\n![](img/index-185_1.jpg)\n\
    \n![](img/index-185_2.jpg)\n\n第 8 章   第 8 周：Java\n\n在此过程中，你将需要使用你喜欢的提供商设置一个支付账户。这里我们使用\
    \ Stripe 并测试其功能，如图 8-10 和 8-11 所示。\n\n***图 8-10. Stripe 设置***\n\n***图 8-11. Stripe\
    \ 仪表板***\n\n![](img/index-186_1.png)\n\n第 8 章   第 8 周：Java\n\n如果设置正确完成，你将收到来自\
    \ Stripe 测试机器人的确认，如图 8-12 所示。\n\n***图 8-12. Stripe 测试机器人已连接***\n\n现在你的机器人可以发送发票消息，并尝试从与它交谈的人那里获取资金。\n\
    \n**发送发票消息**\n\n与发送图片或文本类似，你可以使用 `SendInvoice` 消息向聊天发送发票。\n\nSendInvoice sendInvoice\n\
    \n= new SendInvoice(id, \"Lemon\", \"desc\", \"hello\",\"2846850\n\n63:TEST:NDBlMjliMGM2YmQ0\"\
    , \"my_start_param\", \"JPY\", new LabeledPrice(\"label\", 2000))\n\n.needPhoneNumber(false)\n\
    \n.needShippingAddress(false)\n\n![](img/index-187_1.png)\n\n第 8 章   第 8 周：Java\n\
    \n.isFlexible(true)\n\n.replyMarkup(new InlineKeyboardMarkup(new InlineKeyboardButton[]\
    \ \n\n{ new InlineKeyboardButton(\"just pay\").pay(),\n\nnew InlineKeyboardButton(\"\
    google it\").url(\"www.google.com\") })); 同样，你可以同步或异步执行查询。建议避免阻塞主线程上的执行。\n\n//\
    \ sync version\n\nSendResponse response = bot.execute(sendInvoice);\n\n// async\
    \ version\n\nbot.execute(sendInvoice, new Callback<SendInvoice, SendResponse>()\
    \ {\n\n@Override\n\npublic void onResponse(SendInvoice request, SendResponse \n\
    \nresponse) {}\n\n @Override\n\n public void onFailure(SendInvoice request, IOException\
    \ e) {}});\n\n支付只能使用 Telegram 应用的移动版本进行，用户还需要提供他们的配送详情（图 8-13）。\n\n***图 8-13.\
    \ 给我开柠檬的发票***\n\n在此步骤中，点击“just pay”将让支付机器人发送一个配送查询请求。（实际上，仅当设置了 `.isFlexible (true)`\
    \ 时才会发生。）在此阶段，我们可以发送一些配送选项并将其发送回聊天。\n\n![](img/index-188_1.png)\n\n第 8 章   第 8\
    \ 周：Java\n\nShippingQuery shipping= updates.get(0).shippingQuery();\n\nif (shipping!=\
    \ null) {\n\n    ShippingOption option =\n\nnew ShippingOption(\"fedex\", \"FedEx\"\
    , new LabeledPrice(\"JOY\", 2000)); AnswerShippingQuery query =\n\nnew AnswerShippingQuery(shipping.id(),\
    \ option);\n\n    bot.execute(query);\n\n    return UpdatesListener.CONFIRMED_UPDATES_ALL;\n\
    \n}\n\n配送选项随后将显示在聊天中，如图 8-14 所示。\n\n***图 8-14. 配送选项***\n\n![](img/index-189_1.jpg)\n\
    \n第 8 章   第 8 周：Java\n\n图 8-15 和 8-16 显示了填写支付流程剩余信息的过程。\n\n***图 8-15. 完整结账屏幕***\n\
    \n![](img/index-190_1.jpg)\n\n第 8 章   第 8 周：Java\n\n***图 8-16. 交易验证***\n\n最后，支付机器人将向你的机器人发送一个预结账请求，其中包含所有支付详情。你必须尽快响应此请求，实际上最长时间限制是\
    \ 10 秒，否则支付将被取消。\n\n当收到 `preCheckoutQuery` 元素时，通过发送带有查询 ID 的 `PreCheckoutQuery`\
    \ 来完成交易。\n\n![](img/index-191_1.jpg)\n\n第 8 章   第 8 周：Java\n\nPreCheckoutQuery\
    \ query = updates.get(0).preCheckoutQuery();\n\nif (query != null) {\n\n    AnswerPreCheckoutQuery\
    \ apcq =  new AnswerPreCheckoutQuery \n\n(query.id());\n\n    bot.execute(apcq);\n\
    \n    return UpdatesListener.CONFIRMED_UPDATES_ALL;\n\n}\n\n图 8-17 显示了支付完成后的聊天界面。\n\
    \n***图 8-17. 支付完成***\n\n![](img/index-192_1.jpg)\n\n第 8 章   第 8 周：Java\n\n在 Stripe\
    \ 仪表板的支付部分，启用测试数据后，你可以看到不同的订单通过，如图 8-18 所示。\n\n***图 8-18. Stripe 测试日志***\n\n这相当顺利。这就是\
    \ Java 中完整的支付流程生命周期。现在轮到你去卖柠檬了……然后变得富有！\n\n![](img/index-193_1.jpg)\n\n**第 9 章**\n\
    \n**第 9 周：Go**\n\n*我有九张扶手椅，可以从中进行批评。*\n\n—里克·莫拉尼斯\n\nGo 最初是由不太喜欢 C++ 编程语言的人创建的。Go\
    \ 是一种强类型编译语言，主要目标是既易于学习又执行快速。Go 也是少数拥有出色标志的语言之一！\n\n该标志如图 9-1 所示，由 [Renée French](http://reneefrench.blogspot.com)\
    \ 设计，据我所知，在注明出处的情况下，我可以在此使用它。\n\n***图 9-1. Gopher，Renée French 为 Go 语言设计的标志***\n\
    \n© Nicolas Modrzyk 2019 \n\nN. Modrzyk, 《构建 Telegram 机器人》，`doi.org/10.1007/978-1-4842-4197-4_9`\n\
    \n![](img/index-194_1.png)\n\n第 9 章   第 9 周：Go\n\n在本章中，我将回顾如何安装 Go 二进制文件，然后介绍第一步和基本的\
    \ Go 示例，接着编写一个 Telegram 机器人，最后编写一个命令行二进制文件，通过 API 发送不同的 Telegram 对象。\n\n**安装 Go**\n\
    \n要下载 Go，你可以使用 Go 网站上的预打包版本，位于 [`golang.org/dl/`](https://golang.org/dl/)。大多数平台都有可用的下载选项，如图\
    \ 9-2 所示。\n\n***图 9-2. 适用于你首选平台的 Go 包***\n\n你喜欢的包管理器也应该有可用的 Go 包。\n"
