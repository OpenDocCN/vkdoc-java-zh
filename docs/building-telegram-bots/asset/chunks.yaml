- fmt: "# Current version\n\n`$ go version`\n\n`go version go1.11 linux/amd64`\n\n\
    It is usually recommended that you create a `GOPATH` variable, which is used so\
    \ that your Go packages can be downloaded and stored in a known place.\n\n`export\
    \ GOPATH=$HOME/go`\n\nVisual Studio Code has a plug-in for Go, and to install\
    \ it, it is recommended that you follow this recipe. There are multiple plug-ins\
    \ for Go, but the one from Microsoft is very solid and is shown in Figure [9-3](#index_split_001.html#p195).\n\
    \n***Figure 9-3.** The Go plug-in for Visual Studio Code*\n\nThe Go-related `tasks.json`\
    \ for the Visual Studio Code build tasks, and its Command+Shift+B shortcut, required\
    \ to execute code from within Visual Studio Code, is written following, for convenience.\n\
    \n```\n{\n    \"version\": \"2.0.0\",\n    \"tasks\":\n        [\n          {\n\
    \            \"label\": \"letsgo\",\n            \"command\": \"go\",\n      \
    \      \"args\": [\n              \"run\",\n              \"${file}\"\n      \
    \      ],\n            \"options\": {\n              \"cwd\": \"${workspaceRoot}\"\
    \n            },\n            \"group\": {\n              \"kind\": \"build\"\
    ,\n              \"isDefault\": true\n            }\n          }\n        ]\n\
    }\n```\n\nFrom the `tasks.json` file, you’ll notice that the command to build\
    \ a Go program is `go run <filename>`.\n\nNow, let’s move on to the first Go program.\n\
    \n## Let’s Go\n\nThe basic structure of a program in Go is separated into three\
    \ main blocks.\n\n- The package definition, done with `package`\n- The imports,\
    \ all defined in one block\n- The main function that gets executed when running\
    \ the `go run` command\n\nWe’ll start our Go adventures with a program that will\
    \ read text from a file. This technique will be reused for reading a token for\
    \ our bot, later in this chapter.\n\nThe project structure for a Go project relies\
    \ on a folder with only one main function and a selection of Go source files,\
    \ each ending with the `.go` extension. Our first setup will have a `reading.go`\
    \ file to write the go source code and a text file, `file.txt`, to read sample\
    \ text from.\n\n```\n$ tree\n.\n├── file.txt\n└── reading.go\n0 directories, 2\
    \ files\n```\n\nNow on to the Go code itself. As presented in the preceding bulleted\
    \ list, the source file has three sections, starting with the package definition.\
    \ You’ll also notice that if you forget to write the package definition, the Visual\
    \ Studio Code plug-in will automatically add it for you on saving.\n\nThere are\
    \ two imports we are going to use:\n\n- `io/ioutil`, to read the file content\n\
    - `fmt`, which is quite classic, to print on the standard output\n\nWith the help\
    \ of auto-completion, it’s easy to browse your way through the different packages\
    \ in Go, as shown in Figure [9-4.](#index_split_001.html#p198)\n\n![](index-198_1.jpg)\n\
    \n***Figure 9-4.** Importing packages through completion in Visual Studio Code*\n\
    \nBefore going on and explaining the main function, let’s copy and paste the following\
    \ code in the `reading.go` file and execute the code first.\n\n```\npackage main\n\
    \nimport (\n    \"fmt\"\n    \"io/ioutil\"\n)\n\nfunc main() {\n    b, err :=\
    \ ioutil.ReadFile(\"file.txt\")\n    if err != nil {\n        fmt.Print(err)\n\
    \    }\n    str := string(b)\n    fmt.Println(str)\n}\n```\n\n![](index-199_1.jpg)\n\
    \nNow open the folder containing the `reading.go` and `file.txt` files and use\
    \ the Visual Studio Code build command defined during the installation process,\
    \ as shown in Figure [9-5.](#index_split_001.html#p199)\n\n***Figure 9-5.** Our\
    \ first Go program reads content from a file*\n\nSo, the file does not contain\
    \ a token yet, but it does contain some text that was read by the program from\
    \ the main function. What was the function doing, by the way?\n\nFirst, we used\
    \ `ReadFile` from the `ioutil` go package, to open and read the full contents\
    \ of file to an array of bytes.\n\n`b, err := ioutil.ReadFile(\"file.txt\")`\n\
    \n`ReadFile` actually returns two values, one for the content of the file in bytes,\
    \ and one in case an error has occurred while reading those bytes from the file.\
    \ As you can see, Go makes it easy to assign the returned results to multiple\
    \ variables.\n\nNow, let’s see if an error occurred, by checking whether `err`\
    \ is `nil`. If it’s not, let’s use `fmt` and its `Print` function, to display\
    \ the content of the `err` variable itself in the standard output.\n\n```\nif\
    \ err != nil {\n    fmt.Print(err)\n}\n```\n\nIf the code has executed till this\
    \ `if` statement, we’re in pretty good shape. Let’s convert the byte content returned\
    \ by `ReadFile` to a string and display the content of the string, again using\
    \ `fmt`’s `Println`.\n\n```\nstr := string(b)\nfmt.Println(str)\n```\n\nGreat.\
    \ We’re all set up, and our first Go program executed properly.\n\nNote here that\
    \ you can generate a binary file from all the source files contained in this folder,\
    \ using the `build` subcommand of Go.\n\n`go build` comes in two forms, one for\
    \ which you specify the file name and one for which you don’t. It is usually better\
    \ to separate projects into different folders and use the version of the `build`\
    \ command without the parameter.\n\n`go build`\n\nAfter you execute the command,\
    \ a new file, called `go1`, will be generated in the project’s folder, as shown\
    \ in Figure [9-6](#index_split_001.html#p201).\n\n![](index-201_1.png)\n\n***Figure\
    \ 9-6.** The executable binary `go1` generated by the `build` command*\n\nAlso\
    \ note that the file name of the generated binary is by default the name of the\
    \ folder containing the code, not the Go source file containing the main function.\n\
    \nLet’s quickly confirm that the binary works as expected.\n\n```\n$ ./go1\nI\
    \ contain a token\n```\n\nIf you move one folder up, in the folder in which the\
    \ `file.txt` is not present, you can also confirm that the program crashes and\
    \ displays an error message, the one from the `if` block checking for `err`.\n\
    \n```\n$ ./go1/go1\nopen file.txt: no such file or directory\n```\n\nSweet! Let’s\
    \ move to Fib now!\n\n## Let’s Fib\n\nFor this Fibonacci Go program, we will be\
    \ using the recursive route. This implementation brings four new procedures, compared\
    \ to the first simple program we just executed.\n\nFirst, we’ll define a new function\
    \ separated from `main`, named `Fibonacci`, which will simply call itself recursively\
    \ with different parameters, `n-1` and `n-2`. Then, we will implement the `main`\
    \ function that will retrieve the first parameter that is being sent to the program.\
    \ We’ll then convert its value from a string to an integer, using a function named\
    \ `Atoi` from the `strconv` package.\n\nLast, we’ll call the `Fibonacci` function\
    \ with the integer parameter and print the result of the call to the `Fibonacci`\
    \ function in the standard output.\n\nThe Go code snippet is as follows:\n\n```\n\
    package main\n\nimport (\n    \"fmt\"\n    \"os\"\n    \"strconv\"\n)\n\n// Fibonacci\
    \ computes fibonacci by recursion\nfunc Fibonacci(n int) int {\n    if n <= 1\
    \ {\n        return n\n    }\n    return Fibonacci(n-1) + Fibonacci(n-2)\n}\n\n\
    func main() {\n    i, _ := strconv.Atoi(os.Args[1])\n    fmt.Println(Fibonacci(i))\n\
    }\n```\n\n![](index-203_1.png)\n\nThe code is relatively easy to follow at this\
    \ stage, the main point being the conversion of the parameter to an integer. `os.Args`\
    \ retrieves the array of parameters, which starts at 0 with the command path itself.\
    \ Note that if you try to print the parameter at index 0 with\n\n`fmt.Println(os.Args[0])`\n\
    \nyou’ll get the automatically generated path from Visual Studio Code.\n\n`/var/folders/8g/42979vpd0ml_ly722rgl3x780000gp/T/go-build290797788/b001/exe/fib`\n\
    \nLooking a bit more closely at the `main` function, you’ll see that the conversion\
    \ done with `Atoi` also returns two parameters and that you can also ignore the\
    \ case in which there is an error, with the symbol `_`. If you try to type in\
    \ a variable name but do not use it, the Go compiler will complain, as shown in\
    \ Figure [9-7.](#index_split_001.html#p203)\n\n***Figure 9-7.** In Go, you cannot\
    \ declare a variable and not use it*\n\nIn Visual Studio Code, if you want to\
    \ build and avoid hard-coding the parameters in the code itself, you can update\
    \ the `tasks.json` a little, as shown in Figure [9-8](#index_split_001.html#p204).\n\
    \n![](index-204_1.png)\n\n***Figure 9-8.** Add `10` as a parameter to the program,\
    \ to execute from within the Visual Studio Code*\n\nYou can, of course, use `go\
    \ build` to compile and run from the command line as well.\n\n```\n$ go build\n\
    $ ls\nfib.go go2\n$ ./go2 10\n$ ./go2 100\n... wait for ever\n```\n\nRecursive\
    \ Fibonacci does not seem to be so performant. But I’ll let you implement a faster\
    \ version on your own and move on to the Telegram bot.\n\n## First Bot in Go\n\
    \nThe Go language has one of the best libraries to interact with the Telegram\
    \ Bot API. Its name is `telebot`, and you can find it on GitHub at [https://github.com/tucnak/telebot#overview](https://github.com/tucnak/telebot#overview).\n\
    \nYou don’t really have to download it, because the Go command line can do that\
    \ for you with the `get` subcommand. To install `telebot` on your local machine,\
    \ use the following command:\n\n`go get -u gopkg.in/tucnak/telebot.v2`\n\n`-u`\
    \ tells the `go get` command to connect to the network and look for updates if\
    \ needed.\n\nThe code to follow is building on the two first examples of this\
    \ chapter. In this first bot, we’ll\n\n- Require the `telebot` library\n- Read\
    \ the token from a file\n- Use this token to initialize a polling bot\n- Add a\
    \ basic handler for the bot command\n\nNote how you can give a prefix to the packages\
    \ imported. The command below shows both the package name to be imported and the\
    \ prefix used for all the functions, here, `telegram`.\n\n`telegram \"gopkg.in/tucnak/telebot.v2\"\
    `\n\nYou’ll also note that the auto-completion from Visual Studio Code gives you\
    \ a clean and convenient visual access to the functions exposed by the `telebot`\
    \ library, as shown in Figure [9-9](#index_split_001.html#p206).\n\n![](index-206_1.png)\n\
    \n***Figure 9-9.** Familiar APIs and constructs*\n\nIn the upcoming code listing,\
    \ there are mainly two new constructs that you have not really seen before. First\
    \ is the fact that you can assign a reference to a custom data type, or struct,\
    \ instead of referencing the struct itself, using the `&` sign (ampersand).\n\n\
    `Poller: &telegram.LongPoller{Timeout: 10 * time.Second}`\n\nYou use a pointer\
    \ instead of a struct literal in mostly two situations:\n\n- When the struct is\
    \ big and you pass it around\n- When the struct is meant to be shared, that is,\
    \ all modifications affect the struct, instead of affecting the copy\n\nThe second\
    \ new piece of code relates to the definition of a callback using an anonymous\
    \ function. In this case, you get a pointer to a Telegram message object, instead\
