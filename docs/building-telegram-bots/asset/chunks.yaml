    \n***Figure 11-6.   Write it or require it***\n\nNote how the version that was\
    \ imported in the notebook is displayed right next to the `require` statement.\n\
    \n### A Certain Je Ne Sais Koa\n\nKoa is the next-generation web framework for\
    \ Node.js. It is built with what was learned during the Express JS years and is\
    \ a step easier to learn and maintain. Koa’s home page can be found at [https://koajs.com/#application](https://koajs.com/#application).\n\
    \n![](index-242_1.png)\n\n## Chapter 11   Week 11: Node.js\n\nWith what you’ve\
    \ seen of the RunKit playground, you may already feel that you can `require` Koa\
    \ libraries and start a server.\n\nFollowing is a short snippet taken from the\
    \ Koa samples:\n\n```\nconst Koa = require('koa');\nconst app = new Koa();\n\n\
    app.use(async ctx => {\n  ctx.body = 'Hello World';\n});\n\napp.listen(3000);\n\
    ```\n\nThere are four main steps to creating a simple Koa application.\n\n• `Require`\
    \ koa\n• Create a new Koa app\n• Create an asynchronous handler\n• Get the app\
    \ to listen (on a port)\n\nIf you execute the code from the preceding snippet\
    \ in a new notebook, you can instantiate a server directly from the browser (Figure\
    \ [11-7](#index_split_001.html#p242)).\n\n***Figure 11-7.   Running a server on\
    \ RunKit***\n\n![](index-243_1.png)\n\n## Chapter 11   Week 11: Node.js\n\nAnd,\
    \ yes, this server is already listening to requests. So, if you click the end\
    \ point click available in the notebook, you will open a page, with a temporary\
    \ URL assigned to your Koa application, with the expected Hello World message\
    \ showing up here again (Figure [11-8).](#index_split_001.html#p243)\n\n***Figure\
    \ 11-8.   Koa running in the cloud***\n\n### Publishing Some Koa\n\nPublishing\
    \ to a temporary URL is fine, but to work with Telegram Bot, you must have a somewhat\
    \ permanent and public URL to work with. This can be achieved in RunKit by using\
    \ the Publish link. Clicking the link will show a pop-up dialog asking you for\
    \ some semantic (!) version of your application (Figure [11-9).](#index_split_001.html#p244)\n\
    \n![](index-244_1.jpg)\n![](index-244_2.png)\n\n## Chapter 11   Week 11: Node.js\n\
    \n***Figure 11-9.   Ready to publish, Koa?***\n\nAnd now the Koa application is\
    \ available at an easy-to-remember location, in the following form:\n\n[https://runkit.io/hellonico/simple-koa/branches/master](https://runkit.io/hellonico/simple-koa/branches/master)\n\
    \nYou can access it reliably from your browser. Note that you will actually get\
    \ redirected to a URL mapped internally by RunKit (see Figure [11-10).](#index_split_001.html#p244)\n\
    \n***Figure 11-10.   Published!***\n\n![](index-245_1.png)\n\n## Chapter 11  \
    \ Week 11: Node.js\n\nAlso, note that the URL is via the HTTPS protocol, which\
    \ is quite important, because Telegram does not accept pure HTTP end points.\n\
    \nFrom here, you should practice some more with Koa and RunKit, and once you are\
    \ ready, let’s see how to write a first Telegram bot using RunKit, Koa, and that\
    \ mysterious Telegram webhook.\n\n### Telegram Bot with Webhooks\n\nSo, first,\
    \ webhooks...What are they? Webhooks work in the opposite direction as polling.\
    \ Where polling is your client bot periodically asking the Telegram server if\
    \ any new message has arrived, with webhooks, you ask the Telegram server to send\
    \ you an update message whenever a new message that your bot should know about\
    \ has been sent to a chat room.\n\nThe flow is summarized in Figure [11-11](#index_split_001.html#p245).\n\
    \n***Figure 11-11.   Polling vs. webhooks***\n\n## Chapter 11   Week 11: Node.js\n\
    \nKnowing this, we just need to know if there is a Telegram Bot API method to\
    \ tell about your application end point—and there is one here:\n\n[https://core.telegram.org/bots/api#setwebhook](https://core.telegram.org/bots/api#setwebhook)\n\
    \nIn the following snippet, you can see how the `setWebhook` function is used\
    \ to publicize the URL to the bot API.\n\n```\nconst Telegraf = require('telegraf')\n\
    const Koa = require('koa')\nconst koaBody = require('koa-body')\n\nconst bot =\
    \ new Telegraf(process.env.BOT_TOKEN)\n\nbot.on('text', ({ reply }) => reply('The\
    \ time here is ::'+ new Date()))\n\nbot.telegram.setWebhook('https://runkit.io/hellonico/koa-bot/branches/master')\n\
    \nconst app = new Koa()\napp.use(koaBody())\napp.use((ctx, next) => ctx.method\
    \ === 'POST' || ctx.url === '/secret-path'\n  ? bot.handleUpdate(ctx.request.body,\
    \ ctx.response)\n  : next()\n)\napp.listen(3000)\n```\n\n![](index-247_1.jpg)\n\
    \n## Chapter 11   Week 11: Node.js\n\nIt will show in Koa as in Figure [11-12](#index_split_001.html#p247).\n\
    \n***Figure 11-12.   First bot on RunKit***\n\nNow, I can explain the two missing\
    \ pieces of the code. The first is where we glue the HTTP POST request to the\
    \ Telegraf bot, using `handleUpdate`, which does two things:\n\n• Maps `ctx.request.body`\
    \ to the input request for the bot\n• Maps `ctx.response` to the output response\
    \ from the bot\n\n```\napp.use(koaBody())\napp.use((ctx, next) => ctx.method ===\
    \ 'POST' || ctx.url\n=== '/secret-path'\n  ? bot.handleUpdate(ctx.request.body,\
    \ ctx.response)\n  : next()\n)\n```\n\n![](index-248_1.png)\n\n## Chapter 11 \
    \  Week 11: Node.js\n\nThe second missing piece is similar to other APIs presented\
    \ in this book.\n\n```\nbot.on('text', ({ reply }) => reply('The time here is\
    \ ::'+ new Date()))\n```\n\nWhenever some text arrives to the bot, we have a callback,\
    \ with a destructured reply object (prepared by Telegraf), which we can use to\
    \ send messages back to the chat. Before running this bot, you will have noticed\
    \ that the code requires a token retrieved from the environment that started the\
    \ Node.js process.\n\n```\nconst bot = new Telegraf(process.env.BOT_TOKEN)\n```\n\
    \nRunKit allows you to do that, by setting environment variables to your notebooks\
    \ (yes!).\n\nTo access the settings page, navigate to your own RunKit settings\
    \ page (Figure [11-13](#index_split_001.html#p248)).\n\n***Figure 11-13.   Settings\
