    ** OpenCV  Bot**


    The cmake setup for the full OpenCV bot is the same as the previous one, so there’s
    no need to change the CMakeLists.txt, apart from the project name. The thing to
    know ahead of programming this bot is that when the chat receives a message with
    a picture, the message contains a fileId corresponding to the file that was saved.


    On the Telegram architecture, those files are hosted on different servers, thus
    a different API. The new location is api.telegramorg/file/bot.


    The URL to retrieve files is then constructed from this base URL, 


    appended with the bot token and, finally, the fileId.


    Chapter 6   Week 6: C++


    To read a file and process the picture or file, we must perform a 


    different request to retrieve that file. So, in this example, you will reuse the
    trick of running the curl command from the C++ code to perform this request.


    The following function, applyOpenCV, downloads a static file from the Telegram
    server applies the opencv process of turning the picture to shades of gray, and,
    finally, saves it to a file named saved.jpg.


    const string telegram_url = "https://api.telegram.org/file/bot"; const string
    tmp_file = "download.jpg";


    const string saved_file = "saved.jpg";


    string applyOpenCV(string token, string path) {


        string command = string("curl --silent ");


        command


    .append(telegram_url)


    .append(token)


    .append("/")


    .append(path)


    .append(" -o ")


    .append(tmp_file);


    const char* cmd = command.c_str();


        system(cmd);


        Mat bw = imread(tmp_file,0);


    imwrite(saved_file, bw);


        return saved_file;


    }


    Now, we just need an entry point to call this function. This will be called when
    a photo is detected in the chat.


    Chapter 6   Week 6: C++


    So, in the bot callback handling the chat message, to detect whether a picture
    is present, we can a check the number of photo sizes included in the message.
    Once we know there is a picture (or pictures), we can retrieve its (their) fileId and
    then call the applyOpenCV function we have just defined with the filePath and
    the token.


    Also, note, as I previously touched on, the vector of the reference is being added
    a new pointer on token. If you forget to do this, 


    the callback does not have access to the token variable, and the 


    compilation fails.


    bot.getEvents().onAnyMessage([&bot, &token](Message::Ptr 


    message) {


     if(message->photo.size() != 0) {


    PhotoSize::Ptr s = message->photo[2];


        if(s!=NULL) {


         string fileId = message->photo[2]->fileId;


    File::Ptr file = bot.getApi().getFile(fileId);


         string filepath = applyOpenCV(token.c_str(), file-


    >filePath.c_str());


    bot.getApi().sendPhoto(


            message->chat->id,


    InputFile::fromFile(filepath, "image/jpeg"));


        }


      }


    }


