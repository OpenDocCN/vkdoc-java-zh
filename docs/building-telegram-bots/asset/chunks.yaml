    ** First  Reply**


    Again, Ruby’s concision makes it quite easy to create strings from objects. 


    With the following, you can use blocks of executable code directly within a string: #{}.


    This makes it very powerful for templated messages, and in our case, for bot programming.
    Within the get_updates() call block, let’s now write and send a reply.


        message.reply do |reply|


