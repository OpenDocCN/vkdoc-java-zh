    git clone https://github.com/reo7sp/tgbot-cpp.git


    To compile and install the library, you need a few tools, such as make, cmake, ssl development
    libraries, and boost.


    On Debian/Ubuntu, this would be


    apt-get install g++ make binutilscmakelibssl-dev libboost- 


    system- dev


    Then, once in the tgbot-cpp cloned directory, the bot library can be easily installed
    with this set of three commands:


    cmake .


    make


    sudo make install


    The install defaults to /usr/lib/, and you can check that the Telegram library
    is properly installed, by looking up the presence of the following file:


     /usr/local/lib/libTgBot.a


