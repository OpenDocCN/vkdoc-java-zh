    > Executing task: dmd -run APRESS/05-d/firststeps/threads1.d < Thread Tid(109a2d000):
    My state = 0


    Thread Tid(109a2d000): My state = 1


    ...


    Thread Tid(109a2d300): My state = 3


    Thread Tid(109a2d500): My state = 2


    Thread Tid(109a2d400): My state = 3


    Thread Tid(109a2d300): My state = 4


    Thread Tid(109a2d500): My state = 3


    Thread Tid(109a2d400): My state = 4


    Thread Tid(109a2d500): My state = 4


    You can see that each thread has a separate state, and that state is incremented
    each time the thread is looping, by calling workers again.


    Now, let’s see how we can share a state between all those threads and perform
    some safe multi-threaded sharing of data.


    Chapter 5   Week 5: D


    ** Shared  State**


    The last example in our thread subsection for the D language closes in shared
    state, with a common counter that is increased by each thread separately. To create
    such a shared piece of data, the D language requires that you specifically mark
    the data as shared.


    Once this is done, you can use operations from the core.atomic 


    namespace, to safely update the value of that shared piece of data. The atomic
    operation we will use is a combination of atomicOp and +=, written as follows:


    atomicOp!"+="


    This creates a thread-safe version of the function +=.


    Let’s see how this is actually used, in the following snippet.


    import std.concurrency : spawn, thisTid;


    import std.stdio : writeln;


    import core.atomic : atomicOp;


    shared int flag = 0;


    void worker()


    {


        atomicOp!"+="(flag, 1);


        writeln("Thread ", thisTid,":global>",flag);


    }


    void main()


    {


        for (int i = 0; i < 20; ++i) {


            spawn(&worker);


        }


    }


    Chapter 5   Week 5: D


    atomicOp!"+=" receives two parameters, the shared data variable to update and
    the parameter to the atomic function += just created.


    When you run the preceding program, the output should be something like the following.
    Note the safeness of the threaded code.


    > Executing task: dmd -run APRESS/05-d/firststeps/threads3.d < Thread Tid(10e05c000):global>1


    Thread Tid(10e05c200):global>2


    Thread Tid(10e05c300):global>3


    Thread Tid(10e05c400):global>4


    Thread Tid(10e05c500):global>5


    Obviously, the D language has full-featured threading capabilities not exposed
    in the simple examples in this chapter, but they should be easy enough, so that
    you can perform multi-threaded tasks with them.


