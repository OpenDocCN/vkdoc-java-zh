    \ bot is the one that was found, so go to\n\n[https://github.com/visciang/telegram](https://github.com/visciang/telegram)\n\
    \nAs recommended on the library web site, you can add the library directly to\
    \ the `mix.exs` file, using the Git repository address and a tag, as follows:\n\
    \n```\n{:telegram, git: \"https://github.com/visciang/telegram.git\", tag: \"\
    0.5.0\"}\n```\n\nBy now, your `deps` block should look like this:\n\n```\ndefp\
    \ deps do\n    [\n      {:timex, \"~> 3.0\"},\n       {:telegram, git: \"https://github.com/visciang/telegram.\n\
    git\", tag: \"0.5.0\"}\n    ]\n  end\n```\n\n## Chapter 10   Week 10: elixir\n\
    \nRetrieving the `dep` is again done with `mix deps.get`, which will transparently\
