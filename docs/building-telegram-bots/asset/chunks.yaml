    **Introduction**


    *With a hundred ways to do a dozen things, why not try it all?*


    [—Julian](https://www.goodreads.com/author/show/16643925.Napz_Cherub_Pellazo) Casablancas
    Have you ever wondered how you could accomplish more by doing less, how you could
    have a sort of double who does all the work while you enjoy some cool beachside
    or spend more outdoor time with your beautiful children? I always have.


    I am a big fan of the Telegram chat platform. Let’s call it a platform, because
    it is more than a simple chat service with which you can stay in touch with people
    who matter to you most. It also enables you to think in ways you haven’t before.


    For example, living in Tokyo, you always care about what time the last train home
    is going to depart. I guess most people in big cities around the globe probably
    have that same concern. Checking the clock only every so often can result in a
    terrible and/or expensive taxi ride, so I started wanting something that automatically
    offered me a bunch of options to get home.


    The first bot I wrote was to tell me the schedule of the last few trains home
    and some different options, from the easiest to reach before the last few departures
    to the very latest, which I would have to dash to catch. That saved me quite a
    bit of money.


    The second bot I wrote was slightly more IoT-oriented. It used a 


    webcam to send me via Telegram pictures of people who rang my doorbell.


    The third one, I also remember, was kind of stupid. It was to use a mini projector
    to display the most recent message coming through a Telegram chat room. (It’s
    very entertaining to view random messages during a small party at home.)


    xv


    InT


    In roduCTIon


    CTI


    But there are so many things for which to try to build a bot—search for a plane
    ticket, check your fridge, etc. Having a bot is a simple way to facilitate all
    the things you do daily, using the same kind of simple Telegram chat rooms to
    get answers to questions related to daily life or to issue commands and conquer
    the world.


    This relatively short book is about learning how to write Telegram bots in several
    different programming languages. Why not use one 


    and stick to it? you might ask. Well, because there’s not one answer to all questions,
    and what’s right for others might not be suitable for you. 


    Exploring different programming languages is also a fun way to examine the strengths
    of each language while performing the same tasks. Each of the Telegram concepts
    can be introduced one after the other, in a simple fashion.


    Or, you could just jump in and choose the language you want to try and get started
    in no time. Some people want it to happen; some wish it would happen; others make
    it happen. So, enjoy reading this book, and make it happen.


