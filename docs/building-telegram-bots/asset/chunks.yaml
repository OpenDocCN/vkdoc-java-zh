    \ \"is_bot\" => true,\n\n   \"username\" => \"chapter01bot\"\n\n }}\n\n请求已成功发送，我们可以使用标准的\
    \ Telegram `User` 对象，其中包含机器人名称和机器人 ID。\n\n** GetChat**\n\n`getChat` Telegram 函数的文档位于\
