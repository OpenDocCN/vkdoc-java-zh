    ** Second Nim Program (Still Not Bot)**


    In this second example, we will send an HTTP request to a remote site and print
    the result on the command line. This new program requires some code from a different
    Nim module, httpclient, which contains the object that can send HTTP requests
    and reads the return value. You will use the keyword import to make this happen.


    The rest of the code, matching closely a Python-like syntax, is quite easy to
    read.


    import httpclient


    const URL = "https://api.github.com/search/repositories" &


                "?q=cat" &


                "&sort=stars" &


                "&order=desc"


    let


        client = newHttpClient()


    echo client.getContent(URL)


    ![](index-38_1.jpg)


    ![](index-38_2.jpg)


    Chapter 2   Week 2: Nim


    We see first the creation of a constant String, URL, which will be the target
    of the HTTP request. let defines a scoped variable, the HTTP client. 


    Finally, we retrieve the body coming from the HTTP get request, with getContent called
    on the HTTP client.


    Let’s run this now, by calling the Nim: Run selected file command 


    from the palette (Figur[e 2-7).](#index_split_000.html#p38)


    ***Figure 2-7.  **Running the HTTP client*


    Unfortunately, things did not seem to fare too well, and a message with red text
    is showing, as in Figur[e 2-8](#index_split_000.html#p38).


    ***Figure 2-8.  **Failed execution*


    Fortunately, it tells you explicitly what’s wrong, which is quite unusual for
    a programming language. Go ahead and ask Java developers.


    ![](index-39_1.jpg)


    ![](index-39_2.jpg)


    Chapter 2   Week 2: Nim


    What happened is that the HTTP connection requires SSL, as we 


    are connecting over HTTPS. SSL is not included by default during the compilation
    step of Nim source files.


    To include SSL support, we must define a symbol, using the -d:ssl 


    flag, for the nim command, so that it will include the required code to execute
    the HTTPS request.


    If you want to try this on the command line or in a terminal, you can use the
    following full command:


    nim c -d:ssl -r getsome.nim


    The preceding command will compile and run the code, as expected, 


    finally outputting many lines of JSON returned from the get request. 


