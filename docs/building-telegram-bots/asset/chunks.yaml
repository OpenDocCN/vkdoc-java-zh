    \n## Chapter 11   Week 11: Node.js\n\n```\nvar fibonacci = require('fibonacci-fast');\n\
    var result = fibonacci.get(39    ).number.toString();\nconsole.log(result);\n\
    ```\n\nThe playground will make that library available to your notebook, without\
    \ you having to install or download anything. And with or without a library, it\
