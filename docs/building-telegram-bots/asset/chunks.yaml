    ** RegExp, Inline Keyboards, and Embedded Emojis**


    Telegraf has this cool embedded feature that allows you to match messages on RegExp
    and perform actions depending on those matches. This is 


    done using a regexp within either a .hears (for messages coming to a chat group)
    or .on (message directly sent to the bot) callback.


    Chapter 11   Week 11: Node.js


    In the following, “like” is searched in group chat messages, and an inline keyboard
    shows up.


    const { Markup } = Telegraf


    const inlineMessageRatingKeyboard = Markup.inlineKeyboard([


        Markup.callbackButton(''<'', ''like''),


        Markup.callbackButton(''='', ''dislike'')


    ]).extra()


    bot.hears(/like (.+)/, (ctx) => ctx.telegram.sendMessage(


        ctx.from.id,


        ''Like?'',


        inlineMessageRatingKeyboard)


    )


    Actions for callbacks themselves can be defined after. Here, we are editing the
    last message, the one with the inline keyboard in place, using the API function editMessageText.


    bot.action(''like'', (ctx) => ctx.editMessageText(''•• Awesome! ••'')) bot.action(''dislike'',
    (ctx) => ctx.editMessageText(''okey''))


    When the code is run, the bot will notify you whenever it finds a 


    message starting with “like,” as seen in Figur[e 11-17](#index_split_001.html#p253).


