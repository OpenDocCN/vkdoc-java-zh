    \ *3, an exception in *e\n\nuser=> (+ 1 1)\n\nuser=> (println \"hello world\"\
    )\n\nhello world\n\nnil\n\nuser=>\n\n除了直接编写 Clojure 代码，Leiningen 还可以通过使用 Leiningen\
