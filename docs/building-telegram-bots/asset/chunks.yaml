    \n第 7 章   第 7 周：Clojure\n\n**初始设置和第一个 Clojure 机器人**\n\nClojure 运行在 Java 虚拟机之上，所以如果你还没有安装它，请访问\
    \ [`jdk.java.net`](http://jdk.java.net)，并安装一个适合你机器的 `openjdk` 版本。在 Linux 机器上，几乎每个包管理器都有\
    \ `openjdk` 的版本。例如，在 Manjaro/Arch Linux 上，你可以使用 `yaourt -S java-openjdk-ea-bin`。\n\
    \n就本书测试的设置而言，JDK 8 到 11-ea 版本都通过了测试。\n\n现在你已经有了 Java 编译器，你只需要 Leiningen，这是 Clojure\
    \ 事实上的构建工具。安装说明很短，可以从网站 [`leiningen.org/`](https://leiningen.org/) 获得。\n\n主要任务是安装一个为你下载和引导\
    \ Leiningen 的包或 shell 脚本。在 Manjaro/Arch 上，命令如下：\n\nyaourt -S leiningen\n\n如果设置一切顺利，你现在应该可以在命令行上使用\
