    ** TensorFlow to Close the Show**


    You have probably heard about TensorFlow, one of the most famous


    machine learning frameworks. Creating your own models and


    understanding all the mathematics behind the library is completely beyond the
    scope of this book. But because TensorFlow comes as a Python first, we are going
    to see a short example of a Telegram bot that uses TensorFlow to identify the
    content of pictures.


    With TensorFlow, you can train models, using a list of layers (steps), for something
    that looks like a memory, a network. You tell this memory to recognize that this
    X in input gives this Y in output, or X,Y in input gives Z


    in output, and, eventually, that a list of pixels is a cat or a dog.


    Chapter 12   Week 12: python


    You train this memory with a large data set of inputs and outputs, in this case,
    images, and then you can reuse this network in the wild. There are already pretrained
    models for us, so the following bot will use an existing set of pictures to train
    a model and reuse that TensorFlow model.


    TensorFlow itself is again installed using pip.


    pip install tensorflow


    The model and the image classification code is located at


    [https://github.com/tensorflow/models](https://github.com/tensorflow/models)


    And, more specifically,


    [https://github.com/tensorflow/models/tree/master/tutorials/](https://github.com/tensorflow/models/tree/master/tutorials/image/imagenet)


    [image/imagenet](https://github.com/tensorflow/models/tree/master/tutorials/image/imagenet)


    To use this, we are going to first copy the classify_image code and apply a few
    modifications to the code, mostly to


    •  Call it as a library instead of the command line


    •  Return the prediction—actually, the top best prediction


    The diff is provided in the example and as follows:


    48c48,54


    < FLAGS = None


    > class ObjectDict(dict):


    >       def __init__(self, *args, **kws):


    >           super(ObjectDict, self).__init__(*args, **kws)


    >           self.__dict__ = self


    >


    >  FLAGS = ObjectDict({''model_dir'':"/tmp/imagenet", ''num_top_


    predictions'': 1})


    >


    Chapter 12   Week 12: python


    164,167c171


    <     for node_id in top_k:


    <       human_string = node_lookup.id_to_string(node_id)


    <       score = predictions[node_id]


    <       print(''%s (score = %.5f)'' % (human_string, score))


    >     return node_lookup.id_to_string(top_k[0])'
