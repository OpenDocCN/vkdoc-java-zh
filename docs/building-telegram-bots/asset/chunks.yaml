    第 10 章 第 10 周：Elixir\n\n** 使用 Elixir 的系统命令**\n\n要下载上述文件路径，请记住之前使用的技巧，避免需要额外的第三方库。我们只需使用\
    \ `curl`，此时它应该已经安装在本地机器上。\n\n在 Elixir 中，调用系统命令是通过 `System.cmd` 完成的。从 `file_path`\
    \ 下载文件的 HTTP URL 使用以下规则构建：\n\n[`api.telegram.org/file/bot<token>/<file_path>`](https://api.telegram.org/file/bot)\n\
    \n其中 `file_path` 的形式为：`profile_photos/file_10.jpg`。这样就得到了完整的代码。\n\n{:ok, res}\
    \ = Telegram.Api.request(token, \"getChat\", chat_id: 121843071)\n\nfileId = res[\"\
    photo\"][\"big_file_id\"]\n\n{:ok, res2} = Telegram.Api.request(token, \"getFile\"\
    , file_id:\n\n\"#{fileId}\")\n\nSystem.cmd(\"curl\",\n\n[\"-O\", \"https://api.telegram.org/file/bot#{token}/#{res2[\"\
    file_\n\npath\"]}\"])\n\n然后显示了作者的个人资料图片（图 10-5）。\n\n***图 10-5. 沙滩球，不是 OS X 的那个***\n\
    \n![](img/index-231_1.jpg)\n\n第 10 章 第 10 周：Elixir\n\n** SendPhoto**\n\n有时候，重要的不是你能得到什么，而是你能给予什么。遵循相同的模式，你可以使用\
    \ `sendPhoto` 发送图片，其构造完全相同。\n\ntoken = Application.get_env(:telegrambot, :token)\n\
    \nchat_id = 121843071\n\nphoto = \"cat.jpg\"\n\nTelegram.Api.request(token, \"\
