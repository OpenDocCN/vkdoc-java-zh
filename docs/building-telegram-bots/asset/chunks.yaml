    \n**关于技术审校者**\n\n**Dushyant Rathore** 目前在 Western Digital 担任固件工程师。他的经验包括全栈 Web\
    \ 开发、机器学习、去中心化应用等。Dushyant 曾在多家初创公司从事与物联网、聊天机器人、网站、爬虫、命令行工具和机器学习项目等相关的各种项目。他参加过国内和国际黑客马拉松，并赢得过其中一些。他是一位云计算爱好者。\n\
    \n**Sham Satyaprasad** 拥有超过四年的全栈软件开发经验，并拥有 Manipal 大学嵌入式系统硕士学位。他为自己编写高效、可读和可维护的代码而自豪，并坚信编码既是科学也是艺术。Sham\
    \ 最近对 NLP、ML 和数据科学产生了浓厚的兴趣，并一直忙于钻研这些主题。\n\nxi\n\n**致谢**\n\n为了按时完成这本书并克服困难，这又是一场打字比赛。Divya\
