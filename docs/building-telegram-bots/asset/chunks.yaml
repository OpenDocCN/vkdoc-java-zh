    **CHAPTER 6**


    **Week 6: C++**


    *Writing in C or C++ is like running a chainsaw with all the *


    *safety guards removed.*


    —Bob Gray


    It was inevitable to have a chapter on C++, especially after dealing with D. 


    What is surprising, however, is that there is a working Telegram bot API—wrapper—on
    the market, and what’s even more surprising is that it works very well.


    C++ is the language often thought of as a reference to what not to code, but I
    think it’s always a plus to have it in your toolbox.


    This chapter will focus on sending pictures from the usual echo bot to finally
    applying basic OpenCV calls on received images. OpenCV, if you are not familiar
    with this framework, is a universally known imaging library that can do everything
    from change colors and sizes to find objects in pictures and videos.


    ** Requirements, Installation, and First Bot**


    Working with C++ usually requires a fair bit of work to set up. To work with Telegram,
    we will be using tgbot-cpp, and to work with opencv, you’ll also be installing
    the imaging framework on your local machine.


