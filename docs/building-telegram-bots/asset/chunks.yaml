    ** Some Bits of D on Concurrency**


    Coming from the annoyance of Java with threading, you’ll be thrilled by the concurrency
    features of D. Threads in D can be created and  *spawned***,** just as with regular
    D functions.


    ** Simple  Threading**


    The namespace responsible for concurrency is appropriately named  


    std.concurrency, and we will use it for this first threaded test.


    To spawn a thread from a function, we will simply use spawn, which takes a reference
    to a function as a parameter. This is done using an ampersand (&) in front of
    any standard D function. The rest of the code snippet is quite easy to follow,
    so here is the program with threads: import std.concurrency : spawn, thisTid;


    import std.stdio : writeln;


    void worker()


    {


        writeln("Thread ", thisTid);


    }


    void main()


    {


        int TOTAL_WORKERS=5;


        for (int i = 0; i < TOTAL_WORKERS; ++i) {


            spawn(&worker);


        }


    }


    Chapter 5   Week 5: D


    Executing from Visual Studio Code gives an output similar to the one following,
    in which each thread simply prints its own id.


    > Executing task: dmd -run APRESS/05-d/firststeps/threads1.d < Thread Tid(109655000)


    Thread Tid(109655200)


    Thread Tid(109655300)


    Thread Tid(109655400)


    Thread Tid(109655500)


    From this short example, there are a few things worth noting.


    •  Every thread has a separate and uniquely assigned id, 


    labeled thisTid.


    •  The function passed to spawn is actually a reference to 


    the function, using &worker.


    Next, let’s see how to keep an internal state in each thread.


    ** Thread  with a State**


    In this second example, we define a static field inside the function that will
    be spawned for the thread. The defined threadState integer is stored locally to
    the thread as ThreadLocal. Also note that the integer threadState is created only
    once. Every subsequent time that the thread is calling itself via worker(), the
    thread state is not reinitialized.


    Here is the code snippet with a local state for a thread:


    import std.concurrency : spawn, thisTid;


    import std.stdio : writeln;


    void worker()


    {


        static int threadState = 0;


    Chapter 5   Week 5: D


        writeln("Thread ", thisTid,": My state = ", threadState++); if (threadState
    < 5) worker();


    }


    void main()


    {


        for (int i = 0; i < 5; ++i) {


            spawn(&worker);


        }


    }


