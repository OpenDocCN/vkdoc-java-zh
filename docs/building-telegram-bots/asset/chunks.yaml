    You can then apply any opencv transformation you want. Let’s define a function
    named apply-cv that applies a canny effect to the picture, loaded from a file.
    Note that the transformation is done in place in the file.


    (defn apply-cv [filename]


             (->  filename


               (origami/imread)


               (origami/cvt-color! origami/COLOR_RGB2GRAY)


               (origami/canny! 300.0 100.0 3 true)


               (origami/bitwise-not!)


               (origami/imwrite filename)))


    Finally, you call the OpenCV transformation on the file retrieved from the chat,
    by calling the previously defined apply-cv function and the downloaded file.


