- fmt: "# install as library\n\n`sudo make install`\n\nRemember where you have installed\
    \ `opencv` and its `build` folder, as you will need it later, when compiling C++\
    \ programs.\n\nTo verify our setup and get excited a bit, let's start by writing\
    \ a simple program that downloads a file, using the system command `curl`.\n\n\
    ## File Download Program\n\nWe will be reusing this piece of code later in the\
    \ OpenCV bot, so make sure you understand how things work. To write a project\
    \ using `cmake`, we first create a simple folder structure, with the `CMakeLists.txt`\
    \ file, and a source folder, with the C++ code in that source folder.\n\n```\n\
    [niko@niko-pcsamplecmake]$ tree\n.\n├── CMakeLists.txt\n└── src\n    └── main.cpp\n\
    \n1 directory, 2 files\n```\n\nThe `CMakeLists.txt` contains your project metadata,\
    \ and `main.cpp`, the C++ code. The following `CMakeLists.txt` file is a simplified\
    \ version of the one we will use to run `tgbot-cpp` later on. Let's have a look.\n\
    \n```\ncmake_minimum_required(VERSION 2.8.4)\nproject(samplecmake)\nset(CMAKE_CXX_FLAGS\
    \ \"${CMAKE_CXX_FLAGS} -std=c++11 -Wall\") set(Boost_USE_MULTITHREADED ON)\nfind_package(Threads\
    \ REQUIRED)\nfind_package(OpenSSL REQUIRED)\nfind_package(Boost COMPONENTS system\
    \ REQUIRED)\nfind_package(CURL)\ninclude_directories(/usr/local/include ${OPENSSL_INCLUDE_DIR}\
    \ ${Boost_INCLUDE_DIR})\nif (CURL_FOUND)\ninclude_directories(${CURL_INCLUDE_DIRS})\n\
    add_definitions(-DHAVE_CURL)\nendif()\nadd_executable(samplecmakesrc/main.cpp)\n\
    target_link_libraries(samplecmake ${CMAKE_THREAD_LIBS_INIT} ${OPENSSL_LIBRARIES}\
    \ ${Boost_LIBRARIES} ${CURL_LIBRARIES})\n```\n\nIn Table [6-1](#index_split_000.html#p128),\
    \ I list the commands used in the `cmake` definition files, in addition to why\
    \ they are used.\n\n**Table 6-1.** Understanding `cmake` file\n\n| Command | Use\
    \ |\n|---------|-----|\n| `cmake_minimum_required` | Defines which version of\
    \ `cmake` to use |\n| `project` | Defines the project name |\n| `set` | Sets variables\
    \ used during the build |\n| `find_package` | Finds external libraries, i.e.,\
    \ finds `cmake` files in search paths and retrieves symbols |\n| `include_directories`\
    \ | More folders to retrieve header files and packages |\n| `add_executable` |\
    \ Creates an executable, here, `samplecmake`, from a given source file |\n| `target_link_libraries`\
    \ | Identifies libraries to link to the given executable, here again, `samplecmake`\
    \ |\n\nWith this `CMakeLists.txt`, you can run the `cmake` command and prepare\
    \ the project for compilation. Here is the shortened output of the command execution:\n\
    \n```\n$ cmake .\n-- The C compiler identification is GNU 8.2.1\n-- The CXX compiler\
    \ identification is GNU 8.2.1\n-- Check for working C compiler: /usr/bin/cc\n\
    -- Check for working C compiler: /usr/bin/cc -- works\n...\n-- Looking for pthread_create\
    \ in pthreads\n-- Looking for pthread_create in pthreads - not found\n-- Looking\
    \ for pthread_create in pthread\n```\n\n![](index-129_1.jpg)\n\n```\n-- Looking\
    \ for pthread_create in pthread - found\n-- Found Threads: TRUE\n--  Found OpenSSL:\
    \ /usr/lib/libcrypto.so (found version \"1.1.0i\")\n-- Boost version: 1.67.0\n\
    -- Found the following Boost libraries:\n--   system\n-- Found CURL: /usr/lib/libcurl.so\
    \ (found version \"7.61.1\")\n-- Configuring done\n-- Generating done\n--  Build\
    \ files have been written to: /home/niko/Dropbox/BOOKS2/APRESS/06-cplusplus/samplecmake\n\
    ```\n\nIf you are writing code from Visual Studio Code again, there is a specific\
    \ and dedicated plug-in, created by Microsoft, that you can install (Figure [6-1](#index_split_000.html#p129)).\n\
    \n**Figure 6-1.** C/C++ plug-in for Visual Studio Code\n\nWith the plug-in installed,\
    \ you can start typing C++ code and your first C++ program of the day.\n\nHere\
    \ is a list of reminders before proceeding to look at the code:\n\n- `#include`\
    \ is used to include namespaces\n- Using `namespace` will prevent you from having\
    \ to insert the namespace in front of each symbol of given namespaces, thus, `std::string`\
    \ will become `string`, for example.\n- `int main(int argc, char* argv[])` is\
    \ the main entry point, and you can retrieve the number of `args`, as well as\
    \ an array of parameters. Note that the first parameter is at index 0 and is the\
    \ command name itself. Here, it will be `samplecmake`, as it was defined in the\
    \ project metadata file, `CMakeLists.txt`.\n- `auto url` means that we do not\
    \ specify the type of the variable ourselves; the compiler does it. Here, it will\
    \ actually be a `char*`, which is a pointer to an array of characters.\n- We will\
    \ actually download the file using a system command, `curl` (which should be installed\
    \ on your machine).\n- The shell command `curl` is called using the `system` function,\
    \ with `url` as the parameter to the `curl` command.\n\nThis now gives the slightly\
    \ readable code snippet following, which should be saved in a file named `main.cpp`.\n\
    \n```\n#include <string>\nusing namespace std;\n```\n\n![](index-131_1.jpg)\n\n\
    ```\nint main(int argc, char* argv[])\n{\n    auto url = argv[1];\n    printf(\"\
    Downloading: %s\\n\", url);\n    string command = string(\"curl --silent -O \"\
    );\n    const char* cmd = command.append(url).c_str();\n    system(cmd);\n   \
    \ return 0;\n}\n```\n\nTo create the executable, `cmake` has generated a Makefile,\
    \ a file that the `make` command understands. Running `make` will create an executable.\n\
    \n```\nmake\n```\n\nTo test our program, we can pass a URL with an image (or any\
    \ file, for that matter) for our newly compiled and linked program.\n\n```\n./samplecmake\
    \ http://stuffpoint.com/cats/image/245258-cats-cute-white-cat.jpg\n```\n\nThis\
    \ will download the cat shown in Figure [6-2](#index_split_000.html#p131).\n\n\
    **Figure 6-2.** Lovely cat\n\nGo ahead and try it with a few other URLs and see\
    \ the files being downloaded in the project folder, as expected.\n\nNow on to\
    \ our first bot!\n\n## Echo Bot\n\nThe echo bot will, of course, echo whatever\
    \ we send it. We will build on the download file project, so you can either reuse\
    \ it or create a new folder with the same file and structure.\n\nIn the new `CMakeLists.txt`,\
    \ you'll immediately notice three things:\n\n- The project name has been changed.\n\
    - The name of the executable has been changed to `echobot`.\n- The `target_link_libraries`\
    \ section contains a reference to our installed `tgbot-cpp` library, which is\
    \ packaged inside `/usr/local/lib/libTgBot.a`.\n\nThe rest is identical and should\
    \ hold few surprises.\n\n```\ncmake_minimum_required(VERSION 2.8.4)\nproject(echobot)\n\
    set(CMAKE_CXX_FLAGS \"${CMAKE_CXX_FLAGS} -std=c++11 -Wall\") set(Boost_USE_MULTITHREADED\
    \ ON)\nfind_package(Threads REQUIRED)\nfind_package(OpenSSL REQUIRED)\nfind_package(Boost\
    \ COMPONENTS system REQUIRED)\nfind_package(CURL)\ninclude_directories(/usr/local/include\
    \ ${OPENSSL_INCLUDE_DIR}\n  ${Boost_INCLUDE_DIR})\nif (CURL_FOUND)\ninclude_directories(${CURL_INCLUDE_DIRS})\n\
    add_definitions(-DHAVE_CURL)\nendif()\nadd_executable(echobotsrc/main.cpp)\ntarget_link_libraries(echobot\
    \ /usr/local/lib/libTgBot.a\n  ${CMAKE_THREAD_LIBS_INIT} ${OPENSSL_LIBRARIES}\n\
    \  ${Boost_LIBRARIES} ${CURL_LIBRARIES})\n```\n\nHere again, let's run the `cmake`\
    \ command\n\n```\ncmake .\n```\n\nto generate the necessary project files.\n\n\
    Now, on to the code. The forthcoming code is mostly taken from the `tgbot-cpp`\
    \ project samples, but there are a few things to notice.\n\n- The bot token is\
    \ read from an environment variable.\n- You can register as many callbacks as\
    \ you want, using `.getEvents.onCommand` or `.getEvents.onAnyMessage`. Here, the\
    \ bot is defined to respond to a command named `start` and on any message sent.\n\
    - On each callback, you must specify a vector of pointers that will be used in\
    \ the callback, hence, `[&bot]`. We will add some more later.\n- On each callback,\
    \ you get a pointer to the message, which has the same structure as you have seen\
    \ previously.\n- Finally, the bot is set up to do polling, as usual, but it has\
    \ to be made explicit with this C++ library.\n- And the snippet for the echo bot\
    \ is now shown following:\n\n```\n#include <tgbot/tgbot.h>\nusing namespace std;\n\
    using namespace TgBot;\n\nint main() {\n    string token(getenv(\"TOKEN\"));\n\
    \    printf(\"Token: %s\\n\", token.c_str());\n    Bot bot(token);\n\n    bot.getEvents().onCommand(\"\
    start\", [&bot](Message::Ptr message) {\n        bot.getApi().sendMessage(message->chat->id,\
    \ \"Hi!\");\n    });\n\n    bot.getEvents().onAnyMessage([&bot](Message::Ptr message)\
    \ {\n        printf(\"User wrote %s\\n\", message->text.c_str());\n        if\
    \ (StringTools::startsWith(message->text, \"/start\")) {\n            return;\n\
    \        }\n        bot.getApi().sendMessage(message->chat->id, \"Your message\
    \ is: \" + message->text);\n    });\n\n    signal(SIGINT, [](int s) {\n      \
    \  printf(\"SIGINT got\\n\");\n        exit(0);\n    });\n\n    try {\n      \
    \  printf(\"Bot username: %s\\n\", bot.getApi().getMe()->username.c_str());\n\
    \        bot.getApi().deleteWebhook();\n        TgLongPoll longPoll(bot);\n  \
    \      while (true) {\n            printf(\"Long poll started\\n\");\n       \
    \     longPoll.start();\n        }\n    } catch (exception& e) {\n        printf(\"\
    error: %s\\n\", e.what());\n    }\n\n    return 0;\n}\n```\n\nThe same steps are\
    \ used to compile and run. Before running the newly created executable, you must\
    \ expose the bot token as `TOKEN` in the current shell.\n\n```\nexport TOKEN=...\n\
    ./echobot\n```\n\nOn `start`, the bot will yield a short output, to say it has\
    \ started polling normally.\n\n```\nToken: ...\nBot username: chapter01bot\nLong\
    \ poll started\n```\n\nA sample chat session with this new bot is shown in Figure\
    \ [6-3](#index_split_000.html#p136).\n\n![](index-136_1.jpg)\n\n**Figure 6-3.**\
    \ C++ echobot\n\n## C++ Bots\n\nNow on our mission to deploy as many Telegram\
    \ bots as possible, we'll create two bots.\n\n- One bot with a Telegram inline\
    \ keyboard\n- Another bot that sends pictures to the chat\n\n### Bot with Inline\
    \ Keyboard\n\nThis second bot is also taken from the samples of the project and\
    \ is added here for reference. Inline keyboards are pretty much buttons sent to\
    \ the chat room that are assigned callbacks when pressed by the user, just like\
    \ a bot father. If you have started a project from scratch, there is no need to\
    \ add anything new to `CMakeLists.txt`, apart from changing the project's name.\n\
    \nWhat is interesting in the bot here is the way the keyboard is registered. The\
    \ rest of the code is identical to that for the echo bot and is left out for clarity.\n\
    \nThe keyboard is created using `InlineKeyboardMarkup`, and then rows of buttons\
    \ are created with the `InlineKeyboardButton` constructor. Each button has a callback,\
    \ here, `check`, that must be registered in a `onCallbackQuery` block, just like\
    \ commands and messages.\n\nFinally, you send the keyboard to the chat, using\
    \ the longer version of `sendMessage`, which accepts the created keyboard as parameter.\n\
    \n```\nbot.getApi().sendMessage(chatid, response, false, 0, keyboard, \"Markdown\"\
    );\n```\n\nThis gives the following snippet, which should be located inside the\
    \ `main` method of your program:\n\n```\n    // Thanks Pietro Falessi for code\n\
    \    InlineKeyboardMarkup::Ptr keyboard(new InlineKeyboardMarkup);\n    vector<InlineKeyboardButton::Ptr>\
    \ row0;\n    InlineKeyboardButton::Ptr checkButton(new InlineKeyboardButton);\n\
    \    checkButton->text = \"check\";\n    checkButton->callbackData = \"check\"\
    ;\n    row0.push_back(checkButton);\n    keyboard->inlineKeyboard.push_back(row0);\n\
    \n    bot.getEvents().onCommand(\"check\", [&bot, &keyboard](Message::Ptr message)\
    \ {\n        string response = \"ok\";\n```\n\n![](index-138_1.jpg)\n\n```\n \
    \       bot.getApi().sendMessage(message->chat->id, response, false, 0, keyboard,\
    \ \"Markdown\");\n    });\n\n    bot.getEvents().onCallbackQuery([&bot, &keyboard](CallbackQuery::Ptr\
    \ query) {\n        if (StringTools::startsWith(query->data, \"check\")) {\n \
    \           string response = \"ok\";\n            bot.getApi().sendMessage(query->message->chat->id,\
    \ response, false, 0, keyboard, \"Markdown\");\n        }\n    });\n```\n\nNow\
    \ let's compile and see this new bot in action (Figure [6-4](#index_split_000.html#p138)).\n\
    \n**Figure 6-4.** Bot with inline keyboard\n\n### Photo Bot\n\nThe photo bot is\
    \ here to present how to send pictures to the chat, using the C++ API. The Telegram\
    \ API being the same for any language, you'll notice how the method name is similar\
    \ to ones used in other languages.\n\nHere, we send an `example.jpg` image, located\
    \ at the root of the project folder.\n\n```\nconst string photoFilePath = \"example.jpg\"\
    ;\nconst string photoMimeType = \"image/jpeg\";\n\n  bot\n    .getEvents()\n \
    \   .onCommand(\"photo\", [&bot, &photoFilePath, &photoMimeType](Message::Ptr\
    \ message) {\n        bot.getApi().sendPhoto(message->chat->id, InputFile::fromFile(photoFilePath,\
    \ photoMimeType));\n    });\n```\n\nNo extra change in the libraries is required,\
    \ so just `make` and `run` will do here too. You can see the photo bot in action\
    \ in Figure [6-5](#index_split_000.html#p140).\n\n![](index-140_1.jpg)\n\n**Figure\
    \ 6-5.** Send me a cat, c++ bot\n\nNow let's repeat this technique of sending\
    \ pictures from the photo bot, combined with the OpenCV example, to perform transformations\
    \ on the pictures sent to the chat and resend them directly to the cat.\n\n##\
    \ OpenCV in action\n\nBefore creating a bot, let's first try to perform a simple\
    \ OpenCV transformation.\n\n### OpenCV Sample Program\n\nThis time, you will have\
    \ to update the `CMakeLists.txt` a bit. Notably, you will have to include the\
    \ place where the OpenCV header and library files are located and also specify\
    \ to include them when linking the final binary.\n\nSo, building on the previous\
    \ `CMakeLists.txt`, the following will occur:\n\n- Change the project name! Although\
    \ not required, it is always useful for us humans.\n- Add the `opencv/build/include`\
    \ folder to the `include_directories`.\n- Add a `find_package` directive targeting\
    \ OpenCV (be careful of the upper-/lowercase).\n- In the `target_link_libraries`,\
    \ add the different required `.so` files from the installed version of OpenCV.\
    \ (The libraries could also be pulled from the `opencv/build/lib` folder, of course.)\
    \ Here, three library files are used for OpenCV: `core`, `imgcodecs`, and `highgui`.\
    \ In the future, you may need others, if you do some video, so you should adjust\
    \ this accordingly.\n\nBefore running `cmake` on this new project, let's review\
    \ the `CMakeLists.txt` file.\n\n```\ncmake_minimum_required(VERSION 2.8.4)\nproject(opencvdemo)\n\
    set(CMAKE_CXX_FLAGS \"${CMAKE_CXX_FLAGS} -std=c++11 -Wall\") set(Boost_USE_MULTITHREADED\
    \ ON)\ninclude_directories($HOME/projects/opencv/build/include )\ninclude_directories(/usr/local/include\
    \ ${OPENSSL_INCLUDE_DIR} ${Boost_INCLUDE_DIR})\nif (CURL_FOUND)\ninclude_directories(${CURL_INCLUDE_DIRS})\n\
    add_definitions(-DHAVE_CURL)\nendif()\nfind_package(Threads REQUIRED)\nfind_package(OpenSSL\
    \ REQUIRED)\nfind_package(Boost COMPONENTS system REQUIRED)\nfind_package(CURL)\n\
    find_package(OpenCV)\nadd_executable(opencvdemosrc/main.cpp)\ntarget_link_libraries(opencvdemo\
    \ /usr/local/lib64/libopencv_core.so /usr/local/lib64/libopencv_imgcodecs.so /usr/local/lib64/libopencv_highgui.so\
    \ /usr/local/lib/libTgBot.a ${CMAKE_THREAD_LIBS_INIT} ${OPENSSL_LIBRARIES} ${Boost_LIBRARIES}\
    \ ${CURL_LIBRARIES})\n```\n\nOnce `cmake` is run, we can focus on writing just\
    \ a small piece of OpenCV programming code that will process a picture specified\
    \ as input and transform it into its gray version. In OpenCV, this is done through\
    \ an intermediate `Mat` object, which is a matrix object used to represent the\
    \ image in-memory.\n\nYou'll need a new `include` statement, with `opencv2/highgui`,\
    \ and, yes, we all love the fact that even though it's `opencv4`, the namespace\
    \ is still versioned as 2.\n\n![](index-143_1.jpg)\n\n`imread` and `imwrite` are\
    \ the two `opencv` methods to read and write pictures, and the second parameter\
    \ of the `imread` tells it how many colors to use when decoding the picture. It\
    \ gives the very short snippet following:\n\n```\n#include \"opencv2/highgui.hpp\"\
    \nusing namespace cv;\n\nint main(int argc, char* argv[])\n{\n    auto bw = imread(argv[1],\
    \ 0);\n    imwrite(\"saved.jpg\", bw);\n    return 0;\n}\n```\n\nNow to compile\
    \ and run this short program using `make`.\n\n```\nmake\n./opencvdemo cat.jpg\n\
    ```\n\nThe input picture, `cat.jpg`, is shown in Figure [6-6](#index_split_000.html#p143).\n\
    \n**Figure 6-6.** Colored input cat\n\n![](index-144_1.jpg)\n\nAfter applying\
    \ the OpenCV change of color, the gray version of the cat is shown in Figure [6-7](#index_split_000.html#p144).\n\
    \n**Figure 6-7.** If you can see a difference, you are reading this book in colors\n\
    \nNow that we know how to use `opencv` from our program, let's integrate all the\
    \ pieces, to create a bot that transforms the picture sent to the chat.\n\n###\
    \ OpenCV Bot\n\nThe `cmake` setup for the full OpenCV bot is the same as the previous\
    \ one, so there's no need to change the `CMakeLists.txt`, apart from the project\
    \ name. The thing to know ahead of programming this bot is that when the chat\
    \ receives a message with a picture, the message contains a `fileId` corresponding\
    \ to the file that was saved.\n\nOn the Telegram architecture, those files are\
    \ hosted on different servers, thus a different API. The new location is `api.telegram.org/file/bot`.\n\
    \nThe URL to retrieve files is then constructed from this base URL, appended with\
    \ the bot token and, finally, the `fileId`.\n\nTo read a file and process the\
    \ picture or file, we must perform a different request to retrieve that file.\
    \ So, in this example, you will reuse the trick of running the `curl` command\
    \ from the C++ code to perform this request.\n\nThe following function, `applyOpenCV`,\
    \ downloads a static file from the Telegram server, applies the `opencv` process\
    \ of turning the picture to shades of gray, and, finally, saves it to a file named\
    \ `saved.jpg`.\n\n```\nconst string telegram_url = \"https://api.telegram.org/file/bot\"\
    ;\nconst string tmp_file = \"download.jpg\";\nconst string saved_file = \"saved.jpg\"\
    ;\n\nstring applyOpenCV(string token, string path) {\n    string command = string(\"\
    curl --silent \");\n    command\n        .append(telegram_url)\n        .append(token)\n\
    \        .append(\"/\")\n        .append(path)\n        .append(\" -o \")\n  \
    \      .append(tmp_file);\n    const char* cmd = command.c_str();\n    system(cmd);\n\
    \    Mat bw = imread(tmp_file, 0);\n    imwrite(saved_file, bw);\n    return saved_file;\n\
    }\n```\n\nNow, we just need an entry point to call this function. This will be\
    \ called when a photo is detected in the chat.\n\nSo, in the bot callback handling\
    \ the chat message, to detect whether a picture is present, we can check the number\
    \ of photo sizes included in the message. Once we know there is a picture (or\
    \ pictures), we can retrieve its (their) `fileId` and then call the `applyOpenCV`\
    \ function we have just defined with the `filePath` and the token.\n\nAlso, note,\
    \ as I previously touched on, the vector of the reference is being added a new\
    \ pointer on token. If you forget to do this, the callback does not have access\
    \ to the token variable, and the compilation fails.\n\n```\nbot.getEvents().onAnyMessage([&bot,\
    \ &token](Message::Ptr message) {\n    if(message->photo.size() != 0) {\n    \
    \    PhotoSize::Ptr s = message->photo[2];\n        if(s!=NULL) {\n          \
    \  string fileId = message->photo[2]->fileId;\n            File::Ptr file = bot.getApi().getFile(fileId);\n\
    \            string filepath = applyOpenCV(token.c_str(), file->filePath.c_str());\n\
    \            bot.getApi().sendPhoto(\n                message->chat->id,\n   \
    \             InputFile::fromFile(filepath, \"image/jpeg\"));\n        }\n   \
    \ }\n}\n```\n\nThe rest of the bot code is identical to that for the other bots.\
    \ After executing `make` and starting the bot, you can see the picture being sent\
    \ to the chat change to black and white, as shown in Figure [6-8](#index_split_000.html#p147).\n\
    \n![](index-147_1.jpg)\n\n**Figure 6-8.** Colored and gray cats\n\nObviously,\
    \ the next step is to try a few more OpenCV transformations and feed them into\
    \ your bot. Creating a bot to identify specific objects in each picture is now\
    \ within your reach.\n\n# Chapter 7: Week 7: Clojure\n\n*Sometimes a thing needed\
    \ opening before closure was found.*\n\n—Hugh Howey\n\n*Shift*\n\nClojure is the\
    \ only LISP-based language presented in this book, but it's a language I use on\
    \ an everyday basis. Clojure, with its share of left and right parentheses, can\
    \ repel a few, but it surely never gets lost in translation.\n\nClojure development\
    \ almost always uses a read-eval-print-loop (REPL) or, in simple terms, a shell\
    \ that understands Clojure code line by line. Of course, in an editor, you can\
    \ just execute block of lines of code, and I will show you how to do that in Visual\
    \ Studio Code again.\n\nClojure makes it easy to understand the data structure\
    \ passing via the Telegram server, so we will look at a few of the JSON updates\
    \ coming from Telegram. To write Telegram bots in the Clojure language, we will\
    \ be using another Telegram wrapper named Morse, which makes it dead easy to set\
    \ up your own custom bot, by having a template project ready for you.\n\n© Nicolas\
    \ Modrzyk 2019\nN. Modrzyk, *Building Telegram Bots*, [https://doi.org/10.1007/978-1-4842-4197-4_7](#index_split_000.html#p148)\n\
    \n## Initial Setup and First Clojure Bot\n\nClojure is running on top of Java\
    \ Virtual Machine, so if you do not have it installed already, head to [http://jdk.java.net](http://jdk.java.net),\
    \ and install a version of `openjdk` suitable for your machine. On Linux machines,\
    \ almost every single package manager has a version of `openjdk`. For example,\
    \ on Manjaro/Arch Linux, you can go with `yaourt -S java-openjdk-ea-bin`.\n\n\
    As far as setups tested for this book, JDK versions 8 to 11-ea made the cut.\n\
    \nNow that you have the Java Compiler, you don't need much more than Leiningen,\
    \ the de facto build tool for Clojure. Installation instructions are short and\
    \ available from the web site at [https://leiningen.org/](https://leiningen.org/).\n\
    \nThe main task is to install a package or a shell script that downloads and bootstraps\
    \ Leiningen for you. On Manjaro/Arch, here it is:\n\n```\nyaourt -S leiningen\n\
    ```\n\nIf the setup is good to go, you should now have Leiningen responding to\
    \ you on the command line (Figure [7-1](#index_split_000.html#p150)).\n\n![](index-150_1.png)\n\
    \n**Figure 7-1.** Hello Leiningen\n\nLeiningen has all you need to start coding\
    \ with Clojure, notably the possibility of offering you an REPL, the shell to\
    \ execute Clojure code. You start this REPL by using Leiningen with the `repl`\
    \ subcommand.\n\n```\nlein repl\n```\n\nOnce the REPL is ready, you can start\
    \ typing code directly at the prompt.\n\n```\n[niko@niko-pc ~]$ lein repl\nnREPL\
    \ server started on port 46749 on host 127.0.0.1 - nrepl://127.0.0.1:46749\nREPL-y\
    \ 0.3.7, nREPL 0.2.12\nClojure 1.8.0\nOpenJDK 64-Bit Server VM 11+28\n    Docs:\
    \ (doc function-name-here)\n          (find-doc \"part-of-name-here\")\n  Source:\
    \ (source function-name-here)\n Javadoc: (javadoc java-object-or-class-here)\n\
    \    Exit: Control+D or (exit) or (quit)\n Results: Stored in vars *1, *2, *3,\
    \ an exception in *e\n\nuser=> (+ 1 1)\nuser=> (println \"hello world\")\nhello\
    \ world\nnil\nuser=>\n```\n\nApart from writing Clojure code directly, Leiningen\
    \ can also generate a full project layout, by using Leiningen templates. The third-party\
    \ library we want to use for communicating with Telegram, Morse, has a template\
    \ ready to prepare a new bot. This is done using the following subcommand of Leiningen:\n\
    \n```\nlein new morse mytelegrambot\n```\n\nThis will have the effect of downloading\
    \ all the Clojure dependencies and creates the project structure for the bot.\n\
    \n```\n$ lein new morse mytelegrambot\nRetrieving morse/lein-template/0.1.1/lein-template-0.1.1.pom\
    \ from clojars\nRetrieving morse/lein-template/0.1.1/lein-template-0.1.1.jar from\
    \ clojars\nGenerating fresh 'lein new' morse project.\n```\n\nOnce the project\
    \ has been created, you can check the existence of the project files, namely:\n\
    \n- `project.clj`: The usual main project metadata. It contains the project name,\
    \ compilation details, dependencies, etc.\n- `core.clj`: The main source file\
    \ for the project (unless specified otherwise in `project.clj`)\n- `core_test.clj`:\
    \ Where you can write your Clojure tests\n\nThe generated project tree structure\
    \ follows:\n\n```\n$ tree\n.\n├── CHANGELOG.md\n├── LICENSE\n├── project.clj\n\
    ├── README.md\n├── resources\n├── src\n│   └── mytelegrambot\n│       └── core.clj\n\
    └── test\n    └── mytelegrambot\n        └── core_test.clj\n\n5 directories, 6\
    \ files\n```\n\nYour Clojure bot is ready to be started, this time, using the\
    \ `run` subcommand of Leiningen.\n\nThis will execute the main function defined\
    \ in the `core.clj` file, providing you with your Telegram token, which should\
    \ make things work out of the box.\n\n![](index-153_1.jpg)\n\n```\n$ export TELEGRAM_TOKEN=\"\
    585672177:...\"\n$ lein run\nStarting the mytelegrambot\n```\n\nWith the basic\
    \ setup in place, you can start chatting with your Clojure Telegram bot at once\
    \ (Figure [7-2](#index_split_001.html#p153)).\n\n**Figure 7-2.** It's been a long\
    \ time\n\nIn the console where you started the bot, you can also see the following\
    \ debugging messages being printed on the standard output:\n\n```\nBot joined\
    \ new chat:  {:id 121843071, :first_name Nico, :last_name Nico, :username hellonico,\
    \ :type private}\n```\n\n![](index-154_1.png)\n\n```\nIntercepted message:  {:message_id\
    \ 675, :from {:id 121843071, :is_bot false, :first_name Nico, :last_name Nico,\
    \ :username hellonico, :language_code en-JP}, :chat {:id 121843071, :first_name\
    \ Nico, :last_name Nico, :username hellonico, :type private}, :date 1537519211,\
    \ :text hello}\n```\n\n## Visual Studio Code\n\nAs a quick workflow to develop\
    \ your bot, you can either start an REPL with `lein repl`, as we have seen, or\
    \ use the Visual Studio Code plug-in shown in Figure [7-3](#index_split_001.html#p154).\n\
    \n**Figure 7-3.** Clojure plug-in for Visual Studio Code\n\nThe next three things\
    \ to do are\n\n- Look at `project.clj`, the metadata file of the project.\n- Look\
    \ at the Clojure code to handle Telegram requests.\n- Look at the messages coming\
    \ from Telegram.\n\n*Look deep into nature, and then you will understand everything\
    \ better.*\n\n—Albert Einstein\n\nWe are now going to look at all these, and in\
    \ the order mentioned.\n\n### The Project Metadata in `project.clj`\n\nA good\
    \ point with Leiningen and Clojure is that the project metadata is in the same\
    \ language as the code itself, meaning the project configuration is in Clojure.\
    \ It's actually more or less a big hash map. Consistency is a key (pun intended),\
    \ and it's reassuring to find the file with that constant structure.\n\nIn `project.clj`,\
    \ you start by defining a Clojure project with `defproject`, passing a project\
    \ name (here, `mytelegrambot`), a version number, and a map of different things,\
    \ in which each key is prefixed with `:`.\n\nAmong the different things used to\
    \ define a project, we can find\n\n- *Dependencies*: A list of third-party libraries\
    \ to import and use in your project\n- *Plug-ins*: A list of plug-ins for Leiningen\n\
    - `main`: The main file, actually namespace, to compile and or run\n\nJust as\
    \ with project names, dependencies come with a project name and a version number,\
    \ and this is actually the same format used. The full `project.clj` file that\
    \ has been generated is copied here.\n\n```\n(defproject mytelegrambot \"0.1.0-SNAPSHOT\"\
    \n  :description \"FIXME: write description\"\n  :url \"http://example.com/FIXME\"\
    \n  :license {:name \"Eclipse Public License\"\n            :url \"http://www.eclipse.org/legal/epl-v10.html\"\
    }\n  :dependencies [[org.clojure/clojure \"1.8.0\"]\n                 [environ\
    \            \"1.1.0\"]\n                 [morse              \"0.2.4\"]]\n  :plugins\
    \ [[lein-environ \"1.1.0\"]]\n  :main ^:skip-aot mytelegrambot.core\n  :target-path\
    \ \"target/%s\"\n  :profiles {:uberjar {:aot :all}})\n```\n\nNow, let's have a\
    \ look at the code itself, located in `core.clj`.\n\n### The Clojure Code in `core.clj`\n\
    \nLet's break this source file in smaller parts. First, Clojure project source\
    \ files start with a namespace definition, `ns`, and then a list of other namespaces\
    \ to use in the current context.\n\n```\n(ns mytelegrambot.core\n  (:require [clojure.core.async\
    \ :refer [<!!]]\n            [clojure.string :as str]\n            [environ.core\
    \ :refer [env]]\n            [morse.handlers :as h]\n            [morse.polling\
    \ :as p]\n            [morse.api :as t])\n  (:gen-class))\n```\n\nYou will notice\
    \ namespace for async code, string manipulation, easy retrieval of environment\
    \ variables, and different namespaces from Morse, the third-party library responsible\
    \ for doing low-level communication with the Telegram API. Note, too, how each\
    \ namespace also defines a prefix, such as `p`, `t`, or `h`, which you can use\
    \ as shortcuts, instead of using the full namespace name. Finally, `gen-class`\
    \ is used to tell Clojure code that it has to turn itself into something the Java\
    \ runtime understands natively, namely, a Java class.\n\nWithout knowing too much,\
    \ you can feel that the following is going to retrieve the token from a Clojure\
    \ environment variable that we will set in a later section. The library `environ`\
    \ \"keywordizes,\" or makes Clojure-friendly, variables from the external shell\
    \ environment. Here, `TELEGRAM_TOKEN` will be turned into `:telegram-token`.\n\
    \n```\n; TODO: fill correct token\n(def token (env :telegram-token))\n```\n\n\
    I will hold off on the handle definition for a bit, but for now, know that this\
    \ is where you will write the meat of your bot code.\n\n```\n(h/defhandler handler\n\
    ...\n)\n```\n\nFinally, `main`, as its name implies, is the `main` function for\
    \ the program. It checks for the existence of a Telegram token, then starts to\
    \ poll for updates, using the function `p/start`, with parameters `telegram token`\
    \ and the `telegram handler`.\n\n```\n(defn -main\n  [& args]\n  (when (str/blank?\
    \ token)\n     (println \"Please provide token in TELEGRAM_TOKEN environment variable!\"\
    )\n    (System/exit 1))\n  (println \"Starting the mytelegrambot\")\n  (<!! (p/start\
    \ token handler)))\n```\n\nI said that we were going to look at the handler code\
    \ in a bit more detail later, and later is the new now. Reminder: Each command\
    \ is handled via a `command-fn` directive, and all these are defined within the\
    \ `defhandler` section of the file.\n\n```\n(h/defhandler handler\n   ; your handlers\
    \ here.\n)\n```\n\nFirst, we define a simple `\"start\"` command for our bot.\
    \ A command takes a Clojure function as callback, and the parameter from that\
    \ function is (de-)constructed from the incoming message.\n\n```\n  (h/command-fn\
    \ \"start\"\n    (fn [{{id :id :as chat} :chat}]\n      (println \"Bot joined\
    \ new chat: \" chat)\n      (t/send-text token id \"Welcome to mytelegrambot!\"\
    )))\n```\n\nOnce the `start` command kicks in the chat, we simply send a message\
    \ back to the chat with the `send-text` function from the `morse.api` namespace\
    \ prefixed by `t` (as defined in the `require` section of the namespace).\n\n\
    The generated code also defines a `help` command, which is defined exactly in\
    \ the same way and actually does almost exactly the same thing as the `start`\
    \ command, sending back a text message.\n\n```\n  (h/command-fn \"help\"\n   \
    \ (fn [{{id :id :as chat} :chat}]\n      (println \"Help was requested in \" chat)\n\
    \      (t/send-text token id \"Help is on the way\")))\n```\n\nLast, we define\
    \ a generic message handler, and we also get a shortcut directly on the message\
    \ data structure in the callback function using the keyword `:as`.\n\n```\n  (h/message-fn\n\
    \    (fn [{{id :id} :chat :as message}]\n      (println \"Intercepted message:\
    \ \" message)\n       (t/send-text token id \"I don't do a whole lot ... yet.\"\
    )))\n```\n\n### The Token!\n\nYou may remember that there was a `lein-environ`\
    \ plug-in defined in the `project.clj` file. This plug-in reads environment variables\
    \ from different places, for example, `project.clj`, and then populates a file\
    \ named `.lein-env` with all the necessary environment variables.\n\nSo, you can\
    \ add in your `project.clj` (for one project), as follows:\n\n```\n(defproject\
    \ mytelegrambot \"0.1.0-SNAPSHOT\"\n   ...\n:env\n  {:telegram-token \"585672177:...\"\
    })\n```\n\nor in `$HOME/.lein/profiles` (for multiple projects)\n\n```\n{:user\
    \ {:env{:telegram-token \"585672177:...\"}}}\n```\n\n### Debugging Telegram Messages\n\
    \nTo have a look at messages as they are coming from Telegram, we will format\
    \ and output them in a log file. To do this, we will create an appending write\
    \ to the file. In the `core.clj` file, let's declare a write, right below the\
    \ token definition.\n\n![](index-160_1.png)\n\n```\n(def writer (clojure.java.io/writer\
    \ \"message.log\" :append true))\n```\n\nAnd in the callback function receiving\
    \ the message, let's output the received message.\n\nClojure does the format for\
    \ you, using the `pprint` function from namespace `clojure.pprint`, and you can\
    \ tell it where to write messages.\n\n```\n(clojure.pprint/pprint message writer)\n\
    ```\n\nOn the next message sent to the bot, the `message.log` file is being filled\
    \ with the incoming messages, as shown in Figure [7-4](#index_split_001.html#p160).\n\
    \n**Figure 7-4.** Formatted incoming messages\n\n![](index-161_1.png)\n\n### Creating\
    \ a Reverse Bot\n\nLet's create a text-reversing bot now. You will remember that\
    \ you have access to the Clojure string namespace, with the `str/` prefix. This\
    \ namespace has many functions, one of them being `reverse` (Figure [7-5](#index_split_001.html#p161)).\n\
    \n**Figure 7-5.** `reverse` function, shown alongside all the `str/` functions\n\
    \nTo create a handler for reversing text, you can call this `reverse` function\
    \ on the received text. The received text itself, if you look at the map from\
    \ Figure [7-4](#index_split_001.html#p160) again, can be taken from the message\
    \ with the key `:text`.\n\nHere is the new message handler that reverses text\
    \ sent to the chat:\n\n```\n(h/message-fn\n    (fn [{{id :id} :chat :as message}]\n\
    \      (clojure.pprint/pprint message writer)\n      (t/send-text token id (str/reverse\
    \ (:text message)))))\n```\n\nAnd now, this works nicely in the Telegram chat,\
    \ in which you can try sending any kind of text (Figure [7-6](#index_split_001.html#p162)).\n\
    \n![](index-162_1.png)\n![](index-162_2.png)\n\n**Figure 7-6.** Reversed text\n\
    \n### Inline Handler\n\nYou'll probably also remember how to define inline handlers\
    \ from previous chapters. Following is a way to do it in Clojure with Morse.\n\
    \nThis inline handler just logs the message, at first.\n\n```\n  (h/inline-fn\n\
    \  (fn [inline]\n    (clojure.pprint/pprint inline writer)\n    inline))\n```\n\
    \nThe content of the inline message itself is shown in Figure [7-7](#index_split_001.html#p162).\n\
    \n**Figure 7-7.** Inline message content\n\nNote that to answer inline, the Morse\
    \ library documentation is a bit lax. Looking at the Telegram documentation on\
    \ inline results makes this slightly more explicit.\n\n[https://core.telegram.org/bots/api#inlinequeryresultgif](https://core.telegram.org/bots/api#inlinequeryresultgif)\n\
    \nFrom the official documentation, you will notice that\n\n- You cannot specify\
    \ any other type than gif.\n- `thumb_url` and `gif_url` are both required.\n\n\
    And so, to send inline answers, you can write code similar to the following snippet.\
    \ Here, we always send the same gif.\n\n```\n(t/answer-inline\n     token\n  \
    \   (:id inline)\n    [{:type \"gif\"\n      :id \"gif1\"\n      :thumb_url \"\
    https://bit.ly/2DtXcIi\"\n      :gif_url \"https://bit.ly/2DtXcIi\"}])\n```\n\n\
    Run the handler to find out which one!\n\n### A Simple Weather Bot\n\nNext, we\
    \ will have a bot to receive messages containing a location, and we will retrieve\
    \ weather information for that location, by sending a request to OpenWeather ([https://openweathermap.org/](https://openweathermap.org/)).\n\
    \nObviously, you must register to receive an API token from the OpenWeather web\
    \ site, as shown in Figure [7-8](#index_split_001.html#p164).\n\n![](index-164_1.png)\n\
    \n**Figure 7-8.** OpenWeather API token\n\nRegistration is free, and obtaining\
    \ a token should only take a few minutes.\n\nOnce you have a token for OpenWeather,\
    \ it is just a matter of sending an HTTP query similar to the one following:\n\
    \n```\nhttp://api.openweathermap.org/data/2.5/weather?q=<city>&units=metric&APPID=openweather-api-token\n\
    ```\n\nIf you try this on Tokyo with `curl` or `httpie`, you will get a JSON response\
    \ similar to the one shown following:\n\n```\n{\n    \"base\": \"stations\",\n\
    \    \"clouds\": {\n        \"all\": 75\n    },\n    \"cod\": 200,\n    \"coord\"\
    : {\n        \"lat\": 35.68,\n        \"lon\": 139.76\n    },\n    \"dt\": 1537583700,\n\
    \    \"id\": 1850147,\n    \"main\": {\n        \"humidity\": 88,\n        \"\
    pressure\": 1009,\n        \"temp\": 22.18,\n        \"temp_max\": 24,\n     \
    \   \"temp_min\": 21\n    },\n    \"name\": \"Tokyo\",\n    \"sys\": {\n     \
    \   \"country\": \"JP\",\n        \"id\": 7619,\n        \"message\": 0.0056,\n\
    \        \"sunrise\": 1537561714,\n        \"sunset\": 1537605508,\n        \"\
    type\": 1\n    },\n    \"visibility\": 10000,\n    \"weather\": [\n        {\n\
    \            \"description\": \"light intensity shower rain\",\n            \"\
    icon\": \"09d\",\n            \"id\": 520,\n            \"main\": \"Rain\"\n \
    \       }\n    ],\n    \"wind\": {\n        \"deg\": 340,\n        \"speed\":\
    \ 4.1\n    }\n}\n```\n\nTo do that in Clojure, we are going to\n\n- Execute an\
    \ HTTP request simply by using Clojure `slurp`, which retrieves the whole content\
    \ of either a file or a URL\n- Parse the slurped message using Clojure's JSON\
    \ Cheshire library and its function `parse-text`, to generate a Clojure data structure\n\
    - Convert all this to a string to send back the message to the chat\n\nThe function\
    \ to retrieve the weather is\n\n```\n(defn weather[city]\n   (let [request\n \
    \   (str\n        \"http://api.openweathermap.org/data/2.5/weather?q=\"\n    \
    \    city\n        \"&units=metric&APPID=\"\n        openweather-api-token )]\n\
    \    (:main\n        (parse-string (slurp request)\n           (fn [k] (keyword\
    \ k))))))\n```\n\nAnd the Morse/Telegram handler that can call it, retrieves the\
    \ name of city from a chat message, and sends the request using the `weather`\
    \ function defined above.\n\n```\n(defhandler handler\n  (message-fn\n    (fn\
    \ [{{id :id} :chat :as message}]\n      (let [place (:text message)]\n      (try\n\
    \       (api/send-text token id\n```\n\n![](index-167_1.png)\n\n```\n        {:parse_mode\
    \ \"Markdown\"}\n        (str \"*\" place \"*\" \"\\n\" (weather place))) (catch\
    \ Exception e))))))\n```\n\nThe result is shown in Figure [7-9](#index_split_001.html#p167).\n\
    \n**Figure 7-9.** Send the name of the city, and receive the temperature\n\nSweet!\
    \ Finally, let's move to an origami bot.\n\n### OpenCV and Telegram: Origami Bot\n\
    \nOrigami is a Clojure wrapper around the OpenCV library. To set up anything on\
    \ your machine, it usually helps just to download a wrapped `opencv` delivered\
    \ through Clojure dependencies.\n\nTo do this, we will update slightly the `project.clj`,\
    \ to retrieve the Origami library and to bootstrap the `opencv` environment.\n\
    \n```\n(defproject origamibot \"0.1.0-SNAPSHOT\"\n  :injections [\n    (clojure.lang.RT/loadLibrary\
    \ org.opencv.core.Core/NATIVE_LIBRARY_NAME)\n  ]\n  :repositories [[\"vendredi\"\
    \ \"https://repository.hellonico.info/repository/hellonico/\"]]\n  :main origamibot.core\n\
    \  :license {:name \"Eclipse Public License\"\n            :url \"http://www.eclipse.org/legal/epl-v10.html\"\
    }\n  :plugins [[lein-environ \"1.1.0\"]]\n  :dependencies [\n  [environ \"1.1.0\"\
    ]\n  [cheshire \"5.6.1\"]\n  [origami \"0.1.11\"]\n  [hellonico/morse \"0.2.4\"\
    ]\n  [org.clojure/clojure \"1.8.0\"]])\n```\n\nNow, to retrieve a picture, remember\
    \ how to access the Telegram static files: from the file `id` retrieved in the\
    \ chat message by a full message, when a picture is sent to the chat, as shown\
    \ below.\n\n```\n{:message_id 851,\n :from\n {:id 121843071,\n  :is_bot false,\n\
    \  :first_name \"Nico\",\n  :last_name \"Nico\",\n  :username \"hellonico\",\n\
    \  :language_code \"en-JP\"},\n :chat\n {:id 121843071,\n  :first_name \"Nico\"\
    ,\n  :last_name \"Nico\",\n  :username \"hellonico\",\n  :type \"private\"},\n\
    \ :date 1537587499,\n :photo\n  [{:file_id \"AgADBQADTqgxGxauIVWm22ogiY88fiZL1TIABM-as8GGX14indYDAAEC\"\
    ,\n   :file_size 1022,\n   :width 90,\n   :height 57}\n  ; other files\n]}\n```\n\
    \nTo download a file from Telegram, remember the official documentation: [https://core.telegram.org/bots/api#file](https://core.telegram.org/bots/api#file).\n\
    \nAlso, remember the request to retrieve the file from the file path, [https://api.telegram.org/file/bot<token>/<file_path>](https://api.telegram.org/file/bot%3Ctoken%3E/%3Cfile_path%3E),\
    \ where this file path is retrieved after calling `getFile` with the `file_id`\
    \ contained from a message on a chat.\n\nThis is achieved by using the `api/download-file`\
    \ of Morse (the custom version of the library, actually: `hellonico/morse`), which\
    \ has been added to the `project.clj`. The custom version `diff` can be found\
    \ online, and the reason to use it is to download a file to the local file system.\
    \ This is just for convenience, and you could, of course, code it yourself, after\
    \ a few days of practice with Clojure.\n\nAll this being in place, let's add the\
    \ `origami` package to the namespace section as `origami`, the core wrapper for\
    \ `opencv`.\n\n```\n(ns origamibot.core\n  (:require\n    [opencv3.core :as origami]\n\
    \    ;....\n     [clojure.string :as str])\n  (:gen-class))\n```\n\nYou can then\
    \ apply any `opencv` transformation you want. Let's define a function named `apply-cv`\
    \ that applies a canny effect to the picture, loaded from a file. Note that the\
    \ transformation is done in place in the file.\n\n```\n(defn apply-cv [filename]\n\
    \         (->  filename\n           (origami/imread)\n           (origami/cvt-color!\
    \ origami/COLOR_RGB2GRAY)\n           (origami/canny! 300.0 100.0 3 true)\n  \
    \         (origami/bitwise-not!)\n           (origami/imwrite filename)))\n```\n\
    \nFinally, you call the OpenCV transformation on the file retrieved from the chat,\
    \ by calling the previously defined `apply-cv` function and the downloaded file.\n\
    \n```\n(defhandler handler\n  (message-fn\n    (fn [{{id :id} :chat :as message}]\n\
    \      (let [fid (-> message :photo last :file_id)\n            filename (str\
    \ fid \".png\")]\n       (api/download-file token fid)\n       (apply-cv filename)\n\
    \        (api/send-photo token id (clojure.java.io/as-file filename))))))\n```\n\
    \n![](index-171_1.jpg)\n\nThe rest of the story is one more picture being uploaded\
    \ in the chat. You can see it in action in Figure [7-10](#index_split_001.html#p171).\n\
    \n**Figure 7-10.** Applying the OpenCV transformation directly from the bot handler\n\
    \n# Chapter 8: Week 8: Java\n\n*Coffee is a language in itself.*\n\n—Jackie Chan\n\
    \nIn this chapter, we are going to tackle a Telegram bot in Java. The API in Java\
    \ is not as bad as it looks, and debugging Java code in Visual Studio Code also\
    \ works slightly better than expected.\n\nThe project will use the Java de facto\
    \ build tool, Gradle. The library will be the `java-telegram-bot-api`.\n\nTelegram\
    \ is now proposing a payment API, so you can start selling stuff directly through\
    \ Telegram. This is especially effective for selling services.\n\nWhile the first\
    \ part of this chapter will revisit the basics, we will then implement a bot that\
    \ responds to the challenges of using the Telegram Payment API and create an example\
    \ of the full payment life cycle.\n\n## Installation\n\nApart from Apache Maven,\
    \ Gradle is the de facto build tool in Java land. It's actually the main build\
    \ tool for building Android applications.\n\nYou can manually download and install\
    \ Gradle on your machine, by downloading binaries available through the different\
    \ package managers.\n\nThe Gradle web site ([https://gradle.org/install/](https://gradle.org/install/))\
    \ has an extensive section on how to install the software.\n\n© Nicolas Modrzyk\
    \ 2019\nN. Modrzyk, *Building Telegram Bots*, [https://doi.org/10.1007/978-1-4842-4197-4_8](#index_split_001.html#p172)\n\
    \n`sdkman` is nice to use these days:\n\n```\nsdk install gradle 4.10.2\n```\n\
    \nHomebrew is the standard on macOS.\n\n```\nbrew install gradle\n```\n\nChocolatey\
    \ is the standard on Windows.\n\n```\nchoco install gradle\n```\n\nOnce installed,\
    \ you can check whether you have the most recent version available, which, for\
    \ Gradle, at the time of writing, was version 4.10.2\n\n```\n$ gradle -v\n\nWelcome\
    \ to Gradle 4.10.2!\n\nHere are the highlights of this release:\n - Incremental\
    \ Java compilation by default\n - Periodic Gradle caches cleanup\n - Gradle Kotlin\
    \ DSL 1.0-RC6\n - Nested included builds\n - SNAPSHOT plugin versions in the `plugins\
    \ {}` block\n\nFor more details see https://docs.gradle.org/4.10.2/release-notes.html\n\
    \nGradle 4.10.2\nBuild time:   2018-09-19 18:10:15 UTC\nRevision:     b4d8d5d170bb4ba516e88d7fe5647e2323d791dd\n\
    Kotlin DSL:   1.0-rc-6\nKotlin:       1.2.61\nGroovy:       2.4.15\nAnt:     \
    \     Apache Ant(TM) version 1.9.11 compiled on March 23 2018\nJVM:          1.8.0_171\
    \ (Oracle Corporation 25.171-b11)\nOS:           Mac OS X 10.13.6 x86_64\n```\n\
    \n## The Project Structure\n\nA Java project using Gradle is mostly made of the\
    \ `build.gradle` file, which contains metadata and build information that Gradle\
    \ can understand and source files located in `src/main/java` (by default).\n\n\
    ```\n.\n├── build.gradle\n├── resources\n│   ├── cat.jpg\n│   └── token\n└── src\n\
    \    └── main\n        └── java\n            └── com\n                └── hellonico\n\
    \                    ├── Invoice.java\n                    └── MyMain.java\n\n\
    6 directories, 5 files\n```\n\n### The `build.gradle` file\n\nGradle is quite\
    \ versatile, and you can build pretty much anything with it. In our case, we are\
    \ going to build a Java project, so we will use the Gradle plug-in for Java, with\
    \ a few standard settings used for compilation, such as the file encoding and\
    \ compilation compatibilities.\n\n![](index-175_1.png)\n\nDependencies are defined\
    \ in the `dependencies` section, each of them identified by the following format:\n\
    \n```\n<group>:<name>:<version>\n```\n\nIf you do not remember the dependency\
    \ format, you can search and find any Java dependency on `mvnrepository.com`,\
    \ as shown in Figure [8-1](#index_split_001.html#p175).\n\n**Figure 8-1.** Details\
    \ for `java-telegram-bot-api` from MvnRepository\n\nHere is the content of the\
    \ `build.gradle` file:\n\n```\napply plugin: 'java'\n\nsourceCompatibility = 1.8\n\
    targetCompatibility = 1.8\n\ncompileJava {\n    options.encoding = \"UTF-8\"\n\
    }\n\nrepositories {\n    jcenter()\n}\n\ndependencies {\n    compile  'com.github.pengrad:java-telegram-bot-api:4.1.0'\n\
    \    compile 'com.sparkjava:spark-core:2.2'\n    compile 'org.jsoup:jsoup:1.8.3'\n\
    \    compile 'io.reactivex:rxjava:1.0.16'\n}\n\napply plugin: 'application'\n\n\
    mainClassName = \"com.hellonico.Simple\"\n```\n\nThe last two lines of the application\
    \ plug-in and the `mainClassName` are not required, but they help, if you want\
    \ to start your program simply by using\n\n```\ngradle run\n```\n\nFor example,\
    \ given the following simple Java class and program:\n\n```\npackage com.hellonico;\n\
    \npublic class Simple {\n    public static void main(String[] args) {\n      \
    \  System.out.println(\"hello nico\");\n    }\n}\n```\n\n![](index-177_1.png)\n\
    \nif you execute the `run` command, the program will execute, and the following\
    \ output will be shown in the terminal or command prompt:\n\n```\n$ gradle run\n\
    \n> Task :run\nhello nico\n\nBUILD SUCCESSFUL in 1s\n2 actionable tasks: 2 executed\n\
    ```\n\nThis will execute the main method of the `com.hellonico.Simple` class.\
    \ More on the application plug-in can be found on the Gradle web site ([https://docs.gradle.org/current/userguide/application_plugin.html](https://docs.gradle.org/current/userguide/application_plugin.html)).\n\
    \n### Visual Studio Code Setup\n\nBecause I have suggested using Gradle as the\
    \ build tool for the chapter on Java, Visual Studio Code can recognize the build\
    \ tool and set up the project with a close-to-perfect integration, using Java\
    \ tooling.\n\nThe main plug-in for Java is shown in Figure [8-2](#index_split_001.html#p177)\
    \ and can be installed through the usual Visual Studio Code marketplace.\n\n**Figure\
    \ 8-2.** Visual Studio Code Java plug-in\n\n![](index-178_1.png)\n![](index-178_2.png)\n\
    \nThe same simple Java class that was written above yields the result shown in\
    \ Figure [8-3](#index_split_001.html#p178).\n\n**Figure 8-3.** `hello nico` Java\
    \ program\n\nYou now see two icons with which to run and debug your code. They\
    \ will be useful when you write the Telegram bot.\n\nTo try it now, click Run,\
    \ which executes the program and shows the proper output on the Visual Studio\
    \ Code console (Figure [8-4](#index_split_001.html#p178)).\n\n**Figure 8-4.**\
    \ Running Java from Visual Studio Code\n\n## First Java Bot\n\nOur first Java\
    \ bot will send some text and a photo, just to make sure the full Java setup is\
    \ working. The bot will be initialized with the token loaded from a `resources/token`\
    \ file, in which you should paste the token of your bot.\n\nAlong the way, you\
    \ will probably find that the Java imports are a bit hard to find, but they can\
    \ be auto-imported using Visual Studio Code Organize Imports, as shown in Figure\
    \ [8-5](#index_split_001.html#p179).\n\n![](index-179_1.png)\n\n**Figure 8-5.**\
    \ Organize Imports\n\nProbably the most difficult part of the code for this first\
    \ bot is the following line:\n\n```\nbot.setUpdatesListener(new UpdatesListener()\
    \ {..}\n```\n\nThis is where you tell the bot to poll and listen for updates.\
    \ In its simplest form, the bot code is as follows:\n\n```\npackage com.hellonico;\n\
    \nimport java.io.BufferedReader;\nimport java.io.FileReader;\nimport java.io.IOException;\n\
    import java.util.List;\nimport java.util.stream.Collectors;\n\nimport com.pengrad.telegrambot.TelegramBot;\n\
    import com.pengrad.telegrambot.UpdatesListener;\nimport com.pengrad.telegrambot.model.Update;\n\
    \npublic class Main {\n    public static String streamFile_Buffer(String file)\
    \ throws Exception{\n        BufferedReader reader = new BufferedReader(new FileReader(file));\n\
    \        return reader\n            .lines()\n            .collect(Collectors.joining(System.lineSeparator()));\n\
    \    }\n\n    public static void main(String[] args) throws Exception {\n    \
    \    TelegramBot bot = new TelegramBot(streamFile_Buffer(\"resources/token\"));\n\
    \n        bot.setUpdatesListener(new UpdatesListener() {\n            @Override\n\
    \            public int process(List<Update> updates) {\n                System.out.println(updates.toString());\n\
    \                  // DO SOMETHING HERE.\n                return UpdatesListener.CONFIRMED_UPDATES_ALL;\n\
    \            }\n        });\n    }\n}\n```\n\n### Send Some Text\n\nOur first\
    \ interaction will be to send some text to the chat. You can navigate through\
    \ update messages from Telegram just as with other languages. You'll find the\
    \ usual messages with the same structure seen to now.\n\n```\n[Update{update_id=573518674,\
    \ message=Message{message_id=956, from=User{id=121843071, is_bot=false, first_name='Nico',\
    \ last_name='Nico', username='hellonico', language_code='en-JP'} , date=1537602748,\
    \ chat=Chat{id=121843071,..\n```\n\nFrom there, we can obtain the chat id\n\n\
    ```\nint id = updates.get(0).message().chat().id().intValue();\n```\n\nand send\
    \ a message back to the chat room. Note that we are using `bot.execute` with a\
    \ request and a callback, so the result is asynchronous.\n\n```\nSendMessage requestText\
    \ = new SendMessage(id, \"*hello from java*\").parseMode(ParseMode.Markdown);\n\
    \nbot.execute(requestText, new Callback<SendMessage, SendResponse>() {\n    @Override\n\
    \    public void onResponse(SendMessage request, SendResponse response) {}\n\n\
    \    @Override\n    public void onFailure(SendMessage request, IOException e)\
    \ {}\n});\n```\n\nBefore starting the bot, you must organize the imports or complete\
    \ the list manually. The full list is shown following and should be located at\
    \ the top of the source file.\n\n```\nimport java.io.BufferedReader;\nimport java.io.FileReader;\n\
    import java.io.IOException;\nimport java.util.List;\nimport java.util.stream.Collectors;\n\
    \nimport com.pengrad.telegrambot.Callback;\nimport com.pengrad.telegrambot.TelegramBot;\n\
    import com.pengrad.telegrambot.UpdatesListener;\nimport com.pengrad.telegrambot.model.Update;\n\
    import com.pengrad.telegrambot.model.request.ParseMode;\nimport com.pengrad.telegrambot.request.SendMessage;\n\
    import com.pengrad.telegrambot.response.SendResponse;\n```\n\nStart the bot by\
    \ clicking Run or Debug, which give some markdown formatted text in the chat (Figure\
    \ [8-6](#index_split_001.html#p182)).\n\n![](index-182_1.png)\n\n**Figure 8-6.**\
    \ Your Java bot is running!\n\n### Send a Photo\n\nSending a photo is as easy\
    \ as sending text, and this time, we will use the synchronous version of sending\
    \ the request to Telegram. Because the code is not asynchronous anymore, failures\
    \ are not handled in the `onFailure` callback that was available in the asynchronous\
    \ version. So, it's a good idea to surround the request by a `try/catch` block.\n\
    \n```\nSendPhoto requestPhoto = new SendPhoto(id, new File(\"resources/cat.jpg\"\
    ));\ntry {\n    SendResponse response = bot.execute(requestPhoto);\n} catch (Exception\
    \ e) {\n    e.printStackTrace();\n}\n```\n\nAnd the cat picture is sent to the\
    \ chat, as shown in Figure [8-7](#index_split_001.html#p183).\n\n![](index-183_1.jpg)\n\
    \n**Figure 8-7.** The cat is back!\n\nNow let's try to generate an invoice and\
    \ do some payment with a Java bot.\n\n## Bot with Invoice Capabilities\n\nTelegram\
    \ has added a Payment API to accept payment directly from a chat room. This is\
    \ a truly wonderful setup for sending money, and transactions in the services\
    \ field will greatly benefit from its expansion.\n\n### Asking Permission\n\n\
    Before using these capabilities, you must obtain permission, again from the almighty\
    \ BotFather, by changing the Payments settings of your bot (see Figure [8-8](#index_split_001.html#p184)).\n\
    \n![](index-184_1.png)\n![](index-184_2.png)\n\n**Figure 8-8.** Payment section\
    \ in the bot settings of BotFather\n\nAfter payment settings for the bot have\
    \ been updated, BotFather will give you a payment token, as shown in Figure [8-9](#index_split_001.html#p184).\n\
    \n**Figure 8-9.** Payment details have been updated\n\nNote here that another\
    \ token is given to you. This is the token you will have to use when sending invoice\
    \ messages.\n\n![](index-185_1.jpg)\n![](index-185_2.jpg)\n\nAlong the way, you\
    \ will have to set up a payment account with your favorite provider. Here, we\
    \ are using Stripe and testing its capabilities, as shown in Figures [8-10](#index_split_001.html#p185)\
    \ and [8-11](#index_split_001.html#p185).\n\n**Figure 8-10.** Stripe setup\n\n\
    **Figure 8-11.** Stripe dashboard\n\n![](index-186_1.png)\n\nIf the setup has\
    \ completed properly, you will get the confirmation from the Stripe Test Bot,\
    \ as shown in Figure [8-12](#index_split_001.html#p186).\n\n**Figure 8-12.** Stripe\
    \ Test Bot connected\n\nNow your bot can send invoice messages and attempt to\
    \ get money from people talking to it.\n\n### Sending an Invoice Message\n\nIn\
    \ the same vein as sending a photo or text, you can send invoices to the chat,\
    \ using a `SendInvoice` message.\n\n```\nSendInvoice sendInvoice\n    = new SendInvoice(id,\
    \ \"Lemon\", \"desc\", \"hello\", \"284685063:TEST:NDBlMjliMGM2YmQ0\", \"my_start_param\"\
    , \"JPY\", new LabeledPrice(\"label\", 2000))\n        .needPhoneNumber(false)\n\
    \        .needShippingAddress(false)\n```\n\n![](index-187_1.png)\n\n```\n   \
    \     .isFlexible(true)\n        .replyMarkup(new InlineKeyboardMarkup(new InlineKeyboardButton[]\
    \ { new InlineKeyboardButton(\"just pay\").pay(), new InlineKeyboardButton(\"\
    google it\").url(\"www.google.com\") }));\n```\n\nAgain, you can execute the query\
    \ synchronously or asynchronously. It is recommended that you avoid blocking the\
    \ execution on the main thread.\n\n```\n// sync version\nSendResponse response\
    \ = bot.execute(sendInvoice);\n\n// async version\nbot.execute(sendInvoice, new\
    \ Callback<SendInvoice, SendResponse>() {\n    @Override\n    public void onResponse(SendInvoice\
    \ request, SendResponse response) {}\n\n    @Override\n    public void onFailure(SendInvoice\
    \ request, IOException e) {}\n});\n```\n\nThe payment can only be made using the\
    \ mobile version of the Telegram app, to which users will also have to provide\
    \ their shipping details (Figure [8-13](#index_split_001.html#p187)).\n\n**Figure\
    \ 8-13.** Invoice me lemons\n\nIn this step, clicking just pay will get the payment\
    \ bot to send a request for shipping query. (Actually, only if `.isFlexible(true)`\
    \ has been set.) At this stage, we can send a few options for the shipment and\
    \ send them back to the chat.\n\n![](index-188_1.png)\n\n```\nShippingQuery shipping\
    \ = updates.get(0).shippingQuery();\nif (shipping != null) {\n    ShippingOption\
    \ option = new ShippingOption(\"fedex\", \"FedEx\", new LabeledPrice(\"JOY\",\
    \ 2000));\n    AnswerShippingQuery query = new AnswerShippingQuery(shipping.id(),\
    \ option);\n    bot.execute(query);\n    return UpdatesListener.CONFIRMED_UPDATES_ALL;\n\
    }\n```\n\nThe shipment options will then show up in the chat, as shown in Figure\
    \ [8-14](#index_split_001.html#p188).\n\n**Figure 8-14.** Shipping options\n\n\
    ![](index-189_1.jpg)\n\nFigures [8-15](#index_split_001.html#p189) and [8-16](#index_split_001.html#p190)\
    \ show the process for filling in the remaining info of the payment process.\n\
    \n**Figure 8-15.** Full checkout screen\n\n![](index-190_1.jpg)\n\n**Figure 8-16.**\
    \ Transaction validation\n\nFinally, the payment bot will send a request to your\
    \ bot for pre-checkout, with all the payment details. You have to answer this\
    \ request from the bot as fast as you can, and actually ten seconds is the max\
    \ time limit, or the payment will be canceled.\n\nCompletion of the transaction\
    \ is done by sending a `PreCheckoutQuery` with the query id, when a `preCheckoutQuery`\
    \ element is received.\n\n![](index-191_1.jpg)\n\n```\nPreCheckoutQuery query\
    \ = updates.get(0).preCheckoutQuery();\nif (query != null) {\n    AnswerPreCheckoutQuery\
    \ apcq = new AnswerPreCheckoutQuery(query.id());\n    bot.execute(apcq);\n   \
    \ return UpdatesListener.CONFIRMED_UPDATES_ALL;\n}\n```\n\nFigure [8-17](#index_split_001.html#p191)\
    \ shows the chat after the payment has been completed.\n\n**Figure 8-17.** Payment\
    \ complete\n\n![](index-192_1.jpg)\n\nOn the Stripe dashboard, in the payment\
    \ section, after enabling test data, you can see the different orders coming through,\
    \ as shown in Figure [8-18](#index_split_001.html#p192).\n\n**Figure 8-18.** Stripe\
    \ test logs\n\nThat was quite smooth. That's it for the full payment process life\
    \ cycle in Java. Now it's your turn to start selling lemons…and become rich!\n\
    \n![](index-193_1.jpg)\n\n# Chapter 9: Week 9: Go\n\n*I have nine armchairs from\
    \ which I can be critical.*\n\n—Rick Moranis\n\nGo was originally created by people\
    \ who were not too fond of the C++ programming language. Go is a strongly typed\
    \ and compiled language, which aims mostly at being both easy to learn and fast\
    \ to execute. Go is also one of the few languages to have a fantastic logo!\n\n\
    The logo, shown in Figure [9-1](#index_split_001.html#p193), was designed by [Renée\
    \ French](http://reneefrench.blogspot.com), and I understand that I can use it\
    \ here, as she is credited.\n\n**Figure 9-1.** Gopher, Renée French's logo for\
    \ the Go language\n\n© Nicolas Modrzyk 2019\nN. Modrzyk, *Building Telegram Bots*,\
    \ [https://doi.org/10.1007/978-1-4842-4197-4_9](#index_split_001.html#p193)\n\n\
    ![](index-194_1.png)\n\nIn this chapter, I will review how to install the Go binary,\
    \ followed by first steps and basic Go samples, before moving on to writing a\
    \ Telegram bot and, finally, writing a command-line binary to send different Telegram\
    \ objects via the API.\n\n## Installation of Go\n\nTo download Go, you can use\
    \ the prepackaged version from the Go web site, located at [https://golang.org/dl/](https://golang.org/dl/).\
    \ Most platforms have an option available for download, as shown in Figure [9-2](#index_split_001.html#p194).\n\
    \n**Figure 9-2.** Go packages for your preferred platform\n\nYour favorite package\
    \ manager should also have the Go package available."
