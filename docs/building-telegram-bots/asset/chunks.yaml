    \n**第 7 周：Clojure**\n\n*有时，在找到结局之前，需要先开启一些东西。*\n\n—休·豪伊\n\n*转变*\n\nClojure 是本书中唯一基于\
    \ LISP 的语言，但它是我日常使用的语言。Clojure 带有大量的左右括号，可能会让一些人望而却步，但它绝不会在翻译中迷失。\n\nClojure 开发几乎总是使用读取-求值-打印-循环（REPL），或者简单地说，一个逐行理解\
    \ Clojure 代码的 shell。当然，在编辑器中，你可以直接执行代码块，我将再次向你展示如何在 Visual Studio Code 中做到这一点。\n\
    \nClojure 使得理解通过 Telegram 服务器传递的数据结构变得容易，因此我们将查看一些来自 Telegram 的 JSON 更新。为了用 Clojure\
    \ 语言编写 Telegram 机器人，我们将使用另一个名为 Morse 的 Telegram 封装器，它通过为你准备一个模板项目，使得设置你自己的自定义机器人变得非常容易。\n\
