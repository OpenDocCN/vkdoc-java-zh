    ===> Compiling parse_trans\n===> Compiling mimerl\n===> Compiling metrics\n===>\
    \ Compiling unicode_util_compat\n===> Compiling idna\n===> Compiling ssl_verify_fun\n\
    ===> Compiling certifi\n===> Compiling hackney\n```\n\nNow, finally, on to some\
    \ more fun with `mix` and Telegram.\n\n### Get Something\n\nIn this section, we’ll\
    \ have a look at sending a few requests to the Telegram API directly. For authentication,\
    \ all those calls will be using the bot token.\n\n#### GetMe\n\nLet’s try to simply\
    \ send a request to the Telegram API with our local bot. You’ll remember the following\
    \ `GetMe` method:\n\n[https://core.telegram.org/bots/api#getme](https://core.telegram.org/bots/api#getme).\n\
    \nWe will send the request from an `iex/mix` session.\n\n```\n$ iex -S mix\n```\n\
    \nFirst, we load the token from the configuration file, so make sure you have\
    \ your token inserted properly in `config/confix.exs` at this stage.\n\n```\n\
    iex(1)> token = Application.get_env(:telegrambot, :token)\n\"585672177:..\"\n\
    ```\n\n## Chapter 10   Week 10: elixir\n\nThen we can call the Telegram API, with\
    \ the token, and the `getMe` request.\n\n```\niex(2)> Telegram.Api.request(token,\
    \ \"getMe\")\n{:ok,\n %{\n   \"first_name\" => \"chapter01\",\n   \"id\" => 585672177,\n\
    \   \"is_bot\" => true,\n   \"username\" => \"chapter01bot\"\n }}\n```\n\nRequest\
    \ has gone through, and we can use the usual Telegram `User` object, with the\
    \ bot name and the bot id.\n\n#### GetChat\n\nThe `getChat` Telegram function\
    \ documentation is located at [https://core.telegram.org/bots/api#getchat](https://core.telegram.org/bots/api#getchat).\
    \ Unlike the function `getMe`, which can be called without a parameter, `getChat`\
    \ requires a `chat_id`.\n\nParameters to be sent along the request with the Telegram\
    \ library are just appended to the request call.\n\nLet’s see that in action in\
    \ the same `iex` session.\n\n```\niex(8)> Telegram.Api.request(token, \"getChat\"\
    , chat_id: 121843071)\n{:ok,\n %{\n   \"first_name\" => \"Nico\",\n   \"id\" =>1218430..,\n\
    \   \"last_name\" => \"Nico\",\n   \"photo\" => %{\n     \"big_file_id\" =>\n\"\
    AQADBQADQakxG38tQwcACAox1TIABLM4sAnsmf3pPM4AAgI\",\n```\n\n## Chapter 10   Week\
    \ 10: elixir\n\n```\n     \"small_file_id\" =>\n\"AQADBQADQakxG38tQwcACAox1TIABCSohuBN4Zh1Os4AAgI\"\
    \n   },\n   \"type\" => \"private\",\n   \"username\" => \"hellonico\"\n }}\n\
    ```\n\nAs usual, the response status and the structure are printed in the output\
    \ of the session.\n\n#### GetFile\n\nYou may have noticed a file id in the user\
    \ profile while calling `getChat` in the preceding snippet. Let’s try to retrieve\
    \ that file, with `getfile`.\n\nThe `getfile` function details are located in\
    \ the bot API at\n\n[https://core.telegram.org/bots/api#getfile](https://core.telegram.org/bots/api#getfile)\n\
    \nAnd so, in the same `iex` session again, we use the following:\n\n```\nTelegram.Api.request(token,\
    \ \"getFile\", file_id:\n\"AQADBQADQakxG38tQwcACAox1TIABLM4sAnsmf3pPM4AAgI\")\n\
    {:ok,\n %{\n   \"file_id\" =>\n\"AQADBQADQakxG38tQwcACAox1TIABLM4sAnsmf3pPM4AAgI\"\
    ,\n   \"file_path\" => \"profile_photos/file_10.jpg\",\n   \"file_size\" => 35814\n\
    \ }}\n```\n\nAh, right…the Telegram API always returns a file path for download\
    \ from its web site.\n\n![](index-230_1.jpg)\n\n## Chapter 10   Week 10: elixir\n\
    \n### Using Elixir’s System\n\nTo download the preceding file path, remember the\
    \ trick used before, avoiding the need for an additional third-party library.\
    \ We’ll just use `curl`, that should already be installed on the local machine,\
    \ at this stage.\n\nIn Elixir, calling a system command is done with `System.cmd`.\
    \ The HTTP URL to download a file from a `file_path` is made using the following\
    \ rule:\n\n[https://api.telegram.org/file/bot<token>/<file_path>](https://api.telegram.org/file/bot)\n\
    \nwith the `file_path` of the form: `profile_photos/file_10.jpg`. That gives the\
    \ full listing.\n\n```\n{:ok, res} = Telegram.Api.request(token, \"getChat\",\
    \ chat_id: 121843071)\nfileId = res[\"photo\"][\"big_file_id\"]\n{:ok, res2} =\
    \ Telegram.Api.request(token, \"getFile\", file_id:\n\"#{fileId}\")\nSystem.cmd(\"\
    curl\",\n[\"-O\", \"https://api.telegram.org/file/bot#{token}/#{res2[\"file_path\"\
    ]}\"])\n```\n\nAnd the author’s profile picture is shown (Figure [10-5](#index_split_001.html#p230)).\n\
    \n***Figure 10-5.   Beach ball, not the OS X one***\n\n![](index-231_1.jpg)\n\n\
    ## Chapter 10   Week 10: elixir\n\n### SendPhoto\n\nSometimes it’s not what you\
    \ can get but what you can give that matters. Following the same pattern, you\
    \ can send a picture, using `sendPhoto` with the exact same construct.\n\n```\n\
    token = Application.get_env(:telegrambot, :token)\nchat_id = 121843071\nphoto\
    \ = \"cat.jpg\"\nTelegram.Api.request(token, \"sendPhoto\", chat_id: chat_id,\
    \ photo: {:file, photo})\n```\n\nAnd provided you have copied the `cat.jpg` in\
