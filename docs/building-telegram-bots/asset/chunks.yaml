    }])\n\n运行处理程序看看是哪一个！\n\n**一个简单的天气机器人**\n\n接下来，我们将创建一个机器人来接收包含位置的消息，并通过向 OpenWeather（[`openweathermap.org/`](https://openweathermap.org/)）发送请求来检索该位置的天气信息。\n\
