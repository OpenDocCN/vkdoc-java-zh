    code should not be too complicated to read. We start by setting up the name and
    secret Telegram API key of the bot in the constructor, the initialize function.
    We then move on to implement the handle 


    (message) function, which gets a message as a parameter and replies using the
    text that was read in the incoming message. Last, we create a new bot, and define
    its connection as polling.


    require "telegram_bot"


    class EchoBot < TelegramBot::Bot


      def initialize


        super("MyBot", File.read("secret.key"))


      end


      def handle(message : TelegramBot::Message)


        if text = message.text


          reply message, text


        end


      end


    end


    EchoBot.new.polling


