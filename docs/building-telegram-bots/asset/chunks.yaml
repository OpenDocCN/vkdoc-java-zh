    \n***Figure 11-16.   Random photo***\n\n### RegExp, Inline Keyboards, and Embedded\
    \ Emojis\n\nTelegraf has this cool embedded feature that allows you to match messages\
    \ on RegExp and perform actions depending on those matches. This is done using\
    \ a regexp within either a `.hears` (for messages coming to a chat group) or `.on`\
    \ (message directly sent to the bot) callback.\n\n## Chapter 11   Week 11: Node.js\n\
    \nIn the following, “like” is searched in group chat messages, and an inline keyboard\
    \ shows up.\n\n```\nconst { Markup } = Telegraf\n\nconst inlineMessageRatingKeyboard\
    \ = Markup.inlineKeyboard([\n    Markup.callbackButton('<', 'like'),\n    Markup.callbackButton('=',\
    \ 'dislike')\n]).extra()\n\nbot.hears(/like (.+)/, (ctx) => ctx.telegram.sendMessage(\n\
    \    ctx.from.id,\n    'Like?',\n    inlineMessageRatingKeyboard)\n)\n```\n\n\
    Actions for callbacks themselves can be defined after. Here, we are editing the\
    \ last message, the one with the inline keyboard in place, using the API function\
    \ `editMessageText`.\n\n```\nbot.action('like', (ctx) => ctx.editMessageText('••\
    \ Awesome! ••'))\nbot.action('dislike', (ctx) => ctx.editMessageText('okey'))\n\
