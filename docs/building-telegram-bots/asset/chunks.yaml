    \n![](index-232_1.jpg)\n\n## Chapter 10   Week 10: elixir\n\n***Figure 10-7. \
    \  Straight from your editor…***\n\n### Telegram Bot\n\nI’ve exceeded the optimum\
    \ number of pages for this chapter, so I’ll just offer a quick look at how to\
    \ create and run a bot and how to implement a few commands for this new bot.\n\
    \n#### Bot1: Anything Goes\n\nThis first bot will send the full data structure\
    \ of the received update to the chat. See how the token is passed to the `Telegram.Bot`\
    \ library, after calling `use`?\n\n```\ndefmodule Bot1 do\n  use Telegram.Bot,\n\
    \    token: Application.get_env(:telegrambot, :token),\n    username: \"chapter01bot\"\
    ,\n    purge: true\n```\n\n## Chapter 10   Week 10: elixir\n\n```\n  message do\n\
    \    request(\n      \"sendMessage\",\n      chat_id: update[\"chat\"][\"id\"\
    ],\n      text: \"Hey! You sent me a message: #{inspect(update)}\"\n    )\n  end\n\
    end\n\n{:ok, _} = Bot1.start_link()\nProcess.sleep(:infinity)\n```\n\nThe last\
    \ two lines start the bot in a separate thread and tell the main thread to sleep\
    \ forever. See, too, how the request to `sendMessage` is a repeat of what was\
    \ done in the previous section.\n\n#### Bot2: Fibonacci\n\nOur second bot will\
    \ implement a command that can compute Fibonacci for you and send the result back\
    \ to the chat. Commands with the Telegram library are simply defined using `command`.\
    \ The command name is the first parameter of `command`, followed by possible arguments.\n\
    \nThe `command` block itself has access to the update object coming from Telegram.\
    \ Even though you don’t see it so much, Elixir has this functional program gene\
    \ under the hood, and most of the calls are done using `apply`.\n\nThis shows\
    \ particularly where you have to use `Enum.at` to get the index of a specific\
    \ element of a list, here, the first one, so 0.\n\n```\n    command \"fib\", args\
    \ do\n        {intVal, \"\"} = Integer.parse(Enum.at(args,0))\n         request(\"\
    sendMessage\", chat_id: update[\"chat\"][\"id\"], text: \"Fib[#{intVal}] = #{Fib.fib(intVal)}\"\
    )\n    end\n```\n\n## Chapter 10   Week 10: elixir\n\nHere, `Fib` is defined in\
    \ a separate `Fib` module, as shown in the full listing, to which a simple recursive\
    \ Fibonacci implementation has been added.\n\n```\ndefmodule Fib do\n    def fib(0)\
    \ do 0 end\n    def fib(1) do 1 end\n    def fib(n) do fib(n-1) + fib(n-2) end\n\
    end\n\ndefmodule Bot2 do\n  use Telegram.Bot,\n    token: Application.get_env(:telegrambot,\
    \ :token),\n    username: \"chapter01bot\",\n    purge: true\n\n    command \"\
    fib\", args do\n        {intVal, \"\"} = Integer.parse(Enum.at(args,0))\n    \
    \     request(\"sendMessage\", chat_id: update[\"chat\"][\"id\"], text: \"Fib[#{intVal}]\
    \ = #{Fib.fib(intVal)}\")\n    end\n\n    any do\n       IO.puts \"not found\"\
    \n    end\nend\n\n{:ok, _} = Bot2.start_link()\nProcess.sleep(:infinity)\n```\n\
    \nAlso, avoid the use of `any` function at the bottom of this second bot, for\
    \ a catch-them-all message.\n\nAt last, you can define all other supported messages\
    \ of the Telegram API in your new bots, and the list of possible blocks that can\
    \ go in your bot are relisted here for convenience, straight from the Telegram\
    \ library.\n\n## Chapter 10   Week 10: elixir\n\n```\n  edited_message do\n  \
    \  # handler code\n  end\n\n  channel_post do\n    # handler code\n  end\n\n \
    \ edited_channel_post do\n    # handler code\n  end\n\n  inline_query _query do\n\
    \    # handler code\n  end\n\n  chosen_inline_result _query do\n    # handler\
    \ code\n  end\n\n  callback_query do\n    # handler code\n  end\n\n  shipping_query\
    \ do\n    # handler code\n  end\n\n  pre_checkout_query do\n    # handler code\n\
    \  end\n```\n\nIn addition, code in the `api.ex` file has a few more code construct\
    \ samples related to keyboard and inline queries.\n\n[https://github.com/visciang/telegram/blob/master/lib/api.ex](https://github.com/visciang/telegram/blob/master/lib/api.ex)\n\
    \n## CHAPTER 11\n\n## Week 11: Node.js\n\n*“The strength of JavaScript is that\
    \ you can do anything. The weakness is that you will.”*\n—Reg Braithwaite\n\n\
    For the sake of completion, this book is also presenting Node.js and Telegraf,\
    \ the library to deal with Telegram from Node.js. With Telegraf, Node.js may have\
    \ the privilege of being one of the easiest libraries with which to interact with\
    \ Telegram.\n\nIn this chapter, I will focus mostly on running Telegram Bot on\
    \ `runkit.com`, a cloud service that allows you to have an instance of Node.js\
    \ running in the cloud, without installing anything locally, thus reducing the\
    \ time required to write and deploy Telegram bots to a matter of minutes.\n\n\
    Running in the cloud also allows us to have the necessary setup webhook for Telegrams.\
    \ Basically, webhooks are a replacement for the Telegram bot polling method you\
    \ have seen so far with a URL that the Telegram API will call on a new message,\
    \ thus avoiding unnecessary polling traffic. To present a minimal running server\
    \ that can answer the POST request from Telegram, we will use the Koa library,\
    \ a replacement for ExpressJS, to set up the integration with Telegraf.\n\nExcited?\
    \ Let’s hit the Node.js road.\n\n© Nicolas Modrzyk 2019\nN. Modrzyk, *Building\
    \ Telegram Bots*, [https://doi.org/10.1007/978-1-4842-4197-4_11](#index_split_001.html#p236)\n\
    \n![](index-237_1.png)\n\n## Chapter 11   Week 11: Node.js\n\n### Meet RunKit\n\
