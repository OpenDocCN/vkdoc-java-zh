    ** Telegram  Bot**


    I’ve exceeded the optimum number of pages for this chapter, so I’ll just offer
    a quick look at how to create and run a bot and how to implement a few commands
    for this new bot.


    ** Bot1: Anything Goes**


    This first bot will send the full data structure of the received update to the
    chat. See how the token is passed to the Telegram.Bot library, after calling use?


    defmodule Bot1 do


      use Telegram.Bot,


        token: Application.get_env(:telegrambot, :token),


        username: "chapter01bot",


        purge: true


    Chapter 10   Week 10: elixir


      message do


        request(


          "sendMessage",


          chat_id: update["chat"]["id"],


          text: "Hey! You sent me a message: #{inspect(update)}"


        )


      end


    end


    {:ok, _} = Bot1.start_link()


    Process.sleep(:infinity)


    The last two lines start the bot in a separate thread and tell the main thread
    to sleep forever. See, too, how the request to sendMessage is a repeat of what
    was done in the previous section.


    ** Bot2:  Fibonacci**


    Our second bot will implement a command that can compute Fibonacci for you and
    send the result back to the chat. Commands with the Telegram library are simply
    defined using command. The command name is the first parameter of command, followed
    by possible arguments.


    The command block itself has access to the update object coming from Telegram.
    Even though you don’t see it so much, Elixir has this functional program gene
    under the hood, and most of the calls are done using apply.


    This shows particularly where you have to use Enum.at to get the index of a specific
    element of a list, here, the first one, so 0.


        command "fib", args do


            {intVal, ""} = Integer.parse(Enum.at(args,0))


             request("sendMessage", chat_id: update["chat"]["id"], text: "Fib[#{intVal}]
    = #{Fib.fib(intVal)}")


        end


    Chapter 10   Week 10: elixir


    Here, Fib is defined in a separate Fib module, as shown in the full listing, to
    which a simple recursive Fibonacci implementation has been added.


    defmodule Fib do


        def fib(0) do 0 end


        def fib(1) do 1 end


        def fib(n) do fib(n-1) + fib(n-2) end


    end


    defmodule Bot2 do


      use Telegram.Bot,


        token: Application.get_env(:telegrambot, :token),


        username: "chapter01bot",


        purge: true


        command "fib", args do


            {intVal, ""} = Integer.parse(Enum.at(args,0))


             request("sendMessage", chat_id: update["chat"]["id"], text: "Fib[#{intVal}]
    = #{Fib.fib(intVal)}")


        end


        any do


           IO.puts "not found"


        end


    end


    {:ok, _} = Bot2.start_link()


    Process.sleep(:infinity)


