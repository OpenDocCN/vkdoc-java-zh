    inference_on_image function on the picture.


    import os


    import telepot


    from telepot.loop import MessageLoop


    import tempfile


    import classify_image


    def handle(msg):


    if msg["photo"]:


    chat_id = msg[''chat''][''id'']


    f = tempfile.NamedTemporaryFile(delete=True).name+".png"


