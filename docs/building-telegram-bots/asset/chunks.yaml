    crystal build src/mybot.cr


    Then, directly invoking the compiled file will execute the same print statement,
    but this time, as a binary file, without dependencies on the Crystal build system.


    ./mybot


    >0.1.0


    Any code you compile with the build command gives you an 


    executable you can reuse at will. This includes the soon-to-arrive Telegram bot.Sweet.


    Now, the reason we really wanted to create a Crystal project in the first place
    was to be able to add the bot API dependency to write Crystal code. In the project
    folder, there was a file named shard.yml. This is the metadata file responsible
    for handling the project, similar to pom.xml or build.gradle in Java or the package.json file
    in JavaScript.


    The content of the file shard.yml is shown following, with the added telegram_bot dependency
    toward the end.


    name: mybot


    version: 0.1.0


    authors:


      - Nicolas Modrzyk <hellonico at gmail.com>


    targets:


      mybot:


        main: src/mybot.cr


    Chapter 3   Week 3: Crystal


    crystal: 0.26.1


    license: MIT


    dependencies:


      telegram_bot:


        github: hangyas/telegram_bot


