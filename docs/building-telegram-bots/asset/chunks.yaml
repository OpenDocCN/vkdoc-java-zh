    \n`detect`函数将完成大部分`opencv`工作，包括检测、计数和绘制人脸。注意该函数如何再次同时返回两个值，以及我们如何在主`handle`函数中将它们赋值给两个变量。\n\
    \n```python\nimport os\nimport telepot\nfrom telepot.loop import MessageLoop\n\
    import pprint\nimport cv2 as cv\nimport tempfile\n\nclassifier = cv.CascadeClassifier(cv.data.haarcascades\
    \ + \"haarcascade_frontalface_default.xml\")\n\ndef detect(image):\n    gray =\
    \ cv.cvtColor(image, cv.COLOR_BGR2GRAY)\n    faces = classifier.detectMultiScale(gray,\
    \ 1.3, 5)\n    count = 0\n    for (x, y, w, h) in faces:\n        count = count\
    \ + 1\n        cv.rectangle(image, (x, y), (x + w, y + h), (0, 255, 0), 5)\n \
    \   return image, count\n\ndef handle(msg):\n    if msg[\"photo\"]:\n        chat_id\
    \ = msg['chat']['id']\n        f = tempfile.NamedTemporaryFile(delete=True).name\
    \ + \".png\"\n        photo = msg['photo'][-1][\"file_id\"]\n        path = bot.getFile(photo)[\"\
    file_path\"]\n        bot.download_file(photo, f)\n        p = cv.imread(f)\n\
    \        hsv, l = detect(p)\n        cv.imwrite(f, hsv)\n        bot.sendMessage(chat_id,\
    \ \"found %i faces\" % l)\n        bot.sendPhoto(chat_id, open(f, 'rb'))\n   \
    \ else:\n        print(\"no photo\")\n\nbot = telepot.Bot(os.environ[\"BOT_TOKEN\"\
    ])\nMessageLoop(bot, handle).run_forever()\n```\n\n我已经尝试了这个机器人两次，虽然并不完美，但它能在图片中找到相当多的派对参与者，如图12-8和图12-9所示。\n\
    \n**Figure 12-8.  Eight party faces!**\n\n**Figure 12-9.  Seven party faces!**\n\
    \n## TensorFlow 压轴登场\n\n你可能听说过TensorFlow，这是最著名的机器学习框架之一。创建自己的模型并理解库背后的所有数学知识完全超出了本书的范围。但由于TensorFlow以Python为先，我们将看到一个简短的示例，展示一个使用TensorFlow识别图片内容的Telegram机器人。\n\
    \n使用TensorFlow，你可以通过一系列层（步骤）来训练模型，这看起来像一个记忆体或网络。你告诉这个记忆体：输入X对应输出Y，或者输入X,Y对应输出Z，最终，一组像素代表一只猫或一只狗。\n\
    \n你使用大量输入和输出的数据集（本例中为图像）来训练这个记忆体，然后可以在实际环境中重用这个网络。已经有预训练好的模型供我们使用，因此下面的机器人将使用一组现有的图片来训练模型，并重用该TensorFlow模型。\n\
    \nTensorFlow本身同样通过`pip`安装：\n\n```\npip install tensorflow\n```\n\n模型和图像分类代码位于：\n\
    \n[https://github.com/tensorflow/models](https://github.com/tensorflow/models)\n\
    \n更具体地说：\n\n[https://github.com/tensorflow/models/tree/master/tutorials/image/imagenet](https://github.com/tensorflow/models/tree/master/tutorials/image/imagenet)\n\
    \n要使用它，我们首先复制`classify_image`代码，并对其进行一些修改，主要是：\n\n- 将其作为库调用，而不是命令行\n- 返回预测结果——实际上，是返回最佳预测结果\n\
    \n`diff`内容在示例中提供，如下所示：\n\n```\n48c48,54\n< FLAGS = None\n---\n> class ObjectDict(dict):\n\
    >       def __init__(self, *args, **kws):\n>           super(ObjectDict, self).__init__(*args,\
    \ **kws)\n>           self.__dict__ = self\n>\n> FLAGS = ObjectDict({'model_dir':\"\
