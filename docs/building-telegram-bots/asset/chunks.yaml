    for dependencies, via direct Git access, without the need for packaging, and the
    always-breaking central repository.


    In this chapter, in addition to playing with Crystal to develop bots, you will
    also be introduced to writing your first bot commands. You will remember what
    commands are. We used them when talking to the bot 


    father, to create our bots. Yes, those are the same! (See Figure [3-1](#index_split_000.html#p52).)


