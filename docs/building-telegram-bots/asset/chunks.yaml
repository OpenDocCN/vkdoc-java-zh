    ## Chapter 11   Week 11: Node.js\n\n#### First Code on RunKit\n\nFrom there, it\
    \ won’t be a surprise that you can just type in whatever JavaScript code you want\
    \ to write. So, let’s start by saying hello, as shown in Figure [11-5.](#index_split_001.html#p240)\n\
    \n***Figure 11-5.   Say “hello” with RunKit***\n\nExecuting is done either by\
    \ clicking the run button or, as indicated, with shift+return. Each resulting\
    \ line of the execution is shown following.\n\nSay you want to compute quickly\
    \ some Fibonacci numbers...You could either implement this yourself, with a possible\
    \ implementation shown following.\n\n```\nfunction myfibonacci(num) {\n  if (num\
    \ <= 1) return 1;\n  return myfibonacci(num - 1) + myfibonacci(num - 2);\n}\n\n\
    console.log(myfibonacci(39));\n```\n\nOr you could also require a Node.js library,\
    \ available through RunKit (and which you can check at [https://npm.runkit.com](https://npm.runkit.com)/).\n\
    \nSo, for example, you could simply require a library, for example, `fibonacci-fast`,\
