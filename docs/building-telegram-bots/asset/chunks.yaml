    N. Modrzyk,  *Building Telegram Bots*, [https://doi.org/10.1007/978-1-4842-4197-4_6](#index_split_000.html#p124)


    Chapter 6   Week 6: C++


    cmake is a low-level tool used to organize your project metadata and third-party
    libraries, as well as generating a file that makes the build tool itself.


    boost is a set of well-maintained and clean libraries for C++.


    ** Install  tgbot-cpp**


    Cloning the tgbot-cpp repository is going to be the first step in this chapter.
    The code of the C++ wrapper for Telegram can be found on 


