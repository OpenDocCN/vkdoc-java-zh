  raw: 'time, we will use what opencv calls a classifier, and use it on a grayscale
    version of the sent picture. Then we will draw rectangles inside the picture,
    by looping over the faces found, using the opencv’s rectangle function.


    The detect function will do most of the opencv work, by detecting, counting, and
    drawing the faces. Note how the function returns two values simultaneously again,
    and how we are assigning them to two values in the main handle function.


    import os


    import telepot


    from telepot.loop import MessageLoop


    import pprint


    import cv2 as cv


    import tempfile


    classifier = cv.CascadeClassifier(cv.data.haarcascades +


    "haarcascade_frontalface_default.xml")


    def detect(image):


    gray = cv.cvtColor(image, cv.COLOR_BGR2GRAY)


    faces = classifier.detectMultiScale(gray, 1.3, 5)


    count = 0


    for (x, y, w, h) in faces:


    count = count+1


    cv.rectangle(image, (x, y), (x+w, y+h), (0, 255, 0), 5)


    return image, count


    def handle(msg):


    if msg["photo"]:


    chat_id = msg[''chat''][''id'']


    f = tempfile.NamedTemporaryFile(delete=True).name+".png"


    photo = msg[''photo''][-1]["file_id"]


    path = bot.getFile(photo)["file_path"]


