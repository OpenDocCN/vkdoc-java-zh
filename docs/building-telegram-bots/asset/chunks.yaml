    \ 练习，你也可以自己编写代码。\n\n一切就绪后，让我们将 `origami` 包作为 `origami` 添加到命名空间部分，`origami` 是 `opencv`\
    \ 的核心封装器。\n\n(ns origamibot.core\n\n  (:require\n\n    [opencv3.core :as origami]\n\
    \n    ;….\n\n     [clojure.string :as str])\n\n  (:gen-class))\n\n第 7 章   第 7\
    \ 周：Clojure\n\n然后你可以应用任何你想要的 `opencv` 转换。让我们定义一个名为 `apply-cv` 的函数，它对从文件加载的图片应用\
    \ Canny 效果。请注意，转换是在文件上就地完成的。\n\n(defn apply-cv [filename]\n\n         (->  filename\n\
    \n           (origami/imread)\n\n           (origami/cvt-color! origami/COLOR_RGB2GRAY)\n\
    \n           (origami/canny! 300.0 100.0 3 true)\n\n           (origami/bitwise-not!)\n\
    \n           (origami/imwrite filename)))\n\n最后，你通过调用之前定义的 `apply-cv` 函数和下载的文件，对从聊天中检索到的文件应用\
