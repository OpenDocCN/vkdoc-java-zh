    Going forward, let’s review how good old Fibonacci numbers can be 


    expressively generated with Rust.


    ** Fibonacci**


    Rust has very convenient pattern-matching branching, which can be 


    written with the appropriately named match. We will use the construct to write
    the Fibonacci generators.


    In a new file, fibo.rs, we declare the fibonacci function, including the parameter
    types for input and output—here, 64-bit integers for both inputs and outputs—to
    avoid overflows.


    Also, note, in the following code snippet, how you use _ to match any other value
    for n.


    fn fibonacci(n: u64) -> u64 {


        match n {


            0 => 0,


            1 => 1,


            _ => fibonacci(n - 1) + fibonacci(n - 2)


        }


    }


    Let’s put this code with a main function, so that we can call the 


    program with an input from the command line.


    use std::env;


    fn main() {


        if let Some(arg1) = env::args().nth(1) {


            let myint = arg1.parse().unwrap();


    Chapter 4   Week 4: rust


            println!("{}", fibonacci(myint));


        } else {


            println!("missing input")


        }


    }


    In the preceding code snippet, note how explicit null checks are 


    avoided by using Some and how the string parameter is turned into an integer, myint,
    using parse and unwrap.


    unwrap is used to turn the Some(something_inside) to something_


    inside. Here, we have the aif/else block to confirm whether we have a value as
    an argument.


    If you are not sure whether you have a value after Sum, you can also use unwrap_or,
    to give a default value.


    Compiling gives you an executable, as in the previous Hello World 


    example.


    rustc fibo.rs


    Running shows that the Fibonacci generator program works as 


    expected.


    $ ./fibo 10


    $ ./fibo 15


    $ ./fibo 30


