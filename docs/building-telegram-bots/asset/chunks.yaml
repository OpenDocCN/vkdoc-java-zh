    \ 编程代码，该代码将处理指定为输入的图片，并将其转换为灰度版本。在 OpenCV 中，这是通过一个中间的 `Mat` 对象完成的，该对象是一个用于在内存中表示图像的矩阵对象。\n\
    \n你需要一个新的 `include` 语句，包含 `opencv2/highgui`，而且，是的，我们都喜欢这样一个事实：尽管它是 `opencv4`，但命名空间仍然版本化为\
    \ 2。\n\n![](img/index-143_1.jpg)\n\n第 6 章   第 6 周：C++\n\n`imread` 和 `imwrite`\
    \ 是用于读写图片的两个 `opencv` 方法，`imread` 的第二个参数告诉它在解码图片时使用多少种颜色。这给出了非常简短的代码片段：\n\n#include\
    \ \"opencv2/highgui.hpp\"\n\nusing namespace cv;\n\nintmain(intargc, char* argv[])\n\
    \n{\n\n    auto bw = imread(argv[1],0);\n\nimwrite(\"saved.jpg\", bw);\n\n   \
    \ return 0;\n\n}\n\n现在使用 `make` 编译并运行这个简短的程序。\n\nmake\n\n./opencvdemo cat.jpg\n\
    \n输入的图片 `cat.jpg` 如图 6-6 所示。\n\n***图 6-6. 彩色输入猫咪***\n\n![](img/index-144_1.jpg)\n\
    \n第 6 章   第 6 周：C++\n\n应用 OpenCV 颜色更改后，猫咪的灰度版本如图 6-7 所示。\n\n***图 6-7. 如果你能看到区别，说明你正在以彩色阅读本书***\n\
    \n现在我们知道如何从程序中使用 `opencv`，让我们整合所有部分，创建一个能转换发送到聊天的图片的机器人。\n\n**OpenCV 机器人**\n\n\
    完整 OpenCV 机器人的 `cmake` 设置与上一个相同，因此除了项目名称外，无需更改 `CMakeLists.txt`。在编写此机器人之前需要知道的是，当聊天收到带有图片的消息时，消息中包含一个对应于已保存文件的\
    \ `fileId`。\n\n在 Telegram 架构中，这些文件托管在不同的服务器上，因此需要不同的 API。新的位置是 `api.telegramorg/file/bot`。\n\
    \n然后，检索文件的 URL 由此基础 URL 构建，附加机器人令牌，最后是 `fileId`。\n\n第 6 章   第 6 周：C++\n\n要读取文件并处理图片或文件，我们必须执行一个不同的请求来检索该文件。因此，在此示例中，你将重用从\
    \ C++ 代码运行 `curl` 命令的技巧来执行此请求。\n\n以下函数 `applyOpenCV` 从 Telegram 服务器下载一个静态文件，应用将图片转换为灰度阴影的\
    \ `opencv` 过程，最后将其保存到名为 `saved.jpg` 的文件中。\n\nconst string telegram_url = \"https://api.telegram.org/file/bot\"\
    ; const string tmp_file = \"download.jpg\";\n\nconst string saved_file = \"saved.jpg\"\
    ;\n\nstring applyOpenCV(string token, string path) {\n\n    string command = string(\"\
    curl --silent \");\n\n    command\n\n.append(telegram_url)\n\n.append(token)\n\
    \n.append(\"/\")\n\n.append(path)\n\n.append(\" -o \")\n\n.append(tmp_file);\n\
    \nconst char* cmd = command.c_str();\n\n    system(cmd);\n\n    Mat bw = imread(tmp_file,0);\n\
    \nimwrite(saved_file, bw);\n\n    return saved_file;\n\n}\n\n现在，我们只需要一个入口点来调用此函数。当在聊天中检测到图片时，将调用此函数。\n\
    \n第 6 章   第 6 周：C++\n\n因此，在处理聊天消息的机器人回调中，要检测是否存在图片，我们可以检查消息中包含的图片尺寸数量。一旦我们知道存在图片，我们就可以检索其\
    \ `fileId`，然后使用 `filePath` 和令牌调用我们刚刚定义的 `applyOpenCV` 函数。\n\n另外，请注意，正如我之前提到的，引用向量中添加了一个指向令牌的新指针。如果你忘记这样做，回调将无法访问令牌变量，并且编译会失败。\n\
    \nbot.getEvents().onAnyMessage(&bot, &token {\n\n if(message->photo.size() !=\
    \ 0) {\n\nPhotoSize::Ptr s = message->photo[2];\n\n    if(s!=NULL) {\n\n     string\
    \ fileId = message->photo[2]->fileId;\n\nFile::Ptr file = bot.getApi().getFile(fileId);\n\
    \n     string filepath = applyOpenCV(token.c_str(), file-\n\n>filePath.c_str());\n\
    \nbot.getApi().sendPhoto(\n\n        message->chat->id,\n\nInputFile::fromFile(filepath,\
    \ \"image/jpeg\"));\n\n    }\n\n  }\n\n}\n\n机器人的其余代码与其他机器人相同。执行 `make` 并启动机器人后，你可以看到发送到聊天的图片变为黑白，如图\
    \ 6-8 所示。\n\n![](img/index-147_1.jpg)\n\n第 6 章   第 6 周：C++\n\n***图 6-8. 彩色和灰色的猫咪***\n\
