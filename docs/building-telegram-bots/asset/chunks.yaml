    \n**Visual Studio Code**\n\n作为开发机器人的快速工作流程，你可以像我们之前看到的那样启动一个带有 `lein repl` 的 REPL，或者使用图\
    \ 7-3 中所示的 Visual Studio Code 插件。\n\n***图 7-3. Visual Studio Code 的 Clojure 插件***\n\
    \n接下来要做的三件事是\n\n•  查看 `project.clj`，项目的元数据文件。\n\n•  查看处理 Telegram 请求的 Clojure\
    \ 代码。\n\n•  查看来自 Telegram 的消息。\n\n第 7 章   第 7 周：Clojure\n\n*深入观察自然，然后你会更好地理解一切。*\n\
    \n—阿尔伯特·爱因斯坦\n\n我们现在将按照提到的顺序查看所有这些内容。\n\n**project.clj 中的项目元数据**\n\nLeiningen\
    \ 和 Clojure 的一个优点是项目元数据使用与代码相同的语言，这意味着项目配置是用 Clojure 编写的。它实际上或多或少是一个大的哈希映射。一致性是关键（双关语），找到具有这种恒定结构的文件是令人安心的。\n\
    \n在 `project.clj` 中，你首先使用 `defproject` 定义一个 Clojure 项目，传递项目名称（此处为 `mytelegrambot`）、版本号以及一个包含不同事物的映射，其中每个键都以\
    \ `:` 为前缀。\n\n在用于定义项目的不同事物中，我们可以找到\n\n•   *依赖项*：要导入并在项目中使用的第三方库列表\n\n•   *插件*：Leiningen\
    \ 的插件列表\n\n•  main：要编译和/或运行的主文件，实际上是命名空间\n\n就像项目名称一样，依赖项带有项目名称和版本号，这实际上使用了相同的格式。生成的完整\
    \ `project.clj` 文件复制如下。\n\n(defproject mytelegrambot \"0.1.0-SNAPSHOT\"\n\n  :description\
    \ \"FIXME: write description\"\n\n  :url \"http://example.com/FIXME\"\n\n第 7 章\
    \   第 7 周：Clojure\n\n  :license {:name \"Eclipse Public License\"\n\n        \
    \    :url \"http://www.eclipse.org/legal/epl-v10.html\"}\n\n  :dependencies [[org.clojure/clojure\
    \ \"1.8.0\"]\n\n                 [environ            \"1.1.0\"]\n\n          \
    \       [morse              \"0.2.4\"]]\n\n  :plugins [[lein-environ \"1.1.0\"\
    ]]\n\n  :main ^:skip-aot mytelegrambot.core\n\n  :target-path \"target/%s\"\n\n\
    \  :profiles {:uberjar {:aot :all}})\n\n现在，让我们看看位于 `core.clj` 中的代码本身。\n\n**core.clj\
    \ 中的 Clojure 代码**\n\n让我们将这个源文件分解成更小的部分。首先，Clojure 项目源文件以命名空间定义 `ns` 开头，然后是在当前上下文中使用的其他命名空间列表。\n\
    \n(ns mytelegrambot.core\n\n  (:require [clojure.core.async :refer [<!!]]\n\n\
    \            [clojure.string :as str]\n\n            [environ.core :refer [env]]\n\
    \n            [morse.handlers :as h]\n\n            [morse.polling :as p]\n\n\
    \            [morse.api :as t])\n\n  (:gen-class))\n\n你会注意到用于异步代码、字符串操作、轻松检索环境变量的命名空间，以及来自\
    \ Morse 的不同命名空间，Morse 是负责与 Telegram API 进行低级通信的第三方库。还要注意每个命名空间如何定义一个前缀，例如 `p`、`t`\
    \ 或 `h`，你可以使用它们作为快捷方式，而不是使用完整的命名空间名称。最后，`gen-class` 用于告诉 Clojure 代码它必须将自己转换为 Java\
    \ 运行时原生理解的东西，即一个 Java 类。\n\n即使了解不多，你也能感觉到以下代码将从我们稍后将设置的 Clojure 环境变量中检索令牌。`environ`\
    \ 库将外部 shell 环境中的变量“关键字化”，或使其对 Clojure 友好。在这里，`TELEGRAM_TOKEN` 将被转换为 `:telegram-token`。\n\
    \n; TODO: fill correct token\n\n(def token (env :telegram-token))\n\n我将暂时搁置处理程序的定义，但现在，要知道这是你将编写机器人核心代码的地方。\n\
    \n(h/defhandler handler\n\n...\n\n)\n\n最后，`main`，顾名思义，是程序的 `main` 函数。它检查 Telegram\
    \ 令牌是否存在，然后使用函数 `p/start` 开始轮询更新，参数为 `telegram token` 和 `telegram handler`。\n\n\
    (defn -main\n\n  [& args]\n\n  (when (str/blank? token)\n\n     (println \"Please\
    \ provde token in TELEGRAM_TOKEN environment variable!\")\n\n    (System/exit\
    \ 1))\n\n  (println \"Starting the mytelegrambot\")\n\n  (<!! (p/start token handler)))\n\
    \n第 7 章   第 7 周：Clojure\n\n我说过我们稍后会更详细地查看处理程序代码，而稍后就是现在。提醒：每个命令通过一个 `command-fn`\
    \ 指令处理，所有这些都在文件的 `defhandler` 部分中定义。\n\n(h/defhandler handler\n\n   ; your handlers\
    \ here.\n\n)\n\n首先，我们为机器人定义一个简单的 `\"start\"` 命令。一个命令接受一个 Clojure 函数作为回调，该函数的参数从传入的消息中（解）构造。\n\
    \n  (h/command-fn \"start\"\n\n    (fn [{{id :id :as chat} :chat}]\n\n      (println\
    \ \"Bot joined new chat: \" chat)\n\n      (t/send-text token id \"Welcome to\
    \ mytelegrambot!\"))) 一旦 `start` 命令在聊天中触发，我们只需使用来自 `morse.api` 命名空间（由 `t` 前缀，如命名空间的\
    \ `require` 部分所定义）的 `send-text` 函数向聊天发送一条消息。\n\n生成的代码还定义了一个 `help` 命令，它的定义方式完全相同，实际上做的事情与\
    \ `start` 命令几乎完全相同，即发回一条文本消息。\n\n  (h/command-fn \"help\"\n\n    (fn [{{id :id\
    \ :as chat} :chat}]\n\n      (println \"Help was requested in \" chat)\n\n   \
    \   (t/send-text token id \"Help is on the way\")))\n\n第 7 章   第 7 周：Clojure\n\
    \n最后，我们定义一个通用的消息处理程序，并且我们还在回调函数中使用关键字 `:as` 直接获取消息数据结构的快捷方式。\n\n  (h/message-fn\n\
    \n    (fn [{{id :id} :chat :as message}]\n\n      (println \"Intercepted message:\
    \ \" message)\n\n       (t/send-text token id \"I don't do a whole lot ...\n\n\
    yet.\")))\n\n**令牌！**\n\n你可能还记得在 `project.clj` 文件中定义了一个 `lein-environ` 插件。这个插件从不同的地方读取环境变量，例如\
    \ `project.clj`，然后用所有必要的环境变量填充一个名为 `.lein-env` 的文件。\n\n因此，你可以在你的 `project.clj`\
    \ 中（针对一个项目）添加如下内容：\n\n(defproject mytelegrambot \"0.1.0-SNAPSHOT\"\n\n   ...\n\
    \n:env\n\n  {:telegram-token \"585672177:...\"})\n\n或者在 `$HOME/.lein/profiles`\
    \ 中（针对多个项目）\n\n{:user {:env{:telegram-token \"585672177:...\"}}}\n\n**调试 Telegram\
    \ 消息**\n\n为了查看来自 Telegram 的消息，我们将它们格式化并输出到一个日志文件中。为此，我们将创建一个追加写入的文件。在 `core.clj`\
    \ 文件中，让我们在令牌定义的正下方声明一个写入器。\n\n![](img/index-160_1.png)\n\n第 7 章   第 7 周：Clojure\n\
    \n(def writer (clojure.java.io/writer \"message.log \" :append true))\n\n在接收消息的回调函数中，让我们输出接收到的消息。\n\
    \nClojure 使用来自 `clojure.pprint` 命名空间的 `pprint` 函数为你格式化，你可以告诉它在哪里写入消息。\n\n(clojure.pprint/pprint\
    \ message writer)\n\n在下一条消息发送给机器人时，`message.log` 文件将被填充传入的消息，如图 7-4 所示。\n\n***图\
    \ 7-4. 格式化后的传入消息***\n\n![](img/index-161_1.png)\n\n第 7 章   第 7 周：Clojure\n\n**创建一个反转机器人**\n\
    \n现在让我们创建一个文本反转机器人。你会记得你可以访问 Clojure 的字符串命名空间，前缀为 `str/`。这个命名空间有许多函数，其中之一是 `reverse`（图\
    \ 7-5）。\n\n***图 7-5. `reverse` 函数，与所有 `str/` 函数一起显示***\n\n要创建一个用于反转文本的处理程序，你可以在接收到的文本上调用这个\
    \ `reverse` 函数。如果你再次查看图 7-4 中的映射，接收到的文本本身可以从消息中通过键 `:text` 获取。\n\n以下是新的消息处理程序，用于反转发送到聊天的文本：\n\
    \n(h/message-fn\n\n    (fn [{{id :id} :chat :as message}]\n\n      (clojure.pprint/pprint\
    \ message writer)\n\n      (t/send-text token id (str/reverse (:text message)))))\n\
