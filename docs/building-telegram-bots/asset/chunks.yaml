    Erlang VM 由爱立信开发，已经存在了很久，确切地说是自 1986 年以来，并且随着时间的推移，它在异构和高度并发的环境中证明了其弹性。通常，Erlang
    用于需要以下特性的程序：


    •  分布式

    •  容错性

    •  （软）实时能力

    •  高可用性不间断应用

    •  热交换


    Erlang 有两个主要特性：


    •  Erlang 运行时，或虚拟机 (VM)

    •  Erlang 编程语言


