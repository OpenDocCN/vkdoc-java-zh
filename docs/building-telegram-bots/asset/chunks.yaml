    \n**第一个 Nim 机器人**\n\n在 Nim 中，你使用 `proc` 定义一个函数或过程。`proc` 接受一个函数名，这里是 `updateHandler`；一些参数，这里是类型为\
    \ `telebot` 的 `b` 和类型为 `Update` 的 `u`（都来自 `telebot` 模块）；以及有时一些元数据（或 pragma），这里是\
    \ `{.async.}`。\n\n你可以在 `nim-lang.org` 上找到任何模块的文档。例如，`asyncdispatch` 模块在这里：\n\n\
    [`nim-lang.org/docs/asyncdispatch.html`](https://nim-lang.org/docs/asyncdispatch.html)\n\
    \n我们在这里使用 async 模块的原因是为了编写我们的 Telegram 机器人。\n\n**注意** 异步过程消除了处理回调的痛苦。它们允许你以与编写同步代码相同的方式编写异步代码。\n\
    \n`slurp` 函数获取文件的内容并将其转换为字符串——这里，是你在上一章中从 BotFather 收到的机器人 `API_KEY`。是的，你应该将你的密钥粘贴到一个新的\
    \ `secret.key` 文件中。以下是一个简单机器人的几行代码，它对你发送给它的任何内容都回复“hello”。\n\n```nim\nimport telebot,\
    \ asyncdispatch, options\n\nconst API_KEY = slurp(\"secret.key\")\n\nproc updateHandler(b:\
    \ Telebot, u: Update) {.async.} =\n```\n\n![](img/index-46_1.jpg)\n\n第 2 章 第 2\
    \ 周：Nim\n\n```nim\n    let\n     response = u.message.get\n     message = newMessage(response.chat.id,\
    \ \"hello\")\n    discard await b.send(message)\n\nlet bot = newTeleBot(API_KEY)\n\
    bot.onUpdate(updateHandler)\nbot.poll(300)\n```\n\n与你现有的机器人或向机器人父亲注册的新机器人开始一个新的聊天，将产生如图\
    \ 2-16 所示的对话。\n\n***图 2-16.** hello*\n\n![](img/index-47_1.jpg)\n\n第 2 章 第 2 周：Nim\n\
    \n**回复 Nim 机器人**\n\n既然你已经掌握了整个设置，创建第二个 Nim 机器人将相当简单。这个新机器人将内联回复，就像你直接回复另一个用户发送的消息一样。这是通过设置创建的消息对象上的\
    \ `replyToMessageId` 属性来完成的。\n\n请注意，如果你将消息对象保留在 `let` 块中声明，编译器会“抱怨”（双关语）该消息无法更新，因为它是不可变的（图\
    \ 2-17）。\n\n***图 2-17.** 使用 `let` 而不是 `var` 导致的编译错误*\n\n这是因为它是用 `let` 创建的，这使得对象不可变。为了解决这个问题，你只需用\
    \ `var` 声明消息对象即可。\n\n![](img/index-48_1.jpg)\n\n第 2 章 第 2 周：Nim\n\n```nim\nimport\
    \ telebot, asyncdispatch, options\n\nconst API_KEY = slurp(\"secret.key\")\n\n\
    proc updateHandler(b: Telebot, u: Update) {.async.} =\n  var response = u.message.get\n\
    \  if response.text.isSome:\n    let\n      text = response.text.get\n    var\
    \ message = newMessage(response.chat.id, text)\n    message.replyToMessageId =\
    \ response.messageId\n    discard await b.send(message)\n\nlet bot = newTeleBot(API_KEY)\n\
    bot.onUpdate(updateHandler)\nbot.poll(300)\n```\n\n机器人现在会告诉你它正在回复哪条消息（图 2-18）。\n\
    \n***图 2-18.** hello, hello*\n\n**猫和狗 Nim 机器人**\n\n下一个机器人只是对前一个机器人的轻微更新。我们将使用\
    \ `newPhoto` 而不是 `newMessage` 来创建消息，这允许我们在发送给用户的消息中嵌入一张图片。\n\n为此，你必须在 Nim 文件旁边有动物的图片（例如\
    \ `cat.jpg` 和 `dog.jpg`）。\n\n第 2 章 第 2 周：Nim\n\n在 Nim 代码中，文件的路径以 `file://` 为前缀，我们还通过设置照片消息的\
    \ `caption` 字段为图片添加标题。\n\n这给出了：\n\n```nim\nimport telebot, asyncdispatch, options\n\
    \nconst API_KEY = slurp(\"secret.key\")\n\nproc updateHandler(bot: TeleBot, update:\
    \ Update) {.async.} =\n  var response = update.message.get\n  if response.text.isSome:\n\
    \    let\n         animal = response.text.get\n         file = \"file://\" & animal\
    \ & \".jpg\"\n    var message = newPhoto(response.chat.id, file)\n    message.caption\
    \ = animal\n    discard await bot.send(message)\n\nlet\n  bot = newTeleBot(API_KEY)\n\
    bot.onUpdate(updateHandler)\nbot.poll(300)\n```\n\n启动这个机器人后，当你向它发送关键字时，它会回复一张给定关键字的加载好的图片，并附上动物的标题（图\
    \ 2-19）。\n\n![](img/index-50_1.jpg)\n\n第 2 章 第 2 周：Nim\n\n***图 2-19.** 猫和狗*\n\n\
    当然，如果你输入一个没有对应文件的动物，机器人将无法回答。\n\n所以，一个小练习是向用户发送一个回复，例如“找不到该文件。”\n\n在这个 Nim 章节中，我们花了很多时间设置\
    \ Visual Studio Code，但现在你比以往任何时候都更有准备去应对其他语言的机器人。\n\n**第 3 章**\n\n**第 3 周：Crystal**\n\
    \n*彗星，带来时代和状态的变迁，*\n\n*在天空中挥舞你水晶般的发丝，……*\n\n—William Shakespeare\n《亨利六世》第一部，第一幕，第一场\n\
    \nCrystal 是一种新的编程语言，其语法深受 Ruby 影响，以至于感觉就像在写 Ruby。与 Ruby 的主要区别在于 Crystal 被编译成 C，因此速度非常快。\n\
    \nCrystal 具有许多优点，例如完全支持简单的并发模型、宏、强类型检查，以及我最喜欢的一点：通过直接 Git 访问完全支持依赖项，无需打包，也无需总是中断的中央仓库。\n\
    \n在本章中，除了使用 Crystal 开发机器人之外，你还将学习编写你的第一个机器人命令。你会记得我们在与机器人父亲对话时使用过命令来创建我们的机器人。是的，它们是相同的！（见图\
    \ 3-1）。\n\n© Nicolas Modrzyk 2019\nN. Modrzyk, *构建 Telegram 机器人*, `doi.org/10.1007/978-1-4842-4197-4_3`\n\
    \n![](img/index-52_1.png)\n\n第 3 章 第 3 周：Crystal\n\n***图 3-1.** BotFather 命令*\n\
    \n**设置 Crystal**\n\nCrystal 网站上已经有一堆安装步骤，所以我们在这里尽量简化。\n\n[`crystal-lang.org/docs/installation/index.html`](https://crystal-lang.org/docs/installation/index.html)\n\
    \n但是请注意，对于 Windows 用户，Crystal 只能与 Windows Subsystem for Linux (WSL) 一起使用，这需要最新版本的\
    \ Windows 10。在 macOS 上，Crystal 可以通过 homebrew 轻松安装，如下所示：\n\n```\nbrew install crystal\n\
    ```\n\n第 3 章 第 3 周：Crystal\n\n当你使用 homebrew 安装 Crystal 时，你可以看到 Crystal 编译器本身是用\
    \ Crystal 编写的，`.cr` 是 Crystal 文件的常见扩展名。\n\n```\nbin/crystal build -D without_openssl\
    \ -D without_zlib -o .build/crystal src/compiler/crystal.cr --release --no-debug\n\
    ```\n\n在我最喜欢的基于 Arch Linux 的 Manjaro Linux 上，Pacman 也直接提供了它。\n\n```\npacman -S\
    \ crystal shards\n```\n\n在其他发行版上，你必须在运行 `yum`、`apt-get` 等之前安装一个新的仓库。\n\n一旦 Crystal\
    \ 安装完毕，你应该检查 `crystal` 以及 Crystal 包管理器 `shards` 是否已安装。\n\n```\nSuperPinkicious:withcrystal\
    \ niko$ crystal --version\nCrystal 0.26.1 (2018-09-06)\nLLVM: 6.0.1\nDefault target:\
    \ x86_64-apple-macosx\n\nSuperPinkicious:withcrystal niko$ shards --version\n\
    Shards 0.8.1 (2018-09-06)\n```\n\n**在游乐场小试牛刀**\n\n安装后，Crystal 实际上可以作为独立环境在所谓的游乐场中使用。你可以使用\
    \ `play` 命令将训练环境作为 Web 服务器启动。\n\n```\ncrystal play\n```\n\n这将在默认端口 8080 上启动一个\
    \ Web 服务器。你也可以使用 `-p` 标志在不同的端口上启动游乐场。\n\n```\ncrystal play -p 8090\n```\n\n![](img/index-54_1.jpg)\n\
    \n![](img/index-54_2.jpg)\n\n第 3 章 第 3 周：Crystal\n\n你可以在左侧面板中键入代码，并直接在右侧看到逐行执行的结果（图\
    \ 3-2）。\n\n***图 3-2.** Crystal 嵌入式开发环境*\n\nCrystal 的纯粹速度可以通过运行一些 CPU 密集型函数来快速体会到，例如，老牌的斐波那契数列（图\
    \ 3-3）。\n\n***图 3-3.** 斐波那契*\n\n第 3 章 第 3 周：Crystal\n\n包含基准测试代码的列表如下：\n\n```crystal\n\
    require \"benchmark\"\n\ndef fib(n : UInt64)\n  raise \"fib not defined for negative\
    \ numbers\" if n < 0\n  new, old = 1_u64, 0_u64\n  n.times {new, old = new + old,\
    \ new}\n  old\nend\n\ndef time(&block)\n  puts Benchmark.measure(&block).real\n\
    end\n\ntime { fib(1000000000_u64) }\n```\n\n当执行时，就像这里一样，在一台简单的 MacBook 上，它花费的时间远少于五秒。所以，我们在这里，Crystal\
    \ 是一种简单而快速的语言。\n\n但是，让我们回过头来，在使用 Visual Studio Code 编写和键入代码时欣赏它。\n\n**再次使用 Visual\
    \ Studio Code**\n\n你将编写一个小程序，根据 GitHub 搜索查询获取 GitHub 项目的 URL。从对 GitHub 的 HTTP\
    \ 请求返回的数据将是 JSON 格式，因此我们也必须使用一些 JSON 解析来解码它。\n\n在一个新文件 `requesting.cr` 中，让我们编写将发送请求并在控制台中显示它的代码。\n\
    \n```crystal\nrequire \"http/client\"\nrequire \"json\"\n```\n\n![](img/index-56_1.jpg)\n\
    \n第 3 章 第 3 周：Crystal\n\n```crystal\ndef search_github(q : String)\n  url = \"\
    https://api.github.com/search/repositories?q=#{q}\"\n  HTTP::Client.get(url) do\
    \ |response|\n    res = response.body_io.gets.to_s\n    json = JSON.parse(res)\n\
    \    json[\"items\"][0][\"url\"]\n  end\nend\n\nputs search_github(\"dog\")\n\
    ```\n\n正如你所欣赏的，语法真的、真的非常接近 Ruby。同时，请注意参数的可选类型标注 `q : String`。\n\nHTTP 客户端和 JSON\
    \ 解析器是核心语言的一部分，因此，运行此代码片段不需要第三方库。\n\n一旦你在文件中键入了代码，Visual Studio Code 会像往常一样，建议你在\
    \ Marketplace 中寻找一个插件（图 3-4）。\n\n***图 3-4.** 在 Marketplace 中寻找 crystals*\n\n![](img/index-57_1.png)\n\
    \n第 3 章 第 3 周：Crystal\n\n我使用 Gerardo Ortega 的 Crystal 插件体验非常好（图 3-5），当然，你也可以随意尝试其他的。\n\
    \n***图 3-5.** Crystal 插件*\n\n你可能还记得第 2 章，你还需要一个 `tasks.json` 文件，与用于 Nim 的文件非常相似，用于运行和执行代码，但这次是针对\
    \ Crystal 的。从命令行执行/运行文件的命令直接使用 `crystal` 命令。\n\n```\ncrystal run <file_name>\n\
    ```\n\n所以，让我们在 Visual Studio Code 的任务文件中编写等效的命令。\n\n```json\n{\n    \"version\"\
    : \"2.0.0\",\n    \"tasks\":\n        [\n            {\n                \"label\"\
    : \"cr\",\n                \"command\": \"crystal\",\n                \"args\"\
    : [\n                    \"run\",\n                    \"${file}\"\n         \
    \       ],\n```\n\n第 3 章 第 3 周：Crystal\n\n```json\n                \"options\"\
    : {\n                    \"cwd\": \"${workspaceRoot}\"\n                },\n \
    \               \"group\": {\n                    \"kind\": \"build\",\n     \
    \               \"isDefault\": true\n                }\n            }\n      \
    \  ]\n    }\n```\n\n**注意** 实际上，在 macOS 上，你必须修改 `LIBRARY_PATH` 变量，以便 Crystal 能够正确编译\
    \ C 代码。\n\n这可以通过将以下行添加到 Visual Studio Code 用户设置中来完成。\n\n```json\n  \"terminal.integrated.env.osx\"\
    : {\n        \"LIBRARY_PATH\": \"/Users/niko/projects/homebrew/lib\"\n}\n```\n\
    \n设置可以如图 3-6、3-7 和 3-8 所示进行编辑。\n\n![](img/index-59_1.jpg)\n\n![](img/index-59_2.png)\n\
    \n![](img/index-59_3.jpg)\n\n第 3 章 第 3 周：Crystal\n\n***图 3-6.** 访问设置*\n\n***图\
    \ 3-7.** 编辑 json 文件*\n\n***图 3-8.** 添加该行*\n\n请注意，当你从命令行执行时，你也必须在你的 shell 环境中的某个地方设置相同的变量，使用以下命令：\n\
    \n```\nexport LIBRARY_PATH=/Users/niko/projects/homebrew/lib\n```\n\n![](img/index-60_1.png)\n\
    \n第 3 章 第 3 周：Crystal\n\n这是 macOS 特有的解决方法，在其他环境中可以安全地忽略。\n\n你现在都准备好了，所以熟悉的 Command+Shift+B\
    \ (Ctrl+Shift+B) 将执行 Crystal 代码。\n\nVisual Studio Code 的集成控制台/终端将执行该命令并显示 GitHub\
    \ 查询的结果（图 3-9）。\n\n***图 3-9.** 第一个 Crystal 命令*\n\n现在，为了编写 Telegram 机器人，我们将需要一个第三方库。为此，我们将使用内置命令创建一个\
    \ Crystal 项目。\n\n**创建一个 Crystal 项目**\n\n要为新的 Crystal 项目创建文件布局，你可以使用 `init` 子命令。\n\
    \n```\nSuperPinkicious:crystal niko$ crystal init app mybot\n    create  mybot/.gitignore\n\
    \    create  mybot/.editorconfig\n    create  mybot/LICENSE\n    create  mybot/README.md\n\
    \    create  mybot/.travis.yml\n    create  mybot/shard.yml\n    create  mybot/src/mybot.cr\n\
    \    create  mybot/spec/spec_helper.cr\n    create  mybot/spec/mybot_spec.cr\n\
    Initialized empty Git repository in /Users/niko/APRESS/crystal/mybot/.git/\n```\n\
    \n![](img/index-61_1.jpg)\n\n![](img/index-61_2.png)\n\n第 3 章 第 3 周：Crystal\n\n\
    现在，如果你在 Visual Studio Code 中打开该文件夹并重新创建 `tasks.json` 以运行 Crystal 代码，你应该能够打开并执行（几乎为空的）`mybot.cr`\
    \ 文件（图 3-10）。\n\n***图 3-10.** 空的——真的，真的，空的——机器人*\n\n这可能不是你见过的最激动人心的程序。让我们稍微更新一下\
    \ `mybot.cr` 的代码，在文件底部添加一个打印语句。\n\n```crystal\nputs Mybot::VERSION\n```\n\n当然，你可以直接从\
    \ Visual Studio Code 执行它（图 3-11）。\n\n***图 3-11.** 打印版本*\n\n第 3 章 第 3 周：Crystal\n\
    \n你也可以使用 `run` 子命令从命令行执行。\n\n```\nSuperPinkicious:mybot niko$ crystal run src/mybot.cr\n\
    0.1.0\n```\n\n有趣的是，你也可以使用 `build` 命令将相同的代码编译成二进制文件。\n\n```\ncrystal build src/mybot.cr\n\
    ```\n\n然后，直接调用编译后的文件将执行相同的打印语句，但这次是作为二进制文件，不依赖于 Crystal 构建系统。\n\n```\n./mybot\n\
    >0.1.0\n```\n\n你用 `build` 命令编译的任何代码都会给你一个可以随意重用的可执行文件。这包括即将到来的 Telegram 机器人。太棒了。\n\
    \n现在，我们最初想要创建一个 Crystal 项目的原因是为了能够添加机器人 API 依赖项来编写 Crystal 代码。在项目文件夹中，有一个名为 `shard.yml`\
    \ 的文件。这是负责处理项目的元数据文件，类似于 Java 中的 `pom.xml` 或 `build.gradle`，或 JavaScript 中的 `package.json`\
    \ 文件。\n\n`shard.yml` 文件的内容如下所示，末尾添加了 `telegram_bot` 依赖项。\n\n```yaml\nname: mybot\n\
    version: 0.1.0\nauthors:\n  - Nicolas Modrzyk <hellonico at gmail.com>\ntargets:\n\
    \  mybot:\n    main: src/mybot.cr\n```\n\n第 3 章 第 3 周：Crystal\n\n```yaml\ncrystal:\
    \ 0.26.1\nlicense: MIT\ndependencies:\n  telegram_bot:\n    github: hangyas/telegram_bot\n\
    ```\n\n依赖项在项目的 `shard.yml` 文件中定义后，你现在可以使用 Crystal 的包管理器 `shards` 命令来检索该依赖项。\n\n\
    ```\nSuperPinkicious:mybot niko$ shards\nFetching https://github.com/hangyas/telegram_bot.git\n\
    Installing telegram_bot (0.1.0 at HEAD)\n```\n\n你会注意到已经创建了一个锁文件，其中包含依赖项以及每个依赖项所引用的提交哈希。\n\
    \n```yaml\nversion: 1.0\nshards:\n  telegram_bot:\n    github: hangyas/telegram_bot\n\
    \    commit: 722bab24876d13a661f513b09c4569916f7a81c1\n```\n\n这几乎就是你编写基于 Crystal\
    \ 的 Telegram 机器人所需的全部内容，所以让我们通过一个简单的回声机器人来看看所有这些是如何运作的。\n\n第 3 章 第 3 周：Crystal\n\
    \n**回声机器人**\n\n结合你在本章和上一章中看到的所有内容，接下来的代码应该不难阅读。我们首先在构造函数 `initialize` 函数中设置机器人的名称和秘密的\
    \ Telegram API 密钥。然后我们继续实现 `handle` 函数，该函数接收一个消息作为参数，并使用传入消息中读取的文本进行回复。最后，我们创建一个新的机器人，并将其连接定义为轮询。\n\
    \n```crystal\nrequire \"telegram_bot\"\n\nclass EchoBot < TelegramBot::Bot\n \
    \ def initialize\n    super(\"MyBot\", File.read(\"secret.key\"))\n  end\n\n \
    \ def handle(message : TelegramBot::Message)\n    if text = message.text\n   \
    \   reply message, text\n    end\n  end\nend\n\nEchoBot.new.polling\n```\n\n然后我们再次使用\
    \ Command(Ctrl)+Shift+B 快捷键执行机器人（图 3-12）。\n\n![](img/index-65_1.jpg)\n\n第 3 章\
    \ 第 3 周：Crystal\n\n***图 3-12.** 启动机器人*\n\n回到与这个新机器人的聊天。你可以确认找到了一只漂亮的鹦鹉，无论你说什么，它都会重复（图\
    \ 3-13）。\n\n![](img/index-66_1.jpg)\n\n第 3 章 第 3 周：Crystal\n\n***图 3-13.** echo,\
    \ echo, hello, hello*\n\n那是一个简单的机器人。让我们继续做一些更令人兴奋的事情，使用命令机器人。\n\n**命令机器人**\n\n\
    Telegram 理解命令的概念。简单地说，命令就是发送给机器人的一条消息。然而，我们知道，它接受一系列参数，这有助于我们编写更易读的代码，而无需对消息进行复杂的解析。\n\
    \n当收到一条传入消息时，机器人会首先尝试为其找到一个已实现的命令。如果没有找到，它将使用标准的 `handle` 函数。\n\n第 3 章 第 3 周：Crystal\n\
    \n我们的第一个机器人将实现一个 `hello` 命令，该命令不接受参数，只回复消息，就像 `handle` 函数会做的那样。\n\n代码如下：\n\n```crystal\n\
    require \"telegram_bot\"\n\nclass CommandOneBot < TelegramBot::Bot\n  include\
    \ TelegramBot::CmdHandler\n\n  def initialize\n    super(\"MyBot\", File.read(\"\
    secret.key\"))\n    cmd \"hello\" do |msg|\n      send_message msg.chat.id, \"\
    world\"\n    end\n  end\nend\n\nmy_bot = CommandOneBot.new\nmy_bot.polling\n```\n\
    \n与你目前看到的代码的唯一区别是 `cmd` 块。该块接受一个字符串作为标识符，在其最简单的形式中，消息作为块的参数。从聊天中发送命令只需要一个前缀和发送给机器人的命令名称（图\
    \ 3-14）。\n\n![](img/index-68_1.png)\n\n第 3 章 第 3 周：Crystal\n\n***图 3-14.** hello\
    \ 命令*\n\n现在，进入我们的第二个机器人。第二个机器人将使用传递给命令的参数来发送图像作为回复。\n\n这次，我们将使用 `send_photo` 而不是\
    \ `send_message`，根据参数将图像发送回聊天。\n\n```crystal\nrequire \"telegram_bot\"\n\nclass\
    \ CommandOneBot < TelegramBot::Bot\n  include TelegramBot::CmdHandler\n\n  def\
    \ initialize\n    super(\"MyBot\", File.read(\"secret.key\"))\n    cmd \"animals\"\
    \ do |msg, params|\n        send_photo msg.chat.id, File.new(\"#{params[0]}.jpg\"\
    )\n    end\n  end\nend\n\nmy_bot = CommandOneBot.new\nmy_bot.polling\n```\n\n\
    现在，假设你的项目文件夹中有一些与动物名称匹配的图片，`/animals` 命令将获取图像文件并将其发送回聊天室（图 3-15）。\n\n![](img/index-69_1.jpg)\n\
    \n第 3 章 第 3 周：Crystal\n\n***图 3-15.** /animals 很可爱！*\n\n现在，你可以尝试一些不同的命令，使用其他机器人\
    \ API 功能。\n\nCrystal 的 `telegram_bot` 实现了大部分 Telegram 机器人 API，以下是可用于向聊天发送消息和媒体类型的不同函数列表。\n\
    \n• `send_message`\n• `send_photo`\n\n第 3 章 第 3 周：Crystal\n\n• `send_audio`\n\
    • `send_document`\n• `send_sticker`\n• `send_video`\n• `send_voice`\n• `send_video_note`\n\
    • `send_media_group`\n• `send_location`\n• `send_venue`\n• `send_contact`\n• `send_chat_action`\n\
    • `send_game`\n• `send_invoice`\n\n但是，你必须等到下周，才能看到内联消息的实际应用。\n\n**第 4 章**\n\n\
    **第 4 周：Rust**\n\n*没有一项旨在改变世界的伟大运动能够承受被嘲笑或贬低。嘲弄是一种锈蚀，会腐蚀它所触及的一切。*\n\n—米兰·昆德拉\n\
    \n如果你还没有听说过 Rust 编程语言，我认为你应该了解一下。Rust 在 2016、2017 和 2018 年的 [Stack Overflow 开发者调查](https://en.wikipedia.org/wiki/Stack_Overflow)中获得了“最受喜爱的编程语言”第一名。\n\
    \n正如 Rust 网站 ([www.rust-lang.org](http://www.rust-lang.org)) 所指出的，该语言具有一长串优点，例如：\n\
    \n• 零成本抽象\n• 移动语义\n• 保证内存安全\n• 无数据竞争的线程\n• 基于 trait 的泛型\n• 模式匹配\n• 类型推断\n• 最小运行时\n\
    • 高效的 C 绑定\n\n© Nicolas Modrzyk 2019\nN. Modrzyk, *构建 Telegram 机器人*, `doi.org/10.1007/978-1-4842-4197-4_4`\n\
    \n第 4 章 第 4 周：Rust\n\nRust 由 Mozilla 赞助，但不仅仅由一家公司支持，它还有一个非常支持和活跃的社区共同编写。Rust 非常关注健壮的线程环境和相关的内存安全问题。这些特别适合解决与为机器人开发并发端点相关的问题，本章将对此进行探讨。\n\
    \n**Rust 安装和第一步**\n\nRust 在你的本地机器上使用 `rustup` 进行维护和管理。是的，这是一个特定于 Rust 的环境管理器。它类似于\
    \ Ruby Version Manager (RVM)，但完全是 Rust 工具链的一部分，而不是第三方团队，所以感觉非常集成。\n\n**安装**\n\n\
    以下两个链接是获取 `rustup` 并在你的机器上安装 Rust 的入口点：\n\nwww.rust-lang.org/en-US/install.html\n\
    www.rust-lang.org/en-US/other-installers.html\n\n根据你使用的是 macOS/Linux（图 4-1）还是\
    \ Windows（图 4-2），你会看到不同的页面，但安装过程非常相似。\n\n![](img/index-73_1.png)\n\n![](img/index-73_2.jpg)\n\
    \n第 4 章 第 4 周：Rust\n\n***图 4-1.** OSX/Linux 上的安装框*\n\n***图 4-2.** Windows 上的安装框*\n\
    \n在 Windows 上，你还需要一些额外的工具，例如 Microsoft C++ 构建工具（图 4-3）。\n\n![](img/index-74_1.jpg)\n\
    \n![](img/index-74_2.png)\n\n第 4 章 第 4 周：Rust\n\n***图 4-3.** Windows 上需要 C++ 工具*\n\
    \n如控制台输出所示，Microsoft 构建工具可以在以下网站上找到：[`aka.ms/buildtools`](https://aka.ms/buildtools)。你可以通过下载链接下载并安装（图\
    \ 4-4 和图 4-5）。\n\n***图 4-4.** Visual Studio 的构建工具*\n\n![](img/index-75_1.png)\n\
    \n第 4 章 第 4 周：Rust\n\n***图 4-5.** 安装构建工具*\n\nRust 有一个快速的六周更新周期，所以当你读到这篇文章时，版本会有所不同，但在撰写本文时，这是通过\
    \ `rustup show` 命令获得的 Rust 当前版本：\n\n```\nSuperPinkicious:rust-01 niko$ rustup\
    \ show\nDefault host: x86_64-apple-darwin\nstable-x86_64-apple-darwin (default)\n\
    rustc 1.28.0 (9634041f0 2018-07-30)\n```\n\n现在让我们看看如何编译你的第一个 Rust 程序。\n\n第 4 章\
    \ 第 4 周：Rust\n\n**第一个或两个 Rust 程序**\n\n第一个 Rust 程序将打印一条简单的 Hello World 消息。这并不复杂，但它将帮助你熟悉\
    \ Rust 的编译和执行工具链。\n\n**你好 Rust**\n\n这个，我们的第一个 Rust 程序：\n\n• 使用 `fn` 声明一个 `main`\
    \ 函数\n• 使用 `println!` 函数（注意感叹号）打印到标准输出\n• 语句以分号 (`;`) 结束\n\n这给你提供了以下简单而简短的代码片段：\n\
    \n```rust\nfn main() {\n    println!(\"Hello World!\");\n}\n```\n\n你可以将代码片段保存在一个文件中，例如命名为\
    \ `first.rs`。\n\n顺便提一下，如果你在 Visual Studio Code 中键入上述代码片段，编辑器会识别出 `rs` 文件扩展名，并会要求你安装一个相关的插件来处理\
    \ `rs` 文件（图 4-6）。\n\n![](img/index-77_1.jpg)\n\n第 4 章 第 4 周：Rust\n\n***图 4-6.**\
