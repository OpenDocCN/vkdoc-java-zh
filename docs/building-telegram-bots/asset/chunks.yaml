    ** Multiple Cargo Targets**


    You may have noticed that each of the commands run is taking the main.rs file
    as the default input. For some time, I have been looking for a way to run different
    files, and you actually cannot pass a file directly to cargo. In 70


    Chapter 4   Week 4: rust


    the Cargo.toml file, you must define what is known as a binary target. This is
    done by defining a block in the .toml file, using [[bin]].


    At a minimum, the block takes a name and a path, so let’s define two binary targets,
    one with the existing main.rs file and another with a new Rust source code file: main2.rs.


    [[bin]]


    name = "main1"


    path = "src/main.rs"


    [[bin]]


    name = "main2"


    path = "src/main2.rs"


    For the purpose of multiple targets, we will keep the main2.rs source code ultra-minimal
    here, only outputting the current date in the UTC time zone, but, of course, it
    could be as complicated as you can code it.


    extern crate chrono;


    use chrono::prelude::*;


    fn main() {


        let utc: DateTime<Utc> = Utc::now();


        println!("{}", utc);


    }


