    **引言**\n\n*有一百种方法可以做十几件事，为什么不都试试呢？*\n\n[—Julian Casablancas](https://www.goodreads.com/author/show/16643925.Napz_Cherub_Pellazo)\n\
    \n你有没有想过，如何通过做更少的事情来完成更多的事情，如何拥有一个替身，在你享受凉爽的海滩或与可爱的孩子共度更多户外时光时，替你完成所有工作？我一直都在想。\n\
    \n我是 Telegram 聊天平台的忠实粉丝。我们称它为一个平台，因为它不仅仅是一个简单的聊天服务，让你与最重要的人保持联系。它还能让你以以前从未有过的方式思考。\n\
    \n例如，住在东京，你总是关心最后一班回家的火车什么时候发车。我想全球大城市的多数人可能都有同样的担忧。不经常看表可能会导致一次糟糕和/或昂贵的出租车之旅，所以我开始想要一些能自动为我提供一系列回家选择的东西。\n\
    \n我写的第一个机器人是告诉我最后几班回家的火车时刻表以及不同的选择，从最容易赶上的到最后几班，到最晚的、我必须冲刺才能赶上的。这为我节省了不少钱。\n\n\
    我写的第二个机器人稍微偏向物联网。它使用网络摄像头，通过 Telegram 向我发送按门铃的人的照片。\n\n第三个，我还记得，有点傻。它是用迷你投影仪显示通过\
    \ Telegram 聊天室发送的最新消息。（在家里的一个小派对上查看随机消息非常有趣。）\n\nxv\n\n引言\n\n但是，有很多事情可以尝试构建机器人——搜索机票、检查冰箱等。拥有一个机器人是一种简单的方法，可以简化你每天做的所有事情，使用同样简单的\
    \ Telegram 聊天室来获取与日常生活相关问题的答案，或发出命令并征服世界。\n\n这本相对简短的书是关于学习如何用几种不同的编程语言编写 Telegram\
    \ 机器人。你可能会问，为什么不用一种语言并坚持使用它呢？嗯，因为没有一个答案能回答所有问题，对别人正确的东西可能不适合你。探索不同的编程语言也是一种有趣的方式，可以在执行相同任务的同时检查每种语言的优势。每个\
    \ Telegram 概念都可以一个接一个地、以简单的方式引入。\n\n或者，你也可以直接跳进去，选择你想尝试的语言，并立即开始。有些人希望它发生；有些人希望它会实现；而另一些人则让它发生。所以，享受阅读这本书，并让它发生吧。\n\
    \nxvi\n\n**第 1 章**\n\n**第 1 周：Ruby**\n\n*正念星期一 人类，愿你们的咖啡在现实到来之前发挥作用。*\n\n[—Napz\
    \ Cherub Pellazo](https://www.goodreads.com/author/show/16643925.Napz_Cherub_Pellazo)\n\
    \nRuby 曾因其代码的易用性和简洁性而风靡全球。大多数程序员对 Ruby 情有独钟，当他们的 shell 脚本和日常生活变得过于混乱时，他们通常会很快转向\
    \ Ruby。\n\n第一章有点特别，因为除了为我们的机器人创建客户端之外，我还必须向你介绍如何创建机器人本身。在整本书中，这个第一个机器人将被随意重用，当然，制作它所使用的相同步骤也可以用来创建一支机器人军队并征服世界！\n\
    \n**与 BotFather 聊天**\n\n要注册你自己的 Telegram 机器人，你必须与所有机器人的父亲交谈。这个机器人父亲有一个名字，BotFather；叫\
    \ Brad 或 Vladimir 都不行。你可以通过 Telegram 上的 @BotFather 联系到他。\n\nBotFather 不睡觉，可以在一天中的任何时间联系到。BotFather\
    \ 会洗澡，并且总是看起来精神焕发。这是我们拥有的这位英俊机器人的最新头像（图 1-1）。\n\n© Nicolas Modrzyk 2019\nN. Modrzyk,\
    \ *构建 Telegram 机器人*, `doi.org/10.1007/978-1-4842-4197-4_1`\n\n![](img/index-16_1.jpg)\n\
    \n![](img/index-16_2.jpg)\n\n第 1 章 第 1 周：Ruby\n\n***图 1-1.** BotFather 的最新头像*\n\
    \n找到 BotFather 并不难；你只需在 Telegram 联系人列表的搜索框中输入他的名字“@BotFather”（图 1-2）。\n\n***图\
    \ 1-2.** 寻找 BotFather*\n\n![](img/index-17_1.jpg)\n\n第 1 章 第 1 周：Ruby\n\n在上面的列表中，名字是底部的那个。接下来，点击它，与\
    \ BotFather 开始一个新的聊天。\n\n一旦聊天开始，我们英俊的机器人也会欢迎你，并附上关于 API、免费帮助的亲切消息，以及开始聊天的邀请（图\
    \ 1-3）。\n\n***图 1-3.** 准备好了吗？*\n\n一旦聊天开始（通过按下你可以在底部看到的“开始”按钮），BotFather 会欢迎你，并提供一系列关于如何创建或编辑你的机器人列表的选项（图\
    \ 1-4）。\n\n![](img/index-18_1.jpg)\n\n第 1 章 第 1 周：Ruby\n\n***图 1-4.** 向 BotFather\
    \ 问好*\n\n![](img/index-19_1.jpg)\n\n第 1 章 第 1 周：Ruby\n\n太好了！我现在不会回顾完整的选项列表，而是直接开始创建我们的新机器人。这里通过输入\
    \ `/newbot` 命令，然后按照一个简单的对话进行，如图 1-5 所示。\n\n***图 1-5.** 请求 BotFather，请，请，创建一个新机器人*\n\
    \n你的机器人现在可以使用了。你能看到红色的类似秘密代码的东西吗？这是机器人令牌，它是一个字符串，将用于在 Telegram 平台上唯一标识和验证你的机器人。**不要泄露这个令牌**。不要把它写在书里，也不要让它挂在\
    \ GitHub 上的某个地方，尤其是现在微软拥有它之后。\n\n![](img/index-20_1.jpg)\n\n第 1 章 第 1 周：Ruby\n\
    \n在我们的例子中，在上面的聊天中，生成并给我们的令牌如下：\n\n624028896:AAFGfIXp3FEPtX1_S2zmHodHRNpu_wD1acA\n\
    \n如果你的令牌（像这个一样）曾经被泄露，你可以使用 `/token` 命令与机器人父亲对话，以生成一个新令牌，如图 1-6 中的对话所示。\n\n***图\
    \ 1-6.** 聊天以生成新令牌*\n\n好了，我们的 Telegram 机器人注册全部完成了。那么，让我们切换到一点 Ruby 编码吧。\n\n![](img/index-21_1.png)\n\
    \n第 1 章 第 1 周：Ruby\n\n**设置 Ruby**\n\n在大多数类 Unix 平台上，包括 OS X，Ruby 已经安装，或者可以使用包管理器安装。对于那些运行不太主流的操作系统（如\
    \ Windows）的用户，你可以从 Ruby 下载页面 [www.ruby-lang.org/en/downloads/](http://www.ruby-lang.org/en/downloads/)\
    \ 下载并安装 Ruby 安装程序（图 1-7）。下载最新版本。\n\n***图 1-7.** 寻找 Windows Ruby 安装程序*\n\n安装完成后，如果你打开一个终端（在\
    \ macOS 上）或 Windows 上的命令提示符（图 1-8），并且可以输入以下命令而不出错，那么你就准备好了：\n\nruby -v\ngem -v\n\
    \n![](img/index-22_1.jpg)\n\n第 1 章 第 1 周：Ruby\n\n***图 1-8.** 检查 ruby 和 gem 版本*\n\
    \n如果你以前从未使用过 Ruby，你可能想知道 `gem` 可执行文件是什么？它只是一个 Ruby 特定的库安装程序（就像 `npm` 用于 Node，`pip`\
    \ 用于 Python），所以当你需要一些别人编写的开源库时，你会使用 `gem` 将它下载到你的机器上，并使用 `ruby` 可执行文件来运行它。\n\n\
    除了 Ruby，为了在记事本之外获得一些编码乐趣，你还需要一个文本编辑器，所以我建议使用微软的 Visual Studio Code ([`code.visualstudio.com/`](https://code.visualstudio.com/))，当然，任何你喜欢的文本编辑器都可以。\n\
    \n好了，让我们开始编码我们的第一个机器人吧。\n\n**你的第一个 Telegram 机器人**\n\n为了与我们的第一个机器人对话，我们将使用名为 `telegram_bot`\
    \ 的 Ruby 库。你可以在 RubyGems ([`rubygems.org/`](https://rubygems.org/)) 上找到其他一些著名的库，但我发现这个库是一个容易上手和开始的库，我希望你最终也会同意我的看法。\n\
    \n实际上，你可以自己查看，并通过查询 RubyGems 网站（图 1-9）找到你最喜欢的 Telegram 库。\n\n![](img/index-23_1.png)\n\
    \n第 1 章 第 1 周：Ruby\n\n***图 1-9.** 寻找 gems*\n\n要在 Ruby 中使用一个库，你首先在你的机器上安装它，使其对你的计算机可用，使用\
    \ `gem install` 命令，然后在你的 Ruby 代码中，使用 `require` 函数，使该库对你的 Ruby 程序可用。\n\n让我们为这第一个机器人创建一个新文件夹。更改目录，然后使用\
    \ `gem` 安装 Telegram 库，如下所示：\n\nmkdir chapter-01\ncd chapter-01\ngem install telegram_bot\n\
    \n第 1 章 第 1 周：Ruby\n\n在终端中，输出应该类似于这样：\n\nSuperPinkicious:chapter-01 niko$ gem\
    \ install telegram_bot\nSuccessfully installed telegram_bot-0.0.8\nParsing documentation\
    \ for telegram_bot-0.0.8\nDone installing documentation for telegram_bot after\
    \ 0 seconds\n1 gem installed\n\n`gem` 现在已安装，并准备好在你的代码中使用。\n\n现在，你将编写一些代码来唤醒你的机器人并使其活跃起来。在该文件夹的一个新文件中，你可以将其命名为\
    \ `step0.rb`，让我们编写以下 Ruby 代码行：\n\n```ruby\nrequire 'telegram_bot'\n\nbot = TelegramBot.new(token:\
    \ ENV['BOT_TOKEN'])\n\nbot.get_updates() do |message|\n    puts message.to_s\n\
    end\n```\n\n这段代码的作用是：\n\n• 使通过 `gem` 安装的 `telegram_bot` 库对你的程序可用。\n• 创建一个新的 Ruby\
    \ 机器人对象，使用通过外部变量暴露的 Telegram 令牌。这通常是共享你的机器人代码而不将机器人令牌泄露给所有人的推荐方式。\n• 实例化机器人实例，以监听传入消息，使用机器人对象的\
    \ `get_updates()` 方法。\n• 确保现在每当有消息发送给机器人时，机器人都会将其打印到控制台。\n\n![](img/index-25_1.png)\n\
    \n第 1 章 第 1 周：Ruby\n\n要在你的机器上运行上面编写的程序，你将程序文件名 `step0.rb` 传递给 `ruby` 可执行文件。让我们来做吧。\n\
    \n在终端中，执行以下命令：\n\n```bash\nruby step0.rb\n```\n\n观察输出（图 1-10）。\n\n***图 1-10.**\
    \ 有时，它就是不行*\n\n哎呀！进展不太顺利。我们忘记将 Telegram 令牌传递给我们的程序了。\n\n这可以在 Linux 或 OS X 上通过以下方式完成：\n\
    \n```bash\nexport BOT_TOKEN='585672177:AAHswpmdA2zP52ZWoJMdteGa0xQ8KeynWvE'\n\
    ```\n\n在 Windows 上通过以下方式完成：\n\n```bash\nset BOT_TOKEN=585672177:AAHswpmdA2zP52ZWoJMdteGa0xQ8KeynWvE\n\
    ```\n\n让我们再次运行程序。这次，看起来命令没有结束……这是意料之中的，因为机器人现在实际上正在等待消息。\n\n让我们成为开始对话的人，所以让我们发送一条问候消息。\n\
    \n在 Telegram 窗口中，搜索机器人并开始聊天（图 1-11）。\n\n![](img/index-26_1.png)\n\n![](img/index-26_2.jpg)\n\
    \n第 1 章 第 1 周：Ruby\n\n***图 1-11.** 发送给我们机器人的第一条消息*\n\n通过按下那个“开始”按钮，机器人已经收到了一条消息（图\
    \ 1-12）！\n\n***图 1-12.** 来自我们机器人的第一条消息！*\n\n嗯，这不太可读。使用 Ruby，你可以通过使用 `to_yaml`\
    \ 函数来显示任何对象的更易读的版本。让我们更新代码，看看会发生什么。\n\n我们调用 `require 'yaml'` 将其导入 Ruby 命名空间，现在我们可以对机器人收到的消息调用\
    \ `to_yaml`。\n\n```ruby\nrequire 'telegram_bot'\nrequire 'yaml'\n\nbot = TelegramBot.new(token:\
    \ ENV['BOT_TOKEN'])\n```\n\n![](img/index-27_1.png)\n\n第 1 章 第 1 周：Ruby\n\n```ruby\n\
    bot.get_updates() do |message|\n    # puts message.to_s\n    puts message.to_yaml\n\
    end\n```\n\n你需要先按 Ctrl-C 终止正在运行的机器人版本，然后通过再次执行 `ruby` 命令来启动新机器人。图 1-13 显示了结果。\n\
    \n***图 1-13.** 你好吗？*\n\n在控制台或启动机器人的终端中，你现在可以看到收到的消息的更详细版本。\n\n```\nSuperPinkicious:chapter-01\
    \ niko$ ruby step0.rb\n--- !ruby/object:TelegramBot::Message\nmessage_id: 191\n\
    from: !ruby/object:TelegramBot::User\n  id: 121843071\n  first_name: Nico\n  last_name:\
    \ Nico\n  username: hellonico\nchat: !ruby/object:TelegramBot::Channel\n  id:\
    \ 121843071\n  username: hellonico\n  title:\ndate: !ruby/object:DateTime 2018-08-31\
    \ 07:42:26.000000000 Z\ntext: how are you?\nreply_to_message:\n```\n\n第 1 章 第\
    \ 1 周：Ruby\n\n实际上，无论使用哪种编程语言，这种消息格式都将非常一致，因此查看消息字段是个好主意。\n\n**理解接收到的消息字段**\n\n\
    表 1-1 简要解释了我们刚刚通过 Telegram 机器人接收到的字段。\n\n***表 1-1.** 从 Telegram 机器人接收到的字段*\n\n\
    | **字段** | **示例值** | **解释** |\n| :--- | :--- | :--- |\n| message_id | 191 | 机器人消息的唯一标识符\
    \ |\n| from | !ruby/object:TelegramBot::User | 发送消息的用户 |\n| chat | !ruby/object:TelegramBot::Channel\
    \ | 聊天/频道信息 |\n| date | !ruby/object:DateTime 2018-08-31 07:42:26.000000000 Z\
    \ | 消息发送的时间 |\n| text | how are you? | 消息的文本 |\n| reply_to_message | <empty> |\
    \ 此消息所回复的消息 |\n\n对于标准消息，除了你对聊天消息对象的预期之外，没有太多其他内容。你可能大部分时间会使用 `date`、`text` 和 `from`\
    \ 字段。\n\n![](img/index-29_1.jpg)\n\n第 1 章 第 1 周：Ruby\n\n**首次回复**\n\n再次，Ruby 的简洁性使得从对象创建字符串变得非常容易。通过以下方式，你可以直接在字符串中使用可执行代码块：`#{}`。\n\
    \n这使得它对于模板化消息非常强大，在我们的例子中，对于机器人编程也是如此。在 `get_updates()` 调用块中，让我们现在编写并发送一个回复。\n\
    \n```ruby\n    message.reply do |reply|\n        reply.text = \"Hello, #{message.from.first_name}!\"\
    \n        reply.send_with(bot)\n    end\n```\n\n重启机器人后（Ctrl-C，`ruby step0.rb`），我们可以启动这个\
    \ Ruby 机器人的一个更健谈的版本（图 1-14）。\n\n***图 1-14.** 你好，Nico！*\n\n这运行得非常顺利，我很高兴地宣布，你已经进入了这个机器人大师课程的第二级。\n\
    \n第 1 章 第 1 周：Ruby\n\n你在第一章中学到了很多东西，其中包括：\n\n• 如何向机器人父亲注册一个机器人\n• 如何在我们的程序中使用机器人令牌\n\
    • 启动机器人并监听消息\n• 查看传入消息的字段\n• 回复传入消息\n\n下周，我们将在下一章中使用不同的编程语言，在这些相同概念的基础上进行构建。\n\
    \n**第 2 章**\n\n**第 2 周：Nim**\n\n*[Jenner: 我学到了这么多：能拿的时候就拿，能拿多少拿多少。]*\n\n*[Justin:\
    \ 那你什么也没学到。]*\n\n—《NIMH 的秘密》\n\n在过去的两年里，Nim 一直在我采用的编程语言列表中。在视觉上，它看起来和感觉上非常像 Python，但它也可以编译成二进制文件，通过\
    \ C、C++、Objective-C 甚至 JavaScript。我见过编译后的 Nim 二进制程序运行得*非常*快，我真的希望 Nim 能够达到下一个采用水平。\n\
    \n今天，我们将专注于构建机器人，作为二进制文件运行，用 Nim 构建。当然，我们将从在你的本地机器上设置 Nim 环境开始。\n\n**安装 Nim**\n\
