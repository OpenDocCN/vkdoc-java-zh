    ** Going Visual Studio Code Again**


    You are going to write a small program fetching URLs of GitHub projects, based
    on a GitHub search query. The data returned from an HTTP request to GitHub would
    be in JSON format, so we will have to decode that too, using some JSON parsing.


    In a new file, requesting.cr, let’s write the code that will send the request
    and display it in the console.


    require "http/client"


    require "json"


    ![](index-56_1.jpg)


    Chapter 3   Week 3: Crystal


    def search_github(q : String)


      url = "https://api.github.com/search/repositories?q=#{q}"


      HTTP::Client.get(url) do |response|


        res = response.body_io.gets.to_s


        json = JSON.parse(res)


        json["items"][0]["url"]


      end


    end


    puts search_github("dog")


    As you can appreciate, the syntax is really, really close to Ruby. Also, note
    the optional typing of the parameter(s), q : String.


    The HTTP client and the JSON parser are part of the core language, and thus, no
    third-party library is required to run the snippet.


