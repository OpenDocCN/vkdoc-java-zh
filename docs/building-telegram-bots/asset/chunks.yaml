    If you have never used Ruby before, you may be wondering what the 


    gem executable is? It’s simply a Ruby-specific installer for libraries (just like
    npm is for Node and pip is for Python), so when you require some open source library
    that has been written by someone else, you would use gem to get it on your machine
    and the ruby executable to run it.


    Apart from Ruby, to have some coding fun outside Notepad, you also need a text
    editor, so I propose to use Microsoft’s Visual Studio Code ([https://code.visualstudio.com/](https://code.visualstudio.com/)),
    but, of course, any of your favorite text editors will do.


    Alright, let’s get started and code our first bot.


    ** Your First Telegram Bot**


    To get to talk to our first bot, we will use the Ruby library named telegram_bot.
    There are a few other famous libraries that you can find on RubyGems ([https://rubygems.org/](https://rubygems.org/)),
    but I find this library to be an easy one to start and get going with, and I hope
    you come to agree with me about this in time.


    Actually, you can check for yourself and find your favorite Telegram library,
    by querying the RubyGems web site (Figur[e 1-9).](#index_split_000.html#p23)


    ![](index-23_1.png)


    Chapter 1   Week 1: ruby


    ***Figure 1-9.  **Looking for gems*


    To use a library in Ruby, you install it on your machine first, to make it available
    to your computer, by using the gem install command, and then in your Ruby code,
    you use the *require* function, to make that library available to your Ruby program.


    Let’s create a new folder for this first bot. Change the directory and then install
    the Telegram library with gem, as shown following:


    mkdir chapter-01


    cd chapter-01


    gem install telegram_bot


    Chapter 1   Week 1: ruby


    At the terminal, the output should be something similar to this:


    SuperPinkicious:chapter-01 niko$ gem install telegram_bot


    Successfully installed telegram_bot-0.0.8


    Parsing documentation for telegram_bot-0.0.8


    Done installing documentation for telegram_bot after 0 seconds


    1 gem installed


    The gem is now installed and ready to be used in your code.


    Now, you are going to write some code to wake up your bot and make it come alive.
    In a new file in that folder, which you can name step0.rb, for example, let’s
    write the following lines of Ruby code:


    require ''telegram_bot''


    bot = TelegramBot.new(token: ENV[''BOT_TOKEN''])


    bot.get_updates() do |message|


        puts message.to_s


    end


    What that code does is


    •  Make the telegram_bot library, installed via gem, 


    available to your program


    •  Create a new Ruby bot object, using the Telegram 


    token exposed via an external variable. This is usually 


    the recommended way to share your bot code without 


    giving your bot token to everyone.


    •  Get the bot instance instantiated, to listen for incoming 


    messages, using the bot object get_updates() method


    •  Ensure that, now, whenever a message is sent to the 


    bot, the bot will print it on the console


