    ** Command  Bot**


    Telegram understands the notion of commands. To put it simply, a 


    command is a message to a bot. We know, however, that this accepts a bunch of
    parameters, and this helps us to write code that is easier to read, without the
    need for complex parsing of the message.


    When it’s an incoming message, the bot will try to find an 


    implemented command for it first. If none is found, it will use the standard handle function.


    Chapter 3   Week 3: Crystal


    Our first bot will implement a hello command, which takes no 


    parameter, and just reply to the message, as the handle function would have done.


    The code is the following:


    require "telegram_bot"


    class CommandOneBot < TelegramBot::Bot


      include TelegramBot::CmdHandler


      def initialize


        super("MyBot", File.read("secret.key"))


        cmd "hello" do |msg|


          send_message msg.chat.id, "world"


        end


      end


    end


    my_bot = CommandOneBot.new


    my_bot.polling


    The only difference with the code you have seen up to now is the cmd block. The
    block takes a string for identifier, and its simplest form, the message, as parameter
    of the block. Sending a command from the chat simply requires a prefix and the
    name of the command sent to the bot (Figure [3-14).](#index_split_000.html#p68)


    ![](index-68_1.png)


    Chapter 3   Week 3: Crystal


    ***Figure 3-14.  **hello command*


    Now, on to our second bot. The second bot is going to use the 


    parameters passed to the command to send an image as a reply.


    This time, instead of using send_message, we’ll use send_photo, to send an image
    back to the chat, depending on the parameter.


    require "telegram_bot"


    class CommandOneBot < TelegramBot::Bot


      include TelegramBot::CmdHandler


      def initialize


        super("MyBot", File.read("secret.key"))


        cmd "animals" do |msg, params|


            send_photo msg.chat.id, File.new("#{params[0]}.jpg") end


      end


    end


    my_bot = CommandOneBot.new


    my_bot.polling


