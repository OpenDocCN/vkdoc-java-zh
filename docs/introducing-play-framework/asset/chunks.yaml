    ExecutorService executor = Executors. *newFixedThreadPool*(2); Future<String>
    future = executor.submit(callableTask); **boolean** listen = **true**;


    **while** (listen) {


    **if** (future.isDone()) {


    String result;


    **try** {


    result = future.get();


    listen = **false**;


    System. ***out***.println(result);


    } **catch** ( InterruptedException |


    ExecutionException e) {


    e.printStackTrace();


    }


    }


