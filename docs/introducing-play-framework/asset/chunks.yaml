    **WHAT IS TWIRL?**


    twirl is the template engine developed for play Framework. But it can also be
    used outside the play environment. By default, twirl is included as part of play
    but if there is a need to use twirl outside play, then the sbt plugin for Scala
    can be installed. For example adding the below entry in the plugins.sbt file will
    make twirl available to any sbt-based project:


    addSbtPlugin("com.typesafe.sbt" % "sbt-twirl" % "LATEST_VERSION") template files
    must be named {name}.scala.{ext} where ext can be html, js, xml, or txt. the templates
    can be used to generate various types of markup like htMl, XMl, or tXt and are
    totally decoupled from the controller. Various kinds of markup can be plugged
    in as needed.


    the twirl template is just a normal text file that contains small blocks of Scala
    code. templates help to create composite views and help in a component-based view
    generation.


    the @ character marks the beginning of the dynamic code in the template.


    Cha[pter 4](#index_split_000.html#p77) of this book provides detailed explanation
    of views and twirl templates.


    For the time being, let’s understand what is defined in the index.


    scala.html file:


    @main("Welcome to Play") {


    <h1>Welcome to Play!</h1>


    }


    @main("Welcome to Play") calls another template, main.scala.html and passes it
    the page title “Welcome to Play” and the HTML content in the second parameter,
    enclosed within the {}.


    Hence you can infer that main template file should take two parameters: a string
    for the title and HTML content as the second parameter.


    Chapter 1 GettinG Started with play 2


    Open the main.scala.html to validate this. The file starts with


    @(title: String)(content: Html); this is just like any normal method that accepts
