    **前言**


    软件开发人员需要具备许多特质才能做好他们的工作。开发人员的主要工作是创建解决业务问题的软件。客户在动态的商业环境中运营，他们需要足够快地改变他们的业务解决方案，以留住和吸引新客户。因此，快速应用程序开发是当今软件开发方法中的一个关键方面。您需要更好的框架和工具来帮助更快地开发高质量的软件。


    Play Framework 是 Web 应用程序开发中崭新且令人印象深刻的框架。通过打破现有标准，它不像大多数 Web 框架那样试图抽象 HTTP，而是与其紧密集成。


    Play Framework 是 Java Web 开发中快速应用程序编程的一场革命。它改变了 Java Web 开发的游戏规则。Java Web 开发曾经是一项繁琐、耗时的活动，有许多框架提供
    MVC 架构的优势。但几乎没有框架能够提供真正的快速应用程序开发能力。Play 改变了这一切。


    Play 是现有 Java 企业栈用于 Web 开发的一个简洁替代方案。Play 专注于开发人员生产力、可扩展性、对现代 Web 标准（仅举几例，如 REST、JSON、Web
    Sockets 和 Comet）的遵循以及效率。


    使用 Play Framework，您只需编写代码更改，然后点击浏览器刷新按钮即可测试您的更改。Play 将自动编译和部署您的更改。如果您的代码中有任何错误，Play
    会在浏览器中很好地显示它们。您不再需要扫描冗长的 xv


    前


