    Go to http://localhost:9000/ to the see the changes. But wait, if you go to http://localhost:9000/hello,
    the display shows the white background! Why?


    The reason is your style sheet definitions and all site-wide settings are defined
    in the main.scala.html template but you never used it in the hello.scala.html
    file. Let’s fix that.


    Edit the hello.scala.html and replace its contents as follows:


    @(message: String)


    @main("Hello World") {


    <h2>@message</h2>


    }


    Chapter 1 GettinG Started with play 2


    You want a common theme across the web application and all pages should inherit
    the site wide settings as is. You don’t want to scatter the site-wide definitions
    across all pages, so put all common settings like header, footer, style sheet
    definitions, JavaScript inclusions, etc. in a single file; that is what main.scala.html
    is used for. It defines the common elements applicable to all pages.


    The main.scala.html file is converted by Play into a method equivalent and can
    be invoked from other pages using its name. The name doesn’t include the .scala.html
    part. For instance, main.scala.html is invoked using its name, main. The hello.scala.html
    file calls the main.


    scala.html as a method call and reuses the common definitions. Let’s examine the
    contents of the hello.scala.html file in detail to understand what is going on.


    The hello.scala.html file is very simple. It just invokes main.scala.


    html and passes it two arguments: the title of the page as a string and the HTML
    content to be included. The first argument to main is the string


    “Hello World” and the second argument is the content within {}. In short, you
    pass the title and the HTML content defined in hello.scala.html (the content within
    {}) to main.scala.html.


    Now you have a common theme across all of your pages. Any other page you may define
    should follow the same approach. If you want to include a JavaScript library like
    JQuery or bootstrap to all pages, just define it in main.scala.html and it will
    be available to all pages, if it follows the approach mentioned above.


