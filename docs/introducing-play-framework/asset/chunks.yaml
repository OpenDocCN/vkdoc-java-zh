    \ not familiar with Entity Manager, read the next paragraph.\n\n## Chapter 7:\
    \ Accessing Databases\n\nEntity Manager is part of JPA and it is used to interact\
    \ with the persistence context to maintain the conversational state. In short,\
    \ it is the interface we will use to create, remove, update, or find entities\
    \ when using JPA. It is closely related to the session concept found in Hibernate.\n\
    \nIf you want to know more about the latest things in JPA, you can download the\
    \ specification at [https://download.oracle.com/otn-pub/jcp/persistence-2_1-fr-eval-spec/JavaPersistence.pdf](https://download.oracle.com/otn-pub/jcp/persistence-2_1-fr-eval-spec/JavaPersistence.pdf).\n\
    \nYour model class should not directly perform JPA or JDBC operations.\n\nLet’s\
    \ go ahead and create the repository classes. Before that, you need to create\
    \ an entity named `Review` that models the real-world review comment by a user\
    \ regarding a book.\n\n```\npackage model;\n\nimport javax.persistence.*;\n\n\
    public class Review {\n  @Id\n  @GeneratedValue(strategy = GenerationType.AUTO)\n\
    \  public Long id;\n  public String comment;\n\n  public Long getId() {\n    return\
    \ id;\n  }\n\n  public void setId(Long id) {\n    this.id = id;\n  }\n\n  public\
    \ String getComment() {\n    return comment;\n  }\n\n  public void setComment(String\
    \ comment) {\n    this.comment = comment;\n  }\n\n  public String getUserId()\
    \ {\n    return userId;\n  }\n\n  public void setUserId(String userId) {\n   \
    \ this.userId = userId;\n  }\n\n  public String getBookId() {\n    return bookId;\n\
    \  }\n\n  public void setBookId(String bookId) {\n    this.bookId = bookId;\n\
    \  }\n\n  public String userId;\n  public String bookId;\n}\n```\n\nNext, create\
    \ an interface for abstracting the review operations (`ReviewRepository.java`):\n\
    \n```\npackage dao;\n\nimport com.google.inject.ImplementedBy;\nimport model.Review;\n\
    import java.util.concurrent.CompletionStage;\nimport java.util.stream.Stream;\n\
    \n@ImplementedBy(JPAReviewRepository.class)\npublic interface ReviewRepository\
    \ {\n  CompletionStage<String> saveReview(Review review);\n}\n```\n\nThe `ReviewRepository`\
    \ interface hides the JPA implementation details from the model classes.\n\n##\
    \ Chapter 7: Accessing Databases\n\nGo ahead and create the implementation of\
    \ this interface (`JPAReviewRepository.java`):\n\n```\npackage dao;\n\nimport\
    \ models.Review;\nimport play.db.jpa.JPAApi;\nimport javax.inject.Inject;\nimport\
    \ javax.inject.Singleton;\nimport java.util.concurrent.CompletableFuture;\nimport\
    \ java.util.concurrent.CompletionStage;\nimport static java.util.concurrent.CompletableFuture.supplyAsync;\n\
    \n@Singleton\npublic class JPAReviewRepository implements ReviewRepository {\n\
    \  private JPAApi jpaApi;\n  private DatabaseExecutionContext executionContext;\n\
    \n  @Inject\n  public JPAReviewRepository(JPAApi api,\n                      \
    \       DatabaseExecutionContext executionContext) {\n    this.jpaApi = api;\n\
    \    this.executionContext = executionContext;\n  }\n\n  @Override\n  public CompletionStage<String>\
    \ saveReview(Review review) {\n    return CompletableFuture.supplyAsync(\n   \
    \   () -> {\n        // lambda is an instance of\n        // Function<EntityManager,\
    \ Long>\n        return jpaApi.withTransaction(\n          entityManager -> {\n\
    \            entityManager.persist(review);\n            return \"saved\";\n \
    \         });\n      },\n      executionContext);\n  }\n}\n```\n\nJPA calls should\
    \ be made inside a transaction, so you use the `jpaApi.withTransaction` method\
    \ to execute the persistence operation of saving the `Review` entity.\n\n## Using\
    \ Ebean in Play\n\nMy experience in using Ebean with Play is quite satisfactory.\
    \ It offers easy to use APIs and is much simpler in terms of architecture.\n\n\
    An architecture using `EntityManager` brings with it the concept of attached and\
    \ detached entities. The entity state is persisted only when it is attached with\
    \ an `EntityManager`. This also means if the conversation needs to be maintained\
    \ across multiple transactions, the `EntityManager` needs to be managed by another\
    \ object like an EJB Session bean. The same `EntityManager` instance is used across\
    \ transactions to maintain a single conversation. Ebean greatly simplifies this\
    \ by following an `EntityManager` architecture. This means Ebean doesn't provide\
    \ an `EntityManager` nor does it provide the `merge`, `flush`, or `persist` operations\
    \ normally found in JPA.\n\nThe point to understand here is that Ebean uses a\
    \ totally different architecture compared to JPA. Please note that even though\
    \ Ebean doesn’t have an `EntityManager`, it does have a “persistence context”\
    \ that is transaction scoped and managed automatically.\n\n## Chapter 7: Accessing\
    \ Databases\n\nI have worked with both JPA and Ebean, and in my experience both\
    \ have merits. There is no doubt that the query language used by Ebean is much\
    \ simpler to understand and work with. This simplicity is the selling point of\
    \ Ebean.\n\nAnother important optimization employed in Ebean is its support for\
    \ the partial object. In JPA, you would typically annotate a relationship to instruct\
    \ whether the relationship needs to be loaded using an eager or lazy fetching\
    \ strategy. In an eager fetch, the child objects are also retrieved and loaded\
    \ when the parent is fetched. In a lazy loading strategy, only the parent gets\
    \ loaded and the child is fetched only when it is used. The ability to configure\
    \ these fetch strategies is very important and is a big factor in optimizing the\
    \ code. JPA provides an annotation to configure them at the entity level. But\
    \ there is a problem.\n\nConsider a scenario in which for use case 1 you want\
    \ the entity to adopt eager the fetch strategy and for use case 2 you want the\
    \ same entity to use the lazy loading strategy. This is a problem because these\
    \ annotations are declared at the entity level. This is highly inflexible. Most\
    \ ORMs provide functionality similar to that of partial objects via “fetch groups.”\n\
    \nHaving “partial object” support in the query language means you can write a\
    \ query that is optimal for different use cases. That is, the lazy or eager loading\
    \ of the dependent objects are not fixed but can be changed depending on the use\
    \ case. This is a nice feature employed in Ebean and a big boost to optimizing\
    \ queries for performance and efficiency. This feature was in the earlier JPA\
    \ specifications.\n\nIn certain use cases, you may find that writing custom SQL\
    \ will be much better and easier from a performance standpoint. Ebean has excellent\
    \ support for custom SQL queries and provides a simpler API to work with.\n\n\
    ## Chapter 7: Accessing Databases\n\nTo enable Ebean, add the plugin dependency\
    \ to the `project/plugins.sbt` file:\n\n```\naddSbtPlugin(\"com.typesafe.sbt\"\
    \ % \"sbt-play-ebean\" % \"5.0.2\")\n```\n\nThen modify the `build.sbt` file to\
    \ add the Ebean dependency:\n\n```\nlazy val root = (project in file(\".\"))\n\
    \  .enablePlugins(PlayJava, PlayEbean)\n```\n\n### Ebean Query\n\nEbean uses the\
    \ same mapping as per the JPA specification. So you annotate your beans with `@Entity`,\
    \ `@Table`, `@Column`, `@OneToMany`, etc. as per the JPA specification. In fact,\
    \ most of the JPA annotations work with Ebean.\n\nLet’s consider a simple case\
    \ of modeling a book as an entity. A book is unique with its ISBN (for this example,\
    \ you denote the ISBN as ASIN, an Amazon notation). ASIN means a unique identifier\
    \ for a book and no two books can have the same ASIN.\n\nAn Ebean model should\
    \ extend from `io.ebean.Model`:\n\n```\npackage models;\n\nimport java.util.*;\n\
    import javax.persistence.*;\nimport io.ebean.*;\nimport play.data.format.*;\n\
    import play.data.validation.*;\n\n@Entity\n@Table(name=\"book\")\npublic class\
    \ Book extends Model {\n  @Id\n  @Column(name=\"asin\")\n  private String asin;\n\
    \n  @Column(name=\"title\")\n  private String title;\n\n  @Column(name=\"author\"\
    )\n  private String author;\n\n  @Column(name=\"description\")\n  private String\
    \ description;\n\n  @Column(name=\"language\")\n  private String language;\n\n\
    \  public String getLanguage() {\n    return language;\n  }\n\n  public void setLanguage(String\
    \ language) {\n    this.language = language;\n  }\n\n  public String getDescription()\
    \ {\n    return description;\n  }\n\n  public void setDescription(String description)\
    \ {\n    this.description = description;\n  }\n\n  public String getAsin() {\n\
    \    return asin;\n  }\n\n  public void setAsin(String asin) {\n    this.asin\
    \ = asin;\n  }\n\n  public String getTitle() {\n    return title;\n  }\n\n  public\
    \ void setTitle(String title) {\n    this.title = title;\n  }\n\n  public String\
    \ getAuthor() {\n    return author;\n  }\n\n  public void setAuthor(String author)\
    \ {\n    this.author = author;\n  }\n\n  @Override\n  public int hashCode() {\n\
    \    final int prime = 31;\n    int result = super.hashCode();\n    result = prime\
    \ * result + ((asin == null) ? 0 : asin.hashCode());\n    return result;\n  }\n\
    \n  @Override\n  public boolean equals(Object obj) {\n    if (this == obj)\n \
    \     return true;\n    if (!super.equals(obj))\n      return false;\n    if (getClass()\
    \ != obj.getClass())\n      return false;\n    Book other = (Book) obj;\n    if\
    \ (asin == null) {\n      if (other.asin != null)\n        return false;\n   \
    \ } else if (!asin.equals(other.asin))\n      return false;\n    return true;\n\
    \  }\n}\n```\n\n## Chapter 7: Accessing Databases\n\n**Note:** Play will automatically\
    \ generate getter and setter methods during runtime, so unless you want them available\
    \ during compilation time you don’t need to generate them.\n\nThere’s a lot of\
    \ information in the annotations in the above code. The most important parts are:\n\
    \n- `@Entity` informs the ORM (Ebean) that this class is associated with data\
    \ stored in the underlying data store and asks the ORM to handle it.\n- `@Table`\
    \ informs the ORM provider that this entity is to be persisted in the table mentioned\
    \ via the annotation, and in your case the table is `book`.\n- `@Id` is very important\
    \ information and declares that this field is the unique identifier to reference\
    \ this entity. This typically means this field is the primary key in the underlying\
    \ database.\n- `@Column` maps the attribute to a particular column of the underlying\
    \ table.\n\nHow to create a new book and persist to database:\n\n```\nBook book\
    \ = new Book();\n// set the attributes\nbook.setId(\"A0091234\");\nbook.setTitle(\"\
    Play 2\");\nbook.setAuthor(\"Prem\");\nbook.setDescription(\"Play 2\");\nbook.setLanguage(\"\
    English\");\nbook.save();\n```\n\n## Chapter 7: Accessing Databases\n\nHere you\
    \ use the `save` method of the Ebean class to persist the book object.\n\nHow\
    \ to fetch a book by its ID:\n\n```\n// find a Book by the id\nBook book = Ebean.find(Book.class).where().idEq(\"\
    id\").findOne();\n```\n\nHow to fetch all books starting with Java in the title:\n\
    \n```\n// find a list of books with title starting with \"java\"\nList<Book> books\
    \ = Ebean.find(Book.class).where()\n  .like(\"title\", \"java%\").orderBy(\"title\
    \ desc\").findList();\n```\n\nLet’s explore the `find` query with the `where`\
    \ and `like` clauses in detail. The above example uses a fluid API style where\
    \ the methods are chained together. This kind of method chaining is one of the\
    \ traits of good functional programming style and DSL.\n\nYou can optionally use\
    \ `select()` and `fetch()` to specify only the properties you want to fetch. This\
    \ returns \"partially\" populated beans.\n\nThis is an important feature to help\
    \ with the performance of your queries. For instance, if you are only interested\
    \ in two columns, say `id` and `name`, and if they are already indexed by the\
    \ database, the database is not required to touch the data blocks; it can just\
    \ serve the values from the index itself. This is a big performance improvement\
    \ if the table has a large number of records.\n\n```\nList<Book> books = Ebean.find(Book.class).where(\"\
    asin, author\").findList();\n```\n\nIn this example, you only retrieve the `asin`\
    \ and `author` properties.\n\n## Chapter 7: Accessing Databases\n\n### Common\
    \ Select Query Constructs in Ebean\n\nLet us now explore the most commonly used\
    \ methods available in Ebean that help to frame Select Queries.\n\n#### `where()`\n\
    \nThe `where` clause is used to specify the where filtering condition. You can\
    \ pass the complete where clause as a string (`where(\"filter condition\")`) or\
    \ use it with Expression objects. Using `where()` with an expression list is better\
    \ from a programming standards perspective. The example listed above on “fetching\
    \ books starting with Java in the title” shows the `where` clause used with Expression\
    \ objects.\n\n#### `eq()`\n\nChecks whether the given property is equal to the\
    \ supplied value: `eq(String propertyName, Object value)`\n\nFetch all books written\
    \ by Robin Cook:\n\n```\nList<Book> booksList = Ebean.find(Book.class).where()\n\
    \  .eq(\"author\", \"Robin Cook\").findList();\n```\n\n#### `like()`\n\nSpecifies\
    \ a property-like value where the value contains the SQL wild card characters\
    \ `%` (percentage) and `_` (underscore):\n\n`like(String propertyName, String\
    \ value)`\n\n```\nList<Book> booksList = Ebean.find(Book.class).where()\n  .like(\"\
    author\", \"%Cook\").findList();\n```\n\n#### `orderBy()`\n\nSets the order by\
    \ clause, replacing the existing order by clause if there is one: `orderBy(String\
    \ orderByClause)`\n\n## Chapter 7: Accessing Databases\n\nThis follows the SQL\
    \ syntax of using commas between each property, with the optional `asc` and `desc`\
    \ keywords representing ascending and descending order, respectively:\n\n```\n\
    List<Book> booksList = Ebean.find(Book.class).where()\n  .eq(\"author\", \"Robin\
    \ Cook\")\n  .orderBy(\"title desc\").findList();\n```\n\n#### `findUnique()`\n\
    \nUsed to return only one record. Executes the query returning either a single\
    \ bean or `null` (if no matching bean is found).\n\n#### `findList()`\n\nExecutes\
    \ the query, returning the list of objects.\n\n#### `LIMIT {max rows} [ OFFSET\
    \ {first row} ]`\n\nUsed to limit the number of records returned. By using it\
    \ with the offset parameter, pagination can be easily implemented.\n\n### The\
    \ Query Interface\n\nThere are a lot of methods in the Ebean Query interface.\
    \ Please take a look at `com.avaje.ebean.Query` interface to explore the available\
    \ options. Here is a list of a few of them:\n\n- `Query<T> fetch(String path)`\
    \ – Specifies a path to load, including all its properties\n- `Query<T> fetch(String\
    \ path, FetchConfig joinConfig)` – Additionally specifies a `JoinConfig` to specify\
    \ a “query join” and/or define the lazy loading query\n- `Query<T> fetch(String\
    \ path, String fetchProperties)` – Specifies a path to fetch with its specific\
    \ properties to include (a.k.a. partial object)\n- `Query<T> fetch(String assocProperty,\
    \ String fetchProperties, FetchConfig fetchConfig)` – Additionally specifies a\
    \ `FetchConfig` to use a separate query or lazy loading to load this path\n- `List<Object>\
    \ findIds()` – Executes the query returning the list of IDs\n- `List<T> findList()`\
    \ – Executes the query returning the list of objects\n- `Map<?,T> findMap()` –\
    \ Executes the query returning a map of the objects\n- `int findRowCount()` –\
    \ Returns the count of entities this query should return\n- `Set<T> findSet()`\
    \ – Executes the query returning the set of objects\n- `Integer firstRow()` –\
    \ Returns the first row value\n- `String getGeneratedSql()` – Returns the SQL\
    \ that was generated for executing this query\n- `Integer maxRows()` – Returns\
    \ the max rows for this query\n- `RawSql getRawSql()` – Returns the `RawSql` that\
    \ was set to use for this query\n- `Query<T> select(String fetchProperties)` –\
    \ Explicitly sets a comma-delimited list of the properties to fetch on the ‘main’\
    \ entity bean (aka partial object)\n- `Query<T> setReadOnly(boolean readOnly)`\
    \ – Set to `true` when you want the returned beans to be read only\n- `Query<T>\
    \ setTimeout(int secs)` – Sets a timeout on this query\n\n## Chapter 7: Accessing\
    \ Databases\n\n### Using RawSql\n\nYou have seen that you need to have an entity\
    \ for the typical Ebean queries to work. The query is on the entity and that in\
    \ turn gets translated to a database query. In many situations, you may want to\
    \ fetch results from many entities and the returned data cannot be translated\
    \ to an entity. This is useful for reporting type requirements where you want\
    \ to use aggregate functions such as `sum()`, `count()`, `max()`, etc. For whatever\
    \ reason, when you want to write database-specific queries, you can use `RawSql`.\
    \ The returned data from the query can be mapped to an object easily with Ebean\
    \ thanks to its `@Sql` annotation. You can create an entity and mark it with a\
    \ `@Sql` annotation to tell Ebean that this is just a SQL representation and not\
    \ an entity that is related to a table.\n\nLet’s see an example. Say you want\
    \ to find the total number of books written by all authors. You use the `RawSqlBuilder`\
    \ class to specify the query and map the columns in the select clause to the corresponding\
    \ property fields defined in the `PopularBook` class. This class is the entity\
    \ you defined to map the result:\n\n```\nString sql = \"select author, count(author)\
    \ as noofbooks from books group by author\";\nRawSqlBuilder rawSqlBldr = RawSqlBuilder.parse(sql);\n\
    RawSql rawSql = rawSqlBldr.columnMapping(\"author\", \"bookauthor\")\n  .columnMapping(\"\
    noofbooks\", \"totalbooksbyauthor\").create();\n```\n\n```\nQuery<PopularBook>\
    \ query = Ebean.find(PopularBook.class);\nquery.setRawSql(rawSql);\nList<PopularBook>\
    \ list = query.findList();\n```\n\nHere is the `PopularBook` entity:\n\n```\n\
    package models;\n\nimport javax.persistence.Entity;\nimport com.avaje.ebean.annotation.Sql;\n\
    \n@Entity\n@Sql\npublic class PopularBook extends TrendingBook {\n  private String\
    \ author;\n  private int totalbooksbyauthor;\n  // define the getters and setters\n\
    }\n```\n\nAt times you may desire to use only the relational features and don't\
    \ want any ORM features for whatever reason. For such cases, Ebean provides the\
    \ `SqlQuery` class. Here you can write the plain old SQL and get the results just\
    \ like you do via a JDBC resultset. `SqlQuery` is where you specify the exact\
    \ SQL SELECT statement and return list, sets, or maps of `SqlRow` objects. A `SqlRow`\
    \ is a `Map` where the key is the column name.\n\nThis is a fairly lightweight\
    \ API that you can use instead of going to raw JDBC. Again, let’s see an example\
    \ to understand this:\n\n```\nString sql = \"select count(1) as count from book\
    \ where author = ?\";\nSqlQuery query = Ebean.createSqlQuery(sql);\nquery.setParameter(1,\
    \ author);\nSqlRow row = query.findUnique();\nint count = row.getInteger(\"count\"\
    );\n```\n\nThis is much easier than writing a plain old JDBC query using the JDBC\
    \ API.\n\n## Chapter 7: Accessing Databases\n\nIf the situation demands writing\
    \ raw SQL for an insert or update, you can use the `SqlUpdate` class:\n\n```\n\
    SqlUpdate query = Ebean.createSqlUpdate(sql);\n```\n\nEbean also provides the\
    \ `CallableSql` class to invoke database procedures and functions.\n\n### Relationships\
    \ in Ebean\n\nA one-to-many example:\n\n```\n@Entity\n@Table(name=\"book\")\n\
    public class Book implements Serializable {\n  // unidirectional ...\n  // ...\
    \ can explicitly specify the join column if needed\n  @OneToMany\n  @JoinColumn(name=\"\
    auth_id\")\n  List<Author> authors;\n}\n```\n\nConsider the above case where you\
    \ can find the author from the `Book` entity and you cannot traverse back to the\
    \ book from the `Author` entity.\n\nHere the foreign key is in the `book` table\
    \ and you can use the `@JoinColumn` to specify the table column that needs to\
    \ be used for the key. If this was modeled as a bidirectional relationship, the\
    \ code would be as follows:\n\n```\n@Entity\n@Table(name=\"author\")\npublic class\
    \ Author implements Serializable {\n  @OneToMany(mappedBy=\"authorId\")\n  List<Book>\
    \ writtenBooks;\n}\n```\n\nNotice that in this bidirectional model, the `Book`\
    \ entity has the foreign key and is the owner of the relationship. So you mark\
    \ the inverse side: the `Author` with the `mappedBy` attribute.\n\n## Chapter\
    \ 7: Accessing Databases\n\nIf you inspect the RDBMS, you can easily understand\
    \ that there is no many-to-many relationship in RDBMS tables. The many-to-many\
    \ is enforced as two one-to-many relationships in database tables via an intersection\
    \ table. If you anticipate that the intersection table might need to support more\
    \ attributes, it is better to model it as a separate entity and, in your model,\
    \ include two one-to-many relationships. If there is no chance for any extra attributes\
    \ in the intersection table, you can just use the default `@ManyToMany` annotation.\
    \ Here’s an example.\n\nConsider the case of a user and role. A user can have\
    \ many roles, and a role may be attributed to many users. In RDBMS, this is realized\
    \ using an intersection table. Let’s name the intersection table `user_role`.\
    \ Let’s assume the simple case that the intersection table won’t contain any other\
    \ attributes and in this case the entities will have the `ManyToMany` relationships\
    \ as shown in the code:\n\n```\n@Entity\n@Table(name=\"user\")\npublic class User\
    \ implements Serializable {\n  ...\n  @ManyToMany(cascade=CascadeType.ALL)\n \
    \ List<Role> roles;\n}\n\n@Entity\n@Table(name=\"role\")\npublic class Role {\n\
    \  ...\n  @ManyToMany(cascade=CascadeType.ALL)\n  List<User> users;\n}\n```\n\n\
    There are so many more things to explain about Ebean as it is vast and may require\
    \ a whole new book to explain it fully. I recommend you to go through the official\
    \ Ebean online documentation to understand more. The docs are available at [https://ebean.io/docs/](https://ebean.io/docs/).\n\
    \n## Chapter 8: Complete Example\n\nThis chapter consolidates what you have learned\
    \ so far into a complete example. The primary focus of this chapter is to present\
    \ the code; we have already discussed all the concepts and portions of the code\
    \ in prior chapters.\n\n### `conf/application.conf`\n\n```\n# This is the main\
    \ configuration file for the application.\n# https://www.playframework.com/documentation/latest/ConfigFile\n\
    \n# Default database configuration\nplay.modules.enabled += \"modules.FirstModule\"\
    \nplay.http.filters=config.FilterConfig\nplay.http.errorHandler = \"config.CustomErrorHandler\"\
    \n\ndb {\n  default.driver = org.h2.Driver\n  default.url = \"jdbc:h2:mem:play\"\
    \n  # Provided for JPA access\n  default.jndiName=DefaultDS\n}\n\n# Point JPA\
    \ at our database configuration\njpa.default=defaultPersistenceUnit\n```\n\n©\
    \ Prem Kumar Karunakaran 2020  \nP. K. Karunakaran, *Introducing Play Framework*,\
    \  \n[https://doi.org/10.1007/978-1-4842-5645-9_8](https://doi.org/10.1007/978-1-4842-5645-9_8)\n\
    \n## Chapter 8: Complete Example\n\n```\n# Number of database connections\n# See\
    \ https://github.com/brettwooldridge/HikariCP/wiki/About-Pool-Sizing\n# db connections\
    \ = ((physical_core_count * 2) + effective_spindle_count)\nfixedConnectionPool\
    \ = 9\n\n# Set Hikari to fixed size\nplay.db {\n  prototype {\n    hikaricp.minimumIdle\
    \ = ${fixedConnectionPool}\n    hikaricp.maximumPoolSize = ${fixedConnectionPool}\n\
    \  }\n}\n\n# Job queue sized to HikariCP connection pool\ndatabase.dispatcher\
    \ {\n  executor = \"thread-pool-executor\"\n  throughput = 1\n  thread-pool-executor\
    \ {\n    fixed-pool-size = ${fixedConnectionPool}\n  }\n}\n```\n\nHere you configure\
    \ a connection pool and a fixed thread pool for the database connections. This\
    \ is very important because you are running the database invocations in a separate\
    \ context with its own thread pool. This will make sure that you don’t block default\
    \ execution context threads.\n\nThen you configure the h2 in-memory database as\
    \ your storage and registered it with JNDI name of `DefaultDS`.\n\n### `conf/routes`"
  raw: "# Default database configuration\n\ndb.default.driver=org.h2.Driver\n\ndb.default.url=\"\
    jdbc:h2:mem:play\"\n\ndb.default.jndiName=DefaultDS\n\njpa.default=defaultPersistenceUnit\n\
    \nThe next step is to choose a JPA implementation and add that as a dependency\
    \ to the project. You are using Hibernate as the JPA provider and the in-memory\
    \ h2 database for the examples. Open the build.sbt file and add\n\nval appDependencies\
    \ = Seq(\n\njavaJdbc,\n\njavaJpa,\n\n\"org.hibernate\" % \"hibernate-entitymanager\"\
    \ % \"5.3.7.Final\",\n\n\"com.h2database\" % \"h2\" % \"1.4.200\"\n\n)\n\nbuild.sbt\
    \ is located inside the project directory.\n\nChapter 7 aCCessing Databases\n\n\
    The next step is to create the persistence.xml file and configure it to use Hibernate\
    \ as JPA provider. persistence.xml should be put inside the conf/META-INF directory.\n\
    \n<persistence\n\nxsi:schemaLocation=\"http://xmlns.jcp.org/xml/ns/persistence\
    \ http://xmlns.jcp.org/xml/ns/persistence/persistence_2_1.xsd\"\n\nversion=\"\
    2.1\">\n\n<persistence-unit name=\"defaultPersistenceUnit\" transaction-type=\"\
    RESOURCE_LOCAL\">\n\n<provider>org.hibernate.jpa.HibernatePersistenceProvider</\n\
    \nprovider>\n\n<non-jta-data-source>DefaultDS</non-jta-data-source>\n\n<properties>\n\
    \n<property name=\"hibernate.dialect\" value=\"org.hibernate.\n\ndialect.H2Dialect\"\
    />\n\n</properties>\n\n</persistence-unit>\n\n</persistence>\n\n**Tip** it is\
    \ a best practice to isolate all Jpa operations in a separate execution context\
    \ other than the default play execution context. all Db operations are blocking,\
    \ so it is important to isolate them in a separate execution context.\n\nPlay\
    \ provides the play.db.jpa.JPAApi to work with Entity Manager. If you are not\
    \ familiar with Entity Manager, read the next paragraph.\n\nChapter 7 aCCessing\
    \ Databases\n\nEntity Manager is part of JPA and it is used to interact with the\
    \ persistence context to maintain the conversational state. In short, it is the\
    \ interface we will use to create, remove, update, or find entities when using\
    \ JPA. It is closely related to the session concept found in Hibernate.\n\nIf\
    \ you want to know more about the latest things in JPA, you can download the specification\
    \ a[t https://download.oracle.com/otn-pub/](https://download.oracle.com/otn-pub/jcp/persistence-2_1-fr-eval-spec/JavaPersistence.pdf)\n\
    \n[jcp/persistence-2_1-fr-eval-spec/JavaPersistence.pdf](https://download.oracle.com/otn-pub/jcp/persistence-2_1-fr-eval-spec/JavaPersistence.pdf).\n\
    \nYour model class should not directly perform JPA or JDBC operations.\n\nLet’s\
    \ go ahead and create the repository classes. Before that, you need to create\
    \ an entity named Review that models the real-world review comment by a user regarding\
    \ a book.\n\n**package model;**\n\nimport javax.persistence.*;\n\npublic class\
    \ Review {\n\n@Id\n\n@GeneratedValue(strategy = GenerationType.AUTO)\n\npublic\
    \ Long id;\n\npublic String comment;\n\npublic Long getId() {\n\nreturn id;\n\n\
    }\n\npublic void setId(Long id) {\n\nthis.id = id;\n\n}\n\npublic String getComment()\
    \ {\n\nreturn comment;\n\n}\n\npublic void setComment(String comment) {\n\nthis.comment\
    \ = comment;\n\n}\n\nChapter 7 aCCessing Databases\n\npublic String getUserId()\
    \ {\n\nreturn userId;\n\n}\n\npublic void setUserId(String userId) {\n\nthis.userId\
    \ = userId;\n\n}\n\npublic String getBookId() {\n\nreturn bookId;\n\n}\n\npublic\
    \ void setBookId(String bookId) {\n\nthis.bookId = bookId;\n\n}\n\npublic String\
    \ userId;\n\npublic String bookId;\n\n}\n\nNext, create an interface for abstracting\
    \ the review operations (ReviewRepository.java):\n\n:package dao;\n\nimport com.google.inject.ImplementedBy;\n\
    \nimport model.Review;\n\nimport java.util.concurrent.CompletionStage;\n\nimport\
    \ java.util.stream.Stream;\n\n@ImplementedBy(JPAReviewRepository.class)\n\npublic\
    \ interface ReviewRepository {\n\nCompletionStage<String> saveReview(Review review);\n\
    \n}\n\nThe ReviewRepository interface hides the JPA implementation details from\
    \ the model classes.\n\nChapter 7 aCCessing Databases\n\nGo ahead and create the\
    \ implementation of this interface\n\n(JPAReviewRepository.java):\n\n**package**\
    \ dao;\n\n**import** models.Review;\n\n**import** play.db.jpa.JPAApi;\n\n**import**\
    \ javax.inject.Inject;\n\n**import** javax.inject.Singleton;\n\n**import** java.util.concurrent.CompletableFuture;\n\
    \n**import** java.util.concurrent.CompletionStage;\n\n**import static** java.util.concurrent.CompletableFuture.\
    \ *supplyAsync*;\n\n@Singleton\n\n**public class** JPAReviewRepository **implements**\
    \ ReviewRepository{\n\n**private** JPAApi **jpaApi**;\n\n**private** DatabaseExecutionContext\
    \ **executionContext**;\n\n@Inject\n\n**public** JPAReviewRepository(JPAApi api,\n\
    \nDatabaseExecutionContext executionContext) {\n\n**this**. **jpaApi** = api;\n\
    \n**this**. **executionContext** = executionContext;\n\n}\n\n@Override\n\n**public**\
    \ CompletionStage<String> saveReview(Review review) {\n\n**return** CompletableFuture.\
    \ *supplyAsync*(\n\n() -> {\n\n*// lambda is an instance of*\n\n*//Function<EntityManager,\
    \ Long>*\n\n**return jpaApi**.withTransaction(\n\nentityManager -> {\n\nChapter\
    \ 7 aCCessing Databases\n\nentityManager.persist(review);\n\n**return \"saved\"\
    ** ;\n\n});\n\n},\n\n**executionContext**);\n\n}\n\n}\n\nJPA calls should be made\
    \ inside a transaction, so you use the jpaApi.\n\nwithTransaction method to execute\
    \ the persistence operation of saving the Review entity.\n\n**Using Ebean in Play**\n\
    \nMy experience in using Ebean with Play is quite satisfactory. It offers easy\
    \ to use apis and is much simpler in terms of architecture.\n\nAn architecture\
    \ using EntityManager brings with it the concept of attached and detached entities.\
    \ The entity state is persisted only when it is attached with an EntityManager.\
    \ This also means if the conversation needs to be maintained across multiple transactions,\
    \ the EntityManager needs to be managed by another object like an EJB Session\
    \ bean. The same Entity Manager instance is used across transactions to maintain\
    \ a single conversation. Ebean greatly simplifies this by following an EntityManager\
    \ architecture. This means Ebean doesn't provide an Entity Manager nor does it\
    \ provide the *merge*, *flush*, or *persist* operations normally found in JPA.\n\
    \nThe point to understand here is that Ebean uses a totally different architecture\
    \ compared to JPA. Please note that even though Ebean doesn’t have an Entity Manager,\
    \ it does have a “persistence context” that is transaction scoped and managed\
    \ automatically.\n\nChapter 7 aCCessing Databases\n\nI have worked with both JPA\
    \ and Ebean, and in my experience both have merits. There is no doubt that the\
    \ query language used by Ebean is much simpler to understand and work with. This\
    \ simplicity is the selling point of Ebean.\n\nAnother important optimization\
    \ employed in Ebean is its support for the partial object. In JPA, you would typically\
    \ annotate a relationship to instruct whether the relationship needs to be loaded\
    \ using an eager or lazy fetching strategy. In an eager fetch, the child objects\
    \ are also retrieved and loaded when the parent is fetched. In a lazy loading\
    \ strategy, only the parent gets loaded and the child is fetched only when it\
    \ is used. The ability to configure these fetch strategies is very important and\
    \ is a big factor in optimizing the code. JPA provides an annotation to configure\
    \ them at the entity level. But there is a problem.\n\nConsider a scenario in\
    \ which for use case 1 you want the entity to adopt eager the fetch strategy and\
    \ for use case 2 you want the same entity to use the lazy loading strategy. This\
    \ is a problem because these annotations are declared at the entity level. This\
    \ is highly inflexible. Most ORMs provide functionality similar to that of partial\
    \ objects via “fetch groups.”\n\nHaving “partial object” support in the query\
    \ language means you can write a query that is optimal for different use cases.\
    \ That is, the lazy or eager loading of the dependent objects are not fixed but\
    \ can be changed depending on the use case. This is a nice feature employed in\
    \ Ebean and a big boost to optimizing queries for performance and efficiency.\
    \ This feature was in the earlier JPA specifications.\n\nIn certain use cases,\
    \ you may find that writing custom SQL will be much better and easier from a performance\
    \ standpoint. Ebean has excellent support for custom SQL queries and provides\
    \ a simpler API to work with.\n\nChapter 7 aCCessing Databases\n\nTo enable Ebean,\
    \ add the plugin dependency to the project/plugins.\n\nsbt file:\n\naddSbtPlugin(\"\
    com.typesafe.sbt\" % \"sbt-play-ebean\" % \"5.0.2\") Then modify the build.sbt\
    \ file to add the Ebean dependency: lazy val root = (project in file(\".\"))\n\
    \n.enablePlugins(PlayJava, PlayEbean)\n\n**Ebean Query**\n\nEbean uses the same\
    \ mapping as per the JPA specification. So you annotate your beans with @Entity,\
    \ @Table, @Column, @OneToMany, etc. as per the JPA specification. In fact, most\
    \ of the JPA annotations work with Ebean.\n\nLet’s consider a simple case of modeling\
    \ a book as an entity. A book is unique with its ISBN (for this example, you denote\
    \ the ISBN as asin, an Amazon notation). ASIN means a unique identifier for a\
    \ book and no two books can have the same ASIN.\n\nAn Ebean model should extend\
    \ from io.ebean.Model:\n\npackage models;\n\nimport java.util.*;\n\nimport javax.persistence.*;\n\
    \nimport io.ebean.*;\n\nimport play.data.format.*;\n\nimport play.data.validation.*;\n\
    \n@Entity\n\n@Table(name=\"book\")\n\npublic class Book extends Model {\n\n@Id\n\
    \n@Column(name=\"asin\")\n\nChapter 7 aCCessing Databases\n\nprivate String asin;\n\
    \n@Column(name=\"title\")\n\nprivate String title;\n\n@Column(name=\"author\"\
    )\n\nprivate String author;\n\n@Column(name=\"description\")\n\nprivate String\
    \ description;\n\n@Column(name=\"language\")\n\nprivate String language;\n\npublic\
    \ String getLanguage() {\n\nreturn language;\n\n}\n\npublic void setLanguage(String\
    \ language) {\n\nthis.language = language;\n\n}\n\npublic String getDescription()\
    \ {\n\nreturn description;\n\n}\n\npublic void setDescription(String description)\
    \ {\n\nthis.description = description;\n\n}\n\npublic String getAsin() {\n\nreturn\
    \ asin;\n\n}\n\npublic void setAsin(String asin) {\n\nthis.asin = asin;\n\n}\n\
    \npublic String getTitle() {\n\nreturn title;\n\n}\n\npublic void setTitle(String\
    \ title) {\n\nthis.title = title;\n\n}\n\nChapter 7 aCCessing Databases\n\npublic\
    \ String getAuthor() {\n\nreturn author;\n\n}\n\npublic void setAuthor(String\
    \ author) {\n\nthis.author = author;\n\n}\n\n@Override\n\npublic int hashCode()\
    \ {\n\nfinal int prime = 31;\n\nint result = super.hashCode();\n\nresult = prime\
    \ * result + ((asin == null) ? 0 : asin.\n\nhashCode());\n\nreturn result;\n\n\
    }\n\n@Override\n\npublic boolean equals(Object obj) {\n\nif (this == obj)\n\n\
    return true;\n\nif (!super.equals(obj))\n\nreturn false;\n\nif (getClass() !=\
    \ obj.getClass())\n\nreturn false;\n\nBook other = (Book) obj;\n\nif (asin ==\
    \ null) {\n\nif (other.asin != null)\n\nreturn false;\n\n} else if (!asin.equals(other.asin))\n\
    \nreturn false;\n\nreturn true;\n\n}\n\n}\n\nChapter 7 aCCessing Databases\n\n\
    **Note** play will automatically generate getter and setter methods during runtime,\
    \ so unless you want them available during compilation time you don’t need to\
    \ generate them.\n\nThere’s a lot of information in the annotations in the above\
    \ code. The most important parts are\n\n• @Entity informs the ORM (Ebean) that\
    \ this class is\n\nassociated with data stored in the underlying data store\n\n\
    and asks the ORM to handle it.\n\n• @Table informs the ORM provider that this\
    \ entity is to\n\nbe persisted in the table mentioned via the annotation,\n\n\
    and in your case the table is book.\n\n• @Id is very important information and\
    \ declares that\n\nthis field is the unique identifier to reference this entity.\n\
    \nThis typically means this field is the primary key in the\n\nunderlying database.\n\
    \n• @Column maps the attribute to a particular column of\n\nthe underlying table.\n\
    \nHow to create a new book and persist to database:\n\nBook book= new Book();\n\
    \n//set the attributes\n\nbook.setId(\"A0091234\");\n\nbook.setTitle(\"Play 2\"\
    );\n\nbook.setAuthor(\"Prem\");\n\nbook.setDescription(\"Play 2\");\n\nbook.setLanguage(\"\
    English\");\n\nbook.save();\n\nChapter 7 aCCessing Databases\n\nHere you use the\
    \ save method of the Ebean class to persist the book object.\n\nHow to fetch a\
    \ book by its ID:\n\n// find a Book by the id\n\nBook book = Ebean.find(Book.class).where().idEq(\"\
    id\").\n\nfindOne();\n\nHow to fetch all books starting with Java in the title:\n\
    \n// find a list of books with title starting with \"java\"\n\nList<Book> books\
    \ =Ebean.find(Book.class).where().\n\nlike(\"title\",\"java%\").orderBy(\"tile\
    \ desc\").findList(); Let’s explore the find query with the where and like clauses\
    \ in detail. The above example uses a fluid API style where the methods are chained\
    \ together. This kind of method chaining is one of the traits of good functional\
    \ programming style and DSL.\n\nYou can optionally use select() and fetch() to\
    \ specify only the properties you want to fetch. This returns \"partially\" populated\
    \ beans.\n\nThis is an important feature to help with the performance of your\
    \ queries. For instance, if you are only interested in two columns, say id and\
    \ name, and if they are already indexed by the database, the database is not required\
    \ touch the data blocks; it can just serve the values from the index itself. This\
    \ is a big performance improvement if the table has a large number of records.\n\
    \nList<Book> books = Ebean. *find*(Book. **class**).where(\"asin,author\").\n\n\
    findList();\n\nIn this example, you only retrieve the asin and author properties.\n\
    \nChapter 7 aCCessing Databases\n\n**Common Select Query Constructs in Ebean**\n\
    \nLet us now explore the most commonly used methods available in Ebean that helps\
    \ to frame Select Queries.\n\n**where( )**\n\nThe where clause is used to specify\
    \ the where filtering condition. You can pass the complete where clause as a string\
    \ (where(\" filter condition \") or use it with Expression objects. Using where()\
    \ with an expression list is better from a programming standards perspective.\
    \ The example listed above on “fetching books starting with Java in the title”\
    \ shows the where clause used with Expression objects.\n\n**eq( )**\n\nChecks\
    \ whether the given property is equal to the supplied value: eq(String propertyName,\
    \ Object value)\n\nFetch all books written by Robin Cook:\n\nList<Book> booksList\
    \ = Ebean. *find*(Book. **class**).where().\n\neq(\"author\", \"Robin Cook\").findList();\n\
    \n**like( )**\n\nSpecifies a property-like value where the value contains the\
    \ SQL wild card characters % (percentage) and _ (underscore):\n\nlike(String propertyName,String\
    \ value)\n\nList<Book> booksList = Ebean. *find*(Book. **class**).where().\n\n\
    like(\"author\", \"%Cook\").findList();\n\n**orderBy( )**\n\nSets the order by\
    \ clause, replacing the existing order by clause if there is one: orderBy(String\
    \ orderByClause)\n\nChapter 7 aCCessing Databases\n\nThis follows the SQL syntax\
    \ of using commas between each property, with the optional asc and desc keywords\
    \ representing ascending and descending order, respectively:\n\nList<Book> booksList\
    \ = Ebean. *find*(Book. **class**).where().\n\neq(\"author\", \"Robin Cook\")\n\
    \n.orderBy(\"title desc\").findList();\n\n**findUnique( )**\n\nUsed to return\
    \ only one record. Executes the query returning either a single bean or null (if\
    \ no matching bean is found).\n\n**findList( )**\n\nExecutes the query, returning\
    \ the list of objects.\n\n**LIMIT {max rows} [ OFFSET {first row} ]**\n\nUsed\
    \ to limit the number of records returned. By using it with the offset parameter,\
    \ pagination can be easily implemented.\n\n**The Query Interface**\n\nThere a\
    \ lot methods in the Ebean Query interface. Please take a look at com.avaje.ebean.Query\
    \ interface to explore the available options. Here is a list of a few of them:\n\
    \n• Query<T> fetch(String path)\n\nSpecifies a path to load, including all its\
    \ properties\n\n• Query<T> fetch(String path, FetchConfig joinConfig) Additionally\
    \ specifies a JoinConfig to specify a “query join” and or define the lazy loading\
    \ query\n\nChapter 7 aCCessing Databases\n\n• Query<T> fetch(String path, String\
    \ fetchProperties) Specifies a path to fetch with its specific properties to include\
    \ (a.k.a. partial object)\n\n• Query<T> fetch(String assocProperty, String\n\n\
    fetchProperties, FetchConfig fetchConfig)\n\nAdditionally specifies a FetchConfig\
    \ to use a separate query or lazy loading to load this path\n\n• **List<Object>**\n\
    \n**findIds()**\n\nExecutes the query returning the list of Ids\n\n• **List<T>**\n\
    \n**findList()**\n\nExecutes the query returning the list of objects\n\n• **Map<?,T>**\
    \ **findMap()**\n\nExecutes the query returning a map of the objects\n\n• **int**\
    \ **findRowCount()**\n\nReturns the count of entities this query should return\n\
    \n• **Set<T>**\n\n**findSet()**\n\nExecutes the query returning the set of objects\n\
    \n• **intger FirstRow()**\n\nReturns the first row value\n\n• **String**\n\n**getGeneratedSql()**\n\
    \nReturns the SQL that was generated for executing this query\n\n• **intger MaxRows()**\n\
    \nReturns the max rows for this query\n\n• RawSql\n\ngetRawSql()\n\nReturns the\
    \ RawSql that was set to use for this query\n\nChapter 7 aCCessing Databases\n\
    \n• Query<T> **select(String fetchProperties)**\n\n **Explicitly sets a comma-delimited\
    \ list of the properties to fetch on the ‘main’ entity bean (aka partial object)\n\
    \n• Query<T> setReadOnly(boolean readOnly)\n\nSet to true when you want the returned\
    \ beans to be read only.\n\n• Query<T> setTimeout(int secs)\n\nSets a timeout\
    \ on this query\n\n**Using RawSql**\n\nYou have seen that you need to have an\
    \ entity for the typical Ebean queries to work. The query is on the entity and\
    \ that in turn gets translated to a database query. In many situations, you may\
    \ want to fetch results from many entities and the returned data cannot be translated\
    \ to an entity. This is useful for reporting type requirements where you want\
    \ to use aggregate functions such as sum(), count(), max(), etc. For whatever\
    \ reason, when you want to write database-specific queries, you can use RawSql.\
    \ The returned data from the query can be mapped to an object easily with Ebean\
    \ thanks to its @Sql annotation. You can create an entity and mark it with a @Sql\
    \ annotation to tell Ebean that this is just a SQL representation and not an entity\
    \ that is related to a table.\n\nLet’s see an example. Say you want to find the\
    \ total number of books written by all authors. You use the RawSqlBuilder class\
    \ to specify the query and map the columns in the select clause to the corresponding\
    \ property fields defined in the PopularBook class. This class is the entity you\
    \ defined to map the result:\n\nString sql=\"select author,count(author) as noofbooks\
    \ from books group by author\"\n\nRawSqlBuilder rawSqlBldr = RawSqlBuilder. *parse*(sql);\
    \ RawSql rawSql = rawSqlBldr.columnMapping(\"author\", \"bookauthor\")\n\n.columnMapping(\"\
    noofbooks\", \"totalbooksbyauthor\").create(); 128\n\nChapter 7 aCCessing Databases\n\
    \nQuery<PopularBook> query = Ebean. *find*(PopularBook. **class**); query.setRawSql(rawSql);\n\
    \nList<PopularBook> list = query.findList();\n\nHere is the PopularBook entity:\n\
    \npackage models;\n\nimport javax.persistence.Entity;\n\nimport com.avaje.ebean.annotation.Sql;\n\
    \n@Entity\n\n@Sql\n\npublic class PopularBook extends TrendingBook {\n\nprivate\
    \ String author;\n\nprivate int totalbooksbyauthor;\n\n//define the getters and\
    \ setters\n\n}\n\nAt times you may desire to use only the relational features\
    \ and don't want any ORM features for whatever reason. For such cases, Ebean provides\
    \ the SqlQuery class. Here you can write the plain old SQL and get the results\
    \ just like you do via a JDBC resultset. SqlQuery is where you specify the exact\
    \ SQL SELECT statement and return list, sets, or maps of SqlRow objects. A SqlRow\
    \ is a Map where the key is the column name.\n\nThis is a fairly lightweight API\
    \ that you can use instead of going to raw JDBC. Again, let’s see an example to\
    \ understand this:\n\nString sql = \"select count(1) as count from book where\
    \ author = ?\"; SqlQuery query = Ebean. *createSqlQuery*(sql);\n\nquery.setParameter(1,\
    \ author);\n\nSqlRow row = query.findUnique();\n\n**int** count = row.getInteger(\"\
    count\");\n\nThis is much easier than writing a plain old JDBC query using the\
    \ JDBC API.\n\nChapter 7 aCCessing Databases\n\nIf the situation demands **writing\
    \ raw SQL for an insert or update**, you can use the SqlUpdate class:\n\nSqlUpdate\
    \ query = Ebean. *createSqlUpdate*(sql);\n\nEbean also provides the CallableSql\
    \ class to invoke database procedures and functions.\n\n**Relationships in Ebean**\n\
    \nA one-to-many example:\n\n@Entity\n\n@Table(name=\"book\")\n\npublic class Book\
    \ implements Serializable {\n\n// unidirectional ...\n\n// ... can explicitly\
    \ specify the join column if needed\n\n@OneToMany\n\n@JoinColumn(name=\"auth_id\"\
    )\n\nList<Author> authors;\n\nConsider the above case where you can find the author\
    \ from the Book entity and you cannot traverse back to the book from the Author\
    \ entity.\n\nHere the foreign key is in the book table and you can use the @JoinColumn\
    \ to specify the table column that needs to be used for the key. If this was modeled\
    \ as a bidirectional relationship, the code would be as follows:\n\n@Entity\n\n\
    @Table(name=\"author\")\n\npublic class Author implements Serializable {\n\n@OneToMany(mappedBy=\"\
    authorId\")\n\nList<Book> writtenBooks;\n\nNotice that in this bidirectional model,\
    \ the Book entity has the foreign key and is the owner of the relationship. So\
    \ you mark the inverse side: the Author with the mappedBy attribute.\n\nChapter\
    \ 7 aCCessing Databases\n\nIf you inspect the RDBMS, you can easily understand\
    \ that there is no many-to-many relationship in RDBMS tables. The many-to-many\
    \ is enforced as two one-to-many relationships in database tables via an intersection\
    \ table. If you anticipate that the intersection table might need to support more\
    \ attributes, it is better to model it as a separate entity and, in your model,\
    \ include two one-to-many relationships. If there is no chance for any extra attributes\
    \ in the intersection table, you can just use the default @ManyToMany annotation.\
    \ Here’s an example.\n\nConsider the case of a user and role. A user can have\
    \ many roles, and a role may be attributed to many users. In RDBMS, this is realized\
    \ using an intersection table. Let’s name the intersection table user_role. Let’s\
    \ assume the simple case that the intersection table won’t contain any other attributes\
    \ and in this case the entities will have the ManyToMany relationships as shown\
    \ in the code:\n\n@Entity\n\n@Table(name=\"user\")\n\npublic class User implements\
    \ Serializable {\n\n...\n\n@ManyToMany(cascade=CascadeType.ALL)\n\nList<Role>\
    \ roles;\n\n@Entity\n\n@Table(name=\"role\")\n\npublic class Role {\n\n...\n\n\
    @ManyToMany(cascade=CascadeType.ALL)\n\nList<User> users;\n\nThere so many more\
    \ things to explain about Ebean as it is vast and may require a whole new book\
    \ to explain it fully. I recommend you to go through the official Ebean online\
    \ documentation to understand more. The docs are available at [https://ebean.io/docs/](https://ebean.io/docs/).\n\
    \n**CHAPTER 8**\n\n**Complete Example**\n\nThis chapter consolidates what you\
    \ have learned so far into a complete example. The primary focus of this chapter\
    \ is to present the code; we have already discussed all the concepts and portions\
    \ of the code in prior chapters.\n\n**conf/application.conf**\n\n*# This is the\
    \ main configuration file for the application.*\n\n*# https://www.playframework.com/documentation/latest/ConfigFile*\n\
    \n*# Default database configuration*\n\nplay.modules.enabled += \"modules.FirstModule\"\
    \n\nplay.http.filters=config.FilterConfig\n\nplay.http.errorHandler = \"config.CustomErrorHandler\"\
    \n\ndb {\n\ndefault.driver = org.h2.Driver\n\ndefault.url = \"jdbc:h2:mem:play\"\
    \n\n*# Provided for JPA access*\n\ndefault.jndiName=DefaultDS\n\n}\n\n*# Point\
    \ JPA at our database configuration*\n\njpa.default=defaultPersistenceUnit\n\n\
