    第 5 章 并发与异步编程 **示例 2：使用 Callable**


    Callable 类似于 Runnable。两者都设计为由线程执行。区别在于 Runnable 不返回任何内容，并且不能抛出受检异常。Callable 返回一个结果，并且可能抛出异常。Callable
    接口定义了方法：


    V call() **throws** Exception;


    让我们通过一个示例来尝试 Callable：


    package com.domain.concurrency;


    import java.util.concurrent.Callable;


    public class CallableTask implements Callable<String> {


    @Override


    public String call() throws Exception {


    String s="Callable 任务在 " + System.currentTimeMillis() + " 运行";


    return s;


    }


    }


    CallableTask 返回一个 String，如果出现问题，也可以抛出异常。下面定义的 CallableClient 使用 ExecutorService
    执行此任务。需要理解的最重要的事情是，由于这些是返回结果的异步执行，ExecutorService 返回一个 Future 对象，它是实际响应的代理。调用者必须通过调用
    Future 上的 isDone 方法来检查执行是否已完成，并提取响应。


    这就是以下代码所做的：


    第 5 章 并发与异步编程 **package** com.domain.concurrency;


    **import** java.util.concurrent.Callable;


