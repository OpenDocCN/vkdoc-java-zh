    \n## Chapter 3: Play Controllers and HTTP Routing - Flash Scope\n\nThe flash scope\
    \ is similar to session but with the following differences.\n\nFirstly, **data\
    \ is kept for only one request**. For the first request, you set the flash scope,\
    \ and when user moves to the next page or section by making another request, this\
    \ data is available and can be retrieved in that request's process by a method\
    \ in the controller. Secondly, it uses unsigned cookie.\n\nBoth session and flash\
    \ scope uses browser cookies to achieve the behavior, and with flash scope the\
    \ cookie is an unsigned one. So don't use flash scope to store any sensitive data.\
    \ Use it only for storing success messages or error messages. Use the following\
