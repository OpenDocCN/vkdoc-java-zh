    **Enhancing the View**


    Let’s now enhance the hello.scala.html file to reuse the main template already
    available in the view folder. By using this template you will be able to get the
    common theming across pages because main.scala.html defines the common layout
    and style sheets.


    Go to the public/stylesheets folder and open main.css. This is the master style
    sheet for the application. You will make the background black and the text white
    in color:


