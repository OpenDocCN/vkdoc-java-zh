    \ actorSystem) {\n        // uses a custom thread pool defined in application.conf\n\
    \        super(actorSystem, \"database.dispatcher\");\n    }\n\n    @Singleton\n\
    \    public static class JdbcExample {\n        private Database db;\n       \
    \ private DatabaseExecutionContext executionContext;\n\n        @Inject\n    \
    \    public JdbcExample(Database db, DatabaseExecutionContext context) {\n   \
    \         this.db = db;\n            this.executionContext = executionContext;\n\
    \        }\n\n        public CompletionStage<Integer> updateSomething() {\n  \
    \          return CompletableFuture.supplyAsync(\n                () -> {\n  \
    \                  return db.withConnection(\n                        connection\
    \ -> {\n                            // perform the operations with the connection\n\
    \                            return 1;\n                        });\n        \
    \        }, executionContext);\n        }\n    }\n}\n```\n\nYou can see that this\
    \ code uses `ActorSystem` as a constructor argument. `ActorSystem` is part of\
    \ the Akka framework, and Play relies on Akka to implement the execution context\
    \ (part of `play.libs.concurrent.CustomExecutionContext` class used above). A\
    \ chapter on Akka is provided in this book and I recommend reading it if you are\
    \ new to Akka.\n\nTypically you don’t deal directly with connection-related activities.\
    \ It is a best practice to delegate the database activities to an ORM (object\
    \ relational mapping) layer. It is recommended to use ORM for database access\
    \ because it shields the programs from the complexities of persisting the object\
    \ and fetching the object to and from the underlying data store.\n\nORM brings\
    \ a rich object-oriented flavor to the code by enabling the programmer to concentrate\
    \ on the business rather than writing code for database access and related connection\
    \ management. An ORM layer is expected to generate efficient SQL statements given\
    \ a situation and is expected to shield the code from changes to the data store\
    \ or its structure.\n\nAn ORM layer can also provide some sort of cache such that\
    \ the actual database interaction happens only when absolutely necessary. Ebean,\
    \ the ORM that comes bundled with Play, is an excellent choice considering the\
    \ requirements stated above. You’ll explore the Ebean ORM in the following sections.\n\
    \n## Working with an ORM\n\nEbean is a lightweight, open source ORM and has a\
    \ developer-friendly API. Play supports integration with JPA and can be easily\
    \ configured to use Hibernate, iBatis or any other popular ORM. Let’s see how\
    \ to configure Hibernate as the JPA provider for Play 2 and then explore Ebean\
    \ in detail.\n\nIn order to understand Ebean and any other ORM, it is important\
    \ that you are well aware of the basic ORM concepts. A quick introduction to ORM\
    \ is given in the next section. If you are already familiar with ORM concepts,\
    \ you may skip this section.\n\n## ORM Concepts\n\nBefore the emergence of ORM,\
    \ the only option available was JDBC. The JDBC API allows all kinds of database\
    \ operations from Java. It supports updates, selects, database- and table-level\
    \ metadata queries, and much more. Gradually the Java community realized the difficulties\
    \ with this approach. The difficulties are:\n\n- Mismatch in representing the\
    \ object models and relational database models. RDMS represent data in a tabular\
    \ format whereas object-oriented languages like Java represent it as an interconnected\
    \ graph of objects.\n- State management: Synchronizing the state of the in-memory\
    \ object model with a relational database\n- Difficulties in modeling using pure\
    \ object-oriented domain models because there was no elegant way to sync the model\
    \ with the relational database\n- Duplicate and repetitive SQL code\n- Inefficient\
    \ data traversal\n- Ties the code to a particular database and SQL syntax\n- The\
    \ low-level SQL code gets embedded in the business logic\n- Difficult to cache\
    \ the data\n\nAn ORM framework tries to address these mismatches and acts as the\
    \ middleman in bridging these mismatches. The most important features required\
    \ from an ORM are the first three points; the rest are added advantages.\n\n-\
    \ No mismatch between the database model and the object model. ORM fixes this\
    \ mismatch.\n- ORM helps in state management by synchronizing the state of the\
    \ in-memory object model with a relational database.\n- ORM helps in modeling\
    \ by using pure object-oriented domain models and syncing the model with the database.\n\
    \nAs per my experience in building many systems over the years, if you are designing\
    \ your project such that it uses an object-oriented domain model and the data\
    \ store is relational, there is no other better choice than an ORM.\n\nIf you\
    \ are not particular about object-oriented design and the domain model, there\
    \ is no need for you to go for ORM. You may choose any other technology that helps\
    \ in persisting data to a database from Java.\n\nIf you are always thinking about\
    \ tables and rows and not thinking about domain objects, don’t waste your time\
    \ with ORM. It’s better to use some other technology that can help in persisting\
    \ data to RDMS from Java.\n\nBut if you are not using ORM, you are missing a lot\
    \ and you will end up writing a lot of plumbing code. Hence even for smaller projects,\
    \ go ahead with ORM and model your business objects appropriately. There is no\
    \ reason for not using ORM because almost all ORM implementations have matured\
    \ and can offer wider choices in data access and updates.\n\n## Key Terms\n\n\
    The possible relationships between entities in an object-oriented domain model\
    \ are:\n\n- One to one\n- One to many\n- Many to one\n- Many to many\n\n### One\
    \ to Many\n\nThe relationship between an `Order` and the `LineItems`. An order\
    \ may have many line items. So this is an example of one to many. If the `LineItem`\
    \ doesn't have a property referring to the `Order`, it is a unidirectional association.\n\
    \n### Many to One\n\nThe relationship from the perspective of `LineItem` to `Order`\
    \ is an example of many to one.\n\n### Many to Many\n\nThis can be explained easily\
    \ using the association between students and courses. A student can enroll in\
    \ multiple courses, and a course can be attended by many students. Hence this\
    \ is an example of many to many.\n\n### Relationship Direction\n\nThese relations\
    \ can be unidirectional or bidirectional. Unidirectional means you can access\
    \ the child only from the parent. Bidirectional means the parent and child can\
    \ be traversed from both ends. That is, each entity has a relationship field that\
    \ refers to the other entity.\n\nA bidirectional relationship has an owning side\
    \ and an inverse side whereas a unidirectional relation has only the owning side.\n\
    \nThe owning side of a relationship determines the updates to the relationship\
    \ in the database. An easier way to understand this is to consider that the entity\
    \ that contains the foreign key of the table is the owner and is responsible for\
    \ maintaining the relationship in the case of a bidirectional relationship.\n\n\
