    akka.util.ByteString getBodyAsBytes()


    • 获取响应的 HTTP 内容类型：


    java.lang.String getContentType()


    • 返回响应的 HTTP 状态码（200、404、201、500……）：


    int getStatus()


    • 返回 HTTP 状态码的文本表示（Ok、Not Found、Internal Server error……）：


    java.lang.String getStatusText()


    echoServices 方法使用 get 方法，该方法返回一个 CompletionStage<WSResponse> 对象。当你调用 get 时，你得到的只是一个代理对象。没有发生实际的调用。代理（CompletionStage）仅仅表示框架已经创建了一个将以非阻塞方式异步处理的任务。


    当调用发出并获得响应时，需要某种方式让应用程序代码得到通知并进行进一步处理。这是通过提供回调方法来实现的。这就是 echoService 中其余代码的用途。thenApply
    函数是一个回调函数。当后端服务返回响应时，Play 将使用 WSResponse 的实例调用此函数。


    第 6 章 Web 服务、JSON 和 XML


    **处理大型响应**


    当接收大型 HTTP 响应时，使用 get 将响应加载到内存中并不是一个好主意。如果响应很大，达到千兆字节级别，可能会导致内存错误，并可能使应用程序崩溃。在这种情况下，更好的选择是使用
    Akka 流式处理来增量消费响应。对于这种用例，WSResponse 提供了一个名为 getBodyAsSource 的方法：


    Source<ByteString, ?> responseBody = res.getBodyAsSource(); 此响应正文可以通过将其与 sink
    链接来处理。让我们看看这是如何完成的。


    对于此示例，我使用 mocky.io 在线服务创建了一个模拟响应。此服务允许你创建用于测试的模拟响应。转到 [www.mocky.io/v2/5e08df833000005b0081a159](http://www.mocky.io/v2/5e08df833000005b0081a159)。此
    URL 返回一个简单的 HTML 响应。让我们使用 Play 和 Akka 流式处理以异步、非阻塞和高效的方式处理此响应。预期的输出是以增量方式计算内容的长度，一旦所有处理完成，将响应发送给客户端。要使用
    Akka 流式处理，你需要在控制器类中获取 Akka ActorSystem 和 Akka 流式处理 materializer 类的引用。目前，只需理解 materializer
    是 Akka 流工作的辅助类。它是负责物化 Akka 流处理管道的类。如果你对 Akka 和异步编程完全陌生，可以快速阅读本书的第 8 章，了解 Akka
    的基础知识，然后再回到本节。在进入代码之前，你需要理解两个术语：


    第 6 章 Web 服务、JSON 和 XML


    • **Source**：产生数据的元素。例如，可以创建一个 source 来流式传输来自 Twitter feed 的数据，或者一个用于读取目录中文件或
    Web 服务的 source。


    • **Sink**：数据的最终接收者。例如，你可以从 source 读取数据，进行一些转换，然后写回文件。在这种情况下，保存到文件就是 sink。在 Akka
    流中，你连接 source 和 sink，并在其间执行转换和数据过滤。有了这些信息，让我们开始编写代码。


    你将在 Application.java（控制器类）中添加一个新方法，即 processLargeResponse。此方法使用 Akka 流式处理语义从 REST
    端点读取数据，并计算数据的大小。你不会读取整个响应然后计数；相反，数据是以块的形式读取的，并且计数会更新。


    **package** controllers;


    **import** actors.ActorModel;


