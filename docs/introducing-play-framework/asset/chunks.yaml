    ***图 1-2.** 项目结构*


    **app**


    app 文件夹包含您所有的服务器端源文件。这包括您所有的 Java 代码、Scala 代码、动态 Scala HTML 模板、数据库访问相关代码等。默认情况下，Play
    在 app 文件夹内创建两个文件夹：controllers 和 views。这些名称不言自明。controllers 文件夹保存您的控制器类，views 保存动态屏幕（HTML
    和 Scala 代码片段）。


    您可以自由地在 app 文件夹内创建子目录，以便更好地组织您的文件。例如，您可以创建一个 models 文件夹来保存所有 ORM 映射的 POJO，一个名为
    helper 的文件夹来保存您的辅助类等。


    第 1 章 Play 2 入门


    大多数项目在 app 文件夹下将具有以下结构：

    app

    └ assets: 编译后的资源源文件

    └ stylesheets: 用于 CSS 源代码（less CSS 源文件）

    └ javascripts: 这通常是放置 coffeescript 源文件的文件夹。

    └ controllers: 应用程序控制器

    └ models: 应用程序业务层

    └ views: 模板


    **conf**


    conf 文件夹保存 Play 应用程序使用的配置。它包含所有 HTTP 映射、orm 配置、环境变量、日志记录等。


    基本上，conf 目录包含配置和国际化文件，而 app 文件夹则有一个用于其模型定义的子目录。


    此目录中最重要的文件是


    • application.conf: 应用程序的主配置文件，它包含标准配置参数。


    • routes: 将 HTTP URL 路径映射到控制器中的方法。处理所有 HTTP 路由配置。


    • logback: Play 使用 logback 进行所有日志记录配置，这是您需要更改以配置 logback 的文件。


    第 1 章 Play 2 入门


    **build.sbt**


    Play 的构建配置在两个地方定义：项目根目录中的 build.sbt 文件和在 /project 文件夹中找到的两个文件。build.sbt 文件包含构建配置。


    **project**


    project 文件夹包含项目构建配置：


    • plugins.sbt: 定义此项目使用的 sbt 插件


    • build.properties: 包含用于构建您的应用程序的 sbt 版本以及相关的 sbt 构建信息。


    我将在后面进一步讨论 sbt。当您使用 Play 时，对 sbt 有基本的了解是很好的。


    **public**


    public 文件夹托管所有静态文件，如 Javascript、图像和 CSS 样式表，这些文件由 Web 服务器直接提供。public 文件夹有三个子文件夹：images、javascripts
    和 stylesheets，用于存储这些资源：

    public

    └ stylesheets: CSS 文件 (.css 扩展名)

    └ javascripts: JavaScript 文件 (.js 文件)

    └ images: 图像


    **lib**


    lib 文件夹默认不创建。但您可以创建此文件夹并将任何 jar 放入其中。此文件夹中的所有 jar 都将添加到应用程序类路径中。这对于包含需要在 Play
    构建系统之外管理的第三方依赖项非常理想。


    第 1 章 Play 2 入门


    **test**


    test 文件夹是存储所有单元测试和功能测试用例的地方。


