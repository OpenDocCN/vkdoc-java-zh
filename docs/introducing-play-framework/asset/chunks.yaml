    P. K. Karunakaran, *Introducing Play Framework*,


    `doi.org/10.1007/978-1-4842-5645-9_6`


    第 6 章 Web 服务、JSON 和 XML


    “Promise，也称为 **CompletableFuture**，是一种在并发、异步编程场景中广泛使用的设计模式。Promise 代表某些在创建 promise
    时未知的响应的代理。Promise 是一种编写异步代码的方式，使其看起来像是同步执行。”使用 promise 是一种避免在处理异步函数调用时遇到回调地狱的方法。每当我提到
    promise 时，除非另有明确说明，否则它指的是 promise 设计模式。


    **消费 Web 服务**


    让我们通过示例来学习。你将在控制器中构建一个新方法，该方法调用 Web 服务并将响应返回给客户端。


    这个新服务只是回显来自后端服务的响应。


