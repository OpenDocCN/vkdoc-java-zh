    Typically you don’t deal directly with connection-related activities.


    It is a best practice to delegate the database activities to an ORM (object relational
    mapping) layer. It is recommended to use ORM for database access because it shields
    the programs from the complexities of persisting the object and fetching the object
    to and from the underlying data store.


    ORM brings a rich object-oriented flavor to the code by enabling the programmer
    to concentrate on the business rather than writing code for database access and
    related connection management. An ORM layer is expected to generate efficient
    SQL statements given a situation and is expected to shield the code from changes
    to the data store or its structure.


    An ORM layer can also provide some sort of cache such that the actual database
    interaction happens only when absolutely necessary. Ebean, the ORM that comes
    bundled with Play, is an excellent choice considering the requirements stated
    above. You’ll explore the Ebean ORM in the following sections.


    Chapter 7 aCCessing Databases


    **Working with an ORM**


    Ebean is a lightweight, open source ORM and has a developer-friendly API. Play
    supports integration with JPA and can be easily configured to use Hibernate, iBatis
    or any other popular ORM. Let’s see how to configure Hibernate as the JPA provider
    for Play 2 and then explore Ebean in detail.


    In order to understand Ebean and any other ORM, it is important that you are well
    aware of the basic ORM concepts. A quick introduction to ORM is given in the next
    section. If you are already familiar with ORM


    concepts, you may skip this section.


    **ORM Concepts**


    Before the emergence of ORM, the only option available was JDBC. The JDBC API
    allows all kinds of database operations from Java. It supports updates, selects,
    database- and table-level metadata queries, and much more. Gradually the Java
    community realized the difficulties with this approach. The difficulties are


    • Mismatch in representing the object models and


    relational database models. RDMS represent data in a


    tabular format whereas object-oriented languages like


    Java represent it as an interconnected graph of objects.


    • State management: Synchronizing the state of the in-


    memory object model with a relational database


    • Difficulties in modeling using pure object-oriented


    domain models because there was no elegant way to


    sync the model with the relational database


    • Duplicate and repetitive SQL code


    • Inefficient data traversal


    • Ties the code to a particular database and SQL syntax


    Chapter 7 aCCessing Databases


    • The low-level SQL code gets embedded in the business logic


    • Difficult to cache the data


    An ORM framework tries to address these mismatches and acts as the middleman in
    bridging these mismatches. The most important features required from an ORM are
    the first three points; the rest are added advantages.


    • No mismatch between the database model and the


    object model. ORM fixes this mismatch.


    • ORM helps in state management by synchronizing the


    state of the in-memory object model with a relational


    database.


    • ORM helps in modeling by using pure object-oriented


    domain models and syncing the model with the


    database.


    As per my experience in building many systems over the years, if you are designing
    your project such that it uses an object-oriented domain model and the data store
    is relational, there is no other better choice than an ORM.


    If you are not particular about object-oriented design and the domain model, there
    is no need for you to go for ORM. You may choose any other technology that helps
    in persisting data to a database from Java.


    If you are always thinking about tables and rows and not thinking about domain
    objects, don’t waste your time with ORM. It’s better to use some other technology
    that can help in persisting data to RDMS from Java.


    But if you are not using ORM, you are missing a lot and you will end up writing
    a lot of plumbing code. Hence even for smaller projects, go ahead with ORM and
    model your business objects appropriately. There is no reason for not using ORM
    because almost all ORM implementations have matured and can offer wider choices
    in data access and updates.


    Chapter 7 aCCessing Databases


    **Key Terms**


    The possible relationships between entities in an object-oriented domain model
    are


    • One to one


    • One to many


    • Many to one


    • Many to many


    **One to Many**


    The relationship between an Order and the LineItems. An order may have many line
    items. So this is an example of one to many. If the LineItem doesn''t have a property
    referring to the Order, it is a unidirectional association.


    **Many to One**


    The relationship from the perspective of LineItem to Order is an example of many
    to one.


    **Many to Many**


    This can be explained easily using the association between students and courses.
    A student can enroll in multiple courses, and a course can be attended by many
    students. Hence this is an example of many to many.


    **Relationship Direction**


    These relations can be unidirectional or bidirectional. Unidirectional means you
    can access the child only from the parent. Bidirectional means the parent and
    child can be traversed from both ends. That is, each entity has a relationship
    field that refers to the other entity.


    Chapter 7 aCCessing Databases


    A bidirectional relationship has an owning side and an inverse side whereas a
    unidirectional relation has only the owning side.


    The **owning side of a relationship determines the updates to the** **relationship
    in the database.** An easier way to understand this is to consider that the entity
    that contains the foreign key of the table is the owner and is responsible for
    maintaining the relationship in the case of a bidirectional relationship.


    For instance, Order has foreign keys to the line items so it is the owner of the
    relationship.


    A bidirectional relationship should follow these rules:


    • The inverse side of a bidirectional relationship must


    refer to its owning side by using the mappedBy element of


    the @OneToOne, @OneToMany, or @ManyToMany annotation.


    The mappedBy element designates the property or field in


    the entity that is the owner of the relationship.


    • The many side of many-to-one bidirectional


    relationships must not define the mappedBy element. The


    many side is always the owning side of the relationship.


    • For one-to-one bidirectional relationships, the


    owning side corresponds to the side that contains the


    corresponding foreign key.


    • For many-to-many bidirectional relationships, either


    side may be the owning side.


    The entity that contains the foreign key is the owner, and the child entities
    are the inverse side. The child entity should contain the mappedBy annotation.
    When entities are linked by relationships, it is also important to specify the
    appropriate cascade settings. For example, a line item is part of an order; if
    the order is deleted, the line item also should be deleted.


    This is called a cascade-delete relationship. I hope you have now attained a quick
    knowledge of working with ORM.


