    **Code Snippets Templating Basics**


    Play views use a template engine called Twirl. By using a template engine, a view
    can render any markup like HMTL, XML, and CSV with ease, even though for most
    of the web applications we only use HTML.


    For example, in all the examples you only used HTML markup, so you named your
    views as {name}.scala.html. The general syntax for naming views is {name}.scala.{ext},
    where ext can be html, js, xml, or txt. Thus you can keep different markup versions
    of the same page and, depending on the context, the controller may render the
    appropriate view. This lets you show HTML to a specific client and the XML markup
    to another client.


    Play’s template engine, Twirl, is designed in such a way that it makes front-end
    developers comfortable while working with dynamic parts of code. The HTML expert
    only bothers about the HTML markup in the template whereas another member may
    just deal with iterating the dynamic elements and so on. The simple Twirl syntax
    makes the code much easier to read and work with. Let’s explore the most common
    Play templating elements.


