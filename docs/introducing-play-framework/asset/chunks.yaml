    **第 9 章**


    **使用 Play 模块**


    一个 Play 应用程序可以由多个应用模块组装而成。


    这有助于在多个应用程序中重用应用组件。模块还有助于将大型应用程序拆分为多个较小的应用程序。


    模块只是另一个 Play 应用程序。模块可以引入特定于功能的能力，例如添加不同的持久化机制、集成其他视图技术或集成新的缓存框架。


    自 Play 2.5.x 以来，模块框架进行了改造。在 Play 中，模块和库之间没有太大区别。唯一真正的区别在于模块直接使用 Play API。Play
    模块使用依赖注入框架来工作。如果你想编写一个自定义的 Play 模块，可以使用任何依赖注入框架来实现。


    请注意，Play 使用 guice 作为其默认的依赖注入框架。


    但模块不应与任何特定的依赖注入框架绑定，而应以与依赖框架无关的方式工作。为此，Play 提供了一个轻量级的 Bindings API，用于将模块与底层依赖注入框架解耦。


    依赖关系在组件中使用 @Inject 注解声明。例如，如果一个控制器类依赖于 WSClient 模块，它应该使用 @Inject WSClient 语法进行声明。Play
    会使用底层的依赖注入框架自动完成依赖类的装配。


