    the plugins.sbt file:


    addSbtPlugin("com.typesafe.sbt" % "sbt-play-ebean" % "5.0.2") You are done with
    the changes to the build settings!


    The typical library dependency format is


    libraryDependencies += groupID % artifactID % revision


    For example,


    libraryDependencies += "org.apache.derby" % "derby" %


    "10.4.1.3"


    You can find the groupId and artifactId of any jar by visiting Maven Central Repository
    at [https://mvnrepository.com/repos/central](https://mvnrepository.com/repos/central)
