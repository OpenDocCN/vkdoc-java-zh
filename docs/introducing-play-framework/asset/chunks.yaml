    Chapter 3 play Controllers and http routing **Flash Scope**


    The flash scope is similar to session but with the following differences.


    Firstly, **data is kept for only one request**. For the first request, you set
    the flash scope, and when user moves to the next page or section by making another
    request, this data is available and can be retrieved in that request’s process
    by a method in the controller. Secondly, it uses unsigned cookie.


    Both session and flash scope uses browser cookies to achieve the behavior, and
    with flash scope the cookie is an unsigned one. So don’t use flash scope to store
    any sensitive data. Use it only for storing success messages or error messages.
    Use the following code to add data to the flash scope: public Result about() {


    return redirect("/company").flashing("aboutinfo",


    "about info requested");


    }


    When a request arrives, data with the key “aboutinfo” is added to the flash scope
    and is redirected to the company page. In the company page, the controller method
    mapped to the /company URL can access this data as public Result companyinfo(Http.Request
    request) {


    return ok(request.flash().get("aboutinfo").orElse ("Company Name"));


    }


