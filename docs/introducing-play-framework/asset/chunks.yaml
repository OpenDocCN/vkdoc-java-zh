    **CHAPTER 1**


    **Getting Started**


    **with Play 2**


    After reading the introductory section on Play 2, you should now have an idea
    of the capabilities of Play Framework and how it can accelerate Java web development.
    This chapter is about


    • Installing Play Framework


    • Setting up Play Framework on your machine


    • Configuring Play Framework


    • Creating the first sample project


    • Setting up the IDE


    **Getting Ready**


    All you need is a browser and Internet connectivity. You can install Play on a
    wide variety of operating systems, including Microsoft Windows, Linux, and Mac.
    The operating system should have Java installed.


    **Installation**


    Play just needs the Play jars available at runtime to work, hence you can include
    the Play jars in any application using Maven or any such build tool.


    © Prem Kumar Karunakaran 2020


    P. K. Karunakaran, *Introducing Play Framework*,


    [https://doi.org/10.1007/978-1-4842-5645-9_1](#index_split_000.html#p14)


