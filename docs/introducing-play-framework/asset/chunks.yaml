    **准备工作**


    您只需要一个浏览器和互联网连接。您可以在多种操作系统上安装 Play，包括 Microsoft Windows、Linux 和 Mac。操作系统应已安装 Java。


    **安装**


    Play 只需要在运行时提供 Play jar 即可工作，因此您可以使用 Maven 或任何此类构建工具将 Play jar 包含在任何应用程序中。


