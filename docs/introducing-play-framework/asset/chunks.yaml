- fmt: "# Redis\n- Integrates Redis to provide a cache implementation\n\n# Deadbolt\n\
    - Role-based authorization\n\n# PDF\n- Adds support for PDF output based on HTML\
    \ templates\n\nThere are many more such modules available and you can find more\
    \ information about them by visiting [www.playframework.org](http://www.playframework.org).\n\
    \n## Chapter 10: Application Settings and Error Handling\n\nBefore Play 2.6, the\
    \ practice was to use a global object to define application-level configurations\
    \ and processing logic like filtering, error handling, etc. This approach was\
    \ deprecated in Play 2.5.x and dropped since Play 2.6.x. The recommended approach\
    \ since Play 2.6.x is to use dependency injection. Hence I won’t go into the details\
    \ of the approach followed prior to 2.6.x and instead will direct your attention\
    \ to the dependency injection approach. I will give you an example at the end\
    \ of this section so that you are aware how it was done before, which will be\
    \ helpful if you’re migrating an older Play framework project to the newer version.\n\
    \nThe main class of a Play application is `play.Application`. This class is created\
    \ by Play Framework during a Play application start up. You need not do anything\
    \ special to make it happen; it’s handled by the framework.\n\nYou can hook various\
    \ application-level behaviors by binding handlers to specific instances of classes\
    \ using dependency injection. This is the recommended approach to configure application-level\
    \ bindings in Play.\n\nLet’s look at examples to understand this in more depth.\n\
    \n© Prem Kumar Karunakaran 2020  \nP. K. Karunakaran, *Introducing Play Framework*,\
    \  \n[https://doi.org/10.1007/978-1-4842-5645-9_10](#index_split_001.html#p173)\n\
    \n### Filters\n\nA filter is intended for applying cross-cutting concerns of the\
    \ application to all classes, such as logging, inspecting security headers, compressing\
    \ the response, analytics etc. These are some of the places where a filter is\
    \ useful. Play also has something known as action composition and it is intended\
    \ to be used in situations where the concern is specific to a route.\n\nFor example,\
    \ you may decide to secure certain routes and allow public access to all other\
    \ routes. In such a case, for specific routes you may need to check authentication/authorization\
    \ semantics. For such cases, use action composition. You will look more into action\
    \ composition in later sections of this chapter. Let’s focus on filters first.\n\
    \n#### Logging Filter:\n\n```java\npackage config;\n\nimport akka.event.LoggingFilter;\n\
    import akka.stream.Materializer;\nimport java.util.concurrent.CompletionStage;\n\
    import java.util.function.Function;\nimport org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\n\
    import play.mvc.Filter;\nimport play.mvc.Http;\nimport play.mvc.Result;\nimport\
    \ javax.inject.Inject;\n\n/**\n * A simple filter implementation that logs how\
    \ long it took to process a request\n */\npublic class ApplicationFilter extends\
    \ Filter {\n\n    @Inject\n    public ApplicationFilter(Materializer mat) {\n\
    \        super(mat);\n    }\n\n    private static final Logger log = LoggerFactory.getLogger(LoggingFilter.class);\n\
    \n    @Override\n    public CompletionStage<Result> apply(Function<Http.RequestHeader,\n\
    \            CompletionStage<Result>> next,\n                                \
    \        Http.RequestHeader requestHeader) {\n        long startTime = System.currentTimeMillis();\n\
    \        return next\n                .apply(requestHeader)\n                .thenApply(\n\
    \                        result -> {\n                            long endTime\
    \ = System.currentTimeMillis();\n                            long requestTime\
    \ = endTime - startTime;\n                            log.info(\n            \
    \                        \" {} {} took {}ms to complete and produced the status\
    \ {}\",\n                                    requestHeader.method(),\n       \
    \                             requestHeader.uri(),\n                         \
    \           requestTime,\n                                    result.status());\n\
    \                            return result;\n                        });\n   \
    \ }\n}\n```\n\nThe `ApplicationFilter` class extends from the `play.mvc.Filter`\
    \ and overrides the `apply` method. The `apply` method takes two parameters:\n\
    1. A function that takes `Http.RequestHeader` as a parameter and returns `CompletionStage<Result>`\
    \ as the output\n2. `Http.RequestHeader`: The request header of the incoming request"
