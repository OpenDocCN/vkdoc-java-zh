    **错误处理器**


    如你所知，Play 是一个 HTTP 应用框架，这样的应用可能会遇到两种类型的错误：


    1.  客户端错误

    2.  服务器错误


    **客户端错误**


    客户端错误是由于调用者或连接的客户端犯错导致的，例如客户端没有发送 `Content-Type` 头、没有使用正确的 HTTP 方法、使用了无效的 URL
    等。在所有这些情况下，Play 会自动检测到错误并重定向到错误页面。


    **服务器错误**


    服务器错误是由于服务器端出现问题导致的，例如资源不足、崩溃、应用程序类生成的错误（如空指针）、代码抛出其他形式的异常等。Play 通过捕获这些服务器错误并生成错误页面来智能地处理它们。


