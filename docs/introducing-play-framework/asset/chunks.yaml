    第 6 章 Web 服务、JSON 和 XML


    以下是 WSResponse API 常用的方法：


    • 将正文作为字节数组获取：


    byte[] asByteArray()


    • 将正文作为 JSON 节点获取：


    com.fasterxml.jackson.databind.JsonNode asJson()


    • 将正文作为 XML 返回：


    org.w3c.dom.Document asXml()


