    这里你使用一个 while 循环来持续检查完成状态，一旦准备就绪，数据被消费并退出循环。请注意，isDone 是一个非阻塞方法，因此你在使用它时不会阻塞线程。Future
    API 中还有一个名为 get 的方法；它是一个阻塞方法，它会阻塞主线程直到响应到达。


    你可以尝试 get 的另一种变体，它接受一个超时时间： String result =future.get();


    String result =future.get(10, TimeUnit. *SECONDS*);


    **使用 Play 进行异步编程**


    对于任何需要良好扩展的项目来说，异步处理请求的能力是选择框架的一个非常重要的因素。同步处理大量并发请求会消耗服务器资源，并且在某些极端情况下，如果容量规划不当，可能导致服务器停止运行。


    来自 Web 服务器的正常页面请求通常是同步的，并且很多时候它们是先前渲染页面的缓存副本。但情况并非总是如此；有许多应用程序需要执行大量昂贵的处理才能将结果返回给客户端。在这种情况下，显然客户端必须等待结果到达，但服务器可以——实际上确实——在另一个执行线程中异步处理，从而释放稀缺的服务器资源。


    第 5 章 并发与异步编程 Play 优雅地做到了这一点。服务器端非阻塞的 Play 操作应返回 CompletionStage<Result> 而不是普通的
    Result 对象。CompletionStage 是一个承诺，即结果将在稍后某个时间可用。CompletionStage 接口的妙处在于它提供了大量的方法来附加回调，以便在结果可用时对其进行处理。


    Web 客户端在等待响应时会被阻塞，但服务器上不会有任何阻塞，并且服务器资源可用于服务其他客户端。


    **编写异步应用程序**


    让我们找一个场景来更好地理解这一点。考虑一个基于个人 Facebook 资料推荐礼物的应用程序。此应用程序使用个人资料中公开可用的数据，然后在线搜索以收集与其兴趣匹配的礼物。在线搜索和组合礼物列表是昂贵的操作，可能会给服务器带来很大负担。因此，这段代码是异步编程的理想候选：


    **public** CompletionStage<Result> recomendGifts(**final** String uid, **final**
    String age, **final** String relation) {


    **return** CompletableFuture. *supplyAsync*(**this**::getGifts)


    .thenApply(( List<GiftVO> gift) -> *ok*(**"已获取 "** +


    gift));


    }


    **private** List<GiftVO> getGifts() {


    List<GiftVO> gifts =**new** ArrayList<GiftVO>(); gifts.add(**new** GiftVO());


    **return** gifts;


    }


    第 5 章 并发与异步编程 在这段代码中，私有方法 getGifts 负责查找礼物并返回礼物列表。当然，对于这个例子，我模拟了响应。在现实场景中，礼物可能基于个人的社交资料或愿望清单或类似的逻辑。该逻辑不在我们的讨论范围内；我们只关注异步编程语义。


    公共方法 recomendGifts 使用 java.util.concurrent 包中的 Completable<Future> 接口异步调用 getGifts
    方法。这是通过代码段 CompletableFuture.supplyAsync(this::getGifts) 完成的。


    下一步是检查是否有响应，并在可用时对响应进行进一步处理，然后将其发送回客户端。这就是 thenApply 方法所做的。


    **配置异步定时任务**


    Play 使用 Akka 来处理异步任务。为了理解 Play 中的任务，需要具备 Akka 的基础知识。


    **Akka 基础**


    Akka 的官方定义是“一个用于在 JVM 上构建**高并发、分布式和容错**事件驱动应用程序的工具包和运行时。”


    Akka 引入了 actor 模型抽象，并提供了一个更好的平台来构建正确、并发和可扩展的应用程序。这意味着它解决了编写多线程、高并发代码的困难。Akka 使用消息流模型来实现这一点。


    Actor 模型并不是一个新概念。这个想法是由 Carl Hewitt、Peter Bishop 和 Richard Steiger 在 1973 年提出的。


    Java 中传统的并发编程涉及许多线程协同工作。当它们需要对共享资源进行操作时，通过获取共享对象上的锁来完成。程序直接处理获取锁、使用后释放锁等底层任务。这种代码难以维护且容易出错；很多时候可能导致死锁。另一个痛点是跨
    JVM 水平扩展。Akka 试图使用 actors、ActorRef 和 ActorSystem 来抽象这些低级编程方法。Actors 为透明分布提供了抽象，并为真正可扩展和容错的应用程序奠定了基础。


    第 5 章 并发与异步编程 这是否意味着 Akka 中没有线程和锁？嗯，它们确实存在，但你不直接处理它们。在内部，一切都在轻量级线程和低级并发原语上运行。Akka
    使用 java.util.concurrency 库来处理协调。


    Akka 是用 Scala 编写的，并为 Scala 和 Java 提供了语言绑定。让我们首先了解什么是 actor。Actor 只是一个可以接收消息并采取行动处理消息的对象。它与生成消息的源严格解耦。


    要使用 Akka actors，你需要做的第一件事是启动 ActorSystem。ActorSystem 是与 actors 交互的基本实体，负责 actor
    生命周期管理，并且是 Akka 应用程序的入口点。当 Play 应用程序启动时，ActorSystem 变得可用，并且可以通过依赖注入在需要与 ActorSystem
    交互的类中访问。


    我们只会了解如何通过 Akka 在 Play 中调度异步任务。我们不会详细介绍 Play 中 Akka actor 系统的内部结构或配置。这些信息可以从 Play
    框架的官方文档中轻松获得。


    **import** akka.actor.ActorSystem;


    **import** scala.concurrent.ExecutionContext;


    **import** scala.concurrent.duration.Duration;


    **import** javax.inject.Inject;


    **import** java.util.concurrent.TimeUnit;


    第 5 章 并发与异步编程 **public class** ScheduledTask {


    **private final** ActorSystem **actorSystem**;


    **private final** ExecutionContext **executionContext**;


    @Inject


    **public** ScheduledTask(ActorSystem actorSystem,


    ExecutionContext executionContext) {


    **this**. **actorSystem** = actorSystem;


    **this**. **executionContext** = executionContext;


    **this**.initialize();


    }


    **private void** initialize() {


    **this**. **actorSystem**


    .scheduler()


    .scheduleAtFixedRate(


    Duration. *create*(30 TimeUnit. ***SECONDS***),


    *// initialDelay*


    Duration. *create*(1, TimeUnit. ***MINUTES***),


    *// interval*


    () -> **actorSystem**.log().info(**"当前时间毫秒数 "** +System. *currentTimeMillis*()),
    **this**. **executionContext**);


    }


    }


    此示例演示了如何调度一个任务，该任务将在 30 秒后运行，然后每隔一分钟运行一次。代码使用依赖注入来获取默认 ActorSystem 和 ExecutionContext
    的引用，然后使用 ActorSystem 的 scheduler 方法在定义的间隔内执行代码。


    **第 6 章**


    **Web 服务、JSON**


    **和 XML**


    现代应用程序不仅暴露 Web 服务，它们还消费其他第三方 Web 服务。例如，你的应用程序可能消费 Facebook 或 Twitter 的 feed。大多数现代
    Web 服务都使用处理 JSON 负载的 REST API 暴露。调用 Web 服务的一个典型问题是它们可能会阻塞调用者，并可能导致服务器阻塞，直到获得响应或发生超时。这不是一个特别好的设计，因为它会影响服务器的吞吐量，并可能导致违反
    SLA。Play 2 通过提供异步、非阻塞的 API 来调用长时间运行的任务（如外部 Web 服务）解决了这个问题。Play 提供了 play.libs.ws
    库来处理异步 Web 服务调用。由 play.libs.ws 发出的调用返回 CompletionStage<WSResponse>。之后，你可以使用 CompletionStage
    接口中可用的回调函数来提取响应。


    本质上，它们是异步回调方法。调用者发出 Web 服务调用，一旦响应可用，其余代码就会运行。你将在本章后面更详细地探讨这一点。


    **注意** 在接下来的内容中，我将经常使用术语 *promise*。因此，理解什么是 promise 及其意图非常重要。


