    To migrate to the latest Play version, you should write custom filters and include
    the logic in those filters or error handlers. You learned both of these things
    at the beginning of this chapter.


    **CHAPTER 11**


    **Working with Cache**


    Caching is one of the most important aspects in ensuring the scalability and responsiveness
    of the application. A good cache can take load off your database and can serve
    the user pretty fast. A framework that doesn’t provide a good abstraction to work
    with cache is no longer fit for enterprise-class development. Play, with its in-built
    support for cache, is an ideal framework for building highly scalable, responsive,
    enterprise- class applications.


    Play provides a global cache object and it works with the underlying cache implementation.
    This abstraction enables you to change your caching provider without any modification
    to your application code. By default, Play comes with a Cache API implementation
    using Caffeine and also provides implementation for EhCache 2.x. For in-process
    processing, Play recommends using Caffeine.


    **Configuring Caffeine**


    Caffeine is a high performance, near-optimal caching library and is based on Java
    8.


    The following are Caffeine’s important features at a glance:


    • Automatic loading of entries into the cache, optionally


    asynchronously


    • Size-based eviction when a maximum is exceeded


    based on frequency and recency


    © Prem Kumar Karunakaran 2020


    P. K. Karunakaran, *Introducing Play Framework*,


    [https://doi.org/10.1007/978-1-4842-5645-9_11](#index_split_001.html#p185)


    Chapter 11 Working With CaChe


    • Time-based expiration of entries, measured since last


    access or last write


    • Asynchronously refresh when the first stale request for


    an entry occurs


    • Keys automatically wrapped in weak references


    • Values automatically wrapped in weak or soft


    references'
