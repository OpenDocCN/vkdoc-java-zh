  trans: "\n# 提供给应用程序的日志记录器：\n\nlogger.application=DEBUG\n\n**控制器**\n\nPlay 中的控制器实现了\
    \ MVC 设计模式中的控制器元素。您已经了解到，每个 Play 请求都会通过 `conf/routes` 文件中定义的 HTTP 路由配置映射到一个操作。在所有这些配置中，您都可以看到名为\
    \ `Application` 的控制器的使用。\n\n这样做只是为了方便，因为 Play 会自动在控制器文件夹中创建一个名为 `Application`\
    \ 的类。您完全可以创建另一个类并使用它。\n\n一个控制器将相关的操作组合在一起。您可以根据应用程序的功能，创建任意数量的控制器。以书店应用程序为例，您可以定义一个\
    \ `BookController` 来处理所有面向用户的交互，并定义一个 `BackOfficeController` 来定义所有被称为后台功能的操作，例如维护库存、向系统添加书籍、为书籍添加图片等。将功能分组到不同的控制器中有助于提高应用程序的可维护性和模块化程度。\n\
    \n在 Play 中，控制器类继承自 `play.mvc.Controller`。您可以定义一个返回 `Result` 的操作方法：\n\n```java\n\
    public Result index() {\n    return ok(\"Hello World.\");\n}\n```\n\n`Result`\
    \ 本质上就是返回给客户端的 HTTP 响应。\n\n操作方法也可以接受参数，这些参数会根据 `conf/routes` 文件中定义的路由逻辑进行解析：\n\
    \n```java\npublic Result saveRating(String bookid, int rating) {\n    // 保存评分的逻辑\n\
    \    return ok(\"success\");\n}\n```\n\n一个典型的 HTTP 响应包含状态码、标头和正文。Play 提供了大量的辅助方法来生成各种\
    \ HTTP 响应。例如，上面代码片段中展示的 `ok()` 方法会向客户端发送一个 HTTP 200 响应。类似地，Play 还提供了 `notFound()`、`badRequest()`、`internalServerError()`\
    \ 等方法来返回各种类型的 HTTP 响应。这些辅助方法定义在 `play.mvc.Results` 类中。由于您编写的控制器继承自 `Controller`\
    \ 类，而 `Controller` 类又继承自 `Results` 类，因此您的控制器默认可以使用所有这些方法。\n\n以下是一个向客户端返回内部服务器错误的示例：\n\
    \n```java\nResult response = internalServerError(\"Server Error\");\n```\n\n另一个需要理解的重要事项是如何将请求重定向到另一个\
    \ URL 或另一个操作。这在 Play 中也非常简单。它提供了一个 `redirect` 方法来实现：\n\n```java\npublic Result\
    \ hello() {\n    return redirect(\"/book/login/\");\n}\n```\n\n这会将用户重定向到登录页面。此方法会向浏览器发送\
    \ HTTP 状态码 303。\n\n**完成 Bookshop 控制器**\n\n现在，让我们为书店应用程序的 `Application` 控制器添加所有必需的方法并进行测试。路由配置如下所示：\n\
    \n```\n# 首页\nGET     /bookshop                          controllers.Application.index\n\
    \n# 显示书籍详情\nGET     /bookshop/book/:id/                controllers.Application.getBook(id:String)\n\
    ```\n"
- fmt: "# Add a comment to the book\n\n`POST /bookshop/book/save/comment/` `controllers.Application.saveComment(request:Request)`\n\
    \n# Search a book by Title\n\n`GET /bookshop/book/search/` `controllers.Application.searchByTitle(keyword:String)`\n\
    \nNow the application controller (`Application.java`):\n\n```java\npackage controllers;\n\
    \nimport javax.inject.Inject;\n\nimport play.mvc.*;\nimport play.data.DynamicForm;\n\
    import play.data.FormFactory;\n\npublic class Application extends Controller{\n\
    \n    /**\n     * Process the home page\n     * @return\n     */\n    public Result\
    \ index() {\n        return ok(views.html.bookshop.render());\n    }\n\n    /**\n\
    \     * Get the details of a book by id\n     * @param id\n     * @return\n  \
    \   */\n    public Result getBook(String id) {\n        return ok(views.html.bookshop.render());\n\
    \    }\n\n    @Inject\n    FormFactory formFactory;\n\n    /**\n     * Accept\
    \ a form post and save the comment\n     * Shows the usage of dynamic forms to\
    \ retrieve data from html form posts\n     * @return\n     */\n    public Result\
    \ saveComment(Http.Request request) {\n        DynamicForm requestData = formFactory.form().bindFromRequest(request);\n\
    \        String comment = requestData.get(\"comment\");\n        return ok(views.html.savecomment.render());\n\
    \    }\n\n    public Result searchByTitle(String title) {\n        //Query db\
    \ and get the book details or get from cache\n        return ok(views.html.searchresults.render());\n\
    \    }\n}\n```\n\n## `saveComment` Method\n\nThe `saveComment` method handles\
    \ the form post action used to save reviews. In Play, there are many ways to handle\
    \ and bind form post data to model classes. The above method demonstrates how\
    \ to dynamically get data from forms using the `DynamicForm` class.\n\nThe most\
    \ common approach is to define a class (model) for the form data and wrap it with\
    \ `play.data.Form` in a controller. Play will auto-bind the form fields to the\
    \ model attributes. For instance,\n\n```java\npackage models;\n\nimport javax.persistence.Entity;\n\
    import javax.persistence.Id;\nimport javax.persistence.Table;\n\n@Entity\n@Table(name=\"\
    comment\")\npublic class Comment {\n    @Id\n    private Long id;\n    private\
    \ String comment;\n\n    public String getComment() {\n        return comment;\n\
    \    }\n\n    public void setComment(String comment) {\n        this.comment =\
    \ comment;\n    }\n}\n```\n\nSave this file as `Comment.java` inside the `models`\
    \ package.\n\nTake a look at the `Application.java` class show above. In that\
    \ class, you have injected the `FormFactory` and supplied it with the comment\
    \ model. The data binding of the form data to the model class will thus be handled\
    \ automatically by Play Framework.\n\nRelevant portions of the code from the `Application.java`\
    \ file that perform the automatic binding of form data to the model class are\
    \ as follows:\n\n```java\n@Inject\nFormFactory formFactory;\n\nDynamicForm requestData\
    \ = formFactory.form().bindFromRequest(request);\nString comment = requestData.get(\"\
    comment\");\n```\n\n### Testing the `saveComment` Action\n\nAny HTTP test client\
    \ can be used to test this action. In this book, Postman is used to test the services.\
    \ Postman is a platform that helps in testing HTTP endpoints adhering to REST,\
    \ SOAP, and more. For testing via the command line, you can use `curl`. You can\
    \ download Postman from [www.getpostman.com](http://www.getpostman.com/). See\
    \ Figure 3-2.\n\n![Figure 3-2](index-72_1.jpg)\n\n**Figure 3-2.** Testing `saveComment`\n\
    \nTo test from a command prompt, use the `curl` command:\n\n```bash\ncurl --location\
    \ --request POST 'http://localhost:9000/bookshop/book/save/comment/' --form 'comment=Good\
    \ Book'\n```\n\n## Models\n\nSince Play Framework follows the MVC principle, you\
    \ should make sure that the controller layer is as thin as possible. Don’t put\
    \ any business logic in your controller. All your business logic should be done\
    \ in your model or other helper classes. The convention in Play is to define your\
    \ models inside the `app/models` folder.\n\nBy default, Play will create the `views`\
    \ and `controllers` folders inside the `app`. The generally followed practice\
    \ is to implement the model as JPA entities. In this chapter, we will just annotate\
    \ the models with JPA annotations; we won’t do any JPA configuration or persistence\
    \ implementation. In later chapters in this book, we will explore JPA in detail.\n\
    \n```java\npackage models;\n\nimport javax.persistence.*;\n\n@Entity\n@Table(name=\"\
    book\")\npublic class Book extends Model {\n    @Id\n    private String id;\n\
    \    private String name;\n    private String author;\n\n    public String getId()\
    \ {\n        return id;\n    }\n\n    public void setId(String id) {\n       \
    \ this.id = id;\n    }\n}\n```\n\n## Scoped Objects\n\nIn any web application,\
    \ data may need to be maintained across different pages of the application so\
    \ as to maintain a conversational session with the user of the application. In\
    \ certain cases, you may need to scope the data to only the next request and not\
    \ the entire session. Play provides support for both cases. The controller class\
    \ is responsible for storing and accessing scoped objects.\n\nPlay Framework provides\
    \ two kinds of scoped objects:\n\n- Session scope\n- Flash scope\n\nData stored\
    \ in the session scope spans multiple HTTP requests and is available during the\
    \ whole user session. Data stored in the flash scope is only available to the\
    \ next request.\n\nPlay implements the above two scopes by means of cookies and\
    \ therefore it enforces a size limit of 4 KB. You can only store string values\
    \ in these scopes.\n\n### Session Scope\n\nIn Play, there is no timeout for session.\
    \ A session expires when the user closes the browser. But if your application\
    \ needs to configure a timeout, it can be done by adding the session configuration\
    \ in the `application.conf` file as follows:\n\n**`application.conf`**\n\n```\n\
    play.http {\n  session {\n    # Sets the max-age field of the cookie to 5 minutes.\n\
    \  }\n}\n```"
