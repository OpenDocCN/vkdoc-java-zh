    This will start a splash screen and will install conscript. Ignore any error related
    to not finding ‘cs.’ Typically, conscript will get installed in the C:\Users\username\.conscript
    folder in Windows, where *username* is the home folder of the logged-in user in
    Windows. This location will be shown in the splash screen.


    Now let’s set up the environment variables for conscript:


    export **CONSCRIPT_HOME**=" C:\Users\username\.conscript"


    export **CONSCRIPT_OPTS**="-XX:MaxPermSize=512M -Dfile.encoding=UTF-8"


    export **PATH**=%PATH%;%CONSCRIPT_HOME%\bin


    CONSCRIPT_HOME is where conscript will download various files. For example, in
    Windows, it will be C:\Users\username\.


    PATH is your OS’s path variable. This will make the command cs available from
    everywhere.


