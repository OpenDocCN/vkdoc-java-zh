    **Asynchronous Programming with Play**


    The ability to handle requests asynchronously is a very important factor in choosing
    a framework for any project that has to scale well. Synchronous processing of
    a large number of concurrent requests can eat up server resources and, in certain
    extreme cases, if the capacity planning is not well done, can bring the server
    to a halt.


    Normal page requests from a web server are typically synchronous and many times
    they are cached copies of the previous rendered page.


    But this is not the scenario always; there are many applications that do a lot
    of expensive processing to return results to the client. In such cases, obviously
    the client has to wait for the result to arrive, but the server can—in fact, does—the
    processing asynchronously in another thread of execution and frees up the scarce
    server resources.


    Chapter 5 ConCurrenCy and asynChronous programming Play does this elegantly. A
    Play action that is non-blocking at the server should return a CompletionStage<Result>
    instead of the normal Result object. The CompletionStage is a promise that the
    result will be available after some time. The beauty of the CompletionStage interface
    is that it provides a vast selection of methods to attach callbacks to in order
    to process the result once it becomes available.


    The web client will be blocked while waiting for the response but nothing will
    be blocked on the server, and server resources can be used to serve other clients.


    **Writing an Asynchronous App**


    Let’s find a scenario to understand this better. Consider an application that
    recommends gifts based on a person’s Facebook profile. This application uses the
    data publicly available in the person’s profile and then searches online to gather
    gifts matching their interests. The searching online and composing the gift list
    are expensive operations that can be very heavy on the server. So this piece of
    code is a good candidate for asynchronous programming:


    **public** CompletionStage<Result> recomendGifts(**final** String uid, **final**
    String age, **final** String relation) {


    **return** CompletableFuture. *supplyAsync*(**this**::getGifts)


    .thenApply(( List<GiftVO> gift) -> *ok*(**"Got "** +


    gift));


    }


    **private** List<GiftVO> getGifts() {


    List<GiftVO> gifts =**new** ArrayList<GiftVO>(); gifts.add(**new** GiftVO());


    **return** gifts;


    }


    Chapter 5 ConCurrenCy and asynChronous programming In this code, the private method
    getGifts deals with finding the gifts and returning the list of gifts. Of course,
    I have mocked the response for this example. In a real-world scenario, the gifts
    might be based on a person’s social profile or wish list or similar logic. That
    logic is not in our scope; we are focusing only on asynchronous programming semantics.


    The public method recomendGifts invokes the getGifts method asynchronously using
    the Completable<Future> interface that is part of the java.util.concurrent package.
    This is done by the code segment CompletableFuture.supplyAsync(this::getGifts).


    The next step is to check whether you have a response and when it is available
    do further processing on the response and then send it back to the client. That
    is what the thenApply method does.


    **Configuring Asynchronous Scheduled Jobs**


    Play uses Akka to work with asynchronous jobs. In order to understand jobs in
    Play, a basic knowledge of Akka is required.


    **Akka Basics**


    The official definition of Akka is that it’s “a toolkit and runtime for building
    **highly concurrent, distributed, and fault tolerant** event-driven applications
    on the JVM.”


    Akka introduces the actor model abstraction and provides a better platform to
    build correct, concurrent, and scalable applications. This means that it solves
    the hardships of writing multi-threaded, highly concurrent code. Akka uses a message
    flow model to achieve this.


    The actor model is not a new concept. The idea was introduced in 1973


    by Carl Hewitt, Peter Bishop, and Richard Steiger.


    Traditional concurrent programming in Java involves many threads working together.
    When they need to work on a shared resource, it is done by acquiring locks on
    the shared object. The program deals directly with 84


    Chapter 5 ConCurrenCy and asynChronous programming the low-level tasks of getting
    locks, releasing them after use, and so on.


    This kind of code is hard to maintain and is error prone; many times it can lead
    to deadlocks. Another pain point is in scaling horizontally across JVMs. Akka
    tries to abstract these low-level programming methodologies using actors, ActorRefer,
    and ActorSystem. Actors provide the abstraction for transparent distribution and
    the basis for truly scalable and fault-tolerant applications.


    Does this means there are no threads and locking with Akka? Well, they are there,
    but you don’t directly deal with them. Internally everything runs on lightweight
    threads and low-level concurrency primitives. Akka uses the java.util.concurrency
    library to handle the coordination.


    Akka is written in Scala with language bindings provided for both Scala and Java.
    Let’s first understand what an actor is. An actor is just an object that can receive
    messages and take an action to handle the messages. It is strictly decoupled from
    the source that generates the message.


    To use the Akka actors, the first thing you need is to start the ActorSystem.
    The ActorSystem is the fundamental entity for interacting with actors and is responsible
    for actor life cycle management and is the entry point of an Akka application.
    When a Play application is started, an ActorSystem becomes available and can be
    accessed using dependency injection in classes that need to interact with the
    ActorSystem.


    We will only look at how to schedule asynchronous jobs in Play via Akka. We won’t
    be detailing out the internals or the configuration of Akka actor system in Play.
    This information is readily available from the official Play Framework documentation.


    **import** akka.actor.ActorSystem;


    **import** scala.concurrent.ExecutionContext;


    **import** scala.concurrent.duration.Duration;


    **import** javax.inject.Inject;


    **import** java.util.concurrent.TimeUnit;


    Chapter 5 ConCurrenCy and asynChronous programming **public class** ScheduledTask
    {


    **private final** ActorSystem **actorSystem**;


    **private final** ExecutionContext **executionContext**;


    @Inject


    **public** ScheduledTask(ActorSystem actorSystem,


    ExecutionContext executionContext) {


    **this**. **actorSystem** = actorSystem;


    **this**. **executionContext** = executionContext;


    **this**.initialize();


    }


    **private void** initialize() {


    **this**. **actorSystem**


    .scheduler()


    .scheduleAtFixedRate(


    Duration. *create*(30 TimeUnit. ***SECONDS***),


    *// initialDelay*


    Duration. *create*(1, TimeUnit. ***MINUTES***),


    *// interval*


    () -> **actorSystem**.log().info(**"Time in**


    **millis now "** +System. *currentTimeMillis*()), **this**. **executionContext**);


    }


    }


    This example shows how to schedule a task that is to be run 30 seconds from now
    and then every minute after. The code uses dependency injection to get a reference
    to the default ActorSystem and ExecutionContext, and then uses the scheduler method
    of the ActorSystem to execute the code in the defined intervals.


    **CHAPTER 6**


    **Web Services, JSON,**


    **and XML**


    Modern applications not only expose web service, they also consume other third-party
    web services. For example, your application may consume a Facebook or Twitter
    feed. Most modern web services are exposed using REST APIs that handle JSON payloads.
    A typical problem with calling web services is that they can block the caller
    and can result in blocking the server until a response is obtained or a timeout
    occurs. This is not a particularly good design because it can affect the throughput
    of the server and can result in missed SLAs. Play 2 has solved this problem by
    providing asynchronous, non-blocking APIs to invoke long-running tasks like an
    external web service. Play provides the play.libs.ws library to handle asynchronous
    web service calls. A call made by play.libs.ws returns CompletionStage<WSResponse>.
    Later you can extract the response by using callback functions available in the
    CompletionStage interface.


    Essentially they are asynchronous callback methods. The caller makes a web service
    call and, once the response is available, the rest of the code runs. You will
    explore this in more detail later in this chapter.


    **Note** Going forward, I will use the term *promise* quite often. Hence it is
    important to understand what a promise is and what its intent is.


