    them since the 2.5.0 version and dependency injection is now the recommended way.
    The example below is just to show how it was done in earlier Play versions. Please
    note that the below code will work only in Play versions 2.5.x and below; it won’t
    work with Play 2.8.x, which is the version this book is based on. The code is
    just for reference in case you want to migrate from an earlier Play version to
