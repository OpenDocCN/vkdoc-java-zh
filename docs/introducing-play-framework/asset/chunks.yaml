    **第 11 章**


    **使用缓存**


    缓存是确保应用程序可扩展性和响应性的最重要方面之一。一个好的缓存可以减轻数据库的负载，并能非常快速地响应用户。一个不能提供良好缓存抽象层的框架已不再适合企业级开发。Play
