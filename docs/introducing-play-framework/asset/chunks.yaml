    **处理 XML**


    处理 XML 与上述处理 JSON 的情况非常相似。使用默认的正文解析器将传入的 XML 请求正文转换为 Object 以便于处理就足够了。需要考虑的重要因素是传入的
    Content-Type 头应该是 application/xml 或 text/xml。默认情况下，原始 XML 被转换为有效的 W3C Document
    对象： Document dom = request().body().asXml();


    这里使用默认的正文解析器将 XML 字符串转换为可解析的 Object。


    要创建 XML 响应，你应该使用有效的 JAXB 实现，或者对于非常简单的 XML，你甚至可以只返回一个 XML 结构中的字符串。使用字符串操作手动构建 XML
    是不可扩展或不可维护的，因此请使用适当的 JAXB 实现。在 Play 框架中，你不需要添加额外的库，因为 Play 已经通过 JDK 支持 JAXB。让我们看看这两种方式。示例
    1 展示了简单的 XML 解析，示例 2 使用了 JAXB。


