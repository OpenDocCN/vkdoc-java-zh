    **Processing Large Responses**


    When receiving large HTTP responses, it is not a good idea to use get to load
    the response into memory. If the response is big and in the order of gigabytes,
    it can result in memory errors and can potentially crash the application. In such
    cases, the better choice is to use Akka streaming to consume the response incrementally.
    For this use case, WSResponse provides a method named getBodyAsSource:


    Source<ByteString, ?> responseBody = res.getBodyAsSource(); This response body
    can be processed by chaining it with a sink. Let’s see how this is done.


    For this example, I have created a mock response using the mocky.


    io online service. This service lets you create mock responses for testing.


