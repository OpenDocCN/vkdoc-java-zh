    in the Jackson API to extract the data in the JSON request.


    You can ask Play to process only the JSON body as a request and reject anything
    that is not valid with an HTTP 400 response code. For this, just annotate the
    method with @BodyParser.Of (BodyParser.Json.class).


    This is the better way to process an incoming JSON request body.


