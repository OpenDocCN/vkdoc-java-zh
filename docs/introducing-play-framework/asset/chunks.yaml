- fmt: "# Logger provided to your application:\n\n`logger.application=DEBUG`\n\n##\
    \ Controllers\n\nControllers in Play model the controller element of the MVC design.\
    \ You have already seen how every Play request is mapped to an action using the\
    \ HTTP routing configuration defined in the `conf/routes` file. In all these configurations,\
    \ you can see the use of a controller named `Application`.\n\nThis is done just\
    \ for convenience because Play automatically creates a class named `Application`\
    \ in the controller folder. You can very well create another class and use it.\n\
    \nA controller groups related actions together. You can create any number of controllers\
    \ as you wish depending on your application’s functionality. In the case of a\
    \ bookshop application, you can define a `BookController` to handle all public-facing\
    \ interactions with the user and define a `BackOfficeController` to define all\
    \ actions that are termed back-office functionalities like maintaining the inventory,\
    \ adding a book to the system, adding images to the book, etc. Grouping the functionalities\
    \ into different controllers will help in better maintainability and modularization\
    \ of your application.\n\nIn Play, the controller class extends from `play.mvc.Controller`.\
    \ You can define an action method that returns a `Result`:\n\n```\npublic Result\
    \ index() {\n    return ok(\"Hello World.\");\n}\n```\n\nThe `Result` is nothing\
    \ but an HTTP response back to the client.\n\nAn action method can also take parameters,\
    \ and these parameters are resolved as per the routing logic defined in the `conf/routes`\
    \ file:\n\n```\npublic Result saveRating(String bookid, int rating) {\n    //logic\
    \ to save rating\n    return ok(\"success\");\n}\n```\n\nA typical HTTP response\
    \ consists of a status code, headers, and a body. Play provides plenty of helper\
    \ methods to produce all kinds of HTTP responses. For example, the `ok()` method\
    \ shown in the code snippet above sends an HTTP 200 response back to the client.\
    \ Similarly, Play provides methods like `notFound()`, `badRequest()`, `internalServerError()`,\
    \ etc. to return all variations of HTTP responses. These helper methods are defined\
    \ in the `play.mvc.Results` class. Since the controller you write is extending\
    \ from the `Controller` class that extends the `Results` class, all these methods\
    \ are available to your controller by default.\n\nHere is an example to return\
    \ an internal server error to the client:\n\n```\nResult response = internalServerError(\"\
    Server Error\");\n```\n\nAnother important thing to understand is how to redirect\
    \ a request to another URL or to another action. This is also fairly simple with\
    \ Play. It provides a `redirect` method to do so:\n\n```\npublic Result hello()\
    \ {\n    return redirect(\"/book/login/\");\n}\n```\n\nThis redirects the user\
    \ to the login page. This method sends the HTTP status code 303 to the browser.\n\
    \n## Finishing the Bookshop Controller\n\nLet’s now add all the required methods\
    \ to the `Application` controller for the bookshop application and test it. The\
    \ routes look like this:\n\n```\n# Home Page\nGET /bookshop controllers.Application.index\n\
    \n# Show details of a Book\nGET /bookshop/book/:id/ controllers.Application.getBook(id:String)\n\
    ```"
