    **Templating with Scala**


    By default, views in Play are HTML and they can be made dynamic using the Scala
    expression language. In fact, you can return a JSON or XML


    response as well if necessary. Let’s focus first on HTML Scala views and how the
    Play template engine helps you to create modular, expressive, and fluid views.
    Even though the template engine uses Scala as the expression language, this is
    not a problem for Java developers. The Scala language used in templates is very
    simple. As you saw in Chapter [1](#index_split_000.html#p14), the template engine
    used by Play is Twirl. Recall that the template files must be named {name}.scala.{ext}.
    The ext can be html, js, xml, etc. Play prefers convention or configuration. When
    you compile, the compiler will generate Scala source files and they will be compiled
    along with the rest of the source code.


    Like all other classes in Play, the template is also compiled on the fly and you
    can see errors directly in the browser. You should keep in mind that a template/view
    is not a place to write complex logic. Write all your presentation-related logic
    in the controller or the helper classes. All your business logic should be in
    your business entity classes.


    © Prem Kumar Karunakaran 2020


    P. K. Karunakaran, *Introducing Play Framework*,


    [https://doi.org/10.1007/978-1-4842-5645-9_4](#index_split_000.html#p77)


    ChApteR 4 plAy Views And templAting with sCAlA Most of the time you will only
    access data from your model objects.


    Stated another way, the Scala template language only gives limited options to
    write complex logic; its purpose is to provide a simpler means to access data
    in the model. This is by design to limit developers from writing complex code
    embedded in the views.


    **Key point** Remember that the view is just to access data stored in the model.
    All logic, even something like maintaining a counter, is the job of the controller
    or presentation helper classes.


