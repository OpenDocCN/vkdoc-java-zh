    ## Chapter 4: Play Views and Templating with Scala\n\nBy default, views in Play\
    \ are HTML and they can be made dynamic using the Scala expression language. In\
    \ fact, you can return a JSON or XML response as well if necessary. Let's focus\
    \ first on HTML Scala views and how the Play template engine helps you to create\
    \ modular, expressive, and fluid views. Even though the template engine uses Scala\
    \ as the expression language, this is not a problem for Java developers. The Scala\
    \ language used in templates is very simple. As you saw in Chapter 1, the template\
    \ engine used by Play is Twirl. Recall that the template files must be named `{name}.scala.{ext}`.\
    \ The `ext` can be `html`, `js`, `xml`, etc. Play prefers convention or configuration.\
    \ When you compile, the compiler will generate Scala source files and they will\
    \ be compiled along with the rest of the source code.\n\nLike all other classes\
    \ in Play, the template is also compiled on the fly and you can see errors directly\
    \ in the browser. You should keep in mind that a template/view is not a place\
    \ to write complex logic. Write all your presentation-related logic in the controller\
    \ or the helper classes. All your business logic should be in your business entity\
    \ classes.\n\n© Prem Kumar Karunakaran 2020\nP. K. Karunakaran, *Introducing Play\
    \ Framework*,\n[https://doi.org/10.1007/978-1-4842-5645-9_4](#index_split_000.html#p77)\n\
    \n### Chapter 4: Play Views and Templating with Scala\n\nMost of the time you\
    \ will only access data from your model objects. Stated another way, the Scala\
    \ template language only gives limited options to write complex logic; its purpose\
    \ is to provide a simpler means to access data in the model. This is by design\
    \ to limit developers from writing complex code embedded in the views.\n\n**Key\
    \ point**: Remember that the view is just to access data stored in the model.\
    \ All logic, even something like maintaining a counter, is the job of the controller\
    \ or presentation helper classes.\n\n### Composite Views\n\nRemember that a Play\
    \ view is named following the convention `viewname.scala.html`. For instance,\
    \ you can create a view for the footer and name it as `footer.scala.html`. Let's\
    \ examine the following page to understand this better:\n\n```html\n<!DOCTYPE\
    \ html PUBLIC \"-//W3C//DTD HTML 4.01 Transitional//EN\"\n    \"http://www.w3.org/TR/html4/loose.dtd\"\
    >\n<html>\n<head>\n    @header(\"Home Page\")\n</head>\n<body>\n    <div class=\"\
    container\">\n        <!-- Home Page content goes here -->\n    </div>\n    <div>\n\
    \        @footer()\n    </div>\n</body>\n</html>\n```\n\n### Chapter 4: Play Views\
    \ and Templating with Scala\n\nIn this example, the home page uses two views to\
    \ create a composite view. Take a note of the following: the header and footer\
    \ are included from another view; the simplicity of incorporating the header and\
    \ footer views; no complex configurations; just the use of `@` symbol followed\
    \ by the name of the view. You will find this simplicity all over Play Framework;\
    \ it's one of the important goals of Play Framework.\n\nThe header view declares\
    \ that it takes a `String` (title) as a parameter:\n\n```scala\n@(title:String)\n\
    <meta http-equiv=\"Content-Type\" content=\"text/html; charset=ISO-8859-1\">\n\
    <title>@title</title>\n```\n\nThis parameter is supplied by the caller to render\
    \ the page title. The parameter can be given a default value if required:\n\n\
    ```scala\n@(title : String =\"Book Home\")\n```\n\n### `@` Special Character\n\
    \nScala templates use `@` as the special character. Every time this character\
    \ is encountered, it indicates the beginning of a dynamic statement. The end of\
    \ the dynamic statement is automatically inferred by the Scala engine. Sometimes\
    \ you may need to write multi-line statements and for that you can enclose the\
    \ dynamic code in curly brackets or braces:\n\n```scala\n@(dynamic code)\n@{ dynamic\
    \ code }\n```\n\n### Chapter 4: Play Views and Templating with Scala - Designing\
    \ a General Template\n\nLet's design the general template for all of your pages.\
    \ For the sake of explanation, let's keep it very simple. All of your pages will\
    \ have following content:\n\n- Header\n- Main Content\n- Footer\n\nLet's define\
    \ this template as `main.scala.html`:\n\n```scala\n@(title:String)(content:Html)\n\
    <!DOCTYPE html PUBLIC \"-//W3C//DTD HTML 4.01 Transitional//EN\"\n    \"http://www.w3.org/TR/html4/loose.dtd\"\
    >\n<html>\n<head>\n    @header(title)\n</head>\n<body>\n    @content\n    @footer()\n\
    </body>\n</html>\n```\n\nNotice that along with the title, the template takes\
    \ another parameter: `content` (of type `Html`). This is to incorporate HTML code\
    \ into the template. The above template is like a method that takes two arguments:\
    \ a title parameter and the HTML content.\n\nLet's create a view that uses this\
    \ template. The welcome view passes the two parameters from `main.scala.html`\
    \ to the template to render the view. Please note that the HTML (the second parameter\
    \ to the template) is passed inside the `{}`:\n\n### Chapter 4: Play Views and\
    \ Templating with Scala\n\n```scala\n@maintemplate(\"welcome page\") {\n    <div>\n\
    \        <h3>This is the welcome page</h3>\n    </div>\n}\n```\n\nThe view (`welcome.scala.html`)\
    \ uses the main template to introduce the page structure involving a header, the\
    \ body, and a footer. If your views are complex, split them into multiple templates\
    \ and compose the views with the help of these templates.\n\nThe rule is to keep\
    \ recurring portions of the code in a separate template file. The Scala templating\
    \ structure used in Play is more powerful and simpler than many existing templating\
    \ engines, for example Tiles.\n\n### Code Snippets: Templating Basics\n\nPlay\
    \ views use a template engine called Twirl. By using a template engine, a view\
    \ can render any markup like HTML, XML, and CSV with ease, even though for most\
    \ of the web applications we only use HTML.\n\nFor example, in all the examples\
    \ you only used HTML markup, so you named your views as `{name}.scala.html`. The\
    \ general syntax for naming views is `{name}.scala.{ext}`, where `ext` can be\
    \ `html`, `js`, `xml`, or `txt`. Thus you can keep different markup versions of\
    \ the same page and, depending on the context, the controller may render the appropriate\
    \ view. This lets you show HTML to a specific client and the XML markup to another\
    \ client.\n\nPlay's template engine, Twirl, is designed in such a way that it\
    \ makes front-end developers comfortable while working with dynamic parts of code.\
    \ The HTML expert only bothers about the HTML markup in the template whereas another\
    \ member may just deal with iterating the dynamic elements and so on. The simple\
    \ Twirl syntax makes the code much easier to read and work with. Let's explore\
    \ the most common Play templating elements.\n\n### Chapter 4: Play Views and Templating\
    \ with Scala - Comments\n\n```scala\n@***************\n* A comment block\n****************@\n\
    ```\n\n### Template Parameters\n\nA template can take any number of parameters.\
    \ It can take common Java types or custom user-defined types. For instance, consider\
    \ `@(booklist <- List[models.Book])`. Here the template takes a list of book objects:\n\
    \n```scala\n@(booklist <- List[models.Book])\n@main(\"Book List\") {\n    @for(book\
    \ <- booklist){\n        <div>@book.getTitle()</div>\n        <div>@book.getAuthor()</div>\n\
    \    }\n}\n```\n\nIn this example, the template accepts a `List` of `Book`s as\
    \ the parameter and iterates the book and passes the HTML content to the `main.scala.html`\
    \ file for rendering. Please note that you explored the `main.scala.html` file\
    \ in previous chapters. Here is how it looks:\n\n```scala\n@*\n* This template\
    \ is called from the `index` template. This template\n* handles the rendering\
    \ of the page header and body tags. It takes\n* two arguments, a `String` for\
    \ the title of the page and an `Html`\n* object to insert into the body of the\
    \ page.\n*@\n@(title: String)(content: Html)\n```\n\n### Chapter 4: Play Views\
    \ and Templating with Scala\n\n```html\n<!DOCTYPE html>\n<html lang=\"en\">\n\
    <head>\n    @* Here's where we render the page title `String`. *@\n    <title>@title</title>\n\
    \    <link rel=\"stylesheet\" media=\"screen\" href=\"@routes.Assets.versioned(\"\
    stylesheets/main.css\")\">\n    <link rel=\"shortcut icon\" type=\"image/png\"\
    \ href=\"@routes.Assets.versioned(\"images/favicon.png\")\">\n</head>\n<body>\n\
    \    @* And here's where we render the `Html` object containing\n    * the page\
    \ content. *@\n    @content\n    <script src=\"@routes.Assets.versioned(\"javascripts/main.js\"\
    )\" type=\"text/javascript\"></script>\n</body>\n</html>\n```\n\nYou can provide\
    \ default values to the template parameters using the syntax:\n\n```scala\n@(title:\
    \ String =\"Book Home\")\n```\n\n### Import Statement\n\nConsider the code `@(booklist\
    \ <- List[models.Book])`. You might have noticed that the type is explicitly defined\
    \ with its fully qualified package name. This becomes tedious and difficult to\
    \ maintain when the number of parameters increases. Scala templates let you import\
    \ the packages into the view so that you can refer to the classes by just their\
    \ name.\n\n### Chapter 4: Play Views and Templating with Scala\n\nSyntax:\n\n\
    ```scala\n@import packagename._\n```\n\nExample:\n\n```scala\n@import models._\n\
    ```\n\nYou should use the import statement as the beginning of the template. If\
    \ you declare it anywhere else, the compiler will throw an exception. The best\
    \ place is to define the import just after the parameter declaration.\n\n### Iterating\
    \ a List\n\nSyntax:\n\n```scala\n@for(localvariable <- variable refering the List)\
    \ {\n    @localvariable.method()\n}\n```\n\nLet's take the example of displaying\
    \ the top N books on the home page. You can name the model as `Book`; it contains\
    \ the methods `getTitle` and `getPicture`:\n\n```scala\n@(booklist <- List[models.Book])\n\
    @for(book <- booklist){\n    <div>@book.getPicture()</div>\n    <div>@book.getTitle()</div>\n\
    }\n```\n\n### Iterating a Map\n\nSyntax:\n\n```scala\n@for((key, value) <- mapreference)\
    \ {\n    Key is @key\n    Value is @value\n}\n```\n\n### Chapter 4: Play Views\
    \ and Templating with Scala\n\nLet's take the example of iterating a `Map` having\
    \ a `String` as a key and a `List` as its value. Your map holds the author name\
    \ as the key and a list of books by the author as its value:\n\n```scala\n@(title:\
    \ String, authorbookMap: Map[String, List[Book]])\n@import models._\n<!DOCTYPE\
    \ html>\n<html>\n<head>\n    @header(\"Main Home Page\")\n</head>\n<body>\n  \
    \  @for((key, value) <- authorbookMap){\n        Author - @key\n        @for(book\
    \ <- value){\n            <div>\n                @book.getTitle()\n          \
    \  </div>\n        }\n    }\n</body>\n</html>\n```\n\n### If Blocks\n\nSyntax:\n\
    \n```scala\n@if(condition){\n} else {\n}\n```\n\nThe `if` block is nothing special.\
    \ It is the standard Scala `if` block.\n\n### Chapter 4: Play Views and Templating\
    \ with Scala - Escaping Dynamic Contents\n\nBy default, the dynamic content generated\
    \ by the Scala code snippets is escaped. This means it will behave as a plain\
    \ text when the view is rendered. But if you need to output dynamic raw content,\
    \ you can use the `@Html` tag.\n\nSyntax:\n\n```scala\n@Html(code / variable)\n\
    ```\n\n## Chapter 5: Concurrency and Asynchronous Programming\n\nBefore you dive\
    \ deeper into Play, it is very important to have a good knowledge of concurrency\
    \ and asynchronous programming in Java. This is essential because the examples\
    \ in the chapters ahead will use lot of asynchronous programming practices.\n\n\
    Let's first understand the `java.util.concurrent` package, the core module in\
    \ Java for dealing with concurrent programming. Knowing this will help in relating\
    \ to how Play handles asynchronous web services using `WS` and `Promise` classes.\
    \ You may skip this chapter if you are already familiar with concurrency, its\
    \ challenges, and how Java handles it using the new classes available in the `java.util.concurrent`\
    \ package since JDK 1.5.\n\nConcurrent programming is now a lot easier in Java\
    \ with the introduction of new classes in the `java.util.concurrent` package.\
    \ The most important classes to focus on are:\n\n1. `Executor`\n2. `Callable<V>`\n\
    3. `Future<V>`\n4. `CompletionStage<T>`\n\n© Prem Kumar Karunakaran 2020\nP. K.\
    \ Karunakaran, *Introducing Play Framework*,\n[https://doi.org/10.1007/978-1-4842-5645-9_5](#index_split_000.html#p87)\n\
    \n### Chapter 5: Concurrency and Asynchronous Programming\n\nBefore looking into\
    \ each of the above classes in detail, let's take a quick look at what concurrency\
    \ is.\n\n### What Is Concurrency?\n\nConcurrency is a technique that enables the\
    \ execution of several tasks in parallel. These tasks can be parts of the same\
    \ program or different programs. If a big task can be split into small chunks\
    \ and if each of those chunks can be executed in parallel, it can result in better\
    \ response times and throughput.\n\nWhen different parts of a program are run\
    \ in parallel, usually lightweight processes called threads are used. The moment\
    \ you use threads, you need to have proper mechanisms to allow access to shared\
    \ resources, proper management of thread life cycles, scheduling, etc. The classes\
    \ in the `java.util.concurrent` package help with many of these challenges.\n\n\
    ### Executor\n\nBefore the introduction of the `Executor` framework in JDK 1.5,\
    \ thread management was the responsibility of the developer and there was no framework\
    \ for that in JDK. Developers handled the creation of the threads and their management\
    \ along with the actual business logic. From a design and coding perspective,\
    \ this is not an ideal situation, when you take into account the benefits gained\
    \ by following a \"separation of concerns\" design idea.\n\nIt makes sense to\
    \ separate out the thread management and creation from the rest of the program,\
    \ and that is what the `Executor` framework does. An `Executor` abstracts thread\
    \ management activities like creation, scheduling, etc. Instead of directly creating\
    \ a thread, a `Runnable` class is submitted to an `Executor` and it handles its\
    \ execution. `ExecutorService`, a more refined interface than `Executor`, is used\
    \ in practical scenarios because it provides support for `Callable` and `Future`.\
    \ You will look at `Callable` and `Future` in the coming sections. Note: `ExecutorService`\
    \ extends from `Executor`.\n\n### Chapter 5: Concurrency and Asynchronous Programming\n\
    \nThe `java.util.concurrent` package provides three `Executor` interfaces:\n\n\
    - `Executor`: A simple interface that supports launching new tasks\n- `ExecutorService`:\
    \ A subinterface of `Executor` that adds features to help manage the life cycle,\
    \ both of the individual tasks and the executor itself\n- `ScheduledExecutorService`:\
    \ A subinterface of `ExecutorService` that supports future and/or periodic execution\
    \ of tasks\n\n`ThreadPoolExecutor`, `ScheduledThreadPoolExecutor`, and `ForkJoinPool`\
    \ are some of the important `Executor` implementations available in JDK.\n\nAt\
    \ a high level, writing concurrent programs using the `Executor` framework involves\
    \ the following:\n\n1. Define a class/task that implements either a `Runnable`\
    \ or `Callable` interface.\n2. Configure and implement `ExecutorService` and submit\
    \ the task.\n3. Use the `Future` class to retrieve the result if the task is a\
    \ `Callable` task.\n\nLet's look at the difference between a `Runnable` and `Callable`.\
    \ A `Runnable` interface does not return a result whereas a `Callable` allows\
    \ for return values after completion. When a `Callable` is submitted to the `Executor`\
    \ framework, it returns an object of type `java.util.concurrent.Future`. The `Future`\
    \ can be used to retrieve results.\n\n### Chapter 5: Concurrency and Asynchronous\
    \ Programming - Example 1: Using Runnable\n\n```java\npackage com.domain.concurrency;\n\
    \npublic class SimpleTask implements Runnable {\n    @Override\n    public void\
    \ run() {\n        System.out.println(\"SimpleTask, Runnable: Executing Logic\
    \ \" + System.currentTimeMillis());\n    }\n}\n```\n\nThe `SimpleTask` class is\
    \ the portion of logic that you want to execute in parallel by many clients. This\
    \ logic is implemented in the `run` method and it prints the `currentTime` in\
    \ milliseconds. In a traditional Java practice, in order to execute this in parallel\
    \ by many clients, you need to create threads for each client and run those threads,\
    \ along with thread coordination, stopping, etc. You also need to ensure that\
    \ you don't create an unnecessary number of threads, and the threads should be\
    \ reused. All of this adds to the complexity of concurrent programming and this\
    \ where the `ExecutorService` helps because it takes care of all those aspects.\
    \ Let's now create a client and ask it to run the `SimpleTask` in many threads:\n\
    \n```java\npackage com.domain.concurrency;\n\nimport java.util.concurrent.ExecutorService;\n\
    import java.util.concurrent.Executors;\n\npublic class Client {\n    public static\
    \ void main(String[] args) {\n        // Step1 : Create a Runnable\n        Runnable\
    \ simpleTask = new SimpleTask();\n        // Step 2: Configure Executor\n    \
    \    // Uses FixedThreadPool executor\n        ExecutorService executor = Executors.newFixedThreadPool(2);\n\
    \        for (int i = 0; i < 10; i++) {\n            executor.submit(simpleTask);\n\
    \        }\n        executor.shutdown();\n    }\n}\n```\n\n### Chapter 5: Concurrency\
    \ and Asynchronous Programming\n\nThe code is very simple but it does a lot. You\
    \ create an instance of `SimpleTask`, create the `ExecutorService`, and initialize\
    \ it with a thread pool having two threads. Then you submit the task to the `ExecutorService`.\
    \ `ExecutorService` takes care of the execution of the ten requests with the two\
    \ threads it has in an efficient way.\n\nRun `Client.java` as:\n\n```\njava com.domain.concurrency.Client\n\
    ```\n\n**Output:**\n\n```\nSimpleTask, Runnable: Executing Logic 1578145676485\n\
    SimpleTask, Runnable: Executing Logic 1578145676485\nSimpleTask, Runnable: Executing\
    \ Logic 1578145676486\nSimpleTask, Runnable: Executing Logic 1578145676486\nSimpleTask,\
    \ Runnable: Executing Logic 1578145676486\nSimpleTask, Runnable: Executing Logic\
    \ 1578145676486\nSimpleTask, Runnable: Executing Logic 1578145676486\nSimpleTask,\
    \ Runnable: Executing Logic 1578145676486\nSimpleTask, Runnable: Executing Logic\
    \ 1578145676486\nSimpleTask, Runnable: Executing Logic 1578145676486\n```\n\n\
    By inspecting the output, you can see the time repeats in a pattern of two, meaning\
    \ the `ExecutorService` schedules execution with the two threads it has and, once\
    \ it becomes free, the next two requests gets served, and so forth.\n\n### Chapter\
    \ 5: Concurrency and Asynchronous Programming - Example 2: Using Callable\n\n\
    A `Callable` is similar to a `Runnable`. Both are designed to be executed by threads.\
    \ The difference is a `Runnable` doesn't return anything and cannot throw a checked\
    \ exception. The `Callable` returns a result and may throw an exception. The `Callable`\
    \ interface defines the method:\n\n```java\nV call() throws Exception;\n```\n\n\
    Let's try a `Callable` using an example:\n\n```java\npackage com.domain.concurrency;\n\
    \nimport java.util.concurrent.Callable;\n\npublic class CallableTask implements\
    \ Callable<String> {\n    @Override\n    public String call() throws Exception\
    \ {\n        String s = \"Callable Task Run at \" + System.currentTimeMillis();\n\
    \        return s;\n    }\n}\n```\n\nThe `CallableTask` returns a `String` and\
    \ can also throw an exception if something goes wrong. The `CallableClient` defined\
    \ below executes this task using the `ExecutorService`. The most important thing\
    \ to understand is since these are asynchronous executions that return a result,\
    \ `ExecutorService` returns a `Future` object, which is a proxy for the actual\
    \ response. The caller has to check whether the execution has completed by invoking\
    \ the `isDone` method on the `Future` and extracting the response. This is what\
    \ is being done in the following code:\n\n### Chapter 5: Concurrency and Asynchronous\
    \ Programming\n\n```java\npackage com.domain.concurrency;\n\nimport java.util.concurrent.Callable;\n\
    import java.util.concurrent.ExecutionException;\nimport java.util.concurrent.ExecutorService;\n\
    import java.util.concurrent.Executors;\nimport java.util.concurrent.Future;\n\n\
    public class CallableClient {\n    /**\n     * @param args\n     */\n    public\
    \ static void main(String[] args) {\n        // Step1 : Create a Runnable\n  \
    \      Callable callableTask = new CallableTask();\n        // Step 2: Configure\
    \ Executor\n        // Uses FixedThreadPool executor\n        ExecutorService\
    \ executor = Executors.newFixedThreadPool(2);\n        Future<String> future =\
    \ executor.submit(callableTask);\n        boolean listen = true;\n        while\
    \ (listen) {\n            if (future.isDone()) {\n                String result;\n\
    \                try {\n                    result = future.get();\n         \
    \           listen = false;\n                    System.out.println(result);\n\
    \                } catch (InterruptedException | ExecutionException e) {\n   \
    \                 e.printStackTrace();\n                }\n            }\n   \
    \     }\n        executor.shutdown();\n    }\n}\n```\n\n### Chapter 5: Concurrency\
    \ and Asynchronous Programming\n\nHere you use a `while` loop to continuously\
    \ check for the completion and, once ready, the data is consumed and exits out\
    \ of the loop. Note that `isDone` is a non-blocking method so you don't block\
    \ the thread when you use it. There is also a method called `get` in the `Future`\
    \ API; it is a blocking method and it blocks the main thread until a response\
    \ arrives.\n\nYou can try another variation of `get` that accepts a timeout:\n\
    \n```java\nString result = future.get();\nString result = future.get(10, TimeUnit.SECONDS);\n\
    ```\n\n### Asynchronous Programming with Play\n\nThe ability to handle requests\
    \ asynchronously is a very important factor in choosing a framework for any project\
    \ that has to scale well. Synchronous processing of a large number of concurrent\
    \ requests can eat up server resources and, in certain extreme cases, if the capacity\
    \ planning is not well done, can bring the server to a halt.\n\nNormal page requests\
    \ from a web server are typically synchronous and many times they are cached copies\
    \ of the previous rendered page. But this is not the scenario always; there are\
    \ many applications that do a lot of expensive processing to return results to\
    \ the client. In such cases, obviously the client has to wait for the result to\
    \ arrive, but the server can—in fact, does—the processing asynchronously in another\
    \ thread of execution and frees up the scarce server resources.\n\n### Chapter\
    \ 5: Concurrency and Asynchronous Programming\n\nPlay does this elegantly. A Play\
    \ action that is non-blocking at the server should return a `CompletionStage<Result>`\
    \ instead of the normal `Result` object. The `CompletionStage` is a promise that\
    \ the result will be available after some time. The beauty of the `CompletionStage`\
    \ interface is that it provides a vast selection of methods to attach callbacks\
    \ to in order to process the result once it becomes available.\n\nThe web client\
    \ will be blocked while waiting for the response but nothing will be blocked on\
    \ the server, and server resources can be used to serve other clients.\n\n###\
    \ Writing an Asynchronous App\n\nLet's find a scenario to understand this better.\
    \ Consider an application that recommends gifts based on a person's Facebook profile.\
    \ This application uses the data publicly available in the person's profile and\
    \ then searches online to gather gifts matching their interests. The searching\
    \ online and composing the gift list are expensive operations that can be very\
    \ heavy on the server. So this piece of code is a good candidate for asynchronous\
    \ programming:\n\n```java\npublic CompletionStage<Result> recomendGifts(final\
    \ String uid, final String age, final String relation) {\n    return CompletableFuture.supplyAsync(this::getGifts)\n\
    \        .thenApply((List<GiftVO> gift) -> ok(\"Got \" + gift));\n}\n\nprivate\
    \ List<GiftVO> getGifts() {\n    List<GiftVO> gifts = new ArrayList<GiftVO>();\n\
    \    gifts.add(new GiftVO());\n    return gifts;\n}\n```\n\n### Chapter 5: Concurrency\
    \ and Asynchronous Programming\n\nIn this code, the private method `getGifts`\
    \ deals with finding the gifts and returning the list of gifts. Of course, I have\
    \ mocked the response for this example. In a real-world scenario, the gifts might\
    \ be based on a person's social profile or wish list or similar logic. That logic\
    \ is not in our scope; we are focusing only on asynchronous programming semantics.\n\
    \nThe public method `recomendGifts` invokes the `getGifts` method asynchronously\
    \ using the `CompletableFuture` interface that is part of the `java.util.concurrent`\
    \ package. This is done by the code segment `CompletableFuture.supplyAsync(this::getGifts)`.\n\
    \nThe next step is to check whether you have a response and when it is available\
    \ do further processing on the response and then send it back to the client. That\
    \ is what the `thenApply` method does.\n\n### Configuring Asynchronous Scheduled\
    \ Jobs\n\nPlay uses Akka to work with asynchronous jobs. In order to understand\
    \ jobs in Play, a basic knowledge of Akka is required.\n\n### Akka Basics\n\n\
    The official definition of Akka is that it's \"a toolkit and runtime for building\
    \ **highly concurrent, distributed, and fault tolerant** event-driven applications\
    \ on the JVM.\"\n\nAkka introduces the actor model abstraction and provides a\
    \ better platform to build correct, concurrent, and scalable applications. This\
    \ means that it solves the hardships of writing multi-threaded, highly concurrent\
    \ code. Akka uses a message flow model to achieve this.\n\nThe actor model is\
    \ not a new concept. The idea was introduced in 1973 by Carl Hewitt, Peter Bishop,\
    \ and Richard Steiger.\n\nTraditional concurrent programming in Java involves\
    \ many threads working together. When they need to work on a shared resource,\
    \ it is done by acquiring locks on the shared object. The program deals directly\
    \ with the low-level tasks of getting locks, releasing them after use, and so\
    \ on. This kind of code is hard to maintain and is error prone; many times it\
    \ can lead to deadlocks. Another pain point is in scaling horizontally across\
    \ JVMs. Akka tries to abstract these low-level programming methodologies using\
    \ actors, `ActorRef`, and `ActorSystem`. Actors provide the abstraction for transparent\
    \ distribution and the basis for truly scalable and fault-tolerant applications.\n\
    \nDoes this means there are no threads and locking with Akka? Well, they are there,\
    \ but you don't directly deal with them. Internally everything runs on lightweight\
    \ threads and low-level concurrency primitives. Akka uses the `java.util.concurrency`\
    \ library to handle the coordination.\n\nAkka is written in Scala with language\
    \ bindings provided for both Scala and Java. Let's first understand what an actor\
    \ is. An actor is just an object that can receive messages and take an action\
    \ to handle the messages. It is strictly decoupled from the source that generates\
    \ the message.\n\nTo use the Akka actors, the first thing you need is to start\
    \ the `ActorSystem`. The `ActorSystem` is the fundamental entity for interacting\
    \ with actors and is responsible for actor life cycle management and is the entry\
    \ point of an Akka application. When a Play application is started, an `ActorSystem`\
    \ becomes available and can be accessed using dependency injection in classes\
    \ that need to interact with the `ActorSystem`.\n\nWe will only look at how to\
    \ schedule asynchronous jobs in Play via Akka. We won't be detailing out the internals\
    \ or the configuration of Akka actor system in Play. This information is readily\
    \ available from the official Play Framework documentation.\n\n```java\nimport\
    \ akka.actor.ActorSystem;\nimport scala.concurrent.ExecutionContext;\nimport scala.concurrent.duration.Duration;\n\
    import javax.inject.Inject;\nimport java.util.concurrent.TimeUnit;\n```\n\n###\
    \ Chapter 5: Concurrency and Asynchronous Programming\n\n```java\npublic class\
    \ ScheduledTask {\n    private final ActorSystem actorSystem;\n    private final\
    \ ExecutionContext executionContext;\n\n    @Inject\n    public ScheduledTask(ActorSystem\
    \ actorSystem,\n                         ExecutionContext executionContext) {\n\
    \        this.actorSystem = actorSystem;\n        this.executionContext = executionContext;\n\
    \        this.initialize();\n    }\n\n    private void initialize() {\n      \
    \  this.actorSystem\n            .scheduler()\n            .scheduleAtFixedRate(\n\
    \                Duration.create(30, TimeUnit.SECONDS), // initialDelay\n    \
    \            Duration.create(1, TimeUnit.MINUTES),  // interval\n            \
    \    () -> actorSystem.log().info(\"Time in millis now \" + System.currentTimeMillis()),\n\
    \                this.executionContext);\n    }\n}\n```\n\nThis example shows\
    \ how to schedule a task that is to be run 30 seconds from now and then every\
    \ minute after. The code uses dependency injection to get a reference to the default\
    \ `ActorSystem` and `ExecutionContext`, and then uses the `scheduler` method of\
    \ the `ActorSystem` to execute the code in the defined intervals.\n\n## Chapter\
    \ 6: Web Services, JSON, and XML\n\nModern applications not only expose web service,\
    \ they also consume other third-party web services. For example, your application\
    \ may consume a Facebook or Twitter feed. Most modern web services are exposed\
    \ using REST APIs that handle JSON payloads. A typical problem with calling web\
    \ services is that they can block the caller and can result in blocking the server\
    \ until a response is obtained or a timeout occurs. This is not a particularly\
    \ good design because it can affect the throughput of the server and can result\
    \ in missed SLAs. Play 2 has solved this problem by providing asynchronous, non-blocking\
    \ APIs to invoke long-running tasks like an external web service. Play provides\
    \ the `play.libs.ws` library to handle asynchronous web service calls. A call\
    \ made by `play.libs.ws` returns `CompletionStage<WSResponse>`. Later you can\
    \ extract the response by using callback functions available in the `CompletionStage`\
    \ interface. Essentially they are asynchronous callback methods. The caller makes\
    \ a web service call and, once the response is available, the rest of the code\
    \ runs. You will explore this in more detail later in this chapter.\n\n**Note**:\
    \ Going forward, I will use the term *promise* quite often. Hence it is important\
    \ to understand what a promise is and what its intent is.\n\n© Prem Kumar Karunakaran\
    \ 2020\nP. K. Karunakaran, *Introducing Play Framework*,\n[https://doi.org/10.1007/978-1-4842-5645-9_6](#index_split_000.html#p99)\n\
    \n### Chapter 6: Web Services, JSON, and XML\n\n\"A promise, also known as `CompletableFuture`,\
    \ is design pattern widely used in concurrent, asynchronous programming situations.\
    \ A promise represents a proxy for some response that is not known when the promise\
    \ is created. Promises are a way to write asynchronous code so it appears as though\
    \ executing in a synchronous manner.\" The use of a promise is a way to avoid\
    \ the callback hell found in processing asynchronous functional calls. Whenever\
    \ I refer to a promise, it indicates the promise design pattern unless explicitly\
    \ mentioned otherwise.\n\n### Consuming Web Services\n\nLet's learn by example.\
    \ You are going to build a new method in the controller that calls a web service\
    \ and returns the response back to the client. This new service just echoes the\
    \ response from the back-end service.\n\nRoute configuration:\n\n```\nGET /bookshop/book/echo\
    \ controllers.Application.echoService\n```\n\nThe following is `Application.java`:\n\
    \n```java\npackage controllers;\n\nimport javax.inject.Inject;\nimport play.mvc.*;\n\
    import play.data.DynamicForm;\nimport play.data.FormFactory;\nimport play.libs.ws.*;\n\
    import play.mvc.Result;\nimport java.util.concurrent.CompletionStage;\n\npublic\
    \ class Application extends Controller {\n    @Inject WSClient ws;\n\n    public\
    \ CompletionStage<Result> echoService() {\n        return\n            ws.url(\"\
    http://www.mocky.io/v2/53c7ec8426e0e3fd14326b0d\")\n                .get()\n \
    \               .thenApply(response -> ok(\"Feed Response: \" + response.getBody()));\n\
    \    }\n}\n```\n\n### Chapter 6: Web Services, JSON, and XML\n\nThe `echoService`\
    \ uses the `WS` library to invoke an external web service and returns the response.\
    \ For the demonstration, I have created a simple JSON service using the mocky.io\
    \ website.\n\nLet's examine each of the steps in the `echoService` method.\n\n\
    First, the `WSClient` is injected to the controller using the `@Inject` annotation.\n\
    \n`ws.url().get` returns `CompletionStage<WSResponse>`. This object contains the\
    \ complete response and provides methods to fetch the response in widely used\
    \ formats like JSON, XML, etc. Since all invocations and content delivery use\
    \ asynchronous, non-blocking semantics, the caller needs to use a futures block\
    \ to retrieve the response when it is ready.\n\n`thenApply` is used to do this;\
    \ whenever the response is available, the code inside `thenApply` will execute.\n\
    \n- Read response body as a string:\n  `response.getBody()`\n- Read as JSON:\n\
    \  `response.asJson()`\n- Read as XML:\n  `thenApply(r -> r.getBody(xml()));`\n\
    \nThe `xml` method is available in `play.libs.ws.WSBodyReadables`.\n\n### Chapter\
    \ 6: Web Services, JSON, and XML\n\nThe following are the `WSResponse` API's commonly\
    \ used methods:\n\n- Get the body as an array of bytes:\n  `byte[] asByteArray()`\n\
    - Get the body as a JSON node:\n  `com.fasterxml.jackson.databind.JsonNode asJson()`\n\
    - Return the body as XML:\n  `org.w3c.dom.Document asXml()`\n- Return the content\
    \ as raw bytes:\n  `akka.util.ByteString getBodyAsBytes()`\n- Get the HTTP content\
    \ type of the response:\n  `java.lang.String getContentType()`\n- Return the HTTP\
    \ status codes (200, 404, 201, 500, ...) of the response:\n  `int getStatus()`\n\
    - Return the textual representation of an HTTP status code (Ok, Not Found, Internal\
    \ Server error, ...):\n  `java.lang.String getStatusText()`\n\nThe `echoServices`\
    \ method uses the `get` method that returns a `CompletionStage<WSResponse>` object.\
    \ When you invoke `get`, what you get is just a Proxy object. No actual invocation\
    \ has occurred. The Proxy (`CompletionStage`) merely indicates that the framework\
    \ has created a job that will be processed asynchronously in a non-blocking manner.\n\
    \nWhen the call is made and a response is obtained, there needs to be some way\
    \ by which the application code can get an intimation and do further processing.\
    \ This is accomplished by providing a callback method. This is what the rest of\
    \ the code in `echoService` is for. The `thenApply` function is a callback function.\
    \ Play will invoke this function with an instance of `WSResponse` when the back-end\
    \ service returns a response.\n\n### Processing Large Responses\n\nWhen receiving\
    \ large HTTP responses, it is not a good idea to use `get` to load the response\
    \ into memory. If the response is big and in the order of gigabytes, it can result\
    \ in memory errors and can potentially crash the application. In such cases, the\
    \ better choice is to use Akka streaming to consume the response incrementally.\
    \ For this use case, `WSResponse` provides a method named `getBodyAsSource`:\n\
    \n```java\nSource<ByteString, ?> responseBody = res.getBodyAsSource();\n```\n\n\
    This response body can be processed by chaining it with a sink. Let's see how\
    \ this is done.\n\nFor this example, I have created a mock response using the\
    \ mocky.io online service. This service lets you create mock responses for testing.\
    \ Go to [www.mocky.io/v2/5e08df833000005b0081a159](http://www.mocky.io/v2/5e08df833000005b0081a159).\
    \ This URL returns a simple HTML response. Let's use Play and Akka streaming to\
    \ process this response in an asynchronous, non-blocking, and efficient way. The\
    \ intended output is to count the length of content in an incremental way and,\
    \ once all the processing is over, send the response to the client. To use Akka\
    \ streaming, you need to get a reference to the Akka `ActorSystem` and the Akka\
    \ streaming materializer classes in the controller class. For the time being,\
    \ just understand that the materializer is a helper class for Akka streams to\
    \ work. This is the class that is responsible for materializing the Akka stream\
    \ processing pipeline. If you are totally new to Akka and asynchronous programming,\
    \ you can quickly read Chapter 8 of this book covering the basics of Akka and\
    \ come back to this section. Before you get to the code, here are two terms you\
    \ need to understand:\n\n### Chapter 6: Web Services, JSON, and XML\n\n- **Source**:\
    \ The element that produces the data. For example, a source may be created to\
    \ stream data from a Twitter feed or a source for reading files in a directory\
    \ or a web service.\n- **Sink**: The end receiver of the data. For instance, you\
    \ may read from a source, do some transformation, and write back to a file. In\
    \ this case, the save to file is the sink. In Akka streams, you connect a source\
    \ and sink, and perform transformations and data filtering in between. With this\
    \ much information in hand, let's get to the code.\n\nYou will add a new method\
    \ in `Application.java` (Controller class), namely `processLargeResponse`. This\
    \ method reads the data from a rest endpoint using Akka streaming semantics and\
    \ calculates the size of the data. You won't be reading the entire response and\
    \ counting; instead, the data is read in chunks and the count is updated.\n\n\
    ```java\npackage controllers;\n\nimport actors.ActorModel;\nimport actors.PingActor;\n\
    import akka.actor.ActorRef;\nimport akka.actor.ActorSystem;\nimport akka.stream.Materializer;\n\
    import akka.stream.javadsl.Sink;\nimport akka.stream.javadsl.Source;\nimport akka.util.ByteString;\n\
    import play.libs.ws.WSClient;\nimport play.libs.ws.WSResponse;\nimport play.mvc.Controller;\n\
    import play.mvc.Http;\nimport play.mvc.Result;\nimport scala.compat.java8.FutureConverters;\n\
    import javax.inject.Inject;\nimport java.util.ArrayList;\nimport java.util.List;\n\
    import java.util.concurrent.CompletableFuture;\nimport java.util.concurrent.CompletionStage;\n\
    import static akka.pattern.Patterns.ask;\n\npublic class Application extends Controller\
    \ {\n    final ActorRef pingActor;\n\n    @Inject\n    public Application(ActorSystem\
    \ system) {\n        pingActor = system.actorOf(PingActor.getProps());\n    }\n\
    \n    @Inject\n    Materializer materializer;\n\n    public CompletionStage<Result>\
    \ processLargeResponse() {\n        CompletionStage<WSResponse> futureResponse\
    \ =\n            ws.url(\"http://www.mocky.io/v2/5e08df833000005b0081a159\")\n\
    \                .setMethod(\"GET\").stream();\n\n        CompletionStage<Long>\
    \ bytesReturned =\n            futureResponse.thenCompose(\n                res\
    \ -> {\n                    Source<ByteString, ?> responseBody = res.getBodyAsSource();\n\
    \                    // Count the number of bytes returned\n                 \
    \   Sink<ByteString, CompletionStage<Long>> bytesSum =\n                     \
    \   Sink.fold(0L, (total, bytes) -> total + bytes.length());\n               \
    \     return responseBody.runWith(bytesSum, materializer);\n                });\n\
    \n        return bytesReturned.thenApply(\n            res -> ok((String) res.toString()));\n\
    \    }\n}\n```\n\n### Chapter 6: Web Services, JSON, and XML\n\nThis code calls\
    \ the web service defined at mocky.io and processes the response as an Akka stream.\
    \ This way it only loads chunks of the response into memory and processes the\
    \ chunks. This mechanism ensures that you can process any large response without\
    \ encountering memory and CPU bottlenecks.\n\nTo test this, add the following\
    \ entry into the `routes.conf` file:\n\n```\nGET /bookshop/example/largeresponse\
    \ controllers.Application.processLargeResponse()\n```\n\n### Handling JSON\n\n\
    Play has built-in support for JSON. It can automatically parse a JSON request\
    \ or generate a JSON response. Let's explore the two scenarios:\n\n1. Consuming\
    \ a JSON request\n2. Producing a JSON response\n\n### Consuming JSON Request\n\
    \nPlay by default uses a body parser that can parse any valid content type. The\
    \ default body parser is accessible from the request object and has method `asJson`\
    \ to process the incoming request as JSON content. JSON content will have the\
    \ `Content-Type` header set as `text/json` or `application/json`.\n\n```java\n\
    JsonNode json = request().body().asJson();\n```\n\nThis is, in fact, a Jackson\
    \ node. Once you get this, you can use the methods available in the Jackson API\
    \ to extract the data in the JSON request.\n\nYou can ask Play to process only\
    \ the JSON body as a request and reject anything that is not valid with an HTTP\
    \ 400 response code. For this, just annotate the method with `@BodyParser.Of(BodyParser.Json.class)`.\
    \ This is the better way to process an incoming JSON request body.\n\nLet's create\
    \ a method that acknowledges a message it receives. The `acknowledgeGreeting`\
    \ method in the controller accepts a JSON body and returns an HTML output:\n\n\
    ```java\npackage controllers;\n\nimport com.fasterxml.jackson.databind.JsonNode;\n\
    import play.mvc.Controller;\nimport play.mvc.Result;\nimport play.mvc.BodyParser;\n\
    \npublic class Application extends Controller {\n    @BodyParser.Of(BodyParser.Json.class)\n\
    \    public Result acknowledgeGreeting() {\n        JsonNode json = request().body().asJson();\n\
    \        String greeting = json.findPath(\"greeting\").textValue();\n        if\
    \ (greeting == null) {\n            return badRequest(\"Missing parameter [greeting]\"\
    );\n        } else {\n            return ok(\"Your greeting \" + greeting + \"\
    \ is accepted\");\n        }\n    }\n}\n```\n\n### Chapter 6: Web Services, JSON,\
    \ and XML\n\nModify the routes file and add the mapping entry:\n\n```\nPOST /greeting\
    \ controllers.Application.acknowledgeGreeting()\n```\n\nTo test the service, you\
    \ need a client that can post a JSON body. There are many browser-based clients\
    \ available and you can use the one of your choice. I used a Mozilla Firefox add-on\
    \ named RestClient (a debugger for RESTful web services); you can also use Postman.\
    \ If you want to do it via the command line, use curl. See Figure 6-1.\n\n***Figure\
    \ 6-1.** Testing with RestClient*\n\nTesting the service using curl:\n\n```\n\
    $ curl -H \"Content-Type: application/json\" -X POST -d {\\\"greeting\\\":\\\"\
    hello\\\"} http://localhost:9000/greeting\n```\n\nResponse:\n\n```\nYour greeting\
    \ hello is accepted\n```\n\n### Producing a JSON Response\n\nIt is very simple\
    \ to generate a JSON response with Play. Just create a JSON object and put key-value\
    \ pairs into it:\n\n```java\nObjectNode result = Json.newObject();\nresult.put(\"\
    status\", \"OK\");\nresult.put(\"message\", \"Greetings\");\nreturn ok(result);\n\
    ```\n\nThe `acknowledgeGreeting` method you used above accepts a JSON request\
