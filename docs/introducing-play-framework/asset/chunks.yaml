    ***Figure 1-2.** Project structure*


    **app**


    The app folder contains all your server-side source files. This includes all your
    Java code, Scala code, dynamic Scala HTML templates, database access-related code,
    etc. By default, Play creates two folders, controllers and views, inside the app
    folder. The names are self-explanatory. The controllers folder holds your controller
    classes and views holds the dynamic screens (the HTML and Scala code snippets).


    You are free to create subdirectories inside the app folder for better organization
    of your files. For example, you can create a models folder to hold all your ORM
    mapped POJOs, a folder named helper to hold your helper classes, etc.


    Chapter 1 GettinG Started with play 2


    Most of the project will have the following structure under the app folder: app


    └ assets: Compiled asset sources


    └ stylesheets: For CSS source code (less CSS


    sources)


    └ javascripts: Typically this is the folder where


    coffeescript sources are placed.


    └ controllers: Application controllers


    └ models: Application business layer


    └ views: Templates


    **conf**


    The conf folder holds the configurations used by the Play application.


    It contains all the HTTP mappings, orm configurations, environmental variables,
    logging, etc.


    Basically, the conf directory contains configuration and


    internationalization files, whereas the app folder has a subdirectory for its
    model definitions.


    The most important files in this directory are


    • application.conf: The main configuration file for


    the application, it contains standard configuration


    parameters.


    • routes: Maps HTTP URL paths to methods in the


    controller. Handles all HTTP routing configurations.


    • logback: Play uses logback for all logging configuration and this is the file
    you need to change to configure


    logback.


    Chapter 1 GettinG Started with play 2


    **build.sbt**


    Play’s build configuration is defined in two places: the build.sbt file in the
    project root and two files found inside the /project folder. The build.sbt files
    contain the build configuration.


    **project**


    The project folder contains project build configurations:


    • plugins.sbt: Defines the sbt plugins used by this project


    • build.properties: Contains the sbt versions to use to


    build your app and related sbt build information.


    I will discuss more about sbt going forward. A basic understanding of sbt is good
    when you work with Play.


    **public**


    The public folder hosts all static files like Javascripts, images, and CSS style
    sheets that are directly served by the web server. The public folder has three
    subfolders, images, javascripts, and stylesheets, for storing these assets: public


    └ stylesheets: CSS files (.css extension)


    └ javascripts: JavaScript files (.js files)


    └ images: Images


    **lib**


    The lib folder is not created by default. But you can create this folder and put
    any jar into it. All jars in this folder will be added to the application class
    path. It’s ideal for including third-party dependencies that need to be managed
    out of the Play build system.


    Chapter 1 GettinG Started with play 2


    **test**


    The test folder is a holder for storing all unit and functional test cases.


