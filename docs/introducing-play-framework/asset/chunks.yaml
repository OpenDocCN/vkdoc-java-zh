    \n## About the Author\n\n**Prem Kumar Karunakaran** is an enterprise architect\
    \ with about 20 years of industry experience. He holds a M.Tech in Software Systems\
    \ from BITS Pilani and a bachelor's degree in electronics engineering from Cochin\
    \ University of Science and Technology. He is also an Oracle Certified Java Enterprise\
    \ Edition Master. He was involved in the architecture and design of many cutting-edge\
    \ products used by clients around the globe.\n\nHe has worked with organizations\
    \ such as Infosys and IBS as an architect and has worked in many projects spanning\
    \ airlines, logistics, travel, and retail domain. He is passionate about Java,\
    \ Machine Learning, BigData processing and Cloud and loves to learn new technologies;\
    \ he contributes his time to open source initiatives as well.\n\n## About the\
    \ Technical Reviewer\n\n**Satheesh Madhavan** has nearly 20 years of experience\
    \ in the software industry and currently serves as a digital consultant in one\
    \ of India's largest IT firms. He has experience working in Java and JEE technologies\
    \ in providing enterprise solutions under various capacities. His qualifications\
    \ include an M.S in software systems from BITS Pilani and a B.Tech in chemical\
    \ engineering from the University of Kerala. His hobbies include reading fiction\
    \ and non-fiction, Philately, technical blogs and podcasts, and astrophysics and\
    \ pure sciences.\n\n## Preface\n\nSoftware developers need to have a number of\
    \ traits in order to practice their jobs well. A developer's primary job is to\
    \ create software that solves business problems. Customers are operating in a\
    \ dynamic business environment and they need to change their business solutions\
    \ fast enough to retain and attract new customers. Hence, rapid application development\
    \ is a critical aspect of today's software development methodology. You need better\
    \ frameworks and tools that can help in developing quality software faster.\n\n\
    Play Framework is the new and impressive framework in web application development.\
    \ By breaking the existing standards, it tries not to abstract away from HTTP,\
    \ as with most web frameworks, but to tightly integrate with it.\n\nPlay Framework\
    \ is a revolution in rapid application programming for Java web development. It\
    \ has changed the rules of the game for Java web development. Java web development\
    \ was a tedious, time consuming activity and there were many frameworks offering\
    \ the benefits of MVC architecture. But there were hardly any frameworks capable\
    \ of providing true rapid application development capabilities. Play has changed\
    \ all that.\n\nPlay is a clean alternative to the existing Java Enterprise stacks\
    \ for web development. Play focuses on developer productivity, scalability, adherence\
    \ to modern web standards (REST, JSON, Web Sockets, and Comet, to name a few)\
    \ and efficiency.\n\nUsing Play Framework, you just need to code your changes\
    \ and hit the browser refresh button to test your changes. Play will automatically\
    \ compile and deploy your changes. If there are any errors in your code, Play\
    \ shows them nicely in the browser. You are no longer required to scan long exception\
    \ traces to find out the cause of the error. Above all, Play comes packaged with\
    \ its own application server, which is lightweight, fast, and easy to use. In\
    \ a single sentence, Play is the single framework you will need to start your\
    \ Java web development. Java web development is a lot easier, more fun, and more\
    \ powerful thanks to Play Framework.\n\nThis book is all you need to learn and\
    \ use the new version of Play Framework, Play 2. You will be taken through all\
    \ layers of Play Framework and you'll get in-depth knowledge via as many examples\
    \ and applications as possible.\n\n### Further References\n\nPlay Framework official\
    \ docs: [www.playframework.com/](http://www.playframework.com/)\n\nGoogle groups\
    \ for Play: [https://groups.google.com/forum/#!forum/play-framework](https://groups.google.com/forum/#!forum/play-framework)\n\
    \nQuestions related to Play: [http://stackoverflow.com/tags/playframework](http://stackoverflow.com/tags/playframework)\n\
    \nEbeans: [www.avaje.org/](http://www.avaje.org/)\n\nTwirl: [https://github.com/playframework/twirl](https://github.com/playframework/twirl)\n\
    \n## Chapter 1: Getting Started with Play 2\n\nAfter reading the introductory\
    \ section on Play 2, you should now have an idea of the capabilities of Play Framework\
    \ and how it can accelerate Java web development. This chapter is about:\n\n-\
    \ Installing Play Framework\n- Setting up Play Framework on your machine\n- Configuring\
    \ Play Framework\n- Creating the first sample project\n- Setting up the IDE\n\n\
    ### Getting Ready\n\nAll you need is a browser and Internet connectivity. You\
    \ can install Play on a wide variety of operating systems, including Microsoft\
    \ Windows, Linux, and Mac. The operating system should have Java installed.\n\n\
    ### Installation\n\nPlay just needs the Play jars available at runtime to work,\
    \ hence you can include the Play jars in any application using Maven or any such\
    \ build tool.\n\nBut the recommended way to use Play is to install it using either\
    \ `sbt` or Gradle because Play provides a better development experience when using\
    \ `sbt` or Gradle.\n\n#### Prerequisites\n\nPlay 2.x requires JDK 1.8 or later\
    \ to be installed on the machine. Please note that JRE is not enough; you need\
    \ JDK Version 8 or higher. You should ensure that the `PATH` variable points to\
    \ the JDK bin directory and that `javac` and Java are accessible from everywhere.\n\
    \nYou can check this by typing `javac -version` in the command prompt or shell\
    \ and verify that the version is 1.8 or above.\n\nYou can get Java SE from the\
    \ Oracle website at [www.oracle.com/technetwork/java/javase/downloads/index.html](http://www.oracle.com/technetwork/java/javase/downloads/index.html).\n\
    \nPlay also works with Open JDK version 1.8 and above. But you should make sure\
    \ that any dependency you use in the project is compatible with the Open JDK.\n\
    \n#### Installing sbt\n\n`sbt` (Scala build tool) is available for all OS versions\
    \ at the scala-sbt website at [www.scala-sbt.org/download.html](http://www.scala-sbt.org/download.html).\
    \ Please follow the instructions in [the installation guide](https://www.scala-sbt.org/1.x/docs/Setup.html)\
    \ at [www.scala-sbt.org/1.x/docs/Setup.html](http://www.scala-sbt.org/1.x/docs/Setup.html)\
    \ to install `sbt`.\n\n#### Installing conscript\n\nTo install Play using `sbt`,\
    \ you need to install conscript. Please follow the instructions at [www.foundweekends.org/conscript/setup.html](http://www.foundweekends.org/conscript/setup.html)\
    \ to install conscript. The instructions are available for Mac, Linux, and Windows.\n\
    \nThe cross-platform installation using a jar is simple. Download the conscript\
    \ jar from the foundweekends Maven release repo ([https://dl.bintray.com/foundweekends/maven-releases/org/foundweekends/conscript/conscript_2.11/0.5.2/conscript_2.11-0.5.2-proguard.jar](https://dl.bintray.com/foundweekends/maven-releases/org/foundweekends/conscript/conscript_2.11/0.5.2/conscript_2.11-0.5.2-proguard.jar))\
    \ and run the following from the command prompt: `java -jar /conscript_2.11-0.5.2-proguard.jar`\n\
    \nThis will start a splash screen and will install conscript. Ignore any error\
    \ related to not finding `cs`. Typically, conscript will get installed in the\
    \ `C:\\Users\\username\\.conscript` folder in Windows, where *username* is the\
    \ home folder of the logged-in user in Windows. This location will be shown in\
    \ the splash screen.\n\nNow let's set up the environment variables for conscript:\n\
    \n```\nexport CONSCRIPT_HOME=\" C:\\Users\\username\\.conscript\"\nexport CONSCRIPT_OPTS=\"\
    -XX:MaxPermSize=512M -Dfile.encoding=UTF-8\"\nexport PATH=%PATH%;%CONSCRIPT_HOME%\\\
    bin\n```\n\n`CONSCRIPT_HOME` is where conscript will download various files. For\
    \ example, in Windows, it will be `C:\\Users\\username\\`.\n\n`PATH` is your OS's\
    \ path variable. This will make the command `cs` available from everywhere.\n\n\
    #### Installing Giter8\n\nAfter installing conscript, Giter8 can be installed\
    \ using conscript itself. Giter8 is a command-line tool to generate files and\
    \ directories from templates published on GitHub or any other git repository.\n\
    \nGo to a command prompt and type:\n\n```\ncs foundweekends/giter8\n```\n\nThis\
    \ will download and install Giter8. More details of the installation is available\
    \ from the foundweekends website for Giter8 ([www.foundweekends.org/giter8/setup.html](http://www.foundweekends.org/giter8/setup.html)).\n\
    \n### Setting Up Play\n\nThere are multiple ways to install Play. Let's look at\
    \ the two most common ways:\n\n- **Using Play example projects**: Use any of the\
    \ example projects provided by Lightbend Tech Hub ([https://developer.lightbend.com/start/?group=play](https://developer.lightbend.com/start/?group=play)).\n\
    - **Using sbt**: This approach depends on Giter8 templates for `sbt`. This method\
    \ creates a fresh Play project without any example code. This is the preferred\
    \ mode for a clean, lean project structure.\n\n#### Using Play Example Projects\n\
    \nPlay provides many example projects for making the installation easier. If you\
    \ follow this path, installation of `sbt` is not required because the template\
    \ provides `sbt` launchers for the Unix and Windows environments.\n\nLet's try\
    \ the first approach: installing the Play example project in Scala.\n\n1. Go to\
    \ [https://developer.lightbend.com/start/?group=play](https://developer.lightbend.com/start/?group=play).\n\
    2. Choose the project PLAY SCALA HELLO WORLD TUTORIAL.\n3. Click the \"Create\
    \ a project for me\" button (this will download the example project to your system).\n\
    4. Unzip the archive (`play-samples-play-scala-hello-world-tutorial.zip`).\n5.\
    \ Go to the folder named `play-samples-play-scala-hello-world-tutorial` and double-click\
    \ the `sbt.bat` file if on Windows. If you are on a Mac or Unix-based system,\
    \ run the `sbt` file.\n6. It will take a while to download the `sbt` and all dependencies.\
    \ Once the `sbt` build is successful, you will see the message `sbt server started\
    \ at local:sbt-server-f50b441db70fa47676ba`. Note that the last part of the message\
    \ (`f50b441db70fa47676ba`) might be different for you but that is okay. You are\
    \ now good to go and you will see the prompt as `[play-scala-seed] $`.\n7. Type\
    \ the `run` command to start the application: `[play-scala-seed] $ run`. As soon\
    \ as this step completes, the prompt will display `(Server started, use Enter\
    \ to stop and go back to the console...)`.\n8. Go to `http://localhost:9000`.\
    \ If all is good, you should see the Play documentation displayed in the browser.\n\
    \nNow let's see how to install a Play example project using Java.\n\n1. Go to\
    \ [https://developer.lightbend.com/start/?group=play](https://developer.lightbend.com/start/?group=play).\n\
    2. Choose the project PLAY JAVA HELLO WORLD TUTORIAL.\n3. Click the \"Create a\
    \ project for me\" button (this will download the example project to your system).\n\
    4. Unzip the archive (`play-samples-play-java-hello-world-tutorial.zip`).\n5.\
    \ Go to the folder named `play-samples-play-java-hello-world-tutorial` and double-click\
    \ the `sbt.bat` file if on Windows. If you are on a Mac or Unix-based system,\
    \ run the `sbt` file.\n6. This will download all the dependencies and perform\
    \ the build. Please note that it might take a while to download all the dependencies.\n\
    7. Once the build is over, the command prompt will show `[play-java-hello-world-tutorial]\
    \ $`.\n8. Type the `run` command to start the play application: `[play-java-hello-world-tutorial]\
    \ $ run`.\n\n#### Using sbt\n\nNow you'll learn how to install Play using `sbt`\
    \ to get the basic Play application structure and dependent jars but not the example\
    \ projects.\n\nTo use `sbt` to create a Play project, the following needs to be\
    \ completed:\n\n1. Install SBT.\n2. Install conscript.\n3. Install Giter8.\n\n\
    You can find instructions for installing the above software in the Installation\
    \ section of this chapter.\n\nOnce the above software is installed, you can proceed\
    \ with creating a Play project using `sbt`. Play supports Java and Scala as programming\
    \ languages, so I will show examples for both using `sbt`.\n\n##### Installing\
    \ a Java Project Using sbt\n\nTake a command prompt, change to the directory where\
    \ you want the project to be created, and type:\n\n```\nsbt new playframework/play-java-seed.g8\n\
    ```\n\nThis will install a Java starter project structure.\n\nThe wizard will\
    \ ask for the project name and organization. (By convention, this is a reverse\
    \ domain name that you own, typically one specific to your project. It is used\
    \ as a namespace for projects.) Once these names are supplied, the project will\
    \ get created.\n\n##### Installing a Scala Project Using sbt\n\nHere is the command:\n\
    \n```\nsbt new playframework/play-scala-seed.g8\n```\n\nProvide the project name\
    \ and organization, and the project will get created.\n\nYou have now learned\
    \ multiple ways to install a Play project for both Scala and Java:\n\n- Using\
    \ Play examples\n- Using `sbt`\n\nIn this book, I use Java as the programming\
    \ language for Play, so when you create your first project (a bookshop) in the\
    \ next section, you will be using `sbt` and the Java seed.\n\n![](index-21_1.png)\n\
    \n### Creating Your First Project\n\nLet's create a new project called bookshop\
    \ to explore Play in detail. Name your project **bookshop** and, for the ease\
    \ of explanation, let's make it an online retail application selling books, a\
    \ domain familiar to everybody.\n\nFrom a command prompt or shell, type:\n\n```\n\
    sbt new playframework/play-java-seed.g8\n```\n\nSee Figure 1-1.\n\n***Figure 1-1.**\
    \ Creating a project*\n\nProvide the following for the project name and organization:\n\
    \n```\nname [play-java-seed]: bookshop\norganization [com.example]: com.stackrules.example\n\
    ```\n\nFor the organization name, you can give another domain name if you want\
    \ to do so.\n\n![](index-22_1.png)\n\nGo to the directory where you created project.\
    \ For instance, in my machine, the project directory is `E:\\workarea\\bookshop`.\n\
    \nLet's look at the folder structure and its relevance in the overall project\
    \ organization. See Figure 1-2.\n\n***Figure 1-2.** Project structure*\n\n####\
    \ app\n\nThe `app` folder contains all your server-side source files. This includes\
    \ all your Java code, Scala code, dynamic Scala HTML templates, database access-related\
    \ code, etc. By default, Play creates two folders, `controllers` and `views`,\
    \ inside the `app` folder. The names are self-explanatory. The `controllers` folder\
    \ holds your controller classes and `views` holds the dynamic screens (the HTML\
    \ and Scala code snippets).\n\nYou are free to create subdirectories inside the\
    \ `app` folder for better organization of your files. For example, you can create\
    \ a `models` folder to hold all your ORM mapped POJOs, a folder named `helper`\
    \ to hold your helper classes, etc.\n\nMost of the project will have the following\
    \ structure under the `app` folder:\n\n```\napp\n├ assets: Compiled asset sources\n\
    │ ├ stylesheets: For CSS source code (less CSS sources)\n│ └ javascripts: Typically\
    \ this is the folder where coffeescript sources are placed.\n├ controllers: Application\
    \ controllers\n├ models: Application business layer\n└ views: Templates\n```\n\
    \n#### conf\n\nThe `conf` folder holds the configurations used by the Play application.\
    \ It contains all the HTTP mappings, orm configurations, environmental variables,\
    \ logging, etc.\n\nBasically, the `conf` directory contains configuration and\
    \ internationalization files, whereas the `app` folder has a subdirectory for\
    \ its model definitions.\n\nThe most important files in this directory are:\n\n\
    - `application.conf`: The main configuration file for the application, it contains\
    \ standard configuration parameters.\n- `routes`: Maps HTTP URL paths to methods\
    \ in the controller. Handles all HTTP routing configurations.\n- `logback`: Play\
    \ uses logback for all logging configuration and this is the file you need to\
    \ change to configure logback.\n\n#### build.sbt\n\nPlay's build configuration\
    \ is defined in two places: the `build.sbt` file in the project root and two files\
    \ found inside the `/project` folder. The `build.sbt` files contain the build\
    \ configuration.\n\n#### project\n\nThe `project` folder contains project build\
    \ configurations:\n\n- `plugins.sbt`: Defines the `sbt` plugins used by this project\n\
    - `build.properties`: Contains the `sbt` versions to use to build your app and\
    \ related `sbt` build information.\n\nI will discuss more about `sbt` going forward.\
    \ A basic understanding of `sbt` is good when you work with Play.\n\n#### public\n\
    \nThe `public` folder hosts all static files like Javascripts, images, and CSS\
    \ style sheets that are directly served by the web server. The `public` folder\
    \ has three subfolders, `images`, `javascripts`, and `stylesheets`, for storing\
    \ these assets:\n\n```\npublic\n├ stylesheets: CSS files (.css extension)\n├ javascripts:\
    \ JavaScript files (.js files)\n└ images: Images\n```\n\n#### lib\n\nThe `lib`\
    \ folder is not created by default. But you can create this folder and put any\
    \ jar into it. All jars in this folder will be added to the application class\
    \ path. It's ideal for including third-party dependencies that need to be managed\
    \ out of the Play build system.\n\n#### test\n\nThe `test` folder is a holder\
    \ for storing all unit and functional test cases.\n\n### Configuring Play to Work\
    \ with Your Preferred IDE\n\nSince you have finished setting up the project structure\
    \ and have generated a project template, let's now integrate the project with\
    \ an IDE to make the development process easier and more rapid.\n\nYou don't need\
    \ a sophisticated IDE to work with Play because Play compiles and refreshes the\
    \ modifications you make to your source files automatically. This gives you the\
    \ flexibility to use a simple editor like Notepad or a vi editor to work with\
    \ Play. But this is not a practical case for real-world projects. You need an\
    \ IDE that provides better navigation, autocompletion, debugging, refactoring,\
    \ etc. By default, Play supports most of the popular IDEs like Eclipse, IntelliJ,\
    \ NetBeans, and ENSIME.\n\nFor this book, I will use Eclipse as the IDE. You can\
    \ use any IDE of your choice to try out the samples.\n\n#### Setting Up in Eclipse\n\
    \nAs an example, let's configure Play for Eclipse. To use Play with Eclipse, you\
    \ need to first integrate `sbteclipse` to your project. To do this, open `plugins.sbt`\
    \ (`project/plugins.sbt`) and add the following:\n\n```\naddSbtPlugin(\"com.typesafe.sbteclipse\"\
    \ % \"sbteclipse-plugin\" % \"5.2.2\")\n```\n\nYou want to compile the project\
    \ before you run the `eclipse` command to generate the eclipse import settings\
    \ for the bookshop project. The manual way is to run `sbt compile` first and then\
    \ do the generate eclipse project part. But you can do it in a better and automated\
    \ way; you can instruct it to run compilation first whenever you generate eclipse\
    \ project settings. For this, open the `build.sbt` file and add the following:\n\
    \n```\nEclipseKeys.preTasks := Seq(compile in Compile, compile in Test)\nEclipseKeys.projectFlavor\
    \ := EclipseProjectFlavor.Java\nEclipseKeys.createSrc := EclipseCreateSrc.ValueSet(EclipseCreateSrc.ManagedClasses,\
    \ EclipseCreateSrc.ManagedResources)\n```\n\nPlease note the above is only for\
    \ Java projects. If you have Scala sources, then you should use Scala IDE instead\
    \ of the regular Eclipse IDE.\n\nSave the `build.sbt` file and go to the `sbt`\
    \ prompt by taking a command prompt, moving to the project root directory (`E:\\\
    workarea\\bookshop`) and typing `sbt`.\n\nThis initializes the `sbt` prompt. This\
    \ can take few minutes to complete because `sbt` will download the plugins and\
    \ all related dependencies. Once the `sbt` prompt gets initialized, you should\
    \ see the prompt as `[bookshop] $`.\n\nType `eclipse with-source=false` and press\
    \ Enter. If you need all the source jars of the dependencies, you can issue `eclipse\
    \ with-source=true` instead.\n\nAfter the successful execution of the above command,\
    \ start eclipse and import the project. See Figure 1-3.\n\n![](index-27_1.jpg)\n\
    \n***Figure 1-3.** Import Wizard*\n\n1. Open Eclipse.\n2. Click File ➤ Import\
    \ ➤ General ➤ Existing Projects into Workspace.\n3. Browse and choose the root\
    \ project folder (`bookshop`).\n4. Click Finish.\n\n![](index-28_1.jpg)\n\n####\
    \ Setting Up in IntelliJ\n\nImporting a Play project to Intellij is pretty straightforward.\
    \ The only precondition is that the Scala plugin for Intellij should be installed,\
    \ even when using Java as the language. This is because the Scala plugin for Intellij\
    \ is required to resolve the `sbt` dependencies. So go ahead and install the Scala\
    \ plugin for Intellij if you have not done so. Open Intellij and go to File ➤\
    \ Settings ➤ Plugins and search for Scala in the Marketplace tab.\n\nFrom the\
    \ plugins listed, select the Scala plugin from JetBrains and click Install. See\
    \ Figure 1-4.\n\n***Figure 1-4.** Importing the Scala plugin*\n\nAfter installing\
    \ the Scala plugin, import the bookshop Play project to IntelliJ. See Figure 1-5.\n\
    \n![](index-29_1.jpg)\n\n***Figure 1-5.** Importing a project*\n\n1. Open File\
    \ ➤ New ➤ Project from Existing Sources.\n2. Browse to the bookshop project root\
    \ folder (`E:\\workarea\\bookshop`).\n3. Select Import project from the external\
    \ model.\n4. Choose sbt.\n5. Click Finish.\n\nWait for the build to sync and you\
    \ will see that the project is imported to Intellij.\n\n### Hello World Application\n\
    \nYou have your project ready and you have imported the IDE of your choice. Let's\
    \ add some files to it and create the Hello World program. From there you will\
    \ add more features to it and expand it.\n\nLet's start the Play server and try\
    \ the default application.\n\n1. Open a command prompt.\n2. Go to the project\
    \ root folder (`E:\\workarea\\bookshop`).\n3. Go to the Play console by typing\
    \ `sbt` in the root folder.\n4. This will open up the Play console prompt (`[bookshop]\
    \ $`).\n5. Type `run` to start the Play server. See Figure 1-6. (If the server\
    \ started, use Enter to stop, and go back to the console.)\n\nYou can even combine\
    \ the commands together to start Play by using `sbt run`.\n\n![](index-31_1.png)\n\
    \n![](index-31_2.png)\n\n***Figure 1-6.** Application console*\n\nOpen the browser\
    \ and access `http://localhost:9000/` to access the home page. See Figure 1-7.\n\
    \n***Figure 1-7.** Welcome page*\n\n#### Configuration\n\nGo to the `conf` folder\
    \ and open the `routes` file. This is where all the URL mappings of the project\
    \ need to be defined. You will examine URL mappings and routes configuration in\
    \ detail in the next chapter. When you open up the `routes` file, you should see\
    \ an entry like this:\n\n```\nGET / controllers.HomeController.index\n```\n\n\
    This means the root of the application points to the `index` method defined in\
    \ the `HomeController` class.\n\nIf you type `localhost:portnumber` in the browser,\
    \ the request will be routed to the `index` method defined in the `app/controllers/HomeController.java`\
    \ file.\n\nThis is how Play routes the URL paths or URL patterns to the specific\
    \ methods of the controller classes.\n\nOpen the `HomeController.java` file and\
    \ you can see the method:\n\n```\npublic Result index() {\n    return ok(views.html.index.render());\n\
    }\n```\n\nThis method returns a Twirl template file and this template file generates\
    \ the HTML output. Open the `index.scala.html` file found inside the `views` folder.\
    \ Let's examine the contents of this file to understand what is happening in it.\n\
    \n```\n@()\n\n@main(\"Welcome to Play\") {\n    <h1>Welcome to Play!</h1>\n}\n\
    ```\n\nBefore we take a look at each element, it is important to understand what\
    \ Twirl is and how it can be used.\n\n**WHAT IS TWIRL?**\n\nTwirl is the template\
    \ engine developed for Play Framework. But it can also be used outside the Play\
    \ environment. By default, Twirl is included as part of Play but if there is a\
    \ need to use Twirl outside Play, then the `sbt` plugin for Scala can be installed.\
    \ For example adding the below entry in the `plugins.sbt` file will make Twirl\
    \ available to any `sbt`-based project:\n\n```\naddSbtPlugin(\"com.typesafe.sbt\"\
    \ % \"sbt-twirl\" % \"LATEST_VERSION\")\n```\n\nTemplate files must be named `{name}.scala.{ext}`\
    \ where `ext` can be `html`, `js`, `xml`, or `txt`. The templates can be used\
    \ to generate various types of markup like HTML, XML, or TXT and are totally decoupled\
    \ from the controller. Various kinds of markup can be plugged in as needed.\n\n\
    The Twirl template is just a normal text file that contains small blocks of Scala\
    \ code. Templates help to create composite views and help in a component-based\
    \ view generation.\n\nThe `@` character marks the beginning of the dynamic code\
    \ in the template.\n\nChapter 4 of this book provides detailed explanation of\
    \ views and Twirl templates.\n\nFor the time being, let's understand what is defined\
    \ in the `index.scala.html` file:\n\n```\n@main(\"Welcome to Play\") {\n    <h1>Welcome\
    \ to Play!</h1>\n}\n```\n\n`@main(\"Welcome to Play\")` calls another template,\
    \ `main.scala.html` and passes it the page title \"Welcome to Play\" and the HTML\
    \ content in the second parameter, enclosed within the `{}`.\n\nHence you can\
    \ infer that `main` template file should take two parameters: a string for the\
    \ title and HTML content as the second parameter.\n\nOpen the `main.scala.html`\
    \ to validate this. The file starts with `@(title: String)(content: Html)`; this\
    \ is just like any normal method that accepts two parameters.\n\n```\n@*\n * This\
    \ template is called from the `index` template. This template\n * handles the\
    \ rendering of the page header and body tags. It takes\n * two arguments, a `String`\
    \ for the title of the page and an `Html`\n * object to insert into the body of\
    \ the page.\n *@\n\n@(title: String)(content: Html)\n\n<!DOCTYPE html>\n<html\
    \ lang=\"en\">\n    <head>\n        @* Here's where we render the page title `String`.\
    \ *@\n        <title>@title</title>\n        <link rel=\"stylesheet\" media=\"\
    screen\" href=\"@routes.Assets.versioned(\"stylesheets/main.css\")\">\n      \
    \  <link rel=\"shortcut icon\" type=\"image/png\" href=\"@routes.Assets.versioned(\"\
    images/favicon.png\")\">\n    </head>\n    <body>\n        @* And here's where\
    \ we render the `Html` object containing\n         * the page content. *@\n  \
    \      @content\n        <script src=\"@routes.Assets.versioned(\"javascripts/main.js\"\
    )\" type=\"text/javascript\"></script>\n    </body>\n</html>\n```\n\nThe title\
    \ string is inserted to HTML `<title>` using `@title` and HTML content using `@content`\
    \ markup.\n\nNow you know the different elements and how they are wired together.\
    \ Let's take this further by writing a new action and a view.\n\nLet's create\
    \ an entry for the Hello World method:\n\n```\nGET /hello controllers.HomeController.hello()\n\
    ```\n\nSave the `routes` file. The next step is to code your controller to handle\
    \ the request.\n\n#### Controller and View\n\nInside the `app/controllers` folder,\
    \ you should find the `HomeController.java` file. This is your default controller.\n\
    \n```\npackage controllers;\n\nimport play.mvc.*;\nimport views.html.*;\nimport\
    \ java.time.LocalDate;\n\n/**\n * This controller contains an action to handle\
    \ HTTP requests\n * to the application's home page.\n */\npublic class HomeController\
    \ extends Controller {\n\n    /**\n     * An action that renders an HTML page\
    \ with a welcome message.\n     * The configuration in the <code>routes</code>\
    \ file means that\n     * this method will be called when the application receives\
    \ a\n     * <code>GET</code> request with a path of <code>/</code>.\n     */\n\
    \    public Result index() {\n        return ok(views.html.index.render());\n\
    \    }\n}\n```\n\nLet's examine the `HomeController` class in detail to understand\
    \ what is happening in it. First of all, it extends from `play.mvc.Controller`.\
    \ When you write a new controller, make sure you extend from `play.mvc.Controller`.\n\
    \nYou've seen the `index` method before: it is pretty simple and it just has a\
    \ single line. But it does a lot of smart things. The `ok()` method is closely\
    \ related to HTTP status 200, or the success response. If you want to return a\
    \ HTTP not found, you can use the `notFound` method. This is the beauty of Play;\
    \ it closely resembles HTTP protocol and there is no need for any fancy code to\
    \ convert your exceptions to corresponding HTTP status codes. You can code and\
    \ talk the language of HTTP.\n\nThe `ok()` method returns the HTML output generated\
    \ by the `render` method, defined in the view named `index`. You've seen this\
    \ view in `index.scala.html`. Views in Play use Scala and follow the naming convention\
    \ of `viewname.scala.html`. This file gets compiled by the Play compiler into\
    \ the corresponding Java class, which can be directly used in the controller.\
    \ This ensures type safety and less bugs. Remember that in other frameworks like\
    \ struts or Spring MVC, you typically return a string as view name and the framework\
    \ resolves that to a file. In Play, there is no need for that. The views are straightaway\
    \ available as Java class files and you can ensure compile-time type safety.\n\
    \nSince you have already added the routes entry for the `hello` method, let's\
    \ proceed with adding the controller method and create the view.\n\n##### View\n\
    \nCreate a new file inside the `app/views` folder and name it `hello.scala.html`\
    \ and add the following contents:\n\n```\n@(message: String)\n\n<!DOCTYPE html>\n\
    <html lang=\"en\">\n    <head>\n        <title>Hello World </title>\n    </head>\n\
    \    <body>\n        <h1> @message </h1>\n    </body>\n</html>\n```\n\nThis template\
    \ takes a single parameter and places that inside the HTML `<h1>` tags.\n\n#####\
    \ Controller\n\nNow edit the `HomeController`:\n\n```\npackage controllers;\n\n\
    import play.mvc.*;\nimport views.html.*;\nimport java.time.LocalDate;\n\n/**\n\
    \ * This controller contains an action to handle HTTP requests\n * to the application's\
    \ home page.\n */\npublic class HomeController extends Controller {\n\n    /**\n\
    \     * An action that renders an HTML page with a welcome message.\n     * The\
    \ configuration in the <code>routes</code> file means that\n     * this method\
    \ will be called when the application receives a\n     * <code>GET</code> request\
    \ with a path of <code>/</code>.\n     */\n    public Result index() {\n     \
    \   return ok(views.html.index.render());\n    }\n\n    public Result hello()\
    \ {\n        return ok(views.html.hello.render(\"Today is \"+LocalDate.now()));\n\
    \    }\n}\n```\n\n![](index-38_1.png)\n\nOpen your browser and go to `http://localhost:9000/hello`.\
    \ You will see the message \"Today is\" and the current date. See Figure 1-8.\n\
    \n***Figure 1-8.** The Hello page*\n\nJust change any HTML code in the view and\
    \ refresh the browser. Play will perform on-the-fly compilation and render the\
    \ view.\n\n#### Enhancing the View\n\nLet's now enhance the `hello.scala.html`\
    \ file to reuse the main template already available in the view folder. By using\
    \ this template you will be able to get the common theming across pages because\
    \ `main.scala.html` defines the common layout and style sheets.\n\nGo to the `public/stylesheets`\
    \ folder and open `main.css`. This is the master style sheet for the application.\
    \ You will make the background black and the text white in color:\n\n```\nbody\
    \ {\n    background: black;\n}\n\nh1,h2 {\n    color: white;\n}\n```\n\nGo to\
    \ `http://localhost:9000/` to see the changes. But wait, if you go to `http://localhost:9000/hello`,\
    \ the display shows the white background! Why?\n\nThe reason is your style sheet\
    \ definitions and all site-wide settings are defined in the `main.scala.html`\
    \ template but you never used it in the `hello.scala.html` file. Let's fix that.\n\
    \nEdit the `hello.scala.html` and replace its contents as follows:\n\n```\n@(message:\
    \ String)\n\n@main(\"Hello World\") {\n    <h2>@message</h2>\n}\n```\n\nYou want\
    \ a common theme across the web application and all pages should inherit the site\
    \ wide settings as is. You don't want to scatter the site-wide definitions across\
    \ all pages, so put all common settings like header, footer, style sheet definitions,\
    \ JavaScript inclusions, etc. in a single file; that is what `main.scala.html`\
    \ is used for. It defines the common elements applicable to all pages.\n\nThe\
    \ `main.scala.html` file is converted by Play into a method equivalent and can\
    \ be invoked from other pages using its name. The name doesn't include the `.scala.html`\
    \ part. For instance, `main.scala.html` is invoked using its name, `main`. The\
    \ `hello.scala.html` file calls the `main.scala.html` as a method call and reuses\
    \ the common definitions. Let's examine the contents of the `hello.scala.html`\
    \ file in detail to understand what is going on.\n\nThe `hello.scala.html` file\
    \ is very simple. It just invokes `main.scala.html` and passes it two arguments:\
    \ the title of the page as a string and the HTML content to be included. The first\
    \ argument to `main` is the string \"Hello World\" and the second argument is\
    \ the content within `{}`. In short, you pass the title and the HTML content defined\
    \ in `hello.scala.html` (the content within `{}`) to `main.scala.html`.\n\nNow\
    \ you have a common theme across all of your pages. Any other page you may define\
    \ should follow the same approach. If you want to include a JavaScript library\
    \ like JQuery or bootstrap to all pages, just define it in `main.scala.html` and\
    \ it will be available to all pages, if it follows the approach mentioned above.\n\
    \n### Testing Play Applications\n\nLet's now understand how to unit test the important\
    \ parts of a Play application: views and controller classes.\n\nPlay supports\
    \ test cases using Junit and provides helper classes and utilities to make testing\
    \ the application as easy as possible.\n\nTests should be created inside the `tests`\
    \ folder within the project root. Let's write test cases for the views and controllers.\n\
    \n#### Testing Views\n\nLet's write the test case for the `hello.scala.html` view.\
    \ Create a new file inside the `test` folder and name it `HelloViewTest.java`:\n\
    \n**HelloViewTest.java**\n\n```\nimport org.junit.Test;\nimport play.twirl.api.Content;\n\
    import static junit.framework.TestCase.assertEquals;\n\npublic class HelloViewTest\
    \ {\n\n    @Test\n    public void renderTemplate() {\n        Content html = views.html.hello.render(\"\
    Welcome to Play!\");\n        assertEquals(\"text/html\", html.contentType());\n\
    \        assert(html.body().toString().contains(\"Hello World\"));\n    }\n}\n\
    ```\n\nThe above test renders the `hello.scala.html` view and checks that the\
    \ content type is indeed html and also inspects the content to confirm that it\
    \ contains the string \"Hello World\".\n\nYou can run the test directly within\
    \ your IDE. Figure 1-9 shows how you can run test from Intellij.\n\n![](index-42_1.jpg)\n\
    \n***Figure 1-9.** Running a test*\n\nYou can also run a test from the command\
    \ prompt using `sbt`. Open the command prompt, go to the project root directory,\
    \ and run:\n\n```\nsbt test\n```\n\nNote that `sbt test` will run all tests in\
    \ the test folder. If you want to run only a particular test, use the `testOnly`\
    \ command.\n\n#### Testing Controllers\n\nCreate new file named `HomeControllerTest.java`\
    \ inside the `test` folder and add the contents as below. This test validates\
    \ the `index` method of the controller mapped to the `/` URL path.\n\n**HomeControllerTest.java**\n\
    \n```\nimport org.junit.Test;\nimport play.Application;\nimport play.inject.guice.GuiceApplicationBuilder;\n\
    import play.mvc.Http;\nimport play.mvc.Result;\nimport play.test.WithApplication;\n\
    import static org.junit.Assert.assertEquals;\nimport static play.mvc.Http.Status.OK;\n\
    import static play.test.Helpers.GET;\nimport static play.test.Helpers.route;\n\
    \npublic class HomeControllerTest extends WithApplication {\n\n    @Override\n\
    \    protected Application provideApplication() {\n        return new GuiceApplicationBuilder().build();\n\
    \    }\n\n    @Test\n    public void testIndex() {\n        Http.RequestBuilder\
    \ request = new Http.RequestBuilder()\n                .method(GET)\n        \
    \        .uri(\"/\");\n        Result result = route(app, request);\n        assertEquals(OK,\
    \ result.status());\n    }\n}\n```\n\nRun the test using the following `sbt` command:\n\
    \n```\nsbt test\n```\n\n![](index-44_1.jpg)\n\nTo run the `HomeControllerTest`\
    \ alone, perform the following steps (Figure 1-10):\n\n- Open the command prompt.\n\
    - Go to the project root.\n- Type `sbt` to go to the `sbt` shell.\n- `testOnly\
    \ HomeControllerTest`\n\n***Figure 1-10.** testOnly*\n\nThis concludes Chapter\
    \ 1. Before we discuss the controllers and other Play Framework components, let's\
    \ dive a little deeper into the build system (`sbt`) you are going to use.\n\n\
    ## Chapter 2: Build System\n\nPlay uses `sbt` as its build system, as you saw\
    \ in Chapter 1. A basic understanding of `sbt` is a must when you work with Play-based\
    \ projects.\n\nThe objective of this chapter is to provide a quick introduction\
    \ to `sbt`.\n\n### Scala Build Tool/Simple Build Tool\n\n`sbt` is the build tool\
    \ for Scala and Java projects. It is similar to the Maven build tool typically\
    \ used in Java projects. `sbt` is heavily inspired by Maven.\n\nAs a build tool,\
    \ it provides capabilities to compile, run, test, and package projects. Play comes\
    \ packaged with `sbt`, so there is no need to install `sbt` separately. Sbt was\
    \ created by Mark Harrah. There is confusion about whether `sbt` stands for \"\
    Scala build tool\" or \"simple build tool.\" In fact, when the `sbt` project started,\
    \ it was announced as \"simple build tool\" but over the years it was widely called\
    \ \"Scala build tool.\" So both usages are correct. My personal preference is\
    \ \"simple build tool\" because it can be used as the build tool for both Scala\
    \ and Java projects.\n\n### Core Principles\n\n`sbt` always sticks to four core\
    \ principles:\n\n1. Everything should have a type, enforced as much as is practical.\n\
    2. Dependencies should be explicit.\n3. Once learned, a concept should hold throughout\
    \ all parts of `sbt`.\n4. Parallel is the default.\n\n### Benefits of sbt\n\n\
    `sbt` has the following benefits:\n\n1. It uses the Scala language to describe\
    \ the build.\n2. There's no need to write big and large `pom.xml` files. The build\
    \ configuration is in code and not in XML.\n3. It works for both Scala and Java.\n\
    4. It requires a minimal configuration.\n5. It offers declarative dependency management\
    \ (via Ivy).\n6. It has sensible defaults.\n\n`sbt` build uses something called\
    \ tasks (yes, it is a task and nothing more) and a task can have dependencies.\
    \ So a `sbt` build is a tree of task dependencies that is to be executed.\n\n\
    When you want to do something, you have to execute a task. By default, the tasks\
    \ run in parallel in `sbt`. If you want to order the execution of tasks, it can\
    \ be done by specifying dependencies between tasks. For example, `compile` and\
    \ `test` are two tasks but `test` has a dependency with `compile`, so when you\
    \ execute the `test` task, the `compile` task will get executed before it.\n\n\
    Chaining of tasks is a lot easier with `sbt`. You can pass the output of a task\
    \ to another dependent task. Internally, `sbt` keeps an immutable map (key-value\
    \ pairs) describing the build. Because of this you can see that most of the entries\
    \ in the build file are key-value pairs. For instance, the project name is provided\
    \ as a key-value pair and it maps to a string value, the name of your project.\n\
    \nThe build configuration file in `sbt` is the `build.sbt` file and this is similar\
    \ in intent to that of the `pom.xml` in Maven. The `build.sbt` contains the build\
    \ definition of the project.\n\nLet's look at some code and practical examples\
    \ to get a better understanding.\n\n### Project Structure\n\nA typical project\
    \ structure has the `build.sbt` file in the root directory and the `build.properties`\
    \ and `plugins.sbt` files inside the `/project` directory:\n\n```\nHelloProject\n\
    ├ /project\n│   ├ build.properties: Specifies the sbt version to be used in the\
    \ project. If the particular sbt version is not available locally, the sbt launcher\
    \ will download it.\n│   └ plugins.sbt : Definition for sbt plugins\n└ build.sbt:\
    \ File containing build and project settings\n```\n\n**build.properties**\n\n\
    ```\nsbt.version=0.13.0\n```\n\nBefore you examine the `sbt` file structure created\
    \ by Play for your project, let's understand the structure of `build.sbt` in general\
    \ and try few examples.\n\nGo to any directory, create a folder called `helloworldsbt`,\
    \ create a file named `build.sbt`, and add the following contents:\n\n```\nname\
    \ := \"helloworldsbt\"\norganization := \"com.domainame.example\"\nversion :=\
    \ \"1.0-SNAPSHOT\"\n\nlazy val hello = (project in file(\".\"))\n  .settings(\n\
    \    name := \"HelloWorld Proj\"\n  )\n\nscalaVersion := \"2.13.0\"\n```\n\nThe\
    \ `build.sbt` file holds a sequence of key-value pairs called setting expressions\
    \ and has a general structure of:\n\n```\nkey operator setting/task body\n```\n\
    \nFor example:\n\n```\norganization := \"com.domainname\"\n```\n\nBreaking it\
    \ down a bit more:\n\n1. The left-hand side is the key.\n2. Operator (`:=`)\n\
    3. The right-hand side is the body.\n\nThe `organization`, `version`, `name`,\
    \ etc. are predefined, readily available keys.\n\n### Using sbt\n\nGo to the root\
    \ folder of the `helloworldsbt` project and type `sbt` from a command prompt.\
    \ You can see that `sbt` downloads the needed jars and you will be in the `sbt`\
    \ prompt as:\n\n```\nsbt:helloworldsbt>\n```\n\nYou don't have any source files\
    \ in the `helloworldsbt` project and it is fine. You can try many `sbt` commands\
    \ and their usage without source code.\n\nHere are the most common commands used\
    \ in a typical project:\n\n- `help`: Displays `sbt` help\n- `compile`: Compiles\
    \ the source code\n- `test`: Executes the test cases\n- `run`: Runs the main class\n\
    - `package`: Creates a jar file\n- `exit`: Exits from the `sbt` prompt\n\nWhen\
    \ you execute `run`, you will get the following error:\n\n```\nNo main class definition\
    \ found\n```\n\nIgnore it for now as it is because you don't have any source code\
    \ and `run` expects to find a main method to run.\n\nAs mentioned earlier, `compile`,\
    \ `run`, `test`, etc. are readily available tasks in `sbt` that perform a particular\
    \ action. Just like these tasks, `sbt` lets you create custom tasks and use them\
    \ in the build. Let's try a custom task.\n\nModify `build.sbt` as follows:\n\n\
    ```\nname := \"helloworldsbt\"\norganization := \"com.domainame.example\"\nversion\
    \ := \"1.0-SNAPSHOT\"\n\nlazy val hello = taskKey[Unit](\"Custom Task\")\n\nlazy\
    \ val root = (project in file(\".\")).settings(\n  hello := { println(\"This is\
    \ a custom task !!\") }\n)\n\nscalaVersion := \"2.13.0\"\n```\n\nThe following\
    \ line defines the tasks and assigns it to the variable `hello`:\n\n```\nlazy\
    \ val hello = taskKey[Unit](\"Custom Task\")\n```\n\nThe next line adds this task\
    \ and provides an implementation, which in this case is very simple, like printing\
    \ a string to the console. That's it; you have defined a custom task.\n\n```\n\
    lazy val root = (project in file(\".\")).settings(\n  hello := { println(\"This\
    \ is a custom task !!\") }\n)\n```\n\nTo test this, go the `sbt` prompt and type\
    \ `hello`.\n\n```\nsbt:helloworldsbt> hello\nThis is a custom task !!\n[success]\
    \ Total time: 1 s\n```\n\nFrom your project root folder you can even try `sbt\
    \ hello`:\n\n```\nC:\\Test\\helloworldsbt>sbt hello\nJava HotSpot(TM) 64-Bit Server\
    \ VM warning: ignoring option MaxPermSize=256m; support was removed in 8.0\n[info]\
    \ Loading project definition from C:\\Test\\helloworldsbt\\project\n[info] Loading\
    \ settings from build.sbt ...\n[info] Set current project to helloworldsbt (in\
    \ build file:/C:/Test/helloworldsbt/)\nThis is a custom task !!\n[success] Total\
    \ time: 0 s, completed Nov 8, 2019 1:03:59 PM\n```\n\nNow let's look at the `build.sbt`\
    \ definition created by Play for the bookshop project.\n\nWhen you create a Play\
    \ project, the build automatically creates the required `sbt` folder structures\
    \ and files:\n\n**build.sbt**\n\n```\nname := \"bookshop\"\norganization := \"\
    com.stackrules.example\"\nversion := \"1.0-SNAPSHOT\"\n\nlazy val root = (project\
    \ in file(\".\")).enablePlugins(PlayJava)\n\nscalaVersion := \"2.13.0\"\n\nlibraryDependencies\
    \ += guice\n\nEclipseKeys.preTasks := Seq(compile in Compile, compile in Test)\n\
    EclipseKeys.projectFlavor := EclipseProjectFlavor.Java // Java project. Don't\
    \ expect Scala IDE\nEclipseKeys.createSrc := EclipseCreateSrc.ValueSet(EclipseCreateSrc.ManagedClasses,\
    \ EclipseCreateSrc.ManagedResources)\n```\n\nLet's analyze each line. The entries\
    \ in the above files are settings. Each setting has to be separated by an empty\
    \ line. That is very important.\n\n#### Setting Definition\n\nAs you saw above,\
    \ a setting contains a key, an operator, and an initialization. For instance,\
    \ `name := \"bookshop\"` sets the project name to `bookshop`.\n\n- `name` – key\n\
    - `:=` assignment operator\n- `\"bookshop\"` - the initialization value\n\nThat\
    \ is how you set a static value for a setting. The value of a setting is computed\
    \ only once and kept around. A task is also similar to a setting having a key\
    \ and a value. The important difference is that a task is recomputed every time\
    \ when it is invoked. We will come back to tasks later.\n\nIn the `libraryDependencies`\
    \ section in the `build.sbt` file, you can see this entry:\n\n```\nlibraryDependencies\
    \ += guice\n```\n\nThis indicates the build is including `guice` Play module as\
    \ a dependency. To proceed to the other sections in the chapters ahead, you need\
    \ more modules to be available to Play. Let's modify the `libraryDependencies`\
    \ section to add them now.\n\nReplace the line:\n\n```\nlibraryDependencies +=\
    \ guice\n```\n\nwith:\n\n```\nlibraryDependencies ++= Seq(\n  javaJdbc,\n  cacheApi,\n\
    \  guice\n)\n```\n\nEbeam ORM is available as an external plugin for Play so add\
    \ the following to the `plugins.sbt` file:\n\n```\naddSbtPlugin(\"com.typesafe.sbt\"\
    \ % \"sbt-play-ebean\" % \"5.0.2\")\n```\n\nYou are done with the changes to the\
    \ build settings!\n\nThe typical library dependency format is:\n\n```\nlibraryDependencies\
    \ += groupID % artifactID % revision\n```\n\nFor example:\n\n```\nlibraryDependencies\
    \ += \"org.apache.derby\" % \"derby\" % \"10.4.1.3\"\n```\n\nYou can find the\
    \ `groupId` and `artifactId` of any jar by visiting Maven Central Repository at\
    \ [https://mvnrepository.com/repos/central](https://mvnrepository.com/repos/central)\
    \ and search using the name. For example, type **derby** and choose the version\
    \ to see its dependency information. The definition for derby 10.4.1.3 is shown\
    \ in Figure 2-1.\n\n![](index-53_1.jpg)\n\n***Figure 2-1.** Maven Central Repository*\n\
    \nThe above line adds Derby version 10.4.1.3 as a dependency. If you need to add\
    \ more dependencies, you have to add another line and so on. But there is also\
    \ a shorthand technique to add dependencies all at once rather than specifying\
    \ each one line by line:\n\n```\nlibraryDependencies ++= Seq(\n  groupID % artifactID\
    \ % revision,\n  groupID % otherID % otherRevision\n)\n```\n\n`sbt` depends on\
    \ plugins to extend the build settings defined in the `build.sbt` file. A plugin\
    \ adds more functionality to the build and is reused across `sbt` projects. For\
    \ example, someone could develop a plugin that performs code coverage during the\
    \ build. To integrate `sbt` and Play, you need to use the `sbt-plugin` from Typesafe.\
    \ The `plugins.sbt` file is where all plugin definitions go:\n\n```\n// Comment\
    \ to get more information during initialization\nlogLevel := Level.Warn\n\n//\
    \ The Typesafe repository\nresolvers += \"Typesafe repository\" at \"http://repo.typesafe.com/typesafe/releases/\"\
    \n\n// Use the Play sbt plugin for Play projects\naddSbtPlugin(\"com.typesafe.play\"\
    \ % \"sbt-plugin\" % \"2.8.0\")\n```\n\n#### Resolvers\n\nBy default, `sbt` uses\
    \ the standard Maven 2 repository. But not all jars exist in the default repositories.\
    \ If your jar is living in another repository, you can add that repository as\
    \ a resolver.\n\nFormat for adding a resolver:\n\n```\nresolvers += name at location\n\
    ```\n\nThere are three parts to this: the name and location separated by the `at`\
    \ keyword.\n\nAdding the Jboss repository:\n\n```\nresolvers += \"JBoss repository\"\
    \ at \"https://repository.jboss.org/nexus/content/repositories/\"\n```\n\n####\
    \ Complete build.sbt\n\n```\nname := \"\"\"bookshop\"\"\"\norganization := \"\
    com.stackrules.example\"\nversion := \"1.0-SNAPSHOT\"\n\nlazy val root = (project\
    \ in file(\".\")).enablePlugins(PlayJava)\n\nscalaVersion := \"2.13.0\"\n\nlibraryDependencies\
    \ ++= Seq(guice,javaJdbc,cache)\n\nEclipseKeys.preTasks := Seq(compile in Compile,\
    \ compile in Test)\nEclipseKeys.projectFlavor := EclipseProjectFlavor.Java //\
    \ Java project. Don't expect Scala IDE\nEclipseKeys.createSrc := EclipseCreateSrc.ValueSet(EclipseCreateSrc.ManagedClasses,\
    \ EclipseCreateSrc.ManagedResources)\n```\n\nYou can easily escape characters\
    \ and symbols inside strings; you just need to wrap the text within triple quotes.\
    \ This is why you see triple quotes for the name. If you need to include a space\
    \ or a colon or an apostrophe in the name, this syntax helps.\n\n#### Complete\
    \ plugins.sbt\n\n```\n// The Play plugin\naddSbtPlugin(\"com.typesafe.play\" %\
    \ \"sbt-plugin\" % \"2.8.0\")\n\n// Defines scaffolding (found under .g8 folder)\n\
    // http://www.foundweekends.org/giter8/scaffolding.html\n// sbt \"g8Scaffold form\"\
    \naddSbtPlugin(\"org.foundweekends.giter8\" % \"sbt-giter8-scaffold\" % \"0.11.0\"\
    )\n\naddSbtPlugin(\"com.typesafe.sbteclipse\" % \"sbteclipse-plugin\" % \"5.2.2\"\
    )\n\naddSbtPlugin(\"com.typesafe.sbt\" % \"sbt-play-ebean\" % \"5.0.2\")\n```\n\
    \n### Quick Recap of SBT Commands\n\n- `sbt`: Starts the `sbt` console\n- `run`:\
    \ Runs the main method of the application\n- `compile`: Compiles the source code\
    \ in the `src/main/scala` directory\n- `test`: Executes all test cases\n- `testOnly`:\
    \ Provides the complete name of the test case to run only the specific test case\n\
    - `test:compile`: Compiles only the test sources (`src/test/scala`)\n- `package`:\
    \ Creates a jar containing the classes from the source folder and artifacts from\
    \ the resource folders\n- `doc`: Generates Scala docs\n- `exit`: Quits the `sbt`\
    \ prompt\n\n## Chapter 3: Play Controllers and HTTP Routing\n\nThis chapter focuses\
    \ on the MVC part of the Play application: how MVC plays a key role in the Play\
    \ application framework. Before we get into the details of the HTTP routing and\
    \ controllers in Play, it is good to have a quick introduction to MVC. If you\
    \ are familiar with MVC, you can skip this and head straight to the \"HTTP Routing\"\
    \ section.\n\n### MVC Programming Model\n\nMVC (model-view-controller) is a framework\
    \ for building web applications using the famous MVC design pattern. MVC defines\
    \ an application into three logical layers: the business layer (model), the display\
    \ layer (view), and a routing and input control (controller). See Figure 3-1.\n\
    \n***Figure 3-1.** MVC*\n\nMVC architecture works like this. The user interacts\
    \ with the view and changes are sent to the controller by the view. The controller\
    \ receives the changes, invokes the model, and applies the validations and logic\
    \ in the model. The controller chooses the view and sends the updated model to\
    \ the view. The view is rendered and is send back to the browser client.\n\nBoth\
    \ the view and the controller depend on the model. The model doesn't have any\
    \ dependency with the view or controller. This is one of the key benefits of the\
    \ separation. This separation allows the model to be constructed and tested independently\
    \ of the view.\n\n#### Model\n\nThe model is the application's data and the business\
    \ logic on that data. The model is an independent component and doesn't depend\
    \ on the controller or the view. This means the model can be reused without associated\
    \ views or the controller.\n\nThe model handles the application's business logic\
    \ and is responsible for retrieving the data from the database, performing updates,\
    \ enforcing validations, and being the core logical and analytical part of the\
    \ application.\n\nConsider the model representing the customer of the application;\
    \ it's responsible for handling all validations and logic related to the customer\
    \ entity. The `deactivate` method in the following code is an example of business\
    \ logic within a model. This method handles the deactivation logic of the customer,\
    \ thereby encapsulating the domain logic within the model itself. The domain logic\
    \ is encapsulated within the domain object, so the model can be reused across\
    \ applications/subsystems.\n\n```\npackage models;\n\nimport java.util.List;\n\
    import controllers.Order;\n\npublic class Customer {\n    private long id;\n \
    \   private String name;\n    private boolean loyaltyMember;\n    private boolean\
    \ isActive;\n    private List<Order> orders;\n\n    public List<Order> getOrders()\
    \ {\n        //Logic\n    }\n\n    public boolean deactivate() {\n        //Logic\
    \ and validation to deactivate a customer\n    }\n}\n```\n\nThe customer is a\
    \ domain model and contains the data and the associated business logic and validations\
    \ applicable to the customer. Of course, if you follow domain-driven design, you\
    \ can split the model into many business objects and they can handle domain-specific\
    \ logic and validations. Spring beans, JPA beans, simple POJO, etc. are typically\
    \ used for implementing domain models.\n\n#### View\n\nThe view handles the display\
    \ of the data and gets needed data attributes from the model. The sole purpose\
    \ of the view is to display the data.\n\nConsider a screen showing the customer\
    \ data of the application. This screen may show the customer details, orders made\
    \ by the particular customer, and so on. If there is a new requirement to show\
    \ the same customer data in a drill-down mode instead of a tabular way in another\
    \ screen, only a new view needs to be created. There are no changes to be done\
    \ in the model. Thus views can be created and modified independently of the model.\n\
    \n#### Controller\n\nThe controller handles interactions with the user. Controllers\
    \ typically perform the following:\n\n- Get input data from the view and send\
    \ it to the model for persistence.\n- When the model changes, the controller sends\
    \ the updated model to the view and renders the view.\n\nMVC helps make development\
    \ in a team easy and manageable when working on large projects. It provides a\
    \ clean separation of concerns.\n\n### HTTP Routing\n\nThe job of the HTTP router\
    \ is to translate the incoming HTTP request to an action call. That is, it maps\
    \ an HTTP request to a method defined in the controller class. This configuration\
    \ is maintained in the `routes` files inside the `conf` folder. The `routes` file\
    \ also gets compiled by Play and, because of that, if you have any error in the\
    \ `routes` file, it will be displayed in the browser. This is very helpful during\
    \ development time.\n\nLet's look at HTTP routing fundamentals. An HTTP request\
    \ has two parts: the protocol part (GET, POST, PUT, etc.) and the request path\
    \ that includes the query string.\n\nTo define a route, define the protocol and\
    \ URL path in the `conf/routes` file. Before that, create a new controller class\
    \ inside the `app/controllers` folder and name it `Application`. Make sure to\
    \ extend the class from `play.mvc.Controller`.\n\n```\npackage controllers:\n\n\
    import play.mvc.*;\nimport views.html.*;\n\npublic class Application extends Controller\
    \ {\n\n}\n```\n\nYou will add methods to this controller after completing the\
    \ routes section.\n\nEdit the `conf/routes` file and add the following entries:"
