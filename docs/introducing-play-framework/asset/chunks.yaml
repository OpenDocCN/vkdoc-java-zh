    **作用域对象**


    在任何 Web 应用程序中，可能需要在应用的不同页面之间维护数据，以便与应用程序的用户保持对话会话。在某些情况下，你可能只需要将数据的作用域限定为下一个请求，而不是整个会话。Play
    对这两种情况都提供了支持。控制器类负责存储和访问作用域对象。


    第 3 章 Play 控制器与 HTTP 路由 Play 框架提供了两种作用域对象：


    • 会话作用域


    • 闪存作用域


