    \n//定义 getter 和 setter\n\n}\n\n有时，您可能希望仅使用关系功能，而不希望使用任何 ORM 功能。对于这种情况，Ebean 提供了\
    \ SqlQuery 类。在这里，您可以编写普通的旧 SQL 并像通过 JDBC 结果集一样获取结果。SqlQuery 是您指定确切 SQL SELECT\
    \ 语句并返回 SqlRow 对象的列表、集合或映射的地方。SqlRow 是一个 Map，其中键是列名。\n\n这是一个相当轻量级的 API，您可以使用它来代替使用原始\
    \ JDBC。同样，让我们看一个例子来理解这一点：\n\nString sql = \"select count(1) as count from book\
    \ where author = ?\"; SqlQuery query = Ebean. *createSqlQuery*(sql);\n\nquery.setParameter(1,\
    \ author);\n\nSqlRow row = query.findUnique();\n\n**int** count = row.getInteger(\"\
    count\");\n\n这比使用 JDBC API 编写普通的旧 JDBC 查询要容易得多。\n\n第 7 章 访问数据库\n\n如果情况需要**为插入或更新编写原始\
    \ SQL**，您可以使用 SqlUpdate 类：\n\nSqlUpdate query = Ebean. *createSqlUpdate*(sql);\n\
    \nEbean 还提供了 CallableSql 类来调用数据库过程和函数。\n\n**Ebean 中的关系**\n\n一个一对多的例子：\n\n@Entity\n\
    \n@Table(name=\"book\")\n\npublic class Book implements Serializable {\n\n// 单向\
    \ ...\n\n// ... 如果需要，可以显式指定连接列\n\n@OneToMany\n\n@JoinColumn(name=\"auth_id\")\n\
    \nList<Author> authors;\n\n考虑上述情况，您可以从 Book 实体找到作者，但无法从 Author 实体遍历回 Book。\n\n\
    这里外键在 book 表中，您可以使用 @JoinColumn 来指定需要用于键的表列。如果将其建模为双向关系，则代码如下：\n\n@Entity\n\n\
    @Table(name=\"author\")\n\npublic class Author implements Serializable {\n\n@OneToMany(mappedBy=\"\
    authorId\")\n\nList<Book> writtenBooks;\n\n请注意，在此双向模型中，Book 实体拥有外键，并且是关系的所有者。因此，您标记了反向侧：带有\
    \ mappedBy 属性的 Author。\n\n第 7 章 访问数据库\n\n如果您检查 RDBMS，您可以很容易地理解 RDBMS 表中不存在多对多关系。多对多关系在数据库表中通过交集表强制实现为两个一对多关系。如果您预计交集表可能需要支持更多属性，最好将其建模为单独的实体，并在您的模型中包含两个一对多关系。如果交集表中没有机会出现任何额外属性，您可以直接使用默认的\
    \ @ManyToMany 注解。这是一个例子。\n\n考虑用户和角色的情况。一个用户可以拥有多个角色，一个角色可能属于多个用户。在 RDBMS 中，这是使用交集表实现的。让我们将交集表命名为\
    \ user_role。让我们假设简单的情况，交集表不包含任何其他属性，在这种情况下，实体将具有 ManyToMany 关系，如代码所示：\n\n@Entity\n\
    \n@Table(name=\"user\")\n\npublic class User implements Serializable {\n\n...\n\
    \n@ManyToMany(cascade=CascadeType.ALL)\n\nList<Role> roles;\n\n@Entity\n\n@Table(name=\"\
    role\")\n\npublic class Role {\n\n...\n\n@ManyToMany(cascade=CascadeType.ALL)\n\
    \nList<User> users;\n\n关于 Ebean 还有很多东西需要解释，因为它非常庞大，可能需要一本全新的书来完整解释。我建议您阅读官方的 Ebean\
