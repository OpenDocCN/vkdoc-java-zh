    \n第 7 章 访问数据库\n\n我同时使用过 JPA 和 Ebean，根据我的经验，两者各有优点。毫无疑问，Ebean 使用的查询语言更易于理解和使用。这种简单性是\
    \ Ebean 的卖点。\n\nEbean 采用的另一个重要优化是它对部分对象的支持。在 JPA 中，您通常会注释一个关系，以指示是否需要使用急切或延迟获取策略来加载该关系。在急切获取中，当获取父对象时，子对象也会被检索和加载。在延迟加载策略中，仅加载父对象，子对象仅在使用时才被获取。配置这些获取策略的能力非常重要，并且是优化代码的一个重要因素。JPA\
    \ 提供了一个注解来在实体级别配置它们。但有一个问题。\n\n考虑一个场景，对于用例 1，您希望实体采用急切获取策略，而对于用例 2，您希望同一个实体使用延迟加载策略。这是一个问题，因为这些注解是在实体级别声明的。这非常不灵活。大多数\
