    **CHAPTER 2**


    **Build System**


    Play uses sbt as its build system, as you saw in Chapter [1\. A b](#index_split_000.html#p14)asic
    understanding of sbt is a must when you work with Play-based projects.


    The objective of this chapter is to provide a quick introduction to sbt.


    **Scala Build Tool/Simple Build Tool**


    sbt is the build tool for Scala and Java projects. It is similar to the Maven
    build tool typically used in Java projects. sbt is heavily inspired by Maven.


    As a build tool, it provides capabilities to compile, run, test, and package projects.
    Play comes packaged with sbt, so there is no need to install sbt separately. Sbt
    was created by Mark Harrah. There is confusion about whether sbt stands for “Scala
    build tool” or “simple build tool.” In fact, when the sbt project started, it
    was announced as “simple build tool” but over the years it was widely called “Scala
    build tool.” So both usages are correct. My personal preference is “simple build
    tool” because it can be used as the build tool for both Scala and Java projects.


    **Core Principles**


    sbt always sticks to four core principles:


    1\. Everything should have a type, enforced as much as


    is practical.


    2\. Dependencies should be explicit.


    © Prem Kumar Karunakaran 2020


    P. K. Karunakaran, *Introducing Play Framework*,


    [https://doi.org/10.1007/978-1-4842-5645-9_2](#index_split_000.html#p45)


    Chapter 2 Build SyStem


    3\. Once learned, a concept should hold throughout all


    parts of sbt.


    4\. Parallel is the default.


    **Benefits of sbt**


    sbt has the following benefits:


    1\. It uses the Scala language to describe the build.


    2\. There’s no need to write big and large pom.xml files.


    The build configuration is in code and not in XML.


    3\. It works for both Scala and Java.


    4\. It requires a minimal configuration.


    5\. It offers declarative dependency management (via Ivy).


    6\. It has sensible defaults.


    sbt build uses something called tasks (yes, it is a task and nothing more) and
    a task can have dependencies. So a sbt build is a tree of task dependencies that
    is to be executed.


    When you want to do something, you have to execute a task. By default, the tasks
    run in parallel in sbt. If you want to order the execution of tasks, it can be
    done by specifying dependencies between tasks. For example, compile and test are
    two tasks but test has a dependency with compile, so when you execute the test
    task, the compile task will get executed before it.


    Chaining of tasks is a lot easier with sbt. You can pass the output of a task
    to another dependent task. Internally, sbt keeps an immutable map (key-value pairs)
    describing the build. Because of this you can see that most of the entries in
    the build file are key-value pairs. For instance, the project name is provided
    as a key-value pair and it maps to a string value, the name of your project.


    Chapter 2 Build SyStem


    The build configuration file in sbt is the build.sbt file and this is similar
    in intent to that of the pom.xml in Maven. The build.sbt contains the build definition
    of the project.


    Let’s look at some code and practical examples to get a better understanding.


    **Project Structure**


    A typical project structure has the build.sbt file in the root directory and the
    build.properties and plugins.sbt files inside the /project directory: HelloProject


    /project


    build.properties: Specifies the sbt version to be


    used in the project. If the particular sbt version is not


    available locally, the sbt launcher will download it.


    plugins.sbt : Definition for sbt plugins


    build.sbt: File containing build and project


    settings


    **build.properties**


    sbt.version=0.13.0


    Before you examine the sbt file structure created by Play for your project, let’s
    understand the structure of build.sbt in general and try few examples


    Go to any directory, create a folder called helloworldsbt, create a file named
    build.sbt, and add the following contents:


    name := "helloworldsbt"


    organization := "com.domainame.example"


    Chapter 2 Build SyStem


    version := "1.0-SNAPSHOT"


    lazy val hello = (project in file("."))


    .settings(


    name := "HelloWorld Proj"


    )


    scalaVersion := "2.13.0"


    The build.sbt file holds a sequence of key-value pairs called setting expressions
    and has a general structure of


    key operator setting/task body


    For example:


    organization := "com.domainname"


    Breaking it down a bit more:


    1) The left-hand side is the key.


    2) Operator (:=)


    3) The right-hand side is the body.


    The organization, version, name, etc. are predefined, readily available keys.


    **Using sbt**


    Go to the root folder of the helloworldsbt project and type sbt from a command
    prompt. You can see that sbt downloads the needed jars and you will be in the
    sbt prompt as


    sbt:helloworldsbt>


    You don’t have any source files in the helloworldsbt project and it is fine. You
    can try many sbt commands and their usage without source code.


    Chapter 2 Build SyStem


    Here are the most common commands used in a typical project:


    • help: Displays sbt help


    • compile: Compiles the source code


    • test: Executes the test cases


    • run: Runs the main class


    • package: Creates a jar file


    • exit: Exits from the sbt prompt


    When you execute run, you will get the following error:


    No main class definition found


    Ignore it for now as it is because you don’t have any source code and run expects
    to find a main method to run.


    As mentioned earlier, compile, run, test, etc. are readily available tasks in
    sbt that perform a particular action. Just like these tasks, sbt lets you create
    custom tasks and use them in the build. Let’s try a custom task.


    Modify build.sbt as follows:


    name := "helloworldsbt"


    organization := "com.domainame.example"


    version := "1.0-SNAPSHOT"


    lazy val hello = taskKey[Unit]("Custom Task")


    lazy val root = (project in file(".")).settings(


    hello := { println("This is a custom task !!") }


    )


    scalaVersion := "2.13.0"


    The following line defines the tasks and assigns it to the variable hello: lazy
    val hello = taskKey[Unit]("Custom Task")


    Chapter 2 Build SyStem


    The next line adds this task and provides an implementation, which in this case
    is very simple, like printing a string to the console. That’s it; you have defined
    a custom task.


    lazy val root = (project in file(".")).settings(


    hello := { println("This is a custom task !!") }


    )


