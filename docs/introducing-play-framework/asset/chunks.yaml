    **Preface**


    Software developers need to have a number of traits in order to practice their
    jobs well. A developer’s primary job is to create software that solves business
    problems. Customers are operating in a dynamic business environment and they need
    to change their business solutions fast enough to retain and attract new customers.
    Hence, rapid application development is a critical aspect of today''s software
    development methodology. You need better frameworks and tools that can help in
    developing quality software faster.


    Play Framework is the new and impressive framework in web


    application development. By breaking the existing standards, it tries not to abstract
    away from HTTP, as with most web frameworks, but to tightly integrate with it.


    Play Framework is a revolution in rapid application programming for Java web development.
    It has changed the rules of the game for Java web development. Java web development
    was a tedious, time consuming activity and there were many frameworks offering
    the benefits of MVC


    architecture. But there were hardly any frameworks capable of providing true rapid
    application development capabilities. Play has changed all that.


    Play is a clean alternative to the existing Java Enterprise stacks for web development.
    Play focuses on developer productivity, scalability, adherence to modern web standards
    (REST, JSON, Web Sockets, and Comet, to name a few) and efficiency.


    Using Play Framework, you just need to code your changes and hit the browser refresh
    button to test your changes. Play will automatically compile and deploy your changes.
    If there are any errors in your code, Play shows them nicely in the browser. You
    are no longer required to scan long xv


    Prefa


    Pref C


    a e


    exception traces to find out the cause of the error. Above all, Play comes packaged
    with its own application server, which is lightweight, fast, and easy to use.
    In a single sentence, Play is the single framework you will need to start your
    Java web development. Java web development is a lot easier, more fun, and more
    powerful thanks to Play Framework.


    This book is all you need to learn and use the new version of Play Framework,
    Play 2\. You will be taken through all layers of Play Framework and you’ll get
    in-depth knowledge via as many examples and applications as possible.


