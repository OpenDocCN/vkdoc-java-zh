    But the recommended way to use Play is to install it using either sbt or Gradle
    because Play provides a better development experience when using sbt or Gradle.


    **Prerequisites**


    Play 2.x requires JDK 1.8 or later to be installed on the machine. Please note
    that JRE is not enough; you need JDK Version 8 or higher. You should ensure that
    the PATH variable points to the JDK bin directory and that javac and Java are
    accessible from everywhere.


    You can check this by typing javac -version in the command prompt or shell and
    verify that the version is 1.8 or above.


    You can get Java SE from the Oracle website a[t www.oracle.com/](http://www.oracle.com/technetwork/java/javase/downloads/index.html)


    [technetwork/java/javase/downloads/index.html](http://www.oracle.com/technetwork/java/javase/downloads/index.html).


    Play also works with Open JDK version 1.8 and above. But you should make sure
    that any dependency you use in the project is compatible with the Open JDK.


    **Installing sbt**


    sbt (Scala build tool) is available for all OS versions at the scala-sbt website
    at [www.scala-sbt.org/download.html](http://www.scala-sbt.org/download.html).
    Please follow the instructions in


    [the installation guide](https://www.scala-sbt.org/1.x/docs/Setup.html) at [www.scala-sbt.org/1.x/docs/Setup.html
    to](http://www.scala-sbt.org/1.x/docs/Setup.html)


    install sbt.


