    第 3 章 Play 控制器与 HTTP 路由 **Flash 作用域**


    Flash 作用域与会话类似，但存在以下区别。


    首先，**数据仅保留一个请求**。在第一个请求中，你设置 flash 作用域，当用户通过发出另一个请求移动到下一个页面或部分时，该数据可用，并且可以通过控制器中的方法在该请求的处理过程中检索到。其次，它使用未签名的
    cookie。


    会话和 flash 作用域都使用浏览器 cookie 来实现其行为，而 flash 作用域的 cookie 是未签名的。因此，不要使用 flash 作用域来存储任何敏感数据。仅将其用于存储成功消息或错误消息。使用以下代码将数据添加到
