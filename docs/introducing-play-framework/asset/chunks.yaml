    this response in an asynchronous, non-blocking, and efficient way. The intended
    output is to count the length of content in an incremental way and, once all the
    processing is over, send the response to the client. To use Akka streaming, you
    need to get a reference to the Akka ActorSystem and the Akka streaming materializer
    classes in the controller class. For the time being, just understand that the
    materializer is a helper class for Akka streams to work. This is the class that
    is responsible for materializing the Akka stream processing pipeline. If you are
