    *@


    @(title: String)(content: Html)


    <!DOCTYPE html>


    <html lang="en">


    <head>


    @* Here''s where we render the page titlèString`. *@


    <title>@title</title>


    <link rel="stylesheet" media="screen" href="@routes.


