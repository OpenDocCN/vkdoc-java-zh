    in it. First of all, it extends from play.mvc.Controller.


    When you write a new controller, make sure you extend from play.mvc.


    Controller.


    You’ve seen the index method before: it is pretty simple and it just has a single
    line. But it does a lot of smart things. The ok() method is closely related to
    HTTP status 200, or the success response. If you want to return a HTTP not found,
    you can use the notFound method. This is the beauty of Play; it closely resembles
    HTTP protocol and there is no need for any fancy code to convert your exceptions
    to corresponding HTTP status codes. You can code and talk the language of HTTP.


    The ok() method returns the HTML output generated by the render method, defined
    in the view named index. You’ve seen this view in index.


    scala.html. Views in Play use Scala and follow the naming convention of “viewname.scala.html”.
    This file gets compiled by the Play compiler into the corresponding Java class,
    which can be directly used in the controller. This ensures type safety and less
    bugs. Remember that in other frameworks like struts or Spring MVC, you typically
    return a string as view name and the framework resolves that to a file. In Play,
    there is no need for that. The views are straightaway available as Java class
    files and you can ensure compile-time type safety.


