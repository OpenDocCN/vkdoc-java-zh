    **CHAPTER 5**


    **Concurrency and**


    **Asynchronous**


    **Programming**


    Before you dive deeper into Play, it is very important to have a good knowledge
    of concurrency and asynchronous programming in Java. This is essential because
    the examples in the chapters ahead will use lot of asynchronous programming practices.


    Let’s first understand the java.util.concurrent package, the core module in Java
    for dealing with concurrent programming. Knowing this will help in relating to
    how Play handles asynchronous web services using WS


    and Promise classes. You may skip this chapter if you are already familiar with
    concurrency, its challenges, and how Java handles it using the new classes available
    in the java.util.concurrent package since JDK 1.5.


    Concurrent programming is now a lot easier in Java with the introduction of new
    classes in the java.util.concurrent package. The most important classes to focus
    on are


    1) Executor


    2) Callable<V>


    3) Future<V>


    4) CompletionStage<T>


    © Prem Kumar Karunakaran 2020


    P. K. Karunakaran, *Introducing Play Framework*,


    [https://doi.org/10.1007/978-1-4842-5645-9_5](#index_split_000.html#p87)


    Chapter 5 ConCurrenCy and asynChronous programming Before looking into each of
    the above classes in detail, let’s take a quick look at what concurrency is.


    **What Is Concurrency?**


    Concurrency is a technique that enables the execution of several tasks in parallel.
    These tasks can be parts of the same program or different programs.


    If a big task can be split into small chunks and if each of those chunks can be
    executed in parallel, it can result in better response times and throughput.


    When different parts of a program are run in parallel, usually lightweight processes
    called threads are used. The moment you use threads, you need to have proper mechanisms
    to allow access to shared resources, proper management of thread life cycles,
    scheduling, etc. The classes in the java.


    util.concurrent package help with many of these challenges.


    **Executor**


    Before the introduction of the Executor framework in JDK 1.5, thread management
    was the responsibility of the developer and there was no framework for that in
    JDK. Developers handled the creation of the threads and their management along
    with the actual business logic. From a design and coding perspective, this is
    not an ideal situation, when you take into account the benefits gained by following
    a “separation of concerns” design idea.


    It makes sense to separate out the thread management and creation from the rest
    of the program, and that is what the Executor framework does. An Executor abstracts
    thread management activities like creation, scheduling, etc. Instead of directly
    creating a thread, a Runnable class is submitted to an Executor and it handles
    its execution. ExecutorService, a more refined interface than Executor, is used
    in practical scenarios because it provides support for Callable and Future. You
    will look at Callable and Future in the coming sections. Note: ExecutorService
    extends from Executor.


    Chapter 5 ConCurrenCy and asynChronous programming The java.util.concurrent package
    provides three Executor


    interfaces:


    • Executor: A simple interface that supports launching


    new tasks


    • ExecutorService: A subinterface of Executor that


    adds features to help manage the life cycle, both of the


    individual tasks and the executor itself


    • ScheduledExecutorService: A subinterface of


    ExecutorService that supports future and/or


    periodic execution of tasks


    ThreadPoolExecutor, ScheduledThreadPoolExecutor, and


    ForkJoinPool are some of the important Executor implementations available in JDK


    At a high level, writing concurrent programs using the Executor framework involves
    the following:


    1) Define a class/task that implements either a


    Runnable or Callable interface.


    2) Configure and implement ExecutorService and


    submit the task.


    3) Use the Future class to retrieve the result if the task is a Callable task.


    Let’s look at the difference between a Runnable and Callable. A Runnable interface
    does not return a result whereas a Callable allows for return values after completion.
    When a Callable is submitted to the Executor framework, it returns an object of
    type java.util.concurrent.


    Future. The Future can be used to retrieve results.


    Chapter 5 ConCurrenCy and asynChronous programming **Example 1: Using Runnable**


    **package** com.domain.concurrency;


    **public class** SimpleTask **implements** Runnable {


    @Override


    **public void** run() {


    System. ***out***.println(**"SimpleTask, Runnable: Executing** **Logic "** +System.
    *currentTimeMillis*());


    }


    }


    The SimpleTask class is the portion of logic that you want to execute in parallel
    by many clients. This logic is implemented in the run method and it prints the
    currentTime in milliseconds. In a traditional Java practice, in order to execute
    this in parallel by many clients, you need to create threads for each client and
    run those threads, along with thread coordination, stopping, etc. You also need
