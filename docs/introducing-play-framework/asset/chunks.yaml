    言


    异常跟踪来找出错误原因。最重要的是，Play 自带其应用程序服务器，该服务器轻量、快速且易于使用。用一句话来说，Play 是您开始 Java Web 开发所需的唯一框架。得益于
    Play Framework，Java Web 开发变得更加容易、更有趣且更强大。


    本书是您学习和使用新版本 Play Framework（Play 2）所需的一切。您将深入了解 Play Framework 的所有层，并通过尽可能多的示例和应用程序获得深入的知识。


