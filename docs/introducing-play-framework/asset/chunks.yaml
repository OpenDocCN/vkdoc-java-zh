    Let’s analyze each line. The entries in the above files are settings. Each setting
    has to be separated by an empty line. That is very important.


    **Setting Definition**


    As you saw above, a setting contains a key, an operator, and an initialization.
    For instance, name := "bookshop" sets the project name to bookshop.


    name – key := assignment operator "bookshop" - the initialization value That is
    how you set a static value for a setting. The value of a setting is computed only
    once and kept around. A task is also similar to a setting having a key and a value.
    The important difference is that a task is recomputed every time when it is invoked.
    We will come back to tasks later.


    In the libraryDependencies section in the build.sbt file, you can see this entry:


    libraryDependencies += guice


    This indicates the build is including guice Play module as a dependency. To proceed
    to the other sections in the chapters ahead, you need more modules to be available
    to Play. Let’s modify the libraryDependencies section to add them now.


    Chapter 2 Build SyStem


    Replace the line


    libraryDependencies += guice


    with


    libraryDependencies ++= Seq(


    javaJdbc,


