    An important factor to remember is that a module doesn’t have its own configuration;
    it uses the main application’s configuration. This means module-specific configuration
    information should be set in the application''s conf/application.conf file.


    The module you are going to develop is simple. It calculates the factorial of
    a number less than 25\. So follow these steps:


    1) Create a package and name it modules in the app


    directory.


    2) Define the contract of the module as an interface:


    package modules;


    public interface Factorial {


    int fact(int num);


    }


    3) Provide the implementation for the Factorial


    interface:


    package modules;


    import play.inject.ApplicationLifecycle;


    import javax.inject.Inject;


    public class FactorialImpl implements Factorial{


    @Inject


    public FactorialImpl(ApplicationLifecycle lifecycle) {


    //implement plugin lifecycle methods


    }


    Chapter 9 Using play ModUles


    public int fact(int number) {


    return calculateFactorial(number);


    }


    private int calculateFactorial(int num) {


    if(num > 25) {


    throw new RuntimeException("Our of range");


    }


    if(num == 1)


    return num;


    return num ∗ calculateFactorial(num-1);


    }


    }


    4) Create a module and name it FirstModule:


    package modules;


    import play.api.Configuration;


    import play.api.Environment;


    import play.api.inject.Binding;


    import play.api.inject.Module;


    import javax.inject.Inject;


    import play.inject.ApplicationLifecycle;


    import scala.collection.Seq;


    public class FirstModule extends Module {


    public Seq<Binding<?>> bindings(Environment


    environment, Configuration configuration) {


    return seq(


    bind(Factorial.class).to(FactorialImpl.class)


    );


    }


    }


    Chapter 9 Using play ModUles


    Here you’ve declared a module and added your Factorial


    implementation to the module. Now, for Play to detect it as a module, a few changes
    are required in the application.conf file:


    play.modules.enabled += "modules.FirstModule"


    Save the file. That’s it! You have created a custom Play module. The Factorial
    implementation defined in this module can be injected to any class and can be
    used. For example, if it is needed in a controller class, just declare it as


    @Inject Factorial fact;


    Play will do the rest and make it available during runtime. If you want to make
    this module available to other Play applications, it needs to be published to
    repositories. In such a case, only include the module classes and related dependent
    classes in the Play application. All unused components like views, public assets,
    etc. can be removed.


    Start the command prompt and go to the directory where you created the factorial
    Play project. For example, if the project exists in C:\Users\ username\playexamples\bookshop\,
    type sbt from the command prompt.


    This will load the Play console. You need to publish the module so that it is
    accessible by other applications. For the sake of simplicity, you will publish
    this module to a local repository in your computer:


    bookshop] $ publishLocal


    Play will compile the files and publish to the local Play repository.


    From the Play console, do take a note of the location where Play publishes the
    module. In my machine, it is published under C:\Users\premk\.ivy2\ local\com.stackrules.example\bookshop_2.13\1.0-SNAPSHOT\docs\
    bookshop_2.13-javadoc.jar. See Figure [9-1.](#index_split_001.html#p172)


    ![](index-172_1.jpg)


    Chapter 9 Using play ModUles


    ***Figure 9-1.** Published module*


    The module is now ready to be consumed by other applications.


    **Third-Party Modules**


    Often you need to use other software tools for various reasons, and in Play they
    are integrated into the application using modules. There are many third-party
    modules available for most enterprise requirements. Play modules make it possible
    to extend Play functionality with a plug-and-play architecture. Here are some
    popular ones:'
