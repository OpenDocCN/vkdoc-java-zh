- fmt: "• Notification of evicted (or otherwise removed) entries\n• Writes propagated\
    \ to an external resource\n• Accumulation of cache access statistics\n\nYou can\
    \ find more about Caffeine at [https://github.com/ben-manes/caffeine/](https://github.com/ben-manes/caffeine/).\n\
    \n## Adding Caffeine to a Project\n\nOpen the `build.sbt` file and add the dependency\
    \ for Caffeine:\n\n```\nlibraryDependencies ++= Seq( guice, javaJdbc, cacheApi,\
    \ javaWs, javaJpa, caffeine, org.hibernate\" % \"hibernate-entitymanager\" % \"\
    5.3.7.Final\", com.h2database\" % \"h2\" % \"1.4.200\" )\n```\n\nThis is all that\
    \ is required to use Caffeine as the cache implementation for Play.\n\n## Chapter\
    \ 11 Working With Cache\n\n### Configuring EhCache\n\nEhCache has been in existence\
    \ for a long time and is one of the most widely used cache implementations in\
    \ Java projects. It requires Java 8 or above. You can learn about the internal\
    \ workings of EhCache at [www.ehcache.org/](http://www.ehcache.org/).\n\nConfiguring\
    \ EhCache is as simple as adding an entry to the `build.sbt` file, just like you\
    \ did for Caffeine:\n\n```\nlibraryDependencies ++= Seq( guice, javaJdbc, cacheApi,\
    \ javaWs, javaJpa, ehcache, org.hibernate\" % \"hibernate-entitymanager\" % \"\
    5.3.7.Final\", com.h2database\" % \"h2\" % \"1.4.200\" )\n```\n\n### Using the\
    \ Cache API\n\nThe Cache API is pretty simple and easy to use:\n\n- Putting data:\
    \ `Cache.set(\"key\", object)`\n- Retrieving data: `Cache.get(\"key\")`\n- Removing\
    \ data: `Cache.remove(\"key\")`\n\nYou can also control how long data needs to\
    \ be retained in the cache (cache expiry) by using the `set` method with three\
    \ arguments: `Cache.set(\"key\", object, int timeinminutes)`\n\nTo use the Cache\
    \ API in the controller, it needs to be injected. Modify the `Application.java`\
    \ file as follows to get a reference to the Cache API:\n\n```\nprivate AsyncCacheApi\
    \ cache;\n\n@Inject\npublic Application(ActorSystem system, AsyncCacheApi cache)\
    \ {\n    pingActor = system.actorOf(PingActor.getProps());\n    this.cache = cache;\n\
    }\n```\n\nNow you can use the Cache API to cache data in any method of the controller.\
    \ For instance:\n\n```\nCompletionStage<Done> result = cache.set(\"framework\"\
    , \"Playframework\");\n// Cache for 10 minutes\nCompletionStage<Done> result =\
    \ cache.set(\"framework\", \"Playframework\", 60 * 10);\n```\n\nWhenever you work\
    \ with cache, remember that a cache can expire or get lost anytime. It is not\
    \ persistent data, hence you should always check whether the data is in cache\
    \ and, if not, populate it in cache and then retrieve it. This way your program\
    \ is safe even if the cache doesn't work or expires sooner than expected. In Play,\
    \ the underlying cache implementation can automatically remove objects from cache\
    \ if there is a low memory scenario in the JVM. So code wisely and use cache effectively.\n\
    \nPlay uses a callable method to load data into cache if it is not present. This\
    \ is accomplished by providing a callable method to the Cache API that gets invoked\
    \ to generate the cached data when data is absent in the cache.\n\nLet’s modify\
    \ the `Application.java` file to add such a method:\n\n```\npublic CompletionStage<Result>\
    \ topThreeBooks() {\n    return cache.getOrElseUpdate(\"topthree\", this::getTopBooks)\n\
    \        .thenApply((List<String> books) -> ok(books.toString()));\n}\n\nprivate\
    \ CompletionStage<List<String>> getTopBooks() {\n    List<String> topThreeBooks\
    \ = new ArrayList<String>();\n    topThreeBooks.add(\"Book 1\");\n    topThreeBooks.add(\"\
    Book 2\");\n    topThreeBooks.add(\"Book 3\");\n    return CompletableFuture.completedFuture(topThreeBooks);\n\
    }\n```\n\nThe private method `getTopBooks` is the callable method and it is invoked\
    \ by the Cache API if the data is not present in the cache. This method computes\
    \ the top three books and returns the response. The public method `topThreeBooks`\
    \ uses the `getOrElseUpdate` method of the Cache API to get the data from the\
    \ cache and convert it to the HTTP response.\n\n### Edit routes.conf\n\n```\n\
    GET /bookshop/book/top controllers.Application.topThreeBooks()\n```\n\nTest the\
    \ method using `http://localhost:9000/bookshop/book/top` and you will see the\
    \ response as:\n\n```\n[Book 1, Book 2, Book 3]\n```\n\nPlay also provides the\
    \ ability to cache entire HTTP responses. This is useful to cache content that\
    \ doesn't change per request. Let’s create a new route and cache its response.\
    \ You’ll use the Contact Us data that is static (you show the same content to\
    \ all users). Open the `Application.java` file and add the `contactus` method:\n\
    \n```\n@Cached(key=\"contactus\")\npublic Result contact() {\n    log.info(\"\
    contact us method: processing\");\n    return ok(\"Apress Media, LLC\\n\" +\n\
    \              \"\\n\" +\n              \"One New York Plaza, Suite 4600\\n\"\
    \ +\n              \"\\n\" +\n              \"New York, NY 10004-1562\");\n}\n\
    ```\n\nAdd the route configuration in the `routes.conf` file as:\n\n```\nGET /bookshop/contact\
    \ controllers.Application.contact()\n```\n\nTo test, open the URL `http://localhost:9000/bookshop/contact`\
    \ to observe the response. This response is cached and is coming from the in-memory\
    \ cache. To test this, check the logs in the `application.log` file or console\
    \ you will see the entry:\n\n```\n[info] c.Application - contact us method: processing\n\
    ```\n\nAccess the URL again and you won’t see the log entry because from the second\
    \ time onwards, the response is served from the cache, bypassing the processing\
    \ logic which was already computed and cached.\n\nThis example is very simple\
    \ and was used just to explain the point. Response caching is very useful if the\
    \ data (the contact info, as above) is retrieved from a database or a web service\
    \ or some other way that involves some amount of processing. In such cases, for\
    \ the first time, the processing will happen, but from the next time onwards you\
    \ can avoid all processing because the response will be served from the cache.\
    \ This generates a faster response to the user and also doesn’t waste the processing\
    \ time of the servers.\n\nThere are also many scenarios where it is not practical\
    \ to cache the entire HTTP response. For instance, you may have certain elements\
    \ in a page that change according to the user, based on his login. This scenario\
    \ can also be easily handled by caching only the part of the data. You should\
    \ design your content for this. Consider a home page with 75% static content and\
    \ 25% dynamic content. In this case, split the static and dynamic parts into separate\
    \ objects and cache the static object. But in such a scenario you can only cache\
    \ the object and not the generated static HTML. That is, you cannot take part\
    \ of the HTML response from the cache and mix it with the dynamic HTML response.\
    \ You have to cache at the object or data level rather than the HTTP response\
    \ level in such cases. For pure static content that doesn't change with each request\
    \ or user, use HTTP response caching, as explained in the `contact` method above.\
    \ You also learned object caching, as explained in the `topThreeBooks` example\
    \ above.\n\nThe default Caffeine implementation is good enough for most cases\
    \ and is highly scalable. But if you need to use a distributed caching framework\
    \ like memcached, Play provides hooks to plug in memcached with its Cache API.\
    \ For memcached, Play provides an implementation by default but depends on third-party\
    \ plugins. To use memcached with Play, use the plugin available at [https://github.com/mumoshu/play2-memcached](https://github.com/mumoshu/play2-memcached).\
    \ I won’t detail a memcached implementation in this book because the third-party\
    \ plugin documentation is not yet updated with Play 2.7 and above.\n\n## Chapter\
    \ 12 Production Deployment\n\nAn easier way to deploy Play is to use the command\
    \ `play run`. For this to work, you need to copy the entire Play project to the\
    \ production box and then, from within the project, issue `play run`. This is\
    \ not a good method for production deployment because you don’t want to move your\
    \ source files and only the executable in the form of jar files needs to be pushed\
    \ to production."
