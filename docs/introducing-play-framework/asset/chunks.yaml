  trans: "\n• Redis：集成 Redis 以提供缓存实现\n\n• Deadbolt：基于角色的授权\n\n• PDF：增加基于 HTML 模板的\
    \ PDF 输出支持\n\n还有更多此类模块可用，你可以访问[www.playframework.org](http://www.playframework.org)获取更多相关信息。\n\
    \n**第 10 章**\n\n**应用程序设置**\n\n**与错误处理**\n\n在 Play 2.6 之前，通常使用全局对象来定义应用程序级别的配置和处理逻辑，例如过滤、错误处理等。这种方法在\
    \ Play 2.5.x 中已被弃用，并从 Play 2.6.x 起彻底移除。自 Play 2.6.x 起，推荐使用依赖注入的方式。因此，我不会详细讨论 2.6.x\
    \ 之前采用的方法，而是将你的注意力引向依赖注入方式。在本节末尾，我会给出一个示例，让你了解之前是如何实现的，这对于将旧版 Play 框架项目迁移到新版本会有所帮助。\n\
    \nPlay 应用程序的主类是`play.Application`。该类由 Play 框架在应用程序启动时创建。你无需做任何特殊操作来触发这一过程，框架会自动处理。\n\
    \n你可以通过依赖注入将处理程序绑定到特定类的实例，从而挂钩各种应用程序级别的行为。这是在 Play 中配置应用程序级别绑定的推荐方式。\n\n让我们通过示例来更深入地理解这一点。\n\
    \n© Prem Kumar Karunakaran 2020\n\nP. K. Karunakaran，《Introducing Play Framework》，\n\
    \n`doi.org/10.1007/978-1-4842-5645-9_10`\n\n第 10 章 应用程序设置与错误处理 **过滤器**\n\n过滤器旨在将应用程序的横切关注点应用于所有类，例如日志记录、检查安全标头、压缩响应、分析等。这些都是过滤器发挥作用的地方。Play\
    \ 还有一种称为动作组合（action composition）的机制，它适用于关注点与特定路由相关的情况。\n\n例如，你可能决定保护某些路由，同时允许所有其他路由公开访问。在这种情况下，对于特定路由，你可能需要检查认证/授权语义。对于此类情况，请使用动作组合。你将在本章后续部分进一步了解动作组合。我们先聚焦于过滤器。\n\
    \n日志过滤器：\n\n```java\npackage config;\n\nimport akka.event.LoggingFilter;\n\nimport\
    \ akka.stream.Materializer;\n\nimport java.util.concurrent.CompletionStage;\n\n\
    import java.util.function.Function;\n\nimport org.slf4j.Logger;\n\nimport org.slf4j.LoggerFactory;\n\
    \nimport play.mvc.Filter;\n\nimport play.mvc.Http;\n\nimport play.mvc.Result;\n\
    \nimport javax.inject.Inject;\n\n/**\n * A simple filter implementation that logs\
    \ how long it took to process a request\n */\npublic class ApplicationFilter extends\
    \ Filter {\n\n    @Inject\n    public ApplicationFilter(Materializer mat) {\n\
    \        super(mat);\n    }\n\n    private static final Logger log = LoggerFactory.getLogger(LoggingFilter.class);\n\
    \n    @Override\n    public CompletionStage<Result> apply(Function<Http.RequestHeader,\n\
    \            CompletionStage<Result>> next,\n                                \
    \        Http.RequestHeader requestHeader) {\n        long startTime = System.currentTimeMillis();\n\
    \        return next\n                .apply(requestHeader)\n                .thenApply(\n\
    \                        result -> {\n                            long endTime\
    \ = System.currentTimeMillis();\n                            long requestTime\
    \ = endTime - startTime;\n                            log.info(\n            \
    \                        \"{} {} took {}ms to complete and produced the status\
    \ {}\",\n                                    requestHeader.method(),\n       \
    \                             requestHeader.uri(),\n                         \
    \           requestTime,\n                                    result.status());\n\
    \                            return result;\n                        });\n   \
    \ }\n}\n```\n\n`ApplicationFilter`类继承自`play.mvc.Filter`并重写了`apply`方法。`apply`方法接受两个参数：1)\
    \ 一个函数，该函数以`Http.RequestHeader`为参数，并返回`CompletionStage<Result>`作为输出；2) `Http.RequestHeader`：传入请求的请求头。\n"
- fmt: "# Understanding the First Argument and Filter Chain\n\nLet’s understand the\
    \ first argument and look at how it is used in the code. The next parameter you\
    \ use in the code represents the next action in the filter chain. Invoking it\
    \ will result in allowing the request to flow forward and eventually reach the\
    \ intended class, the controller in most cases. In your logging case, before you\
    \ pass control, you log the request time and then allow the request to flow forward.\
    \ Once the request completes, you use the `thenApply` function to log the response\
    \ time and return the result back to the caller. Please note that `CompletionStage<Result>`\
    \ is the generic Promise API provided by Java 8 for handling asynchronous responses.\
    \ Since Play uses asynchronous programming, the responses from Play APIs use it.\
    \ This is the reason why you need to do processing using the `thenApply` method.\
    \ More details of the `Promise` class and asynchronous programming are provided\
    \ in the chapter on asynchronous programming.\n\n# Chapter 10: Application Settings\
    \ and Error Handling\n\nNow that you have created a filter, let’s see how you\
    \ can tell Play to use it. Create a class named `FilterConfig` as follows and\
    \ save it inside the `config` package:\n\n**FilterConfig.java**\n\n```java\npackage\
    \ config;\n\nimport play.http.DefaultHttpFilters;\nimport javax.inject.Inject;\n\
    \npublic class FilterConfig extends DefaultHttpFilters {\n\n    @Inject\n    public\
    \ FilterConfig(ApplicationFilter logging) {\n        super(logging);\n    }\n\
    }\n```\n\nYou have defined this class in a package, `config`. Because of this,\
    \ Play needs to be told which class it should use to configure the filters. This\
    \ is done by adding the following entry to the `application.conf` file: `play.http.filters=config.FilterConfig`\n\
    \nIf you saved the `FilterConfig` file in the root folder, then Play will automatically\
    \ use it and there is no need to add the entry in `application.conf`, as above.\
    \ But it is better to put the classes into corresponding packages for ease of\
    \ organization and modularity, and that’s the reason for saving in the `config`\
    \ package instead of the root folder. Observe that the custom filter was passed\
    \ as an argument to the `FilterConfig` class using constructor-level dependency\
    \ injection. If you have written more filters, you can pass them in the same way\
    \ as constructor arguments to the `FilterConfig` class. This works because the\
    \ `FilterConfig` class extends from `DefaultHttpFilters` and it has a constructor\
    \ that takes N, the number of `Filter` instances via vargs.\n\nThat is it. You\
    \ have created a response logging filter. Let’s test it. Open `http://localhost:9000/bookshop`\
    \ and observe the console output and logs (`projectroot\\logs\\application.log`).\
    \ In both places you will see an entry as follows:\n\n```\n[info] a.e.LoggingFilter\
    \ - GET /bookshop took 7ms to complete and produced the status 200\n```\n\nIf\
    \ you don’t see any output, check the logger settings and make sure it is set\
    \ to the INFO log level. For this, open the `conf/logback.xml` file and ensure\
    \ you have the following settings:\n\n```xml\n<logger name=\"play\" level=\"INFO\"\
    \ />\n<logger name=\"application\" level=\"DEBUG\" />\n<root level=\"INFO\">\n\
    \    <appender-ref ref=\"ASYNCFILE\" />\n    <appender-ref ref=\"ASYNCSTDOUT\"\
    \ />\n</root>\n```\n\n## Action Composition\n\nAction composition is useful when\
    \ you want to decorate a specific class or certain group of classes with additional\
    \ logic. Let’s learn by an example: **EchoAction.java**\n\n```java\npackage config;\n\
    \nimport org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\nimport play.mvc.Http;\n\
    import play.mvc.Result;\nimport java.util.concurrent.CompletionStage;\n\n/**\n\
    \ * An example of Action composition\n */\npublic class EchoAction extends play.mvc.Action.Simple\
    \ {\n\n    private static final Logger log = LoggerFactory.getLogger(EchoAction.class);\n\
