- fmt: "# Play Framework 缓存与全局设置\n\n## 关于 `GlobalSettings` 和 `Global` 的说明\n\n我不会深入探讨\
    \ `GlobalSettings` 和 `Global`，因为 Play 从 2.5.0 版本开始已弃用它们，现在推荐使用依赖注入。下面的示例仅用于展示早期\
    \ Play 版本的做法。请注意，以下代码仅适用于 Play 2.5.x 及更低版本；它不适用于 Play 2.8.x（本书基于的版本）。此代码仅供参考，以便您从早期\
    \ Play 版本迁移到最新版本时了解之前的实现方式。\n\n## 创建 `Global` 对象\n\n要创建 `Global` 对象，只需编写一个继承自\
    \ `play.GlobalSettings` 的类。`Global` 对象通常保存在应用程序的根包中，但您也可以将其保存在任何包中，然后通过 `application.conf`\
    \ 文件中的 `application.global` 属性进行配置：\n\n```java\nimport play.Application;\nimport\
    \ play.GlobalSettings;\nimport play.libs.Akka;\nimport play.mvc.Http.RequestHeader;\n\
    import play.mvc.Result;\nimport play.mvc.Results;\nimport scala.concurrent.duration.Duration;\n\
    import akka.actor.ActorRef;\nimport akka.actor.Props;\nimport controllers.Preloader;\n\
    \npublic class Global extends GlobalSettings {\n\n    public Result onError(RequestHeader\
    \ request, Throwable t) {\n        return Results.notFound(views.html.errorpagetemplate.render());\n\
    \    }\n\n    public Result onHandlerNotFound(RequestHeader request) {\n     \
    \   return Results.notFound(views.html.errorpagetemplate.render());\n    }\n\n\
    \    public Result onBadRequest(RequestHeader request, String error) {\n     \
    \   return Results.notFound(views.html.errorpagetemplate.render());\n    }\n\n\
    \    public void onStart(Application app) {\n        // 初始化所有内容\n        ActorRef\
    \ preloader = Akka.system().actorOf(new Props(Preloader.class));\n        Akka.system().scheduler().schedule(\n\
    \            Duration.create(0, TimeUnit.MILLISECONDS), // 初始延迟 0 毫秒\n       \
    \     Duration.create(5, TimeUnit.MINUTES),      // 频率 30 分钟\n            preloader,\n\
    \            \"preload\",\n            Akka.system().dispatcher()\n        );\n\
    \    }\n\n    public void onStop(Application app) {\n        Logger.info(\"Application\
    \ shutdown\");\n    }\n}\n```\n\n要迁移到最新的 Play 版本，您应该编写自定义过滤器，并将逻辑包含在这些过滤器或错误处理器中。您在本章开头已经学习了这两方面的内容。\n\
    \n---\n\n# 第 11 章：使用缓存\n\n缓存是确保应用程序可扩展性和响应性的最重要方面之一。良好的缓存可以减轻数据库的负载，并能够快速响应用户请求。一个不提供良好缓存抽象框架的框架，已不再适合企业级开发。Play\
    \ 凭借其内置的缓存支持，是构建高度可扩展、响应迅速的企业级应用程序的理想框架。\n\nPlay 提供了一个全局缓存对象，它与底层缓存实现协同工作。这种抽象使您能够在不修改应用程序代码的情况下更改缓存提供程序。默认情况下，Play\
    \ 提供了使用 Caffeine 的缓存 API 实现，同时也提供了 EhCache 2.x 的实现。对于进程内处理，Play 推荐使用 Caffeine。\n\
    \n## 配置 Caffeine\n\nCaffeine 是一个高性能、近乎最优的缓存库，基于 Java 8。\n\n以下是 Caffeine 的重要特性概览：\n\
    \n- 自动将条目加载到缓存中（可选异步加载）\n- 当超过最大容量时，基于频率和最近访问时间进行大小驱逐\n- 基于时间的条目过期（自上次访问或上次写入后计时）\n\
    - 当第一个过期请求到达时，异步刷新条目\n- 键自动包装为弱引用\n- 值自动包装为弱引用或软引用"
