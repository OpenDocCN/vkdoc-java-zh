- fmt: '# Home page


    `GET /bookshop` `controllers.Application.index`


    # Show details of a Book


    `GET /bookshop/book/:id/` `controllers.Application.getBook(id:String)`


    # Add a comment to the book


    `POST /bookshop/book/save/comment/` `controllers.Application.saveComment(request:Request)`


    # Search a book by Title


    `GET /bookshop/book/search/` `controllers.Application.searchByTitle(keyword:String)`


    This example features a basic application for managing books online. It utilizes
    HTTP methods and URIs appropriately.


    The entries defined in the routes file show important features of routing. The
    first entry indicates that the home URL (say `http://yourdomainname/bookshop`)
    points to the `index` method defined in the `Application` class (a controller).
    The rest of the definitions show how to dynamically include parameters in path
    and as query string parameters.


    Let’s examine this in more detail.


    ## Static Definition


    The definition `GET / controllers.Application.index` indicates that the root path
    doesn’t take any parameters and it is routed to the `index` method defined in
    the `Application` class. You are using the `GET` protocol for this example. If
    your webserver supports it, you can also use the `PUT` and `DELETE` HTTP protocols
    as well.


    The overall structure of a routes entry is:


    `Protocol URLPATH Controller Mapping`


    ## Dynamic Parts in a URL


    Let’s say you want to retrieve the details of a particular book but you don’t
    know in advance which book a user might select, so the book id has to be dynamic:


    `GET /bookshop/book/:id/ controllers.Application.getBook(id:String)`


    The dynamic part is indicated by a colon (`:`) followed by the parameter name
    (in this example `:id`). Play will extract the dynamic part from the URI and supply
    it as a parameter to the `getBook` method. This means the URL paths `/bookshop/book/123/`,
    `/bookshop/book/12453/`, etc. will get mapped to the `getBook` method defined
    in the `Application` class.


    **Key point**: `:variablename` is used to define the dynamic parts of the URI.
    Example: `:id`.


    You can also configure dynamic parts spanning several forward slashes (`/`).


    For instance:


    `GET /bookshop/book/images/* controllers.Application.fetchImage(name:String)`


    matches the URLs:


    - `/bookshop/book/images/book1.jpg`

    - `/bookshop/book/images/books/book2.jpg`

    - `/bookshop/book/images/books/thumbnails/small/image1.jpg`


    The `name` parameters passed to the `fetchImage` method will be `book1.jpg`, `books/book2.jpg`,
    and `books/thumbnails/small/image1.jpg`, respectively.


    You have used the fully qualified name of the controller class (`controllers.Application`).
    You can define and use another controller if you wish.


    Play also supports regular expressions in the path definitions. To define a regular
    expression in the dynamic part, you can use the syntax `$id<regex>`.


    For example:


    `GET /bookshop/book/:id/page/$page<[0-9]+>/ controllers.Application.fetchBookpage(bookid:String,
    page:Integer)`


    In this definition, there are two dynamic parts: one for `id` (book’s unique id)
    and the other for the page number. The page number part is defined as a regular
    expression accepting only numbers. Play will validate and throw an error if invoked
    with a non-numeral in the URI. For example, when invoked as `http://localhost:9000/bookshop/book/10/page/12/`,
    the page will get rendered properly because the page number is a valid number
    in the request. If the request is made as `http://localhost:9000/bookshop/book/10/page/a/`,
    Play will throw an action not found error because the page number in the request
    is not a valid number.


    **Key point**: `$variablename<regular expression>` is used to define dynamic parts
    to match regular expression.


    ## Passing Fixed Values


    For certain methods, you need to always pass a fixed value. You can configure
    such cases as:


    `GET /bookshop/authors/ controllers.Application.authors(limit: Integer = 10)`


    Here you are passing a default of 10 to the `show` method. This means it shows
    only 10 books when a user invokes the `show` method.


    ## Optional Parameters


    A typical use case is when some parameters may be passed sometimes but are missing
    in certain situations. To handle such cases, you can use the optional definition:


    ```

    # Shows all comments or comments made by a particular user

    GET /bookshop/showcomment/ controllers.Application.showComment(userid ?= null)

    ```


    In this example, if `userid` is passed, it will retrieve the comments by the user
    and if not, fetch all comments.


    **Key point**: `variable? = default-value` is used to define optional parameters.


    I hope you now understand the static and dynamic URL configurations. Let’s now
    look at how to declare configurations for the application, before you proceed
    to the controllers section and other chapters, because you will be making entries
    to the `application.conf` file in the coming chapters.


    ## Application Configuration Using `application.conf`


    Play provides a single file called `application.conf` found inside the `conf`
    directory to configure application-level configurations. This `conf/application.conf`
    file can be used to configure database connection strings, log levels, modules
    to enable additional functionality, etc. The `application.conf` file is a UTF-8
    encoded file.


    The entries in this file follow the scheme:


    ```

    # comment

    key = value

    ```


    By default, the Play application starts listening to HTTP requests on port 9000.
    By adding an `http.port` entry in the `application.conf` file, this default port
    can be changed:


    ```

    #http.port = 8085

    ```


    The default logging level defined in the `application.conf` file is as follows.
    In production, do remember to change it to the appropriate values. The general
    practice is to set it to `ERROR`.


    ```

    # Logger used by the framework:

    logger.play=INFO

    ```'
