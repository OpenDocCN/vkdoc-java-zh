- fmt: "# P. K. Karunakaran, *Introducing Play Framework*\n\n[https://doi.org/10.1007/978-1-4842-5645-9_9](#index_split_001.html#p168)\n\
    \n## Chapter 9 Using Play Modules\n\n### Creating a Module\n\nLet’s head straight\
    \ to the creation of a simple module to understand the process. As mentioned,\
    \ a module is like any other Play application.\n\nAn important factor to remember\
    \ is that a module doesn’t have its own configuration; it uses the main application’s\
    \ configuration. This means module-specific configuration information should be\
    \ set in the application's `conf/application.conf` file.\n\nThe module you are\
    \ going to develop is simple. It calculates the factorial of a number less than\
    \ 25. So follow these steps:\n\n1) Create a package and name it `modules` in the\
    \ `app` directory.\n\n2) Define the contract of the module as an interface:\n\n\
    ```java\npackage modules;\n\npublic interface Factorial {\n    int fact(int num);\n\
    }\n```\n\n3) Provide the implementation for the `Factorial` interface:\n\n```java\n\
    package modules;\n\nimport play.inject.ApplicationLifecycle;\nimport javax.inject.Inject;\n\
    \npublic class FactorialImpl implements Factorial {\n\n    @Inject\n    public\
    \ FactorialImpl(ApplicationLifecycle lifecycle) {\n        //implement plugin\
    \ lifecycle methods\n    }\n\n    public int fact(int number) {\n        return\
    \ calculateFactorial(number);\n    }\n\n    private int calculateFactorial(int\
    \ num) {\n        if(num > 25) {\n            throw new RuntimeException(\"Our\
    \ of range\");\n        }\n        if(num == 1)\n            return num;\n   \
    \     return num * calculateFactorial(num-1);\n    }\n}\n```\n\n4) Create a module\
    \ and name it `FirstModule`:\n\n```java\npackage modules;\n\nimport play.api.Configuration;\n\
    import play.api.Environment;\nimport play.api.inject.Binding;\nimport play.api.inject.Module;\n\
    import javax.inject.Inject;\nimport play.inject.ApplicationLifecycle;\nimport\
    \ scala.collection.Seq;\n\npublic class FirstModule extends Module {\n    public\
    \ Seq<Binding<?>> bindings(Environment environment, Configuration configuration)\
    \ {\n        return seq(\n            bind(Factorial.class).to(FactorialImpl.class)\n\
    \        );\n    }\n}\n```\n\nHere you’ve declared a module and added your `Factorial`\
    \ implementation to the module. Now, for Play to detect it as a module, a few\
    \ changes are required in the `application.conf` file:\n\n```\nplay.modules.enabled\
    \ += \"modules.FirstModule\"\n```\n\nSave the file. That’s it! You have created\
    \ a custom Play module. The `Factorial` implementation defined in this module\
    \ can be injected to any class and can be used. For example, if it is needed in\
    \ a controller class, just declare it as\n\n```java\n@Inject Factorial fact;\n\
    ```\n\nPlay will do the rest and make it available during runtime. If you want\
    \ to make this module available to other Play applications, it needs to be published\
    \ to repositories. In such a case, only include the module classes and related\
    \ dependent classes in the Play application. All unused components like views,\
    \ public assets, etc. can be removed.\n\nStart the command prompt and go to the\
    \ directory where you created the factorial Play project. For example, if the\
    \ project exists in `C:\\Users\\username\\playexamples\\bookshop\\`, type `sbt`\
    \ from the command prompt.\n\nThis will load the Play console. You need to publish\
    \ the module so that it is accessible by other applications. For the sake of simplicity,\
    \ you will publish this module to a local repository in your computer:\n\n```\n\
    bookshop] $ publishLocal\n```\n\nPlay will compile the files and publish to the\
    \ local Play repository.\n\nFrom the Play console, do take a note of the location\
    \ where Play publishes the module. In my machine, it is published under `C:\\\
    Users\\premk\\.ivy2\\local\\com.stackrules.example\\bookshop_2.13\\1.0-SNAPSHOT\\\
    docs\\bookshop_2.13-javadoc.jar`. See Figure [9-1.](#index_split_001.html#p172)\n\
    \n![](index-172_1.jpg)\n\n**Figure 9-1.** Published module\n\nThe module is now\
    \ ready to be consumed by other applications.\n\n### Third-Party Modules\n\nOften\
    \ you need to use other software tools for various reasons, and in Play they are\
    \ integrated into the application using modules. There are many third-party modules\
    \ available for most enterprise requirements. Play modules make it possible to\
    \ extend Play functionality with a plug-and-play architecture. Here are some popular\
    \ ones:"
