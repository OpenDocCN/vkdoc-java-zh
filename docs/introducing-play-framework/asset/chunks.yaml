    **CHAPTER 3**


    **Play Controllers and**


    **HTTP Routing**


    This chapter focuses on the MVC part of the Play application: how MVC


    plays a key role in the Play application framework. Before we get into the details
    of the HTTP routing and controllers in Play, it is good to have a quick introduction
    to MVC. If you are familiar with MVC, you can skip this and head straight to the
    “HTTP Routing” section.


    **MVC Programming Model**


    MVC (model-view-controller) is a framework for building web applications using
    the famous MVC design pattern. MVC defines an application into three logical layers:
    the business layer (model), the display layer (view), and a routing and input
    control (controller). See Figur[e 3-1.](#index_split_000.html#p58)


    © Prem Kumar Karunakaran 2020


    P. K. Karunakaran, *Introducing Play Framework*,


    [https://doi.org/10.1007/978-1-4842-5645-9_3](#index_split_000.html#p57)


    Chapter 3 play Controllers and http routing 1) The user''s request is sent to
    the controller.


    2) The controller manipulates the model.


    .


    Controller


    The controller chooses the view to


    3) display and provides it to the model


    4) The view updates the model on user interactions.


    View


    Model


    ***Figure 3-1.** MVC*


    MVC architecture works like this. The user interacts with the view and changes
    are sent to the controller by the view. The controller receives the changes, invokes
    the model, and applies the validations and logic in the model. The controller
    chooses the view and sends the updated model to the view. The view is rendered
    and is send back to the browser client.


    Both the view and the controller depend on the model. The model doesn’t have any
    dependency with the view or controller. This is one of the key benefits of the
    separation. This separation allows the model to be constructed and tested independently
    of the view.


    **Model**


    The model is the application’s data and the business logic on that data. The model
    is an independent component and doesn’t depend on the controller or the view.
    This means the model can be reused without associated views or the controller.


    The model handles the application’s business logic and is responsible for retrieving
    the data from the database, performing updates, enforcing validations, and being
    the core logical and analytical part of the application.


    Chapter 3 play Controllers and http routing Consider the model representing the
    customer of the application; it’s responsible for handling all validations and
    logic related to the customer entity. The deactivate method in the following code
    is an example of business logic within a model. This method handles the deactivation
    logic of the customer, thereby encapsulating the domain logic within the model
    itself. The domain logic is encapsulated within the domain object, so the model
    can be reused across applications/subsystems.


    package models;


    import java.util.List;


    **import** controllers.Order;


    public class Customer {


    private long id;


    private String name;


    private boolean loyaltyMember;


    private boolean isActive;


    private List<Order> orders;


    public List<Order> getOrders() {


    //Logic


    }


    public boolean deactivate() {


    //Logic and validation to deactivate a customer


    }


    }


    The customer is a domain model and contains the data and the associated business
    logic and validations applicable to the customer.


    Of course, if you follow domain-driven design, you can split the model into many
    business objects and they can handle domain-specific logic and validations. Spring
    beans, JPA beans, simple POJO, etc. are typically used for implementing domain
    models.


    Chapter 3 play Controllers and http routing **View**


    The view handles the display of the data and gets needed data attributes from
    the model. The sole purpose of the view is to display the data.


    Consider a screen showing the customer data of the application. This screen may
    show the customer details, orders made by the particular customer, and so on.
    If there is a new requirement to show the same customer data in a drill-down mode
    instead of a tabular way in another screen, only a new view needs to be created.
    There are no changes to be done in the model. Thus views can be created and modified
    independently of the model.


    **Controller**


    The controller handles interactions with the user. Controllers typically perform
    the following:


    • Get input data from the view and send it to the model


    for persistence.


    • When the model changes, the controller sends the


    updated model to the view and renders the view.


    MVC helps make development in a team easy and manageable when working on large
    projects. It provides a clean separation of concerns.


    **HTTP Routing**


    The job of the HTTP router is to translate the incoming HTTP request to an action
    call. That is, it maps an HTTP request to a method defined in the controller class.
    This configuration is maintained in the routes files inside the conf folder. The
    routes file also gets compiled by Play and, because 48


    Chapter 3 play Controllers and http routing of that, if you have any error in
    the routes file, it will be displayed in the browser. This is very helpful during
    development time.


    Let’s look at HTTP routing fundamentals. An HTTP request has two parts: the protocol
    part (GET, POST, PUT, etc.) and the request path that includes the query string.


