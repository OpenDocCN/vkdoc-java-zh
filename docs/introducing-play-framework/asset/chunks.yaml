    • `Cache.set("key", object)`


    • 检索数据：


    • `Cache.get("key")`


    • 移除数据：


    • `Cache.remove("key")`


    你还可以通过使用带有三个参数的 `set` 方法来控制数据在缓存中保留的时间（缓存过期时间）：`Cache.set("key", object, int timeinminutes)`


    第 11 章 使用缓存


    要在控制器中使用缓存 API，需要对其进行注入。按如下方式修改 `Application.java` 文件以获取对缓存 API 的引用：**private**
    AsyncCacheApi **cache**;


    @Inject


    **public** Application(ActorSystem system, AsyncCacheApi cache) {


    **pingActor** = system.actorOf(PingActor. *getProps*()); **this**. **cache** =
    cache;


    }


    现在，你可以在控制器的任何方法中使用缓存 API 来缓存数据。例如：


    `CompletionStage<Done> result = cache.set("framework", "Playframework");`


    // 缓存 10 分钟


    `CompletionStage<Done> result = cache.set("framework", "Playframework", 60 ∗ 10);`


    无论何时使用缓存，请记住缓存随时可能过期或丢失。它不是持久化数据，因此你应该始终检查数据是否在缓存中，如果不在，则将其填充到缓存中，然后再检索。这样，即使缓存无法工作或比预期更早过期，你的程序也是安全的。在
    Play 中，如果 JVM 内存不足，底层缓存实现可以自动从缓存中移除对象。因此，请明智地编写代码并有效地使用缓存。


    Play 使用一个可调用方法在数据不存在于缓存时将其加载到缓存中。


    这是通过向缓存 API 提供一个可调用方法来实现的，当缓存中缺少数据时，该方法会被调用来生成缓存数据。


    让我们修改 `Application.java` 文件来添加这样一个方法：**public** CompletionStage<Result> topThreeBooks()
    {


    **return** cache.getOrElseUpdate("topthree", this::getTopBooks)


    第 11 章 使用缓存


    .thenApply(( List<String> books) -> *ok*(books.toString()));


    }


    **private** CompletionStage<List<String>> getTopBooks() {


    List<String> topThreeBooks = new ArrayList<String>(); topThreeBooks.add("Book
    1");


    topThreeBooks.add("Book 2");


    topThreeBooks.add("Book 3");


    **return** CompletableFuture. *completedFuture*(topThreeBooks);


    }


    私有方法 `getTopBooks` 就是可调用方法，如果数据不在缓存中，缓存 API 会调用它。此方法计算前三本书并返回响应。公共方法 `topThreeBooks`
    使用缓存 API 的 `getOrElseUpdate` 方法从缓存中获取数据并将其转换为 HTTP 响应。


    **编辑 routes.conf**


    `GET /bookshop/book/top controllers.Application.topThreeBooks()` 使用 `http://localhost:9000/bookshop/book/top`
    测试该方法，你将看到响应为：


    `[Book 1, Book 2, Book 3]`


    Play 还提供了缓存整个 HTTP 响应的能力。这对于缓存不随请求变化的内容非常有用。让我们创建一个新路由并缓存其响应。你将使用静态的联系我们数据（你向所有用户显示相同的内容）。打开
    `Application.java` 文件并添加 `contactus` 方法：


    @Cached(key=**"contactus"** )


    **public** Result contact() {


    l ***og***.info(**"contact us method: processing"** ); **return** *ok*(**"Apress
    Media, LLC\n"** +


    **"\n"** +


    **"One New York Plaza, Suite 4600\n"** +


    **"\n"** +


    **"New York, NY 10004-1562"** );


    }


    在 `routes.conf` 文件中添加路由配置：


    `GET /bookshop/contact controllers.Application.contact()` 要测试，请打开 URL `http://localhost:9000/bookshop/contact`
    以观察响应。此响应已被缓存，并来自内存缓存。要测试这一点，请检查 `application.log` 文件或控制台中的日志，你将看到条目：


    `[info] c.Application - contact us method: processing`


    再次访问该 URL，你将看不到日志条目，因为从第二次开始，响应是从缓存提供的，绕过了已经计算并缓存的处理逻辑。


    这个例子非常简单，仅用于解释要点。如果数据（如上例中的联系信息）是从数据库、Web 服务或其他需要一定处理量的方式检索的，那么响应缓存非常有用。在这种情况下，第一次会进行处理，但从下一次开始，你可以避免所有处理，因为响应将从缓存中提供。这能为用户生成更快的响应，并且不会浪费服务器的处理时间。


    第 11 章 使用缓存


    在许多场景下，缓存整个 HTTP 响应并不实际。例如，页面中可能有一些元素会根据用户的登录状态而变化。这种情况也可以通过仅缓存部分数据来轻松处理。你应该为此设计你的内容。考虑一个包含
    75% 静态内容和 25% 动态内容的主页。在这种情况下，将静态和动态部分拆分为独立的对象，并缓存静态对象。但在这种场景下，你只能缓存对象，而不能缓存生成的静态
    HTML。也就是说，你不能从缓存中获取部分 HTML 响应并将其与动态 HTML 响应混合。在这种情况下，你必须在对象或数据级别进行缓存，而不是在 HTTP
    响应级别。对于不随每个请求或用户变化的纯静态内容，请使用 HTTP 响应缓存，如上文 `contact` 方法所述。你还学习了对象缓存，如上文 **topThreeBooks**
    示例所述。


    默认的 Caffeine 实现在大多数情况下已经足够好，并且具有高度可扩展性。但如果你需要使用像 memcached 这样的分布式缓存框架，Play 提供了通过其缓存
    API 接入 memcached 的钩子。对于 memcached，Play 默认提供了一个实现，但依赖于第三方插件。要将 memcached 与 Play
    一起使用，请使用 [`github.com/mumoshu/play2-memcached`](https://github.com/mumoshu/play2-memcached)
    上提供的插件。我不会在本书中详细介绍 memcached 的实现，因为第三方插件的文档尚未针对 Play 2.7 及以上版本进行更新。


    **第 12 章**


    **生产部署**


    部署 Play 的一种更简单的方法是使用命令 `play run`。为此，你需要将整个 Play 项目复制到生产机器上，然后在项目内执行 `play run`。这不是生产部署的好方法，因为你不想移动源文件，而只需要将可执行文件（以
    jar 文件的形式）推送到生产环境。

    '
- fmt: "# 生产部署\n\n为了实现这一目标，你可以在构建环境中使用`play dist`命令来生成Play可执行JAR文件。一旦`dist`命令成功执行，它将创建一个`dist`目录，JAR文件将被放置在该目录中。\n\
    \n只需将JAR文件复制并解压到生产环境，你就会看到一个`start`文件。通过为其分配所需的执行权限（Unix/Linux环境）使`start`文件可执行，然后运行它。\n\
    \n你可以编辑`start`文件并向其传递额外的参数，例如`-Xms`、`-Xmx`等，以配置JVM内存参数。如果需要更改Play应用程序的默认监听端口，你可以向启动脚本传递`-Dhttp.port=port`。\n\
    \n你可以直接运行Play，无需任何其他Web服务器。\n\n但这并非理想的生产部署场景。你可能需要在Play服务器前放置一个像Apache HTTP服务器或Nginx这样的Web服务器，以处理各种生产配置和访问需求。你可能希望配置Apache来处理SSL请求，并将SSL负载从Play上卸载，或者你可能只是不想将Play服务器暴露在互联网上。原因有很多。让我们看看如何将Apache\
    \ httpd用作Play应用程序的代理。\n\n© Prem Kumar Karunakaran 2020\n\nP. K. Karunakaran, *Introducing\
    \ Play Framework*,\n\n[https://doi.org/10.1007/978-1-4842-5645-9_12](#index_split_001.html#p192)\n\
    \n## 配置Apache httpd用于Play\n\n假设你已经安装了Apache并且它正在运行。确保已启用以下模块：`mod_ssl`、`mod_headers`、`mod_proxy`、`mod_proxy_http`和`mod_proxy_balancer`。\n\
    \n以下是一个简单的Apache配置，用于将外部端口80重定向到Play应用程序的内部IP和端口9000：\n\n```\n<VirtualHost ∗:80>\n\
    \    ProxyPreserveHost on\n    ProxyPass / http://192.168.1.4:9000/\n    ProxyPassReverse\
    \ / http://192.168.1.4:9000/\n</VirtualHost>\n```\n\n上述配置会将发往端口80的请求路由到运行在端口9000上的Play应用程序。\n\
    \n## 使用`mod_proxy_balancer`进行负载均衡\n\n生产部署通常会有多个服务器实例以满足负载均衡和高可用性需求。你可以启动多个Play实例，并使用Apache来执行负载均衡。你需要`mod_proxy_balancer`模块来实现这一点：\n\
    \n```\n<Proxy balancer://prodcluster>\n    BalancerMember http://192.168.1.4:9000\n\
    \    BalancerMember http://192.168.1.5:9000\n</Proxy>\n\n<VirtualHost ∗:80>\n\
    \    ProxyPreserveHost on\n    ProxyPass / balancer://prodcluster/\n    ProxyPassReverse\
    \ / balancer://prodcluster/\n</VirtualHost>\n```\n\n## 配置Play与Nginx\n\nNginx（发音为engine-x）是一个免费、开源、高性能的HTTP服务器和反向代理，同时也是IMAP/POP3代理服务器。\n\
    \n与传统服务器不同，Nginx不依赖线程来处理请求。相反，它使用更具可扩展性的事件驱动（异步）架构。这种架构在负载下使用少量但更重要的是可预测的内存。\n\
    \nNginx应该已经安装并正在运行。在任何基于Debian的发行版上执行以下命令以在你的服务器上安装Nginx：\n\n```\napt-get install\
    \ nginx\n```\n\n你需要编辑的文件是`nginx.conf`。编辑`/etc/nginx/nginx.conf`文件并配置其与Play一起使用。以下是一个供你参考的示例配置：\n\
    \n```\nhttp {\n    proxy_buffering off;\n    proxy_set_header X-Real-IP $remote_addr;\n\
    \    proxy_set_header X-Scheme $scheme;\n    proxy_set_header X-Forwarded-For\
    \ $proxy_add_x_forwarded_for;\n    proxy_set_header Host $http_host;\n\n    upstream\
    \ my-backend {\n        server 127.0.0.1:9000;\n    }\n\n    server {\n      \
    \  server_name www.yourserverdomainname.com;\n    }\n\n    server {\n        keepalive_timeout\
    \ 70;\n        server_name www.yourserverdomainname.com;\n\n        location /\
    \ {\n            proxy_pass http://my-backend;\n        }\n    }\n}\n```\n\n**注意**：将`yourserverdomainname`替换为你网站的域名。\n\
    \n保存文件后，你需要重启Nginx：\n\n```\nsudo /etc/init.d/nginx restart\n```\n\n## 索引\n\n**A**\n\
    \n**C**\n\nAction composition, [164,](#index_split_001.html#p174) [168–169](#index_split_001.html#p178)"
  raw: 'To achieve this, you can use the play dist command in your build box to generate
    the Play executable jar files. Once the dist command succeeds, it will create
    a dist directory and the jar file will be placed there.


    Just copy and unzip the jar to the production box and you will see a start file.
    Make the start file executable by assigning it the required execute permissions
    (Unix/Linux box) and run it.


    You can edit the start file and pass it additional arguments like -Xms


    -Xmx etc. to configure the JVM memory parameters. If you need to change the default
    listen port of the Play application, you can pass


    -Dhttp.port=port to the start script.


    You can run Play upfront without the need for any other web servers.


    But this is not the ideal production deployment scenario. You may have a web server
    like Apache HTTP server or Nginx before your Play server to handle various production
    configuration and access requirements. You may want to configure Apache to handle
    SSL requests and offload the SSL


    load from Play, or maybe you just don’t want to expose your Play server to the
    Internet. The reasons are many. Let’s see how you can use Apache httpd as a proxy
    for your Play application.


    © Prem Kumar Karunakaran 2020


    P. K. Karunakaran, *Introducing Play Framework*,


    [https://doi.org/10.1007/978-1-4842-5645-9_12](#index_split_001.html#p192)


    Chapter 12 produCtion deployment


    **Configuring Apache httpd for Play**


    It is assumed that you already have an Apache installation and it is up and running.
    Make sure you have the following modules enabled: mod_ssl, mod_headers, mod_proxy,
    mod_proxy_http, and mod_proxy_balancer.


    Here is a simple Apache configuration for redirecting from external port 80 to
    an internal IP and port 9000 of your Play application:


    <VirtualHost ∗:80>


    ProxyPreserveHost on


    ProxyPass / http://192.168.1.4:9000/


    ProxyPassReverse / http://192.168.1.4:9000/


    </VirtualHost>


    The above configuration will route the requests to port 80 to the Play application
    running on port 9000.


    **Load Balancing Using mod_proxy_balancer**


    Production deployments usually have multiple server instances for load balancing
    and high availability requirements. You can start multiple Play instances and
    use Apache to perform the load balancing. You need the mod_proxy_balancer module
    for this:


    <Proxy balancer://prodcluster>


    BalancerMember http://192.168.1.4:9000


    BalancerMember http://192.168.1.5:9000


    </Proxy>


    <VirtualHost ∗:80>


    ProxyPreserveHost on


    ProxyPass / balancer://prodcluster/


    ProxyPassReverse / balancer://prodcluster/


    </VirtualHost>


    Chapter 12 produCtion deployment


    **Configuring Play with Nginx**


    Nginx (pronounced engine-x) is a free, open-source, high-performance HTTP server
    and reverse proxy, as well as an IMAP/POP3 proxy server.


    Unlike traditional servers, Nginx doesn’t rely on threads to handle requests.


    Instead it uses a much more scalable event-driven (asynchronous) architecture.
    This architecture uses small, but more importantly, predictable amounts of memory
    under load.


    Nginx should be already installed and up and running. Execute the following on
    any Debian-derived distribution to install Nginx in your server:


    apt-get install nginx


    The file you want to edit is the nginx.conf file. Edit the /etc/nginx/


    nginx.conf file and configure it for usage with Play. Here is a sample configuration
    for your reference:


    http {


    proxy_buffering off;


    proxy_set_header X-Real-IP $remote_addr;


    proxy_set_header X-Scheme $scheme;


    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header
    Host $http_host;


    upstream my-backend {


    server 127.0.0.1:9000;


    }


    server {


    server_name www.yourserverdomainname.com;


    }


    server {


    keepalive_timeout 70;


    Chapter 12 produCtion deployment


    server_name www.yourserverdomainname.com;


    location / {


    proxy_pass http://my-backend;


    }


    }


    }


    **Note** replace


    yourserverdomainname with the domain name of


    your website.


    After saving the file, you need to restart Nginx:


    sudo /etc/init.d/nginx restart


    **Index**


    **A**


    **C**


