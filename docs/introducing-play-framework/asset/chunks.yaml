    你可以要求 Play 仅将 JSON 正文作为请求处理，并拒绝任何无效的内容，并返回 HTTP 400 响应码。为此，只需使用 @BodyParser.Of
    (BodyParser.Json.class) 注解该方法。


    这是处理传入 JSON 请求正文的更好方法。


