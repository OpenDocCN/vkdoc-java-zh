    XML structure. Manually building XML using String manipulation is not extensible
    or maintainable, so use a proper JAXB implementation. In Play Framework, you don’t
    need to add extra libraries because Play already supports JAXB via the JDK. Let’s
    look at both ways. Example 1 shows simple XML parsing and example 2 uses JAXB.


