    \ Ebean 采用的一个很好的特性，并且极大地有助于优化查询的性能和效率。此功能在早期的 JPA 规范中存在。\n\n在某些用例中，您可能会发现从性能角度来看，编写自定义\
    \ SQL 会更好、更容易。Ebean 对自定义 SQL 查询有出色的支持，并提供了更简单的 API 来使用。\n\n第 7 章 访问数据库\n\n要启用\
