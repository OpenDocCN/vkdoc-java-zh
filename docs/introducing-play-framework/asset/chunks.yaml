    **CHAPTER 9**


    **Using Play Modules**


    A Play application can be assembled from several application modules.


    This helps in reusing the application components across several applications.
    The modules also help in splitting a large application into several smaller applications.


    A module is just another Play application. Modules can introduce feature-specific
    abilities such as adding a different persistence mechanism, integrating other
    view techniques, or integrating a new caching framework.


    The modules framework got a revamp since Play 2.5.x. There is not much difference
    between a module and a library in Play. The only real difference is that modules
    use the Play API directly. Play modules use dependency injection frameworks to
    work. If you want to write a custom Play module, it can be done using any dependency
    injection framework.


    Note that Play uses guice as its default dependency injection framework.


    But the module shouldn’t be tied to any particular dependency injection framework
    and should work in a dependency framework-agnostic way. For this, Play provides
    a lightweight Bindings API to abstract the module from underlying dependency injection
    framework.


    The dependencies are declared in components using the @Inject annotation. For
    example, if a controller class is dependent on a WSClient module, it should declare
    it using the @Inject WSClient syntax. The wiring of the dependent class is done
    automatically by Play using the underlying dependency injection framework.


