    **消费 JSON 请求**


    Play 默认使用一个可以解析任何有效内容类型的正文解析器。默认的正文解析器可以从请求对象访问，并具有 asJson 方法来将传入请求作为 JSON 内容处理。


    第 6 章 Web 服务、JSON 和 XML


