  让我们详细检查 HomeController 类以了解其中发生了什么。首先，它继承自 `play.mvc.Controller`。

  当您编写一个新的控制器时，请确保继承自 `play.mvc.Controller`。


  您之前已经见过 index 方法：它非常简单，只有一行。但它做了很多聪明的事情。`ok()` 方法与 HTTP 状态 200（即成功响应）密切相关。如果您想返回
  HTTP 未找到，可以使用 `notFound` 方法。这就是 Play 的美妙之处；它紧密地模拟了 HTTP 协议，并且不需要任何花哨的代码来将您的异常转换为相应的
  HTTP 状态码。您可以用 HTTP 的语言进行编码和交流。


  `ok()` 方法返回由名为 index 的视图中定义的 `render` 方法生成的 HTML 输出。您已经在 index.scala.html 中看到了这个视图。Play
  中的视图使用 Scala 并遵循“viewname.scala.html”的命名约定。此文件由 Play 编译器编译成相应的 Java 类，可以直接在控制器中使用。这确保了类型安全并减少了错误。请记住，在其他框架（如
  struts 或 Spring MVC）中，您通常返回一个字符串作为视图名称，然后框架将其解析为一个文件。在 Play 中，不需要这样做。视图直接作为 Java
  类文件可用，您可以确保编译时类型安全。


