  客户是一个领域模型，包含数据以及适用于客户的相关业务逻辑和验证。


  当然，如果您遵循领域驱动设计，您可以将模型拆分为许多业务对象，它们可以处理特定领域的逻辑和验证。Spring beans、JPA beans、简单 POJO 等通常用于实现领域模型。


  第 3 章 Play 控制器和 HTTP 路由


  **视图**


  视图处理数据的显示，并从模型获取所需的数据属性。视图的唯一目的是显示数据。


  考虑一个显示应用程序客户数据的屏幕。此屏幕可能显示客户详细信息、特定客户下的订单等。如果有一个新需求需要在另一个屏幕中以钻取模式而不是表格方式显示相同的客户数据，则只需创建一个新视图。模型中无需进行任何更改。因此，视图可以独立于模型创建和修改。


  **控制器**


  控制器处理与用户的交互。控制器通常执行以下操作：


  • 从视图获取输入数据并将其发送到模型以进行持久化。

  • 当模型更改时，控制器将更新后的模型发送到视图并渲染视图。


  MVC 有助于在大型项目中使团队开发变得轻松和可管理。它提供了清晰的关注点分离。


  **HTTP 路由**


  HTTP 路由器的工作是将传入的 HTTP 请求转换为动作调用。也就是说，它将 HTTP 请求映射到控制器类中定义的方法。此配置维护在 conf 文件夹内的 routes
  文件中。routes 文件也会被 Play 编译，因此，如果 routes 文件中有任何错误，它将在浏览器中显示。这在开发期间非常有帮助。


  第 3 章 Play 控制器和 HTTP 路由


  让我们看看 HTTP 路由基础知识。一个 HTTP 请求有两部分：协议部分（GET、POST、PUT 等）和包含查询字符串的请求路径。


  要定义路由，请在 conf/routes 文件中定义协议和 URL 路径。在此之前，在 app/controllers 文件夹内创建一个新的控制器类，并将其命名为
  Application。确保该类继承自 `play.mvc.Controller`。


  `package controllers:`


  `import play.mvc.*;`

  `import views.html.*;`


  `public class Application extends Controller {`


  `}`


  在完成路由部分后，您将向此控制器添加方法。


  编辑 conf/routes 文件并添加以下条目：




  '
- '# 首页


  GET /bookshop 控制器。


  Application.index


  '
- '# 显示图书详情


  GET /bookshop/book/:id/ 控制器。


  Application.getBook(id:String)


  '
- '# 为图书添加评论


  POST /bookshop/book/save/comment/ 控制器.Application.


  saveComment(request:Request)


  第 3 章 Play 控制器与 HTTP 路由


  '
- '# 按标题搜索图书


  GET /bookshop/book/search/ 控制器。


  Application.searchByTitle(keyword:String)


  本示例展示了一个用于在线管理图书的基础应用程序。它恰当地使用了 HTTP 方法和 URI。


  路由文件中定义的条目展示了路由的重要特性。第一个条目表明首页 URL（例如 http://yourdomainname/bookshop）指向 Application
  类（一个控制器）中定义的 index 方法。其余的定义展示了如何在路径中以及作为查询字符串参数动态包含参数。


  让我们更详细地探讨这一点。


  **静态定义**


  定义 `GET / controllers.Application.index` 表明根路径不接收任何参数，并被路由到 Application 类中定义的 index
  方法。在此示例中，你使用的是 GET 协议。如果你的 Web 服务器支持，你也可以使用 PUT 和 DELETE HTTP 协议。


  路由条目的整体结构是：


  协议 URL 路径 **控制器映射**


  **URL 中的动态部分**


  假设你想检索某本特定图书的详细信息，但事先不知道用户会选择哪本书，因此图书 ID 必须是动态的：


  第 3 章 Play 控制器与 HTTP 路由 `GET /bookshop/book/:id/ controllers.Application.getBook(id:String)`


  动态部分由冒号（:）后跟参数名（本例中为 :id）表示。Play 将从 URI 中提取动态部分，并将其作为参数提供给 getBook 方法。这意味着 URL 路径
  `/bookshop/book/123/`、`/bookshop/book/12453/` 等都将被映射到 Application 类中定义的 getBook
  方法。


  **关键点**：`:variablename` 用于定义 URI 的动态部分。例如 `:id`。


  你还可以配置跨越多个正斜杠（/）的动态部分。


  例如，


  `GET /bookshop/book/images/* controllers.Application.fetchImage(name:String)`


  匹配以下 URL：


  `/bookshop/book/images/book1.jpg`


  `/bookshop/book/images/books/book2.jpg`


  `/bookshop/book/images/books/thumbnails/small/image1.jpg`


  传递给 fetchImage 方法的 name 参数将分别是 `book1.jpg`、`books/book2.jpg` 和 `books/thumbnails/small/image1.jpg`。


  你使用了控制器类的完全限定名（`controllers.Application`）。如果需要，你也可以定义并使用其他控制器。


  Play 还支持路径定义中的正则表达式。要在动态部分定义正则表达式，可以使用 `$id<regex>` 语法。


  第 3 章 Play 控制器与 HTTP 路由 例如：


  `GET /bookshop/book/:id/page/$page<[0-9]+>/ controllers.Application.fetchBookpage(bookid:String,
  page:Integer)`


  在这个定义中，有两个动态部分：一个用于 id（图书的唯一 ID），另一个用于页码。页码部分被定义为一个只接受数字的正则表达式。如果 URI 中包含非数字字符，Play
  将进行验证并抛出错误。例如，当请求为 `http://localhost:9000/bookshop/book/10/page/12/` 时，页面将正常渲染，因为请求中的页码是有效数字。如果请求为
  `http://localhost:9000/bookshop/book/10/page/a/`，Play 将抛出“未找到操作”错误，因为请求中的页码不是有效数字。


  **关键点** `$variablename<regular expression>` 用于定义匹配正则表达式的动态部分。


  **传递固定值**


  对于某些方法，你需要始终传递一个固定值。你可以这样配置此类情况：


