  规则是将重复出现的代码部分放在单独的模板文件中。Play 中使用的 Scala 模板结构比许多现有的模板引擎（例如 Tiles）更强大、更简单。


  **代码片段 模板化基础**


  Play 视图使用一个名为 Twirl 的模板引擎。通过使用模板引擎，视图可以轻松渲染任何标记，如 HTML、XML 和 CSV，尽管对于大多数 Web 应用程序，我们只使用
  HTML。


  例如，在所有示例中，你只使用了 HTML 标记，因此你将视图命名为 {name}.scala.html。命名视图的一般语法是 {name}.scala.{ext}，其中
  ext 可以是 html、js、xml 或 txt。因此，你可以为同一页面保留不同的标记版本，并且根据上下文，控制器可以渲染适当的视图。这使你可以向特定客户端显示
  HTML，而向另一个客户端显示 XML 标记。


  Play 的模板引擎 Twirl 的设计方式使得前端开发人员在处理代码的动态部分时感到舒适。HTML 专家只关心模板中的 HTML 标记，而另一个成员可能只处理迭代动态元素等。简单的
  Twirl 语法使代码更易于阅读和处理。让我们探索最常见的 Play 模板元素。


