  **第 5 章**


  **并发与异步**


  **编程**


  在深入 Play 之前，掌握 Java 中的并发和异步编程知识非常重要。这是必不可少的，因为后续章节中的示例将大量使用异步编程实践。


  让我们首先了解 java.util.concurrent 包，这是 Java 中用于处理并发编程的核心模块。了解这一点将有助于理解 Play 如何使用 WS 和
  Promise 类处理异步 Web 服务。如果你已经熟悉并发、其挑战以及 Java 如何使用自 JDK 1.5 以来在 java.util.concurrent
  包中提供的新类来处理它，则可以跳过本章。


  随着 java.util.concurrent 包中引入新类，Java 中的并发编程现在容易得多。需要关注的最重要的类是：


  1) Executor


  2) Callable<V>


  3) Future<V>


  4) CompletionStage<T>


