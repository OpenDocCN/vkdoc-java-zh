  • **Source**：产生数据的元素。例如，可以创建一个 source 来流式传输来自 Twitter feed 的数据，或者一个用于读取目录中文件或 Web
  服务的 source。


  • **Sink**：数据的最终接收者。例如，你可以从 source 读取数据，进行一些转换，然后写回文件。在这种情况下，保存到文件就是 sink。在 Akka
  流中，你连接 source 和 sink，并在其间执行转换和数据过滤。有了这些信息，让我们开始编写代码。


