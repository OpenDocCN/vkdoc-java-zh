  \nlike(\"title\",\"java%\").orderBy(\"tile desc\").findList(); 让我们详细探讨带有 where 和\
  \ like 子句的 find 查询。上面的示例使用了流畅的 API 风格，其中方法被链式调用。这种方法链式调用是良好函数式编程风格和 DSL 的特征之一。\n\
  \n您可以选择使用 select() 和 fetch() 来仅指定您想要获取的属性。这将返回“部分”填充的 bean。\n\n这是一个有助于提高查询性能的重要特性。例如，如果您只对两列感兴趣，比如\
  \ id 和 name，并且它们已经被数据库索引，那么数据库不需要触及数据块；它可以直接从索引本身提供值。如果表有大量记录，这将是一个巨大的性能改进。\n\n\
  List<Book> books = Ebean. *find*(Book. **class**).where(\"asin,author\").\n\nfindList();\n\
  \n在此示例中，您仅检索 asin 和 author 属性。\n\n第 7 章 访问数据库\n\n**Ebean 中常用的 Select 查询结构**\n\n\
  现在让我们探索 Ebean 中最常用的方法，这些方法有助于构建 Select 查询。\n\n**where( )**\n\nwhere 子句用于指定 where\
  \ 过滤条件。您可以将完整的 where 子句作为字符串传递（where(\" filter condition \")）或与 Expression 对象一起使用。从编程标准的角度来看，将\
  \ where() 与表达式列表一起使用更好。上面关于“获取标题以 Java 开头的书籍”的示例展示了与 Expression 对象一起使用的 where 子句。\n\
  \n**eq( )**\n\n检查给定属性是否等于提供的值： eq(String propertyName, Object value)\n\n获取所有由 Robin\
  \ Cook 撰写的书籍：\n\nList<Book> booksList = Ebean. *find*(Book. **class**).where().\n\
  \neq(\"author\", \"Robin Cook\").findList();\n\n**like( )**\n\n指定一个属性类似的值，其中值包含\
  \ SQL 通配符 %（百分号）和 _（下划线）：\n\nlike(String propertyName,String value)\n\nList<Book>\
  \ booksList = Ebean. *find*(Book. **class**).where().\n\nlike(\"author\", \"%Cook\"\
  ).findList();\n\n**orderBy( )**\n\n设置 order by 子句，如果存在则替换现有的 order by 子句： orderBy(String\
  \ orderByClause)\n\n第 7 章 访问数据库\n\n这遵循 SQL 语法，在每个属性之间使用逗号，并可选的 asc 和 desc 关键字分别表示升序和降序：\n\
  \nList<Book> booksList = Ebean. *find*(Book. **class**).where().\n\neq(\"author\"\
  , \"Robin Cook\")\n\n.orderBy(\"title desc\").findList();\n\n**findUnique( )**\n\
  \n用于仅返回一条记录。执行查询，返回单个 bean 或 null（如果未找到匹配的 bean）。\n\n**findList( )**\n\n执行查询，返回对象列表。\n\
  \n**LIMIT {max rows} [ OFFSET {first row} ]**\n\n用于限制返回的记录数。通过将其与 offset 参数一起使用，可以轻松实现分页。\n\
  \n**查询接口**\n\nEbean Query 接口中有很多方法。请查看 com.avaje.ebean.Query 接口以探索可用的选项。以下是其中一些方法的列表：\n\
  \n• Query<T> fetch(String path)\n\n指定要加载的路径，包括其所有属性\n\n• Query<T> fetch(String path,\
  \ FetchConfig joinConfig) 另外指定一个 JoinConfig 来指定“查询连接”和/或定义延迟加载查询\n\n第 7 章 访问数据库\n\
  \n• Query<T> fetch(String path, String fetchProperties) 指定要获取的路径及其要包含的特定属性（即部分对象）\n\
  \n• Query<T> fetch(String assocProperty, String\n\nfetchProperties, FetchConfig\
  \ fetchConfig)\n\n另外指定一个 FetchConfig 以使用单独的查询或延迟加载来加载此路径\n\n• **List<Object>**\n\
  \n**findIds()**\n\n执行查询，返回 ID 列表\n\n• **List<T>**\n\n**findList()**\n\n执行查询，返回对象列表\n\
  \n• **Map<?,T>** **findMap()**\n\n执行查询，返回对象的映射\n\n• **int** **findRowCount()**\n\
  \n返回此查询应返回的实体计数\n\n• **Set<T>**\n\n**findSet()**\n\n执行查询，返回对象集合\n\n• **intger FirstRow()**\n\
  \n返回第一行的值\n\n• **String**\n\n**getGeneratedSql()**\n\n返回为执行此查询而生成的 SQL\n\n• **intger\
  \ MaxRows()**\n\n返回此查询的最大行数\n\n• RawSql\n\ngetRawSql()\n\n返回为此查询设置的 RawSql\n\n第\
  \ 7 章 访问数据库\n\n• Query<T> **select(String fetchProperties)**\n\n **显式设置要在“主”实体 bean\
  \ 上获取的属性的逗号分隔列表（即部分对象）\n\n• Query<T> setReadOnly(boolean readOnly)\n\n当您希望返回的 bean\
  \ 为只读时，设置为 true。\n\n• Query<T> setTimeout(int secs)\n\n为此查询设置超时\n\n**使用 RawSql**\n\
  \n您已经看到，需要有一个实体才能使典型的 Ebean 查询工作。查询针对实体，然后该查询被转换为数据库查询。在许多情况下，您可能希望从多个实体获取结果，并且返回的数据无法转换为实体。这对于报告类型的需求非常有用，您希望使用聚合函数，例如\
  \ sum()、count()、max() 等。无论出于何种原因，当您想要编写特定于数据库的查询时，可以使用 RawSql。得益于 Ebean 的 @Sql 注解，查询返回的数据可以轻松映射到对象。您可以创建一个实体并使用\
  \ @Sql 注解标记它，以告诉 Ebean 这只是一个 SQL 表示，而不是与表相关的实体。\n\n让我们看一个例子。假设您想查找所有作者撰写的书籍总数。您使用\
  \ RawSqlBuilder 类来指定查询，并将 select 子句中的列映射到 PopularBook 类中定义的相应属性字段。此类是您为映射结果而定义的实体：\n\
  \nString sql=\"select author,count(author) as noofbooks from books group by author\"\
  \n\nRawSqlBuilder rawSqlBldr = RawSqlBuilder. *parse*(sql); RawSql rawSql = rawSqlBldr.columnMapping(\"\
  author\", \"bookauthor\")\n\n.columnMapping(\"noofbooks\", \"totalbooksbyauthor\"\
  ).create(); 128\n\n第 7 章 访问数据库\n\nQuery<PopularBook> query = Ebean. *find*(PopularBook.\
  \ **class**); query.setRawSql(rawSql);\n\nList<PopularBook> list = query.findList();\n\
  \n以下是 PopularBook 实体：\n\npackage models;\n\nimport javax.persistence.Entity;\n\n\
  import com.avaje.ebean.annotation.Sql;\n\n@Entity\n\n@Sql\n\npublic class PopularBook\
  \ extends TrendingBook {\n\nprivate String author;\n\nprivate int totalbooksbyauthor;\n\
  \n//定义 getter 和 setter\n\n}\n\n有时，您可能希望仅使用关系功能，而不希望使用任何 ORM 功能。对于这种情况，Ebean 提供了\
  \ SqlQuery 类。在这里，您可以编写普通的旧 SQL 并像通过 JDBC 结果集一样获取结果。SqlQuery 是您指定确切 SQL SELECT 语句并返回\
  \ SqlRow 对象的列表、集合或映射的地方。SqlRow 是一个 Map，其中键是列名。\n\n这是一个相当轻量级的 API，您可以使用它来代替使用原始 JDBC。同样，让我们看一个例子来理解这一点：\n\
  \nString sql = \"select count(1) as count from book where author = ?\"; SqlQuery\
  \ query = Ebean. *createSqlQuery*(sql);\n\nquery.setParameter(1, author);\n\nSqlRow\
  \ row = query.findUnique();\n\n**int** count = row.getInteger(\"count\");\n\n这比使用\
  \ JDBC API 编写普通的旧 JDBC 查询要容易得多。\n\n第 7 章 访问数据库\n\n如果情况需要**为插入或更新编写原始 SQL**，您可以使用\
  \ SqlUpdate 类：\n\nSqlUpdate query = Ebean. *createSqlUpdate*(sql);\n\nEbean 还提供了\
  \ CallableSql 类来调用数据库过程和函数。\n\n**Ebean 中的关系**\n\n一个一对多的例子：\n\n@Entity\n\n@Table(name=\"\
  book\")\n\npublic class Book implements Serializable {\n\n// 单向 ...\n\n// ... 如果需要，可以显式指定连接列\n\
  \n@OneToMany\n\n@JoinColumn(name=\"auth_id\")\n\nList<Author> authors;\n\n考虑上述情况，您可以从\
  \ Book 实体找到作者，但无法从 Author 实体遍历回 Book。\n\n这里外键在 book 表中，您可以使用 @JoinColumn 来指定需要用于键的表列。如果将其建模为双向关系，则代码如下：\n\
  \n@Entity\n\n@Table(name=\"author\")\n\npublic class Author implements Serializable\
  \ {\n\n@OneToMany(mappedBy=\"authorId\")\n\nList<Book> writtenBooks;\n\n请注意，在此双向模型中，Book\
  \ 实体拥有外键，并且是关系的所有者。因此，您标记了反向侧：带有 mappedBy 属性的 Author。\n\n第 7 章 访问数据库\n\n如果您检查 RDBMS，您可以很容易地理解\
  \ RDBMS 表中不存在多对多关系。多对多关系在数据库表中通过交集表强制实现为两个一对多关系。如果您预计交集表可能需要支持更多属性，最好将其建模为单独的实体，并在您的模型中包含两个一对多关系。如果交集表中没有机会出现任何额外属性，您可以直接使用默认的\
  \ @ManyToMany 注解。这是一个例子。\n\n考虑用户和角色的情况。一个用户可以拥有多个角色，一个角色可能属于多个用户。在 RDBMS 中，这是使用交集表实现的。让我们将交集表命名为\
  \ user_role。让我们假设简单的情况，交集表不包含任何其他属性，在这种情况下，实体将具有 ManyToMany 关系，如代码所示：\n\n@Entity\n\
  \n@Table(name=\"user\")\n\npublic class User implements Serializable {\n\n...\n\n\
  @ManyToMany(cascade=CascadeType.ALL)\n\nList<Role> roles;\n\n@Entity\n\n@Table(name=\"\
  role\")\n\npublic class Role {\n\n...\n\n@ManyToMany(cascade=CascadeType.ALL)\n\n\
  List<User> users;\n\n关于 Ebean 还有很多东西需要解释，因为它非常庞大，可能需要一本全新的书来完整解释。我建议您阅读官方的 Ebean\
  \ 在线文档以了解更多信息。文档可在 [`ebean.io/docs/`](https://ebean.io/docs/) 获取。\n\n**第 8 章**\n\
  \n**完整示例**\n\n本章将您到目前为止学到的内容整合到一个完整的示例中。本章的主要重点是展示代码；我们已经在之前的章节中讨论了所有概念和部分代码。\n\n\
  **conf/application.conf**\n\n*# 这是应用程序的主配置文件。*\n\n*# https://www.playframework.com/documentation/latest/ConfigFile*\n\
  \n*# 默认数据库配置*\n\nplay.modules.enabled += \"modules.FirstModule\"\n\nplay.http.filters=config.FilterConfig\n\
  \nplay.http.errorHandler = \"config.CustomErrorHandler\"\n\ndb {\n\ndefault.driver\
  \ = org.h2.Driver\n\ndefault.url = \"jdbc:h2:mem:play\"\n\n*# 为 JPA 访问提供*\n\ndefault.jndiName=DefaultDS\n\
  \n}\n\n*# 将 JPA 指向我们的数据库配置*\n\njpa.default=defaultPersistenceUnit\n\n© Prem Kumar\
  \ Karunakaran 2020\n\nP. K. Karunakaran, *Introducing Play Framework*,\n\n`doi.org/10.1007/978-1-4842-5645-9_8`\n\
  \n第 8 章 完整示例\n\n*# 数据库连接数*\n\n*# 参见 https://github.com/brettwooldridge/HikariCP/wiki/About-Pool-\
  \ Sizing*\n\n*# 数据库连接数 = ((物理核心数 * 2) + 有效主轴数)*\n\nfixedConnectionPool = 9\n\n*#\
  \ 将 Hikari 设置为固定大小*\n\nplay.db {\n\nprototype {\n\nhikaricp.minimumIdle = ${fixedConnectionPool}\n\
  \nhikaricp.maximumPoolSize = ${fixedConnectionPool}\n\n}\n\n}\n\n*# 作业队列大小设置为 HikariCP\
  \ 连接池大小*\n\ndatabase.dispatcher {\n\nexecutor = \"thread-pool-executor\"\n\nthroughput\
  \ = 1\n\nthread-pool-executor {\n\nfixed-pool-size = ${fixedConnectionPool}\n\n\
  }\n\n}\n\n这里您配置了一个连接池和一个用于数据库连接的固定线程池。这非常重要，因为您正在一个单独的上下文中运行数据库调用，该上下文拥有自己的线程池。这将确保您不会阻塞默认执行上下文的线程。\n\
  \n然后，您将 h2 内存数据库配置为您的存储，并使用 JNDI 名称 DefaultDS 注册它。\n\n**conf/routes**\n\n\n\n"
