  第 5 章 并发与异步编程 在详细研究上述每个类之前，让我们快速了解一下什么是并发。


  **什么是并发？**


  并发是一种能够并行执行多个任务的技术。这些任务可以是同一程序或不同程序的一部分。


  如果一个大型任务可以拆分成小块，并且每个小块可以并行执行，则可以带来更好的响应时间和吞吐量。


  当程序的不同部分并行运行时，通常会使用称为线程的轻量级进程。一旦你使用线程，就需要有适当的机制来允许访问共享资源、正确管理线程生命周期、调度等。java.util.concurrent
  包中的类有助于解决许多此类挑战。


  **Executor**


  在 JDK 1.5 中引入 Executor 框架之前，线程管理是开发人员的责任，并且 JDK 中没有用于此的框架。开发人员处理线程的创建及其管理以及实际的业务逻辑。从设计和编码的角度来看，考虑到遵循“关注点分离”设计理念所带来的好处，这并不是一个理想的情况。


  将线程管理和创建与程序的其余部分分开是有意义的，而这正是 Executor 框架所做的。Executor 抽象了线程管理活动，如创建、调度等。不是直接创建线程，而是将
  Runnable 类提交给 Executor，由它处理其执行。ExecutorService 是一个比 Executor 更完善的接口，在实际场景中使用，因为它提供了对
  Callable 和 Future 的支持。你将在接下来的部分中了解 Callable 和 Future。注意：ExecutorService 继承自 Executor。


  第 5 章 并发与异步编程 java.util.concurrent 包提供了三个 Executor 接口：


  • Executor：一个简单的接口，支持启动新任务


  • ExecutorService：Executor 的子接口，添加了有助于管理生命周期（包括单个任务和 executor 本身）的功能


  • ScheduledExecutorService：ExecutorService 的子接口，支持任务的未来和/或周期性执行


  ThreadPoolExecutor、ScheduledThreadPoolExecutor 和 ForkJoinPool 是 JDK 中可用的一些重要的 Executor
  实现


  在高层面上，使用 Executor 框架编写并发程序涉及以下步骤：


  1) 定义一个实现 Runnable 或 Callable 接口的类/任务。


  2) 配置并实现 ExecutorService，然后提交任务。


  3) 如果任务是 Callable 任务，则使用 Future 类检索结果。


  让我们看看 Runnable 和 Callable 之间的区别。Runnable 接口不返回结果，而 Callable 允许在完成后返回值。当 Callable
  提交给 Executor 框架时，它会返回一个类型为 java.util.concurrent.Future 的对象。Future 可用于检索结果。


  第 5 章 并发与异步编程 **示例 1：使用 Runnable**


  **package** com.domain.concurrency;


  **public class** SimpleTask **implements** Runnable {


  @Override


  **public void** run() {


  System. ***out***.println(**"SimpleTask, Runnable: 执行逻辑 "** +System. *currentTimeMillis*());


  }


  }


  SimpleTask 类是你希望由许多客户端并行执行的逻辑部分。此逻辑在 run 方法中实现，它打印以毫秒为单位的 currentTime。在传统的 Java
  实践中，为了由许多客户端并行执行此操作，你需要为每个客户端创建线程并运行这些线程，同时进行线程协调、停止等。你还需要确保不会创建不必要数量的线程，并且线程应该被重用。所有这些都增加了并发编程的复杂性，而这正是
  ExecutorService 的用武之地，因为它负责处理所有这些方面。现在让我们创建一个客户端，并要求它在多个线程中运行 SimpleTask： **package**
  com.domain.concurrency;


  **import** java.util.concurrent.ExecutorService;


  **import** java.util.concurrent.Executors;


  **public class** Client {


  **public static void** main(String[] args) {


  *// 步骤 1：创建一个 Runnable*


  Runnable simpleTask = **new** SimpleTask();


  *// 步骤 2：配置 Executor*


  第 5 章 并发与异步编程


  *// 使用 FixedThreadPool executor*


  ExecutorService executor = Executors. *newFixedThreadPool*(2); **for** (**int**
  i = 0; i < 10; i++) {


  executor.submit(simpleTask);


  }


  executor.shutdown();


  }


  }


  代码非常简单，但它做了很多事情。你创建了一个 SimpleTask 实例，创建了 ExecutorService，并用一个包含两个线程的线程池初始化它。然后你将任务提交给
  ExecutorService。ExecutorService 负责以高效的方式使用其拥有的两个线程来执行这十个请求。


  运行 Client.java 为：


  **java com.domain.concurrenc.Client**


  **输出**


  SimpleTask, Runnable: 执行逻辑 1578145676485


  SimpleTask, Runnable: 执行逻辑 1578145676485


  SimpleTask, Runnable: 执行逻辑 1578145676486


  SimpleTask, Runnable: 执行逻辑 1578145676486


  SimpleTask, Runnable: 执行逻辑 1578145676486


  SimpleTask, Runnable: 执行逻辑 1578145676486


  SimpleTask, Runnable: 执行逻辑 1578145676486


