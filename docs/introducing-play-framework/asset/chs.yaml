  **第 2 章**


  **构建系统**


  正如您在第 1 章中所见，Play 使用 sbt 作为其构建系统。当您使用基于 Play 的项目时，对 sbt 的基本了解是必需的。


  本章的目标是快速介绍 sbt。


  **Scala 构建工具/简单构建工具**


  sbt 是 Scala 和 Java 项目的构建工具。它类似于 Java 项目中通常使用的 Maven 构建工具。sbt 深受 Maven 的启发。


  作为一种构建工具，它提供了编译、运行、测试和打包项目的能力。Play 与 sbt 打包在一起，因此无需单独安装 sbt。Sbt 由 Mark Harrah 创建。关于
  sbt 是代表“Scala 构建工具”还是“简单构建工具”存在混淆。事实上，当 sbt 项目开始时，它被宣布为“简单构建工具”，但多年来它被广泛称为“Scala
  构建工具”。所以两种用法都是正确的。我个人偏好“简单构建工具”，因为它可以用作 Scala 和 Java 项目的构建工具。


  **核心原则**


  sbt 始终遵循四个核心原则：


  1. 所有内容都应具有类型，并在实际可行的范围内强制执行。


  2. 依赖关系应明确。


  © Prem Kumar Karunakaran 2020

  P. K. Karunakaran, *介绍 Play Framework*,

  `doi.org/10.1007/978-1-4842-5645-9_2`


  第 2 章 构建系统


  3. 一旦学会，一个概念应贯穿 sbt 的所有部分。


  4. 并行是默认设置。


  **sbt 的优势**


  sbt 具有以下优势：


  1. 它使用 Scala 语言来描述构建。


  2. 无需编写庞大冗长的 pom.xml 文件。构建配置是代码，而不是 XML。


  3. 它适用于 Scala 和 Java。


  4. 它需要最少的配置。


  5. 它提供声明式依赖管理（通过 Ivy）。


  6. 它具有合理的默认值。


  sbt 构建使用称为任务（是的，它只是一个任务）的东西，并且一个任务可以有依赖项。因此，sbt 构建是一个要执行的任务依赖树。


  当您想要做某事时，您必须执行一个任务。默认情况下，任务在 sbt 中并行运行。如果您想对任务的执行进行排序，可以通过指定任务之间的依赖关系来完成。例如，`compile`
  和 `test` 是两个任务，但 `test` 依赖于 `compile`，因此当您执行 `test` 任务时，`compile` 任务将在其之前执行。


  任务的链式调用在 sbt 中容易得多。您可以将一个任务的输出传递给另一个依赖任务。在内部，sbt 维护一个描述构建的不可变映射（键值对）。因此，您可以看到构建文件中的大多数条目都是键值对。例如，项目名称作为一个键值对提供，它映射到一个字符串值，即您的项目名称。


