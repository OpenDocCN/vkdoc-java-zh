  第 4 章 Play 视图与使用 Scala 的模板化 大多数情况下，你只会从模型对象中访问数据。


  换句话说，Scala 模板语言只提供有限的选项来编写复杂逻辑；其目的是提供一种更简单的方法来访问模型中的数据。这是有意为之，以限制开发人员在视图中嵌入复杂代码。


  **关键点** 请记住，视图仅用于访问存储在模型中的数据。所有逻辑，即使是像维护计数器这样的事情，也是控制器或表示辅助类的工作。


