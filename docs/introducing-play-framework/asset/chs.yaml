  \ `config` 包而不是根文件夹的原因。请注意，自定义过滤器是通过构造函数级别的依赖注入作为参数传递给 `FilterConfig` 类的。如果你编写了更多的过滤器，你可以像传递构造函数参数一样将它们传递给\
  \ `FilterConfig` 类。这是可行的，因为 `FilterConfig` 类继承自 `DefaultHttpFilters`，并且它有一个构造函数，该构造函数通过可变参数接收\
  \ N 个 `Filter` 实例。\n\n就是这样。你已经创建了一个响应日志记录过滤器。让我们测试一下。打开 `http://localhost:9000/bookshop`\
