  默认情况下，Play 中的视图是 HTML，并且可以使用 Scala 表达式语言使其动态化。实际上，如果需要，你也可以返回 JSON 或 XML 响应。让我们首先关注
  HTML Scala 视图以及 Play 模板引擎如何帮助你创建模块化、富有表现力和流畅的视图。尽管模板引擎使用 Scala 作为表达式语言，但这对于 Java
  开发人员来说不是问题。模板中使用的 Scala 语言非常简单。正如你在第 1 章中所看到的，Play 使用的模板引擎是 Twirl。回想一下，模板文件必须命名为
  {name}.scala.{ext}。ext 可以是 html、js、xml 等。Play 偏好约定优于配置。当你编译时，编译器将生成 Scala 源文件，它们将与其余源代码一起编译。


  与 Play 中的所有其他类一样，模板也是即时编译的，你可以直接在浏览器中看到错误。你应该记住，模板/视图不是编写复杂逻辑的地方。将所有与表示相关的逻辑写在控制器或辅助类中。你所有的业务逻辑都应该在你的业务实体类中。


