  **什么是 Twirl？**


  twirl 是为 play Framework 开发的模板引擎。但它也可以在 play 环境之外使用。默认情况下，twirl 作为 play 的一部分包含在内，但如果需要在
  play 之外使用 twirl，则可以安装 Scala 的 sbt 插件。例如，在 plugins.sbt 文件中添加以下条目将使 twirl 可用于任何基于
  sbt 的项目：


  `addSbtPlugin("com.typesafe.sbt" % "sbt-twirl" % "LATEST_VERSION")`


  模板文件必须命名为 `{name}.scala.{ext}`，其中 ext 可以是 html、js、xml 或 txt。模板可用于生成各种类型的标记，如 htMl、XMl
  或 tXt，并且完全与控制器解耦。可以根据需要插入各种类型的标记。


  twirl 模板只是一个普通的文本文件，其中包含小的 Scala 代码块。模板有助于创建复合视图并有助于基于组件的视图生成。


  `@` 字符标记模板中动态代码的开始。


  本书的第 4 章提供了视图和 twirl 模板的详细解释。


  目前，让我们了解 index.scala.html 文件中定义的内容：


  `@main("Welcome to Play") {`

  `<h1>Welcome to Play!</h1>`

  `}`


  `@main("Welcome to Play")` 调用另一个模板 main.scala.html，并将页面标题“Welcome to Play”和第二个参数中的
  HTML 内容（包含在 `{}` 中）传递给它。


  因此，您可以推断 main 模板文件应接受两个参数：一个用于标题的字符串和作为第二个参数的 HTML 内容。


