  **动作组合**\n\n当你想要用额外的逻辑来装饰一个特定的类或某一组类时，动作组合非常有用。让我们通过一个例子来学习：**EchoAction.java**\n\
  \n**package** config;\n\n**import** org.slf4j.Logger;\n\n**import** org.slf4j.LoggerFactory;\n\
  \n**import** play.mvc.Http;\n\n**import** play.mvc.Result;\n\n**import** java.util.concurrent.CompletionStage;\n\
  \n*/***\n\n* *一个动作组合的示例*\n\n* */*\n\n**public class** EchoAction **extends** play.mvc.Action.Simple\
  \ {\n\n**private static final** Logger ***log*** = LoggerFactory. *getLogger*(EchoAction.\
  \ **class**);\n\n**public** CompletionStage<Result> call(Http.Request req) {\n\n\
  ***log***.info(**\"Request Method {} \"** , req.method()); **return delegate**.call(req);\n\
  \n}\n\n}\n\n这是一个非常简单的动作，它仅仅将 HTTP 请求方法记录到日志中。这不是一个过滤器，所以默认情况下它不会被应用到方法上。需要使用此动作的方法必须通过注解显式地请求它。让我们在其中一个控制器方法中使用\
  \ `EchoAction`。\n\n打开 `Application.java` 文件，找到 `echoService` 方法，并添加注解 `@With(EchoAction.class)`：\n\
  \n@Inject WSClient **ws**;\n\n@With(EchoAction. **class**)\n\n**public** CompletionStage<Result>\
  \ echoService() {\n\n**return**\n\n**ws**.url(**\"http://www.mocky.io/**\n\n**v2/5e0edec33400003c0f2d7d27\"\
  ** )\n\n.get()\n\n.thenApply(response -> *ok*(**\"Feed Response: \"** +\n\nresponse.getBody()));\n\
  \n}\n\n打开 `http://localhost:9000/bookshop/book/echo` 并观察控制台和日志。你将看到以下日志条目：\n\n[info]\
  \ c.EchoAction - Request Method GET\n\n**错误处理器**\n\n如你所知，Play 是一个 HTTP 应用框架，这样的应用可能会遇到两种类型的错误：\n\
  \n1.  客户端错误\n2.  服务器错误\n\n**客户端错误**\n\n客户端错误是由于调用者或连接的客户端犯错导致的，例如客户端没有发送 `Content-Type`\
  \ 头、没有使用正确的 HTTP 方法、使用了无效的 URL 等。在所有这些情况下，Play 会自动检测到错误并重定向到错误页面。\n\n**服务器错误**\n\
  \n服务器错误是由于服务器端出现问题导致的，例如资源不足、崩溃、应用程序类生成的错误（如空指针）、代码抛出其他形式的异常等。Play 通过捕获这些服务器错误并生成错误页面来智能地处理它们。\n\
  \n在某些情况下，应用程序可能决定不按原样使用默认的错误处理机制，而是希望扩展它并提供自定义的错误处理逻辑。让我们看看如何做到这一点。\n\n**CustomErrorHandler.java**\n\
  \n**package** config;\n\n**import** play.http.HttpErrorHandler;\n\n**import** play.mvc.*;\n\
  \n**import** play.mvc.Http.*;\n\n**import** java.util.concurrent.CompletableFuture;\n\
  \n**import** java.util.concurrent.CompletionStage;\n\n**import** javax.inject.Singleton;\n\
  \n*/***\n\n* *一个简单的错误处理器*\n\n* */*\n\n@Singleton\n\n**public class** CustomErrorHandler\
  \ **implements** HttpErrorHandler {\n\n**public** CompletionStage<Result> onClientError(\n\
  \nRequestHeader request, **int** statusCode, String\n\nmessage) {\n\n**return**\
  \ CompletableFuture. *completedFuture*(\n\nResults. *status*(statusCode, **\"Invalid\
  \ Request \"** +\n\nmessage));\n\n}\n\n**public** CompletionStage<Result> onServerError(RequestHeader\
  \ request, Throwable exception) {\n\n**return** CompletableFuture. *completedFuture*(\n\
  \nResults. *internalServerError*(**\"Cannot process the** **request due to \"**\
  \ + exception.getMessage()));\n\n}\n\n}\n\n现在你已经配置了一个自定义错误处理器，用于处理客户端和服务器错误的情况。让我们测试一下。\n\
  \n打开 `http://localhost:9000/bookshop/book/echos`。这个 URL 是一个无效的 URL，属于客户端错误。这个请求将被你在\
  \ `CustomErrorHandler` 中定义的 `onClientError` 方法拦截，你将在浏览器中看到如下响应：\n\nInvalid Request\n\
  \n**全局设置是如何完成的**\n\n**在 Play 2.6.x 之前**\n\n全局对象允许处理应用程序的全局设置。\n\n全局对象是编写拦截逻辑的地方。诸如过滤某些请求参数、记录请求等任务可以在这里轻松完成。你也可以为未找到错误、错误页面等配置全局设置。\n\
  \n\n\n我不会深入探讨 GlobalSettings 和 Global，因为 Play 从 2.5.0 版本起已弃用它们，现在推荐使用依赖注入。下面的示例仅用于展示在早期\
  \ Play 版本中是如何实现的。请注意，以下代码仅适用于 Play 2.5.x 及更低版本；它不适用于 Play 2.8.x，而本书正是基于该版本编写的。这段代码仅供参考，以防您想从早期\
  \ Play 版本迁移到最新版本，并希望了解之前的实现方式。\n\n要创建 Global 对象，只需编写一个继承自 `play.GlobalSettings`\
  \ 的类。Global 对象通常保存在应用程序的根包中，但您也可以将其保存在任何包中，然后通过 `application.conf` 文件中的 `application.global`\
  \ 属性进行配置：\n\n**import** play.Application;\n\n**import** play.GlobalSettings;\n\n\
  **import** play.libs.Akka;\n\n**import** play.mvc.Http.RequestHeader;\n\n第 10 章\
  \ 应用程序设置与错误处理 **import** play.mvc.Result;\n\n**import** play.mvc.Results;\n\n**import**\
  \ scala.concurrent.duration.Duration;\n\n**import** akka.actor.ActorRef;\n\n**import**\
  \ akka.actor.Props;\n\n**import** controllers.Preloader;\n\n**public class** Global\
  \ **extends** GlobalSettings {\n\n**public** Result onError(RequestHeader request,\
  \ Throwable t) {\n\n**return** Results. *notFound*(views.html.errorpagetemplate.\
  \ *render*());\n\n}\n\n**public** Result onHandlerNotFound(RequestHeader request)\
  \ {\n\n**return** Results. *notFound*(views.html.errorpagetemplate. *render*());\n\
  \n}\n\n**public** Result onBadRequest(RequestHeader request, String error) {\n\n\
  **return** Results. *notFound*(views.html.errorpagetemplate. *render*());\n\n}\n\
  \n**public void** onStart(Application app) {\n\n// 初始化所有内容\n\nActorRef preloader\
  \ = Akka. *system*().actorOf(**new**\n\nProps(Preloader. **class**));\n\n*Akka.*\
  \ system *().scheduler().schedule(*\n\nDuration. *create*(0, TimeUnit. *MILLISECONDS*),\
  \ // 初始延迟 0 毫秒\n\nDuration. *create*(5, TimeUnit. *MINUTES*), // 频率 30 分钟\n\npreloader,\n\
  \n\"preload\",\n\nAkka. *system*().dispatcher()\n\n);\n\n}\n\n第 10 章 应用程序设置与错误处理\
  \ **public void** onStop(Application app) {\n\nLogger.info(\"应用程序关闭\");\n\n}\n\n\
  }\n\n要迁移到最新的 Play 版本，您应该编写自定义过滤器，并将逻辑包含在这些过滤器或错误处理器中。您在本章开头已经学习了这两方面的内容。\n\n**第\
  \ 11 章**\n\n**使用缓存**\n\n缓存是确保应用程序可扩展性和响应性的最重要方面之一。一个好的缓存可以减轻数据库的负载，并能非常快速地响应用户。一个不能提供良好缓存抽象层的框架已不再适合企业级开发。Play\
  \ 凭借其内置的缓存支持，是构建高度可扩展、响应迅速的企业级应用程序的理想框架。\n\nPlay 提供了一个全局缓存对象，它与底层的缓存实现协同工作。这种抽象使您能够更改缓存提供程序，而无需修改任何应用程序代码。默认情况下，Play\
  \ 附带了一个使用 Caffeine 的缓存 API 实现，同时也提供了对 EhCache 2.x 的支持。对于进程内处理，Play 推荐使用 Caffeine。\n\
  \n**配置 Caffeine**\n\nCaffeine 是一个高性能、近乎最优的缓存库，基于 Java 8。\n\n以下是 Caffeine 的重要特性概览：\n\
  \n• 自动将条目加载到缓存中，可选择异步加载\n\n• 当超过最大容量时，基于频率和最近使用情况进行大小驱逐\n\n© Prem Kumar Karunakaran\
  \ 2020\n\nP. K. Karunakaran, *Introducing Play Framework*,\n\n`doi.org/10.1007/978-1-4842-5645-9_11`\n\
  \n第 11 章 使用缓存\n\n• 基于时间的条目过期，自上次访问或上次写入起计算\n\n• 当对某个条目的第一个过期请求发生时，异步刷新\n\n• 键自动包装为弱引用\n\
  \n• 值自动包装为弱引用或软引用\n\n\n\n• 被驱逐（或以其他方式移除）的条目通知\n\n• 写入操作传播到外部资源\n\n• 缓存访问统计数据的累积\n\
  \n你可以在以下网址了解更多关于 Caffeine 的信息：[`github.com/ben-manes/caffeine/`](https://github.com/ben-manes/caffeine/)\n\
  \n**将 Caffeine 添加到项目中**\n\n打开 `build.sbt` 文件，并添加 Caffeine 的依赖项：*libraryDependencies*\
  \ ++= *Seq*( *guice*, *javaJdbc*, ***cacheApi***, *javaWs*, *javaJpa*, ***caffeine***,org.hibernate\"\
  \ % \"hibernate-entitymanager\" % \"5.3.7.Final\",com.h2database\" % \"h2\" %\n\n\
  \"1.4.200\" )\n\n这就是将 Caffeine 用作 Play 缓存实现所需的全部操作。\n\n第 11 章 使用缓存\n\n**配置 EhCache**\n\
  \nEhCache 已经存在很长时间，是 Java 项目中最广泛使用的缓存实现之一。它需要 Java 8 或更高版本。你可以在 [www.ehcache.org/](http://www.ehcache.org/)\
  \ 了解 EhCache 的内部工作原理。\n\n配置 EhCache 就像在 `build.sbt` 文件中添加一个条目一样简单，就像你为 Caffeine\
  \ 所做的那样：\n\n*libraryDependencies* ++= *Seq*( *guice*, *javaJdbc*, ***cacheApi***,\
  \ *javaWs*, *javaJpa*, ***ehcache***,org.hibernate\" % \"hibernate-entitymanager\"\
  \ % \"5.3.7.Final\",com.h2database\" % \"h2\" %\n\n\"1.4.200\" )\n\n**使用缓存 API**\n\
  \n缓存 API 非常简单易用：\n\n• 存储数据：\n\n• `Cache.set(\"key\", object)`\n\n• 检索数据：\n\n• `Cache.get(\"\
  key\")`\n\n• 移除数据：\n\n• `Cache.remove(\"key\")`\n\n你还可以通过使用带有三个参数的 `set` 方法来控制数据在缓存中保留的时间（缓存过期时间）：`Cache.set(\"\
  key\", object, int timeinminutes)`\n\n第 11 章 使用缓存\n\n要在控制器中使用缓存 API，需要对其进行注入。按如下方式修改\
  \ `Application.java` 文件以获取对缓存 API 的引用：**private** AsyncCacheApi **cache**;\n\n@Inject\n\
  \n**public** Application(ActorSystem system, AsyncCacheApi cache) {\n\n**pingActor**\
  \ = system.actorOf(PingActor. *getProps*()); **this**. **cache** = cache;\n\n}\n\
  \n现在，你可以在控制器的任何方法中使用缓存 API 来缓存数据。例如：\n\n`CompletionStage<Done> result = cache.set(\"\
  framework\", \"Playframework\");`\n\n// 缓存 10 分钟\n\n`CompletionStage<Done> result\
  \ = cache.set(\"framework\", \"Playframework\", 60 ∗ 10);`\n\n无论何时使用缓存，请记住缓存随时可能过期或丢失。它不是持久化数据，因此你应该始终检查数据是否在缓存中，如果不在，则将其填充到缓存中，然后再检索。这样，即使缓存无法工作或比预期更早过期，你的程序也是安全的。在\
  \ Play 中，如果 JVM 内存不足，底层缓存实现可以自动从缓存中移除对象。因此，请明智地编写代码并有效地使用缓存。\n\nPlay 使用一个可调用方法在数据不存在于缓存时将其加载到缓存中。\n\
  \n这是通过向缓存 API 提供一个可调用方法来实现的，当缓存中缺少数据时，该方法会被调用来生成缓存数据。\n\n让我们修改 `Application.java`\
  \ 文件来添加这样一个方法：**public** CompletionStage<Result> topThreeBooks() {\n\n**return**\
  \ cache.getOrElseUpdate(\"topthree\", this::getTopBooks)\n\n第 11 章 使用缓存\n\n.thenApply((\
  \ List<String> books) -> *ok*(books.toString()));\n\n}\n\n**private** CompletionStage<List<String>>\
  \ getTopBooks() {\n\nList<String> topThreeBooks = new ArrayList<String>(); topThreeBooks.add(\"\
  Book 1\");\n\ntopThreeBooks.add(\"Book 2\");\n\ntopThreeBooks.add(\"Book 3\");\n\
  \n**return** CompletableFuture. *completedFuture*(topThreeBooks);\n\n}\n\n私有方法 `getTopBooks`\
  \ 就是可调用方法，如果数据不在缓存中，缓存 API 会调用它。此方法计算前三本书并返回响应。公共方法 `topThreeBooks` 使用缓存 API 的 `getOrElseUpdate`\
  \ 方法从缓存中获取数据并将其转换为 HTTP 响应。\n\n**编辑 routes.conf**\n\n`GET /bookshop/book/top controllers.Application.topThreeBooks()`\
  \ 使用 `http://localhost:9000/bookshop/book/top` 测试该方法，你将看到响应为：\n\n`[Book 1, Book\
  \ 2, Book 3]`\n\nPlay 还提供了缓存整个 HTTP 响应的能力。这对于缓存不随请求变化的内容非常有用。让我们创建一个新路由并缓存其响应。你将使用静态的联系我们数据（你向所有用户显示相同的内容）。打开\
  \ `Application.java` 文件并添加 `contactus` 方法：\n\n@Cached(key=**\"contactus\"** )\n\n\
  **public** Result contact() {\n\nl ***og***.info(**\"contact us method: processing\"\
  ** ); **return** *ok*(**\"Apress Media, LLC\\n\"** +\n\n**\"\\n\"** +\n\n**\"One\
  \ New York Plaza, Suite 4600\\n\"** +\n\n**\"\\n\"** +\n\n**\"New York, NY 10004-1562\"\
  ** );\n\n}\n\n在 `routes.conf` 文件中添加路由配置：\n\n`GET /bookshop/contact controllers.Application.contact()`\
  \ 要测试，请打开 URL `http://localhost:9000/bookshop/contact` 以观察响应。此响应已被缓存，并来自内存缓存。要测试这一点，请检查\
  \ `application.log` 文件或控制台中的日志，你将看到条目：\n\n`[info] c.Application - contact us method:\
  \ processing`\n\n再次访问该 URL，你将看不到日志条目，因为从第二次开始，响应是从缓存提供的，绕过了已经计算并缓存的处理逻辑。\n\n这个例子非常简单，仅用于解释要点。如果数据（如上例中的联系信息）是从数据库、Web\
  \ 服务或其他需要一定处理量的方式检索的，那么响应缓存非常有用。在这种情况下，第一次会进行处理，但从下一次开始，你可以避免所有处理，因为响应将从缓存中提供。这能为用户生成更快的响应，并且不会浪费服务器的处理时间。\n\
  \n第 11 章 使用缓存\n\n在许多场景下，缓存整个 HTTP 响应并不实际。例如，页面中可能有一些元素会根据用户的登录状态而变化。这种情况也可以通过仅缓存部分数据来轻松处理。你应该为此设计你的内容。考虑一个包含\
  \ 75% 静态内容和 25% 动态内容的主页。在这种情况下，将静态和动态部分拆分为独立的对象，并缓存静态对象。但在这种场景下，你只能缓存对象，而不能缓存生成的静态\
  \ HTML。也就是说，你不能从缓存中获取部分 HTML 响应并将其与动态 HTML 响应混合。在这种情况下，你必须在对象或数据级别进行缓存，而不是在 HTTP\
  \ 响应级别。对于不随每个请求或用户变化的纯静态内容，请使用 HTTP 响应缓存，如上文 `contact` 方法所述。你还学习了对象缓存，如上文 **topThreeBooks**\
  \ 示例所述。\n\n默认的 Caffeine 实现在大多数情况下已经足够好，并且具有高度可扩展性。但如果你需要使用像 memcached 这样的分布式缓存框架，Play\
  \ 提供了通过其缓存 API 接入 memcached 的钩子。对于 memcached，Play 默认提供了一个实现，但依赖于第三方插件。要将 memcached\
  \ 与 Play 一起使用，请使用 [`github.com/mumoshu/play2-memcached`](https://github.com/mumoshu/play2-memcached)\
  \ 上提供的插件。我不会在本书中详细介绍 memcached 的实现，因为第三方插件的文档尚未针对 Play 2.7 及以上版本进行更新。\n\n**第 12\
  \ 章**\n\n**生产部署**\n\n部署 Play 的一种更简单的方法是使用命令 `play run`。为此，你需要将整个 Play 项目复制到生产机器上，然后在项目内执行\
  \ `play run`。这不是生产部署的好方法，因为你不想移动源文件，而只需要将可执行文件（以 jar 文件的形式）推送到生产环境。\n\n\n\n要实现这一点，你可以在构建环境中使用\
  \ `play dist` 命令来生成 Play 可执行 JAR 文件。一旦 `dist` 命令成功执行，它会创建一个 `dist` 目录，JAR 文件将放置在该目录中。\n\
  \n只需将 JAR 文件复制并解压到生产环境中，你就会看到一个 `start` 文件。通过为其分配所需的执行权限（Unix/Linux 环境）使该文件可执行，然后运行它。\n\
  \n你可以编辑 `start` 文件，并向其传递额外的参数，例如 `-Xms`、`-Xmx` 等，以配置 JVM 内存参数。如果需要更改 Play 应用程序的默认监听端口，你可以向启动脚本传递\
  \ `-Dhttp.port=port`。\n\n你可以直接运行 Play，无需任何其他 Web 服务器。\n\n但这并非理想的生产部署方案。你可能需要在 Play\
  \ 服务器前放置一个 Web 服务器（如 Apache HTTP 服务器或 Nginx），以处理各种生产配置和访问需求。你可能希望配置 Apache 来处理 SSL\
  \ 请求，并将 SSL 负载从 Play 上卸载，或者你只是不想将 Play 服务器暴露在互联网上。原因有很多。接下来，我们看看如何将 Apache httpd\
  \ 用作 Play 应用程序的代理。\n\n© Prem Kumar Karunakaran 2020\n\nP. K. Karunakaran, *Introducing\
  \ Play Framework*,\n\n`doi.org/10.1007/978-1-4842-5645-9_12`\n\n第 12 章 生产部署\n\n\
  **为 Play 配置 Apache httpd**\n\n假设你已经安装了 Apache 并且它正在运行。请确保已启用以下模块：`mod_ssl`、`mod_headers`、`mod_proxy`、`mod_proxy_http`\
  \ 和 `mod_proxy_balancer`。\n\n以下是一个简单的 Apache 配置，用于将外部端口 80 重定向到 Play 应用程序的内部 IP\
  \ 和端口 9000：\n\n<VirtualHost ∗:80>\n\nProxyPreserveHost on\n\nProxyPass / http://192.168.1.4:9000/\n\
  \nProxyPassReverse / http://192.168.1.4:9000/\n\n</VirtualHost>\n\n上述配置会将发往端口 80\
  \ 的请求路由到运行在端口 9000 上的 Play 应用程序。\n\n**使用 mod_proxy_balancer 进行负载均衡**\n\n生产部署通常会有多个服务器实例，以满足负载均衡和高可用性需求。你可以启动多个\
  \ Play 实例，并使用 Apache 来执行负载均衡。你需要 `mod_proxy_balancer` 模块来实现这一点：\n\n<Proxy balancer://prodcluster>\n\
  \nBalancerMember http://192.168.1.4:9000\n\nBalancerMember http://192.168.1.5:9000\n\
  \n</Proxy>\n\n<VirtualHost ∗:80>\n\nProxyPreserveHost on\n\nProxyPass / balancer://prodcluster/\n\
  \nProxyPassReverse / balancer://prodcluster/\n\n</VirtualHost>\n\n第 12 章 生产部署\n\n\
  **使用 Nginx 配置 Play**\n\nNginx（发音为 engine-x）是一款免费、开源、高性能的 HTTP 服务器和反向代理服务器，同时也是 IMAP/POP3\
  \ 代理服务器。\n\n与传统服务器不同，Nginx 不依赖线程来处理请求。相反，它采用更具可扩展性的事件驱动（异步）架构。这种架构在负载下使用少量但更重要的是可预测的内存。\n\
  \nNginx 应该已经安装并正在运行。在任何基于 Debian 的发行版上执行以下命令，即可在服务器上安装 Nginx：\n\napt-get install\
  \ nginx\n\n你需要编辑的文件是 `nginx.conf`。编辑 `/etc/nginx/nginx.conf` 文件，并配置其与 Play 一起使用。以下是一个供你参考的示例配置：\n\
  \nhttp {\n\nproxy_buffering off;\n\nproxy_set_header X-Real-IP $remote_addr;\n\n\
  proxy_set_header X-Scheme $scheme;\n\nproxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\
  \ proxy_set_header Host $http_host;\n\nupstream my-backend {\n\nserver 127.0.0.1:9000;\n\
  \n}\n\nserver {\n\nserver_name www.yourserverdomainname.com;\n\n}\n\nserver {\n\n\
  keepalive_timeout 70;\n\n第 12 章 生产部署\n\nserver_name www.yourserverdomainname.com;\n\
  \nlocation / {\n\nproxy_pass http://my-backend;\n\n}\n\n}\n\n}\n\n**注意** 将 `yourserverdomainname`\
  \ 替换为你网站的域名。\n\n保存文件后，你需要重启 Nginx：\n\nsudo /etc/init.d/nginx restart\n\n**索引**\n\
