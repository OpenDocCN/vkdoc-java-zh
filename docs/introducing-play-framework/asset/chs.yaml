  **@ 特殊字符**


  Scala 模板使用 @ 作为特殊字符。每次遇到此字符时，它都表示动态语句的开始。动态语句的结束由 Scala 引擎自动推断。有时你可能需要编写多行语句，为此你可以将动态代码括在花括号或大括号中：


  @(动态代码 )


  @{ 动态代码 }


