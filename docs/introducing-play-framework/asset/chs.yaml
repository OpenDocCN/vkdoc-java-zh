  public class DatabaseExecutionContext extends


  CustomExecutionContext {


  @javax.inject.Inject


  public DatabaseExecutionContext(ActorSystem actorSystem) {


  // 使用在 application.conf 中定义的自定义线程池


  super(actorSystem, "database.dispatcher");


