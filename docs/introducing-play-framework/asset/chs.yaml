  一个 Play 应用程序可以由多个应用模块组装而成。\n\n这有助于在多个应用程序中重用应用组件。模块还有助于将大型应用程序拆分为多个较小的应用程序。\n\n\
  模块只是另一个 Play 应用程序。模块可以引入特定于功能的能力，例如添加不同的持久化机制、集成其他视图技术或集成新的缓存框架。\n\n自 Play 2.5.x\
  \ 以来，模块框架进行了改造。在 Play 中，模块和库之间没有太大区别。唯一真正的区别在于模块直接使用 Play API。Play 模块使用依赖注入框架来工作。如果你想编写一个自定义的\
  \ Play 模块，可以使用任何依赖注入框架来实现。\n\n请注意，Play 使用 guice 作为其默认的依赖注入框架。\n\n但模块不应与任何特定的依赖注入框架绑定，而应以与依赖框架无关的方式工作。为此，Play\
  \ 提供了一个轻量级的 Bindings API，用于将模块与底层依赖注入框架解耦。\n\n依赖关系在组件中使用 @Inject 注解声明。例如，如果一个控制器类依赖于\
  \ WSClient 模块，它应该使用 @Inject WSClient 语法进行声明。Play 会使用底层的依赖注入框架自动完成依赖类的装配。\n\n© Prem\
  \ Kumar Karunakaran 2020\n\n\n\nP. K. Karunakaran 著，《Play 框架入门》，\n\n`doi.org/10.1007/978-1-4842-5645-9_9`\n\
  \n第 9 章 使用 Play 模块\n\n**创建模块**\n\n我们直接开始创建一个简单模块，以理解其流程。如前所述，模块与任何其他 Play 应用程序并无二致。\n\
  \n需要记住的一个重要因素是：模块没有自己的配置；它使用主应用程序的配置。这意味着模块特定的配置信息应设置在应用程序的 `conf/application.conf`\
  \ 文件中。\n\n你要开发的模块很简单。它计算小于 25 的数的阶乘。请按以下步骤操作：\n\n1) 在 `app` 目录下创建一个包，并将其命名为 `modules`。\n\
  \n2) 将模块的契约定义为一个接口：\n\n```java\npackage modules;\n\npublic interface Factorial {\n\
  \n    int fact(int num);\n\n}\n```\n\n3) 为 `Factorial` 接口提供实现：\n\n```java\npackage\
  \ modules;\n\nimport play.inject.ApplicationLifecycle;\n\nimport javax.inject.Inject;\n\
  \npublic class FactorialImpl implements Factorial{\n\n    @Inject\n    public FactorialImpl(ApplicationLifecycle\
  \ lifecycle) {\n        //实现插件生命周期方法\n    }\n\n    public int fact(int number) {\n\
  \        return calculateFactorial(number);\n    }\n\n    private int calculateFactorial(int\
  \ num) {\n        if(num > 25) {\n            throw new RuntimeException(\"超出范围\"\
  );\n        }\n        if(num == 1)\n            return num;\n        return num\
  \ * calculateFactorial(num-1);\n    }\n\n}\n```\n\n4) 创建一个模块，并将其命名为 `FirstModule`：\n\
  \n```java\npackage modules;\n\nimport play.api.Configuration;\nimport play.api.Environment;\n\
  import play.api.inject.Binding;\nimport play.api.inject.Module;\nimport javax.inject.Inject;\n\
  import play.inject.ApplicationLifecycle;\nimport scala.collection.Seq;\n\npublic\
  \ class FirstModule extends Module {\n\n    public Seq<Binding<?>> bindings(Environment\
  \ environment, Configuration configuration) {\n        return seq(\n           \
  \ bind(Factorial.class).to(FactorialImpl.class)\n        );\n    }\n\n}\n```\n\n\
  第 9 章 使用 Play 模块\n\n这里你声明了一个模块，并将你的 `Factorial` 实现添加到了该模块中。现在，为了让 Play 将其识别为一个模块，需要在\
  \ `application.conf` 文件中进行一些修改：\n\n```\nplay.modules.enabled += \"modules.FirstModule\"\
  \n```\n\n保存文件。就这样！你已经创建了一个自定义的 Play 模块。此模块中定义的 `Factorial` 实现可以注入到任何类中并使用。例如，如果需要在控制器类中使用它，只需声明为：\n\
  \n```java\n@Inject Factorial fact;\n```\n\nPlay 会处理其余部分，并在运行时使其可用。如果你想将此模块提供给其他\
  \ Play 应用程序使用，则需要将其发布到仓库。在这种情况下，只需在 Play 应用程序中包含模块类及相关依赖类即可。所有未使用的组件，如视图、公共资源等，都可以移除。\n\
  \n打开命令提示符，进入你创建阶乘 Play 项目的目录。例如，如果项目位于 `C:\\Users\\用户名\\playexamples\\bookshop\\\
  `，则在命令提示符下输入 `sbt`。\n\n这将加载 Play 控制台。你需要发布该模块，以便其他应用程序可以访问它。为简单起见，你将此模块发布到计算机上的本地仓库：\n\
  \n```\nbookshop] $ publishLocal\n```\n\nPlay 将编译文件并发布到本地 Play 仓库。\n\n在 Play 控制台中，请记下\
  \ Play 发布模块的位置。在我的机器上，它发布在 `C:\\Users\\premk\\.ivy2\\local\\com.stackrules.example\\\
  bookshop_2.13\\1.0-SNAPSHOT\\docs\\bookshop_2.13-javadoc.jar` 下。见图 9-1。\n\n![](img/index-172_1.jpg)\n\
  \n第 9 章 使用 Play 模块\n\n***图 9-1.** 已发布的模块*\n\n该模块现在已准备好供其他应用程序使用。\n\n**第三方模块**\n\n\
  通常，你会因各种原因需要使用其他软件工具，而在 Play 中，这些工具通过模块集成到应用程序中。有许多第三方模块可用于满足大多数企业需求。Play 模块使得通过即插即用架构扩展\
  \ Play 功能成为可能。以下是一些流行的模块：\n\n\n\n• Redis：集成 Redis 以提供缓存实现\n\n• Deadbolt：基于角色的授权\n\
  \n• PDF：增加基于 HTML 模板的 PDF 输出支持\n\n还有更多此类模块可用，你可以访问[www.playframework.org](http://www.playframework.org)获取更多相关信息。\n\
  \n**第 10 章**\n\n**应用程序设置**\n\n**与错误处理**\n\n在 Play 2.6 之前，通常使用全局对象来定义应用程序级别的配置和处理逻辑，例如过滤、错误处理等。这种方法在\
  \ Play 2.5.x 中已被弃用，并从 Play 2.6.x 起彻底移除。自 Play 2.6.x 起，推荐使用依赖注入的方式。因此，我不会详细讨论 2.6.x\
  \ 之前采用的方法，而是将你的注意力引向依赖注入方式。在本节末尾，我会给出一个示例，让你了解之前是如何实现的，这对于将旧版 Play 框架项目迁移到新版本会有所帮助。\n\
  \nPlay 应用程序的主类是`play.Application`。该类由 Play 框架在应用程序启动时创建。你无需做任何特殊操作来触发这一过程，框架会自动处理。\n\
  \n你可以通过依赖注入将处理程序绑定到特定类的实例，从而挂钩各种应用程序级别的行为。这是在 Play 中配置应用程序级别绑定的推荐方式。\n\n让我们通过示例来更深入地理解这一点。\n\
  \n© Prem Kumar Karunakaran 2020\n\nP. K. Karunakaran，《Introducing Play Framework》，\n\
  \n`doi.org/10.1007/978-1-4842-5645-9_10`\n\n第 10 章 应用程序设置与错误处理 **过滤器**\n\n过滤器旨在将应用程序的横切关注点应用于所有类，例如日志记录、检查安全标头、压缩响应、分析等。这些都是过滤器发挥作用的地方。Play\
  \ 还有一种称为动作组合（action composition）的机制，它适用于关注点与特定路由相关的情况。\n\n例如，你可能决定保护某些路由，同时允许所有其他路由公开访问。在这种情况下，对于特定路由，你可能需要检查认证/授权语义。对于此类情况，请使用动作组合。你将在本章后续部分进一步了解动作组合。我们先聚焦于过滤器。\n\
  \n日志过滤器：\n\n```java\npackage config;\n\nimport akka.event.LoggingFilter;\n\nimport\
  \ akka.stream.Materializer;\n\nimport java.util.concurrent.CompletionStage;\n\n\
  import java.util.function.Function;\n\nimport org.slf4j.Logger;\n\nimport org.slf4j.LoggerFactory;\n\
  \nimport play.mvc.Filter;\n\nimport play.mvc.Http;\n\nimport play.mvc.Result;\n\n\
  import javax.inject.Inject;\n\n/**\n * A simple filter implementation that logs\
  \ how long it took to process a request\n */\npublic class ApplicationFilter extends\
  \ Filter {\n\n    @Inject\n    public ApplicationFilter(Materializer mat) {\n  \
  \      super(mat);\n    }\n\n    private static final Logger log = LoggerFactory.getLogger(LoggingFilter.class);\n\
  \n    @Override\n    public CompletionStage<Result> apply(Function<Http.RequestHeader,\n\
  \            CompletionStage<Result>> next,\n                                  \
  \      Http.RequestHeader requestHeader) {\n        long startTime = System.currentTimeMillis();\n\
  \        return next\n                .apply(requestHeader)\n                .thenApply(\n\
  \                        result -> {\n                            long endTime =\
  \ System.currentTimeMillis();\n                            long requestTime = endTime\
  \ - startTime;\n                            log.info(\n                        \
  \            \"{} {} took {}ms to complete and produced the status {}\",\n     \
  \                               requestHeader.method(),\n                      \
  \              requestHeader.uri(),\n                                    requestTime,\n\
  \                                    result.status());\n                       \
  \     return result;\n                        });\n    }\n}\n```\n\n`ApplicationFilter`类继承自`play.mvc.Filter`并重写了`apply`方法。`apply`方法接受两个参数：1)\
  \ 一个函数，该函数以`Http.RequestHeader`为参数，并返回`CompletionStage<Result>`作为输出；2) `Http.RequestHeader`：传入请求的请求头。\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n让我们先理解第一个参数，并看看它在代码中是如何使用的。你在代码中使用的下一个参数代表了过滤器链中的下一个动作。调用它将会允许请求继续向前流动，并最终到达目标类，在大多数情况下是控制器。在你的日志记录场景中，在传递控制权之前，你记录了请求时间，然后允许请求继续向前流动。一旦请求完成，你使用\
  \ `thenApply` 函数来记录响应时间，并将结果返回给调用者。请注意，`CompletionStage<Result>` 是 Java 8 提供的用于处理异步响应的通用\
  \ Promise API。由于 Play 使用异步编程，Play API 的响应都使用它。这就是为什么你需要使用 `thenApply` 方法进行处理的原因。关于\
  \ Promise 类和异步编程的更多细节，将在异步编程章节中提供。\n\n**第 10 章 应用设置与错误处理** 现在你已经创建了一个过滤器，让我们看看如何告诉\
  \ Play 使用它。创建一个名为 `FilterConfig` 的类，如下所示，并将其保存在 `config` 包内：\n\n**FilterConfig.java**\n\
