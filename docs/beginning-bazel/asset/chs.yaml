- "# 9. Bazel 与 Android\n\n在前面的章节中，你使用 Bazel 开发的功能大概率会部署到某个后端服务器。然而，Bazel 的用途并不止后端项目，它同样可以处理移动客户端。在本章中，我们将探索如何使用\
  \ Bazel 构建 Android 应用。\n\n## 环境准备\n\n和之前一样，我们将基于前面章节继续构建。首先再次确认所有由 Bazel 生成的文件都已清除。然后，复制上一章的工作内容：\n\
  \n```\n$ cd chapter_08\nchapter_08$ bazel clean\nchapter_08$ ls\nWORKSPACE   client\
  \    proto   server\nchapter_08$ cd ..\n$ cp -rf chapter_08 chapter_09\n$ cd chapter_09\n\
  chapter_09$\n```\n\n### 工作区\n\n正如你可能已经猜到的，我们需要在 `WORKSPACE` 文件中补充一个额外依赖。在这个场景下，我们要指定用于构建\
  \ Android 项目的规则。\n\n打开 `WORKSPACE` 文件并添加以下内容。\n\n```\nhttp_archive(\nname = \"rules_android\"\
  ,\nurls = [\"https://github.com/bazelbuild/rules_android/archive/v0.1.1.zip\"],\n\
  strip_prefix = \"rules_android-0.1.1\",\n)\nandroid_sdk_repository(name = \"androidsdk\"\
  )\nListing 9-1\nModifying the WORKSPACE file for the Android rules\n```\n\n\n\n\
  ### 注意\n\n在前面的章节中，我们提到过有一些开箱即用的规则（例如 `java_library`、`cc_library` 等）。`android_library`\
  \ 和 `android_binary` 的规则在技术上最初也属于更*开箱即用*的规则。不过，随着 Bazel 的成熟，他们开始将规则从这个核心集合中移除，并为这些规则创建显式的包，以便于维护。\n\
  \n从开发角度看，这样做是合理的；通过让规则更加模块化、减少其作为单体包一部分的程度，它们就可以按合适的节奏进行修订，而不需要重建整个 Bazel 系统。\n\n\
  在 *WORKSPACE* 文件中，我们正在调用一个规则 `android_sdk_repository`。它用于指定相对于该项目的 Android SDK 路径。在这个特定场景下，如果规则本身没有其他额外指定，该规则默认使用\
  \ *ANDROID_HOME* 环境变量。我们很快就会设置它。\n\n### 注意\n\n在这种情况下依赖环境变量，考虑到 Bazel 对其依赖项保持可控性的做法，可能会引发一些担忧。在这个特定场景中，环境变量可以被视为一种便利；不过，在\
  \ `android_sdk_repository` 规则中，*确实*可以指定 Android SDK 的显式路径，甚至可以是相对于当前 `WORKSPACE`\
  \ 文件的路径。\n\n当你将 Android SDK 依赖纳入源代码版本控制时，这种指定方式非常有用。这也再次让 Bazel 回到它所偏好的那种封闭式（hermetic）构建模式。\n\
  \n### Android Studio\n\n在本章中，我们下载 Android Studio 的目的是获得一个易于使用的 Android 模拟器，以便运行我们的成果，同时为\
  \ Android SDK 提供一个方便的位置。严格来说，你*确实*可以使用你通过 Bazel 完成的工作来驱动一个 Android Studio（以及 IntelliJ）项目（类似于使用\
  \ *gradle*）。不过，这种集成不在本书本章的讨论范围内。\n\n### 注意\n\n为此，你也可以使用你更喜欢的 Android 模拟器，*或者*仅仅把你的\
  \ Android 设备连接到电脑来进行尝试。在这些情况下，你基本可以跳过 Android Studio（但请特别注意确保你已具备接下来“Environment”部分所要求的\
  \ Android SDK）。\n\n前往 [`https://developer.android.com/studio`](https://developer.android.com/studio)，并按照说明在你的平台上下载和安装\
  \ Android Studio。\n\n本书示例使用的 Android Studio 版本是 3.4.2。后续版本在界面上可能会有变化，因此截图可能无法完全对应。\n\
  \n#### Environment\n\n如前所述，我们需要设置 `ANDROID_HOME` 环境变量，以确保 Bazel 知道去哪里查找 Android\
  \ SDK。请确保在你的环境中设置 `ANDROID_HOME` 变量，其值指向你机器上 Android SDK 的位置。\n\nAndroid Studio\
  \ 的 Android SDK 默认位置取决于具体操作系统。请根据你的系统设置环境变量：\n\n对于 Linux：\n\n```\nexport ANDROID_HOME=$HOME/Android/Sdk/\n\
  ```\n\n对于 MacOS：\n\n```\nexport ANDROID_HOME=$HOME/Library/Android/sdk\n```\n\n\
  对于 Windows：\n\n```\nset ANDROID_HOME=%LOCALAPPDATA%\\Android\\Sdk\n```\n\n需要注意的一点是，上述命令只会在当前控制台会话生命周期内设置环境变量。你可能需要考虑将这些设置加入你所用控制台和操作系统的默认配置文件中。\n\
  \n此外，上述值只是 SDK 的*默认*位置；在安装 Android Studio 的过程中，你也可能将其安装到了其他位置。要找到该位置，请在 Android\
  \ Studio 中打开 SDK Manager。\n\n![../images/481224_1_En_9_Chapter/481224_1_En_9_Fig1_HTML.jpg](img/481224_1_En_9_Fig1_HTML.jpg)\n\
  \n图 9-1\n\n在 Android Studio 中启动 SDK Manager\n\n在 SDK Manager 中，你将能够找到 Android SDK\
  \ 的位置。使用该值来设置 `ANDROID_HOME` 环境变量的值。\n\n![../images/481224_1_En_9_Chapter/481224_1_En_9_Fig2_HTML.jpg](img/481224_1_En_9_Fig2_HTML.jpg)\n\
  \n图 9-2\n\n确认 Android SDK 的位置\n\n#### 下载 SDK\n\n当我们已经打开并运行 SDK Manager 时，也应确保至少有一个\
  \ Android SDK 可用于开始开发。至少选择 *Android 8.1 (Oreo)*（即 API Level 27），然后点击 *OK* 开始下载 SDK（如果你选择了多个）。\n\
  \n![../images/481224_1_En_9_Chapter/481224_1_En_9_Fig3_HTML.jpg](img/481224_1_En_9_Fig3_HTML.jpg)\n\
  \n图 9-3\n\n选择要下载的 Android SDK 版本\n\n下载完 SDK 后，点击 *Finish*。\n\n![../images/481224_1_En_9_Chapter/481224_1_En_9_Fig4_HTML.jpg](img/481224_1_En_9_Fig4_HTML.jpg)\n\
  \n图 9-4\n\n下载 Android SDK\n\n### 创建模拟器\n\n最后，让我们创建一个 Android Emulator 实例。在主界面中，打开\
  \ *AVD Manager*。\n\n![../images/481224_1_En_9_Chapter/481224_1_En_9_Fig5_HTML.jpg](img/481224_1_En_9_Fig5_HTML.jpg)\n\
  \n图 9-5\n\n在 Android Studio 中启动 AVD Manager\n\n此时，我们还没有任何模拟器配置文件，因此点击 *Create Virtual\
  \ Device* 来创建一个。\n\n![../images/481224_1_En_9_Chapter/481224_1_En_9_Fig6_HTML.jpg](img/481224_1_En_9_Fig6_HTML.jpg)\n\
  \n图 9-6\n\n创建虚拟设备\n\n在 *Select Hardware* 页面中，从 Phone 类别选择一个设备（例如 Pixel 2），然后点击 *Next*。\n\
  \n![../images/481224_1_En_9_Chapter/481224_1_En_9_Fig7_HTML.jpg](img/481224_1_En_9_Fig7_HTML.jpg)\n\
  \n图 9-7\n\n选择特定设备\n\n在 *System Image* 页面中，选择你要使用的 Android SDK 具体版本（例如 Oreo），然后点击\
  \ *Next*。\n\n![../images/481224_1_En_9_Chapter/481224_1_En_9_Fig8_HTML.jpg](img/481224_1_En_9_Fig8_HTML.jpg)\n\
  \n图 9-8\n\n选择 Android SDK 的版本\n\n最后，你可以为该模拟配置命名（如果你愿意）。点击 *Finish* 完成虚拟设备的创建。\n\n\
  ![../images/481224_1_En_9_Chapter/481224_1_En_9_Fig9_HTML.jpg](img/481224_1_En_9_Fig9_HTML.jpg)\n\
  \n图 9-9\n\n命名并完成虚拟设备创建\n\n\n\n## 在 Bazel 中创建 Android Echo 客户端\n\n完成所有准备工作后，我们现在已经可以开始真正创建\
  \ Android 应用了。在这个例子中，我们将创建 echo 客户端的移动版本。\n\n不过，在编写实际的 gRPC 代码之前，我们先从一个简单的壳版本开始，它只在本地回显（即输入文本会立即返回）。这样做只是为了先熟悉在\
  \ Bazel 中开发 Android 应用的基础知识。\n\n让我们为 Android 相关工作创建一个新目录：\n\n```\nchapter_09$ cd\
  \ client/echo_client/\nchapter_09/client/echo_client$ mkdir android\nchapter_09/client/echo_client$\
  \ cd android\nchapter_09/client/echo_client/android$\n```\n\n在 `client/echo_client/android`\
  \ 目录中，创建 `EchoClientMainActivity.java` 文件并添加以下内容。\n\n```\npackage client.echo_client.android;\n\
  import android.app.Activity;\nimport android.os.Bundle;\nimport android.view.View;\n\
  import android.widget.Button;\nimport android.widget.EditText;\nimport android.widget.TextView;\n\
  public class EchoClientMainActivity extends Activity {\n@Override\npublic void onCreate(Bundle\
  \ savedInstanceState) {\nsuper.onCreate(savedInstanceState);\nsetContentView(R.layout.echo_client_main_activity);\n\
  Button textSenderButton = findViewById(R.id.text_sender);\nEditText clientTextEditor\
  \ = findViewById(R.id.text_input);\nTextView serverResultsText = findViewById(R.id.server_result_text);\n\
  textSenderButton.setOnClickListener(new View.OnClickListener() {\npublic void onClick(View\
  \ v) {\nserverResultsText.setText(clientTextEditor.getText().toString());\n}});\n\
  }\n}\nListing 9-2\nCreating a basic Android echo client\n```\n\n将文件保存为 `EchoClientMainActivity.java`*。*\
  \ 从前面的代码可以看出，我们正在创建一个简单的文本编辑器用于输入文本；按下按钮后，文本会显示在一个文本视图中。\n\n现在让我们创建真正构建 UI 的布局文件：\n\
  \n```\nchapter_09/client/echo_client/android$ mkdir -p res/layout\n```\n\n在 `client/echo_client/android/res/layout`\
  \ 下创建以下文件。\n\n```\n\nListing 9-3\nCreating the layout file\n```\n\n将其保存到 `client/echo_client/android/res/layout`\
  \ 下，文件名为 `echo_client_main_activity.xml`*。*\n\n对于我们的 Android 应用，还需要一个 `AndroidManifest.xml`\
  \ 文件。\n\n```\n\nListing 9-4\nAndroidManifest.xml\n```\n\n将其保存到 `client/echo_client/android/AndroidManifest.xml`*。*\n\
  \n最后，让我们创建 `BUILD` 文件并定义目标。\n\n```\nload(\"@rules_android//android:rules.bzl\",\
  \ \"android_library\", \"android_binary\")\nandroid_library(\nname = \"echo_client_android_activity\"\
  ,\nsrcs = [\"EchoClientMainActivity.java\"],\nmanifest = \"AndroidManifest.xml\"\
  ,\ncustom_package = \"client.echo_client.android\",\nresource_files = [\n\"res/layout/echo_client_main_activity.xml\"\
  \n],\n)\nandroid_binary(\nname = \"echo_client_android_app\",\nmanifest = \"AndroidManifest.xml\"\
  ,\ncustom_package = \"client.echo_client.android\",\ndeps = [ \":echo_client_android_activity\"\
  ,],\n)\nListing 9-5\nCreating the BUILD file for the Android client\n```\n\n将其保存到\
  \ `client/echo_client/android/BUILD`。\n\n虽然 Android 的构建规则是新的，但你在本书中已经多次见过这种模式。不出所料，我们需要从\
  \ `rules_android` 包中显式加载 `android_librar`*y* 和 `android_binary` 规则。\n\n对于每条规则，有不少我们熟悉的属性（即\
  \ name、srcs、dep）。还有几个值得重点说明的属性：\n\n*   manifest\n    *   指向 `AndroidManifest.xm`*l*\
  \ 文件。\n\n*   `android_library` 和 `android_binary` 都必需该属性。\n\n*   resource_files\n\
  \    *   包含一组 Android 资源文件（例如 layout.xml、strings.xml 等）。\n\n*   严格来说这是*可选*的；但在本例中，如果去掉这里的这个属性，构建会失败（因为它将不再依赖生成类所需的文件）。\n\
  \n*   custom_package\n    *   该属性显式指定应用使用的包名。\n\n*   `android_library` 和 `android_binary`\
  \ 都对目录结构有要求。\n\n*   具体来说，它们期望目录以 `java` 或 `javatests` 开头，以此推断 Java 包名。\n\n*   如果目录*不是*以\
  \ java 开头，则必须显式设置 `custom_package` 属性。\n\n从技术上讲，我们其实并不一定非要同时有 `android_library`\
  \ 实例和 `android_binary` 实例。`android_binary` 规则本身提供了足够多的选项，理论上我们*可以*把所有需要的内容（即 Java\
  \ 源文件和资源文件）都放在那里。不过，这里的拆分是为了演示这两条规则。\n\n让我们执行一次测试构建，确保一切都按预期运行。为简化起见，我们只构建最终二进制：\n\
  \n```\nchapter_09/client/echo_client/android$ bazel build :echo_client_android_app\n\
  INFO: Analyzed target //client/echo_client/android:echo_client_android_app (1 packages\
  \ loaded, 5 targets configured).\nINFO: Found 1 target...\nTarget //client/echo_client/android:echo_client_android_app\
  \ up-to-date:\nbazel-bin/client/echo_client/android/echo_client_android_app_deploy.jar\n\
  bazel-bin/client/echo_client/android/echo_client_android_app_unsigned.apk\nbazel-bin/client/echo_client/android/echo_client_android_app.apk\n\
  INFO: Elapsed time: 0.935s, Critical Path: 0.70s\nINFO: 3 processes: 3 darwin-sandbox.\n\
  INFO: Build completed successfully, 4 total actions\n```\n\n恭喜！你已经使用 Bazel 构建了第一个\
  \ Android 应用。现在我们可以在模拟器上测试它了。\n\n### 启动 Android 模拟器实例\n\n在你先前创建好虚拟设备后，现在就可以启动它。打开\
  \ *AVD 管理器*，这里会列出你所有的虚拟设备（本例中只有一个）。点击“播放”按钮，启动一个虚拟设备实例。\n\n![../images/481224_1_En_9_Chapter/481224_1_En_9_Fig10_HTML.jpg](img/481224_1_En_9_Fig10_HTML.jpg)\n\
  \n图 9-10\n\n启动虚拟设备\n\n你应该会看到如下空白屏幕。\n\n![../images/481224_1_En_9_Chapter/481224_1_En_9_Fig11_HTML.jpg](img/481224_1_En_9_Fig11_HTML.jpg)\n\
  \n图 9-11\n\n启动后的模拟器\n\n### Bazel 移动安装\n\n在完成构建并设置好模拟器后，我们现在可以部署应用了。乍一看，我们可以使用 Android\
  \ Debug Bridge（ADB）命令把应用装到模拟器上。不过，Bazel 提供了一个非常有用的命令 `mobile-install`*。* 与 `run`\
  \ 类似，`mobile-install` 会构建目标应用，然后安装到已连接设备上（本例中即模拟器）。\n\n额外的好处是，我们还可以加上 `start_app`\
  \ 选项，以便应用安装完成后立即启动。使用该选项后，`mobile-install` 在功能上就相当于前几章中 `run` 的移动端版本。\n\n运行以下命令来构建、部署并启动应用：\n\
  \n```\nchapter_09/client/echo_client/android$ bazel mobile-install --start_app :echo_client_android_app\n\
  ```\n\n![../images/481224_1_En_9_Chapter/481224_1_En_9_Fig12_HTML.jpg](img/481224_1_En_9_Fig12_HTML.jpg)\n\
  \n图 9-12\n\n应用初始界面\n\n恭喜！你的应用已经运行起来了，它会在本地回显你在文本编辑器中输入的任何内容。\n\n### 注意\n\n*mobile-install*\
  \ 命令不仅仅是 ADB 功能的一个便捷代理。由于它与 Bazel 构建系统集成，还可以用于向移动应用部署增量变更。这能大幅提升开发效率，使你能够以更迭代的方式处理移动应用的各个方面（例如\
  \ UI）。不过，关于这种增量部署的具体细节不在本书讨论范围之内。\n\n\n\n## 添加 gRPC 支持\n\n尽管前面的示例对于创建一个基础的 Android\
  \ 应用很有帮助，但它并不是一个功能非常完善的应用。延续前几章的主题，我们现在把真正的 echo 客户端功能添加到这个应用中。幸运的是，你在前几章已经完成了大部分繁重工作；这里我们可以直接复用。\n\
  \n在我们开始 Android 代码本身之前，首先必须确保添加了合适的权限；否则，当我们尝试执行进程间通信时会报错。\n\n打开 `AndroidManifest.xml`\
  \ 文件并添加以下权限。\n\n```\n\nListing 9-6\nAdding permission to access networking to the\
  \ Android app\n```\n\n将更改保存到 `AndroidManifest.xml`。\n\n现在让我们对 Android 代码本身做必要的修改。打开\
  \ `EchoClientMainActivity.java` 文件，并添加下面加粗所示的更改。\n\n```\npackage java.com.beginning_bazel.client.echo_client;\n\
  import android.app.Activity;\nimport android.os.Bundle;\nimport android.util.Log;\n\
  import android.view.View;\nimport android.widget.Button;\nimport android.widget.EditText;\n\
  import android.widget.TextView;\nimport io.grpc.ManagedChannel;\nimport io.grpc.ManagedChannelBuilder;\n\
  import transmission_object.TransmissionObjectOuterClass.TransmissionObject;\nimport\
  \ transceiver.TransceiverOuterClass.EchoRequest;\nimport transceiver.TransceiverOuterClass.EchoResponse;\n\
  import transceiver.TransceiverGrpc;\npublic class EchoClientMainActivity extends\
  \ Activity {\n@Override\npublic void onCreate(Bundle savedInstanceState) {\nsuper.onCreate(savedInstanceState);\n\
  setContentView(R.layout.echo_client_main_activity);\nButton textSenderButton = findViewById(R.id.text_sender);\n\
  EditText clientTextEditor = findViewById(R.id.text_input);\nTextView serverResultsText\
  \ = findViewById(R.id.server_result_text);\ntextSenderButton.setOnClickListener(new\
  \ View.OnClickListener() {\npublic void onClick(View v) {\nfinal String clientText\
  \ =\nclientTextEditor.getText().toString();\nif (!clientText.isEmpty()) {\nManagedChannel\
  \ channel =\nManagedChannelBuilder\n.forAddress(\"10.0.2.2\", 1234)\n.usePlaintext()\n\
  .build();\nTransceiverGrpc.TransceiverBlockingStub stub =\nTransceiverGrpc.newBlockingStub(channel);\n\
  EchoRequest request = EchoRequest.newBuilder()\n.setFromClient(\nTransmissionObject.newBuilder()\n\
  .setMessage(clientText)\n.setValue(3.145f)\n.build();\n.build();\ntry {\nEchoResponse\
  \ response = stub.echo(request);\nserverResultsText.setText(response.toString());\n\
  } catch (Throwable t) {\nLog.d(\"EchoClientMainActivity\", \"error:\", t);\n} finally\
  \ {\nchannel.shutdown();\n}\n}\n}});\n}\n}\nListing 9-7\nModifying the Android client\
  \ to support gRPC\n```\n\n将更改保存到 `EchoClientMainActivity.java`。\n\n### 注意\n\n细心的读者会注意到，我们将地址从*localhost*改成了*10.0.2.2*。在模拟器中，*localhost*指向的是模拟设备本身，而不是运行模拟器的那台机器。Android\
  \ Studio 指定了一个特殊 IP 地址（即 *10.0.2.2*），用于连接运行在你开发机器上的进程。你不需要对服务端做任何改动。\n\n如果你决定使用*不同的*模拟平台，请查阅该平台的文档，确认它是否指定了不同的地址（或采用不同策略）来连接你开发机器上的进程。\n\
  \n所有新增代码你应该都很熟悉；只做了少量改动，它与上一章命令行 Java 客户端中的代码几乎一致。\n\n### 注意\n\n在上一章和本章中，我们都使用了*阻塞\
  \ stub*版本来调用后端。虽然这在这里对我们来说很方便，但一般来说，你不会希望在 UI 线程上发起这种 I/O 调用，因为这可能导致 UI 无响应。相反，你很可能需要研究此调用生成的其他版本（例如使用\
  \ Future），以便选择最适合你应用程序的方式。\n\n最后，让我们把必要的依赖添加到 `BUILD` 文件中。再一次，这部分对你来说应该非常熟悉，与前一章相比改动很少。\n\
  \n```\nload(\"@rules_android//android:rules.bzl\", \"android_library\", \"android_binary\"\
  )\nandroid_library(\nname = \"echo_client_android_activity\",\nsrcs = [\"EchoClientMainActivity.java\"\
  ],\nmanifest = \"AndroidManifest.xml\",\ncustom_package = \"client.echo_client.android\"\
  ,\nresource_files = [\n\"res/layout/echo_client_main_activity.xml\"\n],\ndeps =\
  \ [\n\"//proto:transceiver_java_proto\",\n\"//proto:transceiver_java_proto_grpc\"\
  ,\n\"//proto:transmission_object_java_proto\",\n\"@io_grpc_grpc_java//api\",\n\"\
  @io_grpc_grpc_java//okhttp\",\n\"@io_grpc_grpc_java//stub\",\n],\n)\nandroid_binary(\n\
  name = \"echo_client_android_app\",\nmanifest = \"AndroidManifest.xml\",\ndeps =\
  \ [ \":echo_client_android_activity\",],\n)\nListing 9-8\nAdding dependencies into\
  \ the Android BUILD file\n```\n\n\n\n### 注意\n\n再次强调，细心的读者会发现，我们已经将之前的运行时依赖 `@io_grpc_grpc_java//netty`\
  \ 替换为静态依赖 `@io_grpc_grpc_java/okhttp`。可以肯定的是，`netty` 最适合同时支持客户端*和*服务器端功能。`OkHttp`\
  \ 的设计目标是为纯客户端场景提供轻量化支持，因此这里将其引入 Android。\n\n将这些更改保存到 `BUILD` 文件中。\n\n为确保无误，我们再构建一次应用。不过，这次你可能会看到一条令人意外的错误信息。\n\
  \n```\nchapter_09/client/echo_client/android$ bazel build :echo_client_android_app\n\
  ERROR: \n'single_file' is no longer supported. use allow_single_file instead. You\
  \ can use --incompatible_disable_deprecated_attr_params=false to temporarily disable\
  \ this check.\nERROR: /external/io_grpc_grpc_java/protobuf-lite/BUILD.bazel:1:1:\
  \ error loading package '@com_google_protobuf_javalite//': Extension file 'protobuf.bzl'\
  \ has errors and referenced by '@io_grpc_grpc_java//protobuf-lite:protobuf-lite'\n\
  ERROR: Analysis of target '//client/echo_client/android:echo_client_android_app'\
  \ failed; build aborted: error loading package '@com_google_protobuf_javalite//':\
  \ Extension file 'protobuf.bzl' has errors\n```\n\n在这个特定场景下，你其实并没有做错任何事；你之所以遇到这个错误，可能是因为\
  \ Bazel 本身在持续演进。在这里，你的某个依赖由于使用了已弃用属性而报错。不过事情并非无解，上面高亮的那一行已经告诉了我们下一步该怎么做。\n\n如果我们在\
  \ `build`（以及 `mobile-install`）命令中加入参数 `–-incompatible_disable_deprecated_attr_params=false`，你会看到问题自行修复。\n\
  \n```\nchapter_09/client/echo_client/android$ bazel build –-incompatible_disable_deprecated_attr_params=false\
  \ :echo_client_android_app\nINFO: Writing tracer profile to '/private/var/tmp/_bazel_pj/72676801ec24996691dac393febb05db/command.profile.gz'\n\
  INFO: Analyzed target //client/echo_client/android:echo_client_android_app (80 packages\
  \ loaded, 2140 targets configured).\nINFO: Found 1 target...\nTarget //client/echo_client/android:echo_client_android_app\
  \ up-to-date:\nbazel-bin/client/echo_client/android/echo_client_android_app_deploy.jar\n\
  bazel-bin/client/echo_client/android/echo_client_android_app_unsigned.apk\nbazel-bin/client/echo_client/android/echo_client_android_app.apk\n\
  INFO: Elapsed time: 11.048s, Critical Path: 6.06s\nINFO: 13 processes: 9 darwin-sandbox,\
  \ 4 worker.\nINFO: Build completed successfully, 14 total actions\n```\n\n严格来说，尽管这种方式可行，但不应将其视为永久解决方案。当你真正遇到类似问题时，正确做法是修复依赖中的问题（必要时可提交相应修改）。这也说明了尽可能将你的优势保持在本地化范围内的好处，这样你更容易掌控自己的技术命运。\n\
  \n不过，这也体现出一点：即使 Bazel 本身仍在快速演进，它也在努力为你提供“应急阀门（escape valves）”，以便让开发继续推进。虽然这些不是长期方案，但它们确实能帮助你更平滑地在软件版本之间过渡。\n\
  \n## 在后端上运行 Android 客户端\n\n现在我们已经增强了 Android 客户端，使其可以对本地服务器发起 RPC，接下来让我们同时启动服务器和客户端。\n\
  \n之前你需要两个控制台实例，因为客户端和服务器都是命令行工具。在这里，你只需要一个。\n\n首先，构建、部署并启动我们更新后的 Android 应用。运行以下命令：\n\
  \n```\nbazel mobile-install --incompatible_disable_deprecated_attr_params=false\
  \ --start_app :echo_client_android_app\n```\n\n确认应用已经启动并运行后，运行以下命令启动服务器：\n\n```\n\
  chapter_09$ bazel run server/echo_server\nINFO: Deleting stale sandbox base /private/var/tmp/_bazel_pj/72676801ec24996691dac393febb05db/sandbox\n\
  Target //server/echo_server:echo_server up-to-date:\nbazel-bin/server/echo_server/darwin_amd64_stripped/echo_server\n\
  INFO: Elapsed time: 16.670s, Critical Path: 0.30s\nINFO: 0 processes.\nINFO: Build\
  \ completed successfully, 1 total action\nINFO: Build completed successfully, 1\
  \ total action\n2019/08/01 16:39:03 Spinning up the Echo Server in Go\n```\n\n现在，输入一些文本并点击“Send\
  \ to Server”。你应该会在 Android 客户端中收到响应，如下所示。\n\n![../images/481224_1_En_9_Chapter/481224_1_En_9_Fig13_HTML.jpg](img/481224_1_En_9_Fig13_HTML.jpg)\n\
  \n图 9-13\n\n显示应用界面及后端返回响应的屏幕\n\n恭喜！你已经创建了 Android 回声客户端，并成功与本地回声服务器通信。\n\n## 结语\n\
  \n在本章中，你通过学习如何使用 Bazel 构建 Android 应用，进一步拓展了自己的知识体系。此外，你还能将前面章节所学应用起来，构建出一个能够与此前工作成果进行通信的应用。虽然这显然只是一个远程通信的玩具示例，但它可以作为更大型项目的起点。\n\
  \n在展示了 Bazel 构建 Android 项目的能力之后，我们将在下一章进一步扩展到 iOS 应用开发。\n\n\n\n### 练习——在 Android\
  \ 上使用 Java Lite Protos\n\n在上一章中，你已经能够利用前面章节的成果，轻松地为你的 Android 应用添加 gRPC 支持。在这一过程中有一点被略过了：`java_proto_library`\
  \ 的输出在函数数量上通常会比较冗长；也就是说，生成的类、内部类、静态类等数量往往很大。对于运行在服务器上的程序来说这通常问题不大，但对于大规模 Android\
  \ 程序，这会逐渐成为一个问题。资深 Android 开发者都熟悉单个 DEX 文件中令人头疼的函数数量限制（即 64K 函数）。\n\n虽然你可以采用 multidex\
  \ 策略来应对函数数量增加的问题，但这会因 Android SDK 版本不同而变得复杂。幸运的是，至少对于 `java_proto_library` 这一场景，我们有一个可行替代方案：`java_lite_proto_library`。该规则会生成功能更精简的\
  \ proto Java 代码，同时仍保留大多数场景下常用的核心功能。\n\n值得注意的是，`java_lite_proto_library`（目前）属于那种开箱即用但仍需要一些外部支持的规则之一（这也许能说明这一组规则的迁移路径）。该规则的定义方式与\
  \ `java_proto_library` 几乎*完全相同*。由 `java_lite_proto_library` 生成的 proto 并不实现原版本的*全部*功能，但在最常见的使用场景中通常可以直接替换（这里就是这种情况）。\n\
  \n幸运的是，你可以通过在 `WORKSPACE` 文件中添加以下内容，轻松获得所需支持：\n\n```\nhttp_archive(\nname = \"com_google_protobuf_javalite\"\
  ,\nstrip_prefix = \"protobuf-javalite\",\nurls = [\"https://github.com/google/protobuf/archive/javalite.zip\"\
  ],\n)\n```\n\n此外，你还需要确保所使用的 grpc 库*同样*会生成与 `java_lite_proto_library` 输出兼容的代码。幸运的是，我们现有的\
  \ `java_grpc_library` 规则已经为我们处理了这一点；你只需要在应用中添加选项 `flavor = \"lite\"`。\n\n例如：\n\n\
  ```\njava_grpc_library(\nname = \"transceiver_java_lite_proto_grpc\",\nsrcs = [\"\
  :transceiver_proto\"],\ndeps = [\":transceiver_java_lite_proto\"],\nflavor = \"\
  lite\",\nvisibility = [\"//client/echo_client:__subpackages__\"],\n)\n```\n\n当你创建好\
  \ `java_lite_proto_library` 和 `java_grpc_library`（带有 “lite” proto 支持）实例后，将应用的 `android_library`\
  \ 重定向到这些新建规则上。由于我们在这里使用 protobuf 的方式，你无需修改任何 Android 代码。你应该能够顺利构建并运行代码，且功能不会发生变化。\n\
  \n不过，你应当对比这次变更前后的应用体积。你会看到体积显著减小（如果你确实想了解具体差异，可以使用 Android Studio 的分析工具查看函数数量的变化）。\n\
  \n对于玩具项目，这种差异可能不明显；但当你使用 protobuf 构建规模较大的 Android 应用时，你会希望使用 “lite” 版本来帮助保持应用体积小，并避免使用\
  \ multidex。\n\n"
- '# 10. Bazel 与 iOS


  在上一章中，你使用 Bazel 从适用于服务器的命令行程序扩展到 Android，从而迈入移动端世界。为了完整起见，我们将为 iOS 创建一个等效客户端。


  ### 注意


  在本章中，我们将使用原生工具创建一个 iOS 项目。不过，由于 Xcode 仅在 MacOS 上可用，你只能在 MacOS 机器上构建本章项目。


  ## 设置


  我们将再次基于前面章节的内容继续构建。先确认上一章由 Bazel 生成的文件已清理，然后复制上一章的工作：


  ```

  $ cd chapter_09

  chapter_09$ bazel clean

  chapter_09$ ls

  WORKSPACE   client    proto   server

  chapter_09$ cd ..

  $ cp -rf chapter_09 chapter_10

  $ cd chapter_10

  chapter_10$

  ```


  由于你已经在机器上配置好了 Xcode 来构建前几章的示例，因此你应当已经具备开发 iOS 应用所需的一切。


  ## Workspace


  我们再次在 `WORKSPACE` 文件中添加依赖，以获取构建 iOS 项目所需的规则。


  打开 `WORKSPACE` 文件并添加以下内容。


  ```

  load("@bazel_tools//tools/build_defs/repo:http.bzl", "http_archive")

  load("@bazel_tools//tools/build_defs/repo:git.bzl", "git_repository")

  skylib_version = "0.8.0"

  http_archive(

  name = "bazel_skylib",

  url = "https://github.com/bazelbuild/bazel-skylib/releases/download/{}/bazel-skylib.{}.tar.gz".format(skylib_version,
  skylib_version),

  )

  git_repository(

  name ="build_bazel_rules_apple",

  commit="1445924a158a89ad634f562c84a600a3435ef8c2",

  remote="https://github.com/bazelbuild/rules_apple.git",

  )

  load(

  "@build_bazel_rules_apple//apple:repositories.bzl",

  "apple_rules_dependencies",

  )

  apple_rules_dependencies()

  load(

  "@build_bazel_rules_swift//swift:repositories.bzl",

  "swift_rules_dependencies",

  )

  swift_rules_dependencies()

  load(

  "@build_bazel_apple_support//lib:repositories.bzl",

  "apple_support_dependencies",

  )

  apple_support_dependencies()


  Listing 10-1

  Modifying the WORKSPACE for the iOS rules

  ```


  将你对 *WORKSPACE* 文件的修改保存。


  ### 注意


  在这些改动中，我们仅对 `build_bazel_rules_apple` 显式调用了 `http_archive`；但很明显，我们还通过 `*_dependencies()`
  函数获取了多个额外依赖。你在前面的章节中已经见过这种做法，但这里仍值得特别说明，因为我们将显式使用这些额外包之一中的规则（即 `build_bazel_rules_swift`
  包）。




  ## 在 Bazel 中创建 iOS 客户端


  与你在 Android 示例中编写的内容类似，我们将首先创建一个基础的 iOS 应用程序，然后再实际使用任何 gRPC 代码。在此过程中，我们将探讨一些在 Bazel
  下构建 iOS 应用的细节要点。


  让我们为 iOS 开发创建一个新目录。正如预期的那样，它将位于 client 目录中，与 Android 和命令行客户端并列：


  ```

  chapter_10$ cd client/echo_client/

  chapter_10/client/echo_client$ mkdir ios

  chapter_10/client/echo_client$ cd ios

  chapter_10/client/echo_client/ios$

  ```


  在 `client/echo_client/ios` 目录中，创建 `MainViewController.swift` 文件并添加以下内容。


  ```

  import UIKit

  public class MainViewController : UIViewController {

  private let textInput = UITextField()

  private let sendButton =  UIButton(type: UIButton.ButtonType.system)

  private let receivedText = UILabel()

  override public func viewDidLoad() {

  super.viewDidLoad()

  self.view.backgroundColor = .white

  textInput.placeholder = "Input text here"

  textInput.textColor = .black

  textInput.backgroundColor =.white

  textInput.isEnabled = true

  sendButton.setTitle("Send", for: UIControl.State.normal)

  sendButton.addTarget(self, action: #selector(send), for: .touchUpInside)

  sendButton.isEnabled = true

  receivedText.numberOfLines = 0

  receivedText.text = "Received text will show up here."

  receivedText.backgroundColor = .gray

  receivedText.textColor = .black

  let stackView = UIStackView(arrangedSubviews: [self.textInput, self.sendButton,
  self.receivedText])

  stackView.alignment = .fill

  stackView.axis = .vertical

  stackView.distribution = .fillEqually

  stackView.spacing = 10.0

  stackView.translatesAutoresizingMaskIntoConstraints = false

  self.view.addSubview(stackView)

  }

  override public func viewDidAppear(_ animated: Bool) {

  super.viewDidAppear(animated)

  textInput.text = ""

  receivedText.text = ""

  }

  @objc func send(sender: UIButton!) {

  receivedText.text = textInput.text

  }

  }

  Listing 10-2

  Creating the MainViewController

  ```


  将该文件保存为 `MainViewController.swift`*.* 正如我们在 Android 版本客户端中所做的那样，我们正在创建一个非常简单的本地回显客户端：点击
  *Send* 后，它会将输入文本原样反映到输出中。


  ### 注意


  与 Android 客户端不同，我们是通过代码以编程方式生成 UI，而不是创建等效的 `.storyboard` 文件。尽管 Bazel 的 iOS 规则确实支持使用
  `.storyboard` 文件，但生成这些文件的标准工具是 Xcode 本身（即通过创建一个新项目）。为简化起见，我们选择不使用 `.storyboard`
  文件，因为用于生成 UI 的代码非常直接。


  在 Android 示例中，我们将整个应用都定义在一个文件中；这里我们将再创建一个文件（即 `AppDelegate` 文件），以遵循 iOS 的惯例。


  在 `client/echo_client/ios` 目录中，创建 `AppDelegate.swift` 文件并添加以下内容。


  ```

  import UIKit

  @UIApplicationMain

  class AppDelegate: NSObject, UIApplicationDelegate {

  var window: UIWindow?

  func application(

  _ application: UIApplication, didFinishLaunchingWithOptions

  launchOptions: [UIApplication.LaunchOptionsKey : Any]?) -> Bool {

  window = UIWindow(frame: UIScreen.main.bounds)

  window?.makeKeyAndVisible()

  window?.rootViewController = MainViewController()

  return true

  }

  }

  Listing 10-3

  Creating the basic AppDelegate

  ```


  将该文件保存为 `AppDelegate.swift`*.*


  最后，我们还需要创建一个 `Info.plist` 文件，用于定义 iOS 应用程序的一些基础属性。


  在 `client/echo_client/ios` 目录中，创建 `Info.plist` 文件并添加以下内容。


  ```


  CFBundleDevelopmentRegion

  en

  CFBundleExecutable

  $(EXECUTABLE_NAME)

  CFBundleIdentifier

  $(PRODUCT_BUNDLE_IDENTIFIER)

  CFBundleInfoDictionaryVersion

  6.0

  CFBundleName

  $(PRODUCT_NAME)

  CFBundlePackageType

  APPL

  CFBundleShortVersionString

  1.0

  CFBundleVersion


  LSRequiresIPhoneOS


  UIRequiredDeviceCapabilities


  arm64


  UISupportedInterfaceOrientations


  UIInterfaceOrientationPortrait


  Listing 10-4

  Creating the Info.plist file

  ```


  将该文件保存为 `Info.plist`*.*


  在 `client/echo_client/ios` 目录中，创建一个 `BUILD` 文件，并向其中添加以下内容。


  ```

  load("@build_bazel_rules_apple//apple:ios.bzl", "ios_application")

  load("@build_bazel_rules_swift//swift:swift.bzl", "swift_library")

  swift_library(

  name = "Lib",

  srcs = [

  "AppDelegate.swift",

  "MainViewController.swift",

  ],

  )

  ios_application(

  name = "EchoClient",

  bundle_id = "com.beginning-bazel.echo-client",

  families = ["iphone"],

  infoplists = [":Info.plist"],

  minimum_os_version = "11.0",

  deps = [":Lib"],

  )

  Listing 10-5

  Creating the BUILD file for the iOS project

  ```


  保存 `BUILD` 文件。


  结合前几章所做的工作，`BUILD` 文件中的内容应该不会让你感到陌生；你只是加载了一组新的规则，并用它们创建了一些构建目标。特别是，`swift_library`
  看起来应当与其他语言中的类似用法非常相近。对于 `ios_application`，其中许多属性是新的，但也都应该容易理解。




  ### 为 iOS 构建


  在设置好代码和 BUILD 规则后，我们现在来执行一次构建。先从 `EchoClient` 目标开始：


  ```

  chapter_10/client/echo_client/ios$ bazel build :EchoClient

  INFO: Analyzed target //client/echo_client/ios:EchoClient (19 packages loaded, 405
  targets configured).

  INFO: Found 1 target...

  Target //client/echo_client/ios:EchoClient up-to-date:

  bazel-bin/client/echo_client/ios/EchoClient.ipa

  INFO: Elapsed time: 9.965s, Critical Path: 9.48s

  INFO: 10 processes: 7 darwin-sandbox, 2 local, 1 worker.

  INFO: Build completed successfully, 36 total actions

  ```


  这看起来应该和前几章的内容非常熟悉。


  不过，我们还要对 `Lib` 目标执行一次构建。虽然我们已经作为 `EchoClient` 的依赖成功构建了这个目标，但仍值得讨论一下：要构建一个目标，具备足够上下文信息的重要性。


  ```

  chapter_10/client/echo_client/ios$ bazel build :Lib

  INFO: Analyzed target //client/echo_client/ios:Lib (25 packages loaded, 854 targets
  configured).

  INFO: Found 1 target...

  ERROR: chapter_10/client/echo_client/ios/BUILD:4:1: Compiling Swift module client_echo_client_ios_Lib
  failed (Exit 1)

  client/echo_client/ios/AppDelegate.swift:1:8: error: no such module ''UIKit''

  import UIKit

  ^

  Target //client/echo_client/ios:Lib failed to build

  Use --verbose_failures to see the command lines of failed build steps.

  INFO: Elapsed time: 4.094s, Critical Path: 0.15s

  INFO: 0 processes.

  FAILED: Build did NOT complete successfully

  ```


  尽管我们已经正确设置了构建目标，构建仍然*失败*了，而且错误看起来有些奇怪。毕竟，`UIKit` 是 iOS 应用的核心库；在构建 iOS 应用时它本应始终可用。


  要理解发生了什么，我们需要回顾一点：Swift 作为一种语言，并不只用于 iOS；你可以用 Swift 在很多平台上创建原生应用。我们在 `BUILD` 文件中的初始定义只是使用了
  `swift_library`；仅凭这一点并没有说明该 Swift 库应为哪个平台构建。实际上，默认会为 MacOS 平台（即系统默认平台）构建。


  而对于 `ios_application`，我们是在显式声明该目标应为 iOS 平台进行*交叉编译*，并引入正确编译所需的 SDK。Bazel 有一个叫做*配置（configuration）*的属性，它封装了执行构建时的环境信息。默认情况下，一个构建目标的配置会应用到其依赖项上。这就是为什么你之前能够成功构建
  `EchoClient` 的全部内容：因为 `ios_application` 具有正确配置，并且该配置传递到了依赖项。


  若要仅对 *swift_library* 启用这一点，我们可以在 *build* 命令中添加一些说明，以正确执行构建。


  执行下面的命令，它在命令行中加入了指令 `–-apple_platform_type=ios`：


  ```

  chapter_10/client/echo_client/ios$ bazel build –-apple_platform_type=ios :Lib

  INFO: Build option --apple_platform_type has changed, discarding analysis cache.

  INFO: Analyzed target //client/echo_client/ios:Lib (3 packages loaded, 854 targets
  configured).

  INFO: Found 1 target...

  Target //client/echo_client/ios:Lib up-to-date:

  bazel-bin/client/echo_client/ios/Lib-Swift.h

  bazel-bin/client/echo_client/ios/client_echo_client_ios_Lib.swiftdoc

  bazel-bin/client/echo_client/ios/client_echo_client_ios_Lib.swiftmodule

  bazel-bin/client/echo_client/ios/libLib.a

  INFO: Elapsed time: 4.139s, Critical Path: 3.72s

  INFO: 2 processes: 1 darwin-sandbox, 1 worker.

  INFO: Build completed successfully, 3 total actions

  ```


  在完整指定平台后，构建成功了。


  ### 注意


  你可能还记得上一章中我们不需要显式指定平台。上一章里我们使用的是 `android_binary` 和 `android_library` 规则；和 `ios_application`
  一样，它们足以指定目标的构建平台。


  ### 注意


  同样，细心的读者会注意到第一条 `INFO` 消息：由于构建选项变更，“analysis cache” 已被丢弃。回想一下，Bazel 会做大量工作来确保构建完整性。为了避免错误渗入系统，必须不仅按构建了*什么*来索引构建产物，也要按*如何*构建来索引。使用不同选项（例如平台、debug
  与 opt 等）构建同一目标，基本上等价于对该目标*以及*其所有依赖项做了变更——至少从缓存结果的角度来看是如此。


  ## 在 Xcode 模拟器中运行 iOS 客户端


  和 Android 部分一样，我们将把初始构建结果运行在 iOS 模拟器上，以验证其可用性。


  首先我们要创建一个 iPhone 模拟器实例。打开 Xcode，然后依次进入 *Xcode* ➤ *Open Developer Tool* ➤ *Simulator*。


