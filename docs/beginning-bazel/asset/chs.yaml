  \ 和 rules_proto_toolchains()）。\n```\n\n## 创建你的第一个 Protocol Buffer\n\n完成设置后，我们就可以开始创建一些\
  \ Protocol Buffers 了。先为代码创建目录，并为 Protocol Buffer 定义创建初始文件：\n\n```\nchapter_06$ mkdir\
  \ src\nchapter_06$ cd src\nchapter_06/src$ touch transmission_object.proto\n```\n\
  \n### 注意\n\n细心的读者会注意到，在上一章中，我们是在编写代码前先创建 `BUILD` 文件。这次顺序的变化是有意为之，我们很快会解释原因。\n\n\
  让我们创建一个用于传输的基础消息。打开你的 `transmission_object.proto` 文件并添加以下内容。\n\n```\nsyntax = \"\
  proto3\";\npackage transmission_object;\nmessage TransmissionObject {\nfloat value\
  \ = 1;\nstring message = 2;\n}\nListing 6-2\nDefining a simple Protocol Buffer\n\
  ```\n\n将其保存到 `transmission_object.proto`*。*\n\n我们简要看一下刚才写了什么。第一行（`syntax`）用于告诉编译器此处使用的是哪个\
  \ Protocol Buffers 版本（在撰写本书时，最新版本是第 3 版）。\n\n下一行（`package`）用于定义该 Protocol Buffer\
  \ 所在的概念包。这与 Java 或 Go 的包概念非常相似。\n\n最后是消息本身的定义。它最接近 C 风格的结构体：为对象命名（`TransmissionObject`），并给出一组带类型的字段（即\
  \ `value` 和 `message`，类型分别为 `float` 和 `string`）。这里唯一的小扩展是字段编号的加入；它用于为消息中的每个成员定义唯一标识符。这一点很重要，因为它使你可以在保持向后兼容的同时新增或移除数据成员。\n\
  \n现在我们为该 Protocol Buffer 创建构建目标。将以下内容添加到你的 `BUILD` 文件中。\n\n```\nload(\"@rules_proto//proto:defs.bzl\"\
  , \"proto_library\")\nproto_library(\nname = \"transmission_object_proto\",\nsrcs\
  \ = [\"transmission_object.proto\"],\n)\nListing 6-3\nCreating the build target\
  \ for the Protocol Buffer\n```\n\n保存你的 `BUILD` 文件。\n\n### 注意\n\n已经熟悉 Bazel 的读者可能会觉得显式引入\
  \ `proto_library` 有些奇怪。`proto_library` 规则过去是 Bazel 核心的一部分。这体现了 Bazel 的演进方式：将特定构件从核心中迁出，放入显式包中。\n\
  \n到这一步，从技术上讲，我们已经具备了开始构建 Protocol Buffer 的条件，现在来执行：\n\n```\nchapter_06/src$ bazel\
  \ build :transmission_object_proto\nINFO: Analysed target //src:transmission_object_proto\
  \ (16 packages loaded, 624 targets configured).\nINFO: Found 1 target...\nTarget\
  \ //src:transmission_object_proto up-to-date:\nbazel-genfiles/src/transmission_object_proto-descriptor-set.proto.bin\n\
  INFO: Elapsed time: 80.442s, Critical Path: 24.91s\nINFO: 184 processes: 184 darwin-sandbox.\n\
  INFO: Build completed successfully, 187 total actions\n```\n\n你首先会注意到的一点是，至少在第一次构建\
  \ Protocol Buffer 目标时，相比前几章的执行会出现明显延迟。因为此时不仅需要拉取 Protocol Buffer 编译器的依赖，*还*需要为你的目标机器编译它。只有\
  \ protobuf 编译器自身编译完成后，它才能编译你的 protobuf 定义。\n\n不用担心。这种变慢通常只会发生在你第一次实际运行 Protocol\
  \ Buffer 编译器时；一旦生成完成，Protocol Buffer 编译器会保持在缓存中（除非你更改依赖或执行 `bazel clean`）。\n\n##\
  \ 在 Java 中使用 Protocol Buffer\n\n尽管我们已经成功编译了 Protocol Buffer，但目前我们真正得到的只是它的语言无关描述符；若要真正使用它，还需要为其创建语言特定目标。我们先从\
  \ Java 开始。再次利用这样一个事实：Java 作为 Bazel 的内置语言之一，自带对 Java 版 Protocol Buffers 的支持。\n\n\n\
  \n### 创建 Java Proto 库目标\n\n打开你的 `BUILD` 文件并添加以下内容。\n\n```\njava_proto_library(\n\
  name = \"transmission_object_java_proto\",\ndeps = [\":transmission_object_proto\"\
  ],\n)\nListing 6-4\nCreating the Java Protocol Buffer library\n```\n\n保存 `BUILD`\
  \ 文件。让我们构建新创建的目标：\n\n```\nchapter_06/src$ bazel build :transmission_object_java_proto\n\
  INFO: Analysed target //src:transmission_object_java_proto (2 packages loaded, 350\
  \ targets configured).\nINFO: Found 1 target...\nTarget //src:transmission_object_java_proto\
  \ up-to-date:\nbazel-bin/src/libtransmission_object_proto-speed.jar\nbazel-genfiles/src/transmission_object_proto-speed-src.jar\n\
  INFO: Elapsed time: 0.703s, Critical Path: 0.45s\nINFO: 2 processes: 1 darwin-sandbox,\
  \ 1 worker.\nINFO: Build completed successfully, 3 total actions\n```\n\n恭喜！你现在有了一个我们实际上可以在\
  \ Java 程序中使用的目标。\n\n### 注意\n\n在这个案例中，你不需要显式加载 `java_proto_library`。不过，考虑到 Bazel\
  \ 的演进，请记住未来某些版本可能会要求你显式加载该规则。\n\n### 使用你的 Java Protocol Buffer 目标\n\n在上一章中，你使用 JSON\
  \ 创建了一个简单的 Java echo 客户端。在这里，我们将复用几乎相同的代码来实现 Protocol Buffer 示例，只做少量改动。\n\n在你的 `src`\
  \ 目录下创建 `EchoClient.java`，并添加以下内容（相较上一章的改动已加粗）。\n\n```\nimport java.io.BufferedReader;\n\
  import java.io.InputStreamReader;\nimport java.io.PrintWriter;\nimport java.net.Socket;\n\
  import transmission_object.TransmissionObjectOuterClass.TransmissionObject;\npublic\
  \ class EchoClient {\npublic static void main (String args[]) {\nSystem.out.println(\"\
  Spinning up the Echo Client in Java...\");\ntry {\nfinal Socket socketToServer =\
  \ new Socket(\"localhost\", 1234);\n// Note we don't need the second BufferedReader\
  \ here.\nfinal BufferedReader commandLineInput = new BufferedReader(new InputStreamReader(System.in));\n\
  System.out.println(\"Waiting on input from the user...\");\nfinal String inputFromUser\
  \ = commandLineInput.readLine();\nif (inputFromUser != null) {\nSystem.out.println(\"\
  Received by Java: \" + inputFromUser);\nTransmissionObject transmissionObject =\
  \ TransmissionObject.                  newBuilder()\n.setMessage(inputFromUser)\n\
  .setValue(3.145f)\n.build();\ntransmissionObject.writeTo(socketToServer.getOutputStream());\n\
  TransmissionObject receivedObject = TransmissionObject.parseFrom(socketToServer.getInputStream());\n\
  System.out.println(\"Received Message from server: \");\nSystem.out.println(receivedObject);\n\
  }\nsocketToServer.close();\n} catch (Exception e) {\nSystem.err.println(\"Error:\
  \ \" + e);\n}\n}\n}\nListing 6-5\nProtocol Buffer version of the echo client\n```\n\
  \n将其保存为 `EchoClient.java`。\n\n让我们花点时间分析一下前面的代码。用于引入我们生成的 Protocol Buffer 的 import\
  \ 语句由三个主要部分组成：\n\n*   `transmission_object`\n    *   这是在原始 `transmission_object.proto`\
  \ 文件中指定的包。\n\n*   `TransmissionObjectOuterClass`\n    *   这是一个生成的类，用于封装 Protocol\
  \ Buffer 定义中包含的所有消息。\n\n    *   这是 Java 每个文件只能有一个（外部）类这一规则的产物；从技术上讲，我们本可以在 Protocol\
  \ Buffer 文件中定义多个消息，但在一个 Java 文件中只能有一个类。\n\n    *   这使我们能够在 Java 中创建并使用多个 Protocol\
  \ Buffer 消息。\n\n*   `TransmissionObject`\n    *   这是表示原始 Protocol Buffer 消息的实际 Java\
  \ 对象。\n\n在代码本身中，Java Protocol Buffer 实例通过构建器模式（builder pattern）创建，这使你可以设置各个字段，然后生成一个不可变的\
  \ `TransmissionObject` 实例。该对象随后可以直接将自身写入输出流，也可以从输入流中解析自身。\n\n最后，让我们创建构建目标，以便真正构建\
  \ `EchoClient` 的新版本。打开你的 `BUILD` 文件并添加以下内容（同样，相较上一章的改动已加粗）。\n\n```\njava_binary(\n\
  name = \"echo_client\",\nsrcs = [\"EchoClient.java\"],\nmain_class = \"EchoClient\"\
  ,\ndeps = [\":transmission_object_java_proto\"],\n)\nListing 6-6\nCreating the BUILD\
  \ target for the EchoClient\n```\n\n现在我们可以构建该目标：\n\n```\nchapter_06/src$ bazel build\
  \ :echo_client\nINFO: Analysed target //src:echo_client (0 packages loaded, 0 targets\
  \ configured).\nINFO: Found 1 target...\nTarget //src:echo_client up-to-date:\n\
  bazel-bin/src/echo_client.jar\nbazel-bin/src/echo_client\nINFO: Elapsed time: 0.219s,\
  \ Critical Path: 0.06s\nINFO: 1 process: 1 worker.\nINFO: Build completed successfully,\
  \ 2 total actions\n```\n\n恭喜！你已经成功将客户端更新为使用 Protocol Buffers。不过，你再次得到了一个无可连接对象的客户端。接下来，我们将对服务端进行必要修改，使其也能处理我们的\
  \ Protocol Buffer 定义。\n\n### 注意\n\n有人可能会想用上一章的服务端来运行这个新版本客户端。你当然可以尝试，但需要明确的是这样**无法**工作，因为客户端和服务端使用的是不同协议（JSON\
  \ vs. Protocol Buffer）；这些字节会被以不同方式解释。\n\n尽管 Protocol Buffers *确实* 支持与 JSON 的相互转换，但你需要在代码中显式指定这一点。\n\
  \n## 在 Go 中使用 Protocol Buffer\n\n在上一节中，我们能够利用 Java 是 Bazel 内置语言之一这一事实，直接开始开发。然而，由于\
  \ Go *不是* 这些核心语言之一，我们需要做一些额外配置。幸运的是，其中大部分内容你在前几章已经见过。\n\n打开你的 `WORKSPACE` 文件，并在获取\
  \ `rules_proto` 的配置之前，添加下面加粗的内容。\n\n```\nhttp_archive(\nname = \"io_bazel_rules_go\"\
  ,\nurls = [\"https://github.com/bazelbuild/rules_go/releases/download/v0.19.5/rules_go-v0.19.5.tar.gz\"\
  ],\n)\nload(\"@io_bazel_rules_go//go:deps.bzl\", \"go_rules_dependencies\", \"go_register_toolchains\"\
  )\ngo_rules_dependencies()\ngo_register_toolchains()\nhttp_archive(\nname = \"rules_proto\"\
  ,\nstrip_prefix = \"rules_proto-97d8af4dc474595af3900dd85cb3a29ad28cc313\",\nurls\
  \ = [\"https://github.com/bazelbuild/rules_proto/archive/97d8af4dc474595af3900dd85cb3a29ad28cc313.tar.gz\"\
  ,],\n)\nload(\"@rules_proto//proto:repositories.bzl\", \"rules_proto_dependencies\"\
  , \"rules_proto_toolchains\")\nrules_proto_dependencies()\nrules_proto_toolchains()\n\
  Listing 6-7\nAdding the Go rules to the project\n```\n\n保存你的 *WORKSPACE* 文件.j\n\n\
  ### 注意\n\n在这个特定场景中，我们指定先加载 `io_bazel_rules_go`，再加载 `rules_proto`。原因是这两个包的底层依赖之间可能会产生冲突。按这种顺序排列可以消除该问题。不过，在你后续构建\
  \ `WORKSPACE` 依赖时，这仍是一个需要特别留意的点。\n\n\n\n### 创建 Go Proto 库目标\n\n和将 Go 功能纳入我们的项目时一样，在创建\
  \ Go proto 库目标时，我们需要将必要的规则显式引入到 `BUILD` 文件中。\n\n打开你的 `BUILD` 文件并添加以下内容。\n\n```\n\
  load(\"@io_bazel_rules_go//proto:def.bzl\", \"go_proto_library\")\ngo_proto_library(\n\
  name = \"transmission_object_go_proto\",\nproto = \":transmission_object_proto\"\
  ,\nimportpath = \"transmission_object\"\n)\nListing 6-8\nCreating the Go proto library\
  \ target\n```\n\n保存你的 `BUILD` 文件。让我们构建你的新目标：\n\n```\nchapter_06/src$ bazel build\
  \ :transmission_object_go_proto\nINFO: Analysed target //src:transmission_object_go_proto\
  \ (21 packages loaded, 6358 targets configured).\nINFO: Found 1 target...\n...\n\
  Target //src:transmission_object_go_proto up-to-date:\nbazel-bin/src/darwin_amd64_stripped/transmission_object_go_proto%/transmission_object.a\n\
  INFO: Elapsed time: 5.486s, Critical Path: 3.75s\nINFO: 52 processes: 52 darwin-sandbox.\n\
  INFO: Build completed successfully, 54 total actions\n```\n\n和你之前创建 Java Protocol\
  \ Buffer 目标的经验一样，你可能会注意到构建时间比平时稍长一些。再次说明，这是正常现象，因为特定语言（即 Go）的插件正在被编译；和之前一样，首次编译后会被缓存，后续构建会快得多。\n\
  \n再次祝贺你，因为我们现在有了一个可以在 Go 程序中实际使用的目标。接下来让我们修改 echo 服务器来利用它。\n\n### 使用你的 Go Protocol\
  \ Buffer 目标\n\n和 echo 客户端类似，在上一章中，你已经创建了一个 echo 服务器版本，它会将接收到的 JSON 消息回传（并做一些修改）。和之前一样，我们只需对原始程序做一些小改动，就可以处理\
  \ Protocol Buffers。\n\n在 `src` 中创建文件 `echo_server.go`，并向其中添加以下内容（和之前一样，与上一章相比的更改已加粗）。\n\
  \n```\npackage main\nimport (\n\"fmt\"\n\"log\"\n\"net\"\n\"transmission_object”\n\
  \"github.com/golang/protobuf/proto\"\n)\nfunc main() {\nlog.Println(\"Spinning up\
  \ the Echo Server in Go...\")\nlisten, error := net.Listen(\"tcp\", \":1234\")\n\
  if error != nil {\nlog.Panicln(\"Unable to listen: \" + error.Error())\n}\ndefer\
  \ listen.Close()\nconnection, error := listen.Accept()\nif error != nil {\nlog.Panicln(\"\
  Cannot accept a connection! Error: \" + error.Error())\n}\nlog.Println(\"Receiving\
  \ on a new connection\")\ndefer connection.Close()\ndefer log.Println(\"Connection\
  \ now closed.\")\nbuffer := make([]byte, 2048)\nsize, error := connection.Read(buffer)\n\
  if error != nil {\nlog.Panicln(\n\"Unable to read from the buffer! Error: \" + error.Error())\n\
  }\ndata := buffer[:size]\ntransmissionObject := &transmission_object.TransmissionObject{}\n\
  error = proto.Unmarshal(data, transmissionObject)\nif error != nil {\nlog.Panicln(\n\
  \"Unable to unmarshal the buffer! Error: \" + error.Error())\n}\nlog.Println(\"\
  Message = \" + transmissionObject.GetMessage())\nlog.Println(\"Value = \" +\nfmt.Sprintf(\"\
  %f\", transmissionObject.GetValue()))\ntransmissionObject.Message = \"Echoed from\
  \ Go: \" +\ntransmissionObject.GetMessage()\ntransmissionObject.Value = 2 ∗ transmissionObject.GetValue()\n\
  message, error := proto.Marshal(transmissionObject)\nif error != nil {\nlog.Panicln(\"\
  Unable to marshal the object! Error: \" + error.Error())\n}\nconnection.Write(message)\n\
  }\nListing 6-9\nProtocol Buffer version of the Go server\n```\n\n将其保存为 `echo_server.go`。\n\
  \n虽然这些改动并不是对 JSON 的完全直接替换，但最终结果与我们上一章中的实现非常接近。\n\n特别需要注意的是，我们必须引入 proto 库本身的依赖（[`github.com/golang/protobuf/proto`](http://github.com/golang/protobuf/proto)），以便对对象在数据流之间进行反序列化/序列化。不同于之前在\
  \ Go 中对 encoding 包的依赖，我们需要在 `BUILD` 文件中指定依赖时将其考虑进去。\n\n打开 `BUILD` 文件并添加以下内容，以创建所需的构建目标（与上一章相比的差异已加粗）。\n\
  \n```\nload(\"@io_bazel_rules_go//go:def.bzl\", \"go_binary\")\ngo_binary(\nname\
  \ = \"echo_server\",\nsrcs = [\"echo_server.go\"],\ndeps = [\n\":transmission_object_go_proto\"\
  ,\n\"@com_github_golang_protobuf//proto:go_default_library\",\n],\n)\nListing 6-10\n\
  Adding the echo server build target\n```\n\n保存你的 `BUILD` 文件。\n\n### 依赖的依赖\n\n细心的读者会注意到，我们为\
  \ go_default_library 指定的依赖实际上并没有在 WORKSPACE 文件中直接声明；然而，上述代码依然可以顺利编译。\n\n这个额外依赖的来源，是我们在为\
  \ Go 规则设置额外依赖时调用的函数（即 go_rules_dependencies），它会拉取其他依赖，其中就包括上面列出的这个。\n\n尽管从技术上讲这在\
  \ WORKSPACE 文件中是“显式”指定的，但由于使用了依赖函数，这一点被隐藏了。在这种情况下，我们利用了这样一个事实：这些特定依赖的版本本来就是为了协同工作而设计的。\n\
  \n如果你觉得这种方式过于隐式，那么可以做两件事：（1）在 WORKSPACE 文件中显式指定一个依赖；这会替换隐式依赖的版本。（2）将该依赖拉入你的项目中（例如通过\
  \ third_party 目录）。\n\n选择哪条路径取决于你希望对依赖控制得多严格。（1）可能更容易快速上手，也更便于后续更换依赖。然而，（2）能够为构建可复现性提供最强保证。\n\
  \n现在我们可以构建支持 Protocol Buffer 的 echo 服务器了：\n\n```\nchapter_06/src$ bazel build :echo_server\n\
  INFO: Analysed target //src:echo_server (0 packages loaded, 0 targets configured).\n\
  INFO: Found 1 target...\nTarget //src:echo_server up-to-date:\nbazel-bin/src/darwin_amd64_stripped/echo_server\n\
  INFO: Elapsed time: 0.169s, Critical Path: 0.00s\nINFO: 0 processes.\nINFO: Build\
  \ completed successfully, 1 total action\n```\n\n\n\n## 使用 Protocol Buffers 实现 Echo\n\
  \n我们已经用 Protocol Buffers 重构了 echo 客户端和服务器，现在可以让它们再次相互通信了。\n\n打开一个终端并启动服务器：\n\n```\n\
  chapter_06/src$ bazel run :echo_server\nINFO: Analysed target //src:echo_server\
  \ (0 packages loaded, 0 targets configured).\nINFO: Found 1 target...\nTarget //src:echo_server\
  \ up-to-date:\nbazel-bin/src/darwin_amd64_stripped/echo_server\nINFO: Elapsed time:\
  \ 0.169s, Critical Path: 0.00s\nINFO: 0 processes.\nINFO: Build completed successfully,\
  \ 1 total action\nINFO: Build completed successfully, 1 total action\n2019/06/18\
  \ 23:39:53 Spinning up the Echo Server in Go...\n```\n\n现在打开另一个终端并启动客户端：\n\n```\n\
  chapter_06/src$ bazel run :echo_client\nINFO: Analysed target //src:echo_client\
  \ (0 packages loaded, 0 targets configured).\nINFO: Found 1 target...\nTarget //src:echo_client\
  \ up-to-date:\nbazel-bin/src/echo_client.jar\nbazel-bin/src/echo_client\nINFO: Elapsed\
  \ time: 0.249s, Critical Path: 0.10s\nINFO: 1 process: 1 worker.\nINFO: Build completed\
  \ successfully, 2 total actions\nINFO: Build completed successfully, 2 total actions\n\
  Spinning up the Echo Client in Java...\nWaiting on input from the user...\n```\n\
  \n现在，给它输入一小段文本：\n\n```\nchapter_06/src$ bazel run :echo_client\n\nSpinning up the\
  \ Echo Client in Java...\nWaiting on input from the user...\nWaiting on input from\
  \ the user...\nMy Client Message\nReceived by Java: My Client Message\nReceived\
  \ Message from server:\nvalue: 6.29\nmessage: \"Echoed from Go: My Client Message\"\
  \n```\n\n现在我们来看一下 echo 服务器端的控制台输出：\n\n```\nchapter_06/src$ bazel run :echo_server\n\
  \n2019/06/18 23:41:50 Receiving on a new connection\n2019/06/18 23:43:34 Message\
  \ = My Client Message\n2019/06/18 23:43:34 Value = 3.145000\n2019/06/18 23:43:34\
  \ Connection now closed.\n```\n\n恭喜！你已经使用 Protocol Buffers 重新创建了 echo 客户端/服务器。\n\
  \n## 依赖追踪与管理\n\n与上一章相比，这里在格式上有一些细微差异，但输出结果实际上是相同的。这就引出了一个显而易见的问题：为什么我们要把上一章的内容全部重做一遍？答案在于我们如何管理所选传输对象的变更；而这反过来也展示了\
  \ Bazel 执行依赖管理的能力，甚至可以跨多种语言。\n\n在上一章中，echo 客户端和服务器的依赖树如下：\n\n![../images/481224_1_En_6_Chapter/481224_1_En_6_Fig1_HTML.png](img/481224_1_En_6_Fig1_HTML.png)\n\
  \n图 6-1\n\nJSON echo 客户端和服务器的依赖树\n\n如前所述，一个主要缺陷是 JSON 对象的定义是各语言各自独立的，彼此没有关联。API\
  \ 的任何变更（即修改 JSON 对象）都需要在两个位置同时进行，这就很容易出现只改了一个地方而另一个没改的错误。\n\n对比一下我们为 Protocol Buffer\
  \ echo 客户端和服务器创建的依赖树：\n\n![../images/481224_1_En_6_Chapter/481224_1_En_6_Fig2_HTML.png](img/481224_1_En_6_Fig2_HTML.png)\n\
  \n图 6-2\n\nProtocol Buffer echo 客户端和服务器的依赖树\n\n现在，Protocol Buffer echo 客户端和服务器的依赖树仍然相对简单，对于任何从事大规模开发的人来说都很熟悉。不过，它的显著之处在于以下几点：(a)\
  \ 我们把三种语言（即 Java、Go、Protocol Buffer）之间的依赖连接在了一起；(b) 通过这样做，我们解决了 JSON 客户端中的 API 变更管理问题；以及\
