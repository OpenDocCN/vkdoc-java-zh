- '# 1. 引言


  欢迎来到 Bazel 的世界！


  如果你还没听说过，Bazel 是 Google（Alphabet）所使用构建系统的开源版本。为了让你感受其规模，Bazel 被设计用于解决 Google 构建中的一些核心问题：需要在多种语言之间高效且正确地构建真正意义上的*数百万*行代码，并面向多个平台（例如服务器、移动端、桌面端）以及不同的硬件架构。


  尽管该构建系统最初仅在 Google 内部使用，但它在几年前已开源。自那以后，它持续演进，成为一个面向生产级需求的高性能、强大且简洁的构建系统。


  ## 本书是什么


  *Beginning Bazel* 旨在作为一本温和且实用的 Bazel 构建系统入门书。随着阅读推进，你将通过一系列有针对性的示例学习 Bazel 的基础知识。


  这些示例旨在教授 Bazel 的核心概念与构造，包括如何设置一些基础构建目标、构建并完善工作区以引入新的语言规则，以及如何在同一项目中跨多种语言轻松构建命令行应用和移动应用。


  在本书过程中，你将用多种语言构建示例，将它们以连贯方式整合，并生成可在服务器和移动端运行的二进制文件（示例同时涵盖 Android 与 iOS）。


  ## 本书不是什么


  *Beginning Bazel* 并不是一本全面的参考手册。虽然你会学习 Bazel 的一些核心命令，但 Bazel 还有*很多*选项和路径并未在本书中覆盖（也许未来的续作会探索其中一些领域）。幸运的是，Bazel
  的文档非常出色：[`https://docs.bazel.build`](https://docs.bazel.build)。这里包含了 Bazel 最新、最前沿发展的信息。


  另外，虽然 Bazel 能够构建大多数语言，本书只涵盖了其中很小的一部分。好在你将在本书中学习到的模式适用于你很可能在 Bazel 中遇到并使用的大多数语言。


  新的语言规则不断涌现，因此值得查看其主要 GitHub 组织：[`https://github.com/bazelbuild`](https://github.com/bazelbuild)。此外，Awesome
  Bazel（[`www.awesomebazel.com`](http://www.awesomebazel.com)）是一个很棒的网站，精选整理了 Bazel
  规则，非常值得一看，以发现该语言的一些有趣新可能性。


  ## Bazel 的特性


  Bazel 的一个主要目标是确保你的构建具有 hermetic（封闭可复现）特性，也就是说，构建依赖（包括依赖库和构建工具）是明确已知的，并且独立于任何特定机器上“可能安装也可能未安装”的环境。理想情况下，任何构建都可以仅使用给定项目工作区内的工具来复现。


  为此，Bazel 特别注重确保你显式指定所有依赖，并避免在构建过程中依赖任何“魔法”。有些人可能会反对，认为这减少了一定的便利性。然而实际上，这种显式规范让 Bazel
  和用户都能更智能地推理构建过程，并提供工具在问题出现时帮助诊断和修复。


  Bazel 具备许多使其成为有吸引力构建系统的特性：


  *   高层级、可扩展的构建语言


  *   显式依赖管理


  *   高级可见性规则


  *   显式工作区管理


  *   远程构建执行与缓存


  *   构建依赖分析


  *   快速、正确的构建


  ### 高层级构建语言


  Bazel 提供了一组非常简单但强大的构造。包括（但不限于）：


  *   命令（例如 *build* 和 *test*）


  *   规则（例如用于处理不同语言）


  *   包（用于将一组规则和依赖归集在一起）


  *   工作区（用于定义项目的工作文件、输出和依赖）


  此外，Starlark（原名 Skylark）是 Bazel 的构建语言（受 Python 启发）。Starlark 还可以进一步扩展 Bazel，以创建新的语言规则、辅助开发的宏等。


  ### 显式依赖管理


  如前所述，Bazel 要求显式声明依赖。在 Bazel 中不存在所谓的“免费午餐”，因为它偏好显式而非任何隐式“魔法”（例如 C++ 中头文件的位置）。创建构建目标（例如一个库）时，你必须指定每个文件（或某种汇总所有文件的指令）；如果你没有指定它，Bazel
  就看不到它。


  此外，当你依赖其他目标（例如另一个库）时，该依赖也必须显式定义；否则构建很可能失败。极限情况下，从一个目标到另一个目标的这种显式依赖声明会形成一张有向依赖图。


  最后，Bazel 中的有向依赖图始终且必须是*有向无环图*。也就是说，Bazel 依赖图中不允许存在环。在尝试创建连贯构建时，这一点非常重要，因为构建树中的环意味着需要某种启发式方法来打破环（或者让环打断构建）。如果你尝试在依赖图中创建环并据此构建，Bazel
  会立即中断构建并向你报告该错误。




  ### 高级可见性特性


  Bazel 最优秀的特性之一是能够限制你的包和目标的可见性。也就是说，你可以有效地缩小哪些包实际上可以依赖你的构建目标的范围。虽然在 Java（即包可见性）和
  C++（即命名空间）等语言中也有类似特性，但 Bazel 提供了将依赖可见性约束到任意语言的能力。


  ### 显式工作区管理


  与依赖图管理类似，Bazel 还让你能够完整地指定你的工作区对任何其他依赖（包括外部仓库）的依赖关系。这使你能够从其他来源引入代码、文件等内容，通常是通过外部依赖的特定版本来完成。这有助于在保持灵活性的同时提供正确性保障。


  ### 远程构建执行与缓存


  尽管 Bazel 默认在本地执行，但 Bazel 也允许你搭建带有智能缓存的分布式构建系统。这项能力对于加速单次构建非常有用，同时也有助于提升整个团队的开发速度。


  ### 构建依赖分析


  另一个强大的特性是能够分析某个构建目标的依赖。对于任何曾尝试剖析构建产物并问过“*那东西*怎么会在里面？”的人来说，Bazel 理解构建目标依赖图的能力会是一个非常受欢迎的工具。这对于简化依赖、优化等工作极其有用。


  ### 快速且正确的构建（以及测试）


  虽然其他特性各自都很出色，但它们组合在一起，帮助 Bazel 提供了最重要的特性：高效且可靠的构建（以及因此而来的测试）。归根结底，构建系统的目的就是以快速且正确的方式将代码和数据转换为可运行的应用程序。


  Bazel 利用其众多特性，形成了一种连贯且优化的产品构建方法。此外，它还具备智能缓存系统，以确保重复构建（因为开发工作大多都与重复构建有关）快速且正确，并且几乎不需要清理操作。


  说到底，Bazel 最好的特性是它运行快速、简单且正确。你可以搭建一个简单的 Bazel 项目，执行它，然后随着时间推移轻松扩展它。


  ## 本书适合谁（以及可能不适合谁）


  *Beginning Bazel* 旨在向所有人介绍 Bazel。不过，你能从 Bazel 中获得多大效用，在很大程度上取决于你要解决的问题类型。


  正如本章开头所指出的，Bazel 最初是为了解决在多语言、多平台和多架构场景下，高效且正确地构建超大规模代码库的问题。不过，Bazel 也有很好的扩展性，从最简单的应用到完整栈的微服务与移动应用组合都能胜任。


  确实，在以下情况下，Bazel 可能最有用，如果你……


  *   ……从零开始，并希望构建系统能够随着你的需求扩展


  *   ……希望以连贯方式构建并依赖多种语言


  *   ……希望开箱即用地支持测试定义与运行


  *   ……希望轻松面向多种架构构建


  *   ……希望对构建产物进行智能缓存


  *   ……希望每次构建都得到确定性输出


  *   ……希望使用生产级构建系统


  *   ……愿意在 Bazel 的边界内运作


  最后这一点看起来可能有点奇怪；不过，Bazel 是一个有明确主张的构建系统。为了确保速度与正确性的保证，它会主动阻止你做一些适得其反的事情（例如循环构建依赖）。此外，当
  Bazel 作为主要构建系统时表现最佳。虽然它*可以*与其他构建系统协同工作（尽管这超出了本书范围），但如果你在项目中尽可能全面地使用 Bazel，就能最大化其能力与价值。


  为此，值得指出的是，Bazel 可能并不适合所有人。特别是在以下情形下，你*可能*不会从 Bazel 中获得太多价值：


  *   你只处理单一语言（例如 Java、Kotlin）且用于特定目的（例如服务端编程、Android）。这种情况下，你可能会发现现有工具（例如 Gradle）已经足够满足需求。


  *   你只有一个小型项目，只关注单一架构，并且对额外库的需求有限（例如 iOS 开发）。同样地，你可能会发现现有工具（例如 Xcode project）已经足够。


  *   你已经对现有构建系统感到满意。


  关于最后一点，你可能已经拥有一个非常好的构建系统，在这种情况下，Bazel 可能只是一个值得了解的新奇事物。


  另外，你也可能已经是 Bazel 专家；在这种情况下，这本书可能无法为你提供太多价值（那你也许可以把它送给朋友，分享你对 Bazel 的热爱）。


  不过，对于其他所有人来说，你可能刚刚找到了最适合自己需求的构建系统。


  '
- '# 2. 设置与安装


  在我们开始构建之前，需要安装 Bazel 以及其他所需工具和框架（例如编译器）。在本章中，我们将演示在多种操作系统上的必要步骤。


  ### 注意


  在本书中，我们将使用 Bazel 1.0.0 版本。Bazel 发展非常迅速，新的能力和配置不断出现。在这一演进过程中，依赖关系可能发生变化，从而需要对构建代码进行调整。为了保证这里示例的一致性，建议你统一使用
  1.0.0 版本。等你熟悉 Bazel 后，可以升级到更新版本，并按需调整示例。


  我们将介绍以下操作系统的安装说明：Windows、MacOS 和 Ubuntu Linux。更多安装说明可在 [`https://docs.bazel.build/versions/master/install.html`](https://docs.bazel.build/versions/master/install.html)
  找到。


  由于我们聚焦于 Bazel 1.0.0 版本，可以在 [`https://github.com/bazelbuild/bazel/releases/`](https://github.com/bazelbuild/bazel/releases/)
  找到我们所有平台所需的安装二进制文件。


  对于所有操作系统，我们都需要一些基础工具来引导安装 Bazel。这些包括用于构建和运行 Python、Java 和 C++ 的工具与框架。虽然在本书中我们*不会*显式构建任何
  C++ 项目，但我们会依赖一些确实会构建 C++ 的项目（例如 Protocol Buffers）。


  ### 注意


  就 Bazel 而言，Java、Python 和 C++ 是“特殊”的，因为它们基本构成了 Bazel 开箱即用的*内置*语言。也就是说，使用这些语言构建库和二进制文件的规则本身就是
  Bazel 的一部分。


  在本书过程中我们还会构建的其他语言包括 Go 和 Swift；不过，我们不需要显式下载它们的工具。相反，我们将看到，通过依赖外部项目并注册合适的工具链，我们可以“免费”获得构建这些语言所需的组件。后续章节会进一步介绍这部分内容。


  ## MacOS




  ### 安装 Xcode


  在 MacOS 上安装时，我们首先需要安装 Xcode 来执行基础构建操作。获取 Xcode 最简单的方式是在 MacOS 上打开 App Store 应用并下载该应用。


  ![../images/481224_1_En_2_Chapter/481224_1_En_2_Fig1_HTML.jpg](img/481224_1_En_2_Fig1_HTML.jpg)


  图 2-1


  从 App Store 获取 Xcode


  下载完应用后，你需要打开该应用并接受许可协议。


  另外，你也可以通过命令行接受许可协议。为此，请打开终端窗口并执行以下命令：


  ```

  ~$ sudo xcodebuild -license accept

  ```


  ### 安装 Bazel


  在你完成 Xcode 设置后，就可以在你的机器上安装 Bazel 了。请下载 1.0.0 版本的 Bazel 二进制安装程序。可在[`https://github.com/bazelbuild/bazel/releases/download/1.0.0/bazel-1.0.0-installer-darwin-x86_64.sh`](https://github.com/bazelbuild/bazel/releases/download/1.0.0/bazel-1.0.0-installer-darwin-x86_64.sh)找到。


  下载完成后，进入你下载该安装脚本的目录（例如 Downloads）。作为预防措施，你可能需要先通过更改文件权限来确保安装脚本可执行。完成后，即可运行安装。


  ```

  ~$ cd Downloads

  ~/Downloads$ chmod +x bazel-1.0.0-installer-darwin-x86_64.sh

  ~/Downloads$ ./bazel-1.0.0-installer-darwin-x86_64.sh –user

  ```


  *–-user* 标志会将 Bazel 安装到 ~/bin（即你用户的 *bin* 目录）。为了确保你可以运行 Bazel，请确认 ~/bin 在你的默认路径中。将以下内容添加到你的
  ~/.zshrc（如果你使用的是早于 Catalina 的 MacOs 版本，则为 .bashrc）文件中。


  ```

  export PATH="$PATH:$HOME/bin"

  ```


  添加后，执行 source 你的 ~/.zshrc（或 ~/.bashrc）文件，以确保新路径被加载。


  ```

  ~$ source ~/.zshrc

  ```


  现在你已经可以在 MacOS 上运行 Bazel 了。你可以在命令行中使用 *version* 指令轻松验证，这会输出你正在使用的 Bazel 版本。


  ```

  ~$ bazel --version

  bazel 1.0.0

  ```


  ### 安装 Java


  运行本书示例至少需要 Java 8。对于 MacOS 10.7 及以上版本，Java 不再默认安装；因此我们需要显式下载并安装它。


  访问[`https://java.com/en/download/mac_download.jsp`](https://java.com/en/download/mac_download.jsp)下载
  Java。将文件下载到电脑后，按照说明在你的电脑上安装 Java。


  完成后，打开终端并运行以下命令，验证你是否已在电脑上成功安装 Java：


  ```

  ~$ java -version

  java version "1.8.0_181"

  Java(TM) SE Runtime Environment (build 1.8.0_181-b13)

  Java HotSpot(TM) 64-Bit Server VM (build 25.181-b13, mixed mode)java

  ```


  ### 验证你的 Python 版本


  默认情况下，MacOS 机器会自带 Python。为了运行本书中的示例，你至少需要 Python 2.7.15。要验证你的电脑上是否有足够版本的 Python，请打开终端查看版本。


  ```

  ~$ python --version

  Python 2.7.15

  ```


  ### 注意


  在撰写本书时，Python 2 和 Python 3 都可与 Bazel 配合使用，当前也已有迁移到后者的路径。你*可以*将默认版本设置为其中任意一个；但是，为了本书示例讲解的需要，这超出了本书范围；目前这些示例应当可在任一版本下运行。


  ## Ubuntu Linux


  ### 安装必需软件包


  在 Ubuntu 上的安装与 MacOS 非常相似。不过在这种情况下，我们不是下载 Xcode，而是安装一组必需软件包（即 pkg-config、zip、g++、zlib1g-dev、unzip、python3）。


  打开终端窗口并执行以下命令：


  ```

  ~$ sudo apt-get install pkg-config zip g++ zlib1g-dev unzip python3

  ```


  这可能还会要求你安装其他附加软件包。当询问是否安装附加软件包时，按“Y”。


  ### 安装 Bazel


  在获取先决条件后，你就可以下载 Bazel 了。从[`https://github.com/bazelbuild/bazel/releases/download/1.0.0/bazel-1.0.0-installer-linux-x86_64.sh`](https://github.com/bazelbuild/bazel/releases/download/1.0.0/bazel-1.0.0-installer-linux-x86_64.sh)获取安装脚本。


  打开终端并进入你下载该文件的位置（例如 ~/.Downloads）。你可能需要设置权限以执行该文件。处理完成后，即可运行执行。


  ```

  ~$ cd Downloads

  ~/Downloads$ chmod +x bazel-1.0.0-installer-linux-x86_64.sh

  ~/Downloads$ ./bazel-1.0.0-installer-linux-x86_64.sh --user

  ```


  *–-user* 标志会将 Bazel 安装到 ~/bin（即你用户的 *bin* 目录）。为了确保你可以运行 Bazel，请确认 ~/bin 在你的默认路径中。将以下内容添加到你的
  ~/.bashrc 文件：


  ```

  export PATH="$PATH:$HOME/bin"

  ```


  添加后，source 你的 *~/.bashrc* 文件，以确保新路径被加载。


  ```

  ~$ source ~/.bashrc

  ```


  现在你已经可以在 Ubuntu 上运行 Bazel 了。你可以在命令行中使用 *version* 指令轻松验证，这会输出你正在使用的 Bazel 版本。


  ```

  ~$ bazel –-version

  bazel 1.0.0

  ```


  ### 安装 Java


  为了确保我们安装的是正确版本的 Java（通过 OpenJDK），我们首先需要检查你的 Ubuntu 版本。打开终端并执行以下命令：


  ```

  ~$ lsb_release -a

  No LSB modules area available

  Distributor ID: Ubuntu

  Description:      Ubuntu 16.04.5 LTS

  Release:          16.04

  Codename:         xenial

  ```


  如果你使用的是 Ubuntu 16.04，那么你需要使用 OpenJDK 8。运行以下命令：


  ```

  ~$ sudo apt-get install openjdk-8-jdk

  ```


  如果你使用的是 Ubuntu 18.04，那么你需要使用 Open JDK 11。请改为运行以下命令：


  ```

  ~$ sudo apt-get install openjdk-11-jdk

  ```


  在每种情况下，为了完成 Java 安装，都可能需要安装其他附加软件包。


  安装完成后，运行以下命令验证你已安装的 Java 版本：


  ```

  ~$ java -version

  openjdk version "1.8.0_222"

  OpenJDK Runtime Environment (build 1.8.0_222-8u222-b10-1ubuntu1~16.04.1-b10)

  OpenJDK 64-Bit Server VM (build 25.222-b10, mixed mode)

  ```


  ## Windows


  ### 设置你的系统


  为了使用 Bazel，建议你使用 64 位 Windows 10，版本 1703 或更高。要检查你的 Windows 版本，请打开*设置*。


  ![../images/481224_1_En_2_Chapter/481224_1_En_2_Fig2_HTML.jpg](img/481224_1_En_2_Fig2_HTML.jpg)


  图 2-2


  Windows 设置


  选择 *System* ➤ *About*。你需要的信息位于 *Windows* *Specification* *.* 下。


  ![../images/481224_1_En_2_Chapter/481224_1_En_2_Fig3_HTML.jpg](img/481224_1_En_2_Fig3_HTML.jpg)


  图 2-3


  验证 Windows 的 OS build


  此外，你还需要启用开发者模式，才能在你的机器上进行开发。前往 *Settings* ➤ *Update & Security* ➤ *For developers*。


  ![../images/481224_1_En_2_Chapter/481224_1_En_2_Fig4_HTML.jpg](img/481224_1_En_2_Fig4_HTML.jpg)


  图 2-4


  启用开发者模式


  在 *Use developer features* 下，选择 *Developer mode*。你可能需要等待开发者包下载完成。




  ### 安装所需应用程序


  在真正获取 Bazel 本体之前，你需要先安装若干应用程序。


  #### 适用于 Visual Studio 2015 的 Visual C++ 可再发行组件


  该软件包包含运行使用 Visual Studio 2015 构建的 C++ 应用程序所需的运行时组件。访问 [`www.microsoft.com/en-us/download/developer-tools.aspx`](http://www.microsoft.com/en-us/download/developer-tools.aspx)，并搜索
  *适用于 Visual Studio 2015 的 Visual C++ 可再发行组件*。


  ![../images/481224_1_En_2_Chapter/481224_1_En_2_Fig5_HTML.jpg](img/481224_1_En_2_Fig5_HTML.jpg)


  图 2-5


  获取 Visual C++ 可再发行组件包


  下载该软件包并安装到你的计算机上。


  #### MSYS2


  MSYS2 是一个为软件分发与构建提供基础工具的平台；在这里，我们最关注的是它为 Windows 提供了一个 bash shell。它还提供了一个包管理系统，使软件安装变得简单，类似
  Linux 中的方式（例如通过 *apt-get*）或 MacOS 中的方式（例如类似 *Homebrew* 的工具）。


  访问 [`www.msys2.org/`](http://www.msys2.org/) 并下载适用于 x86_64 的 MSYS2。将该软件安装到你的计算机上；为简化操作，请使用默认安装路径。


  ![../images/481224_1_En_2_Chapter/481224_1_En_2_Fig6_HTML.jpg](img/481224_1_En_2_Fig6_HTML.jpg)


  图 2-6


  在你的计算机上安装 MSYS2


  安装完成后，打开一个 MSYS2 终端。你需要安装若干软件包（即 *zip*、*unzip*、*patch*、*diffutils* 和 *git*）。在终端中执行以下命令：


  ```

  pjmcn@WINDOWS-HOME MSYS~

  $ pacman -S zip unzip patch diffutils git

  ```


  你可能还需要安装其他附加包才能完成安装过程。


  ### Bazel 安装


  处理完必要组件后，现在你就可以下载并安装 Bazel 本体了。从 [`https://github.com/bazelbuild/bazel/releases/download/1.0.0/bazel-1.0.0-windows-x86_64.exe`](https://github.com/bazelbuild/bazel/releases/download/1.0.0/bazel-1.0.0-windows-x86_64.exe)
  获取可执行文件。


  与 Linux 和 MacOS 不同，下载得到的可执行文件*就是* Bazel 可执行文件；不存在单独的安装脚本。下载完成后，将该应用移动到某个目录（例如，C:\Users\<user
  name>\bin），并将其重命名为 *bazel.exe*。


  将该路径添加到你的 MSYS2 *.bashrc* 文件中。


  ```

  export PATH="$PATH:/c/Users//bin"

  ```


  添加后，source 一下你的 *~/.bashrc* 文件，以确保新路径被加载。


  ```

  ~$ source ~/.bashrc

  ```


  现在你已经可以在 Windows 上运行 Bazel 了。你可以在命令行中使用 *version* 指令轻松验证，这将输出你正在使用的 Bazel 版本。


  ```

  pjmcn@WINDOWS-HOME MSYS~

  $ bazel –-version

  bazel 1.0.0

  ```


  #### 安装语言支持


  为了使用多种语言（C++、Java 和 Python），你需要安装对应的支持框架和应用程序。


  ##### C++


  尽管本书不会直接构建 C++ 应用程序，但我们将依赖若干需要 C++ 支持的库。访问 [`https://visualstudio.microsoft.com/downloads/#build-tools-for-visual-studio-2019`](https://visualstudio.microsoft.com/downloads/%2523build-tools-for-visual-studio-2019)。下载
  Build Tools Installer 并运行安装。


  ![../images/481224_1_En_2_Chapter/481224_1_En_2_Fig7_HTML.jpg](img/481224_1_En_2_Fig7_HTML.jpg)


  图 2-7


  获取适用于 Visual Studio 2019 的构建工具


  在安装过程中，请确保你选择了 C++ 构建工具。


  ![../images/481224_1_En_2_Chapter/481224_1_En_2_Fig8_HTML.jpg](img/481224_1_En_2_Fig8_HTML.jpg)


  图 2-8


  安装 C++ 构建工具


  ##### Java


  本书中的许多示例都会使用 Java。访问 [`www.oracle.com/technetwork/java/javase/downloads/index.html`](http://www.oracle.com/technetwork/java/javase/downloads/index.html)。你至少需要下载适用于
  Windows x64 的 Java SE Development Kit 10。下载合适的安装可执行文件并安装到你的计算机上。


  ### 注意


  MSYS2 对路径中的空格处理有困难。默认路径会把 Java 安装到 *Program Files*。为避免问题，你应将安装路径改为不含空格的位置（例如，C:\Users\<user
  name>\bin\Java\<jdk-version>\）。


  与 Bazel 一样，确保将 Java 安装路径添加到 bash shell 的 PATH（位于你的 *.bashrc* 文件中）。


  ```

  export PATH="$PATH:/c/Users//bin/Java//bin"

  ```


  此外，你还需要设置 *JAVA_HOME* 变量。


  ```

  export JAVA_HOME="/c/Users//bin/Java/"

  ```


  source 该 *.bashrc*，并确认 Java 已在 MSYS2 中配置完毕。


  ```

  pjmcn@WINDOWS-HOME MSYS~

  $ source .bashrc

  pjmcn@WINDOWS-HOME MSYS~

  $ java --version

  java version "11.0.4" 2019-07-16 LTS

  Java™ SE Runtime Environment 18.9 (build 11.0.4+10-LTS)

  Java Hotspot™ 64-Bit Server VM 18.9 (build 11.0.4+10-LTS, mixed mode)

  ```


  ##### Python


  最后，为了构建 Python 项目，你需要下载适用于 Windows 的 Python 2.7 或 3。访问 [`www.python.org/downloads/release/python-2716`](http://www.python.org/downloads/release/python-2716)
  并下载 Windows x86-64 MSI Installer。下载完成后，执行安装程序以安装 Python。


  再次提醒，确保将 Python 路径添加到你的 bash shell 的 PATH 中。


  ```

  export PATH="$PATH:/c/Python27"

  ```


  source .bashrc 并确认 python 已在 MSYS2 中配置完毕。


  ```

  pjmcn@WINDOWS-HOME MSYS~

  $ source .bashrc

  pjmcn@WINDOWS-HOME MSYS~

  $ python –-version

  Python 2.7.16

  ```


  ## 最后说明


  到这个阶段，你应该已经能够执行本书中的 Bazel 示例。若你希望在其他操作系统上安装 Bazel，请访问 [`https://docs.bazel.build/versions/master/install.html`](https://docs.bazel.build/versions/master/install.html)。


  完成运行 Bazel 所需的基础准备后，你现在可以开始上手并享受其中的乐趣了。


  '
- "# 3. 你的第一个 Bazel 项目\n\n现在你已经下载并配置好了 Bazel，真正有趣的部分开始了。我们将先从一个小项目入手，然后在此基础上逐步构建（双关一下）。\n\
  \n在本章结束时，你将成功运行你的第一个 Bazel 项目，并能够构建和测试代码。\n\n## 设置你的工作区\n\n在添加任何代码之前，我们通过在指定目录中创建一个\
  \ `WORKSPACE` 文件来建立一个新的 Bazel 项目。\n\n为你的项目创建目录，并创建一个空的 `WORKSPACE` 文件：\n\n```\n\
  $ mkdir chapter_03 (or )\n$ cd chapter_03 (or )\nchapter_03$ touch WORKSPACE\n```\n\
  \n`WORKSPACE` 文件的位置应始终位于 Bazel 项目的根目录。在你的 Bazel 项目中，所有路径都会相对于 `WORKSPACE` 文件进行解析。随着你在不同目录中创建各种构建目标，你将能够以相对于\
  \ `WORKSPACE` 文件的方式引用它们。\n\n不过，这只是 `WORKSPACE` 文件强大能力的冰山一角。后续我们将看到如何使用 `WORKSPACE`\
  \ 文件来：\n\n*   向你的工作区添加新的远程代码仓库（之后你可以引用它们）\n\n*   添加用于编译不同语言的新规则\n\n不过目前，仅一个空的 `WORKSPACE`\
  \ 文件就已经足够我们开展很多工作，因此我们将从这里开始。\n\n\n\n## 添加源代码\n\n虽然 `WORKSPACE` 文件定义了 Bazel 项目的根目录，但你还需要定义一个源代码目录（也可能是多个源代码目录）来放置代码。这样做的一个原因是代码组织，因为你通常希望具备某种结构。\n\
  \n不过，至少还有一个很重要的原因：Bazel 会在与你的 `WORKSPACE` 目录相同的位置创建新的子目录。稍后我们会详细介绍这些目录，因为它们与 Bazel\
  \ 构建过程中产出的构建产物有关。\n\n为你的源代码创建一个目录：\n\n```\nchapter_03$ mkdir src (or your favorite\
  \ directory name)\n```\n\n### 注意\n\n在考虑目录名称时，不要使用以下名称之一：\n\n*   `bazel-bin`\n\n\
  *   `bazel-out`\n\n*   `bazel-testlogs`\n\n*   `bazel-chapter_03` (or `bazel-<name\
  \ of your directory>`)\n\n    如果你还没猜到，这些就是 Bazel 会创建的特殊目录。创建一个与这些目录同名的目录就是在自找麻烦，所以请通过选择不同的名称（例如\
  \ `src`）来省去很多头痛。另外，尽管上述目录对应的是当前版本 Bazel 的命名，也建议避免任何符合 “bazel-*” 模式的目录名。\n\n### Hello\
  \ World，Java 风格\n\n开箱即用（在撰写本文时），Bazel 无需额外配置即可支持 C++、Java 和 Python。开始时，我们将创建一个（稍作修改的）Java\
  \ 版 Hello World。（别担心，我们后面会更复杂；这只是起步。）\n\n在你偏好的代码编辑器中，创建文件 `HelloWorld.java` 并写入以下内容。\n\
  \n```\npublic class HelloWorld {\npublic static void main(String[] args) {\nSystem.out.println(\"\
  Hello, World!);\n}\n}\nListing 3-1\nA simple Java program\n```\n\n将该文件保存到磁盘上的 `src`\
  \ 目录下。\n\n### 指定 BUILD 目标\n\n代码创建完成后，我们现在可以把注意力转向实际构建所需的 Bazel 基础组件。\n\n在你的 `src`\
  \ 目录中，创建文件 `BUILD`，写入并保存以下内容。\n\n```\njava_binary(\nname = \"HelloWorld\",\nsrcs\
  \ = [\"HelloWorld.java\"],\n)\nListing 3-2\nYour first BUILD file\n```\n\n在这个示例中，`HelloWorld`\
  \ 是一个*构建目标*；也就是说，`HelloWorld` 是一个可以被识别并构建的单元。\n\n### 构建你的目标\n\n定义好要构建的内容后，我们现在就可以真正开始构建了。不过在此之前，先回到根目录，也就是包含\
  \ `WORKSPACE` 文件的那个目录。先列出其中内容：\n\n```\nchapter_03$ ls\nWORKSPACE\nsrc (or your favorite\
  \ directory name)\n```\n\n另外，再确认一下 `src` 目录中的内容。如下：\n\n```\nchapter_03$ ls src\n\
  BUILD    HelloWorld.java\n```\n\n这就是 Bazel 项目的干净状态，此时还没有任何内容被构建。接下来我们来改变这一点。\n\n\
  #### 构建二进制文件\n\n要构建你的第一个项目，请在命令行中运行：\n\n```\nchapter_03$ bazel build src:HelloWorld\n\
  ```\n\n把 `bazel` 命令的参数稍作拆解：\n\n*   `build`\n    *   这表示你要构建/编译/组装给定目标。\n\n*   `src`\n\
  \    *   这表示包含所需构建目标的目录。\n\n    *   在这个示例中，目录层级比较浅；不过你可以（并且将会）指定任意数量的有效目录路径来补充这个参数。\n\
  \n*   `:HelloWorld`\n    *   这是 `src` 目录中的实际构建目标。\n\n    *   在 Bazel 中，一个目录可以有一个或多个可构建目标。\n\
  \n假设一切按计划进行，你的输出应类似如下：\n\n```\nINFO: Analysed target //src:HelloWorld (19 packages\
  \ loaded, 550 targets configured).\nINFO: Found 1 target...\nTarget //src:HelloWorld\
  \ up-to-date:\nbazel-bin/src/HelloWorld.jar\nbazel-bin/src/HelloWorld\nINFO: Elapsed\
  \ time: 0.144s, Critical Path: 0.00s\nINFO: 0 processes.\nINFO: Build completed\
  \ successfully, 1 total action.\n```\n\n#### 运行二进制文件\n\n构建好可执行文件后，你可以使用以下命令运行它：\n\
  \n```\nchapter_03$ bazel-bin/src/HelloWorld\nHello, World!\n```\n\n不过，在实际开发中，你不会想要不断在“先构建可执行文件”与“再直接执行二进制文件”之间来回切换。好在你不需要这么做；Bazel\
  \ 提供了直接构建并运行可执行文件的能力。\n\n类似于你最初构建可执行文件的方式，你可以通过以下命令直接运行它：\n\n```\nchapter_03% bazel\
  \ run src:HelloWorld\nINFO: Analysed target //src:HelloWorld (0 packages loaded,\
  \ 0 targets configured).\nINFO: Found 1 target...\nTarget //src:HelloWorld up-to-date:\n\
  bazel-bin/src/HelloWorld.jar\nbazel-bin/src/HelloWorld\nINFO: Elapsed time: 0.217s,\
  \ Critical Path: 0.07s\nINFO: 1 process: 1 worker.\nINFO: Build completed successfully,\
  \ 2 total actions\nINFO: Build completed successfully, 2 total actions\nHello, World!\n\
  ```\n\n### 说明\n\n在两次运行中都值得注意的一点是关于 (*X* packages loaded, *Y* targets configured)\
  \ 的那一行。它大致反映了项目缓存状态。在第一个示例中，这两个值都非 0，说明为了生成目标，需要在依赖项上执行一些工作。在第二个示例中，这两个值都为 0，说明构建应当是完全命中缓存的。只有当发生变化时，Bazel\
  \ 才会加载包和目标，并智能地仅重建必要部分。\n\n\n\n### 创建和使用依赖\n\n创建单个二进制文件是可以的；然而，这在开发中显然并不实用。在实践中，我们希望将程序拆分为更细粒度的组件。细粒度组件有很多优点，包括更易共享、更易测试、构建更快，以及更容易优化构建过程。\n\
  \n在这个特定案例中，我们能从原始示例中抽离出的内容并不多，因此我们来添加一些新功能。\n\n在你的 `src` 目录中，新建文件 `IntMultiplier.java`，并添加以下代码。\n\
  \n```\npublic class IntMultiplier {\nprivate int a;\nprivate int b;\npublic IntMultiplier(int\
  \ a, int b) {\nthis.a = a;\nthis.b = b;\n}\npublic int GetProduct() {\nreturn a\
  \ * b;\n}\n}\nListing 3-3\nIntMultiplier.java\n```\n\n暂时不要向 `BUILD` 文件中添加任何内容；我们将先尝试把新类加入我们的二进制目标中。\n\
  \n```\npublic class HelloWorld {\npublic static void main(String[] args) {\nSystem.out.println(\"\
  Hello, World!\");\nIntMultiplier im = new IntMultiplier(3, 4);\nSystem.out.println(im.GetProduct());\n\
  }\n}\nListing 3-4\nAdding IntMultiplier to HelloWorld.java\n```\n\n现在我们再次尝试运行 HelloWorld\
  \ 的构建：\n\n```\nchapter_03% bazel run src:HelloWorld\nINFO: Analysed target //src:HelloWorld\
  \ (0 packages loaded, 0 targets configured).\nINFO: Found 1 target...\nERROR: /Users/pj/Dropbox/Books/Beginning_Bazel/code_samples/chapter_03/src/BUILD:6:1:\
  \ Building src/HelloWorld.jar (1 source file) failed (Exit 1)\nsrc/HelloWorld.java:5:\
  \ error: cannot find symbol\nIntMultiplier im = new IntMultiplier(3, 4);\n^\nsymbol:\
  \   class IntMultiplier\nlocation: class HelloWorld\nsrc/HelloWorld.java:5: error:\
  \ cannot find symbol\nIntMultiplier im = new IntMultiplier(3, 4);\n^\nsymbol:  \
  \ class IntMultiplier\nlocation: class HelloWorld\nTarget //src:HelloWorld failed\
  \ to build\nUse --verbose_failures to see the command lines of failed build steps.\n\
  INFO: Elapsed time: 0.246s, Critical Path: 0.10s\nINFO: 0 processes.\nFAILED: Build\
  \ did NOT complete successfully\n```\n\n在这个例子中，构建失败是因为无法找到 `IntMultiplier`*。* 这体现了\
  \ Bazel 最重要的特性之一：构建中没有任何隐式行为；你需要显式指定所有内容，包括全部依赖。Bazel 不会自动神奇地查找同目录、同包等位置中的内容。\n\n\
  我们可以通过以下两种方式之一解决这个问题：\n\n*   将新的源文件添加到二进制目标中。\n\n*   创建一个新的库，并让二进制目标依赖它。\n\n我们将两种方法都进行探索。\n\
  \n#### 将 IntMulitplier.java 添加到 java_binary\n\n在这种情况下，我们可以直接把 `IntMultiplier.java`\
  \ 作为 `HelloWorld` 构建目标的另一个源码文件添加进去。\n\n```\njava_binary(\nname = \"HelloWorld\"\
  ,\nsrcs = [\n\"HelloWorld.java\",\n\"IntMultiplier.java\",\n],\n)\nListing 3-5\n\
  Adding to the HelloWorld srcs\n```\n\n现在，让我们尝试重新运行 `HelloWorld`：\n\n```\nchapter_03%\
  \ bazel run src:HelloWorld\nINFO: Analysed target //src:HelloWorld (0 packages loaded,\
  \ 0 targets configured).\nINFO: Found 1 target...\nTarget //src:HelloWorld up-to-date:\n\
  bazel-bin/src/HelloWorld.jar\nbazel-bin/src/HelloWorld\nINFO: Elapsed time: 0.141s,\
  \ Critical Path: 0.00s\nINFO: 0 processes.\nINFO: Build completed successfully,\
  \ 1 total action\nINFO: Build completed successfully, 1 total action\nHello, World!\n\
  \n```\n\n通过显式列出该目标所依赖的文件，`HelloWorld` 就能够成功构建并运行。\n\n不过，虽然这个方案可行，但仍然不是最优；按目前这种方式，`IntMultiplier`\
  \ 本可以很容易在其他地方复用，但现在它被锁定在 `HelloWorld` 二进制目标内部。\n\n#### 创建 java_library 依赖\n\n与其把文件直接添加到\
  \ `HelloWorld` 构建目标，不如创建一个完全独立的依赖。这一次，我们不再创建 `java_binary` 构建目标，而是引入一种新的构建目标类型：`java_library`。\n\
  \n顾名思义，`java_library` 构建目标用于封装一组可共享的 Java 功能。创建后，其他构建目标（包括其他 `java_library` 构建目标）就可以依赖这个\
  \ `java_library`。\n\n```\njava_library(\nname = \"LibraryExample\",\nsrcs = [\"\
  IntMultiplier.java\"],\n)\nListing 3-6\nCreating the java_library dependency\n```\n\
  \n创建了新的构建目标后，我们先直接构建它：\n\n```\nchapter_03% bazel build src:LibraryExample\nINFO:\
  \ Analysed target //src:LibraryExample (1 packages loaded, 2 targets configured).\n\
  INFO: Found 1 target...\nTarget //src:LibraryExample up-to-date:\nbazel-bin/src/libLibraryExample.jar\n\
  INFO: Elapsed time: 0.203s, Critical Path: 0.06s\nINFO: 1 process: 1 worker.\nINFO:\
  \ Build completed successfully, 2 total actions\n```\n\n不过，正如预期且与 `HelloWorld` 示例不同，我们不能运行这个构建目标。尝试运行会得到如下错误：\n\
  \n```\nchapter_03% bazel run src:LibraryExample\nERROR: Cannot run target //src:LibraryExample:\
  \ Not executable\nINFO: Elapsed time: 0.097s\nINFO: 0 processes.\nFAILED: Build\
  \ did NOT complete successfully (0 packages loaded)\nFAILED: Build did NOT complete\
  \ successfully (0 packages loaded)\n```\n\n#### 依赖构建目标\n\n现在我们已经创建了该构建目标，接下来让 `HelloWorld`\
  \ 依赖这个目标。\n\n```\njava_binary(\nname = \"HelloWorld\",\nsrcs = [ \"HelloWorld.java\"\
  ],\ndeps = [\":LibraryExample\"],\n)\nListing 3-7\nAdding a dependency to HelloWorld\n\
  ```\n\n现在让我们重新运行 `HelloWorld`：\n\n```\nchapter_03% bazel run src:HelloWorld\nINFO:\
  \ Analysed target //src:HelloWorld (1 packages loaded, 4 targets configured).\n\
  INFO: Found 1 target...\nTarget //src:HelloWorld up-to-date:\nbazel-bin/src/HelloWorld.jar\n\
  bazel-bin/src/HelloWorld\nINFO: Elapsed time: 0.955s, Critical Path: 0.78s\nINFO:\
  \ 3 processes: 1 darwin-sandbox, 2 worker.\nINFO: Build completed successfully,\
  \ 7 total actions\nINFO: Build completed successfully, 7 total actions\nHello, World!\n\
  \n```\n\n在 Bazel 中，二进制目标与库目标的这种模式是跨语言通用的一对结构。一般来说，你创建的 `<insert language>_binary`\
  \ 目标数量会相对较少；它们对应你希望生成的可执行文件数量。相对地，你创建的 `<insert language>_library` 构建目标数量通常会相对较多。\n\
  \n### 测试你的构建目标\n\n创建更小构建单元的一个主要优势是它们更容易测试。既然我们已经创建了一些模块化功能，接下来就设置一个测试来验证这些功能。\n\n\
  #### 配置测试依赖\n\n在创建测试之前，我们首先需要配置一些必需的依赖。\n\n在项目根目录下，新建目录 `third_party`，并在其中创建两个子目录：`hamcrest`\
  \ 和 `junit`：\n\n```\nchapter_03$ mkdir third_party\nchapter_03$ mkdir third_party/hamcrest\n\
  chapter_03$ mkdir third_party/junit\n```\n\n根据以下网站的说明 [`https://github.com/junit-team/junit4/wiki/download-and-install`](https://github.com/junit-team/junit4/wiki/download-and-install)\
  \ 下载以下 jar 包：\n\n*   `hamcrest-core-1.3.jar`\n\n*   `junit-4.12.jar`\n\n将这些 jar\
  \ 包移动到 `third_party` 下各自对应的目录中。为了使用这些 jar 包，我们将使用另一种构建目标类型：`java_import`*。*\n\n\
  让我们新建一个 `BUILD` 文件来容纳 `java_import` 构建目标。\n\n```\npackage(default_visibility = [\"\
  //visibility:public\"])\njava_import(\nname = \"junit4\",\njars = [\n\"hamcrest/hamcrest-core-1.3.jar\"\
  ,\n\"junit/junit-4.12.jar\",\n]\n)\nListing 3-8\nBUILD file for third_party targets\n\
  ```\n\n\n\n### 注意\n\n细心的读者会注意到，我们在 `BUILD` 文件中加入了一个新的指令 `package`。我们将在后续章节进一步深入这一点，用来控制构建目标对其他目标的可见性。现在只需要知道，这个指令使得此\
  \ `BUILD` 文件中包含的目标可以被任何其他 `BUILD` 文件中的 `BUILD` 目标可见。\n\n将 `BUILD` 文件保存到 `third_party`\
  \ 目录。你可以通过运行以下命令来测试其是否配置正确：\n\n```\nchapter_03$ bazel build third_party:junit4\n\
  INFO: Analysed target //third_party:junit4 (2 packages loaded, 25 targets configured).\n\
  INFO: Found 1 target...\nTarget //third_party:junit4 up-to-date (nothing to build)\n\
  INFO: Elapsed time: 0.157s, Critical Path: 0.00s\nINFO: 0 processes.\nINFO: Build\
  \ completed successfully, 1 total action\n```\n\n#### 创建 java_test 构建目标\n\n现在让我们使用\
  \ `java_test` 构建目标为我们的功能创建一个测试。\n\n```\nimport static org.junit.Assert.assertEquals;\n\
  import org.junit.Test;\npublic class IntMultiplierTest {\n@Test\npublic void testIntMultiplier()\
  \ throws Exception {\nIntMultiplier im = new IntMultiplier(3, 4);\nassertEquals(12,\
  \ im.GetProduct());\n}\n}\nListing 3-9\nIntMultiplierTest.java\n```\n\n保存到 `src/IntMultiplierTest.java`。\n\
  \n现在让我们向 `BUILD` 文件添加一个新的构建目标。\n\n```\njava_test(\nname = \"LibraryExampleTest\"\
  ,\nsrcs = [\"IntMultiplierTest.java\"],\ndeps = [\n\":LibraryExample\",\n\"//third_party:junit4\"\
  ,\n],\ntest_class = \"IntMultiplierTest\",\n)\nListing 3-10\nAdding java_test to\
  \ BUILD\n```\n\n运行你刚创建的测试：\n\n```\nchapter_03$ bazel test src:LibraryExampleTest\n\
  INFO: Build options --collect_code_coverage, --instrumentation_filter, and --test_timeout\
  \ have changed, discarding analysis cache.\nINFO: Analysed target //src:LibraryExampleTest\
  \ (0 packages loaded, 617 targets configured).\nINFO: Found 1 test target...\nTarget\
  \ //src:LibraryExampleTest up-to-date:\nbazel-bin/src/LibraryExampleTest.jar\nbazel-bin/src/LibraryExampleTest\n\
  INFO: Elapsed time: 2.710s, Critical Path: 2.40s\nINFO: 3 processes: 1 darwin-sandbox,\
  \ 2 worker.\nINFO: Build completed successfully, 7 total actions\n//src:LibraryExampleTestPASSED\
  \ in 0.4s\nExecuted 1 out of 1 test: 1 test passes.\nINFO: Build completed successfully,\
  \ 7 total actions\n```\n\n不出所料，测试通过了。\n\n为了验证一下，我们再添加一个测试用例。这次先故意创建一个失败的测试，看看会发生什么。\n\
  \n```\npublic class IntMultiplierTest {\n@Test\npublic void testIntMultiplier()\
  \ throws Exception {\nIntMultiplier im = new IntMultiplier(3, 4);\nassertEquals(12,\
  \ im.GetProduct());\n}\n@Test\npublic void testIntMultiplier_Failure() throws Exception\
  \ {\nIntMultiplier im = new IntMultiplier(4, 5);\nassertEquals(21, im.GetProduct());\n\
  }\n}\nListing 3-11\nAdd a failing test\n```\n\n保存文件并重新执行测试：\n\n```\nchapter_03$\
  \ bazel test src:LibraryExampleTest\nINFO: Analysed target //src:LibraryExampleTest\
  \ (20 packages loaded, 617 targets configured).\nINFO: Found 1 test target...\n\
  FAIL: //src:LibraryExampleTest (see /execroot/__main__/bazel-out/darwin-fastbuild/testlogs/src/LibraryExampleTest/test.log)\n\
  Target //src:LibraryExampleTest up-to-date:\nbazel-bin/src/LibraryExampleTest.jar\n\
  bazel-bin/src/LibraryExampleTest\nINFO: Elapsed time: 13.038s, Critical Path: 2.91s\n\
  INFO: 3 processes: 1 darwin-sandbox, 2 worker.\nINFO: Build completed, 1 test FAILED,\
  \ 7 total actions\n//src:LibraryExampleTestFAILED in 0.3s\n/execroot/__main__/bazel-out/darwin-fastbuild/testlogs/src/LibraryExampleTest/test.log\n\
  ```\n\n从这个（相当明显的）失败中，Bazel 会将信息输出到前面提到的 `test.log` 文件。打开该文件会看到如下内容。\n\n```\nThere\
  \ was 1 failure:\n1) testIntMultiplier_Failure(IntMultiplierTest)\njava.lang.AssertionError:\
  \ expected: but was:\nListing 3-12\nFailure found in test.log file\n```\n\n请注意，实际输出可能会详细得多，但上述代码已足以让我们诊断并修复问题。让我们修正这个问题并重新运行测试。\n\
  \n```\npublic class IntMultiplierTest {\n...\n@Test\npublic void testIntMultiplier_Failure()\
  \ throws Exception {\nIntMultiplier im = new IntMultiplier(4, 5);\nassertEquals(20,\
  \ im.GetProduct());\n}\n}\nListing 3-13\nCorrecting the failing test\n```\n\n重新运行测试：\n\
  \n```\nchapter_03$ bazel test src:LibraryExampleTest\nINFO: Analysed target //src:LibraryExampleTest\
  \ (0 packages loaded, 0 targets configured).\nINFO: Found 1 test target...\nTarget\
  \ //src:LibraryExampleTest up-to-date:\nbazel-bin/src/LibraryExampleTest.jar\nbazel-bin/src/LibraryExampleTest\n\
  INFO: Elapsed time: 0.717s, Critical Path: 0.56s\nINFO: 2 processes: 1 darwin-sandbox,\
  \ 1 worker.\nINFO: Build completed successfully, 3 total actions\n//src:LibraryExampleTestPASSED\
  \ in 0.3s\n```\n\n## 构建（并清理）整个世界\n\n在结束之前，我们再来看几个 Bazel 核心功能。\n\n### 构建所有内容（在某个目录中）\n\
  \n在前面的示例中，我们是逐个构建各个构建目标的。对于开发单个组件来说这没问题，但显然这不是一个可扩展的流程。\n\nBazel 内置了可同时构建多种目标的功能。例如，不必逐个构建\
  \ `src` 目录中的构建目标，我们可以通过运行以下命令让 Bazel 一次性全部构建：\n\n```\nchapter_03$ bazel build src:all\n\
  INFO: Analysed 3 targets (20 packages loaded, 619 targets configured).\nINFO: Found\
  \ 3 targets...\nINFO: Elapsed time: 8.892s, Critical Path: 5.87s\nINFO: 9 processes:\
  \ 6 darwin-sandbox, 3 worker.\nINFO: Build completed successfully, 16 total actions\n\
  ```\n\n在这里，`:all` 并不是某个具体的构建目标；它是一个元目标，用来告诉 Bazel 构建给定包（即目录）中的所有构建目标。\n\n同样地，我们也可以让\
  \ Bazel 构建 `third_party` 目录中的所有内容：\n\n```\nchapter_03$ bazel build third_party:all\n\
  INFO: Analysed target //third_party:junit4 (13 packages loaded, 520 targets configured).\n\
  INFO: Found 1 target...\nTarget //third_party:junit4 up-to-date (nothing to build)\n\
  INFO: Elapsed time: 1.467s, Critical Path: 0.00s\nINFO: 0 processes.\nINFO: Build\
  \ completed successfully, 1 total action\n```\n\n`:all` 目标不仅可用于构建，也可用于所有 Bazel 命令（例如\
  \ `bazel test <insert target>`）。\n\n这可能已经很明显了，但不要把任何构建目标命名为“all”。这只会导致混淆。\n\n###\
  \ 构建所有内容（当前目录及其下级目录）\n\n再次说明，前面的 `build all` 命令在处理特定目录时很好用；但是如果要以这种方式为所有目录构建，就会再次变得繁琐。幸运的是，Bazel\
  \ 再次提供了另一个命令来帮助我们。\n\n在你的工作区根目录运行以下命令：\n\n```\nchapter_03$ bazel build ...\nINFO:\
  \ Analysed 4 targets (20 packages loaded, 620 targets configured).\nINFO: Found\
  \ 4 targets...\nINFO: Elapsed time: 7.234s, Critical Path: 5.78s\nINFO: 9 processes:\
  \ 6 darwin-sandbox, 3 worker.\nINFO: Build completed successfully, 16 total actions\n\
  ```\n\n这一次，`\"...\"` 元目标是在告诉 Bazel 构建当前目录以及该目录下的所有内容。当在工作区根级别执行时，它会构建你工作区中的*所有*内容。以这种方式构建时请谨慎，尽管在更新本地仓库后，这很可能是开启一天工作的好方式。\n\
  \n与 `:all` 元目标类似，`\"...\"` 元目标同样适用于其他 Bazel 命令（例如 `test`）。\n\n另外，你也可以将“...”限定到特定目录。比如，你可以使用“bazel\
  \ build src/...”来构建 `src` 目录下的所有内容。\n\n\n\n### （几乎）全部清理干净\n\n尽管 Bazel 在管理依赖方面表现非常出色，但你可能会在某个时刻需要彻底清空一切并重新开始。在\
  \ Bazel 中，清理操作非常简单：\n\n```\nchapter_03$ bazel clean\nINFO: Starting clean.\n```\n\
  \n就是这么简单。如果你在根目录下快速执行一次 `ls`，你会注意到所有 `bazel-*` 目录都不见了；所有输出、缓存等内容都已被移除。当然，在你下一次使用\
  \ Bazel 命令构建目标时，它们还会再次出现。\n\n## 最后的话\n\n恭喜你！你刚刚已经创建并连接好了第一组 Bazel 目标，涵盖了一系列不同功能：\n\
  \n*   `java_binary`\n    *   表示并创建一个 Java 可执行文件\n\n*   `java_library`\n    *   封装可共享的\
  \ Java 功能模块\n\n*   `java_import`\n    *   将一个或多个现有 jar 文件封装为可被依赖的单元\n\n*   `java_test`\n\
  \    *   创建用于验证 `java_library` 预期行为的测试\n\n即便只是 Bazel 构建目标中的这一小部分子集，你也已经具备了创建、组织、测试和运行\
  \ Java 程序的足够能力。\n\n值得注意的是，本章专门聚焦于 Java 目标，以便说明 Bazel 的功能。不过，`{language}_binary`、`{language}_library`\
  \ 和 `{language}_test` 这种模式，会在 Bazel（及其扩展）支持的各种语言中反复出现并变得熟悉。\n\n例如：\n\n*   C/C++（Bazel\
  \ 内置支持）\n    *   `cc_binary`、`cc_library`、`cc_test`\n\n*   Python（Bazel 内置支持）\n\
  \    *   `py_binary`、`py_library`、`py_test`\n\n*   Go（由外部规则提供）\n    *   `go_binary`、`go_library`、`go_test`\n\
  \n当然，Bazel 支持的每种语言也可能会有一些语言特定的构造（例如 `java_import`）；不过，即使在这些情况下，仍然存在大量在所有构建目标类型中基本通用的特性（例如名称、可见性、依赖关系等）。\n\
  \n在接下来的章节中，我们将减少对某一特定语言的关注，进一步深入 Bazel 本身的一些结构性元素，主要围绕 `BUILD` 和 `WORKSPACE files.`\
  \ 展开。\n\n### 练习——Python Helloworld\n\n在本章中，我们始终只专注于创建 Java 目标。然而，开箱即用的 Bazel 具备面向\
  \ Java、Python 和 C++ 的构建能力。既然你已经完成了 Java 的 HelloWorld 练习，现在请用 Python 再实现一遍。\n\n由于\
  \ Bazel 的一个标志性特征是可同时处理多种语言，你可以在同一个 `BUILD` 文件中，像 Java 目标那样创建一组类似的 `HelloWorld` Python\
  \ 目标。就实际情况而言，你在真实项目中不太可能这样做；不过，这确实能够体现 Bazel 在同一 `BUILD` 文件中跨语言处理多个目标的能力。你的 Python\
  \ 可执行程序最终会落在一个 py_binary 构建目标中。\n\n最后，你还可以在独立的 `py_library` 构建目标中创建类似的 `IntMultiplier`\
  \ 功能，并在对应的 `py_test` 构建目标中编写一组测试。与 Java 不同，Python 是“自带电池”的语言，内置了自己的单元测试框架，因此无需像\
  \ Java 那样再创建类似 `junit4` 的构建目标。\n\n"
- '# 4. WORKSPACE 文件功能


  在上一章中，我们创建并运行了第一个 Bazel 项目，重点基本放在“让它跑起来”所需的最小内容上。在那一章过程中，我们使用了两个具有特殊名称的文件：`BUILD`，以及（程度要小得多的）`WORKSPACE`。虽然
  `BUILD` 文件的用途非常明显，但我们（有意地）没有深入 `WORKSPACE` 文件。本章中，我们将探索 `WORKSPACE` 文件更丰富的一组功能。


  ### 注意


  本章将对 `WORKSPACE` 文件做一个高层次概览；不过，要真正开始体会它的实际工作方式，完成练习至关重要。


  ## WORKSPACE 文件


  在上一章中，我们让 `WORKSPACE` 文件保持完全空白。对于那个特定示例来说，我们不需要添加任何其他内容，因为我们只使用了 Bazel 开箱即用提供的全部功能。


  具体来说，上一个练习有两个明显特征：


  *   所有代码都位于单个本地仓库中。


  *   所需的规则和构建目标都来自 Bazel 的开箱即用能力。


  但在实际中，这种组合通常对大多数项目并不可行。你*一定*会需要依赖额外功能，而且很可能还会在项目中使用其他语言或其他类型的构建目标。`WORKSPACE` 文件正是为项目所需功能和规则搭建基础舞台的地方。


  ## 向 WORKSPACE 添加新规则


  如前所述，Bazel 开箱即用支持若干构建规则（Rules）。例如，它提供了定义 C++、Java、Python 等语言如何构建、编译、链接等的规则。此外，一个原生
  Bazel 项目还定义了一些实用规则，用于规定项目中的资源（例如数据文件）应如何打包和引用。


  Bazel 最强大的方面之一，就是能够通过添加新规则来扩展其能力。通过向项目的 workspace 添加新规则，我们可以加入远程依赖获取能力、增加新语言支持等等。


  值得注意的是，Bazel 自带了一些规则，但它们默认不会自动加载。这使你作为项目创建者，能够显式控制希望在项目中可用的规则集合。


  我们将用来加载新规则的基本命令是 Bazel 内置的 `load`。


  ### 注意


  `load` 命令会同时在 `WORKSPACE` 和 `BUILD` 文件中使用。正如你可能已经猜到的那样，我们最终也会用它把新类型的功能显式引入到 `BUILD`
  文件中。


  使用 `load` 的基本结构如下：


  ```

  load("//local/path/to/my:file.bzl", "symbol_to_load")

  ```


  这会让 `load` 拉取本地路径中的文件，并将指定符号加载到本地环境中；当它写在 `WORKSPACE` 文件中时，就是把该符号加载到 `WORKSPACE`
  的本地环境中。


  作为 `load` 的一个实际示例，我们将用它把 `http_archive` 规则引入 `WORKSPACE`。让我们创建一个新的项目目录。不过这次我们稍微“偷个懒”，复制上一章的成果。在复制之前，我们首先需要清理已有的构建输出，以避免意外把它们一并拷过去：


  ```

  $ cd chapter_03

  chapter_03$ bazel clean

  chapter_03$ cd ..

  $ cp -r chapter_03 chapter_04

  $ cd chapter_04

  ```


  在上一章中，我们让 `WORKSPACE` 文件保持完全空白，并且完全依赖内置规则。现在，让我们开始向 `WORKSPACE` 文件加入一点新功能。


  用你喜欢的编辑器打开 `WORKSPACE` 文件，并写入以下内容。


  ```

  load("@bazel_tools//tools/build_defs/repo:http.bzl", "http_archive")

  Listing 4-1

  A simple load command

  ```


  将该文件保存到磁盘。


  恭喜！你刚刚向 `WORKSPACE` 文件添加了一些功能。当然，这个功能此刻实际上还没有做任何事（我们会在下一节讲到）。


  ### 注意


  细心的读者会再次注意到一种新文件类型：`.bzl`。虽然这超出了本书范围，但你只需知道：`.bzl` 文件用于为 Bazel 定义规则（例如构建规则），并让我们能够扩展
  Bazel 的能力（例如添加新语言）。




  ### 深入解析加载路径


  如果你仔细查看前一个示例中的加载路径，可能会注意到一件有趣的事：那个特定路径在你的文件系统中并不存在。那么，它是从哪里来的呢？


  路径中的第一个元素是 `@bazel_tools`。`@` 用于向 Bazel 表明你正在从一个特定的 Bazel 仓库加载，该仓库名为 `bazel_tools`。`bazel_tools`
  右侧下方的文件路径，则指定了*该仓库内部*某个文件的具体路径。


  这是一个重要细节，因为它很快就会变得非常关键。随着你的项目开始引用其他 Bazel 仓库中的功能，你会使用名称来区分这些仓库。这样你就可以为项目所需的构建目标创建绝对路径。


  到目前为止，你还没有引入任何外部仓库，那么 `bazel_tools` 实际上是从哪里来的？`bazel_tools` 仓库很特殊，（某种意义上）是“开箱即用”的。


  这很关键，因为它自带一些重要功能，其中尤其重要的一项就是能够引入其他仓库。可以把它看作一个引导（bootstrapping）仓库：你只要安装了 Bazel 并创建了
  `WORKSPACE`，就会获得它。


  ### 查找 bazel_tools 仓库


  如果你想稍微探索一下，可以在项目中找到 `bazel_tools` 仓库的位置。不过首先，先清理我们现有的项目：


  ```

  chapter_04$ bazel clean

  ```


  现在，如果你尝试在当前项目中定位 `bazel_tools` 仓库，可能会一无所获：


  ```

  chapter_04$ ls -1

  WORKSPACE

  src

  third_party

  ```


  请注意，这里只有我们之前创建的目录和文件；`clean` 命令已经清除了所有构建产物、依赖、输出等内容。此时，这个 Bazel 项目基本上是“未触碰”的状态；实际上还没有执行任何
  Bazel 命令。Bazel 的目标是在任意时刻都不下载超出所需的内容；因此，除非绝对必要，它甚至不会把 `bazel_tools` 下载到某个 `WORKSPACE`
  中。


  现在，让我们重新运行上一章中一个有效的构建命令：


  ```

  chapter_04$ bazel build src:LibraryExampleTest

  chapter_04$ ls -1

  WORKSPACE

  bazel-bin

  bazel-chapter_04

  bazel-out

  bazel-testlogs

  src

  third_party

  ```


  这一次，我们要更深入地查看生成的文件，尤其是 `bazel-chapter_04`：


  ```

  chapter_04$ cd bazel-chapter_04

  chapter_04/bazel-chapter_04$ ls -1

  bazel-out

  external

  src

  third_party

  chapter_04$ cd external

  chapter_04/bazel-chapter_04/external$ ls -1

  bazel_tools

  (other directories may be here)

  ```


  恭喜！你已经找到了这个仓库。值得注意的是，它所在的位置揭示了 Bazel 的几个重要特性。


  ### 注意


  对于好奇的读者，如果你继续浏览 bazel_tools 目录，会在其中发现 tools/build_defs/repo 目录。你之前加载的 http.bzl 文件就在这里。


  首先，你的每个项目都旨在成为各自明确的事实来源。并不存在一个跨所有项目共享的中心位置来放置通用的 `bazel_tools` 仓库；每个项目都应拥有自己版本的仓库（当然，这并不妨碍
  Bazel 在幕后通过文件链接共享仓库来做一些优化）。


  其次，除非*绝对需要*，否则 Bazel 不会下载依赖。我们会在本章稍后再次讨论这一点；不过即使你在 `WORKSPACE` 文件中新增了外部依赖，如果你从未使用这些依赖中的任何内容，*Bazel
  也不会下载它们。* 这正体现了“把一切都显式声明”这一理念的核心：Bazel 因此能够进行一些很酷的优化。


  ### 同时加载多个规则


  在离开这一节之前，值得了解的是：同一个文件中可以包含多个规则。虽然你可以执行多条 *load* 命令来引入所需功能，但你也可以一次性获取所有必需的符号。


  其格式如下：


  ```

  load("//local/path/to/my:file.bzl", "symbol_to_load_1", "symbol_to_load_2", "symbol_to_load_3")

  ```


  也就是说，你只需在 load 命令后追加任意多个想从某个文件中加载的符号即可。一个实际示例如下：


  ```

  load("@bazel_tools//tools/build_defs/repo:http.bzl", "http_archive", "http_file")

  Listing 4-2

  A load command that pulls in multiple symbols

  ```


  这会将 *http_archive* 和 *http_file* 两个符号都加载到你的 workspace 中。


  ## 引用其他依赖


  在上一章中，我们显式下载了 JUnit 库并将其直接加入项目中。这与 Bazel 偏好的模型（即 monorepo）非常契合。


  不过，Bazel 还提供了几种不同方式来引用其他外部依赖。这带来了额外的灵活性，使你可以在不显式纳入依赖源码的情况下扩展项目。


  在 `WORKSPACE` 文件中，有一些规则可用于拉取项目外部的依赖。实践中，其中两个最常见（你会在各种 Bazel 项目中看到）的是：


  *   `http_archive`


  *   `git_repository`


  请注意，虽然这些规则在早期版本的 Bazel 中曾是开箱即用的，但现在你需要显式加载它们，才能在项目中使用。


  这些规则都用于获取远程 Bazel 仓库，并将其包含的 targets 作为你项目可用的依赖。




  ### http_archive


  `http_archive`用于在给定压缩文件路径的情况下，引用并获取一个压缩的 Bazel 仓库。压缩仓库获取完成后，会被解压，其中包含的规则、目标等内容就可以在你的项目中使用。


  `http_archive`最基础、最精简的形式如下。


  ```

  http_archive (

  name = "foo",

  urls = ["http://my_favorite_url.com/path/to/archive.zip"],

  )

  Listing 4-3

  Example http_archive

  ```


  我们来稍微拆解一下前面的代码。上述规则指定从位置*http://my_favorite_url.com/path/to/archive.zip*获取仓库。假设该过程成功，归档文件将被获取、下载并解压（如果之前尚未完成），从而使其内容可供使用。


  前面我们讨论过，为了使用该仓库中的任何功能，需要使用标签`bazel_tools`。类似地，为了使用我们新仓库`foo`中的任何功能，我们需要使用标签`@foo`。


  为了让这些内容更具体一些，我们来看一个真实的`http_archive`示例。请将以下内容添加到你的`chapter_04 WORKSPACE`文件中。


  ```

  load("@bazel_tools//tools/build_defs/repo:http.bzl", "http_archive")

  http_archive (

  name = "io_bazel_rules_go",

  urls = ["https://github.com/bazelbuild/rules_go/releases/download/v0.19.5/rules_go-v0.19.5.tar.gz"],

  )

  Listing 4-4

  http_archive for Go language rules

  ```


  保存你的`WORKSPACE`文件。


  正如你所想，这会拉取 Go 语言规则的压缩仓库并将其解压，使该仓库的目标可供使用。正如我们之前探讨的，这个仓库最终会出现在`chapter_04/bazel-chapter_04/external`目录中（需要注意的是，它不会立刻出现在那里，原因我们在本章前文已经讨论过）。


  为了使用仓库中的任何功能，我们需要确保正确指定相应功能。为说明这一点，请将以下内容添加到`WORKSPACE`文件中，放在`http_archive`指令下面。


  ```

  load("@io_bazel_rules_go//go:deps.bzl", "go_rules_dependencies", "go_register_toolchains")

  Listing 4-5

  Retrieving functionality for Go

  ```


  将其保存到你的`WORKSPACE`文件中。


  你应该会注意到，你需要指定`@io_bazel_rules_go`，才能形成正确路径并访问底层功能。


  ### git_repository


  `http_archive`侧重于获取 Bazel 仓库的压缩归档（无论其是否属于某个 SCM 系统），而`git_repository`用于克隆一个 git
  仓库，并在指定的提交（或标签）上检出。


  同样地，我们先从一个最简示例开始。注意，我们需要像`http_archive`一样，显式加载`git_repository`规则。


  ```

  load("@bazel_tools//tools/build_defs/repo:git.bzl", "git_repository")

  git_repository(

  name = "foo",

  remote = "http://my_favorite_url.com/path/to/repo.git",

  commit = "some_commit_hash_to_check_out_repo",

  )

  Listing 4-6

  Loading and using the git_repository

  ```


  在我们拆解过`http_archive`之后，这里有些特性看起来非常相似。在这个例子中，`name`作用完全一致，作为仓库的消歧标签。与`http_archive`的`urls`参数类似，`remote`指定我们想克隆的
  Git 仓库路径（例如位于[GitHub.com](http://github.com)之类的平台）。唯一的主要差异是`commit`，用于指定实际要获取的仓库版本。


  #### 获取一个 Git 仓库


  再次说明，我们用一个真实示例来演示。请将以下内容添加到你的`WORKSPACE`文件中。


  ```

  load("@bazel_tools//tools/build_defs/repo:git.bzl", "git_repository")

  git_repository(

  name = "io_bazel_rules_go",

  remote = "https://github.com/bazelbuild/rules_go.git",

  commit = "f5cfc31d4e8de28bf19d0fb1da2ab8f4be0d2cde",

  )

  Listing 4-7

  Retrieving the repository for Go

  ```


  ### 注意


  这里使用的具体提交哈希仅在本文写作时是最新的；你可能需要到该仓库中查看更新的版本。


  在将这段内容保存到你的`WORKSPACE`文件之前，强烈建议你先注释掉相同请求的`http_archive`版本。否则，`http_archive`版本和`git_repository`版本会出现同名。Bazel
  会通过取文件中最后一个定义来消歧决定谁“生效”；不过为了清晰起见，你不应在`WORKSPACE`文件的依赖中引入这种歧义。


  保存你的`WORKSPACE`文件。


  #### 关于 git_repository 的补充说明


  尽管`git_repository`会将远程 git 仓库克隆到你的 Bazel 项目中，但这并不意味着你可以像操作普通 git 仓库那样与之交互。也就是说，你不能进入包含该
  Git 仓库的目录（例如`bazel-chapter_04/external/<name of git repository>`）并开始执行一套常规 git 操作（例如`commit`、`push`等）。考虑到仓库所在位置，这一点其实也容易理解：所有`bazel-*`目录都是临时性的。它们都可以通过一次`bazel
  clean`被移除，这很容易清除任何本地创建的更改。


  如果你想编辑外部 git 仓库并让变更反映到项目中，一种方式是：单独克隆该仓库，完成并提交你的更改，然后*再*更新项目中的提交哈希，使其匹配新创建的提交。诚然，这可能不是最顺滑的工作流；但请记住，Bazel
  始终强调可复现性。对依赖进行显式跟踪，正是 Bazel 强大能力的关键之一。


  还有另一种使用`git_repository`的方法：不使用提交哈希，而是引用该提交对应的标签。示例如下。


  ```

  git_repository(

  name = "foo",

  remote = "http://my_favorite_url.com/path/to/repo.git",

  tag = ""

  )

  Listing 4-8

  Using the tag instead of the commit hash

  ```


  这样你就不再锁定到某个特定提交哈希，而是跟踪某个标签；如果你对 Git 仓库进行了更新（并随后更新该标签），你的项目将获得该标签对应的版本。


  除了 tag 和 commit 之外，你还可以使用“branch”来引用 Git 仓库的特定分支。


  ### 说明


  你必须在“tag”“commit”或“branch”中选择其一来指向某个特定代码版本；不能同时使用多个。


  虽然这会让外部仓库的使用更方便，但相比提交哈希，这种方式提供的保证会**弱得多**。它在开发过程中可能很方便，但在实践中也可能引发问题，因为你依赖的是一种可变的“浮动版本”代码。


  ### http_archive 与 git_repository 对比


  `http_archive`和`git_repository`都是用于引用外部 Bazel 仓库的工具；但这就引出了一个问题：“两者都能用时，我应该用哪一个？”例如，GitHub
  同时提供 git 仓库（显然）和归档文件。


  默认情况下，Bazel 的建议是优先使用`http_archive`。这很合理，因为它能提供最强的可复现性保证（即给定版本的归档是静态的）。下载并解压归档也比克隆仓库更快。此外，它还省去了为构建项目安装
  git 的需求。对于那些预期版本变化较慢的依赖，这尤其是个好主意。




  ### 注意


  严格来说，即使是 http_archive 的 URL，其内容*也可能*发生变化。为了增强可复现性并确保检索到正确文件的保证，还有*另一个*属性 `sha256`，它包含要检索的归档文件预期的
  SHA-256。虽然这里为了简洁省略了该字段，但在实际开发中，你应该设置这个字段，以确保构建的密封性（hermeticity）。


  另一方面，如果某个归档不可用，或者你*需要*与变化非常快的外部依赖协作，那么 `git_repository` 可能更有意义得多（尤其是考虑到前文提到的可配合
  git tag 使用的能力）。


  最后补充一点，Bazel 项目倾向于单体化（monolithic），因此一个可考虑的方向是*避免*使用外部依赖，而是将必要代码直接纳入你的项目。这样并非总是可行或方便，但它*确实*能为你的构建提供最强保证。


  ### 引入一门新语言


  虽然 Bazel 开箱即用支持多种语言，但我们仍需要能够按项目需要添加更多语言。如果你还没猜到，我们将为项目添加 Go 支持。


  让我们利用一路学到的一些工具。请确保你的 `WORKSPACE` 文件中包含以下内容。


  ```

  load("@bazel_tools//tools/build_defs/repo:http.bzl", "http_archive")

  http_archive (

  name = "io_bazel_rules_go",

  urls = ["https://github.com/bazelbuild/rules_go/releases/download/v0.19.5/rules_go-v0.19.5.tar.gz"],

  )

  load("@io_bazel_rules_go//go:deps.bzl", "go_rules_dependencies", "go_register_toolchains")

  go_rules_dependencies()

  go_register_toolchains()

  Listing 4-9

  Loading the Go language rules

  ```


  保存 `WORKSPACE` 文件。


  该示例中的大部分内容你之前都见过，例外是最后两行。最后两行会调用已加载的规则，为你的项目配置 Go 语言。


  ### 注意


  与 Bazel 中许多结构和模式不同，上面这两行不应被视为适用于所有语言的规范示例。每种新语言都有自己的一组（一个或多个）初始化规则，因此函数名每次都可能略有不同。


  既然 Go 规则已经配置好，让我们用它们创建一个新目标。和之前一样，我们先从一个基础示例开始。


  ```

  chapter_04$ cd src

  chapter_04/src$ touch hello_world.go

  ```


  让我们创建一个简单的 Go 程序。


  ```

  package main

  import "fmt"

  func main() {

  fmt.Println("Hello, World!")

  }

  Listing 4-10

  Hello World in Go

  ```


  将其保存为 `hello_world.go`。


  现在，打开 `src` 目录中的 `BUILD` 文件，以便我们创建 Go 目标。不过，在真正创建目标之前，我们需要显式加载 Go 规则。


  将以下内容添加到 `BUILD` 文件中。


  ```

  load("@io_bazel_rules_go//go:def.bzl", "go_binary")

  Listing 4-11

  Loading the Go language rules

  ```


  请注意，我们使用标签 `@io_bazel_rules_go` 来进行加载，以便正确引用规则所需的包。保存之前，再添加新的 Go 目标。


  ```

  go_binary(

  name = "hello_world_go",

  srcs = ["hello_world.go"],

  )

  Listing 4-12

  Create the go_binary target

  ```


  保存到 `BUILD` 文件。现在我们应该能够实际构建并运行该目标：


  ```

  chapter_04/src$ bazel run :hello_world_go

  INFO: Analysed target //src:go_hello_world (23 packages loaded, 6239 targets configured).

  INFO: Found 1 target...

  Target //src:go_hello_world up-to-date:

  bazel-bin/src/darwin_amd64_stripped/go_hello_world

  INFO: Elapsed time: 3.221s, Critical Path: 1.08s

  INFO: 6 processes: 6 darwin-sandbox.

  INFO: Build completed successfully, 10 total actions

  INFO: Build completed successfully, 10 total actions

  Hello, World!

  ```


  恭喜！你现在已经添加了一门新语言，并为其创建了一个目标！


  ### 定位 Go 语言规则仓库


  前面我们查找过 `bazel_tools` 仓库，它只会在我们执行了实际需要它的构建后才出现。以同样的方式，你现在也应该有一个 Go 语言规则仓库。我们快速确认一下：


  ```

  chapter_04/src$ cd ../bazel-chapter_04/external

  chapter_04/bazel-chapter_04/external$ ls -1

  bazel_tools

  io_bazel_rules_go

  (possible other repos)

  ```


  如前所述，Bazel 只会拉取构建你所请求目标所需的依赖。如果你先执行一次*clean*，然后构建一个非 Go 目标（例如之前的 Java 目标），你会发现 `io_bazel_rules_go`
  **不会**存在于你的 `bazel-chapter_04/external` 目录中，尽管这两个目标都在同一个 `BUILD` 文件里。


  ### 练习——再添加一门语言


  在关于 `WORKSPACE` 文件的这一节里，我们一直在积累将新语言添加到项目中的知识。现在你已经具备了这些工具，接下来应继续探索向项目中添加更多语言。


  访问 [`https://github.com/bazelbuild`](https://github.com/bazelbuild)，查看他们提供的各类 rules
  包。需要注意的是，虽然那里会有许多常见语言，但有些规则集可能不在 bazelbuild 组织下。如果你没有找到心仪的语言，还可以在 Awesome Bazel（[`https://awesomebazel.com`](https://awesomebazel.com)）上找到更大的列表。选择你喜欢的语言，配置你的
  `WORKSPACE` 文件，并为该语言创建一个构建目标。


