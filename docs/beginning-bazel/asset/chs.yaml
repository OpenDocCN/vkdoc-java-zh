- '# 5. 一个简单的 Echo 客户端/服务器程序


  在上一章中，你学习了 `WORKSPACE` 文件的基础知识，了解了如何添加外部依赖，包括新语言。在本章中，我们将基于这些内容创建一对简单程序，分别使用不同语言（一个
  Java，另一个 Go），让两者之间进行消息往返传递。


