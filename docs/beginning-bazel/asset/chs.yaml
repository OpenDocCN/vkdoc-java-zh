  图 10-1


  启动模拟器


  启动 Simulator 后，你现在可以关闭 Xcode（这与我们在上一章对 Android Studio 的操作类似）。


  在 Simulator 应用中，我们为 iOS 12.4 创建一个 iPhone Xs 的硬件设备。


  ![../images/481224_1_En_10_Chapter/481224_1_En_10_Fig2_HTML.jpg](img/481224_1_En_10_Fig2_HTML.jpg)


