  ## 结语


  在本章中，你扩展了使用 Bazel 构建 iOS 应用的知识。可以想象，为 MacOS 系列构建其他应用也会非常容易。正如我们在前面章节看到的，这个 gRPC
  示例在很大程度上只是一个玩具示例；不过，它可以很容易扩展成更有趣得多的应用（例如消息应用）。


