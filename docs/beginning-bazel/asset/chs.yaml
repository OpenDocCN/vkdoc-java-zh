- "# 7. 代码组织与 Bazel\n\n在过去几章中，示例始终将所有代码放在单一目录里。虽然这对演示很方便，但在实际中并不可行。此外，示例也经常偏离某些语言中既有（甚至被强制执行）的目录和包结构模式（例如\
  \ Java、Go 等）。在本章中，我们将修正前几章在组织结构上的不足，并演示 Bazel 在分层目录结构中工作的相关能力。\n\n### 注意\n\n我们在这里创建的目录结构将在本书剩余部分中持续使用。\n\
  \n## 准备工作\n\n这里的大部分工作都是对上一章内容的重组。大体上，我们不会创建任何新功能。为了加快进度，我们先把上一章的内容复制到一个新目录。在此之前，我们还要先清理上一章产生的构建产物：\n\
  \n```\n$ cd chapter_06\nchapter_06$ bazel clean\nchapter_06$ ls\nWORKSPACE     \
  \ src\n```\n\n清理完之前缓存的文件后，现在把上一章的内容复制过来：\n\n```\nchapter_06$ cd ..\n$ cp -rf chapter_06\
  \ chapter_07\n$ cd chapter_07\nchapter_07 $ ls\nWORKSPACE      src\n```\n\n如果你愿意，可以通过对上一章某个目标执行\
  \ `build` 或 `run` 命令来确认一切按预期工作。如果你这样做了，也请再执行一次 `clean` 命令；虽然这并非绝对必要，但它有助于在进行重组任务时保持顶层目录整洁。\n\
  \n## 分离 Protocol Buffers\n\n重组代码有很多方式（例如按语言、按客户端与服务端等）；不过，除了 Bazel 天然倾向 monorepo\
  \ 之外，本章在这件事上并没有给出任何强烈主张（也就是说，按项目实际情况来做）。\n\n不过，这里一个明显可行的拆分是：把那些包含 Protocol Buffers\
  \ 各类 `BUILD` 目标和定义的构建目标相关文件抽离出来。客户端和服务端都会引用它们，*而且*它们本身也属于独立语言，因此可以很容易地从当前混合目录中拆分出去。\n\
  \n首先，创建一个顶层目录（`proto`），并将 Protocol Buffer 定义从当前位置移动过去：\n\n```\nchapter_07$ mkdir\
  \ proto\nchapter_07$ mv src/transmission_object.proto proto/\n```\n\n接下来，我们会创建一个新的\
  \ `BUILD` 文件，用于存放所有 protobuf 构建目标：\n\n```\nload(\"@io_bazel_rules_go//proto:def.bzl\"\
  , \"go_proto_library\")\nproto_library(\nname = \"transmission_object_proto\",\n\
  srcs = [\"transmission_object.proto\"],\n)\njava_proto_library(\nname = \"transmission_object_java_proto\"\
  ,\ndeps = [\":transmission_object_proto\"],\n)\ngo_proto_library(\nname = \"transmission_object_go_proto\"\
  ,\nproto = \":transmission_object_proto\",\nimportpath = \"transmission_object\"\
  \n)\nListing 7-1\nProtobuf-only BUILD file\n```\n\n```\nchapter_07$ cd proto/\n\
  chapter_07/proto$ touch BUILD\n```\n\n将上述内容保存到 `proto/BUILD`。\n\n现在，从 `src/BUILD`\
  \ 中删除对应目标（例如 `src:transmission_object_proto` 等）。这会暂时导致该 `BUILD` 文件中的其他构建目标无法构建，但很快就会修复。\n\
  \n最后，验证在新目录中的目标是否构建正确：\n\n```\nchapter_07/proto$ bazel build :all\nINFO: Analysed\
  \ 3 targets (23 packages loaded, 6994 targets configured).\nINFO: Found 3 targets...\n\
  INFO: Elapsed time: 0.993s, Critical Path: 0.35s\nINFO: 4 processes: 3 darwin-sandbox,\
  \ 1 worker.\nINFO: Build completed successfully, 5 total actions\n```\n\n\n\n##\
  \ 引用当前包之外的构建目标\n\n前面的示例利用了它们位于同一目录/包中的便利性，从而可以轻松指定 BUILD 目标之间的依赖关系。由于所有内容都在同一个位置，每个示例的构建目标都可以指定本地构建目标（或引用外部依赖）。\n\
  \n当我们将 Protocol Buffer 构建目标拆分到单独的包中时，就破坏了现有目标。尝试构建现有目标之一会导致失败：\n\n```\nchapter_07$\
  \ bazel build src:echo_client\nERROR: chapter_07/ src/BUILD:5:12: in deps attribute\n\
  of java_binary rule //src:echo_client: target '//src:transmission_object_java_proto'\
  \ does not exist\nERROR: Analysis of target '//src:echo_client' failed; build aborted:\
  \ Analysis of target '//src:echo_client' failed; build aborted\nINFO: Elapsed time:\
  \ 0.117s\nINFO: 0 processes.\nFAILED: Build did NOT complete successfully (1 packages\
  \ loaded, 2 targets configured)\n```\n\n让我们修正各个 BUILD 目标，以便能够正确引用新创建的非本地 Protocol\
  \ Buffer 依赖。打开 `src/BUILD` 文件（加粗处为变更）。\n\n```\njava_binary(\nname = \"echo_client\"\
  ,\nsrcs = [\"EchoClient.java\"],\nmain_class = \"EchoClient\",\ndeps = [\"//proto:transmission_object_java_proto\"\
  ],\n)\nload(\"@io_bazel_rules_go//go:def.bzl\", \"go_binary\")\ngo_binary(\nname\
  \ = \"echo_server\",\nsrcs = [\"echo_server.go\"],\ndeps = [\n\"//proto:transmission_object_go_proto\"\
  ,\n\"@com_github_golang_protobuf//proto:go_default_library\",\n],\n)\nListing 7-2\n\
  Updating the src/BUILD dependencies\n```\n\n保存对 `src/BUILD` 的修改。\n\nBazel 的一个特性是：除了允许本地依赖之外，所有依赖引用都是相对于某个\
  \ `WORKSPACE` 的绝对路径*。* 在前面的示例中，当我们指定对新建 protobuf 目标的依赖时，是相对于 `WORKSPACE` 根目录来写的（由\
  \ `//` 表示）。这一点很重要：依赖并不是使用相对于当前 `BUILD` 文件的路径来指定的。虽然这看起来可能是一项繁琐的要求，但它源于 Bazel 一贯强调的“所有内容都应显式声明”的理念。\n\
  \n如前所示，我们也可以引用被拉入 `WORKSPACE` 的依赖（例如我们的 Go 规则），方法是在依赖名称前使用 `@` 符号；这会告知 Bazel 该依赖并非\
  \ `WORKSPACE` 本地依赖。\n\n然而，尽管我们已经正确引用了新创建的目标，仍然会遇到另一个问题。为说明这一点，让我们再运行一次构建：\n\n```\n\
  chapter_07$ bazel build src:echo_client\nERROR: /chapter_07/src/BUILD:1:1: in java_binary\
  \ rule //src:echo_client: target '//proto:transmission_object_java_proto' is not\
  \ visible from target '//src:echo_client'. Check the visibility declaration of the\
  \ former target if you think the dependency is legitimate\nERROR: Analysis of target\
  \ '//src:echo_client' failed; build aborted: Analysis of target '//src:echo_client'\
  \ failed; build aborted\nINFO: Elapsed time: 0.215s\nINFO: 0 processes.\nFAILED:\
  \ Build did NOT complete successfully (6 packages loaded, 390 targets configured)\n\
  ```\n\n我们将在下一节中修复这个问题。\n\n## 目标可见性\n\n许多面向对象语言（例如 Java、C++、Objective-C 等）都有对象成员变量和函数的*可见性*概念。通常，这会以*接口*（即面向外部的公共\
  \ API）和*实现*（即实际执行工作的代码）来描述。为了实现*关注点分离*，这种划分在无数编程书籍中被反复强调。理论上，这使得实现可以在不影响功能使用方的情况下进行变更；因为它们都遵循同一套接口。\n\
  \n在许多语言中，可见性不一定是二元选择；可以将可见性限定为某种特定范围（例如，仅父类子类可见的成员、仅同一 Java 包可见的成员等）。这在“哪些部分应可见、对谁可见”方面提供了灵活性。\n\
  \nBazel 提供了强大的目标可见性机制，使项目架构师能够决定哪些内容应该可见、对谁可见。值得注意的是，这是一个*与语言无关*的特性；无论语言本身是否实现了某种成员可见性形式，任何构建目标都可以利用这一\
  \ Bazel 特性。这使我们能够确定代码中的哪些部分应被视为可供“公开”使用（即*接口*），哪些部分应保留为私有（即*实现*）。\n\n在本书迄今为止的内容中，我们一直忽略了可见性的概念。这之所以可行，是因为我们的所有代码都位于同一目录和\
  \ `BUILD` 文件中（即同一个 Bazel 包内）；同一包中的所有目标彼此自动可见。此外，如果没有额外声明，同一包中的所有目标默认对任何外部目标都*不可见*。也就是说，除非我们显式声明其可见性，否则某个目标*不能被其自身包外部依赖*。\n\
  \n虽然这看起来可能是一项繁琐的要求，但它实际上是 Bazel 最强大的特性之一：作为代码作者，你可以决定如何最好地组织代码以便构建，*以及*如何最好地组织代码供使用方调用。这两者不必是同一件事。\n\
  \n由于我们*确实*希望包外部的使用方能够使用我们的代码，因此需要指定可见性。实现方式主要有两种：（1）包级别；（2）目标级别。我们将同时探索这两种方式。\n\n\
  ### 包可见性\n\n如前所述，默认情况下，同一包内的所有目标都不能作为依赖被包外其他目标使用。我们可以采用的最简单方式是让*所有*目标可见。\n\n打开 `proto/BUILD`\
  \ 文件并添加以下指令。\n\n```\npackage(default_visibility = [\"//visibility:public\"])\nload(\"\
  @io_bazel_rules_go//proto:def.bzl\", \"go_proto_library\")\nproto_library(\nname\
  \ = \"transmission_object_proto\",\nsrcs = [\"transmission_object.proto\"],\n)\n\
  java_proto_library(\nname = \"transmission_object_java_proto\",\ndeps = [\":transmission_object_proto\"\
  ],\n)\ngo_proto_library(\nname = \"transmission_object_go_proto\",\nproto = \":transmission_object_proto\"\
  ,\nimportpath = \"transmission_object\"\n)\nListing 7-3\nMaking all build targets\
  \ visible\n```\n\n保存到 `proto/BUILD`。\n\n现在，让我们再次尝试构建 `src:echo_client`：\n\n```\n\
  chapter_07$ bazel build src:echo_client\nINFO: Analysed target //src:echo_client\
  \ (1 packages loaded, 4 targets configured).\nINFO: Found 1 target...\nTarget //src:echo_client\
  \ up-to-date:\nbazel-bin/src/echo_client.jar\nbazel-bin/src/echo_client\nINFO: Elapsed\
  \ time: 3.221s, Critical Path: 2.83s\nINFO: 2 processes: 1 darwin-sandbox, 1 worker.\n\
  INFO: Build completed successfully, 6 total actions\n```\n\n现在我们已经更新了依赖的可见性，构建会按预期工作（`src:echo_server`\
  \ 也应当可以工作，不过这里留给读者作为练习）。\n\n\n\n### 说明\n\n再次强调，细心的读者会注意到，我们在 *BUILD* 文件中又引入了一个新函数（`package`）。`package`\
  \ 函数的作用是将相同的元数据应用到给定包中的所有目标。在这个例子里，我们仅用它来修改可见性。\n\n#### 路径特定可见性\n\n上一节的解决方案解决了让\
  \ `echo_client` 和 `echo_server` 目标能够构建这一紧迫问题。  \n但是，把包中的*每一个*目标都设为可见，这种方案至少可以说是有些过于粗放。这种“全有或全无”的方式并不利于良好的代码组织；从极端来看，它只比把所有东西都放在同一个地方稍微好一点。\n\
  \n幸运的是，我们可以做得更好。Bazel 支持显式指定目标可见性的路径。在这里，我们将访问限制为仅限 *src* 包。\n\n打开 `proto/BUILD`\
  \ 文件，并修改我们的可见性配置。\n\n```\npackage(default_visibility = [\"//src:__pkg__\"])\nload(\"\
  @io_bazel_rules_go//proto:def.bzl\", \"go_proto_library\")\n\nListing 7-4\nRestricting\
  \ the visibility to a specific package\n```\n\n保存 `proto/BUILD` 文件。\n\n再次确认你可以同时构建\
  \ `src:echo_client` 和 `src:echo_server`。现在你已经将可见性缩小到*仅*限于严格位于 `src` 包内的目标。\n\n###\
  \ 说明\n\n尽管 `//src:__pkg__` 这一配置允许在 `src` 包内访问任意 `proto` 目标，但该配置**不会**自动包含 `src`\
  \ 的任何*子包*。  \n也就是说，如果你有一个类似 `//src/client` 的包，那么 *proto* 目标对 `//src/client` 内的目标依然是**不可见**的。\n\
  \n这可以通过将可见性配置从 `__pkg__` 改为 `__subpackages__` 轻松解决。这表示某个依赖不仅对特定包可见，也对其下的所有子包可见。\n\
  \n### 单个目标可见性\n\n在上一节中，我们是在包级别指定可见性。虽然这通常是个不错的起点，但它仍然呼应了前面“全有或全无”的问题；我们仍在对给定包内的所有目标统一声明可见性。Bazel\
  \ 再次提供了更细粒度的能力。\n\n单个目标可以自行声明其可见性；也就是说，每个单独目标都可以指定哪些其他包可以依赖它。这也包括某个单独目标直接声明 `visibility:public`\
  \ 的情况。\n\n打开 `proto/BUILD` 文件；我们将修改各个目标的可见性。\n\n```\n#package(default_visibility\
  \ = [\"//src: :__pkg__\"])\nload(\"@io_bazel_rules_go//proto:def.bzl\", \"go_proto_library\"\
  )\nproto_library(\nname = \"transmission_object_proto\",\nsrcs = [\"transmission_object.proto\"\
  ],\n)\njava_proto_library(\nname = \"transmission_object_java_proto\",\ndeps = [\"\
  :transmission_object_proto\"],\nvisibility = [\"//src:__pkg__\"],\n)\ngo_proto_library(\n\
  name = \"transmission_object_go_proto\",\nproto = \":transmission_object_proto\"\
  ,\nimportpath = \"transmission_object\",\n)\nListing 7-5\nSpecifying visibility\
  \ at the build target level\n```\n\n保存 `proto/BUILD`。现在，再次验证我们的 `src:echo_client`\
  \ 仍可构建：\n\n```\nchapter_07$ bazel build src:echo_client\nINFO: Analysed target //src:echo_client\
  \ (1 packages loaded, 4 targets configured).\nINFO: Found 1 target...\nTarget //src:echo_client\
  \ up-to-date:\nbazel-bin/src/echo_client.jar\nbazel-bin/src/echo_client\nINFO: Elapsed\
  \ time: 0.207s, Critical Path: 0.00s\nINFO: 0 processes.\nINFO: Build completed\
  \ successfully, 1 total action\n```\n\n不过，当你尝试构建 *src:echo_server* 时会得到不同结果：\n\n\
  ```\nchapter_07$ bazel build src:echo_server\nERROR: chapter_07/src/BUILD:10:1:\
  \ in go_binary rule //src:echo_server: target '//proto:transmission_object_go_proto'\
  \ is not visible from target '//src:echo_server'. Check the visibility declaration\
  \ of the former target if you think the dependency is legitimate\nERROR: Analysis\
  \ of target '//src:echo_server' failed; build aborted: Analysis of target '//src:echo_server'\
  \ failed; build aborted\nINFO: Elapsed time: 0.109s\nINFO: 0 processes.\nFAILED:\
  \ Build did NOT complete successfully (0 packages loaded, 1 target configured)\n\
  ```\n\n这里，我们移除了包级别“让所有目标对 *src* 可见”的指令。取而代之的是，我们仅让 *transmission_object_java_proto*\
  \ 目标（只被 *echo_client* 需要）对 *src* 包可见。于是，*echo_server* 所需的 *transmission_object_go_proto*\
  \ 又再次变为不可见。\n\n显然，我们可以轻松修复它。重新打开 *proto/BUILD* 文件，并为 *transmission_object_go_proto*\
  \ 增加可见性配置。\n\n```\n#package(default_visibility = [\"//src:echo_client\"])\nload(\"\
  @io_bazel_rules_go//proto:def.bzl\", \"go_proto_library\")\nproto_library(\nname\
  \ = \"transmission_object_proto\",\nsrcs = [\"transmission_object.proto\"],\n)\n\
  java_proto_library(\nname = \"transmission_object_java_proto\",\ndeps = [\":transmission_object_proto\"\
  ],\nvisibility = [\"//src:__pkg__\"],\n)\ngo_proto_library(\nname = \"transmission_object_go_proto\"\
  ,\nproto = \":transmission_object_proto\",\nimportpath = \"transmission_object\"\
  ,\nvisibility = [\"//src:__pkg__\"],\n)\nListing 7-6\nFixing the visibility for\
  \ transmission_object_go_proto\n```\n\n将文件保存到 *proto/BUILD*，并重试构建 *src:echo_server*：\n\
  \n```\nchapter_07$ bazel build src:echo_server\nINFO: Analysed target //src:echo_server\
  \ (1 packages loaded, 4 targets configured).\nINFO: Found 1 target...\nTarget //src:echo_server\
  \ up-to-date:\nbazel-bin/src/darwin_amd64_stripped/echo_server\nINFO: Elapsed time:\
  \ 0.227s, Critical Path: 0.01s\nINFO: 0 processes.\nINFO: Build completed successfully,\
  \ 1 total action\n```\n\n修复依赖可见性后，所有构建现在又都恢复正常了。\n\n### 混合使用包级与目标级可见性\n\n我们已经演示了两种表达可见性的方式（即\
  \ *package* 和*单个*目标），还需要说明它们如何相互作用。\n\n简而言之，包级可见性配置会作为包内所有目标的*默认值*。而单个目标上的可见性配置则是该目标可见性的*最终*值。\
  \  \n也就是说，包级与目标级之间不会尝试合并；始终是替换关系。\n\n虽然这看起来有些严格，但要记住一个关键点：Bazel 追求的是显式性；在可见性规则之间进行复杂的隐式合并并不符合这一目标。是的，这可能意味着你在制定某些非常细致的规则时需要多写一些配置；但显式定义胜过一时的便利。\n\
  \nBazel 通过 `package_group.` 结构提供了一种缓解这种冗长性的策略。`package_group` 允许你将元数据（例如可见性规则）应用到一组包上。这在“给单个目标设置可见性”和“要求整个包统一可见性策略”之间提供了很好的折中。\n\
  \n## 分离客户端与服务端代码\n\n在将 protobuf 代码拆分到独立包之后，我们也将把客户端和服务端代码分别拆分到各自独立的包中。\n\n\n\n###\
  \ 拆分 Echo 服务器代码\n\n首先，让我们为 `echo_server` 创建一个目录。出于一些原因（这些原因在后文以及后续章节中会更明显），我们将为\
  \ `echo_server` 创建一个子目录，并将对应代码移动到该目录中：\n\n```\nchapter_07$ mkdir -p server/echo_server\n\
  chapter_07$ mv src/echo_server.go server/echo_server/echo_server.go\n```\n\n现在让我们创建一个\
  \ `server/echo_server/BUILD` 文件。我们只需从原始 `src/BUILD` 文件中复制先前针对 `echo_server` 构建目标的定义。\n\
  \n```\nload(\"@io_bazel_rules_go//go:def.bzl\", \"go_binary\")\ngo_binary(\nname\
  \ = \"echo_server\",\nsrcs = [\"echo_server.go\"],\ndeps = [\n\"//proto:transmission_object_go_proto\"\
  ,\n\"@com_github_golang_protobuf//proto:go_default_library\",\n],\n)\nListing 7-7\n\
  Creating the server/echo_server/BUILD file\n```\n\n将该文件保存为 `server/echo_server/BUILD`。尝试构建它只会重新引入我们之前看到的\
  \ proto 可见性问题。让我们先更新必要目标的可见性规则。\n\n打开 `proto/BUILD` 文件并进行如下修改。\n\n```\nload(\"@io_bazel_rules_go//proto:def.bzl\"\
  , \"go_proto_library\")\nproto_library(\nname = \"transmission_object_proto\",\n\
  srcs = [\"transmission_object.proto\"],\n)\njava_proto_library(\nname = \"transmission_object_java_proto\"\
  ,\ndeps = [\":transmission_object_proto\"],\nvisibility = [\"//src:__pkg__\"],\n\
  )\ngo_proto_library(\nname = \"transmission_object_go_proto\",\nproto = \":transmission_object_proto\"\
  ,\nimportpath = \"transmission_object\",\nvisibility = [\"//server/echo_server:__pkg__\"\
  ],\n)\nListing 7-8\nUpdating the visibility package for transmission_object_go_proto\n\
  ```\n\n将更改保存到 `proto/BUILD`。现在，我们应该能够成功构建新创建的 `server/echo_server:echo_server` 目标：\n\
  \n```\nchapter_07$ bazel build server/echo_server:echo_server\nINFO: Analysed target\
  \ //server/echo_server:echo_server (2 packages loaded, 5 targets configured).\n\
  INFO: Found 1 target...\nTarget //server/echo_server:echo_server up-to-date:\nbazel-bin/server/echo_server/darwin_amd64_stripped/echo_server\n\
  INFO: Elapsed time: 0.896s, Critical Path: 0.56s\nINFO: 2 processes: 2 darwin-sandbox.\n\
  INFO: Build completed successfully, 5 total actions\n```\n\n#### 省略构建目标名\n\n需要注意的一点是，我们在构建\
  \ `echo_server` 的路径中出现了重复；具体来说，我们看到了两次 “echo_server”：\n\n```\nchapter_07$ bazel\
  \ build server/echo_server:echo_server\n```\n\nBazel 提供的一项便利是：当构建目标与其所在包同名时，可以省略该目标名。也就是说，下面的调用在功能上是等价的：\n\
  \n```\nchapter_07$ bazel build server/echo_server\nINFO: Analysed target //server/echo_server:echo_server\
  \ (1 packages loaded, 2 targets configured).\nINFO: Found 1 target...\nTarget //server/echo_server:echo_server\
  \ up-to-date:\nbazel-bin/server/echo_server/darwin_amd64_stripped/echo_server\n\
  INFO: Elapsed time: 0.217s, Critical Path: 0.00s\nINFO: 0 processes.\nINFO: Build\
  \ completed successfully, 1 total action\n```\n\n尽管此时你可能会想对 Bazel 提出质疑，但这种便利实际上提供了一个非常强大的约定：如果某个目标与其所在包同名，那么它就可以被视为该包对外暴露的“公共”目标（即\
  \ *接口*）。这使得外部包在判断应依赖哪个（或哪些）目标时，预期更加统一、简单。\n\n值得注意的是，这一约定并不是 Bazel 的*强制要求*，但它的存在非常有力，在创建和分析构建依赖树时可以显著降低认知负担。\n\
  \n### 拆分 Echo 客户端代码\n\n在处理完服务端之后，我们终于也将注意力转向客户端。在这种情况下，我们会创建一个略有不同的目录/包结构；这是为了后续章节做准备。和之前一样，我们将把相应代码移动到子目录中：\n\
  \n```\nchapter_07$ mkdir -p client/echo_client/command_line\nchapter_07$ mv src/EchoClient.java\
  \ client/echo_client/command_line/EchoClient.java\n```\n\n现在我们需要创建对应的 `BUILD` 文件；同样，我们最终只需复制之前该目标的定义。\n\
  \n```\njava_binary(\nname = \"command_line\",\nsrcs = [\"EchoClient.java\"],\nmain_class\
  \ = \"EchoClient\",\ndeps = [\"//proto:transmission_object_java_proto\"],\n)\nListing\
  \ 7-9\nCreating the client/echo_client/command_line/BUILD file\n```\n\n将修改保存到 `client/echo_client/command_line/BUILD`\
  \ 文件。再次说明，我们需要更新 `proto/BUILD` 中相应目标的可见性；否则，我们的 `echo_client` 目标将再次构建失败。\n\n打开 `proto/BUILD`，并对\
  \ `transmission_object_java_proto` 做如下修改。\n\n```\nload(\"@io_bazel_rules_go//proto:def.bzl\"\
  , \"go_proto_library\")\nproto_library(\nname = \"transmission_object_proto\",\n\
  srcs = [\"transmission_object.proto\"],\n)\njava_proto_library(\nname = \"transmission_object_java_proto\"\
  ,\ndeps = [\":transmission_object_proto\"],\nvisibility = [\"//client/echo_client:__subpackages__\"\
  ],\n)\ngo_proto_library(\nname = \"transmission_object_go_proto\",\nproto = \":transmission_object_proto\"\
  ,\nimportpath = \"transmission_object\",\nvisibility = [\"//server/echo_server:__pkg__\"\
  ],\n)\nListing 7-10\nUpdating the visibility for transmission_object_java_proto\n\
  ```\n\n将文件保存到 `proto/BUILD`。\n\n### 注意\n\n你可能已经注意到，我们为 `transmission_object_java_proto`\
  \ 与其 Go 对应项设置了略有不同的可见性规则。具体来说，Go 版本非常明确地只面向 `echo_server` 包，而 Java 版本则允许更广泛的潜在包集合（即\
  \ `echo_client` 包下的所有内容）。这同样是为了后续章节提前做准备。\n\n完成可见性更新后，让我们验证目标仍能按预期构建（并利用前面提到的目标名省略）：\n\
  \n```\nchapter_07$ bazel build client/echo_client/command_line\nINFO: Analysed target\
  \ //client/echo_client/command_line:command_line (1 packages loaded, 2 targets configured).\n\
  INFO: Found 1 target...\nTarget //client/echo_client/command_line:command_line up-to-date:\n\
  bazel-bin/client/echo_client/command_line/command_line.jar\nbazel-bin/client/echo_client/command_line/command_line\n\
  INFO: Elapsed time: 0.192s, Critical Path: 0.01s\nINFO: 0 processes.\nINFO: Build\
  \ completed successfully, 1 total action\n```\n\n### 清理\n\n由于原始目录中的内容基本都已移走，现在我们可以将其删除：\n\
  \n```\nchapter_07$ rm -rf src\n```\n\n作为一次合理性检查，我们可以通过一个全量构建命令再次确认一切都能按预期构建：\n\n\
  ```\nchapter_07$ bazel build ...\nINFO: Analysed 5 targets (0 packages loaded, 0\
  \ targets configured).\nINFO: Found 5 targets...\nINFO: Elapsed time: 0.188s, Critical\
  \ Path: 0.01s\nINFO: 0 processes.\nINFO: Build completed successfully, 1 total action\n\
  ```\n\n由于我们并没有更改任何实际代码，只是移动了代码并创建/重配了 BUILD 文件和目标；因此所有功能都应与之前一致。验证过程留给读者作为练习。\n\n\
  \n\n## 最后的话\n\n在上一章中，你使用 Bazel 的工具将代码重组为一种（更）可扩展的开发结构。尽管仍然是玩具示例，但内容已经足够让你开始使用 Bazel\
  \ 的各种构件，把代码结构打造成易于理解、可扩展且可控的形式。\n\n虽然本章中完成的是一种特定的组织方式，但绝不应将其视为唯一标准。例如，Protocol Buffer\
  \ 及其派生的语言特定目标的位置和可见性可以调整（例如，将语言特定的 proto 目标放到更接近其实际使用位置的地方）。另一个例子是切换为以语言为中心的目录/包结构。\n\
  \n没有“正确”的唯一答案；每种可能性都有其权衡。无论如何，Bazel 都能灵活支持最适合你需求的代码组织方式，同时提供有助于长期维护该结构的工具。\n\n"
- '# 8. gRPC 与 Bazel


  在第 6 章中，你已经了解了 Protocol Buffers 的用法：它能提供简洁、强类型且易于序列化的数据描述，并且可跨语言工作。作为对应，Bazel 也提供了便捷方式来依赖
  Protocol Buffers。在本章中，我们将进一步探索如何使用 Protocol Buffers 来轻松定义可跨多种语言工作的 API。


  Protocol Buffer 格式通过 gRPC 来定义 API，而 gRPC 是 Google 创建*远程过程调用*（RPC）的一种方式。与 Protocol
  Buffers 在多语言间统一数据访问的方式类似，gRPC 统一了客户端到服务器发起 RPC 的方式。


  ## 设置


  我们将在上一章工作的基础上继续。首先，在确认已清理所有构建产物后，将上一章的全部内容复制到一个新目录中：


  ```

  $ cd chapter_07

  chapter_07$ bazel clean

  chapter_07$ ls

  WORKSPACE   client    proto   server

  chapter_07$ cd ..

  $ cp -rf chapter_07 chapter_08

  $ cd chapter_08

  chapter_08$

  ```


  最后，我们需要在 `WORKSPACE` 文件中添加更多依赖。请将下面高亮的变更加入你的 `WORKSPACE` 文件。


  ```

  load("@bazel_tools//tools/build_defs/repo:http.bzl", "http_archive")

  skylib_version = "0.8.0"

  http_archive(

  name = "bazel_skylib",

  url = "https://github.com/bazelbuild/bazel-skylib/releases/download/{}/bazel-skylib.{}.tar.gz".format(skylib_version,
  skylib_version),

  )


  http_archive(

  name = "io_grpc_grpc_java",

  strip_prefix = "grpc-java-1.24.0",

  urls = ["https://github.com/grpc/grpc-java/archive/v1.24.0.tar.gz"],

  )

  load("@io_grpc_grpc_java//:repositories.bzl", "grpc_java_repositories")

  grpc_java_repositories()

  http_archive(

  name = "bazel_gazelle",

  urls = ["https://github.com/bazelbuild/bazel-gazelle/releases/download/v0.19.1/bazel-gazelle-v0.19.1.tar.gz"],

  )

  load("@bazel_gazelle//:deps.bzl", "gazelle_dependencies", "go_repository")

  gazelle_dependencies()

  go_repository(

  name = "org_golang_google_grpc",

  build_file_proto_mode = "disable",

  importpath = "google.golang.org/grpc",

  sum = "h1:J0UbZOIrCAl+fpTOf8YLs4dJo8L/owV4LYVtAXQoPkw=",

  version = "v1.22.0",

  )

  go_repository(

  name = "org_golang_x_net",

  importpath = "golang.org/x/net",

  sum = "h1:oWX7TPOiFAMXLq8o0ikBYfCJVlRHBcsciT5bXOrH628=",

  version = "v0.0.0-20190311183353-d8887717615a",

  )

  go_repository(

  name = "org_golang_x_text",

  importpath = "golang.org/x/text",

  sum = "h1:g61tztE5qeGQ89tm6NTjjM9VPIm088od1l6aSorWRWg=",

  version = "v0.3.0",

  )

  Listing 8-1

  Adding the gRPC dependencies to the WORKSPACE

  ```


  将其保存到 `WORKSPACE` 文件中。


  作为最后一项，我们将在 `WORKSPACE` 文件旁边创建一个空的 BUILD 文件。这与 Gazelle 的使用有关（下一节会讨论）。


  ```

  chapter_08$ touch BUILD

  ```


  ### 依赖讨论


  我们值得花一点时间讨论刚刚添加的一些依赖，尤其是 Go 相关依赖。到目前为止，`http_archive` 的用法应该已经很熟悉了。


  #### Skylib


  Skylib 库包含了许多在创建自定义构建规则时会用到的实用函数和规则。它是很多包都会使用的常见依赖。因此，当不同依赖使用该库的多个版本时，你可能会遇到问题。在这里，我们显式加入这个库，并指定一个将在你的
  `WORKSPACE` 中统一使用的版本。


  关于我们*如何*引入这个特定版本的 Skylib，还有一点需要注意。如果你留意会发现，我们在字符串上使用了 `.format()` 函数，以便将版本号插入到路径中。这样做可以让我们后续更容易修改版本。它也展示了
  Starlark 类 Python 特性的用法，可用于更丰富地描述依赖配置。


  #### Gazelle


  Gazelle 的独特之处在于，它是 Bazel 项目的构建文件生成器。也就是说，它可以从代码中“自动神奇地”生成某种语言的 BUILD 文件（当然，前提是代码本身结构良好）。Gazelle
  开箱即支持 Go。由于 Go 具有一个很好的特性——能够在代码中非常明确地声明依赖——Gazelle 可以利用这一点为你生成 `BUILD` 文件。


  Gazelle 还为 Go 定义了一个仓库规则，名字也很贴切：`go_repository`。你可能已经猜到了，go_repository 允许你（a）指定用于获取所需依赖的
  import 路径，以及（b）为其中的包自动生成所需的 `BUILD` 文件。可以想象，这对于集成尚未原生支持 Bazel 的第三方库（至少对 Go 而言）会有巨大帮助。


  项目根目录下的 `BUILD` 文件可作为配置 Gazelle 选项的位置，如果你想在自己的项目中使用它的功能的话。如果缺少这个 `BUILD` 文件，你的项目将构建失败。




  ## 在 Protocol Buffers 中定义 gRPC


  与我们此前以与语言无关的方式在 Protocol Buffers 中定义消息类似，我们也可以为 RPC 定义接口。我们将在 `proto` 目录中新建一个文件来承载这个新
  API。


  ```

  syntax = "proto3";

  import "proto/transmission_object.proto";

  package transceiver;

  message EchoRequest {

  transmission_object.TransmissionObject from_client = 1;

  }

  message EchoResponse {

  transmission_object.TransmissionObject from_server = 1;

  }

  service Transceiver {

  rpc Echo (EchoRequest) returns (EchoResponse);

  }

  Listing 8-2

  Defining the interface for the RPC

  ```


  将其保存为 `proto/transceiver.proto`*。*


  让我们花一点时间来分析这些定义。我们在本地定义了两个消息：`EchoRequest` 和 `EchoResponse`，分别用于承载 RPC 的请求和响应。


  值得注意的是，在 `EchoRequest` 和 `EchoResponse` 中，我们都包含了先前创建的 `TransmissionObject` 消息。严格来说，请求和响应中包含同一个消息并非必需；我们在这里这样做只是为了与前面章节中创建的功能保持一致。另外，也没有要求必须在与接口相同的文件中定义请求和响应消息；我们这样做只是为了简化示例。


  随后我们定义了一个服务 `Transceiver`，其中只有一个 RPC：*Echo*。在 Echo 的定义中，我们指定了所需的请求和响应类型。


  最后请注意，我们在这里所做的只是为 RPC 定义接口。除此之外，（这里）并没有定义它的实现。


  为了真正使用并生成 RPC，我们需要在 `proto/BUIL`*D* 文件中更新相应的构建目标。打开 `proto/BUILD` 文件并添加以下内容。


  ```

  proto_library(

  name = "transceiver_proto",

  srcs = ["transceiver.proto"],

  deps = [

  ":transmission_object_proto",

  ]

  )

  go_proto_library(

  name = "transceiver_go_proto_grpc",

  compiler = "@io_bazel_rules_go//proto:go_grpc",

  proto = ":transceiver_proto",

  importpath = "transceiver",

  deps = [":transmission_object_go_proto",],

  visibility = ["//server/echo_server:__pkg__"],

  )

  java_proto_library(

  name = "transceiver_java_proto",

  deps = [":transceiver_proto"],

  visibility = ["//client/echo_client:__subpackages__"],

  )

  load("@io_grpc_grpc_java//:java_grpc_library.bzl", "java_grpc_library")

  java_grpc_library(

  name = "transceiver_java_proto_grpc",

  srcs = [":transceiver_proto"],

  deps = [":transceiver_java_proto"],

  visibility = ["//client/echo_client:__subpackages__"],

  )

  Listing 8-3

  Defining the build targets for the Transceiver service

  ```


  将文件保存到 `proto/BUILD`。


  和 proto 代码一样，我们来看看这里新增了什么。第一个新构建目标看起来应该很熟悉；它只是为 `transceiver.proto` 文件定义了 `proto_library`
  目标。类似地，`transceiver_java_proto` 也应该很熟悉，因为它定义了 `transceiver.proto` 的 Java 版本构建目标*。*


  `transceiver_go_proto_grpc` 与我们之前看到的内容非常相似；主要区别是在 `go_proto_library` 目标中新增了 *compiler*
  指令。它定义了在编译该目标以支持 gRPC 时应使用的规则。我们使用的是 `@io_bazel_rules_go` 依赖中的标准规则。


  由于我们只在服务端使用 Go，因此将可见性设置为仅服务端子包可见。


  `java_grpc_library` 执行的是类似工作，不过它定义的是 Java 所需的目标。与之对应地，我们将可见性设置为仅客户端子包可见。


  为了确认一切正常，让我们构建该包中的所有目标：


  ```

  chapter_08$ bazel build proto:all

  INFO: Analysed 7 targets (0 packages loaded, 0 targets configured).

  INFO: Found 7 targets...

  INFO: Elapsed time: 0.316s, Critical Path: 0.07s

  INFO: 3 processes: 3 darwin-sandbox.

  INFO: Build completed successfully, 4 total actions

  ```


  ## 将客户端升级为使用 gRPC


  在定义好 gRPC 接口之后，我们现在将客户端升级为使用它。总体而言，代码看起来会与我们之前做的非常相似。我们将重点说明基础版本所需的一些变更。


  我们之前创建了一个显式传输序列化对象的 Java 客户端。现在我们将做一些修改以支持 gRPC。


  打开 `client/echo_client/command_line/EchoClient.java`。


  ```

  import io.grpc.ManagedChannel;

  import io.grpc.ManagedChannelBuilder;

  import java.io.BufferedReader;

  import java.io.InputStreamReader;

  import transmission_object.TransmissionObjectOuterClass.TransmissionObject;

  import transceiver.TransceiverOuterClass.EchoRequest;

  import transceiver.TransceiverOuterClass.EchoResponse;

  import transceiver.TransceiverGrpc;

  public class EchoClient {

  public static void main(String args[]) {

  System.out.println("Spinning up the Echo Client in Java...");

  try {

  final BufferedReader commandLineInput = new BufferedReader(new InputStreamReader(System.in));

  System.out.println("Waiting on input from the user...");

  final String inputFromUser = commandLineInput.readLine();

  if (inputFromUser != null) {

  ManagedChannel channel =

  ManagedChannelBuilder

  .forAddress("localhost", 1234)

  .usePlaintext()

  .build();

  TransceiverGrpc.TransceiverBlockingStub stub =

  TransceiverGrpc.newBlockingStub(channel);

  EchoRequest request =  EchoRequest.newBuilder()

  .setFromClient(

  TransmissionObject.newBuilder()

  .setMessage(inputFromUser)

  .setValue(3.145f)

  .build())

  .build();

  EchoResponse response = stub.echo(request);

  System.out.println("Received Message from server: ");

  System.out.println(response);

  channel.shutdownNow();

  }

  } catch (Exception e) {

  System.err.println("Error: " + e);

  }

  }

  }

  Listing 8-4

  Using gRPC on the client side

  ```


  将文件保存到 `client/echo_client/command_line/EchoClient.java`。


  再花一点时间审视这些改动：我们首先创建一个 `ManagedChannel`，以在特定端口上打开通道。然后使用它来创建一个 stub（`TransceiverBlockingStub`*）*，用于实际发起
  RPC。为简化起见，我们使用最基础的 stub，它会对该服务的所有 RPC 发起阻塞调用（stub 还有其他更灵活的版本，但不在本书讨论范围内）。


  stub 提供了本地方法，这些方法会通过通道转发调用。一旦创建完成，调用 RPC 就和调用本地方法一样简单。构造请求后，将其用于调用相应方法，并获得预期响应。


  为完成功能，让我们在 `client/echo_client/command_line/BUILD` 文件中升级目标。与之前一样，原始目标的大部分内容保持不变，因此我们重点展示必要改动。


  ```

  java_binary(

  name = "command_line",

  srcs = ["EchoClient.java"],

  main_class = "EchoClient",

  runtime_deps = [

  "@io_grpc_grpc_java//netty",

  ],

  deps = [

  "//proto:transmission_object_java_proto",

  "//proto:transceiver_java_proto",

  "//proto:transceiver_java_proto_grpc",

  "@io_grpc_grpc_java//api",

  ]

  )

  Listing 8-5

  Modifications for EchoClient to support gRPC

  ```


  将文件保存到 *client/echo_client/command_line/BUILD*。


  正如此时你可能已经很清楚的那样，我们新增了来自 *proto* 子包的新依赖。此外，我们还添加了一个常规静态依赖 `(@io_grpc_grpc_java//api`)
  以及一个新的运行时依赖 `(@io_grpc_grpc_java//netty`)。


  在后者这种情况下，我们将其指定为运行时依赖，因为代码中并没有显式请求它。如果你尝试移除 *runtime_deps*，会发现程序构建仍然完全正常。然而，一旦尝试运行程序，就会出现错误信息，提示需要该运行时依赖。


