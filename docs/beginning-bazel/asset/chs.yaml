  选择要模拟的特定 iOS 设备


  这将创建一个 iPhone Xs 设备模拟器实例。


  ![../images/481224_1_En_10_Chapter/481224_1_En_10_Fig3_HTML.jpg](img/481224_1_En_10_Fig3_HTML.jpg)


  图 10-3


  针对该设备的 iOS 模拟器启动界面


  现在你已经准备好在模拟器上运行该应用了。




  ### 在 Xcode 模拟器上执行应用程序


  在上一章中，我们可以使用 `bazel mobile-install <android_target>` 来构建并将应用直接安装到 Android 模拟器上。遗憾的是，`mobile-install`
  仅适用于 Android 模拟器实例；我们不能对 iOS 项目使用完全相同的流程。尝试这样做会*构建*成功，但不会在模拟器中实际*执行*该目标。


  我们可以通过直接使用一些 Xcode 命令来达到与 `mobile-install` 近似的效果。首先，确保构建目标是完全最新的。我们需要特别留意生成的 .ipa
  文件位置：


  ```

  chapter_10/client/echo_client/ios$ bazel build :EchoClient

