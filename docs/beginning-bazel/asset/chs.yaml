  ## 总结：重复劳动


  使用 JSON 的一个不幸现实是，我们需要为每种语言重复定义数据。一旦数据契约发生变化，就意味着每一处数据定义实例都需要修改。这个过程很容易出错，而且尽管比简单的字符串传输更好，仍然存在不少缺陷。


  如前所述，Bazel 最擅长的领域之一是多语言支持；在下一章中，我们将利用这一能力，为我们的项目加入 Protocol Buffer 支持。


  ### 练习——Python 客户端和/或服务器


  和 Go 一样，Python 也提供了一些便捷能力，可在 JSON 与 Python 对象之间进行编组/反编组。请用 Python 创建一个新的客户端或服务器。


  '
- "# 6. Protocol Buffers 与 Bazel\n\n在上一章中，你创建了一个简单的 echo 服务器和客户端，展示了 Bazel 在仅需最少配置的情况下，驾驭和管理多语言的一部分能力。那个示例中一个明显的缺点来自于传输对象的定义：两种语言都需要各自独立地定义该对象。随着时间推移，这很容易导致通信的“字面崩溃”——两个（或更多）传输对象定义逐渐失去同步。\n\
  \n在本章中，我们将引入一种专门解决这一问题的机制：*Protocol Buffer*（通常称为 *protobuf*）*。*Protocol Buffers\
  \ 同样是 Google 的产物，它提供了一种声明式且类型安全的方式来描述对象结构，并提供用于序列化的线传输格式。Protocol Buffer 的定义在本质上与语言无关。定义完成后，可以将其编译为特定语言版本（Protocol\
  \ Buffers 支持大量语言），从而把线传输格式读写为该语言的原生对象。\n\n虽然 Protocol Buffers 并不与 Bazel 强绑定，但 Bazel\
  \ 对它提供了非常出色的支持，使其易于添加到项目中，并在多语言间复用。此外，借助 Bazel 的依赖管理，也可以非常轻松地在 Protocol Buffer 定义处做出修改，并确保所有依赖项目至少能够基于新定义通过编译。\n\
  \n## 设置你的工作区\n\n首先，我们会在 `WORKSPACE` 文件中加入一些用于 Protocol Buffers 的基础支持。先为本章工作创建一个新目录：\n\
