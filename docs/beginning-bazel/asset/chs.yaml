  Implementing the gRPC interface on the server side

  ```


  保存对 `server/echo_server/echo_server.go` 的修改。


  再次退一步，看看主要变更。在这个例子中，你创建了一个 Go 结构体 `EchoServer`，它有一个特殊命名的方法 `Echo`。


  `Echo` 方法接收一个 `Context` 对象和我们在 protobuf 定义中定义的 `EchoRequest`，并返回 `EchoResponse`
  对象。这个方法满足了接口定义所要求的契约。就功能而言，虽然方法体与之前版本略有不同，但你应该能识别出相同的功能逻辑。


  ```

  Within the body of main, we created a new server and registered our EchoServer.
  Having completed the setup, we then just start listening to incoming messages.

  ```


