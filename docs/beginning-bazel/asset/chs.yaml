  到目前为止，本书的重点主要放在实际上运行于后端的功能上。也就是说，迄今创建的客户端和服务器都很容易作为后端服务彼此通信的代理。


  尽管后续仍将继续围绕“通信”这一主题展开，但我们将开始关注如何使用 Bazel 构建纯客户端功能，即移动应用。我们将再次大量依赖 Bazel 跨语言无缝协作的能力来创建这些应用。


