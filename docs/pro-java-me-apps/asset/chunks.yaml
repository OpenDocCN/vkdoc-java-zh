    After a `ServerImplementation` instance has been initialized, the most basic operation
    it can perform is to log in a user.


    Given the fact that we have to support both username-and-password authentication
    and single-access tokens in a congruent manner, our login requirements are as
    follows: first, the application should try to log in by using a username and password
    combination. If this combination cannot be provided or is not valid, the application
    should use single-access tokens instead. If the tokens aren''t provided or are
    invalid, the application will consider that the authentication process has failed.


    If you recall from the previous chapter, we will use the `UserCredentials` data
    type for providing authentication information. `UserCredentials` has support for
    both username-and-password authentication and single-access token authentication
    in the same data structure. This somewhat goes against the intuitive approach
    of using separate data types for each means of authentication—for example, `UsernamePasswordCredentials`
    and `TokenCredentials`.


    The reason the two are merged in a single data type is a simple one: by doing
    so, we can let the specialized `ServerImplementation` decide on its own which
    login method is best suited for any particular situation.


    The importance of this is best exemplified by the following scenario (adapted
    from a real-life project): application X is required to authenticate the user
    by using his or her username and password if the connection to the server is made
    via HTTPS over the cellular network, or by using tokens or other encrypted credentials
    if the connection is made via WiFi and/or HTTP.


    In this example, consider what happens if we do not provide all available credentials
    to the networking module in one data structure: it becomes the responsibility
    of other parts of the application to decide which specific credentials to provide.
    As per the requirements, this involves checking what types of connections are
    available, whether they are secure, etc. Since all of these tasks are logically
    part of the networking module but we do them somewhere else, we basically create
    “bleeding” from the networking module to other modules of the application—something
    we really want to avoid.


    However, if we provide all available credentials in one go and say, “Take your
    pick,” then the networking module can decide on its own which credentials to use,
    doing all the necessary checks internally—and in a more or less centralized fashion.
    This not only removes any potential “bleeding,” but also helps preserve the code''s
    structure and readability, the application''s logic, and the developer''s sanity
    (it is very frustrating and time-consuming to go hunting throughout the entire
    application for “that one line that does that one check”).


    This advice applies not only to the networking module—it is general advice. Especially
    with high-level operations, it is a good idea to provide all the information you
    have and let the specialized modules of the application decide internally what
    information to use and what information to discard.


    We now go back to our Twitter client. Apart from the actual authentication code,
    there is one more thing that is needed for the login process to be properly implemented:
    events.


    For one thing, we want to be able to trigger a login by using events. For this,
    we will implement support for a `BEGIN_LOGIN` event. We also need to generate
    events for when the login fails or succeeds, which is what `LOGIN_FAILED` and
    `LOGIN_SUCCEEDED` will do. In order to implement these events, we must first define
    them. Make sure that your `EVT` looks something like the one in [Listing 4–4](#Chapter04.html#list_4_4).


    **Listing 4–4.** *Login Events Defined*


    `public class EVT`

    `{`

    `    public class CONTEXT`

    `    {`

    `...`

    `        public static final int NETWORKING_MODULE = 4;`

    `    }`


    `    ...`


    `    public class NETWORK`

    `    {`

    `        public static final int BEGIN_LOGIN=30001;`

    `        public static final int LOGIN_FAILED=30002;`

    `        public static final int LOGIN_SUCCEEDED=30003;`

    `    }`


    `}`


    It''s now time for the actual implementation. First, the main `login()` method
    of `ServerImplementation` is shown in [Listing 4–5](#Chapter04.html#list_4_5).


    **Listing 4–5.** *The `login()` Method*


    `public boolean login(UserCredentials credentials)`

    `{`

    `        boolean success = false ;`


    `        // First, try to log in using username and password`

    `        if ( credentials.getUsername()!= null && credentials.getPassword()!=
    null )`

    `        {`

    `                success = loginUsingUnPw(credentials.getUsername(),`

    `                credentials.getPassword() );`

    `        }`

    `        // If that fails, try using tokens`

    `        if ( success == false )`

    `        {`


    `                if ( credentials.getAccessToken() != null &&`

    `                credentials.getAccessTokenSecret() != null )`

    `                {`

    `                        success = loginUsingTokens(credentials.getAccessToken(),`

    `                        credentials.getAccessTokenSecret() );`

    `                }`

    `        }`


    `        // Generate the appropriate event`

    `        if ( success )`

    `        {`

    `                Event evt = new Event ( EVT.CONTEXT.NETWORKING_MODULE,`

    `                EVT.NETWORK.LOGIN_SUCCEEDED, credentials);`

    `                eventController.queueEvent(evt);`

    `        }`

    `        else`

    `        {`

    `                Event evt = new Event ( EVT.CONTEXT.NETWORKING_MODULE,`

    `                EVT.NETWORK.LOGIN_FAILED, credentials);`

    `                eventController.queueEvent(evt);`

    `        }`


    `        return success;`

    `}`


    Next it is time to implement the actual login methods, `loginUsingUnPw()` and
    `loginUsingTokens()`. Both methods are presented in [Listing 4–6](#Chapter04.html#list_4_6).
