    由于这是一个垂直容器，我们只关心 `UP` 和 `DOWN` 按键的按下事件；其他所有按键均被忽略。展示如何处理 `UP` 键的代码已高亮显示；`DOWN`
    键的处理代码类似，此处不再赘述。


    思考当返回 `false` 时会发生什么，是件有趣的事——例如，当没有上一个控件可以聚焦时。返回 `false` 将向父容器发出信号，表明它应该处理该按键事件。


    如果按键事件导致父容器移动焦点，那么此容器上的 `onLostFocus()` 将被调用。这反过来会导致已聚焦控件（也可能是容器）上的 `onLostFocus()`
    被调用。当所有 `onLostFocus()` 调用完成后，父控制器将调用新控件上的 `onFocus()`，这可能会引发另一系列级联调用。最后，当一切尘埃落定，父控制器的
