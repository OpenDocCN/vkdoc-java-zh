  trans: '

    ## 正确的 Java ME 思维模式


    到目前为止，本书主要讨论了创建 Java ME 应用程序的技术层面。虽然这显然是 Java ME 应用程序开发中最重要的方面，但还有另一个方面有时与技术方面同样重要：即你处理开发过程的思维模式。


    为了理解为何拥有正确的思维模式对 Java ME 开发至关重要，有必要指出，每个软件平台（无论是移动平台还是其他平台）往往都有一套与之相关的特定开发方法论。这要么是由平台创建者强加的（通过提供“最佳实践”文档并相应构建
    API），要么是随着平台获得关注和发展而自然形成的。此外，随着平台范围和底层硬件技术的变化，开发方法论也往往会随时间而改变。


    Java ME 在这些方面有些独特。它最初被设想在极其受限的设备上运行，但现在也支持在（相对）非常强大的设备上运行；而在实践中，你经常需要同时支持这两种硬件类别。由于新旧
    Java ME 硬件目前都在使用，因此没有通用的“最佳实践”可以遵循，也没有通用的开发方法论；在旧硬件上有效的方法可能在新硬件上无效，反之亦然。有一些通用技巧你可以在所有情况下考虑（其中最重要的已在第
    1 章中列举），但仅此而已。


    然后是 Java ME API 本身，它被设计得尽可能简单，以便能在尽可能多的设备上使用。这意味着，为了完成更复杂的工作，你经常需要发挥创造力，并自行实现许多在其他平台上你认为是理所当然的功能，从简单的实用方法（如字符串匹配）到复杂的功能（如序列化）。决定为了实现目标需要实现哪些功能（同时注意项目在资源和目标硬件方面的限制），以及如何实现它们，这本身往往是一门艺术——而在这方面做出的决策会影响整个开发过程。


    最后，你还必须考虑正在编写的应用程序类型，因为这通常决定了你如何在用户界面、灵活性和功能性之间分配可用资源。有时用户界面比实际功能更重要，而其他时候则相反，或者应用程序的灵活性（其在多种不同环境中运行的能力）是其最重要的特性。在这里做出正确的决策对于应用程序的成功至关重要。


    基于这些原因，拥有正确的思维模式——一套指导你如何处理任何给定应用程序开发的核心原则——对于任何 Java ME 项目的成功都至关重要。这些原则帮助你理解
    Java ME 作为一个平台在特定场景下能做什么和不能做什么，并且它们可以帮助你确定在特定情况下你*应该*和*不应该*做什么。


    在本章中，我们将探讨正确的 Java ME 开发思维模式是什么，并尝试通过几个实际例子来演示它。


    **注意：** 当然，本章描述的原则也可以应用于其他平台。然而，它们对其他平台的适用程度远低于对 Java ME 的适用程度；Java ME 从这些原则中获益最多，仅仅是因为其更具约束性和更低容错性的本质。


    ### Java ME 的强大程度取决于其运行的设备


    令人惊讶的是，有多少人倾向于脱离底层硬件来单独评判 Java ME 平台。当然，仅根据平台规格来评判它感觉是直观的，但对于 Java ME 来说，这完全是错误的。原因在于，虽然
    Java ME 本身在能力方面并非天赋异禀，但它确实有改进和扩展这些能力的条款——而这些条款可以带来天壤之别。


    例如，Java ME 的默认图形能力以今天的标准来看极其有限。然而，正如我们在前一章中所见，你可以显著扩展这些能力，并将 Java ME 提升到与现代平台相同的水平。这项努力中唯一的限制因素是底层硬件的处理能力。换句话说，大多数时候问题不在于能否用
    Java ME 实现（通常是可以实现的）；问题在于能否在当前的硬件上实现。这同样适用于 Java ME 缺乏或发展不足的许多其他特性或能力。


    此外，虽然设备的硬件极其重要，但该设备支持的可选能力也同样重要。这包括可选的 JSR 和供应商特定的扩展，两者在决定项目的可行性方面都可能产生巨大影响。某些
    JSR 和扩展对于特定项目至关重要；例如，如果你计划编写一个文件管理器应用程序，那么文件连接 API 的支持就至关重要。其他一些虽然不是关键，但能极大地提高应用程序的性能或灵活性。例如，诺基亚的
    UI 扩展有一个 `fillPolygon()` 方法，可用于快速填充屏幕上的多边形区域。如果没有这个扩展，你将不得不编写自己的填充例程，这会慢得多。


    那么这一切意味着什么？首先，这意味着虽然 Java ME 在低端设备上确实是一个受限的平台，但当你瞄准高端设备并充分利用其潜力时，它可以成为一个相当灵活的开发平台；并且在低端设备上不可行的项目在高端设备上可能是可行的。硬件和平台应该作为一个整体来评判，而不是分开评判。在评估一个项目是否可行以及可行到什么程度时，认识到这一点很重要。


    其次，这意味着为了从目标设备中获得最大收益（或者为了在功能方面使它们处于公平的竞争环境），你将不得不大量依赖第三方库，或者自行编写代码来添加缺失的功能和/或改进现有功能。这给开发方程增加了一层额外的复杂性，并且还要求你作为开发者，熟悉你需要使用的各种第三方库和/或它们背后的思想和算法。换句话说，如果你真的想在给定的目标设备上创建尽可能最好的应用程序，你必须做好研究并亲自动手。


    第三，这意味着随着用户对移动应用程序（尤其是 Java ME 应用程序）的期望不断提高，你通常可以利用普通手机计算能力的提升来满足这些期望。当然，这需要你付出越来越多的努力，因为你必须为核心平台添加越来越多新的特性和功能才能跟上步伐。幸运的是，第三方工具和库也在不断发展，这缓解了这一问题。总的来说，这意味着整个
    Java ME 平台在持续演进。

    '
- fmt: '# 排版后的内容


    One of my first freelance projects is a good example to illustrate the foregoing
    points. We were targeting only mid-level devices for this project, and a core
    requirement was the ability to be able to save and restore the application’s state
    at any given time; in other words, serialization. Serialization isn’t built into
    Java ME, so we turned our attention to some of the Java ME serialization libraries/frameworks
    out there. After a bit of digging, we decided to give one of the more obscure
    libraries a go. It wasn’t the most feature-rich library, but it was simple, fast,
    and under active development, so we decided to go with it.


    Things went well in the early stages of development. However, midway through the
    development process, we were required to support a very popular but low-end device.
    Its performance was OK for what we needed...in all respects except serialization.
    Whenever we needed to serialize something, the device slowed to a crawl. Using
    another library was out of the question at that point, as was rolling out our
    own serialization library. After a few experiments, we concluded that the problem
    was in the platform’s RMS implementation: each individual write request would
    simply take too long. This was actually good news for us, as we feared that the
    low-end device was not powerful enough to handle the load.


    What we ended up doing was altering the library a bit so that we buffered serialization
    requests to the same record and committed them only every 20 seconds or every
    5–10 requests (whichever came first). This improved serialization performance
    tremendously and leveled the playing field in terms of perceived performance between
    the mid-level devices and the low-end one.


    However, as more and more features were requested by the client, the low-end device
    started to lag behind in terms of performance. In the end, we had to cut support
    for the low-end device; its hardware was simply not up for the job. At the same
    time, the mid-level devices were behaving quite well and, aside from the occasional
    minor slowdown, the application ran smoothly. The application at hand was the
    same one on both types of devices, using the same APIs in the same way. The limiting
    factor in our case (and, indeed, in most cases) was clearly not the application
    or the platform itself, but the hardware it was running on. This is an important
    point to fully grasp because of its indirect implications.


    The most important of these implications is the fact that the cool proof-of-concept
    demo you are showing off today will, in fact, be a standard feature in tomorrow’s
    applications. This means that, as a Java ME developer, you should always experiment
    with new ideas, new techniques, and new projects, pushing the limits of what can
    be done with Java ME today, because you’ll be able to put your experiments into
    practice on tomorrow’s hardware. In other words, you should always stay ahead
    of the hardware curve, and thus ahead of the competition.


    Another important implication of this is that, especially on long-haul projects,
    the application you are writing can be improved considerably over time in terms
    of performance and features as the “average hardware” becomes more and more powerful—and
    you may, in fact, be forced to do so in order to keep your application competitive.
    This means that you should take the application’s estimated lifespan and development
    time into consideration when making technical decisions such as what architecture
    and libraries to use. If you expect your application to be around for a while,
    aim for freedom and flexibility. Even if this initially ends up costing you a
    little in terms performance, in the long run the performance loss is negligible,
    but the development benefits are not.


    For example, about one year after the original project was finished, the client
    approached us again and asked me if we were interested in working on the application
    further; this time the “low end” of the device spectrum was represented by the
    original mid-level device, while the “high end” of the device spectrum consisted
    of a couple of newly released phones. Because of this, we ended up adding many
    visual effects and improving the overall user experience to keep it up to date.


    A couple of months after that, the customer approached us again, and he wanted
    a wholly revamped UI. This meant using a different UI toolkit. Initially, the
    UI was somewhat intimately tied to application functionality in several key places,
    for performance reasons, because we did not expect the application to be under
    development and still active in its initial incarnation after two years, and because
    the initial hardware we were targeting was low-end, so we needed all the performance
    we could get. Because of this tight connection between UI and functionality, changing
    the UI toolkit involved quite a bit of application refactoring, which could have
    been easily avoided had we known the application’s “roadmap” from the start (this
    particular point is discussed in more detail later in the chapter).'
