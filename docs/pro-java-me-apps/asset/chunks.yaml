  trans: '

    #### 代码许可


    如果可能，请选择开源或双许可的移植框架。目标是能够拥有、使用或修改尽可能多的代码，并能与他人共享这些代码（用于提出建议、报告错误等）。


    除了明显的商业影响外，封闭或限制性的代码许可意味着了解代码和框架本身的人更少，因此当你遇到问题时，能够帮助你的人也相应减少。此外，如果开发或支持该产品的公司倒闭，你可能会面临完全失去支持且代码库不再更新的风险。


    另一方面，开源或双许可意味着更新更频繁，因为更多人能够贡献代码，并且这也为母公司倒闭提供了一定的保障，因为开源社区可以自行继续开发。


    封闭源代码与开源之间的差异在 Java ME 世界中极为重要。在桌面或服务器端，你的代码可以在数年甚至数十年内拥有相对稳定的环境。而在 Java ME 世界中，变化如此频繁，以至于你的代码今天可能运行良好，明天却因固件更新而崩溃。开源项目几乎总是比闭源项目反应更快、覆盖更广。


    ### 交叉开发与移植工具


    如今有相当丰富的交叉开发与移植工具可供选择。在本节中，让我们简要了解其中一些工具。


    首先，Sun 的轻量级 UI 工具包（LWUIT）是一个出色的 UI 框架，支持当今大多数满足其最低规格（CLDC 1.1 / MIDP 2.0）的 Java
    ME 设备。使用 LWUIT，你将能够创建外观精美的用户界面，并轻松地在不同设备间进行移植。LWUIT 在 GPL 许可（源代码形式）和 Sun 许可协议（二进制形式）下均可使用。


    其次，Enough Software 的 J2ME Polish 是一个功能完备的移植套件，不仅提供丰富的 UI 框架，还提供其他实用功能：强大的预处理器、序列化支持、远程方法调用支持、外部工具等。它可以将你的
    Java ME 应用程序移植到不同设备型号和厂商，以及 Blackberry 和 Android 平台。它采用 GPL 和商业许可两种方式。


    Mobile Distillery 的 Celsius 是另一个强大的移植工具。与 J2ME Polish 类似，它可以自动将你的 Java ME 应用程序移植到不同设备、厂商和平台。Celsius
    的主要重点是高效地移植源代码，并尽量减少任何给定应用程序所需的特定设备构建数量。Celsius 采用商业许可。


    最后但同样重要的是 Metismo 创建的 Bedrock。Bedrock 的范围比 Celsius 和 J2ME Polish 更广，因为它不仅允许你将
    Java ME 应用程序移植到手机，还能移植到各种其他设备。例如，它可以针对索尼的 PSP 和任天堂的 DS 等平台。Bedrock 采用商业许可。


    ### 总结


    在本章中，我们探讨了设备碎片化问题。我们研究了它的来源、可以细分为哪些子类型，以及如何处理每种类型的碎片化问题。


    我们还研究了移植框架如何帮助缓解碎片化问题，以及如何从技术角度比较不同的移植框架。


    在下一章中，我们将探讨如何优化应用程序的代码。


    ## 第 10 章


    ## 优化你的代码


    仅次于设备碎片化，你在编写 Java ME 应用程序时遇到的最严重问题是 CPU 性能不足。典型的 Java ME 设备提供的 CPU 性能非常有限，通常足以流畅运行简单应用程序，但不足以运行具有大量后台任务和花哨用户界面的更复杂应用程序。虽然这无法避免，但可以通过优化代码和算法来最小化其对应用程序的影响。


    关于这一点，既有好消息也有坏消息。好消息是，通过优化代码，你可以毫不费力地获得 10–20% 的速度提升，在某些情况下，速度提升可达 200% 甚至更多，典型的速度提升在
    30% 到 50% 之间。坏消息是，你必须手动优化代码。


    为什么必须手动优化代码？问得好——首先，因为 `javac`（官方的 Java 编译器，也是你很可能使用的编译器）实际上并不会优化你的代码。Java 依赖于即时编译器（JVM
    的一部分）在运行时优化 `javac` 生成的字节码，并可选择将其转换为原生代码（速度显著更快）。大多数手机上找到的 JVM 并没有即时编译器。这意味着 `javac`
    生成的 Java 字节码通常按原样执行，没有任何性能优化应用于它——而这些优化在针对完整的 JVM 时通常是默认应用的。


    其次，因为即使你使用能够在构建时优化字节码的编译器，它的能力也是有限的。当然，与 `javac` 生成的未优化字节码相比，你肯定会获得性能提升，但如果你自己优化代码，还可以额外获得
    20–30% 的改进（有时甚至更多）。请记住，编译器不知道你针对的设备及其特性，不知道代码代表什么算法，也不知道你实际希望代码做什么（可以说，不知道你的意图）。它在优化代码时无法考虑这些因素——但你可以。


    在本章中，我们将探讨适用于 Java ME 开发的最重要的代码优化技术，从简单的技术如快速代码路径切换和代码内联，到更高级的技术如数学表达式优化和变量局部性改进。


    我们还将研究如何正确比较算法，以及使用哪些算法来搜索和排序数据。最后，我们将探讨重要的编程技术，如对象池（用于消除对象创建）和动态规划（用于消除递归）。

    '
- fmt: '### A Crash Course in Optimizing Code


    Code optimization is a delicate affair. In theory, the goal is to get the CPU
    to execute a given task in as little time as possible; however, in real life,
    limitations such as memory size and I/O speed must be taken into account, so in
    practice the goal is really to get the CPU to execute a given task in as little
    time as possible while keeping resource consumption below a certain threshold.
    For example, an array lookup is faster than a multiplication, so you could keep
    a multiplication table in memory for all possible multiplication you can do between
    two `ints`—the problem is that in real life there probably aren''t enough memory
    cells in the world to store this table.


    You can optimize code in two ways: by “rephrasing” the code and by optimizing
    the underlying algorithm. To rephrase the code means to convert it into an equivalent
    but faster form. The optimization techniques that cover this can be applied successfully
    to almost any code fragment, with measurable performance improvements (typically
    10–30%). If platform-specific knowledge is applied, the performance improvement
    can be even greater.


    As an example of applied platform-specific knowledge, consider that any JVM is
    stack-based. As such, most JVMs try to keep the top of the stack (first X elements)
    in the CPU registers or in the CPU cache, both of which are considerably faster
    than the RAM. Values further down the stack must be read from memory, thus incurring
    a performance hit. Knowing the value of X means that you can write your code so
    that you attempt to minimize the number of memory reads that the JVM needs to
    do, thus improving performance.


    Optimizing algorithms is an entirely different beast. Here, you are not concerned
    with the low-level details; you instead focus on the general idea of what you
    want to do. For example, if your goal is to sort a list of 1,000 contacts by name,
    then your task would be to find a more efficient *theoretical* way of doing this,
    maybe by replacing your selection sort algorithm with something faster, such as
    quicksort. The keyword here is “theoretical”: algorithm optimization is done almost
    exclusively on paper, and the tools of the trade are abstract notions such as
    the Big O notation and general programming techniques such as dynamic programming,
    as well as a keen sense of intuition and good logic and mathematical skills.


    Furthermore, the theoretical improvements an algorithm brings may not reflect
    themselves in real life, for a variety of reasons. For example, the algorithm''s
    code might be large enough to require a lot of code page changes at the hardware
    level, thus incurring a big performance hit. Or it may rely on slow I/O operations,
    or a lot of method calls (which are again slow), or on creating a lot of objects,
    etc. All these factors do not manifest themselves on paper, but are almost immediately
    visible in real life.


    It should also be noted that algorithm optimizations cannot be applied in all
    situations (there is little you can optimize in the algorithm of summing up a
    list of 1,000 numbers, for example), but when you can apply them, the results
    are usually spectacular. Depending on the scenario, a 50% real-world improvement
    is very common, with 200–300% improvements often seen. Even better, if you manage
    to find a suitable algorithm, the performance improvements scale exponentially
    instead of linearly, which means that for larger sets of input data, the performance
    difference over the original algorithm is measured in orders of magnitude.


    Optimizing code and algorithms (especially the former) does have one big disadvantage:
    it tends to increase code size and decrease readability, as well as introduce
    the potential for more bugs due to corner cases. It can also take a significant
    amount of time and manpower to do properly. Because of this, you should apply
    optimizations only to performance-critical areas of the application, which are
    usually easily identified by using a profiler as being the areas of code that
    the CPU spends the most time executing. The 80-20 rule usually applies here, so
    usually 80% of the CPU time is spent running 20% of the code (sometimes even less,
    5% or even 1%). An improvement in these critical areas will have a huge impact
    on performance, while at the same time providing the best possible risk/reward
    (risk as measured in terms of problems) and effort/reward (effort as measured
    in terms of time and manpower) ratios.


    Knowing when to choose one type of optimization over the other is also important.
    You should always choose to optimize the code rather than the algorithm if the
    needed performance improvement is small, such as 10–15%. For larger improvements,
    the best course of action would be to try and optimize the algorithm used (though,
    as stated, this is not always possible). If you''re running short on time, you
    should probably go with optimizing the code (unless you know a better algorithm
    and are confident that you can implement it in time).


    **NOTE:** In this chapter, we will look mostly at code optimizations, due to their
    always-applicable nature. Algorithm optimization is a far more difficult subject
    (and mostly outside the scope of this book), so it will be touched only lightly.


    Code optimizations work on two vectors. First, there is the direct vector, in
    which the code''s execution speed in terms of CPU cycles is improved. This is
    by far the most prominent optimization vector, and the most effective one. It
    is also what most people have in mind when you mention “code optimization” to
    them.


    However, there is also a secondary optimization vector, the indirect one. This
    vector optimizes the actual execution speed in terms of *real-life time*, not
    in terms of CPU cycles. This may sound a bit confusing, but consider that executing
    a CPU operation requires that the data needed for that operation be available
    too. If that data is not already in the CPU''s registers, then you have to read
    it from the cache, from memory, or worse, via I/O operations. This takes time,
    time in which the CPU sits idle. Add a virtual machine on top of that, as is the
    case with Java ME, and suddenly you''ll realize that quite a bit of CPU time is
    lost *not* running your application code.


    With Java ME, you have little to no control over what the hardware does; however,
    you do have control over what the JVM does and how it does it, albeit indirectly.
    By minimizing the JVM''s “downtime,” you can increase your application''s performance.
    You can minimize this downtime by making the JVM''s life easier: use fewer variables,
    keep code and related data closer together, write your math expressions in a JVM-friendly
    way, etc. These will all be covered in this chapter.


    ### Code Optimization Techniques


    In this section, we will cover the most important code optimization techniques
    you can use to speed up your Java ME applications.'
  raw: '### A Crash Course in Optimizing Code


    Code optimization is a delicate affair. In theory, the goal is to get the CPU
    to execute a given task in as little time as possible; however, in real life,
    limitations such as memory size and I/O speed must be taken into account, so in
    practice the goal is really to get the CPU to execute a given task in as little
    time as possible while keeping resource consumption below a certain threshold.
    For example, an array lookup is faster than a multiplication, so you could keep
    a multiplication table in memory for all possible multiplication you can do between
    two `ints`—the problem is that in real life there probably aren''t enough memory
    cells in the world to store this table.


    You can optimize code in two ways: by “rephrasing” the code and by optimizing
    the underlying algorithm. To rephrase the code means to convert it into an equivalent
    but faster form. The optimization techniques that cover this can be applied successfully
    to almost any code fragment, with measurable performance improvements (typically
    10–30%). If platform-specific knowledge is applied, the performance improvement
    can be even greater.


    As an example of applied platform-specific knowledge, consider that any JVM is
    stack-based. As such, most JVMs try to keep the top of the stack (first X elements)
    in the CPU registers or in the CPU cache, both of which are considerably faster
    than the RAM. Values further down the stack must be read from memory, thus incurring
    a performance hit. Knowing the value of X means that you can write your code so
    that you attempt to minimize the number of memory reads that the JVM needs to
    do, thus improving performance.


    Optimizing algorithms is an entirely different beast. Here, you are not concerned
    with the low-level details; you instead focus on the general idea of what you
    want to do. For example, if your goal is to sort a list of 1,000 contacts by name,
    then your task would be to find a more efficient *theoretical* way of doing this,
    maybe by replacing your selection sort algorithm with something faster, such as
    quicksort. The keyword here is “theoretical”: algorithm optimization is done almost
    exclusively on paper, and the tools of the trade are abstract notions such as
    the Big O notation and general programming techniques such as dynamic programming,
    as well as a keen sense of intuition and good logic and mathematical skills.


    Furthermore, the theoretical improvements an algorithm brings may not reflect
    themselves in real life, for a variety of reasons. For example, the algorithm''s
    code might be large enough to require a lot of code page changes at the hardware
    level, thus incurring a big performance hit. Or it may rely on slow I/O operations,
    or a lot of method calls (which are again slow), or on creating a lot of objects,
    etc. All these factors do not manifest themselves on paper, but are almost immediately
    visible in real life.


    It should also be noted that algorithm optimizations cannot be applied in all
    situations (there is little you can optimize in the algorithm of summing up a
    list of 1,000 numbers, for example), but when you can apply them, the results
    are usually spectacular. Depending on the scenario, a 50% real-world improvement
    is very common, with 200–300% improvements often seen. Even better, if you manage
    to find a suitable algorithm, the performance improvements scale exponentially
    instead of linearly, which means that for larger sets of input data, the performance
    difference over the original algorithm is measured in orders of magnitude.


    Optimizing code and algorithms (especially the former) does have one big disadvantage:
    it tends to increase code size and decrease readability, as well as introduce
    the potential for more bugs due to corner cases. It can also take a significant
    amount of time and manpower to do properly. Because of this, you should apply
    optimizations only to performance-critical areas of the application, which are
    usually easily identified by using a profiler as being the areas of code that
    the CPU spends the most time executing. The 80-20 rule usually applies here, so
    usually 80% of the CPU time is spent running 20% of the code (sometimes even less,
    5% or even 1%). An improvement in these critical areas will have a huge impact
    on performance, while at the same time providing the best possible risk/reward
    (risk as measured in terms of problems) and effort/reward (effort as measured
    in terms of time and manpower) ratios.


    Knowing when to choose one type of optimization over the other is also important.
    You should always choose to optimize the code rather than the algorithm if the
    needed performance improvement is small, such as 10–15%. For larger improvements,
    the best course of action would be to try and optimize the algorithm used (though,
    as stated, this is not always possible). If you''re running short on time, you
    should probably go with optimizing the code (unless you know a better algorithm
    and are confident that you can implement it in time).


    **NOTE:** In this chapter, we will look mostly at code optimizations, due to their
    always-applicable nature. Algorithm optimization is a far more difficult subject
    (and mostly outside the scope of this book), so it will be touched only lightly.


    Code optimizations work on two vectors. First, there is the direct vector, in
    which the code''s execution speed in terms of CPU cycles is improved. This is
    by far the most prominent optimization vector, and the most effective one. It
    is also what most people have in mind when you mention “code optimization” to
    them.


    However, there is also a secondary optimization vector, the indirect one. This
    vector optimizes the actual execution speed in terms of *real-life time*, not
    in terms of CPU cycles. This may sound a bit confusing, but consider that executing
    a CPU operation requires that the data needed for that operation be available
    too. If that data is not already in the CPU''s registers, then you have to read
    it from the cache, from memory, or worse, via I/O operations. This takes time,
    time in which the CPU sits idle. Add a virtual machine on top of that, as is the
    case with Java ME, and suddenly you''ll realize that quite a bit of CPU time is
    lost *not* running your application code.


    With Java ME, you have little to no control over what the hardware does; however,
    you do have control over what the JVM does and how it does it, albeit indirectly.
    By minimizing the JVM''s “downtime,” you can increase your application''s performance.
    You can minimize this downtime by making the JVM''s life easier: use fewer variables,
    keep code and related data closer together, write your math expressions in a JVM-friendly
    way, etc. These will all be covered in this chapter.


    ### Code Optimization Techniques


    In this section, we will cover the most important code optimization techniques
    you can use to speed up your Java ME applications.'
  trans: '

    ### 代码优化速成课


    代码优化是一件微妙的事情。理论上，目标是让 CPU 在尽可能短的时间内执行给定任务；然而，在现实中，必须考虑内存大小和 I/O 速度等限制，因此实际目标是：在将资源消耗控制在特定阈值以下的同时，让
    CPU 在尽可能短的时间内执行给定任务。例如，数组查找比乘法运算更快，因此你可以在内存中保存一个乘法表，用于所有两个`int`类型之间可能进行的乘法运算——问题在于，现实中可能全世界都没有足够的内存单元来存储这个表。


    你可以通过两种方式优化代码：一是“改写”代码，二是优化底层算法。改写代码意味着将其转换为等价但更快的形式。涵盖这一点的优化技术可以成功应用于几乎任何代码片段，并能带来可衡量的性能提升（通常为
    10–30%）。如果应用了特定平台的知识，性能提升甚至可能更大。


    作为应用特定平台知识的一个例子，考虑任何 JVM 都是基于栈的。因此，大多数 JVM 会尝试将栈顶（前 X 个元素）保存在 CPU 寄存器或 CPU 缓存中，这两者都比
    RAM 快得多。栈中更靠后的值必须从内存中读取，从而带来性能损失。了解 X 的值意味着你可以编写代码，尽量减少 JVM 需要执行的内存读取次数，从而提升性能。


    优化算法则完全是另一回事。在这里，你无需关注底层细节；而是专注于你想要完成任务的总体思路。例如，如果你的目标是对包含 1000 个联系人的列表按姓名排序，那么你的任务就是找到一种更高效的*理论*方法，比如用更快的算法（如快速排序）替换你的选择排序算法。这里的关键词是“理论”：算法优化几乎完全是在纸上完成的，所使用的工具是抽象概念，如大
    O 表示法，以及通用编程技术，如动态规划，再加上敏锐的直觉和良好的逻辑与数学能力。


    此外，由于多种原因，算法带来的理论改进可能无法在现实中体现出来。例如，算法的代码可能足够大，以至于在硬件层面需要大量的代码页切换，从而造成巨大的性能损失。或者它可能依赖于缓慢的
    I/O 操作、大量的方法调用（同样很慢），或者创建大量对象等。所有这些因素在纸上不会显现，但在现实中几乎立即可见。


    还应注意，算法优化并非在所有情况下都能应用（例如，对 1000 个数字求和的算法几乎没什么可优化的），但当你能够应用时，结果通常非常显著。根据场景不同，现实中实现
    50%的改进非常常见，200–300%的改进也经常出现。更棒的是，如果你设法找到了合适的算法，性能提升是指数级的而非线性的，这意味着对于更大的输入数据集，与原始算法的性能差异将以数量级来衡量。


    优化代码和算法（尤其是前者）确实有一个很大的缺点：它往往会增加代码量并降低可读性，同时由于边界情况而引入更多潜在的错误。此外，正确地进行优化可能需要大量的时间和人力。因此，你应该只对应用程序中性能关键的领域应用优化，这些领域通常可以通过使用性能分析器轻松识别，即
    CPU 花费最多时间执行的代码区域。这里通常适用 80-20 法则，即 80%的 CPU 时间用于运行 20%的代码（有时甚至更少，5%甚至 1%）。对这些关键领域的改进将对性能产生巨大影响，同时提供最佳的风险/回报（风险以问题数量衡量）和努力/回报（努力以时间和人力衡量）比率。


    知道何时选择一种优化类型而非另一种也很重要。如果所需的性能提升很小（例如 10–15%），你应该始终选择优化代码而非算法。对于更大的改进，最佳做法是尝试优化所使用的算法（尽管如前所述，这并非总是可行）。如果你时间紧迫，可能应该选择优化代码（除非你知道一个更好的算法，并且有信心能及时实现它）。


    **注意：** 在本章中，我们将主要关注代码优化，因为它们具有普遍适用性。算法优化是一个困难得多的主题（并且大多超出了本书的范围），因此只会简要提及。


    代码优化作用于两个方向。首先，是直接方向，即提高代码在 CPU 周期方面的执行速度。这是迄今为止最突出、最有效的优化方向。当你向人们提及“代码优化”时，这也是大多数人首先想到的。


    然而，还有第二个优化方向，即间接方向。这个方向优化的是*实际时间*方面的执行速度，而非 CPU 周期。这听起来可能有点令人困惑，但请考虑：执行一个 CPU
    操作需要该操作所需的数据也准备就绪。如果这些数据不在 CPU 寄存器中，那么你必须从缓存、内存中读取，或者更糟，通过 I/O 操作读取。这需要时间，而在这段时间里
    CPU 处于空闲状态。在此基础上再加上一个虚拟机（就像 Java ME 的情况），你会突然意识到，相当多的 CPU 时间都浪费在了*没有*运行你的应用程序代码上。


    对于 Java ME，你对硬件的操作几乎没有控制权；然而，你确实对 JVM 做什么以及如何做有一定的控制权，尽管是间接的。通过最小化 JVM 的“停机时间”，你可以提高应用程序的性能。你可以通过让
    JVM 的工作更轻松来最小化这种停机时间：使用更少的变量，将代码和相关数据保持得更紧密，以 JVM 友好的方式编写数学表达式等。这些内容都将在本章中介绍。


    ### 代码优化技术


    在本节中，我们将介绍你可以用来加速 Java ME 应用程序的最重要的代码优化技术。

    '
- fmt: '#### Fast Code Path Switching


    This basic optimization applies to `if...else` blocks and `switch` statements
    and is most effective within loops. What you need to do is put the most common
    cases at the top of the block/statement, with the least common cases at the end.


    Depending on the number of cases and the complexity of the conditions, the performance
    improvement this method brings can range from <1% (i.e., unnoticeable) to almost
    100% (seen, for example, in scenarios with one or more cases, and in which the
    condition for each case takes longer to evaluate than it does for the actual test
    case to execute).


    This optimization is extremely easy to implement; however, it does require a bit
    of profiling in order to arrange the various code paths in order of their frequency
    in real-life usage scenarios. In fact, it is this profiling step that is most
    important; if it''s not carried out properly, the whole point of this optimization
    is lost.


    Ideally, profiling is entirely theoretical: you can mathematically calculate the
    frequency of use for each code path and arrange them accordingly. However, most
    of the time code profiling has to be hands-on. In the case of hands-on profiling,
    you have two main options: you can either use a profiler and an emulator to see
    which code paths get accessed most often, or provide your testers with special-purpose
    debug builds that measure this.


    The latter is the preferred version, as it not only saves development time but
    also provides more down-to-earth and unbiased results. Because each person tends
    to have a different usage pattern, and because each person tests the application
    in different conditions and on real devices, the results obtained this way are
    considerably more reliable than those obtained by looking at the data obtained
    from a single person running the application on an emulator.


    Fast code path switching as a technique can be applied to any platform, mobile
    or otherwise; it is extremely effective for Java ME because, from my experience,
    `if` statements are one of the slowest things you can do with a mobile JVM, mostly
    because of the way JVMs typically work. Furthermore, this optimization can also
    be applied if you are using an already optimizing compiler, as the compiler has
    no way of knowing which case will get executed most often.


    #### Avoid Redundancy


    Try as much as possible to compute values only once (the precalculation technique
    presented earlier in the book is a great example) and try to avoid intermediate
    values. Having fewer intermediate values means having less variable allocation
    work to do and fewer variables to keep track of, which in turn means less work
    for the CPU and fewer memory/cache access operations. In addition, it also keeps
    the JVM''s stack cleaner, which also improves performance.


    This technique is usually not needed for full-blown JVMs, which can detect intermediate
    values and optimize the bytecode accordingly (for example, by removing the need
    for intermediate values altogether); however, since mobile JVMs execute the bytecode
    as is, this can result in a significant performance penalty, especially within
    loops. This is especially visible if you create or instantiate variables within
    loops.


    Probably one of the best ways to avoid redundancy is to simplify your math operations,
    especially within loops. Both of these optimizations will be covered shortly.


    #### Use Locality to Your Advantage


    The concept of locality refers to how close together in memory related code and
    data are. As with avoiding redundancy, keeping related code and data together
    means the CPU and memory subsystems have to do less work to run your code.


    With Java, you cannot know where in memory a certain block of code or a certain
    variable will be located; however, you can rewrite your code so that variables
    are grouped together within your expressions. This has the advantage of optimizing
    the JVM''s stack and memory usage, which in turn leads to extra performance.


    For example, consider the following expression:


    `expr1 = a * b + c * d + ... + y * z + a * z`


    You can clearly see that the variable `a` is used two times, at the beginning
    and at the start of the expression. The problem with this is that, by the time
    the second use of `a` gets evaluated, chances are `a` is no longer near the top
    of the stack, or in the CPU''s cache or registers. This means that it has to be
    fetched from memory, which requires extra work and lost CPU cycles. However, if
    we group together the uses of `a`, like so:


    `expr1 = c * d + ... + y * z + a * z + a * b`


    then there is a very high chance that `a` will be read from the CPU''s cache or
    registers, which is considerably faster. Granted, for a single access, the difference
    is negligible, but again, if you do this in a loop, all the small differences
    tend to add up.


    The one thing to observe in the foregoing example is that, in order to keep both
    `a` *and* `z` variables together, the first sub-expression (`a * b`) had to be
    moved at the end. If we had rewritten the expression like:


    `expr1 =+ a * b + a * z + c * d + ... + y * z`


    then the `a` variables would have been close together, but the `z` variables would
    have been far away from each other, thus negating the optimization.


    Unfortunately, a side effect of this rewriting is that the meaning behind the
    math is sometimes made unclear; in our example, the neatness and intuitiveness
    of the series are lost.'
