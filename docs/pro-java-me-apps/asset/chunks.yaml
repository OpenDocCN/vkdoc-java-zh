  raw: 'The reason I spent the last page or so explaining these concepts is that they
    are crucial for Java ME development. Unlike benchmark-based measurements, algorithm
    complexity measurements are the same across all devices and all JVMs, and are
    thus a lot more relevant to how good your application really is. Where applicable,
    they are also much better tools in determining what the problem areas are and
    where improvements are needed. At the same time, they are great indicators of
    code-related problems that might not be visible otherwise: if your implementation
    of an `O(n*log n)` algorithm performs on par with the other guy''s implementation
    of an `O(n^2)` algorithm, then you can be certain you have a real problem somewhere
    in your code.


    **NOTE:** The complexity of some algorithms simply can''t be expressed as a polynomial.
    This is common for adaptive and/or heuristic algorithms—for example, genetic algorithms
    (which start with a random solution and gradually “evolve” it until meets the
    problem''s acceptance criteria). Unless the alternative is really considerably
    worse, you should avoid algorithms such as these because their execution time
    is entirely unpredictable.


    #### Improving Your Algorithms


    Unfortunately, unlike optimizing code, optimizing algorithms has no definite “tips
    and tricks” cookbook. There are no techniques that you can apply to any given
    algorithm and get a better algorithm as a result. Each algorithm is unique, and
    the process of optimizing a given algorithm is as unique as the algorithm itself.


    There is, however, some good news. When working with algorithms, you''ll frequently
    come across a couple of core operations, much like you''ll frequently come across
    the concepts of variables and functions when working with code. These are *sorting*,
    *searching*, and *recursion*. In the following pages, we''ll look at how you can
    improve your algorithms by improving these operations.


    ##### Sorting


    Sorting means arranging a collection of objects in a certain order according to
    a given criteria. For example, you can sort people alphabetically by their names,
    or you can sort data packets from smallest to biggest according to their size.
    Sorting is a very common operation in algorithms, so it is worth it to examine
    more closely how sorting performance can be improved.


    Unlike J2SE or J2EE, Java ME doesn''t have any built-in provisions for sorting,
    which means that you have to roll out your own sorting algorithm and corresponding
    implementation. In most cases I''ve encountered, the algorithm used is selection
    sort or something similar, which, as we have seen previously, is an `O(n^2)` algorithm.
    Selection sort''s main strengths are its ease of implementation (it''s basically
    two nested `for` loops) and conceptual simplicity; however, its complexity makes
    it unsuitable for anything other than small input sets. From a complexity point
    of view, a much better alternative to selection sort is quicksort, which is an
    `O(n*log n)` algorithm in general, with a worst-case scenario of `O(n^2)`. In
    other words, in the worst possible case, quicksort is still as good as selection
    sort. By using quicksort in your algorithm''s implementation (instead of selection
    sort, for example), you can improve your application''s performance considerably.


    Quicksort works as follows: for a given input set, pick one of the elements to
    act as a pivot (typically the middle one will do just fine). Then, go through
    the other elements, and if they''re bigger move them to the right of the pivot,
    while if they''re smaller move them to the left of the pivot. After this is done,
    you will end up with two smaller input sets: one for elements smaller than the
    pivot and one for elements larger than the pivot, with the pivot somewhere between
    them. It is important to note that these smaller sets aren''t necessarily sorted,
    or of the same size.


    What you do next is apply the same steps to each of the smaller input sets, ending
    up with four even smaller input sets, and so forth. You do this until you''re
    working with input sets of only one or two elements, which are either easily sorted
    by a simple comparison (for sets with just two elements) or already sorted (for
    input sets with just one element). After these smallest possible subsets are also
    sorted, you will find that the original input set is now sorted as well, because
    now for every pivot encountered along the way (including the original one) the
    “larger than” and “smaller than” subsets have been sorted. To better understand
    how this works, try it out for yourself using pen and paper.


    If you have followed the foregoing description, it should be obvious that quicksort
    is a recursive algorithm: after you are left with a pivot and two smaller input
    sets, you apply quicksort to each of the smaller input sets, and so forth. You
    will find many implementations for quicksort; however, the quicksort implementation
    given in [Listing 10–2](#Chapter10.html#list_10_2) is especially well suited for
    Java ME, as it is an in-place implementation (meaning no additional arrays other
    than the original input array are created). Don''t be scared by its large size.
    Most of it is comments that explain what is going on; the actual implementation
    is quite slick.


    **Listing 10–2.** *A Java ME–Friendly Quicksort Implementation*


    `public static void quicksort(int [] inputSet, int start, int end)`

    `{`

    `    int left = start;`

    `    int right = end;`

    `    int temp = 0;`


    `    // First, we find the pivot value`

    `    int pivotValue = inputSet[ (start+end)/2];`'
