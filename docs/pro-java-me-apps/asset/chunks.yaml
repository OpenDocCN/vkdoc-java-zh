  raw: '### Writing Persistence Helpers


    The first helper we will write is the Table of Contents helper, or `TOC` for short.
    This is a general-purpose helper that can be used to keep track in a developer-friendly
    fashion of what information is stored in which record.


    To put it to work, first you have to attach the `TOC` to a provider by calling
    the following:


    `TOC tableOfContents = new TOC(providerInstance) ;`


    Next, if you want to remember that the credentials for the current user are stored
    in record number 15, for example, all you have to do is call the following:


    `tableOfContents.addEntry(“credentials”,15);`


    After that, whenever you want to know where the credentials are stored, simply
    call the following:


    `tableOfContents.getIndexFor(“credentials”);`


    Deleting an entry is equally easy:


    `tableOfContents.deleteEntry(“credentials”);`


    The code for the `TOC` helper is presented in [Listing 5–12](#Chapter05.html#list_5_12),
    while an actual usage example will be given later on, as part of the `SimplifiedPersistenceHelper`.
    The highlighted code in [Listing 5–12](#Chapter05.html#list_5_12) exemplifies
    how to deserialize a complex record—in our case, the record contains the actual
    table of contents hashtable.


    **Listing 5–12.** *The `TOC` Helper*


    `package app.module.persistence.helpers;`


    `import app.module.persistence.classes.PersistenceProvider;`

    `import app.module.persistence.classes.RecordReader;`

    `...`


    `public class TOC`

    `{`

    `    Hashtable TOCHashtable = new Hashtable();`

    `    PersistenceProvider provider;`

    `    RecordReader reader;`

    `    RecordWriter writer;`


    `    public TOC(PersistenceProvider provider)`

    `    {`

    `        this.writer = new ByteRecordWriter();`

    `        this.provider = provider;`

    `        provider.open();`


    `        // Try to open the TOC. By convention, it is stored in record #1`

    `        if ( provider.getRecord(1) == null )`

    `        {`

    `            return; // No TOC exists, nothing to deserialize`

    `        }`

    `        else`

    `        {`

    `            // A TOC exists, we can deserialize it` `        }`


    `        // Create a reader for record #1`

    `        reader = new ByteRecordReader(provider.getRecord(1));`


    `        // Read the size of the TOC`

    `        int size = reader.readInt();`


    `        // Read each entry in the TOC and add it to the Hashtable`

    `        String key;`

    `        int value;`

    `        while (size>0)`

    `        {`

    `            key = reader.readString();`

    `            value = reader.readInt();`

    `            addEntry(key, value);`

    `            size--;`

    `        }`

    `    }`


    `    // Serialize the TOC to a byte array`

    `    protected byte[] getCurrentTOCBytes()`

    `    {`

    `        String tempKey;`

    `        int size = TOCHashtable.size();`


    `        // Reset the writer`

    `        writer.reset();`


    `        // Write the size of the TOC`

    `        writer.writeInt(size);`


    `        // Write each entry in the TOC`

    `        Enumeration keys = TOCHashtable.keys();`

    `        while ( keys.hasMoreElements() )`

    `        {`

    `            tempKey = (String) keys.nextElement();`

    `            writer.writeString(tempKey);`

    `            writer.writeInt( ((Integer) TOCHashtable.get(tempKey)).intValue()
    );`

    `        }`


    `        // Return the corresponding byte array`

    `        return writer.getCurrentResult();`

    `    }`


    `    public void save()`

    `    {`

    `        // No initial record exists. Create it.`

    `        if ( provider.getRecord(1) == null)`

    `        {`

    `            provider.createRecord(new byte[] {0});`

    `        }`


    `        // Save the record corresponding to the TOC at index #1`

    `        provider.overwriteRecord(1, getCurrentTOCBytes());`

    `    }` `    public void addEntry(String key, int index)`

    `    {`

    `        TOCHashtable.put(key, new Integer(index));`

    `    }`


    `    public void deleteEntry(String key)`

    `    {`

    `        TOCHashtable.remove(key);`

    `    }`


    `    public int getIndexFor(String key)`

    `    {`

    `        Integer result = (Integer) TOCHashtable.get(key) ;`

    `        if ( result != null )`

    `        {`

    `            return result.intValue();`

    `        }`

    `        else`

    `        {`

    `            return -1;`

    `        }`

    `    }`

    `}`


    Using the `TOC` helper does have two restrictions. First of all, in order to make
    sure it always gets the first record allocated to it, you must instantiate it
    immediately after the provider has been created, or at least before any `createRecord()`
    operations are called on the provider. Second, you must remember to call `save()`
    whenever you want the `TOC` to be persisted, otherwise changes to it will be lost.


    The next helper we will write is tasked with serializing and deserializing high-level
    application objects. Its name is, appropriately enough, `HighLevelSerializer`.
    This helper will provide two methods for each high-level data type, `serializeXXX()`
    and `deserializeXXX()`, where XXX is the data type in question.


    For example, the `serializeUserCredentials()` method of the helper is presented
    in [Listing 5–13](#Chapter05.html#list_5_13). The highlighted portion shows how
    to deal with fields that may be null: write a Boolean flag before each field,
    indicating if the field is present or not. This way, when the deserializer processes
    the record, it knows which fields are available for deserialization and which
    are not.


    Also, the `serializeXXX()` methods append data to a currently existing writer
    (as opposed to returning a stand-alone byte array) to facilitate serializing multiple
    objects in a single record.


    **Listing 5–13.** *Serializing `UserCredentials`*


    `public static void serializeUserCredentials(UserCredentials credentials, RecordWriter
    writer)`

    `{`

    `        if ( credentials.getAccessToken() != null )`

    `        {`

    `                 writer.writeBoolean(true);`

    `                 writer.writeString(credentials.getAccessToken());` `        }`

    `        else`

    `        {`

    `                writer.writeBoolean(false);`

    `        }`


    `        if ( credentials.getAccessTokenSecret() != null )`

    `        {`

    `                 writer.writeBoolean(true);`

    `                 writer.writeString(credentials.getAccessTokenSecret());`

    `        }`

    `        else`

    `        {`

    `                writer.writeBoolean(false);`

    `        }`


    `        ...`

    `}`


    Deserializing `UserCredentials` is even easier. The appropriate method is presented
    in [Listing 5–14](#Chapter05.html#list_5_14). You can see from the highlighted
    code that we attempt to deserialize only fields that are not null, which is indicated
    by their corresponding flags being set to `true`.


    Like the `serializeXXX()`, deserialization methods work with a currently existing
    reader (as opposed to directly with a byte array) to facilitate deserializing
    multiple objects from the same record.


    **Listing 5–14.** *Deserializing `UserCredentials`*


    `public UserCredentials deserializeUserCredentials(RecordReader reader)`

    `{`

    `        String token = null , tokenSecret = null;`

    `        String username = null, password = null;`


    `if (` **`reader.readBoolean()`** `)`

    `        {`

    `                token = reader.readString() ;`

    `        }`


    `if (` **`reader.readBoolean()`** `)`

    `        {`

    `                tokenSecret = reader.readString() ;`

    `        }`


    `if (` **`reader.readBoolean()`** `)`

    `        {`

    `                username = reader.readString() ;`

    `        }`


    `if (` **`reader.readBoolean()`** `)`

    `        {`

    `                password = reader.readString() ;`

    `        }`


    `        return new UserCredentials(username, password, token, tokenSecret);`

    `}`


    The third and final helper we will write is also probably the most important one,
    and the one we will use the most. It is called the `SimplifiedPersistenceHelper`,
    and it uses the `TOC` helper to hide all the details of record index management
    from the rest of the application, making working with persistence a breeze.'
  trans: '

    ### 编写持久化辅助类


    我们将编写的第一个辅助类是目录辅助类，简称`TOC`。这是一个通用辅助类，能够以开发者友好的方式追踪哪些信息存储在哪个记录中。


    要使用它，首先需要通过以下调用将`TOC`附加到提供者上：


    `TOC tableOfContents = new TOC(providerInstance) ;`


    接下来，例如，如果你想记住当前用户的凭据存储在记录编号 15 中，只需调用以下代码：


    `tableOfContents.addEntry(“credentials”,15);`


    之后，无论何时你想知道凭据存储在哪里，只需调用：


    `tableOfContents.getIndexFor(“credentials”);`


    删除条目同样简单：


    `tableOfContents.deleteEntry(“credentials”);`


    `TOC`辅助类的代码见代码清单 5-12，实际使用示例将在后续作为`SimplifiedPersistenceHelper`的一部分给出。代码清单 5-12
    中高亮显示的代码演示了如何反序列化一个复杂记录——在本例中，该记录包含了实际的目录哈希表。


    **代码清单 5-12.** *`TOC`辅助类*


    `package app.module.persistence.helpers;`


    `import app.module.persistence.classes.PersistenceProvider;`

    `import app.module.persistence.classes.RecordReader;`

    `...`


    `public class TOC`

    `{`

    `    Hashtable TOCHashtable = new Hashtable();`

    `    PersistenceProvider provider;`

    `    RecordReader reader;`

    `    RecordWriter writer;`


    `    public TOC(PersistenceProvider provider)`

    `    {`

    `        this.writer = new ByteRecordWriter();`

    `        this.provider = provider;`

    `        provider.open();`


    `        // 尝试打开 TOC。按照约定，它存储在记录#1 中`

    `        if ( provider.getRecord(1) == null )`

    `        {`

    `            return; // 不存在 TOC，无需反序列化`

    `        }`

    `        else`

    `        {`

    `            // 存在 TOC，可以反序列化` `        }`


    `        // 为记录#1 创建一个读取器`

    `        reader = new ByteRecordReader(provider.getRecord(1));`


    `        // 读取 TOC 的大小`

    `        int size = reader.readInt();`


    `        // 读取 TOC 中的每个条目并将其添加到哈希表`

    `        String key;`

    `        int value;`

    `        while (size>0)`

    `        {`

    `            key = reader.readString();`

    `            value = reader.readInt();`

    `            addEntry(key, value);`

    `            size--;`

    `        }`

    `    }`


    `    // 将 TOC 序列化为字节数组`

    `    protected byte[] getCurrentTOCBytes()`

    `    {`

    `        String tempKey;`

    `        int size = TOCHashtable.size();`


    `        // 重置写入器`

    `        writer.reset();`


    `        // 写入 TOC 的大小`

    `        writer.writeInt(size);`


    `        // 写入 TOC 中的每个条目`

    `        Enumeration keys = TOCHashtable.keys();`

    `        while ( keys.hasMoreElements() )`

    `        {`

    `            tempKey = (String) keys.nextElement();`

    `            writer.writeString(tempKey);`

    `            writer.writeInt( ((Integer) TOCHashtable.get(tempKey)).intValue()
    );`

    `        }`


    `        // 返回对应的字节数组`

    `        return writer.getCurrentResult();`

    `    }`


    `    public void save()`

    `    {`

    `        // 不存在初始记录。创建它。`

    `        if ( provider.getRecord(1) == null)`

    `        {`

    `            provider.createRecord(new byte[] {0});`

    `        }`


    `        // 保存索引#1 处对应 TOC 的记录`

    `        provider.overwriteRecord(1, getCurrentTOCBytes());`

    `    }` `    public void addEntry(String key, int index)`

    `    {`

    `        TOCHashtable.put(key, new Integer(index));`

    `    }`


    `    public void deleteEntry(String key)`

    `    {`

    `        TOCHashtable.remove(key);`

    `    }`


    `    public int getIndexFor(String key)`

    `    {`

    `        Integer result = (Integer) TOCHashtable.get(key) ;`

    `        if ( result != null )`

    `        {`

    `            return result.intValue();`

    `        }`

    `        else`

    `        {`

    `            return -1;`

    `        }`

    `    }`

    `}`


    使用`TOC`辅助类有两个限制。首先，为了确保它始终能分配到第一个记录，你必须在提供者创建后立即实例化它，或者至少在提供者上调用任何`createRecord()`操作之前。其次，每当你想持久化`TOC`时，必须记得调用`save()`，否则对其所做的更改将会丢失。


    我们将编写的下一个辅助类负责序列化和反序列化高级应用程序对象。它的名称恰如其分地叫做`HighLevelSerializer`。这个辅助类将为每个高级数据类型提供两个方法：`serializeXXX()`和`deserializeXXX()`，其中
    XXX 是所讨论的数据类型。


    例如，该辅助类的`serializeUserCredentials()`方法见代码清单 5-13。高亮部分展示了如何处理可能为空的字段：在每个字段之前写入一个布尔标志，指示该字段是否存在。这样，当反序列化器处理记录时，它就知道哪些字段可用于反序列化，哪些不可用。


    此外，`serializeXXX()`方法会将数据追加到当前存在的写入器中（而不是返回独立的字节数组），以便于在单个记录中序列化多个对象。


    **代码清单 5-13.** *序列化`UserCredentials`*


    `public static void serializeUserCredentials(UserCredentials credentials, RecordWriter
    writer)`

    `{`

    `        if ( credentials.getAccessToken() != null )`

    `        {`

    `                 writer.writeBoolean(true);`

    `                 writer.writeString(credentials.getAccessToken());` `        }`

    `        else`

    `        {`

    `                writer.writeBoolean(false);`

    `        }`


    `        if ( credentials.getAccessTokenSecret() != null )`

    `        {`

    `                 writer.writeBoolean(true);`

    `                 writer.writeString(credentials.getAccessTokenSecret());`

    `        }`

    `        else`

    `        {`

    `                writer.writeBoolean(false);`

    `        }`


    `        ...`

    `}`


    反序列化`UserCredentials`甚至更简单。相应的方法见代码清单 5-14。从高亮代码中可以看出，我们只尝试反序列化那些不为空的字段，这些字段由其对应的标志设置为`true`来指示。


    与`serializeXXX()`类似，反序列化方法使用当前存在的读取器（而不是直接使用字节数组），以便于从同一记录中反序列化多个对象。


    **代码清单 5-14.** *反序列化`UserCredentials`*


    `public UserCredentials deserializeUserCredentials(RecordReader reader)`

    `{`

    `        String token = null , tokenSecret = null;`

    `        String username = null, password = null;`


    `if (` **`reader.readBoolean()`** `)`

    `        {`

    `                token = reader.readString() ;`

    `        }`


    `if (` **`reader.readBoolean()`** `)`

    `        {`

    `                tokenSecret = reader.readString() ;`

    `        }`


    `if (` **`reader.readBoolean()`** `)`

    `        {`

    `                username = reader.readString() ;`

    `        }`


    `if (` **`reader.readBoolean()`** `)`

    `        {`

    `                password = reader.readString() ;`

    `        }`


    `        return new UserCredentials(username, password, token, tokenSecret);`

    `}`


    我们将编写的第三个也是最后一个辅助类，很可能也是最重要的一个，并且是我们使用最多的一个。它被称为`SimplifiedPersistenceHelper`，它使用`TOC`辅助类向应用程序的其余部分隐藏了所有记录索引管理的细节，使得处理持久化变得轻而易举。

