- fmt: '### Implementing Other Graphical Effects


    There are many more graphical effects that you could implement. For example, you
    could implement a particle-based system that “explodes” a given image into many
    smaller chunks (or reverse-explodes the smaller chunks into a complete image).


    The key to adding more graphical effects to your arsenal lies in your imagination
    and in the clever use of Java ME’s capabilities. For example, the explosion effect
    just mentioned is actually quite CPU friendly, because all you do is calculate
    the position of each chunk and then use the source image as an image map to draw
    each chunk in its corresponding position.


    You should also be aware that there are two types of effects you can create: those
    suitable for real-time use and those not suitable for real-time use. Image masking
    is a good example of an effect suitable for real time use, because it’s simple
    and fast. However, should you try to implement image filters (for example, Watercolor
    from Photoshop), you will most likely not be able to use them in real-time scenarios.
    That is not to say they do not have their uses; for example, personalizing the
    application based on the user’s own images is a very nice thing to have, and filters
    can go a long way toward this goal.


    Implementing your own graphical effects is always a very rewarding experience.
    Playing with pixels is always fun, and you will get to learn a lot of things related
    to computer graphics, code optimization, programming techniques, and mathematics
    in the process. Not to mention, at the end of the day, you can use the code you’ve
    written to impress your friends, coworkers, or even your boss.


    That being said, here are a few graphical effects that you may consider implementing:


    - Particle-based systems, as exemplified in this section.

    - Image blurring and image sharpening.

    - Image anti-aliasing.

    - Image skewing effects (for example, making your image appear like a trapezoid,
    or making it wobble like a flag).

    - Image desaturation (turning colored images into black-and-white ones).

    - Artistic filters, such as Watercolor and Bas Relief.

    - Image morphing (seamlessly blending the contents of two images, not their pixels—for
    example, blending your face with that of your spouse). You should be warned: this
    is an extremely difficult effect to implement.


    ### Combining Multiple Effects Together


    When properly optimized, the effects presented in this chapter can be combined
    for even more spectacular results. For example, it is possible to create a rotated
    and textured version of your company’s logo, in which the texture is obtained
    by blending two images together. This is most effective when the various parameters
    of the effects involved are varied (for example, the rotation angle is changed,
    as is the transparency coefficient of the blending operation) to create animations.


    At this point, you may be wondering exactly how feasible this is. A couple of
    years ago, I asked myself the same question. So I set out to create a Java ME
    graphical effects library that was to be both fast and powerful. I was curious
    to see how far the Java ME platform could be pushed in this area, and I was quite
    pleased with how the library, called `J2ME Army Knife`, turned out.


    The most interesting and surprising thing (for me, at least) was the level to
    which graphical effects could be optimized in terms of speed. For example, after
    I optimized the image rotation code, I was able to take a 64×64 image and rotate
    it almost 100 times per second on a Nokia E50. As an amusing side note, I haven’t
    done any serious work on the library for over two years now (which is a lifetime
    in software development), but I still get the occasional e-mail from people saying
    that they’re amazed with how fast the code runs and that it really shows how “state
    of the art” `J2ME Army Knife` is.


    **NOTE:** For more information on `J2ME Army Knife`, please visit [www.j2mearmyknife.com](http://www.j2mearmyknife.com).
    There you can see the library in action (live demo) and also download it. It’s
    completely free to use in binary form, even for commercial projects, so give it
    a try!


    Combining multiple effects together is even more feasible in nondynamic circumstances.
    Although a single animation frame typically has to be calculated in a maximum
    of 100 milliseconds in order to get a “smooth” feel, for static graphics you can
    use up to 500 milliseconds to do this (maybe even more, if the processing is done
    in a separate background thread). This means that you can either work with bigger
    source images, or string together more effects.


    Another very powerful technique is using dynamic graphical effects in combination
    with image maps. For example, let’s take the case of the earlier scenario in which
    the textured logo was rotated and animated. Rather than calculating each frame
    every single time, you calculate frames only the first time they are needed and
    then place them in an image map. Then, when the animation cycles, instead of recalculating
    the frames again, you use the data stored in the image map. This is extremely
    fast overall, but it does require quite a bit of RAM for larger images—so your
    mileage with this technique will vary depending on the target device.


    Finally, combining graphical effects together can be done in one of two ways.
    Your first option is to apply each effect individually: the output of the first
    effect becomes the input for the second effect, and so forth. Although this is
    flexible, because each effect remains as a stand-alone, it also has the disadvantage
    of adding a lot of overhead to the overall result. For example, if two effects
    in the chain need to work with the individual Alpha, Red, Green, and Blue values
    of each pixel, then each of the two effects will have to do the extraction separately.


    The second option is to create meta-effects; for example, you can combine the
    rotate and resize effects together. This has the advantage of eliminating a lot
    of unnecessary overhead, as many common calculations for both effects need to
    be made only once, and memory objects such as ARGB arrays can be reused. The performance
    improvement is particularity significant if the overhead eliminated is at the
    pixel level (that is, within the inner loop, where individual pixels are manipulated).


    ### Summary


    In this chapter, you have examined a couple of advanced Java ME graphical techniques:
    image blending, image masking, image resizing, and image rotating. You have looked
    at the principles behind these techniques and at their various use cases. In the
    next chapter, you will look at a few Java ME development stories and examine the
    moral behind them.


