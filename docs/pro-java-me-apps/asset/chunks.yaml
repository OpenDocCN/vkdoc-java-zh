    of their own, which must be identified and dealt with accordingly. These can range
    from the obvious, like “you have only 1 MB of RAM available on device X,” to the
    more obscure, like “object creation on device Y is too slow.” Let''s look at some
    of the most common Java ME technical limitations.


    ##### Device Fragmentation


    Device fragmentation comes in two forms: hardware and software. Hardware fragmentation
    is to be expected, as not all devices can have the same specifications, and developers
    can plan and write their code according to the resources available at their disposal.


    Software fragmentation, however, is a far greater problem, possibly the biggest
    problem affecting Java ME (and, to a lesser extent, other platforms, such as Android).
    Not all devices implement the Java ME API in the same way, and some of them even
    implement it wrongly. This can range from easy-to-spot-and-resolve issues like
    different keycodes on different devices, to blatant bugs that appear only in some
    circumstances and only on some devices, and which are hard to debug.


    For example, on Blackberry devices, `drawRGB()` raises an `ArrayIndexOutOfBounds`
    exception when the (x,y) coordinates specified are negative (i.e., drawing starts
    outside of the screen area). As long as both coordinates are positive, this does
    not happen. This is hard to debug because the documentation says that the exception
    is only to be thrown “if the requested operation will attempt to access an element
    of `rgbData` whose index is either negative or beyond its length.” As a developer,
    you are a lot more likely to think that the error appears because you specified
    the wrong parameters to `drawRGB()`, thus causing the code to reference an element
    outside of the array''s bounds, than you are to believe that the error is caused
    by a buggy platform implementation—which is, in fact, the case.


    Later in the book, we will discuss how to deal with both hardware and software
    fragmentation; the solutions are surprisingly similar.


    ##### Screen Pixel Density and Screen Size


    The most important thing about pixel density is that, in conjunction with screen
    size and screen resolution, it affects how much information you can comfortably
    display on the screen at once. Let me explain: if a device has a 3-inch display
    with a 1024×768 resolution and a default font height of 10 pixels, you can have
    up to 76 rows of text on the screen at the same time. However, the text would
    be so small that it would be nearly impossible to read. This is also why no such
    device exists, to my knowledge.


    Now consider the following two scenarios:


    *   A device with a 10-inch display featuring a 1024×768 resolution

    *   Another device with a 3-inch display, but with a resolution that''s three
    times smaller (341×256)


    In both of these scenarios, the text would be physically three times bigger than
    in the original scenario, and thus easier to read. For a clear comparison, look
    at [Figure 1–1](#Chapter01.html#fig_1_1).


    ![images](images/0101.jpg)


    **Figure 1–1.** *Screen pixel density comparison*


    Fixed-size graphics are similarly affected. Due to pixel density, a given sprite,
    button, or UI widget can look too small on one device and too big on another,
    even if the size in pixels is the same.


    Screen size is even more important than screen density, because if the screen
    is big enough you can get away with a lower density: the image quality won''t
    be as good, but you''ll be able to read what''s on the screen and that''s what
    matters.


    Another thing to keep in mind is that a UI design can be great on one device and
    lousy on another simply because the screen is physically too small for the design
    in question, regardless of the resolution. This means that some research and hands-on
    experience are needed to find a suitable UI design and size for any given target
    device.


    While developers should be aware of these issues, it is mostly the design team
    that must make decisions in this area. As a general guideline, the vast majority
    of Java ME devices have a 320×240 screen resolution, with a screen size of 2.2–2.8
    inches. Some newer Java ME devices with touchscreen support, for example, those
    coming from Nokia, have a screen size of 3.0–4.0 inches and higher resolutions,
    480×360 in Nokia''s case.'
  trans: '

    #### 识别目标设备


    我们的 Twitter 客户端将编写为在 WTK 模拟器上运行。做出这一决定是为了让尽可能多的人能够运行该代码，无论他们手头拥有何种设备。这也意味着代码可以遵循“最佳实践”来编写，因为针对真实设备进行开发通常需要走捷径，并使用一些小技巧和变通方法来解决特定设备的问题。


    然而，实际项目必须在真实设备上运行。考虑到这一点，作为最佳实践，你应该始终尝试在你手头的所有设备上运行你的项目（包括 Twitter 客户端），即使这些设备并未得到明确支持。对每台设备进行一些理论和实践研究，并尝试找出它们相对于当前项目的优势和劣势。


    最终，你应该拥有一份能够完全运行你项目的设备清单，而对于那些只能部分运行（通常是由于错误或性能问题）的设备，则需要记录原因以及潜在的解决方案。这些“额外信息”通常被证明是无价的。例如，如果你的目标设备都是高端机型，那么应用程序
    GC 频繁的问题可能并不明显；但一旦你在中端或低端设备上运行代码，这个问题就会迅速显现出来——然后你就可以着手解决它，否则这个问题可能会被忽视，直到为时已晚。


    后面的章节将讨论设备碎片化以及将应用程序移植到其他平台和设备的问题。如果需要，你可以利用该章节中的信息将 Twitter 客户端适配到你的特定设备上。


    话虽如此，本书中提供的代码已尽可能做到与设备无关，以最大限度地减少或完全消除移植所需的工作量。


    #### 识别 Java ME 技术限制


    为移动设备编写软件意味着要考虑各种在桌面世界中基本不成问题的因素，例如电池续航、屏幕尺寸和网络连接。


    除此之外，移动软件（尤其是 Java ME）本身也有其局限性，必须识别并妥善处理。这些限制从显而易见的（例如“设备 X 上只有 1 MB 可用 RAM”）到更为隐蔽的（例如“设备
    Y 上的对象创建速度太慢”）。让我们来看看一些最常见的 Java ME 技术限制。


    ##### 设备碎片化


    设备碎片化有两种形式：硬件碎片化和软件碎片化。硬件碎片化是可以预料的，因为并非所有设备都具有相同的规格，开发人员可以根据手头可用的资源来规划和编写代码。


    然而，软件碎片化是一个更为严重的问题，可能是影响 Java ME（以及程度较轻的其他平台，如 Android）的最大问题。并非所有设备都以相同的方式实现 Java
    ME API，有些设备甚至错误地实现了它。这范围从容易发现和解决的问题（例如不同设备上的不同按键代码），到仅在特定情况下、特定设备上出现且难以调试的明显错误。


    例如，在 Blackberry 设备上，当指定的 (x, y) 坐标为负数时（即绘制从屏幕区域外开始），`drawRGB()` 会引发 `ArrayIndexOutOfBounds`
    异常。只要两个坐标都是正数，就不会发生这种情况。这很难调试，因为文档说明该异常仅在“请求的操作将尝试访问索引为负数或超出其长度的 `rgbData` 元素”时抛出。作为开发人员，你更有可能认为错误是因为你为
    `drawRGB()` 指定了错误的参数，导致代码引用了数组边界之外的元素，而不是相信错误是由有缺陷的平台实现引起的——而事实恰恰如此。


    在本书的后面部分，我们将讨论如何处理硬件和软件碎片化；解决方案出奇地相似。


    ##### 屏幕像素密度与屏幕尺寸


    关于像素密度，最重要的一点是，它与屏幕尺寸和屏幕分辨率共同决定了你一次能在屏幕上舒适地显示多少信息。让我解释一下：如果一台设备拥有 3 英寸显示屏、1024×768
    分辨率以及 10 像素的默认字体高度，那么屏幕上最多可以同时显示 76 行文本。然而，文本会变得非常小，几乎无法阅读。据我所知，这也是为什么不存在这样的设备。


    现在考虑以下两种场景：


    *   一台拥有 10 英寸显示屏、1024×768 分辨率的设备

    *   另一台拥有 3 英寸显示屏，但分辨率小三倍（341×256）的设备


    在这两种场景中，文本的物理尺寸都比原始场景大三倍，因此更容易阅读。为了清晰对比，请查看图 1–1。


    ![images](img/0101.jpg)


    **图 1–1.** *屏幕像素密度对比*


    固定大小的图形也受到类似影响。由于像素密度，一个给定的精灵、按钮或 UI 控件在一台设备上可能显得太小，而在另一台设备上又显得太大，即使像素尺寸相同。


    屏幕尺寸比屏幕密度更重要，因为如果屏幕足够大，你可以容忍较低的密度：图像质量可能没那么好，但你能看清屏幕上的内容，这才是关键。


    另一件需要记住的事情是，一个 UI 设计在一台设备上可能很棒，但在另一台设备上却很糟糕，仅仅是因为该设计的物理屏幕尺寸太小，而与分辨率无关。这意味着需要进行一些研究和实践，才能为任何给定的目标设备找到合适的
    UI 设计和尺寸。


    虽然开发人员应该意识到这些问题，但主要是设计团队必须在这方面做出决策。作为一般性指导，绝大多数 Java ME 设备具有 320×240 的屏幕分辨率，屏幕尺寸为
    2.2–2.8 英寸。一些较新的支持触摸屏的 Java ME 设备，例如诺基亚的设备，屏幕尺寸为 3.0–4.0 英寸，分辨率更高，诺基亚的设备为 480×360。

