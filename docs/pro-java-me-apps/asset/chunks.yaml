- fmt: "### Eliminating Unnecessary Recursion\n\nRecursion is one of the most powerful\
    \ concepts in computer science. The ability to have a method call itself gives\
    \ birth to a lot of very interesting and useful programming techniques and tricks\
    \ (see quicksort), and when properly understood and applied can greatly simplify\
    \ code complexity (imagine implementing quicksort without recursion).\n\nHowever,\
    \ there are good uses for recursion and there are bad uses for it. One of the\
    \ bad uses is to blindly calculate values, even if those values have been calculated\
    \ before. This typically happens in formula-based recursions.\n\nFor example,\
    \ consider the Fibonacci series, which is 0,1,1,2,3,5,8... In this series, every\
    \ number except the first two is the sum of the previous two numbers. The general\
    \ formula is `F(n) = F(n-1) + F(n-2)`. This formula can easily be implemented\
    \ via recursion, as shown in [Listing 10–4](#Chapter10.html#list_10_4).\n\n**Listing\
    \ 10–4.** *A Recursive Fibonacci Series Implementation*\n\n```java\npublic static\
    \ int fib(int n)\n{\n    if ( n < 2 )\n    {\n        return n;\n    }\n    else\n\
    \    {\n        return fib(n-1) + fib(n-2);\n    }\n}\n```\n\nThe code is extremely\
    \ short and simple; however, it is also overly expensive computationally. Here\
    \ is the call tree it produces:\n\n```\nfib(5)\nfib(4) + fib(3)\n(fib(3) + fib(2))\
    \ + (fib(2) + fib(1))\n((fib(2) + fib(1)) + (fib(1) + fib(0))) + ((fib(1) + fib(0))\
    \ + fib(1))\n(((fib(1) + fib(0)) + fib(1)) + (fib(1) + fib(0))) + ((fib(1) + fib(0))\
    \ + fib(1))\n```\n\nYou can see that `fib(2)` is calculated three times in the\
    \ foregoing call tree. Furthermore, even if `fib(0)` and `fib(1)` are fixed-value\
    \ functions and no computations are needed, they still have to be called, and\
    \ this adds overhead.\n\nFortunately, there is a technique designed to avoid unnecessary\
    \ calculations when dealing with recursion. It is called dynamic programming.\
    \ Dynamic programming basically boils down to storing already calculated values\
    \ for later use, instead of calculating them from scratch every time they are\
    \ needed.\n\nThere are two approaches to dynamic programming. One is the top-down\
    \ approach, which is exactly like recursion except with a twist: before calculating\
    \ `fib(n)`, we first check if we have calculated it before, like in [Listing 10–5](#Chapter10.html#list_10_5).\n\
    \n**Listing 10–5.** *A Top-Down Dynamic Programming Fibonacci*\n\n```java\npublic\
    \ static int fibBuffer[] = new int [1000];\n\npublic static int fibTopDown(int\
    \ n)\n{\n    if ( n < 2 )\n    {\n        return n;\n    }\n    else if ( fibBuffer[n]\
    \ != 0 )\n    {\n        return fibBuffer[n];\n    }\n    else\n    {\n      \
    \  fibBuffer[n] = fibTopDown(n-1) + fibTopDown(n-2);\n        return fibBuffer[n];\n\
    \    }\n}\n```\n\nThe lines in bold are where the magic happens. In this implementation,\
    \ a Fibonacci value is calculated only the first time it is encountered and never\
    \ after that, so the call tree becomes as follows:\n\n```\nfib(5)\nfib(4) + [fib(3)]\n\
    (fib(3) + [fib(2)])\n((fib(2) + fib(1)))\n(((fib(1) + fib(0)) + fib(1)))\n```\n\
    \nThe calls in brackets return already calculated values instead of calculating\
    \ new values from scratch. For example, when the call in bold to `fib(3)` is made,\
    \ the value for it was already calculated as part of the `fib(4)` call before\
    \ it. The same applies to the call in bold to `fib(2)`: it was calculated as part\
    \ of the call to `fib(3)` immediately before it.\n\nThe gain in using this simple\
    \ technique is twofold: we do not only fewer math operations, but also fewer function\
    \ calls.\n\nThe second approach to dynamic programming is the bottom-up approach.\
    \ This one is more complicated, but in practice its implementations perform significantly\
    \ faster. The idea is similar to mathematical induction: start at the very bottom,\
    \ and then work your way up until you reach the point you want to get to. It can\
    \ be thought of as being the opposite of recursion.\n\nFor example, in the case\
    \ of Fibonacci numbers, we know that the first two numbers are set in stone: 0\
    \ and 1. Based on them, we can calculate the third number. Based on the third\
    \ and second numbers, we can calculate the fourth, and so on. The formula is thus\
    \ more like `fib(n-2) + fib(n-1) = fib(n)`. This approach has another major benefit:\
    \ since at every step along the way we know the values of the previous two steps,\
    \ we don't need recursion at all and we can just perform a simple array lookup.\
    \ Eliminating recursion reduces overhead significantly and provides our Java ME\
    \ implementation in [Listing 10–6](#Chapter10.html#list_10_6) with a very nice\
    \ and noticeable performance boost.\n\n**Listing 10–6.** *A Bottom-Up Fibonacci\
    \ Implementation*\n\n```java\npublic static int fibBuffer[] = new int [1000];\n\
    \npublic static int fibBottomUp(int n)\n{\n    fibBuffer[0] = 0;\n    fibBuffer[1]\
    \ = 1;\n\n    int index=2;\n    while (index<=n)\n    {\n        fibBuffer[index]\
    \ = fibBuffer[index-2] + fibBuffer[index-1];\n        index++;\n    }\n    return\
    \ fibBuffer[n];\n}\n```\n\nThe bottom-up approach to dynamic programming is especially\
    \ powerful. It eliminates unnecessary overhead in the form of extra method calls,\
    \ and since it is inductive in nature, its implementation and general formula\
    \ are much easier to debug than top-down dynamic programming (where you can frequently\
    \ get lost in the call tree, and the general formula is much harder to verify\
    \ using actual data).\n\nOn a more general level, there are many algorithms that\
    \ can benefit from dynamic programming. For example, calculating the edit distance\
    \ between two strings (the minimum number of changes needed to turn string A into\
    \ string B) can take forever to run if implemented using recursion, yet it runs\
    \ almost instantly on virtually any hardware if dynamic programming is used. This\
    \ can then be used, for instance, to compensate for small typos in your application,\
    \ where the user enters a person's name or address with a few characters mistyped.\n\
    \nThe same is true for other problems, like finding the minimum distance between\
    \ two nodes in a tree (for example, this can be used for optimizing routes in\
    \ a GPS software) or a whole slew of decision-making problems (useful for business\
    \ simulation or game AI).\n\nIn the context of Java ME, dynamic programming can\
    \ be an extremely useful tool. When implemented properly, dynamic programming\
    \ yields results extremely fast, which can help put the perceived performance\
    \ of mobile applications on par with the perceived performance of desktop applications.\
    \ For example, a desktop implementation of a dynamic programming algorithm might\
    \ take just 1 ms to run, while the same implementation might take 200 ms to run\
    \ on a Java ME device. While the absolute performance difference is 20,000%, there\
    \ is virtually no perceived performance difference, since to the user 200 ms and\
    \ 1 ms are virtually the same.\n\n### Summary\n\nIn this chapter, we have looked\
    \ at how we can optimize our Java ME applications by improving both the code and\
    \ the algorithms behind the code. We have examined the most commonly used code\
    \ optimization techniques and how they improve application speed: optimizing math\
    \ operation, fast code path switching, optimizing loops, and more. We have also\
    \ examined how algorithm performance is measured and how to optimize the most\
    \ commonly used algorithm operations: sorting, searching, and recursion.\n\nIn\
    \ the following chapter, we will look at how you can improve your application\
    \ as a whole, by refining existing features and by making the application more\
    \ intuitive for the user.\n\n## Chapter 11"
  raw: '##### Eliminating Unnecessary Recursion


    Recursion is one of the most powerful concepts in computer science. The ability
    to have a method call itself gives birth to a lot of very interesting and useful
    programming techniques and tricks (see quicksort), and when properly understood
    and applied can greatly simplify code complexity (imagine implementing quicksort
    without recursion).


    However, there are good uses for recursion and there are bad uses for it. One
    of the bad uses is to blindly calculate values, even if those values have been
    calculated before. This typically happens in formula-based recursions.


    For example, consider the Fibonacci series, which is 0,1,1,2,3,5,8... In this
    series, every number except the first two is the sum of the previous two numbers.
    The general formula is F(n) = F(n-1) + F(n-2). This formula can easily be implemented
    via recursion, as shown in [Listing 10–4](#Chapter10.html#list_10_4).


    **Listing 10–4.** *A Recursive Fibonacci Series Implementation*


    `public static int fib(int n)`

    `{`

    `    if ( n < 2 )`

    `    {`

    `        return n;`

    `    }`

    `    else`

    `    {`

    `        return fib(n-1) + fib(n-2);`

    `    }`

    `}`


    The code is extremely short and simple; however, it is also overly expensive computationally.
    Here is the call tree it produces:


    `fib(5)`

    `fib(4) + fib(3)`

    `(fib(3) +` **`fib(2))`** `+ (`**`fib(2)`** `+ fib(1))`

    `((`**`fib(2)`** `+ fib(1)) + (fib(1) + fib(0))) + ((fib(1) + fib(0)) + fib(1))`

    `(((fib(1) + fib(0)) + fib(1)) + (fib(1) + fib(0))) + ((fib(1) + fib(0)) + fib(1))`


    You can see that `fib(2)` is calculated three times in the foregoing call tree.
    Furthermore, even if `fib(0)` and `fib(1)` are fixed-value functions and no computations
    are needed, they still have to be called, and this adds overhead.


    Fortunately, there is a technique designed to avoid unnecessary calculations when
    dealing with recursion. It is called dynamic programming. Dynamic programming
    basically boils down to storing already calculated values for later use, instead
    of calculating them from scratch every time they are needed.


    There are two approaches to dynamic programming. One is the top-down approach,
    which is exactly like recursion except with a twist: before calculating `fib(n)`,
    we first check if we have calculated it before, like in [Listing 10–5](#Chapter10.html#list_10_5).


    **Listing 10–5.** *A Top-Down Dynamic Programming Fibonacci*


    `public static int fibBuffer[] = new int [1000];`


    `public static int fibTopDown(int n)`

    `{`

    `    if ( n < 2 )`

    `    {`

    `        return n;`

    `    }`

    **`else if ( fibBuffer[n] != 0 )`**

    **`{`**

    **`return fibBuffer[n];`**

    **`}`**

    `    else`

    `    {`

    **`fibBuffer[n] = fibTopDown(n-1) + fibTopDown(n-2);`**

    `        return fibBuffer[n];`

    `    }`

    `}`


    The lines in bold are where the magic happens. In this implementation, a Fibonacci
    value is calculated only the first time it is encountered and never after that,
    so the call tree becomes as follows:


    `fib(5)`

    `fib(4) +` **`[fib(3)]`**

    `(fib(3) +` **`[fib(2)])`**

    `((fib(2) + fib(1)))`

    `(((fib(1) + fib(0)) + fib(1)))`


    The calls in brackets return already calculated values instead of calculating
    new values from scratch. For example, when the call in bold to `fib(3)` is made,
    the value for it was already calculated as part of the `fib(4)` call before it.
    The same applies to the call in bold to `fib(2)`: it was calculated as part of
    the call to `fib(3)` immediately before it.


    The gain in using this simple technique is twofold: we do not only fewer math
    operations, but also fewer function calls.


    The second approach to dynamic programming is the bottom-up approach. This one
    is more complicated, but in practice its implementations perform significantly
    faster. The idea is similar to mathematical induction: start at the very bottom,
    and then work your way up until you reach the point you want to get to. It can
    be thought of as being the opposite of recursion.


    For example, in the case of Fibonacci numbers, we know that the first two numbers
    are set in stone: 0 and 1\. Based on them, we can calculate the third number.
    Based on the third and second numbers, we can calculate the fourth, and so on.
    The formula is thus more like `fib(n-2) + fib(n-1) = fib(n)`. This approach has
    another major benefit: since at every step along the way we know the values of
    the previous two steps, we don''t need recursion at all and we can just perform
    a simple array lookup. Eliminating recursion reduces overhead significantly and
    provides our Java ME implementation in [Listing 10–6](#Chapter10.html#list_10_6)
    with a very nice and noticeable performance boost.


    **Listing 10–6.** *A Bottom-Up Fibonacci Implementation*


    `public static int fibBuffer[] = new int [1000];`


    `public static int fibBottomUp(int n)`

    `{`

    `    fibBuffer[0] = 0;`

    `    fibBuffer[1] = 1;`


    `    int index=2;`

    `    while (index<=n)`

    `    {`

    `        fibBuffer[index] = fibBuffer[index-2] + fibBuffer[index-1];`

    `        index++;`

    `    }`

    `    return fibBuffer[n];`

    `}`


    The bottom-up approach to dynamic programming is especially powerful. It eliminates
    unnecessary overhead in the form of extra method calls, and since it is inductive
    in nature, its implementation and general formula are much easier to debug than
    top-down dynamic programming (where you can frequently get lost in the call tree,
    and the general formula is much harder to verify using actual data).


    On a more general level, there are many algorithms that can benefit from dynamic
    programming. For example, calculating the edit distance between two strings (the
    minimum number of changes needed to turn string A into string B) can take forever
    to run if implemented using recursion, yet it runs almost instantly on virtually
    any hardware if dynamic programming is used. This can then be used, for instance,
    to compensate for small typos in your application, where the user enters a person''s
    name or address with a few characters mistyped.


    The same is true for other problems, like finding the minimum distance between
    two nodes in a tree (for example, this can be used for optimizing routes in a
    GPS software) or a whole slew of decision-making problems (useful for business
    simulation or game AI).


    In the context of Java ME, dynamic programming can be an extremely useful tool.
    When implemented properly, dynamic programming yields results extremely fast,
    which can help put the perceived performance of mobile applications on par with
    the perceived performance of desktop applications. For example, a desktop implementation
    of a dynamic programming algorithm might take just 1 ms to run, while the same
    implementation might take 200 ms to run on a Java ME device. While the absolute
    performance difference is 20,000%, there is virtually no perceived performance
    difference, since to the user 200 ms and 1 ms are virtually the same.


    ### Summary


    In this chapter, we have looked at how we can optimize our Java ME applications
    by improving both the code and the algorithms behind the code. We have examined
    the most commonly used code optimization techniques and how they improve application
    speed: optimizing math operation, fast code path switching, optimizing loops,
    and more. We have also examined how algorithm performance is measured and how
    to optimize the most commonly used algorithm operations: sorting, searching, and
    recursion.


    In the following chapter, we will look at how you can improve your application
    as a whole, by refining existing features and by making the application more intuitive
    for the user.


