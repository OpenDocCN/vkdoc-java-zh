  raw: '#### The EventManagerThreads Class


    This class allows event controller managers to run in their own individual threads
    and at their own specific pace—we''ve hinted at it in the `EventControllerManager`
    section.


    Using this class is dead easy. To have an event controller manager process all
    its underlying events from all its assigned controllers every 30 milliseconds,
    all you have to do is call the following:


    `EventManagerThreads.start ( someManagerInstance, 30 );`


    If you want the manager to process its events at a different interval, call `start()`
    again with the desired parameters.


    Stopping an event controller manager from being periodically processed is equally
    easy:


    `EventManagerThreads.stop ( someManagerInstance );`


    The code for the `EventManagerThreads` class is shown in [Listing 2–14](#Chapter02.html#list_2_14).


    **Listing 2–14.** *The `EventManagerThreads` Class*


    `package com.apress.framework.core;`


    `import com.apress.framework.common.EventControllerManager;`

    `import java.util.Hashtable;`


    `public class EventManagerThreads`

    `{`

    `    public static class ManagerThread implements Runnable`

    `    {`

    `        EventControllerManager manager = null;`

    `        long sleepTime = 0;`

    `        boolean run = true;`


    `        public ManagerThread(EventControllerManager manager, long sleepTime)`

    `        {`

    `            this.manager = manager;`

    `            this.sleepTime = sleepTime;`

    `        }`


    `        public void run()`

    `        {`

    `            while ( run )`

    `            {`

    **`                int evtCount = manager.currentEventCount();`**

    **`                while ( evtCount>0 )`**

    **`                {`**

    **`                    manager.processNextEvent();`**

    **`                    evtCount--;`**

    `                }`


    `                try`

    `                {`

    `                    Thread.sleep(sleepTime);`

    `                }`

    `                catch (InterruptedException ex)`

    `                {`

    `                    ex.printStackTrace();`

    `                }`

    `            }`

    `        }`

    `        public void stop()`

    `        {`

    `            run = false;`

    `        }`


    `    }`


    `    protected static Hashtable threads = new Hashtable();`


    `    protected EventManagerThreads()`

    `    {`

    `        // Do nothing`

    `    }`


    `    public static void start(EventControllerManager manager, long sleepTime)`

    `    {`

    `        stop(manager);`

    `        ManagerThread thread = null;`

    `        thread = new ManagerThread(manager, sleepTime);`

    `        Thread t = new Thread(thread);`

    `        t.start();`

    `        threads.put(manager, thread);`

    `    }`


    `    public static void stop(EventControllerManager manager)`

    `    {`

    `        ManagerThread thread = (ManagerThread) threads.get(manager);`

    `        if( thread != null )`

    `        {`

    `            thread.stop();`

    `        }`

    `    }`


    `}`


    Please look at the highlighted lines in the foregoing listing. You may ask, why
    not simply use `hasMoreEvents()`? The answer is simple: as events get handled
    by listeners, those listeners can and often do add other events to the queues
    of their controllers. This can lead to situations in which your controller manager
    will always have more events to process, which in turn means that you will never
    exit the loop, which in turn means that the thread will never sleep, thus running
    at full speed and wasting valuable resources, especially CPU time. Our approach
    makes sure that only the events that are already in the queue are processed in
    the current time frame, while events added in the current time frame will be processed
    in the next one. Not handling this properly is a very frequent mistake in event-based
    systems.


    **NOTE:** This chapter has a sample application near the end that is great for
    exemplifying this issue. To see the difference between using `hasMoreEvents()`
    and using `currentEventCount()`, run that application using both approaches.


    With this class, we finally have a functional event system. Understanding and
    using it can be a bit confusing at first, so let''s take a few moments to examine
    how it functions as a whole and what you must do to get it running.


    First, if you want to be able to respond to events, you have to register yourself
    to the appropriate event controller or controllers. If you want to register yourself
    as a listener to the main event controller, you should call the following:


    `Application.getMainEventController().registerListener( this )`


    Next, whenever something happens, you have to queue the appropriate event on the
    appropriate controller or controllers. For example, to queue an event on the main
    event controller, all you have to do is call the following:


    `Application.getMainEventController().queueEvent( someEvent )`


    All event controllers with the exception of local ones should be assigned to a
    manager. For example, to assign a controller to the main event controller manager,
    you must call the following:


    `Application.getMainEventControllerManager().assign( someController );`


    Lastly, you must make sure all event controller managers get the chance to periodically
    process their underlying events, let''s say every 20 milliseconds. One easy way
    of doing so is by calling the following:


    `EventManagerThreads.start( someManager, 20);`


    While the approach just described is a bit more complicated than the classical
    “queue here, process now” one, it does allow for a greater degree of freedom and
    flexibility. For example, you can control which controllers are assigned to which
    manager, and how often each manager gets called and on what thread. So you can,
    if need be, assign all low-priority controllers to the same manager and have it
    called every five or ten seconds, thus saving CPU time. You can also easily modify
    the code to allow for two or more managers to run the same thread, so that all
    low-priority managers share the same thread, while each high-priority manager
    gets its own thread.


    As you can probably imagine, the current code we have for this is far from perfect.
    CPU-intensive events can still stall the controller; there is the possibility
    that a very important and crucial event will be placed at the back of the queue
    and thus be processed too late, etc.


    However, most issues that can crop up can be fixed with relative ease and with
    minor alterations to the code and the ideas behind it.


    For example, you can create multiple event controllers and event managers, some
    for high priority events and some for low priority ones.


    You can also split CPU-heavy events into smaller chunks, using the `DO_WORK_UNIT`
    trick from the previous chapter.


    Last but not least, you can have events about events. For example, you can implement
    a `FILL_IN_THE_BLANKS` event, which takes another event as a payload, processes
    it in some way (modifies its payload, changes its type or context, etc.), and
    then puts it in circulation. It sounds complicated, but it''s quite simple to
    do and a lot more useful than it initially looks. A basic implementation of the
    concept is presented in [Listing 2–15](#Chapter02.html#list_2_15).


    **Listing 2–15.** *Events About Events*


    `Event evt = new SomeEventWithIncompleteInformation();`

    `Event handleThis = new Event( EVT.CONTEXT.NONE, EVT.EVENTS.FILL_IN_THE_BLANKS,
    evt);`

    `mainEventController.queueEvent ( handleThis ) ;`


    `....`


    `public void handleEvent(Event evt)`

    `{`

    `        if ( evt.getType() == EVT.EVENTS.EVENTS.FILL_IN_THE_BLANKS )`

    `        {`

    `                Event temp = (Event) evt.getPayload() ;`

    `                if ( evt instanceOf SomeEventWithIncompleteInformation)`

    `                {`

    `                        completeInformation( evt );`

    `                        mainEventController.queueEvent ( evt );`

    `                }`

    `        }`

    `}`'
