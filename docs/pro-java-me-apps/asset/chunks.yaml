    `                getAbsoluteY()+PADDING+f.getHeight()*i, Graphics.TOP | Graphics.LEFT
    );`

    `        }`

    `        ClipHelper.resetClip(g);`

    `}`


    I would like to point out at this point the very intimate relationship between
    `paint()` and `getPreferredHeight()`. Both methods must be speaking the same language
    and calculating based on the same reference numbers (font size, for example),
    otherwise the widget will be either too small or too large for the text it has
    to display.


    Now that we have our `SimpleTextItem`, we can create an input component based
    on it, which the user can use to enter text.


    #### InputStringItem


    This widget will be used to get text from the user. Code-wise, it will be a combination
    of a `StringItem` and a native `TextBox`. Its text will be displayed as a `StringItem`,
    but when the user activates it (via touch or by pressing FIRE) it will display
    a native `TextBox` in which the user can enter text instead of triggering a `BUTTON_PRESSED`
    event. Then, when the user presses OK in the `TextBox`, the widget will forward
    a `TEXT_CHANGED` event to its callback handler, if any.


    **NOTE:** Normally, UI frameworks have their own custom-written input fields and
    do not rely on native components like the `TextBox`. However, writing custom input
    fields requires a lot of time and effort, and could very well have an entire book
    dedicated to it. As such, we will use the native `TextBox` instead.


    The bulk of the work is already done for us in `StringItem`, so we can concentrate
    on implementing only the new functionality, which is displaying the `TextBox`
    and retrieving text from it.


