    \ in our specifications for the `Timeline` interface, retrieving tweets is a synchronous\
    \ operation: `goForward()` and `goBack()` must return either the next corresponding\
    \ tweet or `null` whenever they are called.\n\nAdapting asynchronous operations\
    \ to work synchronously is a pretty common task for Java ME applications that\
    \ use external services since some services are, by design, at least partially\
    \ asynchronous. The simplest solution, which is often also the most effective\
    \ one, relies on buffers and Java's `wait()` and `notify()` methods. It works\
