    这不仅效率低下，从长远来看也是不可行的：Twitter 对任何给定应用程序每小时的请求总数都有限制，因此如果你 `goBack()` 的次数过多、速度过快，很可能会耗尽请求配额。


    对于这个问题，一个非常好的解决方案是缓冲，我们将在 `TimelineUserTweets` 中实现它。其工作原理如下：当首次调用 `goBack()` 时，我们将请求一批推文（而非单条），将这批推文放入缓冲区，并返回第一条推文。当该方法再次被调用时，将返回缓冲区中的第二条推文，依此类推，直到缓冲区为空，此时将请求新的一批推文。这个过程会持续进行，直到我们从服务器获取到一个空批次，此时表明已经没有更多推文可供检索。`goForward()`
    也采用相同的策略。


    缓冲在网络流量、数据成本、服务器负载和电池续航方面带来了巨大的改进。对于依赖网络连接的 Java ME 应用程序来说，这是一项重要的技术。


    此外，它的好处并不仅限于客户端-服务器通信。由于从服务器检索到的数据会存储在缓冲区中，因此可以在实际需要之前对其进行处理。一个巧妙的应用程序可以在 CPU
    使用率低时处理缓冲区中的数据，并在 CPU 使用率高时暂停处理。这确保了 CPU 负载在应用程序运行期间的均匀分布，并带来更流畅的整体用户体验，因为应用程序无需花费太多时间即时处理数据。


