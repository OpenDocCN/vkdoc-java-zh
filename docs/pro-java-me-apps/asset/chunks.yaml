  trans: '

    #### 解决常见的单元测试相关问题


    编写 Java ME 单元测试的主要难点不在于编写测试本身，也不在于缺乏测试编写工具；而在于如何覆盖不同设备之间、以及真实设备与模拟器之间的差异。众所周知，某些功能（例如，对各种媒体类型和
    SSL 证书的支持）在真实设备上可以工作，但在模拟器上却不行，反之亦然。此外，如果你的目标设备是多种不同的设备，就必须考虑每台设备的限制和特性，例如屏幕分辨率、内存大小和
    API 支持。


    克服这个问题并不特别困难。你最重要的工具是一个良好的移植框架。你可以用它为每台不同的真实设备和每个模拟器创建独立的测试构建。其主要思路是：如果某个测试在给定的目标设备上无法运行（无论出于何种原因，例如
    API 支持），你可以将其从构建中排除，或者替换为一个*能够*在该目标设备上运行的等效版本。你还可以在构建配置文件中存储特定于构建的信息——例如，为不同设备设置不同的资源
    URL、不同的测试设置和测试数据。


    需要注意的是，单元测试的目标不是在通用上下文中测试应用程序的代码，而是在其将要运行的确切上下文中进行测试。考虑到这一点，你的测试和测试数据应始终尝试模拟实际应用程序在真实环境中的压力。例如，假设你正在编写一个客户端-服务器应用程序，它有两种通信协议版本：一种用于低端设备的“轻量级”协议，另一种用于高端设备的“重量级”协议。在低端设备上使用“重量级”测试数据运行测试并不能代表应用程序的真实情况。测试可能会失败，或者设备性能表现不佳，但这对于真实场景来说无关紧要，因为低端设备只需要处理“轻量级”协议数据。同样，仅通过
    Wi-Fi 或 3G 测试网络相关功能也无法提供相关信息，因为应用程序还需要在信号不稳定和网络连接质量较差的区域运行。


    这引出了 Java ME 单元测试的另一个重要方面：模拟非应用程序相关的因素，例如网络连接质量、电池电量和 GPS 位置。这是设备模拟器大放异彩的领域之一。所有主流的设备模拟器都允许你在运行时轻松、动态地配置这些参数，通常是通过一个便捷的属性页面，从而确保你可以测试到你能想到的每一种可能场景。


    然而，当你希望这些参数根据给定的脚本发生变化时（例如，5 秒的良好网络质量，然后 10 秒无网络，接着 5 秒的平均网络质量），或者当你需要对发生的事情进行底层控制时（例如，控制从
    `HttpConnection` 读取的确切字节数以及读取间隔），问题就开始出现了。


    解决这些问题的最佳方案是创建*模拟*类——并且，再次强调，拥有一个良好的移植框架将对你大有裨益。例如，在前面的 `HttpConnection` 示例中，最好的方法是自己编写一个
    `MockHttpConnection` 类，它具有与真实 `HttpConnection` 相同的公共 API，但它是从*脚本文件*中读取数据，而不是从实际的
    HTTP 连接中读取。然后，你可以指示移植框架将所有对 `HttpConnection` 的引用替换为 `MockHttpConnection`，并且只要准备好脚本文件，就可以开始了。


    这种方法虽然优雅且极其灵活，但也有其优缺点，你必须对两者都有所了解。从优点方面来说，它让你能够完全控制环境中原本无法控制的方面，并且你不仅可以在模拟器上，还可以在真实设备上受益于这种控制。


    从缺点方面来说，你模拟的是硬件/操作系统组合的*理论*行为，而不是其实际行为。例如，仅仅因为你的 `MockHttpConnection` 测试能够每秒处理
    1 MB 的数据，并不意味着真实的 `HttpConnection` 也能做到这一点。通过确保测试数据/脚本文件与在真实场景中观察到的情况相似，可以最小化这种影响，但你永远无法
    100% 确定你模拟的行为会与真实行为匹配，尤其是在出现故障和异常行为时。


    另一个缺点是，模拟类往往会增加开销，并对设备资源造成额外压力，这反过来可能会改变测试结果和/或导致本应通过的测试失败。这是你必须接受的事实，因为有时很难确定测试失败是由于你的应用程序代码还是由于额外的压力，尤其是在真实设备上。


    #### 收集高质量的调试数据


    单元测试为你提供了一个绝佳的机会：从应用程序的各个部分收集调试数据，无论是它们独立工作时，还是协同工作时。通过使用这些数据，你可以比从实际应用程序收集调试数据更快、更可靠地识别整个应用程序代码中的性能瓶颈和潜在问题区域。


    在单元测试期间收集的调试数据的主要吸引力在于，它既能反映真实世界的性能（如果测试是这样设计的），又由于测试的高度可控性而每次都可重现。因此，例如，如果代码更改后收集的性能数据比更改前收集的性能数据更差，你就知道新代码的性能比旧代码差。


    同样的道理也适用于追踪错误。由于单元测试中的随机性因素大大降低，因此更容易确定某个问题是由竞态条件、糟糕的算法、平台故障还是其他原因引起的。


    话虽如此，在实验室收集的调试数据与在实际使用过程中收集的调试数据之间总会存在差异。有许多错误，尤其是推测性的错误，只能在真实场景中进行调试。因此，永远不要只依赖实验室的调试数据，也不要仅仅因为某个问题在实验室测试中已修复，就认为它在实际应用程序中也已修复。

