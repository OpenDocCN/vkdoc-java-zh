- fmt: "接下来，代码还说明了编写基于事件的应用程序的一个非常重要的原则：你不应该仅仅因为收到一个事件就盲目地执行某个操作或发起某个动作。粗体显示的行展示了我们在尝试处理事件之前执行的一些非常基本的检查。乍一看，它们只是简单的健全性检查，以确保不会发生`NullPointerExceptions`。虽然这没错，但这些检查背后还有一层“隐藏”的逻辑。在我们的例子中，如果`Timeline`对象未初始化，则无法继续处理“请求推文”事件；而`Timeline`对象在登录尝试成功时被初始化，这又仅在`APPLICATION_START`事件期间成功初始化`TweetsController`之后才会发生。\n\
    \n这一切意味着，实际上，除非此操作之前的所有逻辑步骤都已执行完毕，否则你无法请求推文——凭空发出一个“请求推文”事件不会有任何作用。这确保了事件不会按错误的顺序或在不当的情况下被处理，如果你计划在应用程序中大量使用事件，这一点至关重要。\n\
    \n另一个值得关注的点是`REQUEST_MAIN_TWEETS_BATCH`事件的处理方式。此事件的目的是从服务器检索下一批推文（批次大小在`Defaults`类中定义）。当接收到批次时，代码不会调用预设的方法或直接返回/处理该批次，而是为批次中的每条推文生成一个`RECEIVED_TWEET`事件。然后，这个事件可以在任何其他控制器中处理，甚至在生成它的同一个控制器中处理。\n\
    \n这种方法背后的理念是保持一切清晰且模块化：你有一个用于接收推文的事件和一个用于处理它们的事件；两者完全独立。人们总是倾向于将相似或相关事件的处理混在一起。例如，在UI库的情况下，独立的`REQUEST_PAINT`和`HANDLE_PAINT`事件可能会被错误地合并成一个`DO_REPAINT`事件。起初这听起来可能是个好主意，或者你甚至可能没有意识到实际上需要实现两个独立的事件。然而，随着应用程序的增长，你很快会发现，`HANDLE_PAINT`事件的处理可能需要由`REQUEST_PAINT`部分之外的其他原因触发，或者收到`DO_REPAINT`事件并不总是导致重绘（例如，当相关的小部件/表面对最终用户不可见时）。因此，将单一的大事件拆分成更小的事件总是一个好主意——当然，也不要过度拆分。这有助于保持代码库小巧且易于维护，这两点都是任何优秀Java\
    \ ME应用程序的关键方面。\n\n以上涵盖了`TweetsController`。接下来是`WelcomeScreenController`和`WelcomeForm`。\n\
    \n### 实现 WelcomeScreenController 和 WelcomeForm\n\n这个表单-控制器组合负责应用程序在首次启动并显示欢迎屏幕时与用户交互的方式。欢迎屏幕也作为应用程序的登录屏幕。\n\
    \n在继续之前，我想指出屏幕（screen）和表单（form）之间细微的概念性区别。屏幕是用户在应用程序运行期间的某个时刻所看到、听到和感觉到（通过振动）的全部内容。它就像是应用程序的一个多媒体快照。其中，表单只是应用程序的UI部分，包含用户可以与之交互的应用程序小部件。它甚至可能不是屏幕的整个视觉部分（例如，当应用程序未以全屏模式运行时）。这种区别主要是理论上的，在实践中，这两个术语在大多数情况下可以互换，但在设计具有复杂用户交互场景的复杂应用程序时，这种区别可能需要牢记。当然，“屏幕”和“表单”的称谓并非固定不变：不同的团队和个人可能会使用不同的术语。\n\
    \n回到我们的Twitter客户端，让我们看看`WelcomeForm`的源代码，如[清单8-5](#Chapter08.html#list_8_5)所示。\n\
    \n**清单 8–5.** *`WelcomeForm`*\n\n```java\npackage app.views;\n\n...\n\npublic\
    \ class WelcomeForm extends GameCanvasView implements CallbackHandler\n{\n\n \
    \   protected InputStringItem username = null;\n    protected InputStringItem\
    \ password = null;\n    protected SimpleTextButton login = null;\n\n    public\
    \ WelcomeForm(UITheme theme)\n    {\n        super(false,theme);\n\n        //\
    \ Create all the needed widgets\n        username = new InputStringItem(Locale.get(\"\
    username.text\"), \"\",\n        Locale.get(\"text.general.ok\"), Locale.get(\"\
    text.general.cancel\"),\n        getContentWidth()/2, 100, null, theme);\n\n \
    \       password = new InputStringItem(Locale.get(\"username.text\"), \"\",\n\
    \        Locale.get(\"text.general.ok\"), Locale.get(\"text.general.cancel\"),\n\
    \        getContentWidth()/2, 100, null, theme);\n\n        login = new SimpleTextButton(Locale.get(\"\
    login.button.text\"), this, theme);\n\n        // Create the form structure\n\
    \        addWidget ( new Label(Locale.get(\"username.text\") + \":\",theme));\n\
    \        addWidget(username);\n        addWidget ( new Label(Locale.get(\"password.text\"\
    ) + \":\",theme));\n        addWidget(password);\n        addWidget(login);\n\n\
    \        // Lay out and focus the form\n        doLayout();\n        onFocus();\n\
    \    }\n\n    public boolean doCallback(Event evt)\n    {\n        if ( EVT.UI.BUTTON_PRESSED\
    \ == evt.getType() )\n        {\n            UserCredentials credentials = null;\n\
    \            if ( Defaults.USE_SINGLE_USER_ACCESS )\n            {\n         \
    \       credentials = new UserCredentials(null,null, \"<token>\",\n          \
    \      \"<token-secret>\");\n            }\n            else\n            {\n\
    \                credentials = new UserCredentials(username.getText(),\n     \
    \           password.getText(),null,null);\n            }\n\n            Event\
    \ event = new Event ( EVT.CONTEXT.LOGIN_FORM, EVT.NETWORK.BEGIN_LOGIN,\n     \
    \       credentials);\n            Application.getMainEventController().queueEvent(event);\n\
    \            return true;\n        }\n        return false;\n    }\n}\n```\n\n\
    你可以在类的构造函数中看到小部件是如何初始化的，以及表单结构是如何创建的。这应该让你想起专门介绍UI的章节，因此我们不再赘述。我唯一想指出的是，所有界面字符串都已本地化，如果这还不是你的标准做法，那么它应该成为你的标准做法——即使你正在处理的项目没有特别要求本地化。"
  raw: 'Moving on, the code also illustrates a very important principle of writing
    event-based applications: you should never blindly do something or initiate an
    action merely as a result of receiving an event. The lines in bold show some very
    basic checks that our code does before attempting to process events. At first
    glance, they are mere sanity checks, to ensure that no `NullPointerExceptions`
    can occur. While this is true, there is a “hidden” logic behind the checks. In
    our case, the handling of the “request tweets” event cannot proceed if the `Timeline`
    object is not initialized, which in turn is initialized when a login attempt succeeds,
    which in turn happens only after a successful initialization of the `TweetsController`
    during the `APPLICATION_START` event.


    What this all means is that, in effect, you cannot request a tweet unless all
    the logic steps that precede this action have been carried out—issuing a “request
    tweets” event out of the blue does nothing. This ensures that events cannot be
    processed out of sequence or in inappropriate circumstances, which is vital if
    you plan to use events heavily in your application.


    Another point of interest is the way the `REQUEST_MAIN_TWEETS_BATCH` event is
    handled. The purpose of this event is to retrieve the next batch of tweets from
    the server (the batch size is defined in the `Defaults` class). When the batch
    is received, instead of calling a pre-set method or returning/processing the batch
    directly, the code generates a `RECEIVED_TWEET` event for each tweet in the batch.
    This event can then be processed in any other controller, or even in the same
    controller that generated it.


    The idea behind this approach is to keep everything clean and compartmentalized:
    you have an event for receiving tweets and one for processing them; the two are
    entirely independent. There is always the temptation to mix together the processing
    of similar or related events. For example, the separate `REQUEST_PAINT` and `HANDLE_PAINT`
    events might be wrongfully combined into a `DO_REPAINT` event in the case of a
    UI library. This may sound like a good idea at first, or you might not even realize
    that there are, in fact, two separate events that need to be implemented. However,
    as the application grows, you will quickly find that the `HANDLE_PAINT` part of
    the event might require processing as a result of something other than the `REQUEST_PAINT`
    part, or that receiving a `DO_REPAINT` event might not always result in a repaint
    (for example, when the widget/surface in question is not visible to the end user).
    As such, it is always a good idea to split monolithic events into smaller ones—without
    over-doing it, of course. This keeps the code base small and easier to maintain,
    both of which are key aspects of any good Java ME application.


    This covers the `TweetsController`. Up next are the `WelcomeScreenController`
    and the `WelcomeForm`.


    ### Implementing the WelcomeScreenController and the WelcomeForm


    This form-controller combination is responsible for the way the application interacts
    with the user when the application is first started and the welcome screen is
    shown. The welcome screen also serves as the login screen for the application.


    Before we continue, I would like to point out the subtle conceptual difference
    between a screen and a form. A screen is the totality of what the user sees, hears,
    and feels (via vibrations) at a certain point during an application’s runtime.
    It is like a multimedia snapshot of the application. Of this, the form is only
    the UI part of the application, which contains the application widgets with which
    the user can interact. It may not even be the entire visual part of the screen
    (which happens if the application is not running in full-screen mode, for example).
    The difference is mostly theoretical, and in practice the two terms can be interchanged
    most of the time, but when designing complex applications with complex user interaction
    scenarios, this difference might be something to keep in mind. Of course, the
    denominations “screen” and “form” aren’t fixed: different teams and individuals
    may use different terms for them.


    Going back to our Twitter client, let’s have a look at what the `WelcomeForm`
    source code looks like, shown in [Listing 8–5](#Chapter08.html#list_8_5).


    **Listing 8–5.** *The `WelcomeForm`*


    `package app.views;`


    `...`


    `public class WelcomeForm extends GameCanvasView implements CallbackHandler`

    `{`


    `    protected InputStringItem username = null;`

    `    protected InputStringItem password = null;`

    `    protected SimpleTextButton login = null;`


    `    public WelcomeForm(UITheme theme)`

    `    {`

    `        super(false,theme);`


    `        // Create all the needed widgets`

    `        username = new InputStringItem(Locale.get("username.text"), "",`

    `        Locale.get("text.general.ok"), Locale.get("text.general.cancel"),`

    `        getContentWidth()/2, 100, null, theme);`


    `        password = new InputStringItem(Locale.get("username.text"), "",`

    `        Locale.get("text.general.ok"), Locale.get("text.general.cancel"),`

    `        getContentWidth()/2, 100, null, theme);`


    `        login = new SimpleTextButton(Locale.get("login.button.text"), this, theme);`


    `        // Create the form structure`

    `        addWidget ( new Label(Locale.get("username.text") + ":",theme));`

    `        addWidget(username);`

    `        addWidget ( new Label(Locale.get("password.text") + ":",theme));`

    `        addWidget(password);`

    `        addWidget(login);`


    `        // Lay out and focus the form`

    `        doLayout();`

    `        onFocus();`

    `    }`


    `    public boolean doCallback(Event evt)`

    `    {`

    `        if ( EVT.UI.BUTTON_PRESSED == evt.getType() )`

    `        {`

    `            UserCredentials credentials = null;`

    **`            if ( Defaults.USE_SINGLE_USER_ACCESS )`**

    **`            {`**

    **`                credentials = new UserCredentials(null,null, "<token>",`**

    **`                "<token-secret>");`**

    **`            }`**

    **`            else`**

    **`            {`**

    **`                credentials = new UserCredentials(username.getText(),`**

    **`                password.getText(),null,null);`**

    **`            }`**


    `            Event event = new Event ( EVT.CONTEXT.LOGIN_FORM, EVT.NETWORK.BEGIN_LOGIN,`

    `            credentials);`

    `            Application.getMainEventController().queueEvent(event);`

    `            return true;`

    `        }`

    `        return false;`

    `    }`

    `}`


    You can see in the constructor of the class how the widgets are initialized and
    how the form’s structure is created. This should be familiar to you from the chapter
    dedicated to the UI, so we won’t go into it. The only thing I would like to point
    out are that all interface strings are localized, which should become standard
    practice for you if it’s not already—even if the project you are working on does
    not specifically require localization.'
