    \ We did a good job!\n\n![images](images/0201.jpg)\n\n**Figure 2–1.** *The test\
    \ application in action*\n\n### Summary\n\nWe have looked at how the framework\
    \ for our Pro Java ME application functions. In the process, we have also learned\
    \ how to properly structure and write Java ME application frameworks in general,\
    \ as well as some of the pitfalls associated with this.\n\nAt the end of the chapter,\
    \ we took our framework for a test drive by writing a small sample application\
    \ based on it.\n\nNext, we will define our application's data types and look at\
    \ how properly defining data types and objects can improve a Java ME application.\n\
    \n## Chapter 3\n\n## Defining Our Data\n\nIn this chapter, we will cover defining\
    \ data types and objects in a Java ME–friendly fashion. This step rarely receives\
    \ the attention it deserves, but just as developing an application with the wrong\
    \ mindset or developing it on top of the wrong framework can lead to disaster,\
    \ so can using the wrong representation for your data.\n\nThe main pitfall here\
    \ is the tendency to apply standard OO concepts (everything is an object, specialized\
    \ objects are built on top of less specialized ones via inheritance, etc.) directly\
    \ to Java ME, without consideration to the platform's peculiarities.\n\nIf you\
    \ do so, you will end up with an elegant object hierarchy from an architectural\
    \ point of view, but one that behaves poorly in performance-critical moments and\
    \ that requires a lot of RAM. At the same time, going to the other extreme and\
    \ consolidating everything in a single class (or two or three) isn't an option\
    \ either, as this will lead to great performance but virtually unmaintainable\
    \ code.\n\nThe sweet spot for Java ME lies somewhere in the middle: consolidate\
    \ objects and data types to a high enough degree that performance issues are minimized,\
    \ while still retaining enough separation between them to call the whole thing\
    \ \"object-oriented.\" This chapter aims to show how to find that sweet spot.\
    \ In the process, we will also define the actual data types and entities we will\
    \ use in our Twitter client.\n\nWe will concern ourselves only with global data\
    \ types and entities, those that belong in the `app.models` package. Non-global\
    \ models will be handled in their specific modules.\n\n### Why Implement the Model\
    \ Interface?\n\nYou will notice that all the classes we will discuss in this chapter\
    \ implement the `Model` interface, while all the interfaces we will discuss extend\
    \ it. In other words, the `Model` interface is at the root of every global data\
    \ type and entity within in our application. Furthermore, as we have seen in the\
    \ previous chapter, the `Model` interface is empty. So why implement/extend it\
    \ at all?\n\nThere are three main reasons for this. The first reason is that it\
    \ acts as a very efficient code hint. For example, if a developer sees that class\
    \ `Tweet` is a `Model`, he knows that this class should model the behavior and\
    \ functionality of the associated \"real-life\" entity, and from the specifications\
    \ he knows how exactly it should achieve this. Furthermore, when he will consider\
    \ adding new functionality to the class, he will ask himself if that functionality\
    \ really belongs in a `Model` or in some other place (like a related `Controller`).\
    \ Finally, the information that a class extends `Model` can be used by code analysis/optimization\
    \ tools, and by IDEs (to get a list of all models in an application, regardless\
    \ of their package, one simply has to do a \"Show type history\" on `Model`).\n\
    \nThe second reason for implementing the `Model` interface is that it helps in\
    \ the consolidation effort. For example, you may decide (either beforehand or\
    \ during development) that all models should implement a `checksum()` method or\
    \ an `isSyncedToServer()` method to check if the client's local data is the same\
    \ as the data on the server (extremely useful for real-time applications). Having\
    \ all models implement a common interface is an elegant and effective way to achieve\
    \ this.\n\nThe third reason is that the `Model` interface can also act as a safeguard\
    \ against over-consolidation. To keep with the previous example, if inside a class\
    \ it is not clear to what data the `checksum()` or `isSyncedToServer()` methods\
    \ apply, or if you would conceptually need two separate `checksum()` methods for\
    \ the same class (each method working on two different sets of data), then you\
    \ have most likely over-consolidated and need to split up the problematic data\
    \ types and objects until one `checksum()/isSyncedToServer()` method per class\
    \ suffices and its scope is perfectly clear."
