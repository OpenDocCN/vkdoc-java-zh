  trans: '

    ### 执行电池测试


    电池测试是移动设备特有的环节。通常，你需要了解应用程序消耗了多少电量，例如，用于确定应用程序的预估最长运行时间、检查添加到应用程序代码中的电源优化效果，或者仅仅是为了营销目的。


    获取电池测量值最简单、最可靠的方法是购买专用的功耗测量设备，例如功率计。这些设备能提供关于设备瞬时功耗和总功耗的可靠信息。缺点是普通的功率计有点难以连接到手机电源电路，而专门为手机设计的专用功率计往往价格昂贵。


    当专用硬件无法实现时，有时可以转而使用原生 API 来获取电池测量值。这在智能手机上是一个相当常见的功能。然而，我还没有见过具备此功能的纯 Java ME
    设备。因此，唯一可行的替代专用硬件测量设备的方法，就是简单地根据电池的额定容量和应用程序耗尽电池所需的时间来估算功耗。虽然这不需要额外的硬件，并且适用于任何
    Java ME 设备，但确实需要耐心。


    你需要做的第一件事是建立几个基准场景，并获取相应的功耗测量值。例如，当没有应用程序运行且无线电关闭时，设备电池耗尽需要多长时间？当没有应用程序运行但无线电开启时，电池耗尽需要多长时间？当信号强度只有
    50%，或者 Wi-Fi 与无线电同时开启时，情况又如何？每个合理的用户使用场景都应转化为一个基准测量值。


    然后，你需要在相同的使用场景下运行你的应用程序，并将新的测量值与基准值进行比较。电池续航时间的差异是由应用程序的功耗造成的。为了切合实际，你应该测量三种应用程序使用场景下的功耗：低使用率、中等使用率和高强度使用率。你还应该对每个场景至少运行四到五次，以考虑不同的条件（例如，网络信号）。


    理想情况下，故事到此就结束了，但现实世界并不理想。手机电池耗尽需要很长时间。这意味着必须有人以一致的方式“玩”手机至少几个小时，直到手机没电，然后必须重复相同的使用模式再进行几次测试。除了（至少可以说）是一件真正的苦差事之外，这种方法还容易出错，因为不同测试轮次之间使用模式的差异，即使是微小的差异，也可能使测试结果产生偏差。即使对于使用专用硬件设备进行的测量，这也是一个问题。你仍然需要测量至少
    10-20 分钟的功耗，这段时间足以让使用模式产生一致的差异。


    **提示：** 并不总是需要将应用程序运行到电池 100% 耗尽。有些设备会显示剩余电量，通常以百分比形式显示。在这些情况下，通常只需让电量消耗 5-10%，就能对应用程序的功耗进行切合实际的估算。


    解决这个问题的一个方法是自动化该过程。你可以通过三种方式实现。第一种方法是在你的应用程序中添加一个*机器人*类，它在一个循环中模拟所需的使用模式。就你的应用程序而言，是用户在发出命令，而不是机器人。这种方法有效，但有一些缺点。当你的应用程序认为有一个真实用户在掌舵时，你的设备却不这么认为。因此，省电功能可能会启动（至少屏幕会关闭）。这可以通过各种方式避免，包括手机设置、原生
    API 调用和物理技巧。还应注意，机器人类会增加一些 CPU 使用率（通常很小），这反过来会转化为电池续航时间的损失。


    第二种方法涉及通过电缆连接，从连接的计算机向设备发送命令（按键、触摸事件）。这些命令通常以与真实用户命令相同的方式处理，因此不应启动省电措施。此外，这能提供更准确的读数，因为机器人类不会增加额外的负担。这种方法的问题在于它不容易实现。根据制造商以及芯片组/固件的不同，通常需要进行大量的挖掘和破解工作，并且结果并不总能保证成功。


    第三种方法涉及硬件改装，虽然听起来很难，但对于喜欢做这类事情的人来说相当容易（我大学时认识一个这样做的人），因为所需的大部分硬件部件都很容易获得。其思路是将设备的部分或全部按键连接到
    PC 的串口或并口上。发送到该端口的信号将被设备解释为真实的按键操作。这种方法 100% 有效（前提是改装得当），而且额外的好处是它提供了最逼真的用户模拟。在我看来，这是迄今为止最好的解决方案，尽管在此过程中你很可能需要牺牲一部手机。


    最后，应注意电池的效率会随着时间的推移而降低。请经常更换电池，以避免使你的测试结果产生偏差。

