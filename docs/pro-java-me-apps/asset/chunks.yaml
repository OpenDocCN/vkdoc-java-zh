    persistence module. For example, the encryption module can use them to reduce
    data to the lowest common denominators, bytes, before encrypting it.


    #### Implementing RecordReaders and RecordWriters


    The `RecordReaders` and `RecordWriters` interfaces will be implemented by the
    `ByteRecordReader` and `ByteRecordWriter` classes respectively.


    `ByteRecordWriter` can be seen in [Listing 5–8](#Chapter05.html#list_5_8). The
    highlighted lines show how to serialize a string''s length together with the string
    itself.


    **Listing 5–8.** *The `ByteRecordWriter`*


    `package app.module.persistence.models;`


    `import app.module.persistence.classes.RecordWriter;`

    `import java.io.ByteArrayOutputStream;`

    `import java.io.IOException;`


    `public class ByteRecordWriter implements RecordWriter`

    `{`

    `    ByteArrayOutputStream os = new ByteArrayOutputStream();`

    `    ByteSerializer bs = new ByteSerializer();`


    `    protected void writeRawByteArray(byte [] data)`

    `    {`

    `        ...`

    `        os.write(data);`

    `        ...`


    `    }`


    `    public void reset() { os.reset(); }`


    `    public void writeString(String value)`

    `    {`

    **`byte [] rawStringData = bs.serializeString(value);`**

    **`writeRawByteArray( bs.serializeInt(rawStringData.length) );`**

    **`writeRawByteArray( rawStringData );`**

    `    }`


    `    public void writeInt(int value)`

    `    {`

    `        writeRawByteArray( bs.serializeInt(value) );`

    `    }`


    `    public void writeLong(long value) { ... }`

    `    public void writeBoolean(boolean value) { ... }`

    `    public byte[] getCurrentResult() { return os.toByteArray(); }`

    `    public void writeByte(byte value) { ... }`


    `}`


    The main idea here is to treat the string''s length (an integer) and the string''s
    body (a collection of bytes) as an atomic data type and write them together. It
    is also very important to write the string''s length first; otherwise you won''t
    know how many bytes to read when decoding it.


    The counterpart to the `ByteRecordWriter` is the `ByteRecordReader`, presented
    in [Listing 5–9](#Chapter05.html#list_5_9). The highlighted lines this time show
    how to deserialize a string that was serialized along with its length. The process
    is quite intuitive and simple: first we read the string''s length and then we
    read the string''s actual bytes.


    **Listing 5–9.** *The `ByteRecordReader`*


    `package app.module.persistence.models;`


    `import app.module.persistence.classes.RecordReader;`


    `public class ByteRecordReader implements RecordReader`

    `{`

    `    byte [] recordData = null;`

    `    int currentOffset = 0;`

    `    ByteDeserializer bds = new ByteDeserializer();`


    `    public ByteRecordReader ( byte [] data)`

    `    {`

    `        recordData = data;`

    `    }`


    `    public String readString()`

    `    {`

    **`int strSize = readInt();`**

    **`String result = bds.deserializeString(recordData, currentOffset, strSize);`**

    **`currentOffset += strSize;`**

    **`return result;`**

    `    }`


    `    public int readInt()`

    `    {`

    `        int result = bds.deserializeInt(recordData, currentOffset);`

    `        currentOffset += 4;`

    `        return result;`

    `    }`


    `    public long readLong() { ... }`

    `    public boolean readBoolean() { ... }`

    `    public byte readByte() { ... }`

    `}`


    #### Implementing the PersistenceProvider


    Finally, the `RMSPersistenceProvider` shown in [Listing 5–10](#Chapter05.html#list_5_10)
    is a persistence provider implementation built around the RMS. In this case, we
    are fortunate, as the RMS API has an exact correspondent for the methods our `RMSPersistenceProvider`
    needs to implement. Because of this, our `RMSPersistenceProvider` is little more
    than a wrapper around the Java ME''s RMS API.


    For other providers, however, particularly cloud-based ones, things can be considerably
    more complicated. For example, in the case of cloud-based providers, network connections
    need to be established and managed, and communication with the server needs to
    be done via a standardized protocol as opposed to direct, native platform API
    calls. This complicates the code significantly and introduces a lot of potential
    problems, so careful thought must be given to the `PersistenceProvider` in such
    cases.


    **Listing 5–10.** *The `RMSPersistenceProvider`*


    `package app.module.persistence.models;`


    `import app.module.persistence.classes.PersistenceProvider;`

    `import javax.microedition.rms.RecordStore;`

    `import javax.microedition.rms.RecordStoreException;`


    `public class RMSPersistenceProvider implements PersistenceProvider`

    `{`

    `    String recordStoreName;`

    `    RecordStore rs ;`


    `    public RMSPersistenceProvider(String recordStoreName)`

    `    {`

    `        this.recordStoreName = recordStoreName;`

    `    }`


    `    public boolean open()`

    `    {`

    `        ...`

    `        rs = RecordStore.openRecordStore(recordStoreName, true);`

    `        ...`

    `        return true;`

    `    }`


    `    public byte[] getRecord(int index)`

    `    {`

    `        ...`

    `        result = rs.getRecord(index);`

    `        ...`

    `        return result;`

    `    }`


    `    public boolean overwriteRecord(int index, byte[] data) { ... }`

    `    public boolean deleteRecord(int index) { ... }`

    `    public void close() { ... }`

    `    public int createRecord(byte[] data) { ... }`


    `    public void flush()`

    `    {`

    `        // Not needed`

    `    }`


    `}`


    #### Testing the Code


    Now that everything is in place, it''s time to test if everything works properly.
    The code in [Listing 5–11](#Chapter05.html#list_5_11) creates a new RMS persistence
    provider and attempts to retrieve a previously saved date (saved as a `String`)
    and timestamp (saved as a `long`) from one of its records. It will then output
    them to the console, after which it will replace them with a new date string and
    timestamp.


    **Listing 5–11.** *A Quick Persistence Test*


    `// Define variables`

    `ByteRecordReader reader;`

    `ByteRecordWriter writer;`

    `long timestamp = 0;`

    `String dateString = "";`


    `// Open the persistence provider with the "test" record store`

    `RMSPersistenceProvider prov = new RMSPersistenceProvider("test");`

    `prov.open();`


    `// If there is no initial record, create one`

    `if ( prov.getRecord(1) == null )`

    `{`

    `        prov.createRecord(new byte[] {0});`

    `}`

    `else`

    `{       // Otherwise, read the date string and the timestamp from the existing`

    `        // record ...`

    `        reader = new ByteRecordReader(prov.getRecord(1));`

    `        timestamp = reader.readLong();`

    `        dateString = reader.readString();`


    `        // ... and write them to the console`

    `        System.out.println("Date: " + dateString + " Time: " + timestamp );`

    `}`


    `// Create a new writer`

    `writer = new ByteRecordWriter();`


    `// Encode the current timestamp and date string`

    `writer.writeLong(System.currentTimeMillis());`

    `writer.writeString( new Date().toString() );`


    `// Save the resulting record at position one for later use`

    `// and close the provider`

    `prov.overwriteRecord(1, writer.getCurrentResult());`

    `prov.close();`


    The first time you run the code, it will display nothing, as there is no initial
    record created. However, from the second time onward, each time you run the snippet,
    you should see the date string and timestamp from the previous time the snippet
    was run.


    The persistence clearly works; but in its current state, using it in a real-life
    application is too convoluted and confusing. We need some helpers to make things
    easier.'
