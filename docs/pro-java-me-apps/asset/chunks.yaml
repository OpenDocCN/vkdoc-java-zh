  raw: '### API Inconsistencies


    Out of all the fragmentation issues you''re likely to encounter, API inconsistencies
    are the hardest ones to identify and the most annoying to fix.


    API inconsistencies happen when different vendors don''t interpret the Java ME
    standard in the same manner. This usually results in the same system call having
    different results on different devices, or returning different values, or even
    having no effect at all. Because they are system calls, developers naturally assume
    that they will behave in the manner that they do on other devices and that they
    will not fail—in other words, that they are always safe and that they always work
    OK. As such, they are not typically subject to examination when the application
    misbehaves or does not produce the expected results, so a lot of time is spent
    debugging and examining application code, while, in fact, the problem lies in
    the platform implementation. That being said, API inconsistencies should be the
    last thing to check for when your application misbehaves, as most of the time
    it is your code that does not function properly, not the platform.


    API inconsistencies can be split into three subcategories:


    *   *Localized inconsistencies*: Usually only a single method call misbehaves,
    or a few tightly related functions misbehave. For example, the `Graphics.translate()`
    method does not handle translation as expected on some platforms, which tends
    to affect other drawing functions as well.

    *   *Architectural or global inconsistencies*: The standard as a whole is not
    properly implemented. An example of this is the fact that some phones do not call
    `pauseApp()` when they should, which can cause all sorts of unwanted side effects.

    *   *Open for interpretation*: The specifications do not define any clear right
    or wrong answer. For example, manufacturers are free to choose their own keycodes,
    and some devices may have keys (and their associated keycodes) that are not present
    on others.


    Let''s look over these one by one.


    #### Localized API Inconsistencies


    Localized API inconsistencies tend to be a more common occurrence on older phones,
    or on no-name phones, and less of an issue on newer phones (as vendors have worked
    out most of the kinks). Once localized API inconsistencies have been found, their
    fixes are usually a lot simpler compared to those required for hardware and capabilities
    fragmentation issues.


    Performance-wise, the best fix for any API inconsistency issue is to alter either
    the method call parameters or the return values so that the end result matches
    what you would get on a well-behaved implementation. In this approach, the bulk
    of the work is still done natively by the platform, so the performance is still
    good. This is possible in most scenarios, since localized API inconsistencies
    and their unwanted effects tend to be subtle (e.g., off-by-one errors, precision
    errors, etc.) and happen only in specific corner cases. Also, sometimes it is
    possible to replace a problematic method by using other method calls, which eliminates
    the need for altering parameters or return values, thus further minimizing the
    impact on performance.


    When either of the foregoing is not possible, the only course of action you have
    left is to roll your own implementation of the problematic method (either you
    write it yourself or use a third-party library). Obviously this usually incurs
    a significant performance hit and should be avoided if at all possible.


    In both cases, it is best practice to create a “wrapper” for the problematic method,
    to both hide the complexity of the fix and minimize redundant code. For static
    method calls or for methods that do not care about context, it is enough to create
    a single-method wrapper, which can then be a stand-alone class or part of a bigger
    `GeneralWrappers` class.


    For methods that do care about context, or that influence their context in some
    way (as is the case of the `Graphics.translate()` method), you have to create
    a wrapper for their entire context—even if you can also fix the problem via a
    singe-method wrapper. To keep with the `translate()` example, you should create
    a wrapper for the entire `Graphics` object, something like `GraphicsWrapper`.


    The idea behind wrapping the entire context even if a single-method fix is possible
    is that this improves code readability and consistency (i.e., you don''t use mixed
    wrappers and native calls in your code—you just use wrapper calls), and there''s
    a very good chance that if something is wrong in a native method, then something
    is also wrong or will affect other related methods too—so you''ll likely end up
    wrapping those also.


    It is worth noting that methods that are context-aware are quite tricky to wrap
    properly, because of their long-lasting side effects. For example, a call to `translate()`
    influences all further drawing operations done on the `Graphics` object by shifting
    their (x,y) coordinates. If you fix a broken `translate()` implementation by altering
    the method call parameters of the native system call, then you should have nothing
    else to care about, as all the side effects (i.e., coordinate shifting) are handled
    transparently by the platform.


    If, however, you fix a broken `translate()` by rolling your own implementation,
    then you have to keep track yourself of the current translation values and manually
    apply them to all the further drawing method calls—in other words, you have to
    emulate all the side effects yourself, which is what the wrapper in [Listing 9–1](#Chapter09.html#list_9_1)
    does.


    **Listing 9–1.** *A Graphics Wrapper Class That Fixes a Broken `translate()` Method*


    `import javax.microedition.lcdui.Graphics;`


    `public class GraphicsWrapper {`


    `    protected Graphics graphics;`

    `    int translateX = 0, translateY = 0;`

    `    ...`


    `    public GraphicsWrapper(Graphics g)`

    `    {`

    `        graphics = g;`

    `    }`


    `    public void translate(int dx, int dy)`

    `    {`

    `        translateX = dx;`

    `        translateY = dy;`

    `    }`'
