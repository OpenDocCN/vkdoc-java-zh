    `}`


    The upshot of using wrappers is that you can actually enhance the native API.
    For example, there''s no native way in Java ME to draw or fill polygons, but you
    can elegantly overcome this limitation by implementing the necessary functionality
    in the `GraphicsWrapper` class in the form of `drawPoly()` and `fillPoly()` methods.
    Since the rest of the code would use the wrapper and not the underlying `Graphics`
    object directly, it would look as if the platform natively supported polygons.


    Probably the most annoying problems related to localized API inconsistencies are
    random occurrences and corner cases. What this means is that a given method call
    behaves properly in most circumstances, but not in all circumstances. I have seen
    implementations that could properly decode some PNG images but not others (transparency
    would be lost, for example), devices that would stop responding when a certain
    media file would be played, JVMs that would simply refuse to properly close certain
    input streams but not others (the same applies to reading from input streams),
    and more. This is voodoo territory once more.


    For media-related random issues, what I usually do is simply recode the problematic
    files. This usually either fixes the problem or gives me some insight regarding
    what exactly triggers it (maybe it''s a certain file encoding, or the media file
    is above a certain bitrate).


    For platform-related random issues, you should first be 100% that you do everything
    right and by the book, and that the random or corner-case bug is indeed a bug
    in the implementation and not in your code. The best way to do this is to create
    a stand-alone simple project and try to replicate the problem there instead of
    in your application. Once you know for sure that the problem lies in the implementation,
    there are several things you can try.


    First and foremost, try slight alterations to the execution context. If you have
    file-related problems, try moving the problematic file to another location, or
    try renaming it. If you have trouble reading from an URL, try removing the "www"
    or "http://" part of it, or if it''s under your control, move the necessary content
    to a different URL on (preferably) a different server. If you have threading-related
    issues, try adding small delays in your code (or anything else that breaks the
    "tempo").


    If that does not work, try "rephrasing" the code (i.e., try to change the order
    in which methods are called). This can sometimes work, even if it makes no sense.
    For example, I had one case in which I had to open two different input streams,
    one from a file and one from an URL. Opening the file first and the URL second
    would cause the application to crash; opening the URL first and the file second
    worked fine. As it turns out, the problem was a race condition in the platform
    implementation (the code was running on a beta JVM).


    Localized API inconsistencies are annoying, but at least they affect the application
    only locally. As we will see next, there are inconsistencies that "operate" on
    the architectural level—or worse, that stem from local inconsistencies but affect
    the application globally.


    ### Global API Inconsistencies


    Sometimes the API inconsistencies are on a higher level than individual functions.
    They might be related to the MIDlet life cycle, or to the way certain optional
    APIs are implemented and to the life cycle of the high-level objects associated
    with them. For example, as mentioned previously, it is quite a common on a lot
    of phones that the `pauseApp()` method isn''t called when the application is moved
    to the background, minimized, or paused for any reason. As some applications use
    this method to properly move to the stand-by state (for example, by telling the
    server that "I''ll go away now for a while, show me as idle" in the case of a
    chat application), not receiving this event can cause unexpected and unpredictable
    results (to keep with the previous example, the mobile user might lose some IM
    messages or the server might disconnect the mobile client if the application is
    minimized for too long).


    The most common way to deal with these kinds of inconsistencies is to work around
    them on an architectural level. For example, even though the `pauseApp()` method
    doesn''t get called, most modern applications use a `Canvas` to display their
    UI, and the `Canvas` class provides the `showNotify()` and `hideNotify()` methods,
    which from my experience get called properly on 99% of the devices I''ve worked
    with. As such, while it does take a bit of work to get done properly, it is possible
    to move the pause/minimized detection to the application''s `Canvas` and take
    the appropriate pause/minimize actions when the `Canvas` is hidden instead of
    when `pauseApp()` is called. The same trick of repurposing methods and callbacks
    can usually be applied to most inconsistencies related to the MIDlet life cycle
    and to the core Java ME platform itself.


    Other platform-specific inconsistencies that you might find relate to the maximum
    number of threads you can have running (a minimum of ten is specified in JSR-185,
    but some devices support fewer), the number of network connections you can keep
    open at any given time, and more. These can be overcome by, for example, running
    to different tasks on the same thread or closing connections immediately after
    you''re done with them instead of keeping them open for later use. If you follow
    the rules regarding flexible Java ME coding mentioned earlier in the book, you
    should be able to overcome these inconsistencies with relative ease.


    Inconsistencies regarding how optional APIs are implemented are also fairly common.
    The MMAPI, for example, defines a clear life cycle for its `Player` objects, with
    five states: `UNREALIZED`, `REALIZED`, `PREFETCHED`, `STARTED`, and `CLOSED`.
    According to the specifications, you should be able to move from a higher state
    to a lower state (for example, from `PREFETCHED` to `REALIZED`) when needed, in
    order to conserve resources, and once a player has stopped playing, it should
    return to the `PREFETCHED` state, from where it can be played again.


    Unfortunately, not all implementations do this right. On some devices, you cannot
    move from the `STARTED` to the `PREFETCHED` state (the call to `deallocate()`,
    which is responsible for this, either throws an exception or does nothing), and
    some devices simply do not notify registered `PlayerListeners` of all events (you
    may not get notified of `VOLUME_CHANGED` events if they occur in quick succession,
    for example).


    The effects of optional API inconsistencies are also not that easily identifiable
    sometimes: unless you check the amount of free memory both before and after a
    `deallocate()` call, it''s difficult to determine if the call actually de-allocates
    anything, as the specs say it should. Sometimes the only way to actually de-allocate
    memory from a player is to actually remove all references to the player and its
    associated objects, and let the GC work its magic—which requires you to manage
    not only `Players` but also `DataSources`, `Controls`, and more.'
