- fmt: "# Avoid Unnecessary Object Creation\n\nIn the world of Java ME, creating objects\
    \ is an extremely expensive operation. For one thing, there is the initial cost\
    \ of creating an object: allocating memory for it, instantiating its member fields,\
    \ going through its parent hierarchy, etc. Then, while the object is in use, the\
    \ JVM has to keep track of all the references that point to it. Finally, when\
    \ the object is destroyed, the JVM has to de-allocate the memory occupied by the\
    \ object and mark it as available.\n\nThis leaves gaps of unused free memory,\
    \ which can be either compacted (by moving objects around in memory so that all\
    \ the free memory is a contiguous block) or left as is, in which case, future\
    \ object creation operations might fail simply because there might not be a free\
    \ memory block to house the data required for the new object. This is actually\
    \ a problem on older and lower-end devices, which simply do not compact memory\
    \ or, even worse, don't even have a proper garbage collector.\n\nThere are several\
    \ ways you can avoid creating new objects. The most efficient way, from a performance\
    \ point of view, is to not use objects at all. You can replace them by using plain\
    \ and simple variables. For example, take the following snippet:\n\n```\npublic\
    \ class Person\n{\n        String name;\n        Date dateOfBirth;\n        ...\n\
    \n        public void savePerson(OutputStream stream)\n        {\n           \
    \     ...\n        }\n}\n```\n\nIt should be clear what the snippet does: it serializes\
    \ a `Person` object to an `OutputStream`. However, it does this by creating at\
    \ least two unnecessary objects: the `dateOfBirth` and the `Person` instance itself.\
    \ Though considerably less elegant, there is a more memory-efficient way of doing\
    \ the same task:\n\n```\npublic class Person\n{\n        public static final void\
    \ savePerson(String name, int yearOfBirth,\n        int monthOfBirth, ... )\n\
    }\n```\n\nHowever, this is a very drastic solution and one that should be employed\
    \ only in extreme circumstances, or in circumstances where performance is paramount.\
    \ A far less drastic solution, and one that can be successfully implemented in\
    \ all Java ME applications, is to use an object pool.\n\nIn its simplest form,\
    \ an object pool is simply a collection of reusable objects—for example, an array\
    \ of `Persons`. Whenever you need a new `Person` object, you just go through the\
    \ array, take the first unused instance, and use that instead of creating a new\
    \ object. This, of course, means resetting all the instance's member fields to\
    \ the values you require, which might mean you need to add some extra getters/setters\
    \ or a generic `doInit()` method to serve as a makeshift constructor. Once you\
    \ find your unused instance and have initialized it with the proper parameters,\
    \ you simply use it like you would a regular newly created object.\n\nWell, almost.\
    \ There are some things you must do carefully with pooled instances. For example,\
    \ it is generally not a good idea to `wait()` on them, or use them to `synchronize`\
    \ stuff. You also have to be careful to not use the same object for two different\
    \ things at the same time. This is easier said than done, especially with more\
    \ complex applications, in which object references get passed around a lot, even\
    \ between different application layers/modules.\n\nThe best way to avoid this\
    \ problem is to employ a simple form of reference counting. Whenever you use a\
    \ shared object in a method, you increase its reference count by one at the beginning\
    \ of the method code if it is passed as a parameter, or immediately after you\
    \ request it from the pool. When you are done with the object, or at the end of\
    \ the method, you decrease its reference count. Objects in the pool are free if\
    \ and only if they have zero references.\n\nAll of the foregoing is summarized\
    \ in the code found in [Listing 10–1](#Chapter10.html#list_10_1).\n\n**Listing\
    \ 10–1.** *Using an Object Pool*\n\n```\npublic class Person\n{\n        public\
    \ void increaseReferenceCount() { ... }\n        public void decreaseReferenceCount()\
    \ { ... }\n        public int getReferenceCount();\n        ...\n        public\
    \ void doInit(String name, Date dateOfBirth, ... ) { ... }\n        ...\n}\n\n\
    public class PersonPool\n{\n        public static final int POOL_SIZE = 30;\n\
    \        protected static Person [] pool = new Person[POOL_SIZE];\n\n        static\n\
    \        {\n                for (int i=0; i<POOL_SIZE; i++)\n                {\n\
    \                        pool[i] = new Person();\n                }\n        }\n\
    \n        public static Person getUnusedInstance()\n        {\n              \
    \  for (int i=0; i<POOL_SIZE; i++)\n                {\n                      \
    \  if ( pool[i].getReferenceCount == 0 )\n                        {\n        \
    \                        return pool[i];\n                        }\n        \
    \        }\n                return new Person();\n        }\n}\n\npublic class\
    \ SomeClass\n{\n        public void doSomething()\n        {\n               \
    \ ...\n                Person person = PersonPool.getUnusedInstance();\n     \
    \           person.increaseReferenceCount();\n                person.doInit(\"\
    John Doe\", new Date());\n                ...\n                writePerson(person);\n\
    \                ...\n                person.decreaseReferenceCount();\n     \
    \           ...\n        }\n\n        public void writePerson(Person person)\n\
    \        {\n                person.increaseReferenceCount();\n               \
    \         ....\n                person.decreaseReferenceCount();\n        }\n\
    }\n```\n\nThere are two things worth mentioning about [Listing 10–1](#Chapter10.html#list_10_1).\
    \ First, if the pool cannot find an unused instance, it ultimately creates a new\
    \ instance as a last resort. This acts as a fail-safe mechanism, but ideally you\
    \ should define your pool size so that it comfortably handles the requirements\
    \ of your application. Of course, if your object pool is too big, then you might\
    \ end up wasting memory—there's always a trade-off to be made here.\n\nThe second\
    \ thing worth mentioning is the use of the `doInit()` method for initializing\
    \ the object. Pooled objects should always have barebones constructors, and all\
    \ the initialization work should be done in a separate method, which can be called\
    \ as needed.\n\nObject pooling may not be extremely OO-friendly, but it does remove\
    \ a lot of the performance overhead associated with creating and managing new\
    \ instances, and as such can prove to be invaluable at times. It is most effective\
    \ on low-end devices or on devices with unfriendly garbage collectors (for example,\
    \ Blackberry devices tend to show the “hourglass” icon in the middle of the screen\
    \ and completely pause the application for a few seconds, one or two usually,\
    \ while the garbage collector is running).\n\nIn the hands of an experienced developer,\
    \ object pooling can be a very powerful Java ME code optimization technique. However,\
    \ it can also create a lot of problems if not used properly. As mentioned earlier,\
    \ sharing the same object for two different purposes is the most common one, but\
    \ others can arise as well. For example, if you use pooling for UI objects, then\
    \ you might end up with weird visual glitches. As such, always approach object\
    \ pooling carefully and make sure you work out all the details on paper (where\
    \ each instance is used and how) before writing the code."
  raw: '#### Avoid Unnecessary Object Creation


    In the world of Java ME, creating objects is an extremely expensive operation.
    For one thing, there is the initial cost of creating an object: allocating memory
    for it, instantiating its member fields, going through its parent hierarchy, etc.
    Then, while the object is in use, the JVM has to keep track of all the references
    that point to it. Finally, when the object is destroyed, the JVM has to de-allocate
    the memory occupied by the object and mark it as available.


    This leaves gaps of unused free memory, which can be either compacted (by moving
    objects around in memory so that all the free memory is a contiguous block) or
    left as is, in which case, future object creation operations might fail simply
    because there might not be a free memory block to house the data required for
    the new object. This is actually a problem on older and lower-end devices, which
    simply do not compact memory or, even worse, don''t even have a proper garbage
    collector.


    There are several ways you can avoid creating new objects. The most efficient
    way, from a performance point of view, is to not use objects at all. You can replace
    them by using plain and simple variables. For example, take the following snippet:


    `public class Person`

    `{`

    `        String name;`

    `        Date dateOfBirth;`

    `        ...`


    `        public void savePerson(OutputStream stream)`

    `        {`

    `                ...`

    `        }`

    `}`


    It should be clear what the snippet does: it serializes a `Person` object to an
    `OutputStream`. However, it does this by creating at least two unnecessary objects:
    the `dateOfBirth` and the `Person` instance itself. Though considerably less elegant,
    there is a more memory-efficient way of doing the same task:


    `public class Person`

    `{`

    `        public static final void savePerson(String name, int yearOfBirth,`

    `        int monthOfBirth, ... )`

    `}`


    However, this is a very drastic solution and one that should be employed only
    in extreme circumstances, or in circumstances where performance is paramount.
    A far less drastic solution, and one that can be successfully implemented in all
    Java ME applications, is to use an object pool.


    In its simplest form, an object pool is simply a collection of reusable objects—for
    example, an array of `Persons`. Whenever you need a new `Person` object, you just
    go through the array, take the first unused instance, and use that instead of
    creating a new object. This, of course, means resetting all the instance''s member
    fields to the values you require, which might mean you need to add some extra
    getters/setters or a generic `doInit()` method to serve as a makeshift constructor.
    Once you find your unused instance and have initialized it with the proper parameters,
    you simply use it like you would a regular newly created object.


    Well, almost. There are some things you must do carefully with pooled instances.
    For example, it is generally not a good idea to `wait()` on them, or use them
    to `synchronize` stuff. You also have to be careful to not use the same object
    for two different things at the same time. This is easier said than done, especially
    with more complex applications, in which object references get passed around a
    lot, even between different application layers/modules.


    The best way to avoid this problem is to employ a simple form of reference counting.
    Whenever you use a shared object in a method, you increase its reference count
    by one at the beginning of the method code if it is passed as a parameter, or
    immediately after you request it from the pool. When you are done with the object,
    or at the end of the method, you decrease its reference count. Objects in the
    pool are free if and only if they have zero references.


    All of the foregoing is summarized in the code found in [Listing 10–1](#Chapter10.html#list_10_1).


    **Listing 10–1.** *Using an Object Pool*


    `public class Person`

    `{`

    `        public void increaseReferenceCount() { ... }`

    `        public void decreaseReferenceCount() { ... }`

    `        public int getReferenceCount();`

    `        ...`

    `        public void doInit(String name, Date dateOfBirth, ... ) { ... }`

    `        ...`

    `}`


    `public class PersonPool`

    `{`

    `        public static final int POOL_SIZE = 30;`

    `        protected static Person [] pool = new Person[POOL_SIZE];`


    `        static`

    `        {`

    `                for (int i=0; i<POOL_SIZE; i++)`

    `                {`

    `                        pool[i] = new Person();`

    `                }`

    `        }`


    `        public static Person getUnusedInstance()`

    `        {`

    `                for (int i=0; i<POOL_SIZE; i++)`

    `                {`

    `                        if ( pool[i].getReferenceCount == 0 )`

    `                        {`

    `                                return pool[i];`

    `                        }`

    `                }`

    **`return new Person();`**

    `        }`

    `}`


    `public class SomeClass`

    `{`

    `        public void doSomething()`

    `        {`

    `                ...`

    `                Person person = PersonPool.getUnusedInstance();`

    `                person.increaseReferenceCount();`

    **`person.doInit("John Doe", new Date());`**

    `                ...`

    `                writePerson(person);`

    `                ...`

    `                person.decreaseReferenceCount();`

    `                ...`

    `        }`


    `        public void writePerson(Person person)`

    `        {`

    `                person.increaseReferenceCount();`

    `                        ....`

    `                person.decreaseReferenceCount();`

    `        }`

    `}`


    There are two things worth mentioning about [Listing 10–1](#Chapter10.html#list_10_1).
    First, if the pool cannot find an unused instance, it ultimately creates a new
    instance as a last resort. This acts as a fail-safe mechanism, but ideally you
    should define your pool size so that it comfortably handles the requirements of
    your application. Of course, if your object pool is too big, then you might end
    up wasting memory—there''s always a trade-off to be made here.


    The second thing worth mentioning is the use of the `doInit()` method for initializing
    the object. Pooled objects should always have barebones constructors, and all
    the initialization work should be done in a separate method, which can be called
    as needed.


    Object pooling may not be extremely OO-friendly, but it does remove a lot of the
    performance overhead associated with creating and managing new instances, and
    as such can prove to be invaluable at times. It is most effective on low-end devices
    or on devices with unfriendly garbage collectors (for example, Blackberry devices
    tend to show the “hourglass” icon in the middle of the screen and completely pause
    the application for a few seconds, one or two usually, while the garbage collector
    is running).


    In the hands of an experienced developer, object pooling can be a very powerful
    Java ME code optimization technique. However, it can also create a lot of problems
    if not used properly. As mentioned earlier, sharing the same object for two different
    purposes is the most common one, but others can arise as well. For example, if
    you use pooling for UI objects, then you might end up with weird visual glitches.
    As such, always approach object pooling carefully and make sure you work out all
    the details on paper (where each instance is used and how) before writing the
    code.'
  trans: '

    #### 避免不必要的对象创建


    在 Java ME 的世界中，创建对象是一项极其昂贵的操作。首先，创建对象有初始成本：为其分配内存、实例化其成员字段、遍历其父类层次结构等。然后，在对象使用期间，JVM
    必须跟踪所有指向它的引用。最后，当对象被销毁时，JVM 必须释放该对象占用的内存并将其标记为可用。


    这会产生未使用空闲内存的间隙，这些间隙可以被压缩（通过在内存中移动对象，使所有空闲内存成为一个连续块），也可以保持原样。在后一种情况下，未来的对象创建操作可能会失败，仅仅因为可能没有空闲内存块来容纳新对象所需的数据。这实际上是较旧和低端设备上的一个问题，这些设备要么根本不压缩内存，要么更糟，甚至没有合适的垃圾回收器。


    有几种方法可以避免创建新对象。从性能角度来看，最有效的方法是根本不使用对象。你可以用简单直接的变量来替代它们。例如，看下面的代码片段：


    `public class Person`

    `{`

    `        String name;`

    `        Date dateOfBirth;`

    `        ...`


    `        public void savePerson(OutputStream stream)`

    `        {`

    `                ...`

    `        }`

    `}`


    这段代码的作用应该很清楚：它将一个 `Person` 对象序列化到一个 `OutputStream` 中。然而，它通过创建至少两个不必要的对象来实现这一点：`dateOfBirth`
    和 `Person` 实例本身。虽然远没有那么优雅，但有一种更节省内存的方法来完成同样的任务：


    `public class Person`

    `{`

    `        public static final void savePerson(String name, int yearOfBirth,`

    `        int monthOfBirth, ... )`

    `}`


    然而，这是一个非常极端的解决方案，只应在极端情况下或性能至上的情况下采用。一个远不那么极端的解决方案，并且可以在所有 Java ME 应用程序中成功实现，就是使用对象池。


    在最简单的形式中，对象池就是一组可重用对象的集合——例如，一个 `Persons` 数组。每当你需要一个新 `Person` 对象时，你只需遍历数组，取出第一个未使用的实例，然后使用它，而不是创建一个新对象。当然，这意味着要将该实例的所有成员字段重置为你需要的值，这可能意味着你需要添加一些额外的
    getter/setter 或一个通用的 `doInit()` 方法来充当临时的构造函数。一旦你找到未使用的实例并用适当的参数初始化它，你就可以像使用常规的新创建对象一样使用它。


    嗯，差不多。对于池化实例，有些事情你必须小心处理。例如，通常不建议对它们调用 `wait()`，或者使用它们来 `synchronize` 东西。你还必须小心，不要同时将同一个对象用于两个不同的目的。这说起来容易做起来难，尤其是在更复杂的应用程序中，对象引用会被大量传递，甚至跨越不同的应用程序层/模块。


    避免这个问题的最佳方法是采用一种简单的引用计数形式。每当你在一个方法中使用共享对象时，如果它作为参数传入，则在方法代码的开头将其引用计数加一；或者在你从池中请求它之后立即加一。当你使用完该对象时，或者在方法结束时，将其引用计数减一。池中的对象当且仅当它们的引用计数为零时才被视为空闲。


    以上所有内容总结在代码清单 10-1 的代码中。


    **代码清单 10-1.** *使用对象池*


    `public class Person`

    `{`

    `        public void increaseReferenceCount() { ... }`

    `        public void decreaseReferenceCount() { ... }`

    `        public int getReferenceCount();`

    `        ...`

    `        public void doInit(String name, Date dateOfBirth, ... ) { ... }`

    `        ...`

    `}`


    `public class PersonPool`

    `{`

    `        public static final int POOL_SIZE = 30;`

    `        protected static Person [] pool = new Person[POOL_SIZE];`


    `        static`

    `        {`

    `                for (int i=0; i<POOL_SIZE; i++)`

    `                {`

    `                        pool[i] = new Person();`

    `                }`

    `        }`


    `        public static Person getUnusedInstance()`

    `        {`

    `                for (int i=0; i<POOL_SIZE; i++)`

    `                {`

    `                        if ( pool[i].getReferenceCount == 0 )`

    `                        {`

    `                                return pool[i];`

    `                        }`

    `                }`

    **`return new Person();`**

    `        }`

    `}`


    `public class SomeClass`

    `{`

    `        public void doSomething()`

    `        {`

    `                ...`

    `                Person person = PersonPool.getUnusedInstance();`

    `                person.increaseReferenceCount();`

    **`person.doInit("John Doe", new Date());`**

    `                ...`

    `                writePerson(person);`

    `                ...`

    `                person.decreaseReferenceCount();`

    `                ...`

    `        }`


    `        public void writePerson(Person person)`

    `        {`

    `                person.increaseReferenceCount();`

    `                        ....`

    `                person.decreaseReferenceCount();`

    `        }`

    `}`


    关于代码清单 10-1，有两点值得一提。首先，如果池找不到未使用的实例，它最终会创建一个新实例作为最后的手段。这充当了一种故障安全机制，但理想情况下，你应该定义池的大小，使其能够轻松处理应用程序的需求。当然，如果你的对象池太大，那么你最终可能会浪费内存——这里总是需要权衡。


    第二点值得一提的是使用 `doInit()` 方法来初始化对象。池化对象应始终具有最精简的构造函数，所有初始化工作都应在单独的方法中完成，该方法可以根据需要调用。


    对象池可能不是非常面向对象友好的，但它确实消除了与创建和管理新实例相关的大量性能开销，因此有时可以证明其价值不可估量。它在低端设备或具有不友好垃圾回收器的设备上最为有效（例如，Blackberry
    设备往往会在屏幕中央显示“沙漏”图标，并在垃圾回收器运行时完全暂停应用程序几秒钟，通常是一两秒）。


    在有经验的开发人员手中，对象池可以是一种非常强大的 Java ME 代码优化技术。然而，如果使用不当，它也会产生很多问题。如前所述，将同一个对象用于两个不同的目的是最常见的问题，但也可能出现其他问题。例如，如果你对
    UI 对象使用池化，那么你最终可能会遇到奇怪的视觉故障。因此，始终要谨慎地使用对象池，并确保在编写代码之前，在纸上详细规划好所有细节（每个实例在哪里使用以及如何使用）。'
- fmt: '#### Optimize Memory Access


    Sometimes you can improve your application''s performance simply by changing the
    way you use memory. For example, rather than using arrays to store data, try using
    simple variables to do this (and change your usage pattern accordingly). That
    is, change your code from


    `expr = a[0] * b[0] + a[0] * b[1] + ... + a[1] * b[0] + a[1] * b[1] + ...`


    to


    `expr = a0 * b0 + a0 * b1 + ...`


    The main advantage of this approach is that the VM doesn''t have to do bounds
    checking on each array element (because you use individual variables), thus improving
    speed. Also, depending on the code and on the VM, it may also improve the locality
    of data.


    The main disadvantage of this method is that is makes coding difficult: in this
    context, it''s much easier on a language level to work with arrays than it is
    to work with variables—as an example of this, consider that you could use a `for`
    loop to do the math for you rather than having to explicitly write it out.


    Furthermore, this technique can actually hurt performance in cases where the “array”
    has to be passed as a parameter because passing an actual array requires a single
    object reference, whereas this method requires an object reference or instance
    for each “array” element—for this reason, use it only with data that is localized
    to a single method.


    Another technique you can sometimes use is to simply make your arrays smaller
    and use more of them. For example, rather than create a 10,000 element array,
    create two arrays of 5,000 elements each. This is particularly effective on older
    devices with small memory pages, because it means that each array will fit in
    a single page, thus considerably reducing the number of page switches needed.


    The main disadvantage of this method is that most of the time it''s simply not
    possible to use smaller arrays, or it is possible, but doing so would incur a
    significant performance hit (for example, if you are inside a loop and you are
    forced to use an `if` statement to determine which of the smaller arrays you have
    to use). Furthermore, this technique tends to work only on very low-end devices,
    as the performance gains on other devices tend to be minimal.


    ### Algorithm Optimization Techniques


    In the following pages, we''ll have a look at some algorithm optimization techniques.
    We will also look at some common algorithms that come in handy when developing
    Java ME applications. First, however, let''s start with some basic notions about
    algorithm optimizations.


    Broadly speaking, optimizing an algorithm means improving that algorithm so that
    it performs better, or replacing it with an entirely different and better one.
    What “better” means varies from case to case: it may mean faster performance,
    or lower memory usage, or lower bandwidth needed, etc. Typically the performance
    is of concern.


    Basically what you''re trying to do when optimizing an algorithm is to find a
    generic sequence of steps that generally performs a certain task better than your
    current sequence, without regard to the underlying hardware its actual implementation
    runs on. As such, algorithm optimization is always theoretical in nature, and
    it''s always done on paper. In fact, if you''re trying to optimize an algorithm
    on the computer, chances are you won''t be able to do it properly as you will
    get biased by the actual implementation you''re writing and the hardware you''re
    running it on—both of which are extremely subjective and may not accurately represent
    the general case performance.


    #### Comparing Algorithms


    The question now is, how do you measure, on paper, how good an algorithm is? Keep
    in mind that you can''t limit yourself to a specific use case and input set and
    you have to do this on a general level. Your measurement also has to be hardware-agnostic.
    So how do you do it?


    Donald E. Knuth, the famous computer scientist, solved this problem by inventing
    the “Big O” notation. In layman''s terms, here''s how it works. First, you identify
    all the variable quantities that can affect your algorithm. For example, if you''re
    trying to sort a list of numbers, then the size of the list is a variable quantity.
    If you''re trying to generate all possible boy-girl pairs from a set of boys and
    girls, then the number of boys and the number of girls are both variable quantities.
    Once you have identified all variable quantities, you then express the complexity
    of the algorithm in terms of these variables—and these variables alone.


    For example, let''s say we''re talking about sorting a list of `n` numbers with
    selection sort and that we want to know how good the algorithm is in terms of
    speed. What selection sort does is go through the list of numbers several times.
    At the first pass, the smallest number is found and placed first in the list.
    This requires that you go through all `n` numbers in the first pass, to find the
    smallest one of the lot. In the second pass, you already know that the first number
    in the list is in the correct position, so you need to go through only the remaining
    `n-1` numbers to find the second smallest number. You continue the process until
    you get to the last number in the list, where you go through only `1` number.


    The total number of steps needed is `O = n + (n-1) + (n-2) + ... + 1`, which is
    equal to `O = n * (n+1) / 2` or `O = (n^2 + n) / 2`. Since we''re talking about
    the general case here, we can assume that `n` can be a very big number, which
    makes `O` even bigger. In this case, half of O is, from a practical point of view,
    just as big as O (there is no real practical difference between having to do 10,000
    trillion steps and just 5,000 trillion steps). This means we can simplify our
    formula to `O = n^2 + n`. Next, assuming `n` is large enough, the value of `n^2`
    will greatly eclipse the value of `n` (for example, if `n=1000` then `n^2=100000`;
    when compared to `n^2` steps, `n` steps are practically irrelevant). This means
    that we can simplify our formula to `O = n^2`. This is our final formula, which
    we will write as `O(n^2)`, which is then read as “the complexity of the algorithm
    is `n^2`.”


    **TIP:** To quickly find the complexity of an algorithm, just write its general
    complexity formula as a polynomial and then discard any constants and all but
    the highest-exponent terms for each variable. For example, `O = 2 * n^3 + 5 *
    n^2 + n + m^2 * n + m` solves to `O(n^3+m^2*n)`. The terms `5 * n^2`, `n`, and
    `m` have been removed as they do not have the highest exponents for their respective
    variables, and the constant `2` from `2 * n^3` has also been removed.


    Alternatively, you can use the original formula for `O` and write `O( (n^2 + n)
    / 2 )`. This is not really correct from a theoretical point of view, but for small
    enough values of `n` this formula can yield more accurate results, especially
    for Java ME code, where every drop of performance matters.


    Now let''s assume you have two algorithms, one with `O(n^2)` and one with `O(n*log
    n)`. Which one is better? To answer this question, all you have to do is replace
    `n` with a really big number. For `n = 1000000`, the first algorithm has a “complexity”
    of 1,000,000,000,000, while the second one has a “complexity” of just 19,931,568.
    The answer should be clear.


    **NOTE:** When expressing complexity, by convention all logarithms used are base
    2 logarithms.'
