- fmt: "### Unroll Loops\n\nThere are many cases in which the number of iterations\
    \ a loop has to go through is known beforehand. In these cases, if the number\
    \ is small enough (a maximum of 10 or 15 iterations), it is worth unrolling the\
    \ loop. That is, you take its original form, for example, the following:\n\n```\n\
    for (i=0;i<4;i++)\n{\n        a[i] = i * i;\n}\n```\n\nAnd you turn it into a\
    \ more verbose and faster version:\n\n```\na[0] = 0;\na[1] = 1;\na[2] = 4;\na[3]\
    \ = 9;\n```\n\nThis technique has several performance benefits, the most important\
    \ of which are that it eliminates the jump instructions needed for the loop and\
    \ the boundary conditions check, as well as the advancement instruction (e.g.,\
    \ `i++`). Furthermore, in many situations (ours included), the math inside the\
    \ loop can be unrolled to a certain degree too, thus providing an even larger\
    \ performance gain.\n\nThe technique is especially effective if the unrolled loop\
    \ is executed many times—for example, when it is the inner loop of a nested loops\
    \ structure. In cases where the loop is stand-alone, the performance benefits\
    \ are usually marginal.\n\n### Inline Code\n\nRelated to loop unrolling, code\
    \ inlining refers to the practice of replacing a method call with the actual body\
    \ of the method. This is extremely effective for methods with small bodies, where\
    \ often the call overhead is equal if not larger than the actual resources (memory,\
    \ CPU time) needed to run the method.\n\nThis technique can sometimes provide\
    \ an impressive performance boost for Java ME code, as some JVMs incur a lot of\
    \ overhead when calling methods (older devices and JVMs tend to suffer from this\
    \ the most).\n\nThe main problem of code inlining is that, unless it's done with\
    \ a preprocessor or some other external tool, it can significantly add to the\
    \ application's code base. This can be a problem because any change in the method's\
    \ body has to be manually propagated everywhere, which is not only tiresome but\
    \ also error-prone.\n\nFurthermore, even with automatic tools, code inlining will\
    \ increase your application's JAR size, and may even cause performance problems\
    \ if the methods containing the inlined code become too big; however, this rarely\
    \ happens.\n\n### Optimize Loop-Related Math\n\nMany times, the value of a variable\
    \ inside a loop depends on the values of the looped variable(s). This is usually\
    \ a great place for code optimizations. Take, for example, the following snippet:\n\
    \n```\nfor (i=0;i<100;i++)\n{\n        for (j=0;j<100;j++)\n        {\n      \
    \          someVariable = i * 10 + j * 5;\n                doSomething(someVariable);\n\
    \        }\n}\n```\n\nHere you can clearly see that `someVariable` depends linearly\
    \ on both the values of `i` and `j`. The code is very inefficient, calculating\
    \ `someVariable` from scratch at every iteration, which amounts to 10,000 times.\n\
    \nWe can optimize this in two places. First, the `i * 10` part can be moved outside\
    \ the loop, like so:\n\n```\nfor (i=0;i<100;i++)\n{\n        tempI = i * 10;\n\
    \        for (j=0;j<100;j++)\n        {\n                someVariable = tempI\
    \ + j * 5;\n                doSomething(someVariable);\n        }\n}\n```\n\n\
    We have now saved 10,000 multiplication operations. We can save 10,000 more by\
    \ noticing the sequence that `j * 5` produces: 0, 5, 10, etc. In this case, we\
    \ can replace `j * 5` with the value of `j` directly, if we write the code like\
    \ so:\n\n```\nfor (i=0;i<100;i++)\n{\n        tempI = i * 10;\n        for (j=0;j<500;j+=5)\n\
    \        {\n                someVariable = tempI + j;\n                doSomething(someVariable);\n\
    \        }\n}\n```\n\nThis trick is very useful if within the loop of a variable\
    \ you use only its value multiplied by a number. However, in our case, we can\
    \ do even better. Notice that, for any value of `tempI`, the sequence of values\
    \ for `someVariable` is `tempI`, `tempI+5`, `tempI+10`, etc. Writing this as a\
    \ recursive formula, we would get `a(i) = a(i-1) + 5`. This means that we can\
    \ write our loops like so:\n\n```\nfor (i=0;i<100;i++)\n{\n        tempI = i *\
    \ 10;\n        for (j=0;j<100;j++)\n        {\n                doSomething(tempI);\n\
    \                tempI += 5;\n        }\n}\n```\n\nComparing this final version\
    \ to the original one, you will notice that we have reduced the number of math\
    \ operations inside the inner loop from two multiplications and an addition to\
    \ just an addition—quite a big improvement, considering that the inner loop runs\
    \ for 10,000 iterations!\n\nOptimizing loop-related math is frequently effective,\
    \ and usually pitfall-free, but it does have the tendency of making the loop logic\
    \ very hard to understand, especially if the math inside the inner loop is originally\
    \ complicated. A trick I frequently use is to add the original, unoptimized version\
    \ of the loop as a comment before the optimized version of the loop. I can then\
    \ use this comment as a reference for debugging and for understanding the loop\
    \ logic.\n\nFor Java ME, besides the obvious advantage of making the code faster,\
    \ this optimization also makes the bytecode smaller in size and considerably reduces\
    \ the number of variable read/writes required, which in themselves are worthy\
    \ optimizations.\n\n### Keep Your Loops Conditional-Free\n\nYou should always\
    \ strive to keep your critical loops conditional-free. Take, for example, the\
    \ following snippet:\n\n```\nboolean multiplyByTwo = getMultiplyByTwo();\nfor\
    \ (i=0;i<1000;i++)\n{\n   c[i] = a[i] + b[i];\n   if ( multiplyByTwo )\n   {\n\
    \        c[i] += c[i]; // Replace multiplication by 2 with an addition\n   }\n\
    }\n```\n\nThe problem with it is that it unnecessarily checks for the `if` condition\
    \ at each iteration. We can remove this bottleneck by rewriting our code so that\
    \ we move the `if` outside the loop, and have a corresponding version of the loop\
    \ in each of the `if`'s branches, like so:\n\n```\nboolean multiplyByTwo = getMultiplyByTwo();\n\
    if ( multiplyByTwo )\n{\n        for (i=0;i<1000;i++)\n        {\n           c[i]\
    \ = a[i] + b[i];\n           c[i] *= 2;\n        }\n}\nelse\n{\n        for (i=0;i<1000;i++)\n\
    \        {\n           c[i] = a[i] + b[i];\n        }\n}\n```\n\nThis version\
    \ is more verbose, but it is also considerably faster, as there are fewer operations\
    \ within the loops (remember, `if`s are very expensive). In addition, there are\
    \ also fewer variables used, so locality is improved. Finally, you can optimize\
    \ each loop independently so as to get the best performance in each case.\n\n\
    This technique, officially called “loop unswitching,” scales well for up to two\
    \ nested `if`s. For more than two nested `if`s, the code becomes hard to maintain\
    \ and it also increases the method size considerably, which can lead to JVM or\
    \ hardware performance issues.\n\n### Eliminate Special Iterations from Your Loops\n\
    \nIt is often the case that some loops have special iterations at the beginning\
    \ or at the end, or sometimes even in the middle. Take, for example, the following\
    \ snippet:\n\n```\nint bIndex = 9\nint cIndex = 8;\nfor (i=0;i<10;i++)\n{\n  \
    \      a[i] = b[bIndex] + c[cIndex];\n        bIndex = i;\n        cIndex = i;\n\
    }\n```\n\nNotice that the general formula for this loop is in essence `a[i] =\
    \ b[i-1] + c[i-1]`, except for the first case, where the formula is `a[0] = b[9]\
    \ + c[8]`. We can take advantage of this and rewrite the loop as follows:\n\n\
    ```\na[0] = b[9] + c[8]\nfor (i=0;i<9;i++)\n{\n        a[i+1] = b[i] + c[i];\n\
    }\n```\n\nThis effectively treats the first iteration separately and thus streamlines\
    \ the body of the actual loop. The technique is officially known as “loop peeling.”\n\
    \nNote that when using loop peeling, you usually have to adjust the end and/or\
    \ initial conditions for the loop, as well as any array indexes that refer to\
    \ the looped variable and other references to it—see the foregoing snippet for\
    \ an example."
  raw: '#### Unroll Loops


    There are many cases in which the number of iterations a loop has to go through
    is known beforehand. In these cases, if the number is small enough (a maximum
    of 10 or 15 iterations), it is worth unrolling the loop. That is, you take its
    original from, for example, the following:


    `for (i=0;i<4;i++)`

    `{`

    `        a[i] = i * i;`

    `}`


    And you turn it into a more verbose and faster version:


    `a[0] = 0;`

    `a[1] = 1;`

    `a[2] = 4;`

    `a[3] = 9;`


    This technique has several performance benefits, the most important of which are
    that it eliminates the jump instructions needed for the loop and the boundary
    conditions check, as well as the advancement instruction (e.g., i++). Furthermore,
    in many situations (ours included), the math inside the loop can be unrolled to
    a certain degree too, thus providing an even larger performance gain.


    The technique is especially effective if the unrolled loop is executed many times—for
    example, when it is the inner loop of a nested loops structure. In cases where
    the loop is stand-alone, the performance benefits are usually marginal.


    #### Inline Code


    Related to loop unrolling, code inlining refers to the practice of replacing a
    method call with the actual body of the method. This is extremely effective for
    methods with small bodies, where often the call overhead is equal if not larger
    than the actual resources (memory, CPU time) needed to run the method.


    This technique can sometimes provide an impressive performance boost for Java
    ME code, as some JVMs incur a lot of overhead when calling methods (older devices
    and JVMs tend to suffer from this the most).


    The main problem of code inlining is that, unless it''s done with a preprocessor
    or some other external tool, it can significantly add to the application''s code
    base. This can be a problem because any change in the method''s body has to be
    manually propagated everywhere, which is not only tiresome but also error-prone.


    Furthermore, even with automatic tools, code inlining will increase your application''s
    JAR size, and may even cause performance problems if the methods containing the
    inlined code become too big; however, this rarely happens.


    #### Optimize Loop-Related Math


    Many times, the value of a variable inside a loop depends on the values of the
    looped variable(s). This is usually a great place for code optimizations. Take,
    for example, the following snippet:


    `for (i=0;i<100;i++)`

    `{`

    `        for (j=0;j<100;j++)`

    `        {`

    `                someVariable = i * 10 + j * 5;`

    `                doSomething(someVariable);`

    `        }`

    `}`


    Here you can clearly see that `someVariable` depends linearly on both the values
    of `i` and `j`. The code is very inefficient, calculating `someVariable` from
    scratch at every iteration, which amounts to 10,000 times.


    We can optimize this in two places. First, the `i * 10` part can be moved outside
    the loop, like so:


    `for (i=0;i<100;i++)`

    `{`

    `        tempI = i * 10;`

    `        for (j=0;j<100;j++)`

    `        {`

    `                someVariable = tempI + j * 5;`

    `                doSomething(someVariable);`

    `        }`

    `}`


    We have now saved 10,000 multiplication operations. We can save 10,000 more by
    noticing the sequence that `j * 5` produces : 0, 5, 10, etc. In this case, we
    can replace `j * 5` with the value of `j` directly, if we write the code like
    so:


    `for (i=0;i<100;i++)`

    `{`

    `        tempI = i * 10;`

    **`for (j=0;j<500;j+=5)`**

    `        {`

    `                someVariable = tempI + j;`

    `                doSomething(someVariable);`

    `        }`

    `}`


    This trick is very useful if within the loop of a variable you use only its value
    multiplied by a number. However, in our case, we can do even better. Notice that,
    for any value of `tempI`, the sequence of values for `someVariable` is `tempI`,
    `tempI+5`, `tempI+10`, etc. Writing this as a recursive formula, we would get
    `a(i) = a(i-1) + 5`. This means that we can write our loops like so:


    `for (i=0;i<100;i++)`

    `{`

    `        tempI = i * 10;`

    `        for (j=0;j<100;j++)`

    `        {`

    `                doSomething(tempI);`

    **`tempI += 5;`**

    `        }`

    `}`


    Comparing this final version to the original one, you will notice that we have
    reduced the number of math operations inside the inner loop from two multiplications
    and an addition to just an addition—quite a big improvement, considering that
    the inner loop runs for 10,000 iterations!


    Optimizing loop-related math is frequently effective, and usually pitfall-free,
    but it does have the tendency of making the loop logic very hard to understand,
    especially if the math inside the inner loop is originally complicated. A trick
    I frequently use is to add the original, unoptimized version of the loop as a
    comment before the optimized version of the loop. I can then use this comment
    as a reference for debugging and for understanding the loop logic.


    For Java ME, besides the obvious advantage of making the code faster, this optimization
    also makes the bytecode smaller in size and considerably reduces the number of
    variable read/writes required, which in themselves are worthy optimizations.


    #### Keep Your Loops Conditional-Free


    You should always strive to keep your critical loops conditional-free. Take, for
    example, the following snippet:


    `boolean multiplyByTwo = getMultiplyByTwo();`

    `for (i=0;i<1000;i++)`

    `{`

    `   c[i] = a[i] + b[i];`

    `   if ( multiplyByTwo )`

    `   {`

    `        c[i] += c[i]; // Replace multiplication by 2 with an addition`

    `   }`

    `}`


    The problem with it is that it unnecessarily checks for the `if` condition at
    each iteration. We can remove this bottleneck by rewriting our code so that we
    move the `if` outside the loop, and have a corresponding version of the loop in
    each of the `if`''s branches, like so:


    `boolean multiplyByTwo = getMultiplyByTwo();`

    `if ( multiplyByTwo )`

    `{`

    `        for (i=0;i<1000;i++)`

    `        {`

    `           c[i] = a[i] + b[i];`

    `           c[i] *= 2;`

    `        }`

    `}`

    `else`

    `{`

    `        for (i=0;i<1000;i++)`

    `        {`

    `           c[i] = a[i] + b[i];`

    `        }`

    `}`


    This version is more verbose, but it is also considerably faster, as there are
    fewer operations within the loops (remember, `if`s are very expensive). In addition,
    there are also fewer variables used, so locality is improved. Finally, you can
    optimize each loop independently so as to get the best performance in each case.


    This technique, officially called “loop unswitching,” scales well for up to two
    nested `if`s. For more than two nested `if`s, the code becomes hard to maintain
    and it also increases the method size considerably, which can lead to JVM or hardware
    performance issues.


    #### Eliminate Special Iterations from Your Loops


    It is often the case that some loops have special iterations at the beginning
    or at the end, or sometimes even in the middle. Take, for example, the following
    snippet:


    `int bIndex = 9`

    `int cIndex = 8;`

    `for (i=0;i<10;i++)`

    `{`

    `        a[i] = b[bIndex] + c[cIndex];`

    `        bIndex = i;`

    `        cIndex = i;`


    `}`


    Notice that the general formula for this loop is in essence `a[i] = b[i-1] + c[i-1]`,
    except for the first case, where the formula is `a[0] = b[9] + c[8]`. We can take
    advantage of this and rewrite the loop as follows:


    `a[0] = b[9] + c[8]`

    `for (i=0;`**`i<9;`**`i++)`

    `{`

    `        a[`**`i+1`**`] = b[i] + c[i];`

    `}`


    This effectively treats the first iteration separately and thus streamlines the
    body of the actual loop. The technique is officially known as “loop peeling.”


    Note that when using loop peeling, you usually have to adjust the end and/or initial
    conditions for the loop, as well as any array indexes that refer to the looped
    variable and other references to it—see the foregoing snippet for an example.'
  trans: '

    #### 循环展开


    在许多情况下，循环需要执行的迭代次数是预先已知的。此时，如果次数足够小（最多 10 到 15 次迭代），就值得将循环展开。也就是说，将循环的原始形式，例如下面的代码：


    `for (i=0;i<4;i++)`

    `{`

    `        a[i] = i * i;`

    `}`


    转换为更冗长但速度更快的版本：


    `a[0] = 0;`

    `a[1] = 1;`

    `a[2] = 4;`

    `a[3] = 9;`


    这种技术能带来多项性能提升，其中最重要的是它消除了循环所需的跳转指令、边界条件检查以及递增指令（例如 `i++`）。此外，在许多情况下（包括我们的示例），循环内部的数学运算也可以在一定程度上展开，从而获得更大的性能提升。


    如果展开后的循环被多次执行（例如，当它是嵌套循环结构中的内层循环时），该技术尤其有效。如果循环是独立的，性能提升通常微乎其微。


    #### 内联代码


    与循环展开相关，代码内联是指用方法实际的主体替换方法调用的做法。这对于主体较小的方法极为有效，因为在这些方法中，调用开销通常等于甚至大于运行该方法所需的实际资源（内存、CPU
    时间）。


    这种技术有时能为 Java ME 代码带来显著的性能提升，因为某些 JVM 在调用方法时会产生大量开销（较旧的设备和 JVM 尤其容易受到此影响）。


    代码内联的主要问题是，除非通过预处理器或其他外部工具实现，否则它会显著增加应用程序的代码库。这可能是一个问题，因为方法主体的任何更改都必须手动传播到所有调用处，这不仅繁琐，而且容易出错。


    此外，即使使用自动化工具，代码内联也会增加应用程序的 JAR 大小，并且如果包含内联代码的方法变得过大，甚至可能导致性能问题；不过，这种情况很少发生。


    #### 优化循环相关的数学运算


    很多时候，循环内部变量的值依赖于循环变量的值。这通常是进行代码优化的好地方。例如，以下代码片段：


    `for (i=0;i<100;i++)`

    `{`

    `        for (j=0;j<100;j++)`

    `        {`

    `                someVariable = i * 10 + j * 5;`

    `                doSomething(someVariable);`

    `        }`

    `}`


    这里可以清楚地看到，`someVariable` 线性依赖于 `i` 和 `j` 的值。这段代码效率非常低，每次迭代都从头计算 `someVariable`，总共计算了
    10,000 次。


    我们可以在两个地方进行优化。首先，`i * 10` 这部分可以移到外层循环之外，如下所示：


    `for (i=0;i<100;i++)`

    `{`

    `        tempI = i * 10;`

    `        for (j=0;j<100;j++)`

    `        {`

    `                someVariable = tempI + j * 5;`

    `                doSomething(someVariable);`

    `        }`

    `}`


    现在我们节省了 10,000 次乘法运算。通过观察 `j * 5` 产生的序列：0, 5, 10 等，我们还可以再节省 10,000 次。在这种情况下，如果我们像下面这样编写代码，就可以直接用
    `j` 的值替换 `j * 5`：


    `for (i=0;i<100;i++)`

    `{`

    `        tempI = i * 10;`

    **`for (j=0;j<500;j+=5)`**

    `        {`

    `                someVariable = tempI + j;`

    `                doSomething(someVariable);`

    `        }`

    `}`


    如果在循环中只使用变量值乘以一个数字的结果，这个技巧非常有用。然而，在我们的例子中，我们还可以做得更好。请注意，对于任何 `tempI` 的值，`someVariable`
    的值序列是 `tempI`、`tempI+5`、`tempI+10` 等。将其写成递归公式，我们会得到 `a(i) = a(i-1) + 5`。这意味着我们可以像下面这样编写循环：


    `for (i=0;i<100;i++)`

    `{`

    `        tempI = i * 10;`

    `        for (j=0;j<100;j++)`

    `        {`

    `                doSomething(tempI);`

    **`tempI += 5;`**

    `        }`

    `}`


    将这个最终版本与原始版本进行比较，你会注意到，我们将内层循环中的数学运算从两次乘法和一次加法减少为仅一次加法——考虑到内层循环运行了 10,000 次迭代，这是一个相当大的改进！


    优化循环相关的数学运算通常很有效，而且通常没有陷阱，但它确实有使循环逻辑变得非常难以理解的趋势，尤其是当内层循环中的数学运算原本就很复杂时。我经常使用的一个技巧是，在优化后的循环版本之前，将原始的、未优化的循环版本作为注释添加进去。然后，我可以将此注释用作调试和理解循环逻辑的参考。


    对于 Java ME，除了使代码更快这一明显优势外，这种优化还使字节码体积更小，并显著减少了所需的变量读/写次数，这些本身就是有价值的优化。


    #### 保持循环内无条件分支


    你应该始终努力使关键循环内没有条件分支。例如，以下代码片段：


    `boolean multiplyByTwo = getMultiplyByTwo();`

    `for (i=0;i<1000;i++)`

    `{`

    `   c[i] = a[i] + b[i];`

    `   if ( multiplyByTwo )`

    `   {`

    `        c[i] += c[i]; // 用加法替换乘以 2`

    `   }`

    `}`


    问题在于，它在每次迭代中都不必要地检查 `if` 条件。我们可以通过重写代码来消除这个瓶颈，将 `if` 移到循环外部，并在 `if` 的每个分支中放置一个对应的循环版本，如下所示：


    `boolean multiplyByTwo = getMultiplyByTwo();`

    `if ( multiplyByTwo )`

    `{`

    `        for (i=0;i<1000;i++)`

    `        {`

    `           c[i] = a[i] + b[i];`

    `           c[i] *= 2;`

    `        }`

    `}`

    `else`

    `{`

    `        for (i=0;i<1000;i++)`

    `        {`

    `           c[i] = a[i] + b[i];`

    `        }`

    `}`


    这个版本更冗长，但也快得多，因为循环内的操作更少（记住，`if` 语句非常昂贵）。此外，使用的变量也更少，因此局部性得到了改善。最后，你可以独立优化每个循环，以便在每种情况下都能获得最佳性能。


    这种技术正式名称为“循环切换”，对于最多两个嵌套的 `if` 语句效果良好。对于超过两个嵌套的 `if` 语句，代码会变得难以维护，并且还会显著增加方法的大小，这可能导致
    JVM 或硬件性能问题。


    #### 从循环中消除特殊迭代


    通常，某些循环在开头或结尾，有时甚至在中间会有特殊的迭代。例如，以下代码片段：


    `int bIndex = 9`

    `int cIndex = 8;`

    `for (i=0;i<10;i++)`

    `{`

    `        a[i] = b[bIndex] + c[cIndex];`

    `        bIndex = i;`

    `        cIndex = i;`


    `}`


    请注意，这个循环的通用公式本质上是 `a[i] = b[i-1] + c[i-1]`，除了第一种情况，其公式是 `a[0] = b[9] + c[8]`。我们可以利用这一点，将循环重写如下：


    `a[0] = b[9] + c[8]`

    `for (i=0;`**`i<9;`**`i++)`

    `{`

    `        a[`**`i+1`**`] = b[i] + c[i];`

    `}`


    这有效地将第一次迭代单独处理，从而简化了实际循环的主体。该技术正式名称为“循环剥离”。


    请注意，使用循环剥离时，通常需要调整循环的结束和/或初始条件，以及任何引用循环变量的数组索引和对它的其他引用——请参见前面的代码片段示例。

