- fmt: '# UI Design


    Probably the biggest UI-related limitation of Java ME is that, for historical
    reasons, you can use the device''s native widgets only to create simple-looking
    interfaces. Anything more complex is simply not possible natively, so you are
    forced to use your own GUI toolkit, or a third-party one—virtually all Pro Java
    ME applications use non-native GUI toolkits. This, of course, means your application''s
    look and feel will probably be out of tune with the look and feel the user is
    accustomed to with native applications. This is not a problem for games or other
    multimedia applications, but for business applications it can be a minus, especially
    if one of the requirements is “native look and feel.”


    Another limitation of Java ME is that most users are accustomed to using the two
    softkeys for accessing the application''s menu. However, some devices do not have
    softkeys. Blackberry devices, for example, do not have softkeys (instead they
    use the “menu” key), and some Java ME devices are touch-only. So right from the
    start we have three different methods of navigating the menus of an application.
    You can work around this either by having multiple builds and detecting the platform
    at runtime, or by designing and implementing your UI in such a way that it''s
    possible to use all three methods seamlessly and independently.


    Physical button placement can sometimes be an issue, or at least cause for frustration,
    because on some devices, especially those with accelerometers, the screen can
    be rotated and switched from portrait to landscape on the fly. Your application
    should not only be able to handle this, but it should also keep track of where
    the physical buttons on a device are located. This is especially important for
    softmenus. For example, [Figure 1–2](#Chapter01.html#fig_1_2) shows what the correct
    softmenu placement and layout are when the application is in landscape mode, as
    well as an incorrect placement and layout for landscape mode. Notice that, in
    the correct layout, the softmenu options are right next to the softbutton, instead
    of at the bottom of the screen.


    ![images](images/0102.jpg)


    **Figure 1–2.** *How physical button position affects screen layout*


    UI design should also attempt to take into account the screen characteristics
    mentioned earlier, like screen pixel density. On devices with high-density screens,
    it''s often a good idea to make everything bigger (in pixels) so the application
    is easier to use. Since high-density screens are usually seen in higher-end devices,
    which have more processing power, you can use the extra pixels to add polish and
    fine touches to your UI, such as shadows and subtle animations, thus improving
    the user experience.


    # CPU and VM Characteristics


    These characteristics are by far the ones that have the most influence over the
    speed of Java ME applications. First, let''s talk about CPUs. As most mobile CPUs
    are ARM-based, we''ll use them as a reference. For regular applications, anything
    in the 100–200MHz range should suffice these days. For computation-intensive applications
    or applications with lots of UI polish, you''ll most likely need something in
    the 200–400MHz range, perhaps even more, to get a smooth user experience. Of course,
    these are ballpark figures and are affected by many factors, such as whether there
    are any background applications running and whether the CPU has Jazelle or ThumbEE
    support (ARM CPUs with Jazelle or ThumbEE support can run Java ME bytecode in
    hardware, thus providing a huge boost to performance).


    Low-level functionality can sometimes be an important limitation. Some devices
    do not support floating point calculations natively, so instead they emulate them
    using integer arithmetic. This makes floating point operations on these devices
    extremely slow. It is also common that some mathematical operations, like addition,
    are faster than others, like division. On some devices, the difference is significant,
    so if your application relies heavily on these slower operations, it will be significantly
    slower than expected on the previously mentioned devices. Later in the book, we
    will see how to mitigate at least part of this problem by doing code optimization.


    Even more important than CPU speed, especially for low-end devices, is VM (virtual
    machine) performance. Since Java ME is bytecode-interpreted, two devices with
    the same hardware specs but different VMs can vary wildly in terms of performance—so
    CPU speed alone is not a good performance indicator for Java ME. To figure out
    how well a given device will run your application, write small test applications
    that simulate the kind of loads that your real application is likely to have and
    measure their performance. To get an even better overview, gradually vary the
    “load factor” from 10% to 200%.


    # Memory-Related Performance


    Obviously, the more memory you have at your disposal, the better. However, not
    all devices make all their free memory available to Java ME, so you should always
    take into consideration the actual Java ME memory available, not the device''s
    declared memory capacity. Furthermore, especially on multitasking-capable devices,
    the actual amount of memory available at any given time can vary wildly. You should
    never assume that you''ll always have the same amount of RAM at your disposal,
    and you should always code defensively to cope with this.


    **NOTE:** There are ways to work around memory issues—for example, simulating
    page files using persistent storage mechanisms and splitting big loads into smaller
    and more manageable chunks. We will discuss these later in the book.


    Second to memory size, what affects overall performance is the performance of
    the garbage collector, which is also related to VM performance (discussed previously).
    Java ME applications tend to create a lot of objects, and those objects have to
    be deleted at some point. When that happens, the garbage collector kicks in. Devices
    on the market today have a wide variety of garbage collectors, from those that
    do their job efficiently and unnoticed to those that take forever to run and freeze
    the entire application while they do so. Your application should be prepared to
    handle most of them, if not all, especially if it is a data-intensive application.


    How fast object creation happens constitutes another important factor in the performance
    of any Java ME application. If your application manipulates a lot of objects,
    the speed at which these objects are created can critically limit the speed of
    your application, even more so than the garbage collector.


    # Battery Life


    Battery life can vary widely from one device to another—and some projects even
    have specified a limit on how fast an application is allowed to drain a battery.
    So when you are developing a Java ME app, you need to try to maximize battery
    life.


    The most effective way to conserve battery life is to throttle down your CPU usage
    and your network''s access. This is not always easy, but it''s important, particularly
    for applications that tend to run for long periods of time, like chat clients.
    Furthermore, throttling is frequently effective in prolonging battery life, provided
    it is implemented properly. We will learn more about this later in the book.'
