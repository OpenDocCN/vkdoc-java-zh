    Our code now changes seamlessly between using more CPU and using more RAM, depending
    on what events are received. You can apply this method in other parts of your
    application, and to other types of resources too. For example, you could use the
    CPU to compress data before sending it over the network, thus sacrificing CPU
    time and battery life in exchange for bandwidth. Or you could do the opposite
    and exchange bandwidth for CPU time.


    If done properly, the net effect of this technique is a very flexible application
    resource-wise, indicated by variations of the resource consumption profile when
    environmental parameters change drastically.


    This technique can be applied equally well to non technical resources, too. For
    example, if your application has to display a large amount of text, perhaps a
    long “thank you!” e-mail from one of your happy customers, you might want to consider
    using a slightly smaller font size than usual, thus sacrificing a bit of legibility
    in exchange for having a better overall picture.


    #### Aim for a Loose and Decentralized Architecture


    This is best explained with an analogy: would you prefer your car to be a tightly
    interconnected assembly of parts, where if your onboard computer stops working
    then the engine won''t start, and if the engine won''t start the interior lights
    won''t go on? Or would you rather it be the way it is now, where if some parts
    stop working, the rest will continue to function to the best of their abilities?


    My guess is you prefer the latter. The same is true for software development:
    You should always split your application into almost independent components, which
    can function on their own if necessary. To link everything together, all you have
    to do is use global events.


    A good example of this is the code in [Listing 1–4](#Chapter01.html#list_1_4).
    You will notice that it reacts to the `Event.Environment.LOW_MEMORY` event, but
    that nowhere in the code is it specified where that event should come from. That''s
    because it is a global event. You can imagine that somewhere in the code there
    is a module that periodically measures environmental parameters and, when it detects
    a significant change, it raises the appropriate event. Then, other modules can
    react to this event.


    This technique has special importance for Java ME software development because
    it gives developers a very effective means of handling the huge variation in device
    capabilities and specifications that Java ME software has to deal with.


    For example, when the device your code is running on does not support a certain
    feature, simply have your application ignore the corresponding events, not raise
    them to begin with or raise an appropriate `NOT_SUPPORTED` event, which can then
    be handled by the modules affected by it. This will allow you to alter your application''s
    behavior in a transparent, logical, and easy to understand way, on the fly and
    with the kind of impact you desire (local or global).


    Finally, decentralization also means that components should be able to “think
    for themselves,” so to speak. For example, in the GUI layer, rather than having
    a central entity decide where each widget should be placed and how big it should
    be, you can have the widgets format themselves. All the “central authority” has
    to do is provide information, such as how much space is available in the current
    row. This approach can be used on all software platforms, but it''s even more
    important for Java ME because of all the different (and small) screen sizes, UI
    layouts, and interaction paradigms it has to support.


    #### Never Do On-Device What You Can Do Off-Device


    The main idea behind this rule is that, rather than doing calculations on the
    mobile device itself, you do them beforehand and include only the *result* in
    the application. This can save a lot of CPU power and battery life that would
    otherwise go toward doing the calculations on the device at runtime.


    To illustrate, please consider the example in [Listing 1–5](#Chapter01.html#list_1_5),
    which can be found in one form or another in many applications (especially games).


    **Listing 1–5.** *Drawing a Sine Curve*


    `for (int x=0;x<360;x++)`

    `{`

    `        drawPoint(x, 199 * Math.sin( degreesToRadians(x));`

    `}`


    We know from [Listing 1–4](#Chapter01.html#list_1_4) that we can use an array
    to speed things up. But there is a crucial difference between the current example
    and the previous one: in this example, the values in the array never change as
    the values of the sine function are always the same.


    This means that, rather computing the array on the device, we can calculate it
    externally and include it explicitly in the source code, like in [Listing 1–6](#Chapter01.html#list_1_6).


    **Listing 1–6.** *Drawing a Sine Curve with the Values of `sin()` Already Calculated*


    `double SIN_VALUES = { 0, 0.0174524064, 0.0348994967, ... }`

    `for (int x=0;x<360;x++)`

    `{`

    `        drawPoint(x, 199 * SIN_VALUES[x] );`

    `}`


    Now obviously the difference in CPU time between this example and the one in [Listing
    1–5](#Chapter01.html#list_1_5) isn''t that big overall, but for more complex scenarios,
    it can certainly be noticeable.


    Consider the case of a sophisticated game or stock analysis application that uses
    neural networks to implement its AI. Training a neural network on-device can be
    extremely time-consuming and resource-intensive, while training it on a desktop
    computer and having the device use the pre-established results is cheaper, quicker,
    and less frustrating for the user.


    The same idea can be applied to more serious stuff, such as encryption and data
    compression. Activities such as these can be greatly improved by calculating some
    values off-device and using the results. This is, of course, true for all mobile
    platforms, but Java ME stands to gain the most since it usually lacks the hardware
    support and resources necessary to do these things efficiently on its own.


    ### Summary


    After briefly examining Java ME''s position in the modern mobile world, we selected
    an idea for our own Pro Java ME project and we discussed how non technical issues,
    such as the project''s goals and source of revenue, affect its technical side.


    We also discussed the primary technical limitations Java ME applications generally
    face, and we looked at how Pro Java ME applications differ from regular Java ME
    applications (code intelligence, custom frameworks, heavy use of third-party libraries,
    and great potential for code reuse).


    Finally, we looked at some important tips for writing truly flexible and portable
    Java ME applications.


