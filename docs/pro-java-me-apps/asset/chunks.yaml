    `            for (int i=0; i<= 10; i++)`

    `            {`

    `                StringItem stringItem = new StringItem("#" + i + " This is a
    very very`

    `                long string which will not fit in the small view", 77, 400, this,
    theme);`

    `                container.addWidget(stringItem);`

    `            }`


    `            // Add the container to the main view`

    `            view.addWidget(container);`


    `            // Layout everything`

    `            container.doLayout();`

    `            view.doLayout();`


    `           // Focus the view`

    `           view.onFocus();`


    `            // Display the view`

    `            Application.showView(view);`

    `        }`

    `}`


    If you run this code, you’ll get something that looks like [Figure 6–4](#Chapter06.html#fig_6_4).


    ![images](images/0604.jpg)


    **Figure 6–4.** *The test application for the UI module*


    Granted, it’s not the prettiest application out there, but it does have all the
    basic elements of a modern UI: widgets, containers, support for nested containers,
    touch support, scrolling, and support for user interaction events. This is not
    bad, considering we started writing it from scratch. Of course, there are probably
    a few quirks here and there, and some corner cases that are not covered properly,
    but for all intents and purposes this is a functional and usable UI.


    And this is just the beginning of the fun: now you play around with the code,
    create new widgets, and improve the existing ones. You could, for example, add
    borders and scrollbars to containers. Or you could implement check boxes and radio
    buttons to complement the existing array of widgets. It’s up to you!'
