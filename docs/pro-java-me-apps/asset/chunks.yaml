    正如你可能猜到的，跳出固有思维模式对于保持事物简洁至关重要，两者相辅相成。我曾参与的一个项目需要脚本支持；也就是说，脚本需要从服务器下载并在设备上运行。其背后的想法是能够在运行时升级或改变应用程序的行为和/或功能集。问题在于，正如预期的那样，在
    Java ME 设备上运行脚本速度并不快，也不节省资源。


    最初的方法是直接在设备上解析并运行纯文本形式的脚本，原封不动地执行。当然，这效果并不理想：性能简直糟透了。


    提出的第二种方法是将脚本转换为解析树（或抽象语法树），一旦脚本到达设备就进行转换。这比最初的方法好得多，但转换仍然必须在设备上完成，这使得初始转换速度很慢。此外，我们使用的语言（类似
    C 语言）相当复杂，因此在 Java ME 设备的限制内编写并执行一个完整的解析器并不容易。而且，在设备上首次转换脚本会花费非常非常长的时间。


    因此，第三种方法是在服务器端（或者至少在设备外部）完成从脚本文件到语法树的转换。这效果很好，因为一旦我们从服务器接收到语法树，它就可以立即在设备上使用。但这里仍然存在一个问题：存储树、根据需要遍历节点以及执行每个节点，对于我们的目的来说仍然不够快。


    我们的第四种也是最终方法也解决了这个问题。语法树会被转换为字节码（同样在服务器端），然后在我们的 Java ME 应用程序内的虚拟机上执行。我们现在可以使用一个简单的数组来存储脚本指令，而不是使用树结构，并且执行脚本的速度变得快得多。此外，脚本大小也因此显著减小，内存需求也同样降低。


    总的来说，我们能够创建更大、更复杂的脚本，这些脚本下载更快，运行也更快。在实际设备上运行脚本所需的代码也非常简单，因为我们所要做的就是遍历源数组并盲目地执行其中的字节码。而且，额外的好处是，只要存在相应的字节码转换器，脚本可以用任何语言编写（尽管只实现了原始的
    C 语言变体）。


    通过跳出固有思维模式并正确识别核心问题（和需求），我们得以实现这个非常优雅且简单的解决方案。在我们的案例中，问题不是“我们如何在设备上运行脚本？”，而是“我们如何编写脚本来控制设备的行为？”
    这种差异虽然微妙，但却很重要。


    ### 标准化用户体验


    无论你喜欢与否，Java ME 作为一个平台，并没有用户可识别的身份。换句话说，用户无法仅仅看一眼某个应用程序就说，“嘿，这是一个 Java ME 应用程序！”，然后使用一套标准的隐喻和范式来操作该应用程序（例如，在
    Android 上长按一个元素会弹出上下文菜单，或者 iOS 应用程序通常在屏幕顶部有一种导航栏）。


    这种能力的缺失主要源于 Java ME 没有一套清晰且标准化的规范来详细说明应用程序的用户界面应该如何呈现和运作、平台的用户体验最佳实践是什么，以及从用户角度来看，平台有哪些关键的可识别元素使其与其他平台区分开来。


    没有这样的身份，也没有清晰全面的用户体验规则，你最终可能会让用户感到困惑和沮丧。例如，你现在通常的做法是围绕一个高质量的 UI 工具包来构建你的应用程序，按你认为合适的方式设计。这很容易做到，因为现代
    UI 工具包或多或少与桌面 UI 工具包相当。最终，尽管你没有遵循任何平台指南，但应用程序本身看起来很棒，感觉也很好。


    问题是每个人都这样做，虽然所有应用程序都大致使用相同的小部件，但实际的用户体验却完全不同：不同的应用程序仍然有不同的 UI 结构（例如，一个可能基于标签页，而另一个可能基于表单）和不同的细微差别（例如，访问上下文菜单的不同方式，屏幕间导航的不同方式等）。


    这意味着用户必须学习如何使用每个应用程序，并且必须适应每个应用程序的交互范式。此外，这意味着用户在一个应用程序中习惯的某些功能（例如，惯性滚动）可能在另一个应用程序中不可用，反之亦然。即使在高级用户中，在应用程序之间切换也可能变得有点混乱；技术不太熟练的用户肯定会觉得这种体验令人沮丧。话虽如此，有更好的方法来解决用户界面和用户体验问题。


    针对上述令人沮丧的情况，一种替代方案是尝试为用户提供标准化的体验，一种即使在你的应用程序之外也能让他们产生共鸣并且会觉得直观的体验。首先需要问的问题是：标准化到什么程度？如前所述，没有与此相关的官方指南，至少没有达到与当今应用程序相关的水平：你能找到的最好结果是一些通用程序和指南，涉及命令如何映射到软键以及其他与现已过时的
    `javax.microedition.lcdui` 包相关的低级内容。


    **注意：** 遗憾的是，没有一套最新的用户体验指南不仅影响单个应用程序，也影响整个 Java ME 平台，因为成为“无人区”绝不是提高知名度和吸引用户的好方法。就宣传而言，Java
    ME 正在与 Android、iOS 和 Blackberry 进行一场必败之战——而且，在我看来，它失败的主要原因之一正是缺乏用户体验标准。


    因此，唯一明智且合理的做法是模仿其他移动平台。当然，首选目标是 Android 和 iOS。就基本 UI 而言，只要你使用一个功能强大的 UI 工具包，模仿这些平台应该没有问题：你可能需要编写一两个自定义组件，并在这里或那里做一些改动，但大部分工作都很简单，而且你还可以在未来的项目中重复使用这些成果。

    '
- fmt: '

    The tricky part is emulating more advanced features of the target platform—for
    example, Android’s drawer concept. For this, you will most likely need to write
    quite a few custom components—unfortunately, there is no way around this. The
    same goes for implementing platform-specific interaction paradigms, like the aforementioned
    press-for-contextual-menu: you will most likely have to get your hands dirty in
    order to get these implemented, though a good UI framework helps tremendously
    in keeping the mess to a minimum.


    Next, a very interesting task is providing a standardized user experience on devices
    with no touchscreens and just a joystick—which is the most common scenario. Android
    emulation works best here, as Android’s user interface, unlike iOS’s, is designed
    to also be operated with a joystick.


    Taking the concept of emulating a platform’s user experience even further, you
    can and should also emulate the way the target platform handles errors and notifications,
    as well as other aspects of the user experience. For example, Android applications
    are, as a best practice, required to save their state so that they may be closed
    and restored automatically, as needed. Truly emulating the Android user experience
    involves at least partially implementing this behavior. For example, the last
    screen the user was on when the application was shut down should be shown when
    it gets started back up again.


    There is another alternative to all of these: to emulate as closely as possible
    the device’s native user experience, the one that the user has outside of the
    Java ME environment, while operating the phone’s native applications. This will
    most likely involve writing custom versions of your application for each targeted
    device (as far as the UI is concerned), and will most likely require quite a bit
    of custom component writing and skinning. In the end, the results may not be perfect,
    as any skins or themes that the user has applied to the phone’s native environment
    will not get translated to your application. However, most of the time, the results
    will be acceptable, and tech-savvy and less tech-savvy users alike will feel right
    at home with your application simply because they know how to use it from using
    their phone.


    Finally, it should be noted that creating a custom user experience/interface with
    its custom tweaks to the standard formula, as described in the latter sections
    of [Chapter 6](#Chapter06.html#ch6), is still a good idea in many scenarios—for
    example, in the case of multimedia applications, or when it is desired to “catch
    the eyes” of users by sporting a radical UI, or simply for exploring new concepts
    and pushing the platform forward. However, for your run-of-the-mill applications
    (e.g., business applications), you are better off simply providing a standard
    and “dull” user experience, to which the user can relate instantly and intuitively.


    ## Planning for the Worst-Case Scenario


    All things considered, Java ME is not a very developer-friendly environment, and
    many things can and do go wrong in practice, from device fragmentation issues
    to insufficient resources. These concerns are more or less non-existent on other
    mobile platforms, so you are free to develop on them just as you would on a desktop
    platform; you do not have this luxury with Java ME.


    As such, caution should be exercised at every step of the project. Rather than
    assume everything will work out fine and dive in head-first, you should adopt
    a more pessimistic approach and assume, by default, that things can and will go
    wrong.


    Defensive coding is a great example of this, and the one most intuitive for developers:
    never assume that something will execute correctly and always handle all possible
    errors, no matter how unlikely. This doesn’t translate to just catching all thrown
    exceptions, but also to checking the data you’re working with for validity and
    consistency. Being pessimistic and cautious also means not relying on the fact
    that all the device’s resources and capabilities will be available to you; as
    we have seen, this is often not the case.


    Another great example comes from estimating deadlines and manpower: add an extra
    20–30% to your initial estimate, just to be on the safe side. Chances are you
    will need at least some of the extra time and manpower provisioned, and if you
    don’t, then you’ll be able to release ahead of schedule—you win either way. If
    you don’t provision extra time and manpower, the end result will most likely be
    either missed deadlines or a buggy product release.


    You should also be pessimistic about your user’s expectations. For example, you
    should never assume that your users will be satisfied with the functionality and
    user experience you are currently providing them, and as such you should constantly
    think of reasonable and feasible ways you can improve these two aspects. Even
    if you don’t end up including these improvements in the current version of your
    application, a later release might see them implemented.


    Furthermore, as discussed previously in the book, never assume that a user will
    feel familiar or at home with your application. Chances are most of them will,
    but at least some of them will feel confused or might not figure out how to access
    and use at least part of your application’s functionality. This is to be expected
    for a platform with such a varying userbase; however, it’s still a disadvantage.
    To minimize the negative impact this has, you should apply the tips described
    in [Chapter 11](#Chapter11.html#ch11).

    '
