- fmt: '## Adding Fine Touches and User Interaction Improvements


    By now you should have a well-structured and optimized application. This already
    sets you apart from most Java ME applications out there, from a technical standpoint.
    However, it''s not enough to make your applications stand out from the user''s
    perspective, because users do not care about what happens “under the hood.”


    As such, this chapter is dedicated to showing how to improve your application
    from a user''s point of view. Besides having a good feature set (this should be
    a given), there are two main ways of doing so: adding fine touches to your application
    and improving the user''s interaction with your application and with your company,
    thus improving the overall user experience. In the following pages, we will discuss
    both of these aspects.


    Before we begin the discussion, it should be noted that you will most likely not
    be able to implement all of the suggestions presented, for technical and business
    reasons. Implementing everything discussed in this chapter will most likely result
    in a highly polished and extremely high-quality application. However, the development
    costs will increase significantly, so you will be able to target only the most
    high-end Java ME devices out there. Medium-range and low-end devices will simply
    not be able to handle the resource strain. Deciding which suggestions to implement
    and which suggestions to ignore is highly application specific. However, some
    guidelines are presented at the end of the chapter.


    ### Adding Fine Touches to Your Application


    One of the key aspects that separate Pro Java ME applications from regular Java
    ME applications are the *fine touches*—features and functionality not necessary
    to get the application''s job done, but present nonetheless. These fine touches
    can be subtle—for example, having an animated border instead of a static border
    around the currently selected cell in a spreadsheet application (to make it easier
    for the user to see where edits will take place). Fine touches can also be more
    visible, such as having contextual help available for every selectable item in
    the application.


    Fine touches add tremendous value to your applications. They do this not by adding
    major functionality (by definition) but by making the existing functionality easier
    and more pleasant to use. A user coming into contact with your application might
    not explicitly notice the fine touches you add, but will feel that your application
    “simply works” and that great care and much thought has been put into it.


    This means not only that your users (and your customers) will continue coming
    back to your application, but also that you will attract more users (and more
    customers). Word of well-written, user-friendly, and intuitive applications gets
    around fast, especially in the Java ME world, where such applications tend to
    be few and far between.


    #### Understanding Fine Touches


    Before we can begin discussing actual fine touches, you must first get a better
    understanding of what they are. Though there is no textbook definition, it is
    safe to say that any feature or functionality characterized by the following traits
    can be considered a fine touch:


    - *Noncritical*: A fine touch is, by definition, not critical to the operation
    of your Java ME application. For example, having an animated border around the
    currently selected cell is not necessary for the functioning of a spreadsheet
    application.

    - *Noninvasive*: Fine touches never force or require users to adapt their usage
    patterns. In other words, the user should be able to use the application just
    the same with or without these fine touches. For example, having contextual help
    for each selectable item in an application can be considered a fine touch, because
    the user doesn''t have to use this feature and can completely ignore it. On the
    other hand, confirmation dialogs for more-delicate operations (such as deleting
    items) cannot be considered a fine touch, because the user is forced to act upon
    them by confirming or dismissing the action.

    - *Simple and intuitive*: If a feature needs explaining, it is not a fine touch.

    - *Can be turned off*: This is more important than it looks, and is often forgotten.
    You may think that the animated border is nice, and so will a lot of users, but
    some of them might get distracted by it. And contextual help is great, but an
    experienced user might want to turn it off in order to minimize menu clutter.
    By being able to turn off fine touches, users get more control over their experiences.


    There is a very good reason for properly understanding what a fine touch is: many
    features (including some of the ones discussed later in this chapter) can be implemented
    either as regular features or as fine touches—but they make the most impact when
    they are implemented as the latter. For example, in the case of a chat client
    or other Internet-related applications, the update functionality can be implemented
    in two major ways. The first is as a stand-alone feature that the user must explicitly
    activate (that is, a “Check for updates” option in the application''s menu). The
    second is as a fine touch, which is done automatically by default and can be turned
    off by the user (that is, when the user connects to the Internet, a check for
    newer versions is done).


    Of the two ways, the second one is usually best for several reasons: it requires
    no user interaction, users are notified of newer versions even if they don''t
    check for them explicitly, and the application''s menu is freed up. This results
    in a cleaner and seemingly more “intelligent” application, which is something
    users will love.


    The same principle can be applied to many other aspects of your applications,
    resulting in applications that are simple and fun to use, while still providing
    all the functionality required of them. This is great for any current mobile platform,
    but Java ME stands to benefit the most from this because its users are generally
    less tech-savvy than the users of smartphone platforms, and thus they will appreciate
    the application''s simplicity and ease of use even more. In fact, this may be
    users'' determining criteria in choosing to use your application.


    **TIP:** When exploring fine touches, don''t limit yourself to Java ME applications!
    In the mobile world, probably the best examples of the use of fine touches are
    Apple''s products. Although it is usually not possible (for technical reasons)
    for a Java ME application to match Apple''s level of fine touches, many important
    fine touches (Apple-related or from other platforms) can be at least partially
    adapted to Java ME. Researching what fine touches other platforms and their applications
    have to offer and adapting these fine touches to your Java ME applications is
    one of the best ways to increase the value of your products.


    Let''s now explore some of the fine touches you can add to your Java ME applications.
    It should be noted that this is by no means an exhaustive discussion. Instead,
    it covers only the most frequently used fine touches that you can implement in
    a Java ME application.'
  raw: '## Adding Fine Touches and User Interaction Improvements


    By now you should have a well-structured and optimized application. This already
    sets you apart from most Java ME applications out there, from a technical standpoint.
    However, it''s not enough to make your applications stand out from the user''s
    perspective, because users do not care about what happens “under the hood.”


    As such, this chapter is dedicated to showing how to improve your application
    from a user''s point of view. Besides having a good feature set (this should be
    a given), there are two main ways of doing so: adding fine touches to your application
    and improving the user''s interaction with your application and with your company,
    thus improving the overall user experience. In the following pages, we will discuss
    both of these aspects.


    Before we begin the discussion, it should be noted that you will most likely not
    be able to implement all of the suggestions presented, for technical and business
    reasons. Implementing everything discussed in this chapter will most likely result
    in a highly polished and extremely high-quality application. However, the development
    costs will increase significantly, so you will be able to target only the most
    high-end Java ME devices out there. Medium-range and low-end devices will simply
    not be able to handle the resource strain. Deciding which suggestions to implement
    and which suggestions to ignore is highly application specific. However, some
    guidelines are presented at the end of the chapter.


    ### Adding Fine Touches to Your Application


    One of the key aspects that separate Pro Java ME applications from regular Java
    ME applications are the *fine touches*—features and functionality not necessary
    to get the application''s job done, but present nonetheless. These fine touches
    can be subtle—for example, having an animated border instead of a static border
    around the currently selected cell in a spreadsheet application (to make it easier
    for the user to see where edits will take place). Fine touches can also be more
    visible, such as having contextual help available for every selectable item in
    the application.


    Fine touches add tremendous value to your applications. They do this not by adding
    major functionality (by definition) but by making the existing functionality easier
    and more pleasant to use. A user coming into contact with your application might
    not explicitly notice the fine touches you add, but will feel that your application
    “simply works” and that great care and much thought has been put into it.


    This means not only that your users (and your customers) will continue coming
    back to your application, but also that you will attract more users (and more
    customers). Word of well-written, user-friendly, and intuitive applications gets
    around fast, especially in the Java ME world, where such applications tend to
    be few and far between.


    #### Understanding Fine Touches


    Before we can begin discussing actual fine touches, you must first get a better
    understanding of what they are. Though there is no textbook definition, it is
    safe to say that any feature or functionality characterized by the following traits
    can be considered a fine touch:


    *   *Noncritical*: A fine touch is, by definition, not critical to the operation
    of your JavaME application. For example, having an animated border around the
    currently selected cell is not necessary for the functioning of a spreadsheet
    application.

    *   *Noninvasive*: Fine touches never force or require users to adapt their usage
    patterns. In other words, the user should be able to use the application just
    the same with our without these fine touches. For example, having contextual help
    for each selectable item in an application can be considered a fine touch, because
    the user doesn''t have to use this feature and can completely ignore it. On the
    other hand, confirmation dialogs for more-delicate operations (such as deleting
    items) cannot be considered a fine touch, because the user is forced to act upon
    them by confirming or dismissing the action.

    *   *Simple and intuitive*: If a feature needs explaining, it is not a fine touch.

    *   *Can be turned off*: This is more important than it looks, and is often forgotten.
    You may think that the animated border is nice, and so will a lot of users, but
    some of them might get distracted by it. And contextual help is great, but an
    experienced user might want to turn it off in order to minimize menu clutter.
    By being able to turn off fine touches, users get more control over their experiences.


    There is a very good reason for properly understanding what a fine touch is: many
    features (including some of the ones discussed later in this chapter) can be implemented
    either as regular features or as fine touches—but they make the most impact when
    they are implemented as the latter. For example, in the case of a chat client
    or other Internet-related applications, the update functionality can be implemented
    in two major ways. The first is as a stand-alone feature that the user must explicitly
    activate (that is, a “Check for updates” option in the application''s menu). The
    second is as a fine touch, which is done automatically by default and can be turned
    off by the user (that is, when the user connects to the Internet, a check for
    newer versions is done).


    Of the two ways, the second one is usually best for several reasons: it requires
    no user interaction, users are notified of newer versions even if they don''t
    check for them explicitly, and the application''s menu is freed up. This results
    in a cleaner and seemingly more “intelligent” application, which is something
    users will love.


    The same principle can be applied to many other aspects of your applications,
    resulting in applications that are simple and fun to use, while still providing
    all the functionality required of them. This is great for any current mobile platform,
    but Java ME stands to benefit the most from this because its users are generally
    less tech-savvy than the users of smartphone platforms, and thus they will appreciate
    the application''s simplicity and ease of use even more. In fact, this may be
    users'' determining criteria in choosing to use your application.


    **TIP:** When exploring fine touches, don''t limit yourself to Java ME applications!
    In the mobile world, probably the best examples of the use of fine touches are
    Apple''s products. Although it is usually not possible (for technical reasons)
    for a Java ME application to match Apple''s level of fine touches, many important
    fine touches (Apple-related or from other platforms) can be at least partially
    adapted to Java ME. Researching what fine touches other platforms and their applications
    have to offer and adapting these fine touches to your Java ME applications is
    one of the best ways to increase the value of your products.


    Let''s now explore some of the fine touches you can add to your Java ME applications.
    It should be noted that this is by no means an exhaustive discussion. Instead,
    it covers only the most frequently used fine touches that you can implement in
    a Java ME application.'
