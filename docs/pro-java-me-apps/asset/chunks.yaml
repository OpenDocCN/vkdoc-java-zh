  trans: '

    #### Java ME 的优势


    首先，与普遍看法相反，Java ME *确实*是智能手机软件开发的一个可行选择。一方面，塞班系统是当今使用最广泛的智能手机操作系统，并且它完全支持 Java
    ME。黑莓设备也支持 Java ME。甚至还有方法可以通过使用跨平台转换工具和模拟器，在安卓和 iPhone 上运行 Java ME 应用。因此，当今大多数智能手机都以某种形式支持
    Java ME——并且它可以利用这些设备卓越的能力。


    此外，尽管如今智能手机因其酷炫的新功能而备受追捧，但值得注意的是，现代功能手机也开始涉足同一领域。触摸屏、3D 加速器、传感器（例如加速度计）、地理定位支持、多任务处理、大容量
    RAM、快速 CPU 和高分辨率屏幕等功能，正逐渐在功能手机世界中变得普遍，而在功能手机领域，Java ME 是无可争议的王者。


    再者，功能手机的销量仍然远高于智能手机。例如，根据维基百科，截至 2010 年，功能手机在美国占据了 83% 的市场份额。这意味着美国 83% 的手机无法运行安卓或
    iPhone 应用，但它们*可以*运行 Java ME 应用，这使得 Java ME 成为你想要实现高市场渗透率时的最佳平台。


    最后，Java ME 被设计得简单且模块化。除核心功能外，所有内容都由各个 Java 规范请求（JSR）定义和规范：3D 支持在 JSR 184 中，PIM
    和文件系统支持在 JSR 75 中，传感器支持在 JSR 256 中，等等。这意味着两件事。首先，Java ME 作为一个整体，可以在保持向后兼容性的同时进行演进和改进。你将始终能够利用你现有的知识和软件基础，因为沿途不会有颠覆性的、破坏兼容性的变化，只有不影响现有功能的、可选的增量改进。其次，你可以根据特定目标设备所支持的功能，定制你的应用程序，以提供该设备所需的精确功能集。


    最终，你得到一个在当今绝大多数手机上以某种形式得到支持的平台，并且与竞争对手平台不同，它不仅能运行在最先进的智能手机上，也能运行在低端功能手机上。此外，该平台足够灵活，允许你在可用的情况下使用花哨的功能（例如
    3D 支持和地理定位），因此你不必局限于核心的 Java ME 功能。所以你看，Java ME 仍然是开发移动应用的绝佳选择。


    #### Java ME 的劣势


    与所有软件平台一样，Java ME 既有优点也有缺点。为了提供公正的评估，让我们看看 Java ME 最显著的缺点——以及如何缓解这些问题。


    Java ME 的主要问题在于，按照当今的标准，其核心 API 有些过时且低级。幸运的是，市面上有大量的第三方库，从 UI 库到实用工具库，可以帮助缓解这个问题。这甚至可以被视为一个优势，因为你可以自由选择最适合你特定项目的任何库和编码范式，从而保持代码库的简洁和切题。


    Java ME 还受到设备碎片化问题的困扰（考虑到支持 Java ME 的设备数量惊人，这在某种程度上是不可避免的）。这在早期是一个巨大的问题；然而，设备支持已经变得更加标准化，并且出现了应对碎片化的工具。如今，碎片化仍然是一个问题，但程度要轻得多，并且有大量资源可以用来解决它。我们将在本书后面讨论碎片化问题。


    Java ME 也比竞争平台更缺乏宽容度。通常需要在比其它现代平台更少的资源下工作，这意味着内存泄漏和低效算法等问题更有可能导致稳定性和性能问题。对此最好的解决方案是防御性编码，并优化你的算法和代码——我们稍后将讨论这两个主题。


    此外，Java ME 根本缺乏对某些功能的支持。例如，系统级通知不可用，同样也不支持编写小部件以及与硬件和操作系统的底层交互。即将推出的 MIDP 3.0
    标准将缓解其中一些问题，但在此之前，Java ME 应用程序在大多数情况下必须是独立且自包含的，只能有限地访问某些操作系统和硬件功能。


    **注意：** 有一些方法可以将常规的 Java ME API 调用与特定平台的 API 调用混合使用（这在黑莓应用程序中经常这样做），但严格来说，最终结果并非
    Java ME 应用程序，因此出于记账目的，这不计算在内。


    最后，Java ME 通常缺乏底层平台内集成的应用商店，而安卓和 iPhone 都具备这一点。然而，近年来，像诺基亚的 Ovi 商店和 GetJar 这样的
    Java ME 应用商店已成为主流并广为人知，因此将你的软件交付给客户不再是一个真正的问题。


    #### 结论


    首先，坏消息是：从技术角度来看，Java ME 并非一个通用的解决方案。例如，我不会用它来编写极其复杂、最先进的 3D 游戏。如果我的应用程序只需要针对最新最好的智能手机，我可能也不会使用它，因为原生应用更适合这种情况。最后，即使我想，我也无法将它用于需要与操作系统进行密切交互的应用程序或编写小部件。


    话虽如此，Java ME 几乎适用于其他所有场景，从商业应用和常规游戏（甚至是 3D 游戏），到那些本质上需要高市场渗透率的应用，例如社交网络客户端和基于
    Web 服务的支持应用（用于文件传输、网络邮件等）。


    当你加入商业因素时，Java ME 就成为了一个非常强大的竞争者：很难反驳它是世界上最流行的移动平台，毕竟有数十亿的设备支持它。


    总的来说，Java ME 仍然是一个相当稳健的平台。尽管多年来它经历了变化和重新定位，但它仍然是构建移动应用的一个有用工具。


    ### 创建一个 Java ME 应用程序


    学习如何创建高质量 Java ME 应用程序的最佳方法就是实际创建一个，因此本书的其余部分将致力于此。我们将从基础开始，例如项目的想法和目标，然后逐步构建一个功能完整的
    Java ME 应用程序。


    由于这是一本技术书籍，我们将主要关注技术方面——其他所有内容只会简要提及。


    **注意：** 现代 Java ME 应用程序通常有数千行或数万行代码，但我们在本书中只会包含说明当前主题所需的最少量代码。完整源代码可在 Apress 网站上获取。

    '
- fmt: '# The Idea for the Application


    Every project starts with an idea. Since this book is a learning tool, our project
    should be something simple, fun, rewarding, and easy to understand, but at the
    same time it should be substantive enough to have the potential of becoming a
    Pro Java ME application.


    Beginner programming books typically start with a “Hello, world” example, but
    we need something a little more complex. So for our project, we''ll write a Java
    ME Twitter client. This makes sense because:


    - **Its complexity is just right**: A Twitter client is sufficiently complex to
    present a challenge and provide enough learning material for our purposes, yet
    simple enough to be presented and discussed within a reasonable number of pages.

    - **It is straightforward**: Twitter provides a clean and simple API for accessing
    its services. Documentation and code examples are also readily available on the
    Internet.

    - **It is fun**: The interactive nature of Twitter makes this a fun project. As
    we write the code, you will be able to easily see it in action at every step along
    the way, and show it to your friends and family for fame and feedback.

    - **It teaches a lot of stuff**: To write a Twitter client, we will deal with
    everything from creating a UI to writing a networking layer and using persistent
    storage to save application settings.

    - **It provides a good starting point for other applications**: Once the Twitter
    client is ready, you can modify it to support other Twitter-like services or even
    instant messaging protocols.


    # Goals, Features, Revenue Sources, and Target Devices


    After settling on a particular idea, the tech and business teams should decide
    together what the project''s goals and desired feature set are. The keyword here
    is “together”; compared to other more powerful mobile platforms, it is much more
    important for Java ME projects that the tech team have a say.


    For example, if one business goal is to include DivX support in the application,
    the tech team should veto this because Java ME simply doesn''t have enough horsepower
    for real-time DivX decoding. On the other hand, if the target is a native Symbian
    application or a native Android one, this goal could be achieved, though with
    difficulty.


    It is also important for the tech team to know how the application is supposed
    to generate revenue, as this can affect the development process, sometimes significantly.
    For example, if the application is designed to generate revenue via integration
    with third-party services, like Amazon, this must be taken into consideration
    when designing the application''s architecture and especially its networking module.


    If, however, the primary source of revenue is direct sales, then the developers
    can include some form of copy protection, such as International Mobile Equipment
    Identity (IMEI) checks, in order to decrease piracy and increase sales. Or, if
    the application generates money indirectly by increasing the company''s exposure
    and showcasing its products, the code must be thoroughly optimized and every ounce
    of performance must be squeezed out, so that users get the best possible experience.


    These points are valid for all mobile platforms, of course, but Java ME projects
    must pay extra attention to them as they do not have the benefit of an integrated
    app store, plentiful (even excessive) resources, and extensive built-in networking
    capabilities like other mobile platforms.


    The tech team also needs to be aware of the project''s budget in terms of money,
    time, and manpower, and should have a definite say in how this budget is expended
    (again, much more so than with other platforms). For example, if the project doesn''t
    have much money but does have enough manpower and time, the UI module could be
    built entirely in-house, as opposed to licensing a third-party library. While
    this decision has wide ramifications and must be given careful thought in the
    case of Java ME projects, it''s usually not even a topic of discussion for Android
    or for the iPhone, as their native UI capabilities are more than sufficient for
    most projects.


    Next, the target devices and features to be included for each device should be
    decided on. Java ME also differs from other mobile platforms in this respect,
    as the gamut of devices is very wide and there''s a huge gap between high-end
    and low-end devices, which means you can''t target all devices, nor can you typically
    include the same feature set on all the devices you target.


    So determining your target devices is a very important step and this should be
    in tune with your business goals. For example, if your application is supposed
    to generate revenue via monthly subscriptions, it makes little sense to target
    low-end phones as their owners are less likely to spend money on subscriptions.
    Instead, you should target higher-end devices: this will allow you to include
    more features and polish, thus making your application more appealing. And since
    higher-end devices are more expensive, it generally follows that their owners
    are more likely to spend money on your service every month—if only because they
    typically have more money to spend.


    Conversely, if your application is designed to make money for you by increasing
    the visibility of your company and your products, then you should target as many
    popular (in terms of units sold) and affordable devices as possible and settle
    on a feature set that works well on all of them, thus ensuring maximum exposure.
    The same is true for applications that rely on one-time sales to generate revenue:
    if you target a wider array of devices, the chances of making a sale increase
    accordingly. You can also decrease the purchase price in order to make your product
    more appealing to potential buyers (you''ll earn less per sale, but you''ll make
    more sales).


    Sometimes the very nature of the application dictates the devices you can target.
    For example, touch-only devices make poor candidates for emulators because of
    their limited input capabilities.


    The media formats an application can use depend on the media support of the target
    devices—and, unlike other mobile platforms, it''s usually not feasible in Java
    ME to add support for non-native media types. This limits the quality and quantity
    of media you can use in your application, from the UI graphics to the sound effects,
    and also affects the build process.


    For example, if all your target devices support SVG graphics and MP3 files, you
    can create a great-looking vector-based UI with your application and accompany
    it with high-quality audio effects, plus you can have a single build for all devices.
    However, if some of your devices do not support these formats, then for those
    devices you must render the vector graphics to bitmap formats like PNG and convert
    the MP3 sounds to WAV or AMR. This not only complicates the build process considerably,
    it also increases the size of the application JAR file, while actually decreasing
    media quality. And that''s not all: some devices don''t support all variations
    of a specific format, so besides choosing the proper media format, the correct
    encoding parameters must also be set. This means that, in the case of Java ME
    projects, the tech team should work closely with the media team to ensure that
    the media resources used are properly crafted and optimized for the target devices.'
