  raw: '#### Serializers and Deserializers


    `RecordWriters` rely on `Serializers` to do the actual converting of in-memory
    primitives to byte arrays that can be written to records. Conversely, `RecordReaders`
    use `Deserializers` to convert byte arrays into in-memory primitives. As with
    readers and writers, a serializer/deserializer pair must be provided for every
    encoding scheme the application will use.


    Since Java ME does not have serialization support built in, we will have to implement
    our own, starting with the `Serializer` interface presented in [Listing 5–4](#Chapter05.html#list_5_4).
    To keep things simple, serializers will always directly return a byte-array representation
    of the primitives they are asked to serialize.


    **Listing 5–4.** *The `Serializer` Interface*


    `package app.module.persistence.classes;`


    `public interface Serializer`

    `{`

    `    public byte[] serializeByte(byte data);`

    `    public byte[] serializeInt(int value);`

    `    public byte[] serializeString(String value);`

    `    public byte[] serializeLong(long value);`

    `    public byte[] serializeBoolean(boolean value);`

    `}`


    The `Deserializer` interface is presented in [Listing 5–5](#Chapter05.html#list_5_5).
    Since deserializers work primarily with the byte arrays that make up records,
    each method in the deserializer will have an offset parameter to indicate where
    in the byte array to start deserializing from. This is done to avoid needless
    memory copying operations from the record byte array to a temporary byte array
    used by the deserializer.


    **Listing 5–5.** *The `Deserializer` Interface*


    `package app.module.persistence.classes;`


    `public interface Deserializer`

    `{`

    `    public byte deserializeByte(byte[] data, int offset);`

    `    public int deserializeInt(byte [] data, int offset);`

    `    public long deserializeLong(byte [] data, int offset);`

    **`public String deserializeString(byte[] data, int offset, int length);`**

    `    public boolean deserializeBoolean(byte[] data, int offset);`

    `}`


    As you can see from the highlighted code, the method for deserializing strings
    differs a bit from the rest, because all other primitive types we use have a fixed
    length, while strings have variable length. As such, an extra parameter must be
    passed to indicate how many bytes should be deserialized into a `String` (this
    also applies to other variable-sized primitive data types, such vectors and images).


    In real-life usage scenarios (within records, for example), the value of this
    extra parameter is encoded along with the string; however, it is *not* part of
    the string encoding itself. For example, the integer 5 can be encoded immediately
    before the string “Hello” to indicate its length. This is not needed for encodings
    that make it easy to determine where a string ends (XML is a good example of this).


    #### Persistence Helpers


    Each helper provides a single specific functionality, usually a high-level one,
    which is widely used within the application. Different applications have different
    helpers, according to their needs. A common role for helpers is providing easier
    record management and simplified serialization of high-level application objects.


    Most helpers are custom-written for a specific application. Because of this, they
    are somehow separated from the main persistence code, in that removing them does
    not break the rest of the persistence module.


    ### Implementing the Core Architecture


    Next, it''s time to look at how to implement serializers and deserializers, record
    readers, record writers, and the global RMS persistence provider, which together
    form the core architecture of the persistence module.


    **NOTE:** This part of the chapter is mostly code. To save space, only the relevant
    bits of code are presented here, with the full source code available on the Apress
    web site.


    #### Implementing Serializers and Deserializers


    We have already decided that we will use a simple `getBytes()`–based encoding
    in our application. As such, our `Serializer` implementation will be named `ByteSerializer`
    and our `Deserializer` implementation will be named `ByteDeserializer`.


    Let''s look at `ByteSerializer` first (you can see it in [Listing 5–6](#Chapter05.html#list_5_6)).


    **Listing 5–6.** *The `ByteSerializer` Model*


    `package app.module.persistence.models;`


    `import app.module.persistence.classes.Serializer;`


    `public class ByteSerializer implements Serializer {`


    `    public byte[] serializeInt(int value)`

    `    {`

    `        byte[] result = new byte[4];`

    **`result[0] = (byte) ( value >> 24 );`**

    **`result[1] = (byte) ( value >> 16 );`**

    **`result[2] = (byte) ( value >> 8 ) ;`**

    **`result[3] = (byte) (value);`**

    `        return result;`

    `    }`


    `    public byte[] serializeLong(long value)`

    `    {`

    `        byte[] result = new byte[8];`

    `        result[0] = (byte) (value >> 56);`

    `        result[1] = (byte) (value >> 48);`

    `        ...`

    `        result[7] = (byte) (value);`

    `        return result;`

    `    }`


    `    public byte[] serializeString(String value)`

    `    {`

    `       return value.getBytes();`

    `    }`


    `    public byte[] serializeByte(byte data)`

    `    {`

    `        return new byte[] { data } ;`

    `    }`


    `    public byte[] serializeBoolean(boolean value) { ... }`


    `}`


    Everything is pretty straightforward here, perhaps with the small exception of
    serializing `integer`s and `long`s. Java ME doesn''t provide a convenient `getBytes()`
    method for these data types like it does for `String`s, so we have to do the conversion
    ourselves. We do this by using bit shifts to extract each individual byte of a
    `long` or an `integer`, and then place these bytes in a `byte` array.


    For example, an `integer` is 32 bits wide, or 4 bytes. Shifting right 24 bits
    (or 3 bytes) and casting the result to a `byte` will give us the leftmost byte
    of the integer, which we then store in `result[0]`. Shifting right 16 bits (or
    2 bytes) and casting to `byte` will give us the second leftmost byte of the integer,
    which we then store in `result[1]`, and so forth, as shown in the highlighted
    portion of the code. The same process is applied to `long`s.


    We can also extract the individual bytes by using a `ByteArrayOutputStream`. This
    is quite easy to do: simply write the `integer` or `long` to a `ByteArrayOutputStream`
    object and then call `toByteArray()` on it. However, using bit shifts is significantly
    faster and has the added advantage of incurring very little overhead.


    The `ByteDeserializer` is up next, shown in [Listing 5–7](#Chapter05.html#list_5_7).
    It does the reverse process: it takes a `byte` array produced by a `ByteSerializer`
    and converts it into the corresponding data type.


    **Listing 5–7.** *The `ByteDeserializer` Model*


    `package app.module.persistence.models;`


    `import app.module.persistence.classes.Deserializer;`


    `public class ByteDeserializer implements Deserializer {`


    `    public byte deserializeByte(byte[] data, int offset)`

    `    {`

    `        return data[offset];`

    `    }`


    `    public int deserializeInt(byte[] data, int offset)`

    `    {`

    **`return ( (data[offset] & 0xFF) << 24 ) | ( (data[offset+1] & 0xFF)`**

    **`<< 16 ) | ( (data[offset+2] & 0xFF) << 8 ) | (data[offset+3] & 0xFF );`**

    `    }`


    `    public long deserializeLong(byte[] data, int offset)`

    `    {`

    **`return ( ( (long) data[offset] & 0xFF) << 56 ) | ( ( (long)`**

    **`data[offset+1] & 0xFF) << 48 ) | ... | ( (long) data[offset+7] & 0xFF );`**

    `    }`


    `    public String deserializeString(byte[] data, int offset, int length)`

    `    {`

    `        return new String(data,offset,length);`

    `    }`


    `    public boolean deserializeBoolean(byte[] data, int offset) { ... }`

    `}`


    As you can see from the highlighted lines, deserializing integers and longs is
    considerably trickier than serializing them, requiring the use of bit masks and
    type castings. Other than that, everything is straightforward here too.'
