  trans: '

    #### 保持独立


    你应当设计代码和架构，使得服务器和客户端都不依赖对方以特定方式运行（例如“你必须这样做，否则我就崩溃”）。要宽容，始终假设某些环节可能出错；并为可能发生的意外准备备用方案。


    例如，永远不要假设服务器会发送有效信息；在使用前尽量检查从服务器接收的数据（如果这样做合理且可行），并通知用户任何异常情况。同时，永远不要假设服务器会响应你的请求，因为网络中断或断电随时可能发生。设置超时机制，这样如果未及时收到服务器响应，用户会被告知此情况，应用程序也能优雅地处理故障。


    为应用程序添加离线模式总是很实用的。你可以使用队列来存储请求，待应用程序重新上线后再将其发送至服务器。


    最后，如果可能，将所有设计都采用异步方式。这能最大程度减少网络延迟和中断的影响，同时提供灵活性。而且，由于应用程序无需等待服务器响应即可继续运行，用户也会感觉操作更流畅。


    ### 总结


    我们已经为 Twitter 客户端实现了网络模块。在此过程中，我们学习了如何正确构建网络模块、需要注意哪些陷阱、如何将异步请求转换为同步请求，以及如何使用缓冲来提高应用程序效率。我们还探讨了与
    Java ME 网络相关的一些最佳实践，并讨论了它们对实际应用的影响。


    接下来，我们将编写持久化模块，并深入了解在 Java ME 应用世界中“持久化存储”的含义。


    ## 第 5 章


    ## **持久化模块**


    顾名思义，持久化模块负责存储和保留数据，以便在稍后的时间点（可能是在不同的应用程序会话中）使用。


    最常见的应用场景是在多个会话间跟踪应用程序参数（例如当前登录的用户、是否启用声音等），但它也可用于其他任务，例如缓存大量数据或长期存储从服务器接收的文件。


    与 Java ME 的其他部分一样，为了真正有用且灵活，持久化模块应具备精心设计的架构，其代码应简洁且易于最终开发者使用。


    在本章中，我们将讨论设计和实现一个优秀持久化模块的最重要方面，并编写我们将用于 Twitter 客户端的实际实现。我们将讨论在 Java ME 持久化方面有哪些选择，并比较它们的优劣；一个优秀持久化模块的组成部分有哪些；如何优雅地实现这些组件等等。我们还将介绍一些持久化技巧，例如如何高效地将整数和长整型等原始数据类型序列化为字节数组，以及如何优雅地将高级应用程序对象序列化为字节数组。


    **注意：** 在撰写本文时，WTK 3.0 模拟器在会话之间不保留 RMS。因此，建议使用 WTK 2.5.2 模拟器来测试 RMS 持久化。当然，该代码在真实设备上运行良好。


    ### 理解 Java ME 持久化选项


    在 Java ME 早期，唯一的持久化选项是使用记录管理系统（RMS）。RMS 最初容量非常有限，因此除了少量设置外，无法存储太多内容。随着时间的推移，情况有了很大改善，在当前的设备上，RMS
    可以为大多数应用程序提供足够的存储空间。


    随着 Java 规范请求（JSR）75 的出现，开发者有了第二个选择：使用设备的文件系统来存储数据。在当时，这意味着可以访问几兆字节的持久化存储，但当前设备支持
    8GB 或 16GB 甚至更大的存储卡，因此你的 Java ME 应用程序基本上可以访问无限的存储空间。然而，有一个问题：由于数据存储在文件系统上，所有应用程序都可以查看、编辑和删除这些数据。因此，虽然你可以使用
    JSR 75 来创建类似于大型缓存或临时交换文件的东西，但不建议用它来存储密码、用户名等私人信息。还应注意，并非所有设备都支持 JSR 75。许多极其廉价的设备，尤其是在发展中国家销售的设备，仅提供非常基础的
    Java ME 实现，而 JSR 75 等可选组件则不可用。


    最后但同样重要的是，近年来，将数据存储在云端的趋势日益增长。这是因为移动互联网接入变得越来越便宜——并且这一趋势仍在继续。因此，将信息远程存储在安全、集中的服务器上（而不是或除了存储在设备本身之外）变得可行。这意味着用户的设置、偏好和关键数据可以比以往任何时候都更安全、更易获取。用户不必担心手机被盗，并且可以在所有设备上获得相同的应用程序体验：只需在新设备上进行身份验证，所有偏好设置就会在几秒钟内下载完成。


    当然，基于云的持久化必须考虑到这样一个事实：并非所有用户都能在其设备上访问互联网（或者可能不愿意允许你的应用程序使用它）。在一些国家，移动互联网接入极其昂贵（几乎高得令人望而却步），因此很少有人使用。在其他国家，尤其是在西方世界，大多数移动套餐默认都包含一些免费流量（根据套餐不同，每月
    10-100 MB 不等），额外流量也相当便宜，因此许多人会允许你的应用程序访问互联网。这种差异意味着，如果你的目标是国际市场，你应该对此进行彻底的研究。


    这是在 Java ME 世界中提供持久化能力的三种主要方法。迄今为止，最广泛使用的持久化方法是基于 RMS 的方法。仅次于基于 RMS 的持久化的是基于云的持久化，许多应用程序（从即时通讯客户端到个人信息管理套件）都在使用。最后，据我所知，很少有应用程序使用基于文件系统的持久化：我能想到的只有少数
    GPS 应用程序和一些大型游戏。有趣的是，一个应用程序可以使用多种持久化方法。例如，数据可以同时保存在 RMS 中（用于快速本地访问）和云端（为了安全以及用户切换到不同设备时使用）。


    那么，如何决定哪种持久化方法最适合你的应用程序呢？


    作为经验法则，只要可能，尽量只使用基于 RMS 的持久化，因为它在速度、存储大小和可用性之间提供了最佳平衡。即使你还会使用其他持久化机制，也始终将 RMS
    持久化作为备份方案来实现。

    '
- fmt: "# 排版后的内容\n\nIf you need to store large amounts of data (for example, a database),\
    \ then filesystem-based persistence is usually the best option, though you should\
    \ be mindful of the security and privacy implications that come with it. Filesystem-based\
    \ persistence is also very useful in a variety of unconventional scenarios. For\
    \ example, some devices support mounting USB flash sticks, HDDs, or even other\
    \ mobile phones as external filesystems. On these devices, you can use filesystem-based\
    \ persistence to create a backup of your application's data, easily transfer settings\
    \ from one device to another, and more.\n\nCloud-based persistence should always\
    \ be optional and should always be limited to storing small amounts of data (preferences,\
    \ passwords, etc.) in order to minimize costs. The only exceptions to this rule\
    \ are applications that are Internet-intensive by their very nature (e.g., Internet\
    \ browsers, streaming clients). In these cases, you can depend on cloud-based\
    \ persistence to store more information (e.g., avatar pictures, text notes), as\
    \ the application will most likely generate a fair amount of traffic regardless\
    \ of what persistence method is used.\n\n## Designing the Persistence Module\n\
    \nDesigning and implementing a good persistence module takes a bit of careful\
    \ thought. The best approach to work with is the top-down one: start with high-level\
    \ abstractions for the RMS, filesystem, or the cloud, and work your way down to\
    \ the bytes that make up your data types.\n\nWhat you usually end up with is a\
    \ three-tier architecture like the one in [Figure 5–1](#Chapter05.html#fig_5_1).\n\
    \n![images](images/0501.jpg)\n\n**Figure 5–1.** *The persistence module architecture*\n\
    \nPersistence providers sit at the top, feeding data in the form of records to\
    \ `RecordReaders` and receiving data (also in the form of records) from `RecordWriters`.\n\
    \n`RecordWriters` and `RecordReaders` are what the rest of the application should\
    \ use to read and write persistent data, either directly or through the use of\
    \ helpers. In order to do their job, `RecordWriters` and `RecordReaders` in turn\
    \ rely on `Serializers` and `Deserializers` to convert in-memory objects into\
    \ stand-alone representations, and vice versa.\n\nThe rest of the module consists\
    \ mostly of helpers that simplify the overall use of the persistence module and\
    \ free developers from writing tedious, repetitive, and error-prone code. Though\
    \ not strictly needed, they are widely used within applications because of the\
    \ benefits they provide—in fact, most persistence-related operations are usually\
    \ done through helpers as opposed to directly using readers, writers, and providers.\n\
    \nIn order to better understand what all of the foregoing means, we need to examine\
    \ in detail the main pieces that make up the persistence module. Let's start with\
    \ persistence providers.\n\n### The Persistence Providers\n\nAs mentioned previously,\
    \ providers sit at the top of the persistence pyramid. They are responsible for\
    \ presenting the rest of the module with the means to store and retrieve raw persistent\
    \ data. The RMS and filesystem are good examples of persistence providers, as\
    \ is the networking layer (for cloud-based persistence, where applicable).\n\n\
    All persistence providers work with records. A record is simply a series of bytes\
    \ (a byte array) identifiable by a unique index number. Persistence providers\
    \ don't care what the data in each record represents or how it should be interpreted,\
    \ or whether it means anything at all or it's just garbage; their job is only\
    \ to retrieve, create, overwrite, and delete records.\n\nTo keep things consistent\
    \ with real-life usage scenarios, each persistence provider must be “opened” before\
    \ use and closed after use. Providers must also provide the means to flush the\
    \ data in their cache (if any) whenever necessary.\n\nWith all the foregoing in\
    \ mind, all persistence providers must implement the interface shown in [Listing\
    \ 5–1](#Chapter05.html#list_5_1).\n\n**Listing 5–1.** *The `PersistenceProvider`\
    \ Interface*\n\n```\npackage app.module.persistence.classes;\n\npublic interface\
    \ PersistenceProvider\n{\n    public byte[] getRecord(int index);\n    public\
    \ int createRecord(byte [] data);\n    public boolean overwriteRecord(int index,\
    \ byte [] data);\n    public boolean deleteRecord(int index);\n    public boolean\
    \ open();\n    public void flush();\n    public void close();\n}\n```\n\nIf you\
    \ look at the `createRecord()` method, you will notice that you cannot directly\
    \ specify the index of the new record. Instead, when the method is called, a new\
    \ record will be created and its corresponding index returned.\n\nThis approach\
    \ provides a greater level of abstraction, but at the same time it does complicate\
    \ keeping track of where your information is (for example, what is the index of\
    \ the record that contains the login credentials used by the current user?). A\
    \ good strategy to overcome this drawback is to have the first record serve as\
    \ a table of contents, keeping track of where each specific piece of information\
    \ is located within the provider—we will see later how this can be done."
  raw: 'If you need to store large amounts of data (for example, a database), then
    filesystem-based persistence is usually the best option, though you should be
    mindful of the security and privacy implications that come with it. Filesystem-based
    persistence is also very useful in a variety of unconventional scenarios. For
    example, some devices support mounting USB flash sticks, HDDs, or even other mobile
    phones as external filesystems. On these devices, you can use filesystem-based
    persistence to create a backup of your application''s data, easily transfer settings
    from one device to another, and more.


    Cloud-based persistence should always be optional and should always be limited
    to storing small amounts of data (preferences, passwords, etc.) in order to minimize
    costs. The only exceptions to this rule are applications that are Internet-intensive
    by their very nature (e.g., Internet browsers, streaming clients). In these cases,
    you can depend on cloud-based persistence to store more information (e.g., avatar
    pictures, text notes), as the application will most likely generate a fair amount
    of traffic regardless of what persistence method is used.


    ### Designingthe Persistence Module


    Designing and implementing a good persistence module takes a bit of careful thought.
    The best approach to work with is the top-down one: start with high-level abstractions
    for the RMS, filesystem, or the cloud, and work your way down to the bytes that
    make up your data types.


    What you usually end up with is a three-tier architecture like the one in [Figure
    5–1](#Chapter05.html#fig_5_1).


    ![images](images/0501.jpg)


    **Figure 5–1.** *The persistence module architecture*


    Persistence providers sit at the top, feeding data in the form of records to `RecordReaders`
    and receiving data (also in the form of records) from `RecordWriters`.


    `RecordWriters` and `RecordReaders` are what the rest of the application should
    use to read and write persistent data, either directly or through the use of helpers.
    In order to do their job, `RecordWriters` and `RecordReaders` in turn rely on
    `Serializers` and `Deserializers` to convert in-memory objects into stand-alone
    representations, and vice versa.


    The rest of the module consists mostly of helpers that simplify the overall use
    of the persistence module and free developers from writing tedious, repetitive,
    and error-prone code. Though not strictly needed, they are widely used within
    applications because of the benefits they provide—in fact, most persistence-related
    operations are usually done through helpers as opposed to directly using readers,
    writers, and providers.


    In order to better understand what all of the foregoing means, we need to examine
    in detail the main pieces that make up the persistence module. Let''s start with
    persistence providers.


    #### The Persistence Providers


    As mentioned previously, providers sit at the top of the persistence pyramid.
    They are responsible for presenting the rest of the module with the means to store
    and retrieve raw persistent data. The RMS and filesystem are good examples of
    persistence providers, as is the networking layer (for cloud-based persistence,
    where applicable).


    All persistence providers work with records. A record is simply a series of bytes
    (a byte array) identifiable by a unique index number. Persistence providers don''t
    care what the data in each record represents or how it should be interpreted,
    or whether it means anything at all or it''s just garbage; their job is only to
    retrieve, create, overwrite, and delete records.


    To keep things consistent with real-life usage scenarios, each persistence provider
    must be “opened” before use and closed after use. Providers must also provide
    the means to flush the data in their cache (if any) whenever necessary.


    With all the foregoing in mind, all persistence providers must implement the interface
    shown in [Listing 5–1](#Chapter05.html#list_5_1).


    **Listing 5–1.** *The `PersistenceProvider` Interface*


    `package app.module.persistence.classes;`


    `public interface PersistenceProvider`

    `{`

    `    public byte[] getRecord(int index);`

    `    public int createRecord(byte [] data);`

    `    public boolean overwriteRecord(int index, byte [] data);`

    `    public boolean deleteRecord(int index);`

    `    public boolean open();`

    `    public void flush();`

    `    public void close();`

    `}`


    If you look at the `createRecord()` method, you will notice that you cannot directly
    specify the index of the new record. Instead, when the method is called, a new
    record will be created and its corresponding index returned.


    This approach provides a greater level of abstraction, but at the same time it
    does complicate keeping track of where your information is (for example, what
    is the index of the record that contains the login credentials used by the current
    user?). A good strategy to overcome this drawback is to have the first record
    serve as a table of contents, keeping track of where each specific piece of information
    is located within the provider—we will see later how this can be done.'
