  trans: '

    #### 广告相关产品


    顾名思义，你的应用程序无法满足用户对手机的所有需求。例如，你的电子邮件客户端应用可以满足用户的邮件需求，但无法满足即时通讯需求。这非但不是坏事，反而是一个常被忽视的巨大机遇。要利用这一点，你只需在应用中添加一个“相关应用”或“推荐应用”页面。在此页面上，你可以推广你的其他应用，最好是那些与用户当前使用的应用互补或相关的应用。如果你自己没有相关或互补的应用，可以推广合作伙伴的应用，并请他们为你的产品做同样的事。如果你没有合作伙伴，那就推广那些你真心认为能满足用户需求的免费软件。


    这是一个双赢的局面。你的用户因此受益，因为他们能了解到其他可能有用的应用。你和你的合作伙伴也受益，因为你们可以直接向终端用户推广其他产品。这对任何 Java
    ME 应用开发者来说都是一个巨大的优势，因为 Java ME 缺乏像苹果 App Store 那样的中央应用来源。没有中央应用来源，推广和宣传你的应用会有些困难，因为你通常需要瞄准多个来源才能达到可接受的用户认知度。因此，能够直接向潜在用户进行推广简直是天赐良机。


    此外，你瞄准的是那些对你的其他产品充满好奇，并主动请求查看它们（通过访问“相关应用”页面）的潜在用户。因此，你的成功几率会比平时高得多。


    为了让事情对用户更具吸引力，你甚至可以在应用中包含一些特别优惠。例如，应用可以生成一个动态优惠券代码，用户可以用它来折扣购买其他应用。


    ### 决定实施哪些细节优化和改进


    正如本章开头所述，除非你只针对高端 Java ME 设备，并且预算末尾有很多个零，否则你无法实施迄今为止提到的所有改进。因此，你将不得不做出一些取舍，优先实施某些功能而牺牲其他功能。本节旨在为实施哪些功能以及舍弃哪些功能提供一个小指南。


    通常，你应该始终从资源友好的改进开始，例如历史记录、简单的视觉反馈和应用内帮助。原因在于，你通常可以在应用的所有构建版本中都包含这些改进，即使是针对低端设备的版本也是如此。更消耗资源的改进，例如自适应文本支持，应该最后实施。


    你应该始终考虑你的应用最能让哪些目标用户受益。例如，如果你的目标市场主要是精通技术的用户，那么在漂亮的视觉反馈和良好的上下文信息之间选择时，应该倾向于后者，因为精通技术的人通常更看重信息而非花哨的视觉效果。然而，如果你的目标是初学者用户，那么漂亮的视觉反馈就更重要。


    有些改进，尤其是高端改进，只有在应用在其他方面都相当完善的情况下才有意义。例如，意图检测不会使一个充满漏洞、不可靠或缺少核心功能的应用受益。总的来说，应用的所有功能（包括细节优化和其他改进）应该具有相同的整体质量水平，并且只有在所有较简单的功能都实现之后，才应该实现更复杂的功能。


    最后，一些改进（例如自适应文本支持）使应用对错误更加“宽容”。如果目标是打造一个极其用户友好的应用，那么这些改进是必须的。它们的实施程度因设备而异，取决于可用资源和处理能力，但它们应该以某种形式存在于你应用的所有版本中。


    ### 本章小结


    在本章中，你了解了可以添加到应用中的最重要的细节优化和用户交互改进。你学习了它们如何改善用户的整体体验，同时提升你和你的产品形象。在下一章中，你将了解 Java
    ME 应用测试。


    ## 第 12 章


    ## **Java ME 应用测试**


    测试你的应用是软件开发过程中的一个重要部分。对于移动开发，尤其是在 Java ME 平台上，对应用进行适当的测试几乎与编写应用本身同等重要，因为你不仅要识别代码中的错误，还要识别与
    JVM 和设备本身相关的各种小故障、不一致性、碎片化问题以及其他问题。


    从宏观角度来看，Java ME 应用测试与桌面平台上的常规应用测试极为相似。事实上，相同的原则、最佳实践和流程在两种情况下都适用，并且假定你对此已熟悉。然而，由于平台的性质，Java
    ME 应用测试带来了一些微妙但重要的差异，以及需要即兴发挥并测试一些在桌面平台上根本不需要测试的方面——例如，底层系统功能的正确运行。


    本章旨在作为 Java ME 应用测试的快速指南，讨论 Java ME 应用测试涉及的内容以及最佳方法。我将介绍最重要的方面，并在适用时解释这些方面在 Java
    ME 上与桌面类平台有何不同。

    '
- fmt: '### Gathering Debug Information


    Gathering debug information is a crucial part of the application testing process.
    By logging various details about the application while it is running, such as
    the execution time of a method call or the state of a given object, you can create
    a fairly good picture of what actually goes on under the hood. You can then use
    this information to complement the test results and the conclusions drawn based
    on them.


    It is my opinion that gathering debug information is more important for Java ME
    applications than it is for desktop applications, because the problems it helps
    fix are more important for Java ME applications than they are for desktop applications.
    For example, even though your application works fine, your code can have memory
    leaks. On a desktop computer with gigabytes of RAM, any small memory leak will
    likely go unnoticed for hours or days, by which time the user will have most likely
    closed the program. On a Java ME device, with its limited memory, such a memory
    leak would cause an `OutOfMemory` exception a lot sooner. A good debug log can
    help you track the issue down and fix it.


    A direct consequence of this is that debug logs for Java ME applications should
    be more thorough than debug logs for desktop applications. There are a lot of
    things that you would not always track for a desktop application but that you
    should always track for a Java ME application: instance counts, execution times
    of critical native method calls, used/free memory, performance metrics, and so
    on. The reason for logging so much information is simple: Java ME is considerably
    more unpredictable than a desktop platform, so problems can and do occur out of
    the blue. Moreover, sometimes they manifest themselves only sparingly and are
    extremely difficult to reproduce. When this happens, you’ll be glad you have a
    complete debug log to help you out.


    Let’s take closer a look at the list of things you should track, mentioned in
    the previous paragraph. One item that stands out is tracking the execution times
    of native method calls. Why is that on the list? Simple: Tracking the execution
    times of native method calls tends to uncover platform-related bugs, and it gives
    you more insight into the way the platform works under the hood. For example,
    let’s assume that similar `System.arraycopy()` calls usually take the same amount
    of time to complete, but sometimes they take considerably more. When that happens,
    there are two things that might be going on behind the scenes: either the JVM
    relocates objects in memory (compacting them) *or* there is some kind of glitch
    in the JVM’s implementation.


    Of course, this measurement alone is inconclusive, but when you combine it with
    information gathered from other measurements, you can get a pretty good idea about
    what actually happens. You can then use this knowledge to your advantage: if compacting
    happens, you can try to create objects in pools and arrays in larger sizes; whereas
    if there’s a glitch going on, you can try to avoid using `arraycopy()` as much
    as possible. Either way, you’ll end up with a better and smoother-running application
    for your efforts.


    Probably one of the most important things you should keep track of in a Java ME
    application are network connections. At the very minimum, you should log when
    they are created, why they are created, and when they are actually closed. Among
    other things, this helps in dealing with a relatively frequent problem for Java
    ME applications: going over the device’s maximum permitted number of simultaneous
    connections. In Java ME this can happen even when there are no “connection leaks”
    in the code. For example, some devices do not close a network connection immediately
    when they are requested to do so, which means that if a new connection is created
    too soon, you will go overboard. A good debug log can help you determine if this
    is the case by checking (via timestamps) whether the connections are closed immediately
    or after some delay.


    You should also keep track, as much as possible, of the device’s state. This includes
    device orientation, connectivity capabilities in use, other running applications,
    battery life, and so on. This information is invaluable in reproducing bugs that
    occur only in some situations (for example, only when the device is in landscape
    mode or when battery life is low).


    One Java ME–specific thing that you should log are screen and component repaints.
    This is not typically needed with desktop applications, or even with smartphone
    platforms, because the native UI framework handles repaints automatically. However,
    Java ME applications tend to suffer from refresh issues (flickering, not redrawing
    the screen properly) because their UIs are created based on third-party frameworks,
    which in turn use low-level and device-specific drawing calls. As such, when a
    refresh bug happens, knowing when a repaint was issued, and why and when it was
    actually executed, helps a lot in tracking down the root cause of the bug.


    For example, when you get corrupted screens when the device changes orientation,
    knowing when the last repaint was requested (before/after orientation change)
    and when it was actually executed can tell you whether the corruption happened
    because of bad framework code (requested before, executed after—so the refresh
    should have taken into consideration the new orientation) or because of a glitch
    in the device (requested before, executed before—the framework did not get notified
    in time that the orientation has changed).


    Finally, it should be noted that gathering debug data can add significant overhead
    and resource strain on Java ME devices, which in turn can lead to poor performance
    (2×–5× performance hits are common). To avoid this, you should always have a dedicated
    build for gathering debug data, separate from any other builds. Next, you should
    always keep data gathering to a minimum. You can do this by gathering data less
    often, for example every 3 seconds instead of every second.


    You can also consider focusing on only a few relevant aspects at a time instead
    of generating a full debug log; this is quite OK when you are investigating a
    specific problem. All good porting frameworks have some sort of debugging support
    built in, so these measures should be easy to put into practice.


    ### Performing Unit Testing


    Unit testing is a great tool for testing the functional aspects of your application
    (the inner workings) and ensuring that new changes do not break existing functionality.
    The basic idea is that, for each Java class and functional subsystem of your application,
    you write one or more functional tests, and after each test you compare the output
    of the test with a previously calculated and known-to-be-correct output. If the
    outputs match, the test has passed. If they do not, the test has failed, typically
    indicating that there is a problem with your application code.


    Just like J2SE has JUnit for creating and running unit tests, Java ME has tools
    such as JMUnit (which is even bundled with NetBeans) and J2MEUnit. Anyone familiar
    with JUnit should feel right at home with these. As such, the following sections
    focus more on the Java ME–specific aspects of unit testing.'
