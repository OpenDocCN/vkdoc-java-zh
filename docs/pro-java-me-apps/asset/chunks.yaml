    ##### 时间线主页


    我们将通过 `TimelineHome` 类从 Twitter 的主时间线中检索推文，该类基于 Twitter API ME 的时间线功能。


    Twitter API ME 的时间线功能是异步的。每次从时间线检索推文的请求都在单独的线程中运行，并附加了一个监听器。当收到与时间线对应的新推文、搜索完成或由于某种原因失败时，该监听器会异步收到通知。


    为简单起见，在我们的案例中，`TimelineHome` 将同时充当请求发起者和请求监听者，这样我们就可以在同一个类实例中处理传入的推文。因此，`TimelineHome`
    的声明如代码清单 4-11 所示。


    **代码清单 4-11.** *`TimelineHome` 声明*


    `public class TimelineHome implements Timeline, SearchDeviceListener`

    `{`

    `...`

    `}`


    异步检索通常是一件好事；然而，在我们对 `Timeline` 接口的规范中，检索推文是一个同步操作：`goForward()` 和 `goBack()` 在每次调用时必须返回下一个对应的推文或
    `null`。


    对于使用外部服务的 Java ME 应用程序来说，使异步操作同步工作是一项相当常见的任务，因为某些服务在设计上至少是部分异步的。最简单的解决方案（通常也是最有效的）依赖于缓冲区和
    Java 的 `wait()` 和 `notify()` 方法。其工作原理如下。


    首先，在您希望以同步方式工作的方法或类中，创建一个对象作为监视器——我们称这个对象为 `lock`。然后，在您发出异步请求后，立即调用 `lock.wait()`
    来暂停线程。


    接下来，当另一个线程（即运行请求的线程）或已注册的监听器收到响应时，将响应存储在缓冲区中，并调用 `lock.notify()`。这会唤醒初始线程，然后该线程就可以自由处理现在位于缓冲区中的结果了。


    此过程的伪代码版本如代码清单 4-12 所示。请注意，这个想法有许多可能的变体——例如，缓冲区可以作为参数传递，锁可以用信号量替换，等等。


    **代码清单 4-12.** *将异步请求转换为同步请求*


    `lock = new Object();`

    `buffer = new Buffer();`


    `// 在发起者线程中（该线程是同步的）`

    `public Object getNext()`

    `{`

    `   issueAsyncRequest();`

    `   lock.wait();`

    `   result = processBuffer (buffer);`

    `   return result;`

    `}`


    `// 在请求线程或事件监听器中`

    `void dataReceived(data)`

    `{`

    `  buffer = processData(data);`

    `  lock.notify();`

    `}`


    看到上面的伪代码，您可能会认为这个想法很容易实现，但在实践中，事情很少如此简单。以下是您在实现此概念时在现实生活中可能遇到的常见问题列表——在编写代码时请注意它们。


    首先，您必须确保缓冲区对象得到妥善处理，并且在它被处理或显式丢弃之前，不会被其他请求或方法调用覆盖。根据所使用的架构和应用程序的要求，这有时可能非常困难。其次，您必须确保整个过程是线程安全的，以便从多个线程调用
    `getNext()` 能按预期工作。第三，在某些情况下可能涉及多个缓冲区对象——注意不要误用了错误的缓冲区。第四，您必须确保最终不会导致整个应用程序或一个重要线程死锁。


