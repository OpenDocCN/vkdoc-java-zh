  raw: 'You can see that both the file-based and array-based methods eventually rely
    on `loadFromDataInputStream()` to do the work. You can also see that all methods
    are static. This decision was made so that the `Locale` class can be easily used
    from anywhere in the application, the importance of which will become even clearer
    once we actually start to use the localization functionality.


    As for reading the localization data, the highlighted lines are where the magic
    happens. All we need to do is read key/value pairs in sequence until an `EOFException`
    is thrown (in which case the reading was successful) or an `IOException` is thrown
    (in which case something went wrong). The mechanism is simple and reliable on
    the Java ME side, because the original localization files were processed and verified
    on the J2SE side. In fact, any checks or validations should be done exclusively
    on the J2SE side of things.


    Now that the core loading functionality is there, let''s add some helper methods.
    We''re interested in getting the device''s current locale, in finding the appropriate
    localization file within the JAR file based solely on a locale''s name, and in
    figuring out what localization file to load based on the user''s preferred locale,
    the phone''s locale, and the default locale. All these are covered by the code
    in [Listing 7–8](#Chapter07.html#list_7_8).


    **Listing 7–8.** *Helper Methods for the Localization Module*


    `public static String getDeviceLocale()`

    `{`

    `        return System.getProperty("microedition.locale");`

    `}`


    `public static String getLocaleFile(String locale)`

    `{`

    `        if ( locale == null )`

    `        {`

    `                return getLocaleFile(getDeviceLocale());`

    `        }`

    `        return "/app/files/L10n/" + locale + ".bin";`

    `}`


    `public static boolean loadFromFileBasedOnPreferences(String specifiedUserLocale,`

    `String defaultLocale)`

    `{`

    `        // Try to load, in order, the specified user locale, the default locale,`

    `        // and the device locale`

    `        if ( loadFromInternalFile( getLocaleFile(specifiedUserLocale) ) ||`

    `                 loadFromInternalFile( getLocaleFile(getDeviceLocale() ) ) ||`

    `                 loadFromInternalFile( getLocaleFile(defaultLocale) ) )`

    `        {`

    `                return true;`

    `        }`


    `        // Everything has failed`

    `        return false;`

    `}`


    All of these are convenience methods at this point, as their underlying functionality
    is really, really simple. The main point of having them in the first place is
    long-term flexibility. For example, the resolution of locale name to file name
    in `getLocaleFile()` is extremely simple right now, but in the long run it might
    be changed to something more complex—for example, if the requested locale is en-UK,
    but that''s not available, whereas en-US is, then use en-US instead.


    Finally, it''s time to write the methods that actually do most of the work: retrieving
    translation values for keys, both general and parameter-specific. Their code is
    presented in [Listing 7–9](#Chapter07.html#list_7_9).


    **Listing 7–9.** *Retrieving Values for Translation Keys*


    `public static String get(String key)`

    `{`

    `        return (String) keyValuePairs.get(key);`

    `}`


    `public static String get(String key, int value)`

    `{`

    `        return get(key, String.valueOf(value) );`

    `}`


    `public static String get(String key, String parameter)`

    `{`

    `    // Try to read the parameter-specific key first`

    `    String originalStr = get(key + ":" + parameter);`


    `    // If no parameter-specific key exists then try to read the generic key`

    `    if ( originalStr == null )`

    `    {`

    `        originalStr = get(key);`

    `    }`


    `    // No key found at all, return null`

    `    if ( originalStr == null )`

    `    {`

    `        return null;`

    `    }`


    `    // See if a parameter placeholder exists`

    `    int placeholderPosition = originalStr.indexOf("{@}");`


    `    // There is no parameter placeholder, return the value as-is`

    `    if ( placeholderPosition == -1 )`

    `    {`

    `        return originalStr;`

    `    }`


    `    // Replace the parameter placeholder with the parameter value`

    `    // and return the resulting string`

    `    return originalStr.substring(0, placeholderPosition) + parameter +`

    `                originalStr.substring(placeholderPosition+3);`

    `}`


    That''s it! Our localization module is now ready for use. Let''s take it for a
    test run.


    ### Testing the Localization Module


    To test the localization module, the first thing we need to do is create an input
    localization file. There are two examples at the beginning of this chapter, [Listings
    7–2](#Chapter07.html#list_7_2) and [7–3](#Chapter07.html#list_7_3), so we''ll
    concatenate both of them into a single file and save that file to `C:\test\en-US.txt`.


    After that, we''ll need to process the localization file with our J2SE utility,
    like so:


    `java –jar TranslationFileConverter.jar C:\test\en-US.txt C:\test\en-US.bin`


    The next step is to move the resulting `en-US.bin` file to the appropriate location
    in the project folder, which is the sub-folder corresponding to the `app.files.L10n`
    package. Once this is done, we can use the localization module in our application,
    similar to the way shown in [Listing 7–10](#Chapter07.html#list_7_10).


    **Listing 7–10.** *Testing the Localization Module*


    `package test;`


    `...`


    `public class TestMidlet extends MIDlet`

    `{`

    `        ...`


    `    public void startApp()`

    `    {`

    `        // No user-preferred locale, default locale of en-US.`

    `        // Localization module will try to use the phone''s current`

    `        // locale, if available, and if not it will default to en-US.`

    `        Locale.loadFromFileBasedOnPreferences(null, "en-US");`


    `        // Two parameter-specific localization strings`

    `        System.out.println ( Locale.get("new.email",0) );`

    `        System.out.println ( Locale.get("new.email",1) );`


    `        // A generic localization string`

    `        System.out.println ( Locale.get("new.email",9999) );`


    `        // Parameters can also be strings`

    `        System.out.println ( Locale.get("new.email","a couple of") );`

    `    }`

    `}`


    The console output will look like this:


    `No new emails`

    `One new email`

    `You have 9999 new emails.`

    `You have a couple of new emails.`


    As you can see, our localization module is compact, flexible, and easy to use.'
  trans: '

    可以看到，基于文件和基于数组的方法最终都依赖于 `loadFromDataInputStream()` 来完成实际工作。同时也能发现所有方法都是静态的。这样设计是为了让
    `Locale` 类能够在应用程序的任何位置轻松使用，当我们真正开始使用本地化功能时，其重要性会变得更加明显。


    至于读取本地化数据，高亮显示的行就是关键所在。我们只需按顺序读取键/值对，直到抛出 `EOFException`（表示读取成功）或 `IOException`（表示出现错误）。这种机制在
    Java ME 端简单可靠，因为原始本地化文件已经在 J2SE 端处理并验证过了。事实上，任何检查或验证都应当只在 J2SE 端完成。


    核心加载功能已经就绪，现在让我们添加一些辅助方法。我们需要获取设备的当前区域设置，仅根据区域名称在 JAR 文件中找到对应的本地化文件，以及根据用户偏好的区域设置、手机的区域设置和默认区域设置来确定要加载哪个本地化文件。所有这些功能都由清单
    7–8 中的代码实现。


    **清单 7–8.** *本地化模块的辅助方法*


    `public static String getDeviceLocale()`

    `{`

    `        return System.getProperty("microedition.locale");`

    `}`


    `public static String getLocaleFile(String locale)`

    `{`

    `        if ( locale == null )`

    `        {`

    `                return getLocaleFile(getDeviceLocale());`

    `        }`

    `        return "/app/files/L10n/" + locale + ".bin";`

    `}`


    `public static boolean loadFromFileBasedOnPreferences(String specifiedUserLocale,`

    `String defaultLocale)`

    `{`

    `        // 按顺序尝试加载：指定的用户区域设置、默认区域设置和设备区域设置`

    `        if ( loadFromInternalFile( getLocaleFile(specifiedUserLocale) ) ||`

    `                 loadFromInternalFile( getLocaleFile(getDeviceLocale() ) ) ||`

    `                 loadFromInternalFile( getLocaleFile(defaultLocale) ) )`

    `        {`

    `                return true;`

    `        }`


    `        // 所有尝试均失败`

    `        return false;`

    `}`


    目前这些方法都是便捷方法，因为它们底层功能非常简单。引入它们的主要目的是为了长期的灵活性。例如，`getLocaleFile()` 方法中将区域名称解析为文件名的逻辑目前极其简单，但长远来看可能会改为更复杂的逻辑——比如，如果请求的区域是
    en-UK，但该文件不可用，而 en-US 可用，则改用 en-US。


    最后，我们来编写实际承担主要工作的方法：获取通用键和特定参数键的翻译值。其代码如清单 7–9 所示。


    **清单 7–9.** *获取翻译键的值*


    `public static String get(String key)`

    `{`

    `        return (String) keyValuePairs.get(key);`

    `}`


    `public static String get(String key, int value)`

    `{`

    `        return get(key, String.valueOf(value) );`

    `}`


    `public static String get(String key, String parameter)`

    `{`

    `    // 首先尝试读取特定参数的键`

    `    String originalStr = get(key + ":" + parameter);`


    `    // 如果不存在特定参数的键，则尝试读取通用键`

    `    if ( originalStr == null )`

    `    {`

    `        originalStr = get(key);`

    `    }`


    `    // 完全未找到键，返回 null`

    `    if ( originalStr == null )`

    `    {`

    `        return null;`

    `    }`


    `    // 检查是否存在参数占位符`

    `    int placeholderPosition = originalStr.indexOf("{@}");`


    `    // 没有参数占位符，直接返回值`

    `    if ( placeholderPosition == -1 )`

    `    {`

    `        return originalStr;`

    `    }`


    `    // 将参数占位符替换为参数值并返回结果字符串`

    `    return originalStr.substring(0, placeholderPosition) + parameter +`

    `                originalStr.substring(placeholderPosition+3);`

    `}`


    就是这样！我们的本地化模块现在可以投入使用了。让我们来测试一下。


    ### 测试本地化模块


    要测试本地化模块，首先需要创建一个输入本地化文件。本章开头有两个示例，即清单 7–2 和清单 7–3，我们将它们合并成一个文件，并保存为 `C:\test\en-US.txt`。


    之后，我们需要使用 J2SE 工具处理该本地化文件，命令如下：


    `java –jar TranslationFileConverter.jar C:\test\en-US.txt C:\test\en-US.bin`


    下一步是将生成的 `en-US.bin` 文件移动到项目文件夹中对应的位置，即与 `app.files.L10n` 包对应的子文件夹。完成此操作后，我们就可以在应用程序中使用本地化模块了，使用方法如清单
    7–10 所示。


    **清单 7–10.** *测试本地化模块*


    `package test;`


    `...`


    `public class TestMidlet extends MIDlet`

    `{`

    `        ...`


    `    public void startApp()`

    `    {`

    `        // 没有用户偏好的区域设置，默认区域设置为 en-US。`

    `        // 本地化模块将尝试使用手机当前的区域设置（如果可用），`

    `        // 如果不可用，则默认使用 en-US。`

    `        Locale.loadFromFileBasedOnPreferences(null, "en-US");`


    `        // 两个特定参数的本地化字符串`

    `        System.out.println ( Locale.get("new.email",0) );`

    `        System.out.println ( Locale.get("new.email",1) );`


    `        // 一个通用的本地化字符串`

    `        System.out.println ( Locale.get("new.email",9999) );`


    `        // 参数也可以是字符串`

    `        System.out.println ( Locale.get("new.email","a couple of") );`

    `    }`

    `}`


    控制台输出将如下所示：


    `No new emails`

    `One new email`

    `You have 9999 new emails.`

    `You have a couple of new emails.`


    如您所见，我们的本地化模块紧凑、灵活且易于使用。

