- fmt: "### Providing Login Support\n\nAfter a `ServerImplementation` instance has\
    \ been initialized, the most basic operation it can perform is to log in a user.\n\
    \nGiven the fact that we have to support both username-and-password authentication\
    \ and single-access tokens in a congruent manner, our login requirements are as\
    \ follows: first, the application should try to log in by using a username and\
    \ password combination. If this combination cannot be provided or is not valid,\
    \ the application should use single-access tokens instead. If the tokens aren't\
    \ provided or are invalid, the application will consider that the authentication\
    \ process has failed.\n\nIf you recall from the previous chapter, we will use\
    \ the `UserCredentials` data type for providing authentication information. `UserCredentials`\
    \ has support for both username-and-password authentication and single-access\
    \ token authentication in the same data structure. This somewhat goes against\
    \ the intuitive approach of using separate data types for each means of authentication—for\
    \ example, `UsernamePasswordCredentials` and `TokenCredentials`.\n\nThe reason\
    \ the two are merged in a single data type is a simple one: by doing so, we can\
    \ let the specialized `ServerImplementation` decide on its own which login method\
    \ is best suited for any particular situation.\n\nThe importance of this is best\
    \ exemplified by the following scenario (adapted from a real-life project): application\
    \ X is required to authenticate the user by using his or her username and password\
    \ if the connection to the server is made via HTTPS over the cellular network,\
    \ or by using tokens or other encrypted credentials if the connection is made\
    \ via WiFi and/or HTTP.\n\nIn this example, consider what happens if we do not\
    \ provide all available credentials to the networking module in one data structure:\
    \ it becomes the responsibility of other parts of the application to decide which\
    \ specific credentials to provide. As per the requirements, this involves checking\
    \ what types of connections are available, whether they are secure, etc. Since\
    \ all of these tasks are logically part of the networking module but we do them\
    \ somewhere else, we basically create “bleeding” from the networking module to\
    \ other modules of the application—something we really want to avoid.\n\nHowever,\
    \ if we provide all available credentials in one go and say, “Take your pick,”\
    \ then the networking module can decide on its own which credentials to use, doing\
    \ all the necessary checks internally—and in a more or less centralized fashion.\
    \ This not only removes any potential “bleeding,” but also helps preserve the\
    \ code's structure and readability, the application's logic, and the developer's\
    \ sanity (it is very frustrating and time-consuming to go hunting throughout the\
    \ entire application for “that one line that does that one check”).\n\nThis advice\
    \ applies not only to the networking module—it is general advice. Especially with\
    \ high-level operations, it is a good idea to provide all the information you\
    \ have and let the specialized modules of the application decide internally what\
    \ information to use and what information to discard.\n\nWe now go back to our\
    \ Twitter client. Apart from the actual authentication code, there is one more\
    \ thing that is needed for the login process to be properly implemented: events.\n\
    \nFor one thing, we want to be able to trigger a login by using events. For this,\
    \ we will implement support for a `BEGIN_LOGIN` event. We also need to generate\
    \ events for when the login fails or succeeds, which is what `LOGIN_FAILED` and\
    \ `LOGIN_SUCCEEDED` will do. In order to implement these events, we must first\
    \ define them. Make sure that your `EVT` looks something like the one in [Listing\
    \ 4–4](#Chapter04.html#list_4_4).\n\n**Listing 4–4.** *Login Events Defined*\n\
    \n```java\npublic class EVT\n{\n    public class CONTEXT\n    {\n...\n       \
    \ public static final int NETWORKING_MODULE = 4;\n    }\n\n    ...\n\n    public\
    \ class NETWORK\n    {\n        public static final int BEGIN_LOGIN=30001;\n \
    \       public static final int LOGIN_FAILED=30002;\n        public static final\
    \ int LOGIN_SUCCEEDED=30003;\n    }\n\n}\n```\n\nIt's now time for the actual\
    \ implementation. First, the main `login()` method of `ServerImplementation` is\
    \ shown in [Listing 4–5](#Chapter04.html#list_4_5).\n\n**Listing 4–5.** *The `login()`\
    \ Method*\n\n```java\npublic boolean login(UserCredentials credentials)\n{\n \
    \       boolean success = false ;\n\n        // First, try to log in using username\
    \ and password\n        if ( credentials.getUsername()!= null && credentials.getPassword()!=\
    \ null )\n        {\n                success = loginUsingUnPw(credentials.getUsername(),\n\
    \                credentials.getPassword() );\n        }\n        // If that fails,\
    \ try using tokens\n        if ( success == false )\n        {\n\n           \
    \     if ( credentials.getAccessToken() != null &&\n                credentials.getAccessTokenSecret()\
    \ != null )\n                {\n                        success = loginUsingTokens(credentials.getAccessToken(),\n\
    \                        credentials.getAccessTokenSecret() );\n             \
    \   }\n        }\n\n        // Generate the appropriate event\n        if ( success\
    \ )\n        {\n                Event evt = new Event ( EVT.CONTEXT.NETWORKING_MODULE,\n\
    \                EVT.NETWORK.LOGIN_SUCCEEDED, credentials);\n                eventController.queueEvent(evt);\n\
    \        }\n        else\n        {\n                Event evt = new Event ( EVT.CONTEXT.NETWORKING_MODULE,\n\
    \                EVT.NETWORK.LOGIN_FAILED, credentials);\n                eventController.queueEvent(evt);\n\
    \        }\n\n        return success;\n}\n```\n\nNext it is time to implement\
    \ the actual login methods, `loginUsingUnPw()` and `loginUsingTokens()`. Both\
    \ methods are presented in [Listing 4–6](#Chapter04.html#list_4_6). These are\
    \ separated from the main `login()` method not only because this improves readability\
    \ but also because, in the event of switching libraries, you can leave the main\
    \ login logic untouched and just change the actual implementations.\n\n**Listing\
    \ 4–6.** *Methods `loginUsingUnPw()` and `loginUsingTokens()`*\n\n```java\nprotected\
    \ UserAccountManager accountManager = null ;\n\nprotected boolean loginUsingUnPw(String\
    \ username, String password)\n{\nCredential c = new Credential(username, password,\
    \ this.consumerKey,\nthis.consumerSecret);\n        UserAccountManager m = UserAccountManager.getInstance(c);\n\
    \        try\n        {\n                if ( m.verifyCredential() )\n       \
    \         {\n                        accountManager = m;\n                   \
    \     return true;\n                }\n                else\n                {\n\
    \                        return false;\n                }\n        }\n       \
    \ catch (Exception ex)\n        {\n                // Error handling goes here\n\
    \                return false;\n        }\n}\n\nprotected boolean loginUsingTokens(String\
    \ token, String tokenSecret)\n{\n        Token authToken = new Token(token,tokenSecret);\n\
    \        Credential c = new Credential(\"ignored\", this.consumerKey,\n      \
    \  this.consumerSecret,authToken);\n        UserAccountManager m = UserAccountManager.getInstance(c);\n\
    \        try\n        {\n                if ( m.verifyCredential() )\n       \
    \         {\n                        accountManager = m;\n                   \
    \     return true;\n                }\n                else\n                {\n\
    \                        return false;\n                }\n        }\n       \
    \ catch (Exception ex)\n        {\n                // Error handling goes here\n\
    \                return false;\n        }\n}\n```"
