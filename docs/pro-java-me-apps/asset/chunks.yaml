    #### 添加合适的应用内帮助


    对于 Java ME 应用程序而言，*帮助*传统上意味着主菜单中可访问的一种形式，其中包含一些操作说明。这种简朴的做法在早期是必要的，并且也符合当时简单的
    Java ME 应用程序。不幸的是，尽管现在的应用程序已经复杂得多，硬件也强大得多，这种做法却依然延续。因此，添加合适的应用内帮助是一个能让你在竞争中脱颖而出的精妙之举。


    一个良好的应用内帮助系统最重要的组成部分是一套全面的帮助页面。应用程序中的每个屏幕都应该有一个专用的帮助页面与之关联，操作应用程序所需的每个概念也应如此。从每个帮助页面，你应该能够导航到其他相关页面。


    在专用于屏幕表单的每个帮助页面上，应讨论相应表单的每个控件（如果解释较长，则放在单独的页面上；否则用几句话说明），同时也要说明整个表单的工作方式。每个帮助页面都应能从相应表单的菜单中访问。此外，你还应该有一些“教程”或“入门”页面，以方便新用户或缺乏经验的用户。


    为了让用户操作更简单，你可以在应用程序中实现上下文帮助。最简单的做法是，在表单的菜单或小部件的上下文菜单中提供一个额外的“上下文帮助”选项。当选择此选项时，用户将获得关于该特定控件的信息（这很容易实现，例如，通过打开表单的主帮助页面并滚动到专门讨论该小部件的部分）。


    进一步扩展这个想法，上下文帮助可以根据当前的使用场景进行定制。例如，像“向选中的联系人发送消息”这样的帮助文本可以改写为“向选中的联系人（伊莎贝尔）发送消息”，其中*伊莎贝尔*是当前选中联系人的名字。这涉及到帮助系统与应用程序其他部分的更深层次集成，但对用户来说更有用，因为解释是在上下文中给出的，因此更容易理解。


    此外，还有“边做边学”的概念。这已经通过前面提到的教程和“入门”指南涵盖了，但我们还可以进一步深化这个概念。引导用户使用应用程序（从而边做边学）的一个有效方法是使用视觉指示器。例如，假设你有一个登录表单，包含“用户名”字段、“密码”字段和一个“登录”按钮。用户需要首先关注屏幕上的项目是“用户名”字段，因此它旁边应该出现一个内含“1”的气泡。当用户访问此字段并输入一些文本后，“1”气泡会消失，然后“密码”字段旁边会出现一个内含“2”的气泡。当用户名和密码都输入完毕后，“登录”按钮旁边会出现一个“3”气泡。


    这种机制对初学者来说简单直观，但更高级的用户可能会觉得烦人甚至冒犯。因此，最好默认关闭此选项，并询问用户是否想使用它，或者更好的做法是，将此机制的使用限制在教程中。


    应用内帮助的重要性因你编写的应用程序类型和目标市场而异。例如，如果你正在编写一个本质上就很高级的应用程序（例如，一个 FTP 客户端），那么几个帮助页面就足够了。然而，如果你正在为学龄儿童编写教育类应用程序，则应尽可能多地添加帮助。


    如果可能的话，在帮助页面中包含多媒体内容总是一个好主意。例如，如果你的应用程序有一个帮助页面解释“当文件传输进行时，文件传输图标将出现在屏幕的右上角”，你可以通过在帮助页面中包含该图标本身来补充这一解释。这在资源或
    JAR 大小方面不会花费太多，因为你的 JAR 文件中已经包含了该图标。


    此外，虽然有点牵强，但也可以考虑包含解释你的应用程序所涉及的概念和原理的多媒体内容。例如，如果你正在开发一个点对点文件传输客户端，可以考虑包含一两张详细说明点对点工作原理的图片。这绝不是必需的，这样做会增加你的
    JAR 文件大小。然而，这确实能表明你对应用程序倾注了大量心血——用户会欣赏这一点。

    '
- fmt: '#### Adding Contextual Information


    Contextual information is somewhat related to in-application assistance, in that
    as much helpful information as possible is presented to users so they may have
    a more informed interaction and thus a better user experience. Many times this
    information is not critical; rather, it is simply “nice to have” and shows that
    you pay attention to even the smallest of details.


    For example, if you are writing a file manager application, the information box
    for the currently selected file will probably contain details such as file size,
    creation date, and permissions. These are generic pieces of information that apply
    to any file in the file system; they are not context specific. However, based
    on the file extension, you can detect whether the currently selected file is,
    say, an MP3 song. If this is the case, you could also display ID3 tag information
    about the file, or its duration and bitrate along with the previously mentioned
    generic information. This is a fine touch that most savvy users will appreciate.


    Contextual information can be useful in other scenarios as well. When selecting
    multiple contacts in a PIM application, you could also display what details those
    contacts have in common—for example, that they share the same birthday or the
    same location. In a spreadsheet application, you could display how many cells
    are referenced by the current formula, or how many estimated operations are required
    to recalculate it. In a chat client, you could display a status history for the
    currently selected contact or an overview of your conversation with that person
    (how many messages have been exchanged, the average number of messages exchanged
    per hour, and so on). The list can go on.


    Contextual information can be displayed either on request or automatically. Because
    we are in the realm of fine touches, we will concern ourselves with only contextual
    information that is displayed automatically. As such, we are naturally interested
    in two things: when to display it and how to display it.


    The two go together. If there is a dedicated onscreen area for displaying contextual
    information, such as a ticker, you can display the contextual information as soon
    as the context changes. If there is no dedicated onscreen area for this, you can
    use the simple concept of delayed tooltips for this purpose. These tooltips appear
    on top of the current screen content if the application has been idle for a number
    of seconds—for example, when the user selects a different file and then does not
    touch the phone for 3–4 seconds. Delayed tooltips are also a good choice if extracting
    the contextual information is a more CPU-intensive operation, in which case the
    delay serves to minimize the performance impact of extracting the contextual information,
    which might be significant in the case of Java ME.


    **TIP:** Contextual information doesn''t have to be all text. For example, it
    can be a thumbnail, a color swatch, a graph, and so on. Use whatever makes more
    sense in the given scenario.


    Furthermore, you can make contextual information interactive. For example, a tooltip
    displaying a file''s size in a file manager application can be used to jump to
    the details properties page for the file in question. This kind of interactivity
    can make your contextual information display very powerful, and it also tends
    to maximize screen real-estate use: while a static tooltip just eats up screen
    space, an interactive one provides functionality to the user.


    #### Adding Proper Feedback


    To help the user feel in control, user actions (no matter how small) should always
    be accompanied by feedback from the application. This feedback should be visible,
    immediate, and nonintrusive. If possible, it should also be *smooth*. For example,
    when navigating from one option to another in the application''s menu, the background
    of the old option can gradually fade out, while at the same time the background
    of the new option can gradually fade in. This transition should be done fairly
    quickly, in less than 1 second, so as not to be intrusive.


    Besides being aesthetically pleasing, there are practical advantages to this approach
    as well. The user''s attention is drawn to the newly selected menu option, which
    serves as a helpful guideline for people with impaired vision and/or for people
    who are less tech-savvy (people who do not have a lot of hands-on experience with
    mobile phones). This is especially important if you plan to market your Java ME
    application to developing countries.


    The application should also give the user feedback during lengthy operations,
    such as transferring files or processing large amounts of data. At the very least,
    a small hourglass icon should be displayed on the screen whenever such an operation
    is in progress. To further stress that a lengthy operation is in progress, the
    hourglass icon can also be animated if resources permit this. Finally, if you
    can do so, consider displaying a progress bar and an estimate indicating how long
    will it take for the operation to complete.


    Transitioning between forms should also be accompanied by some kind of visual
    feedback if possible, although this is mostly an aesthetic touch. Transitions
    should be quick and simple, such as the “Wipe” or “Push” transitions in PowerPoint.


    There are also other kinds of feedback you can use, besides visual feedback. For
    example, you can play a short sound clip whenever the user initiates an action
    or whenever the application has something to present to the user. For touch devices,
    you can initiate a short vibration whenever the user activates a control, to simulate
    the feeling of pressing a real physical button. Finally, some devices allow you
    to control the various light sources available (such as the LCD backlight or the
    breathing/notification light). You can use these to draw the user''s attention
    to the device when in idle mode. This is especially useful if the device is not
    in the user''s hand (for example, when it is lying on the table).


    The problem with these extra means of feedback is that they tend to consume battery
    power. As such, they should be used with moderation. Furthermore, not all Java
    ME devices provide all of these extra means of feedback, so you should never count
    on anything other than visual feedback being available.


    A very special type of feedback is feedback that comes from outside the device.
    For example, if you''re writing a chat client (which is obviously client-server
    based), you may consider adding the option for users to receive transcripts of
    their chats by e-mail at the end of the day. Although this is by no means necessary,
    it helps keep your application in the spotlight and in users'' attention because
    their interaction with it goes beyond the confines of mobile devices.'
