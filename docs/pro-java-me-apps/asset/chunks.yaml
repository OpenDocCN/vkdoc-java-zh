- fmt: "要使用它，首先必须创建一个实例，并将该实例附加到一个持久化提供者上，如下所示：\n\n`RMSPersistenceProvider provider\
    \ = new RMSPersistenceProvider(\"recordStoreName\");`\n`SimplifiedPersistenceHelper\
    \ helper = new SimplifiedPersistenceHelper(provider);`\n\n接下来，如果你想在持久化提供者中存储一条记录，只需调用辅助类的`store()`方法，并传入你想要存储的记录名称和实际的记录字节作为参数，如下例所示：\n\
    \n`helper.store(\"name\", writer.getCurrentResult() );`\n\n检索记录也同样简单：\n\n`byte\
    \ [] data = helper.getRecord(\"name\");`\n\n最后，要删除一条记录，你只需调用以下方法：\n\n`helper.delete(\"\
    name\");`\n\n真正棒的一点是，辅助类本身非常小巧。其完整源代码见[清单5–15](#Chapter05.html#list_5_15)。\n\n\
    **清单5–15.** `SimplifiedPersistenceHelper`\n\n```\npackage app.module.network.helpers;\n\
    \nimport app.module.persistence.classes.PersistenceProvider;\n\npublic class SimplifiedPersistenceHelper\n\
    {\n    PersistenceProvider provider;\n    TOC toc;\n\n    public SimplifiedPersistenceHelper(PersistenceProvider\
    \ provider)\n    {\n        this.provider = provider;\n        // Initialize the\
    \ TOC imediately\n        toc = new TOC(provider);\n    }\n\n    public void store(String\
    \ key, byte [] data)\n    {\n        int index = toc.getIndexFor(key) ;\n    \
    \    if ( index != -1)\n        {\n            provider.overwriteRecord(index,\
    \ data);\n        }\n        else\n        {\n            index = provider.createRecord(data);\n\
    \            toc.addEntry(key, index);\n        }    }\n\n    public byte [] getRecord(String\
    \ key)\n    {\n        int index = toc.getIndexFor(key) ;\n        if ( index\
    \ != -1)\n        {\n            return provider.getRecord(index);\n        }\n\
    \        else\n        {\n            return null;\n        }\n    }\n\n    public\
    \ void delete(String key)\n    {\n        int index = toc.getIndexFor(key) ;\n\
    \        if ( index != -1 )\n        {\n            provider.deleteRecord(index);\n\
    \            toc.deleteEntry(key);\n        }\n    }\n\n    public void close()\n\
    \    {\n        toc.save();\n    }\n\n}\n```\n\n### 在实际场景中使用该模块\n\n我们的持久化模块现已完成。为了圆满收尾，让我们看最后一个示例，即[清单5–16](#Chapter05.html#list_5_16)，它演示了如何在实际场景中使用该模块。尽管示例很简单，但它涵盖了存储和检索简单记录（仅包含一个对象）以及复杂记录（包含多个对象）的情况。这应该能让你很好地了解持久化模块在实际应用程序中如何使用，以及我们将如何在Twitter客户端中使用它。\n\
    \n**清单5–16.** *持久化模块的完整使用示例*\n\n```\n// Create the provider and the SimplifiedPersistenceHelper\n\
    RMSPersistenceProvider provider = new RMSPersistenceProvider(\"recordStoreName\"\
    );\nSimplifiedPersistenceHelper helper = new SimplifiedPersistenceHelper(provider);\n\
    \n// Create a set of user credentials\nUserCredentials creds = new UserCredentials(\"\
    1\", \"2\", null, \"3\");\n// Serializing a single (high-level) object\nByteRecordWriter\
    \ writer = new ByteRecordWriter();\nHighLevelSerializer.serializeUserCredentials(creds,\
    \ writer);\nhelper.store(\"credentials\", writer.getCurrentResult());\n\n// Serializing\
    \ multiple objects in a single record\nwriter.reset(); // Reset the writer to\
    \ \"empty\"\nHighLevelSerializer.serializeUserCredentials(creds, writer);\nwriter.writeString(\"\
    There is a string after the credentials\");\nhelper.store(\"complexrecord\",writer.getCurrentResult());\n\
    \n// Deserializing a record containing a single object\nbyte [] data = helper.getRecord(\"\
    credentials\");\nByteRecordReader reader = new ByteRecordReader(data);\nUserCredentials\
    \ storedCredentials =\nHighLevelSerializer.deserializeUserCredentials(reader);\n\
    \n// Deserializing a record containing multiple objects\ndata = helper.getRecord(\"\
    complexrecord\");\nreader = new ByteRecordReader(data);\nstoredCredentials = HighLevelSerializer.deserializeUserCredentials(reader);\n\
    String message = reader.readString();\n\n// Don't forget to close the SimplifiedHelper\
    \ after use, in order to save the TOC\nhelper.close();\n```\n\n如你所见，与持久化相关的大部分细节都被辅助类巧妙地隐藏了。尽管如此，灵活性也很高：例如，如果需要，每条记录可以使用不同的写入器和读取器组合，并且可以直接操作底层记录数据（尽管不推荐这样做）。话虽如此，我们现在可以宣布持久化模块已完成，并准备投入使用。\n\
    \n### 进一步扩展模块\n\n就我们的项目而言，我们将保持持久化模块现在的样子，因为它在灵活性/可扩展性与可读性/易用性之间取得了良好的平衡。不过，你可以随意调整该模块以满足你的特定需求。例如，如果你的应用程序中只使用一种编码方案（这通常是常见情况），那么你可以修改代码，使得无需将显式的读取器或写入器作为参数传递——从而简化代码。实现这一点的一种方法是创建一个专用的`Record`数据类型，并将所有序列化和反序列化代码直接添加到其中。你也可以通过编写一个专用的辅助类来实现相同的效果，而无需触及主要的持久化代码。\n\
    \n除了使模块更简单之外，你还可以为其添加特定于项目的功能。很好的例子包括：一个优先级队列，用于决定哪些数据先被序列化（这在由于存储限制无法序列化所有数据，或低带宽情况下很有用）；一个“伞状”持久化提供者，它可以透明地与多个子提供者协同工作以存储和检索数据（从而提供分布式持久化存储）；以及一个记录缓存（用于加速持久化操作）。\n\
    \n### 总结\n\n我们学习了如何审视Java ME持久化，以及实现它的主要方法。\n\n我们还学习了如何构建、编写和使用一个持久化模块——以及如何处理常见问题，例如存储可变长度的数据类型、处理复合数据类型以及支持多种编码方案。\n\
    \n我们通过为应用程序编写持久化模块，将所学知识付诸实践。\n\n在下一章中，我们将介绍许多人认为Java ME应用程序最重要且最有趣的技术方面：UI模块。\n\
    \n## 第6章"
  raw: 'To use it, you must first create an instance of it and attach that instance
    to a persistence provider, like so:


    `RMSPersistenceProvider provider = new RMSPersistenceProvider("recordStoreName");`

    `SimplifiedPersistenceHelper helper = new SimplifiedPersistenceHelper(provider);`


    Next, if you want to store a record within the persistence provider, simply call
    the helper''s `store()` method with a name under which you want to store the record
    and the actual record bytes as parameters, like the following example:


    `helper.store("name", writer.getCurrentResult() );`


    Retrieving a record is a piece of cake, too:


    `byte [] data = helper.getRecord("name");`


    Finally, to delete a record, all you have to do is call the following:


    `helper.delete("name");`


    The really nice part is that the helper itself is really small in size. Its entire
    source code is presented in [Listing 5–15](#Chapter05.html#list_5_15).


    **Listing 5–15.** *The `SimplifiedPersistenceHelper`*


    `package app.module.network.helpers;`


    `import app.module.persistence.classes.PersistenceProvider;`


    `public class SimplifiedPersistenceHelper`

    `{`

    `    PersistenceProvider provider;`

    `    TOC toc;`


    `    public SimplifiedPersistenceHelper(PersistenceProvider provider)`

    `    {`

    `        this.provider = provider;`

    `        // Initialize the TOC imediately`

    `        toc = new TOC(provider);`

    `    }`


    `    public void store(String key, byte [] data)`

    `    {`

    `        int index = toc.getIndexFor(key) ;`

    `        if ( index != -1)`

    `        {`

    `            provider.overwriteRecord(index, data);`

    `        }`

    `        else`

    `        {`

    `            index = provider.createRecord(data);`

    `            toc.addEntry(key, index);`

    `        }` `    }`


    `    public byte [] getRecord(String key)`

    `    {`

    `        int index = toc.getIndexFor(key) ;`

    `        if ( index != -1)`

    `        {`

    `            return provider.getRecord(index);`

    `        }`

    `        else`

    `        {`

    `            return null;`

    `        }`

    `    }`


    `    public void delete(String key)`

    `    {`

    `        int index = toc.getIndexFor(key) ;`

    `        if ( index != -1 )`

    `        {`

    `            provider.deleteRecord(index);`

    `            toc.deleteEntry(key);`

    `        }`

    `    }`


    `    public void close()`

    `    {`

    `        toc.save();`

    `    }`


    `}`


    ### Using the Module in a Real-Life Scenario


    Our persistence module is now complete. To finish everything off, let''s look
    at one final example, the one in [Listing 5–16](#Chapter05.html#list_5_16), which
    demonstrates how to use the module within real-life scenarios. Though the example
    is simple, it covers storing and retrieving both simple records (which contain
    only one object) and complex records (which contain multiple objects). This should
    give you a pretty good idea of how the persistence module is to be used in an
    actual application, and of how we will use it in our Twitter client.


    **Listing 5–16.** *A Complete Usage Example for the Persistence Module*


    `// Create the provider and the SimplifiedPersistenceHelper`

    `RMSPersistenceProvider provider = new RMSPersistenceProvider("recordStoreName");`

    `SimplifiedPersistenceHelper helper = new SimplifiedPersistenceHelper(provider);`


    `// Create a set of user credentials`

    `UserCredentials creds = new UserCredentials("1", "2", null, "3");` `// Serializing
    a single (high-level) object`

    `ByteRecordWriter writer = new ByteRecordWriter();`

    `HighLevelSerializer.serializeUserCredentials(creds, writer);`

    `helper.store("credentials", writer.getCurrentResult());`


    `// Serializing multiple objects in a single record`

    `writer.reset(); // Reset the writer to “empty”`

    `HighLevelSerializer.serializeUserCredentials(creds, writer);`

    `writer.writeString("There is a string after the credentials");`

    `helper.store("complexrecord",writer.getCurrentResult());`


    `// Deserializing a record containing a single object`

    `byte [] data = helper.getRecord("credentials");`

    `ByteRecordReader reader = new ByteRecordReader(data);`

    `UserCredentials storedCredentials =`

    `HighLevelSerializer.deserializeUserCredentials(reader);`


    `// Deserializing a record containing multiple objects`

    `data = helper.getRecord("complexrecord");`

    `reader = new ByteRecordReader(data);`

    `storedCredentials = HighLevelSerializer.deserializeUserCredentials(reader);`

    `String message = reader.readString();`


    `// Don''t forget to close the SimplifiedHelper after use, in order to save the
    TOC`

    `helper.close();`


    As you can see, most of the details related to persistence are neatly hidden away
    by the helpers. Despite this, flexibility is also high: for example, each record
    can use a different writer and reader combination if needed and low-level record
    data can be directly manipulated (though this is not recommended). That being
    said, we can now declare our persistence module complete and ready to be used.


    ### Taking the Module Further


    As far as our project is concerned, we will leave the persistence module like
    it is now, as it provides a good balance between flexibility/extensibility and
    readability/ease of use. However, feel free to adapt the module to suit your particular
    needs. For example, if you will use only one type of encoding scheme in your application
    (which is often the case), then you can modify the code such that no explicit
    readers or writers must be passed as parameters—thus simplifying the code. One
    way this can be achieved is by creating a dedicated `Record` data type and adding
    all the serialization and deserialization code directly to it. You can also achieve
    the same effect without touching the main persistence code, by writing a dedicated
    helper.


    Besides making the module simpler, you can also add project-specific functionality
    to it. Good examples are a priority queue to decide which data gets serialized
    first (this is useful in scenarios where not all the data can be serialized due
    to storage constraints, or in low-bandwidth situations), an “umbrella” persistence
    provider, which transparently works with several sub-providers for storing and
    retrieving data (thus providing distributed persistent storage), and a record
    cache (to speed up persistence operations).


    ### Summary


    We have learned how to look at Java ME persistence and what the primary means
    of implementing it are.


    We have also learned how to structure, write, and use a persistence module—and
    how to handle common problems like storing data types with variable length, handling
    composite data types, and supporting multiple encoding schemes.


    We have put that knowledge into practice by writing the persistence module for
    our application.


    In the next chapter, we will cover what many perceive as the most important and
    interesting technical aspect of a Java ME application: the UI module.


