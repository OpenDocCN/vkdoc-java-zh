    ## 网络模块


    每个客户端应用都需要一个模块来与关联的服务器进行通信。我们的 Twitter 客户端也不例外。在本章中，我们将实现网络模块，以便访问 Twitter 的服务。在此过程中，我们还将探讨与
    Java ME 网络相关的一些有趣方面。


    由于从头编写网络模块过于耗时且复杂，我们将改用现有的第三方库来处理与 Twitter 服务器的底层通信。因此，我们将围绕该库构建模块，依赖它完成底层工作，同时仅向应用的其他部分暴露高级功能。


    ### 设置与配置库


    我们将使用的第三方库名为 Twitter API ME，可从[`www.twapime.com`](http://www.twapime.com)获取。它是一个跨平台库，在撰写本文时支持
    Java ME、J2SE 和 Android。其源代码采用 GPL 许可证发布，而二进制文件可在 LGPL 下使用。在我们的应用中，我们将以源代码形式使用该库。


    撰写本文时的最新版本是 1.4，这也是本章将使用的版本。如果你愿意，也可以使用该库的更新版本。


    首先需要下载 Twitter API ME。请访问[`http://kenai.com/projects/twitterapime/downloads/directory/1.4`](http://kenai.com/projects/twitterapime/downloads/directory/1.4)，下载该库的
    Java ME 版本：`twitter_api_me-1.4-javame.zip`。


    我们主要关注压缩包中的两个目录：`/src`和`/lib`。将`/src`的内容复制到项目的源代码文件夹，将`/lib`的内容复制到项目的库文件夹。


    接下来，配置你的 IDE 和环境，确保`/lib`文件夹中的`kxml`和`xauth-encoders`库都包含在构建过程中（Twitter API ME
    依赖它们，正如我们依赖它一样），并且 Twitter API ME 的源代码将与你的应用源代码一起编译。然后，删除`impl.android`包及其所有子包，以确保项目能无错误地构建。


    至此，库的设置完成。但我们仍需确保 Twitter 允许我们访问其服务。假设你还没有 Twitter 账号，请先创建一个。然后访问[`http://dev.twitter.com/apps`](http://dev.twitter.com/apps)，为你的账号注册一个新的
    Twitter 应用。注册完成后，进入应用的详情页面。你会在那里找到大量信息，供后续步骤使用，例如 API 密钥、消费者密钥和密钥、单次访问令牌和令牌密钥。


    现在是时候请求 xAuth 访问权限了。请按照[`http://dev.twitter.com/pages/xauth`](http://dev.twitter.com/pages/xauth)上的说明操作。基本流程是：发送一封邮件至[`api@twitter.com`](http://api@twitter.com)，附上你的应用描述、需要
    xAuth 访问权限的原因、应用的消费者密钥及其 ID（如果有）。你的请求将被审核，通常会在 24-48 小时内收到回复。


    **注意：** 在撰写本文时，xAuth 仅按请求提供，并非所有人都有资格获取。不过，这种情况可能会随时间改变，xAuth 可能会默认向所有人开放，因此在向
    Twitter 发送请求前，请先确认最新情况。


    在此期间，你可以使用单次访问令牌进行身份验证。如果 Twitter 因某种原因拒绝了你的 xAuth 访问请求，你也可以使用自己的令牌。但这意味着你只能使用自己的
    Twitter 账号，无法以其他用户身份登录。对我们来说这不是问题：由于我们只是做一个学习项目，只能使用一个用户账号并不会造成太大不便。


    一旦你知道了自己的单次访问令牌和密钥，以及消费者密钥和密钥，就可以进行快速冒烟测试了。为此，你需要运行代码清单 4-1 中所示的 MIDlet。


    **代码清单 4-1.** *冒烟测试 MIDlet*


    `package test;`


    `import com.twitterapime.rest.Credential;`

    `import com.twitterapime.rest.UserAccountManager;`

    `...`


    `public class TestMidlet extends MIDlet`

    `{`

    `    public void startApp()`

    `    {`

    `        try`

    `        {`

    **`Token token = new Token("access_token", "access_token_secret");`**

    **`Credential c = new ("your_user_name", "consumer_key", "consumer_secret",`**

    **`token);`**

    `            UserAccountManager m = UserAccountManager.getInstance(c);`

    `            if (m.verifyCredential())`

    `            {`

    `                System.out.println("Auth OK");`

    `            }`

    `            else`

    `            {`

    `                System.out.println("Auth failed");`

    `            }`

    `        }`

    `        catch (Exception ex)`

    `        {`

    `            ex.printStackTrace();`

    `        }`

    `    }`


    `    public void pauseApp() {`

    `    }`


    `    public void destroyApp(boolean unconditional) {`

    `    }`

    `}`


    冒烟测试 MIDlet 用于检查基于令牌的身份验证是否正常工作。要检查 xAuth 身份验证是否对你有效，只需将代码清单 4-1 中的粗体行替换为以下代码行：


    `Credential c = new Credential("user_name", "password", "consumer_key",`

    `"consumer_secret");`


    上述示例中的用户名和密码可以是任何有效 Twitter 账号的用户名和密码。


    在运行上述两个冒烟测试 MIDlet 中的任意一个时，你可能会遇到以下错误或类似错误：


    `javax.microedition.pki.CertificateException: Certificate was issued by an unrecognized`

    `entity`


    这是因为 Twitter 使用的 SSL 证书未被某些旧版本的 WTK 模拟器识别。如果在较新的设备（出厂时间少于 4-5 年）且由知名公司制造的实际设备上运行该
    MIDlet，应该可以正常工作。换句话说，该代码在绝大多数现有设备上都能正常运行。但我们的目标设备是 WTK 模拟器，因此需要解决这个问题。我们可以手动安装缺失的证书（这相当复杂），或者配置
    Twitter API ME 使用 HTTP 而非 HTTPS。我们将选择后者。


    如果你能访问库的源代码，使用 HTTP 而非 HTTPS 进行身份验证非常简单。只需打开`UserAccountManager.java`，将 OAuth
    URL 从[`https://api.twitter.com/oauth/access_token`](https://api.twitter.com/oauth/access_token)改为[`http://api.twitter.com/oauth/access_token`](http://api.twitter.com/oauth/access_token)。


    **提示：** 在继续之前，我想分享两条与编写网络模块相关的重要建议。虽然并非开创性，但它们多次帮助了我，并且确实能让你的工作更轻松（它们无疑让我的工作更轻松了）。

