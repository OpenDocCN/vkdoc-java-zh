    The first step in writing a framework is to define its basic structure and clarify
    what parts of it go in what Java packages. Since the framework structure usually
    also defines the package structure of the application, we will cover that as well.


    All package names start with “`com.apress`” in our case, but to save space, this
    prefix has been omitted in [Table 2-1](#Chapter02.html#tab_2_1).


    **Table 2-1.**The Framework and Application Structure


    | **Package** | **Description** |

    | --- | --- |

    | `framework.objecttypes` | Defines the basic object types used by the framework
    and the application, such as `Model`, `Controller`, `View`, `Event`, etc. |

    | `framework.common` | Implementations of commonly used objects, such as the `EventController`;
    if you have many commonly used objects, it might make sense to split this package
    into sub-packages, according to object type. |

    | `framework.core` | Implementations of core framework objects, such as the `Application`
    static class |

    | `framework.helpers` | All helper and utility classes go here. |

    | `app.models` | All global models (models that logically do not belong to a single
    module) go here—for example, the `TwitterUser` model. |

    | `app.module.<NAME>` | Each module gets its own package. |

    | `app.module.<NAME>.models` `app.module.<NAME>.views`

    `app.module.<NAME>.controllers`

    `app.module.<NAME>.managers`

    `app.module.<NAME>.helpers`

    `app.module.<NAME>.classes.*` | The models, views, and controllers specific to
    each module go into their corresponding package. The same is true for managers,
    helpers, and other classes. |

    | `app.media, app.files` `app.media.<NAME>`

    `app.files.<NAME>` | All media and other non-code files go here. For example,
    global media files go in the `app.media` package, while module-specific files
    go in the `app.media.<NAME>` package. |


    This is, of course, not the only way to structure a framework and the applications
    based on it, but this is the package layout I typically use. It allows for a clear
    separation of code and responsibilities, while at the same time ensuring that
    developers don''t get lost in package names and deep package trees.


    Now that we have our skeleton, it''s time to put some meat on the bones. Specifically,
    we will populate the first three packages from the preceding table with the appropriate
    entities. The end result will be an extremely simple but usable framework.


    We will start with the `com.apress.framework.objecttypes` package.


    ### Basic Object Types


    Most frameworks, ours included, are largely based on the Model-View-Controller
    paradigm, with a few modifications. This is the most flexible paradigm for Java
    ME development, as it allows for the high level of abstraction and flexibility
    that developers need to cover all their bases.


    **NOTE:** The main exceptions to this rule are game frameworks, which by their
    very nature require a different approach and mindset than application frameworks.
    For example, as games are typically very fast-paced, using events to handle communication
    between different parts of the code can prove to be slow and inefficient resource-wise.
    As such, game frameworks tend to use less flexible but more efficient means of
    communication, such as direct method calls between objects belonging to different
    areas of the application.


    If the subject of Java ME game writing interests you, Apress has a good selection
    of books that cover it.


    The MVC paradigm should already be familiar to you, so instead of going deep into
    it, we''ll just recap its basic object types.


    On top of this basic design, we will add a few more object types of our own:


    *   *Events* define, as their name suggests, events that take place during the
    application''s runtime.

    *   *Event listeners* respond to events.

    *   *Providers* retrieve, extract, or generate objects or data from various sources,
    typically external ones such as the native address book or a server.

    *   *Consumers* are the counterparts to providers, in that they are used for sending
    data or objects to external sources.

    *   *Managers* handle and manipulate collections of objects.

    *   *Models* are representations of the data types manipulated by the application,
    such as Tweets and Contacts.

    *   *Controllers* generally control the program flow.

    *   *Views* are responsible for drawing what the user sees on the screen, the
    forms and the UI widgets, based on the models and instructions given by controllers.


    We will go over these types one by one. As mentioned previously, every class and
    interface discussed in this section belongs in the `com.apress.framework.objecttypes`
    package.


    Before we continue, here is a quick side note. As our framework will be primarily
    event-based, a large portion of this chapter will be dedicated to events and event
    handling. Event-based development is pretty much the only paradigm that really
    works for Java ME applications, because with it everything is separated in discrete
    and individual units (events). This gives developers almost complete control over
    what is processed when and in what way.


    #### Events


    Events will be passed around a lot throughout the application, so it is important
    that they are both easy to use and clearly defined.


    Thus, an event has three basic components: the event context, the event type,
    and the event payload. The context and the type define what kind of event has
    occurred and where, while the event payload provides extra information about the
    event, such as what object has been affected by it.


    To be able to properly define events, we need two classes. One is the actual event
    class, shown in [Listing 2–1](#Chapter02.html#list_2_1).


    **Listing 2–1.** *The `Event` Class*


    `package com.apress.framework.objecttypes;`


    `public class Event`

    `{`

    `    protected int context;`

    `    protected int type;`

    `    protected Object payload;`


    `    public Event(int context, int type, Object payload)`

    `    {`

    `        this.context = context;`

    `        ...`

    `    }`


    `    public int getContext()`

    `    {`

    `        return this.context;`

    `    }`


    `    ...`

    `}`


    The other class is a descriptor for all possible event contexts and event types.
    For brevity and code clarity, we will name this class `EVT`. It is presented in
    [Listing 2–2](#Chapter02.html#list_2_2).


    **Listing 2–2.** *The `EVT` Class*


    `package com.apress.framework.objecttypes;`

    `public class EVT`

    `{`

    `    public class CONTEXT`

    `    {`

    `        public static final int NONE = -1;`

    `public static final int LOCAL = 0;`

    `        public static final int STARTUP = 1;`

    `        public static final int SHUTDOWN = 2;`

    `        public static final int LOGIN_FORM = 3;`

    `...`

    `    }`


    `    public class CONTACTS`

    `    {`

    `        public static final int ADD_CONTACT = 1;`

    `        public static final int REMOVE_CONTACT = 2;`

    `    }`

    `    ...`

    `}`


    This approach makes using events easy as pie. For example, to create an event
    that signals that a new contact has been added during the startup process, all
    we have to do is this:


    `Event someEvent = new Event( EVT.CONTEXT.STARTUP, EVT.CONTACTS.ADD_CONTACT,`

    `contactObject );`


    Handling events is another matter altogether, and quite a more complex one, spanning
    many areas of the framework and of the application.


    We will need event listeners to respond to them (which are up next), event controllers
    to dispatch events to the listeners, event controller managers to bundle together
    event controllers (this is done for practical reasons), and a way to have event
    controller managers run on their own independent threads, so as not to interfere
    with the rest of the application. As we go along, all of these entities will be
    covered in the sections dedicated to their corresponding packages.'
