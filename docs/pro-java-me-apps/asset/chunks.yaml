    ### Resizing Images


    Another quite common image manipulation technique is *image resizing*—that is,
    enlarging or shrinking an image. This is useful for a wide variety of purposes,
    from creating zoom effects in picture gallery applications to on-the-fly resizing
    of UI graphical elements.


    By default, Java ME has no image resizing capabilities whatsoever. Fortunately,
    image resizing is extremely easy to implement, because in essence it’s basically
    multiplying the source image with a resize factor. If the resize factor is less
    than 1.0, the image will be shrunk. If the factor is greater than 1.0, the image
    will be enlarged.


    As such, the first thing we need to do is calculate the size of the resized image.
    This is easy to do, because we just have to multiply the original image size by
    the image factor. Next, we will use inverse mapping and see which pixel of the
    original image corresponds to each pixel of the resized image. To do this, all
    we have to do is *divide* the coordinates of each destination pixel by the resize
    factor.


    The entire process is shown in [Listing 13–13](#Chapter13.html#list_13_13).


    **Listing 13–13.** *Resizing an Image in Java ME*


    `public void drawResizedImage(Image image, Graphics g, double factor, int x, int
    y)`

    `{`

    `        // Variables to mark X,Y positions in the original and zoomed image`

    `        int xpos,ypos;`

    `        int origx, origy;`


    `        // Position in the RGB array`

    `        int origpos, zoompos;`


    `        // Calculate zoomed image size`

    `        int originalW = image.getWidth();`

    `        int originalH = image.getWidth();`

    `        int zoomW = (int) (originalW * factor);`

    `        int zoomH = (int) (originalH * factor);`


    `        // Reserve an array for the pixel data of the original and zoomed image`

    `        int [] sourceData = new int[originalW * originalH];`

    `        int [] zoomData = new int[zoomW * zoomH];`


    `        // Retrieve the pixels of the original image`

    `        image.getRGB(sourceData, 0, originalW, 0, 0, originalW, originalH);`


    `        // Process each pixel of the zoomed image`

    `        for (xpos=0;xpos<zoomW;xpos++)`

    `        {`

    `                for (ypos=0;ypos<zoomH;ypos++)`

    `                {`

    `                        // Calculate its corresponding original image pixel`

    `                        origx = (int) (xpos / factor);`

    `                        origy = (int) (ypos / factor);`


    `                        // Map both pixels (original,zoomed) in the data arrays`

    `                        origpos = origy * originalW + origx;`

    `                        zoompos = ypos * zoomW + xpos;`


    `                        // Move the pixel data from the original array to the
    zoomed`

    `                        // array`

    `                        zoomData[zoompos] = sourceData[origpos];`

    `                }`

    `        }`


    `        // Draw the result`

    `        g.drawRGB(zoomData, 0, zoomW, x, y, zoomW, zoomH, true);`

    `}`


    The preceding image resizing routine can be seen in action in [Figure 13–11](#Chapter13.html#fig_13_11).


    ![images](images/1311.jpg)


    **Figure 13–11.** *Image resizing in Java ME*'
