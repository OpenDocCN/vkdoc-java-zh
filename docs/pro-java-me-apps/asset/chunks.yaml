    \ be processed too late, etc.\n\nHowever, most issues that can crop up can be\
    \ fixed with relative ease and with minor alterations to the code and the ideas\
    \ behind it.\n\nFor example, you can create multiple event controllers and event\
    \ managers, some for high priority events and some for low priority ones.\n\n\
    You can also split CPU-heavy events into smaller chunks, using the `DO_WORK_UNIT`\
    \ trick from the previous chapter.\n\nLast but not least, you can have events\
    \ about events. For example, you can implement a `FILL_IN_THE_BLANKS` event, which\
