  trans: '

    ##### 网络差异


    大多数情况下，设备通过 2G 或 3G 网络连接，其信号随时可能中断，网速也可能在极快与极慢之间瞬息万变。专业的 Java ME 应用程序必须考虑到这一点。


    对于某些应用而言，丢包数量或网络延迟时间至关重要。如果是这种情况，应用程序必须能够检测到该领域的问题，并通知用户其存在。


    Java ME 还对应用程序可同时建立的连接数量施加了限制。尽管某些设备支持更多连接，但最好不要同时运行超过两个连接。


    另一个需要考虑的因素是数据的发送方式。以较小的、离散的数据包发送数据通常比发送大块数据更好，因为在某些情况下，大块数据可能导致应用程序在等待数据发送时停滞。


    数据的格式也很重要。由于数据流量需要付费，使用更少的字节发送信息可以为用户节省费用，同时也能让应用程序响应更迅速，因为它需要处理的数据更少。XML 可能是一个广为人知的标准，但它也极其冗长。考虑使用更简洁的格式，例如
    JSON 或二进制协议。


    ##### 本地化问题


    对于专业的 Java ME 应用程序来说，本地化极其重要。让应用程序以用户的母语与其交互，并使用用户习惯的日期和货币格式，是高品质的标志。


    一个常被忽视的关键要求是，确保目标设备对特定语言所需的字符集有适当的支持。对于拉丁语系语言，这通常不是问题，但对于希腊语等非拉丁语系语言，则可能成为问题。这些语言的字符集支持有时仅在某些特定国家/地区的固件版本上可用。这意味着，在不支持所需字符集的设备上，文本会显示得很糟糕，充满占位符字符。解决此问题的最佳方法是使用位图字体，并将必要的字符集直接嵌入到应用程序中。


    同样重要的是支持多种日期、时间、货币和数字格式的能力。其中，正确的日期支持至关重要。例如，一些国家使用 DD/MM/YYYY 而不是 MM/DD/YYYY
    来指定日期，因此像 2011 年 7 月 4 日这样的日期可以写成 4/7/2011 或 7/4/2011。未能正确处理这些差异可能会导致用户困惑和沮丧。至于数字格式支持，请考虑以下示例：为了表示精确到三位小数的数字
    4，一些国家使用“4.000”，而另一些国家则使用“4,000”。使用错误的小数分隔符同样会导致用户困惑和沮丧——如果你习惯使用点而不是逗号作为小数分隔符，“4,000”可能会被解释为“四千”。


    有时，还需要对图形和其他媒体进行本地化。这范围从显而易见的（如国旗）到晦涩难懂的（如在某些文化中完全可以接受但在其他文化中具有冒犯性的图标）。虽然这通常不是问题，但你应该意识到这种情况可能发生。


    ##### 对设备功能的有限访问


    一组重要的限制来自于 Java ME 通常无法访问设备的全部功能。


    例如，某些设备只允许访问文件系统的特定部分，而不允许访问其他部分；某些设备支持访问用户的电话簿，而其他设备则不支持，等等。


    一个很好的例子是手机的摄像头。通常可以从 Java ME 访问设备上的摄像头，但可捕获的最大图像尺寸通常低于摄像头的实际最大图像尺寸。


    这意味着你不能依赖制造商的规格说明，而需要进行一些设备上的测试，以确定你可以使用哪些功能以及使用到什么程度。


    #### 普通 Java ME 应用程序 vs. 专业 Java ME 应用程序


    在确定了设备限制并处理了所有其他项目管理问题之后，开发通常就开始了。然而，在进入正题之前，让我们先看看普通 Java ME 应用程序（作为爱好编写的那种）和专业
    Java ME 应用程序（我们旨在通过本书创建的那种）之间最重要的区别。


    ##### 专业 Java ME 应用程序很智能


    例如，它们会尝试根据用户之前的操作来推断其下一步动作。如果用户选择了三封邮件并逐一删除，当选中第四封时，应用程序可能会询问他“您要删除这封邮件吗？”


    专业 Java ME 应用程序也倾向于处理特殊情况，以在更高程度上提升用户体验。虽然普通应用程序可能满足于显示诸如“0 封未读邮件”或“1 封未读邮件”之类的内容（在两种情况下使用相同的模糊模板），但专业应用程序会为每种情况选择合适的模板，从而相应地显示“没有未读邮件”、“一封未读邮件”和“2
    封未读邮件”。这一原则也扩展到应用程序的其他部分——例如，在用户生日时选择不同的配色方案。


    高质量的 Java ME 应用程序也非常注重资源，它们会动态调整自身，以充分利用可用资源，无论资源是稀缺还是丰富。


    ##### 专业 Java ME 应用程序围绕自定义框架构建


    专业 Java ME 应用程序无一例外地围绕自定义框架构建。这个框架通常在公司内部开发，以适应其将要使用的特定项目，并且每个框架通常是从头开始设计的。这样做是因为框架应始终尝试满足每个项目的特定需求，以便尽可能高效且易于使用。


    例如，一个好的 Java ME HTML 浏览器的框架将与一个 Java ME 电子邮件客户端的框架截然不同。前者将侧重于处理 UI 布局，其结构、辅助方法和对象层次结构都以此为目标进行设计，而后者则更侧重于底层的客户端-服务器功能，并在
    UI 相关功能上投入较少。


    这与 Android 等其他移动平台形成对比，在这些平台上，资源丰富意味着你可以将两个框架合并为一个，并为两个项目使用同一个框架。


    **提示：** 如果从头开始设计一个新框架不可行，你可以从一个现有框架开始，添加新功能，同时移除不需要的功能。除非你计划编写的应用程序与框架最初设计的应用程序非常相似，否则绝不应原封不动地重用框架。

    '
- fmt: '# Pro Java ME Apps Use Third-Party Libraries


    Java ME is a mature technology with a proven track record, so it''s no wonder
    it has a rich selection of libraries. You can find third-party libraries for anything
    from the GUI to database access. Furthermore, good Java ME libraries are built
    so that they transparently handle, at least partially, important Java ME issues
    such as device fragmentation and inconsistent APIs. This frees developers to focus
    on building the application, not on subduing the platform. For example, a good
    UI library knows how to handle the difference between Blackberry and regular Java
    ME devices, like the lack of softkeys on the Blackberry, and makes sure that the
    user sees a UI tailored to the platform he is running the application on.


    It is thus no surprise that high-quality Java ME applications tend to use a lot
    of third-party libraries. They simply could not offer the same value and the same
    level of sophistication otherwise. And it''s not just lone developers or small
    companies that use them; large companies use third-party libraries in their Java
    ME applications as well. The benefits in terms of time and money are simply too
    great to ignore, even for them.


    This is in contrast to regular Java ME applications, which tend to use fewer third-party
    libraries, mostly for budgetary reasons.


    # Pro Java ME Apps Reuse Code


    Code reuse has always been a touchy subject for Java ME, because of the widely
    different environments and circumstances Java ME applications have to run on.
    This means that much of the code you write for one project (or even for one device-specific
    build of a project) can''t be used efficiently in another project.


    However, top-notch Java ME apps tend to have a much higher code-reuse potential
    than regular Java ME apps. The important factors for this are heavy use of third-party
    libraries, code modularization, code flexibility (especially in terms of resource
    requirements), and use of proper abstractions. For example, a well-written HTML
    browser could be turned into a PDF viewer by taking its framework, UI library,
    and layout module, modifying them a bit, and using a `PDFParser` instead of an
    `HTMLParser` as an input source; the code would adapt itself to make the most
    of the resources available.


    Contrast this with a less-than-stellar Java ME HTML browser where the layout module
    and the parser are intertwined, making repurposing them impossible, and which
    was written to meet only the specific resource requirements of parsing and rendering
    HTML. In fact, the potential for code reuse is often a good indicator of how well
    written and high-quality a Java ME application is—much more so than it is for
    other platforms.


    ## Writing Flexible Java ME Applications


    The key to the success of any Java ME application lies in its ability to run in
    multiple software and hardware environments. However, there''s more to Java ME
    portability than just having your code run on a slew of different devices.


    Portability also means that, regardless of the underlying hardware, your code
    runs great even in less-than-ideal circumstances—for example, when the battery
    is running low or when the device''s CPU is decoding music in the background.
    Furthermore, as circumstances can change during runtime, sometimes several times
    in the course of a single run, your application has to be able to deal with these
    changes at a moment''s notice.


    This level of flexibility is not easy to achieve, as it involves a heavy dose
    of experience, skill, and sometimes luck. Fortunately, there are a few golden
    rules that Java ME developers should always strive to obey. In the following pages
    we''ll go over the most important ones, such as coding defensively, shunning complexity,
    and avoiding making wrong assumptions about the platform and the environment.


    **NOTE:** Runtime flexibility is of lesser concern on other modern-day platforms,
    such as Android and iOS. Applications for these platforms not only have more resources
    at their disposal, they are also native, and thus have far better control over
    their environment and their resources than Java ME ones, which run totally constrained
    in their virtual machines.'
  raw: '##### Pro Java ME Apps Use Third-Party Libraries


    Java ME is a mature technology with a proven track record, so it''s no wonder
    it has a rich selection of libraries. You can find third-party libraries for anything
    from the GUI to database access. Furthermore, good Java ME libraries are built
    so that they transparently handle, at least partially, important Java ME issues
    such as device fragmentation and inconsistent APIs. This frees developers to focus
    on building the application, not on subduing the platform. For example, a good
    UI library knows how to handle the difference between Blackberry and regular Java
    ME devices, like the lack of softkeys on the Blackberry, and makes sure that the
    user sees a UI tailored to the platform he is running the application on.


    It is thus no surprise that high-quality Java ME applications tend to use a lot
    of third-party libraries. They simply could not offer the same value and the same
    level of sophistication otherwise. And it''s not just lone developers or small
    companies that use them; large companies use third-party libraries in their Java
    ME applications as well. The benefits in terms of time and money are simply too
    great to ignore, even for them.


    This is in contrast to regular Java ME applications, which tend to use fewer third-party
    libraries, mostly for budgetary reasons.


    ##### Pro Java ME Apps Reuse Code


    Code reuse has always been a touchy subject for Java ME, because of the widely
    different environments and circumstances Java ME applications have to run on.
    This means that much of the code you write for one project (or even for one device-specific
    build of a project) can''t be used efficiently in another project.


    However, top-notch Java ME apps tend to have a much higher code-reuse potential
    than regular Java ME apps. The important factors for this are heavy use of third-party
    libraries, code modularization, code flexibility (especially in terms of resource
    requirements), and use of proper abstractions. For example, a well-written HTML
