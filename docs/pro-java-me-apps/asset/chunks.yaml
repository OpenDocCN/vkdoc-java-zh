    ##### 专业 Java ME 应用善用第三方库


    Java ME 是一项成熟且久经考验的技术，因此它拥有丰富的库资源也就不足为奇了。从图形用户界面到数据库访问，你都能找到相应的第三方库。此外，优秀的 Java
    ME 库在设计上能够透明地处理（至少是部分处理）诸如设备碎片化和 API 不一致等重要的 Java ME 问题。这使得开发者可以专注于构建应用本身，而不是费力去驯服平台。例如，一个好的
    UI 库知道如何处理黑莓手机与普通 Java ME 设备之间的差异（比如黑莓手机缺少软键），并确保用户看到的用户界面是针对其运行应用的平台量身定制的。


    因此，高质量的 Java ME 应用往往会使用大量第三方库也就不足为奇了。否则，它们根本无法提供同等的价值和同样高的精良程度。而且，使用这些库的不仅仅是个人开发者或小公司；大公司在其
    Java ME 应用中也同样使用第三方库。即便对于他们来说，在时间和金钱上的收益也实在太大，不容忽视。


    这与普通的 Java ME 应用形成对比，后者往往使用较少的第三方库，这主要是出于预算方面的考虑。


    ##### 专业 Java ME 应用复用代码


    由于 Java ME 应用必须在差异巨大的环境和条件下运行，代码复用一直是 Java ME 的一个敏感话题。这意味着你为一个项目（甚至是一个项目的某个特定设备构建版本）编写的许多代码，无法在另一个项目中高效地使用。


    然而，顶级的 Java ME 应用通常比普通 Java ME 应用具有更高的代码复用潜力。实现这一点的关键因素包括：大量使用第三方库、代码模块化、代码灵活性（尤其是在资源需求方面），以及使用恰当的抽象。例如，一个编写良好的
    HTML 浏览器可以通过获取其框架、UI 库和布局模块，稍作修改，并使用 `PDFParser` 代替 `HTMLParser` 作为输入源，从而转变为一个
    PDF 阅读器；代码会自我调整以充分利用可用资源。


    与此形成对比的是，一个不那么出色的 Java ME HTML 浏览器，其布局模块和解析器纠缠在一起，导致无法重新利用，并且它只是为了满足解析和渲染 HTML
    的特定资源需求而编写的。事实上，代码复用的潜力通常是衡量一个 Java ME 应用编写质量和优秀程度的重要指标——其重要性远超其他平台。


    ### 编写灵活的 Java ME 应用


    任何 Java ME 应用成功的关键在于其能够在多种软件和硬件环境中运行。然而，Java ME 的可移植性不仅仅意味着让你的代码能在大量不同的设备上运行。


    可移植性还意味着，无论底层硬件如何，你的代码即使在不太理想的情况下也能出色运行——例如，当电池电量不足，或者设备的 CPU 正在后台解码音乐时。此外，由于运行时的环境可能会发生变化，有时甚至在单次运行过程中变化多次，你的应用必须能够随时应对这些变化。


    这种灵活性水平并非轻易就能达到，它需要大量的经验、技巧，有时甚至需要一点运气。幸运的是，有一些 Java ME 开发者应始终努力遵循的黄金法则。在接下来的篇幅中，我们将介绍其中最重要的几条，例如防御性编码、避免复杂性，以及避免对平台和环境做出错误假设。


    **注意：** 在 Android 和 iOS 等其他现代平台上，运行时灵活性的关注度较低。这些平台上的应用不仅拥有更多可支配的资源，而且它们是原生应用，因此对其环境和资源的控制能力远胜于
    Java ME 应用——后者完全在其虚拟机受限的环境中运行。

