- fmt: "### Implementing the `MainForm` and `MainScreenController`\n\nAs the name\
    \ suggests, these two classes are responsible for the user’s interaction with\
    \ the application’s main screen. On this screen, the user is able to view tweets\
    \ retrieved from the server, request a new batch of tweets, post tweets of his\
