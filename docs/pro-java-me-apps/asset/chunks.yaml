- fmt: '# The UI Module


    The trickiest part of writing a mobile application, and the most rewarding in
    my opinion, is writing its UI module. What clearly separates Java ME from other
    mobile platforms is the fact that, in order to get anything useful, you must write
    your UI from scratch—down to the basic low-level drawing calls. The built-in UI
    package is simply too outdated for modern-day usage.


    Writing the UI module from scratch requires knowledge of many subjects, from computational
    geometry to user experience analysis and interface design, so it’s not an easy
    task. However, it does provide you with complete freedom in designing and implementing
    your UI in any way you see fit, and it allows you to be extremely creative. Plus,
    it’s always a great experience to visually interact with the code you’re writing—so
    there’s also great fun to be had in this endeavor.


    In this chapter, we will go over the basic principles and concepts of UI implementation
    and write a simple but functional UI module for our application—which you can
    then reuse in other applications as well. The look and feel will be very basic
    in order to keep the code simple and understandable, but you are free to add bells
    and whistles as you desire.


    A good Java ME UI strikes a delicate balance between code flexibility, proper
    programming techniques, usability, and code complexity. It sits somewhere between
    SWING, which is powerful but overly verbose and resource-intensive, and the native
    Java ME UI, which is simple and lightning fast but way too limited for modern-day
    usage.


    Our UI module will strive to sit exactly in the right spot. It will be written
    so as to provide support for any kind of widgets and containers you might wish
    to implement, while at the same time being fast and easy to use. For readability
    and simplicity purposes, no optimizations will be applied to the code. For example,
    the code will make heavy use of recursion. This can be greatly reduced, but at
    the expense of adding code complexity, which is not something we want for the
    purpose of this book. Ways of optimizing the code will be discussed later in the
    book—and applying them to the UI module is a great exercise! ![images](images/smile.jpg)


    The UI module will also cover the basic components needed for our application:
    buttons, labels, input fields, horizontal-layout containers, and vertical-layout
    containers. Finally, its goal is to be functional, not pretty, so don’t expect
    a state-of-the art visual experience. Nor should you expect it to be very smart
    about the way it does some things. I have decided to keep things simple and “dumb”
    so that the ideas are easier to understand; I will show you later in the book
    how you can make the UI module smarter.


    **NOTE:** To run the code in this chapter on the WTK 2.5.2 and earlier emulators,
    you need to enable touch support for them. To do this, go to `WTK_HOME_FOLDER\wtklib\devices\DefaultColorPhone`
    and locate the configuration file `DefaultColorPhone.properties`. Open it, locate
    the `touch_screen` property and set it to `true`.


    ## Why Create a Custom UI Module?


    The reality is that, for most projects, you’re better off using an off-the-shelf
    third-party UI library. Third-party UI libraries usually have better polish and
    a richer feature set than what you could come up with on your own. So why learn
    how to write your own?


    Well, there are plenty of situations when having the know-how necessary to write
    a UI module comes in handy. There are plenty of projects, especially personal
    ones, where using a third-party library is not possible because of licensing,
    image, or budgetary concerns. Other times (quite often actually) you start out
    with a third-party UI library, but during development you will need to alter it
    or extend it with custom components and/or behavior. If you’re targeting devices
    with limited resources, like older phones, then you might find that third-party
    libraries simply won’t run well (or at all) on these devices.


    Writing your own UI module is also a very educational exercise, and no matter
    how experienced you are, it is almost certain that going through with it will
    teach you at least a couple of new things. Finally, if you dedicate enough resources
    to it, you can even turn your UI module into a stand-alone product and make money
    off of it, or at least use it as a very intuitive and convincing demonstration
    of your skills to potential clients.


    For these reasons, and many others, it pays off to know how to write your own
    UI module or at least to understand the basics of how UI modules function.


    ## Understanding the Basics of Creating a UI Module


    Before we get knee-deep in code, we should first look at some theoretical aspects,
    just so we get a better understanding of what we’re going to create in this chapter.
    You probably already know, at least intuitively, what a widget is and what a container
    is, for example. What you may not know is how to define these entities the Java
    ME way, providing just the right amount of functionality and information to make
    them usable while preventing the code from becoming bloated and resource-intensive.'
  raw: '## **The UI Module**


    The trickiest part of writing a mobile application, and the most rewarding in
    my opinion, is writing its UI module. What clearly separates Java ME from other
    mobile platforms is the fact that, in order to get anything useful, you must write
    your UI from scratch—down to the basic low-level drawing calls. The built-in UI
    package is simply too outdated for modern-day usage.


    Writing the UI module from scratch requires knowledge of many subjects, from computational
    geometry to user experience analysis and interface design, so it’s not an easy
    task. However, it does provide you with complete freedom in designing and implementing
    your UI in any way you see fit, and it allows you to be extremely creative. Plus,
    it’s always a great experience to visually interact with the code you’re writing—so
    there’s also great fun to be had in this endeavor.


    In this chapter, we will go over the basic principles and concepts of UI implementation
    and write a simple but functional UI module for our application—which you can
    then reuse in other applications as well. The look and feel will be very basic
    in order to keep the code simple and understandable, but you are free to add bells
    and whistles as you desire.


    A good Java ME UI strikes a delicate balance between code flexibility, proper
    programming techniques, usability, and code complexity. It sits somewhere between
    SWING, which is powerful but overly verbose and resource-intensive, and the native
    Java ME UI, which is simple and lightning fast but way too limited for modern-day
    usage.


    Our UI module will strive to sit exactly in the right spot. It will be written
    so as to provide support for any kind of widgets and containers you might wish
    to implement, while at the same time being fast and easy to use. For readability
    and simplicity purposes, no optimizations will be applied to the code. For example,
    the code will make heavy use of recursion. This can be greatly reduced, but at
    the expense of adding code complexity, which is not something we want for the
    purpose of this book. Ways of optimizing the code will be discussed later in the
    book—and applying them to the UI module is a great exercise! ![images](images/smile.jpg)


    The UI module will also cover the basic components needed for our application:
    buttons, labels, input fields, horizontal-layout containers, and vertical-layout
    containers. Finally, its goal is to be functional, not pretty, so don’t expect
    a state-of-the art visual experience. Nor should you expect it to be very smart
    about the way it does some things. I have decided to keep things simple and “dumb”
    so that the ideas are easier to understand; I will show you later in the book
    how you can make the UI module smarter.


