  trans: '

    我最早的自由职业项目之一，就是一个很好的例子，可以说明上述观点。在这个项目中，我们只针对中端设备，核心需求是能够在任意时刻保存和恢复应用程序状态；换句话说，就是序列化。Java
    ME 并未内置序列化功能，因此我们将注意力转向了市面上一些 Java ME 序列化库/框架。经过一番研究，我们决定尝试一个相对冷门的库。它并非功能最丰富的库，但简单、快速，且处于活跃开发状态，所以我们决定采用它。


    项目开发初期进展顺利。然而，在开发过程中期，我们被要求支持一款非常流行但低端的设备。这款设备在各方面性能都满足我们的需求……除了序列化。每当需要序列化数据时，设备就会变得极其缓慢。此时更换其他库或自行开发序列化库都已不可行。经过几次实验，我们得出结论：问题出在平台的
    RMS 实现上——每次单独的写入请求耗时过长。这实际上对我们来说是个好消息，因为我们曾担心是低端设备性能不足，无法处理负载。


    我们最终的做法是，对库进行了一些修改，将序列化请求缓冲到同一条记录中，并且每 20 秒或每 5-10 次请求（以先到者为准）才提交一次。这极大地提升了序列化性能，并在用户感知性能方面，拉平了中端设备与低端设备之间的差距。


    然而，随着客户提出越来越多的功能需求，低端设备的性能开始落后。最终，我们不得不放弃对低端设备的支持；它的硬件确实无法胜任这项工作。与此同时，中端设备的表现相当良好，除了偶尔的轻微卡顿，应用程序运行流畅。同一款应用程序在两种设备上运行，使用相同的
    API，方式也相同。在我们的案例中（实际上，在大多数情况下），限制因素显然不是应用程序或平台本身，而是其运行的硬件。这一点非常重要，需要充分理解，因为它有着间接的影响。


    这些影响中，最重要的一点是：你今天展示的那个很酷的概念验证演示，实际上将成为明天应用程序的标准功能。这意味着，作为 Java ME 开发者，你应该不断尝试新想法、新技术和新项目，挑战
    Java ME 当前能力的极限，因为未来你就能在更强大的硬件上实践你的实验成果。换句话说，你应该始终走在硬件发展的前面，从而领先于竞争对手。


    另一个重要的影响是，尤其是在长期项目中，随着“平均硬件”性能越来越强大，你所编写的应用程序在性能和功能方面都可以随着时间的推移得到显著提升——而且，为了保持应用程序的竞争力，你可能实际上不得不这样做。这意味着，在做出诸如选择何种架构和库等技术决策时，你应该考虑应用程序的预期生命周期和开发时间。如果你预计应用程序会存在一段时间，那么就要追求自由度和灵活性。即使这最初可能会在性能上付出一点代价，但从长远来看，性能损失微不足道，而开发上的收益却不可估量。


    例如，在原项目完成大约一年后，客户再次联系我们，询问我们是否有兴趣继续开发这个应用程序；这一次，设备谱系中的“低端”代表是原来的中端设备，而“高端”代表则是几款新发布的手机。因此，我们最终添加了许多视觉效果，并改善了整体用户体验，使其保持与时俱进。


    又过了几个月，客户再次找到我们，他想要一个完全翻新的用户界面。这意味着要使用不同的 UI 工具包。最初，出于性能原因，UI 在几个关键位置与应用程序功能紧密耦合，因为我们没预料到应用程序在最初形态下两年后仍在开发并保持活跃，也因为最初的目标硬件是低端的，所以我们需要尽可能榨取所有性能。由于
    UI 和功能之间的这种紧密联系，更换 UI 工具包涉及大量的应用程序重构，而如果我们从一开始就知道应用程序的“路线图”，这些重构本可以轻易避免（本章后面会更详细地讨论这一点）。

    '
- fmt: '### Best Practices for Optimizing Your Application


    When it comes to Java ME application optimizations, there are two commonly encountered
    schools of thought, opposite in nature, both of which are wrong, in my opinion.


    The first one, most common with developers coming from the desktop world or with
    developers working exclusively with high-end Java ME devices, is to rarely ever
    optimize anything. This is wrong because you’ll get either sub-optimal performance
    or good performance (if you’re targeting high-end devices), but your competitors
    will have applications that either perform better or have more features, since
    they make better use of the available resources.


    The second school of thought, most common with developers that have been in the
    field since the early days, is to optimize everything possible. This again is
    wrong because it requires a lot of developer time to do so, and many times the
    results are simply not worth it: the performance gain is too small, or the optimized
    code performs well on one device but poorly on another due to device peculiarities.


    So what’s the proper way to optimize a Java ME application? As discussed in the
    chapter dedicated to optimizations, what you should do first is profile your code
    and see where the most time and resources are spent. Optimize that area first,
    then profile again, turn your attention to the candidate area of the code, and
    so forth, until performance and resource consumption are acceptable. At the same
    time, the best optimizations are algorithm-related or architecture-related, as
    they tend to translate well to all devices, so these should be attempted before
    any code optimizations take place.


    However, even when done properly, the optimization process just described doesn’t
    always translate well to real-life scenarios. For example, you might spend a lot
    of time optimizing a certain set of methods, and the performance difference between
    the old and new code ends up being staggering on low-end devices but barely noticeable
    on high-end devices. Or vice versa—a 2x performance improvement isn’t really noticeable
    on a low-end device if it improves your application’s FPS from 2 frames per second
    to 4 frames per second; the application is still unusable. In other words, the
    time and resources spent on optimizing the code aren’t actually reflected in the
    real world.


    To counteract this and reach a good balance between time spent and performance
    gained, the best tactic is to approach optimizations incrementally. In other words,
    as soon as you find a problem area, rather than trying to get the best possible
    performance out of it, you simply try to get good performance out of it, and move
    on to the next area. If, after optimizing everything worth optimizing, performance
    still isn’t good enough, you start another cycle of optimizations and further
    improve the already optimized code.


    This works great in practice because many times code and algorithms can be optimized
    to about 40–50% of the maximum possible performance with relatively little effort,
    but the remaining 60–50% requires a lot of work. By optimizing to only about 40–50%
    of the maximum possible performance, you get the best bang for the buck—and, if
    you need to do so, you can always go back and make things even better.


    The best way to internalize this concept is to think of optimizing your application
    as a tool, a means to an end, not as a goal unto itself. You don’t optimize things
    just for the sake of optimization; you do it so that you may fulfill your requirements
    (for example, achieving acceptable performance on a specific device). As such,
    your approach toward application optimization should be one that maximizes the
    effort/reward ratio (which is something the strategy just described does) and,
    as soon as your goals are reached, you should *stop* optimizing. This applies
    to both local optimization goals (i.e., optimizing a local block of code) and
    overall application optimization goals.


    A couple of friends and I once held an optimization contest, where we downloaded
    the source code of a very CPU-intensive application from the Web (a simple proof-of-concept
    chess engine) and tried to improve its performance as best we could in the timespan
    of two hours.


    We all started with profiling the application, and we all identified the same
    critical areas for improvement. However, while another friend and I used the approach
    just described, and tried to optimize each critical area until we felt that we
    achieved an acceptable level of performance, the other two friends decided to
    optimize everything as best they could, in order.


    After the two hours had passed, they had highly optimized about two or three critical
    areas of the code, while my friend and I had optimized about four or five critical
    areas to a “good enough” level. The end results were as expected: although their
    performance in the two or three critical areas they thoroughly optimized were
    visibly superior to what we had achieved, we had the better overall performance
    because we had smaller performance improvements in individual areas, but overall
    we managed to optimize more areas of the code. We then compared the time spent
    on each individual part of the code vs. the performance improvement gained, and
    the results showed that while their highly optimized code was 20–30% faster than
    ours, they had spent two or three times as much time optimizing it. In other words,
    they didn’t have a very good return on investment.


    The most interesting result of all this was noticed when we moved the code from
    the emulator to actual devices. One critical area actually performed noticeably
    better in our not-so-thoroughly optimized version than it did in the highly-optimized
    version of our friends’. The most probable reason for this is that, in an effort
    to improve CPU time, they used a lot more memory in their approach than we did,
    and more variables, which meant more memory reads than we used and poorer cache
    performance.


    The lesson to be learned from this is that, in the Java ME world, optimizing code
    to the best possible degree isn’t always a good thing. Optimize only as much as
    you need to, and only where you need to. If you do decide to optimize to the bone
    (for whatever reason), make sure you keep a copy of the unoptimized approach for
    reference purposes, and make sure that you test your optimization on all target
    devices, in order to avoid any unpleasant surprises.'
