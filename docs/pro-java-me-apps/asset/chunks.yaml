    \ value) { ... }\n}\n```\n\nThe main idea here is to treat the string's length\
    \ (an integer) and the string's body (a collection of bytes) as an atomic data\
    \ type and write them together. It is also very important to write the string's\
    \ length first; otherwise you won't know how many bytes to read when decoding\
    \ it.\n\nThe counterpart to the `ByteRecordWriter` is the `ByteRecordReader`,\
