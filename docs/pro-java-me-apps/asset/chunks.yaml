- fmt: "# Working with High-Level Objects\n\nThere are many ways of writing and defining\
    \ a networking module. For example, some people prefer to have the networking\
    \ module be a simple conduit for data, feeding raw bytes to the rest of the application\
    \ for decoding. Others prefer to have the networking module work with structured\
    \ data, such as vectors and hash tables, instead of raw bytes. Others still use\
    \ non-native formats such as XML and JSON, encoded in `String` objects.\n\nAll\
    \ of these approaches, and others like them, have one big downside: they require\
    \ some kind of serialization/deserialization to be done outside of the networking\
    \ module. This effectively means that the networking module “bleeds through” to\
    \ other modules.\n\nThere is never a good reason for this. No model, controller,\
    \ or any other class outside the networking module should have methods like `createFromHashtable()`,\
    \ `createFromRawBytes()`, or anything even remotely similar. The only acceptable\
    \ exception to this rule is the persistence module—we will discuss why in the\
    \ next chapter.\n\nAs such, a properly written networking module always consumes\
    \ high-level objects and always provides high-level objects, typically models.\
    \ Converting these objects to and from bytes or XML or whatever is strictly the\
    \ internal job of the networking module—the rest of the application doesn't care\
    \ how this happens.\n\n## Using Your Own Data Types\n\nMost third-party libraries,\
    \ Twitter API ME included, already have objects and classes that map crucial entities\
    \ and data types related to their scope. For example, in the case of the Twitter\
    \ API ME client library, a `Tweet` data type is already defined by the library.\
    \ The question is, do you use these already defined data types in your application\
    \ or do you implement your own?\n\nSpeaking from experience, it is always a good\
    \ idea to implement and use your own data types. You should use the library-defined\
    \ data types only as a buffer between the raw bytes the server sends and the data\
    \ type you use in your application, which is easy to do as usually the library\
    \ data types and your data types are very similar.\n\nDoing so might involve a\
    \ little more work at first, as you have to “move” the information from the library\
    \ data types to your data types, but it gives you the extremely important advantage\
    \ of being library-independent; this allows you to easily port your application\
    \ to other platforms or to other libraries. It also allows you to model your data\
    \ types and entities the way you want to use them, instead of being stuck with\
    \ the library-provided representation—this alone has saved me from countless headaches.\n\
    \n# Writing Our TwitterServer Implementation\n\nIf you remember from our previous\
    \ chapter, we decided to define the Twitter server as a Java interface. It's now\
    \ time to turn that interface into something concrete by building a `TwitterServer`\
    \ implementation that is able to log in, read tweets, and post new tweets. We\
    \ will also look at some useful techniques, such as using the generic timeline\
    \ concept to browse data on the server (in our case, tweets) in real time and\
    \ with minimal overhead, converting asynchronous requests to synchronous ones\
    \ and using buffering to minimize perceived network latency and performance.\n\
    \n## Defining the General Structure\n\nWe will start by writing a barebones version\
    \ of the `ServerImplementation` class, shown in [Listing 4–2](#Chapter04.html#list_4_2).\n\
    \n**Listing 4–2.** *The Barebones `ServerImplementation` Class*\n\n```\npackage\
    \ app.module.network.models;\n\nimport app.models.Timeline;\nimport app.models.Tweet;\n\
    ...\n\npublic class ServerImplementation implements TwitterServer {\n\n    public\
    \ boolean login(UserCredentials credentials)\n    {\n        throw new UnsupportedOperationException(\"\
    Not supported yet.\");\n    }\n\n    public TwitterUser getMyProfile()\n    {\n\
    \        throw new UnsupportedOperationException(\"Not supported yet.\");\n  \
    \  }\n\n    ...\n\n}\n```\n\nAs you can see, the class goes into the `app.module.network`\
    \ package, under the `models` sub-package.\n\nAn interesting point: As there is\
    \ no real-life code difference between a controller and regular class or a model\
    \ in our framework, the distinction between them is mostly a conceptual one with\
    \ the purpose of clearing things up. For example, if a new developer joins the\
    \ project and sees that the networking module has no controllers, he can easily\
    \ infer that the networking module is doing its job quietly and behind the scenes,\
    \ merely feeding data and events to other modules. However, if he sees at least\
    \ one controller in the networking module, he then knows that said module is critical\
    \ and can alter the program's flow.\n\nIn our particular case, due to the nature\
    \ of Twitter, our application's networking module will have no controllers at\
    \ all, because nothing Twitter-related is so urgent as to require the networking\
    \ module itself to alter the program's flow or interfere with it in any way.\n\
    \nThis situation is quite different from the one found in other types of applications—for\
    \ example, stock monitoring applications. In those cases, the networking module\
    \ can and does control the program flow: if the client receives a `STOCK_HIT_ROCK_BOTTOM`\
    \ message, you can be sure that the user will want to be informed of this ASAP\
    \ by being taken to a dedicated screen, regardless of what the rest of the application\
    \ is doing at that time. As such, it makes sense to put the logic that does this\
    \ inside a controller class.\n\n## Initializing a ServerImplementation Instance\n\
    \nIn order for the `ServerImplementation` class to do anything useful, we must\
    \ first provide the means for it to be properly initialized.\n\nWe need three\
    \ pieces of information in order to initialize a `ServerImplementation` instance:\
    \ the consumer key, the consumer secret, and a reference to an event controller.\
    \ The reason for the first two should be obvious: the consumer key and secret\
    \ are what identify our application to Twitter. The event controller is needed\
    \ in order to allow the instance to send notifications about important events\
    \ to other parts of the application, and to be able to receive notifications from\
    \ other parts of the application.\n\nFurthermore, we should strive to make `ServerImplementation`\
    \ as immutable as possible. Our class thus becomes the one in [Listing 4–3](#Chapter04.html#list_4_3).\n\
    \n**Listing 4–3.** *The `ServerImplementation` Class with Initialization Support*\n\
    \n```\npublic class ServerImplementation implements TwitterServer, EventListener\
    \ {\n\n    protected String consumerKey, consumerSecret;\n    protected EventController\
    \ eventController;\n\n    protected ServerImplementation() { } ;\n\n    public\
    \ ServerImplementation(String consumerKey, String consumerSecret,\n    EventController\
    \ controller)\n    {\n        this.consumerKey = consumerKey;\n        this.consumerSecret\
    \ = consumerSecret;\n        this.eventController = controller;\n        controller.registerListener(this);\n\
    \    }\n\n    public boolean handleEvent(Event event)\n    {\n        // Empty\
    \ for now\n        return false;\n    }\n\n    public EventController getEventController()\n\
    \    {\n        return eventController;\n    }\n\n    ...\n}\n```\n\nNow if, for\
    \ example, we want to initialize the server implementation and attach it to the\
    \ application's main event controller, all we have to do is the following:\n\n\
    ```\nServerImplementation impl = new ServerImplementation(\"conKey\", \"conSecret\"\
    ,\nApplication.getMainEventController() );\n```"
  raw: '#### Working with High-Level Objects


    There are many ways of writing and defining a networking module. For example,
    some people prefer to have the networking module be a simple conduit for data,
    feeding raw bytes to the rest of the application for decoding. Others prefer to
    have the networking module work with structured data, such as vectors and hash
    tables, instead of raw bytes. Others still use non-native formats such as XML
    and JSON, encoded in `String` objects.


    All of these approaches, and others like them, have one big downside: they require
    some kind of serialization/deserialization to be done outside of the networking
    module. This effectively means that the networking module “bleeds through” to
    other modules.


    There is never a good reason for this. No model, controller, or any other class
    outside the networking module should have methods like `createFromHashtable()`,
    `createFromRawBytes()`, or anything even remotely similar. The only acceptable
    exception to this rule is the persistence module—we will discuss why in the next
    chapter.


    As such, a properly written networking module always consumes high-level objects
    and always provides high-level objects, typically models. Converting these objects
    to and from bytes or XML or whatever is strictly the internal job of the networking
    module—the rest of the application doesn''t care how this happens.


    #### Using Your Own Data Types


    Most third-party libraries, Twitter API ME included, already have objects and
    classes that map crucial entities and data types related to their scope. For example,
    in the case of the Twitter API ME client library, a `Tweet` data type is already
    defined by the library. The question is, do you use these already defined data
    types in your application or do you implement your own?


    Speaking from experience, it is always a good idea to implement and use your own
    data types. You should use the library-defined data types only as a buffer between
    the raw bytes the server sends and the data type you use in your application,
    which is easy to do as usually the library data types and your data types are
    very similar.


    Doing so might involve a little more work at first, as you have to “move” the
    information from the library data types to your data types, but it gives you the
    extremely important advantage of being library-independent; this allows you to
    easily port your application to other platforms or to other libraries. It also
    allows you to model your data types and entities the way you want to use them,
    instead of being stuck with the library-provided representation—this alone has
    saved me from countless headaches.


    ### Writing Our TwitterServer Implementation


    If you remember from our previous chapter, we decided to define the Twitter server
    as a Java interface. It''s now time to turn that interface into something concrete
    by building a `TwitterServer` implementation that is able to log in, read tweets,
    and post new tweets. We will also look at some useful techniques, such as using
    the generic timeline concept to browse data on the server (in our case, tweets)
    in real time and with minimal overhead, converting asynchronous requests to synchronous
    ones and using buffering to minimize perceived network latency and performance.


    #### Defining the General Structure


    We will start by writing a barebones version of the `ServerImplementation` class,
    shown in [Listing 4–2](#Chapter04.html#list_4_2).


    **Listing 4–2.** *The Barebones `ServerImplementation` Class*


    `package app.module.network.models;`


    `import app.models.Timeline;`

    `import app.models.Tweet;`

    `...`


    `public class ServerImplementation implements TwitterServer {`


    `    public boolean login(UserCredentials credentials)`

    `    {`

    `        throw new UnsupportedOperationException("Not supported yet.");`

    `    }`


    `    public TwitterUser getMyProfile()`

    `    {`

    `        throw new UnsupportedOperationException("Not supported yet.");`

    `    }`


    `    ...`


    `}`


    As you can see, the class goes into the `app.module.network` package, under the
    `models` sub-package.


    An interesting point: As there is no real-life code difference between a controller
    and regular class or a model in our framework, the distinction between them is
    mostly a conceptual one with the purpose of clearing things up. For example, if
    a new developer joins the project and sees that the networking module has no controllers,
    he can easily infer that the networking module is doing its job quietly and behind
    the scenes, merely feeding data and events to other modules. However, if he sees
    at least one controller in the networking module, he then knows that said module
    is critical and can alter the program''s flow.


    In our particular case, due to the nature of Twitter, our application''s networking
    module will have no controllers at all, because nothing Twitter-related is so
    urgent as to require the networking module itself to alter the program''s flow
    or interfere with it in any way.


    This situation is quite different from the one found in other types of applications—for
    example, stock monitoring applications. In those cases, the networking module
    can and does control the program flow: if the client receives a `STOCK_HIT_ROCK_BOTTOM`
    message, you can be sure that the user will want to be informed of this ASAP by
    being taken to a dedicated screen, regardless of what the rest of the application
    is doing at that time. As such, it makes sense to put the logic that does this
    inside a controller class.


    #### Initializing a ServerImplementation Instance


    In order for the `ServerImplementation` class to do anything useful, we must first
    provide the means for it to be properly initialized.


    We need three pieces of information in order to initialize a `ServerImplementation`
    instance: the consumer key, the consumer secret, and a reference to an event controller.
    The reason for the first two should be obvious: the consumer key and secret are
    what identify our application to Twitter. The event controller is needed in order
    to allow the instance to send notifications about important events to other parts
    of the application, and to be able to receive notifications from other parts of
    the application.


    Furthermore, we should strive to make `ServerImplementation` as immutable as possible.
    Our class thus becomes the one in [Listing 4–3](#Chapter04.html#list_4_3).


    **Listing 4–3.** *The `ServerImplementation` Class with Initialization Support*


    `public class ServerImplementation implements TwitterServer, EventListener {`


    `    protected String consumerKey, consumerSecret;`

    `    protected EventController eventController;`


    `    protected ServerImplementation() { } ;`


    `    public ServerImplementation(String consumerKey, String consumerSecret,`

    `    EventController controller)`

    `    {`

    `        this.consumerKey = consumerKey;`

    `        this.consumerSecret = consumerSecret;`

    `        this.eventController = controller;`

    `        controller.registerListener(this);`

    `    }`


    `    public boolean handleEvent(Event event)`

    `    {`

    `        // Empty for now`

    `        return false;`

    `    }`


    `    public EventController getEventController()`

    `    {`

    `        return eventController;`

    `    }`


    `    ...`

    `}`


    Now if, for example, we want to initialize the server implementation and attach
    it to the application''s main event controller, all we have to do is the following:


    `ServerImplementation impl = new ServerImplementation("conKey", "conSecret",`

    `Application.getMainEventController() );`'
  trans: '

    #### 使用高级对象


    编写和定义网络模块的方式有很多种。例如，有些人倾向于让网络模块成为数据的简单通道，将原始字节流传递给应用程序的其他部分进行解码。另一些人则偏好让网络模块处理结构化数据（如向量和哈希表），而非原始字节。还有一些人使用非原生格式，例如编码在`String`对象中的
    XML 和 JSON。


    所有这些方法以及其他类似方法都有一个重大缺陷：它们需要在网络模块外部进行某种序列化/反序列化操作。这实际上意味着网络模块会“渗透”到其他模块中。


    这种情况绝无合理理由。网络模块之外的任何模型、控制器或其他类都不应包含诸如`createFromHashtable()`、`createFromRawBytes()`或任何类似的方法。此规则唯一可接受的例外是持久化模块——我们将在下一章讨论原因。


    因此，一个编写得当的网络模块始终消费高级对象，并始终提供高级对象（通常是模型）。将这些对象与字节流或 XML 等格式相互转换，严格来说是网络模块的内部工作——应用程序的其他部分无需关心这一过程如何实现。


    #### 使用自定义数据类型


    大多数第三方库（包括 Twitter API ME）已经定义了与其领域相关的关键实体和数据类型的对象和类。例如，在 Twitter API ME 客户端库中，`Tweet`数据类型已由该库定义。问题在于：你是在应用程序中使用这些已定义的数据类型，还是实现自己的数据类型？


    根据经验，实现并使用自己的数据类型始终是个好主意。你应该仅将库定义的数据类型用作服务器发送的原始字节与你应用程序中使用的数据类型之间的缓冲区——这很容易实现，因为库数据类型与你的数据类型通常非常相似。


    这样做最初可能需要多做一些工作，因为你必须将信息从库数据类型“迁移”到你的数据类型，但它为你带来了一个极其重要的优势：与库无关；这使你能够轻松地将应用程序移植到其他平台或其他库。它还允许你按照自己的使用方式来建模数据类型和实体，而不是受限于库提供的表示形式——仅凭这一点就为我省去了无数麻烦。


    ### 编写我们的 TwitterServer 实现


    如果你还记得上一章的内容，我们决定将 Twitter 服务器定义为一个 Java 接口。现在是时候通过构建一个能够登录、读取推文和发布新推文的`TwitterServer`实现，将该接口具体化了。我们还将研究一些有用的技术，例如使用通用时间线概念以最小开销实时浏览服务器上的数据（在我们的案例中是推文）、将异步请求转换为同步请求，以及使用缓冲来最小化感知到的网络延迟和性能开销。


    #### 定义通用结构


    我们将从编写`ServerImplementation`类的精简版本开始，如代码清单 4-2 所示。


    **代码清单 4-2.** *精简版`ServerImplementation`类*


    `package app.module.network.models;`


    `import app.models.Timeline;`

    `import app.models.Tweet;`

    `...`


    `public class ServerImplementation implements TwitterServer {`


    `    public boolean login(UserCredentials credentials)`

    `    {`

    `        throw new UnsupportedOperationException("Not supported yet.");`

    `    }`


    `    public TwitterUser getMyProfile()`

    `    {`

    `        throw new UnsupportedOperationException("Not supported yet.");`

    `    }`


    `    ...`


    `}`


    如你所见，该类位于`app.module.network`包下的`models`子包中。


    有趣的一点是：由于在我们的框架中，控制器、普通类或模型之间在实际代码层面没有区别，因此它们之间的区分主要是概念性的，目的是理清思路。例如，如果新加入项目的开发者看到网络模块没有控制器，他就能轻松推断出网络模块正在后台默默工作，仅向其他模块提供数据和事件。然而，如果他看到网络模块中至少有一个控制器，他就会知道该模块至关重要，并且可以改变程序的流程。


    在我们的特定案例中，由于 Twitter 的特性，应用程序的网络模块将完全没有控制器，因为与 Twitter 相关的任何事务都没有紧迫到需要网络模块本身来改变程序流程或以任何方式干预它。


    这种情况与其他类型的应用程序（例如股票监控应用程序）中的情况截然不同。在那些情况下，网络模块可以并且确实控制着程序流程：如果客户端收到`STOCK_HIT_ROCK_BOTTOM`消息，你可以肯定用户会希望立即被告知此事，并被引导至专用屏幕，无论应用程序的其他部分当时在做什么。因此，将执行此操作的逻辑放在控制器类中是合理的。


    #### 初始化 ServerImplementation 实例


    为了使`ServerImplementation`类能够执行有用的操作，我们必须首先提供使其能够正确初始化的方法。


    初始化`ServerImplementation`实例需要三部分信息：消费者密钥、消费者密钥密文以及事件控制器的引用。前两者的原因显而易见：消费者密钥和密钥密文用于向
    Twitter 标识我们的应用程序。需要事件控制器是为了让实例能够向应用程序的其他部分发送关于重要事件的通知，并能够接收来自其他部分的通知。


    此外，我们应该努力使`ServerImplementation`尽可能不可变。因此，我们的类变成了代码清单 4-3 中的样子。


    **代码清单 4-3.** *支持初始化的`ServerImplementation`类*


    `public class ServerImplementation implements TwitterServer, EventListener {`


    `    protected String consumerKey, consumerSecret;`

    `    protected EventController eventController;`


    `    protected ServerImplementation() { } ;`


    `    public ServerImplementation(String consumerKey, String consumerSecret,`

    `    EventController controller)`

    `    {`

    `        this.consumerKey = consumerKey;`

    `        this.consumerSecret = consumerSecret;`

    `        this.eventController = controller;`

    `        controller.registerListener(this);`

    `    }`


    `    public boolean handleEvent(Event event)`

    `    {`

    `        // 暂时为空`

    `        return false;`

    `    }`


    `    public EventController getEventController()`

    `    {`

    `        return eventController;`

    `    }`


    `    ...`

    `}`


    现在，例如，如果我们想要初始化服务器实现并将其附加到应用程序的主事件控制器，我们只需执行以下操作：


    `ServerImplementation impl = new ServerImplementation("conKey", "conSecret",`

    `Application.getMainEventController() );`

