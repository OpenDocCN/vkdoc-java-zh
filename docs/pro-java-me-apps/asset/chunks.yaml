    and increase or decrease this value to get optimum results.


    However, be very careful: over-buffering is just as bad as having no buffer at
    all. If you retrieve 100 pieces of data from the server but you need or use only
    a single one, then the remaining 99 pieces become overhead. To avoid this huge
    waste of resources, most real-life applications use dynamic buffers, changing
