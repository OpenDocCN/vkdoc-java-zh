- fmt: '### Java ME’s Death


    Though the death of Java ME will certainly happen someday (as it does to all software
    platforms), this event is unlikely to happen in the foreseeable future. Still,
    let’s be pessimistic and have a look at how and why Java ME, as a platform, might
    die out.


    The most obvious reason for this is competition from other mobile platforms, especially
    Android. Android has seen an unbelievable rate of adoption, and is certain to
    become the leading smartphone platform for the next few years. It is perceived,
    and for good reason, as a flexible and powerful mobile platform, and because it
    has no licensing fees, manufacturers have quickly adopted it.


    However, Android is still a smartphone platform, and it requires the appropriate
    hardware: a fast CPU, lots of RAM, a big screen with touch support. These not
    only cost money, but also tend to eat up battery life quickly—as any smartphone
    user can tell you.


    In contrast, Java ME is more of an application environment. Its minimum specifications
    are considerably lower than those of Android, which means that it can run on considerably
    less powerful hardware and consume considerably less power while doing so (aided
    by the fact that, unlike Android, the Java ME environment has to be active only
    when an application is running). Business reasons also come into play, as part
    of the premium that consumers pay for a smartphone is based on its operating system.
    If you deliver the same operating system on entry-level devices, you have to lower
    the premium, which is not something I see manufacturers doing with Android anytime
    soon.


    All of these things mean that Java ME is far more suited for a feature phone than
    Android is, which is unlikely to ever change in the future. It is true that Android
    devices are becoming cheaper and cheaper, but Java ME will always deliver more
    bang for the buck in the entry-phone arena.


    The second often-cited reason is that most developers are flocking to smartphone
    platforms. This is certainly true now, but as long as there is a market for Java
    ME applications (and, as we have seen, there is and there will be), there will
    also be Java ME developers. Furthermore, Java ME is the easiest platform to approach
    both in terms of cost and technology, so there will always be a stream of new
    developers coming toward it. `MIDP 3.0` will also generate a lot of attention,
    because it really tremendously enhances Java ME’s capabilities.


    The fact that there is no money to be made in Java ME is another reason cited
    for the platform to die. However, that’s false. There is not *as much* money to
    be made, but that doesn’t mean that there aren’t opportunities. You just have
    to think about your business model. As I said in the beginning of this book, Java
    ME applications aren’t monetized by selling them to end users as smartphone applications
    are. You should also look further away from home for business leads, that is,
    in the developing world.


    The final reason that could contribute to the end of Java ME is that the platform
    is stalling. That’s somewhat true, in that its evolution in recent years has been
    considerably slower than the evolution of other platforms. But there *has been*
    an evolution. Hardware is more powerful than before, APIs are up to date and are
    gradually being adopted by more and more devices, and screens are getting bigger
    and better. What’s of real concern is the gap between Java ME and other platforms.
    This gap is very real and currently widening, with `MIDP 3.0` (which would close
    the gap for the most part) nowhere in sight.


    However, that’s not entirely true. What’s missing are *devices* with `MIDP 3.0`
    support. The standard itself is ready, and there is a reference implementation
    for it. Keep in mind that `MIDP 3.0` is big from many points of view, so naturally
    companies don’t want to jump head-first into it. There are many factors and implications
    to be considered (for one thing, implementing `MIDP 3.0` will probably require
    extensive changes to the current generation of firmware that manufacturers use).
    But the jump will happen sooner or later; it’s just a matter of time.


    ### Summary


    In this chapter, you have examined what the future holds for the Java ME platform
    in terms of hardware, software, target markets, and more. You have also looked
    at some of the reasons that Java ME might “die” in the foreseeable future.


    ## Chapter 16


    ## Final Words


    At this point, we have reached the end of our journey into the world of Pro Java
    ME applications. As such, I would like to use these last few pages to recap what
    we have discussed in the book up to this point, and provide you with a few markers
    related to what you should do next in order to deepen your knowledge of the platform.


    ### What we have covered in the book


    We started with a simple introduction to the Java ME world: a quick overview of
    the platform, of the basic techniques you’ll need to develop for it and of the
    various issues you’ll encounter while doing so. As a goal, we set out to write
    a Java ME Twitter client using a professional development approach.


    Having set our goal, we continued our journey by writing a proper framework for
    our application, explaining the decisions made along the way and highlighting
    why having a good framework for your application is paramount for its success.


    Following this, we proceeded with defining the critical data structures needed
    for our application. We have looked at the Java ME way of handling data modeling
    and at how properly defined objects and data structures can ease the development
    process considerably and improve the application as a whole.


    We then advanced by writing all our application’s necessary modules: the networking
    module, the UI module, the persistence module and the localization module. As
    we did all of this, critical decisions were explained, potentially fatal mistakes
    were highlighted and useful advice was given.


    Having completed our application, the next step on the agenda was to discuss Java
    ME’s biggest plague: fragmentation. The common types of fragmentation were discussed
    and solutions for them were described.


    We then delved into the equally important subject of optimizing Java ME code.
    Important techniques for this were explained and exemplified, as well as the reasoning
    and low-level workings behind them.


    The next topic discussed was application improvement, by means of adding fine
    touches and by improving the way in which the user interacts with your application.
    Examples for each category were given and discussed.


    After this, we explored Java ME application testing in all its forms. From basic
    unit testing to testing involving hardware modifications, the most pertinent Java
    ME application testing techniques were explained.


    The second to last topic we discussed was graphics. We had a look at some very
    useful and interesting graphical techniques that can be used in Java ME applications
    today, such as image masking and image rotation.


    We ended our journey with a discussion of the proper Java ME mindset. The overarching
    set of rules and principles that should guide the entire Java ME application development
    process were outlined, explained and exemplified with real-life stories.'
