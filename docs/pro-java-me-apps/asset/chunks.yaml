    absolutely need to set the scroll on the view, then you can just call `getContainer()`
    to get the underlying container and then call `setYScroll()` on it. This is a
    bit of a hack, and if this were any platform other than Java ME, I would strongly
    recommend against it, but in our case the benefits in terms of code size, simplicity,
    and speed outweigh the cost.


