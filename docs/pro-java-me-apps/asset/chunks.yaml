  trans: '

    ## 设备碎片化


    设备碎片化是 Java ME 领域一个由来已久的问题。它主要源于两个因素。首先，Java ME 仅仅是一套规范和 API，供应商可以自由地在他们的 JVM
    中实现这些规范。然而，并非所有供应商对规范的解释都完全相同，这可能导致不同 JVM 的行为存在差异。这些差异通常很小，或者只出现在极端情况下，但它们确实存在，并且可能给开发者带来巨大的痛苦。


    设备碎片化的第二个原因是，目前市面上实际使用的 Java ME 手机型号实在太多。Java ME 设备覆盖了从极其廉价但低端的设备（采用 CLDC 1.0、MIDP
    1.0，且无额外 API——在印度和亚洲相当流行）到昂贵但高端的设备（例如塞班设备——它们通常实现了最新的 Java ME JSR）的所有价格区间。


    此外，Java ME 设备的使用寿命往往比 iPhone 等设备更长，这意味着你仍然会发现 4-5 年前的设备在现实世界中相当流行，尤其是如果这些设备在发布时属于高端机型。这带来的一个后果是，你可能会发现一些硬件性能强大但不支持某些
    API 的老旧 Java ME 设备，而这些 API 反而是更新但性能较弱的设备所支持的。


    在处理任何类型的设备碎片化问题时，首要目标是让你的应用程序能够基于单一代码库支持尽可能多的不同设备（即，编写代码使其能在尽可能多的设备上良好运行）。


    对于复杂的应用程序来说，很有可能，即使你尽了最大努力，仍然需要为每个目标设备或设备类别构建定制版本，每个版本都需要针对其目标设备的特定硬件、功能和 API
    进行调整。


    这样做有可能在每台设备上提供最佳体验，但这会使你的开发成本飙升。因此，只有在别无选择，或者你的开发预算非常充裕时，才应考虑此方案。一个折中的方案（在大多数情况下是理想的）是使用移植框架来自动完成适配工作。这能提供手动为每个目标设备构建定制版本的大部分性能（我认为能达到
    95%），但所需花费的资金和开发时间却少得多。移植框架将在本章后面介绍。


    尽管如此，即使有了定制构建和移植框架，Java ME 的碎片化仍然是一个相当棘手的问题。要解决它，我们首先需要将其分类，分解成若干子问题。因此，我们可以将设备碎片化视为包含三个主要子部分：


    *   **硬件碎片化**：硬件规格（CPU、RAM、屏幕尺寸、触摸与非触摸等）的差异意味着你必须调整你的应用程序，使其能在截然不同的环境中运行。

    *   **功能碎片化**：并非所有设备都支持相同的 API 或提供你所需的所有功能（例如，蓝牙文件传输、地理定位、PIM 访问等）。

    *   **API 碎片化**：相同的 API 在不同设备上可能表现不同。当这种情况发生时，差异通常很小且微妙，但可能会给开发者带来很多问题。


    在理想情况下（如果存在的话），你只会处理一种类型的碎片化，但在现实世界中，通常你必须同时应对所有三种类型。此外，你面临的一些问题可能属于多个类别。


    **注意：** 现实中存在大量具体的碎片化问题，而且每天都会出现新的问题。要涵盖所有这些问题，需要的不是一本书，而是好几本书。此外，其中许多问题及其相关解决方案都具有高度的场景特异性。因此，在本章中，我们只提供关于设备碎片化的一般性建议。


    ### 硬件碎片化


    本节将向你展示如何让你的应用程序在具有不同硬件规格的设备上运行。


    #### CPU 性能


    与桌面世界的情况一样，CPU 性能仍然是影响设备性能的主要因素。在理想情况下，你所有的目标设备都有充足的性能，你可以直接编写代码，而无需考虑消耗的 CPU
    周期。


    然而，现实情况很少如此。即使设备足够快，让 CPU 以 100% 的负载运行也会显著降低电池寿命，因此这并非一个真正的选择。此外，你需要支持的大多数设备的
    CPU 频率在 100-300 MHz 范围内，这与现代智能手机通常从 600 MHz 起步相比相形见绌。


    **提示：** 尽早识别潜在 CPU 碎片化问题的一个好方法是，将你正在使用的模拟器性能限制在目标真实设备性能的约 80%。这意味着，即使在将应用程序运行到真实设备上之前，你也能发现这方面的问题。


    处理 CPU 碎片化最显而易见的方法是优化你的代码，使其性能达到可接受的水平，即使在低端设备上也是如此。这将在另一章中介绍。尽管如此，在某些情况下，这根本无法做到（要么是因为所使用的算法本身不允许，要么是因为设备性能确实不够强大）。当这种情况发生时，你可以尝试一些技巧。


    你应该尝试的第一件事是平滑 CPU 使用率曲线。在典型的使用场景中，CPU 在 80% 的时间里处于空闲或接近空闲状态（例如，当用户未与应用程序交互或仅在菜单中导航时），而在剩余的
    20% 时间里则全速运行（这时 CPU 碎片化问题就变得明显了）。你可以做的是，利用那段接近空闲的时间，为即将到来的 CPU 密集型任务做好准备。


    例如，你可以让一个后台线程预处理数据，为应用程序将要进行的实际处理做好准备。如果你正在编写一个类似黄页的应用程序，需要聚合来自不同来源的联系人，你可以让后台线程在用户浏览菜单时对聚合后的联系人列表进行排序。这样，当用户实际使用搜索功能时，列表已经排序完毕，应用程序的响应会非常迅速——从而消除了
    CPU 碎片化问题。


    **提示：** 在进行后台预处理时，注意不要占用过多的 CPU 时间，否则就失去了意义。确保预处理保持在后台运行的一个简单方法是，将你要处理的数据分割成更小的数据包（如第
    1 章所述），并安排在 CPU 使用率低于某个阈值时处理这些数据包。


    你应该尝试的第二件事是，当 CPU 使用率接近 100% 时，降低所有不必要的 CPU 使用。例如，如果你的应用程序 UI 以 30 FPS 运行，可以考虑在
    CPU 密集型情况下将其降至 20 FPS，或者暂时禁用一些花哨的视觉效果。如果你的应用程序设计为尽可能快地执行大量计算（例如，电子表格程序），你可以对此进行节流（例如，每秒计算不超过
    X 个单元格）。


    一个很少被考虑的 CPU 使用来源是垃圾回收器。通过改进你创建、使用和销毁对象的方式，在某些情况下可以显著降低 CPU 使用率。例如，你可以创建一个对象池并重复使用这些对象，而不是每次都创建新对象。关于垃圾回收器以及如何在这方面提高性能的更多信息将在下一章中给出。

    '
- fmt: 'If at this point you''re still having performance problems, you should spend
    some time to generate a device VM profile in order to find out more about the
    device''s behavior for VM-related operations. This profile should contain useful
    information related to how the device''s VM works and how its inner workings impact
    CPU usage and performance. For example, how many threads can you start before
    the overhead of switching between threads becomes apparent? How much slower is
    synchronized code compared to non-synchronized code? How much time does the VM
    take to clean 100 objects? What about 10,000? What if said objects are linked?
    Does the object size and type matter? What about object allocation and creation—how
    long does that take? Does it matter if the object is a native one, such as an
    image, or an application-defined one?


    **NOTE:** You have to generate this profile by writing one or more sample applications
    to test each of the aspects you are interested in. To my knowledge, there is no
    ready-made application that does this. And, considering how highly empirical many
    of these tests are, chances are there won''t be one anytime soon.


    Once you have as much information about the device as possible, you can use this
    to adapt and optimize your application to the specific device you''re having problems
    with. If you''re using too many threads, consider consolidating related tasks
    into a single thread. If that synchronized section runs as slow as a snail, try
    reworking your program flow so that the `synchronized` directive isn''t needed
    (even if this requires a bit of “hacking”). If disposing of 1,000 cross-linked
    objects is considerably slower than disposing of 1,000 individual objects, un-link
    them manually before the garbage collector gets called.


    Please note that this profiling-and-adapting process is completely different from
    optimizing the code itself. While code optimization relies on mathematical and
    concrete data that is generally applicable to all devices (i.e., addition is always
    faster than multiplication, quick sort is faster than bubble sort, etc.), the
    kinds of optimizations just described are more empirical and rely on hands-on,
    device-specific knowledge. What works great on one device might have no impact
    on another, or might even make things worse. If anything, this is more voodoo
    than programming. Sometimes you''ll spend a lot of time doing this for nothing,
    while other times you will strike gold early on—this unpredictability of results
    is why you should try this only last. Regardless, the upshot of this technique
    is that you''ll gain a more intimate and intuitive knowledge of the device you''re
    profiling, which can help not only improve performance but also identify bugs
    and other application issues. You also have to do this only once per device, as
    the acquired knowledge can be applied to other projects as well.


    Also keep in mind that these “device adaptations” can sometimes require you to
    actually undo some performance optimizations you''ve made initially. For example,
    optimizing algorithms and code generally results in an increase in code size.
    However, on some devices, if a method''s body is too large, performance is decreased
    considerably, because the JVM and/or CPU has to “jump” between different code
    sections. In this case, you must either split the method into two or more smaller
    ones and suffer the incurred overhead, or decrease the method size (by giving
    up on some of the optimizations). While in theory both options should be slower
    than the optimized code, in real life they are actually faster because of the
    way the JVM works.


    Finally, you should be aware of the fact that sometimes devices underclock their
    CPUs to conserve battery life. They do this automatically when battery charge
    falls below a certain level, and there is typically no way to prevent this from
    happening. This means that your application can (and most likely will) perform
    below expectations in these situations.


    By applying the tips and techniques presented in this section, you will be able
    to alleviate the perceived performance hit. Alternatively, you can design your
    application to make due with roughly 50–60% of the total CPU power available in
    normal circumstances. This way, when the underclock kicks in, the application
    will still have enough CPU cycles to run adequately. The obvious catch is that
    50% of the total CPU power may not be enough for your application''s needs.'
  raw: 'If at this point you''re still having performance problems, you should spend
    some time to generate a device VM profile in order to find out more about the
    device''s behavior for VM-related operations. This profile should contain useful
    information related to how the device''s VM works and how its inner workings impact
    CPU usage and performance. For example, how many threads can you start before
    the overhead of switching between threads becomes apparent? How much slower is
    synchronized code compared to non-synchronized code? How much time does the VM
    take to clean 100 objects? What about 10,000? What if said objects are linked?
    Does the object size and type matter? What about object allocation and creation—how
    long does that take? Does it matter if the object is a native one, such as an
    image, or an application-defined one?


    **NOTE:** You have to generate this profile by writing one or more sample applications
    to test each of the aspects you are interested in. To my knowledge, there is no
    ready-made application that does this. And, considering how highly empirical many
    of these tests are, chances are there won''t be one anytime soon.


    Once you have as much information about the device as possible, you can use this
    to adapt and optimize your application to the specific device you''re having problems
    with. If you''re using too many threads, consider consolidating related tasks
    into a single thread. If that synchronized section runs as slow as a snail, try
    reworking your program flow so that the `synchronized` directive isn''t needed
    (even if this requires a bit of “hacking”). If disposing of 1,000 cross-linked
    objects is considerably slower than disposing of 1,000 individual objects, un-link
    them manually before the garbage collector gets called.


    Please note that this profiling-and-adapting process is completely different from
    optimizing the code itself. While code optimization relies on mathematical and
    concrete data that is generally applicable to all devices (i.e., addition is always
    faster than multiplication, quick sort is faster than bubble sort, etc.), the
    kinds of optimizations just described are more empirical and rely on hands-on,
    device-specific knowledge. What works great on one device might have no impact
    on another, or might even make things worse. If anything, this is more voodoo
    than programming. Sometimes you''ll spend a lot of time doing this for nothing,
    while other times you will strike gold early on—this unpredictability of results
    is why you should try this only last. Regardless, the upshot of this technique
    is that you''ll gain a more intimate and intuitive knowledge of the device you''re
    profiling, which can help not only improve performance but also identify bugs
    and other application issues. You also have to do this only once per device, as
    the acquired knowledge can be applied to other projects as well.


    Also keep in mind that these “device adaptations” can sometimes require you to
    actually undo some performance optimizations you''ve made initially. For example,
    optimizing algorithms and code generally results in an increase in code size.
    However, on some devices, if a method''s body is too large, performance is decreased
    considerably, because the JVM and/or CPU has to “jump” between different code
    sections. In this case, you must either split the method into two or more smaller
    ones and suffer the incurred overhead, or decrease the method size (by giving
    up on some of the optimizations). While in theory both options should be slower
    than the optimized code, in real life they are actually faster because of the
    way the JVM works.


    Finally, you should be aware of the fact that sometimes devices underclock their
    CPUs to conserve battery life. They do this automatically when battery charge
    falls below a certain level, and there is typically no way to prevent this from
    happening. This means that your application can (and most likely will) perform
    below expectations in these situations.


    By applying the tips and techniques presented in this section, you will be able
    to alleviate the perceived performance hit. Alternatively, you can design your
    application to make due with roughly 50–60% of the total CPU power available in
    normal circumstances. This way, when the underclock kicks in, the application
    will still have enough CPU cycles to run adequately. The obvious catch is that
    50% of the total CPU power may not be enough for your application''s needs.'
  trans: '

    如果此时你仍然遇到性能问题，你应该花些时间生成一份设备虚拟机（VM）配置文件，以便更深入地了解该设备在虚拟机相关操作方面的行为。这份配置文件应包含与设备虚拟机工作原理及其内部机制如何影响
    CPU 使用率和性能相关的有用信息。例如：在启动多少个线程后，线程切换的开销会变得明显？同步代码比非同步代码慢多少？虚拟机清理 100 个对象需要多长时间？清理
    10,000 个对象呢？如果这些对象是相互关联的，情况又如何？对象的大小和类型是否重要？对象的分配与创建——这一过程需要多长时间？对象是原生类型（如图像）还是应用自定义类型，这有影响吗？


    **注意：** 你必须通过编写一个或多个示例应用程序来测试你感兴趣的每个方面，从而生成这份配置文件。据我所知，目前还没有现成的应用程序能做到这一点。而且，考虑到这些测试中有许多具有高度的经验性，短期内也不太可能出现这样的工具。


    一旦你尽可能多地获取了关于该设备的信息，就可以利用这些信息来调整和优化你的应用程序，使其适应你遇到问题的特定设备。如果你使用了过多线程，可以考虑将相关任务合并到单个线程中。如果那个同步代码段运行得慢如蜗牛，可以尝试重新设计程序流程，使得不再需要`synchronized`指令（即使这需要一些“黑客手段”）。如果清理
    1000 个交叉关联的对象比清理 1000 个独立对象慢得多，可以在垃圾回收器被调用之前手动解除它们之间的关联。


    请注意，这种“分析并适配”的过程与优化代码本身完全不同。代码优化依赖于数学和具体数据，这些数据通常适用于所有设备（例如，加法总是比乘法快，快速排序比冒泡排序快等），而刚才描述的那种优化则更具经验性，依赖于实践经验和特定设备的知识。在一个设备上效果很好的优化，在另一个设备上可能毫无影响，甚至可能让情况变得更糟。与其说这是编程，不如说这更像是一种“巫术”。有时你会为此花费大量时间却一无所获，而有时你则能早早挖到“金矿”——这种结果的不确定性正是你应该最后才尝试这种方法的原因。无论如何，这种技术的好处在于，你会对你所分析的设备获得更深入、更直观的理解，这不仅有助于提升性能，还能帮助识别错误和其他应用程序问题。而且，每个设备你只需要做一次这样的分析，因为获得的知识可以应用到其他项目中。


    同时请记住，这些“设备适配”有时可能需要你撤销最初所做的一些性能优化。例如，优化算法和代码通常会导致代码体积增大。然而，在某些设备上，如果方法体过大，性能会显著下降，因为
    JVM 和/或 CPU 不得不在不同的代码段之间“跳转”。在这种情况下，你必须要么将方法拆分成两个或多个更小的方法，并承受由此带来的开销，要么（通过放弃部分优化来）减小方法体积。虽然理论上这两种选择都比优化后的代码慢，但在实际应用中，由于
    JVM 的工作方式，它们反而会更快。


    最后，你应该意识到一个事实：有时设备会降低 CPU 频率以节省电池电量。当电池电量低于某个水平时，设备会自动执行此操作，并且通常无法阻止这种情况发生。这意味着你的应用程序在这些情况下可能（而且很可能）会表现不佳。


    通过应用本节中介绍的技巧和方法，你将能够缓解这种可感知的性能下降。或者，你可以将应用程序设计为在正常情况下仅使用总 CPU 能力的约 50-60%来运行。这样，当降频发生时，应用程序仍然有足够的
    CPU 周期来正常运行。一个明显的缺点是，总 CPU 能力的 50%可能无法满足你应用程序的需求。

    '
- fmt: '#### RAM


    可用 RAM 的数量可能是仅次于 CPU 性能的导致硬件碎片化的第二大原因。可用 RAM 较少会以多种方式引发问题。最明显的问题是在运行时可能直接耗尽内存。其他潜在问题包括：垃圾回收器过于频繁地触发（因为内存消耗更快）、流媒体因持续卡顿和缓冲而中断（因为分配的缓冲区更小），以及设备整体性能变慢（即使在应用程序之外）。


    问题在于，虽然某些高端设备允许 Java ME 应用程序使用数十兆字节的 RAM，但低端设备通常仅提供 1–2 兆字节，有时甚至更少。为应对这种差异，您应在设计和编码时从内存角度采取防御性策略，并实现一些“安全特性”。


    首先，您应该检查数据结构，看是否存在重复信息。所有适用于数据库规范化的原则在此同样适用；但需要牢记的一条原则是：应用程序中的每条信息（例如，人的姓名或地址）在数据结构中应仅出现一次。如果出现多次，则应重构数据结构，使该信息仅存在于单个数据结构中，而所有其他出现或引用都指向该数据结构。


    将此原则全局应用于应用程序中的所有数据结构，可以显著增加可用内存，尤其是在通常数据密集型的业务相关应用中。请记住，通常不可能移除所有重复信息。例如，您可能遗留了重复数据，因为无法访问类的受保护/私有字段（这些字段有时用于保存数据的本地副本而非引用），因为第三方库的内部实现通常不可触及，或者因为您可能需要在某些情况下使用同一数据的不同表示或编码，而动态计算这些表示并不可行。根据我的经验，根据应用程序的不同，通常可以消除
    30–70% 的重复数据——这仍然可以节省大量内存。


    如果上述技术未达到预期效果，下一步应尝试最小化存储在内存中的信息量。检查您未使用的数据字段并直接移除它们。移除那些可以在运行时轻松计算的信息（例如，如果您有某人的出生日期，则无需单独记录其星座、年龄或其他相关信息）。尝试为数据寻找更节省空间的替代编码（例如，使用
    JSON 代替 XML，并使用数据压缩技术存储长字符串）。在数据不再需要时立即丢弃（例如，一旦将对象的 JSON 表示转换为实际对象，立即丢弃 JSON 字符串及其所有相关内容）。


    如果在此之后内存仍然不足，则应尝试寻找替代存储空间。例如，可以使用 RMS 或设备的文件系统作为一种交换文件，来存储内存不足的对象。通常设备上（通过 RMS
    和文件系统）可用的存储空间远多于 RAM，因此在处理大量数据时这很有意义。但请注意：存储在 RMS 或文件系统中的数据可能被其他未经授权的应用程序或用户访问，因此不要在那里存储敏感或个人数据。


    如果您决定使用替代存储空间，请记住其读写速度可能比内存操作慢一到两个数量级。因此，您应维护一个包含替代存储中信息的索引，该索引应包含最常用于搜索操作的字段的值。此外，该索引应易于搜索，因此如果可能，您实际上应该拥有多个索引，每个常用字段一个。


    例如，考虑一个处理大量人员记录的应用程序，每条记录包含人的名字、姓氏、位置、年龄、性别以及其他信息，如备注、文档等。在此应用程序中，最常用的搜索条件是人的姓名和/或位置。理想情况下，您应该在此场景中拥有两个索引。第一个索引包含每个人的姓名以及指向替代存储中完整记录的引用（例如，可能是
    RMS 记录索引），并根据姓名字段排序。第二个索引类似，只是将姓名字段替换为位置字段。接下来，当查找位于“Arizona”且姓氏为“Atkinson”的人时，应用程序只需执行两次二分搜索（每个字段一次），并交叉引用结果。如果操作得当，这个过程可以非常快。此外，只需一次二分搜索操作即可完成此特定搜索，这进一步加快了速度。优化搜索将在下一章讨论。


    如果执行上述所有操作后内存仍然不足，那么是时候采取严厉措施了。如果您正在编写客户端-服务器应用程序，请考虑将通常在客户端执行的一些操作（如搜索）卸载到服务器。对于这些操作，客户端应用程序本质上成为服务器上运行的代码的哑终端。这可以显著减少设备上的
    CPU 和 RAM 使用，但代价是增加服务器的 CPU 和 RAM 使用以及网络流量。这种方法的主要问题是网络流量增加，这通常意味着用户使用应用程序的总成本上升，有时甚至显著上升。


    **注意：** 在客户端-服务器场景中，有时内存短缺问题是因为没有为移动设备设计的 API/协议。例如，如果 Web 服务请求返回 512 KB 的响应，在桌面上处理是可以的，但如果移动设备必须接收并处理
    512 KB 的 XML 字符串，那就有麻烦了。考虑实现一个专用的移动 API/协议，该协议返回更少的数据（例如，仅返回记录的必要字段；检索其余字段可以通过单独的请求完成），并使用更高效的编码（我是否提过
    XML 并不真正适合移动通信？）。


    如果您正在编写的是独立应用程序而非客户端-服务器应用程序，那么此时您基本上无能为力。现实是，至少存在一种场景，您的应用程序无论如何都会耗尽内存。此时唯一明智的做法是：要么将有问题的设备移至“不支持”状态，发布声明说明应用程序在某些场景下可能耗尽内存，指示用户在支持多任务的有问题设备上关闭所有其他正在运行的应用程序，最后重新调整规格以降低内存使用（这通常涉及削减或完全移除某些功能）。这些选项都不特别吸引人，但现实就是如此。'
  raw: '#### RAM


    The amount of available RAM is probably the second biggest cause of hardware fragmentation,
    next to CPU power. Having a lower amount of RAM available can cause problems in
    many ways. The most obvious issue is that you may simply run out of memory at
    runtime. Other potential problems are the garbage collector kicking in way too
    often (because memory gets used up faster), streaming media being interrupted
    by constant stuttering and buffering (because the allocated buffers are smaller),
    and overall slower device performance (even outside the application).


    The problem is that, while some high-end devices allow Java ME applications to
    use tens of megabytes of RAM, low-end devices typically offer only 1–2 megabytes,
    sometimes considerably less. To cope with this difference, you should design and
    code your application defensively in terms of memory and implement a few “safety
    features.”


    Probably the first thing you should do is examine your data structures and see
    if any information is duplicated. All the principles that apply to database normalization
    also apply here; however, the one to remember is the one that states that every
    piece of information in your application (for example, a person''s name or address)
    should appear once and only once within your data structures. If it appears more
    than once, then you should refactor your data structures by having said information
    present only within a single data structure, and have all other occurrences or
    references point to this data structure instead.


    Applied globally to all the data structures within your application, this can
    result in significant gains in terms of free memory, especially in business-related
    applications, which are typically data-intensive. Keep in mind that usually it''s
    not possible to remove all duplicate information. For example, you may have left-over
    duplicates because you do not have access to protected/private fields of classes
    (which are sometimes used to keep local copies of data, instead of references),
    because the inner workings of third-party libraries are usually off-limits, or
    because you may simply need different representations or encodings of the same
    data in situations in which computing these representations dynamically is not
    feasible. From my experience, you can usually eliminate 30–70% of all duplicates
    depending on the application—which can still add up to a lot of memory.


    If the foregoing technique does not produce the desired results, the next thing
    you should attempt to do is minimize the amount of information stored in memory.
    Check for data fields that you do not use and simply remove them. Remove information
    that you can easily compute at runtime (for example, if you have a person''s date
    of birth, you don''t really need to separately keep track of his star sign, age,
    or other related information). Try to find alternate, more space-efficient encodings
    for your data (for example, use JSON instead of XML and store long strings using
    data compression techniques). Discard data the moment it''s not needed anymore
    (for example, once you have converted a JSON representation of an object to an
    actual object, immediately discard the JSON string and everything associated with
    it).


    If, after this, you''re still short on memory, then you should try to find alternative
    storage space. For example, the RMS or the device''s filesystem can be used as
    a kind of swapfile that can store objects for which there is not enough memory
    anymore. Typically there''s a lot more storage space available on the device (via
    the RMS and the filesystem) than there is RAM, so this certainly makes sense if
    you''re handling large amounts of data. Be careful, though: data stored in the
    RMS or on the filesystem might be accessed by other non-authorized applications
    or users, so don''t store sensitive or personal data there.


    If you decide to use alternative storage space, please keep in mind that the read/write
    speed can be an order or two of magnitude less than the read/write speed of in-memory
    operations. Because of this, you should keep an index of the information contained
    in the alternative storage, and this index should contain the values of the fields
    most commonly used for search operations. Furthermore, this index should be easily
    searchable, so if possible you should actually have multiple indexes, one for
    each commonly used field.


    For example, let''s consider an application that deals with lots of people records,
    each record containing a person''s first name, last name, location, age, sex,
    and other information such as notes, documents, and more. Within this application,
    the most commonly used search criteria are a person''s name and/or location. Ideally
    you would have two indexes in this situation. The first index would contain each
    person''s name and a reference to the full record within the alternative storage
    (might be RMS record index, for example), and would be sorted according to the
    name field. The second index would be similar, except the name field will be replaced
    with the location field. Next, when looking for people with the last name “Atkinson”
    located in “Arizona,” all the application would have to do is two binary searches,
    one for each field, and cross-reference the results. If done properly, this process
    can be extremely fast. Furthermore, it is possible to do this particular search
    with only one binary search operation, which speeds things up even more. Optimizing
    searches will be discussed in the next chapter.


    If you''re still running low on memory after doing all of the foregoing, it''s
    time for drastic measures. If you''re writing a client-server application, then
    consider offloading to the server some of the operations normally done on the
    client, like searching. For these operations, the client application essentially
    becomes a dumb terminal for the code running on the server. This can drastically
    reduce CPU and RAM usage on the device, at the expense of server CPU and RAM usage
    and network traffic. The main problem with this approach is the increase in network
    traffic, which typically means that the user''s total cost of using the application
    goes up, sometimes significantly.


    **NOTE:** In client-server scenarios, sometimes memory shortage problems occur
    because there''s no API/protocol designed with mobile devices in mind. For example,
    it''s OK if a web service request returns a 512 KB response if said response is
    processed on a desktop, but if a mobile device has to receive and process a 512
    KB XML string, then you''re in trouble. Consider implementing a dedicated mobile
    API/protocol, which returns less data (for example, only the essential fields
    of a record; retrieving the remaining fields can be done via a separate request)
    and which uses a more efficient encoding (did I mention that XML isn''t really
    suited for mobile communications?).


    If you''re writing a stand-alone application and not a client-server one, then
    you''re pretty much out of luck at this point. The reality is that there is at
    least one scenario in which your application will simply run out of memory, no
    matter what. The only sensible things you can do at this point are to either move
    the problematic device(s) to “unsupported” status, issue a disclaimer that the
    application might run out of memory in some scenarios, instruct the user to close
    all other running apps if the problematic devices support multitasking, and finally
    rework the specifications so that the memory usage is lowered (this typically
    involves trimming down or altogether removing some features). None of these options
    are particularly appealing, but that''s simply the way things are.'
  trans: '

    #### 内存


    可用内存的大小很可能是导致硬件碎片化的第二大原因，仅次于 CPU 性能。可用内存较少会以多种方式引发问题。最明显的问题是在运行时可能直接耗尽内存。其他潜在问题包括：垃圾回收器过于频繁地启动（因为内存消耗更快）、流媒体因持续卡顿和缓冲而中断（因为分配的缓冲区更小），以及设备整体性能变慢（即使在应用程序之外也是如此）。


    问题在于，虽然一些高端设备允许 Java ME 应用程序使用数十兆字节的内存，但低端设备通常只提供 1-2 兆字节，有时甚至更少。为了应对这种差异，你应该在内存方面以防御性方式设计和编码应用程序，并实现一些“安全特性”。


    你可能要做的第一件事是检查数据结构，看看是否有任何信息被重复存储。所有适用于数据库规范化的原则在这里也同样适用；然而，需要记住的一条原则是：应用程序中的每一条信息（例如，一个人的姓名或地址）在数据结构中应该只出现一次。如果它出现多次，那么你应该重构数据结构，让该信息只存在于一个数据结构中，而所有其他出现或引用都指向这个数据结构。


    将此原则全局应用于应用程序中的所有数据结构，可以显著增加可用内存，尤其是在通常数据密集型的业务相关应用程序中。请记住，通常不可能移除所有重复信息。例如，你可能因为无法访问类的受保护/私有字段（这些字段有时用于保存数据的本地副本，而非引用）、因为第三方库的内部实现通常不可触及，或者因为你在无法动态计算这些表示形式的情况下，可能需要同一数据的不同表示或编码，而残留一些重复信息。根据我的经验，根据应用程序的不同，你通常可以消除
    30%到 70%的重复信息——这仍然可以节省大量内存。


    如果上述技术没有产生理想的结果，那么接下来你应该尝试最小化存储在内存中的信息量。检查你不使用的数据字段并直接删除它们。移除那些可以在运行时轻松计算的信息（例如，如果你有某人的出生日期，就不需要单独记录他的星座、年龄或其他相关信息）。尝试为你的数据寻找更节省空间的替代编码方式（例如，使用
    JSON 代替 XML，并使用数据压缩技术存储长字符串）。在数据不再需要时立即丢弃（例如，一旦将对象的 JSON 表示转换为实际对象，就立即丢弃 JSON
    字符串及其所有相关内容）。


    如果在此之后，你仍然内存不足，那么你应该尝试寻找替代的存储空间。例如，可以使用 RMS 或设备的文件系统作为一种交换文件，来存储那些内存已不足以容纳的对象。通常，设备上（通过
    RMS 和文件系统）可用的存储空间比 RAM 多得多，因此如果你处理大量数据，这当然是有意义的。不过要小心：存储在 RMS 或文件系统中的数据可能被其他未经授权的应用程序或用户访问，因此不要在那里存储敏感或个人数据。


    如果你决定使用替代存储空间，请记住，其读写速度可能比内存操作的读写速度慢一到两个数量级。因此，你应该维护一个包含替代存储中信息内容的索引，并且该索引应包含最常用于搜索操作的字段的值。此外，这个索引应该易于搜索，所以如果可能，你实际上应该拥有多个索引，每个常用字段一个。


    例如，考虑一个处理大量人员记录的应用程序，每条记录包含一个人的名字、姓氏、位置、年龄、性别以及其他信息，如备注、文档等。在这个应用程序中，最常用的搜索条件是人的姓名和/或位置。理想情况下，在这种情况下你应该有两个索引。第一个索引将包含每个人的姓名以及指向替代存储中完整记录的引用（例如，可能是
    RMS 记录索引），并根据姓名字段进行排序。第二个索引类似，只是姓名字段将被位置字段替换。接下来，当查找位于“亚利桑那州”且姓氏为“Atkinson”的人时，应用程序只需进行两次二分查找，每个字段一次，然后交叉引用结果。如果操作得当，这个过程可以非常快。此外，只需一次二分查找操作就可以完成这个特定的搜索，这进一步加快了速度。优化搜索将在下一章讨论。


    如果执行了上述所有操作后，你仍然内存不足，那么是时候采取严厉措施了。如果你正在编写一个客户端-服务器应用程序，那么考虑将一些通常在客户端执行的操作（如搜索）卸载到服务器上。对于这些操作，客户端应用程序基本上变成了服务器上运行代码的哑终端。这可以显著减少设备上的
    CPU 和内存使用，代价是服务器 CPU 和内存使用以及网络流量的增加。这种方法的主要问题是网络流量的增加，这通常意味着用户使用应用程序的总成本上升，有时甚至显著上升。


    **注意：** 在客户端-服务器场景中，有时内存短缺问题的发生是因为没有针对移动设备设计的 API/协议。例如，如果一个 Web 服务请求返回 512 KB
    的响应，在桌面上处理该响应是可以的，但如果移动设备必须接收并处理一个 512 KB 的 XML 字符串，那么你就麻烦了。考虑实现一个专用的移动 API/协议，它返回更少的数据（例如，只返回记录的基本字段；检索其余字段可以通过单独的请求完成），并使用更高效的编码（我是不是提过
    XML 并不真正适合移动通信？）。


    如果你正在编写一个独立应用程序而不是客户端-服务器应用程序，那么此时你基本上就无能为力了。现实情况是，至少存在一种场景，你的应用程序无论如何都会耗尽内存。此时你唯一能做的合理事情是：要么将有问题的设备移至“不支持”状态，要么发布免责声明说明应用程序在某些场景下可能耗尽内存，如果问题设备支持多任务处理，则指示用户关闭所有其他正在运行的应用程序，最后重新调整规格以降低内存使用量（这通常涉及削减或完全移除某些功能）。这些选项没有一个特别有吸引力，但现实就是如此。'
- fmt: 'The final aspect to consider related to RAM fragmentation issues is access
    time. This is pretty much a moot point these days, but you should be aware that
    different devices have different RAM access times for a variety of reasons, ranging
    from hardware design (e.g., memory paging scheme and page size) to VM behavior
    (e.g., range checking on arrays). RAM access time usually doesn''t matter that
    much compared to other factors (RAM size, CPU power), but you might hit the odd
    scenario in which it does. Should this happen, you will find a few tips in the
    next chapter to help you minimize its effects.


    ### Screen


    After CPU and RAM, the biggest difference between mobile devices lies in the screen.
    The main parameters to take into consideration are screen resolution and physical
    size. Constructing a high-quality mobile interface to suit your target devices
    is mostly a design task, so this section will be brief.


    The most important thing to do is to choose a UI framework/library that supports
    dynamic layouts, layouts that can resize themselves to fit any given screen size
    and orientation. This minimizes the amount of design and programming needed to
    support all target devices.


    Second, you should create your basic design guidelines and layout based on the
    lowest common denominator. That is, your reference UI should look OK on the lowest
    device you will target. This reference UI will then be adapted for higher-end
    devices to take advantage of their superior screen characteristics, not the other
    way around (i.e., the UI is first designed for high-end devices and then stripped
    down to work on low-end devices).


    Third, you should always hide unneeded information and UI elements and have as
    little wasted space as possible. For example, scrollbars are needed only when
    actually scrolling. If you hide them in all other situations, you can save a few
    pixels, while at the same time making the design feel less cluttered. New notifications
    of any kind can be signaled by a small icon between the two onscreen softkey buttons
    (there is usually enough space between them to fit a small icon; this space would
    otherwise go unused). Tickers and tabs are great ways to maximize screen real
    estate—use them wisely, but be careful not to overdo it.


    Fourth, all application functionality should be accessible via both touch and
    key input. This is becoming increasingly important with the proliferation of touchscreen
    devices. Probably the biggest problem I have seen with mixed-mode applications
    is that the UI elements are simply too small to be used via touch, especially
    when no stylus is available. Because of this, consider adding a “large UI” option
    in the settings screen. Also, especially for smaller UI elements, consider adding
    a small margin of error for touch events. For example, if the user presses the
    screen ten pixels outside a check box and there''s no other UI element there,
    it''s safe to consider that he intended to press the check box. There''s nothing
    more frustrating for a user than having to exactly press a very small area of
    the screen with his or her finger, especially if said finger is larger than average.


    Another important aspect to consider here is text input. This can be either handled
    inside the application or deferred to the system (i.e., display a native `TextBox`
    when the user clicks on a text field). Handling it natively has the advantage
    of supporting the text input methods the user is accustomed to, as well as features
    such as autocompletion, but it also has the major disadvantage of breaking the
    program flow, as being shown a native `TextBox` in the middle of using an application
    is disruptive to say the least. Handling text input within the application via
    a custom virtual keyboard is significantly less disruptive, but can be frustrating
    for some users if the keyboard is not properly designed (for example, if the keys
    are too small or too far apart) and is not properly positioned (i.e., instead
    of displacing other UI elements, it overlaps and thus hides them). Furthermore,
    it also means that features such as autocompletion are not available.


    Choosing one method or the other depends heavily on the specific needs of the
    application. For entering shorts bursts of text, such as a username, password,
    or search criteria, the virtual keyboard approach is certainly best. For entering
    larger amounts of text, such as an e-mail, the native text input mechanism is
    better overall. You should also never mix the two input methods, as this is extremely
    confusing for most users.


    The application should also support touch-specific extensions to common usage
    scenarios. For example, the user should be able to scroll both by dragging the
    scrollbar and by flicking whatever content needs to be scrolled (i.e., kinetic
    scrolling). Horizontal swipe events should also be registered as back/forward
    commands where applicable. Long taps should bring up the contextual menu for the
    selected item, if any. These fine touches enhance the user experience considerably
    and bridge the gap between native applications and Java ME applications.


    The final aspect you should consider is the screen''s number of colors. While
    a difference between screens supporting 65,536 colors and screens supporting 16
    million colors does exist, it isn''t that noticeable in practice. However, the
    difference between 65,536 and 4,096 colors or less is huge. Should you have to
    target both categories of devices, you will probably need to have separate graphics
    for each, optimized for their respective number of colors.'
