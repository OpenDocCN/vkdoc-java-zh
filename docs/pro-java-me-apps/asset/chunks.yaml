    As you can see, the `TweetsController` also responds to the `APPLICATION_START`
    event, by initializing its `TwitterServer`. In general, controllers that are almost
    surely used should initialize their underlying data structures and entities when
    an `APPLICATION_START` event is received, while controllers that may not ever
    be used (as is the case of controllers tied to application forms, something we
    will see shortly) should initialize their underlying data structures and entities
    only when actually needed (lazy initialization).


    This typically results in a fast startup process and a fairly smooth user experience
    during runtime, which is especially important if your app is to run on lower-end
    Java ME devices. As a counter-example, imagine what would happen if all the controllers
    in an application would initialize themselves at startup: the startup process
    would take a long time (or longer than necessary, anyway), and there is a distinct
    possibility that the device would start to run out of resources while attempting
    to initialize everything at once, which would result in even worse performance
    or even in application crashes.'
