  trans: '

    ## **UI 模块**


    编写移动应用程序最棘手、也最令人有成就感的部分，在我看来，就是编写其 UI 模块。Java ME 与其他移动平台的一个显著区别在于，为了获得任何有用的功能，你必须从头开始编写
    UI——直至最底层的低级绘图调用。内置的 UI 包对于现代使用来说已经过于陈旧。


    从头编写 UI 模块需要掌握许多领域的知识，从计算几何到用户体验分析和界面设计，因此并非易事。然而，这确实为你提供了完全的自由，让你能以任何你认为合适的方式设计和实现
    UI，并让你能够发挥极致的创造力。此外，与你正在编写的代码进行视觉交互总是一种极好的体验——因此，这项努力中也蕴含着巨大的乐趣。


    在本章中，我们将介绍 UI 实现的基本原理和概念，并为我们的应用程序编写一个简单但功能齐全的 UI 模块——你也可以在其他应用程序中重复使用它。为了保持代码简单易懂，外观和感觉将非常基础，但你可以根据需要自由添加各种花哨的功能。


    一个优秀的 Java ME UI 需要在代码灵活性、恰当的编程技术、可用性和代码复杂性之间取得微妙的平衡。它介于 SWING（功能强大但过于冗长且资源密集）和原生
    Java ME UI（简单且速度极快，但对于现代使用来说过于受限）之间。


    我们的 UI 模块将力求恰好处于正确的位置。它的编写方式将支持你可能希望实现的任何类型的小部件和容器，同时保持快速和易用。为了可读性和简洁性，代码不会进行任何优化。例如，代码将大量使用递归。这可以大大减少，但代价是增加代码复杂性，这不是本书的目的。本书后面将讨论优化代码的方法——将它们应用于
    UI 模块是一个很好的练习！![images](img/smile.jpg)


    UI 模块还将涵盖我们应用程序所需的基本组件：按钮、标签、输入字段、水平布局容器和垂直布局容器。最后，它的目标是功能齐全，而非美观，所以不要期待最先进的视觉体验。也不应期望它在某些事情的处理方式上非常智能。我决定保持简单和“笨拙”，以便更容易理解这些概念；我将在本书后面向你展示如何让
    UI 模块更智能。


    **注意：** 要在 WTK 2.5.2 及更早版本的模拟器上运行本章代码，你需要为它们启用触摸支持。为此，请转到 `WTK_HOME_FOLDER\wtklib\devices\DefaultColorPhone`
    并找到配置文件 `DefaultColorPhone.properties`。打开它，找到 `touch_screen` 属性并将其设置为 `true`。


    ### 为什么要创建自定义 UI 模块？


    现实情况是，对于大多数项目，最好使用现成的第三方 UI 库。第三方 UI 库通常比你自行开发的库具有更好的打磨和更丰富的功能集。那么，为什么要学习如何编写自己的
    UI 模块呢？


    嗯，在很多情况下，掌握编写 UI 模块所需的技能会派上用场。有很多项目，尤其是个人项目，由于许可、形象或预算问题，无法使用第三方库。其他时候（实际上相当频繁），你开始时使用第三方
    UI 库，但在开发过程中，你需要使用自定义组件和/或行为来修改或扩展它。如果你的目标设备资源有限，比如较旧的手机，那么你可能会发现第三方库根本无法在这些设备上良好运行（或根本无法运行）。


    编写自己的 UI 模块也是一项非常有教育意义的练习，无论你经验多么丰富，几乎可以肯定，完成它至少会让你学到一些新东西。最后，如果你投入足够的资源，你甚至可以将你的
    UI 模块变成一个独立的产品并从中获利，或者至少将其作为向潜在客户展示你技能的非常直观且令人信服的证明。


    基于这些原因以及其他许多原因，了解如何编写自己的 UI 模块，或者至少理解 UI 模块功能的基本原理，是值得的。


    ### 理解创建 UI 模块的基础知识


    在我们深入代码之前，我们应该先看一些理论方面的问题，以便更好地理解我们将在本章中创建的内容。例如，你可能已经直观地知道什么是小部件，什么是容器。你可能不知道的是如何以
    Java ME 的方式定义这些实体，提供恰到好处的功能和信息，使它们可用，同时防止代码变得臃肿和资源密集。

