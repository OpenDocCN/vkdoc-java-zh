- fmt: "# BaseContainerWidget and BaseContainerManager\n\nThe `BaseContainerWidget`\
    \ will serve as the basis for all the containers in the UI module. There really\
    \ is nothing special about it; what it does is map all methods like `addWidget()`,\
    \ `insertWidget()`, and `getWidget()` to a `Vector` instance. Apart from this,\
    \ it also provides the means to set and retrieve the container scroll, but that’s\
    \ just about it.\n\nIt is declared as abstract, so that sub-classes must explicitly\
    \ implement its two most important methods, which are `paint()` and `doLayout()`.\n\
    \n`BaseContainerManager`, the direct descendent of `BaseContainerWidget`, is another\
    \ story altogether, and it is quite an interesting one. It will serve as the intermediary\
    \ class between `BaseContainerWidget` and the actual container implementations,\
    \ providing the common-ground methods used by all concrete container implementations\
    \ in our UI module.\n\nIts functionality is not integrated in `BaseContainerWidget`\
    \ (or vice versa) for flexibility reasons: at one point, you might decide you\
    \ need to implement a container that is radically different than the rest, and\
    \ then it will make sense to start with a lower common denominator than `BaseContainerManager`,\
    \ which is exactly what `BaseContainerWidget` provides.\n\nAs the “Manager” part\
    \ of the name suggests, `BaseContainerManager` is more than just a “dumb class”\
    \ like the ones we have covered so far. In fact, it does quite a lot, but we’ll\
    \ go over only the interesting stuff.\n\nFor one thing, `BaseContainerManager`\
    \ provides focus support by implementing general-purpose `onFocus()`, `isFocusable()`,\
    \ and `onLostFocus()`. Out of the three, `onFocus()` and `isFocusable()` deserve\
    \ special attention. Their code is shown in [Listing 6–13](#Chapter06.html#list_6_13).\n\
    \n**Listing 6–13.** *`onFocus()` and `isFocusable()`*\n\n```\npublic boolean isFocusable()\n\
    {\n        int i;\n        for (i=0;i< getChildCount();i++)\n        {\nif ( getWidget(i).isFocusable()\
    \ )\n                {\n                        return true;\n               \
    \ }\n        }\n        return false;\n}\n\npublic boolean onFocus()\n{\n    \
    \    isFocused = false;\n        if (focusedWidget == null)\n        {\n     \
    \           for (int i = 0; i < getChildCount(); i++)\n                {\n   \
    \                     if ( getWidget(i).isFocusable() )\n                    \
    \    {\n                                focusedWidget = getWidget(i);\n      \
    \                          break;\n                        }\n               \
    \ }\n        }\n\n        if ( focusedWidget != null && indexOf(focusedWidget)\
    \ == -1 )\n        {\n                focusedWidget = null;\n                return\
    \ onFocus();\n        }\n\n        if ( focusedWidget != null )\n        {\n \
    \               isFocused = focusedWidget.onFocus();\n                scrollToWidget(focusedWidget);\n\
    \                return isFocused;\n        }\n        else\n        {\n     \
    \           return false;\n        }\n}\n```\n\nThis code is very important, and\
    \ so it’s important to understand it. In order determine if a container can receive\
    \ focus, we must first see if any of its children can receive focus. If no children\
    \ can receive focus, then the container itself cannot receive focus, as there’s\
    \ nothing inside it to focus. This check is done in the `isFocusable()` method.\
    \ Please note that, as containers can be nested inside other containers, the highlighted\
    \ portion of the code can be and often is recursive in nature, since `getWidget()`\
    \ can return a `Container`.\n\nThe `onFocus()` method is slightly more complex\
    \ than `isFocusable()`. First, it checks if there’s a previously focused widget\
    \ inside the container. If there is none, then it will find the first focusable\
    \ widget inside the container and work with that.\n\nSecond, it checks if the\
    \ focused widget, which might have been left over from the last time the container\
    \ had focus, is still inside the container. This is a necessary check, as widgets\
    \ can and often are removed from their parent containers—for example, when the\
    \ user triggers a “delete” action. If the widget to be focused is no longer in\
    \ the container, then `onFocus()` will attempt to focus another widget by calling\
    \ itself.\n\nThird, if we get to a point where the widget to be focused is valid\
    \ (focusable and inside the container), then we call `onFocus()` on it, after\
    \ which we scroll it into view.\n\nThis brings us to the other interesting part\
    \ of the `BaseContainerManager`: scrolling to a specific widget. This is done\
    \ in the `scrollToWidget()` method. The interesting bit comes from the fact that\
    \ it is not enough to scroll a widget into view in the current container; you\
    \ must scroll it into view *on the screen*. This is not always the same thing.\
    \ For example, the currently focused widget might be visible in its parent container,\
    \ but the parent container might be off-screen because of *its* parent’s scroll.\
    \ Thus, in effect, our currently focused widget will be invisible to the user.\
    \ In order to avoid this, we must make sure that, along with scrolling the current\
    \ widget into view within the current container, we also scroll the current widget\
    \ into view within the current container’s parent.\n\nThe code for the `scrollToWidget()`\
    \ method is shown in [Listing 6–14](#Chapter06.html#list_6_14). For brevity, only\
    \ vertical scroll is presented.\n\n**Listing 6–14.** *Scrolling to a Widget*\n\
    \n```\npublic boolean scrollToWidget(Widget w)\n{\n        ...\n\n        int\
    \ maxScroll, neededScrollDelta;\n\n        // Maximum allowed vertical scroll\n\
    \        maxScroll = Math.max(getPreferredContentHeight() - getContentHeight(),\
    \ 0);\n\n        // Needed vertical scroll in order to bring the top side of the\
    \ widget into view\n        neededScrollDelta = WidgetHelper.getYDistanceBetween(w,\
    \ this);\n\n        if ( neededScrollDelta > 0 && getYScroll() + neededScrollDelta\
    \ < getYScroll()\n        + getTotalHeight() )\n        {\n                //\
    \ Don't scroll if the top side of the widget is already visible\n        }\n \
    \       else\n        {\n                if ( getYScroll() + neededScrollDelta\
    \ >= maxScroll   )\n                {\n                        // Make sure we\
    \ don't overscroll\n                        setYScroll(maxScroll);\n         \
    \       }\n                else\n                {\n                        setYScroll(getYScroll()+neededScrollDelta);\n\
    \                }\n                scroll=true;\n        }\n\n        ...\n\n\
    \        parent.scrollToWidget(w);\n}\n```\n\nLet’s summarize what we do here:\
    \ we calculate the necessary scroll delta (with respect to the current scroll\
    \ value) needed to bring the specified widget into view in the current container,\
    \ and then we apply said delta to the current scroll, but only if the widget isn’t\
    \ already visible (in which case we do nothing) and only if the resulting scroll\
    \ value isn’t bigger than the maximum allowed scroll value (in which case we use\
    \ that one instead). Then, as just stated, we try to scroll the widget into view\
    \ in the current container’s parent—please notice the recursion.\n\nBefore we\
    \ can continue, a small clarification is needed: the maximum scroll value corresponds\
    \ to the scroll value needed to neatly bring the bottom section of the container\
    \ into view. Any scroll value larger than it will lead to unwanted whitespace\
    \ at the bottom of the container viewport. You can see that the maximum scroll\
    \ value is easily calculated by subtracting the content height (which is the height\
    \ of the viewport) from the preferred content height (which is the height the\
    \ container would need to have in order for it to be 100% visible)."
