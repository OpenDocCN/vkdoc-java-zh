    有一点需要说明：为了清晰和简洁，清单 13–2 中的代码假设遮罩图像和源图像尺寸相同。如果两张图像尺寸不同，结果要么看起来不正确，要么会引发 `ArrayIndexOutOfBounds`
    异常。不过，调整代码使其适用于不同尺寸的遮罩和源图像是可行的（而且并不太难）。这留给读者作为练习。


    在 Java ME 中实现图像遮罩就是这么简单！结果看起来相当不错，如图 13–3 所示。


    ![images](img/1303.jpg)


    **图 13–3.** *图像遮罩的实际效果*


    然而，乐趣不止于此。我们还可以利用这项技术做更多事情。例如，可以动态生成 `maskData` 数组。你可以利用这一点创建各种效果，从胶片颗粒或雪花效果，到类似于
    PowerPoint 的棋盘格或溶解的动画过渡。


    你应该注意，虽然大多数现代 MIDP 2.0 设备支持透明度和 Alpha 混合，但这并非 Java ME 标准的强制要求。此外，不同设备支持的透明度级别数量差异很大（从
    2 级到 256 级不等）。在使用透明度和图像遮罩之前，请务必在目标设备上测试这两个方面。例如，一张充分利用了 256 级透明度的图像，在仅支持 4 级透明度的设备上显示时，效果可能会很差。

