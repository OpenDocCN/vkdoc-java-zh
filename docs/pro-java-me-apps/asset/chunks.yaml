  trans: '

    ### 功能碎片化


    设备不仅在硬件上存在差异，在功能方面也各不相同。有些 API 和 JSR 相当主流（例如用于 PIM 和文件系统访问的 JSR 75），而另一些则仅在相对较少的设备上得到支持（例如位置
    API）。此外，即使两台设备支持相同的功能，它们支持的程度也可能不同。


    这方面最好的例子就是多媒体 API（MMAPI）。大多数现代手机都支持 MMAPI，但支持的程度却千差万别。例如，两款配备相同摄像头的设备，在拍摄图像或视频时支持的最大分辨率可能不同。媒体播放也是如此：高端设备支持所有常见的媒体类型，而低端设备往往只支持基本类型，通常意味着
    `.wav` 音频文件和可能支持的 `.3gp` 视频。


    处理功能碎片化是一件复杂的事情，因为问题很容易发现，根本原因也容易确定，但解决方案通常涉及某种妥协。继续上面的 MMAPI 例子，如果拍摄的图像分辨率低于应用程序的需求，可以通过软件将图像放大以满足最低要求，但这会以牺牲
    CPU 使用率和图像质量为代价。


    与硬件碎片化问题不同，你甚至可以在开始实际应用程序开发之前，就着手处理与功能相关的碎片化问题。第一步是列出你的应用程序所需的所有 JSR 和 API，并研究你的目标设备支持哪些以及支持到什么程度。如果幸运的话，你的所有目标设备都支持你所需的所有功能，那么这里就无需进一步操作了。


    如果不幸你的目标设备不支持某些功能，那么下一步就是看看是否可以通过某种方式模拟这些功能。例如，并非所有设备都支持位置 API（事实上，大多数 Java ME
    设备都不支持）。但是，可以询问用户当前的位置，然后像处理来自位置 API 本身的数据一样处理这些数据。如果不支持 MMAPI，但支持允许文件系统访问的 JSR
    75，那么用户可以从应用程序内部拍照，改为选择文件系统上已有的图片文件。如果不支持蓝牙 API，那么可以考虑使用网络来传输数据：你将文件上传到服务器，另一方可以从那里获取，即使他就在三英尺之外。


    虽然这些变通方法并不特别优雅，但总比无法使用应用程序要好。此外，在支持所需功能的设备上，这些方法甚至可以被视为额外功能，因为它们让用户对提供给应用程序的数据有了更多选择（例如，即使你在堪萨斯州，你可能也希望让应用程序认为你在波士顿）。


    另一种常见情况涉及在 CLDC 1.0 设备上添加对浮点运算的支持，或支持缺失的媒体类型，例如用于矢量图形的 SVG。这些都是相当常见的问题，而且很可能已经有第三方库形式的解决方案，因此快速上网搜索应该能极大地帮助你。


    需要注意的是，有些功能根本无法模拟，例如 JSR 75 的 PIM 部分；而有些功能虽然可以模拟，但效果不佳，例如 3D API（你可以用软件实现，但性能会非常糟糕）。在这些情况下，你可以选择声明这些有问题的设备不受支持，完全放弃这些功能，或者绕过它们（例如，你的日历应用程序在没有
    PIM 功能的情况下仍然可以工作——只是无法将应用程序的日历与设备自带的日历同步）。显然，如果某个功能被认为是关键任务，而该功能在特定设备上原生不支持且无法模拟，那么除了声明该设备不受支持之外，别无他法。


    在此，我想稍微岔开话题，指出在模拟或绕过缺失功能时，你通常最终需要构建单独的版本。有一些工具可以帮助你解决这个问题（稍后会讨论），但事实仍然是，你必须维护和支持多个构建版本，并且必须指导用户为其设备下载正确的版本。


    **注意：** 一种常用的技术是配置你的服务器，使其检测手机浏览器的用户代理，并据此自动提供相应的构建版本。但是，如果使用的是非原生浏览器（例如 Opera
    Mini），这种技术就不起作用。此外，浏览器代理字段可能被浏览器伪造和/或隐藏。


    当某个功能在最新的固件版本中得到支持，但在旧版固件中不支持，或者功能是通过附加组件安装的（例如，Symbian v5 设备的传感器支持可以通过一个可下载的、完全可选的软件包添加）时，问题就变得更加复杂了。虽然指导用户为其特定设备下载版本是常见做法且相当直接，但指导用户为特定固件下载合适的版本则技术性很强，没有多少用户能够做到。


    幸运的是，在大多数情况下，这两个问题至少可以通过一个简单而有效的技巧得到部分解决。与其提供应用程序的多个公开构建版本，不如提供一个可以称为前端安装程序的应用程序。一旦安装到设备上，这个前端安装程序可以尝试通过检查环境属性（例如
    `microedition.platform` 系统属性），或者通过 `getClass().forName()` 检查是否存在特定的 JSR/API 相关类，来确定它正在运行的设备和固件版本。基于这些信息，可以识别出正确的应用程序构建版本，并告知用户。然后用户可以选择访问相应的网页，或直接下载并安装正确的构建版本。


    前端安装程序避免了用户需要处理多个构建版本的情况，这反过来降低了用户安装错误版本的可能性，并提高了客户满意度。它还减少了你收到的支持问题数量，并通过提供友好、以用户为中心且易于使用的产品来改善公司形象。


    回到正题，处理功能相关碎片化的最后一步是确保所有支持某项功能的设备（无论是原生支持还是通过变通/模拟方式支持）都满足该功能的最低要求。例如，对于一个城市指南应用程序，位置
    API 的最低要求是应用程序能够知道用户当前所在的城市。


    在最理想的情况下，你无需为此做任何特殊处理，因为最低要求默认就能满足。上述例子就是这种情况，因为即使设备没有原生 GPS 功能，用户仍然可以手动指定他或她当前所在的城市。

    '
- fmt: '与上述情况相对的是最坏情况。例如，如果城市指南应用的需求从“知道用户当前所在城市”变为“能够在运行时自动确定用户在城内的具体位置（精确到街道/街区级别）”，事情就会变得复杂。尽管困难，但如果设备本身不支持`Location
    API`，在某些场景下仍然有可能实现。


    例如，在某些设备上，你可以通过`System.getProperty()`获取当前小区ID（实际属性名各不相同，但通常是`Cell-ID`或类似`com.X.cellid`的形式，其中`X`是手机制造商名称）。了解本地区域码也很有帮助，获取方式与小区ID类似。一旦获得这些信息，你就可以执行查询并确定用户的大致当前位置。


    这种方法的主要问题在于：获取当前小区信息可能有非常严格的安全要求（例如，在诺基亚S40设备上，应用必须使用运营商或制造商级别的证书进行签名），并且将这些信息转换为真实世界的位置通常需要你拥有准确且最新的蜂窝基站数据——这本身就是一个艰巨的任务。幸运的是，有一些开放数据库可以帮助解决后一个问题，例如[`www.opencellid.org`](http://www.opencellid.org)上的数据库。另一种方法是使用`Wireless
    Messaging API`来监听小区广播服务消息，并从中获取小区信息。虽然这在大多数情况下可以免去签名的需求，但它要求目标设备支持`WMA`，并且仍然需要进行查询。


    我们已经看到了最佳情况和最坏情况，但实际情况通常介于两者之间。一种非常常见的场景是开发者仅对功能进行小幅增强——例如，通过压缩数据或使用替代编码来提高蓝牙传输速度。


    最后，在处理与能力相关的碎片化问题时，你可以遵循一些通用建议。首先也是最重要的，保持一切模块化和抽象化。不要直接使用`Location API`，而是实现一个位置模块，让所有魔法都在那里发生（由该模块决定如何获取用户当前位置）。不要直接使用蓝牙文件传输；实现一个文件传输模块，其中蓝牙是首选选项，但不是唯一选项。


    其次，与上一条建议有些关联，在定义应用需求时，尝试为那些可能并非在所有设备上都可用的功能定义备用方案。例如，通过蓝牙进行设备间传输的备用方案可能是使用网络来传输数据。拥有备用方案的好处是双重的：你既能最大限度地减少能力碎片化问题，又能为用户提供更多完成任务的选择。


    第三，始终尽量将你的最低要求保持在尽可能低的水平，即使你的目标设备是高端设备。这让你在应用成功后有可能瞄准更多设备，同时也能增强当前目标设备上的用户体验。例如，即使你的蓝牙传输速度是200
    KB/s，也要设计你的应用使其仅需100 KB/s就能工作；这样你的应用在不太理想的场景下也能正常运行，同时在正常使用中提供顶级性能（因为其最低要求得到了满足并被超越）。


    第四，看看别人是怎么做的。这一点经常被忽视。尤其是当你是一位经验丰富的开发者时，常常会发生这样的情况：面对能力碎片化问题时，你倾向于实现脑海中浮现的第一个解决方案，或者你过去在另一台设备上使用过的解决方案。这样做的问题在于，Java
    ME设备可能差异巨大且往往有独特的怪癖，因此很可能存在一个比你想到的更好的解决方案，这个方案可能利用了厂商特定的扩展或设备特定的能力，或者那个在设备X上有效的解决方案在你当前使用的设备上效果不佳。因此，你应该始终在通用层面和设备特定层面彻底研究你的问题。你很可能会找到一个比你当前想法更好的解决方案，或者至少你会找到一种方法让你当前的解决方案变得更好。


    第五，在真实环境中测试你的应用。虽然硬件碎片化问题或性能问题可以在办公室内检测并修复，但某些能力碎片化问题则不能。当你移动时，GPS信号有多强和多准确？在像火车站这样拥挤的环境中，蓝牙传输表现如何？在弱光条件或户外，照片质量如何？准确测试这些事情的唯一方法就是将应用放在真实设备上，然后走出去到现实世界中。


    第六，看看是否有厂商特定的API可以提供帮助。有时你所需的功能或能力并未被标准的Java ME API或JSR所涵盖，但它存在于厂商特定的扩展中。例如，如果你正在编写一个GPS应用，你很可能希望保持背光常亮。Java
    ME没有提供这种机制，但大多数主流厂商提供了你所需的能力：诺基亚有`DeviceControl.setLights()`，三星有`LCDLight.on()`等。


    第七，如果你的目标是智能手机，检查是否可以使用原生应用来帮助你解决问题。例如，某些Symbian设备不允许Java ME访问其内置的加速度计或GPS芯片（或者允许，但需要更新固件版本或安装可选组件）。然而，这些能力可以从原生应用内部访问。


    因此，一个可行但有些取巧的解决方案是创建一个原生应用，它充当一个可通过TCP/IP访问的服务器（在本地主机上运行），用于提供加速度计和GPS数据。然后，Java
    ME应用通过套接字连接到这个原生服务器应用，并读取所需的数据。这种设置相当复杂，但作为最后的手段是可行的。'
  raw: 'Opposite this are the worst-case scenarios. For example, if the city guide
    application requirements change from knowing the user''s current city to being
    able to determine automatically at runtime where in the city the user is (down
    to street/neighborhood level), things get complicated. While difficult, if the
    device does not natively support the Location API, this is still possible to achieve
    in some scenarios.


    For example, on some devices, you can retrieve the current cell ID via `System.getProperty()`
    (the actual property name varies, but is usually either “Cell-ID” or something
    like “com.X.cellid”, where X is the name of the handset manufacturer). It is also
    helpful to know the local area code, which can be obtained similarly to the cell
    ID. Once you have this information, you can perform a lookup and determine the
    user''s approximate current location.


    The main problems with this approach are that obtaining the current cell information
    can have very stringent security requirements (on Nokia S40 devices, the app has
    to be signed with operator- or manufacturer-level clearance, for example) and
    converting this into a real-world location usually requires that you have accurate
    and up-to-date information regarding cellular towers—which is a daunting task
    in itself. Fortunately, there are open databases to help with the latter problem,
    such as the one available at [`www.opencellid.org`](http://www.opencellid.org).
    Another approach would be to use the Wireless Messaging API to listen for Cell
    Broadcast Service messages and retrieve the cell information from there. While
    this can eliminate the need for signing in most circumstances, it does require
    that the target device(s) support WMA, and it still requires a lookup.


    We have seen the best-case and the worst-case scenarios, but things usually fall
    somewhere in the middle. A very common scenario involves the developers enhancing
    capabilities only slightly—for example, increasing Bluetooth transfer speed by
    compressing data or using an alternate encoding.


    Finally, there are a few general tips you can follow when dealing with capabilities-related
    fragmentation. First and foremost, keep everything modularized and abstract. Rather
    than using the Location API directly, implement a location module and let all
    the magic happen there (it''s up to the module how it retrieves the user''s current
    location). Don''t use Bluetooth file transfers directly; implement a file transfer
    module in which Bluetooth is the preferred option, but not the only one.


    Second, and somewhat tied up to the previous tip, while defining your application
    requirements, try to define backup solutions for features that might not be available
    on all devices. For example, the backup solution for device-to-device transfer
    via Bluetooth might be using the network to transfer data. The benefits of having
    backup solutions are twofold: you minimize capabilities fragmentation problems,
    and you also provide users with more options to get things done.


    Third, always try to keep your minimum requirements as low as possible, even if
    your target devices are high-end ones. This gives you the potential to target
    more devices later on if the application proves successful, and it also enhances
    the user experience on current target devices. For example, even if your Bluetooth
    transfer speed is 200 KB/s, design your application to work with only 100 KB/s;
    your app will then work properly in less than stellar scenarios, while providing
    top-notch performance in normal usage (since its minimum requirements are met
    and exceeded).


    Fourth, see how others did it. This is often overlooked. It frequently happens,
    especially if you''re a seasoned developer, that when you face a capabilities
    fragmentation problem you tend to implement either the first solution that comes
    to mind or a solution that you have used in the past, on another device. The problem
    with this is that Java ME devices can be wildly different and tend to have unique
    quirks, so chances are that there is a better solution than the one you thought
    of, possibly that makes uses of vendor-specific extensions or device-specific
    capabilities, or that the solution that worked on device X will not be as effective
    on the current device you''re working with. Because of this, you should always
    research your problem thoroughly, on both generic and device-specific levels.
    You will probably find a better solution than the one you currently have in mind,
    or at least you will find a way to make your current solution even better.


    Fifth, test your application in real-life circumstances. While hardware fragmentation
    issues or performance issues can be detected and fixed in the office, some capabilities
    fragmentation issues cannot. How strong and accurate is the GPS signal while you''re
    on the move? How does Bluetooth transfer fare when in a crowded environment like
    a train station? How''s the picture quality in low-light conditions or outdoors?
    The only way you can accurately test these things is if you put the application
    on a real device and go out into the world.


    Sixth, see if there are vendor-specific APIs that might help you. Sometimes the
    functionality or capability that you require is not covered by standard Java ME
    APIs or JSRs, but it is present in vendor-specific extensions. For example, if
    you''re writing a GPS application, chances are you''ll want to keep the backlight
    always on. Java ME provides no mechanism for this, but most popular vendors provide
    the capabilities you need: Nokia has `DeviceControl.setLights()`, Samsung has
    `LCDLight.on()`, etc.


    Seventh, if you''re targeting a smartphone, check if you can use a native application
    to help you with your problem. For example, some Symbian devices do not allow
    Java ME access to the accelerometer or to the GPS chip embedded within them (or
    they do but in later firmware versions or by installing optional components).
    However, these capabilities can be accessed from within native apps.


    As such, a viable though somewhat hacky solution is to create a native application
    that acts as a TCP/IP reachable server (running on localhost) for accelerometer
    and GPS data. The Java ME application then connects to the native server application
    via sockets and reads the data it needs. This setup is fairly contrived, but it
    works as a last resort.'
