- fmt: "在结束本讨论并继续本书内容之前，还有一点我想提及：事件处理，如同 Java ME 中的所有事物一样，没有通用的解决方案。根据你正在编写的应用程序类型，你可能会更倾向于某一种方法。例如，监听器-控制器范式非常适合业务应用程序，但对于某些实时应用程序（如动作游戏）来说，它可能太慢了。在这些情况下，你可能更倾向于在事件发生时，尽可能在靠近源头的地方处理它们。\n\
    \n#### 引导类\n\n灵活性和自由度固然很好，但你确实需要调用一些函数来完成所有设置。这就是我们下一个核心类`Bootstrap`发挥作用的地方。它允许你以最少的函数调用次数完成所有设置并准备就绪，这使得它非常适合快速测试项目或向不熟悉该框架的人展示它。你还可以针对不同的情况和设置，向该类添加不同的“引导”方法——目前我们只有一个。`Bootstrap`的完整源代码如[清单\
    \ 2–16](#Chapter02.html#list_2_16)所示。\n\n**清单 2–16.** `Bootstrap`类\n\n```java\n\
    package com.apress.framework.core;\n\nimport com.apress.framework.common.EventControllerManager;\n\
    import javax.microedition.midlet.MIDlet;\n\npublic class Bootstrap\n{\n\n    public\
    \ static void boot(MIDlet midlet, long eventManagerSleepTime)\n    {\n       \
    \ Application.init(midlet);\n        EventControllerManager main = Application.getMainEventControllerManager();\n\
    \        main.assign(Application.getMainEventController());\n        EventManagerThreads.start(main,\
    \ eventManagerSleepTime);\n    }\n}\n```\n\n有了`Bootstrap`类，我们的基本框架就完成了。剩下的就是进行一次小测试运行，这正是我们接下来要做的。\n\
    \n### 一个简单的测试应用程序\n\n框架准备就绪后，快速了解其工作原理的最佳方法是编写一个简单的测试应用程序并进行试验。这也能让你测试框架是否存在问题。\n\
    \n我们的测试应用程序将尽可能简单，但同时它会测试框架的所有重要方面：控制器、事件、视图和模型的使用。\n\n其基本思路如下：你有两个控制器，每个代表乒乓球游戏中的一名玩家。\n\
    \n一个控制器通过显示自己的视图来响应`PING`事件，然后发出一个`PONG`事件。\n\n另一个控制器响应`PONG`事件，显示其视图，然后发出一个`PING`事件。这两个控制器基本上会持续地来回交换消息，同时在其中进行一些处理。这个简单的场景涵盖了\
    \ 90% 的现有应用程序，因此非常合适。\n\n现在，在编写测试应用程序之前，我们需要设置好相应的事件。你的`EVT`类应该类似于[清单 2–17](#Chapter02.html#list_2_17)中的内容。\n\
    \n**清单 2–17.** 用于测试应用程序的`EVT`类\n\n```java\npackage com.apress.framework.objecttypes;\n\
    \npublic class EVT\n{\n    public class CONTEXT\n    {\n        public static\
    \ final int TEST= 999;\n        ...\n    }\n\n    public class TEST\n    {\n \
    \       public static final int PING=1;\n        public static final int PONG=2;\n\
    \    }\n\n    ...\n\n}\n```\n\n现在事件已经就位，我们可以继续编写应用程序了。\n\n让我们从最简单的类`TestModel`开始，如[清单\
    \ 2–18](#Chapter02.html#list_2_18)所示。关于它没什么好说的，因为代码不言自明。\n\n**清单 2–18.** `TestModel`类\n\
    \n```java\npackage test;\n\nimport com.apress.framework.objecttypes.Model;\n\n\
    public class TestModel implements Model\n{\n    protected String text;\n\n   \
    \ public TestModel (String text)\n    {\n        this.text = text;\n    }\n\n\
    \    public String getText()\n    {\n        return text;\n    }\n}\n```\n\n接下来，我们需要一个能够显示我们模型的视图。那就是`TestView`，如[清单\
    \ 2–19](#Chapter02.html#list_2_19)所示。\n\n**清单 2–19.** `TestView`类\n\n```java\n\
    package test;\n\nimport com.apress.framework.objecttypes.Controller;\nimport com.apress.framework.objecttypes.View;\n\
    import javax.microedition.lcdui.Graphics;\nimport javax.microedition.lcdui.game.GameCanvas;\n\
