    ### 优化应用程序的最佳实践


    谈到 Java ME 应用程序的优化，有两种常见的观点，它们本质上是相反的，但在我看来，这两种观点都是错误的。


    第一种观点在来自桌面领域的开发者或专门从事高端 Java ME 设备开发的开发者中最为常见，即几乎从不进行任何优化。这种观点是错误的，因为这样你得到的要么是次优的性能，要么是良好的性能（如果你的目标是高端设备），但你的竞争对手的应用程序要么性能更好，要么功能更丰富，因为他们能更好地利用可用资源。


    第二种观点在早期就从事该领域的开发者中最为常见，即优化所有可能优化的东西。这种观点同样是错误的，因为这样做需要耗费大量的开发时间，而且很多时候结果根本不值得：性能提升微乎其微，或者优化后的代码在一台设备上运行良好，但由于设备特性，在另一台设备上却表现不佳。


    那么，优化 Java ME 应用程序的正确方法是什么呢？正如在专门讨论优化的章节中所讨论的，你首先应该做的是分析你的代码，找出时间和资源消耗最多的地方。先优化那个区域，然后再次进行分析，将注意力转向代码中的下一个候选区域，依此类推，直到性能和资源消耗达到可接受的水平。同时，最好的优化是与算法或架构相关的优化，因为它们往往能很好地适用于所有设备，因此在进行任何代码优化之前，应该先尝试这些优化。


    然而，即使方法得当，上述优化过程也并不总能很好地适用于现实场景。例如，你可能会花费大量时间优化某组方法，新旧代码之间的性能差异在低端设备上可能非常显著，但在高端设备上却几乎察觉不到。或者反过来——如果性能提升
    2 倍只是将应用程序的帧率从每秒 2 帧提高到每秒 4 帧，那么在低端设备上这种提升实际上并不明显；应用程序仍然无法使用。换句话说，花费在优化代码上的时间和资源并没有真正反映在现实世界中。


    为了应对这种情况，并在花费的时间和获得的性能之间达到良好的平衡，最好的策略是采用增量式优化方法。也就是说，一旦你发现一个问题区域，不要试图从中榨取最佳性能，而是简单地尝试获得良好的性能，然后转向下一个区域。如果优化了所有值得优化的部分后，性能仍然不够好，那么你就开始新一轮的优化周期，进一步改进已经优化过的代码。


    这种方法在实践中效果很好，因为很多时候，代码和算法只需相对较少的努力就能优化到最大可能性能的 40-50%，但剩下的 60-50% 则需要大量的工作。通过只优化到最大可能性能的
    40-50%，你就能获得最佳的性价比——而且，如果需要的话，你随时可以回过头来做得更好。


    内化这个概念的最佳方式是将优化你的应用程序视为一种工具，一种达到目的的手段，而不是目的本身。你优化东西不是为了优化而优化；你这样做是为了满足你的需求（例如，在特定设备上达到可接受的性能）。因此，你对应用程序优化的方法应该是一种最大化投入产出比的方法（这正是上述策略所做的），并且一旦你的目标达成，你就应该*停止*优化。这既适用于局部优化目标（即优化局部代码块），也适用于整体应用程序优化目标。


    我和几个朋友曾经举办过一次优化竞赛，我们从网上下载了一个非常消耗 CPU 的应用程序的源代码（一个简单的概念验证型国际象棋引擎），并试图在两小时内尽可能提高其性能。


    我们都从分析应用程序开始，并且都确定了相同的需要改进的关键区域。然而，当我和另一个朋友使用上述方法，尝试优化每个关键区域直到我们认为达到了可接受的性能水平时，另外两个朋友决定按顺序尽可能优化所有东西。


    两小时过去后，他们高度优化了代码中大约两到三个关键区域，而我和我的朋友则将大约四到五个关键区域优化到了“足够好”的水平。最终结果正如预期：尽管他们彻底优化的那两三个关键区域的性能明显优于我们取得的成果，但我们的整体性能更好，因为我们在各个区域都有较小的性能提升，但总体上我们优化了更多的代码区域。然后我们比较了在代码的每个单独部分上花费的时间与获得的性能提升，结果显示，虽然他们高度优化的代码比我们的快
    20-30%，但他们花费了两到三倍的时间进行优化。换句话说，他们的投资回报率并不高。


    所有这一切中最有趣的结果是，当我们把代码从模拟器移植到实际设备上时发现的。一个关键区域在我们未经彻底优化的版本中，其性能实际上明显优于我们朋友们的高度优化版本。最可能的原因是，为了改善
    CPU 时间，他们在方法中使用了比我们多得多的内存和变量，这意味着比我们更多的内存读取次数和更差的缓存性能。


    从中吸取的教训是，在 Java ME 世界中，将代码优化到最佳程度并不总是一件好事。只优化你需要的程度，并且只在你需要的地方优化。如果你决定（无论出于何种原因）进行极致优化，请确保保留一份未经优化的方法副本以供参考，并确保在所有目标设备上测试你的优化，以避免任何不愉快的意外。'
- fmt: '### Sticking to Your Priorities


    As discussed previously, the resources available to the typical Java ME application
    are limited. Furthermore, quality standards in all respects (user interface, functionality,
    flexibility, etc.) have increased considerably over the years, which means that
    it takes more and more resources to “meet the norm” in any of the foregoing categories.
    Thus, Java ME developers are faced with the problem of correctly distributing
    the limited resources available to them between the foregoing critical areas.


    First of all, it should be made clear that, unless the application you are writing
    is an extremely simple one, you will not be able to achieve the best possible
    result in all categories, so you will have to make trade-offs. For example, you
    may be able to give your application a stunning user interface, but in doing so
    you will most likely severely limit the amount of resources available for your
    application’s actual functionality, and you will also have a hard time porting
    the application to lower-end devices. Or you might be able to dedicate lots of
    resources to the underlying functionality, at the expense of a very plain UI.
    Or you might choose to support a wide variety of devices, sacrificing both UI
    and functionality in the process.


    Defining clear priorities greatly affects the way you approach your development
    process. For example, if you’re going for flexibility and portability, then your
    code should be rock-solid and highly adaptable, and your application’s framework
    should also be extremely well thought out. This involves lots of planning and
    thinking ahead, error checking, and error handling routines, which can add quite
    a bit of overhead. In addition, your development time will increase by quite a
    bit.


    If you decide to focus on the UI aspect of your application, then choose the best-looking
    UI toolkit that you can find/afford and go with that. To compensate for the (most
    likely) high resource strain brought on by the UI, your application’s functional
    code should be very well optimized, much more so than if you were going with a
    more plain-looking UI.


    Or, if you try to cram as much functionality as possible into your application,
    you will most likely have to depend a lot on third-party libraries and on non-standard
    APIs. These tend to introduce a lot of portability issues and bugs that may be
    out of your control, so in effect the development process will be more tedious
    and more error-prone.


    As a Java ME developer, it’s critical to get your application’s priorities straight
    in order to be able to allocate your resources efficiently. Ideally this should
    be done in the planning phase of the project, before you start writing any code,
    but it can also be done in the early development phase. Changing your priorities
    after that isn’t really an option worth considering—you’d be probably better off
    writing a new application from scratch.


    For example, switching to a different UI toolkit isn’t always feasible or possible,
    for technical reasons, especially if the UI you are currently using is intimately
    linked to the application’s functionality—or if the application’s functionality
    is built around the capabilities and architecture of the current UI toolkit.


    Deciding that you want to considerably augment the existing functionality when
    the code is 80% complete, while possible, will most likely introduce a lot of
    new bugs, performance issues, and unwanted side effects as you alter the existing
    code, because frequently these changes come in the form of “patches” rather than
    a clean implementation.


    It will also involve a considerable restructuring and possibly even a complete
    make-over of your application’s architecture, which is a nightmare scenario to
    encounter halfway through the development process. Adding extra functionality
    also frequently means that you will have to make use of or emulate non-standard
    APIs or bring in new third-party libraries, with all the problems these actions
    bring to the table.


    **NOTE:** You might get away with these on a more standardized and homogenous
    platform, but Java ME’s constrained yet unpredictable nature makes these things
    considerably more difficult unless they are planned for (or provisioned for) from
    the very beginning.


    Finally, supporting more devices than originally planned (especially ones less
    powerful than the ones you are currently targeting) is oftentimes simply impossible
    without massive reductions of features, without switching to a less intensive
    or less good-looking UI or without making other technical compromises and adjustments—which
    means that you will have to go over and seriously rewrite large parts of your
    code, thus increasing both development time and bug count.


    I once worked as part of a team to create a simple photo-sharing application.
    The initial goal was simple: all that was needed was the ability to take pictures
    and upload them to a web-based gallery. The target devices were mid-level.


    This core requirement was fairly easy to implement, so we agreed with the customer
    that we can and should create a snazzy interface for the application, to attract
    potential users. We could do this because the CPU requirements for the core application
    were extremely low, so the bulk of the CPU time could be dedicated to the UI.


    We concentrated most of our attention on adding lots of cool UI features. For
    example, the upload progress bar was actually a thumbnail of the image to be uploaded.
    The thumbnail was initially grayscale, and it got colorized from left to right
    as the image content was uploaded.


    So far so good, but then the customer requested that we add very simple image
    processing abilities to the application—for example, color effects and captioning.
    These features competed for CPU time with the UI itself, but there was still plenty
    of processing power to go around. Whenever something really intensive would need
    to be done, we would just display an hourglass on the screen. Our initial priorities
    got somewhat changed from a fancy UI to a mix of features and fancy UI. Still,
    it was nothing we couldn’t handle. We had to do a bit of refactoring to get both
    the UI and the image processing features to play nice together, but nothing major.
    Speed did suffer a bit at this point, but not much.


    Then we got the requirement for implementing image gallery capabilities. Coupled
    with the fancy UI, this was getting a little too much for our available processing
    power, so we had a discussion with the customer and agreed to have two gallery
    types: a very cool-looking one for high-end devices and a toned-down version for
    mid-range devices.


    Now flexibility and portability got thrown into the mix, and things really got
    interesting. We had to add quite a bit of new code and alter large portions of
    the existing code to make sure that the application made the most of the available
    resources on each type of device and that it dynamically adapted its resource
    consumption so as not to crash. Speed suffered some more because of this, and,
    of course, some rather weird bugs were introduced (remember, we were doing major
    patching to the existing code in the process).


    The icing on the cake came when the customer requested that we support lower-end
    phones too. We asked him what he wanted to give up: the fancy UI, the image processing
    capabilities, or the photo gallery feature. He said he didn’t want to give up
    anything.


    We optimized the application as best we could (it helped that the lower-end devices
    had lower-resolution screens, so we could get away with lower-quality graphics),
    but the sheer hardware requirements and our patched code base meant that the end
    result was nowhere near as satisfactory as we would have wanted. In the end, the
    customer did decide to create a special version of the application from scratch,
    specifically for low-end devices.'
