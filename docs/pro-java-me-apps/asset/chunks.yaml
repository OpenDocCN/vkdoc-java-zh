    \ while an actual usage example will be given later on, as part of the `SimplifiedPersistenceHelper`.\
    \ The highlighted code in [Listing 5–12](#Chapter05.html#list_5_12) exemplifies\
    \ how to deserialize a complex record—in our case, the record contains the actual\
    \ table of contents hashtable.\n\n**Listing 5–12.** *The `TOC` Helper*\n\n```\n\
    package app.module.persistence.helpers;\n\nimport app.module.persistence.classes.PersistenceProvider;\n\
    import app.module.persistence.classes.RecordReader;\n...\n\npublic class TOC\n\
    {\n    Hashtable TOCHashtable = new Hashtable();\n    PersistenceProvider provider;\n\
    \    RecordReader reader;\n    RecordWriter writer;\n\n    public TOC(PersistenceProvider\
    \ provider)\n    {\n        this.writer = new ByteRecordWriter();\n        this.provider\
    \ = provider;\n        provider.open();\n\n        // Try to open the TOC. By\
    \ convention, it is stored in record #1\n        if ( provider.getRecord(1) ==\
    \ null )\n        {\n            return; // No TOC exists, nothing to deserialize\n\
    \        }\n        else\n        {\n            // A TOC exists, we can deserialize\
    \ it\n        }\n\n        // Create a reader for record #1\n        reader =\
    \ new ByteRecordReader(provider.getRecord(1));\n\n        // Read the size of\
    \ the TOC\n        int size = reader.readInt();\n\n        // Read each entry\
    \ in the TOC and add it to the Hashtable\n        String key;\n        int value;\n\
    \        while (size>0)\n        {\n            key = reader.readString();\n \
    \           value = reader.readInt();\n            addEntry(key, value);\n   \
    \         size--;\n        }\n    }\n\n    // Serialize the TOC to a byte array\n\
    \    protected byte[] getCurrentTOCBytes()\n    {\n        String tempKey;\n \
    \       int size = TOCHashtable.size();\n\n        // Reset the writer\n     \
    \   writer.reset();\n\n        // Write the size of the TOC\n        writer.writeInt(size);\n\
    \n        // Write each entry in the TOC\n        Enumeration keys = TOCHashtable.keys();\n\
    \        while ( keys.hasMoreElements() )\n        {\n            tempKey = (String)\
