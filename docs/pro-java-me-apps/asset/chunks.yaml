    ### Rotating Images


    Before we begin, it should be noted that this topic requires a good knowledge
    of mathematics (especially trigonometry) to be understood properly. However, I
    will do my best to explain things in the most nonmathematical way possible.


    *Image rotation* is one of the most widely used image operations on all platforms,
    desktop and mobile alike. It is most commonly used in games or in multimedia applications,
    but has real value for business applications too. Unfortunately, standard image
    rotation support in Java ME is extremely limited. You can rotate images only at
    angles that are multiples of 90 degrees; free-angle rotation is not an option.
    This is a major limitation, because many times you need to rotate images at “odd”
    angles (that is, not multiples of 90 degrees).


    For example, if you want to create a gauge widget for your application, you need
    to be able to draw the indicator needle at any angle. Using the standard functions
    available to you, there are three ways to do this: create an image for every possible
    angle at the expense of significantly increasing the JAR size, create fewer images
    but lose accuracy, or draw the gauge by using low-level functions such as `drawLine()`
    and limit yourself to a very crude and ugly-looking needle. None of these options
    is particularly satisfying.


    As such, the best course of action is to implement your own image-rotation function,
    which is capable of rotating images at any angle. It may sound daunting, but this
    is not particularly hard to do once you understand the math involved. In fact,
    image rotation is quite a simple operation. Because every image is made up of
    individual pixels, to rotate an image, all you have to do is rotate all its pixels
    around the same reference point, which is usually the center of the image. You
    basically do the same simple operation over and over again.


    The most basic thing we need in order to do this is the formula for rotating a
    point around the origin in a Cartesian coordinate system. The math behind this
    is difficult to explain in just a few paragraphs, and furthermore is outside the
    scope of this book (though quite an interesting read, which will give you a lot
    of insight into the world of 2D/3D transformations and implementing those transformations
    on a computer). Therefore, what we will do is just take the formula for granted.
    It can be seen in [Listing 13–9](#Chapter13.html#list_13_9).


    **Listing 13–9.** *Rotating a Point Around the Origin in a Cartesian Coordinate
    System*


    `x'' = x * cos(a) - y * sin(a)`

    `y'' = x * sin(a) + y * cos(a)`


    In the preceding formula, `(x,y)` are the original coordinates of the point and
    `(x’,y’)` are the resulting coordinates of the point after being rotated `a` degrees
    around the origin. As with most practical 2D/3D transformations, the formula is
    surprisingly simple.


    Any image can be inscribed in a rectangle, called its *bounding box*. For an image
    that is not rotated, the size of the bounding box is the same as the size of the
    image. However, as soon as you rotate the image, you will need a bigger bounding
    box to contain it, as can be seen in [Figure 13–7](#Chapter13.html#fig_13_7).


    ![images](images/1307.jpg)


    **Figure 13–7.** *When rotating an image, the bounding box increases in size.*


    The next thing we need to do is figure out the size of the bounding box for the
    rotated image. There are several ways to do this, so let’s choose the one that
    makes the most sense (not necessarily the fastest or the most efficient).'
