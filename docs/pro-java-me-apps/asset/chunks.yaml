    As the name suggest, this is a view based on a `GameCanvas`. Hierarchically speaking,
    views are top-level containers. We can use this to our advantage by wrapping our
    `GameCanvasView` around a `VerticalContainer`—that is, we will forward most of
    the `Container` calls to the `VerticalContainer` and let it handle them.


    In order to do this, we must first properly construct and initialize our class,
    as shown in [Listing 6–33](#Chapter06.html#list_6_33).


    **Listing 6–33.** *Initializing the `GameCanvasView`*


    `package app.module.ui.classes;`

    `...`

