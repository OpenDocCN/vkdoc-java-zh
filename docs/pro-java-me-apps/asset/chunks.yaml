    The code should pretty much speak for itself at this point, so I won’t go into
    it. Have a look at [Figure 8–3](#Chapter08.html#fig_8_3) to see how the settings
    screen will look on the WTK emulator.


    ![images](images/0803.jpg)


    **Figure 8–3.** *The settings screen on the WTK emulator*


    I would like to point out that the settings code has one flaw: changing the language/locale
    requires an application restart. That’s because all the application’s form fields
    are created inside the constructors of the forms, which are obviously called only
    once.


    What would be needed for runtime language/locale changes is a `buildFormStructure()`
    method that rebuilds the forms when needed and that can be called as needed. Alternatively,
    a `reloadLanguage()` method could be implemented that, when called, sets the appropriate
    text/caption on all the widgets contained within a form.


    However, implementing either method into the current application code would require
    significant changes to the application and UI framework structure. For example,
    rebuilding a form has serious implications for the user experience (for example,
    information about the currently focused element is lost, as are scroll offsets
    and potentially other important information related to UI state), while changing
    the text on a widget requires support from the UI framework and potentially implies
    a complete re-layout of the current form if the new text overflows or is significantly
    smaller than the original text. For this reason and for the purpose of code clarity
    and simplicity, these features have been omitted from the current code base and
    are left as an exercise for the reader.


    To finish things off with our application’s code, I would like to present the
    `EVT` class.


    ### Implementing the EVT Class


    The `EVT` class is probably the first place you should go when you want to familiarize
    yourself with a new project. By being basically a central repository of all the
    events that can happen within an application, it gives you a quick insight into
    how the application is supposed to run and what its critical processes are, and
    it also provides a great central point for branching out and exploring the source
    tree. All you have to do is follow the “event trail,” and sooner or later you’ll
    get to the part of the code you need to get to for debugging that weird bug or
    for understanding why and where that one method is used.


    In the case of our Twitter client, the `EVT` class is shown in [Listing 8–11](#Chapter08.html#list_8_11).


    **Listing 8–11.** *The `EVT` Class*


    `package com.apress.framework.objecttypes;`


    `public class EVT`

    `{`

    `    public class CONTEXT`

    `    {`

    `        public static final int STARTUP = 1;`

    `        public static final int LOGIN_FORM = 2;`

    `        public static final int NETWORKING_MODULE = 3;`

    `        public static final int UI_MODULE = 4;`

    `        public static final int MAIN_FORM = 5;`

    `        public static final int SETTINGS_FORM = 6;`

    `    }`


    `    public class PROGRAM_FLOW`

    `    {`

    `        public static final int SHOW_WELCOME_SCREEN = 10001;`

    `        public static final int SHOW_MAIN_SCREEN = 10002;`

    `        public static final int SHOW_SETTINGS_SCREEN = 10003;`

    `        public static final int APPLICATION_START = 10004;`

    `        public static final int APPLICATION_PREPARE_SHUTDOWN = 10005;`

    `        public static final int APPLICATION_EXIT = 10006;`

    `        public static final int INITIATE_SHUTDOWN = 10007;`

    `        public static final int INITIATE_LOGOUT = 10008;`

    `    }`


    `    public class TWEETS`

    `    {`

    `        public static final int REQUEST_MAIN_TWEETS_BATCH = 20001;`

    `        public static final int RECEIVED_TWEET = 20002;`

    `        public static final int POST_TWEET = 20003;`

    `    }`


    `    public class NETWORK`

    `    {`

    `        public static final int BEGIN_LOGIN=30001;`

    `        public static final int LOGIN_FAILED=30002;`

    `        public static final int LOGIN_SUCCEEDED=30003;`

    `    }`


    `    public class UI`

    `    {`

    `        public static final int BUTTON_PRESSED=40001;`

    `        public static final int TEXT_CHANGED=40002;`

    `    }`


    `    public class SETTINGS`

    `    {`

    `        public static final int CHANGE_LANGUAGE = 50001;`

    `        public static final int CLEAR_LOGIN_DATA = 50002;`

    `    }`

    `}`


    Please notice the naming convention. Contexts are numbered successively from 1
    to infinity, while individual events use a `XYYYY` numbering convention, where
    `X` is unique for each context/area of the application (and has successive values
    from 1 to infinity), and `YYYY` is a unique event number within the realm of `X`(again
    with successive values). This naming scheme ensures readability, helps debugging
    (after a while, you sort of start to remember that `2YYYY` are tweet-related events),
    and most importantly prevents numbering conflicts in which different events get
    the same event number.


    Now that our Twitter client is functional, let’s look at how it can be further
    improved.


    ### Improving the Application


    The Twitter client that we have written works and its underlying foundation is
    solid, but the app itself is pretty skeletal right now. Expanding it so that it
    can be considered a full-featured and complete application would require a lot
    of time, effort, and book pages, while providing marginal benefit to anyone not
    interested in doing a full-featured Twitter client. So while we will not go into
    this process in depth, we can and will take a look at some of the steps needed
    to reach this goal.'
