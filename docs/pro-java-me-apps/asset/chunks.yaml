  trans: '

    ##### UI 设计


    Java ME 在 UI 方面最大的限制可能在于，由于历史原因，你只能使用设备的原生控件来创建外观简单的界面。任何更复杂的设计都无法通过原生方式实现，因此你不得不使用自己的
    GUI 工具包或第三方工具包——几乎所有专业的 Java ME 应用都使用非原生 GUI 工具包。这当然意味着你的应用在外观和体验上很可能与用户习惯的原生应用格格不入。对于游戏或其他多媒体应用来说，这并非问题，但对于商业应用而言，这可能是一个缺点，尤其是当需求之一是“原生外观和体验”时。


    Java ME 的另一个限制是，大多数用户习惯使用两个软键来访问应用菜单。然而，有些设备并没有软键。例如，黑莓设备就没有软键（它们使用“菜单”键），而一些
    Java ME 设备仅支持触控。因此，从一开始我们就面临三种不同的菜单导航方式。你可以通过构建多个版本并在运行时检测平台，或者通过设计和实现一个能够无缝且独立地使用所有三种方式的
    UI 来解决这个问题。


    物理按键的位置有时会成为一个问题，或者至少会让人感到沮丧，因为在某些设备上，尤其是那些带有加速度计的设备，屏幕可以旋转，并在横竖屏之间即时切换。你的应用不仅需要能够处理这种情况，还应该跟踪设备上物理按键的位置。这对于软菜单尤其重要。例如，图
    1–2 展示了应用处于横屏模式时正确的软菜单位置和布局，以及横屏模式下错误的位置和布局。请注意，在正确的布局中，软菜单选项紧邻软按键，而不是位于屏幕底部。


    ![images](img/0102.jpg)


    **图 1–2.** *物理按键位置如何影响屏幕布局*


    UI 设计还应尝试考虑前面提到的屏幕特性，例如屏幕像素密度。在高密度屏幕的设备上，通常最好将所有元素（以像素为单位）做得更大，以便应用更易于使用。由于高密度屏幕通常出现在处理能力更强的高端设备上，你可以利用额外的像素为
    UI 增添精致细节，例如阴影和微妙的动画，从而提升用户体验。


    ##### CPU 和虚拟机特性


    这些特性是迄今为止对 Java ME 应用速度影响最大的因素。首先，我们来谈谈 CPU。由于大多数移动 CPU 都是基于 ARM 架构的，我们将以此作为参考。对于常规应用，如今
    100–200MHz 的范围通常就足够了。对于计算密集型应用或具有大量 UI 精细效果的应用，你可能需要 200–400MHz 甚至更高的频率，才能获得流畅的用户体验。当然，这些只是大致范围，并受到许多因素的影响，例如是否有后台应用在运行，以及
    CPU 是否支持 Jazelle 或 ThumbEE（支持 Jazelle 或 ThumbEE 的 ARM CPU 可以在硬件中运行 Java ME 字节码，从而大幅提升性能）。


    底层功能有时可能是一个重要的限制因素。有些设备不支持原生浮点运算，因此它们使用整数运算来模拟浮点运算。这使得这些设备上的浮点运算极其缓慢。同样常见的是，某些数学运算（如加法）比其他运算（如除法）更快。在某些设备上，这种差异非常显著，因此如果你的应用严重依赖这些较慢的运算，它在上述设备上的运行速度将远低于预期。在本书的后续部分，我们将看到如何通过代码优化来至少缓解部分问题。


    比 CPU 速度更重要的是虚拟机性能，尤其是在低端设备上。由于 Java ME 是解释字节码的，两台硬件规格相同但虚拟机不同的设备，其性能可能会有天壤之别——因此，仅凭
    CPU 速度并不能很好地衡量 Java ME 的性能。要了解特定设备运行你的应用的效果，可以编写小型测试应用来模拟真实应用可能承受的负载，并测量其性能。为了获得更全面的了解，可以逐步将“负载因子”从
    10% 变化到 200%。


    ##### 内存相关性能


    显然，你拥有的可用内存越多越好。然而，并非所有设备都会将其全部空闲内存提供给 Java ME，因此你应始终考虑 Java ME 实际可用的内存，而不是设备声明的内存容量。此外，尤其是在支持多任务的设备上，任何给定时刻的实际可用内存量都可能变化很大。你永远不应假设自己总是拥有相同数量的可用
    RAM，并且应始终进行防御性编码以应对这种情况。


    **注意：** 有一些方法可以解决内存问题——例如，使用持久化存储机制模拟页面文件，以及将大型负载拆分为更小、更易于管理的块。我们将在本书的后续部分讨论这些内容。


    仅次于内存大小，影响整体性能的是垃圾回收器的性能，这也与之前讨论的虚拟机性能相关。Java ME 应用往往会创建大量对象，而这些对象最终必须被删除。当这种情况发生时，垃圾回收器就会启动。当今市场上的设备拥有各种各样的垃圾回收器，从那些高效且不引人注目地完成工作的，到那些运行时间极长并在此过程中冻结整个应用的。你的应用应准备好处理其中大多数（如果不是全部）情况，尤其是当它是一个数据密集型应用时。


    对象创建的速度是影响任何 Java ME 应用性能的另一个重要因素。如果你的应用操作大量对象，这些对象的创建速度可能会严重限制应用的速度，甚至比垃圾回收器的影响更大。


    ##### 电池续航


    不同设备的电池续航能力差异很大——有些项目甚至对应用消耗电池的速度设定了限制。因此，在开发 Java ME 应用时，你需要尽量延长电池续航时间。


    延长电池续航最有效的方法是降低 CPU 使用率和网络访问频率。这并不总是容易做到，但很重要，尤其是对于倾向于长时间运行的应用，例如聊天客户端。此外，只要实施得当，降低功耗通常能有效延长电池续航。我们将在本书的后续部分对此进行更深入的了解。

    '
- fmt: '# Network Variations


    Most of the time, devices are connected via a 2G or 3G network, whose signal can
    drop at any time and whose speed can vary from extremely fast to very slow and
    back again in mere seconds. Pro Java ME applications have to take this into consideration.


    For some applications, the number of dropped packets or the ping time is extremely
    important. If this is the case, the application must be able to detect problems
    in this area and notify the user of their existence.


    Java ME also imposes a limit on the number of simultaneous connections an application
    can have. Though some devices support more, it is not a good idea to have more
    than two connections running at the same time.


    Another thing to consider is how the data is sent. Sending data in smaller, discrete
    packages is usually better than sending it in larger chunks, as in some cases
    larger chunks can cause the application to stall while it waits for the data to
    be sent.


    The format of the data is also important. Since data traffic costs money, using
    fewer bytes to send information saves money for the user and also makes your application
    more responsive, as it has less data to process. XML might be a well-known standard,
    but it is also extremely verbose. Consider using something more succinct, like
    JSON or a binary protocol.


    # Localization Issues


    Localization is extremely important for Pro Java ME applications. To have the
    application interact with a user in his native language, using the formats for
    date and currency he is used to, is emblematic of high quality.


    A crucial requirement for this, which is often overlooked, is to ensure that the
    target devices have proper support for the character set needed for a certain
    language. This is usually not a problem for Latin languages, but it can be one
    for non-Latin languages such as Greek. Character-set support for these languages
    is sometimes available only on certain country-specific firmware versions. This
    means that the text will look bad, full of placeholder characters, on devices
    that don''t support the needed character set. The best workaround for this problem
    is to use bitmap fonts and embed the necessary character set directly into the
    application.


    Equally important is the ability to support multiple date, time, currency, and
    number formats. Of these, proper date support is paramount. For example, some
    countries use `DD/MM/YYYY` instead of `MM/DD/YYYY` to specify dates, so a date
    like July 4, 2011 can be written either as `4/7/2011` or as `7/4/2011`. Not handling
    these differences properly can cause confusion and frustration for users. As for
    number format support, consider the following example: to express the number 4
    with three-decimal precision, some countries use `4.000` while others use `4,000`.
    Using the wrong decimal separator can again cause confusion and frustration for
    users—if you are used to having a dot as a decimal separator instead of a comma,
    `4,000` might be interpreted as "four thousand."


    Sometimes it''s also necessary to localize graphics and other media. This can
    range from the obvious, like a country''s flag, to the obscure, such as an icon
    that''s perfectly acceptable in some cultures but offensive in others. While this
    is not usually a problem, you should be aware that it can happen.


    # Limited Access to Device Capabilities


    An important set of limitations comes from the fact that Java ME is not usually
    able to access the full extent of a device''s capabilities.


    For example, some devices allow access only to certain parts of the file system
    but not to others, some devices provide support for accessing the user''s phonebook
    while others do not, and so forth.


    A good example is a phone''s camera. The on-device camera can typically be accessed
    from Java ME, but frequently the maximum image size that can be captured is lower
    than the camera''s actual maximum image size.


    This means that you can''t rely on the manufacturer''s specifications and that
    you need to do some on-device testing in order to figure out what capabilities
    you can use and to what extent.


    ## Regular Java ME Applications vs. Pro Java ME Applications


    After you''ve identified the device limitations and dealt with all the other project
    management issues, development typically begins. Before we get to that, however,
    let''s look at the most important differences between regular Java ME applications,
    the kind that you''d write as a hobby, and Pro Java ME applications, the kind
    we aim to create through the course of this book.


    ### Pro Java ME Apps Are Smart


    For example, they try to figure out the user''s next action based on his previous
    ones. If the user has selected three e-mails and deleted each of them, the app
    could ask him "Do you want to delete this e-mail?" when a fourth is selected.


    Pro Java ME apps also tend to handle special cases to enhance the user''s experience
    to a much higher degree. While a regular application would be content to display
    something like "0 unread e-mail(s)" or "1 unread e-mail(s)" (using the same ambiguous
    template in both cases), pro apps would choose the appropriate template for each
    case, thus displaying "No unread e-mails," "One unread e-mail," and "2 unread
    e-mails" accordingly. This principle extends to other parts of the application
    as well—for example, choosing a different color scheme on the user''s birthday.


    High-quality Java ME applications are also very resource-conscious, adapting themselves
    on the fly to make the most of the resources available, be they scarce or plentiful.


    ### Pro Java ME Apps Are Built Around a Custom Framework


    Pro Java ME applications are invariably built around a custom framework. This
    framework is usually developed in-house to fit the specific project it will be
    used on and each framework is generally designed from scratch. This is done because
    the framework should always try to fit the specific needs of each project, in
    order to be as efficient and as easy to use as possible.


    For example, the framework for a good Java ME HTML browser would be radically
    different from one for a Java ME e-mail client. The former would be geared toward
    handling UI layouts, with its structure, helper methods, and object hierarchy
    designed with this in mind, while the latter would be more focused on low-level
    client-server functionality and a lesser investment in UI-related features.


    This is in contrast to other mobile platforms, such as Android, where resource
    abundance means that you can just combine both frameworks into a single one and
    use that single framework for both projects.


    **TIP:** If designing a new framework from scratch isn''t feasible, you can start
    with an existing framework and add new features to it while removing unneeded
    ones. You should never reuse a framework as is unless the application you plan
    on writing is very similar to the one the framework was originally designed for.'
