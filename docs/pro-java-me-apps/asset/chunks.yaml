  trans: '

    #### 在桌面环境中运行测试


    在某些情况下，我们希望在桌面环境中运行代码（而非在模拟器或真实设备上运行）：例如，当您需要收集大量遥测数据时，当脚本文件体积庞大或动态生成时，或者当您希望将测试与调试器、分析器等工具集成时。


    幸运的是，这是可行的。MicroEmulator 是一个完全用 Java 编写的开源 Java ME 模拟器。它能较好地模拟标准的 Java ME API，适用于您想要运行的大多数单元测试。其主要优势在于，由于完全基于
    J2SE，您可以用它将 Java ME 代码与 J2SE 原生代码混合使用。这对于实现 Java ME 上无法完成的操作非常有用，例如使用反射 API 在不实际修改代码的情况下调整应用程序，利用
    J2SE 原生功能创建更强大的测试，或运行 J2SE 专属工具。


    **注意：** 您可以从 [`www.microemu.org`](http://www.microemu.org) 下载最新版本的 MicroEmulator。


    此外，由于它本质上是一个桌面应用程序，您可以充分利用桌面环境更高的灵活性。例如，您可以设置测试环境使其可通过远程桌面访问（适用于地理分布团队协作），使整个测试过程完全自动化，记录每次使用会话的详细信息以供后续分析等。


    在我看来，使用 MicroEmulator 的问题在于，它本质上是在模拟平台之上运行的模拟 API。这意味着，虽然您可以测试高级功能和算法，但绝不应依赖它来测试底层内容。任何与硬件调用（例如网络、图形）或操作系统调用（例如图形、生命周期方法）直接相关的内容都应被视为不可靠的，因为其最终行为可能与真实设备甚至专用
    Java ME 模拟器的行为截然不同。


    它的另一个问题是，其 API 集不如专用 Java ME 模拟器丰富或实现完善。您可能会发现运行代码或单元测试所需的 API 功能在 MicroEmulator
    上根本不可用。如果出现这种情况，您可以考虑自行实现所需 API，或向 MicroEmulator 团队提交功能请求。


    ### 执行可视化调试


    *可视化调试* 是指通过查看应用程序的可视化输出（即截图）来判断应用程序的输出和行为是否符合预期。由于存在多种 JVM、UI 框架和硬件规格，这对 Java
    ME 来说极为重要。


    此外，可视化调试对于涉及大量图像处理（例如游戏）以及处理复杂 UI 布局和布局规则（例如 HTML/CSS 浏览器）的应用程序尤为重要。它有助于发现图形异常和微小错误（例如像素偏移错误），这些错误在动态运行的应用程序中很难识别。


    **注意：** 截图分析可以是手动的（由人查看截图），也可以是自动的（由计算机将当前截图与参考截图进行比对）。


    大多数模拟器支持手动截图，少数支持捕获整个使用会话期间的全部输出（例如 MicroEmulator 可以将会话保存为 GIF 动画）。此外，某些 SDK（例如
    BlackBerry）允许您直接从连接的实体设备上截图。


    可视化调试与单元测试结合使用时尤为强大。一个技巧是：在 MicroEmulator 中运行与图形相关的单元测试（以利用“另存为 GIF”选项），并让每个测试用例在屏幕左上角绘制一个该测试独有的“条形码”。该条形码会与实际的测试输出一起作为
    GIF 动画中的一帧被保存。


    然后，使用自定义工具程序，您可以根据条形码从生成的 GIF 动画中提取每个单独的测试截图。这样，无论您的测试套件中有多少测试，也无论任何给定测试需要执行多长时间，您都可以自动获取所有测试的截图。这是通过常规手段无法实现的（除非
    MicroEmulator 提供可从测试套件访问的公共 API 来控制此类功能），并且该技术也可适用于其他模拟器。


    一旦获得了*每个测试*的截图，您就可以使用自动分析来逐一检查。即使对于包含数百个测试的复杂应用程序，计算机也只需几秒钟就能识别出参考截图与当前截图集之间的差异——而人类完成这项工作可能需要数十分钟甚至数小时。


    最后，收集应用程序截图也有助于快速了解某个应用程序在不同设备上的显示效果。这对于发现可用性问题和显示不一致性通常很重要，而这些问题在仅查看单个设备时很难发现。

    '
- fmt: '### Performing Battery Testing


    Battery testing is unique to mobile devices. Often times, you need to know how
    much battery power your application drains, for example, for determining the estimated
    maximum runtime of the application, for checking the results of power optimizations
    added to the application’s code, or simply for marketing purposes.


    The easiest and most reliable way to get battery measurements is to purchase specialized
    power-consumption measurement devices, such as wattmeters. These devices give
    you reliable information regarding the device’s instantaneous power consumption
    and overall power consumption. The downside is that run-of-the-mill wattmeters
    are a bit difficult to attach to a phone’s power circuit, and dedicated wattmeters
    designed specifically for use with mobile phones tend to be expensive.


    When dedicated hardware is out of the question, you can sometimes turn to using
    the native API to obtain battery measurements. This is a fairly common feature
    on smartphones. However, I have yet to see a pure Java ME device with this capability.
    As such, the only viable alternative to dedicated hardware measurement devices
    is to simply estimate the power consumption based on the battery’s rated capacity
    and the time it takes your application to drain it. Although this requires no
    extra hardware and works for any Java ME device, it does, however, require patience.


    The first thing you need to do is establish a few baseline cases and get the corresponding
    power measurements. For example, how long does it take for the device’s battery
    to drain out when no application is running and the radio is off? How long does
    it take to drain the battery when no application is running but the radio is on?
    What about when signal strength is only 50 percent, or when Wi-Fi is enabled along
    with the radio? Each plausible usage scenario should be turned into a baseline
    measurement.


    Then, you need to run your application in the same usage scenarios and compare
    the new measurements with the baseline ones. The difference in battery life is
    caused by your application’s power consumption. To be realistic, you should measure
    power consumption for three application-usage scenarios: low usage, medium usage,
    and intensive usage. You should also run each scenario at least four to five times
    to account for varying conditions (for example, network signal).


    Ideally, this would be the end of the story, but the real world is not ideal.
    It takes a lot of time for a phone’s battery to drain. This means that someone
    has to “play” with the phone in a consistent manner for at least a few hours until
    the phone dies, and then has to repeat the same usage pattern for several more
    test runs. Besides being a real chore (to say the least), this is also error prone,
    because the differences in usage patterns between runs, even tiny ones, can skew
    the test results. This is even a problem for measurements taken with dedicated
    hardware devices. You still need to measure power consumption for at least 10–20
    minutes, which is plenty of time to allow for consistent variance in usage patterns.


    **TIP:** It’s not always necessary to run your application until the battery is
    100 percent empty. Some devices display the remaining battery power, typically
    as a percentage value. In these cases, it’s usually enough to cause a 5–10 percent
    power drain to get a realistic estimate of your application’s power consumption.


    One solution to this problem is to automate the process. You can do this in three
    ways. The first way is to simply add a `robot` class to your application, which
    simulates the desired usage pattern in a loop. As far as your application is concerned,
    it’s the user issuing the commands, not the robot. This approach works, but it
    has some disadvantages. While your application thinks that there’s a real user
    at the helm, your device does not. As such, power-saving features might kick in
    (at the very least, the screen will turn off). This can be avoided through various
    means, including phone settings, native API calls, and physical trickery. It should
    also be noted that the `robot` class adds some CPU usage (typically small), which
    in turn translates to lost battery life.


    The second way involves sending commands (keypresses, touch events) to the device
    from a connected computer via a cable connection. These commands are usually treated
    in the same way as real user commands, so no power-saving measures should kick
    in. In addition, this gives a more accurate readout, because no extra strain gets
    added by the `robot` class. The problem with this approach is that it’s not readily
    accessible. Depending on the manufacturer and on the chipset/firmware, there’s
    usually quite a bit of digging and hacking involved, and the result is not always
    guaranteed to be successful.


    The third way involves hardware modding, and though it sounds difficult, it’s
    quite easy to do by someone who’s into this kind of thing (I knew someone in college
    who did this), because most of the bits of hardware required are readily available.
    The idea is that you link some or all of the device’s keys to a serial or parallel
    port on a PC. Signals sent to that port will be interpreted as real keypresses
    by the device. This works 100 percent of the time (providing the modding is properly
    done), and as a bonus it also provides the most realistic user simulation possible.
    This is by far the best solution in my opinion, although you will likely have
    to sacrifice a mobile phone in the process.


    Finally, it should be noted that batteries lose efficiency over time. Change your
    battery frequently to avoid skewing your test results.'
