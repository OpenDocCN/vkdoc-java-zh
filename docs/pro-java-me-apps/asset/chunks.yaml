  trans: '

    #### 添加上下文信息


    上下文信息与应用内帮助有些关联，即尽可能向用户呈现有用的信息，以便他们能进行更明智的交互，从而获得更好的用户体验。很多时候，这些信息并非关键；它们只是“锦上添花”，表明你连最微小的细节都考虑到了。


    例如，如果你正在编写一个文件管理器应用，当前选中文件的信息框可能会包含文件大小、创建日期和权限等详细信息。这些是适用于文件系统中任何文件的通用信息，并非特定于上下文。然而，根据文件扩展名，你可以检测当前选中的文件是否是一首
    MP3 歌曲。如果是这种情况，你还可以显示该文件的 ID3 标签信息，或者其时长和比特率，以及前面提到的通用信息。这是一个大多数资深用户都会欣赏的精致细节。


    上下文信息在其他场景中也很有用。在个人信息管理（PIM）应用中选中多个联系人时，你可以显示这些联系人有哪些共同细节——例如，他们共享相同的生日或相同的地点。在电子表格应用中，你可以显示当前公式引用了多少个单元格，或者重新计算它需要多少次估算操作。在聊天客户端中，你可以显示当前选中联系人的状态历史，或者你与该联系人对话的概览（已交换多少条消息，平均每小时交换多少条消息，等等）。这样的例子不胜枚举。


    上下文信息可以按需显示，也可以自动显示。由于我们讨论的是精致细节，我们只关注自动显示的上下文信息。因此，我们自然关心两件事：何时显示以及如何显示。


    这两者是相辅相成的。如果屏幕上有专门的区域用于显示上下文信息，例如滚动条，你可以在上下文发生变化时立即显示上下文信息。如果没有专门的屏幕区域，你可以使用延迟工具提示这一简单概念来实现此目的。当应用程序空闲数秒时——例如，用户选择了一个不同的文件，然后在
    3-4 秒内没有触碰手机——这些工具提示会出现在当前屏幕内容之上。如果提取上下文信息是一项 CPU 密集型操作，延迟工具提示也是一个不错的选择，在这种情况下，延迟有助于最大限度地减少提取上下文信息对性能的影响，这在
    Java ME 中可能非常显著。


    **提示：** 上下文信息不一定全是文本。例如，它可以是缩略图、色样、图表等等。在给定的场景中，使用任何更有意义的形式。


    此外，你可以让上下文信息具有交互性。例如，在文件管理器应用中，显示文件大小的工具提示可用于跳转到该文件的详细属性页面。这种交互性可以使你的上下文信息显示非常强大，并且它往往能最大化屏幕空间的利用：静态工具提示只是占用屏幕空间，而交互式工具提示则为用户提供了功能。


    #### 添加恰当的反馈


    为了帮助用户感觉一切尽在掌控之中，用户的操作（无论多么微小）都应始终伴随来自应用程序的反馈。这种反馈应该是可见的、即时的且不突兀的。如果可能，它还应该是*平滑的*。例如，在应用程序菜单中从一个选项导航到另一个选项时，旧选项的背景可以逐渐淡出，同时新选项的背景逐渐淡入。这种过渡应该相当快，在
    1 秒以内完成，以免显得突兀。


    除了美观之外，这种方法还有实际优势。用户的注意力会被吸引到新选中的菜单选项上，这对于视力障碍者和/或技术不太熟练的人（那些对手机没有太多实际操作经验的人）来说，是一个有用的指导。如果你计划将
    Java ME 应用程序推广到发展中国家，这一点尤其重要。


    在长时间操作期间，例如传输文件或处理大量数据时，应用程序也应该向用户提供反馈。至少，当此类操作正在进行时，屏幕上应显示一个小沙漏图标。为了进一步强调长时间操作正在进行，如果资源允许，沙漏图标还可以是动画的。最后，如果可能，考虑显示一个进度条和估计完成操作所需时间的提示。


    如果可能，表单之间的切换也应该伴随某种视觉反馈，尽管这主要是一种美观上的点缀。过渡应该快速且简单，例如 PowerPoint 中的“擦除”或“推入”过渡。


    除了视觉反馈，你还可以使用其他类型的反馈。例如，每当用户发起一个操作或应用程序有内容要呈现给用户时，你可以播放一段短小的音效。对于触屏设备，每当用户激活一个控件时，你可以触发一次短暂的振动，以模拟按下真实物理按钮的感觉。最后，一些设备允许你控制各种可用的光源（例如
    LCD 背光或呼吸/通知灯）。你可以利用这些在设备处于空闲模式时吸引用户的注意力。当设备不在用户手中时（例如，放在桌子上时），这尤其有用。


    这些额外反馈方式的问题在于它们往往会消耗电池电量。因此，应该适度使用它们。此外，并非所有 Java ME 设备都提供所有这些额外的反馈方式，所以除了视觉反馈之外，你永远不应依赖其他任何方式。


    一种非常特殊的反馈是来自设备外部的反馈。例如，如果你正在编写一个聊天客户端（显然是基于客户端-服务器的），你可以考虑添加一个选项，让用户在一天结束时通过电子邮件接收他们的聊天记录。虽然这绝不是必需的，但它有助于让你的应用程序保持在聚光灯下和用户的关注中，因为用户与它的交互超越了移动设备的界限。

    '
- fmt: "### Adding Adaptive Text Capabilities\n\nText input on mobile phones has never\
    \ been great, especially on Java ME devices. Many times text is entered in a hurry,\
    \ so mistakes are plentiful even with features such as T9. As such, one great\
    \ fine touch for Java ME applications is *adaptive text support*. For example,\
    \ if the user has a list of contacts and searches `Dany` instead of `Danny`, a\
    \ regular Java ME application will tell him that zero results have been found.\
    \ End of story. A Pro Java ME application does things differently. When the original\
    \ search returns no results, it asks whether the user wants to search for contacts\
    \ *similar* to `Dany`, in which case our `Danny` would be found—or, better yet,\
    \ the application does a *similar to Dany* search by default after the original\
    \ search returns no results.\n\nThere should be no question that the second approach\
    \ is better than the first. But how do we implement it? The key to this is something\
    \ called the *edit distance* between two strings: the number of operations (in\
    \ our case, individual character insertions, substitutions, or deletions) required\
    \ to transform one string into another. For example, the edit distance between\
    \ `Dany` and `Danny` is 1: you have to insert only an extra `n`. The edit distance\
    \ between `Ben` and `Bob` is 2: you have to substitute `en` with `ob`. Finally,\
    \ the edit distance between `Bob` and `Bo` is 1: you have to delete the final\
    \ `b`.\n\nThere are many ways to calculate the edit distance between two strings,\
    \ depending on the edit operations available and other factors. For our purposes,\
    \ we will use the Levenshtein edit distance algorithm, which is a bottom-up dynamic\
    \ programming algorithm.\n\nThe algorithm itself is quite simple. We start by\
    \ calculating the minimum edit distance between `S1[1...1]` (the first character\
    \ of the first string) and `S2[1...1]` (the first character of the second string),\
    \ and then between `S1[1...1]` and `S2[1...2]` (the first two characters of the\
    \ second string), and so forth, until we have the minimum distance between `S1[1...1]`\
    \ and `S2` as a whole. Then, we repeat the same process but with `S1[1...2]` instead\
    \ of `S1[1...1]`, and then with `S1[1...3]`, and so forth, until we have the minimum\
    \ distance between `S1` and `S2`.\n\nThere are a few variations on this algorithm\
    \ and quite a few possible implementations for it. The code presented in [Listing\
    \ 11–1](#Chapter11.html#list_11_1) is the simplest possible one.\n\n**Listing\
    \ 11–1.** *Levenshtein Edit Distance Algorithm*\n\n```\npublic static int editDistance(String\
    \ s1, String s2) {\n        int i,j;\n        int sizeS1 = s1.length();\n    \
    \    int sizeS2 = s2.length();\n\n        // Create the edit distance matrix\n\
    \        int distances[][] = new int[sizeS1+1][sizeS2+1];\n\n        // Initialize\
    \ the matrix\n        for (i=0; i<=sizeS1; i++) {\n                distances[i][0]\
    \ = i;\n        }\n        for (j=0; j<=sizeS2; j++) {\n                distances[0][j]\
    \ = j;\n        }\n\n        // Calculate the edit distance\n        for (i=1;\
    \ i<=sizeS1; i++) {\n                for (j=1; j<=sizeS2; j++) {\n\n         \
    \               if ( s1.charAt(i-1) == s2.charAt(j-1) ) {\n                  \
    \              // No operation required, cost stays the same\n               \
    \                 distances[i][j] = distances[i-1][j-1];\n                   \
    \     }\n                        else\n                        {\n// Calculate\
    \ the minimum distance based on the three\n// operations we can do at this point:\n\
    distances[i][j] = Math.min (\n// Delete S1[i]\ndistances[i-1][j] + 1,\n// Insert\
    \ S2[j]\nMath.min ( distances[i][j-1] + 1,\n// Substitute S1[i] for S2[j]\ndistances[i-1][j-1]\
    \ + 1 ) );\n                        }\n                }\n        }\n\n      \
    \  return distances[sizeS1][sizeS2];\n}\n```\n\nThe code in bold is where the\
    \ magic happens: at each step along the way, the best possible operation (deletion,\
    \ insertion, substitution) is chosen so that the edit distance between `S1[1...i]`\
    \ and `S2[1...j]` is minimal.\n\nOnce we know the edit distance between two strings,\
    \ we can determine whether the two *nearly match*. The definition of *near match*\
    \ depends on the context. For two very short strings (`Mom` and `Dad`), an edit\
    \ distance of 2 or 3 means that the user probably had something else in mind,\
    \ while for longer strings an edit distance of 2 or 3 is acceptable.\n\nAdaptive\
    \ text can be used for anything from matching contacts in the address book to\
    \ matching filenames in a file manager application. However, one of its more interesting\
    \ applications is as a sorting filter. Rather than sorting entries alphabetically,\
    \ you sort them according to their edit distance from a pattern the user enters.\
    \ For example, if you're writing a dictionary of foreign-language phrases, you\
    \ can ask the user to enter part of the phrase he or she is looking for, and the\
    \ application will sort all the phrases in its database according to their distance\
    \ to it. This works great, because many times people “kinda” remember how a phrase\
    \ is written or what it sounds like, so this is usually much faster and easier\
    \ for the user than it would be to go over the phrases by hand. Obviously, this\
    \ makes sense only if the entered phrase is in the foreign language (for example,\
    \ something the user heard on the street).\n\nFinally, the interesting thing about\
    \ adaptive text capabilities is that they can be easily ported to nontextual information.\
    \ For example, the same algorithm just described (with small adaptations) can\
    \ be used to calculate the edit distance between two images or between two series\
    \ of numbers. This can come in handy in data processing applications.\n\n### Adding\
    \ History and Auto-Complete Support\n\n*History* and *auto-complete support* should\
    \ be familiar to everyone reading this book, because they are both widely used\
    \ in web browsers. The concepts, however, are a perfect fit for the mobile world\
    \ too, and for Java ME in particular, because typing on Java ME devices is more\
    \ difficult than typing on a computer keyboard.\n\nFurthermore, they fit well\
    \ not only in the context of entering e-mail addresses, web-site URLs, and search\
    \ terms. You can use history to quickly get to the people you were last chatting\
    \ with in a chat program, or to the dates you last viewed in a calendar/PIM application.\
    \ And auto-complete can be used for more than just simple texts. For example,\
    \ if you are writing an IMAP/POP e-mail client, the program application could\
    \ detect addresses from well known e-mail providers (that is, `someone@gmail.com`\
    \ or `someone.else@yahoo.com`) and auto-complete the necessary connection parameters.\
    \ History support can also be used to implement other fine touches, such as Undo/Redo.\n\
    \nThere are several major limitations to implementing history and auto-complete\
    \ features on Java ME. The first one is that Java ME is usually extremely memory-limited,\
    \ so although you can remember, for example, what object you visited last, it's\
    \ usually not feasible to also remember what *state* the object was in. Therefore,\
    \ it's usually best to use history-like functionality only on simple immutable\
    \ objects, such as strings. Also because of limited memory, auto-complete lists\
    \ are usually implemented as fixed-size LIFO (last in, first out) queues: whenever\
    \ an item is added to the queue, the last item (which is the least used one in\
    \ our case) is removed.\n\nCPU limitations are also an important factor in the\
    \ workings of Java ME auto-complete mechanisms. Auto-complete involves a lot of\
    \ comparisons, typically between `String`s. Therefore, if the auto-complete list\
    \ is fairly large, it is usually not feasible to employ it until at least three\
    \ to four characters have been entered. Small auto-complete lists can typically\
    \ be used as soon as the first character is entered, but being small, their usage\
    \ is limited."
  raw: '#### Adding Adaptive Text Capabilities


    Text input on mobile phones has never been great, especially on Java ME devices.
    Many times text is entered in a hurry, so mistakes are plentiful even with features
    such as T9\. As such, one great fine touch for Java ME applications is *adaptive
    text support*. For example, if the user has a list of contacts and searches *Dany*
    instead of *Danny*, a regular Java ME application will tell him that zero results
    have been found. End of story. A Pro Java ME application does things differently.
    When the original search returns no results, it asks whether the user wants to
    search for contacts *similar* to *Dany*, in which case our *Danny* would be found—or,
    better yet, the application does a *similar to Dany* search by default after the
    original search returns no results.


    There should be no question that the second approach is better than the first.
    But how do we implement it? The key to this is something called the *edit distance*
    between two strings: the number of operations (in our case, individual character
    insertions, substitutions, or deletions) required to transform one string into
    another. For example, the edit distance between *Dany* and *Danny* is 1: you have
    to insert only an extra *n*. The edit distance between *Ben* and *Bob* is 2: you
    have to substitute *en* with *ob*. Finally, the edit distance between *Bob* and
    *Bo* is 1: you have to delete the final *b*.


    There are many ways to calculate the edit distance between two strings, depending
    on the edit operations available and other factors. For our purposes, we will
    use the Levenshtein edit distance algorithm, which is a bottom-up dynamic programming
    algorithm.


    The algorithm itself is quite simple. We start by calculating the minimum edit
    distance between S1[1...1] (the first character of the first string) and S2[1...1]
    (the first character of the second string), and then between S1[1...1] and S2[1...2]
    (the first two characters of the second string), and so forth, until we have the
    minimum distance between S1[1...1] and S2 as a whole. Then, we repeat the same
    process but with S1[1...2] instead of S1[1...1], and then with S1[1...3], and
    so forth, until we have the minimum distance between S1 and S2.


    There are a few variations on this algorithm and quite a few possible implementations
    for it. The code presented in [Listing 11–1](#Chapter11.html#list_11_1) is the
    simplest possible one.


    **Listing 11–1.** *Levenshtein Edit Distance Algorithm*


    `public static int editDistance(String s1, String s2) {`


    `        int i,j;`

    `        int sizeS1 = s1.length();`

    `        int sizeS2 = s2.length();`


    `        // Create the edit distance matrix`

    `        int distances[][] = new int[sizeS1+1][sizeS2+1];`


    `        // Initialize the matrix`

    `        for (i=0; i<=sizeS1; i++) {`

    `                distances[i][0] = i;`

    `        }`

    `        for (j=0; j<=sizeS2; j++) {`

    `                distances[0][j] = j;`

    `        }`


    `        // Calculate the edit distance`

    `        for (i=1; i<=sizeS1; i++) {`

    `                for (j=1; j<=sizeS2; j++) {`


    `                        if ( s1.charAt(i-1) == s2.charAt(j-1) ) {`

    `                                // No operation required, cost stays the same`

    `                                distances[i][j] = distances[i-1][j-1];`

    `                        }`

    `                        else`

    `                        {`

    **`// Calculate the minimum distance based on the three`**

    **`// operations we can do at this point:`**

    **`distances[i][j] = Math.min (`**

    **`// Delete S1[i]`**

    **`distances[i-1][j] + 1,`**

    **`// Insert S2[j]`**

    **`Math.min ( distances[i][j-1] + 1,`**

    **`// Substitute S1[i] for S2[j]`**

    **`distances[i-1][j-1] + 1 ) );`**

    `                        }`

    `                }`

    `        }`


    `        return distances[sizeS1][sizeS2];`

    `}`


    The code in bold is where the magic happens: at each step along the way, the best
    possible operation (deletion, insertion, substitution) is chosen so that the edit
    distance between S1[1...i] and S2[1...j] is minimal.


    Once we know the edit distance between two strings, we can determine whether the
    two *nearly match*. The definition of *near match* depends on the context. For
    two very short strings (*Mom* and *Dad*), an edit distance of 2 or 3 means that
    the user probably had something else in mind, while for longer strings an edit
    distance of 2 or 3 is acceptable.


    Adaptive text can be used for anything from matching contacts in the address book
    to matching filenames in a file manager application. However, one of its more
    interesting applications is as a sorting filter. Rather than sorting entries alphabetically,
    you sort them according to their edit distance from a pattern the user enters.
    For example, if you''re writing a dictionary of foreign-language phrases, you
    can ask the user to enter part of the phrase he or she is looking for, and the
    application will sort all the phrases in its database according to their distance
    to it. This works great, because many times people “kinda” remember how a phrase
    is written or what it sounds like, so this is usually much faster and easier for
    the user than it would be to go over the phrases by hand. Obviously, this makes
    sense only if the entered phrase is in the foreign language (for example, something
    the user heard on the street).


    Finally, the interesting thing about adaptive text capabilities is that they can
    be easily ported to nontextual information. For example, the same algorithm just
    described (with small adaptations) can be used to calculate the edit distance
    between two images or between two series of numbers. This can come in handy in
    data processing applications.


    #### Adding History and Auto-Complete Support


    *History* and *auto-complete support* should be familiar to everyone reading this
    book, because they are both widely used in web browsers. The concepts, however,
    are a perfect fit for the mobile world too, and for Java ME in particular, because
    typing on Java ME devices is more difficult than typing on a computer keyboard.


    Furthermore, they fit well not only in the context of entering e-mail addresses,
    web-site URLs, and search terms. You can use history to quickly get to the people
    you were last chatting with in a chat program, or to the dates you last viewed
    in a calendar/PIM application. And auto-complete can be used for more than just
    simple texts. For example, if you are writing an IMAP/POP e-mail client, the program
    application could detect addresses from well known e-mail providers (that is,
    `someone@gmail.com` or `someone.else@yahoo.com`) and auto-complete the necessary
    connection parameters. History support can also be used to implement other fine
    touches, such as Undo/Redo.


    There are several major limitations to implementing history and auto-complete
    features on Java ME. The first one is that Java ME is usually extremely memory-limited,
    so although you can remember, for example, what object you visited last, it''s
    usually not feasible to also remember what *state* the object was in. Therefore,
    it''s usually best to use history-like functionality only on simple immutable
    objects, such as strings. Also because of limited memory, auto-complete lists
    are usually implemented as fixed-size LIFO (last in, first out) queues: whenever
    an item is added to the queue, the last item (which is the least used one in our
    case) is removed.


    CPU limitations are also an important factor in the workings of Java ME auto-complete
    mechanisms. Auto-complete involves a lot of comparisons, typically between `String`s.
    Therefore, if the auto-complete list is fairly large, it is usually not feasible
    to employ it until at least three to four characters have been entered. Small
    auto-complete lists can typically be used as soon as the first character is entered,
    but being small, their usage is limited.'
  trans: '

    #### 添加自适应文本功能


    在手机上输入文本从来都不是一件轻松的事，尤其是在 Java ME 设备上。很多时候，文本输入都很匆忙，因此即使有 T9 这样的功能，错误也依然很多。因此，为
    Java ME 应用程序添加一个绝佳的润色功能就是*自适应文本支持*。例如，如果用户有一个联系人列表，并搜索了 *Dany* 而不是 *Danny*，普通的
    Java ME 应用程序会告诉他找到了零个结果。故事到此结束。而一个专业的 Java ME 应用程序则会采取不同的做法。当原始搜索没有返回结果时，它会询问用户是否想要搜索与
    *Dany* *相似*的联系人，这样我们的 *Danny* 就会被找到——或者更棒的是，应用程序在原始搜索无结果后，会默认执行一次*与 Dany 相似*的搜索。


    毫无疑问，第二种方法比第一种更好。但我们该如何实现它呢？其关键在于两个字符串之间的所谓*编辑距离*：即将一个字符串转换成另一个字符串所需操作（在我们的场景中，指单个字符的插入、替换或删除）的数量。例如，*Dany*
    和 *Danny* 之间的编辑距离是 1：你只需要插入一个额外的 *n*。*Ben* 和 *Bob* 之间的编辑距离是 2：你需要将 *en* 替换为 *ob*。最后，*Bob*
    和 *Bo* 之间的编辑距离是 1：你需要删除末尾的 *b*。


    根据可用的编辑操作和其他因素，计算两个字符串之间编辑距离的方法有很多种。出于我们的目的，我们将使用 Levenshtein 编辑距离算法，这是一种自底向上的动态规划算法。


    该算法本身相当简单。我们首先计算 S1[1...1]（第一个字符串的第一个字符）和 S2[1...1]（第二个字符串的第一个字符）之间的最小编辑距离，然后计算
    S1[1...1] 和 S2[1...2]（第二个字符串的前两个字符）之间的最小编辑距离，依此类推，直到我们得到 S1[1...1] 与整个 S2 之间的最小距离。然后，我们重复相同的过程，但将
    S1[1...1] 替换为 S1[1...2]，然后是 S1[1...3]，依此类推，直到我们得到 S1 和 S2 之间的最小距离。


    这个算法有一些变体，并且有相当多的实现方式。清单 11–1 中给出的代码是最简单的一种。


    **清单 11–1.** *Levenshtein 编辑距离算法*


    `public static int editDistance(String s1, String s2) {`


    `        int i,j;`

    `        int sizeS1 = s1.length();`

    `        int sizeS2 = s2.length();`


    `        // 创建编辑距离矩阵`

    `        int distances[][] = new int[sizeS1+1][sizeS2+1];`


    `        // 初始化矩阵`

    `        for (i=0; i<=sizeS1; i++) {`

    `                distances[i][0] = i;`

    `        }`

    `        for (j=0; j<=sizeS2; j++) {`

    `                distances[0][j] = j;`

    `        }`


    `        // 计算编辑距离`

    `        for (i=1; i<=sizeS1; i++) {`

    `                for (j=1; j<=sizeS2; j++) {`


    `                        if ( s1.charAt(i-1) == s2.charAt(j-1) ) {`

    `                                // 无需操作，成本保持不变`

    `                                distances[i][j] = distances[i-1][j-1];`

    `                        }`

    `                        else`

    `                        {`

    **`// 基于我们此时可以执行的三种操作计算最小距离：`**

    **`distances[i][j] = Math.min (`**

    **`// 删除 S1[i]`**

    **`distances[i-1][j] + 1,`**

    **`// 插入 S2[j]`**

    **`Math.min ( distances[i][j-1] + 1,`**

    **`// 将 S1[i] 替换为 S2[j]`**

    **`distances[i-1][j-1] + 1 ) );`**

    `                        }`

    `                }`

    `        }`


    `        return distances[sizeS1][sizeS2];`

    `}`


    加粗的代码是神奇发生的地方：在每一步中，都会选择最佳的操作（删除、插入、替换），以便 S1[1...i] 和 S2[1...j] 之间的编辑距离最小。


    一旦我们知道两个字符串之间的编辑距离，我们就可以判断它们是否*近似匹配*。*近似匹配*的定义取决于上下文。对于两个非常短的字符串（*Mom* 和 *Dad*），编辑距离为
    2 或 3 意味着用户可能想输入其他内容，而对于较长的字符串，编辑距离为 2 或 3 是可以接受的。


    自适应文本可用于从匹配通讯录中的联系人到匹配文件管理器应用程序中的文件名等各种场景。然而，其更有趣的应用之一是作为排序过滤器。不是按字母顺序对条目进行排序，而是根据它们与用户输入模式的编辑距离进行排序。例如，如果你正在编写一个外语短语词典，你可以让用户输入他/她正在寻找的短语的一部分，应用程序将根据数据库中所有短语与该输入的距离进行排序。这非常有效，因为很多时候人们只是“大概”记得一个短语的写法或听起来像什么，因此这对用户来说通常比手动浏览所有短语要快得多、容易得多。显然，这仅在输入的短语是外语（例如，用户在街上听到的某个短语）时才有意义。


    最后，自适应文本功能的有趣之处在于，它们可以轻松地移植到非文本信息上。例如，刚才描述的相同算法（稍作调整）可用于计算两个图像之间或两个数字序列之间的编辑距离。这在数据处理应用程序中会派上用场。


    #### 添加历史记录和自动补全支持


    *历史记录*和*自动补全支持*对于阅读本书的每个人来说应该都不陌生，因为它们都在网络浏览器中被广泛使用。然而，这些概念也非常适合移动世界，尤其是 Java
    ME，因为在 Java ME 设备上打字比在计算机键盘上打字更困难。


    此外，它们不仅适用于输入电子邮件地址、网站 URL 和搜索词等场景。你可以使用历史记录快速找到你在聊天程序中最后聊天的人，或者你在日历/PIM 应用程序中最后查看的日期。而自动补全的用途也不仅限于简单的文本。例如，如果你正在编写一个
    IMAP/POP 电子邮件客户端，程序可以检测来自知名电子邮件提供商（例如，`someone@gmail.com` 或 `someone.else@yahoo.com`）的地址，并自动补全必要的连接参数。历史记录支持也可以用来实现其他润色功能，例如撤销/重做。


    在 Java ME 上实现历史记录和自动补全功能存在几个主要限制。首先，Java ME 的内存通常极其有限，因此，尽管你可以记住，例如，你上次访问的是哪个对象，但通常无法同时记住该对象当时所处的*状态*。因此，通常最好只在简单的不可变对象（如字符串）上使用类似历史记录的功能。同样由于内存限制，自动补全列表通常实现为固定大小的
    LIFO（后进先出）队列：每当一个项目被添加到队列中时，最后一个项目（在我们的场景中是最少使用的项目）就会被移除。


    CPU 限制也是影响 Java ME 自动补全机制运行的一个重要因素。自动补全涉及大量比较，通常是 `String` 之间的比较。因此，如果自动补全列表相当大，通常直到输入至少三到四个字符后才适合启用它。较小的自动补全列表通常可以在输入第一个字符后立即使用，但由于其规模小，其用途也有限。

