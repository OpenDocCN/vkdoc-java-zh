- fmt: "You can see that both the file-based and array-based methods eventually rely\
    \ on `loadFromDataInputStream()` to do the work. You can also see that all methods\
    \ are static. This decision was made so that the `Locale` class can be easily\
    \ used from anywhere in the application, the importance of which will become even\
    \ clearer once we actually start to use the localization functionality.\n\nAs\
    \ for reading the localization data, the highlighted lines are where the magic\
    \ happens. All we need to do is read key/value pairs in sequence until an `EOFException`\
    \ is thrown (in which case the reading was successful) or an `IOException` is\
    \ thrown (in which case something went wrong). The mechanism is simple and reliable\
    \ on the Java ME side, because the original localization files were processed\
    \ and verified on the J2SE side. In fact, any checks or validations should be\
    \ done exclusively on the J2SE side of things.\n\nNow that the core loading functionality\
    \ is there, let's add some helper methods. We're interested in getting the device's\
    \ current locale, in finding the appropriate localization file within the JAR\
    \ file based solely on a locale's name, and in figuring out what localization\
    \ file to load based on the user's preferred locale, the phone's locale, and the\
    \ default locale. All these are covered by the code in [Listing 7–8](#Chapter07.html#list_7_8).\n\
    \n**Listing 7–8.** *Helper Methods for the Localization Module*\n\n```\npublic\
    \ static String getDeviceLocale()\n{\n        return System.getProperty(\"microedition.locale\"\
    );\n}\n\npublic static String getLocaleFile(String locale)\n{\n        if ( locale\
    \ == null )\n        {\n                return getLocaleFile(getDeviceLocale());\n\
    \        }\n        return \"/app/files/L10n/\" + locale + \".bin\";\n}\n\npublic\
    \ static boolean loadFromFileBasedOnPreferences(String specifiedUserLocale,\n\
    String defaultLocale)\n{\n        // Try to load, in order, the specified user\
    \ locale, the default locale,\n        // and the device locale\n        if (\
    \ loadFromInternalFile( getLocaleFile(specifiedUserLocale) ) ||\n            \
    \     loadFromInternalFile( getLocaleFile(getDeviceLocale() ) ) ||\n         \
    \        loadFromInternalFile( getLocaleFile(defaultLocale) ) )\n        {\n \
    \               return true;\n        }\n\n        // Everything has failed\n\
    \        return false;\n}\n```\n\nAll of these are convenience methods at this\
    \ point, as their underlying functionality is really, really simple. The main\
    \ point of having them in the first place is long-term flexibility. For example,\
    \ the resolution of locale name to file name in `getLocaleFile()` is extremely\
    \ simple right now, but in the long run it might be changed to something more\
    \ complex—for example, if the requested locale is en-UK, but that's not available,\
    \ whereas en-US is, then use en-US instead.\n\nFinally, it's time to write the\
    \ methods that actually do most of the work: retrieving translation values for\
    \ keys, both general and parameter-specific. Their code is presented in [Listing\
    \ 7–9](#Chapter07.html#list_7_9).\n\n**Listing 7–9.** *Retrieving Values for Translation\
    \ Keys*\n\n```\npublic static String get(String key)\n{\n        return (String)\
    \ keyValuePairs.get(key);\n}\n\npublic static String get(String key, int value)\n\
    {\n        return get(key, String.valueOf(value) );\n}\n\npublic static String\
    \ get(String key, String parameter)\n{\n    // Try to read the parameter-specific\
    \ key first\n    String originalStr = get(key + \":\" + parameter);\n\n    //\
    \ If no parameter-specific key exists then try to read the generic key\n    if\
    \ ( originalStr == null )\n    {\n        originalStr = get(key);\n    }\n\n \
    \   // No key found at all, return null\n    if ( originalStr == null )\n    {\n\
    \        return null;\n    }\n\n    // See if a parameter placeholder exists\n\
    \    int placeholderPosition = originalStr.indexOf(\"{@}\");\n\n    // There is\
    \ no parameter placeholder, return the value as-is\n    if ( placeholderPosition\
    \ == -1 )\n    {\n        return originalStr;\n    }\n\n    // Replace the parameter\
    \ placeholder with the parameter value\n    // and return the resulting string\n\
    \    return originalStr.substring(0, placeholderPosition) + parameter +\n    \
    \            originalStr.substring(placeholderPosition+3);\n}\n```\n\nThat's it!\
    \ Our localization module is now ready for use. Let's take it for a test run.\n\
    \n### Testing the Localization Module\n\nTo test the localization module, the\
    \ first thing we need to do is create an input localization file. There are two\
    \ examples at the beginning of this chapter, [Listings 7–2](#Chapter07.html#list_7_2)\
    \ and [7–3](#Chapter07.html#list_7_3), so we'll concatenate both of them into\
    \ a single file and save that file to `C:\\test\\en-US.txt`.\n\nAfter that, we'll\
    \ need to process the localization file with our J2SE utility, like so:\n\n`java\
    \ –jar TranslationFileConverter.jar C:\\test\\en-US.txt C:\\test\\en-US.bin`\n\
    \nThe next step is to move the resulting `en-US.bin` file to the appropriate location\
    \ in the project folder, which is the sub-folder corresponding to the `app.files.L10n`\
    \ package. Once this is done, we can use the localization module in our application,\
    \ similar to the way shown in [Listing 7–10](#Chapter07.html#list_7_10).\n\n**Listing\
    \ 7–10.** *Testing the Localization Module*\n\n```\npackage test;\n\n...\n\npublic\
    \ class TestMidlet extends MIDlet\n{\n        ...\n\n    public void startApp()\n\
    \    {\n        // No user-preferred locale, default locale of en-US.\n      \
    \  // Localization module will try to use the phone's current\n        // locale,\
    \ if available, and if not it will default to en-US.\n        Locale.loadFromFileBasedOnPreferences(null,\
    \ \"en-US\");\n\n        // Two parameter-specific localization strings\n    \
    \    System.out.println ( Locale.get(\"new.email\",0) );\n        System.out.println\
    \ ( Locale.get(\"new.email\",1) );\n\n        // A generic localization string\n\
    \        System.out.println ( Locale.get(\"new.email\",9999) );\n\n        //\
    \ Parameters can also be strings\n        System.out.println ( Locale.get(\"new.email\"\
    ,\"a couple of\") );\n    }\n}\n```\n\nThe console output will look like this:\n\
    \n```\nNo new emails\nOne new email\nYou have 9999 new emails.\nYou have a couple\
