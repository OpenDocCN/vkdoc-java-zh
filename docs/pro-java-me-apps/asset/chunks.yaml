  raw: 'In order to calculate the size of the bounding box, we will start with the
    bounding box of the original image and rotate its four corners around the origin,
    just as we would the image itself. We then look at the coordinates of the four
    resulting points, remembering the minimum and maximum x and y coordinates we encounter—so
    we end up with `minX`, `maxX`, `minY`, `maxY`. The difference between the maximum
    x coordinate and the minimum x coordinate is the width of the resulting bounding
    box, and the difference between the maximum y coordinate and the minimum y coordinate
    is the height of the resulting bounding box.


    To make the mathematics simpler, we can consider one of the corners itself as
    being the origin of the coordinate system, rather than the more-intuitive approach
    of considering the center of the bounding box as being the origin of the coordinate
    system. This means we must calculate the coordinates only for the three remaining
    corners, because our initial corner has, by definition, coordinates `(0,0)`.


    The whole process is illustrated in [Figure 13–8](#Chapter13.html#fig_13_8).


    ![images](images/1308.jpg)


    **Figure 13–8.** *Calculating the size of the rotated bounding box of an image.
    (Calculation for width is illustrated.)*


    Translated into code, the result will look something like the one seen in [Listing
    13–10](#Chapter13.html#list_13_10).


    **Listing 13–10.** *Calculating the Size of the Rotated Bounding Box of an Image*


    `// Calculate rotated image size`

    `// To do this, first assume the lower-left corner is at (0,0).`

    `// Then, calculate the other three corners`

    `double point1x = originalW * Math.cos(angle);`

    `double point1y = originalW * Math.sin(angle);`

    `double point2x = -originalH * Math.sin(angle);`

    `double point2y = originalH * Math.cos(angle);`

    `double point3x = originalW * Math.cos(angle) - originalH * Math.sin(angle);`

    `double point3y = originalW * Math.sin(angle) + originalH * Math.cos(angle);`


    `// Next find the minimum and maximum coordinate values of the corners`

    `double minx = Math.min( 0, Math.min(point1x , Math.min(point2x , point3x)));`

    `double miny = Math.min( 0, Math.min(point1y , Math.min(point2y , point3y)));`

    `double maxx = Math.max( 0, Math.max(point1x , Math.max(point2x , point3x)));`

    `double maxy = Math.max( 0, Math.max(point1y , Math.max(point2y , point3y)));`


    `// Finally, calculate the actual width and height of the rotated image`

    `int rotatedW = (int) Math.floor(Math.abs(maxx - minx));`

    `int rotatedH = (int) Math.floor(Math.abs(maxy - miny));`


    Now that we know what the size of the rotated image’s bounding box is, we can
    start “moving” the pixels from the original image to the rotated one. To do this,
    we will use *inverse mapping*. That is, rather than going through all the pixels
    of the original image and seeing where they fit in the rotated image, we will
    go through all the pixels of the rotated image and see what pixels of the original
    image, if any, correspond to them.


    The reason for this is simple: regular mapping would leave holes in the rotated
    image. This happens because real pixels always have integer coordinates, whereas
    calculated pixels have real coordinates. This leads to differences between the
    calculated pixel coordinates and the actual pixel coordinates.


    To illustrate this, let’s assume that, after applying our rotation formula to
    a pixel in the original image, we get an `x’` value of `12.3`. To properly map
    the source pixel to the rotated image, we would need it to “fill” the space between
    `x’=11.8` and `x’=12.8`, so that `x’=12.3` sits right in the middle. However,
    what actually happens when the pixel is mapped to the rotated image is that the
    `12.3` value gets rounded down to `12`, and the space between `x’=12` and `x’=13`
    is actually filled; the `0.4` (`0.2 + 0.2`) difference between the calculated
    and actual `x’` values is empty space. This is illustrated in [Figure 13–9](#Chapter13.html#fig_13_9).


    ![images](images/1309.jpg)


    **Figure 13–9.** *Difference between calculated pixel coordinates and mapped pixel
    coordinates*


    If the image had only one dimension, this would not be a problem, because the
    empty space would have been covered by other pixels. However, in two dimensions
    this leads to cases in which entire pixels in the resulting image remain uncovered,
    appearing as holes in the rotated image.


    **NOTE:**“Holes” are a frequent occurrence in image transformations that have
    formulas resulting in real coordinates (as opposed to integer ones). To avoid
    this issue, inverse mapping should always be used in these scenarios.


    Besides using inverse mapping, there is one more thing we should do: take into
    consideration the center of rotation. For images, the center of rotation is the
    center of the image, which means that math-wise, the image center must have coordinates
    (0,0) in order for our rotation formulas to work.


    However, Java ME assigns the (0,0) coordinates to the upper-left corner of an
    image. We must account for this difference in coordinate mapping by adjusting
    our rotation formulas accordingly. As the coordinate difference between the image
    center and the upper-left corner of the image is `(-width/2, -height/2)`, the
    resulting adjusted formulas are the ones seen in [Listing 13–11](#Chapter13.html#list_13_11).


    **Listing 13–11.** *Rotation Formulas, Adjusted for Mapping Differences*


    `x'' = (x – width/2) * cos(a) – (y – height/2) * sin(a)`

    `y'' = (x – width/2) * sin(a) + (y – height/2)  * cos(a)`


    We now have everything we need to write our complete image rotation routine. It
    is shown in [Listing 13–12](#Chapter13.html#list_13_12).


    **Listing 13–12.** *The Complete Java ME Image Rotation Routine*


