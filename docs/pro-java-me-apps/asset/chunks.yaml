    The question now is, how do you measure, on paper, how good an algorithm is? Keep
    in mind that you can''t limit yourself to a specific use case and input set and
    you have to do this on a general level. Your measurement also has to be hardware-agnostic.
    So how do you do it?


    Donald E. Knuth, the famous computer scientist, solved this problem by inventing
    the “Big O” notation. In layman''s terms, here''s how it works. First, you identify
    all the variable quantities that can affect your algorithm. For example, if you''re
    trying to sort a list of numbers, then the size of the list is a variable quantity.
    If you''re trying to generate all possible boy-girl pairs from a set of boys and
    girls, then the number of boys and the number of girls are both variable quantities.
    Once you have identified all variable quantities, you then express the complexity
    of the algorithm in terms of these variables—and these variables alone.


    For example, let''s say we''re talking about sorting a list of `n` numbers with
    selection sort and that we want to know how good the algorithm is in terms of
    speed. What selection sort does is go through the list of numbers several times.
    At the first pass, the smallest number is found and placed first in the list.
    This requires that you go through all `n` numbers in the first pass, to find the
    smallest one of the lot. In the second pass, you already know that the first number
    in the list is in the correct position, so you need to go through only the remaining
    `n-1` numbers to find the second smallest number. You continue the process until
    you get to the last number in the list, where you go through only `1` number.


    The total number of steps needed is `O =n + (n-1) + (n-2) + ... + 1`, which is
    equal to `O = n * (n+1) / 2` or `O = (n^2 + n) / 2`. Since we''re talking about
    the general case here, we can assume that `n` can be a very big number, which
    makes `O` even bigger. In this case, half of O is, from a practical point of view,
    just as big as O (there is no real practical difference between having to do 10,000
    trillion steps and just 5,000 trillion steps). This means we can simplify our
    formula to `O = n^2 + n`. Next, assuming `n` is large enough, the value of `n^2`
    will greatly eclipse the value of `n` (for example, if `n=1000` then `n^2=100000`;
    when compared to `n^2` steps, `n` steps are practically irrelevant). This means
    that we can simplify our formula to `O = n^2`. This is our final formula, which
    we will write as `O(n^2)`, which is then read as “the complexity of the algorithm
    is `n^2.`”


    **TIP:** To quickly find the complexity of an algorithm, just write its general
    complexity formula as a polynomial and then discard any constants and all but
    the highest-exponent terms for each variable. For example, `O = 2 * n^3 + 5 *
    n^2 + n + m^2 * n + m` solves to `O(n^3+m^2*n)`. The terms `5 * n^2`, `n`, and
    `m` have been removed as they do not have the highest exponents for their respective
    variables, and the constant `2` from `2 * n^3` has also been removed.


    Alternatively, you can use the original formula for `O` and write `O( (n^2 + n)
    / 2 )`. This is not really correct from a theoretical point of view, but for small
    enough values of `n` this formula can yield more accurate results, especially
    for Java ME code, where every drop of performance matters.


    Now let''s assume you have two algorithms, one with `O(n^2)` and one with `O(n*log
    n)`. Which one is better? To answer this question, all you have to do is replace
    `n` with a really big number. For `n = 1000000`, the first algorithm has a “complexity”
    of 1,000,000,000,000, while the second one has a “complexity” of just 19,931,568\.
    The answer should be clear.


    **NOTE:** When expressing complexity, by convention all logarithms used are base
    2 logarithms.'
