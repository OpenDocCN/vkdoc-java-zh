- fmt: "#### Widgets\n\n任何 UI 的基本元素，从概念上讲，都是 widget。widget 基本上是对用户在屏幕上看到并可能与之交互的任何内容的抽象。按钮、标签、滚动条——它们都是\
    \ widget。屏幕本身也是一个 widget，尽管是一个特殊的 widget——稍后会详细介绍。\n\nwidget 有一个相对位置，由相对于其父级的\
    \ X 和 Y 坐标定义，以及一个相对于屏幕本身的绝对位置。它也有一个大小，用宽度和高度表示。它可以响应用户交互，例如按键和触摸事件。widget 也有一个状态，在我们的例子中可以是“聚焦”或“未聚焦”，并且可以响应状态变化。它还可以向外部世界提供状态信息——例如，它是否可以聚焦，以及在任意给定时间是否处于聚焦状态。\n\
    \nwidget 的 X 和 Y 坐标始终相对于其父级 widget（稍后会详细介绍）。其大小可以是 widget 的首选大小（由它自己计算），也可以是由外部方式设置的指定大小。指定大小始终优先于首选大小。\n\
    \n考虑到这一点，基本的`Widget`接口如[清单 6-1](#Chapter06.html#list_6_1)所示。\n\n**清单 6-1.** *基本的`Widget`接口*\n\
    \n```\npackage app.module.ui.models;\n\npublic interface Widget\n{\n    public\
    \ void setX(int x);\n    public void setY(int y);\n    public int getX();\n  \
    \  public int getY();\n    public int getAbsoluteX();\n    public int getAbsoluteY();\n\
    \    public void setContentWidth(int w);\n    public int getContentWidth();\n\
    \    public void setContentHeight(int h);\n    public int getContentHeight();\n\
    \    public int getPreferredContentHeight();\n    public int getPreferredContentWidth();\n\
    \    public int getTotalWidth();\n    public int getTotalHeight();\n    public\
    \ Container getParent();\n    public void setParent(Container c);\n    public\
    \ boolean handleKeyPressed(int key);\n    public boolean handleKeyReleased(int\
    \ key);\n    public boolean handlePointerPressed(int x, int y);\n    public boolean\
    \ handlePointerDragged(int x, int y);\n    public boolean handlePointerReleased(int\
    \ x, int y);\n    public boolean onFocus();\n    public boolean onLostFocus();\n\
    \    public boolean isFocusable();\n    public boolean isFocused();\n}\n```\n\n\
    到目前为止，这个接口中最复杂的部分是处理 widget 大小的部分，正如你从高亮代码中看到的那样。约定如下：`getPreferredContentWidth()`返回\
    \ widget 的理想宽度（由 widget 自己计算），`setContentWidth()`强制 widget 的内容具有指定的宽度，而`getContentWidth()`返回该强制宽度。\n\
    \n最后，`getTotalWidth()`返回实际的 widget 宽度，如果设置了`getContentWidth()`则返回该值，否则返回`getPreferredContentWidth()`。在实践中，我们主要使用`getTotalWidth()`，但有时你也会需要其他方法。当然，widget\
    \ 可以覆盖约定，让这些方法中的任何一个返回不同的值——但除非绝对必要，否则你不应该这样做，因为这可能会破坏你的 UI。\n\n在我们继续之前，有两个重要的方面需要牢记。第一个是知道何时使用\
    \ widget 的首选大小，何时强制设置大小。这非常重要。对于低级 widget，例如按钮，你应该始终尝试使用 widget 的首选大小。仅在极端情况下强制使用较小的尺寸——例如，当你需要使\
    \ widget 变小以适合父容器时。出于设计原因，强制 widget 使用较大的尺寸通常是可以的，但如果可能，也应避免这样做。\n\n第二个重要方面是，widget\
    \ 的大小不仅仅由宽度和高度指定。例如，widget 可以有内边距、外边距和边框。为了保持代码简单，我们不会涉及这些，但欢迎你尝试实现对这些特性的支持作为练习。\n\
    \n现在回到我们的接口。由于 widget 存在于 Java ME 应用程序中，因此还有一些与此相关的特定方法。我们需要能够检索 widget 的绝对屏幕位置、其裁剪矩形（实际可见的区域——稍后会详细介绍这个重要主题）以及其父视图。我们还需要能够绘制\
    \ widget，并在必要时请求重绘。因此，[清单 6-2](#Chapter06.html#list_6_2)中的方法将被添加到`Widget`接口中。\n\
    \n**清单 6-2.** *`Widget`接口的额外方法*\n\n```\n    public int getAbsoluteX();\n    public\
    \ int getAbsoluteY();\n    public ClipRect getClipRect();\n    public void requestRepaint();\n\
    \    public View getParentView();\n    public void paint(Graphics g);\n```\n\n\
    #### Containers\n\n如前所述，widget 可以有父级。父级只是一个实现了`Container`接口的 widget，如[清单 6-3](#Chapter06.html#list_6_3)所示。容器与集合非常相似——实际上，它们是\
    \ widget 的可视化集合。\n\n**清单 6-3.** *`Container`接口*\n\n```\npackage app.module.ui.models;\n\
    \npublic interface Container extends Widget\n{\n    public boolean addWidget(Widget\
    \ b);\n    public boolean insertWidget(Widget b, int index);\n    public int indexOf(Widget\
    \ w);\n    public void removeWidget(Widget b);\n    public int getChildCount();\n\
    \    public void focusWidget(Widget w);\n    public Widget getWidget(int index);\n\
    \    public void doLayout();\n}\n```\n\n高亮的方法对于容器来说非常重要：调用它会使容器根据其布局方案重新排列和调整其子\
    \ widget 的大小。例如，在`VerticalContainer`上调用`doLayout()`将按照添加顺序将其 widget 一个接一个地垂直排列，第一个添加的\
    \ widget 位于顶部。\n\n此时，你可能会问，例如，如果子 widget 的总高度超过了容器的高度，会发生什么。这是一个非常好的问题。为了解决这个问题，容器必须实现滚动。因此，[清单\
    \ 6-4](#Chapter06.html#list_6_4)中的方法将被添加到`Container`接口中。\n\n**清单 6-4.** *容器滚动方法*\n\
    \n```\npublic int getXScroll();\npublic int getYScroll();\npublic void setYScroll(int\
    \ scroll);\npublic void setXScroll(int scroll);\npublic boolean scrollToWidget(Widget\
    \ w);\n```\n\n通过滚动，容器的可见区域成为实际容器表面的视口，你可以将视口滚动到任何你喜欢的位置。\n\n容器也可以拒绝 widget。例如，`TabbedContainer`可能会拒绝任何不是`TabContainer`的\
    \ widget。当 widget 被拒绝时，`addWidget()`和`insertWidget()`方法返回`false`。\n\n容器的好处在于，由于它们本身也是\
    \ widget，因此它们也可以有父级。这提供了通过套娃效应创建复杂界面的可能性，其中容器嵌套在容器中，再嵌套在容器中。此外，容器允许你轻松创建复合 widget。例如，如果你想创建一个图片按钮，只需让`PictureButton`类成为一个包含图片\
    \ widget 和标签 widget 的容器即可。\n\n**注意：** 请记住，所有这些在原生 Java ME UI 包中都是不可能的！\n\n综上所述，屏幕本身就是一个容器，尽管是一个特殊的容器，因为它本身没有任何父级，并且其大小是固定的，与屏幕分辨率相匹配。"
  raw: '#### Widgets


    The fundamental element of any UI is, conceptually, the widget. A widget is basically
    an abstraction for anything that the user sees on the screen and can potentially
    interact with. Buttons, labels, scrollbars—they are all widgets. The screen itself
    is a widget too, albeit a special one—more on this later.


    A widget has a relative position, defined by X and Y coordinates relative to its
    parent, and an absolute position, relative to the screen itself. It also has a
    size, expressed in terms of width and height. It can respond to user interactions,
    such as keypresses and touch events. Widgets also have a state, which in our case
    can be either “focused” or “not focused,” and can respond to state changes. It
    can also provide state information to the outside world—for example, whether it
    can be focused, and whether it is focused at any given time.


    The widget’s X and Y coordinates are always relative to its parent widget (more
    on that soon). Its size can be either the widget’s preferred size (which it calculates
    itself) or a specified size set by external means. The specified size always takes
    priority over the preferred size.


    With this in mind, the basic `Widget` interface is presented in [Listing 6–1](#Chapter06.html#list_6_1).


    **Listing 6–1.** *The Basic `Widget` Interface*


    `package app.module.ui.models;`


    `public interface Widget`

    `{`

    `    public void setX(int x);`

    `    public void setY(int y);`

    `    public int getX();`

    `    public int getY();`

    `    public int getAbsoluteX();`

    `    public int getAbsoluteY();`

    **`    public void setContentWidth(int w);`**

    **`    public int getContentWidth();`**

    **`    public void setContentHeight(int h);`**

    **`    public int getContentHeight();`**

    **`    public int getPreferredContentHeight();`**

    **`    public int getPreferredContentWidth();`**

    **`    public int getTotalWidth();`**

    **`    public int getTotalHeight();`**

    `    public Container getParent();`

    `    public void setParent(Container c);`

    `    public boolean handleKeyPressed(int key);`

    `    public boolean handleKeyReleased(int key);`

    `    public boolean handlePointerPressed(int x, int y);`

    `    public boolean handlePointerDragged(int x, int y);`

    `    public boolean handlePointerReleased(int x, int y);`

    `    public boolean onFocus();`

    `    public boolean onLostFocus();`

    `    public boolean isFocusable();`

    `    public boolean isFocused();`

    `}`


    By far the most complicated part of this interface is the section dealing with
    widget size, as you can see from the highlighted code. The convention is as follows:
    `getPreferredContentWidth()` returns the ideal width for the widget (as calculated
    by the widget itself), `setContentWidth()` forces the widget’s content to be of
    a specified width, and `getContentWidth()` returns that forced width.


    Finally, `getTotalWidth()` returns the actual widget width, which is `getContentWidth()`
    if that’s set, or `getPreferredContentWidth()` otherwise. In practice we’ll mostly
    use `getTotalWidth()`, but sometimes you’ll need the other methods too. Of course,
    a widget can override the convention and have any of these methods return different
    values—but that’s not something you want to do unless absolutely necessary, as
    it may break your UI.


    Before we continue, there are two important aspects to keep in mind. The first
    is knowing when to use a widget’s preferred size and when to force a size on it.
    This is very important. For low-level widgets, such as buttons, you should always
    try to use a widget’s preferred size. Force a smaller size only in extreme circumstances—for
    example, when you need to make the widget smaller in order to fit inside the parent
    container. Forcing a larger size on a widget is generally OK for design reasons,
    but this too should be avoided if possible.


    The second important aspect is that a widget’s size can be specified by more than
    width and height. For example, a widget can have paddings, margins, and borders.
    We will not concern ourselves with those in order to keep the code simple, but
    feel free to try to implement support for them as an exercise.


    Now back to our interface. Since widgets exist within a Java ME application, there
    are also some specific methods related to this. We need to be able to retrieve
    a widget’s absolute screen position, its clipping rectangle (the area of it which
    is actually visible—more on this important subject later), and its parent view.
    We also need to be able to paint the widget and to request a repaint when necessary.
    Thus, the methods in [Listing 6–2](#Chapter06.html#list_6_2) will be added to
    the `Widget` interface.


    **Listing 6–2.** *Extra Methods for the `Widget` Interface*


    `    public int getAbsoluteX();`

    `    public int getAbsoluteY();`

    `    public ClipRect getClipRect();`

    `    public void requestRepaint();`

    `    public View getParentView();`

    `    public void paint(Graphics g);`


    #### Containers


    As stated previously, widgets can have parents. A parent is simply a widget that
    implements the `Container` interface, shown in [Listing 6–3](#Chapter06.html#list_6_3).
    Containers are very similar to collections—in fact, they are visual collections
    of widgets.


    **Listing 6–3.** *The `Container` Interface*


    `package app.module.ui.models;`


    `public interface Container extends Widget`

    `{`

    `    public boolean addWidget(Widget b);`

    `    public boolean insertWidget(Widget b, int index);`

    `    public int indexOf(Widget w);`

    `    public void removeWidget(Widget b);`

    `    public int getChildCount();`

    `    public void focusWidget(Widget w);`

    `    public Widget getWidget(int index);`

    **`    public void doLayout();`**

    `}`


    The highlighted method is a very important one for containers: calling it makes
    the container rearrange and resize its child widgets according to its layout scheme.
    For example, calling `doLayout()` on a `VerticalContainer` will arrange its widgets
    one below another in the order in which they were added, with the first added
    widget at the top.


    At this point, you might ask what happens, for example, if the total height of
    the child widgets exceeds the height of the container. This is a very good question.
    To solve this problem, containers must implement scrolling. Thus, the methods
    in [Listing 6–4](#Chapter06.html#list_6_4) will be added to the `Container` interface.


    **Listing 6–4.** *Container Scrolling Methods*


    `public int getXScroll();`

    `public int getYScroll();`

    `public void setYScroll(int scroll);`

    `public void setXScroll(int scroll);`

    `public boolean scrollToWidget(Widget w);`


    With scrolling, a container’s visible area becomes a viewport for the actual container
    surface, and you can scroll the viewport to any position you like.


    Containers are able to decline widgets, too. For example, a `TabbedContainer`
    may reject any widget that is not a `TabContainer`. The `addWidget()` and `insertWidget()`
    methods return `false` when a widget has been rejected.


    The nice thing about containers is that, as they are widgets themselves, they
    can also have a parent. This provides for the possibility of creating complex
    interfaces via the matrioska effect, where containers are nested within containers
    that are nested within containers. Moreover, containers allow you to easily create
    composite widgets. For example, if you want to create a picture button, simply
    have the `PictureButton` class be a container with a picture widget and a label
    widget inside of it.


    **NOTE:** Keep in mind that all of this simply isn’t possible with the native
    Java ME UI package!


    It follows from the foregoing that the screen is itself a container, albeit a
    special one, since it doesn’t have any parent per se, and its size is fixed and
    matches the screen resolution.'
  trans: '

    #### 控件


    任何用户界面的基本元素，从概念上讲，都是控件。控件基本上是对用户在屏幕上看到并可能与之交互的任何内容的抽象。按钮、标签、滚动条——它们都是控件。屏幕本身也是一个控件，尽管是一个特殊的控件——稍后会详细介绍。


    控件具有相对位置，由相对于其父级的 X 和 Y 坐标定义，以及相对于屏幕本身的绝对位置。它还具有尺寸，用宽度和高度表示。它可以响应用户交互，例如按键和触摸事件。控件还具有状态，在我们的例子中，状态可以是“聚焦”或“未聚焦”，并且可以响应状态变化。它还可以向外部世界提供状态信息——例如，它是否可以聚焦，以及在任意给定时刻是否处于聚焦状态。


    控件的 X 和 Y 坐标始终相对于其父控件（稍后会详细介绍）。其尺寸可以是控件的首选尺寸（由自身计算），也可以是由外部方式设置的指定尺寸。指定尺寸始终优先于首选尺寸。


    考虑到这一点，基本的 `Widget` 接口如代码清单 6–1 所示。


    **代码清单 6–1.** *基本的 `Widget` 接口*


    `package app.module.ui.models;`


    `public interface Widget`

    `{`

    `    public void setX(int x);`

    `    public void setY(int y);`

    `    public int getX();`

    `    public int getY();`

    `    public int getAbsoluteX();`

    `    public int getAbsoluteY();`

    **`    public void setContentWidth(int w);`**

    **`    public int getContentWidth();`**

    **`    public void setContentHeight(int h);`**

    **`    public int getContentHeight();`**

    **`    public int getPreferredContentHeight();`**

    **`    public int getPreferredContentWidth();`**

    **`    public int getTotalWidth();`**

    **`    public int getTotalHeight();`**

    `    public Container getParent();`

    `    public void setParent(Container c);`

    `    public boolean handleKeyPressed(int key);`

    `    public boolean handleKeyReleased(int key);`

    `    public boolean handlePointerPressed(int x, int y);`

    `    public boolean handlePointerDragged(int x, int y);`

    `    public boolean handlePointerReleased(int x, int y);`

    `    public boolean onFocus();`

    `    public boolean onLostFocus();`

    `    public boolean isFocusable();`

    `    public boolean isFocused();`

    `}`


    到目前为止，这个接口中最复杂的部分是与控件尺寸相关的部分，正如你从高亮代码中看到的那样。约定如下：`getPreferredContentWidth()`
    返回控件的理想宽度（由控件自身计算得出），`setContentWidth()` 强制将控件的内容设置为指定的宽度，而 `getContentWidth()`
    返回该强制宽度。


    最后，`getTotalWidth()` 返回实际的控件宽度，如果设置了 `getContentWidth()`，则返回该值，否则返回 `getPreferredContentWidth()`。在实践中，我们主要使用
    `getTotalWidth()`，但有时你也会需要其他方法。当然，控件可以覆盖此约定，让这些方法中的任何一个返回不同的值——但除非绝对必要，否则你不应该这样做，因为它可能会破坏你的用户界面。


    在我们继续之前，有两个重要的方面需要牢记。第一是知道何时使用控件的首选尺寸，何时强制为其设置尺寸。这非常重要。对于低级控件，例如按钮，你应该始终尝试使用控件的首选尺寸。仅在极端情况下才强制使用较小的尺寸——例如，当你需要使控件变小以适合父容器时。出于设计原因，强制控件使用较大的尺寸通常是可以接受的，但如果可能，也应避免这样做。


    第二个重要方面是，控件的尺寸不仅仅可以通过宽度和高度来指定。例如，控件可以有内边距、外边距和边框。为了保持代码简单，我们不会涉及这些，但欢迎你尝试实现对这些特性的支持作为练习。


    现在回到我们的接口。由于控件存在于 Java ME 应用程序中，因此还有一些与此相关的特定方法。我们需要能够获取控件的绝对屏幕位置、其裁剪矩形（实际可见的区域——稍后会详细介绍这个重要主题）以及其父视图。我们还需要能够绘制控件，并在必要时请求重绘。因此，代码清单
    6–2 中的方法将被添加到 `Widget` 接口中。


    **代码清单 6–2.** *`Widget` 接口的额外方法*


    `    public int getAbsoluteX();`

    `    public int getAbsoluteY();`

    `    public ClipRect getClipRect();`

    `    public void requestRepaint();`

    `    public View getParentView();`

    `    public void paint(Graphics g);`


    #### 容器


    如前所述，控件可以有父级。父级就是一个实现了 `Container` 接口的控件，如代码清单 6–3 所示。容器与集合非常相似——事实上，它们是控件的可视化集合。


    **代码清单 6–3.** *`Container` 接口*


    `package app.module.ui.models;`


    `public interface Container extends Widget`

    `{`

    `    public boolean addWidget(Widget b);`

    `    public boolean insertWidget(Widget b, int index);`

    `    public int indexOf(Widget w);`

    `    public void removeWidget(Widget b);`

    `    public int getChildCount();`

    `    public void focusWidget(Widget w);`

    `    public Widget getWidget(int index);`

    **`    public void doLayout();`**

    `}`


    高亮的方法对于容器来说非常重要：调用它会使容器根据其布局方案重新排列和调整其子控件的大小。例如，在 `VerticalContainer` 上调用 `doLayout()`
    将按照添加顺序将其控件一个接一个地排列，最先添加的控件位于顶部。


    此时，你可能会问，如果子控件的总高度超过了容器的高度，会发生什么。这是一个非常好的问题。为了解决这个问题，容器必须实现滚动。因此，代码清单 6–4 中的方法将被添加到
    `Container` 接口中。


    **代码清单 6–4.** *容器滚动方法*


    `public int getXScroll();`

    `public int getYScroll();`

    `public void setYScroll(int scroll);`

    `public void setXScroll(int scroll);`

    `public boolean scrollToWidget(Widget w);`


    有了滚动，容器的可见区域就变成了实际容器表面的视口，你可以将视口滚动到任何你想要的位置。


    容器也能够拒绝控件。例如，一个 `TabbedContainer` 可能会拒绝任何不是 `TabContainer` 的控件。当控件被拒绝时，`addWidget()`
    和 `insertWidget()` 方法会返回 `false`。


    容器的妙处在于，由于它们本身也是控件，所以它们也可以有父级。这提供了通过套娃效应创建复杂界面的可能性，即容器嵌套在容器中，而容器又嵌套在容器中。此外，容器允许你轻松创建复合控件。例如，如果你想创建一个图片按钮，只需让
    `PictureButton` 类成为一个容器，其中包含一个图片控件和一个标签控件即可。


    **注意：** 请记住，所有这些在原生 Java ME UI 包中都是不可能实现的！


    综上所述，屏幕本身就是一个容器，尽管是一个特殊的容器，因为它本身没有任何父级，并且其尺寸是固定的，与屏幕分辨率相匹配。

