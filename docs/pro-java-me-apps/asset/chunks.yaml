    opportunities as the leap from MIDP 1.0 to MIDP 2.0 did.


    For example, MIDP 3.0 will open the door for more-realistic games and more-powerful
    applications that are currently not possible (for example, applications that run
    in the background or as widgets). MIDP 3.0 will also open the possibility of having
    applications work as service providers, providing their services and capabilities
    to other applications.


    A picture-editing application will be able to share its data in real time with
    a document-editing application. This will allow the document editor application
    to embed image files in formats that it does not natively support, but that are
    supported by the picture-editing application. Furthermore, this makes it possible
    to edit a picture in the picture-editing software and instantly see the results
    reflected in the document. There are many opportunities to be seized here.


    As for NFC, its widespread adoption will turn mobile phones into particularly
    powerful tools, and Java ME phones will be like army knives: small, cheap, yet
    very powerful. As mentioned earlier, you will be able to use your mobile phone
    for anything from paying your bills to starting up your car.


    There is great potential for innovation here. For example, you could potentially
    use your phone as a shopping assistant: you would just place you phone near a
    product you’re interested in, and it would save that product in your “wanted”
    list, but it would also be able to compare it to other similar products available
    in the same store and provide you with detailed information about it. Or you could
    combine MIDP 3.0 and NFC to create really interesting social applications, such
    as a background-running social MIDlet that allows you to quickly exchange business
    cards and befriend another person on Facebook just by having the two of your touch
    your mobile phones together.'
  trans: '

    ### Java ME 应用类型


    最初，Java ME 应用不过是概念验证的产物。由于平台和硬件能力极其有限，你实际上无法用它们做太多事情。这种情况一直持续到 MIDP 2.0 标准和支持该标准的设备问世。


    那时，Java ME 应用领域开始蓬勃发展。大多数编写的应用是游戏，但也出现了一些严肃的应用，包括日历、计算器和电子表格。尽管如此，可选种类仍然不多，主要是因为任何严肃的数字运算都需要比当时设备所能提供的更强大的处理能力和更大的屏幕。


    如今，Java ME 拥有为其编写的种类繁多的应用，以及足够强大的设备来运行它们。从游戏到文档查看器，从远程桌面客户端到 GPS 软件，可谓应有尽有。


    除了这些应用类型，如前所述，未来 Java ME 在社交网络、银行和云计算相关的应用方面将迎来巨大增长。这些类型的应用都非常契合 Java ME 的广泛普及性，并且随着设备变得越来越强大，用户在这些设备上的体验（尤其是在社交网络方面）也将变得越来越令人愉悦。


    依赖与现实世界交互的应用也将日益突出。例如，NFC 通信可用于将你的手机与你的汽车、电视机甚至微波炉连接起来。家电制造商肯定会瞄准带有 NFC 芯片的 Java
    ME 设备以及任何智能手机平台，原因很简单，就是它们被广泛使用。


    增强现实的应用也将登场。随着越来越多的 Java ME 设备配备 GPS 和 3D 硬件，增强现实应用将开始出现在市场上。这些可能是现有应用的简单演进（例如，GPS
    应用将增加增强现实支持），也可能是独立的工具（例如，距离测量应用或博物馆导览）。


    MIDP 3.0 将带来编写目前根本无法实现的应用的可能性——例如，在后台运行的应用、在设备空闲屏幕上运行的应用，或响应系统级事件的应用。应用还将能够协同工作，共享数据和能力，从而产生“1+1>2”的效果。


    最后，与其他计算设备交互的应用也将开始出现。例如，配备了合适的 Java ME 应用，你将能够使用兼容的手机作为 PC 和主机游戏的游戏控制器。这方面的原型已经存在，但通常有限制（例如，它们利用手机的加速度计功能作为虚拟方向盘）。随着设备性能和能力的增长，手机被用作游戏控制器或其他计算设备增强工具的程度也将提高。例如，你将能够将手机与汽车的导航系统连接，获得“指路即达”的体验：你只需拍下你想去的地方的照片（地址、实景照片或地图），手机就会自动告诉
    GPS 去哪里。


    ### Java ME 创新


    目前，在当前 Java ME 平台状态下几乎所有可能实现的事情都已经完成，无论是商业应用还是概念验证。唯一剩下要做的就是将更多的概念验证应用带入现实世界。随着硬件变得越来越强大，这正在逐步实现。例如，五年前不可行的图形处理算法现在可以在现代
    Java ME 设备上运行，3D 触摸屏游戏也不再只是美好的愿望。同样的情况也适用于 GPS 软件、网络浏览器以及其他过去不可行的软件类别。


    还有许多其他类型的应用，或多或少属于概念验证，正等待成为焦点（例如，电子银行客户端和家庭远程控制应用）。这些应用尚未准备好进入黄金时段，但它们的时代无疑会到来，因为生活在一个互联的世界意味着人们希望在移动中做越来越多的事情。


    随着 MIDP 2.0 设备取代旧的 MIDP 1.0 设备，以及发展中世界手机数量的增加，真正创新（甚至可能改变生活）的潜力是存在的，尽管是在不同的层面上。例如，在我们看来可能无用或幼稚的应用，比如教幼儿识字和数数的应用，在教育匮乏的世界部分地区却是无价之宝。这种技术、创新和社会关怀的结合可以带来改变——而
    Java ME 正是实现这一目标的完美平台。


    然而，真正的创新将在 MIDP 3.0 设备出现在市场上以及 NFC 变得普及时起飞。这些技术中的每一项都提供了与从 MIDP 1.0 跃升到 MIDP 2.0
    时一样多的创新机会。


    例如，MIDP 3.0 将为更逼真的游戏和更强大的应用打开大门，这些是目前无法实现的（例如，在后台运行或作为小部件的应用）。MIDP 3.0 还将开启应用作为服务提供者的可能性，向其他应用提供其服务和能力。


    一个图片编辑应用将能够与文档编辑应用实时共享其数据。这将允许文档编辑器应用嵌入其本身不支持、但图片编辑应用支持的格式的图像文件。此外，这使得在图片编辑软件中编辑图片并立即在文档中看到结果成为可能。这里有许多机会可以把握。


    至于 NFC，其广泛采用将使手机变成特别强大的工具，而 Java ME 手机将像瑞士军刀一样：小巧、廉价，却非常强大。如前所述，你将能够用手机做任何事情，从支付账单到启动汽车。


    这里蕴含着巨大的创新潜力。例如，你有可能将手机用作购物助手：只需将手机靠近你感兴趣的产品，它就会将该产品保存到你的“心愿单”中，但它还能将其与同一商店中其他类似产品进行比较，并向你提供关于该产品的详细信息。或者，你可以结合
    MIDP 3.0 和 NFC 来创建真正有趣的社交应用，例如一个在后台运行的社交 MIDlet，只需你们两个将手机碰在一起，就能快速交换名片并在 Facebook
    上加为好友。

