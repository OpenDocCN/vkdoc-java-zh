  raw: '#### Views


    Views are the screens that the user sees when interacting with the application.
    Like all MVC views, our views will be used by feeding data into them, typically
    models or collections of models. It is then up to the views themselves to present
    said data to the user and to provide support for user interaction.


    All views must be able to self-paint when instructed to. They must also be able
    to provide a reference to their parent controller and to their underlying `GameCanvas`.
    As such, views must implement the interface in [Listing 2–9](#Chapter02.html#list_2_9).


    **Listing 2–9.** *The `View` Interface*


    `package com.apress.framework.objecttypes;`


    `import javax.microedition.lcdui.Graphics;`


    `public interface View`

    `{`

    `    public boolean refresh();`


    `    public Controller getParentController();`


    `    public GameCanvas getCanvas();`

    `}`


    Many times views are little more than wrappers for the “screen” objects of the
    underlying GUI library. Using them still makes sense, as it makes switching GUI
    libraries a lot easier if this needs to be done later in the project. This aspect
    is a very important one to remember: views are not usually tied down to specific
    GUI frameworks, just to specific application screens.


    We will learn more about views and how to use them in the chapter dedicated to
    the GUI.


    After adding views, our “object types” package is now fully populated. Let''s
    take a five-minute break and let everything sink in, before we continue with populating
    the “common objects” package.


    ### Common Objects


    Many objects are reused heavily throughout an application. They are typically
    derivatives or implementations of basic types, and they play a key role in how
    the framework and the applications based on it function. A prime example of this
    is the `EventController`, which we will go over shortly.


    Right now we''re concerned only with getting the framework running, so we will
    keep the number of common objects to a minimum: only two.


    Let''s start with the aforementioned `EventController`.


    #### The EventController Class


    The `EventController` basically acts as a traffic controller for events, dispatching
    them to its registered listeners. This, in `EventController` terminology, is called
    “processing events.”


    The code for the `EventController` common object is shown in [Listing 2–10](#Chapter02.html#list_2_10).


    **Listing 2–10.** *The `EventController` Class*


    `package com.apress.framework.common;`


    `import com.apress.framework.objecttypes.Controller;`

    `import com.apress.framework.objecttypes.Event;`

    `import com.apress.framework.objecttypes.EventListener;`

    `import java.util.Vector;`


    `public class EventController implements Controller`

    `{`

    `    protected Vector listeners = new Vector(10,10);`

    `    protected Vector events = new Vector(10,10);`


    `    public void registerListener(EventListener listener)`

    `    {`

    `        if (! listeners.contains(listener) )`

    `        {`

    `            listeners.addElement(listener);`

    `        }`

    `    }`


    `    public void unregisterListener(EventListener listener)`

    `    {`

    `        listeners.removeElement(listener);`

    `    }`


    **`    public void queueEvent(Event event)`**

    `    {`

    `        events.addElement(event);`

    `    }`


    **`    public void processNextEvent()`**

    `    {`

    `        if (events.size() > 0 )`

    `        {`

    `            Event event = (Event) events.firstElement();`

    `            events.removeElement(event);`


    `            int listenerCount = listeners.size();`

    `            int currentIndex;`

    `            EventListener temp;`

    `            for (currentIndex = 0; currentIndex < listenerCount; currentIndex++)`

    `            {`

    `                temp = ( (EventListener) listeners.elementAt(currentIndex));`

    `                temp.handleEvent(event);`

    `            }`

    `        }`

    `    }`


    `    public int currentEventCount()`

    `    {`

    `        return events.size();`

    `    }`


    `    public boolean hasMoreEvents()`

    `    {`

    `        return events.size() > 0 ;`

    `    }`

    `}`


    Probably the only interesting part about this code is the existence of two different
    methods, `queueEvent()` and `processNextEvent()`, for handling events. Most developers
    tend to do both of these things in the same step, but this is wrong for two main
    reasons.


    The first one is that you may not want to process an event at the same time that
    it is queued. This is often the case when CPU power is limited, for example. With
    this approach, you can delay event processing for later, or process events at
    a slower pace than usual.


    The second and most important reason is threading. Consider the following example,
    in [Listing 2–11](#Chapter02.html#list_2_11), in which the `processEvent()` method
    does both the queuing and the processing of the event in one step. Assume that
    the `onButtonPress()` method is part of the GUI library used by the application
    and that `handleEvent()` is part of a listener registered to the `EventController`.


    **Listing 2–11.** *The Wrong Way to Handle Events*


    `public void onButtonPressed(Button button)`

    `{`

    `        Event event = new Calculate100FactorialEvent();`

    `        eventController.processEvent(event);`

    `}`


    `...`


    `public boolean handleEvent(Event evt)`

    `{`

    `        if (evnt instanceOf Calculate100FactorialEvent)`

    `        {`

    `                // do lots of CPU intensive stuff here`

    `        }`

    `        return true;`

    `}`


    The problem with this code is that you do not know on which thread the intensive
    CPU stuff will run. If it will run on the main UI thread, then your application''s
    user interface will grind to a halt in no time. Even worse, the problematic event
    may come from a business-critical thread, like the networking thread, in which
    case that one will become unresponsive and the server might log the user out or
    worse. Furthermore, it is possible that `onButtonPressed()` will run on the main
    UI/system event thread, perhaps by being called from the `commandAction()` method
    of a `CommandListener`. Depending on what goes on inside `onButtonPressed()`,
    this can potentially crash the application (for example, if a network access request
    is initiated and the platform attempts to ask the user for permission).


    The only real solution to this problem is to have events processed on an entirely
    separate thread than the one you are issuing them from, or at least on a thread
    that you can be sure is not critical. However, it is usually not feasible to have
    each controller run in its own separate thread.


    This is where our next common object comes in.'
