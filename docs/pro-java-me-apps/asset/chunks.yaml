    为此，我们将跟踪两个 ID：检索到的最旧推文的 ID 和检索到的最新推文的 ID。最初，两个 ID 都等于原点推文的 ID。然后，当您调用 `goBack()`
    或 `goForward()` 时，会从时间线中检索每种情况对应的下一个推文。其 ID 分别成为最旧或最新推文的新 ID。


    对 `goBack()` 和 `goForward()` 的首次调用都将返回原点推文。如果在任何时候没有更旧或更新的推文可用（取决于调用），这些调用将返回
    `null`。如果用户的主时间线中根本没有推文，原点推文也可以是 `null`。


    现在让我们看看实际的代码，从代码清单 4-13 中看到的构造函数和字段声明开始。


