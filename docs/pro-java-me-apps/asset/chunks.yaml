    \ can be applied to Java ME as well: whenever possible, try to make your data\
    \ types immutable. For example, you should make it so that once you create a new\
    \ `Tweet` instance, you are able only to retrieve its attributes—you cannot alter\
    \ them in any way.\n\nIf you want to modify one or more of its attributes, you\
    \ must create a new instance with the corresponding new set of values instead\
    \ of, for example, calling `setTimestamp()` or `setText()` on the existing instance.\
    \ While doing so does incur a small performance hit, if done properly, the benefits\
    \ significantly outweigh the costs.\n\nThe biggest benefit of doing so is that\
    \ you prevent a lot of bugs from happening by making sure you cannot alter objects\
    \ by mistake, since the only way you can “alter” an object is to create a new\
    \ one. Another benefit is that changes to important instance values, like the\
    \ text of a `Tweet`, are easier to track, which in turn makes the code easier\
    \ to debug. Both aspects are extremely important for large and intricate applications.\n\
    \n**NOTE:** The downside of this approach is that, if you are not careful, you\
    \ might end up creating problems instead of solving them. For example, if you\
    \ keep references to old and unused instances by mistake, then you not only prevent\
    \ them from being garbage-collected, but you also affect your application's behavior,\
    \ because “invalid” old data might get used instead of “valid” new data.\n\nOf\
    \ course, not all data types and entities can or should be immutable. Let's say\
    \ you are writing a game, which features a `BadGuy` entity. Making it immutable\
    \ is a bad idea, because a `BadGuy` can `move()` and `fire()` often. While good\
    \ practice, creating a new instance every time one of these actions occurs will\
    \ slow your game to a crawl. The same is true for other entities that change their\
    \ state often, like a `Scrollbar` in a UI framework or a `ChatRoomHistory` in\
    \ a chat program.\n\nAnother good example comes in the form of data types and\
    \ entities that encompass large amounts of information—for example, a `Level`\
    \ data type in the foregoing game: having to create a new instance of a level\
    \ whenever a tile changes its value would be absolutely mad.\n\nThese are exceptions,\
    \ however. In a typical application, with a proper plan and a proper architecture,\
    \ you can probably get away with making 60–70% of the global data types and entities\
