- fmt: '### Final Words About the UI Module


    One thing you should consider before setting off to write your UI module is its
    granularity. For example, we chose to have scrolling and containers implemented
    in a single class, but for other projects, it might make sense to have two separate
    classes, `Container` (which would handle the collection of UI widgets) and `Viewport`
    (which would handle scrolling and determine the visible area of the container).
    Scrollbars could be built in into the `Viewport`, or they could be stand-alone
    components *attached* to the `Viewport`.


    Determining the right granularity for your UI module is not an exact science,
    but there are some guidelines. First of all, think about component reuse. If scrollbars
    are needed only inside viewports, then you might as well have them built in. However,
    if you plan to use scrollbars inside other components, or as sliders, then it
    makes sense to have them be stand-alone.


    Second, think about overhead. You could expand the granularity concept all the
    way to the pixel level, and have each pixel be an individual component of a larger
    widget, say a button, but that would slow your application to a crawl. Generally,
    it is best if you have at most three levels of sub-widgets. For example, a viewport
    can be defined as being made up of a visible container area and a scrollbar, the
    scrollbar is composed of two buttons (for the up and down arrows) and a sliding
    area, and each button component has an image inside it. However, in practice it
    is best if you stick to one or two levels, as anything more tends to greatly increase
    overhead and code complexity.


    Third, and somewhat related to the last point, consider code complexity and overhead.
    If each of your components and sub-components is simple and straightforward, then
    you can afford to increase granularity. However, if by nature your widgets are
    complex and intricate, then each layer you add will only make things more difficult
    to understand and slower to run and will increase the potential for bugs. If during
    the design phase of the UI module, you reach a point where you are no longer 100%
    certain of how widgets work together, consider simplifying their functionality
    and their inter-connections, or reducing granularity. You can, of course, continue
    with having “uncertainties” and say that “you’ll cross that bridge when you get
    to it,” but in the long run this decision will always come back to haunt you.


    Another thing you should consider is separating UI functionality from UI polish.
    This is related to compartmentalization (see ahead). For example, you may want
    to have a `Button` class to provide the functionality of a button, and a `ButtonRenderer`
    to do the actual rendering. This has obvious advantages but is not always needed,
    especially for custom UIs written for a single project or set of projects. It
    does make sense to do this; however, if you plan on writing a universal and full-featured
    UI framework to be used in all your projects, it most certainly makes sense if
    you plan to go cross-platform—for example, targeting both Java ME and Android
    devices (more on this later in the book).


    The level of “intelligence” your UI has is also something to keep in mind. For
    example, a smart UI can detect when the user “flicks” a widget, and can translate
    this into a kinetic scrolling gesture if the widget in question can be scrolled.
    Or it could differentiate between focusing via keys and focusing via touch, and
    treat each case differently (there are some subtle differences between the two;
    for example, when focusing via touch, the widget in question does not need to
    be fully visible—the user can just scroll it into view). UI intelligence is different
    than application intelligence, as it is fully contained in the UI module and does
    not affect the rest of the application’s behavior; however, it does affect the
    user’s experience and this makes it important.


    Compartmentalizing your UI module is always good. Many third-party libraries have
    poor or no provisions for this, and thus force you to include a lot of extra support
    code just so you can use that one widget or behavior you really need. This is
    an area where custom-made UIs can really shine, as you can design them to be as
    modular as you need them. The main benefit of a modular UI is that it widens the
    range of devices you can target, as you can include everything (polished components,
    smart behavior, extra features, etc.) in builds for high-end devices while keeping
    only the needed minimum for low-end ones. Compartmentalization is not the same
    as granularity. Granularity refers to how many “levels of depth” widgets have,
    while compartmentalization refers to how independent various aspects and features
    of your UI module are from one another. We will discuss how compartmentalization
    can be done later in the book.


    Finally, but certainly not least, remember that you are writing a UI for a mobile
    device, where screen space is at a premium and user interaction must be as intuitive
    as possible. With respect to this, try to keep the UI as simple and as less cluttered
    as possible. For example, scrollbars don’t always have to be on the screen. It
    is usually enough to draw them over the container when the user is scrolling and
    hide them at all other times—this saves the screen real estate that would otherwise
    be constantly dedicated to them while at the same time keeping the interface clean.
    It is a common mistake to approach writing mobile UIs with the same mindset with
    which you would approach writing a desktop UI, especially because there are many
    similarities between them. However, some concepts have to be adapted (like the
    foregoing scrollbar example) while others have to be discarded altogether (mobile
    devices have no place for the concept of desktop-like windows that can be dragged
    around the screen).


    ### Summary


    In this chapter, we have learned how to write a Java ME UI module from scratch.
    Some of the important aspects and the associated theoretical concepts we have
    discussed are clipping rectangles, nested widgets, and properly handling user
    interaction events such as keypresses.


    In the process, we have written the UI module for our Twitter client, which features
    buttons, string items, editable string items, horizontal containers, vertical
    containers, touch support, and support for nested widgets.


    In the next chapter, we will look at how to handle localization and internationalization
    in the context of Java ME applications.


    ## Chapter 7


    ## The Localization Module


    Localization, or L10n for short, is extremely important for mobile applications,
    as their users expect them to be as friendly and as intuitive to use as possible.
    Having the application running in the user''s own language and with the user''s
    own locale-specific settings is thus crucial.


    At its heart, localization simply involves having separate versions of certain
    strings for each locale you want your application to support. These strings can
    be displayed directly to the user, as is the case with command names and button
    labels, or they can contain metadata—for example, the proper date format or currency
    symbol to be used for a given locale.


    In this chapter, we will discuss the main options available for Java ME localization,
    and we will learn how to add localization support to our application from scratch,
    in a simple and clean way. We will also learn how to efficiently handle common
    localization-related tasks, such as generating and loading localization files
    and handling the formatting of currency, dates, and times.'
  raw: '### Final Words About the UI Module


    One thing you should consider before setting off to write your UI module is its
    granularity. For example, we chose to have scrolling and containers implemented
    in a single class, but for other projects, it might make sense to have two separate
    classes, `Container` (which would handle the collection of UI widgets) and `Viewport`
    (which would handle scrolling and determine the visible area of the container).
    Scrollbars could be built in into the `Viewport`, or they could be stand-alone
    components *attached* to the `Viewport`.


    Determining the right granularity for your UI module is not an exact science,
    but there are some guidelines. First of all, think about component reuse. If scrollbars
    are needed only inside viewports, then you might as well have them built in. However,
    if you plan to use scrollbars inside other components, or as sliders, then it
    makes sense to have them be stand-alone.


    Second, think about overhead. You could expand the granularity concept all the
    way to the pixel level, and have each pixel be an individual component of a larger
    widget, say a button, but that would slow your application to a crawl. Generally,
    it is best if you have at most three levels of sub-widgets. For example, a viewport
    can be defined as being made up of a visible container area and a scrollbar, the
    scrollbar is composed of two buttons (for the up and down arrows) and a sliding
    area, and each button component has an image inside it. However, in practice it
    is best if you stick to one or two levels, as anything more tends to greatly increase
    overhead and code complexity.


    Third, and somewhat related to the last point, consider code complexity and overhead.
    If each of your components and sub-components is simple and straightforward, then
    you can afford to increase granularity. However, if by nature your widgets are
    complex and intricate, then each layer you add will only make things more difficult
    to understand and slower to run and will increase the potential for bugs. If during
    the design phase of the UI module, you reach a point where you are no longer 100%
    certain of how widgets work together, consider simplifying their functionality
    and their inter-connections, or reducing granularity. You can, of course, continue
    with having “uncertainties” and say that “you’ll cross that bridge when you get
    to it,” but in the long run this decision will always come back to haunt you.


    Another thing you should consider is separating UI functionality from UI polish.
    This is related to compartmentalization (see ahead). For example, you may want
    to have a `Button` class to provide the functionality of a button, and a `ButtonRenderer`
    to do the actual rendering. This has obvious advantages but is not always needed,
    especially for custom UIs written for a single project or set of projects. It
    does make sense to do this; however, if you plan on writing a universal and full-featured
    UI framework to be used in all your projects, it most certainly makes sense if
    you plan to go cross-platform—for example, targeting both Java ME and Android
    devices (more on this later in the book).


    The level of “intelligence” your UI has is also something to keep in mind. For
    example, a smart UI can detect when the user “flicks” a widget, and can translate
    this into a kinetic scrolling gesture if the widget in question can be scrolled.
    Or it could differentiate between focusing via keys and focusing via touch, and
    treat each case differently (there are some subtle differences between the two;
    for example, when focusing via touch, the widget in question does not need to
    be fully visible—the user can just scroll it into view). UI intelligence is different
    than application intelligence, as it is fully contained in the UI module and does
    not affect the rest of the application’s behavior; however, it does affect the
    user’s experience and this makes it important.


    Compartmentalizing your UI module is always good. Many third-party libraries have
    poor or no provisions for this, and thus force you to include a lot of extra support
    code just so you can use that one widget or behavior you really need. This is
    an area where custom-made UIs can really shine, as you can design them to be as
    modular as you need them. The main benefit of a modular UI is that it widens the
    range of devices you can target, as you can include everything (polished components,
    smart behavior, extra features, etc.) in builds for high-end devices while keeping
    only the needed minimum for low-end ones. Compartmentalization is not the same
    as granularity. Granularity refers to how many “levels of depth” widgets have,
    while compartmentalization refers to how independent various aspects and features
    of your UI module are from one another. We will discuss how compartmentalization
    can be done later in the book.


    Finally, but certainly not least, remember that you are writing a UI for a mobile
    device, where screen space is at a premium and user interaction must be as intuitive
    as possible. With respect to this, try to keep the UI as simple and as less cluttered
    as possible. For example, scrollbars don’t always have to be on the screen. It
    is usually enough to draw them over the container when the user is scrolling and
    hide them at all other times—this saves the screen real estate that would otherwise
    be constantly dedicated to them while at the same time keeping the interface clean.
    It is a common mistake to approach writing mobile UIs with the same mindset with
    which you would approach writing a desktop UI, especially because there are many
    similarities between them. However, some concepts have to be adapted (like the
    foregoing scrollbar example) while others have to be discarded altogether (mobile
    devices have no place for the concept of desktop-like windows that can be dragged
    around the screen).


