    ### 关于 UI 模块的最终建议


    在着手编写 UI 模块之前，你需要考虑的一个问题是它的粒度。例如，我们选择将滚动和容器实现在同一个类中，但对于其他项目，将其拆分为两个独立的类可能更合理：`Container`（负责管理
    UI 控件的集合）和 `Viewport`（负责处理滚动并确定容器的可见区域）。滚动条可以内置于 `Viewport` 中，也可以作为独立组件*附加*到 `Viewport`
    上。


    确定 UI 模块的合适粒度并非一门精确的科学，但仍有一些指导原则。首先，考虑组件的复用性。如果滚动条仅在视口内部使用，那么将其内置即可。然而，如果你计划在其他组件中（或作为滑块）使用滚动条，那么将其设计为独立组件则更有意义。


    其次，考虑开销问题。你可以将粒度概念一直细化到像素级别，让每个像素都成为更大控件（例如按钮）的独立组成部分，但这会使你的应用程序运行缓慢。通常，子控件的层级最好不超过三层。例如，一个视口可以定义为由可见容器区域和一个滚动条组成；滚动条由两个按钮（用于上下箭头）和一个滑动区域组成；每个按钮组件内部包含一个图像。然而，在实践中，最好将层级控制在一到两层，因为层级过多往往会大幅增加开销和代码复杂度。


    第三点，与上一点有些关联，需要考虑代码复杂度和开销。如果你的每个组件和子组件都简单明了，那么你可以适当增加粒度。但如果你的控件本身就很复杂精细，那么每增加一层都会让事情变得更难理解、运行更慢，并增加出现
    bug 的可能性。如果在 UI 模块的设计阶段，你发现自己无法百分之百确定控件之间的协作方式，那么请考虑简化它们的功能和相互连接，或者降低粒度。当然，你也可以带着“不确定性”继续推进，并告诉自己“船到桥头自然直”，但从长远来看，这个决定总会让你付出代价。


    另一个需要考虑的问题是，将 UI 功能与 UI 美化分离开来。这与模块化（见后文）有关。例如，你可能希望有一个 `Button` 类来提供按钮的功能，以及一个
    `ButtonRenderer` 类来负责实际的渲染。这样做有明显的优势，但并非总是必需，尤其是对于为单个项目或项目集编写的自定义 UI 而言。不过，如果你计划编写一个通用且功能完备的
    UI 框架，用于所有项目，那么这样做是合理的；如果你计划跨平台（例如，同时面向 Java ME 和 Android 设备），那么这样做几乎肯定是必要的（本书后面会详细讨论）。


    你的 UI 的“智能”程度也是需要留意的。例如，一个智能 UI 可以检测到用户“轻拂”控件，并在该控件可滚动时将其转化为惯性滚动手势。或者，它可以区分通过按键聚焦和通过触摸聚焦，并对每种情况区别对待（两者之间存在一些细微差别；例如，通过触摸聚焦时，相关控件无需完全可见——用户只需将其滚动到视图中即可）。UI
    智能不同于应用智能，因为它完全包含在 UI 模块中，不影响应用程序其余部分的行为；然而，它确实会影响用户体验，因此非常重要。


    对 UI 模块进行模块化始终是好的做法。许多第三方库在这方面做得不好或根本没有提供支持，因此迫使你包含大量额外的支持代码，仅仅是为了使用你真正需要的那一个控件或行为。这正是自定义
    UI 可以大放异彩的领域，因为你可以根据需要将其设计得尽可能模块化。模块化 UI 的主要好处是，它能拓宽你所能支持的设备范围，因为你可以在面向高端设备的构建中包含所有内容（美化组件、智能行为、额外功能等），而在面向低端设备的构建中只保留最低限度的必要内容。模块化与粒度不同。粒度指的是控件有多少“层级深度”，而模块化指的是
    UI 模块的各个方面和特性彼此之间的独立程度。我们将在本书后面讨论如何实现模块化。


    最后，但同样重要的是，请记住你正在为移动设备编写 UI，屏幕空间非常宝贵，用户交互必须尽可能直观。在这方面，请尽量保持 UI 简洁，避免杂乱。例如，滚动条不必始终显示在屏幕上。通常，在用户滚动时将其绘制在容器上，而在其他所有时间将其隐藏就足够了——这样可以节省原本会一直被滚动条占用的屏幕空间，同时保持界面整洁。一个常见的错误是，用编写桌面
    UI 的思维来编写移动 UI，尤其是因为两者之间有很多相似之处。然而，有些概念需要调整（比如前面提到的滚动条示例），而有些概念则需要完全摒弃（移动设备上不存在桌面式窗口的概念，即可以在屏幕上拖动的窗口）。


    ### 本章小结


    在本章中，我们学习了如何从头开始编写一个 Java ME UI 模块。我们讨论的一些重要方面及相关理论概念包括：裁剪矩形、嵌套控件，以及正确处理按键等用户交互事件。


    在此过程中，我们为 Twitter 客户端编写了 UI 模块，该模块具备按钮、字符串项、可编辑字符串项、水平容器、垂直容器、触摸支持以及嵌套控件支持等功能。


    在下一章中，我们将探讨如何在 Java ME 应用程序中处理本地化和国际化。


    ## 第 7 章


    ## 本地化模块


    本地化（简称 L10n）对于移动应用程序来说极其重要，因为用户期望它们尽可能友好和直观易用。因此，让应用程序以用户自己的语言和特定于区域设置的设置运行至关重要。


    从本质上讲，本地化仅仅涉及为你希望应用程序支持的每个区域设置提供不同版本的特定字符串。这些字符串可以直接显示给用户，例如命令名称和按钮标签；或者它们可以包含元数据，例如适用于给定区域设置的日期格式或货币符号。


    在本章中，我们将讨论 Java ME 本地化的主要可用选项，并学习如何以简单、干净的方式从头开始为我们的应用程序添加本地化支持。我们还将学习如何高效处理常见的本地化相关任务，例如生成和加载本地化文件，以及处理货币、日期和时间的格式化。

    '
- fmt: '### Understanding the Features of a Good Localization Module


    A good localization module should be flexible, simple, and intelligent. It should
    have a small code footprint, as well as a small resource footprint. It should
    be easily extensible and be written in such a way as to provide support for a
    multitude of possible input sources.


    Localization strings are typically stored as key/value pairs, where the key is
    a universal identifier like `"button.quit.label"` and the value is the string
    itself. These key/value pairs can be retrieved from many sources: from the Web,
    from text files inside the JAR, or they can even be hard-coded within the application
    (by using themes, for example). Some applications combine multiple sources.


    Choosing the right input source or sources is important, as each source has its
    pros and cons. For example, having localization hard-coded into the application
    as part of themes is very fast, but it has the disadvantages of being hard to
    update by non-programmers and of being impossible to update at runtime (via the
    Web, for example). Using files stored inside the application JAR is an improvement,
    as updating localization strings can be done easily by non-programmers and the
    mechanism for file-based localization can easily be extended to support web-based
    localization (or at least updating via the Web). Finally, web-based localization
    (where localization files are downloaded from the Web) is by far the most flexible
    approach, but it has the disadvantages of not being free and of depending on an
    Internet connection being available.


    Another feature of a good localization module is that selecting the right locale
    is done transparently inside the localization module. The application code should
    be able to specify an optional user-preferred locale as well as a mandatory default
    locale, but it is up to the localization module to choose which locale to actually
    use. Typically the order of priorities is as follows: user specified locale, phone''s
    current locale (which can be retrieved at runtime), and finally the application''s
    default locale. Other than specifying the user''s preferred locale and the default
    locale, general application code should not care about locales at all, nor should
    it care about what locale is actually used. All it should do is request from the
    localization module the value of a certain key and use that value accordingly.


    A good localization module should also provide support for parameterized locale
    strings (`"You have X e-mails"`). Parameterized localization strings are extremely
    important, which is why it''s quite amazing that most Java ME localization frameworks
    I''ve seen all have one glaring omission: they don''t take into consideration
    the value of the parameters. Specifically, it is often the case that the template
    for `X=0` is slightly different than the one for `X=1` or `X>=2`. In the foregoing
    example, for `X=0` the template would read `"No new e-mails"`, for `X=1` it would
    read `"You have one new e-mail"`, and for `X>=2` it would read `"You have X new
    e-mails"`. If support for this isn''t added in the localization module, it has
    to be added in the application code, which, as we have seen, is bad practice.
    Of course, `X` can also be a string (as opposed to a number), and for any localization
    string you can have one "general template" and as many custom templates as needed.


    ### Understanding Native Java ME Localization


    Java ME does have its own "built-in" localization and internationalization support
    in the form of the Mobile Internationalization API, also known as JSR 238. The
    Mobile Internationalization API has provisions for the most common localization-related
    tasks, which are the localization of strings and resources and the formatting
    of currency, numbers, dates, and times.


    The biggest advantage of JSR 238 is, of course, its speed and resource consumption:
    being implemented as a native API, it is usually more efficient in these respects
    than non-native APIs, sometimes considerably more so.


    However, JSR 238 does have two major drawbacks. First and foremost, it is not
    available on all devices. This means that you can rely on it only if you exclusively
    target devices that support it, otherwise you will have to roll your own localization
    support for those devices that do not support JSR 238.


    Second, it is not as flexible or as powerful as a properly written custom localization
    implementation. For example, for JSR 238 localization and resource files must
    reside within the application''s JAR, so there is no way to download new localization
    data and new resources from the Web, and parameterized localization strings are
    also not supported.


    Because of these two drawbacks, most developers choose to roll their own implementation
    for a localization module. However, it should be noted that JSR 238 can be (and
    in fact is) a good choice if you target only JSR 238–enabled devices and if you
    need only the feature that JSR 238 supports and nothing else.'
