  raw: 'By keeping UI and application logic completely separated, the chances of such
    situations happening are greatly reduced: in the event that the UI misbehaves,
    the viewport position is still the same (because it’s retrieved from an application-internal
    variable). Furthermore, in this situation and in many others, this separation
    makes the discrepancy between the scroll position and the actual viewport position
    easily traceable to a UI bug, because we know that the viewport position is always
    correctly calculated internally and is not affected by UI resizing or changing
    the layout. This considerably cuts down the time necessary to fix the UI bug itself.


    **NOTE:** If you recall from the `WelcomeForm` presented earlier, there is some
    credential-selecting logic in the handling of the `BUTTON_PRESSED` event on said
    form (i.e., in the UI), which, according to the foregoing paragraphs, should be
    moved to the handler method of the `BEGIN_LOGIN` event (i.e., to the application
    logic code). This is intentional, as the goal was to influence the behavior and
    data of the login process when it gets initiated by the login button (which is
    local to the `WelcomeForm`), and not the general behavior of the login process
    as triggered by the `BEGIN_LOGIN` event (which can come from any source).


    Going back on track, the way the main application screen looks on the WTK emulator
    can be seen in [Figure 8–2](#Chapter08.html#fig_8_2). The two snapshots reflect
    the screen when the “post new tweet” item is selected (first screenshot) and when
    a tweet is selected (second screenshot). Notice how the selected tweet is automatically
    expanded to full length by the `StringItem` class.


