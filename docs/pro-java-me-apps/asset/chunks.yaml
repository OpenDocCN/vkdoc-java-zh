    ### 在纯触控设备上实现用户界面


    一个日益常见的应用场景是在纯触控设备上运行你的应用程序。过去这仅限于昂贵的智能手机领域，但相对廉价的纯触控屏 Java ME 设备已逐渐开始出现在市场上，并且随着技术成本的降低，其数量必将增加。


    纯触控屏设备的有趣之处在于，它们依赖一个虚拟的屏幕导航区域（通常包含方向键、软键和一个确认/OK 按钮）来提供与现有非触控应用的兼容性。这个导航区域在大多数情况下可以禁用（通过
    JAD 文件中的属性或设备菜单），从而让你能够摆脱经典且现已略显过时的 Java ME 用户交互模式。


    例如，在典型的 Java ME 应用程序中，其中一个软键通常专用于当前焦点项的“上下文菜单”。在纯触控设备上，你可以实现长按行为来显示上下文菜单：如果用户按住某个项目足够长时间（3-5
    秒），其上下文菜单就会弹出。对大多数用户来说，这比传统方法更直观，并且在许多情况下具有更快的优势，因为用户只需执行一个操作（按住项目），而不是两个操作（导航到目标项目，按下软键）。


    你在应用程序的布局设计上也拥有更多自由。经典的 Java ME 应用程序，即使是使用高质量 UI 框架构建的，通常也采用矩形方式的 UI 布局，即从任何给定项目，你可以向左、向右、向上或向下移动。原因显而易见：经典的
    Java ME 应用程序设计为使用摇杆导航，而摇杆只能朝这四个方向移动。纯触控设备没有这个限制；你可以根据任何你想要的形状或布局来构建你的 UI。


    例如，前面讨论的上下文菜单不必是经典的垂直菜单：它可以是一系列排列成圆形的象形图。在这个“圆形菜单”中，你可以在上半部分放置特定于项目的命令，在下半部分放置诸如复制和粘贴之类的通用命令。这不仅使导航更快，而且更简单、更直观：用户知道，如果他们想粘贴某些内容，无论上下文菜单中有哪些特定于项目的选项，粘贴图标都会始终位于屏幕上的同一位置。


    你可以实现的另一个触控特定功能是“拖放”。当你编写的应用程序处理列表或表格时，这尤其有用，因为用户可以轻松直观地重新排列他们的数据和内容。


    支持手指手势也是一个非常好的特性。这超越了现在经典的惯性滚动。例如，从右向左划过屏幕可以表示“返回”命令，在屏幕上划一个“V”形手势可以是“确定”命令，而划一个“X”形手势则相当于“取消”。这使得用户交互更快、更直观、更有趣。


    另一个在纯触控界面中效果很好的概念是窗格（panes）概念。虽然由于屏幕尺寸和分辨率有限，功能完备的窗口不太可行，但窗格有时非常适合手头的活动。例如，在聊天程序中，屏幕通常分为两个区域：上部区域显示对话，下部区域供用户输入消息。通过使用窗格，用户可以简单地通过拖动窗格分隔线，根据需要自由分配两个区域之间的可用屏幕空间。


    你可以在纯触控设备上实现更多 UI 优化，这些优化可以使你的应用程序更易于使用、更直观，并使其从众多应用中脱颖而出。关键在于，你的应用程序必须仅针对纯触控设备，才能使许多这些优化生效。例如，圆形菜单范式在非触控输入（如经典
    Java ME 手机或触控与键盘混合设备）上效果并不理想。


    考虑到这一点，如果你的预算紧张，并且项目目标设备范围同时包含纯触控设备和混合/非触控设备，那么请选择在所有设备上都能良好运行的经典 UI 范式。然而，如果你的预算允许，那么考虑为纯触控设备创建专门的
    UI 是值得的；你将从中获得的改进的可用性和形象资本绝对是值得的。

