    ##### 搜索


    搜索基本上意味着在给定的输入集中找到符合特定条件的某个元素。最常见的搜索形式是线性搜索，即遍历输入集中的所有元素，直到找到所需元素。这是一个 `O(n)`
    操作。一个更好的替代方案是二分搜索，这是一个 `O(log n)` 操作。二分搜索仅适用于已排序的输入集，并且是一个非常简单的算法。


    其思路很简单：在任何给定的已排序输入集中，查看集合中间位置的值，并将该元素与你的目标条件进行比较。如果匹配，则得到结果。如果中间元素“大于”你的目标条件，则在区间
    `[start, middle)` 上执行相同的查找。如果中间元素“小于”你的目标条件，则在区间 `(middle, end]` 上执行相同的查找。随着你不断进行此操作，工作区间会变得越来越小，直到最终区间内没有元素。如果此时仍未找到结果，则说明输入集中没有元素符合你的条件。


    与快速排序一样，二分搜索可以通过递归实现。然而，最常见的实现方式是非递归的，例如清单 10–3 中的实现。


    **清单 10–3.** *二分搜索实现*


    `public static int binarySearch(int [] inputSet, int element)`

    `{`

    `    int start = 0;`

    `    int end = inputSet.length-1;`

    `    int middleValue = 0;`

    `    int middleIndex = 0;`


    `    // 只要区间内至少有一个元素`

    `    while ( start<=end )`

    `    {`

    `        // 获取中间元素的索引`

    `        middleIndex = (start+end) / 2;`


    `        // 获取区间中间元素的值`

    `        middleValue = inputSet[middleIndex];`


    `        // 并将其与目标条件/元素进行比较`

    `        if ( middleValue == element )`

    `        {`

    `            // 如果匹配，我们就得到了结果`

    `            return middleIndex;`

    `        }`

    `        else if ( middleValue > element )`

    `        {`

    `            // 如果中间值更大，则使用区间 (middle, end]`

    `            end = middleIndex-1;`

    `        }`

    `        else`

    `        {`

    `            // 如果中间值更小，则使用区间 [start, middle)`

    `            start = middleIndex+1;`

    `        }`

    `    }`


    `    // 区间内没有元素，未找到匹配项`

    `    return -1;`

    `}`


    上述方法返回找到的元素的索引（如果存在），如果未找到元素则返回 -1。当然，这段代码也可以适配以处理其他数据类型，而不仅仅是整数。

