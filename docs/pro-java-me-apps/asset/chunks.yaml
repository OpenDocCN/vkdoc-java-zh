    DefaultColorPhone` and locate the configuration file `DefaultColorPhone.properties`.
    Open it, locate the `touch_screen` property and set it to `true`.


    ### Why Create a Custom UI Module?


    The reality is that, for most projects, you’re better off using an off-the-shelf
    third-party UI library. Third-party UI libraries usually have better polish and
    a richer feature set than what you could come up with on your own. So why learn
