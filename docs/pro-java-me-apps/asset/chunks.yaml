- fmt: "# The `EventManagerThreads` Class\n\nThis class allows event controller managers\
    \ to run in their own individual threads and at their own specific pace—we've\
    \ hinted at it in the `EventControllerManager` section.\n\nUsing this class is\
    \ dead easy. To have an event controller manager process all its underlying events\
    \ from all its assigned controllers every 30 milliseconds, all you have to do\
    \ is call the following:\n\n`EventManagerThreads.start ( someManagerInstance,\
    \ 30 );`\n\nIf you want the manager to process its events at a different interval,\
    \ call `start()` again with the desired parameters.\n\nStopping an event controller\
    \ manager from being periodically processed is equally easy:\n\n`EventManagerThreads.stop\
    \ ( someManagerInstance );`\n\nThe code for the `EventManagerThreads` class is\
    \ shown in [Listing 2–14](#Chapter02.html#list_2_14).\n\n**Listing 2–14.** *The\
    \ `EventManagerThreads` Class*\n\n```\npackage com.apress.framework.core;\n\n\
    import com.apress.framework.common.EventControllerManager;\nimport java.util.Hashtable;\n\
    \npublic class EventManagerThreads\n{\n    public static class ManagerThread implements\
    \ Runnable\n    {\n        EventControllerManager manager = null;\n        long\
    \ sleepTime = 0;\n        boolean run = true;\n\n        public ManagerThread(EventControllerManager\
    \ manager, long sleepTime)\n        {\n            this.manager = manager;\n \
    \           this.sleepTime = sleepTime;\n        }\n\n        public void run()\n\
    \        {\n            while ( run )\n            {\n                int evtCount\
    \ = manager.currentEventCount();\n                while ( evtCount>0 )\n     \
    \           {\n                    manager.processNextEvent();\n             \
    \       evtCount--;\n                }\n\n                try\n              \
    \  {\n                    Thread.sleep(sleepTime);\n                }\n      \
    \          catch (InterruptedException ex)\n                {\n              \
    \      ex.printStackTrace();\n                }\n            }\n        }\n  \
    \      public void stop()\n        {\n            run = false;\n        }\n\n\
    \    }\n\n    protected static Hashtable threads = new Hashtable();\n\n    protected\
    \ EventManagerThreads()\n    {\n        // Do nothing\n    }\n\n    public static\
    \ void start(EventControllerManager manager, long sleepTime)\n    {\n        stop(manager);\n\
    \        ManagerThread thread = null;\n        thread = new ManagerThread(manager,\
    \ sleepTime);\n        Thread t = new Thread(thread);\n        t.start();\n  \
    \      threads.put(manager, thread);\n    }\n\n    public static void stop(EventControllerManager\
    \ manager)\n    {\n        ManagerThread thread = (ManagerThread) threads.get(manager);\n\
    \        if( thread != null )\n        {\n            thread.stop();\n       \
    \ }\n    }\n\n}\n```\n\nPlease look at the highlighted lines in the foregoing\
    \ listing. You may ask, why not simply use `hasMoreEvents()`? The answer is simple:\
    \ as events get handled by listeners, those listeners can and often do add other\
    \ events to the queues of their controllers. This can lead to situations in which\
    \ your controller manager will always have more events to process, which in turn\
    \ means that you will never exit the loop, which in turn means that the thread\
    \ will never sleep, thus running at full speed and wasting valuable resources,\
    \ especially CPU time. Our approach makes sure that only the events that are already\
    \ in the queue are processed in the current time frame, while events added in\
    \ the current time frame will be processed in the next one. Not handling this\
    \ properly is a very frequent mistake in event-based systems.\n\n**NOTE:** This\
    \ chapter has a sample application near the end that is great for exemplifying\
    \ this issue. To see the difference between using `hasMoreEvents()` and using\
    \ `currentEventCount()`, run that application using both approaches.\n\nWith this\
    \ class, we finally have a functional event system. Understanding and using it\
    \ can be a bit confusing at first, so let's take a few moments to examine how\
    \ it functions as a whole and what you must do to get it running.\n\nFirst, if\
    \ you want to be able to respond to events, you have to register yourself to the\
    \ appropriate event controller or controllers. If you want to register yourself\
    \ as a listener to the main event controller, you should call the following:\n\
    \n`Application.getMainEventController().registerListener( this )`\n\nNext, whenever\
    \ something happens, you have to queue the appropriate event on the appropriate\
    \ controller or controllers. For example, to queue an event on the main event\
    \ controller, all you have to do is call the following:\n\n`Application.getMainEventController().queueEvent(\
    \ someEvent )`\n\nAll event controllers with the exception of local ones should\
    \ be assigned to a manager. For example, to assign a controller to the main event\
    \ controller manager, you must call the following:\n\n`Application.getMainEventControllerManager().assign(\
    \ someController );`\n\nLastly, you must make sure all event controller managers\
    \ get the chance to periodically process their underlying events, let's say every\
    \ 20 milliseconds. One easy way of doing so is by calling the following:\n\n`EventManagerThreads.start(\
    \ someManager, 20);`\n\nWhile the approach just described is a bit more complicated\
    \ than the classical \"queue here, process now\" one, it does allow for a greater\
    \ degree of freedom and flexibility. For example, you can control which controllers\
    \ are assigned to which manager, and how often each manager gets called and on\
    \ what thread. So you can, if need be, assign all low-priority controllers to\
