- fmt: "We'll stop here with processing translation files, but keep in mind that the\
    \ entire process can be taken one step further. It's important to realize that,\
    \ in the end, output files always look like [Listing 7–5](#Chapter07.html#list_7_5).\n\
    \n**Listing 7–5.** *What Translation Output Files Look Like*\n\n```\n<key 1> <value\
    \ 1> <key 2> <value 2> … <key XX> <value XX>\n```\n\nThis structure is extremely\
    \ simple, with no newlines or special delimiters present, and with a very basic\
    \ and easy to understand structure. A side effect of this is that the input files\
    \ can have pretty much any format and structure, as long as that format can be\
    \ translated in the end into plain key/value pairs. This means, for example, that\
    \ you can change the input format for your language files to XML or JSON (or even\
    \ take the translations straight from a database), that you can enhance the structure\
    \ of your language files by adding preprocessing capabilities (for example, an\
    \ “include” directive), that you can add dynamic elements such as “if” statements\
    \ and loops, etc. As long as the output matches the structure in [Listing 7–5](#Chapter07.html#list_7_5),\
    \ you're free to do anything you want. While this degree of flexibility is usually\
    \ not needed, it's great to know that it is available should the need for it arise.\n\
    \n### Loading Localization Data on the Device\n\nAs mentioned previously, the\
    \ main source for localization data will be files found within the JAR itself,\
    \ but we will also provide support for loading localization data from any generic\
    \ `DataInputStream`.\n\nBefore we can do this, however, we need to get the basic\
    \ structure of the localization module ready. This is very simple to do, as at\
    \ its core the localization module relies on the very basic key/value pair concept,\
    \ which is exactly what the `Hashtable` class provides. Thus, the skeleton for\
    \ the localization module will look like the code in [Listing 7–6](#Chapter07.html#list_7_6).\n\
    \n**Listing 7–6.** *The Skeleton for the Localization Module*\n\n```\npackage\
    \ app.module.L10n.classes;\n\n...\n\npublic class Locale\n{\n    protected static\
    \ Hashtable keyValuePairs = new Hashtable();\n\n    ...\n}\n```\n\nThe `Locale`\
    \ class will be the heart of the localization module (in fact, it will be the\
    \ *entire* localization module). The `keyValuePairs` hashtable is what we will\
    \ use to store all the key/value pairs from the localization files. Hashtables\
    \ allow for quick lookup at the cost of some memory overhead. This overhead is\
    \ typically acceptable and negligible. However, if you're targeting a really low-end\
    \ device with extremely limited memory or if the `Hashtable` implementation of\
    \ your target device is extremely memory-wasteful, then you might want to switch\
    \ to using a `Vector` or even a fixed array instead. While saving memory, this\
    \ will typically increase the CPU cost of lookup operations. Fortunately, these\
    \ “out of memory” scenarios are quite rare, and when they do occur, the root cause\
    \ tends to lie not in the localization module but in some other memory-intensive\
    \ part of the application.\n\nNow we have to get the data from the localization\
    \ files into the hashtable. Just to keep our options open, we will want to load\
    \ our data from an internal JAD file, from a byte array, or from an abstract `InputStream`.\
    \ Loading data from a byte array might seem unnecessary, but it is often needed\
    \ when the localization data is part of a larger data set— for example, when it\
    \ is deserialized from a persistent record containing multiple objects. Thus,\
    \ the data loading code will look like the one in [Listing 7–7](#Chapter07.html#list_7_7).\n\
    \n**Listing 7–7.** *Loading Localization Data from Various Sources*\n\n```\npublic\
    \ static boolean loadFromInternalFile(String internalFile)\n{\n        try\n \
    \       {\n                InputStream stream = Locale.class.getResourceAsStream(internalFile);\n\
    \                if ( stream == null )\n                {\n                  \
    \      return false;\n                }\n                DataInputStream in =\
    \ new DataInputStream(stream);\n                if ( in.available() == 0 )\n \
    \               {\n                        return false;\n                }\n\
    \                return loadFromDataInputStream(in);\n        }\n        catch\
    \ (Exception ex)\n        {\n                return false;\n        }\n}\n\npublic\
    \ static boolean loadFromByteArray(byte [] data, int offset, int length)\n{\n\
    \         DataInputStream in = new DataInputStream ( new ByteArrayInputStream(data,\n\
    \         offset,length) );\n        return loadFromDataInputStream(in);\n}\n\n\
    public static boolean loadFromDataInputStream(DataInputStream in)\n{\n       \
    \ String key, value;\n        try\n        {\nwhile ( true )\n{\nkey = in.readUTF();\n\
    value = in.readUTF();\nkeyValuePairs.put(key, value);\n}\n}\ncatch (EOFException\
    \ ex)\n{\n// End of file, we can stop\n}\n        catch (IOException ex)\n   \
    \     {\n                // Whoops! Read was not successful\n                return\
    \ false;\n        }\n        return true;\n}\n```"
  raw: 'We''ll stop here with processing translation files, but keep in mind that
    the entire process can be taken one step further. It''s important to realize that,
    in the end, output files always look like [Listing 7–5](#Chapter07.html#list_7_5).


    **Listing 7–5.** *What Translation Output Files Look Like*


    `<key 1> <value 1> <key 2> <value 2> … <key XX> <value XX>`


    This structure is extremely simple, with no newlines or special delimiters present,
    and with a very basic and easy to understand structure. A side effect of this
    is that the input files can have pretty much any format and structure, as long
    as that format can be translated in the end into plain key/value pairs. This means,
    for example, that you can change the input format for your language files to XML
    or JSON (or even take the translations straight from a database), that you can
    enhance the structure of your language files by adding preprocessing capabilities
    (for example, an “include” directive), that you can add dynamic elements such
    as “if” statements and loops, etc. As long as the output matches the structure
    in [Listing 7–5](#Chapter07.html#list_7_5), you''re free to do anything you want.
    While this degree of flexibility is usually not needed, it''s great to know that
    it is available should the need for it arise.


    #### Loading Localization Data on the Device


    As mentioned previously, the main source for localization data will be files found
    within the JAR itself, but we will also provide support for loading localization
    data from any generic `DataInputStream`.


    Before we can do this, however, we need to get the basic structure of the localization
    module ready. This is very simple to do, as at its core the localization module
    relies on the very basic key/value pair concept, which is exactly what the `Hashtable`
    class provides. Thus, the skeleton for the localization module will look like
    the code in [Listing 7–6](#Chapter07.html#list_7_6).


    **Listing 7–6.** *The Skeleton for the Localization Module*


    `package app.module.L10n.classes;`


    `...`


    `public class Locale`

    `{`

    `    protected static Hashtable keyValuePairs = new Hashtable();`


    `    ...`

    `}`


    The `Locale` class will be the heart of the localization module (in fact, it will
    be the *entire* localization module). The `keyValuePairs` hashtable is what we
    will use to store all the key/value pairs from the localization files. Hashtables
    allow for quick lookup at the cost of some memory overhead. This overhead is typically
    acceptable and negligible. However, if you''re targeting a really low-end device
    with extremely limited memory or if the `Hashtable` implementation of your target
    device is extremely memory-wasteful, then you might want to switch to using a
    `Vector` or even a fixed array instead. While saving memory, this will typically
    increase the CPU cost of lookup operations. Fortunately, these “out of memory”
    scenarios are quite rare, and when they do occur, the root cause tends to lie
    not in the localization module but in some other memory-intensive part of the
    application.


    Now we have to get the data from the localization files into the hashtable. Just
    to keep our options open, we will want to load our data from an internal JAD file,
    from a byte array, or from an abstract `InputStream`. Loading data from a byte
    array might seem unnecessary, but it is often needed when the localization data
    is part of a larger data set— for example, when it is deserialized from a persistent
    record containing multiple objects. Thus, the data loading code will look like
    the one in [Listing 7–7](#Chapter07.html#list_7_7).


    **Listing 7–7.** *Loading Localization Data from Various Sources*


    `public static boolean loadFromInternalFile(String internalFile)`

    `{`

    `        try`

    `        {`

    `                InputStream stream = Locale.class.getResourceAsStream(internalFile);`

    `                if ( stream == null )`

    `                {`

    `                        return false;`

    `                }`

    `                DataInputStream in = new DataInputStream(stream);`

    `                if ( in.available() == 0 )`

    `                {`

    `                        return false;`

    `                }`

    `                return loadFromDataInputStream(in);`

    `        }`

    `        catch (Exception ex)`

    `        {`

    `                return false;`

    `        }`

    `}`


    `public static boolean loadFromByteArray(byte [] data, int offset, int length)`

    `{`

    `         DataInputStream in = new DataInputStream ( new ByteArrayInputStream(data,`

    `         offset,length) );`

    `        return loadFromDataInputStream(in);`

    `}`


    `public static boolean loadFromDataInputStream(DataInputStream in)`

    `{`

    `        String key, value;`

    `        try`

    `        {`

    **`while ( true )`**

    **`{`**

    **`key = in.readUTF();`**

    **`value = in.readUTF();`**

    **`keyValuePairs.put(key, value);`**

    **`}`**

    **`}`**

    **`catch (EOFException ex)`**

    **`{`**

    **`// End of file, we can stop`**

    **`}`**

    `        catch (IOException ex)`

    `        {`

    `                // Whoops! Read was not successful`

    `                return false;`

    `        }`

    `        return true;`

    `}`'
  trans: '

    我们在此暂停处理翻译文件，但请记住，整个过程还可以更进一步。重要的是要认识到，最终输出的文件始终看起来像清单 7–5。


    **清单 7–5.** *翻译输出文件的样子*


    `<键 1> <值 1> <键 2> <值 2> … <键 XX> <值 XX>`


    这种结构极其简单，没有换行符或特殊分隔符，并且具有非常基础且易于理解的结构。这样做的一个副作用是，输入文件几乎可以采用任何格式和结构，只要该格式最终能够被翻译成简单的键/值对即可。这意味着，例如，你可以将语言文件的输入格式更改为
    XML 或 JSON（甚至可以直接从数据库中获取翻译），可以通过添加预处理功能（例如，“include”指令）来增强语言文件的结构，还可以添加诸如“if”语句和循环等动态元素。只要输出结果与清单
    7–5 中的结构匹配，你就可以自由地做任何想做的事情。虽然通常不需要这种程度的灵活性，但知道在需要时可以使用它，这很棒。


    #### 在设备上加载本地化数据


    如前所述，本地化数据的主要来源将是 JAR 本身内的文件，但我们也会提供支持，用于从任何通用的 `DataInputStream` 加载本地化数据。


    然而，在此之前，我们需要准备好本地化模块的基本结构。这非常简单，因为本地化模块的核心依赖于非常基础的键/值对概念，而这正是 `Hashtable` 类所提供的。因此，本地化模块的骨架将类似于清单
    7–6 中的代码。


    **清单 7–6.** *本地化模块的骨架*


    `package app.module.L10n.classes;`


    `...`


    `public class Locale`

    `{`

    `    protected static Hashtable keyValuePairs = new Hashtable();`


    `    ...`

    `}`


    `Locale` 类将是本地化模块的核心（实际上，它将是*整个*本地化模块）。`keyValuePairs` 哈希表将用于存储来自本地化文件的所有键/值对。哈希表允许快速查找，但代价是增加一些内存开销。这种开销通常是可以接受且可以忽略不计的。然而，如果你的目标设备是内存极其有限且性能极低的设备，或者目标设备的
    `Hashtable` 实现极其浪费内存，那么你可能希望改用 `Vector` 甚至固定数组。虽然这样可以节省内存，但通常会增加查找操作的 CPU 开销。幸运的是，这些“内存不足”的情况相当罕见，而且即使发生，根本原因通常也不在于本地化模块，而在于应用程序中其他内存密集型的部分。


    现在，我们必须将本地化文件中的数据加载到哈希表中。为了保持选项的开放性，我们将从内部 JAD 文件、字节数组或抽象的 `InputStream` 中加载数据。从字节数组加载数据可能看起来没有必要，但当本地化数据是更大数据集的一部分时（例如，当它从包含多个对象的持久化记录中反序列化时），这通常是必需的。因此，数据加载代码将类似于清单
    7–7 中的代码。


    **清单 7–7.** *从不同来源加载本地化数据*


    `public static boolean loadFromInternalFile(String internalFile)`

    `{`

    `        try`

    `        {`

    `                InputStream stream = Locale.class.getResourceAsStream(internalFile);`

    `                if ( stream == null )`

    `                {`

    `                        return false;`

    `                }`

    `                DataInputStream in = new DataInputStream(stream);`

    `                if ( in.available() == 0 )`

    `                {`

    `                        return false;`

    `                }`

    `                return loadFromDataInputStream(in);`

    `        }`

    `        catch (Exception ex)`

    `        {`

    `                return false;`

    `        }`

    `}`


    `public static boolean loadFromByteArray(byte [] data, int offset, int length)`

    `{`

    `         DataInputStream in = new DataInputStream ( new ByteArrayInputStream(data,`

    `         offset,length) );`

    `        return loadFromDataInputStream(in);`

    `}`


    `public static boolean loadFromDataInputStream(DataInputStream in)`

    `{`

    `        String key, value;`

    `        try`

    `        {`

    **`while ( true )`**

    **`{`**

    **`key = in.readUTF();`**

    **`value = in.readUTF();`**

    **`keyValuePairs.put(key, value);`**

    **`}`**

    **`}`**

    **`catch (EOFException ex)`**

    **`{`**

    **`// 文件结束，我们可以停止`**

    **`}`**

    `        catch (IOException ex)`

    `        {`

    `                // 哎呀！读取未成功`

    `                return false;`

    `        }`

    `        return true;`

    `}`

