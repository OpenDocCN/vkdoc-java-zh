  trans: '

    #### 抽象 API


    抽象 API 是整个框架的核心。简单来说，您不再直接调用原生平台 API，而是调用抽象 API；它负责通过透明地处理碎片化问题和不一致性，来确保最终结果与预期结果相符。


    最好的抽象 API 是那些模仿原生 API 本身的 API。理想情况下，抽象 API 应该非常易于使用，以至于您根本无需修改现有代码。如果抽象 API 能精确模仿原生
    API，并且移植框架为所有 API 类提供了供应商或设备特定的包装器，那么这种情况就可能实现。结合前面提到的替换功能，这为开发者创造了一个无忧无虑的环境；所有移植问题都由框架透明地处理。


    一个真正优秀的抽象 API 不仅模仿原生 API，还会对其进行扩展。例如，它可以向 `Graphics` 类添加诸如 `drawPoly()` 或 `fillPoly()`
    之类的方法，以增强您应用程序的绘图能力，或者向 `Display` 类添加一个通用的 `keepBacklightOn()` 方法。


    #### 多平台支持


    这是一个很棒的特性，但对于一个严格专注于碎片化问题的框架来说，它是可选的。基本上，这允许您获取普通的 Java ME 应用程序，并将其编译为完全不同的平台，例如
    Android。


    这通常通过交叉编译代码，甚至将代码从一种语言翻译成另一种语言来实现，例如将 Java ME 应用转换为 iPhone 应用的情况。


    一个值得关注的问题是，不同平台有不同的用户交互范式，这需要加以缓解（例如，Android 和 iPhone 都没有软键的概念）。因此，多平台转换工具仅真正推荐用于后端内容，或者那些不依赖平台原生表单和小部件，而是通过底层绘图命令来渲染用户界面的应用程序。


    多平台支持最理想的情况是，您只需通过转换工具运行代码，它就能自动完成所有工作，生成一个可在另一个平台上直接运行的应用程序。然而，实际情况并非如此，尤其对于复杂的应用程序而言。通常，转换工具可能只能完成
    90-95% 的工作，具体取决于目标平台和应用程序的复杂性，这意味着您仍然需要自己解决一些问题（例如内存泄漏）。一个好的转换工具会告知您大多数潜在问题及其在代码中可能出现的位置，这样您就能确切知道该从哪里入手。


    #### 实用代码和工具


    您是否注意到 Java ME 不支持大数？或者它的数组处理能力相当有限？又或者它几乎没有 XML 处理能力？一个好的移植框架会将这些特性作为其“实用工具包”的一部分，该工具包通常是一组独立的类，您可以将其与主移植框架分开，在您的项目中使用。


    外部工具也是一个巨大的加分项。跨格式转换器（例如从 XML 到 JSON）、二进制资源编辑器、配置文件编辑器、代码混淆器等，有时会作为移植框架完整包的一部分。与实用类一样，虽然这些工具与移植应用程序没有直接关系，但它们确实能让开发者的生活更轻松。


    此外，它们通常是根据移动/Java ME 开发者的需求量身设计的，旨在与移植框架本身配合使用，并且通常可以很容易地集成到构建过程中以进一步实现自动化——因此它们最终能提供相当多的额外价值。


    #### UI 库


    优秀的移植框架通常还会附带一个高质量的 UI 库。这完全合理，因为 UI 通常是跨设备和平台移植时最困难的部分之一。


    您也可以找到支持多种设备的独立 UI 工具包；然而，这些工具包仅提供 UI 的移植支持；其他所有事情都需要您自己处理。此外，它们通常不具备移植框架的所有优点，例如高质量的构建引擎和设备数据库。当然，您可以将第三方
    UI 库集成到您选择的框架中，但这可能会导致意想不到的副作用和错误，并且通常会使得 UI 库方面的支持选项失效或受限（这很有道理，因为您基本上是在他们无法控制的第三方软件解决方案之上运行他们的代码）。


    因此，坚持使用移植框架自带的 UI 库是一个非常明智的选择。这些库通常功能强大，并且能与移植工具集的其余部分完美集成。


    一个好的 UI 库应该完全摒弃原生 UI 小部件，并从头开始实现自己的小部件。它还应该支持通过 CSS 或其他对设计师友好的方式进行样式设置、灵活的 UI
    布局机制（如果您计划针对分辨率差异很大的设备，这一点非常重要）、丰富的小部件选择（类似于桌面世界中的选择），以及一系列精美的视觉效果，为您的应用程序增添额外的光彩。


    #### 客户支持


    最后但同样重要的是，客户支持对于移植框架来说极其重要，无论从商业*还是*技术角度来看都是如此。无论您使用的框架有多好，很可能在某些时候，某些问题（无论是新的碎片化问题还是特定场景的问题）都必须手动处理。例如，以下是您在开发
    Java ME 应用程序时可能遇到的几种常见情况：


    *   您可能需要从那些在低端和高端设备上拥有丰富 Java ME 经验的人那里获得一些专业建议（例如，关于如何实现某个特定需求）。

    *   您的项目需求非常具体，需要大量的定制化，无论是从技术角度还是从商业角度（例如，许可模式）。

    *   您可能需要与一家拥有跨平台经验的公司合作，该公司可以帮助您将应用程序移植到其他平台。

    *   您可能需要为您的项目添加额外的功能，例如基于小区 ID 查找设备坐标。


    在所有这些情况下，客户支持都可能成就或毁掉一个项目。事实上，根据您的需求，最佳的技术解决方案可能并非项目整体的最佳解决方案。在 Java ME 领域，通常来说，花钱购买开发支持、知识以及一个好的产品，远比花钱购买一个没有附带支持的好产品要划算得多。


    一个好的 Java ME 移植框架背后，其开发者会提供几乎无限的支持。也就是说，只要您愿意付费，开发者就愿意投入所需的时间和精力来满足您的需求，并且愿意修改框架和相关工具以适应您的需求。

    '
- fmt: '#### Code License


    If possible, go for an open source or dual-license porting framework. The goal
    here is to be able to own, use, or modify as much of the code as possible, and
    to be able to share this code with others (for suggestions, reporting bugs, etc.).


    Besides the obvious business implications, a closed or restrictive code license
    means that fewer people have knowledge of the code and of the framework itself,
    so fewer people are able to help you when you get in trouble. In addition to this,
    should the company making or supporting the product go out of business, you may
    run the risk of being stuck with absolutely no support and a code base that does
    not get updated further.


    On the other hand, open source or dual-licensing means that updates are more frequent
    because more people can contribute, and it also provides some insurance should
    the parent company go out of business, since the open source community can then
    continue development on its own.


    The difference between closed and open source is extremely important in the Java
    ME world. While on the desktop or on the server, you have a more or less stable
    environment for your code across years or even decades. In the Java ME world,
    changes happen so often that your code might run fine today and be broken by a
    firmware update tomorrow. Open source initiatives almost always react more quickly
    and cover more ground than closed source ones.


    ### Cross-Development and Porting Tools


    There is quite a rich selection of cross-development and porting tools available
    today. In this section, let''s briefly look at some of them.


    First off, Sun''s Lightweight UI Toolkit (LWUIT) is a great UI framework that
    supports most of the Java ME devices in use today that meet its minimum specifications
    (CLDC 1.1 / MIDP 2.0). Using LWUIT, you will be able to create great-looking user
    interfaces and easily port them across devices. LWUIT is available under GPL (in
    source-code form) and under Sun''s license agreement (in binary form).


    Next, Enough Software''s J2ME Polish is a feature-complete porting suite, offering
    not only a rich UI framework but also other useful features: a powerful preprocessor,
    serialization support, remote method invocation support, external tools, and more.
    It can port your Java ME application across device models and vendors as well
    as to the Blackberry and Android platforms. It is available under GPL and a commercial
    license.


    Mobile Distillery''s Celsius is another powerful porting tool. Like J2ME Polish,
    it can automatically port your Java ME application across devices, vendors, and
    platforms. Celsius''s main focus is on efficiently porting source code and minimizing
    the number of device-specific builds needed for any given application. Celsius
    is available under a commercial license.


    Last but not least is Bedrock, created by Metismo. Bedrock has a larger scope
    than Celsius and J2ME Polish, in that it allows you to port your Java ME application
    not only to mobile phones but also to a wide variety of other devices. For example,
    it can target Sony''s PSP and Nintendo''s DS, among others. Bedrock is available
    under a commercial license.


    ### Summary


    In this chapter, we have looked at device fragmentation. We have looked at where
    it comes from, into what subtypes it can be split, and how to approach each type
    of fragmentation issue.


    We have also examined how porting frameworks can help mitigate fragmentation issues
    and how to compare porting frameworks from a technical standpoint.


    In the following chapter, we will look at how to optimize your application''s
    code.


    ## Chapter 10


    ## Optimizing Your Code


    Second to device fragmentation, the most severe problem you''ll encounter when
    writing Java ME applications is lack of CPU power. The typical Java ME device
    offers very limited CPU power, usually enough to comfortably run simple applications
    but not enough to run more complex applications, with lots of background tasks
    and fancy user interfaces. While this cannot be avoided, its impact on your application
    can be minimized by optimizing your code and your algorithms.


    There is some good news and some bad news regarding this. The good news is that
    you can effortlessly get speed-ups of 10–20% by optimizing your code, and in some
    cases the speed-up can be 200% or even more, with the typical speed-up somewhere
    between 30% and 50%. The bad news is that you have to optimize your code manually.


    Why do you have to optimize your code manually? Good question—first, because `javac`
    (the official Java compiler and the compiler you''re likely using) doesn''t really
    optimize your code. Java relies on a just-in-time compiler, which is part of the
    JVM, to optimize at runtime the bytecode that `javac` produces, and optionally
    convert it to native code (which is significantly faster). The JVM found on most
    phones does not have a just-in-time compiler. This means that the Java bytecode
    produced by `javac` is usually executed as is, without any performance optimizations
    whatsoever applied to it—optimizations that are usually applied by default when
    targeting a full-fledged JVM.


    Second, because even if you do use a compiler that is capable of optimizing your
    bytecode at build time, it can do only so much. Sure, you will definitely get
    a performance boost when compared to the non-optimized bytecode produced by `javac`,
    but you can get an extra 20–30% improvement (sometimes considerably more) if you
    optimize the code yourself. Remember, the compiler doesn''t know the device you''re
    targeting and its peculiarities, it doesn''t know what algorithm the code represents,
    and it doesn''t know what you actually want the code to do (your intentions, so
    to speak). It cannot take these factors into account when optimizing your code—you
    can.


    In this chapter, we will look at the most important code optimization techniques
    that apply to Java ME development, from simple ones like fast code path switching
    and code inlining to more advanced techniques such as math expression optimization
    and variable locality improvement.


    We will also look at how to properly compare algorithms and what algorithms to
    use for searching and sorting data. Finally, we will examine important programming
    techniques such as object pooling (used to eliminate object creation) and dynamic
    programming (used to eliminate recursion).'
