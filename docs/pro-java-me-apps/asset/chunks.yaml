    \ will be represented.\n\n### Defining the TwitterUser Data Type\n\nIntuitively\
    \ enough, users are the ones who post and read tweets. Each Twitter user has a\
    \ name, a short description (or bio), an URL, and a location. Thus, the `TwitterUser`\
    \ class looks like the one in [Listing 3–2](#Chapter03.html#list_3_2).\n\n**Listing\
    \ 3–2.** *The `TwitterUser` Class*\n\n```\npackage app.models;\n\nimport com.apress.framework.objecttypes.Model;\n\
    \npublic class TweeterUser implements Model\n{\n\n    protected TweeterUser()\
    \ {  }\n\n    public TweeterUser (String author, String body, String url, String\
    \ location)\n    {\n         ...\n    }\n\n    public String getDescription()\
