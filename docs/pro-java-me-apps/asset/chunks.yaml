  trans: '

    #### 应用创意


    每个项目都始于一个创意。由于本书是一本学习工具，我们的项目应当简单、有趣、有收获且易于理解，但同时也要足够充实，具备成为专业 Java ME 应用的潜力。


    编程入门书籍通常以“Hello, world”示例开始，但我们需要稍微复杂一些的内容。因此，对于我们的项目，我们将编写一个 Java ME 的 Twitter
    客户端。这样选择是合理的，因为：


    *   **复杂度恰到好处**：Twitter 客户端的复杂度足以构成挑战，并为我们提供足够的学习素材，同时又足够简单，可以在合理的篇幅内进行讲解和讨论。

    *   **直截了当**：Twitter 提供了简洁明了的 API 来访问其服务。互联网上也有现成的文档和代码示例。

    *   **趣味性强**：Twitter 的互动特性使这个项目充满乐趣。在编写代码的过程中，你将能轻松地在每一步看到实际效果，并可以向朋友和家人展示，以获取名声和反馈。

    *   **内容丰富**：为了编写一个 Twitter 客户端，我们将处理从创建用户界面到编写网络层，再到使用持久化存储保存应用设置等所有内容。

    *   **为其他应用提供良好起点**：一旦 Twitter 客户端准备就绪，你可以对其进行修改，以支持其他类似 Twitter 的服务，甚至是即时通讯协议。


    #### 目标、功能、收入来源与目标设备


    在确定具体创意后，技术和业务团队应共同决定项目的目标和所需的功能集。这里的关键词是“共同”；与其他更强大的移动平台相比，在 Java ME 项目中，技术团队拥有发言权要重要得多。


    例如，如果某个业务目标是在应用中包含 DivX 支持，技术团队应该否决这一点，因为 Java ME 根本没有足够的处理能力来进行实时的 DivX 解码。另一方面，如果目标是原生的
    Symbian 应用或原生的 Android 应用，这个目标虽然困难，但可以实现。


    技术团队了解应用如何产生收入也很重要，因为这会影响开发过程，有时影响还很大。例如，如果应用旨在通过与第三方服务（如亚马逊）集成来产生收入，那么在设计应用架构，特别是其网络模块时，必须考虑到这一点。


    然而，如果主要收入来源是直接销售，那么开发者可以加入某种形式的复制保护，例如国际移动设备识别码（IMEI）检查，以减少盗版并增加销量。或者，如果应用通过增加公司曝光度和展示其产品来间接赚钱，那么代码必须经过彻底优化，并榨干每一分性能，以便用户获得最佳体验。


    当然，这些要点对所有移动平台都适用，但 Java ME 项目必须格外注意，因为它们不像其他移动平台那样拥有集成的应用商店、丰富（甚至过剩）的资源以及强大的内置网络功能。


    技术团队还需要了解项目在资金、时间和人力方面的预算，并应在如何支出这笔预算方面拥有明确的发言权（再次强调，这比其他平台重要得多）。例如，如果项目资金不多，但有足够的人力和时间，UI
    模块可以完全内部构建，而不是授权使用第三方库。虽然这个决定影响深远，在 Java ME 项目中必须仔细考虑，但对于 Android 或 iPhone 来说，这通常甚至不是一个讨论话题，因为它们原生的
    UI 能力对于大多数项目来说已经绰绰有余。


    接下来，应确定目标设备以及每台设备要包含的功能。在这方面，Java ME 也与其他移动平台不同，因为设备种类繁多，高端和低端设备之间存在巨大差距，这意味着你无法针对所有设备，通常也无法在你所针对的所有设备上包含相同的功能集。


    因此，确定目标设备是非常重要的一步，并且应与你的业务目标保持一致。例如，如果你的应用旨在通过月度订阅产生收入，那么针对低端手机意义不大，因为它们的用户不太可能在订阅上花钱。相反，你应该针对更高端的设备：这将允许你包含更多功能和打磨，从而使你的应用更具吸引力。而且，由于高端设备更贵，通常可以推断其用户更有可能每月为你的服务付费——哪怕仅仅是因为他们通常有更多的钱可以花。


    相反，如果你的应用旨在通过提高公司和产品的知名度来为你赚钱，那么你应该尽可能多地针对那些受欢迎（按销量计）且价格实惠的设备，并确定一套在所有设备上都能良好运行的功能集，从而确保最大的曝光度。对于依赖一次性销售来产生收入的应用也是如此：如果你针对更广泛的设备，达成销售的机会也会相应增加。你还可以降低购买价格，以使你的产品对潜在买家更具吸引力（每次销售赚得更少，但销量会更高）。


    有时，应用本身的特性就决定了你可以针对的设备。例如，纯触摸设备由于其有限的输入能力，不适合作为模拟器。


    应用可以使用的媒体格式取决于目标设备的媒体支持——而且，与其他移动平台不同，在 Java ME 中通常无法添加对非原生媒体类型的支持。这限制了你在应用中使用的媒体的质量和数量，从
    UI 图形到音效，并且还会影响构建过程。


    例如，如果你所有的目标设备都支持 SVG 图形和 MP3 文件，你可以为你的应用创建一个外观精美的基于矢量的 UI，并配以高质量的音频效果，此外，你还可以为所有设备进行单一构建。然而，如果你的一些设备不支持这些格式，那么对于这些设备，你必须将矢量图形渲染为
    PNG 等位图格式，并将 MP3 声音转换为 WAV 或 AMR。这不仅大大复杂化了构建过程，还会增加应用 JAR 文件的大小，同时实际上降低了媒体质量。这还不是全部：有些设备不支持特定格式的所有变体，因此除了选择合适的媒体格式外，还必须设置正确的编码参数。这意味着，在
    Java ME 项目中，技术团队应与媒体团队紧密合作，以确保所使用的媒体资源经过正确制作并针对目标设备进行了优化。

    '
- fmt: '### Identifying the Target Devices


    Our Twitter client will be written to run on the WTK emulator. This decision was
    made so that as many people as possible can run the code, regardless of what devices
    they have at their disposal. This also means that the code can be written with
    “best practices” in mind, as targeting real devices frequently involves cutting
    corners and using little hacks and workarounds for device-specific problems.


    However, real-life projects must run on real-life devices. With this in mind,
    as a matter of best practices, you should always try to run your projects (Twitter
    client included) on any and all devices at your disposal, even if they are not
    expressly supported. Do a little research, both theoretical and hands-on, about
    each device and try to identify its strengths and weaknesses with respect to the
    project at hand.


    In the end, you should have a list of devices that can run your project fully
    and, for those devices that can run it only partially (typically because of bugs
    or performance issues), the reasons this happens as well as potential solutions.
    This “extra information” usually proves to be invaluable. For example, the fact
    that your application is GC-heavy may not be noticeable when your target devices
    are all high-end, but as soon as you run the code on mid-level or low-end devices,
    this quickly becomes apparent—and you can then start to address the problem, which
    would otherwise have gone unnoticed until it was too late.


    A later chapter deals with the issues of device fragmentation and porting applications
    to other platforms and devices. You can use the information in that chapter to
    adapt the Twitter client to your specific device(s), if needed.


    That being said, the code presented in this book has been written so that it is
    as device-independent as possible, in order to minimize or altogether eliminate
    the effort required to port it.


    ### Identifying Java ME Technical Limitations


    Writing software for mobile devices means taking into account various factors
    that are essentially non-issues in the desktop world, such as battery life, screen
    size, and network connectivity.


    On top of that, mobile software in general and Java ME in particular have limitations
    of their own, which must be identified and dealt with accordingly. These can range
    from the obvious, like “you have only 1 MB of RAM available on device X,” to the
    more obscure, like “object creation on device Y is too slow.” Let''s look at some
    of the most common Java ME technical limitations.


    #### Device Fragmentation


    Device fragmentation comes in two forms: hardware and software. Hardware fragmentation
    is to be expected, as not all devices can have the same specifications, and developers
    can plan and write their code according to the resources available at their disposal.


    Software fragmentation, however, is a far greater problem, possibly the biggest
    problem affecting Java ME (and, to a lesser extent, other platforms, such as Android).
    Not all devices implement the Java ME API in the same way, and some of them even
    implement it wrongly. This can range from easy-to-spot-and-resolve issues like
    different keycodes on different devices, to blatant bugs that appear only in some
    circumstances and only on some devices, and which are hard to debug.


    For example, on Blackberry devices, `drawRGB()` raises an `ArrayIndexOutOfBounds`
    exception when the (x,y) coordinates specified are negative (i.e., drawing starts
    outside of the screen area). As long as both coordinates are positive, this does
    not happen. This is hard to debug because the documentation says that the exception
    is only to be thrown “if the requested operation will attempt to access an element
    of `rgbData` whose index is either negative or beyond its length.” As a developer,
    you are a lot more likely to think that the error appears because you specified
    the wrong parameters to `drawRGB()`, thus causing the code to reference an element
    outside of the array''s bounds, than you are to believe that the error is caused
    by a buggy platform implementation—which is, in fact, the case.


    Later in the book, we will discuss how to deal with both hardware and software
    fragmentation; the solutions are surprisingly similar.


    #### Screen Pixel Density and Screen Size


    The most important thing about pixel density is that, in conjunction with screen
    size and screen resolution, it affects how much information you can comfortably
    display on the screen at once. Let me explain: if a device has a 3-inch display
    with a 1024×768 resolution and a default font height of 10 pixels, you can have
    up to 76 rows of text on the screen at the same time. However, the text would
    be so small that it would be nearly impossible to read. This is also why no such
    device exists, to my knowledge.


    Now consider the following two scenarios:


    *   A device with a 10-inch display featuring a 1024×768 resolution

    *   Another device with a 3-inch display, but with a resolution that''s three
    times smaller (341×256)


    In both of these scenarios, the text would be physically three times bigger than
    in the original scenario, and thus easier to read. For a clear comparison, look
    at [Figure 1–1](#Chapter01.html#fig_1_1).


    ![images](images/0101.jpg)


    **Figure 1–1.** *Screen pixel density comparison*


    Fixed-size graphics are similarly affected. Due to pixel density, a given sprite,
    button, or UI widget can look too small on one device and too big on another,
    even if the size in pixels is the same.


    Screen size is even more important than screen density, because if the screen
    is big enough you can get away with a lower density: the image quality won''t
    be as good, but you''ll be able to read what''s on the screen and that''s what
    matters.


    Another thing to keep in mind is that a UI design can be great on one device and
    lousy on another simply because the screen is physically too small for the design
    in question, regardless of the resolution. This means that some research and hands-on
    experience are needed to find a suitable UI design and size for any given target
    device.


    While developers should be aware of these issues, it is mostly the design team
    that must make decisions in this area. As a general guideline, the vast majority
    of Java ME devices have a 320×240 screen resolution, with a screen size of 2.2–2.8
    inches. Some newer Java ME devices with touchscreen support, for example, those
    coming from Nokia, have a screen size of 3.0–4.0 inches and higher resolutions,
    480×360 in Nokia''s case.'
