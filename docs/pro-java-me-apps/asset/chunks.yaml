    We will retrieve tweets from Twitter''s home timeline via the `TimelineHome` class,
    which is based on Twitter API ME''s timeline functionality.


    Twitter API ME''s timeline functionality is asynchronous. Each request to retrieve
    tweets from a timeline runs in a separate thread and has a listener attached to
    it, which is notified asynchronously when new tweets corresponding to the timeline
    are received, when the search is completed, or when it fails for some reason.


    For simplicity, in our case, `TimelineHome` will be both the request issuer and
    the request listener, so we can handle incoming tweets in the same class instance.
    Thus, the declaration for `TimelineHome` is presented in [Listing 4–11](#Chapter04.html#list_4_11).


    **Listing 4–11.** *The `TimelineHome` Declaration*


    `public class TimelineHome implements Timeline, SearchDeviceListener`

    `{`

    `...`

    `}`


    Asynchronous retrieval is usually a great thing to have; however, in our specifications
    for the `Timeline` interface, retrieving tweets is a synchronous operation: `goForward()`
    and `goBack()` must return either the next corresponding tweet or `null` whenever
    they are called.


    Adapting asynchronous operations to work synchronously is a pretty common task
    for Java ME applications that use external services since some services are, by
    design, at least partially asynchronous. The simplest solution, which is often
    also the most effective one, relies on buffers and Java''s `wait()` and `notify()`
    methods. It works as follows.


    First, in the method or class you want to work synchronously, create an object
    to act as a monitor—let''s call this object `lock`. Then, after you issue the
    asynchronous request, immediately call `lock.wait()` to halt the thread.


    Next, when the other thread (the one in which the request is running) or the registered
    listener receives a response, store the response in a buffer and call `lock.notify()`.
    This resumes the initial thread, which is then free to process the result now
    found in the buffer.


    A pseudo-code version of this is presented in [Listing 4–12](#Chapter04.html#list_4_12).
    Please note that there are many variations possible on this idea—for example,
    the buffer can be passed along as a parameter, the lock can be replaced by a semaphore,
    etc.


    **Listing 4–12.** *Converting Asynchronous Requests to Synchronous Ones*


    `lock = new Object();`

    `buffer = new Buffer();`


    `// In the issuer thread, which is synchronous`

    `public Object getNext()`

    `{`

    `   issueAsyncRequest();`

    `   lock.wait();`

    `   result = processBuffer (buffer);`

    `   return result;`

    `}`


    `// In the request thread or in the event listener`

    `void dataReceived(data)`

    `{`

    `  buffer = processData(data);`

    `  lock.notify();`

    `}`


    Looking at the foregoing pseudo-code, you are tempted to consider the idea as
    being pretty easy to implement, but in practice things are rarely as simple. The
    following is a list of common problems you might face in real life while implementing
    this concept—look for them when writing your code.


    First of all, you have to ensure that the buffer object is properly handled and
    that it cannot be overridden by other requests or method calls until it is processed
    or explicitly discarded. This can sometimes be very difficult, depending on the
    architecture used and the application''s requirements. Second, you have to ensure
    the entire affair is thread-safe, so calling `getNext()` from multiple threads
    works as expected. Third, multiple buffer objects may be involved in some cases—be
    careful not to use the wrong one by mistake. Fourth, you must ensure that you
    do not end up deadlocking the entire application or an important thread.


    Now that we know what to look out for, we can turn our attention to the `TimelineHome`
    class. Before we begin presenting the code, let''s discuss in brief how it will
    work.


    When the class is initialized, the latest tweet will be retrieved from the timeline.
    This will be the “origin” tweet, the reference for the entire timeline. From it,
    you can go either forward or back on the timeline.


    To do this, we will keep track of two IDs: the ID of the oldest tweet retrieved
    and the ID of the newest tweet retrieved. In the beginning, both IDs are equal
    to the ID of the origin tweet. Then, when you call `goBack()` or `goForward()`,
    the appropriate next tweet for each case is retrieved from the timeline. Its ID
    becomes the new ID for the oldest or newest tweet, respectively.


    The first calls to `goBack()` and `goForward()` will each return the origin tweet.
    If at any point there are no older or newer tweets available (depending on the
    call), the calls will return `null`. The origin tweet can also be `null` if the
    user has no tweets at all in the home timeline.


    Now let''s look at the actual code, starting with the constructor and field declarations
    seen in [Listing 4–13](#Chapter04.html#list_4_13).


    **Listing 4–13.** *The Constructor and Fields for `TimelineHome`*


    `protected String latestID, oldestID;`

    `protected com.twitterapime.rest.Timeline timeline;`

    `protected Tweet resultBuffer;`


    `protected Object lock;`


    `protected TimelineHome() { } ;`


    `public TimelineHome(UserAccountManager manager)`

    `{`

    `        lock = new Object();`


    **`synchronized (lock)`**

    `        {`

    `                // Create a query to get the latest tweet ID`

