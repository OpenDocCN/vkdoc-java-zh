    ### Java ME 网络编程最佳实践


    到目前为止，本章主要集中讨论如何基于第三方库实现网络模块，以使过程更快、更易于理解。然而，这样做也让我们忽略了许多与 Java ME 网络编程相关的最佳实践。本章的这一部分旨在通过提供有关
    Java ME 网络编程的通用建议，以及如何、在何处以及为何应用这些建议的示例，来弥补这一不足。


    #### 不要重复造轮子


    市面上有大量的通信协议，以及针对这些协议的 Java ME 实现。无论您偏好 XML、JSON 还是二进制协议，也无论您想连接 Twitter、Blogger
    还是 Facebook，都有现成的解决方案，无需重复造轮子，编写自己的自定义实现或通信协议。尽可能将底层工作交给他人，使用现成的实现。


    考虑到 Java ME 开发的精髓是“精简高效”，这似乎有点反直觉。从这个角度看，乍一看似乎自己实现比使用现有实现更好：您能获得更专门化的功能、更小的代码体积、针对当前应用优化的代码等。您可以只为自己的应用编写一个自定义
    XML 解析器，仅实现所需的 XML 功能，然后对其进行彻底优化。对吗？


    不对。即使您成功让解析器工作起来，事实是您已经投入了大量人力工时来增加开发工作量，同时也增加了出现错误和性能不佳的可能性。而且，由于您可能是唯一使用该解析器的人，您收到的唯一错误报告和性能问题报告将来自您的客户，抱怨您的产品无法按预期工作。再加上您的解析器功能不够丰富，您很快就会明白为什么自己实现是一个得不偿失的做法。


    相比之下，标准协议的专用第三方实现更安全、功能丰富、与时俱进、经过充分测试，并且可以立即使用。许多人都在使用它们，因此它们在错误和性能方面获得了大量反馈。它们有专门的团队维护，并持续改进。诚然，它们可能不如一个编写良好且经过彻底优化的自定义实现那样“精简高效”（尽管如前所述，您能否写出这样的实现本身也值得怀疑），但当您权衡所有因素时，除了缺乏硬件资源或支持外，没有真正的理由不使用它们。


    事实上，即使是我们的第三方 Twitter 库也采用了这种做法，它依赖 KXML 解析器来处理所有与 XML 相关的操作。市面上许多著名的产品和库也是如此。如果这对它们来说很好，那么对您来说很可能也很好。

