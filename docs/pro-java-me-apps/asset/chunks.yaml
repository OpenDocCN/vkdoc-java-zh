- fmt: "# The Networking Module\n\nEvery client application needs a module to allow\
    \ it to communicate with its associated server or servers. Our Twitter client\
    \ is no different. In this chapter, we will implement our networking module, which\
    \ will allow us to access Twitter's services. In the process, we will also examine\
    \ some interesting aspects related to Java ME networking.\n\nBecause writing a\
    \ networking module from scratch would be too time-consuming and complicated,\
    \ we will instead use an already existing third-party library to handle the low-level\
    \ communication with the Twitter servers. We will thus build our module around\
    \ it, relying on the library to do the dirty work while exposing only high-level\
    \ functionality to the rest of the application.\n\n## Setting Up and Configuring\
    \ the Library\n\nThe third-party library we will use is called Twitter API ME,\
    \ available from [`www.twapime.com`](http://www.twapime.com). It is a cross-platform\
    \ library, which at the time of this writing supports Java ME, J2SE, and Android.\
    \ The source code is available under the GPL license, while the binaries can be\
    \ used under LGPL. In our application, we will use the library in source-code\
    \ form.\n\nThe latest version available at the time of this writing is 1.4, and\
    \ this is what we will be using in this chapter. If you like, feel free to use\
    \ a newer version of the library if one is available.\n\nThe first thing we need\
    \ to do is download Twitter API ME. To do this, go to [`http://kenai.com/projects/twitterapime/downloads/directory/1.4`](http://kenai.com/projects/twitterapime/downloads/directory/1.4)\
    \ and download the Java ME version of the library, `twitter_api_me-1.4-javame.zip`.\n\
    \nWe are mainly interested in two directories from the archive: `/src` and `/lib`.\
    \ Copy the contents of `/src` to your project's source folder and the contents\
    \ of `/lib` to your project's library folder.\n\nNext, configure your IDE and\
    \ environment to make sure that both the `kxml` and `xauth-encoders` libraries\
    \ from the `/lib` folder are included in the build process (Twitter API ME depends\
    \ on them, just like we depend on it) and that the Twitter API ME source code\
    \ will be compiled along with your application's source code. Following that,\
    \ remove the `impl.android` package and all its sub-packages to make sure the\
    \ project will build without errors.\n\nWith this, the library setup is completed.\
    \ However, we still need to make sure Twitter allows us access to its services.\
    \ Assuming you don't have a Twitter account, create one now. Next, go to [`http://dev.twitter.com/apps`](http://dev.twitter.com/apps)\
    \ and register a new Twitter application to your account. After you have registered\
    \ your application, go to its details page. You will find a lot of information\
    \ there that we will use in the next steps, such as the API key, your consumer\
    \ key and secret, and your single-access token and token secret.\n\nIt is now\
    \ time to request xAuth access. To do this, follow the instructions found at [`http://dev.twitter.com/pages/xauth`](http://dev.twitter.com/pages/xauth).\
    \ They basically ask you to send an e-mail to [`api@twitter.com`](http://api@twitter.com)\
    \ with your application's description, reasons for which your application needs\
    \ xAuth access, your application's consumer key, and its ID (if available). Your\
    \ request will be judged, and you will usually receive a response within 24–48\
    \ hours.\n\n**NOTE:** At the time of this writing, xAuth is available only on\
    \ a per-request basis, and not everyone will qualify for it. This might change\
    \ with time, however, and xAuth might become available to everyone by default,\
    \ so check for this before writing to Twitter and requesting xAuth access for\
    \ your application.\n\nIn the meantime, you can use your single-access tokens\
    \ to authenticate yourself. You can also use your tokens if Twitter denies your\
    \ request for xAuth access for some reason. However, this means you will be able\
    \ to use only your own Twitter account. Signing in as another user will not be\
    \ possible. For us this will not be a problem: since we are only doing a learning\
    \ project, being able to use just one user account is not a very big inconvenience.\n\
    \nOnce you know your single-access token and secret, as well as your consumer\
    \ key and secret, it's time for a quick smoke test. For this, you will need to\
    \ run the MIDlet shown in [Listing 4–1](#Chapter04.html#list_4_1).\n\n**Listing\
    \ 4–1.** *The Smoke-Test MIDlet*\n\n```\npackage test;\n\nimport com.twitterapime.rest.Credential;\n\
    import com.twitterapime.rest.UserAccountManager;\n...\n\npublic class TestMidlet\
    \ extends MIDlet\n{\n    public void startApp()\n    {\n        try\n        {\n\
    \            Token token = new Token(\"access_token\", \"access_token_secret\"\
    );\n            Credential c = new Credential(\"your_user_name\", \"consumer_key\"\
    , \"consumer_secret\",\n            token);\n            UserAccountManager m\
    \ = UserAccountManager.getInstance(c);\n            if (m.verifyCredential())\n\
    \            {\n                System.out.println(\"Auth OK\");\n           \
    \ }\n            else\n            {\n                System.out.println(\"Auth\
    \ failed\");\n            }\n        }\n        catch (Exception ex)\n       \
    \ {\n            ex.printStackTrace();\n        }\n    }\n\n    public void pauseApp()\
    \ {\n    }\n\n    public void destroyApp(boolean unconditional) {\n    }\n}\n\
    ```\n\nThe smoke-test MIDlet checks if token-based authentication works properly.\
    \ To check if xAuth authentication is working for you, simply replace the lines\
    \ in bold from [Listing 4–1](#Chapter04.html#list_4_1) with the following line:\n\
    \n```\nCredential c = new Credential(\"user_name\", \"password\", \"consumer_key\"\
    ,\n\"consumer_secret\");\n```\n\nThe username and password in the foregoing example\
    \ can be the username and password for any valid Twitter account.\n\nWhile running\
    \ either one of the two smoke-test MIDlets, you may encounter the following error,\
    \ or an error similar to it:\n\n```\njavax.microedition.pki.CertificateException:\
    \ Certificate was issued by an unrecognized\nentity\n```\n\nThis happens because\
    \ the SSL certificate Twitter is using is not recognized by some older versions\
    \ of the WTK emulator. Running the MIDlet on an actual device should work just\
    \ fine if the device in question is reasonably recent (less than 4–5 years old)\
    \ and made by a reputable company. In other words, the code will work fine on\
    \ the vast majority of devices out there. However, our target device is the WTK\
    \ emulator, so we will have to fix this. We can either install the missing certificate\
    \ manually, which is fairly complicated, or configure Twitter API ME to use HTTP\
    \ instead of HTTPS. We will choose the latter solution.\n\nUsing HTTP instead\
    \ of HTTPS for authentication is extremely simple if you have access to the library's\
    \ source code. All you have to do is open `UserAccountManager.java` and change\
    \ the OAuth URL from [`https://api.twitter.com/oauth/access_token`](https://api.twitter.com/oauth/access_token)\
    \ to [`http://api.twitter.com/oauth/access_token`](http://api.twitter.com/oauth/access_token).\n\
    \n**TIP:** Before we proceed, I would like to share with you two important pieces\
    \ of advice related to writing a networking module. While not groundbreaking,\
    \ they have saved me quite a few times and they do tend to make your life easier\
    \ (they have certainly made mine easier)."
  raw: '## The Networking Module


    Every client application needs a module to allow it to communicate with its associated
    server or servers. Our Twitter client is no different. In this chapter, we will
    implement our networking module, which will allow us to access Twitter''s services.
    In the process, we will also examine some interesting aspects related to Java
    ME networking.


    Because writing a networking module from scratch would be too time-consuming and
    complicated, we will instead use an already existing third-party library to handle
    the low-level communication with the Twitter servers. We will thus build our module
    around it, relying on the library to do the dirty work while exposing only high-level
    functionality to the rest of the application.


    ### Setting Up and Configuring the Library


    The third-party library we will use is called Twitter API ME, available from [`www.twapime.com`](http://www.twapime.com).
    It is a cross-platform library, which at the time of this writing supports Java
    ME, J2SE, and Android. The source code is available under the GPL license, while
    the binaries can be used under LGPL. In our application, we will use the library
    in source-code form.


    The latest version available at the time of this writing is 1.4, and this is what
    we will be using in this chapter. If you like, feel free to use a newer version
    of the library if one is available.


    The first thing we need to do is download Twitter API ME. To do this, go to [`http://kenai.com/projects/twitterapime/downloads/directory/1.4`](http://kenai.com/projects/twitterapime/downloads/directory/1.4)
    and download the Java ME version of the library, `twitter_api_me-1.4-javame.zip`.


    We are mainly interested in two directories from the archive: `/src` and `/lib`
    . Copy the contents of `/src` to your project''s source folder and the contents
    of `/lib` to your project''s library folder.


    Next, configure your IDE and environment to make sure that both the `kxml` and
    `xauth-encoders` libraries from the `/lib` folder are included in the build process
    (Twitter API ME depends on them, just like we depend on it) and that the Twitter
    API ME source code will be compiled along with your application''s source code.
    Following that, remove the `impl.android` package and all its sub-packages to
    make sure the project will build without errors.


    With this, the library setup is completed. However, we still need to make sure
    Twitter allows us access to its services. Assuming you don''t have a Twitter account,
    create one now. Next, go to [`http://dev.twitter.com/apps`](http://dev.twitter.com/apps)
    and register a new Twitter application to your account. After you have registered
    your application, go to its details page. You will find a lot of information there
    that we will use in the next steps, such as the API key, your consumer key and
    secret, and your single-access token and token secret.


    It is now time to request xAuth access. To do this, follow the instructions found
    at [`http://dev.twitter.com/pages/xauth`](http://dev.twitter.com/pages/xauth).
    They basically ask you to send an e-mail to [`api@twitter.com`](http://api@twitter.com)
    with your application''s description, reasons for which your application needs
    xAuth access, your application''s consumer key, and its ID (if available). Your
    request will be judged, and you will usually receive a response within 24–48 hours.


    **NOTE:** At the time of this writing, xAuth is available only on a per-request
    basis, and not everyone will qualify for it. This might change with time, however,
    and xAuth might become available to everyone by default, so check for this before
    writing to Twitter and requesting xAuth access for your application.


    In the meantime, you can use your single-access tokens to authenticate yourself.
    You can also use your tokens if Twitter denies your request for xAuth access for
    some reason. However, this means you will be able to use only your own Twitter
    account. Signing in as another user will not be possible. For us this will not
    be a problem: since we are only doing a learning project, being able to use just
    one user account is not a very big inconvenience.


    Once you know your single-access token and secret, as well as your consumer key
    and secret, it''s time for a quick smoke test. For this, you will need to run
    the MIDlet shown in [Listing 4–1](#Chapter04.html#list_4_1).


    **Listing 4–1.** *The Smoke-Test MIDlet*


    `package test;`


    `import com.twitterapime.rest.Credential;`

    `import com.twitterapime.rest.UserAccountManager;`

    `...`


    `public class TestMidlet extends MIDlet`

    `{`

    `    public void startApp()`

    `    {`

    `        try`

    `        {`

    **`Token token = new Token("access_token", "access_token_secret");`**

    **`Credential c = new ("your_user_name", "consumer_key", "consumer_secret",`**

    **`token);`**

    `            UserAccountManager m = UserAccountManager.getInstance(c);`

    `            if (m.verifyCredential())`

    `            {`

    `                System.out.println("Auth OK");`

    `            }`

    `            else`

    `            {`

    `                System.out.println("Auth failed");`

    `            }`

    `        }`

    `        catch (Exception ex)`

    `        {`

    `            ex.printStackTrace();`

    `        }`

    `    }`


    `    public void pauseApp() {`

    `    }`


    `    public void destroyApp(boolean unconditional) {`

    `    }`

    `}`


    The smoke-test MIDlet checks if token-based authentication works properly. To
    check if xAuth authentication is working for you, simply replace the lines in
    bold from [Listing 4–1](#Chapter04.html#list_4_1) with the following line:


    `Credential c = new Credential("user_name", "password", "consumer_key",`

    `"consumer_secret");`


    The username and password in the foregoing example can be the username and password
    for any valid Twitter account.


    While running either one of the two smoke-test MIDlets, you may encounter the
    following error, or an error similar to it:


    `javax.microedition.pki.CertificateException: Certificate was issued by an unrecognized`

    `entity`


    This happens because the SSL certificate Twitter is using is not recognized by
    some older versions of the WTK emulator. Running the MIDlet on an actual device
    should work just fine if the device in question is reasonably recent (less than
    4–5 years old) and made by a reputable company. In other words, the code will
    work fine on the vast majority of devices out there. However, our target device
    is the WTK emulator, so we will have to fix this. We can either install the missing
    certificate manually, which is fairly complicated, or configure Twitter API ME
    to use HTTP instead of HTTPS. We will choose the latter solution.


    Using HTTP instead of HTTPS for authentication is extremely simple if you have
    access to the library''s source code. All you have to do is open `UserAccountManager.java`
    and change the OAuth URL from [`https://api.twitter.com/oauth/access_token`](https://api.twitter.com/oauth/access_token)
    to [`http://api.twitter.com/oauth/access_token`](http://api.twitter.com/oauth/access_token).


    **TIP:** Before we proceed, I would like to share with you two important pieces
    of advice related to writing a networking module. While not groundbreaking, they
    have saved me quite a few times and they do tend to make your life easier (they
    have certainly made mine easier).'
