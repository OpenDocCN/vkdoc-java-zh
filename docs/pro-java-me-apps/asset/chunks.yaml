    该表单由三个区域组成。第一个区域是一个单独的按钮，即“新推文”按钮。第二个区域是一个垂直容器，用于显示从服务器检索到的推文。第三个区域是一个水平容器，包含“检索下一批推文”和“前往设置表单”按钮。由于用于显示推文的容器应占据屏幕的大部分空间（即其大小不固定，取决于屏幕分辨率），我们需要为
    `MainForm` 自定义布局，这就是我们重写标准 `doLayout()` 方法的原因。


    请注意，当按下“检索下一批推文”按钮时，会触发一个 `REQUEST_MAIN_TWEETS_BATCH` 事件，该事件由 `TweetsController`
