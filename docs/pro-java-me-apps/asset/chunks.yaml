  trans: '

    ### Java ME API 的演进


    这里最需要讨论的是 MIDP 3.0，它是 MIDP 2.0 的继任者。MIDP 3.0 将在 Java ME 平台的大多数领域带来增强功能：更好的图形、用户界面和通信支持，支持后台
    MIDlet、MIDlet 多任务处理、MIDlet 间通信、原生安全的 RMS 存储、更少的分裂问题等等。


    **注意：** 如需 MIDP 3.0 增强功能的完整列表，请访问 [`http://java.sun.com/developer/technicalArticles/javame/midp3_enhance/`](http://java.sun.com/developer/technicalArticles/javame/midp3_enhance/)。


    这些增强功能是必要的，以便在软件能力方面将 Java ME 平台提升到与现代智能手机平台相当的水平。诚然，智能手机（根据定义）总是拥有更好的能力，但如今大多数
    Java ME 手机甚至不支持像多任务处理这样简单的事情（例如），这意味着大量潜在用户正在远离该平台，也意味着该平台开始显露出老态。


    MIDP 3.0 将改变这一切，为开发者提供创建具有竞争力的现代应用所需的工具。乍一看，一部 MIDP 3.0 功能手机与智能手机相比不会有太大区别。例如，它将支持多任务处理，并支持小部件。（在
    MIDP 3.0 应用中，通过扩展 `IdleItem` 类可以相当容易地实现小部件，之后应用可以通过调用 `Display.setIdleItem(someItem)`
    将它们添加到设备的待机屏幕。基本上，`IdleItem` 就像常规的 Item 一样，可以像它们一样使用，区别在于它们还可以被添加到待机屏幕。）此外，应用将能够相互通信（例如，提供复制粘贴支持）并共享功能，并且它们将能够响应系统级事件，如来电。


    MIDP 3.0 在被广泛采用后，无疑将改变游戏规则。然而，问题在于知道这何时会发生。规范已经最终确定，但据我所知，在撰写本文时，市面上还没有 MIDP 3.0
    设备。造成这种情况的原因有很多，包括产品路线图、许可费用、硬件要求、MIDP 2.0 对于在功能手机上运行的独立应用来说仍然相当不错，以及定价。毫无疑问，为了让功能手机保持竞争力，MIDP
    3.0 设备迟早会出现（考虑到它们的市场份额，显然存在需求）。然而，就目前而言，我们只能等待。


    未来还将看到从 MIDP 1.0/CLDC 1.0 到 MIDP 2.0/CLDC 1.1 的普遍迁移。前一种组合仍然存在于各种各样的设备中，尤其是在发展中国家，但随着硬件变得更便宜以及
    MIDP 3.0 的登场，即使是极低端的设备也将跃升至 MIDP 2.0。


    最后，就 Java ME 可选 API 的演进而言，我没有看到重大变化。大多数现代功能的 API 已经存在（例如，GPS 和 NFC），因此未来唯一会带来的是它们的广泛采用。


    ### Java ME 思维模式与开发理念的演进


    首先，我相信，随着低端、中端和高端设备在能力上持续趋同，开发者最终将能够以一种统一的思维模式来对待所有这些设备——从而创建一种共同的开发理念。重点将放在优雅和简洁上。无需担心当今应用需要支持的截然不同的环境，开发者将能够编写更简洁、更好、更快的代码。


    随着硬件变得更加强大，Java ME 所能实现的极限也将随之增长，采取悲观和谨慎方法的需求将逐渐消失。需要做出的妥协将更少；你将能够同时拥有外观漂亮且功能丰富的应用。


    同时，完成应用不再必须依赖创造性思维和巧妙的问题解决方案。相反，它们将成为可选项，或者更有可能成为应用之间的差异化因素。


    用户体验将比现在受到更多重视，因为开发者将受益于创建用户界面的自由，而这些界面即使在当今的高端设备上也是不可行的。第三方库和工具也将变得更加功能丰富，并利用可用资源和
    API 的增加，这将有助于这一点。因此，使用的第三方库将比现在更多。同时，为了在特定设备上获得最佳性能而亲力亲为的需求将消失：要么库会为你完成这项工作，要么目标设备将足够强大，无需付出这种努力。


    新的思维模式规则也将被引入。例如，云计算以及与云的集成将在 Java ME 世界中扮演越来越重要的角色，以至于它几乎变得司空见惯。这将反映在开发者的思维模式中，目标之一是无缝融合云的能力和设备的能力，以比现在高得多的程度实现两者的最佳结合。


    另一个将被引入的规则是，由于存储空间和内存充足，你应该始终充分利用它们。这将影响一切，从图形用户界面的质量到你的应用将存储和处理的数据的数量和类型。例如，你将能够通过在整个运行过程中跟踪数据的状态，为你的应用添加完整的“撤销”支持。相比之下，尽管比几年前好得多，但今天的开发者仍然需要努力节省
    RAM 并尽可能少地使用存储空间，而具有撤销支持的应用通常仅限于一两个步骤。


    总之，Java ME 开发将以与当今桌面开发相同的方式进行处理。需要的优化将大大减少，需要的可移植性技巧也将减少，开发者将更多地依赖原生 API 以及成熟的第三方库和工具。开发将是简洁、简单且优雅的。

    '
- fmt: '### Java ME’s Target Market


    When they first appeared, Java ME devices were targeted toward the relatively
    rich (on a global scale). At that time, that meant people in the Western world.
    Today, Java ME devices are being replaced by smartphones in the Western world,
    a trend that will continue in the future. The replacement is not and will not
    be complete: many people will buy Java ME devices as a secondary phone or because
    they prefer their simplicity and their longer battery life.


    As such, geographically speaking, Java ME’s target market in the future will mostly
    be the developing world, a trend that can be observed in the present too. Many
    nations traditionally considered poor are undergoing an economic boom right now,
    which means a lot of people who couldn’t previously afford a mobile phone (or
    could afford only extremely cheap ones, without any kind of support for third-party
    applications) can now purchase one. Because smartphones are too expensive for
    them, they are opting for feature phones running Java ME.


    This, coupled with the economic boom in their countries, creates a Java ME market
    with great potential, just as it initially was in the Western world. For example,
    in Africa there are considerably more mobile phones than there are computers.
    So what we typically do on computers in the Western world (including banking,
    web surfing, games, and writing e-mails), they do on mobile phones—mobile phones
    that require applications for all of the previously mentioned tasks, applications
    that you can write and monetize.


    Next, the world is much more connected now than it was when Java ME first appeared,
    and this trend will continue for the foreseeable future. This means that connected
    Java ME applications will become more and more common. Thus, a special class of
    applications (which are starting to gain visibility right now) are applications
    that are simply clients for web-based or cloud-based services—for example, clients
    for social networking web sites and for web-based e-mail services. These kinds
    of applications are a perfect match for Java ME’s widespread use across the world,
    and they will likely grow in prominence as the hardware available to them grows
    in power and capabilities; they form a growing and potentially very profitable
    market.


    Finally, when MIDP 3.0 arrives, a new market will be created for smartphone-like
    applications. These will be applications running on feature phones with MIDP 3.0
    support and will stand somewhere between today’s (comparatively limited) MIDP
    2.0 applications and smartphone applications, and they will bridge the gap between
    feature phone functionality and smartphone functionality—for example, e-mail clients
    that run as idle screen applications/widgets on feature phones, or that run in
    the background and notify the user when a new e-mail comes in.


    ### Java ME and Other Platforms


    Java ME is the king of mobile platforms in terms of market share, and will continue
    to be so in the foreseeable future. However, it is no secret that, as far as money
    and development effort is concerned, Java ME is gradually but surely being eclipsed
    by smartphone platforms.


    At least until the arrival of MIDP 3.0, this trend will continue. It’s much easier
    to develop for a smartphone than it is to develop for a feature phone. Furthermore,
    as smartphone platforms rapidly advance and improve (Android is the prime example
    of this), the capabilities gap between Java ME and them will widen.


    At the moment, and in the immediate future, the only thing keeping Java ME afloat
    is its huge market share. To leverage this, cross-platform tools have appeared,
    which allow developers to take their Java ME applications and automatically port
    them to smartphone platforms, giving developers the biggest possible market share.
    These tools have rapidly gained popularity and will continue to remain popular
    as long as market share is what’s required of an application.


    However, cross-platform tools that target smartphones exclusively have gained
    huge popularity in the past couple of years. These tools are based on web technologies
    (HTML, CSS, JavaScript) and have already eclipsed Java ME–based tools in terms
    of popularity for applications that focus on monetization. This situation will
    most likely continue until the widespread adoption of MIDP 3.0, at which point
    Java ME might also become a viable platform for monetization.


    As mentioned before, MIDP 3.0 will be a game changer, allowing Java ME as a platform
    to significantly close the gap between it and smartphone platforms. This will
    make the platform attractive again for developers, at least as far as capabilities
    are concerned. Monetization might be a different issue, primarily because of distribution
    issues (it’s hard to monetize an application if you can’t deliver it to your users;
    Java ME has no central application store).


    There are two main solutions to this problem: vendor-specific stores (for example,
    Ovi by Nokia) built into MIDP 3.0 phones and vendor-independent stores (for example,
    GetJar) that users can access on their own. However, neither solution has the
    same elegance as a unified application store built right into the platform (for
    example, Android Marketplace). Still, what is lost in elegance might be won in
    sheer number of sales, as MIDP 3.0 devices will most likely end up being considerably
    more numerous than any single smartphone platform.


    MIDP 3.0 will also see the resurgence of Java ME as the source platform for cross-platform
    application development, as the baseline low-end device for MIDP 3.0 should be
    about what high-end Java ME devices are today. This, augmented by the new capabilities
    introduced by MIDP 3.0, will make Java ME powerful enough to play in the same
    league as smartphone platforms.


    As for the current MIDP 2.0 technology, it will be able to compete with smartphone
    platforms only in geographical areas where price is the most important criteria
    for purchasing a phone. In the Western world, virtually anyone who wants to run
    an application on their phone will be able to afford a smartphone as the prices
    for entry-level models continue to go down.


    However, in geographical areas where price is the most important criteria, MIDP
    2.0 still has a long life ahead of it, as it will replace both bare-bones mobile
    phones and MIDP 1.0 devices. In contrast, even the cheapest smartphone will be
    considerably more expensive than most people there will be able to afford.'
  raw: '### Java ME’s Target Market


    When they first appeared, Java ME devices were targeted toward the relatively
    rich (on a global scale). At that time, that meant people in the Western world.
    Today, Java ME devices are being replaced by smartphones in the Western world,
    a trend that will continue in the future. The replacement is not and will not
    be complete: many people will buy Java ME devices as a secondary phone or because
    they prefer their simplicity and their longer battery life.


    As such, geographically speaking, Java ME’s target market in the future will mostly
    be the developing world, a trend that can be observed in the present too. Many
    nations traditionally considered poor are undergoing an economic boom right now,
    which means a lot of people who couldn’t previously afford a mobile phone (or
    could afford only extremely cheap ones, without any kind of support for third-party
    applications) can now purchase one. Because smartphones are too expensive for
    them, they are opting for feature phones running Java ME.


    This, coupled with the economic boom in their countries, creates a Java ME market
    with great potential, just as it initially was in the Western world. For example,
    in Africa there are considerably more mobile phones than there are computers.
    So what we typically do on computers in the Western world (including banking,
    web surfing, games, and writing e-mails), they do on mobile phones—mobile phones
    that require applications for all of the previously mentioned tasks, applications
    that you can write and monetize.


