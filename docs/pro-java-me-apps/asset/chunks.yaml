  raw: '### Using Image Blending Techniques


    *Image blending* basically refers to merging two images together so that the resulting
    image contains color information from both images. This is similar to masking,
    in that two images are used to obtain a result. At the same time, it’s quite different,
    because, unlike masking, color information from *both* images is used in the resulting
    image.


    There are many forms of image blending, ranging from the very sophisticated (the
    kind of “polar bear on the beach” effects you see in Photoshop) to the simple
    ones (for example, alpha blending, in which two images overlap, with the top image
    semitransparent and enabling you to see the bottom image through it—the kind of
    effect you often see in 80s music videos).


    This section covers only simple blending techniques. More-advanced blending techniques
    aren’t really suitable for Java ME, because of resource constraints. Still, simple
    doesn’t necessarily mean crude. As you will see, even with simple blending techniques,
    you can still get some very interesting-looking results.


    First, let’s look at the aforementioned alpha blending of two images. This has
    many applications, from smooth screen transitions (in which the top screen gradually
    fades to reveal the bottom one), to better and more intuitive tools to analyze
    data (for example, you can just overlap two visual representations of data, such
    as graphs or color maps, and see which areas are the same and which are different).


    As a side note, this blending technique (like all simple image-blending techniques)
    is a per-pixel operation. That is, each pixel in the output image is dependent
    only on the corresponding pixels in the source images; it does not depend on neighboring
    pixels. This makes it easy to implement, and the code runs pretty fast, provided
    you do not use it on extremely large images.


    By comparison, more-advanced blending techniques require you to process 2 or more
    pixels of each source image for every pixel of the output image. Some techniques
    require that you take into consideration tens of source pixels for every output
    pixel. This obviously makes them considerably slower and unsuitable for Java ME.


    Getting back on track, the best analogy for our alpha blending effect is…mixing
    paint. What you do when you want to mix paint is pour two different colors in
    a bucket and, depending on the quantity of each color, you will get a result closer
    to the first color or to the second color. This is exactly what we want to do:
    we want our output image to reflect more of the top image or more of the bottom
    image, depending on the transparency level we specify.


    Fortunately, there is a mathematical formula that does just this. Adapted so that
    all values are in the 0–255 range (so that it’s easier to work with in Java ME),
    the formula is the one seen in [Listing 13–3](#Chapter13.html#list_13_3).


    **Listing 13–3.** *Alpha Blending Formula*


    **`Result = ( color1 * transparency + color2 * ( 255-transparency) ) / 255`**


    Because each color is actually made up of four different channels (Alpha, Red,
    Green, and Blue), we must apply this formula to each individual channel, as in
    [Listing 13–4](#Chapter13.html#list_13_4).


    **Listing 13–4.** *Per-Channel Alpha Blending Formula*


    **`R.red = ( color1.red * transparency + color2.red * ( 255-transparency) ) /
    255`**

    **`R.green = ( color1.green * transparency + color2.green * ( 255-transparency)
    ) / 255`**

    **`R.blue = ( color1.blue * transparency + color2.blue * ( 255-transparency) )
    / 255`**

    **`R.alpha = ( color1.alpha * transparency + color2.alpha * ( 255-transparency)
    ) / 255`**


    As this is a per-pixel operation, we have to apply this formula to each individual
    pixel of the resulting image. The Java ME code that does this is seen in [Listing
    13–5](#Chapter13.html#list_13_5), where `coeff` is the transparency coefficient
    (in the 0–255 range).


    **Listing 13–5.** *Alpha Blending in Java ME*


    `public void drawBlendedImage(Image bottom, Image top, Graphics g,`

    `int coeff, int x, int y)`

    `{`

    `        // Reserve an array for the pixel data of each image`

    `        int [] bottomData = new int[bottom.getHeight()*bottom.getWidth()];`

    `        int [] topData = new int[top.getHeight()*top.getWidth()];`


    `        // Retrieve the individual pixels of each image (source, mask)`

    `        bottom.getRGB(bottomData, 0, bottom.getWidth(), 0, 0, bottom.getWidth(),`

    `        bottom.getHeight());`

    `        top.getRGB(topData, 0, top.getWidth(), 0, 0, top.getWidth(), top.getHeight());`


    `        // Define the needed pixel values`

    `        int alpha1, alpha2;`

    `        int red1, red2;`

    `        int green1, green2;`

    `        int blue1, blue2;`

    `        int resultA,resultR,resultG,resultB;`


    `        // Go through all the pixels in the top and bottom images`

    `        for (int i=0;i<bottomData.length;i++) {`


    **`           // Get individual channel values for each pixel (top,bottom)`**

    **`           alpha1 = (bottomData[i] & 0xFF000000) >>> 24;`**

    **`           alpha2 = (topData[i] & 0xFF000000) >>> 24;`**

    **`           red1 = (bottomData[i] & 0x00FF0000) >> 16;`**

    **`           red2 = (topData[i] & 0x00FF0000) >> 16;`**

    **`           green1 = (bottomData[i] & 0x0000FF00) >> 8;`**

    **`           green2 = (topData[i] & 0x0000FF00) >> 8;`**

    **`           blue1 = (bottomData[i] & 0x000000FF);`**

    **`           blue2 = (topData[i] & 0x000000FF);`**


    **`           // Apply the image blending formula`**

    **`           resultA = ( alpha1 * coeff + alpha2 * (255 - coeff) ) / 255;`**

    **`           resultR = ( red1 * coeff + red2 * (255 - coeff) ) / 255;`**

    **`           resultG = ( green1 * coeff + green2 * (255 - coeff) ) / 255;`**

    **`           resultB = ( blue1 * coeff + blue2 * (255 - coeff) ) / 255;`**


    **`           // Create the final pixel value`**

    **`           bottomData[i] = resultA << 24 | resultR << 16 | resultG << 8 | resultB
    ;`**

    **`        }`**


    `        // Draw the result`

    `        g.drawRGB(bottomData, 0, bottom.getWidth(), x, y, bottom.getWidth(),`

    `        bottom.getHeight(), true);`

    `}`


    The highlighted lines show where the magic happens. First, for each of the two
    source pixels, we extract the individual Alpha, Red, Green, and Blue channel values
    from their `integer` representations. This is done via classical bit masking and
    bit shifting. Then, we apply the formula to each channel, in order to get the
    resulting ARGB channel values. We then combine these values together in an `integer`
    representation of the resulting pixel. The results of running this code can be
    seen in [Figure 13–4](#Chapter13.html#fig_13_4).


    ![images](images/1304.jpg)


    **Figure 13–4.** *Semitransparent images overlapping*


    The fun part about per-pixel effects is that you can just change the mixing formula
    to get all sorts of interesting results. For example, one very powerful blending
    type is Multiply Blending. The formula for this blending type, as seen in [Listing
    13–6](#Chapter13.html#list_13_6), is quite simple, even simpler than the previous
    one.


    **Listing 13–6.** *Multiply Blending Formula*


    **`Result = ( color1 * color 2 ) / 255`**


    [Listing 13–7](#Chapter13.html#list_13_7) shows the formula translated to Java
    ME code. The listing is extremely similar to [Listing 13–5](#Chapter13.html#list_13_5);
    the only real difference is the change in the blending formula, seen in the highlighted
    lines.


    **Listing 13–7.** *Multiply Blending in Java ME*


    `public void drawMultipliedImage(Image firstImage, Image secondImage,`

    `Graphics g, int x, int y)`

    `{`

    `        // Reserve an array for the pixel data of each image`

    `        int [] bottomData = new int[firstImage.getHeight()*firstImage.getWidth()];`

    `        int [] topData = new int[secondImage.getHeight()*secondImage.getWidth()];`'
