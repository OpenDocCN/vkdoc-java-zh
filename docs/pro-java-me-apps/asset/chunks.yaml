    ### API 不一致性


    在所有可能遇到的碎片化问题中，API 不一致性是最难识别且最令人头疼的。


    API 不一致性是指不同厂商对 Java ME 标准的解读方式不同。这通常会导致同一系统调用在不同设备上产生不同结果、返回不同值，甚至完全无效。由于这些是系统调用，开发者自然会认为它们会像在其他设备上一样正常运行且不会失败——换句话说，开发者认为它们始终安全可靠。因此，当应用出现异常或未产生预期结果时，这些调用通常不会被检查，导致大量时间花在调试和审查应用代码上，而问题实际出在平台实现上。话虽如此，当应用出现异常时，API
    不一致性应作为最后排查项，因为大多数情况下是代码本身而非平台存在问题。


    API 不一致性可分为三个子类别：


    *   *局部不一致性*：通常仅单个方法调用或少数紧密相关的函数表现异常。例如，`Graphics.translate()` 方法在某些平台上无法按预期处理平移，这往往也会影响其他绘图函数。

    *   *架构性或全局不一致性*：标准整体未正确实现。例如，某些手机在应该调用 `pauseApp()` 时未调用，这可能导致各种不良副作用。

    *   *解释空间*：规范未明确定义对错。例如，厂商可自由选择自己的按键码，某些设备可能拥有其他设备没有的按键（及其关联按键码）。


    让我们逐一分析。


    #### 局部 API 不一致性


    局部 API 不一致性在老款手机或无名品牌手机上更常见，在新款手机上则较少（因为厂商已解决大部分问题）。一旦发现局部 API 不一致性，其修复方法通常比硬件和功能碎片化问题简单得多。


    从性能角度看，修复 API 不一致性问题的最佳方法是调整方法调用参数或返回值，使最终结果与正常实现一致。这种方法下，大部分工作仍由平台原生完成，因此性能依然良好。这在大多数场景下可行，因为局部
    API 不一致性及其不良影响通常较细微（例如差一错误、精度误差等），且仅在特定边界情况下发生。此外，有时可通过其他方法调用来替代有问题的函数，从而避免修改参数或返回值，进一步减少对性能的影响。


    当上述方法均不可行时，唯一的选择是自行实现有问题的函数（自己编写或使用第三方库）。显然，这通常会导致显著的性能损失，应尽可能避免。


    无论采用哪种方法，最佳实践是为有问题的函数创建“包装器”，以隐藏修复的复杂性并减少冗余代码。对于静态方法调用或不关心上下文的方法，创建单方法包装器即可，该包装器可以是独立类，也可以是更大
    `GeneralWrappers` 类的一部分。


    对于关心上下文或以某种方式影响上下文的方法（如 `Graphics.translate()` 方法），即使可以通过单方法包装器修复问题，也必须为其整个上下文创建包装器。以
    `translate()` 为例，应为整个 `Graphics` 对象创建包装器，例如 `GraphicsWrapper`。


    即使单方法修复可行，仍要包装整个上下文的思路在于：这能提高代码可读性和一致性（即代码中不混用包装器和原生调用，仅使用包装器调用），并且如果原生方法存在问题，很可能其他相关方法也存在问题或会受影响——因此最终可能也需要包装这些方法。


    值得注意的是，上下文感知的方法包装起来相当棘手，因为它们具有持久副作用。例如，`translate()` 调用会通过偏移 (x,y) 坐标影响 `Graphics`
    对象上的所有后续绘图操作。如果通过修改原生系统调用的方法参数来修复有问题的 `translate()` 实现，则无需额外处理，因为所有副作用（即坐标偏移）都由平台透明处理。


    但如果通过自行实现来修复有问题的 `translate()`，则必须自行跟踪当前平移值，并手动将其应用于所有后续绘图方法调用——换句话说，必须自行模拟所有副作用，这正是清单
    9–1 中包装器所实现的功能。


    **清单 9–1.** *修复 `translate()` 方法的图形包装器类*


    `import javax.microedition.lcdui.Graphics;`


    `public class GraphicsWrapper {`


    `    protected Graphics graphics;`

    `    int translateX = 0, translateY = 0;`

    `    ...`


    `    public GraphicsWrapper(Graphics g)`

    `    {`

    `        graphics = g;`

    `    }`


    `    public void translate(int dx, int dy)`

    `    {`

    `        translateX = dx;`

    `        translateY = dy;`

    `    }`

