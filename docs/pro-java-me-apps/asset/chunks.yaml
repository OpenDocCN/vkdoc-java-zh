- fmt: "#### Use Loop Fission\n\nThis technique works primarily by improving locality\
    \ and optimizing the JVM's stack. Consider the following loop:\n\n```\nfor (i=0;i<1000;i++)\n\
    {\n        a[i] = 5 + i;\n        b[i] = 5 + i*2;\n        ...\n        z[i] =\
    \ 5 + i*26;\n}\n```\n\nIn this case, by the time `z` gets processed, the other\
    \ variables will most likely have to be loaded again from memory. Since this will\
    \ happen on each iteration, performance will suffer. To avoid this, we will split\
    \ this big loop into smaller ones, like so:\n\n```\nfor (i=0;i<1000;i++)\n{\n\
    \        a[i] = 5 + i;\n}\n...\nfor (i=0;i<1000;i++)\n{\n        z[i] = 5 + i*26;\n\
    }\n```\n\nNow locality is greatly improved, and you are free to optimize each\
    \ loop individually if you wish to do so.\n\nThe problem with loop fission is\
    \ that its performance is highly dependent on the scenario at hand and on the\
    \ target device. Generally, having a single loop is faster on most devices because\
    \ loop-related overhead is minimal; however, in some scenarios (especially when\
    \ lots of variables are involved, like the foregoing example), it may be faster\
    \ to split a large loop into smaller ones. There is no rule for this; you just\
    \ have to try it and see what works best.\n\n### Avoiding High-Level Language\
    \ Features\n\nJava is a very powerful and complex language. For example, it has\
    \ features such as inheritance, method overloading, type casting, and runtime\
    \ type evaluation. These features are geared toward making the lives of developers\
    \ easier and making the code they write more powerful.\n\nUnfortunately, they\
    \ also incur a performance hit. For example, in the case of inheritance, whenever\
    \ an object is created, the JVM has to instantiate not only the direct members\
    \ of a class, but also the members of all its parent classes. Furthermore, the\
    \ inheritance hierarchy and variable scope must be kept track of. This adds overhead.\n\
    \nIn the case of method overloading, things get even more interesting as the JVM\
    \ has to decide which version of a method it needs to call. It is not always possible\
    \ to do this entirely at compile time, so calling an overloaded method is usually\
    \ a bit slower than calling a non-overloaded one. It also complicates evaluating\
    \ variable scopes quite a bit.\n\nType casting is also a tricky business, as it\
    \ basically tells the JVM to forget everything it knows about an object and its\
    \ instances, and treat it like the type you instruct it to treat it like. In addition,\
    \ type casting also makes type checking at runtime mandatory, which further decreases\
    \ performance.\n\nA very surprising example for most people is that even arrays\
    \ incur a performance overhead. The reason is that Java always does bounds checking\
    \ on arrays, to make sure that you do not overflow (and when you do, it raises\
    \ an error). This means that every time you access an array element, the JVM has\
    \ to check if the element index you specified is a valid one. The performance\
    \ hit because of this is small for a single sporadic access, but for lots of accesses\
    \ it can add up. Because of this, whenever possible, try to use simple variables\
    \ instead of arrays, especially within loops.\n\nThe list can continue, but the\
    \ moral is that you should always stick to the basics in terms of language features\
    \ if you can. Try to keep your inheritance tree as small as possible, try to avoid\
    \ type casts and method overloading, and try not to do `instanceof` checks.\n\n\
    This eases the load on the JVM, thus making your application run faster. In addition,\
    \ if you are using an optimizing compiler, it also makes it possible for the compiler\
    \ to better optimize the generated bytecode.\n\n**TIP:** If you want the absolute\
    \ best performance, try to make as many member fields and methods as possible\
    \ `static` and `final`. This goes against object-oriented principles, but the\
    \ performance gain can be substantial, as the JVM will have considerably less\
    \ work to do. Of course, this also makes developing applications more difficult\
    \ and less flexible, which in itself can degrade performance.\n\n#### Stick to\
    \ the Basics\n\nJava ME does not provide a lot of utility or helper classes/objects\
    \ by default, but it does provide some. We have all used `Vectors` and `Hashtables`,\
    \ and even though they are less powerful than their J2SE counterparts, they do\
    \ make our lives easier.\n\nUnfortunately, as fast as they may be, using them\
    \ also incurs a performance hit. Many times their use is completely warranted;\
    \ however, there are many circumstances in which they can be substituted with\
    \ more primitive and less elegant alternatives.\n\nFor example, `Hashtables` are\
    \ great if you want to store key/value pairs where the key is an instance of an\
    \ object, or when you need quick and efficient access to the value for any given\
    \ key. Unfortunately, they also tend to require large amounts of memory, and for\
    \ small data sets, their theoretical speed is offset by the overhead they incur\
    \ in terms of function calls and by JVM slowness. In fact, in many cases, you\
    \ are much better off using a sorted array and doing a binary search on that array.\n\
    \nThe same is true for vectors. If you don't plan on using some of their more\
    \ advanced (or convenient) features such as `indexOf` and dynamic resizing, stick\
    \ with an old-fashioned array.\n\nHowever, these optimizations make sense only\
    \ if you are using these utility objects/classes in a block of code that gets\
    \ executed often. For blocks of code that get executed sporadically, these optimizations\
    \ don't really make sense, as the minimal performance gain they bring is greatly\
    \ offset by the increase in code complexity. In addition, some JVMs have these\
    \ objects implemented in native platform code, which actually makes using them\
    \ better and faster than using manually written code. Because of this, some prior\
    \ research must be done before choosing one approach over the other."
  raw: '#### Use Loop Fission


    This technique works primarily by improving locality and optimizing the JVM''s
    stack. Consider the following loop:


    `for (i=0;i<1000;i++)`

    `{`

    `        a[i] = 5 + i;`

    `        b[i] = 5 + i*2;`

    `        ...`

    `        z[i] = 5 + i*26;`

    `}`


    In this case, by the time `z` gets processed, the other variables will most likely
    have to be loaded again from memory. Since this will happen on each iteration,
    performance will suffer. To avoid this, we will split this big loop into smaller
    ones, like so:


    `for (i=0;i<1000;i++)`

    `{`

    `        a[i] = 5 + i;`

    `}`

    `...`

    `for (i=0;i<1000;i++)`

    `{`

    `        z[i] = 5 + i*26;`

    `}`


    Now locality is greatly improved, and you are free to optimize each loop individually
    if you wish to do so.


    The problem with loop fission is that its performance is highly dependent on the
    scenario at hand and on the target device. Generally, having a single loop is
    faster on most devices because loop-related overhead is minimal; however, in some
    scenarios (especially when lots of variables are involved, like the foregoing
    example), it may be faster to split a large loop into smaller ones. There is no
    rule for this; you just have to try it and see what works best.


    ### Avoiding High-Level Language Features


    Java is a very powerful and complex language. For example, it has features such
    as inheritance, method overloading, type casting, and runtime type evaluation.
    These features are geared toward making the lives of developers easier and making
    the code they write more powerful.


    Unfortunately, they also incur a performance hit. For example, in the case of
    inheritance, whenever an object is created, the JVM has to instantiate not only
    the direct members of a class, but also the members of all its parent classes.
    Furthermore, the inheritance hierarchy and variable scope must be kept track of.
    This adds overhead.


    In the case of method overloading, things get even more interesting as the JVM
    has to decide which version of a method it needs to call. It is not always possible
    to do this entirely at compile time, so calling an overloaded method is usually
    a bit slower than calling a non-overloaded one. It also complicates evaluating
    variable scopes quite a bit.


    Type casting is also a tricky business, as it basically tells the JVM to forget
    everything it knows about an object and its instances, and treat it like the type
    you instruct it to treat it like. In addition, type casting also makes type checking
    at runtime mandatory, which further decreases performance.


    A very surprising example for most people is that even arrays incur a performance
    overhead. The reason is that Java always does bounds checking on arrays, to make
    sure that you do not overflow (and when you do, it raises an error). This means
    that every time you access an array element, the JVM has to check if the element
    index you specified is a valid one. The performance hit because of this is small
    for a single sporadic access, but for lots of accesses it can add up. Because
    of this, whenever possible, try to use simple variables instead of arrays, especially
    within loops.


    The list can continue, but the moral is that you should always stick to the basics
    in terms of language features if you can. Try to keep your inheritance tree as
    small as possible, try to avoid type casts and method overloading, and try not
    to do `instanceof` checks.


    This eases the load on the JVM, thus making your application run faster. In addition,
    if you are using an optimizing compiler, it also makes it possible for the compiler
    to better optimize the generated bytecode.


    **TIP:** If you want the absolute best performance, try to make as many member
    fields and methods as possible static and final. This goes against object-oriented
    principles, but the performance gain can be substantial, as the JVM will have
    considerably less work to do. Of course, this also makes developing applications
    more difficult and less flexible, which in itself can degrade performance.


    #### Stick to the Basics


    Java ME does not provide a lot of utility or helper classes/objects by default,
    but it does provide some. We have all used `Vectors` and `Hashtables`, and even
    though they are less powerful than their J2SE counterparts, they do make our lives
    easier.


    Unfortunately, as fast as they may be, using them also incurs a performance hit.
    Many times their use is completely warranted; however, there are many circumstances
    in which they can be substituted with more primitive and less elegant alternatives.


    For example, `Hashtables` are great if you want to store key/value pairs where
    the key is an instance of an object, or when you need quick and efficient access
    to the value for any given key. Unfortunately, they also tend to require large
    amounts of memory, and for small data sets, their theoretical speed is offset
    by the overhead they incur in terms of function calls and by JVM slowness. In
    fact, in many cases, you are much better off using a sorted array and doing a
    binary search on that array.


    The same is true for vectors. If you don''t plan on using some of their more advanced
    (or convenient) features such as `indexOf` and dynamic resizing, stick with an
    old-fashioned array.


    However, these optimizations make sense only if you are using these utility objects/classes
    in a block of code that gets executed often. For blocks of code that get executed
    sporadically, these optimizations don''t really make sense, as the minimal performance
    gain they bring is greatly offset by the increase in code complexity. In addition,
    some JVMs have these objects implemented in native platform code, which actually
    makes using them better and faster than using manually written code. Because of
    this, some prior research must be done before choosing one approach over the other.'
  trans: '

    #### 使用循环分裂


    该技术主要通过改善局部性和优化 JVM 栈来发挥作用。考虑以下循环：


    `for (i=0;i<1000;i++)`

    `{`

    `        a[i] = 5 + i;`

    `        b[i] = 5 + i*2;`

    `        ...`

    `        z[i] = 5 + i*26;`

    `}`


    在这种情况下，当处理到 `z` 时，其他变量很可能需要从内存中重新加载。由于每次迭代都会发生这种情况，性能将受到影响。为了避免这种情况，我们将这个大循环拆分成多个小循环，如下所示：


    `for (i=0;i<1000;i++)`

    `{`

    `        a[i] = 5 + i;`

    `}`

    `...`

    `for (i=0;i<1000;i++)`

    `{`

    `        z[i] = 5 + i*26;`

    `}`


    现在局部性得到了极大改善，如果你愿意，还可以自由地对每个循环进行单独优化。


    循环分裂的问题在于其性能高度依赖于具体场景和目标设备。通常，在大多数设备上，单个循环运行更快，因为循环相关的开销很小；然而，在某些场景下（尤其是涉及大量变量时，如上述示例），将大循环拆分成多个小循环可能会更快。对此没有固定规则；你只能尝试并找出最佳方案。


    ### 避免使用高级语言特性


    Java 是一种非常强大且复杂的语言。例如，它具备继承、方法重载、类型转换和运行时类型评估等特性。这些特性旨在让开发者的生活更轻松，并让编写的代码更强大。


    不幸的是，它们也会带来性能损失。例如，在继承的情况下，每当创建一个对象时，JVM 不仅需要实例化类的直接成员，还需要实例化其所有父类的成员。此外，还必须跟踪继承层次结构和变量作用域。这增加了开销。


    在方法重载的情况下，情况变得更加有趣，因为 JVM 必须决定需要调用哪个版本的方法。这并不总是能在编译时完全确定，因此调用重载方法通常比调用非重载方法稍慢。它还会使变量作用域的评估变得相当复杂。


    类型转换也是一件棘手的事情，因为它基本上告诉 JVM 忘记它已知的关于某个对象及其实例的一切信息，并按照你指示的类型来对待它。此外，类型转换还使得运行时类型检查成为强制要求，这进一步降低了性能。


    对大多数人来说，一个非常令人惊讶的例子是，即使是数组也会带来性能开销。原因是 Java 总是对数组进行边界检查，以确保你不会溢出（如果溢出，则会引发错误）。这意味着每次访问数组元素时，JVM
    都必须检查你指定的元素索引是否有效。对于单次零星访问，这种性能损失很小，但对于大量访问，则会累积起来。因此，尽可能使用简单变量代替数组，尤其是在循环内部。


    这样的例子还有很多，但核心原则是：在语言特性方面，应尽可能坚持使用基础功能。尽量保持继承树尽可能小，尽量避免类型转换和方法重载，并尽量不要进行 `instanceof`
    检查。


    这可以减轻 JVM 的负担，从而使你的应用程序运行得更快。此外，如果你使用优化编译器，这还能让编译器更好地优化生成的字节码。


    **提示：** 如果你追求绝对最佳的性能，请尽量将尽可能多的成员字段和方法声明为 static 和 final。这虽然违背了面向对象的原则，但性能提升可能非常显著，因为
    JVM 需要做的工作会大大减少。当然，这也会使应用程序开发更加困难且灵活性降低，这本身也可能导致性能下降。


    #### 坚持使用基础功能


    Java ME 默认不提供大量实用工具或辅助类/对象，但它确实提供了一些。我们都使用过 `Vectors` 和 `Hashtables`，尽管它们不如 J2SE
    中的对应物强大，但它们确实让我们的生活更轻松。


    不幸的是，无论它们可能有多快，使用它们也会带来性能损失。很多时候，使用它们是完全合理的；然而，在许多情况下，它们可以被更原始、更不优雅的替代方案所取代。


    例如，如果你想存储键/值对，其中键是某个对象的实例，或者当你需要快速高效地访问任何给定键对应的值时，`Hashtables` 非常棒。不幸的是，它们往往需要大量内存，并且对于小型数据集，它们的理论速度会被函数调用带来的开销以及
    JVM 的缓慢所抵消。事实上，在许多情况下，使用排序数组并对其进行二分查找会好得多。


    向量也是如此。如果你不打算使用它们的一些更高级（或更方便）的特性，如 `indexOf` 和动态调整大小，那么坚持使用老式的数组。


    然而，这些优化只有在频繁执行的代码块中使用这些实用对象/类时才有意义。对于零星执行的代码块，这些优化实际上没有意义，因为它们带来的微小性能提升会被代码复杂度的增加所大大抵消。此外，某些
    JVM 将这些对象实现在本地平台代码中，这实际上使得使用它们比使用手动编写的代码更好、更快。因此，在选择一种方法之前，必须进行一些前期研究。

