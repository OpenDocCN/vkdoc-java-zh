- fmt: "# The EventControllerManager\n\nThe primary purpose of the `EventControllerManager`\
    \ is to make sure that event processing for all the controllers under its supervision\
    \ is done on the same thread—which is typically not the same one they were issued\
    \ from. Its secondary purpose is to ensure that all controllers get roughly the\
    \ same amount of CPU time.\n\nThe manager will have a makeshift queue for `EventController`s.\
    \ You can add controllers to the queue by calling `assign()`, and you can remove\
    \ them from the queue by calling `unassign()`. When a controller is added, it\
    \ is added to the back of the queue.\n\nThe manager also has a `processNextEvent()`\
    \ method. This method must be called from the thread on which events are to be\
    \ processed. You can call it from the same thread every time or from different\
    \ threads; you can use an already existing thread or create a dedicated one—it's\
    \ all up to you and your needs.\n\nWhen the method is called, one event from the\
    \ first controller in the makeshift queue will be processed. After that, the first\
    \ controller will be moved to the back of the queue and the second controller\
    \ will take its place, and so forth. This rotational approach provides a quick\
    \ and effective way to make sure all controllers receive relatively equal attention.\n\
    \nAs for which thread the `processNextEvent()` should be called from and how,\
    \ that is entirely up to you and your application. The framework does provide\
    \ a quick and easy solution that works great in 90% of the cases. It will be discussed\
    \ in the section dedicated to the `core` package. However, you are not obligated\
    \ to use it—feel free to design and implement your own mechanism if you want to\
    \ or need to.\n\n`EventControllerManager` is presented in [Listing 2–12](#Chapter02.html#list_2_12).\n\
    \n**Listing 2–12.** *The `EventControllerManager` Class*\n\n```\npackage com.apress.framework.common;\n\
    \nimport com.apress.framework.objecttypes.Manager;\nimport java.util.Vector;\n\
    \npublic class EventControllerManager implements Manager\n{\n    public Vector\
    \ controllers = new Vector(10,10);\n\n    public boolean assign(Object object)\n\
    \    {\n        if ( object instanceof EventController)\n        {\n         \
    \   if ( ! controllers.contains(object) )\n            {\n                controllers.addElement(object);\n\
    \            }\n            return true;\n        }\n        else\n        {\n\
    \            return false;\n        }\n    }\n\n    public void unassign(Object\
    \ object)\n    {\n        controllers.removeElement(object);\n    }\n\n    public\
    \ boolean isManaging(Object object)\n    {\n        return ( controllers.indexOf(object)\
    \ > -1 );\n    }\n\n    public void processNextEvent()\n    {\n        if ( controllers.size()\
    \ > 0 )\n        {\n            EventController controller = (EventController)\
    \ controllers.firstElement();\n            controllers.removeElement(controller);\n\
    \            controller.processNextEvent();\n            controllers.addElement(controller);\n\
    \        }\n    }\n\n    public boolean hasMoreEvents()\n    {\n        return\
    \ currentEventCount() > 0;\n    }\n\n    public int currentEventCount()\n    {\n\
    \        Enumeration controllerEnum = controllers.elements();\n        EventController\
    \ temp = null;\n        int count = 0;\n        while ( controllerEnum.hasMoreElements()\
    \ )\n        {\n            temp = (EventController) controllerEnum.nextElement()\
    \ ;\n            if ( temp.hasMoreEvents() )\n            {\n                count\
    \ += temp.currentEventCount();\n            }\n        }\n        return count;\n\
    \    }\n}\n```\n\nNow it's time to move on to the next package: `com.apress.framework.core`.\n\
    \n## Core Objects and Classes\n\nThis package can be considered the heart of the\
    \ framework, being responsible for gluing everything together and making sure\
    \ that the application has access to everything it needs. We will discuss the\
    \ `Application` class, the `EventManagerThreads` class, and the `Bootstrap` class.\n\
    \n### The Application Class\n\nWith the foregoing in mind, the most important\
    \ part of the `core` package is the `Application` class. It provides access to\
    \ the main event controller, to the main event controller manager (which, by default,\
    \ is *not* linked to the main event controller), to the MIDlet instance, to the\
    \ display instance, and to pretty much everything else that is high-level or critical\
    \ and might need to be accessible from within the application code.\n\nA simple\
    \ implementation of the `Application` class is presented in [Listing 2–13](#Chapter02.html#list_2_13).\
    \ As you adapt the framework to the particular project you are working on, you\
    \ will most likely modify this class to suit your needs.\n\n**Listing 2–13.**\
    \ *The `Application` Class*\n\n```\npackage com.apress.framework.core;\n\nimport\
    \ com.apress.framework.common.EventController;\nimport com.apress.framework.common.EventControllerManager;\n\
    import com.apress.framework.objecttypes.View;\nimport javax.microedition.lcdui.Display;\n\
    import javax.microedition.midlet.MIDlet;\n\npublic class Application\n{\n    static\
    \ EventController mainEventController = new EventController();\n    static EventControllerManager\
    \ manager = new EventControllerManager();\n    static MIDlet midlet = null ;\n\
    \n    protected Application()\n    {\n        // Do nothing\n    }\n\n    public\
    \ static void showView(View view)\n    {\n        getDisplay().setCurrent(view.getCanvas());\n\
    \        view.refresh();\n    }\n\n    public static void init(MIDlet instance)\n\
    \    {\n        midlet = instance;\n        manager.assign(mainEventController);\n\
    \    }\n\n    public static EventController getMainEventController()\n    {\n\
    \        return mainEventController;\n    }\n\n    public static EventControllerManager\
    \ getMainEventControllerManager()\n    {\n        return manager;\n    }\n\n \
    \   public static MIDlet getMIDlet()\n    {\n        return midlet;\n    }\n\n\
    \    public static Display getDisplay()\n    {\n        return Display.getDisplay(midlet);\n\
    \    }\n}\n```"
  raw: '#### The EventControllerManager


    The primary purpose of the `EventControllerManager` is to make sure that event
    processing for all the controllers under its supervision is done on the same thread—which
    is typically not the same one they were issued from. Its secondary purpose is
    to ensure that all controllers get roughly the same amount of CPU time.


    The manager will have a makeshift queue for `EventController`s. You can add controllers
    to the queue by calling `assign()`, and you can remove them from the queue by
    calling `unassign()`. When a controller is added, it is added to the back of the
    queue.


    The manager also has a `processNextEvent()` method. This method must be called
    from the thread on which events are to be processed. You can call it from the
    same thread every time or from different threads; you can use an already existing
    thread or create a dedicated one—it''s all up to you and your needs.


    When the method is called, one event from the first controller in the makeshift
    queue will be processed. After that, the first controller will be moved to the
    back of the queue and the second controller will take its place, and so forth.
    This rotational approach provides a quick and effective way to make sure all controllers
    receive relatively equal attention.


    As for which thread the `processNextEvent()` should be called from and how, that
    is entirely up to you and your application. The framework does provide a quick
    and easy solution that works great in 90% of the cases. It will be discussed in
    the section dedicated to the `core` package. However, you are not obligated to
    use it—feel free to design and implement your own mechanism if you want to or
    need to.


    `EventControllerManager` is presented in [Listing 2–12](#Chapter02.html#list_2_12).


    **Listing 2–12.** *The `EventControllerManager` Class*


    `package com.apress.framework.common;`


    `import com.apress.framework.objecttypes.Manager;`

    `import java.util.Vector;`


    `public class EventControllerManager implements Manager`

    `{`

    `    public Vector controllers = new Vector(10,10);`


    `    public boolean assign(Object object)`

    `    {`

    `        if ( object instanceof EventController)`

    `        {`

    `            if ( ! controllers.contains(object) )`

    `            {`

    `                controllers.addElement(object);`

    `            }`

    `            return true;`

    `        }`

    `        else`

    `        {`

    `            return false;`

    `        }`

    `    }`


    `    public void unassign(Object object)`

    `    {`

    `        controllers.removeElement(object);`

    `    }`


    `    public boolean isManaging(Object object)`

    `    {`

    `        return ( controllers.indexOf(object) > -1 );`

    `    }`


    `    public void processNextEvent()`

    `    {`

    `        if ( controllers.size() > 0 )`

    `        {`

    `            EventController controller = (EventController) controllers.firstElement();`

    `            controllers.removeElement(controller);`

    `            controller.processNextEvent();`

    `            controllers.addElement(controller);`

    `        }`

    `    }`


    `    public boolean hasMoreEvents()`

    `    {`

    `        return currentEventCount() > 0;`

    `    }`


    `    public int currentEventCount()`

    `    {`

    `        Enumeration controllerEnum = controllers.elements();`

    `        EventController temp = null;`

    `        int count = 0;`

    `        while ( controllerEnum.hasMoreElements() )`

    `        {`

    `            temp = (EventController) controllerEnum.nextElement() ;`

    `            if ( temp.hasMoreEvents() )`

    `            {`

    `                count += temp.currentEventCount();`

    `            }`

    `        }`

    `        return count;`

    `    }`

    `}`


    Now it''s time to move on to the next package: `com.apress.framework.core`.


    ### Core Objects and Classes


    This package can be considered the heart of the framework, being responsible for
    gluing everything together and making sure that the application has access to
    everything it needs. We will discuss the `Application` class, the `EventManagerThreads`
    class, and the `Bootstrap` class.


    #### The Application Class


    With the foregoing in mind, the most important part of the `core` package is the
    `Application` class. It provides access to the main event controller, to the main
    event controller manager (which, by default, is *not* linked to the main event
    controller), to the MIDlet instance, to the display instance, and to pretty much
    everything else that is high-level or critical and might need to be accessible
    from within the application code.


    A simple implementation of the `Application` class is presented in [Listing 2–13](#Chapter02.html#list_2_13).
    As you adapt the framework to the particular project you are working on, you will
    most likely modify this class to suit your needs.


    **Listing 2–13.** *The `Application` Class*


    `package com.apress.framework.core;`


    `import com.apress.framework.common.EventController;`

    `import com.apress.framework.common.EventControllerManager;`

    `import com.apress.framework.objecttypes.View;`

    `import javax.microedition.lcdui.Display;`

    `import javax.microedition.midlet.MIDlet;`


    `public class Application`

    `{`

    `    static EventController mainEventController = new EventController();`

    `    static EventControllerManager manager = new EventControllerManager();`

    `    static MIDlet midlet = null ;`


    `    protected Application()`

    `    {`

    `        // Do nothing`

    `    }`


    `    public static void showView(View view)`

    `    {`

    `        getDisplay().setCurrent(view.getCanvas());`

    `        view.refresh();`

    `    }`


    `    public static void init(MIDlet instance)`

    `    {`

    `        midlet = instance;`

    `        manager.assign(mainEventController);`

    `    }`


    `    public static EventController getMainEventController()`

    `    {`

    `        return mainEventController;`

    `    }`


    `    public static EventControllerManager getMainEventControllerManager()`

    `    {`

    `        return manager;`

    `    }`


    `    public static MIDlet getMIDlet()`

    `    {`

    `        return midlet;`

    `    }`


    `    public static Display getDisplay()`

    `    {`

    `        return Display.getDisplay(midlet);`

    `    }`

    `}`'
