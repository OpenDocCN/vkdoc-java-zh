- fmt: '### Summary


    In this chapter, you have examined the core areas of Java ME application testing:
    gathering debug information, unit testing, visual debugging, and thoroughly testing
    the application in all possible usage scenarios and environments. In the process,
    you have looked at some of the interesting aspects that Java ME brings to the
    table (for example, buggy JVMs, varied form factors, and different usage scenarios
    for different devices) and how these aspects should be covered in the testing
    process. In the next chapter, you will cover advanced Java ME graphics and learn
    a few graphical techniques useful for Java ME development.


    ## Chapter 13


    ## Advanced Java ME Graphics


    Traditionally, graphics have never been one of Java ME’s strong points. Conceived
    in the early days of mobile computing as we know it today, Java ME’s main goal
    was to run on as many devices as possible, and that meant that compromises had
    to be made. One of those compromises was the limitation of displaying graphics
    by using only an extremely limited 2D API.


    **NOTE:** Although in recent years Java ME itself has also received support for
    3D graphics, the vast majority of devices out there still have to make do with
    the very limited 2D graphics API either because their JVMs don’t include 3D support
    or because their real-world 3D performance is abysmal. Furthermore, 3D support
    in Java ME is suitable only for games, and is itself quite limited.


    This was fine at first, but with the advent of smartphones and their subsequent
    increase in popularity, Java ME applications have found themselves competing against
    applications that were written with much more powerful graphics APIs and that
    thus looked considerably better.


    Fortunately, while the Java ME graphics API has remained largely unchanged for
    many years, Java ME devices have evolved and now have more graphics and CPU power
    than ever. This makes it possible to supplement the existing graphics capabilities
    by writing custom graphical routines and by using clever tricks and techniques
    that were not feasible only a few years ago. As such, amazing-looking Java ME
    applications are no longer a thing of the past—they are possible today.


    In this chapter, you will examine some of the most important tricks and techniques
    related to Java ME graphics programming. Mastering them will allow you to create
    amazing visuals for your Java ME applications, which will instantly appeal to
    users and put you miles ahead of the competition.


    Before we begin, it should be noted that some of the techniques presented in this
    chapter depend on MIDP 2.0 features, such as `Image.getRGB()`. Unfortunately,
    this means that they cannot be used on MIDP 1.0 devices. However, it should be
    noted that MIDP 1.0 devices are typically not fast enough for the job anyway.


    Another important mention is related to performance. The code snippets presented
    in this chapter are written with clarity rather than speed in mind. As such, their
    performance is considerably less than optimal. By using the techniques presented
    in [Chapter 10](#Chapter10.html#ch10), the code performance can be improved considerably.
    In fact, optimizing these routines is probably one of the best exercises for the
    techniques presented in [Chapter 10](#Chapter10.html#ch10), as it gives you the
    opportunity to try out most of them.


    ### Using Pre-rendered Graphics


    Unless you’re targeting really low-end devices, chances are that the maximum JAR
    file size for your target devices is a considerably larger number than your actual
    JAR file size. In other words, you usually have plenty of room to spare—so why
    not use it? One of the best uses for those extra available bytes is storing *pre-rendered
    graphics* for your application (for example, UI elements, fonts, and animation
    frames). This makes perfect sense; why stress your device by drawing graphics
    dynamically at runtime when you can simply pre-render those graphics? In addition,
    pre-rendered graphics are usually of a much higher quality than real-time or dynamically
    generated graphics, in the same way that a 3D feature film looks better than a
    video game.


    The first things you should try to pre-render are UI elements. For fixed-sized
    elements, such as check boxes, you can simply render separate images for their
    individual states (for example, pressed, focused, checked, unchecked, disabled,
    checked and disabled) and then draw those images directly on the screen/canvas
    in the `paint()` method. This is extremely simple to do, and the results look
    great.


    For variable-sized elements, things are a bit more complicated. The main idea
    here is to use a technique known as *patching*: you divide the element into two
    or more patches, some of which are fixed and some of which are tileable. You then
    assemble these patches to make up the image of your desired element in the size
    you want it to have. For example, let’s suppose you want to draw an element that
    can be abstractly defined as a rounded box, such as a button or a dialog box.
    [Figure 13–1](#Chapter13.html#fig_13_1) shows a possible patch configuration for
    this element.


    ![images](images/1301.jpg)


    **Figure 13–1.** *Patch configuration for a rounded box*


    You can clearly see that the four corner patches are fixed. At the same time,
    the other two patches, which make up the horizontal and vertical borders of the
    box, are tiled: they are repeated as many times as needed to cover the distance
    between the corners. Depending on the requirements, more patches can be added—for
    example, if the top and bottom borders are different or if you want the borders
    to follow a more intricate pattern (in which case you would alternate the corresponding
    pattern patches).


    You can also use pre-rendered images to store UI animations that would otherwise
    be time-consuming or even impossible to do on the fly. This is pretty much the
    same technique used in sprite-based games, only in this case the animated sprite
    is maybe a button’s background or an e-mail notification icon or a loading bar.
    These animations are fine details that are extremely important for Java ME applications,
    because they give the interface a more natural and “flowing” look, similar to
    the one you would find on desktops or on smartphones (for example, a button gradually
    “lighting up” when the cursor/pointer hovers over it instead of immediately switching
    to the “focused” state).


    Taking this idea further, pre-rendered images are also a great way to create application
    themes. Changing how your UI elements look becomes a simple matter of using a
    different image file; no code has to be changed in the process.


    There are also a lot of other small graphical elements that you can pre-render
    for better performance and a sleeker look. For example, in a line chart, the various
    segments are typically delimited with some kind of bullet. Rather than draw these
    bullets in real time by using low-level drawing functions (for example, `fillArc()`
    ), you can pre-render them. This will not only be faster (typically), it will
    also look better because you can, for example, pre-render them with semitransparent
    pixels around the edges so that they look smoother.'
