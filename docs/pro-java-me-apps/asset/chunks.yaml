    如果需要存储大量数据（例如数据库），基于文件系统的持久化通常是**最佳选择**，但需注意随之而来的安全与隐私影响。基于文件系统的持久化在多种非传统场景中也十分有用。例如，某些设备支持挂载
    U 盘、硬盘甚至其他手机作为外部文件系统。在这些设备上，你可以利用基于文件系统的持久化来备份应用数据、轻松在设备间迁移设置等。


    基于云的持久化应始终作为可选方案，且应仅用于存储少量数据（如偏好设置、密码等）以降低成本。唯一的例外是那些本质上依赖互联网的应用（如浏览器、流媒体客户端）。在这些情况下，你可以依赖云持久化存储更多信息（如头像图片、文本笔记），因为无论采用何种持久化方法，这类应用本身就会产生大量流量。


    ### 设计持久化模块


    设计并实现一个优秀的持久化模块需要仔细考量。最佳方法是采用**自上而下**的方式：从 RMS、文件系统或云的高层抽象入手，逐步深入到构成数据类型的字节层面。


    最终通常会形成如图 5–1 所示的三层架构。


    ![images](img/0501.jpg)


    **图 5–1.** *持久化模块架构*


    持久化提供者位于顶层，以记录形式向`RecordReaders`提供数据，并从`RecordWriters`接收数据（同样以记录形式）。


    `RecordWriters`和`RecordReaders`是应用程序其余部分用于读写持久化数据的接口，可直接使用或通过辅助工具调用。为完成工作，`RecordWriters`和`RecordReaders`需依赖`Serializers`和`Deserializers`将内存对象转换为独立表示形式，反之亦然。


    模块其余部分主要由辅助工具组成，用于简化持久化模块的整体使用，使开发者免于编写繁琐、重复且易出错的代码。虽然并非严格必需，但由于其带来的便利性，这些工具在应用中广泛使用——事实上，大多数持久化相关操作通常通过辅助工具完成，而非直接使用读写器和提供者。


    为更好理解上述内容，我们需要详细剖析构成持久化模块的主要组件。先从持久化提供者开始。


    #### 持久化提供者


    如前所述，提供者位于持久化金字塔的顶层。它们负责为模块其他部分提供存储和检索原始持久化数据的手段。RMS 和文件系统是典型的持久化提供者，网络层（用于基于云的持久化，适用时）也是如此。


    所有持久化提供者都基于记录工作。记录本质上是一系列字节（字节数组），通过唯一索引号标识。持久化提供者不关心每条记录中的数据代表什么、应如何解释，也不关心数据是否有意义或只是垃圾数据；它们的任务仅在于检索、创建、覆盖和删除记录。


    为与实际使用场景保持一致，每个持久化提供者在使用前必须“打开”，使用后必须“关闭”。提供者还需在必要时提供刷新缓存数据（如有）的方法。


    基于以上考虑，所有持久化提供者必须实现清单 5–1 所示的接口。


    **清单 5–1.** *`PersistenceProvider`接口*


    `package app.module.persistence.classes;`


    `public interface PersistenceProvider`

    `{`

    `    public byte[] getRecord(int index);`

    `    public int createRecord(byte [] data);`

    `    public boolean overwriteRecord(int index, byte [] data);`

    `    public boolean deleteRecord(int index);`

    `    public boolean open();`

    `    public void flush();`

    `    public void close();`

    `}`


    观察`createRecord()`方法，你会发现无法直接指定新记录的索引。相反，调用该方法时会创建一个新记录，并返回其对应的索引。


    这种方式提供了更高的抽象层级，但同时也增加了追踪信息位置的复杂性（例如，如何知道包含当前用户登录凭据的记录索引？）。克服这一缺点的有效策略是让第一条记录充当目录，记录提供者中每条具体信息的位置——我们稍后将探讨具体实现方法。'
- fmt: "### RecordReaders and RecordWriters\n\nAs far as providers are concerned,\
    \ records are nothing more than byte arrays. This means that, in order to store\
    \ and retrieve data using them, we must first give meaning to the raw bytes that\
    \ make up each record.\n\nWe can achieve this easily by defining that, on a logical\
    \ level, each record will represent a series of primitive values (integers, strings,\
    \ etc.) serialized together according to a predefined encoding.\n\nFor example,\
    \ consider the following series: the integer `123456` followed by the string `\"\
    Hello, how are you?\"` followed by the Boolean `\"false\"`. If we were to choose\
    \ a simple `getBytes()`–based encoding, which simply retrieves the raw bytes that\
    \ make up each primitive, the first four bytes in the resulting record would encode\
    \ the integer (since a Java integer is four bytes long), the next 19 would encode\
    \ the string, and the next byte after that the Boolean.\n\n**NOTE:** The high-level\
    \ meaning behind the values is entirely up to the application. For example, a\
    \ \"string, string, string\" record may represent a person's full name (first\
    \ + middle + last name) or login credentials (username, password, and e-mail).\
    \ It is up to the application to know what any given record represents and to\
    \ interpret said record properly.\n\nThis encoding scheme is simple and works\
    \ remarkably well in practice, so we will use it in our project. However, sometimes\
    \ encoding schemes can be considerably more complex.\n\nFor example, if we were\
    \ to choose to encode our data using XML, then the series must be first be serialized\
    \ into an XML-valid string, something like `\"<record><int>123456</int><string>Hello,\
    \ how are you?</string><boolean>true</boolean></record>\"`. It is this string\
    \ that must be converted to bytes and stored in the record.\n\nUsing such encoding\
    \ schemes makes sense in many scenarios—for example, if your application employs\
    \ a cloud-based persistence provider. In this case, since it is likely that the\
    \ persistent data will also be accessed by non-Java applications (web-based clients,\
    \ statistical software, etc.), storing it in a universal format like XML or JSON\
    \ makes inter-application data sharing easier and safer in the long run.\n\nAs\
    \ for what constitutes a primitive data type, this again varies from application\
    \ to application. For example, we will consider only integers, longs, bytes, strings,\
    \ and Booleans as being primitives, but other applications might consider vectors\
    \ and images as being primitive data types too.\n\n**NOTE:** Of course, you could\
    \ represent images as a series of byte primitives and retrieve said bytes one\
    \ by one from the record. However, this would require a lot of time and method\
    \ calls, so it is better to just consider images as stand-alone primitive data\
    \ types if you need to persist them. The same is true for vectors and other more\
    \ complex data types.\n\nThe raw bytes of a record are never directly manipulated\
    \ by the application. Instead, the persistence module provides `RecordReader`s\
    \ and `RecordWriter`s to handle the decoding and encoding of primitives within\
    \ a record. A reader/writer pair must exist for every encoding scheme that the\
    \ application will use.\n\nThe `RecordWriter` interface is presented in [Listing\
    \ 5–2](#Chapter05.html#list_5_2), while its concrete implementation for our project\
    \ will be given later in the chapter.\n\n**Listing 5–2.** *The `RecordWriter`\
    \ Interface*\n\n```\npackage app.module.persistence.classes;\n\npublic interface\
    \ RecordWriter\n{\n    public void writeInt ( int value );\n    public void writeLong\
    \ ( long value );\n    public void writeString ( String value );\n    public void\
    \ writeBoolean ( boolean value ) ;\n    public void writeByte( byte value );\n\
    \    public void reset();\n    public byte[] getCurrentResult();\n}\n```\n\nEach\
    \ writer starts out with an empty record. As the `writeXXX()` methods are called,\
    \ primitive values are added to the record, one after another. At any point, one\
    \ may call `getCurrentResult()` to obtain a valid byte-array representation of\
    \ the current record. This representation can then be passed along to a `PersistenceProvider`\
    \ for storage. You can always `reset()` the writer, which will return it to its\
    \ initial empty-record state.\n\n**TIP:** A `RecordWriter` is free to use any\
    \ internal representation it wishes for its data (for example, a `Vector` of `Object`s\
    \ or a linked list), as long as `getCurrentResult()` returns what is expected.\
    \ Use this to your advantage and see if you can find alternate representations\
    \ that save memory and/or CPU cycles.\n\nA `RecordReader` does the converse process:\
    \ it reads bytes from a record and turns them into primitive values. The `RecordReader`\
    \ interface is presented in [Listing 5–3](#Chapter05.html#list_5_3), with its\
    \ actual implementation also given later in the chapter.\n\n**Listing 5–3.** *The\
    \ `RecordReader` Interface*\n\n```\npackage app.module.persistence.classes;\n\n\
    public interface RecordReader\n{\n    public int readInt();\n    public long readLong();\n\
    \    public String readString();\n    public boolean readBoolean();\n    public\
    \ byte readByte();\n}\n```\n\nTo deserialize the example \"Hello, how are you?\"\
    \ record mentioned earlier, one would have to call `readInt()`, `readString()`,\
    \ and `readBoolean()` in sequence. Note that it is the application's responsibility\
    \ to call the `readXXX()` methods in the right order. For example, if the application\
    \ calls `readInt()` when the next primitive value in the record is a string, the\
    \ results are undefined."
  raw: '#### RecordReaders and RecordWriters


    As far as providers are concerned, records are nothing more than byte arrays.
    This means that, in order to store and retrieve data using them, we must first
    give meaning to the raw bytes that make up each record.


    We can achieve this easily by defining that, on a logical level, each record will
    represent a series of primitive values (integers, strings, etc.) serialized together
    according to a predefined encoding.


    For example, consider the following series: the integer `123456` followed by the
    string“`Hello, how are you?`”followed by the Boolean“`false`”. If we were to choose
    a simple `getBytes()`–based encoding, which simply retrieves the raw bytes that
    make up each primitive, the first four bytes in the resulting record would encode
    the integer (since a Java integer is four bytes long), the next 19 would encode
    the string, and the next byte after that the Boolean.


    **NOTE:** The high-level meaning behind the values is entirely up to the application.
    For example, a “string, string, string” record may represent a person''s full
    name (first + middle + last name) or login credentials (username, password, and
    e-mail). It is up to the application to know what any given record represents
    and to interpret said record properly.


    This encoding scheme is simple and works remarkably well in practice, so we will
    use it in our project. However, sometimes encoding schemes can be considerably
    more complex.


    For example, if we were to choose to encode our data using XML, then the series
    must be first be serialized into an XML-valid string, something like “`<record><int>123456</int><string>Hello,
    how are you?</string><boolean>true</boolean></record>`”. It is this string that
    must be converted to bytes and stored in the record.


    Using such encoding schemes makes sense in many scenarios—for example, if your
    application employs a cloud-based persistence provider. In this case, since it
    is likely that the persistent data will also be accessed by non-Java applications
    (web-based clients, statistical software, etc.), storing it in a universal format
    like XML or JSON makes inter-application data sharing easier and safer in the
    long run.


    As for what constitutes a primitive data type, this again varies from application
    to application. For example, we will consider only integers, longs, bytes, strings,
    and Booleans as being primitives, but other applications might consider vectors
    and images as being primitive data types too.


    **NOTE:** Of course, you could represent images as a series of byte primitives
    and retrieve said bytes one by one from the record. However, this would require
    a lot of time and method calls, so it is better to just consider images as stand-alone
    primitive data types if you need to persist them. The same is true for vectors
    and other more complex data types.


    The raw bytes of a record are never directly manipulated by the application. Instead,
    the persistence module provides `RecordReader`s and `RecordWriter`s to handle
    the decoding and encoding of primitives within a record. A reader/writer pair
    must exist for every encoding scheme that the application will use.


    The `RecordWriter` interface is presented in [Listing 5–2](#Chapter05.html#list_5_2),
    while its concrete implementation for our project will be given later in the chapter.


    **Listing 5–2.** *The `RecordWriter` Interface*


    `package app.module.persistence.classes;`


    `public interface RecordWriter`

    `{`

    `    public void writeInt ( int value );`

    `    public void writeLong ( long value );`

    `    public void writeString ( String value );`

    `    public void writeBoolean ( boolean value ) ;`

    `    public void writeByte( byte value );`

    `    public void reset();`

    `    public byte[] getCurrentResult();`

    `}`


    Each writer starts out with an empty record. As the `writeXXX()` methods are called,
    primitive values are added to the record, one after another. At any point, one
    may call `getCurrentResult()` to obtain a valid byte-array representation of the
    current record. This representation can then be passed along to a `PersistenceProvider`
    for storage. You can always `reset()` the writer, which will return it to its
    initial empty-record state.


    **TIP:** A `RecordWriter` is free to use any internal representation it wishes
    for its data (for example, a `Vector` of `Object`s or a linked list), as long
    as `getCurrentResult()` returns what is expected. Use this to your advantage and
    see if you can find alternate representations that save memory and/or CPU cycles.


    A `RecordReader` does the converse process: it reads bytes from a record and turns
    them into primitive values. The `RecordReader` interface is presented in [Listing
    5–3](#Chapter05.html#list_5_3), with its actual implementation also given later
    in the chapter.


    **Listing 5–3.** *The `RecordReader` Interface*


    `package app.module.persistence.classes;`


    `public interface RecordReader`

    `{`

    `    public int readInt();`

    `    public long readLong();`

    `    public String readString();`

    `    public boolean readBoolean();`

    `    public byte readByte();`

    `}`


    To deserialize the example “Hello, how are you?” record mentioned earlier, one
    would have to call `readInt()`, `readString()`, and `readBoolean()` in sequence.
    Note that it is the application''s responsibility to call the `readXXX()` methods
    in the right order. For example, if the application calls `readInt()` when the
    next primitive value in the record is a string, the results are undefined.'
  trans: '

    #### 记录读取器与记录写入器


    对于提供者而言，记录不过是字节数组。这意味着，要使用它们来存储和检索数据，我们必须首先赋予构成每条记录的原始字节以意义。


    我们可以通过以下方式轻松实现这一点：在逻辑层面上，定义每条记录代表一系列根据预定义编码序列化在一起的原始值（整数、字符串等）。


    例如，考虑以下序列：整数 `123456`，后跟字符串“`Hello, how are you?`”，再后跟布尔值“`false`”。如果我们选择一种简单的基于
    `getBytes()` 的编码方式（即直接检索构成每个原始值的原始字节），那么结果记录中的前四个字节将编码该整数（因为 Java 整数长度为四个字节），接下来的
    19 个字节将编码该字符串，再接下来的一个字节将编码该布尔值。


    **注意：** 这些值背后的高级含义完全取决于应用程序。例如，一个“字符串、字符串、字符串”的记录可能代表一个人的全名（名 + 中间名 + 姓）或登录凭据（用户名、密码和电子邮件）。应用程序需要知道任何给定记录代表什么，并正确解释该记录。


    这种编码方案很简单，在实践中效果非常好，因此我们将在项目中使用它。然而，有时编码方案可能会复杂得多。


    例如，如果我们选择使用 XML 对数据进行编码，那么该序列必须首先被序列化为一个有效的 XML 字符串，类似于“`<record><int>123456</int><string>Hello,
    how are you?</string><boolean>true</boolean></record>`”。正是这个字符串需要被转换为字节并存储在记录中。


    在许多场景下，使用此类编码方案是有意义的——例如，如果你的应用程序使用基于云的持久化提供者。在这种情况下，由于持久化数据很可能也会被非 Java 应用程序（基于
    Web 的客户端、统计软件等）访问，从长远来看，将其存储为 XML 或 JSON 等通用格式会使应用程序间的数据共享更简单、更安全。


    至于什么构成原始数据类型，这同样因应用程序而异。例如，我们只将整数、长整数、字节、字符串和布尔值视为原始类型，但其他应用程序可能将向量和图像也视为原始数据类型。


    **注意：** 当然，你可以将图像表示为一串字节原始值，并从记录中逐个检索这些字节。然而，这会花费大量时间和方法调用，因此如果你需要持久化图像，最好将其视为独立的原始数据类型。对于向量和其他更复杂的数据类型也是如此。


    记录的原始字节永远不会由应用程序直接操作。相反，持久化模块提供了 `RecordReader` 和 `RecordWriter` 来处理记录中原始值的解码和编码。应用程序使用的每种编码方案都必须存在一个读取器/写入器对。


    `RecordWriter` 接口如清单 5–2 所示，其针对我们项目的具体实现将在本章后面给出。


    **清单 5–2.** *`RecordWriter` 接口*


    `package app.module.persistence.classes;`


    `public interface RecordWriter`

    `{`

    `    public void writeInt ( int value );`

    `    public void writeLong ( long value );`

    `    public void writeString ( String value );`

    `    public void writeBoolean ( boolean value ) ;`

    `    public void writeByte( byte value );`

    `    public void reset();`

    `    public byte[] getCurrentResult();`

    `}`


    每个写入器都以一个空记录开始。随着 `writeXXX()` 方法被调用，原始值被一个接一个地添加到记录中。在任何时候，都可以调用 `getCurrentResult()`
    来获取当前记录的有效字节数组表示。然后可以将此表示传递给 `PersistenceProvider` 进行存储。你始终可以 `reset()` 写入器，这将使其恢复到初始的空记录状态。


    **提示：** `RecordWriter` 可以自由使用其希望的任何内部表示来存储数据（例如，`Object` 的 `Vector` 或链表），只要 `getCurrentResult()`
    返回预期的结果即可。利用这一点，看看你是否能找到节省内存和/或 CPU 周期的替代表示。


    `RecordReader` 执行相反的过程：它从记录中读取字节并将其转换为原始值。`RecordReader` 接口如清单 5–3 所示，其实际实现也将在本章后面给出。


    **清单 5–3.** *`RecordReader` 接口*


    `package app.module.persistence.classes;`


    `public interface RecordReader`

    `{`

    `    public int readInt();`

    `    public long readLong();`

    `    public String readString();`

    `    public boolean readBoolean();`

    `    public byte readByte();`

    `}`


    要反序列化前面提到的“Hello, how are you?”示例记录，需要依次调用 `readInt()`、`readString()` 和 `readBoolean()`。请注意，应用程序有责任以正确的顺序调用
    `readXXX()` 方法。例如，如果应用程序在记录中的下一个原始值是字符串时调用了 `readInt()`，则结果将是未定义的。

