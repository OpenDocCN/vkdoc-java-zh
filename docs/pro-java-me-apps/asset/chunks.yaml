- fmt: "### Jump-Starting the Application\n\nEvery Java ME application has to be built\
    \ upon the `MIDlet` class. Ours is no different; however, we will use our `MIDlet`\
    \ class only to jump-start the core application framework, associated controllers,\
    \ and other classes. Thus, the `TwitterClient` MIDlet class will look like [Listing\
    \ 8–1](#Chapter08.html#list_8_1).\n\n**Listing 8–1.** *The `TwitterClient` Class*\n\
    \n```\npublic class TwitterClient extends MIDlet\n{\n    public void startApp()\n\
    \    {\n        Application.init(this);\n\n        FlowController flowController\
    \ = new FlowController();\n        SettingsController settingsController = new\
    \ SettingsController();\n        WelcomeScreenController welcomeController = new\
    \ WelcomeScreenController();\n        MainScreenController mainScreenController\
    \ = new MainScreenController();\n        TweetsController tweetsController = new\
    \ TweetsController();\n\n        Application.getMainEventController().registerListener(tweetsController);\n\
    \        Application.getMainEventController().registerListener(flowController);\n\
    \        Application.getMainEventController().registerListener(settingsController);\n\
    \        Application.getMainEventController().registerListener(welcomeController);\n\
    \        Application.getMainEventController().registerListener(mainScreenController);\n\
    \n        Event start = new Event(EVT.CONTEXT.STARTUP,\n        EVT.PROGRAM_FLOW.APPLICATION_START,null);\n\
    \        Application.getMainEventController().queueEvent(start);\n\n        Bootstrap.boot(this,\
    \ 100);\n        }\n\n        ...\n}\n```\n\nThat’s it. We’re done with the `TwitterClient`\
    \ class and also with the native part of our application. From now on, everything\
    \ we do will be exclusively related to our application objects and our framework—no\
    \ more direct native Java ME calls; they are all hidden from the main application\
    \ code. This will not only make our application easier to understand and more\
    \ concise, but also help in any eventual porting effort to other platforms.\n\n\
    Let’s look a bit at what happens here. First, we initialize the framework. Then,\
    \ we create instances of all the controllers we will use in our application. We\
    \ will go into each of them later. Following their creation, the controllers are\
    \ all added as listeners to the main event controller and an `APPLICATION_START`\
    \ event is queued to the main event controller. Finally, the application is booted\
    \ with a 100 ms interval between processing events—more than enough for our needs.\n\
    \n**NOTE:** Throughout this chapter, you will see many references to the `EVT`\
    \ class and to the events defined by it. For clarity and readability, the class\
    \ will be shown in full at the end of the chapter—and only then.\n\nNow, let’s\
    \ see what happens next. The key to initializing the application lies in the `APPLICATION_START`\
    \ event. Let’s see where it is handled—and how.\n\n### Implementing the FlowController\n\
    \nThis controller is responsible for handling all major events that affect the\
    \ application’s flow and/or life cycle. These include the application being started\
    \ up or exited, the device running out of memory or being unable to execute a\
    \ critical command, etc. Of course, more than one controller can respond to these\
    \ events (and more than one typically does), but the `FlowController` is responsible\
    \ for doing the general and non-module-specific event handling.\n\nFor a concrete\
    \ example, you will see that both the `FlowController` and the `TweetsController`\
    \ respond to the `APPLICATION_START` event. However, while the `TweetsController`\
    \ does tweet-specific stuff (like creating and initializing a `ServerImplementation`\
    \ instance), the `FlowController` does more generic stuff, like loading the appropriate\
    \ locale based on the user’s preferences, if any.\n\nThe code for the `FlowController`\
    \ class is shown in [Listing 8–2](#Chapter08.html#list_8_2).\n\n**Listing 8–2.**\
    \ *The `FlowController` Class*\n\n```\npackage app.controller;\n\nimport app.classes.Defaults;\n\
    ...\n\npublic class FlowController implements Controller, EventListener\n{\n\n\
    \    public boolean handleEvent(Event event)\n    {\n\n        if (EVT.PROGRAM_FLOW.APPLICATION_START\
    \ == event.getType())\n        {\n            // Load the user's locale, if any\n\
    \            String locale = null;\n            byte[] data = Defaults.persistenceHelper.getRecord(\n\
    \            Defaults.DEFAULT_LOCALE_RECORD_NAME);\n            if (data != null)\n\
    \            {\n                ByteRecordReader reader = new ByteRecordReader(data);\n\
    \                locale = reader.readString();\n            }\n            Locale.loadFromFileBasedOnPreferences(locale,\
    \ Defaults.DEFAULT_LOCALE);\n\n            // Show the welcome form\n        \
    \    Event showWelcome = new Event(EVT.CONTEXT.STARTUP,\n            EVT.PROGRAM_FLOW.SHOW_WELCOME_SCREEN,\
    \ null);\n            Application.getMainEventController().queueEvent(showWelcome);\n\
    \n            return true;\n\n        } else if (EVT.PROGRAM_FLOW.APPLICATION_EXIT\
    \ == event.getType())\n        {\n            Defaults.persistenceHelper.close();\n\
    \            Application.exit();\n        } else if ( EVT.PROGRAM_FLOW.INITIATE_SHUTDOWN\
    \ == event.getType() )\n        {\n                Event shutdown = new Event(EVT.CONTEXT.SETTINGS_FORM,\n\
    \                EVT.PROGRAM_FLOW.APPLICATION_PREPARE_SHUTDOWN, null);\n     \
    \           Application.getMainEventController().queueEvent(shutdown);\n\n   \
    \             shutdown = new Event(EVT.CONTEXT.SETTINGS_FORM,\n              \
    \  EVT.PROGRAM_FLOW.APPLICATION_EXIT, null);\n                Application.getMainEventController().queueEvent(shutdown);\n\
    \                return true;\n        }\n\n        return false;\n    }\n}\n\
    ```\n\nYou can see from the code that our `FlowController` currently handles only\
    \ three events: `APPLICATION_START`, `INITIATE_SHUTDOWN`, and `APPLICATION_EXIT`,\
    \ with the last two closely linked together.\n\nIn handling `APPLICATION_START`,\
    \ we first try to see if a preferred user locale is set and, if so, we attempt\
    \ to load it (even if the attempt fails, the default locale will still get loaded).\
    \ Following that, we issue a `SHOW_WELCOME_SCREEN` event, which will result in\
    \ the welcome screen (or form, if you prefer) being shown. This event is handled\
    \ inside the `WelcomeScreenController`.\n\nAs a side note, you should always switch\
    \ screens via events, and never directly. This not only allows other parts of\
    \ the application to respond to the screen switching (for example, by reloading\
    \ key configuration options when the settings screen is left), but also minimizes\
    \ the possibility of race conditions, thread deadlocking, and various UI glitches\
    \ and issues. In the case that these do happen, using events typically makes debugging\
    \ easier and faster, as it becomes pretty clear what action happens where, and\
    \ the code fragments themselves are usually small."
  raw: '### Jump-Starting the Application


    Every Java ME application has to be built upon the `MIDlet` class. Ours is no
    different; however, we will use our `MIDlet` class only to jump-start the core
    application framework, associated controllers, and other classes. Thus, the `TwitterClient`
    MIDlet class will look like [Listing 8–1](#Chapter08.html#list_8_1).


    **Listing 8–1.** *The `TwitterClient` Class*


    `public class TwitterClient extends MIDlet`

    `{`

    `    public void startApp()`

    `    {`

    `        Application.init(this);`


    `        FlowController flowController = new FlowController();`

    `        SettingsController settingsController = new SettingsController();`

    `        WelcomeScreenController welcomeController = new WelcomeScreenController();`

    `        MainScreenController mainScreenController = new MainScreenController();`

    `        TweetsController tweetsController = new TweetsController();`


    `        Application.getMainEventController().registerListener(tweetsController);`

    `        Application.getMainEventController().registerListener(flowController);`

    `        Application.getMainEventController().registerListener(settingsController);`

    `        Application.getMainEventController().registerListener(welcomeController);`

    `        Application.getMainEventController().registerListener(mainScreenController);`


    `        Event start = new Event(EVT.CONTEXT.STARTUP,`

    `        EVT.PROGRAM_FLOW.APPLICATION_START,null);`

    `        Application.getMainEventController().queueEvent(start);`


    `        Bootstrap.boot(this, 100);`

    `        }`


    `        ...`

    `}`


    That’s it. We’re done with the `TwitterClient` class and also with the native
    part of our application. From now on, everything we do will be exclusively related
    to our application objects and our framework—no more direct native Java ME calls;
    they are all hidden from the main application code. This will not only make our
    application easier to understand and more concise, but also help in any eventual
    porting effort to other platforms.


    Let’s look a bit at what happens here. First, we initialize the framework. Then,
    we create instances of all the controllers we will use in our application. We
    will go into each of them later. Following their creation, the controllers are
    all added as listeners to the main event controller and an `APPLICATION_START`
    event is queued to the main event controller. Finally, the application is booted
    with a 100 ms interval between processing events—more than enough for our needs.


    **NOTE:** Throughout this chapter, you will see many references to the `EVT` class
    and to the events defined by it. For clarity and readability, the class will be
    shown in full at the end of the chapter—and only then.


    Now, let’s see what happens next. The key to initializing the application lies
    in the `APPLICATION_START` event. Let’s see where it is handled—and how.


    ### Implementing the FlowController


    This controller is responsible for handling all major events that affect the application’s
    flow and/or life cycle. These include the application being started up or exited,
    the device running out of memory or being unable to execute a critical command,
    etc. Of course, more than one controller can respond to these events (and more
    than one typically does), but the `FlowController` is responsible for doing the
    general and non-module-specific event handling.


    For a concrete example, you will see that both the `FlowController` and the `TweetsController`
    respond to the `APPLICATION_START` event. However, while the `TweetsController`
    does tweet-specific stuff (like creating and initializing a `ServerImplementation`
    instance), the `FlowController` does more generic stuff, like loading the appropriate
    locale based on the user’s preferences, if any.


    The code for the `FlowController` class is shown in [Listing 8–2](#Chapter08.html#list_8_2).


    **Listing 8–2.** *The `FlowController` Class*


    `package app.controller;`


    `import app.classes.Defaults;`

    `...`


    `public class FlowController implements Controller, EventListener`

    `{`


    `    public boolean handleEvent(Event event)`

    `    {`


    `        if (EVT.PROGRAM_FLOW.APPLICATION_START == event.getType())`

    `        {`

    `            // Load the user''s locale, if any`

    `            String locale = null;`

    `            byte[] data = Defaults.persistenceHelper.getRecord(`

    `            Defaults.DEFAULT_LOCALE_RECORD_NAME);`

    `            if (data != null)`

    `            {`

    `                ByteRecordReader reader = new ByteRecordReader(data);`

    `                locale = reader.readString();`

    `            }`

    `            Locale.loadFromFileBasedOnPreferences(locale, Defaults.DEFAULT_LOCALE);`


    `            // Show the welcome form`

    `            Event showWelcome = new Event(EVT.CONTEXT.STARTUP,`

    `            EVT.PROGRAM_FLOW.SHOW_WELCOME_SCREEN, null);`

    `            Application.getMainEventController().queueEvent(showWelcome);`


    `            return true;`


    `        } else if (EVT.PROGRAM_FLOW.APPLICATION_EXIT == event.getType())`

    `        {`

    `            Defaults.persistenceHelper.close();`

    `            Application.exit();`

    `        } else if ( EVT.PROGRAM_FLOW.INITIATE_SHUTDOWN == event.getType() )`

    `        {`

    `                Event shutdown = new Event(EVT.CONTEXT.SETTINGS_FORM,`

    `                EVT.PROGRAM_FLOW.APPLICATION_PREPARE_SHUTDOWN, null);`

    `                Application.getMainEventController().queueEvent(shutdown);`


    `                shutdown = new Event(EVT.CONTEXT.SETTINGS_FORM,`

    `                EVT.PROGRAM_FLOW.APPLICATION_EXIT, null);`

    `                Application.getMainEventController().queueEvent(shutdown);`

    `                return true;`

    `        }`


    `        return false;`

    `    }`

    `}`


    You can see from the code that our `FlowController` currently handles only three
    events: `APPLICATION_START`, `INITIATE_SHUTDOWN`, and `APPLICATION_EXIT`, with
    the last two closely linked together.


    In handling `APPLICATION_START`, we first try to see if a preferred user locale
    is set and, if so, we attempt to load it (even if the attempt fails, the default
    locale will still get loaded). Following that, we issue a `SHOW_WELCOME_SCREEN`
    event, which will result in the welcome screen (or form, if you prefer) being
    shown. This event is handled inside the `WelcomeScreenController`.


    As a side note, you should always switch screens via events, and never directly.
    This not only allows other parts of the application to respond to the screen switching
    (for example, by reloading key configuration options when the settings screen
    is left), but also minimizes the possibility of race conditions, thread deadlocking,
    and various UI glitches and issues. In the case that these do happen, using events
    typically makes debugging easier and faster, as it becomes pretty clear what action
    happens where, and the code fragments themselves are usually small.'
