- fmt: '# Mobile Internet Is Special


    When writing your networking code, never forget that mobile Internet has different
    parameters than home/office Internet. It is slower, so you might want to add timestamps
    to your messages and allow for more lenient timeout intervals than you would for
    a desktop application.


    Timestamps are useful for ensuring that data is processed in sequence and with
    the correct timeframe. For example, if you''re writing a tachometer application
    to monitor the speed of a fleet of cars, it may happen that two readings sent
    one minute apart will arrive to you at the same time due to networking issues.
    In order to calculate the proper acceleration and speed, you must know the time
    at which each reading was *taken*, not the time at which it *arrived* to you.
    Timestamps solve this problem elegantly.


    Timestamps are also useful as data integrity checks. For example, if you know
    that you should receive a new message for every 10 seconds of real time, and two
    of your consecutive messages have timestamps that are 20 seconds apart, then you
    can be fairly sure that a message was dropped somewhere.


    In addition, timestamps are useful for real-time games or other applications that
    can use data interpolation. This is because timestamps allow you to use `UDP`
    instead of `TCP/IP`, thus improving perceived network latency. Sure, `UDP` can
    and probably will drop some messages, but since each message that does come in
    has a timestamp, you can just use that time information to interpolate what happened
    in between.


    Another trait of mobile Internet is that it is generally less reliable than fixed-location
    Internet. As such, having checksums to ensure that you got everything right is
    always a good idea (checksums can sometimes even be used to reconstruct missing
    or garbled data). Checksums can be applied to individual messages or to a sequence
    of messages (to make sure you received all of them and in the correct order).
    Checksums can also be used as a rudimentary anti-tampering mechanism: if the algorithm
    for generating the checksum is unknown to third-parties, or depends on some value(s)
    known only by the parties involved, then any discrepancy between the message''s
    content and its checksum indicates a potential data tampering attempt. This can
    serve as an extra security layer in a world in which free wireless access points
    are commonplace (and unsafe) and in which man-in-the-middle attacks on mobile
    networks (through various means) are not unheard of.


    Finally, connection to the Internet from a mobile device is also considerably
    more expensive for the end user, so if you send a lot of data, try to compress
    it. This reduces not only cost, but also the time needed to transfer information,
    both of which will make your users happy. However, this is done at the expense
    of CPU time, so compressing/decompressing large amounts of data in a short amount
    of time isn''t feasible unless the device has a very powerful CPU.


    # Remember the Limitations of the Devices You''re Targeting


    All mobile devices have networking limitations. Some limitations you are certainly
    aware of, like a device''s maximum throughput (for example, `GPRS` is slower than
    `EDGE`, which is slower than `3G`) and maximum number of simultaneous connections
    (some older devices can handle only two, while others can handle ten or more).
    Other limitations are more obscure, like the time it takes to initiate a new connection
    and low-level protocol support (there are quite a lot of devices that don''t support
    `UDP`; some devices have problems with certain types of `HTTPS` certificates).
    Be aware of all these limitations and design your networking layer accordingly.


    For example, if the device you''re targeting does not support `HTTPS`, then this
    means that you have to encrypt and decrypt sensitive data yourself, which can
    be extremely CPU-intensive. It is also possible that the device you''re targeting
    supports only certain `SSL` certificates—for example, only those that do not contain
    wildcards. This problem can be fixed on the server side—for example, by generating
    a new and compatible certificate—but sometimes this is simply not possible for
    a variety of reasons (some technical, some business-related). In this case, you
    are again stuck with handling encryption within the application.


    The time it takes to initiate a new connection is important if you connect to
    a lot of IPs—for example, in a peer-to-peer application. If creating a new connection
    takes unusually long or if doing so has other adverse effects (for example, if
    it freezes the application for a second or two), then you should consider reducing
    either the number of connections you use (for example, by using the same connection
    for more than one purpose) or the frequency at which new connections are created.'
