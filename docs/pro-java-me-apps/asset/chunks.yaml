  trans: '

    #### 保持界面简洁


    保持界面简洁与消除用户困惑有一定关联，但本身也应被视为一个目标。与任何应用平台（无论是移动端还是其他平台）一样，保持界面简洁的主要好处当然是更好的用户体验。对大多数用户而言，更简洁的界面更令人愉悦，也更容易使用。


    除此之外，Java ME 还能从保持界面简洁中获得两个“额外”好处。第一个好处是，你可以更好地利用可用的屏幕空间。如果界面过于复杂，在 Java ME 类显示屏上会显得杂乱无章、不够优雅，即便在更高分辨率的显示屏（例如智能手机或台式电脑上的显示屏）上它看起来很棒。第二个好处是，更简洁的界面更容易移植到其他设备和平台，并且在不同的设备和平台上会感觉更一致，从而减少碎片化问题。


    你可以采用几种主要策略来保持界面简洁。如前所述，最简单、最自然的方法是将更复杂的表单和操作拆分为子表单和子操作。你可以通过向导、选项卡式表单，甚至通过链接在一起的常规表单来实现这一点。


    遵循这一点，或者作为一种替代方案，重要的是要认识到信息是有层次的，让用户在输入*浅层*信息之前输入*深层*信息是没有意义的。例如，假设用户的电话号码是注册过程中的一个可选字段，并且用户也可以（可选地）使用该号码接收通知和找回密码。


    错误的处理方式是从一开始就在注册表单上显示所有字段（用户电话号码、“接收通知”复选框、“使用该号码找回密码”复选框）。正确的做法是只在表单上显示一个标题为“添加电话号码”的按钮。按下该按钮后，会显示一个内联的*表单中的表单*来替代它，其中包含上述三个字段。当用户离开子表单时，它会自动隐藏，并被一个“编辑电话详情”按钮取代。通过这样做，你实际上是在询问用户深层信息（“你想用它做什么？”）之前，先询问浅层信息（“你想输入电话号码吗？”）。


    这种分层方法有几个优点。表单永远不会被输入字段淹没，因为在任何给定时间只显示一个*部分*。这意味着你实际上可以拥有非常复杂的表单（例如，在电子商店中输入产品详情），同时这些表单又易于使用和理解。表单内的导航也得到了改进和简化，因为默认情况下，你是在各部分之间导航，而不是在字段之间导航。


    同样与分层策略相关的是，你应该始终研究任何给定操作的最常见参数，如果这样做有意义，就将它们用作默认值，而无需用户显式输入。例如，如果你正在编写一个 FTP
    客户端，很可能在大多数情况下会使用默认端口 21，并且被动模式是一种安全的默认连接模式。因此，“连接到 FTP 服务器”表单将只包含一个用于输入 FTP 服务器地址的输入字段和一个“高级”按钮。按下“高级”按钮会触发显示一个内联子表单，其中包含更改端口号和连接模式（从已提到的默认值更改）所需的输入字段。


    最后，你应该始终只向用户呈现有意义的选项，并隐藏当时不可用的选项。我能想到的最基本的例子是，只要没有复制任何内容，任何菜单中都不应有“粘贴”选项。该选项不应被置灰——它根本就不应该存在。在运行于桌面级显示屏上的桌面级应用的世界里，情况当然有所不同，但在
    Java ME 世界中，显示用户实际上无法使用的选项几乎毫无意义。你最终只会浪费屏幕空间，并造成困惑和挫败感。这在功能丰富的应用中尤其重要，这类应用往往有大量潜在选项，但在任何给定时间只有少数几个是激活的。


    #### 让客户轻松联系到你


    当你的客户遇到问题或有建议时，他们通常希望轻松、快速地告知你。实现这一点的最佳方式是提供一个应用内的联系表单。根据应用的类型，这可以关联到客户的主账户（如果存在的话），也可以是一个简单的表单，应用在其中输入用户的姓名、电子邮件地址以及用户想要发送给你的消息。


    除此之外，在联系表单上，你还可以添加一个或多个客户可以联系到你的电话号码。这在移动设备上尤其有效，因为客户只需选择该号码，应用就会自动发起通话。


    根据消息的类型（错误报告、建议等），你还可以询问用户是否也想提交有意义的应用数据，例如调试日志。应用可以自动为用户执行此操作，这将增加问题得到解决的机会，同时也间接表明你关心你的客户。


    这种紧密的客户关系机制非常有效。它不仅让你随时了解用户可能遇到的任何问题、投诉或建议，还有助于保持客户忠诚度，并提升你作为软件开发者和服务提供商的形象。


    当然，这意味着你需要建立某种基础设施来处理这种沟通流程，并且来自客户的消息实际上会得到及时处理或回复。允许客户提交消息，然后忽略或延迟回复，比一开始就不允许用户提交消息更糟糕。


    此外，还有成本问题，这就是为什么我在本节中使用“*客户*”而不是“用户”这个词的原因。正如本书开头所述，Java ME 应用产生的收入往往低于其他平台的应用。因此，尤其是在直销的情况下，以这种方式支持用户的成本可能不值得。但是，如果你的预算允许，内置客户支持通常会极大地提升客户满意度并改善公司形象。


    最后，客户联系是双向的。如果这样做有意义，你可以在你的应用中实现一个通知系统。每次启动时，应用都会连接到你的服务器，并检索一种*每日消息*（如果存在的话）。这条消息可以是任何内容，从一则笑话或一篇博客文章片段，到与应用更新或可能的服务器停机相关的重要通知。

    '
- fmt: '#### Creating Nonmobile Versions of Your Application


    There is an increasing trend in the mobile world to complement mobile applications
    with web-based or desktop-based versions. For example, your preferred mobile chat
    client may have a web-based version too, syncing chat histories, contact lists,
    and accounts automatically between the two.


    This is a great feature to add to Java ME applications simply because it isn''t
    a common one in the Java ME context. Such a feature can drastically increase awareness
    of your application and user loyalty. Many potential users may be unaware that
    your Java ME application exists, or that it can run on their phone. However, you
    may attract their interest by sporting an “integrated web and mobile experience,
    compatible with all phones—not just smartphones” (this is just an example).


    Furthermore, a web-based version of your product means that potential users may
    simply stumble upon it (either completely on their own or through advertising
    or word of mouth), try it out on the Web, and then decide to install the mobile
    version on their devices. This may occur even though users were not initially
    looking for a mobile version of your product (chat client, e-mail client, and
    so on). What you are actually doing in this case is redirecting users from a high-profile
    and easy-to-target medium (the Web) to a low-profile and harder-to-target medium
    (Java ME applications), which can often be more successful than just targeting
    the low-profile medium in the first place.


    Having nonmobile versions of your application has technical advantages too. Besides
    having a backup of the user''s data, you can simply do some things easier on the
    Web or on the desktop than you can on a mobile device because of increased processing
    power and screen real-estate. In addition, importing data into your application
    might be possible only on the Web or on the desktop—for example, importing images
    in formats other than PNG or JPEG, or importing documents from office suites.
    These can be converted to an application-native format off-device, which can then
    be uploaded to the device via the Web, via Bluetooth, or via direct cable connection,
    for example.


    It is also interesting to note that the nonmobile version of your application
    doesn''t have to be feature-complete. For example, in the case of web-based applications,
    it is usually enough to just have some of the core features functional in order
    to spark the interest of potential users.


    #### Deploying Continuous Application Updates


    One of the most effective ways to keep your users loyal is to deploy small, frequent
    updates instead of large updates every once in a while. This is especially important
    for bug fixes. Many users who are frustrated with one or two bugs will not wait
    months for a new major release of your application that fixes the problems. Instead,
    they will switch to a competing application. By releasing minor releases often,
    even if they include only one or two bug fixes, you create the image of a dynamic
    and constantly updating product, while at the same time making sure your users
    get the fixes they want in a timely fashion.


    If you do decide to go for continuous updates, you must make some preparations
    beforehand. For starters, make sure your distribution channels can handle the
    speed and strain imposed upon them by frequent updates. Make sure your server
    hardware and bandwidth are up to the task, and make sure that the agreements you
    have with third parties (application stores, mostly) have provisions to ensure
    that you can deploy updates quickly.


    At the same time, you must make sure that you have an efficient in-application
    update mechanism. Because of the frequency at which it occurs, you must make sure
    that the update process is as seamless as possible. Ideally, users would just
    confirm that they want to install a new update, and the application would do the
    rest. For instance, the application would open a browser with the URL of the JAD
    file for the new version, which would in turn trigger the system to install the
    new version of the application.


    One thing you have to be very careful of when going with the continuous update
    approach is the quality of each update. Make sure that what the user installs
    on his or her device is working properly and that it doesn''t fix one bug but
    bring up ten new ones. Releasing updates often is not an excuse for not doing
    QA. This may be obvious, but it is also crucial. It takes only one faulty update
    version to scare users away from your application and to tarnish your reputation.


    #### Adding Skin Support


    High-quality Java ME applications are universally built with third-party UI libraries,
    not with the device''s native UI widgets. This means that the look and feel of
    the application will not match the native look and feel of the device, which might
    be an inconvenience for some users.


    To overcome this, you can create multiple skins (or themes) for your application,
    one for each device or platform, with each skin imitating the default native look
    of the device or platform in question. This will make users feel a lot more familiar
    with your application. The imitation doesn''t have to be exact. It''s usually
    enough to keep the same UI layout and just change the color theme and the graphical
    elements (icons, buttons, and so on), while keeping the underlying UI functionality
    and usage pattern intact.


    An alternative to this is to keep the graphical elements intact for all builds
    and to bundle the application with a few built-in color themes, selecting at runtime
    the one that best matches the target device (if the device is in the list of known
    devices). This option is best if your budget is limited or if time is an issue.
    You can even allow users to create their own color themes, thus increasing the
    degree to which they can personalize their experiences.


    Taking this further, you can even implement the option to download skins from
    the Web, just as you would download a new translation. This will keep your application
    fresh and will give users something to come back to every once in a while, even
    if they don''t explicitly need to use your application.


    Taking things even further, skins could also contain different UI layouts and
    UI-related configuration settings (for example, should the scrollbar be always
    visible or shown only when needed), thus creating a completely different UI experience
    for the user. This is not just for show, either. Many people prefer one layout
    over another because it simply fits better with their usage pattern, and some
    layouts are simply better suited for some tasks than others.


    Skinning support is an important part of a great Java ME user experience. It matters
    for aesthetic reasons as well as functional reasons, and being able to give users
    control over how the application looks and feels counts a lot toward the way your
    application is perceived in the market. At the end of the day, users don''t want
    a generic experience; they want something tailor-made for them. Skins are as close
    to this as you can get in the Java ME world.


    Finally, skins can also be used to tailor your product to different classes of
    users. For example, an “advanced user” skin would be geared toward providing quick
    access to all of the application''s functionality, while a “novice user” skin
    would be focused more on eye candy and on guiding the user through the application
    in easy steps, possibly even hiding potentially dangerous options altogether (for
    example, things like the server''s IP and port number in a client-server application).


    Although this sounds great, you should be aware that this level of skinning is
    usually achievable only through code. You can''t really do this with downloadable
    skins without having to deal with a lot of overhead from the skinning system.'
