  trans: '

    棘手之处在于模拟目标平台的更高级功能——例如 Android 的抽屉概念。为此，你很可能需要编写大量自定义组件——遗憾的是，这无法回避。同样，实现特定平台的交互范式（如前面提到的长按弹出上下文菜单）也需要亲自动手，不过一个好的
    UI 框架能极大帮助你将混乱程度降至最低。


    接下来，一个非常有趣的任务是在没有触摸屏、仅配备摇杆的设备上提供标准化的用户体验——这是最常见的情况。Android 模拟在此表现最佳，因为 Android
    的用户界面（与 iOS 不同）设计为也可通过摇杆操作。


    进一步延伸模拟平台用户体验的概念，你还可以且应该模拟目标平台处理错误和通知的方式，以及用户体验的其他方面。例如，作为最佳实践，Android 应用程序需要保存其状态，以便在需要时自动关闭和恢复。真正模拟
    Android 用户体验至少需要部分实现这一行为。例如，当应用程序重新启动时，应显示上次关闭时用户所在的最后一个屏幕。


    除此之外还有另一种选择：尽可能贴近地模拟设备原生用户体验——即用户在 Java ME 环境之外操作手机原生应用时的体验。这很可能需要为每个目标设备编写自定义版本的应用程序（就
    UI 而言），并且很可能需要大量自定义组件编写和皮肤定制。最终结果可能并不完美，因为用户应用于手机原生环境的任何皮肤或主题都不会迁移到你的应用程序中。然而，大多数情况下结果是可以接受的，无论技术用户还是非技术用户，都会因为知道如何使用手机而轻松上手你的应用。


    最后，需要指出的是，如第 6 章后续部分所述，为标准方案创建带有自定义调整的自定义用户体验/界面，在许多场景下仍是一个好主意——例如，在多媒体应用程序中，或希望通过炫酷的
    UI 吸引用户眼球时，或仅仅是为了探索新概念并推动平台发展。然而，对于普通应用程序（例如商业应用），你最好只提供标准且“平淡”的用户体验，让用户能够直观地立即上手。


    ### 为最坏情况做规划


    综合考虑，Java ME 并非一个非常对开发者友好的环境，实践中许多事情可能且确实会出错，从设备碎片化问题到资源不足。这些顾虑在其他移动平台上或多或少不存在，因此你可以像在桌面平台上一样自由开发；但在
    Java ME 上你并没有这种奢侈。


    因此，在项目的每一步都应保持谨慎。与其假设一切顺利并一头扎进去，不如采取更悲观的方法，默认事情可能且将会出错。


    防御性编程就是一个很好的例子，也是开发者最直观的做法：永远不要假设某件事会正确执行，始终处理所有可能的错误，无论其可能性有多小。这不仅意味着捕获所有抛出的异常，还包括检查你正在处理的数据的有效性和一致性。保持悲观和谨慎还意味着不要依赖设备的所有资源和功能都可用；正如我们所见，情况往往并非如此。


    另一个很好的例子来自估算截止日期和人力：在初始估算基础上额外增加 20-30%，以确保安全。你很可能会需要至少一部分额外的时间和人力，如果不需要，那么你就能提前发布——无论哪种情况你都是赢家。如果你不预留额外的时间和人力，最终结果很可能是错过截止日期或发布有缺陷的产品。


    你还应对用户的期望持悲观态度。例如，永远不要假设用户会对当前提供的功能和用户体验感到满意，因此你应该不断思考合理且可行的改进这两个方面的方法。即使最终没有将这些改进纳入当前版本的应用程序，后续版本也可能实现它们。


    此外，正如本书前面所讨论的，永远不要假设用户会对你的应用程序感到熟悉或得心应手。很可能大多数用户会如此，但至少有一部分用户会感到困惑，或者可能无法弄清楚如何访问和使用你应用程序的至少部分功能。对于一个拥有如此多样化用户群的平台来说，这是可以预料的；然而，这仍然是一个劣势。为了尽量减少其负面影响，你应该应用第
    11 章中描述的技巧。

    '
- fmt: '### Determining Your Application’s Limits


    When developing for Java ME, you will frequently run into difficult situations—situations
    to which there is no apparent good solution or to which the solution is not feasible.
    When you do run into these situations, it is important to be able to determine
    if the current course of action is worth pursuing further, if you should try a
    different approach because you have reached the limits of the current one, or
    if it’s time to give up altogether.


    For example, it is important to be able to determine if the current algorithm
    you are using for a given task can be optimized further (to meet performance requirements)
    or if you should just switch to a different algorithm. Unfortunately, there are
    no golden rules for this: your best bet is to follow your instinct and rely on
    your previous experience. What I usually do when I run into these situations is
    to simply say to myself, “I will spend one more day on this problem. If I cannot
    think of a way to improve the current approach, I will try something else.”


    This “know your limits” tip applies to all areas of Java ME development, not just
    to coding. For example, when deciding on the list of devices you wish to support,
    it is important to be able to accurately determine the lower limit in terms of
    specifications. What is the absolute minimum amount of CPU power your application
    needs? What about RAM and screen size? What about APIs?


    Determining these lower limits is never an easy task. If you aim too high, you
    risk losing many potential users who own less powerful devices. At the same time,
    if you aim too low, you may end up not being able to support all the desired devices
    or, worse, crippling the application in order to support low-end devices. Prototyping
    or writing mock code works great here.


    For example, let’s say that you want to know if your application can run on device
    X with respect to CPU power. The first thing you need to do is estimate the number
    of calculations your application will need to do in an average second. This may
    sound hard, but it’s just a matter of listing all the things that your application
    can do at any given time, estimating how many CPU cycles each of them will take,
    and adding up the results.


    Then, you can simply create a mock application that requires roughly the same
    amount of CPU power to run. This mock application can be extremely simple. Often,
    I create one or two threads, each running an infinite loop, and I use `sleep()`
    and other threading mechanisms to adjust the CPU cycles they eat up. I then add
    a UI to the mix and simply check if the user experience while playing with the
    UI is smooth enough. If it is, the device is a go. If it isn’t, the device gets
    left out.


    Furthermore, in case you feel your estimates aren’t accurate enough, it should
    be noted that many times the bulk of the CPU usage lies either in third-party
    libraries, in which case you can simulate real-life usage by testing the libraries
    with static and pre-created input data, or in a couple of critical algorithms
    and blocks of code, which can again be easily implemented and tested using predefined
    data. And, as a bonus, you can add performance metrics to your application prototype,
    so you can see what areas you would need to improve and by how much in order to
    make the project feasible.


    Prototyping is a surprisingly useful tool when it comes to determining and testing
    all sorts of limitations. It doesn’t require considerably more time to put into
    practice compared to simple theoretical measurements and assumptions, and tends
    to yield far better results because it runs real code on real hardware—and we
    all know how different running Java ME code on actual hardware can be from running
    said code on an emulator or “on paper.”


    Furthermore, you can use prototyping to determine not only if a given application
    is feasible on device X, but also what features you can add to your existing application
    while still keeping it usable, and what features you should remove or tone down
    in order to port the application to lower-end devices. In other words, prototyping
    and writing mock code are great tools for “juggling” with your application’s features,
    requirements, and limitations.


    One of my spare-time projects was a simple 3D ray casting engine written entirely
    with vanilla Java ME. The goals for this project were to learn about low-level
    3D graphics and to test if 3D was feasible on Java ME without any additional API
    (specifically, without using JSR 184).


    Obviously, before I dived into the serious math and everything, I needed to determine
    if the project was feasible and, if so, to what degree. In order to do this, I
    estimated the number of operations needed to calculate the position and size of
    objects on the screen (objects were, in this case, simple blocks in a rectangular
    grid) and the time it would take to draw these objects onto the screen, and translated
    this into some mock code. The mock code didn’t actually do anything 3D-related;
    it just tried to simulate the CPU usage and the drawing operations needed. As
    the calculations on which the mock code was based were rough estimates, I added
    a 30% margin of error.


    After running the mock code, it turned out that 3D was indeed a viable option
    for Java ME, at least for my device (at that time, a Nokia E50). So I started
    implementing the actual engine. As it turns out, my estimates were a little off
    and the actual FPS was only about 80% of what I had estimated, but this was mostly
    because of some unforeseen calculations that were needed (for example, compensating
    for the fish-eye effect).


    Then, the question for me became if I could add textures to the mix. Up until
    that point, blocks were monochrome, so all I had to do was figure out their shape
    (their 2D projection) and fill it, but textures need a lot of extra computations,
    as I had to figure out the color of each pixel within a block’s shape.


    Again, I estimated the CPU time needed for this and wrote some mock code. The
    results were bad: texturing wasn’t feasible, not for a 320x240 screen. Furthermore,
    the numbers were so bad that I knew I had no chance to get texturing up and running
    properly on that device, not to the level of performance I wanted anyway. Still,
    for the sake of learning, I decided to go ahead and implement texturing anyway.
    The end results, based on real texturing code, were almost as bad as those based
    on my mock code; that is to say, my estimates were correct.


    Prototyping and writing mock code helped me determine that the project was feasible
    even before doing any 3D-related work, and later it helped me determine that adding
    textures would not work on my target device. As you can imagine, had I not been
    interested in adding it anyway, implementing texturing only to find out that the
    performance was abysmal would have been a major waste of time and manpower—so,
    from this point of view, prototyping and mock code saved the day.


    Knowing your limits is also important from a business perspective. You should
    be realistic about your potential sales and market share. In fact, in accordance
    with a previous tip, you should be *pessimistic* about these aspects. Even if
    your application is realistically the best on the market, don’t expect to corner
    the market or to hit the jackpot—this rarely happens.


    Furthermore, it may even happen that your application doesn’t gain any traction
    at all (or gains very little), in which case the best thing to do is to try to
    sell it to another company, give it away for free to users, or open-source it
    (you’re not making any money anyway at the moment, so you have nothing to lose
    from this perspective, but you may gain attention and an image boost).'
