- fmt: '# Device Fragmentation


    Device fragmentation is an age-old problem for Java ME. It stems from two main
    factors. First, Java ME is merely a set of specifications and APIs, which vendors
    are free to implement in their JVMs. However, not all vendors interpret the specifications
    to mean the exact same thing, which can lead to differences in the behaviors of
    different JVMs. These differences are usually minor or occur in corner cases,
    but nonetheless they do exist and can be a source of great pain for developers.


    The second reason for device fragmentation is the fact that there are simply a
    lot of different models of Java ME phones currently in use. Java ME devices cover
    all price segments from the extremely cheap but low-end devices (with CLDC 1.0,
    MIDP 1.0, and no additional APIs—quite popular in India and Asia) to the expensive
    but high-end ones (Symbian devices come to mind—they typically implement the latest
    Java ME JSRs).


    Furthermore, Java ME devices tend to be in use for a longer time than, say, iPhones,
    which means that you will still find 4–5 year-old devices to be quite popular
    in the real world, especially if said devices were high-end at the time of their
    launch. A consequence of this is that it is possible to find older Java ME devices
    with powerful hardware that do not support some of the APIs that newer but less
    powerful devices do.


    When dealing with device fragmentation of any kind, the first goal is to adapt
    your application to support as many different devices as possible with a single
    code base (i.e., write your code to run well on as many devices as possible).


    It is quite possible, especially for complex applications, that despite your best
    efforts custom builds for each device or class of devices you want to target will
    be needed, with each build adapted to the specific hardware, capabilities, and
    API of its intended device(s).


    This has the potential of providing the best possible experience on every device,
    but it will make your development costs go through the roof. Because of this,
    you should consider this option only when you have no other choice or when your
    development budget has lots of zeros at the end. A midway solution, which is ideal
    in most cases, is to use a porting framework to automatically do the adaptation
    for you. This offers most of the performance (I would say 95%) of manually doing
    custom builds for each target device, but at a fraction of the cost in terms of
    money and development time. Porting frameworks will be covered later in the chapter.


    Still, even with custom builds and porting frameworks, Java ME fragmentation is
    quite an ugly problem. To tackle it, we first need to compartmentalize it and
    split it into sub-problems. Thus, we can think of device fragmentation as having
    three main sub-components:


    - **Hardware fragmentation**: Differences in hardware specifications (CPU, RAM,
    screen size, touch vs. non-touch, etc.) mean that you have to adapt your application
    to run on wildly different environments.

    - **Capabilities fragmentation**: Not all devices support the same APIs or provide
    all the capabilities you need (e.g., Bluetooth file transfer, geolocation, PIM
    access, etc.)

    - **API fragmentation**: The same API may behave differently on different devices.
    When this happens, the differences are typically minor and subtle, but they can
    cause a lot of problems for developers.


    In the ideal case (if there is such a thing), you will deal with only one type
    of fragmentation, but usually, in the real world, you''ll have to tackle all three
    at the same time. Also, some problems you will face will fall into more than one
    category.


    **NOTE:** There are a huge number of concrete fragmentation problems out there,
    and more appear every day. Covering them all would require not one, but several
    books. Furthermore, many of them and their associated solutions are highly scenario-specific.
    As such, in this chapter, we will cover only general advice regarding device fragmentation.


    ## Hardware Fragmentation


    This section will show you how to have your application run on devices with different
    hardware specifications.


    ### CPU Power


    As is the case in the desktop world, CPU power is still the main contributing
    factor to a device''s performance. In the ideal case, all your target devices
    have plenty of juice and you can just code your application without thinking about
    the CPU cycles you burn.


    However, that''s rarely the case. Even if the device is fast enough, running the
    CPU at 100% load will decrease battery life considerably and as such isn''t really
    an option. Furthermore, most devices you''ll have to support have CPUs in the
    100–300 MHz range, which pales in comparison with modern smartphones that typically
    start at 600 MHz.


    **TIP:** A great way to identify potential CPU fragmentation issues early is to
    throttle the emulator you''re working on to have ~80% of the performance of the
    real device(s) you''ll target. This means that you''ll be able to spot problems
    in this area even before you run your application on an actual device.


    The most obvious way to deal with CPU fragmentation is to optimize your code to
    bring performance to an acceptable level, even on lower-end devices. This is covered
    in a separate chapter. Still, there are cases in which this simply cannot be done
    (either because the algorithms in use simply don''t allow for this, or because
    the device is just not powerful enough). When this happens, there are a few tricks
    you can try.


    The first thing you should try is to smooth out the CPU usage curve. What happens
    in a typical usage scenario is that the CPU sits idle or near-idle for 80% of
    the time (e.g., when the user is not interacting with the application or when
    he''s just navigating through the menus) and goes full-out in the remaining 20%
    of the time (this is when CPU fragmentation becomes obvious). What you can do
    is use that near-idle time to prepare your application for the CPU-intensive tasks
    ahead.


    For example, you can have a background thread that preprocesses the data and gets
    it ready for the actual processing your application will do. If you''re writing
    a Yellow Pages–like application that aggregates contacts from different sources,
    you can have the background thread sort the aggregated contact list while the
    user is browsing through the menus. Then, when the user actually uses the search
    function, the list will already be sorted and the application will be very responsive—thus
    eliminating CPU fragmentation issues.


    **TIP:** When doing background preprocessing, be careful not to use too much CPU
    time, as this would defeat the purpose. An easy way to make sure your preprocessing
    stays in the background is to split the data you''ll process into smaller packets
    (as described in [Chapter 1](#Chapter01.html#ch1)) and schedule those to be processed
    whenever the CPU usage falls below a certain threshold.


    The second thing you should try is to lower all unnecessary CPU usage whenever
    the CPU usage level comes close to 100%. For example, if your application''s UI
    is running at 30 FPS, consider dropping this to 20 FPS in CPU-intensive situations,
    or temporarily disable some fancy eye candy. If your application is designed to
    do a lot of computations as fast as possible (e.g., a spreadsheet program), you
    can throttle this (e.g., don''t compute more than X cells per second).


    A rarely considered cause of CPU usage is the garbage collector. By improving
    the way in which you create, use, and dispose of objects, you can lower your CPU
    usage considerably in some circumstances. For example, you could create a pool
    of objects and reuse those instead of creating a new object every time. More information
    on the garbage collector and on improving performance in this regard will be given
    in the next chapter.'
