  trans: '

    ### 本章小结


    在本章中，你学习了 Java ME 应用程序测试的核心领域：收集调试信息、单元测试、可视化调试，以及在所有可能的用法场景和环境中对应用程序进行彻底测试。在此过程中，你了解了
    Java ME 带来的一些有趣特性（例如，有缺陷的 JVM、多种设备形态以及不同设备的不同使用场景），以及如何在测试过程中涵盖这些方面。在下一章中，你将学习高级
    Java ME 图形技术，并掌握一些对 Java ME 开发有用的图形技巧。


    ## 第 13 章


    ## **高级 Java ME 图形技术**


    传统上，图形处理从来都不是 Java ME 的强项。正如我们今天所知，Java ME 诞生于移动计算的早期，其主要目标是尽可能在更多设备上运行，这意味着必须做出妥协。其中一项妥协就是只能使用极其有限的
    2D API 来显示图形。


    **注意：** 尽管近年来 Java ME 本身也增加了对 3D 图形的支持，但市面上绝大多数设备仍然只能使用非常有限的 2D 图形 API，这要么是因为它们的
    JVM 不支持 3D，要么是因为它们实际的 3D 性能非常糟糕。此外，Java ME 中的 3D 支持仅适用于游戏，并且本身也相当有限。


    起初这并无大碍，但随着智能手机的出现及其日益普及，Java ME 应用程序发现自己正与那些使用更强大图形 API 编写、视觉效果明显更出色的应用程序竞争。


    幸运的是，尽管 Java ME 图形 API 多年来基本保持不变，但 Java ME 设备已经发展进化，现在拥有比以往任何时候都更强大的图形和 CPU 处理能力。这使得通过编写自定义图形例程，并运用几年前还不可行的巧妙技巧和技术来补充现有图形功能成为可能。因此，外观惊艳的
    Java ME 应用程序不再是过去式——如今它们完全可以实现。


    在本章中，你将学习一些与 Java ME 图形编程相关的最重要的技巧和技术。掌握它们将使你能够为 Java ME 应用程序创建令人惊叹的视觉效果，从而立即吸引用户，并使你遥遥领先于竞争对手。


    在开始之前，需要注意的是，本章介绍的一些技术依赖于 MIDP 2.0 的特性，例如 `Image.getRGB()`。不幸的是，这意味着它们无法在 MIDP
    1.0 设备上使用。不过，应该指出的是，MIDP 1.0 设备通常速度也不足以胜任这项工作。


    另一个重要的注意事项与性能有关。本章提供的代码片段以清晰性而非速度为首要目标。因此，它们的性能远非最优。通过运用第 10 章中介绍的技术，代码性能可以得到显著提升。事实上，优化这些例程可能是练习第
    10 章所介绍技术的最佳方式之一，因为它让你有机会尝试其中的大部分技术。


    ### 使用预渲染图形


    除非你的目标设备是真正的低端机型，否则目标设备的最大 JAR 文件大小很可能远大于你实际的 JAR 文件大小。换句话说，你通常有充足的空间可以支配——那为什么不利用起来呢？这些额外可用字节的最佳用途之一就是为你的应用程序存储*预渲染图形*（例如，UI
    元素、字体和动画帧）。这完全合理；既然可以简单地预渲染图形，何必在运行时动态绘制图形来给设备增加负担呢？此外，预渲染图形的质量通常远高于实时或动态生成的图形，就像
    3D 故事片看起来比电子游戏更好看一样。


    你应该首先尝试预渲染的是 UI 元素。对于固定大小的元素，例如复选框，你可以简单地为其各个状态（例如，按下、聚焦、选中、未选中、禁用、选中且禁用）渲染单独的图像，然后在
    `paint()` 方法中将这些图像直接绘制到屏幕/画布上。这做起来非常简单，而且效果很棒。


    对于可变大小的元素，情况就稍微复杂一些。这里的主要思路是使用一种称为*拼贴*的技术：你将元素分成两个或多个拼块，其中一些是固定大小的，另一些是可平铺的。然后，你将这些拼块组合起来，形成所需大小的目标元素图像。例如，假设你想绘制一个可以抽象定义为圆角框的元素，比如按钮或对话框。图
    13–1 展示了该元素的一种可能的拼块配置。


    ![images](img/1301.jpg)


    **图 13–1.** *圆角框的拼块配置*


    你可以清楚地看到，四个角上的拼块是固定大小的。同时，构成框水平和垂直边框的另外两个拼块是可平铺的：它们会根据需要重复多次，以覆盖角之间的间距。根据需求，可以添加更多拼块——例如，如果顶部和底部边框不同，或者你希望边框遵循更复杂的图案（在这种情况下，你会交替使用相应的图案拼块）。


    你还可以使用预渲染图像来存储 UI 动画，这些动画如果实时生成可能会非常耗时甚至不可能实现。这与基于精灵的游戏所使用的技术几乎相同，只是这里的动画精灵可能是按钮的背景、电子邮件通知图标或加载条。这些动画是精细的细节，对于
    Java ME 应用程序来说极其重要，因为它们使界面看起来更自然、更“流畅”，类似于你在桌面或智能手机上看到的效果（例如，当光标/指针悬停在按钮上时，按钮逐渐“亮起”，而不是立即切换到“聚焦”状态）。


    进一步扩展这个想法，预渲染图像也是创建应用程序主题的好方法。改变 UI 元素的外观变得非常简单，只需使用不同的图像文件即可；在此过程中无需更改任何代码。


    还有许多其他小的图形元素可以预渲染，以获得更好的性能和更流畅的外观。例如，在折线图中，各个线段通常会用某种标记点来分隔。与其使用底层绘图函数（例如 `fillArc()`）实时绘制这些标记点，不如预先渲染它们。这不仅通常更快，而且效果也更好，因为你可以，例如，在标记点边缘预渲染半透明像素，使它们看起来更平滑。

    '
- fmt: "预渲染图像的另一个重要用途是作为图形效果的基础。正如你很快会看到的，许多可以用 Java ME 实现的图形效果都需要两个图像文件：一个源图像和一个用作参数（例如，作为图像遮罩或颜色滤镜）的辅助图像。通过预渲染这些辅助图像，而不是在运行时生成它们，你可以显著提高这些图形效果的运行时性能。\n\
    \n更棒的是，有时你可以预渲染整个图形效果的输出，特别是当输出本质上不是动态的时候（例如，输出不是动画的一部分帧）。假设你想使用图像遮罩来创建一个带有天空纹理的公司标志。你可以选择在运行时执行此操作，也可以在构建时执行此操作，并将预渲染的遮罩标志存储在\
    \ JAR 文件中。这在运行时性能方面更快，但明显的副作用是增加了 JAR 文件的大小。\n\n**提示：** 一个好的策略是混合使用动态和预渲染图形。例如，如果你正在编写一个基于精灵的游戏，并且需要你的精灵在\
    \ 16 个方向上旋转，请考虑预渲染所需的八个帧，并动态生成剩余的八个帧。这可以在 JAR 文件大小和运行时性能之间取得良好的平衡。此外，如果你使用精灵镜像，你只需要预渲染和生成一半数量的帧。\n\
    \n最后，预渲染图形的最佳用途之一是存储字体。原生设备字体通常看起来不好。此外，它们可能会破坏应用程序在不同设备上的用户界面，因为它们在大小和形状上往往差异很大。因此，大多数高质量的\
    \ Java ME 应用程序都采用预渲染的位图字体。然而，一个好看的应用程序 UI 通常需要几种字体，或者至少需要不同大小和样式（粗体、斜体）的相同字体——所以如果空间允许，就去做吧。\n\
    \n关于预渲染图形，我想讨论的最后一件事是存储它们的正确方法。将每个图形元素存储在单独的文件中会适得其反，无论是在性能方面，还是在占用的 JAR 和内存空间方面。存储预渲染图形的最佳方式是作为图像映射的一部分。具体来说，你创建一个更大的*父图像*，每个预渲染的图形元素都存储为该图像的一个矩形子区域，如[图\
    \ 13-2](#Chapter13.html#fig_13_2) 所示。图像映射顶部和左侧边框与元素子区域之间的距离分别称为元素的*顶部偏移量*和*左侧偏移量*。\n\
    \n![images](images/1302.jpg)\n\n**图 13-2.** *一个图像映射，其中一个图形元素及其偏移量被突出显示*\n\n**提示：**\
    \ 你可以通过将 PNG 文件转换为使用调色板的文件来优化文件大小。如果你的图像只使用有限的颜色集，这会很有帮助，但对于使用大量颜色的图像则用处不大。你还应该注意，除了\
    \ Java ME 规范中要求的 PNG 文件格式外，所有其他文件格式都是可选的。因此，在考虑替代格式（如 GIF 或 JPEG）时，请确保你的目标设备支持它。\n\
    \n要渲染图像映射中的图形元素，你所要做的就是*相对于图形元素的偏移量*计算父图像的绘制坐标，在屏幕上你想要绘制图形元素的坐标周围裁剪画布，然后*在之前计算出的坐标处绘制父图像*。因为我们相对于元素的偏移量计算了图像映射的坐标，所以实际元素将被精确地绘制在所需位置。用语言解释听起来有点令人困惑，但[清单\
    \ 13-1](#Chapter13.html#list_13_1) 中显示的伪代码将使一切变得清晰。\n\n**清单 13-1.** *用于绘制图像映射中元素的伪代码*\n\
    \n```\nfunction drawAt( Image imageMap, Graphics target, int x, int y, int elementOffsetLeft,\n\
    int elementOffsetTop, int elementWidth, int elementHeight)\n{\n        // Calculate\
    \ the image map's target coordinates\n        // with respect to the element's\
    \ offsets\n        imageX = x - elementOffsetLeft;\n        imageY = y - elementOffsetTop;\n\
    \n        // Clip the canvas around the element's drawing position\n        target.clip(x,\
    \ y, elementWidth, elementHeight);\n\n        // Draw the image map at the above\
    \ calculated coordinates.\n        // This ensures that the element itself is\
    \ actually drawn at (x,y),\n        // and since the canvas is clipped around\
    \ the element's target\n        // area, nothing else except the element will\
    \ be drawn.\n        target.drawImage(imageMap,imageX,imageY);\n}\n```\n\n使用图像映射是\
    \ Java ME 应用程序的一项非常重要的技术。它往往对资源友好（因为需要创建和管理的`Image`对象更少，并且需要解码的单个图像文件也更少）。它也非常快，因为绝大多数手机都支持硬件裁剪。事实上，如果你在单个绘制操作（例如，屏幕刷新）中使用大量图形元素，使用图像映射实际上可能比绘制单个图像*更快*。此外，高端\
    \ Java ME 手机拥有专用图形芯片，它们也用于加速 Java ME 绘制操作。由于这些芯片的工作方式，绘制同一图像的不同部分几乎总是比绘制不同的单个图像更快，因为在第二种情况下，图形芯片必须切换缓冲区（图像）。不过，这种差异可能不太明显。"
  raw: 'Another great use for pre-rendered images is as a basis for graphical effects.
    As you will soon see, many graphical effects that you can implement with Java
    ME require two image files: a source image and a secondary image to be used as
    a parameter (for example, as an image mask or as a color filter). By pre-rendering
    these secondary images rather than generating them at runtime, you can dramatically
    improve the runtime performance of these graphical effects.


    Even better, sometimes you can pre-render the entire output of a graphical effect,
    especially if the output is not dynamic in nature (for example, the output is
    not a frame that is part of an animation). Let’s suppose you want to use image
    masking to create a sky-textured version of your company’s logo. You can either
    do this at runtime, or do this at build time and store the pre-rendered masked
    logo in your JAR file. This is faster in terms of runtime performance, but has
    the obvious side-effect of increasing the JAR file size.


    **TIP:** A good strategy is to mix dynamic and pre-rendered graphics. For example,
    if you’re writing a sprite-based game and you need your sprites to rotate in 16
    directions, consider pre-rendering eight of the needed frames and dynamically
    generating the remaining eight. This provides a good balance between JAR file
    size and runtime performance. Furthermore, if you use sprite mirroring, you need
    to pre-render and generate only half as many frames.


    Finally, one of the best uses for pre-rendered graphics is storing fonts. Native
    device fonts don’t usually look good. Furthermore, they can break the application’s
    UI across devices because they tend to vary greatly in size and shape. Because
    of this, most high-quality Java ME applications resort to using pre-rendered bitmap
    fonts. However, you’ll typically need several fonts for a good-looking application
    UI, or at least the same font in different sizes and styles (bold, italic)—so
    if the space is available, go for it.


    The last thing I would like to discuss regarding pre-rendered graphics is the
    proper way to store them. Storing each graphical element in a separate file is
    counterproductive, both in terms of performance and in terms of occupied JAR and
    memory space. The best way to store pre-rendered graphics is as part of an image
    map. Specifically, you create one larger *parent image*, and each pre-rendered
    graphical element is stored as a rectangular sub-section of that image, as seen
    in [Figure 13–2](#Chapter13.html#fig_13_2). The distances between the image map’s
    top and left borders and the element’s sub-section are known as the element’s
    *top and left offsets*, respectively.


    ![images](images/1302.jpg)


    **Figure 13–2.** *An image map with one graphical element and its offsets highlighted*


    **TIP:** You might be able to optimize file size by converting your PNG files
    to ones that use a color palette. This is helpful if your images use only a limited
    set of colors, but less useful for images that use a lot of colors. You should
    also be aware that, besides the PNG file format, which is required in the Java
    ME specification, all other file formats are optional. As such, when considering
    an alternate format (such as GIF or JPEG), make sure your target devices support
    it.


    To render a graphical element that is part of an image map, all you have to do
    is calculate the drawing coordinates of the parent image *with respect to the
    graphical element’s offsets*, clip the canvas around the onscreen coordinates
    you want to draw the graphical element to, and then *draw the parent image at
    the coordinates calculated previously.* Because we have calculated the image map’s
    coordinates with respect to the element’s offsets, the actual element will be
    drawn at exactly the desired position. This sounds a bit confusing when explained
    in words, but the pseudocode shown in [Listing 13–1](#Chapter13.html#list_13_1)
    will make everything clear.


    **Listing 13–1.** *Pseudocode for Drawing an Element That Is Part of an Image
    Map*


    `function drawAt( Image imageMap, Graphics target, int x, int y, int elementOffsetLeft,`

    `int elementOffsetTop, int elementWidth, int elementHeight)`

    `{`

    `        // Calculate the image map''s target coordinates`

    `        // with respect to the element''s offsets`

    `        imageX = x - elementOffsetLeft;`

    `        imageY = y - elementOffsetTop;`


    `        // Clip the canvas around the element''s drawing position`

    `        target.clip(x, y, elementWidth, elementHeight);`


    `        // Draw the image map at the above calculated coordinates.`

    `        // This ensures that the element itself is actually drawn at (x,y),`

    `        // and since the canvas is clipped around the element''s target`

    `        // area, nothing else except the element will be drawn.`

    `        target.drawImage(imageMap,imageX,imageY);`

    `}`


    Using image maps is a very important technique for Java ME applications. It tends
    to be easy on resources (because fewer `Image` objects have to be created and
    managed, and fewer individual image files have to be decoded). It’s also quite
    fast, as the vast majority of phones support clipping in hardware. In fact, if
    you’re using a large number of graphical elements in a single drawing operation
    (for example, screen refresh), it’s quite possible that using image maps will
    actually be *faster* than drawing individual images. Furthermore, high-end Java
    ME phones have dedicated graphics chips, which they also use for accelerating
    Java ME drawing operations. Because of the way these chips work, drawing different
    portions of the same image is almost always faster than drawing different individual
    images, because the graphics chip has to switch buffers (images) in the second
    case. The difference is unlikely to be noticeable, though.'
  trans: '

    预渲染图像的另一个重要用途是作为图形效果的基础。你很快就会发现，许多可以用 Java ME 实现的图形效果都需要两个图像文件：一个源图像和一个用作参数（例如，作为图像遮罩或颜色滤镜）的辅助图像。通过预渲染这些辅助图像，而不是在运行时生成它们，你可以显著提升这些图形效果的运行时性能。


    更棒的是，有时你可以预渲染整个图形效果的输出，特别是当输出本质上不是动态的时候（例如，输出不是动画中的某一帧）。假设你想使用图像遮罩来创建一个带有天空纹理的公司标志版本。你可以在运行时完成，也可以在构建时完成，并将预渲染的遮罩标志存储在
    JAR 文件中。这在运行时性能方面更快，但明显的副作用是增加了 JAR 文件的大小。


    **提示：** 一个好的策略是混合使用动态图形和预渲染图形。例如，如果你正在编写一个基于精灵的游戏，并且需要你的精灵在 16 个方向上旋转，可以考虑预渲染其中八个所需的帧，并动态生成剩下的八个。这能在
    JAR 文件大小和运行时性能之间取得良好的平衡。此外，如果你使用精灵镜像，你只需要预渲染和生成一半数量的帧。


    最后，预渲染图形的最佳用途之一是存储字体。原生设备字体通常看起来不好看。此外，它们可能会破坏应用程序在不同设备上的用户界面，因为它们在大小和形状上往往差异很大。因此，大多数高质量的
    Java ME 应用程序都采用预渲染的位图字体。然而，一个美观的应用程序 UI 通常需要多种字体，或者至少需要不同大小和样式（粗体、斜体）的同一字体——所以如果空间允许，就大胆去做吧。


    关于预渲染图形，我想讨论的最后一件事是存储它们的正确方法。将每个图形元素存储在单独的文件中会适得其反，无论是在性能方面，还是在占用的 JAR 和内存空间方面。存储预渲染图形的最佳方式是作为图像映射的一部分。具体来说，你创建一个更大的*父图像*，每个预渲染的图形元素都存储为该图像的一个矩形子区域，如图
    13-2 所示。图像映射顶部和左侧边框与元素子区域之间的距离分别称为元素的*顶部偏移量*和*左侧偏移量*。


    ![images](img/1302.jpg)


    **图 13-2.** *一个图像映射，其中一个图形元素及其偏移量被高亮显示*


    **提示：** 你可以通过将 PNG 文件转换为使用调色板的文件来优化文件大小。如果你的图像只使用有限的颜色集，这会很有帮助，但对于使用大量颜色的图像则效果较差。你还应该注意，除了
    Java ME 规范中要求的 PNG 文件格式外，所有其他文件格式都是可选的。因此，在考虑替代格式（如 GIF 或 JPEG）时，请确保你的目标设备支持它。


    要渲染图像映射中的某个图形元素，你只需计算父图像*相对于图形元素偏移量*的绘制坐标，在屏幕上你想要绘制该图形元素的坐标周围裁剪画布，然后*在之前计算好的坐标处绘制父图像*。由于我们已经根据元素的偏移量计算了图像映射的坐标，实际元素将被精确绘制在所需位置。用文字解释听起来有点令人困惑，但清单
    13-1 中展示的伪代码会让一切变得清晰。


    **清单 13-1.** *绘制图像映射中元素的伪代码*


    `function drawAt( Image imageMap, Graphics target, int x, int y, int elementOffsetLeft,`

    `int elementOffsetTop, int elementWidth, int elementHeight)`

    `{`

    `        // 计算图像映射的目标坐标`

    `        // 相对于元素的偏移量`

    `        imageX = x - elementOffsetLeft;`

    `        imageY = y - elementOffsetTop;`


    `        // 在元素绘制位置周围裁剪画布`

    `        target.clip(x, y, elementWidth, elementHeight);`


    `        // 在上述计算出的坐标处绘制图像映射。`

    `        // 这确保了元素本身实际上被绘制在 (x,y) 处，`

    `        // 并且由于画布在元素的目标区域周围被裁剪，`

    `        // 除了元素之外，不会绘制任何其他内容。`

    `        target.drawImage(imageMap,imageX,imageY);`

    `}`


    使用图像映射是 Java ME 应用程序中一项非常重要的技术。它往往对资源友好（因为需要创建和管理的 `Image` 对象更少，需要解码的单个图像文件也更少）。它也非常快，因为绝大多数手机都支持硬件裁剪。事实上，如果你在单个绘制操作（例如，屏幕刷新）中使用大量图形元素，使用图像映射实际上可能比绘制单个图像*更快*。此外，高端
    Java ME 手机拥有专用图形芯片，它们也用于加速 Java ME 的绘制操作。由于这些芯片的工作方式，绘制同一图像的不同部分几乎总是比绘制不同的单个图像更快，因为在后一种情况下，图形芯片必须切换缓冲区（图像）。不过，这种差异可能不太明显。

