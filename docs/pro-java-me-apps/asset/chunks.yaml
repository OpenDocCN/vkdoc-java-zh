  raw: '**NOTE:** Token-based authentication assumes that the tokens you provide are
    valid and *does not* actually verify them (i.e., `verifyCredential()` always returns
    `true`). If the tokens are in fact invalid, all calls made to the server will
    fail even though `verifyCredential()` has returned `true` on them. This is a library
    issue that will most likely be fixed in later versions.


    Finally, we need to add support for the `BEGIN_LOGIN` event. To do this, add the
    code in [Listing 4–7](#Chapter04.html#list_4_7) to the `handleEvent()` method
    of `ServerImplementation`. The convention is that the payload for a `BEGIN_LOGIN`
    event is an object of type `UserCredentials`, which will be used for the actual
    login.


    **Listing 4–7.** *Adding Support for the `BEGIN_LOGIN` Event*


    `public boolean handleEvent(Event event)`

    `{`

    `        ...`

    `        if ( event.getType() == EVT.NETWORK.BEGIN_LOGIN )`

    `        {`

    `                login ( (UserCredentials) event.getPayload());`

    `                return true;`

    `        }`

    `        ...`

    `}`


    Now that the code''s written, let''s put it to the test. [Listing 4–8](#Chapter04.html#list_4_8)
    shows a number of possible login scenarios.


    **Listing 4–8.** *Possible Login Scenarios*


    `// Create the ServerImplementation instance`

    `ServerImplementation impl = new ServerImplementation("conKey", "conSecret",`

    `Application.getMainEventController() );`


    `// Credentials with only username and password`

    `UserCredentials credentials1 = new UserCredentials("johndoe","123password",null,null);`


    `// Credentials with only tokens`

    `UserCredentials credentials2 = new UserCredentials(null,null,"token123",`

    `"tokensecret123");`


    `// Credentials with both username/password and tokens`

    `UserCredentials credentials3 = new UserCredentials("johndoe","123password","token123",`

    `"tokensecret123");`


    `// Login by providing both username/password and tokens`

    `impl.login(credentials3);`


    `// Login by providing just the tokens`

    `impl.login(credentials2);`


    `// Log in by using events and providing just the username and password`

    `Event event = new Event(EVT.CONTEXT.LOCAL, EVT.NETWORK.BEGIN_LOGIN, credentials1);`

    `Application.getMainEventController().queueEvent(event);`


    As you can see, the login mechanism we have implemented is both simple to use
    and very flexible.


    #### Posting Tweets


    Next to logging in, the second thing users would probably like to do is post tweets
    of their own. With Twitter API ME, this is very easy to do. The code for the `postTweet()`
    method of our `ServerImplementation` is presented in [Listing 4–9](#Chapter04.html#list_4_9).


    **Listing 4–9.** *Posting Tweets*


    `import app.models.Tweet;`

    `...`


    `public boolean postTweet(Tweet tweet)`

    `    {`

    `       com.twitterapime.search.Tweet libTweet = new com.twitterapime.search.Tweet`

    `               (tweet.getBody());`


    `       if ( accountManager != null )`

    `       {`

    `            TweetER tweeter = TweetER.getInstance(accountManager);`

    `            try`

    `            {`

    `                tweeter.post(libTweet);`

    `            }`

    `            catch (Exception ex)`

    `            {`

    `                return false;`

    `            }`

    `            return true;`

    `       }`

    `       return false;`

    `    }`


    Besides posting tweets, the foregoing code snippet serves a secondary purpose:
    it demonstrates one of the more annoying aspects of using third-party libraries:
    naming conflicts. To avoid confusion between our `Tweet` data type and the library''s
    `Tweet` data type, we have to use the full name for the library''s `Tweet` class,
    which is `com.twitterapime.search.Tweet`. Clashing class names are little more
    than a minor annoyance, but their big brothers, access modifier conflicts, can
    be a real pain. Access modifier conflicts happen when, for example, you want or
    need to override a method that is final, or you want to make public a method that
    is marked as private or protected. We will talk more about these issues in [Chapter
    11](#Chapter11.html#ch11).


    #### Retrieving Tweets


    This is probably the most interesting aspect of the networking module, and the
    one we will spent the most time examining.


    As mentioned previously, there are two major ways to retrieve tweets: tweet timelines
    and queries. Tweet timelines aggregate tweets from various sources (for example,
    tweets from all the people in your “following” list), while queries allow you
    to refine the tweets you receive by specifying various parameters such as tweet
    content, author, time, location, and more.


    In our application, we want to handle both queries and tweet timelines in a unified
    fashion. For this we will use the timeline concept we defined in the previous
    chapter (which is a different concept than Twitter''s timelines—please do not
    confuse them).


    Specifically, we will implement two types of timelines (our timelines, not Twitter''s),
    one for each source.


    We will then choose the proper one based on the filter specified when calling
    `getTimelineForFilter()`. If no filter is specified, or if the filter contains
    a null username, then we will use the timeline corresponding to Twitter''s home
    timeline, which is the list of tweets you see when logging into Twitter on the
    Web.


    If a username is specified in the filter, then we will use a query to retrieve
    all the available tweets corresponding to the specified user. Please note that
    Twitter''s API history is limited to a couple of days, so tweets older than that
    will not be available.


    [Listing 4–10](#Chapter04.html#list_4_10) shows the code for `ServerImplementation`''s
    `getTimelineForFilter()` method, which implements the selection logic already
    described.


    **Listing 4–10.** *The `getTimelineForFilter()` Method*


    `public Timeline getTimelineForFilter(TweetFilter filter)`

    `{`

    `        if ( filter == null || filter.getUserID() == null )`

    `        {`

    `           return new TimelineHome (accountManager);`

    `        }`

    `        else`

    `        {`

    `           return new TimelineUserTweets (accountManager, filter);`

    `        }`

    `}`


    As we will see, each of the two timeline types referenced in the foregoing example
    has specific particularities when it comes to its implementation, and each will
    teach us important lessons. Let''s start with the home timeline implementation.'
