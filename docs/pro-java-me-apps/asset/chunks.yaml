- fmt: "### Using Image Masking\n\n*Image masking* is a technique similar to clipping.\
    \ Whereas in clipping the image is “cut” according to a rectangular area, in image\
    \ masking the image is cut according to a free-form mask, typically another image.\n\
    \nImage masking is extremely useful for a variety of purposes, ranging from stylish\
    \ effects (for example, textured fonts—the image is the texture, the mask is the\
    \ font) to practical, clever tricks (for example, dynamic backgrounds for nonrectangular\
    \ components based on the actual shape and size of the component—in this case,\
    \ the component’s shape is the mask).\n\nIn addition to being quite powerful,\
    \ image masking is extremely easy to implement. The trick lies in defining the\
    \ mask properly. Specifically, the mask must be an image with some pixels opaque\
    \ and some pixels transparent or semitransparent. The convention is that, when\
    \ applied to a source image, the opaque pixels of the mask will create opaque\
    \ pixels in the resulting image, while the transparent or semitransparent pixels\
    \ of the mask will create transparent or semitransparent pixels in the resulting\
    \ image. All we care about in the mask image is the transparency of the pixels;\
    \ their actual color is irrelevant for our purposes.\n\nNext, we know that MIDP\
    \ 2.0 allows us to retrieve the individual pixels of an image via `Image.getRGB()`.\
    \ The result will be an array of integers, with each integer in the array corresponding\
    \ to a pixel of the source image. The channel data of each pixel (its Alpha, Red,\
    \ Green, and Blue values) is encoded by reserving 8 bits of integer for each channel.\
    \ Written in hexadecimal, the notation is `0xAARRGGBB`.\n\nWith this in mind,\
    \ all we need to do is take the Alpha channel of the mask image and merge it with\
    \ the RGB channels of the source image. This is quite easy to do, as seen in the\
    \ highlighted lines of [Listing 13–2](#Chapter13.html#list_13_2). Next, after\
    \ we have the merged ARGB data, we can simply draw it on the screen or on any\
    \ other `Graphics` object.\n\n**Listing 13–2.** *Image Masking in Java ME*\n\n\
    ```\npublic void drawMaskedImage(Image source, Image mask, Graphics g, int x,\
    \ int y)\n{\n        // Reserve an array for the pixel data of each image\n  \
    \      int [] sourceData = new int[source.getHeight()*source.getWidth()];\n  \
    \      int [] maskData = new int[mask.getHeight()*mask.getWidth()];\n\n      \
    \  // Retrieve the individual pixels of each image (source, mask)\n        source.getRGB(sourceData,\
    \ 0, source.getWidth(), 0, 0, source.getWidth(),\n        source.getHeight());\n\
    \        mask.getRGB(maskData, 0, mask.getWidth(), 0, 0, mask.getWidth(),\n  \
    \      mask.getHeight());\n\n        // Merge the alpha channel of the mask with\
    \ the color channels of the source\n        for (int i=0;i<sourceData.length;i++)\
    \ {\n            sourceData[i] =  (maskData[i] & 0xFF000000) |\n            (sourceData[i]\
    \ & 0x00FFFFFF) ;\n        }\n\n        // Draw the result\n        g.drawRGB(sourceData,\
    \ 0, source.getWidth(), x, y, source.getWidth(),\n        source.getHeight(),\
    \ true);\n}\n```\n\nThere is one important thing to mention: for clarity and brevity,\
    \ the code in [Listing 13–2](#Chapter13.html#list_13_2) assumes that the mask\
    \ and source images are of the same size. If the two images are of different sizes,\
    \ either the result will look wrong or an `ArrayIndexOutOfBounds` exception will\
    \ be raised. However, it is possible (and not that difficult) to adapt the code\
    \ to work with masks and sources of different sizes. This is left as an exercise\
    \ for the reader.\n\nThat’s all there is to implementing image masking in Java\
    \ ME! The results are quite good looking, as can be seen in [Figure 13–3](#Chapter13.html#fig_13_3).\n\
    \n![images](images/1303.jpg)\n\n**Figure 13–3.** *Image masking in action*\n\n\
    The fun doesn’t stop here, however. We can do even more with this technique. For\
    \ example, the `maskData` array can be dynamically generated. You can use this\
    \ to create all sorts of effects, from film grain or snow to animated transitions\
    \ similar to PowerPoint’s Checkerboard or Dissolve.\n\nYou should be aware that,\
    \ while most modern MIDP 2.0 devices support transparency and alpha blending,\
    \ this is not a required part of the Java ME standard. Furthermore, the number\
    \ of transparency levels can vary widely among devices (from 2 levels to 256 levels).\
    \ Make sure you test these two aspects on your target device before using transparency\
    \ and image masking. For example, an image that makes use of the full 256 levels\
    \ of transparency might look bad when displayed on a device that supports only\
    \ 4 levels of transparency."
  raw: '### Using Image Masking


    *Image masking* is a technique similar to clipping. Whereas in clipping the image
    is “cut” according to a rectangular area, in image masking the image is cut according
    to a free-form mask, typically another image.


    Image masking is extremely useful for a variety of purposes, ranging from stylish
    effects (for example, textured fonts—the image is the texture, the mask is the
    font) to practical, clever tricks (for example, dynamic backgrounds for nonrectangular
    components based on the actual shape and size of the component—in this case, the
    component’s shape is the mask).


    In addition to being quite powerful, image masking is extremely easy to implement.
    The trick lies in defining the mask properly. Specifically, the mask must be an
    image with some pixels opaque and some pixels transparent or semitransparent.
    The convention is that, when applied to a source image, the opaque pixels of the
    mask will create opaque pixels in the resulting image, while the transparent or
    semitransparent pixels of the mask will create transparent or semitransparent
    pixels in the resulting image. All we care about in the mask image is the transparency
    of the pixels; their actual color is irrelevant for our purposes.


    Next, we know that MIDP 2.0 allows us to retrieve the individual pixels of an
    image via `Image.getRGB()`. The result will be an array of integers, with each
    integer in the array corresponding to a pixel of the source image. The channel
    data of each pixel (its Alpha, Red, Green, and Blue values) is encoded by reserving
    8 bits of integer for each channel. Written in hexadecimal, the notation is 0xAARRGGBB.


    With this in mind, all we need to do is take the Alpha channel of the mask image
    and merge it with the RGB channels of the source image. This is quite easy to
    do, as seen in the highlighted lines of [Listing 13–2](#Chapter13.html#list_13_2).
    Next, after we have the merged ARGB data, we can simply draw it on the screen
    or on any other `Graphics` object.


    **Listing 13–2.** *Image Masking in Java ME*


    `public void drawMaskedImage(Image source, Image mask, Graphics g, int x, int
    y)`

    `{`

    `        // Reserve an array for the pixel data of each image`

    `        int [] sourceData = new int[source.getHeight()*source.getWidth()];`

    `        int [] maskData = new int[mask.getHeight()*mask.getWidth()];`


    `        // Retrieve the individual pixels of each image (source, mask)`

    `        source.getRGB(sourceData, 0, source.getWidth(), 0, 0, source.getWidth(),`

    `        source.getHeight());`

    `        mask.getRGB(maskData, 0, mask.getWidth(), 0, 0, mask.getWidth(),`

    `        mask.getHeight());`


    **`// Merge the alpha channel of the mask with the color channels of the source`**

    **`for (int i=0;i<sourceData.length;i++) {`**

    **`sourceData[i] =  (maskData[i] & 0xFF000000) |`**

    **`(sourceData[i] & 0x00FFFFFF) ;`**

    **`}`**


    `        // Draw the result`

    `        g.drawRGB(sourceData, 0, source.getWidth(), x, y, source.getWidth(),`

    `        source.getHeight(), true);`

    `}`


    There is one important thing to mention: for clarity and brevity, the code in
    [Listing 13–2](#Chapter13.html#list_13_2) assumes that the mask and source images
    are of the same size. If the two images are of different sizes, either the result
    will look wrong or an `ArrayIndexOutOfBounds` exception will be raised. However,
    it is possible (and not that difficult) to adapt the code to work with masks and
    sources of different sizes. This is left as an exercise for the reader.


    That’s all there is to implementing image masking in Java ME! The results are
    quite good looking, as can be seen in [Figure 13–3](#Chapter13.html#fig_13_3).


    ![images](images/1303.jpg)


    **Figure 13–3.** *Image masking in action*


    The fun doesn’t stop here, however. We can do even more with this technique. For
    example, the `maskData` array can be dynamically generated. You can use this to
    create all sorts of effects, from film grain or snow to animated transitions similar
    to PowerPoint’s Checkerboard or Dissolve.


    You should be aware that, while most modern MIDP 2.0 devices support transparency
    and alpha blending, this is not a required part of the Java ME standard. Furthermore,
    the number of transparency levels can vary widely among devices (from 2 levels
    to 256 levels). Make sure you test these two aspects on your target device before
    using transparency and image masking. For example, an image that makes use of
    the full 256 levels of transparency might look bad when displayed on a device
    that supports only 4 levels of transparency.'
  trans: '

    ### 使用图像遮罩


    *图像遮罩*是一种类似于裁剪的技术。裁剪是根据矩形区域“切割”图像，而图像遮罩则是根据自由形状的遮罩（通常是另一张图像）来切割图像。


    图像遮罩用途广泛，从时尚效果（例如，纹理字体——图像是纹理，遮罩是字体）到实用巧妙的技巧（例如，基于非矩形组件的实际形状和大小为该组件创建动态背景——在这种情况下，组件的形状就是遮罩），都非常有用。


    图像遮罩不仅功能强大，而且实现起来极其简单。关键在于正确定义遮罩。具体来说，遮罩必须是一张图像，其中部分像素不透明，部分像素透明或半透明。其约定是：当应用于源图像时，遮罩中不透明的像素会在结果图像中生成不透明的像素，而遮罩中透明或半透明的像素则会在结果图像中生成透明或半透明的像素。我们只关心遮罩图像中像素的透明度；它们的实际颜色对我们的目的无关紧要。


    接下来，我们知道 MIDP 2.0 允许我们通过 `Image.getRGB()` 检索图像的各个像素。结果将是一个整数数组，数组中的每个整数对应源图像的一个像素。每个像素的通道数据（其
    Alpha、红、绿、蓝值）通过为每个通道保留 8 位整数进行编码。用十六进制表示，其格式为 0xAARRGGBB。


    考虑到这一点，我们需要做的就是获取遮罩图像的 Alpha 通道，并将其与源图像的 RGB 通道合并。这很容易实现，如清单 13–2 中突出显示的行所示。接下来，在获得合并后的
    ARGB 数据后，我们可以直接将其绘制到屏幕上或任何其他 `Graphics` 对象上。


    **清单 13–2.** *Java ME 中的图像遮罩*


    `public void drawMaskedImage(Image source, Image mask, Graphics g, int x, int
    y)`

    `{`

    `        // 为每张图像的像素数据预留一个数组`

    `        int [] sourceData = new int[source.getHeight()*source.getWidth()];`

    `        int [] maskData = new int[mask.getHeight()*mask.getWidth()];`


    `        // 检索每张图像（源图像、遮罩图像）的各个像素`

