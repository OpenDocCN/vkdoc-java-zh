    此清单清晰地展示了 UI 代码（表单类）与底层功能（控制器类）之间的分离：表单类仅负责 UI 的创建以及在 UI 元素交互时触发相应的事件，而控制器则处理实际的应用程序逻辑。以高亮代码为例，表单执行实际的小部件添加操作（通过
    `MainForm` 类的 `addTweet()` 方法），但由控制器决定添加哪条推文。从这个角度来看，你可以将表单视为控制器的某种从属，或者作为用户与控制器之间的接口。


    UI 与逻辑的不当分离可能是 Java ME 应用程序的一个主要问题。由于针对不同设备通常会导致不同的 UI（或至少是特定于设备的 UI 调整），将应用程序逻辑与
    UI 逻辑合并可能会导致应用程序代码在一台设备上运行，而在另一台设备上无法运行，因为 UI 代码在后一台设备上遵循了不同的路径。


    更糟糕的是，有时应用程序逻辑会错误地与 UI 属性绑定。例如，视口在许多应用程序中很常见，如电子表格或地图软件。根据关联容器的滚动位置来确定视口位置在某种程度上是有道理的，但这从根本上来说是错误的，因为你不是将视口绑定到某个应用程序内部变量（即计算出的视口位置），而是将其绑定到
    UI 小部件的状态。这不仅可能导致代码和逻辑在 UI 与核心应用程序代码之间“渗透”，还可能将 UI 错误（例如，在 UI 库中）转变为应用程序错误。试想一下，如果某个错误导致滚动位置被错误报告——例如，在调整大小后或从横屏模式切换到竖屏模式后——会发生什么；视口位置也会因此受到影响。

