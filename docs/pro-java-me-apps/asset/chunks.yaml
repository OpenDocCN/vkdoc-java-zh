    这组表单-控制器对负责管理应用程序设置和偏好（例如用户区域设置），以及执行用户注销或退出应用程序等操作。


    `SettingsForm`的代码见代码清单 8-9。


    **代码清单 8-9.** *`SettingsForm`*


    `package app.views;`


    `...`


