    of them. Sadly, very few Java ME applications seem to have wizards. Therefore,
    their presence can be a major plus for your application if you decide to implement
    them.


    Fourth, they should have added some means of getting in-application help. Granted,
    Java ME applications are usually size-constrained, but at the very least, a link
    to a help page on the Web could have been added. Besides, these days you can usually
    spare 4–6 KB of JAR size to store critical help information directly in the application.
    Dynamic help (as discussed earlier) would have helped a great deal in this situation
    too.


    Fifth, it might have been a good idea to split up more-complicated processes into
    several less-complex forms. For example, the “add main account credentials” and
    “add IM services” steps could have been organized on separate forms, with an option
    to navigate between them. This would have made each form better focused and would
    have allowed the user to concentrate on a single step at a time, without being
    distracted.


    All these tips have the end-goal of eliminating user confusion and increasing
    user satisfaction. By providing visual cues and helpful messages to the user,
    that user then feels more in charge and more comfortable with the application,
    resulting in a more pleasant user experience.'
  trans: '

    ### 提升用户交互体验


    我在本章开头提到，从用户角度来看，优秀的功能集对于让你的应用脱颖而出至关重要。这确实没错，你的应用应当能够完美实现它所宣传的所有功能，并且要做得足够好。这里的重点在于*做得足够好*，因为质量比数量更重要。用户宁愿使用一个功能较少但始终稳定运行的程序，也不愿使用一个功能繁多却漏洞百出、不可靠的程序。因此，你应当始终优先覆盖核心功能，并在实现新功能之前，确保当前已实现的功能尽可能完美地运行。这样做能确保你的应用尽可能健壮，并让用户获得流畅愉悦的体验。对吗？


    不一定。优秀的功能并不足以带来良好的用户体验。用户与这些功能的交互方式，无论功能本身多么出色，都可能成就或毁掉一个应用。


    遗憾的是，在移动领域，用户交互恰恰是常被忽视的环节之一。这并非说桌面领域对此就足够重视。但在桌面环境中，当你遇到困难时，通常有朋友或网络可以求助。而在移动应用中，你可能独自面对问题，且无法联网。此外，如前所述，Java
    ME 用户通常不如智能手机用户那样精通技术，这进一步增加了对高质量用户交互的需求。


    基于这些原因，在你的 Java ME 应用的技术限制内，正确（或尽可能正确）地处理用户交互至关重要。用户交互基本上包含两个方面：用户如何与应用本身及其功能进行交互，以及用户如何与应用开发公司及相关服务进行交互。接下来的内容将涵盖在你的应用中改进这两个方面最重要的方法。与“锦上添花”部分一样，这份清单绝非详尽无遗；它只涵盖了最重要且普遍适用的主题。


    **注意：** “为你的应用锦上添花”一节中讨论的所有内容，通常也属于用户交互改进的范畴。


    #### 消除用户困惑


    移动行业的从业者往往倾向于认为，用户对他们手中的应用（以及移动设备本身）的熟悉程度，比实际情况要高。这可能导致用户遇到可用性问题，进而引发挫败感并流失客户。


    例如，我最喜欢的一个 Java ME 应用——一个多网络即时通讯客户端——实际上需要多组凭证：一组用于程序的“主账户”（用于记录 IM 会话等），另一组用于你想使用的每个独立
    IM 账户。当应用首次启动时，它会显示一个主账户登录表单，标题为“配置你的 IM 服务”。这个表单有两个字段，分别标注为“用户名”和“密码”。在这两个字段下方，是一个包含所有已添加
    IM 账户的列表。显然，初始时这个列表是空的。要添加 IM 账户，你需要进入应用的上下文菜单，选择“添加服务”。


    这个表单的问题在于，它对新用户来说极其令人困惑。试想一下：你第一次启动应用，屏幕上只看到一个标题为“配置你的 IM 服务”的表单，以及两个用于输入用户名和密码的字段。许多人会像我最初那样，本能地认为这是指他们
    IM 账户的凭证，*而不是*主账户的凭证。因此，当他们的 IM 账户凭证被拒绝时，他们会感到沮丧，并最终从设备上卸载该应用，甚至可能在这个过程中给出差评。


    讽刺的是，整个登录过程在应用的网页上解释得很清楚，但在应用本身中却没有说明。此外，无法直接从应用中创建主账户；你必须通过网页来完成。考虑到所有这些因素，我相信很多人因为这个令人困惑的登录/注册流程而放弃了这款应用，这很可惜，因为该程序在其他方面真的非常出色。那么，应用开发者本应如何避免这种情况呢？


    首先，他们应该在屏幕上包含更多信息。例如，在登录字段上方，他们可以放置一个文本框或滚动条（以节省空间），其中包含一条清晰表述的信息，解释这些是用户必须输入的主账户凭证，*而不是*
    IM 账户的凭证。


    或者，“凭证被拒绝”的弹出消息可以提示用户确保他们输入的是有效的主账户凭证，而非 IM 账户凭证。错误消息绝不应仅仅是“出了点问题”。它们还应该包含一两个最可能的原因。同样，如果用户在特定屏幕上需要执行的操作存在合理的歧义，则必须在同一屏幕上向用户提供清晰的说明。


    其次，他们应该在登录字段下方放置一个标题为“添加 IM 服务”的按钮，并用水平分隔线与字段隔开。添加 IM 服务是你在登录表单上可以执行的两个主要操作之一，而主要操作*始终*应该既出现在应用菜单中，也出现在屏幕上。此外，这也有助于澄清关于“输入你的凭证”字段的困惑。诚然，考虑到大多数
    Java ME 设备的分辨率，屏幕空间非常宝贵，人们倾向于将操作移至菜单，但这不应以让用户困惑为代价。


    第三，由于该流程涉及多个账户和账户类型，为此设计一个应用内向导会非常棒。向导是引导用户完成更复杂流程的绝佳方式，新用户或缺乏经验的用户尤其喜欢它们。遗憾的是，很少有
    Java ME 应用似乎包含向导。因此，如果你决定实现它们，向导的存在可以成为你应用的一大亮点。


    第四，他们应该添加某种获取应用内帮助的方式。诚然，Java ME 应用通常受大小限制，但至少可以添加一个指向网页帮助页面的链接。此外，如今你通常可以节省出
    4-6 KB 的 JAR 大小，将关键帮助信息直接存储在应用中。动态帮助（如前所述）在这种情况下也会大有裨益。


    第五，将更复杂的流程拆分成几个不那么复杂的表单可能是个好主意。例如，“添加主账户凭证”和“添加 IM 服务”步骤可以组织在不同的表单上，并提供在它们之间导航的选项。这将使每个表单更加聚焦，并允许用户一次专注于一个步骤，而不会分心。


    所有这些技巧的最终目标都是消除用户困惑并提高用户满意度。通过向用户提供视觉提示和有用的信息，用户会感觉对应用更有掌控感、更舒适，从而获得更愉悦的用户体验。

    '
- fmt: '#### Keeping the Interface Simple


    Keeping the interface simple is somewhat related to eliminating user confusion
    but should be considered a goal in itself. As with any application platform, mobile
    or otherwise, the main benefit of keeping the interface simple is of course a
    better user experience. Simpler interfaces are more enjoyable and easier to use
    for most users.


    Besides this, Java ME also derives two “extra” benefits from keeping the interface
    simple. The first benefit is that you can make better use of the screen real-estate
    available. If the interface is too complex, it will appear cluttered and inelegant
    on Java ME–class displays, even though on higher-resolution displays (such as
    those found in smartphones or on desktop computers), it would look great. The
    second benefit is that a simpler interface is considerably easier to port to other
    devices and platforms, and will feel more consistent across them, thus reducing
    fragmentation issues.


    There are a few main strategies you can employ to keep your interface simple.
    The easiest and most natural way to do this is, as already discussed, to split
    up more-complex forms and operations into sub-forms and sub-operations. You can
    do this via wizards, via tabbed forms, or even via regular forms chained together.


    Following this, or as an alternative, it is important to realize that information
    is layered, and that it makes no sense to have the user enter *deep* information
    before entering *shallow* information. For example, let''s suppose that the user''s
    phone number is an optional field during the sign-up process and that the user
    can (also optionally) use that number to receive notifications and recover his
    or her password.


    The wrong way to handle this is to have all the fields (user phone number, “Receive
    notifications” check box, “Use number for recovering the password” check box)
    displayed on the sign-up form right from the start. The right way to do this is
    to have only a button titled “Add phone number” on the form. After the button
    is pressed, an inline *form within a form* is shown instead of it, containing
    the three fields mentioned. When the user leaves the sub-form, it is automatically
    hidden and replaced by an “Edit phone details” button. By doing this, you effectively
    ask the user for shallow information (“Do you want to enter a phone number?”)
    before you ask for deep information (“What do you want to do with it?”).


    This layering approach has several advantages. The form never gets overwhelmed
    by input fields, as only one *section* is displayed at any given time. This means
    that you can actually have very complex forms (think about entering product details
    in an e-shop), which are at the same time easy to use and understand. In-form
    navigation is also improved and streamlined, as you navigate from section to section
    rather than from field to field by default.


    Also related to the layering strategy, you should always research the most common
    parameters for any given operation and, if it makes sense to do so, use them as
    the default without asking the user to explicitly enter them. For example, if
    you''re writing an FTP client, chances are the default port 21 will be used in
    most situations and that passive mode is a safe default connection mode. As such,
    the “connect to FTP server” form would contain only an input field for the FTP
    server address and an “Advanced” button. Pressing the “Advanced” button would
    trigger an inline sub-form to be displayed, with the input fields required to
    change the port number and connection mode from the default values already mentioned.


    Finally, you should always present only meaningful options to the user and hide
    options that are not usable at that time. The most basic example that comes to
    mind is that there should be no “Paste” option in any menu as long as there is
    nothing copied. The option should not be grayed out—it should simply not be there.
    Things are of course different in the world of desktop-class applications that
    run on desktop-class displays, but in the Java ME world, it makes little sense
    to show an option that the user can''t really use. You only end up wasting screen
    real-estate and creating confusion and frustration. This is especially important
    in feature-rich applications, which tend to have lots of potential options, of
    which only a few are active at any given time.


    #### Allowing Customers to Reach You Easily


    When your customers have a problem or a suggestion, they typically want to inform
    you of it easily and quickly. The best way to allow them to do this is to have
    an in-application contact form. Depending on the type of application, this can
    be tied in to the customer''s main account (if one exists) or it can be a simple
    form on which the application enters the user''s name, e-mail address, and the
    message that user wants to send to you.


    In addition to this, on the contact form you can also add one or more phone numbers
    where customers can reach you. This is especially effective on mobile devices,
    because customers can simply select the number and the application will automatically
    initiate a call.


    Depending on the type of message (bug report, suggestion, and so on), you can
    also ask whether the user also wants to submit meaningful application data, such
    as debugging logs. The application can do this automatically for the user, which
    will increase the chance that the problem will get solved while also showing indirectly
    that you care about your customers.


    This kind of tight customer-relations mechanism is highly effective. It not only
    keeps you notified of any problems, complaints, or suggestions that users might
    have, but it also helps keep your customers loyal and improves your image as a
    software developer and as a service provider.


    Of course, this implies that you have some kind of infrastructure set up to handle
    this communication process, and that the messages from your customers will actually
    get processed or responded to in a timely fashion. Enabling the customer to submit
    a message and then ignoring or responding late is worse than not allowing the
    user to submit a message in the first place.


    Then there is also the question of costs, which is why I used the word *customers*
    instead of *users* in this section. As stated at the very beginning of the book,
    Java ME applications tend to generate less revenue than applications for other
    platforms. Therefore, especially in the case of direct sales, the cost of supporting
    users this way might not be worth it. However, if your budget allows it, having
    built-in customer support often results in a huge boost in customer satisfaction
    and an improved company image.


    Finally, customer contact goes two ways. If it makes sense to do so, you can implement
    a notifications system in your application. At every startup, the application
    connects to your server and retrieves a kind of *message of the day*, if one exists.
    This message can be anything from a joke or a blog post snippet, to an important
    notification related to an application update or a possible server downtime.'
