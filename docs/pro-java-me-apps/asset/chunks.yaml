- fmt: '### Improving Error Handling


    Currently, error handling in our application is minimal. In order to reach “completed”
    status, this needs to be improved. Improving error handling should start at the
    core of each module (networking, UI, localization, persistence, etc.), where the
    native API calls are mixed with project-specific or framework-specific code and
    should continue until high-level errors are reached (for example, widget focusing
    errors in the interface).


    In theory, every result of a function (especially native ones) should be checked
    for failure and processed accordingly, and each and every possible exception type
    that can be thrown in a given scenario should be caught and handled individually
    (i.e., the code should not rely on `catch (Exception ex)` as a catch-all universal
    safety net). So when something fails, instead of just knowing that “it failed,”
    we should also know exactly where and why it failed, at runtime, and be able to
    recover from this if at all possible.


    In practice, Java ME devices generally do not have enough resources for this.
    Catching every error type and checking every return value will result in a severe
    strain on CPU and RAM resources, while also increasing the code base considerably.
    If these checks also happen to be done in an often-run code block, the application’s
    performance will suffer considerably. Fortunately, there are a few ways around
    this issue.


    First of all, developers must be aware of the 80-20 rule, which in the case of
    error handling means that 20% of all the *possible* error-generating scenarios
    or blocks of code are responsible for 80% of the *actually generated* errors.
    If you can identify where and what that 20% is, and if you handle it properly,
    then you can usually get away with only minimal error handling for the remaining
    80% of possible error-generating scenarios and code.


    From my experience, the most common sources of errors are as follows:


    - External operations, such as IO access and accessing user data on the device

    - Memory allocations for large blocks of data (I have yet to see an `OutOfMemory`
    exception caused by the allocation of a single individual `int` or `String`)

    - Threading/concurrency issues, typically caused by attempting to use or access
    a resource (either external on internal) that is either not ready for use or already
    in use by some other thread

    - Invalid or inconsistent input data (e.g., broken HTML code, data compressed
    with a different algorithm than the one expected, etc.)


    Second, there’s the concept of *error prevention*, which is often overlooked or
    not properly understood. Most errors can be avoided if proper checks are employed.
    For example, rather than trying to bind an `InputStream` to a `DataInputStream`,
    reading from the `DataInputStream` and catching `IOExceptions`, you could make
    sure that the `InputStream` is not `null` and that it can be read from safely.
    You should also validate critical data and parameters to check that they won’t
    break your code. Ensuring that you have accurate information about the runtime
    environment (available memory, number of running threads, number of network connections
    in use, etc.) and adapting your code to cope with critical changes in these parameters
    are equally important in some scenarios. And knowing the quirks of the device
    your code is running on is invaluable: if you know that a certain native function
    behaves improperly on the device you’re running on, adapt your code to compensate
    (more on this in the next chapter).


    The bottom line is that, rather than trying to handle errors, you should always
    try to prevent them from happening in the first place. You, of course, have no
    control over IO errors happening because of the network (or other similar scenarios),
    but most of the errors you’ll encounter can be prevented in one way or another
    from within your code—especially if said errors are also generated from within
    your code. The advantage of error prevention over error handling should be obvious:
    your application becomes more robust, and it becomes easier to handle potentially
    delicate situations because you are aware of them ahead of time.


    A third and final piece of advice is to try to bubble up your errors and centralize
    your error handling. If a local network access operation fails, tidy up things
    locally as quickly and as efficiently as you can, and then trigger an `NETWORK_FAILURE`
    event with the appropriate payload. Handle this event in a dedicated error-handling
    controller, and do the bulk of the error handling there (informing the user, stopping
    relevant threads/actions, etc.). Since many errors are handled in similar or even
    identical ways, having a central error-handling authority makes sense, and it
    also improves code readability, code flexibility, and code base size.


    ### Increasing Functionality


    Our application as it is right now provides only basic Twitter functionality—more
    is needed for a Pro application. This should be easy to add, as the building blocks
    are all there. Some of the things that might be nice to have and might be fun
    to implement are as follows:


    - The ability to see your friends and their tweets

    - Periodic auto-updating of the tweets list (every five minutes, for example)

    - More information about each tweet (location, timestamp, etc.)

    - Avatar pictures and more information about each friend (avatar, location, bio,
    etc.)

    - Adding support for URL-shortening via an external service (this one might be
    a little bit more difficult)

    - More contextual options—for example, when activating a tweet, a menu with options
    such as “Reply,” “Retweet,” and “More tweets from user” should appear.


    ### Improving the UI Framework


    Probably one of the most important parts of any Java ME application, the UI framework
    is, in our case, functional but very spartan. You could, of course, switch the
    application to a more complete UI framework, or you could attempt to improve the
    existing one (which is what I recommend, purely for the learning experience).
    Some of the things that you could try to implement are the following:


    - More widgets—drop-down boxes, contextual menus, and image widgets are all good
    candidates.

    - Support for kinetic scrolling and possibly touch gestures

    - Custom fonts and text input capabilities, to replace native ones (which are
    inconsistent across devices)—more on this later in the book.

    - More layout containers and options (such as padding, margin, lead, etc.)

    - More flexibility (changing widget text at runtime, built-in support for form
    re-layout, etc.)


    ### Summary


    In this chapter, we have used together all the modules we have written so far.
    We have created a functional (although not exactly feature-complete) Twitter client.
    We have looked at how to separate our application into UI-related code (forms)
    and business-related code (controllers), how events can be used to form a complete
    application flow, from startup to shutdown, how they can be used to bridge the
    gap between the front-end UI and the back-end application code, how to implement
    features like auto-login and localization in real-life scenarios, and more. We
    have also looked at what can be done to improve the application further. A list
    of “to do” exercises has been suggested to the reader with respect to this.


