    ### Best Practices for Java ME Networking


    So far in the chapter, we have concentrated on implementing a networking module
    based on a third-party library, in order to make the process faster and easier
    to understand. However, in doing so, we have overlooked a lot of best practices
    relevant to Java ME networking. This section of the chapter aims to compensate
    for this, by providing general advice pertaining to Java ME networking, as well
    as examples on how, where, and why to apply this advice.


    #### Do Not Reinvent the Wheel


    There are plenty of communication protocols out there, and plenty of Java ME implementations
    for them. Regardless of whether you prefer XML or JSON or even binary protocols,
    or you want to connect to Twitter or Blogger or Facebook, your back is covered,
    and there''s no need to reinvent the wheel and write your own custom implementation
    or custom communication protocol. As much as possible, leave the really low-level
    stuff to someone else and use a readily available implementation.


    This is a bit counter-intuitive considering that the essence of Java ME development
    is “lean and mean.” From this point of view, at first glance it would appear that
    rolling out your own implementation is better than using an existing one: you
    get more specialized functionality, a smaller code size, code that is optimized
    for the current application, etc. You can just write a custom XML parser for your
    application and implement just the XML features you need and optimize them thoroughly
    afterward. Right?


    Wrong. Even if you do manage to get the parser to work, the truth is that you
    have just increased the development effort by a significant number of man-hours
    and you have also increased the potential for bugs and poor performance. And since
    you''re probably the only one using your parser, the only bug reports and performance
    issues reports you''ll get are the ones from your customers, complaining that
    your product doesn''t work as expected. Add to this the fact that your parser
    isn''t very feature-rich, and you''ll quickly see why rolling your own implementation
    is a losing proposition.


    By contrast, dedicated third-party implementations of standard protocols are safer,
    feature-rich, up to date, thoroughly tested, and available for use immediately.
    Many people are using them, so they get plenty of feedback in terms of bugs and
    performance. They have dedicated teams attending to them and are under constant
    improvement. Sure, they may not be as “lean and mean” as a well-written and thoroughly
    optimized custom implementation (though, as explained previously, it is questionable
    whether you''ll be able to write such an implementation), but when you put everything
    in balance, there is no real reason not to use them, save for lack of hardware
    resources/support.


    In fact, even our third-party Twitter library does this, relying on the KXML parser
    for all XML-related actions. And there are many prominent products and libraries
    out there that do the same. If it''s good for them, it''s probably good for you
    too.'
