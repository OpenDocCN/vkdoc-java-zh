- fmt: "### Event Listeners\n\nSomeone has to listen for and respond to events. Event\
    \ listeners do just that. All event listeners must implement the `EventListener`\
    \ interface, defined in [Listing 2–3](#Chapter02.html#list_2_3).\n\n**Listing\
    \ 2–3.** *The `EventListener` Interface*\n\n```\npackage com.apress.framework.objecttypes;\n\
    \npublic interface EventListener\n{\n    public boolean handleEvent(Event event)\
    \ ;\n}\n```\n\nThe `handleEvent()` method returns `true` if the event has been\
    \ handled, `false` otherwise.\n\n### Providers\n\nProviders, as the name implies,\
    \ provide data and objects to the application, typically from external sources.\
    \ For example, a `PIMContactProvider` can be used to retrieve contacts from the\
    \ device's address book, while a `CameraFrameProvider` can be used to retrieve\
    \ still frames from the device's camera.\n\nProviders can be split into two main\
    \ groups: random access and sequential ones.\n\nSequential providers behave like\
    \ enumerations, in that they retrieve objects one by one, in order. Only one object\
    \ is available at any given time, and once the next object is requested, the old\
    \ one is discarded and it cannot be retrieved again. The `CameraFrameProvider`\
    \ is a good example of a sequential provider.\n\nRandom access providers allow\
    \ access to any of their objects at any given time. For example, the `PIMContactProvider`\
    \ can provide access to any contact in the device's address book.\n\nIn our framework,\
    \ all providers must implement the `Provider` interface shown in [Listing 2–4](#Chapter02.html#list_2_4).\n\
    \n**Listing 2–4.** *The `Provider` Interface*\n\n```\npackage com.apress.framework.objecttypes;\n\
    \npublic interface Provider\n{\n    public boolean isSequential();\n\n    public\
    \ Object retrieveCurrent();\n\n    public void next();\n\n    public boolean hasMore();\n\
    \n    public boolean jumpTo(int objectIndex);\n\n    public int getNumberOfAvailableObjects();\n\
    }\n```\n\nCalling `retrieveCurrent()` will return the element at the current index;\
    \ the current index can be changed by calling `next()` or `jumpTo()`. On sequential\
    \ providers, the index can be changed only by calling `next()`.\n\nWhen it is\
    \ not possible to jump to a certain index or to the next index, `jumpTo()` and\
    \ `next()` will return `false`.\n\nProviders with an unknown number of objects\
    \ return `-1` when `getNumberOfAvailableObjects()` is called.\n\nCalling `hasMore()`\
    \ will return `true` if there are more elements after the current index, `false`\
    \ otherwise.\n\n### Consumers\n\nConsumers are the counterparts to providers.\
    \ They are used to send data or objects to external sources, typically outside\
    \ of the application. Like providers, they can be random and sequential, and they\
    \ follow the same conventions. All consumers must implement the `Consumer` interface\
    \ from [Listing 2–5](#Chapter02.html#list_2_5).\n\n**Listing 2–5.** *The `Consumer`\
    \ Interface*\n\n```\npackage com.apress.framework.objecttypes;\n\npublic interface\
    \ Consumer\n{\n    public boolean isSequential();\n\n    public boolean next();\n\
    \n    public boolean store(Object object);\n\n    public boolean jumpTo(int objectIndex);\n\
    \n    public int getNumberOfAvailableSlots();\n}\n```\n\nNext are consumer-specific\
    \ conventions.\n\nRandom access consumers store objects in the “slot” indicated\
    \ by the current index. Changing the index works in the same way as it does for\
    \ providers (see previous).\n\nWhen `store()` is called on sequential consumers,\
    \ an implicit call to `next()` is also made. Calling `store()` on random access\
    \ consumers does not change the current index.\n\nCalling `next()` on sequential\
    \ consumers without storing an object first is equivalent to saying “store nothing.”\
    \ This may or may not fail, depending on the consumer.\n\n### Managers\n\nJust\
    \ like football managers are responsible for the careers of their players, so\
    \ too our managers are responsible for specific aspects of the objects under their\
    \ wings.\n\nFor example, a `ContactSyncManager` would be responsible for keeping\
    \ its contacts in sync with the server, while a `ContactIntegrityManager` would\
    \ be responsible for ensuring that the details of its contacts are in accordance\
    \ with one another, so a contact's declared star sign matches the specified date\
    \ of birth.\n\nManagers are useful because they typically operate on the “fire\
    \ and forget” principle, doing their work independently and behind the scenes.\
    \ They thus compartmentalize some of the application's complexity and hide it\
    \ from the rest of the code.\n\nIn order to use managers, we must be able to assign\
    \ and un-assign objects to them and we should also be able to find out if a manager\
    \ is responsible for a certain object. Thus, all managers must implement the `Manager`\
    \ interface from [Listing 2–6](#Chapter02.html#list_2_6).\n\n**Listing 2–6.**\
    \ *The `Manager` Interface*\n\n```\npackage com.apress.framework.objecttypes;\n\
    \npublic interface Manager\n{\n    public boolean assign(Object object);\n\n \
    \   public void unassign(Object object);\n\n    public boolean isManaging(Object\
    \ object);\n}\n```\n\nIt is possible for a manager to handle several types of\
    \ objects, even completely unrelated ones, if it makes sense to do so. A good\
    \ example of this is a manager that must ensure that all its objects, regardless\
    \ of their type, occupy less than a set amount of memory.\n\nIt is also possible\
    \ for one object to be handled by more than one manager.\n\nManagers can refuse\
    \ to manage objects, indicated by a `false` return value for `assign()`.\n\nLast\
    \ but not least, managers can and often do also play other roles besides their\
    \ manager one. For example, they can also be providers or event listeners.\n\n\
    A good example of how managers can be used will be provided later in this chapter.\n\
    \n### Models and Controllers\n\nBy their very nature, models are unique, and there\
    \ is usually no common functionality associated with all of them. Thus, the template\
    \ for models will look like [Listing 2–7](#Chapter02.html#list_2_7).\n\n**Listing\
    \ 2–7.** *The `Model` Interface*\n\n```\npackage com.apress.framework.objecttypes;\n\
    \npublic interface Model\n{\n\n}\n```\n\nAll model classes will have to implement\
    \ this interface, even though it is empty right now. This is done primarily for\
    \ clarity in our case, but you might find out that halfway through development\
    \ there are a few common features that all models share or require, for example,\
    \ a `checksum()` method, and adding those features to the interface will then\
    \ make sense.\n\nThe foregoing applies to controllers too. All controllers must\
    \ implement the interface in [Listing 2–8](#Chapter02.html#list_2_8).\n\n**Listing\
    \ 2–8.** *The `Controller` Interface*\n\n```\npackage com.apress.framework.objecttypes;\n\
    \npublic interface Controller\n{\n\n}\n```"
  raw: '#### Event Listeners


    Someone has to listen for and respond to events. Event listeners do just that.
    All event listeners must implement the `EventListener` interface, defined in [Listing
    2–3](#Chapter02.html#list_2_3).


    **Listing 2–3.** *The `EventListener` Interface*


    `package com.apress.framework.objecttypes;`


    `public interface EventListener`

    `{`

    `    public boolean handleEvent(Event event) ;`

    `}`


    The `handleEvent()` method returns `true` if the event has been handled, `false`
    otherwise.


    #### Providers


    Providers, as the name implies, provide data and objects to the application, typically
    from external sources. For example, a `PIMContactProvider` can be used to retrieve
    contacts from the device''s address book, while a `CameraFrameProvider` can be
    used to retrieve still frames from the device''s camera.


    Providers can be split into two main groups: random access and sequential ones.


    Sequential providers behave like enumerations, in that they retrieve objects one
    by one, in order. Only one object is available at any given time, and once the
    next object is requested, the old one is discarded and it cannot be retrieved
    again. The `CameraFrameProvider` is a good example of a sequential provider.


    Random access providers allow access to any of their objects at any given time.
    For example, the `PIMContactProvider` can provide access to any contact in the
    device''s address book.


    In our framework, all providers must implement the `Provider` interface shown
    in [Listing 2–4](#Chapter02.html#list_2_4).


    **Listing 2–4.** *The `Provider` Interface*


    `package com.apress.framework.objecttypes;`


    `public interface Provider`

    `{`

    `    public boolean isSequential();`


    `    public Object retrieveCurrent();`


    `    public void next();`


    `    public boolean hasMore();`


    `    public boolean jumpTo(int objectIndex);`


    `    public int getNumberOfAvailableObjects();`

    `}`


    Calling `retrieveCurrent()` will return the element at the current index; the
    current index can be changed by calling `next()` or `jumpTo()`. On sequential
    providers, the index can be changed only by calling `next()`.


    When it is not possible to jump to a certain index or to the next index, `jumpTo()`
    and `next()` will return `false`.


    Providers with an unknown number of objects return `-1` when `getNumberOfAvailableObjects()`
    is called.


    Calling `hasMore()` will return `true` if there are more elements after the current
    index, `false` otherwise.


    #### Consumers


    Consumers are the counterparts to providers. They are used to send data or objects
    to external sources, typically outside of the application. Like providers, they
    can be random and sequential, and they follow the same conventions. All consumers
    must implement the `Consumer` interface from [Listing 2–5](#Chapter02.html#list_2_5).


    **Listing 2–5.** *The `Consumer` Interface*


    `package com.apress.framework.objecttypes;`


    `public interface Consumer`

    `{`

    `    public boolean isSequential();`


    `    public boolean next();`


    `    public boolean store(Object object);`


    `    public boolean jumpTo(int objectIndex);`


    `    public int getNumberOfAvailableSlots();`

    `}`


    Next are consumer-specific conventions.


    Random access consumers store objects in the “slot” indicated by the current index.
    Changing the index works in the same way as it does for providers (see previous).


    When `store()` is called on sequential consumers, an implicit call to `next()`
    is also made. Calling `store()` on random access consumers does not change the
    current index.


    Calling `next()` on sequential consumers without storing an object first is equivalent
    to saying “store nothing.” This may or may not fail, depending on the consumer.


    #### Managers


    Just like football managers are responsible for the careers of their players,
    so too our managers are responsible for specific aspects of the objects under
    their wings.


    For example, a `ContactSyncManager` would be responsible for keeping its contacts
    in sync with the server, while a `ContactIntegrityManager` would be responsible
    for ensuring that the details of its contacts are in accordance with one another,
    so a contact''s declared star sign matches the specified date of birth.


    Managers are useful because they typically operate on the “fire and forget” principle,
    doing their work independently and behind the scenes. They thus compartmentalize
    some of the application''s complexity and hide it from the rest of the code.


    In order to use managers, we must be able to assign and un-assign objects to them
    and we should also be able to find out if a manager is responsible for a certain
    object. Thus, all managers must implement the `Manager` interface from [Listing
    2–6](#Chapter02.html#list_2_6).


    **Listing 2–6.** *The `Manager` Interface*


    `package com.apress.framework.objecttypes;`


    `public interface Manager`

    `{`

    `    public boolean assign(Object object);`


    `    public void unassign(Object object);`


    `    public boolean isManaging(Object object);`

    `}`


    It is possible for a manager to handle several types of objects, even completely
    unrelated ones, if it makes sense to do so. A good example of this is a manager
    that must ensure that all its objects, regardless of their type, occupy less than
    a set amount of memory.


    It is also possible for one object to be handled by more than one manager.


    Managers can refuse to manage objects, indicated by a `false` return value for
    `assign()`.


    Last but not least, managers can and often do also play other roles besides their
    manager one. For example, they can also be providers or event listeners.


    A good example of how managers can be used will be provided later in this chapter.


    #### Models and Controllers


    By their very nature, models are unique, and there is usually no common functionality
    associated with all of them. Thus, the template for models will look like [Listing
    2–7](#Chapter02.html#list_2_7).


    **Listing 2–7.** *The `Model` Interface*


    `package com.apress.framework.objecttypes;`


    `public interface Model`

    `{`


    `}`


    All model classes will have to implement this interface, even though it is empty
    right now. This is done primarily for clarity in our case, but you might find
    out that halfway through development there are a few common features that all
    models share or require, for example, a `checksum()` method, and adding those
    features to the interface will then make sense.


    The foregoing applies to controllers too. All controllers must implement the interface
    in [Listing 2–8](#Chapter02.html#list_2_8).


    **Listing 2–8.** *The `Controller` Interface*


    `package com.apress.framework.objecttypes;`


    `public interface Controller`

    `{`


    `}`'
  trans: '

    #### 事件监听器


    必须有人来监听并响应事件。事件监听器正是为此而生。所有事件监听器都必须实现 `EventListener` 接口，该接口定义于清单 2-3。


    **清单 2-3.** *`EventListener` 接口*


    `package com.apress.framework.objecttypes;`


    `public interface EventListener`

    `{`

    `    public boolean handleEvent(Event event) ;`

    `}`


    如果事件已被处理，`handleEvent()` 方法返回 `true`，否则返回 `false`。


    #### 提供者


    顾名思义，提供者负责向应用程序提供数据和对象，这些数据通常来自外部源。例如，`PIMContactProvider` 可用于从设备的通讯录中检索联系人，而
    `CameraFrameProvider` 可用于从设备的摄像头中检索静态帧。


    提供者主要可分为两类：随机访问提供者和顺序访问提供者。


    顺序提供者的行为类似于枚举，它们按顺序逐个检索对象。在任何给定时间，只有一个对象可用，一旦请求下一个对象，旧对象就会被丢弃且无法再次检索。`CameraFrameProvider`
    就是一个很好的顺序提供者示例。


    随机访问提供者允许在任何给定时间访问其任意对象。例如，`PIMContactProvider` 可以提供对设备通讯录中任何联系人的访问。


    在我们的框架中，所有提供者都必须实现清单 2-4 中所示的 `Provider` 接口。


    **清单 2-4.** *`Provider` 接口*


    `package com.apress.framework.objecttypes;`


    `public interface Provider`

    `{`

    `    public boolean isSequential();`


    `    public Object retrieveCurrent();`


    `    public void next();`


    `    public boolean hasMore();`


    `    public boolean jumpTo(int objectIndex);`


    `    public int getNumberOfAvailableObjects();`

    `}`


    调用 `retrieveCurrent()` 将返回当前索引处的元素；可以通过调用 `next()` 或 `jumpTo()` 来更改当前索引。对于顺序提供者，只能通过调用
    `next()` 来更改索引。


    当无法跳转到特定索引或下一个索引时，`jumpTo()` 和 `next()` 将返回 `false`。


    当调用 `getNumberOfAvailableObjects()` 时，对象数量未知的提供者将返回 `-1`。


    如果当前索引之后还有更多元素，调用 `hasMore()` 将返回 `true`，否则返回 `false`。


    #### 消费者


    消费者是提供者的对应方。它们用于将数据或对象发送到外部源，通常是在应用程序外部。与提供者一样，它们可以是随机访问或顺序访问的，并遵循相同的约定。所有消费者都必须实现清单
    2-5 中的 `Consumer` 接口。


    **清单 2-5.** *`Consumer` 接口*


    `package com.apress.framework.objecttypes;`


    `public interface Consumer`

    `{`

    `    public boolean isSequential();`


    `    public boolean next();`


    `    public boolean store(Object object);`


    `    public boolean jumpTo(int objectIndex);`


    `    public int getNumberOfAvailableSlots();`

    `}`


    接下来是消费者特定的约定。


    随机访问消费者将对象存储在当前索引指示的“槽位”中。更改索引的方式与提供者相同（见上文）。


    当在顺序消费者上调用 `store()` 时，也会隐式调用 `next()`。在随机访问消费者上调用 `store()` 不会更改当前索引。


    在顺序消费者上调用 `next()` 而不先存储对象，相当于“不存储任何内容”。根据消费者的不同，这可能会失败，也可能不会。


    #### 管理器


    就像足球经理负责其球员的职业生涯一样，我们的管理器也负责其管理下对象的特定方面。


    例如，`ContactSyncManager` 将负责使其联系人保持与服务器同步，而 `ContactIntegrityManager` 将负责确保其联系人的详细信息相互一致，例如，联系人声明的星座与指定的出生日期相符。


    管理器非常有用，因为它们通常遵循“发射后不管”的原则，独立地在后台完成工作。因此，它们将应用程序的某些复杂性进行划分，并将其对代码的其他部分隐藏起来。


    为了使用管理器，我们必须能够向它们分配和取消分配对象，并且我们还应该能够找出某个管理器是否负责某个特定对象。因此，所有管理器都必须实现清单 2-6 中的 `Manager`
    接口。


    **清单 2-6.** *`Manager` 接口*


    `package com.apress.framework.objecttypes;`


    `public interface Manager`

    `{`

    `    public boolean assign(Object object);`


    `    public void unassign(Object object);`


    `    public boolean isManaging(Object object);`

    `}`


    一个管理器可以处理多种类型的对象，甚至是完全不相关的对象，只要这样做是合理的。一个很好的例子是，一个管理器必须确保其所有对象，无论其类型如何，占用的内存都少于设定的数量。


    一个对象也可以由多个管理器处理。


    管理器可以拒绝管理对象，这通过 `assign()` 返回 `false` 来表示。


    最后但同样重要的是，管理器除了其管理角色外，通常还可以扮演其他角色。例如，它们也可以是提供者或事件监听器。


    本章稍后将提供一个关于如何使用管理器的好例子。


    #### 模型和控制器


    就其本质而言，模型是独一无二的，通常不存在所有模型都共有的通用功能。因此，模型的模板将如清单 2-7 所示。


    **清单 2-7.** *`Model` 接口*


    `package com.apress.framework.objecttypes;`


    `public interface Model`

    `{`


    `}`


    所有模型类都必须实现此接口，即使它目前是空的。在我们的案例中，这样做主要是为了清晰起见，但您可能会发现，在开发过程中，所有模型都会共享或需要一些通用特性，例如，一个
    `checksum()` 方法，届时将这些特性添加到接口中将是合理的。


    上述内容同样适用于控制器。所有控制器都必须实现清单 2-8 中的接口。


    **清单 2-8.** *`Controller` 接口*


    `package com.apress.framework.objecttypes;`


    `public interface Controller`

    `{`


    `}`

