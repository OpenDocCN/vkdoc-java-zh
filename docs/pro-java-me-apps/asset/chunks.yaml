    may not get notified of `VOLUME_CHANGED` events if they occur in quick succession,
    for example).


    The effects of optional API inconsistencies are also not that easily identifiable
    sometimes: unless you check the amount of free memory both before and after a
    `deallocate()` call, it''s difficult to determine if the call actually de-allocates
    anything, as the specs say it should. Sometimes the only way to actually de-allocate
    memory from a player is to actually remove all references to the player and its
    associated objects, and let the GC work its magic—which requires you to manage
    not only `Players` but also `DataSources`, `Controls`, and more.'
  trans: '

    `    public void drawLine(int x1, int y1, int x2, int y2)`

    `    {`

    `        graphics.drawLine(translateX+x1, translateY+y1, translateX+x2, translateY+y2)
    ;`

    `    }`


    `    ...`

    `}`


    使用包装类的好处在于，你实际上可以增强原生 API。例如，Java ME 中没有原生方法来绘制或填充多边形，但你可以通过在 `GraphicsWrapper`
    类中以 `drawPoly()` 和 `fillPoly()` 方法的形式实现所需功能，从而优雅地克服这一限制。由于其余代码将使用包装类而非直接使用底层的
    `Graphics` 对象，因此看起来就像平台原生支持多边形一样。


    与局部 API 不一致性相关的最令人头疼的问题，大概就是随机出现的情况和边界情况。这意味着，某个方法调用在大多数情况下行为正常，但并非在所有情况下都如此。我曾见过一些实现，它们能正确解码某些
    PNG 图像，但无法解码其他图像（例如，透明度会丢失）；某些设备在播放特定媒体文件时会停止响应；某些 JVM 会直接拒绝正确关闭某些输入流，但其他输入流却可以（从输入流读取数据也存在同样的问题），诸如此类。这再次进入了神秘领域。


    对于与媒体相关的随机问题，我通常的做法是直接重新编码有问题的文件。这通常要么能解决问题，要么能让我了解究竟是什么触发了该问题（可能是某种特定的文件编码，或者媒体文件的比特率超过了某个阈值）。


    对于与平台相关的随机问题，你首先应该 100% 确定自己完全按照规范正确操作，并且该随机或边界情况错误确实是实现中的缺陷，而非你代码中的问题。最好的方法是创建一个独立的简单项目，尝试在其中重现该问题，而不是在你的应用程序中。一旦你确定问题出在实现中，可以尝试以下几种方法。


    首先也是最重要的，尝试对执行环境进行细微调整。如果遇到与文件相关的问题，尝试将有问题的文件移动到其他位置，或尝试重命名它。如果从 URL 读取数据时遇到问题，尝试移除其中的“www”或“http://”部分，或者如果该
    URL 在你的控制之下，将必要的内容移动到（最好是在）不同服务器上的不同 URL。如果遇到与线程相关的问题，尝试在代码中添加小的延迟（或任何能打破“节奏”的操作）。


    如果这不起作用，尝试“改写”代码（即，尝试改变方法调用的顺序）。这有时能奏效，即使它看起来毫无道理。例如，我遇到过一种情况，需要打开两个不同的输入流，一个来自文件，一个来自
    URL。先打开文件再打开 URL 会导致应用程序崩溃；而先打开 URL 再打开文件则运行正常。结果发现，问题出在平台实现中的竞态条件（代码运行在测试版 JVM
    上）。


    局部 API 不一致性很烦人，但至少它们只会在局部影响应用程序。正如我们接下来将看到的，还存在一些在架构层面“运作”的不一致性——或者更糟，它们源于局部不一致性，却会全局影响应用程序。


    #### 全局 API 不一致性


    有时 API 不一致性处于比单个函数更高的层面。它们可能与 MIDlet 生命周期有关，或者与某些可选 API 的实现方式以及与之关联的高级对象的生命周期有关。例如，如前所述，在很多手机上，当应用程序被移至后台、最小化或因任何原因暂停时，`pauseApp()`
    方法并不会被调用，这是相当普遍的情况。由于某些应用程序使用此方法来正确进入待机状态（例如，在聊天应用程序中，通过告知服务器“我将暂时离开，请将我显示为离线状态”），未能接收到此事件可能会导致意外且不可预测的结果（沿用之前的例子，移动用户可能会丢失一些即时消息，或者如果应用程序最小化时间过长，服务器可能会断开移动客户端的连接）。


    处理这类不一致性最常见的方法是在架构层面进行规避。例如，即使 `pauseApp()` 方法未被调用，大多数现代应用程序也使用 `Canvas` 来显示其用户界面，而
    `Canvas` 类提供了 `showNotify()` 和 `hideNotify()` 方法，根据我的经验，在我使用过的 99% 的设备上，这些方法都能被正确调用。因此，虽然需要做一些工作才能正确实现，但可以将暂停/最小化检测转移到应用程序的
    `Canvas` 中，并在 `Canvas` 被隐藏时（而不是在调用 `pauseApp()` 时）执行相应的暂停/最小化操作。这种重新利用方法和回调的技巧通常可以应用于大多数与
    MIDlet 生命周期以及 Java ME 核心平台本身相关的不一致性。


    你可能遇到的其他平台特定不一致性包括：可同时运行的最大线程数（JSR-185 规定至少为 10 个，但某些设备支持的数量更少）、任何时刻可保持打开的网络连接数等等。这些问题可以通过例如在同一线程上运行不同任务，或在使用完连接后立即关闭而不是保持打开以备后用等方式来克服。如果你遵循本书前面提到的关于灵活编写
    Java ME 代码的规则，应该能够相对轻松地克服这些不一致性。


    关于可选 API 实现方式的不一致性也相当普遍。例如，MMAPI 为其 `Player` 对象定义了一个清晰的生命周期，包含五个状态：`UNREALIZED`、`REALIZED`、`PREFETCHED`、`STARTED`
    和 `CLOSED`。根据规范，你应该能够在需要时从较高状态转移到较低状态（例如，从 `PREFETCHED` 到 `REALIZED`），以节省资源，并且一旦播放器停止播放，它应该返回到
    `PREFETCHED` 状态，以便可以再次播放。


    不幸的是，并非所有实现都能正确做到这一点。在某些设备上，你无法从 `STARTED` 状态转移到 `PREFETCHED` 状态（负责此操作的 `deallocate()`
    调用要么抛出异常，要么什么都不做），而某些设备则根本不会向已注册的 `PlayerListener` 通知所有事件（例如，如果 `VOLUME_CHANGED`
    事件接连快速发生，你可能收不到通知）。


    可选 API 不一致性的影响有时也不那么容易识别：除非你在调用 `deallocate()` 前后都检查空闲内存量，否则很难确定该调用是否真的如规范所述那样释放了任何内存。有时，真正从播放器释放内存的唯一方法是移除对播放器及其关联对象的所有引用，然后让垃圾回收器发挥其魔力——这要求你不仅要管理
    `Player`，还要管理 `DataSource`、`Control` 等。

    '
- fmt: '**NOTE:** Global problems can even be related to a single method, like in
    the foregoing `deallocate()` case, but if the effect of the problem is global
    and affects other parts of the application, or if the solution isn''t a purely
    local one, then you are indeed facing a global problem.


    These inconsistencies, while global in scope and usually easily spotted, are somewhat
    harder to handle because their root causes are not so easy to pinpoint. The problem
    stems from the fact that JSRs or optional APIs are usually highly esoteric and
    serve a very specific purpose, so you need quite a bit of experience with them
    before you can get a feel for how things should work: to keep with the previous
    examples, while it is quite easy to determine that the `pauseApp()` method does
    not get called and to work around this by using `showNotify()`/`hideNotify()`,
    it''s a bit more difficult to figure out exactly why `deallocate()` does nothing
    and what it takes to get it working properly.


    Basically what you need in this case is information, and much more of it and much
    more specific than you would need for dealing with localized or general platform
    inconsistencies. As such, the first step to solving optional API inconsistencies
    is to thoroughly read both the standard documentation *and* the vendor-specific
    documentation pertaining to the API in question. Sometimes just reading through
    the vendor-specific documentation provides helpful hints, whether it''s corner
    cases and the way the vendor implementation handles them, known bugs, or even
    usage examples or comments that highlight the way the vendor''s implementation
    actually works. The Internet is also especially helpful here, as you''re very
    likely to find forum topics or blog posts related to the exact specific problem
    you are dealing with—which is usually not covered in any book or other “official”
    reading material you might find available.


    You can also treat these issues exactly like fragmentation issues to gather more
    information (this has been covered previously in the chapter); see how other devices
    behave and try to figure out why your target device behaves differently, run tests,
    and simulate various other scenarios. This is often an overlooked step, mainly
    because optional API inconsistencies have a very narrow scope, and developers
    tend to examine them in the same narrow scope.


    Once you have sufficient information, it''s time to fix the problem. Ideally,
    if you''re facing a known bug, there''s also a known workaround. The workaround
    may not always be in code. For example, you might need to re-encode your media
    files, ask the user to upgrade to a specific firmware version or to install an
    official patch, or configure his device in a certain way.


    It can also be the case that there is no known workaround that applies to your
    scenario for whatever reason, in which case you''ll have to come up with your
    own workaround. It has been my experience that with optional APIs you really have
    to get creative, which is why having as much information as possible is crucial.
    The API isn''t releasing memory? OK, try to make more available memory from another
    part of the application. Having problems receiving certain event notifications?
    No problem—manually do a periodic check for changes.


    Once you have a workaround, it''s time to integrate it into your application.
    This usually requires adding an extra code layer to your application that sits
    between the API and your application code, or it requires architectural changes.


    It''s also quite possible that there is simply no workaround you can use, in which
    case you have to treat the situation exactly like you would treat an unimplementable/unavailable
    feature. This is hard to do psychologically if you''re facing just a “small bug”
    in an otherwise perfectly functional API implementation, but I have seen many
    man-hours spent trying to overcome such “small bugs”—wasted time that could have
    otherwise been spent productively. That is not to say that you should give up
    the moment you see an API inconsistency, but if you''ve done your research, tried
    everything, and run out of ideas, then it''s time to move on. On more full-blown
    platforms, it might be worth it to dig deeper and throw more time at the problem,
    because you have more possibilities to explore and more resources to work with,
    but Java ME is a tight platform, and there''s only so much you can do with it
    when things don''t go your way.'
