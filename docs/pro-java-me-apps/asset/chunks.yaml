  trans: '

    #### 支持网络限速与休眠模式


    休眠模式对于长时间运行的应用程序（例如聊天客户端）极为重要。例如，如果应用程序已闲置十分钟，你可以关闭所有打开的连接，从而节省电池电量。当然，这意味着当应用程序退出休眠模式并恢复正常运行时，你必须与服务器重新同步，这可能会导致网络瓶颈，因为需要一次性传输和处理大量信息。这也可能意味着用户无法及时收到某些事件的通知（例如，如果他在应用程序处于休眠模式时收到一条聊天消息，他只能在重新同步时看到该消息，而这可能是几小时甚至几天之后）。


    有一些方法可以弥补休眠模式的这些缺点。其中一种方法是将你的应用程序注册为某个特定短信端口的监听器。然后，服务器可以通过在指定端口向应用程序发送短信来通知它需要恢复运行。当然，这要求目标设备通过
    `PushRegistry` 或特定平台的 API 支持监听传入的短信。此外，这种方法几乎肯定会产生大量的短信发送成本，而你或你的用户将不得不承担这些费用。


    另一种解决方法是进行周期性唤醒。在这种方案中，应用程序会定期从休眠模式中唤醒，建立与服务器的单一连接，并询问是否有任何感兴趣的事件发生。如果答案是“是”，应用程序就恢复正常运行并与服务器同步。如果答案是“否”，应用程序则立即重新进入休眠模式。如果满足某些条件，应用程序在与服务器同步后也可以重新进入休眠模式。例如，如果用户不想收到新聊天消息的通知，应用程序可以重新进入休眠状态，直到用户明确唤醒它。


    第二种方法在成本上要友好得多，尽管在电池效率上稍逊一筹，因为需要定期建立新的连接，尽管每次连接的时间很短。


    至于限速，有意降低数据吞吐量有时是个好主意。例如，假设用户正在浏览一个图片库。即使你每秒可以从服务器检索 30 张图片，但如果你将自己限制为仅 20 张，并且只按需下载图片（即，你不预先加载整个图库），用户不会察觉到差异，但你会节省大量的数据流量和相当多的电池电量，因为一个活跃的（正在传输）数据连接比空闲的连接消耗更多电量。


    限速可以应用于大多数旨在按顺序访问的数据，因为很多时候应用程序在到达数据流末尾之前就被中断了（例如，如果一个图库有 10,000 张图片，用户很可能不会全部浏览完）。大量信息（日志、报告、书籍、客户信息等）可以通过这种方式高效且经济地传输到移动设备上，你也可以使用这种技术来流式传输媒体和其他内容。


    最后，限速还能改善用户体验。由于每秒需要处理的数据量减少，应用程序的 CPU 使用率降低，从而能够更流畅地运行。


    #### 高效传输数据


    在传输信息的方式上，你也需要富有创造性和实用性。例如，假设你需要将一份幻灯片传输到移动设备上，每张幻灯片包含一张图片和一个或多个文本片段。你会如何处理？使用自定义协议（或任何支持二进制数据的现有协议）将纯文本（文本片段）和二进制数据（图片）合并到单个流中当然是可行的。然而，更简单且更有效的方法是直接使用纯文本协议，并在纯文本中嵌入指向相关二进制数据的
    URL。


    这种方法有几个好处。首先，它保持了协议的简单性，使其更容易被人理解，也更容易被机器解析。其次，由于协议是纯文本，它非常有利于压缩。第三，因为图片和文本是分开的，你可以分别处理它们。例如，你可以一次下载多张图片，或者只下载用户当前正在查看的幻灯片对应的图片，或者完全忽略图片而只显示文本。所有这些操作，如果使用单流方法，即使不是不可能，也是非常困难的。


    还有一个问题是使用什么协议。需要注意的是，XML 并不是唯一的协议！例如，我是 JSON 的粉丝，因为它比 XML 更简洁，更容易实现，并且同样易于阅读和理解。另一个被大多数人忽视的好选择是
    YAML，它可以说是 JSON 的“老大哥”。所有这些都是基于文本的协议，这完全没问题，因为对于封装二进制数据，你可以使用前面描述的“嵌入指向二进制资源的
    URL”的方法。


    **注意：** 我能想到的使用二进制协议的唯一理由是，将传输开销保持在绝对最低水平。即使这个理由也值得商榷，因为对于大量数据而言，基于文本的协议（XML 除外）的开销与传输的数据总量相比，大部分情况下是微不足道的。


    #### 保持网络代码轻量


    网络层的全部职责应该是：建立与服务器的连接，将来自服务器的数据转换为客户端特定的类实例（反之亦然），并响应与网络相关的事件（连接断开、休眠模式激活等）。


    其他所有事情（在服务器上发起高级数据请求、处理传入数据、指示应用程序进入休眠和唤醒等）都应在网络模块*之外*完成。将外部逻辑添加到网络代码中可能很有诱惑力，大多数时候是因为这样做方便省事，但从长远来看，这只会让事情变得复杂：代码变得混乱，逻辑分散在整个应用程序中。


    例如，将“决定应用程序是否需要进入休眠”的代码直接添加到网络层可能很有诱惑力，毕竟，要进入休眠的是网络连接。然而，如果后来决定应用程序可以在用户请求时或因其他多种原因进入休眠，并且决定应用程序的其他部分也应该对“即将进入休眠”事件做出反应，那么将该代码放在网络层就会成为一个问题。


    到那时，你要么保留决策代码并修改它以匹配新的需求（请记住，你现在正在向网络模块添加非网络逻辑），要么将其移动到一个单独的位置（可能是它自己的模块），然后将其与网络模块的其余部分对接。这两种方法不仅复杂，而且存在风险，可能会导致届时已经相当复杂的应用程序出现故障。


    通过让网络模块严格包含与网络相关的代码，可以轻松避免这种情况。诚然，进入休眠是与网络相关的，但进入休眠的*决策*与网络无关。这意味着前面提到的决策代码从一开始就不属于网络模块，而应该放在它自己的模块中，或者放在与之相关的模块中（例如自动化模块）。'
- fmt: '#### Be Independent


    You should design your code and architecture so that neither the server nor the
    client relies on the other party to perform in a certain manner (as in “do this,
    or I will crash”). Be lenient and always assume that something might go wrong;
    have a fallback option in case something does.


    For example, never assume that the server will send you valid information; try
    to check the data received from the server before use (if it makes sense to do
    so and if it''s possible) and notify the user of any irregularities. Also, never
    assume that the server will respond to your requests, since a network or power
    outage can happen at any time. Institute timeouts so that if you don''t get a
    response from the server in a timely fashion, the user is informed of this and
    the application fails gracefully.


    An offline mode is always a handy thing to have in your applications. You can
    use a queue to store requests and then send them to the server once the application
    goes back online.


    Finally, design everything to be asynchronous, if possible. This minimizes the
    impact of network latency and outages, while providing flexibility. And, because
    the application doesn''t have to wait for the server to respond before proceeding,
    it will also feel snappier for the user.


    ### Summary


    We have implemented the networking module for our Twitter client application.
    In the process, we have learned how to properly structure a networking module,
    what pitfalls to look out for, how to convert asynchronous requests to synchronous
    ones, and how to use buffering to improve our application''s efficiency. We have
    also examined a few best practices related to Java ME networking and discussed
    their impact on real-life applications.


    Next, we will write our persistence module and have a closer look at what “persistent
    storage” means in the world of Java ME applications.


    ## Chapter 5


    ## The Persistence Module


    As the name suggests, the persistence module is responsible for storing and preserving
    data for use at a later time and possibly in a different application session.


    The most common usage scenario is keeping track of application parameters (what
    user is currently logged in, whether sound is enabled, etc.) across multiple sessions,
    but it can also be used for other tasks, such as caching large amounts of data
    or for long-term storage of files received from the server.


    Like everything else Java ME, in order to be truly useful and flexible, a persistence
    module should have a well-thought-out architecture and its code should be simple
    and easy to use by the end developer.


    In this chapter, we will discuss the most important aspects of designing and implementing
    a good persistence module, as well as write the actual implementation we will
    use for our Twitter client. We will discuss what options we have in terms of Java
    ME persistence and see how they compare to each other, what the components of
    a good persistence module are, how these components can be elegantly implemented,
    and more. We will also look at some persistence tips and tricks, like serializing
    primitive data types such as `integer` and `long` to byte arrays in an efficient
    manner, and at how we can elegantly serialize high-level application objects to
    byte arrays.


    **CAUTION:** At the time of this writing, the WTK 3.0 emulator does not preserve
    the RMS between sessions. As such, it is recommended that you use the WTK 2.5.2
    emulator to test RMS persistence. Of course, the code works fine on real devices.


    ### Understanding Java ME Persistence Options


    In the early days of Java ME, the only option you had for persistence was to use
    the Record Management System (RMS). The RMS was initially very limited in size,
    so there wasn''t much you could store in it apart from a few settings. Things
    have gotten a lot better with time, and on current devices the RMS can provide
    sufficient storage space for most applications.


    After Java Specification Request (JSR) 75 came along, developers were given a
    second option: use the device''s filesystem to store data. Back in the day, that
    meant access to a couple of megabytes of persistent storage, but current devices
    support memory cards of 8 or 16 GB, even more, so your Java ME applications can
    basically have access to unlimited storage. However, there is a catch: as data
    is stored on the filesystem, it is available for all applications to see, edit,
    and delete. So while you can use JSR 75 to create something akin to a very large
    cache or a makeshift swapfile, it''s not recommended to use it for storing private
    information like passwords, usernames, and such. It should also be noted that
    not all devices out there support JSR 75. Many extremely cheap devices, especially
    those sold in developing countries, provide only a very basic Java ME implementation,
    and optional components such as JSR 75 are unavailable.


    Last but certainly not least, in recent years there has been a growing shift toward
    the concept of storing data in the cloud. This happened because mobile Internet
    access has gotten cheaper and cheaper—and continues to do so. It has thus become
    feasible to store information remotely on a secure, central server rather than
    (or in addition to) on the device itself. This means that a user''s settings,
    preferences, and critical data can be more secure and have more availability than
    ever. The user doesn''t have to worry if his or her phone gets stolen, and he
    can have the same experience with the application on all his devices: he just
    has to authenticate himself on a new device, and all his preferences will be downloaded
    in a matter of seconds.


    Of course, cloud-based persistence has to take into consideration the fact that
    not all users have Internet access on their devices (or may not be willing to
    allow your application to use it). In some countries, mobile Internet access is
    extremely expensive (almost prohibitively so) so very few people use it. In other
    countries, most notably in the western world, most mobile plans come with some
    free Internet traffic by default (in the range of 10–100 MB/month depending on
    the plan) and extra traffic is fairly cheap, so many people will be OK with allowing
    your application to access the Internet. This discrepancy means that you should
    do thorough research on the subject if you''re targeting the international market.


    These are the three main methods of providing persistence capabilities in the
    Java ME world. By far the most widely used method of persistence is the RMS-based
    one. Second to RMS-based persistence is cloud-based persistence, used by many
    applications ranging from IM clients to PIM suites. Finally, there are very few
    applications that I know of that make use of filesystem-based persistence: only
    a few GPS applications and a couple of larger games come to mind. It is interesting
    to note that an application can use multiple persistence methods. For example,
    data could be saved both in the RMS, for quick local access, and in the cloud,
    for safety and for when the user switches to a different device.


    So how do you decide which persistence method is best for your application?


    As a rule of thumb, whenever possible, try to limit yourself to using RMS-based
    persistence only, as it provides the best balance between speed, storage size,
    and availability. Even if you will also use other persistence mechanisms, always
    have RMS persistence implemented as a backup.'
