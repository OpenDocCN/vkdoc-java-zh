- fmt: '### Adding Intent Detection


    This is a concept I have rarely seen implemented, but one that can do wonders.
    The main idea behind it is that people tend to do the same tasks with an application
    over and over again, so the application can detect this repetition and anticipate
    the user''s intent. For example, let''s say you are organizing your contacts in
    a chat application. You move one contact to group A, and then you move another
    contact and then another. At this point, when you select the fourth contact, the
    application could ask whether you want to move said contact to group A as well,
    thus anticipating your intent and saving you time.


    Implementing this in practice is fairly straightforward. You simply check your
    *action history* to see whether the user''s last couple of actions are similar—for
    example, say the user has set the same tags on five different photos. If those
    actions are similar to what the user seems to be doing currently, present that
    user with the option to repeat the process with respect to the current application
    context (that is, with respect to the currently selected photo).


    There are, of course, technical difficulties related to this that you will need
    to overcome. For one thing, you have to add support for actions and action history.
    This means you will need to remember the relevant information about each action.
    You can do this by storing each action as a set of key/value pairs, each pair
    indicating a specific parameter of the performed action.


    Then you need to see how similar the actions are. This means you will need to
    implement a comparator for each type of action, because it usually isn''t enough
    to check whether 80 percent of the key/value pairs of two actions match. Instead,
    you have to look at the meaning behind each pair and at what they mean collectively.
    For example, if the user tags the first three photos with the tags *photo1*, *photo2*,
    and *photo3*, there''s a good chance the fourth one will be tagged with *photo4*.


    Then you will need to implement a *merger manager* for each type of action, to
    merge the current application context information with the context information
    found in the stored actions. For example, for an *edit tags* action, the merger
    manager should be able to create a new edit tags action with the tag information
    from the history and the file information (name, path) from the currently selected
    file.


    Finally, because this is a fine touch we''re discussing, you can''t just ask out
    of the blue whether the user wants to perform an action, because that would be
    invasive. A nice solution is to have a small onscreen indicator show up when an
    intent has been detected. Then, when the user performs a long keypress on a certain
    key or taps the onscreen indicator, the program asks whether that user wants to
    perform the suggested action.


    However, the main problem with intent detection is the sheer variety of possible
    scenarios. For example, similar actions may not always be consecutive entries
    in the action history list, in which case you would need to look deeper into the
    action history to find a match. It may also be the case that the user performed
    *more than one* repeat action (for example, *edit tags* followed immediately by
    *move to folder*), in which case the application should suggest both actions together
    instead of just *edit tags*. The list can go on, but the idea is that intent detection
    is somewhat difficult to pull off, especially in the context of Java ME applications.
    So why mention it in the first place? One reason and one reason only: because
    it is a trademark of top-of-the-line applications.


    Furthermore, while full intent-detection support is nearly impossible to implement
    in Java ME, partial support is quite manageable. Start with analyzing some telemetry
    data to get a feel for what the most widely performed user actions are and add
    intent detection for those in the simplest possible context (for example, 80 percent
    of parameters match exactly, actions are repeated consecutively). Then get user
    feedback, and based on it either add support for more actions or fine-tune support
    for existing ones (for example, implement detection of nonconsecutive repeat actions,
    add support for parameters that almost match, and so on). Thanks to the 80-20
    rule, you will be able to get a decent amount (from the user''s point of view)
    of intent detection implemented with relatively little effort and an acceptable
    level of resource consumption.


    ### Synchronizing Your Data Between Devices


    In many cases, people use the same application on different devices, either because
    they own more than one device or because they are switching from one device to
    another. In these cases, it is worth adding automatic synchronization support
    to the application, to keep the application in sync between different devices,
    especially if the application itself is client-server based by nature.


    Let''s take, for example, the case of a chat client. When the user logs in, the
    application can query the server for chat messages newer than the latest chat
    message present on the device (that is, for messages exchanged when the application
    was used on another device). The number of imported messages should be user configurable,
    but a default of 20–30 messages is usually sufficient to give the user context,
    and the data traffic caused by importing them is negligible.


    **NOTE:** Synchronization via other means, such as a memory card or Bluetooth,
    is possible but trickier to implement properly as a fine touch because of the
    lack of control over the environment. For example, some devices always ask the
    user to confirm file system or Bluetooth access. Other devices are configured
    either by default or by the users themselves to leave Bluetooth on forever after
    it is started (you can turn it off only manually) and this would make the application
    needlessly drain the battery. When it''s not possible to implement synchronization
    as a fine touch, you should try implementing it as a regular feature instead.


    Regardless of the application you are writing, synchronizing everything between
    devices is not only unnecessary, it''s also not recommended because of the monetary
    costs involved and the time it would take to perform the sync. You should always
    try to sync only the bare minimum amount of information to keep the user experience
    consistent between devices, and sync everything else only as needed or when the
    user explicitly requests it.


    Synchronization support is more important than you may think. It is not yet a
    crucial feature, but it is one of those “I wish the app had this” features that
    tend to make users very happy when present and somewhat disappointed when missing.
    The importance of synchronization is rising as more and more people tend to own
    more than one mobile phone. Furthermore, it is also not a very common feature
    in the Java ME world, so it will make your application stand out from the crowd.


    Finally, synchronization doesn''t have to be strictly between mobile phones. For
    example, you can synchronize the phone''s address book with the user''s desktop
    calendar application or social networking accounts. This is a particularly interesting
    feature to have in cross-platform projects, where the desktop and mobile applications
    can seamlessly exchange data between them. However, make sure to implement this
    as a fine touch—that is, make it completely optional and do not hinge any of your
    application''s functionality on it unless you absolutely have to.'
  raw: '#### Adding Intent Detection


    This is a concept I have rarely seen implemented, but one that can do wonders.
    The main idea behind it is that people tend to do the same tasks with an application
    over and over again, so the application can detect this repetition and anticipate
    the user''s intent. For example, let''s say you are organizing your contacts in
    a chat application. You move one contact to group A, and then you move another
    contact and then another. At this point, when you select the fourth contact, the
    application could ask whether you want to move said contact to group A as well,
    thus anticipating your intent and saving you time.


    Implementing this in practice is fairly straightforward. You simply check your
    *action history* to see whether the user''s last couple of actions are similar—for
    example, say the user has set the same tags on five different photos. If those
    actions are similar to what the user seems to be doing currently, present that
    user with the option to repeat the process with respect to the current application
    context (that is, with respect to the currently selected photo).


    There are, of course, technical difficulties related to this that you will need
    to overcome. For one thing, you have to add support for actions and action history.
    This means you will need to remember the relevant information about each action.
    You can do this by storing each action as a set of key/value pairs, each pair
    indicating a specific parameter of the performed action.


    Then you need to see how similar the actions are. This means you will need to
    implement a comparator for each type of action, because it usually isn''t enough
    to check whether 80 percent of the key/value pairs of two actions match. Instead,
    you have to look at the meaning behind each pair and at what they mean collectively.
    For example, if the user tags the first three photos with the tags *photo1*, *photo2*,
    and *photo3*, there''s a good chance the fourth one will be tagged with *photo4*.


    Then you will need to implement a *merger manager* for each type of action, to
    merge the current application context information with the context information
    found in the stored actions. For example, for an *edit tags* action, the merger
    manager should be able to create a new edit tags action with the tag information
    from the history and the file information (name, path) from the currently selected
    file.


    Finally, because this is a fine touch we''re discussing, you can''t just ask out
    of the blue whether the user wants to perform an action, because that would be
    invasive. A nice solution is to have a small onscreen indicator show up when an
    intent has been detected. Then, when the user performs a long keypress on a certain
    key or taps the onscreen indicator, the program asks whether that user wants to
    perform the suggested action.


    However, the main problem with intent detection is the sheer variety of possible
    scenarios. For example, similar actions may not always be consecutive entries
    in the action history list, in which case you would need to look deeper into the
    action history to find a match. It may also be the case that the user performed
    *more than one* repeat action (for example, *edit tags* followed immediately by
    *move to folder*), in which case the application should suggest both actions together
    instead of just *edit tags*. The list can go on, but the idea is that intent detection
    is somewhat difficult to pull off, especially in the context of Java ME applications.
    So why mention it in the first place? One reason and one reason only: because
    it is a trademark of top-of-the-line applications.


    Furthermore, while full intent-detection support is nearly impossible to implement
    in Java ME, partial support is quite manageable. Start with analyzing some telemetry
    data to get a feel for what the most widely performed user actions are and add
    intent detection for those in the simplest possible context (for example, 80 percent
    of parameters match exactly, actions are repeated consecutively). Then get user
    feedback, and based on it either add support for more actions or fine-tune support
    for existing ones (for example, implement detection of nonconsecutive repeat actions,
    add support for parameters that almost match, and so on). Thanks to the 80-20
    rule, you will be able to get a decent amount (from the user''s point of view)
    of intent detection implemented with relatively little effort and an acceptable
    level of resource consumption.


    #### Synchronizing Your Data Between Devices


    In many cases, people use the same application on different devices, either because
    they own more than one device or because they are switching from one device to
    another. In these cases, it is worth adding automatic synchronization support
    to the application, to keep the application in sync between different devices,
    especially if the application itself is client-server based by nature.


    Let''s take, for example, the case of a chat client. When the user logs in, the
    application can query the server for chat messages newer than the latest chat
    message present on the device (that is, for messages exchanged when the application
    was used on another device). The number of imported messages should be user configurable,
    but a default of 20–30 messages is usually sufficient to give the user context,
    and the data traffic caused by importing them is negligible.


    **NOTE:** Synchronization via other means, such as a memory card or Bluetooth,
    is possible but trickier to implement properly as a fine touch because of the
    lack of control over the environment. For example, some devices always ask the
    user to confirm file system or Bluetooth access. Other devices are configured
    either by default or by the users themselves to leave Bluetooth on forever after
    it is started (you can turn it off only manually)and this would make the application
    needlessly drain the battery. When it''s not possible to implement synchronization
    as a fine touch, you should try implementing it as a regular feature instead.


    Regardless of the application you are writing, synchronizing everything between
    devices is not only unnecessary, it''s also not recommended because of the monetary
    costs involved and the time it would take to perform the sync. You should always
    try to sync only the bare minimum amount of information to keep the user experience
    consistent between devices, and sync everything else only as needed or when the
    user explicitly requests it.


    Synchronization support is more important than you may think. It is not yet a
    crucial feature, but it is one of those “I wish the app had this” features that
    tend to make users very happy when present and somewhat disappointed when missing.
    The importance of synchronization is rising as more and more people tend to own
    more than one mobile phone. Furthermore, it is also not a very common feature
    in the Java ME world, so it will make your application stand out from the crowd.


    Finally, synchronization doesn''t have to be strictly between mobile phones. For
    example, you can synchronize the phone''s address book with the user''s desktop
    calendar application or social networking accounts. This is a particularly interesting
    feature to have in cross-platform projects, where the desktop and mobile applications
    can seamlessly exchange data between them. However, make sure to implement this
    as a fine touch—that is, make it completely optional and do not hinge any of your
    application''s functionality on it unless you absolutely have to.'
  trans: '

    #### 添加意图检测


    这是一个我很少见到被实现的概念，但它却能带来奇效。其核心思想在于，人们往往会反复使用应用程序执行相同的任务，因此应用程序可以检测到这种重复性，并预判用户的意图。例如，假设你正在一个聊天应用中整理联系人。你将一个联系人移动到
    A 组，然后又移动另一个，接着再移动一个。此时，当你选中第四个联系人时，应用程序可以询问你是否也想将该联系人移动到 A 组，从而预判你的意图并为你节省时间。


    在实践中实现这一点相当直接。你只需检查你的*操作历史*，看看用户最近几次的操作是否相似——例如，假设用户给五张不同的照片设置了相同的标签。如果这些操作与用户当前正在进行的操作相似，那么就向用户提供一个选项，使其能够针对当前的应用程序上下文（即，针对当前选中的照片）重复该过程。


    当然，这涉及到一些你需要克服的技术难题。首先，你必须添加对操作和操作历史的支持。这意味着你需要记住每个操作的相关信息。你可以通过将每个操作存储为一组键/值对来实现，每个键值对表示所执行操作的一个特定参数。


    然后，你需要判断这些操作的相似程度。这意味着你需要为每种类型的操作实现一个比较器，因为仅仅检查两个操作 80%的键值对是否匹配通常是不够的。相反，你必须审视每个键值对背后的含义以及它们的整体意义。例如，如果用户给前三张照片分别贴上了*photo1*、*photo2*和*photo3*标签，那么第四张照片很可能会被贴上*photo4*标签。


    接着，你需要为每种类型的操作实现一个*合并管理器*，用于将当前应用程序上下文信息与存储的操作中找到的上下文信息进行合并。例如，对于一个*编辑标签*操作，合并管理器应该能够创建一个新的编辑标签操作，该操作包含来自历史记录的标签信息以及来自当前选中文件的文件信息（名称、路径）。


    最后，由于我们讨论的是一种精妙的细节处理，你不能突然询问用户是否想执行某个操作，因为那样会显得唐突。一个不错的解决方案是，当检测到意图时，在屏幕上显示一个小型指示器。然后，当用户长按某个按键或点击屏幕上的指示器时，程序再询问用户是否想要执行建议的操作。


    然而，意图检测的主要问题在于可能出现的场景种类繁多。例如，相似的操作在操作历史列表中可能并不总是连续的条目，在这种情况下，你需要更深入地查看操作历史才能找到匹配项。也可能出现用户执行了*不止一个*重复操作的情况（例如，*编辑标签*之后紧接着*移动到文件夹*），在这种情况下，应用程序应该同时建议这两个操作，而不仅仅是*编辑标签*。这样的例子不胜枚举，但核心思想是，意图检测实现起来有些困难，尤其是在
    Java ME 应用程序的背景下。那么，为什么还要提及它呢？原因只有一个：因为它是顶级应用程序的标志。


    此外，虽然在 Java ME 中实现完整的意图检测支持几乎不可能，但实现部分支持是相当可行的。首先分析一些遥测数据，了解用户最常执行的操作是什么，然后在最简单的上下文中为这些操作添加意图检测（例如，80%的参数完全匹配，操作连续重复）。然后获取用户反馈，并据此要么增加对更多操作的支持，要么微调对现有操作的支持（例如，实现非连续重复操作的检测，增加对近似匹配参数的支持等）。得益于
    80-20 法则，你将能够以相对较少的精力和可接受的资源消耗水平，实现相当可观（从用户角度来看）的意图检测功能。


    #### 在设备间同步数据


    在许多情况下，人们会在不同的设备上使用同一个应用程序，要么是因为他们拥有不止一台设备，要么是因为他们正在从一台设备切换到另一台设备。在这些情况下，值得为应用程序添加自动同步支持，以保持不同设备间应用程序的数据同步，尤其是当应用程序本身本质上是基于客户端-服务器架构时。


    以聊天客户端为例。当用户登录时，应用程序可以向服务器查询比设备上最新聊天消息更新的聊天消息（即，当应用程序在另一台设备上使用时交换的消息）。导入的消息数量应可由用户配置，但默认导入
    20-30 条消息通常足以让用户了解上下文，并且导入这些消息所产生的数据流量可以忽略不计。


    **注意：** 通过其他方式（如存储卡或蓝牙）进行同步是可行的，但要将其作为精妙的细节处理来实现则比较棘手，因为缺乏对环境的控制。例如，有些设备总是要求用户确认文件系统或蓝牙访问权限。其他设备要么默认配置，要么由用户自己配置为在蓝牙启动后永远保持开启状态（只能手动关闭），这会导致应用程序不必要地消耗电池。当无法将同步作为精妙的细节处理来实现时，你应该尝试将其作为一项常规功能来实现。


    无论你正在编写什么应用程序，在设备间同步所有内容不仅不必要，而且也不推荐，因为这涉及到金钱成本以及执行同步所需的时间。你应该始终只同步维持设备间用户体验一致性所需的最少量信息，而其他所有内容则仅在需要时或用户明确要求时才进行同步。


    同步支持比你想象的要重要。它目前还不是一个关键功能，但它属于那种“我希望这个应用有这个功能”的特性，有它会让用户非常满意，没有则会让他们有些失望。随着越来越多的人拥有不止一部手机，同步的重要性正在日益提升。此外，在
    Java ME 世界中，这也不是一个非常普遍的功能，因此它能让你的应用程序从众多应用中脱颖而出。


    最后，同步不必严格局限于手机之间。例如，你可以将手机通讯录与用户的桌面日历应用或社交网络账户进行同步。这在跨平台项目中是一个特别有趣的功能，桌面端和移动端应用程序可以在它们之间无缝交换数据。但是，请确保将其作为精妙的细节处理来实现——也就是说，使其完全可选，并且除非万不得已，不要将应用程序的任何功能依赖于它。

    '
- fmt: '### Improving User Interaction


    I mentioned in the beginning of the chapter that a good feature set is critical
    in order to have your application stand out, from the user''s perspective. This
    is true, and your application should be able to do everything it advertises it
    can do, and it should be able to do it well. The accent here is on *do it well*,
    as quality is more important than quantity. Users would rather use a program with
    fewer features that work well all the time than a program with a slew of features
    that are buggy and unreliable. As such, you should always cover the core features
    first, and always make sure the currently implemented features work as well as
    possible before implementing new features. By doing so, you ensure that your application
    is as robust as possible and that the user''s experience with your application
    is smooth and pleasant. Correct?


    Not necessarily. Solid features aren''t enough for a good user experience. The
    way the user interacts with these features can make or break an application regardless
    of how good the features are.


    Unfortunately, user interaction is one of the areas that is sadly overlooked in
    the mobile world. That is not to say that this area is given a lot of thought
    in the desktop world either. However, in the desktop world, you usually have friends
    and Internet access to help you when you''re stuck. In the case of a mobile application,
    you may be facing a problem somewhere alone and with no online access. In addition,
    as stated earlier, Java ME users tend to be less tech-savvy than smartphone users,
    and this subsequently increases the need for quality user interaction.


    For these reasons, it is crucial that you get user interaction right, or as right
    as possible within the technical constraints of your Java ME application. There
    are basically two sides to user interaction: how the user interacts with the application
    itself and with its features, and how the user interacts with the company that
    made the application and with application-related services. The following pages
    cover the most important ways these two aspects can be improved in your applications.
    As with fine touches, the list is by no means exhaustive; it covers only the most
    important and generally applicable topics.


    **NOTE:** Everything discussed in the “Adding Fine Touches to Your Application”
    section generally counts as a user interaction improvement too.


    ### Eliminating User Confusion


    People working in the mobile industry tend to assume that their users have a higher
    degree of familiarity with the application at hand (and with mobile devices in
    general) than they do in reality. This can lead to usability issues for users,
    which in turn leads to frustration and lost customers.


    For example, one of my favorite Java ME applications, a multinetwork IM client,
    actually requires several sets of credentials: one for the “main account” of the
    program (for logging IM sessions and more) and one for each individual IM account
    you want to use. When the application first starts up, it presents you with a
    login form for the main account, titled “Configure your IM services.” This form
    has two fields, “Username” and “Password,” labeled accordingly. Below these two
    fields is a list containing all your added IM accounts. Initially this list is
    empty, for obvious reasons. To add IM accounts, you go to the application''s contextual
    menu and select “Add services.”


    The problem with this form is that it''s extremely confusing for new users. Think
    about it: you start up the application for the first time, and all you see on
    the screen is a form with the title “Configure your IM services” and the two fields
    for entering your username and password. Many people will instinctively assume,
    as I initially did, that this refers to the credentials of their IM accounts,
    *not* to the credentials of their main account. As such, they will get frustrated
    when their IM account credentials are refused and will consequently remove the
    application from their device, possibly giving it a bad review in the process.


    Ironically, the whole login process is clearly explained on the application''s
    web page, but it''s not explained in the application itself. Furthermore, it''s
    not possible to create a main account from the application itself; you have to
    do this from the Web. Given all of these factors combined, I''m sure many people
    turned away from this application because of the confusing login/sign-up process,
    which is a shame because the program is otherwise really, really good. So what
    should the application developers have done to avoid this?


    First of all, they should have included more information on the screen. For example,
    above the login fields, they could have placed a text box or a ticker (to conserve
    space) with a message clearly formulated to explain that these are the main account
    credentials the user has to enter, *not* the IM account(s) credentials.


    Alternatively, the message in the “credentials rejected” pop-up could ask users
    to ensure that they have entered valid main account credentials, and not IM account
    credentials. Error messages should never be just “something went wrong.” They
    should also include the most probable one or two causes for the error. Likewise,
    if what a user needs to do on a specific screen is reasonably ambiguous, clear
    instructions must be given to the user on the same screen.


    Second, they should have put a button titled “Add IM services” below the login
    fields, separated from them by a horizontal divider. Adding IM services is one
    of the two main actions you can perform on the login form, and main actions should
    *always* be found both in the application''s menu and onscreen. In addition, this
    also clears up a bit of the confusion regarding the “enter your credentials” fields.
    It is true that, given the resolution of most Java ME devices, screen real-estate
    is at a premium and the tendency is to move actions to the menu, but not at the
    expense of confusing the user.


    Third, because the process deals with several accounts and account types, an in-application
    wizard for this would have been great. Wizards are great ways to guide users through
    more-complicated processes, and new or inexperienced users are especially fond
    of them. Sadly, very few Java ME applications seem to have wizards. Therefore,
    their presence can be a major plus for your application if you decide to implement
    them.


    Fourth, they should have added some means of getting in-application help. Granted,
    Java ME applications are usually size-constrained, but at the very least, a link
    to a help page on the Web could have been added. Besides, these days you can usually
    spare 4–6 KB of JAR size to store critical help information directly in the application.
    Dynamic help (as discussed earlier) would have helped a great deal in this situation
    too.


    Fifth, it might have been a good idea to split up more-complicated processes into
    several less-complex forms. For example, the “add main account credentials” and
    “add IM services” steps could have been organized on separate forms, with an option
    to navigate between them. This would have made each form better focused and would
    have allowed the user to concentrate on a single step at a time, without being
    distracted.


    All these tips have the end-goal of eliminating user confusion and increasing
    user satisfaction. By providing visual cues and helpful messages to the user,
    that user then feels more in charge and more comfortable with the application,
    resulting in a more pleasant user experience.'
