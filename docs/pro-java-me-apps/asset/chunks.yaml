- fmt: "#### Learning How to Handle Complexity\n\nAs a side-effect of defensive coding\
    \ and avoiding assumptions, your application's complexity will increase. Handling\
    \ complexity is thus extremely important for Java ME applications. The most common\
    \ weapon employed against complexity, and the most intuitive one, is solid knowledge\
    \ of object-oriented principles and techniques—for example:\n\n- `Polymorphism`\
    \ handles part of the complexity of deciding what methods to call based on what\
    \ parameters are passed.\n- `Inheritance` makes the relationships between data\
    \ types clearer and more contained, so the complexity of understanding the data\
    \ itself and how to manipulate it is partially reduced.\n- The factory pattern\
    \ isolates the complexity of object creation and initialization from the rest\
    \ of the code.\n- `Interfaces` allow for contract-like programming, thus compartmentalizing\
    \ complexity and code in a series of black boxes.\n\nHowever, if you look closely\
    \ at these examples, you will notice something very important: object-oriented\
    \ principles and techniques don't remove complexity, they just hide it or distribute\
    \ it. Take the factory pattern: the fact that the programmer doesn't see the bulk\
    \ of the complexity associated with object creation and initialization doesn't\
    \ mean it's not there.\n\nHowever, in many cases, complexity can be avoided elegantly.\
    \ For example, consider the following scenario:\n\n> “Our application synchronizes\
    \ photos and other media between the user's phone and his social networking accounts,\
    \ typically in batches of hundreds of files. Files range in size from 100 KB to\
    \ 200 MB, distributed more or less evenly across the range. Because of the potentially\
    \ large files involved, sometimes it takes a long time before files appear either\
    \ on the Web or on the device (depending on sync direction), especially when large\
    \ files are involved, and users start to become worried. We want to improve this\
    \ as much as possible and make the transfer seem faster from the user's point\
    \ of view.”\n\nThis sounds like a really complicated problem, involving caches\
    \ and priority queues and other buzzwords, but in reality the solution can be\
    \ very simple. The text clearly indicates that the main problem is that users\
    \ *perceive* the synchronization as being slow. The easiest way around this particular\
    \ scenario, and often the most effective, is to simply sort the files according\
    \ to their size and start sending the smaller ones first.\n\nThe effect of this\
    \ is that the user will see a lot of files being uploaded during the first moments\
    \ of the sync (due to their smaller size), with the number of files uploaded per\
    \ minute or per second gradually decreasing as the application reaches the larger\
    \ ones.\n\nBy that time, two things have happened. Number one, the user sees that\
    \ the sync does, in fact, work and is less worried about this. Number two, the\
    \ user is left with the impression of a fast sync, and thus will not be as bothered\
    \ by the slower sync speed toward the end.\n\nThus, the problem is largely solved\
    \ with very little coding effort and virtually no overhead in terms of complexity.\
    \ Most seemingly complicated problems can be reduced to problems that are a lot\
    \ simpler and easier to solve. So, when you next feel the urge to spend an entire\
    \ workweek solving a seemingly titanic problem, step back for a moment and see\
    \ if you can transform it into something more manageable.\n\n#### Trade-Offs Are\
    \ Your Friends—Use Them Wisely\n\nEvery computer science junior knows that in\
    \ the world of computers almost every resource can be traded for another resource.\
    \ This principle plays a very important role in Java ME programming. Since your\
    \ application is expected to run on a truckload of different devices, you should\
    \ be prepared for situations where one resource is abundant while others are not,\
    \ and tradeoff between them at runtime.\n\nThe classical example is that of CPU\
    \ time vs. memory: you can solve things in less time by using more memory, or\
    \ you can solve them in more time by using less memory.\n\nConsider the following\
    \ example (Listing 1–3), which can be part of any tile-based Java ME game. What\
    \ the code does is change the direction an onscreen entity is facing whenever\
    \ the entity is moved to a different tile in the game world. For the sake of argument,\
    \ let's assume that calculating the angle also has to take into consideration\
    \ the height of the tile and other factors, not just its (x,y) position.\n\n**Listing\
    \ 1–3.** *Changing the Direction a Game Entity Is Facing*\n\n```\npublic void\
    \ entityMoved(int x, int y)\n{\n                ...\n                int angle\
    \ = getAngleForTile (x, y);\n                current.setFacingAngle(angle);\n\
    \                ...\n}\n\npublic int getAngleForTile(int x, int y)\n{\n     \
    \   // some complex calculations involving sine and cosine here\n}\n```\n\nThe\
    \ main problem with this code is that the CPU-heavy `getAngleForTile()` method\
    \ will always calculate the angle for any given (x,y) pair passed as an argument.\
    \ Usually this is not a concern, but when CPU resources are low, the time spent\
    \ in this method might add up to something substantial. This is especially true\
    \ when a lot of onscreen action is taking place, as presumably there will be a\
    \ lot of entities moving around and the method will be called often.\n\nThe best\
    \ way around this problem is to store the result for each (x,y) pair in a matrix,\
    \ and then retrieve it from there instead of calculating it every time. Furthermore,\
    \ you can use lazy initialization so you don't have to calculate all the values\
    \ at once, since this might take a long time and some of the values might not\
    \ even be used. What we will do is this: whenever the method is called for an\
    \ (x,y) pair, we will check if the result is in the matrix. If it is, we'll retrieve\
    \ it from there; if it's not, we'll calculate it, store it in the matrix, and\
    \ return it to the caller. If something changes that requires the matrix to be\
    \ recalculated, we'll simply create a new empty one and let that be filled again\
    \ as needed.\n\nThis means that for a 200-by-200 game world, which is actually\
    \ pretty large, we will need to reserve at most 160 KB of RAM for the matrix.\
    \ I'm saying at most because the idea can be refined further: for example, splitting\
    \ the matrix into smaller pieces, like 50×50, and keeping just the currently visible\
    \ piece in memory.\n\nWe now sacrifice 160 KB of RAM in exchange for a lot of\
    \ CPU time. Fair trade-off for most modern devices, but what happens if the user\
    \ has a browser running in the background and it suddenly loads a very large page?\
    \ Memory will become scarce, and our application might be forced to either free\
    \ up some of it or be shut down.\n\nIn that case, one of the best ways to free\
    \ memory would be to give up our 160 KB matrix and fall back on the CPU to calculate\
    \ the facing direction for any given tile. When more memory becomes available\
    \ again, we can switch back to the old approach. The code can look something like\
    \ what's in Listing 1–4 (`entityMoved()` has been omitted for brevity):\n\n**Listing\
    \ 1–4.** *Changing the Direction a Game Entity Is Facing, the Proper Way*\n\n\
    ```\nboolean isInLowMemoryMode = false;\nint [][] angleMatrix = new int[200][200];\n\
    ```"
  raw: '#### Learning How to Handle Complexity


    As a side-effect of defensive coding and avoiding assumptions, your application''s
    complexity will increase. Handling complexity is thus extremely important for
    Java ME applications. The most common weapon employed against complexity, and
    the most intuitive one, is solid knowledge of object-oriented principles and techniques¬—for
    example:


    *   Polymorphism handles part of the complexity of deciding what methods to call
    based on what parameters are passed.

    *   Inheritance makes the relationships between data types clearer and more contained,
    so the complexity of understanding the data itself and how to manipulate it is
    partially reduced.

    *   The factory pattern isolates the complexity of object creation and initialization
    from the rest of the code.

    *   Interfaces allow for contract-like programming, thus compartmentalizing complexity
    and code in a series of black boxes.


    However, if you look closely at these examples, you will notice something very
    important: object-oriented principles and techniques don''t remove complexity,
    they just hide it or distribute it. Take the factory pattern: the fact that the
    programmer doesn''t see the bulk of the complexity associated with object creation
    and initialization doesn''t mean it''s not there.


    However, in many cases, complexity can be avoided elegantly. For example, consider
    the following scenario:


    “Our application synchronizes photos and other media between the user''s phone
    and his social networking accounts, typically in batches of hundreds of files.
    Files range in size from 100 KB to 200 MB, distributed more or less evenly across
    the range. Because of the potentially large files involved, sometimes it takes
    a long time before files appear either on the Web or on the device (depending
    on sync direction), especially when large files are involved, and users start
    to become worried. We want to improve this as much as possible and make the transfer
    seem faster from the user''s point of view.”


    This sounds like a really complicated problem, involving caches and priority queues
    and other buzzwords, but in reality the solution can be very simple. The text
    clearly indicates that the main problem is that users *perceive* the synchronization
    as being slow. The easiest way around this particular scenario, and often the
    most effective, is to simply sort the files according to their size and start
    sending the smaller ones first.


    The effect of this is that the user will see a lot of files being uploaded during
    the first moments of the sync (due to their smaller size), with the number of
    files uploaded per minute or per second gradually decreasing as the application
    reaches the larger ones.


    By that time, two things have happened. Number one, the user sees that the sync
    does, in fact, work and is less worried about this. Number two, the user is left
    with the impression of a fast sync, and thus will not be as bothered by the slower
    sync speed toward the end.


    Thus, the problem is largely solved with very little coding effort and virtually
    no overhead in terms of complexity. Most seemingly complicated problems can be
    reduced to problems that are a lot simpler and easier to solve. So, when you next
    feel the urge to spend an entire workweek solving a seemingly titanic problem,
    step back for a moment and see if you can transform it into something more manageable.


    #### Trade-Offs Are Your Friends—Use Them Wisely


    Every computer science junior knows that in the world of computers almost every
    resource can be traded for another resource. This principle plays a very important
    role in Java ME programming. Since your application is expected to run on a truckload
    of different devices, you should be prepared for situations where one resource
    is abundant while others are not, and tradeoff between them at runtime.


    The classical example is that of CPU time vs. memory: you can solve things in
    less time by using more memory, or you can solve them in more time by using less
    memory.


    Consider the following example ([Listing 1–3](#Chapter01.html#list_1_3)), which
    can be part of any tile-based Java ME game. What the code does is change the direction
    an onscreen entity is facing whenever the entity is moved to a different tile
    in the game world. For the sake of argument, let''s assume that calculating the
    angle also has to take into consideration the height of the tile and other factors,
    not just its (x,y) position.


    **Listing 1–3.** *Changing the Direction a Game Entity Is Facing*


    `public void entityMoved(int x, int y)`

    `{`

    `                ...`

    `                int angle = getAngleForTile (x, y);`

    `                current.setFacingAngle(angle);`

    `                ...`

    `}`


    `public int getAngleForTile(int x, int y)`

    `{`

    `        // some complex calculations involving sine and cosine here`

    `}`


    The main problem withthis code is that the CPU-heavy `getAngleForTile()` method
    will always calculate the angle for any given (x,y) pair passed as an argument.
    Usually this is not a concern, but when CPU resources are low, the time spent
    in this method might add up to something substantial. This is especially true
    when a lot of onscreen action is taking place, as presumably there will be a lot
    of entities moving around and the method will be called often.


    The best way around this problem is to store the result for each (x,y) pair in
    a matrix, and then retrieve it from there instead of calculating it every time.
    Furthermore, you can use lazy initialization so you don''t have to calculate all
    the values at once, since this might take a long time and some of the values might
    not even be used. What we will do is this: whenever the method is called for an
    (x,y) pair, we will check if the result is in the matrix. If it is, we''ll retrieve
    it from there; if it''s not, we''ll calculate it, store it in the matrix, and
    return it to the caller. If something changes that requires the matrix to be recalculated,
    we''ll simply create a new empty one and let that be filled again as needed.


    This means that for a 200-by-200 game world, which is actually pretty large, we
    will need to reserve at most 160 KB of RAM for the matrix. I''m saying at most
    because the idea can be refined further: for example, splitting the matrix into
    smaller pieces, like 50×50, and keeping just the currently visible piece in memory.


    We now sacrifice 160 KB of RAM in exchange for a lot of CPU time. Fair trade-off
    for most modern devices, but what happens if the user has a browser running in
    the background and it suddenly loads a very large page? Memory will become scarce,
    and our application might be forced to either free up some of it or be shut down.


    In that case, one of the best ways to free memory would be to give up our 160
    KB matrix and fall back on the CPU to calculate the facing direction for any given
    tile. When more memory becomes available again, we can switch back to the old
    approach. The code can look something like what''s in [Listing 1–4](#Chapter01.html#list_1_4)
    (`entityMoved()` has been omitted for brevity):


    **Listing 1–4.** *Changing the Direction a Game Entity Is Facing, the Proper Way*


    `boolean isInLowMemoryMode = false;`

    `int [][] angleMatrix = new int[200][200];`'
  trans: '

    #### 学习如何应对复杂性


    防御性编程和避免假设会带来一个副作用：应用程序的复杂性会增加。因此，处理复杂性对于 Java ME 应用程序来说至关重要。应对复杂性最常用也最直观的武器，就是扎实掌握面向对象的原则和技术，例如：


    *   **多态**处理了根据传入参数决定调用哪个方法这一部分复杂性。

    *   **继承**使数据类型之间的关系更清晰、更内聚，从而部分降低了理解数据本身及其操作方式的复杂性。

    *   **工厂模式**将对象创建和初始化的复杂性与其余代码隔离开来。

    *   **接口**允许进行契约式编程，从而将复杂性和代码封装在一系列黑盒中。


    然而，如果你仔细审视这些例子，你会发现一个非常重要的事实：面向对象的原则和技术并没有消除复杂性，它们只是隐藏或分散了复杂性。以工厂模式为例：程序员看不到与对象创建和初始化相关的大部分复杂性，但这并不意味着它不存在。


    不过，在很多情况下，复杂性是可以被优雅地避免的。例如，考虑以下场景：


    “我们的应用程序在用户的手机和他的社交网络账户之间同步照片和其他媒体文件，通常一次同步数百个文件。文件大小从 100 KB 到 200 MB 不等，在整个范围内分布得大致均匀。由于涉及可能的大文件，有时文件出现在网页上或设备上（取决于同步方向）需要很长时间，尤其是在涉及大文件时，用户开始变得担心。我们希望尽可能改善这一点，从用户的角度让传输看起来更快。”


    这听起来像是一个非常复杂的问题，涉及缓存、优先级队列和其他时髦术语，但实际上解决方案可能非常简单。文本明确指出，主要问题是用户*感知*到同步速度慢。解决这个特定场景最简单、通常也是最有效的方法，就是简单地根据文件大小进行排序，并优先发送较小的文件。


    这样做的效果是，用户会在同步开始的最初阶段看到大量文件被上传（因为它们体积较小），随着应用程序处理到较大的文件，每分钟或每秒上传的文件数量会逐渐减少。


    到那时，两件事已经发生。第一，用户看到同步确实在工作，因此不那么担心了。第二，用户留下了同步速度很快的印象，因此不会因为最后阶段同步速度变慢而感到困扰。


    因此，这个问题在很大程度上用很少的编码工作就解决了，并且几乎没有增加复杂性方面的开销。大多数看似复杂的问题都可以简化为更简单、更容易解决的问题。所以，下次当你觉得需要花整整一周时间来解决一个看似艰巨的问题时，先退一步，看看能否将其转化为更易于管理的问题。


    #### 权衡取舍是你的朋友——明智地利用它们


    每个计算机科学初学者都知道，在计算机世界里，几乎每种资源都可以用另一种资源来交换。这一原则在 Java ME 编程中扮演着非常重要的角色。由于你的应用程序预计要在大量不同的设备上运行，你应该为一种资源丰富而其他资源匮乏的情况做好准备，并在运行时在它们之间进行权衡。


    经典的例子是 CPU 时间与内存的权衡：你可以通过使用更多内存来缩短解决问题的时间，或者通过使用更少内存来延长解决问题的时间。


    考虑以下示例（清单 1–3），它可以是任何基于瓦片的 Java ME 游戏的一部分。这段代码的作用是，每当屏幕上的实体移动到游戏世界中的不同瓦片时，改变该实体面对的方向。为了便于讨论，我们假设计算角度时还必须考虑瓦片的高度和其他因素，而不仅仅是它的
    (x, y) 位置。


    **清单 1–3.** *改变游戏实体面对的方向*


    `public void entityMoved(int x, int y)`

    `{`

    `                ...`

    `                int angle = getAngleForTile (x, y);`

    `                current.setFacingAngle(angle);`

    `                ...`

    `}`


    `public int getAngleForTile(int x, int y)`

    `{`

    `        // 这里进行一些涉及正弦和余弦的复杂计算`

    `}`


    这段代码的主要问题在于，CPU 密集型的 `getAngleForTile()` 方法总是会为传入的任何 (x, y) 对计算角度。通常这不成问题，但当 CPU
    资源紧张时，在这个方法上花费的时间可能会累积到相当可观的程度。当屏幕上有很多动作发生时尤其如此，因为可以推测会有大量实体在移动，该方法会被频繁调用。


    解决这个问题的最佳方法是将每个 (x, y) 对的结果存储在一个矩阵中，然后从那里检索，而不是每次都重新计算。此外，你可以使用惰性初始化，这样就不必一次性计算出所有值，因为那可能会花费很长时间，而且有些值可能根本用不到。我们要做的是：每当为某个
    (x, y) 对调用该方法时，我们检查结果是否在矩阵中。如果在，我们就从那里检索；如果不在，我们就计算它，将其存储在矩阵中，然后返回给调用者。如果某些情况发生变化需要重新计算矩阵，我们只需创建一个新的空矩阵，并让它根据需要再次被填充。


    这意味着对于一个 200×200 的游戏世界（这实际上相当大），我们最多需要为矩阵预留 160 KB 的 RAM。我说“最多”是因为这个想法可以进一步优化：例如，将矩阵拆分成更小的块，比如
    50×50，并且只在内存中保留当前可见的部分。


    现在我们牺牲了 160 KB 的 RAM 来换取大量的 CPU 时间。对于大多数现代设备来说，这是一个公平的权衡，但如果用户后台运行着一个浏览器，并且它突然加载了一个非常大的页面，会发生什么？内存会变得稀缺，我们的应用程序可能被迫释放部分内存，或者被关闭。


    在这种情况下，释放内存的最佳方法之一就是放弃我们的 160 KB 矩阵，退而使用 CPU 来计算任何给定瓦片面对的方向。当有更多内存可用时，我们可以再切换回原来的方法。代码可能类似于清单
