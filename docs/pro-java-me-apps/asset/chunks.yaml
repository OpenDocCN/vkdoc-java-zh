    ### 旋转图像


    在开始之前，需要说明的是，要正确理解这个主题，需要具备良好的数学知识（尤其是三角学）。不过，我会尽力以最非数学化的方式来解释。


    *图像旋转*是所有平台（包括桌面和移动平台）上最广泛使用的图像操作之一。它最常用于游戏或多媒体应用程序中，但对商业应用程序也有实际价值。不幸的是，Java
    ME 中对标准图像旋转的支持极其有限。你只能以 90 度的倍数角度旋转图像；自由角度旋转是不可行的。这是一个主要的限制，因为很多时候你需要以“非标准”角度（即不是
    90 度的倍数）旋转图像。


    例如，如果你想为你的应用程序创建一个仪表盘控件，你需要能够以任意角度绘制指示针。使用可用的标准函数，有三种方法可以实现：为每个可能的角度创建一张图像，但这会显著增加
    JAR 文件的大小；创建较少的图像，但会损失精度；或者使用诸如 `drawLine()` 之类的底层函数来绘制仪表盘，但这会将你限制在一个非常粗糙且难看的指针上。这些选项都不太令人满意。


    因此，最好的做法是实现你自己的图像旋转函数，使其能够以任意角度旋转图像。这听起来可能令人生畏，但一旦你理解了所涉及的数学原理，这并不特别难做到。事实上，图像旋转是一个相当简单的操作。因为每张图像都是由单个像素组成的，要旋转一张图像，你所要做的就是围绕同一个参考点（通常是图像的中心）旋转其所有像素。你基本上是在一遍又一遍地执行相同的简单操作。


    为此，我们需要的最基本的东西是在笛卡尔坐标系中围绕原点旋转一个点的公式。其背后的数学原理很难在短短几段文字中解释清楚，而且超出了本书的范围（不过这是一个相当有趣的阅读内容，能让你深入了解
    2D/3D 变换的世界以及如何在计算机上实现这些变换）。因此，我们只需直接使用这个公式。该公式见代码清单 13-9。


    **代码清单 13-9.** *在笛卡尔坐标系中围绕原点旋转一个点*


    `x'' = x * cos(a) - y * sin(a)`

    `y'' = x * sin(a) + y * cos(a)`


    在上述公式中，`(x,y)` 是点的原始坐标，`(x’,y’)` 是该点绕原点旋转 `a` 度后的结果坐标。与大多数实用的 2D/3D 变换一样，这个公式出奇地简单。


    任何图像都可以内接在一个矩形中，这个矩形被称为它的*边界框*。对于未旋转的图像，边界框的大小与图像大小相同。然而，一旦你旋转了图像，你将需要一个更大的边界框来容纳它，如图
    13-7 所示。


    ![images](img/1307.jpg)


    **图 13-7.** *旋转图像时，边界框的尺寸会增大。*


    接下来我们需要做的是计算出旋转后图像的边界框尺寸。有几种方法可以做到这一点，让我们选择最合理的一种（不一定是最快或最高效的）。

    '
- fmt: "为了计算边界框的大小，我们将从原始图像的边界框开始，并围绕原点旋转其四个角，就像旋转图像本身一样。然后，我们查看四个结果点的坐标，记录遇到的最小和最大`x`和`y`坐标——最终得到`minX`、`maxX`、`minY`、`maxY`。最大`x`坐标与最小`x`坐标之差是结果边界框的宽度，最大`y`坐标与最小`y`坐标之差是结果边界框的高度。\n\
