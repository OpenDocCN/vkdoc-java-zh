  trans: '

    ### 下一步研究什么


    我首先建议你尽可能多地阅读与 Java ME 开发相关的两个关键主题：代码优化和图形处理。这两个领域对于创建具有竞争力且用户友好的、高度精致的应用程序至关重要。它们也是
    Java ME 相比其他移动平台的主要弱点，因为你需要自行优化代码，并且除了最基本的图形操作外，其他所有内容都必须从头开始实现。


    接下来可能应该涵盖算法和数据结构。这些主题对于任何平台上的专业应用程序都很重要，但对于 Java ME 尤其重要，因为使用正确的算法和数据结构，决定了你的应用程序是会耗尽资源并/或崩溃，还是能够平稳运行、毫无卡顿。


    另一个你应该研究的领域是用户界面设计和用户交互，特别是专注于小屏幕 UI 的文献。如果你想充分利用你的应用程序，这方面的良好知识非常重要。请记住，无论你的应用程序在技术上多么出色，用户仍然需要能够轻松使用它。此外，这不仅仅是一个“设计问题”；你在研究这个主题时获得的知识将帮助你更好地编写和实现你的
    UI，因为你将更深入地理解其背后运作的原理。


    如果你尚未涉足，跨平台开发和应用程序移植也应该列入你的研究清单。这已经是一个很大的领域，但随着 MIDP 3.0 设备进入市场，它将变得更为重要。此外，即使你只针对
    Java ME 进行开发，亲身体验其他平台如何完成各种任务，以及 Java ME 在具体场景中与它们相比如何，都将极大地帮助你优化开发流程。


    最后，这听起来可能有些不同寻常，你应该研究一下 80 年代的微型计算机平台，例如 Commodore 64 或 ZX Spectrum。阅读相关资料，玩玩模拟器，尝试感受它们的应用程序是什么样的，以及这些应用程序是如何编写的。Java
    ME 和这些老平台共享着一种精神：用极其有限的资源完成不可思议的事情，并通过创新和跳出框架的思考来突破底层平台的界限。因此，研究这些昔日的计算机将帮助你更好地把握和理解
    Java ME 软件开发的本质。


    ### 结语


    本书的主要目标是解释如何以专业的方式处理 Java ME 开发过程的每个方面，从最初的规划到最终的精细打磨。我真诚地希望这个目标已经实现，并且在你阅读完这些章节后，你获得了宝贵的见解和信息，这将帮助你成为一名更优秀的
    Java ME 开发者。


    我也希望本书采用编写和讨论一个完整的 Java ME 应用程序，而不是处理独立的代码片段的方法，能让你对编写一个专业级 Java ME 应用程序所需的条件有一个完整的认识，并更好地理解本书中介绍的技巧和技术如何在现实场景中应用。


    最后，我希望你阅读本书的过程是愉快的，并且它激发了你探索、尝试新事物，并突破当今 Java ME 平台可能性的极限。


    祝你编码愉快！


