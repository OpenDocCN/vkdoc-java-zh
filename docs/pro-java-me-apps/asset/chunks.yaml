- fmt: 'As you might suspect, thinking outside the box is crucial to being able to
    keep things simple; the two go hand in hand. One project I worked on required
    scripting support; that is, scripts would need to be downloaded from the server
    and run on the device. The idea behind this was to be able to upgrade or change
    the application’s behavior and/or feature set at runtime. The problem was that,
    as expected, running scripts on a Java ME device is not very fast, nor very resource-friendly.


    The initial approach was to parse and run the scripts, which were in plain-text
    form, directly on the device, directly as is. This, of course, did not work very
    well: the performance was simply abysmal.


    The second approach proposed was to convert the scripts into a parse tree (or
    abstract syntax tree) once we got them on the device. This was far better that
    the initial approach, but the conversion still had to be done on the device, which
    made the initial conversion slow. Furthermore, the language we used (a C look-alike)
    was pretty complex, so a full parser for it wouldn’t be easy to write and execute
    within the confines of a Java ME device. Plus, converting a script on the device
    for the first time would take a really, really long time.


    As such, the third approach was to do the conversion from script file to syntax
    tree on the server side—or at least outside of the device. This worked great,
    as the syntax tree was immediately usable on the device once we received it from
    the server. But there was still a problem here: storing the tree, going from node
    to node as needed, and executing each node were still not fast enough for our
    purposes.


    Our forth and final approach solved this problem too. The syntax tree would get
    converted to bytecode (again, on the server side), which would be executed on
    a virtual machine within our Java ME application. Instead of a tree structure,
    we could now use a simple array to store the script’s instructions, and executing
    the script became much faster. Furthermore, script size was considerably lowered
    because of this, as were the memory requirements.


    Overall, we were able to create larger and more complex scripts, which downloaded
    faster and ran faster. The code needed to run the scripts on the actual device
    was also very simple, because all we had to do was go through the source array
    and blindly execute the bytecode present there. And, as an added bonus, the scripts
    could be written in any language (though only the original C variant was implemented)
    as long as a corresponding bytecode converter existed.


    We were able to achieve this very elegant and simple solution by thinking outside
    the box and by identifying the core problem (and requirement) correctly. In our
    case, the problem was not “How can we run scripts on the device?” but rather “How
    can we script the device’s behavior?” The difference, though subtle, is important.


    ## Standardizing the User Experience


    Like it or not, Java ME as a platform does not have a user-recognizable identity.
    In other words, users are unable to just look at an application and say, “Hey,
    this is a Java ME application!” and then proceed to use said application using
    a standard set of metaphors and paradigms (good examples are pressing an element
    for a second or two, which brings up the contextual menu on Android, or the fact
    that iOS applications always tend to have a kind of navigation bar at the top
    of the screen).


    This inability stems primarily from the fact that Java ME does not have a clear
    and standardized set of specifications detailing how the user interface of an
    application should look and behave, what the platform’s user experience best practices
    are, and what the platform’s key identifiable elements that separate it from the
    other platforms are, as far as the user is concerned.


    Without such an identity, and without clear and comprehensive user experience
    rules, you may end up confusing and frustrating users. For example, what you usually
    do these days is build your application around a high-quality UI toolkit as you
    see fit. This is quite easy to do, as modern UI toolkits are more or less on par
    with desktop UI toolkits. In the end, although you followed no platform guidelines,
    the application itself looks great and feels great.


    The problem is that everybody does this, and, while roughly the same widgets are
    used across all applications, the actual user experiences are not similar at all:
    different applications still have different UI structures (e.g., one may be tab-based,
    while another may be form-based) and different subtleties (e.g., different ways
    to access the contextual menus, different ways to navigate from screen to screen,
    etc.).


    This means that users have to learn how to use each application and must get accustomed
    to each application’s interaction paradigms. Furthermore, it means that something
    to which the user is accustomed in one application (e.g., kinetic scrolling) may
    not be available in another application, and vice versa. Switching from application
    to application can become a bit confusing even for more advanced users; less tech-savvy
    ones will definitely find the experience frustrating. This being said, there are
    better ways to approach the user interface and user experience problem.


    One alternative to the frustration just described is to try to provide a standardized
    experience to users, an experience to which they can relate even outside the boundaries
    of your application and that they will find intuitive. The first question that
    needs to be asked is: standardized to what? As stated previously, there are no
    official guidelines pertaining to this, at least not to a level relevant to today’s
    applications: the best you’ll find are some general procedures and guidelines
    referring to how commands map to softkeys and other such low-level stuff pertaining
    to the now outdated `javax.microedition.lcdui` package.


    **NOTE:** Sadly, not having a set of up-to-date user experience guidelines affects
    not only individual applications but also the Java ME platform as a whole, as
    being a “no man’s land” is never a good way to increase awareness and attract
    users. As far as publicity is concerned, Java ME is fighting a losing battle with
    Android, iOS, and Blackberry—and, in my opinion, one of the main reasons it’s
    losing is precisely the lack of a user experience standard.


    Thus, the only sane and reasonable thing to do is emulate other mobile platforms.
    Prime candidates for this are, of course, Android and iOS. As far as the basic
    UI goes, as long as you use a capable UI toolkit, you should have no problems
    emulating said platforms: you may have to write a custom component or two and
    change a few things here and there, but the bulk of the work is easy-peasy, and
    you will get to reuse it on future projects as well.'
