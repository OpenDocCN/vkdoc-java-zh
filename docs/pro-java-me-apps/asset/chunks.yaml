  trans: '

    ### 理解优秀本地化模块的特性


    一个优秀的本地化模块应具备灵活性、简洁性和智能性。它应占用较小的代码体积和资源空间，易于扩展，并且其编写方式应能支持多种可能的输入源。


    本地化字符串通常以键/值对的形式存储，其中键是像“`button.quit.label`”这样的通用标识符，而值则是字符串本身。这些键/值对可以从多种来源获取：来自网络、来自
    JAR 内的文本文件，甚至可以在应用程序中硬编码（例如通过使用主题）。有些应用程序会组合使用多个来源。


    选择合适的输入源至关重要，因为每个来源都有其优缺点。例如，将本地化内容作为主题的一部分硬编码到应用程序中速度非常快，但其缺点是非程序员难以更新，并且无法在运行时（例如通过网络）进行更新。使用存储在应用程序
    JAR 内的文件是一种改进，因为非程序员可以轻松更新本地化字符串，并且基于文件的本地化机制可以很容易地扩展以支持基于网络的本地化（或至少通过网络进行更新）。最后，基于网络的本地化（即从网络下载本地化文件）是目前最灵活的方法，但其缺点是需要付费，并且依赖于可用的网络连接。


    优秀本地化模块的另一个特性是，选择正确的区域设置是在本地化模块内部透明完成的。应用程序代码应能指定一个可选的用户首选区域设置以及一个强制性的默认区域设置，但由本地化模块来决定实际使用哪个区域设置。通常的优先级顺序如下：用户指定的区域设置、手机当前区域设置（可在运行时获取），最后是应用程序的默认区域设置。除了指定用户首选区域设置和默认区域设置外，通用应用程序代码根本不应关心区域设置，也不应关心实际使用了哪个区域设置。它唯一需要做的就是从本地化模块请求某个键的值，并相应地使用该值。


    一个优秀的本地化模块还应支持参数化区域设置字符串（“您有 X 封电子邮件”）。参数化本地化字符串极其重要，因此令人惊讶的是，我所见过的大多数 Java ME
    本地化框架都有一个明显的遗漏：它们没有考虑参数的值。具体来说，经常出现的情况是，X=0 的模板与 X=1 或 X>=2 的模板略有不同。在前面的例子中，对于
    X=0，模板应为“没有新邮件”；对于 X=1，模板应为“您有一封新邮件”；对于 X>=2，模板应为“您有 X 封新邮件”。如果本地化模块中没有添加对此的支持，则必须在应用程序代码中添加，而正如我们所看到的，这是一种不良实践。当然，X
    也可以是一个字符串（而非数字），并且对于任何本地化字符串，您可以拥有一个“通用模板”以及任意数量的自定义模板。


    ### 理解原生 Java ME 本地化


    Java ME 确实通过移动国际化 API（也称为 JSR 238）提供了自己的“内置”本地化和国际化支持。移动国际化 API 涵盖了最常见的本地化相关任务，即字符串和资源的本地化，以及货币、数字、日期和时间的格式化。


    JSR 238 的最大优势当然在于其速度和资源消耗：作为原生 API 实现，它通常在这些方面比非原生 API 更高效，有时甚至高效得多。


    然而，JSR 238 确实有两个主要缺点。首先也是最重要的，它并非在所有设备上都可用。这意味着，只有当您专门针对支持它的设备时，才能依赖它；否则，您将不得不为那些不支持
    JSR 238 的设备自行实现本地化支持。


    其次，它不如一个编写得当的自定义本地化实现那样灵活或强大。例如，对于 JSR 238，本地化和资源文件必须位于应用程序的 JAR 内，因此无法从网络下载新的本地化数据和资源，并且也不支持参数化本地化字符串。


    由于这两个缺点，大多数开发者选择自行实现本地化模块。然而，需要注意的是，如果您只针对支持 JSR 238 的设备，并且只需要 JSR 238 所支持的功能，那么
    JSR 238 可以（实际上也确实是）一个不错的选择。

