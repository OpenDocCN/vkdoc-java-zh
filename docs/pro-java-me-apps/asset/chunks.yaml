- fmt: '### Testing the Application in a Variety of Scenarios


    Testing in different scenarios is especially important considering the variety
    of Java ME devices out there. They come in all shapes and sizes, with all kinds
    of screens, and with all kinds of keyboard/keypad layouts.


    Compared to desktop or web applications, mobile applications get used in a much
    wider variety of scenarios: one-hand usage, usage while walking, usage in sunlight,
    and so forth. Each of these scenarios has particularities that should be tested.
    For example, is it possible to operate the application with just one hand? Does
    the application function well in landscape mode, even with one-hand operation?
    Are the text and graphics large and clear enough to be understandable even when
    the user is not staying still? Does the color scheme used provide enough contrast
    to be usable in sunlight?


    Then there is also the session duration factor. If the application is designed
    for short, frequent usage (for example, a stock market ticker application), then
    it is crucial that the application starts up quickly and provides as much information
    at a glance as possible, without the screen becoming too crowded. If the application
    is designed for long usage sessions it is crucial that it is not tiresome to use,
    neither visually nor functionally.


    Always make sure that you cover every possible scenario and usage path. This is
    often easier said than done, especially as most test cases are designed “by ear”
    and overall they tend to leave untested a lot of areas of the application. The
    idea is to really test out every nook and cranny of your application, even if
    it’s something so simple and logical that you don’t think it’s worth testing,
    and to do this in every single usage scenario and on every single device you need
    to support. Most of the errors I’ve encountered in real-life Java ME applications
    were glaring (for example, a button that is enabled when it should be disabled,
    a list that messes up its scroll when the device orientation changes, and so on).
    In contrast, I’ve encountered considerably fewer subtle bugs.


    You should also test your application with real-life users too, not just testers
    who do this for a living. With this in mind, you should choose a well-diversified
    user base for testing, not just people who fit your target market (though obviously
    they should be the bulk of your guinea pig army). People of all ages and backgrounds
    can give you precious information about how good your application really feels,
    and you can get some valuable insight on how to improve or adapt your application
    to reach people not originally part of your target market (remember, Java ME users
    cover a much wider gamut than smartphone users).


    A good strategy for having a well-diversified user base for testing, especially
    if you’re writing an interesting and cool application, is to create a web page
    from which people interested in trying out your application can register for a
    closed beta test. Each person who registers should enter information such as age,
    profession, degree of familiarity with mobile phones, and the current phone or
    phones they are using. In exchange for submitting their honest opinion about your
    application and the occasional bug report, they get to use your application well
    before it reaches the market. It’s a win-win situation.


    Finally, covering device particularities in your test scenarios is also important.
    As mentioned in the beginning of this section, Java ME devices come in various
    form factors, keyboard/keypad layouts, and screen sizes. Is your current application
    interface suitable for all devices? Do you need a custom UI layout for device
    X? Does device X have all the necessary keys (for example, BlackBerry devices
    don’t have softkeys) required to operate the application comfortably and, if not,
    how can we improve the situation? Does the device have a full keyboard and, if
    so, does the application take advantage of it optimally? These are all important
    questions that should be examined during the testing phase.


    ### Testing Performance Improvement and Optimization Techniques


    As a Java ME developer, after a while you start to have your own “bag of dirty
    tricks” that you use in a variety of scenarios. These are typically optimization
    tricks or techniques that help make your application faster, more stable, or more
    flexible.


    This is obviously a good thing, and this bag of tricks is what separates novice
    developers from experienced ones. However, a common pitfall experienced developers
    often fall into is blindly reusing the techniques and optimizations they have
    learned in the past. Just because something was effective on a device from two
    years ago doesn’t mean it will also be effective on the device you’re working
    with now. Similarly, something that works on a high-end device might actually
    make the situation worse on a low-end device.


    A very effective way to test what works and what doesn’t work on a certain device
    is to create a special test application just for this. Basically, such an application
    would be just a bunch of unit tests, except instead of testing application functionality,
    you would test programming tricks and techniques. The result of running this automated
    application would be a full report detailing whether each of the tested tricks
    and techniques works and, if it does, what kind of performance improvements it
    offers.


    The key to a successful test application in this context is having proper and
    reliable input data. Each test should be run on at least five or six widely different
    data sets (sometimes even more) in order to provide a conclusive overview—anything
    less, and the results can be considered conjectural.


    Furthermore, some tests should be dynamic in nature. For example, a test dealing
    with threading optimizations and thread-related architecture should take into
    consideration the number of maximum threads each device supports, because there
    is a big difference between a device supporting 10 threads, one supporting 20,
    and one supporting only 5. (Although the requirements state that a compliant implementation
    should support a minimum of 10 threads, some implementations aren’t compliant).
    The same goes for memory allocation tests and pretty much any other test that
    deals with variable environmental conditions.


    Once you have these test results, you can use them not only to get a better picture
    of the device’s capabilities, but also to automatically choose the most appropriate
    solution for it. For example, you can integrate the test results with your preprocessor,
    allowing it to choose the best code path for your current device. This can serve
    as a kind of automated application optimization process, and it can greatly reduce
    the time it takes to optimize your application (especially if you’re looking to
    squeeze every last ounce of performance out of it).


    Finally, it should be noted that the results of the tests aren’t always translated
    in real-life scenarios. It’s one thing to run a block of code inside a test case,
    and it’s quite another to run it alongside other blocks of code within a real
    application. This being said, a properly engineered test case can make up for
    this deficiency by using carefully selected input data and by adding “garbage”
    to the environment (for example, threads that do nothing but consume resources).'
