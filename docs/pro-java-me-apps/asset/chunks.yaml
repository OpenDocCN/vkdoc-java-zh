    networks (through various means) are not unheard of.


    Finally, connection to the Internet from a mobile device is also considerably
    more expensive for the end user, so if you send a lot of data, try to compress
    it. This reduces not only cost, but also the time needed to transfer information,
    both of which will make your users happy. However, this is done at the expense
    of CPU time, so compressing/decompressing large amounts of data in a short amount
    of time isn''t feasible unless the device has a very powerful CPU.


    #### Remember the Limitations of the Devices You''re Targeting


    All mobile devices have networking limitations. Some limitations you are certainly
    aware of, like a device''s maximum throughput (for example, GPRS is slower than
    EDGE, which is slower than 3G) and maximum number of simultaneous connections
    (some older devices can handle only two, while others can handle ten or more).
    Other limitations are more obscure, like the time it takes to initiate a new connection
    and low-level protocol support (there are quite a lot of devices that don''t support
    UDP; some devices have problems with certain types of HTTPS certificates). Be
    aware of all these limitations and design your networking layer accordingly.


    For example, if the device you''re targeting does not support HTTPS, then this
    means that you have to encrypt and decrypt sensitive data yourself, which can
    be extremely CPU-intensive. It is also possible that the device you''re targeting
    supports only certain SSL certificates—for example, only those that do not contain
    wildcards. This problem can be fixed on the server side—for example, by generating
    a new and compatible certificate—but sometimes this is simply not possible for
    a variety of reasons (some technical, some business-related). In this case, you
    are again stuck with handling encryption within the application.


    The time it takes to initiate a new connection is important if you connect to
    a lot of IPs—for example, in a peer-to-peer application. If creating a new connection
    takes unusually long or if doing so has other adverse effects (for example, if
    it freezes the application for a second or two), then you should consider reducing
    either the number of connections you use (for example, by using the same connection
    for more than one purpose) or the frequency at which new connections are created.'
  trans: '

    #### 移动互联网的特殊性


    在编写网络代码时，切勿忘记移动互联网与家庭/办公网络具有不同的参数。它的速度较慢，因此你可能需要为消息添加时间戳，并设置比桌面应用更宽松的超时间隔。


    时间戳有助于确保数据按顺序并在正确的时间范围内处理。例如，如果你正在编写一个用于监控车队速度的转速表应用，可能会发生这样的情况：由于网络问题，相隔一分钟发送的两条读数会同时到达。为了计算正确的加速度和速度，你必须知道每条读数被*采集*的时间，而不是它*到达*你的时间。时间戳能优雅地解决这个问题。


    时间戳也可用作数据完整性检查。例如，如果你知道每 10 秒真实时间应收到一条新消息，而连续两条消息的时间戳相差 20 秒，那么你基本可以确定某条消息在传输过程中丢失了。


    此外，时间戳对于实时游戏或其他可使用数据插值的应用也很有用。这是因为时间戳允许你使用 UDP 而非 TCP/IP，从而改善感知到的网络延迟。当然，UDP 可能会（而且很可能）丢失一些消息，但由于每条到达的消息都带有时间戳，你可以直接利用该时间信息来插值推断中间发生的情况。


    移动互联网的另一个特点是其可靠性通常低于固定位置的互联网。因此，使用校验和来确保一切正确总是一个好主意（校验和有时甚至可用于重建丢失或损坏的数据）。校验和可以应用于单条消息，也可以应用于一系列消息（以确保你收到了所有消息且顺序正确）。校验和还可以作为一种基本的防篡改机制：如果生成校验和的算法不为第三方所知，或者依赖于仅参与方知道的某些值，那么消息内容与其校验和之间的任何差异都表明可能存在数据篡改企图。在免费无线接入点普遍存在（且不安全）、针对移动网络的中间人攻击（通过各种手段）也并非闻所未闻的世界里，这可以作为额外的安全层。


    最后，对于最终用户而言，从移动设备连接到互联网的成本也相当高，因此如果你要发送大量数据，请尝试进行压缩。这不仅能降低成本，还能减少传输信息所需的时间，这两点都会让你的用户感到满意。然而，这是以消耗
    CPU 时间为代价的，因此除非设备拥有非常强大的 CPU，否则在短时间内压缩/解压大量数据是不可行的。


    #### 牢记目标设备的局限性


    所有移动设备都有网络限制。有些限制你肯定了解，比如设备的最大吞吐量（例如，GPRS 比 EDGE 慢，EDGE 又比 3G 慢）和最大并发连接数（一些较旧的设备只能处理两个，而其他设备可以处理十个或更多）。其他限制则更为隐蔽，比如建立新连接所需的时间以及底层协议支持（有相当多的设备不支持
    UDP；有些设备在处理某些类型的 HTTPS 证书时存在问题）。要了解所有这些限制，并据此设计你的网络层。


    例如，如果你的目标设备不支持 HTTPS，那么这意味着你必须自行加密和解密敏感数据，这可能会极其消耗 CPU 资源。你的目标设备也可能只支持某些 SSL 证书——例如，只支持那些不包含通配符的证书。这个问题可以在服务器端解决——例如，通过生成一个新的、兼容的证书——但有时由于各种原因（有些是技术原因，有些是业务原因），这根本不可能。在这种情况下，你再次陷入需要在应用程序内部处理加密的困境。


    如果你需要连接大量 IP 地址（例如在对等网络中），建立新连接所需的时间就很重要。如果创建新连接耗时异常长，或者这样做会产生其他不良影响（例如，导致应用冻结一两秒钟），那么你应该考虑减少使用的连接数量（例如，通过复用同一连接实现多个目的）或降低创建新连接的频率。

    '
- fmt: '#### Support Network Throttling and Sleep Mode


    Sleep mode is extremely important for long-running applications, such as chat
    clients. For example, if the application has been idle for ten minutes, you can
    close all open connections and thus save battery life. This, of course, means
    that you have to re-sync with the server when the application leaves sleep mode
    and resumes normal operation, and this may cause a networking bottleneck, as a
    potentially large amount of information needs to be transferred and processed
    at once. It may also mean that the user does not get notified of certain events
    in a timely fashion (for example, if he receives a chat message and the app is
    in sleep mode, he will see that message only during the re-sync, which may be
    hours or even days away).


    There are ways to compensate for these shortcomings of sleep mode. One such way
    is registering your application as a listener on a certain SMS port. The server
    can then notify the app that it needs to resume operation by sending it an SMS
    on the specified port. Of course, this implies that the target device has support
    for listening to incoming SMS messages, via either the `PushRegistry` or a platform-specific
    API. In addition, this approach will almost certainly incur significant costs
    in terms of the SMS messages sent, and either you or your users will have to support
    these costs.


    Another workaround is doing periodic wake-ups. In this scenario, the application
    periodically wakes up from sleep mode, establishes a single connection to the
    server and asks if anything of interest has happened. If the answer is “yes,”
    the app resumes normal operation and syncs with the server. If the answer is “no,”
    the app goes back into sleep mode at once. The app can also go back into sleep
    mode after syncing with the server, if certain conditions are met. For example,
    if the user does not want to be notified of new chat messages, the app can go
    back to sleep until the user explicitly wakes it up.


    This second approach is considerably more cost-friendly, although less battery-efficient
    as new connections have to be established periodically, albeit for a small period
    of time.


    As for throttling, reducing data throughput intentionally is a good idea sometimes.
    For example, let''s say the user is browsing through an image gallery. Even though
    you could retrieve 30 images per second from the server, if you limit yourself
    to just 20 and only download images as needed (i.e., you do not load the entire
    gallery beforehand), the user won''t notice the difference, but you will save
    a lot of data traffic and a fair amount of battery life, because an active (transmitting)
    data connection consumes more power than an idle one.


    Throttling can be applied to most data that is meant to be accessed sequentially,
    because many times the application is interrupted before it can get to the end
    of the data stream (for example, if a gallery has 10,000 images, chances are the
    user won''t go through all of them). Large amounts of information (logs, reports,
    books, customer information, etc.) can be efficiently and cost-effectively transmitted
    to a mobile device this way, and you can also use this technique to stream media
    and other content.


    Finally, throttling also improves the user experience. As less data has to be
    processed each second, the application experiences less CPU usage and thus is
    able to function more smoothly.


    #### Transmitting Your Data Efficiently


    You also have to be creative and practical about the way you transmit information.
    For example, let''s say you need to transmit a slideshow to a mobile device, and
    each slide contains an image and one or more snippets of text. How would you approach
    this? Merging plain text (the snippets) and binary data (the pictures) in a single
    stream using a custom protocol (or any existing protocol that supports binary
    data) is certainly feasible. However, it''s much easier and much more effective
    to simply use a plain-text protocol and embed an URL to the associated binary
    data inside the plain text.


    This approach has several benefits. First, you keep the protocol simple, which
    makes it more easily understood by humans and more easily parsed by machines.
    Second, as the protocol is plain text, it is very compression-friendly. Third,
    because the images and text are split, you can work on them separately. For example,
    you could download multiple images at once, or download just the image for the
    slide the user is currently viewing, or ignore the images altogether and display
    just the text. All of these things are difficult if not impossible to pull off
    using a single-stream approach.


    There is also the matter of what protocol to use. It should be noted that XML
    is not the only protocol out there! For example, I''m a fan of JSON because it''s
    less verbose than XML, easier to implement, and just as easy to read and understand.
    Another good pick that most people overlook is YAML, JSON''s big brother of sorts.
    All of these are text-based protocols, which is perfectly fine because for encapsulating
    binary data you can use the “embed an URL to a binary resource” approach just
    described.


    **NOTE:** The only reason I can think of for using a binary protocol is keeping
    transmission overhead at an absolute minimum. Even this is a questionable reason,
    as for large amounts of data, the overhead of a text-based protocol (with the
    exception of XML) is mostly insignificant when compared to the total amount of
    data transferred.


    #### Keeping the Networking Code Light


    All the networking layer should really do is establish a connection to the server,
    convert the data coming from the server to instances of classes specific to the
    client (and vice versa), and respond to networking-related events (connection
    down, sleep mode activated, etc.).


    Everything else (issuing a high-level request for data on the server, processing
    the incoming data, instructing the application to go to sleep and wake up, etc.)
    should be done *outside* the networking module. It may be tempting to add outside
    logic to the networking code, most of the time because it is handy and convenient
    to do so, but this only ends up complicating things in the long run: the code
    gets messy and the logic gets scattered throughout the application.


    For example, it may be tempting to add the “decide if the app needs to go to sleep”
    code directly to the networking layer since, after all, it''s the network connections
    that are going to sleep. However, if later on it is decided that the app can go
    to sleep at the user''s request or for a number of other reasons, and if it''s
    decided that other parts of the application should react to the “going to sleep”
    event as well, then having that code in the networking layer will become a problem.


    At that point, you can either keep the decision code in place and change it to
    match the new requirements (keep in mind that you are now adding non-networking
    logic to the networking module), or move it to a separate location (perhaps its
    own module) and then interface it with the remainder of the networking module.
    Both approaches not only are complicated, but also create the risk that something
    will break in what will by then be a rather complicated application.


    This scenario can be easily avoided by having the networking module contain strictly
    networking-related code. Granted, going to sleep is network-related, but the *decision*
    to go to sleep has nothing to do with networking. This means that the decision
    code previously mentioned does not belong in the networking module to begin with,
    and should end up in a module of its own or in a module to which it is related
    (like the automation module, for example).'
