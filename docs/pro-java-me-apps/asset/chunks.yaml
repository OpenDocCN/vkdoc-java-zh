    \n至此，代码本身已经足够清晰，因此不再赘述。请查看[图 8–3](#Chapter08.html#fig_8_3)，了解设置屏幕在 WTK 模拟器上的显示效果。\n\
    \n![images](images/0803.jpg)\n\n**图 8–3.** WTK 模拟器上的设置屏幕\n\n需要指出的是，设置代码存在一个缺陷：更改语言/区域设置需要重启应用程序。这是因为应用程序的所有表单字段都是在表单的构造函数中创建的，而构造函数显然只会被调用一次。\n\
    \n要实现运行时语言/区域设置的更改，需要一个`buildFormStructure()`方法，该方法能在需要时重建表单，并且可以按需调用。或者，可以实现一个`reloadLanguage()`方法，该方法在被调用时，会为表单内所有控件设置相应的文本/标题。\n\
    \n然而，在当前应用程序代码中实现这两种方法中的任何一种，都需要对应用程序和 UI 框架结构进行重大修改。例如，重建表单会对用户体验产生严重影响（例如，当前焦点元素的信息会丢失，滚动偏移量以及可能与\
    \ UI 状态相关的其他重要信息也会丢失），而更改控件上的文本则需要 UI 框架的支持，并且如果新文本溢出或明显小于原始文本，则可能意味着需要完全重新布局当前表单。出于这个原因，以及为了代码的清晰和简洁，这些功能已从当前代码库中省略，并留给读者作为练习。\n\
    \n为了完成我们应用程序的代码，我想介绍一下`EVT`类。\n\n### 实现 EVT 类\n\n当你想熟悉一个新项目时，`EVT`类可能是你首先应该查看的地方。它基本上是一个应用程序中所有可能发生的事件的中央仓库，能让你快速了解应用程序应该如何运行以及其关键流程是什么，同时它也为分支探索和浏览源代码树提供了一个绝佳的中心点。你只需沿着“事件轨迹”走，迟早会找到你需要调试那个奇怪\
    \ bug 的代码部分，或者理解某个方法被使用的原因和位置。\n\n以我们的 Twitter 客户端为例，`EVT`类如[清单 8–11](#Chapter08.html#list_8_11)所示。\n\
    \n**清单 8–11.** `EVT`类\n\n```\npackage com.apress.framework.objecttypes;\n\npublic\
    \ class EVT\n{\n    public class CONTEXT\n    {\n        public static final int\
    \ STARTUP = 1;\n        public static final int LOGIN_FORM = 2;\n        public\
    \ static final int NETWORKING_MODULE = 3;\n        public static final int UI_MODULE\
    \ = 4;\n        public static final int MAIN_FORM = 5;\n        public static\
    \ final int SETTINGS_FORM = 6;\n    }\n\n    public class PROGRAM_FLOW\n    {\n\
    \        public static final int SHOW_WELCOME_SCREEN = 10001;\n        public\
    \ static final int SHOW_MAIN_SCREEN = 10002;\n        public static final int\
    \ SHOW_SETTINGS_SCREEN = 10003;\n        public static final int APPLICATION_START\
    \ = 10004;\n        public static final int APPLICATION_PREPARE_SHUTDOWN = 10005;\n\
    \        public static final int APPLICATION_EXIT = 10006;\n        public static\
    \ final int INITIATE_SHUTDOWN = 10007;\n        public static final int INITIATE_LOGOUT\
    \ = 10008;\n    }\n\n    public class TWEETS\n    {\n        public static final\
    \ int REQUEST_MAIN_TWEETS_BATCH = 20001;\n        public static final int RECEIVED_TWEET\
    \ = 20002;\n        public static final int POST_TWEET = 20003;\n    }\n\n   \
    \ public class NETWORK\n    {\n        public static final int BEGIN_LOGIN=30001;\n\
    \        public static final int LOGIN_FAILED=30002;\n        public static final\
    \ int LOGIN_SUCCEEDED=30003;\n    }\n\n    public class UI\n    {\n        public\
    \ static final int BUTTON_PRESSED=40001;\n        public static final int TEXT_CHANGED=40002;\n\
    \    }\n\n    public class SETTINGS\n    {\n        public static final int CHANGE_LANGUAGE\
    \ = 50001;\n        public static final int CLEAR_LOGIN_DATA = 50002;\n    }\n\
    }\n```\n\n请注意命名约定。上下文（`CONTEXT`）从 1 开始依次编号，而单个事件则使用`XYYYY`编号约定，其中`X`对于应用程序的每个上下文/区域是唯一的（并从\
    \ 1 开始依次取值），而`YYYY`是在`X`范围内唯一的事件编号（同样依次取值）。这种命名方案确保了可读性，有助于调试（一段时间后，你几乎会开始记住`2YYYY`是与推文相关的事件），并且最重要的是，防止了不同事件获得相同事件编号的冲突。\n\
    \n现在我们的 Twitter 客户端已经可以运行，让我们看看如何进一步改进它。\n\n### 改进应用程序\n\n我们编写的 Twitter 客户端可以工作，其底层基础也很扎实，但应用程序本身目前还相当简陋。要将其扩展为一个功能完备的完整应用程序，需要大量的时间、精力和篇幅，而对于任何不打算开发一个功能完备的\
    \ Twitter 客户端的人来说，收益甚微。因此，虽然我们不会深入探讨这个过程，但我们可以并且将会看看实现这一目标所需的一些步骤。"
