  trans: '

    ### 收集调试信息


    收集调试信息是应用程序测试过程中至关重要的一环。通过记录应用程序运行时的各种细节，例如方法调用的执行时间或特定对象的状态，你可以相当清晰地了解底层实际发生的情况。然后，你可以利用这些信息来补充测试结果以及基于这些结果得出的结论。


    我认为，收集调试信息对于 Java ME 应用程序比对于桌面应用程序更为重要，因为它有助于解决的问题对 Java ME 应用程序而言更为关键。例如，即使你的应用程序运行正常，代码中也可能存在内存泄漏。在拥有数
    GB 内存的桌面计算机上，任何微小的内存泄漏很可能在数小时或数天内都不会被察觉，而到那时用户很可能已经关闭了程序。但在内存有限的 Java ME 设备上，这样的内存泄漏会很快导致
    `OutOfMemory` 异常。一份良好的调试日志可以帮助你追踪并修复这个问题。


    这直接导致的结果是，Java ME 应用程序的调试日志应该比桌面应用程序的调试日志更加详尽。有很多你通常不会为桌面应用程序持续追踪，但应该始终为 Java
    ME 应用程序追踪的信息：实例数量、关键原生方法调用的执行时间、已用/可用内存、性能指标等等。记录如此多信息的原因很简单：Java ME 比桌面平台要不可预测得多，因此问题可能且确实会突然出现。此外，有时它们只是偶尔出现，并且极难重现。当这种情况发生时，你会庆幸自己拥有一份完整的调试日志来帮助你。


    让我们仔细看看上一段中提到的你应该追踪的事项列表。其中一项很突出的是追踪原生方法调用的执行时间。为什么它会在列表中？原因很简单：追踪原生方法调用的执行时间往往能揭示与平台相关的错误，并且能让你更深入地了解平台底层的工作方式。例如，假设类似的
    `System.arraycopy()` 调用通常需要相同的完成时间，但有时会花费相当长的时间。当这种情况发生时，幕后可能发生两件事：要么是 JVM 在内存中重新定位对象（压缩它们），*要么*是
    JVM 的实现中存在某种故障。


    当然，仅凭这一项测量结果是不确定的，但当你将其与其他测量收集到的信息结合起来时，就能对实际发生的情况有一个相当清晰的认识。然后你可以利用这些知识为自己谋利：如果是压缩发生，你可以尝试在池和数组中创建更大尺寸的对象；而如果是存在故障，你可以尝试尽可能避免使用
    `arraycopy()`。无论哪种方式，你的努力最终都会得到一个运行更流畅、更好的应用程序。


    在 Java ME 应用程序中，你可能需要追踪的最重要的事情之一就是网络连接。至少，你应该记录它们何时被创建、为何被创建以及何时被实际关闭。除此之外，这有助于处理
    Java ME 应用程序中一个相对常见的问题：超过设备允许的最大并发连接数。在 Java ME 中，即使代码中没有“连接泄漏”，这种情况也可能发生。例如，某些设备在被要求关闭网络连接时并不会立即关闭，这意味着如果新连接创建得太快，你就会超出限制。一份良好的调试日志可以通过检查（通过时间戳）连接是立即关闭还是延迟关闭，来帮助你判断是否属于这种情况。


    你还应该尽可能多地追踪设备的状态。这包括设备方向、正在使用的连接能力、其他正在运行的应用程序、电池电量等等。这些信息对于重现仅在特定情况下（例如，仅在设备处于横屏模式或电池电量低时）出现的错误来说是无价的。


    一个 Java ME 特有的、你应该记录的事项是屏幕和组件的重绘。这在桌面应用程序甚至智能手机平台上通常是不需要的，因为原生 UI 框架会自动处理重绘。然而，Java
    ME 应用程序往往容易出现刷新问题（闪烁、屏幕未正确重绘），因为它们的 UI 是基于第三方框架创建的，而这些框架又使用了底层且特定于设备的绘图调用。因此，当出现刷新错误时，了解重绘是在何时发出的、为何发出以及实际执行的时间，对于追踪错误的根本原因大有帮助。


    例如，当设备改变方向时出现屏幕损坏，了解最后一次重绘请求的时间（方向改变前/后）以及实际执行的时间，可以告诉你损坏是由于糟糕的框架代码（在方向改变前请求，在方向改变后执行——因此刷新本应考虑新方向）还是由于设备本身的故障（在方向改变前请求，在方向改变前执行——框架未及时收到方向已更改的通知）造成的。


    最后，需要注意的是，收集调试数据可能会给 Java ME 设备带来显著的额外开销和资源压力，这反过来又可能导致性能不佳（性能下降 2 到 5 倍很常见）。为避免这种情况，你应该始终有一个专门用于收集调试数据的构建版本，与其他构建版本分开。其次，你应该始终将数据收集量保持在最低限度。你可以通过降低数据收集频率来做到这一点，例如每
    3 秒收集一次，而不是每秒一次。


    你也可以考虑一次只关注少数几个相关方面，而不是生成完整的调试日志；当你在调查特定问题时，这样做是完全可行的。所有优秀的移植框架都内置了某种调试支持，因此这些措施应该很容易付诸实践。


    ### 执行单元测试


    单元测试是测试应用程序功能方面（内部运作）并确保新更改不会破坏现有功能的绝佳工具。其基本思想是，对于应用程序中的每个 Java 类和功能子系统，你编写一个或多个功能测试，并在每次测试后将测试输出与先前计算出的、已知正确的输出进行比较。如果输出匹配，则测试通过。如果不匹配，则测试失败，这通常表明你的应用程序代码存在问题。


    就像 J2SE 有 JUnit 用于创建和运行单元测试一样，Java ME 也有诸如 JMUnit（甚至与 NetBeans 捆绑在一起）和 J2MEUnit
    之类的工具。任何熟悉 JUnit 的人都应该能轻松上手这些工具。因此，以下部分将更多地关注 Java ME 特有的单元测试方面。

    '
- fmt: '#### Solving Common Unit Test–Related Problems


    The main difficulty of writing Java ME unit tests lies not in writing the tests
    themselves or in a lack of test-writing tools; it lies in covering the differences
    between different devices and between real devices and emulators. It is common
    knowledge that some features (for example, support of various media types and
    SSL certificates) work on real devices but not on emulators, and vice versa. Furthermore,
    if you target different devices, you have to take into consideration the limitations
    and particularities of each device, such as screen resolution, memory size, and
    API support.


    Overcoming this problem is not particularly difficult. The most important tool
    you need is a good porting framework. You can use it to create separate test builds
    for each different real device and for each emulator. The main idea is that if
    a test will not run on a given target device (for whatever reason, for example,
    API support), you can exclude it from the build, or replace it with an equivalent
    version that *will* work on the target device. You can also store build-specific
    information in the build configuration files—for example, different resource URLs,
    and different test settings and test data for different devices.


    It should be noted that the goal of unit testing is not to test the application’s
    code in a generic context, but to test it in the exact context it will run on.
    With this in mind, your tests and test data should always try to emulate the real-life
    stress of your actual application. For example, let’s assume you’re writing a
    client-server application with two communication protocol versions, a “light”
    one for low-end devices and a “heavy” one for high-end devices. Running the tests
    with “heavy” test data on a low-end device is not representative of the application.
    The test may fail, or the device may perform badly, but this is irrelevant for
    real-life scenarios because low-end devices will need to handle only “light” protocol
    data. Likewise, testing network-related functionality exclusively over Wi-Fi or
    3G will not provide relevant information, as the application will have to function
    in areas with flaky signals and low-quality network connections too.


    Which brings us to another important aspect of Java ME unit testing: emulating
    non-application-related factors, such as network connection quality, battery meter,
    and GPS position. This is one area where device emulators shine. All major device
    emulators allow you to configure these parameters easily and dynamically at runtime,
    usually via a handy property page, thus ensuring that you can test every possible
    scenario you can think of.


    However, problems start to appear when you want these parameters to change according
    to a given script (for example, great network quality for 5 seconds, then no network
    for 10 seconds, then average network quality for 5) or when you need low-level
    control over what happens (for example, controlling the exact number of bytes
    read from `HttpConnection` and the interval between them).


    The best solution for these problems is creating *mock* classes—and, once again,
    having a good porting framework will help you immensely. For example, in the preceding
    `HttpConnection` example, the best approach is to roll your own `MockHttpConnection`
    class, which has the same public API as the real `HttpConnection`, but which reads
    its data from a *script file* rather than from an actual HTTP connection. You
    can then instruct the porting framework to replace all references of `HttpConnection`
    with `MockHttpConnection` and, provided you have the script files ready, you’re
    good to go.


    This approach, while elegant and extremely flexible, has its pros and cons, and
    you have to be aware of both. On the pro side, it gives you complete control over
    otherwise uncontrollable aspects of the environment, and you can benefit from
    this control on real devices too, not just on emulators.


    On the con side, you are emulating the *theoretical* behavior of the hardware/OS
    combination, not its actual behavior. For example, just because your `MockHttpConnection`
    test is able to process 1 MB of data per second doesn’t mean that the real `HttpConnection`
    will be able to do this too. The impact of this can be minimized by making sure
    that the test data/script file is similar to what was observed in real-life scenarios,
    but you can never be 100 percent certain that your emulated behavior will match
    the real behavior, especially when it comes to glitches and peculiar behavior.


    Also on the con side, mock classes tend to increase overhead and place added strain
    on the device’s resources, which might in turn alter the test results and/or cause
    the tests to fail even though they should have passed. This is something that
    you will have to live with, because it is sometimes difficult to determine whether
    the test has failed because of your application code or because of the added strain,
    especially on real devices.


    #### Gathering Quality Debug Data


    Unit tests provide you with a great opportunity: gathering debug data from the
    various parts of your application, both when they are working independent of each
    other and when they are working together. By using this data, you can identify
    performance bottlenecks and possible problem areas throughout your application’s
    code much more quickly and reliably than you would by gathering debug data from
    the actual application.


    The main attraction of debug data gathered during unit testing is that it is both
    reflective of real-world performance (if the tests are engineered as such) and
    reproducible every time because of the highly controlled nature of the tests.
    So, for example, if the performance data gathered after a code change is worse
    than the performance data gathered before it, you know that the new code performs
    worse than the old one.


    The same applies to tracking down bugs. Because the randomness factor is greatly
    reduced in unit tests, it becomes much easier to determine whether a certain problem
    is caused by a race condition, a bad algorithm, a platform glitch, or something
    else.


    That being said, there will always be differences between debug data gathered
    in the laboratory and debug data gathered during real-life usage. There are many
    bugs, especially conjectural ones, which can be debugged in only real-life scenarios.
    As such, never rely exclusively on laboratory debug data, and don’t assume that
    just because something is fixed in the laboratory tests, it’s also fixed in the
    actual application.'
