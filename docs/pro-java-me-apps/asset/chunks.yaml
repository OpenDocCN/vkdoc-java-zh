    ## 关于技术审校


    *卡罗尔·哈默* 于新泽西州立大学罗格斯分校获得数论博士学位。此后，她在美国、法国和瑞士担任了十二年的软件工程师，其中包括在 In-Fusio 移动游戏公司工作的三年。


    卡罗尔撰写了三本关于移动游戏编程的书籍：*《J2ME 游戏开发与 MIDP2》*、*《创建移动游戏》* 和 *《学习 BlackBerry 游戏开发》*，均由
    Apress 出版。


    ## 引言


    我认为手机是令人惊叹的技术产物。它们让你几乎身处世界任何角落，只需按下按钮就能联系到朋友、亲人、同事或商业伙伴。这还不够，它们已变得如此强大，如今简直不亚于口袋里的电脑。仅仅几十年前，你只能在《星际迷航》电影中看到类似的设备——如今它们已成为现实。


    现代手机运行在多种软件平台上，但就覆盖范围和市场份额而言，最流行的无疑是 Java ME。这个曾经功能有限的平台，随着支持它的硬件一同成长和成熟；如今它能够交付真正令人惊叹的应用程序，这些应用有潜力触达数亿（甚至数十亿）用户。


    然而，令人稍感失望的是，开发者编写 Java ME 应用程序的技术并未与时俱进。许多开发者，尤其是经验不足者，仍以近十年前该平台初生时那种极其保守的方式来处理
    Java ME 开发。更糟的是，他们像对待桌面平台一样对待 Java ME，完全无视其细微差别以及它本质上是一个设计用于移动设备的移动平台这一事实。结果，许多
    Java ME 应用程序未能发挥其潜力。


    你现在正在阅读的这本书旨在纠正这一点，它展示了应该如何进行现代 Java ME 应用程序开发——包含了当今适用于该平台的所有重要技巧和技术。


    ### 本书涵盖的内容


    本书与其他 Java ME 书籍有所不同，它围绕使用现代开发技术从头编写一个完整且功能齐全的 Java ME 应用程序而构建。为此，从编写应用程序框架到编写
    UI 模块（包含小部件和触摸支持），所有内容都将被讨论——不会遗漏任何重要的应用程序组件。


    此外，你将看到所有这些组件如何融入真实世界的应用程序中，以及各个应用程序组件如何交互和协同工作。沿途做出的决策将被解释，潜在陷阱将被强调，基于实践经验的宝贵建议将被给出——所有这一切都是为了全面描绘现代
    Java ME 应用程序开发的真实面貌。


    一旦应用程序编写完成，我们将涵盖 Java ME 开发的其他关键方面。代码优化、应用程序测试、高级图形、改善用户体验以及正确的 Java ME 开发者思维模式都将被讨论。


    最后，我们将展望 Java ME 的未来，以便更好地理解该平台的发展方向，并提供一个与 Java ME 开发相关的进一步研究主题列表。


    ### 本书所需准备


    首先，你应该至少具备中级水平的 Java ME 开发知识。这不是一本入门书籍——事实上，我们假设你之前至少开发过一个中等规模的 Java ME 应用程序。


    其次，本书中源代码的目标设备是 WTK 模拟器。为获得最佳效果，建议你同时安装 2.5.2 和 3.0 版本。选择 WTK 模拟器是因为其普遍性，并且它几乎是
    Java ME 的“参考实现”。然而，代码设计为尽可能可移植；在其他模拟器和真实设备上运行应该也能正常工作（但无法保证）。


    还建议你运行所有提供的代码并进行实验。Java ME 的精髓在于细微之处，许多细节必须通过实际运行才能掌握。显然，静态的代码列表无法做到这一点。


    ### 让乐趣开始吧


    对我来说，Java ME 开发总是一件充满乐趣的事情。虽然并不总是容易，但也几乎从不乏味；总有新的挑战需要克服，并从中学习到新东西。


    带着这样的想法，我希望你能享受阅读本书的过程，并且书中的信息能帮助你作为 Java ME 开发者的生活变得更轻松、更有趣、更精彩。


    ## 第 1 章


    ## 入门指南


    十年前，如果你想为手机编写软件，基本上只有一个选择：Java ME（或者当时被称为 J2ME）。近年来情况发生了变化，出现了众多移动平台，每个平台都有其优缺点。尽管有这些新来者，Java
    ME 仍然是一个强大的移动开发平台。关键在于，如今的质量门槛已经相当高，为了在现实世界中竞争，你的应用程序必须在技术上非常过硬。本书旨在教你如何实现这一目标。


    然而，首先你必须理解 Java ME 当今所处的地位。


    ### Java ME、智能手机与功能手机


    有些人认为，在一个所有新闻都关于 iPhone 和 Android 智能手机的世界里，Java ME 已无立足之地。这完全不对。Java ME 仍然是一个出色的移动开发平台。让我们来看看原因。

    '
- fmt: '### Java ME''s Advantages


    First, contrary to popular belief, Java ME *is* a viable option for smartphone
    software development. For one thing, Symbian is the most widespread smartphone
    operating system in use today and it has full support for Java ME. Blackberry
    devices also support Java ME. And there are even ways to get Java ME apps on Android
    and on the iPhone, using cross-platform conversion tools and emulators. Thus,
    Java ME is supported in one form or another by most smartphones in use today—and
    it can make use of their superior capabilities.


    Moreover, while smartphones tend to get all the hype these days because of their
    cool new capabilities, it''s worth noting that modern feature phones are starting
    to play in the same ballpark. Features like touchscreens, 3D accelerators, sensors
    (accelerometers for example), geo-location support, multitasking, large amounts
    of RAM, fast CPUs, and high-resolution screens are gradually starting to become
    common in the feature phone world too, in which Java ME is the uncontested king.


    Furthermore, feature phone sales are still considerably higher than smartphone
    sales. For example, according to Wikipedia, feature phones have an 83% market
    share in the US as of 2010. This means that 83% of all US phones can''t run Android
    or iPhone apps, but they *can* run Java ME apps, which makes Java ME the best
    platform if you want to achieve high market penetration.


    Finally, Java ME is designed to be simple and modular. Everything but core features
    is defined and regulated by individual Java Specification Requests (JSRs): 3D
    support in `JSR 184`, PIM and filesystem support in `JSR 75`, sensor support in
    `JSR 256`, and so forth. This means two things. First, Java ME as a whole can
    evolve and improve while still maintaining backward compatibility. You will always
    be able to leverage your existing know-how and software base, since there will
    be no groundbreaking and compatibility-breaking changes along the way, only optional
    and incremental improvements that don''t affect existing functionality. Second,
    you can tailor your applications to provide the exact feature set needed for any
    given target device, based on the functionality that particular device supports.


    In the end, you get a platform that is supported in one form or another on the
    vast majority of phones in use today and that, unlike rival platforms, can run
    on low-end feature phones too, not just on state-of-the-art smartphones. Furthermore,
    the platform is flexible enough to allow you to use fancy features where available
    (such as 3D support and geo-location), so you''re not limited to just the core
    Java ME features. So you see, Java ME is still an excellent candidate for developing
    your mobile applications.


    ### Java ME''s Disadvantages


    Like all software platforms, Java ME has weaknesses as well as strengths. In order
    to provide a fair assessment, let''s look at Java ME''s most notable disadvantages—and
    how these can be mitigated.


    The main problem with Java ME is that its core API is somewhat outdated and low-level
    by today''s standards. Fortunately, plenty of third-party libraries out there,
    from UI libraries to utility libraries, can help alleviate this. This can even
    be considered an advantage, as you are free to choose whatever libraries and coding
    paradigms best suit your particular project, thus keeping your code base clean
    and to the point.


    Java ME also suffers from device fragmentation (which is somewhat unavoidable
    considering the staggering number of devices that support Java ME). This was a
    huge problem in the early days; however, device support has become more standardized
    and tools have appeared to combat fragmentation. Today, fragmentation is still
    a problem, but to a much lesser degree, and there are plenty of resources you
    can use to resolve it. We will discuss fragmentation later in the book.


    Java ME is also somewhat less tolerant than competing platforms. Having to work,
    in general, with fewer resources than other modern-day platforms means that problems
    like memory leaks and inefficient algorithms are much more likely to cause stability
    and performance issues. The best solution for this is to code defensively and
    to optimize your algorithms and your code—we''ll discuss both topics later.


    In addition, Java ME simply lacks support for some features. For example, system-wide
    notifications are unavailable, as is support for writing widgets and for low-level
    interactions with the hardware and with the operating system. The upcoming `MIDP
    3.0` standard will alleviate some of these problems, but until then Java ME applications
    have to be, for the most part, stand-alone and self-contained, with only limited
    access to certain operating system and hardware features.


    **NOTE:** There are ways to mix regular Java ME API calls with platform-specific
    API calls (this is frequently done in Blackberry applications), but the end result
    is not, strictly speaking, a Java ME application, so for bookkeeping purposes
    it doesn''t count.


    Finally, Java ME generally lacks the integration of an application store within
    the underlying platform, something both Android and iPhone have going for them.
    However, in recent years, Java ME application stores such as Nokia''s Ovi Store
    and GetJar have become mainstream and well-known, so getting your software to
    your customers isn''t a real problem anymore.


    ### The Bottom Line


    First, the bad: Java ME is not a universal solution from a technical point of
    view. I would not use it, for example, for writing an extremely sophisticated,
    state-of-the-art 3D game. I probably wouldn''t use it if my application needed
    to target only the latest and greatest smartphones, as native applications are
    better suited for this. Finally, even if I wanted to, I couldn''t use it for applications
    that require intimate interactions with the operating system or for writing widgets.


    That being said, Java ME is well-suited for pretty much everything else, from
    business applications and regular games (even 3D ones) to applications that by
    their very nature require high market penetration, such as social networking clients
    and supporting applications for web-based services (for file transfer, web mail,
    etc.).


    When you add in business factors, Java ME becomes a really strong contender: it''s
    hard to argue against the world''s most popular mobile platform, with literally
    billions of devices out there supporting it.


    Overall, Java ME is still quite a robust platform. Though it has undergone changes
    and repositioning throughout the years, it remains a useful vehicle for building
    mobile applications.


    ## Creating a Java ME Application


    The best way to learn how to create a high-quality Java ME application is to actually
    create one, so the rest of this book will be dedicated to this endeavor. We''ll
    start with the basics, such as the project''s idea and goals, and progress toward
    a fully functional Java ME application.


    As this is a technical book, we will focus primarily on technical aspects—everything
    else will be discussed only marginally.


    **NOTE:** Modern Java ME apps typically have thousands or tens of thousands of
    lines of code, but we will include in the book only the minimum amount of code
    necessary to illustrate the subject at hand. The full source code is available
    on the Apress website.'
