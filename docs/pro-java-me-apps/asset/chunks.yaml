- fmt: '这个故事的关键在于，如果客户从一开始就向我们提供了正确的需求和优先级，那么该项目中很大一部分开发工作本可以避免。从头开始设计（即，一个同时兼顾用户界面、功能以及灵活性与可移植性的架构和代码库）要比将一个为特定目的（例如，炫酷的UI）设计的东西，再改造成一个万金油要容易得多。


    更确切地说，如果我们事先知道项目的最终优先级，那么应用程序的架构将会不同，开发工作的分配也会不同，我们会使用不同的工具，而且总体而言，项目的结果会更好：更少的错误、更快的性能、更短的开发时间，以及所有设备共用一个应用程序代码库（而不是两个代码库，一个用于低端设备，另一个用于其他设备）。而实际情况是，我们最初做出的决策最适合我们最初的优先级（不惜一切代价实现花哨的UI），而这最终在长期来看代价高昂。


    **注意：** 当然，这种目标不断变化的情况在所有软件平台上都经常遇到，无论是移动平台还是其他平台。对于Java ME来说，这个问题更棘手，因为目标不断变化往往会给应用程序增加“额外负担”，例如处理开销和不必要的代码。虽然在其它平台上，有时即使有大量“负担”也能勉强应付，但Java
    ME的特性决定了，即使是一点点的“额外负担”也可能导致“心脏病发作”。因此，Java ME开发者在项目初期应不遗余力地确保目标尽可能保持稳定。


    ### 跳出固有思维模式很重要


    Java ME并非寻常的平台。正如我们在本书中迄今所见，它有许多独特的特点和特性，因此你传统的应用程序开发方法可能并不适用。正因为如此，开发者能够退后一步，不受先前开发经验和模式的偏见影响来审视当前项目，这一点至关重要；换句话说，开发者应该能够在需要时跳出固有思维模式。


    但这究竟意味着什么呢？首先，这意味着要意识到，过去在类似情况下行之有效的方法，在当前情况下可能并非最佳解决方案。这种情况可能由多种原因造成，从可用资源数量的不同到业务原因。因此，每个情况都应该单独处理，只有先前的解决方案符合当前场景的约束条件时，才应使用它们。


    例如，你可能习惯于使用某个特定的库（无论是第三方的还是自制的）来进行序列化和持久化。过去在类似硬件上运行的项目中，这个库一直表现良好，所以你自然而然地决定在当前项目中也使用它，而没有过多考虑这个决定——这是一个非常常见的场景。


    然而，这样做时，你做了很多假设，其中许多可能并不成立。你假设当前项目与旧项目有相同的序列化需求——但如果因为待序列化数据的性质不同，不同的序列化方案和/或机制更适合当前项目呢？你还假设，仅仅因为硬件相似，资源分配也相似——如果你的序列化代码只能使用可用资源的10%，而不是先前项目中获得的20%，那该怎么办？此外，你自动忽略了当前设备上可能存在的、有用但非标准的API，而你的当前库并没有利用这些API。这样的例子不胜枚举。


    这种“复用旧方案”的做法是Java ME开发中一个常见的错误，其根源在于，在其他平台上，你确实可以在大多数时候复用旧方案。即使结果不是最优的，通常也仍在可接受的范围内。然而，对于Java
    ME来说，任何非最优的结果往往更接近于“不可用”而非“足够好”——这仅仅是因为你没有充分利用可用的资源和能力，要么消耗过多，要么利用过少。


    因此，审视当前项目时，把它当作你的第一个项目，摒弃所有关于先前项目的知识（在我们的例子中，就是摒弃任何关于先前序列化库存在的知识），并问自己，对于当前必须完成的任务，什么才是最佳解决方案，这一点变得非常重要。如果你找到的解决方案恰好是你过去使用过的库或方法，那么尽管去用。如果不是，那就从头开始。起初这可能很难做到，因为你几乎在每个项目上通常都得从头开始，但从长远来看，这会变得更容易；随着时间的推移，你过去使用过的方法列表会增长，这大大增加了你从中找到适合当前需求的方法的几率，而无需再想出新的东西。'
  raw: 'The point of this story is that a large part of the development effort on
    this project could have been avoided if the customer had given us the proper requirements
    and priorities from the beginning. It’s much easier to design something from scratch
    (i.e., an architecture and code base that are geared equally toward UI, features,
    and flexibility/portability) than it is to take something designed for a specific
    purpose (i.e., cool UI) and then turn that something into a jack-of-all-trades.


    More to the point, had we known in advance what the project’s end-priorities were,
    the application’s architecture would have been different, the development effort
    would have been distributed differently, we would have used different tools, and,
    overall, the project would have turned out better: fewer bugs, faster performance,
    less time spent in development, and a single application code base for all devices
    (instead of two code bases, one for low-end devices and one for the rest). As
    it was, we made the initial decisions that were best suited for our initial priorities
    (a fancy UI at all costs), and this ended up being costly in the long run.


    **NOTE:** Of course, this scenario of hitting a moving target is frequently encountered
    on all software platforms, mobile or otherwise. What makes it more problematic
    for Java ME is the fact that hitting a moving target tends to add “extra fat”
    to the application, like processing overhead and unnecessary code. While on other
    platforms you can even get away with sometimes obscene amounts of “fat,” such
    is the nature of Java ME that even a little “extra fat” can lead to a “heart attack.”
    As such, Java ME developers should spare no effort in the beginning of a project
    to make sure that the target is as still as possible.


    ### Thinking Outside the Box Is Important


    Java ME is not your usual platform. As we have seen thus far in the book, it has
    many particularities and characteristics that are mostly unique to it, so your
    conventional approach to application development may not apply. Because of this,
    it is important that developers be able to take a step back and look at the project
    at hand without being biased by previous development experience and development
    patterns; in other words, developers should be able to think outside the box,
    if needed.


    But what does this mean, exactly? For starters, it means being aware that what
    has worked well in the past in similar situations may not be the best solution
    in the current situation. This can happen for a variety of reasons, ranging from
    different amounts of available resources to business reasons. As such, each situation
    should be approached individually, and previous solutions should be used only
    if they fall within the confines of the current scenario.


    For example, you may be accustomed to using a certain library (either third-party
    or self-made) for serialization and persistence. This has worked well for you
    in the past in projects running on similar hardware, so naturally you decide to
    use it in the current project too, without giving the decision that much thought—a
    very common scenario.


    However, in doing so, you make a lot of assumptions, many of which may not be
    true. You assume that the current project has the same kind of serialization needs
    as your old projects—what if a different serialization scheme and/or mechanism
    would be more suited for the current project, because the nature of the data to
    be serialized is different? You also assume that, just because the hardware is
    similar, so too is the resource distribution—what if your serialization code has
    to make due with only 10% of the available resources instead of the 20% it got
    in previous projects? Furthermore, you automatically discard any helpful but non-standard
    API that may be available on the current device, and that your current library
    doesn’t make use of. The list can go on.


    This “reusing of old solutions” is a common mistake for Java ME development, and
    stems from the fact that, on other platforms, you can indeed reuse old solutions
    most of the time. Even if the results are sub-optimal, they’re usually still well
    within acceptable limits. However, in the case of Java ME, anything sub-optimal
    tends to be closer to “unusable” than to “good enough”—if for no other reason
    than that you don’t make good use of the available resources and capabilities,
    either consuming too much or using too little.


    Thus, it becomes important that you look at the current project just like it was
    your first one, discard any knowledge of previous projects (in our example, any
    knowledge of the existence of previous serialization libraries), and ask yourself
    what would be the best solution for what you have to do right now. If the solution
    you find turns out to be a library or approach that you have used in the past,
    then by all means go for it. If not, then start fresh. It may be hard to do this
    at first, because you’ll usually have to start fresh on almost every project,
    but in the long run it becomes easier; over time, the list of approaches that
    you have used in the past grows, which considerably increases the chances that
    you’ll find one among them that suits your current needs without having to come
    up with something new.'
