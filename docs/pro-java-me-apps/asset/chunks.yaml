    This listing clearly exemplifies the separation between UI code (the form class)
    and the underlying functionality (the controller class): the form class handles
    only the creation of the UI and triggering of the appropriate events when UI elements
    are interacted with, while the controller handles the actual application logic.
    In the case of the highlighted code, the form does the actual widget adding (via
    the `addTweet()` method of the `MainForm` class), but it is the controller that
    decides what tweet to add. In this regard, you can think of the form as being
    a kind of slave to the controller, or as an interface between the user and the
    controller.


    The improper separation of UI and logic can be a major problem for Java ME apps.
    As targeting different devices can frequently lead to different UIs (or at least
    to device-specific UI tweaks), merging application logic with UI logic can lead
    to application code that is run on one device but not on another, because the
    UI code follows a different path on the latter.


    What’s even worse, sometimes application logic is wrongfully bound to UI properties.
    For example, viewports are common in a lot of applications, such as spreadsheet
    or mapping software. Determining a viewport’s position based on the associated
    container’s scroll position makes some sense, but it’s fundamentally wrong because
    rather than binding the viewport to some application-internal variable (i.e.,
    the calculated viewport position), you bind it to a UI widget’s state. Not only
    might this cause code and logic “bleeding” between the UI and the core application
    code, but it could also transform UI bugs (in the UI library, for example) into
    application bugs. Consider what would happen if a bug caused the scroll position
    to be wrongfully reported—for example, after a resize or after switching from
    landscape to portrait mode; the viewport position would get affected by this too.'
