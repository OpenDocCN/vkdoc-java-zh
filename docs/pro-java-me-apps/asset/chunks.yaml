    ## 增添细节打磨与用户交互改进


    至此，你应该已经拥有一个结构良好且经过优化的应用程序。从技术角度来看，这已经让你超越了市面上大多数 Java ME 应用。然而，这还不足以让应用在用户眼中脱颖而出，因为用户并不关心“引擎盖下”发生了什么。


    因此，本章致力于展示如何从用户角度改进你的应用。除了拥有完善的功能集（这应是基本要求），主要有两种方法：为应用增添细节打磨，以及改善用户与应用及你所在公司的交互，从而提升整体用户体验。在接下来的篇幅中，我们将讨论这两个方面。


    在开始讨论之前，需要指出的是，出于技术和业务原因，你很可能无法实现所有建议。实现本章讨论的所有内容，很可能打造出一款高度精致且品质极佳的应用。然而，开发成本也会显著增加，因此你只能瞄准最高端的
    Java ME 设备。中端和低端设备根本无法承受这种资源压力。决定采纳哪些建议、忽略哪些建议，高度依赖于具体应用。不过，本章末尾会提供一些指导原则。


    ### 为应用增添细节打磨


    区分专业 Java ME 应用与普通 Java ME 应用的关键因素之一，就是*细节打磨*——那些并非应用核心功能所必需，但却锦上添花的特性和功能。这些细节打磨可能很微妙——例如，在电子表格应用中，当前选中单元格的边框是动画效果而非静态边框（以便用户更轻松地看到编辑将发生在何处）。细节打磨也可能更显眼，例如为应用中每个可选项目提供上下文帮助。


    细节打磨为你的应用增添了巨大价值。它们并非通过增加主要功能（按定义而言）来实现，而是通过让现有功能更易用、更愉悦。接触你应用的用户可能不会明确注意到你添加的细节打磨，但会感觉你的应用“就是好用”，并且能感受到其中倾注了大量心血和深思熟虑。


    这不仅意味着你的用户（和客户）会持续使用你的应用，还会吸引更多用户（和更多客户）。口碑好的、用户友好的、直观的应用传播得很快，尤其是在 Java ME 领域，这类应用往往凤毛麟角。


    #### 理解细节打磨


    在开始讨论具体的细节打磨之前，你必须先更好地理解它们是什么。虽然没有教科书式的定义，但可以肯定地说，任何具有以下特征的功能或特性都可以被视为细节打磨：


    *   *非关键性*：按定义，细节打磨对于 Java ME 应用的运行并非关键。例如，当前选中单元格周围的动画边框对于电子表格应用的功能并非必需。

    *   *非侵入性*：细节打磨从不强迫或要求用户改变他们的使用模式。换句话说，无论有没有这些细节打磨，用户都应该能同样地使用应用。例如，为应用中每个可选项目提供上下文帮助可以被视为细节打磨，因为用户不必使用此功能，完全可以忽略它。另一方面，针对更敏感操作（如删除项目）的确认对话框不能被视为细节打磨，因为用户被迫通过确认或取消操作来响应。

    *   *简单直观*：如果一个功能需要解释，那它就不是细节打磨。

    *   *可关闭*：这一点比看起来更重要，而且经常被遗忘。你可能觉得动画边框很好，很多用户也会这么认为，但有些用户可能会因此分心。上下文帮助很棒，但经验丰富的用户可能想关闭它以尽量减少菜单杂乱。通过能够关闭细节打磨，用户能对自己的体验获得更多控制权。


    正确理解什么是细节打磨有一个很好的理由：许多功能（包括本章后面讨论的一些功能）既可以作为常规功能实现，也可以作为细节打磨实现——但当它们以后者的方式实现时，能产生最大的影响。例如，对于聊天客户端或其他与互联网相关的应用，更新功能可以通过两种主要方式实现。第一种是作为独立功能，用户必须显式激活（即应用菜单中的“检查更新”选项）。第二种是作为细节打磨，默认自动执行，并且用户可以关闭（即，当用户连接到互联网时，自动检查是否有新版本）。


    在这两种方式中，第二种通常是最好的，原因有几个：它不需要用户交互；即使用户没有显式检查，也会收到新版本的通知；并且释放了应用菜单。这带来了更简洁、看似更“智能”的应用，这是用户会喜欢的。


    同样的原则可以应用于应用的许多其他方面，从而打造出简单、有趣且功能齐全的应用。这对任何当前的移动平台都很好，但 Java ME 从中受益最大，因为其用户通常不如智能手机平台的用户精通技术，因此他们会更加欣赏应用的简洁性和易用性。事实上，这可能是用户选择使用你应用的决定性标准。


    **提示：** 在探索细节打磨时，不要局限于 Java ME 应用！在移动领域，苹果公司的产品可能是运用细节打磨的最佳范例。虽然 Java ME 应用通常无法（出于技术原因）达到苹果的细节打磨水平，但许多重要的细节打磨（与苹果相关或来自其他平台）至少可以部分地适配到
    Java ME。研究其他平台及其应用提供的细节打磨，并将这些细节打磨适配到你的 Java ME 应用中，是提升产品价值的最佳方法之一。


    现在，让我们探索一些你可以添加到 Java ME 应用中的细节打磨。需要指出的是，这绝非详尽的讨论。相反，它只涵盖了最常用的、你可以在 Java ME 应用中实现的细节打磨。

    '
- fmt: '#### Adding Proper In-Application Help


    For Java ME applications, `help` has traditionally meant one form accessible from
    the main menu, with a few instructions on it. This Spartan approach was a necessity
    in the early days, and it fit the simple early Java ME applications. Unfortunately,
    it has endured even though the applications are now considerably more complex
    and the hardware is now considerably more powerful. As such, adding proper in-application
    help is a fine touch that will differentiate you from the competition.


    The most important component of a good in-application help system is a comprehensive
    set of help pages. Every screen in the application should have a dedicated help
    page associated with it, as should every concept necessary to operate the application.
    From each help page, you should be able to navigate to other related pages.


    On each help page dedicated to an onscreen form, each control of the corresponding
    form should be discussed (on a separate page if the explanation is long, and otherwise
    in a few sentences), as should the workings of the form as a whole. Each help
    page should be accessible from the corresponding form''s menu. As an extra, you
    should also have a few “Tutorial” or “Getting started” pages, to accommodate new
    or inexperienced users.


    To make things even simpler for the user, you can implement contextual help in
    your application. At its simplest, an extra “Contextual help” option should be
    presented in the form''s menu or in the widget''s contextual menu. When selecting
    this option, the user will get information about that specific control (this can
    be done quite easily, for example, by opening the form''s main help page and scrolling
    down to the section dedicated to the widget in question).


    Taking the idea further, the contextual help can be customized to fit into the
    current usage context. For example, a help text such as “Sends a message to the
    selected contact” could be rewritten to “Sends a message to the selected contact
    (Isabel),” where `Isabel` is the name of the currently selected contact. This
    involves a deeper integration of the help system with the rest of the application,
    but is much more useful to users, because the explanations are given in context
    and are thus considerably easier to understand.


    Then there is also the concept of learning by doing. This is covered by the tutorials
    and “Getting started” guide already mentioned, but we can take the concept further.
    An efficient way of guiding users through an application (and thus learning by
    doing) is the use of visual indicators. For example, let''s say you have a login
    form with a “Username” field, a “Password” field, and a “Login” button. The first
    onscreen item the user has to focus attention on is the “Username” field, so a
    bubble with a “1” inside it should appear next to it. After the user visits this
    field and enters some text, the “1” bubble will disappear, and a bubble with “2”
    inside it will appear next to the “Password” field. After both a username and
    a password have been entered, a “3” bubble will appear next to the “Login” button.


    This mechanism is simple and intuitive for beginner users, but more-advanced users
    might find this annoying or even insulting. Therefore, it''s best to have this
    option turned off by default and to ask whether the user wants to use it, or better
    yet, to limit the use of this mechanism to just the tutorials.


    In-application assistance has varying levels of importance, depending on the type
    of application you are writing and on the target market. For example, if you are
    writing an application that is advanced by its very nature (for example, an FTP
    client), you can make do with a few help pages. However, if you''re writing an
    educational application for school children, add as much help as possible.


    If you can do so, it''s always a good idea to include multimedia content in your
    help pages. For example, if your application has a help page explaining that “while
    a file transfer is in progress, the file transfer icon will appear in the top-right
    corner of the screen,” you can supplement this explanation by including the icon
    itself on the help page. This is not going to cost you very much in terms of resources
    or JAR size, because you already have the icon included in your JAR file.


    Furthermore, although it''s a bit of a stretch, consider also including multimedia
    content that explains the notions and concepts your application works with. For
    example, if you''re developing a peer-to-peer file transfer client, consider including
    an image or two detailing how peer-to-peer works. This is by no means necessary,
    and doing so will increase your JAR file size. However, it does tend to show that
    great care has been given to the application—and users will appreciate this.'
