  raw: 'Before we end this discussion and continue with the book, there is one more
    thing I would like to mention: event handling, like all things Java ME, has no
    universal solution. Depending on what kind of application you are writing, you
    might prefer one approach over another. For example, the listener-controller paradigm
    is great for business applications, but it might simply be too slow for some real-time
    applications such as action games. In those cases, you may prefer to handle events
    as they occur and as close to the source as possible.


    #### The Bootstrap Class


    Flexibility and freedom is good, but you do have to make a few function calls
    to get everything set up. This is where our next core class, `Bootstrap`, comes
    in. It allows you to get everything up and ready to go with the minimum amount
    of function calls, which makes it great for quick test projects or for showing
    the framework to people who are unfamiliar with it. You can also add different
    “boot” methods to the class for different circumstances and setups—ours has just
    one for now. The full source code for `Bootstrap` is shown in [Listing 2–16](#Chapter02.html#list_2_16).


    **Listing 2–16.** *The `Bootstrap` Class*


    `package com.apress.framework.core;`


    `import com.apress.framework.common.EventControllerManager;`

    `import javax.microedition.midlet.MIDlet;`


    `public class Bootstrap`

    `{`


    `    public static void boot(MIDlet midlet, long eventManagerSleepTime)`

    `    {`

    `        Application.init(midlet);`

    `        EventControllerManager main = Application.getMainEventControllerManager();`

    `        main.assign(Application.getMainEventController());`

    `        EventManagerThreads.start(main, eventManagerSleepTime);`

    `    }`

    `}`


    With the `Bootstrap` class in place, our basic framework is now complete. All
    that''s left is to take it for a little test run, which is exactly what we''ll
    do next.


    ### A Simple Test Application


    Once the framework is ready, the best way to get a quick feel for how it works
    is to write a simple test application and play around with it. This will also
    allow you to test for problems with the framework.


    Our test application will be as basic as possible, but at the same time it will
    test all the important aspects of the framework: the use of controllers, events,
    views, and models.


    The basic idea behind it is this: you have two controllers, each symbolizing a
    player in a PING-PONG game.


    One controller responds to PING events by displaying its own view, and then it
    issues a PONG event.


    The other controller responds to PONG events, displays its view, and then issues
    a PING event. The two controllers basically exchange messages back and forth continuously,
    while doing some processing in the middle. This simple scenario covers 90% of
    all the applications out there, so it is a very suitable one.


    Now, before we can write the test application, we need to set up the proper events.
    Your `EVT` class should look something like the one in [Listing 2–17](#Chapter02.html#list_2_17).


