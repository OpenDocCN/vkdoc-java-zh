- fmt: "# Clipping Rectangles\n\nWith container scrolling, it becomes possible that\
    \ some widgets aren’t entirely visible. Thus, in order to properly paint a widget,\
    \ we have to determine what part of it is visible (its clipping rectangle) and\
    \ clip out the rest.\n\nThis is fairly easy to do if the parent of the widget\
    \ is the top-level parent, but what if the parent of the widget also has a parent\
    \ of its own? For example, what if the widget’s parent has a horizontal scroll\
    \ that clips the widget in half horizontally, and the parent’s parent has a vertical\
    \ scroll that clips the widget in half vertically, like in [Figure 6–1](#Chapter06.html#fig_6_1)?\n\
    \n![images](images/0601.jpg)\n\n**Figure 6–1.** *A clipping situation*\n\nFurthermore,\
    \ what if the parent of the parent also has a parent of its own? How do you calculate\
    \ the clipping rectangle then? You can see that this can get complicated really\
    \ fast. However, the solution is quite simple, both conceptually and in code.\
    \ It just requires a bit of clever thinking.\n\nFor starters, let’s define that,\
    \ initially, a widget’s clipping rectangle is the same as its position and size\
    \ onscreen—that is, as follows:\n\n`ClipRect.X = getAbsoluteX()`\n`ClipRect.Y\
    \ = getAbsoluteY()`\n`ClipRect.Width = getTotalWidth()`\n`ClipRect.Height = getTotalHeight()`\n\
    \nNext, to get the proper clip rectangle of the widget, we must intersect its\
    \ clip rectangle with the one of its parent, and then intersect the result with\
    \ the clip rectangle of the parent’s parent, and so on until we reach the top-level\
    \ parent, which is usually the screen. Whatever the resulting intersection rectangle\
    \ we have then is the actual clipping rectangle for our widget.\n\nWe have thus\
    \ reduced the clipping problem to a computational geometry problem, the intersection\
    \ of rectangles, which fortunately is easy to solve. But for this, we must first\
    \ redefine the way in which we represent our rectangles.\n\nSpecifically, we will\
    \ switch from our current approach of representing rectangles by specifying their\
    \ (X,Y) coordinates and their width and height to representing rectangles by specifying\
    \ the coordinates of their opposite corners, like in [Figure 6–2](#Chapter06.html#fig_6_2).\n\
    \n![images](images/0602.jpg)\n\n**Figure 6–2.** *Redefining clip rectangle representations*\n\
    \nThis seemingly minor change makes a world of difference. Consider what happens\
    \ when two rectangles intersect in the new representation, like in [Figure 6–3](#Chapter06.html#fig_6_3).\n\
    \n![images](images/0603.jpg)\n\n**Figure 6–3.** *Possible rectangle intersection\
    \ scenarios*\n\nIt’s obvious visually what the resulting intersection rectangles\
    \ are, but computers care only about numbers. With the old representation for\
    \ rectangles, it’s kind of difficult and counterintuitive to *calculate* the intersection\
    \ rectangle, but our new representation for rectangles makes this a walk in the\
    \ park—and an intuitive one at that!\n\nOnce you play around enough with the drawings\
    \ and analyze them, you will notice that in all of the cases shown in [Figure\
    \ 6–3](#Chapter06.html#fig_6_3), and in fact in all rectangle intersection cases,\
    \ the `minX` of the resulting intersection rectangle is the maximum of the `minX`\
    \ values of the source rectangles.\n\nThis is a bit of a mouthful, but writing\
    \ in math is easier to understand:\n\n`result.minX = Max ( source1.minX, source2.minX\
    \ )`\n\nLikewise, the `maxX` of the resulting rectangle is the minimum of the\
    \ `maxX` values of the source rectangles, or the following:\n\n`result.maxX =\
    \ Min ( source1.maxX, source2.maxX )`\n\nThe same formulas apply for the Y coordinates,\
    \ as shown here:\n\n`result.minY = Max ( source1.minY, source2.minY )`\n`result.maxY\
    \ = Min ( source1.maxY, source2.maxY )`\n\nGo ahead and try the formulas out on\
    \ any two rectangles you can think of; you will find that they “magically” work!\n\
    \nArmed with this knowledge, we can now write our `ClipRect` class. The interesting\
    \ parts of it are shown in [Listing 6–5](#Chapter06.html#list_6_5).\n\n**Listing\
    \ 6–5.** *The `ClipRect` Class*\n\n```\npackage app.module.ui.models;\n\npublic\
    \ class ClipRect\n{\n        ...\n\n    public ClipRect(int minX, int minY, int\
    \ maxX, int maxY)\n    {\n       ...\n    }\n\n        ...\n\n    public ClipRect\
    \ intersectWith(ClipRect otherRect)\n    {\n       ClipRect newRect = new ClipRect\
    \ ( Math.max (this.minX, otherRect.getMinX()),\n            Math.max (this.minY,\
    \ otherRect.getMinY()),\n            Math.min (this.maxX, otherRect.getMaxX()),\n\
    \            Math.min (this.maxY, otherRect.getMaxY()));\n\n       return newRect;\n\
    \    }\n\n    public boolean isVisible()\n    {\n        return ( this.maxX >=\
    \ this.minX && this.maxY > this.minY );\n    }\n\n}\n```\n\nThe highlighted portion\
    \ of the code shows how to determine if a clipping rectangle is visible and/or\
    \ valid. If you try to intersect two rectangles that do not overlap, then if you\
    \ apply the foregoing formulas, you will get either that `maxX < minX`, or `maxY\
    \ < minY`, or both. Go ahead, try it! Thus, if both of these conditions are false,\
    \ the clipping rectangle is valid and thus visible.\n\nAt this point, we can write\
    \ the `ClipHelper` class, which contains helper methods related to clipping. The\
    \ most important parts of it are presented in [Listing 6–6](#Chapter06.html#list_6_6).\n\
    \n**Listing 6–6.** *The `ClipHelper` Class*\n\n```\npackage app.module.ui.helpers;\n\
    \nimport app.module.ui.models.ClipRect;\nimport app.module.ui.models.Widget;\n\
    import javax.microedition.lcdui.Graphics;\n\npublic class ClipHelper\n{\n    public\
    \ static ClipRect getTargetClipRectFor(Widget w)\n    {\n        ClipRect result\
    \ = w.getClipRect();\n        Widget parent = w.getParent();\n        while (\
    \ parent != null )\n        {\n            result = result.intersectWith(parent.getClipRect());\n\
    \            parent = parent.getParent();\n        }\n\n        return result;\n\
    \    }\n\n    public static void setClipOn(Widget w, Graphics g)\n    {\n    \
    \    ClipRect result = getTargetClipRectFor(w);\n        g.setClip(result.getMinX(),\
    \ result.getMinY(), result.getMaxX()-result\n        .getMinX(), result.getMaxY()-result.getMinY());\n\
    \    }\n    ...\n}\n```\n\nThe highlighted portion of the code shows just how\
    \ easy it is to calculate the clipping rectangle of any widget.\n\nClipping rectangles\
    \ are commonly mishandled in Java ME UI frameworks. This is a shame, since clipping\
    \ is heavily used throughout almost any UI. Using a less than optimal implementation\
    \ for it can lead to complicated code and resource waste, both of which should\
    \ be avoided like the plague. The solution described in this section is simple,\
    \ efficient, and scalable, plus it can be made lightning fast with a few code\
    \ optimizations, which we will discuss later in the book.\n\nClipping rectangles\
    \ are also a very good example of how redefining your data structures can solve\
    \ a lot of problems and make things clearer and more elegant. The presented solution\
    \ is harder to figure out, more difficult to implement, and less elegant if you\
    \ think in terms of (X,Y,width,height) than it is if you think in terms of (minX,minY,maxX,maxY)—don’t\
    \ you agree?"
  raw: '#### Clipping Rectangles


    With container scrolling, it becomes possible that some widgets aren’t entirely
    visible. Thus, in order to properly paint a widget, we have to determine what
    part of it is visible (its clipping rectangle) and clip out the rest.


    This is fairly easy to do if the parent of the widget is the top-level parent,
    but what if the parent of the widget also has a parent of its own? For example,
    what if the widget’s parent has a horizontal scroll that clips the widget in half
    horizontally, and the parent’s parent has a vertical scroll that clips the widget
    in half vertically, like in [Figure 6–1](#Chapter06.html#fig_6_1)?


    ![images](images/0601.jpg)


    **Figure 6–1.** *A clipping situation*


    Furthermore, what if the parent of the parent also has a parent of its own? How
    do you calculate the clipping rectangle then? You can see that this can get complicated
    really fast. However, the solution is quite simple, both conceptually and in code.
    It just requires a bit of clever thinking.


    For starters, let’s define that, initially, a widget’s clipping rectangle is the
    same as its position and size onscreen—that is, as follows:


    `ClipRect.X = getAbsoluteX()`

    `ClipRect.Y = getAbsoluteY()`

    `ClipRect.Width = getTotalWidth()`

    `ClipRect.Height = getTotalHeight()`


    Next, to get the proper clip rectangle of the widget, we must intersect its clip
    rectangle with the one of its parent, and then intersect the result with the clip
    rectangle of the parent’s parent, and so on until we reach the top-level parent,
    which is usually the screen. Whatever the resulting intersection rectangle we
    have then is the actual clipping rectangle for our widget.


    We have thus reduced the clipping problem to a computational geometry problem,
    the intersection of rectangles, which fortunately is easy to solve. But for this,
    we must first redefine the way in which we represent our rectangles.


    Specifically, we will switch from our current approach of representing rectangles
    by specifying their (X,Y) coordinates and their width and height to representing
    rectangles by specifying the coordinates of their opposite corners, like in [Figure
    6–2](#Chapter06.html#fig_6_2).


    ![images](images/0602.jpg)


    **Figure 6–2.** *Redefining clip rectangle representations*


    This seemingly minor change makes a world of difference. Consider what happens
    when two rectangles intersect in the new representation, like in [Figure 6–3](#Chapter06.html#fig_6_3).


    ![images](images/0603.jpg)


    **Figure 6–3.** *Possible rectangle intersection scenarios*


    It’s obvious visually what the resulting intersection rectangles are, but computers
    care only about numbers. With the old representation for rectangles, it’s kind
    of difficult and counterintuitive to *calculate* the intersection rectangle, but
    our new representation for rectangles makes this a walk in the park—and an intuitive
    one at that!


    Once you play around enough with the drawings and analyze them, you will notice
    that in all of the cases shown in [Figure 6–3](#Chapter06.html#fig_6_3), and in
    fact in all rectangle intersection cases, the `minX` of the resulting intersection
    rectangle is the maximum of the `minX` values of the source rectangles.


    This is a bit of a mouthful, but writing in math is easier to understand:


    `result.minX = Max ( source1.minX, source2.minX )`


    Likewise, the `maxX` of the resulting rectangle is the minimum of the `maxX` values
    of the source rectangles, or the following:


    `result.maxX = Min ( source1.maxX, source2.maxX )`


    The same formulas apply for the Y coordinates, as shown here:


    `result.minY = Max ( source1.minY, source2.minY )`

    `result.maxY = Min ( source1.maxY, source2.maxY )`


    Go ahead and try the formulas out on any two rectangles you can think of; you
    will find that they “magically” work!


    Armed with this knowledge, we can now write our `ClipRect` class. The interesting
    parts of it are shown in [Listing 6–5](#Chapter06.html#list_6_5).


    **Listing 6–5.** *The `ClipRect` Class*


    `package app.module.ui.models;`


    `public class ClipRect`

    `{`

    `        ...`


    `    public ClipRect(int minX, int minY, int maxX, int maxY)`

    `    {`

    `       ...`

    `    }`


    `        ...`


    `    public ClipRect intersectWith(ClipRect otherRect)`

    `    {`

    `       ClipRect newRect = new ClipRect ( Math.max (this.minX, otherRect.getMinX()),`

    `            Math.max (this.minY, otherRect.getMinY()),`

    `            Math.min (this.maxX, otherRect.getMaxX()),`

    `            Math.min (this.maxY, otherRect.getMaxY()));`


    `       return newRect;`

    `    }`


    **`    public boolean isVisible()`**

    **`    {`**

    **`        return ( this.maxX >= this.minX && this.maxY > this.minY );`**

    **`    }`**


    `}`


    The highlighted portion of the code shows how to determine if a clipping rectangle
    is visible and/or valid. If you try to intersect two rectangles that do not overlap,
    then if you apply the foregoing formulas, you will get either that `maxX < minX`,
    or `maxY < minY`, or both. Go ahead, try it! Thus, if both of these conditions
    are false, the clipping rectangle is valid and thus visible.


    At this point, we can write the `ClipHelper` class, which contains helper methods
    related to clipping. The most important parts of it are presented in [Listing
    6–6](#Chapter06.html#list_6_6).


    **Listing 6–6.** *The `ClipHelper` Class*


    `package app.module.ui.helpers;`


    `import app.module.ui.models.ClipRect;`

    `import app.module.ui.models.Widget;`

    `import javax.microedition.lcdui.Graphics;`


    `public class ClipHelper`

    `{`

    **`    public static ClipRect getTargetClipRectFor(Widget w)`**

    **`    {`**

    **`        ClipRect result = w.getClipRect();`**

    **`        Widget parent = w.getParent();`**

    **`        while ( parent != null )`**

    **`        {`**

    **`            result = result.intersectWith(parent.getClipRect());`**

    **`            parent = parent.getParent();`**

    **`        }`**


    **`        return result;`**

    **`    }`**


    `    public static void setClipOn(Widget w, Graphics g)`

    `    {`

    `        ClipRect result = getTargetClipRectFor(w);`

    `        g.setClip(result.getMinX(), result.getMinY(), result.getMaxX()-result`

    `        .getMinX(), result.getMaxY()-result.getMinY());`

    `    }`

    `    ...`

    `}`


    The highlighted portion of the code shows just how easy it is to calculate the
    clipping rectangle of any widget.


    Clipping rectangles are commonly mishandled in Java ME UI frameworks. This is
    a shame, since clipping is heavily used throughout almost any UI. Using a less
    than optimal implementation for it can lead to complicated code and resource waste,
    both of which should be avoided like the plague. The solution described in this
    section is simple, efficient, and scalable, plus it can be made lightning fast
    with a few code optimizations, which we will discuss later in the book.


    Clipping rectangles are also a very good example of how redefining your data structures
    can solve a lot of problems and make things clearer and more elegant. The presented
    solution is harder to figure out, more difficult to implement, and less elegant
    if you think in terms of (X,Y,width,height) than it is if you think in terms of
    (minX,minY,maxX,maxY)—don’t you agree?'
  trans: '

    #### 裁剪矩形


    随着容器的滚动，某些控件可能无法完全可见。因此，为了正确绘制控件，我们必须确定其可见部分（即裁剪矩形），并将其余部分裁剪掉。


    如果控件的父级是顶级父级，这很容易实现，但如果控件的父级本身也有父级呢？例如，假设控件的父级有一个水平滚动条，将控件水平裁剪掉一半，而父级的父级有一个垂直滚动条，将控件垂直裁剪掉一半，就像图
    6-1 所示那样？


    ![images](img/0601.jpg)


    **图 6-1.** *一种裁剪情况*


    此外，如果父级的父级也有自己的父级呢？那么该如何计算裁剪矩形？你可以看到，这很快就会变得复杂。然而，解决方案在概念上和代码上都相当简单，只需要一点巧妙的思考。


    首先，我们定义：初始状态下，控件的裁剪矩形与其在屏幕上的位置和大小相同，即如下所示：


    `ClipRect.X = getAbsoluteX()`

    `ClipRect.Y = getAbsoluteY()`

    `ClipRect.Width = getTotalWidth()`

    `ClipRect.Height = getTotalHeight()`


    接下来，为了获得控件正确的裁剪矩形，我们必须将其裁剪矩形与其父级的裁剪矩形相交，然后将结果与父级的父级的裁剪矩形相交，依此类推，直到到达顶级父级（通常是屏幕）。最终得到的相交矩形就是控件的实际裁剪矩形。


    这样，我们就把裁剪问题简化为一个计算几何问题——矩形相交，幸运的是，这个问题很容易解决。但为此，我们必须首先重新定义表示矩形的方式。


    具体来说，我们将从当前通过指定 (X,Y) 坐标以及宽度和高度来表示矩形的方法，切换到通过指定其对角坐标来表示矩形，如图 6-2 所示。


    ![images](img/0602.jpg)


    **图 6-2.** *重新定义裁剪矩形表示*


    这个看似微小的改变带来了天壤之别。考虑一下在新表示法中两个矩形相交时会发生什么，如图 6-3 所示。


    ![images](img/0603.jpg)


    **图 6-3.** *可能的矩形相交场景*


    从视觉上看，最终的相交矩形显而易见，但计算机只关心数字。使用旧的矩形表示法，*计算*相交矩形既困难又违反直觉，而我们的新矩形表示法则让这件事变得轻而易举，而且非常直观！


    当你充分研究这些图形并进行分析后，你会注意到，在图 6-3 所示的所有情况中，实际上在所有矩形相交的情况下，最终相交矩形的 `minX` 都是源矩形 `minX`
    值中的最大值。


    这说起来有点拗口，但用数学公式写出来就更容易理解了：


    `result.minX = Max ( source1.minX, source2.minX )`


    同样，最终矩形的 `maxX` 是源矩形 `maxX` 值中的最小值，即：


    `result.maxX = Min ( source1.maxX, source2.maxX )`


    同样的公式也适用于 Y 坐标，如下所示：


    `result.minY = Max ( source1.minY, source2.minY )`

    `result.maxY = Min ( source1.maxY, source2.maxY )`


    请尝试对你所能想到的任何两个矩形应用这些公式；你会发现它们“神奇地”有效！


    掌握了这些知识，我们现在可以编写 `ClipRect` 类了。其有趣的部分如代码清单 6-5 所示。


    **代码清单 6-5.** *`ClipRect` 类*


    `package app.module.ui.models;`


    `public class ClipRect`

    `{`

    `        ...`


    `    public ClipRect(int minX, int minY, int maxX, int maxY)`

    `    {`

    `       ...`

    `    }`


    `        ...`


    `    public ClipRect intersectWith(ClipRect otherRect)`

    `    {`

    `       ClipRect newRect = new ClipRect ( Math.max (this.minX, otherRect.getMinX()),`

    `            Math.max (this.minY, otherRect.getMinY()),`

    `            Math.min (this.maxX, otherRect.getMaxX()),`

    `            Math.min (this.maxY, otherRect.getMaxY()));`


    `       return newRect;`

    `    }`


    **`    public boolean isVisible()`**

    **`    {`**

    **`        return ( this.maxX >= this.minX && this.maxY > this.minY );`**

    **`    }`**


    `}`


    代码中高亮的部分展示了如何判断一个裁剪矩形是否可见或有效。如果你尝试相交两个不重叠的矩形，那么应用上述公式后，你会得到 `maxX < minX` 或 `maxY
    < minY`，或者两者都成立。请亲自试试看！因此，如果这两个条件都不成立，则裁剪矩形有效，因此可见。


    至此，我们可以编写 `ClipHelper` 类，其中包含与裁剪相关的辅助方法。其最重要的部分如代码清单 6-6 所示。


    **代码清单 6-6.** *`ClipHelper` 类*


    `package app.module.ui.helpers;`


    `import app.module.ui.models.ClipRect;`

    `import app.module.ui.models.Widget;`

    `import javax.microedition.lcdui.Graphics;`


    `public class ClipHelper`

    `{`

    **`    public static ClipRect getTargetClipRectFor(Widget w)`**

    **`    {`**

    **`        ClipRect result = w.getClipRect();`**

    **`        Widget parent = w.getParent();`**

    **`        while ( parent != null )`**

    **`        {`**

    **`            result = result.intersectWith(parent.getClipRect());`**

    **`            parent = parent.getParent();`**

    **`        }`**


    **`        return result;`**

    **`    }`**


    `    public static void setClipOn(Widget w, Graphics g)`

    `    {`

    `        ClipRect result = getTargetClipRectFor(w);`

    `        g.setClip(result.getMinX(), result.getMinY(), result.getMaxX()-result`

    `        .getMinX(), result.getMaxY()-result.getMinY());`

    `    }`

    `    ...`

    `}`


    代码中高亮的部分展示了计算任何控件裁剪矩形是多么容易。


    在 Java ME UI 框架中，裁剪矩形经常被错误处理。这很可惜，因为裁剪在几乎任何 UI 中都被大量使用。使用次优的实现方案会导致代码复杂和资源浪费，这两者都应像躲避瘟疫一样避免。本节描述的解决方案简单、高效且可扩展，此外，通过一些代码优化（我们将在本书后面讨论），它还可以变得极其快速。


    裁剪矩形也是一个很好的例子，说明了重新定义数据结构可以解决许多问题，并使事情更清晰、更优雅。如果你以 (X,Y,width,height) 的方式思考，那么所提出的解决方案更难想出、更难实现且不够优雅；而如果你以
    (minX,minY,maxX,maxY) 的方式思考，则情况正好相反——你同意吗？

