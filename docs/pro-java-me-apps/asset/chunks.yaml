    ### Java ME 的消亡


    尽管 Java ME 的消亡终有一天会发生（如同所有软件平台一样），但在可预见的未来，这一事件不太可能发生。不过，我们还是悲观地审视一下，Java ME 作为一个平台，可能如何以及为何会消亡。


    最明显的原因是来自其他移动平台的竞争，尤其是 Android。Android 的采用率惊人，未来几年必将成为领先的智能手机平台。它被认为（且理由充分）是一个灵活且强大的移动平台，并且由于无需许可费用，制造商迅速采纳了它。


    然而，Android 仍然是一个智能手机平台，需要相应的硬件：快速的 CPU、大容量 RAM、支持触摸的大屏幕。这些不仅成本高昂，而且往往耗电很快——任何智能手机用户都能告诉你这一点。


    相比之下，Java ME 更像是一个应用环境。其最低规格要求远低于 Android，这意味着它可以在性能低得多的硬件上运行，并且在此过程中功耗显著降低（这得益于一个事实：与
    Android 不同，Java ME 环境仅在应用运行时才需激活）。商业原因也起了作用，因为消费者为智能手机支付的溢价部分是基于其操作系统。如果你在入门级设备上提供相同的操作系统，就必须降低溢价，而我认为制造商短期内不会在
    Android 上这样做。


    所有这些都意味着，Java ME 比 Android 更适合功能手机，而且这种情况在未来不太可能改变。诚然，Android 设备正变得越来越便宜，但在入门级手机领域，Java
    ME 始终能提供更高的性价比。


    第二个常被提及的原因是，大多数开发者正涌向智能手机平台。这现在确实如此，但只要 Java ME 应用存在市场（正如我们所见，现在有，将来也会有），就必然会有
    Java ME 开发者。此外，无论从成本还是技术角度来看，Java ME 都是最容易入门的平台，因此总会有源源不断的新开发者加入。MIDP 3.0 也将引起广泛关注，因为它确实极大地增强了
    Java ME 的能力。


    Java ME 无法赚钱是另一个被引用的平台消亡原因。然而，这是错误的。虽然赚钱的机会*没有那么多*，但这并不意味着没有机会。你只需要考虑你的商业模式。正如我在本书开头所说，Java
    ME 应用不像智能手机应用那样通过向最终用户销售来盈利。你还应该将目光投向本土以外的商机，即发展中国家。


    可能导致 Java ME 终结的最后一个原因是平台停滞不前。这在一定程度上是正确的，因为近年来其发展速度远慢于其他平台。但发展*确实存在*。硬件比以前更强大，API
    是最新的，并正逐渐被越来越多的设备采用，屏幕也变得更大更好。真正令人担忧的是 Java ME 与其他平台之间的差距。这个差距非常真实，并且目前正在扩大，而能够（在很大程度上）缩小差距的
    MIDP 3.0 却遥遥无期。


    然而，这并不完全正确。缺少的是支持 MIDP 3.0 的*设备*。标准本身已经就绪，并且有相应的参考实现。请记住，从许多角度来看，MIDP 3.0 都非常庞大，因此公司自然不愿一头扎进去。需要考虑的因素和影响很多（例如，实现
    MIDP 3.0 可能需要对制造商当前使用的固件进行大规模修改）。但这一跨越迟早会发生；这只是时间问题。


    ### 总结


    在本章中，你了解了 Java ME 平台在硬件、软件、目标市场等方面的未来前景。你还审视了 Java ME 可能在可预见的未来“消亡”的一些原因。


    ## 第 16 章


    ## 结语


    至此，我们关于 Pro Java ME 应用世界的旅程已到达终点。因此，我想利用最后这几页来回顾本书至此讨论的内容，并为你提供一些关于下一步该如何深化平台知识的指引。


    ### 本书涵盖的内容


    我们从对 Java ME 世界的简单介绍开始：快速概述了该平台、为其开发所需的基本技术，以及在此过程中会遇到的各种问题。作为目标，我们设定要使用专业的开发方法编写一个
    Java ME Twitter 客户端。


    设定目标后，我们继续旅程，为我们的应用编写了一个合适的框架，解释了沿途所做的决策，并强调了为应用构建良好框架对其成功至关重要。


    接着，我们着手定义应用所需的关键数据结构。我们探讨了 Java ME 处理数据建模的方式，以及正确定义的对象和数据结构如何能显著简化开发过程并整体改进应用。


    然后，我们继续编写应用的所有必要模块：网络模块、UI 模块、持久化模块和本地化模块。在此过程中，我们解释了关键决策，强调了可能致命的错误，并给出了有用的建议。


    完成应用后，议程的下一步是讨论 Java ME 最大的顽疾：碎片化。我们讨论了常见的碎片化类型，并描述了相应的解决方案。


    接着，我们深入探讨了同样重要的 Java ME 代码优化主题。我们解释并举例说明了重要的优化技术，以及其背后的原理和底层工作机制。


    接下来讨论的主题是通过添加精细修饰和改进用户与应用交互方式来提升应用质量。我们针对每个类别给出了示例并进行了讨论。


    之后，我们探索了各种形式的 Java ME 应用测试。从基本的单元测试到涉及硬件修改的测试，我们解释了最相关的 Java ME 应用测试技术。


    倒数第二个讨论的主题是图形。我们介绍了一些在当今 Java ME 应用中非常有用的有趣图形技术，例如图像遮罩和图像旋转。


    我们以讨论正确的 Java ME 思维方式结束了旅程。我们概述、解释并辅以真实案例说明了应指导整个 Java ME 应用开发过程的一整套规则和原则。

    '
- fmt: '### What to research next


    The first thing I would recommend is to read as much as possible on two key topics
    related to Java ME development: code optimizations and graphics. Both of these
    areas are critical for creating highly polished applications that are competitive
    and user friendly. They are also the main weaknesses of Java ME compared to other
    mobile platforms, in that you have to optimize the code yourself and you also
    have to implement from scratch anything but the most basic graphical operations.


    Algorithms and data structures should probably be covered next. These topics are
    important for professional applications on any platform, but they are especially
    important for Java ME because using the right algorithms and data structures makes
    the difference between having an application that runs out of resources and/or
    crashes and having an application that runs smoothly along, without hiccups.


    Another area you should research is that of user interface design and user interaction,
    particularly literature focused on UI’s running on small displays. Good knowledge
    in this area is very important if you want to get the most out of your application.
    Remember, no matter how technically competent your application is, users still
    have to be able to use it with ease. Furthermore, this is not just a “design thing”;
    the knowledge you will gain researching this topic will help you better write
    and implement your UIs because you will better understand the principles at work
    behind them.


    If you are not already into it, cross-platform development and application porting
    should also be on your list of things to look into. This is already pretty big,
    but will become even bigger once MIDP 3.0 devices appear on the market. In addition,
    even if you’re only developing for Java ME, having some hands-on knowledge of
    how various tasks are done on other platforms and how Java ME compares to them
    in concrete scenarios will help your development process tremendously.


    Lastly, and this may sound unusual, you should do some research into the microcomputer
    platforms of the ‘80s, such as the Commodore 64 or the ZX Spectrum. Read about
    them, play with some emulators, try to get a feel of what their applications were
    like and of how said applications were written. Java ME and these old platforms
    share the common spirit of doing incredible things with very limited resources,
    and of pushing the boundaries of the underlying platform through innovation and
    outside the box thinking, so researching these computers of days gone by will
    help you better grasp and understand the nature of Java ME software development.


    ### In closing


    The main goal of the book was to explain how to professionally approach each aspect
    of the Java ME development process, from the initial planning to the final fine
    touches. I sincerely hope that this goal was achieved and that, after reading
    these pages, you have gained valuable insight and information that will help you
    become a better Java ME developer.


    I also hope that this book’s approach of writing and discussing a complete Java
    ME application rather than working with independent snippets of code has given
    you a complete picture of what writing a Pro Java ME app requires, and a better
    understanding of how the tips and techniques presented herein can be used in real
    life scenarios.


    Finally, I hope that you had fun reading this book, and that it has inspired you
    to explore, try out new things and push the limits of what’s possible with the
    Java ME platform today.


    Happy coding!


