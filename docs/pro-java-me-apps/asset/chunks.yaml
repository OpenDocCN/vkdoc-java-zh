- fmt: "### Views\n\n`Views` are abstract representations of the application’s screens.\
    \ As we have seen previously in the book, the `View` interface does not provide\
    \ many interaction capabilities on its own. This is intentional, as some views\
    \ may be self-reliant and able to function on their own—for example, a `ScreenSaver`\
    \ view. In practice, however, most concrete views implement at least one other\
    \ interface, typically `Container` or `Widget`, so that the rest of the application\
    \ may interact with them.\n\nThus, views are themselves widgets, although by their\
    \ very nature they are somewhat special since they typically sit between the application’s\
    \ code and the platform’s native code. For example, most low-level views extend\
    \ the `GameCanvas` native class directly, which means, among other things, that\
    \ views are the entry points for user interaction events such as keypresses and\
    \ touch events. They also take care of low-level graphics stuff, like buffering\
    \ and drawing on the screen.\n\nViews can be made to do pretty “crazy” stuff.\
    \ For example, you can implement a `RemoteView` class, which forwards all `paint()`\
    \ calls to an image instead of to the screen and then sends that image over the\
    \ Web to a remote server, thus allowing users to use the application anywhere\
    \ in the world, in a web browser! If you think this has no real-life usage, just\
    \ think about the possibilities it opens up for remote debugging and remote assistance.\n\
    \n### Themes\n\nEach pro Java ME application has a specific set of colors to be\
    \ used for drawing, in order to ensure a consistent visual style throughout the\
    \ user interface. For example, the designers might dictate that all focused widgets\
    \ must have a green background, while all unfocused widgets must have a black\
    \ background. To keep everything consistent, themes are used. Themes are descendents\
    \ of the `UITheme` interface, shown in [Listing 6–7](#Chapter06.html#list_6_7).\n\
    \n**Listing 6–7.** *The `UITheme` Interface*\n\n```\npackage app.module.ui.models;\n\
    \nimport javax.microedition.lcdui.Font;\n\npublic interface UITheme\n{\n    public\
    \ int getAppBgColor();\n    public int getSelectedBgColor();\n    public int getNotSelectedBgColor();\n\
    \    public int getSelectedFgColor();\n    public int getNotSelectedFgColor();\n\
    \    public Font getSelectedFont();\n    public Font getNotSelectedFont();\n \
    \   ...\n}\n```\n\nAs you can see, a theme provides all the necessary colors used\
    \ by the application in a consistent and global manner.\n\nGenerally, whenever\
    \ a widget is created, a theme is attached to it; the widget must then use the\
    \ colors specified in the theme for all drawing operations. This means that when\
    \ you change the background color of a theme, for example, all widgets using that\
    \ theme will then reflect the change.\n\nOf course, you can also use multiple\
    \ themes at the same time, or switch between themes at runtime; anything is possible.\n\
    \nFurthermore, themes can provide more than just color values: they can provide\
    \ image objects to be used as icons or other UI elements, like sounds. You can\
    \ even use themes to customize the speed of animated scrolling, the duration of\
    \ vibrations, and pretty much everything else related to user interaction.\n\n\
    In our application, we will limit ourselves to just a single theme, which will\
    \ specify only the colors to be used for drawing. It can be seen in [Listing 6–8](#Chapter06.html#list_6_8).\n\
    \n**Listing 6–8.** *Our `AppTheme` Class*\n\n```\npackage app.classes;\n\nimport\
    \ app.module.ui.models.UITheme;\nimport javax.microedition.lcdui.Font;\npublic\
    \ class AppTheme implements UITheme\n{\n\n    public int getSelectedBgColor()\n\
    \    {\n        return 0x0000FF00;\n    }\n\n    public int getNotSelectedBgColor()\n\
    \    {\n        return 0x00888888;\n    }\n\n    ...\n\n}\n```\n\nFinally, themes\
    \ can be made smart. For example, you can create a theme class that returns different\
    \ colors and media depending on the time of day. Smart themes are a great and\
    \ simple way to customize and polish your applications because they’re fairly\
    \ easy to code and they add a lot of value to the user experience.\n\n### Handling\
    \ User Interaction\n\nUser interaction is a critical part of the UI framework,\
    \ so it is crucial that we get it right.\n\nFirst of all, as mentioned earlier,\
    \ user interaction events typically enter the application through `Views`. From\
    \ there, they are forwarded to sub-widgets, as described next.\n\nWhen a user-interaction\
    \ method (`handleXXXX()`) is called on a widget (this includes `Views` and `Containers`),\
    \ the widget should first try to forward the call to its focused sub-widget, if\
    \ any, or to the sub-widget at the pointer position in the case of a touch interaction.\
    \ If the sub-widget does not handle the interaction, then the widget itself should\
    \ try to handle it. If neither the sub-widget nor the widget itself handles it,\
    \ then the method should return `false`, signaling that the caller is free to\
    \ try to handle the interaction.\n\nAs you can imagine, this is a very recursion-intensive\
    \ process, and one you should pay close attention to. Because of the many levels\
    \ of nested calls involved, forwarding an interaction event to the wrong widget,\
    \ falsely signaling its handled/not handled status, or worse, not forwarding the\
    \ call at all, can all lead to unpredictable consequences.\n\nFor example, in\
    \ one project I worked on, which was a social network client, one of the containers\
    \ wrongly calculated the widget under the pointer in some cases because it didn’t\
    \ take scrolling into consideration—and that resulted in the wrong widget receiving\
    \ touch events. I found this out the hard way. The form I was working on at the\
    \ time was a “Send message” form, and what I wanted to do was test the functionality\
    \ of the Back button, which was supposed to show a pop-up saying, “Are you sure\
    \ you want to discard the message?” The Back button was located below the Send\
    \ button. So what I did was write a very “nice” message in the “Enter message”\
    \ edit field and touch the Back button on the screen. However, since the container\
    \ did not take scrolling into consideration, I will leave you to guess what button\
    \ the application actually thought I was pressing and what happened next…\n\n\
    It is also good to remember that some widgets may want to handle certain events\
    \ themselves *before* passing them over to sub-widgets, if at all. Good examples\
    \ of this are touch widgets that support gestures. They might not want to forward\
    \ some touch events to sub-widgets—for example, when the user does a finger swipe\
    \ across the screen. Instead, they may choose to interpret this as a scroll request\
    \ and handle it as such—sub-widgets receive no notice of this.\n\nNow, the UI\
    \ layer must interact with the rest of the application at some point or another.\
    \ In order for this to happen, widgets need to have a way to signal when something\
    \ needs to be done. This is achieved through the use of the `CallbackHandler`\
    \ interface, shown in [Listing 6–9](#Chapter06.html#list_6_9).\n\n**Listing 6–9.**\
    \ *The `CallbackHandler` Interface*\n\n```\npackage app.module.ui.models;\n\n\
    import com.apress.framework.objecttypes.Event;\n\npublic interface CallbackHandler\n\
    {\n    public boolean doCallback(Event evt);\n}\n```\n\nIt should be pretty obvious\
    \ how `CallbackHandlers` are used: interactive widgets have a `CallbackHandler`\
    \ attached to them, and whenever something interesting happens, they forward the\
    \ appropriate event to the handler by calling its `doCallback()` method."
  raw: '#### Views


    Views are abstract representations of the application’s screens. As we have seen
    previously in the book, the `View` interface does not provide many interaction
    capabilities on its own. This is intentional, as some views may be self-reliant
    and able to function on their own—for example, a `ScreenSaver` view. In practice,
    however, most concrete views implement at least one other interface, typically
    `Container` or `Widget`, so that the rest of the application may interact with
    them.


    Thus, views are themselves widgets, although by their very nature they are somewhat
    special since they typically sit between the application’s code and the platform’s
    native code. For example, most low-level views extend the `GameCanvas` native
    class directly, which means, among other things, that views are the entry points
    for user interaction events such as keypresses and touch events. They also take
    care of low-level graphics stuff, like buffering and drawing on the screen.


    Views can be made to do pretty “crazy” stuff. For example, you can implement a
    `RemoteView` class, which forwards all `paint()` calls to an image instead of
    to the screen and then sends that image over the Web to a remote server, thus
    allowing users to use the application anywhere in the world, in a web browser!
    If you think this has no real-life usage, just think about the possibilities it
    opens up for remote debugging and remote assistance.


    #### Themes


    Each pro Java ME application has a specific set of colors to be used for drawing,
    in order to ensure a consistent visual style throughout the user interface. For
    example, the designers might dictate that all focused widgets must have a green
    background, while all unfocused widgets must have a black background. To keep
    everything consistent, themes are used. Themes are descendents of the `UITheme`
    interface, shown in [Listing 6–7](#Chapter06.html#list_6_7).


    **Listing 6–7.** *The `UITheme` Interface*


    `package app.module.ui.models;`


    `import javax.microedition.lcdui.Font;`


    `public interface UITheme`

    `{`

    `    public int getAppBgColor();`

    `    public int getSelectedBgColor();`

    `    public int getNotSelectedBgColor();`

    `    public int getSelectedFgColor();`

    `    public int getNotSelectedFgColor();`

    `    public Font getSelectedFont();`

    `    public Font getNotSelectedFont();`

    `    ...`

    `}`


    As you can see, a theme provides all the necessary colors used by the application
    in a consistent and global manner.


    Generally, whenever a widget is created, a theme is attached to it; the widget
    must then use the colors specified in the theme for all drawing operations. This
    means that when you change the background color of a theme, for example, all widgets
    using that theme will then reflect the change.


    Of course, you can also use multiple themes at the same time, or switch between
    themes at runtime; anything is possible.


    Furthermore, themes can provide more than just color values: they can provide
    image objects to be used as icons or other UI elements, like sounds. You can even
    use themes to customize the speed of animated scrolling, the duration of vibrations,
    and pretty much everything else related to user interaction.


    In our application, we will limit ourselves to just a single theme, which will
    specify only the colors to be used for drawing. It can be seen in [Listing 6–8](#Chapter06.html#list_6_8).


    **Listing 6–8.** *Our `AppTheme` Class*


    `package app.classes;`


    `import app.module.ui.models.UITheme;`

    `import javax.microedition.lcdui.Font;`

    `public class AppTheme implements UITheme`

    `{`


    `    public int getSelectedBgColor()`

    `    {`

    `        return 0x0000FF00;`

    `    }`


    `    public int getNotSelectedBgColor()`

    `    {`

    `        return 0x00888888;`

    `    }`


    `    ...`


    `}`


    Finally, themes can be made smart. For example, you can create a theme class that
    returns different colors and media depending on the time of day. Smart themes
    are a great and simple way to customize and polish your applications because they’re
    fairly easy to code and they add a lot of value to the user experience.


    #### Handling User Interaction


    User interaction is a critical part of the UI framework, so it is crucial that
    we get it right.


    First of all, as mentioned earlier, user interaction events typically enter the
    application through `Views`. From there, they are forwarded to sub-widgets, as
    described next.


    When a user-interaction method (`handleXXXX()`) is called on a widget (this includes
    `Views` and `Containers`), the widget should first try to forward the call to
    its focused sub-widget, if any, or to the sub-widget at the pointer position in
    the case of a touch interaction. If the sub-widget does not handle the interaction,
    then the widget itself should try to handle it. If neither the sub-widget nor
    the widget itself handles it, then the method should return `false`, signaling
    that the caller is free to try to handle the interaction.


    As you can imagine, this is a very recursion-intensive process, and one you should
    pay close attention to. Because of the many levels of nested calls involved, forwarding
    an interaction event to the wrong widget, falsely signaling its handled/not handled
    status, or worse, not forwarding the call at all, can all lead to unpredictable
    consequences.


    For example, in one project I worked on, which was a social network client, one
    of the containers wrongly calculated the widget under the pointer in some cases
    because it didn’t take scrolling into consideration—and that resulted in the wrong
    widget receiving touch events. I found this out the hard way. The form I was working
    on at the time was a “Send message” form, and what I wanted to do was test the
    functionality of the Back button, which was supposed to show a pop-up saying,
    “Are you sure you want to discard the message?” The Back button was located below
    the Send button. So what I did was write a very “nice” message in the “Enter message”
    edit field and touch the Back button on the screen. However, since the container
    did not take scrolling into consideration, I will leave you to guess what button
    the application actually thought I was pressing and what happened next…


    It is also good to remember that some widgets may want to handle certain events
    themselves *before* passing them over to sub-widgets, if at all. Good examples
    of this are touch widgets that support gestures. They might not want to forward
    some touch events to sub-widgets—for example, when the user does a finger swipe
    across the screen. Instead, they may choose to interpret this as a scroll request
    and handle it as such—sub-widgets receive no notice of this.


    Now, the UI layer must interact with the rest of the application at some point
    or another. In order for this to happen, widgets need to have a way to signal
    when something needs to be done. This is achieved through the use of the `CallbackHandler`
    interface, shown in [Listing 6–9](#Chapter06.html#list_6_9).


    **Listing 6–9.** *The `CallbackHandler` Interface*


    `package app.module.ui.models;`


    `import com.apress.framework.objecttypes.Event;`


    `public interface CallbackHandler`

    `{`

    `    public boolean doCallback(Event evt);`

    `}`


    It should be pretty obvious how `CallbackHandlers` are used: interactive widgets
    have a `CallbackHandler` attached to them, and whenever something interesting
    happens, they forward the appropriate event to the handler by calling its `doCallback()`
    method.'
