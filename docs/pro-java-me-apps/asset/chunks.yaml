- fmt: "### Implementing Advanced Localization Features\n\nTranslating strings from\
    \ one language to another is easy; however, there's more to localization than\
    \ this. For example, different locales use different date formats. As Java ME\
    \ has poor support for localization, we will have to handle these ourselves.\n\
    \nThe first thing we need to do is define a localization string that contains\
    \ the proper date format, something like the snippet in [Listing 7–11](#Chapter07.html#list_7_11).\
    \ We will add this to the `en-US` localization file.\n\n**Listing 7–11.** *Defining\
    \ a Date Format*\n\n```\n# Default date format\nformat.date\nD, d/m/y\n```\n\n\
    In this example, “d” stands for the day of the month, “m” for the month, “y” for\
    \ the year, and the capital “D” stands for the day of the week. This is the convention\
    \ we will use in our localization module.\n\nNext, we need to define the days\
    \ of the week, like in [Listing 7–12](#Chapter07.html#list_7_12). The “zero” day\
    \ of the week will be used for unknown values (just in case something goes wrong\
    \ along the way, which really shouldn't happen). Again, add these localization\
    \ strings to the `en-US` localization file.\n\n**Listing 7–12.** *Defining the\
    \ Days of the Week*\n\n```\n# Week day names\nweekdays.names:1\nMonday\n\nweekdays.names:2\n\
    Tuesday\n\n...\n\nweekdays.names:7\nSunday\n\nweekdays.names:0\nUnknown\n```\n\
    \nThe final step we need to complete is writing a date-to-string processing function\
    \ in the localization module, since Java ME doesn't have one built in. Such a\
    \ function, with basic support, is shown in [Listing 7–13](#Chapter07.html#list_7_13).\
    \ You may enhance it as needed—for example, by adding support for month names.\n\
    \n**Listing 7–13.** *Converting Dates to Strings, According to a Given Format*\n\
    \n```\npublic static String formatDate(String dateFormat, Date date)\n{\n    \
    \    Calendar c = Calendar.getInstance();\n        c.setTime(date);\n        String\
    \ result;\n\n        String day = String.valueOf(c.get(Calendar.DAY_OF_MONTH));\n\
    \        result = UITextHelper.strReplace(\"d\", day, dateFormat);\n\n       \
    \ String month = String.valueOf(c.get(Calendar.MONTH));\n        result = UITextHelper.strReplace(\"\
    m\", month, result);\n\n        String year = String.valueOf(c.get(Calendar.YEAR));\n\
    \        result = UITextHelper.strReplace(\"y\", year, result);\n\n        int\
    \ dayOfWeek = c.get(Calendar.DAY_OF_WEEK);\n        int dayOfWeekIndex = 0;\n\
    \        switch (dayOfWeek)\n        {\n                case Calendar.MONDAY:\n\
    \                        dayOfWeekIndex = 1;\n                        break;\n\
    \n                case Calendar.TUESDAY:\n                        dayOfWeekIndex\
    \ = 2;\n                        break;\n\n                ...\n\n            \
    \    case Calendar.SUNDAY:\n                        dayOfWeekIndex = 7;\n    \
    \                    break;\n\n                default:\n                    \
    \    dayOfWeekIndex = 0;\n                        break;\n        }\n        result\
    \ = UITextHelper.strReplace(\"D\", Locale.get(\"weekdays.names\",\n        dayOfWeekIndex),\
    \ result);\n\n        return result;\n}\n```\n\nThe interesting thing to note\
    \ here is the fact that the code relies on predefined localization strings (the\
    \ `weekdays.name` keys) in order to function properly. This means that these “core\
    \ strings” must be present in all localization files, otherwise unexpected errors\
    \ might occur. The code also makes use of `UITextHelper.strReplace()`, which is\
    \ a custom string replacement method, as Java ME doesn't have one built in.\n\n\
    Finally, let's put our `formatDate()` method to work, as shown in [Listing 7–14](#Chapter07.html#list_7_14).\n\
    \n**Listing 7–14.** *A Test of the `formatDate()` Method*\n\n```\nDate date =\
    \ new Date();\nString dateFormat = Locale.get(\"format.date\");\nSystem.out.println\
    \ ( Locale.formatDate(dateFormat, date));\n```\n\nRunning this code will yield\
    \ a console output similar to this one:\n\n```\nMonday, 22/10/2010\n```\n\nChanging\
    \ the value of the `format.date` key will also change the output string accordingly.\
    \ By changing both `format.date` and `weekdays.name` keys, you can have the application\
    \ dynamically match the expected date and time format for any given locale, without\
    \ altering the actual application code.\n\nThe same idea we have used for formatting\
    \ dates can be used with other aspects of the application that require locale-based\
    \ formatting—for example, formatting numbers (decimal separators, thousands separators,\
    \ etc.) and formatting currency. We can also use this mechanism for defining more\
    \ exotic things, like locale-specific mathematical formulas (for example, the\
    \ formulas for calculating taxes, which are different from country to country).\n\
    \nEverything in a Java ME application, from button labels to graphics files and\
    \ math formulas, can be tailored to be locale-specific. As we have seen in this\
    \ chapter, doing so isn't particularly difficult—it just requires a bit of creative\
    \ and practical coding.\n\n### Summary\n\nWe have discussed what localization\
    \ is and how localization support can be added to a Java ME application. In the\
    \ process, we have examined some of the more important aspects of a good localization\
    \ implementation, such as processing and optimizing localization files on the\
    \ desktop before loading them onto the mobile device, implementing support for\
    \ parameter-specific keys, and implementing advanced localization features, such\
    \ as locale-based formatting for objects (dates, currency, etc.).\n\nIn the next\
    \ chapter, we will put together everything we have learned so far and write our\
    \ Twitter client application. In the process, we will discuss the best practices\
    \ associated with building a complete Java ME application, such as the proper\
    \ separation of UI and application logic, defining a clear event structure, and\
    \ more.\n\n## Chapter 8\n\n## Putting It All Together\n\nSo far in the book, we\
    \ have looked at the various individual aspects that make up the bulk of any Java\
    \ ME application. Now it’s time to see how all of them come together to form a\
    \ complete application.\n\nThroughout this chapter, we’ll create the basis of\
    \ a fully functional Java ME Twitter client, with most of the important features\
    \ implemented and the rest fairly easy to implement. As we go over the code, you\
    \ will notice that the main application code base is quite small. The main reasons\
    \ for this are having a good, flexible architecture and being able to depend heavily\
    \ on the functionality provided by the application modules we have written so\
    \ far. In fact, there is very little logic that is actually part of the application\
    \ itself: most of the heavy work is done in the individual modules.\n\nThis results\
    \ in an application that is fairly easy to understand and work through, portable,\
    \ and compact—all of which are the most telltale signs of a Pro Java ME application.\n\
    \nThat being said, let’s get to work."
  raw: '### Implementing Advanced Localization Features


    Translating strings from one language to another is easy; however, there''s more
    to localization than this. For example, different locales use different date formats.
    As Java ME has poor support for localization, we will have to handle these ourselves.


    The first thing we need to do is define a localization string that contains the
    proper date format, something like the snippet in [Listing 7–11](#Chapter07.html#list_7_11).
    We will add this to the `en-US` localization file.


    **Listing 7–11.** *Defining a Date Format*


    `# Default date format`

    `format.date`

    `D, d/m/y`


    In this example, “d” stands for the day of the month, “m” for the month, “y” for
    the year, and the capital “D” stands for the day of the week. This is the convention
    we will use in our localization module.


    Next, we need to define the days of the week, like in [Listing 7–12](#Chapter07.html#list_7_12).
    The “zero” day of the week will be used for unknown values (just in case something
    goes wrong along the way, which really shouldn''t happen). Again, add these localization
    strings to the `en-US` localization file.


    **Listing 7–12.** *Defining the Days of the Week*


    `# Week day names`

    `weekdays.names:1`

    `Monday`


    `weekdays.names:2`

    `Tuesday`


    `...`


    `weekdays.names:7`

    `Sunday`


    `weekdays.names:0`

    `Unknown`


    The final step we need to complete is writing a date-to-string processing function
    in the localization module, since Java ME doesn''t have one built in. Such a function,
    with basic support, is shown in [Listing 7–13](#Chapter07.html#list_7_13). You
    may enhance it as needed—for example, by adding support for month names.


    **Listing 7–13.** *Converting Dates to Strings, According to a Given Format*


    `public static String formatDate(String dateFormat, Date date)`

    `{`

    `        Calendar c = Calendar.getInstance();`

    `        c.setTime(date);`

    `        String result;`


    `        String day = String.valueOf(c.get(Calendar.DAY_OF_MONTH));`

    `        result = UITextHelper.strReplace("d", day, dateFormat);`


    `        String month = String.valueOf(c.get(Calendar.MONTH));`

    `        result = UITextHelper.strReplace("m", month, result);`


    `        String year = String.valueOf(c.get(Calendar.YEAR));`

    `        result = UITextHelper.strReplace("y", year, result);`


    `        int dayOfWeek = c.get(Calendar.DAY_OF_WEEK);`

    `        int dayOfWeekIndex = 0;`

    `        switch (dayOfWeek)`

    `        {`

    `                case Calendar.MONDAY:`

    `                        dayOfWeekIndex = 1;`

    `                        break;`


    `                case Calendar.TUESDAY:`

    `                        dayOfWeekIndex = 2;`

    `                        break;`


    `                ...`


    `                case Calendar.SUNDAY:`

    `                        dayOfWeekIndex = 7;`

    `                        break;`


    `                default:`

    `                        dayOfWeekIndex = 0;`

    `                        break;`

    `        }`

    `        result = UITextHelper.strReplace("D", Locale.get("weekdays.names",`

    `        dayOfWeekIndex), result);`


    `        return result;`

    `}`


    The interesting thing to note here is the fact that the code relies on predefined
    localization strings (the `weekdays.name` keys) in order to function properly.
    This means that these “core strings” must be present in all localization files,
    otherwise unexpected errors might occur. The code also makes use of `UITextHelper.strReplace()`,
    which is a custom string replacement method, as Java ME doesn''t have one built
    in.


    Finally, let''s put our `formatDate()` method to work, as shown in [Listing 7–14](#Chapter07.html#list_7_14).


    **Listing 7–14.** *A Test of the `formatDate()` Method*


    `Date date = new Date();`

    `String dateFormat = Locale.get("format.date");`

    `System.out.println ( Locale.formatDate(dateFormat, date));`


    Running this code will yield a console output similar to this one:


    `Monday, 22/10/2010`


    Changing the value of the `format.date` key will also change the output string
    accordingly. By changing both `format.date` and `weekdays.name` keys, you can
    have the application dynamically match the expected date and time format for any
    given locale, without altering the actual application code.


    The same idea we have used for formatting dates can be used with other aspects
    of the application that require locale-based formatting—for example, formatting
    numbers (decimal separators, thousands separators, etc.) and formatting currency.
    We can also use this mechanism for defining more exotic things, like locale-specific
    mathematical formulas (for example, the formulas for calculating taxes, which
    are different from country to country).


    Everything in a Java ME application, from button labels to graphics files and
    math formulas, can be tailored to be locale-specific. As we have seen in this
    chapter, doing so isn''t particularly difficult—it just requires a bit of creative
    and practical coding.


    ### Summary


    We have discussed what localization is and how localization support can be added
    to a Java ME application. In the process, we have examined some of the more important
    aspects of a good localization implementation, such as processing and optimizing
    localization files on the desktop before loading them onto the mobile device,
    implementing support for parameter-specific keys, and implementing advanced localization
    features, such as locale-based formatting for objects (dates, currency, etc.).


    In the next chapter, we will put together everything we have learned so far and
    write our Twitter client application. In the process, we will discuss the best
    practices associated with building a complete Java ME application, such as the
    proper separation of UI and application logic, defining a clear event structure,
    and more.


    ## Chapter 8


    ## **Putting It All Together**


    So far in the book, we have looked at the various individual aspects that make
    up the bulk of any Java ME application. Now it’s time to see how all of them come
    together to form a complete application.


    Throughout this chapter, we’ll create the basis of a fully functional Java ME
    Twitter client, with most of the important features implemented and the rest fairly
    easy to implement. As we go over the code, you will notice that the main application
    code base is quite small. The main reasons for this are having a good, flexible
    architecture and being able to depend heavily on the functionality provided by
    the application modules we have written so far. In fact, there is very little
    logic that is actually part of the application itself: most of the heavy work
    is done in the individual modules.


    This results in an application that is fairly easy to understand and work through,
    portable, and compact—all of which are the most telltale signs of a Pro Java ME
    application.


    That being said, let’s get to work.'
