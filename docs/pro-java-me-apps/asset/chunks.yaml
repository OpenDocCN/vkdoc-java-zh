- fmt: "# TimelineUserTweets\n\nThis class is used to retrieve tweets from a specific\
    \ user's history. To begin discussing it, we must first take a closer look at\
    \ the implementation for `TimelineUserTweets`, specifically, at the fact that\
    \ a new request is made for every call to `goForward()` or `goBack()`—so 30 calls\
