    and avoiding making wrong assumptions about the platform and the environment.


    **NOTE:** Runtime flexibility is of lesser concern on other modern-day platforms,
    such as Android and iOS. Applications for these platforms not only have more resources
    at their disposal, they are also native, and thus have far better control over
