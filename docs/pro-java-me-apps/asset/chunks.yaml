- fmt: "我花费了上一页左右的时间来解释这些概念，原因在于它们对于 Java ME 开发至关重要。与基于基准的测量不同，算法复杂度测量在所有设备和所有 JVM\
    \ 上都是一致的，因此更能反映你的应用程序的真实质量。在适用的情况下，它们也是确定问题区域以及需要改进之处的更好工具。同时，它们也是代码相关问题的绝佳指示器，这些问题可能在其他情况下并不明显：如果你的`O(n*log\
    \ n)`算法的实现与其他人`O(n^2)`算法的实现性能相当，那么你可以肯定你的代码某处存在真正的问题。\n\n**注意：** 某些算法的复杂度根本无法用多项式表示。这在自适应和/或启发式算法中很常见——例如，遗传算法（从一个随机解开始，并逐渐“进化”它，直到满足问题的接受标准）。除非替代方案确实差得多，否则你应该避免使用此类算法，因为它们的执行时间完全不可预测。\n\
    \n### 改进你的算法\n\n不幸的是，与优化代码不同，优化算法没有明确的“技巧和窍门”手册。没有任何技术可以应用于任何给定的算法并因此获得更好的算法。每个算法都是独一无二的，优化给定算法的过程与算法本身一样独特。\n\
    \n然而，也有一些好消息。在处理算法时，你会经常遇到一些核心操作，就像在处理代码时你会经常遇到变量和函数的概念一样。这些操作是*排序*、*搜索*和*递归*。在接下来的几页中，我们将探讨如何通过改进这些操作来改进你的算法。\n\
    \n#### 排序\n\n排序意味着根据给定的标准，将一组对象按特定顺序排列。例如，你可以按姓名对人员进行字母排序，或者你可以根据大小将数据包从小到大排序。排序是算法中非常常见的操作，因此值得更仔细地研究如何提高排序性能。\n\
    \n与 J2SE 或 J2EE 不同，Java ME 没有任何内置的排序支持，这意味着你必须自己实现排序算法和相应的实现。在我遇到的大多数情况下，使用的算法是选择排序或类似算法，正如我们之前所见，这是一个`O(n^2)`算法。选择排序的主要优势在于其易于实现（基本上是两个嵌套的`for`循环）和概念简单；然而，其复杂度使其仅适用于小型输入集。从复杂度的角度来看，比选择排序好得多的替代方案是快速排序，它通常是一个`O(n*log\
    \ n)`算法，最坏情况为`O(n^2)`。换句话说，在最坏的情况下，快速排序仍然与选择排序一样好。通过在算法实现中使用快速排序（例如，代替选择排序），你可以显著提高应用程序的性能。\n\
    \n快速排序的工作原理如下：对于给定的输入集，选择一个元素作为枢轴（通常中间的元素就很好）。然后，遍历其他元素，如果它们更大，则将它们移动到枢轴的右侧，如果它们更小，则将它们移动到枢轴的左侧。完成此操作后，你将得到两个较小的输入集：一个用于小于枢轴的元素，一个用于大于枢轴的元素，枢轴位于它们之间。需要注意的是，这些较小的集合不一定是有序的，也不一定大小相同。\n\
    \n接下来你要做的是对每个较小的输入集应用相同的步骤，最终得到四个更小的输入集，依此类推。你一直这样做，直到你处理的输入集只有一个或两个元素，这些元素要么可以通过简单的比较轻松排序（对于只有两个元素的集合），要么已经排序（对于只有一个元素的输入集）。当这些最小的可能子集也被排序后，你会发现原始输入集现在也已排序，因为对于沿途遇到的每个枢轴（包括原始枢轴），“大于”和“小于”子集都已被排序。为了更好地理解这是如何工作的，请用笔和纸自己尝试一下。\n\
