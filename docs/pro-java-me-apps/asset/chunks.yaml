- fmt: '# A Java ME Framework


    There are a few more steps we have to take before we begin work on the actual
    application. Most of them are trivial, like setting up source control and creating
    an IDE project, so we will skip those entirely. However, there is one very important
    step we cannot skip: writing our application''s framework.


    The following chapter serves a dual purpose: it both goes over the basics of the
    framework we will be using and serves as a basis for how Java ME frameworks in
    general should be written.


    With this in mind, our framework, though functional, will be greatly simplified
    in nature. The code will be kept as simple as possible, with everything that is
    not necessary either omitted or reduced to the bare minimum. As such, feel free
    to experiment with it, improve upon it, and alter it to suit your needs and your
    projects. Remember what we discussed in [Chapter 1](#Chapter01.html#ch1): never
    take a framework and use it as-is (the reason for this will be explained shortly).


    ## The Importance of Using a Framework


    Simply put, a good framework on top of which you can build your application considerably
    increases the chances that the end result will be a strong, solid, and flexible
    product.


    For example, a Java ME application typically runs multiple threads: a UI thread,
    a networking thread, a data processing thread, etc. These threads need to be able
    to talk to one another. Furthermore, they need to do this in a way that neither
    stalls nor disrupts the other threads, and that minimizes overhead. A great solution
    for this is using an event-based system: whenever something of interest happens
    in one part of the application, an event is triggered, and other parts of the
    application that are “listening” can then respond and react to this event.


    Without a framework to provide this functionality for them, these threads (or
    rather, the separate parts of the application that correspond to them) might implement
    events differently, sometimes with just the subtlest of differences, which can
    cause significant problems in the long run. For example, the UI part might implement
    events in a separate thread with an event queue, while the networking part might
    handle events immediately, directly, with no queue involved. Or one part of the
    application might use a priority-based queue while another part might use a simple
    queue. This can lead to race conditions, events being handled out of order, and
    more. In fact, given the complexity of real-life usage scenarios, the behavior
    of such a tangled and heterogeneous event system is best described as “undefined.”


    In contrast, by implementing event handling in the framework, not only can you
    then use a consistent event API and its associated conventions throughout the
    application, you also have the benefit of writing clean and focused application
    code; all the dirty event-related bits are handled by the framework. Furthermore,
    should the event system need to be overhauled or debugged, this can be done in
    a single central place (the framework) instead of having to do this in each part
    of the application separately. All of this saves considerable amounts of time,
    effort, and resources.


    The event system is just an example, albeit a prominent one. Depending on your
    application''s requirement, you will most likely have to add other functionalities
    to your framework, like dynamic resource loading or object pooling features (more
    on object pooling later in the book).


    Another critical function of the framework is that it defines how the application''s
    code is structured: a good framework imposes a good package structure and class
    hierarchy on developers, making the application''s source code much more cohesive
    and easier to navigate.


    Finally, a framework typically comes with a set of best practices and coding guidelines,
    which are sometimes enforced by the very nature of the framework''s API, package
    hierarchy, and class structure. This makes the code more homogenous and easier
    to understand, which leads to fewer bugs and increased productivity.


    ## Why a Custom Framework for Each Application?


    A lot of companies and even individuals have a single custom-made generic framework
    that they use for all of their Java ME projects. In my personal opinion, this
    is the wrong way to go: each project should have its own, project-specific framework.


    The reason for this can be summed up with just one word: overhead. For example,
    let''s suppose we''re writing a generic framework, but for a desktop platform.
    In this case, our event handling system will most likely be based on a priority
    queue, since it will be more flexible this way. A direct consequence of this decision
    is that, even if all our events have the same priority, the event prioritizing
    code still has to kick in, analyze each event, and place it in the proper place
    within the queue—remember, the framework is a generic one and it doesn''t know
    that all events have the same priority. This will eat up some CPU time, but compared
    to the available CPU time, this overhead will be practically zero.


    Now let''s suppose we do the same thing within a Java ME framework. Since we''re
    targeting considerably less powerful hardware, the event prioritizing overhead
    will increase. It should still be fairly low-profile by itself, but when added
    together with other sources of overhead, it can become significant—a compounded
    overhead of 5–10% or more is certainly noticeable, and the wasted resources can
    be better spent elsewhere. To avoid this particular source of overhead, if our
    application doesn''t need a priority queue for events, we''ll simply write an
    event handling system with a simple queue instead of a priority one. A direct
    consequence of this is that our generic framework is not so generic anymore because
    at least a part of it has been optimized for our particular application.


    However, to truly minimize overhead, we have to apply these kinds of optimizations
    across the entire framework and not just to parts of it. This means that we will
    end up with a very slick, highly-customized, and resource-friendly backbone for
    our application, which will most likely be at least partially incompatible with
    the original framework. Furthermore, sometimes the customizations needed are so
    extensive that you are simply better off writing a new framework from scratch.
    Either way, reusing the same framework for different projects is not really a
    good idea for high-quality Java ME applications; if you want the best possible
    performance, you need a custom framework for each application.'
