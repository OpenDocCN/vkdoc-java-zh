    ### 使数据类型不可变


    这是一条同样适用于 Java ME 的通用建议：尽可能让你的数据类型不可变。例如，你应该确保一旦创建了一个新的 `Tweet` 实例，就只能获取其属性——而无法以任何方式修改它们。


    如果你想修改它的一个或多个属性，你必须创建一个包含相应新值集合的新实例，而不是在现有实例上调用 `setTimestamp()` 或 `setText()`
    等方法。这样做虽然会带来一点性能损失，但如果处理得当，其收益将远超成本。


    这样做最大的好处是，通过确保你无法意外修改对象来防止大量 bug 的发生，因为你“修改”对象的唯一方式就是创建一个新对象。另一个好处是，对重要实例值（例如
    `Tweet` 的文本）的修改更容易追踪，这反过来也使代码更易于调试。这两点对于大型且复杂的应用程序都极为重要。


    **注意：** 这种方法的缺点是，如果你不小心，最终可能会制造问题而不是解决问题。例如，如果你错误地保留了对旧且未使用实例的引用，那么你不仅会阻止它们被垃圾回收，还会影响应用程序的行为，因为“无效”的旧数据可能会被使用，而不是“有效”的新数据。


    当然，并非所有数据类型和实体都能或应该不可变。假设你正在编写一个游戏，其中包含一个 `BadGuy` 实体。让它不可变是个坏主意，因为 `BadGuy` 会频繁地
    `move()` 和 `fire()`。虽然创建新实例是良好实践，但每次发生这些操作时都这样做会使你的游戏运行缓慢。对于其他频繁改变状态的实体也是如此，比如
    UI 框架中的 `Scrollbar` 或聊天程序中的 `ChatRoomHistory`。


    另一个很好的例子是包含大量信息的数据类型和实体——例如，前面游戏中的 `Level` 数据类型：每当一个瓦片改变其值时都必须创建一个新的关卡实例，这绝对是疯狂的。


    然而，这些都是例外情况。在一个典型的应用程序中，通过合理的规划和架构，你可能能够让全局数据类型和实体中的 60–70% 变得不可变，甚至更多。


    话虽如此，现在让我们开始定义我们的对象和数据类型。


    ### 定义 Tweet 数据类型


    这可能是应用程序的基本数据类型，因为其整个功能都围绕推文展开。推文的主要属性包括正文、作者和 ID。


    **注意：** 推文实际上还有更多与之关联的属性——例如，地理位置——但为了我们的目的，我们将只关注刚刚列出的三个重要属性。如果你愿意，可以随意添加对其他属性的支持。


    我们的 `Tweet` 类将类似于代码清单 3–1。与所有全局数据类型和实体一样，`Tweet` 类实现了 `Model` 接口。


    **代码清单 3–1.** *`Tweet` 类*


    `package app.models;`


    `import com.apress.framework.objecttypes.Model;`


    `public class Tweet implements Model`

    `{`

    `    protected Tweet() { }`

    `    public Tweet (String author, String body, long timestamp)`

    `    {`

    `        ...`

    `    }`


    `    public String getBody() { ... }`


    `    public String getAuthor() { ... }`


    `    public String getID() { ... }`

    `}`


    如你所见，它有一个受保护的默认构造函数，并且只有其字段的设置器，这迫使你使用一些数据初始化它，同时使其不可变。随着你添加对更多属性的支持，添加额外的构造函数也是有意义的——例如，一个接受作者、正文、时间戳和位置作为参数的构造函数。然而，就我们的目的而言，当前的实现已经足够。


    我们现在知道了推文在代码中的样子。现在是时候看看它们的创建者，即 Twitter 用户，将如何被表示。


    ### 定义 TwitterUser 数据类型


    直观地说，用户是发布和阅读推文的人。每个 Twitter 用户都有一个名字、一个简短描述（或简介）、一个 URL 和一个位置。因此，`TwitterUser`
    类类似于代码清单 3–2 中的类。


    **代码清单 3–2.** *`TwitterUser` 类*


    `package app.models;`


    `import com.apress.framework.objecttypes.Model;`


    `public class TweeterUser implements Model`

    `{`


    `    protected TweeterUser() {  }`


    `    public TweeterUser (String author, String body, String url, String location)`

    `    {`

    `         ...`

    `    }`


    `    public String getDescription() { ... }`


    `    public String getName() { ... }`


    `    public String getUrl() { ... }`


    `    public String getLocation() { ... }`

    `}`


    此时，你们中熟悉 Twitter 的人可能会问：“好吧，但是好友、关注者、被屏蔽的用户在哪里？”


    这是一个非常好的问题。尽管在我们的应用程序概述中，Twitter 用户是一个独立的实体，能够执行发送和接收推文等操作，但在实践中，我们会将其视为一个简单的数据类型，并将所有与之相关的功能和行为转移到
    Twitter 服务器实体中。如果你仔细想想，这实际上是有道理的：Twitter 用户自己实际上什么也做不了——他需要一个服务器才能运作。


    一般来说，如果实体 A 的功能依赖于实体 B，那么将功能从实体 A 转移到实体 B 是一个好主意，至少在 Java ME 中是这样。这是因为这种“功能整合”方法通常能最小化代码大小、传递的信息量以及进行的方法调用次数，因为大多数“动作”往往发生在单个类的单个实例中。


    这也导致了这样一种情况：10% 的实体接管了剩余 90% 实体的功能，这违背了一些面向对象的原则。例如，在我们的案例中，“行为封装”原则被打破了，因为尽管
    `TwitterUser` 保留了状态，但其所有行为都已转移到 `TwitterServer`。虽然在“文明”的面向对象世界中这通常被认为是不良实践，但 Java
    ME 是少数几个使用这种方法有意义的案例之一。


    如果应用得当，这种整合过程会将项目中的许多实体转变为 C 语言意义上的简单结构，而剩余的关键实体将负责应用程序的大部分功能。在这些少数实体中，大多数将以接口或抽象类的形式编写代码，将实际实现留给应用程序的模块。因此，`app.models`
    包中很少有完整的类——在我们的案例中，一个都没有。


    现在回到我们的应用程序。到目前为止，我们已经研究了推文和 Twitter 用户，两者都不算令人兴奋。让我们看看一些更有趣的东西：Twitter 服务器。

    '
- fmt: "### Defining the `TwitterServer` Entity\n\nAs the name implies, the `TwitterServer`\
    \ entity corresponds to the Twitter server. Modeling it won't be as easy as modeling\
    \ tweets or users, though. For one thing, it is completely outside the boundaries\
    \ of our application, and so are its data and logic—we know nothing about what\
    \ happens behind its closed doors. Furthermore, we ourselves can't create a new\
    \ server, nor can we change the IP address or other parameters of the existing\
    \ one.\n\nWhat we will do is write `TwitterServer` as a black box that relies\
    \ on the networking module to forward requests to and receive responses from the\
    \ actual server. Also, in addition to the regular functionality associated with\
    \ the Twitter server, like logging in and retrieving the tweets of a `Timeline`,\
    \ the `TwitterServer` will take over the functionality normally associated with\
    \ the `TwitterUser`, like posting tweets—the reason for this is discussed in the\
    \ previous section.\n\nThe full code for the `TwitterServer` interface is presented\
    \ in [Listing 3–3](#Chapter03.html#list_3_3), while the concrete implementation\
    \ will be given in the chapter dedicated to the networking module.\n\n**Listing\
    \ 3–3.** *The `TwitterServer` Interface*\n\n```\npackage app.models;\n\nimport\
    \ com.apress.framework.objecttypes.Model;\n\npublic interface TwitterServer extends\
    \ Model\n{\n    public boolean login(UserCredentials credentials) ;\n\n    public\
    \ TwitterUser getMyProfile();\n\n    public TwitterUser getProfileFor(String userid);\n\
    \n    public Timeline getTimelineForFilter(TweetFilter filter);\n\n    public\
    \ boolean postTweet(Tweet tweet);\n}\n```\n\nYou can see that the code makes references\
    \ to three data types that we haven't discussed so far: `UserCredentials`, `TweetFilter`,\
    \ and `Timeline`. Let's examine them one by one.\n\n### Defining the `UserCredentials`\
    \ Data Type\n\nThe `UserCredentials` class is responsible for providing to the\
    \ server the credentials of the Twitter user we wish to log in.\n\nAt the time\
    \ of this writing, Twitter supports three main methods of authentication if you\
    \ want to access its services externally.\n\nThe first one is out-of-band authentication,\
    \ which is suited only for web and desktop apps. It does not work very well for\
    \ mobile apps, particularly for Java ME apps, because the user has to leave the\
    \ application and enter his credentials in a browser. Furthermore, this may not\
    \ work at all on some devices, as they may lack an adequate browser altogether,\
    \ or the ability to open the browser from within a Java ME application. Even if\
    \ it works, you can't expect the flow of the login process to be consistent across\
    \ all devices (different pop-ups, confirmations, etc.). All in all, it is a bad\
    \ experience for the user.\n\nThe second one is single-access tokens, which are\
    \ great for single-user scenarios, since the user's credentials are “hard-coded”\
    \ into the application.\n\nThe third one is `xAuth`, which is best suited for\
    \ multi-user scenarios, like a free-for-all Twitter client similar to the one\
    \ we plan to write. With `xAuth`, your application is authorized to work on behalf\
    \ of any user, so long as the username and password provided are correct.\n\n\
    Obviously we would like to use `xAuth` for our project. However, as I am writing\
    \ this, Twitter is giving `xAuth` privileges only on an as-needed basis—so you\
    \ can't count on `xAuth` being available to you.\n\nWhile not being able to use\
    \ `xAuth` is sort of a roadblock for a real-life project, our learning project\
    \ can do without it. If `xAuth` is not available, simply use single-access tokens.\
    \ More details on this will be provided in the chapter related to networking.\n\
    \nFor now, we have to make sure that Twitter has support for both `xAuth` and\
    \ single-access tokens. Thus, our class looks like the one in [Listing 3–4](#Chapter03.html#list_3_4).\n\
    \n**Listing 3–4.** *The `UserCredentials` Class*\n\n```\npackage app.models;\n\
    \nimport com.apress.framework.objecttypes.Model;\n\npublic class UserCredentials\
    \ implements Model\n{\n    protected UserCredentials() {  }\n\n    public UserCredentials(String\
    \ username, String password,\n                 String accessToken, String accessTokenSecret)\
    \  { ... }\n\n    // For xAuth authentication\n    public String getUsername()\
    \ { ... }\n    public String getPassword() { ... }\n\n    // For token-based authentication\n\
    \    public String getAccessToken() { ... }\n    public String getAccessTokenSecret()\
    \ { ... }\n}\n```\n\nIf you haven't done so already, it's time to ask yourself,\
    \ “Why is this class part of the global models package?” Indeed, at first glance\
    \ it feels more suited to the networking module.\n\nThe reason we're discussing\
    \ credentials here instead of in the networking chapter is simple: `UserCredentials`\
    \ identifies the user of the application, the person who sits on the other side\
    \ of the mobile phone's screen—and he's as global an entity as it gets for a Java\
    \ ME application.\n\nA word of advice: many developers often forget that the end\
    \ user is himself an entity, and a global one at that. When this happens, rather\
    \ than having everything related to the user in a single package, they tend to\
    \ disperse information correlated with him throughout the application's modules.\
    \ However, different modules have different scopes, and most modules tend to be\
    \ somewhat autonomous in nature. As a result, some of the information and functionality\
    \ related to the user tends to either get lost or become overly complicated to\
    \ use. This translates into code that doesn't accurately reflect the user's persona\
    \ and needs, thus resulting in a poorly focused application.\n\n### Defining the\
    \ `TweetFilter` Data Type\n\nThe `TweetFilter` data type will allow us to filter\
    \ tweets by specific criteria. For example, we might want to get only tweets created\
    \ by a certain user, or that contain a certain hashtag.\n\nFor simplicity, however,\
    \ we will concern ourselves with just one criterion and filter tweets only according\
    \ to the user who created them. The class is presented in [Listing 3–5](#Chapter03.html#list_3_5).\n\
    \n**Listing 3–5.** *The `TweetFilter` Class*\n\n```\npackage app.models;\n\nimport\
    \ com.apress.framework.objecttypes.Model;\n\npublic class TweetFilter implements\
    \ Model\n{\n    protected TweetFilter () { }\n\n    public TweetFilter(String\
    \ userID) { ... }\n\n    public String getUserID() { ... }\n}\n```\n\nAs you play\
    \ with the application yourself, feel free to add more filter criteria."
  raw: '### Defining the TwitterServer Entity


    As the name implies, the `TwitterServer` entity corresponds to the Twitter server.
    Modeling it won''t be as easy as modeling tweets or users, though. For one thing,
    it is completely outside the boundaries of our application, and so are its data
    and logic—we know nothing about what happens behind its closed doors. Furthermore,
    we ourselves can''t create a new server, nor can we change the IP address or other
    parameters of the existing one.


    What we will do is write `TwitterServer` as a black box that relies on the networking
    module to forward requests to and receive responses from the actual server. Also,
    in addition to the regular functionality associated with the Twitter server, like
    logging in and retrieving the tweets of a `Timeline`, the `TwitterServer` will
    take over the functionality normally associated with the `TwitterUser`, like posting
    tweets—the reason for this is discussed in the previous section.


    The full code for the `TwitterServer` interface is presented in [Listing 3–3](#Chapter03.html#list_3_3),
    while the concrete implementation will be given in the chapter dedicated to the
    networking module.


    **Listing 3–3.** *The `TwitterServer` Interface*


    `package app.models;`


    `import com.apress.framework.objecttypes.Model;`


    `public interface TwitterServer extends Model`

    `{`

    `    public boolean login(UserCredentials credentials) ;`


    `    public TwitterUser getMyProfile();`


    `    public TwitterUser getProfileFor(String userid);`


    `    public Timeline getTimelineForFilter(TweetFilter filter);`


    `    public boolean postTweet(Tweet tweet);`

    `}`


    You can see that the code makes references to three data types that we haven''t
    discussed so far: `UserCredentials`, `TweetFilter`, and `Timeline`. Let''s examine
    them one by one.


    ### Defining the UserCredentials Data Type


    The `UserCredentials` class is responsible for providing to the server the credentials
    of the Twitter user we wish to log in.


    At the time of this writing, Twitter supports three main methods of authentication
    if you want to access its services externally.


    The first one is out-of-band authentication, which is suited only for web and
    desktop apps. It does not work very well for mobile apps, particularly for Java
    ME apps, because the user has to leave the application and enter his credentials
    in a browser. Furthermore, this may not work at all on some devices, as they may
    lack an adequate browser altogether, or the ability to open the browser from within
    a Java ME application. Even if it works, you can''t expect the flow of the login
    process to be consistent across all devices (different pop-ups, confirmations,
    etc.). All in all, it is a bad experience for the user.


    The second one is single-access tokens, which are great for single-user scenarios,
    since the user''s credentials are “hard-coded” into the application.


    The third one is xAuth, which is best suited for multi-user scenarios, like a
    free-for-all Twitter client similar to the one we plan to write. With xAuth, your
    application is authorized to work on behalf of any user, so long as the username
    and password provided are correct.


    Obviously we would like to use xAuth for our project. However, as I am writing
    this, Twitter is giving xAuth privileges only on an as-needed basis—so you can''t
    count on xAuth being available to you.


    While not being able to use xAuth is sort of a roadblock for a real-life project,
    our learning project can do without it. If xAuth is not available, simply use
    single-access tokens. More details on this will be provided in the chapter related
    to networking.


    For now, we have to make sure that Twitter has support for both xAuth and single-access
    tokens. Thus, our class looks like the one in [Listing 3–4](#Chapter03.html#list_3_4).


    **Listing 3–4.** *The `UserCredentials` Class*


    `package app.models;`


    `import com.apress.framework.objecttypes.Model;`


    `public class UserCredentials implements Model`

    `{`

    `    protected UserCredentials() {  }`


    `    public UserCredentials(String username, String password,`

    `                 String accessToken, String accessTokenSecret)  { ... }`


    `    // For xAuth authentication`

    `    public String getUsername() { ... }`

    `    public String getPassword() { ... }`


    `    // For token-based authentication`

    `    public String getAccessToken() { ... }`

    `    public String getAccessTokenSecret() { ... }`

    `}`


    If you haven''t done so already, it''s time to ask yourself, “Why is this class
    part of the global models package?” Indeed, at first glance it feels more suited
    to the networking module.


    The reason we''re discussing credentials here instead of in the networking chapter
    is simple: `UserCredentials` identifies the user of the application, the person
    who sits on the other side of the mobile phone''s screen—and he''s as global an
    entity as it gets for a Java ME application.


    A word of advice: many developers often forget that the end user is himself an
    entity, and a global one at that. When this happens, rather than having everything
    related to the user in a single package, they tend to disperse information correlated
    with him throughout the application''s modules. However, different modules have
    different scopes, and most modules tend to be somewhat autonomous in nature. As
    a result, some of the information and functionality related to the user tends
    to either get lost or become overly complicated to use. This translates into code
    that doesn''t accurately reflect the user''s persona and needs, thus resulting
    in a poorly focused application.


    ### Defining the TweetFilter Data Type


    The `TweetFilter` data type will allow us to filter tweets by specific criteria.
    For example, we might want to get only tweets created by a certain user, or that
    contain a certain hashtag.


    For simplicity, however, we will concern ourselves with just one criterion and
    filter tweets only according to the user who created them. The class is presented
    in [Listing 3–5](#Chapter03.html#list_3_5).


    **Listing 3–5.** *The `TweetFilter` Class*


    `package app.models;`


    `import com.apress.framework.objecttypes.Model;`


    `public class TweetFilter implements Model`

    `{`

    `    protected TweetFilter () { }`


    `    public TweetFilter(String userID) { ... }`


    `    public String getUserID() { ... }`

    `}`


    As you play with the application yourself, feel free to add more filter criteria.'
  trans: '

    ### 定义 TwitterServer 实体


    顾名思义，`TwitterServer` 实体对应的是 Twitter 服务器。不过，对它进行建模并不像对推文或用户建模那样简单。首先，它完全处于我们应用程序的边界之外，其数据和逻辑也是如此——我们对它紧闭的大门背后发生的事情一无所知。此外，我们自己既无法创建新服务器，也无法更改现有服务器的
    IP 地址或其他参数。


    我们要做的是将 `TwitterServer` 编写成一个黑盒，它依赖网络模块将请求转发到实际的服务器，并接收来自实际服务器的响应。同时，除了与 Twitter
    服务器相关的常规功能（如登录和检索 `Timeline` 的推文）之外，`TwitterServer` 还将接管通常与 `TwitterUser` 相关的功能，例如发布推文——其原因已在上一节讨论过。


    `TwitterServer` 接口的完整代码见列表 3–3，而具体实现将在专门讨论网络模块的章节中给出。


    **列表 3–3.** *`TwitterServer` 接口*


    `package app.models;`


    `import com.apress.framework.objecttypes.Model;`


    `public interface TwitterServer extends Model`

    `{`

    `    public boolean login(UserCredentials credentials) ;`


    `    public TwitterUser getMyProfile();`


    `    public TwitterUser getProfileFor(String userid);`


    `    public Timeline getTimelineForFilter(TweetFilter filter);`


    `    public boolean postTweet(Tweet tweet);`

    `}`


    你可以看到，代码中引用了三种我们尚未讨论的数据类型：`UserCredentials`、`TweetFilter` 和 `Timeline`。让我们逐一审视它们。


    ### 定义 UserCredentials 数据类型


    `UserCredentials` 类负责向服务器提供我们希望登录的 Twitter 用户的凭据。


    在撰写本文时，如果你想从外部访问 Twitter 的服务，它支持三种主要的身份验证方法。


    第一种是带外身份验证，仅适用于 Web 和桌面应用。它对于移动应用（尤其是 Java ME 应用）效果不佳，因为用户必须离开应用程序，在浏览器中输入其凭据。此外，在某些设备上这可能完全无法工作，因为它们可能根本没有合适的浏览器，或者无法从
    Java ME 应用内部打开浏览器。即使它能工作，你也不能期望登录流程在所有设备上保持一致（不同的弹出窗口、确认信息等）。总而言之，这对用户来说是一种糟糕的体验。


    第二种是单次访问令牌，它非常适合单用户场景，因为用户的凭据被“硬编码”到了应用程序中。


    第三种是 xAuth，它最适合多用户场景，例如我们计划编写的这种面向所有人的 Twitter 客户端。使用 xAuth，只要提供的用户名和密码正确，你的应用程序就被授权代表任何用户工作。


    显然，我们希望为我们的项目使用 xAuth。然而，在我撰写本文时，Twitter 仅在需要时才授予 xAuth 权限——所以你不能指望 xAuth 对你可用。


    虽然无法使用 xAuth 对于实际项目来说算是一个障碍，但我们的学习项目可以不用它。如果 xAuth 不可用，只需使用单次访问令牌即可。更多细节将在与网络相关的章节中提供。


    目前，我们必须确保 Twitter 同时支持 xAuth 和单次访问令牌。因此，我们的类如列表 3–4 所示。


    **列表 3–4.** *`UserCredentials` 类*


    `package app.models;`


    `import com.apress.framework.objecttypes.Model;`


    `public class UserCredentials implements Model`

    `{`

    `    protected UserCredentials() {  }`


    `    public UserCredentials(String username, String password,`

    `                 String accessToken, String accessTokenSecret)  { ... }`


    `    // 用于 xAuth 身份验证`

    `    public String getUsername() { ... }`

    `    public String getPassword() { ... }`


    `    // 用于基于令牌的身份验证`

    `    public String getAccessToken() { ... }`

    `    public String getAccessTokenSecret() { ... }`

    `}`


    如果你还没有这样做，现在是时候问问自己：“为什么这个类属于全局模型包？” 确实，乍一看它更适合放在网络模块中。


    我们在这里而不是在网络章节讨论凭据的原因很简单：`UserCredentials` 标识了应用程序的用户，即坐在手机屏幕另一侧的人——对于 Java ME
    应用程序来说，他就是一个全局实体。


    一点建议：许多开发者常常忘记最终用户本身就是一个实体，而且是一个全局实体。当这种情况发生时，他们往往不会将与用户相关的所有内容放在一个单独的包中，而是将与用户相关的信息分散到应用程序的各个模块中。然而，不同的模块有不同的范围，并且大多数模块本质上倾向于某种程度的自治。结果，一些与用户相关的信息和功能要么丢失，要么变得过于复杂而难以使用。这会导致代码无法准确反映用户的角色和需求，从而产生一个焦点不明确的应用程序。


    ### 定义 TweetFilter 数据类型


    `TweetFilter` 数据类型将允许我们根据特定条件过滤推文。例如，我们可能只想获取由某个特定用户创建的推文，或者包含某个特定话题标签的推文。


    不过，为了简单起见，我们将只关注一个条件，并仅根据创建推文的用户来过滤推文。该类如列表 3–5 所示。


    **列表 3–5.** *`TweetFilter` 类*


    `package app.models;`


    `import com.apress.framework.objecttypes.Model;`


    `public class TweetFilter implements Model`

    `{`

    `    protected TweetFilter () { }`


    `    public TweetFilter(String userID) { ... }`


    `    public String getUserID() { ... }`

    `}`


    在你亲自使用该应用程序时，可以随意添加更多的过滤条件。

