  trans: '

    ### 本章小结


    在本章中，我们探讨了 Java ME 开发中最重要的思维模式规则，并通过几个实际案例进行了演示。


    下一章，我们将简要展望 Java ME 的未来，以及它与其他移动平台相比将处于何种地位。


    ## 第 15 章


    ## **Java ME 与未来**


    在本书中，到目前为止，你已经了解了当前 Java ME 所能实现的功能及其开发现状。你已经熟悉了需要支持的硬件类型、可用的 API，以及最适合针对这些硬件和
    API 进行开发的技术。


    你研究了从当前设备中获取最佳性能所需的技巧和优化方法，了解了用户对当前 Java ME 应用的期望，以及当今 Java ME 应用在功能和用户界面方面与竞争对手相比的表现。


    你还了解了 Java ME 开发者目前可能遇到的各种陷阱，从碎片化问题到仅仅以错误的思维模式来对待开发过程。


    现在，是时候快速展望一下未来了，看看几年后 Java ME 世界会是什么样子。在本章中，你将探讨 Java ME 在未来目标受众、可用硬件、可用 API、开发技术等方面的发展前景。


    **注意：** 以下观点仅代表我个人看法，但基于我对该平台的经验以及当前市场趋势。


    ### Java ME 硬件演进


    在 Java ME 世界中，如今几乎所有问题都归结于硬件。由于其他平台原生支持的许多特性和功能（如 XML 支持、图形能力等）在 Java ME 的默认功能集中缺失，开发者不得不用
    Java 代码来实现这些功能，这既慢又消耗可用资源。


    此外，中低端设备共同决定了你能为任何给定平台编写何种软件，而 Java ME 中两者之间相对较大的差距意味着开发者必须在功能不足和需求过高之间走钢丝。


    回顾过去几年硬件性能的增长，尤其是低端设备领域令人瞩目的进步，我们可以得出两个非常重要的结论。


    第一个结论是，低端设备在硬件性能方面已经并且仍在快速演进，并开始追赶中端设备。这是个好消息，因为 Java ME 开发工作的很大一部分源于对这些低端设备的支持。随着其处理能力的提升，开发者将越来越少地依赖巧妙的编程技巧和极致的优化，并且能够将越来越多的功能作为标准配置包含进来。


    第二个结论是，中高端 Java ME 硬件的演进速度已不如从前。尽管这些细分市场的处理能力也在增长，但其增长率已远不及过去。这主要是因为如今顶级硬件被分配给了智能手机，而非功能手机。


    结合低端市场的快速增长，最终将导致低端、中端和高端 Java ME 设备之间的“差距缩小”。它们之间仍会存在差异，但不会像今天这样显著。这是个好消息，因为
    Java ME 将成为一个更一致的开发平台；但也是个坏消息，因为硬件性能增长放缓也意味着创新和新功能的增长放缓。


    话虽如此，处理能力并非一切。其他硬件方面几乎同样重要，甚至更为重要。例如，如今越来越多的手机配备触摸屏，这带来了更直观、更令人愉悦的用户界面。此外，屏幕尺寸不断增大，而
    3D 图形支持也开始成为主流，传感器和全球定位支持也是如此。


    这意味着，未来的 Java ME 应用将拥有更具视觉吸引力和更直观的界面，其吸引力不一定来自处理能力，而在于用户与之交互的方式。这一趋势如今已可见一斑，顶尖的
    Java ME 用户界面已能与智能手机或 PC 上的界面相媲美，而诸如增强现实等先进的概念验证应用也开始出现。


    同时，随着设备获得更大更快的存储能力，并且连接性越来越强，Java ME 应用最终将能够存储、操作和共享海量数据。结合云计算日益增长的趋势，这将催生与服务器端软件协同工作的
    Java ME 应用，真正赋能用户。即使是离线应用也将从存储能力的增长中受益匪浅。例如，它们能够包含更精细的图形和多媒体元素，并能存储和处理更多用户数据。


    Java ME 硬件演进的一个非常重要的方面将是近场通信（NFC）硬件的出现和广泛采用。这种硬件随后将用于从支付到名片交换等各种场景，并且随着该技术的普及，我们很可能会看到更多创新性的用途。最重要的是，这项技术将确保
    Java ME 在可预见的未来仍是移动世界的一员，因为具备 NFC 功能的 Java ME 设备将价格低廉且普及广泛。作为附带效应，当人们接触到为其编写的
    NFC 应用时，将更加了解 Java ME 的潜力和能力。


    最后，正如我刚才所暗示的，还有硬件价格的问题。硬件价格不断下降，Java ME 硬件也不例外。这将使得更新硬件技术（例如 3D 芯片、触摸屏、GPS、传感器和
    NFC）的普及速度比以往更快，进而由于这些技术的广泛可用性，它们将迅速被 Java ME 开发者采用。这反过来又将催生更好、更强大的 Java ME 应用，并带来随之而来的所有好处。

    '
- fmt: '### The Evolution of the Java ME API


    The most important thing that needs discussing here is `MIDP 3.0`, the successor
    to `MIDP 2.0`. `MIDP 3.0` will bring with it enhanced capabilities in most areas
    of the Java ME platform: better graphics, UI and communications support, support
    for background MIDlets, MIDlet multitasking, inter-MIDlet communications, natively
    secure RMS stores, fewer fragmentation issues, and more.


    **NOTE:** For a full list of `MIDP 3.0` enhancements, visit [`http://java.sun.com/developer/technicalArticles/javame/midp3_enhance/`](http://java.sun.com/developer/technicalArticles/javame/midp3_enhance/).


    These enhancements are needed in order to bring the Java ME platform into the
    same ballpark as modern-day smartphone platforms in terms of software capabilities.
    Granted, smartphones will (by definition) always have better capabilities, but
    the fact that most of today’s Java ME phones don’t even support a simple thing
    such as multitasking (for example) means that a lot of potential users are drawn
    away from the platform, and it also means that the platform is starting to show
    its age.


    `MIDP 3.0` will change all this, by providing developers with the needed tools
    to create competitive and modern applications. A `MIDP 3.0` feature phone will
    not be that different at first glance compared to a smartphone. It will, for example,
    have multitasking support and will support widgets. (Inside an `MIDP 3.0` application,
    widgets can be implemented quite easily by extending the `IdleItem` class, after
    which the application can add them to the device’s idle screen by calling `Display.setIdleItem(someItem)`.
    Basically, `IdleItem`s are just like regular items, and can be used as such, with
    the distinction that they can also be added to the idle screen.) In addition,
    applications will be able to communicate with one another (for example, providing
    copy-paste support) and share functionality, and they will be able to respond
    to system-wide events such as incoming calls.


    `MIDP 3.0` will definitely be a game changer after it gets widely adopted. However,
    the problem is knowing when this will happen. The specifications are finalized,
    but there are, to my knowledge, no `MIDP 3.0` devices out there at the time of
    this writing. There are many reasons for this, including roadmaps, licensing fees,
    hardware requirements, the fact that `MIDP 2.0` is still quite okay for stand-alone
    applications running on feature phones, and pricing. There is no doubt that `MIDP
    3.0` devices will arrive sooner or later in order for feature phones to remain
    competitive (and there is clearly a demand for them, considering their market
    share). However, for now, we will have to wait.


    The future will also see the general migration from `MIDP 1.0`/`CLDC 1.0` to `MIDP
    2.0`/`CLDC 1.1`. The former combination is still found in a wide variety of devices,
    especially in the developing world, but as the hardware gets cheaper and `MIDP
    3.0` enters the scene, even extremely low-end devices will make the jump to `MIDP
    2.0`.


    Finally, in terms of the evolution of the Java ME optional APIs, I see no major
    changes. APIs for most modern capabilities already exist (for example, GPS and
    NFC), so the only thing that the future will bring is their widespread adoption.


    ### The Evolution of the Java ME Mindset and Development Philosophy


    First of all, it is my belief that, as low-end, mid-level, and high-end devices
    continue to converge in terms of capabilities, developers will finally be able
    to approach all of them with a single mindset—and thus create a common development
    philosophy. The focus will be on elegance and simplicity. Without having to worry
    about the widely different environments that an application needs to support today,
    developers will be able to write cleaner code, better and faster.


    As hardware grows more powerful, the limits of what can be done with Java ME will
    grow along with it, and the need for having a pessimistic and cautious approach
    will fade away. Fewer compromises will have to be made; you will be able to have
    both a good-looking and a feature-rich application.


    At the same time, outside-the-box thinking and clever solutions to problems will
    no longer be mandatory to get an application done. Instead, they will become optional
    or, most likely, will become the differentiating factors between applications.


    Even more emphasis than today will be placed on the user’s experience, as developers
    will benefit from the freedom to create user interfaces that today are unfeasible
    even on high-end devices. This will be aided by the fact that third-party libraries
    and tools will also become more feature rich and will take advantage of the increase
    in available resources and APIs. As such, even more third-party libraries will
    be used than today. At the same time, the need to get your hands dirty in order
    to get the best possible performance on a certain device will go away: either
    the library will do this for you, or the target device will be powerful enough
    so as not to require the effort.


    New mindset rules will also be introduced. For example, cloud computing and integration
    with the cloud will play an increasingly greater role in the Java ME world, to
    the point that it will become almost commonplace. This will be reflected in the
    developer’s mindset, with one of the goals being to seamlessly blend the capabilities
    of the cloud with those of the device in order to get the best of both, to a much
    higher degree than today.


    Another rule that will be introduced is that because storage space and memory
    are plentiful, you should always make full use of them. This will impact everything,
    from the quality of the graphical user interface to the amount and type of data
    that your applications will store and process. For example, you will be able to
    add full “undo” support to your application by keeping track of your data’s state
    across an entire run. By comparison, although much better than a few years ago,
    developers today still have to put effort into conserving RAM and using as little
    storage space as possible, and applications that do have undo support are typically
    limited to only one or two steps.


    In conclusion, Java ME development will be handled in the same way as desktop
    development is handled today. There will be considerably fewer optimizations needed
    and fewer portability tricks required, with developers relying more on native
    APIs and on established third-party libraries and tools. Development will be clean,
    simple, and elegant.'
