  trans: '

    #### 为应用程序创建非移动版本


    移动领域正呈现一种趋势，即用基于网页或桌面的版本来补充移动应用程序。例如，你常用的移动聊天客户端可能也有网页版，能在两者之间自动同步聊天记录、联系人列表和账户。


    为 Java ME 应用程序添加这一功能非常棒，仅仅因为它在 Java ME 环境中并不常见。此类功能能大幅提升你应用的知名度和用户忠诚度。许多潜在用户可能不知道你的
    Java ME 应用存在，或者不知道它能在他们的手机上运行。然而，你可以通过宣传“集网页与移动体验于一体，兼容所有手机——而不仅仅是智能手机”（这只是一个例子）来吸引他们的兴趣。


    此外，你产品的网页版意味着潜在用户可能会偶然发现它（完全靠自己、通过广告或口口相传），在网页上试用，然后决定在设备上安装移动版。即使用户最初并未寻找你产品的移动版（聊天客户端、电子邮件客户端等），这种情况也可能发生。在这种情况下，你实际上是在将用户从一个高知名度、易于触达的媒介（网页）引导至一个低知名度、较难触达的媒介（Java
    ME 应用程序），这通常比一开始就只针对低知名度媒介更为成功。


    拥有应用程序的非移动版本也有技术上的优势。除了拥有用户数据的备份外，由于处理能力更强、屏幕空间更大，你在网页或桌面上做某些事情会比在移动设备上更容易。此外，将数据导入你的应用程序可能只能在网页或桌面端进行——例如，导入
    PNG 或 JPEG 以外的图像格式，或从办公套件导入文档。这些文件可以在设备外转换为应用程序原生格式，然后通过网页、蓝牙或直接电缆连接等方式上传到设备。


    同样值得注意的是，你的应用程序的非移动版本不必功能完备。例如，对于基于网页的应用，通常只需具备一些核心功能就足以激发潜在用户的兴趣。


    #### 部署持续的应用更新


    保持用户忠诚度最有效的方法之一是频繁发布小型更新，而不是偶尔发布大型更新。这对于修复错误尤其重要。许多因一两个错误而感到沮丧的用户不会等待数月来等待你应用的新主要版本修复问题。相反，他们会转而使用竞争产品。通过频繁发布小版本，即使每次只包含一两个错误修复，你也能塑造出产品动态且持续更新的形象，同时确保用户能及时获得他们想要的修复。


    如果你决定采用持续更新策略，必须事先做好一些准备。首先，确保你的分发渠道能够承受频繁更新带来的速度和压力。确保你的服务器硬件和带宽能够胜任，并确保你与第三方（主要是应用商店）的协议中包含相关条款，以保证你能快速部署更新。


    同时，你必须确保拥有高效的应用内更新机制。由于更新频繁，你必须确保更新过程尽可能无缝。理想情况下，用户只需确认他们想要安装新更新，其余工作由应用程序完成。例如，应用程序会打开一个浏览器，指向新版本
    JAD 文件的 URL，进而触发系统安装新版本的应用。


    采用持续更新方法时，你必须非常小心的一点是每次更新的质量。确保用户安装到其设备上的版本运行正常，并且不会修复一个错误却带来十个新问题。频繁发布更新不是不做质量保证的借口。这或许显而易见，但也至关重要。只需一个错误的更新版本就足以吓跑用户，并损害你的声誉。


    #### 添加皮肤支持


    高质量的 Java ME 应用程序普遍使用第三方 UI 库构建，而非设备自带的原生 UI 组件。这意味着应用程序的外观和感觉不会与设备的原生外观相匹配，这对某些用户来说可能不太方便。


    为了克服这一点，你可以为应用程序创建多个*皮肤*（或主题），每个设备或平台对应一个，每个皮肤模仿该设备或平台的默认原生外观。这将使用户对你的应用感到更加熟悉。模仿不必完全精确。通常只需保持相同的
    UI 布局，更改颜色主题和图形元素（图标、按钮等），同时保持底层 UI 功能和操作模式不变即可。


    另一种替代方案是，为所有构建版本保持图形元素不变，并将应用程序与几个内置颜色主题捆绑在一起，在运行时选择与目标设备最匹配的主题（如果该设备在已知设备列表中）。如果你的预算有限或时间紧张，此选项是最佳选择。你甚至可以允许用户创建自己的颜色主题，从而提高他们个性化体验的程度。


    更进一步，你甚至可以实现在线下载皮肤的功能，就像下载新的翻译包一样。这将使你的应用保持新鲜感，并让用户即使没有明确需要使用你的应用，也会偶尔回来看看。


    再进一步，皮肤还可以包含不同的 UI 布局和与 UI 相关的配置设置（例如，滚动条是始终可见还是仅在需要时显示），从而为用户创造完全不同的 UI 体验。这也不仅仅是为了展示。许多人偏爱一种布局而非另一种，仅仅是因为它更适合他们的使用模式，而某些布局天生就比其他布局更适合某些任务。


    皮肤支持是打造卓越 Java ME 用户体验的重要组成部分。它既关乎审美原因，也关乎功能原因，能够赋予用户控制应用外观和感觉的能力，对于你的应用在市场上的认知度至关重要。归根结底，用户不想要千篇一律的体验；他们想要量身定制的东西。在
    Java ME 世界中，皮肤是最接近这一点的实现方式。


    最后，皮肤还可以用于针对不同用户群体定制你的产品。例如，“高级用户”皮肤旨在提供对所有应用功能的快速访问，而“新手用户”皮肤则更侧重于视觉吸引力，并以简单的步骤引导用户使用应用，甚至可能完全隐藏潜在的危险选项（例如，客户端-服务器应用中的服务器
    IP 和端口号等）。


    尽管这听起来很棒，但你应该意识到，这种级别的皮肤通常只能通过代码实现。如果不处理皮肤系统带来的大量开销，你实际上无法通过可下载的皮肤做到这一点。

    '
- fmt: '### Advertising Related Products


    By definition, your application will not be able to do everything users want to
    do with their phones. For example, your e-mail client application can take care
    of the users'' need for e-mail but not for IM. Far from being a bad thing, this
    is a huge opportunity that is often neglected. To take advantage of it, all you
    have to do is add a “Related applications” or “Recommended apps” page somewhere
    in your application. On this page, you can advertise your other applications,
    preferably those complementary or related to the application the user is currently
    using. If you have no related or complementary applications of your own, advertise
    the applications of your partners and ask them to do the same for your products.
    If you have no partners, advertise freeware applications that you truly believe
    will suit the user''s needs.


    This is a win-win situation. Your users benefit from this because they learn about
    other applications that they may find helpful. You and your partners benefit because
    you get to advertise your other products directly to end users. This is a huge
    plus for any Java ME application developer, because Java ME lacks a central application
    source like Apple''s App Store. Not having a central application source makes
    popularizing and advertising your application somewhat difficult, because you
    typically have to target multiple sources to reach an acceptable level of user
    awareness. Therefore, being able to advertise directly to potential users is a
    godsend.


    Furthermore, you are targeting potential users who are actively curious about
    your other products and who have explicitly requested to see them (by visiting
    the “Related apps” page). Thus your chances of success are considerably higher
    than usual.


    To make things even more tempting for users, you may even want to include special
    offers in your application. For example, the application could generate a dynamic
    coupon code that the user could then use to purchase other applications at a discount.


    ### Deciding Which Fine Touches and Improvements to Implement


    As mentioned at the beginning of this chapter, unless you''re targeting only high-end
    Java ME devices and your budget has lots of zeros at the end, you won''t be able
    to implement every improvement mentioned so far. As such, you will have to make
    some sacrifices and implement some things to the detriment of others. This section
    aims to serve as a small guideline for what to implement and what to leave out.


    In general, you should always start with improvements that are resource-friendly,
    such as history, simple visual feedback, and in-application assistance. The reason
    for this is that you can usually have these improvements in all builds of the
    application, even in those for low-end devices. More resource-intensive improvements,
    such as adaptive text support, should be implemented last.


    You should always consider what benefits of your application target users the
    most. For example, if your target market is primarily tech-savvy users, the choice
    between nice visual feedback and good contextual information should be in favor
    of the latter, because tech-savvy people generally value information over eye
    candy. However, if you are targeting beginner users, nice visual feedback is more
    important.


    Some improvements, especially high-end ones, make sense only if the application
    is fairly well polished in every other respect. For example, intent detection
    will not benefit an application that is buggy and unreliable, or one with missing
    core features. In general, all the application''s functionality (this includes
    fine touches and other improvements) should have the same overall level of quality,
    and more-complex functionality should be implemented only after all less-complex
    functionality has been implemented.


    Finally, some improvements (such as adaptive text support) make the application
    more “lenient” toward mistakes. If the goal is an extremely user-friendly application,
    then these improvements are a must. The degrees to which they are implemented
    vary from device to device, depending on available resources and processing power,
    but they should be present in some form or another in all the versions of your
    application.


    ### Summary


    In this chapter, you have examined the most important fine touches and user interaction
    improvements that you can add to your application. You have learned how they improve
    the user''s overall experience, while boosting your image and the image of your
    products at the same time. In the next chapter, you will take a look at Java ME
    application testing.


    ## Chapter 12


    ## Java ME Application Testing


    Testing your application is an important part of the software development process.
    For mobile development, particularly on the Java ME platform, proper testing of
    an application is almost as important as writing the application in the first
    place, because you have to identify not only bugs in your code but also various
    glitches, inconsistencies, fragmentation issues, and other problems related to
    the JVM and the device itself.


    Viewed from up high, Java ME application testing is extremely similar to regular
    application testing on desktop platforms. Indeed, the same principles, best practices,
    and processes are applicable in both cases, and it is assumed that you are familiar
    with them. However, because of the nature of the platform, Java ME application
    testing brings with it some subtle but important differences, as well as the need
    to improvise and test some aspects that you simply don’t need to test on a desktop
    platform—for example, the correct working of low-level system functions.


    This chapter aims to serve as a quick guide to Java ME application testing, discussing
    what Java ME application testing involves and how to best approach it. I will
    go over the most important aspects and, where applicable, explain how these aspects
    are different for Java ME compared to desktop-like platforms.'
  raw: '#### Advertising Related Products


    By definition, your application will not be able to do everything users want to
    do with their phones. For example, your e-mail client application can take care
    of the users'' need for e-mail but not for IM. Far from being a bad thing, this
    is a huge opportunity that is often neglected. To take advantage of it, all you
    have to do is add a “Related applications” or “Recommended apps” page somewhere
    in your application. On this page, you can advertise your other applications,
    preferably those complementary or related to the application the user is currently
    using. If you have no related or complementary applications of your own, advertise
    the applications of your partners and ask them to do the same for your products.
    If you have no partners, advertise freeware applications that you truly believe
    will suit the user''s needs.


    This is a win-win situation. Your users benefit from this because they learn about
    other applications that they may find helpful. You and your partners benefit because
    you get to advertise your other products directly to end users. This is a huge
    plus for any Java ME application developer, because Java ME lacks a central application
    source like Apple''s App Store. Not having a central application source makes
    popularizing and advertising your application somewhat difficult, because you
    typically have to target multiple sources to reach an acceptable level of user
    awareness. Therefore, being able to advertise directly to potential users is a
    godsend.


    Furthermore, you are targeting potential users who are actively curious about
    your other products and who have explicitly requested to see them (by visiting
    the “Related apps” page). Thus your chances of success are considerably higher
    than usual.


    To make things even more tempting for users, you may even want to include special
    offers in your application. For example, the application could generate a dynamic
    coupon code that the user could then use to purchase other applications at a discount.


