  trans: '

    #### 快速代码路径切换


    这项基础优化适用于 `if...else` 块和 `switch` 语句，在循环中效果最为显著。你需要做的是将最常见的情况放在代码块/语句的顶部，而将最不常见的情况放在末尾。


    根据情况的数量和条件的复杂程度，该方法带来的性能提升范围可以从 <1%（即几乎无法察觉）到接近 100%（例如，在包含一个或多个情况的场景中，且每个情况的评估时间比实际测试用例的执行时间更长时，就能看到这种效果）。


    这项优化实现起来极其简单；然而，它确实需要一些性能分析，以便根据各种代码路径在实际使用场景中的出现频率来排列它们的顺序。事实上，这个性能分析步骤才是最重要的；如果执行不当，这项优化的全部意义就丧失了。


    理想情况下，性能分析完全是理论性的：你可以通过数学计算得出每条代码路径的使用频率，并据此进行排列。然而，大多数时候，代码性能分析必须亲力亲为。在进行手动性能分析时，你有两个主要选择：要么使用性能分析器和模拟器来查看哪些代码路径被最频繁地访问，要么为测试人员提供专门用于调试的构建版本，以测量这一点。


    后者是更优的选择，因为它不仅能节省开发时间，还能提供更贴近实际、更无偏倚的结果。因为每个人的使用模式往往不同，而且每个人都在不同的条件下、在真实设备上测试应用程序，所以通过这种方式获得的结果，远比查看单个人在模拟器上运行应用程序所获得的数据要可靠得多。


    快速代码路径切换作为一种技术，可以应用于任何平台，无论是移动端还是其他平台；它对 Java ME 极其有效，因为根据我的经验，`if` 语句是你在移动 JVM
    上能做的最慢的操作之一，这主要是由于 JVM 的典型工作方式所致。此外，即使你使用的是已经具备优化功能的编译器，这项优化也同样适用，因为编译器无法知道哪个情况会被最频繁地执行。


    #### 避免冗余


    尽可能只计算一次值（本书前面介绍的预计算技术就是一个很好的例子），并尽量避免使用中间值。减少中间值意味着需要执行的变量分配工作更少，需要跟踪的变量也更少，这反过来意味着
    CPU 的工作量更少，内存/缓存访问操作也更少。此外，它还能保持 JVM 的栈更干净，这同样能提升性能。


    对于功能完备的 JVM 来说，通常不需要这项技术，因为它们能够检测到中间值并相应地优化字节码（例如，完全消除对中间值的需求）；然而，由于移动 JVM 会原样执行字节码，这可能会导致显著的性能损失，尤其是在循环内部。如果你在循环内创建或实例化变量，这一点尤为明显。


    避免冗余的最佳方法之一可能是简化你的数学运算，尤其是在循环内部。这两种优化方法稍后都会介绍。


    #### 善用局部性原理


    局部性原理指的是相关代码和数据在内存中彼此靠近的程度。与避免冗余类似，将相关的代码和数据放在一起意味着 CPU 和内存子系统在运行你的代码时需要做的工作更少。


    在 Java 中，你无法知道某个代码块或某个变量在内存中的具体位置；但是，你可以重写代码，使变量在你的表达式中被分组在一起。这样做的好处是优化了 JVM 的栈和内存使用，从而带来额外的性能提升。


    例如，考虑以下表达式：


    `expr1 = a * b + c * d + ... + y * z + a * z`


    你可以清楚地看到，变量 `a` 被使用了两次，一次在表达式开头，一次在表达式末尾。这样做的问题是，当第二次使用 `a` 被求值时，`a` 很可能已经不在栈顶附近，或者不在
    CPU 的缓存或寄存器中了。这意味着必须从内存中重新获取它，这需要额外的工作并浪费 CPU 周期。然而，如果我们像这样将 `a` 的使用分组在一起：


    `expr1 = c * d + ... + y * z + a * z + a * b`


    那么 `a` 从 CPU 缓存或寄存器中读取的可能性就非常高，这要快得多。诚然，对于单次访问来说，差异微乎其微，但同样，如果你在循环中这样做，所有微小的差异就会累积起来。


    在上述例子中需要注意的一点是，为了将变量 `a` *和* `z` 都放在一起，第一个子表达式（`a * b`）不得不被移到了末尾。如果我们把表达式重写为：


    `expr1 =+ a * b + a * z + c * d + ... + y * z`


    那么变量 `a` 会彼此靠近，但变量 `z` 会彼此远离，从而抵消了优化的效果。


    不幸的是，这种重写的一个副作用是，有时会使数学运算背后的含义变得不清晰；在我们的例子中，序列的整洁性和直观性就丢失了。

    '
- fmt: '### Optimize Your Math


    Out of all the code optimization you can perform, this has by far the largest
    impact. First, it is worth noting that not all operations execute with the same
    speed. Generally, additions are the fastest math operations a CPU can perform,
    followed in order by subtractions, multiplications, and divisions. Multiplications
    are usually at least 2–3 times slower than additions, with divisions being at
    least 4–5 times slower. Floating point operations are also considerably slower
    than integer operations. Of course, these factors depend heavily on the underlying
    hardware: the differences between addition and division are much less obvious
    on a state-of-the-art mobile CPU than they are on a low-end mobile CPU.


    The first thing you need to do in optimizing math operations is to minimize the
    number of math operations you do. For example, consider the following expression
    (with which you are no doubt familiar):


    `expr2 = a * a + 2 * a * b + b * b`


    As you can see, the CPU has to do four multiplications and three additions in
    order to evaluate this expression. We can minimize this number by writing this
    expression as follows:


    `expr2 = a * ( a + b ) + b * (a + b )`


    We still have three additions to do, but only two multiplications. We can take
    this further, by writing the following:


    `expr2 = ( a + b ) * ( a + b )`


    It contains two additions and one multiplication—not bad. But we can take this
    even further, to the final form, by writing the following:


    `expr21 = a + b`

    `expr2 = expr21 * expr21`


    In the end, we are left with one addition and one multiplication, which, when
    combined, take a lot less time to evaluate than the original form of the expression.


    All the “math tricks” we learned in school, such as using common factors, apply
    here. In fact, the goal of this exercise is the same as in algebra class: to write
    a given expression in its simplest form. The rules, however, are a bit different:
    you have to keep in mind the time each operation needs in order to execute. For
    example, if you had to choose between three additions and a multiplication on
    one hand, and a division and a subtraction on the other hand, you are probably
    much better off with the first version.


    The second trick you can use is to replace constant division by multiplication.
    For example, consider the following expression:


    `expr3 = someValue / 2.5`


    You can rephrase this as follows:


    `expr3 = someValue * 0.4`


    This should be much faster to evaluate, given that multiplication is faster than
    division. The general rule here is simple:


    Instead of


    `A = B / C`


    simply do the following:


    `D = 1 / C`

    `A = B * D`


    Of course, for this to work, you have to calculate `D` manually and insert the
    end result directly into your code.


    It should be noted that this approach works with variables too, but only in some
    cases. For example, if the original code is


    `expr41 = a / someVariable`

    `expr42 = b / someVariable`

    `expr43 = c / somevariable`


    then it will certainly be faster to do the following:


    `temp = 1 / someVariable`

    `expr41 = a * temp`

    `expr42 = b * temp`

    `expr43 = c * temp`


    The third and final common trick you can use is to replace floating point operations
    with integer operations. This can be used in a lot of cases, but the most common
    cases are those in which you need floating point precision during the course of
    a computation, but the end result is cast as an integer. For example, when drawing
    something on the screen, you use only integer coordinates. If you calculate the
    `x` coordinate of a drawing operation to be 2.34, the platform will start the
    drawing at `x=2`, for obvious reasons. The extra precision (i.e., the decimal
    part) is lost anyway, so we should try to avoid using floating point operations
    in the first place.


    To exemplify this, let''s consider the following expression, with `a=1`, `b=2`,
    and `c=3` (all integers), and that we need to have the calculation accurate to
    only two decimal places, with the end result an integer (screen coordinate):


    `X = ( a * 2.31 + b * 1.53 ) * c`


    We can easily calculate that `X=16.11`. So, in the end, `X` will be evaluated
    to 16.


    If we want to eliminate floating point operations and get the desired mid-operation
    precision, all we have to do is multiply the expression by 100, resulting in the
    following:


    `X = ( a * 231 + b * 153 ) * c`


    If we wanted three decimal places, we would have multiplied by 1,000 and so forth.


    At this point, we have no more floating point operations, which should make evaluating
    `X` considerably faster than the original case. Since we multiplied by 100 initially,
    `X` will now be 1,611. If we now divide by 100, we would get a value of `X=16`,
    which is the correct result—except we used no floating point math whatsoever.


    This optimization was worth it because usually three integer multiplications,
    an addition, and a division are faster than three floating point multiplications
    and a floating point addition. As a rule, the more floating point operations you
    need to do, the more it becomes worthwhile to convert them to integer operations.


    Please note that converting from floating point to integer math has its pitfalls.
    For example, consider the following expression:


    `Y = ( a * 1.5 ) * 2.2`


    Let''s assume for the sake of argument that we cannot alter the expression in
    any way (i.e., we cannot convert it to `Y = a * 3.3`) and that we want to convert
    it to integer math, while keeping a one decimal point precision. The end result
    must, of course, be an integer.


    Your first intuitive thought would be to multiply the expression by 10, to obtain
    the following:


    `Y = ( a * 15 ) * 22`


    You would be wrong. If we multiply by 10, what we get is the following:


    `Y = ( a * 1.5 ) * 2.2 * 10 = ( a * 1.5 ) * 22`


    You can clearly see that inside the parentheses we still have floating point operations!
    To get rid of all the floating point operations, we have to multiply again by
    10, to obtain the following:


    `Y = ( a * 15 ) * 220`


    This also means that, to get the final integer result, we would have to divide
    by 100, and not by 10!


    Converting your math operations to be integer-only is a great way to improve the
    speed of your Java ME applications, in particular those that are computationally
    intensive. The speed benefits are especially visible on devices with low-end CPUs,
    on which the performance difference between floating point and integer-only operations
    can be quite significant.


    Another math optimization trick, which is extremely effective, is to use bit shifts
    instead of math operations. For example, `a << 2` is the same as `a *= 2`, while
    `a >> 2` is the same as `a /= 2`.


    A great application of this trick is related to converting math to be integer-only.
    For example, if you want to calculate something with a precision of three decimal
    digits, you would normally multiply by 1,000. You can instead multiply by 1,024.
    This skews the calculation slightly, but the extra 24 amounts to a maximum error
    of just 2.4%. In exchange for this error, you get to use bit shifts instead of
    multiplication and division, as `a * 1024` is the same as `a << 10`, while `a
    / 1024` is `a >> 10`. In addition, if you calculate something with a precision
    of three decimals, but you instead use only two of them, then the error is practically
    insignificant.'
