    This is not only inefficient, it is also unfeasible in the long run: Twitter has
    a limit on the total number of requests any given application can make per hour,
    so if you `goBack()` too much and too fast, it is possible that you will run out
    of requests.


    A very good solution to this problem, which we will implement for `TimelineUserTweets`,
    is buffering. It works like this: when `goBack()` is first called, we will request
    a batch of tweets instead of a single one, place the batch in a buffer, and return
    the first tweet. When the method is called the next time, the second tweet in
    the buffer will be returned, and so forth, until the buffer is empty, at which
    point a new batch will be requested. This goes on until we get an empty batch
    from the server, at which point it is clear that there are no more tweets to be
    retrieved. The same strategy applies to `goForward()`.


    Buffering brings with it a huge improvement in terms of network traffic, data
    costs, server load, and battery life. It is an important technique for Java ME
    applications that rely on networking.


    Moreover, its benefits are not related strictly to client-server communication.
    Because data from the server is stored in a buffer as it is retrieved, it can
    be processed before it is actually needed. A clever application can thus process
    the data in the buffer when CPU usage is low and halt processing when CPU usage
    is high. This ensures a uniform distribution of CPU load throughout the application''s
    runtime and a smoother overall user experience, since the application has to spend
    less time processing data on the fly.


