    \            Event evt = new Event(EVT.CONTEXT.MAIN_FORM, EVT.TWEETS.POST_TWEET,\
    \ tweet);\n            Application.getMainEventController().queueEvent(evt);\n\
    \n            // Reset the StringItem text\n            newTweet.setText(Locale.get(\"\
    tweets.new.prompt\"));\n            return true;\n        }\n        return false;\n\
    \    }\n}\n```\n\nThe form is made up of three areas. The first area is a single\
    \ button, the “new tweet” button. The second area is a vertical container used\
    \ for displaying tweets retrieved from the server. The third area is a horizontal\
    \ container containing the “retrieve next tweets batch” and “go to settings form”\
    \ buttons. Since the container used for displaying tweets should take up most\
    \ of the screen (i.e., its size isn’t fixed and depends on screen resolution),\
    \ we need a custom layout for the `MainForm`, which is why we have overwritten\
    \ the standard `doLayout()` method.\n\nPlease note that when the “retrieve next\
    \ tweets batch” button is pressed, a `REQUEST_MAIN_TWEETS_BATCH` is triggered,\
    \ which is handled in the `TweetsController`. The response(s) from the `TweetsController`,\
    \ which comes in the form of `RECEIVED_TWEET` events, are handled by the `MainScreenController`,\
    \ shown in [Listing 8–8](#Chapter08.html#list_8_8).\n\n**Listing 8–8.** *The `MainScreenController`*\n\
    \n```\npackage app.controller;\n\n...\n\npublic class MainScreenController implements\
    \ Controller, EventListener {\n\n    public static MainForm form = null;\n   \
    \ public static boolean firstTimeShow = true;\n\n    public boolean handleEvent(Event\
    \ event)\n    {\n        if ( EVT.PROGRAM_FLOW.SHOW_MAIN_SCREEN == event.getType()\
    \ )\n        {\n          ...\n        }\n        else\n        if ( EVT.TWEETS.RECEIVED_TWEET\
    \ == event.getType() )\n        {\n           Tweet tweet = (Tweet) event.getPayload();\n\
    \           form.addTweet(tweet);\n        }        \n        return false;\n\
    \    }\n}\n```\n\nThis listing clearly exemplifies the separation between UI code\
    \ (the form class) and the underlying functionality (the controller class): the\
    \ form class handles only the creation of the UI and triggering of the appropriate\
    \ events when UI elements are interacted with, while the controller handles the\
    \ actual application logic. In the case of the highlighted code, the form does\
    \ the actual widget adding (via the `addTweet()` method of the `MainForm` class),\
    \ but it is the controller that decides what tweet to add. In this regard, you\
    \ can think of the form as being a kind of slave to the controller, or as an interface\
    \ between the user and the controller.\n\nThe improper separation of UI and logic\
    \ can be a major problem for Java ME apps. As targeting different devices can\
    \ frequently lead to different UIs (or at least to device-specific UI tweaks),\
    \ merging application logic with UI logic can lead to application code that is\
    \ run on one device but not on another, because the UI code follows a different\
    \ path on the latter.\n\nWhat’s even worse, sometimes application logic is wrongfully\
    \ bound to UI properties. For example, viewports are common in a lot of applications,\
    \ such as spreadsheet or mapping software. Determining a viewport’s position based\
    \ on the associated container’s scroll position makes some sense, but it’s fundamentally\
    \ wrong because rather than binding the viewport to some application-internal\
    \ variable (i.e., the calculated viewport position), you bind it to a UI widget’s\
    \ state. Not only might this cause code and logic “bleeding” between the UI and\
    \ the core application code, but it could also transform UI bugs (in the UI library,\
    \ for example) into application bugs. Consider what would happen if a bug caused\
    \ the scroll position to be wrongfully reported—for example, after a resize or\
    \ after switching from landscape to portrait mode; the viewport position would\
    \ get affected by this too."
