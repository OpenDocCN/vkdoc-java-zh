- fmt: '### Implementing UIs on Touch-Only Devices


    An increasingly common usage scenario is running your application on touch-only
    devices. This used to be the realm of expensive smartphones, but relatively cheap
    Java ME touchscreen-only devices have gradually started to appear on the market,
    and their number is bound to increase as the technology gets more affordable.


    What is interesting about touchscreen-only devices is that they rely on a virtual
    onscreen navigation area (usually containing direction keys, softkeys, and a fire/OK
    button) to provide compatibility with existing non-touch applications. This navigation
    area can be disabled most of the time (either via a property in the `JAD` file
    or from the device’s menu), allowing you to break away from the classical and
    now somewhat antiquated Java ME user-interaction paradigm.


    For example, in a typical Java ME application, one of the softkeys is usually
    dedicated to the “contextual menu” for the currently focused item. On a touch-only
    device, you can implement a click-and-hold behavior to display the contextual
    menu: if the user presses an item long enough (3–5 seconds), its contextual menu
    pops up. This feels more intuitive than the classical approach for most users,
    and has the advantage of being faster in many situations, as the user has to do
    only one action (keep the item pressed) rather than two (navigate to the desired
    item, press the softkey button).


    You also have more freedom in the way you do the layout of your application. Classical
    Java ME applications, even those built using a high-quality UI framework, typically
    have a rectangular approach to UI layout, i.e., from any given item you can go
    left, right, up, or down. The reason for this is obvious: classical Java ME applications
    are designed to be navigated by using the joystick, which can go in only those
    four directions. Touch-only devices do not have this limitation; you can build
    your UI around any shape or layout you desire.


    For example, the contextual menu discussed previously does not have to be a classical
    vertical menu: it can be a series of pictograms arranged in a circle. In this
    “circular menu” you can have item-specific commands in the upper half, and generic
    commands such as copy and paste in the lower half. This makes navigation not only
    faster, but also easier and more intuitive: users know that, if they want to paste
    something, the paste icon will always be in the same spot on the screen regardless
    of what item-specific options are in the contextual menu.


    Another touch-specific feature you can implement is “drag and drop.” This is especially
    useful when the application you are writing works with lists or tables, as the
    user can then easily and intuitively rearrange his data and content.


    Support for finger gestures is also a very nice feature to have. This goes beyond
    the now-classical kinetic scrolling. For example, a swipe from right to left across
    the screen can signify a “go back” command, a “V” swipe across the screen could
    be an “OK” command, while two swipes in the form of an “X” could be the equivalent
    of “cancel.” This makes user interaction faster, more intuitive, and more fun.


    Another concept that works well with touch-only interfaces is the concept of panes.
    While full-fledged windows are not really feasible due to the limited screen size
    and resolution, panes are sometimes a perfect fit for the activity at hand. For
    example, in a chat program, the screen is typically divided in two areas: the
    upper area, where the conversation is shown, and the lower area, where the user
    can type in messages. By using panes, the user is free to distribute the available
    screen real estate as needed between the two areas simply by dragging the pane
    divider.


    There are many more UI optimizations that you can implement on touch-only devices
    and that can make using your application easier and more intuitive, and set it
    apart from the rest of the crowd. The catch is that your application must target
    only touch-only devices for many of these optimizations to work. For example,
    the circular menu paradigm doesn’t work really well with non-touch input (as is
    the case with classical Java ME phones or mixed touch-and-keyboard devices).


    With this in mind, if your budget is tight and the range of target devices for
    your project contains both touch-only and mixed/non-touch devices, go for a classical
    UI paradigm that works well on all of them. However, if your budget allows it,
    it is worth considering creating a specialized UI for touch-only devices; the
    improved usability and image capital you will gain from it are certainly worth
    it.'
