    At this point, those of you who are familiar with Twitter might ask, “OK, but
    where are the friends, the followers, the blocked users?”


    A very good question. Even though in our application overview, the Twitter user
    is a stand-alone entity, being able to perform actions like sending and receiving
    tweets, in practice, we will treat it like a simple data type and we will move
    all the functionality and behavior associated with it to the Twitter server entity.
    This actually makes some sense if you think about it: the Twitter user really
    cannot do anything on his own—he needs a server in order to function.


    In general, if entity A depends on entity B for its functionality, it is a good
    idea to move that functionality from entity A to entity B, at least for Java ME.
    That''s because this “functionality consolidation” approach usually minimizes
    code size, the amount of information that is passed around, and the number of
    method calls that are made, since most of the “action” tends to happens within
    a single instance of a single class.


    This also leads to the situation in which 10% of the entities are taking over
    the functionality of the remaining 90%, which goes against a few object-oriented
    principles. For example, in our case, the “encapsulation of behavior” principle
    is broken, because although the `TwitterUser` retains state, all its behavior
    has been moved to the `TwitterServer`. While this is generally considered bad
    practice in the “civilized” OO world, Java ME is one of the few cases in which
    using this approach makes sense.


    If applied correctly, this consolidation process will turn many of the entities
    in a project into simple structures in the C sense of the word, while the remaining
    key entities will be responsible with the bulk of the application''s functionality.
    Out of those few entities, most of them will be written in code as interfaces
    or abstract classes, leaving the actual implementation to the application''s modules.
    As such, very few members of the `app.models` package will be full-blown classes—in
    our case, none.


    Now back to our application. So far we have looked at tweets and Twitter users,
    neither of which is really breathtaking. Let''s take a look at something a bit
    more exciting: the Twitter server.'
