- fmt: "#### Coding Defensively\n\nThis is the most important rule of mobile software\
    \ development, particularly for Java ME, and will continue be so for the foreseeable\
    \ future. To most developers, this translates to something like “check if you\
    \ have enough disk space available on the device before attempting a write” or\
    \ “read the device's screen resolution at runtime,” but this is only the tip of\
    \ the iceberg. Consider, for example, the code snippet in [Listing 1–1](#Chapter01.html#list_1_1).\n\
    \n**Listing 1–1.** *Sending Data to a Server*\n\n```\nbyte buffer[] ;\nwhile (\
    \ dataSource.hasMoreData() )\n{\n        buffer = dataSource.readNextChunk();\n\
    \        if ( dataSource.readOK() )\n        {\n                try\n        \
    \        {\n                        serverConnection.send(buffer);\n         \
    \       }\n                catch (IOException ex)\n                {\n       \
    \                 // handle the exception\n                }\n\n        }\n  \
    \      else\n        {\n                // something has gone wrong while reading\
    \ data\n        }\n}\n```\n\nAt first glance, there is nothing wrong with this\
    \ code. We handle the case in which something goes wrong when reading data from\
    \ the source, and we handle the case in which something goes wrong when sending\
    \ said data to the server. So where's the problem?\n\nThe problem lies in the\
    \ fact that we make one critical assumption: that the code snippet will complete\
    \ in a timely fashion. Therefore, we exit the loop only when we have no more data\
    \ to read and send, which might take quite a long time depending on circumstances.\
    \ If this is not handled properly, the user could be stuck staring at a “transfer\
    \ in progress” screen for a really, really long time. This isn't even device-dependent:\
    \ if the network connection is extremely slow or unstable, you'll end up in this\
    \ scenario regardless of the device you're running on.\n\nBut here's the real\
    \ kicker: duration is not the main issue here. What's really bad about this code\
    \ is that it locks a lot of resources (CPU time, bandwidth, memory, active connections)\
    \ for the entire length of the data transfer. This might be OK for desktop computers,\
    \ which have plenty of resources, but it most certainly is not OK for mobile devices.\
    \ Never assume you can lock resources for a potentially long period on a mobile\
    \ device.\n\nA good way around this problem is to take any action or workload\
    \ that could potentially require more than a couple of seconds to complete and\
    \ split it into individual work units (this is also true for background actions\
    \ or workloads). These work units can then be executed in turn with other work\
    \ units, from other actions or workloads, using the same resource pool, *but not\
    \ at the same time*. This helps your application keep a low resource profile and\
    \ can ensure that you are able to do many things at once without running into\
    \ resource shortages. [Listing 1–2](#Chapter01.html#list_1_2) shows a basic example\
    \ of how this can be done.\n\n**Listing 1–2.** *Sending Data to a Server the Proper\
    \ Way*\n\n```\nwhile ( isRunning() )\n{\n        workListeners.jumpToFirst();\n\
    \        while ( workListeners.hasMore() )\n        {\n                workListeners.nextListener().raiseEvent(\
    \ Event.DO_WORK_UNIT )\n        }\n}\n\n....\n\npublic void handleEvent(int eventType)\n\
    {\n        if ( eventType == Event.DO_WORK_UNIT )\n        {\n               \
    \ if ( dataSource.hasMoreData() )\n                {\n                       \
    \ buffer = dataSource.readNextChunk();\n                        if ( dataSource.readOK()\
    \ )\n                        {\n                                try\n        \
    \                        {\n                                        serverConnection.send(buffer);\n\
    \                                }\n                                catch (IOException\
    \ ex)\n                                {\n                                   \
    \     // handle the exception\n                                }\n\n         \
    \               }\n                        else\n                        {\n \
    \                               // something has gone wrong while reading\n  \
    \                      }\n                }\n        }\n}\n```\n\nNot only is\
    \ this approach more resource-friendly, it's also more flexible. For example,\
    \ you can have multiple worker threads, each processing one work unit at a time,\
    \ and the `DO_WORK_UNIT` event can be issued from any number of sources independently.\n\
    \nThis is extremely important for Java ME applications, as they typically run\
    \ in more constrained environments than native applications, both in terms of\
    \ resources and in terms of runtime flexibility. Proper defensive coding techniques\
    \ usually minimize resource drain and make the application more flexible because\
    \ they allow developers to handle a greater number of runtime scenarios.\n\n####\
    \ Avoiding Wrong Assumptions\n\nAn erroneous assumption that is frequently made\
    \ is that Java ME apps run in a single-tasking environment. This was true in the\
    \ early days, but it is not the case anymore. The most obvious repercussion of\
    \ this is that you can make the mistake of thinking that all of the phone's resources\
    \ will be at your disposal. While this means that your application will be lightning-fast\
    \ when running alone, it also means that it can be as slow as a snail when running\
    \ alongside other applications. In other words, your application can appear to\
    \ be inconsistent, which is not something users expect or like.\n\nThis is most\
    \ dangerous when the device is running out of resources of a given type—for example,\
    \ RAM. What happens then varies from device to device. For example, when I ran\
    \ too many Java ME apps simultaneously on my old Nokia E50 and the phone ran out\
    \ of memory, it showed a “memory full” message and immediately closed *all* running\
    \ Java ME applications. Any data that wasn't saved got lost.\n\nTo avoid suffering\
    \ from these problems more often than necessary, you can do one simple thing:\
    \ construct your application so that it is able to reduce its resource consumption\
    \ when necessary. For example, time some of your critical operations, and if they\
    \ take more than a predetermined amount of time to complete, consider either dynamically\
    \ reducing their complexity (e.g., fewer graphical effects for games) or informing\
    \ the user that an operation is taking longer than usual and asking him to stop\
    \ other background applications if possible.\n\nThe same goes for memory. For\
    \ example, if you can't allocate a 2 MB buffer, try to allocate a 1 MB one and\
    \ then a 512 KB one, and so forth. Make sure your code can work with buffers of\
    \ any size, not just the preferred size.\n\nThe best way to keep the number of\
    \ bad assumptions you make to a minimum is to be extremely pessimistic and code\
    \ defensively. Always plan for the worst-case scenario and never take anything\
    \ for granted, not even obvious stuff like the device having power (its battery\
    \ might run out while the application is running)."
  raw: '#### Coding Defensively


    This is the most important rule of mobile software development, particularly for
    Java ME, and will continue be so for the foreseeable future. To most developers,
    this translates to something like “check if you have enough disk space available
    on the device before attempting a write” or “read the device''s screen resolution
    at runtime,” but this is only the tip of the iceberg. Consider, for example, the
    code snippet in [Listing 1–1](#Chapter01.html#list_1_1).


    **Listing 1–1.** *Sending Data to a Server*


    `byte buffer[] ;`

    `while ( dataSource.hasMoreData() )`

    `{`

    `        buffer = dataSource.readNextChunk();`

    `        if ( dataSource.readOK() )`

    `        {`

    `                try`

    `                {`

    `                        serverConnection.send(buffer);`

    `                }`

    `                catch (IOException ex)`

    `                {`

    `                        // handle the exception`

    `                }`


    `        }`

    `        else`

    `        {`

    `                // something has gone wrong while reading data`

    `        }`

    `}`


    At first glance, there is nothing wrong with this code. We handle the case in
    which something goes wrong when reading data from the source, and we handle the
    case in which something goes wrong when sending said data to the server. So where''s
    the problem?


    The problem lies in the fact that we make one critical assumption: that the code
    snippet will complete in a timely fashion. Therefore, we exit the loop only when
    we have no more data to read and send, which might take quite a long time depending
    on circumstances. If this is not handled properly, the user could be stuck staring
    at a “transfer in progress” screen for a really, really long time. This isn''t
    even device-dependent: if the network connection is extremely slow or unstable,
    you''ll end up in this scenario regardless of the device you''re running on.


    But here''s the real kicker: duration is not the main issue here. What''s really
    bad about this code is that it locks a lot of resources (CPU time, bandwidth,
    memory, active connections) for the entire length of the data transfer. This might
    be OK for desktop computers, which have plenty of resources, but it most certainly
    is not OK for mobile devices. Never assume you can lock resources for a potentially
    long period on a mobile device.


    A good way around this problem is to take any action or workload that could potentially
    require more than a couple of seconds to complete and split it into individual
    work units (this is also true for background actions or workloads). These work
    units can then be executed in turn with other work units, from other actions or
    workloads, using the same resource pool, *but not at the same time*. This helps
    your application keep a low resource profile and can ensure that you are able
    to do many things at once without running into resource shortages. [Listing 1–2](#Chapter01.html#list_1_2)
    shows a basic example of how this can be done.


    **Listing 1–2.** *Sending Data to a Server the Proper Way*


    `while ( isRunning() )`

    `{`

    `        workListeners.jumpToFirst();`

    `        while ( workListeners.hasMore() )`

    `        {`

    `                workListeners.nextListener().raiseEvent( Event.DO_WORK_UNIT )`

    `        }`

    `}`


    `....`


    `public void handleEvent(int eventType)`

    `{`

    `        if ( eventType == Event.DO_WORK_UNIT )`

    `        {`

    `                if ( dataSource.hasMoreData() )`

    `                {`

    `                        buffer = dataSource.readNextChunk();`

    `                        if ( dataSource.readOK() )`

    `                        {`

    `                                try`

    `                                {`

    `                                        serverConnection.send(buffer);`

    `                                }`

    `                                catch (IOException ex)`

    `                                {`

    `                                        // handle the exception`

    `                                }`


    `                        }`

    `                        else`

    `                        {`

    `                                // something has gone wrong while reading`

    `                        }`

    `                }`

    `        }`

    `}`


    Not only is this approach more resource-friendly, it''s also more flexible. For
    example, you can have multiple worker threads, each processing one work unit at
    a time, and the `DO_WORK_UNIT` event can be issued from any number of sources
    independently.


    This is extremely important for Java ME applications, as they typically run in
    more constrained environments than native applications, both in terms of resources
    and in terms of runtime flexibility. Proper defensive coding techniques usually
    minimize resource drain and make the application more flexible because they allow
    developers to handle a greater number of runtime scenarios.


    #### Avoiding Wrong Assumptions


    An erroneous assumption that is frequently made is that Java ME apps run in a
    single-tasking environment. This was true in the early days, but it is not the
    case anymore. The most obvious repercussion of this is that you can make the mistake
    of thinking that all of the phone''s resources will be at your disposal. While
    this means that your application will be lightning-fast when running alone, it
    also means that it can be as slow as a snail when running alongside other applications.
    In other words, your application can appear to be inconsistent, which is not something
    users expect or like.


    This is most dangerous when the device is running out of resources of a given
    type—for example, RAM. What happens then varies from device to device. For example,
    when I ran too many Java ME apps simultaneously on my old Nokia E50 and the phone
    ran out of memory, it showed a “memory full” message and immediately closed *all*
    running Java ME applications. Any data that wasn''t saved got lost.


    To avoid suffering from these problems more often than necessary, you can do one
    simple thing: construct your application so that it is able to reduce its resource
    consumption when necessary. For example, time some of your critical operations,
    and if they take more than a predetermined amount of time to complete, consider
    either dynamically reducing their complexity (e.g., fewer graphical effects for
    games) or informing the user that an operation is taking longer than usual and
    asking him to stop other background applications if possible.


    The same goes for memory. For example, if you can''t allocate a 2 MB buffer, try
    to allocate a 1 MB one and then a 512 KB one, and so forth. Make sure your code
    can work with buffers of any size, not just the preferred size.


    The best way to keep the number of bad assumptions you make to a minimum is to
    be extremely pessimistic and code defensively. Always plan for the worst-case
    scenario and never take anything for granted, not even obvious stuff like the
    device having power (its battery might run out while the application is running).'
  trans: '

    #### 防御性编码


    这是移动软件开发中最重要的一条规则，尤其对于 Java ME 而言，并且在可预见的未来仍将如此。对大多数开发者来说，这大概意味着“在尝试写入前，检查设备上是否有足够的磁盘空间”或“在运行时读取设备的屏幕分辨率”，但这只是冰山一角。例如，请考虑代码清单
    1–1 中的代码片段。


    **代码清单 1–1.** *向服务器发送数据*


    `byte buffer[] ;`

    `while ( dataSource.hasMoreData() )`

    `{`

    `        buffer = dataSource.readNextChunk();`

    `        if ( dataSource.readOK() )`

    `        {`

    `                try`

    `                {`

    `                        serverConnection.send(buffer);`

    `                }`

    `                catch (IOException ex)`

    `                {`

    `                        // 处理异常`

    `                }`


    `        }`

    `        else`

    `        {`

    `                // 读取数据时出现问题`

    `        }`

    `}`


    乍一看，这段代码似乎没什么问题。我们处理了从数据源读取数据时出错的情况，也处理了向服务器发送数据时出错的情况。那么问题出在哪里呢？


    问题在于我们做了一个关键假设：这段代码能够及时完成。因此，只有当没有更多数据需要读取和发送时，我们才会退出循环，而这根据具体情况可能需要相当长的时间。如果处理不当，用户可能会长时间盯着“传输进行中”的屏幕，等待很久很久。这甚至不依赖于设备：如果网络连接极其缓慢或不稳定，无论你在什么设备上运行，最终都会陷入这种状况。


    但真正要命的是：持续时间并非主要问题。这段代码真正糟糕的地方在于，它在整个数据传输期间锁定了大量资源（CPU 时间、带宽、内存、活动连接）。对于资源丰富的台式电脑来说，这可能没问题，但对于移动设备来说，这绝对不行。永远不要假设你可以在移动设备上长时间锁定资源。


    解决这个问题的一个好方法是，将任何可能需要超过几秒钟才能完成的动作或工作负载，拆分成独立的工作单元（对于后台动作或工作负载也是如此）。然后，这些工作单元可以与其他动作或工作负载中的其他工作单元轮流执行，使用相同的资源池，*但并非同时执行*。这有助于你的应用程序保持较低的资源占用，并能确保你可以同时处理许多事情而不会遇到资源短缺。代码清单
    1–2 展示了一个基本示例，说明如何实现这一点。


    **代码清单 1–2.** *以正确方式向服务器发送数据*


    `while ( isRunning() )`

    `{`

    `        workListeners.jumpToFirst();`

    `        while ( workListeners.hasMore() )`

    `        {`

    `                workListeners.nextListener().raiseEvent( Event.DO_WORK_UNIT )`

    `        }`

    `}`


    `....`


    `public void handleEvent(int eventType)`

    `{`

    `        if ( eventType == Event.DO_WORK_UNIT )`

    `        {`

    `                if ( dataSource.hasMoreData() )`

    `                {`

    `                        buffer = dataSource.readNextChunk();`

    `                        if ( dataSource.readOK() )`

    `                        {`

    `                                try`

    `                                {`

    `                                        serverConnection.send(buffer);`

    `                                }`

    `                                catch (IOException ex)`

    `                                {`

    `                                        // 处理异常`

    `                                }`


    `                        }`

    `                        else`

    `                        {`

    `                                // 读取时出现问题`

    `                        }`

    `                }`

    `        }`

    `}`


    这种方法不仅更节省资源，而且也更灵活。例如，你可以有多个工作线程，每个线程一次处理一个工作单元，并且 `DO_WORK_UNIT` 事件可以由任意数量的源独立触发。


    这对于 Java ME 应用程序来说极其重要，因为它们通常在比原生应用程序更受限的环境中运行，无论是在资源方面还是在运行时灵活性方面。恰当的防御性编码技术通常能最大限度地减少资源消耗，并使应用程序更加灵活，因为它允许开发者处理更多的运行时场景。


    #### 避免错误假设


    一个常见的错误假设是认为 Java ME 应用程序运行在单任务环境中。这在早期确实如此，但现在已不再适用。最明显的后果是，你可能会错误地认为手机的所有资源都归你支配。虽然这意味着你的应用程序在单独运行时会快如闪电，但也意味着当它与其他应用程序同时运行时，可能会慢如蜗牛。换句话说，你的应用程序可能显得不一致，这不是用户期望或喜欢的。


    当设备某种类型的资源（例如 RAM）耗尽时，这种情况最为危险。具体会发生什么因设备而异。例如，当我在我的旧诺基亚 E50 上同时运行太多 Java ME 应用程序，导致手机内存不足时，它会显示“内存已满”消息，并立即关闭*所有*正在运行的
    Java ME 应用程序。任何未保存的数据都会丢失。


    为了避免不必要地频繁遭遇这些问题，你可以做一件简单的事情：构建你的应用程序，使其能够在必要时减少资源消耗。例如，为你的某些关键操作计时，如果它们完成所需的时间超过了预设的时间，请考虑动态降低其复杂度（例如，减少游戏中的图形效果），或者通知用户某个操作耗时比平时长，并请求他尽可能停止其他后台应用程序。


    内存方面也是如此。例如，如果你无法分配 2 MB 的缓冲区，请尝试分配 1 MB 的缓冲区，然后再尝试 512 KB 的缓冲区，依此类推。确保你的代码能够处理任意大小的缓冲区，而不仅仅是首选大小。


    将你所做的错误假设数量保持在最低限度的最佳方法是极度悲观并进行防御性编码。始终为最坏的情况做打算，永远不要认为任何事情是理所当然的，即使是像设备有电这样显而易见的事情（电池可能在应用程序运行时耗尽）。

