    them.


    For example, you should have the application periodically measure network throughput
    and inform the user if the transfer speed falls below a minimum accepted value.
    You should also minimize the amount of bits transferred by compressing your data
    and by using a mobile-friendly encoding scheme (JSON or a binary protocol such
    as Hessian). Finally, design your server API/protocol to return only the minimum
    amount of information required as a response to your requests; more information
    can be retrieved only if needed, via subsequent requests.


    There are other tricks you can use to improve the user experience. Design your
    communication protocol so that you don''t have to wait until the entire response
    is received and you can start parsing it as data is still coming in. Minimize
    the number of requests you make by concatenating several requests into a single,
    larger one, and do the same on the server side for responses. When concatenating
    requests and/or responses, make sure the smallest ones are first, so that processing
    starts as soon as possible. Try to send the data in a format that the device can
    directly understand (for example, don''t send strings as ASCII but rather as a
    `readUTF()`-compatible byte array). Finally, try as much as possible to transfer
    data in the background and ahead of time.


    These are good tips for all mobile platforms, but for Java ME the effects are
    doubled by the fact that quite often network transfer speed on Java ME devices
    is at least partially limited by the available CPU power. All of the foregoing
    tips not only minimize the amount of data transferred, but also tend to improve
    network-related CPU usage.


    Storage space in the RMS or on the filesystem can also vary widely from device
    to device. If your application stores only user preferences and maybe a few things
    like a username and a password, this is usually not a problem. If, however, your
    application stores large amounts of data, such as a set of complete records or
    maybe documents or images received from the server, then you might run into problems.
    Do some research ahead of time regarding how each of your target devices stands
    out in this respect. For example, some devices limit your RMS record store size
    to a fixed value, while others allow you to use the full extent of available device
    storage for the RMS—this is something you need to know when working on a storage-heavy
    application.


    Another issue of concern regarding on-device storage of any kind is security.
    People usually think of the filesystem as being insecure, while the RMS is fairly
    secure. This is not necessarily the case, in that the RMS may be very easy to
    get into. For example, some devices use a file on the filesystem itself to persist
    the RMS, which makes the RMS on those devices just as insecure as a regular file—though,
    to be fair, I have personally seen this on only a few cheap, no-name devices.
    Even if this is not the case, the RMS is still persisted to a flash chip of some
    sort, so it is theoretically possible to physically remove the chip and read its
    contents.Some devices might even encrypt data you save to the RMS (either by default
    or provide this option to the user), but 99% of all Java ME devices out there
    do not. So, to be sure, you should always encrypt extremely sensitive data yourself.


    Battery life is another issue to be taken into consideration, especially for applications
    that are designed to be long-running (such as IM clients). Throttling the network
    and CPU works great to improve battery life, but there are also other tricks you
    can try. For example, the screen consumes a lot of power, so you may want to consider
    using vendor-specific APIs to dim the screen''s brightness. Just as with laptops,
    dimming the screen even slightly can result in a noticeable increase in battery
    life. Not using sound or vibrations also helps increase battery life. Optimizing
    your code also increases battery life, as the CPU needs fewer cycles to run your
    application. Proper usage of `sleep()` and `wait()`/`notify()` methods in idle
    moments also noticeably increases battery life, as it allows the CPU to enter
    a power-saving mode.


    Last but certainly not least, user input capabilities can vary widely between
    devices. For example, some devices do not register multiple, simultaneous key
    presses, so trying to move up and to the left at the same time in a video game
    will not work on them. Cheap touchscreen devices usually have poor accuracy and/or
    lack a stylus, so doing precision touch input on them is also not possible. As
    these issues greatly affect the user''s experience, you have to take them into
    consideration when you design your user interface.'
  trans: '

    #### 其他硬件考量


    还有其他与硬件相关的因素会导致设备之间存在差异。例如，由于各种原因，不同设备以及不同场景下的网络速度差异巨大。由于这完全不在你的控制范围内，你无法真正解决网络相关的问题——但你可以尝试缓解它们。


    例如，你应该让应用程序定期测量网络吞吐量，并在传输速度低于最低可接受值时通知用户。你还应通过压缩数据以及使用适合移动设备的编码方案（如 JSON 或 Hessian
    等二进制协议）来最小化传输的数据量。最后，设计你的服务器 API/协议，使其仅返回响应请求所需的最少信息；只有在需要时，才通过后续请求获取更多信息。


    还有其他技巧可以用来改善用户体验。设计你的通信协议，使其无需等待整个响应接收完毕，即可在数据仍在传入时开始解析。通过将多个请求合并为一个更大的请求来减少请求次数，并在服务器端对响应也做同样处理。在合并请求和/或响应时，确保最小的部分排在前面，以便尽快开始处理。尝试以设备能直接理解的格式发送数据（例如，不要以
    ASCII 字符串形式发送，而应使用与 `readUTF()` 兼容的字节数组）。最后，尽可能在后台并提前传输数据。


    这些对于所有移动平台都是很好的建议，但对于 Java ME 来说，效果会加倍，因为 Java ME 设备上的网络传输速度通常至少部分受限于可用的 CPU 性能。上述所有技巧不仅最小化了传输的数据量，而且往往有助于改善与网络相关的
    CPU 使用率。


    RMS 或文件系统上的存储空间在不同设备之间也可能差异很大。如果你的应用程序只存储用户偏好设置以及可能的一些东西（如用户名和密码），这通常不是问题。但是，如果你的应用程序存储大量数据，例如一组完整的记录，或者从服务器接收的文档或图像，那么你可能会遇到问题。提前研究一下你的每个目标设备在这方面的情况。例如，有些设备将你的
    RMS 记录存储大小限制为固定值，而其他设备则允许你为 RMS 使用全部可用设备存储空间——在处理存储密集型应用程序时，这是你需要了解的信息。


    关于设备上任何类型的存储，另一个值得关注的问题是安全性。人们通常认为文件系统不安全，而 RMS 相当安全。但情况未必如此，因为 RMS 可能很容易被侵入。例如，有些设备使用文件系统上的一个文件来持久化
    RMS，这使得这些设备上的 RMS 与普通文件一样不安全——不过，公平地说，我个人只在少数廉价的无名设备上见过这种情况。即使不是这样，RMS 仍然会持久化到某种闪存芯片上，因此理论上可以物理移除该芯片并读取其内容。有些设备甚至可能对你保存到
    RMS 的数据进行加密（默认情况下或向用户提供此选项），但市面上 99% 的 Java ME 设备都不具备此功能。因此，为了确保安全，你应该始终自行加密极其敏感的数据。


    电池续航是另一个需要考虑的问题，特别是对于设计为长时间运行的应用程序（例如即时通讯客户端）。限制网络和 CPU 使用对延长电池续航非常有效，但还有其他技巧可以尝试。例如，屏幕消耗大量电量，因此你可能需要考虑使用特定于厂商的
    API 来调暗屏幕亮度。就像笔记本电脑一样，即使稍微调暗屏幕，也能显著延长电池续航。不使用声音或振动也有助于延长电池续航。优化代码也能延长电池续航，因为 CPU
    运行你的应用程序所需的周期更少。在空闲时刻正确使用 `sleep()` 和 `wait()`/`notify()` 方法也能显著延长电池续航，因为这允许 CPU
    进入省电模式。


    最后但同样重要的是，不同设备的用户输入能力差异很大。例如，有些设备无法同时注册多个按键，因此在视频游戏中尝试同时向上和向左移动在这些设备上无法实现。廉价的触摸屏设备通常精度较差和/或缺少触控笔，因此也无法在其上进行精确的触摸输入。由于这些问题会极大地影响用户体验，你在设计用户界面时必须将它们考虑在内。

    '
- fmt: '### Capabilities Fragmentation


    Devices do not differ only in terms of hardware; they also differ in terms of
    capabilities. Some APIs and JSRs are quite mainstream (`JSR 75`, for PIM and filesystem
    access), while others are supported on only relatively few devices (the Location
    API). Furthermore, even if two devices support the same capabilities, they may
    not support them to the same extent.


    The best example of this is the Multimedia API, or MMAPI. Most modern phones support
    the MMAPI; however, the extent to which they support it varies widely. For example,
    two different devices having the same camera might support different maximum resolutions
    for capturing images or video. The same goes for media playback: high-end devices
    support all common media types, while lower-end ones tend to support only the
    basic types, which usually means `.wav` audio files and possibly `.3gp` videos.


    Dealing with capabilities fragmentation is a mixed affair, in that the issues
    are fairly easy to spot and the root cause is easily identified, but solutions
    usually involve some kind of compromise. To continue the foregoing MMAPI example,
    if the captured image resolution is lower than what the application needs, the
    image can be upscaled in software to match the minimum requirements, but this
    comes at a cost in terms of CPU usage and picture quality.


    Unlike hardware fragmentation issues, you can work on capabilities-related fragmentation
    issues even before starting work on the actual application. The first step is
    to make a list of all the JSRs and APIs that are required by your application
    and research which of them are supported by your target devices and to what extent.
    If you''re lucky, all your target devices support all the capabilities you require,
    so there''s nothing further to be done here.


    If you are unlucky and there are some capabilities that your target devices do
    not support, then the next step to take is to see if you can somehow emulate these
    capabilities. For example, not all devices support the location API (in fact,
    most Java ME devices don''t). However, it is possible to ask the user what his
    current location is and work with that data just as if it were coming from the
    location API itself. If the MMAPI is not supported but `JSR 75` is, which allows
    filesystem access, then instead of snapping a picture from within the application,
    the user could select a picture file that is present on the filesystem. If the
    Bluetooth API is not supported, then consider using the network for getting your
    data across: you upload your files to the server, and the other party can retrieve
    it from there, even if he''s just three feet away.


    While not particularly elegant, these workarounds are preferable to not being
    able to use the application. Furthermore, on devices on which the required capabilities
    are supported, they can even be considered extra features because they give the
    user more choice over what data to give to the application (e.g., even if you''re
    in Kansas, you may want to have your application think you''re in Boston).


    Another common scenario involves adding support for floating-point math on CLDC
    1.0 devices, or support for missing media types, such as SVG for vector graphics.
    These are fairly common problems, and the work has almost certainly been done
    before in the form of third-party libraries, so a quick Internet search should
    help you immensely.


    It should be noted that some capabilities can''t be emulated at all, such as the
    PIM part of `JSR 75`, while others can be emulated but not to a reasonable extent,
    such as the 3D API (you could implement it in software, but the performance would
    be abysmal). In these cases, you can either declare the problematic devices as
    unsupported, drop the capabilities altogether, or work around them (e.g., your
    calendar application can still work without PIM capabilities—you just won''t be
    able to sync the app''s calendar with the device''s native calendar). Obviously,
    if the presence of a certain capability is deemed mission critical and that capability
    is not available natively on a certain device and cannot be emulated, then there''s
    nothing else you can do but declare that device unsupported.


    At this point, I would like to make a little detour and point out that when emulating
    or working around missing capabilities, you will usually end up requiring separate
    builds. There are tools to help you with this (which will be discussed soon),
    but the fact still remains that you will have to take care of and support multiple
    builds, and you will have to instruct the user to download the correct one for
    his or her device.


    **NOTE:** A commonly used technique is to configure your server to detect the
    phone''s browser user agent and automatically deliver a build based on this. However,
    this technique does not work if a non-native browser is used (e.g., Opera Mini).
    Furthermore, the browser agent field may be spoofed and/or hidden by the browser.


    The problem becomes even more complicated when a certain capability is supported
    in the latest firmware version but not on older firmware versions, or when capabilities
    are installed via add-ons (for example, sensor support for Symbian v5 devices
    can be added via a downloadable and completely optional package). While instructing
    the user to download the version for his or her specific device is common practice
    and fairly straightforward, instructing the user to download the appropriate version
    for a specific firmware is highly technical, and not many users will be able to
    do this.


    Fortunately, in most cases, both problems can be at least partially solved via
    a simple yet effective trick. Instead of providing multiple public builds of your
    application, you provide what can be called a front-end installer application.
    Once on the device, this installer application can try to determine what device
    and firmware version it is running on, by checking environmental properties such
    as the `microedition.platform` system property, or by checking if specific JSR/API–related
    classes are present, via `getClass().forName()`. Based on this information, the
    correct application build is identified and the user is informed of this. He can
    then choose to visit the appropriate web page or directly download and install
    the correct build.


    A front-end installer avoids the situation in which users have to deal with multiple
    builds, which in turn decreases the chances of users installing the wrong build
    and increases customer satisfaction. It also lowers the amount of support questions
    that you receive and improves your company''s image by providing a friendly, user-centric,
    and easy-to-use product.


    Going back on track, the final step in dealing with capabilities-related fragmentation
    is to make sure that all devices supporting a certain capability, either natively
    or through workaround/emulation, meet the minimum requirements for said capability.
    For example, in the case of a city guide application, the minimum requirements
    in terms of the Location API would be that the application knows the user''s current
    city.


    In the best-case scenario, you do not have to do anything special for this, as
    the minimum requirements are met by default. This is the case in the foregoing
    example, since even if the device does not have native GPS capabilities, the user
    can still manually specify his or her current city.'
