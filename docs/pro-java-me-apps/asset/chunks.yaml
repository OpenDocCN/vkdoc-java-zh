  trans: '

    **注意：** 全局性问题甚至可能与单一方法有关，例如前面提到的 `deallocate()` 案例。但如果问题的影响是全局性的，并影响到应用程序的其他部分，或者解决方案并非纯粹的局部方案，那么你确实面临着一个全局性问题。


    这些不一致性虽然范围全局且通常易于发现，但处理起来却有些棘手，因为其根本原因并不容易定位。问题源于 JSR 或可选 API 通常非常深奥且服务于非常特定的目的，因此你需要相当丰富的经验才能对它们应有的工作方式有所感觉：沿用前面的例子，虽然很容易判断
    `pauseApp()` 方法未被调用，并通过使用 `showNotify()`/`hideNotify()` 来规避此问题，但要准确找出 `deallocate()`
    为何毫无作用以及如何使其正常工作，则要困难得多。


    基本上，在这种情况下你需要的是信息，而且比处理局部性或一般平台不一致性所需的信息要多得多，也要具体得多。因此，解决可选 API 不一致性的第一步是彻底阅读标准文档*以及*与所涉
    API 相关的供应商特定文档。有时，仅仅通读供应商特定文档就能提供有用的线索，无论是边界情况及其在供应商实现中的处理方式、已知缺陷，还是突出显示供应商实现实际工作方式的使用示例或注释。互联网在这里也特别有用，因为你很可能会找到与你正在处理的具体问题相关的论坛帖子或博客文章——这些问题通常在任何书籍或你能找到的其他“官方”阅读材料中都没有涉及。


    你也可以像处理碎片化问题一样处理这些问题，以收集更多信息（本章前面已介绍过）；观察其他设备的行为，尝试找出你的目标设备为何表现不同，运行测试，并模拟各种其他场景。这通常是一个被忽视的步骤，主要是因为可选
    API 的不一致性范围非常狭窄，而开发者往往也在同样狭窄的范围内审视它们。


    一旦你掌握了足够的信息，就该解决问题了。理想情况下，如果你面对的是一个已知缺陷，那么也存在已知的解决方法。解决方法不一定总是代码层面的。例如，你可能需要重新编码你的媒体文件，要求用户升级到特定的固件版本或安装官方补丁，或者以某种方式配置他们的设备。


    也可能存在这样的情况：由于某种原因，没有适用于你场景的已知解决方法，这时你就必须自己想出解决方法。根据我的经验，对于可选 API，你真的需要发挥创造力，这就是为什么拥有尽可能多的信息至关重要。API
    没有释放内存？好的，尝试从应用程序的另一部分释放更多可用内存。接收某些事件通知时遇到问题？没问题——手动定期检查变化。


    一旦你有了解决方法，就该将其集成到你的应用程序中了。这通常需要在你的应用程序中添加一个额外的代码层，位于 API 和你的应用程序代码之间，或者需要进行架构上的更改。


    也有可能根本没有任何可用的解决方法，在这种情况下，你必须像对待无法实现/不可用的功能一样对待这种情况。如果你面对的只是一个功能完全正常的 API 实现中的“小缺陷”，心理上很难接受，但我见过许多人花费大量工时试图克服这种“小缺陷”——这些时间本可以更有效地利用。这并不是说你在看到
    API 不一致性时就应该立刻放弃，但如果你已经做了研究，尝试了所有方法，并且想不出办法了，那么就该继续前进了。在更成熟的平台上，深入挖掘并投入更多时间可能是值得的，因为你有更多的可能性去探索，也有更多的资源可以利用，但
    Java ME 是一个紧凑的平台，当事情不按你的预期发展时，你能做的也就这么多了。

    '
- fmt: "#### Inconsistencies Open for Interpretation\n\nWhen the standard does not\
    \ specify *exactly* how to do something, the implementations are free to make\
    \ their own assumptions and decisions—which can lead to problems if not all vendors\
    \ make the same assumptions and decisions.\n\nThe most eloquent example for this\
    \ is keycodes. As you know, in Java ME each recognized key has a specific keycode.\
    \ While it is possible to convert a given keycode to a standardized `GameCanvas`\
    \ action (`FIRE`, `UP`, `LEFT`, `GAME_A`, `GAME_B`, etc.) on all implementations,\
    \ the keycodes themselves are not the same among implementations, nor are they\
    \ set in stone by the specification itself. Furthermore, some implementations\
    \ have more keys than others and as such can generate more keycodes than others.\n\
    \nIn fact, if you look over the platform specification or the specification of\
    \ optional APIs, you will see many cases in which implementations are left to\
    \ their own devices (no pun intended). A great example of this is once again the\
    \ MMAPI. To quote from Sun's documentation:\n\n> *The choice of functionality\
    \ is left to the implementation as well. It may support media playback but not\
    \ recording, some devices may support volume control while others may not, and\
    \ so on.*\n> \n> - developers.sun.com, Oracle corporation, Qusay H. Mahmoud,\n\
    > “The J2ME Mobile Media API\n> ”, [`http://developers.sun.com/mobility/midp/articles/mmapioverview/`](http://developers.sun.com/mobility/midp/articles/mmapioverview/)\n\
    > June 2003\n\nWhen this happens, you get problems ranging from minor ones, like\
    \ inverted controls (for example, Sagem keycodes for left and right softkeys are\
    \ exactly the same as on Sony Ericsson, except reversed), to what can be considered\
    \ critical issues, like capabilities fragmentation (see the foregoing MMAPI example).\
    \ From my experience, however, you will rarely hit critical issues, and those\
    \ that you will hit tend to fall into the category of capabilities fragmentation\
    \ issues, which have already been discussed. Most of the time, you'll hit only\
    \ minor problems like the inverted key situation just described.\n\nFortunately,\
    \ dealing with this sort of problem requires only two things. First, you have\
    \ to be aware that the problem can happen. This means having general knowledge\
    \ of the API and of the specifications, and knowing from the start what is considered\
    \ “optional,” what is “left to the implementation,” and what is set in stone.\
    \ Anything that is not clearly set in stone should be considered volatile by default\
    \ and should be researched before use. As long as it's not set in stone, the fact\
    \ that 90% of devices out there (or even 90% of devices from the same vendor)\
    \ do a certain thing in the same way doesn't mean that you can assume that's the\
    \ right way and hard-code that in your application.\n\nThe second thing that you\
    \ will need is the actual implementation-specific values. In this respect, it's\
    \ quite helpful that sometimes when the specifications don't set something in\
    \ stone, they do, however, provide a way to find out what the actual implementation\
    \ will behave like. For example, the media types and capabilities of the MMAPI\
    \ are extremely volatile and highly implementation-specific, but the specifications\
    \ do provide methods like `Manager.getSupportedContentTypes()`, which can help\
    \ determine what media types are supported, even dynamically at runtime. This\
    \ is not always the case, however, and some things you have to determine via experimentation\
    \ (like keycodes for non-standard keys).\n\nOnce you have all the information\
    \ you need, it's time to get that information into your application. You can,\
    \ of course, have custom builds for each device, but a far more efficient way\
    \ is to deal with these issues at runtime, by trying to determine the device vendor\
    \ and family your code is running on, and using the appropriate values and/or\
    \ code paths for “open to interpretation” aspects.\n\nYou can do this yourself,\
    \ or you could use a third-party porting framework to do this for you. Third-party\
    \ porting frameworks are a valuable tool for Java ME developers, so it's worth\
    \ giving them a closer look.\n\n### Porting Frameworks\n\nAs we have seen so far\
    \ in the chapter, while developing for Java ME, you will face a lot of fragmentation\
    \ issues, particularly at the software level. Dealing with them manually is both\
    \ time-consuming and error-prone, which is why porting frameworks exist.\n\nA\
    \ porting framework's job is mainly to help you manage fragmentation. It is a\
    \ common misconception that a porting framework should hide fragmentation, and\
    \ while some do indeed do this, *managing* fragmentation is a far better option.\n\
    \nThe difference is subtle but important. In the case of hiding fragmentation,\
    \ the framework takes control away from you and basically says, “Here, use this\
    \ unified API for doing stuff—anything else is off-limits.” You don't really have\
    \ the ability to customize how the framework does stuff; you just have the ability\
    \ to use the API that it provides and hope that it does what you need it to do.\n\
    \nA framework that manages fragmentation is different. It is built around the\
    \ concept of giving you choice and freedom. While it does provide a default and\
    \ standardized API, it also allows you to hook into it and use vendor- or device-specific\
    \ code where you need to within your application.\n\nChoosing a porting framework\
    \ is a very important choice when doing multi-device or multi-platform development,\
    \ and it will most certainly drastically influence the development process. There\
    \ are, of course, business factors involved, such as price, but technical reasons\
    \ should take precedence over business reasons in this respect.\n\nYou should\
    \ also be aware that there are no perfect porting frameworks out there; each has\
    \ its strengths and weaknesses. What you need to do is weigh each framework's\
    \ technical strengths and weaknesses, and pick the one that best suits your overall\
    \ goals. That being said, let's look at some of the technical aspects of porting\
    \ frameworks, which you can use to evaluate and compare them."
  raw: "#### Inconsistencies Open for Interpretation\n\nWhen the standard does not\
    \ specify *exactly* how to do something, the implementations are free to make\
    \ their own assumptions and decisions—which can lead to problems if not all vendors\
    \ make the same assumptions and decisions.\n\nThe most eloquent example for this\
    \ is keycodes. As you know, in Java ME each recognized key has a specific keycode.\
    \ While it is possible to convert a given keycode to a standardized `GameCanvas`\
    \ action (`FIRE`, `UP`, `LEFT`, `GAME_A`, `GAME_B`, etc.) on all implementations,\
    \ the keycodes themselves are not the same among implementations, nor are they\
    \ set in stone by the specification itself. Furthermore, some implementations\
    \ have more keys than others and as such can generate more keycodes than others.\n\
    \nIn fact, if you look over the platform specification or the specification of\
    \ optional APIs, you will see many cases in which implementations are left to\
    \ their own devices (no pun intended). A great example of this is once again the\
    \ MMAPI. To quote from Sun's documentation:\n\n> *The choice of functionality\
    \ is left to the implementation as well. It may support media playback but not\
    \ recording, some devices may support volume control while others may not, and\
    \ so on.*\n> \n> - developers.sun.com, Oracle corporation, Qusay H. Mahmoud,\n\
    > “The J2ME Mobile Media API\n> ”, [`http://developers.sun.com/mobility/midp/articles/mmapioverview/`](http://developers.sun.com/mobility/midp/articles/mmapioverview/)\n\
    > June 2003\n\nWhen this happens, you get problems ranging from minor ones, like\
    \ inverted controls (for example, Sagem keycodes for left and right softkeys are\
    \ exactly the same as on Sony Ericsson, except reversed), to what can be considered\
    \ critical issues, like capabilities fragmentation (see the foregoing MMAPI example).\
    \ From my experience, however, you will rarely hit critical issues, and those\
    \ that you will hit tend to fall into the category of capabilities fragmentation\
    \ issues, which have already been discussed. Most of the time, you'll hit only\
    \ minor problems like the inverted key situation just described.\n\nFortunately,\
    \ dealing with this sort of problem requires only two things. First, you have\
    \ to be aware that the problem can happen. This means having general knowledge\
    \ of the API and of the specifications, and knowing from the start what is considered\
    \ “optional,” what is “left to the implementation,” and what is set in stone.\
    \ Anything that is not clearly set in stone should be considered volatile by default\
    \ and should be researched before use. As long as it's not set in stone, the fact\
    \ that 90% of devices out there (or even 90% of devices from the same vendor)\
    \ do a certain thing in the same way doesn't mean that you can assume that's the\
    \ right way and hard-code that in your application.\n\nThe second thing that you\
    \ will need is the actual implementation-specific values. In this respect, it's\
    \ quite helpful that sometimes when the specifications don't set something in\
    \ stone, they do, however, provide a way to find out what the actual implementation\
    \ will behave like. For example, the media types and capabilities of the MMAPI\
    \ are extremely volatile and highly implementation-specific, but the specifications\
    \ do provide methods like `Manager.getSupportedContentTypes()`, which can help\
    \ determine what media types are supported, even dynamically at runtime. This\
    \ is not always the case, however, and some things you have to determine via experimentation\
    \ (like keycodes for non-standard keys).\n\nOnce you have all the information\
    \ you need, it's time to get that information into your application. You can,\
    \ of course, have custom builds for each device, but a far more efficient way\
    \ is to deal with these issues at runtime, by trying to determine the device vendor\
    \ and family your code is running on, and using the appropriate values and/or\
    \ code paths for “open to interpretation” aspects.\n\nYou can do this yourself,\
    \ or you could use a third-party porting framework to do this for you. Third-party\
    \ porting frameworks are a valuable tool for Java ME developers, so it's worth\
    \ giving them a closer look.\n\n### Porting Frameworks\n\nAs we have seen so far\
    \ in the chapter, while developing for Java ME, you will face a lot of fragmentation\
    \ issues, particularly at the software level. Dealing with them manually is both\
    \ time-consuming and error-prone, which is why porting frameworks exist.\n\nA\
    \ porting framework's job is mainly to help you manage fragmentation. It is a\
    \ common misconception that a porting framework should hide fragmentation, and\
    \ while some do indeed do this, *managing* fragmentation is a far better option.\n\
    \nThe difference is subtle but important. In the case of hiding fragmentation,\
    \ the framework takes control away from you and basically says, “Here, use this\
    \ unified API for doing stuff—anything else is off-limits.” You don't really have\
    \ the ability to customize how the framework does stuff; you just have the ability\
    \ to use the API that it provides and hope that it does what you need it to do.\n\
    \nA framework that manages fragmentation is different. It is built around the\
    \ concept of giving you choice and freedom. While it does provide a default and\
    \ standardized API, it also allows you to hook into it and use vendor- or device-specific\
    \ code where you need to within your application.\n\nChoosing a porting framework\
    \ is a very important choice when doing multi-device or multi-platform development,\
    \ and it will most certainly drastically influence the development process. There\
    \ are, of course, business factors involved, such as price, but technical reasons\
    \ should take precedence over business reasons in this respect.\n\nYou should\
    \ also be aware that there are no perfect porting frameworks out there; each has\
    \ its strengths and weaknesses. What you need to do is weigh each framework's\
    \ technical strengths and weaknesses, and pick the one that best suits your overall\
    \ goals. That being said, let's look at some of the technical aspects of porting\
    \ frameworks, which you can use to evaluate and compare them."
  trans: "\n#### 未明确规定的歧义之处\n\n当规范未*精确*说明如何执行某项操作时，各实现可自由做出自己的假设和决策——如果所有厂商未做出相同的假设和决策，就可能导致问题。\n\
    \n最典型的例子是按键码。如你所知，在 Java ME 中，每个被识别的按键都有特定的按键码。虽然在所有实现上都可以将给定的按键码转换为标准化的 `GameCanvas`\
    \ 动作（`FIRE`、`UP`、`LEFT`、`GAME_A`、`GAME_B` 等），但按键码本身在不同实现间并不相同，规范本身也未将其固定。此外，某些实现比其他实现拥有更多按键，因此能生成更多按键码。\n\
    \n事实上，如果你查阅平台规范或可选 API 的规范，会发现许多情况下实现都是自行其是（并非双关语）。MMAPI 再次提供了一个绝佳的例子。引用 Sun 文档中的话：\n\
    \n> *功能的选择也留给实现自行决定。它可能支持媒体播放但不支持录制，某些设备可能支持音量控制而其他设备则不支持，等等。*\n> \n> - developers.sun.com，Oracle\
    \ 公司，Qusay H. Mahmoud，\n> “J2ME 移动媒体 API\n> ”，[`http://developers.sun.com/mobility/midp/articles/mmapioverview/`](http://developers.sun.com/mobility/midp/articles/mmapioverview/)\n\
    > 2003 年 6 月\n\n当这种情况发生时，你会遇到从轻微问题（如控制反转，例如 Sagem 左右软键的按键码与索尼爱立信完全相同，只是顺序相反）到可被视为严重问题（如能力碎片化，参见前述\
    \ MMAPI 示例）的各种问题。不过，根据我的经验，你很少会遇到严重问题，而遇到的那些问题往往属于已讨论过的能力碎片化问题。大多数时候，你只会遇到像刚才描述的控制反转这样的轻微问题。\n\
    \n幸运的是，处理这类问题只需要两件事。首先，你必须意识到问题可能发生。这意味着要了解 API 和规范的一般知识，并从一开始就知道哪些是“可选的”，哪些是“留给实现自行决定的”，以及哪些是固定不变的。任何未明确固定的内容默认都应被视为不稳定的，并在使用前进行研究。只要不是固定不变的，即使\
    \ 90% 的设备（甚至同一厂商 90% 的设备）都以相同方式执行某项操作，也不意味着你可以假设那就是正确的方式并将其硬编码到应用程序中。\n\n你需要的第二件事是实际的实现特定值。在这方面，有时当规范未固定某些内容时，它们确实提供了一种方法来了解实际实现的行为方式，这非常有帮助。例如，MMAPI\
    \ 的媒体类型和能力极其不稳定且高度依赖实现，但规范确实提供了诸如 `Manager.getSupportedContentTypes()` 之类的方法，这些方法可以帮助确定支持的媒体类型，甚至可以在运行时动态确定。然而，情况并非总是如此，有些内容你必须通过实验来确定（例如非标准按键的按键码）。\n\
    \n一旦你掌握了所有需要的信息，就该将这些信息整合到你的应用程序中了。当然，你可以为每个设备进行定制构建，但更高效的方式是在运行时处理这些问题，通过尝试确定你的代码运行在哪个设备厂商和系列上，并为“可自由解释”的方面使用适当的值和/或代码路径。\n\
    \n你可以自己实现这一点，也可以使用第三方移植框架来为你完成。第三方移植框架对 Java ME 开发者来说是一个有价值的工具，因此值得仔细研究。\n\n###\
    \ 移植框架\n\n正如我们在本章中已经看到的，在为 Java ME 开发时，你会面临许多碎片化问题，尤其是在软件层面。手动处理这些问题既耗时又容易出错，这就是移植框架存在的原因。\n\
    \n移植框架的主要工作是帮助你管理碎片化。一个常见的误解是移植框架应该隐藏碎片化，虽然有些框架确实做到了这一点，但*管理*碎片化是更好的选择。\n\n两者之间的区别微妙但重要。在隐藏碎片化的情况下，框架从你手中夺走控制权，基本上是在说：“来，用这个统一的\
    \ API 做事——其他任何东西都不允许。”你实际上无法自定义框架的工作方式；你只能使用它提供的 API，并希望它能满足你的需求。\n\n管理碎片化的框架则不同。它围绕给予你选择和自由的概念构建。虽然它确实提供了默认且标准化的\
    \ API，但它也允许你接入其中，并在应用程序中需要的地方使用厂商或设备特定的代码。\n\n在进行多设备或多平台开发时，选择移植框架是一个非常重要的决定，它无疑会极大地影响开发过程。当然，其中涉及商业因素，如价格，但在这方面，技术原因应优先于商业原因。\n\
    \n你还应该意识到，没有完美的移植框架；每个框架都有其优点和缺点。你需要做的是权衡每个框架的技术优缺点，并选择最适合你整体目标的框架。话虽如此，让我们来看看移植框架的一些技术方面，你可以用它们来评估和比较。\n"
- fmt: "### The Preprocessor\n\nIn the desktop and server world, a preprocessor for\
    \ Java is probably one of the worst ideas ever. It isn't even needed, as the platform\
    \ is powerful enough to be able to do at runtime anything that the preprocessor\
    \ would do at compile time.\n\nIn the Java ME world, things are quite different.\
    \ Things like extremely limited reflection capabilities, restrictions on code\
    \ size, capabilities and platform fragmentation, low amounts of available resources,\
    \ and device quirks mean that most of the time the code has to be device-specific\
    \ at compile time and that adapting it at runtime isn't an option.\n\nAs such,\
    \ good porting frameworks always have a good and powerful preprocessor included.\
    \ The main purpose of the preprocessor is to exclude some blocks of code (or entire\
    \ files) from the build while including others. Its use is extremely similar to\
    \ regular C/C++–style preprocessors, as can be seen in [Listing 9–2](#Chapter09.html#list_9_2).\n\
    \n**Listing 9–2.** *A Possible JavaME Preprocessor Code Example*\n\n```\n//#if\
    \ ${device.vendor} == nokia\n        import com.nokia.mid.ui.DeviceControl;\n\
    //#elseif ${device.vendor} == samsung\n        import com.samsung.util.LCDLight;\n\
    //#endif\n\npublic class LCDUtils\n{\n....\n        public static void keepBacklightOn()\n\
    \        {\n//#if ${device.vendor} == nokia\n                        DeviceControl.setLights(0,100);\n\
    \                //#elseif ${device.vendor} == samsung\n                     \
    \   LCDLight.on();\n                //#endif\n        }\n...\n}\n```\n\nWhen passed\
    \ through the preprocessor, this file would generate either a Nokia-compatible\
    \ or a Samsung-compatible file, depending on the target device vendor. This means\
    \ that you do not have to keep separate versions of your files for each separate\
    \ vendor: you can consolidate them into a single file and have the preprocessor\
    \ do the separation automatically. This makes the code clearer and the project\
    \ as a whole easier to manage, thus saving an unbelievable amount of time, effort,\
    \ and money.\n\n**TIP:** You can also use the preprocessor for more unconventional\
    \ stuff, like compile-time internationalization, macros, or even stuff like multiple\
    \ inheritance (which Java does not support by default). However, these are all\
    \ considered hack usages even by Java ME standards and should generally be avoided.\n\
    \nAll preprocessors are more or less equal in terms of including and excluding\
    \ blocks of code, so what really differentiates them is the way in which they\
    \ integrate with the rest of the framework and with external tools. For example,\
    \ in the case of your preprocessor, can preprocessor directives influence the\
    \ build engine (see ahead)? Can you use the preprocessor to add metadata to your\
    \ code—for example, look and feel directives for the UI library (again, see ahead)?\
    \ Can you use the preprocessor to run third-party tools over blocks of code or\
    \ entire files?\n\nThese aspects are secondary to the preprocessor's main purpose,\
    \ but they do come in handy quite often, and once you get used to them, you can't\
    \ really go back.\n\n### The Device Database\n\nA comprehensive device database\
    \ is critical to any porting framework. Things like keycode values, screen resolution\
    \ and size, multimedia capabilities, and supported APIs should be considered standard.\
    \ The more comprehensive the database, the more information the framework has\
    \ to work with and thus the higher quality the port is.\n\nIn addition, the framework\
    \ should allow you to access all this information via the preprocessor and also\
    \ at runtime (for example, via a dynamically generated static class). This allows\
    \ you to automatically tailor your application code to match the device you're\
    \ running on, something like the example in [Listing 9–3](#Chapter09.html#list_9_3).\n\
    \n**Listing 9–3.** *Runtime Device-Specific Code*\n\n```\npublic void doMultipleFileUpload(File\
    \ [] files, int maxSimultaneousConnections)\n{\n        ...\n}\n\n....\n\ndoMultipleFileUpload(\
    \ someFileArray, DeviceInfo.getMaxNetworkConnections() )\n```\n\nThe code in [Listing\
    \ 9–3](#Chapter09.html#list_9_3) could be part of a file upload application. The\
    \ `DeviceInfo` class, generated dynamically by the framework based on the device\
    \ database, contains information pertaining to the current target device. One\
    \ piece of information is the maximum number of simultaneous network connections\
    \ that the device supports. The application code can then use this information\
    \ at runtime to make sure it makes the most of the device's capabilities without\
    \ running into problems (like opening more connections than the device supports).\n\
    \nThe device database is also extremely useful in the project's planning phase,\
    \ as it can be used to determine what devices you can target, and what features\
    \ said devices will support and to what extent. Oftentimes having a quality device\
    \ database is worth its weight in gold, as the time it saves in research hours\
    \ can add up to something substantial.\n\n### The Build Engine\n\nA Java ME application\
    \ is made up of many different files, some of them code, some of them media resources,\
    \ and some of them configuration files or miscellanea. These files then have to\
    \ be bundled together in a JAR file. The responsibility of the build engine is\
    \ to take the files that are needed for a specific target device, and only those\
    \ files, and create the end result JAR file.\n\nThis task can prove to be more\
    \ difficult than it sounds. Consider, for example, that a project might target\
    \ devices with different screen resolutions, and that each screen resolution has\
    \ a specific set of media files (for icons, for fonts, etc.). The build engine\
    \ must include the appropriate files based on the device's specifications. The\
    \ same applies for localization files, code files, configuration files, and everything\
    \ else that goes into a JAR.\n\nFurthermore, some builds will require signing\
    \ or other “special touches” to be applied (to the JAD file, for example), and\
    \ it is the build engine's job to handle these as well.\n\nA good build engine\
    \ can work with a comprehensive folder structure in which developers can put their\
    \ files (for example, the `/Screen.240x320` folder would contain resources for\
    \ the 240×320 resolution, the `/Vendor.Nokia` folder would contain files that\
    \ are needed only for Nokia builds, the `/Certificates` folder would contain all\
    \ the necessary certificates, etc.) and also supports defining consolidation rules\
    \ (for example, in the case of overlapping resources, developers should be able\
    \ to specify if the `/Vendor` or the `/Screen` resources take precedence).\n\n\
    A good build engine should also be able to look over the code and substitute some\
    \ variable names or class names for others before passing the files over to the\
    \ compiler, if instructed to do so. For example, it should be able to parse a\
    \ generic statement like `import javax.microedition.lcdui.Canvas` and substitute\
    \ it with `import framework.wrapper.nokia.lcdui.Canvas` or with `import framework.wrapper.samsung.lcdui.Canvas`\
    \ based on the targeted vendor. This is extremely useful when writing wrappers,\
    \ but has other uses as well, like easily creating full/demo versions of applications\
    \ by having two different classes, one with a nag screen and the other without.\n\
    \nFinally, a good build engine should be easy to integrate with a standard Java\
    \ ME build tool, typically Ant."
  raw: '#### The Preprocessor


    In the desktop and server world, a preprocessor for Java is probably one of the
    worst ideas ever. It isn''t even needed, as the platform is powerful enough to
    be able to do at runtime anything that the preprocessor would do at compile time.


    In the Java ME world, things are quite different. Things like extremely limited
    reflection capabilities, restrictions on code size, capabilities and platform
    fragmentation, low amounts of available resources, and device quirks mean that
    most of the time the code has to be device-specific at compile time and that adapting
    it at runtime isn''t an option.


    As such, good porting frameworks always have a good and powerful preprocessor
    included. The main purpose of the preprocessor is to exclude some blocks of code
    (or entire files) from the build while including others. Its use is extremely
    similar to regular C/C++–style preprocessors, as can be seen in [Listing 9–2](#Chapter09.html#list_9_2).


    **Listing 9–2.** *A Possible JavaME Preprocessor Code Example*


    **`//#if ${device.vendor} == nokia`**

    **`        import com.nokia.mid.ui.DeviceControl;`**

    **`//#elseif ${device.vendor} == samsung`**

    **`        import com.samsung.util.LCDLight;`**

    **`//#endif`**


    `public class LCDUtils`

    `{`

    `....`

    `        public static void keepBacklightOn()`

    `        {`

    **`//#if ${device.vendor} == nokia`**

    **`                        DeviceControl.setLights(0,100);`**

    **`                //#elseif ${device.vendor} == samsung`**

    **`                        LCDLight.on();`**

    **`                //#endif`**

    `        }`

    `...`

    `}`


    When passed through the preprocessor, this file would generate either a Nokia-compatible
    or a Samsung-compatible file, depending on the target device vendor. This means
    that you do not have to keep separate versions of your files for each separate
    vendor: you can consolidate them into a single file and have the preprocessor
    do the separation automatically. This makes the code clearer and the project as
    a whole easier to manage, thus saving an unbelievable amount of time, effort,
    and money.


    **TIP:** You can also use the preprocessor for more unconventional stuff, like
    compile-time internationalization, macros, or even stuff like multiple inheritance
    (which Java does not support by default). However, these are all considered hack
    usages even by Java ME standards and should generally be avoided.


    All preprocessors are more or less equal in terms of including and excluding blocks
    of code, so what really differentiates them is the way in which they integrate
    with the rest of the framework and with external tools. For example, in the case
    of your preprocessor, can preprocessor directives influence the build engine (see
    ahead)? Can you use the preprocessor to add metadata to your code—for example,
    look and feel directives for the UI library (again, see ahead)? Can you use the
    preprocessor to run third-party tools over blocks of code or entire files?


    These aspects are secondary to the preprocessor''s main purpose, but they do come
    in handy quite often, and once you get used to them, you can''t really go back.


    #### The Device Database


    A comprehensive device database is critical to any porting framework. Things like
    keycode values, screen resolution and size, multimedia capabilities, and supported
    APIs should be considered standard. The more comprehensive the database, the more
    information the framework has to work with and thus the higher quality the port
    is.


    In addition, the framework should allow you to access all this information via
    the preprocessor and also at runtime (for example, via a dynamically generated
    static class). This allows you to automatically tailor your application code to
    match the device you''re running on, something like the example in [Listing 9–3](#Chapter09.html#list_9_3).


    **Listing 9–3.** *Runtime Device-Specific Code*


    `public void doMultipleFileUpload(File [] files, int maxSimultaneousConnections)`

    `{`

    `        ...`

    `}`


    `....`


    `doMultipleFileUpload( someFileArray, DeviceInfo.getMaxNetworkConnections() )`


    The code in [Listing 9–3](#Chapter09.html#list_9_3) could be part of a file upload
    application. The `DeviceInfo` class, generated dynamically by the framework based
    on the device database, contains information pertaining to the current target
    device. One piece of information is the maximum number of simultaneous network
    connections that the device supports. The application code can then use this information
    at runtime to make sure it makes the most of the device''s capabilities without
    running into problems (like opening more connections than the device supports).


    The device database is also extremely useful in the project''s planning phase,
    as it can be used to determine what devices you can target, and what features
    said devices will support and to what extent. Oftentimes having a quality device
    database is worth its weight in gold, as the time it saves in research hours can
    add up to something substantial.


    #### The Build Engine


    A Java ME application is made up of many different files, some of them code, some
    of them media resources, and some of them configuration files or miscellanea.
    These files then have to be bundled together in a JAR file. The responsibility
    of the build engine is to take the files that are needed for a specific target
    device, and only those files, and create the end result JAR file.


    This task can prove to be more difficult than it sounds. Consider, for example,
    that a project might target devices with different screen resolutions, and that
    each screen resolution has a specific set of media files (for icons, for fonts,
    etc.). The build engine must include the appropriate files based on the device''s
    specifications. The same applies for localization files, code files, configuration
    files, and everything else that goes into a JAR.


    Furthermore, some builds will require signing or other “special touches” to be
    applied (to the JAD file, for example), and it is the build engine''s job to handle
    these as well.


    A good build engine can work with a comprehensive folder structure in which developers
    can put their files (for example, the `/Screen.240x320` folder would contain resources
    for the 240×320 resolution, the `/Vendor.Nokia` folder would contain files that
    are needed only for Nokia builds, the `/Certificates` folder would contain all
    the necessary certificates, etc.) and also supports defining consolidation rules
    (for example, in the case of overlapping resources, developers should be able
    to specify if the `/Vendor` or the `/Screen` resources take precedence).


    A good build engine should also be able to look over the code and substitute some
    variable names or class names for others before passing the files over to the
    compiler, if instructed to do so. For example, it should be able to parse a generic
    statement like `import javax.microedition.lcdui.Canvas` and substitute it with
    import `framework.wrapper.nokia.lcdui.Canvas` or with import `framework.wrapper.samsung.lcdui.Canvas`
    based on the targeted vendor. This is extremely useful when writing wrappers,
    but has other uses as well, like easily creating full/demo versions of applications
    by having two different classes, one with a nag screen and the other without.


    Finally, a good build engine should be easy to integrate with a standard Java
    ME build tool, typically Ant.'
  trans: '

    #### 预处理器


    在桌面和服务器领域，为 Java 添加预处理器可能是有史以来最糟糕的想法之一。它甚至毫无必要，因为该平台已经足够强大，能够在运行时完成预处理器在编译时所做的任何事情。


    而在 Java ME 领域，情况则截然不同。诸如极其有限的反射能力、代码大小与功能的限制、平台碎片化、可用资源稀少以及设备特性差异等问题，意味着大多数情况下代码必须在编译时就针对特定设备，而无法在运行时进行适配。


    因此，优秀的移植框架总是包含一个功能强大且完善的预处理器。预处理器的核心目的是在构建过程中排除某些代码块（或整个文件），同时包含其他代码块。它的用法与常规的
    C/C++ 风格预处理器极为相似，如代码清单 9-2 所示。


    **代码清单 9-2.** *一个可能的 Java ME 预处理器代码示例*


    **`//#if ${device.vendor} == nokia`**

    **`        import com.nokia.mid.ui.DeviceControl;`**

    **`//#elseif ${device.vendor} == samsung`**

    **`        import com.samsung.util.LCDLight;`**

    **`//#endif`**


    `public class LCDUtils`

    `{`

    `....`

    `        public static void keepBacklightOn()`

    `        {`

    **`//#if ${device.vendor} == nokia`**

    **`                        DeviceControl.setLights(0,100);`**

    **`                //#elseif ${device.vendor} == samsung`**

    **`                        LCDLight.on();`**

    **`                //#endif`**

    `        }`

    `...`

    `}`


    当该文件经过预处理器处理后，会根据目标设备厂商生成一个兼容诺基亚或兼容三星的文件。这意味着你无需为每个厂商分别维护不同版本的文件：你可以将它们整合到一个文件中，让预处理器自动完成分离工作。这使代码更清晰，整个项目也更容易管理，从而节省大量的时间、精力和金钱。


    **提示：** 你也可以将预处理器用于一些非常规用途，例如编译时国际化、宏定义，甚至实现多重继承（Java 默认不支持）。然而，即使按照 Java ME 的标准，这些也被视为黑客式用法，通常应避免使用。


    所有预处理器在包含和排除代码块方面的功能都大同小异，因此真正区分它们的是与框架其他部分以及外部工具的集成方式。例如，对于你的预处理器来说，预处理指令能否影响构建引擎（见下文）？能否使用预处理器为代码添加元数据——例如，为
    UI 库添加外观指令（同样见下文）？能否使用预处理器对代码块或整个文件运行第三方工具？


    这些方面相对于预处理器的核心目的来说是次要的，但它们确实非常实用，一旦你习惯了它们，就很难再回到过去。


    #### 设备数据库


    一个全面的设备数据库对于任何移植框架都至关重要。诸如键码值、屏幕分辨率和尺寸、多媒体能力以及支持的 API 等信息都应被视为标准配置。数据库越全面，框架可用的信息就越多，移植的质量也就越高。


    此外，框架应允许你通过预处理器以及在运行时（例如，通过一个动态生成的静态类）访问所有这些信息。这使你能够自动调整应用程序代码以匹配正在运行的设备，类似于代码清单
    9-3 中的示例。


    **代码清单 9-3.** *运行时设备特定代码*


    `public void doMultipleFileUpload(File [] files, int maxSimultaneousConnections)`

    `{`

    `        ...`

    `}`


    `....`


    `doMultipleFileUpload( someFileArray, DeviceInfo.getMaxNetworkConnections() )`


    代码清单 9-3 中的代码可能是一个文件上传应用程序的一部分。`DeviceInfo` 类由框架根据设备数据库动态生成，包含与当前目标设备相关的信息。其中一条信息是设备支持的最大并发网络连接数。应用程序代码随后可以在运行时利用此信息，确保充分利用设备能力的同时避免出现问题（例如打开超过设备支持的连接数）。


    设备数据库在项目的规划阶段也极其有用，因为它可以用来确定你可以针对哪些设备，以及这些设备支持哪些功能及其支持程度。拥有一个高质量的设备数据库往往价值连城，因为它节省的研究时间累积起来相当可观。


    #### 构建引擎


    一个 Java ME 应用程序由许多不同的文件组成，其中一些是代码文件，一些是媒体资源文件，还有一些是配置文件或其他杂项文件。这些文件随后需要被打包成一个
    JAR 文件。构建引擎的职责是获取特定目标设备所需的文件（且仅获取这些文件），并创建最终的 JAR 文件。


    这项任务可能比听起来更困难。例如，考虑一个项目可能针对具有不同屏幕分辨率的设备，而每种屏幕分辨率都有一套特定的媒体文件（用于图标、字体等）。构建引擎必须根据设备的规格包含相应的文件。这同样适用于本地化文件、代码文件、配置文件以及
    JAR 包中的所有其他内容。


    此外，某些构建版本需要签名或应用其他“特殊处理”（例如，对 JAD 文件），这也是构建引擎的职责所在。


    一个好的构建引擎能够处理一个结构清晰的文件夹体系，开发者可以将文件放入其中（例如，`/Screen.240x320` 文件夹包含 240×320 分辨率的资源，`/Vendor.Nokia`
    文件夹包含仅用于诺基亚构建所需的文件，`/Certificates` 文件夹包含所有必要的证书等），并且还支持定义合并规则（例如，在资源冲突的情况下，开发者应能指定
    `/Vendor` 或 `/Screen` 资源哪个优先级更高）。


    一个好的构建引擎还应该能够在将文件传递给编译器之前，根据指令检查代码并替换某些变量名或类名。例如，它应该能够解析像 `import javax.microedition.lcdui.Canvas`
    这样的通用语句，并根据目标厂商将其替换为 `import framework.wrapper.nokia.lcdui.Canvas` 或 `import framework.wrapper.samsung.lcdui.Canvas`。这在编写包装器时极其有用，但也有其他用途，例如通过两个不同的类（一个带有提示屏幕，另一个没有）轻松创建应用程序的完整版/演示版。


    最后，一个好的构建引擎应该易于与标准的 Java ME 构建工具（通常是 Ant）集成。

    '
- fmt: '#### The Abstraction API


    The abstraction API is what the framework is all about. Basically, instead of
    calling the native platform API, you call the abstraction API instead; it then
    is responsible for making sure the end result matches the expected result by transparently
    handling fragmentation issues and inconsistencies.


    The best abstraction APIs are those that mimic the native APIs themselves. Ideally,
    the abstraction APIs should be so easy to use that you do not have to modify your
    existing code at all. This can happen if the abstraction APIs exactly mimic the
    native APIs, and if the porting framework has vendor- or device-specific wrappers
    for all API classes. In conjunction with the substitution feature mentioned previously,
    this creates a hassle-free environment for the developer; all the porting problems
    are transparently handled by the framework.


    A really good abstraction API not only mimics the native API, but also extends
    it. For example, it can add methods like `drawPoly()` or `fillPoly()` to the `Graphics`
    class in order to enhance the drawing capabilities of your application, or a generic
    `keepBacklightOn()` method to the `Display` class.


    #### Multi-platform Support


    This is a great feature to have, but for a strictly fragmentation-oriented framework,
    it is optional. Basically, this allows you to take your plain Java ME application
    and compile it for an entirely different platform, like Android.


    This is usually done by cross-compiling the code and even translating it from
    one language to another, as is the case for Java ME app to iPhone app conversion,
    for example.


    A point of concern is that different platforms have different user interaction
    paradigms, which need to be mitigated (for example, neither Android nor the iPhone
    has the concept of softkeys). As such, using a multi-platform conversion tool
    is really recommended only for back-end stuff or for applications that do not
    rely on platform-native forms and widgets and instead render their user interfaces
    via low-level drawing commands.


    The ideal case for multi-platform support is that you just run your code through
    the conversion tool and it does everything on its own, resulting in a ready-to-run
    application for another platform. This is never the case, though, especially not
    for complex applications. Typically the conversion tool can do maybe up to 90–95%
    of the work, depending on the target platform and on the application''s complexity,
    which means that you will still have to solve some issues yourself (memory leaks,
    for example). A good conversion tool will inform you of most potential problems
    and where in the code they might occur, so you know exactly where to look.


    #### Utility Code and Tools


    Have you noticed that Java ME has no support for big numbers? Or that its array
    handling capabilities are quite limited? Or that it has no XML handling capabilities
    to speak of? A good porting framework will have all these features as part of
    its “utility package,” which is typically a set of stand-alone classes that you
    can use in your project(s) separate from the main porting framework.


    External tools are also a great bonus. Cross-format converters (from XML to JSON
    for example), binary resource editors, configuration file editors, code obfuscators,
    and more are sometimes part of the porting framework complete package. As with
    utility classes, while these tools are not directly related to porting applications,
    they do make a developer''s life easier.


    In addition, they are typically designed with the needs of mobile/Java ME developers
    in mind, and are designed to be used in conjunction with the porting framework
    itself, and they can typically be integrated quite easily into the build process
    to further automate things—so they end up providing quite a bit of extra value.


    #### UI Library


    Good porting frameworks also come packaged with a quality UI library. This makes
    perfect sense, as the UI is typically one of the hardest things to port across
    devices and platforms.


    You can also find stand-alone UI toolkits that support a wide range of devices;
    however, these offer porting support only for the UI; everything else is up to
    you. In addition, they do not typically come with all the goodies for porting
    frameworks, such as a high-quality build engine and device database. You can,
    of course, integrate third-party UI libraries into your framework of choice, but
    this can lead to unwanted side effects and bugs, and will usually void or limit
    your support options on the UI library side (and for good reason, since you would
    be basically running their code on top of a third-party software solution that
    they have no control over).


    For this reason, it is a very good idea to stick with the UI library that comes
    with the porting framework. These are usually quite capable and integrate extremely
    well with the rest of the porting toolset.


    A good UI library should do away completely with the native UI widgets and implement
    its own from scratch. It should also support styling via CSS or other designer-friendly
    means, flexible layout mechanisms for the UI (very important if you plan on targeting
    devices with widely different resolutions), a good selection of widgets (similar
    to what you would find in the desktop world), and also a good selection of eye-candy
    effects to add extra polish to your application.


    #### Customer Support


    Last but certainly not least, customer support is extremely important for a porting
    framework, both from a business *and* a technical standpoint. No matter how good
    the framework you will be using is, it is likely that at some point something
    will have to be handled manually, whether it''s a new fragmentation issue or a
    scenario-specific problem. For example, here are a few common situations that
    you might encounter while developing Java ME applications:


    *   You might need some professional advice (e.g., on how to implement a given
    requirement) from people with lots of Java ME experience on both low-end and high-end
    devices.

    *   Your project''s needs are very specific, and you need a lot of customization,
    both from a technical point of view and from a business point of view (e.g., licensing
    model).

    *   You might need to work with a company that has cross-platform experience and
    that can help you in porting your application to other platforms.

    *   You might need that extra feature added just for your project, like finding
    the device''s coordinates based on the cell ID.


    In all of these cases, customer support can make or break the project. In fact,
    depending on your needs, the best technical solution might not be the best solution
    overall for the project. When it comes to Java ME, you''re usually much better
    off paying for development support and knowledge and a good product than you are
    paying for a great product with no support attached to it.


    A good Java ME porting framework comes backed up with virtually unlimited support
    by its developer. That is, as long as you are willing to pay, the developer is
    willing to dedicate as much effort and time into your needs as required, and is
    willing to modify the framework and associated tools to suit your needs.'
