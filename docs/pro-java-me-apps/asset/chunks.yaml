  raw: 'The `INITIATE_SHUTDOWN` event is also interesting, as what it does is set
    in motion a sequence of events that prepare the application for shutdown and exit.
    It is basically an umbrella event that helps not only shorten the code base (as
    you must trigger only a single event instead of two or more) but also clarify
    how the shutdown process works and what actions are to be performed.


    Finally, I would like to point out the heavy use of the `Defaults` class (shown
    in [Listing 8–3](#Chapter08.html#list_8_3)), which contains the default and hard-coded
    values of various application settings, such as the default locale, the name of
    the record that stores the preferred user locale, the default persistence helper
    to use, and more.


    **Listing 8–3.** *The `Defaults` Class*


    `package app.classes;`


    `...`


    `public class Defaults {`


    `    public static final UITheme THEME = new AppTheme();`


    **`    public static final boolean USE_SINGLE_USER_ACCESS = true ;`**


    **`    public static final int TWEET_BATCH_SIZE = 1;`**


    `    public static final String DEFAULT_LOCALE = "en-US";`


    `    public static final String DEFAULT_LOCALE_RECORD_NAME = "locale";`


    `    public static final String DEFAULT_LOGIN_DATA_RECORD_NAME = "loginData";`


    **`public static final PersistenceProvider persistenceProvider = new`**

    **`RMSPersistenceProvider("twitterclient");`**


    `    public static SimplifiedPersistenceHelper persistenceHelper = new`

    `    SimplifiedPersistenceHelper(persistenceProvider);`

    `}`


    Aside from the obvious benefit of being able to change key values in a single
    central location, the `Defaults` class also serves as a good indicator of how
    flexible an application is: in general, the more values are in it (which actually
    belong there), the more flexible the application is. For example, the first two
    highlighted values can be used to easily configure the application for a variety
    of usage and testing scenarios, by altering the login method to use and the number
    of tweets to retrieve per batch, while the last highlighted value can be used
    to change the application from using local RMS persistence to, for example, cloud-based
    persistence.


    With this we have finished covering the `FlowController`. Let’s now move on to
    the `TweetsController`.


    ### Implementing the TweetsController


