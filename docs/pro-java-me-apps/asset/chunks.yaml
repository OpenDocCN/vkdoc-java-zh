- fmt: '#### Running the Tests in a Desktop Environment


    In some situations, running the code in a desktop environment (as opposed to running
    it inside an emulator or on a real device) is desired: when you want to gather
    lots of telemetry data, when your script files are large or dynamically generated,
    when you want to integrate your tests with other tools such as debuggers and analyzers,
    and so on.


    Fortunately, this is possible. `MicroEmulator` is an open source Java ME emulator
    written entirely in Java. It does a fairly good job of emulating the standard
    Java ME APIs and should be suitable for the majority of unit tests you would want
    to run. The main advantage of it is that, being entirely J2SE based, you can use
    it to mix Java ME code with J2SE native code. This is great for doing things not
    otherwise possible on Java ME, such as using the reflection API to tinker with
    your application’s code without actually altering it, using J2SE native functionality
    to create more-powerful tests, or running J2SE-exclusive tools.


    **NOTE:** You can download the latest version of `MicroEmulator` from [`www.microemu.org`](http://www.microemu.org).


    Furthermore, because it’s basically a desktop application, you can take advantage
    of the increased flexibility of the desktop environment. For example, you could
    set up your test environment so that it’s accessible via remote desktop (useful
    when working as part of a geographically distributed team), you could make the
    whole testing process entirely automated, you could record detailed information
    about each usage session for later analysis, and so forth.


    The problem with using `MicroEmulator`, in my opinion, is that it’s essentially
    an emulated API on top of an emulated platform. This means that, while you can
    test high-level functionality and algorithms, you should never rely on it to test
    low-level stuff. Anything that is directly related to hardware calls (for example,
    networking, graphics) or OS calls (for example, graphics, life-cycle methods)
    should be considered as unreliable, in the sense that the resulting behavior may
    be radically different from the behavior of an actual device or even of a dedicated
    Java ME emulator.


    Another problem with it is that its API set is not as rich nor as well implemented
    as those of a dedicated Java ME emulator. You may find that the API functionality
    needed to run your code or your unit tests is simply not available on `MicroEmulator`.
    If this is the case, you may consider implementing the needed API yourself or
    writing a feature request to the `MicroEmulator` team.


    ### Performing Visual Debugging


    *Visual debugging* simply means looking at the visual output of an application
    (that is, a screenshot) in order to determine whether the application’s output
    and behavior are those expected. This is extremely relevant to Java ME because
    of the variety of JVMs, UI frameworks, and hardware specifications out there.


    Furthermore, visual debugging is especially important for applications that involve
    a lot of image processing (for example, games) and for applications that deal
    with complex UI layouts and layout rules (for example, an HTML/CSS browser). It
    can help spot graphical glitches and small errors (for example, off-by-one-pixel
    errors) that are otherwise hard to identify in a moving, running application.


    **NOTE:** The analysis of the screenshot can be either manual (a human looks at
    the screenshot) or automatic (a computer compares the current screenshot with
    a reference one to see if they match).


    Most emulators have support for manually capturing screenshots, and a few have
    support for capturing the entire output of the application during a whole usage
    session (`MicroEmulator`, for example, can save the session as a GIF animation).
    Furthermore, some SDKs (for example, BlackBerry) allow you to capture screenshots
    directly from attached real devices.


    Visual debugging is especially powerful when combined with unit testing. One trick
    you can use is to run unit tests related to graphics in `MicroEmulator` (to take
    advantage of the “Save as GIF” option) and to have each test case draw a “barcode”
    unique to the test in the upper-left corner of the screen. The barcode would get
    saved along with the actual test output as a frame in the GIF animation.


    Then, using a custom utility program, you can extract each individual test screenshot
    from the resulting GIF animation based on the barcode. This allows you to automatically
    get screenshots of all the tests in your test suite, no matter how many of them
    you have and no matter how long any given test takes to execute. This is not otherwise
    possible by using reasonable means (unless `MicroEmulator` gets a public API,
    accessible from test suites, to control this kind of functionality) and the technique
    could be adapted to work with other emulators as well.


    Once you have the *per test* screenshots, you can use automatic analysis to go
    over them. Even with complex applications featuring hundreds of tests, it takes
    only a few seconds for the computer to identify differences between the reference
    screenshots and the current set of screenshots—something that would take a human
    being tens of minutes or even hours to do.


    Finally, having a collection of application screenshots is also useful in getting
    a quick overview of how a given application looks on different devices. This is
    often important in finding usability issues and inconsistencies that would otherwise
    be hard to spot when looking at only a single device at a time.'
