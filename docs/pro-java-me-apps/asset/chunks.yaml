    \ them all together in a single test MIDlet. The code for this test MIDlet is\
    \ shown in [Listing 6–35](#Chapter06.html#list_6_35).\n\n**Listing 6–35.** *The\
    \ Test MIDlet for the UI Module*\n\n```\npackage test;\n\n...\n\npublic class\
    \ TestMidlet extends MIDlet implements CallbackHandler\n{\n    public boolean\
    \ doCallback(Event evt)\n    {\n        System.out.println(\"EVENT \" + evt.getType()\
    \ + \" RECEIVED FROM \" +\n        evt.getPayload() );\n        return true;\n\
    \    }\n\n    public void startApp()\n    {\n            // Initialize stuff\n\
    \            Application.init(this);\n            UITheme theme = new AppTheme();\n\
    \            GameCanvasView view = new GameCanvasView(false,theme);\n\n      \
    \      // Add some widgets\n            for (int i=0; i<= 10; i++)\n         \
    \   {\n                SimpleTextButton button = new SimpleTextButton(\"BUTTON\
    \ #\" + i, this,\n theme);\n\n                InputStringItem inputStrItem = new\
    \ InputStringItem(\"Enter text\",\n                \"INPUT STRING ITEM #\" + i,\"\
    Okay\", \"Nope\", 100, 30, this, theme);\n\n                view.addWidget(button);\n\
    \                view.addWidget(inputStrItem);\n            }\n\n            //\
    \ Create a horizontal container\n            HorizontalContainer container = new\
    \ HorizontalContainer(theme);\n            container.setContentWidth(view.getWidth());\n\
    \n            // Add some widgets to the horizontal container\n            for\
    \ (int i=0; i<= 10; i++)\n            {\n                StringItem stringItem\
