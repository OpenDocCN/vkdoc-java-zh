    \ Hierarchically speaking, views are top-level containers. We can use this to\
    \ our advantage by wrapping our `GameCanvasView` around a `VerticalContainer`—that\
    \ is, we will forward most of the `Container` calls to the `VerticalContainer`\
    \ and let it handle them.\n\nIn order to do this, we must first properly construct\
    \ and initialize our class, as shown in [Listing 6–33](#Chapter06.html#list_6_33).\n\
    \n**Listing 6–33.** *Initializing the `GameCanvasView`*\n\n```\npackage app.module.ui.classes;\n\
    ...\npublic class GameCanvasView extends GameCanvas implements View, Container\n\
    {\n        ...\n    protected ClipRect clipRect;\n    protected VerticalContainer\
    \ container = null;\n    protected UITheme theme;\n\n    public GameCanvasView(boolean\
    \ b, UITheme theme)\n    {\n        super(b);\n        setFullScreenMode(true);\n\
    \        clipRect = new ClipRect(0,0,getWidth(),getHeight());\n        container\
    \ = new VerticalContainer(theme);\n        container.setParent(this);\n      \
    \  container.setContentHeight(getHeight());\n        container.setContentWidth(getWidth());\n\
    \    }\n        ...\n}\n```\n\nThe highlighted portion of the code is where the\
    \ magic happens. Basically we construct a container and configure it so that the\
    \ view is its parent and that it is as big as the screen itself.\n\nFrom here,\
    \ we can just forward calls to the container like in [Listing 6–34](#Chapter06.html#list_6_34).\n\
    \n**Listing 6–34.** *Forwarding Calls to the Container*\n\n```\n...\npublic boolean\
    \ addWidget(BaseWidget b)\n{\n        return container.addWidget(b);\n}\n\npublic\
    \ boolean insertWidget(BaseWidget b, int index)\n{\n        return container.insertWidget(b,\
    \ index);\n}\n\npublic void removeWidget(BaseWidget b)\n{\n        container.removeWidget(b);\n\
    }\n\npublic void paint (Graphics g)\n{\n        ...\n        container.paint(g);\n\
    \        ...\n}\n...\n```\n\nHowever, some calls we can’t forward to the container.\
    \ For example, we can’t forward the view’s `getYScroll()` to the container because\
    \ that would mean the container would take its own scroll into consideration when\
    \ calculating its absolute position—which obviously makes no sense. Similar reasoning\
    \ applies to all methods related to the view’s position and scroll. Because of\
    \ this, all calls to scroll and position setters are ignored and all calls to\
    \ getters return 0; in effect the view is fixed at coordinates (0,0) with no scroll.\
    \ This is OK most of the time, and when you absolutely need to set the scroll\
    \ on the view, then you can just call `getContainer()` to get the underlying container\
    \ and then call `setYScroll()` on it. This is a bit of a hack, and if this were\
    \ any platform other than Java ME, I would strongly recommend against it, but\
    \ in our case the benefits in terms of code size, simplicity, and speed outweigh\
    \ the cost.\n\nNow that everything is up and running, it’s time for a little test.\n\
