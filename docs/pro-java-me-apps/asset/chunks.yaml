    ##### Searching


    Searching basically means finding a certain element that matches a certain criteria,
    within a given input set. The most common form of searching is the linear search,
    where you go through all the elements of the input set until you find the one
    you need. This is an `O(n)` operation. A much better alternative is the binary
    search, which is an `O(log n)` operation. Binary search works on sorted input
    sets only, and it is a very simple algorithm.


    The idea is simple: on any given sorted input set, you look at the value in the
    middle of the set and compare that element against your target criteria. If it
    matches, you have your result. If the middle element is “greater than” your target
    criteria, then you do the same lookup on the interval `[start, middle)`. If the
    middle element is “less than” your target criteria, then you do the same lookup
    on the interval (`middle, end]`. As you do this, your working interval becomes
    increasingly smaller, until eventually you reach the point where the interval
    has zero elements. If, at that point, you still haven''t found a result, then
    no element in the input set matches your criteria.


    Like quicksort, binary search can be implemented recursively. However, the most
    commonly seen implementations of it are non-recursive, like the one in [Listing
    10–3](#Chapter10.html#list_10_3).


