- fmt: "### Defining the Timeline Entity\n\nThe `Timeline` entity is a great example\
    \ of how properly representing something can save time and stress and also provide\
    \ great flexibility. Let's start the discussion by doing a quick recap of some\
    \ of the principles behind Twitter.\n\nEach new tweet that enters the system gets\
    \ a unique ID, and all IDs are issued in chronological and alphabetical order.\
    \ So, the newer the tweet, the higher its ID number is. Twitter also has two main\
    \ ways of retrieving tweets: queries and timelines. Queries are very much like\
    \ “give me the latest five tweets that contain the word ‘JavaME,'” while timelines\
    \ are a way of aggregating tweets. For example, your home timeline aggregates\
    \ all the tweets from you and the people you follow, as well as some of the tweets\
    \ that might be relevant to your interests.\n\nQueries and timelines are generally\
    \ accessed through different API calls, but we want to be able to unify them under\
    \ a common API. As such, we will merge Twitter's queries and timelines together\
    \ into our own timeline concept that works equally well for both sources, as presented\
    \ here.\n\nWe will consider our timeline to be a series of chronologically ordered\
    \ tweets, each tweet corresponding to the timeline's specified `TweetFilter`.\
    \ A timeline is very similar to the integer number axis: it has a “zero-moment”\
    \ tweet, from which you can go backward in time to older tweets (the equivalent\
    \ of negative numbers) or forward in time to newer tweets (positive numbers).\
    \ The zero-moment tweet can be considered to be the latest tweet at the moment\
    \ the timeline is initialized.\n\nTo move along the timeline, you have two “cursors,”\
    \ one for each direction: forward and back. Each cursor moves only in its specified\
    \ direction. So the “go back” cursor can move only back in time, while the “go\
    \ forward” cursor can move only forward in time. Furthermore, each cursor can\
    \ move only one tweet at a time. This means that in order to reach either end\
    \ of the timeline, you must pass through all the tweets in that specific direction\
    \ and that, regardless of how big the timeline is, you must keep track of at most\
    \ two tweets at any given time—one for each cursor.\n\nSince we want our timeline\
    \ concept to cover multiple data sources, we will use the Java interface `Timeline`\
    \ to represent it, as shown in [Listing 3–6](#Chapter03.html#list_3_6). Each corresponding\
    \ data source will then be responsible for implementing this interface.\n\n**Listing\
    \ 3–6.** *The `Timeline` Interface*\n\n```\npackage app.models;\n\nimport com.apress.framework.objecttypes.Model;\n\
    \npublic interface Timeline extends Model\n{\n    public Tweet goForward();\n\n\
    \    public Tweet goBack();\n}\n```\n\nThe conventions for the `Timeline` interface\
    \ are described in the next paragraph.\n\nThe first calls to `goForward()` or\
    \ `goBack()` after initialization return the zero-moment tweet, or `null` if no\
    \ tweets match the specified filter at that time. The `goBack()` method will return\
    \ `null` when it is no longer possible to go back because the oldest tweet of\
    \ the timeline has been reached. The `goForward()` method may return `null` if\
    \ there are no newer tweets available.\n\nA quick side note: this is simplicity\
    \ at its finest. Using just two simple methods, you can navigate in real time\
    \ not only all the tweets currently in Twitter's system, but also future ones—and\
    \ do so with minimal memory requirements. Furthermore, you can adapt this concept\
    \ to suit pretty much every kind of continuous data source you can think of, from\
    \ stock market data (which is real-time but also has a history) to search engine\
    \ trends.\n\nThe timeline metaphor is also a great example of how abstract concepts\
    \ in themselves can provide a lot of functionality. If you think about it, our\
    \ timeline combines easy and flexible navigation with powerful data source abstraction—even\
    \ though it's nothing more than an idea. It's always worth it to spend a little\
    \ time and see if you can find such ideas that work well with your Java ME application's\
    \ needs.\n\n### Choosing Intelligent Representations for Your Data\n\nMost developers\
    \ tend to minimize the importance of modeling their data. They typically equate\
    \ this process to writing classes or interfaces with one method or field for every\
    \ attribute or action of the real-life entity they are trying to model. This is\
    \ fast and intuitive, and it works, but it also means that you inadvertently make\
    \ your life harder in the long run, while preventing your application from reaching\
    \ its full potential.\n\nThe root cause for this is the widespread notion (among\
    \ developers) that data is “dumb” while code is “smart.” Far from it: properly\
    \ modeled data structures are oftentimes smarter than the equivalent code. I would\
    \ like to take a few paragraphs to illustrate this fact by using a data structure\
    \ we're all familiar with: the linked list.\n\nLet's suppose we need a linked\
    \ list that allows us quick access to both its first and last elements. There\
    \ are two common ways of achieving this.\n\nThe first is to keep track of a reference\
    \ to the first element of the list, for `getFirst()`. When `getLast()` is called,\
    \ the code goes through all the elements in the list until the last one is reached.\
    \ This is obviously slow, but it has the advantage of using only one pointer.\n\
    \nThe second way is to have two references, one for the first element and one\
    \ for the last. This is faster than the previous method, but it has the disadvantage\
    \ of having to keep track of two references instead of one.\n\nHowever, there\
    \ is a third and smarter way of achieving our goal: we will model our list as\
    \ being a circular one, by linking the last element to the first.\n\nThis small\
    \ change makes a world of difference. For starters, we now have to keep track\
    \ of only one reference, to the last element in the list. `getLast()` will return\
    \ said reference, while `getFirst()` will simply return `getLast().next()`. The\
    \ concept is illustrated in [Figure 3–1](#Chapter03.html#fig_3_1).\n\nBecause\
    \ we have only one reference to manage, the code complexity and resource consumption\
    \ are as low as in the first approach. And since going from the last element to\
    \ the first is virtually cost-free, the execution speed of the code is as fast\
    \ as for the second approach. Furthermore, to the outside world, our circular\
    \ list behaves the same way as a regular linked list.\n\n![images](images/0301.jpg)\n\
    \n**Figure 3–1.** *The circular list*\n\nBy being smart about the way we defined\
    \ our data and choosing a proper model, we get all the advantages of the first\
    \ two methods and none of their disadvantages.\n\nThis kind of optimization can\
    \ be done frequently in more complex real-life scenarios, too, though usually\
    \ to a lesser extent. This means that it is often possible to make your application\
    \ faster, leaner, and more flexible simply by choosing the right representation\
    \ for your data and entities.\n\nI hope this example has convinced you that modeling\
    \ data and entities, and working with the resulting models, is a much more delicate\
    \ and important subject than it appears at first glance. Keep this in mind and\
    \ don't rush over this important step when writing your applications. This advice\
    \ is especially important in the world of Java ME, where the performance and resource\
    \ hit caused by the improper representation of data can be quite significant.\n\
    \n### Summary\n\nWe have defined the global data types and entities for our project.\
    \ In the process, we have also examined how to model data for Java ME applications\
    \ and how choosing the right model for your data can bring significant improvements\
    \ to an application.\n\nIn the next chapter, we will implement our first module\
    \ for the Twitter client, the networking module, and we will also take a closer\
    \ look at Java ME networking.\n\n## Chapter 4"
  raw: '### Defining the Timeline Entity


    The `Timeline` entity is a great example of how properly representing something
    can save time and stress and also provide great flexibility. Let''s start the
    discussion by doing a quick recap of some of the principles behind Twitter.


    Each new tweet that enters the system gets a unique ID, and all IDs are issued
    in chronological and alphabetical order. So, the newer the tweet, the higher its
    ID number is. Twitter also has two main ways of retrieving tweets: queries and
    timelines. Queries are very much like “give me the latest five tweets that contain
    the word ‘JavaME,''” while timelines are a way of aggregating tweets. For example,
    your home timeline aggregates all the tweets from you and the people you follow,
    as well as some of the tweets that might be relevant to your interests.


    Queries and timelines are generally accessed through different API calls, but
    we want to be able to unify them under a common API. As such, we will merge Twitter''s
    queries and timelines together into our own timeline concept that works equally
    well for both sources, as presented here.


    We will consider our timeline to be a series of chronologically ordered tweets,
    each tweet corresponding to the timeline''s specified `TweetFilter`. A timeline
    is very similar to the integer number axis: it has a “zero-moment” tweet, from
    which you can go backward in time to older tweets (the equivalent of negative
    numbers) or forward in time to newer tweets (positive numbers). The zero-moment
    tweet can be considered to be the latest tweet at the moment the timeline is initialized.


    To move along the timeline, you have two “cursors,” one for each direction: forward
    and back. Each cursor moves only in its specified direction. So the “go back”
    cursor can move only back in time, while the “go forward” cursor can move only
    forward in time. Furthermore, each cursor can move only one tweet at a time. This
    means that in order to reach either end of the timeline, you must pass through
    all the tweets in that specific direction and that, regardless of how big the
    timeline is, you must keep track of at most two tweets at any given time—one for
    each cursor.


    Since we want our timeline concept to cover multiple data sources, we will use
    the Java interface `Timeline` to represent it, as shown in [Listing 3–6](#Chapter03.html#list_3_6).
    Each corresponding data source will then be responsible for implementing this
    interface.


    **Listing 3–6.** *The `Timeline` Interface*


    `package app.models;`


    `import com.apress.framework.objecttypes.Model;`


    `public interface Timeline extends Model`

    `{`

    `    public Tweet goForward();`


    `    public Tweet goBack();`

    `}`


    The conventions for the `Timeline` interface are described in the next paragraph.


    The first calls to `goForward()` or `goBack()` after initialization return the
    zero-moment tweet, or `null` if no tweets match the specified filter at that time.
    The `goBack()` method will return `null` when it is no longer possible to go back
    because the oldest tweet of the timeline has been reached. The `goForward()` method
    may return `null` if there are no newer tweets available.


    A quick side note: this is simplicity at its finest. Using just two simple methods,
    you can navigate in real time not only all the tweets currently in Twitter''s
    system, but also future ones—and do so with minimal memory requirements. Furthermore,
    you can adapt this concept to suit pretty much every kind of continuous data source
    you can think of, from stock market data (which is real-time but also has a history)
    to search engine trends.


    The timeline metaphor is also a great example of how abstract concepts in themselves
    can provide a lot of functionality. If you think about it, our timeline combines
    easy and flexible navigation with powerful data source abstraction—even though
    it''s nothing more than an idea. It''s always worth it to spend a little time
    and see if you can find such ideas that work well with your Java ME application''s
    needs.


    ### Choosing Intelligent Representations for Your Data


    Most developers tend to minimize the importance of modeling their data. They typically
    equate this process to writing classes or interfaces with one method or field
    for every attribute or action of the real-life entity they are trying to model.
    This is fast and intuitive, and it works, but it also means that you inadvertently
    make your life harder in the long run, while preventing your application from
    reaching its full potential.


    The root cause for this is the widespread notion (among developers) that data
    is “dumb” while code is “smart.” Far from it: properly modeled data structures
    are oftentimes smarter than the equivalent code. I would like to take a few paragraphs
    to illustrate this fact by using a data structure we''re all familiar with: the
    linked list.


    Let''s suppose we need a linked list that allows us quick access to both its first
    and last elements. There are two common ways of achieving this.


    The first is to keep track of a reference to the first element of the list, for
    `getFirst()`. When `getLast()` is called, the code goes through all the elements
    in the list until the last one is reached. This is obviously slow, but it has
    the advantage of using only one pointer.


    The second way is to have two references, one for the first element and one for
    the last. This is faster than the previous method, but it has the disadvantage
    of having to keep track of two references instead of one.


    However, there is a third and smarter way of achieving our goal: we will model
    our list as being a circular one, by linking the last element to the first.


    This small change makes a world of difference. For starters, we now have to keep
    track of only one reference, to the last element in the list. `getLast()` will
    return said reference, while `getFirst()` will simply return `getLast().next()`.
    The concept is illustrated in [Figure 3–1](#Chapter03.html#fig_3_1).


    Because we have only one reference to manage, the code complexity and resource
    consumption are as low as in the first approach. And since going from the last
    element to the first is virtually cost-free, the execution speed of the code is
    as fast as for the second approach. Furthermore, to the outside world, our circular
    list behaves the same way as a regular linked list.


    ![images](images/0301.jpg)


    **Figure 3–1.** *The circular list*


    By being smart about the way we defined our data and choosing a proper model,
    we get all the advantages of the first two methods and none of their disadvantages.


    This kind of optimization can be done frequently in more complex real-life scenarios,
    too, though usually to a lesser extent. This means that it is often possible to
    make your application faster, leaner, and more flexible simply by choosing the
    right representation for your data and entities.


    I hope this example has convinced you that modeling data and entities, and working
    with the resulting models, is a much more delicate and important subject than
    it appears at first glance. Keep this in mind and don''t rush over this important
    step when writing your applications. This advice is especially important in the
    world of Java ME, where the performance and resource hit caused by the improper
    representation of data can be quite significant.


    ### Summary


    We have defined the global data types and entities for our project. In the process,
    we have also examined how to model data for Java ME applications and how choosing
    the right model for your data can bring significant improvements to an application.


    In the next chapter, we will implement our first module for the Twitter client,
    the networking module, and we will also take a closer look at Java ME networking.


    ## Chapter 4'
  trans: '

    ### 定义时间线实体


    `Timeline` 实体是一个绝佳范例，展示了如何通过恰当的数据表示来节省时间、减轻压力，同时提供极大的灵活性。让我们先快速回顾一下 Twitter 背后的一些原则，以此开启讨论。


    每条进入系统的新推文都会获得一个唯一 ID，所有 ID 均按时间顺序和字母顺序生成。因此，推文越新，其 ID 数字就越大。Twitter 还有两种主要的推文检索方式：查询和时间线。查询类似于“给我包含‘JavaME’这个词的最新五条推文”，而时间线则是一种聚合推文的方式。例如，你的主页时间线会聚合来自你本人、你关注的人以及一些可能与你兴趣相关的推文。


    查询和时间线通常通过不同的 API 调用访问，但我们希望能够将它们统一到一个公共 API 下。因此，我们将把 Twitter 的查询和时间线合并到我们自己的时间线概念中，该概念对这两种来源同样适用，如下所示。


    我们将把时间线视为一系列按时间顺序排列的推文，每条推文都对应时间线指定的 `TweetFilter`。时间线与整数数轴非常相似：它有一个“零时刻”推文，你可以从该推文向后回溯到更早的推文（相当于负数），或向前推进到更新的推文（正数）。零时刻推文可以被视为时间线初始化时的最新推文。


    为了在时间线上移动，你有两个“游标”，分别对应两个方向：向前和向后。每个游标只能在其指定的方向上移动。因此，“向后”游标只能向后移动，而“向前”游标只能向前移动。此外，每个游标每次只能移动一条推文。这意味着，要到达时间线的任一端，你必须遍历该方向上的所有推文，并且无论时间线有多大，你在任何时刻最多只需跟踪两条推文——每个游标一条。


    由于我们希望时间线概念能覆盖多个数据源，我们将使用 Java 接口 `Timeline` 来表示它，如代码清单 3–6 所示。每个相应的数据源将负责实现此接口。


    **代码清单 3–6.** *`Timeline` 接口*


    `package app.models;`


    `import com.apress.framework.objecttypes.Model;`


    `public interface Timeline extends Model`

    `{`

    `    public Tweet goForward();`


    `    public Tweet goBack();`

    `}`


    `Timeline` 接口的约定如下一段所述。


    初始化后首次调用 `goForward()` 或 `goBack()` 将返回零时刻推文，如果当时没有推文匹配指定的过滤器，则返回 `null`。当无法再向后移动（即已达到时间线的最旧推文）时，`goBack()`
    方法将返回 `null`。如果没有可用的更新推文，`goForward()` 方法可能返回 `null`。


    快速补充一点：这是极致的简洁。仅使用两个简单的方法，你不仅可以实时浏览 Twitter 系统中当前的所有推文，还能浏览未来的推文——而且内存需求极低。此外，你可以调整这个概念，使其几乎适用于你能想到的任何连续数据源，从股票市场数据（实时但也有历史记录）到搜索引擎趋势。


    时间线这个比喻也是一个很好的例子，说明了抽象概念本身如何能提供大量功能。仔细想想，我们的时间线将简单灵活的导航与强大的数据源抽象结合在了一起——尽管它仅仅是一个想法。花点时间看看能否找到适合你
    Java ME 应用程序需求的此类想法，总是值得的。


    ### 为你的数据选择智能表示


    大多数开发者倾向于低估数据建模的重要性。他们通常将这个过程等同于编写类或接口，为试图建模的现实世界实体的每个属性或动作都提供一个方法或字段。这既快速又直观，也确实有效，但这也意味着从长远来看，你无意中让自己的工作变得更困难，同时阻碍了应用程序发挥其全部潜力。


    其根本原因在于（开发者中）普遍认为数据是“笨拙的”，而代码是“智能的”。事实远非如此：恰当建模的数据结构往往比等效的代码更智能。我想用几段文字，通过一个我们都熟悉的数据结构——链表——来说明这一点。


    假设我们需要一个链表，能够快速访问其第一个和最后一个元素。有两种常见的方法可以实现这一点。


    第一种是跟踪对列表第一个元素的引用，用于 `getFirst()`。当调用 `getLast()` 时，代码会遍历列表中的所有元素，直到到达最后一个。这显然很慢，但优点是只使用一个指针。


    第二种方法是使用两个引用，一个指向第一个元素，一个指向最后一个。这比前一种方法快，但缺点是需要跟踪两个引用而不是一个。


    然而，还有第三种更智能的方法来实现我们的目标：我们将列表建模为循环列表，将最后一个元素链接到第一个元素。


    这个小小的改变带来了天壤之别。首先，我们现在只需跟踪一个引用，即指向列表中最后一个元素的引用。`getLast()` 将返回该引用，而 `getFirst()`
    只需返回 `getLast().next()`。这个概念如图 3–1 所示。


    由于我们只管理一个引用，代码复杂度和资源消耗与第一种方法一样低。而且，由于从最后一个元素到第一个元素几乎没有成本，代码的执行速度与第二种方法一样快。此外，对外部世界而言，我们的循环列表的行为与常规链表相同。


    ![images](img/0301.jpg)


    **图 3–1.** *循环列表*


    通过巧妙地定义数据并选择合适的模型，我们获得了前两种方法的所有优点，而没有它们的任何缺点。


    这种优化在更复杂的现实场景中也经常可以进行，尽管程度通常较小。这意味着，通常只需为数据和实体选择正确的表示形式，就能让你的应用程序更快、更精简、更灵活。


    我希望这个例子能让你相信，对数据和实体进行建模，并与由此产生的模型打交道，是一个比乍看起来更微妙、更重要的话题。请记住这一点，在编写应用程序时不要仓促跳过这个重要步骤。这条建议在
    Java ME 的世界中尤其重要，因为不恰当的数据表示所导致的性能和资源消耗问题可能相当显著。


    ### 本章小结


    我们已经为项目定义了全局数据类型和实体。在此过程中，我们还研究了如何为 Java ME 应用程序建模数据，以及如何为数据选择合适的模型能显著改进应用程序。


    在下一章中，我们将实现 Twitter 客户端的第一个模块——网络模块，并且还将更深入地了解 Java ME 网络编程。


    ## 第 4 章

