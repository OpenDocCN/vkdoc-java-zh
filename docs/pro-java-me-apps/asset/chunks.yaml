    ## Chapter 9'
  trans: '

    #### 改进错误处理


    目前，我们应用程序中的错误处理非常薄弱。为了达到“完成”状态，这一点需要改进。改进错误处理应从每个模块（网络、用户界面、本地化、持久化等）的核心开始，在这些模块中，原生
    API 调用与项目特定或框架特定的代码混合在一起，并且应持续进行，直到处理高层错误（例如，界面中的控件聚焦错误）。


    理论上，每个函数（尤其是原生函数）的返回值都应检查是否失败并进行相应处理，并且在给定场景中可能抛出的每一种异常类型都应被捕获并单独处理（即，代码不应依赖 `catch
    (Exception ex)` 作为包罗万象的通用安全网）。因此，当出现故障时，我们不仅要知道“它失败了”，还应该在运行时确切知道失败的地点和原因，并尽可能从中恢复。


    实际上，Java ME 设备通常没有足够的资源来实现这一点。捕获每一种错误类型并检查每一个返回值将严重消耗 CPU 和 RAM 资源，同时也会显著增加代码库。如果这些检查恰好发生在频繁执行的代码块中，应用程序的性能将受到严重影响。幸运的是，有几种方法可以绕过这个问题。


    首先，开发人员必须了解 80-20 法则，在错误处理方面，这意味着所有*可能*产生错误的场景或代码块中的 20% 导致了 80% 的*实际发生*的错误。如果你能识别出这
    20% 是什么以及在哪里，并妥善处理它们，那么对于剩余 80% 的可能产生错误的场景和代码，你通常只需进行最低限度的错误处理即可。


    根据我的经验，最常见的错误来源如下：


    *   外部操作，例如 IO 访问和访问设备上的用户数据

    *   为大数据块分配内存（我还没见过因为分配单个 `int` 或 `String` 而导致的 `OutOfMemory` 异常）

    *   线程/并发问题，通常是由于尝试使用或访问一个尚未准备好使用或已被其他线程占用的资源（无论是外部还是内部）引起的

    *   无效或不一致的输入数据（例如，损坏的 HTML 代码、使用与预期不同的算法压缩的数据等）


    其次，还有一个经常被忽视或未被正确理解的概念：*错误预防*。如果采用了适当的检查，大多数错误是可以避免的。例如，与其尝试将 `InputStream` 绑定到
    `DataInputStream`，从 `DataInputStream` 读取并捕获 `IOException`，不如确保 `InputStream` 不为
    `null` 并且可以安全读取。你还应该验证关键数据和参数，以确保它们不会破坏你的代码。确保你拥有关于运行时环境（可用内存、运行线程数、正在使用的网络连接数等）的准确信息，并使你的代码能够适应这些参数的关键变化，在某些场景下同样重要。了解你的代码所运行设备的特性是无价的：如果你知道某个原生函数在你运行的设备上行为异常，就调整你的代码来弥补（更多内容见下一章）。


    归根结底，与其试图处理错误，不如始终首先尝试预防错误的发生。当然，你无法控制因网络（或其他类似场景）而发生的 IO 错误，但你遇到的大多数错误都可以通过代码以某种方式预防——尤其是当这些错误也是由你的代码产生时。错误预防相对于错误处理的优势应该是显而易见的：你的应用程序变得更加健壮，并且处理潜在敏感情况也变得更加容易，因为你提前意识到了它们。


    第三点也是最后一点建议是：尝试向上传递错误并集中处理错误。如果本地网络访问操作失败，尽快且高效地在本地进行清理，然后触发一个带有适当负载的 `NETWORK_FAILURE`
    事件。在一个专用的错误处理控制器中处理此事件，并在那里完成大部分错误处理工作（通知用户、停止相关线程/操作等）。由于许多错误以相似甚至相同的方式处理，拥有一个集中的错误处理中心是合理的，它还能提高代码的可读性、灵活性和代码库的规模。


    #### 增加功能


    我们目前的应用程序只提供基本的 Twitter 功能——对于一个专业版应用来说，这还不够。添加功能应该很容易，因为构建模块都已就绪。一些可能不错且实现起来也很有趣的功能如下：


    *   查看你的好友及其推文的功能

    *   定期自动更新推文列表（例如，每五分钟一次）

    *   每条推文的更多信息（位置、时间戳等）

    *   头像图片以及每位好友的更多信息（头像、位置、简介等）

    *   通过外部服务支持 URL 缩短（这个可能稍微难一点）

    *   更多上下文选项——例如，激活一条推文时，应出现一个包含“回复”、“转推”和“该用户的更多推文”等选项的菜单。


    #### 改进 UI 框架


    UI 框架可能是任何 Java ME 应用程序最重要的部分之一，在我们的案例中，它功能可用但非常简陋。当然，你可以将应用程序切换到一个更完整的 UI 框架，或者尝试改进现有的框架（我推荐后者，纯粹是为了学习经验）。你可以尝试实现的一些功能如下：


    *   更多控件——下拉框、上下文菜单和图片控件都是很好的候选。

    *   支持惯性滚动以及可能的触摸手势

    *   自定义字体和文本输入功能，以取代原生功能（不同设备间不一致）——本书后面会详细介绍。

    *   更多布局容器和选项（例如内边距、外边距、前导等）

    *   更高的灵活性（运行时更改控件文本、内置表单重新布局支持等）


    ### 总结


    在本章中，我们将迄今为止编写的所有模块整合在一起。我们创建了一个功能可用（尽管功能并非完全完备）的 Twitter 客户端。我们探讨了如何将应用程序分离为
    UI 相关代码（表单）和业务相关代码（控制器），事件如何用于形成从启动到关闭的完整应用程序流程，如何利用事件桥接前端 UI 和后端应用程序代码之间的鸿沟，如何在真实场景中实现自动登录和本地化等功能，以及更多内容。我们还探讨了可以采取哪些措施来进一步改进应用程序。为此，我们向读者提供了一份“待办”练习清单。


    ## 第 9 章

