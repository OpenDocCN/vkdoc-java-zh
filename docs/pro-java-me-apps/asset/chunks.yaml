- fmt: "### API Inconsistencies\n\nOut of all the fragmentation issues you're likely\
    \ to encounter, API inconsistencies are the hardest ones to identify and the most\
    \ annoying to fix.\n\nAPI inconsistencies happen when different vendors don't\
    \ interpret the Java ME standard in the same manner. This usually results in the\
    \ same system call having different results on different devices, or returning\
    \ different values, or even having no effect at all. Because they are system calls,\
    \ developers naturally assume that they will behave in the manner that they do\
    \ on other devices and that they will not fail—in other words, that they are always\
    \ safe and that they always work OK. As such, they are not typically subject to\
    \ examination when the application misbehaves or does not produce the expected\
    \ results, so a lot of time is spent debugging and examining application code,\
    \ while, in fact, the problem lies in the platform implementation. That being\
    \ said, API inconsistencies should be the last thing to check for when your application\
    \ misbehaves, as most of the time it is your code that does not function properly,\
    \ not the platform.\n\nAPI inconsistencies can be split into three subcategories:\n\
    \n- **Localized inconsistencies**: Usually only a single method call misbehaves,\
    \ or a few tightly related functions misbehave. For example, the `Graphics.translate()`\
    \ method does not handle translation as expected on some platforms, which tends\
    \ to affect other drawing functions as well.\n- **Architectural or global inconsistencies**:\
    \ The standard as a whole is not properly implemented. An example of this is the\
    \ fact that some phones do not call `pauseApp()` when they should, which can cause\
    \ all sorts of unwanted side effects.\n- **Open for interpretation**: The specifications\
    \ do not define any clear right or wrong answer. For example, manufacturers are\
    \ free to choose their own keycodes, and some devices may have keys (and their\
    \ associated keycodes) that are not present on others.\n\nLet's look over these\
    \ one by one.\n\n#### Localized API Inconsistencies\n\nLocalized API inconsistencies\
    \ tend to be a more common occurrence on older phones, or on no-name phones, and\
    \ less of an issue on newer phones (as vendors have worked out most of the kinks).\
    \ Once localized API inconsistencies have been found, their fixes are usually\
    \ a lot simpler compared to those required for hardware and capabilities fragmentation\
    \ issues.\n\nPerformance-wise, the best fix for any API inconsistency issue is\
    \ to alter either the method call parameters or the return values so that the\
    \ end result matches what you would get on a well-behaved implementation. In this\
