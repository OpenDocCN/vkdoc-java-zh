- fmt: '# Thinking Outside the Box


    Thinking outside the box also means being able to come up with new and innovative
    solutions to your problems, if that’s what is needed. Remember, just because it
    hasn’t been done until now doesn’t mean it can’t be done. Even if these solutions
    don’t turn out to be the best ones, or end up being unfeasible altogether, you
    can still store them for later use, and you’ll most likely gain valuable experience
    in the process. Plus, many times the solutions you end up coming up with do turn
    out to be feasible, in which case you’ll get to push the limits of what can be
    done with Java ME—and give your product and your image a boost.


    Coming up with innovative solutions is not as hard as you may think. The biggest
    obstacle is the (completely correct) knowledge that Java ME devices are typically
    very limited and constrained. Thus, the first step should be to simply imagine
    that you’re targeting a Java ME device with unlimited resources, in the sense
    that you will not run out of CPU power, memory, or storage space, but the APIs
    available to you are still the same. What would your proposed solution look like
    then? In fact, you should actually come up with three or four different solutions,
    and choose the one that sounds best to you.


    After you have chosen and fleshed out the best solution, evaluate it in terms
    of resources and feasibility. What do you need to improve most? If it’s CPU usage,
    see if you can optimize the algorithms or the code. If it’s RAM you need, see
    if it’s feasible to trade off CPU power for RAM, or to use persistent storage
    as a swap file, etc. In other words, you should try to adapt your solution to
    the real world, more specifically to the real-world constraints of your application.
    The key here is to do everything in baby steps, and focus on the critical aspects
    first. For example, if the expected CPU usage is very high, try to optimize the
    code as much as possible first, and then focus on other problem areas (such as
    RAM usage)—but only if you manage to get the CPU usage down to an acceptable level
    first.


    There are two possible outcomes to this process. Either you manage to bring your
    solution to a usable level, in which case you can implement and test it right
    away, or you fall short in one or more respects, in which case you can simply
    store it for later (remember, what’s not feasible today may very well be easily
    doable tomorrow as the platform and its hardware evolve), pick the second-best
    solution, and repeat the process.


    This may sound like it’s tiresome and like it will take a long, long time, but
    the truth is you can do most of it on paper and/or by guesstimating, and in the
    first phase you have to flesh out only the general solution, not implement the
    whole thing—in other words, you need to do only a quick feasibility test and some
    prototyping. This not only is fun, but also takes up far less time than you may
    think.


    ## Keeping Things Simple


    Most of what we have discussed so far in the book indicates that developing for
    Java ME is not an easy task; in fact, Java ME development has been painted as
    being quite a difficult endeavor. This is entirely true: developing a high-quality
    Java ME application is by no means a walk in the park, and complications can arise
    at every step of the way.


    This is exactly why it’s extremely important to always try to keep things simple
    and straightforward: no fancy tricks, no complicated algorithms and procedures,
    no long descriptions and convoluted requirements—just simple and clear reasoning
    that is easy to understand and easy to put into practice. You will hit plenty
    of bumps and roadblocks along the way, but keeping things simpler tends to make
    these unfortunate encounters rarer.


    This philosophy should be applied to the project as a whole, from the start of
    the planning process right until the final sign-off is given by the QA team. For
    example, your requirements should be simple, each no more than one sentence long.
    Based on these requirements, your needs should also be extracted, and they should
    also be simple and concise. Based on these needs, you should design the simplest
    architecture you possibly can, and so forth.


    All of the foregoing may sound obvious, but simplicity isn’t always easy to find.
    In fact, oftentimes it’s quite hard to find. The main cause for this is the fact
    that it’s hard to formulate and identify the right problems. Many times, the problem
    you are facing is not the problem you are actually seeing: just like in life,
    your expectations, past experience, and personal point of view can alter your
    perception of what’s actually going on.


    For example, as discussed in a previous example in [Chapter 1](#Chapter01.html#ch1),
    when users complain about performance, we, as developers, naturally tend to think
    they are referring to code performance, when in fact what they are actually complaining
    about is *perceived* performance. Thus, the question is not “How can we make the
    application faster?” (you can optimize it), but “How can we make the application
    *seem* faster?” (you can optimize it, but also parallelize tasks, throttle CPU
    usage, change the order in which you process data, etc.). As you can see, identifying
    the right problem gives you more options to work with.


    **CAUTION:** Apparently similar situations can be, at their core, totally different
    problems, and thus they can have totally different solutions. The only way you
    will be able to see this is if you approach each situation individually and with
    an “it can be done better than it currently is” attitude.


    Once you have identified the right problem, the even trickier task is identifying
    the right solution. Many times, simple solutions are easily looked over, because
    many times they are unconventional and they require thinking outside the box.
    A great example of this can be found at the end of [Chapter 3](#Chapter03.html#ch3),
    in the form of the linked list implementation given there: the solution is simple,
    but certainly not obvious.


    Finally, after you have found a simple solution, the next step is to actually
    implement it. This, again, is trickier than it first looks, as the implementation
    itself also has to be simple. In this context, simple means code that is easy
    to write, easy to understand, and fast. Obviously, meeting three criteria at the
    same time isn’t always possible, so if you have to make compromises, make sure
    you don’t compromise clarity, even if this means that your code takes longer to
    write and to execute—you can always fine-tune these two aspects in the optimization
    phase.'
