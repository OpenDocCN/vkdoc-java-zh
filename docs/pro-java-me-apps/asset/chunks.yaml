  trans: '

    ### Java ME 的目标市场


    Java ME 设备首次问世时，其目标用户是全球范围内相对富裕的人群。当时，这意味着西方世界的人们。如今，在西方世界，Java ME 设备正被智能手机取代，这一趋势在未来仍将持续。但这种取代并非完全彻底：许多人仍会购买
    Java ME 设备作为备用手机，或者因为他们偏爱其简洁性和更长的电池续航时间。


    因此，从地理角度来看，Java ME 未来的目标市场将主要是发展中国家，这一趋势在当下也已显现。许多传统上被认为贫困的国家正经历经济腾飞，这意味着大量此前买不起手机（或只能购买极其廉价、不支持第三方应用的手机）的人，现在有能力购买了。由于智能手机对他们来说过于昂贵，他们选择了运行
    Java ME 的功能手机。


    这一点，加上这些国家的经济繁荣，共同创造了一个潜力巨大的 Java ME 市场，正如它最初在西方世界那样。例如，在非洲，手机的数量远超电脑。因此，我们在西方世界用电脑做的事情（包括银行业务、上网浏览、游戏和写邮件），他们都在手机上完成——而这些手机需要应用程序来完成上述所有任务，这些应用正是你可以编写并实现盈利的。


    其次，与 Java ME 首次问世时相比，当今世界的连接性大大增强，并且在可预见的未来这一趋势将持续。这意味着联网的 Java ME 应用将变得越来越普遍。因此，有一类特殊的应用（目前正开始获得关注）仅仅是基于网络或云服务的客户端——例如，社交网站的客户端和基于网页的电子邮件服务客户端。这类应用与
    Java ME 在全球的广泛使用完美契合，并且随着其硬件性能和能力的提升，它们的重要性很可能会日益凸显；它们构成了一个不断增长且潜在利润丰厚的市场。


    最后，随着 MIDP 3.0 的到来，将会催生出一个类似智能手机应用的新市场。这些应用将运行在支持 MIDP 3.0 的功能手机上，介于当今（相对受限的）MIDP
    2.0 应用和智能手机应用之间，它们将弥合功能手机与智能手机功能之间的差距——例如，作为待机屏幕应用/小部件运行在功能手机上的电子邮件客户端，或者在后台运行并在新邮件到达时通知用户的客户端。


    ### Java ME 与其他平台


    就市场份额而言，Java ME 是移动平台之王，并且在可预见的未来仍将如此。然而，就资金和开发投入而言，Java ME 正逐渐但确实地被智能手机平台所超越，这已不是什么秘密。


    至少在 MIDP 3.0 到来之前，这一趋势将持续。为智能手机开发比为功能手机开发要容易得多。此外，随着智能手机平台的快速发展和改进（Android 是典型例子），Java
    ME 与它们之间的能力差距将会扩大。


    目前，以及在不久的将来，唯一能让 Java ME 维持下去的是其巨大的市场份额。为了利用这一点，跨平台工具应运而生，这些工具允许开发者将其 Java ME
    应用自动移植到智能手机平台，从而为开发者提供尽可能大的市场份额。这些工具迅速流行起来，并且只要市场份额是应用的关键需求，它们就会继续保持流行。


    然而，在过去几年中，专门针对智能手机的跨平台工具已经获得了巨大的人气。这些工具基于网络技术（HTML、CSS、JavaScript），并且在注重盈利的应用领域，其受欢迎程度已经超过了基于
    Java ME 的工具。这种情况很可能会持续到 MIDP 3.0 被广泛采用，届时 Java ME 也可能成为一个可行的盈利平台。


    如前所述，MIDP 3.0 将是一个游戏规则改变者，它能让 Java ME 作为一个平台显著缩小与智能手机平台之间的差距。这将使该平台再次对开发者具有吸引力，至少在能力方面是如此。盈利可能是一个不同的问题，这主要是由于分发问题（如果你无法将应用交付给用户，就很难从中盈利；Java
    ME 没有中央应用商店）。


    解决这个问题主要有两种方案：内置在 MIDP 3.0 手机中的特定供应商商店（例如，诺基亚的 Ovi），以及用户可以自行访问的独立于供应商的商店（例如，GetJar）。然而，这两种方案都不如直接内置于平台中的统一应用商店（例如，Android
    Market）那样优雅。尽管如此，在优雅性上的损失可能会在纯粹的销售数量上得到弥补，因为 MIDP 3.0 设备的数量最终很可能会远超任何一个单一的智能手机平台。


    MIDP 3.0 还将见证 Java ME 作为跨平台应用开发的源平台重新崛起，因为 MIDP 3.0 的基线低端设备应该相当于当今的高端 Java ME
    设备。这一点，加上 MIDP 3.0 引入的新功能，将使 Java ME 强大到足以与智能手机平台同台竞技。


    至于当前的 MIDP 2.0 技术，它只能在价格是购买手机最重要标准的地理区域内与智能手机平台竞争。在西方世界，随着入门级智能手机价格持续下降，几乎所有想在手机上运行应用的人都能买得起智能手机。


    然而，在价格是最重要标准的地理区域，MIDP 2.0 仍有很长的寿命，因为它将取代既有的基础功能手机和 MIDP 1.0 设备。相比之下，即使是最便宜的智能手机，其价格也远高于当地大多数人的承受能力。

    '
- fmt: '### Java ME Application Types


    Initially, Java ME applications were little more than proofs of concept. You weren’t
    really able to do much with them, because of their very limited platform and hardware.
    This continued to be the case until the `MIDP 2.0` standard and devices supporting
    it came onto the scene.


    At that point, the Java ME application scene started to boom. Most applications
    written were games, but a few serious applications appeared too, including calendars,
    calculators, and spreadsheets. Still, the selection wasn’t that big, primarily
    because any serious number crunching required more processing power and larger
    screens than the devices of the day had at their disposal.


    Today, Java ME has a wide assortment of applications written for it, and devices
    powerful enough to run them. You can find anything from games to document viewers,
    remote desktop clients to GPS software.


    Besides these application types, as mentioned earlier, in the future Java ME will
    see a huge increase in applications related to social networking, banking, and
    cloud computing. These types of applications are all a perfect fit for Java ME’s
    widespread nature, and because devices are becoming more and more powerful, the
    user’s experience on them (particularly in the case of social networking) will
    become more and more enjoyable.


    Applications relying on interaction with the real world will also grow in prominence.
    For example, NFC communications can be used to interface your phone with your
    car, your TV set, or even your microwave oven. An appliance manufacturer will
    certainly target Java ME devices with NFC chips alongside any smartphone platform,
    simply because of their widespread use.


    Applications that augment the real world will also come into play. As more Java
    ME devices will feature both GPS and 3D hardware, augmented-reality applications
    will start to appear on the market. These might be simple evolutions of existing
    applications (for example, a GPS application will add augmented-reality support)
    or as stand-alone tools (for example, a distance-measuring application or a museum
    guide).


    `MIDP 3.0` will bring with it the possibility of writing applications that are
    currently simply impossible to write—for example, applications that run in the
    background, or on a device’s idle screen or that react to system-wide events.
    Applications will also be able to work together and share data and capabilities,
    in effect becoming more than the sum of their parts.


    Finally, applications that interact with other computing devices will also start
    to appear. For example, equipped with the proper Java ME application, you will
    be able to use a compatible mobile phone as a game controller for your PC and
    console games. Prototypes of this are already available, but these are typically
    limited (for example, they use the phone’s accelerometer capabilities as a virtual
    steering wheel). As devices grow in power and capabilities, the extent to which
    mobile phones will get used as game controllers or as enhancements to other computing
    devices will grow. For example, you will be able to interface your mobile phone
    with your car’s navigation system for a point-and-drive experience: you will just
    take a photo of the place you want to drive to (an address, an actual photo, or
    a map) and the phone will automatically tell the GPS where to go.


    ### Java ME Innovation


    At this point, pretty much everything that’s possible with the current state of
    the Java ME platform has already been done, either commercially or as a proof
    of concept. The only thing left to do is bring more of the proof-of-concept applications
    into the real world. This is happening gradually as hardware is becoming more
    powerful. For example, graphical processing algorithms that were unfeasible five
    years ago can now be run on modern-day Java ME devices, and 3D touchscreen games
    are no longer just wishful thinking. The same applies for GPS software, web browsers,
    and other categories of software that were unfeasible in the past.


    And there are many other types of applications, more or less proofs of concept,
    that are waiting to be put in the spotlight (for example, e-banking clients and
    home remote-control applications). These applications are not yet ready for prime
    time, but their time will undoubtedly come, as living in a connected world implies
    that people want to do more and more things on the go.


    With `MIDP 2.0` devices replacing old `MIDP 1.0` ones, and with the increasing
    number of mobile phones appearing in the developing world, the potential to truly
    innovate (and possibly even change lives) is there, though on a different level.
    For example, applications that we might regard as being useless or puerile here,
    such as an application that teaches young children how to read and count, are
    an invaluable tool in parts of the world where education is scarce. This mix of
    technology, innovation, and social concern can make a difference—and Java ME is
    the perfect platform for it.


    However, real innovation will take off when `MIDP 3.0` devices appear on the market,
    and when NFC becomes widespread. Each of these technologies provides as many innovation
    opportunities as the leap from `MIDP 1.0` to `MIDP 2.0` did.


    For example, `MIDP 3.0` will open the door for more-realistic games and more-powerful
    applications that are currently not possible (for example, applications that run
    in the background or as widgets). `MIDP 3.0` will also open the possibility of
    having applications work as service providers, providing their services and capabilities
    to other applications.


    A picture-editing application will be able to share its data in real time with
    a document-editing application. This will allow the document editor application
    to embed image files in formats that it does not natively support, but that are
    supported by the picture-editing application. Furthermore, this makes it possible
    to edit a picture in the picture-editing software and instantly see the results
    reflected in the document. There are many opportunities to be seized here.


    As for NFC, its widespread adoption will turn mobile phones into particularly
    powerful tools, and Java ME phones will be like army knives: small, cheap, yet
    very powerful. As mentioned earlier, you will be able to use your mobile phone
    for anything from paying your bills to starting up your car.


    There is great potential for innovation here. For example, you could potentially
    use your phone as a shopping assistant: you would just place you phone near a
    product you’re interested in, and it would save that product in your “wanted”
    list, but it would also be able to compare it to other similar products available
    in the same store and provide you with detailed information about it. Or you could
    combine `MIDP 3.0` and NFC to create really interesting social applications, such
    as a background-running social MIDlet that allows you to quickly exchange business
    cards and befriend another person on Facebook just by having the two of your touch
    your mobile phones together.'
