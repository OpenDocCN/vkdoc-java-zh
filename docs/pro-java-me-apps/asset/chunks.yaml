    ## Java ME 框架


    在开始开发实际应用程序之前，我们还需要完成几个步骤。其中大部分都是琐碎的工作，比如设置源代码管理和创建 IDE 项目，因此我们将完全跳过这些步骤。然而，有一个非常重要的步骤我们无法跳过：编写应用程序的框架。


    本章具有双重目的：既概述了我们将要使用的框架的基础知识，也为一般 Java ME 框架应如何编写提供了基础。


    基于此，我们的框架虽然功能完备，但在本质上将大大简化。代码将尽可能保持简单，所有不必要的内容要么被省略，要么被精简到最低限度。因此，请随意尝试、改进并根据您的需求和项目进行调整。请记住我们在第
    1 章中讨论的内容：永远不要拿来一个框架就直接使用（原因稍后会解释）。


    ### 使用框架的重要性


    简而言之，一个优秀的框架，在其之上构建应用程序，能显著提高最终产品强大、稳固且灵活的可能性。


    例如，一个 Java ME 应用程序通常运行多个线程：UI 线程、网络线程、数据处理线程等。这些线程需要能够相互通信。此外，它们需要以一种既不会阻塞也不会干扰其他线程，并且能最小化开销的方式进行通信。对此，一个很好的解决方案是使用基于事件的系统：每当应用程序的某个部分发生感兴趣的事情时，就会触发一个事件，而应用程序中正在“监听”的其他部分随后可以响应并对此事件做出反应。


    如果没有框架来提供这种功能，这些线程（或者更确切地说，应用程序中与之对应的各个部分）可能会以不同的方式实现事件，有时只有最细微的差别，但从长远来看，这可能会导致严重的问题。例如，UI
    部分可能会在一个带有事件队列的独立线程中实现事件，而网络部分可能会立即、直接地处理事件，不涉及任何队列。或者应用程序的一个部分可能使用基于优先级的队列，而另一个部分可能使用简单的队列。这可能导致竞态条件、事件处理顺序错乱等问题。事实上，考虑到真实使用场景的复杂性，这种混乱且异构的事件系统的行为最好被描述为“未定义”。


    相比之下，通过在框架中实现事件处理，您不仅可以在整个应用程序中使用一致的事件 API 及其相关约定，还能受益于编写干净且专注的应用程序代码；所有与事件相关的脏活累活都由框架处理。此外，如果需要对事件系统进行大修或调试，可以在一个中心位置（即框架）完成，而无需在应用程序的每个部分分别进行。所有这些都节省了大量的时间、精力和资源。


    事件系统只是一个例子，尽管是一个突出的例子。根据您的应用程序需求，您很可能需要向框架添加其他功能，例如动态资源加载或对象池功能（本书后面会详细介绍对象池）。


    框架的另一个关键功能是它定义了应用程序代码的结构：一个好的框架会为开发者强加一个良好的包结构和类层次结构，使应用程序的源代码更具内聚性且更易于导航。


    最后，一个框架通常附带一套最佳实践和编码指南，这些有时会通过框架 API、包层次结构和类结构的本质来强制执行。这使得代码更加同质化且易于理解，从而减少错误并提高生产力。


    ### 为什么每个应用程序都要有自定义框架？


    许多公司甚至个人都使用一个定制的通用框架来处理他们所有的 Java ME 项目。我个人认为，这是错误的做法：每个项目都应该有自己的、特定于项目的框架。


    原因可以用一个词来概括：开销。例如，假设我们正在编写一个通用框架，但针对的是桌面平台。在这种情况下，我们的事件处理系统很可能基于优先级队列，因为这样会更灵活。这个决定的直接后果是，即使我们所有的事件都具有相同的优先级，事件优先级排序代码仍然必须启动，分析每个事件，并将其放置在队列中的适当位置——请记住，框架是通用的，它不知道所有事件都具有相同的优先级。这会消耗一些
    CPU 时间，但与可用的 CPU 时间相比，这种开销实际上可以忽略不计。


    现在假设我们在 Java ME 框架中做同样的事情。由于我们针对的是性能低得多的硬件，事件优先级排序的开销将会增加。它本身应该仍然相当低调，但当与其他开销来源叠加在一起时，它可能会变得显著——5-10%
    或更多的复合开销肯定是显而易见的，而浪费的资源可以更好地用在其他地方。为了避免这种特定的开销来源，如果我们的应用程序不需要事件的优先级队列，我们只需编写一个使用简单队列而非优先级队列的事件处理系统。这样做的直接后果是，我们的通用框架不再那么通用，因为至少它的一部分已经针对我们的特定应用程序进行了优化。


    然而，要真正最小化开销，我们必须将这类优化应用于整个框架，而不仅仅是其中的一部分。这意味着我们最终会为应用程序得到一个非常流畅、高度定制且资源友好的主干，它很可能与原始框架至少部分不兼容。此外，有时所需的定制非常广泛，以至于从头开始编写一个新框架反而更好。无论如何，对于高质量的
    Java ME 应用程序来说，为不同项目重用同一个框架并不是一个好主意；如果您想要最佳性能，就需要为每个应用程序定制一个框架。

    '
- fmt: "### Defining the Framework's Structure\n\nThe first step in writing a framework\
    \ is to define its basic structure and clarify what parts of it go in what Java\
    \ packages. Since the framework structure usually also defines the package structure\
    \ of the application, we will cover that as well.\n\nAll package names start with\
    \ \"`com.apress`\" in our case, but to save space, this prefix has been omitted\
    \ in [Table 2-1](#Chapter02.html#tab_2_1).\n\n**Table 2-1.** The Framework and\
    \ Application Structure\n\n| **Package** | **Description** |\n| --- | --- |\n\
    | `framework.objecttypes` | Defines the basic object types used by the framework\
    \ and the application, such as `Model`, `Controller`, `View`, `Event`, etc. |\n\
    | `framework.common` | Implementations of commonly used objects, such as the `EventController`;\
    \ if you have many commonly used objects, it might make sense to split this package\
    \ into sub-packages, according to object type. |\n| `framework.core` | Implementations\
    \ of core framework objects, such as the `Application` static class |\n| `framework.helpers`\
    \ | All helper and utility classes go here. |\n| `app.models` | All global models\
    \ (models that logically do not belong to a single module) go here—for example,\
    \ the `TwitterUser` model. |\n| `app.module.<NAME>` | Each module gets its own\
    \ package. |\n| `app.module.<NAME>.models` `app.module.<NAME>.views` `app.module.<NAME>.controllers`\
    \ `app.module.<NAME>.managers` `app.module.<NAME>.helpers` `app.module.<NAME>.classes.*`\
    \ | The models, views, and controllers specific to each module go into their corresponding\
    \ package. The same is true for managers, helpers, and other classes. |\n| `app.media`,\
    \ `app.files` `app.media.<NAME>` `app.files.<NAME>` | All media and other non-code\
    \ files go here. For example, global media files go in the `app.media` package,\
    \ while module-specific files go in the `app.media.<NAME>` package. |\n\nThis\
    \ is, of course, not the only way to structure a framework and the applications\
    \ based on it, but this is the package layout I typically use. It allows for a\
    \ clear separation of code and responsibilities, while at the same time ensuring\
    \ that developers don't get lost in package names and deep package trees.\n\n\
    Now that we have our skeleton, it's time to put some meat on the bones. Specifically,\
    \ we will populate the first three packages from the preceding table with the\
    \ appropriate entities. The end result will be an extremely simple but usable\
    \ framework.\n\nWe will start with the `com.apress.framework.objecttypes` package.\n\
    \n### Basic Object Types\n\nMost frameworks, ours included, are largely based\
    \ on the Model-View-Controller paradigm, with a few modifications. This is the\
    \ most flexible paradigm for Java ME development, as it allows for the high level\
    \ of abstraction and flexibility that developers need to cover all their bases.\n\
    \n**NOTE:** The main exceptions to this rule are game frameworks, which by their\
    \ very nature require a different approach and mindset than application frameworks.\
    \ For example, as games are typically very fast-paced, using events to handle\
    \ communication between different parts of the code can prove to be slow and inefficient\
    \ resource-wise. As such, game frameworks tend to use less flexible but more efficient\
    \ means of communication, such as direct method calls between objects belonging\
    \ to different areas of the application.\n\nIf the subject of Java ME game writing\
    \ interests you, Apress has a good selection of books that cover it.\n\nThe MVC\
    \ paradigm should already be familiar to you, so instead of going deep into it,\
    \ we'll just recap its basic object types.\n\nOn top of this basic design, we\
    \ will add a few more object types of our own:\n\n*   *Events* define, as their\
    \ name suggests, events that take place during the application's runtime.\n* \
    \  *Event listeners* respond to events.\n*   *Providers* retrieve, extract, or\
    \ generate objects or data from various sources, typically external ones such\
    \ as the native address book or a server.\n*   *Consumers* are the counterparts\
    \ to providers, in that they are used for sending data or objects to external\
    \ sources.\n*   *Managers* handle and manipulate collections of objects.\n*  \
    \ *Models* are representations of the data types manipulated by the application,\
    \ such as Tweets and Contacts.\n*   *Controllers* generally control the program\
    \ flow.\n*   *Views* are responsible for drawing what the user sees on the screen,\
    \ the forms and the UI widgets, based on the models and instructions given by\
    \ controllers.\n\nWe will go over these types one by one. As mentioned previously,\
    \ every class and interface discussed in this section belongs in the `com.apress.framework.objecttypes`\
    \ package.\n\nBefore we continue, here is a quick side note. As our framework\
    \ will be primarily event-based, a large portion of this chapter will be dedicated\
    \ to events and event handling. Event-based development is pretty much the only\
    \ paradigm that really works for Java ME applications, because with it everything\
    \ is separated in discrete and individual units (events). This gives developers\
    \ almost complete control over what is processed when and in what way.\n\n####\
    \ Events\n\nEvents will be passed around a lot throughout the application, so\
    \ it is important that they are both easy to use and clearly defined.\n\nThus,\
    \ an event has three basic components: the event context, the event type, and\
    \ the event payload. The context and the type define what kind of event has occurred\
    \ and where, while the event payload provides extra information about the event,\
    \ such as what object has been affected by it.\n\nTo be able to properly define\
    \ events, we need two classes. One is the actual event class, shown in [Listing\
    \ 2–1](#Chapter02.html#list_2_1).\n\n**Listing 2–1.** *The `Event` Class*\n\n\
    ```\npackage com.apress.framework.objecttypes;\n\npublic class Event\n{\n    protected\
    \ int context;\n    protected int type;\n    protected Object payload;\n\n   \
    \ public Event(int context, int type, Object payload)\n    {\n        this.context\
    \ = context;\n        ...\n    }\n\n    public int getContext()\n    {\n     \
    \   return this.context;\n    }\n\n    ...\n}\n```\n\nThe other class is a descriptor\
    \ for all possible event contexts and event types. For brevity and code clarity,\
    \ we will name this class `EVT`. It is presented in [Listing 2–2](#Chapter02.html#list_2_2).\n\
    \n**Listing 2–2.** *The `EVT` Class*\n\n```\npackage com.apress.framework.objecttypes;\n\
    public class EVT\n{\n    public class CONTEXT\n    {\n        public static final\
    \ int NONE = -1;\n        public static final int LOCAL = 0;\n        public static\
    \ final int STARTUP = 1;\n        public static final int SHUTDOWN = 2;\n    \
    \    public static final int LOGIN_FORM = 3;\n        ...\n    }\n\n    public\
    \ class CONTACTS\n    {\n        public static final int ADD_CONTACT = 1;\n  \
    \      public static final int REMOVE_CONTACT = 2;\n    }\n    ...\n}\n```\n\n\
    This approach makes using events easy as pie. For example, to create an event\
    \ that signals that a new contact has been added during the startup process, all\
    \ we have to do is this:\n\n```\nEvent someEvent = new Event( EVT.CONTEXT.STARTUP,\
    \ EVT.CONTACTS.ADD_CONTACT,\ncontactObject );\n```\n\nHandling events is another\
    \ matter altogether, and quite a more complex one, spanning many areas of the\
    \ framework and of the application.\n\nWe will need event listeners to respond\
    \ to them (which are up next), event controllers to dispatch events to the listeners,\
    \ event controller managers to bundle together event controllers (this is done\
    \ for practical reasons), and a way to have event controller managers run on their\
    \ own independent threads, so as not to interfere with the rest of the application.\
    \ As we go along, all of these entities will be covered in the sections dedicated\
    \ to their corresponding packages."
