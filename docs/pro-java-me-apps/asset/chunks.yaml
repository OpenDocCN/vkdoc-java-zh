    ### 实现其他图形效果


    还有许多图形效果可供实现。例如，你可以实现一个基于粒子的系统，将给定图像“炸开”成许多更小的碎片（或者反向操作，将小碎片组合成完整图像）。


    为你的技能库增添更多图形效果的关键在于你的想象力，以及对 Java ME 功能的巧妙运用。例如，刚才提到的爆炸效果实际上对 CPU 非常友好，因为你只需计算每个碎片的位置，然后使用源图像作为图像映射，在每个对应位置绘制碎片。


    你还应该意识到，你可以创建两种类型的效果：适合实时使用的和不适于实时使用的。图像遮罩是适合实时使用的效果的绝佳例子，因为它简单且快速。然而，如果你尝试实现图像滤镜（例如，Photoshop
    中的水彩效果），很可能无法在实时场景中使用它们。这并不是说它们没有用处；例如，根据用户自己的图像来个性化应用程序是一件非常好的事情，而滤镜可以极大地帮助实现这一目标。


    实现自己的图形效果总是一种非常有成就感的体验。操作像素总是很有趣，在这个过程中，你将学到许多与计算机图形学、代码优化、编程技巧和数学相关的知识。更不用说，最终你可以用自己编写的代码给朋友、同事甚至老板留下深刻印象。


    话虽如此，以下是一些你可以考虑实现的图形效果：


    *   基于粒子的系统，如本节示例所示。

    *   图像模糊和图像锐化。

    *   图像抗锯齿。

    *   图像倾斜效果（例如，使图像看起来像梯形，或使其像旗帜一样摆动）。

    *   图像去饱和（将彩色图像转换为黑白图像）。

    *   艺术滤镜，例如水彩和浅浮雕效果。

    *   图像变形（无缝融合两张图像的内容，而非其像素——例如，将你的脸与配偶的脸融合）。需要提醒你：这是一个极难实现的效果。


    ### 组合多种效果


    经过适当优化后，本章介绍的效果可以组合起来，产生更惊人的结果。例如，可以创建公司标志的旋转且带纹理的版本，其中纹理是通过混合两张图像获得的。当所涉及效果的各种参数（例如，旋转角度改变，混合操作的透明度系数也随之改变）发生变化以创建动画时，这种方法最为有效。


    此时，你可能想知道这到底有多可行。几年前，我问过自己同样的问题。于是我着手创建一个既快速又强大的 Java ME 图形效果库。我很好奇 Java ME 平台在这个领域能被推到何种程度，并且对这个名为
    J2ME Army Knife 的库最终的表现感到非常满意。


    最有趣和最令人惊讶的事情（至少对我来说）是图形效果在速度方面可以达到的优化水平。例如，在优化了图像旋转代码后，我能够在诺基亚 E50 上每秒将近 100 次地旋转一张
    64×64 的图像。一个有趣的题外话是，我已经有两年多没有对这个库做任何严肃的工作了（这在软件开发中算是一段很长的时间），但我仍然偶尔会收到人们的邮件，说他们对代码运行的速度感到惊讶，并认为这确实展示了
    J2ME Army Knife 的“先进水平”。


    **注意：** 有关 J2ME Army Knife 的更多信息，请访问 [www.j2mearmyknife.com](http://www.j2mearmyknife.com)。在那里你可以看到该库的实际运行效果（现场演示），也可以下载它。以二进制形式使用是完全免费的，甚至可用于商业项目，所以试试看吧！


    在非动态环境下，组合多种效果甚至更为可行。虽然单个动画帧通常需要在最多 100 毫秒内计算完毕以获得“流畅”的感觉，但对于静态图形，你可以使用长达 500
    毫秒的时间来完成计算（如果处理在单独的后台线程中进行，甚至可能更长）。这意味着你可以处理更大的源图像，或者串联更多的效果。


    另一个非常强大的技术是将动态图形效果与图像映射结合使用。例如，让我们考虑前面带纹理的标志被旋转并制作成动画的场景。与其每次都重新计算每一帧，不如只在第一次需要时计算帧，然后将它们放入图像映射中。然后，当动画循环时，不再重新计算帧，而是使用存储在图像映射中的数据。总体而言，这非常快，但对于较大的图像确实需要相当多的
    RAM——因此，这种技术的效果会因目标设备而异。


    最后，组合图形效果可以通过两种方式之一完成。第一种选择是逐个应用每个效果：第一个效果的输出成为第二个效果的输入，依此类推。虽然这很灵活，因为每个效果都是独立的，但它也有缺点，即给整体结果增加了大量开销。例如，如果链中的两个效果都需要处理每个像素的
    Alpha、红、绿、蓝值，那么这两个效果都必须分别进行提取。


    第二种选择是创建元效果；例如，你可以将旋转和调整大小效果结合起来。这具有消除大量不必要开销的优势，因为两个效果的许多共同计算只需进行一次，并且像 ARGB
    数组这样的内存对象可以被重用。如果消除的开销发生在像素级别（即，在操作单个像素的内循环中），性能提升尤其显著。


    ### 总结


    在本章中，你学习了几种高级 Java ME 图形技术：图像混合、图像遮罩、图像调整大小和图像旋转。你了解了这些技术背后的原理及其各种用例。在下一章中，你将了解一些
    Java ME 开发故事，并探讨它们背后的寓意。


    ## 第 14 章

