- fmt: "# The `SimpleTextButton` Class\n\nContainers are fine, but they do nothing\
    \ on their own. In order to be useful, they must be populated with widgets. The\
    \ most basic widget we can implement is the button. Buttons can be simple text\
    \ elements or complex widgets that contain both text and images, or even other\
    \ widgets. However, to keep this simple, in our UI module we will implement only\
    \ a simple text button, aptly named `SimpleTextButton`.\n\nA simple text button\
    \ has a text, a theme, and optionally a `CallbackHandler` to process its events,\
    \ as shown in [Listing 6–22](#Chapter06.html#list_6_22). It also has a padding\
    \ for its text content, which we will hard-code to keep the code simple.\n\n**Listing\
    \ 6–22.** *The Basic `SimpleTextButton` Class*\n\n```\npackage app.module.ui.classes;\n\
    ...\npublic class SimpleTextButton extends BaseWidget\n{\n    protected int PADDING\
    \ = 5;\n    ...\n\n    public SimpleTextButton(String text, CallbackHandler handler,\
    \ UITheme theme)\n    {\n        this.text = text;\n        this.handler = handler;\n\
    \        this.theme = theme;\n    }\n    ...\n}\n```\n\nNext comes the fun stuff:\
    \ drawing the button. Its `paint()` method is shown in [Listing 6–23](#Chapter06.html#list_6_23).\n\
    \n**Listing 6–23.** *The `paint()` Method*\n\n```\npublic void paint(Graphics\
    \ g)\n{\n        ClipHelper.setClipOn(this, g);\n        int bgColor = theme.getNotSelectedBgColor();\n\
    \        int fgColor = theme.getNotSelectedFgColor();\n        if ( isFocused()\
    \ )\n        {\n           bgColor = theme.getSelectedBgColor();\n           fgColor\
    \ = theme.getSelectedFgColor();\n        }\n\n        // Draw BG\n        g.setColor(bgColor);\n\
    \        g.fillRoundRect(getAbsoluteX(), getAbsoluteY(), getTotalWidth(),\n  \
    \      getTotalHeight(), 15, 15);\n\n        // Draw text;\n        g.setColor(fgColor);\n\
    \        g.setFont(theme.getSelectedFont());\n        int sizeInPixels = theme.getSelectedFont().stringWidth(text);\n\
    \        int posX = (getTotalWidth() - sizeInPixels) / 2;\n        g.drawString(text,\
    \ getAbsoluteX() + posX, getAbsoluteY()+PADDING,\n        Graphics.TOP | Graphics.LEFT\
    \ );\n\n        ClipHelper.resetClip(g);\n}\n```\n\nThe interesting part of the\
    \ code is highlighted. You can see that we set the appropriate clip on the `Graphics`\
    \ object before drawing the button, so as not to overflow its visible area, and\
    \ that we set the background and foreground colors according to the theme used\
    \ and whether the button is focused.\n\nFinally, let’s see how user interactions\
    \ are handled. The appropriate methods are shown in [Listing 6–24](#Chapter06.html#list_6_24).\n\
    \n**Listing 6–24.** *Handling User Interactions*\n\n```\npublic boolean handleKeyReleased(int\
    \ key)\n{\n        if ( GameCanvas.FIRE == KeyHelper.getGameAction(key) )\n  \
    \      {\n                fireEvent();\n                return true;\n       \
    \ }\n        return false;\n}\n\npublic boolean handlePointerReleased(int x, int\
    \ y)\n{\n        super.handlePointerReleased(x,y);\n        fireEvent();\n   \
    \     return true;\n}\n\nprotected void fireEvent()\n{\n        if ( handler !=\
    \ null )\n        {\n                Event event = new Event(EVT.CONTEXT.UI_MODULE,\
    \ EVT.UI.BUTTON_PRESSED,\n this);\n                handler.doCallback(event);\n\
    \        }\n}\n```\n\nThe code is extremely simple and no comments are needed—and\
    \ yet, surprisingly, it works! In its current state, the `SimpleTextButton` is\
    \ good enough for our purposes; however, if we wanted to make things more interesting,\
    \ we could have made the button smarter by detecting whether it is pressed and\
    \ change its drawing colors appropriately—feel free to do so yourself if you want\
    \ to.\n\nThat’s all there is to our `SimpleTextButton` class. Let’s now move to\
    \ something more complex, the `StringItem` class.\n\n# The `StringItem` Class\n\
    \nAs the name suggests, a `StringItem` is a widget that displays text. This is\
    \ extremely easy to do in its simplest form, but we want to spice things up by\
    \ having the `StringItem` display only two lines of text when it is not focused,\
    \ and the full text (or as much of it as it fits in the given bounds) when it\
    \ is focused—in other words, the widget can dynamically change its size. Also,\
    \ like the `SimpleTextButton`, the widget will trigger a `BUTTON_PRESSED` event\
    \ upon activation. The methods for this are identical to the ones in `SimpleTextButton`,\
    \ so they will not be presented here.\n\nWe’ll start with the basic constructor\
    \ for the class, as shown in [Listing 6–25](#Chapter06.html#list_6_25).\n\n**Listing\
    \ 6–25.** *The `StringItem` Constructor*\n\n```\npackage app.module.ui.classes;\n\
    \nimport app.module.ui.helpers.UITextHelper;\n...\n\npublic class StringItem extends\
    \ BaseWidget\n{\n    protected String [] linesSelected, linesNotSelected;\n  \
    \  ....\n\n    public StringItem(String string, int maxLineWidth, int maxTextHeight,\n\
    \    CallbackHandler handler, UITheme theme)\n    {\n        this.maxHeight =\
    \ maxTextHeight;\n        this.maxWidth = maxLineWidth;\n        this.theme =\
    \ theme;\n         this.handler = handler;\n        setText(string);\n    }\n\n\
    \    public void setText(String text)\n    {\n        linesSelected = UITextHelper.wrapText(text,\
    \ maxWidth, maxHeight,\n theme.getSelectedFont());\n        linesNotSelected =\
    \ UITextHelper.wrapText(text, maxWidth,\n theme.getNotSelectedFont().getHeight()\
    \ * 2, theme.getNotSelectedFont());\n        ...\n    }\n}\n```\n\nYou can see\
    \ from the highlighted code that the widget keeps tracks of two sets of text lines,\
    \ the one to be used when it is focused and the one to be used when it is not\
    \ focused. Calculation of the `String` arrays is done by the `UITextHelper`, which\
    \ can neatly reformat and clip text so that it fits within the given width and\
    \ height when rendered with the specified font.\n\nNext up are the `onFocus()`\
    \ and `onLostFocus()` methods, shown in [Listing 6–26](#Chapter06.html#list_6_26).\n\
    \n**Listing 6–26.** *The `onFocus()` and `onLostFocus()` Methods*\n\n```\npublic\
    \ boolean onFocus()\n{\n        super.onFocus();\n        if ( getParent() !=\
    \ null )\n        {\n                getParent().doLayout();\n        }\n    \
    \    return true;\n}\n\npublic boolean onLostFocus()\n{\n        super.onLostFocus();\n\
    \        if ( getParent() != null )\n        {\ngetParent().doLayout();\n    \
    \    }\n        return false;\n}\n```\n\nThe interesting parts of the methods\
    \ are the `doLayout()` calls. These are necessary, as the size of the widget changes\
    \ whenever focus changes. In fact, all dynamically sized widgets must call `getParent().doLayout()`\
    \ whenever their size changes so that the parent container gets the chance to\
    \ rearrange everything.\n\nDetermining the height of the widget is also done dynamically\
    \ based on focus state, as can be seen in [Listing 6–27](#Chapter06.html#list_6_27).\n\
    \n**Listing 6–27.** *Dynamically Determining the Size of a `StringItem`*\n\n```\n\
    public int getPreferredContentHeight()\n{\n        Font font = theme.getNotSelectedFont()\
    \ ;\n        String [] text = linesNotSelected;\n        if ( isFocused() )\n\
    \        {\n                font = theme.getSelectedFont();\n                text\
    \ = linesSelected;\n        }\n        return PADDING * 2 + text.length * font.getHeight();\n\
    }\n```\n\nDrawing the widget is done dynamically too, as shown in [Listing 6–28](#Chapter06.html#list_6_28).\
    \ You can see that the entire color scheme is changed based on whether the widget\
    \ is focused.\n\n**Listing 6–28.** *Drawing the `StringItem`*"
