- fmt: "### Adding Custom Localization Support to a Java ME Application\n\nNow that\
    \ we know what a good localization module looks like, and why utilizing JSR 238\
    \ is generally not feasible, we can begin writing our own custom localization\
    \ support module.\n\nFor our application, we will implement only file-based localization\
    \ (with the localization files stored inside the JAR); however, we will include\
    \ support for reading localization files from generic `DataInputStream`s, so you\
    \ can add web-based localization support if you want.\n\nThe first thing we need\
    \ to do is to define a structure for our localization files. We want something\
    \ that is both easy to parse and easy to understand, so we'll go for the generic\
    \ structure shown in [Listing 7–1](#Chapter07.html#list_7_1).\n\n**Listing 7–1**.\
    \ *The Generic Localization File Structure*\n\n```\n<key #1>\n<value #1>\n<key\
    \ #2>\n<value #2>\n\n# Lines starting with \"#\" are comment lines\n# so you can\
    \ use them to explain what each translation is used for, for example.\n# Empty\
    \ lines are also ignored.\n\n<key #3>\n<value #3>\n\n…\n```\n\nAs for the key/value\
    \ pairs, they come in two forms: generic and parameter-specific. A generic key/value\
    \ pair is shown in [Listing 7–2](#Chapter07.html#list_7_2).\n\n**Listing 7–2.**\
    \ *A Generic Key/Value Pair*\n\n```\nsome.key\nThis is the value of \"some.key\"\
    , and here --> {@} <-- is the parameter\n\nnew.email\nYou have {@} new emails\n\
    ```\n\nThe convention for keys is that they are unique and that “.” is used instead\
    \ of spaces to separate the pieces (or words) of each key. The convention for\
    \ values is that each value can have at most one parameter and that the parameter\
    \ is marked with the character sequence “{@}”. The restriction for having at most\
    \ one parameter is there because otherwise supporting parameter-specific keys\
    \ would be extremely difficult: if your value has two parameters, and each parameter\
    \ has three special cases and a generic case, then you will need to have 4×4=16\
    \ key/value pairs to cover all possible combinations, which is not feasible. If\
    \ you do need to have two parameters in the same string, all you have to do is\
    \ simply split that string into two smaller ones, with one parameter each.\n\n\
    Parameter-specific key/value pairs are almost identical to generic key/value pairs,\
    \ as can be seen in [Listing 7–3](#Chapter07.html#list_7_3).\n\n**Listing 7–3.**\
    \ *Parameter-Specific Key/Value Pairs*\n\n```\nsome.key:1\nThis is the value for\
    \ when the parameter is 1\n\nsome.key:a string value\nThis is the value for when\
    \ the parameter is \"a string value\"\n\nnew.email:0\nNo new emails\n\nnew.email:1\n\
    One new email\n```\n\nThe only difference is that after the key name a “:” is\
    \ added, followed by the parameter value to which that key/value pair pertains.\
    \ This can be seen in the highlighted portion of the snippet. You will also notice\
    \ that parameter-specific key/value pairs have no parameter placeholder in their\
    \ values. Since the value of the parameter is known, you can directly insert it\
    \ in the value instead of the placeholder. That being said, you *can* use parameter\
    \ placeholders, but doing so makes little sense, except perhaps to save some space.\n\
    \nSo how does this whole key/value thing work? Supposed we wanted to retrieve\
    \ the value corresponding to the key “`new.email`” with a parameter of 5. The\
    \ localization module will first check to see if a “`new.email:5`” key exists.\
    \ Since none exists, it will simply use the generic “`new.email`” key with the\
    \ appropriate parameter. Thus, it will return “`You have 5 new emails`”. If the\
    \ parameter's value would have been 0, then the localization module would have\
    \ returned “`No new emails`” instead, corresponding to the parameter-specific\
    \ “`new.email:0`” key.\n\nAs for the localization files themselves, they will\
    \ be named after the locales they implement—for example, “`en-US.bin`” or “`ro-RO.bin`”—and\
    \ they will be stored in the package `app.files.L10n`. The reason these files\
    \ are `.bin` files as opposed to `.txt` files will be discussed shortly.\n\n####\
    \ Processing Localization Files\n\nNow that we know how to create our localization\
    \ files, the next step is to load the files into our Java ME application. Unfortunately,\
    \ this is easier said than done.\n\nThe reason for this is simple: Java ME doesn't\
    \ have anything resembling a `readLine()` method, which would allow us to read\
    \ the files line by line. Thus, we are forced to process the files character by\
    \ character, or rather byte by byte as Java's `char` data type is two bytes long,\
    \ and thus incompatible with either plain ASCII or UTF-8 encodings. However, while\
    \ processing files byte by byte is certainly doable, it is also extremely slow\
    \ (especially by Java ME standards) and can prove to be quite complicated. Fortunately,\
    \ there's a far better way to solve our file-reading problem.\n\nWhile Java ME\
    \ doesn't have a `readLine()` method, its `DataInputStream` class does have a\
    \ `readUTF()` method, which can read Java UTF–encoded strings. There's one catch,\
    \ though: `readUTF()` uses a modified UTF encoding scheme (as defined in Java's\
    \ specs), so using it to read regular UTF strings or plain-text files will fail.\
    \ To get around this problem, we will use a little trick—namely, we will process\
    \ the original translation files using a J2SE application, which will output binary\
    \ files that can be read by Java ME's `readUTF()` method.\n\nThis is actually\
    \ a lot easier than it sounds. Furthermore, it allows us to streamline and optimize\
    \ the output translation files on the J2SE side—for example, by removing all comments\
    \ and empty lines, thus providing an extra speed boost and decreasing overall\
    \ JAR size. The J2SE application that does this is shown in [Listing 7–4](#Chapter07.html#list_7_4).\n\
    \n**Listing 7–4.** *Processing Translation Files on the J2SE Side*\n\n```\npackage\
    \ com.apress;\n\n...\n\npublic class TranslationFileConverter {\n\n    public\
    \ static void main(String[] args) {\n        String sourceFile = args[0];\n  \
    \      String destFile = args[1];\n        String lineIn = \"\";\n        try\n\
    \        {\n            DataInputStream in = new DataInputStream( new FileInputStream(sourceFile));\n\
    \            BufferedReader br = new BufferedReader(new InputStreamReader(in));\n\
    \            DataOutputStream out = new DataOutputStream(new FileOutputStream(\n\
    \                                    destFile));\n\n            while ( ( lineIn\
    \ = br.readLine()) != null )\n            {\n                // Ignore comments\
    \ and empty lines\n                if ( lineIn.length() == 0 || lineIn.charAt(0)\
    \ == '#' )\n                {\n                    continue;\n               \
    \ }\n                out.writeUTF(lineIn);\n            }\n\n            out.close();\n\
    \            br.close();\n        }\n        catch (Exception ex)\n        {\n\
    \            ex.printStackTrace();\n            // Do nothing\n        }\n   \
    \ }\n\n}\n```\n\nThe highlighted lines are where the magic happens. Unlike Java\
    \ ME, J2SE does have a `readLine()` method, which makes reading the original input\
    \ files incredibly easy. Furthermore, J2SE's `writeUTF()` method is compatible\
    \ with J2ME's `readUTF()` method, since they implement the same encoding standard—so\
    \ that's another problem that's taken care of quite easily. In the end, all the\
    \ J2SE application does is read valid lines from the original input file and write\
    \ them one after another in the output file as `readUTF()`–compatible strings,\
    \ which can easily be read from Java ME.\n\nTo use the application, all you have\
    \ to do is run the following line at the command prompt:\n\n```\njava –jar TranslationFileConverter.jar\
    \ C:\\translations\\en-US.txt C:\\output\\en-US.bin\n```\n\nThe first parameter\
    \ is the location of the original translation file, while the second parameter\
    \ is the location of the output file. As a convention to help differentiate between\
    \ the original files and the processed files, the processed ones will have a “`.bin`”\
    \ extension. Finally, make sure that both directories (for the original and processed\
    \ files) are valid and existing before running the application."
  raw: '### Adding Custom Localization Support to a Java ME Application


    Now that we know what a good localization module looks like, and why utilizing
    JSR 238 is generally not feasible, we can begin writing our own custom localization
    support module.


    For our application, we will implement only file-based localization (with the
    localization files stored inside the JAR); however, we will include support for
    reading localization files from generic `DataInputStream`s, so you can add web-based
    localization support if you want.


    The first thing we need to do is to define a structure for our localization files.
    We want something that is both easy to parse and easy to understand, so we''ll
    go for the generic structure shown in [Listing 7–1](#Chapter07.html#list_7_1).


    **Listing 7–1**. *The Generic Localization File Structure*


    `<key #1>`

    `<value #1>`

    `<key #2>`

    `<value #2>`


    `# Lines starting with “#” are comment lines`

    `# so you can use them to explain what each translation is used for, for example.`

    `# Empty lines are also ignored.`


    `<key #3>`

    `<value #3>`


    `…`


    As for the key/value pairs, they come in two forms: generic and parameter-specific.
    A generic key/value pair is shown in [Listing 7–2](#Chapter07.html#list_7_2).


    **Listing 7–2.** *A Generic Key/Value Pair*


    `some.key`

    `This is the value of “some.key”, and here --> {@} <-- is the parameter`


    `new.email`

    `You have {@} new emails`


    The convention for keys is that they are unique and that “.” is used instead of
    spaces to separate the pieces (or words) of each key. The convention for values
    is that each value can have at most one parameter and that the parameter is marked
    with the character sequence “{@}”. The restriction for having at most one parameter
    is there because otherwise supporting parameter-specific keys would be extremely
    difficult: if your value has two parameters, and each parameter has three special
    cases and a generic case, then you will need to have 4×4=16 key/value pairs to
    cover all possible combinations, which is not feasible. If you do need to have
    two parameters in the same string, all you have to do is simply split that string
    into two smaller ones, with one parameter each.


    Parameter-specific key/value pairs are almost identical to generic key/value pairs,
    as can be seen in [Listing 7–3](#Chapter07.html#list_7_3).


    **Listing 7–3.** *Parameter-Specific Key/Value Pairs*


    `some.key:`**`1`**

    `This is the value for when the parameter is 1`


    `some.key`**`:a string value`**

    `This is the value for when the parameter is “a string value”`


    `new.email:0`

    `No new emails`


    `new.email:1`

    `One new email`


    The only difference is that after the key name a “:” is added, followed by the
    parameter value to which that key/value pair pertains. This can be seen in the
    highlighted portion of the snippet. You will also notice that parameter-specific
    key/value pairs have no parameter placeholder in their values. Since the value
    of the parameter is known, you can directly insert it in the value instead of
    the placeholder. That being said, you *can* use parameter placeholders, but doing
    so makes little sense, except perhaps to save some space.


    So how does this whole key/value thing work? Supposed we wanted to retrieve the
    value corresponding to the key “`new.email`” with a parameter of 5\. The localization
    module will first check to see if a “`new.email:5`” key exists. Since none exists,
    it will simply use the generic “`new.email`” key with the appropriate parameter.
    Thus, it will return “`You have 5 new emails`”. If the parameter''s value would
    have been 0, then the localization module would have returned “`No new emails`”
    instead, corresponding to the parameter-specific “`new.email:0`” key.


    As for the localization files themselves, they will be named after the locales
    they implement—for example, “`en-US.bin`” or “`ro-RO.bin`”—and they will be stored
    in the package `app.files.L10n`. The reason these files are `.bin` files as opposed
    to `.txt` files will be discussed shortly.


    #### Processing Localization Files


    Now that we know how to create our localization files, the next step is to load
    the files into our Java ME application. Unfortunately, this is easier said than
    done.


    The reason for this is simple: Java ME doesn''t have anything resembling a `readLine()`
    method, which would allow us to read the files line by line. Thus, we are forced
    to process the files character by character, or rather byte by byte as Java''s
    `char` data type is two bytes long, and thus incompatible with either plain ASCII
    or UTF-8 encodings. However, while processing files byte by byte is certainly
    doable, it is also extremely slow (especially by Java ME standards) and can prove
    to be quite complicated. Fortunately, there''s a far better way to solve our file-reading
    problem.


    While Java ME doesn''t have a `readLine()` method, its `DataInputStream` class
    does have a `readUTF()` method, which can read Java UTF–encoded strings. There''s
    one catch, though: `readUTF()` uses a modified UTF encoding scheme (as defined
    in Java''s specs), so using it to read regular UTF strings or plain-text files
    will fail. To get around this problem, we will use a little trick—namely, we will
    process the original translation files using a J2SE application, which will output
    binary files that can be read by Java ME''s `readUTF()` method.


    This is actually a lot easier than it sounds. Furthermore, it allows us to streamline
    and optimize the output translation files on the J2SE side—for example, by removing
    all comments and empty lines, thus providing an extra speed boost and decreasing
    overall JAR size. The J2SE application that does this is shown in [Listing 7–4](#Chapter07.html#list_7_4).


    **Listing 7–4.** *Processing Translation Files on the J2SE Side*


    `package com.apress;`


    `...`


    `public class TranslationFileConverter {`


    `    public static void main(String[] args) {`

    `        String sourceFile = args[0];`

    `        String destFile = args[1];`

    `        String lineIn = "";`

    `        try`

    `        {`

    `            DataInputStream in = new DataInputStream( new FileInputStream(sourceFile));`

    `            BufferedReader br = new BufferedReader(new InputStreamReader(in));`

    `            DataOutputStream out = new DataOutputStream(new FileOutputStream(`

    `                                    destFile));`


    **`while ( ( lineIn = br.readLine()) != null )`**

    **`{`**

    **`// Ignore comments and empty lines`**

    **`if ( lineIn.length() == 0 || lineIn.charAt(0) == ''#'' )`**

    **`{`**

    **`continue;`**

    **`}`**

    **`out.writeUTF(lineIn);`**

    **`}`**


    `            out.close();`

    `            br.close();`

    `        }`

    `        catch (Exception ex)`

    `        {`

    `            ex.printStackTrace();`

    `            // Do nothing`

    `        }`

    `    }`


    `}`


    The highlighted lines are where the magic happens. Unlike Java ME, J2SE does have
    a `readLine()` method, which makes reading the original input files incredibly
    easy. Furthermore, J2SE''s `writeUTF()` method is compatible with J2ME''s `readUTF()`
    method, since they implement the same encoding standard—so that''s another problem
    that''s taken care of quite easily. In the end, all the J2SE application does
    is read valid lines from the original input file and write them one after another
    in the output file as `readUTF()`–compatible strings, which can easily be read
    from Java ME.


    To use the application, all you have to do is run the following line at the command
    prompt:


    `java –jar TranslationFileConverter.jar C:\translations\en-US.txt C:\output\en-US.bin`


    The first parameter is the location of the original translation file, while the
    second parameter is the location of the output file. As a convention to help differentiate
    between the original files and the processed files, the processed ones will have
    a “`.bin`” extension. Finally, make sure that both directories (for the original
    and processed files) are valid and existing before running the application.'
  trans: '

    ### 为 Java ME 应用添加自定义本地化支持


    既然我们已经了解了优秀的本地化模块应具备哪些特性，以及为何通常无法使用 JSR 238，那么我们就可以开始编写自己的自定义本地化支持模块了。


    对于我们的应用，我们将仅实现基于文件的本地化（本地化文件存储在 JAR 包内）；不过，我们会包含从通用 `DataInputStream` 读取本地化文件的支持，因此如果你愿意，也可以添加基于网络的本地化支持。


    我们首先要做的是为本地化文件定义一种结构。我们希望它既易于解析又易于理解，因此我们将采用清单 7–1 中所示的通用结构。


    **清单 7–1.** *通用本地化文件结构*


    `<键 #1>`

    `<值 #1>`

    `<键 #2>`

    `<值 #2>`


    `# 以“#”开头的行是注释行`

    `# 例如，你可以用它们来解释每个翻译的用途。`

    `# 空行也会被忽略。`


    `<键 #3>`

    `<值 #3>`


    `…`


    至于键/值对，它们有两种形式：通用型和参数特定型。通用型键/值对如清单 7–2 所示。


    **清单 7–2.** *通用型键/值对*


    `some.key`

    `这是“some.key”的值，这里 --> {@} <-- 是参数`


    `new.email`

    `你有 {@} 封新邮件`


    键的约定是：键必须唯一，并且使用“.”代替空格来分隔键的各个部分（或单词）。值的约定是：每个值最多只能有一个参数，并且该参数用字符序列“{@}”标记。限制最多只有一个参数的原因是，否则支持参数特定键将极其困难：如果你的值有两个参数，并且每个参数有三种特殊情况和一个通用情况，那么你将需要
    4×4=16 个键/值对才能覆盖所有可能的组合，这是不可行的。如果你确实需要在同一个字符串中包含两个参数，只需将该字符串拆分成两个较小的字符串，每个字符串包含一个参数即可。


    参数特定型键/值对与通用型键/值对几乎相同，如清单 7–3 所示。


    **清单 7–3.** *参数特定型键/值对*


    `some.key:`**`1`**

    `这是参数为 1 时的值`


    `some.key`**`:a string value`**

    `这是参数为“a string value”时的值`


    `new.email:0`

    `没有新邮件`


    `new.email:1`

    `有一封新邮件`


    唯一的区别在于，键名后面添加了一个“:”，后跟该键/值对所对应的参数值。这可以在代码片段中高亮显示的部分看到。你还会注意到，参数特定型键/值对的值中没有参数占位符。由于参数的值是已知的，你可以直接将其插入到值中，而不是使用占位符。话虽如此，你*可以*使用参数占位符，但这样做意义不大，也许除了节省一些空间之外。


    那么，整个键/值机制是如何工作的呢？假设我们想要检索键“`new.email`”对应的值，且参数为 5。本地化模块将首先检查是否存在“`new.email:5`”这个键。由于不存在，它将直接使用通用键“`new.email`”并传入相应的参数。因此，它将返回“`You
    have 5 new emails`”。如果参数值为 0，那么本地化模块将返回“`No new emails`”，对应于参数特定型键“`new.email:0`”。


    至于本地化文件本身，它们将以所实现的语言区域命名——例如，“`en-US.bin`”或“`ro-RO.bin`”——并将存储在包 `app.files.L10n`
    中。这些文件是 `.bin` 文件而不是 `.txt` 文件的原因稍后将讨论。


    #### 处理本地化文件


    既然我们已经知道如何创建本地化文件，下一步就是将文件加载到我们的 Java ME 应用中。不幸的是，这说起来容易做起来难。


    原因很简单：Java ME 没有任何类似于 `readLine()` 的方法，该方法允许我们逐行读取文件。因此，我们被迫逐字符地处理文件，或者更准确地说，是逐字节地处理，因为
    Java 的 `char` 数据类型长度为两个字节，因此与纯 ASCII 或 UTF-8 编码不兼容。然而，虽然逐字节处理文件是可行的，但它也极其缓慢（尤其是按
    Java ME 的标准来看），并且可能相当复杂。幸运的是，有一种更好的方法可以解决我们的文件读取问题。


    虽然 Java ME 没有 `readLine()` 方法，但其 `DataInputStream` 类确实有一个 `readUTF()` 方法，该方法可以读取
    Java UTF 编码的字符串。不过有一个问题：`readUTF()` 使用了一种修改过的 UTF 编码方案（如 Java 规范中所定义），因此用它来读取常规
    UTF 字符串或纯文本文件将会失败。为了解决这个问题，我们将使用一个小技巧——即，我们将使用一个 J2SE 应用来处理原始翻译文件，该应用将输出可由 Java
    ME 的 `readUTF()` 方法读取的二进制文件。


    这实际上比听起来要容易得多。此外，它允许我们在 J2SE 端简化和优化输出的翻译文件——例如，通过移除所有注释和空行，从而提供额外的速度提升并减小整体 JAR
    包大小。执行此操作的 J2SE 应用如清单 7–4 所示。


    **清单 7–4.** *在 J2SE 端处理翻译文件*


    `package com.apress;`


    `...`


    `public class TranslationFileConverter {`


    `    public static void main(String[] args) {`

    `        String sourceFile = args[0];`

    `        String destFile = args[1];`

    `        String lineIn = "";`

    `        try`

    `        {`

    `            DataInputStream in = new DataInputStream( new FileInputStream(sourceFile));`

    `            BufferedReader br = new BufferedReader(new InputStreamReader(in));`

    `            DataOutputStream out = new DataOutputStream(new FileOutputStream(`

    `                                    destFile));`


    **`while ( ( lineIn = br.readLine()) != null )`**

    **`{`**

    **`// 忽略注释和空行`**

    **`if ( lineIn.length() == 0 || lineIn.charAt(0) == ''#'' )`**

    **`{`**

    **`continue;`**

    **`}`**

    **`out.writeUTF(lineIn);`**

    **`}`**


    `            out.close();`

    `            br.close();`

    `        }`

    `        catch (Exception ex)`

    `        {`

    `            ex.printStackTrace();`

    `            // 不做任何处理`

    `        }`

    `    }`


    `}`


    高亮显示的行就是奇迹发生的地方。与 Java ME 不同，J2SE 确实有 `readLine()` 方法，这使得读取原始输入文件变得异常简单。此外，J2SE
    的 `writeUTF()` 方法与 J2ME 的 `readUTF()` 方法兼容，因为它们实现了相同的编码标准——所以另一个问题也轻松解决了。最终，这个
    J2SE 应用所做的就是从原始输入文件中读取有效行，并将它们一个接一个地作为 `readUTF()` 兼容的字符串写入输出文件，这些字符串可以轻松地从 Java
    ME 中读取。


    要使用该应用，你只需在命令提示符下运行以下命令：


    `java –jar TranslationFileConverter.jar C:\translations\en-US.txt C:\output\en-US.bin`


    第一个参数是原始翻译文件的位置，第二个参数是输出文件的位置。作为区分原始文件和处理后文件的约定，处理后的文件将带有“`.bin`”扩展名。最后，在运行该应用之前，请确保两个目录（原始文件和处理后文件的目录）都存在且有效。

