    \ methods.\n\nTouch events are a different story. The widget will by default ignore\
    \ “pointer down” and “pointer dragged” events but will respond to “pointer released”\
    \ events by trying to focus the widget, as shown in [Listing 6–12](#Chapter06.html#list_6_12).\
    \ This is done because the default convention in all UIs is that you touch something\
    \ only if you want to interact with it or move it into focus.\n\n**Listing 6–12.**\
    \ *Handling “Pointer Released” Events*\n\n```\npublic boolean handlePointerReleased(int\
    \ x, int y)\n{\n        if ( isFocusable() == true && isFocused() == false )\n\
    \        {\n                if ( getParent() != null )\n                {\n  \
    \                      getParent().focusWidget(this);\n                }\n   \
    \             return true;\n        }\n        return false;\n}\n```\n\nBefore\
    \ we continue, I would like to point out something very important: you should\
    \ change the focus or activate an item only on “release” events, that is “key\
    \ released” and “pointer released.” The main reason for this is that this gives\
    \ users a little wiggle room and prevents accidental actions.\n\nFor example,\
    \ if you handle activation on the “pressed” event, as soon as the user touches\
    \ or presses the OK button on a notification, the dialog will disappear. If, however,\
    \ you handle this in the released event, then the dialog will remain visible for\
    \ as long as the user keeps the key or pointer pressed. In the case of pointer\
    \ events, if the user touched the button by mistake, then he can simply drag the\
    \ pointer to a location outside of the button and release it there—no action will\
    \ be triggered.\n\nFinally, I would like to point out that the `BaseWidget` class\
    \ is declared as `abstract`. Some methods, particularly `paint()`, must be explicitly\
    \ implemented in its sub-classes. This serves both as a means of making sure developers\
    \ implement widgets properly, by having them explicitly write all the critical\
    \ methods, and as a means of documentation, by telling developers that widgets\
    \ need this and that functionality implemented in order to function.\n\nHaving\
    \ said that, we have now covered the most important aspects of the `BaseWidget`\
    \ class. It’s time to move on to containers."
  raw: 'Finally, it is worth noting that it is good to have your code provide support
    for widgets that don’t “play nice.” For example, you may need to implement an
    `EnterPassword` widget that does not relinquish focus until the proper password
    is entered, not even if it is explicitly instructed to do so—in effect, the user
    is stuck in the `EnterPassword` field once it is activated. This is easy to do
    in the widget, as all that’s needed is to have the `onLostFocus()` method return
    `false`. However, the rest of the code, particularly the containers, must be aware
    that this can happen and must handle the situation accordingly. For simplicity,
    our UI module will not support this kind of “disobedient” behavior, but it is
    a good exercise in UI implementation to modify it so that it does. If you feel
    up for it, please do so after you finish reading this chapter.


    ### Implementing Basic Widget Support


    Now that we have our theoretical groundwork done, it’s time to start writing some
    code. Since all the classes in the UI module are pretty big, I’ll include only
    the important bits and pieces in the code, with the full source code available
    on the Apress web site.


    That being said, let’s start writing our UI, beginning with the `BaseWidget` class.


    #### The BaseWidget Class


    The `BaseWidget` class will serve as the basis for all other widgets. Most of
    it is pretty straightforward, but some aspects of it are worth going into—for
    starters, determining a widget’s onscreen position and clip rectangle. The code
    for this is presented in [Listing 6–10](#Chapter06.html#list_6_10).


    **Listing 6–10.** *Determining the Position and Clipping Rectangle of the `BaseWidget`*


    `package app.module.ui.models;`


    `public abstract class BaseWidget implements Widget`

    `{`

    `    protected Container parent;`

    `    protected ClipRect clipRect = new ClipRect(0,0,0,0);`


    `    ...`


    `    public ClipRect getClipRect()`

    `    {`

    `        clipRect.setMaxX(getAbsoluteX()+getTotalWidth());`

    `        clipRect.setMaxY(getAbsoluteY()+getTotalHeight());`

    `        clipRect.setMinX(getAbsoluteX());`

    `        clipRect.setMinY(getAbsoluteY());`

    `        return clipRect;`

    `    }`


    `    public int getAbsoluteX()`

    `    {`

    `        return parent.getAbsoluteX() - parent.getXScroll() + getX();`

    `    }`


    **`    public int getAbsoluteY()`**

    **`    {`**

    **`        return parent.getAbsoluteY() - parent.getYScroll() + getY();`**

    **`    }`**


    `    ...`

    `}`


    I would like you to turn your attention to the highlighted code. As you can see,
    determining a widget’s absolute position is a recursive affair. To do that, you
    need to get the parent’s absolute position, add the widget’s position relative
    to the parent, and then compensate for the parent’s scroll, but to get the parent’s
    absolute position you need to get *its* parent’s absolute position, and so forth.


    Thus, making sure every link along the recursion chain reports the correct absolute
    position is vital, as the absolute position will be used for painting the widget
    and for determining its clipping rectangle. Even small off-by-one errors are unacceptable
    here, as they will get compounded at each step along the way until they become
    noticeable and affect your application’s look.


    Furthermore, if calculation of a widget’s absolute position takes too long, then
    the whole app will become slow because getting a widget’s absolute position is
    probably the most widely used method call in the entire UI module. That’s why
    it’s important to keep everything simple in this area.


    The next interesting bit of code in `BaseWidget` is the one concerning repaint
    requests. It is shown in [Listing 6–11](#Chapter06.html#list_6_11).


    **Listing 6–11.** *Requesting a Repaint*


    `public void requestRepaint()`

    `{`

    `        View v = getParentView();`

    `        if ( v != null )`

    `        {`

    `                getParentView().paintWidget(this);`

    `        }`

    `}`


    `public View getParentView()`

    `{`

    `        if ( parent == null )`

    `        {`

    `                return null;`

    `        }`

    `        return parent.getParentView();`

    `}`


    As you can see, the widget simply forwards the repaint request to its parent view,
    if any. It is the view’s responsibility to then call the widget’s `paint()` method
    with a suitable `Graphics` object as a parameter. Of course, retrieving a widget’s
    parent view is done recursively as well.


    The last area of interest is handling events. Since `BaseWidget` is the boilerplate
    class for all other widgets, the most common behavior must be coded in. This means
    that, by default, the widget should ignore all key events by returning `false`
    when the appropriate methods are called. This is so the parent container gets
    a chance to handle them, which is important—for example, if they are “Key up”
    or “Key down,” they are typically responsible for navigation. Widgets that need
    to handle key events—for example, buttons—can simply override the appropriate
    methods.


    Touch events are a different story. The widget will by default ignore “pointer
    down” and “pointer dragged” events but will respond to “pointer released” events
    by trying to focus the widget, as shown in [Listing 6–12](#Chapter06.html#list_6_12).
    This is done because the default convention in all UIs is that you touch something
    only if you want to interact with it or move it into focus.


    **Listing 6–12.** *Handling “Pointer Released” Events*


    `public boolean handlePointerReleased(int x, int y)`

    `{`

    `        if ( isFocusable() == true && isFocused() == false )`

    `        {`

    `                if ( getParent() != null )`

    `                {`

    `                        getParent().focusWidget(this);`

    `                }`

    `                return true;`

    `        }`

    `        return false;`

    `}`


    Before we continue, I would like to point out something very important: you should
    change the focus or activate an item only on “release” events, that is “key released”
    and “pointer released.” The main reason for this is that this gives users a little
    wiggle room and prevents accidental actions.


    For example, if you handle activation on the “pressed” event, as soon as the user
    touches or presses the OK button on a notification, the dialog will disappear.
    If, however, you handle this in the released event, then the dialog will remain
    visible for as long as the user keeps the key or pointer pressed. In the case
    of pointer events, if the user touched the button by mistake, then he can simply
    drag the pointer to a location outside of the button and release it there—no action
    will be triggered.


    Finally, I would like to point out that the `BaseWidget` class is declared as
    `abstract`. Some methods, particularly `paint()`, must be explicitly implemented
    in its sub-classes. This serves both as a means of making sure developers implement
    widgets properly, by having them explicitly write all the critical methods, and
    as a means of documentation, by telling developers that widgets need this and
    that functionality implemented in order to function.


    Having said that, we have now covered the most important aspects of the `BaseWidget`
    class. It’s time to move on to containers.'
  trans: '

    最后，值得注意的一点是，让代码为那些“不配合”的控件提供支持是件好事。例如，你可能需要实现一个 `EnterPassword` 控件，该控件在输入正确密码之前不会放弃焦点，即使被明确指示这样做也不行——实际上，一旦该控件被激活，用户就会被困在
    `EnterPassword` 字段中。这在控件中很容易实现，只需让 `onLostFocus()` 方法返回 `false` 即可。然而，代码的其他部分，特别是容器，必须意识到这种情况可能发生，并相应地处理。为简单起见，我们的
    UI 模块将不支持这种“不听话”的行为，但修改它以支持这种行为是 UI 实现中的一个很好的练习。如果你觉得有能力，请在读完本章后尝试一下。


    ### 实现基本控件支持


    现在我们已经完成了理论基础，是时候开始编写一些代码了。由于 UI 模块中的所有类都相当庞大，我只会包含代码中重要的部分，完整源代码可在 Apress 网站上获取。


    话虽如此，让我们开始编写 UI，从 `BaseWidget` 类开始。


    #### BaseWidget 类


    `BaseWidget` 类将作为所有其他控件的基础。它的大部分内容都很直接，但有些方面值得深入探讨——首先，确定控件的屏幕位置和裁剪矩形。相关代码见代码清单
    6–10。


    **代码清单 6–10.** *确定 `BaseWidget` 的位置和裁剪矩形*


    `package app.module.ui.models;`


    `public abstract class BaseWidget implements Widget`

    `{`

    `    protected Container parent;`

    `    protected ClipRect clipRect = new ClipRect(0,0,0,0);`


    `    ...`


    `    public ClipRect getClipRect()`

    `    {`

    `        clipRect.setMaxX(getAbsoluteX()+getTotalWidth());`

    `        clipRect.setMaxY(getAbsoluteY()+getTotalHeight());`

    `        clipRect.setMinX(getAbsoluteX());`

    `        clipRect.setMinY(getAbsoluteY());`

    `        return clipRect;`

    `    }`


    `    public int getAbsoluteX()`

    `    {`

    `        return parent.getAbsoluteX() - parent.getXScroll() + getX();`

    `    }`


    **`    public int getAbsoluteY()`**

    **`    {`**

    **`        return parent.getAbsoluteY() - parent.getYScroll() + getY();`**

    **`    }`**


    `    ...`

    `}`


    我想请你注意高亮显示的代码。如你所见，确定控件的绝对位置是一个递归过程。为此，你需要获取父控件的绝对位置，加上控件相对于父控件的位置，然后补偿父控件的滚动，但要获取父控件的绝对位置，你需要获取*它的*父控件的绝对位置，依此类推。


    因此，确保递归链上的每个环节都报告正确的绝对位置至关重要，因为绝对位置将用于绘制控件和确定其裁剪矩形。即使是微小的偏差也是不可接受的，因为它们会在每一步中被累积，直到变得明显并影响应用程序的外观。


    此外，如果计算控件绝对位置耗时过长，整个应用程序都会变慢，因为获取控件的绝对位置可能是整个 UI 模块中使用最广泛的方法调用。这就是为什么保持这一区域的简单性很重要。


    `BaseWidget` 中下一个有趣的代码片段是关于重绘请求的。如代码清单 6–11 所示。


    **代码清单 6–11.** *请求重绘*


    `public void requestRepaint()`

    `{`

    `        View v = getParentView();`

    `        if ( v != null )`

    `        {`

    `                getParentView().paintWidget(this);`

    `        }`

    `}`


    `public View getParentView()`

    `{`

    `        if ( parent == null )`

    `        {`

    `                return null;`

    `        }`

    `        return parent.getParentView();`

    `}`


    如你所见，控件只是将重绘请求转发给其父视图（如果有的话）。然后由视图负责调用控件的 `paint()` 方法，并传入一个合适的 `Graphics` 对象作为参数。当然，获取控件的父视图也是递归完成的。


    最后一个值得关注的领域是事件处理。由于 `BaseWidget` 是所有其他控件的模板类，因此必须编码最常见的行为。这意味着，默认情况下，控件应在调用相应方法时返回
    `false` 来忽略所有按键事件。这样父容器就有机会处理它们，这一点很重要——例如，如果它们是“向上键”或“向下键”，它们通常负责导航。需要处理按键事件的控件（例如按钮）可以简单地重写相应的方法。


    触摸事件则不同。默认情况下，控件会忽略“指针按下”和“指针拖动”事件，但会通过尝试聚焦控件来响应“指针释放”事件，如代码清单 6–12 所示。这样做是因为所有
    UI 中的默认约定是，只有当你想要与某物交互或将其移入焦点时，你才会触摸它。


    **代码清单 6–12.** *处理“指针释放”事件*


    `public boolean handlePointerReleased(int x, int y)`

    `{`

    `        if ( isFocusable() == true && isFocused() == false )`

    `        {`

    `                if ( getParent() != null )`

    `                {`

    `                        getParent().focusWidget(this);`

    `                }`

    `                return true;`

    `        }`

    `        return false;`

    `}`


    在继续之前，我想指出非常重要的一点：你应该只在“释放”事件（即“按键释放”和“指针释放”）上更改焦点或激活项目。主要原因是这给用户一些回旋余地，并防止意外操作。


    例如，如果你在“按下”事件上处理激活，那么一旦用户触摸或按下通知上的“确定”按钮，对话框就会消失。然而，如果你在释放事件中处理，那么只要用户按住按键或指针，对话框就会保持可见。对于指针事件，如果用户误触了按钮，他只需将指针拖到按钮外部并释放即可——不会触发任何操作。


    最后，我想指出 `BaseWidget` 类被声明为 `abstract`。某些方法，特别是 `paint()`，必须在其子类中显式实现。这既是一种确保开发者正确实现控件的手段（通过让他们显式编写所有关键方法），也是一种文档手段（通过告诉开发者控件需要实现这样那样的功能才能正常工作）。


    说到这里，我们已经涵盖了 `BaseWidget` 类最重要的方面。是时候继续讨论容器了。

