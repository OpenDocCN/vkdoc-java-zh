    \ classes, leaving the actual implementation to the application's modules. As\
    \ such, very few members of the `app.models` package will be full-blown classes—in\
    \ our case, none.\n\nNow back to our application. So far we have looked at tweets\
    \ and Twitter users, neither of which is really breathtaking. Let's take a look\
    \ at something a bit more exciting: the Twitter server."
  raw: '### Making Data Types Immutable


    This is a general piece of advice that can be applied to Java ME as well: whenever
    possible, try to make your data types immutable. For example, you should make
    it so that once you create a new `Tweet` instance, you are able only to retrieve
    its attributes—you cannot alter them in any way.


    If you want to modify one or more of its attributes, you must create a new instance
    with the corresponding new set of values instead of, for example, calling `setTimestamp()`
    or `setText()` on the existing instance. While doing so does incur a small performance
    hit, if done properly, the benefits significantly outweigh the costs.


    The biggest benefit of doing so is that you prevent a lot of bugs from happening
    by making sure you cannot alter objects by mistake, since the only way you can
    “alter” an object is to create a new one. Another benefit is that changes to important
    instance values, like the text of a `Tweet`, are easier to track, which in turn
    makes the code easier to debug. Both aspects are extremely important for large
    and intricate applications.


    **NOTE:** The downside of this approach is that, if you are not careful, you might
    end up creating problems instead of solving them. For example, if you keep references
    to old and unused instances by mistake, then you not only prevent them from being
    garbage-collected, but you also affect your application''s behavior, because “invalid”
    old data might get used instead of “valid” new data.


    Of course, not all data types and entities can or should be immutable. Let''s
    say you are writing a game, which features a `BadGuy` entity. Making it immutable
    is a bad idea, because a `BadGuy` can `move()` and `fire()` often. While good
    practice, creating a new instance every time one of these actions occurs will
    slow your game to a crawl. The same is true for other entities that change their
    state often, like a `Scrollbar` in a UI framework or a `ChatRoomHistory` in a
    chat program.


    Another good example comes in the form of data types and entities that encompass
    large amounts of information—for example, a `Level` data type in the foregoing
    game: having to create a new instance of a level whenever a tile changes its value
    would be absolutely mad.


    These are exceptions, however. In a typical application, with a proper plan and
    a proper architecture, you can probably get away with making 60–70% of the global
    data types and entities immutable, if not more.


    This being said, let us now start with defining our objects and data types.


    ### Defining the Tweet Data Type


    This is probably the fundamental data type of the application, as its entire functionality
    revolves around tweets. Tweets have a body, an author, and an ID as their main
    attributes.


    **NOTE:** Tweets actually have many more attributes associated with them—for example,
    geo-location—but for our purposes, we will stick to the three important ones just
    listed. Feel free to add support for the rest if you want to.


    Our `Tweet` class will look something like [Listing 3–1](#Chapter03.html#list_3_1).
    As all global data types and entities, the `Tweet` class implements the `Model`
    interface.


    **Listing 3–1.** *The `Tweet` Class*


    `package app.models;`


    `import com.apress.framework.objecttypes.Model;`


    `public class Tweet implements Model`

    `{`

    `    protected Tweet() { }`

    `    public Tweet (String author, String body, long timestamp)`

    `    {`

    `        ...`

    `    }`


    `    public String getBody() { ... }`


    `    public String getAuthor() { ... }`


    `    public String getID() { ... }`

    `}`


    As you can see, it has a protected default constructor and only setters for its
    fields, forcing you to initialize it with some data and making it immutable at
    the same time. As you add support for more attributes, it will make sense to also
    add additional constructors—for example, one that takes author, body, timestamp,
    and location as parameters. For our purposes, however, the current implementation
    will do just fine.


    We now know how tweets will look in our code. It''s now time to see how their
    creators, Twitter users, will be represented.


    ### Defining the TwitterUser Data Type


    Intuitively enough, users are the ones who post and read tweets. Each Twitter
    user has a name, a short description (or bio), an URL, and a location. Thus, the
    `TwitterUser` class looks like the one in [Listing 3–2](#Chapter03.html#list_3_2).


