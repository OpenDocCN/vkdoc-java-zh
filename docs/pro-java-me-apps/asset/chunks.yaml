- fmt: "Finally, it is worth noting that it is good to have your code provide support\
    \ for widgets that don’t “play nice.” For example, you may need to implement an\
    \ `EnterPassword` widget that does not relinquish focus until the proper password\
    \ is entered, not even if it is explicitly instructed to do so—in effect, the\
    \ user is stuck in the `EnterPassword` field once it is activated. This is easy\
    \ to do in the widget, as all that’s needed is to have the `onLostFocus()` method\
    \ return `false`. However, the rest of the code, particularly the containers,\
    \ must be aware that this can happen and must handle the situation accordingly.\
    \ For simplicity, our UI module will not support this kind of “disobedient” behavior,\
    \ but it is a good exercise in UI implementation to modify it so that it does.\
    \ If you feel up for it, please do so after you finish reading this chapter.\n\
    \n## Implementing Basic Widget Support\n\nNow that we have our theoretical groundwork\
    \ done, it’s time to start writing some code. Since all the classes in the UI\
    \ module are pretty big, I’ll include only the important bits and pieces in the\
    \ code, with the full source code available on the Apress web site.\n\nThat being\
    \ said, let’s start writing our UI, beginning with the `BaseWidget` class.\n\n\
    ### The BaseWidget Class\n\nThe `BaseWidget` class will serve as the basis for\
    \ all other widgets. Most of it is pretty straightforward, but some aspects of\
    \ it are worth going into—for starters, determining a widget’s onscreen position\
    \ and clip rectangle. The code for this is presented in [Listing 6–10](#Chapter06.html#list_6_10).\n\
    \n**Listing 6–10.** *Determining the Position and Clipping Rectangle of the `BaseWidget`*\n\
    \n```\npackage app.module.ui.models;\n\npublic abstract class BaseWidget implements\
    \ Widget\n{\n    protected Container parent;\n    protected ClipRect clipRect\
    \ = new ClipRect(0,0,0,0);\n\n    ...\n\n    public ClipRect getClipRect()\n \
    \   {\n        clipRect.setMaxX(getAbsoluteX()+getTotalWidth());\n        clipRect.setMaxY(getAbsoluteY()+getTotalHeight());\n\
    \        clipRect.setMinX(getAbsoluteX());\n        clipRect.setMinY(getAbsoluteY());\n\
    \        return clipRect;\n    }\n\n    public int getAbsoluteX()\n    {\n   \
    \     return parent.getAbsoluteX() - parent.getXScroll() + getX();\n    }\n\n\
    \    public int getAbsoluteY()\n    {\n        return parent.getAbsoluteY() -\
    \ parent.getYScroll() + getY();\n    }\n\n    ...\n}\n```\n\nI would like you\
    \ to turn your attention to the highlighted code. As you can see, determining\
    \ a widget’s absolute position is a recursive affair. To do that, you need to\
    \ get the parent’s absolute position, add the widget’s position relative to the\
    \ parent, and then compensate for the parent’s scroll, but to get the parent’s\
    \ absolute position you need to get *its* parent’s absolute position, and so forth.\n\
    \nThus, making sure every link along the recursion chain reports the correct absolute\
    \ position is vital, as the absolute position will be used for painting the widget\
    \ and for determining its clipping rectangle. Even small off-by-one errors are\
    \ unacceptable here, as they will get compounded at each step along the way until\
    \ they become noticeable and affect your application’s look.\n\nFurthermore, if\
    \ calculation of a widget’s absolute position takes too long, then the whole app\
    \ will become slow because getting a widget’s absolute position is probably the\
    \ most widely used method call in the entire UI module. That’s why it’s important\
    \ to keep everything simple in this area.\n\nThe next interesting bit of code\
    \ in `BaseWidget` is the one concerning repaint requests. It is shown in [Listing\
    \ 6–11](#Chapter06.html#list_6_11).\n\n**Listing 6–11.** *Requesting a Repaint*\n\
    \n```\npublic void requestRepaint()\n{\n        View v = getParentView();\n  \
    \      if ( v != null )\n        {\n                getParentView().paintWidget(this);\n\
    \        }\n}\n\npublic View getParentView()\n{\n        if ( parent == null )\n\
    \        {\n                return null;\n        }\n        return parent.getParentView();\n\
    }\n```\n\nAs you can see, the widget simply forwards the repaint request to its\
    \ parent view, if any. It is the view’s responsibility to then call the widget’s\
    \ `paint()` method with a suitable `Graphics` object as a parameter. Of course,\
    \ retrieving a widget’s parent view is done recursively as well.\n\nThe last area\
    \ of interest is handling events. Since `BaseWidget` is the boilerplate class\
    \ for all other widgets, the most common behavior must be coded in. This means\
    \ that, by default, the widget should ignore all key events by returning `false`\
    \ when the appropriate methods are called. This is so the parent container gets\
    \ a chance to handle them, which is important—for example, if they are “Key up”\
