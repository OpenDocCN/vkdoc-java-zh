    It is worth noting that prior to JPA, this work would have required much more
    effort and expended more resources. With EJB 2.x entity beans, the client developer
    had two main options. Under one approach, the developer could create data transfer
    objects (DTOs) or follow some other similar pattern to simulate the task of creating
    and associating the entity objects through proxies. This network of DTO classes
    would then be passed into the session bean layer, as we did previously; but inside
    the session bean, actual entity beans would have to be explicitly created and
    initialized from the DTO objects.


    A second approach, updating the entity beans directly from the client, is simpler
    to code, but potentially at the expense of higher performance costs. If the client
    exists outside the Java EE tier, each method call would incur the overhead of
    RMI/IIOP (remote method invocation over the Internet inter-ORB protocol) marshalling
    to communicate with the actual EJB object residing in the EJB container. Much
    of this overhead is removed when the client lives in the Java EE tier, since it
    could use local entity bean interfaces to communicate directly with the live entity
    bean; but Java SE clients were forced to use remote interfaces onto the entity
    beans. On top of that, container-managed relationships (CMRs) are only supported
    on local component interfaces; so direct entity bean relationship lookups and
    updates were not even available to Java SE clients in the EJB 2.x world.


    Persisting the Customer


    Although we chose in this example to embed the transaction `begin()` operation
    inside the Interceptor class that interposes on the BMT session bean’s methods,
    we could have exposed a `beginTransaction()` call to the client as well. Because
    we have chosen the approach we did, all that is required is the call to `persistEntity()`
    which now implicitly begins the transaction (but does not commit it):


    ```

    //  Persist the Customer, relying on the cascade settings to persist all

    //  related CartItem entities as well. Reassign the customer

    //  to pick up the ID value that was assigned by the EJB container when

    //  it was persisted.

    orderProcessorBMT.persistEntity(customer);

    ```


    The transaction context does not extend to the client thread itself; it exists
    only in the session bean’s thread. The call to `UserTransaction.begin()` that
    occurs inside the Interceptor establishes a transaction context on that thread
    that is then available to the session bean when its `persistEntity()` method is
    called.


    Creating the CustomerOrder


    Our transaction, now in effect, continues through the step of creating the customer
    order. This stage is similar to the stateless CMT example, except that the transaction
    has already been created, and must be explicitly committed at the conclusion.


    ```

    //  Create a customer order and create OrderItems from the CartItems

    final CustomerOrder customerOrder =

            orderProcessorBMT.createCustomerOrder(customer);


    out.print("<h2>Retrieving Customer Order Items... ");

    for (OrderItem orderItem : customerOrder.getOrderItemList()) {

      final Wine wine = orderItem.getWine();

      out.println(wine.getName() + " with ID " + wine.getId());

    }

    out.println("done</h2>");


    //  Commit the order, applying all of the changes made thus far

    orderProcessorBMT.commitTransaction();

    ```


    Should the client wish to cancel the order at this stage, perhaps through interactive
    confirm/cancel buttons exposed in a client panel, the BMT option provides this
    possibility even after the `CustomerOrder` has been created.


    Benefits of This Approach


    The benefit of using explicit transaction demarcation is the additional degree
    of flexibility that it offers. The EJB server is still acting in its capacity
    as transaction manager, only it exposes the transaction demarcation control to
    the enterprise bean instead of automating this demarcation based on the `@TransactionAttribute`
    settings on each method. While the stateless example could have prompted the user
    *before* creating the `CustomerOrder`, this approach allows the `CustomerOrder`
    to be created and validated—for example, before being submitted to the user for
    confirmation. BMT must be used with caution, however, for the reasons mentioned
    in the following section.


    Limitations of This Approach


    It can be argued that the additional degree of flexibility is typically outweighed
    by the additional burdens of tracking the transaction state and avoiding misuse
    by session bean clients. Leaving the process of beginning and ending transactions
    to the mercy of the order in which clients call the session bean methods offers
    the possibility of dangling transactions. The client, in coordination with the
    bean itself, has the responsibility of cleanly ending—whether committing or rolling
    back—each transaction that has begun. This may be a reasonable risk if you can
    control how clients will use the bean—but session beans are openly published,
    and it may be difficult to anticipate who might use them, and how.


    BMT session beans can be written to safeguard against misuse, but this safeguard
    code is probably going to leave the bean with behavior similar to CMT beans anyway,
    in which case little is gained for your efforts.


    Building, Deploying, and Testing: A Transactional Scenario from the Wines Online
    Application


    Now that we’ve examined many of the details of transaction support offered by
    EJB, let’s execute the test cases we just covered.


    For both the CMT and BMT scenarios, we invoke a servlet client that creates a
    new customer, builds up a shopping cart consisting of cart item entries, and then
    creates a customer order consisting of order items based on the cart items in
    the cart. We chose these examples for this chapter because they involve multiple
    operations that can be partitioned into transactional work units of greater or
    less granularity depending on the requirements of the client.


    To illustrate the default support provided by EJB, we use the example we explored
    first: a standard stateless session bean implementation that uses the default
    CMT demarcation. In our second example, we demonstrate the client taking some
    responsibility for managing the transaction, using a stateful session bean using
    BMT demarcation and an extended persistence context.


    Prerequisites


    Before performing any of the steps detailed in the next sections, complete the
    “Getting Started” section of [Chapter 1](../Text/9781430246923_Ch01.xhtml). This
    section will walk you through the installation and environment setup required
    for the samples in this chapter.


    Opening the Sample Application


    This chapter’s root project holds a dependency on the JPA persistence unit defined
    in `Chapter07-ServiceIntegration-jpa`. Launch the NetBeans IDE, and open the `Chapter08-TransactionSamples`
    project using the `File Open Project` menu. Make sure that the ‘`Open Required
    Projects`’ checkbox is checked.


