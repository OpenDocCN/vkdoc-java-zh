    映射实体继承层次结构


    Java 自诞生以来就支持单类继承——即非接口类可以扩展另一个类。虽然在业务领域的许多方面，利用继承带来的代码复用和多态性优势已成为常见做法，但在 JPA
    引入之前，EJB 持久化领域并不支持数据继承。这曾是一个重大缺陷，因为在现实世界中，数据通常是层次化的，而缺乏对数据对象继承的标准内置支持导致了无数的变通方法和令人头疼的问题。利用
    JDK 注解的易用性，JPA 提供了对定义和映射实体继承层次结构的声明式支持，包括抽象实体以及多态关系和查询。


    ![image](img/sq.jpg) **注意**   *抽象实体*是包含 `abstract` 修饰符的实体类，因此不能直接实例化。抽象实体必须是实体继承层次结构中的中间类；它本身不能是叶子实体，因为它只能通过其子实体之一进行实例化。相应地，实体继承层次结构中的所有叶子实体都必须是具体的，因此是可实例化的。抽象实体的存在是为了为其子实体提供公共数据结构，并通过与其他实体的多态关系来表示其子实体。


    JPA 中实体继承支持的很大一部分源于设计人员和工具开发者的工作，他们多年来想出了各种方法来实现自己的 O/R 映射，而 JPA 则方便地采用了源自这些努力的几种替代继承映射方法。


    在给定的实体继承层次结构中，单一继承策略适用于该层次结构中的所有实体。此外，无论采用何种继承策略，层次结构中的所有实体都必须使用相同的主键类型。这使得容器能够合理地支持多态关系，无论类层次结构采用何种映射策略。


    另外，如果您的数据库有表列数限制为 256 列的限制，请注意实体可以自由地将其字段映射分布到多个表的连接行中。


