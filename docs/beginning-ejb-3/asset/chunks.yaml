    清单 10-3 所示的客户端使用 `@Inject` 注解注入字段 `newWine`。通过 `@Inject` 注解注入的字段由容器实例化，这意味着用户无需使用
    *new* 创建对象实例，也*不需要对实际实现类存在编译时依赖*。这里需要注意的一个重要点是，`newWine` 字段的类型是 `Wine`。在这种特定情况下，容器会自动使用
    `RedWine` 实现进行实例化。如果我们必须用传统方式实例化 `RedWine`，那么我们将不得不使用 `RedWine` 实现而不是 `Wine` 接口。结果，客户端和
    `Wine` 对象之间将存在紧密耦合，这种耦合在部署时或运行时都无法更改。在本章后面讨论依赖注入时，我们将进一步了解 CDI 容器如何*知道*要注入哪个实现。


    ***清单 10-3.***  WineClient.java 演示了依赖注入方面


    ```

    package com.apress.ejb.chapter10;


    import javax.inject.Inject;


    public class WineClient {

       // 传统方式实例化

       private Wine oldWine = new RedWine();


    // 通过字段依赖注入实例化

       @Inject

       private Wine newWine;

    }

    ```


    作为参考，CDI 规范还定义了以下服务。对这些高级 CDI 主题的更详细解释超出了本章的范围，但鼓励您参考 CDI 规范以获取更多信息。


    *   通过统一表达式语言 (EL) 将 Web 层与上下文对象集成

    *   实现 bean 并可以通过业务方法拦截这些 bean 调用的装饰器

    *   用于将业务逻辑与横切关注点分离的拦截器

    *   定义 bean 之间以松散耦合方式进行交互的事件通知模型

    *   通过可移植扩展与容器进行干净交互的能力


    与 EJB 的关系


    CDI 弥合了由 Servlet、JSP 和 JSF 组成的 Web 层与由 EJB 和 JPA 组成的企业层之间的差距。Servlet、JSP 和 JSF
    负责内容呈现，但不具备事务管理和持久化功能。另一方面，EJB 和 JPA 支持与数据库相关的操作，如提交、回滚和其他事务管理功能。使用 CDI，Web 应用程序可以使用会话
    Bean 作为*外观*来执行 JPA 支持的数据库相关操作。


    会话 Bean 像*托管 Bean* 一样参与 CDI 生命周期。会话 Bean 可以注入到其他会话 Bean 和托管 Bean 中。托管 Bean 可以注入到会话
    Bean 中。用户在决定使用会话 Bean 还是托管 Bean 时应谨慎。当应用程序需要以下高级企业服务时，应使用会话 Bean：


    *   基于角色的安全性

    *   事务管理

    *   通过实例池实现可伸缩性

    *   并发性

    *   事件和定时器


    对于需要依赖注入、生命周期管理和拦截器的应用程序，托管 Bean 就足够了。通过添加 `@Stateless`、`@Stateful` 或 `@Singleton`
    注解，可以轻松地将托管 Bean 升级为会话 Bean。


    ![image](img/sq.jpg) **注意**  消息驱动 Bean 和实体是非上下文对象，不能注入到其他对象中。消息驱动 Bean 利用了 CDI
    的一些特性，例如拦截器和装饰器，因为容器会对所有托管 Bean 实例（包括非上下文实例）执行注入。


    CDI 概念


    现在我们对 CDI、它在 Java EE 堆栈中的位置以及它与 EJB 的关系有了基本的了解，让我们详细了解一下上下文和依赖注入。


    Bean 和 beans.xml


    Bean 是包含业务逻辑的容器管理组件：例如，托管 Bean 和会话 Bean。读者需要注意，CDI 并*没有*引入一种名为“CDI Bean”的、具有自己独特组件模型的新
    Bean 类型。CDI 提供了一组服务，这些服务可以被托管 Bean 和 EJB（由其现有组件模型定义）使用。CDI 容器识别在各个部署模块中找到的 Bean
    的过程称为 *bean 发现*。容器通过 bean 发现发现的 Bean 参与 CDI 生命周期。这些 Bean 的生命周期由容器根据 CDI 规范进行管理。


    ![image](img/sq.jpg) **注意**  在本章中，除非另有说明，“bean”一词指的是参与 CDI 生命周期的 Java Bean。


    如果容器在 WAR 文件的 `WEB-INF` 目录或 JAR 文件的 `META-INF` 目录中检测到 `beans.xml` 文件，则模块内的 Bean
    将参与 CDI 生命周期。模块中存在 `beans.xml` 有助于容器快速隔离与 CDI 相关的模块，从而加快 bean 发现速度。CDI 并*不*要求
    `beans.xml` 声明模块中可用的 Bean；`beans.xml` 可以为空。CDI 工件（如替代项、拦截器和原型）如果需要，则在 `beans.xml`
    中声明。


    CDI 容器为其 Bean 提供以下服务：


    *   透明的创建、销毁和作用域管理

    *   注入到 Java 客户端时，通过限定符进行类型安全的作用域解析

    *   在 JSF 客户端的统一 EL 表达式中使用时，通过名称进行类型安全的作用域解析

    *   生命周期回调

    *   自动注入其他 Bean 实例

    *   拦截和装饰

    *   事件通知


    通过声明一个类级别字段并使用 `javax.inject.Inject` 注解对其进行注解，可以将 Bean 注入到其他 Bean 和客户端中。Bean 也可以通过使用
    `javax.inject.Named` 注解进行注解，通过统一 EL 表达式与 Web 层技术（如 JSP 和 JSF）一起使用。


    作用域


    对象的作用域决定了该对象各个实例的生命周期。包含有状态对象实例的应用程序需要这些实例在定义的时间段内保持其状态。作用域决定了何时应创建 Bean 实例以及容器何时应销毁它。


    CDI 有以下五种作用域类型：


    应用程序作用域


    应用程序作用域 Bean 的状态在应用程序的所有用户之间共享。应用程序作用域的对象在应用程序的生命周期内仅创建一次——第一次被注入时——并且仅在应用程序关闭时被销毁。应用程序作用域使用
    `@javax.enterprise.context.ApplicationScoped` 注解声明。


    请求作用域


    请求作用域 Bean 的状态由单个请求中涉及的所有 Bean 共享。请求作用域的 Bean 每个请求创建一次，并在该请求完成后销毁。请求作用域使用 `@javax.enterprise.context.RequestScoped`
    注解声明。


    会话作用域


    会话作用域 Bean 的状态在同一 HTTP 会话内的多个请求之间共享。会话作用域的 Bean 在 HTTP 会话开始时创建，并在 HTTP 会话关闭或超时时销毁。会话作用域使用
    `@javax.enterprise.context.SessionScoped` 注解声明。


    对话作用域

