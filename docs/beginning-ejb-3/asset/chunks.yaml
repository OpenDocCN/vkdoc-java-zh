    should anything go wrong in the course of either of these methods, the entire
    transaction will be rolled back, and neither this client nor any outside application
    will ever be aware that a `CustomerOrder` was created.


    Does This Pass the ACID Test?


    Have the core ACID requirements that characterize a valid transaction been met?
    Let’s look at how EJB addresses each one.


    Atomicity


    The EJB container ensures that whenever a stateless CMT method marked `REQUIRED`
    or `REQUIRES_NEW` is called, if the container interposes to create a new transaction
    (this will always happen with `REQUIRES_NEW`), it will resolve that transaction
    upon exiting the method. If the method completes successfully, and if the bean
    code did not call `EJBContext.setRollbackOnly()`, the transaction will be committed.
    If the method throws an exception, or if `EJBContext.setRollbackOnly()` is called,
    the transaction will be rolled back. These two transaction attributes are the
    only ones for which the container may interpose to create a new transaction. For
    all other transaction attributes, either an externally managed transaction is
    involved (in which case the container will not interpose to commit it when the
    method is exited), or the method is called with no transaction context. In the
    latter case, because we are using a transaction-scoped persistence context and
    there is no transactional context, calls to `persist()`, `merge()`, or `remove()`
    will cause a `javax.persistence.TransactionRequiredException`. Were we to be using
    a stateful session bean with an extended persistence context, these changes would
    be tracked by the persistence context, even outside of a transaction, and applied
    should a transaction be subsequently created (and associated with this persistence
    context) and committed.


