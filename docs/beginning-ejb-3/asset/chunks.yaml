    在 Java Servlet 出现之前，CGI 脚本被用于生成动态 Web 内容。CGI 脚本有其自身的局限性，包括脚本作为独立进程运行，这导致了可伸缩性问题。


    在 CGI 脚本之后，Java Servlet 成为 Java EE 平台中所有 Web 技术的基础。Java Servlet 为开发基于标准的、可在 Web
    容器之间移植的 Web 组件和应用程序提供了一个良好的开端。Java Servlet 的缺点之一是它们代码密集——所有 HTML 都是使用`println()`方法打印出来的。Servlet
    没有在创建页面设计的图形设计师和创建动态内容的 Java 程序员之间建立桥梁。


    JSP 是 Web 技术演进中的下一步；它弥合了图形设计师和 Java 程序员之间的差距。基于 Java Servlet 技术，JSP 页面是嵌入了 Java
    代码的 HTML 页面。这种模型允许图形设计师创建 JSP 页面，然后程序员可以通过添加 Java 代码或 *scriplets* 使其具有动态性。编译后，JSP
    页面变成 Java Servlet。


    虽然 JSP 页面的出现很好，但许多开发人员现在不得不处理诸如遍历数据集合之类的繁琐任务。这导致了 JSP 标准标签库 (JSTL) 的创建，它自动化了其中一些任务。


    尽管这些技术的进步简化了 Web 应用程序的构建，但当时还没有用于开发它们的标准组件模型。除此之外，使用像 Visual Basic、Oracle Forms
    和 PowerBuilder 这样的第四代语言 (4GL) 开发具有可重用组件的 Web 应用程序也还不可用。


    JSF 是最新的 Java EE Web 技术。通过组件模型，它解决了可重用组件和简化 Web 应用程序构建的问题。不过，可重用组件模型并不是 JSF 提供的唯一功能。我们将在以下部分中探讨
    JSF 的其他一些特性和优势。


    ## 模型-视图-控制器模式


    在 Java EE Web 技术开发的早期阶段，大多数 Web 应用程序都是使用所谓的 Model-I 方法构建的。Model-I 的基本思想是，呈现动态
    Web 内容的 Web 技术与后端系统的业务逻辑紧密交织在一起。这种方法没有关注点分离，导致了应用程序维护问题。Model-II 方法（也称为模型-视图-控制器
    [MVC] 模式）是对 Model-I 方法的后续改进。这种方法的关键在于视图层与提供数据和业务逻辑的模型层之间的清晰分离。


    MVC 模式并非 Java 语言所特有；它可以追溯到像 Smalltalk 这样的语言。在这种方法中，模型层用于业务逻辑和数据，视图用于呈现用户界面，控制器用于应用程序流程和事件处理。虽然
    Java EE 平台在模型和视图端技术方面一直在演进，但它并没有包含一个可用于控制器端的内置框架。相反，许多开发人员使用 Java Servlet 技术构建了自制的控制器。还有许多其他人转向了
    Apache Struts，它提供了一种替代编写自制控制器的方法。Apache Struts 是一个广泛使用的开源框架，已成为 Web 应用程序事实上的控制器框架。


    最终，JSF 技术通过提供控制器作为框架的一部分，标准化了 MVC 模式的控制器方面。


