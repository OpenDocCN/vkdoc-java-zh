    \ = \"ZIP_CODE\")\n  private String zipCode;\n\npublic Address() {\n  }\n\n/*\
    \ get/set methods... */\n}\n```\n\n让我们看看此示例中引入的一些注解。\n\n## `@JoinColumn`注解\n\n\
    一个`Employee`实体有一个类型为`FullTypeEmployee`的`manager`字段，其映射方式如下：\n\n```\n@ManyToOne\n\
    @JoinColumn(name = \"MANAGER\")\nprivate FullTimeEmployee manager;\n```\n\n`manager`字段的类型为`FullTimeEmployee`，并映射到`MANAGER`列，该列由`@JoinColumn`注解上的`name\
    \ = \"MANAGER\"`属性标识。`MANAGER`列恰好是`FullTypeEmployee`实体映射的表的外键引用，在本例中，该表就是同一个`CH04_ST_PERSON`表。为此类列定义外键并非严格必要，但通常被认为是良好的数据库设计。由于`manager`字段映射到外键列，因此它被认为是关系的*拥有*方。"
  raw: 'All of the properties across the entity hierarchy rooted by the `Person` entity
    map to columns on a single table, `CH04_ST_PERSON`. This table holds a foreign
    key reference, bound to the `HOME_ADDRESS` column, to `CH04_ST_ADDRESS`, which
    is mapped to the `Address` entity. It also holds a foreign key reference, using
    the `MANAGER` column, back to itself. This foreign key is not constrained to be
    unique, indicating that multiple rows may hold the same value in their `MANAGER`
    column.


    Example Entity Classes


    [Listings 4-1](#9781430246923_Ch04.xhtml#list1) through [4-4](#9781430246923_Ch04.xhtml#list4)
    show how the entities in the `Person` hierarchy are mapped using the `SINGLE_TABLE`
    inheritance strategy. The inheritance strategy is declared on the root entity
    in the hierarchy, and it also applies to all subentities in the hierarchy. Annotations
    introduced in the example entities that have not yet been covered are explained
    in the sections that follow.


    [***Listing 4-1.***](#9781430246923_Ch04.xhtml#_list1)  Person.java, an Abstract
    Root Entity in a SINGLE_TABLE Inheritance Hierarchy


    ```

    /*

     * Person: An abstract entity, and the root of an inheritance hierarchy

     *

     * To create ID generator table "CH04_ST_PERSON_ID_GEN":

     * CREATE TABLE "CH04_ST_PERSON_ID_GEN" ("PRIMARY_KEY_NAME" VARCHAR2(4000) PRIMARY
    KEY,    "NEXT_ID_VALUE" NUMBER(38));

     *

     * To initialize this table with data for this entity''s ID generator ''Person.id''
    (starting with    value ''0''):

