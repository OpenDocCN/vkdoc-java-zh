- fmt: "# Web Services Architecture\n\nWeb services fundamentally constitute a kind\
    \ of business logic or functionality available in an application or module and\
    \ are exposed via a service interface to a client application (commonly known\
    \ as *service consumer*). The consumer of the Web service doesn’t have to know\
    \ any implementation details of the Web service—the client is able to access or\
    \ invoke the Web service with the information provided in the service interface.\
    \ This architecture fundamentally provides a loosely coupled model in which the\
    \ consumer doesn’t have to be aware of technology or infrastructure details particular\
    \ to the implementation of the business logic exposed as a Web service.\n\nThe\
    \ Web Services Architecture Working Group of the W3C (World Wide Web Consortium)\
    \ provides the following definition for a Web service:\n\n> *A Web service is\
    \ a software system designed to support interoperable machine-to-machine interaction\
    \ over a network. It has an interface described in a machine-processable format\
    \ (specifically WSDL). Other systems interact with the Web service in a manner\
    \ prescribed by its description using SOAP messages, typically conveyed using\
    \ HTTP with an XML serialization in conjunction with other Web-related standards.*\n\
    \nWhile the concept of abstracting out details to an interface has been used in\
    \ several languages and distributed architectures (for example, EJB and CORBA),\
    \ the key difference in Web Services is the usage of standards to describe the\
    \ abstraction, invocation, and registration of services.\n\nWeb Services architecture\
    \ goes by the find-bind-execute model in which you find the required service in\
    \ a registry (UDDI), get the description of the service, bind it to the service\
    \ (create the message that will be sent to the service based on the description),\
    \ and finally execute or invoke the service. [Figure 6-1](#9781430246923_Ch06.xhtml#Fig1)\
    \ shows the find-bind-execute model. UDDI, WSDL, and SOAP are the standards that\
    \ make this find-bind-execute model ubiquitous and different from earlier computing\
    \ models.\n\n![9781430246923_Fig06-01.jpg](Images/9781430246923_Fig06-01.jpg)\n\
    \n[Figure 6-1.](#9781430246923_Ch06.xhtml#_Fig1) Web Services architecture\n\n\
    ## UDDI\n\n*Universal Description, Discovery, and Integration (UDDI)* provides\
    \ a standards-based approach to locating a Web service and information on invoking\
    \ that service. It also provides additional metadata about the service. UDDI helps\
    \ you dynamically bind Web services instead of having to hardwire them to an external\
    \ interface, and it also helps to provide taxonomy. Businesses or service providers\
    \ can provide basic contact information (including identification), categorization\
    \ for the service, information that describes its behavior, and the actual location\
    \ of the Web service.\n\nUDDI, which is currently in version 3, has evolved over\
    \ the last few years. Version 1 focused on providing a registry for services,\
    \ while version 2 focused on aligning the specification with other Web services\
    \ specifications and flexible taxonomies. The current version focuses on delivering\
    \ support for secure interaction of private or public implementations of the services.\
    \ Several companies, including Oracle, SAP, Microsoft, IBM, Cisco, Computer Associates,\
    \ and Systinet are members of the UDDI technical committee for the Organization\
    \ for the Advancement of Structured Information Standards (OASIS). Most of the\
    \ application server vendors (such as Oracle and IBM) either provide a UDDI registry\
    \ as a standard component that comes with their application server, or an OEM\
    \ UDDI registry (from Systinet or other registry providers) as part of their middleware\
    \ platform.\n\n## WSDL\n\n*Web Services Description Language (WSDL)* is a technology\
    \ that is used to describe the interface of a service using XML. WSDL is a standard\
    \ developed by the W3C to which several vendors and individuals have contributed\
    \ over the last few years. WSDL describes what a service does, how to invoke its\
    \ operations, and where to find it.\n\nWSDL details can be split into two categories:\
    \ service interface definition details and service implementation definition details.\
    \ The service interface definition is an abstract or reusable service definition\
    \ that can be instantiated and referenced by multiple service implementation definitions.\
    \ It contains the following WSDL elements, which comprise the reusable portion\
    \ of the service description. We will use a credit check Web service as an example\
    \ to introduce the service interface definition elements listed here:\n\n```\n\
    <definitions>\n<types>\n<message>\n<portType>\n<binding>\n```\n\n### The `<definitions>`\
    \ Element\n\nThe `<definitions>` element allows you to specify global declarations\
    \ of namespaces that are visible through the WSDL document. It acts as a container\
    \ for service description. [Listing 6-1](#9781430246923_Ch06.xhtml#list1) shows\
    \ an example `<definitions>` element that defines a target namespace and other\
    \ namespaces that are referred to by a credit service.\n\n**[Listing 6-1](#9781430246923_Ch06.xhtml#_list1).**\
    \ The `<definitions>` Element in `CreditService.wsdl`\n\n```\n<?xml version=\"\
    1.0\" encoding=\"UTF-8\" standalone=\"yes\"?>\n<definitions targetNamespace=\"\
    http://www.apress.com/ejb3/credit\" ←\nname=\"CreditService\" xmlns:tns=\"http://www.apress.com/ejb3/credit\"\
    \ ←\nxmlns:xsd=\"http://www.w3.org/2001/XMLSchema\" ←\nxmlns:soap=\"http://schemas.xmlsoap.org/wsdl/soap/\"\
    ←\nxmlns=http://schemas.xmlsoap.org/wsdl//>\n```\n\n### The `<types>` Element\n\
    \nThe `<types>` element is used to define the data types for the `<message>` element.\
    \ XML schema definitions (XSDs) are most commonly used to specify the data types.\
    \ [Listing 6-2](#9781430246923_Ch06.xhtml#list2) shows an example `<types>` element\
    \ that provides the schema location for the credit service.\n\n**[Listing 6-2](#9781430246923_Ch06.xhtml#_list2).**\
    \ The `<types>` Element in `CreditService.wsdl`\n\n```\n  <types>\n    <xsd:schema>\n\
    <xsd:import namespace=\"http://www.apress.com/ejb3/credit\"←\n    schemaLocation=\"\
    CreditServiceBeanService_schema1.xsd\"/>\n    </xsd:schema>\n  </types>\n```\n\
    \n### The `<message>` Element\n\nThe `<message>` element is used to define the\
    \ format of data exchanged between a Web service consumer and a Web service provider.\
    \ [Listing 6-3](#9781430246923_Ch06.xhtml#list3) shows an example of two `<message>`\
    \ elements: `CreditCheck` and `CreditCheckResponse`.\n\n**[Listing 6-3](#9781430246923_Ch06.xhtml#_list3).**\
    \ The `<message>` Element in `CreditService.wsdl`\n\n```\n  <message name=\"CreditCheck\"\
    >\n    <part name=\"parameters\" element=\"tns:CreditCheck\"/>\n  </message>\n\
    \  <message name=\"CreditCheckResponse\">\n    <part name=\"parameters\" element=\"\
    tns:CreditCheckResponse\"/>\n  </message>\n```\n\n### The `<portType>` Element\n\
    \nThe `<portType>` element is used to specify the operations of the Web service.\
    \ [Listing 6-4](#9781430246923_Ch06.xhtml#list4) shows the `<portType>` element\
    \ for the credit service with the `CreditCheck` operation.\n\n**[Listing 6-4](#9781430246923_Ch06.xhtml#_list4).**\
    \ The `<portType>` Element in `CreditService.wsdl`\n\n```\n<portType name=\"CreditCheckEndpointBean\"\
    >\n  <operation name=\"CreditCheck\">\n    <input message=\"tns:CreditCheck\"\
    />\n    <output message=\"tns:CreditCheckResponse\"/>\n  </operation>\n</portType>\n\
    ```\n\n### The `<binding>` Element\n\nThe `<binding>` element describes the protocol,\
    \ data format, and security for a `<portType>` element. The standard bindings\
    \ are HTTP or SOAP; or you can create one of your own.\n\nThe “bindings” part\
    \ of the WSDL specification is flexible—it allows you to provide your own bindings\
    \ environment instead of the default SOAP-over-HTTP model. This flexibility of\
    \ the specification has been widely exploited by WSIF (Web Services Invocation\
    \ Framework), which is an Apache open source project. WSIF provides a nice way\
    \ to expose existing Java, EJB, JMS (Java Message Service), and JCA-based components\
    \ as Web services with native bindings, which provide better performance and that\
    \ support native transactions. [Listing 6-5](#9781430246923_Ch06.xhtml#list5)\
    \ shows the `<binding>` element for the credit service, using SOAP-over-HTTP."
