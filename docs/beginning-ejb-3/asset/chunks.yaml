    # Testing the Other Persistence Examples


    The remaining six projects each test a different feature covered in this chapter
    and identified on the project name. You are encouraged to use these projects as
    a reference for how to configure the various inheritance hierarchies, mapped superclasses,
    embedded classes, and complex primary keys.


    Since each project in this chapter shares the same structure, and a dedicated
    HTTP servlet tester accompanies each, the above steps can guide you through executing
    each example in the same way.


    # Conclusion


    We have covered a fair bit of ground in this chapter, and with this information
    in hand, you should be ready to go out and build some powerful entities that are
    configured to best suit your application domain. Below is a summary of the key
    concepts we covered in this chapter.


    ## Mapping Entity Inheritance Hierarchies


    JPA provides built-in support for three common O/R mapping strategies for entity
    class inheritance hierarchies: `SINGLE_TABLE`, `JOINED`, and `TABLE_PER_CLASS`.
    We examined the strengths and weaknesses of each approach, and we offered examples
    of common use cases that map best to each strategy.


    ## Using Abstract Entities, Mapped Superclasses, and Non-Entity Classes in an
    Inheritance Hierarchy


    JPA offers flexible solutions when it comes to mixing entities with abstract and
    non-entity classes in a type hierarchy. Entities may be either concrete or abstract.
    Only entity classes may be queried or serve as the targets of mapped entity relationships,
    but entities may still make use of non-entity classes, both by embedding them
    using `@Embedded` and `@ElementCollection` and by extending them or being extended
    by them. We showed some examples that mix these options together to illustrate
    their use.


    ## Polymorphic Relationships


    Relationships can be specified between entities, including abstract supertype
    entities in a hierarchy. This lets you define a relationship with entities anywhere
    along an inheritance hierarchy that will implicitly involve subtypes of that entity
    as well.


    ## Polymorphic JPQL Queries


    Similarly, JPQL queries can select or join entities of a supertype class, and
    any instances of subtypes matching the query criteria will be returned in the
    query result. We looked at how to use JPQL to build reusable `@NamedQuery` objects
    as well as the `QueryCriteria` API introduced in JPA 2.0.


    ## Using Native SQL Queries


    The `EntityManager` lets you issue native SQL queries as an overture to experienced
    SQL developers and as an optimization to avoid the overhead of querying across
    all of an entity’s fields when only a few are actually needed. We provided an
    example of how to define a named native SQL query that returns entity instances
    so that the results could be seamlessly integrated into an application.


    ## Using the Query Criteria API


    As a type safe alternative to JPQL, the criteria API introduced in JPA 2.0 allows
    you to construct queries by dynamically assembling the constituent clauses and
    predicates into a `CriteriaQuery` object that can be invoked to retrieve entity
    or other results.


    ## Composite Primary Keys and Nested Foreign Keys


    We explored the different types of composite primary key usage, showing how to
    use an `@EmbeddedId` field and multiple `@Id` fields. When an entity’s primary
    key maps to columns that are also involved in relationships to other entities
    (as when the primary key contains one or more columns that are also part of a
    foreign key), things can get a little bit dicey. We provided some examples of
    how to deal with this situation.


    ## Support for Optimistic Locking


    Using the `@Version` annotation, you can designate a field (one that is common
    to all entities in your inheritance hierarchy) to be used by the `EntityManager`
    to perform optimistic locking when managing concurrency, such as during merge
    operations. This field will be autopopulated by the persistence framework and
    should not be updated by application code.


    ## Support for Autogenerated Primary Automatic Key Values


    JPA offers declarative support for the population of `@Id` fields with unique
    values. We provided examples of how to declare both database sequence-based and
    table-based ID generators.


    ## Interceptors: Entity Callback Methods


    You can designate methods on your entity class, or on the helper class of your
    choosing, to handle entity life-cycle callbacks. We listed the callback methods
    available to you and explained how to use them to register your own custom methods
    that will be called during life-cycle events.


    # CHAPTER 5


    ![image](Images/frontdot.jpg)


    # EJB Message-Driven Beans


    This chapter discusses the need for message-oriented architecture. It introduces
    Java Message Service (JMS), the typical architecture for messaging applications,
    and details the concepts behind EJB message-driven beans (MDBs). The chapter also
    covers annotations, dependency injection, and interceptors in relation to MDBs.


    ## Message-Oriented Architecture


    Today’s IT organizations have dozens of applications and services that perform
    such well-defined tasks as inventory, billing, expense reporting, and order entry.
    With the evolution of the Internet and e-business, enterprises have started to
    think about how different applications can work independently but still be a part
    of an information workflow process at the same time.


    This new demand brings us to the concept of integrating existing applications,
    as well as building new applications that work coherently with existing applications.
    Integrating existing applications with new applications is a very complex task:
    first due to the large number of applications used by most enterprises, and second
    because of their complex business workflow.'
