- fmt: '# Stateless Session Beans with Web Service Annotations


    `Stateless session beans` that have Web service annotations need to be packaged
    into *EJB Java Archive (JAR)* files before they are deployed into EJB containers.
    For some EJB containers or application servers, they first need to be assembled
    into EAR [Enterprise Archive] files). Most EJB containers or application servers
    provide deployment utilities or Ant tasks to facilitate deployment of EJBs to
    their containers. Java-integrated development environments (IDEs) like JDeveloper,
    NetBeans, and Eclipse also provide deployment features that allow developers to
    package, assemble, and deploy EJBs to application servers. Packaging, assembly,
    and deployment aspects are covered in detail in [Chapter 11](../Text/9781430246923_Ch11.xhtml).


    In this chapter, we have developed one stateless session bean (`CreditCheckEndpointBean`)
    with Web service annotations. We will perform the following steps to compile,
    deploy, and test the stateless session bean to be published as a Web service.


    ## Prerequisites


    Before performing any of the steps detailed in the next sections, complete the
    “Getting Started” section of [Chapter 1](../Text/9781430246923_Ch01.xhtml), which
    walks you through the installation and environment setup required for the samples
    in this chapter.


    ## Compiling the Session Bean


    Copy the `Chapter06-WebServiceSamples` directory and its contents into a directory
    of your choice. Run the NetBeans IDE, and open the `Chapter06-WebServiceSamples`
    project using the `File -> Open Project` menu. Make sure that the `Open Required
    Projects` checkbox is checked, as shown in [Figure 6-5](#9781430246923_Ch06.xhtml#Fig5).


    ![9781430246923_Fig06-05.jpg](Images/9781430246923_Fig06-05.jpg)


    [Figure 6-5.](#9781430246923_Ch06.xhtml#_Fig5) Opening the `Chapter06-WebServiceSamples`
    project


    Expand the `Chapter06-WebServiceSamples-ejb` node, and observe that the session
    bean-based Web service that we created appears in `com.apress.ejb.chapter06.services`
    package. Similarly, the client servlet also appears under the `Chapter06-WebServiceSamples`-war
    node.


    ![9781430246923_Fig06-06.jpg](Images/9781430246923_Fig06-06.jpg)


    Figure 6-6. Verifying that the Session Bean and its clients are available in the
    project


    Invoke the context menu on `Chapter06-WebServiceSamples` node, and build the application
    by selecting the `Clean and Build` menu option. The session bean-based Web service
    will compile without any errors, but the client in `Chapter06-WebServiceSamples`-war
    node will show compilation errors. We will ignore these errors in the client for
    now.


    ![9781430246923_Fig06-07.jpg](Images/9781430246923_Fig06-07.jpg)


    Figure 6-7. Building the application


    ## Deploying the Session Bean-Based Web Service


    Once we have compiled the session bean, we can deploy it to the GlassFish application
    server. Invoke the context menu on `Chapter06-WebServiceSamples-ejb` node, and
    deploy the application by selecting the `Deploy` menu option, as shown in [Figure
    6-8](#9781430246923_Ch06.xhtml#Fig8).


    ![9781430246923_Fig06-08.jpg](Images/9781430246923_Fig06-08.jpg)


    [Figure 6-8.](#9781430246923_Ch06.xhtml#_Fig8) Deploying `CreditService`


    ## Testing the Credit Service


    After successful deployment, we can use the test harness to see if `CreditService`
    can be invoked properly or not. To invoke the test harness, expand the `Web Services`
    node under `Chapter06-WebServiceSamples-ejb` to expose the `CreditCheckEndpointBean`
    node, and select the `Test Web Service` menu option, as shown in [Figure 6-9](#9781430246923_Ch06.xhtml#Fig9).


    ![9781430246923_Fig06-09.jpg](Images/9781430246923_Fig06-09.jpg)


    [Figure 6-9.](#9781430246923_Ch06.xhtml#_Fig9) Testing `CreditService`


    In the generated test harness page (shown in [Figure 6-10](#9781430246923_Ch06.xhtml#Fig10)),
    enter **12345** as the credit card number, and click the `creditCheck` button.
    You can also click on the `WSDL File` link to check its contents. Bookmark the
    WSDL `File` URL, as it will be used for creating a Web service client in the later
    sections.


    ![9781430246923_Fig06-10.jpg](Images/9781430246923_Fig06-10.jpg)


    [Figure 6-10.](#9781430246923_Ch06.xhtml#_Fig10) The Web service test harness


    In the generated page, you can test the results with a SOAP request and response,
    as shown in [Figure 6-11](#9781430246923_Ch06.xhtml#Fig11).


    ![9781430246923_Fig06-11.jpg](Images/9781430246923_Fig06-11.jpg)


    [Figure 6-11.](#9781430246923_Ch06.xhtml#_Fig11) SOAP request and response messages


    So far, we have seen how to test the deployed Web services using the test harness.
    In the next section, we will discuss Web Services clients and how you can develop
    and run programs that can invoke Web services. In our case, we will be testing
    against the deployed credit service.


    ## Web Service Client View


    A stateless session bean that is published as a Web service can be accessed using
    the client view described by the WSDL document that gets generated during deployment
    (as shown in [Listing 6-7](#9781430246923_Ch06.xhtml#list7)). Since the stateless
    session bean is published as a Web service using standards such as WSDL, any type
    of client application that can send and receive SOAP messages (irrespective of
    technology or language) can invoke it. The client application can be written using
    .NET or Java EE, or scripting languages such as PHP, Python, or Ruby. From the
    client point of view, what it sees as a contract is a WSDL document. In order
    to access the Web service, programmatic interfaces should be generated from the
    WSDL document.


    Web services are location independent, and they can be accessed remotely. If the
    client application invoking a Web service is a Java client or other Java EE component,
    such as an EJB, it uses JAX-WS client APIs or annotations to invoke the Web service
    via SOAP and HTTP.


    ## Developing a Java Client That Accesses the Web Service


    In order to access a Web service via a WSDL service contract, the client program
    needs programmatic interfaces (commonly known as *stubs* or *proxies*) generated
    from the WSDL document. Once the stubs have been generated from the WSDL document,
    we can use the JAX-WS annotations to get a reference to the Web service and invoke
    it.


    ### Generating Web Service Proxy Classes


    We will start by generating stubs for the `CreditService` WSDL document using
    the `Web Service Client` wizard provided by the NetBeans IDE. Invoke the `Web
    Service Client` wizard from the context menu of `Chapter06-WebServiceSamples-ejb`
    node, as shown in [Figure 6-12](#9781430246923_Ch06.xhtml#Fig12).


    ![9781430246923_Fig06-12.jpg](Images/9781430246923_Fig06-12.jpg)


    [Figure 6-12.](#9781430246923_Ch06.xhtml#_Fig12) Invoking the Web Service Client
    wizard


    In the `Web Service Client` wizard, select the `WSDL URL` radio button, and enter
    the `WSDL File` URL that you had bookmarked in the earlier section (see [Figure
    6-10](#9781430246923_Ch06.xhtml#Fig10)). We also need to specify the package where
    the client Java artifacts will be generated. We will generate these artifacts
    in the `com.apress.ejb.chapter06.services.client` package. Enter these details,
    as shown in [Figure 6-13](#9781430246923_Ch06.xhtml#Fig13), and finish the wizard.


    ![9781430246923_Fig06-13.jpg](Images/9781430246923_Fig06-13.jpg)


    [Figure 6-13.](#9781430246923_Ch06.xhtml#_Fig13) Creating a Web Service Client


    Once the stubs are generated and compiled, we can see artifacts under `Generated
    Sources (jax-ws)` node.


    ![9781430246923_Fig06-14.jpg](Images/9781430246923_Fig06-14.jpg)


    Figure 6-14. Verifying the generated stub sources


    ![image](Images/sq.jpg) **Note** GlassFish also provides the command-line utility
    `wsimport.bat`, which can generate Web service stubs given a valid WSDL document.
    In case you are deploying the Web service to other Java EE compatible servers,
    these servers might also provide some tools or utilities to generate the stubs
    for the Web service.


    Once the stubs are generated and compiled, the next step is to create a client
    that will consume `CreditService`.'
