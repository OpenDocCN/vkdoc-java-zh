    object with a specific `CustomerOrder`, is created. This Purchase Order instance
    is passed as an argument to the `sendPOtoMDB()` method, sending the purchase order
    to the processing service. Once the call is made, the process becomes asynchronous,
    and a message is sent back to the client application that the order has been sent
