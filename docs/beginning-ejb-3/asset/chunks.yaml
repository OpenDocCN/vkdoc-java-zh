    Evolution of Java EE Web Technologies


    Java EE technologies have evolved to deliver a mature, reliable, and stable platform
    that allows developers to build enterprise-scale applications. The platform has
    evolved significantly in the Web technologies space as well. [Figure 12-8](#9781430246923_Ch12.xhtml#Fig8)
    shows the evolution of Web technologies in the Java EE platform.


    ![9781430246923_Fig12-08.jpg](Images/9781430246923_Fig12-08.jpg)


    [Figure 12-8.](#9781430246923_Ch12.xhtml#_Fig8)  The evolution of Java EE Web
    technologies


    Prior to the arrival of Java Servlets, CGI scripts were used to generate dynamic
    Web content. CGI scripts had their own limitations, including the scripts being
    run as individual processes, which led to scalability issues.


    After CGI scripts, Java Servlets became the basis of all Web technologies in the
    Java EE platform. Java Servlets provided a great start for developing standards-based
    Web components and applications that are portable across Web containers. One of
    the disadvantages of Java Servlets was they were code intensive—all of the HTML
    was printed out using `println()` methods. Servlets did not provide a bridge between
    the graphic designers who created the design of the pages and the Java programmers
    who created the dynamic content.


    JSP was next in the evolution of Web technologies; it bridged the gap between
    graphic designers and Java programmers. Based on Java Servlets technology, JSP
    pages are HTML pages with embedded Java code. This model allowed graphic designers
    to create JSP pages, which programmers could then make dynamic by adding Java
    code or *scriplets*. When compiled, JSP pages become Java servlets.


    While the advent of JSP pages was nice, many developers now had to deal with mundane
    tasks like iterating over collections of data. This led to the creation of the
    JSP Standard Tag Library (JSTL), which automated some of these tasks.


    While all of these advances in technologies simplified the building of Web applications,
    there was no standard component model for developing them. On top of this, development
    of Web applications with reusable components in fourth-generation languages (4GLs)
    like Visual Basic, Oracle Forms, and PowerBuilder weren’t available yet either.


    JSF is the latest Java EE Web technology. With the component model, it addresses
    the issues of reusable components and ease of building Web applications. The reusable
    component model is not the only thing that JSF provides, though. We will look
    into some of the other features and benefits of JSF in the following sections.


    The Model-View-Controller Pattern


    During the early phases of Java EE Web technology development, most of the Web
    applications were built using the so-called Model-I approach. The basic idea of
    Model-I is that the Web technology that renders the dynamic Web content is closely
    intertwined with the business logic of the back-end systems. There was no separation
    of concerns in this approach, which led to application maintenance issues. The
    Model-II approach (also known as the Model-View-Controller [MVC] pattern) was
    a follow-up to the Model-I approach. The key to this approach is the clean separation
    between the view layer and the model layer that supplies the data and business
    logic.


    The MVC pattern isn’t specific to the Java language as such; it dates back to
    languages like Smalltalk. In this approach, the model layer is used for the business
    logic and data, the view is used to render the user interface, and the controller
    is used for application flow and event handling. While the Java EE platform had
    been evolving with respect to the model and view-side technologies, it didn’t
    include a built-in framework that could be used on the controller side. Instead,
    many developers built homegrown controllers using Java Servlets technology. Many
    others turned to Apache Struts, which provided an alternative to writing homegrown
    controllers. Apache Struts is a widely used open source framework that has become
    the de facto controller framework for Web applications.


    Finally, JSF technology standardized the controller aspect of the MVC pattern
    by providing a controller as part of the framework.


    JSF Architecture


    [Figure 12-9](#9781430246923_Ch12.xhtml#Fig9) shows the simplified JSF architecture.
    JSF has a front controller servlet called `FacesServlet`. `FacesServlet` performs
    the role of brokering the incoming requests from clients to the right places.
    As mentioned earlier, JSF comes with reusable Web components that can be used
    to develop user interfaces. These UI components can be associated with objects
    called *managed beans*. These managed beans handle the logic for the application
    and interact with back-end systems or components like EJBs. Each UI component
    in JSF can be associated with a different render kit that can generate different
    markup, such as HTML or WML (Wireless Markup Language), onto different types of
    devices.


