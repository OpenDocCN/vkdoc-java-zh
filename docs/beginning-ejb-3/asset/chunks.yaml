    >\n    <port name=\"CreditCheckEndpointBeanPort\" binding=\"tns:CreditCheckEndpointBeanPortBinding\"\
    >\n      <soap:address location=\"http://localhost:64082/CreditService/CreditCheckEndpointBean\"\
    />\n    </port>\n  </service>\n```\n\n[Listing 6-7](#9781430246923_Ch06.xhtml#list7)\
    \ shows the complete WSDL document for the credit service that we are going to\
    \ develop later in the chapter.\n\n***[Listing 6-7](#9781430246923_Ch06.xhtml#_list7).***\
    \ The Complete WSDL Document for `CreditService.wsdl`\n\n```\n  <?xml version='1.0'\
    \ encoding='UTF-8'?>\n  <definitions xmlns:soap=\"http://schemas.xmlsoap.org/wsdl/soap/\"\
    \ xmlns:tns=\"http://www.apress.com/ejb/credit\" xmlns:xsd=\"http://www.w3.org/2001/XMLSchema\"\
    \ xmlns=\"http://schemas.xmlsoap.org/wsdl/\" targetNamespace=\"http://www.apress.com/ejb/credit\"\
    \ name=\"CreditService\">\n    <types>\n    <xsd:schema>\n      <xsd:import namespace=\"\
    http://www.apress.com/ejb3/credit\" schemaLocation=\"CreditServiceBeanService_schema1.xsd\"\
    />\n    </xsd:schema>\n    </types>\n    <message name=\"CreditCheck\">\n    \
    \  <part name=\"parameters\" element=\"tns:CreditCheck\"/>\n    </message>\n \
    \   <message name=\"CreditCheckResponse\">\n      <part name=\"parameters\" element=\"\
    tns:CreditCheckResponse\"/>\n    </message>\n    <portType name=\"CreditCheckEndpointBean\"\
    >\n      <operation name=\"CreditCheck\">\n        <input message=\"tns:CreditCheck\"\
    />\n        <output message=\"tns:CreditCheckResponse\"/>\n      </operation>\n\
    \    </portType>\n    <binding name=\"CreditCheckEndpointBeanPortBinding\" type=\"\
    tns:CreditCheckEndpointBean\">\n      <soap:binding transport=\"http://schemas.xmlsoap.org/soap/http\"\
    \ style=\"document\"/>\n      <operation name=\"CreditCheck\">\n        <soap:operation\
    \ soapAction=\"\"/>\n        <input>\n          <soap:body use=\"literal\"/>\n\
    \        </input>\n        <output>\n          <soap:body use=\"literal\"/>\n\
    \        </output>\n      </operation>\n    </binding>\n    <service name=\"CreditService\"\
    >\n      <port name=\"CreditCheckEndpointBeanPort\" binding=\"tns:CreditCheckEndpointBeanPortBinding\"\
    >\n        <soap:address location=\"http://localhost:64082/CreditService/CreditCheckEndpointBean\"\
    />\n      </port>\n    </service>\n  </definitions>\n```\n\n## SOAP\n\n*Simple\
    \ Object Access Protocol (SOAP)* is an XML-based protocol used for exchanging\
    \ information in a decentralized and distributed environment using XML. SOAP is\
    \ a standard developed by the W3C. Fundamentally, SOAP is the default transport\
    \ layer for the Web services.\n\nA SOAP message is an ordinary XML document containing\
    \ the following elements:\n\n*   The required `Envelope` element identifies the\
    \ XML document as a SOAP message. `Envelope` is the top-level element in the document.\
    \ The envelope is required, and it basically marks the start and end of the SOAP\
    \ message (although messages can contain links to objects outside the envelope).\
    \ The envelope contains the `Header` and the `Body` elements.\n*   The optional\
    \ `Header` element contains header information. When the SOAP protocol is used\
    \ over HTTP, the HTTP headers provide information about the content type, content\
    \ length, and recipient of the message. A header is included to add features to\
    \ a SOAP message without prior agreement between the communicating parties.\n\
    *   The required `Body` element contains call-and-response information. `Body`\
    \ is a mandatory element that contains the information for the recipient of the\
    \ message.\n*   The optional `Fault` element provides information about errors\
    \ that occur while the message is processed. The `Body` element can contain an\
    \ optional `Fault` element to report errors.\n\n[Figure 6-2](#9781430246923_Ch06.xhtml#Fig2)\
    \ illustrates the elements of a SOAP message.\n\n![9781430246923_Fig06-02.jpg](Images/9781430246923_Fig06-02.jpg)\n\
    \n[Figure 6-2.](#9781430246923_Ch06.xhtml#_Fig2) A SOAP Message\n\n## REST\n\n\
    *REST (REpresentational State Transfer)* is a software architecture pattern that\
    \ uses HTTP (Hyper Text Transfer Protocol) to discover, query, and manipulate\
    \ resources in a decentralized and distributed environment. In recent times, REST\
    \ has gained popularity compared to WSDL-SOAP-based implementation because of\
    \ its simplicity.\n\nUsing REST, the client accesses a resource on the server,\
    \ using the URI (Universal Resource Identifier) and the standard set of HTTP methods\
    \ (`GET`, `POST`, `PUT`, and `DELETE`). In response, the server returns a *representation*\
    \ of the resource, which is nothing but a document that contains the current or\
    \ intended state of the resource. After each access invocation and a corresponding\
    \ new resource representation response, the client is said to *transfer state*,\
    \ hence the name *Representational State Transfer*. The REST architectural pattern\
    \ mandates the following six constraints:\n\n1.  *Client–server Architecture*:\
    \ Clients and servers should be separate and can only interact via a uniform interface.\
    \ This separation means that clients are not concerned with the data-storage internals\
    \ of the server, and the server is not concerned with the user interface of the\
    \ clients.\n2.  *Stateless Interaction*: Clients and server can only interact\
    \ using a stateless protocol like HTTP. A server cannot store a client context\
    \ between requests. All requests must contain all of the information required\
    \ for those requests.\n3.  *Cacheable*: Server responses must identify themselves\
    \ as cacheable or non-cacheable. This can be used to prevent clients from using\
    \ stale data, and it can also help in improving the performance and scalability.\n\
    4.  *Layered System*: Clients should be able to connect to an intermediary system\
    \ seamlessly rather than directly to the end server. Intermediary systems provide\
    \ facilities like load balancing and shared caching that improve scalability of\
    \ the system.\n5.  *Named Resources*: Clients must be able to identify individual\
    \ server resources in each request using URIs.\n6.  *Uniform Interface*: A uniform\
    \ interface between clients and servers allow them to evolve independently.\n\n\
    ## RESTful Web Services\n\n*RESTful Web services* are services that are built\
    \ based on the above-mentioned REST principles. RESTful Web services use HTTP\
    \ and implement operations that map to common HTTP methods as shown in [Table\
    \ 6-1](#9781430246923_Ch06.xhtml#Tab1).\n\n[Table 6-1](#9781430246923_Ch06.xhtml#_Tab1).\
    \ HTTP Method to CRUD operation mapping\n\n| HTTP Method | CRUD Operation |\n\
    | --- | --- |\n| `POST` | create |\n| `GET` | retrieve |\n| `PUT` | update |\n\
    | `DELETE` | delete |"
