- fmt: 'Persistence services present a domain model to the application in the form
    of a JPA persistence unit. This persistence unit is comprised of JPA entities
    along with an `EntityManager` for performing CRUD operations on the entities and
    for managing the persistent state of those entities in a transactional context.


    [Figure 7-4](#9781430246923_Ch07.xhtml#Fig4) illustrates the entities, the inheritance
    models, and the relationships between them. The `Customer` entity is inherited
    by the `Individual` and `Distributor` entities. `InventoryItem`, `CartItem`, and
    `OrderItem` entities inherit the `WineItem` entity. The `BusinessContact` entity
    is inherited by the `Supplier` entity. The wine store persistence unit also contains
    different types of relationships between these entities (including one-to-one,
    one-to-many, and many-to-many), which will be accessed from the application code.
    The mappings used in these entities were covered in [Chapter 3](../Text/9781430246923_Ch03.xhtml)
    and [Chapter 4](../Text/9781430246923_Ch04.xhtml). We will focus on the code that
    is used in other components of this application to integrate this persistence
    unit.


    ![9781430246923_Fig07-04.jpg](Images/9781430246923_Fig07-04.jpg)


    [Figure 7-4.](#9781430246923_Ch07.xhtml#_Fig4)  The Wines Online domain model


    ## The Customer Façade Component


    `CustomerFacadeBean` is a stateless session bean. It provides business methods
    to allow the client application either to query the customer based on its e-mail
    address or perform CRUD operations on the `Customer` entity and its subclasses.
    This façade is injected with an `EntityManager` via the `@PersistenceContext`
    annotation that it uses to perform CRUD operations on `Customer` entities. [Listing
    7-1](#9781430246923_Ch07.xhtml#list1) shows the `getCustomerFindByEmail` method
    in `CustomerFacadeBean`. This method calls the named query `Customer.findByEmail`
    defined in the `Customer` entity of the wine store persistence unit using the
    `createNamedQuery()` method in the `EntityManager`.


    ![image](Images/sq.jpg) **Note**   `createNamedQuery()` is a method in the `javax.persistence.EntityManager`
    interface. This method creates an instance of `javax.persistence.Query` for executing
    a named query specified in JPQL (Java Persistence Query Language) or native SQL.


    ***[Listing 7-1](#9781430246923_Ch07.xhtml#_list1).***  The getCustomerFindByEmail
    Method


    ```

    public Customer getCustomerFindByEmail(String email) {

      return em.createNamedQuery("Customer.findByEmail", Customer.class).setParameter("email",
    email).  getSingleResult();

    }

    ```


    [Listing 7-2](#9781430246923_Ch07.xhtml#list2) shows the complete code for `CustomerFacadeBean`,
    which has the business methods to perform CRUD operations using the `EntityManager`.
    This bean class does not implement Local or Remote interfaces, and so the EJB
    container calls the bean class directly in Local mode.


    ![image](Images/sq.jpg) **Note**   In [Chapter 2](../Text/9781430246923_Ch02.xhtml),
    we provided the details on the differences between remote and client view architectures
    for session beans with a summary of advantages and disadvantages along with a
    discussion of the no-interface mode introduced in EJB 3.1. [Chapter 3](../Text/9781430246923_Ch03.xhtml)
    provided the details on the methods that are available on the `EntityManager`
    to perform the CRUD operations.


    ***[Listing 7-2](#9781430246923_Ch07.xhtml#_list2).***  CustomerFacadeBean.java


    ```

    @Stateless(name = "CustomerFacade", mappedName = "Chapter07-IntegratedSamples-Chapter07-ServiceIntegration-ejb-CustomerFacade")

    public class CustomerFacadeBean {

      @PersistenceContext(unitName = "Chapter07-WineAppUnit-JTA")

      private EntityManager em;


    public <T> T persistEntity(T entity) {

        em.persist(entity);

        return entity;

      }


    public <T> T mergeEntity(T entity) {

        return em.merge(entity);

      }


    public void removeCustomer(Customer customer) {

        customer = em.find(Customer.class, customer.getId());

        em.remove(customer);

      }


    /**

       * <code>select o from Customer o</code>

       */

      public List<Customer> getCustomerFindAll() {

        return em.createNamedQuery("Customer.findAll", Customer.class).getResultList();

      }


    public Customer getCustomerFindById(Integer id) {

        return em.find(Customer.class, id);

      }


    /**

       * <code>select o from Customer o where o.email = :email</code>

       */

      public Customer getCustomerFindByEmail(String email) {

        return em.createNamedQuery("Customer.findByEmail", Customer.class).setParameter("email",
    email).    getSingleResult();

      }


    public Customer registerCustomer(Customer customer) {

        return persistEntity(customer);

      }

    }

    ```


    ## The Search Façade Component


    `SearchFacadeBean` is a stateless session bean. This bean provides business methods
    that allow the client application to query the `Wine` entity in the persistence
    unit based on the year, country, and varietal of the wine. The persistence unit
    in `SearchFacadeBean` is injected via the `@PersistenceContext` annotation. [Listing
    7-3](#9781430246923_Ch07.xhtml#list3) shows the complete code for `SearchFacadeBean`,
    which has the business methods to perform search operations using the `EntityManager`.
    This bean class has a business interface, `SearchFacadeLocal`, which supports
    local client access. The methods `getWineFindAll()`, `getWineFindByYear()`, `getWineFindByCountry()`,
    and `getWineFindByVarietal()` call the respectively named queries defined in the
    `Wine` entity of the wine store persistence unit using the `createNamedQuery()`
    method in the `EntityManager`, and return zero or more `Wine` objects in `java.util.List`.


    ***[Listing 7-3](#9781430246923_Ch07.xhtml#_list3).***  SearchFacadeBean.java


    ```

    @Stateless(name = "SearchFacade", mappedName = "Chapter07-IntegratedSamples-Chapter07-ServiceIntegration-ejb-SearchFacade")

    public class SearchFacadeBean implements SearchFacadeLocal {

      @PersistenceContext(unitName = "Chapter07-WineAppUnit-JTA")

      private EntityManager em;


    public Object queryByRange(String jpqlStmt, int firstResult, int maxResults) {

        Query query = em.createQuery(jpqlStmt);

        if (firstResult > 0) {

          query = query.setFirstResult(firstResult);

        }

        if (maxResults > 0) {

          query = query.setMaxResults(maxResults);

        }

        return query.getResultList();

      }


    public <T> T persistEntity(T entity) {

        em.persist(entity);

        return entity;

      }


    public <T> T mergeEntity(T entity) {

        return em.merge(entity);

      }


    public void removeWine(Wine wine) {

        wine = em.find(Wine.class, wine.getId());

        em.remove(wine);

      }


    /**

       * <code>select object(o) from Wine o</code>

       */

      public List<Wine> getWineFindAll() {

        return em.createNamedQuery("Wine.findAll", Wine.class).getResultList();

      }


    /**

       * <code>select object(wine) from Wine wine where wine.year = :year</code>

       */

      public List<Wine> getWineFindByYear(Integer year) {

        return em.createNamedQuery("Wine.findByYear", Wine.class).setParameter("year",
    year).    getResultList();

      }


    /**

       * <code>select object(wine) from Wine wine where wine.country = :country</code>

       */

      public List<Wine> getWineFindByCountry(String country) {

        return em.createNamedQuery("Wine.findByCountry", Wine.class).setParameter("country",
    country).    getResultList();

      }


    /**

       * <code>select object(wine) from Wine wine where wine.varietal = :varietal</code>

       */

      public List<Wine> getWineFindByVarietal(String varietal) {

        return em.createNamedQuery("Wine.findByVarietal", Wine.class).setParameter("varietal",    
    varietal).getResultList();

      }

    }

    ```


