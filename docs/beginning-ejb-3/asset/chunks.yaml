- fmt: '# EJB 3 简化开发模型


    `EJB 3` 在消除早期 `EJB` 版本中困扰企业 Bean 类及其必需接口的繁琐特性方面取得了巨大进步。与开发者抱怨即使定义最基本的 Bean 行为也必须编写
    `XML` 元数据类似，他们发现必须编写自定义接口来处理企业 Bean 的工厂支持非常繁琐，并且要求会话 Bean 的接口扩展 `EJB` 特定接口也很不方便。所有这些限制都在
    `EJB 3` 中得到了解决。


    `Home` 方法不再是强制性的，尽管它们仍然受支持。对于会话 Bean 和 `MDB`，默认构造函数取代了早期 `EJB` 规范要求的无参数 `ejbCreate()`
    方法。


    对于实体，`Home` 接口被 `EntityManagerFactory` 实例取代，该实例为 `JPA` 持久化单元生成 `EntityManager`
    实例，以管理实体生命周期操作，包括查询执行。


    ## 智能使用默认值


    `EJB 3` 如何简化开发过程的一个绝佳示例是其利用默认行为，无需任何编码或声明性元数据即可提供丰富的功能。例如，只需使用 `@Entity` 注解标记
    `POJO`，其所有公共属性就会自动成为持久化字段，表名和列名将采用与实体和字段名称匹配的派生值。仅在需要覆盖特定区域的默认行为时，才需要额外的注解或 `XML`
    元素。仅当表名与实体名不匹配时，才需要 `@Table` 注解。我们已非常谨慎地确保默认值与最常见的用法相匹配，因此在大多数用例中，不需要显式元数据，从而产生更精简、更无冗余的代码。


    ![image](Images/sq.jpg) **注意** 依赖默认行为的一个后果是，类不会在任何地方描述其完整行为，因此您需要充分了解正在应用的默认行为。`IDE`
    可用于派生和显示企业 Bean 或实体，并显式显示其完全默认的值。


    ## 分布式计算模型


    任何企业应用程序的核心都是在单独的 `Java` 线程或进程中执行任务和运行组件的能力。通过基于 `RMI` 的远程服务，应用程序客户端层中的客户端可以访问网络上任何位置的应用服务器中运行的
    `EJB`。远程接口方法的传值行为提供了一种粗粒度模型，旨在减少松散连接的客户端和服务器之间的网络流量。然而，许多使用 `EJB` 的应用程序不需要远程访问，并选择将其
    `EJB` 配置为本地使用。这消除了远程访问支持的开销，同时继续提供其余的企业服务。


    ## EJB 角色


    `EJB` 规范为参与定义企业 Bean 或实体不同阶段，或为企业 Bean 提供服务和 `API` 实现的个人定义了七个角色。本书针对的是参与定义企业 Bean
    及其相关元数据的三个角色。在实践中，这些角色中的一个或多个可能由同一个人执行，某些任务可能由一个角色执行并由另一个角色覆盖；但理解 `EJB` 开发过程中任务的逻辑划分是有用的。我们将在本书的各个章节中引用这些角色。


    ### 企业 Bean 提供者


    企业 Bean 提供者，也称为 Bean 提供者，负责定义和实现企业 Bean 的业务逻辑和结构。这包括定义 `Java` 类、实现服务方法、在 Bean
    及其方法上声明性地指定事务和安全性信息、注入或查找所需资源，以及任何其他可应用于企业 Bean 类的内容。


    应用于 `JPA` 实体时，Bean 提供者定义实体的持久化结构及其与其他实体的关系。提供者可以定义映射和主键生成行为，但此角色通常仅限于定义实体的逻辑依赖关系和结构。


    ### 应用程序组装者


    应用程序组装者将 `EJB` 组合成 `EJB` 模块，将实体组合成持久化归档，然后将这些模块与其他 `Java EE` 模块组合在一起以生成应用程序。此任务需要解析对逻辑服务器资源的引用，包括
    `EJB` 之间的引用。应用程序组装者必须使用为 `EJB` 和实体组件定义的接口和元数据，但无需熟悉实现细节。


    ### 部署者


    部署者获取由应用程序组装者组装好的应用程序，并将其部署到特定的应用服务器实例或集群。部署者必须解析 `EJB` 组件定义的所有外部依赖关系，将它们映射到应用服务器环境中安装的具体资源。对于实体，部署者可以提供或覆盖实体将映射到的实时数据库对象的详细信息。


    ## 本书的组织结构


    为了让您了解本书其余部分的结构，以下是各章的简要摘要。您无需按顺序阅读这些章节。每章都附有示例程序，它们可以独立运行。不过，主题是渐进式介绍的，因此如果您在某章中遇到该章未定义的术语或概念，很可能是在本书的前面章节中定义的。


    [第 1 章](../Text/9781430246923_Ch01.xhtml)：`EJB 3` 架构简介


    本章首先介绍本书并提供 `EJB` 的概述。该概述涵盖 `EJB` 开发框架和组件模型、`EJB` 的核心特性、`EJB` 的历史、`EJB 3` 简化开发模型以及
    `EJB` 分布式计算模型。本章最后有一个“入门”部分，帮助您安装运行本书提供的许多示例应用程序所需的 `NetBeans IDE` 和 `GlassFish
    Java EE` 参考实现服务器。


    [第 2 章](../Text/9781430246923_Ch02.xhtml)：`EJB` 会话 Bean


    [第 2 章](../Text/9781430246923_Ch02.xhtml) 探讨了 `EJB` 的主要服务对象：会话 Bean。会话 Bean 在其多种角色中被审视：作为实体外观、作为服务组件（无论是否带有状态）、作为单例或定时器驱动对象，以及作为事务和安全服务的主要协调者。


    [第 3 章](../Text/9781430246923_Ch03.xhtml)：实体与 `Java` 持久化 `API`


    介绍了 `Java` 持久化 `API`（`JPA`），以及可用于在 `Java EE` 容器内部和外部支持实体的各种持久化服务。本章涵盖了基本的 `O/R`
    映射，并介绍了 `Java` 持久化查询语言（`JPQL`）。


    [第 4 章](../Text/9781430246923_Ch04.xhtml)：高级持久化特性


    深入探讨更高级的持久化概念，本章描述了 `JPA` 中为映射实体继承层次结构提供的支持。三种受支持的继承映射策略的示例指出了每种方法的优缺点，以帮助您决定哪种方法最适合您应用程序的特定需求。在其他主题中，本章还涵盖了复杂主键（`PK`）映射、用于使用数据库序列或表自动填充主键值的
    `ID` 生成器、锁定策略和缓存管理。


    [第 5 章](../Text/9781430246923_Ch05.xhtml)：`EJB` 消息驱动 Bean'
  raw: 'EJB 3 took great strides to eliminate the trappings that beset enterprise
    bean classes and their required interfaces in earlier EJB releases. Similar to
    complaints over having to define XML metadata to specify even the most basic bean
    behavior, developers found it burdensome to have to write custom interfaces to
    handle an enterprise bean’s factory support, and inconvenient to require a session
    bean’s interfaces to extend EJB-specific interfaces. All of these limitations
    were addressed in EJB 3.


    Home methods are no longer mandated, although they’re still supported. For session
    beans and MDBs, a default constructor replaces the no-argument `ejbCreate()` method
    required by earlier EJB specs.


    For entities, the `Home` interface is replaced by an `EntityManagerFactory` instance
    that produces `EntityManager` instances for a JPA persistence unit to manage entity
    life-cycle operations, including query execution.


    Intelligent Use of Defaults


    An excellent example of how EJB 3 simplifies the development process is its leveraging
    of default behavior to provide rich functionality with no coding or declarative
    metadata required. For instance, by simply marking a POJO with the `@Entity` annotation,
    all of its public properties automatically become persistent fields, and the table
    and column names take on derived values that match the entity and field names.
    Additional annotations or XML elements are only required when overriding the default
    behavior of a particular area. Only when the table name does not match the entity
    name is the `@Table` annotation required. Great care has been taken to ensure
    that the default values match the most common usages so that, in the majority
    of use cases, explicit metadata is not required, leading to leaner, more clutter-free
    code.


    ![image](Images/sq.jpg) **Note**   One consequence of relying on default behavior
    is that the class does not describe its full behavior anywhere, so you need to
    have a good understanding of the default behavior that is being applied. IDEs
    can be useful in deriving and displaying the enterprise bean or entity with its
    fully defaulted values explicitly shown.


    Distributed Computing Model


    Essential to any enterprise application is the ability to execute tasks and run
    components in separate Java threads or processes. Through the RMI-based remoting
    services, clients in an application client tier may access EJBs running in an
    application server anywhere on the network. The pass-by-value behavior of remote
    interface methods provides a coarse-grained model designed to reduce network traffic
    between clients and servers that are loosely connected to each other. Many applications
    that use EJB do not require remote access, however, and elect to configure their
    EJBs for local use. This eliminates the overhead of remote access support while
    continuing to offer the remaining enterprise services.


    EJB Roles


    The EJB spec defines seven roles for individuals involved in the different stages
    of defining an enterprise bean or entity, or in providing services and API implementation
    to enterprise beans. This book is targeted at the three roles involved in defining
    enterprise beans and their associated metadata. In practice, one or more of these
    roles may be performed by the same individual, and certain tasks may be performed
    by one role and overridden by another; but it is useful to understand the logical
    partitioning of tasks in the EJB development process. We will refer to these roles
    in various sections throughout the book.


    The Enterprise Bean Provider


    The Enterprise Bean Provider, also known as the Bean Provider, has the responsibility
    of defining and implementing the business logic and structure of an enterprise
    bean. This includes defining the Java class, implementing service methods, specifying
    transactional and security information declaratively on the bean and its methods,
    injection or lookup of required resources, and anything else that can be applied
    to the enterprise bean class.


    Applied to JPA entities, the Bean Provider defines the persistent structure of
    the entity and its relationships with other entities. The provider may define
    mapping and primary key–generation behavior, but this role is generally limited
    to defining the logical dependencies and structure of the entity.


    The Application Assembler


    The Application Assembler combines EJBs into EJB modules and entities into persistence
    archives, and then it combines these modules together with other Java EE modules
    to produce an application. This task requires resolving references to logical
    server resources including references between EJBs. The Application Assembler
    must work with the interfaces and metadata defined for the EJB and entity components
    but need not be familiar with the implementation details.


    The Deployer


    The Deployer takes an application that has been assembled by the Application Assembler
    and deploys it to a particular application server instance or cluster. The Deployer
    must resolve all of the external dependencies defined by the EJB component, mapping
    them to concrete resources installed in the application server environment. In
    the case of entities, the Deployer may provide or override the details of the
    live database objects to which the entities will map.


    How This Book Is Organized


    To orient you to the structure of the remainder of this book, here is a brief
    summary of each chapter. There is no requirement that you read these chapters
    in order. Sample programs accompany each chapter, and they may be run independently
    of one another. Topics are introduced progressively, though, and thus if you find
    a reference in one chapter to a term or concept that is not defined in that chapter,
    chances are that it was defined in an earlier chapter of the book.


    [Chapter 1](../Text/9781430246923_Ch01.xhtml): Introduction to the EJB 3 Architecture


    This chapter opens by introducing the book and offering an orientation to EJB.
    This orientation covers the EJB development framework and component model, the
    core features of EJB, the history of EJB, the EJB 3 simplified development model,
    and the EJB distributed computing model. The chapter concludes with a “Getting
    Started” section to help you install the NetBeans IDE and GlassFish Java EE reference
    implementation server required to run the many sample applications provided with
    this book.


    [Chapter 2](../Text/9781430246923_Ch02.xhtml): EJB Session Beans


    [Chapter 2](../Text/9781430246923_Ch02.xhtml) explores EJB’s primary service object:
    the session bean. Session beans are examined in their many roles: as entity facades,
    as service components—both with and without state, as singleton or timer-driven
    objects, and as the primary orchestrators of transaction and security services.


    [Chapter 3](../Text/9781430246923_Ch03.xhtml): Entities and the Java Persistence
    API


    The Java Persistence API (JPA) is introduced, along with the various persistence
    services that are available to support entities both within a Java EE container
    and outside of one. This chapter covers basic O/R mappings, and it introduces
    the Java Persistence Query Language, or JPQL.


    [Chapter 4](../Text/9781430246923_Ch04.xhtml): Advanced Persistence Features


    Delving into more advanced persistence concepts, this chapter describes the support
    offered in JPA for mapping entity inheritance hierarchies. Examples of the three
    supported inheritance mapping strategies identify the strengths and weaknesses
    of each approach in order to help you decide which one best suits the particular
    needs of your application. Among other topics, this chapter also covers complex
    primary key (PK) mappings, ID generators for autopopulating primary key values
    using a database sequence or table, locking strategies and cache management.


    [Chapter 5](../Text/9781430246923_Ch05.xhtml): EJB Message-Driven Beans'
  trans: '

    EJB 3 在消除早期 EJB 版本中困扰企业 Bean 类及其必需接口的繁琐机制方面取得了长足进步。与开发者抱怨即使定义最基本的 Bean 行为也必须编写
    XML 元数据类似，他们发现必须编写自定义接口来处理企业 Bean 的工厂支持非常繁琐，并且要求会话 Bean 的接口继承 EJB 特定接口也很不方便。所有这些限制都在
    EJB 3 中得到了解决。


    Home 方法不再是强制性的，尽管它们仍然受支持。对于会话 Bean 和 MDB，默认构造函数取代了早期 EJB 规范要求的无参 `ejbCreate()`
    方法。


    对于实体，`Home` 接口被 `EntityManagerFactory` 实例取代，该实例为 JPA 持久化单元生成 `EntityManager` 实例，以管理实体生命周期操作，包括查询执行。


    **智能使用默认值**


    EJB 3 如何简化开发过程的一个绝佳示例是其利用默认行为，无需任何编码或声明性元数据即可提供丰富的功能。例如，只需使用 `@Entity` 注解标记一个
    POJO，其所有公共属性就会自动成为持久化字段，并且表和列名称会采用与实体和字段名称匹配的派生值。仅在需要覆盖特定区域的默认行为时，才需要额外的注解或 XML
    元素。仅当表名称与实体名称不匹配时，才需要 `@Table` 注解。我们已非常谨慎地确保默认值与最常见的用法相匹配，这样在大多数用例中，就不需要显式元数据，从而产生更精简、更整洁的代码。


    ![image](img/sq.jpg) **注意** 依赖默认行为的一个后果是，类不会在任何地方描述其完整行为，因此您需要充分了解正在应用的默认行为。IDE
    在推导和显示企业 Bean 或实体及其显式显示的完全默认值方面可能很有用。


    **分布式计算模型**


    任何企业应用程序的核心都是能够在单独的 Java 线程或进程中执行任务和运行组件。通过基于 RMI 的远程服务，应用程序客户端层中的客户端可以访问网络上任何位置的应用服务器中运行的
    EJB。远程接口方法的传值行为提供了一种粗粒度模型，旨在减少松散连接的客户端和服务器之间的网络流量。然而，许多使用 EJB 的应用程序不需要远程访问，并选择将其
    EJB 配置为本地使用。这消除了远程访问支持的开销，同时继续提供其余的企业服务。


    **EJB 角色**


    EJB 规范为参与定义企业 Bean 或实体不同阶段，或为企业 Bean 提供服务和 API 实现的个人定义了七个角色。本书针对的是参与定义企业 Bean
    及其相关元数据的三个角色。在实践中，这些角色中的一个或多个可能由同一个人执行，某些任务可能由一个角色执行并由另一个角色覆盖；但理解 EJB 开发过程中任务的逻辑划分是有用的。我们将在本书的各个章节中引用这些角色。


    **企业 Bean 提供者**


    企业 Bean 提供者，也称为 Bean 提供者，负责定义和实现企业 Bean 的业务逻辑和结构。这包括定义 Java 类、实现服务方法、在 Bean 及其方法上声明性地指定事务和安全性信息、注入或查找所需资源，以及任何其他可应用于企业
    Bean 类的内容。


    应用于 JPA 实体时，Bean 提供者定义实体的持久化结构及其与其他实体的关系。提供者可以定义映射和主键生成行为，但此角色通常仅限于定义实体的逻辑依赖关系和结构。


    **应用程序组装者**


    应用程序组装者将 EJB 组合成 EJB 模块，将实体组合成持久化归档，然后将这些模块与其他 Java EE 模块组合在一起以生成应用程序。此任务需要解析对逻辑服务器资源的引用，包括
    EJB 之间的引用。应用程序组装者必须使用为 EJB 和实体组件定义的接口和元数据，但无需熟悉实现细节。


    **部署者**


    部署者获取由应用程序组装者组装好的应用程序，并将其部署到特定的应用服务器实例或集群。部署者必须解析 EJB 组件定义的所有外部依赖关系，将它们映射到安装在应用服务器环境中的具体资源。对于实体，部署者可以提供或覆盖实体将映射到的实际数据库对象的详细信息。


    **本书的组织方式**


    为了让您了解本书其余部分的结构，以下是每章的简要总结。您无需按顺序阅读这些章节。每章都附有示例程序，它们可以独立运行。不过，主题是逐步介绍的，因此，如果您在某章中引用了该章未定义的术语或概念，那么它很可能是在本书的前面章节中定义的。


    第 1 章：EJB 3 架构简介


    本章首先介绍本书并提供 EJB 的概述。该概述涵盖 EJB 开发框架和组件模型、EJB 的核心特性、EJB 的历史、EJB 3 简化开发模型以及 EJB 分布式计算模型。本章最后有一个“入门”部分，帮助您安装运行本书提供的许多示例应用程序所需的
    NetBeans IDE 和 GlassFish Java EE 参考实现服务器。


    第 2 章：EJB 会话 Bean


    第 2 章 探讨了 EJB 的主要服务对象：会话 Bean。会话 Bean 在其多种角色中被审视：作为实体外观、作为服务组件（无论是否包含状态）、作为单例或定时器驱动对象，以及作为事务和安全性服务的主要协调者。


    第 3 章：实体与 Java 持久化 API


    本章介绍了 Java 持久化 API (JPA)，以及可用于在 Java EE 容器内部和外部支持实体的各种持久化服务。本章涵盖了基本的 O/R 映射，并介绍了
    Java 持久化查询语言 (JPQL)。


    第 4 章：高级持久化特性


    本章深入探讨更高级的持久化概念，描述了 JPA 中为映射实体继承层次结构提供的支持。三种受支持的继承映射策略的示例指出了每种方法的优缺点，以帮助您决定哪种方法最适合您应用程序的特定需求。在其他主题中，本章还涵盖了复杂主键
    (PK) 映射、用于使用数据库序列或表自动填充主键值的 ID 生成器、锁定策略和缓存管理。


    第 5 章：EJB 消息驱动 Bean

