- fmt: '# EJB 3.0 简化开发模型


    `EJB 3.0`是该标准演进中的一个重要里程碑。它引入了一种新的简化开发模型（见下文），`EJB`组件变成了`POJO`（普通 Java 对象）；`EJB`的
    bean 类不再需要实现`EJB`特定的接口，并且使 Java 类成为`EJB`的属性被提取到 Java 注解中，或外部捕获在`ejb-jar.xml`部署描述符文件中。只需满足几个基本条件，任何类都可以成为`EJB`，并利用`EJB`容器提供的企业级服务。


    同样在`EJB 3.0`中新增的是，规范中的实体 Bean 部分被新的`JPA`规范所取代，并且与新的简化开发模型一致，`JPA`实体也是`POJO`。`JPA`实体也与`EJB`容器解耦，可以独立于`EJB`使用，包括在纯
    Java SE 环境中。


    ## EJB 3.1


    `EJB 3.1`进一步改进了`EJB 3.0`中引入的简化开发模型。本地`EJB`现在支持无接口选项。为会话 Bean 提供了单例模式，以及异步和增强的定时器支持。`EJB
    Lite`——`EJB`容器功能的一个可嵌入子集——允许`EJB`组件在与`EJB`客户端相同的虚拟机中执行。


    ## EJB 3.2


    在`EJB 3.2`中，异步和增强的定时器功能被添加到`EJB Lite`子集中。除了其他改进之外，bean 开发者获得了对生命周期拦截器方法事务性的更多控制权，并且管理本地和远程行为声明的规则也得到了简化。


    ## EJB 3 简化开发模型


    `EJB 3.0`与早期版本有显著不同。`EJB 3`的设计者着手重新设计开发体验；引入一个大大简化的开发模型，以降低企业 bean 本身的复杂性；同时，整合了许多在同类技术中发现的理念。共识是：该规范被广泛认为实现了这些目标，并且在此过程中克服了许多阻碍早期版本`EJB`被广泛采用的问题。


    ### XML 与注解


    如果你熟悉早期版本的`EJB`，你在`EJB 3`中首先会注意到的事情之一是，不再需要在部署描述符中捕获`EJB`元数据。`EJB`现在允许你使用 Java
    注解将`EJB`元数据存储在 bean 源代码内部。这并不是说 XML 部署描述符已经消失；它们仍然存在并且运行良好，许多开发者更喜欢它们而不是注解。使用
    XML 将 Java 源代码与`EJB`元数据解耦，允许相同的实体或企业 bean 类在不同的上下文中使用，其中特定于上下文的信息被捕获在 XML 中，并且不会“污染”bean
    类。


    然而，许多用户更倾向于在其`POJO`类的上下文中直接查看他们的`EJB`元数据并使用注解。为了避免陷入一场宗教战争（双方都有直言不讳的支持者），我们建议你自己选择。我们遵循的一个简单规则是：如果我们需要将实体和
    bean 类与其`EJB`元数据解耦，例如当我们希望使用相同的实体类配合两种不同的实体继承策略时，我们将元数据放在 XML 中。否则，我们坚持使用注解。别忘了——你总是可以混合搭配，依靠一个坚定的策略：每当使用
    XML 和注解为某个元素指定元数据时，XML 总是获胜。这允许 bean 开发者下游的任何角色（参见本章后面的“EJB 角色”部分）覆盖元数据设置，而无需更新
    Java 源代码，因为覆盖可以仅应用于 XML 描述符。


    ![image](Images/sq.jpg) **注意** 我们还推荐一种更高级的策略：仅在定义企业 bean 或实体的行为（该行为真正是其定义不可或缺的一部分）时使用注解，例如实体关系字段的关系类型，或会话
    Bean 上方法的事务性要求。任何可以合理覆盖的内容，例如实体映射到的表名，或用于填充实体主键的值生成器的详细信息，都应该放在 XML 描述符中，这样应用程序组装者（可能在与数据库管理员协商后）可以在部署时指定它们。虽然在
    Java 源文件中使用注解指定默认值没有坏处，但这种方法区分了不应修改的固定元数据和可以自由修改而不改变企业 bean 或实体行为的松散元数据。


    ### 依赖注入


    在`EJB`于 Java EE 容器中被实例化之后，但在它被交给客户端之前，容器可以根据为该企业 bean 定义的规则初始化实例上的属性数据。这个特性被称为*依赖注入*，它是控制反转模式的一个例子，即由外部提供者而不是类本身来初始化对象实例的属性。`EJB
    3`在 Java EE 中引入了依赖注入的使用，并且很大程度上因为它非常流行，这个特性现在有了自己的规范。当前的依赖注入 API 通过*JSR-330: Dependency
    Injection for Java*^(*TM*)进行管理，并且该功能通过*JSR 346: Contexts and Dependency Injection
    for Java*^(*TM*)*EE 1.1*进一步扩展，我们将在[第 10 章](../Text/9781430246923_Ch10.xhtml)“上下文与依赖注入”中介绍。


    ![image](Images/sq.jpg) **注意** 注入使用“推送”模型将数据推送到 bean，并且无论 bean 是否实际使用该数据都会发生。如果存在数据不会被使用的可能性，bean
    可以选择避免承担资源派生的成本，而是通过在实际（或可能）使用时，在 Java 代码中执行 Java 命名和目录接口（`JNDI`）查找来“拉取”数据。


    `EJB`中依赖注入使用的常见示例如下：


    *   将`EntityManager`注入到会话 Bean 中，用于与持久化单元中的实体进行交互

    *   将`UserTransaction`注入到管理其事务划分的会话 Bean 中


    ### 拦截器：回调方法


    企业 bean 和实体都可以指定它们的一些方法，或单独类上的方法，在发生某些生命周期事件时被调用。例如，会话 Bean 可以指示在 bean 被实例化之后、但在它被交给客户端之前，应该调用某个方法。此方法可以初始化
    bean 上的状态信息，或使用`JNDI`查找资源，或执行它希望的任何其他操作，前提是它不需要事务上下文。这种回调方法被称为*拦截器*，它们允许 bean
    开发者以编程方式参与企业 bean 或实体与其容器之间的交互。这种模式（也称为*横切*）的一个重要优点是，单个拦截器可以定义一次，然后应用于多个方法，甚至多个`EJB`。


    ### POJO 实现'
  raw: 'EJB 3.0 was a major milestone in the evolution of the standard. Introducing
    a new, simplified development model (see below), EJB components became POJOs (plain
    old Java objects); an EJB’s bean class was no longer required to implement EJB-specific
    interfaces, and the properties that made a Java class an EJB were factored out
    into Java annotations or captured externally in the `ejb-jar.xml` deployment descriptor
    file. With a few basic conditions, any class could become an EJB and leverage
    the enterprise services offered by an EJB container.


    Also new in EJB 3.0, the Entity Beans portion of the spec was replaced by the
    new JPA spec and, consistent with the new simplified development model, JPA entities
    were POJOs as well. JPA entities were also decoupled from the EJB container and
    could be used independently of EJB, including in a pure Java SE environment.


    EJB 3.1


    EJB 3.1 further improved upon the simplified development model introduced in EJB
    3.0\. The no-interface option was now supported for Local EJBs. The Singleton
    pattern was offered for Session beans along with Asynchronous and enhanced Timer
    support. EJB Lite—an embeddable subset of the EJB Container’s functionality—allowed
    EJB components to be executed in the same VM as an EJB client.


    EJB 3.2


    In EJB 3.2, the Asynchronous and enhanced Timer features are added to the EJB
    Lite subset. Along with other improvements, the bean developer is offered more
    control over the transactionality of life-cycle interceptor methods, and the rules
    governing declaration of Local and Remote behavior have been simplified.


    EJB 3 Simplified Development Model


    EJB 3.0 was a significant departure from earlier releases. The architects of EJB
    3 set out to redesign the development experience; to introduce a greatly simplified
    development model that would reduce the complexity of the enterprise beans themselves;
    and, at the same time, incorporate many of the ideas found in peer technologies.
    The consensus is in: the spec has been widely hailed as having achieved these
    goals, and in so doing has overcome many of the problems that prevented earlier
    versions of EJB from becoming widely adopted.


    XML and Annotations


    If you are familiar with earlier versions of EJB, one of the first things you
    will notice in EJB 3 is that it is no longer necessary to capture EJB metadata
    in a deployment descriptor. EJB now lets you store your EJB metadata inside your
    bean source using Java annotations. This isn’t to say that XML deployment descriptors
    have gone away; they are still alive and well, and many developers prefer them
    to annotations. Using XML decouples the Java source from the EJB metadata, allowing
    the same entity or enterprise bean classes to be used in different contexts, where
    the context-specific information is captured in the XML and doesn’t “pollute”
    the bean class.


    Many users, however, will prefer to view their EJB metadata directly in the context
    of their POJO classes and use annotations. To avoid wading into a religious war
    (vocal proponents on both sides abound), we suggest that you choose for yourself.
    A simple rule we follow is this: if we need to decouple our entity and bean classes
    from their EJB metadata, as when we want to use the same entity classes with two
    different entity inheritance strategies, we put our metadata in XML. Otherwise,
    we stick with annotations. Don’t forget—you can always mix and match, relying
    on the firm policy that whenever metadata is specified for an element using both
    XML and annotations, the XML always wins. This allows any role (see the “EJB Roles”
    section later in the chapter) downstream of the bean developer to override metadata
    settings without having to update the Java source, since overrides can be applied
    exclusively to the XML descriptors.


    ![image](Images/sq.jpg) **Note**   A more advanced strategy, which we also recommend,
    is to use annotations only when defining behavior on an enterprise bean or an
    entity that is truly integral to its definition, such as the relationship type
    of an entity relationship field, or the transactional requirements of a method
    on a session bean. Anything that could reasonably be overridden, such as the name
    of the table to which an entity maps, or the details of a value generator used
    for populating the primary key on an entity, would go in the XML descriptor, where
    it can be specified at deploy time by an application assembler, perhaps in consultation
    with a database administrator. While there is no harm in specifying default values
    using annotations in the Java source file, this approach recognizes the difference
    between firm metadata, which ought not to be modified, and loose metadata that
    may be freely modified without changing the behavior of the enterprise bean or
    entity.


    Dependency Injection


    After an EJB is instantiated inside the Java EE container, but before it is handed
    out to a client, the container may initialize property data on the instance according
    to rules defined for that enterprise bean. This feature is called *dependency
    injection*, and it is an example of inversion of control pattern, whereby an external
    provider initializes the properties of an object instance instead of by the class
    itself. EJB 3 introduced the use of dependency injection in Java EE and, largely
    because it caught on so well, this feature has now been given its own spec. The
    current dependency injection API is managed through *JSR-330: Dependency Injection
    for Java*^(*TM*), and the functionality is further extended through *JSR 346:
    Contexts and Dependency Injection for Java*^(*TM*)*EE 1.1*, which we cover in
    [Chapter 10](../Text/9781430246923_Ch10.xhtml), “Contexts and Dependency Injection.”


    ![image](Images/sq.jpg) **Note**   Injection uses a “push” model to push data
    out to the bean, and it occurs regardless of whether the bean actually uses the
    data. If there is a chance that the data will not be used, the bean may elect
    to avoid incurring the cost of the resource derivation by performing a Java Naming
    and Directory Interface (JNDI) lookup in Java code to “pull” the data, only if
    it is actually (or likely to be) used.


    Common examples of dependency injection use in EJB are as follows:


    *   Injecting an `EntityManager` into a session bean for interacting with entities
    in a persistence unit

    *   Injecting a `UserTransaction` into a session bean that manages its transaction
    demarcation


    Interceptors: Callback Methods


    Both enterprise beans and entities may designate some of their methods, or methods
    on separate classes, to be called when certain life-cycle events occur. For instance,
    a session bean may indicate that a certain method should be called after the bean
    has been instantiated, but before it has been handed off to a client. This method
    may initialize state information on the bean, or look up resources using JNDI,
    or any other action it wishes, provided that it does not require a transactional
    context. Such callback methods are called *interceptors*, and they allow bean
    developers to participate programmatically in the interaction between an enterprise
    bean, or an entity, and its container. An important advantage of this pattern
    (also known as *cross-cutting*) is that a single interceptor may defined once
    and then applied to multiple methods, or even multiple EJBs.


    POJO Implementation'
  trans: '

    EJB 3.0 是该标准演进过程中的一个重要里程碑。它引入了一种新的、简化的开发模型（见下文），EJB 组件变成了 POJO（普通老式 Java 对象）；EJB
    的 bean 类不再需要实现 EJB 特定的接口，而将 Java 类变为 EJB 的那些属性被提取到 Java 注解中，或者被捕获在外部的 `ejb-jar.xml`
    部署描述符文件中。只需满足几个基本条件，任何类都可以成为 EJB，并利用 EJB 容器提供的企业级服务。


    同样在 EJB 3.0 中新增的是，规范中的实体 Bean 部分被新的 JPA 规范所取代，并且与新的简化开发模型一致，JPA 实体也是 POJO。JPA
    实体也与 EJB 容器解耦，可以独立于 EJB 使用，包括在纯 Java SE 环境中使用。


    EJB 3.1


    EJB 3.1 进一步改进了 EJB 3.0 中引入的简化开发模型。本地 EJB 现在支持无接口选项。会话 Bean 提供了单例模式，以及异步和增强的定时器支持。EJB
    Lite——EJB 容器功能的一个可嵌入子集——允许 EJB 组件在与 EJB 客户端相同的虚拟机中执行。


    EJB 3.2


    在 EJB 3.2 中，异步和增强的定时器功能被添加到 EJB Lite 子集中。除了其他改进之外，Bean 开发者可以对生命周期拦截器方法的事务性拥有更多控制权，并且管理本地和远程行为声明的规则也得到了简化。


    EJB 3 简化开发模型


    EJB 3.0 与早期版本相比有显著不同。EJB 3 的设计者着手重新设计开发体验；引入一个大大简化的开发模型，以减少企业 Bean 本身的复杂性；同时，吸收了许多同类技术中的思想。共识是：该规范被广泛认为实现了这些目标，并因此克服了许多阻碍早期版本
    EJB 被广泛采用的问题。


    XML 与注解


    如果你熟悉早期版本的 EJB，你在 EJB 3 中首先会注意到的事情之一就是，不再需要在部署描述符中捕获 EJB 元数据。EJB 现在允许你使用 Java
    注解将 EJB 元数据存储在 Bean 源代码中。这并不是说 XML 部署描述符已经消失；它们仍然存在且运行良好，并且许多开发者更喜欢它们而不是注解。使用
    XML 可以将 Java 源代码与 EJB 元数据解耦，允许相同的实体或企业 Bean 类在不同的上下文中使用，其中特定于上下文的信息被捕获在 XML 中，并且不会“污染”
    Bean 类。


    然而，许多用户更倾向于在其 POJO 类的上下文中直接查看其 EJB 元数据并使用注解。为了避免陷入一场“宗教战争”（双方都有很多直言不讳的支持者），我们建议你自己选择。我们遵循的一个简单规则是：如果我们需要将实体和
    Bean 类与其 EJB 元数据解耦，例如当我们希望使用相同的实体类配合两种不同的实体继承策略时，我们会将元数据放在 XML 中。否则，我们坚持使用注解。别忘了——你总是可以混合搭配，依靠一个坚定的策略：每当使用
    XML 和注解都为某个元素指定了元数据时，XML 总是胜出。这允许 Bean 开发者下游的任何角色（参见本章后面的“EJB 角色”部分）覆盖元数据设置，而无需更新
    Java 源代码，因为覆盖可以专门应用于 XML 描述符。


    ![image](img/sq.jpg) **注意**   我们还推荐一个更高级的策略：仅在定义企业 Bean 或实体的行为（该行为真正是其定义不可或缺的一部分）时使用注解，例如实体关系字段的关系类型，或会话
    Bean 上方法的事务性需求。任何可以合理地被覆盖的内容，例如实体映射到的表名，或用于填充实体主键的值生成器的详细信息，都应该放在 XML 描述符中，这样应用程序组装者（或许与数据库管理员协商后）可以在部署时指定它们。虽然在
    Java 源文件中使用注解指定默认值并无害处，但这种方法区分了不应修改的固定元数据和可以自由修改而不改变企业 Bean 或实体行为的松散元数据。


    依赖注入


    在 Java EE 容器中实例化 EJB 之后，但在将其交给客户端之前，容器可以根据为该企业 Bean 定义的规则初始化实例上的属性数据。这个特性被称为*依赖注入*，它是控制反转模式的一个例子，即由外部提供者而不是类本身来初始化对象实例的属性。EJB
    3 在 Java EE 中引入了依赖注入的使用，并且很大程度上因为它非常流行，这个特性现在有了自己的规范。当前的依赖注入 API 通过 *JSR-330：Java
    依赖注入*^(*TM*) 进行管理，其功能通过 *JSR 346：Java*^(*TM*)*EE 1.1 的上下文与依赖注入* 进一步扩展，我们将在第 10
    章“上下文与依赖注入”中介绍。


    ![image](img/sq.jpg) **注意**   注入使用“推”模型将数据推送到 Bean，并且无论 Bean 是否实际使用该数据都会发生。如果存在数据不会被使用的可能性，Bean
    可以选择避免承担资源派生的成本，而是通过执行 Java 命名和目录接口（JNDI）查找，仅在数据实际（或可能）被使用时才“拉取”数据。


    EJB 中依赖注入使用的常见示例如下：


    *   将 `EntityManager` 注入到会话 Bean 中，以便与持久化单元中的实体进行交互

    *   将 `UserTransaction` 注入到管理其事务边界的会话 Bean 中


    拦截器：回调方法


    企业 Bean 和实体都可以指定它们的一些方法，或单独类上的方法，在发生某些生命周期事件时被调用。例如，会话 Bean 可以指示在 Bean 被实例化之后、但在被交给客户端之前，应该调用某个方法。此方法可以初始化
    Bean 上的状态信息，或使用 JNDI 查找资源，或执行它希望的任何其他操作，前提是它不需要事务上下文。这种回调方法被称为*拦截器*，它们允许 Bean
    开发者以编程方式参与企业 Bean 或实体与其容器之间的交互。这种模式（也称为*横切关注点*）的一个重要优势是，单个拦截器可以定义一次，然后应用于多个方法，甚至多个
    EJB。


