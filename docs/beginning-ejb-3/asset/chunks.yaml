    \ be one of three types:\n\n*   *Remote*: Remote clients run in a separate JVM\
    \ from the session beans that they access, as shown in [Figure 2-4](#9781430246923_Ch02.xhtml#Fig4).\
    \ A remote client accesses a session bean through the bean’s remote business interface.\
    \ A remote client can be another EJB, a Java client program, or a Java servlet.\
    \ Remote clients have location independence, meaning that they can use the same\
    \ API as the clients running in the same JVM.\n*   *Local*: Local clients run\
    \ in the same JVM, as shown in [Figure 2-3](#9781430246923_Ch02.xhtml#Fig3), and\
    \ access the session bean through the local business interface. A local client\
    \ can be another EJB, or a web application using Java Servlets, JavaServer Pages\
    \ (JSP), or JavaServer Faces (JSF). Local clients are location dependent. Remote\
    \ and local clients are compared in [Table 2-2](#9781430246923_Ch02.xhtml#Tab2).\n\
    \n[Table 2-2](#9781430246923_Ch02.xhtml#_Tab2). Considerations for Choosing Between\
    \ Local and Remote Clients\n\n| Remote | Local |\n    | --- | --- |\n    | Loose\
    \ coupling between the bean and the client | Lightweight access to a component\
    \ |\n    | Location independence | Location dependence |\n    | Expensive remote\
    \ calls | Must be collocated with the bean |\n    | Objects must be serialized\
    \ | Not required |\n    | Objects are passed by value | Objects are passed by\
    \ reference |\n\n*   *Web Services*: You can publish stateless session beans as\
    \ web services that can be invoked by Web Services clients. We will discuss Web\
    \ Services and clients in [Chapter 6](../Text/9781430246923_Ch06.xhtml).\n\nIn\
    \ some cases, the session beans need to have both local and remote business interfaces\
    \ to support different types of client applications. A client can obtain a session\
    \ bean’s business interface via dependency injection or JNDI lookup. Before invoking\
    \ the methods in the session bean, the client needs to obtain a stub object of\
    \ the bean via JNDI. Once the client has a handle to the stub object, it can call\
    \ the business methods in the session bean. In the case of a stateless session\
    \ bean, a new stub can be obtained on every invocation. In the case of a stateful\
    \ session bean, the stub needs to be cached on the client side so that the container\
    \ knows which instance of the bean to return on subsequent calls. Using dependency\
    \ injection, we can obtain the business interface of the `SearchFacade` session\
    \ bean with the following code:\n\n```\n@EJB SearchFacade searchFacade;\n```\n\
    \nIf the client accessing the session bean is remote, the client can use JNDI\
    \ lookup once the context interface has been obtained with the right environment\
    \ properties. Local clients can also use JNDI lookup, but dependency injection\
    \ results in simpler code. [Listing 2-24](#9781430246923_Ch02.xhtml#list24) shows\
    \ the `SearchFacadeTest` client program’s code that looks up the `SearchFacade`\
    \ bean, invokes the `wineSearch()` business method, and prints out the returned\
    \ list of wines. `SearchFacadeClient` also looks up the `ShopperCount` singleton\
    \ bean and invokes the `getShopperCount()` business method to print the number\
    \ of shoppers logged.\n\n![image](Images/sq.jpg) **Note**   If the remote client\
    \ is a Java application or command-line program, an application client container\
    \ can be used to invoke the session beans. Application client containers support\
    \ dependency injection for remote clients. We will discuss application client\
    \ containers in [Chapter 12](../Text/9781430246923_Ch12.xhtml), along with other\
    \ types of client applications.\n\n[***Listing 2-24.***](#9781430246923_Ch02.xhtml#_list24)  SearchFacadeClient.java\n\
    \n```\npackage com.apress.ejb.chapter02;\nimport java.io.IOException;\nimport\
    \ java.io.PrintWriter;\nimport java.util.List;\nimport javax.ejb.EJB;\nimport\
    \ javax.servlet.ServletException;\nimport javax.servlet.annotation.WebServlet;\n\
    import javax.servlet.http.HttpServlet;\nimport javax.servlet.http.HttpServletRequest;\n\
    import javax.servlet.http.HttpServletResponse;\n\n@WebServlet(name = \"SearchFacadeClient\"\
    , urlPatterns = {\"/SearchFacadeClient\"})\npublic class SearchFacadeClient extends\
    \ HttpServlet {\n\n@EJB\n    SearchFacadeBean searchFacade;\n\n@EJB\n    ShopperCountBean\
    \ shopperCount;\n    protected void processRequest(HttpServletRequest request,\
    \ HttpServletResponse response)\n            throws ServletException, IOException\
    \ {\n        response.setContentType(\"text/html;charset=UTF-8\");\n        PrintWriter\
    \ out = response.getWriter();\n        try {\n\nout.println(\"<html>\");\n            out.println(\"\
    <head>\");\n            out.println(\"<title>Servlet SearchFacadeClient</title>\"\
    );\n            out.println(\"</head>\");\n            out.println(\"<body>\"\
    );\n            out.println(\"<h1> Starting Search Facade test ... </h1>\");\n\
    \nout.println(\"<h1>SearchFacade Lookup</h1>\");\n            out.println(\"<h1>Searching\
    \ wines</h1>\");\n            List winesList = searchFacade.wineSearch(\"Red\"\
    );\n            out.println(\"<h1>Printing wines list</h1>\");\n            for\
    \ (String wine:(List<String>)winesList ){\n                out.println(\"<h1>\"\
    \ + wine + \"</h1>\");\n            }\n\nSystem.out.println(\"Printing Shopper\
    \ Count after incrementing it ...\");\n            shopperCount.incrementShopperCount();\n\
                out.println(\"<h1>\" + shopperCount.getShopperCount() + \"</h1>\"\
    );\n\nout.println(\"</body>\");\n            out.println(\"</html>\");\n        }\
    \ finally {\n            out.close();\n        }\n    }\n\n@Override\n    protected\
