    \        <h:outputText value=\"Search by Year or Country or Varietal\"/>\n   \
    \       </h:commandLink>\n        </p>\n        <p>\n          <h:commandLink\
    \ action=\"cartitems\">\n            <h:outputText value=\"View shopping cart\
