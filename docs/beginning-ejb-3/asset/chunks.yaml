    We will now work on showing the wine list to the user in the `wineList.jsp` page.


    The Wine List Page


    [Listing 12-14](#9781430246923_Ch12.xhtml#list14) shows the code for the `wineList.jsp`
    JSF page. In this page, we are using a new UI component called `h:dataTable`.
    This component allows collections of data to be rendered from managed bean properties
    that are of type `java.util.List`. In the previous sections, we have been storing
    the retrieved wines in the `winesList` property. The `#{WinesList.winesList}`
    expression is used for the `value` attribute of `h:dataTable` to display the list
    of wines in the table format. Once the list of wines is displayed to the user,
    the user can select one of the wines displayed in the data table component so
    that the user can see the details of the wine in a different page and add it to
    the shopping cart if the user wants to buy it. In order to keep track of the selected
    wine in the data table component, we have added the binding attribute to `h:dataTable`.
    One last thing we need to do is to provide a hyperlink for each row in the data
