    the specification with other Web services specifications and flexible taxonomies.
    The current version focuses on delivering support for secure interaction of private
    or public implementations of the services. Several companies, including Oracle,
    SAP, Microsoft, IBM, Cisco, Computer Associates, and Systinet are members of the
    UDDI technical committee for the Organization for the Advancement of Structured
    Information Standards (OASIS). Most of the application server vendors (such as
    Oracle and IBM) either provide a UDDI registry as a standard component that comes
    with their application server, or an OEM UDDI registry (from Systinet or other
    registry providers) as part of their middleware platform.


    WSDL


    *Web Services Description Language (WSDL)* is a technology that is used to describe
    the interface of a service using XML. WSDL is a standard developed by the W3C
    to which several vendors and individuals have contributed over the last few years.
    WSDL describes what a service does, how to invoke its operations, and where to
    find it.


    WSDL details can be split into two categories: service interface definition details
    and service implementation definition details. The service interface definition
    is an abstract or reusable service definition that can be instantiated and referenced
    by multiple service implementation definitions. It contains the following WSDL
    elements, which comprise the reusable portion of the service description. We will
    use a credit check Web service as an example to introduce the service interface
    definition elements listed here:


    ```

    <definitions>

    <types>

    <message>

    <portType>

    <binding>

    ```


    The <definitions> Element


    The `<definitions>` element allows you to specify global declarations of namespaces
    that are visible through the WSDL document. It acts as a container for service
    description. [Listing 6-1](#9781430246923_Ch06.xhtml#list1) shows an example `<definitions>`
    element that defines a target namespace and other namespaces that are referred
    to by a credit service.


    ***[Listing 6-1](#9781430246923_Ch06.xhtml#_list1).***  The <definitions> Element
    in CreditService.wsdl


    ```

    <?xml version="1.0" encoding="UTF-8" standalone="yes"?>

    <definitions targetNamespace="http://www.apress.com/ejb3/credit" ←

    name="CreditService" xmlns:tns="http://www.apress.com/ejb3/credit" ←

    xmlns:xsd="http://www.w3.org/2001/XMLSchema" ←

    xmlns:soap="http://schemas.xmlsoap.org/wsdl/soap/"←

    xmlns=http://schemas.xmlsoap.org/wsdl//>

    ```


    The <types> Element


    The `<types>` element is used to define the data types for the `<message>` element.
    XML schema definitions (XSDs) are most commonly used to specify the data types.
    [Listing 6-2](#9781430246923_Ch06.xhtml#list2) shows an example `<types>` element
    that provides the schema location for the credit service.


    ***[Listing 6-2](#9781430246923_Ch06.xhtml#_list2).***  The <types> Element in
    CreditService.wsdl


    ```

      <types>

        <xsd:schema>

    <xsd:import namespace="http://www.apress.com/ejb3/credit"←

        schemaLocation="CreditServiceBeanService_schema1.xsd"/>

        </xsd:schema>

      </types>

    ```


    The <message> Element


    The `<message>` element is used to define the format of data exchanged between
    a Web service consumer and a Web service provider. [Listing 6-3](#9781430246923_Ch06.xhtml#list3)
    shows an example of two `<message>` elements: `CreditCheck` and `CreditCheckResponse`.


    ***[Listing 6-3](#9781430246923_Ch06.xhtml#_list3).***  The <message> Element
    in CreditService.wsdl


    ```

      <message name="CreditCheck">

        <part name="parameters" element="tns:CreditCheck"/>

      </message>

      <message name="CreditCheckResponse">

        <part name="parameters" element="tns:CreditCheckResponse"/>

      </message>

    ```


    The <portType> Element


    The `<portType>` element is used to specify the operations of the Web service.
    [Listing 6-4](#9781430246923_Ch06.xhtml#list4) shows the `<portType>` element
    for the credit service with the `CreditCheck` operation.


    ***[Listing 6-4](#9781430246923_Ch06.xhtml#_list4).***  The <portType> Element
    in CreditService.wsdl


    ```

    <portType name="CreditCheckEndpointBean">

      <operation name="CreditCheck">

        <input message="tns:CreditCheck"/>

        <output message="tns:CreditCheckResponse"/>

      </operation>

    </portType>

    ```


    The <binding> Element


    The `<binding>` element describes the protocol, data format, and security for
    a `<portType>` element. The standard bindings are HTTP or SOAP; or you can create
    one of your own.


    The “bindings” part of the WSDL specification is flexible—it allows you to provide
    your own bindings environment instead of the default SOAP-over-HTTP model. This
    flexibility of the specification has been widely exploited by WSIF (Web Services
    Invocation Framework), which is an Apache open source project. WSIF provides a
    nice way to expose existing Java, EJB, JMS (Java Message Service), and JCA-based
    components as Web services with native bindings, which provide better performance
    and that support native transactions. [Listing 6-5](#9781430246923_Ch06.xhtml#list5)
    shows the `<binding>` element for the credit service, using SOAP-over-HTTP.'
  trans: '

    Web 服务本质上构成了一种业务逻辑或功能，这些逻辑或功能存在于应用程序或模块中，并通过服务接口暴露给客户端应用程序（通常称为*服务消费者*）。Web 服务的消费者无需了解该服务的任何实现细节——客户端能够利用服务接口中提供的信息来访问或调用该
    Web 服务。这种架构从根本上提供了一种松耦合模型，在此模型中，消费者不必了解作为 Web 服务暴露的业务逻辑实现所特有的技术或基础设施细节。


    W3C（万维网联盟）的 Web 服务架构工作组为 Web 服务提供了以下定义：


    *Web 服务是一种旨在支持网络上可互操作的机器间交互的软件系统。它拥有一个以机器可处理格式（特别是 WSDL）描述的接口。其他系统按照其描述所规定的方式，使用
    SOAP 消息与该 Web 服务进行交互，这些消息通常通过 HTTP 传输，并采用 XML 序列化，同时结合其他与 Web 相关的标准。*


    虽然将细节抽象到接口的概念已在多种语言和分布式架构（例如 EJB 和 CORBA）中使用，但 Web 服务的关键区别在于使用标准来描述服务的抽象、调用和注册。


    Web 服务架构遵循“查找-绑定-执行”模型，在该模型中，你在注册中心（UDDI）中找到所需的服务，获取该服务的描述，将其绑定到该服务（根据描述创建将发送到服务的消息），最后执行或调用该服务。图
    6-1 展示了“查找-绑定-执行”模型。UDDI、WSDL 和 SOAP 是使这种“查找-绑定-执行”模型无处不在并区别于早期计算模型的标准。


    ![9781430246923_Fig06-01.jpg](img/9781430246923_Fig06-01.jpg)


    图 6-1.  Web 服务架构


    UDDI


    *通用描述、发现与集成（UDDI）* 提供了一种基于标准的方法来定位 Web 服务以及调用该服务的信息。它还提供了关于该服务的额外元数据。UDDI 帮助你动态绑定
    Web 服务，而不是必须将它们硬编码到外部接口，并且它还有助于提供分类法。企业或服务提供商可以提供基本的联系信息（包括标识）、服务的分类、描述其行为的信息以及
    Web 服务的实际位置。


    目前版本为 3 的 UDDI 在过去几年中不断发展。版本 1 侧重于为服务提供注册中心，而版本 2 侧重于使规范与其他 Web 服务规范和灵活的分类法保持一致。当前版本侧重于为服务的私有或公共实现的安全交互提供支持。包括
    Oracle、SAP、Microsoft、IBM、Cisco、Computer Associates 和 Systinet 在内的多家公司都是结构化信息标准促进组织（OASIS）的
    UDDI 技术委员会成员。大多数应用服务器供应商（例如 Oracle 和 IBM）要么将 UDDI 注册中心作为其应用服务器的标准组件提供，要么将 OEM
    UDDI 注册中心（来自 Systinet 或其他注册中心提供商）作为其中间件平台的一部分提供。


    WSDL


    *Web 服务描述语言（WSDL）* 是一种使用 XML 描述服务接口的技术。WSDL 是由 W3C 开发的标准，过去几年中，多家供应商和个人为其做出了贡献。WSDL
    描述了服务做什么、如何调用其操作以及在哪里找到它。


    WSDL 的详细信息可以分为两类：服务接口定义细节和服务实现定义细节。服务接口定义是一种抽象的或可重用的服务定义，它可以被多个服务实现定义实例化和引用。它包含以下
    WSDL 元素，这些元素构成了服务描述中可重用的部分。我们将使用一个信用检查 Web 服务作为示例来介绍此处列出的服务接口定义元素：


    ```

    <definitions>

    <types>

    <message>

    <portType>

    <binding>

    ```


    <definitions> 元素


    `<definitions>` 元素允许你指定在 WSDL 文档中可见的命名空间的全局声明。它充当服务描述的容器。清单 6-1 展示了一个 `<definitions>`
    元素的示例，该元素定义了一个目标命名空间以及信用服务所引用的其他命名空间。


    ***清单 6-1.***  CreditService.wsdl 中的 <definitions> 元素


    ```

    <?xml version="1.0" encoding="UTF-8" standalone="yes"?>

    <definitions targetNamespace="http://www.apress.com/ejb3/credit" ←

    name="CreditService" xmlns:tns="http://www.apress.com/ejb3/credit" ←

    xmlns:xsd="http://www.w3.org/2001/XMLSchema" ←

    xmlns:soap="http://schemas.xmlsoap.org/wsdl/soap/"←

    xmlns=http://schemas.xmlsoap.org/wsdl//>

    ```


    <types> 元素


    `<types>` 元素用于定义 `<message>` 元素的数据类型。XML 模式定义（XSD）最常用于指定数据类型。清单 6-2 展示了一个 `<types>`
    元素的示例，该元素提供了信用服务的模式位置。


    ***清单 6-2.***  CreditService.wsdl 中的 <types> 元素


    ```

      <types>

        <xsd:schema>

    <xsd:import namespace="http://www.apress.com/ejb3/credit"←

        schemaLocation="CreditServiceBeanService_schema1.xsd"/>

        </xsd:schema>

      </types>

    ```


    <message> 元素


    `<message>` 元素用于定义 Web 服务消费者和 Web 服务提供者之间交换的数据格式。清单 6-3 展示了两个 `<message>` 元素的示例：`CreditCheck`
    和 `CreditCheckResponse`。


    ***清单 6-3.***  CreditService.wsdl 中的 <message> 元素


    ```

      <message name="CreditCheck">

        <part name="parameters" element="tns:CreditCheck"/>

      </message>

      <message name="CreditCheckResponse">

        <part name="parameters" element="tns:CreditCheckResponse"/>

      </message>

    ```


    <portType> 元素


    `<portType>` 元素用于指定 Web 服务的操作。清单 6-4 展示了信用服务的 `<portType>` 元素，其中包含 `CreditCheck`
    操作。


    ***清单 6-4.***  CreditService.wsdl 中的 <portType> 元素


    ```

    <portType name="CreditCheckEndpointBean">

      <operation name="CreditCheck">

        <input message="tns:CreditCheck"/>

        <output message="tns:CreditCheckResponse"/>

      </operation>

    </portType>

    ```


    <binding> 元素


    `<binding>` 元素描述了 `<portType>` 元素的协议、数据格式和安全性。标准绑定是 HTTP 或 SOAP；或者你也可以创建自己的绑定。


    WSDL 规范的“绑定”部分非常灵活——它允许你提供自己的绑定环境，而不是默认的基于 SOAP-over-HTTP 的模型。规范的这种灵活性已被 WSIF（Web
    服务调用框架）广泛利用，这是一个 Apache 开源项目。WSIF 提供了一种很好的方式，将现有的基于 Java、EJB、JMS（Java 消息服务）和 JCA
    的组件作为具有本地绑定的 Web 服务暴露出来，这些本地绑定提供了更好的性能并支持本地事务。清单 6-5 展示了信用服务的 `<binding>` 元素，使用了
    SOAP-over-HTTP。

