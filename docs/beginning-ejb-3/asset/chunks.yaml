  raw: 'The answer is that a cascade `MERGE` performs a `merge()` of new instances
    as well as of detached and managed ones; new instances in this case are not persisted
    through a call to `persist()`. Thus our original `shippingAddress` reference is
    now stale, and the `customer` holds a reference to the new managed copy of `shippingAddress`.
    This is an important “gotcha” when persisting and merging entities that cascade
    `MERGE` operations to objects they reference. A `merge()` is performed on both
    new and existing objects that are found during a cascading `MERGE` operation.
    Whereas `persist()` transforms the original instance into a managed copy and places
    it in the persistence context, `merge()` creates a new managed copy of the original
    and adds that instead. The original object being merged (`customer` in our case)
    is updated correctly to refer to the newly managed copy of `shippingAddress`.
    However, any references to the original, detached instances`—`for example, our
    `shippingAddress` variable`—`are now stale and need to be refreshed before they
    can be used.


    Thus to fix this problem, we need to obtain the new managed copy of the `shippingAddress`
    object from the `EntityManager` by calling `merge()`. If we amend the test code,
    adding line 124, as shown in [Figure 13-5](#9781430246923_Ch13.xhtml#Fig5), and
    rerun the test, this test will now succeed.


    ![9781430246923_Fig13-05.jpg](Images/9781430246923_Fig13-05.jpg)


    [Figure 13-5.](#9781430246923_Ch13.xhtml#_Fig5)  Updating the test method WineAppServiceTest.testCreateIndividual()
    to refresh a stale reference


    Returning Managed Objects from EJB Methods


    The third test appears to fail with a similar issue. We can fix it in the same
    way by explicitly merging all of the objects within our test client to obtain
    managed references after they have been added to the persistence context—whether
    directly or through a cascading `MERGE` operation. However, in this case, we are
    calling an EJB method to assemble a `CustomerOrder` instead of wiring things up
    within the test client, and we decide to address this issue in the EJB code itself.


    Let’s go into the debugger and see if we can see why our `customerOrder` reference
    has a null `id` field when the same `customerOrder` queried from the database
    has its `id` field properly assigned.


    Open the `WineAppService.java` file, and add a breakpoint on the `custFacade.merge(customer);`
    call inside `createCustomerOrder()`, as shown in [Figure 13-6](#9781430246923_Ch13.xhtml#Fig6):


    ![9781430246923_Fig13-06.jpg](Images/9781430246923_Fig13-06.jpg)


    [Figure 13-6.](#9781430246923_Ch13.xhtml#_Fig6)  Setting a breakpoint inside WineAppService.createCustomerOrder()


    With the breakpoint set, right-click on `WineAppServiceTest.java,` and this time
    select the item “`Debug Test File`” to launch the JUnit tester in debug mode.


    When our breakpoint is hit, open up the `Variables` panel and navigate to the
    `customerOrder` local variable. Expand `customerOrder` to view the current values
    of its properties, navigate to its inherited properties, and observe that its
    `id` property is null. This is to be expected. At this stage in the method, `customerOrder`
    is a new instance and has not yet been persisted. Thus its primary key value hasn’t
    been generated or assigned yet to its `id` field.


    Step over the line with the breakpoint to perform the `merge()` on `customer`.
    We know from the cascade rules on `Customer` that when a `Customer` instance (or
    any of its subtypes) is merged, all referenced `CustomerOrder` instances will
    be merged as well.


    When inspecting `customerOrder` in the Variables window again after executing
    the merge, we find that its `id` field is still null. The `@GeneratedValue` setting
    on its `id` field ensures that a value is assigned when it is persisted or merged
    into the persistence context, so evidently this object is not the managed copy
    created when `merge()` was called on its `customer` parent. Consequently, the
    method `createCustomerOrder()` is returning the wrong instance of `customerOrder`.
    To fix this, edit the return statement to return a managed instance of `customerOrder`
    instead:


    ![9781430246923_Fig13-07.jpg](Images/9781430246923_Fig13-07.jpg)


    Figure 13-7.   Updating WineAppService.createCustomerOrder() to return a managed
    instance of customerOrder


    This gets us past the `customerOrder.getId() is null` assertion failure that we
    were hitting. Running the tests again lands us at the final issue we need to resolve.
    Our `customer` instance was in a managed state after it was created through `createCustomerOrder()`
    a few lines previously. However, the assertion failure `customerOrder2.getId()`
    is `null` indicates that it is somehow holding onto a stale copy of `customerOrder`.
    A closer inspection identifies that our copy of `customer` became detached when
    it was merged inside `createCustomerOrder()`. Because we do not pass the merged
    copy back to the client, the client is responsible for obtaining the new managed
    copy. Acquiring this managed copy through another `merge()` call fixes the problem,
    as shown on line 173 in [Figure 13-8](#9781430246923_Ch13.xhtml#Fig8):


    ![9781430246923_Fig13-08.jpg](Images/9781430246923_Fig13-08.jpg)


    [Figure 13-8.](#9781430246923_Ch13.xhtml#_Fig8)  Updating WineAppServiceTest.testCreateCustomerOrder()
    to assign a managed instance to the customer variable


    . . .and with that, our tests now execute successfully.


    Beyond exploring the step-by-step process of executing and debugging JUnit tests
    involving session beans and entities, a key takeaway from this exercise is that
    merge operations, particularly those involving cascade `MERGE`, can lead to stale
    references and this can be difficult to spot in the code. A safe approach is always
    to persist new entities explicitly if you need to continue to reference them,
    rather than allow them to be persisted through a cascade merge, which causes the
    original instances to become detached. Also, remember to merge objects to obtain
    their current managed state if you have any doubt about their state following
    a method call where they might have been persisted or merged.


    Conclusion


    The chapter began with an introduction to the following key concepts:


    *   *JUnit*: A framework for unit testing Java classes

    *   *EJB Lite*: A minimal subset of the EJB API, which provides essential services
    to EJBs without the overhead of some of the more resource-intensive features required
    by a full EJB Container

    *   *Embeddable EJB Container*: An implementation of EJB Lite that runs in a pure
    Java SE environment instead of a Java EE application server, and which provides
    a lightweight environment for testing EJBs through JUnit


    While examining a JUnit test class that was written to test EJB facades over a
    JPA persistence unit, we dissected the configuration requirements when running
    tests in an Embeddable EJB Container.


    Finally, we walked through the steps for building and executing our JUnit tests
    in NetBeans against the GlassFish implementation of an Embeddable EJB Server.
    The tests were pre-configured to fail, and we walked through the process of examining
    and uncovering the causes of the failures, using the debugger to assist us in
    arriving at their solutions.


    We closed the chapter with an important takeaway about exercising caution when
    working with references to entities that can become detached when they become
    merged or persisted due to cascade rules when a related entity is merged.


