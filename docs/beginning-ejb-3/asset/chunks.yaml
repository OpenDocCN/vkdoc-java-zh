    \    }\n    else {\n      winesList = searchFacade.getWineFindAll();\n      return\
    \ \"allwines\";\n    }\n  }\n\npublic void setWinesList(List<Wine> winesList)\
    \ {\n    this.winesList = winesList;\n  }\n\npublic List<Wine> getWinesList()\
    \ {\n    return winesList;\n  }\n}\n```\n\nTo finish the work for this page, we\
    \ will extend the `faces-config.xml` file with the details shown in [Listing 12-9](#9781430246923_Ch12.xhtml#list9).\
