    We have to add new functionality to the `WineList` managed bean created earlier
    (see [Listing 12-8](#9781430246923_Ch12.xhtml#list8)) by adding three more methods
    that are bound in the method-binding expressions of the `searchwines.jsp` JSF
    page. [Listing 12-12](#9781430246923_Ch12.xhtml#list12) shows the three methods:
    `searchByYear()`, `searchByCountry()`, and `searchByVarietal()`. Each of these
    methods needs the value of the properties from the `SearchWines` managed bean.
    JSF provides access to the requested data and data from other objects through
    the `FacesContext` object. Once we have the reference to `FacesContext`, we can
    get access to the application and the managed beans. All methods use the technique
    of getting the `Application` from `FacesContext` and calling the `createValueBinding()`
    method with the value-binding expression to retrieve the value of the relevant
    property from the `SearchWines` managed bean. Once the value of the property is
    retrieved from `SearchWines`, the method calls the business methods in the `SearchFacade`
    EJB by passing in the parameters that match the search criteria to retrieve the
    list of wines. The retrieved list of wines is stored in the `winesList` property
    that is of `java.util.List` type.


    **[Listing 12-12](#9781430246923_Ch12.xhtml#_list12).**  `WineList.java`, with
    Search Methods


    ```

    public String searchByCountry() {

      FacesContext ctx = FacesContext.getCurrentInstance();

      Application app = ctx.getApplication();

      ValueBinding wineyear = app.createValueBinding("#{SearchWines.country}");

      String country = wineyear.getValue(ctx).toString();

      if (searchFacade == null) {

        return "gohome";

      }

      else {

        winesList = searchFacade.getWineFindByCountry(country);

        return "success";

      }

    }


    public String searchByVarietal() {

      FacesContext ctx = FacesContext.getCurrentInstance();

      Application app = ctx.getApplication();

      ValueBinding wineyear = app.createValueBinding("#{SearchWines.varietal}");

      String varietal = wineyear.getValue(ctx).toString();

      if (searchFacade == null) {

        return "gohome";

      }

      else {

        winesList = searchFacade.getWineFindByVarietal(varietal);

        return "success";

      }

    }


    public String searchByYear() {

      FacesContext ctx = FacesContext.getCurrentInstance();

      Application app = ctx.getApplication();

      ValueBinding wineyear = app.createValueBinding("#{SearchWines.year}");

      String year = wineyear.getValue(ctx).toString();

      if (searchFacade == null) {

        return "gohome";

      }

      else {

        winesList = searchFacade.getWineFindByYear(new Integer(year));

        return "success";

      }

    }

    ```


    All of the methods return a value of `success` that will be used as a navigation
    case. We need to add this navigation case into `faces-config.xml` and also register
    `SearchWines` as a managed bean. [Listing 12-13](#9781430246923_Ch12.xhtml#list13)
    shows the snippets of XML that need to be added to `faces-config.xml`. A `success`
    value returned by the methods will take the user to `wineList.jsp` that will display
    the list of wines. Notice that we have set the scope of the `SearchWines` managed
    bean to `session`, as we are accessing the properties from other managed beans
    as well.


