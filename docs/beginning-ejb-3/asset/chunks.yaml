    下一步是在专门用于模拟用户负载的计算机上安装 *The Grinder*。从 `http://grinder.sourceforge.net` 下载 *The
    Grinder* 后，你只需将其解压到所需目录即可。我们将其安装在笔记本电脑的 `C:\grinder` 目录中。完成后，你可以从下载包中提取与 Grinder
    相关的文件。这些文件位于 `grinder` 目录中。我们将这些文件安装在 `C:\SampleCode` 目录中。共有三个文件：`grinder.properties`、`joined.py`
    和 `single.py`。后两个文件是实际的测试脚本。


    我们先来查看第一个脚本 `grinder.properties`，如清单 9-1 所示。


    ***清单 9-1.***  grinder.properties


    ```

    # Beginning EJB 3

    # Chapter 9: EJB 3 Performance and Testing


    # 工作进程数

    grinder.processes=1


    # 模拟用户数

    grinder.threads=140


    # 无限运行

    grinder.runs=0


    # 运行控制台的机器名称

    grinder.consoleHost=localhost


    # 不需要完整的详细日志文件

    grinder.logProcessStreams=false


    # 将日志文件放置在此目录

    grinder.logDirectory=log


    # 所有模拟用户同时启动

    grinder.initialSleepTime=0


    # 执行名为 joined.py 的测试脚本

    grinder.script=joined.py

    ```


    此属性文件中的注释非常清晰。你只需更改模拟用户数（`grinder.threads`）和测试脚本运行的周期数（`grinder.runs`）。请确保 Grinder
    控制台将要运行的机器名称或 IP 地址正确无误。除此之外，你实际上无需更改此属性文件中的任何其他内容。


    **测试脚本**


    在清单 9-2 中，我们展示了在使用连接表继承方案录制会话时，由 HTTP 代理生成的 Jython 程序的核心部分。以粗体显示的思考时间语句通常表示录制测试脚本时从一个请求到下一个请求所花费的时间（以毫秒为单位）。如前所述，我们将原始值替换为零，但你也可以直接删除该行（参见清单
    9-2）。


    ***清单 9-2.***  测试脚本的主部分


    ```

    def __call__(self):

      """Called for every run performed by the worker thread."""

      self.page1()      # GET WineStoreJoined.jsp (request 101)


    grinder.sleep(0)

      self.page2()      # POST WineStoreJoined.jsp (request 201)


    grinder.sleep(0)

      self.page3()      # POST WineStoreJoined.jsp (request 301)


    grinder.sleep(0)

      self.page4()      # POST WineStoreJoined.jsp (request 401)

    ```


    作为页面方法的示例，我们在清单 9-3 中展示了页面 1 的方法（即测试脚本的第一个请求），以及第一个页面方法之前的一些定义。


    ***清单 9-3.***  页面方法示例


    ```

    url0 = ''http://glassfish:8080''

    request101 = createRequest(Test(101, ''GET WineStoreJoined.jsp''), url0)

    class TestRunner:

      """A TestRunner instance is created for each worker thread."""


    # A method for each recorded page.

      def page1(self):

        """GET WineStoreJoined.jsp (request 101)."""

        result = request101.GET(''/Chapter09-PerformanceJoined-war/faces/WineStoreJoined.jsp'')

        self.token_j_id_id17 = \

          httpUtilities.valueFromHiddenInput(''j_id_id17'') # ''j_id_id17''

        self.token_javaxfacesViewState = \

          httpUtilities.valueFromHiddenInput(''javax.faces.ViewState'') # ''9131085258160566843:4053788772783974794''


    return result

    ```


    **运行模拟用户**


    你需要根据 Grinder 软件的安装位置修改以下命令的类路径。不过，要执行 Grinder，你只需要以下简单的命令。在启动 Grinder 控制台之前，请勿运行此命令。


    ```

    java -classpath \grinder\lib\grinder.jar net.grinder.Grinder

    ```


