- fmt: "- **Container-Managed concurrency:** The container controls concurrent access\
    \ and allows fine-grained control of the state synchronization behavior by offering\
    \ a fixed set of options. This is the default concurrency management type.\n-\
    \ **Bean-Managed concurrency:** The container allows full access to the concurrent\
    \ bean instance, and the user is responsible for state synchronization.\n\nThe\
    \ type of concurrency—container-managed or bean-managed—is specified by the `javax.ejb.ConcurrencyManagement`\
    \ annotation specified on the singleton session bean class. For container-managed\
    \ concurrency, the type attribute of `@ConcurrencyManagement` is set to `javax.ejb.ConcurrencyManagementType.CONTAINER`;\
    \ for bean-managed concurrency, the type attribute of `@ConcurrencyManagement`\
    \ is set to `javax.ejb.ConcurrencyManagementType.BEAN`.\n\n## Container-Managed\
    \ Concurrency\n\nFor a singleton session bean using container-managed concurrency,\
    \ the container manages concurrency by associating each business method with either\
    \ a shared `Read` lock or an exclusive `Write` lock. A `Read` or `Write` lock\
    \ is specified using the `@Lock` annotation.\n\n[Listing 2-21](#9781430246923_Ch02.xhtml#list21)\
    \ demonstrates container-managed concurrency by using the `Read` lock on the `getShopperCount`\
    \ method and `Write` lock on the `incrementShopperCount` method. With this change,\
    \ multiple clients can get the value of `shopperCounter` concurrently but access\
    \ to `incrementShopperCount` is blocked for all other clients while one client\
    \ is accessing it.\n\n[***Listing 2-21.***](#9781430246923_Ch02.xhtml#_list21)\
    \ ShopperCountBean.java\n\n```\npackage com.apress.ejb.chapter02;\n\nimport javax.annotation.PostConstruct;\n\
    import javax.annotation.PreDestroy;\nimport javax.ejb.ConcurrencyManagement;\n\
    import javax.ejb.ConcurrencyManagementType;\nimport javax.ejb.Lock;\nimport javax.ejb.LockType;\n\
    import javax.ejb.Singleton;\nimport javax.ejb.Startup;\n\n@Singleton(name = \"\
    ShopperCount\")\n@Startup\n@ConcurrencyManagement(ConcurrencyManagementType.CONTAINER)\n\
    public class ShopperCountBean {\n    private int shopperCounter;\n    // Increment\
    \ number of shopper counter\n    @Lock(LockType.WRITE)\n    public void incrementShopperCount()\
    \ {\n        shopperCounter++;\n    }\n\n// Return number of shoppers\n    @Lock(LockType.READ)\n\
    \    public int getShopperCount() {\n        return shopperCounter;\n    }\n\n\
    // Reset counter\n    public void resetCounter() {\n        shopperCounter = 0;\n\
    \    }\n\n// Reset counter\n    @PostConstruct\n    public void applicationStartup()\
    \ {\n        resetCounter();\n    }\n\n@PreDestroy\n    public void applicationShutdown()\
    \ {\n        System.out.println(\"From applicationShutdown method.\");\n    }\n\
    }\n```\n\nFor a singleton session bean, an `@Lock` annotation at the class level\
    \ specifies that all business methods will use the specified lock type unless\
    \ a different type is explicitly set at the method level. When the `@Lock` annotation\
    \ is not explicitly present on the singleton session bean class, the default lock\
    \ type, `@Lock(LockType.WRITE)`, is applied to all business methods.\n\n## Bean-Managed\
    \ Concurrency\n\nIn the case of bean-managed concurrency, the container allows\
    \ full concurrent access to the singleton session bean instance and the bean developer\
    \ must provide protection to the bean’s internal state against synchronization\
    \ errors that result from concurrent access. You can use synchronization primitives\
    \ like `synchronized` and `volatile` for this purpose.\n\n## Error Handling\n\n\
    Errors can occur during initialization of a singleton session bean. These errors\
    \ are fatal and, as a result, the singleton session bean instance must be discarded.\
    \ Attempted invocations on a singleton session bean instance that failed to initialize\
    \ will result in the `javax.ejb.NoSuchEJBException`. Once a singleton session\
    \ bean is instantiated successfully, it will not be destroyed if exceptions are\
    \ thrown from either business methods or callbacks.\n\n## Timer Service\n\nThe\
    \ *EJB Timer Service* is a container-managed service that allows callbacks to\
    \ be scheduled for time-based events. Timer notifications can be scheduled to\
    \ occur at a calendar based schedule, at a specific time, after a specific time,\
    \ or at specific recurring intervals.\n\nUse timers for application level processes.\
    \ Don’t use timers for real-time events. Typical examples of using a timer include\
    \ the following:\n\n- A timer in an expense reporting application prints newly\
    \ filed expenses every evening at 9 PM.\n- A timer in a bug tracking application\
    \ emails a list of open bugs to team members every morning at 6 AM.\n- A timer\
    \ in a human resources application emails a list of public holidays to all the\
    \ employees on the 1st of January every year.\n\n![image](Images/sq.jpg) **Note**\
    \ Timers cannot be created for stateful session beans.\n\nCreating a timer is\
    \ simplified in EJB 3.1 via introduction of `@Schedule` and `@Schedules` annotations\
    \ that automatically create timers based on metadata specified on a method. In\
    \ [Listing 2-22](#9781430246923_Ch02.xhtml#list22), we augment our `LogShopperCount`\
    \ by adding a recurring timer that will log the shopper count every two hours.\n\
    \n[***Listing 2-22.***](#9781430246923_Ch02.xhtml#_list22) LogShopperCount.java\n\
    \n```\npackage com.apress.ejb.chapter02;\n\nimport javax.ejb.DependsOn;\nimport\
    \ javax.ejb.Schedule;\nimport javax.ejb.Singleton;\nimport javax.ejb.Startup;\n\
    \n@Singleton\n@Startup\n@DependsOn(\"ShopperCountBean\")\npublic class LogShopperCount\
    \ {\n\n// Logs shopper count every 2 hours\n       @Schedule(hour=\"*/2\")\n \
    \      public void logShopperCount() {\n       // Log shopper count\n       }\n\
    }\n```\n\nPass the `Timer` object in methods annotated with `@Schedule` to get\
    \ information about the timer. [Listing 2-23](#9781430246923_Ch02.xhtml#list23)\
    \ demonstrates the use of the `Timer` object to get information about the timer\
    \ that just expired.\n\n[***Listing 2-23.***](#9781430246923_Ch02.xhtml#_list23)\
    \ LogShopperCount.java\n\n```\npackage com.apress.ejb.chapter02;\n\nimport javax.ejb.DependsOn;\n\
    import javax.ejb.Schedule;\nimport javax.ejb.Singleton;\nimport javax.ejb.Startup;\n\
    import javax.ejb.Timer;\n\n@Singleton\n@Startup\n@DependsOn(\"ShopperCount\")\n\
    public class LogShopperCount {\n\n// Logs shopper count every 2 hours\n@Schedule(hour=\"\
    */2\")\npublic void logShopperCount(Timer timer) {\n// Log shopper count\nString\
    \ timerInfo = (String) timer.getInfo();\nSystem.out.println(timerInfo);\n}\n}\n\
    ```\n\n## Calendar-Based Time Expressions\n\nThe Timer Service is inspired by\
    \ the UNIX `cron` utility. [Table 2-1](#9781430246923_Ch02.xhtml#Tab1) lists the\
    \ various attributes of a calendar-based time expression.\n\n[Table 2-1.](#9781430246923_Ch02.xhtml#_Tab1)\
    \ Attributes of calendar-based time expression\n\n![image](Images/Table2-1.jpg)\n\
    \n![image](Images/sq.jpg) **Note** For `dayOfWeek`, both 0 and 7 represent Sunday\
    \ and a negative number (−7 to −1), which means the nth day or days before the\
    \ end of the month. All string constants (“Sun”, “Jan”, “Last”, “1st”) are case\
    \ insensitive. Increments are supported only by second, minute, and hour. Duplicate\
    \ values within a list are ignored.\n\n### Examples of Calendar-Based Time Expressions\n\
    \nLet us see some examples that demonstrate the use of calendar-based time expressions.\n\
    \n- “Every second of every minute of every hour of everyday”\n  - `@Schedule(second=\"\
    *\", minute=\"*\", hour=\"*\")`\n\n- “Every fifteen minutes within the hour”\n\
    \  - `@Schedule(minute=\"*/15\", hour=\"*\")`\n  - `@Schedule(minute=\"0, 15,\
    \ 30, 45\", hour=\"*\")`\n\n- “Every Friday at midnight”\n  - `@Schedule(dayOfWeek=\"\
    Fri\")`\n\n- “Every six hours on weekends”\n  - `@Schedule(hour=\"*/6\", dayOfWeek=\"\
    Sat, Sun\")`\n\n- “Every weekday morning at 7:30am U.S. Pacific Time”\n  - `@Schedule(minute=\"\
    30\", hour=\"7\", dayOfWeek=\"Mon-Fri\", timezone=\"America/Los_Angeles\")`\n\n\
    - “On 10th of January and September at 6am”\n  - `@Schedule(month=\"Jan, Sep\"\
    , dayOfMonth=\"10\", hour=\"6\")`\n\n- “Last Friday of December at 6pm”\n  - `@Schedule(month=\"\
    Dec\", dayOfMonth=\"Last Fri\", hour=\"18\")`\n\n- “Second to last day (one day\
    \ before the last day) of each month”"
