    EJB 打包与部署


    到目前为止，我们一直专注于如何构建 EJB、Java 持久化 API（JPA）实体及其客户端，以利用 EJB 容器提供的周边企业服务。用 Java EE 的术语来说，这些任务属于应用程序组件提供者（通常简称为提供者）的职责。在本章中，我们将探讨围绕以下过程的相关主题：将你的组件打包成模块和库组件，将
    Java EE 组件中声明的外部引用绑定到服务器环境中的实际资源，并将所有这些发送到应用服务器，以便组件可以在运行时由应用程序执行。这些职责由 Java EE
    角色中的应用程序组装者（组装者）和应用程序部署者（部署者）处理。虽然在实践中，通常由一个人执行一个或多个这些角色，或者由多人执行任何一个角色，但为了解释这些主题，我们将把部署任务划分为与这些指定角色相对应的阶段。


    我们将重点介绍 EJB 和 JPA 实体组件，并会涉及其他 Java EE 模块类型的部署：Web 应用程序模块、应用程序客户端和资源适配器。我们还将探讨
    Java EE 服务器与其支持的四个 Java EE 容器之间的关系，并探索 Java EE 服务器提供的一些服务。


    在简要概述部署任务（其中我们介绍许多部署术语）之后，我们将介绍支持部署的 Java EE 基础设施组件——Java EE 服务器和容器。我们将探讨不同类型的
    Java EE 模块，它们如何组合在一起，以及如何指定定义每个模块的部署描述符（元数据文件）。接下来是一个关于库组件的章节，其中解释了如何声明 Java EE
    模块和库组件之间的类路径依赖关系。然后，我们将更详细地检查组装者和部署者的角色，最后以 EJB 模块和 JPA 持久化单元特有的部署要求作为本章的结尾。


