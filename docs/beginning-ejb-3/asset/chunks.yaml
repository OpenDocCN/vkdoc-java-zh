    \    <to-view-id>/cartItems.jsp</to-view-id>\n  </navigation-case>\n</navigation-rule>\n\
    ```\n\nWe will work on the three pages to which we are navigating in the next\
    \ sections.\n\n## The Search Page\n\n[Listing 12-10](#9781430246923_Ch12.xhtml#list10)\
