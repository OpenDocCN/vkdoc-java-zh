  trans: '

    计算机系统的性能是一个非常复杂的问题。试想一下：我们正在编写一段 Java 代码，它利用了一个名为 Java 企业版（Java EE）的基础设施，而该基础设施恰好运行在
    Java 虚拟机（JVM）之上。这个虚拟机又托管在一个操作系统上，该操作系统运行在一台计算机上，这台计算机通过由硬件和软件组件构成的网络与其他计算机交互。这些层级中的每一层——网络、计算机、操作系统、JVM
    以及 Java EE 服务器——都有许多可调参数，用于配置和优化其行为。在不同的使用条件下，每一层都会表现出不同的行为，这不可避免地会影响其他层级的行为。在这个相当复杂的背景下，我们就能更容易理解为什么我们的逻辑并不总是能奏效了。


    归根结底，我们在进行性能陈述时不能一概而论。找出系统预期性能的唯一方法，就是在尽可能接近代码在生产环境中运行条件的场景下进行测试。


    每个软件应用程序都是独一无二的。为了理解你自己应用的性能，你必须根据自己对性能的定义亲自进行测试。在某些情况下，良好的性能意味着能够支持大量用户；而在其他情况下（例如，当用户负载较小时），则仅仅意味着能够尽可能快地运行。


    在本章中，我们将介绍一种方法，你可以用它对系统进行一致的性能测试。我们还会介绍一些可用于执行这些测试的工具。最后，我们将进行一次性能测试，以演示该方法及工具的使用。这套方法和工具包在两种基本情况下非常有用：


    *   对完整应用进行性能测试

    *   为性能而设计（考察 Java EE API 各个方面的性能成本，以及某些设计决策将如何影响整体性能）


    在第一种场景中，我们将应用视为一个黑盒。我们在不同的用户负载下测试应用，并调查用户发出的每个请求的性能。然后分析数据——我们寻找那些不符合要求标准的请求，并识别出改进性能的机会。


    虽然上述方法很有用，但我们的建议是，在开发周期中尽早进行性能测试。这样，你就可以利用该方法以及从中获得的数据来帮助你为性能而设计，而不是事后才进行性能测试。


    本章提供的示例侧重于为性能而设计，而不是测试一个完整的应用。如果你有兴趣了解更多关于测试应用的方法以及一般的性能测试，可以参考 Peter Zadrozny
    所著的 *J2EE Performance Testing with BEA WebLogic Server*（Apress, 2003）。在本章中，我们呈现了
    Zadrozny 书中所述方法的一个改编版本，该版本紧密聚焦于手头的示例。


    测试方法


    测试方法的重点是数据测量的一致性。以下列表概述了该方法所涉及的步骤。我们将按照执行每次测试时的逻辑顺序来呈现和描述它们：


    1.  *定义性能标准。*我们必须为所讨论的特定应用定义相关的性能指标，并为该指标设定一个现实的目标（例如，最大可接受的响应时间）。

    2.  *准确模拟应用使用情况。*其关键方面是测试脚本的定义。这些是包含一组请求的配置文件，这些请求代表了应用的典型使用模式。

    3.  *定义测试指标。*这些包括测试的持续时间、样本大小、要排除的初始数据量等。

    4.  *执行测试。*


    性能标准


    根据应用的类型，你的关注点会在两个基本性能指标之间变化：响应时间和吞吐量。


    在处理同步交互式应用时，我们定义一个最大可接受的响应时间。这是我们愿意等待从应用获得响应之前的最长时间。


    对于批处理或后端应用，我们定义最小可接受的吞吐量，通常以每秒事务数（TPS）表示，但这必须基于对系统中事务具体如何定义的扎实理解。


    这些指标中的每一个都彼此密不可分；然而，我们尚未能发现它们之间存在任何数学或几何关系。


    我们的建议是，清晰且无歧义地定义你的性能指标，并根据明确定义的需求进行测试。不这样做无异于邀请你进行无休止的测试和调优。


    由于我们将在性能测试运行期间收集数据，我们需要清楚地理解基本统计量，因此让我们更详细地审视它们。


    就本书而言，我们将*响应时间*定义为客户端从发送请求到收到来自应用的响应的最后一个字节所需等待的时间长度。


    我们从一次性能测试运行中收集的数据集，由构成测试脚本的每个请求的个体响应时间组成。测试脚本中的每个请求由每个模拟用户在一段时间内依次执行。我们分析的基本度量是特定请求所有用户的响应时间的算术平均值：平均响应时间（ART）。


    *聚合平均响应时间（AART）*是我们在分析性能数据时广泛使用的一个度量，我们将其定义为测试脚本中每个单独请求的 ART 之和，除以该测试脚本中的请求数量。


    诚然，AART 在应用性能表现方面并没有实际意义，但它确实提供了一个极好的指标，表明整个系统的负载程度。因此，我们有时将这个度量称为*负载因子*。当绘制成与并发用户数的关系图时，典型的
    AART 曲线看起来就像图 9-1 所示的那样。


    ![9781430246923_Fig09-01.jpg](img/9781430246923_Fig09-01.jpg)


    图 9-1.  典型的 AART 曲线


    吞吐量并不像响应时间那样是一个明确的指标。表达吞吐量的标准方式是 TPS，理解事务在被测试的应用中代表什么是至关重要的。它可能是一个单一的查询，也可能是一组特定的查询。在消息系统中，它可能是一条单一的消息；而在基于
    Servlet 的应用中，它可能是一个请求。即使对于正在测量的具体内容达成共识，所获得的吞吐量值也常常会被误解。原因在于，许多人看待这个指标的方式，就像看待“英里每小时”一样：将其视为速度的度量。实际上，吞吐量是容量的度量。

    '
- fmt: '我们可以尝试用超市的类比来解释吞吐量（throughput）的工作原理。想象一下，一家超市正在举办促销活动，10名购物者可以在15分钟内免费拿走他们购物车里的所有东西。超市就是应用程序，购物者相当于请求（或消息），而负责补货的超市员工则相当于系统中努力应对需求的各个组件。


    即使所有10名购物者都达到了容量上限（在15分钟内装满购物车），也不一定意味着他们拿走了超市里的所有商品。然而，随着购物者数量的增加，我们最终会达到一个临界点，即足够多的购物者可以在规定时间内清空超市。我们称这个点为**饱和点**，因为此时已经没有更多可用资源了。当购物者数量继续增加，超过这个临界点后，过道里的拥挤会导致购物者行动变慢（响应时间变长），最终导致吞吐量实际下降。


    与平均响应时间（ART）类似，我们分析的基础度量指标是所有用户对某个特定请求的每秒请求数的算术平均值。我们称之为**TPS**。


    为了分析性能数据，并且独立于特定性能测试中使用的吞吐量定义，我们引入了**总事务速率（TTR）**的概念。`TTR`是测试脚本中每个请求的`TPS`测量值的总和。`TTR`为我们提供了一个衡量系统容量的绝佳指标。[图9-2](#9781430246923_Ch09.xhtml#Fig2)展示了一条典型的`TTR`曲线，该曲线在大约100个用户时达到饱和点。此后，曲线开始下降（例如，因为购物者太多）。


    ![9781430246923_Fig09-02.jpg](Images/9781430246923_Fig09-02.jpg)


    [图9-2.](#9781430246923_Ch09.xhtml#_Fig2) 一条典型的`TTR`曲线


    [图9-1](#9781430246923_Ch09.xhtml#Fig1)中展示的平均累积响应时间（AART）曲线，与[图9-2](#9781430246923_Ch09.xhtml#Fig2)中展示的`TTR`曲线来自同一次测试运行。如果你查看`AART`曲线，你会发现响应时间呈线性增长，直到达到100个用户。之后，增长变得更加剧烈。这与`TTR`曲线相吻合，后者在100个用户时达到饱和点。此后，应用程序的整体性能开始下降。分析这两条曲线，你可以得出结论：在该性能测试条件下，应用程序的用户上限为100人。


    ## 模拟应用程序使用情况


    本方法论这一节的目标是确保我们在尽可能模拟现实的测试条件下收集性能数据。这一点在测试整个应用程序的性能时尤为重要，而在为性能进行设计时则相对次要。


    对于每个应用程序，都会有多个不同的使用配置文件同时运行。有时，我们可以用一个测试脚本和一个请求来模拟使用情况。在其他情况下，可能需要十几个配置文件，每个配置文件包含不同数量的请求。


    需要特别说明的是**思考时间**，也称为**休眠时间**。这是测试脚本中每个单独请求执行之间所经过的时间。在现实生活中，思考时间可能变化很大。它可能短至几秒钟（例如，点击一个按钮进入下一页），也可能长达5到10分钟（例如，查看过去一个月银行账户的交易记录）。在性能测试中，我们采用了两种基本策略：


    *   **使用真实的思考时间**：这种情况用于对完整、可运行的应用程序进行性能测试。

    *   **使用零思考时间**：这种情况用于进行更通用的调查性测量，例如比较编程技术。这样做的后果是我们不是在现实条件下进行测试。然而，我们可以进行精确的比较测量，一旦从这些结果中选出了最佳方案，我们就可以使用真实的思考时间进行测试。


    ## 定义测试指标


    该方法论基于每次测试运行使用固定数量的用户。一个性能测试由多次测试运行组成，通常每次后续测试运行都会增加用户负载。有些人倾向于在单次测试运行期间逐步增加用户数量。我们认为这会引入一个新的变量，可能对结果产生负面影响，并且从寻找最大用户负载的角度来看，这在统计上是不正确的。


    第一步是找到一个具有代表性的并发用户数（下限），可以以规律的方式递增，直到达到应用程序的饱和点（上限）。我们通常会在上限之上再进行一两次测试运行，只是为了更好地理解应用程序的行为（或异常行为）。


    不幸的是，没有精确的科学方法可以预先确定上限。我们通常会选择一个随机的用户数，然后进行几次测试运行，其中用户数高于和低于这个初始随机选择，并分析结果以确定我们应该努力的方向——是增加还是减少用户数。


    第二步是定义样本大小，即测试运行将持续的时间长度。为了选择合适的样本大小，我们必须在两种不同的利益之间达成妥协。首先，我们希望有足够的数据，使样本在统计上具有显著性。其次，我们希望测试尽可能短，因为我们有很多测试运行要做，不想在上面花费太多时间。


    为了确定样本大小，我们使用上限用户数进行一次比平时更长时间的测试运行。然后，我们绘制`AART`随时间变化的曲线并进行分析。我们寻找曲线中相当稳定的一段。


    另一点需要说明的是数据排除。当你刚开始测试时，响应时间通常高于正常水平。这是因为构成应用程序的所有子系统都需要一点时间来加速。例如，JVM中的优化器需要几分钟来优化正在运行的代码。数据库的缓存也是如此，它需要一点时间才能变得有用（应用程序的其他组件也是如此）。


    这些最初出现的异常高的响应时间只会影响生产应用程序中的最初几个用户，而生产应用程序通常会运行数周。然而，在我们的案例中，我们只测试几分钟，这些结果会对我们的样本结果产生负面的偏差。因此，我们排除收集到的前几组数据，并在曲线稳定后开始采样。


    因此，样本大小将从实际测试运行开始后的某个时间点开始，并持续一段时间，这段时间为我们提供足够的数据，使其在统计上具有显著性。


    接下来是评估测试结果准确性的问题。根据所进行的性能测试的类型，你可以使用两种不同的方法来以高置信度衡量准确性。


    对于处理完整应用程序的性能测试，我们通常计算以下指标，我们称之为**样本质量**：


    ![Eqa](Images/Eqa09-01.jpg)


    我们通常将此公式应用于收集到的`AART`数据。'
  raw: 'We can attempt to explain how throughput works in terms of a supermarket analogy.
    Imagine that a supermarket runs a promotion whereby 10 shoppers will get for free
    everything they can put in their shopping carts in 15 minutes. The supermarket
    is the application, the shoppers are analogous to the requests (or messages),
    and the supermarket staff who are restocking the shelves are analogous to the
    components of your system that are working to cope with the demand.


    Even if all 10 shoppers reach capacity (by completely filling their carts in 15
    minutes), it doesn’t necessarily mean that they’ve taken everything available
    in the supermarket. However, as we increase the number of shoppers, we will reach
    a point where there are enough shoppers to empty the supermarket in that time.
    We call this the point of saturation, as there are no more resources available.
    As we increase the number of shoppers beyond this point, crowding in the aisles
    causes reduced shopper mobility (longer response times) and, ultimately, an actual
    drop in throughput.


    Similar to ART, our base measurement of analysis is the arithmetic mean of the
    requests per second for all users of a particular request. We call this TPS.


    For the purposes of analyzing performance data, and independently of the definition
    of throughput used for a specific performance test, we use the concept of total
    transactional rate (TTR). TTR is the addition of the TPS measurements of each
    request in a test script. TTR provides us with an excellent indicator of system
    capacity. [Figure 9-2](#9781430246923_Ch09.xhtml#Fig2) shows a typical TTR curve,
    which reaches the point of saturation at about 100 users. At that point, it starts
    dropping (due to, for example, too many shoppers).


    ![9781430246923_Fig09-02.jpg](Images/9781430246923_Fig09-02.jpg)


    [Figure 9-2.](#9781430246923_Ch09.xhtml#_Fig2)  A typical TTR curve


    The AART curve presented in [Figure 9-1](#9781430246923_Ch09.xhtml#Fig1) is the
    result of data collected from the same test run as the TTR curve presented in
    [Figure 9-2](#9781430246923_Ch09.xhtml#Fig2). If you review the AART curve, you
    can see that the response time increases in a linear fashion until it reaches
    100 users. After that, the increase is more dramatic. This coincides with the
    TTR curve, in which the saturation point is reached at 100 users. After that,
    the performance of the application in general degrades. Analyzing these two curves,
    you can state that the application has an upper limit of 100 users under the conditions
    of the performance test.


    Simulating Application Usage


    The objective of this section of the methodology is to ensure that we are collecting
    our performance data in test conditions that mimic reality as closely as possible.
    This applies more so when performance testing whole applications, and less so
    when designing for performance.


    For every application, there will be a number of different profiles of use that
    will be run concurrently. Sometimes, we will be able to simulate usage with a
    single test script and a single request. In other cases, it can take a dozen or
    so profiles, each with a different amount of requests.


    A special note has to be made regarding *think time*, also known as *sleep time*.
    This is the amount of time that elapses between the executions of each individual
    request in a test script. In real life, think time can be highly variable. It
    can be as little as a few seconds (for example, when clicking a button that will
    take us to the next page), or as much as 5 to 10 minutes (for instance, when examining
    the transactions we made in our bank account over the last month). For the performance
    tests, we have adopted two basic strategies:


    *   *Using the real think time*: This case is used when doing a performance test
    of a complete, working application.

    *   *Using zero think time*: This case is used when performing more general investigative
    measurements, such as comparing programming techniques. The consequence of this
    is that we are not testing under realistic conditions. However, we can perform
    accurate comparative measurements, and once we have chosen the best scenario from
    these results, we can then perform tests with realistic think times.


    Defining Test Metrics


    The methodology is based on using a fixed number of users per test run. A performance
    test is made up by a number of test runs, usually increasing the user load with
    each subsequent test run. Some people are interested in ramping up the number
    of users during a single test run. We believe that this introduces a new variable
    that can have negative effects on the results, and it is statistically incorrect
    from the standpoint of finding a maximum user load.


    The first step is finding a representative number of simultaneous users (the lower
    limit) that can be increased in a regular fashion until reaching the saturation
    point of the application (the upper limit). We typically have a couple of additional
    test runs over the upper limit, just to understand better the behavior (or misbehavior)
    of the application.


    Unfortunately, there is no exact science for choosing the upper limit up front.
    We usually select a random number of users and perform a couple of test runs in
    which the number of users is higher and lower than that initial random choice,
    and we analyze the results to determine the direction we should pursue—either
    increasing or decreasing the number of users.


    The second step is defining the sample size; that is, the length of time for which
    the test run will execute. To choose the actual sample size, we have to reach
    a compromise between two divergent interests. The first is that we want to have
    enough data so that the sample is statistically significant. The second is the
    desire to make the tests as short as possible, since we will have many test runs
    to do and we don’t want to spend too much time on them.


    To figure out the sample size, we perform a test run using the upper limit of
    users, for a longer-than-usual period of time. We then plot the AART against time
    and analyze the curve. We are looking for a segment of the curve that is pretty
    much stable.


    Another point that has to be made is that of data exclusion. When you first start
    a test, the response times are usually higher than normal. This is because all
    of the subsystems that make up the application take a little while to get up to
    speed. For example, the optimizer in the JVM needs a couple of minutes to optimize
    the running code. The same goes for the cache of the database, which will take
    a little time before it is useful (and so on with other components of the application).


    These unusually high response times that are seen initially only affect the first
    few users on a production application that will typically run for weeks. However,
    in our case, in which we will be testing for just a few minutes, these results
    will negatively skew our sample results. Because of this, we exclude the first
    few sets of data we collect, and start the sample when the curve has stabilized.


    Thus the sample size will start at a certain time after the actual test run has
    started, and it will last for a certain period that provides us with enough data
    to deem it statistically significant.


    Next is the issue of assessing the accuracy of the test results. Depending on
    the kind of performance test that is being conducted, you can use two different
    ways to measure accuracy with a high level of certainty.


    For performance tests that deal with a complete application, we usually calculate
    the following metric, which we call the *quality of a sample*:


    ![Eqa](Images/Eqa09-01.jpg)


    We usually apply this formula to the AART data collected.'
  trans: '

    我们可以尝试用超市的类比来解释吞吐量是如何工作的。想象一下，一家超市正在举办促销活动，10 名购物者可以在 15 分钟内免费拿走他们购物车里的所有东西。超市就是应用程序，购物者类似于请求（或消息），而负责补货的超市员工则类似于系统中努力应对需求的组件。


    即使所有 10 名购物者都达到了容量上限（在 15 分钟内装满购物车），也未必意味着他们拿走了超市里所有的东西。然而，随着我们增加购物者的数量，我们最终会达到一个临界点，即足够多的购物者可以在那段时间内清空超市。我们称这个点为**饱和点**，因为此时已经没有更多可用资源了。当我们继续增加购物者数量超过这个点时，过道里的拥挤会导致购物者行动能力下降（响应时间变长），最终导致吞吐量实际下降。


    与 ART 类似，我们分析的基础度量指标是特定请求的所有用户的每秒请求数的算术平均值。我们称之为**TPS**。


    为了分析性能数据，并且独立于特定性能测试所使用的吞吐量定义，我们使用**总事务速率（TTR）** 的概念。TTR 是测试脚本中每个请求的 TPS 测量值的总和。TTR
    为我们提供了一个极好的系统容量指标。图 9-2 展示了一条典型的 TTR 曲线，它在约 100 个用户时达到饱和点。此时，曲线开始下降（例如，由于购物者过多）。


    ![9781430246923_Fig09-02.jpg](img/9781430246923_Fig09-02.jpg)


    图 9-2.  一条典型的 TTR 曲线


    图 9-1 中展示的 AART 曲线，是与图 9-2 中 TTR 曲线来自同一次测试运行的数据结果。如果你查看 AART 曲线，可以看到响应时间呈线性增长，直到达到
    100 个用户。之后，增长变得更加剧烈。这与 TTR 曲线相吻合，后者在 100 个用户时达到饱和点。此后，应用程序的整体性能开始下降。分析这两条曲线，你可以得出结论：在该性能测试条件下，应用程序的用户上限为
    100 个。


    **模拟应用程序使用情况**


    本方法论这一节的目标是确保我们在尽可能模拟现实的测试条件下收集性能数据。这一点在测试整个应用程序的性能时更为适用，而在为性能进行设计时则不那么重要。


    对于每个应用程序，都会有多个不同的使用场景同时运行。有时，我们可以用一个测试脚本和一个请求来模拟使用情况。在其他情况下，可能需要十几个场景，每个场景都有不同数量的请求。


    需要特别说明的是关于**思考时间**（也称为**休眠时间**）。这是测试脚本中每个单独请求执行之间所经过的时间。在现实生活中，思考时间可能变化很大。它可能短至几秒钟（例如，点击一个按钮进入下一页），也可能长达
    5 到 10 分钟（例如，查看我们上个月在银行账户中进行的交易）。对于性能测试，我们采用了两种基本策略：


    *   **使用真实的思考时间**：这种情况用于对完整、可运行的应用程序进行性能测试时。

    *   **使用零思考时间**：这种情况用于进行更通用的调查性测量时，例如比较编程技术。这样做的后果是我们不是在现实的条件下进行测试。然而，我们可以进行精确的比较测量，一旦我们从这些结果中选出了最佳方案，我们就可以使用真实的思考时间进行测试。


    **定义测试指标**


    该方法论基于每次测试运行使用固定数量的用户。一个性能测试由多次测试运行组成，通常每次后续测试运行都会增加用户负载。有些人倾向于在单次测试运行期间逐步增加用户数量。我们认为这会引入一个新的变量，可能对结果产生负面影响，并且从寻找最大用户负载的角度来看，这在统计上是不正确的。


    第一步是找到一个具有代表性的并发用户数（下限），可以以规律的方式增加，直到达到应用程序的饱和点（上限）。我们通常会在上限之上再进行几次额外的测试运行，只是为了更好地理解应用程序的行为（或异常行为）。


    不幸的是，没有一门精确的科学可以预先确定上限。我们通常会选择一个随机的用户数，然后进行几次测试运行，其中用户数高于和低于这个初始随机选择，并分析结果以确定我们应该努力的方向——是增加还是减少用户数。


    第二步是定义样本大小，即测试运行将持续的时间长度。为了选择实际的样本大小，我们必须在两个相互矛盾的需求之间达成妥协。第一个是我们希望有足够的数据，使得样本在统计上具有显著性。第二个是希望测试尽可能短，因为我们有很多测试运行要做，不想在上面花费太多时间。


    为了确定样本大小，我们使用用户上限进行一次测试运行，持续时间比平时更长。然后我们绘制 AART 随时间变化的曲线并进行分析。我们寻找曲线上相当稳定的一段。


    另一点需要说明的是数据排除。当你刚开始测试时，响应时间通常高于正常水平。这是因为构成应用程序的所有子系统都需要一点时间来加速。例如，JVM 中的优化器需要几分钟来优化运行中的代码。数据库的缓存也是如此，它需要一点时间才能变得有用（应用程序的其他组件也是如此）。


    这些最初出现的异常高的响应时间只会影响生产应用程序中的最初几个用户，而生产应用程序通常会运行数周。然而，在我们的案例中，我们只测试几分钟，这些结果会对我们的样本结果产生负面的偏差。因此，我们排除收集到的前几组数据，并在曲线稳定后开始采样。


    因此，样本大小将从实际测试运行开始后的某个时间点开始，并持续一段时间，这段时间为我们提供足够的数据，使其在统计上具有显著性。


    接下来是评估测试结果准确性的问题。根据所进行的性能测试类型，你可以使用两种不同的方法，以高置信度来衡量准确性。


    对于涉及完整应用程序的性能测试，我们通常计算以下指标，我们称之为**样本质量**：


    ![Eqa](img/Eqa09-01.jpg)


    我们通常将此公式应用于收集到的 AART 数据。

