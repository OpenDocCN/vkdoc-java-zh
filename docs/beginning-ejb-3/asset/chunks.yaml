    这个`persistence.xml`文件定义了两个持久化单元：`Chapter03PersistenceUnit`和`Chapter03PersistenceUnit-JSE`。`Customer`类在两个单元中都有定义。第一个持久化单元供Java
    EE客户端（如会话Bean）使用；而第二个单元配置供Java SE客户端（如[清单3-14](#9781430246923_Ch03.xhtml#list14)中所示的`CustomerService.java`类）使用。在两个持久化单元中指定不同的配置设置，可以使客户端与持久化单元的配置细节隔离，并使在Java
    SE和EE环境中运行的实体看起来几乎相同。


    ## EntityManager


    `EntityManager`是客户端访问JPA持久化框架提供的实体管理服务的网关。客户端会话必须获取`EntityManager`实例后才能与持久化实体实例进行交互。`EntityManager`提供对查询、更新、刷新和删除现有实体实例的支持，以及注册实体类以创建具有标识的新持久化对象。


    ## 持久化上下文


    `EntityManager`在称为*持久化上下文*的事务上下文中维护一个实例缓存。持久化上下文允许`EntityManager`跟踪已修改、创建和删除的实体实例，并将实体实例与`EntityManager`自身事务并发执行的外部事务所提交的更改进行协调。


    通过`EntityManager`查询的实体实例可以自由地传递给EJB容器内部和外部的客户端。客户端可以像访问普通Java对象一样访问和更新实体数据。要将更改应用回持久化存储，客户端在事务范围内调用`EntityManager`的`merge()`方法，然后`EntityManager`将实体数据的状态持久化到后端存储中。


    ## 获取EntityManager实例


    `EntityManager`实例可以从EJB容器内部（Java EE）和外部（Java SE）获取。这为客户端提供了以统一方式与持久化实体Bean交互的灵活性，而无需考虑持久化代码是在Java
    EE容器内部还是外部运行。


    ### 使用容器注入的会话Bean


    [清单3-13](#9781430246923_Ch03.xhtml#list13)提供了一个通过容器注入获取`EntityManager`实例的会话Bean示例。


    [***清单3-13.***](#9781430246923_Ch03.xhtml#_list13) 注入EntityManager实例的会话Bean


    ```

    @Stateless

    public class CustomerManager {


    @PersistenceContext(unitName="Chapter03PersistenceUnit")

      private EntityManager em;


    public void createCustomer() {

        final Customer cust = new Customer();

        cust.setName("Moneybags MgGee");

        em.persist(cust);

      }

    }

    ```


    在这个示例中，我们使用容器注入来获取绑定到`Chapter03PersistenceUnit`持久化单元的`EntityManager`实例，该单元包含来自[清单3-7](#9781430246923_Ch03.xhtml#list7)的`Customer`实体。然后我们使用这个`EntityManager`来持久化一个新的`Customer`实例。请注意，此示例假设存在一个ID生成器或其他服务来自动填充新实例的主键。


    ### 使用EntityManagerFactory的Java SE服务客户端


    有时容器注入不可用，或者应用程序希望对`EntityManager`的生命周期有更多控制。在这种情况下，客户端可以通过首先获取`EntityManagerFactory`来获得`EntityManager`。`javax.persistence.Persistence`类充当获取`EntityManagerFactory`的工厂，并且可以在Java
    EE环境和Java SE环境中使用。[清单3-14](#9781430246923_Ch03.xhtml#list14)展示了普通的Java SE服务客户端如何获取`EntityManager`。'
