- fmt: "# Mapped Superclass\n\nA mapped superclass is a non-entity class that is nonetheless\
    \ recognized by the persistence manager, and which declares persistent fields\
    \ and their mappings. Since it is not an entity, it may not be the target of persistent\
    \ entity relationships, nor may it be used in JPQL queries. It may, however, provide\
    \ persistent properties common to any entities that extend it, whether directly\
    \ or indirectly. Starting with the previous inheritance example, let us transform\
    \ the root entity, `Person`, into a mapped superclass. [Listings 4-18](#9781430246923_Ch04.xhtml#list18)\
    \ and [4-19](#9781430246923_Ch04.xhtml#list19) show the transformed classes.\n\
    \n[***Listing 4-18.***](#9781430246923_Ch04.xhtml#_list18) `Person.java`, an Abstract\
    \ Mapped Superclass (Non-Entity)\n\n```\n/**\n * Person: A Mapped Superclass,\
    \ and the base class (but not the root entity)\n * of an inheritance hierarchy\n\
    \ *\n * To create ID generator table \"CH04_MS_PERSON_ID_GEN\": CREATE TABLE\n\
    \ * \"CH04_MS_PERSON_ID_GEN\" (\"PRIMARY_KEY_NAME\" VARCHAR2(4000) PRIMARY KEY,\n\
    \ * \"NEXT_ID_VALUE\" NUMBER(38));\n *\n * To initialize this table with data\
    \ for this entity's ID generator 'Person.id'\n * (starting with value '0'): INSERT\
    \ INTO \"CH04_MS_PERSON_ID_GEN\" VALUES\n * ('Person.id', 0);\n */\n@MappedSuperclass\n\
    @TableGenerator(name = \"Person_ID_Generator\", table = \"CH04_MS_PERSON_ID_GEN\"\
    ,\n                pkColumnName = \"PRIMARY_KEY_NAME\", pkColumnValue = \"Person.id\"\
    ,\n                valueColumnName = \"NEXT_ID_VALUE\")\npublic abstract class\
    \ Person implements Serializable {\n  @SuppressWarnings(\"compatibility:-7074714881275658754\"\
    )\n  private static final long serialVersionUID = 5291172566067954515L;\n  @Id\n\
    \  @Column(nullable = false)\n  @GeneratedValue(strategy = GenerationType.TABLE,\
    \ generator = \"Person_ID_Generator\")\n  private Integer id;\n  @Column(name\
    \ = \"FIRST_NAME\", length = 400)\n  private String firstName;\n  @Column(name\
    \ = \"LAST_NAME\", length = 400)\n  private String lastName;\n  @OneToOne(cascade=CascadeType.ALL)\n\
    \  @JoinColumn(name = \"HOME_ADDRESS\")\n  private Address homeAddress;\n  @Version\n\
    \  private Integer version;\n\npublic Person() {\n  }\n\n/* get/set methods */\n\
    }\n```\n\n[***Listing 4-19.***](#9781430246923_Ch04.xhtml#_list19) `Employee.java`,\
    \ an Abstract Root Entity in a JOINED Entity Inheritance Hierarchy, and a Subclass\
    \ of a Mapped Superclass\n\n```\n/*\n * Employee: The root of an inheritance hierarchy.\
    \ Extends Person, a Mapped Superclass.\n */\n@Entity\n@NamedQueries({\n  @NamedQuery(name\
    \ = \"Employee.findAll\", query = \"select o from Employee o\")})\n@Table(name\
    \ = \"CH04_MS_EMPLOYEE\")\n@Inheritance(strategy = InheritanceType.JOINED)\npublic\
    \ abstract class Employee extends Person implements Serializable {\n  @SuppressWarnings(\"\
    compatibility:276774077273820023\")\n  private static final long serialVersionUID\
    \ = -8529011412038476148L;\n  @Column(length = 400)\n  private String department;\n\
    \  @Column(length = 400)\n  private String email;\n  @ManyToOne\n  @JoinColumn(name\
    \ = \"MANAGER\")\n  private FullTimeEmployee manager;\n\npublic Employee() {\n\
    \  }\n\n/* get/set methods */\n}\n```\n\nThe `Person` class becomes a mapped superclass\
    \ (`@MappedSuperclass`), and it is stripped of its `@NamedQuery`, `@Table`, and\
    \ `@Inheritance` annotations. `@Inheritance` is moved onto `Employee`, which becomes\
    \ the new root entity in the hierarchy.\n\nWhile a mapped superclass may not be\
    \ referenced as the target of a persistence relationship field, it may have persistence\
    \ relationship fields of its own, so the `homeAddress` field that references the\
    \ `Address` entity is perfectly legal.\n\nAlso note that we can continue to define\
    \ the `@Id` and `@Version` fields on the mapped superclass, and we can even continue\
    \ to specify an ID generator for the `id` field. Entities that extend this mapped\
    \ superclass map these fields, along with all other fields defined on the mapped\
    \ superclass, onto their own tables.\n\n## Non-entity Class\n\nEntities may also\
    \ make use of non-entity classes within their type hierarchies. An entity may\
    \ subclass a non-entity class, or a non-entity class may extend it. Such classes\
    \ may be concrete or abstract, and so they may be instantiable, but their fields\
    \ will not be persistable or maintained by the JPA persistence framework. They\
    \ also may not participate at all in persistent entity relationships or JPQL queries.\
    \ If a class in a type hierarchy serves only as an organizing construct for its\
    \ subclasses, and it is not involved in entity relationships (and there is no\
    \ other reason to mark it as an entity), then it is best left as an ordinary class.\
    \ It can always be turned into an entity later by annotating it or designating\
    \ it an entity in the XML descriptor.\n\n## Non-entity Single-value and Collection\
    \ Fields\n\nFinally, an entity may embed a non-entity class, or a collection of\
    \ non-entity classes, for its own private use. Such embedded references may be\
    \ to single objects or to collections of objects. Single-object fields are typically\
