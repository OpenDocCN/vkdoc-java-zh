- fmt: "[Listing 12-7](#9781430246923_Ch12.xhtml#list7) shows the code for the `winehome.jsp`\
    \ JSF page. This page uses an `h:commandLink` JSF UI component that allows you\
    \ to embed output text that should be displayed when the page is rendered. It\
    \ also includes a live link that the user can click to navigate to the next page.\
    \ This page provides three options to the user:\n\n- A complete list of available\
    \ wines\n- The ability to search wines by year, country, or varietal\n- The ability\
    \ to view the shopping cart and submit orders\n\nWe can specify the `action` attribute\
    \ with the `h:commandLink` component that can be an expression based on a method\
    \ or property in a managed bean. Alternatively, the `action` attribute can be\
    \ the name of the navigation case that is defined in `faces-config.xml`. We are\
    \ going to use the method-binding expression `#{WineList.findAllWines}` as an\
    \ `action` property value for the “Complete List of Wines” option, and we will\
    \ use the names of the navigation case for the remaining two options.\n\n**[Listing\
    \ 12-7](#9781430246923_Ch12.xhtml#_list7).**  `winehome.jsp`\n\n```\n<!DOCTYPE\
    \ HTML PUBLIC \"-//W3C//DTD HTML 4.01 Transitional//EN\"\n\"http://www.w3.org/TR/html4/loose.dtd\"\
