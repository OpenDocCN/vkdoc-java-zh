  raw: 'An *MDB class* is any standard Java class that has a class-level annotation
    `@MessageDriven`. If deployment descriptors are used instead of annotations, the
    bean class should be denoted as an MDB class. In the case of mixed mode, in which
    you are using annotations and deployment descriptors, the `@MessageDriven` annotation
    must be specified if any other class-level or member-level annotations are specified
    in the bean class. The `@MessageDriven` annotation parameters can be used to specify
    the JMS queues or topics to which the bean is listening. [Table 5-2](#9781430246923_Ch05.xhtml#Tab2)
    details the parameters.


    [Table 5-2](#9781430246923_Ch05.xhtml#_Tab2). Parameter details for the @MessageDriven
    Annotation


    | Parameter | Description |

    | --- | --- |

    | `ActivationConfigProperty` | The set of properties used to specify the destination
    name and type |

    | `description` | A description of the bean class |

    | `mappedName` | The physical Java Naming and Directory Interface (JNDI) name
    of the topic or queue to which the MDB is listening |

    | `messageListener` | The interface name of the interface class that the MDB is
    extending |

    | `name` | The name of the MDB, if it has to be a different name than the bean
    class |


    To illustrate the use of an MDB, we will create the use case shown in [Figure
    5-5](#9781430246923_Ch05.xhtml#Fig5). We will have an application client, which
    will be a Java command-line program that invokes a business method in the `OrderProcessing`
    session bean. The `OrderProcessing` session bean will create and send a JMS message
    to a topic registered/configured in the GlassFish application server. An MDB,
    `StatusMailer`, will listen to the topic and process the incoming message. The
    message received will contain details for the customer, and it will be used to
    send an e-mail notification to the customer regarding his or her order status.
    This simple use case will allow us to demonstrate how MDBs work and how to inject
    different types of resources in session beans and MDBs.


    ![9781430246923_Fig05-05.jpg](Images/9781430246923_Fig05-05.jpg)


    [Figure 5-5.](#9781430246923_Ch05.xhtml#_Fig5)  A sample MDB use case


    [Listing 5-1](#9781430246923_Ch05.xhtml#list1) shows the definition of a `StatusMailer`
    MDB. We have marked the `StatusMailerBean` class with the `@MessageDriven` annotation.


    ***[Listing 5-1](#9781430246923_Ch05.xhtml#_list1).***  StatusMailerBean.java


    ```

    package com.apress.ejb.chapter05;

    import javax.ejb.MessageDriven;

    @MessageDriven

    public class StatusMailerBean {

    }

    ```


    An MDB class has one method, `onMessage()`, that gets invoked by the EJB container
    on the arrival of a message in the queue/topic to which the MDB is listening.
    The `onMessage()` method contains the business logic on how to process the incoming
    message. The `onMessage()` method contains one parameter, which is the JMS message.
    In the case of the `StatusMailer` bean, the `onMessage()` method checks whether
    the message is of `MapMessage` type, and then it gets the customer information
    from the message, creates an e-mail message about the order status, and then sends
    an e-mail to the customer. [Listing 5-2](#9781430246923_Ch05.xhtml#list2) shows
    the `onMessage()` method code. In a `try` block, we start by checking whether
    the message received is of type `MapMessage`, as we are expecting. If it is, then
    we use `getStringProperty()` to retrieve the values of the `from`, `to`, `subject`,
    and `content` attributes in the message.


    ***[Listing 5-2](#9781430246923_Ch05.xhtml#_list2).***  The onMessage Method Code


    ```

    package com.apress.ejb.chapter05;

    import javax.ejb.MessageDriven;

    @MessageDriven

    public class StatusMailerBean {

        public void onMessage(Message message){

            try  {

                if (message instanceof MapMessage) {

                    MapMessage orderMessage = (MapMessage)message;

                    String from = orderMessage.getStringProperty("from");

                    String to = orderMessage.getStringProperty("to");

                    String subject = orderMessage.getStringProperty("subject");

                    String content = orderMessage.getStringProperty("content");

                 }

                else {

                    System.out.println("Invalid message ");

                    }

            } catch (Exception ex)  {

                ex.printStackTrace();

            }

         }

    }

    ```


    In addition to marking the standard Java class with the `@MessageDriven` annotation,
    the following requirements apply to an MDB class:


    *   The MDB class must implement the message listener interface. In the case of
    JMS, this will be `javax.jms.MessageListener`.

    *   The class cannot be final or abstract.

    *   The class should have a no-argument public constructor that is used by the
    EJB container to create instances of the bean class.


    If both annotations and deployment descriptors are used, the settings or values
    in the deployment descriptor will override the annotations in the classes during
    the deployment process.


    Configuration Properties


    Bean developers can provide configuration properties along with MDB classes, which
    get used at deployment time. The EJB container uses these properties to configure
    the bean and link it to the appropriate JMS provider. These configuration properties
    can be set using the `@ActivationConfigProperty` annotation. This annotation can
    be provided as one of the parameters for the `@MessageDriven` annotation. [Listing
    5-3](#9781430246923_Ch05.xhtml#list3) shows the `@MessageDriven` annotation with
    properties for the `StatusMailer` MDB. We have defined two `ActivationConfigProperty`
    annotations that specify the logical destination name and the destination type.


    ***[Listing 5-3](#9781430246923_Ch05.xhtml#_list3).***  The @MessageDriven Annotation
    with Properties for the StatusMailer MDB


    ```

    @MessageDriven(activationConfig= {

    @ActivationConfigProperty(propertyName="destinationName",←

    propertyValue="StatusMessageTopic"),←

    @ActivationConfigProperty(propertyName="destinationType",←

    propertyValue="javax.jms.Topic")

    }, mappedName="StatusMessageTopic")


    public class StatusMailerBean implements javax.jms.MessageListener {


    }

    ```


    Standard configuration properties available for MDBs in EJB version 3.0 and 3.1
    correspond to the configuration properties in JMS version 1.1\. Standard configuration
    properties for MDBs in EJB version 3.2 have been extended to correspond to the
    configuration properties in JMS version 2.0\. [Table 5-3](#9781430246923_Ch05.xhtml#Tab3)
    shows the correspondence between the EJB version and JMS version.


    [Table 5-3](#9781430246923_Ch05.xhtml#_Tab3). Mapping of EJB MDB version to JMS
    version


    | EJB Version | JMS Version |

    | --- | --- |

    | EJB 3.0 | JMS 1.1 |

    | EJB 3.1 | JMS 1.1 |

    | EJB 3.2 | JMS 2.0 |


    In the following sections, we will show what configuration properties can be set
    for MDBs.


    Message Acknowledgment


    The EJB container provides a message acknowledgment service. There are two message
    acknowledgment modes:


    *   `Auto-acknowledge`

    *   `Dups-ok-acknowledge`'
