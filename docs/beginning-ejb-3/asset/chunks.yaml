- fmt: "JPQL offers the ability to reference entity fields by name and join with other\
    \ entities through relationships, without regard to the underlying mapping details.\
    \ This offers a fair degree of independence between the database schema definer\
    \ and the query definer roles. There are times, however, when you’ll want to take\
    \ control of the query to leverage specific indexes, return sparse data sets,\
    \ or otherwise issue a query that is more conveniently expressed in SQL. JPA lets\
    \ you do this easily, and it even offers support for mapping the query results\
    \ back to entities if you desire.\n\nAs an example, you may wish to use a native\
    \ SQL query to return just the name and primary key column data from a table that\
    \ happens to map to one of your entities. The queried name values could then be\
    \ presented to the user through a combo box, and only when the user chooses a\
    \ name would you go out to the `EntityManager` and bind that name’s corresponding\
    \ primary key value to an entity instance using the `EntityManager.find(Object\
    \ primaryKey)` call. Had you used JPQL to return a collection of fully loaded\
    \ entities, instead of just the sparse key and name data set, you would have queried\
    \ more data fields than necessary, causing more resources to be consumed than\
    \ were actually needed.\n\nThe example in [Listing 4-24](#9781430246923_Ch04.xhtml#list24)\
    \ shows how to define a named native SQL query that returns instances of entity\
    \ type `Address`. Executing this named native query is the same to the client\
    \ as executing the equivalent JPQL named query.\n\n[***Listing 4-24.***](#9781430246923_Ch04.xhtml#_list24)\
    \ Code Listing that Demonstrates Native SQL Support\n\n```\n@NamedNativeQueries({\n\
    \  @NamedNativeQuery(name = \"Address.findAllNative\",\n    query = \"select id,\
    \ city, state, street1, street2, zip_code from ch04_join_address\",\n    resultClass=Address.class)})\n\
    ```\n\n## The Query Criteria API\n\nJPA 2.0 introduced an alternative to JPQL\
    \ for defining and executing queries, using strongly typed components. Using only\
    \ Java, the criteria API allows you to dynamically construct arbitrarily complex\
    \ queries and execute them to return the same results that could be achieved through\
    \ JPQL, but with compile-time type checking. Since the same underlying query engine\
    \ is used for both the JPQL and criteria API, they are equivalent in strength,\
    \ and there is an analogous criteria API call for each feature that can be expressed\
    \ in JPQL. For situations where a query is also dynamically defined through a\
    \ query builder, for instance, the criteria API can be more manageable than dynamically\
    \ constructing an equivalent JPQL statement.\n\nWhile the full criteria API, like\
    \ the full feature set of the JPQL language, goes beyond the scope of this book,\
    \ we show an example of how it can be used in [Listing 4-25](#9781430246923_Ch04.xhtml#list25).\n\
    \n[***Listing 4-25.***](#9781430246923_Ch04.xhtml#_list25) Code Listing that Demonstrates\
    \ use of the query criteria API\n\n```\n/**\n *  Criteria API equivalent to the\
    \ following JPQL query:\n *\n *    select o from Address o where o.city = :city\n\
    \ */\npublic List<Address> getAddressFindByCity(String city) {\n  //  Define a\
    \ query to return objects of type Address\n  CriteriaBuilder cb = em.getCriteriaBuilder();\n\
    \  CriteriaQuery<Address> c = cb.createQuery(Address.class);\n  Root<Address>\
    \ addr = c.from(Address.class);\n\n  //  Add the SELECT clause\n  c.select(addr);\n\
    \n  //  Define a predicate in the WHERE clause to compare the city\n  //  property\
    \ with a parameter value\n  ParameterExpression<String> p = cb.parameter(String.class,\
    \ \"city\");\n  c.where(cb.equal(addr.get(\"city\"), p));\n\n  //  Bind the 'city'\
    \ parameter\n  TypedQuery<Address> q = em.createQuery(c);\n  q.setParameter(\"\
    city\", city);\n\n  //  Return the query results as a List<Address>\n  return\
    \ q.getResultList();\n}\n```\n\nThe criteria API is a more formal approach but\
    \ can be extremely useful in the right application situation.\n\n## Composite\
    \ Primary Keys and Nested Foreign Keys\n\nWhen mapping entities to a new schema,\
    \ it is good practice to designate a single, dedicated column to be the primary\
    \ key column, as we have done in the previous examples. An entity’s primary key\
    \ value cannot be updated once it has been assigned. Also, dedicating a column\
    \ to hold the primary key instead of using a name or other column that holds meaningful\
    \ property data eliminates potential conflicts that might arise should a user\
    \ wish to modify a semantically significant field that happens to be part of the\
    \ primary key. It is also desirable to follow a single approach that is common\
    \ to all of your entities, and use of a single dedicated column for the primary\
    \ key is a simple pattern that we have found to work well.\n\nThere are cases,\
    \ however, in which the schema has already been defined and is being adapted into\
    \ Java as JPA entities, and cases in which, for other reasons, a composite primary\
    \ key is required. A legacy case that we run into a lot occurs when a composite\
    \ primary key includes columns, such as foreign key columns, that are also involved\
    \ in relationships with other entities. On top of this, these relationships are\
    \ necessarily mandatory (since all primary key columns must be `NOT NULL`), so\
    \ you will need to be careful about how you persist your entity graphs when you\
    \ need to persist such related entities in order to avoid `NOT NULL` constraints\
    \ when the row data is inserted during the `EntityManager.persist()` call.\n\n\
    There are two ways you can use a composite primary key to implement your entity’s\
    \ identity. They are described in the following sections.\n\n### Using an Embedded\
    \ Composite Key (@EmbeddedId)\n\nIf the fields of the composite key do not represent\
    \ useful property data that you consider to be part of the entity definition,\
    \ you can designate a single entity field to be the primary key field and set\
    \ its type to be the composite key class type. This composite key class is marked\
    \ `@Embedded`. Its fields will be mapped as if they were part of the entity itself,\
    \ but they will only be accessible to clients through the composite field.\n\n\
    The embedded composite key field `myId` on the entity is annotated `@EmbeddedId`.\
    \ In [Listing 4-26](#9781430246923_Ch04.xhtml#list26), we introduce the `@Embeddable`\
    \ class `MyIdClass`, containing the field’s `firstName` and `lastName` fields\
    \ that were previously on `Person`.\n\n[***Listing 4-26.***](#9781430246923_Ch04.xhtml#_list26)\
    \ MyIdClass.java, an @Embeddable class suitable for use as an @EmbeddedId\n\n\
    ```\n@Embeddable\npublic class MyIdClass {\n  @Column(name = \"FIRST_NAME\", length\
    \ = 400)\n  private String firstName;\n  @Column(name = \"LAST_NAME\", length\
    \ = 400)\n  private String lastName;\n\n  @Override\n  public boolean equals(Object\
    \ obj) {\n    return (obj instanceof MyIdClass &&\n            firstName.equals(((MyIdClass)\
    \ obj).getFirstName()) &&\n            lastName.equals(((MyIdClass) obj).getLastName()));\n\
    \  }\n\n  @Override\n  public int hashCode() {\n    return System.identityHashCode(this);\n\
    \  }\n\n  /* get/set methods */\n}\n```\n\n[Listing 4-27](#9781430246923_Ch04.xhtml#list27)\
    \ shows this new class being used as an `@EmbeddedId` on the `Person` class.\n\
    \n[***Listing 4-27.***](#9781430246923_Ch04.xhtml#_list27) Person.java, Illustrating\
    \ Usage of a Composite Primary Key Using an @EmbeddedId Annotation\n\n```\n@Entity\n\
    @NamedQueries({\n  @NamedQuery(name = \"Person.findAll\", query = \"select o from\
    \ Person o\")})\n@Table(name = \"CH04_EMBID_PERSON\")\npublic class Person implements\
    \ Serializable {\n  @SuppressWarnings(\"compatibility:-7074714881275658754\")\n\
    \  private static final long serialVersionUID = 5291172566067954515L;\n  @EmbeddedId\n\
    \  private MyIdClass myId = new MyIdClass();\n  @Version\n  private Integer version;\n\
    \n  public Person() {\n  }\n\n  /* get/set methods */\n}\n```"
  raw: 'JPQL offers the ability to reference entity fields by name and join with other
    entities through relationships, without regard to the underlying mapping details.
    This offers a fair degree of independence between the database schema definer
    and the query definer roles. There are times, however, when you’ll want to take
    control of the query to leverage specific indexes, return sparse data sets, or
    otherwise issue a query that is more conveniently expressed in SQL. JPA lets you
    do this easily, and it even offers support for mapping the query results back
    to entities if you desire.


    As an example, you may wish to use a native SQL query to return just the name
    and primary key column data from a table that happens to map to one of your entities.
    The queried name values could then be presented to the user through a combo box,
    and only when the user chooses a name would you go out to the `EntityManager`
    and bind that name’s corresponding primary key value to an entity instance using
    the `EntityManager.find(Object primaryKey)` call. Had you used JPQL to return
    a collection of fully loaded entities, instead of just the sparse key and name
    data set, you would have queried more data fields than necessary, causing more
    resources to be consumed than were actually needed.


    The example in [Listing 4-24](#9781430246923_Ch04.xhtml#list24) shows how to define
    a named native SQL query that returns instances of entity type `Address`. Executing
    this named native query is the same to the client as executing the equivalent
    JPQL named query.


    [***Listing 4-24.***](#9781430246923_Ch04.xhtml#_list24)  Code Listing that Demonstrates
    Native SQL Support


    ```

    @NamedNativeQueries({

      @NamedNativeQuery(name = "Address.findAllNative",

        query = "select id, city, state, street1, street2, zip_code from ch04_join_address",

        resultClass=Address.class)})

    ```


    The Query Criteria API


    JPA 2.0 introduced an alternative to JPQL for defining and executing queries,
    using strongly typed components. Using only Java, the criteria API allows you
    to dynamically construct arbitrarily complex queries and execute them to return
    the same results that could be achieved through JPQL, but with compile-time type
    checking. Since the same underlying query engine is used for both the JPQL and
    criteria API, they are equivalent in strength, and there is an analogous criteria
    API call for each feature that can be expressed in JPQL. For situations where
    a query is also dynamically defined through a query builder, for instance, the
    criteria API can be more manageable than dynamically constructing an equivalent
    JPQL statement.


    While the full criteria API, like the full feature set of the JPQL language, goes
    beyond the scope of this book, we show an example of how it can be used in [Listing
    4-25](#9781430246923_Ch04.xhtml#list25).


    [***Listing 4-25.***](#9781430246923_Ch04.xhtml#_list25)  Code Listing that Demonstrates
    use of the query criteria API


    ```

    /**

     *  Criteria API equivalent to the following JPQL query:

     *

     *    select o from Address o where o.city = :city

     */

    public List<Address> getAddressFindByCity(String city) {

      //  Define a query to return objects of type Address

      CriteriaBuilder cb = em.getCriteriaBuilder();

      CriteriaQuery<Address> c = cb.createQuery(Address.class);

      Root<Address> addr = c.from(Address.class);


    //  Add the SELECT clause

      c.select(addr);


    //  Define a predicate in the WHERE clause to compare the city

      //  property with a parameter value

      ParameterExpression<String> p = cb.parameter(String.class, "city");

      c.where(cb.equal(addr.get("city"), p));


    //  Bind the ''city'' parameter

      TypedQuery<Address> q = em.createQuery(c);

      q.setParameter("city", city);


    //  Return the query results as a List<Address>

      return q.getResultList();

    }

    ```


    The criteria API is a more formal approach but can be extremely useful in the
    right application situation.


    Composite Primary Keys and Nested Foreign Keys


    When mapping entities to a new schema, it is good practice to designate a single,
    dedicated column to be the primary key column, as we have done in the previous
    examples. An entity’s primary key value cannot be updated once it has been assigned.
    Also, dedicating a column to hold the primary key instead of using a name or other
    column that holds meaningful property data eliminates potential conflicts that
    might arise should a user wish to modify a semantically significant field that
    happens to be part of the primary key. It is also desirable to follow a single
    approach that is common to all of your entities, and use of a single dedicated
    column for the primary key is a simple pattern that we have found to work well.


    There are cases, however, in which the schema has already been defined and is
    being adapted into Java as JPA entities, and cases in which, for other reasons,
    a composite primary key is required. A legacy case that we run into a lot occurs
    when a composite primary key includes columns, such as foreign key columns, that
    are also involved in relationships with other entities. On top of this, these
    relationships are necessarily mandatory (since all primary key columns must be
    `NOT NULL`), so you will need to be careful about how you persist your entity
    graphs when you need to persist such related entities in order to avoid `NOT NULL`
    constraints when the row data is inserted during the `EntityManager.persist()`
    call.


    There are two ways you can use a composite primary key to implement your entity’s
    identity. They are described in the following sections.


    Using an Embedded Composite Key (@EmbeddedId)


    If the fields of the composite key do not represent useful property data that
    you consider to be part of the entity definition, you can designate a single entity
    field to be the primary key field and set its type to be the composite key class
    type. This composite key class is marked `@Embedded`. Its fields will be mapped
    as if they were part of the entity itself, but they will only be accessible to
    clients through the composite field.


    The embedded composite key field `myId` on the entity is annotated `@EmbeddedId`.
    In [Listing 4-26](#9781430246923_Ch04.xhtml#list26), we introduce the `@Embeddable`
    class `MyIdClass`, containing the field’s `firstName` and `lastName` fields that
    were previously on `Person`.


    [***Listing 4-26.***](#9781430246923_Ch04.xhtml#_list26)  MyIdClass.java, an @Embeddable
    class suitable for use as an @EmbeddedId


    ```

    @Embeddable

    public class MyIdClass {

      @Column(name = "FIRST_NAME", length = 400)

      private String firstName;

      @Column(name = "LAST_NAME", length = 400)

      private String lastName;


    @Override

      public boolean equals(Object obj) {

        return (obj instanceof MyIdClass &&

                firstName.equals(((MyIdClass) obj).getFirstName()) &&

                lastName.equals(((MyIdClass) obj).getLastName()));

      }


    @Override

      public int hashCode() {

        return System.identityHashCode(this);

      }


    /* get/set methods */

    }

    ```


    [Listing 4-27](#9781430246923_Ch04.xhtml#list27) shows this new class being used
    as an `@EmbeddedId` on the `Person` class.


    [***Listing 4-27.***](#9781430246923_Ch04.xhtml#_list27)  Person.java, Illustrating
    Usage of a Composite Primary Key Using an @EmbeddedId Annotation


    ```

    @Entity

    @NamedQueries({

      @NamedQuery(name = "Person.findAll", query = "select o from Person o")})

    @Table(name = "CH04_EMBID_PERSON")

    public class Person implements Serializable {

      @SuppressWarnings("compatibility:-7074714881275658754")

      private static final long serialVersionUID = 5291172566067954515L;

      @EmbeddedId

      private MyIdClass myId = new MyIdClass();

      @Version

      private Integer version;


    public Person() {

      }


    /* get/set methods */

    }

    ```'
