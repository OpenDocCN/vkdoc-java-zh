- fmt: "# Business Interfaces for Stateful Session Beans\n\nBusiness interfaces for\
    \ stateful session beans are similar to those used for stateless session beans,\
    \ and they are annotated in the same way, using `@Local` and `@Remote` annotations.\
    \ Local view of stateful session beans can be accessed without a separate local\
    \ business interface. The `ShoppingCart` session bean has both remote and local\
    \ interfaces, as shown in [Figure 2-6](#9781430246923_Ch02.xhtml#Fig6).\n\n![9781430246923_Fig02-06.jpg](Images/9781430246923_Fig02-06.jpg)\n\
    \n[Figure 2-6.](#9781430246923_Ch02.xhtml#_Fig6) Business interfaces for `ShoppingCart`\n\
    \nWe will primarily use the local interface from our web application. The remote\
    \ interface is added to facilitate unit testing of the bean in this chapter.\n\
    \n[Listings 2-10](#9781430246923_Ch02.xhtml#list10) and [2-11](#9781430246923_Ch02.xhtml#list11)\
    \ show the remote and local `ShoppingCart` business interfaces, with `@Remote`\
    \ and `@Local` annotations, respectively.\n\n[***Listing 2-10.***](#9781430246923_Ch02.xhtml#_list10)\
    \ ShoppingCart.java\n\n```\npackage com.apress.ejb.chapter02;\nimport javax.ejb.Remote;\n\
    @Remote\npublic interface ShoppingCart {\n}\n```\n\n[***Listing 2-11.***](#9781430246923_Ch02.xhtml#_list11)\
    \ ShoppingCartLocal.java\n\n```\npackage com.apress.ejb.chapter02;\nimport javax.ejb.Local;\n\
    @Local\npublic interface ShoppingCartLocal {\n}\n```\n\nAlternatively, you can\
    \ use the coding style shown in [Listing 2-12](#9781430246923_Ch02.xhtml#list12),\
    \ in which you can specify the `@Local` and `@Remote` annotations before specifying\
    \ `@Stateful` or `@Stateless` with the name of the business interface.\n\n[***Listing\
    \ 2-12.***](#9781430246923_Ch02.xhtml#_list12) ShoppingCartBean.java\n\n```\n\
    package com.apress.ejb.chapter02;\nimport javax.ejb.Local;\nimport javax.ejb.Remote;\n\
    import javax.ejb.Stateful;\n\n@Local({ShoppingCartLocal.class})\n@Remote({ShoppingCart.class})\n\
    @Stateful(name=\"ShoppingCart\")\n\npublic class ShoppingCartBean implements ShoppingCart,\
    \ ShoppingCartLocal {\n    public ShoppingCartBean() {\n    }\n}\n```\n\n![image](Images/sq.jpg)\
    \ **Note** We will follow the earlier convention in this book, in which `@Local`\
    \ and `@Remote` annotations are marked on the business interfaces.\n\n## Business\
    \ Methods\n\nBusiness methods in stateful session beans are similar to those in\
    \ stateless session beans. We will augment the `ShoppingCart` bean by adding business\
    \ methods that will add and remove wines from the shopping cart and return a list\
    \ of cart items.\n\n[Listing 2-13](#9781430246923_Ch02.xhtml#list13) shows the\
    \ `ShoppingCart` bean implementing the `addWineItem()`, `removeWineItem()`, and\
    \ `getCartItems()` methods.\n\n[***Listing 2-13.***](#9781430246923_Ch02.xhtml#_list13)\
    \ ShoppingCartBean.java\n\n```\npackage com.apress.ejb.chapter02;\nimport java.util.ArrayList;\n\
    import javax.ejb.Stateful;\n\n@Stateful(name=\"ShoppingCart\")\npublic class ShoppingCartBean\
    \ implements ShoppingCart, ShoppingCartLocal {\n    public ShoppingCartBean()\
    \ {\n    }\n    public ArrayList cartItems;\n    public void addWineItem(String\
    \ wine) {\n       cartItems.add(wine);\n    }\n\npublic void removeWineItem(String\
    \ wine) {\n       cartItems.remove(wine);\n    }\n\npublic void setCartItems(ArrayList\
    \ cartItems) {\n        this.cartItems = cartItems;\n    }\n\npublic ArrayList\
    \ getCartItems() {\n        return cartItems;\n    }\n}\n```\n\n## Lifecycle Callback\
    \ Methods\n\nStateful session beans support callback events for construction,\
    \ destruction, activation, and passivation. Following are the callbacks that map\
    \ to the preceding events:\n\n*   `PostConstruct`: Denoted with the `@PostConstruct`\
    \ annotation.\n*   `PreDestroy`: Denoted with the `@PreDestroy` annotation.\n\
    *   `PreActivate`: Denoted with the `@PreActivate` annotation.\n*   `PrePassivate`:\
    \ Denoted with the `@PrePassivate` annotation.\n\nThe `PostConstruct` callback\
    \ happens after a bean instance is instantiated in the EJB container. If the bean\
    \ is using any dependency injection mechanism for acquiring references to resources\
    \ or other objects in its environment, the `PostConstruct` event happens after\
    \ injection is performed and before the first business method in the bean class\
    \ is called.\n\nIn the case of the `ShoppingCart` session bean, we could have\
    \ a business method called `initialize()` that initializes the `cartItems` list,\
    \ as shown in [Listing 2-14](#9781430246923_Ch02.xhtml#list14).\n\n[***Listing\
    \ 2-14.***](#9781430246923_Ch02.xhtml#_list14) The `PostConstruct` Method\n\n\
    ```\n@PostConstruct\npublic void initialize() {\n    cartItems = new ArrayList();\n\
    }\n```\n\nThe `PreDestroy` callback happens after any method where an `@Remove`\
    \ annotation has been completed. In the case of the `ShoppingCart` session bean,\
    \ we could have a business method called `exit()` that writes the `cartItems`\
    \ list into a database. In this chapter, we will just print out a message to the\
    \ system console to illustrate the callback. [Listing 2-15](#9781430246923_Ch02.xhtml#list15)\
    \ shows the code for the `exit()` method, which has the `@PreDestroy` annotation.\n\
    \n[***Listing 2-15.***](#9781430246923_Ch02.xhtml#_list15) The `PreDestroy` Method\n\
    \n```\n@PreDestroy\npublic void exit() {\n    // items list into the database.\n\
    \    System.out.println(\"Saved items list into database\");\n}\n```\n\nThe `@Remove`\
    \ annotation is a useful lifecycle method for stateful session beans. When the\
    \ method with the `@Remove` annotation is called, the container will remove the\
    \ bean instance from the object pool after the method is executed. [Listing 2-16](#9781430246923_Ch02.xhtml#list16)\
    \ shows the code for the `stopSession()` method, which has the `@Remove` annotation.\n\
    \n[***Listing 2-16.***](#9781430246923_Ch02.xhtml#_list16) The `Remove` Method\n\
    \n```\n@Remove\npublic void stopSession() {\n    // The method body can be empty.\n\
    \    System.out.println(\"From stopSession method with @Remove annotation\");\n\
    }\n```\n\nThe `PrePassivate` callback kicks in when a stateful session bean instance\
    \ is idle for too long. During this event, the container might passivate and store\
    \ its state to a cache. The method tagged with `@PrePassivate` is called before\
    \ the container passivates the bean instance.\n\nThe `PostActivate` event gets\
    \ raised when the client application again uses a passivated stateful session\
    \ bean. A new instance with restored state is created. The method with the `@PostActivate`\
    \ annotation is called when the bean instance is ready.\n\n## Interceptors\n\n\
    There are some minor differences between interceptors for stateless and stateful\
    \ session beans. `AroundInvoke` methods can be used with stateful session beans.\
    \ For stateful session beans that implement `SessionSynchronization`, `afterBegin`\
    \ occurs before any methods that have `AroundInvoke` annotations and before the\
    \ `beforeCompletion()` callback method.\n\n## Exception Handling\n\nThe EJB specification\
    \ outlines two types of exceptions:\n\n*   Application exceptions\n*   System\
    \ exceptions\n\n*Application exceptions* are exceptions related to execution of\
    \ business logic that the client should handle. For example, an application exception\
    \ might be raised if the client application passes an invalid argument, such as\
    \ the wrong credit card number.\n\n*System exceptions,* on the other hand, are\
    \ caused by system-level faults, such as Java Naming and Directory Interface (JNDI)\
    \ errors or failure to acquire a database connection. A system exception must\
    \ be a subclass of a `java.rmi.RemoteException` or a subclass of a `java.lang.RuntimeException`\
    \ that is not an application exception.\n\nFrom the EJB application point of view,\
    \ application exceptions are completed by writing application-specific exception\
    \ classes that subclass the `java.lang.Exception` class."
  raw: 'Business interfaces for stateful session beans are similar to those used for
    stateless session beans, and they are annotated in the same way, using `@Local`
    and `@Remote` annotations. Local view of stateful session beans can be accessed
    without a separate local business interface. The `ShoppingCart` session bean has
    both remote and local interfaces, as shown in [Figure 2-6](#9781430246923_Ch02.xhtml#Fig6).


    ![9781430246923_Fig02-06.jpg](Images/9781430246923_Fig02-06.jpg)


    [Figure 2-6.](#9781430246923_Ch02.xhtml#_Fig6)  Business interfaces for ShoppingCart


    We will primarily use the local interface from our web application. The remote
    interface is added to facilitate unit testing of the bean in this chapter.


    [Listings 2-10](#9781430246923_Ch02.xhtml#list10) and [2-11](#9781430246923_Ch02.xhtml#list11)
    show the remote and local `ShoppingCart` business interfaces, with `@Remote` and
    `@Local` annotations, respectively.


    [***Listing 2-10.***](#9781430246923_Ch02.xhtml#_list10)  ShoppingCart.java


    ```

    package com.apress.ejb.chapter02;

    import javax.ejb.Remote;

    @Remote

    public interface ShoppingCart {

    }

    ```


    [***Listing 2-11.***](#9781430246923_Ch02.xhtml#_list11)  ShoppingCartLocal.java


    ```

    package com.apress.ejb.chapter02;

    import javax.ejb.Local;

    @Local

    public interface ShoppingCartLocal {

    }

    ```


    Alternatively, you can use the coding style shown in [Listing 2-12](#9781430246923_Ch02.xhtml#list12),
    in which you can specify the `@Local` and `@Remote` annotations before specifying
    `@Stateful` or `@Stateless` with the name of the business interface.


    [***Listing 2-12.***](#9781430246923_Ch02.xhtml#_list12)  ShoppingCartBean.java


    ```

    package com.apress.ejb.chapter02;

    import javax.ejb.Local;

    import javax.ejb.Remote;

    import javax.ejb.Stateful;


    @Local({ShoppingCartLocal.class})

    @Remote({ShoppingCart.class})

    @Stateful(name="ShoppingCart")


    public class ShoppingCartBean implements ShoppingCart, ShoppingCartLocal {

        public ShoppingCartBean() {

        }

    }

    ```


    ![image](Images/sq.jpg) **Note**   We will follow the earlier convention in this
    book, in which `@Local` and `@Remote` annotations are marked on the business interfaces.


    Business Methods


    Business methods in stateful session beans are similar to those in stateless session
    beans. We will augment the `ShoppingCart` bean by adding business methods that
    will add and remove wines from the shopping cart and return a list of cart items.


    [Listing 2-13](#9781430246923_Ch02.xhtml#list13) shows the `ShoppingCart` bean
    implementing the `addWineItem()`, `removeWineItem()`, and `getCartItems()` methods.


    [***Listing 2-13.***](#9781430246923_Ch02.xhtml#_list13)  ShoppingCartBean.java


    ```

    package com.apress.ejb.chapter02;

    import java.util.ArrayList;

    import javax.ejb.Stateful;


    @Stateful(name="ShoppingCart")

    public class ShoppingCartBean implements ShoppingCart, ShoppingCartLocal {

        public ShoppingCartBean() {

        }

        public ArrayList cartItems;

        public void addWineItem(String wine) {

           cartItems.add(wine);

        }


    public void removeWineItem(String wine) {

           cartItems.remove(wine);

        }


    public void setCartItems(ArrayList cartItems) {

            this.cartItems = cartItems;

        }


    public ArrayList getCartItems() {

            return cartItems;

        }

    }

    ```


    Lifecycle Callback Methods


    Stateful session beans support callback events for construction, destruction,
    activation, and passivation. Following are the callbacks that map to the preceding
    events:


    *   `PostConstruct`: Denoted with the `@PostConstruct` annotation.

    *   `PreDestroy`: Denoted with the `@PreDestroy` annotation.

    *   `PreActivate`: Denoted with the `@PreActivate` annotation.

    *   `PrePassivate`: Denoted with the `@PrePassivate` annotation.


    The `PostConstruct` callback happens after a bean instance is instantiated in
    the EJB container. If the bean is using any dependency injection mechanism for
    acquiring references to resources or other objects in its environment, the `PostConstruct`
    event happens after injection is performed and before the first business method
    in the bean class is called.


    In the case of the `ShoppingCart` session bean, we could have a business method
    called `initialize()` that initializes the `cartItems` list, as shown in [Listing
    2-14](#9781430246923_Ch02.xhtml#list14).


    [***Listing 2-14.***](#9781430246923_Ch02.xhtml#_list14)  The PostConstruct Method


    ```

    @PostConstruct

    public void initialize() {

        cartItems = new ArrayList();

    }

    ```


    The `PreDestroy` callback happens after any method where an `@Remove` annotation
    has been completed. In the case of the `ShoppingCart` session bean, we could have
    a business method called `exit()` that writes the `cartItems` list into a database.
    In this chapter, we will just print out a message to the system console to illustrate
    the callback. [Listing 2-15](#9781430246923_Ch02.xhtml#list15) shows the code
    for the `exit()` method, which has the `@PreDestroy` annotation.


    [***Listing 2-15.***](#9781430246923_Ch02.xhtml#_list15)  The PreDestroy Method


    ```

    @PreDestroy

    public void exit() {

        // items list into the database.

        System.out.println("Saved items list into database");

    }

    ```


    The `@Remove` annotation is a useful lifecycle method for stateful session beans.
    When the method with the `@Remove` annotation is called, the container will remove
    the bean instance from the object pool after the method is executed. [Listing
    2-16](#9781430246923_Ch02.xhtml#list16) shows the code for the `stopSession()`
    method, which has the `@Remove` annotation.


    [***Listing 2-16.***](#9781430246923_Ch02.xhtml#_list16)  The Remove Method


    ```

    @Remove

    public void stopSession() {

        // The method body can be empty.

        System.out.println("From stopSession method with @Remove annotation");

    }

    ```


    The `PrePassivate` callback kicks in when a stateful session bean instance is
    idle for too long. During this event, the container might passivate and store
    its state to a cache. The method tagged with `@PrePassivate` is called before
    the container passivates the bean instance.


    The `PostActivate` event gets raised when the client application again uses a
    passivated stateful session bean. A new instance with restored state is created.
    The method with the `@PostActivate` annotation is called when the bean instance
    is ready.


    Interceptors


    There are some minor differences between interceptors for stateless and stateful
    session beans. `AroundInvoke` methods can be used with stateful session beans.
    For stateful session beans that implement `SessionSynchronization`, `afterBegin`
    occurs before any methods that have `AroundInvoke` annotations and before the
    `beforeCompletion()` callback method.


    Exception Handling


    The EJB specification outlines two types of exceptions:


    *   Application exceptions

    *   System exceptions


    *Application exceptions* are exceptions related to execution of business logic
    that the client should handle. For example, an application exception might be
    raised if the client application passes an invalid argument, such as the wrong
    credit card number.


    *System exceptions,* on the other hand, are caused by system-level faults, such
    as Java Naming and Directory Interface (JNDI) errors or failure to acquire a database
    connection. A system exception must be a subclass of a `java.rmi.RemoteException`
    or a subclass of a `java.lang.RuntimeException` that is not an application exception.


    From the EJB application point of view, application exceptions are completed by
    writing application-specific exception classes that subclass the `java.lang.Exception`
    class.'
