- fmt: "# 排版后的内容\n\nThe entity at the other end of this bidirectional relationship,\
    \ `FullTimeEmployee`, holds the `managedEmployees` field.\n\n```\n@OneToMany(mappedBy\
    \ = \"manager\", cascade = {CascadeType.PERSIST, CascadeType.MERGE})\nprivate\
    \ List<Employee> managedEmployees;\n```\n\nSince we have already specified the\
    \ mapping on the owning end, this field can simply refer to that `manager` field,\
    \ using the `mappedBy = \"manager\"` attribute. In this way, both relationship\
    \ fields are mapped to the same foreign key, and a join table is not required.\n\
    \n![image](Images/sq.jpg) **Note** JPA lets you map a `@OneToMany` field to a\
    \ foreign key on the target entity’s table even when the target entity doesn’t\
    \ expose a corresponding `@ManyToOne` relationship field. To do this you use a\
    \ `@JoinColumn` on the `@OneToMany` field that identifies the remote foreign key,\
    \ instead of using the `mappedBy` attribute.\n\nThis `managedEmployees` field\
    \ contains a list of `Employee` instances, which in practice will be concrete\
    \ `FullTimeEmployee` and/or `PartTimeEmployee` instances.\n\nThe `cascade = {\
    \ CascadeType.PERSIST, CascadeType.MERGE }` attribute indicates that any merge\
    \ or persist operation performed on this entity, `Employee`, must also be applied\
    \ to any `FullTimeEmployee` instances referenced by this relationship field. For\
    \ example, if a new `Employee` instance is created and assigned a `FullTimeEmployee`\
    \ as its manager, the act of persisting the `Employee` instance through `EntityManager.persist()`\
    \ will also cause any referenced `FullTimeEmployee` instances to be persisted\
    \ as well, if they have not already been persisted.\n\nThe `Person` entity has\
    \ a relationship with `Address` through the `homeAddress` field.\n\n```\n@OneToOne(cascade=CascadeType.ALL)\n\
    @JoinColumn(name = \"HOME_ADDRESS\")\nprivate Address homeAddress;\n```\n\nBecause\
    \ there is no corresponding field on `Address` that references `Person`, this\
    \ is a unidirectional relationship. The cascade property on `@OneToOne` indicates\
    \ which operations should be propagated to the referenced object. Because we have\
    \ specified a cascade rule of `CascadeType.ALL`, all events – `DETACH`, `MERGE`,\
    \ `PERSIST`, `REFRESH`, and `REMOVE` – applied to a `Person` are automatically\
    \ applied to its `homeAddress` object.\n\n## The @DiscriminatorColumn Annotation\n\
    \nWhenever we map multiple entity classes to a single table, as we do with the\
    \ `InheritanceType.SINGLE_TABLE` strategy, there must be some way to identify\
    \ the concrete entity type of any given row in the table. To determine the entity\
    \ type, the persistence manager looks for a column named `DTYPE` in the root entity’s\
    \ table to obtain this information. If your schema requires a different column\
    \ name to capture this information, you may use the `@DiscriminatorColumn` annotation\
    \ to identify which column JPA should use; in Listing 4-1, the `Person.java` entity\
    \ specifies a discriminator column named `TYPE`, through the `@DiscriminatorColumn(name\
    \ = \"TYPE\")` annotation. Were we to use a column named `DTYPE`, as we do for\
    \ the remaining examples, we could have skipped this annotation altogether and\
    \ accepted the default value.\n\n## The @DiscriminatorValue Annotation\n\nThe\
    \ value that gets stored in the discriminator column is known as a discriminator\
    \ value. Each concrete entity declares, either explicitly or by tacitly accepting\
    \ the default, a unique discriminator value that serves to identify the concrete\
    \ entity type associated with each row in the table. The discriminator value defaults\
    \ to the entity name, and in this example we have accepted this default value\
    \ for each of the entities in the hierarchy. When adapting legacy tables and data\
    \ into JPA, and you wish to map preexisting discriminator values to entities with\
    \ dissimilar names, you can use the `@DiscriminatorValue` annotation to specify\
    \ the discriminator value to use for each entity in the hierarchy that requires\
    \ an override.\n\n## Pros and Cons of the SINGLE_TABLE Strategy\n\nWe consider\
    \ each inheritance hierarchy from a design time and performance perspective, weighing\
    \ strengths and weaknesses. We start with the `SINGLE_TABLE` strategy.\n\n###\
    \ Design-Time Considerations\n\nThe `SINGLE_TABLE` mapping approach works well\
    \ when the type hierarchy is fairly simple and stable. Adding a new type to the\
    \ hierarchy and adding fields to existing supertypes simply involves adding new\
    \ columns to the table. In particularly large deployments, however, this may have\
    \ an adverse impact on the index and column layout inside the database. If your\
    \ hierarchy will possibly outgrow the column limitations of a single table, which\
    \ is typically 256 columns, or if for some reason you need to map more than one\
    \ very large field to inline LOB (Large OBject) columns, you may have to introduce\
    \ an `@SecondaryTable` mapping. In this case, it might be wiser to adopt one of\
    \ the approaches that follow. In addition, `NOT NULL` constraints may not be used\
    \ on columns that are not shared by all types in the hierarchy.\n\n### Performance\
    \ Impact\n\nThe `SINGLE_TABLE` strategy is very efficient for querying across\
    \ all types in the hierarchy, or for specific types. No table joins are required\
    \ by the internal persistence framework – only a `WHERE` clause listing the type\
    \ identifiers is necessary. In particular, relationships involving types that\
    \ employ this mapping strategy perform well.\n\n## Sample Client Code\n\nAs we\
    \ mentioned in the “Getting Started” section of this chapter, we have put together\
    \ sample client code to test the inheritance examples, along with the other examples\
    \ that appear later in this chapter. In the Sample Code provided for this chapter,\
    \ we offer both a Java client and an HTTP servlet for each of the inheritance\
    \ examples. Listing 4-6 shows a simple Java class that serves as a façade, like\
    \ an EJB Session bean facade, for instantiating an `EntityManager` for the `Chapter04-PersistenceIISamples-SingleTable`\
    \ persistence unit and exposing the CRUD methods for manipulating the JPA entities\
    \ in that unit. Listing 4-7 shows a Java client for this service that exercises\
    \ these CRUD methods and prints out the results. We could have used an actual\
    \ EJB Session façade for this purpose as well, but we wanted to demonstrate how\
    \ an ordinary Java class can interact with JPA entities in a non-JavaEE environment.\n\
    \nIn the Sample Code area, we offer a similar Java service façade and accompanying\
    \ Java clients for the other inheritance strategies. They are identical across\
    \ each inheritance strategy except for the persistence unit used by each, and\
    \ the entity classes that are annotated with the specific inheritance strategy\
    \ details.\n\nSimilarly, we provide a simple HTTP servlet client for each inheritance\
    \ strategy, demonstrating JPA entity use in a JavaEE Web environment. These servlets\
    \ replace the Java client, and they interact directly with the same Java service\
    \ façade.\n\n**Listing 4-6.** `JavaServiceFacade.java`, a Java Class that Serves\
    \ as a Façade for the Entities Defined in Figure 4-1\n\n```\n/*\n * Java service\
    \ façade that obtains an EntityManager running outside of a\n * Java EE container,\
    \ and illustrates CRUD operations on a handful of entities.\n * Employs auto-commit\
    \ behavior, emulating the default transaction behavior of\n * a Stateless Session\
    \ bean.\n */\npublic class JavaServiceFacade {\n  private final EntityManager\
    \ em;\n\n  public JavaServiceFacade() {\n    //  To support an non-JavaEE environment,\
    \ we avoid injection and create an EntityManagerFactory\n    //  for the desired\
    \ persistence unit. From this factory we then create the EntityManager.\n    final\
    \ EntityManagerFactory emf = Persistence.createEntityManagerFactory(\"Chapter04-PersistenceIISamples-SingleTable\"\
    );\n    em = emf.createEntityManager();\n  }\n```"
