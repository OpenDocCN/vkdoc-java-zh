    此双向关系另一端的实体 `FullTimeEmployee` 持有 `managedEmployees` 字段。


    ```

    @OneToMany(mappedBy = "manager", cascade = {CascadeType.PERSIST, CascadeType.MERGE})

    private List<Employee> managedEmployees;

    ```


    由于我们已经在拥有方指定了映射关系，该字段只需使用 `mappedBy = "manager"` 属性来引用那个 `manager` 字段即可。这样一来，两个关系字段都映射到同一个外键上，因此无需使用连接表。


    ![image](img/sq.jpg) **注意**   即使目标实体没有暴露对应的 `@ManyToOne` 关系字段，JPA 也允许你将 `@OneToMany`
    字段映射到目标实体表的外键上。为此，你需要在 `@OneToMany` 字段上使用 `@JoinColumn` 来标识远程外键，而不是使用 `mappedBy`
    属性。


    `managedEmployees` 字段包含一个 `Employee` 实例列表，在实际应用中，这些实例将是具体的 `FullTimeEmployee`
    和/或 `PartTimeEmployee` 实例。


    `cascade = { CascadeType.PERSIST, CascadeType.MERGE }` 属性表示，对此实体 `Employee` 执行的任何合并或持久化操作，也必须应用于此关系字段引用的所有
    `FullTimeEmployee` 实例。例如，如果创建了一个新的 `Employee` 实例，并为其分配了一个 `FullTimeEmployee` 作为经理，那么通过
    `EntityManager.persist()` 持久化该 `Employee` 实例时，也会同时持久化任何被引用的 `FullTimeEmployee`
    实例（如果它们尚未被持久化的话）。


    `Person` 实体通过 `homeAddress` 字段与 `Address` 建立关系。


    ```

    @OneToOne(cascade=CascadeType.ALL)

    @JoinColumn(name = "HOME_ADDRESS")

    private Address homeAddress;

    ```


    由于 `Address` 上没有对应的字段来引用 `Person`，因此这是一个单向关系。`@OneToOne` 上的 `cascade` 属性指示哪些操作应传播到被引用的对象。因为我们指定了
    `CascadeType.ALL` 的级联规则，所以应用于 `Person` 的所有事件——`DETACH`、`MERGE`、`PERSIST`、`REFRESH`
    和 `REMOVE`——都会自动应用于其 `homeAddress` 对象。


    @DiscriminatorColumn 注解


    每当我们像使用 `InheritanceType.SINGLE_TABLE` 策略那样，将多个实体类映射到单个表时，必须有一种方法能够识别表中任何给定行的具体实体类型。为了确定实体类型，持久化管理器会在根实体的表中查找名为
    `DTYPE` 的列来获取此信息。如果你的模式需要不同的列名来捕获此信息，你可以使用 `@DiscriminatorColumn` 注解来标识 JPA 应使用哪一列；在清单
    4-1 中，Person.java 实体通过 `@DiscriminatorColumn(name = "TYPE")` 注解指定了一个名为 `TYPE`
    的鉴别器列。如果我们像其余示例那样使用名为 `DTYPE` 的列，则可以完全省略此注解并接受默认值。


    @DiscriminatorValue 注解


    存储在鉴别器列中的值称为鉴别器值。每个具体实体都显式声明或默认接受一个唯一的鉴别器值，该值用于标识与表中每一行关联的具体实体类型。鉴别器值默认为实体名称，在此示例中，我们为层次结构中的每个实体都接受了此默认值。当将遗留表和数据库适配到
    JPA，并且希望将预先存在的鉴别器值映射到名称不同的实体时，可以使用 `@DiscriminatorValue` 注解为层次结构中需要覆盖的每个实体指定要使用的鉴别器值。


    SINGLE_TABLE 策略的优缺点


    我们从设计时和性能的角度来考量每个继承层次结构，权衡其优缺点。我们从 SINGLE_TABLE 策略开始。


    设计时考量


    当类型层次结构相当简单且稳定时，SINGLE_TABLE 映射方法效果很好。向层次结构添加新类型以及向现有超类型添加字段，只需向表中添加新列即可。然而，在特别大型的部署中，这可能会对数据库内部的索引和列布局产生不利影响。如果你的层次结构可能会超出单个表的列限制（通常为
    256 列），或者由于某种原因需要将多个非常大的字段映射到内联 LOB（大型对象）列，则可能需要引入 `@SecondaryTable` 映射。在这种情况下，采用后续方法之一可能更为明智。此外，对于层次结构中并非所有类型共享的列，不能使用
    NOT NULL 约束。


    性能影响


    SINGLE_TABLE 策略对于跨层次结构中的所有类型或特定类型进行查询非常高效。内部持久化框架不需要表连接——只需要一个列出类型标识符的 `WHERE`
    子句即可。特别是，涉及采用此映射策略的类型的关系，其性能表现良好。


