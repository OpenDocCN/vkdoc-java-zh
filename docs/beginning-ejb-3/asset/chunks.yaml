    Bulk Update and Delete Operations


    JPQL may also be used to perform bulk update and delete operations across multiple
    instances of a specific entity class, including subclass instances. These JPQL
    statements may also take parameters and return the number of entity instances
    affected by the operation. An example of a bulk delete operation is shown in [Listing
    3-20](#9781430246923_Ch03.xhtml#list20).


    [***Listing 3-20.***](#9781430246923_Ch03.xhtml#_list20)  Example of a Bulk Delete
    Statement in JPQL


    ```

    @Stateless

    public class CustomerManagerBean {


    @PersistenceContext(unitName = "Chapter03PersistenceUnit")

      private EntityManager em;


    /**

       * Perform a bulk delete of fulfilled CustomerOrder items

       */

      public int bulkDeleteFulfilledOrders() {

        return em.createQuery("delete from CustomerOrder o where o.status = ''FULFILLED''").executeUpdate();

      }


    // . . .

    }

    ```


    Bulk delete and update statements are executed through the `EntityManager`’s query
    engine using the `EntityManager.createQuery()` call. They may also be specified
    either declaratively, through `@NamedQuery` elements, or dynamically, as shown
    above in [Listing 3-20](#9781430246923_Ch03.xhtml#list20).


    ![image](Images/sq.jpg) **Caution**   Care should be taken when performing bulk
    update and delete operations, since they bypass the `PersistenceContext` and can
    lead to cache inconsistency. They are essentially translated straight into SQL
    and executed without observing optimistic locking checks or following cascade
    rules specified on relationship fields. As a rule of thumb, bulk operations should
    be performed in their own transaction context, or else at the beginning of a transaction.
    If a `PersistenceContext` whose `type` is `PersistenceContextType.EXTENDED` is
    used, make sure you call `EntityManager.flush()` after performing a bulk operation.
    That way, no entities will exist in the cache following the bulk operation that
    might be out of date or removed.


