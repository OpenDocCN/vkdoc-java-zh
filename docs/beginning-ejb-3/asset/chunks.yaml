    Complex Mappings


    More complex mappings, including those involving multiple tables per entity, complex
    data types, embedded classes, and inheritance hierarchies will be covered in the
    next chapter. For now, let us examine how relationships between entities are mapped.


    Entity Relationships


    Entities may hold single-value and collection references to themselves or to other
    entities. Additionally, relationships may be exposed as relationship fields on
    either one or both entities involved in the relationship. For those of you familiar
    with EJB 2.x, be aware that in JPA, relationship fields are no longer bidirectionally
    maintained by the container. Updating the field at one end of a bidirectional
    relationship no longer causes the field at the other end to be updated automatically
    as well. When mapping a relationship field, its primary key always represents
    the target entity. The source, or owning end of the relationship, may be mapped
    to a foreign key on the source entity’s table, but there is no requirement that
    an actual database foreign key constraint be specified on the underlying columns.


    Let’s take a look at how JPA lets you define relationships.


    @OneToOne


    Following is the definition of the `@OneToOne` relationship annotation:


    ```

    @Target({ElementType.METHOD, ElementType.FIELD})

    @Retention(RetentionPolicy.RUNTIME)

    public @interface OneToOne {

        Class targetEntity() default void.class;

        CascadeType[] cascade() default {};

        FetchType fetch() default EAGER;

        boolean optional() default true;

        String mappedBy() default "";

    }

    ```


    The `@OneToOne` relationship is represented by a single-value entity reference
    at one or both ends of the relationship. One relationship field will map to columns
    on its table that reference the primary key columns on the table at the other
    end of the relationship.


    Here is an example in which `Customer` uses `Address`, but `Address` knows nothing
    about its usage by `Customer`, and so it does not have a relationship field in
    its class:


    ```

    @Entity

    public class Customer implements Serializable {

        . . .

        @OneToOne

        @JoinColumn(name="MAILING_ADDRESS_REF",

                    referencedColumnName="ADDRESS_PK")

        protected Address address;

        . . .

    }

    ```


    To make this a bidirectional relationship, simply add a relationship field to
    `Address` that points back to `Customer`:


    ```

    @Entity

    public class Address implements Serializable {

        . . .

        @OneToOne(mappedBy="address")

        protected Customer customer;

        . . .

    }

    ```


    Note that by using the `(mappedBy="address")` attribute, there is no need to specify
    the `@JoinColumn` information on the `Address.customer` field redundantly. Also,
    the entity type at the other end of the relationship is derived from the `customer`
    field type.


    If you were then to make the relationship unidirectional but in the opposite direction,
    you would just move the `@JoinColumn` annotation from `Customer.address` onto
    `Address.customer` and then remove the `Customer.address` field.


    @OneToMany and @ManyToOne


    Similarly, here are the definitions of the @OneToMany and @ManyToOne annotations:


    @OneToMany:


    ```

    @Target(value = {ElementType.METHOD, ElementType.FIELD})

    @Retention(value = RetentionPolicy.RUNTIME)

    public @interface OneToMany {


    public Class targetEntity() default void.class;

      public CascadeType[] cascade() default {};

      public FetchType fetch() default FetchType.LAZY;

      public String mappedBy() default "";

      public boolean orphanRemoval() default false;

    }

    ```


    @ManyToOne:


    ```

    @Target(value = {ElementType.METHOD, ElementType.FIELD})

    @Retention(value = RetentionPolicy.RUNTIME)

    public @interface ManyToOne {


    public Class targetEntity() default void.class;

      public CascadeType[] cascade() default {};

      public FetchType fetch() default FetchType.EAGER;

      public boolean optional() default true;

    }

    ```


    The `@OneToMany` relationship annotation is added to a `Collection` relationship
    field where the entity at the other end either does not have a relationship field,
    or where it has a single-value relationship field pointing back to this entity.
    If there is a field on the entity at the other end of the relationship, it will
    be annotated `@ManyToOne`, indicating that it is an entity that is part of a `Collection`
    and that it knows the entity type that owns the `Collection`. As with an `@OneToOne`
    relationship field, specifying a `mappedBy` attribute on an `@OneToMany` relationship
    is enough to identify the mapping used for both relationship fields.


    ```

    @Entity

    public class Orders implements Serializable {

        . . .

        @OneToMany(mappedBy="orders")

        protected Collection<OrderItems> orderItemsCollection;

        . . .

    }


    @Entity

    public class OrderItems implements Serializable {

        . . .

        @ManyToOne

        @JoinColumn(name="SELECTION_REF", referencedColumnName="SELECTION_PK")

        protected Orders orders;

        . . .

    }

    ```


    Note that by using generic collection types (`Collection<OrderItems>`), the persistence
    framework is able to determine the entity type at the other end of the relationship.
    With that, all that is needed to resolve the mapping for the `@OneToMany` side
    is the field or property name on that entity, which in this case is `orders`.


    @ManyToMany


    Following is the definition of the `@ManyToMany` relationship annotation:


    ```

    @Target(value = {ElementType.METHOD, ElementType.FIELD})

    @Retention(value = RetentionPolicy.RUNTIME)

    public @interface ManyToMany {

      public Class targetEntity() default void.class;

      public CascadeType[] cascade() default {};

      public FetchType fetch() default FetchType.LAZY;

      public String mappedBy() default "";

    }

    ```


    The `@ManyToMany` annotation is assigned to a `Collection` relationship field
    to indicate that the target entity also has a `Collection` of the source entity
    type. This type of mapping requires an `@JoinTable`, commonly known as an *intersection
    table*. The join table holds references back to the primary keys of the entities
    at either end of the relationship. In the example that follows, the intersection
    table `EJB_PROJ` has two columns: `EMP_ID` is a reference column back to the `ID`
    primary key column on the `EMPLOYEE` table, and `PROJ_ID` is a reference column
    pointing to the `ID` primary key column on the `PROJECT` table.


    ```

    @Entity

    public class Employee implements Serializable {

        . . .

        @ManyToMany(mappedBy="employees", cascade=CascadeType.PERSIST)

        @JoinTable(name="EMP_PROJ",

                   joinColumns={@JoinColumn(name="EMP_ID",

                                            referencedColumnName="ID")},

                   inverseJoinColumns={@JoinColumn(name="PROJ_ID",

                                                   referencedColumnName="ID")})

        protected Collection<Project> projects;

        . . .

    }'
