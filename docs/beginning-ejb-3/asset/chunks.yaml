- fmt: "# A Quick Look at the Modules\n\nA quick look at the modules included in this\
    \ example reveals that, in addition to the EJB/WebServices module from [Chapter\
    \ 6](../Text/9781430246923_Ch06.xhtml), we have another EJB module containing\
    \ Session bean facades and MDBs, a number of JPA entities that comprise a JPA\
    \ persistence unit, and a Web module containing a test servlet.\n\n## The `wineapp@yahoo.com`\
    \ Account and the `user.properties` File\n\nWe have set up a Yahoo! mail account,\
    \ `wineapp@yahoo.com`, that you may use for testing purposes. The password is:\
    \ `wine_app`. All samples in this book that involve a JavaMail Session default\
    \ to this account. You are free to use it, or you may prefer to send and receive\
    \ e-mail through your own mail server (for example, if you are behind a firewall)\
    \ using your own e-mail account(s).\n\nIn the `Chapter07-ServiceIntegration-jpa`\
    \ project, you will find a `user.properties` file in the root source directory.\
    \ This file allows you to specify the From: and To: e-mail addresses for the e-mail\
    \ generated by this sample. It is shown in [Listing 7-21](#9781430246923_Ch07.xhtml#list21):\n\
    \n**[Listing 7-21](#9781430246923_Ch07.xhtml#_list21).** The `user.properties`\
    \ file found in the source root of the `Chapter07-ServiceIntegration-jpa` project\n\
    \n```\n# Specify the From: and To: email accounts that will be shown\n# in the\
    \ mail header that is sent from the JavaMail Session\n# named 'mail/wineappMail'\
    \ and configured in Chapter 5. Note\n# that although the email header may appear\
    \ to be from the\n# From account below, it will originate from the account\n#\
    \ configured in the 'mail/wineappMail' JavaMail Session.\nfrom_email_address =wineapp@yahoo.com\n\
    to_email_address =wineapp@yahoo.com\n```\n\nTo change the To: and/or From: e-mail\
    \ addresses, feel free to edit this plaintext file. Also, refer to the `Readme.txt`\
    \ file for guidance with proxy servers and other issues resulting from non-default\
    \ installation environments.\n\n## Building, Deploying, and Executing the Sample\
    \ Application\n\nWith all of the configuration steps completed, you are now ready\
    \ to build, deploy, and run this chapter’s `WineApp` application through its simple\
    \ servlet client. To ensure that any previous artifacts are removed, begin by\
    \ selecting all five NetBeans projects and invoking the ‘Clean’ operation, shown\
    \ in [Figure 7-8](#9781430246923_Ch07.xhtml#Fig8):\n\n![9781430246923_Fig07-08.jpg](Images/9781430246923_Fig07-08.jpg)\n\
    \n[Figure 7-8.](#9781430246923_Ch07.xhtml#_Fig8) Cleaning the Chapter07-ServiceIntegration\
    \ project\n\n![image](Images/sq.jpg) **Note** If GlassFish is running already,\
    \ and you get errors while building because .jar files cannot be deleted, try\
    \ shutting down GlassFish and re-invoking the ‘Clean’ operation.\n\nThe next steps\
    \ are to build, package, and deploy the EJB, JPA, and Web modules and run the\
    \ servlet client. All of these steps are performed automatically when invoking\
    \ the ‘Run’ operation shown in [Figure 7-9](#9781430246923_Ch07.xhtml#Fig9). NetBeans\
    \ is able to track the state of the projects and perform any required work prior\
    \ to executing the `ShoppingCartClient` servlet.\n\n![9781430246923_Fig07-09.jpg](Images/9781430246923_Fig07-09.jpg)\n\
    \n[Figure 7-9.](#9781430246923_Ch07.xhtml#_Fig9) Running the Chapter07-ServiceIntegration\
    \ project, which executes the servlet `ShoppingCartClient` found in the Chapter07-ServiceIntegration-web\
    \ module\n\nClient applications and different application architectures will be\
    \ discussed in detail in [Chapter 12](../Text/9781430246923_Ch12.xhtml). In order\
    \ to test the deployed wine store application, we have provided a simple servlet\
    \ client. GlassFish injects the `ShoppingCart` and `SearchFacade` session beans\
    \ into the servlet to search the wines, add items to the shopping cart, and finally\
    \ submit the order.\n\n[Listing 7-22](#9781430246923_Ch07.xhtml#list22) shows\
    \ the code for the servlet client. To begin, the client looks up the `SearchFacadeBean`\
    \ session bean and calls the `findWineByYear()` method, which returns a list of\
    \ wines. In order to add wines to the shopping cart, the client program looks\
    \ up the `ShoppingCart` session bean and calls the `findCustomer()` method. Once\
    \ the customer has been found, the client goes into a `while` loop and adds the\
    \ list of wines retrieved from `SearchFacadeBean` using the `addWineItem()` method\
    \ in the `ShoppingCart` bean. To keep the client simple, the quantity of each\
    \ wine is set to 20. Once the client finishes adding all of the wines to the shopping\
    \ cart, the `sendOrderToOPC()` method in the `ShoppingCart` bean is called to\
    \ submit the order.\n\nThe `ShoppingCartClient` servlet uses EJB injection to\
    \ obtain the EJBs `SearchFacade` and `ShoppingCart` through their Local interfaces.\
    \ This servlet performs the following steps, logging its progress by sending HTML\
    \ back to the browser window:\n\n*   Initializes the sample data through a Java\
    \ service façade—`PopulateDemoData`—that uses the JPA entities to populate the\
