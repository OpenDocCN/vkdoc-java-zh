- fmt: "# 排版后的内容\n\n在自底向上的方法中，您从一个`SEI`和一个可以发布为Web服务的实现开始。在此过程中，Web服务工件（如WSDL文档）会在部署时或由Java\
    \ EE应用服务器提供的管理工具或实用程序生成。\n\n在自顶向下的方法中，您从一个WSDL文档开始，并使用实现`JAX-WS`的工具生成一个`SEI`。一旦有了`SEI`，您就可以在其后面添加实现。对于EJB无状态会话Bean，您需要使用`JAX-WS`和`JSR\
    \ 181`规范中提供的注解来标记业务接口和/或Bean类，以便在部署时生成正确的Web服务工件集。Java EE规范要求添加到组件中的注解在部署时被处理，以生成正确的工件集。带有Web服务注解的EJB无状态会话Bean也不例外；它们也会在部署时由应用服务器提供的部署实用程序处理。每个`SEI`将对应一个无状态会话Bean。\n\
