    Figure 6-18.   Checking the servlet output


    ## Session Beans as Web Service Clients


    A session bean can also be a client to a Web service. In the sample application
    that we will build in [Chapter 7](../Text/9781430246923_Ch07.xhtml), the `OrderProcessing`
    session bean, which coordinates the workflow, can invoke the credit service to
    check the validity of the credit card before starting to process the order. To
    act as a client to a Web service, the `OrderProcessing` session bean would make
    use of the `@WebServiceRef` annotation, similar to what we have shown in the previous
    client sample.


    [Listing 6-14](#9781430246923_Ch06.xhtml#list14) shows the stateless session bean
    `OrderProcessFacadeBean`, which implements both local and remote business interfaces.
    The `@WebServiceRef` annotation is used to inject a reference to the `CreditService`
    WSDL document. The `PerformCheckCredit()` method in the `OrderProcessFacadeBean`
    session bean uses the injected reference to get the port in the `CreditService`
    and invokes the `creditCheck` operation. As you can see, the process of injecting
    the Web service, getting the port, and calling the operations from a session bean
    is similar to what we have done with the client that acted as a Web service client.


    ***[Listing 6-14](#9781430246923_Ch06.xhtml#_list14).***  `OrderProcessFacadeBean.java`


    ```

    @Stateless(name="OrderProcessFacade")

    public class OrderProcessFacadeBean implements OrderProcessFacade,

                                                   OrderProcessFacadeLocal {

        @WebServiceRef(type=CreditService.class)

        CreditService service;

        public OrderProcessFacadeBean() {

        }


    private boolean PerformCreditCheck(Individual customer){

                    String ccnum  = customer.getCcNum().toString();

                    CreditCheckEndpointBean creditService =

                        service.getCreditCheckEndpointBeanPort();

                    return creditService.creditCheck(ccnum);

               }

    }

    ```


    ## Conclusion


    In this chapter, we introduced you to Web Services—the architecture that goes
    by the find-bind-execute model—and how standards like UDDI, WSDL, and SOAP have
    made Web Services ubiquitous as compared to earlier distributed computing models
    in terms of standardization and interoperability. We also briefly discussed the
    REST architectural pattern and RESTful Web services, which have simplified creation
    and use of Web services.


    We looked into the details of the UDDI, SOAP, and WSDL standards, and we demonstrated
    how WSDL documents and SOAP messages are constructed with a simple credit service
    example.'
