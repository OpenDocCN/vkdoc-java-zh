    \    }\n}\n```\n\n## Lifecycle Callback Methods\n\nThere will be certain instances\
    \ in which an application that uses MDBs requires fine-grained control. Two lifecycle\
    \ event callbacks are supported for MDBs:\n\n* `PostConstruct`\n* `PreDestroy`\n\
    \nThe `PostConstruct` callback occurs before the first message listener method\
    \ invocation on the bean and after the container has performed the dependency\
    \ injection. The `PreDestroy` callback occurs when the MDB is removed from the\
    \ pool or destroyed.\n\nFor example, a `PostConstruct` callback can be used to\
    \ initialize some attributes or resources, and a `PreDestroy` callback can be\
    \ used to clean up or release the acquired resources.\n\nCallback methods defined\
    \ on an MDB class should have the following signature:\n\n```\npublic void <METHOD>\
    \ ()\n```\n\nCallback methods can also be defined on a bean’s listener class,\
    \ in which case the methods should have the following signature:\n\n```\npublic\
    \ void <METHOD>(Object)\n```\n\nwhere `Object` may be declared as the actual bean\
    \ type, which is the argument passed to the callback method at run time.\n\nCallback\
    \ methods can be any methods in the MDB that have callback annotations. The following\
    \ rules apply to these methods:\n\n* The method should be public.\n* The method\
    \ cannot be final or static.\n* The return type should be `void`.\n\nThe methods\
    \ can take either zero or one argument, as shown previously. A callback listener\
    \ class is denoted by the `@CallbackListener` annotation on the MDB class with\
    \ which it is associated.\n\n## Interceptors\n\nThe EJB specification provides\
    \ annotations called *interceptors*, which allow you to intercept a business method\
    \ invocation. Interceptor methods can be defined for MDBs.\n\nYou can add either\
    \ an `@AroundInvoke` annotation or an `<around-invoke-method>` element in the\
    \ deployment descriptor for a particular method, or you can define an interceptor\
    \ class whose methods are invoked before the `onMessage()` method is invoked in\
    \ the MDB class. An interceptor class is denoted using the `@Interceptor` annotation\
    \ on the MDB class with which it is associated. In the case of multiple interceptor\
    \ classes, the `@Interceptors` annotation is used. Only one `AroundInvoke` method\
    \ may be present on the bean class or on any given interceptor class. An `AroundInvoke`\
