    \ Bean 类标记为无状态会话 Bean。如果同时使用注解和部署描述符（混合模式），则在 Bean 类中指定任何其他类级别或成员级别注解时，必须指定`@Stateless`注解。如果同时使用注解和部署描述符，则在部署过程中，部署描述符中的设置或值将覆盖类中的注解。\n\
    \n![image](Images/sq.jpg) **注意** 从 EJB 3.1 开始，会话 Bean 类可以是另一个会话 Bean 类的子类。\n\n\
    为了说明无状态会话 Bean 的使用，我们将创建一个`SearchFacade`会话 Bean，它为客户端应用程序提供关于可用葡萄酒的各种搜索功能。工作流程如下：\n\
