- fmt: '# 排版后的内容


    In the “How This Book Is Organized” section, we provided a summary of each chapter
    to illustrate the general flow of the book, and to help you decide which areas
    to focus on first, should you wish to read the chapters out of sequence.


    The chapter concluded with a “Getting Started” section to help you install and
    configure the NetBeans IDE and its integrated GlassFish application server, which
    has the reference implementation of the latest Java EE specifications, and to
    verify that the installation was successful. Having completed this task, you now
    have the required software infrastructure to run the code samples in this book
    and to examine the many features of EJB throughout the subsequent chapters.


    ## CHAPTER 2


    ![image](Images/frontdot.jpg)


    ## EJB Session Beans


    This chapter will discuss EJB session beans, the core business service objects
    used by EJB client applications. You’ll gain an understanding of the simplified
    EJB session bean model with insights into the following topics:


    * Types of session beans—stateful, stateless, and singleton—and when to use each
    one

    * The bean class, business interfaces, and business methods

    * Asynchronous methods

    * Callback methods

    * Interceptors

    * Exception handling

    * Client view

    * Dependency injection with annotations related to session beans

    * Timer service


    ### Introduction to Session Beans


    *Session beans* are Java components that run either in stand-alone EJB containers
    or in EJB containers that are part of standard Java Platform, Enterprise Edition
    (Java EE) application servers. These Java components are typically used to model
    a particular user task or use case, such as entering customer information or implementing
    a process that maintains a conversation state with a client application. Session
    beans can hold the business logic for many types of applications, such as human
    resources, order entry, and expense reporting applications. The EJB container
    provides services to the session bean, and the bean indicates which services it
    needs using Java annotations and/or XML metadata.


    ### Types of Session Beans


    Session beans are of three types:


    * *Stateless*: This type of bean does not maintain any conversational state on
    behalf of a client application.

    * *Stateful*: This type of bean maintains a state, and a particular instance of
    the bean is associated with a specific client request. Stateful beans can be seen
    as extensions to client programs, which are running on the server.

    * *Singleton*: This type of bean is instantiated only once per application. Singleton
    beans live for the full duration of the application and maintain their state between
    client invocations.


    We will drill down into more specifics of stateless, stateful, and singleton beans
    in the following sections.


    ### When Do You Use Session Beans?


    Session beans are used to write business logic, maintain a conversation state
    for the client, and model back-end processes or user tasks that perform one or
    more business operations. Typical examples include the following:


    * A session bean in a human resources application that creates a new employee
    and assigns the employee to a particular department

    * A session bean in an expense reporting application that creates a new expense
    report

    * A session bean in an order entry application that creates a new order for a
    particular customer

    * A session bean that manages the contents of a shopping cart in an e-commerce
    application

    * A session bean that leverages transaction services in an EJB container (removing
    the need for an application developer to write the transaction support)

    * A session bean used to address deployment requirements when the client applications
    are not collocated on the same server

    * A session bean that leverages the security support provided by the container
    on the component or method level

    * A session bean that implements logging functionality and is shared between different
    components of an application


    Session beans can be used in traditional 2-tier or 3-tier architectures with professional/rich
    client applications, or in 3-tier web-based applications. These applications can
    be deployed in different logical and physical tier combinations. In the next section,
    we will investigate some of the possible combinations.


    ### 3-Tier Architecture with Rich Client


    [Figure 2-1](#9781430246923_Ch02.xhtml#Fig1) shows a typical architecture for
    a session bean in 3 tiers with a rich client front-end application that has some
    data entry screens used by end users, such as customer service representatives,
    bank tellers, and so on. These client applications can be developed using Java
    Swing technology with the Java Platform, Standard Edition (Java SE), or they can
    be plain old Java objects (POJOs), which are run from the command line. Generally,
    the end user launches the client application from his or her desktop, enters some
    data, and triggers an event by pressing some user interface component, such as
    a Submit button. The general workflow may look something like this:


    1. User action establishes a connection to the session bean running in the EJB
    container using remote method invocation (RMI).

    2. The client application invokes one or more business methods in the session
    bean.

    3. The session bean processes the request and validates data by interacting with
    databases, enterprise applications, legacy systems, and so on to perform a certain
    business operation or task.

    4. Finally, the session bean sends a response back to the client application,
    either through data collections or simple objects that contain acknowledgment
    messages.


    ![9781430246923_Fig02-01.jpg](Images/9781430246923_Fig02-01.jpg)


    [Figure 2-1.](#9781430246923_Ch02.xhtml#_Fig1) Session beans in a 3-tier architecture
    with a Rich Client


    ### 3-Tier Architecture for a Web Application


    This architecture, as shown in [Figure 2-2](#9781430246923_Ch02.xhtml#Fig2), is
    typically front-ended by a web application running in the browser of a desktop
    or laptop computer. These days, other types of client devices, such as smart phones,
    tablets, cell phones, and telnet devices, are also being used to run these applications.
    The web application running in a browser or mobile device renders the user interface
    (data entry screens, submit buttons, and so on) using web technologies such as
    JavaServer Pages (JSP), JavaServer Faces (JSF), or Java Servlets. Typical user
    actions, such as entering search criteria or adding certain items to the web application
    shopping cart, will invoke/call session beans running in an EJB container via
    one of the aforementioned web technologies. Once the session bean gets invoked,
    it processes the request and sends a response back to the web application, which
    formats the response as required and then sends the response on to the requesting
    client device (browser, smart phone, telnet, and so forth).


    ![9781430246923_Fig02-02.jpg](Images/9781430246923_Fig02-02.jpg)


    [Figure 2-2.](#9781430246923_Ch02.xhtml#_Fig2) Session beans in a 3-tier architecture
    with a web application


    In the 3-tier architecture just discussed, the client application (which is the
    web application) and the session beans can be run within the same instance of
    an application server (collocated) or from different instances running on the
    same machine. They can also be run on physically-separate machines that have an
    instance of an application server.


    ### Stateless Session Beans


    Stateless session beans are comprised of the following elements:


    * A bean class, which contains the business method implementation to be executed

    * Optionally, one or more business interfaces, allowing different combinations
    of the bean’s business methods to be presented to client applications


    #### The Bean Class'
