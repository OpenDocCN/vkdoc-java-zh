    **Jon Wetherbee** 是 Oracle JDeveloper IDE 中 EJB 开发工具的首席工程师和技术负责人。他在 Oracle 拥有超过
    20 年的开发经验，从事过多种 O/R 映射工具的开发，并自 EJB 1.1 起负责 Oracle 核心 EJB 工具集的管理。最近，Jon 负责为 Oracle
    的应用开发框架 ADF 设计和开发 EJB 及 JPA 数据绑定解决方案。


    在加入 JDeveloper 项目之前，Jon 是 Oracle CASE（计算机辅助软件工程）工具的产品经理，并致力于早期对象关系框架的研究。他于 1999
    年因在面向对象环境中集成关系数据库的工作获得一项专利。Jon 是本书第一版《Beginning EJB 3 Application Development:
    From Novice to Professional》（Apress，2006 年）的合著者，并在《Java Developer''s Journal》和
    Oracle 技术网络上发表过文章。他乐于演讲，曾在多个会议和开发者团体中发表演讲，包括 Oracle 的 iDevelop（班加罗尔、台北）、The Server
    Side Java Symposium（巴塞罗那）以及各种 Java 用户组。Jon 拥有布朗大学认知科学理学学士学位。


    ![image](img/9781430246923_unFig-02.jpg)


    **Chirag Rathod** 是一位首席工程师，负责在 Oracle 的 JDeveloper IDE 中为 EJB 和 CDI 开发和提供设计时功能。他拥有超过
    14 年的开发工具开发经验。在加入 JDeveloper IDE 团队之前，他参与了 Oracle 旗舰产品（如 Oracle SQL*Plus、Oracle
    Forms 和 Oracle Designer）的开发。Chirag 在 Maharaja Sayajirao 大学技术与工程学院获得计算机科学工程学士学位。


    ![image](img/9781430246923_unFig-03.jpg)


    **Raghu Kodali** 是 Solix Technologies 的产品管理与战略副总裁，负责产品愿景、管理、战略、用户设计和交互。他的工作包括下一代数据优化平台、行业领先的数据发现平台、企业数据管理即服务，以及使用大数据平台和云进行应用开发。Raghu
    是《Big Data Analytics using Splunk》（Apress，2013 年）的合著者。在加入 Solix 之前，他在 Oracle 工作了
    12 年，担任高级管理职位，负责 Oracle Fusion Middleware 产品的产品管理和战略。此外，Raghu 还是 Oracle 的 SOA
    倡导者，领导下一代 Java EE 计划。Raghu 撰写了一本关于 Java 计算的主要技术参考书《Beginning EJB 3 Application
    Development: From Novice to Professional》（Apress，2006 年），发表了大量关于企业技术的文章，并且是《Oracle
    Information Integration, Migration and Consolidation》（PACKT Publishing，2011 年）的合著者之一。


