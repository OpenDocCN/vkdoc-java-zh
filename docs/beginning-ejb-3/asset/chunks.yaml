- fmt: "# 排版后的内容\n\nThis façade obtains its `EntityManager` from an `EntityManagerFactory`,\
    \ and so the life cycle of this `EntityManager` is now the responsibility of the\
    \ façade instead of the container. An application-managed `EntityManager` is bound\
    \ to a persistence context cache that can exist outside of a transactional context,\
    \ and live through multiple transactions, which is essentially the same as an\
    \ `EXTENDED` persistence context for a stateful session bean. This allows calls\
    \ such as `EntityManager.persist()` to be made before a transaction has been started.\
    \ Such an out-of-transaction call would add a new entity to the persistence context\
    \ but would not immediately result in a SQL call to update the database.\n\n![image](Images/sq.jpg)\
    \ **Note** Even before an `EntityManager` transaction is begun, the persistence\
    \ context quietly begins its own private transaction, as needed, to service any\
    \ ID generator requests when `EntityManager.persist()` is called. Because we have\
    \ bound the PK fields of our entities to a `@GeneratedValue` ID generator, these\
    \ IDs are actually eagerly obtained and assigned to the entities during the `persist()`.\n\
    \nThe persistence context cache is not flushed to the database until the transaction\
    \ is actually begun, through an `EntityTransaction.begin()` call, which could\
    \ be immediately before an `EntityTransaction.commit()` call is performed. That\
    \ is, you have the choice to begin the transaction before any changes are applied\
    \ to the persistence context, or defer the beginning of the transaction until\
    \ you are ready to commit. In our sample, we defer the `begin()` call to inside\
    \ the `commitTransaction()` method:\n\n```\nprivate void commitTransaction() {\n\
    \  final EntityTransaction entityTransaction = em.getTransaction();\n  if (!entityTransaction.isActive())\
    \ {\n    entityTransaction.begin();\n  }\n  entityTransaction.commit();\n}\n```\n\
    \nContrast this behavior with a stateless session bean using the default CMT behavior\
    \ of `TransactionAttributeType.REQUIRED`, which implicitly begins a transaction\
    \ when a session bean method call is made, and commits the work to the database\
    \ upon returning from that method call. The transaction begins and ends within\
    \ the boundaries of that method call, and such CMT beans would never expose `commitTransaction()`\
    \ or `rollbackTransaction()` methods to their clients, as we will see in the BMT\
    \ example next. The implicit commit behavior avoids leaving uncommitted data hanging\
    \ around in a cache, vulnerable to loss due to hardware or network failure. However,\
    \ it also incurs additional back-end processing to complete the work and commit\
    \ it each time an atomic operation is performed (not to mention, a persistence\
    \ context cache is created and destroyed with each call), which can affect performance.\n\
    \nA `RESOURCE_LOCAL` `EntityManager` provides its clients with an `EntityTransaction`\
    \ object for managing transactions. The `commitTransaction()` method in [Listing\
    \ 8-4](#9781430246923_Ch08.xhtml#list4) demonstrates its use, and the implicit\
    \ behavior of this façade is achieved by the policy of calling `commitTransaction()`\
    \ at the end of every method that updates the persistence context (through a `persist`,\
    \ `merge`, or `remove` operation).\n\n## Filtering Test Data Using a CMT Session\
    \ Bean\n\nAfter using the Java façade (through a utility class) to populate the\
    \ demo data, the servlet client then calls a stateless CMT session bean, `OrderProcessorCMTBean`,\
    \ to filter this data and remove `Customer` and `Wine` entities that might have\
    \ been created from previous invocations. We could have both data population and\
    \ data filtering with a single façade tied to a single persistence unit, but we\
    \ are deliberately mixing and matching options here to show how they can interact.\
    \ What allows this to work is that both persistence units, one `RESOURCE_LOCAL`\
    \ and one `JTA`, both point to the same database connection.\n\n```\n//  Filter\
    \ the data by removing any existing Customers with email 'xaction.head@yahoo.com'\n\
    //  and any existing Wine with country 'United States'.\nout.print(\"<h2>Filtering\
    \ Demo Data... \");\nSystem.out.println(orderProcessorCMT.initialize());\nout.println(\"\
    done</h2>\");\n```\n\nThe stateless session bean `OrderProcessorCMTBean` does\
    \ not explicitly declare its transactional behavior, and so it assumes the default\
    \ `TransactionManagement` value—CMT—which is the equivalent of annotating the\
    \ bean:\n\n```\n@TransactionManagement(TransactionManagementType.CONTAINER)\n\
    ```\n\nBecause the `initialize()` method is not annotated with a `TransactionAttribute`\
    \ override, and `OrderProcessorCMTBean` does not override the default `TransactionAttribute`\
    \ value for all its methods at the bean level, it assumes the default transaction\
    \ attribute value, the equivalent of the following:\n\n```\n@TransactionAttribute(TransactionAttributeType.REQUIRED)\n\
    ```\n\nSince the client has neither begun nor inherited a transaction, one is\
    \ created and begun by the EJB container for the duration of the `initialize()`\
    \ method, and all changes are committed upon successful completion of this method.\
    \ CMT beans will always exhibit implicit commit behavior, because the container\
    \ will not allow a transaction that it begins to continue after the method has\
    \ completed. The implicit commit causes any changes made during the course of\
    \ that method to be made persistent, and applied to the database so that the changes\
    \ are visible to all clients henceforth.\n\n## Creating New Customer and CartItem\
    \ Entity Instances in the Client\n\nThe next step for the client is to create\
    \ a new `Customer` entity instance (actually, the concrete `Individual` entity\
    \ subclass of the abstract `Customer` entity), create some `Wine` instances, and\
    \ add some bottles of wine represented by `CartItem` instances, to the customer’s\
    \ cart:\n\n```\n//  Create a Customer and add some CartItems and their associated\
    \ Wines\nIndividual customer = new Individual();\ncustomer.setFirstName(\"Transaction\"\
    );\ncustomer.setLastName(\"Head\");\ncustomer.setEmail(PopulateDemoData.TO_EMAIL_ADDRESS);\n\
    for (int i = 0; i < 5; i++) {\n  final Wine wine = new Wine();\n  wine.setCountry(\"\
    United States\");\n  wine.setDescription(\"Delicious wine\");\n  wine.setName(\"\
    Xacti\");\n  wine.setRegion(\"Dry Creek Valley\");\n  wine.setRetailPrice(new\
    \ Float(20.00D + i));\n  wine.setVarietal(\"Zinfandel\");\n  wine.setYear(2000\
    \ + i);\n  orderProcessorCMT.persistEntity(wine);\n\n  final CartItem cartItem\
    \ = new CartItem();\n  cartItem.setCreatedDate(new Timestamp(System.currentTimeMillis()));\n\
    \  cartItem.setCustomer(customer);\n  cartItem.setQuantity(12);\n  cartItem.setWine(wine);\n\
    \n  customer.addCartItem(cartItem);\n}\n```\n\nNote that during this stage, only\
    \ the `wine` instances are persisted explicitly. All other entities that are created\
    \ are associated, directly or indirectly, with the `customer` instance, and they\
    \ exist only in the servlet’s method context. No transaction is involved in this\
    \ process of creating these entity objects, assigning their ordinary properties,\
    \ and associating them with each other. The `wine` instances are deliberately\
    \ not associated with the other object through cascade rules, so they must be\
