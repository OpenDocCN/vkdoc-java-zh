    CHAPTER 10


    ![image](Images/frontdot.jpg)


    Contexts and Dependency Injection


    In this chapter, we will discuss *Contexts and Dependency Injection* (CDI). CDI
    provides powerful services to *glue* the various tiers of the Java EE framework
    together. The first public draft of *Java Contexts and Dependency Injection for
    the Java EE Platform*, as defined in JSR 299, was made public in 2008\. During
    the initial development phase, the JSR 299 specification was called *Web Beans*.
    After the specification was renamed to Contexts and Dependency Injection, the
    initial reference implementation was given the name *Web Beans*. The use of the
    same name, Web Beans, in two different contexts created some confusion among the
    community members, and this led to the renaming of the reference implementation
    from Web Beans to *Weld*. CDI builds upon the Interceptor Specification (JSR 318),
    the Managed Bean Specification (JSR 316), and the Dependency Injection for Java
    Specification (JSR 330).


    You might be wondering why we have included a chapter on CDI in this book. There
    are two reasons for this: First, the dependency injection behavior first introduced
    in EJB is enhanced in CDI; and second, CDI supplements EJB by providing the *contextual*
    functionality to an application. EJB complements CDI by providing enterprise services
    like security, transaction management, and scalability to an application. If an
    application developer *wisely* decides when to use CDI, EJB, or both, then the
    resulting application will be both nimble and scalable.


    After you have finished this chapter, you will gain an insight into the following
    areas:


    *   CDI basics

    *   Relationship of CDI with EJB

    *   Deploying and executing CDI clients


    What Is CDI?


    Before the arrival of CDI on the Java EE scene, there was no easy way for the
    three tiers of Java EE technology—namely, the Web tier, the business tier, and
    the persistence tier—to interact with each other in a loosely coupled but typesafe
    manner. The Web tier did not have a proper mechanism to support transactions because
    it focused on presenting the content and had limited access to transactional resources.
    CDI services help in unifying Enterprise JavaBeans (EJB) and JavaServer Faces
    (JSF) programming models. CDI services allow Enterprise JavaBeans to be used as
    the Managed Beans in JavaServer Faces framework. CDI also provides a good support
    for accessing transactional resources, which facilitates in easy creation of Web
    applications using Java Persistence API. CDI bridges this gap. Using CDI, the
    Web tier can directly interact with the beans in the business and persistence
    tiers. This is the reason why CDI was initially named Web Beans*.*


    [Figure 10-1](#9781430246923_Ch10.xhtml#Fig1) shows the architecture of a Java
    EE application before the arrival of CDI on the Java EE scene, and [Figure 10-2](#9781430246923_Ch10.xhtml#Fig2)
    shows how the Web tier and the business tier interact after the arrival of CDI.


    ![9781430246923_Fig10-01.jpg](Images/9781430246923_Fig10-01.jpg)


    [Figure 10-1.](#9781430246923_Ch10.xhtml#_Fig1)  Java EE Application Architecture
    before CDI


    ![9781430246923_Fig10-02.jpg](Images/9781430246923_Fig10-02.jpg)


    [Figure 10-2.](#9781430246923_Ch10.xhtml#_Fig2)  CDI Application Architecture


    The two important features provided by CDI are a part of its name:


    *   **Contexts**: Deals with binding the stateful components (like stateful session
    beans) to a well-defined scope. Stateful components are those that retain information
    across their invocations. A CDI container associates stateful components with
    a definite scope—creating them when required and destroying them when they are
    out of scope. As a result, the client is not burdened with managing the lifecycle
    of the stateful components.

    *   **Dependency Injection**: Deals with injecting the components into an application
    in a loosely coupled but typesafe way. The injected components are instantiated
    by the container, which means users don’t need to create an instance of the component
    using *new*. Users can use the interface instead of the actual implementation
    of the interface for injection. This allows users to defer selection of a specific
    implementation, of a bean type that needs to be injected, to deploy or run time.


    [Listings 10-1](#9781430246923_Ch10.xhtml#list1), [10-2](#9781430246923_Ch10.xhtml#list2),
    and [10-3](#9781430246923_Ch10.xhtml#list3) demonstrate the concepts of “Contexts”
    and “Dependency Injection” in their simplest form. In the following sections of
    this chapter, we will build upon this example to demonstrate the various features
    of CDI. [Listing 10-1](#9781430246923_Ch10.xhtml#list1) defines a `Wine` interface
    that is implemented by the `RedWine` class, as shown in [Listing 10-2](#9781430246923_Ch10.xhtml#list2).


    ***[Listing 10-1](#9781430246923_Ch10.xhtml#_list1).***  Wine.java


    ```

    package com.apress.ejb.chapter10;


    public interface Wine {

       public String getColor();

    }

    ```


    The `RedWine` class demonstrates the “Context” aspect of CDI. It has the `ApplicationScoped`
    annotation, which means that an instance of `RedWine` will be created only once
    when the application is instantiated, and that instance will be destroyed when
    the application is shut down. During the lifetime of the application, this instance
    will be shared across the application. We will learn more about scopes later in
    this chapter.


    ***[Listing 10-2](#9781430246923_Ch10.xhtml#_list2).***  RedWine.java demonstrates
    the Context aspect


    ```

    package com.apress.ejb.chapter10;


    import javax.enterprise.context.ApplicationScoped;


    @ApplicationScoped

    public class RedWine implements Wine {

       public String getColor() {

           return "Red";

       }

    }

    ```'
