    MDB。该 POJO 实现了强制性的 `onMessage()` 方法，借助一个实用方法 `processOrder()` 来处理传入的消息。我们将从这里开始逐步介绍
    MDB 中的方法。


    清单 7-14 展示了 `onMessage()` 方法的代码。该方法检查接收到的消息是否为 `ObjectMessage` 实例类型，然后将检索到的对象类型转换为
    `PurchaseOrder` 实用类。之后，调用 `processOrder()` 实用方法来处理接收到的采购订单。


