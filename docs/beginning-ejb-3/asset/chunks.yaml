    \ Element in `CreditService.wsdl`\n\n```\n  <binding name=\"CreditCheckEndpointBeanPortBinding\"\
    \ type=\"tns:CreditCheckEndpointBean\">\n    <soap:binding transport=\"http://schemas.xmlsoap.org/soap/http\"\
    \ style=\"document\"/>\n    <operation name=\"CreditCheck\">\n      <soap:operation\
    \ soapAction=\"\"/>\n      <input>\n        <soap:body use=\"literal\"/>\n   \
    \   </input>\n      <output>\n        <soap:body use=\"literal\"/>\n      </output>\n\
    \    </operation>\n  </binding>\n```\n\nThe service implementation definition\
    \ part of the WSDL document identifies a Web service. It contains the following\
    \ elements:\n\n```\n<service>\n<port>\n```\n\n### The `<service>` Element\n\n\
    The `<service>` element contains a collection of `<port>` elements where each\
    \ port is associated with an endpoint (a network address location or URL). [Listing\
    \ 6-6](#9781430246923_Ch06.xhtml#list6) shows an example of a `<service>` element\
    \ for the credit service.\n\n***[Listing 6-6](#9781430246923_Ch06.xhtml#_list6).***\
