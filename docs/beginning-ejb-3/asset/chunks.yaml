    Transaction Analysis


    The following sections will analyze this test run from a transaction perspective.


    Populating Test Data through a Transactional Java Facade


    The servlet client begins by wiping the slate clean. The client of a CMT bean
    does not create transactions, or otherwise concern itself with transactional details.
    It delegates all work to the CMT session bean and (indirectly to) a Java façade,
    and relies on them to perform their work in a transactional context. The client
    first calls the `PopulateDemoData` class from the [Chapter 7](../Text/9781430246923_Ch07.xhtml)
    sample application, which is a helper class that delegates to a Java façade that
    uses an application-managed `EntityManager`, to reset the demo data to prepare
    for a new test run. We offer this example first, to see a raw use of transactions
    in an application-managed `EntityManager` context. We will examine EJB session
    bean behavior in a moment.


    ```

    //  Create and persist a bunch of JPA entities, populating the database with data

    out.print("<h2>Populating Demo Data... ");

    PopulateDemoData.resetData("Chapter07-WineAppUnit-ResourceLocal", System.out);

    out.println("done</h2>");

