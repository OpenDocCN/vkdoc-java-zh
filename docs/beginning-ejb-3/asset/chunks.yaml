    # About the Authors


    **Jon Wetherbee** is a consulting engineer and tech lead for EJB development tools
    on Oracle’s JDeveloper IDE. He has over 20 years of experience in development
    at Oracle, working on a variety of O/R mapping tools and overseeing Oracle’s core
    EJB toolset since EJB 1.1. Most recently, Jon has been responsible for the design
    and development of EJB and JPA data binding solutions for ADF, Oracle’s application
    development framework.


    Prior to joining the JDeveloper project, Jon was a product manager for Oracle’s
    CASE (computer-aided software engineering) tools and worked on early objectrelational
    frameworks. He received a patent in 1999 for his work on integrating relational
    databases in an object-oriented environment. Jon is coauthor of the first edition
    of this book, *Beginning EJB 3 Application Development: From Novice to Professional*
    (Apress, 2006), and has published articles online in Java Developer’s Journal
    and Oracle Technical Network. He enjoys speaking, and has given talks at conferences
    and developer groups, including Oracle’s iDevelop (Bangalore, Taipei), The Server
    Side Java Symposium (Barcelona), and various Java user groups. Jon holds a Bachelor
    of Science degree in cognitive science from Brown University.


    **Chirag Rathod** is a principal engineer responsible for developing and supporting
    design time features for EJB and CDI in Oracle’s JDeveloper IDE. He has over 14
    years of experience in developing development tools. Prior to joining the JDeveloper
    IDE team, he helped develop Oracle’s flagship products like Oracle SQL*Plus, Oracle
    Forms, and Oracle Designer. Chirag received a Bachelor of Engineering degree in
    computer science from The Faculty of Technology and Engineering, Maharaja Sayajirao
    University.


    **Raghu Kodali** is vice president of Product Management & Strategy at Solix Technologies,
    where he is responsible for product vision, management, strategy, user design,
    and interaction. His work includes the next-generation data optimization platform,
    industry-leading data discovery platform, enterprise data management-as-a-service,
    application development using Big Data platforms and cloud. Raghu is coauthor
    of *Big Data Analytics using Splunk* (Apress, 2013). Prior to Solix he was with
    Oracle for 12 years, holding senior management positions responsible for Product
    Management and Strategy for Oracle Fusion Middleware products. In addition, Raghu
    was Oracle’s SOA Evangelist leading next-generation Java EE initiatives. Raghu
    has authored a leading technical reference on Java computing, *Beginning EJB 3
    Application Development: From Novice to Professional* (Apress, 2006), published
    numerous articles on enterprise technologies, and was a contributing author for
    *Oracle Information Integration, Migration and Consolidation* (PACKT Publishing,
    2011).'
