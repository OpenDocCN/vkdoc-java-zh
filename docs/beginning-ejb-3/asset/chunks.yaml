    *   **恢复视图**：如果传入的请求是初始请求，JSF 实现会创建视图。在视图创建过程中，每个 UI 组件的 UI 对象都会被创建并存储在组件树中。随后，UI
    视图的状态会被保存，以供后续请求使用。如果传入的请求是回传请求，JSF 实现会恢复已保存的 UI 以处理当前请求。

    *   **应用请求值**：在此阶段，作为请求一部分发送的数据会被用来更新属于该视图的 UI 对象。

    *   **处理验证**：在此阶段，已提交的数据会被验证。

    *   **更新模型**：在此阶段，后端对象会使用来自请求的已验证数据进行更新。接收到的数据转换也在此阶段发生。

    *   **调用应用**：在此阶段，后端应用会被调用来完成请求的处理，并将响应渲染回客户端。

    *   **渲染响应**：在此生命周期阶段，UI 组件会被渲染，并将响应发送回客户端。


    ![9781430246923_Fig12-10.jpg](img/9781430246923_Fig12-10.jpg)


    图 12-10.  JSF 生命周期


    JSF 应用


    一个典型的 JSF 应用包含以下部分：


    *   **JSP 页面或 Facelets**：应用中的 JSP 页面或 Facelets 包含封装在 JSP 标签中的 JSF UI 组件。每个 JSF
    组件都是一个与标记无关的构建块。它包含三个主要部分：一个 UIComponent、一个渲染器和一个标签处理器。UIComponent 定义了组件的行为（例如，单选按钮组或菜单等
    UI 组件的行为）。它在运行时还与特定的渲染器相关联。渲染器负责决定向客户端渲染何种标记。*标签处理器*是一个 JSP 标签，允许在 JSP 中使用 JSF
    UI 组件。

    *   **导航模型**：关于控制如何在应用中流转的信息定义在一个名为 `faces-config.xml` 的 XML 部署描述符中。该文件可以包含其他多种类型的信息，例如验证器、转换器和受管
    Bean 列表。每个 JSF 应用可以包含多个 `faces-config.xml` 文件。

    *   **受管 Bean**：这些是促进应用逻辑的普通 Java 类。它们可以用作来自后端组件数据的绑定，或者用于调用后端应用中的业务方法。


    JSF 工具和组件


    仅仅拥有标准并不总是有帮助。来自开发者社区和供应商的支持对于一项技术的成功起着重要作用。虽然 JSF 的目标是极大地简化 Web 应用开发，但仅靠标准化无法实现这一目标。我们需要为开发者提供全套可用的
    UI 组件来构建应用，以及全套的开发工具来辅助应用构建过程。在过去几年中，JDeveloper、Java Studio Creator 和 Eclipse
    等开发工具已经为构建 JSF 应用提供了支持。Apache MyFaces 作为 JSF 框架的一个开源实现，提供了比 JSF 参考实现功能更丰富的组件。Oracle
    也发布了超过 100 个标准 Faces 组件，统称为 ADF Faces。这些 ADF Faces 组件已捐赠给 Apache 软件基金会，现在已成为 MyFaces
    项目的一部分，也称为 *Trinidad*。所有这些因素都为 JSF 技术的成功及其被开发者采用做出了重大贡献。


    ![image](img/sq.jpg) **注意**   关于 MyFaces 项目的信息可以在以下网址找到：`http://myfaces.apache.org`。


