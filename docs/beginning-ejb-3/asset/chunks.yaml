    - 解决外部引用中的命名冲突和冗余。

    - 打包一个由一个或多个 Java EE 模块和库组件组成的 Java EE 应用程序。

    - 声明模块和库之间的类路径依赖关系。

    - 将外部引用绑定到应用服务器环境中的物理资源。


    ## 关于部署工具的说明


    本章提供了一些关于如何构建应用归档文件的示例。它假设你可以访问通常通过集成开发环境（IDE）提供的软件工具，以协助你组装和部署 Java EE 应用程序。Java
    社区过程（JCP）中已有努力尝试在此领域进行标准化（参见 JSR 88，即 Java EE 应用部署 API），但部署不可避免地需要特定于应用服务器的配置任务。幸运的是，应用服务器通常提供
    Ant 任务来调用它们自己的部署工具，你也可以使用 Ant 来创建可部署的归档文件。Ant 的使用在许多开发环境中很普遍，并且在需要自动化脚本将相同的 Java
    EE 应用程序部署到多个 Java EE 服务器实例的生产环境中几乎无处不在。本章描述的许多自定义步骤需要使用交互式编辑器，主要用于更新 Java EE 通用和特定于平台的
    XML 部署描述符。对于这些任务，IDE 可以证明是无价的，并且许多 IDE 提供特定于平台的部署支持，指导你打包、配置和部署 Java EE 应用程序。


    ## 打包和部署过程概述


    *打包*是将各种 Java EE 模块组装（或分组）到 Java EE JAR、WAR 或 EAR 文件中的过程。一旦打包到 Java 归档（JAR）文件、Web
    归档（WAR）文件或企业归档（EAR）文件中，Java EE 应用程序就可以交付给应用服务器。*部署*是在应用服务器中安装 Java EE 组件的过程，以便在运行应用程序时可以找到并执行它们。此过程涉及多个必须大致按顺序执行的任务。这些任务在以下各节中进行了总结，并且在本章后面部分将对每个任务进行更详细的描述，并具体应用于
    EJB 和 JPA 部署。某些步骤仅在特殊情况下才需要执行，因此实际部署可能只涉及这些任务的一个子集。


    ### 提供者


    一般来说，提供者（对于一个给定的项目可能有多个）作为部署的前置步骤，生成 Java EE 应用程序组件。与提供者相关的任务以及由此角色交付的文件如[图 11-1](#9781430246923_Ch11.xhtml#Fig1)
    所示。


    ![9781430246923_Fig11-01.jpg](Images/9781430246923_Fig11-01.jpg)


    [图 11-1.](#9781430246923_Ch11.xhtml#_Fig1)  应用组件提供者的任务和交付物


    提供者的交付物是应用组件和可能的模块描述符，以磁盘上的文件形式提供，或打包到 Java 归档（JAR）文件中。


    ### 组装者


    组装者接收提供者的输出，并执行任务，生成如[图 11-2](#9781430246923_Ch11.xhtml#Fig2) 所示的交付物。


    ![9781430246923_Fig11-02.jpg](Images/9781430246923_Fig11-02.jpg)


    [图 11-2.](#9781430246923_Ch11.xhtml#_Fig2)  应用组装者的部署任务和交付物


    ### 按容器类型分组组件以生成 Java EE 模块


    提供者的输出是一组 Java EE 组件，例如 EJB、JPA 实体、JSF（JavaServer Faces）页面、应用客户端类，以及可能的其他组件。提供者也可能生成非
    Java EE 组件，例如普通的 Java 类。组装者将 Java EE 组件分组在一起，使得每个组只包含一种 Java EE 组件类型的组件。每当提供者定义了模块级部署描述符（XML）文件时，组装者可以遵循该文件中的任何指令来组成这些组，或者组装者可以选择合并或拆分描述符，以增加或减少每个组中的
    Java EE 组件数量。在此过程结束时，每个生成的组将成为一个 Java EE 模块。剩余的非 Java EE 类和资源可以捆绑到 Java EE 模块中，或隔离到它们自己的组中，成为可共享的库组件。


    ### 定义模块级部署描述符（可选）


    对于形成的每个 Java EE 模块，组装者可以定位并分配一个部署描述符来表示该模块。从 Java EE 5 开始，此步骤是可选的，因为现在可以通过分析文件内容来识别模块类型。例如，你（作为提供者或组装者）可以自由定义一个`ejb-jar.xml`部署描述符；但除非你要覆盖
    Java 注解中捕获的信息，或者你选择不使用注解，否则不再需要它。在 Java EE 5 中，一个 EJB 模块仅通过文件组中存在一个带有`@Stateless`、`@Stateful`或`@MessageDriven`注解的类来定义。


    ### 将组件（带有可选描述符）打包到 JAR 文件中


    在此阶段，第一阶段识别出的组件组与其模块级部署描述符（如果已定义）一起，使用 JAR 格式打包到文件中。EJB 模块归档到扩展名为`.jar`的 EJB JAR
    文件中，Web 应用模块归档到扩展名为`.war`的 Web 归档（WAR）文件中，应用客户端归档到扩展名为`.jar`的 JAR 文件中，依此类推。JPA
    持久化单元可以归档到它们自己的 JAR 文件（扩展名为`.jar`）中，或直接归档到 EJB JAR 或 WAR 文件中。我们将在本章后面的“组装持久化单元”一节中详细介绍这一点。


    此外，非 Java EE 组件（例如普通的 Java 类）可以添加到这些 Java EE 模块归档文件中；或者组装者可以将它们归档到自己的 JAR 文件中，作为库组件进行部署。


    ### 创建企业归档（EAR）文件（可选）


    如果你（作为组装者）创建了多个希望作为逻辑组一起部署的归档文件，则需要将这些归档文件捆绑在一个称为 *EAR 文件* 的包装 JAR 文件中，该文件使用后缀`.ear`。此
    EAR 文件被称为 Java EE 应用程序。如果你只创建了一个单独的 EJB JAR 或 WAR 归档文件，则无需进一步打包。你可以跳过创建包装 EAR
    文件的步骤，并将 EJB JAR 或 WAR 文件作为独立模块进行部署。


    一个应用程序充当一个打包边界，确保所有模块中的 Java EE 组件能够在单个命名上下文中相互通信。一个 Java EE 应用程序不一定对应于一个实际的最终用户应用程序，因为它可能被许多不同的客户端应用程序使用，但它允许客户端应用程序连接到该
    Java EE 应用程序一次，并从单个上下文访问该应用程序中的 Java EE 组件。'
