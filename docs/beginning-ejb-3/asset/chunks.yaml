    The Order Processing Service


    The order processing service is an MDB. The idea behind having MDBs in the wine
    store application is to show how some of the processing in an enterprise application
    can be done in an asynchronous fashion, and how you can work with the `EntityManager`,
    session beans, and other MDBs from an MDB.


    ![image](Images/sq.jpg) **Note**   [Chapter 5](../Text/9781430246923_Ch05.xhtml),
    which covers MDBs, describes the asynchronous architecture in detail and gives
    examples of some possible implementations.


    `OrderProcessingMDBBean` is a plain old Java object (POJO) that is annotated with
    a class-level `@MessageDriven` annotation to indicate that it is an MDB. This
    POJO implements the mandatory `onMessage()` method to process the incoming messages
    with the help of a utility method, `processOrder()`. We will walk through the
    methods in the MDB from here.


    [Listing 7-14](#9781430246923_Ch07.xhtml#list14) shows the code for the `onMessage()`
    method. This method checks whether the received message is of `ObjectMessage`
    instance type, and the retrieved object is then typecast to the `PurchaseOrder`
    utility class. After that, a call to the `processOrder()` utility method is made
    to process the received purchase order.


    ***[Listing 7-14](#9781430246923_Ch07.xhtml#_list14).***  The onMessage Method
    in OrderProcessingMDBBean


    ```

    public void onMessage(Message message) {

      try {

        if (message instanceof ObjectMessage) {

          ObjectMessage objMessage = (ObjectMessage) message;

          Object obj = objMessage.getObject();

          if (obj instanceof PurchaseOrder) {

            po = (PurchaseOrder) obj;

            processOrder(po);

          }

        }

      } catch (JMSException e) {

        e.printStackTrace();

      }

    }

    ```


    [Listing 7-15](#9781430246923_Ch07.xhtml#list15) shows the code for the `processOrder()`
    method, which begins by opening up the `PurchaseOrder` to obtain the `Customer`
    and `CustomerOrder` objects. For each order item in the customer order, a corresponding
    amount of wine is deducted from the inventory tables. To perform this work, the
    `deductInventory()` utility method is called.


    After the inventory is deducted, it is time to send a status update to the customer.
    This is done using the e-mail service. The customer’s e-mail information and order
    ID are retrieved from the PO object, the e-mail content is constructed, and a
    call is made to the `sendStatus()` utility method.


    ***[Listing 7-15](#9781430246923_Ch07.xhtml#_list15).***  The processOrder Business
    Method


    ```

    private void processOrder(PurchaseOrder po) {

      Customer customer = po.getCustomer();

      CustomerOrder order = po.getCustomerOrder();


    for (OrderItem oItem : order.getOrderItemList()) {

        Wine wine = oItem.getWine();

        int qty = oItem.getQuantity();

        deductInventory(wine, qty);

      }


    String from = PopulateDemoData.FROM_EMAIL_ADDRESS;

      String to = customer.getEmail();

      String content =

          "Your order has been processed. "

          + "If you have questions call Beginning EJB Wine Store "

          + "Application with order id # "

          + po.getCustomerOrder().getId().toString();    sendStatus(from, to, content);

    }

    ```


    [Listing 7-16](#9781430246923_Ch07.xhtml#list16) shows the code for the `deductInventory()`
    method. This method makes use of the injected `EntityManager` to call the query
    named `Inventory.findItemByWine` defined in the `InventoryItem` entity. Once the
    inventory for the specific wine is retrieved, the quantity is updated using the
    `setQuantity()` setter method. The inventory item is managed, so its modifications
    are synchronized with the database when this CMT method ends, or whenever its
    context transaction commits.


    ***[Listing 7-16](#9781430246923_Ch07.xhtml#_list16).***  The deductInventory
    Business Method


    ```

    private void deductInventory(Wine tempWine, int deductQty) {

      InventoryItem iItem =

              em.createNamedQuery("InventoryItem.findItemByWine",

              InventoryItem.class).setParameter("wine", tempWine).getSingleResult();

      int newQty = iItem.getQuantity() - deductQty;

      iItem.setQuantity(newQty);

    }

    ```


    [Listing 7-17](#9781430246923_Ch07.xhtml#list17) shows the code for the `sendStatus()`
    method. This utility method makes use of an injected JMS resource for a topic
    connection factory and a topic. A connection to a topic connection factory is
    created and the connection is started. Once a connection is available, a session
    is created, and a `MessageProducer` containing the topic is created. A `Message`
    object is created, and the `JMSType` is set to `MailMessage`. After that, a series
    of calls to the `setStringProperty()` method on the `Message` object is made to
    create the to, from, subject, and content sections of the e-mail. Once all of
    the properties are set, the message is sent out to the message topic that will
    be processed by the e-mail service.


    ***[Listing 7-17](#9781430246923_Ch07.xhtml#_list17).***  The sendStatus() Business
    Method


    ```

    private void sendStatus(String from, String to, String content) {

      try {

        System.out.println("Before status TopicCF connection");

        Connection connection = statusMessageTopicCF.createConnection();

        System.out.println("Created connection");

        connection.start();

        System.out.println("Started connection");

        System.out.println("Starting Topic Session");

