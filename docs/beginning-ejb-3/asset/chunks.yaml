  trans: '

    EJB 客户端应用程序


    到目前为止，我们已经详细介绍了会话 Bean、使用 Java 持久化 API（JPA）的实体、消息驱动 Bean（MDB）、将无状态会话 Bean 发布为
    Web 服务，以及如何集成所有这些组件。除此之外，我们还讨论了事务和性能的具体细节。虽然我们一直在开发简单的 Servlet 作为客户端应用程序来演示这些组件的工作方式，但我们尚未深入探讨不同类型的
    EJB 客户端应用程序及其开发方法。在本章中，我们将讨论客户端应用程序可能涉及的不同应用架构，并构建其中常见的几种。


    应用架构


    Java EE 平台在组件如何分布到不同层和架构方面提供了灵活性。您可以根据应用或配置需求选择合适的架构和编程模型。在本节中，我们将介绍您可以使用的不同架构和编程模型。


    图 12-1 展示了基于 Web 的应用的架构布局。这种架构通常由运行在浏览器中的 Web 应用程序作为前端。如今，其他类型的客户端设备（如智能手机、平板电脑、手机和
    telnet 设备）也被用来运行这些应用程序。运行在浏览器或移动设备中的 Web 应用程序使用诸如 JavaServer Pages（JSP）、JavaServer
    Faces（JSF）或 Java Servlet 等 Web 技术来呈现用户界面。典型的用户操作，例如输入搜索条件或向购物车添加商品，将通过上述 Web 技术之一调用运行在
    EJB 容器中的会话 Bean。会话 Bean 被调用后，会处理请求，并将响应发送回来。


    ![9781430246923_Fig12-01.jpg](img/9781430246923_Fig12-01.jpg)


    图 12-1.  基于 Web 的应用架构


    这种架构允许您充分利用会话 Bean 的所有优势，例如封装与实体的交互、管理事务和安全性等。其缺点在于，您需要一个 EJB 容器或应用服务器来部署和运行会话
    Bean。在这种架构中，另一点需要注意的是，您可以将 Web 容器和 EJB 容器运行在两台不同的物理机器上，或者同一台物理机器上的两个不同 Java 虚拟机（JVM）中。这种方法的优缺点已在第
    2 章中讨论过。


    这种架构的一个细微变体如图 12-2 所示，其中 Web 容器和 EJB 容器位于同一个 JVM 中。在这种架构中，Web 组件以本地模式与 EJB 组件交互。这种方法的优缺点也已在第
    2 章中讨论过。


    JPA 规范提供了一种轻量级的持久化对象模型，使用普通的 Java 对象（POJO）和注解进行对象/关系（O/R）映射。这与早期 EJB 规范处理持久化的方式截然不同。这种持久化模型的轻量级特性使得应用架构成为可能，允许
    Web 应用程序直接与持久化对象模型或 JPA 实体交互。图 12-3 展示了这种编程模型的架构布局。在这种架构中，Web 组件将使用 `EntityManager`
    与实体交互，执行 CRUD（创建、检索、更新、删除）操作以及查询来检索数据。


    ![9781430246923_Fig12-02.jpg](img/9781430246923_Fig12-02.jpg)


    图 12-2.  支持本地调用的基于 Web 的应用架构


    ![9781430246923_Fig12-03.jpg](img/9781430246923_Fig12-03.jpg)


    图 12-3.  使用 JPA 实体的基于 Web 的应用架构


    这种编程模型的优点在于，您可以在任何标准的轻量级 Web 容器（如 Tomcat）上运行 Web 应用程序。由于您没有使用会话 Bean 或 MDB，因此不需要任何
    EJB 容器或应用服务器。这种架构与其他 O/R 框架（如 TopLink 和 Hibernate，JPA 规范正是基于它们）一起被广泛使用。其缺点在于，您会失去
    EJB 容器提供的一些服务（例如事务和安全性）。


    在构建使用 EJB 或实体的 Web 应用程序时，上述三种架构是最常用的。这些架构还有其他变体，但我们不会深入探讨所有选项。


    接下来的两种架构是编程模型，其中客户端应用程序属于桌面类型，为数据录入目的提供丰富的 UI 功能。


    图 12-4 展示了一种架构，其中运行在桌面上的客户端应用程序调用远程会话。运行在桌面上的客户端应用程序具有供最终用户（例如客户服务代表和银行柜员）使用的数据录入界面。这些客户端应用程序可以使用
    Java SE 中的 Java Swing 技术开发，或者使用从命令行运行的普通 Java 类（POJO）开发。通常，最终用户从其桌面启动客户端应用程序，输入一些数据，然后通过按下屏幕上的某个
    UI 组件（例如“提交”按钮）来触发事件。


    ![9781430246923_Fig12-04.jpg](img/9781430246923_Fig12-04.jpg)


    图 12-4.  专业桌面客户端应用架构


    客户端应用程序可以安装在桌面机器上，也可以使用诸如 Java Web Start 之类的技术从服务器下载。在这种架构中，由于会话 Bean 将在远程服务器上运行，因此客户端应用程序始终会远程调用会话
    Bean。与 Web 应用程序的情况一样，这种架构可以利用会话 Bean 的优势。


    图 12-5 展示了一种直接使用 JPA 实体而不通过会话 Bean 的架构。在这种编程模型中，客户端应用程序和打包在持久化单元中的实体位于同一位置，并作为一个单一的应用单元进行组装。客户端应用程序使用
    `EntityManager` 执行 CRUD 操作和查询来检索数据。


    ![9781430246923_Fig12-05.jpg](img/9781430246923_Fig12-05.jpg)


    图 12-5.  使用 JPA 实体的专业客户端应用架构


    这种编程模型的优点在于，您可以在标准的 Java SE 环境中运行应用程序，而无需使用 EJB 容器，但明显的缺点是，您将失去 EJB 容器提供的诸如安全性和事务管理等服务。


    如第 6 章所述，无状态会话 Bean 可以发布为 Web 服务。一旦无状态会话 Bean 被发布为 Web 服务，任何能够组装并发送简单对象访问协议（SOAP）消息的
    Web 服务客户端应用程序都可以调用已发布的 Web 服务。图 12-6 展示了这种架构。


    ![9781430246923_Fig12-06.jpg](img/9781430246923_Fig12-06.jpg)


    图 12-6.  Web 服务客户端应用架构

    '
- fmt: '# 排版后的文本


    企业通常拥有多个与异构后端系统或服务交互的业务流程。*Business Process Execution Language (BPEL)* 是一种标准标记语言，允许你将离散的
    Web 服务组装为单个业务流程。基于 BPEL 的业务流程使用标准 Web 服务架构和基础设施来调用一个或多个 Web 服务。[Figure 12-7](#9781430246923_Ch12.xhtml#Fig7)
    展示了一种架构，其中基于 BPEL 的业务流程调用了一个发布为 Web 服务的无状态会话 Bean。例如，[Chapter 6](../Text/9781430246923_Ch06.xhtml)
    演示了如何创建和发布一个用于检查信用卡有效性的信用服务。在订单处理业务流程的上下文中，该信用服务可能是业务流程为完成订单处理而与之交互的多个服务之一。


    ![9781430246923_Fig12-07.jpg](Images/9781430246923_Fig12-07.jpg)


    [Figure 12-7.](#9781430246923_Ch12.xhtml#_Fig7)  一个作为客户端应用程序的业务流程


    到目前为止，我们已经了解了涉及 EJB 或 JPA 组件的可能架构和编程模型。在接下来的章节中，我们将深入探讨 [Figure 12-2](#9781430246923_Ch12.xhtml#Fig2)
    中所示的基于 Web 的应用程序架构，并演示如何扩展在 [Chapter 7](../Text/9781430246923_Ch07.xhtml) 中为 Wines
    Online 应用程序开发的集成后端应用程序。我们选择这种架构是因为它被广泛使用，并且有助于我们说明容器服务的用法。


    ## JSF


    在本节中，我们将研究如何使用 JavaServer Faces (JSF) 开发一个 Web 应用程序，该应用程序使用 [Figure 12-2](#9781430246923_Ch12.xhtml#Fig2)
    中所示的架构与集成的 EJB 后端应用程序进行通信。我们将从简要介绍 JSF 的几个概念开始，为开发一个功能完备的 Web 应用程序做准备。


    ![image](Images/sq.jpg) **注意** 本节绝不提供对 JSF 的全面讨论。与任何其他 Java EE 技术一样，有关 JSF 的详细信息可以在以下位置找到：`http://www.oracle.com/technetwork/java/javaee/javaserverfaces-139869.html`


    ## Java EE Web 技术的演进


    Java EE 技术已经发展成为一个成熟、可靠且稳定的平台，允许开发人员构建企业级应用程序。该平台在 Web 技术领域也经历了显著的演进。[Figure 12-8](#9781430246923_Ch12.xhtml#Fig8)
    展示了 Java EE 平台中 Web 技术的演进过程。


    ![9781430246923_Fig12-08.jpg](Images/9781430246923_Fig12-08.jpg)


