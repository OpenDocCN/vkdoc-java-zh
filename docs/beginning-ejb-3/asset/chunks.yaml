    订单处理外观组件


    `OrderProcessFacadeBean` 是一个无状态会话 Bean。该 Bean 提供了由 `ShoppingCartBean` 调用的业务方法，用于提交订单，以及其他与信用和订单处理服务交互的方法。`OrderProcessFacadeBean`
    包含以下小节中描述的业务方法。


    信用检查


    清单 7-10 展示了 `OrderProcessFacadeBean` 中的 `performCreditCheck()` 方法。该方法使用通过 `@WebServiceRef`
    注解注入的 `CreditService` 来获取 Web 服务的端口。一旦端口可用，代码即可调用 `creditCheck` Web 服务操作，该操作接收信用卡号，并以布尔值形式返回该卡有效性的消息。我们使用的是在第
    6 章中开发的信用服务。


    ***清单 7-10.***  performCreditCheck 业务方法


    ```

    private boolean performCreditCheck(Individual individual) {

      String ccnum = individual.getCcNum().toString();

      CreditCheckEndpointBean creditService = service.getCreditCheckEndpointBeanPort();

      return creditService.creditCheck(ccnum);

    }

    ```


    创建采购订单


    清单 7-11 展示了 `OrderProcessFacadeBean` 中的 `processOrder()` 方法。当客户端应用程序提交订单时，`ShoppingCartBean`
    会调用此业务方法。该方法有一个参数，类型为 `Customer` 实体。客户的购物车包含在其 `cartItems` 列表中，列表中的每个成员都引用了一种葡萄酒以及客户在购物时添加到购物车的数量。


    首先，该方法检查接收到的实体是否受管理。如果不是，则调用 `EntityManager` 的 `merge()` 方法来获取一个受管理的 `Customer`
    对象。


    ![image](img/sq.jpg) **注意**   值得注意的是，当我们运行此应用程序时（按照本章末尾的步骤操作），`customer` 参数将在持久化上下文中找到，因此不会执行合并步骤。这是因为
    `processOrder()` 是从一个现有的事务上下文中调用的——该事务是在其调用方法 `ShoppingCartBean.sendOrderToOPC()`
    被调用时创建的。单个持久化上下文始终绑定到给定的事务，在这种情况下，来自 `ShoppingCartBean` 的扩展持久化上下文就是与此事务关联的那个。当调用
    `sendOrderToOPC()` 时，会找到并使用一个现有的上下文事务。当在 `processOrder` 内部调用 `em.contains(customer)`
    时，`OrderProcessFacadeBean` 的 EntityManager 会观察到持久化上下文已与此事务关联，并使用该持久化上下文，即与 ShoppingCartBean
    关联的同一个扩展持久化上下文。这就是客户实例已被确定为受管理的原因。


    一旦获取了受管理的客户实体，它会检查客户是 `Individual` 还是 `Distributor`。对于个人，会调用 `performCreditCheck()`
    方法来验证信用卡。如果发现信用卡无效，则通过 `ShoppingCartBean` 将消息“无效信用卡”发送回客户端应用程序。对于分销商，会检查 `memberStatus`
    属性，任何非“APPROVED”的值都会被拒绝。


    如果客户通过验证，则继续处理，并创建一个新的 `CustomerOrder` 类型的订单。此新订单将填充与 `Customer` 关联并在其 `cartItems`
    属性中找到的 `CartItem` 对象集合。对于每个购物车项，都会创建一个 `OrderItem` 对象，以捕获每种葡萄酒的数量以及该购物车项中葡萄酒的总价。每个订单项的价格使用每个
    `Wine` 实体可用的零售价格信息进行计算。


    处理完所有购物车项并创建相应的订单项后，包含订单项的新 `CustomerOrder` 会被持久化，部分原因是为了获取其 `id` 字段的生成值，该值在从
    `sendPOtoMDB()` 调用内部生成电子邮件时使用。然后，对每个购物车项调用 `removeCartItem()` 方法，以将其从 `Customer`
    中移除。

