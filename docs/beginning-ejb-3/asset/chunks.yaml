    Bean 应用限定符、替代方案或生产者来解决这些歧义。


    参与 CDI 生命周期的会话 Bean 会使用限定符（`@Default`、`@Any`、`@New`、`@Named` 或用户自定义的）在编译时解决歧义依赖关系，这与任何其他
    Bean 相同。


    如果需要在部署时解决歧义依赖关系，则必须在 `beans.xml` 中显式声明一个替代会话 Bean。一旦在 `beans.xml` 中声明，它就会自动可用于查找、注入或
    EL 解析。


    会话 Bean 的生产者方法必须是 EJB 的业务方法或 Bean 类的静态方法。如果不是这种情况，容器会自动检测到问题并将其视为定义错误。类似地，生产者字段必须是
    Bean 类的静态字段。


    用户可以将限定符、替代方案和生产者与会话 Bean 结合使用，其方式与将它们与其他 Bean 结合使用完全相同。


    局限性


    虽然 CDI 和会话 Bean 是很好的搭档，彼此填补了对方留下的空白，但参与 CDI 生命周期的会话 Bean 确实存在一些局限性。例如，会话 Bean
    的远程接口不包含在 Bean 类型集合中，并且不能参与 CDI 生命周期。


    编译、部署和测试 CDI 应用程序


    与 EJB 不同，CDI 没有定义任何特殊的部署归档文件。CDI Bean 可以打包在 JAR、EJB-JAR 或 WAR 文件中。唯一的条件是归档文件必须是
    *bean 归档文件*，这意味着该归档文件必须包含 `beans.xml` 描述符。CDI Bean 在归档文件中的位置取决于其 `beans.xml` 的位置。


    *   如果 `beans.xml` 位于归档文件的 `META-INF` 目录中，则 CDI Bean 必须打包在库 JAR、EJB JAR 或 RAR
    归档文件中。

    *   如果 `beans.xml` 位于 WAR 文件的 `WEB-INF` 目录中，则 CDI Bean 必须打包在 WAR 文件的 `WEB-INF/classes`
    目录中。


    在某些 CDI 容器的情况下，打包好的 CDI 归档文件需要在部署前组装成一个企业归档（EAR）文件。应用服务器提供了部署实用程序或 Ant 任务来简化 CDI
    Bean 的部署。像 JDeveloper、NetBeans 和 Eclipse 这样的 Java 集成开发环境也提供了部署功能，允许开发者将 CDI Bean
    打包并部署到应用服务器。


    在本章中，我们使用了代码片段来演示 CDI 的两个核心方面：作用域和依赖注入。我们从开发一个简单的 `Wine` 接口开始，然后继续创建了它的两个实现——`RedWine`
    和 `WhiteWine`。我们了解了各种作用域，并为 `RedWine` 实现添加了应用程序作用域。我们还看到了通过使用限定符、替代方案和生产者来解决歧义依赖关系的示例。我们到目前为止在章节中列出的
    `WineClient` 客户端演示了客户端如何与 CDI Bean 进行交互，但它不是一个完整的可执行客户端。我们现在将把 `WineClient` 客户端转换为一个
    Servlet 客户端，并通过将其部署在 GlassFish 应用服务器上来使用它测试 CDI Bean。以下各节将引导您完成使用相应的 Servlet 客户端编译、部署和测试这些
    CDI Bean 所需的步骤。


