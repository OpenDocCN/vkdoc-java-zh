    \ of the injected `SearchFacade` stateless session bean and calls the `getWineFindAll()`\
    \ business method that returns the list of available wines. The returned list\
    \ of wines is stored in the `winesList` property of the managed bean, and the\
    \ `allwines` string is returned as the navigation case.\n\n**[Listing 12-8](#9781430246923_Ch12.xhtml#_list8).**\
    \  `WineList.java`\n\n```\npackage com.apress.ejb.chapter12.view.managed;\n\n\
    import com.apress.ejb.chapter07.ejb.SearchFacadeLocal;\nimport com.apress.ejb.chapter07.entities.Wine;\n\
