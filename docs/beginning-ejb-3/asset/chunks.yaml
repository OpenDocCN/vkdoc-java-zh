    ## Mapping Entity Inheritance Hierarchies


    Java has supported single class inheritance—in which a non-interface class may
    extend a single other class—since its inception. While it has been a common practice
    to exploit the code reuse and polymorphism benefits of inheritance in many areas
    of the business domain, data inheritance was not supported in the EJB persistence
    domain until the introduction of JPA. This had been a major shortcoming since,
    in the real world, data is often hierarchical, and the lack of standard, built-in
    support for inheritance of data objects has required countless workarounds and
    headaches. Leveraging the ease of use of JDK annotations, JPA delivers declarative
    support for defining and mapping entity inheritance hierarchies, including abstract
    entities and polymorphic relationships and queries.


    ![image](Images/sq.jpg) **Note** An *abstract entity* is an entity class that
    contains the `abstract` modifier and therefore cannot be instantiated in its own
    right. An abstract entity must be an intermediate class in an entity inheritance
    hierarchy; it may not itself be a leaf entity since it may only be instantiated
    through one of its subentities. Correspondingly, all leaf entities in an entity
    inheritance hierarchy must be concrete and therefore instantiable. An abstract
    entity exists to provide a common data structure for its subentities and to represent
    its subentities through polymorphic relationships with other entities.


    Much of the entity inheritance support in JPA is borne of the work of designers
    and tool developers who have, over the years, come up with ways to roll their
    own O/R mappings, and JPA has conveniently adopted several alternative inheritance
    mapping approaches that derive from these efforts.


    Within a given entity inheritance hierarchy, a single inheritance strategy applies
    to all entities in the hierarchy. Additionally, all entities in a hierarchy must
    use the same primary key type, regardless of the inheritance strategy. This makes
    it reasonable for the container to support polymorphic relationships, regardless
    of the mapping strategy employed for the class hierarchy.


    Also, should your database have the restriction that a table be limited to 256
    columns, note that entities are free to distribute their field mappings across
    joined rows in multiple tables.


    ## Getting Started


    All of the code snippets in this chapter exist in runnable form that you can download
    and execute directly in your local environment together with SQL scripts for creating
    the corresponding tables and other database artifacts in your local database.
    The steps for running the samples are described at the end of the chapter. Since
    these examples deal only with entities, we can leverage the pure Java SE (outside-the-container)
    support offered in JPA and skip the step of deploying these entities into a Java
    EE container. You will see that a simple Java class is sufficient to create an
    `EntityManager` that can interact with these entities and drive example tests.
    Seeing these concepts in action will help clear up questions left unanswered here,
    and the samples should also provide a useful launch pad for testing out your own
    ideas.


    ## Entity Inheritance Mapping Strategies


    JPA provides declarative support for three main implementation strategies that
    dictate how the entities in a hierarchy map to underlying tables. We will examine
    each strategy by applying it to a sample entity hierarchy, and explore the strengths
    and weaknesses of each approach. This comparison is intended to help you decide
    how to map each of the entity hierarchies in your own application.


