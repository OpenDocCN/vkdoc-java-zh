    fields or properties on the entity to table columns in the database.


    The heart of an entity class is the list of fields or properties that define its
    persistent structure. These fields or properties that define its persistent state
    must map to columns in a database table. It is the job of the persistence framework
    to load this state from the database into an entity instance before it is handed
    out to a client and to copy this state back out to the rows of the table when
    it is persisted. Whereas in earlier versions of EJB, this O/R mapping information
    was specific to the various container-managed persistence (CMP) providers, in
    JPA, this mapping markup is now part of the specification. Like nearly every part
    of EJB since version 3.0, users have the choice of specifying this information
    through annotations, or using XML in the `orm.xml` file.


    The @Table Annotation (Revisited)


    The `@Table` annotation lets you specify details about the base table to which
    an entity is mapped. [Listing 3-17](#9781430246923_Ch03.xhtml#list17) shows the
    `@Table` annotation definition.


    [***Listing 3-17.***](#9781430246923_Ch03.xhtml#_list17)  The @Table Annotation


    ```

    @Target({ElementType.TYPE})

    @Retention(RetentionPolicy.RUNTIME)

    public @interface Table {

        String name() default "";

        String catalog() default "";

        String schema() default "";

        UniqueConstraint[] uniqueConstraints() default {};

    }

    ```


    Each entity identifies a database table that will hold its persistent data as
    follows:


    ```

    @Entity

    @Table(name="ADDRESSES")

    public class Address implements Serializable {

        . . .

    }

    ```


    Here, the `@Table` annotation is used to override the default table name for the
    `Address` entity. In the absence of an `@Table` annotation, the default table
    name is the same name as the entity class itself. (It would default to `"ADDRESS"`
    in this example.) The `@Table` annotation also allows you to specify database
    schema and constraint information for use when the table is generated during deployment.
    An entity may also map to more than one table by specifying the `@SecondaryTable`
    annotation.


    ![image](Images/sq.jpg) **Note**   The predefined annotation types `@Target` and
    `@Retention` may be specified on an annotation definition to provide information
    to the compiler about the annotation. The `@Target` annotation identifies the
    program element (in our example, a part of a class) that can accept the annotation.
    The `@Retention` annotation is used to indicate whether the annotation should
    be available only in the Java source file or also in the compiled class file.
    When `@Retention(SOURCE)` is specified, the annotation is useful as documentation,
    and it may be used by a design-time tool like an integrated development environment
    (IDE), but the annotation usage is not compiled into the `.class` file. When `@Retention(RUNTIME)`
    is specified, the information is also compiled into the `.class` file, and so
    it may be obtained through Java reflection for use by deployment or runtime tools
    like the EJB container.


    The @Column Annotation (Revisited)


    Entity class fields or properties are mapped to database columns using the `@Column`
    annotation. Again, if no `@Column` annotation is defined for a field through its
    instance variable or property accessor, the mapped column name gets its name from
    the field.


    [Listing 3-18](#9781430246923_Ch03.xhtml#list18) gives the definition of the `@Column`
    annotation.'
