    ## Resolving Session Bean Ambiguity


    Just like any other bean, session beans participating in the CDI lifecycle can
    encounter the “unsatisfied or ambiguous dependency” error when the CDI container
    is not able to isolate one session bean that can be injected at a given injection
    point. These ambiguities can be resolved by applying qualifiers, alternatives,
    or producers to the participating session bean.


    Session beans participating in a CDI lifecycle use qualifiers (`@Default`, `@Any`,
    `@New`, `@Named`, or user defined) to resolve ambiguous dependencies at compile
    time, just like any other bean.


    If an ambiguous dependency needs to be resolved at deployment time, then an alternative
    session bean must be declared explicitly in `beans.xml`. Once declared in `beans.xml`,
    it is automatically available for lookup, injection, or EL resolution.


    The producer method of a session bean must be either a business method of the
    EJB or a static method of the bean class. If this is not the case, the container
    automatically detects the problem and treats it as a definition error. Similarly,
    the producer field must be a static field of the bean class.


    Users can use qualifiers, alternatives, and producers with session beans in exactly
    the same way they use them with other beans.


    ## Limitations


    While CDI and session beans are great companions with each filling the gap that
    was left by the other, session beans participating in the CDI lifecycle do have
    some limitations. For example, remote interfaces of session beans are not included
    in set of bean types and cannot participate in the CDI lifecycle.


    ## Compiling, Deploying, and Testing the CDI Application


    Unlike EJB, CDI doesn’t define any special deployment archive. CDI beans can be
    packaged within a JAR, EJB-JAR, or WAR file. The only condition is that the archive
    must be a *bean archive*, which means that the archive must include the `beans.xml`
    descriptor. The location of CDI beans within an archive is dependent on the location
    of its `beans.xml`.


    *   If the `beans.xml` is located in the `META-INF` directory of the archive,
    then the CDI beans must be packaged in a library JAR, an EJB JAR, or a RAR archive.

    *   If the `beans.xml` is located in the `WEB-INF` directory of the WAR file,
    then the CDI beans must be packaged in `WEB-INF/classes` directory of a WAR file.


    In the case of some CDI containers, packaged CDI archives need to be assembled
    into an Enterprise Archive (EAR) file before deployment. Application servers provide
    deployment utilities or Ant tasks to facilitate deployment of CDI beans. Java
    IDEs (integrated development environments) like JDeveloper, NetBeans, and Eclipse
    also provide deployment features that allow developers to package and deploy CDI
    beans to an application server.


    Throughout this chapter, we have used code snippets that demonstrate the two core
    aspects of CDI: scope and dependency injection. We started with developing a simple
    `Wine` interface and then went on to create two implementations of it – `RedWine`
    and `WhiteWine`. We learned about the various scopes and added the application
    scope to the `RedWine` implementation. We also saw examples that resolved ambiguous
    dependency by using qualifiers, alternatives, and producers. The `WineClient`
    client that we listed in the chapter until now demonstrates how clients can potentially
    interact with the CDI beans, but it is not a full-fledged executable client. We
    will now convert the `WineClient` client into a servlet client and test the CDI
    beans using it by deploying them on the GlassFish application server. The following
    sections will walk you through the steps necessary to compile, deploy, and test
    these CDI beans using their corresponding servlet clients.


