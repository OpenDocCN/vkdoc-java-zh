    部署描述符 `faces-config.xml` 包含页面导航、受管 bean 等信息。清单 12-3 展示了 `faces-config.xml` 中与
    `login.jsp` 之间的控制流。它还展示了 `Login` 类被注册为受管 bean。我们将 `Login` 受管 bean 的作用域设置为 `session`。这允许我们通过会话存储有关客户和购物车的信息，这样我们就不必为相同的信息重新查询后端应用程序。这也便于在其他页面中使用这些信息，并调用
    `ShoppingCart` 有状态会话 bean 上的其他业务方法，而无需再次查找该 bean。此外，我们还创建了三个导航规则：


    *   从 `login.jsp` 到 `winehome.jsp`，值为 `winehome`：如果登录成功，将使用此规则。

    *   从 `login.jsp` 到 `newCustomer.jsp`，值为 `register`：如果登录失败且客户想要注册为新客户，将使用此规则。

    *   从 `newCustomer.jsp` 到 `login.jsp`，值为 `success`：此规则用于在成功注册后将客户导航回登录页面。


