    bean instance, and the user is responsible for state synchronization.


    The type of concurrency—container-managed or bean-managed—is specified by the
    `javax.ejb.ConcurrencyManagement` annotation specified on the singleton session
    bean class. For container-managed concurrency, the type attribute of `@ConcurrencyManagement`
    is set to `javax.ejb.ConcurrencyManagementType.CONTAINER`; for bean-managed concurrency,
    the type attribute of `@ConcurrencyManagement` is set `to javax.ejb.ConcurrencyManagementType.BEAN`.


    Container-Managed Concurrency


    For a singleton session bean using container-managed concurrency, the container
    manages concurrency by associating each business method with either a shared `Read`
    lock or an exclusive `Write` lock. A `Read` or `Write` lock is specified using
    the `@Lock` annotation.


    [Listing 2-21](#9781430246923_Ch02.xhtml#list21) demonstrates container-managed
    concurrency by using the `Read` lock on the `getShopperCount` method and `Write`
    lock on the `incrementShopperCount` method. With this change, multiple clients
    can get the value of `shopperCounter` concurrently but access to `incrementShopperCount`
    is blocked for all other clients while one client is accessing it.


    [***Listing 2-21.***](#9781430246923_Ch02.xhtml#_list21)  ShopperCountBean.java


    ```

    package com.apress.ejb.chapter02;


    import javax.annotation.PostConstruct;

    import javax.annotation.PreDestroy;

    import javax.ejb.ConcurrencyManagement;

    import javax.ejb.ConcurrencyManagementType;

    import javax.ejb.Lock;

    import javax.ejb.LockType;

    import javax.ejb.Singleton;

    import javax.ejb.Startup;


    @Singleton(name = "ShopperCount")

    @Startup

    @ConcurrencyManagement(ConcurrencyManagementType.CONTAINER)

    public class ShopperCountBean {

        private int shopperCounter;

        // Increment number of shopper counter

        @Lock(LockType.WRITE)

        public void incrementShopperCount() {

            shopperCounter++;

        }


    // Return number of shoppers

        @Lock(LockType.READ)

        public int getShopperCount() {

            return shopperCounter;

        }


    // Reset counter

        public void resetCounter() {

            shopperCounter = 0;

        }


    // Reset counter

        @PostConstruct

        public void applicationStartup() {

            resetCounter();

        }


    @PreDestroy

        public void applicationShutdown() {

            System.out.println("From applicationShutdown method.");

        }

    }

    ```


    For a singleton session bean, an `@Lock` annotation at the class level specifies
    that all business methods will use the specified lock type unless a different
    type is explicitly set at the method level. When the `@Lock` annotation is not
    explicitly present on the singleton session bean class, the default lock type,
    `@Lock(LockType.WRITE)`, is applied to all business methods.


    Bean-Managed Concurrency


    In the case of bean-managed concurrency, the container allows full concurrent
    access to the singleton session bean instance and the bean developer must provide
    protection to the bean’s internal state against synchronization errors that result
    from concurrent access. You can use synchronization primitives like `synchronized`
    and `volatile` for this purpose.


    Error Handling


    Errors can occur during initialization of a singleton session bean. These errors
    are fatal and, as a result, the singleton session bean instance must be discarded.
    Attempted invocations on a singleton session bean instance that failed to initialize
    will result in the `javax.ejb.NoSuchEJBException`. Once a singleton session bean
    is instantiated successfully, it will not be destroyed if exceptions are thrown
    from either business methods or callbacks.


    Timer Service


    The *EJB Timer Service* is a container-managed service that allows callbacks to
    be scheduled for time-based events. Timer notifications can be scheduled to occur
    at a calendar based schedule, at a specific time, after a specific time, or at
    specific recurring intervals.


    Use timers for application level processes. Don’t use timers for real-time events.
    Typical examples of using a timer include the following:


    *   A timer in an expense reporting application prints newly filed expenses every
    evening at 9 PM.

    *   A timer in a bug tracking application emails a list of open bugs to team members
    every morning at 6 AM.

    *   A timer in a human resources application emails a list of public holidays
    to all the employees on the 1st of January every year.


    ![image](Images/sq.jpg) **Note**   Timers cannot be created for stateful session
    beans.


    Creating a timer is simplified in EJB 3.1 via introduction of `@Schedule` and
    `@Schedules` annotations that automatically create timers based on metadata specified
    on a method. In [Listing 2-22](#9781430246923_Ch02.xhtml#list22), we augment our
    `LogShopperCount` by adding a recurring timer that will log the shopper count
    every two hours.


    [***Listing 2-22.***](#9781430246923_Ch02.xhtml#_list22)  LogShopperCount.java


    ```

    package com.apress.ejb.chapter02;


    import javax.ejb.DependsOn;

    import javax.ejb.Schedule;

    import javax.ejb.Singleton;

    import javax.ejb.Startup;


    @Singleton

    @Startup

    @DependsOn("ShopperCountBean")

    public class LogShopperCount {


    // Logs shopper count every 2 hours

           @Schedule(hour="*/2")

           public void logShopperCount() {

           // Log shopper count

           }

    }

    ```


    Pass the `Timer` object in methods annotated with `@Schedule` to get information
    about the timer. [Listing 2-23](#9781430246923_Ch02.xhtml#list23) demonstrates
    the use of the `Timer` object to get information about the timer that just expired.


    [***Listing 2-23.***](#9781430246923_Ch02.xhtml#_list23)  LogShopperCount.java


    ```

    package com.apress.ejb.chapter02;


    import javax.ejb.DependsOn;

    import javax.ejb.Schedule;

    import javax.ejb.Singleton;

    import javax.ejb.Startup;

    import javax.ejb.Timer;


    @Singleton

    @Startup

    @DependsOn("ShopperCount")

    public class LogShopperCount {


    // Logs shopper count every 2 hours

    @Schedule(hour="*/2")

    public void logShopperCount(Timer timer) {

    // Log shopper count

    String timerInfo = (String) timer.getInfo();

    System.out.println(timerInfo);

    }

    }

    ```


    Calendar-Based Time Expressions


    The Timer Service is inspired by the UNIX `cron` utility. [Table 2-1](#9781430246923_Ch02.xhtml#Tab1)
    lists the various attributes of a calendar-based time expression.


    [Table 2-1.](#9781430246923_Ch02.xhtml#_Tab1) Attributes of calendar-based time
    expression


    ![image](Images/Table2-1.jpg)


    ![image](Images/sq.jpg) **Note**   For `dayOfWeek`, both 0 and 7 represent Sunday
    and a negative number (−7 to −1), which means the nth day or days before the end
    of the month. All string constants (“Sun”, “Jan”, “Last”, “1st”) are case insensitive.
    Increments are supported only by second, minute, and hour. Duplicate values within
    a list are ignored.


    Examples of Calendar-Based Time Expressions


    Let us see some examples that demonstrate the use of calendar-based time expressions.


    *   “Every second of every minute of every hour of everyday”


    *   `@Schedule(second="*", minute="*", hour="*")`


    *   “Every fifteen minutes within the hour”


    *   `@Schedule(minute="*/15", hour="*")`

    *   `@Schedule(minute="0, 15, 30, 45", hour="*")`


    *   “Every Friday at midnight”


    *   `@Schedule(dayOfWeek="Fri")`


    *   “Every six hours on weekends”


    *   `@Schedule(hour="*/6", dayOfWeek="Sat, Sun")`


    *   “Every weekday morning at 7:30am U.S. Pacific Time”


    *   `@Schedule(minute="30", hour="7", dayOfWeek="Mon-Fri", timezone="America/Los_Angeles")`


    *   “On 10th of January and September at 6am”


    *   `@Schedule(month="Jan, Sep", dayOfMonth="10", hour="6")`


    *   “Last Friday of December at 6pm”


    *   `@Schedule(month="Dec", dayOfMonth="Last Fri", hour="18")`


    *   “Second to last day (one day before the last day) of each month”'
