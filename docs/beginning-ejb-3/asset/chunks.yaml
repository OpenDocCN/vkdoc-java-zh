    <beans xmlns="http://java.sun.com/xml/ns/javaee"

       xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

       xsi:schemaLocation="http://java.sun.com/xml/ns/javaee

       http://java.sun.com/xml/ns/javaee/beans_1_0.xsd">


    <alternatives>

           <class>com.apress.ejb.chapter10.RedWine</class>

       </alternatives>

    </beans>

    ```


    Producers


    We have seen how to use the `@Inject` annotation to inject beans and to resolve
    ambiguous dependencies that we face during injection using qualifiers and alternatives.
    Using producers, we can inject any object in any other object provided that *we
    produce* the object that needs to be injected. A producer method acts as a source
    of objects that need to be injected. The objects that need to be injected need
    not be instances of a bean, and the concrete type of the object that needs to
    be injected can be decided at run time. This provides loosely coupled but typesafe
    polymorphism at run time. One of the practical uses of producers is to inject
    Java EE resources like `EntityManager`, `QueueConnetion`, `QueueSession`, and
    so on. CDI also provides the `@Dispose` annotation, which we can use to free up
    the resources by closing them when they go out of scope.


    Producer Field is a simpler alternative to Producer Methods.


    [Listing 10-16](#9781430246923_Ch10.xhtml#list16) shows how a producer method
    can be used to select which implementation of the `Wine` interface is chosen for
    dependency injection. The decision to choose the exact implementation for injection
    is taken at run time. The qualifier `RandomSelector` defined in [Listing 10-15](#9781430246923_Ch10.xhtml#list15)
    is similar to the qualifier `Red` defined in [Listing 10-8](#9781430246923_Ch10.xhtml#list8).


    ***[Listing 10-15](#9781430246923_Ch10.xhtml#_list15).***  RandomSelector.java


    ```

    package com.apress.ejb.chapter10;


    import static java.lang.annotation.ElementType.TYPE;

    import static java.lang.annotation.ElementType.FIELD;

    import static java.lang.annotation.ElementType.PARAMETER;

    import static java.lang.annotation.ElementType.METHOD;

    import static java.lang.annotation.RetentionPolicy.RUNTIME;

    import java.lang.annotation.Retention;

    import java.lang.annotation.Target;

    import javax.inject.Qualifier;


    @Qualifier

    @Retention(RUNTIME)

    @Target({METHOD, FIELD, PARAMETER, TYPE})

    public @interface RandomSelector {

    }

    ```


    [Listing 10-16](#9781430246923_Ch10.xhtml#list16) shows the `WineSelector` class
    that has a `getWine` method that returns an instance of `Wine`. The important
    thing to note here is the exact instance of `Wine` (`RedWine` or `WhiteWine`)
    that will be returned is decided at the run time. In this case, that decision
    is based on the number generated by the random number generator.


    ***[Listing 10-16](#9781430246923_Ch10.xhtml#_list16).***  WineSelector.java


    ```

    package com.apress.ejb.chapter10;


    import java.util.Random;

    import javax.enterprise.inject.New;

    import javax.enterprise.inject.Produces;


    public class WineSelector {

       @Produces

       @RandomSelector

       public Wine getWine(@New RedWine rw, @New WhiteWine ww) {

           final int wineNumber = new Random().nextInt(2);

           if (wineNumber == 0) {

               return rw;

           }

           else if (wineNumber == 1) {

               return ww;

           }

           else{

               return null;

           }

       }

    }

    ```


