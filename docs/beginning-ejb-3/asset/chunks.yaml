- fmt: "An entity must declare its primary key. The primary key serves to identify\
    \ an entity instance uniquely among all of the instances of the entity type. A\
    \ primary key may be simple, represented by a single field of a basic Java class,\
    \ like `String` or `Long`, as in the previous `Customer` example ([Listing 3-2](#9781430246923_Ch03.xhtml#list2)).\
    \ Alternatively, a primary key may be complex, represented by a composite class\
    \ comprised of multiple elementary fields or properties.\n\nThe underlying column\
    \ or columns on the entity’s table that are mapped to by the primary key field\
    \ or fields may be formally bound by a database primary key constraint, but this\
    \ is not a requirement. It is, however, required that the primary key column value\
    \ or values for any entity instance resolve to a unique value across all instances\
    \ of that entity. Database constraints are useful in enforcing this requirement,\
    \ and in their absence, care should be taken to ensure that unique values are\
    \ assigned by application.\n\n## Simple Primary Key\n\nA simple primary key is\
    \ declared by annotating a single basic-type field on the entity class with the\
    \ `@Id` annotation (see [Listing 3-6](#9781430246923_Ch03.xhtml#list6)). A basic-type\
    \ field is a basic Java type (a list of basic types is shown in [Table 3-2](#9781430246923_Ch03.xhtml#Tab2)).\n\
    \n[***Listing 3-6.***](#9781430246923_Ch03.xhtml#_list6)  An Entity with a Simple\
    \ Primary Key\n\n```\n@Entity\npublic class Customer implements Serializable {\n\
    \    @Id\n    private Integer id;\n    private String name;\n\npublic Customer()\
    \ {}\n    public Customer(Integer id) { this.id = id; }\n\npublic Integer getId()\
    \ { return id; }\n    public void setId(Integer id) { this.id = id; }\n\npublic\
    \ String getName() { return name; }\n    public void setName(String name) { this.name\
    \ = name; }\n}\n```\n\nNote that we could eliminate the usefulness of an alternate\
    \ constructor in our entity class by using a database sequence to populate the\
    \ PK value automatically. [Listing 3-7](#9781430246923_Ch03.xhtml#list7) shows\
    \ how this might look, using an ID value generator provided by JPA.\n\n[***Listing\
    \ 3-7.***](#9781430246923_Ch03.xhtml#_list7)  An Entity with a Simple Primary\
    \ Key That Is Populated Using `@GeneratedValue`\n\n```\n@Entity\n@SequenceGenerator(name\
    \ = \" CustomerSequence\",\n                   sequenceName = \" CUSTOMER_SEQ\"\
    ,\n                   initialValue = 100, allocationSize = 20)\npublic class Customer\
    \ implements Serializable {\n    @Id\n    @GeneratedValue(strategy = GenerationType.SEQUENCE,\n\
    \                    generator = \" CustomerSequence\")\n    private Integer id;\n\
    \    private String name;\n\npublic Integer getId() { return id; }\n    public\
    \ void setId(Integer id) { this.id = id; }\n\npublic String getName() { return\
    \ name; }\n    public void setName(String name) { this.name = name;}\n}\n```\n\
    \n### The `@GeneratedValue` Annotation\n\nThe `@GeneratedValue` annotation tells\
    \ the persistence framework to autopopulate this column with the specified sequence\
    \ generator, which must be defined on one of the entities in your persistence\
    \ archive. (It is defined directly on the `Customer` entity.) A `@SequenceGenerator`\
    \ annotation defines a sharable sequence generator, which can either define a\
    \ new framework-generated sequence or refer to an existing sequence in your database.\
    \ ID generators will be explored more fully in [Chapter 4](../Text/9781430246923_Ch04.xhtml).\n\
    \n## Composite Primary Key\n\nIf an entity’s primary key maps to multiple database\
    \ columns, it uses a complex, or composite, primary key. This may be represented\
    \ in one of two ways on the entity class. The entity may declare each field in\
    \ the composite key directly on the entity class (annotating each one with `@Id`),\
    \ and specify a composite key class that provides these exact same fields in an\
    \ `@IdClass` annotation. Alternatively, the entity may designate a single, complex\
    \ field to represent its primary key by annotating that field with `@EmbeddedId`.\
    \ The class type of the `@EmbeddedId` field is the entity’s composite key class.\
    \ This composite key class is annotated `@Embeddable` and must specify the mapping\
    \ details for each of its fields. These fields will end up mapping to the base\
    \ table on the entity. With either approach, the composite primary key class must\
    \ override the `hashCode()` and `equals(Object obj)` methods on `java.lang.Object`.\n\
    \n[Listing 3-8](#9781430246923_Ch03.xhtml#list8) shows how these options look.\n\
    \n[***Listing 3-8.***](#9781430246923_Ch03.xhtml#_list8)  An Entity with a Composite\
    \ Primary Key Using `@IdClass`\n\n```\n@Entity\n@IdClass(CustomerPK.class)\npublic\
    \ class Customer implements Serializable {\n    @Id\n    private Integer customerId;\n\
    \    @Id\n    private String name;\n\npublic Integer getCustomerId() { return\
    \ customerId; }\n    public void setCustomerId(Integer customerId) { this.customerId\
    \ = customerId; }\n    public void setName(String name) { this.name = name; }\n\
    \    public String getName() { return name; }\n}\n```\n\n### The `@IdClass` Annotation\n\
    \n`The @IdClass` identifies an ordinary POJO (such as the example shown in [Listing\
    \ 3-9](#9781430246923_Ch03.xhtml#list9)) that does not require any metadata. Any\
    \ mapping details required for the primary key fields are specified on the fields\
