    \ is not actually returned to the client, but is intercepted by the EJB container\
    \ and unwrapped to service method calls on the `Future<V>` object that was actually\
    \ returned to the client when the client invoked the method.\n\n# Dependency Injection\n\
    \nIn [Chapter 1](../Text/9781430246923_Ch01.xhtml), we introduced the concept\
