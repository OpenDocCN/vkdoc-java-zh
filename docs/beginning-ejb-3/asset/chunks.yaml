    EJB 架构简介


    当我们着手撰写本书时，目标是向开发者介绍企业级 JavaBeans (EJB)，并着重关注这项技术如何在日常的真实世界应用中使用。*JSR-345：企业级
    JavaBeans*^(*TM*)*，3.2 版 EJB 核心合约与需求* 是一份深度的规范，同时满足了初级开发者和硬核高级用户的需求。这是一个庞大的受众群体，而作为参考指南，EJB
    规范文档很好地覆盖了这一点。在撰写一本关于如何*使用* EJB 的书籍时，我们必须缩小受众范围；尽管如此，我们相信本书能够满足大多数 Java EE 开发者的需求。


    本书的目标读者是那些熟悉 Java、曾使用早期版本的 EJB 或其他技术构建过单层或多层应用，并准备迎接使用基于标准的技术构建企业级应用的挑战（与回报）的开发者。考虑到总共
    1100 页的参考材料 [涵盖 EJB 和 Java 持久化 API (JPA) 规范] 可能令人望而生畏，我们为开发者提供了一条入门路径，逐步展开 EJB
    的各个部分，并为您提供所需的信息和代码示例，以便您卷起袖子开始工作。


    随着每一章的展开，您不仅将学习规范的新领域，还将通过具体示例学习如何将其应用到您自己的应用程序中。许多示例直接来源于在第 7 章和第 12 章中构建的综合性、端到端的
    Java EE 企业级葡萄酒在线应用，以便您了解它们如何融入更大的图景。我们鼓励您采纳这些示例并加以实践。在您喜欢的 IDE 或开发环境中尝试它们，进行修改并尝试新事物。本书涵盖的
    EJB 及相关 API——JPA、Web 服务以及上下文和依赖注入 (CDI)——为您提供了丰富的操作空间。一旦您熟悉了构建、部署和测试的基础知识，您会发现
    EJB 组件不仅功能强大，而且易于构建和使用。


    本书的作者们共同使用 EJB 与 Java EE 技术栈中的其他技术构建了许多应用程序，我们试图在其中收录关于我们学到的实用模式、我们发现的成功策略以及您可以避免的一些陷阱的建议。本书的大部分章节致力于探索
    EJB 的特定领域，但我们还包含了关于 Java 持久化 API (JPA)、上下文和依赖注入 (CDI)、Web 服务、评估 EJB 应用程序性能以及部署到您选择的
    Java EE 应用服务器的章节。本章末尾的“入门”部分将帮助您设置环境，以运行本书每章末尾提供的许多有用的示例应用程序。


    我们希望本书不仅能作为 EJB 信息的参考指南，还能作为操作指南和实用示例库，供您在构建自己的应用程序时参考。祝您阅读愉快！


    EJB 简介


    在 20 世纪 90 年代末，随着 Java 因解决大规模应用企业需求的独立技术（如 RMI、JTA 和 CORBA）的出现而得到加强，对一种能够统一这些技术并将其纳入标准组件开发模型的业务组件框架的需求应运而生。EJB
    应运而生以满足这一需求。在随后的几年里，EJB 不断发展以包含众多特性（同时明智地拒绝了其他特性），并已成熟为一个健壮且标准的框架，用于在分布式、多用户环境中部署和执行业务组件。


    什么是 EJB？


    EJB 的每个版本都通过 Java 社区流程 (JCP) 作为 Java 规范请求 (JSR) 进行管理。本书涵盖的最新版本由 *JSR 345：企业级 JavaBeans*^(*TM*)*3.2*
    定义。EJB 3.0 之前的 EJB JSR 涵盖了持久化组件，但自从引入 JPA 以来，持久化现在通过其自身的 JSR 进行管理。尽管如此，这两个领域相辅相成，我们在本书中包含了几个主要致力于
    JPA 的章节。


    EJB 3.2 规范，标题为 *JSR 345：企业级 JavaBeans*^(*TM*)*，3.2 版 EJB 核心合约与需求*，连同 EJB 3.2 API
    中定义的类库，共同定义了一个组件模型和一个容器框架。


    EJB 组件模型


    作为组件模型，EJB 定义了开发者可以按如下方式构建和定制的三种对象类型：


    *   *会话 Bean* 可以是有状态的、无状态的或单例的，它们执行业务服务操作。这些服务可以声明式地配置为在分布式、事务性和访问控制的上下文中运行。

    *   *消息驱动 Bean* (MDB) 通过与消息队列或主题关联，响应外部事件而被异步调用。


    与此相辅相成的是，Java 持久化 API (JPA) 主要定义了以下持久化对象类型：

