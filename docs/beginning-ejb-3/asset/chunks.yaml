- fmt: 'An EAR file may contain an application-level deployment descriptor, `application.xml`,
    in its `META-INF` directory. This file is optional in Java EE 5, since it is now
    possible to rely on default rules to provide default names and properties for
    each module. By default, each module name defaults to the short name of its archive
    file, minus the file suffix (`.jar`, `.war`, and so on). Defining an `application.xml`
    descriptor allows you to refine the default names and properties and to choose
    selectively which modules in the EAR file to include in the application for a
    particular deployment.


    ![image](Images/sq.jpg) **Note** A WAR file and an EAR file are standard JAR files
    with a `.war` or `.ear` extension respectively.


    ## Assembler-Specific Tasks


    Depending on the completeness and the complexity of the deployment descriptors
    for each module, the Assembler may be required to complete or refine some of the
    external references declared by the Provider. In many cases, the modules are sufficiently
    self-contained and complete so that there is no further work for the Assembler
    to perform, even when a deployment descriptor is not supplied by the Provider.
    In more complex deployment scenarios, when Provider-supplied documentation is
    used (possibly communicated through description properties on either the annotations
    or in the deployment descriptor), the Assembler may need to consolidate semantically
    equivalent but disparately named resources into a minimal, distinct set. Conversely,
    the Assembler may need to avoid resource name collisions by renaming resource
    references that share the same name but hold different semantics.


    For example, if the Assembler is bundling two Java EE modules produced by different
    providers into a single Java EE application, both providers may reference the
    same logical EJB but use different names, or they may reference them with the
    names not yet bound. It is the responsibility of the Assembler to detect cases
    such as this, using the documentation provided by the Provider(s), and update
    the EJB references to bind to a single name. This name may be chosen by the Assembler
    and assigned to the EJB in that application context.


    Any changes made by the Assembler are applied only to the module and application
    deployment descriptor files, and not to the Java source. This process works because
    of the rules of precedence dictated by Java EE, which in the case where conflicting
    metadata properties are defined both in the Java annotation source and the XML
    deployment descriptors, the deployment descriptors will prevail. The Assembler
    is able to resolve inconsistencies in the Java source by working only with the
    deployment descriptor files.


    ## The Deployer


    The tasks and deliverables of the Deployer are depicted in [Figure 11-3](#9781430246923_Ch11.xhtml#Fig3).


    ![9781430246923_Fig11-03.jpg](Images/9781430246923_Fig11-03.jpg)


    [Figure 11-3.](#9781430246923_Ch11.xhtml#_Fig3) Tasks and deliverables of the
    Application Deployer


    ### Deployer-Specific Tasks


    Again using instructions from the Assembler (and Provider)—typically communicated
    through description properties in the deployment descriptors or source annotations,
    the Deployer is required to bind all external references onto concrete resources
    (EJB references, resource references, persistence unit references, and so on)
    in the target application server environment. Only the Deployer can presume to
    know about the target server environment, and Java EE has deliberately added a
    layer of indirection to all resource usage to allow this binding to occur without
    affecting the work of either the Provider or the Assembler. This is why all resources
    used by the Java EE components are referred to via indirect references.


    As was the case with the Assembler, Java EE policy dictates that the Deployer
    is allowed to make changes only to the XML deployment descriptor files and not
    to annotations in the Java source.


    ### Invoking the Application Server-Specific Deployment Tool


    Finally, your Java EE module or your Java EE application is ready to be submitted
    to the application server. Your application server will provide a deployment tool
    that lets you complete the deployment and install the Java EE components in the
    application server, ready to be executed by the end-user applications. During
    this stage, the deployment tool will validate the module(s) being submitted for
    internal integrity and ensure that all resources can be bound to actual objects
    that reside in the application server environment. The deployment will fail if
    any required resources cannot be located at deploy time, or if referenced library
    components are not found.


    ## Summary of Overview


    Java EE deployment lets you deploy individual modules, library components, or
    complete applications. In many cases, deployment may simply involve packaging
    the compiled source, together with the descriptors (a `persistence.xml` file is
    mandatory for persistence units, but `ejb-jar.xml`, `web.xml`, and `application.xml`
    files are optional for an EJB JAR, WAR and EAR modules respectively) and submitting
    them to a deployment tool. When assembling applications from multiple modules
    that may have been built by different component providers and may be of differing
    versions, the Assembler role takes on greater importance.


    ## Java EE Deployment Infrastructure


    Now that we have summarized the deployment process, let us explore some areas
    of the Java EE infrastructure that are central to deployment. An understanding
    of this topic is useful when it is time to make your own decisions about how to
    package your code into modules and to resolve and bind external references.


    ### The Java EE Server


    The *Java EE server* is the program running inside your application server that
    provides enterprise services to your Java EE components when they are executed.
    The Java EE server is also responsible for handling deployment requests and redirecting
    them to the Java EE containers that it hosts.


    The Java EE specification defines the list of core services that must be supported
    by a Java EE server. These include messaging, database, security, transaction,
    persistence, and many other services. The Java EE server may also be extended
    to provide additional services, or alternative implementations of existing services,
    which are beyond those mandated by the specification. Java EE specification defines
    how a server may be extended to provide its containers with access to remote and
    external services by adapting them into the Java EE environment using resource
    adapters through the Java EE Connector API.


    ### The Java EE Containers


    The primary purpose of the Java EE server is to support Java EE containers, which
    provide various environments in which Java EE components are run. The Java EE
    specification stipulates support for four Java EE containers: EJB, Web, application
    client, and applet. While the EJB and Web containers execute in the application
    server running in the middle tier, the application client container typically
    executes in a Java SE environment on the client tier, and the applet container
    typically runs inside a Web browser. Nonetheless, they all rely on their underlying
    Java EE server for the many enterprise services that they in turn provide—through
    APIs—to the components that execute inside their container environment. For example,
    a Java EE server provides native messaging services to a Java EE container, and
    the container exposes messaging services to its components through the JMS (Java
    Message Service) API. Similarly, the container exposes database services through
    Java Database Connectivity (JDBC), transaction services through Java Transaction
    API (JTA), and so on. The Java EE containers also interpose on all communication
    between Java EE application components executing in Java EE containers, to provide
    component and resource injection. This is illustrated in [Figure 11-4](#9781430246923_Ch11.xhtml#Fig4).


    ![9781430246923_Fig11-04.jpg](Images/9781430246923_Fig11-04.jpg)'
