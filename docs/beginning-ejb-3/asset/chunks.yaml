    本章介绍如何使用消息驱动 Bean（MDB）为应用程序添加异步、事件驱动的行为。本章将通过代码示例解释和演示 Java 的消息传递 API——JMS。


    第 6 章：EJB 与 Web 服务


    会话 Bean 为 Web 服务提供了出色的实现方案，本章将探讨 EJB 如何支持这两种技术的完美结合。


    第 7 章：集成会话 Bean、实体、消息驱动 Bean 与 Web 服务


    在分别介绍完所有不同的组件模型类型后，第 7 章将它们整合到一个集成的 Java EE 应用程序中。我们认为，了解所有组件如何协同工作以构建一个可运行的应用程序，对您来说会特别有用。


    第 8 章：EJB 中的事务支持


    EJB 提供了丰富的事务服务支持，使得 Bean 提供者能够轻松地以声明方式为企业 Bean 指定由容器提供的自定义事务行为。同时，EJB 也允许企业 Bean
    选择退出此模型，自行控制事务划分行为。本章将两种不同的事务模型应用于同一个逻辑场景，以权衡每种方法的优劣。


    第 9 章：EJB 性能与测试


    本章提供了宝贵的视角，介绍如何评估 EJB 组件的性能，以帮助您决定在 EJB 提供的众多选项中，哪一个最适合您的应用程序。除了解释如何设置性能测试外，我们还展示了一些我们运行过的性能测试案例，并附上了我们对结果的评估。


    第 10 章：上下文与依赖注入


    上下文与依赖注入（CDI）服务在 Java EE 6 中引入，它通过一种强大的方式增强了 EJB 中定义的组件模型，即向应用程序注入生命周期由服务器上下文管理且方便管理的资源。本章介绍
    CDI，并解释 EJB 开发者如何利用这种支持来丰富应用程序的行为。


    第 11 章：EJB 打包与部署


    本章涵盖了组装和部署，我们将讨论应用程序组装者和部署者角色所需完成的任务。本章讨论如何打包 EJB 和持久化模块，如何以不同方式将模块组装到企业归档（EAR）文件中，如何解析模块之间以及打包在不同模块中的
    EJB 之间的引用，以及如何将资源需求绑定到目标应用服务器环境中已安装的具体资源。


    第 12 章：EJB 客户端应用程序


    在本章中，我们将引导您了解可用于构建应用程序的应用程序架构和不同的编程模型，包括每种方法的优缺点。完成这些介绍后，我们将确定一种应用程序架构——使用 JavaServer
    Faces（JSF）技术开发 Web 应用程序。然后，我们将深入探讨 JSF 的架构和概念，并重点介绍如何将 JSF 用户界面组件和 JSF 导航模型与我们之前在第
    7 章中开发的 EJB/WebService/JPA 后端应用程序集成。


    最后，我们还将解释如何使用轻量级应用程序客户端容器在纯 Java SE 环境中执行您的会话 Bean。这个轻量级容器为其环境中执行的 EJB 提供了真正的
    EJB 容器所提供的一些服务（例如容器注入）。


    第 13 章：在可嵌入 EJB 容器中进行测试


    在生产部署中，EJB 组件在 Java EE 环境中的应用服务器内运行。出于测试目的，EJB 允许您在 EJB 容器的一个轻量级子集中测试您的 EJB 组件，该子集称为
    EJB Lite，并作为可嵌入的 EJB 容器实现，可以在纯 Java SE 环境中运行。本章涵盖了多种 EJB 测试场景，并指导您使用 JUnit 在 GlassFish
    的可嵌入 EJB 容器中测试 EJB 组件（和 JPA 实体）。


    开始入门


    本章的这一部分将帮助您准备好运行本书其余部分示例所需的软件安装和配置。在撰写本书时，EJB 3.2 规范即将最终定稿。GlassFish 应用服务器已经实现了该规范，使开发者社区能够亲身体验新规范。


    GlassFish 是一个实现了 Java EE 平台最新特性的开源应用服务器。事实上，GlassFish 是 Java EE 平台所有规范（包括 EJB
    3.2 规范）的参考实现。NetBeans IDE 紧密跟踪 GlassFish 的发布，确保 NetBeans 支持 Java EE 规范的最新状态，并使
    NetBeans 成为部署和运行本书示例的理想平台。您会发现，后续的每一章都附带一个 NetBeans 应用程序项目，该项目由一个或多个额外的项目组成，这些项目代表演示该章所涵盖功能的
    EJB、Web 或其他模块。尽管这些示例应用程序都配置为在 GlassFish 服务器中运行，但它们是可移植的（由于遵循 Java EE 标准），并且可以部署到您选择的任何
    Java EE 7 服务器。


    虽然我们是在 Windows 7 环境下使用 NetBeans 构建和测试本书中的示例，但代码示例并不特定于操作系统，它们可以在任何能够运行 NetBeans
    及其集成的 GlassFish 服务器的系统上执行。尽管如此，您可能需要在其他操作系统上调整环境设置，才能安装和运行 NetBeans 及其集成的 GlassFish
    服务器。


    ![image](img/sq.jpg) **注意** 您可以在以下网站找到有关 NetBeans IDE 及其集成的 GlassFish 应用服务器的更多详细信息：`http://netbeans.org/features/index.html`。


    本章的其余部分将涵盖以下内容：


    *   下载 NetBeans IDE

    *   安装 NetBeans 及其集成的 GlassFish 服务器

    *   测试 NetBeans 和 GlassFish 的安装

    *   管理 GlassFish 应用服务器


    即使您熟悉 NetBeans 和 GlassFish，我们也建议您阅读以下章节，因为运行后续章节中的示例代码依赖于正确完成此设置。


    下载 NetBeans IDE


    您可以从以下位置下载最新的 NetBeans 安装程序：


    `http://netbeans.org/downloads/`


    请确保您下载的是包含“Java EE”技术的安装程序，如图 1-1 所示。此安装程序还将包含所需的 Java SE 和 GlassFish 包。Ant 随
    GlassFish 一起提供；您可以使用它，也可以配置环境属性以使用其他安装。GlassFish 项目建议您使用其安装包中捆绑的 Ant。


    ![9781430246923_Fig01-01.jpg](img/9781430246923_Fig01-01.jpg)


    图 1-1. 下载 NetBeans IDE


    ![image](img/sq.jpg) **注意** 当我们开始编写本书时，最新的 NetBeans 版本是 7.2。在编写过程中，7.3 版本发布了。我们已经使用
    NetBeans 7.3 版本测试了设置和示例代码。


    下载完成后，您就可以开始安装 NetBeans 及其集成的 GlassFish 服务器了。

