    @ElementCollection


    A useful mapping feature introduced in JPA 2.0 is the ability to embed collections
    of non-entity objects within an entity or mapped superclass and to make them wholly
    owned by the embedding class. The `@ElementCollection` is the collection analog
    to using `@Embeddable` and `@Basic` fields; only the instances in the collection
    are always stored in a separate table from the owning entity or mapped superclass.
    Similarly, it is the non-entity analog to the entity relationship types `@OneToMany`.
    [Listing 4-22](#9781430246923_Ch04.xhtml#list22) shows our Employee entity holding
    two element collections, one of `@Embeddable` instances and one of `@Basic` instances.


    [***Listing 4-22.***](#9781430246923_Ch04.xhtml#_list22)  Person.java, an Entity
    that Holds two @ElementCollection fields


    ```

    @Entity

    public abstract class Person implements Serializable {

      ...

      @ElementCollection(fetch=FetchType.LAZY)

      private List<Address> addresses;


    @ElementCollection

      Private Collection<String> favoriteCities;


    public Person() {

      }


    /* get/set methods */

    }

    ```


    This code snippet demonstrates some of the simplest forms of `@ElementCollection`
    usage, largely assuming default mappings. By using more advanced mappings, you
    can customize the way the collection mapping table is wired up to the root table
    for `Person`, whether lookup should be eager or lazy, column and table names,
    how to specify an element collection as a `Map`, and many other details.


    Polymorphic Relationships


    As shown in the previous examples, entity relationships can be specified between
    both concrete and abstract entities in a hierarchy. You can define a relationship
    with any entity in an inheritance hierarchy, and it will implicitly involve subtypes
    of that entity as well. Even persistent entity relationship fields declared on
    mapped superclasses are polymorphic. A relationship that implicitly includes subtypes
    in this way is known as a *polymorphic relationship*.


    In JPA, relationships may be defined against any other entity class, including
    abstract supertype entities in a hierarchy. This support for polymorphic relationships
    complements JPA’s support for mapping class hierarchies, and it provides a powerful
    construct for querying entities at any level across an entity type hierarchy.
    In the previous example of entity hierarchy, the `FullTimeEmployee.manager`-to-`Employee.managedEmployees`
    relationship illustrates a one-to-many, bidirectional relationship between the
    concrete `FullTimeEmployee` (`manager`) and its collection of abstract `Employee`
    (`managedEmployee`) instances. This example shows a relationship between entities
    within the same hierarchy, but it could just as easily be defined between entities
    in separate entity hierarchies.


    Relationship Mapping


    Mapping polymorphic relationships requires no special knowledge about the inheritance
    table mapping strategy for either entity in the relationship. This is evident
    from the fact that the relationship field mappings remained identical across our
    sample entity classes as we applied each of the three inheritance mapping strategies.
    All relationships map to the primary key of the target class, a mapping assumption
    made possible because of the spec requirement that all classes in a class hierarchy
    share a common primary key structure, even if each subclass maps to its own table.
    The mapping information defined for each entity is sufficient for the JPA persistence
    framework to resolve base type references onto the actual subclass instances.
    Relationship fields are derived automatically using `JOIN` and `UNION` statements,
    and these queries are further constrained by the use of `WHERE` clauses, which
    refer to discriminator column values.


    Polymorphic JPQL Queries


    Similarly, JPQL and criteria API queries can select or join entities of a supertype
    class, and any instances of subtypes matching the query criteria will be returned
    in the query result list. What’s more, queries may use internal `JOIN` clauses
    to bind references to types anywhere along a supertype hierarchy, with the only
    restriction being that the left and right side of the `JOIN` clause resolve to
    a common base type.


    In the previous inheritance hierarchy, the `"Person.findAll"` and `"Employee.findAll"`
    named queries defined on the abstract `Person` and `Employee` entities are examples
    of polymorphic queries. Instances returned from these queries are all concrete
    entities—either `FullTimeEmployee` or `PartTimeEmployee`.


    By way of example, let us look at some code from our sample client. [Listing 4-23](#9781430246923_Ch04.xhtml#list23)
    queries all `Employee` instances whose home address is somewhere in San Mateo.
    The query is issued on the abstract `Employee` entity, and it traverses through
    the `homeAddress` relationship field defined on the root `Person` entity. Any
    entities that are returned from this will be concrete, either `FullTimeEmployee`
    or `PartTimeEmployee`.


