    企业 Bean 是 EJB 服务层的核心。通过会话 Bean，EJB 容器提供了事务事件的声明式划分，以及选择在 Bean 或应用程序客户端代码中显式划分事务事件的选项。让我们分别考虑这两种方法，从默认选项开始：利用声明式标记进行容器管理事务划分。


    容器管理事务（CMT）划分


    EJB 容器提供内置的事务管理服务，默认情况下会话 Bean 和 MDB 均可使用这些服务。Bean 通过元数据（使用注解或 XML）为其每个方法指定事务特性，EJB
    容器遵循这些指令来确定要执行的事务操作（如果有的话）。使用这些指令，EJB 容器可以在方法被调用时自动开始一个新事务，或挂起或重用现有事务，并可能在方法返回给调用者之前提交事务。


    ![image](img/sq.jpg) **注意** 只有 Bean 开发者可以分配企业 Bean 的事务管理类型。允许应用程序组装者通过 `ejb-jar.xml`
    文件覆盖 Bean 的方法级容器管理事务属性，但他们必须谨慎行事，以避免死锁的可能性。通常不允许应用程序组装者和部署者覆盖 Bean 的事务管理类型。


    当 EJB 在元数据中声明其事务行为时，容器会拦截对企业 Bean 方法的调用，并在会话 Bean 的方法边界应用事务行为，提供一组固定的选项供您为每个方法指定。容器提供的默认行为（即未指定其他指令时）是在调用方法之前立即检查当前线程是否关联了事务上下文。如果没有可用的事务上下文，容器会在执行方法之前开始一个新事务。如果存在可用的事务，容器会允许该事务传播到方法调用，并使方法代码可用。然后，在从方法调用返回时，容器会再次检查。如果容器负责创建了新的事务上下文，它会在方法退出后自动提交该事务。如果容器没有创建事务，则允许该事务不受影响地继续。通过拦截
    Bean 的方法调用，EJB 容器能够在运行时应用在开发时以声明方式指定的事务行为。


    上一段描述的默认行为只是容器提供的六种 CMT 划分选项之一。您可以将这六种划分选项中的任何一种归因于会话 Bean 上的任何方法。某些属性值需要满足特定条件；当条件不满足时，会抛出异常。这六种属性列于表
    8-2 中。


    表 8-2. 容器事务属性定义

