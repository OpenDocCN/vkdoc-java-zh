    When Do You Use Web Services?


    Web Services provides a standard way to expose existing or new applications and
    data to external parties—including customers, suppliers, and partners—or across
    departments in an enterprise, using industry standards. Web services can also
    be used to integrate heterogeneous applications and data.


    While many enterprises use Web services internally, there are numerous examples
    of external Web services that are available. Some of the popular ones are package-tracking
    services (provided by shippers like FedEx, UPS, and USPS). E-commerce websites,
    like `www.amazon.com`, `www.yahoo.com`, `www.ebay.com`, and `www.google.com` expose
    their core functionality using Web services. Developers can subscribe and use
    the Web services provided by these e-commerce providers to develop applications
    that add value to, or provide seamless integration with, back-end systems.


    Java EE and Web Services


    The Java EE platform has evolved over the last few years to become a mature, stable,
    reliable, and available platform for enterprise applications. While technologies
    like JDBC (Java Database Connectivity), JMS, and EJB have been in the Java EE
    platform right from the start, however, only in J2EE 1.4 has the development and
    deployment of Web services assumed better shape as they’ve been standardized to
    make the Web services in the Java EE platform more portable across application
    servers and interoperable with .NET Web Services. The common goal for the Java
    EE specifications was to provide ease of development and deployment for applications
    and services. Some of the key specifications in Java EE that are related to Web
    services are JAX-WS, JAXB, JAXR, SAAJ, and the JSR 181 annotations. In the following
    sections, we will show what these specifications are and how they can be used
    with EJB. [Figure 6-3](#9781430246923_Ch06.xhtml#Fig3) shows how EJB interacts
    with different Web service-related specifications under the Java EE platform.


    ![9781430246923_Fig06-03.jpg](Images/9781430246923_Fig06-03.jpg)


    [Figure 6-3.](#9781430246923_Ch06.xhtml#_Fig3)  EJB and Web Services


    JAX-WS


    JAX-WS (Java API for XML Web Services) defines Java APIs and annotations for accessing
    Web services from Java applications and Java EE components like EJBs. JAX-WS provides
    mapping facilities between WSDL and Java interfaces, or from Java interfaces to
    WSDL. WSDL-mapped interfaces are called *service endpoint interfaces*. JAX-WS
    also provides the client-side and server-side APIs and annotations to send and
    receive Web service requests via SOAP. The JAX-WS specification in Java EE depends
    on other relevant specifications of the Java EE platform, including JSR 175 (related
    to annotations), JSR 181 (related to Web Services), and JAXB. It also provides
    support for the latest Web services standards like SOAP 1.2 and WSDL 2.0\. [Figure
    6-4](#9781430246923_Ch06.xhtml#Fig4) shows a simplified diagram of a Web service
    invocation.


    ![9781430246923_Fig06-04.jpg](Images/9781430246923_Fig06-04.jpg)


    [Figure 6-4.](#9781430246923_Ch06.xhtml#_Fig4)  Web service invocation internals


    JAX-RS


    JAX-RS (JAX-RS: Java API for RESTful Web Services) defines Java APIs and annotations
    for creating Web services based on the REST architectural pattern. JAX-RS version
    1.1 became an integral part of Java EE 6 through JSR-311\. JAX-RS provides annotations
    like `@PATH`, `@GET`, `@PUT`, `@POST`, `@DELETE`, `@HEAD`, `@PRODUCES`, `@CONSUMES`,
    and so forth that help in mapping a POJO (plain old java objects) as a Web resource.


    JAXB


    Web services consumers and providers use XML messages to send requests and responses.
    These messages can be something like a purchase order that has an XSD, which allows
    the parties involved (provider and consumer) to understand the purchase order.
    Working with XML documents using low-level language APIs can be time consuming
    and can involve complex code. The *JAXB (Java Architecture for XML Binding)*specification,
    in context of Java EE, provides standard APIs for representing XML documents as
    Java artifacts so that developers can work off Java objects that represent the
    XML documents based on schemas (XSD). The JAXB specification facilitates unmarshalling
    XML documents into sets of Java objects and marshalling sets of Java objects back
    into XML documents. The JAXB specification provides full support for XML schemas
    and binding support for JAX-WS, and it leverages other Java EE specifications,
    such as JSR 175.


    JAXR


    UDDI is the standard for Web services registry. The *JAXR (Java API for XML Registries)*
    specification defines a standard set of APIs that allow Java clients to access
    the registry. These APIs can also be used against XML registries other than UDDI
    ones.


    SAAJ


    Similar to the attachments that you can use in e-mail messages, you can send attachments
    to the SOAP messages that invoke Web services. *SAAJ (SOAP with Attachments API
    for Java)**Java API for XML Registries* defines a standard set of APIs that allow
    Java SE or EE components to construct SOAP messages with attachments.


    JSR 181


    *JSR 181 (Web Services Metadata for the Java Platform)* defines a standard set
    of annotations that can be used to simplify Web services development. These annotations
    can be used with Java classes or EJB session beans that can be JAX-WS components.


    EJB Stateless Session Beans as Web Services


    Web services endpoints that are described using WSDL are stateless in nature.
    Stateless session beans also share the same statelessness and are well suited
    for developing Web services. The EJB specification relies on other Web services
    specifications in the Java EE platform, including JAX-WS, JAXB, and JSR 181, either
    to consume Web services or publish stateless session beans as Web services.


    A *service endpoint interface (SEI)* is one that is mapped to a Web service. JAX-WS
    provides this mapping layer. In order to develop a new Web service, you can take
    either the bottom-up or top-down approach, both of which are described below.'
  trans: '

    清单 6-8 展示了一个名为 `CreditCheck` 的简单 RESTful Web 服务，它接收信用卡号作为输入，并根据其有效性返回 `true` 或
    `false`。为简单起见，我们的方法始终返回 `true`。


    ***清单 6-8.***  CreditCheck.java


    ```

    package com.apress.ejb.chapter06.services;

    import javax.ws.rs.Consumes;

    import javax.ws.rs.PUT;

    import javax.ws.rs.Path;

    import javax.ws.rs.PathParam;

    import javax.ws.rs.Produces;


    @Path("creditCheck")

    public class CreditCheck {

        @PUT

        @Consumes("text/plain")

        @Produces("text/plain")

        @Path("isValid")

        public boolean isValid(@PathParam("cardNumber")String ccNumber) {

            return true;

        }

    }

    ```


    用户可以按如下方式调用 `CreditCheck` 中的 `isValid` 方法，并且 `ccNumber` 将被赋值为 12345。


    ```

    http://<host>:<port>/<resource>/creditCheck/isValid/12345

    ```


    RESTful 与基于 SOAP 的 Web 服务


    表 6-2 列出了 RESTful Web 服务与基于 SOAP 的 Web 服务之间的重要区别和相似之处。


    表 6-2. RESTful 与基于 SOAP 的 Web 服务


    | 标准 | SOAP | RESTful |

    | --- | --- | --- |

    | 规范 | JAX-WS | JAX-RS |

    | 简单/复杂 | 复杂 | 简单 |

    | 消息大小 | 大（XML 标记） | 小（无额外 XML 标记） |

    | 基于标准 | 是 | 否 |

    | 传输协议 | HTTP, SMTP, JMS | HTTP |

    | 缓存 | 否 | GET 操作可缓存 |

    | 协议 | JMS, SMTP, HTTP | HTTP |

    | 人类可读负载 | 否 | 是 |

    | 语言和平台 | 独立 | 独立 |


    何时使用 Web 服务？


    Web 服务提供了一种标准方式，利用行业标准，将现有或新的应用程序和数据暴露给外部各方（包括客户、供应商和合作伙伴），或跨企业部门进行共享。Web 服务也可用于集成异构应用程序和数据。


    虽然许多企业在内部使用 Web 服务，但也有大量可用的外部 Web 服务示例。其中一些流行的服务包括包裹跟踪服务（由 FedEx、UPS 和 USPS 等承运商提供）。电子商务网站，如
    `www.amazon.com`、`www.yahoo.com`、`www.ebay.com` 和 `www.google.com`，通过 Web 服务暴露其核心功能。开发者可以订阅并使用这些电子商务提供商提供的
    Web 服务，来开发能够为后端系统增加价值或与其无缝集成的应用程序。


    Java EE 与 Web 服务


    Java EE 平台在过去几年中不断发展，已成为一个成熟、稳定、可靠且可用的企业应用平台。虽然 JDBC（Java 数据库连接）、JMS 和 EJB 等技术从一开始就存在于
    Java EE 平台中，但直到 J2EE 1.4 版本，Web 服务的开发和部署才呈现出更好的形态，因为它们已被标准化，使得 Java EE 平台中的 Web
    服务在应用服务器之间更具可移植性，并与 .NET Web 服务可互操作。Java EE 规范的共同目标是简化应用程序和服务的开发与部署。Java EE 中与
    Web 服务相关的一些关键规范包括 JAX-WS、JAXB、JAXR、SAAJ 和 JSR 181 注解。在接下来的章节中，我们将展示这些规范是什么，以及如何将它们与
    EJB 一起使用。图 6-3 展示了 EJB 如何在 Java EE 平台下与不同的 Web 服务相关规范进行交互。


    ![9781430246923_Fig06-03.jpg](img/9781430246923_Fig06-03.jpg)


    图 6-3.  EJB 与 Web 服务


    JAX-WS


    JAX-WS（用于 XML Web 服务的 Java API）定义了用于从 Java 应用程序和 Java EE 组件（如 EJB）访问 Web 服务的 Java
    API 和注解。JAX-WS 提供了 WSDL 与 Java 接口之间，或从 Java 接口到 WSDL 的映射功能。映射到 WSDL 的接口称为*服务端点接口*。JAX-WS
    还提供了客户端和服务器端的 API 及注解，用于通过 SOAP 发送和接收 Web 服务请求。Java EE 中的 JAX-WS 规范依赖于 Java EE
    平台的其他相关规范，包括 JSR 175（与注解相关）、JSR 181（与 Web 服务相关）和 JAXB。它还支持最新的 Web 服务标准，如 SOAP
    1.2 和 WSDL 2.0。图 6-4 展示了一个简化的 Web 服务调用图。


    ![9781430246923_Fig06-04.jpg](img/9781430246923_Fig06-04.jpg)


    图 6-4.  Web 服务调用内部机制


    JAX-RS


    JAX-RS（JAX-RS：用于 RESTful Web 服务的 Java API）定义了用于创建基于 REST 架构模式的 Web 服务的 Java API
    和注解。JAX-RS 1.1 版本通过 JSR-311 成为 Java EE 6 的组成部分。JAX-RS 提供了诸如 `@PATH`、`@GET`、`@PUT`、`@POST`、`@DELETE`、`@HEAD`、`@PRODUCES`、`@CONSUMES`
    等注解，这些注解有助于将 POJO（普通 Java 对象）映射为 Web 资源。


    JAXB


    Web 服务的消费者和提供者使用 XML 消息来发送请求和响应。这些消息可以是诸如包含 XSD 的采购订单之类的内容，XSD 允许相关方（提供者和消费者）理解采购订单。使用低级语言
    API 处理 XML 文档可能非常耗时，并且涉及复杂的代码。在 Java EE 上下文中，*JAXB（用于 XML 绑定的 Java 架构）*规范提供了用于将
    XML 文档表示为 Java 工件的标准 API，以便开发者可以基于模式（XSD）处理代表 XML 文档的 Java 对象。JAXB 规范有助于将 XML
    文档解组为 Java 对象集，并将 Java 对象集编组回 XML 文档。JAXB 规范为 XML 模式提供全面支持，并为 JAX-WS 提供绑定支持，同时它还利用了其他
    Java EE 规范，例如 JSR 175。


    JAXR


    UDDI 是 Web 服务注册中心的标准。*JAXR（用于 XML 注册中心的 Java API）*规范定义了一组标准 API，允许 Java 客户端访问注册中心。这些
    API 也可用于 UDDI 之外的 XML 注册中心。


    SAAJ


    类似于可以在电子邮件中使用的附件，您也可以向调用 Web 服务的 SOAP 消息发送附件。*SAAJ（带附件的 SOAP API for Java）*定义了一组标准
    API，允许 Java SE 或 EE 组件构建带有附件的 SOAP 消息。


    JSR 181


    *JSR 181（Java 平台的 Web 服务元数据）*定义了一组可用于简化 Web 服务开发的标准注解。这些注解可用于 Java 类或 EJB 会话 Bean，这些
    Bean 可以是 JAX-WS 组件。


    作为 Web 服务的 EJB 无状态会话 Bean


    使用 WSDL 描述的 Web 服务端点本质上是无状态的。无状态会话 Bean 也具有相同的无状态特性，非常适合用于开发 Web 服务。EJB 规范依赖于
    Java EE 平台中的其他 Web 服务规范，包括 JAX-WS、JAXB 和 JSR 181，无论是用于消费 Web 服务，还是将无状态会话 Bean
    发布为 Web 服务。


    *服务端点接口 (SEI)* 是映射到 Web 服务的接口。JAX-WS 提供了这个映射层。为了开发一个新的 Web 服务，您可以采用自底向上或自顶向下的方法，这两种方法将在下面进行描述。

