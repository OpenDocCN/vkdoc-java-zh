    Pros and Cons of the TABLE_PER_CLASS Strategy


    Design-Time Considerations


    With the TABLE_PER_CLASS strategy, as new outermost concrete types are introduced
    into the hierarchy, new tables are added. This is nice because neither existing
    tables nor their data are affected in any way. However, since each type also maps
    all of its supertype fields, introducing a new field on a base class, or a new
    base entity itself, requires modifying the tables for all affected subtypes across
    the hierarchy to map any newly introduced fields.


    Performance Impact


    With the TABLE_PER_CLASS approach, querying across multiple types requires a `UNION`
    select statement, which may not perform well, but querying a single type is very
    efficient, since only one table is involved in the query. Polymorphic relationships
    (which involve supertypes) in this hierarchy should be avoided since they will
    necessarily require this `UNION` operation to resolve to concrete subtype instances.


    Comparison of O/R Implementation Approaches


    Now that we have explored the three inheritance mapping implementations, let’s
    look at some of the characteristics of a class inheritance hierarchy that should
    be considered when choosing which implementation approach to use for your type
    hierarchies. The following list contains subjective questions about your own entity
    hierarchies. They do not have precise answers; rather, they are meant to stimulate
    design considerations when building your application.


    *   Class hierarchies can be static, with a fixed number of subtypes, or they
    can be dynamic, with varying numbers of subtypes. How often will you need to incorporate
    new subtypes into your hierarchy?

    *   Hierarchies can be deep, with lots of subclasses, or they can be shallow,
    with only a few. How granular is your hierarchy?

    *   The types in a hierarchy may diverge greatly, with very different sets of
    properties on the subclasses than on the base class, or with very little difference
    in properties. How much do the persistent property sets of your entities diverge
    from one another?

    *   Will other entities define relationships with classes in this type hierarchy
    and, if so, will the base classes frequently be the referenced type?

    *   Will types in this hierarchy be frequently queried, updated, or deleted? How
    will the presence or absence of SQL `JOIN` or `UNION` operations impact your application’s
    performance?

    *   During the life of your application, how frequently will you be updating the
    structure of the type hierarchy itself? The impact of this type of change varies
    for each inheritance strategy with considerations that include the following:


    *   Adding or removing new types to the hierarchy (as when refactoring classes).

    *   Adding, removing, or modifying fields on an entity in the hierarchy.


    *   Adding, removing, or modifying relationships involving types in this hierarchy.


    ![image](Images/sq.jpg) **Note**   A comparison of the performance of these three
    inheritance strategies, along with details on how to set up your own performance
    comparison tests, is explored in [Chapter 9](../Text/9781430246923_Ch09.xhtml).
    Check out the results of our performance tests, and test your own entity hierarchies
    as you build them, to help you decide which strategy makes the best sense in the
    context of your application.


    Using Abstract Entities, Mapped Superclasses, and Non-Entity Classes in an Inheritance
    Hierarchy


    Within an entity class hierarchy, JPA allows both non-entity classes and abstract
    classes to be intermixed. Using the JOINED example above, let’s look at how we
    map these classes.


    Abstract Entity Class


    As shown in the previous section on inheritance hierarchies, JPA entities may
    be either concrete or abstract. An abstract entity is simply an entity that cannot
    be instantiated on its own—it can still be involved in entity relationships and
    queries, and its fields are persisted following the mapping strategy for its type
    hierarchy. [Listing 4-17](#9781430246923_Ch04.xhtml#list17) is an example of one
    of our abstract entities.


    [***Listing 4-17.***](#9781430246923_Ch04.xhtml#_list17)  Person.java, an Abstract
    Root Entity in a JOINED Inheritance Hierarchy


    ```

    /**

     * Person: An abstract entity, and the root of an inheritance hierarchy

     */

    @Entity

    @NamedQueries({

      @NamedQuery(name = "Person.findAll", query = "select o from Person o")})

    @Table(name = "CH04_JOIN_PERSON")

    @TableGenerator(name = "Person_ID_Generator", table = "CH04_JOIN_PERSON_ID_GEN",

                    pkColumnName = "PRIMARY_KEY_NAME", pkColumnValue = "Person.id",

                    valueColumnName = "NEXT_ID_VALUE")

    @Inheritance(strategy = InheritanceType.JOINED)

    public abstract class Person implements Serializable {

      ...

      @OneToOne(cascade=CascadeType.ALL)

      @JoinColumn(name = "HOME_ADDRESS")

      private Address homeAddress;

      ...

    }

    ```


    Not only is the abstract `Person` entity queryable (here we have defined a ­`"Person.findAll"`
    named query), it also holds an association with the `Address` entity that is shared
    by all of its subclasses. Although `Person` is abstract, it can specify its own
    mappings and its own table. It just won’t have its own discriminator value, since
    there will never be a concrete entity instance of the base class `Person`.


