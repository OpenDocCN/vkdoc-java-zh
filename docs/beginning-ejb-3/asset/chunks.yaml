    Notice that instead of injecting an EJB façade using the `@EJB` notation, we instantiate
    the Java façade (`JavaServiceFacade`) through its constructor and pass it the
    name of a `RESOURCE_LOCAL` persistence unit, which we can see from the original
    call is `"Chapter07-WineAppUnit-ResourceLocal".` This helper class is calling
    operations like `persistEntity()` and `removeCustomerOrder()` on the façade without
    explicitly calling for the operation to be committed, which is an indication that
    the façade uses implicit commit behavior.


    We also take care to ensure that the façade is notified, through its own `close()`
    method, after it is used. This allows it to release its own resources; notably,
    its `EntityManagerFactory` and `EntityManager` resources. These are housekeeping
    items you don’t need to worry about with EJBs, since the EJB container handles
    this level of resource management for you.


    Java Façade Using Application-Managed EntityManager


    This brings us to the details of the Java façade itself. This façade was actually
    quietly introduced in [Chapter 7](../Text/9781430246923_Ch07.xhtml), where it
    is bundled with the common persistence archive we are sharing from that chapter.
    We will now see how this is handled, by now examining the `JavaServiceFacade`
    class in [Listing 8-4](#9781430246923_Ch08.xhtml#list4):


    ***[Listing 8-4](#9781430246923_Ch08.xhtml#_list4).***  JavaServiceFacade.java,
    a transactional Java façade over JPA entities, exhibiting implicit commit behavior


    ```

    public class JavaServiceFacade {

      private final EntityManagerFactory emf;

      private final EntityManager em;


    public JavaServiceFacade() {

        this("Chapter13-EmbeddableEJBTests-ResourceLocal");

      }


    public JavaServiceFacade(String persistenceUnit) {

        emf = Persistence.createEntityManagerFactory(persistenceUnit);

        em = emf.createEntityManager();

      }


    public void close() {

        if (em != null && em.isOpen()) {

          em.close();

        }

        if (emf != null && emf.isOpen()) {

          emf.close();

        }

      }


    /**

       * All changes that have been made to the managed entities in the persistence
    context are applied

       * to the database and committed.

       */

      private void commitTransaction() {

        final EntityTransaction entityTransaction = em.getTransaction();

        if (!entityTransaction.isActive()) {

          entityTransaction.begin();

        }

        entityTransaction.commit();

      }


    public <T> T persistEntity(T entity) {

        em.persist(entity);

        commitTransaction();

        return entity;

      }


    public <T> T mergeEntity(T entity) {

        entity = em.merge(entity);

        commitTransaction();

        return entity;

      }


    public <T> void removeEntity(T entity) {

        em.remove(em.merge(entity));

        commitTransaction();

      }


    public <T> List<T> findAll(Class<T> entityClass) {

        CriteriaQuery cq = em.getCriteriaBuilder().createQuery();

        cq.select(cq.from(entityClass));

        return em.createQuery(cq).getResultList();

      }


    public <T> int getCount(Class<T> entityClass) {

        CriteriaQuery cq = em.getCriteriaBuilder().createQuery();

        Root<T> rt = cq.from(entityClass);

        cq.select(em.getCriteriaBuilder().count(rt));

        javax.persistence.Query q = em.createQuery(cq);

        return ((Long) q.getSingleResult()).intValue();

      }


    /**

       * <code>select object(wine) from Wine wine where wine.year = :year</code>

       */

      public List<Wine> getWineFindByYear(int year) {

        return em.createNamedQuery("Wine.findByYear", Wine.class).setParameter("year",
    year).getResultList();

      }


    /**

       * <code>select object(wine) from Wine wine where wine.country = :country</code>

       */

      public List<Wine> getWineFindByCountry(String country) {

        return em.createNamedQuery("Wine.findByCountry", Wine.class).setParameter("country",
    country).getResultList();

      }


    /**

       * <code>select object(wine) from Wine wine where wine.varietal = :varietal</code>

