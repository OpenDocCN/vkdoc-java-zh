    The next step is to define the `WineList` managed bean that will talk to the back-end
    EJB to get the list of all wines. [Listing 12-8](#9781430246923_Ch12.xhtml#list8)
    shows the code for the `WineList` bean. We will start by injecting the `SearchFacade`
    EJB using the `@EJB` annotation. The `findAllWines()` method in the bean class
    makes use of the injected `SearchFacade` stateless session bean and calls the
    `getWineFindAll()` business method that returns the list of available wines. The
    returned list of wines is stored in the `winesList` property of the managed bean,
    and the `allwines` string is returned as the navigation case.


    ***[Listing 12-8](#9781430246923_Ch12.xhtml#_list8).***  WineList.java


    ```

    package com.apress.ejb.chapter12.view.managed;


    import com.apress.ejb.chapter07.ejb.SearchFacadeLocal;

    import com.apress.ejb.chapter07.entities.Wine;

    import java.util.ArrayList;

    import java.util.List;

    import javax.ejb.EJB;

    import javax.faces.application.Application;

    import javax.faces.component.html.HtmlDataTable;

    import javax.faces.context.FacesContext;

    import javax.faces.el.ValueBinding;


    public class WineList

    {

      public WineList() {

      }


    @EJB

      private SearchFacadeLocal searchFacade;

      private List<Wine> winesList = new ArrayList();


    public String findAllWines() {

        if (searchFacade == null) {

          return "gohome";

        }

        else {

          winesList = searchFacade.getWineFindAll();

          return "allwines";

        }

      }


    public void setWinesList(List<Wine> winesList) {

        this.winesList = winesList;

      }


    public List<Wine> getWinesList() {

        return winesList;

      }

    }

