    we need to set the run target that we wish to execute. We have a choice of two
    run targets: `StatusMailerClient` or `StatusMessageClient`. To set the run target,
    invoke the context menu on `Chapter05-MDBSamples` node, and select the Properties
    menu option. Select the Run category, enter the run target in Relative URL text
    field, and click OK. We will set the run target as `StatusMailerClient` as shown
