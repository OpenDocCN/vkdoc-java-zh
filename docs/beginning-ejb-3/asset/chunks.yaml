    4-5 完全相同。


    JOINED 策略的优缺点


    设计时考量


    使用 JOINED 策略，在层次结构的任何级别引入新类型，只需在模式中插入一个新表即可。该类型的子类型将在运行时自动与该新类型进行连接。同样，通过添加、修改或删除字段来修改层次结构中的任何实体类型，只会影响直接映射到该类型的表。此选项在设计时提供了最大的灵活性，因为对任何类型的更改始终局限于该类型专用的表。


    性能影响


    JOINED 方法不会受到`UNION`操作的影响，但本质上需要多次`JOIN`操作才能执行几乎任何查询。跨所有实例进行查询时，最初仅涉及对最顶层基实体表的一次查询，以检索层次结构中所有实例的主键列表。由于基实体表中存在鉴别器列，根据持久化管理器实现所采用的延迟加载策略，将这些实例解析为实体类可以是高效的。


    每个最外层具体实体对应一个表 (InheritanceType.TABLE_PER_CLASS)


    对最终继承映射策略的支持对于持久化提供者是可选的。JPA 规范并不强制要求支持此策略，因此可移植的应用程序应避免使用它，直到它被官方强制要求或至少得到广泛支持。此继承映射选项将每个最外层的具体实体映射到其专用的表。每个表映射该实体整个类型层次结构中的所有字段；由于没有共享表，因此没有共享列。唯一的表结构要求是所有表必须共享一个共同的主键结构，这意味着主键列的名称和类型必须在层次结构中的所有表中匹配。


    为了更清楚地说明，图 4-4 使用 TABLE_PER_CLASS 继承策略展示了我们的第三种类型层次结构，该图演示了每个实体子类对应一个表的方法。这些表除了主键结构之外无需共享任何共同点，并且由于表隐式标识了实体类型，因此不需要鉴别器列。请注意，虽然为`abstract`实体`Person`和`Employee`显示了表，但它们实际上并未被使用。未来版本的
    EclipseLink（JPA 的参考实现）可能会进行修订，以在使用`TABLE_PER_CLASS`继承策略时抑制这些表的生成。在这种情况下，将这些类标注为`@MappedSuperclass`而不是`@Entity`可以防止生成这些类，但也会阻止这些类参与实体关系或
    JPQL 语句。


    ![9781430246923_Fig04-04.jpg](img/9781430246923_Fig04-04.jpg)


    图 4-4  使用 TABLE_PER_CLASS 策略映射示例实体的模式。具体的叶子实体被映射到专用的表，这些表包含映射其所有声明和继承字段的列


