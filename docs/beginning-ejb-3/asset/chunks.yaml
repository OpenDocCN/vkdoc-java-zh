    总结


    在本章中，我们介绍了上下文和依赖注入（CDI）。我们探讨了 CDI 在 Java EE 框架中所处的位置，以及它通过粘合 Web 层和业务层所提供的优势。我们解释了
    CDI 框架的两个主要组件，即上下文和依赖注入。我们还研究了参与 CDI 生命周期的有状态组件的上下文生命周期，并讨论了不同类型的作用域。通过示例，我们还探讨了依赖注入的不同方式，以及如何在编译时、部署时或运行时解决歧义依赖问题。我们讨论了
