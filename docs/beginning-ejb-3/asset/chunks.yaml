        }\n\n@Override\n    protected void doPost(HttpServletRequest request, HttpServletResponse\
    \ response)\n            throws ServletException, IOException {\n        processRequest(request,\
    \ response);\n    }\n\n@Override\n    public String getServletInfo() {\n        return\
    \ \"Short description\";\n    }\n}\n```\n\n[Listing 2-25](#9781430246923_Ch02.xhtml#list25)\
    \ shows the `ShoppingCartClient` servlet, which looks up the stateful `ShoppingCart`\
