    Lazy vs. Eager Field Bindings


    By default, and for performance reasons, all field values are designated to be
    fetched lazily, due to the fact that the implied `fetch` attribute found on each
    of the field mappings (`@Basic`, `@OneToMany`, and so on) holds a default value
    of `FetchType.LAZY`. This default `FetchType.LAZY` value is, in fact, only a hint,
    and the persistence manager is not bound to honor the request. For many fields,
    including nearly all simple values, it would be a significant burden to lazily
    fault in the fields of an entity, as they are actually required, so the persistence
    manager generally ignores the `FetchType.LAZY` directive and loads them eagerly
    anyhow.


    When the non-default value `FetchType.EAGER` is specified on a field mapping,
    however, this is not an optional request. When a field is so decorated, the persistence
    manager is obliged to bind its value eagerly when the entity is instantiated.
    This is particularly relevant when dealing with relationship fields. A relationship
    field may be annotated with the `fetch=FetchType.EAGER` attribute to ensure that,
    should the entity become detached, it will still be possible for clients to traverse
    that relationship field to access the related entity instances.


    When an entity is managed, relationship values will be bound at the time they
    are first requested. However, when an entity is instantiated and then detached,
    as when it is serialized and passed to a remote client, it may be desirable to
    prebind all of its relationship fields eagerly. In this case, you can override
    the default `fetch` values and set `(fetch=FetchType.EAGER)` on the relationship
    fields. Be aware of the consequences of this action, however, since this may cause
    a storm of cascaded loading if the eagerly loaded collections in turn eagerly
    load their referenced objects, and so on.


    Cascading Operations


    Entities that are related to other entities may cascade certain life-cycle operations
    across references. This allows an operation on one entity to propagate to certain
    other related entities. The cascade options are defined through annotations on
    the individual relationship fields so that you can precisely control the cascading
    behavior. Here are the cascade options:


    ```

    public enum CascadeType {

        ALL,

        PERSIST,

        MERGE,

        REMOVE,

        REFRESH

    }

    ```


    For example, a `Customer` entity that holds a reference to an exclusively owned
    `Address` entity may wish to have all operations on the `Customer` propagated
    to the `Address` instance.


    ```

    @Entity

    public class Customer implements Serializable {

        . . .

        @OneToOne(cascade=CascadeType.ALL)

        protected Address address;

        . . .

    }

    ```


    When an `EntityManager` operation like `persist()` or `remove()` is called on
    the `Customer` entity, the operation will also be called on the `Address` instance
    held in the `address` field and on any cascading fields of that `Address` instance,
    and so on.


    Use of these `cascade` annotation attributes allows the entity developers to specify
    cascading behavior declaratively and succinctly, and it saves the client from
    having to keep track of the network of instances that need to be manipulated when
    a `persist()`, `merge()`, `remove()`, or `refresh()` life cycle operation is performed
    on a top-level instance.


    Java Persistence Query Language (JPQL)


    JPA defines its own query language to support entity-based queries along with
    bulk update and delete operations. JPQL shares much in common with SQL, with the
    main difference being that the primary structures are entities and fields instead
    of tables and columns. Like SQL, JPQL queries may be defined either statically,
    through declared `@NamedQuery` annotations, or as dynamic statements submitted
    to the `EntityManager` and processed at run time. Queries may take bind parameters,
    and their returned results may be entities or ordinary Java objects.


    By expressing queries in terms of entities and their fields, JPQL statements become
    independent of the underlying schema. Thus a JPQL query need not change when an
    entity’s mappings are modified.


    JPQL queries are executed by the `EntityManager` on the persistence context, so
    query results will include uncommitted data that is pending in the context transaction.


    @NamedQuery and @NamedQueries


    ```

    @Target({TYPE}) @Retention(RUNTIME)

    public @interface NamedQuery {

        String name();

        String query ();

        LockModeType lockMode() default LockModeType.NONE;

        QueryHint[] hints() default {};

    }

    @Target({TYPE}) @Retention(RUNTIME)

    public @interface NamedQueries {

        NamedQuery [] value ();

    }

    ```


    An entity may declare named JPQL statements inside `@NamedQuery` annotations to
    define reusable queries. A `@NamedQuery` consists simply of a `name` and a `query`
    containing the JPQL text. `@NamedQuery` names must be unique across the persistence
    unit.


    ```

    @Entity

    @NamedQueries({

      @NamedQuery(name="Inventory.findAll",

                  query="select o from Inventory o"),

      @NamedQuery(name="Inventory.findByYear",

                  query="select o from Inventory o where o.year=:year"),

      @NamedQuery(name="Inventory.findByRegion",

                  query="select o from Inventory o where o.region=?1 ")

    })

    public class Inventory implements Serializable {

        . . .

    }

    ```


    Binding Query Parameters


    Queries may take bind parameters, either as named parameters or indexed parameters.
    To invoke the queries from the previous section, client code, such as a session
    bean, might issue the following calls:


    ```

    @Stateless

    public class InventoryManagerBean implements InventoryManager,

                                                 InventoryManagerLocal {

        . . .

        /** <code>select o from Inventory o</code> */

        public List<Inventory> findAllInventory() {

            return em.createNamedQuery("Inventory.findAll", Inventory.class).getResultList();

        }


    /** <code>select o from Inventory o where o.year=:year</code> */

        public List<Inventory> findInventoryByYear(Object year) {

            return em.createNamedQuery("Inventory.findByYear", Inventory.class).setParameter("year",

    year).getResultList();

        }


    /** <code>select object(o) from Inventory o where o.region=?1 </code> */

        public List<Inventory> findInventoryByRegion(Object p1) {

            return em.createNamedQuery("findInventoryByRegion", Inventory.class).setParameter(0,

    p1).getResultList();

        }

        . . .

    }

    ```


    Note that the `findInventoryByYear` query takes a named parameter, `:year`, whereas
    `findInventoryByRegion` uses an indexed parameter, `?1`. These approaches are
    equivalent but require different `setParameter()` calls when binding the parameters
    prior to query execution time, as shown in the previous sample code.


