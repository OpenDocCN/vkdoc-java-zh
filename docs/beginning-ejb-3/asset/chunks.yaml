    \ version;\n  @OneToOne(cascade = { CascadeType.ALL })\n  @JoinColumn(name = \"\
    HOME_ADDRESS\")\n  private Address homeAddress;\n\npublic Person() {\n  }\n\n\
    /* get/set methods */\n}\n```\n\n使用此`Person`类时，您可以通过`homeAddress`关系字段检索数据，但不能更新此字段。其值必须在实体持久化时填充，并且由于它是实体主键的一部分，之后不能修改。\n\
    \n### 支持乐观锁定（`@Version`）"
  raw: 'To transform the `Person` class to use an embedded ID, we replaced the `@Id
    Integer id` field with the `@EmbeddedId myIdClass myId` field. To fit this entity
    back into our sample `JOINED` entity hierarchy, the `manager` relationship field
    on `Person`’s `Employee` subentity, and the PK fields on all subentities, would
    need to be modified to map to all of the columns in the new primary key.


    Exposing Composite Key Class Fields Directly on the Entity Class (@IdClass)


    An alternative approach to mapping a composite primary key is to declare fields
    explicitly on the entity class for each field in the primary key class, but annotate
    each of them `@Id`, as shown in [Listing 4-28](#9781430246923_Ch04.xhtml#list28).
    If any of the fields on the primary key double as useful properties on your entity,
    you will probably want to take this approach. You then define a new composite
    key class that declares each of these `@Id` fields, taking care that they exactly
    match the key class fields in name and type.


    Starting with the classes from the previous example that used an `@EmbeddedId`,
    we can modify `MyIdClass` to remove the `@Embedded` annotation, as shown in [Listing
    4-28](#9781430246923_Ch04.xhtml#list28).


    [***Listing 4-28.***](#9781430246923_Ch04.xhtml#_list28)  MyIdClass.java, a Serializable
    Java class suitable for Use as an @IdClass


    ```

    public class MyIdClass implements Serializable {

      @Column(name = "FIRST_NAME", length = 400)

      private String firstName;

      @Column(name = "LAST_NAME", length = 400)

      private String lastName;


    public MyIdClass() {

      }


    public MyIdClass(String firstName, String lastName) {

        this.firstName = firstName;

        this.lastName = lastName;

      }


    @Override

      public boolean equals(Object obj) {

        return obj instanceof MyIdClass && firstName.equals(((MyIdClass) obj).getFirstName())
    && lastName.equals(((MyIdClass) obj).getLastName());

      }


    @Override

      public int hashCode() {

        return System.identityHashCode(this);

      }

      /* get/set methods */

    }

