- fmt: '# 整合会话Bean、实体、消息驱动Bean和Web服务


    ## 引言


    本书前面的章节涵盖了EJB及相关技术的各个组件，包括会话Bean、消息驱动Bean（MDB）、作为Web服务的无状态会话Bean以及JPA实体。在本章中，我们将以虚构的葡萄酒商店应用程序为例，向您展示如何将这些组件整合到一个完整的Java
    EE 7应用程序中。


    ## 应用程序概述


    我们将在本章中开发的示例应用程序是`Wines Online`应用程序，它为客户（个人或分销商）提供多种搜索条件，使其能够浏览、选择葡萄酒、将其添加到购物车并处理订单。客户在提交订单之前需要先在`Wines
    Online`应用程序中注册。订单提交后，客户的信用卡会被验证，这将触发订单处理消息，并向客户发送关于订单状态的电子邮件通知。


    客户用于搜索、导航和提交订单的屏幕是简单的JavaServer Faces（JSF）Web应用程序的一部分，该应用程序与使用EJB开发的后端服务和组件进行交互。在本章中，我们的重点将放在开发应用程序的后端部分，这部分可以使用Servlet和简单的Java客户端进行测试。在[第12章](../Text/9781430246923_Ch12.xhtml)中，我们将为这些后端服务开发一个JSF客户端。


    如[图7-1](#9781430246923_Ch07.xhtml#Fig1)所示，`Wines Online`应用程序由客户端应用程序使用的多个后端组件组成，这些后端组件又使用不同类型的服务来执行CRUD（创建、检索、更新、删除）操作、向客户发送关于订单状态的电子邮件通知、处理传入订单以及验证客户的信用卡状态。我们将在下一节中讨论这些组件的行为和功能。


    ![9781430246923_Fig07-01.jpg](Images/9781430246923_Fig07-01.jpg)


    [图7-1.](#9781430246923_Ch07.xhtml#_Fig1) `Wines Online`应用程序架构


    ## 应用程序组件和服务


    后端葡萄酒商店应用程序由不同类型的EJB组成，这些EJB被创建为组件和服务。以下各节描述了关键组件和服务。


    ### 购物车组件


    购物车组件管理已登录应用程序的注册客户的购物车项目。该组件是一个有状态会话Bean，它跟踪添加到购物车和从购物车中移除的购物车项目（葡萄酒和数量）。最后，购物车组件将订单信息传输给订单处理组件。


    ### 搜索外观组件


    搜索外观组件允许客户检索所有葡萄酒或使用年份、国家和品种等条件搜索葡萄酒。该组件是一个无状态会话Bean，它根据执行的搜索条件返回葡萄酒列表。


    ### 客户外观组件


    客户外观组件允许客户将自己注册为葡萄酒应用程序的成员，并根据其电子邮件地址检索客户信息。该组件是一个无状态会话Bean。


    ### 订单处理外观组件


    订单处理外观组件充当信用服务和订单处理服务之间的协调器。该组件处理购物车项目并创建可供订单处理服务使用的采购订单（PO）。该组件是一个无状态会话Bean。


    ### 持久化服务


    持久化服务包含一个打包的持久化单元，该单元由一组映射到葡萄酒商店数据库模式的实体组成。应用程序后端部分的所有其他组件和服务都使用这个公共持久化单元来执行CRUD操作。


    ### 电子邮件服务


    电子邮件服务是一个MDB，它向客户发送关于已提交订单状态的电子邮件。该服务本质上与我们在[第5章](../Text/9781430246923_Ch05.xhtml)中构建的MDB相同，并且需要相同的JMS和Java
    Mail Session资源。


    ### 信用服务


    信用服务是应用程序使用的一个Web服务。该服务将信用卡信息作为输入消息，并返回特定客户的信用状态。我们将使用在[第6章](../Text/9781430246923_Ch06.xhtml)中开发的信用服务。


    ### 订单处理服务


    订单处理服务是一个MDB，它在收到采购订单后执行大部分订单处理工作。


    ## `Wines Online`应用程序业务流程


    [图7-2](#9781430246923_Ch07.xhtml#Fig2) 说明了葡萄酒应用程序的流程。一旦购物车服务将客户和购物车项目信息提交给订单处理外观，它会在继续处理订单之前验证客户信用卡信息是否准确以及卡是否有效。在收到信用服务的批准后，它会创建一个包含客户和订单信息的采购订单，并将其提交给订单处理服务。如果从信用服务收到否定响应，则订单被取消，电子邮件服务会向客户发送通知。一旦订单处理服务收到采购订单，它就会开始履行订单，这包括更新库存以及使用电子邮件服务向客户发送关于订单状态的电子邮件通知。


    ![9781430246923_Fig07-02.jpg](Images/9781430246923_Fig07-02.jpg)


    [图7-2.](#9781430246923_Ch07.xhtml#_Fig2) `Wines Online`应用程序业务流程


    [图7-3](#9781430246923_Ch07.xhtml#Fig3) 说明了葡萄酒应用程序组件和服务之间发生的交互。该图之后是这些交互的逐步说明。


    ![9781430246923_Fig07-03.jpg](Images/9781430246923_Fig07-03.jpg)


    [图7-3.](#9781430246923_Ch07.xhtml#_Fig3) `Wines Online`应用程序组件和服务交互


    ## 深入的组件/服务演练


    在以下各节中，我们将逐一讲解每个组件的代码，以解释其与其他组件和服务的交互。每个代码清单都包含在`Chapter07-IntegratedServices`示例应用程序中的代码。在本章末尾，您将找到有关如何配置、构建、部署和执行此应用程序的分步说明。


    ## 持久化服务'
  raw: 'We discussed some use cases for which Web services can be used, and we discussed
    how they fit into intranet and Internet models, including some examples of existing
    e-commerce sites that provide Web services.


    We then dived into the Java EE platform and looked at different standards (JAX-WS,
    JAX-RS, JAXB, JAXR, SAAJ, and JSR 181) that are enabling developers to create
    Web services that are portable and interoperable within the .NET platform.


    We then looked at how to publish EJB stateless session beans as Web services using
    simple Web Services Metadata annotations. We developed a credit service that can
    be invoked from Web service clients.


    Finally, we looked at compiling, deploying, and testing Web services using the
    GlassFish application server and servlet clients, and we also looked at how this
    programming model is similar to invoking Web services with EJBs.


    So far, we have discussed the individual components of the EJB specification:
    session beans, JPA entities, MDBs, and Web services. In the next chapter, we will
    discuss how you can integrate all of these components to build an enterprise application.


    CHAPTER 7


    ![image](Images/frontdot.jpg)


    Integrating Session Beans, Entities, Message-Driven Beans, and Web Services


    Introduction


    Previous chapters in this book covered the individual components of EJB and related
    technologies. These included session beans, message-driven beans (MDBs), stateless
    session beans as Web services, and JPA entities. In this chapter, we will show
    you how to integrate these components into a complete Java EE 7 application using
    a fictitious wine store application as an example.


    Application Overview


    The sample application that we are going to develop in this chapter is the Wines
    Online application, which provides customers (either individuals or distributors)
    with a variety of search criteria with which they can browse, select wines, add
    them to a shopping cart, and process their order. Customers need to register with
    the Wines Online application before they can submit orders. Once an order is submitted,
    the customer’s credit card is validated, and this triggers an order processing
    message and an e-mail notification to the customer on the status of the order.


    Screens used by the customer to search, navigate, and submit orders are part of
    a simple JavaServer Faces (JSF) Web application that interacts with back-end services
    and components developed using EJBs. In this chapter, our focus will be on developing
    the back-end part of the application, which can be tested with both a servlet
    and a simple Java client. In [Chapter 12](../Text/9781430246923_Ch12.xhtml), we
    will develop a JSF client for these back-end services.


    As shown in [Figure 7-1](#9781430246923_Ch07.xhtml#Fig1), the Wines Online application
    consists of several back-end components that are used by the client application,
    and these back-end components in turn make use of different types of services
    to perform CRUD (create, retrieve, update, delete) operations, send e-mail notifications
    to the customer about order status, process the incoming orders, and verify the
    credit card status of the customer. We will discuss the behavior and functionality
    of these components in the next section.


    ![9781430246923_Fig07-01.jpg](Images/9781430246923_Fig07-01.jpg)


    [Figure 7-1.](#9781430246923_Ch07.xhtml#_Fig1)  The Wines Online application architecture


    Application Components and Services


    The back-end wine store application consists of different types of EJBs that are
    created as components and services. The key components and services are described
    in the following sections.


    The Shopping Cart Component


    The shopping cart component manages the cart items for a registered customer who
    has logged into the application. This component is a stateful session bean, and
    it keeps track of cart items (wines and quantity) that are added to and removed
    from the shopping cart. Finally, the shopping cart component transfers the order
    information to the order-processing component.


    The Search Façade Component


    The search façade component allows the customer to retrieve all wines or search
    for wines using criteria such as year, country, and varietal. This component is
    a stateless session bean, and it returns a list of wines based on executed search
    criteria.


    The Customer Façade Component


    The customer façade component allows customers to register themselves as members
    of the wine application and also retrieve customer information based on their
    e-mail addresses. This component is a stateless session bean.


    The Order Processing Façade Component


    The order processing façade component acts as a coordinator between the credit
    service and the order processing service. This component processes the cart items
    and creates a purchase order (PO) that can be consumed by the order processing
    service. This component is a stateless session bean.


    Persistence Services


    Persistence services comprise a packaged persistence unit that consists of a set
    of entities that are mapped to the wine store database schema. All other components
    and services in the back-end part of the application use this common persistence
    unit to perform CRUD operations.


    The E-mail Service


    The e-mail service is an MDB that sends out an e-mail to the customer about the
    status of the order submitted. This service is essentially the same MDB that we
    built in [Chapter 5](../Text/9781430246923_Ch05.xhtml), and it requires the same
    JMS and Java Mail Session resources.


    The Credit Service


    The credit service is a Web service that is consumed by the application. This
    service takes credit card information as an input message and returns the status
    of the credit for a particular customer. We will use the credit service developed
    in [Chapter 6](../Text/9781430246923_Ch06.xhtml).


    The Order Processing Service


    The order processing service is an MDB that does the bulk of the order processing
    after a PO has been received.


    The Wines Online Application Business Process


    [Figure 7-2](#9781430246923_Ch07.xhtml#Fig2) illustrates the process flow for
    the wine application. Once the shopping cart service submits the customer and
    cart item information to the order processing façade, it verifies that the customer
    credit card information is accurate and the card is valid before proceeding to
    process the order. After approval is received from the credit service, it creates
    a purchase order that contains the customer and order information and submits
    it to the order processing service. If a negative response is received from the
    credit service, the order is cancelled, and the e-mail service sends a notification
    to the customer. Once a purchase order is received by the order processing service,
    it proceeds to fulfill the order, which entails updating the inventory and sending
    an e-mail notification on the status of the order to the customer using the e-mail
    service.


    ![9781430246923_Fig07-02.jpg](Images/9781430246923_Fig07-02.jpg)


    [Figure 7-2.](#9781430246923_Ch07.xhtml#_Fig2)  The Wines Online application business
    process


    [Figure 7-3](#9781430246923_Ch07.xhtml#Fig3) illustrates the interactions that
    occur among the components and services of the wine application. A step-by-step
    explanation of these interactions follows the diagram.


    ![9781430246923_Fig07-03.jpg](Images/9781430246923_Fig07-03.jpg)


    [Figure 7-3.](#9781430246923_Ch07.xhtml#_Fig3)  The Wines Online application component
    and service interactions


    In-Depth Component/Service Walkthrough


    In the following sections, we will walk through the code for each individual component
    to explain its interaction with the other components and services. Each of the
    listings contains code that is included in the `Chapter07-IntegratedServices`
    sample application. At the end of the chapter, you will find step-by-step instructions
    on how to configure, build, deploy, and execute this application.


    Persistence Services'
