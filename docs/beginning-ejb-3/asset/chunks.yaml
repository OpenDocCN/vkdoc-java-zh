  trans: '

    安装 NetBeans IDE 及其集成的 GlassFish 服务器


    导航至 NetBeans IDE 安装程序下载到的目录，并运行该安装程序。安装向导的第一页会列出将要安装的软件包。如果你看到“未找到兼容的 JDK”警告消息，如图
    1-2 所示，那么你将不得不退出向导，并首先从以下位置下载并安装 Java 平台 (JDK) 7。


    `http://www.oracle.com/technetwork/java/javase/downloads/index.html`


    ![9781430246923_Fig01-02.jpg](img/9781430246923_Fig01-02.jpg)


    图 1-2.  安装 NetBeans。“未找到兼容的 JDK”警告


    ![image](img/sq.jpg) **注意**  即使你没有看到“`No compatible JDK was found`”警告，也请确认你已安装了
    Java 平台 (JDK) 7。如果你没有安装 Java 平台 (JDK) 7，那么在运行本书中的示例时，你可能会遇到“`javac: invalid target
    release: 1.7`”错误。


    安装兼容的 JDK 版本后，重新运行 NetBeans 安装程序。确认“未找到兼容的 JDK”警告不再出现，然后继续执行向导，保持所有默认值选中。“摘要”页面将列出
    NetBeans IDE 和 GlassFish 应用服务器将要安装到的文件夹。按下 `Install` 按钮完成向导，如图 1-3 所示。


    ![9781430246923_Fig01-03.jpg](img/9781430246923_Fig01-03.jpg)


    图 1-3.  安装 NetBeans IDE 和 GlassFish 应用服务器


    成功安装后，你的 NetBeans IDE 和 GlassFish 应用服务器即可使用。在接下来的章节中，我们将向你展示如何创建一个简单的 NetBeans
    项目，并验证已安装的 GlassFish 服务器是否正常运行。


    测试 NetBeans IDE 和 GlassFish 安装


    假设上述所有步骤均已成功执行，你现在可以启动 NetBeans IDE 和集成的 GlassFish 应用服务器了。我们还将演示一些简单的测试，以确保你已准备好运行本书中的示例。


    启动 NetBeans IDE


    NetBeans IDE 提供了一个用于创建、部署和执行 Java EE 应用程序的图形化环境。诸如启动和关闭 GlassFish 服务器域之类的管理任务也可以使用
    NetBeans 执行。


    调用 NetBeans，可以通过在 Windows 7 机器的“开始”菜单中选择“NetBeans”，或者在命令提示符下运行 `C:\Program Files\NetBeans
    7.3\bin\netbeans64.exe`。请注意，确切路径取决于 图 1-3 中提到的安装位置，对于 32 位系统，可执行文件将命名为 `netbeans.exe`。如果你运行的是
    Windows 8，则需要按下“Windows”键并开始输入“NetBeans”。应用搜索工具将搜索 NetBeans 可执行文件，你可以选择它来启动 NetBeans
    IDE。


    使用示例项目进行测试


    NetBeans IDE 打开后，我们将创建一个示例项目来测试 IDE 以及应用服务器的编译、部署和执行方面。


    要创建新项目，请按 `Ctrl-Shift-N` 打开 `New Project` 向导。选择 `Java Web` 类别和 `Web Application`
    项目，如图 1-4 所示。继续执行向导，保持所有默认值选中，然后 `Finish` 向导。


    ![9781430246923_Fig01-04.jpg](img/9781430246923_Fig01-04.jpg)


    图 1-4.  创建一个示例测试项目


    NetBeans 将创建一个名为 `WebApplication1` 的项目。接下来，我们将在项目 `WebApplication1` 下创建一个 servlet。要创建
    servlet，请在项目导航器中右键单击项目名称以调用上下文菜单。选择 `New` 下可用的 `Servlet ...` 菜单，如图 1-5 所示。


    ![9781430246923_Fig01-05.jpg](img/9781430246923_Fig01-05.jpg)


    图 1-5.  创建一个测试 servlet


    在 `New Servlet` 向导中，输入包名并保持其他默认值，然后 `Finish` 向导，如图 1-6 所示。我们使用了 `setup` 作为包名。


    ![9781430246923_Fig01-06.jpg](img/9781430246923_Fig01-06.jpg)


    图 1-6.  浏览 New Servlet 向导


    创建 `NewServlet` 类后，我们可以立即通过调用 servlet 文件上的上下文菜单并选择 `Run File` 菜单选项来*运行*它，如图 1-7
    所示。


    ![9781430246923_Fig01-07.jpg](img/9781430246923_Fig01-07.jpg)


    图 1-7.  运行 servlet


    当我们*运行* servlet 时，NetBeans 将自动启动集成的 GlassFish 服务器。如果 Windows 防火墙显示一个或多个 Windows
    安全警报对话框，如图 1-8 所示，你可能需要为 Java EE 和应用服务器相关功能提供必要的权限。


    ![9781430246923_Fig01-08.jpg](img/9781430246923_Fig01-08.jpg)


    图 1-8.  如果 Windows 防火墙显示警报，则允许访问


    作为运行 servlet 的一部分，NetBeans 将编译、打包并将其部署到集成的 GlassFish 服务器。部署后，NetBeans 将自动在默认浏览器中打开
    servlet URL，如图 1-9 所示。


    ![9781430246923_Fig01-09.jpg](img/9781430246923_Fig01-09.jpg)


    图 1-9.  运行 servlet 类


    成功执行 servlet 类意味着 NetBeans 和集成的 GlassFish 服务器的安装已成功完成，并且运行本书中示例的设置已准备就绪。


    ![image](img/sq.jpg) **注意**  本章的这一部分绝不是 GlassFish 应用服务器的用户指南。有关 GlassFish 的更多信息，请参阅
    `http://glassfish.java.net/downloads/quickstart/index.html`。


    管理 GlassFish 应用服务器


    NetBeans 为我们提供了一个图形界面来执行各种 GlassFish 服务器相关的管理任务。你可以从 `Services` 选项卡重新启动、启动和停止
    GlassFish 服务器，如图 1-10 所示。


    ![9781430246923_Fig01-10.jpg](img/9781430246923_Fig01-10.jpg)


    图 1-10.  管理 GlassFish 应用服务器


    一旦 GlassFish 成功启动，你可以测试服务器是否能够接受基本的 HTTP 请求。为此，打开浏览器，输入 URL `http://localhost:8080/`，如果服务器已启动并正在运行，你将能够看到如图
    1-11 所示的页面。


    ![9781430246923_Fig01-11.jpg](img/9781430246923_Fig01-11.jpg)


    图 1-11.  测试 GlassFish 服务器


    ![image](img/sq.jpg) **注意**  如果你尝试从非安装 GlassFish 的机器访问，请将 `localhost` 替换为机器名称或
    IP 地址。如果你在安装期间更改了端口号，请使用该端口而不是 8080。

