    订单处理服务


    订单处理服务是一个 MDB。在葡萄酒商店应用程序中使用 MDB 的目的是展示企业应用程序中的某些处理如何以异步方式完成，以及如何从 MDB 中使用 `EntityManager`、会话
    Bean 和其他 MDB。


    ![image](img/sq.jpg) **注意**   第 5 章介绍了 MDB，详细描述了异步架构，并给出了一些可能实现的示例。


