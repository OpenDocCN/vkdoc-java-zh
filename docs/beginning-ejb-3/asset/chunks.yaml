- fmt: "`ShoppingCartBean`是一个有状态会话Bean，并使用扩展持久化上下文。该Bean保存了登录系统并正在购物车中添加或删除葡萄酒商品的客户状态。一旦客户提交订单，`ShoppingCartBean`会将客户信息发送给订单处理外观，由后者负责处理订单。我们决定为此用例使用有状态会话Bean，原因如下：\n\
    \n- 有多种类型的客户端应用程序访问后端应用程序（Web、Swing和命令行客户端）。\n- 我们希望展示EJB有状态会话Bean在典型应用程序中的用法。\n\
    \n![image](Images/sq.jpg) **注意** 通常，人们普遍认为有状态会话Bean在存储状态方面（与使用HTTP会话为Web客户端在客户端存储状态相比）有些重量级。但有证据表明，有状态会话Bean在性能或事务方面并没有巨大的成本。（参见Peter\
    \ Zadrozny所著的*J2EE Performance Testing with BEA WebLogic Server* [Apress, 2003]，以全面了解此主题。）\n\
    \n`ShoppingCartBean`拥有以下小节中描述的业务方法。\n\n## 查找客户\n\n[清单7-4](#9781430246923_Ch07.xhtml#list4)展示了`ShoppingCartBean`中的`findCustomer()`方法。该方法使用注入的`CustomerFacadeBean`并调用`findCustomerByEmail()`方法来获取一个实例，在我们的案例中，该实例恰好是一个`Individual`子实体。一旦检索到`Customer`，它就会被分配给一个类级属性，以便可以通过此有状态会话Bean上的其他方法后续引用它。因为我们使用的是扩展持久化上下文，所以该实例将在Bean的整个生命周期内保持受管状态，跨越事务边界，除非它被主动从持久化上下文中移除。\n\
    \n***[清单7-4](#9781430246923_Ch07.xhtml#_list4).*** `findCustomer`业务方法\n\n```\n\
    public Customer findCustomer(String email) {\n  customer = customerFacade.getCustomerFindByEmail(email);\n\
    \  return customer;\n}\n```\n\n## 添加葡萄酒商品\n\n[清单7-5](#9781430246923_Ch07.xhtml#list5)展示了`ShoppingCartBean`中的`addWineItem()`方法。客户端应用程序调用此业务方法，以将特定葡萄酒商品及其数量添加到购物车。代码创建了一个新的`CartItem`实体实例，并使用`CartItem`中的setter方法设置数量、葡萄酒和创建时间。\n\
    \n![image](Images/sq.jpg) **注意** 快速回顾实体实例的三种状态：受管、分离和新建。受管实例是被持久化上下文主动引用的实例，对该实例所做的所有更改都由持久化上下文跟踪。当持久化上下文与数据库同步时，在受管实例中发现的所有待处理更改都会通过SQL语句刷新到数据库。分离的实体实例是不再被持久化上下文引用的实例，因此其更改不会被跟踪。如果客户端修改了分离的实例，客户端需要确保这些更改被合并到受管实例中（例如，通过`EntityManager.merge()`调用），否则这些更改将永远不会与数据库同步。新建的实体实例类似于分离的实例，只是它尚未持久化到数据库中。\n\
    \n`addWineItem()`方法使用指定的属性创建一个新的`CartItem`，并将其添加到`Customer`实例中。因为我们在有状态会话Bean上查询了`Customer`实例并将其缓存在类级变量中，所以我们可以依赖它处于受管状态。`ShoppingCartBean`使用容器管理的事务，并且`addWineItem()`方法默认使用`TransactionAttributeType.REQUIRED`，因此在此方法执行期间将启动并提交一个事务。提交时，持久化上下文将与数据库同步，并且受管`customer`实例中的任何待处理更改都将被推送到数据库。由于`Customer`的`cartItemList`属性上的级联规则，任何引用的`CartItem`实例也将被持久化。因此，此方法调用的结果将是`CartItem`表中新增一行，该行具有对`Customer`表（或`Individual`表，具体取决于实体继承层次结构的映射方式）的外键引用。\n\
    \n***[清单7-5](#9781430246923_Ch07.xhtml#_list5).*** `addWineItem`业务方法\n\n```\n\
    public void addWineItem(Wine wine, int quantity) {\n  CartItem cartItem = new\
    \ CartItem(quantity, wine);\n  customer.addCartItem(cartItem);\n}\n```\n\n## 移除葡萄酒商品\n\
    \n[清单7-6](#9781430246923_Ch07.xhtml#list6)展示了`ShoppingCartBean`中的`removeWineItem()`方法。当最终用户（通过用户界面）请求时，此方法允许客户端应用程序从购物车中移除商品。同样，因为`customer`属性是一个受管实例，所以对其应用的任何更改都将在此方法结束时，当此方法开始时创建的CMT事务提交时被持久化。\n\
    \n***[清单7-6](#9781430246923_Ch07.xhtml#_list6).*** `removeWineItem`业务方法\n\n```\n\
    public void removeWineItem(CartItem cartItem) {\n  customer.removeCartItem(cartItem);\n\
    }\n```\n\n## 向订单处理外观提交订单\n\n[清单7-7](#9781430246923_Ch07.xhtml#list7)展示了`ShoppingCartBean`中的`sendOrderToOPC()`方法。当最终用户最终决定购买一种或多种葡萄酒时，客户端应用程序调用此方法来提交订单。该方法使用注入的`OrderProcessFacadeBean`并调用`processOrder()`方法，通过传递`customer`对象来提交订单。\n\
    \n![image](Images/sq.jpg) **注意** 将方法命名为`sendOrderToOPC()`的理由是，接收采购订单的`OrderProcess\
    \ FacadeBean`实际上充当了“订单处理中心”。考虑到这一点，我们决定将“订单处理中心”缩写为OPC，以避免方法名过长。\n\n***[清单7-7](#9781430246923_Ch07.xhtml#_list7).***\
    \ `sendOrderToOPC`业务方法\n\n```\npublic String sendOrderToOPC() {\n  String result\
    \ = null;\n  try {\n    orderProcessFacade.processOrder(customer);\n    result\
    \ = \"Your Order has been submitted - you will be notified about the status via\
    \ email\";\n  } catch (Exception ex) {\n    ex.printStackTrace();\n    result\
    \ = \"An error occurred while processing your order. Please contact Customer Service.\"\
    ;\n  }\n\nreturn result;\n}\n```\n\n## 检索客户的购物车商品\n\n[清单7-8](#9781430246923_Ch07.xhtml#list8)展示了`ShoppingCartBean`中的`getCartItems()`方法。此方法从`customer`字段（可能是`Individual`或`Distributor`实体类型）检索当前的购物车商品列表。当我们构建一个JSF应用程序时，此方法将非常有用，我们可以在客户提交订单之前，在用户界面中显示所有购物车商品。\n\
    \n***[清单7-8](#9781430246923_Ch07.xhtml#_list8).*** `getCartItems`业务方法\n\n```\n\
    public List<CartItem> getCartItems() {\n  return customer.getCartItemList();\n\
    }\n```\n\n`ShoppingCartBean`的完整代码如[清单7-9](#9781430246923_Ch07.xhtml#list9)所示。\n\
    \n***[清单7-9](#9781430246923_Ch07.xhtml#_list9).*** `ShoppingCartBean.java`"
  raw: '`ShoppingCartBean` is a stateful session bean, and uses an extended persistence
    context. This bean preserves the state of a customer who is logged into the system
    and is currently either adding or removing wine items from the shopping cart.
    Once the customer submits an order, `ShoppingCartBean` sends the customer information
    to the order processing façade, which takes care of processing the order. We have
    decided to use a stateful session bean for this use case for the following reasons:


    *   There is more than one type of client application that accesses the back-end
    application (Web, Swing, and command-line client).

    *   We want to show the usage of EJB stateful session beans in a typical application.


    ![image](Images/sq.jpg) **Note**   In general, there is a common belief that stateful
    session beans are a bit heavyweight to store the state (as compared to storing
    the state on the client using an HTTP session for Web clients). There is evidence
    that there isn’t a drastic cost in terms of either performance or transactions
    associated with stateful session beans. (See *J2EE Performance Testing with BEA
    WebLogic Server,* by Peter Zadrozny [Apress, 2003], for thorough coverage of this
    topic.)


    `ShoppingCartBean` has the business methods described in the following subsections.


    Finding Customers


    [Listing 7-4](#9781430246923_Ch07.xhtml#list4) shows the `findCustomer()` method
    in `ShoppingCartBean`. This method uses the injected `CustomerFacadeBean` and
    calls the `findCustomerByEmail()` method to get an instance, which in our case
    happens to be an `Individual` sub-entity. Once a `Customer` is retrieved, it is
    assigned to a class-level attribute so that it can be referenced subsequently
    through other methods on this stateful session bean. Because we are using an extended
    persistence context, this instance will remain managed throughout the life of
    the bean, through transaction boundaries, unless it is actively removed from the
    persistence context.


    ***[Listing 7-4](#9781430246923_Ch07.xhtml#_list4).***  The findCustomer Business
    Method


    ```

    public Customer findCustomer(String email) {

      customer = customerFacade.getCustomerFindByEmail(email);

      return customer;

    }

    ```


    Adding Wine Items


    [Listing 7-5](#9781430246923_Ch07.xhtml#list5) shows the `addWineItem()` method
    in `ShoppingCartBean`. This business method is called by the client application
    to add a particular wine item to the shopping cart along with the quantity. The
    code creates a new instance of the `CartItem` entity and sets the quantity, wine,
    and time of creation using the setter methods in `CartItem`.


    ![image](Images/sq.jpg) **Note**   A quick refresher on the three states of an
    entity instance: managed, detached, and new. A managed instance is one that is
    actively referenced by a persistence context, and all changes made to that instance
    are tracked by the ­persistence context. When the persistence context is synchronized
    with the database, all pending changes found in ­managed instances are flushed
    to the database through SQL statements. A detached entity instance is one that
    is no longer referenced by a persistence context, and so its changes are not being
    tracked. If a client modifies a detached instance, the client needs to ensure
    that those changes are merged into a managed instance (for instance, through an
    `EntityManager.merge()` call), or else the changes will never be synchronized
    with the database. A new entity instance is like a detached instance, only it
    has not yet been persisted in the database.


    The `addWineItem()` method creates a new `CartItem` with the specified properties
    and adds it to the `Customer` instance. Because we queried the `Customer` instance
    and cached it in a class-level variable on our stateful session bean, we can count
    on it being in a managed state. `ShoppingCartBean` uses container-managed transactions,
    and the `addWineItem()` method defaults to using `TransactionAttributeType.REQUIRED`,
    so a transaction will be started and committed during the course of this method.
    When the commit is performed, the persistence context will be synchronized with
    the database, and any changes pending in our managed `customer` instance will
    be pushed out to the database. Because of the cascade rule on `Customer`’s `cartItemList`
    property, any referenced `CartItem` instances will also be persisted. The result
    of this method call, then, will be a new row in `CartItem`’s table with a foreign
    key reference to the `Customer` table (or `Individual` table, depending on how
    the entity inheritance hierarchy is mapped).


    ***[Listing 7-5](#9781430246923_Ch07.xhtml#_list5).***  The addWineItem Business
    Method


    ```

    public void addWineItem(Wine wine, int quantity) {

      CartItem cartItem = new CartItem(quantity, wine);

      customer.addCartItem(cartItem);

    }

    ```


    Removing Wine Items


    [Listing 7-6](#9781430246923_Ch07.xhtml#list6) shows the `removeWineItem()` method
    in `ShoppingCartBean`. This method lets the client applications remove the items
    from the shopping cart when requested by the end user (via the user interface).
    Again, because the `customer` attribute is a managed instance, any changes applied
    to it will be persisted at the conclusion of this method when the CMT transaction
    created at the outset of this method is committed.


    ***[Listing 7-6](#9781430246923_Ch07.xhtml#_list6).***  The removeWineItem Business
    Method


    ```

    public void removeWineItem(CartItem cartItem) {

      customer.removeCartItem(cartItem);

    }

    ```


    Submitting Orders to the Order Processing Façade


    [Listing 7-7](#9781430246923_Ch07.xhtml#list7) shows the `sendOrderToOPC()` method
    in `ShoppingCartBean`. This method is called by the client applications to submit
    the order when the end user finally decides to buy one or more wines. This method
    uses the injected `OrderProcessFacadeBean` and calls the `processOrder()` method
    to submit the order by passing the `customer` object.


    ![image](Images/sq.jpg) **Note**   The rationale behind the naming of the `sendOrderToOPC()`
    method was that `OrderProcess FacadeBean`, which receives the purchase orders,
    in effect acts as an “order processing center.” With this in mind, we decided
    to ­abbreviate “order processing center” to OPC so as to avoid an extremely long
    method name.


    ***[Listing 7-7](#9781430246923_Ch07.xhtml#_list7).***  The sendOrderToOPC Business
    Method


    ```

    public String sendOrderToOPC() {

      String result = null;

      try {

        orderProcessFacade.processOrder(customer);

        result = "Your Order has been submitted - you will be notified about the status
    via email";

      } catch (Exception ex) {

        ex.printStackTrace();

        result = "An error occurred while processing your order. Please contact Customer
    Service.";

      }


    return result;

    }

    ```


    Retrieving the Customer’s Cart Items


    [Listing 7-8](#9781430246923_Ch07.xhtml#list8) shows the `getCartItems()` method
    in `ShoppingCartBean`. This method retrieves the current list of cart items from
    the `customer` field (which may be either an `Individual` or a `Distributor` entity
    type). This method will be useful when we build a JSF application in which we
    can show all of the cart items in the user interface before the customer submits
    the order.


    ***[Listing 7-8](#9781430246923_Ch07.xhtml#_list8).***  The getCartItems Business
    Method


    ```

    public List<CartItem> getCartItems() {

      return customer.getCartItemList();

    }

    ```


    The complete code for `ShoppingCartBean` is shown in [Listing 7-9](#9781430246923_Ch07.xhtml#list9).


    ***[Listing 7-9](#9781430246923_Ch07.xhtml#_list9).***  ShoppingCartBean.java'
