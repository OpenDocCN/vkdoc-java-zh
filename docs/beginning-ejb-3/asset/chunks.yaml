- fmt: '**Peter Zadrozny** is a veteran of the software industry. He is the Founder
    and Chief Technology Officer of Opallios, a company focused on harnessing the
    power of big data and cloud technologies while providing value to its customer
    through outsourced product development. Peter is also a lecturer on big data topics
    at San José State University. He has held various executive and technical roles
    in many countries around the world with startups as well as Fortune 500 companies.
    Highlights of his career include starting the operations of WebLogic in Europe
    and Sun Microsystems in México. He is an accomplished author with various successful
    books on big data analytics, J2EE and performance engineering, and was an original
    contributor to The Grinder, a popular open source project.


    ## About the Technical Reviewer


    ![image](Images/9781430246923_unFig-04.jpg)


    **Ndjobo Armel Fabrice** is a Design Computer Engineer and graduate from the National
    Advanced School of Engineering Cameroon and Oracle certified professional, Java
    SE 6 programmer. In the past, he has worked with EJB/JEE to develop several systems,
    including a Helpline system and a commercial management application. He is currently
    a part of the Java team of Sopra Group where he works jointly with EJBs, Spring,
    and ICEFaces solutions. Please visit his website at `http://armel-ndjobo.developpez.com`.


    ## Preface


    Dear Reader,


    When we conceived the original edition of this book in 2006, the lightweight EJB
    3 API was still in its early stages, yet it was clear to us that the EJB specification
    designers had at last achieved the right blend of power and usability. Coming
    from the EJB 2.x world, it was like a breath of fresh air, and reminded us of
    how it felt to discover Java technology after years of programming C and C++.
    The EJB component, redefined as an ordinary Java class whose metadata could be
    declared through Java annotations, and enhanced by the introduction of generics,
    container injection, and interceptors, became the basis for a much more nimble
    development model: one that gained elegance through simplicity. Enter the new
    Java Persistence API (JPA), where entities, too, were recast as lightweight Java
    classes and O/R mapping metadata could be specified through spec-defined annotations,
    and we suddenly had a comprehensive enterprise component model comprising the
    latest technologies, all rolled into a worldwide standard. So you can see what
    got our buzz going.


    Fast forward to now, and the release of the EJB 3.2 and JPA 2.1 specs. Spanning
    over a thousand pages combined, these specifications have matured to address a
    number of new areas and improve upon their ease of use. Once again we saw an opportunity
    to translate this latest material into an approachable format that reads well
    and makes liberal use of examples that you can build, execute, and further explore
    on your own machine. In this second edition, accompanying the release of Java
    EE 7, we introduce the EJB 3.2 and JPA 2.1 APIs along with key features in the
    CDI and JAX-RS specifications through a series of digestible chapters, allowing
    you to become comfortable with these technologies one topic at a time. Within
    each chapter we provide executable source code examples that demonstrate how each
    feature works, and how the pieces fit together. So you don’t have to swallow the
    whole enchilada in one humongous gulp. In the spirit of our Apress Wines Online
    application, which we use for numerous examples throughout the book, we want you
    to truly savor and appreciate the richness of the Java EE 7 component ecosystem.


    For each technology we provide straightforward examples, but we also strive to
    explain when and where to use its features and what their strengths and weakness
    are, and offer insights into best usage practices. Following these topical explorations,
    we explain how to integrate EJB and related components into a comprehensive Java
    EE 7 application, and then turn the spotlight on transaction management, performance
    analysis, deployment, testing in an Embeddable EJB Container, and how to build
    solid EJB clients.


    Our job is to transform you from EJB novice to expert, and we want you to enjoy
    the ride!


    Jonathan Wetherbee, Chirag Rathod, Raghu Kodali, and Peter Zadrozny


    ### Who should read this book?


    This book is targeted at enterprise software developers who are experienced with
    Java, have built single tier or multitier applications using earlier versions
    of EJB or related technologies, and are looking to build enterprise software based
    on the latest cross-platform industry standards.


    As authors of an introductory-level text, we have two main goals:


    *   Our first goal is to get you comfortable working with the many essential elements
    of EJB and several closely related technologies so that you can design, build,
    deploy, execute, and test comprehensive enterprise applications in a Java EE environment.
    We expect you to be able to come away with a sense of ease with the nuts and bolts
    required to build and assemble an application based on EJB components.

    *   Our second goal is to provide you with a broad perspective on the service
    and persistence tiers of Java EE as a whole and, in particular, on the full range
    of features offered by EJB. We intend for you to leave this book holding a breadth-first
    foundation that will serve as a launchpad from which to explore specific areas
    of the EJB and related specifications in greater depth.


    To this end, this book strives to provide an approachable on-ramp to EJB that
    gets you comfortable with building services and applications that exercise the
    full breadth of EJB. We deliberately avoid diving deep into many areas of the
    spec, so that you can get familiar with the overall environment without getting
    distracted by the minutia of fine-grained options. We believe that this breadth-first
    foundation—based on a solid understanding of the broad range of features offered
    by EJB—will put you in the best position to then explore in greater depth, using
    the specification and other advanced texts as your reference guides, specific
    areas of the EJB API that are required for your own software development projects.


    ### Acknowledgments


    This book is borne of the efforts and insights of people who provided both technical
    input and pure inspiration throughout its life. In particular, I would like to
    thank my colleague and principal coauthor of this second edition, Chirag Rathod,
    for his insight, spirit, and dedication at all stages of the endeavor. Late nights
    and early mornings are made lighter when a close collaborator is also such a good
    friend! Raghu Srinivasan and John Bracken were invaluable in design meetings and
    discussions of EJB and JPA best practices. Chris Carter supported me on my quest,
    even when it took my attentions away from JDeveloper; he knew that the insights
    gained from researching and writing this book would surely pay back dividends
    to the team. And an enjoyable hour and a half with Marina Vatkina discussing the
    latest state and future directions of EJB 3.2 was both enlightening and timely.'
