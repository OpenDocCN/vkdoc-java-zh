- fmt: "# Asynchronous Methods\n\nAsynchronous methods immediately return to the caller\
    \ without waiting for the method execution to complete. Asynchronous methods are\
    \ typically used for processor intensive or long-running, background tasks, such\
    \ as printing a document or sending a large email.\n\nStarting with EJB 3.1, a\
    \ session bean can declare that one or more of its methods can be executed asynchronously.\
    \ When a session bean client invokes an asynchronous method, the container immediately\
    \ returns the control to the client. This allows the client to perform tasks in\
    \ parallel while the business method completes its execution on a separate thread.\
    \ For example, clients can use this functionality to show the progress of a long\
