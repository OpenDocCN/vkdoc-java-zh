    以下部分将从事务角度分析此次测试运行。


    通过事务性 Java 外观填充测试数据


    Servlet 客户端首先清空数据。CMT Bean 的客户端不创建事务，也不关心事务细节。它将所有工作委托给 CMT 会话 Bean 和（间接地）一个 Java
    外观，并依赖它们在事务上下文中执行工作。客户端首先从第 7 章示例应用程序中调用 `PopulateDemoData` 类，这是一个辅助类，它委托给一个使用应用程序管理的
    `EntityManager` 的 Java 外观，以重置演示数据，为新的测试运行做准备。我们首先提供这个示例，是为了看到在应用程序管理的 `EntityManager`
    上下文中事务的原始用法。稍后我们将检查 EJB 会话 Bean 的行为。


