    \ injection\nem.merge(entity);\n```"
  raw: '[***Listing 3-14.***](#9781430246923_Ch03.xhtml#_list14)  A POJO that Serves
    as an Entity Façade


    ```

    public class CustomerService {


    public static void main(String[] args) {

        final EntityManagerFactory emf =

          Persistence.createEntityManagerFactory("Chapter03PersistenceUnit-JSE");

        final EntityManager em = emf.createEntityManager();

        final Customer cust = new Customer();

        cust.setName("Best Customer Ever");

        em.persist(cust);

      }

    }

    ```


    Here we create an `EntityManagerFactory` that is again bound to the `Chapter03PersistenceUnit-JSE`
    persistence unit, which includes our `Customer` entity from [Listing 3-7](#9781430246923_Ch03.xhtml#list7).
    We then create an `EntityManager` instance from that factory and use it to persist
    a new `Customer` instance.


    Looking Up the EntityManager Through JNDI


    A third option, available also through both Java SE and EE environments, is to
    look up the `EntityManagerFactory`, or the `EntityManager` itself, through Java
    Naming and Directory Interface (JNDI). [Listing 3-15](#9781430246923_Ch03.xhtml#list15)
    shows an example of how this is done from within a session bean.


    [***Listing 3-15.***](#9781430246923_Ch03.xhtml#_list15)  EntityManager Lookup
    Through JNDI


    ```

    @Stateless

    @PersistenceContext(unitName="Chapter03PersistenceUnit")

    public class CustomerServiceBean {

        @Resource

        SessionContext ctx;


    public void performService() {

            EntityManager em = (EntityManager)ctx.lookup("Chapter03PersistenceUnit");

            // . . .

        }

    }

    ```


    The injected `SessionContext` resource provides a JNDI namespace for acquiring
    other resources at run time.


    Transaction Support


    The `EntityManager` also exposes methods to begin, commit, and roll back transactions
    for use with resource-local (non-JTA) transactions. This topic is covered in depth
    in [Chapter 8](../Text/9781430246923_Ch08.xhtml).


    The Entity Life Cycle


    An entity instance may go through many formal states during its life as an in-memory
    Java object. Understanding these different states will help you know when the
    entity is in a consistent or inconsistent state with the back-end database, and
    how to reconcile these differences within a transactional context.


    An entity instance will typically go through many states of persistence during
    its lifetime as a Java object. Since EJB 3, entity classes are completely transparent.
    They are created using ordinary constructors instead of the `Home` and `LocalHome`
    factory interfaces of earlier EJB versions. They may be freely passed to and from
    the EJB container and between clients, and they may be updated by a client without
    the overhead of a callback to the EJB container.


    The Life Cycle of a New Entity Instance


    Let’s take a look at the life cycle of a newly created persistent entity instance.
    In its life, the entity may visit the new, managed, detached, and removed states.


    New Entity Instance


    A client creates a new entity instance by using one of the entity’s Java constructors.
    This is a significant simplification over earlier EJB specifications, which required
    that users define `create()` factory methods on the entity bean’s `Home` and/or
    `LocalHome` interfaces. The default (no argument) constructor is required of all
    entity classes, but additional constructors may also be defined. The client may
    live outside or within an EJB container. At the point of construction, it is in
    the new state and does not yet have persistent identity because it has not been
    associated with an `EntityManager`’s persistence context. The client is free to
    call any of its methods and assign data values, and all updates to the entity
    are kept local to the entity class.


    Managed Entity Instance


    To turn this entity class into a persistent object, the client acquires an `EntityManager`
    instance and calls the `EntityManager.persist()` method. [Listing 3-16](#9781430246923_Ch03.xhtml#list16)
    shows a code snippet from a session bean that acquires the `EntityManager` through
    injection and then persists the entity instance passed as a parameter to the `persistEntity()`
    method.


    [***Listing 3-16.***](#9781430246923_Ch03.xhtml#_list16)  Example Showing How
    an Entity Instance Is Made Persistent


    ```

    @Stateless

    public class MySessionEJB {


    @PersistenceContext(unitName = "Chapter03PersistenceUnit")

      private EntityManager em;


    public void persistEntity(Object entity) {

        em.persist(entity);

      }

    }

    ```


    When the entity is made persistent, it is added to a persistence context as a
    managed instance. Being managed affords the entity the following advantages:


    *   By default, all fields on the entity are designated to be lazily loaded by
    the persistence provider. While a lazy designation is really only a hint (see
    the “Lazy vs. Eager Field Bindings” section later in the chapter), lazy field
    binding can be seamlessly performed only on managed instances.

    *   When an entity is managed, changes made to it may be tracked by the persistence
    manager to optimize subsequent `EntityManager.merge()` operations. For instance,
    change tracking may be handled directly on the entity instance using byte weaving
    provided by the persistence provider when the entity was instantiated. This is
    particularly important when managing a network of related entities, so that a
    minimum of effort is required to calculate the change set when the network of
    entities is merged back to the persistence context.


    In general, there is no guarantee that a call to `EntityManager.persist()` will
    cause a SQL `INSERT` statement to be performed immediately. It is up to the persistence
    manager to decide whether to perform this step immediately or at a later time
    but prior to committing the transaction. In this example, however, the default
    behavior of a method on a Stateless session bean is to create a new transaction
    and commit the work each time one of its methods is called, so the entity was
    not only inserted but committed as well.


    Sequence values may have been assigned to the entity instance, and other side-effect
    code may also have been executed during this step.


    Detached Entity Instance


    The entity remains in a managed state for the life of the persistence context
    in which it is contained, or until it is removed from the database. If one of
    these events occurs, or if the instance is passed by value to a client, it becomes
    a detached entity instance and is no longer associated with a persistence context.
    Detached entities do not undergo change tracking or other internal optimizations.
    In particular, the persistence provider is not available to bind fields lazily
    that were not already bound at the time the entity became detached, and attempting
    to access a detached entity’s field that has not yet been bound will throw a runtime
    exception. To merge its state back into the persistence context and make it a
    managed instance once again, you need to pass a detached entity to the `EntityManager.merge()`
    method.


    While an entity instance returned from an `EntityManager.merge()` call is managed,
    changes are not propagated immediately to the persistent storage; they merely
    update the entity itself. Suppose the client modifies the entity:


    ```

    entity = mySession.persistEntity(entity);

    entity.setName("foo");

    ```


    After the second statement above, the name change has been applied only to the
    entity instance, and no changes have been propagated to the persistence context
    or to the database. To apply these changes to the persistence context, you would
    call the `EntityManager.merge()` operation, as follows:


    ```

    // Assumes the EntityManager em was obtained, possibly through injection

    em.merge(entity);

