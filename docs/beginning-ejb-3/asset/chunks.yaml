    EJB 中的事务支持


    围绕企业应用设计和开发的许多工作都涉及如何协调持久化数据流的决策。这包括何时何地缓存数据、何时将其应用到持久化存储（通常是数据库）、如何解决同时尝试访问同一数据的问题，以及如何解决因违反数据库约束的操作而可能发生的错误。可靠的数据库能够在较低层级（数据库层）处理这些问题，但同样的问题也可能存在于中间层（应用服务器）和客户端层，并且通常需要特殊的应用逻辑。例如，数据库通过悲观锁支持提供内置的并发控制，而应用可能选择使用乐观锁策略来获得更优化的性能结果。


    使用 EJB 的主要好处之一是其对企业级服务（如事务管理和安全控制）的支持。在本章中，我们将探讨 EJB 如何提供事务服务，以及如何利用这些服务来满足您的特定需求。


    为了说明 EJB 提供的功能及其使用方法，我们将从示例应用 Apress Wines Online 中选取一个场景进行审视，该场景体现了上述数据流问题。我们将通过展示执行任务的方法来说明
    EJB 的事务支持，这些方法从简单简洁到略微复杂但更灵活。不过，在深入探讨示例之前，我们先概述 EJB 事务领域中的一些重要事务概念，包括 Java 事务
    API (JTA)、EJB 容器通过声明式 EJB 元数据为您提供的多种灵活事务选项，以及持久化层中事务的处理方式。EJB 自诞生以来就提供了这些基本的事务服务，因此，如果您对这些概念已经熟悉，可以直接跳到示例部分，了解它们如何在涉及
    Java 持久化 API (JPA) 的 EJB 世界中体现。


    什么是事务？


    在本节中，我们将探讨以下问题：


    *   什么是事务？为什么它对企业应用很重要？

    *   定义健壮可靠事务的核心 ACID（原子性、一致性、隔离性、持久性）属性是什么？

    *   什么是 JTA？什么是分布式事务？什么是两阶段提交？


    事务是一组必须作为一个单元执行的操作。这些操作可以是同步的或异步的，并且可能涉及持久化数据对象、发送邮件、验证信用卡以及许多其他事件。一个经典的例子是银行转账，其中一个操作从一个账户扣除资金（即更新数据库表中的一条记录），另一个操作将相同的资金存入另一个账户（更新同一或不同数据库表中的另一行）。从查询这两个账户的外部应用角度来看，绝不能出现这些资金同时在两个账户中可见的情况。也不能出现资金在两个账户中都不可见的时刻。只有当此事务中的两个操作都成功执行后，这些更改才能从另一个应用上下文中可见。以这种方式必须作为一个单元一起执行的一组操作称为事务。


    事务中的操作是顺序或并行执行的，通常在一个（相对较短的）时间段内。在所有操作都执行完毕后，事务被应用或提交。如果在事务执行过程中出现错误或其他无效条件，事务可能会被取消或回滚，并且在该事务上下文中已执行的操作将被撤销。


    分布式事务

    '
- fmt: '# 分布式事务


    当事务中的操作跨数据库或驻留在不同计算机或进程上的其他资源执行时，这被称为**分布式事务**。此类企业级事务需要所涉及资源之间的特殊协调，并且可能极难可靠地编程。这正是`JTA`发挥作用的地方，它提供了资源可以实现并绑定以参与分布式事务的接口。


    `EJB`容器是一个支持`JTA`的事务管理器，因此可以参与涉及其他`EJB`容器以及第三方`JTA`资源（如许多数据库管理系统（`DBMS`））的分布式事务。这减轻了业务应用程序开发人员协调分布式事务的复杂性，使他们能够自由地集成松散耦合的服务，并根据自己的选择在企业中分发数据。此外，正如您将在以下部分中看到的，`EJB`允许开发人员选择是显式地划分事务边界（通过调用`begin`、`commit`或`rollback`（取消）事务），还是允许`EJB`容器沿`EJB`方法边界自动执行事务划分。


    ## 事务的ACID属性


    不，不是那种迷幻的Kool-Aid。事务有各种形式和规模，可能涉及同步和异步操作，但它们都有一些共同的核心特征，称为其**ACID**组件。`ACID`指的是定义健壮可靠事务的四个特性：原子性（Atomicity）、一致性（Consistency）、隔离性（Isolation）和持久性（Durability）。[表8-1](#9781430246923_Ch08.xhtml#Tab1)描述了这四个组件。


    [表8-1.](#9781430246923_Ch08.xhtml#_Tab1) 事务的ACID属性


    | 特性 | 描述 |

    | --- | --- |

    | 原子性 | 事务由一个或多个作为组执行的操作组成，称为工作单元。原子性确保在事务结束时，这些操作要么全部成功执行（成功提交），要么全部不执行（成功回滚）。在事务结束时，如果部分（而非全部）操作完成，则原子性将被违反。
    |

    | 一致性 | 一致的事务具有数据完整性。一致性确保在事务结束时，数据处于一致状态，从而不会违反数据库约束或逻辑验证规则。 |

    | 隔离性 | 事务隔离性指定外部世界无法看到事务的中间状态。查看事务中涉及的数据对象的外部程序必须等到事务提交后才能看到修改后的数据对象。事务隔离性本身是一门复杂的科学，在很大程度上超出了本讨论的范围，但可以说`EJB`服务器提供商通常提供可配置的隔离设置，让您选择事务范围内的资源可以看到彼此待定更改的程度，以及在上下文事务期间外部提交的更改（脏读）。没有标准的隔离设置，因此可移植的应用程序不应依赖其运行时环境中的特定配置。
    |

    | 持久性 | 正确执行的事务是永久的，并且不会受到任何系统故障的影响。将数据提交到关系数据库（随后可以查询结果）通常可以实现此要求。 |


    自然，`EJB`解决了所有这些要求，我们将在后续示例中指出如何处理每一个要求。


    ## Java事务API（JTA）


    `JTA`为客户端和事务感知资源管理器定义了参与容错分布式事务的接口。`EJB`自动绑定到这些服务，因此客户端和企业级bean都可以方便地参与分布式编程，而无需显式编码诸如两阶段提交协议之类的逻辑。`EJB`进入其`JTA`事务的主要接口是通过`javax.transaction.UserTransaction`对象接口，该接口由`EJB`容器实例化，并通过注入到企业级bean类或通过Java命名和目录接口（`JNDI`）查找来提供。


    ## 两阶段提交协议


    如果您使用关系数据库编程过逻辑，您可能熟悉两阶段提交协议。此策略赋予参与分布式事务的资源管理器否决权，通过“准备”命令通知它们即将发出提交，并允许它们声明是否可以应用其更改。只有当所有资源管理器通过一致同意表明它们已准备好应用其更改时，事务管理器才会发出最终命令来实际应用更改。通常，资源管理器在“准备”步骤期间执行大部分更改，因此最终的“提交”步骤执行起来很简单。这减少了“提交”步骤期间发生错误的可能性。健壮的事务管理器和资源管理器能够处理甚至这种意外情况。


    ## EJB中的事务支持


    本节将探讨以下问题：


    *   企业级bean开发人员可以使用哪些事务服务？

    *   会话bean、消息驱动bean（`MDB`）和实体如何在事务上下文中交互？


    `EJB`服务器中的大部分基础设施都致力于支持这些服务，这是有充分理由的。`EJB`不仅提供了一个健壮的`JTA`事务管理器，还通过可在可互操作、可移植的业务组件上指定的声明性元数据使其易于访问。几乎所有Java
    `EE`应用程序都需要事务服务，而`EJB`以非常简洁的包将它们提供给应用程序开发人员。


    从其诞生之初，`EJB`框架就提供了一种便捷的方式来管理事务和访问控制，允许您逐个方法地以声明方式定义行为。除了这些容器提供的服务之外，`EJB`还允许您将控制权交给应用程序，以定义事务事件边界和其他自定义行为。


    在本章中，我们将研究事务在应用程序中完成一系列常见任务时所扮演的角色。在典型的Java `EE`应用程序中，会话bean通常用于建立事务边界，并操作实体以在事务上下文中与数据库交互。我们的示例混合了会话bean和实体操作，以说明`EJB`提供的内置（声明式）和手动行为。本着简化开发模型的精神，`EJB`默认提供了许多最有用的功能，因此默认事务选项既有用又强大也就不足为奇了。


    ## EJB事务服务


    `EJB`事务模型构建在此`JTA`模型之上，在该模型中，会话bean或其他应用程序客户端提供事务上下文，企业服务作为逻辑工作单元在其中执行。Java `EE`环境中通常在事务上下文中运行的企业服务包括：创建、检索、更新和删除实体；向队列发送`JMS`消息；执行`MDB`；触发邮件请求；调用Web服务；执行`JDBC`操作等等。'
  raw: 'When the operations in a transaction are performed across databases or other
    resources that reside on separate computers or processes, this is known as a distributed
    transaction. Such enterprise-wide transactions require special coordination between
    the resources involved, and can be extremely difficult to program reliably. This
    is where JTA comes in, providing the interface that resources can implement and
    bind to, to participate in a distributed transaction.


    The EJB container is a transaction manager that supports JTA, and so can participate
    in distributed transactions involving other EJB containers as well as third-party
    JTA resources, like many database management systems (DBMSs). This takes the complexity
    of coordinating distributed transactions off the shoulders of business application
    developers, so that they are free to integrate loosely coupled services and distribute
    their data across the enterprise however they choose. In addition, as you will
    see in the following sections, EJB allows developers to choose whether to demarcate
    transactions explicitly—with calls to begin, commit, or roll back (cancel) a transaction—or
    to allow the EJB container to automatically perform transaction demarcation along
    EJB method boundaries.


    The ACID Properties of a Transaction


    No, not the electric Kool-Aid kind. Transactions come in all shapes and sizes,
    and can involve synchronous and asynchronous operations, but they all have some
    core features in common, known as their ACID components. ACID refers to the four
    characteristics that define a robust and reliable transaction: atomicity, consistency,
    isolation, and durability. [Table 8-1](#9781430246923_Ch08.xhtml#Tab1) describes
    these four components.


    [Table 8-1.](#9781430246923_Ch08.xhtml#_Tab1)  The ACID Properties of a Transaction


    | Feature | Description |

    | --- | --- |

    | Atomicity | A transaction is composed of one or more operations that are performed
    as a group, known as a unit of work. Atomicity ensures that at the conclusion
    of the transaction, these operations are either all performed successfully (a
    successful commit), or none of them are performed at all (a successful rollback).
    At the end of a transaction, atomicity would be violated if some, but not all,
    of the operations completed. |

    | Consistency | A consistent transaction has data integrity. Consistency ensures
    that at the conclusion of the transaction, the data is left in a consistent state,
    so that database constraints or logical validation rules are not left in violation.
    |

    | Isolation | Transaction isolation specifies that the outside world is not able
    to see the intermediate state of a transaction. Outside programs viewing the data
    objects involved in a transaction must not see the modified data objects until
    after the transaction has been committed. Transaction isolation is a complex science
    in itself, and is largely beyond the scope of this discussion, but suffice it
    to say that EJB server providers typically offer configurable isolation settings
    that let you choose the degree to which resources within a transaction’s scope
    can see each other’s pending changes, and changes that were committed externally
    but during the course of the context transaction (dirty reads). There is no standard
    isolation setting, so portable applications should not rely on a particular configuration
    in their run-time environment. |

    | Durability | Transactions that are performed correctly are permanent and cannot
    be affected by any failure of the system. Committing the data into a relational
    database, in which the results may subsequently be queried, typically achieves
    this requirement. |


    Naturally, EJB addresses all these requirements, and we will point out how each
    one is handled in the examples that follow.


    The Java Transaction API (JTA)


    JTA defines an interface for clients and transaction-aware resource managers to
    participate in fault-tolerant distributed transactions. EJB automatically binds
    to these services, so both clients and enterprise beans can conveniently participate
    in distributed programming without having to explicitly code logic such as the
    two-phase commit protocol. The primary interface for an EJB into its JTA transaction
    is through the `javax.transaction.UserTransaction` object interface instantiated
    by the EJB container and made available either through injection into the enterprise
    bean class or through a Java Naming and Directory Interface (JNDI) lookup.


    The Two-Phase Commit Protocol


    If you have programmed logic using relational databases, you may be familiar with
    the two-phase commit protocol. This strategy gives veto authority to resource
    managers participating in a distributed transaction, notifying them through a
    “prepare” command that a commit is about to be issued, and allowing them to declare
    whether they can apply their changes. Only if all resource managers indicate through
    unanimous consent that they are prepared to apply their changes does the final
    word come down from the transaction manager to actually apply the changes. Typically,
    resource managers perform the bulk of the changes during the “prepare” step, so
    the final “commit” step is trivial to execute. This reduces the likelihood that
    errors will occur during the “commit” step. Robust transaction managers and resource
    managers are capable of handling even this eventuality.


    Transaction Support in EJB


    This section will explore the following questions:


    *   What transaction services are available to enterprise bean developers?

    *   How do session beans, message-driven beans (MDBs), and entities interact in
    a transactional context?


    Much of the infrastructure in the EJB server is dedicated to supporting these
    services, and for good reason. Not only does EJB provide a robust JTA transaction
    manager, it makes it accessible through declarative metadata that can be specified
    on interoperable, portable business components. Virtually all Java EE applications
    require transaction services, and EJB brings them to the application developer
    in a very slick package.


    From its inception, the EJB framework has provided a convenient way to manage
    transactions and access control by letting you define the behavior declaratively
    on a method-by-method basis. Beyond these container-provided services, EJB lets
    you turn control over to your application to define transaction event boundaries
    and other custom behavior.


    In this chapter, we look at the role transactions play in accomplishing a range
    of common tasks in your application. In a typical Java EE application, session
    beans typically serve to establish the boundaries of a transaction, and manipulate
    entities to interact with the database in the transactional context. Our examples
    mix session bean and entity operations to illustrate both the built-in (declarative)
    and manual behavior provided by EJB. In the spirit of the simplified development
    model, EJB provides a lot of its most useful features by default, so it should
    come as no surprise that the default transaction options are both useful and powerful.


    EJB Transaction Services


    The EJB transaction model is built on this JTA model, in which session beans or
    other application clients provide the transactional context in which enterprise
    services are performed as a logical unit of work. Enterprise services in the Java
    EE environment that typically operate in a transactional context include creating,
    retrieving, updating, and deleting entities; sending JMS messages to the queue;
    executing MDBs; firing mail requests; invoking Web services; executing JDBC operations;
    and much more.'
  trans: '

    当事务中的操作跨数据库或位于不同计算机或进程上的其他资源执行时，这被称为**分布式事务**。此类企业级事务需要在所涉及的资源之间进行特殊协调，并且极难进行可靠的编程。这正是
    JTA 发挥作用的地方，它提供了资源可以实现并绑定的接口，以便参与分布式事务。


    EJB 容器是一个支持 JTA 的事务管理器，因此可以参与涉及其他 EJB 容器以及第三方 JTA 资源（例如许多数据库管理系统 (DBMS)）的分布式事务。这减轻了业务应用程序开发人员协调分布式事务的复杂性，使他们能够自由地集成松散耦合的服务，并根据自己的选择在企业内部分布数据。此外，正如您将在以下各节中看到的，EJB
    允许开发人员选择是显式地划分事务边界（通过调用 begin、commit 或 rollback (cancel) 来标记事务），还是允许 EJB 容器沿着
    EJB 方法边界自动执行事务划分。


    事务的 ACID 属性


    不，不是指那种迷幻饮料。事务有各种形式和规模，可能涉及同步和异步操作，但它们都具有一些共同的核心特征，即 ACID 组件。ACID 指的是定义健壮且可靠的事务的四个特性：原子性、一致性、隔离性和持久性。表
    8-1 描述了这四个组件。


    表 8-1.  事务的 ACID 属性


    | 特性 | 描述 |

    | --- | --- |

    | 原子性 | 一个事务由一个或多个作为一组执行的操作组成，这组操作被称为工作单元。原子性确保在事务结束时，这些操作要么全部成功执行（成功提交），要么全部不执行（成功回滚）。在事务结束时，如果只有部分操作完成，则违反了原子性。
    |

    | 一致性 | 一致的事务具有数据完整性。一致性确保在事务结束时，数据处于一致状态，从而不会违反数据库约束或逻辑验证规则。 |

    | 隔离性 | 事务隔离性规定外部世界无法看到事务的中间状态。查看事务中涉及的数据对象的外部程序，必须等到事务提交后才能看到修改后的数据对象。事务隔离性本身是一门复杂的科学，在很大程度上超出了本讨论的范围，但可以说，EJB
    服务器提供商通常提供可配置的隔离设置，让您可以选择事务范围内的资源能够看到彼此待定更改的程度，以及外部提交但在上下文事务期间发生的更改（脏读）。没有标准的隔离设置，因此可移植的应用程序不应依赖其运行时环境中的特定配置。
    |

    | 持久性 | 正确执行的事务是永久性的，不会受到任何系统故障的影响。将数据提交到关系数据库中（随后可以查询结果）通常可以实现此要求。 |


    自然，EJB 满足了所有这些要求，我们将在后续示例中指出如何处理每一个要求。


    Java 事务 API (JTA)


    JTA 为客户端和感知事务的资源管理器定义了一个接口，用于参与容错的分布式事务。EJB 自动绑定到这些服务，因此客户端和企业 Bean 都可以方便地参与分布式编程，而无需显式编码诸如两阶段提交协议之类的逻辑。EJB
    进入其 JTA 事务的主要接口是通过 `javax.transaction.UserTransaction` 对象接口，该接口由 EJB 容器实例化，并可通过注入到企业
    Bean 类或通过 Java 命名和目录接口 (JNDI) 查找来获得。


    两阶段提交协议


    如果您使用关系数据库编写过逻辑程序，您可能熟悉两阶段提交协议。此策略赋予参与分布式事务的资源管理器否决权，通过“准备”命令通知它们即将发出提交，并允许它们声明是否可以应用其更改。只有当所有资源管理器一致同意它们已准备好应用其更改时，事务管理器才会下达最终指令来实际应用更改。通常，资源管理器在“准备”步骤期间执行大部分更改，因此最终的“提交”步骤执行起来很简单。这降低了在“提交”步骤期间发生错误的可能性。健壮的事务管理器和资源管理器甚至能够处理这种意外情况。


    EJB 中的事务支持


    本节将探讨以下问题：


    *   企业 Bean 开发人员可以使用哪些事务服务？

    *   会话 Bean、消息驱动 Bean (MDB) 和实体如何在事务上下文中交互？


    EJB 服务器中的大部分基础设施都专用于支持这些服务，这是有充分理由的。EJB 不仅提供了一个健壮的 JTA 事务管理器，还通过可在可互操作、可移植的业务组件上指定的声明性元数据使其易于访问。几乎所有的
    Java EE 应用程序都需要事务服务，而 EJB 以非常简洁的包将它们提供给应用程序开发人员。


    从其诞生之初，EJB 框架就提供了一种便捷的方式来管理事务和访问控制，它允许您逐个方法地以声明方式定义行为。除了这些容器提供的服务之外，EJB 还允许您将控制权交给应用程序，以定义事务事件边界和其他自定义行为。


    在本章中，我们将探讨事务在您的应用程序中完成一系列常见任务时所扮演的角色。在典型的 Java EE 应用程序中，会话 Bean 通常用于建立事务边界，并操作实体以在事务上下文中与数据库交互。我们的示例混合了会话
    Bean 和实体操作，以说明 EJB 提供的内置（声明式）和手动行为。本着简化开发模型的精神，EJB 默认提供了许多最有用的功能，因此默认事务选项既实用又强大也就不足为奇了。


    EJB 事务服务


    EJB 事务模型构建在此 JTA 模型之上，在该模型中，会话 Bean 或其他应用程序客户端提供事务上下文，企业服务作为逻辑工作单元在其中执行。在 Java
    EE 环境中，通常在事务上下文中运行的企业服务包括：创建、检索、更新和删除实体；向队列发送 JMS 消息；执行 MDB；触发邮件请求；调用 Web 服务；执行
    JDBC 操作等等。

    '
- fmt: '# EJB 事务管理


    `EJB`提供了内置的`JTA`事务管理器，但其真正强大之处在于`EJB`为`Bean`提供者提供的声明式服务。通过使用元数据标签而非程序化逻辑，`EJB`开发者可以无缝地参与`JTA`事务，并以声明方式控制企业`Bean`上每个业务方法的事务行为。


    `EJB`通过为`JTA`事务和非`JTA`（资源本地）事务提供显式支持，扩展了这种编程模型。资源本地事务仅限于单个资源管理器（例如数据库连接），但通过避免分布式事务监视器的开销，可能会带来性能优化。


    此外，应用程序构建者可以利用容器提供的服务来自动管理事务，或者他们可以选择控制事务边界并显式处理事务的开始、提交和回滚事件。在单个应用程序中，这两种方法可以结合使用。虽然选择由容器还是应用程序本身来划分事务是在企业`Bean`上定义的，但选择对`JPA`实体使用哪种事务模型（`JTA`或资源本地）则取决于`persistence.xml`文件中持久化单元的配置方式。


    游戏中的持久化对象（即实体）完全且愉快地对其管理事务框架一无所知。实体操作的事务上下文不是其定义的一部分，因此，只要创建了适当的`EntityManager`来服务实体的生命周期事件，同一个实体类就可以在应用程序选择的任何事务上下文中使用。


    如果这一切在此时看起来有些令人生畏，请不要担心。一旦我们通过一些代码示例来演示所有部分如何协同工作，一切都会变得清晰。同样值得注意的是，`EJB`内置的容器管理事务（`CMT`）支持对于在`EJB`容器内运行的大多数应用程序来说已经足够。本章将让您探索各种选项——但除非您编写的应用程序涉及完全存在于`EJB`容器之外的实体，否则默认支持很可能能够很好地满足您的需求。


    ## 服务模型中的会话 Bean 事务行为


    下一节将探讨以下问题：


    - `EJB`容器为会话`Bean`提供了哪些声明式事务支持？

    - 容器管理事务（`CMT`）划分与`Bean`管理事务（`BMT`）划分之间有什么区别？何时会选择一种方法而非另一种？

    - 什么是`CMT`属性？

    - `EJB`如何支持使用`Bean`管理事务（`BMT`）`Bean`显式划分事务边界？

    - 隐式提交行为与显式提交行为有何区别？


    企业`Bean`是`EJB`服务层的核心。通过会话`Bean`，`EJB`容器提供了事务事件的声明式划分，以及选择在`Bean`或应用程序客户端代码中显式划分事务事件的选项。让我们分别考虑这两种方法，从默认选项开始：利用声明式标记进行容器管理事务划分。


    ## 容器管理事务（`CMT`）划分


    `EJB`容器提供了内置的事务管理服务，默认情况下可供会话`Bean`和`MDB`使用。`Bean`通过元数据（使用注解或`XML`）为其每个方法指定事务特性，`EJB`容器遵循这些指令来确定要执行的事务操作（如果有）。使用这些指令，`EJB`容器可以在方法被调用时自动开始一个新事务，或挂起或重用现有事务，并可能在方法返回调用者之前提交事务。


    ![image](Images/sq.jpg) **注意**：只有`Bean`开发者可以分配企业`Bean`的事务管理类型。应用程序组装者被允许通过`ejb-jar.xml`文件覆盖`Bean`的方法级容器管理事务属性，但他们必须谨慎以避免死锁的可能性。应用程序组装者和部署者通常不被允许覆盖`Bean`的事务管理类型。


    当`EJB`在元数据中声明其事务行为时，容器会拦截对企业`Bean`方法的调用，并在会话`Bean`的方法边界处应用事务行为，提供一组固定的选项供您为每个方法指定。容器提供的默认行为（即未指定其他指令时）是在调用方法之前立即检查当前线程是否关联了事务上下文。如果没有可用的事务上下文，容器会在执行方法之前开始一个新事务。如果存在可用的事务，容器会允许该事务传播到方法调用，并使该方法代码可用。然后，在从方法调用返回时，容器再次检查。如果容器负责创建了新的事务上下文，它会在方法退出后自动提交该事务。如果容器没有创建事务，则允许事务不受影响地继续。通过拦截`Bean`的方法调用，`EJB`容器能够在运行时应用在开发时以声明方式指定的事务行为。


    上一段描述的默认行为只是容器提供的六种`CMT`划分选项之一。您可以将这六种划分选项中的任何一种归因于会话`Bean`上的任何方法。某些属性值需要满足特定条件；当条件不满足时，会抛出异常。这六种属性列在[表
    8-2](#9781430246923_Ch08.xhtml#Tab2)中。


    [表 8-2](#9781430246923_Ch08.xhtml#_Tab2) 容器事务属性定义'
  raw: 'EJB provides a built-in JTA transaction manager, but the real power lies in
    the declarative services EJB offers to bean providers. Using metadata tags instead
    of programmatic logic, EJB developers can seamlessly participate in JTA transactions
    and declaratively control the transactional behavior of each business method on
    an enterprise bean.


    EJB extends this programming model by providing explicit support for both JTA
    transactions and non-JTA (resource-local) transactions. Resource-local transactions
    are restricted to a single resource manager, such as a database connection, but
    may result in a performance optimization by avoiding the overhead of a distributed
    transaction monitor.


    In addition, application builders may leverage the container-provided services
    for automatically managing transactions, or they may choose to take control of
    the transaction boundaries and handle the transaction begin, commit, and rollback
    events explicitly. Within a single application, both approaches may be used, in
    combination if desired. Whereas the choice of whether to have the container or
    the application itself demarcate transactions is defined on the enterprise bean,
    the decision of which type of transaction model to use with JPA entities—JTA or
    resource-local—is determined by how the persistence unit is configured in the
    `persistence.xml` file.


    The persistent objects in the game—the entities—are entirely, and happily, unaware
    of their governing transaction framework. The transactional context in which an
    entity operates is not part of its definition, and so the same entity class may
    be used in whatever transactional context the application chooses, provided an
    appropriate `EntityManager` is created to service the entity’s life-cycle events.


    If all of this seems a little daunting at this point, fear not. It will all make
    sense once we walk through some examples in code that demonstrate how all the
    pieces work together. It is also worth noting that EJB’s built-in Container-Managed
    Transaction (CMT)support is more than adequate for most applications running inside
    the EJB container. This chapter will let you explore your options—but unless you
    are writing applications involving entities that live wholly outside of the EJB
    container, the default support is likely to serve your needs quite nicely.


    Session Bean Transactional Behavior in the Service Model


    This next section will explore the following questions:


    *   What declarative transaction support does the EJB container offer to session
    beans?


    *   What is the difference between container-managed transaction (CMT) demarcation
    and bean-managed transaction (BMT) demarcation? When would you choose one approach
    over the other?

    *   What are CMT attributes?

    *   How does EJB support the explicit demarcation of transaction boundaries using
    bean-managed transaction (BMT) beans?


    *   What is implicit vs. explicit commit behavior?


    The enterprise bean is the heart of the EJB service layer. Through session beans,
    the EJB container offers declarative demarcation of transaction events, along
    with the option to demarcate transaction events explicitly in the bean or in the
    application client code. Let’s consider these two approaches separately, beginning
    with the default option: leveraging container-managed transaction demarcation
    using declarative markup.


    Container-Managed Transaction (CMT) Demarcation


    The EJB container provides built-in transaction management services that are available
    by default to session beans and MDBs. The bean designates transaction characteristics
    for each of its methods through metadata (using either annotations or XML), and
    the EJB container follows those directives to determine the transactional action
    (if any) to perform. Using these directives, the EJB container may automatically
    begin a new transaction, or suspend or reuse an existing transaction when the
    method is invoked, and possibly commit the transaction before the method returns
    to the caller.


    ![image](Images/sq.jpg) **Note**   Only the bean developer may assign the transaction
    management type of an enterprise bean. Application assemblers are permitted to
    override the bean’s method-level container-managed transaction attributes through
    the `ejb-jar.xml` file, but they must use caution to avoid the possibility of
    deadlock. Application assemblers and deployers are generally not permitted to
    override the bean’s transaction management type.


    When an EJB declares its transactional behavior in metadata, the container interposes
    on calls to the enterprise bean’s methods and applies transactional behavior at
    the session bean’s method boundaries, providing a fixed set of options that you
    can specify for each method. The default behavior provided by the container (i.e.,
    when no other directive is specified) is to check, immediately before invoking
    the method, whether a transaction context is associated with the current thread.
    If no transaction context is available, the container begins a new transaction
    before executing the method. If a transaction is available, the container allows
    that transaction to be propagated to the method call and made available to the
    method code. Then, upon returning from the method invocation, the container checks
    again. If the container was responsible for creating a new transaction context,
    it automatically commits that transaction after the method is exited. If it didn’t
    create the transaction, then it allows the transaction to continue unaffected.
    By interposing on the bean’s method calls, the EJB container is able to apply
    transactional behavior at run time that was specified declaratively at development
    time.


    The default behavior, described in the previous paragraph, is but one of six CMT
    demarcation options provided by the container. You can attribute any one of these
    six demarcation options to any method on a session bean. Some of the attribute
    values require specific conditions to be met; when they are not met, an exception
    is thrown. These six attributes are listed in [Table 8-2](#9781430246923_Ch08.xhtml#Tab2).


    [Table 8-2](#9781430246923_Ch08.xhtml#_Tab2).   Container Transaction Attribute
    Definitions'
