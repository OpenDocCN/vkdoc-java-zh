    The Order Processing Façade Component


    `OrderProcessFacadeBean` is a stateless session bean. This bean provides business
    methods that are invoked by `ShoppingCartBean` to submit an order and other methods
    that interact with the credit and order processing services. `OrderProcessFacadeBean`
    has the business methods described in the following subsections.


    Credit Check


    [Listing 7-10](#9781430246923_Ch07.xhtml#list10) shows the `performCreditCheck()`
    method in `OrderProcessFacadeBean`. This method uses a `CreditService` that was
    injected using the `@WebServiceRef` annotation to get the port of the Web service.
    Once the port is available, the code can call the `creditCheck` Web service operation,
    which takes a credit card number and returns a message on the validity of the
    card in true or false terms. We are using the credit service that we developed
    in [Chapter 6](../Text/9781430246923_Ch06.xhtml).


    ***[Listing 7-10](#9781430246923_Ch07.xhtml#_list10).***  The performCreditCheck
    Business Method


    ```

    private boolean performCreditCheck(Individual individual) {

      String ccnum = individual.getCcNum().toString();

      CreditCheckEndpointBean creditService = service.getCreditCheckEndpointBeanPort();

      return creditService.creditCheck(ccnum);

    }

    ```


    Creating a Purchase Order


    [Listing 7-11](#9781430246923_Ch07.xhtml#list11) shows the `processOrder()` method
    in `OrderProcessFacadeBean`. `ShoppingCartBean` calls this business method when
    an order is submitted by the client application. This method has one parameter,
    which is of `Customer` entity type. The customer’s shopping cart is contained
    in its `cartItems` list, each member of which references a wine and a quantity
    added to the cart by the customer while shopping.


    To start with, the method checks whether the received entity is managed. If not,
    a call to the `merge()` method of the `EntityManager` is made to retrieve a managed
    `Customer` object.


    ![image](Images/sq.jpg) **Note**   It is worth noting that when we run this application
    (following the steps at the end of this chapter), the ­customer parameter will
    be found in the persistence context, and so the merge step will not be performed.
    This is because `processOrder()` is called from an existing transactional context—the
    transaction that was created when its calling method, `ShoppingCartBean.sendOrderToOPC()`
    was invoked. A single persistence context is always bound to a given transaction,
    and in this case the extended persistence context from `ShoppingCartBean` is the
    one associated with this transaction. When `sendOrderToOPC()` is invoked, an existing
    context transaction is found and used. When `em.contains(customer)` is called
    inside `processOrder`, the EntityManager for `OrderProcessFacadeBean` observes
    that a persistence context is already associated with this transaction, and it
    uses this persistence context, which is the same extended persistence context
    associated with ShoppingCartBean. This is why the customer instance is already
    determined to be managed.


    Once the managed customer entity is obtained, it checks whether the customer is
    an `Individual` or a `Distributor`. For individuals, a call to the `performCreditCheck()`
    method is made to verify the credit card. If the credit card is found to be invalid,
    the message “Invalid Credit Card” is sent back to the client application via `ShoppingCartBean`.
    For distributors, the `memberStatus` property is checked, and any value other
    than “APPROVED” is rejected.


    If the customer is approved, then processing continues, and a new order of type
    `CustomerOrder` is created. This new order is populated with the collection of
    `CartItem` objects associated with the `Customer` and found in its `cartItems`
    property. For each cart item, an `OrderItem` object is created to capture the
    quantity of each wine and the total price for the wine in that cart item. The
    price for each order item is calculated using the available retail price information
    for each `Wine` entity.


    Once all the cart items have been processed and corresponding order items have
    been created, the new `CustomerOrder` containing the order items is persisted,
    in part to acquire a generated value for its `id` field, which is used when generating
    an e-mail from within the call `sendPOtoMDB()`. The `removeCartItem()` method
    is then called on each cart item to remove it from the `Customer`.'
