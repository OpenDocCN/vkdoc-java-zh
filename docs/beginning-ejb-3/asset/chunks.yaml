- fmt: '# Performance of Computer Systems


    Performance of computer systems is a very complex issue. Just think about the
    following: We are programming a piece of Java code that takes advantage of an
    infrastructure called Java Enterprise Edition (Java EE), which happens to run
    on top of a Java Virtual Machine (`JVM`). The virtual machine is hosted on an
    operating system, which runs on a computer that interacts with other computers
    using networks composed of hardware and software components. Each of these layers—the
    network, the computer, the operating system, the `JVM`, and the Java EE server—has
    a number of knobs that can be used to configure and optimize behavior. Each of
    them will present a different behavior under various usage conditions, which will
    inevitably impact the behavior of the other layers. Within this rather complex
    context, it becomes a little easier to understand why our logic will not always
    work.


    The bottom line is that we just cannot generalize when making performance statements.
    The only way that we can find out what performance to expect from our system is
    to test it in conditions as close as possible to the ones in which the code will
    run when in the production environment.


    Every software application is unique. In order to understand the performance of
    your own application, you must test it yourself, according to your own definition
    of performance. In some situations, good performance will mean the ability to
    support a large number of users; in others (for example, when the user load is
    small), it will simply mean being able to run as fast as possible.


    In this chapter, we describe a methodology that you can use to test the performance
    of your systems in a consistent way. We also present tools that you can use to
    conduct these tests. Finally, we carry out a performance test to illustrate the
    methodology and the usage of the tools. The methodology and toolkit are useful
    in two basic situations:


    *   Performance testing a complete application

    *   Designing for performance (examining the performance costs of various aspects
    of the Java EE API and how certain design decisions will impact overall performance)


    In the first scenario, we treat the application like a black box. We test the
    application under various user loads and investigate the performance of every
    request made by the users. The data is analyzed—we search for requests that don’t
    meet the required criteria, and opportunities for improving performance are identified.


    While the aforementioned is useful, our advice is to performance test as early
    in the development cycle as possible. This way, you can use the methodology and
    the data you obtain from it to help you design for performance, rather than performance
    testing after the fact.


    The example presented in this chapter focuses on designing for performance, rather
    than testing a complete application. If you are interested in learning more about
    the methodology of testing an application and performance testing in general,
    you can refer to *J2EE Performance Testing with BEA WebLogic Server* by Peter
    Zadrozny (Apress, 2003). In this chapter, we present an adaptation of the methodology
    presented in Zadrozny’s book, which is narrowly focused on the example at hand.


    ## The Testing Methodology


    The focus of the testing methodology is consistency of data measurement. The following
    list provides a high-level overview of the steps that are involved in the methodology.
    We present them and describe them in the logical order in which they will be carried
    out when performing each test:


    1.  *Define the performance criteria.* We must define the relevant performance
    metrics for the specific application in question and set a realistic target for
    that metric (for instance, a maximum acceptable response time).

    2.  *Accurately simulate the application usage.* The key aspect of this is the
    definition of the test scripts. These are configuration files that contain a set
    of requests that represent typical usage profiles of the application.

    3.  *Define the test metrics.* These include the duration of the tests, the size
    of the sample, the amount of initial data to exclude, and others.

    4.  *Perform the tests.*


    ## Performance Criteria


    Depending on the type of application, your focus will vary between two basic performance
    indicators: response time and throughput.


    When working with synchronous interactive applications, we define a maximum acceptable
    response time. This is the maximum amount of time that we are willing to wait
    before we get a response from the application.


    For a batch or back-end application, we define the minimum acceptable throughput,
    typically as transactions per second (`TPS`), but this has to be based on a solid
    understanding of exactly how a transaction will be defined in your system.


    Each of these metrics is inextricably linked to one another; however, we have
    not been able to find any mathematical or geometrical relation between them.


    Our advice is to define your performance metrics clearly and unambiguously, and
    to test to well-defined requirements. Not doing so is an open invitation to test
    and tune endlessly.


    As we will be collecting data during the performance test runs, we need to have
    a clear understanding of the basic statistics, so let’s examine them in more detail.


    For the purposes of this book, we define *response time* as the length of time
    a client has to wait from the moment it sends a request to the moment it receives
    the last byte of the response from the application.


    The sets of data that we collect from a performance test run consist of the individual
    response times of every request that makes up the test script. Each request in
    a test script is executed one after another, by each simulated user for a certain
    period of time. Our base measurement of analysis is the arithmetic mean of the
    response times for all users of a particular request: the average response time
    (`ART`).


    *Aggregate average response time (`AART`)* is a measurement that we use extensively
    when analyzing performance data, and we define it as the sum of the `ART`s of
    every individual request in a test script, divided by the number of requests in
    that test script.


    Admittedly, `AART` has no real meaning in terms of how an application is performing,
    but it does provide an excellent indicator of how loaded is the entire system.
    As such, we sometimes refer to this measurement as the *load factor.* A typical
    `AART` curve when plotted against the number of simultaneous users looks like
    the one presented in [Figure 9-1](#9781430246923_Ch09.xhtml#Fig1).


    ![9781430246923_Fig09-01.jpg](Images/9781430246923_Fig09-01.jpg)


    [Figure 9-1.](#9781430246923_Ch09.xhtml#_Fig1)  A typical `AART` curve


    Throughput is not a clear-cut metric in the same way as is response time. The
    standard way of expressing throughput is in `TPS`, and it is vital to understand
    what a transaction represents in the application being tested. It might be a single
    query or a specific group of queries. In a messaging system, it might be a single
    message; and in a servlet-based application, it might be a request. Even when
    there is consensus as to exactly what is being measured, the values obtained for
    throughput can often be misinterpreted. The reason for this is that many people
    regard this metric in much the same way as they regard “miles per hour”: as a
    measurement of speed. In fact, throughput is a measure of capacity.'
  raw: 'Performance of computer systems is a very complex issue. Just think about
    the following: We are programming a piece of Java code that takes advantage of
    an infrastructure called Java Enterprise Edition (Java EE), which happens to run
    on top of a Java Virtual Machine (JVM). The virtual machine is hosted on an operating
    system, which runs on a computer that interacts with other computers using networks
    composed of hardware and software components. Each of these layers—the network,
    the computer, the operating system, the JVM, and the Java EE server—has a number
    of knobs that can be used to configure and optimize behavior. Each of them will
    present a different behavior under various usage conditions, which will inevitably
    impact the behavior of the other layers. Within this rather complex context, it
    becomes a little easier to understand why our logic will not always work.


    The bottom line is that we just cannot generalize when making performance statements.
    The only way that we can find out what performance to expect from our system is
    to test it in conditions as close as possible to the ones in which the code will
    run when in the production environment.


    Every software application is unique. In order to understand the performance of
    your own application, you must test it yourself, according to your own definition
    of performance. In some situations, good performance will mean the ability to
    support a large number of users; in others (for example, when the user load is
    small), it will simply mean being able to run as fast as possible.


    In this chapter, we describe a methodology that you can use to test the performance
    of your systems in a consistent way. We also present tools that you can use to
    conduct these tests. Finally, we carry out a performance test to illustrate the
    methodology and the usage of the tools. The methodology and toolkit are useful
    in two basic situations:


    *   Performance testing a complete application

    *   Designing for performance (examining the performance costs of various aspects
    of the Java EE API and how certain design decisions will impact overall performance)


    In the first scenario, we treat the application like a black box. We test the
    application under various user loads and investigate the performance of every
    request made by the users. The data is analyzed—we search for requests that don’t
    meet the required criteria, and opportunities for improving performance are identified.


    While the aforementioned is useful, our advice is to performance test as early
    in the development cycle as possible. This way, you can use the methodology and
