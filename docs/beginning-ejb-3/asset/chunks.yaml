  trans: '

    一个 EAR 文件可能在其 `META-INF` 目录中包含一个应用级部署描述符 `application.xml`。在 Java EE 5 中，此文件是可选的，因为现在可以依赖默认规则为每个模块提供默认名称和属性。默认情况下，每个模块的名称默认为其归档文件的短名称，减去文件后缀（`.jar`、`.war`
    等）。定义 `application.xml` 描述符允许您优化默认名称和属性，并有选择地选择 EAR 文件中的哪些模块包含在特定部署的应用中。


    ![image](img/sq.jpg) **注意**   WAR 文件和 EAR 文件是分别带有 `.war` 或 `.ear` 扩展名的标准 JAR 文件。


    组装者特定任务


    根据每个模块部署描述符的完整性和复杂性，可能需要组装者完成或优化提供者声明的一些外部引用。在许多情况下，模块足够自包含且完整，因此即使提供者未提供部署描述符，组装者也无需执行进一步工作。在更复杂的部署场景中，当使用提供者提供的文档（可能通过注解或部署描述符中的描述属性传达）时，组装者可能需要将语义等价但名称不同的资源合并到一个最小的、不同的集合中。相反，组装者可能需要通过重命名共享相同名称但具有不同语义的资源引用来避免资源名称冲突。


    例如，如果组装者正在将两个由不同提供者生成的 Java EE 模块打包到一个 Java EE 应用中，两个提供者可能引用同一个逻辑 EJB 但使用不同的名称，或者它们可能使用尚未绑定的名称来引用。组装者有责任使用提供者提供的文档检测此类情况，并更新
    EJB 引用以绑定到单个名称。此名称可由组装者选择并分配给该应用上下文中的 EJB。


    组装者所做的任何更改仅应用于模块和应用部署描述符文件，而不应用于 Java 源代码。此过程之所以有效，是因为 Java EE 规定的优先级规则：当 Java
    注解源代码和 XML 部署描述符中都定义了冲突的元数据属性时，部署描述符将优先。组装者只需处理部署描述符文件即可解决 Java 源代码中的不一致性。


    部署者


    部署者的任务和交付物如图 11-3 所示。


    ![9781430246923_Fig11-03.jpg](img/9781430246923_Fig11-03.jpg)


    图 11-3.  应用部署者的任务和交付物


    部署者特定任务


    再次使用来自组装者（和提供者）的指令——通常通过部署描述符或源代码注解中的描述属性传达——部署者需要将所有外部引用绑定到目标应用服务器环境中的具体资源（EJB
    引用、资源引用、持久化单元引用等）。只有部署者能够了解目标服务器环境，并且 Java EE 特意为所有资源使用添加了一层间接性，以允许此绑定发生，而不影响提供者或组装者的工作。这就是
    Java EE 组件使用的所有资源都通过间接引用进行引用的原因。


    与组装者的情况一样，Java EE 策略规定部署者只能更改 XML 部署描述符文件，而不能更改 Java 源代码中的注解。


    调用应用服务器特定的部署工具


    最后，您的 Java EE 模块或 Java EE 应用已准备好提交给应用服务器。您的应用服务器将提供一个部署工具，让您完成部署并将 Java EE 组件安装到应用服务器中，准备由最终用户应用执行。在此阶段，部署工具将验证提交的模块的内部完整性，并确保所有资源都可以绑定到驻留在应用服务器环境中的实际对象。如果在部署时找不到任何必需的资源，或者找不到引用的库组件，则部署将失败。


    概述总结


    Java EE 部署允许您部署单个模块、库组件或完整的应用。在许多情况下，部署可能仅涉及将编译后的源代码与描述符（对于持久化单元，`persistence.xml`
    文件是必需的，但对于 EJB JAR、WAR 和 EAR 模块，`ejb-jar.xml`、`web.xml` 和 `application.xml` 文件是可选的）打包在一起，并提交给部署工具。当从可能由不同组件提供者构建且可能版本不同的多个模块组装应用时，组装者的角色变得更加重要。


    Java EE 部署基础设施


    现在我们已经总结了部署过程，让我们探讨一下 Java EE 基础设施中一些对部署至关重要的领域。当您需要自行决定如何将代码打包到模块中以及如何解析和绑定外部引用时，理解此主题会很有用。


    Java EE 服务器


    *Java EE 服务器* 是在您的应用服务器内部运行的程序，它在 Java EE 组件执行时为其提供企业服务。Java EE 服务器还负责处理部署请求，并将其重定向到其托管的
    Java EE 容器。


    Java EE 规范定义了 Java EE 服务器必须支持的核心服务列表。这些服务包括消息传递、数据库、安全、事务、持久化以及许多其他服务。Java EE
    服务器也可以扩展以提供超出规范要求的额外服务，或现有服务的替代实现。Java EE 规范定义了服务器如何通过 Java EE 连接器 API 使用资源适配器将其适配到
    Java EE 环境中，从而扩展以为其容器提供对远程和外部服务的访问。


    Java EE 容器


    Java EE 服务器的主要目的是支持 Java EE 容器，这些容器提供了运行 Java EE 组件的各种环境。Java EE 规范规定支持四种 Java
    EE 容器：EJB、Web、应用客户端和 Applet。虽然 EJB 和 Web 容器在中间层的应用服务器中执行，但应用客户端容器通常在客户端层的 Java
    SE 环境中执行，而 Applet 容器通常在 Web 浏览器内运行。尽管如此，它们都依赖其底层的 Java EE 服务器来获取它们通过 API 提供给在其容器环境中执行的组件的众多企业服务。例如，Java
    EE 服务器向 Java EE 容器提供本地消息传递服务，而容器则通过 JMS（Java 消息服务）API 向其组件公开消息传递服务。类似地，容器通过 Java
    数据库连接（JDBC）公开数据库服务，通过 Java 事务 API（JTA）公开事务服务，等等。Java EE 容器还介入在 Java EE 容器中执行的
    Java EE 应用组件之间的所有通信，以提供组件和资源注入。如图 11-4 所示。


    ![9781430246923_Fig11-04.jpg](img/9781430246923_Fig11-04.jpg)

