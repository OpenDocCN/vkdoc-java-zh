    在自底向上的方法中，你从一个 SEI 和一个可发布为 Web 服务的实现开始。在此过程中，WSDL 文档等 Web 服务工件会在部署时，或通过 Java EE
    应用服务器提供的管理工具或实用程序生成。


    在自顶向下的情况下，你从一个 WSDL 文档开始，并使用实现 JAX-WS 的工具生成一个 SEI。一旦有了 SEI，就可以在其后添加实现。对于 EJB 无状态会话
    Bean，你需要使用 JAX-WS 和 JSR 181 规范中提供的注解来标记业务接口和/或 Bean 类，以便在部署时生成正确的 Web 服务工件集。Java
    EE 规范要求，添加到组件中的注解在部署时被处理，以生成正确的工件集。带有 Web 服务注解的 EJB 无状态会话 Bean 也不例外；它们也会在部署时由应用服务器提供的部署实用程序处理。每个
    SEI 对应一个无状态会话 Bean。


    开发新的 Web 服务


    无状态会话 Bean 使用第 2 章中描述的编程模型实现。如果你希望将一个无状态会话 Bean 作为 Web 服务，则需要以下类：


    *   Bean 类（实现）

    *   Web 服务端点接口（可选）

    *   如果 Bean 类有本地或远程客户端，则还需要其他业务接口


    创建 Bean 类


    *无状态会话 Bean 类*是任何带有类级别注解`@Stateless`的标准 Java 类。从版本 3 开始，EJB 规范不再强制要求 SEI。提供 SEI
    以及 Bean 类是可选的。在 Bean 类将作为 Web 服务发布而不使用任何服务端点接口的用例中，Bean 类将具有额外的类级别注解`@WebService`（JSR
    181）。`@WebService`注解位于`javax.jws`包中，它将 Bean 类标记为基于 SOAP 的 Web 服务的实现。


    `@WebService`注解接受表 6-3 中描述的参数。


    表 6-3. @WebService 注解


    | 参数 | 描述 | 附加信息 |

    | --- | --- | --- |

    | `name` | 映射到`wsdl:portType`的 Web 服务名称。 | 如果未指定，则使用 Java 类的名称。 |

    | `targetNamespace` | 用于 Web 服务的 XML 命名空间。 | 如果未指定，则使用 Java 类的名称。 |

    | `serviceName` | 映射到`wsdl:service`的 Web 服务名称。 | 如果未指定，则使用 Java 类的名称。 |

    | `wsdlLocation` | WSDL 文档的位置，当 Bean 类实现现有 Web 服务时会派上用场。 |  |


    为了说明一个发布为 Web 服务的无状态会话 Bean，我们将创建一个`CreditServiceEndpointBean`，它将发布为`CreditService`。


    在清单 6-9 中，我们有一个 Java 类`CreditCheckEndpointBean`，它有两个类级别注解：`@Stateless`和`@WebService`。`@Stateless`注解提供了一个额外的参数来将
    Bean 标记为`CreditCheckEndpointBean`。如果同一个类暴露给远程或本地客户端，这些客户端将使用该名称访问无状态会话 Bean。`@WebService`注解提供了两个额外的参数：一个将服务名称标记为`CreditService`，另一个指定目标命名空间（而不是使用默认的
    Java 包结构）。


    ***清单 6-9.***  CreditCheckEndpointBean.java


    ```

    package com.apress.ejb.chapter06.services;

    import javax.ejb.Stateless;

    import javax.jws.WebMethod;

    import javax.jws.WebService;


    @Stateless(name = "CreditCheckEndpointBean")

    @WebService(serviceName = "CreditService", targetNamespace = "http://www.apress.com/ejb/credit")

    public class CreditCheckEndpointBean  {

        public CreditCheckEndpointBean() {

        }


    }

    ```


    JSR 181 中定义的`@WebMethod`注解允许你自定义作为 Web 服务操作暴露的方法。如果在带有`@WebService`注解的 Bean 类中没有指定`@WebMethod`注解，则所有公共方法都将作为
    Web 服务操作暴露。


    `@WebMethod`注解接受表 6-4 中描述的参数。


    表 6-4. @WebMethod 注解


    | 参数 | 描述 | 附加信息 |

    | --- | --- | --- |

    | `operationName` | 与此方法匹配的`wsdl:operation`的名称。 | 默认情况下，这是 Java 方法的名称。 |

    | `action` | 此操作的动作。对于 SOAP 绑定，它将是`SOAP action`头的值。 | 默认情况下，这是 Java 方法的名称。 |


    在清单 6-10 中，我们在`CreditCheckEndpointBean`类中添加了以下方法，该方法将作为 Web 服务操作暴露。操作名称通过`@WebMethod`参数自定义为`CreditCheck`。该方法接受一个`java.lang.String`参数（即信用卡号），并根据信用卡是否有效返回`true`或`false`的`java.lang.boolean`值。为简单起见，我们将始终返回`true`。


    ***清单 6-10.***  CreditCheckEndpointBean.java 中的 validateCC 方法


    ```

    @WebMethod(operationName="CreditCheck" )

    public boolean validateCC(String cc){

    return true;

    }

    ```


    Web 服务端点接口


    JAX-WS 不强制要求使用 SEI 来实现 Web 服务端点。你可以使用 JSR 181 中提供的注解将 Bean 类标记为 Web 服务，并将一个或多个业务方法标记为
    Web 服务操作。在为无状态会话 Bean 定义了 SEI 的用例中，应遵守以下规则：


    *   SEI 必须具有 `javax.jws.WebService` 注解。

    *   一个或多个方法可以具有 `javax.jws.WebMethod` 注解。

    *   所有方法参数和返回类型应与 JAXB XML 模式映射定义兼容。

    *   方法的参数和返回类型必须是有效的 JAX-RPC 值类型，包括 Java 基本类型（`int`、`long` 等）、Java 类（`String`、`Date`
    等）、Java Bean 和数组。

    *   `throws` 子句除了包含任何其他应用程序异常外，还必须包含 `java.rmi.RemoteException`。


    ![image](img/sq.jpg) **注意**   在 Java EE 7 中，对 JAX-RPC 的支持已变为可选。Java EE 7 规范鼓励新应用程序使用
    JAX-WS 提供的简化 Web 服务开发的设施。


    在我们的示例中，我们将注解添加到 Bean 类本身，如清单 6-9 和 6-10 所示。


    清单 6-11 说明了提供 SEI 的用例的服务端点接口，清单 6-12 显示了实现该 SEI 的 `CreditCheckEndpointBean` 类。


    ***清单 6-11.***  用例的服务端点接口


    ```

    @WebService(serviceName="CreditService",targetNamespace="http://www.apress.com/ejb/credit")

    public interface CreditCheckEndpoint {


    @WebMethod(operationName="CreditCheck")

          public boolean validateCC(String cc);

    }

    ```


    ***清单 6-12.***  实现 SEI 的 CreditCheckEndpointBean 类


    ```

    @Stateless

    public class CreditCheckEndpointBean implements CreditCheckEndpoint {

        public CreditCheckEndpointBean() {

        }

        //implementation goes here

    }

    ```


