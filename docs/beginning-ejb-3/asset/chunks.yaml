    \ must be in effect at the time the method is called. If no transaction is available,\
    \ a `javax.ejb.EJBTransactionRequired` exception is thrown. This transaction remains\
    \ in effect while the method is executed, and is left active upon returning control\
    \ to the caller. |\n| `REQUIRED` | This is the default transaction attribute value.\
    \ Upon entering the method, the container interposes to create a new transaction\
    \ context if one is not already available. If the container created a transaction\
    \ upon entering the method, it commits that transaction when the method call completes.\
    \ If a transaction was already in effect, the container does not commit it before\
    \ returning control to the client. |\n| `REQUIRES_NEW` | The container always\
    \ creates a new transaction before executing a method thusly marked. If a transaction\
    \ context is already available when the method is invoked, then the container\
    \ suspends that transaction by dissociating it from the current thread before\
    \ creating the new transaction. The container then reassociates the original transaction\
    \ with the current thread after committing the intervening one. |\n| `SUPPORTS`\
    \ | This option is basically a no-op, resulting in no additional work by the container.\
    \ If a transaction context is available, it is used by the method. If no transaction\
    \ context is available, then the container invokes the method with no transaction\
    \ context. Upon exiting the method, any preexisting transaction context remains\
    \ in effect. |\n| `NOT_SUPPORTED` | The container invokes the method with an unspecified\
    \ transaction context. If a transaction context is available when the method is\
    \ called, then the container dissociates the transaction from the current thread\
    \ before invoking the method, and then reassociates the transaction with the thread\
    \ upon returning from the method. |\n| `NEVER` | The method must not be invoked\
    \ with a transaction context. The container will not create one before calling\
    \ the method, and if one is already in effect, the container throws `javax.ejb.EJBException`.\
    \ |\n\n![image](Images/sq.jpg) **Note** In general, transaction attributes may\
    \ be specified on a session bean’s business interface methods or Web service end-point\
    \ interface, or on an MDB’s listener method, but some additional restrictions\
    \ apply for specific cases. Such details are beyond the scope of this book, but\
    \ may be found in the EJB *Core Contracts and Requirements* spec.\n\nAll six attributes\
    \ are typically available for session bean methods, though certain attributes\
    \ are not available on a session timeout callback method, or when the session\
    \ bean implements `javax.ejb.SessionSynchronization`. MDBs support only the `REQUIRED`\
    \ and `NOT_SUPPORTED` attributes. Here is an example of how you would specify\
    \ the transaction behavior on a session bean method to override the transaction\
    \ behavior specified (or defaulted) at the bean level:\n\n```\n@TransactionAttribute(TransactionAttributeType.SUPPORTS)\n\
    public CustomerOrder createCustomerOrderUsingSupports(Customer customer)\n throws\
    \ Exception { ... }\n```\n\n[Table 8-3](#9781430246923_Ch08.xhtml#Tab3) illustrates\
    \ an EJB’s transactional behavior, dependent on its transaction attribute and\
    \ the presence or absence of a transactional context at the time the session method\
    \ is called. For each transaction attribute, we list on separate rows the method\
    \ body and resource transactional context when a client transaction is absent\
    \ (None), and when a client transaction is present (Tc). Whenever a new transaction\
    \ is created for the duration of the method (Tm), it is always committed by the\
    \ EJB container before control is returned to the caller. Both the transaction\
    \ associated with the method body code and the transaction associated with resources\
    \ that are used by the method are shown.\n\n[Table 8-3](#9781430246923_Ch08.xhtml#_Tab3).\
    \ Client and Bean Transaction States for Each of the Six Transaction Attributes\n\
    \n![Table8-3.jpg](Images/Table8-3.jpg)\n\n[Table 8-3](#9781430246923_Ch08.xhtml#Tab3)\
    \ illustrates how the container interposes on CMT-demarcated methods to propagate\
    \ a transactional context differently for each transaction attribute. This table\
    \ also illustrates that the transactional context used within the bean method\
    \ is always the one that is in turn propagated to other methods called by that\
    \ CMT bean method. Note that a client to an enterprise bean may itself be another\
    \ enterprise bean.\n\n## The `EJBContext.setRollbackOnly` and `getRollbackOnly`\
    \ Methods\n\nIn the event that an exception or other error condition is encountered\
    \ in a method on a CMT-demarcated enterprise bean, the bean may wish to prevent\
    \ the context transaction from being committed. The bean is not allowed to roll\
    \ back the transaction explicitly, but it may obtain the `javax.ejb.EJBContext`\
    \ resource (through container injection or JNDI lookup) and call its `setRollbackOnly()`\
    \ method to ensure that the container will not commit the transaction. Similarly,\
    \ a bean method may at any time call the `EJBContext.getRollbackOnly()` method\
    \ to determine whether the current transaction has been marked for rollback, whether\
    \ by the current bean or by another bean or resource associated with the current\
    \ transaction.\n\n## Bean-Managed Transaction (BMT) Demarcation\n\nFor some enterprise\
    \ beans, the declarative CMT services may not provide the demarcation granularity\
    \ that they require. For instance, a client may wish to call multiple methods\
    \ on a session bean without having each method commit its work upon completion.\
    \ In this case, the client has several options: it can either instantiate its\
    \ own JTA (or resource-local) transaction and thus control the transaction begin/end\
    \ boundaries explicitly; it can write a custom CMT session bean to wrap the work\
    \ inside a transactional bean method and perform the steps inside the container-managed\
    \ transaction; or it can control the transaction demarcation explicitly by using\
    \ a transaction resource available through the EJB context.\n\nEJB offers the\
    \ latter option—known as bean-managed transaction (BMT) support—to enterprise\
    \ beans as a convenient way to handle their demarcation of transaction events.\
    \ To turn off the automatic CMT demarcation services, enterprise beans simply\
    \ specify the `@TransactionManagement(TransactionManagementType.BEAN)` annotation\
    \ or assign the equivalent metadata to the session bean in the `ejb-jar.xml` file.\
    \ With BMT demarcation, the EJB container still provides the transaction support\
    \ to the bean, through a `UserTransaction` object available through the bean’s\
    \ `EJBContext` object. The primary difference is that the bean code makes explicit\
    \ calls to begin, commit, and roll back transactions instead of using CMT attributes\
    \ to declaratively assign transactional behavior to its methods. The container\
    \ does not interpose on BMT methods to begin and commit transactions, and it does\
    \ not propagate transactions begun by a client to beans that elect to demarcate\
