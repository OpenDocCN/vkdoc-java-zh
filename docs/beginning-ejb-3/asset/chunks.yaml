  trans: '

    当这个测试类在 JUnit 测试器中执行时，每个标注了 `@Test` 的方法都会作为独立的单元测试被隔离运行。然而，在执行这些方法之前，JUnit 会执行一些初始化步骤，以实例化可嵌入的
    EJB 容器并初始化持久化单元中的数据。接下来，我们将从初始化步骤开始，探索这个 JUnit 类的各个元素。


    实例化可嵌入的 EJB 容器并启动 Derby


    在执行该类中的任何测试之前，我们需要初始化可嵌入的 EJB 容器。由于这是一个相对消耗资源的操作（尽管不如启动一个完整的 GlassFish 服务器那么昂贵），我们希望每次启动
    JUnit 测试器时只执行一次。JUnit 允许你使用 `@BeforeClass` 注解静态方法，这些方法会在每个 JUnit 会话中执行一次，且在该类上执行第一个单元测试方法之前运行。我们的类级设置方法如下：


    ```

    @BeforeClass

    public static void setUpClass() throws Exception {

      PrintWriter pw = new PrintWriter(System.out);


    //  启动 Derby 数据库服务器，等待其响应后再继续

      try {

        derbyServer = new org.apache.derby.drda.NetworkServerControl();

        derbyServer.start(pw);

        int i = 50;

        while (--i > 0) {

          try {

            derbyServer.ping();

            break;

          } catch (Exception ex) {

            System.out.println("Derby 服务器已启动；等待响应...");

          }

          Thread.sleep(100);

        }

      } finally {

        pw.close();

      }


    //  实例化一个可嵌入的 EJB 容器

      ejbContainer = javax.ejb.embeddable.EJBContainer.createEJBContainer();

    }

    ```


    我们首先启动 Derby 数据库，以便持久化单元能够连接到正在运行的服务器。由于 `org.apache.derby.drda.NetworkServerControl.start()`
    方法是异步的，我们必须假设服务器可能不会立即接受连接，因此我们在循环中对其进行 ping 操作，每次迭代之间短暂休眠，直到它准备就绪或我们决定超时。


    一旦 Derby 可以接受连接，我们就通过调用 `javax.ejb.embeddable.EJBContainer.createEJBContainer()`
    来创建可嵌入的 EJB 容器。我们的 `WineAppServiceTest` 类由 JUnit 测试器调用，NetBeans 启动测试器时使用的类路径包含
    JPA 持久化单元 `.jar` 文件（来自第 7 章）、第 13 章 EJB jar 中定义的 EJB，以及运行 JUnit 框架和实例化可嵌入 EJB
    容器所需的所有必要 Java 库。当前（撰写本文时）的 GlassFish 实现会链接到 GlassFish 服务器安装区域，以提供 EJB 容器通常从其宿主
    Java EE 服务器环境所需的服务。再次强调，由于我们在 Java SE 环境中运行，Java EE GlassFish 服务器实际上并未启动，但可嵌入
    EJB 容器所需的类会根据需要从构成 GlassFish 的 Java 库中加载。


    在 JUnit 会话结束时，必须正确关闭可嵌入的 EJB 容器和 Derby 数据库服务器，以释放它们可能持有的任何资源。此时，JUnit 会调用标注了 `@AfterClass`
    的方法，我们的 `tearDownClass()` 方法执行这些任务：


    ```

    @AfterClass

    public static void tearDownClass() throws Exception {

      //  关闭可嵌入的 EJB 容器，释放所有资源

      ejbContainer.close();


    //  关闭 Derby 数据库服务器

      derbyServer.shutdown();

    }

    ```


    初始化持久化单元中的数据


    虽然启动 Derby 和可嵌入 EJB 容器等步骤在每个 JUnit 测试会话中只需执行一次，但其他初始化步骤必须在每个 JUnit 测试之前执行。每个测试的初始化步骤放在一个（或多个）标注了
    `@Before` 的方法中，如下所示：


    ```

    @Before

    public void setUp() {

      //  初始化领域模型中的数据

      PopulateDemoData.resetData("Chapter13-EmbeddableEJBTests-ResourceLocal", System.out);

    }

    ```


    对于我们的测试，我们希望确保每个单元测试开始时数据库中的数据相同，因此我们执行一个脚本来初始化数据库并将数据重置为所需状态。你可能还记得这个静态的 `PopulateDemoData.resetData()`
    方法，它在其他章节中也使用过。请注意，我们传递了一个持久化单元的名称，以便在不同的应用程序上下文中重用它。`Chapter07-ServiceIntegration-jpa`
    项目中的 JPA 持久化单元定义了它自己的 `persistence.xml` 文件，其中包含一个名为 `Chapter07-WineAppUnit-ResourceLocal`
