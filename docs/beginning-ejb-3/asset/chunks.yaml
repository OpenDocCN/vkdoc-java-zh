    | 概念 | 描述 |

    | --- | --- |

    | 实体示例 | 我们从简单的 JavaBean 开始，逐步添加将其转换为简单实体所需的注解，然后再进一步扩展。 |

    | 主要实体注解 | 进一步细化实体的要求：实体类必须有一个无参的 `public` 或 `protected` 构造方法，并且不能是 `final` 的。实体通过其
    JavaBeans 属性访问器或实例变量定义其持久化结构，也可以包含自定义方法。 |

    | `EntityManager` | `EntityManager` 对象提供持久化服务，包括事务管理以及查询、合并、删除、查找和刷新操作。它是理解 JPA
    持久化框架的核心。 |

    | 实体生命周期 | 实体实例作为内存中的 Java 对象，在其生命周期中可能会经历多种正式状态。理解这些不同状态有助于你了解实体何时与后端数据库保持一致或不一致状态，以及如何在事务上下文中协调这些差异。
    |

    | 对象/关系 (O/R) 映射 | JPA 通过注解和/或 XML 描述符定义声明式标记，将实体字段映射到关系数据库管理系统 (RDBMS) 中的表列。
    |

    | 实体关系 | 实体类可以持有对自身或其他实体的一元引用和集合引用。请注意，在 JPA 中，关系字段不由容器进行双向维护。 |

    | Java 持久化查询语言 (JPQL) | JPA 定义了一种类似 SQL 的语言——JPQL——它支持查询以及批量更新和删除操作。查询可以静态定义为命名查询，也可以动态定义。查询可以接受绑定参数并返回
    Java 对象，包括实体实例或 Map。 |

    | 持久化 vs. 适配 | 在设计实体类时，一个实际考虑因素是：实体类是主要的设计对象，还是数据库模式是事实来源。在前一种情况下，数据库主要用于持久化实体数据；而在后一种情况下，实体类用于将表适配到
    Java 中。 |

    | 示例应用程序 | 最后，我们给出了一个示例应用程序，它由三个 JPA 实体、一个 EJB 和一个 HTTP Servlet 组成，通过一个简单的工作模型演示了本章中的所有概念。
    |


    实体示例


    让我们看看如何将一个简单的 JavaBean 转换为实体，并逐步对其进行定制以增加功能和灵活性。


    一个简单的 JavaBean：Customer.java


    我们从简单的 JavaBean 开始，如清单 3-1 所示。该类具有 JavaBeans 标准定义的属性。JavaBean 的每个属性通过一对属性访问器方法向
    Bean 外部世界呈现。对于每个属性，getter 方法检索其数据，setter 方法为其赋值。在内部，这些属性访问器方法读取和写入 JavaBean 类上的私有专用实例变量。


    ***清单 3-1.***  一个简单的 JavaBean


    ```

    public class Customer {

      private long customerId;

      private String name;


    public long getCustomerId() { return customerId; }

      public void setCustomerId(long customerId) { this.customerId = customerId; }

      public String getName() { return name; }

      public void setName(String name) { this.name = name; }

    }

    ```


    一个简单的实体：Customer.java


    清单 3-2 展示了我们的简单 JavaBean 被转换为实体后的样子。


    ***清单 3-2.***  一个简单的实体


    ```

    @Entity

    public class Customer implements Serializable {

      @Id

      private long customerId;

      private String name;


    public long getCustomerId() { return customerId; }

      public void setCustomerId(long customerId) { this.customerId = customerId; }

      public String getName() { return name; }

      public void setName(String name) { this.name = name; }

    }

    ```


    唯一需要做的更改是添加 `@Entity` 和 `@Id` 注解。`@Id` 注解将 `customerId` 标识为实体的主键，这是表达其唯一标识所必需的。这是将该类转换为实体所需的最少元数据。我们还添加了
    `Serializable` 接口，因为这是一个确保与远程客户端兼容的良好实践。


    @Entity 注解


    `@Entity` 注解是必需的，用于在实体部署时将其标识为实体。当实体部署在持久化归档文件（JAR 文件）中时，它们可能伴随有非实体类。此注解（或其等效声明在
    `orm.xml` 文件中）告诉容器查找该类上的进一步注解，并处理其 O/R 映射，允许其参与查询和与其他实体的持久化关系，并在持久化提供程序稍后实例化它们时进行字节编织或其他处理。所有未标记为实体的类在部署期间都会被持久化提供程序忽略。


    @Id 注解


    `@Id` 注解指示哪个或哪些字段（可能有多个）是实体的主键或标识符。标识符字段中的值在实体类型 `Customer` 的所有实体实例中必须是唯一的，以便唯一标识此实体。如果主键跨越表中的多个列，则需要复合主键，并且
    `@Id` 字段可以被一个标注了 `@EmbeddedId` 的单个字段替换。我们将在本章后面讨论如何指定复合键。


    与 EJB 2.x 的比较


    JPA 的基本编码结构是实体类。在 EJB 2.x 及更早版本中，实体 Bean 作为主要的持久化对象，由 Bean 类以及本地和/或远程组件和 Home
    接口组成。从 JPA 开始，实体 Bean 的大部分外在特征已被剥离，或通过大量使用默认值和注解而简化。剩下的只是实体 Bean 类，现在称为*实体类*；或者更简单地称为*实体*。虽然在
    XML 描述符中指定持久化元数据同样有效，但为简洁起见，本章中的所有示例都使用 Java 注解。与 EJB 3 领域一样，每个由注解指定的声明式构造在持久化单元（共置实体的集合）的
    XML 描述符中都有对应的表示形式，因此也可以在 XML 中等效指定。使用注解还是 XML 完全是个人的选择。


    默认配置


    前面的两个注解是显式指定的。鉴于 EJB 3 利用默认配置的简化开发模型，你发现此示例中的许多其他元数据都是默认隐含的，这并不会让你感到惊讶。在探索这些默认设置之前，值得思考一下为什么选择显式指定
    `@Entity` 和 `@Id` 注解，而不是隐式推断。


    `@Entity` 注解本可以是每个通过持久化归档文件部署的类的默认设置，并且可以使用假设的 `@NotEntity` 注解来指定非实体类。然而，遵循会话
    Bean 和消息驱动 Bean 设定的模式，选择了显式选择加入的模式。'
- fmt: "# 排版后的文档\n\nSimilarly, all fields could have been assumed to be part of the\
    \ primary key, but in practice only a small subset (usually only one) of an entity’s\
    \ properties typically comprises an entity’s primary key. The spec designers felt\
    \ that it makes better sense in this case to use the opt-in pattern of explicitly\
    \ specifying `@Id` on primary key fields, implying that all columns are not part\
    \ of the primary key. This type of decision characterizes the configuration-by-default\
    \ approach, in which annotations are not required for the more common cases and\
    \ are only used when an override is needed.\n\nThe next section will examine some\
    \ of the behavior that this `Customer` entity acquired by default, and it will\
    \ show how you can override this default behavior.\n\n## An Entity with Defaults\
    \ Exposed: Customer.java\n\n[Listing 3-3](#9781430246923_Ch03.xhtml#list3) shows\
    \ the same entity with some of its defaults shown.\n\n[***Listing 3-3.***](#9781430246923_Ch03.xhtml#_list3)\
    \ An Entity with Defaults Shown\n\n```java\n@Entity(name=\"Customer\")\n@Table(name=\"\
    \ CUSTOMER\")\npublic class Customer implements Serializable {\n  @Id\n  @Column(name=\"\
    CUSTOMERID\", table=\"CUSTOMER\", unique=true,\n          nullable=false, insertable=true,\
    \ updatable=true)\n  private long customerId;\n\n@Basic(fetch=FetchType.EAGER)\n\
    \  @Column(name=\"NAME\", table=\"CUSTOMER\")\n  private String name;\n\n// .\
    \ . .\n}\n```\n\nEach entity has a name, and unless otherwise specified, this\
    \ name defaults to the unqualified class name, which in this case is `LiCustomer`.\
    \ This name is used when referring to the entity in query statements (Java Persistence\
    \ Query Language, or JPQL, is covered in [Chapter 4](../Text/9781430246923_Ch04.xhtml))\
    \ and is typically specified when the unqualified class name is awkward or is\
    \ a reserved name in JPQL.\n\n## The @Table Annotation\n\nAn entity instance typically\
    \ represents a single row in a table, and it exposes each column value in that\
    \ row through a corresponding property on the entity. Consequently, an entity\
    \ must map to a table in a database, and that table is specified using the `@Table`\
    \ annotation. Its name defaults to the entity name. Since not all databases support\
    \ mixed-case table names, this translates to a table named `CUSTOMER`.\n\n## The\
    \ @Column Annotation\n\nSimilarly, each field declared on the entity maps by default\
    \ to a column with the same name, and so the `customerId` and `name` fields map\
    \ to the `CUSTOMERID` and `NAME` columns in the `CUSTOMER` table. The `@Column`\
    \ annotation may also be used to override default column-type information, as\
    \ well as column-level constraints, such as those used to indicate that the column\
    \ is optional, insertable, and/or updatable. Ordinarily, it is only necessary\
    \ to specify this level of detail when you are relying on the container to create\
    \ the table when an entity is deployed.\n\n## The @Basic Annotation\n\nEntity\
    \ fields that are of simple Java types, such as `String` or `int` (like the `customerId`\
    \ and `name` fields), are automatically configured by the JPA to use the `@Basic`\
    \ annotation. Arrays of simple types, and any other type that implements the `Serializable`\
    \ interface, may also be marked `@Basic`.\n\nThe persistence framework provides\
    \ automatic conversion of column data types to certain Java types, and JPA persistence\
    \ providers will attempt to define a suitable default column type when generating\
    \ tables for entity classes during deployment. Most numeric, string, and date\
    \ types will be converted automatically.\n\n[Table 3-2](#9781430246923_Ch03.xhtml#Tab2)\
    \ presents a list of Java types that can be annotated `@Basic` and mapped automatically.\n\
    \n[Table 3-2](#9781430246923_Ch03.xhtml#_Tab2). Field/Property Types That Are\
    \ Valid for Simple Mappings\n\n| Java Type |\n| --- |\n| Java primitive types\
    \ (`int`, `long`, `char`, and so on) |\n| Primitive wrapper types (`Integer`,\
    \ `Long`, `Char`, and so on) |\n| Java serializable types |\n| User-defined serializable\
    \ types |\n| enums |\n| `java.lang.String` |\n| `java.math.BigInteger` |\n| `java.math.BigDecimal`\
    \ |\n| `java.util.Date` |\n| `java.util.Calendar` |\n| `java.sql.Date` |\n| `java.sql.Time`\
    \ |\n| `java.sql.Timestamp` |\n| `byte[]` |\n| `Byte[]` |\n| `char[]` |\n| `Character[]`\
    \ |\n\n## Additional Field Types\n\nThere are a number of other type specifiers\
    \ that may be applied to different types of columns. For instance, an entity may\
    \ also hold references to other entities, and these references are also represented\
    \ by properties on the entity. We will look at some examples of how to specify\
    \ these relationship properties later in this chapter.\n\nAn entity may have methods\
    \ beyond its property access methods, but typically these are limited to support\
    \ methods for managing add and remove operations from collection relationship\
    \ properties.\n\n## Coding Requirements\n\nIn addition to the `@Entity` annotation\
    \ and a primary key specifier, the minimal coding requirements for an entity are\
    \ that it has a `public` or `protected` default (no-argument) constructor and\
    \ that the class is not final. In this `Customer` example, a default constructor\
    \ was implied since, in the absence of any non-default constructors on a public\
    \ class, a default constructor is assumed by Java. Non-default constructors may\
    \ also be specified on an entity, and they are often used for initializing the\
    \ entity with its mandatory properties.\n\n## The java.io.Serializable Interface\n\
    \nEntities that will be passed by value, as when passed by remote session beans\
    \ to Java SE clients that are external to the EJB container, must implement the\
    \ `java.io.Serializable` marker (no method) interface. Implementing this interface\
    \ indicates to the compiler that it must enforce all fields on the entity class\
    \ to be serializable so that any instance can be serialized to a byte stream and\
    \ passed using remote method invocation (RMI) over HTTP.\n\n## Placing Annotations\
    \ on Instance Variables vs. JavaBean Property Accessors\n\nWhen defining an entity\
    \ class, you may choose to place member-level annotations on the entity instance\
    \ variables or on the corresponding JavaBean property accessors for those instance\
    \ variables. As with the decision between specifying metadata using annotations\
    \ or XML, this is largely a matter of personal preference.\n\n![image](Images/sq.jpg)\
    \ **Note** In JPA 2.0, a restriction was relaxed, and developers are now allowed\
    \ to annotate both instance variables and property getters. Previously, all entities\
    \ in an inheritance hierarchy had to choose a single approach to follow.\n\nRegardless\
    \ of where the member-level annotations are specified, the entity’s instance variables\
    \ must not be public, and clients of that entity, including related entities,\
    \ must always access an entity’s properties through accessor methods. It is up\
    \ to the entity provider to decide which property accessors to make public, exposing\
    \ them to clients; and which to make protected, making them available only to\
    \ the persistence provider. When annotating instance variables, the entity need\
    \ not define any property accessor methods, if desired.\n\nBy policy, only the\
    \ persistence framework and the class methods themselves are allowed to access\
    \ these fields directly. For both access types, clients must access field data\
    \ through public accessor or other methods on the entity class.\n\nThere are several\
    \ material consequences of choosing one approach over the other. These are discussed\
    \ in the following sections.\n\n### Entity Data Access\n\nWhen annotations are\
    \ specified on the entity’s instance variables, the persistence manager accesses\
    \ the instance variables directly when reading and writing a persistent property\
    \ to and from the entity. When annotating property accessors instead of instance\
    \ variables, the persistence manager reads and writes property data through these\
    \ property accessors."
  raw: 'Similarly, all fields could have been assumed to be part of the primary key,
    but in practice only a small subset (usually only one) of an entity’s properties
    typically comprises an entity’s primary key. The spec designers felt that it makes
    better sense in this case to use the opt-in pattern of explicitly specifying `@Id`
    on primary key fields, implying that all columns are not part of the primary key.
    This type of decision characterizes the configuration-by-default approach, in
    which annotations are not required for the more common cases and are only used
    when an override is needed.


    The next section will examine some of the behavior that this `Customer` entity
    acquired by default, and it will show how you can override this default behavior.


    An Entity with Defaults Exposed: Customer.java


    [Listing 3-3](#9781430246923_Ch03.xhtml#list3) shows the same entity with some
    of its defaults shown.


    [***Listing 3-3.***](#9781430246923_Ch03.xhtml#_list3)  An Entity with Defaults
    Shown


    ```

    @Entity(name="Customer")

    @Table(name=" CUSTOMER")

    public class Customer implements Serializable {

      @Id

      @Column(name="CUSTOMERID", table="CUSTOMER", unique=true,

              nullable=false, insertable=true, updatable=true)

      private long customerId;


    @Basic(fetch=FetchType.EAGER)

      @Column(name="NAME", table="CUSTOMER")

      private String name;


    // . . .

    }

    ```


    Each entity has a name, and unless otherwise specified, this name defaults to
    the unqualified class name, which in this case is `LiCustomer`. This name is used
    when referring to the entity in query statements (Java Persistence Query Language,
    or JPQL, is covered in [Chapter 4](../Text/9781430246923_Ch04.xhtml)) and is typically
    specified when the unqualified class name is awkward or is a reserved name in
    JPQL.


    The @Table Annotation


    An entity instance typically represents a single row in a table, and it exposes
    each column value in that row through a corresponding property on the entity.
    Consequently, an entity must map to a table in a database, and that table is specified
    using the `@Table` annotation. Its name defaults to the entity name. Since not
    all databases support mixed-case table names, this translates to a table named
    `CUSTOMER`.


    The @Column Annotation


    Similarly, each field declared on the entity maps by default to a column with
    the same name, and so the `customerId` and `name` fields map to the `CUSTOMERID`
    and `NAME` columns in the `CUSTOMER` table. The `@Column` annotation may also
    be used to override default column-type information, as well as column-level constraints,
    such as those used to indicate that the column is optional, insertable, and/or
    updatable. Ordinarily, it is only necessary to specify this level of detail when
    you are relying on the container to create the table when an entity is deployed.


    The @Basic Annotation


    Entity fields that are of simple Java types, such as `String` or `int` (like the
    `customerId` and `name` fields), are automatically configured by the JPA to use
    the *@Basic* annotation. Arrays of simple types, and any other type that implements
    the `Serializable` interface, may also be marked `@Basic`.


    The persistence framework provides automatic conversion of column data types to
    certain Java types, and JPA persistence providers will attempt to define a suitable
    default column type when generating tables for entity classes during deployment.
    Most numeric, string, and date types will be converted automatically.


    [Table 3-2](#9781430246923_Ch03.xhtml#Tab2) presents a list of Java types that
    can be annotated `@Basic` and mapped automatically.


    [Table 3-2](#9781430246923_Ch03.xhtml#_Tab2).   Field/Property Types That Are
    Valid for Simple Mappings


    | Java Type |

    | --- |

    | Java primitive types (`int`, `long`, `char`, and so on) |

    | Primitive wrapper types (`Integer`, `Long`, `Char`, and so on) |

    | Java serializable types |

    | User-defined serializable types |

    | enums |

    | `java.lang.String` |

    | `java.math.BigInteger` |

    | `java.math.BigDecimal` |

    | `java.util.Date` |

    | `java.util.Calendar` |

    | `java.sql.Date` |

    | `java.sql.Time` |

    | `java.sql.Timestamp` |

    | `byte[]` |

    | `Byte[]` |

    | `char[]` |

    | `Character[]` |


    Additional Field Types


    There are a number of other type specifiers that may be applied to different types
    of columns. For instance, an entity may also hold references to other entities,
    and these references are also represented by properties on the entity. We will
    look at some examples of how to specify these relationship properties later in
    this chapter.


    An entity may have methods beyond its property access methods, but typically these
    are limited to support methods for managing add and remove operations from collection
    relationship properties.


    Coding Requirements


    In addition to the `@Entity` annotation and a primary key specifier, the minimal
    coding requirements for an entity are that it has a `public` or `protected` default
    (no-argument) constructor and that the class is not final. In this `Customer`
    example, a default constructor was implied since, in the absence of any non-default
    constructors on a public class, a default constructor is assumed by Java. Non-default
    constructors may also be specified on an entity, and they are often used for initializing
    the entity with its mandatory properties.


    The java.io.Serializable Interface


    Entities that will be passed by value, as when passed by remote session beans
    to Java SE clients that are external to the EJB container, must implement the
    `java.io.Serializable` marker (no method) interface. Implementing this interface
    indicates to the compiler that it must enforce all fields on the entity class
    to be serializable so that any instance can be serialized to a byte stream and
    passed using remote method invocation (RMI) over HTTP.


    Placing Annotations on Instance Variables vs. JavaBean Property Accessors


    When defining an entity class, you may choose to place member-level annotations
    on the entity instance variables or on the corresponding JavaBean property accessors
    for those instance variables. As with the decision between specifying metadata
    using annotations or XML, this is largely a matter of personal preference.


    ![image](Images/sq.jpg) **Note**   In JPA 2.0, a restriction was relaxed, and
    developers are now allowed to annotate both instance variables and property getters.
    Previously, all entities in an inheritance hierarchy had to choose a single approach
    to follow.


    Regardless of where the member-level annotations are specified, the entity’s instance
    variables must not be public, and clients of that entity, including related entities,
    must always access an entity’s properties through accessor methods. It is up to
    the entity provider to decide which property accessors to make public, exposing
    them to clients; and which to make protected, making them available only to the
    persistence provider. When annotating instance variables, the entity need not
    define any property accessor methods, if desired.


    By policy, only the persistence framework and the class methods themselves are
    allowed to access these fields directly. For both access types, clients must access
    field data through public accessor or other methods on the entity class.


    There are several material consequences of choosing one approach over the other.
    These are discussed in the following sections.


    Entity Data Access


    When annotations are specified on the entity’s instance variables, the persistence
    manager accesses the instance variables directly when reading and writing a persistent
    property to and from the entity. When annotating property accessors instead of
    instance variables, the persistence manager reads and writes property data through
    these property accessors.'
  trans: "\n类似地，所有字段本都可以被假定为主键的一部分，但在实践中，一个实体的属性中通常只有一小部分（通常只有一个）构成其主键。规范设计者认为，在这种情况下，采用显式在主键字段上指定\
    \ `@Id` 的选择加入模式更有意义，这意味着并非所有列都是主键的一部分。这种决策体现了“默认配置”的方法，即在更常见的情况下不需要注解，仅在需要覆盖时才使用。\n\
    \n下一节将探讨这个 `Customer` 实体默认获得的一些行为，并展示如何覆盖这些默认行为。\n\n一个暴露默认值的实体：Customer.java\n\
    \n清单 3-3 展示了同一个实体及其部分默认值。\n\n***清单 3-3.***  一个显示默认值的实体\n\n```\n@Entity(name=\"\
    Customer\")\n@Table(name=\" CUSTOMER\")\npublic class Customer implements Serializable\
    \ {\n  @Id\n  @Column(name=\"CUSTOMERID\", table=\"CUSTOMER\", unique=true,\n\
    \          nullable=false, insertable=true, updatable=true)\n  private long customerId;\n\
    \n@Basic(fetch=FetchType.EAGER)\n  @Column(name=\"NAME\", table=\"CUSTOMER\")\n\
    \  private String name;\n\n// . . .\n}\n```\n\n每个实体都有一个名称，除非另有指定，否则该名称默认为非限定类名，在本例中为\
    \ `LiCustomer`。此名称用于在查询语句（Java 持久化查询语言，简称 JPQL，将在第 4 章中介绍）中引用该实体，并且通常在非限定类名不便于使用或属于\
    \ JPQL 中的保留名称时进行指定。\n\n@Table 注解\n\n一个实体实例通常代表表中的一行，并通过实体上的相应属性暴露该行中的每个列值。因此，实体必须映射到数据库中的一张表，该表使用\
    \ `@Table` 注解指定。其名称默认为实体名称。由于并非所有数据库都支持混合大小写的表名，因此这会被转换为名为 `CUSTOMER` 的表。\n\n\
    @Column 注解\n\n类似地，实体上声明的每个字段默认映射到同名的列，因此 `customerId` 和 `name` 字段映射到 `CUSTOMER`\
    \ 表中的 `CUSTOMERID` 和 `NAME` 列。`@Column` 注解也可用于覆盖默认的列类型信息，以及列级约束，例如用于指示该列是否可选、是否可插入和/或是否可更新的约束。通常，只有在部署实体时依赖容器来创建表的情况下，才需要指定这种详细程度。\n\
    \n@Basic 注解\n\n属于简单 Java 类型（例如 `String` 或 `int`，如 `customerId` 和 `name` 字段）的实体字段，由\
    \ JPA 自动配置为使用 *@Basic* 注解。简单类型的数组，以及任何其他实现了 `Serializable` 接口的类型，也可以标记为 `@Basic`。\n\
    \n持久化框架提供列数据类型到某些 Java 类型的自动转换，并且 JPA 持久化提供程序在部署期间为实体类生成表时，会尝试定义合适的默认列类型。大多数数值、字符串和日期类型都会被自动转换。\n\
    \n表 3-2 列出了可以注解为 `@Basic` 并自动映射的 Java 类型列表。\n\n表 3-2.   适用于简单映射的字段/属性类型\n\n| Java\
    \ 类型 |\n| --- |\n| Java 原始类型（`int`、`long`、`char` 等） |\n| 原始类型包装类（`Integer`、`Long`、`Char`\
    \ 等） |\n| Java 可序列化类型 |\n| 用户定义的可序列化类型 |\n| 枚举 |\n| `java.lang.String` |\n| `java.math.BigInteger`\
    \ |\n| `java.math.BigDecimal` |\n| `java.util.Date` |\n| `java.util.Calendar`\
    \ |\n| `java.sql.Date` |\n| `java.sql.Time` |\n| `java.sql.Timestamp` |\n| `byte[]`\
    \ |\n| `Byte[]` |\n| `char[]` |\n| `Character[]` |\n\n其他字段类型\n\n还有许多其他类型说明符可以应用于不同类型的列。例如，一个实体也可能持有对其他实体的引用，这些引用也通过实体上的属性来表示。我们将在本章后面部分介绍如何指定这些关系属性的一些示例。\n\
    \n一个实体可能拥有除属性访问方法之外的其他方法，但通常这些方法仅限于用于管理集合关系属性的添加和删除操作的辅助方法。\n\n编码要求\n\n除了 `@Entity`\
    \ 注解和主键说明符之外，实体的最低编码要求是：它必须有一个 `public` 或 `protected` 的默认（无参数）构造函数，并且该类不能是 final\
    \ 的。在这个 `Customer` 示例中，隐含了一个默认构造函数，因为在一个公共类上，如果没有定义任何非默认构造函数，Java 会假定存在一个默认构造函数。实体上也可以指定非默认构造函数，它们通常用于使用实体的必需属性来初始化实体。\n\
    \njava.io.Serializable 接口\n\n那些将按值传递的实体（例如，通过远程会话 Bean 传递给 EJB 容器外部的 Java SE 客户端时），必须实现\
    \ `java.io.Serializable` 标记（无方法）接口。实现此接口向编译器表明，它必须强制实体类上的所有字段都是可序列化的，以便任何实例都可以被序列化为字节流，并通过\
    \ HTTP 使用远程方法调用（RMI）进行传递。\n\n在实例变量上放置注解 vs. 在 JavaBean 属性访问器上放置注解\n\n在定义实体类时，您可以选择将成员级别的注解放在实体实例变量上，或者放在这些实例变量对应的\
    \ JavaBean 属性访问器上。与选择使用注解还是 XML 来指定元数据一样，这在很大程度上是个人偏好问题。\n\n![image](img/sq.jpg)\
    \ **注意**   在 JPA 2.0 中，一项限制被放宽，现在允许开发者在实例变量和属性 getter 方法上都进行注解。以前，继承层次结构中的所有实体必须遵循单一的方法。\n\
    \n无论成员级别的注解指定在何处，实体的实例变量都不能是 public 的，并且该实体的客户端（包括相关实体）必须始终通过访问器方法来访问实体的属性。由实体提供者决定哪些属性访问器设为\
    \ public（暴露给客户端），哪些设为 protected（仅对持久化提供者可用）。当在实例变量上进行注解时，如果需要，实体可以不必定义任何属性访问器方法。\n\
    \n根据策略，只有持久化框架和类方法本身才允许直接访问这些字段。对于两种访问类型，客户端都必须通过实体类上的公共访问器或其他方法来访问字段数据。\n\n选择一种方法而非另一种方法会产生几个实质性的后果。这些将在以下章节中讨论。\n\
    \n实体数据访问\n\n当注解指定在实体的实例变量上时，持久化管理器在向实体读写持久化属性时，会直接访问实例变量。当注解指定在属性访问器上而非实例变量上时，持久化管理器会通过这些属性访问器来读写属性数据。\n"
- fmt: "直接对实体的实例变量进行注解可以避免方法调用的开销，并提供轻微的性能优化，因为持久化管理器直接与字段交互。对属性访问器进行注解则为实体开发者提供了一种简单的方式，以便在读取和写入属性数据的所有尝试中拦截并执行自定义逻辑。\n\
    \n后一种选项使实体开发者有机会在需要时按需延迟派生持久属性值。但请注意，属性访问器方法上的任何验证或副作用代码都将在实体状态转换期间被调用。正如你将在下一章中看到的，如果实体开发者希望在首次加载实体的持久状态时，或在将更改保存到持久存储之前初始化临时数据或优化持久数据，最好使用实体生命周期回调方法来执行这些步骤。结合使用字段级注解和实体生命周期回调的好处是，setter方法中的验证和其他代码仅在客户端调用setter时执行，而不会在框架从持久存储实例化实体时执行。\n\
    \n另一个考虑因素是实体在参与查询时的行为。这是一个类似的问题，因为查询语句可能同时检索和更新实体上的字段数据。因此，了解使用属性访问器可能产生的任何副作用非常重要。\n\
    \n**属性名称**\n\n选择注解实例变量还是属性访问器的第二个实质性影响是，当属性访问器表达一个与实例变量名称不同的默认字段名称时。当注解属性访问器时，逻辑属性名称是根据JavaBean属性命名约定从getter派生的；而如果注解实例变量，逻辑属性名称则成为实例变量的名称。\n\
    \n**示例：注解实例变量**\n\n[清单3-4](#9781430246923_Ch03.xhtml#list4)中的代码片段演示了实例变量注解，并展示了验证和副作用代码。在此示例中（也可在本章的源代码区域找到），实体提供者缩小了客户端接口，仅暴露`get`/`setZipCode()`方法，但向持久化提供者指定了`zipCodeInternal`和`zipCode`两个属性。将注解放在实例变量上，可以在实体的客户端API和持久化接口之间实现清晰的分离。\n\
    \n[***清单3-4.***](#9781430246923_Ch03.xhtml#_list4)  使用实例变量注解的实体\n\n```java\n@Entity\n\
    public class Address implements Serializable {\n  @Id\n  private long addressId;\n\
    \  @Column(name = \"ZIP\")\n  private int zipCodeInternal;\n  @Transient\n  private\
    \ String zipCode;\n\npublic long getAddressId() { return addressId; }\n  public\
    \ void setAddressId(long addressId) { this.addressId = addressId; }\n\npublic\
    \ String getZipCode() {\n    if (zipCode == null && zipCodeInternal > 0) {\n \
    \     zipCode = convertToStr(zipCodeInternal);\n    }\n    return zipCode;\n \
    \ }\n\npublic void setZipCode(String zipCode) throws IllegalArgumentException\
    \ {\n    //  Validate the zipcode String, to make sure it reduces cleanly to\n\
    \    //  either a 5- or 9- digit integer, and assign it to the internal\n    //\
    \  persistent 'zipCodeInternal' class field\n    //  . . . <validation code here>.\
    \ . .\n    this.zipCode = zipCode;\n    zipCodeInternal = convertToInt(zipCode);\n\
    \  }\n\nprivate int convertToInt(String zipCode) {\n    return new Integer(zipCode).intValue();\n\
    \  }\n\nprivate String convertToStr(int zipCode) {\n    return new Integer(zipCode).toString();\n\
    \  }\n}\n```\n\n`get`/`setZipCode()`方法允许实体在请求时将内部数据延迟转换为客户端友好的`String`表示形式。对于`zipCodeInternal`实例变量，甚至没有指定属性访问器。\n\
    \n**@Transient注解**\n\n你可能不希望使实体类的所有字段或属性都持久化。派生字段或临时字段可以注解为`@Transient`，以指示持久化框架应忽略它们。`zipCode`实例变量被标记为`@Transient`，表示持久化管理器不应管理它。此实例变量仅用于将内部`int`值适配为客户端友好的派生`String`值。\n\
    \n**示例：注解属性访问器**\n\n[清单3-5](#9781430246923_Ch03.xhtml#list5)演示了实体开发者如何在注解实体的属性访问器时使用副作用代码。\n\
    \n[***清单3-5.***](#9781430246923_Ch03.xhtml#_list5)  使用属性访问器注解的实体\n\n```java\n\
    @Entity\npublic class Address implements Serializable {\n\nprivate BigDecimal\
    \ addressId;\n  private int zipCode;\n  private String city;\n\n@Id\n  public\
    \ BigDecimal getAddressId() { return addressId; }\n  public void setAddressId(BigDecimal\
    \ addressId) { this.addressId = addressId; }\n\npublic int getZipCode() { return\
    \ zipCode; }\n  public void setZipCode(int zipCode) {\n    if (zipCode != this.zipCode)\n\
    \    {\n      city = null; // Force city to be lazily re-derived\n      this.zipCode\
    \ = zipCode;\n    }\n  }\n\npublic String getCity() {\n    //  Derive the city\
    \ from the zipcode property, if available\n    if (city == null && zipCode > 0)\
    \ {\n      city = deriveCityFromZip();\n    }\n    return city;\n  }\n  public\
    \ void setCity(String city) {\n    this.city = city;\n  }\n\nprivate String deriveCityFromZip()\
    \ {\n    /* Implementation here. . . */\n    return null;\n  }\n}\n```\n\n将`@Id`注解放在`getAddressId()`属性访问器上可以消除访问策略的歧义，指示持久化提供者应使用属性访问器。强制持久化提供者通过属性访问器分配数据，使实体有机会在分配新邮政编码时重置`city`值。此外，知道`city`字段将通过其getter方法由持久化管理器获取，允许实体仅在通过`getCity()`访问器请求时才延迟计算其值。如果此实体的使用涉及在实体持久化（或合并）到数据库之前多次调用`setZipCode()`，那么将`city`值的派生推迟到实际请求时会更高效。如果此实体使用实例变量访问，则每次分配`zipCode`时都需要急切地更新`city`字段，因为随时可能发出将实体更改合并到数据库的请求。然而，如前所述，使用实体生命周期回调方法可以避免急切派生此值的开销。\n\
    \n**访问类型总结**\n\nJPA提供了两种模型，用于持久化提供者访问实体上的字段数据：直接通过实例变量或间接通过属性访问器。在一般情况下，我们发现注解实体的实例变量比注解其属性访问器更可取。你很少需要验证来自持久存储的数据，并且setter方法中的任何副作用代码通常应延迟执行，而不是在实体实例化时急切执行。此外，字段级注解允许你将通过该字段的get/set方法暴露的公共属性类型与底层列表示解耦。例如，你可能希望通过`getZipcode()/setZipcode()`方法将`zipCode`属性暴露为`String`，但在内部将其转换为整数，使用`Integer`类型的字段，以便持久化到数据库中的`INTEGER`列。最后，使用实体生命周期回调方法提供了在加载实体数据之后和保存之前进行额外初始化或准备的机会。\n\
    \n**声明主键**"
  raw: 'Annotating the entity’s instance variables directly avoids the overhead of
    method calls and provides a slight performance optimization, since the persistence
    manager talks directly to the fields. Annotating the property accessors provides
    a simple way for the entity developer to intercept and perform custom logic during
    all attempts to read and write property data.


    This latter option affords the entity developer a chance lazily to derive persistent
    property values on demand, if desired. However, be aware that any validation or
    side-effect code on the property accessor methods will be called during entity
    state transitions. As you’ll see in the next chapter, if the entity developer
    wishes to initialize transient data or refine persistent data at the time that
    the entity’s persistent state is first loaded, or prior to saving changes out
    to persistent storage, it is preferable to perform these steps using entity life
    cycle callback methods. Using the combination of field-level annotations and entity
    life-cycle callbacks has the benefit that validation and other code in the setter
    methods will only be called when a client calls the setter, and not when the entity
    is being instantiated from persistent storage by the framework.


    Another consideration is how the entity behaves when it is involved in a query.
    This is a similar issue, since a query statement may both retrieve and update
    field data on an entity. Thus, it is important to be aware of any possible side
    effects of using property accessors.


    Property Name


    The second material impact of choosing whether to annotate instance variables
    or property accessors occurs when the property accessor expresses a default field
    name that is different from the instance variable name. When annotating property
    accessors, the logical property name is derived from the getter using the JavaBean
    property-naming convention; whereas if the instance variable is annotated, the
    logical property name becomes the instance variable’s name.


    Example: Annotating Instance Variables


    The code snippet in [Listing 3-4](#9781430246923_Ch03.xhtml#list4) demonstrates
    instance variable annotation, and it illustrates validation and side-effect code.
    In this example, which can also be found in the Source Code area for this chapter,
    the entity provider narrows the client interface to expose only the `get`/`setZipCode()`
    methods, but specifies both `zipCodeInternal` and `zipCode` properties to the
    persistence provider. Placing annotations on the instance variables provides a
    clean separation between the entity’s client-side API and its persistence-side
    interface.


    [***Listing 3-4.***](#9781430246923_Ch03.xhtml#_list4)  An Entity That Uses Instance
    Variable Annotations


    ```

    @Entity

    public class Address implements Serializable {

      @Id

      private long addressId;

      @Column(name = "ZIP")

      private int zipCodeInternal;

      @Transient

      private String zipCode;


    public long getAddressId() { return addressId; }

      public void setAddressId(long addressId) { this.addressId = addressId; }


    public String getZipCode() {

        if (zipCode == null && zipCodeInternal > 0) {

          zipCode = convertToStr(zipCodeInternal);

        }

        return zipCode;

      }


    public void setZipCode(String zipCode) throws IllegalArgumentException {

        //  Validate the zipcode String, to make sure it reduces cleanly to

        //  either a 5- or 9- digit integer, and assign it to the internal

        //  persistent ''zipCodeInternal'' class field

        //  . . . <validation code here>. . .

        this.zipCode = zipCode;

        zipCodeInternal = convertToInt(zipCode);

      }


    private int convertToInt(String zipCode) {

        return new Integer(zipCode).intValue();

      }


    private String convertToStr(int zipCode) {

        return new Integer(zipCode).toString();

      }

    }

    ```


    The `get`/`setZipCode()` methods allow the entity to transform the internal data
    lazily into a client-friendly `String` representation, but only when requested.
    No property accessors are even specified for the `zipCodeInternal` instance variable.


    The @Transient Annotation


    You may not wish to make all fields or properties of an entity class persistent.
    Derived or transient fields may be annotated `@Transient` to indicate that they
    should be ignored by the persistence framework. The `zipCode` instance variable
    is marked `@Transient`, indicating that the persistence provider should not manage
    it. This instance variable serves only to adapt the internal `int` value into
    a client-friendly, derived `String` value.


    Example: Annotating Property Accessors


    [Listing 3-5](#9781430246923_Ch03.xhtml#list5) demonstrates how an entity developer
    may use side-effect code when annotating an entity’s property accessors.


    [***Listing 3-5.***](#9781430246923_Ch03.xhtml#_list5)  An Entity That Uses Property
    Accessor Annotations


    ```

    @Entity

    public class Address implements Serializable {


    private BigDecimal addressId;

      private int zipCode;

      private String city;


    @Id

      public BigDecimal getAddressId() { return addressId; }

      public void setAddressId(BigDecimal addressId) { this.addressId = addressId;
    }


    public int getZipCode() { return zipCode; }

      public void setZipCode(int zipCode) {

        if (zipCode != this.zipCode)

        {

          city = null; // Force city to be lazily re-derived

          this.zipCode = zipCode;

        }

      }


    public String getCity() {

        //  Derive the city from the zipcode property, if available

        if (city == null && zipCode > 0) {

          city = deriveCityFromZip();

        }

        return city;

      }

      public void setCity(String city) {

        this.city = city;

      }


    private String deriveCityFromZip() {

        /* Implementation here. . . */

        return null;

      }

    }

    ```


    Placing the `@Id` annotation on the `getAddressId()` property accessor disambiguates
    the access policy, indicating that property accessors should be used by the persistence
    provider. Forcing the persistence provider to assign data through the property
    accessor affords the entity the opportunity to reset the `city` value when a new
    zip code is assigned. Also, knowing that the `city` field will be obtained by
    the persistence manager through its getter method allows the entity lazily to
    calculate its value only when requested through the `getCity()` accessor. Should
    the usage of this entity involve many calls to `setZipCode()` before the entity
    is persisted (or merged) out to the database, it is more efficient to defer deriving
    the `city` value until it is actually requested. Were this entity to use instance
    variable access, it would be necessary to update the `city` field eagerly each
    time the `zipCode` was assigned, since a request could come at any time to merge
    the entity changes into the database. As mentioned earlier, however, the use of
    entity life cycle callback methods could avoid the overhead of eagerly deriving
    this value.


    Access Type Summary


    JPA offers two models for how the persistence provider accesses the field data
    on an entity, either directly through instance variables and indirectly through
    property accessors. In the general case, we have found that annotating an entity’s
    instance variables is preferable to annotating its property accessors. You’ll
    rarely have a need to validate data coming in from the persistent store, and any
    side-effect code in setter methods typically should be performed lazily, not eagerly
    at the time the entity is instantiated. Furthermore, field-level annotations allow
    you to decouple the public property types exposed through that field’s get/set
    methods from the underlying column representation. For instance, you may want
    to expose the `zipCode` property as a `String` through the `getZipcode()/setZipcode()`
    methods, but convert it internally to an integer, using a field of type `Integer`,
    for persistence to an `INTEGER` column in the database. Finally, the use of entity
    life-cycle callback methods provides the opportunity for additional initialization
    or preparation, both after the entity data is loaded and before it is saved.


