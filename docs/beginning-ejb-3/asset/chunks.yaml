    \ 对比\n\n在图 9-11 中，单表模型不仅比多表模型更快达到饱和点，而且其总事务率也略低于多表模型。如您所见，单表模型在 60 个并发用户时开始性能下降，而多表模型则在\
    \ 80 个并发用户时才开始下降。然而，多表模型出现大幅下降的时间更早。根据收集的数据，我们可以得出结论：`JOINED`（即多表）继承模型在高压力条件下表现略优。\n\
    \n结论\n\n在本章中，我们介绍了 *The Grinder*（一种执行性能测试的方法论）以及一个用于生成性能测试负载的工具包。我们通过一个使用该方法和工具包的性能测试示例进行了讲解。具体来说，我们讨论了性能标准，并回顾了两个性能指标：响应时间和吞吐量。我们涵盖了应用程序使用情况的模拟，讨论了测试脚本和思考时间。我们还涉及了测试指标的定义，例如用户数量、样本大小和数据排除，以及如何确定性能测试的准确性。\n\
    \n为了说明该方法的使用，我们使用前几章创建的应用程序进行了一个详细的案例研究，并比较了两种继承策略。\n\n在下一章中，我们将探讨上下文与依赖注入（CDI），以及如何利用它来增强\
    \ EJB 和应用程序开发体验。\n\n第 10 章\n\n![image](img/frontdot.jpg)\n\n上下文与依赖注入\n\n在本章中，我们将讨论*上下文与依赖注入*（CDI）。CDI\
    \ 提供了强大的服务，用于将 Java EE 框架的各个层*粘合*在一起。JSR 299 中定义的*Java 平台上下文与依赖注入*的第一个公开草案于 2008\
    \ 年发布。在最初的开发阶段，JSR 299 规范被称为 *Web Beans*。在规范更名为上下文与依赖注入后，最初的参考实现被命名为 *Web Beans*。在两种不同上下文中使用相同名称\
    \ Web Beans 在社区成员中造成了一些混淆，这导致参考实现从 Web Beans 更名为 *Weld*。CDI 建立在拦截器规范（JSR 318）、托管\
    \ Bean 规范（JSR 316）和 Java 依赖注入规范（JSR 330）之上。\n\n您可能会想，为什么我们在本书中包含了关于 CDI 的一章。这有两个原因：首先，最初在\
    \ EJB 中引入的依赖注入行为在 CDI 中得到了增强；其次，CDI 通过为应用程序提供*上下文*功能来补充 EJB。EJB 则通过为应用程序提供安全、事务管理和可伸缩性等企业级服务来补充\
    \ CDI。如果应用程序开发者*明智地*决定何时使用 CDI、EJB 或两者兼用，那么最终生成的应用程序将既灵活又具有可伸缩性。\n\n完成本章后，您将深入了解以下领域：\n\
    \n*   CDI 基础\n*   CDI 与 EJB 的关系\n*   部署和执行 CDI 客户端\n\n什么是 CDI？\n\n在 CDI 出现在 Java\
    \ EE 领域之前，Java EE 技术的三个层——即 Web 层、业务层和持久化层——之间没有一种简单的方式能够以松散耦合但类型安全的方式相互交互。Web\
    \ 层没有适当的机制来支持事务，因为它专注于呈现内容，并且对事务资源的访问有限。CDI 服务有助于统一企业 JavaBean（EJB）和 JavaServer\
    \ Faces（JSF）编程模型。CDI 服务允许企业 JavaBean 在 JavaServer Faces 框架中用作托管 Bean。CDI 还为访问事务资源提供了良好的支持，这有助于使用\
    \ Java 持久化 API 轻松创建 Web 应用程序。CDI 弥合了这一差距。使用 CDI，Web 层可以直接与业务层和持久化层中的 Bean 进行交互。这就是\
    \ CDI 最初被命名为 Web Beans 的原因。\n\n图 10-1 展示了 CDI 出现在 Java EE 领域之前 Java EE 应用程序的架构，而图\
    \ 10-2 展示了 CDI 出现后 Web 层和业务层如何交互。\n\n![9781430246923_Fig10-01.jpg](img/9781430246923_Fig10-01.jpg)\n\
    \n图 10-1.  CDI 之前的 Java EE 应用程序架构\n\n![9781430246923_Fig10-02.jpg](img/9781430246923_Fig10-02.jpg)\n\
    \n图 10-2.  CDI 应用程序架构\n\nCDI 提供的两个重要特性体现在其名称中：\n\n*   **上下文**：涉及将有状态组件（如有状态会话\
    \ Bean）绑定到定义明确的作用域。有状态组件是指在多次调用之间保留信息的组件。CDI 容器将有状态组件与特定的作用域关联起来——在需要时创建它们，在它们超出作用域时销毁它们。因此，客户端无需承担管理有状态组件生命周期的负担。\n\
    *   **依赖注入**：涉及以松散耦合但类型安全的方式将组件注入到应用程序中。被注入的组件由容器实例化，这意味着用户无需使用 *new* 来创建组件的实例。用户可以使用接口而不是接口的实际实现来进行注入。这允许用户将需要注入的\
    \ Bean 类型的具体实现的选择推迟到部署或运行时。\n\n清单 10-1、10-2 和 10-3 以最简单的形式演示了“上下文”和“依赖注入”的概念。在本章的后续部分，我们将以此示例为基础来演示\
    \ CDI 的各种特性。清单 10-1 定义了一个 `Wine` 接口，该接口由 `RedWine` 类实现，如清单 10-2 所示。\n\n***清单 10-1.***  Wine.java\n\
    \n```\npackage com.apress.ejb.chapter10;\n\npublic interface Wine {\n   public\
    \ String getColor();\n}\n```\n\n`RedWine` 类演示了 CDI 的“上下文”方面。它带有 `ApplicationScoped`\
    \ 注解，这意味着当应用程序被实例化时，`RedWine` 的实例只会被创建一次，并且该实例将在应用程序关闭时被销毁。在应用程序的生命周期内，该实例将在整个应用程序中共享。我们将在本章后面进一步了解作用域。\n\
    \n***清单 10-2.***  RedWine.java 演示了上下文方面\n\n```\npackage com.apress.ejb.chapter10;\n\
    \nimport javax.enterprise.context.ApplicationScoped;\n\n@ApplicationScoped\npublic\
    \ class RedWine implements Wine {\n   public String getColor() {\n       return\
    \ \"Red\";\n   }\n}\n```\n"
