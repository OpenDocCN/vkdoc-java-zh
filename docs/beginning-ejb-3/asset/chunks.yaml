    \ Testing the Session Beans\n\nSession beans need to be packaged into EJB JAR\
    \ (`.jar`) files before they are deployed into EJB containers. In the case of\
    \ some EJB containers or application servers, packaged EJB archives need to be\
    \ assembled into Enterprise Archive (EAR) files before deployment. EJB containers\
    \ or application servers provide deployment utilities or Ant tasks to facilitate\
    \ deployment of EJBs. Java IDEs (integrated development environments) like JDeveloper,\
    \ NetBeans, and Eclipse also provide deployment features that allow developers\
    \ to package, assemble, and deploy EJBs to application servers. Packaging, assembly,\
    \ and deployment are covered in detail in [Chapter 11](../Text/9781430246923_Ch11.xhtml).\n\
    \nSo far in this chapter we have developed one stateless session bean (`SearchFacade`),\
    \ one stateful session bean (`ShoppingCart`), and one singleton session bean (`ShopperCount`).\
    \ The following sections will walk you through the steps necessary to compile,\
    \ deploy, and test these session beans.\n\n### Prerequisites\n\nBefore performing\
    \ any of the steps detailed in the next sections, complete the “Getting Started”\
    \ section of [Chapter 1](../Text/9781430246923_Ch01.xhtml). This section will\
    \ walk you through the installation and environment setup required for the samples\
    \ in this chapter.\n\n### Compiling the Session Beans and their Clients\n\nCopy\
    \ the `Chapter02-SessionSamples` directory and its contents into a directory of\
    \ your choice. Run the NetBeans IDE and open the `Chapter02-SessionSamples` project\
    \ using the File ![image](Images/arrow.jpg) Open Project menu. Make sure the Open\
    \ Required Projects checkbox is checked.\n\n![9781430246923_Fig02-07.jpg](Images/9781430246923_Fig02-07.jpg)\n\
    \nFigure 2-7.   Opening the `Chapter02-SessionSamples` project\n\nExpand the `Chapter02-SessionSamples-ejb`\
    \ node and observe that the three session beans that we created appear in the\
    \ `com.apress.ejb.chapter02` package. Similarly, the three client servlets appear\
    \ under the `Chapter02-SessionSamples-war` node.\n\n![9781430246923_Fig02-08.jpg](Images/9781430246923_Fig02-08.jpg)\n\
    \nFigure 2-8.   Verifying that Session Beans and their clients are available in\
    \ the project\n\nInvoke the context menu on `Chapter02-SessionSamples` node and\
    \ build the application by selecting the `Clean and Build` menu option.\n\n![9781430246923_Fig02-09.jpg](Images/9781430246923_Fig02-09.jpg)\n\
    \nFigure 2-9.   Building the application\n\n### Deploying the Session Beans and\
    \ their Clients\n\nOnce you have compiled the session beans and the servlet clients,\
    \ you can deploy the application to the GlassFish application server. Invoke the\
    \ context menu on `Chapter02-SessionSamples` node and deploy the application by\
    \ selecting the `Deploy` menu option.\n\n![9781430246923_Fig02-10.jpg](Images/9781430246923_Fig02-10.jpg)\n\
    \nFigure 2-10.   Deploying the application\n\nNetBeans will start the integrated\
    \ GlassFish application server and deploy the application to the server. The server’s\
    \ log window will log the deployment status of the application.\n\n![9781430246923_Fig02-11.jpg](Images/9781430246923_Fig02-11.jpg)"
