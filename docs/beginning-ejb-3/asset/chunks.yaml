    and library components.

    *   Resolve naming collisions and redundancies found in external references.

    *   Package a Java EE application consisting of one or more Java EE modules and
    library components.

    *   Declare class-path dependencies between modules and libraries.

    *   Bind external references to physical resources in the application server environment.


    A Note on Deployment Tools


    This chapter provides some examples of how to structure your application archives.
    It assumes that you have access to software tools, typically offered through an
    integrated development environment (IDE), to assist you in the assembly and deployment
    of your Java EE applications. There have been efforts in the Java Community Process
    (JCP) to standardize in this area (see JSR 88, the Java EE Application Deployment
    API), but deployment inevitably requires application server–specific configuration
    tasks. Fortunately, application servers generally provide Ant tasks to invoke
    their own deployment utilities, and you may also use Ant to create the deployable
    archives. The use of Ant is prevalent in many development environments and is
    nearly ubiquitous in production environments in which automated scripts are required
    to deploy the same Java EE applications to multiple Java EE server instances.
    Many of the customization steps that are described in this chapter require the
    use of interactive editors, mainly for updating Java EE generic and platform-specific
    XML deployment descriptors. For these tasks, an IDE can prove invaluable, and
    many IDEs provide platform-specific deployment support that guides you in packaging,
    configuring, and deploying your Java EE applications.


    Overview of the Packaging and Deployment Processes


    *Packaging* is the process of assembling (or grouping) various Java EE modules
    into Java EE JAR, WAR, or EAR files. Once packaged in a Java Archive (JAR) file,
    a Web Archive (WAR) file, or an Enterprise Archive (EAR) file, the Java EE application
    is ready to be delivered to the application server. *Deployment* is the process
    of installing Java EE components in an application server so that they can be
    found and executed when you run your application. This process involves multiple
    tasks that must be performed, roughly, in sequence. These tasks are summarized
    in the following sections, and each is described in greater detail and applied
    specifically to EJB and JPA deployment later in this chapter. Some steps will
    only need to be performed under special circumstances, so actual deployment may
    involve only a subset of these tasks.


    The Provider


    Generally speaking, the Provider (there may be many for a given project) produces
    the Java EE application components as a precursor to deployment. The tasks associated
    with the Provider, along with the files delivered by this role, are shown in [Figure
    11-1](#9781430246923_Ch11.xhtml#Fig1).


    ![9781430246923_Fig11-01.jpg](Images/9781430246923_Fig11-01.jpg)


    [Figure 11-1.](#9781430246923_Ch11.xhtml#_Fig1)  Tasks and deliverables of the
    Application Component Provider


    The deliverables from the Provider are application components and possibly module
    descriptors, provided either as files on disk or packaged into Java Archive (JAR)
    files.


    The Assembler


    The Assembler takes the output from the Provider, and with it performs the tasks
    and produces the deliverables illustrated in [Figure 11-2](#9781430246923_Ch11.xhtml#Fig2).


    ![9781430246923_Fig11-02.jpg](Images/9781430246923_Fig11-02.jpg)


    [Figure 11-2.](#9781430246923_Ch11.xhtml#_Fig2)  Deployment tasks and deliverables
    of the Application Assembler


    Grouping Components by Container Type to Produce Java EE Modules


    The output of the Provider is a set of Java EE components, such as EJBs, JPA entities,
    JSF (JavaServer Faces) pages, application client classes, and possibly others.
    The Provider may also produce non-Java EE components, like ordinary Java classes.
    The Assembler groups the Java EE components together such that each group contains
    components of only one Java EE component type. Whenever the Provider has defined
    a module-level deployment descriptor (XML) file, the Assembler may follow any
    directives in that file to compose the groups, or the Assembler may choose either
    to merge or split descriptors to increase or decrease the number of Java EE components
    in each group. At the end of this process, each resulting group will become a
    Java EE module. The non-Java EE classes and resources that are left over may be
    bundled into the Java EE modules or isolated into their own groups to become sharable
    library components.


    Defining Module-Level Deployment Descriptors (Optional)


    For each Java EE module that is formed, the Assembler may locate and assign a
    deployment descriptor to represent that module. Starting with Java EE 5, this
    step is optional, since annotations now make it possible to identify the module
    type by analyzing its file contents. For example, you (in the role of either the
    Provider or the Assembler) are free to define an `ejb-jar.xml` deployment descriptor;
    but unless you are overriding information that is captured in Java annotations,
    or you have chosen to not use annotations, it is no longer necessary. In Java
    EE 5, an EJB module is defined simply by the presence of a class in a file group
    that is annotated `@Stateless`, `@Stateful`, or `@MessageDriven`.


    Packaging Components (with Optional Descriptors) into JAR Files


    In this stage, the component groups identified in the first stage are packaged
    together with their module-level deployment descriptors, if defined, into files
    using the JAR format. EJB modules are archived into EJB JAR files with a `.jar`
    extension, Web application modules are archived into Web Archive (WAR) files with
    a `.war` extension, application clients are archived into JAR files with a `.jar`
    extension, and so on. JPA persistence units may be archived into their own JAR
    files (with `.jar` extensions) or archived directly into EJB JAR or WAR files.
    We*’*ll cover this detail in the “Assembling a Persistence Unit” section later
    in the chapter*.*


    In addition, non-Java EE components, such as ordinary Java classes, may be added
    to these Java EE module archives; or the Assembler may archive them into their
    own JAR files to be deployed as library components.


    Creating an Enterprise Archive (EAR) File (Optional)


    If you (as the Assembler) have created multiple archives that you want to deploy
    together as a logical group, you will need to bundle these archives together inside
    a wrapper JAR file known as an *EAR file*, which uses the suffix `.ear`. This
    EAR file is referred to as a Java EE application. If you have created only a single
    EJB JAR or WAR archive, no further packaging is required. You can skip the step
    of creating a wrapper EAR file, and deploy the EJB JAR or WAR file as a stand-alone
    module.


    An application acts as a packaging boundary, ensuring that the Java EE components
    in all modules are able to communicate with each other within a single naming
    context. A Java EE application does not necessarily correspond to an actual end-user
    application as it may be used by many different client applications, but it allows
    client applications to connect to the Java EE application once and access the
    Java EE components in that application from a single context.'
