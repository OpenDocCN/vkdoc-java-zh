  trans: '

    由装配器生成的模块或包随后会移交给部署器。部署器对目标应用服务器环境了如指掌，包括该环境中当前已部署的所有资源信息。


    由于各供应商为其应用服务器提供的工具集各不相同，部署器的实际体验也会有所差异。部署阶段所涉及的逻辑流程将在以下章节中概述。


    **解压归档文件**


    EAR 文件或独立的模块 JAR 文件会被解压，并对其内容进行分析。


    **推导模块描述符**


    部署器会处理每个 Java EE 模块的描述符。如果提供了描述符，并且其 `metadata-complete` 属性设置为 `true`，那么部署器可以将该模块发送到相应的容器。如果未提供描述符，或者
    `metadata-complete` 未设置为 `true`，则必须扫描该模块的 Java 源代码内容以检测注解。通过扫描注解发现的所有元数据属性将与描述符中的属性合并。在此协调步骤中，Java
    EE 的优先级规则规定：每当注解和描述符都为某个给定属性提供值时，描述符中的值优先。此协调状态的结果是为该模块生成一个完整的描述符。


    **绑定外部引用**


    会检查所有发现的外部引用的完整性，以确保装配器的工作已完成。然后，这些引用会与应用服务器环境中的实际资源进行匹配。如果任何资源无法绑定，则会向部署器报告错误，以便解决该问题。可以想象，此过程极大地受益于应用服务器提供的强大部署工具集。


    **部署到容器**


    每个完整的模块都可以发送到其对应的容器进行安装和注册。完成后，这些模块中的 Java EE 组件即可供客户端访问。


    **组装 EJB JAR 模块**


    EJB JAR 文件是一个相当直接的归档文件。`.class` 文件在 JAR 文件中按照其包对应的目录进行布局，根目录位于 JAR 的顶层目录。`ejb-jar.xml`
    部署描述符（如果存在）则放在 `META-INF` 目录中，通常还会附带其他特定于平台的描述符。


    任意类都可以与 EJB 类和接口一起包含在内。一种常见的做法是将共享库 JAR 与 EJB JAR 文件打包在同一个 EAR 文件中。可以使用 EJB JAR
    文件的 `META-INF/MANIFEST.MF` 文件中的 `Class-Path` 属性来引用打包在外部 EAR 文件中的库，如前文“库组件”部分所述。类似地，可以通过在
    `META-INF/MANIFEST.MF` 文件的 `Extension-List` 属性中列出它们，来引用之前已部署但在上下文应用程序之外的已安装库。


    在指定 EJB 的元数据时，`ejb-jar.xml` 描述符和 Java 源代码注解是相互冗余的。选择使用哪种方法主要取决于提供者的偏好，尽管此决定也受到应用程序编辑、组装和部署方式的影响。然而，顶层设置（例如
    `<ejb-client-jar>`）没有对应的注解，必须通过此描述符进行分配。


    ![image](img/sq.jpg) **注意** 从 Java EE 5 开始，我们可以直接部署 EJB 和 WAR 模块，而无需将它们打包为 Java
    EE 应用程序。这仅适用于这些模块不依赖于其他 JAR 文件中尚未部署到目标应用服务器环境的类的情况。


    **命名范围**


    在一个 Java EE 应用程序中，不能有两个 EJB 具有相同的名称。装配器有责任检测这种情况，并适当地重命名 EJB 以解决冲突。


    **组装持久化单元**


    一个*持久化单元*是一组 JPA 实体、映射超类和可嵌入类，并附带一个必需的 `META-INF/persistence.xml` 文件。Java EE 提供了一组固定的方式在部署期间打包持久化单元。你可以通过以下任何一种方式打包持久化单元：


    *   打包到一个或多个 JAR 文件中，这些 JAR 文件随后可以打包到 WAR 或 EAR 文件中

    *   作为 EJB-JAR 文件中的一组类

    *   在 WAR 文件的 `classes` 目录中

    *   或者作为上述方式的组合


    其 `META-INF/persistence.xml` 文件所在的 JAR 文件或目录被称为持久化单元的*根*，它定义了构成持久化单元的类的根目录。持久化单元的根必须是以下之一：


    *   一个 EJB-JAR 文件

    *   WAR 文件的 `WEB-INF/classes` 目录

    *   WAR 文件的 `WEB-INF/lib` 目录中的一个 JAR 文件

    *   EAR 文件的库目录中的一个 JAR 文件

    *   一个应用程序客户端 JAR 文件


    你打包持久化单元的位置决定了哪些模块可以访问它。例如，将其添加到 EAR 文件的库目录中，可以使其被应用程序中的所有其他模块访问。将其放置在 EJB、Web
    应用程序或应用程序客户端 JAR 中，则将其范围限制在该模块内。


    除了 `persistence.xml` 文件之外，还可以将一个或多个 O/R 映射文件添加到 `META-INF` 目录中，以扩充或覆盖可能在受管理的 JPA
    类中指定的任何注解。JPA 指定默认文件名为 `META-INF/orm.xml`，但 `persistence.xml` 文件中定义的每个 `<persistence-unit>`
    都可以使用 `<mapping-file>` 元素指定其自己的映射文件。


    **命名范围**


    在一个 Java EE 应用程序中，两个 JPA 实体可以具有相同的名称，但前提是它们位于不同的上下文中。例如，两个 Web 应用程序模块可以在其 `WEB-INF/lib`
    或 `WEB-INF/classes` 目录中打包各自的持久化单元。在这种情况下，持久化单元对每个 Web 应用程序模块是私有的，这些持久化单元之间的重复名称不会引起冲突。


    装配器有责任检测同一命名范围内的冲突，并适当地重命名实体 `name` 属性以解决冲突。


    **总结**


    本章介绍了 Java EE 部署的主题，涵盖了通用的部署问题以及特定于 EJB 和 JPA 实体的部署领域。我们首先概述了部署期间执行的任务，并指出，根据所部署的
    Java EE 模块的复杂性，某些步骤可能不是必需的。本概述部分还解释了装配器和部署器的角色，并在这两个角色的背景下解释了部署任务。


    为了提供一些关于部署基础设施的背景知识（这些知识将有助于你选择如何划分应用程序和解决外部引用），我们探讨了 Java EE 服务器和四个 Java EE 容器：EJB、Web、应用程序客户端和
    Applet。这引出了对相应 Java EE 模块类型以及 Java EE 应用程序定义的讨论。我们还解释了如何使用库组件来打包你的 JPA 持久化单元和非
    Java EE 组件。


    本章的其余部分更深入地探讨了装配器和部署器的角色，最后进一步详细说明了如何部署 EJB 模块和 JPA 持久化单元。


    在下一章中，我们将探讨如何构建能够在多用户分布式环境中与 EJB 组件交互的客户端。


    **第 12 章**


    ![image](img/frontdot.jpg)

