  raw: 'In the case of a system exception, the application catches particular exceptions,
    such as a `NamingException` that results from a JNDI failure, and throws an `EJBException`.
    In this chapter, the examples aren’t using any resources as such, but there are
    more examples of system exceptions in the later chapters.


    Singleton Session Beans


    Introduced in EJB 3.1, a *singleton session bean* is a session bean component
    that is instantiated only once per application. For an application, only one instance
    of a singleton session bean can ever exist. Once instantiated, a singleton session
    bean lives for the full duration of the application. The singleton session bean
    maintains its state between client invocations, but it cannot save that state
    after a container shutdown or crash. Similar to stateless and stateful session
    beans, the singleton session bean is comprised of a bean class and, optionally,
    one or more business interfaces.


    The Bean Class


    A singleton session bean class is any standard Java class that has a class-level
    annotation of `@Singleton`. If deployment descriptors are used instead of annotations,
    the bean class should be denoted as a singleton session bean. If you are using
    annotations and deployment descriptors (mixed mode), then the `@Singleton` annotation
    must be specified if any other class-level or member-level annotations are specified
    in the class.


    To illustrate a singleton session bean, we will create a `ShopperCount` session
    bean that will keep track of the number of users logged onto our shopping website.
    [Listing 2-17](#9781430246923_Ch02.xhtml#list17) shows the definition of the `ShopperCount`
    session bean.


    [***Listing 2-17.***](#9781430246923_Ch02.xhtml#_list17)  ShopperCountBean.java


    ```

    package com.apress.ejb.chapter02;


    import javax.ejb.Singleton;

    import javax.ejb.Startup;

    @Singleton (name = "ShopperCount")

    @Startup

    public class ShopperCountBean {

       private int shopperCounter;


    // Increment number of shopper counter

       public void incrementShopperCount() {

           shopperCounter++;

       }


    // Return number of shoppers

       public int getShopperCount() {

           return shopperCounter;

       }

    }

    ```


    A singleton session bean is instantiated at the discretion of the EJB container.
    However, you can annotate the bean class with `@Startup` to indicate that the
    container must initialize the singleton bean during the application startup sequence.


    When multiple singleton session beans are used within an application, the application
    might require that they be initialized in a specific sequence. `@DependsOn` annotation
    declares the startup dependencies of a singleton session bean. [Listing 2-18](#9781430246923_Ch02.xhtml#list18)
    shows the definition of the `LogShopperCount` session bean that is dependent on
    the `ShopperCount` session bean.


    [***Listing 2-18.***](#9781430246923_Ch02.xhtml#_list18)  LogShopperCount.java


    ```

    package com.apress.ejb.chapter02;


    import javax.ejb.Singleton;

    import javax.ejb.Startup;

    import javax.ejb.DependsOn;

    import java.util.logging.Logger;


    @Singleton

    @Startup

    @DependsOn("ShopperCount")

    public class LogShopperCount {

       private final Logger log = Logger.getLogger("LogShopperCount.class");


    public void logShopperCount() {

           // Log shopper count

       }

    }

    ```


    Unlike stateless and stateful session beans, a singleton session bean must not
    implement the `javax.ejb.SessionSynchronization` interface or use session synchronization
    annotations.


    The Business Interface


    Business interfaces for singleton session beans are similar to the interfaces
    for stateless and stateful session beans, and they are annotated in the same way
    using `@Local` and `@Remote` annotations. Singleton session beans support the
    no-interface local view, making the declaration of a business interface optional
    for a local view.


    Business Methods


    Business methods in singleton session beans are similar to the methods in stateless
    and stateful session beans. We will augment the `ShopperCount` bean by adding
    a business method that will reset the counter.


    [Listing 2-19](#9781430246923_Ch02.xhtml#list19) shows the `ShopperCount` bean
    implementing business methods.


    [***Listing 2-19.***](#9781430246923_Ch02.xhtml#_list19)  ShopperCountBean.java


    ```

    package com.apress.ejb.chapter02;


    import javax.ejb.Singleton;

    import javax.ejb.Startup;


    @Singleton(name = "ShopperCount")

    @Startup

    public class ShopperCountBean {

       private int shopperCounter = 0;


    // Increment number of shopper counter

       public void incrementShopperCount() {

           shopperCounter++;

       }


    // Return number of shoppers

       public int getShopperCount() {

           return shopperCounter;

       }


    // Reset counter

       public void resetCounter() {

           shopperCounter = 0;

       }

    }

    ```


    Lifecycle Callback Methods


    Singleton session beans support callback events for construction and destruction.
    Following are the callbacks that map to the preceding events:


    *   `PostConstruct`: Denoted with the `@PostConstruct` annotation

    *   `PreDestroy`: Denoted with the `@PreDestroy` annotation.


    `PostConstruct` callback happens after a bean instance is instantiated in the
    EJB container. If the bean is using any dependency injection mechanism for acquiring
    references to resources or other objects in its environment, the `PostConstruct`
    event happens after injection is performed and before the first business method
    in the bean class is called.


    `PreDestroy` callback happens during application shutdown. The container considers
    the `DependsOn` relationship between singleton session beans and removes them
    in a sequence that is in the reverse order of the sequence in which they were
    created. For the `ShopperCount` example, `LogShopperCount` bean will be removed
    before the `ShopperCount` bean.


    [Listing 2-20](#9781430246923_Ch02.xhtml#list20) shows the code for the `applicationStartup()`
    method with the `@PostConstruct` annotation. This method resets the `shopperCounter`
    on startup. [Listing 2-20](#9781430246923_Ch02.xhtml#list20) also shows the code
    for the `applicationShutdown()` method with the `@PreDestroy` annotation. This
    method prints a message on application shutdown.


    [***Listing 2-20.***](#9781430246923_Ch02.xhtml#_list20)  ShopperCountBean.java


    ```

    package com.apress.ejb.chapter02;


    import javax.annotation.PostConstruct;

    import javax.annotation.PreDestroy;

    import javax.ejb.Singleton;

    import javax.ejb.Startup;


    @Singleton(name = "ShopperCount")

    @Startup

    public class ShopperCountBean {

       private int shopperCounter;


    // Increment number of shopper counter

       public void incrementShopperCount() {

           shopperCounter++;

       }


    // Return number of shoppers

       public int getShopperCount() {

           return shopperCounter;

       }


    // Reset counter

       public void resetCounter() {

           shopperCounter = 0;

       }


    // Reset counter

       @PostConstruct

       public void applicationStartup() {

           System.out.println("From applicationStartup method.");

           resetCounter();

       }


    @PreDestroy

       public void applicationShutdown() {

          System.out.println("From applicationShutdown method.");

       }

    }

    ```


    Like a stateless session bean, a singleton session bean is never passivated, so
    the `@PrePassivate` and `@PostActivate` annotations should not be used to decorate
    methods on a singleton session bean.


    Concurrency Management


    A singleton session bean is instantiated only once per application, and hence
    it is designed to support concurrent access. Concurrent access means multiple
    clients can access the same instance of a singleton session bean at the same time.
    The management of concurrent access is transparent to the clients. A client needs
    only a reference to a singleton session bean, and it is unconcerned about other
    clients accessing the same instance of the singleton session bean.


