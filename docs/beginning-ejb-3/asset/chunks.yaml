  raw: 'Asynchronous methods immediately return to the caller without waiting for
    the method execution to complete. Asynchronous methods are typically used for
    processor intensive or long-running, background tasks, such as printing a document
    or sending a large email.


    Starting with EJB 3.1, a session bean can declare that one or more of its methods
    can be executed asynchronously. When a session bean client invokes an asynchronous
    method, the container immediately returns the control to the client. This allows
    the client to perform tasks in parallel while the business method completes its
    execution on a separate thread. For example, clients can use this functionality
    to show the progress of a long running task using a progress bar.


    An asynchronous method is defined by annotating a business method with `javax.ejb.Asynchronous`
    annotation. An `@Asynchronous` annotation at the class level marks all the business
    methods of the session bean as asynchronous. An asynchronous method must return
    either `void` or an implementation of the `java.lang.concurrent.Future<V>` interface.
    Asynchronous methods that return `void` cannot throw application exceptions. Application
    exceptions can only be thrown by asynchronous methods that return `Future<V>`.


    Asynchronous methods defined on a bean class should have the following signature:


    ```

    public void <METHOD>(Object)

    ```


    or


    ```

    public java.util.concurrent.Future<V> <METHOD>(Object) throws <APPLICATION-EXCEPTION>

    ```


    Session bean clients invoke asynchronous methods in the same way they invoke synchronous
    methods. If an asynchronous method has been defined to return a result, the client
    immediately receives an instance of `Future<V>` interface. A client can use this
    instance for any of the following operations:


    *   Retrieving the final result set using the `get()` method. Since this method
    call blocks synchronously until a result is returned or an exception is thrown,
    typically it is not called until `isDone()` returns true.

    *   Checking the status of the asynchronous method using the `isDone()` method

    *   Cancelling the method invocation using `cancel(boolean)` method. Calling `cancel()`
    does not interrupt the thread, it simply sets a state flag that can be checked
    within the running method so that it may gracefully interrupt its execution and
    return.

    *   Checking if the method invocation was cancelled using `isCancelled()` method

    *   Checking for exceptions


    ![image](Images/sq.jpg) **Note**   Session bean methods that are exposed as web
    services can’t be asynchronous.


    If an asynchronous method returns a result, it must return that result using the
    `javax.ejb.AsyncResult<V>` convenience wrapper object. Note that this object is
    not actually returned to the client, but is intercepted by the EJB container and
    unwrapped to service method calls on the `Future<V>` object that was actually
    returned to the client when the client invoked the method.


    Dependency Injection


    In [Chapter 1](../Text/9781430246923_Ch01.xhtml), we introduced the concept of
    dependency injection as a programming design pattern. In this section, we will
    take a cursory look into using dependency injection in stateless session beans.
    Dependency injection is discussed in detail in [Chapter 10](../Text/9781430246923_Ch10.xhtml).


    EJB containers provide the facilities to inject various types of resources into
    stateless session beans. Typically, in order to perform user tasks or process
    requests from client applications, the business methods in the session bean require
    one or more types of resources. These resources can be other session beans, data
    sources, or message queues. Managed beans can be injected into session beans using
    Contexts and Dependency Injection (CDI).


    The resources that the stateless session bean is trying to use can be injected
    using annotations or deployment descriptors. Resources can be acquired by annotation
    of instance variables or annotation of the setter methods. [Listing 2-5](#9781430246923_Ch02.xhtml#list5)
    shows an example of setter and instance variable–based injection of `myDb`, which
    represents the data source.


    [***Listing 2-5.***](#9781430246923_Ch02.xhtml#_list5)  Data Source Injection


    ```

    @Resource

    DataSource myDb;


    // or

    @Resource

    public void setMyDb(DataSource myDb) {

        this.myDb = myDb;

    }

    ```


    You’ll typically use the setter injections to preconfigure or initialize properties
    of the injected resource.


    Lifecycle Callback Methods


    There will be certain instances or use cases in which the application using session
    beans requires fine-grained control over lifecycle events like its own creation,
    removal, and so on. For example, the `SearchFacade` session bean might need to
    perform some database initialization when it is created or close some database
    connections when it is destroyed. The application can gain fine-grained control
    over the various stages of the bean lifecycle via methods known as *callback methods*.
    A callback method can be any method in the session bean that has callback annotations.
    The EJB container calls these methods at the appropriate stages of the bean’s
    lifecycle (bean creation and destruction).


    Following are two such callbacks for stateless session beans:


    *   `PostConstruct`: Denoted with the `@PostConstruct` annotation. Methods on
    the bean class that use a specific signature, as described below, can be marked
    with this annotation.

    *   `PreDestroy`: Denoted with the `@PreDestroy` annotation. Again, any method
    in the bean class with a specific signature, as described below, can be marked
    with this annotation.


    Callback methods defined on a bean class should have the following signature:


    ```

    void <METHOD>()

    ```


    Callback methods can also be defined on a bean’s listener class; these methods
    should have the following signature:


    ```

    void <METHOD>(Object)

    ```


    where `Object` may be declared as the actual bean type, which is the argument
    passed to the callback method at run time. Lifecycle callback methods can have
    public, private, protected, or package level access. A lifecycle callback method
    must not be declared as `final` or `static`.


    `PostConstruct` callbacks happen after a bean instance is instantiated in the
    EJB container. If the bean is using any dependency injection mechanisms for acquiring
    references to resources or other objects in its environment, `PostConstruct` will
    occur after injection is performed and before the first business method in the
    bean class is called. In the case of the `SearchFacade` session bean, you could
    have a business method, `wineSearchByCountry()`, which would return the wine list
    for a particular country and have a `PostConstruct` callback method, `initializeCountryWineList()`,
    that would initialize the country’s wine list whenever the bean gets instantiated.
    Ideally, you would load the list from a back-end datastore; but in this chapter,
    we will just use some hard-coded values that get populated into a `HashMap`, as
    shown in [Listing 2-6](#9781430246923_Ch02.xhtml#list6).


    [***Listing 2-6.***](#9781430246923_Ch02.xhtml#_list6)  The PostConstruct Method


    ```

    @PostConstruct

    public void initializeCountryWineList() {

        // countryMap is HashMap

        countryMap.put("Australia", "Sauvignon Blanc");

        countryMap.put("Australia", "Grenache");

        countryMap.put("France","Gewurztraminer");

        countryMap.put("France","Bordeaux");

    }

    ```


    The `PreDestroy` callback happens before the container destroys an unused or expired
    bean instance from its object pool. This callback can be used to close any connection
    pool that has been created with dependency injection and also to release any other
    resources.'
  trans: '

    异步方法会立即将控制权返回给调用者，而无需等待方法执行完成。异步方法通常用于处理器密集型或长时间运行的后台任务，例如打印文档或发送大型电子邮件。


    从 EJB 3.1 开始，会话 Bean 可以声明其一个或多个方法能够异步执行。当会话 Bean 客户端调用异步方法时，容器会立即将控制权返回给客户端。这使得客户端能够在业务方法于单独线程中完成执行的同时，并行执行任务。例如，客户端可以利用此功能，通过进度条来展示长时间运行任务的进度。


    异步方法通过在业务方法上添加 `javax.ejb.Asynchronous` 注解来定义。在类级别添加 `@Asynchronous` 注解，会将会话 Bean
    的所有业务方法标记为异步。异步方法必须返回 `void` 或 `java.lang.concurrent.Future<V>` 接口的实现。返回 `void`
    的异步方法不能抛出应用程序异常。只有返回 `Future<V>` 的异步方法才能抛出应用程序异常。


    在 Bean 类上定义的异步方法应具有以下签名：


    ```

    public void <METHOD>(Object)

    ```


    或


    ```

    public java.util.concurrent.Future<V> <METHOD>(Object) throws <APPLICATION-EXCEPTION>

    ```


    会话 Bean 客户端调用异步方法的方式与调用同步方法相同。如果异步方法被定义为返回结果，客户端会立即收到一个 `Future<V>` 接口的实例。客户端可以使用此实例进行以下任何操作：


    *   使用 `get()` 方法检索最终结果集。由于此方法调用会同步阻塞，直到返回结果或抛出异常，因此通常直到 `isDone()` 返回 `true`
    时才调用它。

    *   使用 `isDone()` 方法检查异步方法的状态。

    *   使用 `cancel(boolean)` 方法取消方法调用。调用 `cancel()` 不会中断线程，它只是设置一个状态标志，该标志可以在运行的方法内部进行检查，以便其能够优雅地中断执行并返回。

    *   使用 `isCancelled()` 方法检查方法调用是否已被取消。

    *   检查异常。


    ![image](img/sq.jpg) **注意**   作为 Web 服务公开的会话 Bean 方法不能是异步的。


    如果异步方法返回结果，则必须使用 `javax.ejb.AsyncResult<V>` 便捷包装器对象来返回该结果。请注意，此对象实际上并不会返回给客户端，而是由
    EJB 容器拦截并解包，以服务于对 `Future<V>` 对象的方法调用，该对象是在客户端调用方法时实际返回给客户端的。


    依赖注入


    在第 1 章中，我们介绍了依赖注入作为编程设计模式的概念。在本节中，我们将初步了解如何在无状态会话 Bean 中使用依赖注入。依赖注入将在第 10 章中详细讨论。


    EJB 容器提供了将各种类型的资源注入无状态会话 Bean 的功能。通常，为了执行用户任务或处理来自客户端应用程序的请求，会话 Bean 中的业务方法需要一种或多种类型的资源。这些资源可以是其他会话
    Bean、数据源或消息队列。托管 Bean 可以使用上下文和依赖注入（CDI）注入到会话 Bean 中。


    无状态会话 Bean 尝试使用的资源可以通过注解或部署描述符进行注入。可以通过对实例变量进行注解或对 setter 方法进行注解来获取资源。清单 2-5 展示了一个基于
    setter 和实例变量注入 `myDb` 的示例，`myDb` 代表数据源。


    ***清单 2-5.***  数据源注入


    ```

    @Resource

    DataSource myDb;


    // 或

    @Resource

    public void setMyDb(DataSource myDb) {

        this.myDb = myDb;

    }

    ```


    你通常会使用 setter 注入来预配置或初始化注入资源的属性。


    生命周期回调方法


    在某些实例或用例中，使用会话 Bean 的应用程序需要对生命周期事件（如其自身的创建、移除等）进行细粒度控制。例如，`SearchFacade` 会话 Bean
    可能需要在创建时执行一些数据库初始化，或在销毁时关闭一些数据库连接。应用程序可以通过称为*回调方法*的方法来获得对 Bean 生命周期各个阶段的细粒度控制。回调方法可以是会话
    Bean 中任何带有回调注解的方法。EJB 容器会在 Bean 生命周期的适当阶段（Bean 创建和销毁）调用这些方法。


    以下是针对无状态会话 Bean 的两种此类回调：


    *   `PostConstruct`：使用 `@PostConstruct` 注解表示。Bean 类中使用特定签名（如下所述）的方法可以标记为此注解。

    *   `PreDestroy`：使用 `@PreDestroy` 注解表示。同样，Bean 类中任何具有特定签名（如下所述）的方法都可以标记为此注解。


    在 Bean 类上定义的回调方法应具有以下签名：


    ```

    void <METHOD>()

    ```


    回调方法也可以在 Bean 的监听器类上定义；这些方法应具有以下签名：


    ```

    void <METHOD>(Object)

    ```


    其中 `Object` 可以声明为实际的 Bean 类型，该类型是运行时传递给回调方法的参数。生命周期回调方法可以具有 public、private、protected
    或包级别访问权限。生命周期回调方法不得声明为 `final` 或 `static`。


    `PostConstruct` 回调发生在 Bean 实例在 EJB 容器中实例化之后。如果 Bean 使用任何依赖注入机制来获取对其环境中资源或其他对象的引用，则
    `PostConstruct` 将在注入执行之后、Bean 类中的第一个业务方法被调用之前发生。以 `SearchFacade` 会话 Bean 为例，你可以有一个业务方法
    `wineSearchByCountry()`，它会返回特定国家的葡萄酒列表，并有一个 `PostConstruct` 回调方法 `initializeCountryWineList()`，该方法会在
    Bean 被实例化时初始化该国家的葡萄酒列表。理想情况下，你会从后端数据存储加载列表；但在本章中，我们将仅使用一些硬编码值填充到 `HashMap` 中，如清单
    2-6 所示。


    ***清单 2-6.***  PostConstruct 方法


    ```

    @PostConstruct

    public void initializeCountryWineList() {

        // countryMap 是 HashMap

        countryMap.put("Australia", "Sauvignon Blanc");

        countryMap.put("Australia", "Grenache");

        countryMap.put("France","Gewurztraminer");

        countryMap.put("France","Bordeaux");

    }

    ```


    `PreDestroy` 回调发生在容器从其对象池中销毁未使用或过期的 Bean 实例之前。此回调可用于关闭通过依赖注入创建的任何连接池，并释放任何其他资源。

    '
- fmt: "在`SearchFacade`会话Bean的情况下，我们可以向`SearchFacade`Bean添加一个`PreDestroy`回调方法（`destroyWineList()`），该方法会在Bean被销毁时清除国家葡萄酒列表。理想情况下，在`PreDestroy`期间，我们应该关闭通过依赖注入创建的任何资源；但在本章中，我们只会清除包含国家和葡萄酒列表的`HashMap`。[清单2-7](#9781430246923_Ch02.xhtml#list7)展示了`destroyWineList()`的代码。\n\
    \n[**清单2-7.**](#9781430246923_Ch02.xhtml#_list7) `PreDestroy`方法\n\n```\n@PreDestroy\n\
    public void destroyWineList() {\n    countryMap.clear();\n}\n```\n\n## 拦截器\n\n\
    EJB规范提供了一种称为*拦截器*的注解，它允许你在业务方法调用上进行拦截，以便在方法调用前后添加自己的包装代码。可以为会话Bean和消息驱动Bean（MDB）定义拦截器方法。我们将在会话Bean上下文中展示拦截器的用法。\n\
    \n在典型应用程序中，有许多拦截器的用例，你可能会发现在业务方法调用前后需要执行某些任务。例如，你可能希望执行以下操作之一：\n\n*   在转账超过10万美元的关键业务方法之前执行额外的安全检查\n\
    *   进行一些性能分析，计算执行任务所需的时间\n*   在方法调用前后进行额外的日志记录\n\n有两种定义拦截器的方法。你可以在特定方法上添加`@AroundInvoke`注解，或者注解Bean类以指定一个拦截器类，该拦截器类将拦截Bean类上的所有（或显式子集）方法。拦截器类通过在其关联的Bean类上使用`@Interceptor`注解来表示。在多个拦截器类的情况下，使用`@Interceptors`注解。方法特定的拦截器通过在业务方法上应用`@Interceptors`注解来表示。使用`@AroundInvoke`注解的方法应具有以下签名：\n\
    \n```\nObject <METHOD>(InvocationContext) throws Exception\n```\n\n`AroundInvoke`方法可以具有`public`、`private`、`protected`或包级别访问权限。`AroundInvoke`方法不能声明为`final`或`static`。`InvocationContext`的定义如下：\n\
    \n```\npackage javax.ejb;\npublic interface InvocationContext {\n   public Object\
    \ getBean();\n   public java.lang.reflect.Method getMethod();\n   public Object[]\
    \ getParameters();\n   public void setParameters(Object[] params);\n   public\
    \ EJBContext getEJBContext();\n   public java.util.Map getContextData();\n   public\
    \ Object proceed() throws Exception;\n}\n```\n\n以下列表描述了上述代码中的方法：\n\n*   `getBean()`返回调用方法所在的Bean实例。\n\
    *   `getMethod()`返回被调用的Bean实例上的方法。\n*   `getParameters()`返回方法调用的参数。\n*   `setParameters()`修改用于方法调用的参数。\n\
    *   `getEJBContext()`允许拦截器方法访问Bean的`EJBContext`。\n*   `getContextData()`允许使用返回的`Map`在同一个`InvocationContext`实例中的拦截器方法之间传递值。\n\
