    \ EE 容器提供抽象 API。有关 Cargo 的更多信息，请参见 `http://cargo.codehaus.org`。\n\n部署计划\n\n某些供应商的应用服务器工具会将部署者的选择记录在一个称为*部署计划*的文档中。由于部署通常是一个迭代过程，尤其是在开发和测试阶段，捕获部署者的选择会很方便，这样部署者就不必重复指定相同的信息。\n\
    \n目前，JSR 88 或其他地方都没有为部署计划指定标准格式，因此它不是一个可以在不同应用服务器实现之间复用的文档。如果你觉得这很不方便，可以参与 JCP\
    \ 并组建或加入一个 JSR，以推动该领域的标准化。\n\n部署角色\n\n任何包罗万象的企业服务平台本质上都是复杂的。认识到这一现实，Java EE 的架构师将\
    \ Java EE 服务划分成了定义良好的 API。类似地，他们将与开发和配置 Java EE 应用各个阶段相关的任务划分成了定义良好的角色。我们提到过，与构建各种应用组件（如\
    \ EJB、实体、Servlet、JSF JSP 等）相关的任务属于 Java EE 的应用组件提供者角色。还有其他角色，例如系统组件提供者，负责在应用服务器中安装应用组件所需的资源。其中包括数据库资源、授权策略、安全角色以及许多其他资源，包括通过资源适配器引入的服务。\n\
    \n我们之前介绍过应用装配者和应用部署者的角色。然而，在本节中，我们将更深入地探讨这些角色。\n\n应用装配者\n\n以下是作为应用装配者需要了解的内容。\n\
    \n定义和描述外部依赖"
- fmt: "Provider 识别其组件所持有的外部需求，这些需求可能存在于注解、部署描述符或两者中。这些依赖关系可能指向其他 EJB、持久化单元、环境属性值、数据库连接或该应用组件外部的任何其他对象。`Assembler`\
    \ 负责进一步描述这些外部依赖关系，以便 `Deployer` 能够弄清楚如何将它们映射到特定应用服务器环境中的具体资源。外部依赖关系通过注解或部署描述符中的\
    \ `<ejb-ref>`、`<ejb-local-ref>`、`<resource-ref>`、`<resource-env-ref>`、`<security-role-ref>`\
    \ 和 `<message-destination-ref>` 条目来定义。`Assembler` 的工作是分析这些外部引用并修补它们。此过程涉及以下步骤。\n\
    \n### 确保所有引用完整\n\n`Provider` 仅部分完成外部引用的定义是合法且常见的。`Provider` 可能不知道或试图猜测被引用资源的实际名称。在这种情况下，`Provider`\
    \ 将详细说明引用的细节——其对象类型、内部使用的名称以及对被引用对象逻辑行为的描述。`Assembler` 获取此信息，然后将其链接到应用程序内部一致的资源名称。EJB\
    \ 引用就是一个例子。允许使用 `<ejb-ref>` 元素在 `web.xml`、`ejb-jar.xml` 或 `application-client.xml`\
    \ 描述符中声明 EJB 引用。`<ejb-ref>` 有一个 `ejb-ref-name` 属性，该属性由引用组件（无论是 Web 表单、另一个 EJB\
    \ 还是应用程序客户端）使用，并通过为 `<ejb-ref>` 的 `ejb-link` 属性赋值，将其链接到部署期间分配给 EJB 的实际名称。[清单 11-5](#9781430246923_Ch11.xhtml#list5)\
    \ 展示了一个由 `Assembler` 完全定义的 `<ejb-ref>`。\n\n***[清单 11-5](#9781430246923_Ch11.xhtml#_list5).***\
    \  一个已正确链接到命名 EJB 的 `ejb-ref` 描述符元素\n\n```\n<ejb-ref>\n <description>\n  Some\
    \ description that defines this EJB to the Assembler\n </description>\n <ejb-ref-name>ejb/MyAccountManager</ejb-ref-name>\n\
    \ <ejb-ref-type>Session</ejb-ref-type>\n <remote>com.apress.ejb.ch11.MyAccountManager</remote>\n\
    \ <ejb-link>SalesAccountManager</ejb-link>\n</ejb-ref>\n```\n\n![image](Images/sq.jpg)\
    \ **注意**  从 EJB 3 开始，`<home>` 和 `<local-home>` 属性是可选的。\n\n也可以解析对同一应用程序中不同 EJB\
    \ JAR 文件中的 EJB 的引用。[清单 11-6](#9781430246923_Ch11.xhtml#list6) 说明了如何在 `ejb-link`\
    \ 值中使用特殊路径表示法来实现这一点。`ejb-link` 属性值可以引用应用程序 EAR 文件中任何 EJB JAR 文件中的任何 EJB。\n\n***[清单\
    \ 11-6](#9781430246923_Ch11.xhtml#_list6).***  一个链接到应用程序中不同 EJB JAR 中的 EJB 的 `ejb-ref`\
    \ 描述符元素\n\n```\n<ejb-ref>\n <description>\n  Some description that defines this\
    \ EJB to the Assembler\n </description>\n <ejb-ref-name>ejb/MyAccountManager</ejb-ref-name>\n\
    \ <ejb-ref-type>Session</ejb-ref-type>\n <remote>com.apress.ejb.ch11.MyAccountManager</remote>\n\
    \ <ejb-link>../salesEjbModule.jar#SalesAccountManager</ejb-link>\n</ejb-ref>\n\
    ```\n\n此示例展示了如果 `SalesAccountManager` EJB 被移入一个名为 `salesEjbModule.jar` 的对等 EJB\
    \ 模块中，链接将如何显示。最后，`Assembler` 可能需要解析已使用 Java 源代码中的 `@EJB` 注解部分声明的 EJB 引用，如[清单 11-7](#9781430246923_Ch11.xhtml#list7)\
    \ 所示。\n\n***[清单 11-7](#9781430246923_Ch11.xhtml#_list7).***  Java 源文件中的部分 `@EJB`\
    \ 注解\n\n```\n@EJB(name=\"AccountManager\",\n   beanInterface=AccountManager.class,\n\
    \   description=\"The Department Account Manager\")\nprivate AccountManager acctMgr;\n\
    ```\n\n`Assembler` 将添加一个 `<ejb-ref>` 元素来完成此引用，但会保持已定义的属性不变，如[清单 11-8](#9781430246923_Ch11.xhtml#list8)\
    \ 所示。\n\n***[清单 11-8](#9781430246923_Ch11.xhtml#_list8).***  一个填充 `@EJB` 注解缺失属性的\
    \ `ejb-ref` 描述符元素\n\n```\n<ejb-ref>\n <ejb-ref-name>ejb/MyAccountManager</ejb-ref-name>\n\
    \ <ejb-link>SalesAccountManager</ejb-link>\n</ejb-ref>\n```\n\n![image](Images/sq.jpg)\
    \ **注意**  虽然可以使用 JNDI（Java 命名和目录接口）来查找部署在上下文应用程序之外的 EJB，但 `<ejb-ref>`、`<ejb-local-ref>`\
    \ 以及相应的 `@EJB` 注解只能用于访问部署在上下文应用程序中的 EJB。\n\n此过程持续进行，直到 `Assembler` 链接了所有发现的悬而未决的\
    \ EJB、资源、资源环境以及任何其他引用。\n\n### 解决冲突和冗余引用\n\n提交给 `Assembler` 以组装成应用程序的模块可能由不同的 `Provider`\
    \ 或在不同的时间构建。在这种情况下，通常会找到对相同逻辑资源的引用，但使用了不同的名称。`Assembler` 负责扫描源代码注解和任何 XML 部署描述符，并将任何冗余引用重命名为一个通用名称。\n\
    \n类似地，应用程序组件可能使用相同的内部名称来引用逻辑上不同的资源。`Assembler` 必须利用这些引用的描述属性（这些属性既可以在注解中找到，也可以在部署描述符中找到），以及\
    \ `Provider` 提供的任何其他文档，来检测此类冲突并适当地重命名这些引用。\n\n`Assembler` 可以选择通过将模块源文件中找到的 Java\
    \ 注解合并到描述符中（只要不冲突）来完全填充每个模块描述符。如果 `Assembler` 选择执行此任务，则描述符的 `metadata-complete`\
    \ 属性可以设置为 `true`。这向 `Deployer` 发出信号，表明无需进一步分析此描述符和 Java 注解，从而实现更快速的部署。\n\n###\
    \ 打包\n\n`Assembler` 执行打包阶段，将应用程序组件捆绑到特定于容器的 JAR 文件和组件库中。此打包过程在前面的“打包和部署过程概述”部分中进行了概述。您可以使用\
    \ Ant 或 ZIP 实用程序来执行这些步骤，将 Java EE 组件分组到模块中并将它们打包到 JAR 文件中。然而，这是一个受益于使用可视化打包工具（通常通过\
    \ IDE 提供）的领域。`Assembler` 将 EJB 和应用程序客户端模块打包到 JAR 文件中，将 Web 应用程序模块打包到 WAR 文件中，并将资源适配器打包到\
    \ RAR 文件中。\n\n在组装一个没有捆绑库的独立 Java EE 模块时，不需要进一步的打包。该模块的 JAR 文件已准备好部署。\n\n如果涉及多个模块，或者也需要捆绑库，则\
    \ `Assembler` 会创建一个 EAR 文件，并将模块和库添加到此归档文件中。`Assembler` 可以使用内部目录结构添加模块，前提是 `lib`\
    \ 目录或 `application.xml` 文件中由 `<library-directory>` 指定的目录被作为隐式共享库的位置。\n\nEAR 文件\
    \ `META-INF` 目录中的可选 `application.xml` 文件可用于显式标识应用程序中包含的模块。这是告诉部署工具忽略那些不属于应用程序但由于某种原因作为应用程序一部分包含在内的模块的方法。\n\
    \n### 应用程序部署器"
  raw: 'The Provider identifies the external requirements held by its components,
    either in annotations, deployment descriptors, or both. These dependencies may
    be on other EJBs, persistence units, environment property values, database connections,
    or any other object external to that application component. It is the responsibility
    of the Assembler to describe these external dependencies further such that the
    Deployer can figure out how to map them to concrete resources in a specific application
    server environment. External dependencies are defined through `<ejb-ref>`, `<ejb-local-ref>`,
    `<resource-ref>`, `<resource-env-ref>`, `<security-role-ref>`, and `<message-destination-ref>`
    entries in annotations or deployment descriptors. The Assembler’s job is to analyze
    these external references and patch them up. This process involves the following
    steps.


    Ensuring That All References Are Complete


    It is legal, and common, for the Provider to complete the definition of external
    references only partially. The Provider may not know, or may attempt to guess,
    the actual names of the resources being referenced. In such cases, the Provider
    will spell out the details of the reference—its object type, its internally used
    name, and a description of the logical behavior of the referenced object. The
    Assembler takes this information and then links it to a name of a resource that
    is internally consistent within the application. An example of this is an EJB
    reference. A `web.xml`, `ejb-jar.xml`, or `application-client.xml` descriptor
    is allowed to declare EJB references using an `<ejb-ref>` element. An `<ejb-ref>`
    has an `ejb-ref-name` property that is used by the referencing component (whether
    a Web form, another EJB, or an application client), and links it to the actual
    name assigned to the EJB during deployment by assigning a value to the `<ejb-ref>`’s
    `ejb-link` property. [Listing 11-5](#9781430246923_Ch11.xhtml#list5) illustrates
    an `<ejb-ref>` that has been fully defined by the Assembler.


    ***[Listing 11-5](#9781430246923_Ch11.xhtml#_list5).***  An ejb-ref Descriptor
    Element that Has Been Properly Linked to a Named EJB


    ```

    <ejb-ref>

     <description>

      Some description that defines this EJB to the Assembler

     </description>

     <ejb-ref-name>ejb/MyAccountManager</ejb-ref-name>

     <ejb-ref-type>Session</ejb-ref-type>

     <remote>com.apress.ejb.ch11.MyAccountManager</remote>

     <ejb-link>SalesAccountManager</ejb-link>

    </ejb-ref>

    ```


    ![image](Images/sq.jpg) **Note**   The `<home>` and `<local-home>` properties
    are optional starting with EJB 3.


    It is also possible to resolve a reference to an EJB that is packaged in a different
    EJB JAR file in the same application. [Listing 11-6](#9781430246923_Ch11.xhtml#list6)
    illustrates how you would use a special path notation in the `ejb-link` value
    to do this. The `ejb-link` property value may refer to any EJB found in an EJB
    JAR file in the application EAR file.


    ***[Listing 11-6](#9781430246923_Ch11.xhtml#_list6).***  An ejb-ref Descriptor
    Element that Links to an EJB Residing in a Different EJB JAR in the Application


    ```

    <ejb-ref>

     <description>

      Some description that defines this EJB to the Assembler

     </description>

     <ejb-ref-name>ejb/MyAccountManager</ejb-ref-name>

     <ejb-ref-type>Session</ejb-ref-type>

     <remote>com.apress.ejb.ch11.MyAccountManager</remote>

     <ejb-link>../salesEjbModule.jar#SalesAccountManager</ejb-link>

    </ejb-ref>

    ```


    This example shows how the link would appear if the `SalesAccountManager` EJB
    was moved into a peer EJB module named `salesEjbModule.jar`. Finally, the Assembler
    may need to resolve EJB references that have been partially declared using `@EJB`
    annotations in the Java source, as shown in [Listing 11-7](#9781430246923_Ch11.xhtml#list7).


    ***[Listing 11-7](#9781430246923_Ch11.xhtml#_list7).***  A Partial @EJB Annotation
    in a Java Source File


    ```

    @EJB(name="AccountManager",

       beanInterface=AccountManager.class,

       description="The Department Account Manager")

    private AccountManager acctMgr;

    ```


    The Assembler would add an `<ejb-ref>` element to complete this reference but
    would leave the properties that have already been defined intact, as shown in
    [Listing 11-8](#9781430246923_Ch11.xhtml#list8).


    ***[Listing 11-8](#9781430246923_Ch11.xhtml#_list8).***  An ejb-ref Descriptor
    Element that Fills in the Missing Properties of an @EJB Annotation


    ```

    <ejb-ref>

     <ejb-ref-name>ejb/MyAccountManager</ejb-ref-name>

     <ejb-link>SalesAccountManager</ejb-link>

    </ejb-ref>

    ```


    ![image](Images/sq.jpg) **Note**   While it is possible to use JNDI (Java Naming
    and Directory Interface) to look up EJBs deployed outside the context application,
    `<ejb-ref>`, `<ejb-local-ref>`, and the corresponding `@EJB` annotation may only
    be used to access EJBs deployed in the context application.


    This process continues until the Assembler has linked all the EJB, resource, resource
    environment, and any other references that were found dangling.


    Resolving Conflicting and Redundant References


    The modules presented to the Assembler for assembly into an application may have
    been built by different Providers, or at different times. In such cases, it is
    common to find references to the same logical resources, but using different names.
    It is the responsibility of the Assembler to scan both the source annotations
    and any XML deployment descriptors and rename any redundant references to a common
    name.


    Similarly, the same internal name may be used by application components to refer
    to logically distinct resources. Using the description properties of these references,
    found both on annotations and in deployment descriptors, along with any other
    documentation supplied by the Provider, the Assembler must detect such conflicts
    and rename these references appropriately.


    The Assembler may choose to populate each module descriptor fully by merging Java
    annotations found in the module source files into the descriptor, whenever it
    is not in conflict. If the Assembler chooses to perform this task, the descriptor’s
    `metadata-complete` property may be set to `true`. This signals to the Deployer
    that this descriptor and the Java annotations need not be further analyzed, leading
    to a speedier deployment.


    Packaging


    The Assembler performs the packaging stage to bundle application components into
    container-specific JAR files and component libraries. This packaging process was
    outlined in the preceding “Overview of the Packaging and Deployment Processes”
    section. You can use Ant or ZIP utilities to perform these steps of grouping the
    Java EE components into modules and packaging them into JAR files. However, this
    is an area that benefits from the use of a visual packaging tool, typically available
    through an IDE. The Assembler packages EJB and application client modules into
    JAR files, Web application modules into WAR files, and resource adapters into
    RAR files.


    When assembling a stand-alone Java EE module with no bundled libraries, no further
    packaging is needed. The module’s JAR file is ready to be deployed.


    If multiple modules are involved, or if libraries need to be bundled as well,
    the Assembler creates an EAR file and adds the modules and libraries to this archive.
    The Assembler may add the modules using an internal directory structure, provided
    that the `lib` directory, or the directory specified by `<library-directory>`
    in the `application.xml` file, is honored as the location for implicitly shared
    libraries.


    An optional `application.xml` file in the EAR file’s `META-INF` directory may
    be used to identify the modules explicitly, which are included in the application.
    This is the way of telling the deployment tool to ignore the modules that are
    not meant of be part of the application, but for some reason are included as part
    of the application.


    The Application Deployer'
