    与会话 Bean 的交互


    CDI 通过将会话 Bean 与明确的作用域关联，并创建一个松散耦合的类型安全生态系统（该生态系统通过编译时、部署时或运行时的注入来解决歧义），从而增强了会话
    Bean 提供的功能。作为回报，可以使用 `@Stateful`、`@Stateless` 或 `@Singleton` 注解来注解受管 Bean，从而为它们增强声明式企业特性，例如基于角色的安全性、事务管理、可伸缩性以及多用户环境中的并发性。


    会话 Bean 作用域


    会话 Bean 像任何其他 Bean 一样参与 CDI 容器提供的上下文生命周期。可以通过添加 CDI 特定的作用域注解（`@ApplicationScoped`、`@RequestScoped`、`@SessionScoped`
    或 `@ConversationScoped`）将会话 Bean 与 CDI 作用域关联起来。因此，当客户端需要时，容器会自动创建会话 Bean 实例，并且当不再处于作用域内时，容器会自动销毁该实例。


    默认情况下，所有通用会话 Bean 都具有 `@Dependent` 伪作用域，因此它们不能在客户端应用程序之间共享。从本质上讲，某些类型的会话 Bean
    与特定类型的作用域配合良好。例如，单例会话 Bean 在应用程序的整个生命周期中只能有一个实例。单例会话 Bean 的这一特性补充了应用程序作用域 Bean
    的特性。向无状态会话 Bean 添加 `@ApplicationScoped` 注解是没有意义的，因为无状态会话 Bean 实例仅在其调用期间与客户端关联，并且不与客户端维护会话状态。


    因此，用户在将会话 Bean 应用 CDI 作用域时必须遵循表 10-1 中提到的规则。如果会话 Bean 指定了非法作用域，容器会自动检测到该问题并将其视为定义错误。


    表 10-1. 会话 Bean 到 CDI 作用域的映射

