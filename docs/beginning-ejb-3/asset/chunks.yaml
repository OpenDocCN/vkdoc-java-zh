    基本的 `@Entity` 和 `@Id` 注解足以定义一个实体类，这使得实体编码的入门变得非常直接。随着你对可用注解的熟悉程度加深，以及需求变得更加复杂，你可以简单地向实体添加注解，以实现强大的持久化功能。


