    \ SearchFacadeLocal {\n    public SearchFacadeBean() {\n    }\n}\n```\n\n### 业务接口\n\
    \n无状态会话业务接口是一个标准的 Java 接口，没有其他特殊要求。该接口包含一系列可供客户端应用程序使用的业务方法定义。会话 Bean 可以有一个由 Bean\
    \ 类实现的业务接口，该接口可以在设计时由 JDeveloper、NetBeans 或 Eclipse 等工具生成，也可以在部署时由 EJB 容器生成。\n\
    \n业务接口也可以使用注解，如下所述：\n\n*   `@Remote`注解可用于表示远程业务接口。\n*   `@Local`注解可用于表示本地业务接口。\n\
    \n![image](Images/sq.jpg) **注意** 从 EJB 3.1 开始，会话 Bean 支持“无接口本地视图”。这是本地视图的一种变体，它公开\
