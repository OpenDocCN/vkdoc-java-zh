    图 4-10.   在 Java SE 环境中执行 SINGLE_TABLE 继承示例


    ![image](img/sq.jpg) **注意**   你可能会在日志窗口中看到一些 SQL 警告和错误，可以忽略它们。这些示例中的持久化单元使用了 `create-tables`
    的表生成策略，这意味着当客户端实例化持久化单元时，JPA 将始终尝试创建表。一旦为某个持久化单元创建了模式，你可能希望更新其 `persistence.xml`
    文件，将模式生成策略重置为 `none`。


    接下来，通过打开 `Chapter04-PersistenceIISamples-war` 项目并展开 `com.apress.ejb.chapter04.client`
    包来运行 HTTP Servlet 客户端。打开 NetBeans 用于运行 Servlet 的浏览器。（如果不确定，请通过“工具”![image](img/arrow.jpg)“选项”![image](img/arrow.jpg)“常规”打开
    NetBeans 首选项。）右键单击 `SingleTableInheritanceClient.java` Servlet，然后选择“`运行文件`”以 Web
    应用程序的形式运行测试。


    NetBeans 将在默认浏览器中执行该 Servlet。在测试执行期间，任何现有的冲突数据都会被删除，新的测试数据会被创建，然后以表格格式进行查询和呈现。引用的对象（包括引用对象的列表）会显示在嵌套的表格单元格中。以下是该客户端
    Servlet 的输出，显示了 Servlet 操作的日志。


    ![9781430246923_Fig04-11.jpg](img/9781430246923_Fig04-11.jpg)


    图 4-11.   在 Java EE Web 环境中执行 SINGLE_TABLE 继承示例


    查看 `SingleTableInheritanceClient.java` 中的代码。你可以自由尝试创建额外的实体，测试 Java 服务外观上的查询和其他服务方法，并观察结果行为。要将测试模式重置回原始状态，你可以随时删除
    WineApp 测试数据库，然后重新执行图 4-8 中描述的步骤。


    测试其他持久化示例


    其余六个项目分别测试了本章涵盖的不同特性，这些特性已在项目名称中标识。建议你将这些项目作为参考，了解如何配置各种继承层次结构、映射超类、嵌入类和复合主键。


    由于本章中的每个项目共享相同的结构，并且每个项目都附带一个专用的 HTTP Servlet 测试器，因此上述步骤可以指导你以相同的方式执行每个示例。


    结论


    本章我们涵盖了相当多的内容，掌握了这些信息后，你应该能够构建一些强大的实体，这些实体经过配置，能够最佳地适应你的应用领域。以下是本章涵盖的关键概念总结。


    映射实体继承层次结构


    JPA 为实体类继承层次结构提供了三种常见的 O/R 映射策略的内置支持：SINGLE_TABLE、JOINED 和 TABLE_PER_CLASS。我们研究了每种方法的优缺点，并提供了最适合每种策略的常见用例示例。


    在继承层次结构中使用抽象实体、映射超类和非实体类


    JPA 在类型层次结构中混合实体与抽象类和非实体类时提供了灵活的解决方案。实体可以是具体的，也可以是抽象的。只有实体类可以被查询或作为映射实体关系的目标，但实体仍然可以使用非实体类，既可以通过使用
    `@Embedded` 和 `@ElementCollection` 嵌入它们，也可以通过扩展它们或被它们扩展。我们展示了一些混合这些选项的示例来说明它们的用法。


    多态关系


    可以在实体之间指定关系，包括层次结构中的抽象超类型实体。这允许你与继承层次结构中任何位置的实体定义关系，该关系将隐式地涉及该实体的子类型。


    多态 JPQL 查询


    类似地，JPQL 查询可以选择或连接超类型类的实体，并且任何符合查询条件的子类型实例都将包含在查询结果中。我们研究了如何使用 JPQL 构建可重用的 `@NamedQuery`
    对象，以及 JPA 2.0 中引入的 QueryCriteria API。


    使用原生 SQL 查询


    `EntityManager` 允许你发出原生 SQL 查询，这既是对经验丰富的 SQL 开发者的友好表示，也是一种优化手段，以避免在只需要实体的少数几个字段时查询所有字段的开销。我们提供了一个示例，说明如何定义一个返回实体实例的命名原生
    SQL 查询，以便结果可以无缝集成到应用程序中。


    使用查询条件 API


    作为 JPQL 的类型安全替代方案，JPA 2.0 中引入的条件 API 允许你通过动态组装子句和谓词来构建查询，形成一个 CriteriaQuery 对象，该对象可以被调用来检索实体或其他结果。


    复合主键和嵌套外键


    我们探讨了不同类型的复合主键用法，展示了如何使用 `@EmbeddedId` 字段和多个 `@Id` 字段。当实体的主键映射到也涉及与其他实体关系的列时（例如，当主键包含一个或多个也是外键一部分的列时），情况可能会变得有点棘手。我们提供了一些如何处理这种情况的示例。


    支持乐观锁定


    使用 `@Version` 注解，你可以指定一个字段（该字段在继承层次结构中的所有实体中通用），由 `EntityManager` 在管理并发时（例如在合并操作期间）用于执行乐观锁定。此字段将由持久化框架自动填充，不应由应用程序代码更新。


    支持自动生成的主键值


    JPA 为使用唯一值填充 `@Id` 字段提供了声明式支持。我们提供了如何声明基于数据库序列和基于表的 ID 生成器的示例。


    拦截器：实体回调方法


    你可以在实体类或你选择的辅助类上指定方法，以处理实体生命周期回调。我们列出了可用的回调方法，并解释了如何使用它们来注册你自己的自定义方法，这些方法将在生命周期事件期间被调用。


    第 5 章


    ![image](img/frontdot.jpg)


    EJB 消息驱动 Bean


    本章讨论了面向消息架构的必要性。它介绍了 Java 消息服务（JMS），这是消息传递应用程序的典型架构，并详细阐述了 EJB 消息驱动 Bean（MDB）背后的概念。本章还涵盖了与
    MDB 相关的注解、依赖注入和拦截器。


    面向消息的架构


    当今的 IT 组织拥有数十个应用程序和服务，它们执行诸如库存、计费、费用报告和订单录入等定义明确的任务。随着互联网和电子商务的发展，企业开始思考不同的应用程序如何能够独立工作，但同时仍然是信息工作流的一部分。


    这种新的需求带来了集成现有应用程序以及构建与现有应用程序协同工作的新应用程序的概念。将现有应用程序与新应用程序集成是一项非常复杂的任务：首先是因为大多数企业使用大量应用程序，其次是因为它们复杂的业务工作流。'
- fmt: "Messaging is one of the most viable solutions for integrating existing and\
    \ new applications in an asynchronous communication and loosely coupled transaction\
    \ model. Asynchronous messaging allows applications to communicate by exchanging\
    \ messages independently without them having to be hardwired to each other. An\
    \ application or business process sending a message does not have to wait for\
    \ the receiver as long as both sender and receiver understand and agree upon a\
    \ message format and an intermediate destination.\n\n## What Is JMS?\n\n`JMS`\
    \ is a Java Message-Oriented Middleware (`MOM`) API that allows applications to\
    \ send and receive messages asynchronously. `JMS` is part of the standard Java\
    \ EE API as defined by JSR 914. `JMS` is analogous to `JDBC` (Java Database Connectivity),\
    \ which provides a standard API to connect to several types of databases (Oracle,\
    \ DB2, MySQL). Likewise, `JMS` provides a standard API to connect to several types\
    \ of messaging systems (IBM MQ, SonicMQ).\n\n`JMS` architecture consists of the\
    \ following:\n\n*   **JMS provider:** A messaging system (as shown in [Figure\
    \ 5-1](#9781430246923_Ch05.xhtml#Fig1)) that handles the routing and delivery\
    \ of messages. A `JMS` provider can be a messaging component of an application\
    \ server (such as Oracle WebLogic Server, IBM WebSphere, Oracle GlassFish Server).\
    \ `JMS` providers are also known as *JMS servers*.\n\n![9781430246923_Fig05-01.jpg](Images/9781430246923_Fig05-01.jpg)\n\
    \n[Figure 5-1.](#9781430246923_Ch05.xhtml#_Fig1)  A JMS messaging system\n\n*\
    \   **JMS client:** Any Java application or Java EE component that uses the `JMS`\
    \ API either to consume or produce a `JMS` message.\n*   **JMS consumer:** A `JMS`\
    \ client application that consumes `JMS` messages. The inventory, billing, and\
    \ shipping applications shown in [Figure 5-1](#9781430246923_Ch05.xhtml#Fig1)\
    \ are `JMS` message consumers.\n*   **JMS producer:** A `JMS` client that generates\
    \ the message. The order entry application shown in [Figure 5-1](#9781430246923_Ch05.xhtml#Fig1)\
    \ is a `JMS` message producer.\n*   **JMS message:** A message consisting of a\
    \ header, properties, and a body. The header identifies the message, the properties\
    \ provide additional attributes that are specific to the application and provider,\
    \ and the body contains the content of the message. The `JMS` specification provides\
    \ support to send and receive different types of messages. [Table 5-1](#9781430246923_Ch05.xhtml#Tab1)\
    \ shows the message types and descriptions.\n\n[Table 5-1](#9781430246923_Ch05.xhtml#_Tab1).\
    \ JMS Message Types\n\n| Message Type | Description |\n    | --- | --- |\n   \
    \ | `ByteMessage` | Consists of a series of bytes |\n    | `MapMessage` | Consists\
    \ of a set of name/value pairs |\n    | `ObjectMessage` | Consists of a serialized\
    \ Java object |\n    | `StreamMessage` | Consists of a sequence of primitive data\
    \ types |\n    | `TextMessage` | Consists of strings |\n\n## Messaging Application\
    \ Architecture\n\nGenerally, two different classes of messaging applications exist:\n\
    \n*   The point-to-point (P2P) model\n*   The publish-subscribe (pub-sub) model\n\
    \nThe P2P model is based on message queues, where a queue holds the `JMS` messages\
    \ sent by the `JMS` client application. Message producers and consumers decide\
    \ upon a common queue to exchange messages.\n\nThe P2P model is used if there\
    \ is one and only one message consumer for each message. For example, the order\
    \ entry system shown in [Figure 5-2](#9781430246923_Ch05.xhtml#Fig2) sends a new\
    \ order into the message queue, which is picked up by the inventory system. Similarly,\
    \ the message sent by the inventory system is consumed by the shipping system,\
    \ and the message from the shipping system is consumed by the billing system.\n\
    \n![9781430246923_Fig05-02.jpg](Images/9781430246923_Fig05-02.jpg)\n\n[Figure\
    \ 5-2.](#9781430246923_Ch05.xhtml#_Fig2)  A JMS messaging system using queues\n\
    \nThe pub-sub model is based on topics, where the topic is the destination address\
    \ of the message. Multiple recipients or `JMS` consumers can retrieve each message.\
    \ In this model, publishers are not always aware of possible subscribers. The\
    \ pub-sub model is used for broadcast-type applications, as shown in [Figure 5-3](#9781430246923_Ch05.xhtml#Fig3),\
    \ in which a message is delivered for more than one `JMS` client. Topics, each\
    \ having a unique name, are defined in the messaging server. Each message, with\
    \ its associated subject, gets published and delivered to all subscribers.\n\n\
    ![9781430246923_Fig05-03.jpg](Images/9781430246923_Fig05-03.jpg)\n\n[Figure 5-3.](#9781430246923_Ch05.xhtml#_Fig3)  A\
    \ JMS messaging system using topics\n\n## Using MDBs\n\nAn *MDB* is an asynchronous\
    \ message consumer that processes messages delivered via `JMS`. While `MDBs` do\
    \ the job of processing the messages, the EJB container in which the `MDBs` run\
    \ take care of the services (transactions, security, resources, concurrency, message\
    \ acknowledgment), letting the bean developer focus on the business logic of processing\
    \ messages. Traditional `JMS` applications would have to custom write some of\
    \ these services. `MDBs` are stateless in nature, which means that EJB containers\
    \ can have numerous instances of `MDBs` execute concurrently to process hundreds\
    \ of `JMS` messages coming in from various applications or `JMS` producers and\
    \ also provide quality of service (QoS), such as high availability and reliability\
    \ for enterprise applications.\n\nEJB client applications cannot access `MDBs`\
    \ directly as they can with session beans and entities. The only way to communicate\
    \ with an `MDB` would be by sending a `JMS` message to the destination to which\
    \ the `MDB` is listening. Any Java application or Java EE component using the\
    \ `JMS` API can be the message provider for the `MDB` by sending messages to queues\
    \ or topics.\n\n## When Do You Use MDBs?\n\nEarlier in the chapter, we discussed\
    \ the need for asynchrony in enterprises. Asynchronous messaging provides loose\
    \ coupling between applications, systems, and services, thus providing greater\
    \ flexibility and change management for applications and systems. `MDBs` provide\
    \ a standard messaging component model that achieves the goal of asynchronous\
    \ and message-oriented architecture in enterprises.\n\n[Figure 5-4](#9781430246923_Ch05.xhtml#Fig4)\
    \ shows a message-oriented application that has order entry, inventory, billing,\
    \ and shipping systems that communicate asynchronously to handle a workflow that\
    \ starts with a new purchase order and ends when the order gets shipped to the\
    \ customer. An order entry system captures a new order from a customer, processes\
    \ the order, and sends it into a designated message queue (in [Figure 5-4](#9781430246923_Ch05.xhtml#Fig4),\
    \ this is the New Order queue). The inventory system picks up the message from\
    \ the queue and checks whether or not the inventory is available. If not, it sends\
    \ a message to the Suppliers queue; if the order can be shipped, then it puts\
    \ a message into the Order Ready queue. This new message is picked up by the billing\
    \ system, which processes the billing for the customer and puts a message back\
    \ into the Shipping queue. Finally, the shipping application picks up the message,\
    \ gets the order shipped to the customer, and sends an e-mail to the customer\
    \ with tracking information.\n\n![9781430246923_Fig05-04.jpg](Images/9781430246923_Fig05-04.jpg)\n\
    \n[Figure 5-4.](#9781430246923_Ch05.xhtml#_Fig4)  An order-to-shipping JMS messaging\
    \ system\n\n## MDB Classes\n\nUnlike a session bean, an `MDB` doesn’t have any\
    \ business interfaces. It has only the following:\n\n*   A message-driven class\n\
    *   An optional callback listener class\n*   An optional interceptor class"
