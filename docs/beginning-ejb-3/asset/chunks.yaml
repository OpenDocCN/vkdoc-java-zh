- fmt: "为了将`Person`类改为使用嵌入式ID，我们将`@Id Integer id`字段替换为`@EmbeddedId myIdClass myId`字段。为了将该实体重新适配到我们的`JOINED`实体层次结构示例中，`Person`的`Employee`子实体上的`manager`关系字段以及所有子实体上的PK字段都需要修改，以映射到新主键中的所有列。\n\
    \n### 在实体类上直接公开复合键类字段（`@IdClass`）\n\n映射复合主键的另一种方法是在实体类上为主键类中的每个字段显式声明字段，但将每个字段都标注为`@Id`，如[清单4-28](#9781430246923_Ch04.xhtml#list28)所示。如果主键上的任何字段同时也是实体的有用属性，您可能希望采用这种方法。然后，您需要定义一个新的复合键类，声明这些`@Id`字段中的每一个，并确保它们在名称和类型上与键类字段完全匹配。\n\
    \n从上一个使用`@EmbeddedId`的示例中的类开始，我们可以修改`MyIdClass`以移除`@Embedded`注解，如[清单4-28](#9781430246923_Ch04.xhtml#list28)所示。\n\
    \n[***清单4-28.***](#9781430246923_Ch04.xhtml#_list28) `MyIdClass.java`，一个适合用作`@IdClass`的可序列化Java类\n\
    \n```java\npublic class MyIdClass implements Serializable {\n  @Column(name =\
    \ \"FIRST_NAME\", length = 400)\n  private String firstName;\n  @Column(name =\
    \ \"LAST_NAME\", length = 400)\n  private String lastName;\n\npublic MyIdClass()\
    \ {\n  }\n\npublic MyIdClass(String firstName, String lastName) {\n    this.firstName\
    \ = firstName;\n    this.lastName = lastName;\n  }\n\n@Override\n  public boolean\
    \ equals(Object obj) {\n    return obj instanceof MyIdClass && firstName.equals(((MyIdClass)\
    \ obj).getFirstName()) && lastName.equals(((MyIdClass) obj).getLastName());\n\
    \  }\n\n@Override\n  public int hashCode() {\n    return System.identityHashCode(this);\n\
    \  }\n  /* get/set methods */\n}\n```\n\n这个复合键类不需要特殊的注解。它主要用于通过主键查找`Person`实例，使用`EntityManager.find()`方法。\n\
    \n在`Person`上，`firstName`和`lastName`字段现在都被标记为`@Id`。我们添加了一个`@IdClass`注解，将`MyIdClass`标识为复合主键类，如[清单4-29](#9781430246923_Ch04.xhtml#list29)所示。\n\
    \n[***清单4-29.***](#9781430246923_Ch04.xhtml#_list29) `Person.java`，一个使用`@IdClass`作为复合主键的实体\n\
    \n```java\n@Entity\n@NamedQueries({\n  @NamedQuery(name = \"Person.findAll\",\
    \ query = \"select o from Person o\")})\n@Table(name = \"CH04_IDCLASS_PERSON\"\
    )\n@IdClass(MyIdClass.class)\npublic class Person implements Serializable {\n\
    \  @SuppressWarnings(\"compatibility:-7074714881275658754\")\n  private static\
    \ final long serialVersionUID = 5291172566067954515L;\n  @Id\n  @Column(name =\
    \ \"FIRST_NAME\", length = 400)\n  private String firstName;\n  @Id\n  @Column(name\
    \ = \"LAST_NAME\", length = 400)\n  private String lastName;\n  @Embedded\n  private\
