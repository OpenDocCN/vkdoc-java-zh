    database or in the EJB container) are guaranteed to be satisfied when a transaction
    is committed through the EJB services. Violations will result in exceptions being
    thrown from the EJB container, and the transaction will automatically be rolled
    back. A successful commit indicates that all defined constraint conditions have
    been met.


    Isolation


    This requirement is largely the responsibility of the underlying JTA resources.
    Each resource may expose its own configurable isolation level settings to provide
    varying degrees of consistency to the resources involved in a transaction. Isolation
    levels determine the extent to which resources within the transaction are able
    to see the partial (in-transaction) state of other resources involved in the transaction,
    and largely translate into cache consistency settings within the resource. Isolation
    also determines that the transaction should not see uncommitted data of another
    transaction. To remain database neutral, our example did not attempt to configure
    these settings.


    Durability


    This is also largely the responsibility of the underlying JTA resources involved
    in the transaction (e.g., the database or mail server). At the conclusion of a
    JTA transaction, any such resources are expected to be able to show the new state
    of the data when queried. We demonstrated this by querying the details of the
    new `CustomerOrder` from the client after the `createCustomerOrder()` method,
    and its transaction encapsulated within, had completed.


    Benefits of This Approach


    A principal benefit of using a default stateless session bean with CMT demarcation
    is that the client does not need to be concerned about beginning, ending, or otherwise
    coordinating the transaction logic. Also, any transaction context currently in
    effect on the thread in which the bean method is called is automatically propagated
    to that method call (if the transaction attribute is `REQUIRED` or `SUPPORTS`).
    Each call it makes to the `OrderProcessorCMT` bean either completes successfully
    (in which case it can be assumed that the work has been applied persistently)
    or results in an exception (whereupon the work performed in that method is completely
    rolled back). It’s a very simple model.


    Limitations of This Approach


    In general, simple is good, but sometimes it is too limiting. While this example
    allows the client to create and manipulate new entity instances in the client
    tier, as when it created the `Customer, Wine` and `CartItem` instances, the client
    must rely on the EJBs to ensure that the updates it makes to the entity model
    are persisted to the database within a transaction, since transactions are always
    begun and terminated by the EJB container before control is handed back to the
    client.


    In the next example, we will show how using stateful session beans, coupled with
    BMT and an extended persistence context, empowers the client with greater flexibility
    (and with it, responsibility) over the transactional behavior of the application.


    ![image](Images/sq.jpg) **Note**   There has been a popular conception among EJB
    users that stateful session beans should be avoided for performance reasons. The
    performance tests that we have done strongly suggest that stateful session beans
    have been falsely maligned, and that when correctly used, they can actually boost
    performance. Furthermore, in EJB, their value is increased, since they provide
    you this `PersistenceContext.EXTENDED` option, allowing entity instances to be
    cached for use across transactions.


    Stateful Session Beans with BMT Demarcation and Extended Persistence Context


    To illustrate extending the reach of EJB’s transaction support, here is the same
    application written using a stateful BMT session bean, `OrderProcessorBMTBean.java`.
    This BMT example also leverages EJB’s built-in transaction support, but instead
    of relying on the container to manage transaction demarcation at method boundaries,
    shows how to demarcate transactions explicitly, inside the enterprise bean code
    and controlled from the client as well.


    There is no requirement that you use BMT demarcation when using stateful session
    beans, and in fact this option is not typically used. We show it here in [Listing
    8-5](#9781430246923_Ch08.xhtml#list5) to illustrate how you would use it, should
    you be so inclined.


