    ## Conclusion


    在本章中，我们向您介绍了面向消息的中间件的概念，以及为什么企业正在寻求能够以异步方式进行通信的松散耦合应用程序。


    我们介绍了使用P2P和发布-订阅模型的消息应用程序架构，并讨论了为什么消息传递是实现异步应用程序的最佳方式之一。我们详细研究了JMS，包括不同的JMS组件，如提供者、消费者、客户端和不同类型的消息。我们研究了MDB以及构成它们的各种工件。我们介绍了MDB的不同配置属性，以及如何使用注解设置它们。我们通过注入JavaMail资源的具体示例解释了MDB中的依赖注入。我们讨论了编译、打包、部署和测试MDB所需的内容，以及如何在GlassFish应用服务器中创建不同类型的资源。最后，我们介绍了使用GlassFish中的应用客户端容器运行示例客户端程序，查看输出以及接收MDB发送的电子邮件消息。


    在下一章中，我们将深入探讨Web服务，包括如何将会话Bean发布为Web服务，以及如何从EJB应用程序调用Web服务。


