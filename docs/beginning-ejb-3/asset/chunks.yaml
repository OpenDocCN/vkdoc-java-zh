    ## Compiling, Deploying, and Testing the JSF Application


    JSF applications need to be packaged into Web Archive (WAR) files before they’re
    assembled into Enterprise Archive (EAR) files that hold all of the required modules
    and libraries for the application. Most application servers provide deployment
    utilities or Ant tasks to facilitate deployment of EJBs to their containers. Java
    integrated development environments (IDEs) like JDeveloper, NetBeans, and Eclipse
    also provide deployment features that allow developers to package, assemble, and
    deploy applications to application servers.


    Packaging, assembly, and deployment aspects are covered in detail in [Chapter
    11](../Text/9781430246923_Ch11.xhtml). In this chapter, we have developed a JSF
    application that accesses the back-end application built in [Chapter 7](../Text/9781430246923_Ch07.xhtml).
    We will perform the following steps to deploy and test the JSF application.


    ### Prerequisites


    Before performing the steps detailed in the next sections, complete the “Getting
    Started” section of [Chapter 1](../Text/9781430246923_Ch01.xhtml), which will
    walk you through the installation and environment setup required for the samples
    in this chapter. Since we have built our JSF application on top of the work we
    have done in [Chapter 7](../Text/9781430246923_Ch07.xhtml), you will need to make
    sure that you have completed the following steps:


    *   You must have created the resources detailed in the “Creating Data Sources,
    JMS Resources, and Mail Resources” section of [Chapter 7](../Text/9781430246923_Ch07.xhtml).

    *   You must have successfully deployed the application as detailed in the “Deploying
    the Application” section of [Chapter 7](../Text/9781430246923_Ch07.xhtml).


