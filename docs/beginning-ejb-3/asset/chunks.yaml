    `RESOURCE_LOCAL` 持久化单元的名称，从原始调用中我们可以看到该名称为 `"Chapter07-WineAppUnit-ResourceLocal"`。这个辅助类正在调用外观上的
    `persistEntity()` 和 `removeCustomerOrder()` 等操作，而没有显式地要求提交操作，这表明该外观使用了隐式提交行为。


    我们还注意确保在使用外观后，通过其自身的 `close()` 方法通知它。这允许它释放自己的资源；特别是它的 `EntityManagerFactory`
    和 `EntityManager` 资源。这些是您在使用 EJB 时无需担心的内务管理项，因为 EJB 容器会为您处理这一级别的资源管理。


    使用应用程序管理的 EntityManager 的 Java 外观


