    Interceptors


    The EJB specification provides annotations called *interceptors,* which allow
    you to interpose on a business method invocation to add your own wrapper code
    before and/or after the method is called. An interceptor method can be defined
    for session and message-driven beans (MDBs). We will show you the usage of interceptors
    in the session bean context.


    There are number of use cases for interceptors in a typical application in which
    you would find a need to perform a certain task before or after the business method
    is invoked. For example, you may wish to do one of the following:


    *   Perform additional security checks before a critical business method that
    transfers more than $100,000 dollars

    *   Do some performance analysis to compute the time it takes to perform the task

    *   Do additional logging before or after the method invocation


    There are two ways to define an interceptor. You can either add an `@AroundInvoke`
    annotation on a particular method, or you can annotate the bean class to designate
    an interceptor class that will interpose on all (or an explicit subset of) methods
    on the bean class. An interceptor class is denoted by the `@Interceptor` annotation
    on the bean class with which it is associated. In the case of multiple interceptor
    classes, the `@Interceptors` annotation is used. Method specific interceptor is
    denoted by applying the `@Interceptors` annotation to the business method. Methods
    that are annotated with `@AroundInvoke` should have the following signature:


    ```

    Object <METHOD>(InvocationContext) throws Exception

    ```


    `AroundInvoke` methods can have public, private, protected, or package level access.
    An `AroundInvoke` method must not be declared as `final` or `static`. The definition
    of `InvocationContext` is as follows:


    ```

    package javax.ejb;

    public interface InvocationContext {

       public Object getBean();

       public java.lang.reflect.Method getMethod();

       public Object[] getParameters();

       public void setParameters(Object[] params);

       public EJBContext getEJBContext();

       public java.util.Map getContextData();

       public Object proceed() throws Exception;

    }

    ```


    The following list describes the methods in the preceding code:


    *   `getBean()` returns the instance of the bean on which the method was called.

    *   `getMethod()` returns the method on the bean instance that was called.

    *   `getParameters()` returns the parameters for the method call.

    *   `setParameters()` modifies the parameters used for the method call.

    *   `getEJBContext()` gives the interceptor methods access to the bean’s `EJBContext`.

    *   `getContextData()` allows values to be passed between interceptor methods
    in the same `InvocationContext` instance using the `Map` returned.

    *   `proceed()` invokes the next interceptor, if there is one, or invokes the
    target bean method.


    In the `SearchFacade` session bean, we can add an interceptor that logs the time
    taken to execute each business method when invoked by the client applications.
    [Listing 2-8](#9781430246923_Ch02.xhtml#list8) shows a time log method that will
    print out the time taken to execute a business method. `InvocationContext` is
    used to get the name of bean class and the invoked method name. Before invoking
    the business method, current system time is captured and deducted from the system
    time after the business method is executed. Finally, the details are printed out
    to the console log using `System.out.println`.


    [***Listing 2-8.***](#9781430246923_Ch02.xhtml#_list8)  The Interceptor Method


    ```

    @AroundInvoke

    public Object TimerLog (InvocationContext ctx) throws Exception {

        String beanClassName = ctx.getClass().getName();

        String businessMethodName = ctx.getMethod().getName();

        String target = beanClassName + "." + businessMethodName ;

        long startTime = System.currentTimeMillis();

        System.out.println ("Invoking " + target);

        try {

            return ctx.proceed();

        }

        finally {

            System.out.println ("Exiting" + target);

            long totalTime = System.currentTimeMillis() - startTime;

            System.out.println ("Business method" + businessMethodName +

            "in" + beanClassName + "takes" + totalTime + "ms to execute");

        }

    }

    ```


    Stateful Session Beans


    Similar to stateless session beans, stateful beans comprise a bean class and,
    optionally, one or more business interfaces.


    The Bean Class


    A stateful session bean class is any standard Java class that has a class-level
    annotation of `@Stateful`. If deployment descriptors are used instead of annotations,
    the bean class should be denoted as a stateful session bean. In the case of mixed
    mode, in which you are using annotations *and* deployment descriptors, the `@Stateful`
    annotation must be specified if any other class-level or member-level annotations
    are specified in the class.


    To illustrate a stateful session bean, we will create a `ShoppingCart` session
    bean that will keep track of the items added to a user’s shopping cart and their
    respective quantities. In this chapter, we will use hard-coded values for the
    shopping cart to illustrate the state and conversation maintenance between the
    client and stateful session bean. [Listing 2-9](#9781430246923_Ch02.xhtml#list9)
    shows the definition of a `ShoppingCart` session bean.


    [***Listing 2-9.***](#9781430246923_Ch02.xhtml#_list9)  ShoppingCartBean.java


    ```

    package com.apress.ejb.chapter02;

    import javax.ejb.Stateful;

    @Stateful(name="ShoppingCart")

    public class ShoppingCartBean implements ShoppingCart, ShoppingCartLocal {

        public ShoppingCartBean() {

        }

    }

    ```


    There will be certain use cases in which the application wants to be notified
    by the EJB container before or after transactions take place and then use these
    notifications to manage data and cache. A stateful session bean can receive this
    kind of notification by the EJB container when it implements the `javax.ejb.SessionSynchronization`
    interface. This is an optional feature. There are three different types of transaction
    notifications that the stateful session bean receives from the EJB container:


    *   `afterBegin`: Indicates that a new transaction has begun

    *   `beforeCompletion`: Indicates that the transaction is going to be committed

    *   `afterCompletion`: Indicates that a transaction has been completed


    For example, the `ShoppingCart` session bean could implement the `javax.ejb.SessionSynchronization`
    interface to get an `afterCompletion` notification so that it can clear out the
    shopping cart cache.


