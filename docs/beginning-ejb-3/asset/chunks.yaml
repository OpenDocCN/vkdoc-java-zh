    Interaction with Session Beans


    CDI enhances the functionality provided by the session beans by associating them
    with a definite scope and creating a loosely coupled typesafe ecosystem that resolves
    ambiguity through injection at compile time, deploy time, or run time. In return,
    managed beans can be annotated with a `@Stateful`, `@Stateless`, or `@Singleton`
    annotation enhancing them with declarative enterprise features like role-based
    security, transaction management, scalability, and concurrency in a multiuser
    environment.


    Session Bean Scope


    Session beans participate in the contextual lifecycle provided by the CDI container
    like any other bean. A session bean can be associated with CDI scopes by adding
    CDI-specific scope annotations (`@ApplicationScoped`, `@RequestScoped, @SessionScoped`,
    or `@ConversationScoped`). As a result, the container automatically creates a
    session bean instance when it is needed by the client and, when no longer in scope,
    the container automatically destroys the instance.


    By default, all generic session beans have `@Dependent` pseudo-scope, and hence
    they cannot be shared between the client applications. Inherently, some types
    of session beans play well with specific types of scopes. For example, a singleton
    session bean can have only one instance that exists during the entire life of
    an application. This property of the singleton session bean compliments the property
    of an application-scoped bean. Adding an `@ApplicationScoped` annotation to a
    stateless session bean does not make sense as a stateless session bean instance
    is associated with a client only for the duration of its invocation and does not
    maintain a conversational state with the client.


    As a result, users must follow the rules mentioned in [Table 10-1](#9781430246923_Ch10.xhtml#Tab1)
    while applying the CDI scopes to a session bean. If a session bean specifies an
    illegal scope, the container automatically detects the problem and treats it as
    a definition error.


