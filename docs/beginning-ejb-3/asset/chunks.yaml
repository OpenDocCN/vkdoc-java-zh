    \ the persistence tier—to interact with each other in a loosely coupled but typesafe\
    \ manner. The Web tier did not have a proper mechanism to support transactions\
    \ because it focused on presenting the content and had limited access to transactional\
    \ resources. CDI services help in unifying Enterprise JavaBeans (EJB) and JavaServer\
    \ Faces (JSF) programming models. CDI services allow Enterprise JavaBeans to be\
    \ used as the Managed Beans in JavaServer Faces framework. CDI also provides a\
    \ good support for accessing transactional resources, which facilitates in easy\
    \ creation of Web applications using Java Persistence API. CDI bridges this gap.\
    \ Using CDI, the Web tier can directly interact with the beans in the business\
    \ and persistence tiers. This is the reason why CDI was initially named Web Beans.\n\
    \n[Figure 10-1](#9781430246923_Ch10.xhtml#Fig1) shows the architecture of a Java\
    \ EE application before the arrival of CDI on the Java EE scene, and [Figure 10-2](#9781430246923_Ch10.xhtml#Fig2)\
    \ shows how the Web tier and the business tier interact after the arrival of CDI.\n\
    \n![9781430246923_Fig10-01.jpg](Images/9781430246923_Fig10-01.jpg)\n\n[Figure\
    \ 10-1.](#9781430246923_Ch10.xhtml#_Fig1) Java EE Application Architecture before\
    \ CDI\n\n![9781430246923_Fig10-02.jpg](Images/9781430246923_Fig10-02.jpg)\n\n\
    [Figure 10-2.](#9781430246923_Ch10.xhtml#_Fig2) CDI Application Architecture\n\
    \nThe two important features provided by CDI are a part of its name:\n\n- **Contexts**:\
    \ Deals with binding the stateful components (like stateful session beans) to\
    \ a well-defined scope. Stateful components are those that retain information\
