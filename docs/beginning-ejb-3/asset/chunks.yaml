    \ Bean 将访问后端数据库以检索请求的信息。为了简化本章中的代码示例，我们实际上将在 Bean 类中检索硬编码值列表。在后面的章节中，我们将增强`SearchFacade`\
    \ Bean 以访问后端数据库。\n3.  Bean 将满足搜索条件的信息返回给客户端应用程序。\n\n[列表 2-1](#9781430246923_Ch02.xhtml#list1)\
    \ 展示了`SearchFacade` Bean 的定义。在本章的后续部分中，我们将构建代码来展示上述工作流程的实际运行。`SearchFacadeBean`是一个标准的\
