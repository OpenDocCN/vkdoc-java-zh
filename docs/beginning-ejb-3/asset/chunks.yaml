  raw: 'The client shown in [Listing 10-3](#9781430246923_Ch10.xhtml#list3) injects
    the field `newWine` using the `@Inject` annotation. Fields injected using the
    `@Inject` annotation are instantiated by the container, which means that users
    do not need to create an instance of the object using *new, nor do they need a
    compile-time dependency on the actual implementation class*. An important thing
    to observe here is that the `newWine` field is of type `Wine`. In this particular
    case, the container automatically uses the `RedWine` implementation for instantiation.
    If we had to instantiate `RedWine` in the classical way, then we would have to
    use the `RedWine` implementation instead of the `Wine` interface. As a result,
    there would have been a tight coupling between the client and the `Wine` object
    that could not be changed either at deploy time or at run time. We will learn
    more about how the CDI container *knows* which implementation to inject when we
    discuss dependency injection later in this chapter.


    ***[Listing 10-3](#9781430246923_Ch10.xhtml#_list3).***  WineClient.java demonstrates
    the Dependency Injection Aspect


    ```

    package com.apress.ejb.chapter10;


    import javax.inject.Inject;


    public class WineClient {

       // Instantiating the classical way

       private Wine oldWine = new RedWine();


    // Instantiating via field dependency injection

       @Inject

       private Wine newWine;

    }

    ```


    For reference, the CDI specification also defines the following services. A more
    detailed explanation of these advanced CDI topics is outside the scope of this
    chapter, but you are encouraged to refer to the CDI spec for additional information.


    *   Integrating the Web tier with contextual objects via Unified Expression Language
    (EL)

    *   Decorators that implement beans and can intercept the invocation of those
    beans by business methods

    *   Interceptors for separating business logic from cross-cutting concerns

    *   Event notification model that defines the interaction between beans in a loosely
    coupled manner

    *   Ability to interact cleanly with the container via Portable Extensions


    Relationship with EJB


    CDI bridges the gap between the Web tier consisting of Servlets, JSP, and JSF
    and the enterprise tier consisting of EJB and JPA. Servlets, JSP, and JSF are
    responsible for content presentation but do not have transaction management and
    persistence functionality. EJB and JPA, on the other hand, support database-related
    operations like commit, rollback, and other transaction management functionality.
    Using CDI, Web applications can perform database-related operations supported
    by JPA using session beans as a *facade*.


    Session Beans participate in the CDI lifecycle like *managed beans*. Session Beans
    can be injected into other session beans and managed beans. Managed Beans can
    be injected into session beans. Users should be careful while deciding whether
    to use session beans or managed beans. Session Beans should be used when the application
    requires the following advanced enterprise services:


    *   Role-based security

    *   Transaction management

    *   Scalability through instance pooling

    *   Concurrency

    *   Events and timers


    Managed beans will suffice for applications that require dependency injection,
    lifecycle management, and interceptors. Managed Beans can be easily upgraded to
    session beans by adding `@Stateless`, `@Stateful`, or `@Singleton` annotation.


    ![image](Images/sq.jpg) **Note**   Message-Driven Beans and Entities are noncontextual
    objects and may not be injected into other objects. Message-Driven Beans take
    advantage of a few CDI features, like interceptors and decorators, as the container
    performs injection on all managed bean instances including the noncontextual ones.


    CDI Concepts


    Now that we have a basic understanding of CDI, its place in the Java EE stack,
    and its relationship with EJB, let us take a detailed look at Contexts and Dependency
    Injection.


    Beans and beans.xml


    Beans are container-managed components that contain business logic: for example,
    managed beans and session beans. It is important for readers to note that CDI
    does *not* introduce a new bean type called a “CDI Bean” with its own unique component
    model. CDI provides a set of services that can be consumed by managed beans and
    EJBs that are defined by their existing component models. The process that the
    CDI container undergoes of identifying beans found in the various deployment modules
    is called *bean discovery*. The beans discovered by the container via bean discovery
    participate in the CDI lifecycle. The lifecycle of these beans is managed by the
    container as per the CDI specification.


    ![image](Images/sq.jpg) **Note**   Throughout this chapter, the word “bean” implies
    Java beans participating in the CDI lifecycle unless specified otherwise.


    The beans within a module participate in the CDI lifecycle if the container detects
    a `beans.xml` file in the `WEB-INF` directory of a WAR file or the `META-INF`
    directory of a JAR file. Presence of `beans.xml` within a module aids the container
    to isolate quickly the CDI-related modules, making bean discovery quicker. CDI
    does *not* require the `beans.xml` to declare the beans available in the module;
    `beans.xml` can be empty. CDI artifacts like alternatives, interceptors, and stereotypes
    are declared in the `beans.xml` if required.


    The CDI container provides the following services to its beans:


    *   Transparent creation, destruction, and scoping

    *   Typesafe scoped resolution via qualifiers when injected into Java clients

    *   Typesafe scoped resolution via name when used in Unified EL Expressions for
    JSF clients

    *   Lifecycle callbacks

    *   Automatic injection of other bean instances

    *   Interception and decoration

    *   Event notification


    Beans are injected into other beans and clients by declaring a class-level field
    and annotating it with the `javax.inject.Inject` annotation. Beans can also be
    used with Web tier technologies like JSP and JSF via Unified EL Expressions, by
    annotating them with the `javax.inject.Named` annotation.


    Scope


    The scope of an object determines the life span of individual instances of that
    object. An application containing stateful object instances needs these instances
    to hold their state for a defined period. The scope dictates when a bean instance
    should be created and when the container should destroy it.


    CDI has the following five types of scope:


    Application Scope


    The state of an application-scoped bean is shared across all of the users of the
    application. An application-scoped object is created only once during the lifetime
    of the application—the first time it is injected—and is destroyed only when the
    application is shut down. An application scope is declared using the `@javax.enterprise.context.ApplicationScoped`
    annotation.


    Request Scope


    The state of a request-scoped bean is shared by all of the beans involved in a
    single request. A request-scoped bean is created once per request and destroyed
    upon completion of that request. A request scope is declared using the `@javax.enterprise.context.RequestScoped`
    annotation.


    Session Scope


    The state of a session-scoped bean is shared across multiple requests within the
    same HTTP session. A session-scoped bean is created when the HTTP session begins
    and is destroyed when the HTTP session closes or times out. A session scope is
    declared using the `@javax.enterprise.context.SessionScoped` annotation.


