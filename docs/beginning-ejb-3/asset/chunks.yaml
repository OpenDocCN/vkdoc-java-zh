- fmt: "In the use case discussed earlier and shown in [Figure 5-5](#9781430246923_Ch05.xhtml#Fig5),\
    \ we have a session bean that is acting as an intermediary between the client\
    \ application and the message topic. The client application invokes a business\
    \ method in the session bean, and the session becomes the client or JMS message\
    \ producer that is creating and sending the message. To illustrate this, we will\
    \ create a stateless session bean, `OrderProcessing`, with one business method,\
    \ `SendOrderStatus()`. [Listing 5-8](#9781430246923_Ch05.xhtml#list8) shows the\
    \ code for the `OrderProcessing` session bean. We are using the `@Resource` annotation\
    \ to inject the `TopicConnectionFactory` and `Topic` to which the `StatusMailer`\
    \ MDB is listening. We will use some hard-coded values in the session bean to\
    \ simulate the customer e-mail address and the content for the e-mail. In the\
    \ `try` block, we create a connection to the `statusMessageTopicConnectionFactory`\
    \ and start the connection. Using the created session, we create a topic session\
    \ and topic producer with the `createSession()` and `createProducer()` methods.\
    \ Finally, we create a `MapMessage` object, populate the message with the e-mail\
    \ address, subject, and content, and send the message to the `Topic` using the\
    \ `send()` method.\n\n***[Listing 5-8](#9781430246923_Ch05.xhtml#_list8).*** \
    \ `OrderProcessingBean.java`\n\n```\npackage com.apress.ejb.chapter05;\nimport\
    \ javax.annotation.Resource;\nimport javax.ejb.Stateless;\nimport javax.jms.Connection;\n\
    import javax.jms.JMSException;\nimport javax.jms.MapMessage;\nimport javax.jms.MessageProducer;\n\
    import javax.jms.Session;\nimport javax.jms.Topic;\nimport javax.jms.TopicConnectionFactory;\n\
    \n@Stateless(name = \"OrderProcessing\")\npublic class OrderProcessingBean\n{\n\
    \    public OrderProcessingBean() {\n    }\n\n@Resource(mappedName = \"StatusMessageTopicConnectionFactory\"\
    )\n    private TopicConnectionFactory statusMessageTopicCF;\n\n@Resource(mappedName\
    \ = \"StatusMessageTopic\")\n    private Topic statusTopic;\n\npublic String SendOrderStatus()\
    \ {\n        String from = \"chirag.rathod@oracle.com\";\n        String to =\
    \ \"chirag.rathod@oracle.com\";\n        String content =\n        \"Your order\
    \ has been processed \" + \"If you have questions\" +\n        \" call EJB Application\
    \ with order id # \" + \"1234567890\";\n\ntry {\n        System.out.println(\"\
    Before status TopicCF connection\");\n        Connection connection = statusMessageTopicCF.createConnection();\n\
    \        System.out.println(\"Created connection\");\n        connection.start();\n\
    \        System.out.println(\"statted connection\");\n        System.out.println(\"\
    Starting Topic Session\");\n        Session topicSession =\n            connection.createSession(false,\
    \ Session.AUTO_ACKNOWLEDGE);\n        MessageProducer publisher = topicSession.createProducer(statusTopic);\n\
    \        System.out.println(\"created producer\");\n        MapMessage message\
    \ = topicSession.createMapMessage();\n        message.setStringProperty(\"from\"\
    , from);\n        message.setStringProperty(\"to\", to);\n        message.setStringProperty(\"\
    subject\", \"Status of your wine order\");\n        message.setStringProperty(\"\
    content\", content);\n        System.out.println(\"before send\");\n        publisher.send(message);\n\
    \        System.out.println(\"after send\");\n        }\n        catch (JMSException\
    \ e) {\n            e.printStackTrace();\n        }\n\nreturn \"Created a MapMessage\
    \ and sent it to StatusTopic\";\n    }\n}\n```\n\n![image](Images/sq.jpg) **Note**\
    \   In [Listing 5-8](#9781430246923_Ch05.xhtml#list8), update the value of “from”\
    \ and “to” fields to your e-mail ID.\n\nOne last thing we need to do to complete\
    \ the use case discussed in [Figure 5-5](#9781430246923_Ch05.xhtml#Fig5) is to\
    \ come up with the client application that will look up the `OrderProcessing`\
    \ session bean and invoke the `SendOrderStatus()` message. [Listing 5-9](#9781430246923_Ch05.xhtml#list9)\
    \ shows the code for the client application. In the `try` block, we are doing\
    \ a JNDI lookup of the `OrderProcessing` session bean and calling the `SendOrderStatus()`\
    \ business method.\n\n***[Listing 5-9](#9781430246923_Ch05.xhtml#_list9).*** \
    \ `StatusMailerClient.java`\n\n```\npackage com.apress.ejb.chapter05;\nimport\
    \ java.io.IOException;\nimport java.io.PrintWriter;\nimport javax.ejb.EJB;\nimport\
    \ javax.servlet.ServletException;\nimport javax.servlet.annotation.WebServlet;\n\
    import javax.servlet.http.HttpServlet;\nimport javax.servlet.http.HttpServletRequest;\n\
    import javax.servlet.http.HttpServletResponse;\n\n@WebServlet(name = \"StatusMailerClient\"\
    , urlPatterns = {\"/StatusMailerClient\"})\npublic class StatusMailerClient extends\
    \ HttpServlet {\n    @EJB\n    OrderProcessingBean orderProcessing;\n\nprotected\
    \ void processRequest(HttpServletRequest request, HttpServletResponse response)\n\
    \            throws ServletException, IOException {\n        response.setContentType(\"\
    text/html;charset=UTF-8\");\n        PrintWriter out = response.getWriter();\n\
    \        try {\n            out.println(\"<html>\");\n            out.println(\"\
    <head>\");\n            out.println(\"<title>Servlet StatusMailerClient</title>\"\
    );\n            out.println(\"</head>\");\n            out.println(\"<body>\"\
    );\n\nout.println(\"<h1>OrderProcessing session bean lookup to be done</h1>\"\
    );\n            out.println(\"<h1>Invoking SendOrderStatus() business method now</h1>\"\
    );\n            out.println(\"<h1>\" + orderProcessing.SendOrderStatus() + \"\
    </h1>\");\n            out.println(\"<h1>Done !!!</h1>\");\n            out.println(\"\
    </body>\");\n            out.println(\"</html>\");\n        } finally {\n    \
    \        out.close();\n        }\n    }\n\n@Override\n    protected void doGet(HttpServletRequest\
    \ request, HttpServletResponse response)\n            throws ServletException,\
    \ IOException {\n        processRequest(request, response);\n    }\n\n@Override\n\
    \    protected void doPost(HttpServletRequest request, HttpServletResponse response)\n\
    \            throws ServletException, IOException {\n        processRequest(request,\
    \ response);\n    }\n\n@Override\n    public String getServletInfo() {\n     \
    \   return \"Short description\";\n    }\n}\n```\n\nIn the next section, we will\
    \ look at compiling, deploying, and running the use case on which we have worked.\n\
    \n## Compiling, Deploying, and Testing MDBs\n\nMDBs need to be packaged into EJB\
    \ JAR (Java Archive) files before they can be deployed into EJB containers. These\
    \ EJB archives can then be deployed. (For some EJB containers or application servers,\
    \ they need to be assembled into EAR [Enterprise Archive] files). Most EJB containers\
    \ or application servers provide deployment utilities or Ant tasks to facilitate\
    \ deployment of EJBs to their containers. Java-integrated development environments\
    \ (IDEs) like JDeveloper, NetBeans, and Eclipse also provide deployment features\
    \ that allow developers to package, assemble, and deploy EJBs to application servers.\
    \ Packaging, assembly, and deployment aspects are covered in detail in [Chapter\
    \ 11](../Text/9781430246923_Ch11.xhtml).\n\nIn this chapter, we have developed\
    \ one stateless session bean (`OrderProcessing`) and one MDB (`StatusMailer`).\
    \ JMS providers have to be configured with queues and topics that will be used\
    \ by the client application and MDB accordingly before the MDBs are deployed.\n\
    \nThe following sections describe the steps to compile, deploy, and test these\
    \ MDBs and session beans.\n\n### Prerequisites\n\nBefore performing any of the\
    \ steps detailed in the next sections, complete the “Getting Started” section\
    \ of [Chapter 1](../Text/9781430246923_Ch01.xhtml), which will walk you through\
    \ the installation and environment setup required for the samples in this chapter.\n\
    \n### Compiling the Session Beans and MDBs"
