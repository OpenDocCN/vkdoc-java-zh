    乐观锁支持（@Version）

    '
- fmt: '如前面的示例所示，你可以使用`@Version`注解来指定一个字段，供`EntityManager`在合并操作和并发管理时执行乐观锁。*乐观锁*是一种有用的性能优化手段，它将原本需要数据库完成的工作转移到了客户端。数据库通常提供*悲观锁*服务，允许数据库客户端（在本例中为JPA的`EntityManager`）锁定表中的某一行，以防止在`EntityManager`应用更改时其他客户端更新该行。这是一种确保两个客户端不会同时修改同一行的有效机制，但它需要在数据库内部进行昂贵的、低级别的访问检查。悲观锁的一种替代方案是将并发控制转移到像`EntityManager`这样的数据库客户端中，并采用乐观锁策略。通过使用专用的`@Version`列，`EntityManager`遵循几条简单的规则。每当它将修改后的实体发送到数据库时（例如在提交或刷新操作期间），它会查看实体实例的`@Version`字段的当前值，从数据库中查询该实体行的当前状态，并比较版本值。如果它们相同，则递增实体实例的`@Version`字段（或任何标注了`@Version`的字段），并将更改发送到数据库，从而执行一条`UPDATE`语句。如果版本值不同，则意味着在`EntityManager`上次查询该行并将其加载到实体实例，与将该实例刷新回数据库之间，有其他客户端修改了该行。当检测到这种差异时，我们称之为*并发异常*，`EntityManager`会抛出异常并将事务标记为回滚。`EntityManager`的客户端需要预见到可能发生并发异常，并必须准备好解决冲突，通常的做法是通知用户冲突，以便在继续之前刷新实体。


    在实体上使用专用的`@Version`列，允许`EntityManager`通过比较实体实例中存储的`@Version`字段值与数据库中`VERSION`列的值来简单地执行乐观锁。如果你没有指定`@Version`字段，`EntityManager`必须遍历实体实例中的每个字段，并将其值与数据库中对应的映射列进行比较，这要繁琐得多。声明的`@Version`字段将由持久化框架自动填充，不应由应用程序代码更新。


    总而言之，使用`@Version`字段并非强制要求，但在实体上定义`@Version`字段以允许`EntityManager`利用此优化是一种良好的实践。


    ## 支持自动生成的主键值（`@GeneratedValue`）


    除了通过`@Version`列提供的内置乐观锁支持外，JPA还提供了几种便捷的方式，在持久化实体时自动填充主键列。你可以声明一个字段的值应通过以下方式填充：


    *   由持久化框架维护的自动机制（`strategy=GenerationType.AUTO`）

    *   自定义数据库序列（`strategy=GenerationType.SEQUENCE`或`GenerationType.IDENTITY`）

    *   模拟伪序列的自定义数据库表（`strategy=GenerationType.TABLE`）


    我们发现自动填充主键功能在便利性方面非常高，使我们无需为应用程序中的每个实体编写此代码。在`persistence.xml`中对持久化单元使用模式生成设置，可以让你让JPA在数据库中自动创建所需的工件（序列或表），甚至可以通过注解或XML使用JPA元数据指定的设置来配置它们。一旦安装，`AUTO`情况会为任何标注了`@GeneratedValue`或`@GeneratedValue(strategy=GenerationType.AUTO)`的`@Id`字段生成唯一标识符，并且至少让实体类不那么杂乱。由于并非所有数据库都支持序列对象，你可能希望使用表生成器，如本章示例所示。


    [清单4-31](#9781430246923_Ch04.xhtml#list31)演示了默认ID生成功能的使用。


    [***清单4-31.***](#9781430246923_Ch04.xhtml#_list31)  Person.java，使用默认ID生成器


    ```java

    @Entity

    @Inheritance(strategy = InheritanceType.JOINED)

    @DiscriminatorColumn(name = "TYPE")

    @Table(name = "CH04_JOIN_PERSON")

    @NamedQuery(name = "findAllPerson", query = "select object(o) from Person o")

    public abstract class Person implements Serializable {

        @Id

        @GeneratedValue

        private Long id;

        /* ... */

    }

    ```


    用于生成本章示例中所有表和序列的SQL脚本可在示例代码区域中找到。此外，JPA提供商会生成DDL对象，甚至一些它所需的DML，以支持任何已部署的实体；因此，预先创建模式并非严格必要。然而，虽然JPA会接受关于要使用的表和列名称的指导，但目前还没有办法指定为你自动创建的约束或其他工件的名称。因此，如果你需要控制映射对象的名称和其他细节，最好在首次部署持久化单元之前预先创建模式。


