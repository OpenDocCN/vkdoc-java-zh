    \n## 持久性\n\n这也主要由事务中涉及的底层JTA资源（例如数据库或邮件服务器）负责。在JTA事务结束时，任何此类资源都应能够在查询时显示数据的新状态。我们通过在`createCustomerOrder()`方法及其封装的事务完成后，从客户端查询新`CustomerOrder`的详细信息来演示这一点。\n\
