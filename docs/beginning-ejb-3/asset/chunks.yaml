- fmt: '# EJB Client Applications


    So far in our journey, we have covered, in detail, session beans, entities using
    the Java Persistence API (JPA), message-driven beans (MDBs), publishing stateless
    session beans as Web services, and integrating all of these components. On top
    of this, we have covered specific details on transactions and performance. While
    we have been developing simple servlets as our client applications to illustrate
    how the components work, we haven’t thoroughly discussed the different types of
    EJB client applications and how to develop them. In this chapter, we will discuss
    different application architectures in which client applications can be involved,
    and we will build the common ones.


    ## Application Architecture


    The Java EE platform provides flexibility on how components can be distributed
    across different tiers and architectures. You can choose the right architecture
    and programming model based on the application or configuration requirements.
    In this section, we will look at the different architectures and programming models
    that you can use.


    [Figure 12-1](#9781430246923_Ch12.xhtml#Fig1) shows the architectural layout for
    Web-based applications. This architecture is typically front-ended by a Web application
    running in a browser. These days, other types of client devices (such as smartphones,
    tablets, cell phones, and telnet devices) are also being used to run these applications.
    The Web application running in a browser or mobile device renders the user interface
    using Web technologies such as JavaServer Pages (JSP), JavaServer Faces (JSF),
    or Java Servlets. Typical user actions, such as entering search criteria or adding
    items to a shopping cart, will invoke/call session beans running in an EJB container
    via one of the aforementioned Web technologies. Once the session beans are invoked,
    they process the requests, and responses are sent back.


    ![9781430246923_Fig12-01.jpg](Images/9781430246923_Fig12-01.jpg)


    [Figure 12-1.](#9781430246923_Ch12.xhtml#_Fig1) A Web-based application architecture


    This architecture allows you to leverage all of the benefits of session beans,
    such as encapsulating interactions with entities, managing transactions and security,
    and so on. The downside is that you need an EJB container or an application server
    to deploy and run the session beans. Another thing to note in this architecture
    is that you can run the Web and EJB containers on two different physical machines
    or on two separate Java Virtual Machines (JVMs) on the same physical machine.
    The pros and cons of this approach were discussed in [Chapter 2](../Text/9781430246923_Ch02.xhtml).


    A slight modification of this architecture is shown in [Figure 12-2](#9781430246923_Ch12.xhtml#Fig2),
    in which the Web and EJB containers are colocated in the same JVM. In this architecture,
    Web components interact with EJB components in local mode. The pros and cons of
    this approach were also discussed in [Chapter 2](../Text/9781430246923_Ch02.xhtml).


    The JPA specification provides a lightweight persistence object model with plain
    old Java objects (POJOs) and annotations for object/relational (O/R) mapping.
    This is drastically different from what the earlier EJB specifications were doing
    for persistence. The lightweight nature of this persistence model makes it possible
    to have application architectures that allow Web applications to interact directly
    with persistence object models or JPA entities. [Figure 12-3](#9781430246923_Ch12.xhtml#Fig3)
    shows the architectural layout for this kind of programming model. In this architecture,
    the Web components will interact with entities using the `EntityManager` to perform
    CRUD (create, retrieve, update, delete) operations and queries to retrieve data.


    ![9781430246923_Fig12-02.jpg](Images/9781430246923_Fig12-02.jpg)


    [Figure 12-2.](#9781430246923_Ch12.xhtml#_Fig2) A Web-based application architecture
    with local invocation


    ![9781430246923_Fig12-03.jpg](Images/9781430246923_Fig12-03.jpg)


    [Figure 12-3.](#9781430246923_Ch12.xhtml#_Fig3) A Web-based application architecture
    using JPA entities


    The upside of this programming model is that you can run your Web applications
    on any standard lightweight Web container (such as Tomcat). You don’t need any
    EJB containers or application servers, as you aren’t using session beans or MDBs.
    This architecture is widely used with other O/R frameworks, such as TopLink and
    Hibernate, on which the JPA specification is based. The downside is that you lose
    some of the services provided by EJB containers (such as transactions and security).


    The preceding three architectures are most commonly used when building Web applications
    with EJBs or entities. Other variants of these architectures are possible, but
    we will not be drilling down into all of the options.


    The next two architectures are programming models in which the client applications
    are of the desktop variety, which provide rich UI functionality for data entry
    purposes.


    [Figure 12-4](#9781430246923_Ch12.xhtml#Fig4) shows an architecture in which a
    client application running on the desktop invokes a remote session. The client
    application running on the desktop has data entry screens used by the end users
    (such as customer service representatives and bank tellers). These client applications
    can be developed using Java Swing technology in Java SE, or using plain Java classes
    (POJOs) that are run from the command line. Generally, the end users launch the
    client application from their desktop, enter some data, and trigger an event by
    pressing some onscreen UI component (such as a Submit button).


    ![9781430246923_Fig12-04.jpg](Images/9781430246923_Fig12-04.jpg)


    [Figure 12-4.](#9781430246923_Ch12.xhtml#_Fig4) A professional desktop client
    application architecture


    Client applications can either be installed on the desktop machine or downloaded
    from a server using technologies like Java Web Start. In this architecture, there
    will always be remote invocation of the session beans from the client applications,
    as the session beans will be running on a remote server. This architecture can
    leverage the benefits of session beans, as is the case with Web applications.


    [Figure 12-5](#9781430246923_Ch12.xhtml#Fig5) shows an architecture that uses
    JPA entities directly instead of going through the session beans. In this programming
    model, the client application and entities packaged in a persistence unit are
    colocated and assembled as a single application unit. The client application makes
    use of the `EntityManager` to perform CRUD operations and queries to retrieve
    the data.


    ![9781430246923_Fig12-05.jpg](Images/9781430246923_Fig12-05.jpg)


    [Figure 12-5.](#9781430246923_Ch12.xhtml#_Fig5) A professional client application
    architecture using JPA entities


    The upside of this programming model is that you can run your applications in
    a standard Java SE environment without using an EJB container, but the obvious
    downside is that you will lose the services like security and transaction management
    that are provided by the EJB container.


    As described in [Chapter 6](../Text/9781430246923_Ch06.xhtml), stateless session
    beans can be published as Web services. Once a stateless session bean is published
    as a Web service, any Web service client application that can assemble and send
    a Simple Object Access Protocol (SOAP) message can invoke the published Web service.
    [Figure 12-6](#9781430246923_Ch12.xhtml#Fig6) shows this architecture.


    ![9781430246923_Fig12-06.jpg](Images/9781430246923_Fig12-06.jpg)


    [Figure 12-6.](#9781430246923_Ch12.xhtml#_Fig6) A Web service client application
    architecture'
