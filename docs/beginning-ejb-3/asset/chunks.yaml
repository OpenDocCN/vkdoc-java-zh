    的事务模型，在该模型中，每次调用 INSERT、UPDATE 或 DELETE 等 DML 操作时，都会隐式地开始一个事务。因此，客户端只需调用 COMMIT
    或 ROLLBACK 来结束事务，而无需显式调用开始事务。拦截器类如下所示，见清单 8-6：


    ***清单 8-6.***  OrderProcessorBMTBeanTxnInterceptor.java，一个由 OrderProcessorBMTBean
    使用的拦截器，用于在每次通过 EntityManager 应用更改的方法被调用时，使用 BMT Bean 的 SessionContext 中的 UserTransaction
    开始一个 JTA 事务


    ```

    class OrderProcessorBMTBeanTxnInterceptor {

      public OrderProcessorBMTBeanTxnInterceptor() {

      }


    @AroundInvoke

      Object beginTrans(InvocationContext invocationContext) throws Exception {

        final OrderProcessorBMTBean orderProcessorBMTBean = (OrderProcessorBMTBean)
    invocationContext.getTarget();

        final UserTransaction txn = orderProcessorBMTBean.sessionContext.getUserTransaction();

        if (txn.getStatus() == Status.STATUS_NO_TRANSACTION) {

          txn.begin();

        }

        return invocationContext.proceed();

      }

    }

    ```


