    现在，让我们剖析一个我们针对 WineApp 示例应用程序中的 EJB 编写的 JUnit 测试类，以测试几个场景。


    WineAppServiceTest：针对 WineAppService EJB 的 JUnit 测试类


    对于本章的示例，我们在清单 13-1 中提供了一个 JUnit 测试类，其中包含在可嵌入 EJB 容器中对 EJB 进行单元测试所需的所有元素。


