    The user interface is developed using JavaServer Faces (JSF). [Figure 9-3](#9781430246923_Ch09.xhtml#Fig3)
    displays the JSF page, which shows the catalog of all available wines in a list
    box. Users can a select wine items of their choice, enter the quantity in the
    input text box, and click the “Add to Cart” button. Users can repeat the same
    process to add more wines, and finally they can click the “Submit Order” button.


