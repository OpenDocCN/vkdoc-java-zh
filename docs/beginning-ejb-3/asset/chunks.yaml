- fmt: "# Now we proceed to find out the accuracy of our performance test. Since this\
    \ will be done based on three test runs using the upper limit, we only have to\
    \ do two additional runs. We can use the appropriate data from the previous run\
    \ to determine the sample size.\n\n![image](Images/sq.jpg) **Tip** It has been\
    \ our experience that typical margins of error using this method are between 5\
    \ and 10 percent. They tend to increase when there are think times in the test\
    \ scripts. In these cases, it’s not unusual to find numbers as high as 30 percent.\n\
    \n[Table 9-1](#9781430246923_Ch09.xhtml#Tab1) and [Table 9-2](#9781430246923_Ch09.xhtml#Tab2)\
    \ show the differential of the results collected from the test runs for the AART\
    \ and the TTR.\n\n[Table 9-1](#9781430246923_Ch09.xhtml#_Tab1). Margin of Error\
    \ (AART)\n\n![table](Images/Table9-1.jpg)\n\n[Table 9-2](#9781430246923_Ch09.xhtml#_Tab2).\
    \ Margin of Error (TTR)\n\n![table](Images/Table9-2.jpg)\n\nThe biggest differences\
    \ in these tables are 100.7 percent (for instance, run 2 vs. run 1 in the TTR\
    \ table), and 99.9 percent (for example, run 3 vs. run 1 in the AART table). Thus\
    \ the official margin of error of this performance test is 0.7 percent, which\
    \ is a very good number.\n\n## The Actual Test Runs\n\nNow that we have completed\
    \ all of the preparations, we are ready to start running the formal tests that\
    \ will give us a picture as to which inheritance model behaves best under extremely\
    \ stressful conditions.\n\nThis part of the performance tests is mechanical and\
    \ rather boring. The initial step is to start the Grinder console and make sure\
    \ that the parameters for our tests are set correctly. First we verify that the\
    \ sample interval is set to 5,000 milliseconds. Next we check that we ignore 12\
    \ samples (of 5 seconds each, totaling the 60 seconds that we chose earlier).\
    \ Then we choose to stop collecting data after 36 samples (of 5 seconds each,\
    \ totaling the 180 seconds that we chose earlier).\n\nThe steps to follow for\
    \ each test run are as follows:\n\n1.  Reset the database using the corresponding\
    \ URL depending on the inheritance model:\n\n    ```\n    http://yourserver:port/Chapter09-PerformanceJoined-war/ResetJoinedData\n\
    \    http://yourserver:port/Chapter09-PerformanceSingleTable-war/ResetSingleTableData\n\
    \    ```\n\n2.  Restart the GlassFish server.\n3.  Edit the `grinder.properties`\
    \ file, and modify the number of users.\n4.  Click the “Start to capture statistics”\
    \ button on the Grinder console. This will clear out all the results of the previous\
    \ run.\n5.  Click the “Start processes” button on the Grinder console.\n6.  Wait\
    \ for the data collection to complete. A good indicator is when the line on the\
    \ center of the left panel goes from stating “Collecting samples: XX” in green\
    \ to stating “Ignoring samples: XX” in red.\n7.  Click the “Reset processes” button\
    \ on the Grinder console. This step actually stops the execution of the simulated\
    \ users.\n8.  Click the “Save results” button. Provide a descriptive file name,\
    \ and save the results displayed on the console for later analysis.\n9.  Start\
    \ over again at the beginning of this list.\n\nOnce you have finished with all\
    \ of the test runs for the `JOINED` table inheritance strategy, you can proceed\
    \ to do all of the preparations for the set of test runs for the `SINGLE_TABLE`\
    \ inheritance scheme.\n\nAs explained in the earlier sections, the differences\
    \ between our two tests are O/R mapping annotations and the database schema. Once\
    \ the application is ready for the next set of test runs, just repeat the steps\
    \ you did for the previous set of test runs.\n\n## Analyzing the Results\n\nWe\
    \ have to start by stating that the results presented in this chapter are not\
    \ meant to endorse one inheritance method over another. They are provided only\
    \ to illustrate how to apply the methodology and how to use the Grinder toolkit.\
    \ Because of this, we have gone into this performance test with no expectations\
    \ about which inheritance model will work better.\n\nWe start our analysis by\
    \ reviewing the results of the test run of the multiple-table inheritance with\
    \ 100 users. These results are shown in [Table 9-3](#9781430246923_Ch09.xhtml#Tab3).\n\
    \n[Table 9-3](#9781430246923_Ch09.xhtml#_Tab3). Multiple-Table, 100-User Results\n\
    \n| 100 Users | ART | TPS |\n| --- | --- | --- |\n| Request 1 | 1,240 | 34.1 |\n\
    | Request 2 | 594 | 34.1 |\n| Request 3 | 549 | 34.1 |\n| Request 4 | 543 | 34.1\
    \ |\n| Total | 732 | 136 |\n\nTwo things should quickly come to your attention.\
    \ The first is that the time required to obtain the home page of the application\
    \ was long—a little over 1 second—especially when compared to all of the other\
    \ response times in the test script. This can be explained because in setting\
    \ up the main page, although simple, it involves sending data from the server\
    \ to the browser, which in general is considered a more expensive operation than\
    \ updating a shopping cart. The next thing that should catch your eye is that\
    \ the checkout process lasts less than 1 second. While this is an ideal time for\
    \ a process that verifies inventory and that performs other actions associated\
    \ with a checkout, the truth is that there is not much of an inventory on this\
    \ test system.\n\nLooking at the results from the test run of the single-table\
    \ inheritance model with 100 users (shown in [Table 9-4](#9781430246923_Ch09.xhtml#Tab4)),\
    \ you can see a similar pattern of behavior, so at least it’s consistent.\n\n\
    [Table 9-4](#9781430246923_Ch09.xhtml#_Tab4). Single-Table, 100-User Results\n\
    \n| 100 Users | ART | TPS |\n| --- | --- | --- |\n| Request 1 | 1,320 | 33.4 |\n\
    | Request 2 | 580 | 33.4 |\n| Request 3 | 540 | 33.5 |\n| Request 4 | 543 | 33.6\
    \ |\n| Total | 745 | 134 |\n\nThis part of the analysis is limited to reviewing\
    \ every individual request, and it is usually done with the results collected\
    \ from the test run with the upper limit of users. The next step is to analyze\
    \ the AART and TTR for all of the user loads that we selected. We start with the\
    \ results from using the multiple-table inheritance model, which is shown in [Table\
    \ 9-5](#9781430246923_Ch09.xhtml#Tab5).\n\n[Table 9-5](#9781430246923_Ch09.xhtml#_Tab5).\
    \ Multiple-Table, All-User Results\n\n| Users | AART | TTR |\n| --- | --- | ---\
    \ |\n| 40 | 291 | 137 |\n| 60 | 438 | 137 |\n| 80 | 584 | 137 |\n| 100 | 732 |\
    \ 136 |\n| 120 | 919 | 130 |\n| 140 | 1,120 | 125 |\n\nFrom this table, it can\
    \ be seen that the saturation point is reached from the beginning of the performance\
    \ tests, which is quite unusual. This means that the inheritance model is gobbling\
    \ up all of the resources available from the beginning.\n\nLet’s review the results\
    \ for the single-table inheritance model so that we can do some comparisons. They\
    \ are presented in [Table 9-6](#9781430246923_Ch09.xhtml#Tab6).\n\n[Table 9-6](#9781430246923_Ch09.xhtml#_Tab6).\
    \ Single-Table, All-User Results\n\n| Users | AART | TTR |\n| --- | --- | ---\
    \ |\n| 40 | 296 | 135 |\n| 60 | 446 | 135 |\n| 80 | 592 | 134 |\n| 100 | 745 |\
    \ 134 |\n| 120 | 908 | 132 |\n| 140 | 1,120 | 125 |\n\nOnce again, we see the\
    \ same pattern of saturation from the beginning. This could be attributed to the\
    \ Derby database and memory usage. What can also be seen is that both the Total\
    \ Transactional Rate and the Aggregate Average Response Times are slightly lower\
    \ than those of the multiple-table inheritance model.\n\nThis comparison can be\
    \ seen more clearly in the charts presented in [Figure 9-10](#9781430246923_Ch09.xhtml#Fig10),\
    \ which contains a comparison of both sets of results for the AART; and [Figure\
    \ 9-11](#9781430246923_Ch09.xhtml#Fig11), which contains the comparison for the\
    \ TTR.\n\n![9781430246923_Fig09-10.jpg](Images/9781430246923_Fig09-10.jpg)\n\n\
    [Figure 9-10.](#9781430246923_Ch09.xhtml#_Fig10) AART comparison\n\nIn [Figure\
    \ 9-10](#9781430246923_Ch09.xhtml#Fig10), the Aggregate Average Response Times\
    \ (AART) are pretty much the same, so we will have to look carefully at the Total\
    \ Transactional Rate (TTR) to try to understand which model is more beneficial\
    \ under the conditions of the performance tests we are doing."
