- fmt: '# Installing NetBeans IDE and Its Integrated GlassFish Server


    Navigate to the directory where the NetBeans IDE installer has been downloaded,
    and run the installer. The first page of the installer wizard lists the packages
    that will be installed. If you see the “No compatible JDK was found” warning message,
    as shown in [Figure 1-2](#9781430246923_Ch01.xhtml#Fig2), then you will have to
    exit the wizard and first download and install Java Platform (JDK) 7 from the
    following location.


    `http://www.oracle.com/technetwork/java/javase/downloads/index.html`


    ![9781430246923_Fig01-02.jpg](Images/9781430246923_Fig01-02.jpg)


    [Figure 1-2.](#9781430246923_Ch01.xhtml#_Fig2)  Installing NetBeans. “No compatible
    JDK was found” warning


    ![image](Images/sq.jpg) **Note**   Even if you don’t see the “`No compatible JDK
    was found`” warning, verify that you have Java Platform (JDK) 7 installed. If
    you don’t have the Java Platform (JDK) 7 installed, then you might get a “`javac:
    invalid target release: 1.7`” error while executing the samples in this book.


    Rerun the NetBeans installer after a compatible JDK version is installed. Verify
    that the “No compatible JDK found” warning does not reoccur, and traverse the
    wizard, keeping all of the default values selected. The “Summary” page will list
    the folders where the NetBeans IDE and the GlassFish application server will be
    installed. Finish the wizard by pressing the `Install` button, as shown in [Figure
    1-3](#9781430246923_Ch01.xhtml#Fig3).


    ![9781430246923_Fig01-03.jpg](Images/9781430246923_Fig01-03.jpg)


    [Figure 1-3.](#9781430246923_Ch01.xhtml#_Fig3)  Installing the NetBeans IDE and
    GlassFish application server


    After a successful installation, your NetBeans IDE and GlassFish application server
    will be ready for use. In the upcoming sections, we will show you how to create
    a simple NetBeans project and verify that the installed GlassFish server is functioning
    properly.


    ## Testing the NetBeans IDE and GlassFish Installation


    Assuming that all of the preceding steps have been executed successfully, you
    are ready to start the NetBeans IDE and the integrated GlassFish application server.
    We will also demonstrate a few simple tests to ensure that you are set to run
    the samples in this book.


    ### Starting NetBeans IDE


    The NetBeans IDE provides a graphical environment for creating, deploying, and
    executing Java EE applications. Administrative tasks like starting and shutting
    down the GlassFish server domains can also be performed using NetBeans.


    Invoke NetBeans, either by selecting “NetBeans” in the Start Menu of your Windows
    7 machine or running `C:\Program Files\NetBeans 7.3\bin\netbeans64.exe` from the
    command prompt. Note that the exact path will depend on the installation location
    that is mentioned in [Figure 1-3](#9781430246923_Ch01.xhtml#Fig3), and for 32-bit
    systems the executable will be named `netbeans.exe`. If you are running Windows
    8, then you need to press the “Windows” key and start typing “NetBeans.” The Apps
    Search tool will search for the NetBeans executable that you can select to launch
    the NetBeans IDE.


    ### Testing Using Sample Project


    Once the NetBeans IDE has opened, we will create a sample project to test the
    compilation, deployment, and execution aspects of the IDE as well as the application
    server.


    To create a new project, open the `New Project` wizard by pressing `Ctrl-Shift-N`.
    Select the `Java Web` category and the `Web Application` project, as shown in
    [Figure 1-4](#9781430246923_Ch01.xhtml#Fig4). Traverse the wizard, keeping all
    of the default values selected, and `Finish` the wizard.


    ![9781430246923_Fig01-04.jpg](Images/9781430246923_Fig01-04.jpg)


    [Figure 1-4.](#9781430246923_Ch01.xhtml#_Fig4)  Creating a sample test project


    NetBeans will create a project named `WebApplication1`. Next we will create a
    servlet under the project `WebApplication1`. To create a servlet, invoke the context
    menu by right clicking on the project name in the project navigator. Select the
    `Servlet ...` menu that is available under `New`, as shown in [Figure 1-5](#9781430246923_Ch01.xhtml#Fig5).


    ![9781430246923_Fig01-05.jpg](Images/9781430246923_Fig01-05.jpg)


    [Figure 1-5.](#9781430246923_Ch01.xhtml#_Fig5)  Creating a test servlet


    In the `New Servlet` wizard, enter a package name and `Finish` the wizard keeping
    the other default values, as shown in [Figure 1-6](#9781430246923_Ch01.xhtml#Fig6).
    We have used `setup` as the package name.


    ![9781430246923_Fig01-06.jpg](Images/9781430246923_Fig01-06.jpg)


    [Figure 1-6.](#9781430246923_Ch01.xhtml#_Fig6)  Traversing the New Servlet wizard


    After the `NewServlet` class is created, we can instantly *run* it by invoking
    the context menu on the servlet file and selecting the `Run File` menu option,
    as shown in [Figure 1-7](#9781430246923_Ch01.xhtml#Fig7).


    ![9781430246923_Fig01-07.jpg](Images/9781430246923_Fig01-07.jpg)


    [Figure 1-7.](#9781430246923_Ch01.xhtml#_Fig7)  Running the servlet


    When we *run* the servlet, NetBeans will automatically start the integrated GlassFish
    server. You might have to provide necessary permissions to the Java EE and application
    server-related functionality if the Window firewall shows one or more Windows
    Security Alert dialogs, as shown in [Figure 1-8](#9781430246923_Ch01.xhtml#Fig8).


    ![9781430246923_Fig01-08.jpg](Images/9781430246923_Fig01-08.jpg)


    [Figure 1-8.](#9781430246923_Ch01.xhtml#_Fig8)  Allowing access if Windows Firewall
    shows an alert


    As part of running the servlet, NetBeans will compile, package, and deploy it
    to the integrated GlassFish server. After the deployment, NetBeans will automatically
    open the servlet URL in the default browser, as shown in [Figure 1-9](#9781430246923_Ch01.xhtml#Fig9).


    ![9781430246923_Fig01-09.jpg](Images/9781430246923_Fig01-09.jpg)


    [Figure 1-9.](#9781430246923_Ch01.xhtml#_Fig9)  Running the servlet class


    Successful execution of the servlet class means that the installation of NetBeans
    and the integrated GlassFish server has gone through successfully, and the setup
    to run the examples presented in this book is ready.


    ![image](Images/sq.jpg) **Note**   By no means is this section of the chapter
    a user guide for the GlassFish application server. For more information on GlassFish,
    see `http://glassfish.java.net/downloads/quickstart/index.html`.


    ## Administrating the GlassFish Application Server


    NetBeans provides us with a graphical interface to perform various GlassFish server-related
    administrative tasks. You can restart, start, and stop the GlassFish server from
    the `Services` tab, as shown in [Figure 1-10](#9781430246923_Ch01.xhtml#Fig10).


    ![9781430246923_Fig01-10.jpg](Images/9781430246923_Fig01-10.jpg)


    [Figure 1-10.](#9781430246923_Ch01.xhtml#_Fig10)  Administrating the Glassfish
    application server


    Once GlassFish has successfully started, you can test whether the server is able
    to accept the basic HTTP requests. To do so, open a browser, type in the URL `http://localhost:8080/`
    and, if the server is up and running, you will be able to see the page shown in
    [Figure 1-11](#9781430246923_Ch01.xhtml#Fig11).


    ![9781430246923_Fig01-11.jpg](Images/9781430246923_Fig01-11.jpg)


    [Figure 1-11.](#9781430246923_Ch01.xhtml#_Fig11)  Testing GlassFish server


    ![image](Images/sq.jpg) **Note**   Substitute `localhost` with the machine name
    or IP address if you are trying to access it from a machine other than the one
    on which GlassFish is installed. If you changed the port number during installation,
    use that port instead of 8080.'
