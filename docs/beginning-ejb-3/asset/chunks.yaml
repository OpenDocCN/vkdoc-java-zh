    1.  使用以下 URL 重置数据库：`http://yourserver:port/Chapter09-PerformanceJoined-war/ResetJoinedData`

    2.  重置 Glassfish 服务器。

    3.  启动 Grinder 控制台：`java -classpath` <classpath_to_the_grinder></classpath_to_the_grinder>`net.grinder.Console`

    4.  编辑 `grinder.properties` 文件，并确认你只设置了一个用户和一个循环。

    5.  通过输入以下命令启动 Grinder 代理和 Grinder 控制台：`java -classpath` <classpath_to_the_grinder></classpath_to_the_grinder>`net.grinder.Grinder`

    6.  点击 Grinder 控制台上的启动按钮。控制台上不会显示任何结果，因为它只会运行一个循环。

    7.  检查你启动 Grinder 代理的窗口。当它显示已完成并正在等待控制台信号时，点击 Grinder 控制台上的重置按钮。

    8.  进入日志目录，查看以 `out` 开头的文件。该文件包含整个测试运行的摘要，包括统计数据。如果出现问题，此文件和错误文件将为你提供解决问题所需的信息。


    在为每个测试运行完这些步骤一次后，你可能需要更新每个测试应用的两个 JPA 项目中的 `persistence.xml` 文件，以关闭表生成。我们保留此标志为开启状态，以便在首次运行
    `ResetJoinedData/ResetSingleTableData` servlet 时创建表。在运行每个脚本一次以创建持久化单元的表之后，你可以避免因后续每次运行时表已存在而产生的开销（以及发出的警告）。


    现在一切就绪，你可以继续下一步了。


    初步测试


    这第一组测试的目的是熟悉应用程序及其行为，并发现测试脚本或应用程序可能存在的任何潜在问题。由于我们正在测试继承的两种不同实现，因此对于这些初步测试，使用哪种实现并不重要，所以我们选择使用多表实现来进行初始测试。我们已经使用一个用户运行了一个循环的测试。现在，我们可以继续进行无限循环的测试运行，并让它运行几分钟。然后，我们将继续测试多个并发用户运行一个循环的情况。这样做是为了确保应用程序和测试脚本能够正确处理并发。我们通常会选择
    10 个用户。之后，我们将测试 10 个用户无限循环运行几分钟。一旦这些测试成功完成，我们就知道测试脚本和应用程序运行正常，可以准备进行下一步了。


    我们旨在选择具有代表性的用户数量，进行大约六次快速测试运行，以便清晰地展示随着用户负载增加，应用程序的行为变化。


    在处理完整应用程序的性能测试时，我们通常会寻找达到或超过最大可接受响应时间时的用户上限。由于这是一次面向性能设计的测试，并且我们在测试脚本中没有使用任何思考时间，因此我们将专注于找到应用程序达到饱和点的用户数量。策略（如果可以这样称呼的话）是随机选择一个用户数量。


    测试运行时间很短，因为我们不需要精确的上限数字，只需要一个近似值。在这种情况下，我们选择从 100 个并发用户开始，并将从测试运行中收集 2.5 分钟的数据。由于我们使用的采样间隔是
    5 秒，我们只需在 Grinder 控制台的“永久收集样本”框中输入 **30**。输入 30 后，该框的标题将变为“30 个样本后停止”。为简单起见，我们不会排除初始数据。为此，我们在
    Grinder 控制台的“忽略样本”框中输入 **0**。收集到的统计数据将呈现略高于正常值的数值。这不是问题，因为这些测试只是初步的。遵循最佳实践，我们在每次性能测试前都会重置数据库和
    Glassfish 服务器。


    我们开始第一次测试运行，得到的 AART 为 737 毫秒。


    ![image](img/sq.jpg) **注意**   你可以在控制台左列底部（以图形方式显示 TPS 的方块的左侧）找到此信息，其标题为“(mean)”。


    TTR 为 137（你可以在找到 AART 的同一位置找到此信息，其标题为“TPS (mean)”）。接下来，我们将尝试使用 120 个用户。为此，我们修改
    `grinder.properties` 文件，将 `grinder.threads` 属性更改为 120。我们进行下一次运行，得到的 AART 为 911
    毫秒，TTR 为 133。由于 120 个用户的 TTR 低于 100 个用户，我们知道饱和点大约在 100 个用户或更少，因此我们的下一次测试运行将使用
    80 个用户。


    在 `grinder.properties` 文件中更改用户数量后，我们开始测试运行。我们得到的 AART 为 593 毫秒，TTR 为 136。这些结果表明饱和点大约在
    100 个用户左右，因此我们将以此作为上限。（选择 100 个用户作为初始测试点，真是幸运的猜测！）


    基于此信息，我们选择 40 个用户作为下限，100 个用户作为上限。测试运行将分别使用 40、60、80、100、120 和 140 个用户进行。这将为我们提供六个参考点，应该能清晰地展示应用程序的行为。


    样本量


    现在我们已经选择了并发用户的上限和下限，我们需要确定测试应该运行多长时间。这相当简单。我们只需要执行一次测试运行，其运行时间要比我们之前选择的 2.5 分钟更长。根据我们对此类测试的经验，大约
    7 分钟通常是一个不错的选择。测试运行将使用上限，即 100 个用户。


    测试运行结束后，我们获取由 *The Grinder* 生成的数据文件，该文件包含每次测试中每个模拟用户的单独响应时间。此文件可以在日志目录中找到，文件名以
    `data` 开头。接下来，我们绘制一条曲线，显示测试时间段内的 AART。此测试运行的结果如图 9-9 所示。在这里，我们可以看到响应时间曲线在测试开始后约
    60 秒处趋于稳定。


    ![9781430246923_Fig09-09.jpg](img/9781430246923_Fig09-09.jpg)


    图 9-9.  样本量分析图表，绘制测试时间段内的 AARP


    我们还可以看到，曲线在 60 秒标记后保持相当稳定，在 240 秒标记后极其稳定。因此，我们决定测试运行将持续 240 秒（4 分钟——既好又短），其中我们将忽略前
    60 秒。由于我们在 Grinder 控制台中将样本大小定义为 5 秒，这意味着我们将忽略 12 个样本并收集 36 个样本。


