    结论


    本章通过一组特定示例介绍了 EJB 会话 Bean 的详细信息。我们研究了使用标准 Java 语言构件（如 Java 类和接口）开发会话 Bean 的简化
    EJB 模型。我们探讨了会话 Bean 以及一些典型的用例，在这些用例中，会话 Bean 可用于开发应用程序。我们讨论了三种不同类型的会话 Bean（无状态、有状态和单例），包括它们之间的区别以及每种类型的一些通用用例。我们介绍了会话
    Bean 在两层和三层应用程序架构中的使用。我们讨论了依赖注入在无状态、有状态和单例 Bean 中的使用。我们考虑了实现对应用程序流程进行细粒度控制的方法，包括在无状态和有状态
    Bean 中使用生命周期回调方法和拦截器，以及使用诸如 `@PostConstruct` 和 `@PreDestroy` 之类的注解。我们研究了编译/构建、打包和将会话
    Bean 部署到 GlassFish 应用服务器所需的条件。最后，我们研究了使用 GlassFish 应用程序客户端容器运行示例客户端程序。


    在接下来的两章中，我们将深入探讨 Java 持久化 API (JPA)，以便您学习如何将 POJO 映射到数据库表并执行查询和 CRUD 操作。


    第 3 章


    ![image](img/frontdot.jpg)


    实体与 Java 持久化 API


    既然您已经了解了 EJB 如何通过会话 Bean 提供业务服务，我们将把注意力转向一种不同类型的组件，称为*实体*，它们是表示数据库中表的类，其实例表示这些表中的行。会话
    Bean 为客户端应用程序提供服务，而实体则代表业务数据。一种常见的模式是，会话 Bean 提供一个便捷的接口，用于在事务、安全、访问控制和其他企业服务的上下文中操作实体。执行创建、检索、更新和删除操作的方法（也称为
    CRUD 方法）在会话 Bean 上暴露给客户端，以提供一种“外观”模式，我们将在本书中一直使用这种模式。


    Java 持久化 API (JPA) 首次引入于 Java EE 5，它标志着与之前定义为 EJB 规范一部分的“实体 Bean”持久化模型的背离。JPA
    被广泛认为是对早期 EJB 版本中定义的实体 Bean 模型的巨大改进。JPA 毫不掩饰地借鉴了专有和开源模型，如 TopLink、Hibernate、JDO
    和 Spring，这些模型作为早期 EJB 修订版中定义的通常重量级且繁琐的实体 Bean 模型的流行替代方案而获得了发展势头。因此，与会话 Bean 一样，实体是简单的
    POJO（普通旧式 Java 对象），除了表明它们是实体的一小部分元数据（捕获在 Java 注解或持久化 XML 描述符中）之外，它们是对底层数据库表非常清晰的表示。虽然
    JPA 在范围和能力上扩展了持久化模型，但实体本身在很大程度上与其支持的持久化框架解耦，允许它们在 Java EE 容器内外既作为普通 POJO 使用，也作为由持久化框架管理的对象使用。


    JPA 1.0 在 Java EE 5 中引入，JPA 2.0 伴随 Java EE 6 出现，而 JPA 2.1 与 Java EE 7 保持一致。自 JPA
    1.0 以来引入的大多数功能都允许对 JPA 进行高级配置，这超出了本书的范围。然而，在下一章中，我们将描述一些我们认为对于介绍其最新修订版中的 JPA 至关重要的功能。


    本着本书的精神，关于持久化的两章将涵盖最常用的功能，通过使用我们的在线葡萄酒商店应用程序的实践示例来描述它们的用法。本章将引导您开始编写实体类并使用关键的持久化功能。下一章将探讨更高级的持久化功能。通过这些示例，这些章节解释了持久化编程模型的主要领域。然而，它们无意替代内容广泛的
    JPA 规范。当您准备好探索超出本讨论范围的细节时，我们鼓励您参考 JPA 规范。


    表 3-1 总结了本章将要介绍的内容。


