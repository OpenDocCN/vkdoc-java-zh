    JTA 与资源本地 EntityManager


    `EntityManager`可以被定义为参与 JTA 事务或非 JTA（资源本地）事务。JTA 的特性——最显著的是对分布式事务的支持——以及 Bean
    与 JTA 事务的接口`javax.transaction.UserTransaction`的使用，之前已经描述过。资源本地的`EntityManager`使用`javax.persistence.EntityTransaction`接口提供服务事务，客户端可通过`EntityManager.getEntityTransaction()`方法访问该接口。该接口暴露了预期的事务划分方法`begin()`、`commit()`和`rollback()`，以及`getRollbackOnly()`和`setRollbackOnly()`方法，这些方法等同于之前描述的企业
    Bean 可用的`EJBContext`和`UserTransaction`方法，还有一个`isActive()`方法用于指示事务当前是否正在进行。


    容器管理的`EntityManager`必须是 JTA `EntityManager`。应用程序管理的`EntityManager`可以是 JTA 或资源本地的，但只有当`EntityManager`位于
    Java EE 环境中时，它们才能是 JTA `EntityManager`。


    你可能想使用资源本地`EntityManager`的一个原因是，虽然 JTA 提供了分布式事务的基础设施，但资源本地事务可以通过消除该基础设施的开销来提供性能优化。另一个原因是你可能希望在独立的
    Java SE 环境中使用 JPA 实体，而该环境不支持 JTA 和/或数据源资源。


    在本章后面剖析示例应用程序中的 Java 外观时，我们将研究`EntityTransaction`的使用。


