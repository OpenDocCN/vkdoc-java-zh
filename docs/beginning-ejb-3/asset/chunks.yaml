    \ (JSR 318), the Managed Bean Specification (JSR 316), and the Dependency Injection\
    \ for Java Specification (JSR 330).\n\nYou might be wondering why we have included\
    \ a chapter on CDI in this book. There are two reasons for this: First, the dependency\
    \ injection behavior first introduced in EJB is enhanced in CDI; and second, CDI\
    \ supplements EJB by providing the *contextual* functionality to an application.\
    \ EJB complements CDI by providing enterprise services like security, transaction\
