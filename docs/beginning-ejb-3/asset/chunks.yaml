    \ 示例中的 `Address` 类与之前的示例相同，只是我们选择的表名和序列名不同。\n\nTABLE_PER_CLASS 策略的优缺点\n\n设计时考量\n\
    \n使用 TABLE_PER_CLASS 策略时，当新的最外层具体类型被引入层次结构时，会添加新的表。这很好，因为既不会影响现有表，也不会以任何方式影响它们的数据。然而，由于每个类型也会映射其所有超类型的字段，因此在基类上引入新字段，或引入新的基实体本身，都需要修改层次结构中所有受影响子类型的表，以映射任何新引入的字段。\n\
    \n性能影响\n\n使用 TABLE_PER_CLASS 方法时，跨多个类型进行查询需要 `UNION` 选择语句，这可能性能不佳，但查询单个类型非常高效，因为查询只涉及一个表。应避免此层次结构中的多态关系（涉及超类型），因为它们必然需要此\
    \ `UNION` 操作来解析为具体的子类型实例。\n\nO/R 实现方法比较\n\n现在我们已经探讨了三种继承映射实现，让我们看看类继承层次结构的一些特征，在选择用于类型层次结构的实现方法时应考虑这些特征。以下列表包含关于您自己的实体层次结构的主观问题。它们没有精确的答案；相反，它们旨在在构建应用程序时激发设计考量。\n\
    \n*   类层次结构可以是静态的，具有固定数量的子类型，也可以是动态的，具有不同数量的子类型。您需要将新子类型纳入层次结构的频率如何？\n*   层次结构可以是深的，包含许多子类，也可以是浅的，只包含少数几个。您的层次结构粒度如何？\n\
    *   层次结构中的类型可能差异很大，子类上的属性集与基类上的属性集非常不同，或者属性差异很小。实体的持久属性集彼此之间的差异有多大？\n*   其他实体是否会与此类型层次结构中的类定义关系？如果是，基类是否会经常成为被引用的类型？\n\
    *   此层次结构中的类型是否会被频繁查询、更新或删除？SQL `JOIN` 或 `UNION` 操作的存在与否将如何影响应用程序的性能？\n*   在应用程序的生命周期中，您更新类型层次结构本身的频率如何？这种变更的影响因每种继承策略而异，需要考虑以下因素：\n\
    \n*   向层次结构添加或删除新类型（例如重构类时）。\n*   添加、删除或修改层次结构中实体上的字段。\n\n*   添加、删除或修改涉及此层次结构中类型的关系。\n\
    \n![image](img/sq.jpg) **注意**   关于这三种继承策略的性能比较，以及如何设置您自己的性能比较测试的详细信息，请参阅第 9 章。查看我们性能测试的结果，并在构建实体层次结构时测试您自己的实体层次结构，以帮助您决定哪种策略在您的应用程序上下文中最有意义。\n\
    \n在继承层次结构中使用抽象实体、映射超类和非实体类\n\n在实体类层次结构中，JPA 允许混合使用非实体类和抽象类。使用上面的 JOINED 示例，让我们看看如何映射这些类。\n\
    \n抽象实体类\n\n如上一节关于继承层次结构所示，JPA 实体可以是具体的，也可以是抽象的。抽象实体只是一个不能自行实例化的实体——它仍然可以参与实体关系和查询，并且其字段会按照其类型层次结构的映射策略进行持久化。清单\
    \ 4-17 是我们一个抽象实体的示例。\n\n***清单 4-17.***  Person.java，JOINED 继承层次结构中的抽象根实体\n\n```\n\
    /**\n * Person: 一个抽象实体，也是继承层次结构的根\n */\n@Entity\n@NamedQueries({\n  @NamedQuery(name\
    \ = \"Person.findAll\", query = \"select o from Person o\")})\n@Table(name = \"\
    CH04_JOIN_PERSON\")\n@TableGenerator(name = \"Person_ID_Generator\", table = \"\
    CH04_JOIN_PERSON_ID_GEN\",\n                pkColumnName = \"PRIMARY_KEY_NAME\"\
    , pkColumnValue = \"Person.id\",\n                valueColumnName = \"NEXT_ID_VALUE\"\
    )\n@Inheritance(strategy = InheritanceType.JOINED)\npublic abstract class Person\
    \ implements Serializable {\n  ...\n  @OneToOne(cascade=CascadeType.ALL)\n  @JoinColumn(name\
    \ = \"HOME_ADDRESS\")\n  private Address homeAddress;\n  ...\n}\n```\n\n抽象的 `Person`\
    \ 实体不仅可以查询（这里我们定义了一个名为 `\"Person.findAll\"` 的命名查询），它还持有一个与 `Address` 实体的关联，该关联由其所有子类共享。尽管\
    \ `Person` 是抽象的，但它可以指定自己的映射和自己的表。只是它不会有自己的鉴别器值，因为永远不会有基类 `Person` 的具体实体实例。\n\n\
