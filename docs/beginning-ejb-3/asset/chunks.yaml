- fmt: '# With the technical help from all of the above, writing a book on this topic
    I hold dear would have been a mere marathon, if it weren’t for all of the diversions
    of everyday life! But for these welcome distractions, I would like to single out
    a few individuals among many. Adam Beyda and Lauren Webster have given me a lifetime
    of insight and perspective on what really matters. And Bob Lieb’s deep guidance
    and navigation through the psychological waters of writing a book was essential.
    Rhonda Jeffrey, Andy Cortwright, Dave Clark, and Marianna Klebanov: thank you
    for being good sounding boards and wonderful friends during this past year.


    My parents, Andrea and Peter Wetherbee, thank you for your love and encouragement
    and the constant reminder that you are my biggest fans.


    In the end, my primary motivation for punching this thing through came from the
    desire to, once again, spend more time with my children and close friends. That
    time is now!


    —Jon Wetherbee


    When Jon Wetherbee asked me if I would be interested in doing a “non-work” related
    project with him, I had no idea about what I would be getting into. I would like
    to thank Jon for giving me this wonderful opportunity of coauthoring this second
    edition. For me he is more than a lead author—he is a friend and guide who led
    me through the path that resulted in this book.


