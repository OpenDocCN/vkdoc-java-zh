    ## Building, Deploying, and Testing the Application


    EJBs need to be packaged into EJB JAR (Java Archive) files before they are assembled
    into EAR (Enterprise Archive) files that hold all of the required modules and
    libraries for the application. Most application servers provide deployment utilities
    or Ant tasks to facilitate deployment of EJBs to their containers. Java integrated
    development environments (IDEs) like NetBeans, JDeveloper, and Eclipse provide
    graphical deployment tools that allow developers to package, assemble, and deploy
    applications to application servers. There is no requirement that EJBs have to
    be packaged into EJB JAR files and assembled into EAR files. You can also deploy
    the EJB JAR files themselves. In this chapter, we will assemble them into EAR
    files so that we can make the persistence unit a shared module (in its own JAR
    file), and also to set the stage for [Chapter 12](../Text/9781430246923_Ch12.xhtml),
    in which we will be building client applications for the wine store back-end that
    we have just developed. We will also package the EJB/WebService module from [Chapter
    6](../Text/9781430246923_Ch06.xhtml) into this EAR file, along with a Web module
    that contains a simple test servlet that drives the test scenario.


    Packaging, assembly, and deployment aspects are covered in detail in [Chapter
    11](../Text/9781430246923_Ch11.xhtml). In this chapter, we have developed the
    wine store application back-end using session beans, MDBs, JPA entities, and Web
    Services. Using NetBeans and deploying to GlassFish, we will perform the following
    steps to package, assemble, deploy, and test the services defined in this chapter.


    ### Prerequisites


    Before performing any of the steps detailed in the next sections, complete the
    “Getting Started” section of [Chapter 1](../Text/9781430246923_Ch01.xhtml), which
    will walk you through the installation and environment setup required for the
    samples in this chapter.


    ### Creating the Database Connection


    The samples in this chapter require a database connection, and for these tests
    we will use the Derby database that is bundled with NetBeans and Glassfish. If
    you have not already created the WineApp database, also used for the [Chapter
    3](../Text/9781430246923_Ch03.xhtml) and [Chapter 4](../Text/9781430246923_Ch04.xhtml)
    examples, click on the `Services` tab, expand the `Databases` icon, and invoke
    “`Create Database...`” on the `Java DB` node. Create a database named “`WineApp`”
    with username and password `wineapp/wineapp`, as shown in [Figure 7-6](#9781430246923_Ch07.xhtml#Fig6):


    ![9781430246923_Fig07-06.jpg](Images/9781430246923_Fig07-06.jpg)


    [Figure 7-6.](#9781430246923_Ch07.xhtml#_Fig6) Creating the WineApp database and
    connection


    This last step created a database connection, which is referenced from the persistence
    units in the `persistence.xml` files found in both the JPA and EJB projects. While
    it is possible to pre-create the database objects (tables, sequences, key constraints,
    and so on), we will let JPA create these database objects automatically the first
    time they are needed by each persistence unit.


    ![image](Images/sq.jpg) **Note** The samples for this chapter, like those for
    [Chapter 3](../Text/9781430246923_Ch03.xhtml), include a JDBC data source that
    references these connection details. If you choose to use different credentials,
    make sure that you update the `persistence.xml` files, as well as the data source
    defined in the `glassfish-resources.xml` file in the `Chapter07-IntegratedServices-ejb`
    project.


    ### Creating the JMS and JavaMail Resources


    The MDBs in this integrated application require JMS resources. In [Chapter 5](../Text/9781430246923_Ch05.xhtml),
    we created a JMS topic connection factory and a JMS topic, and we will create
    an additional one of each that will be consumed by the MDBs. Initially, `OrderProcessFacadeBean`
    sends a message to the queue that is consumed by `OrderProcessingMDBBean`. In
    turn, `OrderProcessingMDBBean` uses a JMS topic connection factory to send a message
    to the queue that will be used by `StatusMailerBean` to send out e-mail messages
    to the customer. Each of our topic connection factories also requires a JMS topic
    to be defined.


    If you have not completed the samples in [Chapter 5](../Text/9781430246923_Ch05.xhtml)
    (EJB Message-Driven Beans), follow the steps in that chapter in the section “Creating
    the JMS and JavaMail Resources.” In addition to the resources created for that
    chapter’s samples, you will need to create an additional `TopicConnectionFactory`
    and `Topic`. [Chapter 5](../Text/9781430246923_Ch05.xhtml) will guide you in creating
    these additional resources using the GlassFish admin console.


    The new resources you will need to create are a `TopicConnectionFactory` named
    `poTopicConnectionFactory` and a `Topic` named `PurchaseOrderTopic`.


    ### Opening the Sample Application


    Before performing the next step, you may wish to close any existing projects in
    NetBeans to avoid clutter. Open `Chapter07-ServiceIntegration` using the `File
    Open Project` menu, as shown in [Figure 7-7](#9781430246923_Ch07.xhtml#Fig7).
    Make sure that the ‘`Open Required Projects`’ checkbox is checked.


    ![9781430246923_Fig07-07.jpg](Images/9781430246923_Fig07-07.jpg)


    [Figure 7-7.](#9781430246923_Ch07.xhtml#_Fig7) Opening the Chapter07-ServiceIntegration
    project


    Note that this will open the `Chapter06-WebServiceSamples-ejb` project as well,
    since it is used directly by the [Chapter 7](../Text/9781430246923_Ch07.xhtml)
    samples. Some of the source files will initially be flagged with warnings because
    they are missing dependencies until the EJB Web Service has been configured in
    the next step.


    ### Configuring the EJB Web Service


    We have built our wine store back-end application on top of the work we did in
    [Chapter 6](../Text/9781430246923_Ch06.xhtml), in which we implemented the credit
    service.


    1. The application in this chapter will not compile until you follow the steps
    in [Chapter 6](../Text/9781430246923_Ch06.xhtml) to deploy the Web Service and
    create the Web Service client. These steps are outlined here, but you may wish
    to refer to [Chapter 6](../Text/9781430246923_Ch06.xhtml) for more comprehensive
    instructions for performing these operations. Right-click on the `Chapter06-WebServiceSamples-ejb`
    project, and choose ‘Clean and Build’ followed by ‘Deploy.’

    2. In the `Chapter06-WebServiceSamples` project, open the ‘Web Services’ section,
    right-click on `CreditCheckEndpointBean` and choose ‘Test Web Service.’ When the
    Web page comes up, click on ‘WSDL File’ link, and then copy the browsers URL for
    the `.wsdl` file (typically, `http://localhost:8080/CreditService/CreditCheckEndpointBean?Tester`).

    3. Now right-click on the `Chapter06-WebServiceSamples-ejb` project again, and
    choose ‘New | Web Service Client.’ In the wizard, select the ‘WSDL URL’ radio
    button and paste the `.wsdl` URL you copied in step 2. Set the package to ‘`com.apress.ejb.chapter06.services.client`’
    and choose Finish. This will complete the Web Service configuration required to
    run the [Chapter 7](../Text/9781430246923_Ch07.xhtml) samples.'
  raw: 'The Wines Online application uses a single database schema to store all of
    the information related to customers, orders, inventory, and so on. [Figure 7-5](#9781430246923_Ch07.xhtml#Fig5)
    shows a database diagram with all of the tables and relationships. The schema
    is designed to accommodate or showcase most of the O/R (object/relational) mappings
    in the JPA specification that are covered in this book, including the different
    types of inheritance strategies between entities. Not shown are the tables dedicated
    to ID generation for each root entity in an inheritance hierarchy (for example,
    `BUSINESS_CONTACT_ID_GEN`) or entity not involved in inheritance (for instance,
    `ADDRESS_ID_GEN`).


    ![9781430246923_Fig07-05.jpg](Images/9781430246923_Fig07-05.jpg)


    [Figure 7-5.](#9781430246923_Ch07.xhtml#_Fig5)  Database diagram for the Wines
    Online application


    Building, Deploying, and Testing the Application


    EJBs need to be packaged into EJB JAR (Java Archive) files before they are assembled
    into EAR (Enterprise Archive) files that hold all of the required modules and
    libraries for the application. Most application servers provide deployment utilities
    or Ant tasks to facilitate deployment of EJBs to their containers. Java integrated
    development environments (IDEs) like NetBeans, JDeveloper, and Eclipse provide
    graphical deployment tools that allow developers to package, assemble, and deploy
    applications to application servers. There is no requirement that EJBs have to
    be packaged into EJB JAR files and assembled into EAR files. You can also deploy
    the EJB JAR files themselves. In this chapter, we will assemble them into EAR
    files so that we can make the persistence unit a shared module (in its own JAR
    file), and also to set the stage for [Chapter 12](../Text/9781430246923_Ch12.xhtml),
    in which we will be building client applications for the wine store back-end that
    we have just developed. We will also package the EJB/WebService module from [Chapter
    6](../Text/9781430246923_Ch06.xhtml) into this EAR file, along with a Web module
    that contains a simple test servlet that drives the test scenario.


    Packaging, assembly, and deployment aspects are covered in detail in [Chapter
    11](../Text/9781430246923_Ch11.xhtml). In this chapter, we have developed the
    wine store application back-end using session beans, MDBs, JPA entities, and Web
    Services. Using NetBeans and deploying to GlassFish, we will perform the following
    steps to package, assemble, deploy, and test the services defined in this chapter.


    Prerequisites


    Before performing any of the steps detailed in the next sections, complete the
    “Getting Started” section of [Chapter 1](../Text/9781430246923_Ch01.xhtml), which
    will walk you through the installation and environment setup required for the
    samples in this chapter.


    Creating the Database Connection


    The samples in this chapter require a database connection, and for these tests
    we will use the Derby database that is bundled with NetBeans and Glassfish. If
    you have not already created the WineApp database, also used for the [Chapter
    3](../Text/9781430246923_Ch03.xhtml) and [Chapter 4](../Text/9781430246923_Ch04.xhtml)
    examples, click on the `Services` tab, expand the `Databases` icon, and invoke
    “`Create Database...`” on the `Java DB` node. Create a database named “`WineApp`”
    with username and password `wineapp/wineapp`, as shown in [Figure 7-6](#9781430246923_Ch07.xhtml#Fig6):


    ![9781430246923_Fig07-06.jpg](Images/9781430246923_Fig07-06.jpg)


    [Figure 7-6.](#9781430246923_Ch07.xhtml#_Fig6)  Creating the WineApp database
    and connection


    This last step created a database connection, which is referenced from the persistence
    units in the `persistence.xml` files found in both the JPA and EJB projects. While
    it is possible to pre-create the database objects (tables, sequences, key constraints,
    and so on), we will let JPA create these database objects automatically the first
    time they are needed by each persistence unit.


    ![image](Images/sq.jpg) **Note**   The samples for this chapter, like those for
    [Chapter 3](../Text/9781430246923_Ch03.xhtml), include a JDBC data source that
    references these ­connection details. If you choose to use different credentials,
    make sure that you update the `persistence.xml` files, as well as the data source
    defined in the `glassfish-resources.xml` file in the `Chapter07-IntegratedServices-ejb`
    project.


    Creating the JMS and JavaMail Resources


    The MDBs in this integrated application require JMS resources. In [Chapter 5](../Text/9781430246923_Ch05.xhtml),
    we created a JMS topic connection factory and a JMS topic, and we will create
    an additional one of each that will be consumed by the MDBs. Initially, `OrderProcessFacadeBean`
    sends a message to the queue that is consumed by `OrderProcessingMDBBean`. In
    turn, `OrderProcessingMDBBean` uses a JMS topic connection factory to send a message
    to the queue that will be used by `StatusMailerBean` to send out e-mail messages
    to the customer. Each of our topic connection factories also requires a JMS topic
    to be defined.


    If you have not completed the samples in [Chapter 5](../Text/9781430246923_Ch05.xhtml)
    (EJB Message-Driven Beans), follow the steps in that chapter in the section “Creating
    the JMS and JavaMail Resources.” In addition to the resources created for that
    chapter’s samples, you will need to create an additional `TopicConnectionFactory`
    and `Topic`. [Chapter 5](../Text/9781430246923_Ch05.xhtml) will guide you in creating
    these additional resources using the GlassFish admin console.


    The new resources you will need to create are a `TopicConnectionFactory` named
    `poTopicConnectionFactory` and a `Topic` named `PurchaseOrderTopic`.


    Opening the Sample Application


    Before performing the next step, you may wish to close any existing projects in
    NetBeans to avoid clutter. Open `Chapter07-ServiceIntegration` using the `File
    Open Project` menu, as shown in [Figure 7-7](#9781430246923_Ch07.xhtml#Fig7).
    Make sure that the ‘`Open Required Projects`’ checkbox is checked.


    ![9781430246923_Fig07-07.jpg](Images/9781430246923_Fig07-07.jpg)


    [Figure 7-7.](#9781430246923_Ch07.xhtml#_Fig7)  Opening the Chapter07-ServiceIntegration
    project


    Note that this will open the `Chapter06-WebServiceSamples-ejb` project as well,
    since it is used directly by the [Chapter 7](../Text/9781430246923_Ch07.xhtml)
    samples. Some of the source files will initially be flagged with warnings because
    they are missing dependencies until the EJB Web Service has been configured in
    the next step.


    Configuring the EJB Web Service


    We have built our wine store back-end application on top of the work we did in
    [Chapter 6](../Text/9781430246923_Ch06.xhtml), in which we implemented the credit
    service.


    1.  The application in this chapter will not compile until you follow the steps
    in [Chapter 6](../Text/9781430246923_Ch06.xhtml) to deploy the Web Service and
    create the Web Service client. These steps are outlined here, but you may wish
    to refer to [Chapter 6](../Text/9781430246923_Ch06.xhtml) for more comprehensive
    instructions for performing these operations. Right-click on the `Chapter06-WebServiceSamples-ejb`
    project, and choose ‘Clean and Build’ followed by ‘Deploy.’

    2.  In the `Chapter06-WebServiceSamples` project, open the ‘Web Services’ section,
    right-click on `CreditCheckEndpointBean` and choose ‘Test Web Service.’ When the
    Web page comes up, click on ‘WSDL File’ link, and then copy the browsers URL for
    the `.wsdl` file (typically, `http://localhost:8080/CreditService/CreditCheckEndpointBean?Tester``)`.

    3.  Now right-click on the `Chapter06-WebServiceSamples-ejb` project again, and
    choose ‘New | Web Service Client.’ In the wizard, select the ‘WSDL URL’ radio
    button and paste the `.wsdl` URL you copied in step 2\. Set the package to ‘`com.apress.ejb.chapter06.services.client`’
    and choose Finish. This will complete the Web Service configuration required to
    run the [Chapter 7](../Text/9781430246923_Ch07.xhtml) samples.'
