    任何数据库约束或并发条件（无论是在数据库中实施还是在 EJB 容器中实施）都保证在通过 EJB 服务提交事务时得到满足。违反这些条件将导致 EJB 容器抛出异常，并且事务将自动回滚。成功提交表明所有定义的约束条件均已满足。


    隔离性


    此要求主要取决于底层 JTA 资源。每个资源都可能公开其自己的可配置隔离级别设置，以便为事务中涉及的资源提供不同程度的一致性。隔离级别决定了事务内的资源能够看到事务中其他资源的部分（事务中）状态的程度，并且主要转化为资源内的缓存一致性设置。隔离性还确保事务不应看到另一个事务的未提交数据。为了保持数据库中立性，我们的示例未尝试配置这些设置。


    持久性


    这同样主要取决于事务中涉及的底层 JTA 资源（例如，数据库或邮件服务器）。在 JTA 事务结束时，任何此类资源在被查询时都应能够显示数据的新状态。我们通过以下方式演示了这一点：在
    `createCustomerOrder()` 方法及其封装的事务完成后，从客户端查询新的 `CustomerOrder` 的详细信息。


    此方法的优点


    使用带有 CMT 划分的默认无状态会话 Bean 的一个主要优点是，客户端无需关心事务逻辑的开始、结束或其他协调工作。此外，调用 Bean 方法的线程上当前生效的任何事务上下文都会自动传播到该方法调用（如果事务属性是
    `REQUIRED` 或 `SUPPORTS`）。对 `OrderProcessorCMT` Bean 的每次调用要么成功完成（在这种情况下可以假定工作已持久应用），要么导致异常（在这种情况下，该方法中执行的工作将完全回滚）。这是一个非常简单的模型。


    此方法的局限性


    通常，简单是好的，但有时它过于局限。虽然此示例允许客户端在客户端层创建和操作新的实体实例（例如，当它创建 `Customer`、`Wine` 和 `CartItem`
    实例时），但客户端必须依赖 EJB 来确保其对实体模型所做的更新在事务内持久化到数据库，因为事务总是在控制权交还给客户端之前由 EJB 容器启动和终止。


    在下一个示例中，我们将展示如何使用有状态会话 Bean，结合 BMT 和扩展持久化上下文，使客户端在应用程序的事务行为方面拥有更大的灵活性（以及相应的责任）。


    ![image](img/sq.jpg) **注意**   EJB 用户中普遍存在一种观念，即出于性能原因应避免使用有状态会话 Bean。我们进行的性能测试强烈表明，有状态会话
    Bean 被错误地诋毁了，并且如果正确使用，它们实际上可以提高性能。此外，在 EJB 中，它们的价值得到了提升，因为它们为您提供了 `PersistenceContext.EXTENDED`
    选项，允许跨事务缓存实体实例以供使用。


    带有 BMT 划分和扩展持久化上下文的有状态会话 Bean


    为了说明扩展 EJB 事务支持的范围，以下是使用有状态 BMT 会话 Bean `OrderProcessorBMTBean.java` 编写的相同应用程序。此
    BMT 示例也利用了 EJB 的内置事务支持，但并非依赖容器在方法边界管理事务划分，而是展示了如何在企业 Bean 代码内部显式划分事务，并且也可以从客户端进行控制。


    使用有状态会话 Bean 时，不要求您使用 BMT 划分，实际上此选项通常不被使用。我们在清单 8-5 中展示它，以说明如果您愿意，应如何使用它。


