    }\n```\n\n[列表 2-3](#9781430246923_Ch02.xhtml#list3) 展示了`SearchFacade`本地业务接口的代码片段，其中包含`@Local`注解和一个`wineSearch()`方法声明。\n\
    \n[***列表 2-3.***](#9781430246923_Ch02.xhtml#_list3)  SearchFacadeLocal.java\n\n\
