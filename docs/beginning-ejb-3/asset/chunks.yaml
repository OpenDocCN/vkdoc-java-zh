    \n## CHAPTER 10\n\n![image](Images/frontdot.jpg)\n\n## Contexts and Dependency\
    \ Injection\n\nIn this chapter, we will discuss *Contexts and Dependency Injection*\
    \ (CDI). CDI provides powerful services to *glue* the various tiers of the Java\
    \ EE framework together. The first public draft of *Java Contexts and Dependency\
