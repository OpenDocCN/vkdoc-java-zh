  raw: 'The JAX-WS specification provides the `@WebServiceRef` annotations that can
    be used to declare a reference to a Web service, which in our case is `CreditService`.


    The `@WebServiceRef` annotation can take the parameters described in [Table 6-5](#9781430246923_Ch06.xhtml#Tab5).


    [Table 6-5](#9781430246923_Ch06.xhtml#_Tab5). The @WebServiceRef Annotation


    | Parameter | Description | Additional Info |

    | --- | --- | --- |

    | `name` | The name that identifies the Web service reference | The name that
    is local to the application component using the resource |

    | `wsdlLocation` | The URL pointing to the location of the WSDL document |  |

    | `type` | The resource type |  |

    | `value` | The service type |  |

    | `mappedName` | The physical name of the resource used to map the resource to
    a vendor-specific container |  |


    Developing a Web Service Client Program


    The `@WebServiceRef` annotation either provides a reference to the SEI generated
    by the container, or a reference to the SEI provided by the application developer.
    [Listing 6-13](#9781430246923_Ch06.xhtml#list13) shows a servlet class that is
    going to be a Web service client. In this servlet class, `CreditServiceClient`,
    we are using dependency injection to inject the credit service that we have deployed
    earlier as a Web service. The `@WebServiceRef` annotation is used to inject the
    `CreditService` that has been generated as the proxy class. Once we have the injected
    the available resource, we use that proxy class to get the Web service port using
    the `getCreditCheckEndpointBeanPort()` method. After successfully getting the
    port, we can invoke the operations that are available on the port. In our case,
    we have defined only one operation, `creditCheck`. You can see that this is being
    invoked with a credit card number of 12345678.


    ***[Listing 6-13](#9781430246923_Ch06.xhtml#_list13).***  CreditServiceClient.java


    ```

    package com.apress.ejb.chapter06.client;

    import com.apress.ejb.chapter06.services.client.CreditCheckEndpointBean;

    import com.apress.ejb.chapter06.services.client.CreditService;

    import java.io.IOException;

    import java.io.PrintWriter;

    import javax.servlet.ServletException;

    import javax.servlet.annotation.WebServlet;

    import javax.servlet.http.HttpServlet;

    import javax.servlet.http.HttpServletRequest;

    import javax.servlet.http.HttpServletResponse;

    import javax.xml.ws.WebServiceRef;


    @WebServlet(name = "CreditServiceClient", urlPatterns = {"/CreditServiceClient"})

    public class CreditServiceClient extends HttpServlet {

          @WebServiceRef(wsdlLocation = "http://localhost:64082/CreditService/CreditCheckEndpointBean?WSDL")

          CreditService service;

        protected void processRequest(HttpServletRequest request, HttpServletResponse
    response)

                throws ServletException, IOException {

            response.setContentType("text/html;charset=UTF-8");

            PrintWriter out = response.getWriter();

            try {

                out.println("<html>");

                out.println("<head>");

                out.println("<title>Servlet CreditServiceClient</title>");

                out.println("</head>");

                out.println("<body>");

                CreditCheckEndpointBean creditService = service.getCreditCheckEndpointBeanPort();

                out.println("<h1>Credit Check returned: " + creditService.creditCheck("12345678")
    + "</h1>");

                out.println("</body>");

                out.println("</html>");

            } finally {

                out.close();

            }

        }

        @Override

        protected void doGet(HttpServletRequest request, HttpServletResponse response)

                throws ServletException, IOException {

            processRequest(request, response);

        }


    @Override

        protected void doPost(HttpServletRequest request, HttpServletResponse response)

                throws ServletException, IOException {

            processRequest(request, response);

        }


    @Override

        public String getServletInfo() {

            return "Short description";

        }

    }

    ```


    Compiling the Client Class'
  trans: '

    JAX-WS 规范提供了 `@WebServiceRef` 注解，可用于声明对 Web 服务的引用，在本例中该服务为 `CreditService`。


    `@WebServiceRef` 注解可以接受表 6-5 中描述的参数。


    表 6-5. @WebServiceRef 注解


    | 参数 | 描述 | 附加信息 |

    | --- | --- | --- |

    | `name` | 标识 Web 服务引用的名称 | 使用该资源的应用程序组件本地的名称 |

    | `wsdlLocation` | 指向 WSDL 文档位置的 URL |  |

    | `type` | 资源类型 |  |

    | `value` | 服务类型 |  |

    | `mappedName` | 用于将资源映射到特定供应商容器的资源物理名称 |  |


    开发 Web 服务客户端程序


    `@WebServiceRef` 注解要么提供对容器生成的 SEI 的引用，要么提供对应用程序开发者提供的 SEI 的引用。清单 6-13 展示了一个将作为
    Web 服务客户端的 Servlet 类。在这个名为 `CreditServiceClient` 的 Servlet 类中，我们使用依赖注入来注入之前作为
    Web 服务部署的信用服务。`@WebServiceRef` 注解用于注入已生成为代理类的 `CreditService`。一旦我们注入了可用的资源，我们就使用该代理类通过
    `getCreditCheckEndpointBeanPort()` 方法获取 Web 服务端口。成功获取端口后，我们可以调用该端口上可用的操作。在本例中，我们只定义了一个操作
    `creditCheck`。你可以看到，该操作正在使用信用卡号 12345678 进行调用。


    ***清单 6-13.***  CreditServiceClient.java


    ```

    package com.apress.ejb.chapter06.client;

    import com.apress.ejb.chapter06.services.client.CreditCheckEndpointBean;

    import com.apress.ejb.chapter06.services.client.CreditService;

    import java.io.IOException;

    import java.io.PrintWriter;

    import javax.servlet.ServletException;

    import javax.servlet.annotation.WebServlet;

    import javax.servlet.http.HttpServlet;

    import javax.servlet.http.HttpServletRequest;

    import javax.servlet.http.HttpServletResponse;

    import javax.xml.ws.WebServiceRef;


    @WebServlet(name = "CreditServiceClient", urlPatterns = {"/CreditServiceClient"})

    public class CreditServiceClient extends HttpServlet {

          @WebServiceRef(wsdlLocation = "http://localhost:64082/CreditService/CreditCheckEndpointBean?WSDL")

          CreditService service;

        protected void processRequest(HttpServletRequest request, HttpServletResponse
    response)

                throws ServletException, IOException {

            response.setContentType("text/html;charset=UTF-8");

            PrintWriter out = response.getWriter();

            try {

                out.println("<html>");

                out.println("<head>");

                out.println("<title>Servlet CreditServiceClient</title>");

                out.println("</head>");

                out.println("<body>");

                CreditCheckEndpointBean creditService = service.getCreditCheckEndpointBeanPort();

                out.println("<h1>Credit Check returned: " + creditService.creditCheck("12345678")
    + "</h1>");

                out.println("</body>");

                out.println("</html>");

            } finally {

                out.close();

            }

        }

        @Override

        protected void doGet(HttpServletRequest request, HttpServletResponse response)

                throws ServletException, IOException {

            processRequest(request, response);

        }


    @Override

        protected void doPost(HttpServletRequest request, HttpServletResponse response)

                throws ServletException, IOException {

            processRequest(request, response);

        }


    @Override

        public String getServletInfo() {

            return "Short description";

        }

    }

    ```


    编译客户端类

