    带有 Web 服务注解的无状态会话 Bean 在部署到 EJB 容器之前，需要打包成 *EJB Java 归档（JAR）* 文件。对于某些 EJB 容器或应用服务器，它们首先需要被组装成
    EAR [企业归档] 文件。大多数 EJB 容器或应用服务器都提供部署工具或 Ant 任务，以方便将 EJB 部署到其容器中。像 JDeveloper、NetBeans
    和 Eclipse 这样的 Java 集成开发环境（IDE）也提供部署功能，允许开发者打包、组装并将 EJB 部署到应用服务器。打包、组装和部署方面的内容在第
    11 章中有详细说明。


    在本章中，我们开发了一个带有 Web 服务注解的无状态会话 Bean（`CreditCheckEndpointBean`）。我们将执行以下步骤来编译、部署和测试这个将被发布为
    Web 服务的无状态会话 Bean。


    前提条件


    在执行后续章节详述的任何步骤之前，请先完成第 1 章的“入门”部分，该部分将引导您完成本章示例所需的安装和环境设置。


    编译会话 Bean


    将 `Chapter06-WebServiceSamples` 目录及其内容复制到您选择的目录中。运行 NetBeans IDE，并使用 `File ->
    Open Project` 菜单打开 `Chapter06-WebServiceSamples` 项目。确保选中“`Open Required Projects''`”复选框，如图
    6-5 所示。


    ![9781430246923_Fig06-05.jpg](img/9781430246923_Fig06-05.jpg)


    图 6-5.  打开 Chapter06-WebServiceSamples 项目


    展开 `Chapter06-WebServiceSamples-ejb` 节点，观察我们创建的基于会话 Bean 的 Web 服务出现在 `com.apress.ejb.chapter06.services`
    包中。类似地，客户端 Servlet 也出现在 `Chapter06-WebServiceSamples`-war 节点下。


    ![9781430246923_Fig06-06.jpg](img/9781430246923_Fig06-06.jpg)


    图 6-6.  验证会话 Bean 及其客户端在项目中可用


    在 `Chapter06-WebServiceSamples` 节点上调用上下文菜单，并通过选择 `Clean and Build` 菜单选项来构建应用程序。基于会话
    Bean 的 Web 服务将无错误地编译，但 `Chapter06-WebServiceSamples`-war 节点中的客户端将显示编译错误。我们暂时忽略客户端中的这些错误。


    ![9781430246923_Fig06-07.jpg](img/9781430246923_Fig06-07.jpg)


    图 6-7.  构建应用程序


    部署基于会话 Bean 的 Web 服务


    一旦我们编译了会话 Bean，就可以将其部署到 GlassFish 应用服务器。在 `Chapter06-WebServiceSamples-ejb` 节点上调用上下文菜单，并通过选择
    `Deploy` 菜单选项来部署应用程序，如图 6-8 所示。


    ![9781430246923_Fig06-08.jpg](img/9781430246923_Fig06-08.jpg)


    图 6-8.  部署 CreditService


    测试信用服务


    成功部署后，我们可以使用测试工具来查看 `CreditService` 是否可以被正确调用。要调用测试工具，请展开 `Chapter06-WebServiceSamples-ejb`
    下的 `Web Services` 节点以显示 `CreditCheckEndpointBean` 节点，然后选择 `Test Web Service` 菜单选项，如图
    6-9 所示。


    ![9781430246923_Fig06-09.jpg](img/9781430246923_Fig06-09.jpg)


    图 6-9.  测试 CreditService


    在生成的测试工具页面（如图 6-10 所示）中，输入 **12345** 作为信用卡号，然后点击 `creditCheck` 按钮。您也可以点击 `WSDL
    File` 链接来检查其内容。请将 WSDL `File` URL 加入书签，因为它将在后续章节中用于创建 Web 服务客户端。


    ![9781430246923_Fig06-10.jpg](img/9781430246923_Fig06-10.jpg)


    图 6-10.  Web 服务测试工具


    在生成的页面中，您可以使用 SOAP 请求和响应来测试结果，如图 6-11 所示。


    ![9781430246923_Fig06-11.jpg](img/9781430246923_Fig06-11.jpg)


    图 6-11.  SOAP 请求和响应消息


    到目前为止，我们已经了解了如何使用测试工具测试已部署的 Web 服务。在下一节中，我们将讨论 Web 服务客户端，以及如何开发和运行能够调用 Web 服务的程序。在我们的案例中，我们将针对已部署的信用服务进行测试。


    Web 服务客户端视图


    发布为 Web 服务的无状态会话 Bean 可以通过部署期间生成的 WSDL 文档所描述的客户端视图进行访问（如清单 6-7 所示）。由于无状态会话 Bean
    是使用 WSDL 等标准发布为 Web 服务的，因此任何能够发送和接收 SOAP 消息（无论技术或语言）的客户端应用程序都可以调用它。客户端应用程序可以使用
    .NET 或 Java EE 编写，也可以使用 PHP、Python 或 Ruby 等脚本语言编写。从客户端的角度来看，它看到的契约是一个 WSDL 文档。为了访问
    Web 服务，应该从 WSDL 文档生成编程接口。


    Web 服务是位置无关的，并且可以远程访问。如果调用 Web 服务的客户端应用程序是 Java 客户端或其他 Java EE 组件（例如 EJB），则它使用
    JAX-WS 客户端 API 或注解通过 SOAP 和 HTTP 调用 Web 服务。


    开发访问 Web 服务的 Java 客户端


    为了通过 WSDL 服务契约访问 Web 服务，客户端程序需要从 WSDL 文档生成的编程接口（通常称为 *存根* 或 *代理*）。一旦从 WSDL 文档生成了存根，我们就可以使用
    JAX-WS 注解来获取对 Web 服务的引用并调用它。


    生成 Web 服务代理类


    我们将首先使用 NetBeans IDE 提供的 `Web Service Client` 向导为 `CreditService` WSDL 文档生成存根。从
    `Chapter06-WebServiceSamples-ejb` 节点的上下文菜单中调用 `Web Service Client` 向导，如图 6-12
    所示。


    ![9781430246923_Fig06-12.jpg](img/9781430246923_Fig06-12.jpg)


    图 6-12.  调用 Web Service Client 向导


    在 `Web Service Client` 向导中，选择 `WSDL URL` 单选按钮，并输入您在前面的章节中已加入书签的 `WSDL File` URL（参见图
    6-10）。我们还需要指定将生成客户端 Java 工件的包。我们将在 `com.apress.ejb.chapter06.services.client`
    包中生成这些工件。输入这些详细信息，如图 6-13 所示，然后完成向导。


    ![9781430246923_Fig06-13.jpg](img/9781430246923_Fig06-13.jpg)


    图 6-13.  创建 Web Service Client


    一旦存根生成并编译完成，我们就可以在 `Generated Sources (jax-ws)` 节点下看到工件。


    ![9781430246923_Fig06-14.jpg](img/9781430246923_Fig06-14.jpg)


    图 6-14.  验证生成的存根源


    ![image](img/sq.jpg) **注意**   GlassFish 还提供了命令行工具 `wsimport.bat`，给定一个有效的 WSDL
    文档，它可以生成 Web 服务存根。如果您将 Web 服务部署到其他兼容 Java EE 的服务器，这些服务器也可能提供一些工具或实用程序来生成 Web 服务的存根。


    一旦存根生成并编译完成，下一步就是创建一个将消费 `CreditService` 的客户端。

