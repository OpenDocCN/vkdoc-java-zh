    *   **实体**是具有唯一标识且代表持久化业务数据的对象。


    会话 Bean 和消息驱动 Bean 是 EJB，它们通常被统称为企业**Bean**。在早期版本的 EJB 中，实体被称为实体 Bean，也属于这一类别。然而，在
    EJB 3 中，实体现在由持久化提供者管理，而非 EJB 容器，因此它们不再被视为企业 Bean。


    EJB 容器


    EJB 容器提供了 EJB 组件运行所需的支撑环境。该环境提供事务和安全服务、资源池化和缓存、组件生命周期服务、并发支持等功能——本书将逐一探讨这些内容。EJB
    组件通过使用 EJB 特定的元数据来指定它们希望如何与支撑容器进行交互，这些元数据要么由容器捕获并在运行时应用于 EJB 的行为，要么在 EJB 组件部署到
    EJB 容器时被解释，并用于构建包装。


    EJB 开发模型的核心特性


    在其整个发展历程中，EJB 始终专注于交付具备若干核心特性的组件。


    声明式元数据


    EJB 组件模型的一个显著特点是，开发者能够使用 Java 注解和/或 XML 描述符，以**声明式**（而非**编程式**）的方式指定企业 Bean 和实体的行为。这极大地简化了开发过程，因为无需在
    Java 源代码中掺杂服务实现代码，即可为 Bean 添加大量定制功能。为了兼顾开发者偏好和应用程序的灵活性，EJB 为开发者提供了注解和 XML 两种选择，并允许在同一
    EJB 或实体中同时使用这两种方法来指定元数据中的行为。当同一元数据片段在注解和 XML 中均有定义时，XML 声明在解决冲突时具有更高优先级。本章后续的“EJB
    3 简化开发模型”部分将进一步探讨此方法的其他优势。


    例外配置


    与声明式指定行为的能力相辅相成的是 EJB 中对智能默认值的强力运用。许多行为会自动附加到 EJB 或实体上，而无需显式声明，例如会话 Bean 方法的事务行为，以及映射到实体持久化数据属性的表和列的名称。仅当需要非默认行为时，才需要显式指定注解或
    XML 中的对应项。在利用默认行为的最常见情况下，这种方法能产生非常精简、干净的代码。这种开发模型被称为*例外配置*，因为只有在例外（非默认）情况下，才需要显式配置组件的行为。


    可伸缩性


    大规模应用程序要求随着客户端负载的增加而具有良好的伸缩能力。EJB 服务器采用资源池化来最大化对象复用，利用持久化缓存来避免重复查询或创建相同对象，并在中间层实现乐观锁定策略，以减轻关系数据库管理系统（RDBMS）的负载并避免并发锁定问题。EJB
    容器还管理 EJB 的生命周期，允许释放和复用依赖资源以优化性能。


    位置透明性


    EJB 可以配置为远程访问，从而允许通过网络连接进行访问。客户端（可能是另一个 EJB）只需请求一个远程 EJB 的实例，本地和远程 EJB 容器就会透明地管理通信细节。


    事务性


    Java 事务 API（JTA）定义了分布式事务的标准 API，而 EJB 容器充当 EJB 的 JTA 事务管理器。自诞生以来，EJB 规范就定义了一个标准模型，用于在企业
    Bean 上以声明方式指定容器管理的事务行为。


    多用户安全性


    可以在 EJB 上以声明方式指定方法级别的访问控制，从而强制执行由应用服务器管理员定义的用户和角色级别权限。


    可移植性


    符合规范的 EJB 至少理论上可以部署到任何实现了 EJB 的应用服务器上。在实践中（在 EJB 3 之前的版本中尤其如此），供应商提供了自己的元数据定义，企业
    Bean 开发者逐渐依赖这些定义，从而被锁定在特定供应商的实现中。随着 EJB 的成熟，它已经逐渐吸收了这些以前是平台特定的特性，因此今天实现的 EJB 比过去具有更强的可移植性。


    可复用性


    EJB 是松耦合的组件。一个 EJB 可以被复用并打包到多个应用程序中，但它必须与它所依赖的 EJB 的业务接口捆绑在一起，或者能够访问这些接口。


    持久化


    尽管 JPA 实体不再包含在 EJB 规范中，但它们是 EJB 的重要补充。实体是具有唯一标识的持久化领域对象。一个实体类映射到一个数据库表，每个实体实例由该表中的一行数据表示。


