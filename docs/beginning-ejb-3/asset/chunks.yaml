    \n[***清单4-1.***](#9781430246923_Ch04.xhtml#_list1) `Person.java`，`SINGLE_TABLE`继承层次结构中的抽象根实体\n\
    \n```\n/*\n * Person: An abstract entity, and the root of an inheritance hierarchy\n\
