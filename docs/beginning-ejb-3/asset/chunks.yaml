    ## Polymorphic Relationships\n\nAs shown in the previous examples, entity relationships\
    \ can be specified between both concrete and abstract entities in a hierarchy.\
    \ You can define a relationship with any entity in an inheritance hierarchy, and\
    \ it will implicitly involve subtypes of that entity as well. Even persistent\
    \ entity relationship fields declared on mapped superclasses are polymorphic.\
    \ A relationship that implicitly includes subtypes in this way is known as a *polymorphic\
    \ relationship*.\n\nIn JPA, relationships may be defined against any other entity\
    \ class, including abstract supertype entities in a hierarchy. This support for\
    \ polymorphic relationships complements JPA’s support for mapping class hierarchies,\
    \ and it provides a powerful construct for querying entities at any level across\
    \ an entity type hierarchy. In the previous example of entity hierarchy, the `FullTimeEmployee.manager`-to-`Employee.managedEmployees`\
    \ relationship illustrates a one-to-many, bidirectional relationship between the\
    \ concrete `FullTimeEmployee` (`manager`) and its collection of abstract `Employee`\
    \ (`managedEmployee`) instances. This example shows a relationship between entities\
    \ within the same hierarchy, but it could just as easily be defined between entities\
    \ in separate entity hierarchies.\n\n### Relationship Mapping\n\nMapping polymorphic\
    \ relationships requires no special knowledge about the inheritance table mapping\
    \ strategy for either entity in the relationship. This is evident from the fact\
    \ that the relationship field mappings remained identical across our sample entity\
    \ classes as we applied each of the three inheritance mapping strategies. All\
    \ relationships map to the primary key of the target class, a mapping assumption\
    \ made possible because of the spec requirement that all classes in a class hierarchy\
    \ share a common primary key structure, even if each subclass maps to its own\
    \ table. The mapping information defined for each entity is sufficient for the\
    \ JPA persistence framework to resolve base type references onto the actual subclass\
    \ instances. Relationship fields are derived automatically using `JOIN` and `UNION`\
    \ statements, and these queries are further constrained by the use of `WHERE`\
    \ clauses, which refer to discriminator column values.\n\n### Polymorphic JPQL\
    \ Queries\n\nSimilarly, JPQL and criteria API queries can select or join entities\
    \ of a supertype class, and any instances of subtypes matching the query criteria\
    \ will be returned in the query result list. What’s more, queries may use internal\
    \ `JOIN` clauses to bind references to types anywhere along a supertype hierarchy,\
    \ with the only restriction being that the left and right side of the `JOIN` clause\
