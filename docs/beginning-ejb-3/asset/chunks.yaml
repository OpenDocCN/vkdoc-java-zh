    \ \" 的 ID 为 \" + wine.getId());\n}\nout.println(\"完成</h2>\");\n\n//  提交订单，应用到目前为止所做的所有更改\n\
    orderProcessorBMT.commitTransaction();\n```\n\n如果客户端希望在此阶段取消订单，例如通过客户端面板中暴露的交互式确认/取消按钮，BMT\
    \ 选项即使在 `CustomerOrder` 创建后也提供了这种可能性。\n\n**这种方法的优势**\n\n使用显式事务划分的好处在于它提供了额外的灵活性。EJB\
    \ 服务器仍然扮演着事务管理器的角色，只是它将事务划分控制权暴露给企业 Bean，而不是基于每个方法上的 `@TransactionAttribute` 设置来自动化这种划分。虽然无状态示例可以在创建\
    \ `CustomerOrder` *之前*提示用户，但这种方法允许先创建并验证 `CustomerOrder`——例如，在提交给用户确认之前。然而，由于下一节中提到的原因，必须谨慎使用\
    \ BMT。\n\n**这种方法的局限性**\n\n可以说，额外的灵活性通常被跟踪事务状态和避免会话 Bean 客户端误用的额外负担所抵消。将开始和结束事务的过程交由客户端调用会话\
    \ Bean 方法的顺序来决定，可能会产生悬空事务。客户端需要与 Bean 本身协调，负责干净地结束（无论是提交还是回滚）每个已开始的事务。如果你能控制客户端如何使用\
    \ Bean，这可能是一个合理的风险——但会话 Bean 是公开发布的，很难预测谁会使用它们以及如何使用。\n\n可以编写 BMT 会话 Bean 来防止误用，但这种防护代码很可能最终使\
    \ Bean 的行为与 CMT Bean 类似，在这种情况下，你的努力几乎没有什么收获。\n\n**构建、部署和测试：来自 Wines Online 应用的一个事务场景**\n\
    \n现在我们已经研究了 EJB 提供的事务支持的许多细节，让我们执行刚刚介绍过的测试用例。\n\n对于 CMT 和 BMT 场景，我们都调用一个 Servlet\
    \ 客户端，该客户端创建一个新客户，构建一个由购物车项组成的购物车，然后根据购物车中的购物车项创建一个包含订单项的客户订单。我们选择这些示例作为本章的内容，是因为它们涉及多个操作，可以根据客户端的需求将这些操作划分为粒度或大或小的事务工作单元。\n\
    \n为了说明 EJB 提供的默认支持，我们使用首先探讨的示例：一个使用默认 CMT 划分的标准无状态会话 Bean 实现。在第二个示例中，我们演示客户端承担部分事务管理责任，使用一个采用\
    \ BMT 划分和扩展持久化上下文的有状态会话 Bean。\n\n**前提条件**\n\n在执行后续章节详述的任何步骤之前，请先完成第 1 章的“入门”部分。该部分将引导你完成本章示例所需的安装和环境设置。\n\
    \n**打开示例应用**\n\n本章的根项目依赖于 `Chapter07-ServiceIntegration-jpa` 中定义的 JPA 持久化单元。启动\
    \ NetBeans IDE，并使用 `File Open Project` 菜单打开 `Chapter08-TransactionSamples` 项目。确保选中“`Open\
    \ Required Projects`”复选框。\n\n![9781430246923_Fig08-01.jpg](img/9781430246923_Fig08-01.jpg)\n"
- fmt: '# Figure 8-1. Opening the `Chapter08-TransactionSamples` project


    This application consists of three modules: A JPA persistence unit taken directly
    from [Chapter 7](../Text/9781430246923_Ch07.xhtml); an EJB module containing CMT
    and BMT session beans explored in this chapter; and a Web module containing the
    two servlet clients that we also examined.


    ![9781430246923_Fig08-02.jpg](Images/9781430246923_Fig08-02.jpg)


    **Figure 8-2.** Observing the structure of the `Chapter08-TransactionSamples`
    application


    ## Creating the Database Connection


    The samples in this chapter require a database connection, and for these tests
    we will use the Derby database that is bundled with NetBeans and Glassfish. If
    you have already created the `WineApp` database, also used for the examples in
    [Chapter 3](../Text/9781430246923_Ch03.xhtml), [Chapter 4](../Text/9781430246923_Ch04.xhtml),
    and [Chapter 7](../Text/9781430246923_Ch07.xhtml), continue to the next step.
    Otherwise, click on the `Services` tab, expand the `Databases` icon, and invoke
    “`Create Database...`” on the `Java DB` node. Create a database named “`WineApp`”
    with username and password `wineapp/wineapp`:


    ![9781430246923_Fig08-03.jpg](Images/9781430246923_Fig08-03.jpg)


    **Figure 8-3.** Creating the `WineApp` database and connection


    This last step created a database connection, which is referenced from the persistence
    units in the `persistence.xml` files found in both the JPA and EJB projects. While
    it is possible to pre-create the database objects (tables, sequences, key constraints,
    etc.), we will let JPA create these database objects automatically the first time
    they are needed by each persistence unit.


    ## Compiling the Sources


    After the `WineApp` database has been created, invoke the context menu on `Chapter08-TransactionSamples`
    node, and build the application by selecting the `Clean and Build` menu option:


    ![9781430246923_Fig08-04.jpg](Images/9781430246923_Fig08-04.jpg)


    **Figure 8-4.** Building the application


    ## Deploying and Running the Client Programs


    Once the project sources have built successfully, invoke the same menu and choose
    `Deploy`. When that completes, invoke either the `Run` or `Debug` menu item to
    launch the `OrderProcessorCMTClient` servlet. We have preconfigured the `Chapter09-TransactionSamples`
    project to run this servlet by default. The servlet will display the output from
    the example using the default browser configured for NetBeans:


    ![9781430246923_Fig08-05.jpg](Images/9781430246923_Fig08-05.jpg)


    **Figure 8-5.** Output from running the `OrderProcessorCMTClient` servlet


    If you choose to debug, feel free to add some breakpoints to the `OrderProcessorCMTBean.java`
    session bean, the `OrderProcessorCMTClient.java` servlet, the JPA entities, or
    any of the other source files in the application.


    Next, launch the second example, the `OrderProcessorBMTClient` servlet. To do
    this, you may either update your browser URL to replace `CMT` with `BMT` or update
    the properties of the `Chapter09-TransactionSamples` project. This latter approach
    is performed by right-clicking on this project and choosing `Properties` and then
    selecting the `Run` category as shown in [Figure 8-6](#9781430246923_Ch08.xhtml#Fig6):


    ![9781430246923_Fig08-06.jpg](Images/9781430246923_Fig08-06.jpg)


    [**Figure 8-6.**](#9781430246923_Ch08.xhtml#_Fig6) Configuring the `Chapter09-TransactionSamples`
    project’s Run target


    ![image](Images/sq.jpg) **Note** The first time you run each example servlet,
    the tables required by the persistence unit will be created in the `WineApp` database
    automatically. On subsequent runs you will see a number of SQL warnings and errors
    in the log window, which you can ignore. The persistence units in these samples
    are configured to use a table generation strategy of `create-tables`, meaning
    JPA will always attempt to create the tables when the persistence unit is instantiated
    by a client. Once the schema has been created for a persistence unit, you may
    wish to update the `persistence.xml` file (there is one in `Chapter07-ServiceIntegration-jpa`
    and one in `Chapter09-TransactionSamples`) through their editor to reset the strategy
    to `none`.


    ## Conclusion


    This chapter has defined the concepts essential to all transaction behavior and
    explored the transactional features offered by the EJB server and interfaces accessible
    to the enterprise bean developer.


    We began by exploring the core ACID characteristics that define a transaction—atomicity,
    consistency, isolation, and durability. We introduced JTA and described the features
    and benefits of its distributed transaction model, including the behavior of the
    essential two-phase commit protocol.


    We looked at how the EJB server acts as a JTA transaction manager, allowing EJBs
    to participate seamlessly in distributed transactions, and alleviating bean developers
    of the need to explicitly bind persistence or other transactional operations with
    transactional resources. We also detailed EJB’s declarative support for these
    transaction services to enterprise bean developers, exploring both CMT and BMT
    demarcation–supported enterprise beans, and using both implicit and explicit commit
    models. For CMT beans, we described the behavior and implications of each of the
    six transaction attributes that may be used to define the transactional behavior
    of a CMT bean method. In the JPA realm, we explored the relationship between transactions
    and persistence contexts, and explained how extended persistence contexts may
    be used with stateful session beans to support entities in resolving relationships
    with other entities, even outside of a transactional context.


    The chapter then examined some live examples based on a scenario taken from the
    Wines Online application. These examples illustrated the use of CMT and BMT demarcation,
    extended persistence context on stateful session beans, rollback scenarios, client-controlled
    transactions, interactions with entities outside a transactional context using
    a BMT bean, and transaction context propagation between methods on a CMT bean.


    We concluded with steps for running the CMT and BMT example applications that
    we examined.


    In the next chapter, we will explore some techniques you can use to analyze the
    EJB-specific performance of your applications. Using a couple of common examples,
    we will demonstrate how you can set up your own tests to analyze your specific
    application components.


    # CHAPTER 9


    ![image](Images/frontdot.jpg)


    # EJB 3 Performance and Testing


    As developers, we are always trying to find the most efficient way to write code
    that delivers the highest performance. Over the years, we have learned that some
    of the assumptions we make are not always right and that certain programming models
    and techniques that we use do not achieve the expected level of performance. The
    surprise here is that most of the time, our expectations are defeated with models
    and techniques that our logic and gut feelings tell us are best.'
