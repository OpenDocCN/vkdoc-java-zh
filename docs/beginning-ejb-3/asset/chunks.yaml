    ## The Application Client Container


    We have mentioned and used the application client container in earlier chapters,
    and we have shown a couple of application architectures in [Figure 12-4](#9781430246923_Ch12.xhtml#Fig4)
    and [Figure 12-5](#9781430246923_Ch12.xhtml#Fig5). Application clients or client
    programs that are developed using technologies like Java Swing can be run in stand-alone
    Java SE environments. Application client containers provide additional system
    services (such as security and deployment) that client programs can use during
    execution.


    An application client can leverage authentication services provided by the application
    client container for authenticating its users. The container’s service may be
    integrated with the native platform’s authentication system to provide single
    sign-on capability to the enterprise users.


    Client programs using an application client container can invoke EJBs. Similar
    to other Java EE components, programs running in a client container can use the
    Java Naming and Directory Interface (JNDI) to look up EJBs or resources like Java
    Message Service (JMS) and JavaMail. Application client containers also provide
    injection facilities to client programs. Since application client containers do
    not create instances of an application client, static fields and methods should
    be used for injecting any resources.


    Application clients are packaged into JAR files. If an application client container
    is used to run the client programs, then you will have to bundle or package the
    application client container along with the application so that you can run it
    on individual desktop machines.


    ## Conclusion


    In this chapter, we introduced different application architectures that you can
    use to meet different requirements, as well as the programming models that go
    along with them. We looked at architectures that are useful for Web and desktop
    applications, and we also looked at Web service client applications and business
    process services that can make use of EJBs published as Web services.


    We discussed how Java EE based Web technologies have evolved, resulting in significantly
    simplified Web application development.


    We drilled down into JSF architecture, the JSF lifecycle, and JSF applications,
    as well as the current state of tools and UI components for JSF.


    Ultimately, we built a comprehensive JSF application to communicate with the integrated
    EJB back-end application developed in [Chapter 7](../Text/9781430246923_Ch07.xhtml).
    During the development process, we illustrated several programming techniques
    for sharing the data in the JSF application and looking up and invoking business
    methods in the back-end application.


    Finally, we examined the application client container, including the services
    that it provides to client programs running on desktop machines.


    The last chapter of this book will detail the various EJB testing scenarios and
    will guide you on using JUnit to test EJB components (and JPA entities) in GlassFish’s
    Embeddable EJB Container.


    # CHAPTER 13


    ![image](Images/frontdot.jpg)


    ## Testing in an Embeddable EJB Container


    As with all mission-critical software, EJB components must be well tested before
    they are deployed into a production environment. The finest level of granularity
    in an EJB is its method; so proper unit tests must test each method of each EJB
    in isolation. For stateless Session beans, this is typically sufficient. Because
    a stateful Session bean may also contain state, full coverage additionally requires
    inclusion of more coarse-grained scenarios as well, involving sequences of method
    calls. When a stateless Session bean effectively stores “state” information in
    a database, as through JPA entities, multistep test scenarios are generally also
    required. In this chapter, we will look at both single-method and multi-method
    tests, covering stateless and stateful Session beans serving primarily as service
    interfaces for JPA-based operations.


