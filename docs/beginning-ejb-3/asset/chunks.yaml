    图 8-1. 打开 Chapter08-TransactionSamples 项目


    该应用程序由三个模块组成：一个直接取自第 7 章的 JPA 持久化单元；一个包含本章探讨的 CMT 和 BMT 会话 Bean 的 EJB 模块；以及一个包含我们同样研究过的两个
    Servlet 客户端的 Web 模块。


    ![9781430246923_Fig08-02.jpg](img/9781430246923_Fig08-02.jpg)


    图 8-2. 观察 Chapter08-TransactionSamples 应用程序的结构


