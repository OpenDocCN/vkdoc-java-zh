    \ `setDefaultShippingAddress()` 分配给 `customer` 的对象——因为，尽管我们对 `customer` 执行了 `merge()`，但\
    \ `shippingAddress` 是一个新实例，因此逻辑上它被持久化了，而不是合并了。由于 `persist()` 操作会就地（in-place）将对象转换为托管实例，而不会像\
    \ `merge()` 那样创建新的托管对象，那么原始的 `shippingAddress` 实例现在难道不应该只是处于托管状态的原始实例吗？\n\n级联\
    \ MERGE 操作\n"
- fmt: '答案是，级联`MERGE`会执行新实例以及分离和受管理实例的`merge()`；在这种情况下，新实例不会通过调用`persist()`来持久化。因此，我们原来的`shippingAddress`引用现在是过时的，而`customer`持有对`shippingAddress`的新受管理副本的引用。这是持久化和合并那些将`MERGE`操作级联到其所引用对象的实体时的一个重要“陷阱”。在级联`MERGE`操作期间，会对找到的新对象和现有对象都执行`merge()`。而`persist()`会将原始实例转换为受管理副本并将其放入持久化上下文中，`merge()`则会创建一个原始实例的新受管理副本并添加该副本。被合并的原始对象（在我们的例子中是`customer`）会被正确更新，以引用`shippingAddress`的新受管理副本。然而，任何对原始分离实例的引用——例如，我们的`shippingAddress`变量——现在都是过时的，并且在使用前需要刷新。


    因此，要解决这个问题，我们需要通过调用`merge()`从`EntityManager`获取`shippingAddress`对象的新受管理副本。如果我们修改测试代码，添加第124行，如[图13-5](#9781430246923_Ch13.xhtml#Fig5)所示，然后重新运行测试，这个测试现在将会成功。


    ![9781430246923_Fig13-05.jpg](Images/9781430246923_Fig13-05.jpg)


    [图13-5.](#9781430246923_Ch13.xhtml#_Fig5) 更新测试方法`WineAppServiceTest.testCreateIndividual()`以刷新过时引用


    ## 从EJB方法返回受管理对象


    第三个测试似乎因类似问题而失败。我们可以通过显式合并测试客户端中的所有对象来解决它，以便在它们被添加到持久化上下文后（无论是直接添加还是通过级联`MERGE`操作）获取受管理引用。然而，在这种情况下，我们调用一个EJB方法来组装`CustomerOrder`，而不是在测试客户端内部进行组装，我们决定在EJB代码本身中解决这个问题。


    让我们进入调试器，看看能否找出为什么我们的`customerOrder`引用的`id`字段为`null`，而从数据库查询的同一个`customerOrder`的`id`字段却被正确赋值。


    打开`WineAppService.java`文件，并在`createCustomerOrder()`内部的`custFacade.merge(customer);`调用处添加一个断点，如[图13-6](#9781430246923_Ch13.xhtml#Fig6)所示：


    ![9781430246923_Fig13-06.jpg](Images/9781430246923_Fig13-06.jpg)


    [图13-6.](#9781430246923_Ch13.xhtml#_Fig6) 在`WineAppService.createCustomerOrder()`内部设置断点


    设置好断点后，右键点击`WineAppServiceTest.java`，这次选择“`Debug Test File`”项，以调试模式启动JUnit测试器。


    当命中断点时，打开`Variables`面板并导航到`customerOrder`局部变量。展开`customerOrder`以查看其属性的当前值，导航到其继承的属性，并观察其`id`属性为`null`。这是意料之中的。在方法的这个阶段，`customerOrder`是一个新实例，尚未被持久化。因此，其主键值尚未生成或赋值给其`id`字段。


    单步执行带有断点的行，对`customer`执行`merge()`。我们从`Customer`上的级联规则得知，当合并一个`Customer`实例（或其任何子类型）时，所有引用的`CustomerOrder`实例也会被合并。


    在执行合并后再次检查`Variables`窗口中的`customerOrder`时，我们发现其`id`字段仍然为`null`。其`id`字段上的`@GeneratedValue`设置确保在将其持久化或合并到持久化上下文时为其赋值，因此显然这个对象不是在其`customer`父对象上调用`merge()`时创建的受管理副本。因此，`createCustomerOrder()`方法返回了错误的`customerOrder`实例。要解决此问题，请编辑返回语句，改为返回`customerOrder`的受管理实例：


    ![9781430246923_Fig13-07.jpg](Images/9781430246923_Fig13-07.jpg)


    图13-7. 更新`WineAppService.createCustomerOrder()`以返回`customerOrder`的受管理实例


    这让我们通过了之前遇到的`customerOrder.getId() is null`断言失败。再次运行测试，我们遇到了需要解决的最后一个问题。我们的`customer`实例在几行之前通过`createCustomerOrder()`创建后处于受管理状态。然而，断言失败`customerOrder2.getId()`
    is `null`表明它不知何故持有了一个过时的`customerOrder`副本。仔细检查发现，我们的`customer`副本在`createCustomerOrder()`内部被合并时变成了分离状态。因为我们没有将合并后的副本传回给客户端，所以客户端有责任获取新的受管理副本。通过另一次`merge()`调用来获取这个受管理副本解决了问题，如[图13-8](#9781430246923_Ch13.xhtml#Fig8)中的第173行所示：


    ![9781430246923_Fig13-08.jpg](Images/9781430246923_Fig13-08.jpg)


    [图13-8.](#9781430246923_Ch13.xhtml#_Fig8) 更新`WineAppServiceTest.testCreateCustomerOrder()`以将受管理实例赋值给`customer`变量


    ……至此，我们的测试现在成功执行。


    除了探索执行和调试涉及会话Bean和实体的JUnit测试的逐步过程之外，本练习的一个关键收获是，合并操作，特别是涉及级联`MERGE`的操作，可能导致过时引用，这在代码中可能难以发现。一个安全的方法是，如果你需要继续引用新实体，则始终显式持久化它们，而不是让它们通过级联合并来持久化，因为后者会导致原始实例变为分离状态。此外，如果你对某个对象在可能已被持久化或合并的方法调用后的状态有任何疑问，请记住合并对象以获取其当前的受管理状态。


    ## 结论


    本章首先介绍了以下关键概念：


    *   **JUnit**：用于对Java类进行单元测试的框架

    *   **EJB Lite**：EJB API的一个最小子集，它为EJB提供基本服务，而无需完整EJB容器所需的一些资源密集型功能的开销

    *   **可嵌入EJB容器**：EJB Lite的一种实现，它在纯Java SE环境（而非Java EE应用服务器）中运行，并提供了一个轻量级环境，用于通过JUnit测试EJB


    在检查一个为测试JPA持久化单元上的EJB外观而编写的JUnit测试类时，我们剖析了在可嵌入EJB容器中运行测试时的配置要求。


    最后，我们逐步介绍了在NetBeans中针对GlassFish可嵌入EJB服务器实现构建和执行JUnit测试的步骤。这些测试被预先配置为失败，我们逐步检查并揭示了失败的原因，使用调试器帮助我们找到解决方案。


    本章以一个重要的收获作为结尾：当处理实体引用时，要谨慎行事，因为当相关实体被合并时，由于级联规则，这些实体可能会在合并或持久化时变为分离状态。


