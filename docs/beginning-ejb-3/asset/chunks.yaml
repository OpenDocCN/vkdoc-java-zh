    有状态会话 bean 的业务接口与无状态会话 bean 所使用的接口类似，并且使用相同的注解方式，即通过 `@Local` 和 `@Remote` 注解进行标记。有状态会话
    bean 的本地视图可以在没有单独本地业务接口的情况下进行访问。`ShoppingCart` 会话 bean 同时具有远程和本地接口，如图 2-6 所示。


    ![9781430246923_Fig02-06.jpg](img/9781430246923_Fig02-06.jpg)


    图 2-6.  ShoppingCart 的业务接口


    我们将主要从 Web 应用程序中使用本地接口。添加远程接口是为了便于在本章中对 bean 进行单元测试。


    清单 2-10 和 2-11 分别展示了带有 `@Remote` 和 `@Local` 注解的远程和本地 `ShoppingCart` 业务接口。


    ***清单 2-10.***  ShoppingCart.java


    ```

    package com.apress.ejb.chapter02;

    import javax.ejb.Remote;

    @Remote

    public interface ShoppingCart {

    }

    ```


    ***清单 2-11.***  ShoppingCartLocal.java


    ```

    package com.apress.ejb.chapter02;

    import javax.ejb.Local;

    @Local

    public interface ShoppingCartLocal {

    }

    ```


    或者，你也可以使用清单 2-12 中展示的编码风格，即在指定 `@Stateful` 或 `@Stateless` 并附带业务接口名称之前，先指定 `@Local`
    和 `@Remote` 注解。


    ***清单 2-12.***  ShoppingCartBean.java


    ```

    package com.apress.ejb.chapter02;

    import javax.ejb.Local;

    import javax.ejb.Remote;

    import javax.ejb.Stateful;


    @Local({ShoppingCartLocal.class})

    @Remote({ShoppingCart.class})

    @Stateful(name="ShoppingCart")


    public class ShoppingCartBean implements ShoppingCart, ShoppingCartLocal {

        public ShoppingCartBean() {

        }

    }

    ```


    ![image](img/sq.jpg) **注意**   本书将遵循之前的约定，即在业务接口上标记 `@Local` 和 `@Remote` 注解。


    业务方法


    有状态会话 bean 中的业务方法与无状态会话 bean 中的类似。我们将通过添加业务方法来增强 `ShoppingCart` bean，这些方法将向购物车添加和移除葡萄酒，并返回购物车商品列表。


    清单 2-13 展示了实现 `addWineItem()`、`removeWineItem()` 和 `getCartItems()` 方法的 `ShoppingCart`
    bean。


    ***清单 2-13.***  ShoppingCartBean.java


    ```

    package com.apress.ejb.chapter02;

    import java.util.ArrayList;

    import javax.ejb.Stateful;


    @Stateful(name="ShoppingCart")

    public class ShoppingCartBean implements ShoppingCart, ShoppingCartLocal {

        public ShoppingCartBean() {

        }

        public ArrayList cartItems;

        public void addWineItem(String wine) {

           cartItems.add(wine);

        }


    public void removeWineItem(String wine) {

           cartItems.remove(wine);

        }


    public void setCartItems(ArrayList cartItems) {

            this.cartItems = cartItems;

        }


    public ArrayList getCartItems() {

            return cartItems;

        }

    }

    ```


    生命周期回调方法


    有状态会话 bean 支持构造、销毁、激活和钝化等回调事件。以下是映射到上述事件的回调方法：


    *   `PostConstruct`：使用 `@PostConstruct` 注解标记。

    *   `PreDestroy`：使用 `@PreDestroy` 注解标记。

    *   `PreActivate`：使用 `@PreActivate` 注解标记。

    *   `PrePassivate`：使用 `@PrePassivate` 注解标记。


    `PostConstruct` 回调发生在 bean 实例在 EJB 容器中被实例化之后。如果 bean 使用任何依赖注入机制来获取对其环境中资源或其他对象的引用，则
    `PostConstruct` 事件会在注入执行之后、bean 类中的第一个业务方法被调用之前发生。


    对于 `ShoppingCart` 会话 bean，我们可以有一个名为 `initialize()` 的业务方法，用于初始化 `cartItems` 列表，如清单
    2-14 所示。


    ***清单 2-14.***  PostConstruct 方法


    ```

    @PostConstruct

    public void initialize() {

        cartItems = new ArrayList();

    }

    ```


    `PreDestroy` 回调发生在任何带有 `@Remove` 注解的方法完成之后。对于 `ShoppingCart` 会话 bean，我们可以有一个名为
    `exit()` 的业务方法，用于将 `cartItems` 列表写入数据库。在本章中，我们仅向系统控制台打印一条消息来说明该回调。清单 2-15 展示了带有
    `@PreDestroy` 注解的 `exit()` 方法的代码。


    ***清单 2-15.***  PreDestroy 方法


    ```

    @PreDestroy

    public void exit() {

        // items list into the database.

        System.out.println("Saved items list into database");

    }

    ```


    `@Remove` 注解对于有状态会话 bean 来说是一个有用的生命周期方法。当调用带有 `@Remove` 注解的方法时，容器会在该方法执行后从对象池中移除该
    bean 实例。清单 2-16 展示了带有 `@Remove` 注解的 `stopSession()` 方法的代码。


    ***清单 2-16.***  移除方法


    ```

    @Remove

    public void stopSession() {

        // The method body can be empty.

        System.out.println("From stopSession method with @Remove annotation");

    }

    ```


    当有状态会话 bean 实例空闲时间过长时，`PrePassivate` 回调会被触发。在此事件期间，容器可能会钝化并将其状态存储到缓存中。标记有 `@PrePassivate`
    的方法会在容器钝化 bean 实例之前被调用。


    当客户端应用程序再次使用一个已钝化的有状态会话 bean 时，会触发 `PostActivate` 事件。此时会创建一个状态已恢复的新实例。当 bean 实例准备就绪时，会调用带有
    `@PostActivate` 注解的方法。


    拦截器


    无状态和有状态会话 bean 的拦截器之间存在一些细微差别。`AroundInvoke` 方法可用于有状态会话 bean。对于实现了 `SessionSynchronization`
    的有状态会话 bean，`afterBegin` 会在任何带有 `AroundInvoke` 注解的方法之前以及 `beforeCompletion()`
    回调方法之前发生。


    异常处理


    EJB 规范概述了两种类型的异常：


    *   应用程序异常

    *   系统异常


    *应用程序异常*是与客户端应处理的业务逻辑执行相关的异常。例如，如果客户端应用程序传递了无效参数（如错误的信用卡号），则可能会引发应用程序异常。


    另一方面，*系统异常*是由系统级故障引起的，例如 Java 命名和目录接口（JNDI）错误或获取数据库连接失败。系统异常必须是 `java.rmi.RemoteException`
    的子类，或者是非应用程序异常的 `java.lang.RuntimeException` 的子类。


    从 EJB 应用程序的角度来看，应用程序异常是通过编写继承自 `java.lang.Exception` 类的特定于应用程序的异常类来实现的。

    '
- fmt: "在系统异常的情况下，应用程序会捕获特定的异常，例如由JNDI故障导致的`NamingException`，并抛出`EJBException`。本章中的示例并未使用任何资源，但后续章节会有更多关于系统异常的示例。\n\
    \n## Singleton Session Beans\n\n`Singleton Session Bean`（单例会话Bean）是在EJB 3.1中引入的，它是一种每个应用程序仅实例化一次的会话Bean组件。对于一个应用程序，`Singleton\
    \ Session Bean`的实例只能存在一个。一旦实例化，`Singleton Session Bean`会在应用程序的整个生命周期内存在。`Singleton\
    \ Session Bean`在客户端调用之间维护其状态，但在容器关闭或崩溃后无法保存该状态。与无状态和有状态会话Bean类似，`Singleton Session\
    \ Bean`由一个Bean类以及可选的一个或多个业务接口组成。\n\n### The Bean Class\n\n`Singleton Session Bean`类是一个标准的Java类，带有类级别的`@Singleton`注解。如果使用部署描述符代替注解，则应将Bean类标记为`Singleton\
    \ Session Bean`。如果同时使用注解和部署描述符（混合模式），则当类中指定了任何其他类级别或成员级别的注解时，必须指定`@Singleton`注解。\n\
    \n为了说明`Singleton Session Bean`，我们将创建一个`ShopperCount`会话Bean，用于跟踪登录我们购物网站的用户数量。[Listing\
    \ 2-17](#9781430246923_Ch02.xhtml#list17) 展示了`ShopperCount`会话Bean的定义。\n\n[***Listing\
    \ 2-17.***](#9781430246923_Ch02.xhtml#_list17)  ShopperCountBean.java\n\n```\n\
    package com.apress.ejb.chapter02;\n\nimport javax.ejb.Singleton;\nimport javax.ejb.Startup;\n\
    @Singleton (name = \"ShopperCount\")\n@Startup\npublic class ShopperCountBean\
    \ {\n   private int shopperCounter;\n\n// Increment number of shopper counter\n\
    \   public void incrementShopperCount() {\n       shopperCounter++;\n   }\n\n\
    // Return number of shoppers\n   public int getShopperCount() {\n       return\
    \ shopperCounter;\n   }\n}\n```\n\n`Singleton Session Bean`由EJB容器自行决定何时实例化。但是，你可以使用`@Startup`注解Bean类，以指示容器必须在应用程序启动序列期间初始化该单例Bean。\n\
    \n当在应用程序中使用多个`Singleton Session Bean`时，应用程序可能要求它们按特定顺序初始化。`@DependsOn`注解声明了`Singleton\
    \ Session Bean`的启动依赖关系。[Listing 2-18](#9781430246923_Ch02.xhtml#list18) 展示了依赖于`ShopperCount`会话Bean的`LogShopperCount`会话Bean的定义。\n\
    \n[***Listing 2-18.***](#9781430246923_Ch02.xhtml#_list18)  LogShopperCount.java\n\
    \n```\npackage com.apress.ejb.chapter02;\n\nimport javax.ejb.Singleton;\nimport\
    \ javax.ejb.Startup;\nimport javax.ejb.DependsOn;\nimport java.util.logging.Logger;\n\
    \n@Singleton\n@Startup\n@DependsOn(\"ShopperCount\")\npublic class LogShopperCount\
    \ {\n   private final Logger log = Logger.getLogger(\"LogShopperCount.class\"\
    );\n\npublic void logShopperCount() {\n       // Log shopper count\n   }\n}\n\
    ```\n\n与无状态和有状态会话Bean不同，`Singleton Session Bean`不得实现`javax.ejb.SessionSynchronization`接口或使用会话同步注解。\n\
    \n### The Business Interface\n\n`Singleton Session Bean`的业务接口与无状态和有状态会话Bean的接口类似，并且使用`@Local`和`@Remote`注解以相同的方式进行注解。`Singleton\
    \ Session Bean`支持无接口本地视图，这使得对于本地视图而言，业务接口的声明是可选的。\n\n### Business Methods\n\n\
    `Singleton Session Bean`中的业务方法与无状态和有状态会话Bean中的方法类似。我们将通过添加一个重置计数器的业务方法来增强`ShopperCount`\
    \ Bean。\n\n[Listing 2-19](#9781430246923_Ch02.xhtml#list19) 展示了实现业务方法的`ShopperCount`\
    \ Bean。\n\n[***Listing 2-19.***](#9781430246923_Ch02.xhtml#_list19)  ShopperCountBean.java\n\
    \n```\npackage com.apress.ejb.chapter02;\n\nimport javax.ejb.Singleton;\nimport\
    \ javax.ejb.Startup;\n\n@Singleton(name = \"ShopperCount\")\n@Startup\npublic\
    \ class ShopperCountBean {\n   private int shopperCounter = 0;\n\n// Increment\
    \ number of shopper counter\n   public void incrementShopperCount() {\n      \
    \ shopperCounter++;\n   }\n\n// Return number of shoppers\n   public int getShopperCount()\
    \ {\n       return shopperCounter;\n   }\n\n// Reset counter\n   public void resetCounter()\
    \ {\n       shopperCounter = 0;\n   }\n}\n```\n\n### Lifecycle Callback Methods\n\
    \n`Singleton Session Bean`支持用于构造和销毁的回调事件。以下是映射到上述事件的回调：\n\n*   `PostConstruct`：使用`@PostConstruct`注解表示\n\
    *   `PreDestroy`：使用`@PreDestroy`注解表示。\n\n`PostConstruct`回调发生在Bean实例在EJB容器中实例化之后。如果Bean使用任何依赖注入机制来获取对其环境中资源或其他对象的引用，则`PostConstruct`事件会在注入执行之后、Bean类中的第一个业务方法调用之前发生。\n\
    \n`PreDestroy`回调发生在应用程序关闭期间。容器会考虑`Singleton Session Bean`之间的`DependsOn`关系，并按照与创建顺序相反的顺序移除它们。对于`ShopperCount`示例，`LogShopperCount`\
    \ Bean将在`ShopperCount` Bean之前被移除。\n\n[Listing 2-20](#9781430246923_Ch02.xhtml#list20)\
    \ 展示了带有`@PostConstruct`注解的`applicationStartup()`方法的代码。此方法在启动时重置`shopperCounter`。[Listing\
    \ 2-20](#9781430246923_Ch02.xhtml#list20) 还展示了带有`@PreDestroy`注解的`applicationShutdown()`方法的代码。此方法在应用程序关闭时打印一条消息。\n\
    \n[***Listing 2-20.***](#9781430246923_Ch02.xhtml#_list20)  ShopperCountBean.java\n\
    \n```\npackage com.apress.ejb.chapter02;\n\nimport javax.annotation.PostConstruct;\n\
    import javax.annotation.PreDestroy;\nimport javax.ejb.Singleton;\nimport javax.ejb.Startup;\n\
    \n@Singleton(name = \"ShopperCount\")\n@Startup\npublic class ShopperCountBean\
    \ {\n   private int shopperCounter;\n\n// Increment number of shopper counter\n\
    \   public void incrementShopperCount() {\n       shopperCounter++;\n   }\n\n\
    // Return number of shoppers\n   public int getShopperCount() {\n       return\
    \ shopperCounter;\n   }\n\n// Reset counter\n   public void resetCounter() {\n\
    \       shopperCounter = 0;\n   }\n\n// Reset counter\n   @PostConstruct\n   public\
    \ void applicationStartup() {\n       System.out.println(\"From applicationStartup\
    \ method.\");\n       resetCounter();\n   }\n\n@PreDestroy\n   public void applicationShutdown()\
