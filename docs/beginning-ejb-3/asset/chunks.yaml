    \ `Customer` 实例。\n\n通过 JNDI 查找 EntityManager\n\n第三种选择，同样适用于 Java SE 和 EE 环境，是通过\
    \ Java 命名和目录接口 (JNDI) 查找 `EntityManagerFactory` 或 `EntityManager` 本身。清单 3-15 展示了如何在会话\
    \ Bean 中实现此操作。\n\n***清单 3-15.***  通过 JNDI 查找 EntityManager\n\n```\n@Stateless\n\
    @PersistenceContext(unitName=\"Chapter03PersistenceUnit\")\npublic class CustomerServiceBean\
    \ {\n    @Resource\n    SessionContext ctx;\n\npublic void performService() {\n\
    \        EntityManager em = (EntityManager)ctx.lookup(\"Chapter03PersistenceUnit\"\
    );\n        // . . .\n    }\n}\n```\n\n注入的 `SessionContext` 资源提供了一个 JNDI 命名空间，用于在运行时获取其他资源。\n\
    \n事务支持\n\n`EntityManager` 还公开了用于开始、提交和回滚事务的方法，这些方法适用于资源本地（非 JTA）事务。此主题将在第 8 章中深入讨论。\n\
    \n实体生命周期\n\n一个实体实例在其作为内存中 Java 对象的生命周期中可能会经历多种正式状态。理解这些不同的状态将帮助您了解实体何时与后端数据库处于一致或不一致的状态，以及如何在事务上下文中协调这些差异。\n\
    \n一个实体实例在其作为 Java 对象的生命周期中通常会经历多种持久化状态。自 EJB 3 以来，实体类是完全透明的。它们使用普通的构造函数创建，而不是早期\
    \ EJB 版本中的 `Home` 和 `LocalHome` 工厂接口。它们可以自由地传入和传出 EJB 容器以及客户端之间，并且客户端可以更新它们，而无需承担回调\
    \ EJB 容器的开销。\n\n新实体实例的生命周期\n\n让我们来看一个新创建的持久化实体实例的生命周期。在其生命周期中，实体可能会经历新建、托管、分离和已删除状态。\n\
    \n新建实体实例\n\n客户端通过使用实体的 Java 构造函数之一来创建新的实体实例。与早期的 EJB 规范相比，这是一个显著的简化，早期的规范要求用户在实体\
    \ Bean 的 `Home` 和/或 `LocalHome` 接口上定义 `create()` 工厂方法。所有实体类都需要默认（无参数）构造函数，但也可以定义其他构造函数。客户端可以存在于\
    \ EJB 容器外部或内部。在构造时，它处于新建状态，并且尚未具有持久化标识，因为它尚未与 `EntityManager` 的持久化上下文关联。客户端可以自由调用其任何方法并分配数据值，并且对实体的所有更新都保留在实体类本地。\n\
    \n托管实体实例\n\n要将此实体类转换为持久化对象，客户端需要获取一个 `EntityManager` 实例并调用 `EntityManager.persist()`\
    \ 方法。清单 3-16 展示了一个来自会话 Bean 的代码片段，该 Bean 通过注入获取 `EntityManager`，然后将作为参数传递给 `persistEntity()`\
    \ 方法的实体实例持久化。\n\n***清单 3-16.***  展示如何使实体实例持久化的示例\n\n```\n@Stateless\npublic class\
    \ MySessionEJB {\n\n@PersistenceContext(unitName = \"Chapter03PersistenceUnit\"\
    )\n  private EntityManager em;\n\npublic void persistEntity(Object entity) {\n\
    \    em.persist(entity);\n  }\n}\n```\n\n当实体被持久化时，它会作为托管实例添加到持久化上下文中。被托管为实体带来了以下优势：\n\
    \n*   默认情况下，实体上的所有字段都被指定为由持久化提供程序延迟加载。虽然延迟指定实际上只是一个提示（请参阅本章后面的“延迟与即时字段绑定”部分），但延迟字段绑定只能无缝地在托管实例上执行。\n\
    *   当实体被托管时，对其所做的更改可能会被持久化管理器跟踪，以优化后续的 `EntityManager.merge()` 操作。例如，更改跟踪可以直接在实体实例上处理，使用持久化提供程序在实例化实体时提供的字节码增强。这在管理相关实体网络时尤其重要，以便在将实体网络合并回持久化上下文时，计算变更集所需的工作量最小。\n\
    \n通常，不能保证调用 `EntityManager.persist()` 会立即执行 SQL `INSERT` 语句。由持久化管理器决定是立即执行此步骤，还是稍后但在提交事务之前执行。然而，在此示例中，无状态会话\
    \ Bean 上方法的默认行为是在每次调用其方法时创建一个新事务并提交工作，因此实体不仅被插入，而且也被提交了。\n\n在此步骤中，可能已为实体实例分配了序列值，并且可能还执行了其他副作用代码。\n\
    \n分离实体实例\n\n实体在其所属的持久化上下文的生命周期内保持托管状态，或者直到它从数据库中被移除。如果发生这些事件之一，或者如果实例通过值传递给客户端，它将成为一个分离的实体实例，并且不再与持久化上下文关联。分离的实体不会进行更改跟踪或其他内部优化。特别是，持久化提供程序无法延迟绑定在实体分离时尚未绑定的字段，并且尝试访问尚未绑定的分离实体字段将抛出运行时异常。要将其状态合并回持久化上下文并使其再次成为托管实例，您需要将分离的实体传递给\
    \ `EntityManager.merge()` 方法。\n\n虽然从 `EntityManager.merge()` 调用返回的实体实例是托管的，但更改不会立即传播到持久化存储；它们仅更新实体本身。假设客户端修改了实体：\n\
    \n```\nentity = mySession.persistEntity(entity);\nentity.setName(\"foo\");\n```\n\
    \n在上述第二条语句之后，名称更改仅应用于实体实例，并且没有更改传播到持久化上下文或数据库。要将这些更改应用于持久化上下文，您需要调用 `EntityManager.merge()`\
    \ 操作，如下所示：\n\n```\n// 假设已获取 EntityManager em，可能通过注入\nem.merge(entity);\n```\n"
