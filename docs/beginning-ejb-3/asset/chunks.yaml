    \n`@WebMethod`注解接受[表6-4](#9781430246923_Ch06.xhtml#Tab4)中描述的参数。\n\n**表6-4.** `@WebMethod`注解\n\
    \n| 参数 | 描述 | 附加信息 |\n| --- | --- | --- |\n| `operationName` | 与此方法匹配的`wsdl:operation`的名称。\
    \ | 默认情况下，这是Java方法的名称。 |\n| `action` | 此操作的动作。对于SOAP绑定，它将是`SOAP action`头的值。 |\
