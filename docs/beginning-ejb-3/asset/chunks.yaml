- fmt: "[Figure 4-3](#9781430246923_Ch04.xhtml#Fig3) illustrates the schema that maps\
    \ our entities using the `JOINED` inheritance strategy. As in the previous example,\
    \ we have prefixed the tables with the strategy indicator, in this case `CH04_JOIN_`,\
    \ so that all of the tables in these examples can be loaded into a single test\
    \ schema without danger of name collision.\n\n![9781430246923_Fig04-03.jpg](Images/9781430246923_Fig04-03.jpg)\n\
    \n[Figure 4-3.](#9781430246923_Ch04.xhtml#_Fig3) A schema that maps our example\
    \ entities using the `JOINED` strategy. Each entity in the hierarchy has its own\
    \ table to persist its declared fields. The table `CH04_JOIN_ADDRESS` holds associated\
    \ `Address` instances.\n\n## Example Entity Classes\n\nLet’s now take a look at\
    \ the entity classes that map to the previous schema. We have omitted the class\
    \ bodies for each of these entities, since the only differences between these\
    \ entities and the ones shown in the previous `SINGLE_TABLE` strategy example\
    \ lie in the entity’s class-level annotations. [Listings 4-8](#9781430246923_Ch04.xhtml#list8)\
    \ through [4-11](#9781430246923_Ch04.xhtml#list11) show the entities in the `Person`\
    \ hierarchy, while [Listing 4-12](#9781430246923_Ch04.xhtml#list12) shows the\
    \ `Address` entity.\n\n[***Listing 4-8.***](#9781430246923_Ch04.xhtml#_list8)\
    \ `Person.java`, an Abstract Root Entity in a `JOINED` Inheritance Hierarchy\n\
    \n```\n/*\n * Person: An abstract entity, and the root of an inheritance hierarchy\n\
    \ */\n@Entity\n@NamedQueries({\n  @NamedQuery(name = \"Person.findAll\", query\
    \ = \"select o from Person o\")})\n@Table(name = \"CH04_JOIN_PERSON\")\n@TableGenerator(name\
    \ = \"Person_ID_Generator\", table = \"CH04_JOIN_PERSON_ID_GEN\",\n          \
    \      pkColumnName = \"PRIMARY_KEY_NAME\", pkColumnValue = \"Person.id\",\n \
    \               valueColumnName = \"NEXT_ID_VALUE\")\n@Inheritance(strategy =\
    \ InheritanceType.JOINED)\npublic abstract class Person implements Serializable\
    \ {\n  /* The class body is identical across all inheritance strategies */\n}\n\
    ```\n\n***Listing 4-9.*** `Employee.java`, an Abstract Intermediate Entity in\
    \ a `JOINED` Inheritance Hierarchy\n\n```\n/*\n * Employee: An abstract entity\
    \ that extends Person\n */\n@Entity\n@NamedQueries({\n  @NamedQuery(name = \"\
    Employee.findAll\", query = \"select o from Employee o\")})\n@Table(name = \"\
    CH04_JOIN_EMPLOYEE\")\npublic abstract class Employee extends Person implements\
    \ Serializable {\n  /* The class body is identical across all inheritance strategies\
    \ */\n}\n```\n\n***Listing 4-10.*** `FullTimeEmployee.java`, a Concrete Leaf Entity\
    \ in a `JOINED` Inheritance Hierarchy\n\n```\n/*\n * FullTimeEmployee: A concrete\
    \ leaf entity\n */\n@Entity\n@NamedQueries({\n  @NamedQuery(name = \"FullTimeEmployee.findAll\"\
    , query = \"select o from FullTimeEmployee o\")})\n@Table(name = \"CH04_JOIN_FT_EMPLOYEE\"\
