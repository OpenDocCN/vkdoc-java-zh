- fmt: "The next step is to create a `Login` managed bean that will be used with `login.jsp`.\
    \ Managed beans are JavaBeans that are used by JSF applications. These objects\
    \ are managed by the JSF implementation, and the properties and methods in these\
    \ objects can be referenced from JSP pages using value-binding and method-binding\
    \ expressions. [Listing 12-2](#9781430246923_Ch12.xhtml#list2) shows the `Login`\
    \ managed bean. `Login` has three property fields along with their accessor: `email`,\
    \ `customer`, and `shoppingCart`. We have an `@EJB` annotation on top of the `setShoppingCart()`\
    \ method. We are using setter injection to inject the stateful session bean `ShoppingCart`\
    \ that we had developed in [Chapter 7](../Text/9781430246923_Ch07.xhtml). We have\
    \ one additional method `processLogin()` in our bean that calls the `findCustomer(String\
    \ email)` business method using the injected `shoppingCart` stateful session bean.\
    \ This business method returns a `Customer` object if the e-mail ID exists in\
    \ our customer database. Additional logic is incorporated to return a string value\
    \ stored in the `faces-config.xml` file, for use in our navigation model. We will\
    \ discuss this shortly.\n\n***[Listing 12-2](#9781430246923_Ch12.xhtml#_list2).***\
    \  `Login.java`\n\n```\npackage com.apress.ejb.chapter12.view.managed;\n\nimport\
    \ com.apress.ejb.chapter07.ejb.ShoppingCartLocal;\nimport com.apress.ejb.chapter07.entities.Customer;\n\
    import javax.ejb.EJB;\n\npublic class Login\n{\n  public Login() {\n  }\n  String\
    \ email;\n  Customer customer;\n  ShoppingCartLocal shoppingCart;\n\npublic void\
    \ setEmail(String email) {\n    this.email = email;\n  }\n\npublic String getEmail()\
    \ {\n    return email;\n  }\n\npublic String processLogin() {\n    String navigation\
    \ = null;\n    customer = (Customer)shoppingCart.findCustomer(email);\n\nif (customer\
    \ != null) {\n      navigation = \"winehome\";\n    }\n    else {\n      navigation\
    \ = \"register\";\n    }\n    return navigation;\n  }\n\npublic void setCustomer(Customer\
    \ customer) {\n    this.customer = customer;\n  }\n\npublic Customer getCustomer()\
    \ {\n    return customer;\n  }\n\n@EJB\n  public void setShoppingCart(ShoppingCartLocal\
    \ shoppingCart) {\n    this.shoppingCart = shoppingCart;\n  }\n\npublic ShoppingCartLocal\
    \ getShoppingCart() {\n    return shoppingCart;\n  }\n}\n```\n\nThe deployment\
    \ descriptor `faces-config.xml` has information on page navigation, managed beans,\
    \ and so on. [Listing 12-3](#9781430246923_Ch12.xhtml#list3) shows the `faces-config.xml`\
    \ with control flow to and from `login.jsp`. It also shows the `Login` class being\
    \ registered as a managed bean. We have set the scope of the `Login` managed bean\
    \ to `session`. This allows us to store information about the customer and shopping\
    \ cart through the session so that we don’t have to re-query our back-end application\
    \ for the same information. This also facilitates the usage of this information\
    \ across other pages and invokes other business methods on the `ShoppingCart`\
    \ stateful session bean without having to look up the bean again. Additionally,\
    \ we have created three navigation rules:\n\n*   From `login.jsp` to `winehome.jsp`,\
    \ with the value `winehome`: This will be used if the login is successful.\n*\
    \   From `login.jsp` to `newCustomer.jsp`, with the value `register`: This will\
    \ be used if the login fails and the customer wants to register as a new customer.\n\
    *   From `newCustomer.jsp` to `login.jsp`, with the value `success`: This will\
