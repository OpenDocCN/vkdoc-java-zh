  raw: 'For stateful sessionbeans, there exists a special form of container-managed
    EntityManager that is not bound to the life of a transaction, but it is instead
    bound to the life of a stateful session bean itself. This is known as an extended
    `EntityManager`, and it behaves much like an application-managed persistence context
    but the EJB container conveniently manages its life cycle. Because an extended
    persistence context is not destroyed at the conclusion of each transaction as
    is a transaction-scoped persistence context, entities can remain in a managed
    state even after they have been synchronized with the database. In some cases,
    this avoids the need to re-query them or otherwise obtain a managed instance if
    you wish to continue working with them after a commit. In a conversational environment,
    such as a Web application, this can be very useful. An extended persistence context
    stays open until its context stateful session bean is destroyed. Only stateful
    session beans may use extended persistence contexts. At the time an `EntityManager`
    instance is created, its persistence context type is defined, and it may not be
    changed during the `EntityManager`’s lifetime. The default type is transaction-scoped;
    to inject an `EntityManager` by specifying an extended persistence context, you
    may specify the injection directive with the following:


    ```

    @PersistenceContext(unitName="WineAppUnit", type = PersistenceContextType.EXTENDED)

    private EntityManager em;

    ```


    or you may define a `persistence-context-ref` element in the XML descriptor.


    In the transaction examples at the end of this chapter, we will compare the behavior
    of a stateless session bean using a transaction-scoped persistence context with
    a stateful session bean that uses an extended persistence context.


    JTA vs. Resource-Local EntityManagers


    An `EntityManager` may be defined to participate in either a JTA transaction or
    a non-JTA (resource-local) transaction. The features of JTA—most notably, support
    for distributed transactions—have been described previously, along with usage
    of the bean’s interface to a JTA transaction, `javax.transaction.UserTransaction`.
    Resource-local `EntityManager`’s service transactions using the `javax.persistence.EntityTransaction`
    interface available to clients through the `EntityManager.getEntityTransaction()`
    method. This interface exposes the expected transaction demarcation methods `begin()`,
    `commit()`, and `rollback()`, along with `getRollbackOnly()` and `setRollbackOnly()`
    methods that are equivalent to the `EJBContext` and `UserTransaction` methods
    available to enterprise beans described previously, and an `isActive()` method
    to indicate whether a transaction is currently in progress.


    Container-managed `EntityManager`’s must be JTA `EntityManager`’s. Application-managed
    `EntityManager`’s may be either JTA or resource-local, but they may only be JTA
    `EntityManager`’s if the `EntityManager` resides in the Java EE environment.


    One reason you might want to use a resource-local `EntityManager` is that while
    JTA provides the infrastructure for distributed transactions, resource-local transactions
    can provide a performance optimization by eliminating the overhead of this infrastructure.
    Another reason is you may wish to use your JPA entities in a stand-alone Java
    SE environment where JTA or/or data-source resources are not supported.


    We will examine use of the `EntityTransaction` when we dissect a Java façade in
    the sample application later in this chapter.


    Two Sample Scenarios


    The following two sample scenarios use the entities in the persistence unit defined
    for the Wines Online application, which we examined in [Chapter 7](../Text/9781430246923_Ch07.xhtml).
    The first scenario uses a stateless CMT session bean, leveraging the declarative
    transaction services provided by the EJB container. The second scenario shows
    how transactions can be managed explicitly by both the bean and the client when
    using a stateful BMT session bean. At the end of this chapter you will find step-by-step
    instructions for building, deploying, and testing these samples in GlassFish using
    NetBeans. For now, we will examine the source files and discuss the different
    ways EJB and JPA can interact in a transactional environment.


    Stateless Session Beans with CMT Demarcation


    We begin with a default, straightforward, implementation of a stateless session
    bean, `OrderProcessorCMTBean.java` (shown in [Listing 8-1](#9781430246923_Ch08.xhtml#list1)).
    This session bean uses CMT demarcation to leverage EJB’s declarative transaction
    support. It is followed by a simple servlet client, `OrderProcessorCMTClient.java`
    (shown in [Listing 8-2](#9781430246923_Ch08.xhtml#list2)).


