    \n*   一个Bean类（实现）\n*   一个Web服务端点接口（可选）\n*   如果Bean类有本地或远程客户端，则需要额外的业务接口\n\n###\
    \ 创建Bean类\n\n一个*无状态会话Bean类*是任何标准的Java类，它有一个类级别的注解`@Stateless`。从版本3开始，EJB规范不再强制要求`SEI`。提供`SEI`以及Bean类是可选的。在Bean类将在没有任何服务端点接口的情况下发布为Web服务的用例中，Bean类将具有额外的类级别注解`@WebService`（JSR\
    \ 181）。`@WebService`注解位于`javax.jws`包中，它将Bean类标记为基于SOAP的Web服务的实现。\n\n`@WebService`注解接受[表6-3](#9781430246923_Ch06.xhtml#Tab3)中描述的参数。\n\
    \n**表6-3.** `@WebService`注解\n\n| 参数 | 描述 | 附加信息 |\n| --- | --- | --- |\n| `name`\
