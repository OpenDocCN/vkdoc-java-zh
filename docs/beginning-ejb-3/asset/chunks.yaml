    \ Entity Callback Methods\n\nJPA provides support for a number of callback methods,\
    \ or *interceptors*, that allow you to add your own custom code when certain life-cycle\
    \ events occur on an entity or a mapped superclass. You can register interceptors\
    \ to be invoked when certain life-cycle events occur on specific entity types,\
    \ or broadly whenever a life-cycle event occurs on any entity. The latter case\
    \ is one of the few times when you must use XML to specify metadata, since the\
    \ effect is applied globally across all entities in the persistence unit.\n\n\
    The following annotations may be applied to methods to indicate that they are\
    \ entity callback methods:\n\n*   `@PrePersist`\n*   `@PostPersist`\n*   `@PreRemove`\n\
    *   `@PostRemove`\n*   `@PreUpdate`\n*   `@PostUpdate`\n*   `@PostLoad`\n\nTo\
    \ use a callback method, you write a method to perform the behavior you desire\
    \ and then simply annotate it using one of the above life-cycle callback annotations\
    \ (for instance, `@PrePersist`). Callback methods may have any name you choose,\
    \ but must not take any parameters and must return void. A single method may be\
    \ annotated with multiple entity callback annotations, if desired.\n\nAlternatively,\
    \ callback classes may be registered for an entity (or a mapped superclass) to\
    \ intercept one or more life-cycle events on one or more entity types. Multiple\
    \ interceptor methods may be registered for any given entity life-cycle event,\
    \ and they are executed in the order in which they are specified.\n\nEntity callback\
    \ methods can be used to validate an entity’s contents prior to the entity being\
    \ persisted, and to populate transient, derived fields following instantiation.\
