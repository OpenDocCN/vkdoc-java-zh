    [Listing 12-22](#9781430246923_Ch12.xhtml#list22) shows the code snippets that
    are used to update the `JSFShoppingCart` managed bean. We have a property`—cartItems—`of
    `java.util.List` type, with accessor methods. In the getter method, we are retrieving
    the `Customer` object and the instance of the `ShoppingCart` stateful EJB from
    the `Login` managed bean, and we are calling the business method `getAllCartItems()`
    that returns the list of items in the cart. The second method, `ProcessOrder()`,
    also retrieves the instance of the `ShoppingCart` stateful EJB from the `Login`
    managed bean and invokes the `ProcessOrder` business method on the back-end application
    to complete the order on the JSF application side. Upon successful execution,
    the `ProcessOrder()` method in `JSFShoppingCart` returns `success` as a value
    that is used for navigation back to the home page of the application.


    ***[Listing 12-22](#9781430246923_Ch12.xhtml#_list22).***  JSFShoppingCart.java,
    with the getCartItems and ProcessOrder Methods


    ```

    List<CartItem> cartItems = new ArrayList();


    public void setCartItems(List<CartItem> cartItems) {

      this.cartItems = cartItems;

    }


    public List<CartItem> getCartItems() {

      FacesContext ctx = FacesContext.getCurrentInstance();

      Application app = ctx.getApplication();

      ValueBinding customerBinding = app.createValueBinding("#{Login.customer}");

      Individual customer = (Individual)customerBinding.getValue(ctx);

      ValueBinding shoppingCartBinding = app.createValueBinding("#{Login.shoppingCart}");

      shoppingCart = (ShoppingCartLocal)shoppingCartBinding.getValue(ctx);

      return shoppingCart.getAllCartItems(customer);

    }


    public String ProcessOrder() {

      FacesContext ctx = FacesContext.getCurrentInstance();

      Application app = ctx.getApplication();

      ValueBinding shoppingCartBinding = app.createValueBinding("#{Login.shoppingCart}");

      shoppingCart = (ShoppingCartLocal)shoppingCartBinding.getValue(ctx);

      shoppingCart.sendOrderToOPC();

      return "success";

    }

    ```


