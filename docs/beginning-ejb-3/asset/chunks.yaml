    图 11-4.  JAVA EE 服务器


    除了 Java EE 容器为 Java EE 组件提供的众多内置服务外，Java EE 还允许通过资源适配器和连接器 API 集成第三方服务——这些服务通过
    Java EE 服务提供者接口 (SPI) 经由其容器暴露给 Java EE 组件。


    Java EE 部署组件


    Java EE 部署的主要构建块组件是 Java EE 应用程序和 Java EE 模块。让我们来看看这些组件的定义。


    Java EE 应用程序


    Java EE 允许您将单个 Java EE 模块和整个 Java EE 应用程序部署到服务器。正如前面“打包和部署过程概述”一节中提到的，在部署应用程序时，您将各个
    Java EE 模块以及任何相关的部署描述符和依赖库组件打包到一个称为 EAR 文件的包装归档 JAR 文件中，该文件的后缀为 `.ear`。部署单个 Java
    EE 模块本质上是一种快捷方式，以避免将一个 JAR 文件包裹在另一个单独的 JAR 文件周围。


    除了其打包结构之外，Java EE 应用程序在运行时作为一个上下文运行，在该上下文中，一个或多个相关的 Java EE 组件（例如 EJB、Servlet
    和应用程序客户端）可以使用共享的类加载器和命名空间进行操作和相互通信。将 Java EE 应用程序视为一个松散耦合的 Java EE 模块组可能会很有用，这些模块能够相互可见并共享资源。


    Java EE 模块类型


    Java EE 定义了以下 Java EE 模块类型：EJB、Web 应用程序、应用程序客户端和资源适配器。前三种对应于它们同名的容器，并且它们的部署委托给这些容器。部署资源适配器模块会在
    Java EE 服务器中安装资源，并注册这些资源以供 Java EE 组件使用。您的 Java EE 模块引用的普通 Java 类和其他资源也可以作为库组件包含在
    EAR 文件中，既可以打包为 JAR 文件，也可以存储为目录，并与您的 Java EE 应用程序一起部署。


    请注意，一个由一组 JPA 实体组成的 JPA 持久化单元不是一个 Java EE 模块，而是一个库组件。我们将在后面的“持久化单元”一节中描述其中的一些原因。


    让我们仔细看看每种 Java EE 模块类型。


    EJB 模块


    一个 EJB 模块由一个或多个会话和/或消息驱动 Bean (MDB) 组成。它被打包成一个 EJB JAR 文件，如果它包含一个 `ejb-jar.xml`
    部署描述符（从 Java EE 5 开始这是可选的），则必须位于 JAR 文件的 `META-INF` 目录中。特定于平台的描述符也可以添加到这个 `META-INF`
    目录中。如果 EJB JAR 文件不包含 `ejb-jar.xml` 文件，则 EJB Bean 类必须使用 `@Stateless`、`@Stateful`、`@Singleton`
    或 `@MessageDriven` 注解将自身标识为 EJB。


    在许多情况下，将客户端对 EJB 模块的视图隔离到其自己的归档中是可取的。当客户端仅与会话 Bean 的接口通信时，它不需要访问会话 Bean 类。在这种情况下，最佳实践是仅将会话
    Bean 的接口以及任何其他依赖类打包到一个单独的 EJB 客户端 JAR 库中。这个 JAR 文件可以交给客户端，但也可以从 EJB JAR 文件中引用，这样这些接口就不需要在
    EJB JAR 文件内部重复。为了引用 EJB 客户端 JAR 文件，或 EAR 文件中的任何其他 JAR 文件或目录，装配器会在 JAR 文件的 `META-INF/MANIFEST.MF`
    文件中添加一个指向这些位置的 `Class-Path` 条目：


    ```

    Class-Path: MyEjb-Client.jar

    ```


    ![image](img/sq.jpg) **注意**   有关 `MANIFEST.MF` 文件的更多信息，包括本章中提到的 Class-Path 和 Extension-List
    条目的用法，请参阅：`http://docs.oracle.com/javase/6/docs/technotes/guides/jar/jar.html`。


    可以通过用空格字符分隔 `.jar` 和目录条目来以这种方式引用多个 JAR 文件或目录。被引用的 JAR 文件的路径是相对于 EJB JAR 文件本身的，该文件必须位于
    EAR 文件的根目录中。在前面的示例中，`MyEjb-Client.jar` 文件也位于 EAR 文件的根目录中。


    一个 EJB 模块也可能包含一个持久化单元，这将在下一节中描述。持久化单元只能以展开形式存在于 EJB JAR 中；JAR 文件不能嵌套在 EJB JAR
    文件内部。持久化单元由 EJB JAR 文件内容中存在 `META-INF/persistence.xml` 文件来定义。


    可以使用 `META-INF/application.xml` 文件中的模块声明为 EJB 模块分配一个名称。当部署期间不存在 `META-INF/application.xml`
    文件时（例如当 EJB JAR 文件独立部署或位于不包含此描述符的 EAR 文件中时），会为其分配一个默认名称。此名称源自 EJB JAR 归档的名称，减去任何目录信息或
    `.jar` 后缀。例如，一个 EJB JAR 文件可能捆绑在 EAR 文件中的以下位置：


    ```

    ./OrderManagerEJBModule.jar

    ```


    在这种情况下，其默认模块名称将是 `OrderManagerEJBModule`。


    WAR 文件中的 EJB


    EJB 3.0 规范通过使 `ejb-jar.xml` 等 XML 描述符的打包成为可选，简化了 EJB 的打包。EJB 3.1 规范进一步推进了这种简化，允许将
    EJB（使用 `@Stateless`、`@Stateful`、`@Singleton` 或 `@MessageDriven` 注解的 POJO）直接打包在
    WAR 文件的 `WEB-INF/classes` 目录中。类似地，`ejb-jar.xml` 描述符（如果存在）可以与 `web.xml` 一起直接打包到
    `WEB-INF` 目录中。通过这一更改，用户不再需要创建单独的 EJB JAR 模块来打包 EJB。图 11-5 描绘了这一新的打包选项。


    ![9781430246923_Fig11-05.jpg](img/9781430246923_Fig11-05.jpg)


    图 11-5.  将 EJB 直接打包在 WAR 文件的 WEB-INF\classes 目录下


    持久化单元


    一组 JPA 实体，称为*持久化单元*，既严格来说不是一种模块类型，也没有自己专用的容器。相反，Java EE 服务器直接支持持久化，作为其提供给 Java
    EE 容器的核心服务之一。这使得 JPA 实体能够表现为持久化对象，并在其他 Java EE 容器环境中执行时与 Java EE 组件交互。通过不受限于它们自己的容器，JPA
    实体也可以自由地在 Java EE 环境之外执行并展示持久化行为。


    ![image](img/sq.jpg) **注意**   在部署上下文中，术语*持久化单元*指的是一组共置的 JPA 实体和一个相应的（且必需的）`META-INF/persistence.xml`
    文件。这组文件可以打包到其自己的 JAR 文件中，或者这些文件可以直接捆绑在 EJB JAR 或 WAR 文件内部。反过来，`persistence.xml`
    文件定义了一个或多个 `<persistence-unit>` 条目，这些条目可以进一步划分持久化单元打包结构中的实体。在本章中，我们通过始终在描述 `<persistence-unit>`
    XML 元素时使用连字符（persistence-unit）来区分这两个名称相似的概念。因此，任何对持久化单元的引用都可以假定为指代与 `persistence.xml`
    文件共置的那组实体。

