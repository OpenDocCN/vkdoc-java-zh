    Wines Online 应用程序使用单一数据库模式来存储所有与客户、订单、库存等相关的信息。图 7-5 展示了一个包含所有表和关系的数据库图表。该模式旨在容纳或展示本书所涵盖的
    JPA 规范中的大部分 O/R（对象/关系）映射，包括实体之间不同类型的继承策略。图中未显示的是专用于为继承层次结构中的每个根实体（例如 `BUSINESS_CONTACT_ID_GEN`）或未参与继承的实体（例如
    `ADDRESS_ID_GEN`）生成 ID 的表。


    ![9781430246923_Fig07-05.jpg](img/9781430246923_Fig07-05.jpg)


    图 7-5.  Wines Online 应用程序的数据库图表


    构建、部署和测试应用程序


    EJB 需要被打包成 EJB JAR（Java 归档）文件，然后才能组装成包含应用程序所有必需模块和库的 EAR（企业归档）文件。大多数应用服务器都提供部署实用程序或
    Ant 任务，以方便将 EJB 部署到其容器中。像 NetBeans、JDeveloper 和 Eclipse 这样的 Java 集成开发环境（IDE）提供了图形化部署工具，允许开发者将应用程序打包、组装并部署到应用服务器。EJB
    并非必须被打包成 EJB JAR 文件并组装成 EAR 文件。你也可以直接部署 EJB JAR 文件。在本章中，我们将把它们组装成 EAR 文件，以便使持久化单元成为一个共享模块（位于其自身的
    JAR 文件中），并为第 12 章做好准备，届时我们将为刚刚开发的葡萄酒商店后端构建客户端应用程序。我们还将把第 6 章中的 EJB/WebService
    模块以及一个包含驱动测试场景的简单测试 Servlet 的 Web 模块打包到这个 EAR 文件中。


    打包、组装和部署方面的内容将在第 11 章中详细介绍。在本章中，我们使用会话 Bean、MDB、JPA 实体和 Web 服务开发了葡萄酒商店应用程序的后端。使用
    NetBeans 并部署到 GlassFish，我们将执行以下步骤来打包、组装、部署和测试本章中定义的服务。


    先决条件


    在执行后续章节详述的任何步骤之前，请先完成第 1 章中的“入门”部分，该部分将引导您完成本章示例所需的安装和环境设置。


    创建数据库连接


    本章的示例需要数据库连接，对于这些测试，我们将使用 NetBeans 和 Glassfish 捆绑的 Derby 数据库。如果您尚未创建也用于第 3 章和第
    4 章示例的 WineApp 数据库，请单击 `Services` 选项卡，展开 `Databases` 图标，然后在 `Java DB` 节点上调用“`Create
    Database...`”。创建一个名为“`WineApp`”的数据库，用户名和密码为 `wineapp/wineapp`，如图 7-6 所示：


    ![9781430246923_Fig07-06.jpg](img/9781430246923_Fig07-06.jpg)


    图 7-6.  创建 WineApp 数据库和连接


    最后一步创建了一个数据库连接，JPA 和 EJB 项目中的 `persistence.xml` 文件里的持久化单元都会引用该连接。虽然可以预先创建数据库对象（表、序列、键约束等），但我们将让
    JPA 在每个持久化单元首次需要时自动创建这些数据库对象。


    ![image](img/sq.jpg) **注意**   本章的示例，与第 3 章的示例一样，包含一个引用这些连接详细信息的 JDBC 数据源。如果您选择使用不同的凭据，请确保更新
    `persistence.xml` 文件，以及 `Chapter07-IntegratedServices-ejb` 项目中 `glassfish-resources.xml`
    文件中定义的数据源。


    创建 JMS 和 JavaMail 资源


    此集成应用程序中的 MDB 需要 JMS 资源。在第 5 章中，我们创建了一个 JMS 主题连接工厂和一个 JMS 主题，我们将再为每种资源各创建一个，供
    MDB 使用。最初，`OrderProcessFacadeBean` 向队列发送一条消息，该消息由 `OrderProcessingMDBBean` 消费。接着，`OrderProcessingMDBBean`
    使用一个 JMS 主题连接工厂向队列发送一条消息，该消息将由 `StatusMailerBean` 用于向客户发送电子邮件。我们的每个主题连接工厂还需要定义一个
    JMS 主题。


    如果您尚未完成第 5 章（EJB 消息驱动 Bean）中的示例，请按照该章“创建 JMS 和 JavaMail 资源”一节中的步骤操作。除了为该章示例创建的资源之外，您还需要创建一个额外的
    `TopicConnectionFactory` 和 `Topic`。第 5 章将指导您使用 GlassFish 管理控制台创建这些额外资源。


    您需要创建的新资源是一个名为 `poTopicConnectionFactory` 的 `TopicConnectionFactory` 和一个名为 `PurchaseOrderTopic`
    的 `Topic`。


    打开示例应用程序


    在执行下一步之前，您可能希望关闭 NetBeans 中任何现有的项目以避免混乱。使用 `File Open Project` 菜单打开 `Chapter07-ServiceIntegration`，如图
    7-7 所示。确保选中“`Open Required Projects`”复选框。


    ![9781430246923_Fig07-07.jpg](img/9781430246923_Fig07-07.jpg)


    图 7-7.  打开 Chapter07-ServiceIntegration 项目


    请注意，这也会打开 `Chapter06-WebServiceSamples-ejb` 项目，因为它被第 7 章的示例直接使用。一些源文件最初会带有警告标记，因为在下一步配置
    EJB Web 服务之前，它们缺少依赖项。


    配置 EJB Web 服务


    我们的葡萄酒商店后端应用程序是在第 6 章工作的基础上构建的，我们在该章中实现了信用服务。


    1.  除非您按照第 6 章中的步骤部署 Web 服务并创建 Web 服务客户端，否则本章中的应用程序将无法编译。此处概述了这些步骤，但您可能需要参考第 6
    章以获取执行这些操作的更全面说明。右键单击 `Chapter06-WebServiceSamples-ejb` 项目，然后选择“Clean and Build”，接着选择“Deploy”。

    2.  在 `Chapter06-WebServiceSamples` 项目中，打开“Web Services”部分，右键单击 `CreditCheckEndpointBean`
    并选择“Test Web Service”。当网页出现时，单击“WSDL File”链接，然后复制浏览器中 `.wsdl` 文件的 URL（通常为 `http://localhost:8080/CreditService/CreditCheckEndpointBean?Tester``)`）。

    3.  现在再次右键单击 `Chapter06-WebServiceSamples-ejb` 项目，并选择“New | Web Service Client”。在向导中，选择“WSDL
    URL”单选按钮，并粘贴您在步骤 2 中复制的 `.wsdl` URL。将包设置为“`com.apress.ejb.chapter06.services.client`”，然后选择“Finish”。这将完成运行第
    7 章示例所需的 Web 服务配置。

