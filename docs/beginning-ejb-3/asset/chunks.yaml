    生命周期回调方法


    单例会话 Bean 支持构造和销毁的回调事件。以下是映射到上述事件的回调方法：


    *   `PostConstruct`：使用 `@PostConstruct` 注解标记

    *   `PreDestroy`：使用 `@PreDestroy` 注解标记。


    `PostConstruct` 回调发生在 Bean 实例在 EJB 容器中实例化之后。如果 Bean 使用任何依赖注入机制来获取对其环境中资源或其他对象的引用，则
    `PostConstruct` 事件发生在注入执行之后、Bean 类中的第一个业务方法被调用之前。


    `PreDestroy` 回调发生在应用程序关闭期间。容器会考虑单例会话 Bean 之间的 `DependsOn` 关系，并按照与创建顺序相反的顺序移除它们。对于
    `ShopperCount` 示例，`LogShopperCount` Bean 将在 `ShopperCount` Bean 之前被移除。


