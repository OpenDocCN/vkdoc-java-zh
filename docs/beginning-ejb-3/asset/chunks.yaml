- fmt: '# Java EE 服务器


    除了 Java EE 容器为 Java EE 组件提供的众多内置服务外，Java EE 还允许通过资源适配器和连接器 API 集成第三方服务——这些服务通过
    Java EE 服务提供者接口（SPI）暴露给 Java EE 组件。


    ## Java EE 部署组件


    Java EE 部署的主要构建块组件是 Java EE 应用程序和 Java EE 模块。让我们看看这些组件的定义。


    ### Java EE 应用程序


    Java EE 允许您将单个 Java EE 模块和整个 Java EE 应用程序部署到服务器。如前面“打包和部署过程概述”部分所述，在部署应用程序时，您将各个
    Java EE 模块连同任何相关的部署描述符和依赖库组件打包到一个称为 EAR 文件的包装归档 JAR 文件中，该文件具有`.ear`后缀。部署单个 Java
    EE 模块本质上是一种快捷方式，以避免将一个 JAR 文件包裹在另一个单个 JAR 文件周围。


    除了其打包结构之外，Java EE 应用程序在运行时作为一个上下文运行，其中一个或多个相关的 Java EE 组件（例如 EJB、Servlet 和应用程序客户端）可以使用共享的类加载器和命名空间进行相互操作和通信。将
    Java EE 应用程序视为一组松散耦合的 Java EE 模块可能会很有用，这些模块能够相互可见并共享资源。


    ### Java EE 模块类型


    Java EE 定义了以下 Java EE 模块类型：EJB、Web 应用程序、应用程序客户端和资源适配器。前三种对应于它们同名的容器，并且它们的部署委托给这些容器。部署资源适配器模块会在
    Java EE 服务器中安装资源，并注册这些资源以供 Java EE 组件使用。Java EE 模块引用的普通 Java 类和其他资源也可以作为库组件包含在
    EAR 文件中，既可以打包为 JAR 文件，也可以存储为目录，并与您的 Java EE 应用程序一起部署。


    请注意，由一组 JPA 实体组成的 JPA 持久化单元不是 Java EE 模块，而是一个库组件。我们将在后面的“持久化单元”部分中描述其中的一些原因。


    让我们仔细看看每种 Java EE 模块类型。


    #### EJB 模块


    EJB 模块由一个或多个会话和/或消息驱动 Bean（MDB）组成。它被打包到 EJB JAR 文件中，如果它包含`ejb-jar.xml`部署描述符（从
    Java EE 5 开始这是可选的），则必须位于 JAR 文件的`META-INF`目录中。特定于平台的描述符也可以添加到这个`META-INF`目录中。如果
    EJB JAR 文件不包含`ejb-jar.xml`文件，则 EJB Bean 类必须使用`@Stateless`、`@Stateful`、`@Singleton`或`@MessageDriven`注解将自身标识为
    EJB。


    在许多情况下，将 EJB 模块的客户端视图隔离到其自己的归档中是可取的。当客户端仅与会话 Bean 的接口通信时，它不需要访问会话 Bean 类。在这种情况下，最佳实践是将会话
    Bean 的接口以及任何其他依赖类单独打包到一个单独的 EJB 客户端 JAR 库中。这个 JAR 文件可以交给客户端，但也可以从 EJB JAR 文件中引用，这样这些接口就不需要在
    EJB JAR 文件内部重复。要引用 EJB 客户端 JAR 文件或 EAR 文件中的任何其他 JAR 文件或目录，装配器会在 JAR 文件的`META-INF/MANIFEST.MF`文件中添加一个`Class-Path`条目，指向这些位置：


    ```

    Class-Path: MyEjb-Client.jar

    ```


    **注意**：有关`MANIFEST.MF`文件的更多信息，包括本章中提到的`Class-Path`和`Extension-List`条目的用法，请参阅：`http://docs.oracle.com/javase/6/docs/technotes/guides/jar/jar.html`。


    可以通过用空格字符分隔`.jar`和目录条目来以这种方式引用多个 JAR 文件或目录。被引用的 JAR 文件的路径是相对于 EJB JAR 文件本身的，该文件必须位于
    EAR 文件的根目录中。在前面的示例中，`MyEjb-Client.jar`文件也位于 EAR 文件的根目录中。


    EJB 模块还可以包含一个持久化单元，这将在下一节中描述。持久化单元只能以展开形式存在于 EJB JAR 中；JAR 文件不能嵌套在 EJB JAR 文件内部。持久化单元由
    EJB JAR 文件内容中存在`META-INF/persistence.xml`文件来定义。


    可以使用`META-INF/application.xml`文件中的模块声明为 EJB 模块分配名称。当部署期间不存在`META-INF/application.xml`文件时（例如，当
    EJB JAR 文件独立部署或位于不包含此描述符的 EAR 文件中时），会为其分配一个默认名称。此名称源自 EJB JAR 归档的名称，减去任何目录信息或`.jar`后缀。例如，EJB
    JAR 文件可能捆绑在 EAR 文件中的以下位置：


    ```

    ./OrderManagerEJBModule.jar

    ```


    在这种情况下，其默认模块名称将是`OrderManagerEJBModule`。


    #### WAR 文件中的 EJB


    EJB 3.0 规范通过使`ejb-jar.xml`等 XML 描述符的打包成为可选，简化了 EJB 的打包。EJB 3.1 规范进一步简化了这一过程，允许将
    EJB（使用`@Stateless`、`@Stateful`、`@Singleton`或`@MessageDriven`注解标注的 POJO）直接打包在 WAR
    文件的`WEB-INF/classes`目录中。类似地，`ejb-jar.xml`描述符（如果存在）可以与`web.xml`一起直接打包到`WEB-INF`目录中。通过这一更改，用户不再需要创建单独的
    EJB JAR 模块来打包 EJB。图 11-5 描述了这种新的打包选项。


    ![9781430246923_Fig11-05.jpg](Images/9781430246923_Fig11-05.jpg)


    **图 11-5.** 将 EJB 直接打包在 WAR 文件的`WEB-INF\classes`目录下


    ### 持久化单元


    一组 JPA 实体，称为*持久化单元*，既不是严格的模块类型，也没有自己的专用容器。相反，Java EE 服务器直接支持持久化，作为其向 Java EE 容器提供的核心服务之一。这使得
    JPA 实体能够表现为持久化对象，并在其他 Java EE 容器环境中执行时与 Java EE 组件交互。由于不受限于自己的容器，JPA 实体也可以在 Java
    EE 环境之外自由执行并展示持久化行为。


    **注意**：在部署上下文中，术语*持久化单元*指的是一组共置的 JPA 实体和一个相应的（且必需的）`META-INF/persistence.xml`文件。这组文件可以打包到自己的
    JAR 文件中，也可以直接捆绑在 EJB JAR 或 WAR 文件内部。反过来，`persistence.xml`文件定义了一个或多个`<persistence-unit>`条目，这些条目可以进一步划分持久化单元打包结构中的实体。在本章中，我们通过始终在描述`<persistence-unit>`
    XML 元素时使用连字符（persistence-unit）来区分这两个名称相似的概念。因此，任何对持久化单元的引用都可以假定为指代与`persistence.xml`文件共置的实体组。'
  raw: '[Figure 11-4.](#9781430246923_Ch11.xhtml#_Fig4)  A JAVA EE Server


    In addition to the many built-in services offered to Java EE components by the
    Java EE containers, Java EE allows for the integration of third-party services—through
    resource adapters and the Connector API—that are exposed to Java EE components
    through their containers using the Java EE Service Provider Interface (SPI).


    Java EE Deployment Components


    The principal building block components of a Java EE deployment are the Java EE
    application and the Java EE modules. Let’s take a look at what defines these components.


    The Java EE Application


    Java EE lets you deploy both individual Java EE modules and entire Java EE applications
    to the server. As mentioned in the preceding “Overview of the Packaging and Deployment
    Processes” section, when deploying an application, you package the individual
    Java EE modules, together with any associated deployment descriptors and dependent
    library components, into a wrapper archive JAR file known as an EAR file, which
    has the suffix .ear. Deploying an individual Java EE module is essentially a shortcut
    to avoid wrapping one JAR file around another single JAR file.


    Apart from its packaging structure, a Java EE application operates, at run time,
    as a context in which one or more associated Java EE components, such as EJBs,
    servlets, and application clients, can operate and communicate with one another
    using a shared class loader and namespace. It may be useful to think of a Java
    EE application as a loosely coupled group of Java EE modules that are able to
    see each other and to share resources.


    Java EE Module Types


    Java EE defines the following Java EE module types: EJB, Web application, application
    client, and resource adapter. The first three correspond to their eponymous containers,
    and their deployment is delegated to these containers. Deploying a resource adapter
    module installs the resources in the Java EE server and registers these resources
    for use by Java EE components. Ordinary Java classes and other resources referenced
    by your Java EE modules may also be included as library components within an EAR
    file, either packaged as JAR files or stored as directories, and deployed with
    your Java EE application.


    Note that a JPA persistence unit, comprising a set of JPA entities, is not a Java
    EE module but a library component. We describe some of the reasons for this in
    the “Persistence Unit” section that follows.


    Let’s take a closer look at each of the Java EE module types.


    EJB Module


    An EJB module is comprised of one or more session and/or message-driven beans
    (MDBs). It is packaged into an EJB JAR file, and if it includes an ejb-jar.xml
    deployment descriptor (this is optional starting with Java EE 5), it must be located
    in the META-INF directory in the JAR file. Platform-specific descriptors may also
    be added to this META-INF directory. If the EJB JAR file doesn’t contain an ejb-jar.xml
    file, the EJB bean classes must identify themselves as EJBs using `@Stateless`,
    `@Stateful`, `@Singleton`, or `@MessageDriven` annotations.


    In many cases, it is desirable to isolate the client’s view of an EJB module into
    its own archive. When the client communicates only with a session bean’s interfaces,
    it does not need access to the session bean class. In this case, it is good practice
    to package only the interfaces of the session bean(s), along with any other dependent
    classes, into a separate EJB client JAR library. This JAR file can be handed to
    the client, but it can also be referenced from the EJB JAR file so that these
    interfaces do not need to be duplicated inside the EJB JAR file. To reference
    the EJB client JAR file, or any other JAR file or directory in the EAR file, the
    Assembler adds a `Class-Path` entry to the `META-INF/MANIFEST.MF` file in the
    JAR file that points to these locations:


    ```

    Class-Path: MyEjb-Client.jar

    ```


    ![image](Images/sq.jpg) **Note**   For further information on the `MANIFEST.MF`
    file, including usage of the Class-Path and Extension-List entries referred to
    in this chapter, please see: `http://docs.oracle.com/javase/6/docs/technotes/guides/jar/jar.html`.


    More than one JAR file or directory can be referenced in this way by separating
    the `.jar` and directory entries with a space character. The path of the referenced
    JAR files is relative to the EJB JAR file itself, which must be located in the
    root directory of the EAR file. In the preceding example, the `MyEjb-Client.jar`
    file is also located in the root directory of the EAR file.


    An EJB module may also include a persistence unit, which is described in the following
    section. A persistence unit may only exist in the EJB JAR in expanded form; JAR
    files may not be nested inside the EJB JAR file. A persistence unit is defined
    by the presence of a `META-INF/persistence.xml` file in the contents of the EJB
    JAR file.


    An EJB module may be assigned a name using a module declaration inside a `META-INF/application.xml`
    file. When no `META-INF/application.xml` file is present during deployment, as
    when the EJB JAR file is deployed stand-alone or within an EAR file that does
    not include this descriptor, it is assigned a default name. This name is derived
    from the name of the EJB JAR archive, minus any directory information or the `.jar`
    suffix. For example, an EJB JAR file may be bundled in an EAR file in the following
    location:


    ```

    ./OrderManagerEJBModule.jar

    ```


    In this case, its default module name would be `OrderManagerEJBModule`.


    EJBs in a WAR File


    The EJB 3.0 specification simplified the packaging of EJBs by making the packaging
    of XML descriptors like `ejb-jar.xml` optional. The EJB 3.1 specification has
    taken this simplification even further by allowing the packaging of EJBs (POJOs
    annotated with `@Stateless`, `@Stateful`, `@Singleton`, or `@MessageDriven` annotations)
    directly in the `WEB-INF/classes` directory of the WAR file. Similarly, the `ejb-jar.xml`
    descriptor, if present, can be packaged directly into the `WEB-INF` directory
    along with `web.xml`. With this change, users no longer need to create a separate
    EJB JAR module for packaging the EJBs. [Figure 11-5](#9781430246923_Ch11.xhtml#Fig5)
    depicts this new packaging option.


    ![9781430246923_Fig11-05.jpg](Images/9781430246923_Fig11-05.jpg)


    [Figure 11-5.](#9781430246923_Ch11.xhtml#_Fig5)  Packaging EJB directly under
    WEB-INF\classes directory of WAR file


    Persistence Unit


    A group of JPA entities, known as a *persistence unit*, is neither strictly a
    module type nor does it have its own dedicated container. Instead, the Java EE
    server supports persistence directly as one of the core services it offers to
    the Java EE containers. This allows JPA entities to behave as persistent objects
    and interact with Java EE components while executing in the other Java EE container
    environments. By not being constrained to their own container, JPA entities are
    also free to execute and demonstrate persistent behavior outside the Java EE environment.


    ![image](Images/sq.jpg) **Note**   In a deployment context, the term *persistence
    unit* refers to a group of collocated JPA entities and a ­corresponding (and mandatory)
    `META-INF/persistence.xml` file. This group of files may be packaged into its
    own JAR file, or the files may be bundled directly inside an EJB JAR or WAR file.
    In turn, the `persistence.xml` file defines one or more `<persistence-unit>` entries
    that may further partition the entities in the persistence unit packaging structure.
    In this chapter, we differentiate these two concepts that share similar names
    by always using the hyphen (persistence-unit) when describing the `<persistence-unit>`
    XML element. Thus, any reference to a persistent unit can be assumed to refer
    to the group of entities collocated with a `persistence.xml` file.'
