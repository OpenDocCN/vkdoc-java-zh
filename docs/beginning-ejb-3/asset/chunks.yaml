    结论


    在本章中，我们向你介绍了面向消息的中间件的概念，以及为什么企业正在寻求能够以异步方式进行通信的松散耦合应用程序。


    我们介绍了使用 P2P 和发布-订阅模型的消息应用程序架构，并讨论了为什么消息传递是实现异步应用程序的最佳方式之一。我们详细研究了 JMS，包括不同的 JMS
    组件，如提供者、消费者、客户端和不同类型的消息。我们研究了 MDB 以及可以构成它们的各种工件。我们介绍了 MDB 的不同配置属性，以及如何使用注解设置它们。我们通过注入
    JavaMail 资源的具体示例解释了 MDB 中的依赖注入。我们讨论了编译、打包、部署和测试 MDB 所需的内容，以及如何在 GlassFish 应用服务器中创建不同类型的资源。最后，我们介绍了使用
    GlassFish 中的应用程序客户端容器运行示例客户端程序，查看输出以及接收 MDB 发送的电子邮件消息。


    在下一章中，我们将深入探讨 Web 服务，包括如何将会话 Bean 发布为 Web 服务，以及如何从 EJB 应用程序调用 Web 服务。


    第 6 章


    ![image](img/frontdot.jpg)


    EJB 与 Web 服务


    本章将解释 Web 服务，介绍核心 Web 服务标准（SOAP、WSDL、UDDI、XML），并讨论 Java EE 平台中 Web 服务支持的演变。我们还将深入探讨如何将
    EJB 无状态会话 Bean 发布为 Web 服务。最后，我们将讨论如何从命令行 Java 客户端程序和无状态会话 Bean 调用已发布的 Web 服务。


    什么是 Web 服务？

