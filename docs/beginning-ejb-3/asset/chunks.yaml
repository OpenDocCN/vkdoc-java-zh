  raw: 'In the case of `Auto-acknowledge`, the message delivery acknowledgment happens
    after the `onMessage()` method. This property is useful for applications that
    require no duplicate messages. For example, a new order should be received by
    the inventory system once and only once. In the case of `Dups-ok-acknowledge`,
    the acknowledgment is done lazily, which means that there might be duplicate delivery
    of messages, but it reduces the overhead for the session in terms of immediate
    acknowledgement. For example, an e-mail message that gets sent out during the
    order process can possibly allow duplicate messages. We can use the `@ActivationConfigProperty`
    annotation to specify the message acknowledgment property. [Listing 5-4](#9781430246923_Ch05.xhtml#list4)
    shows the property set to allow duplicates.


    ***[Listing 5-4](#9781430246923_Ch05.xhtml#_list4).***  The @ActivationConfigProperty
    Annotation


    ```

    @MessageDriven(

    activationConfig= {

    @ActivationConfigProperty(propertyName="acknowledgeMode",

    propertyValue="Dups-ok-acknowledge")}

    )

    ```


    The Message Selector


    The message selector allows filtering of incoming messages based on the selection
    criteria provided by the bean developer using the `@ActivationConfigProperty`
    annotation. This property is useful for restricting the messages that the bean
    receives. For example, the MDB that processes the incoming orders might only process
    orders pertaining to red and white wines. The property name used to specify is
    `messageSelector`.


    Message Destination


    The message destination describes whether the MDB listens on a queue or topic.
    Bean developers can provide the description in the bean using the `@ActivationConfigProperty`
    annotation. The value of the property must be either `javax.jms.Queue` or `javax.jms.Topic`.
    For example, a new order may need to be processed by an inventory system as a
    next step in the workflow; in this case, the order entry system doesn’t have to
    broadcast the new order message. Both the order entry and inventory system can
    agree on a particular destination. [Listing 5-3](#9781430246923_Ch05.xhtml#list3)
    shows the code to specify destination name and type.


    Subscription Durability


    If the bean is designed to listen to a topic, then the bean developer can further
    specify the durability of the message. The topic can be either `Durable` or `Non-Durable`.
    Usage of `Durable` topics ensures reliability for the applications. They ensure
    that messages are not missed, even if the EJB container is temporarily offline.
    For example, we may need to make sure that the new purchase orders received from
    client applications are not lost if the EJB container goes down. All purchase
    orders have to be reliably processed by the MDBs. We can use the `@ActivationConfigProperty`
    annotation to specify the durability using the `subscriptionDurability` property.
    [Listing 5-5](#9781430246923_Ch05.xhtml#list5) shows the code to set the property
    to `Durable`. If this property is not set, the container will assume the default
    of `Non-Durable`.


    ***[Listing 5-5](#9781430246923_Ch05.xhtml#_list5).***  The Code to Set the Property
    to Durable


    ```

    @MessageDriven(

    activationConfig= {

    @ActivationConfigProperty(propertyName="subscriptionDurability", propertyValue="Durable")}

    )

    ```


    In the `StatusMailer` MDB, we will create properties using the `@ActivationConfigProperty`
    annotation. The message’s `destinationName` is set to `StatusMessageTopic`, and
    `destinationType` is set to `javax.jms.Topic`. We will use the `mappedName` parameter
    to specify the physical destination name of the topic. In our case, it is the
    same as `destinationName`. [Listing 5-6](#9781430246923_Ch05.xhtml#list6) shows
    the `StatusMailer` MDB in its current state of completion.


    ***[Listing 5-6](#9781430246923_Ch05.xhtml#_list6).***  StatusMailerBean.java


    ```

    package com.apress.ejb.chapter05;

    import javax.ejb.ActivationConfigProperty;

    import javax.jms.Message;

    import javax.ejb.MessageDriven;

    import javax.jms.MapMessage;


    @MessageDriven(activationConfig= {

    @ActivationConfigProperty(propertyName="destinationName", propertyValue="StatusMessageTopic"),

    @ActivationConfigProperty(propertyName="destinationType", propertyValue="javax.jms.Topic")

    }, mappedName="StatusMessageTopic")

    public class StatusMailerBean implements javax.jms.MessageListener{

        public void onMessage(Message message){

            try  {

                if (message instanceof MapMessage) {

                    MapMessage orderMessage = (MapMessage)message;

                    String from = orderMessage.getStringProperty("from");

                    String to = orderMessage.getStringProperty("to");

                    String subject = orderMessage.getStringProperty("subject");

                    String content = orderMessage.getStringProperty("content");

                 }

                else {

                    System.out.println("Invalid message ");

                    }

            } catch (Exception ex)  {

                ex.printStackTrace();

            }

        }

    }

    ```


    Dependency Injection in MDBs


    MDBs can use dependency injection to acquire references to resources such as JavaMail,
    EJBs, or other objects. The resources that an MDB tries to acquire and use must
    be available in the container context or environment context.


    In the sample use case from [Figure 5-5](#9781430246923_Ch05.xhtml#Fig5), we talked
    about creating an e-mail after the message is processed and sending the order
    status to the customer via e-mail. In order to do this in the `StatusMailer` message
    bean, we need to acquire a JavaMail session so that we can create an e-mail and
    send it. *JavaMail* is an API that provides a platform-independent framework for
    building mail applications. The JavaMail API is available with the Java EE platform.


    We can acquire a JavaMail session in an MDB using dependency injection. [Listing
    5-7](#9781430246923_Ch05.xhtml#list7) shows the completed `StatusMailer` MDB using
    dependency injection and the JavaMail API. The `@Resource` annotation is used
    to inject a JavaMail session with the name `mail/wineappMail`, which has been
    registered as a mail resource in the GlassFish application server. The injected
    mail session is used to create `javax.mail.Message`, and the setter methods are
    used to create the headers and content of the mail message. Finally, the `send()`
    method in the `javax.mail.Transport` class is used to send the created message.


