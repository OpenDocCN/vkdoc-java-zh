    在本章中，我们介绍了可用于满足不同需求的不同应用程序架构，以及与之配套的编程模型。我们研究了适用于 Web 和桌面应用程序的架构，还研究了 Web 服务客户端应用程序和可以利用作为
    Web 服务发布的 EJB 的业务流程服务。


    我们讨论了基于 Java EE 的 Web 技术是如何演进的，从而显著简化了 Web 应用程序的开发。


    我们深入探讨了 JSF 架构、JSF 生命周期和 JSF 应用程序，以及 JSF 工具和 UI 组件的当前状态。


    最后，我们构建了一个全面的 JSF 应用程序，用于与第 7 章中开发的集成 EJB 后端应用程序进行通信。在开发过程中，我们演示了几种编程技术，用于在 JSF
    应用程序中共享数据，以及在后端应用程序中查找和调用业务方法。


    最后，我们研究了应用程序客户端容器，包括它为在桌面机器上运行的客户端程序提供的服务。


    本书的最后一章将详细介绍各种 EJB 测试场景，并指导您如何使用 JUnit 在 GlassFish 的可嵌入 EJB 容器中测试 EJB 组件（和 JPA
    实体）。


    第 13 章


    ![image](img/frontdot.jpg)


    在可嵌入 EJB 容器中进行测试


    与所有关键任务软件一样，EJB 组件在部署到生产环境之前必须经过充分测试。EJB 中最细粒度的级别是其方法；因此，适当的单元测试必须单独测试每个 EJB 的每个方法。对于无状态会话
    Bean，这通常就足够了。由于有状态会话 Bean 也可能包含状态，因此完全覆盖还需要包含更粗粒度的场景，涉及方法调用序列。当无状态会话 Bean 通过 JPA
    实体等方式在数据库中有效存储“状态”信息时，通常也需要多步骤测试场景。在本章中，我们将研究单方法和多方法测试，涵盖主要作为基于 JPA 操作的服务接口的无状态和有状态会话
    Bean。


