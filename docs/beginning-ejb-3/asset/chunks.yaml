- fmt: '# EJB 核心概念与规范演进


    ## 实体（Entities）


    *Entities* 是具有唯一标识且代表持久化业务数据的对象。


    会话 Bean（Session Bean）和消息驱动 Bean（Message-Driven Bean）是 EJB，它们通常被统称为企业 *Bean*。在早期版本的
    EJB 中，实体被称为实体 Bean（Entity Bean），也属于这一类别。然而，在 EJB 3 中，实体现在由持久化提供者（Persistence Provider）管理，而非
    EJB 容器，因此它们不再被视为企业 Bean。


    ## EJB 容器


    EJB 容器提供了 EJB 组件运行所需的支持环境。该环境提供事务与安全服务、资源池化与缓存、组件生命周期服务、并发支持等功能——本书将逐一探讨这些内容。EJB
    组件通过 EJB 特定的元数据（Metadata）指定它们希望如何与支持容器交互，这些元数据要么由容器捕获并在运行时应用于 EJB 的行为，要么在 EJB
    组件部署到 EJB 容器时被解释并用于构建包装层。


    ## EJB 开发模型的核心特性


    在其发展历程中，EJB 始终专注于交付具备若干核心特性的组件。


    ### 声明式元数据（Declarative Metadata）


    EJB 组件模型的标志性特性之一是，开发者能够使用 Java 注解（Annotations）和/或 XML 描述符（Descriptors），以*声明式*（而非*编程式*）的方式指定企业
    Bean 和实体的行为。这极大地简化了开发过程，因为无需在 Java 源代码中嵌入服务实现代码，即可为 Bean 添加大量自定义配置。为适应开发者偏好和应用程序灵活性，EJB
    为开发者提供了注解和 XML 两种选择，并允许在同一 EJB 或实体中同时使用这两种方法来指定元数据中的行为。当同一元数据在注解和 XML 中均有定义时，XML
    声明在解决冲突时具有更高优先级。本章后续的“EJB 3 简化开发模型”部分将进一步探讨此方法的其他优势。


    ### 异常配置（Configuration by Exception）


    与声明式指定行为的能力相辅相成的是 EJB 对智能默认值（Intelligent Defaults）的强力运用。许多行为会自动附加到 EJB 或实体上，而无需显式声明，例如会话
    Bean 方法的事务行为，以及映射到实体持久化数据属性的表名和列名。仅当需要非默认行为时，才需要显式指定注解或对应的 XML 配置。在利用默认行为的最常见情况下，这种方法能够产生非常精简、干净的代码。这种开发模型被称为*异常配置*，因为仅在异常（非默认）情况下才需要显式配置组件的行为。


    ### 可伸缩性（Scalability）


    大规模应用程序要求随着客户端负载的增加而具有良好的伸缩能力。EJB 服务器采用资源池化（Resource Pooling）来最大化对象重用，利用持久化缓存（Persistence
    Cache）避免重复查询或创建相同对象，并在中间层实现乐观锁定策略（Optimistic Locking Strategy），以减轻关系数据库管理系统（RDBMS）的负载并避免并发锁定问题。EJB
    容器还管理 EJB 的生命周期，允许释放和重用依赖资源以优化性能。


    ### 位置透明性（Location Transparency）


    EJB 可配置为远程访问，从而允许通过网络连接进行访问。客户端（可能是另一个 EJB）只需请求一个远程 EJB 实例，本地和远程 EJB 容器便会透明地管理通信细节。


    ### 事务性（Transactionality）


    Java 事务 API（JTA）定义了分布式事务的标准 API，而 EJB 容器充当 EJB 的 JTA 事务管理器。自诞生以来，EJB 规范就定义了一个标准模型，用于在企业
    Bean 上声明式地指定容器管理的事务行为。


    ### 多用户安全性（Multiuser Security）


    可以在 EJB 上声明式地指定方法级访问控制，从而强制执行由应用服务器管理员定义的用户级和角色级权限。


    ### 可移植性（Portability）


    符合规范的 EJB 组件理论上可以部署到任何实现了 EJB 规范的应用服务器上。在实践中（尤其是在 EJB 3 之前的版本中），供应商提供了自己的元数据定义，企业
    Bean 开发者逐渐依赖这些定义，从而被锁定在特定供应商的实现中。随着 EJB 的成熟，它已逐渐吸收了这些原本属于平台特定的特性，因此如今实现的 EJB 比过去具有更强的可移植性。


    ### 可重用性（Reusability）


    EJB 是松耦合的组件。一个 EJB 可以被重用并打包到多个应用程序中，但它必须与依赖的 EJB 的业务接口捆绑在一起，或者能够访问这些接口。


    ### 持久化（Persistence）


    尽管不再包含在 EJB 规范中，JPA 实体仍然是 EJB 的重要补充。实体是具有唯一标识的持久化领域对象。一个实体类映射到一个数据库表，每个实体实例由该表中的一行数据表示。


    ## EJB 规范演进


    每次引入新版本的 EJB 规范时，它都会包含新的重要特性，以满足普遍需求并采用新兴技术。以下是自 1996 年诞生以来，或者更确切地说，自 1998 年首次商业实现以来，EJB
    规范演进的简要总结。


    ### EJB 1.0


    初始版本 1.0 开始支持有状态和无状态的服务对象，称为会话 Bean；并可选地支持持久化领域对象，称为实体 Bean。为了实现可移植性，EJB 通过一种特殊的远程接口（Remote
    Interface）进行访问，该接口提供了可移植性和远程访问能力，但引入了远程通信基础设施和按值传递（Pass-by-Value）语义的开销。


    ### EJB 1.1


    后续版本 1.1 强制要求供应商支持实体 Bean，并引入了 XML 部署描述符（Deployment Descriptor），以取代将元数据存储在特殊的序列化类文件中的方式。


    ### EJB 2.0


    EJB 2.0 通过引入本地接口（Local Interface）解决了远程接口的开销和按值传递的缺点。只有运行在 J2EE 容器内的客户端才能通过本地接口访问
    EJB，但按引用传递（Pass-by-Reference）的方法调用使得组件间的交互更加高效。同时引入了一种新型 EJB——消息驱动 Bean（MDB），它能够参与异步消息系统。实体
    Bean 获得了对容器管理关系（CMR）的支持，允许 Bean 开发者声明式地指定由 EJB 容器管理的实体 Bean 之间的持久化关系。此外，还引入了 Enterprise
    JavaBeans 查询语言（EJB QL），使开发者能够使用类似 SQL 的语言查询实体 Bean 实例。


    ### EJB 2.1


    EJB 2.1 增加了对 Web 服务的支持，允许会话 Bean 暴露端点接口（Endpoint Interface）；并引入了定时器服务（Timer Service），允许
    EJB 在指定时间或时间间隔被调用。EJB 2.1 还扩展了 EJB QL 函数，并引入了 XML Schema 来替代定义`ejb-jar.xml`部署描述符的
    DTD。


    ### EJB 3.0'
  raw: '*   *Entities* are objects that have unique identities and represent persistent
    business data.


    Session and message-driven beans are EJBs, and they are often referred to collectively
    as enterprise *beans*. In earlier versions of EJB, entities were referred to as
    entity beans, and they also fell into this category. In EJB 3, however, entities
    are now managed by a persistence provider and not the EJB container, and they
    are no longer considered enterprise beans.


    The EJB Container


    The EJB container provides the supporting environment in which EJB components
    operate. This environment offers transaction and security services, pooling and
    caching of resources, component life-cycle services, concurrency support, and
    more—all of which we will explore throughout this book. EJB components specify
    the details of how they wish to interact with their supporting container using
    EJB-specific metadata that is either captured by the container and applied to
    the EJB’s behavior at run time, or interpreted at the time an EJB component is
    deployed to an EJB container and used to construct wrapping.


    Core Features of the EJB Development Model


    Throughout its life, EJB has maintained its focus on delivering components imbued
    with a handful of core features.


    Declarative Metadata


    One of the hallmarks of the EJB component model is the ability for developers
    to specify the behavior of both enterprise beans and entities *declaratively*
    (as opposed to *programmatically*) using their choice of Java annotations and/or
    XML descriptors. This greatly simplifies the development process, since much customization
    can be added to a bean without having to encumber the Java source with service
    implementation code. To accommodate developer preference and application flexibility,
    EJB offers developers their choice of both annotations and XML, with the ability
    to use both methods simultaneously within the same EJB or entity, for specifying
    behavior in metadata. In cases where the same piece of metadata is defined both
    in an annotation and in XML, the XML declaration takes precedence in resolving
    the conflict. Additional benefits of this approach are explored later, in the
    “EJB 3 Simplified Development Model” section of this chapter.


    Configuration by Exception


    Coupled with the ability to specify behavior declaratively is the strong use of
    intelligent defaults in EJB. Much behavior is attached automatically to an EJB
    or an entity without it being declared explicitly, such as the transactional behavior
    of session bean methods and the names of the table and columns that map to an
    entity’s persistent data properties. An annotation, or its counterpart in XML,
    needs to be specified explicitly only when non-default behavior is desired. In
    the most common cases, where the default behavior is leveraged, this approach
    leads to very sparse, clean code. This development model is known as *configuration
    by exception*, because only in exceptional (non-default) cases is it necessary
    to configure the behavior of the component explicitly.


    Scalability


    Large-scale applications demand the ability to scale well as the client load increases.
    The EJB server employs resource pooling to maximize object reuse, utilizes a persistence
    cache to avoid repeatedly querying or creating the same objects, and implements
    an optimistic locking strategy in the middle tier to reduce load on the relational
    database management system (RDBMS) and to avoid concurrency locking issues. The
    EJB container also manages an EJB’s life cycle, allowing dependent resources to
    be freed up and reused to optimize performance.


    Location Transparency


    EJBs may be configured for remote access, allowing them to be accessed across
    a network connection. A client, which may be another EJB, simply requests an instance
    of a remote EJB, and the local and remote EJB containers transparently manage
    the communication details.


    Transactionality


    The Java Transaction API (JTA) defines a standard API for distributed transactions,
    and the EJB container acts as a JTA transaction manager to EJBs. Since its inception,
    the EJB spec has defined a standard model for declaratively specifying container-managed
    transactional behavior on enterprise beans.


    Multiuser Security


    Method-level access control may be specified declaratively on EJBs, enforcing
    user- and role-level privileges defined by application server administrators.


    Portability


    Spec-compliant enterprise beans are deployable to any application server that
    implements EJB, at least in theory. In practice (and this was particularly true
    of releases prior to EJB 3), vendors provided their own metadata definitions that
    enterprise bean developers grew to rely upon, locking them into a particular vendor’s
    implementation. As EJB has matured, it has grown to incorporate many of these
    formerly platform-specific features, so that EJBs implemented today are far more
    portable than in the past.


    Reusability


    EJBs are loosely coupled components. An EJB may be reused and packaged into multiple
    applications, though it must be bundled with, or have access to, the business
    interfaces of dependent EJBs.


    Persistence


    Although no longer covered in the EJB spec, JPA entities are an essential complement
    to EJB. Entities are persistent domain objects with unique identities. An entity
    class maps to a database table, and each entity instance is represented by a single
    row in that table.


    Progression of the EJB Spec


    Each time a new version of the EJB spec is introduced, it includes new, significant
    features to address popular demand and adopt emerging technologies. Here is a
    brief summary of how the EJB spec has progressed since its birth in 1996, or more
    importantly, since its first commercial implementations in 1998.


    EJB 1.0


    The initial release, 1.0, began with support for stateful and stateless service
    objects, called session beans; and optional support for persistent domain objects,
    called entity beans. For portability, EJBs were made accessible through a special
    remote interface that offered portability and remotability, but incurred the overhead
    of a remoting infrastructure and pass-by-value semantics.


    EJB 1.1


    The follow-up release, 1.1, mandated support among vendors for entity beans, and
    introduced the XML deployment descriptor to replace storing metadata in a special
    serialized class file.


    EJB 2.0


    EJB 2.0 addressed the overhead and pass-by-value shortcomings of remote interfaces
    by introducing the local interface. Only clients running inside the J2EE container
    could access an EJB through its local interface, but pass-by-reference method
    calls allowed for more efficient interchanges between components. A new type of
    EJB was also introduced—the message-driven bean (MDB), which could participate
    in asynchronous messaging systems. Entity beans gained support for container-managed
    relationships (CMRs), allowing bean developers to declaratively specify persistent
    relationships between entity beans that were managed by the EJB container. Also,
    Enterprise JavaBeans Query Language (EJB QL) was introduced, which gave developers
    the ability to query entity bean instances using a language that resembled SQL.


    EJB 2.1


    EJB 2.1 added support for Web Services, allowing a session bean to expose an endpoint
    interface, and a timer service that allowed EJBs to be invoked at designated times
    or intervals. EJB 2.1 also provided expanded EJB QL functions, and an XML schema
    was introduced as a replacement for the DTD that defined the `ejb-jar.xml` deployment
    descriptor.


