  raw: 'The next step is to create a `Login` managed bean that will be used with `login.jsp`.
    Managed beans are JavaBeans that are used by JSF applications. These objects are
    managed by the JSF implementation, and the properties and methods in these objects
    can be referenced from JSP pages using value-binding and method-binding expressions.
    [Listing 12-2](#9781430246923_Ch12.xhtml#list2) shows the `Login` managed bean.
    `Login` has three property fields along with their accessor: `email`, `customer`,
    and `shoppingCart`. We have an `@EJB` annotation on top of the `setShoppingCart()`
    method. We are using setter injection to inject the stateful session bean `ShoppingCart`
    that we had developed in [Chapter 7](../Text/9781430246923_Ch07.xhtml). We have
    one additional method `processLogin()` in our bean that calls the `findCustomer(String
    email)` business method using the injected `shoppingCart` stateful session bean.
    This business method returns a `Customer` object if the e-mail ID exists in our
    customer database. Additional logic is incorporated to return a string value stored
    in the `faces-config.xml` file, for use in our navigation model. We will discuss
    this shortly.


    ***[Listing 12-2](#9781430246923_Ch12.xhtml#_list2).***  Login.java


    ```

    package com.apress.ejb.chapter12.view.managed;


    import com.apress.ejb.chapter07.ejb.ShoppingCartLocal;

    import com.apress.ejb.chapter07.entities.Customer;

    import javax.ejb.EJB;


    public class Login

    {

      public Login() {

      }

      String email;

      Customer customer;

      ShoppingCartLocal shoppingCart;


    public void setEmail(String email) {

        this.email = email;

      }


    public String getEmail() {

        return email;

      }


    public String processLogin() {

        String navigation = null;

        customer = (Customer)shoppingCart.findCustomer(email);


    if (customer != null) {

          navigation = "winehome";

        }

        else {

          navigation = "register";

        }

        return navigation;

      }


    public void setCustomer(Customer customer) {

        this.customer = customer;

      }


    public Customer getCustomer() {

        return customer;

      }


    @EJB

      public void setShoppingCart(ShoppingCartLocal shoppingCart) {

        this.shoppingCart = shoppingCart;

      }


    public ShoppingCartLocal getShoppingCart() {

        return shoppingCart;

      }

    }

    ```


    The deployment descriptor `faces-config.xml` has information on page navigation,
    managed beans, and so on. [Listing 12-3](#9781430246923_Ch12.xhtml#list3) shows
    the `faces-config.xml` with control flow to and from `login.jsp.` It also shows
    the `Login` class being registered as a managed bean. We have set the scope of
    the `Login` managed bean to `session`. This allows us to store information about
    the customer and shopping cart through the session so that we don’t have to re-query
    our back-end application for the same information. This also facilitates the usage
    of this information across other pages and invokes other business methods on the
    `ShoppingCart` stateful session bean without having to look up the bean again.
    Additionally, we have created three navigation rules:


    *   From `login.jsp` to `winehome.jsp`, with the value `winehome`: This will be
    used if the login is successful.

    *   From `login.jsp` to `newCustomer.jsp`, with the value `register`: This will
    be used if the login fails and the customer wants to register as a new customer.

    *   From `newCustomer.jsp` to `login.jsp`, with the value `success`: This will
    be used to navigate the customer back to the login page after successful registration.


    ***[Listing 12-3](#9781430246923_Ch12.xhtml#_list3).***  faces-config.xml


    ```

    <?xml version="1.0" encoding="windows-1252"?>

    <!DOCTYPE faces-config PUBLIC

      "-//Sun Microsystems, Inc.//DTD JavaServer Faces Config 1.1//EN"

      "http://java.sun.com/dtd/web-facesconfig_1_1.dtd">


    <faces-config xmlns="http://java.sun.com/JSF/Configuration">


    <managed-bean>

        <managed-bean-name>Login</managed-bean-name>

        <managed-bean-class>com.apress.ejb.chapter12.view.managed.Login</managed-bean-class>

        <managed-bean-scope>session</managed-bean-scope>

      </managed-bean>


    <navigation-rule>

        <from-view-id>/login.jsp</from-view-id>

        <navigation-case>

          <from-outcome>winehome</from-outcome>

          <to-view-id>/winehome.jsp</to-view-id>

        </navigation-case>

        <navigation-case>

          <from-outcome>register</from-outcome>

          <to-view-id>/newCustomer.jsp</to-view-id>

        </navigation-case>

      </navigation-rule>


    <navigation-rule>

        <from-view-id>/newCustomer.jsp</from-view-id>

        <navigation-case>

          <from-outcome>success</from-outcome>

          <to-view-id>/login.jsp</to-view-id>

        </navigation-case>

      </navigation-rule>


    </faces-config>

    ```


    So far, we have shown you how to get started with a JSF application with a simple
    login page that can look up EJBs and invoke business methods. In the next few
    sections, we will continue on our venture to complete the remaining wine store
    JSF application pages.


    The New Customer Registration Page


    [Listing 12-4](#9781430246923_Ch12.xhtml#list4) shows the code for the `newCustomer.jsp`
    JSF page. This page is very similar to the `login.jsp` page created earlier, except
    that it has more input fields that capture the customer information. All input
    fields in the JSP page (First Name, Last Name, Phone, Email, Street 1, Street
    2, City, State, Zip Code, Credit Card, and Credit Card Expiration date) have value-binding
    expressions that map to properties in the `NewCustomer` managed bean. It also
    has a Submit button whose action is mapped to the `AddNewCustomer()` method in
    the managed bean using the expression `#{NewCustomer.AddNewCustomer}`.


    ***[Listing 12-4](#9781430246923_Ch12.xhtml#_list4).***  newCustomer.jsp'
  trans: '

    下一步是创建一个名为 `Login` 的受管 bean，它将与 `login.jsp` 配合使用。受管 bean 是 JSF 应用程序使用的 JavaBean。这些对象由
    JSF 实现管理，并且这些对象中的属性和方法可以通过值绑定和方法绑定表达式从 JSP 页面引用。清单 12-2 展示了 `Login` 受管 bean。`Login`
    有三个属性字段及其访问器：`email`、`customer` 和 `shoppingCart`。我们在 `setShoppingCart()` 方法上方添加了一个
    `@EJB` 注解。我们使用 setter 注入来注入我们在第 7 章中开发的有状态会话 bean `ShoppingCart`。我们的 bean 中还有一个额外的方法
    `processLogin()`，它使用注入的 `shoppingCart` 有状态会话 bean 调用 `findCustomer(String email)`
    业务方法。如果客户数据库中存在该电子邮件 ID，此业务方法将返回一个 `Customer` 对象。我们还加入了额外的逻辑，以返回存储在 `faces-config.xml`
    文件中的字符串值，供导航模型使用。我们稍后将对此进行讨论。


    ***清单 12-2.***  Login.java


    ```

