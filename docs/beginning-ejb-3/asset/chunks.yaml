- fmt: 'This EJB container-provided `UserTransaction` interface provides `begin()`,
    `commit()`, and `rollback()` transaction demarcation methods to the bean. Similarly,
    non–enterprise bean clients may acquire a `UserTransaction` resource from a JTA
    server other than the EJB container to demarcate transactions from an application
    client environment, or they may use a non-JTA resource-local `EntityTransaction`
    obtained through an `EntityManager` (see below). Regardless of how they begin
    a transaction, though, it becomes the transaction in context when they invoke
    a session bean method, and the rules from [Table 8-3](#9781430246923_Ch08.xhtml#Tab3)
    apply.


    In the example we will examine shortly, a stateful session bean using an `EXTENDED`
    persistence context and BMT demarcation initiates a transaction in one method
    that is then propagated to subsequent method calls until the transaction is finally
    committed in a separate method. This behavior could not be specified with the
    same method structure by calling these methods separately on a CMT session bean,
    although it would be possible to achieve the same results by wrapping these separate
    calls inside a single CMT-demarcated custom method on a CMT session bean.


    ![image](Images/sq.jpg) **Note** How does the EJB server wire up a transaction
    context? You may be curious as to how the EJB server is able to automatically
    enlist database connections, and other resources obtained programmatically inside
    an enterprise bean, with the transaction context. Since the EJB server is providing
    the context for executing bean methods, it is able to interpose on these requests
    and perform this side-effect logic without interrupting the flow of execution
    within the method. That is, it intercepts the method invocation before it is performed;
    does some extra work (like checking the state of the transaction context, possibly
    creating a new transaction, and associating the enterprise bean with that context);
    and then invokes the bean method. Upon returning from the bean method invocation,
    it again has an opportunity to perform extra logic, such as committing the transaction
    that was created when the method was called, before returning control to the client
    that invoked the bean method in the first place.


    ## Implicit Commit vs. Explicit Commit


    When using CMT, the container requires that any transaction that it begins when
    a method is called will be concluded when the method returns to the caller. This
    is known as implicit commit behavior, or sometimes referred to as auto-commit
    behavior. The container must enforce this rule or run the risk of losing track
    of the transaction as control passes up the process stack. While you can still
    use the container-managed transactions with CMT to allow multiple methods to be
    called within a single transaction, you must do this by wrapping your method calls
    within an outer container-managed method. From the perspective of a client, this
    still appears to be a single method call, to the wrapper method.


    When using BMT with stateful session beans, you have the flexibility to achieve
    an explicit commit model, where the bean or the client can control the beginning
    and end of a transaction, and call multiple methods explicitly during that time
    before concluding with an explicit call to commit or roll back the work. This
    puts the burden on the client, or on the bean developer, to ensure that transactions
    are not left dangling. With proper care, however, this is a powerful tool when
    the application requires this behavior. As mentioned earlier, EJB provides a built-in
    transaction for session beans and MDBs to use for this—the `javax.transaction.UserTransaction`—which
    the bean can access through its injected `javax.ejb.EJBContext` property (as either
    a `SessionContext` or a `MessageDrivenContext` instance).


    We will further explore both implicit and explicit commit behavior in the sample
    app at the end of this chapter.


    ## Using Transactions with JPA Entities


    This section will discuss the following questions:


    * How are transactions managed in the persistence layer?

    * What options does the persistence framework offer for controlling transactions
    involving entities?

    * What is the role of the persistence context in a transaction?

    * How do entities become associated with, and dissociated from, a transactional
    context?


    If you recall from [Chapter 3](../Text/9781430246923_Ch03.xhtml), a persistence
    unit defines a set of entity classes, and a persistence context is a managed set
    of entity instances from a single persistence unit. At any point in time, across
    multiple applications executing in an application server, many persistence contexts
    may be actively associated with any given persistence unit, but each persistence
    context is associated with, at most, one transaction context.


    ### Relationship Between Entities and a Transaction Context


    From the preceding discussion about how the EJB server acts as a transaction coordinator
    in associating resources with a transaction context, you may have realized that
    the persistence context is the resource that gets associated with a transaction.
    In this way, a persistence context is propagated through method calls so that
    entities in a persistence unit can see each other’s intermediate state, through
    their common persistence context, whenever they are associated with the same transaction
    context. Also, the restriction that only one persistence context for any given
    persistence unit must be associated with a given transaction context ensures that
    for any entity of type `T` with identity `I`, its state will be represented by
    only one persistence context within any transaction context.


    Within an application thread, only one transaction context is available at any
    moment, but the EJB server is free to dissociate one persistence context from
    that thread and associate a new persistence context for the same persistence unit
    to satisfy transaction isolation boundaries. When the EJB server does this, the
    newly instantiated persistence context is not able to see the intermediate changes
    made to any entities associated with the suspended persistence context.


    ### Container-Managed vs. Application-Managed Persistence Context


    The persistence services in EJB let you opt out of container-managed persistence
    contexts altogether and manage the life cycles of your persistence context explicitly
    within your application code. When an `EntityManager` instance is injected (or
    acquired through JNDI), it comes in as a container-managed persistence context.
    The container automatically associates container-managed persistence contexts
    with any transaction that happens to be in context at the time that the `EntityManager`
    is used, and it destroys the persistence context when the transaction concludes
    (with one caveat—see extended persistence contexts, below). Should an application
    wish to control how or whether its persistence contexts are associated with transactions,
    and whether it survives past transactional boundaries, it may obtain an `EntityManagerFactory`
    (again, through container injection or JNDI lookup) and explicitly create the
    `EntityManager` instances that manage their persistence contexts. An application-managed
    persistence context is used when the `EntityManager` is obtained through an `EntityManagerFactory`—a
    requirement when running outside the Java EE container. For more information on
    using an application-managed `EntityManager` outside of a Java EE container, as
    in a pure Java SE environment, please see [Chapter 4](../Text/9781430246923_Ch04.xhtml).


    ### Transaction-Scoped Persistence Context vs. Extended Persistence Context


    A persistence context that is created when a transaction is created, and destroyed
    when the transaction ends, is known as a transaction-scoped persistence context.
    This is the behavior of persistence contexts associated with all `EntityManager`s
    used on a stateless session bean.'
