  trans: '

    此 EJB 容器提供的 `UserTransaction` 接口为 Bean 提供了 `begin()`、`commit()` 和 `rollback()`
    事务划分方法。类似地，非企业 Bean 客户端可以从 EJB 容器之外的 JTA 服务器获取 `UserTransaction` 资源，以便在应用客户端环境中划分事务，或者它们可以使用通过
    `EntityManager` 获取的非 JTA 资源本地 `EntityTransaction`（见下文）。不过，无论它们如何开始一个事务，当它们调用会话
    Bean 方法时，该事务都会成为上下文中的事务，并且适用表 8-3 中的规则。


    在我们即将分析的示例中，一个使用 `EXTENDED` 持久化上下文和 BMT 划分的有状态会话 Bean 在一个方法中启动一个事务，该事务随后会传播到后续的方法调用，直到该事务最终在另一个单独的方法中被提交。这种行为的实现无法通过在
    CMT 会话 Bean 上分别调用这些方法并采用相同的方法结构来达成，尽管可以通过将这些单独的调用包装在 CMT 会话 Bean 上的单个 CMT 划分的自定义方法中来实现相同的结果。


    ![image](img/sq.jpg) **注意**  EJB 服务器是如何连接事务上下文的？您可能好奇 EJB 服务器如何能够自动将数据库连接以及在企业
    Bean 内部通过编程方式获取的其他资源注册到事务上下文中。由于 EJB 服务器为执行 Bean 方法提供了上下文，它能够介入这些请求并执行这种副作用逻辑，而不会中断方法内的执行流程。也就是说，它在方法调用执行之前进行拦截；执行一些额外的工作（例如检查事务上下文的状态，可能创建一个新事务，并将企业
    Bean 与该上下文关联）；然后调用 Bean 方法。从 Bean 方法调用返回后，它再次有机会执行额外的逻辑，例如提交在调用该方法时创建的事务，然后再将控制权返回给最初调用该
    Bean 方法的客户端。


    隐式提交与显式提交


    使用 CMT 时，容器要求其在调用方法时开始的任何事务，都必须在方法返回给调用者时结束。这被称为隐式提交行为，有时也称为自动提交行为。容器必须强制执行此规则，否则当控制权在进程栈中向上传递时，可能会丢失对事务的跟踪。虽然您仍然可以使用
    CMT 的容器管理事务来允许在单个事务中调用多个方法，但您必须通过将方法调用包装在外部的容器管理方法中来实现这一点。从客户端的角度来看，这仍然是对包装器方法的单个方法调用。


    当对有状态会话 Bean 使用 BMT 时，您可以灵活地实现显式提交模型，其中 Bean 或客户端可以控制事务的开始和结束，并在结束之前显式调用提交或回滚操作期间，显式地调用多个方法。这给客户端或
    Bean 开发者带来了负担，以确保事务不会悬而未决。然而，如果处理得当，当应用程序需要这种行为时，这将是一个强大的工具。如前所述，EJB 为会话 Bean
    和 MDB 提供了一个内置事务供其使用——`javax.transaction.UserTransaction`——Bean 可以通过其注入的 `javax.ejb.EJBContext`
    属性（作为 `SessionContext` 或 `MessageDrivenContext` 实例）访问该事务。


    我们将在本章末尾的示例应用中进一步探讨隐式和显式提交行为。


    在 JPA 实体中使用事务


    本节将讨论以下问题：


    *   持久化层中的事务是如何管理的？

    *   持久化框架提供了哪些选项来控制涉及实体的事务？

    *   持久化上下文在事务中的作用是什么？

    *   实体如何与事务上下文关联和解除关联？


    如果您还记得第 3 章，持久化单元定义了一组实体类，而持久化上下文是来自单个持久化单元的一组受管理的实体实例。在任何时间点，跨应用服务器中执行的多个应用程序，许多持久化上下文可能活跃地与任何给定的持久化单元相关联，但每个持久化上下文最多与一个事务上下文相关联。


    实体与事务上下文之间的关系


    从前面关于 EJB 服务器如何作为事务协调器将资源与事务上下文关联的讨论中，您可能已经意识到持久化上下文就是与事务关联的资源。通过这种方式，持久化上下文通过方法调用进行传播，以便持久化单元中的实体，只要它们与同一个事务上下文关联，就可以通过它们共同的持久化上下文看到彼此的中间状态。此外，对于任何给定的持久化单元，必须只有一个持久化上下文与给定的事务上下文相关联，这一限制确保了对于任何标识为
    `I` 的类型为 `T` 的实体，其状态在任何事务上下文中都只能由一个持久化上下文表示。


    在一个应用程序线程中，任何时刻只有一个事务上下文可用，但 EJB 服务器可以自由地将一个持久化上下文与该线程解除关联，并为同一个持久化单元关联一个新的持久化上下文，以满足事务隔离边界。当
    EJB 服务器这样做时，新实例化的持久化上下文无法看到对与挂起的持久化上下文关联的任何实体所做的中间更改。


    容器管理持久化上下文与应用管理持久化上下文


    EJB 中的持久化服务允许您完全退出容器管理的持久化上下文，并在您的应用程序代码中显式管理持久化上下文的生命周期。当注入（或通过 JNDI 获取）一个 `EntityManager`
    实例时，它作为容器管理的持久化上下文出现。容器会自动将容器管理的持久化上下文与使用 `EntityManager` 时恰好处于上下文中的任何事务关联起来，并在事务结束时销毁该持久化上下文（有一个例外——请参见下面的扩展持久化上下文）。如果应用程序希望控制其持久化上下文如何或是否与事务关联，以及它是否能在事务边界之后继续存在，它可以获取一个
    `EntityManagerFactory`（同样通过容器注入或 JNDI 查找）并显式创建管理其持久化上下文的 `EntityManager` 实例。当
    `EntityManager` 通过 `EntityManagerFactory` 获取时，使用的是应用管理的持久化上下文——这是在 Java EE 容器外部运行时的要求。有关在
    Java EE 容器外部（例如在纯 Java SE 环境中）使用应用管理的 `EntityManager` 的更多信息，请参见第 4 章。


    事务范围持久化上下文与扩展持久化上下文


    在事务创建时创建、在事务结束时销毁的持久化上下文称为事务范围持久化上下文。这是与无状态会话 Bean 上使用的所有 `EntityManager` 关联的持久化上下文的行为。

