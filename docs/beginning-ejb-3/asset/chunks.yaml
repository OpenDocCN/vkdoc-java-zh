- fmt: "# Java EE Module Packaging\n\nAs mentioned in the preceding note, the packaging\
    \ of persistence units is different from the packaging of other module types.\
    \ When packaged in a Java EE application EAR file, a persistence unit is treated\
    \ as a library component (see the “Library Components” section below). It can\
    \ be packaged into a JAR file, or its classes can be packaged directly inside\
    \ an EJB JAR or WAR file. Either way, a `META-INF/persistence.xml` file serves\
    \ to identify the entities contained in the persistence unit. We will discuss\
    \ the packaging details in the “Assembling a Persistence Unit” section later in\
    \ this chapter.\n\n## Web Application Module\n\nA Web application module is comprised\
    \ of servlets, HTML pages, JSF, JSP documents, and any other Web-based files.\
    \ Its deployment descriptor is the `WEB-INF/web.xml` file and, as with the EJB\
    \ module, the presence of this file is now optional starting with Java EE 5 since\
    \ its contents can be derived using default rules. When archived, the contents\
    \ of a Web application module are packaged into a JAR file with the suffix `.war`.\
    \ This is commonly referred to as a *WAR file*.\n\nThe contents of a WAR file\
    \ follow a special structure to suit application partitioning in Web browsers\
    \ better. Of particular relevance when bundling persistence units into a WAR file,\
    \ Java `.class` files are placed in the `WEB-INF/classes` directory, and dependent\
    \ JAR files may be added directly to the `WEB-INF/lib` directory.\n\nSimilar to\
    \ an EJB module, a Web module may be assigned a name using a module declaration\
    \ inside a `META-INF/application.xml` file. When no `META-INF/application.xml`\
    \ file is present during deployment, as when the WAR file is deployed stand-alone\
    \ or within an EAR file that does not include this descriptor, it is assigned\
    \ a default name. This name is derived from the name of the WAR archive, minus\
    \ any directory information or the `.war` suffix. For example, a WAR file may\
    \ be bundled in an EAR file in the following location:\n\n```\n./OrderManagerWebApp.war\n\
    ```\n\nIn this case, its default module name would be `OrderManagerWebApp`.\n\n\
    ## Resource Adapter Module\n\nResource adapters offer a mechanism for extending\
    \ a Java EE server. They allow resources and services managed by external systems\
    \ to be integrated into the Java EE server for use by components executing in\
    \ the Java EE containers. A resource adapter module contains a set of resource\
    \ adapters and an optional `META-INF/ra.xml` deployment descriptor.\n\nDuring\
    \ deployment, a resource adapter is packaged into a *Resource Archive (RAR) file*,\
    \ which is a JAR file with the suffix `.rar`.\n\n## Application Client Module\n\
    \nAn application client module contains Java classes that can be executed in a\
    \ Java SE environment on the client tier. The application client container is\
    \ a lightweight Java EE container that supports injection and provides persistence,\
    \ security, and messaging services, among others. It does not provide many of\
    \ the services that are available from the middle-tier Java EE containers.\n\n\
    The deployment descriptor for an application client module resides in `META-INF/application-client.xml`\
    \ and, like the other Java EE module deployment descriptors, is optional starting\
    \ with Java EE 5.\n\n## Library Components\n\nShared classes or other resources\
    \ that your modules require at run time can be packaged into *library components*.\
    \ Libraries may either be installed in the application server (the process of\
    \ installing a library is not described here) or bundled inside your EAR or WAR\
    \ file. Any JAR-format file embedded inside an EAR, whether a Java EE module or\
    \ a bundled library archive, may reference a bundled library component using the\
    \ `Class-Path` property in the `META-INF/MANIFEST.MF` file.\n\n![image](Images/sq.jpg)\
    \ **Note**   Whenever a JAR file is referenced through a `Class-Path` entry, only\
    \ the classes in the referenced JAR file are recognized by the deployment tool.\
    \ Any descriptor files found in the referenced JAR file will be ignored.\n\n###\
    \ Bundled Libraries\n\n[Listing 11-1](#9781430246923_Ch11.xhtml#list1) shows the\
    \ file contents of a sample EAR file to demonstrate how the `Class-Path` property\
    \ references a bundled library. Here we use a shorthand notation to show the `Class-Path:\
    \ myEjb-Client.jar` entries that reside in the `META-INF/MANIFEST.MF` files for\
    \ their associated JAR and WAR files.\n\n***[Listing 11-1](#9781430246923_Ch11.xhtml#_list1).***\
    \  Example EAR File Contents Showing Explicit Module Dependencies on a Bundled\
    \ Library Component\n\n```\nmyApp.ear:\n META-INF/application.xml\n myEjb.jar\
    \ Class-Path: myEjb-Client.jar\n myWebApp.war Class-Path: myEjb-Client.jar\n myEjb-Client.jar\n\
    ```\n\nIn this example, the client-side interfaces (remote, local, and Web service\
    \ endpoint interfaces) have been deliberately stripped from the `myEjb.jar` EJB\
    \ module and packaged into the bundled `myEjb-Client.jar` library component. The\
    \ `META-INF/ejb-jar.xml` descriptor in `myEjb.jar` contains the following entry:\n\
    \n```\n<ejb-client-jar>myEjb-Client.jar</ejb-client-jar>\n```\n\nThis identifies\
    \ `myEjb-Client.jar` as the JAR file holding its client-side interfaces. The `myEjb.jar`\
    \ EJB module depends on these EJB interfaces, and it declares its dependence through\
    \ its `Class-Path` entry referencing the `myEjb-Client.jar` library. The `myWebApp.war`\
    \ Web module references these EJB interfaces, and it declares its dependence on\
    \ `myEjb-Client.jar` in the same way. The `myEjb-Client.jar` library is an ordinary\
    \ JAR file, and it sits alongside the EJB and WAR files in the EAR file.\n\nAn\
    \ alternative to explicitly declaring dependence on a bundled library component\
    \ is to use the EAR file’s built-in library directory, `lib`, as shown in [Listing\
    \ 11-2](#9781430246923_Ch11.xhtml#list2). All JAR files found in the `lib` directory\
    \ are automatically added to the class-path of the Java EE modules in the EAR\
    \ file.\n\n***[Listing 11-2](#9781430246923_Ch11.xhtml#_list2).***  Example EAR\
    \ File Contents Showing Implicit Module Dependencies on a Shared, Bundled Library\
    \ Component\n\n```\nmyApp.ear:\n META-INF/application.xml\n myEjb.jar\n myWebApp.war\n\
    \ lib/myEjb-Client.jar\n```\n\nThis achieves the same result as [Listing 11-1](#9781430246923_Ch11.xhtml#list1).\
    \ Assuming `application.xml` does not specify a `<library-directory>` element\
    \ that overrides the default `lib` directory, the Java EE server will automatically\
    \ add the `myEjb-Client.jar` file to the class-paths of the `myEjb.jar` and `myWebApp.war`\
    \ modules.\n\nLibraries may also be bundled in the `WEB-INF/lib` directory for\
    \ the JAR files of a WAR file, and in the `WEB-INF/classes` directory for the\
    \ unpackaged classes of a WAR file.\n\n### Installed Libraries\n\nIt is also possible\
    \ to install libraries in your application server environment and then reference\
    \ them from the JAR-format files in your EAR file using the `Extension-List` property\
    \ in the JAR file’s `META-INF/MANIFEST.MF` file. This is an efficient means of\
    \ sharing libraries across Java EE applications since it avoids having to bundle\
    \ the libraries redundantly in multiple EAR files. The installed libraries are\
    \ stored on disk by the application server instance, and typically a shared library\
    \ entry in one of the application server’s configuration files links the name\
    \ of the installed library with its JAR file or files. Java EE applications may\
    \ then refer to this installed library by name without having to know about the\
    \ JAR file contents of the library.\n\nAn example of using an installed library\
    \ is shown in [Listing 11-3](#9781430246923_Ch11.xhtml#list3).\n\n***[Listing\
    \ 11-3](#9781430246923_Ch11.xhtml#_list3).***  Example EAR File Contents Showing\
    \ Usage of an Installed Library\n\n```\nmyApp.ear:\n META-INF/MANIFEST.MF:\n \
    \ Extension-List: commonUtils\n  commonUtils-Extension-Name: com/apress/ejb/ch11/commonUtils\n\
    \  commonUtils-Extension-Specification-Version: 1.4\n META-INF/application.xml\n\
    \ myEjb.jar\n```"
  raw: 'As mentioned in the preceding note, the packaging of persistence units is
    different from the packaging of other module types. When packaged in a Java EE
    application EAR file, a persistence unit is treated as a library component (see
    the “Library Components” section below). It can be packaged into a JAR file, or
    its classes can be packaged directly inside an EJB JAR or WAR file. Either way,
    a `META-INF/persistence.xml` file serves to identify the entities contained in
    the persistence unit. We will discuss the packaging details in the “Assembling
    a Persistence Unit” section later in this chapter.


    Web Application Module


    A Web application module is comprised of servlets, HTML pages, JSF, JSP documents,
    and any other Web-based files. Its deployment descriptor is the `WEB-INF/web.xml`
    file and, as with the EJB module, the presence of this file is now optional starting
    with Java EE 5 since its contents can be derived using default rules. When archived,
    the contents of a Web application module are packaged into a JAR file with the
    suffix `.war`. This is commonly referred to as a *WAR file*.


    The contents of a WAR file follow a special structure to suit application partitioning
    in Web browsers better. Of particular relevance when bundling persistence units
    into a WAR file, Java `.class` files are placed in the `WEB-INF/classes` directory,
    and dependent JAR files may be added directly to the `WEB-INF/lib` directory.


    Similar to an EJB module, a Web module may be assigned a name using a module declaration
    inside a `META-INF/application.xml` file. When no `META-INF/application.xml` file
    is present during deployment, as when the WAR file is deployed stand-alone or
    within an EAR file that does not include this descriptor, it is assigned a default
    name. This name is derived from the name of the WAR archive, minus any directory
    information or the `.war` suffix. For example, a WAR file may be bundled in an
    EAR file in the following location:


    ```

    ./OrderManagerWebApp.war

    ```


    In this case, its default module name would be `OrderManagerWebApp`.


    Resource Adapter Module


    Resource adapters offer a mechanism for extending a Java EE server. They allow
    resources and services managed by external systems to be integrated into the Java
    EE server for use by components executing in the Java EE containers. A resource
    adapter module contains a set of resource adapters and an optional `META-INF/ra.xml`
    deployment descriptor.


    During deployment, a resource adapter is packaged into a *Resource Archive (RAR)
    file*, which is a JAR file with the suffix `.rar`.


    Application Client Module


    An application client module contains Java classes that can be executed in a Java
    SE environment on the client tier. The application client container is a lightweight
    Java EE container that supports injection and provides persistence, security,
    and messaging services, among others. It does not provide many of the services
    that are available from the middle-tier Java EE containers.


    The deployment descriptor for an application client module resides in `META-INF/application-client.xml`
    and, like the other Java EE module deployment descriptors, is optional starting
    with Java EE 5.


    Library Components


    Shared classes or other resources that your modules require at run time can be
    packaged into *library components*. Libraries may either be installed in the application
    server (the process of installing a library is not described here) or bundled
    inside your EAR or WAR file. Any JAR-format file embedded inside an EAR, whether
    a Java EE module or a bundled library archive, may reference a bundled library
    component using the `Class-Path` property in the `META-INF/MANIFEST.MF` file.


    ![image](Images/sq.jpg) **Note**   Whenever a JAR file is referenced through a
    `Class-Path` entry, only the classes in the referenced JAR file are recognized
    by the deployment tool. Any descriptor files found in the referenced JAR file
    will be ignored.


    Bundled Libraries


    [Listing 11-1](#9781430246923_Ch11.xhtml#list1) shows the file contents of a sample
    EAR file to demonstrate how the `Class-Path` property references a bundled library.
    Here we use a shorthand notation to show the `Class-Path: myEjb-Client.jar` entries
    that reside in the `META-INF/MANIFEST.MF` files for their associated JAR and WAR
    files.


    ***[Listing 11-1](#9781430246923_Ch11.xhtml#_list1).***  Example EAR File Contents
    Showing Explicit Module Dependencies on a Bundled Library Component


    ```

    myApp.ear:

     META-INF/application.xml

     myEjb.jar Class-Path: myEjb-Client.jar

     myWebApp.war Class-Path: myEjb-Client.jar

     myEjb-Client.jar

    ```


    In this example, the client-side interfaces (remote, local, and Web service endpoint
    interfaces) have been deliberately stripped from the `myEjb.jar` EJB module and
    packaged into the bundled `myEjb-Client.jar` library component. The `META-INF/ejb-jar.xml`
    descriptor in `myEjb.jar` contains the following entry:


    ```

    <ejb-client-jar>myEjb-Client.jar</ejb-client-jar>

    ```


    This identifies `myEjb-Client.jar` as the JAR file holding its client-side interfaces.
    The `myEjb.jar` EJB module depends on these EJB interfaces, and it declares its
    dependence through its `Class-Path` entry referencing the `myEjb-Client.jar` library.
    The `myWebApp.war` Web module references these EJB interfaces, and it declares
    its dependence on `myEjb-Client.jar` in the same way. The `myEjb-Client.jar` library
    is an ordinary JAR file, and it sits alongside the EJB and WAR files in the EAR
    file.


    An alternative to explicitly declaring dependence on a bundled library component
    is to use the EAR file’s built-in library directory, `lib`, as shown in [Listing
    11-2](#9781430246923_Ch11.xhtml#list2). All JAR files found in the `lib` directory
    are automatically added to the class-path of the Java EE modules in the EAR file.


    ***[Listing 11-2](#9781430246923_Ch11.xhtml#_list2).***  Example EAR File Contents
    Showing Implicit Module Dependencies on a Shared, Bundled Library Component


    ```

    myApp.ear:

     META-INF/application.xml

     myEjb.jar

     myWebApp.war

     lib/myEjb-Client.jar

    ```


    This achieves the same result as [Listing 11-1](#9781430246923_Ch11.xhtml#list1).
    Assuming `application.xml` does not specify a `<library-directory>` element that
    overrides the default `lib` directory, the Java EE server will automatically add
    the `myEjb-Client.jar` file to the class-paths of the `myEjb.jar` and `myWebApp.war`
    modules.


    Libraries may also be bundled in the `WEB-INF/lib` directory for the JAR files
    of a WAR file, and in the `WEB-INF/classes` directory for the unpackaged classes
    of a WAR file.


    Installed Libraries


    It is also possible to install libraries in your application server environment
    and then reference them from the JAR-format files in your EAR file using the `Extension-List`
    property in the JAR file’s `META-INF/MANIFEST.MF` file. This is an efficient means
    of sharing libraries across Java EE applications since it avoids having to bundle
    the libraries redundantly in multiple EAR files. The installed libraries are stored
    on disk by the application server instance, and typically a shared library entry
    in one of the application server’s configuration files links the name of the installed
    library with its JAR file or files. Java EE applications may then refer to this
    installed library by name without having to know about the JAR file contents of
    the library.


    An example of using an installed library is shown in [Listing 11-3](#9781430246923_Ch11.xhtml#list3).


    ***[Listing 11-3](#9781430246923_Ch11.xhtml#_list3).***  Example EAR File Contents
    Showing Usage of an Installed Library


    ```

    myApp.ear:

     META-INF/MANIFEST.MF:

      Extension-List: commonUtils

      commonUtils-Extension-Name: com/apress/ejb/ch11/commonUtils

      commonUtils-Extension-Specification-Version: 1.4

     META-INF/application.xml

     myEjb.jar

    ```'
  trans: '

    如前文所述，持久化单元的打包方式与其他模块类型不同。当打包在 Java EE 应用程序的 EAR 文件中时，持久化单元被视为一个库组件（请参见下文“库组件”一节）。它可以被打包成一个
    JAR 文件，或者其类可以直接打包在 EJB JAR 或 WAR 文件中。无论哪种方式，`META-INF/persistence.xml` 文件都用于标识持久化单元中包含的实体。我们将在本章后面的“组装持久化单元”一节中讨论打包细节。


    Web 应用程序模块


    Web 应用程序模块由 Servlet、HTML 页面、JSF、JSP 文档以及任何其他基于 Web 的文件组成。其部署描述符是 `WEB-INF/web.xml`
    文件，与 EJB 模块一样，从 Java EE 5 开始，该文件的存在现在是可选的，因为其内容可以使用默认规则推导出来。归档时，Web 应用程序模块的内容被打包成一个后缀为
    `.war` 的 JAR 文件。这通常被称为 *WAR 文件*。


    WAR 文件的内容遵循一种特殊结构，以便更好地适应 Web 浏览器中的应用程序分区。在将持久化单元打包到 WAR 文件中时，特别相关的是，Java `.class`
    文件放置在 `WEB-INF/classes` 目录中，而依赖的 JAR 文件可以直接添加到 `WEB-INF/lib` 目录中。


    与 EJB 模块类似，Web 模块可以通过 `META-INF/application.xml` 文件中的模块声明来分配一个名称。当部署期间不存在 `META-INF/application.xml`
    文件时（例如，当 WAR 文件独立部署或位于不包含此描述符的 EAR 文件中时），会为其分配一个默认名称。此名称源自 WAR 归档文件的名称，去掉任何目录信息或
    `.war` 后缀。例如，WAR 文件可以打包在 EAR 文件中的以下位置：


    ```

    ./OrderManagerWebApp.war

    ```


    在这种情况下，其默认模块名称将是 `OrderManagerWebApp`。


    资源适配器模块


    资源适配器提供了一种扩展 Java EE 服务器的机制。它们允许将由外部系统管理的资源和服务集成到 Java EE 服务器中，供在 Java EE 容器中执行的组件使用。资源适配器模块包含一组资源适配器和一个可选的
    `META-INF/ra.xml` 部署描述符。


    在部署期间，资源适配器被打包成一个*资源归档 (RAR) 文件*，这是一个后缀为 `.rar` 的 JAR 文件。


    应用程序客户端模块


    应用程序客户端模块包含可以在客户端层的 Java SE 环境中执行的 Java 类。应用程序客户端容器是一个轻量级的 Java EE 容器，它支持注入，并提供持久化、安全性和消息传递等服务。它不提供中间层
    Java EE 容器可用的许多服务。


    应用程序客户端模块的部署描述符位于 `META-INF/application-client.xml` 中，并且与其他 Java EE 模块部署描述符一样，从
    Java EE 5 开始是可选的。


    库组件


    模块在运行时所需的共享类或其他资源可以打包到*库组件*中。库可以安装在应用程序服务器中（此处不描述安装库的过程），也可以捆绑在您的 EAR 或 WAR 文件中。嵌入在
    EAR 中的任何 JAR 格式文件，无论是 Java EE 模块还是捆绑的库归档文件，都可以使用 `META-INF/MANIFEST.MF` 文件中的 `Class-Path`
    属性来引用捆绑的库组件。


    ![image](img/sq.jpg) **注意**   每当通过 `Class-Path` 条目引用 JAR 文件时，部署工具仅识别被引用 JAR 文件中的类。被引用
    JAR 文件中的任何描述符文件都将被忽略。


    捆绑的库


    清单 11-1 显示了一个示例 EAR 文件的文件内容，以演示 `Class-Path` 属性如何引用捆绑的库。这里我们使用一种简写符号来显示位于其关联 JAR
    和 WAR 文件的 `META-INF/MANIFEST.MF` 文件中的 `Class-Path: myEjb-Client.jar` 条目。


    ***清单 11-1.***  示例 EAR 文件内容，显示模块对捆绑库组件的显式依赖


    ```

    myApp.ear:

     META-INF/application.xml

     myEjb.jar Class-Path: myEjb-Client.jar

     myWebApp.war Class-Path: myEjb-Client.jar

     myEjb-Client.jar

    ```


    在此示例中，客户端接口（远程、本地和 Web 服务端点接口）已特意从 `myEjb.jar` EJB 模块中剥离出来，并打包到捆绑的 `myEjb-Client.jar`
    库组件中。`myEjb.jar` 中的 `META-INF/ejb-jar.xml` 描述符包含以下条目：


    ```

    <ejb-client-jar>myEjb-Client.jar</ejb-client-jar>

    ```


    这将 `myEjb-Client.jar` 标识为保存其客户端接口的 JAR 文件。`myEjb.jar` EJB 模块依赖于这些 EJB 接口，并通过其引用
    `myEjb-Client.jar` 库的 `Class-Path` 条目声明其依赖关系。`myWebApp.war` Web 模块引用这些 EJB 接口，并以相同方式声明其对
    `myEjb-Client.jar` 的依赖。`myEjb-Client.jar` 库是一个普通的 JAR 文件，它与 EJB 和 WAR 文件一起位于 EAR
    文件中。


    显式声明对捆绑库组件的依赖的另一种方法是使用 EAR 文件的内置库目录 `lib`，如清单 11-2 所示。`lib` 目录中的所有 JAR 文件都会自动添加到
    EAR 文件中 Java EE 模块的类路径中。


    ***清单 11-2.***  示例 EAR 文件内容，显示模块对共享捆绑库组件的隐式依赖


    ```

    myApp.ear:

     META-INF/application.xml

     myEjb.jar

     myWebApp.war

     lib/myEjb-Client.jar

    ```


    这实现了与清单 11-1 相同的结果。假设 `application.xml` 没有指定覆盖默认 `lib` 目录的 `<library-directory>`
    元素，Java EE 服务器将自动将 `myEjb-Client.jar` 文件添加到 `myEjb.jar` 和 `myWebApp.war` 模块的类路径中。


    库也可以捆绑在 WAR 文件的 JAR 文件的 `WEB-INF/lib` 目录中，以及 WAR 文件的未打包类的 `WEB-INF/classes` 目录中。


    已安装的库


    也可以在您的应用程序服务器环境中安装库，然后使用 JAR 文件的 `META-INF/MANIFEST.MF` 文件中的 `Extension-List`
    属性从 EAR 文件中的 JAR 格式文件引用它们。这是在 Java EE 应用程序之间共享库的一种有效方式，因为它避免了在多个 EAR 文件中冗余捆绑库。已安装的库由应用程序服务器实例存储在磁盘上，并且通常，应用程序服务器配置文件中的共享库条目会将已安装库的名称与其一个或多个
    JAR 文件关联起来。然后，Java EE 应用程序可以按名称引用此已安装的库，而无需了解该库的 JAR 文件内容。


    使用已安装库的示例如清单 11-3 所示。


    ***清单 11-3.***  示例 EAR 文件内容，显示已安装库的使用


    ```

    myApp.ear:

     META-INF/MANIFEST.MF:

      Extension-List: commonUtils

      commonUtils-Extension-Name: com/apress/ejb/ch11/commonUtils

      commonUtils-Extension-Specification-Version: 1.4

     META-INF/application.xml

     myEjb.jar

    ```

