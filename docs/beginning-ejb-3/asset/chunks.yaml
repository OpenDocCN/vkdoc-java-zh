- fmt: '# 复合键类与实体管理


    复合键类`CustomerPK`必须使用`@Embeddable`注解。与`@IdClass`的情况不同，其实例变量或属性访问器可以带有`@Column`注解来指定映射细节。


    ## 实体示例总结


    基本的`@Entity`和`@Id`注解足以定义一个实体类，这使得实体编码的入门非常直接。随着你对可用注解的熟悉程度提高，以及需求变得更加复杂，你可以简单地向实体添加注解来实现强大的持久化功能。


    我们刚刚介绍了本节中最基础的内容。接下来，我们将把注意力从实体类本身转向`EntityManager`以及持久化框架中的其他重要服务。稍后，我们将回来探索更多满足复杂需求的注解。


    ## 持久化归档


    到目前为止，我们将持久化归档定义为一组共同部署为JAR文件的实体集合。这个归档定义了打包在一起进行部署的实体及相关非实体类。严格来说，持久化归档不需要存在于其专用的`.jar`文件中。持久化归档可以打包在`.war`文件、EJB
    `.jar`文件中，甚至可以作为`.class`文件和`META-INF/persistence.xml`文件存在于Java应用程序的类路径上。


    无论其周围环境如何，我们现在来仔细看看这个归档的内容。


    ## persistence.xml文件


    持久化归档需要在其`META-INF`目录中包含一个`persistence.xml`文件。该文件将归档中的实体子集分组为所谓的*持久化单元*。一个`persistence.xml`文件必须至少定义一个持久化单元，并且同一个实体可以包含在同一`persistence.xml`文件中的多个持久化单元中。


    [清单3-12](#9781430246923_Ch03.xhtml#list12)展示了一个`persistence.xml`文件的示例。


    [***清单3-12.***](#9781430246923_Ch03.xhtml#_list12) persistence.xml文件示例


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <persistence version="2.0" xmlns="http://java.sun.com/xml/ns/persistence" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
    xsi:schemaLocation="http://java.sun.com/xml/ns/persistencehttp://java.sun.com/xml/ns/persistence/persistence_2_0.xsd">

      <persistence-unit name="Chapter03PersistenceUnit" transaction-type="JTA">

        <provider>org.eclipse.persistence.jpa.PersistenceProvider</provider>

