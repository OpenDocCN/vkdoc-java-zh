    on each method that applies changes through the EntityManager to automatically
    begin a transaction. This pattern is similar to SQL’s transactional model, where
    a transaction is implicitly begun each time a DML operation like INSERT, UPDATE,
    or DELETE is called. Hence, the client is responsible only for calling COMMIT
    or ROLLBACK to conclude the transaction, but there is no explicit call to begin
    the transaction. The Interceptor class is shown here, in [Listing 8-6](#9781430246923_Ch08.xhtml#list6):


    ***[Listing 8-6](#9781430246923_Ch08.xhtml#_list6).***  OrderProcessorBMTBeanTxnInterceptor.java,
