    Summary of Entity Examples


    The basic `@Entity` and `@Id` annotations are sufficient to define an entity class,
    making the on-ramp to coding entities very straightforward. As you become more
    familiar with the annotations available to you, and as your requirements become
    more demanding, you can simply add annotations to your entities to achieve powerful
    persistence features.


    We just covered the very basics in this section. We’ll now turn our attention
    away from the entity class itself and toward the `EntityManager` and some other
    important services in the persistence framework. Later, we’ll return to explore
    more annotations that satisfy more complex needs.


    The Persistence Archive


    Until now, we have referred to the persistence archive as the encapsulation of
    a group of colocated entities that are deployed as a JAR file. This archive defines
    the entities and related non-entity classes that are bundled together for deployment.
    Strictly speaking, a persistence archive does not need to live in its own dedicated
    .jar file. Persistence archives can be bundled inside .war files, EJB .jar files,
    and even exist as .class files and a META-INF/persistence.xml file on a Java application’s
    class path.


    Regardless of its surrounding context, we now take a closer look at the contents
    of this archive.


    The persistence.xml File


    A persistence archive requires a `persistence.xml` file in its `META-INF` directory.
    This file groups subsets of entities in the archive into what are known as *persistence
    units*. A `persistence.xml` file must define at least one persistence unit, and
    the same entity may be included in multiple persistence units within the same
    `persistence.xml` file.


    [Listing 3-12](#9781430246923_Ch03.xhtml#list12) demonstrates an example of a
    `persistence.xml` file.


    [***Listing 3-12.***](#9781430246923_Ch03.xhtml#_list12)  An Example of a persistence.xml
    File


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <persistence version="2.0" xmlns="http://java.sun.com/xml/ns/persistence" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
    xsi:schemaLocation="http://java.sun.com/xml/ns/persistencehttp://java.sun.com/xml/ns/persistence/persistence_2_0.xsd">

      <persistence-unit name="Chapter03PersistenceUnit" transaction-type="JTA">

        <provider>org.eclipse.persistence.jpa.PersistenceProvider</provider>

        <jta-data-source>jdbc/wineapp</jta-data-source>

        <class>com.apress.ejb.chapter03.entities.Address</class>

        <class>com.apress.ejb.chapter03.entities.Customer</class>

        <class>com.apress.ejb.chapter03.entities.CustomerOrder</class>

        <exclude-unlisted-classes>false</exclude-unlisted-classes>

        <properties>

          <property name="eclipselink.ddl-generation" value="create-tables"/>

        </properties>

      </persistence-unit>

      <persistence-unit name="Chapter03PersistenceUnit-JSE" transaction-type="RESOURCE_LOCAL">

        <provider>org.eclipse.persistence.jpa.PersistenceProvider</provider>

        <class>com.apress.ejb.chapter03.entities.Customer</class>

        <properties>

          <property name="javax.persistence.jdbc.driver" value="oracle.jdbc.OracleDriver"/>

          <property name="javax.persistence.jdbc.url" value="jdbc:oracle:thin:@localhost:1521:XE"/>

          <property name="javax.persistence.jdbc.user" value="wineapp"/>

          <property name="javax.persistence.jdbc.password" value="221CE6B0A87AC61AE68FF3A130F7F666"/>

          <property name="eclipselink.logging.level" value="FINER"/>

        </properties>

      </persistence-unit>

    </persistence>

    ```


    This `persistence.xml` file defines two persistence units, `Chapter03PersistenceUnit`
    and `Chapter03PersistenceUnit-JSE`. The `Customer` class is defined in both. The
    first persistence unit is used by Java EE clients (like session beans); whereas
    the second unit is configured for use by Java SE clients (like the `CustomerService.java`
    class shown in [Listing 3-14](#9781430246923_Ch03.xhtml#list14)). Specifying different
    configuration settings in the two persistence units allows you to insulate the
    client from the configuration details of the persistent units, and it makes an
    entity that is run in both Java SE and EE environments appear virtually the same
    in both cases.


    The EntityManager


    The `EntityManager` is the client’s gateway to entity management services offered
    by the JPA persistence framework. Client sessions must obtain an `EntityManager`
    instance before interacting with persistent entity instances. The `EntityManager`
    provides support for querying, updating, refreshing, and removing existing entity
    instances, and for registering entity classes to create new persistent objects
    with identity.


    Persistence Context


    The `EntityManager` maintains a cache of instances within a transactional context
    called a *persistence context*. The persistence context allows the `EntityManager`
    to track modified, created, and removed entity instances, and to reconcile entity
    instances with changes that were committed by external transactions concurrent
    with the `EntityManager`’s own transaction.


    Entity instances queried through the `EntityManager` may be freely passed to clients
    both inside and outside the EJB container. Clients may access and update the entity
    data as they would an ordinary Java object. To apply changes back to the persistent
    store, the client calls the `merge()` method on the `EntityManager` within a transactional
    scope, and the `EntityManager` persists the state of the entity data into the
    back-end store.


    Acquiring an EntityManager Instance


    An `EntityManager` instance can be acquired both from within the EJB container
    (Java EE) and outside it (Java SE). This offers clients the flexibility to interact
    with persistent entity beans in a uniform way, without regard to whether the persistence
    code is running inside or outside the Java EE container.


    A Session Bean Using Container Injection


    [Listing 3-13](#9781430246923_Ch03.xhtml#list13) provides an example of a session
    bean acquiring an `EntityManager` instance through container injection.


    [***Listing 3-13.***](#9781430246923_Ch03.xhtml#_list13)  A Session Bean Injected
    with an EntityManager Instance


    ```

    @Stateless

    public class CustomerManager {


    @PersistenceContext(unitName="Chapter03PersistenceUnit")

      private EntityManager em;


    public void createCustomer() {

        final Customer cust = new Customer();

        cust.setName("Moneybags MgGee");

        em.persist(cust);

      }

    }

    ```


    In this example, we use container injection to obtain an `EntityManager` instance
    that is bound to the `Chapter03PersistenceUnit` persistence unit, which includes
    our `Customer` entity from [Listing 3-7](#9781430246923_Ch03.xhtml#list7). We
    then use this `EntityManager` to persist a new `Customer` instance. Note that
    this example assumes that an ID generator or other service exists to autopopulate
    the primary key of the new instance.


    A Java SE Service Client Using an EntityManagerFactory


    There are times when container injection is not an option, or when more control
    over the life cycle of the `EntityManager` is desired by the application. In such
    cases, the client can obtain an `EntityManager` by first acquiring an `EntityManagerFactory`.
    The `javax.persistence.Persistence` class serves as a factory for acquiring an
    `EntityManagerFactory`, and it may be used from both a Java EE environment and
    a Java SE environment. [Listing 3-14](#9781430246923_Ch03.xhtml#list14) shows
    how an ordinary Java SE service client would obtain an `EntityManager`.'
