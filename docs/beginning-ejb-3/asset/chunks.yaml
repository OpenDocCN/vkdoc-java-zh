    EJB 或资源，如 Java 消息服务（JMS）和 JavaMail。应用程序客户端容器还为客户端程序提供注入功能。由于应用程序客户端容器不会创建应用程序客户端的实例，因此应使用静态字段和方法来注入任何资源。


