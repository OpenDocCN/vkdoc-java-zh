- fmt: '# Testing EJBs with EJB Lite and Embeddable EJB Container


    Thus far, the examples in this book have largely used servlets as clients to call
    EJB methods. Using test frameworks, such as `ServletUnit`, servlets can serve
    as a viable unit test bed for testing EJBs. Similarly, JSF clients that call EJBs
    can be unit tested using the `HttpUnit` framework, which allows you to record
    user interactions with JSF clients running in a browser and then compare the actual
    screen results with expected screen results. However, both approaches must be
    executed within a full Java EE application server. In this chapter, we will explore
    a lightweight option for testing EJBs running in a pure Java SE environment.


    ## EJB Lite


    `EJB Lite` was introduced in EJB 3.1 and further enhanced in EJB 3.2, and it is
    specified to be a minimal subset of the full EJB Container functionality. Recognizing
    that many enterprise applications require only a subset of the full EJB API, `EJB
    Lite` includes many of the most important features of EJB but with a smaller footprint.
    Implementations of `EJB Lite` include the Embeddable EJB Container, described
    below, and the Java EE Web Profile.


    Because `EJB Lite` is a strict subset of the EJB API, any application that is
    compliant with `EJB Lite` will also run in a full EJB Container within a Java
    EE server. That is, `EJB Lite` does not explicitly support any behavior that is
    outside of the EJB API.


    ## Embeddable EJB Container


    An *Embeddable EJB Container* is essentially a Java library that provides the
    services defined by the `EJB Lite` specification. It emulates an EJB Container
    running in a Java EE environment, but it runs in a Java SE environment. In fact,
    attempting to instantiate an Embeddable EJB Container from within a Java EE environment
    is restricted. This embeddable container provides an operating environment for
    EJBs, supplying injected resources, security, and a JTA transactional interface
    so that EJBs can be tested in a controlled environment.


    ## How This Chapter Is Organized


    In this chapter, we explore some of the principle concepts around unit testing.
    We then look at how to set up, execute, and debug JUnit tests using an Embeddable
    EJB Container, drawing from a handful of scenarios in our `WineApp` application.
    We will next take a close look at the services offered by `EJB Lite`, uncover
    its strengths and limitations, and show some useful shortcuts to isolate the EJB
    and JPA components being tested while reducing complexity in the test environment.


    After we examine the JUnit test code that enables you to work with EJBs in the
    Embeddable EJB Container, we will look at some of the configuration options that
    you can leverage that are particularly well suited for a test environment. At
    the conclusion of the chapter, we will walk you through step-by-step instructions
    on how to set up and configure a JUnit environment in NetBeans, and then execute
    and debug the tests.


    ## Concepts


    Let’s take a closer look at some of the principal concepts that we’ll be covering
    in this chapter.


    ### JUnit


    `JUnit` is a test framework widely used for testing Java classes of all forms.
    *Test classes* are ordinary Java classes that have been annotated to identify
    methods that serve special purposes. A method annotated as `@Test` identifies
    a single unit test. The test invokes one or more methods on a class being tested,
    obtains the results from calling those methods, and compares the actual with the
    expected results. When they differ, the test reports a failure, and the tester
    is alerted that a test needs attention.


    By writing JUnit tests that comprehensively test the behavior of one or more classes,
    the tester can then execute those tests each time changes are made to the code
    being tested or to any code that is called indirectly. Any failures indicate that
    the expected behavior is no longer occurring. Furthermore, because a unit test
    typically targets a very specific bit of functionality, the failed test can clearly
    identify to the tester the specific code area that caused the disruption.


    Because an EJB is a component that honors a public interface, it lends itself
    well to this form of unit testing. The introduction to EJB 3.1 of `EJB Lite` and
    Embeddable EJB Containers formally allows EJBs to be unit tested, without modification,
    through the JUnit testing framework in a pure Java SE environment.


    ## EJB Lite


    Let us take a closer look at the subset of features that comprise `EJB Lite`.
    [Table 13-1](#9781430246923_Ch13.xhtml#Tab1) shows which of the major features
    of EJB 3.2 are included in EJB 3.2 Lite:


    [Table 13-1](#9781430246923_Ch13.xhtml#_Tab1). The features of EJB 3.2 that are
    part of EJB 3.2 Lite


    | EJB 3.2 Feature | Included in EJB 3.2 Lite |

    | --- | --- |

    | Session Beans (stateless, stateful, and singleton) | Yes |

    | Message-Driven Beans (MDBs) | No |

    | Java Persistence API | Yes |

    | Local business interface/No interface | Yes |

    | Remote interface | No |

    | JAX-WS Web Service End Point | No |

    | JAX-RPC Web Service End Point | No |

    | Nonpersistent EJB Timer Service | Yes |

    | Persistent EJB Timer Service | No |

    | Local asynchronous session bean invocations | Yes |

    | Remote asynchronous session bean invocations | No |

    | Interceptors | Yes |

    | RMI-IIOP Interoperability | No |

    | Container-managed transactions/Bean-managed transactions | Yes |

    | Declarative and Programmatic Security | Yes |


    Most notably, in EJB 3.2 Lite all forms of Local session beans are supported,
    but Remote session beans, MDBs, and EJBs as Web Services are not. Security and
    JTA support is in `EJB Lite`, including support for BMT and CMT. Finally, support
    for `EntityManager` and `EntityManagerFactory` injection is offered for JPA.


    ## Embeddable EJB Container Client


    A client using the Embeddable EJB Container looks up EJBs through JNDI instead
    of through injection since a Java EE server provides client injection, which is
    absent in this environment. EJBs themselves may be injected with other EJBs, however,
    along with other resources that are provided by their EJB Container.


    In the JUnit examples shown later in this chapter, the JUnit test classes themselves
    are the clients of the Embeddable EJB Container. They instantiate the container
    directly through a static factory method, optionally initializing the container
    with configuration properties. The container then provides an `InitialContext`
    to the client that can be used to look up EJB and other resources through a JNDI
    namespace. The Embeddable EJB Container is capable of supporting EJBs at run time,
    injecting session beans with resources, providing a JTA context for performing
    transactions, and all other services specified in `EJB Lite` that are listed in
    [Table 13-1](#9781430246923_Ch13.xhtml#Tab1).


    When the Embeddable EJB Container is instantiated in an environment where the
    GlassFish Embeddable Server (which also runs in a Java SE environment) is present,
    GlassFish augments the experience by providing services to the Embedded EJB Container.


    ## JUnit Tests


    Having explored the core concepts of this chapter, let us now look at some examples
    in the code. Like the Embeddable EJB Container, JUnit is essentially a Java library
    that you include in the classpath to enable functionality in your application.
    While it is beyond the scope of this chapter to describe all of the features of
    JUnit (including grouping tests into Suites, defining initialization Parameters,
    and so on), for the purposes of our example, it is useful to view the basic task
    of writing and executing JUnit classes as follows:


    - Write test classes that follow JUnit patterns to initialize the test environment.'
