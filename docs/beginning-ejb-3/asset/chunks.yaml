    \ JDBC 资源来更改。持久化有助于定时器在应用程序关闭、容器崩溃和容器关闭时存活。\n\n可以通过将 `@Schedule` 注解的 `persistent`\
    \ 属性设置为 `false` 来按定时器禁用持久化。非持久化定时器的生命周期与创建它的 JVM 相关联。如果应用程序关闭、容器崩溃或创建定时器的 JVM\
    \ 崩溃/关闭，则非持久化定时器被视为已取消。\n\n**会话 Bean 的客户端视图**\n\n会话 Bean 可以被视为客户端程序或应用程序的逻辑扩展，该应用程序的大部分逻辑和数据处理都在其中发生。客户端应用程序通常通过会话\
    \ Bean 的客户端视图接口访问会话对象。这些是前面章节中讨论的业务接口。\n\n访问会话 Bean 的客户端应用程序可以是以下三种类型之一：\n\n*\
    \   **远程**：远程客户端在与它们访问的会话 Bean 不同的 JVM 中运行，如图 2-4 所示。远程客户端通过 Bean 的远程业务接口访问会话\
    \ Bean。远程客户端可以是另一个 EJB、一个 Java 客户端程序或一个 Java Servlet。远程客户端具有位置独立性，这意味着它们可以使用与在同一\
    \ JVM 中运行的客户端相同的 API。\n*   **本地**：本地客户端在同一 JVM 中运行，如图 2-3 所示，并通过本地业务接口访问会话 Bean。本地客户端可以是另一个\
    \ EJB，或使用 Java Servlet、JavaServer Pages (JSP) 或 JavaServer Faces (JSF) 的 Web 应用程序。本地客户端是位置相关的。远程和本地客户端的比较见表\
    \ 2-2。\n\n表 2-2. 选择本地与远程客户端的考量因素\n\n| 远程 | 本地 |\n    | --- | --- |\n    | Bean\
    \ 与客户端之间的松耦合 | 对组件的轻量级访问 |\n    | 位置独立性 | 位置依赖性 |\n    | 昂贵的远程调用 | 必须与 Bean 位于同一位置\
    \ |\n    | 对象必须序列化 | 不需要 |\n    | 对象按值传递 | 对象按引用传递 |\n\n*   **Web 服务**：您可以将无状态会话\
    \ Bean 发布为 Web 服务，供 Web 服务客户端调用。我们将在第 6 章中讨论 Web 服务和客户端。\n\n在某些情况下，会话 Bean 需要同时具有本地和远程业务接口，以支持不同类型的客户端应用程序。客户端可以通过依赖注入或\
    \ JNDI 查找来获取会话 Bean 的业务接口。在调用会话 Bean 中的方法之前，客户端需要通过 JNDI 获取 Bean 的存根对象。一旦客户端拥有存根对象的句柄，它就可以调用会话\
    \ Bean 中的业务方法。对于无状态会话 Bean，可以在每次调用时获取一个新的存根。对于有状态会话 Bean，需要在客户端缓存存根，以便容器知道在后续调用中返回哪个\
    \ Bean 实例。使用依赖注入，我们可以通过以下代码获取 `SearchFacade` 会话 Bean 的业务接口：\n\n```\n@EJB SearchFacade\
    \ searchFacade;\n```\n\n如果访问会话 Bean 的客户端是远程的，则在获取具有正确环境属性的上下文接口后，客户端可以使用 JNDI\
    \ 查找。本地客户端也可以使用 JNDI 查找，但依赖注入会产生更简洁的代码。清单 2-24 展示了 `SearchFacadeTest` 客户端程序的代码，该代码查找\
