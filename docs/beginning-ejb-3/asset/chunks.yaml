    本章的示例需要数据库连接，为此我们将使用 NetBeans 和 Glassfish 捆绑提供的 Derby 数据库。如果你已经创建了`WineApp`数据库（该数据库也用于第
    3 章、第 4 章和第 7 章的示例），请继续下一步。否则，请点击`Services`选项卡，展开`Databases`图标，然后在`Java DB`节点上调用“`Create
    Database...`”。创建一个名为“`WineApp`”的数据库，用户名和密码均为`wineapp/wineapp`：


