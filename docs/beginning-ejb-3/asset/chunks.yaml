    \ | 如果未指定，则使用Java类的名称。 |\n| `wsdlLocation` | WSDL文档的位置，当Bean类实现现有Web服务时非常有用。 |\
    \  |\n\n为了说明一个发布为Web服务的无状态会话Bean，我们将创建一个`CreditServiceEndpointBean`，它将发布为`CreditService`。\n\
    \n在[清单6-9](#9781430246923_Ch06.xhtml#list9)中，我们有一个Java类`CreditCheckEndpointBean`，它有两个类级别的注解：`@Stateless`和`@WebService`。`@Stateless`注解提供了一个额外的参数来将Bean标记为`CreditCheckEndpointBean`。如果同一个类暴露给远程或本地客户端，这些客户端将使用该名称访问无状态会话Bean。`@WebService`注解提供了两个额外的参数：一个将服务名称标记为`CreditService`，另一个指定目标命名空间（而不是使用默认的Java包结构）。\n\
