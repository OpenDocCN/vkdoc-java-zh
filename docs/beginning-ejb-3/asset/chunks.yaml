    \ \"CH04_ST_PERSON_ID_GEN\" (\"PRIMARY_KEY_NAME\" VARCHAR2(4000) PRIMARY KEY,\
    \    \"NEXT_ID_VALUE\" NUMBER(38));\n *\n * To initialize this table with data\
    \ for this entity's ID generator 'Person.id' (starting with    value '0'):\n *\
