- fmt: "# 排版后的文档\n\nThe state of a conversation-scoped bean is shared across all of\
    \ the standard life-cycle phases of a JSF faces or non-faces request. One JSF\
    \ request is associated with only one conversation. Any conversation can be either\
    \ in *transient* state or in *long-running* state. Transient is the default state\
    \ for a conversation. A conversation is marked long running by calling `Conversation.begin()`,\
    \ and it is marked as transient by calling `Conversation.end()`. At the end of\
    \ a JSF request, a conversation-scoped object has to be in transient state to\
    \ be destroyed. A conversation scope is declared using the `@javax.enterprise.context.ConversationScoped`\
    \ annotation.\n\n## Dependent Pseudo-Scope\n\nThe dependent scope is the default\
    \ scope, and the container applies it when no scope is explicitly defined. The\
    \ instances of beans with a dependent scope are bound to only one object. Instances\
    \ of such beans are created and destroyed in sync with the creation and destruction\
    \ of the associated object. These bean instances are not shared between the client\
    \ applications. The dependent scope is declared using the `@javax.enterprise.context.Dependent`\
    \ annotation.\n\n![image](Images/sq.jpg) **Note** Users can define custom scopes\
    \ by using the `@javax.inject.Scope` annotation.\n\n## Dependency Injection with\
    \ @Inject\n\nBefore the publication of JSR 330, which introduced Dependency Injection,\
    \ a client requiring services of a dependent class either had to instantiate a\
    \ concrete instance of that class or rely upon an outside module to wire up the\
    \ dependency before it was required. This created either a tightly coupled compile\
    \ time dependency between the client and the dependent class or reliance by the\
    \ client on an outside process to “configure” the client appropriately. With dependency\
    \ injection, the contract between the client and the dependent class became decoupled,\
    \ and the client gained some control over how it was initialized. The client could\
    \ request a resource to be injected by its interface and relied on the container\
    \ to inject an acceptable instance of some concrete implementation class deliberately\
    \ unknown to the client. CDI extends the power of the client to control its configuration\
    \ by introducing a way (Qualifiers, see below) for the client to tell the container\
    \ which abstract characteristics it requires of the injected class. The container\
    \ uses these requirements to decide, at run time, which dependent class to inject.\
    \ This creates an even more loosely coupled system whereby the injected class\
    \ requirements are configured declaratively and dynamically in the client and\
    \ bound to an implementation class by the container at run time.\n\nThe `@javax.inject.Inject`\
    \ annotation defines an injection point, and there are three locations in a bean\
    \ where injection can be performed by the CDI container: to initialize parameter\
    \ values on a constructor declaration, to initialize parameter values on a method\
    \ declaration, and to initialize a class member in a field declaration. We will\
    \ examine each of these next.\n\n### Bean Constructor Parameter Injection\n\n\
    A CDI bean designates a single one of its constructors to be its *bean constructor*.\
    \ This is the constructor that the CDI container uses to instantiate the bean.\
    \ Bean constructor parameter injection occurs when we add an `@javax.inject.Inject`\
    \ annotation to a bean constructor with one or more parameters. If a bean constructor\
    \ has more than one parameter, then all of the parameters are valid injection\
    \ points, which means that the container must provide values for all the parameters\
    \ of a bean constructor. If the bean class does not have a bean constructor with\
    \ an `@Inject` annotation, then the default (parameterless) constructor is used\
    \ as the bean constructor.\n\nIt is possible for a client application to bypass\
    \ the container and directly instantiate the bean. The obvious result in such\
    \ cases is that the returned object is not bound to any context and the lifecycle\
    \ of the new instance is not managed by the container.\n\n[Listing 10-4](#9781430246923_Ch10.xhtml#list4)\
    \ shows how the `beanConstParaInjVintage` field in the `WineCellarClient` class\
    \ can be initialized with a vintage `Wine` type using bean constructor parameter\
    \ injection.\n\n![image](Images/sq.jpg) **Note** The CDI container will choose\
    \ the default implementation of the `Wine` interface and pass an instance of that\
    \ implementation onto the `WineCellarClient` bean constructor.\n\n**[Listing 10-4](#9781430246923_Ch10.xhtml#_list4).**\
    \ WineCellarClient.java\n\n```\npackage com.apress.ejb.chapter10;\n\nimport javax.inject.Inject;\n\
    \npublic class WineCellarClient {\n    private Wine beanConstParaInjVintage;\n\
    \n    @Inject\n    WineCellarClient(Wine vintage)\n    {\n        this.beanConstParaInjVintage\
    \ = vintage;\n    }\n}\n```\n\n### Initializer Method Parameter Injection\n\n\
    CDI can also initialize a bean’s properties afterward by calling methods on the\
    \ bean that have been annotated `@javax.inject.Inject`. A bean method with an\
    \ `@javax.inject.Inject` annotation is called an *initializer method*. An initializer\
    \ method must be nonabstract, nonstatic, and nongeneric. An initializer method\
    \ can have zero or more parameters. If an initializer method has multiple parameters,\
    \ then all of the parameters are valid injection points and the CDI container\
    \ must be able to supply values for all of the parameters. It is legal for a bean\
    \ class to declare multiple initializer methods.\n\nIt is possible for a client\
    \ application to bypass the container and directly call the initializer method.\
    \ Again, the obvious result in such cases is that the container will pass no parameters\
    \ to the method.\n\n[Listing 10-5](#9781430246923_Ch10.xhtml#list5) shows how\
    \ the `WineCellarClient` class can be modified to use the initializer method parameter\
    \ injection instead of bean constructor parameter injection to achieve the same\
    \ result.\n\n**[Listing 10-5](#9781430246923_Ch10.xhtml#_list5).** WineCellarClient.java\n\
    \n```\npackage com.apress.ejb.chapter10;\n\nimport javax.inject.Inject;\n\npublic\
    \ class WineCellarClient {\n    private Wine initParaInjVintage;\n\n    WineCellarClient()\n\
    \    {\n    }\n\n    @Inject\n    public void setVintageWine(Wine vintage)\n \
    \   {\n        this.initParaInjVintage = vintage;\n    }\n}\n```\n\n### Field\
    \ Injection\n\nFinally, a CDI container can instantiate a class-level field by\
    \ selecting an unambiguous implementation of the field’s interface type. A class-level\
    \ field can be injected by annotating it with the `@Inject` annotation. An injected\
    \ field must be a nonstatic, nonfinal field of a bean class or of any Java EE\
    \ component class supporting injection.\n\n[Listing 10-6](#9781430246923_Ch10.xhtml#list6)\
    \ shows how field injection simplifies initialization of the `fieldInjVintage`.\n\
    \n**[Listing 10-6](#9781430246923_Ch10.xhtml#_list6).** WineCellarClient.java\n\
    \n```\npackage com.apress.ejb.chapter10;\n\nimport javax.inject.Inject;\n\npublic\
    \ class WineCellarClient {\n    @Inject\n    private Wine fieldInjVintage;\n}\n\
    ```\n\n## Dependency Resolution\n\nThe CDI specification guarantees loosely coupled\
    \ and typesafe resolution of injected beans. The CDI container can unambiguously\
    \ select an implementation of a bean type (class or interface) with exactly one\
    \ implementation. But it is possible for a bean type to have multiple implementations.\
    \ For example, we can add another class `WhiteWine` that implements the interface\
    \ `Wine` that we created in [Listing 10-1](#9781430246923_Ch10.xhtml#list1).\n\
    \n**[Listing 10-7](#9781430246923_Ch10.xhtml#_list7).** WhiteWine.java\n\n```\n\
    package com.apress.ejb.chapter10;\n\npublic class WhiteWine implements Wine {\n\
    \   public String getColor() {\n       return \"White\";\n   }\n}\n```"
  raw: 'The state of a conversation-scoped bean is shared across all of the standard
    life-cycle phases of a JSF faces or non-faces request. One JSF request is associated
    with only one conversation. Any conversation can be either in *transient* state
    or in *long-running* state. Transient is the default state for a conversation.
    A conversation is marked long running by calling `Conversation.begin()`, and it
    is marked as transient by calling `Conversation.end()`. At the end of a JSF request,
    a conversation-scoped object has to be in transient state to be destroyed. A conversation
    scope is declared using the  `@javax.enterprise.context.ConversationScoped` annotation.


    Dependent Pseudo-Scope


    The dependent scope is the default scope, and the container applies it when no
    scope is explicitly defined. The instances of beans with a dependent scope are
    bound to only one object. Instances of such beans are created and destroyed in
    sync with the creation and destruction of the associated object. These bean instances
    are not shared between the client applications. The dependent scope is declared
    using the `@javax.enterprise.context.Dependent` annotation.


    ![image](Images/sq.jpg) **Note**   Users can define custom scopes by using the
    `@javax.inject.Scope` annotation.


    Dependency Injection with @Inject


    Before the publication of JSR 330, which introduced Dependency Injection, a client
    requiring services of a dependent class either had to instantiate a concrete instance
    of that class or rely upon an outside module to wire up the dependency before
    it was required. This created either a tightly coupled compile time dependency
    between the client and the dependent class or reliance by the client on an outside
    process to “configure” the client appropriately. With dependency injection, the
    contract between the client and the dependent class became decoupled, and the
    client gained some control over how it was initialized. The client could request
    a resource to be injected by its interface and relied on the container to inject
    an acceptable instance of some concrete implementation class deliberately unknown
    to the client.  CDI extends the power of the client to control its configuration
    by introducing a way (Qualifiers, see below) for the client to tell the container
    which abstract characteristics it requires of the injected class.  The container
    uses these requirements to decide, at run time, which dependent class to inject.  This
    creates an even more loosely coupled system whereby the injected class requirements
    are configured declaratively and dynamically in the client and bound to an implementation
    class by the container at run time.


    The `@javax.inject.Inject` annotation defines an injection point, and there are
    three locations in a bean where injection can be performed by the CDI container:
    to initialize parameter values on a constructor declaration, to initialize parameter
    values on a method declaration, and to initialize a class member in a field declaration.  We
    will examine each of these next.


    Bean Constructor Parameter Injection


    A CDI bean designates a single one of its constructors to be its *bean constructor*.  This
    is the constructor that the CDI container uses to instantiate the bean. Bean constructor
    parameter injection occurs when we add an `@javax.inject.Inject` annotation to
    a bean constructor with one or more parameters. If a bean constructor has more
    than one parameter, then all of the parameters are valid injection points, which
    means that the container must provide values for all the parameters of a bean
    constructor. If the bean class does not have a bean constructor with an `@Inject`
    annotation, then the default (parameterless) constructor is used as the bean constructor.


    It is possible for a client application to bypass the container and directly instantiate
    the bean. The obvious result in such cases is that the returned object is not
    bound to any context and the lifecycle of the new instance is not managed by the
    container.


    [Listing 10-4](#9781430246923_Ch10.xhtml#list4) shows how the `beanConstParaInjVintage`
    field in the `WineCellarClient` class can be initialized with a vintage `Wine`
    type using bean constructor parameter injection.


    ![image](Images/sq.jpg) **Note**   The CDI container will choose the default implementation
    of the `Wine` interface and pass an instance of that implementation onto the `WineCellarClient`
    bean constructor.


    ***[Listing 10-4](#9781430246923_Ch10.xhtml#_list4).***  WineCellarClient.java


    ```

    package com.apress.ejb.chapter10;


    import javax.inject.Inject;


    public class WineCellarClient {

        private Wine beanConstParaInjVintage;


    @Inject

        WineCellarClient(Wine vintage)

        {

            this.beanConstParaInjVintage = vintage;

        }

    }

    ```


    Initializer Method Parameter Injection


    CDI can also initialize a bean’s properties afterward by calling methods on the
    bean that have been annotated `@javax.inject.Inject`. A bean method with an `@javax.inject.Inject`
    annotation is called an *initializer method*. An initializer method must be nonabstract,
    nonstatic, and nongeneric. An initializer method can have zero or more parameters.
    If an initializer method has multiple parameters, then all of the parameters are
    valid injection points and the CDI container must be able to supply values for
    all of the parameters. It is legal for a bean class to declare multiple initializer
    methods.


    It is possible for a client application to bypass the container and directly call
    the initializer method. Again, the obvious result in such cases is that the container
    will pass no parameters to the method.


    [Listing 10-5](#9781430246923_Ch10.xhtml#list5) shows how the `WineCellarClient`
    class can be modified to use the initializer method parameter injection instead
    of bean constructor parameter injection to achieve the same result.


    ***[Listing 10-5](#9781430246923_Ch10.xhtml#_list5).***  WineCellarClient.java


    ```

    package com.apress.ejb.chapter10;


    import javax.inject.Inject;


    public class WineCellarClient {

        private Wine initParaInjVintage;


    WineCellarClient()

        {

        }


    @Inject

        public void setVintageWine(Wine vintage)

        {

            this.initParaInjVintage = vintage;

        }

    }

    ```


    Field Injection


    Finally, a CDI container can instantiate a class-level field by selecting an unambiguous
    implementation of the field’s interface type. A class-level field can be injected
    by annotating it with the `@Inject` annotation. An injected field must be a nonstatic,
    nonfinal field of a bean class or of any Java EE component class supporting injection.


    [Listing 10-6](#9781430246923_Ch10.xhtml#list6) shows how field injection simplifies
    initialization of the `fieldInjVintage`.


    ***[Listing 10-6](#9781430246923_Ch10.xhtml#_list6).***  WineCellarClient.java


    ```

    package com.apress.ejb.chapter10;


    import javax.inject.Inject;


    public class WineCellarClient {

        @Inject

        private Wine fieldInjVintage;

    }

    ```


    Dependency Resolution


    The CDI specification guarantees loosely coupled and typesafe resolution of injected
    beans. The CDI container can unambiguously select an implementation of a bean
    type (class or interface) with exactly one implementation. But it is possible
    for a bean type to have multiple implementations. For example, we can add another
    class `WhiteWine` that implements the interface `Wine` that we created in [Listing
    10-1](#9781430246923_Ch10.xhtml#list1).


    ***[Listing 10-7](#9781430246923_Ch10.xhtml#_list7).***  WhiteWine.java


    ```

    package com.apress.ejb.chapter10;


    public class WhiteWine implements Wine {

       public String getColor() {

           return "White";

       }

    }

    ```'
  trans: "\n会话作用域（conversation-scoped）Bean 的状态在 JSF 请求或非 JSF 请求的所有标准生命周期阶段中共享。一个 JSF\
    \ 请求仅与一个会话相关联。任何会话都可以处于*临时*状态或*长期运行*状态。临时状态是会话的默认状态。通过调用 `Conversation.begin()`\
    \ 将会话标记为长期运行，通过调用 `Conversation.end()` 将其标记为临时状态。在 JSF 请求结束时，会话作用域对象必须处于临时状态才能被销毁。会话作用域通过\
    \ `@javax.enterprise.context.ConversationScoped` 注解声明。\n\n依赖伪作用域\n\n依赖作用域是默认作用域，当未显式定义作用域时，容器会应用该作用域。具有依赖作用域的\
    \ Bean 实例仅绑定到一个对象。此类 Bean 的实例会随着关联对象的创建和销毁而同步创建和销毁。这些 Bean 实例不会在客户端应用程序之间共享。依赖作用域通过\
    \ `@javax.enterprise.context.Dependent` 注解声明。\n\n![image](img/sq.jpg) **注意** 用户可以通过\
    \ `@javax.inject.Scope` 注解定义自定义作用域。\n\n使用 @Inject 进行依赖注入\n\n在引入依赖注入的 JSR 330 发布之前，需要依赖类服务的客户端要么必须实例化该类的具体实例，要么依赖外部模块在需要之前完成依赖装配。这会导致客户端与依赖类之间产生紧密耦合的编译时依赖，或者客户端依赖外部进程来适当地“配置”自身。通过依赖注入，客户端与依赖类之间的契约变得解耦，并且客户端对自身的初始化方式获得了一定控制权。客户端可以请求通过其接口注入资源，并依赖容器注入一个客户端未知的具体实现类的可接受实例。CDI\
    \ 通过引入一种方式（限定符，见下文），让客户端能够告知容器其对注入类所需的抽象特性，从而扩展了客户端控制其配置的能力。容器在运行时利用这些需求来决定注入哪个依赖类。这创建了一个更加松散耦合的系统，其中注入类的需求在客户端中以声明式和动态方式配置，并由容器在运行时绑定到实现类。\n\
    \n`@javax.inject.Inject` 注解定义了一个注入点，在 Bean 中有三个位置可以由 CDI 容器执行注入：在构造函数声明上初始化参数值、在方法声明上初始化参数值、以及在字段声明上初始化类成员。接下来我们将逐一探讨这些方式。\n\
    \nBean 构造函数参数注入\n\nCDI Bean 会指定其一个构造函数作为*Bean 构造函数*。这是 CDI 容器用于实例化 Bean 的构造函数。当我们向带有一个或多个参数的\
    \ Bean 构造函数添加 `@javax.inject.Inject` 注解时，就会发生 Bean 构造函数参数注入。如果 Bean 构造函数有多个参数，那么所有参数都是有效的注入点，这意味着容器必须为\
    \ Bean 构造函数的所有参数提供值。如果 Bean 类没有带 `@Inject` 注解的 Bean 构造函数，则默认（无参）构造函数会被用作 Bean\
    \ 构造函数。\n\n客户端应用程序可以绕过容器直接实例化 Bean。在这种情况下，显而易见的结果是返回的对象不与任何上下文绑定，并且新实例的生命周期不受容器管理。\n\
    \n清单 10-4 展示了如何使用 Bean 构造函数参数注入，用年份（vintage）`Wine` 类型初始化 `WineCellarClient` 类中的\
    \ `beanConstParaInjVintage` 字段。\n\n![image](img/sq.jpg) **注意** CDI 容器将选择 `Wine`\
    \ 接口的默认实现，并将该实现的一个实例传递给 `WineCellarClient` Bean 构造函数。\n\n***清单 10-4.*** WineCellarClient.java\n\
    \n```\npackage com.apress.ejb.chapter10;\n\nimport javax.inject.Inject;\n\npublic\
    \ class WineCellarClient {\n    private Wine beanConstParaInjVintage;\n\n@Inject\n\
    \    WineCellarClient(Wine vintage)\n    {\n        this.beanConstParaInjVintage\
    \ = vintage;\n    }\n}\n```\n\n初始化器方法参数注入\n\nCDI 还可以在之后通过调用已标注 `@javax.inject.Inject`\
    \ 注解的 Bean 方法来初始化 Bean 的属性。带有 `@javax.inject.Inject` 注解的 Bean 方法被称为*初始化器方法*。初始化器方法必须是非抽象、非静态且非泛型的。初始化器方法可以有零个或多个参数。如果初始化器方法有多个参数，那么所有参数都是有效的注入点，并且\
    \ CDI 容器必须能够为所有参数提供值。Bean 类声明多个初始化器方法是合法的。\n\n客户端应用程序可以绕过容器直接调用初始化器方法。同样，在这种情况下，显而易见的结果是容器不会向该方法传递任何参数。\n\
    \n清单 10-5 展示了如何修改 `WineCellarClient` 类，使用初始化器方法参数注入代替 Bean 构造函数参数注入，以达到相同的结果。\n\
    \n***清单 10-5.*** WineCellarClient.java\n\n```\npackage com.apress.ejb.chapter10;\n\
    \nimport javax.inject.Inject;\n\npublic class WineCellarClient {\n    private\
    \ Wine initParaInjVintage;\n\nWineCellarClient()\n    {\n    }\n\n@Inject\n  \
    \  public void setVintageWine(Wine vintage)\n    {\n        this.initParaInjVintage\
    \ = vintage;\n    }\n}\n```\n\n字段注入\n\n最后，CDI 容器可以通过选择字段接口类型的明确实现来实例化类级别字段。通过使用\
    \ `@Inject` 注解标注类级别字段，可以对其进行注入。被注入的字段必须是 Bean 类或任何支持注入的 Java EE 组件类中的非静态、非 final\
    \ 字段。\n\n清单 10-6 展示了字段注入如何简化 `fieldInjVintage` 的初始化。\n\n***清单 10-6.*** WineCellarClient.java\n\
    \n```\npackage com.apress.ejb.chapter10;\n\nimport javax.inject.Inject;\n\npublic\
    \ class WineCellarClient {\n    @Inject\n    private Wine fieldInjVintage;\n}\n\
    ```\n\n依赖解析\n\nCDI 规范保证了注入 Bean 的松散耦合和类型安全解析。CDI 容器可以明确选择只有一个实现的 Bean 类型（类或接口）的实现。但一个\
    \ Bean 类型可能有多个实现。例如，我们可以添加另一个实现我们在清单 10-1 中创建的 `Wine` 接口的类 `WhiteWine`。\n\n***清单\
    \ 10-7.*** WhiteWine.java\n\n```\npackage com.apress.ejb.chapter10;\n\npublic\
    \ class WhiteWine implements Wine {\n   public String getColor() {\n       return\
    \ \"White\";\n   }\n}\n```\n"
- fmt: "# After Introduction of the `WhiteWine` Implementation\n\nAfter introduction\
    \ of the `WhiteWine` implementation, our `WineClient`, in which `Wine` is injected,\
    \ needs to distinguish between the two implementations of `Wine`: that is, `RedWine`\
    \ and `WhiteWine`. The CDI container raises an *unsatisfied or ambiguous dependency*\
    \ deployment time error when it is not able to isolate one bean class that needs\
    \ to be injected at a given injection point. This ambiguous dependency issue can\
    \ be resolved by using any one of the following three solutions:\n\n- Qualifiers\
    \ (for compile-time resolution)\n- Alternatives (for deployment-time resolution)\n\
    - Producers (for run-time resolution)\n\n## Qualifiers\n\nA qualifier type enables\
    \ CDI components to interact in a loosely coupled way by providing polymorphism\
    \ at compile time and dynamic binding at run time. A qualifier type allows the\
    \ client to specify the desired characteristics of the instance to be injected\
    \ without having to know which concrete implementation class is being chosen.\n\
    \nLet us try and understand qualifiers using an example. The addition of `WhiteWine`\
    \ class in [Listing 10-7](#9781430246923_Ch10.xhtml#list7) forced the container\
    \ to raise an error, as the container could not decide whether to instantiate\
    \ the `RedWine` or the `WhiteWine` implementation. We will use a qualifier to\
    \ resolve this dependency. [Listing 10-8](#9781430246923_Ch10.xhtml#list8) shows\
    \ a user-defined qualifier named `Red`.\n\n***[Listing 10-8](#9781430246923_Ch10.xhtml#_list8).***\
    \  Red.java\n\n```\npackage com.apress.ejb.chapter10;\n\nimport static java.lang.annotation.ElementType.TYPE;\n\
    import static java.lang.annotation.ElementType.FIELD;\nimport static java.lang.annotation.ElementType.PARAMETER;\n\
    import static java.lang.annotation.ElementType.METHOD;\nimport static java.lang.annotation.RetentionPolicy.RUNTIME;\n\
    import java.lang.annotation.Retention;\nimport java.lang.annotation.Target;\n\
    import javax.inject.Qualifier;\n\n@Qualifier\n@Retention(RUNTIME)\n@Target({METHOD,\
    \ FIELD, PARAMETER, TYPE})\npublic @interface Red {\n}\n```\n\nWe will augment\
    \ the `RedWine` class shown in [Listing 10-2](#9781430246923_Ch10.xhtml#list2)\
    \ with the `Red` qualifier, as shown in [Listing 10-9](#9781430246923_Ch10.xhtml#list9).\n\
    \n***[Listing 10-9](#9781430246923_Ch10.xhtml#_list9).***  RedWine.java\n\n```\n\
    package com.apress.ejb.chapter10;\n\nimport javax.enterprise.context.ApplicationScoped;\n\
    \n// Instance will be created only once, will be shared\n// across the application\
    \ and will be destroyed on\n// application shutdown\n@ApplicationScoped\n@Red\n\
    public class RedWine implements Wine {\n   public String getColor() {\n      \
    \ return \"Red\";\n   }\n}\n```\n\nIntroducing this custom qualifier allows us\
    \ to resolve the ambiguous dependency error. `WineClient`, as coded in [Listing\
    \ 10-3](#9781430246923_Ch10.xhtml#list3), will now instantiate `WhiteWine`, as\
    \ `WhiteWine` has the `@Default` qualifier, and the injection point also has the\
    \ same `@Default` qualifier. [Listing 10-10](#9781430246923_Ch10.xhtml#list10)\
    \ shows how we can instantiate the `newWine` field with `RedWine` implementation\
    \ by adding the `@Red` qualifier at the injection point.\n\n***[Listing 10-10](#9781430246923_Ch10.xhtml#_list10).***\
    \  WineClient.java\n\n```\npackage com.apress.ejb.chapter10;\n\nimport javax.inject.Inject;\n\
    \npublic class WineClient {\n   // Instantiating in classic way\n   // private\
    \ Wine oldWine = new RedWine();\n\n// Instantiating via field dependency injection\n\
    \   @Inject\n   @Red\n   private Wine newWine;\n}\n```\n\nNow that we have a basic\
    \ understanding of how qualifiers help us in resolving ambiguity, we will look\
    \ into the four types of CDI qualifiers.\n\n### `@Default`\n\nWhen a bean or an\
    \ injection point does not explicitly define a qualifier, the CDI container assumes\
    \ the qualifier as `@javax.enterprise.inject.Default`. If the CDI bean has only\
    \ one implementation, then the CDI container can easily select that implementation\
    \ for injection, as there is no ambiguity. The `@Default` is a built-in qualifier\
    \ that informs the CDI container to inject a single, default bean implementation\
    \ when no other qualifier (other than `@Named`, see below) is specified. The `WhiteWine`\
    \ class in [Listing 10-7](#9781430246923_Ch10.xhtml#list7) has the `@Default`\
    \ qualifier and can be written, as shown in [Listing 10-11](#9781430246923_Ch10.xhtml#list11),\
    \ without any change in behavior.\n\n***[Listing 10-11](#9781430246923_Ch10.xhtml#_list11).***\
    \  WhiteWine.java\n\n```\npackage com.apress.ejb.chapter10;\nimport javax.enterprise.inject.Default;\n\
    @Default\npublic class WhiteWine implements Wine {\n   public String getColor()\
    \ {\n       return \"White\";\n   }\n}\n```\n\n### `@Any`\n\nJust like the `@Default`\
    \ qualifier, all beans implicitly have the `@Any` qualifier. We can add an `@javax.enterprise.inject.Any`\
    \ annotation to the `WhiteWine` class, as shown in [Listing 10-11](#9781430246923_Ch10.xhtml#list11),\
    \ alongside `@Default` without any change in behavior. An `@Any` qualifier at\
    \ an injection point is useful for iterating over all of the implementations of\
    \ a bean type.\n\n[Listing 10-12](#9781430246923_Ch10.xhtml#list12) shows how\
    \ a `@Any` qualifier can be used to iterate over all of the implementations of\
    \ `Wine`.\n\n***[Listing 10-12](#9781430246923_Ch10.xhtml#_list12).***  AllWinesClient.java\n\
    \n```\npackage com.apress.ejb.chapter10;\n\nimport javax.enterprise.inject.Any;\n\
    import javax.enterprise.inject.Instance;\nimport javax.inject.Inject;\n\npublic\
    \ class AllWinesClient {\n   @Inject\n   @Any\n   private Instance<Wine> allWines;\n\
    \nprivate void printAllWineColors(){\n       for (Wine wine : allWines){\n   \
    \        System.out.println(wine.getColor());\n       }\n   }\n}\n```\n\n### `@Named`\n\
    \nThe `@Named` built-in qualifier is used by the beans that are required to be\
    \ made accessible to the Web tier through the Unified Expression Language (EL).\
    \ By default, the bean name with its first letter in lowercase is used to access\
    \ the bean. A non-default name can be passed as an argument to the `@Named` qualifier.\n\
    \n### `@New`\n\nThe `@New` qualifier disassociates an instance of the bean from\
    \ its declared scope. An application can obtain the bean instances that are not\
    \ bound to the declared scope by using the `@New` qualifier. The `@New` qualifier\
    \ forces the container to create a new instance of the bean that is not bound\
    \ to the specified CDI contextual lifecycle.\n\nFor example, an instance of `newWine`,\
    \ as shown in [Listing 10-10](#9781430246923_Ch10.xhtml#list10), will be application\
    \ scoped as it is qualified with the `@Red` annotation and the `RedWine` bean\
    \ is application scoped. If we update the client to include the `@New` annotation,\
    \ as shown in [Listing 10-13](#9781430246923_Ch10.xhtml#list13), then the `newWine`\
    \ instance will be dependent scoped—adopt the lifecycle of its normal Java context—and\
    \ not application scoped.\n\n***[Listing 10-13](#9781430246923_Ch10.xhtml#_list13).***\
    \  WineClient.java\n\n```\npackage com.apress.ejb.chapter10;\n\nimport javax.enterprise.inject.New;\n\
    import javax.inject.Inject;\n\npublic class WineClient {\n   // Instantiating\
    \ in classic way\n   // private Wine oldWine = new RedWine();\n\n// Instantiating\
    \ via field dependency injection\n   @Inject\n   @Red\n   @New\n   private Wine\
    \ newWine;\n}\n```\n\nUser-defined qualifiers can be created using the `@Qualifier`\
    \ annotation, as shown in [Listing 10-8](#9781430246923_Ch10.xhtml#list8).\n\n\
    ## Alternatives"
  raw: 'After introduction of the `WhiteWine` implementation, our `WineClient,` in
    which `Wine` is injected, needs to distinguish between the two implementations
    of `Wine`: that is, `RedWine` and `WhiteWine`. The CDI container raises an *unsatisfied
    or ambiguous dependency* deployment time error when it is not able to isolate
    one bean class that needs to be injected at a given injection point. This ambiguous
    dependency issue can be resolved by using any one of the following three solutions:


    *   Qualifiers (for compile-time resolution)

    *   Alternatives (for deployment-time resolution)

    *   Producers (for run-time resolution)


    Qualifiers


    A qualifier type enables CDI components to interact in a loosely coupled way by
    providing polymorphism at compile time and dynamic binding at run time. A qualifier
    type allows the client to specify the desired characteristics of the instance
    to be injected without having to know which concrete implementation class is being
    chosen.


    Let us try and understand qualifiers using an example. The addition of `WhiteWine`
    class in [Listing 10-7](#9781430246923_Ch10.xhtml#list7) forced the container
    to raise an error, as the container could not decide whether to instantiate the
    `RedWine` or the `WhiteWine` implementation. We will use a qualifier to resolve
    this dependency. [Listing 10-8](#9781430246923_Ch10.xhtml#list8) shows a user-defined
    qualifier named `Red`.


    ***[Listing 10-8](#9781430246923_Ch10.xhtml#_list8).***  Red.java


    ```

    package com.apress.ejb.chapter10;


    import static java.lang.annotation.ElementType.TYPE;

    import static java.lang.annotation.ElementType.FIELD;

    import static java.lang.annotation.ElementType.PARAMETER;

    import static java.lang.annotation.ElementType.METHOD;

    import static java.lang.annotation.RetentionPolicy.RUNTIME;

    import java.lang.annotation.Retention;

    import java.lang.annotation.Target;

    import javax.inject.Qualifier;


    @Qualifier

    @Retention(RUNTIME)

    @Target({METHOD, FIELD, PARAMETER, TYPE})

    public @interface Red {

    }

    ```


    We will augment the `RedWine` class shown in [Listing 10-2](#9781430246923_Ch10.xhtml#list2)
    with the `Red` qualifier, as shown in [Listing 10-9](#9781430246923_Ch10.xhtml#list9).


    ***[Listing 10-9](#9781430246923_Ch10.xhtml#_list9).***  RedWine.java


    ```

    package com.apress.ejb.chapter10;


    import javax.enterprise.context.ApplicationScoped;


    // Instance will be created only once, will be shared

    // across the application and will be destroyed on

    // application shutdown

    @ApplicationScoped

    @Red

    public class RedWine implements Wine {

       public String getColor() {

           return "Red";

       }

    }

    ```


    Introducing this custom qualifier allows us to resolve the ambiguous dependency
    error. `WineClient`, as coded in [Listing 10-3](#9781430246923_Ch10.xhtml#list3),
    will now instantiate `WhiteWine,` as `WhiteWine` has the `@Default` qualifier,
    and the injection point also has the same `@Default` qualifier. [Listing 10-10](#9781430246923_Ch10.xhtml#list10)
    shows how we can instantiate the `newWine` field with `RedWine` implementation
    by adding the `@Red` qualifier at the injection point.


    ***[Listing 10-10](#9781430246923_Ch10.xhtml#_list10).***  WineClient. java


    ```

    package com.apress.ejb.chapter10;


    import javax.inject.Inject;


    public class WineClient {

       // Instantiating in classic way

       // private Wine oldWine = new RedWine();


    // Instantiating via field dependency injection

       @Inject

       @Red

       private Wine newWine;

    }

    ```


    Now that we have a basic understanding of how qualifiers help us in resolving
    ambiguity, we will look into the four types of CDI qualifiers.


    @Default


    When a bean or an injection point does not explicitly define a qualifier, the
    CDI container assumes the qualifier as `@javax.enterprise.inject.Default`. If
    the CDI bean has only one implementation, then the CDI container can easily select
    that implementation for injection, as there is no ambiguity. The `@Default` is
    a built-in qualifier that informs the CDI container to inject a single, default
    bean implementation when no other qualifier (other than @Named, see below) is
    specified. The `WhiteWine` class in [Listing 10-7](#9781430246923_Ch10.xhtml#list7)
    has the `@Default` qualifier and can be written, as shown in [Listing 10-11](#9781430246923_Ch10.xhtml#list11),
    without any change in behavior.


    ***[Listing 10-11](#9781430246923_Ch10.xhtml#_list11).***  WhiteWine.java


    ```

    package com.apress.ejb.chapter10;

    import javax.enterprise.inject.Default;

    @Default

    public class WhiteWine implements Wine {

       public String getColor() {

           return "White";

       }

    }

    ```


    @Any


    Just like the `@Default` qualifier, all beans implicitly have the `@Any` qualifier.
    We can add an `@javax.enterprise.inject.Any` annotation to the `WhiteWine` class,
    as shown in [Listing 10-11](#9781430246923_Ch10.xhtml#list11), alongside `@Default`
    without any change in behavior. An `@Any` qualifier at an injection point is useful
    for iterating over all of the implementations of a bean type.


    [Listing 10-12](#9781430246923_Ch10.xhtml#list12) shows how a `@Any` qualifier
    can be used to iterate over all of the implementations of `Wine`.


    ***[Listing 10-12](#9781430246923_Ch10.xhtml#_list12).***  AllWinesClient.java


    ```

    package com.apress.ejb.chapter10;


    import javax.enterprise.inject.Any;

    import javax.enterprise.inject.Instance;

    import javax.inject.Inject;


    public class AllWinesClient {

       @Inject

       @Any

       private Instance<Wine> allWines;


    private void printAllWineColors(){

           for (Wine wine : allWines){

               System.out.println(wine.getColor());

           }

       }

    }

    ```


    @Named


    The `@Named` built-in qualifier is used by the beans that are required to be made
    accessible to the Web tier through the Unified Expression Language (EL). By default,
    the bean name with its first letter in lowercase is used to access the bean. A
    non-default name can be passed as an argument to the `@Named` qualifier.


    @New


    The `@New` qualifier disassociates an instance of the bean from its declared scope.
    An application can obtain the bean instances that are not bound to the declared
    scope by using the `@New` qualifier. The `@New` qualifier forces the container
    to create a new instance of the bean that is not bound to the specified CDI contextual
    lifecycle.


    For example, an instance of `newWine`, as shown in [Listing 10-10](#9781430246923_Ch10.xhtml#list10),
    will be application scoped as it is qualified with the `@Red` annotation and the
    `RedWine` bean is application scoped. If we update the client to include the `@New`
    annotation, as shown in [Listing 10-13](#9781430246923_Ch10.xhtml#list13), then
    the `newWine` instance will be dependent scoped—adopt the lifecycle of its normal
    Java context—and not application scoped.


    ***[Listing 10-13](#9781430246923_Ch10.xhtml#_list13).***  WineClient.java


    ```

    package com.apress.ejb.chapter10;


    import javax.enterprise.inject.New;

    import javax.inject.Inject;


    public class WineClient {

       // Instantiating in classic way

       // private Wine oldWine = new RedWine();


    // Instantiating via field dependency injection

       @Inject

       @Red

       @New

       private Wine newWine;

    }

    ```


    User-defined qualifiers can be created using the `@Qualifier` annotation, as shown
    in [Listing 10-8](#9781430246923_Ch10.xhtml#list8).


    Alternatives'
  trans: "\n在引入 `WhiteWine` 实现后，我们的 `WineClient`（其中注入了 `Wine`）需要区分 `Wine` 的两种实现：即\
    \ `RedWine` 和 `WhiteWine`。当 CDI 容器无法隔离出需要在给定注入点注入的 bean 类时，它会在部署时抛出*不满足或存在歧义的依赖*错误。这种歧义依赖问题可以通过使用以下三种解决方案中的任意一种来解决：\n\
    \n*   限定符（用于编译时解析）\n*   替代方案（用于部署时解析）\n*   生产者（用于运行时解析）\n\n限定符\n\n限定符类型通过提供编译时的多态性和运行时的动态绑定，使\
    \ CDI 组件能够以松散耦合的方式进行交互。限定符类型允许客户端指定要注入的实例的所需特性，而无需知道选择了哪个具体的实现类。\n\n让我们通过一个示例来理解限定符。在清单\
    \ 10-7 中添加 `WhiteWine` 类迫使容器抛出错误，因为容器无法决定是实例化 `RedWine` 还是 `WhiteWine` 实现。我们将使用一个限定符来解决此依赖问题。清单\
    \ 10-8 展示了一个名为 `Red` 的用户自定义限定符。\n\n***清单 10-8.***  Red.java\n\n```\npackage com.apress.ejb.chapter10;\n\
    \nimport static java.lang.annotation.ElementType.TYPE;\nimport static java.lang.annotation.ElementType.FIELD;\n\
    import static java.lang.annotation.ElementType.PARAMETER;\nimport static java.lang.annotation.ElementType.METHOD;\n\
    import static java.lang.annotation.RetentionPolicy.RUNTIME;\nimport java.lang.annotation.Retention;\n\
    import java.lang.annotation.Target;\nimport javax.inject.Qualifier;\n\n@Qualifier\n\
    @Retention(RUNTIME)\n@Target({METHOD, FIELD, PARAMETER, TYPE})\npublic @interface\
    \ Red {\n}\n```\n\n我们将为清单 10-2 中所示的 `RedWine` 类添加 `Red` 限定符，如清单 10-9 所示。\n\n***清单\
    \ 10-9.***  RedWine.java\n\n```\npackage com.apress.ejb.chapter10;\n\nimport javax.enterprise.context.ApplicationScoped;\n\
    \n// 实例只会创建一次，将在整个应用程序中共享，\n// 并在应用程序关闭时销毁\n@ApplicationScoped\n@Red\npublic class\
    \ RedWine implements Wine {\n   public String getColor() {\n       return \"Red\"\
    ;\n   }\n}\n```\n\n引入这个自定义限定符使我们能够解决歧义依赖错误。如清单 10-3 中所编码的 `WineClient`，现在将实例化\
    \ `WhiteWine`，因为 `WhiteWine` 具有 `@Default` 限定符，并且注入点也具有相同的 `@Default` 限定符。清单 10-10\
    \ 展示了如何通过在注入点添加 `@Red` 限定符，用 `RedWine` 实现来实例化 `newWine` 字段。\n\n***清单 10-10.***  WineClient.java\n\
    \n```\npackage com.apress.ejb.chapter10;\n\nimport javax.inject.Inject;\n\npublic\
    \ class WineClient {\n   // 以经典方式实例化\n   // private Wine oldWine = new RedWine();\n\
    \n// 通过字段依赖注入进行实例化\n   @Inject\n   @Red\n   private Wine newWine;\n}\n```\n\n\
    现在我们基本了解了限定符如何帮助我们解决歧义，接下来我们将研究四种类型的 CDI 限定符。\n\n@Default\n\n当 bean 或注入点没有显式定义限定符时，CDI\
    \ 容器会假定限定符为 `@javax.enterprise.inject.Default`。如果 CDI bean 只有一个实现，那么 CDI 容器可以轻松选择该实现进行注入，因为不存在歧义。`@Default`\
    \ 是一个内置限定符，它告知 CDI 容器，在未指定其他限定符（除了 @Named，见下文）时，注入一个单一的默认 bean 实现。清单 10-7 中的 `WhiteWine`\
    \ 类具有 `@Default` 限定符，可以按清单 10-11 所示编写，行为不会发生任何变化。\n\n***清单 10-11.***  WhiteWine.java\n\
    \n```\npackage com.apress.ejb.chapter10;\nimport javax.enterprise.inject.Default;\n\
    @Default\npublic class WhiteWine implements Wine {\n   public String getColor()\
    \ {\n       return \"White\";\n   }\n}\n```\n\n@Any\n\n与 `@Default` 限定符一样，所有 bean\
    \ 都隐式具有 `@Any` 限定符。我们可以向 `WhiteWine` 类添加 `@javax.enterprise.inject.Any` 注解，如清单\
    \ 10-11 所示，与 `@Default` 一起使用，行为不会发生任何变化。注入点上的 `@Any` 限定符对于遍历 bean 类型的所有实现非常有用。\n\
    \n清单 10-12 展示了如何使用 `@Any` 限定符来遍历 `Wine` 的所有实现。\n\n***清单 10-12.***  AllWinesClient.java\n\
    \n```\npackage com.apress.ejb.chapter10;\n\nimport javax.enterprise.inject.Any;\n\
    import javax.enterprise.inject.Instance;\nimport javax.inject.Inject;\n\npublic\
    \ class AllWinesClient {\n   @Inject\n   @Any\n   private Instance<Wine> allWines;\n\
    \nprivate void printAllWineColors(){\n       for (Wine wine : allWines){\n   \
    \        System.out.println(wine.getColor());\n       }\n   }\n}\n```\n\n@Named\n\
    \n`@Named` 内置限定符用于需要通过统一表达式语言 (EL) 对 Web 层进行访问的 bean。默认情况下，使用首字母小写的 bean 名称来访问该\
    \ bean。可以将非默认名称作为参数传递给 `@Named` 限定符。\n\n@New\n\n`@New` 限定符将 bean 的实例与其声明的范围解耦。应用程序可以通过使用\
    \ `@New` 限定符获取未绑定到声明范围的 bean 实例。`@New` 限定符强制容器创建一个新的 bean 实例，该实例不绑定到指定的 CDI 上下文生命周期。\n\
    \n例如，如清单 10-10 所示的 `newWine` 实例将是应用程序作用域的，因为它使用了 `@Red` 注解进行限定，并且 `RedWine` bean\
    \ 是应用程序作用域的。如果我们更新客户端以包含 `@New` 注解，如清单 10-13 所示，那么 `newWine` 实例将是依赖作用域的——采用其普通\
    \ Java 上下文的生命周期——而不是应用程序作用域的。\n\n***清单 10-13.***  WineClient.java\n\n```\npackage\
    \ com.apress.ejb.chapter10;\n\nimport javax.enterprise.inject.New;\nimport javax.inject.Inject;\n\
    \npublic class WineClient {\n   // 以经典方式实例化\n   // private Wine oldWine = new\
    \ RedWine();\n\n// 通过字段依赖注入进行实例化\n   @Inject\n   @Red\n   @New\n   private Wine\
    \ newWine;\n}\n```\n\n可以使用 `@Qualifier` 注解创建用户自定义的限定符，如清单 10-8 所示。\n\n替代方案\n"
- fmt: "# Alternatives\n\nAlternatives enable the CDI components to interact in a\
    \ loosely coupled way by providing polymorphism at deployment time. An alternative\
    \ bean is declared by annotating the bean class with an `@Alternative` annotation.\
    \ An alternative bean must be explicitly declared in the `beans.xml` file if it\
    \ has to be available for lookup, injection, or EL resolution. When an ambiguous\
    \ dependency exists at an injection point, the container attempts to resolve the\
    \ ambiguity by looking for the available alternative among the beans that could\
    \ be injected.\n\nAlternatives use the information supplied in `beans.xml` to\
    \ select the implementation that needs to be instantiated. As the responsibility\
    \ of choosing the implementation is shifted out of the Java code and into a deployment\
    \ descriptor, recompilation of the Java code is not warranted if we decide to\
    \ choose a different implementation.\n\nTo resolve a dependency at deploy time\
    \ using alternatives, add the `@javax.enterprise.inject.Alternative` annotation\
    \ to the `RedWine` and the `WhiteWine` implementations mentioned in [Listing 10-2](#9781430246923_Ch10.xhtml#list2)\
    \ and [Listing 10-7](#9781430246923_Ch10.xhtml#list7) respectively. Then update\
    \ the `beans.xml` with the implementation class that should be instantiated, as\
    \ shown in [Listing 10-14](#9781430246923_Ch10.xhtml#list14). The CDI container\
    \ will instantiate the `RedWine` class in this case. Re-compilation of the client\
    \ is not required if we decide to instantiate the `WhiteWine` class later. We\
    \ only need to update the `beans.xml` descriptor accordingly. If at deployment\
    \ time the `beans.xml` contains more than one implementation class or with a class\
    \ name that cannot be resolved, the container automatically detects the problem\
    \ and treats it as an error.\n\n**[Listing 10-14](#9781430246923_Ch10.xhtml#_list14).**\
    \  `beans.xml`\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"\
    http://java.sun.com/xml/ns/javaee\"\n   xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
    \n   xsi:schemaLocation=\"http://java.sun.com/xml/ns/javaee\n   http://java.sun.com/xml/ns/javaee/beans_1_0.xsd\"\
    >\n\n<alternatives>\n       <class>com.apress.ejb.chapter10.RedWine</class>\n\
    \   </alternatives>\n</beans>\n```\n\n# Producers\n\nWe have seen how to use the\
    \ `@Inject` annotation to inject beans and to resolve ambiguous dependencies that\
    \ we face during injection using qualifiers and alternatives. Using producers,\
    \ we can inject any object in any other object provided that *we produce* the\
    \ object that needs to be injected. A producer method acts as a source of objects\
    \ that need to be injected. The objects that need to be injected need not be instances\
    \ of a bean, and the concrete type of the object that needs to be injected can\
    \ be decided at run time. This provides loosely coupled but typesafe polymorphism\
    \ at run time. One of the practical uses of producers is to inject Java EE resources\
    \ like `EntityManager`, `QueueConnetion`, `QueueSession`, and so on. CDI also\
    \ provides the `@Dispose` annotation, which we can use to free up the resources\
    \ by closing them when they go out of scope.\n\nProducer Field is a simpler alternative\
    \ to Producer Methods.\n\n[Listing 10-16](#9781430246923_Ch10.xhtml#list16) shows\
    \ how a producer method can be used to select which implementation of the `Wine`\
    \ interface is chosen for dependency injection. The decision to choose the exact\
    \ implementation for injection is taken at run time. The qualifier `RandomSelector`\
    \ defined in [Listing 10-15](#9781430246923_Ch10.xhtml#list15) is similar to the\
    \ qualifier `Red` defined in [Listing 10-8](#9781430246923_Ch10.xhtml#list8).\n\
    \n**[Listing 10-15](#9781430246923_Ch10.xhtml#_list15).**  `RandomSelector.java`\n\
    \n```\npackage com.apress.ejb.chapter10;\n\nimport static java.lang.annotation.ElementType.TYPE;\n\
    import static java.lang.annotation.ElementType.FIELD;\nimport static java.lang.annotation.ElementType.PARAMETER;\n\
    import static java.lang.annotation.ElementType.METHOD;\nimport static java.lang.annotation.RetentionPolicy.RUNTIME;\n\
    import java.lang.annotation.Retention;\nimport java.lang.annotation.Target;\n\
    import javax.inject.Qualifier;\n\n@Qualifier\n@Retention(RUNTIME)\n@Target({METHOD,\
    \ FIELD, PARAMETER, TYPE})\npublic @interface RandomSelector {\n}\n```\n\n[Listing\
    \ 10-16](#9781430246923_Ch10.xhtml#list16) shows the `WineSelector` class that\
    \ has a `getWine` method that returns an instance of `Wine`. The important thing\
    \ to note here is the exact instance of `Wine` (`RedWine` or `WhiteWine`) that\
    \ will be returned is decided at the run time. In this case, that decision is\
    \ based on the number generated by the random number generator.\n\n**[Listing\
    \ 10-16](#9781430246923_Ch10.xhtml#_list16).**  `WineSelector.java`\n\n```\npackage\
    \ com.apress.ejb.chapter10;\n\nimport java.util.Random;\nimport javax.enterprise.inject.New;\n\
    import javax.enterprise.inject.Produces;\n\npublic class WineSelector {\n   @Produces\n\
    \   @RandomSelector\n   public Wine getWine(@New RedWine rw, @New WhiteWine ww)\
    \ {\n       final int wineNumber = new Random().nextInt(2);\n       if (wineNumber\
    \ == 0) {\n           return rw;\n       }\n       else if (wineNumber == 1) {\n\
    \           return ww;\n       }\n       else{\n           return null;\n    \
    \   }\n   }\n}\n```\n\n[Listing 10-17](#9781430246923_Ch10.xhtml#list17) shows\
    \ the `WineClient` class that uses the `RandomSelector` qualifier to instantiate\
    \ the `randomWine` field based on the random number generated in [Listing 10-16](#9781430246923_Ch10.xhtml#list16).\n\
    \n**[Listing 10-17](#9781430246923_Ch10.xhtml#_list17).**  `WineClient.java`\n\
    \n```\npackage com.apress.ejb.chapter10;\n\nimport javax.inject.Inject;\n\npublic\
    \ class WineClient {\n   @Inject\n   @RandomSelector\n   private Wine randomWine;\n\
    }\n```\n\n# Interaction with Session Beans\n\nCDI enhances the functionality provided\
    \ by the session beans by associating them with a definite scope and creating\
    \ a loosely coupled typesafe ecosystem that resolves ambiguity through injection\
    \ at compile time, deploy time, or run time. In return, managed beans can be annotated\
    \ with a `@Stateful`, `@Stateless`, or `@Singleton` annotation enhancing them\
