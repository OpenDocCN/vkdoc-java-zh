- fmt: "在这个示例中，EAR 文件的`META-INF/MANIFEST.MF`文件用于声明对已安装库`commonUtils`（版本 1.4）的引用。这使得\
    \ EAR 文件内的所有 JAR 文件都能访问`commonUtils`库的内容，从而满足`myEjb.jar`模块对该库内容的依赖。该引用本也可以在`myEjb.jar`上定义，那样的话，只有`myEjb.jar`会被授予对该库的访问权限。无论哪种方式，已安装的库都必须在部署`myEjb.jar`之前安装好。\n\
    \n`commonUtils`库中包含的 JAR 文件的`META-INF/MANIFEST.MF`文件如[清单 11-4](#9781430246923_Ch11.xhtml#list4)所示。\n\
    \n***[清单 11-4](#9781430246923_Ch11.xhtml#_list4).*** 已安装库的 JAR 文件内容\n\n```\ncommonUtils.jar:\n\
    \ META-INF/MANIFEST.MF:\n  Extension-Name: com/apress/ejb/ch11/commonUtils\n \
    \ Specification-Title: Utils for implementing common patterns\n  Specification-Version:\
    \ 1.4\n```\n\n## 库的版本管理\n\n尽管 Java EE 规范并未强制要求，但许多应用服务器支持 Java EE 应用隔离级别，允许每个\
    \ Java EE 应用拥有自己的类加载器。这使得在同一台 Java EE 服务器上同时运行的多个应用可以引用同一捆绑或已安装库组件的不同版本。一个有用的场景是，当你希望将部分应用迁移到新库版本时，可以在服务器中安装新库版本，然后有选择地更新希望使用新库版本的应用的`Specification-Version`属性。\n\
    \n或者，支持此隔离级别的 Java EE 服务器允许你部署一个捆绑了自身依赖库版本的 Java EE 应用。Java EE 规范中的优先级规则规定，当捆绑库与具有相同`Extension-Name`的已安装库发生冲突时，将使用捆绑库。这保证了应用始终使用其捆绑的库，无论服务器已安装库基础中有哪些版本可用。\n\
    \n## 应用服务器与平台独立性\n\nJava EE 一直非常注重可移植性，尽管在实践中这往往难以实现。理想情况下，所有 Java EE 服务器都尽可能实现规范，然后通过性能和特性（例如对可配置隔离级别和高级对象/关系（O/R）映射选项的支持，这些选项是规范推荐或暗示但未强制要求的）来区分彼此。\n\
    \n应用服务器应定义自己的平台特定描述符，用于增强 Java EE 规范的核心需求，事实上几乎所有应用服务器实现都提供了此类描述符。随着时间的推移（在 JPA\
    \ 映射元数据领域尤为明显），规范中缺失且由供应商实现解决的功能会被纳入规范并变得通用。例如，EJB 2.1 既未提供对实体 Bean 的 O/R 映射定义的支持或规定，也未说明如何实现实体继承层次结构。从\
    \ EJB 3 开始，JPA 吸收了来自 TopLink、Hibernate 和 Java 数据对象（JDO）的许多最佳理念，并将它们直接整合到`orm.xml`文件中，以提供这些功能及其他功能。\n\
    \n## 部署工具\n\n应用服务器供应商几乎都标准化了 JSR 88，该规范规定使用受管 JavaBean（称为 *MBean*）来管理部署过程。MBean\
    \ 是自描述的，并遵循 Java 管理扩展（JMX）规范定义的设计模式，为 Java EE 服务器和应用服务器的部署工具之间提供接口。Java EE 部署\
    \ MBean 暴露的实际接口因应用服务器而异；但所有部署工具都在不同程度上使用它们，这一事实为供应商部署工具之间提供了一定的一致性。\n\n通常，供应商的部署工具不仅会指导装配者完成打包\
    \ Java EE 模块、库和应用归档的过程，还会指导其指定一些元数据，用于填充 Java EE 通用和平台特定的部署描述符。这些工具还接受 EJB、WAR\
    \ 或 EAR 文件，并实际在服务器本身中执行安装和验证部署任务。\n\n![image](Images/sq.jpg) **注意** Cargo 是一个轻量级封装，允许你以标准方式操作\
    \ Java EE 容器。Cargo 旨在通过 Ant 任务、Maven 和 IDE 插件为许多流行的 Java EE 容器提供抽象 API。有关 Cargo\
    \ 的更多信息，请参见`http://cargo.codehaus.org`。\n\n## 部署计划\n\n某些供应商的应用服务器工具将部署者的选择记录在一个称为\
    \ *部署计划* 的文档中。由于部署通常是一个迭代过程，尤其是在开发和测试阶段，捕获部署者的选择可以方便地避免重复指定相同信息。\n\n目前，JSR 88\
    \ 或其他规范中并未规定部署计划的标准格式，因此它不能跨应用服务器实现重用。如果你觉得这很不方便，可以参与 JCP 并组建或加入一个 JSR，以推动该领域的标准化。\n\
    \n## 部署角色\n\n任何全面的企业服务平台本质上都是复杂的。认识到这一现实，Java EE 架构师将 Java EE 服务划分为定义良好的 API。类似地，他们将与开发和配置\
    \ Java EE 应用各个阶段相关的任务划分为定义良好的角色。我们提到，与构建各种应用组件（如 EJB、实体、Servlet、JSF JSP 等）相关的任务属于\
    \ Java EE 的应用组件提供者角色。还有其他角色，例如系统组件提供者，负责在应用服务器中安装应用组件所需的资源。其中包括数据库资源、授权策略、安全角色以及许多其他资源，包括通过资源适配器引入的服务。\n\
    \n我们之前介绍过应用装配者和应用部署者的角色。在本节中，我们将更深入地探讨这些角色。\n\n### 应用装配者\n\n以下是作为应用装配者需要了解的内容。\n\
    \n#### 定义和描述外部依赖"
  raw: 'In this example, the EAR file’s `META-INF/MANIFEST.MF` file is used to declare
    a reference to an installed library named `commonUtils`, version 1.4\. This gives
    all the JAR files inside the EAR file access to the contents of the `commonUtils`
    library, satisfying the `myEjb.jar` module’s dependence on the contents of this
    library. The reference could have been defined on `myEjb.jar` instead, in which
    case only `myEjb.jar` would be given access to this library. Either way, the installed
    library must have been installed prior to deployment of `myEjb.jar`.


    The `META-INF/MANIFEST.MF` file for the JAR file contained in our `commonUtils`
    library is shown in [Listing 11-4](#9781430246923_Ch11.xhtml#list4).


    ***[Listing 11-4](#9781430246923_Ch11.xhtml#_list4).***  Contents of an Installed
    Library’s JAR File


    ```

    commonUtils.jar:

     META-INF/MANIFEST.MF:

      Extension-Name: com/apress/ejb/ch11/commonUtils

      Specification-Title: Utils for implementing common patterns

      Specification-Version: 1.4

    ```


    Versioning of Libraries


    Although it is not mandated by the Java EE specification, many application servers
    support Java EE application isolation levels that allow each Java EE application
    to have its own class loader. This allows multiple applications running simultaneously
    in the same Java EE server to reference different versions of the same bundled
    or installed library component. An example where this is useful is when you wish
    to migrate a subset of your applications to use a new library version. You can
    install the new library version in the server and then selectively update the
    Specification-Version property for any applications that you wish to use the new
    library version.


    Alternatively, Java EE servers with this level of isolation support will allow
    you to deploy a Java EE application that bundles its own version of a dependent
    library. The rules of precedence in the Java EE specification dictate that, in
    the case of a conflict between a bundled library and an installed library with
    the same Extension-Name, the bundled library will be used. This guarantees that
    the application will always use its bundled library, regardless of which versions
    of that library are available in the server’s installed library base.


    Application Servers and Platform Independence


    Java EE has always held a keen eye to portability, although in practice this has
    often been difficult to achieve. Ideally, all Java EE servers implement the specification
    as far as it goes and then differentiate themselves both on performance and features,
    like support for configurable isolation levels and advanced object/relational
    (O/R) mapping options that are recommended (or hinted at, but not mandated) by
    the specification.


    Application servers are expected to define their own platform-specific descriptors
    to be used to augment the core requirements of the Java EE specification, and
    indeed virtually all application server implementations offer such descriptors.
    Over time (and we have seen this most notably in the area of JPA mapping metadata),
    features that are found to be lacking in the specification and are solved by vendor
    implementations, get rolled into the specification and are made generic. For example,
    EJB 2.1 offered no support or regulations on how to define O/R mappings for entity
    beans, nor on how to implement an entity inheritance hierarchy. Starting with
    EJB 3, the JPA has taken many of the best ideas coming out of TopLink, Hibernate,
    and Java Data Objects (JDO), and rolled them straight into the `orm.xml` file
    to offer these features, as well as others.


    Deployment Tools


    Application server vendors have virtually all standardized on JSR 88, which specifies
    the use of managed JavaBeans, called *MBeans*, to manage the deployment process.
    MBeans are self-describing and follow design patterns defined by the Java Management
    Extensions (JMX) specification to provide an interface between the Java EE server
    and the application server’s deployment tool. The actual interfaces exposed by
    the Java EE-deployment MBeans vary from one application server to another; but
    the fact that all deployment tools now use them, to one degree or another, offers
    some consistency between vendor deployment tools.


    Typically, a vendor’s deployment tools will guide the Assembler not only through
    the process of packaging the Java EE modules, libraries, and application archives,
    but also through specifying some amount of metadata for populating both the Java
    EE generic and platform-specific deployment descriptors. The tools will also accept
    EJB, WAR, or EAR files, and they actually perform the installation and validation
    deployment tasks in the server itself.


    ![image](Images/sq.jpg) **Note**   Cargo is a thin wrapper that allows you to
    manipulate Java EE containers in a standard way. Cargo aims to provide an abstraction
    API to many of the popular Java EE containers, through the medium of Ant tasks,
    Maven, and IDE plug-ins. For more information on Cargo, see `http://cargo.codehaus.org`.


    The Deployment Plan


    Some vendors’ application server tools record the Deployer’s choices in a document
    called a *deployment plan*. Since deployment is often an iterative process, especially
    during the development and testing stages, it is convenient to capture the Deployer’s
    choices so that the Deployer does not have to specify the same information repeatedly.


    Currently, there is no standard format for a deployment plan specified in JSR
    88 or elsewhere, so it is not a document that can be reused across application
    server implementations. If you find this inconvenient, get involved in the JCP
    and form or join a JSR to promote a standard in this area.


    Deployment Roles


    Any encompassing enterprise service platform is, by its very nature, complex.
    Recognizing this reality, the architects of Java EE have partitioned the Java
    EE services into well-defined APIs. Similarly, they have partitioned the tasks
    associated with the various stages of developing and configuring Java EE applications
    into well-defined roles. We mentioned that the tasks associated with building
    the various application components, such as EJBs, entities, servlets, JSF JSPs,
    and many others, fall under the Java EE role of Application Component Provider.
    There are also other roles, such as the System Component Provider, which is responsible
    for installing resources in the application server that are required by the application
    components. Among these are database resources, authorization policies, security
    roles, and many others, including services brought in through resource adapters.


    We had previously introduced the roles of Application Assembler and Application
    Deployer. In this section, however, we will explore these roles in greater depth.


    The Application Assembler


    Here is what you need to know as an application assembler.


    Defining and Describing External Dependencies'
