    persistence.xml 文件（Chapter07-ServiceIntegration-jpa 和 Chapter09-TransactionSamples
    中各有一个），将策略重置为`none`。


    结论


    本章定义了所有事务行为所必需的核心概念，并探讨了 EJB 服务器提供的事务特性以及企业 Bean 开发者可访问的接口。


    我们首先探讨了定义事务的核心 ACID 特性——原子性、一致性、隔离性和持久性。我们介绍了 JTA，并描述了其分布式事务模型的特性和优势，包括关键的两阶段提交协议的行为。


    我们研究了 EJB 服务器如何充当 JTA 事务管理器，使 EJB 能够无缝参与分布式事务，并减轻了 Bean 开发者显式将持久化或其他事务操作与事务资源绑定的需求。我们还详细介绍了
    EJB 为企业 Bean 开发者提供的对这些事务服务的声明式支持，探讨了 CMT 和 BMT 两种划分方式所支持的企业 Bean，并使用了隐式和显式提交模型。对于
    CMT Bean，我们描述了可用于定义 CMT Bean 方法事务行为的六种事务属性的行为及其含义。在 JPA 领域，我们探讨了事务与持久化上下文之间的关系，并解释了如何将有状态会话
    Bean 与扩展持久化上下文结合使用，以支持实体在事务上下文之外解析与其他实体的关系。


    随后，本章基于 Wines Online 应用程序的一个场景，研究了一些实际示例。这些示例展示了 CMT 和 BMT 划分的使用、有状态会话 Bean 上的扩展持久化上下文、回滚场景、客户端控制的事务、使用
    BMT Bean 在事务上下文之外与实体交互，以及 CMT Bean 方法之间的事务上下文传播。


    最后，我们提供了运行所研究的 CMT 和 BMT 示例应用程序的步骤。


    在下一章中，我们将探讨一些可用于分析应用程序 EJB 特定性能的技术。通过几个常见示例，我们将演示如何设置自己的测试来分析特定的应用程序组件。


    第 9 章


    ![image](img/frontdot.jpg)


    EJB 3 性能与测试


    作为开发者，我们总是在寻找编写最高性能代码的最有效方法。多年来，我们意识到我们做出的一些假设并不总是正确的，并且我们使用的某些编程模型和技术并未达到预期的性能水平。令人惊讶的是，大多数时候，我们的期望都被那些逻辑和直觉认为最佳的模型和技术所击败。

