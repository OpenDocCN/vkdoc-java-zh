    \ {\n  }\n\n/* get/set methods */\n}\n```\n\n### 映射使用复合键的关系\n\n在定义目标实体使用复合主键的关系时，拥有实体必须将其关系字段映射到相应类型的列。这需要使用`@JoinColumns`注解（或等效的XML元数据）。如果这些列恰好嵌套在拥有实体的主键中，或者它们受到`NOT\
    \ NULL`约束，那么必须在调用`EntityManager.persist()`操作将该实体持久化到持久化上下文时绑定该关系，或者至少在调用`EntityManager.flush()`发出数据库`INSERT`调用时绑定。\n\
    \n在以下示例中，`PersonPK`复合主键类包含两个字段——`id`和`addressId`——它们是强制性的（`NOT NULL`），因为它们是主键的一部分。由于`addressId`和关系字段`homeAddress`都映射到同一个`ADDRESS_ID`列，并且这两个字段中只有一个可以是可插入和可更新的，我们必须将其中一个字段标记为只读。在[清单4-30](#9781430246923_Ch04.xhtml#list30)中，关系字段`homeAddress`通过在`@JoinColumn`注解上分配`insertable=false`和`updatable=false`属性而被标记为只读。\n\
