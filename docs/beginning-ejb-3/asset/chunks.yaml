  raw: 'An entity must declare its primary key. The primary key serves to identify
    an entity instance uniquely among all of the instances of the entity type. A primary
    key may be simple, represented by a single field of a basic Java class, like `String`
    or `Long`, as in the previous `Customer` example ([Listing 3-2](#9781430246923_Ch03.xhtml#list2)).
    Alternatively, a primary key may be complex, represented by a composite class
    comprised of multiple elementary fields or properties.


    The underlying column or columns on the entity’s table that are mapped to by the
    primary key field or fields may be formally bound by a database primary key constraint,
    but this is not a requirement. It is, however, required that the primary key column
    value or values for any entity instance resolve to a unique value across all instances
    of that entity. Database constraints are useful in enforcing this requirement,
    and in their absence, care should be taken to ensure that unique values are assigned
    by application.


    Simple Primary Key


    A simple primary key is declared by annotating a single basic-type field on the
    entity class with the `@Id` annotation (see [Listing 3-6](#9781430246923_Ch03.xhtml#list6)).
    A basic-type field is a basic Java type (a list of basic types is shown in [Table
    3-2](#9781430246923_Ch03.xhtml#Tab2)).


    [***Listing 3-6.***](#9781430246923_Ch03.xhtml#_list6)  An Entity with a Simple
    Primary Key


    ```

    @Entity

    public class Customer implements Serializable {

        @Id

        private Integer id;

        private String name;


    public Customer() {}

        public Customer(Integer id) { this.id = id; }


    public Integer getId() { return id; }

        public void setId(Integer id) { this.id = id; }


    public String getName() { return name; }

        public void setName(String name) { this.name = name; }

    }

    ```


    Note that we could eliminate the usefulness of an alternate constructor in our
    entity class by using a database sequence to populate the PK value automatically.
    [Listing 3-7](#9781430246923_Ch03.xhtml#list7) shows how this might look, using
    an ID value generator provided by JPA.


    [***Listing 3-7.***](#9781430246923_Ch03.xhtml#_list7)  An Entity with a Simple
    Primary Key That Is Populated Using @GeneratedValue


    ```

    @Entity

    @SequenceGenerator(name = " CustomerSequence",

                       sequenceName = " CUSTOMER_SEQ",

                       initialValue = 100, allocationSize = 20)

    public class Customer implements Serializable {

        @Id

        @GeneratedValue(strategy = GenerationType.SEQUENCE,

                        generator = " CustomerSequence")

        private Integer id;

        private String name;


    public Integer getId() { return id; }

        public void setId(Integer id) { this.id = id; }


    public String getName() { return name; }

        public void setName(String name) { this.name = name;}

    }

    ```


    The @GeneratedValue Annotation


    The `@GeneratedValue` annotation tells the persistence framework to autopopulate
    this column with the specified sequence generator, which must be defined on one
    of the entities in your persistence archive. (It is defined directly on the `Customer`
    entity.) A `@SequenceGenerator` annotation defines a sharable sequence generator,
    which can either define a new framework-generated sequence or refer to an existing
    sequence in your database. ID generators will be explored more fully in [Chapter
    4](../Text/9781430246923_Ch04.xhtml).


    Composite Primary Key


    If an entity’s primary key maps to multiple database columns, it uses a complex,
    or composite, primary key. This may be represented in one of two ways on the entity
    class. The entity may declare each field in the composite key directly on the
    entity class (annotating each one with `@Id`), and specify a composite key class
    that provides these exact same fields in an `@IdClass` annotation. Alternatively,
    the entity may designate a single, complex field to represent its primary key
    by annotating that field with `@EmbeddedId`. The class type of the `@EmbeddedId`
    field is the entity’s composite key class. This composite key class is annotated
    `@Embeddable` and must specify the mapping details for each of its fields. These
    fields will end up mapping to the base table on the entity. With either approach,
    the composite primary key class must override the `hashCode()` and `equals(Object
    obj)` methods on `java.lang.Object`.


    [Listing 3-8](#9781430246923_Ch03.xhtml#list8) shows how these options look.


    [***Listing 3-8.***](#9781430246923_Ch03.xhtml#_list8)  An Entity with a Composite
    Primary Key Using @IdClass


    ```

    @Entity

    @IdClass(CustomerPK.class)

    public class Customer implements Serializable {

        @Id

        private Integer customerId;

        @Id

        private String name;


    public Integer getCustomerId() { return customerId; }

        public void setCustomerId(Integer customerId) { this.customerId = customerId;
    }

        public void setName(String name) { this.name = name; }

        public String getName() { return name; }

    }

    ```


    The @IdClass Annotation


    `The @IdClass` identifies an ordinary POJO (such as the example shown in [Listing
    3-9](#9781430246923_Ch03.xhtml#list9)) that does not require any metadata. Any
    mapping details required for the primary key fields are specified on the fields
    on the entity.


    [***Listing 3-9.***](#9781430246923_Ch03.xhtml#_list9)  A Simple POJO that Serves
    as a Composite Primary Key


    ```

    public class CustomerPK implements Serializable {


    private Integer id;

      private String name;


    public void setId(Integer id) { this.id = id; }

      public Integer getId() { return id; }


    public void setName(String name) { this.name = name; }

      public String getName() { return name; }


    @Override

      public int hashCode() { return 0; /* Implementation here */ }

      @Override

      public boolean equals(Object obj) { return false; /* Implementation here */
    }

    }

    ```


    The composite primary key class must conform to the access type (annotated instance
    variables vs. property accessors) of the entity, and all its fields or properties
    must have matching fields or properties on the entity class. The corresponding
    fields on the entity must be annotated `@Id`.


    The @EmbeddedId Annotation


    Alternatively, the entity may designate one of its fields or properties to be
    its composite primary key by annotating it `@EmbeddedId` (see [Listing 3-10](#9781430246923_Ch03.xhtml#list10)).


    [***Listing 3-10.***](#9781430246923_Ch03.xhtml#_list10)  An Entity Using an @EmbeddedId
    Annotation


    ```

    @Entity

    public class Customer implements Serializable {

      @EmbeddedId

      private CustomerPK customerId;


    public CustomerPK getCustomerId() { return customerId; }

      public void setCustomerId(CustomerPK customerId) {

        this.customerId = customerId;

      }


    // . . .

    }

    ```


    The @Embeddable Annotation


    Every `@EmbeddedId` must reference a class that is marked `@Embeddable`. [Listing
    3-11](#9781430246923_Ch03.xhtml#list11) shows the corresponding embeddable composite
    key class.


    [***Listing 3-11.***](#9781430246923_Ch03.xhtml#_list11)  An @Embeddable Composite
    Key Class


    ```

    @Embeddable

    public class CustomerPK implements Serializable {

      Long id;

      String name;


    public void setId(Long id) { this.id = id; }

      public Long getId() { return id; }


    public void setName(String name) { this.name = name; }

      public String getName() { return name; }


    @Override

      public int hashCode() { return 0; /* Implementation here */ }

      @Override

      public boolean equals(Object obj) { return false; /* Implementation here */
    }

    }

    ```'
  trans: '

    实体必须声明其主键。主键用于在实体类型的所有实例中唯一标识一个实体实例。主键可以是简单的，由基本 Java 类的单个字段表示，例如 `String` 或 `Long`，就像之前的
    `Customer` 示例（清单 3-2）那样。或者，主键也可以是复杂的，由一个包含多个基本字段或属性的复合类表示。


    实体表中被主键字段映射的底层列，可能会受到数据库主键约束的正式约束，但这并非必需条件。然而，对于任何实体实例，其主键列的值必须在所有该实体实例中解析为唯一值。数据库约束有助于强制执行这一要求，在没有约束的情况下，应注意确保应用程序分配了唯一的值。


    简单主键


    通过在实体类上使用 `@Id` 注解标注单个基本类型字段来声明简单主键（参见清单 3-6）。基本类型字段是一种基本的 Java 类型（基本类型列表见表 3-2）。


    ***清单 3-6.***  具有简单主键的实体


    ```

    @Entity

    public class Customer implements Serializable {

        @Id

        private Integer id;

        private String name;


    public Customer() {}

        public Customer(Integer id) { this.id = id; }


    public Integer getId() { return id; }

        public void setId(Integer id) { this.id = id; }


    public String getName() { return name; }

        public void setName(String name) { this.name = name; }

    }

    ```


    请注意，我们可以通过使用数据库序列自动填充主键值，来消除实体类中备用构造函数的实用性。清单 3-7 展示了使用 JPA 提供的 ID 值生成器时可能的样子。


    ***清单 3-7.***  使用 @GeneratedValue 填充的具有简单主键的实体


    ```

    @Entity

    @SequenceGenerator(name = " CustomerSequence",

                       sequenceName = " CUSTOMER_SEQ",

                       initialValue = 100, allocationSize = 20)

    public class Customer implements Serializable {

        @Id

        @GeneratedValue(strategy = GenerationType.SEQUENCE,

                        generator = " CustomerSequence")

        private Integer id;

        private String name;


    public Integer getId() { return id; }

        public void setId(Integer id) { this.id = id; }


    public String getName() { return name; }

        public void setName(String name) { this.name = name;}

    }

    ```


    @GeneratedValue 注解


    `@GeneratedValue` 注解告诉持久化框架使用指定的序列生成器自动填充此列，该生成器必须在持久化归档中的某个实体上定义。（它直接定义在 `Customer`
    实体上。）`@SequenceGenerator` 注解定义了一个可共享的序列生成器，它可以定义一个新的框架生成的序列，或者引用数据库中现有的序列。ID 生成器将在第
    4 章中更全面地探讨。


    复合主键


    如果实体的主键映射到多个数据库列，则使用复杂（或复合）主键。这可以在实体类上以两种方式之一表示。实体可以直接在实体类上声明复合键中的每个字段（使用 `@Id`
    注解每个字段），并在 `@IdClass` 注解中指定一个提供完全相同字段的复合键类。或者，实体可以通过使用 `@EmbeddedId` 注解一个字段，来指定一个单一的复杂字段作为其主键。`@EmbeddedId`
    字段的类类型就是实体的复合键类。这个复合键类使用 `@Embeddable` 注解，并且必须为其每个字段指定映射细节。这些字段最终将映射到实体的基表。无论采用哪种方法，复合主键类都必须重写
    `java.lang.Object` 上的 `hashCode()` 和 `equals(Object obj)` 方法。


    清单 3-8 展示了这些选项的样子。


    ***清单 3-8.***  使用 @IdClass 的具有复合主键的实体


    ```

    @Entity

    @IdClass(CustomerPK.class)

    public class Customer implements Serializable {

        @Id

        private Integer customerId;

        @Id

        private String name;


    public Integer getCustomerId() { return customerId; }

        public void setCustomerId(Integer customerId) { this.customerId = customerId;
    }

        public void setName(String name) { this.name = name; }

        public String getName() { return name; }

    }

    ```


    @IdClass 注解


    `@IdClass` 标识一个普通的 POJO（例如清单 3-9 中所示的示例），该 POJO 不需要任何元数据。主键字段所需的任何映射细节都在实体的字段上指定。


    ***清单 3-9.***  一个作为复合主键的简单 POJO


    ```

    public class CustomerPK implements Serializable {


    private Integer id;

      private String name;


    public void setId(Integer id) { this.id = id; }

      public Integer getId() { return id; }


    public void setName(String name) { this.name = name; }

      public String getName() { return name; }


    @Override

      public int hashCode() { return 0; /* 此处为实现代码 */ }

      @Override

      public boolean equals(Object obj) { return false; /* 此处为实现代码 */ }

    }

    ```


    复合主键类必须符合实体的访问类型（注解的实例变量 vs 属性访问器），并且其所有字段或属性必须在实体类上具有匹配的字段或属性。实体上对应的字段必须使用 `@Id`
    注解。


    @EmbeddedId 注解


    或者，实体可以通过使用 `@EmbeddedId` 注解其某个字段或属性，将其指定为复合主键（参见清单 3-10）。


    ***清单 3-10.***  使用 @EmbeddedId 注解的实体


    ```

    @Entity

    public class Customer implements Serializable {

      @EmbeddedId

      private CustomerPK customerId;


    public CustomerPK getCustomerId() { return customerId; }

      public void setCustomerId(CustomerPK customerId) {

        this.customerId = customerId;

      }


    // . . .

    }

    ```


    @Embeddable 注解


    每个 `@EmbeddedId` 必须引用一个标记为 `@Embeddable` 的类。清单 3-11 显示了相应的可嵌入复合键类。


    ***清单 3-11.***  一个 @Embeddable 复合键类


    ```

    @Embeddable

    public class CustomerPK implements Serializable {

      Long id;

      String name;


    public void setId(Long id) { this.id = id; }

      public Long getId() { return id; }


    public void setName(String name) { this.name = name; }

      public String getName() { return name; }


    @Override

      public int hashCode() { return 0; /* 此处为实现代码 */ }

      @Override

      public boolean equals(Object obj) { return false; /* 此处为实现代码 */ }

    }

    ```

