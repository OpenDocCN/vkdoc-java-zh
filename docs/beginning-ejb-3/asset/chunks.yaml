    ## 结论


    本章介绍了Java持久化API及其提供的一些基本服务。我们研究了如何通过添加几个注解将简单的JavaBean转换为JPA实体。然后，我们扩展了这个示例，以说明如何通过声明性地在实体类上指定其他注解来进一步细化实体，从而增加更大的灵活性。


    我们探讨了JPA的这些基本组件：持久化归档、持久化单元、持久化上下文和`EntityManager`。我们逐步了解了实体生命周期，以检查实体在以下状态之间转换时的行为：新建、托管、分离和移除。


    关于O/R映射的部分探讨了实体如何映射到底层表，以及如何控制基本映射以允许字段映射到具有不同名称的列。


    我们讨论了实体主键的作用，探讨了简单主键和复合主键以及如何定义它们。我们展示了如何配置ID生成器，以便JPA在持久化时自动分配实体的PK。


    然后，我们深入研究了实体关系，并讨论了JPA支持的关系字段类型：`@OneToOne`、`@OneToMany`、`@ManyToOne`和`@ManyToMany`。


    随后讨论了JPQL，并举例说明了如何声明和执行命名查询，以及如何使用动态和批量更新及删除查询。


    最后，我们提供了一个示例应用程序，说明了相关实体如何交互，以及如何通过会话外观（该外观又由HTTP servlet调用）来操作它们。


