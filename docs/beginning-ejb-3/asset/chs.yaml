  \n——奇拉格·拉索德\n\n第 1 章\n\n![图片](img/frontdot.jpg)\n\nEJB 架构简介\n\n当我们着手撰写本书时，目标是向开发者介绍企业级\
  \ JavaBeans (EJB)，并着重关注这项技术如何在日常的真实世界应用中使用。*JSR-345：企业级 JavaBeans*^(*TM*)*，3.2 版\
  \ EJB 核心合约与需求* 是一份深度的规范，同时满足了初级开发者和硬核高级用户的需求。这是一个庞大的受众群体，而作为参考指南，EJB 规范文档很好地覆盖了这一点。在撰写一本关于如何*使用*\
  \ EJB 的书籍时，我们必须缩小受众范围；尽管如此，我们相信本书能够满足大多数 Java EE 开发者的需求。\n\n本书的目标读者是那些熟悉 Java、曾使用早期版本的\
  \ EJB 或其他技术构建过单层或多层应用，并准备迎接使用基于标准的技术构建企业级应用的挑战（与回报）的开发者。考虑到总共 1100 页的参考材料 [涵盖 EJB\
  \ 和 Java 持久化 API (JPA) 规范] 可能令人望而生畏，我们为开发者提供了一条入门路径，逐步展开 EJB 的各个部分，并为您提供所需的信息和代码示例，以便您卷起袖子开始工作。\n\
  \n随着每一章的展开，您不仅将学习规范的新领域，还将通过具体示例学习如何将其应用到您自己的应用程序中。许多示例直接来源于在第 7 章和第 12 章中构建的综合性、端到端的\
  \ Java EE 企业级葡萄酒在线应用，以便您了解它们如何融入更大的图景。我们鼓励您采纳这些示例并加以实践。在您喜欢的 IDE 或开发环境中尝试它们，进行修改并尝试新事物。本书涵盖的\
  \ EJB 及相关 API——JPA、Web 服务以及上下文和依赖注入 (CDI)——为您提供了丰富的操作空间。一旦您熟悉了构建、部署和测试的基础知识，您会发现\
  \ EJB 组件不仅功能强大，而且易于构建和使用。\n\n本书的作者们共同使用 EJB 与 Java EE 技术栈中的其他技术构建了许多应用程序，我们试图在其中收录关于我们学到的实用模式、我们发现的成功策略以及您可以避免的一些陷阱的建议。本书的大部分章节致力于探索\
  \ EJB 的特定领域，但我们还包含了关于 Java 持久化 API (JPA)、上下文和依赖注入 (CDI)、Web 服务、评估 EJB 应用程序性能以及部署到您选择的\
  \ Java EE 应用服务器的章节。本章末尾的“入门”部分将帮助您设置环境，以运行本书每章末尾提供的许多有用的示例应用程序。\n\n我们希望本书不仅能作为 EJB\
  \ 信息的参考指南，还能作为操作指南和实用示例库，供您在构建自己的应用程序时参考。祝您阅读愉快！\n\nEJB 简介\n\n在 20 世纪 90 年代末，随着\
  \ Java 因解决大规模应用企业需求的独立技术（如 RMI、JTA 和 CORBA）的出现而得到加强，对一种能够统一这些技术并将其纳入标准组件开发模型的业务组件框架的需求应运而生。EJB\
  \ 应运而生以满足这一需求。在随后的几年里，EJB 不断发展以包含众多特性（同时明智地拒绝了其他特性），并已成熟为一个健壮且标准的框架，用于在分布式、多用户环境中部署和执行业务组件。\n\
  \n什么是 EJB？\n\nEJB 的每个版本都通过 Java 社区流程 (JCP) 作为 Java 规范请求 (JSR) 进行管理。本书涵盖的最新版本由 *JSR\
  \ 345：企业级 JavaBeans*^(*TM*)*3.2* 定义。EJB 3.0 之前的 EJB JSR 涵盖了持久化组件，但自从引入 JPA 以来，持久化现在通过其自身的\
  \ JSR 进行管理。尽管如此，这两个领域相辅相成，我们在本书中包含了几个主要致力于 JPA 的章节。\n\nEJB 3.2 规范，标题为 *JSR 345：企业级\
  \ JavaBeans*^(*TM*)*，3.2 版 EJB 核心合约与需求*，连同 EJB 3.2 API 中定义的类库，共同定义了一个组件模型和一个容器框架。\n\
  \nEJB 组件模型\n\n作为组件模型，EJB 定义了开发者可以按如下方式构建和定制的三种对象类型：\n\n*   *会话 Bean* 可以是有状态的、无状态的或单例的，它们执行业务服务操作。这些服务可以声明式地配置为在分布式、事务性和访问控制的上下文中运行。\n\
  *   *消息驱动 Bean* (MDB) 通过与消息队列或主题关联，响应外部事件而被异步调用。\n\n与此相辅相成的是，Java 持久化 API (JPA)\
  \ 主要定义了以下持久化对象类型：\n\n\n\n*   **实体**是具有唯一标识且代表持久化业务数据的对象。\n\n会话 Bean 和消息驱动 Bean 是\
  \ EJB，它们通常被统称为企业**Bean**。在早期版本的 EJB 中，实体被称为实体 Bean，也属于这一类别。然而，在 EJB 3 中，实体现在由持久化提供者管理，而非\
  \ EJB 容器，因此它们不再被视为企业 Bean。\n\nEJB 容器\n\nEJB 容器提供了 EJB 组件运行所需的支撑环境。该环境提供事务和安全服务、资源池化和缓存、组件生命周期服务、并发支持等功能——本书将逐一探讨这些内容。EJB\
  \ 组件通过使用 EJB 特定的元数据来指定它们希望如何与支撑容器进行交互，这些元数据要么由容器捕获并在运行时应用于 EJB 的行为，要么在 EJB 组件部署到\
  \ EJB 容器时被解释，并用于构建包装。\n\nEJB 开发模型的核心特性\n\n在其整个发展历程中，EJB 始终专注于交付具备若干核心特性的组件。\n\n\
  声明式元数据\n\nEJB 组件模型的一个显著特点是，开发者能够使用 Java 注解和/或 XML 描述符，以**声明式**（而非**编程式**）的方式指定企业\
  \ Bean 和实体的行为。这极大地简化了开发过程，因为无需在 Java 源代码中掺杂服务实现代码，即可为 Bean 添加大量定制功能。为了兼顾开发者偏好和应用程序的灵活性，EJB\
  \ 为开发者提供了注解和 XML 两种选择，并允许在同一 EJB 或实体中同时使用这两种方法来指定元数据中的行为。当同一元数据片段在注解和 XML 中均有定义时，XML\
  \ 声明在解决冲突时具有更高优先级。本章后续的“EJB 3 简化开发模型”部分将进一步探讨此方法的其他优势。\n\n例外配置\n\n与声明式指定行为的能力相辅相成的是\
  \ EJB 中对智能默认值的强力运用。许多行为会自动附加到 EJB 或实体上，而无需显式声明，例如会话 Bean 方法的事务行为，以及映射到实体持久化数据属性的表和列的名称。仅当需要非默认行为时，才需要显式指定注解或\
  \ XML 中的对应项。在利用默认行为的最常见情况下，这种方法能产生非常精简、干净的代码。这种开发模型被称为*例外配置*，因为只有在例外（非默认）情况下，才需要显式配置组件的行为。\n\
  \n可伸缩性\n\n大规模应用程序要求随着客户端负载的增加而具有良好的伸缩能力。EJB 服务器采用资源池化来最大化对象复用，利用持久化缓存来避免重复查询或创建相同对象，并在中间层实现乐观锁定策略，以减轻关系数据库管理系统（RDBMS）的负载并避免并发锁定问题。EJB\
  \ 容器还管理 EJB 的生命周期，允许释放和复用依赖资源以优化性能。\n\n位置透明性\n\nEJB 可以配置为远程访问，从而允许通过网络连接进行访问。客户端（可能是另一个\
  \ EJB）只需请求一个远程 EJB 的实例，本地和远程 EJB 容器就会透明地管理通信细节。\n\n事务性\n\nJava 事务 API（JTA）定义了分布式事务的标准\
  \ API，而 EJB 容器充当 EJB 的 JTA 事务管理器。自诞生以来，EJB 规范就定义了一个标准模型，用于在企业 Bean 上以声明方式指定容器管理的事务行为。\n\
  \n多用户安全性\n\n可以在 EJB 上以声明方式指定方法级别的访问控制，从而强制执行由应用服务器管理员定义的用户和角色级别权限。\n\n可移植性\n\n符合规范的\
  \ EJB 至少理论上可以部署到任何实现了 EJB 的应用服务器上。在实践中（在 EJB 3 之前的版本中尤其如此），供应商提供了自己的元数据定义，企业 Bean\
  \ 开发者逐渐依赖这些定义，从而被锁定在特定供应商的实现中。随着 EJB 的成熟，它已经逐渐吸收了这些以前是平台特定的特性，因此今天实现的 EJB 比过去具有更强的可移植性。\n\
  \n可复用性\n\nEJB 是松耦合的组件。一个 EJB 可以被复用并打包到多个应用程序中，但它必须与它所依赖的 EJB 的业务接口捆绑在一起，或者能够访问这些接口。\n\
  \n持久化\n\n尽管 JPA 实体不再包含在 EJB 规范中，但它们是 EJB 的重要补充。实体是具有唯一标识的持久化领域对象。一个实体类映射到一个数据库表，每个实体实例由该表中的一行数据表示。\n\
  \nEJB 规范的演进\n\n每次引入新版本的 EJB 规范时，它都会包含新的重要特性，以满足普遍需求并采用新兴技术。以下是自 1996 年 EJB 规范诞生以来，或者更确切地说，自\
  \ 1998 年首次商业实现以来，其演进过程的简要总结。\n\nEJB 1.0\n\n初始版本 1.0 开始支持有状态和无状态的服务对象，称为会话 Bean；并可选支持持久化领域对象，称为实体\
  \ Bean。为了实现可移植性，EJB 通过一个特殊的远程接口进行访问，该接口提供了可移植性和远程访问能力，但带来了远程基础设施和按值传递语义的开销。\n\n\
  EJB 1.1\n\n后续版本 1.1 强制要求供应商支持实体 Bean，并引入了 XML 部署描述符来替代将元数据存储在特殊的序列化类文件中。\n\nEJB\
  \ 2.0\n\nEJB 2.0 通过引入本地接口解决了远程接口的开销和按值传递的缺点。只有运行在 J2EE 容器内的客户端才能通过本地接口访问 EJB，但按引用传递的方法调用允许组件之间进行更高效的交互。还引入了一种新型\
  \ EJB——消息驱动 Bean（MDB），它可以参与异步消息系统。实体 Bean 获得了对容器管理关系（CMR）的支持，允许 Bean 开发者以声明方式指定由\
  \ EJB 容器管理的实体 Bean 之间的持久化关系。此外，还引入了 Enterprise JavaBeans 查询语言（EJB QL），使开发者能够使用类似\
  \ SQL 的语言查询实体 Bean 实例。\n\nEJB 2.1\n\nEJB 2.1 增加了对 Web 服务的支持，允许会话 Bean 暴露端点接口，并引入了定时器服务，允许在指定时间或时间间隔调用\
  \ EJB。EJB 2.1 还扩展了 EJB QL 函数，并引入了 XML 模式来替代定义`ejb-jar.xml`部署描述符的 DTD。\n\nEJB 3.0\n\
  \n\n\nEJB 3.0 是该标准演进过程中的一个重要里程碑。它引入了一种新的、简化的开发模型（见下文），EJB 组件变成了 POJO（普通老式 Java 对象）；EJB\
  \ 的 bean 类不再需要实现 EJB 特定的接口，而将 Java 类变为 EJB 的那些属性被提取到 Java 注解中，或者被捕获在外部的 `ejb-jar.xml`\
  \ 部署描述符文件中。只需满足几个基本条件，任何类都可以成为 EJB，并利用 EJB 容器提供的企业级服务。\n\n同样在 EJB 3.0 中新增的是，规范中的实体\
  \ Bean 部分被新的 JPA 规范所取代，并且与新的简化开发模型一致，JPA 实体也是 POJO。JPA 实体也与 EJB 容器解耦，可以独立于 EJB 使用，包括在纯\
  \ Java SE 环境中使用。\n\nEJB 3.1\n\nEJB 3.1 进一步改进了 EJB 3.0 中引入的简化开发模型。本地 EJB 现在支持无接口选项。会话\
  \ Bean 提供了单例模式，以及异步和增强的定时器支持。EJB Lite——EJB 容器功能的一个可嵌入子集——允许 EJB 组件在与 EJB 客户端相同的虚拟机中执行。\n\
  \nEJB 3.2\n\n在 EJB 3.2 中，异步和增强的定时器功能被添加到 EJB Lite 子集中。除了其他改进之外，Bean 开发者可以对生命周期拦截器方法的事务性拥有更多控制权，并且管理本地和远程行为声明的规则也得到了简化。\n\
  \nEJB 3 简化开发模型\n\nEJB 3.0 与早期版本相比有显著不同。EJB 3 的设计者着手重新设计开发体验；引入一个大大简化的开发模型，以减少企业\
  \ Bean 本身的复杂性；同时，吸收了许多同类技术中的思想。共识是：该规范被广泛认为实现了这些目标，并因此克服了许多阻碍早期版本 EJB 被广泛采用的问题。\n\
  \nXML 与注解\n\n如果你熟悉早期版本的 EJB，你在 EJB 3 中首先会注意到的事情之一就是，不再需要在部署描述符中捕获 EJB 元数据。EJB 现在允许你使用\
  \ Java 注解将 EJB 元数据存储在 Bean 源代码中。这并不是说 XML 部署描述符已经消失；它们仍然存在且运行良好，并且许多开发者更喜欢它们而不是注解。使用\
  \ XML 可以将 Java 源代码与 EJB 元数据解耦，允许相同的实体或企业 Bean 类在不同的上下文中使用，其中特定于上下文的信息被捕获在 XML 中，并且不会“污染”\
  \ Bean 类。\n\n然而，许多用户更倾向于在其 POJO 类的上下文中直接查看其 EJB 元数据并使用注解。为了避免陷入一场“宗教战争”（双方都有很多直言不讳的支持者），我们建议你自己选择。我们遵循的一个简单规则是：如果我们需要将实体和\
  \ Bean 类与其 EJB 元数据解耦，例如当我们希望使用相同的实体类配合两种不同的实体继承策略时，我们会将元数据放在 XML 中。否则，我们坚持使用注解。别忘了——你总是可以混合搭配，依靠一个坚定的策略：每当使用\
  \ XML 和注解都为某个元素指定了元数据时，XML 总是胜出。这允许 Bean 开发者下游的任何角色（参见本章后面的“EJB 角色”部分）覆盖元数据设置，而无需更新\
  \ Java 源代码，因为覆盖可以专门应用于 XML 描述符。\n\n![image](img/sq.jpg) **注意**   我们还推荐一个更高级的策略：仅在定义企业\
  \ Bean 或实体的行为（该行为真正是其定义不可或缺的一部分）时使用注解，例如实体关系字段的关系类型，或会话 Bean 上方法的事务性需求。任何可以合理地被覆盖的内容，例如实体映射到的表名，或用于填充实体主键的值生成器的详细信息，都应该放在\
  \ XML 描述符中，这样应用程序组装者（或许与数据库管理员协商后）可以在部署时指定它们。虽然在 Java 源文件中使用注解指定默认值并无害处，但这种方法区分了不应修改的固定元数据和可以自由修改而不改变企业\
  \ Bean 或实体行为的松散元数据。\n\n依赖注入\n\n在 Java EE 容器中实例化 EJB 之后，但在将其交给客户端之前，容器可以根据为该企业 Bean\
  \ 定义的规则初始化实例上的属性数据。这个特性被称为*依赖注入*，它是控制反转模式的一个例子，即由外部提供者而不是类本身来初始化对象实例的属性。EJB 3 在\
  \ Java EE 中引入了依赖注入的使用，并且很大程度上因为它非常流行，这个特性现在有了自己的规范。当前的依赖注入 API 通过 *JSR-330：Java\
  \ 依赖注入*^(*TM*) 进行管理，其功能通过 *JSR 346：Java*^(*TM*)*EE 1.1 的上下文与依赖注入* 进一步扩展，我们将在第 10\
  \ 章“上下文与依赖注入”中介绍。\n\n![image](img/sq.jpg) **注意**   注入使用“推”模型将数据推送到 Bean，并且无论 Bean\
  \ 是否实际使用该数据都会发生。如果存在数据不会被使用的可能性，Bean 可以选择避免承担资源派生的成本，而是通过执行 Java 命名和目录接口（JNDI）查找，仅在数据实际（或可能）被使用时才“拉取”数据。\n\
  \nEJB 中依赖注入使用的常见示例如下：\n\n*   将 `EntityManager` 注入到会话 Bean 中，以便与持久化单元中的实体进行交互\n*\
  \   将 `UserTransaction` 注入到管理其事务边界的会话 Bean 中\n\n拦截器：回调方法\n\n企业 Bean 和实体都可以指定它们的一些方法，或单独类上的方法，在发生某些生命周期事件时被调用。例如，会话\
  \ Bean 可以指示在 Bean 被实例化之后、但在被交给客户端之前，应该调用某个方法。此方法可以初始化 Bean 上的状态信息，或使用 JNDI 查找资源，或执行它希望的任何其他操作，前提是它不需要事务上下文。这种回调方法被称为*拦截器*，它们允许\
  \ Bean 开发者以编程方式参与企业 Bean 或实体与其容器之间的交互。这种模式（也称为*横切关注点*）的一个重要优势是，单个拦截器可以定义一次，然后应用于多个方法，甚至多个\
  \ EJB。\n\nPOJO 实现\n\n\n\nEJB 3 在消除早期 EJB 版本中困扰企业 Bean 类及其必需接口的繁琐机制方面取得了长足进步。与开发者抱怨即使定义最基本的\
  \ Bean 行为也必须编写 XML 元数据类似，他们发现必须编写自定义接口来处理企业 Bean 的工厂支持非常繁琐，并且要求会话 Bean 的接口继承 EJB\
  \ 特定接口也很不方便。所有这些限制都在 EJB 3 中得到了解决。\n\nHome 方法不再是强制性的，尽管它们仍然受支持。对于会话 Bean 和 MDB，默认构造函数取代了早期\
  \ EJB 规范要求的无参 `ejbCreate()` 方法。\n\n对于实体，`Home` 接口被 `EntityManagerFactory` 实例取代，该实例为\
  \ JPA 持久化单元生成 `EntityManager` 实例，以管理实体生命周期操作，包括查询执行。\n\n**智能使用默认值**\n\nEJB 3 如何简化开发过程的一个绝佳示例是其利用默认行为，无需任何编码或声明性元数据即可提供丰富的功能。例如，只需使用\
  \ `@Entity` 注解标记一个 POJO，其所有公共属性就会自动成为持久化字段，并且表和列名称会采用与实体和字段名称匹配的派生值。仅在需要覆盖特定区域的默认行为时，才需要额外的注解或\
  \ XML 元素。仅当表名称与实体名称不匹配时，才需要 `@Table` 注解。我们已非常谨慎地确保默认值与最常见的用法相匹配，这样在大多数用例中，就不需要显式元数据，从而产生更精简、更整洁的代码。\n\
  \n![image](img/sq.jpg) **注意** 依赖默认行为的一个后果是，类不会在任何地方描述其完整行为，因此您需要充分了解正在应用的默认行为。IDE\
  \ 在推导和显示企业 Bean 或实体及其显式显示的完全默认值方面可能很有用。\n\n**分布式计算模型**\n\n任何企业应用程序的核心都是能够在单独的 Java\
  \ 线程或进程中执行任务和运行组件。通过基于 RMI 的远程服务，应用程序客户端层中的客户端可以访问网络上任何位置的应用服务器中运行的 EJB。远程接口方法的传值行为提供了一种粗粒度模型，旨在减少松散连接的客户端和服务器之间的网络流量。然而，许多使用\
  \ EJB 的应用程序不需要远程访问，并选择将其 EJB 配置为本地使用。这消除了远程访问支持的开销，同时继续提供其余的企业服务。\n\n**EJB 角色**\n\
  \nEJB 规范为参与定义企业 Bean 或实体不同阶段，或为企业 Bean 提供服务和 API 实现的个人定义了七个角色。本书针对的是参与定义企业 Bean\
  \ 及其相关元数据的三个角色。在实践中，这些角色中的一个或多个可能由同一个人执行，某些任务可能由一个角色执行并由另一个角色覆盖；但理解 EJB 开发过程中任务的逻辑划分是有用的。我们将在本书的各个章节中引用这些角色。\n\
  \n**企业 Bean 提供者**\n\n企业 Bean 提供者，也称为 Bean 提供者，负责定义和实现企业 Bean 的业务逻辑和结构。这包括定义 Java\
  \ 类、实现服务方法、在 Bean 及其方法上声明性地指定事务和安全性信息、注入或查找所需资源，以及任何其他可应用于企业 Bean 类的内容。\n\n应用于 JPA\
  \ 实体时，Bean 提供者定义实体的持久化结构及其与其他实体的关系。提供者可以定义映射和主键生成行为，但此角色通常仅限于定义实体的逻辑依赖关系和结构。\n\n\
  **应用程序组装者**\n\n应用程序组装者将 EJB 组合成 EJB 模块，将实体组合成持久化归档，然后将这些模块与其他 Java EE 模块组合在一起以生成应用程序。此任务需要解析对逻辑服务器资源的引用，包括\
  \ EJB 之间的引用。应用程序组装者必须使用为 EJB 和实体组件定义的接口和元数据，但无需熟悉实现细节。\n\n**部署者**\n\n部署者获取由应用程序组装者组装好的应用程序，并将其部署到特定的应用服务器实例或集群。部署者必须解析\
  \ EJB 组件定义的所有外部依赖关系，将它们映射到安装在应用服务器环境中的具体资源。对于实体，部署者可以提供或覆盖实体将映射到的实际数据库对象的详细信息。\n\
  \n**本书的组织方式**\n\n为了让您了解本书其余部分的结构，以下是每章的简要总结。您无需按顺序阅读这些章节。每章都附有示例程序，它们可以独立运行。不过，主题是逐步介绍的，因此，如果您在某章中引用了该章未定义的术语或概念，那么它很可能是在本书的前面章节中定义的。\n\
  \n第 1 章：EJB 3 架构简介\n\n本章首先介绍本书并提供 EJB 的概述。该概述涵盖 EJB 开发框架和组件模型、EJB 的核心特性、EJB 的历史、EJB\
  \ 3 简化开发模型以及 EJB 分布式计算模型。本章最后有一个“入门”部分，帮助您安装运行本书提供的许多示例应用程序所需的 NetBeans IDE 和 GlassFish\
  \ Java EE 参考实现服务器。\n\n第 2 章：EJB 会话 Bean\n\n第 2 章 探讨了 EJB 的主要服务对象：会话 Bean。会话 Bean\
  \ 在其多种角色中被审视：作为实体外观、作为服务组件（无论是否包含状态）、作为单例或定时器驱动对象，以及作为事务和安全性服务的主要协调者。\n\n第 3 章：实体与\
  \ Java 持久化 API\n\n本章介绍了 Java 持久化 API (JPA)，以及可用于在 Java EE 容器内部和外部支持实体的各种持久化服务。本章涵盖了基本的\
  \ O/R 映射，并介绍了 Java 持久化查询语言 (JPQL)。\n\n第 4 章：高级持久化特性\n\n本章深入探讨更高级的持久化概念，描述了 JPA 中为映射实体继承层次结构提供的支持。三种受支持的继承映射策略的示例指出了每种方法的优缺点，以帮助您决定哪种方法最适合您应用程序的特定需求。在其他主题中，本章还涵盖了复杂主键\
  \ (PK) 映射、用于使用数据库序列或表自动填充主键值的 ID 生成器、锁定策略和缓存管理。\n\n第 5 章：EJB 消息驱动 Bean\n\n\n\n本章介绍如何使用消息驱动\
  \ Bean（MDB）为应用程序添加异步、事件驱动的行为。本章将通过代码示例解释和演示 Java 的消息传递 API——JMS。\n\n第 6 章：EJB 与\
  \ Web 服务\n\n会话 Bean 为 Web 服务提供了出色的实现方案，本章将探讨 EJB 如何支持这两种技术的完美结合。\n\n第 7 章：集成会话 Bean、实体、消息驱动\
  \ Bean 与 Web 服务\n\n在分别介绍完所有不同的组件模型类型后，第 7 章将它们整合到一个集成的 Java EE 应用程序中。我们认为，了解所有组件如何协同工作以构建一个可运行的应用程序，对您来说会特别有用。\n\
  \n第 8 章：EJB 中的事务支持\n\nEJB 提供了丰富的事务服务支持，使得 Bean 提供者能够轻松地以声明方式为企业 Bean 指定由容器提供的自定义事务行为。同时，EJB\
  \ 也允许企业 Bean 选择退出此模型，自行控制事务划分行为。本章将两种不同的事务模型应用于同一个逻辑场景，以权衡每种方法的优劣。\n\n第 9 章：EJB\
  \ 性能与测试\n\n本章提供了宝贵的视角，介绍如何评估 EJB 组件的性能，以帮助您决定在 EJB 提供的众多选项中，哪一个最适合您的应用程序。除了解释如何设置性能测试外，我们还展示了一些我们运行过的性能测试案例，并附上了我们对结果的评估。\n\
  \n第 10 章：上下文与依赖注入\n\n上下文与依赖注入（CDI）服务在 Java EE 6 中引入，它通过一种强大的方式增强了 EJB 中定义的组件模型，即向应用程序注入生命周期由服务器上下文管理且方便管理的资源。本章介绍\
  \ CDI，并解释 EJB 开发者如何利用这种支持来丰富应用程序的行为。\n\n第 11 章：EJB 打包与部署\n\n本章涵盖了组装和部署，我们将讨论应用程序组装者和部署者角色所需完成的任务。本章讨论如何打包\
  \ EJB 和持久化模块，如何以不同方式将模块组装到企业归档（EAR）文件中，如何解析模块之间以及打包在不同模块中的 EJB 之间的引用，以及如何将资源需求绑定到目标应用服务器环境中已安装的具体资源。\n\
  \n第 12 章：EJB 客户端应用程序\n\n在本章中，我们将引导您了解可用于构建应用程序的应用程序架构和不同的编程模型，包括每种方法的优缺点。完成这些介绍后，我们将确定一种应用程序架构——使用\
  \ JavaServer Faces（JSF）技术开发 Web 应用程序。然后，我们将深入探讨 JSF 的架构和概念，并重点介绍如何将 JSF 用户界面组件和\
  \ JSF 导航模型与我们之前在第 7 章中开发的 EJB/WebService/JPA 后端应用程序集成。\n\n最后，我们还将解释如何使用轻量级应用程序客户端容器在纯\
  \ Java SE 环境中执行您的会话 Bean。这个轻量级容器为其环境中执行的 EJB 提供了真正的 EJB 容器所提供的一些服务（例如容器注入）。\n\n\
  第 13 章：在可嵌入 EJB 容器中进行测试\n\n在生产部署中，EJB 组件在 Java EE 环境中的应用服务器内运行。出于测试目的，EJB 允许您在 EJB\
  \ 容器的一个轻量级子集中测试您的 EJB 组件，该子集称为 EJB Lite，并作为可嵌入的 EJB 容器实现，可以在纯 Java SE 环境中运行。本章涵盖了多种\
  \ EJB 测试场景，并指导您使用 JUnit 在 GlassFish 的可嵌入 EJB 容器中测试 EJB 组件（和 JPA 实体）。\n\n开始入门\n\n\
  本章的这一部分将帮助您准备好运行本书其余部分示例所需的软件安装和配置。在撰写本书时，EJB 3.2 规范即将最终定稿。GlassFish 应用服务器已经实现了该规范，使开发者社区能够亲身体验新规范。\n\
  \nGlassFish 是一个实现了 Java EE 平台最新特性的开源应用服务器。事实上，GlassFish 是 Java EE 平台所有规范（包括 EJB\
  \ 3.2 规范）的参考实现。NetBeans IDE 紧密跟踪 GlassFish 的发布，确保 NetBeans 支持 Java EE 规范的最新状态，并使\
  \ NetBeans 成为部署和运行本书示例的理想平台。您会发现，后续的每一章都附带一个 NetBeans 应用程序项目，该项目由一个或多个额外的项目组成，这些项目代表演示该章所涵盖功能的\
  \ EJB、Web 或其他模块。尽管这些示例应用程序都配置为在 GlassFish 服务器中运行，但它们是可移植的（由于遵循 Java EE 标准），并且可以部署到您选择的任何\
  \ Java EE 7 服务器。\n\n虽然我们是在 Windows 7 环境下使用 NetBeans 构建和测试本书中的示例，但代码示例并不特定于操作系统，它们可以在任何能够运行\
  \ NetBeans 及其集成的 GlassFish 服务器的系统上执行。尽管如此，您可能需要在其他操作系统上调整环境设置，才能安装和运行 NetBeans 及其集成的\
  \ GlassFish 服务器。\n\n![image](img/sq.jpg) **注意** 您可以在以下网站找到有关 NetBeans IDE 及其集成的\
