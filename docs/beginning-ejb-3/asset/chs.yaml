  \ `FacesContext` 获取应用并设置属性值的技术，而不是像之前用例那样检索值。`invokeAddToCart()` 方法在成功执行后返回 `addtocart`，我们将把它用作导航规则。\n\
  \n\n\n***列表 12-15.***  包含 invokeAddToCart 方法的 WineList.java\n\n```\nprivate HtmlDataTable\
