  \ 方法... */\n}\n\n事务分析\n\n以下部分将从事务角度分析这第二个示例。我们赋予了会话 Bean 状态（即 `Stateful`），使其能够控制其事务的划分，并允许其关联的持久化上下文从一个事务存活到下一个事务。\n\
  \n会话 Bean 声明\n\n这些特性是通过注解和代码的结合实现的。你会注意到这个会话 Bean 被注解为：\n\n```\n@Stateful(name =\
  \ \"OrderProcessorBMT\", mappedName = \"Chapter08-TransactionSamples-OrderProcessorBMT\"\
  )\n@TransactionManagement(TransactionManagementType.BEAN)\n@Interceptors(OrderProcessorBMTBeanTxnInterceptor.class)\n\
  public class OrderProcessorBMTBean {\n  @Resource\n  SessionContext sessionContext;\n\
    @PersistenceContext(unitName = \"Chapter08-TransactionSamples-JTA\", type = PersistenceContextType.EXTENDED)\n\
    private EntityManager em;\n  ...\n}\n```\n\n它注入了 `SessionContext` 和 `EntityManager`。作为有状态\
  \ Bean，它允许企业 Bean 在一次客户端调用到下一次调用之间保留状态。在这种情况下，该状态就是持久化上下文和关联的事务，它们必须跨越多个方法调用而存活。BMT\
  \ 声明意味着容器不应自动介入方法边界来划分事务。尝试向 BMT 会话 Bean 的方法添加 `TransactionAttribute` 限定符将在部署时被捕获并引发异常。\n\
  \n`@PersistenceContext` 注解持有一个值为 `PersistenceContextType.EXTENDED` 的 `type` 属性，这意味着它会从一个事务持续到下一个事务，并允许关联的实体即使在创建它们的事务结束后仍保持受管状态。通过\
  \ `sessionContext` 属性可用的 `UserTransaction` 对象是该 BMT Bean 与 EJB 容器的 JTA 事务管理器交互的接口，并暴露了\
  \ `begin()`、`commit()` 和 `rollback()` 这些事务划分方法。\n\n移除之前的测试数据\n\n我们本可以通过会话 Bean 方法调用来填充测试环境，就像我们在前面的\
  \ CMT 示例中所做的那样。然而，使用 BMT 为我们提供了在客户端交互式地执行此工作的选项。这是因为 `OrderProcessorBMT` Bean 的持久化上下文是\
  \ `EXTENDED` 的，允许实体即使在控制权从企业 Bean 返回到客户端后，仍与持久化上下文保持关联。\n\n```\n//  通过移除所有电子邮件为\
  \ 'wineapp@yahoo.com'（或 user.properties 文件中定义的任何地址）的现有 Customer 来过滤数据。\n//  对 OrderProcessorBMT\
  \ 上事务方法的首次调用将启动一个事务。\nfor (Customer customer :\n  orderProcessorBMT.getCustomerFindByEmail(PopulateDemoData.TO_EMAIL_ADDRESS))\
  \ {\n  orderProcessorBMT.removeEntity(customer);\n  n++;\n}\nstrBuf.append(n + \"\
  \ 个 Customer 和 \");\n\n//  移除所有国家为 'United States' 的现有 Wine\nn = 0;\nfor (Wine wine\
  \ : orderProcessorBMT.getWineFindByCountry(\"United States\")) {\n  orderProcessorBMT.removeEntity(wine);\n\
    n++;\n}\nstrBuf.append(n + \" 个 Wine\");\nout.print(strBuf.toString() + \"</h2>\"\
  );\n\n//  应用这些更改，提交实体移除操作\norderProcessorBMT.commitTransaction();\n```\n\n每次对 `removeEntity()`\
  \ 的调用都在通过其拦截器在 `OrderProcessorBMT` Bean 上启动的事务中执行，并将实体置于其持久化上下文中的“已移除”状态。在这些步骤结束时，客户端调用\
  \ `commitTransaction()` 来实际执行数据库中的 DBMS `DELETE` 操作并提交事务。\n\n在客户端创建新的 Customer 和\
  \ CartItem 实体实例\n\n与前面的无状态会话示例一样，实例化 `Customer` 及其 `CartItem` 实体实例并将它们连接在一起的步骤不涉及任何事务，并且可以完全在客户端内执行：\n\
  \n\n\n```\n//  创建一个客户，并添加一些购物车项及其关联的葡萄酒\nIndividual customer = new Individual();\n\
  customer.setFirstName(\"Transaction\");\ncustomer.setLastName(\"Head\");\ncustomer.setEmail(PopulateDemoData.TO_EMAIL_ADDRESS);\n\
  for (int i = 0; i < 5; i++) {\n  final Wine wine = new Wine();\n  wine.setCountry(\"\
  United States\");\n  wine.setDescription(\"Delicious wine\");\n  wine.setName(\"\
  Xacti\");\n  wine.setRegion(\"Dry Creek Valley\");\n  wine.setRetailPrice(new Float(20.00D\
  \ + i));\n  wine.setVarietal(\"Zinfandel\");\n  wine.setYear(2000 + i);\n  orderProcessorBMT.persistEntity(wine);\n\
  \nfinal CartItem cartItem = new CartItem();\n  cartItem.setCreatedDate(new Timestamp(System.currentTimeMillis()));\n\
  \  cartItem.setCustomer(customer);\n  cartItem.setQuantity(12);\n  cartItem.setWine(wine);\n\
  \ncustomer.addCartItem(cartItem);\n}\n```\n\n值得注意的是，在 JPA 出现之前，这项工作需要付出更多的努力和资源。使用\
  \ EJB 2.x 实体 Bean 时，客户端开发者主要有两种选择。一种方法是，开发者可以创建数据传输对象（DTO），或遵循其他类似模式，通过代理来模拟创建和关联实体对象的任务。然后，这个\
  \ DTO 类网络会被传入会话 Bean 层，就像我们之前做的那样；但在会话 Bean 内部，必须从 DTO 对象显式地创建和初始化实际的实体 Bean。\n\n\
  第二种方法，即直接从客户端更新实体 Bean，编码更简单，但可能会牺牲更高的性能。如果客户端位于 Java EE 层之外，每次方法调用都会产生 RMI/IIOP（基于互联网内部\
  \ ORB 协议的远程方法调用）编组的开销，以便与驻留在 EJB 容器中的实际 EJB 对象进行通信。当客户端位于 Java EE 层内时，这种开销大部分会被消除，因为它可以使用本地实体\
  \ Bean 接口直接与活动的实体 Bean 通信；但 Java SE 客户端被迫对实体 Bean 使用远程接口。除此之外，容器管理关系（CMR）仅在本地组件接口上受支持；因此，在\
  \ EJB 2.x 世界中，Java SE 客户端甚至无法进行直接的实体 Bean 关系查找和更新。\n\n**持久化客户**\n\n尽管在本示例中，我们选择将事务的\
  \ `begin()` 操作嵌入到拦截 BMT 会话 Bean 方法的拦截器类中，但我们也可以向客户端暴露一个 `beginTransaction()` 调用。由于我们选择了当前的方法，所需做的只是调用\
  \ `persistEntity()`，该方法现在会隐式地开始事务（但不会提交它）：\n\n```\n//  持久化客户，依赖级联设置来同时持久化所有相关的 CartItem\
  \ 实体。\n//  重新赋值 customer，以获取 EJB 容器在持久化时分配的 ID 值。\norderProcessorBMT.persistEntity(customer);\n\
  ```\n\n事务上下文不会扩展到客户端线程本身；它只存在于会话 Bean 的线程中。在拦截器内部发生的 `UserTransaction.begin()` 调用会在该线程上建立一个事务上下文，当会话\
  \ Bean 的 `persistEntity()` 方法被调用时，该上下文可供其使用。\n\n**创建客户订单**\n\n我们的事务现在已生效，将继续执行创建客户订单的步骤。这个阶段与无状态\
  \ CMT 示例类似，不同之处在于事务已经创建，并且必须在结束时显式提交。\n\n```\n//  创建一个客户订单，并从购物车项创建订单项\nfinal CustomerOrder\
  \ customerOrder =\n        orderProcessorBMT.createCustomerOrder(customer);\n\n\
  out.print(\"<h2>正在检索客户订单项... \");\nfor (OrderItem orderItem : customerOrder.getOrderItemList())\
  \ {\n  final Wine wine = orderItem.getWine();\n  out.println(wine.getName() + \"\
  \ 的 ID 为 \" + wine.getId());\n}\nout.println(\"完成</h2>\");\n\n//  提交订单，应用到目前为止所做的所有更改\n\
  orderProcessorBMT.commitTransaction();\n```\n\n如果客户端希望在此阶段取消订单，例如通过客户端面板中暴露的交互式确认/取消按钮，BMT\
  \ 选项即使在 `CustomerOrder` 创建后也提供了这种可能性。\n\n**这种方法的优势**\n\n使用显式事务划分的好处在于它提供了额外的灵活性。EJB\
  \ 服务器仍然扮演着事务管理器的角色，只是它将事务划分控制权暴露给企业 Bean，而不是基于每个方法上的 `@TransactionAttribute` 设置来自动化这种划分。虽然无状态示例可以在创建\
  \ `CustomerOrder` *之前*提示用户，但这种方法允许先创建并验证 `CustomerOrder`——例如，在提交给用户确认之前。然而，由于下一节中提到的原因，必须谨慎使用\
  \ BMT。\n\n**这种方法的局限性**\n\n可以说，额外的灵活性通常被跟踪事务状态和避免会话 Bean 客户端误用的额外负担所抵消。将开始和结束事务的过程交由客户端调用会话\
  \ Bean 方法的顺序来决定，可能会产生悬空事务。客户端需要与 Bean 本身协调，负责干净地结束（无论是提交还是回滚）每个已开始的事务。如果你能控制客户端如何使用\
  \ Bean，这可能是一个合理的风险——但会话 Bean 是公开发布的，很难预测谁会使用它们以及如何使用。\n\n可以编写 BMT 会话 Bean 来防止误用，但这种防护代码很可能最终使\
  \ Bean 的行为与 CMT Bean 类似，在这种情况下，你的努力几乎没有什么收获。\n\n**构建、部署和测试：来自 Wines Online 应用的一个事务场景**\n\
  \n现在我们已经研究了 EJB 提供的事务支持的许多细节，让我们执行刚刚介绍过的测试用例。\n\n对于 CMT 和 BMT 场景，我们都调用一个 Servlet\
  \ 客户端，该客户端创建一个新客户，构建一个由购物车项组成的购物车，然后根据购物车中的购物车项创建一个包含订单项的客户订单。我们选择这些示例作为本章的内容，是因为它们涉及多个操作，可以根据客户端的需求将这些操作划分为粒度或大或小的事务工作单元。\n\
  \n为了说明 EJB 提供的默认支持，我们使用首先探讨的示例：一个使用默认 CMT 划分的标准无状态会话 Bean 实现。在第二个示例中，我们演示客户端承担部分事务管理责任，使用一个采用\
  \ BMT 划分和扩展持久化上下文的有状态会话 Bean。\n\n**前提条件**\n\n在执行后续章节详述的任何步骤之前，请先完成第 1 章的“入门”部分。该部分将引导你完成本章示例所需的安装和环境设置。\n\
  \n**打开示例应用**\n\n本章的根项目依赖于 `Chapter07-ServiceIntegration-jpa` 中定义的 JPA 持久化单元。启动 NetBeans\
  \ IDE，并使用 `File Open Project` 菜单打开 `Chapter08-TransactionSamples` 项目。确保选中“`Open\
  \ Required Projects`”复选框。\n\n![9781430246923_Fig08-01.jpg](img/9781430246923_Fig08-01.jpg)\n\
