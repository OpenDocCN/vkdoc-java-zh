  \ Bean 中方法或属性的表达式。或者，`action`属性也可以是`faces-config.xml`中定义的导航规则的名称。我们将使用方法绑定表达式`#{WineList.findAllWines}`作为“葡萄酒完整列表”选项的`action`属性值，而对于其余两个选项，我们将使用导航规则的名称。\n\
  \n***清单 12-7.***  winehome.jsp\n\n```\n<!DOCTYPE HTML PUBLIC \"-//W3C//DTD HTML\
