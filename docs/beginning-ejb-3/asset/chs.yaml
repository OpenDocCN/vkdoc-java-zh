  *   注释掉 `getWine` 方法上的 `@Produces` 注解，并执行 Servlet 客户端。\n\n总结\n\n在本章中，我们介绍了上下文和依赖注入（CDI）。我们探讨了\
  \ CDI 在 Java EE 框架中所处的位置，以及它通过粘合 Web 层和业务层所提供的优势。我们解释了 CDI 框架的两个主要组件，即上下文和依赖注入。我们还研究了参与\
  \ CDI 生命周期的有状态组件的上下文生命周期，并讨论了不同类型的作用域。通过示例，我们还探讨了依赖注入的不同方式，以及如何在编译时、部署时或运行时解决歧义依赖问题。我们讨论了\
  \ CDI 与 EJB 之间的关系，特别是与会话 Bean 的关系。最后，我们使用 GlassFish 应用服务器部署并执行了示例 CDI 客户端程序，并通过实验示例代码来观察代码更改如何影响输出。\n\
  \n第 11 章\n\n![image](img/frontdot.jpg)\n\nEJB 打包与部署\n\n到目前为止，我们一直专注于如何构建 EJB、Java\
  \ 持久化 API（JPA）实体及其客户端，以利用 EJB 容器提供的周边企业服务。用 Java EE 的术语来说，这些任务属于应用程序组件提供者（通常简称为提供者）的职责。在本章中，我们将探讨围绕以下过程的相关主题：将你的组件打包成模块和库组件，将\
  \ Java EE 组件中声明的外部引用绑定到服务器环境中的实际资源，并将所有这些发送到应用服务器，以便组件可以在运行时由应用程序执行。这些职责由 Java EE\
  \ 角色中的应用程序组装者（组装者）和应用程序部署者（部署者）处理。虽然在实践中，通常由一个人执行一个或多个这些角色，或者由多人执行任何一个角色，但为了解释这些主题，我们将把部署任务划分为与这些指定角色相对应的阶段。\n\
  \n我们将重点介绍 EJB 和 JPA 实体组件，并会涉及其他 Java EE 模块类型的部署：Web 应用程序模块、应用程序客户端和资源适配器。我们还将探讨\
  \ Java EE 服务器与其支持的四个 Java EE 容器之间的关系，并探索 Java EE 服务器提供的一些服务。\n\n在简要概述部署任务（其中我们介绍许多部署术语）之后，我们将介绍支持部署的\
  \ Java EE 基础设施组件——Java EE 服务器和容器。我们将探讨不同类型的 Java EE 模块，它们如何组合在一起，以及如何指定定义每个模块的部署描述符（元数据文件）。接下来是一个关于库组件的章节，其中解释了如何声明\
  \ Java EE 模块和库组件之间的类路径依赖关系。然后，我们将更详细地检查组装者和部署者的角色，最后以 EJB 模块和 JPA 持久化单元特有的部署要求作为本章的结尾。\n\
  \n阅读本章后，你应该了解如何执行以下操作：\n\n\n*   将您的 EJB、JPA 及其他应用组件分组到 Java EE 模块和库组件中。\n*   解决外部引用中发现的命名冲突和冗余。\n\
  *   打包一个由一个或多个 Java EE 模块和库组件组成的 Java EE 应用程序。\n*   声明模块与库之间的类路径依赖关系。\n*   将外部引用绑定到应用服务器环境中的物理资源。\n\
  \n关于部署工具的说明\n\n本章提供了一些关于如何构建应用程序归档文件的示例。它假设您可以使用通常通过集成开发环境（IDE）提供的软件工具，来协助您组装和部署\
  \ Java EE 应用程序。Java 社区过程（JCP）一直在努力实现该领域的标准化（参见 JSR 88，Java EE 应用程序部署 API），但部署不可避免地需要特定于应用服务器的配置任务。幸运的是，应用服务器通常提供\
  \ Ant 任务来调用它们自己的部署工具，您也可以使用 Ant 来创建可部署的归档文件。Ant 在许多开发环境中被广泛使用，并且在需要自动化脚本将相同的 Java\
  \ EE 应用程序部署到多个 Java EE 服务器实例的生产环境中几乎无处不在。本章描述的许多自定义步骤需要使用交互式编辑器，主要用于更新 Java EE 通用和特定于平台的\
  \ XML 部署描述符。对于这些任务，IDE 的价值无可估量，许多 IDE 提供特定于平台的部署支持，指导您打包、配置和部署 Java EE 应用程序。\n\n\
  打包和部署流程概述\n\n*打包*是将各种 Java EE 模块组装（或分组）到 Java EE JAR、WAR 或 EAR 文件中的过程。一旦打包到 Java\
  \ 归档（JAR）文件、Web 归档（WAR）文件或企业归档（EAR）文件中，Java EE 应用程序就可以交付给应用服务器了。*部署*是将 Java EE 组件安装到应用服务器中的过程，以便在运行应用程序时可以找到并执行它们。此过程涉及多个必须大致按顺序执行的任务。这些任务将在以下各节中总结，并且在本章后面部分将对每个任务进行更详细的描述，并专门应用于\
  \ EJB 和 JPA 部署。某些步骤仅在特殊情况下才需要执行，因此实际部署可能只涉及这些任务的一个子集。\n\n提供者\n\n一般来说，提供者（对于一个给定的项目可能有多个）作为部署的前置步骤，生成\
  \ Java EE 应用程序组件。与提供者相关的任务，以及此角色交付的文件，如图 11-1 所示。\n\n![9781430246923_Fig11-01.jpg](img/9781430246923_Fig11-01.jpg)\n\
  \n图 11-1.  应用程序组件提供者的任务和交付物\n\n提供者的交付物是应用程序组件以及可能的模块描述符，它们可以作为磁盘上的文件提供，也可以打包到 Java\
  \ 归档（JAR）文件中。\n\n组装者\n\n组装者接收提供者的输出，并据此执行任务并生成如图 11-2 所示的交付物。\n\n![9781430246923_Fig11-02.jpg](img/9781430246923_Fig11-02.jpg)\n\
  \n图 11-2.  应用程序组装者的部署任务和交付物\n\n按容器类型分组组件以生成 Java EE 模块\n\n提供者的输出是一组 Java EE 组件，例如\
  \ EJB、JPA 实体、JSF（JavaServer Faces）页面、应用程序客户端类，以及可能的其他组件。提供者也可能生成非 Java EE 组件，比如普通的\
  \ Java 类。组装者将 Java EE 组件分组，使得每个组只包含一种 Java EE 组件类型的组件。每当提供者定义了模块级部署描述符（XML）文件时，组装者可以遵循该文件中的任何指令来组成这些组，或者组装者可以选择合并或拆分描述符，以增加或减少每个组中的\
  \ Java EE 组件数量。在此过程结束时，每个生成的组将成为一个 Java EE 模块。剩余的非 Java EE 类和资源可以捆绑到 Java EE 模块中，或者隔离到它们自己的组中，成为可共享的库组件。\n\
  \n定义模块级部署描述符（可选）\n\n对于形成的每个 Java EE 模块，组装者可以定位并分配一个部署描述符来表示该模块。从 Java EE 5 开始，此步骤是可选的，因为现在可以通过分析文件内容来识别模块类型。例如，您（作为提供者或组装者）可以自由定义一个\
  \ `ejb-jar.xml` 部署描述符；但除非您要覆盖 Java 注解中捕获的信息，或者您选择不使用注解，否则不再需要它。在 Java EE 5 中，一个\
  \ EJB 模块仅通过文件组中存在一个带有 `@Stateless`、`@Stateful` 或 `@MessageDriven` 注解的类来定义。\n\n将组件（以及可选的描述符）打包到\
  \ JAR 文件中\n\n在此阶段，第一阶段识别出的组件组将与其模块级部署描述符（如果已定义）一起，使用 JAR 格式打包到文件中。EJB 模块归档到扩展名为\
  \ `.jar` 的 EJB JAR 文件中，Web 应用程序模块归档到扩展名为 `.war` 的 Web 归档（WAR）文件中，应用程序客户端归档到扩展名为\
  \ `.jar` 的 JAR 文件中，依此类推。JPA 持久化单元可以归档到它们自己的 JAR 文件（扩展名为 `.jar`）中，或者直接归档到 EJB JAR\
  \ 或 WAR 文件中。我们将在本章后面的“组装持久化单元”一节中详细介绍这一点。\n\n此外，非 Java EE 组件（例如普通的 Java 类）可以添加到这些\
  \ Java EE 模块归档文件中；或者组装者可以将它们归档到自己的 JAR 文件中，作为库组件进行部署。\n\n创建企业归档（EAR）文件（可选）\n\n如果您（作为组装者）创建了多个希望作为一个逻辑组一起部署的归档文件，则需要将这些归档文件捆绑到一个称为\
  \ *EAR 文件* 的包装 JAR 文件中，该文件使用后缀 `.ear`。此 EAR 文件被称为 Java EE 应用程序。如果您只创建了一个单独的 EJB\
  \ JAR 或 WAR 归档文件，则无需进一步打包。您可以跳过创建包装 EAR 文件的步骤，并将 EJB JAR 或 WAR 文件作为独立模块进行部署。\n\n\
  应用程序充当一个打包边界，确保所有模块中的 Java EE 组件能够在单个命名上下文中相互通信。一个 Java EE 应用程序不一定对应于一个实际的最终用户应用程序，因为它可能被许多不同的客户端应用程序使用，但它允许客户端应用程序连接到该\
  \ Java EE 应用程序一次，并从单个上下文访问该应用程序中的 Java EE 组件。\n\n\n\n一个 EAR 文件可能在其 `META-INF` 目录中包含一个应用级部署描述符\
  \ `application.xml`。在 Java EE 5 中，此文件是可选的，因为现在可以依赖默认规则为每个模块提供默认名称和属性。默认情况下，每个模块的名称默认为其归档文件的短名称，减去文件后缀（`.jar`、`.war`\
  \ 等）。定义 `application.xml` 描述符允许您优化默认名称和属性，并有选择地选择 EAR 文件中的哪些模块包含在特定部署的应用中。\n\n![image](img/sq.jpg) **注意**  \
  \ WAR 文件和 EAR 文件是分别带有 `.war` 或 `.ear` 扩展名的标准 JAR 文件。\n\n组装者特定任务\n\n根据每个模块部署描述符的完整性和复杂性，可能需要组装者完成或优化提供者声明的一些外部引用。在许多情况下，模块足够自包含且完整，因此即使提供者未提供部署描述符，组装者也无需执行进一步工作。在更复杂的部署场景中，当使用提供者提供的文档（可能通过注解或部署描述符中的描述属性传达）时，组装者可能需要将语义等价但名称不同的资源合并到一个最小的、不同的集合中。相反，组装者可能需要通过重命名共享相同名称但具有不同语义的资源引用来避免资源名称冲突。\n\
  \n例如，如果组装者正在将两个由不同提供者生成的 Java EE 模块打包到一个 Java EE 应用中，两个提供者可能引用同一个逻辑 EJB 但使用不同的名称，或者它们可能使用尚未绑定的名称来引用。组装者有责任使用提供者提供的文档检测此类情况，并更新\
  \ EJB 引用以绑定到单个名称。此名称可由组装者选择并分配给该应用上下文中的 EJB。\n\n组装者所做的任何更改仅应用于模块和应用部署描述符文件，而不应用于\
  \ Java 源代码。此过程之所以有效，是因为 Java EE 规定的优先级规则：当 Java 注解源代码和 XML 部署描述符中都定义了冲突的元数据属性时，部署描述符将优先。组装者只需处理部署描述符文件即可解决\
  \ Java 源代码中的不一致性。\n\n部署者\n\n部署者的任务和交付物如图 11-3 所示。\n\n![9781430246923_Fig11-03.jpg](img/9781430246923_Fig11-03.jpg)\n\
  \n图 11-3.  应用部署者的任务和交付物\n\n部署者特定任务\n\n再次使用来自组装者（和提供者）的指令——通常通过部署描述符或源代码注解中的描述属性传达——部署者需要将所有外部引用绑定到目标应用服务器环境中的具体资源（EJB\
  \ 引用、资源引用、持久化单元引用等）。只有部署者能够了解目标服务器环境，并且 Java EE 特意为所有资源使用添加了一层间接性，以允许此绑定发生，而不影响提供者或组装者的工作。这就是\
  \ Java EE 组件使用的所有资源都通过间接引用进行引用的原因。\n\n与组装者的情况一样，Java EE 策略规定部署者只能更改 XML 部署描述符文件，而不能更改\
  \ Java 源代码中的注解。\n\n调用应用服务器特定的部署工具\n\n最后，您的 Java EE 模块或 Java EE 应用已准备好提交给应用服务器。您的应用服务器将提供一个部署工具，让您完成部署并将\
  \ Java EE 组件安装到应用服务器中，准备由最终用户应用执行。在此阶段，部署工具将验证提交的模块的内部完整性，并确保所有资源都可以绑定到驻留在应用服务器环境中的实际对象。如果在部署时找不到任何必需的资源，或者找不到引用的库组件，则部署将失败。\n\
  \n概述总结\n\nJava EE 部署允许您部署单个模块、库组件或完整的应用。在许多情况下，部署可能仅涉及将编译后的源代码与描述符（对于持久化单元，`persistence.xml`\
  \ 文件是必需的，但对于 EJB JAR、WAR 和 EAR 模块，`ejb-jar.xml`、`web.xml` 和 `application.xml` 文件是可选的）打包在一起，并提交给部署工具。当从可能由不同组件提供者构建且可能版本不同的多个模块组装应用时，组装者的角色变得更加重要。\n\
  \nJava EE 部署基础设施\n\n现在我们已经总结了部署过程，让我们探讨一下 Java EE 基础设施中一些对部署至关重要的领域。当您需要自行决定如何将代码打包到模块中以及如何解析和绑定外部引用时，理解此主题会很有用。\n\
  \nJava EE 服务器\n\n*Java EE 服务器* 是在您的应用服务器内部运行的程序，它在 Java EE 组件执行时为其提供企业服务。Java EE\
  \ 服务器还负责处理部署请求，并将其重定向到其托管的 Java EE 容器。\n\nJava EE 规范定义了 Java EE 服务器必须支持的核心服务列表。这些服务包括消息传递、数据库、安全、事务、持久化以及许多其他服务。Java\
  \ EE 服务器也可以扩展以提供超出规范要求的额外服务，或现有服务的替代实现。Java EE 规范定义了服务器如何通过 Java EE 连接器 API 使用资源适配器将其适配到\
  \ Java EE 环境中，从而扩展以为其容器提供对远程和外部服务的访问。\n\nJava EE 容器\n\nJava EE 服务器的主要目的是支持 Java\
  \ EE 容器，这些容器提供了运行 Java EE 组件的各种环境。Java EE 规范规定支持四种 Java EE 容器：EJB、Web、应用客户端和 Applet。虽然\
  \ EJB 和 Web 容器在中间层的应用服务器中执行，但应用客户端容器通常在客户端层的 Java SE 环境中执行，而 Applet 容器通常在 Web 浏览器内运行。尽管如此，它们都依赖其底层的\
  \ Java EE 服务器来获取它们通过 API 提供给在其容器环境中执行的组件的众多企业服务。例如，Java EE 服务器向 Java EE 容器提供本地消息传递服务，而容器则通过\
  \ JMS（Java 消息服务）API 向其组件公开消息传递服务。类似地，容器通过 Java 数据库连接（JDBC）公开数据库服务，通过 Java 事务 API（JTA）公开事务服务，等等。Java\
  \ EE 容器还介入在 Java EE 容器中执行的 Java EE 应用组件之间的所有通信，以提供组件和资源注入。如图 11-4 所示。\n\n![9781430246923_Fig11-04.jpg](img/9781430246923_Fig11-04.jpg)\n\
  \n\n\n图 11-4.  JAVA EE 服务器\n\n除了 Java EE 容器为 Java EE 组件提供的众多内置服务外，Java EE 还允许通过资源适配器和连接器\
  \ API 集成第三方服务——这些服务通过 Java EE 服务提供者接口 (SPI) 经由其容器暴露给 Java EE 组件。\n\nJava EE 部署组件\n\
  \nJava EE 部署的主要构建块组件是 Java EE 应用程序和 Java EE 模块。让我们来看看这些组件的定义。\n\nJava EE 应用程序\n\n\
  Java EE 允许您将单个 Java EE 模块和整个 Java EE 应用程序部署到服务器。正如前面“打包和部署过程概述”一节中提到的，在部署应用程序时，您将各个\
  \ Java EE 模块以及任何相关的部署描述符和依赖库组件打包到一个称为 EAR 文件的包装归档 JAR 文件中，该文件的后缀为 `.ear`。部署单个 Java\
  \ EE 模块本质上是一种快捷方式，以避免将一个 JAR 文件包裹在另一个单独的 JAR 文件周围。\n\n除了其打包结构之外，Java EE 应用程序在运行时作为一个上下文运行，在该上下文中，一个或多个相关的\
  \ Java EE 组件（例如 EJB、Servlet 和应用程序客户端）可以使用共享的类加载器和命名空间进行操作和相互通信。将 Java EE 应用程序视为一个松散耦合的\
  \ Java EE 模块组可能会很有用，这些模块能够相互可见并共享资源。\n\nJava EE 模块类型\n\nJava EE 定义了以下 Java EE 模块类型：EJB、Web\
  \ 应用程序、应用程序客户端和资源适配器。前三种对应于它们同名的容器，并且它们的部署委托给这些容器。部署资源适配器模块会在 Java EE 服务器中安装资源，并注册这些资源以供\
  \ Java EE 组件使用。您的 Java EE 模块引用的普通 Java 类和其他资源也可以作为库组件包含在 EAR 文件中，既可以打包为 JAR 文件，也可以存储为目录，并与您的\
  \ Java EE 应用程序一起部署。\n\n请注意，一个由一组 JPA 实体组成的 JPA 持久化单元不是一个 Java EE 模块，而是一个库组件。我们将在后面的“持久化单元”一节中描述其中的一些原因。\n\
  \n让我们仔细看看每种 Java EE 模块类型。\n\nEJB 模块\n\n一个 EJB 模块由一个或多个会话和/或消息驱动 Bean (MDB) 组成。它被打包成一个\
  \ EJB JAR 文件，如果它包含一个 `ejb-jar.xml` 部署描述符（从 Java EE 5 开始这是可选的），则必须位于 JAR 文件的 `META-INF`\
  \ 目录中。特定于平台的描述符也可以添加到这个 `META-INF` 目录中。如果 EJB JAR 文件不包含 `ejb-jar.xml` 文件，则 EJB Bean\
  \ 类必须使用 `@Stateless`、`@Stateful`、`@Singleton` 或 `@MessageDriven` 注解将自身标识为 EJB。\n\
  \n在许多情况下，将客户端对 EJB 模块的视图隔离到其自己的归档中是可取的。当客户端仅与会话 Bean 的接口通信时，它不需要访问会话 Bean 类。在这种情况下，最佳实践是仅将会话\
  \ Bean 的接口以及任何其他依赖类打包到一个单独的 EJB 客户端 JAR 库中。这个 JAR 文件可以交给客户端，但也可以从 EJB JAR 文件中引用，这样这些接口就不需要在\
  \ EJB JAR 文件内部重复。为了引用 EJB 客户端 JAR 文件，或 EAR 文件中的任何其他 JAR 文件或目录，装配器会在 JAR 文件的 `META-INF/MANIFEST.MF`\
  \ 文件中添加一个指向这些位置的 `Class-Path` 条目：\n\n```\nClass-Path: MyEjb-Client.jar\n```\n\n\
  ![image](img/sq.jpg) **注意**   有关 `MANIFEST.MF` 文件的更多信息，包括本章中提到的 Class-Path 和 Extension-List\
  \ 条目的用法，请参阅：`http://docs.oracle.com/javase/6/docs/technotes/guides/jar/jar.html`。\n\
  \n可以通过用空格字符分隔 `.jar` 和目录条目来以这种方式引用多个 JAR 文件或目录。被引用的 JAR 文件的路径是相对于 EJB JAR 文件本身的，该文件必须位于\
  \ EAR 文件的根目录中。在前面的示例中，`MyEjb-Client.jar` 文件也位于 EAR 文件的根目录中。\n\n一个 EJB 模块也可能包含一个持久化单元，这将在下一节中描述。持久化单元只能以展开形式存在于\
  \ EJB JAR 中；JAR 文件不能嵌套在 EJB JAR 文件内部。持久化单元由 EJB JAR 文件内容中存在 `META-INF/persistence.xml`\
  \ 文件来定义。\n\n可以使用 `META-INF/application.xml` 文件中的模块声明为 EJB 模块分配一个名称。当部署期间不存在 `META-INF/application.xml`\
  \ 文件时（例如当 EJB JAR 文件独立部署或位于不包含此描述符的 EAR 文件中时），会为其分配一个默认名称。此名称源自 EJB JAR 归档的名称，减去任何目录信息或\
  \ `.jar` 后缀。例如，一个 EJB JAR 文件可能捆绑在 EAR 文件中的以下位置：\n\n```\n./OrderManagerEJBModule.jar\n\
  ```\n\n在这种情况下，其默认模块名称将是 `OrderManagerEJBModule`。\n\nWAR 文件中的 EJB\n\nEJB 3.0 规范通过使\
  \ `ejb-jar.xml` 等 XML 描述符的打包成为可选，简化了 EJB 的打包。EJB 3.1 规范进一步推进了这种简化，允许将 EJB（使用 `@Stateless`、`@Stateful`、`@Singleton`\
  \ 或 `@MessageDriven` 注解的 POJO）直接打包在 WAR 文件的 `WEB-INF/classes` 目录中。类似地，`ejb-jar.xml`\
  \ 描述符（如果存在）可以与 `web.xml` 一起直接打包到 `WEB-INF` 目录中。通过这一更改，用户不再需要创建单独的 EJB JAR 模块来打包\
  \ EJB。图 11-5 描绘了这一新的打包选项。\n\n![9781430246923_Fig11-05.jpg](img/9781430246923_Fig11-05.jpg)\n\
  \n图 11-5.  将 EJB 直接打包在 WAR 文件的 WEB-INF\\classes 目录下\n\n持久化单元\n\n一组 JPA 实体，称为*持久化单元*，既严格来说不是一种模块类型，也没有自己专用的容器。相反，Java\
  \ EE 服务器直接支持持久化，作为其提供给 Java EE 容器的核心服务之一。这使得 JPA 实体能够表现为持久化对象，并在其他 Java EE 容器环境中执行时与\
  \ Java EE 组件交互。通过不受限于它们自己的容器，JPA 实体也可以自由地在 Java EE 环境之外执行并展示持久化行为。\n\n![image](img/sq.jpg) **注意**  \
  \ 在部署上下文中，术语*持久化单元*指的是一组共置的 JPA 实体和一个相应的（且必需的）`META-INF/persistence.xml` 文件。这组文件可以打包到其自己的\
  \ JAR 文件中，或者这些文件可以直接捆绑在 EJB JAR 或 WAR 文件内部。反过来，`persistence.xml` 文件定义了一个或多个 `<persistence-unit>`\
  \ 条目，这些条目可以进一步划分持久化单元打包结构中的实体。在本章中，我们通过始终在描述 `<persistence-unit>` XML 元素时使用连字符（persistence-unit）来区分这两个名称相似的概念。因此，任何对持久化单元的引用都可以假定为指代与\
  \ `persistence.xml` 文件共置的那组实体。\n\n\n\n如前文所述，持久化单元的打包方式与其他模块类型不同。当打包在 Java EE 应用程序的\
  \ EAR 文件中时，持久化单元被视为一个库组件（请参见下文“库组件”一节）。它可以被打包成一个 JAR 文件，或者其类可以直接打包在 EJB JAR 或 WAR\
  \ 文件中。无论哪种方式，`META-INF/persistence.xml` 文件都用于标识持久化单元中包含的实体。我们将在本章后面的“组装持久化单元”一节中讨论打包细节。\n\
  \nWeb 应用程序模块\n\nWeb 应用程序模块由 Servlet、HTML 页面、JSF、JSP 文档以及任何其他基于 Web 的文件组成。其部署描述符是\
  \ `WEB-INF/web.xml` 文件，与 EJB 模块一样，从 Java EE 5 开始，该文件的存在现在是可选的，因为其内容可以使用默认规则推导出来。归档时，Web\
  \ 应用程序模块的内容被打包成一个后缀为 `.war` 的 JAR 文件。这通常被称为 *WAR 文件*。\n\nWAR 文件的内容遵循一种特殊结构，以便更好地适应\
  \ Web 浏览器中的应用程序分区。在将持久化单元打包到 WAR 文件中时，特别相关的是，Java `.class` 文件放置在 `WEB-INF/classes`\
  \ 目录中，而依赖的 JAR 文件可以直接添加到 `WEB-INF/lib` 目录中。\n\n与 EJB 模块类似，Web 模块可以通过 `META-INF/application.xml`\
  \ 文件中的模块声明来分配一个名称。当部署期间不存在 `META-INF/application.xml` 文件时（例如，当 WAR 文件独立部署或位于不包含此描述符的\
  \ EAR 文件中时），会为其分配一个默认名称。此名称源自 WAR 归档文件的名称，去掉任何目录信息或 `.war` 后缀。例如，WAR 文件可以打包在 EAR\
  \ 文件中的以下位置：\n\n```\n./OrderManagerWebApp.war\n```\n\n在这种情况下，其默认模块名称将是 `OrderManagerWebApp`。\n\
  \n资源适配器模块\n\n资源适配器提供了一种扩展 Java EE 服务器的机制。它们允许将由外部系统管理的资源和服务集成到 Java EE 服务器中，供在 Java\
  \ EE 容器中执行的组件使用。资源适配器模块包含一组资源适配器和一个可选的 `META-INF/ra.xml` 部署描述符。\n\n在部署期间，资源适配器被打包成一个*资源归档\
  \ (RAR) 文件*，这是一个后缀为 `.rar` 的 JAR 文件。\n\n应用程序客户端模块\n\n应用程序客户端模块包含可以在客户端层的 Java SE\
  \ 环境中执行的 Java 类。应用程序客户端容器是一个轻量级的 Java EE 容器，它支持注入，并提供持久化、安全性和消息传递等服务。它不提供中间层 Java\
  \ EE 容器可用的许多服务。\n\n应用程序客户端模块的部署描述符位于 `META-INF/application-client.xml` 中，并且与其他 Java\
  \ EE 模块部署描述符一样，从 Java EE 5 开始是可选的。\n\n库组件\n\n模块在运行时所需的共享类或其他资源可以打包到*库组件*中。库可以安装在应用程序服务器中（此处不描述安装库的过程），也可以捆绑在您的\
  \ EAR 或 WAR 文件中。嵌入在 EAR 中的任何 JAR 格式文件，无论是 Java EE 模块还是捆绑的库归档文件，都可以使用 `META-INF/MANIFEST.MF`\
  \ 文件中的 `Class-Path` 属性来引用捆绑的库组件。\n\n![image](img/sq.jpg) **注意**   每当通过 `Class-Path`\
  \ 条目引用 JAR 文件时，部署工具仅识别被引用 JAR 文件中的类。被引用 JAR 文件中的任何描述符文件都将被忽略。\n\n捆绑的库\n\n清单 11-1\
  \ 显示了一个示例 EAR 文件的文件内容，以演示 `Class-Path` 属性如何引用捆绑的库。这里我们使用一种简写符号来显示位于其关联 JAR 和 WAR\
  \ 文件的 `META-INF/MANIFEST.MF` 文件中的 `Class-Path: myEjb-Client.jar` 条目。\n\n***清单 11-1.***  示例\
  \ EAR 文件内容，显示模块对捆绑库组件的显式依赖\n\n```\nmyApp.ear:\n META-INF/application.xml\n myEjb.jar\
  \ Class-Path: myEjb-Client.jar\n myWebApp.war Class-Path: myEjb-Client.jar\n myEjb-Client.jar\n\
  ```\n\n在此示例中，客户端接口（远程、本地和 Web 服务端点接口）已特意从 `myEjb.jar` EJB 模块中剥离出来，并打包到捆绑的 `myEjb-Client.jar`\
  \ 库组件中。`myEjb.jar` 中的 `META-INF/ejb-jar.xml` 描述符包含以下条目：\n\n```\n<ejb-client-jar>myEjb-Client.jar</ejb-client-jar>\n\
  ```\n\n这将 `myEjb-Client.jar` 标识为保存其客户端接口的 JAR 文件。`myEjb.jar` EJB 模块依赖于这些 EJB 接口，并通过其引用\
  \ `myEjb-Client.jar` 库的 `Class-Path` 条目声明其依赖关系。`myWebApp.war` Web 模块引用这些 EJB 接口，并以相同方式声明其对\
  \ `myEjb-Client.jar` 的依赖。`myEjb-Client.jar` 库是一个普通的 JAR 文件，它与 EJB 和 WAR 文件一起位于 EAR\
  \ 文件中。\n\n显式声明对捆绑库组件的依赖的另一种方法是使用 EAR 文件的内置库目录 `lib`，如清单 11-2 所示。`lib` 目录中的所有 JAR\
  \ 文件都会自动添加到 EAR 文件中 Java EE 模块的类路径中。\n\n***清单 11-2.***  示例 EAR 文件内容，显示模块对共享捆绑库组件的隐式依赖\n\
  \n```\nmyApp.ear:\n META-INF/application.xml\n myEjb.jar\n myWebApp.war\n lib/myEjb-Client.jar\n\
  ```\n\n这实现了与清单 11-1 相同的结果。假设 `application.xml` 没有指定覆盖默认 `lib` 目录的 `<library-directory>`\
  \ 元素，Java EE 服务器将自动将 `myEjb-Client.jar` 文件添加到 `myEjb.jar` 和 `myWebApp.war` 模块的类路径中。\n\
  \n库也可以捆绑在 WAR 文件的 JAR 文件的 `WEB-INF/lib` 目录中，以及 WAR 文件的未打包类的 `WEB-INF/classes` 目录中。\n\
  \n已安装的库\n\n也可以在您的应用程序服务器环境中安装库，然后使用 JAR 文件的 `META-INF/MANIFEST.MF` 文件中的 `Extension-List`\
  \ 属性从 EAR 文件中的 JAR 格式文件引用它们。这是在 Java EE 应用程序之间共享库的一种有效方式，因为它避免了在多个 EAR 文件中冗余捆绑库。已安装的库由应用程序服务器实例存储在磁盘上，并且通常，应用程序服务器配置文件中的共享库条目会将已安装库的名称与其一个或多个\
  \ JAR 文件关联起来。然后，Java EE 应用程序可以按名称引用此已安装的库，而无需了解该库的 JAR 文件内容。\n\n使用已安装库的示例如清单 11-3\
  \ 所示。\n\n***清单 11-3.***  示例 EAR 文件内容，显示已安装库的使用\n\n```\nmyApp.ear:\n META-INF/MANIFEST.MF:\n\
    Extension-List: commonUtils\n  commonUtils-Extension-Name: com/apress/ejb/ch11/commonUtils\n\
    commonUtils-Extension-Specification-Version: 1.4\n META-INF/application.xml\n\
   myEjb.jar\n```\n\n\n\n在此示例中，EAR 文件的 `META-INF/MANIFEST.MF` 文件用于声明对名为 `commonUtils`（版本\
  \ 1.4）的已安装库的引用。这使得 EAR 文件内的所有 JAR 文件都能访问 `commonUtils` 库的内容，从而满足 `myEjb.jar` 模块对该库内容的依赖。该引用也可以定义在\
  \ `myEjb.jar` 上，在这种情况下，只有 `myEjb.jar` 会被授予对该库的访问权限。无论哪种方式，已安装的库都必须在部署 `myEjb.jar`\
  \ 之前安装好。\n\n`commonUtils` 库中包含的 JAR 文件的 `META-INF/MANIFEST.MF` 文件如清单 11-4 所示。\n\n\
  ***清单 11-4.***  已安装库的 JAR 文件内容\n\n```\ncommonUtils.jar:\n META-INF/MANIFEST.MF:\n\
  \  Extension-Name: com/apress/ejb/ch11/commonUtils\n  Specification-Title: Utils\
  \ for implementing common patterns\n  Specification-Version: 1.4\n```\n\n库的版本管理\n\
  \n尽管 Java EE 规范并未强制要求，但许多应用服务器支持 Java EE 应用隔离级别，允许每个 Java EE 应用拥有自己的类加载器。这使得在同一台\
  \ Java EE 服务器上同时运行的多个应用可以引用同一捆绑或已安装库组件的不同版本。一个有用的场景是，当你希望将部分应用迁移到使用新版本的库时。你可以在服务器中安装新版本的库，然后有选择地更新那些你希望使用新版本库的应用的\
  \ `Specification-Version` 属性。\n\n或者，支持此隔离级别的 Java EE 服务器允许你部署一个捆绑了其自身依赖库版本的 Java\
  \ EE 应用。Java EE 规范中的优先级规则规定，当捆绑库与具有相同 `Extension-Name` 的已安装库发生冲突时，将使用捆绑库。这保证了应用将始终使用其捆绑的库，无论服务器已安装的库基础中有哪些版本可用。\n\
  \n应用服务器与平台无关性\n\nJava EE 一直非常注重可移植性，尽管在实践中这往往难以实现。理想情况下，所有 Java EE 服务器都尽可能完整地实现规范，然后在性能和特性上区分彼此，例如支持可配置的隔离级别以及规范推荐（或暗示但非强制）的高级对象/关系（O/R）映射选项。\n\
  \n应用服务器应定义其特定于平台的描述符，用于增强 Java EE 规范的核心需求，事实上几乎所有应用服务器实现都提供了此类描述符。随着时间的推移（我们在 JPA\
  \ 映射元数据领域尤为明显地看到这一点），规范中缺失且由供应商实现解决的功能，会被纳入规范并变得通用。例如，EJB 2.1 既没有提供关于如何为实体 Bean\
  \ 定义 O/R 映射的支持或规定，也没有说明如何实现实体继承层次结构。从 EJB 3 开始，JPA 吸收了来自 TopLink、Hibernate 和 Java\
  \ 数据对象（JDO）的许多最佳理念，并将它们直接整合到 `orm.xml` 文件中，以提供这些功能以及其他功能。\n\n部署工具\n\n应用服务器供应商几乎都标准化了\
  \ JSR 88，该规范规定了使用受管 JavaBean（称为 *MBeans*）来管理部署过程。MBeans 是自描述的，并遵循 Java 管理扩展（JMX）规范定义的设计模式，为\
  \ Java EE 服务器和应用服务器的部署工具之间提供接口。Java EE 部署 MBeans 暴露的实际接口因应用服务器而异；但所有部署工具现在都在不同程度上使用它们，这一事实为供应商的部署工具之间提供了一定的一致性。\n\
  \n通常，供应商的部署工具不仅会指导装配员完成打包 Java EE 模块、库和应用归档文件的过程，还会指导其指定一些元数据，用于填充 Java EE 通用和特定于平台的部署描述符。这些工具还会接受\
  \ EJB、WAR 或 EAR 文件，并实际在服务器本身中执行安装和验证部署任务。\n\n![image](img/sq.jpg) **注意**   Cargo\
  \ 是一个轻量级封装，允许你以标准方式操作 Java EE 容器。Cargo 旨在通过 Ant 任务、Maven 和 IDE 插件等媒介，为许多流行的 Java\
  \ EE 容器提供抽象 API。有关 Cargo 的更多信息，请参见 `http://cargo.codehaus.org`。\n\n部署计划\n\n某些供应商的应用服务器工具会将部署者的选择记录在一个称为*部署计划*的文档中。由于部署通常是一个迭代过程，尤其是在开发和测试阶段，捕获部署者的选择会很方便，这样部署者就不必重复指定相同的信息。\n\
  \n目前，JSR 88 或其他地方都没有为部署计划指定标准格式，因此它不是一个可以在不同应用服务器实现之间复用的文档。如果你觉得这很不方便，可以参与 JCP 并组建或加入一个\
  \ JSR，以推动该领域的标准化。\n\n部署角色\n\n任何包罗万象的企业服务平台本质上都是复杂的。认识到这一现实，Java EE 的架构师将 Java EE\
  \ 服务划分成了定义良好的 API。类似地，他们将与开发和配置 Java EE 应用各个阶段相关的任务划分成了定义良好的角色。我们提到过，与构建各种应用组件（如\
  \ EJB、实体、Servlet、JSF JSP 等）相关的任务属于 Java EE 的应用组件提供者角色。还有其他角色，例如系统组件提供者，负责在应用服务器中安装应用组件所需的资源。其中包括数据库资源、授权策略、安全角色以及许多其他资源，包括通过资源适配器引入的服务。\n\
  \n我们之前介绍过应用装配者和应用部署者的角色。然而，在本节中，我们将更深入地探讨这些角色。\n\n应用装配者\n\n以下是作为应用装配者需要了解的内容。\n\n\
  定义和描述外部依赖\n\n\n提供者通过注解、部署描述符或两者结合的方式，标识其组件所持有的外部需求。这些依赖关系可能涉及其他 EJB、持久化单元、环境属性值、数据库连接，或该应用组件外部的任何其他对象。装配者的职责是进一步描述这些外部依赖关系，以便部署者能够确定如何将它们映射到特定应用服务器环境中的具体资源。外部依赖关系通过注解或部署描述符中的`<ejb-ref>`、`<ejb-local-ref>`、`<resource-ref>`、`<resource-env-ref>`、`<security-role-ref>`和`<message-destination-ref>`条目来定义。装配者的工作是分析这些外部引用并进行修补。此过程包括以下步骤。\n\
  \n**确保所有引用完整**\n\n提供者仅部分完成外部引用的定义是合法且常见的。提供者可能不知道，或试图猜测所引用资源的实际名称。在这种情况下，提供者会详细说明引用的细节——其对象类型、内部使用的名称，以及对被引用对象逻辑行为的描述。装配者获取这些信息，然后将其链接到应用程序内部一致的资源名称。EJB\
  \ 引用就是一个例子。允许使用`<ejb-ref>`元素在`web.xml`、`ejb-jar.xml`或`application-client.xml`描述符中声明\
  \ EJB 引用。`<ejb-ref>`有一个`ejb-ref-name`属性，供引用组件（无论是 Web 表单、另一个 EJB 还是应用客户端）使用，并通过为`<ejb-ref>`的`ejb-link`属性赋值，将其链接到部署期间分配给该\
  \ EJB 的实际名称。清单 11-5 展示了一个由装配者完整定义的`<ejb-ref>`。\n\n***清单 11-5.***  一个已正确链接到命名 EJB\
  \ 的 ejb-ref 描述符元素\n\n```\n<ejb-ref>\n <description>\n  向装配者描述此 EJB 的说明\n </description>\n\
  \ <ejb-ref-name>ejb/MyAccountManager</ejb-ref-name>\n <ejb-ref-type>Session</ejb-ref-type>\n\
  \ <remote>com.apress.ejb.ch11.MyAccountManager</remote>\n <ejb-link>SalesAccountManager</ejb-link>\n\
  </ejb-ref>\n```\n\n![image](img/sq.jpg) **注意**   从 EJB 3 开始，`<home>`和`<local-home>`属性是可选的。\n\
  \n也可以解析对同一应用程序中不同 EJB JAR 文件内打包的 EJB 的引用。清单 11-6 展示了如何在`ejb-link`值中使用特殊路径表示法来实现这一点。`ejb-link`属性值可以引用应用程序\
  \ EAR 文件中任何 EJB JAR 文件内的 EJB。\n\n***清单 11-6.***  一个链接到应用程序中不同 EJB JAR 内 EJB 的 ejb-ref\
  \ 描述符元素\n\n```\n<ejb-ref>\n <description>\n  向装配者描述此 EJB 的说明\n </description>\n\
  \ <ejb-ref-name>ejb/MyAccountManager</ejb-ref-name>\n <ejb-ref-type>Session</ejb-ref-type>\n\
  \ <remote>com.apress.ejb.ch11.MyAccountManager</remote>\n <ejb-link>../salesEjbModule.jar#SalesAccountManager</ejb-link>\n\
  </ejb-ref>\n```\n\n此示例展示了如果`SalesAccountManager` EJB 被移入一个名为`salesEjbModule.jar`的对等\
  \ EJB 模块时，链接将如何显示。最后，装配者可能需要解析在 Java 源代码中使用`@EJB`注解部分声明的 EJB 引用，如清单 11-7 所示。\n\n\
  ***清单 11-7.***  Java 源文件中的部分@EJB 注解\n\n```\n@EJB(name=\"AccountManager\",\n   beanInterface=AccountManager.class,\n\
  \   description=\"部门账户管理器\")\nprivate AccountManager acctMgr;\n```\n\n装配者会添加一个`<ejb-ref>`元素来完成此引用，但会保持已定义的属性不变，如清单\
  \ 11-8 所示。\n\n***清单 11-8.***  一个填充@EJB 注解缺失属性的 ejb-ref 描述符元素\n\n```\n<ejb-ref>\n\
  \ <ejb-ref-name>ejb/MyAccountManager</ejb-ref-name>\n <ejb-link>SalesAccountManager</ejb-link>\n\
  </ejb-ref>\n```\n\n![image](img/sq.jpg) **注意**   虽然可以使用 JNDI（Java 命名和目录接口）来查找部署在上下文应用程序之外的\
  \ EJB，但`<ejb-ref>`、`<ejb-local-ref>`以及相应的`@EJB`注解只能用于访问部署在上下文应用程序中的 EJB。\n\n此过程持续进行，直到装配者链接了所有悬而未决的\
  \ EJB、资源、资源环境以及任何其他引用。\n\n**解决冲突和冗余引用**\n\n提交给装配者以组装成应用程序的模块可能由不同的提供者构建，或在不同时间构建。在这种情况下，通常会找到对相同逻辑资源的引用，但使用了不同的名称。装配者的职责是扫描源注解和任何\
  \ XML 部署描述符，并将任何冗余引用重命名为一个通用名称。\n\n类似地，应用程序组件可能使用相同的内部名称来引用逻辑上不同的资源。装配者必须利用这些引用的描述属性（可在注解和部署描述符中找到），以及提供者提供的任何其他文档，来检测此类冲突并适当地重命名这些引用。\n\
  \n装配者可以选择通过将模块源文件中的 Java 注解合并到描述符中（只要不冲突）来完全填充每个模块描述符。如果装配者选择执行此任务，则描述符的`metadata-complete`属性可以设置为`true`。这向部署者发出信号，表明无需进一步分析此描述符和\
  \ Java 注解，从而实现更快速的部署。\n\n**打包**\n\n装配者执行打包阶段，将应用程序组件捆绑到特定于容器的 JAR 文件和组件库中。此打包过程在前面的“打包和部署过程概述”部分中已概述。您可以使用\
  \ Ant 或 ZIP 工具来执行这些步骤，将 Java EE 组件分组到模块中并将其打包到 JAR 文件中。然而，这是一个受益于使用可视化打包工具的领域，该工具通常可通过\
  \ IDE 获得。装配者将 EJB 和应用客户端模块打包到 JAR 文件中，将 Web 应用程序模块打包到 WAR 文件中，并将资源适配器打包到 RAR 文件中。\n\
  \n在组装没有捆绑库的独立 Java EE 模块时，无需进一步打包。该模块的 JAR 文件即可部署。\n\n如果涉及多个模块，或者也需要捆绑库，则装配者会创建一个\
  \ EAR 文件，并将模块和库添加到此归档文件中。装配者可以使用内部目录结构添加模块，前提是`lib`目录或`application.xml`文件中由`<library-directory>`指定的目录被作为隐式共享库的位置。\n\
  \nEAR 文件`META-INF`目录中的可选`application.xml`文件可用于显式标识应用程序中包含的模块。这是告诉部署工具忽略那些不打算作为应用程序一部分，但由于某种原因被包含在应用程序中的模块的方法。\n\
  \n**应用程序部署者**\n\n\n\n由装配器生成的模块或包随后会移交给部署器。部署器对目标应用服务器环境了如指掌，包括该环境中当前已部署的所有资源信息。\n\
  \n由于各供应商为其应用服务器提供的工具集各不相同，部署器的实际体验也会有所差异。部署阶段所涉及的逻辑流程将在以下章节中概述。\n\n**解压归档文件**\n\n\
  EAR 文件或独立的模块 JAR 文件会被解压，并对其内容进行分析。\n\n**推导模块描述符**\n\n部署器会处理每个 Java EE 模块的描述符。如果提供了描述符，并且其\
  \ `metadata-complete` 属性设置为 `true`，那么部署器可以将该模块发送到相应的容器。如果未提供描述符，或者 `metadata-complete`\
  \ 未设置为 `true`，则必须扫描该模块的 Java 源代码内容以检测注解。通过扫描注解发现的所有元数据属性将与描述符中的属性合并。在此协调步骤中，Java\
  \ EE 的优先级规则规定：每当注解和描述符都为某个给定属性提供值时，描述符中的值优先。此协调状态的结果是为该模块生成一个完整的描述符。\n\n**绑定外部引用**\n\
  \n会检查所有发现的外部引用的完整性，以确保装配器的工作已完成。然后，这些引用会与应用服务器环境中的实际资源进行匹配。如果任何资源无法绑定，则会向部署器报告错误，以便解决该问题。可以想象，此过程极大地受益于应用服务器提供的强大部署工具集。\n\
  \n**部署到容器**\n\n每个完整的模块都可以发送到其对应的容器进行安装和注册。完成后，这些模块中的 Java EE 组件即可供客户端访问。\n\n**组装\
  \ EJB JAR 模块**\n\nEJB JAR 文件是一个相当直接的归档文件。`.class` 文件在 JAR 文件中按照其包对应的目录进行布局，根目录位于\
  \ JAR 的顶层目录。`ejb-jar.xml` 部署描述符（如果存在）则放在 `META-INF` 目录中，通常还会附带其他特定于平台的描述符。\n\n任意类都可以与\
  \ EJB 类和接口一起包含在内。一种常见的做法是将共享库 JAR 与 EJB JAR 文件打包在同一个 EAR 文件中。可以使用 EJB JAR 文件的 `META-INF/MANIFEST.MF`\
  \ 文件中的 `Class-Path` 属性来引用打包在外部 EAR 文件中的库，如前文“库组件”部分所述。类似地，可以通过在 `META-INF/MANIFEST.MF`\
  \ 文件的 `Extension-List` 属性中列出它们，来引用之前已部署但在上下文应用程序之外的已安装库。\n\n在指定 EJB 的元数据时，`ejb-jar.xml`\
  \ 描述符和 Java 源代码注解是相互冗余的。选择使用哪种方法主要取决于提供者的偏好，尽管此决定也受到应用程序编辑、组装和部署方式的影响。然而，顶层设置（例如\
  \ `<ejb-client-jar>`）没有对应的注解，必须通过此描述符进行分配。\n\n![image](img/sq.jpg) **注意** 从 Java\
  \ EE 5 开始，我们可以直接部署 EJB 和 WAR 模块，而无需将它们打包为 Java EE 应用程序。这仅适用于这些模块不依赖于其他 JAR 文件中尚未部署到目标应用服务器环境的类的情况。\n\
  \n**命名范围**\n\n在一个 Java EE 应用程序中，不能有两个 EJB 具有相同的名称。装配器有责任检测这种情况，并适当地重命名 EJB 以解决冲突。\n\
  \n**组装持久化单元**\n\n一个*持久化单元*是一组 JPA 实体、映射超类和可嵌入类，并附带一个必需的 `META-INF/persistence.xml`\
  \ 文件。Java EE 提供了一组固定的方式在部署期间打包持久化单元。你可以通过以下任何一种方式打包持久化单元：\n\n*   打包到一个或多个 JAR 文件中，这些\
  \ JAR 文件随后可以打包到 WAR 或 EAR 文件中\n*   作为 EJB-JAR 文件中的一组类\n*   在 WAR 文件的 `classes` 目录中\n\
  *   或者作为上述方式的组合\n\n其 `META-INF/persistence.xml` 文件所在的 JAR 文件或目录被称为持久化单元的*根*，它定义了构成持久化单元的类的根目录。持久化单元的根必须是以下之一：\n\
  \n*   一个 EJB-JAR 文件\n*   WAR 文件的 `WEB-INF/classes` 目录\n*   WAR 文件的 `WEB-INF/lib`\
  \ 目录中的一个 JAR 文件\n*   EAR 文件的库目录中的一个 JAR 文件\n*   一个应用程序客户端 JAR 文件\n\n你打包持久化单元的位置决定了哪些模块可以访问它。例如，将其添加到\
  \ EAR 文件的库目录中，可以使其被应用程序中的所有其他模块访问。将其放置在 EJB、Web 应用程序或应用程序客户端 JAR 中，则将其范围限制在该模块内。\n\
  \n除了 `persistence.xml` 文件之外，还可以将一个或多个 O/R 映射文件添加到 `META-INF` 目录中，以扩充或覆盖可能在受管理的 JPA\
  \ 类中指定的任何注解。JPA 指定默认文件名为 `META-INF/orm.xml`，但 `persistence.xml` 文件中定义的每个 `<persistence-unit>`\
  \ 都可以使用 `<mapping-file>` 元素指定其自己的映射文件。\n\n**命名范围**\n\n在一个 Java EE 应用程序中，两个 JPA 实体可以具有相同的名称，但前提是它们位于不同的上下文中。例如，两个\
  \ Web 应用程序模块可以在其 `WEB-INF/lib` 或 `WEB-INF/classes` 目录中打包各自的持久化单元。在这种情况下，持久化单元对每个\
  \ Web 应用程序模块是私有的，这些持久化单元之间的重复名称不会引起冲突。\n\n装配器有责任检测同一命名范围内的冲突，并适当地重命名实体 `name` 属性以解决冲突。\n\
  \n**总结**\n\n本章介绍了 Java EE 部署的主题，涵盖了通用的部署问题以及特定于 EJB 和 JPA 实体的部署领域。我们首先概述了部署期间执行的任务，并指出，根据所部署的\
  \ Java EE 模块的复杂性，某些步骤可能不是必需的。本概述部分还解释了装配器和部署器的角色，并在这两个角色的背景下解释了部署任务。\n\n为了提供一些关于部署基础设施的背景知识（这些知识将有助于你选择如何划分应用程序和解决外部引用），我们探讨了\
  \ Java EE 服务器和四个 Java EE 容器：EJB、Web、应用程序客户端和 Applet。这引出了对相应 Java EE 模块类型以及 Java\
  \ EE 应用程序定义的讨论。我们还解释了如何使用库组件来打包你的 JPA 持久化单元和非 Java EE 组件。\n\n本章的其余部分更深入地探讨了装配器和部署器的角色，最后进一步详细说明了如何部署\
  \ EJB 模块和 JPA 持久化单元。\n\n在下一章中，我们将探讨如何构建能够在多用户分布式环境中与 EJB 组件交互的客户端。\n\n**第 12 章**\n\
  \n![image](img/frontdot.jpg)\n\n\n\nEJB 客户端应用程序\n\n到目前为止，我们已经详细介绍了会话 Bean、使用 Java\
  \ 持久化 API（JPA）的实体、消息驱动 Bean（MDB）、将无状态会话 Bean 发布为 Web 服务，以及如何集成所有这些组件。除此之外，我们还讨论了事务和性能的具体细节。虽然我们一直在开发简单的\
  \ Servlet 作为客户端应用程序来演示这些组件的工作方式，但我们尚未深入探讨不同类型的 EJB 客户端应用程序及其开发方法。在本章中，我们将讨论客户端应用程序可能涉及的不同应用架构，并构建其中常见的几种。\n\
  \n应用架构\n\nJava EE 平台在组件如何分布到不同层和架构方面提供了灵活性。您可以根据应用或配置需求选择合适的架构和编程模型。在本节中，我们将介绍您可以使用的不同架构和编程模型。\n\
  \n图 12-1 展示了基于 Web 的应用的架构布局。这种架构通常由运行在浏览器中的 Web 应用程序作为前端。如今，其他类型的客户端设备（如智能手机、平板电脑、手机和\
  \ telnet 设备）也被用来运行这些应用程序。运行在浏览器或移动设备中的 Web 应用程序使用诸如 JavaServer Pages（JSP）、JavaServer\
  \ Faces（JSF）或 Java Servlet 等 Web 技术来呈现用户界面。典型的用户操作，例如输入搜索条件或向购物车添加商品，将通过上述 Web 技术之一调用运行在\
  \ EJB 容器中的会话 Bean。会话 Bean 被调用后，会处理请求，并将响应发送回来。\n\n![9781430246923_Fig12-01.jpg](img/9781430246923_Fig12-01.jpg)\n\
  \n图 12-1.  基于 Web 的应用架构\n\n这种架构允许您充分利用会话 Bean 的所有优势，例如封装与实体的交互、管理事务和安全性等。其缺点在于，您需要一个\
  \ EJB 容器或应用服务器来部署和运行会话 Bean。在这种架构中，另一点需要注意的是，您可以将 Web 容器和 EJB 容器运行在两台不同的物理机器上，或者同一台物理机器上的两个不同\
  \ Java 虚拟机（JVM）中。这种方法的优缺点已在第 2 章中讨论过。\n\n这种架构的一个细微变体如图 12-2 所示，其中 Web 容器和 EJB 容器位于同一个\
  \ JVM 中。在这种架构中，Web 组件以本地模式与 EJB 组件交互。这种方法的优缺点也已在第 2 章中讨论过。\n\nJPA 规范提供了一种轻量级的持久化对象模型，使用普通的\
  \ Java 对象（POJO）和注解进行对象/关系（O/R）映射。这与早期 EJB 规范处理持久化的方式截然不同。这种持久化模型的轻量级特性使得应用架构成为可能，允许\
  \ Web 应用程序直接与持久化对象模型或 JPA 实体交互。图 12-3 展示了这种编程模型的架构布局。在这种架构中，Web 组件将使用 `EntityManager`\
  \ 与实体交互，执行 CRUD（创建、检索、更新、删除）操作以及查询来检索数据。\n\n![9781430246923_Fig12-02.jpg](img/9781430246923_Fig12-02.jpg)\n\
  \n图 12-2.  支持本地调用的基于 Web 的应用架构\n\n![9781430246923_Fig12-03.jpg](img/9781430246923_Fig12-03.jpg)\n\
  \n图 12-3.  使用 JPA 实体的基于 Web 的应用架构\n\n这种编程模型的优点在于，您可以在任何标准的轻量级 Web 容器（如 Tomcat）上运行\
  \ Web 应用程序。由于您没有使用会话 Bean 或 MDB，因此不需要任何 EJB 容器或应用服务器。这种架构与其他 O/R 框架（如 TopLink 和\
  \ Hibernate，JPA 规范正是基于它们）一起被广泛使用。其缺点在于，您会失去 EJB 容器提供的一些服务（例如事务和安全性）。\n\n在构建使用 EJB\
  \ 或实体的 Web 应用程序时，上述三种架构是最常用的。这些架构还有其他变体，但我们不会深入探讨所有选项。\n\n接下来的两种架构是编程模型，其中客户端应用程序属于桌面类型，为数据录入目的提供丰富的\
  \ UI 功能。\n\n图 12-4 展示了一种架构，其中运行在桌面上的客户端应用程序调用远程会话。运行在桌面上的客户端应用程序具有供最终用户（例如客户服务代表和银行柜员）使用的数据录入界面。这些客户端应用程序可以使用\
  \ Java SE 中的 Java Swing 技术开发，或者使用从命令行运行的普通 Java 类（POJO）开发。通常，最终用户从其桌面启动客户端应用程序，输入一些数据，然后通过按下屏幕上的某个\
  \ UI 组件（例如“提交”按钮）来触发事件。\n\n![9781430246923_Fig12-04.jpg](img/9781430246923_Fig12-04.jpg)\n\
  \n图 12-4.  专业桌面客户端应用架构\n\n客户端应用程序可以安装在桌面机器上，也可以使用诸如 Java Web Start 之类的技术从服务器下载。在这种架构中，由于会话\
  \ Bean 将在远程服务器上运行，因此客户端应用程序始终会远程调用会话 Bean。与 Web 应用程序的情况一样，这种架构可以利用会话 Bean 的优势。\n\
  \n图 12-5 展示了一种直接使用 JPA 实体而不通过会话 Bean 的架构。在这种编程模型中，客户端应用程序和打包在持久化单元中的实体位于同一位置，并作为一个单一的应用单元进行组装。客户端应用程序使用\
  \ `EntityManager` 执行 CRUD 操作和查询来检索数据。\n\n![9781430246923_Fig12-05.jpg](img/9781430246923_Fig12-05.jpg)\n\
  \n图 12-5.  使用 JPA 实体的专业客户端应用架构\n\n这种编程模型的优点在于，您可以在标准的 Java SE 环境中运行应用程序，而无需使用 EJB\
  \ 容器，但明显的缺点是，您将失去 EJB 容器提供的诸如安全性和事务管理等服务。\n\n如第 6 章所述，无状态会话 Bean 可以发布为 Web 服务。一旦无状态会话\
  \ Bean 被发布为 Web 服务，任何能够组装并发送简单对象访问协议（SOAP）消息的 Web 服务客户端应用程序都可以调用已发布的 Web 服务。图 12-6\
  \ 展示了这种架构。\n\n![9781430246923_Fig12-06.jpg](img/9781430246923_Fig12-06.jpg)\n\n\
  图 12-6.  Web 服务客户端应用架构\n\n\n\n企业通常拥有多个与异构后端系统或服务交互的业务流程。*业务流程执行语言（BPEL）* 是一种标准标记语言，允许你将离散的\
  \ Web 服务组合成单个业务流程。基于 BPEL 的业务流程使用标准的 Web 服务架构和基础设施来调用一个或多个 Web 服务。图 12-7 展示了一种架构，其中基于\
  \ BPEL 的业务流程调用了一个发布为 Web 服务的无状态会话 Bean。例如，第 6 章演示了如何创建和发布一个用于检查信用卡有效性的信用服务。在订单处理业务流程的上下文中，该信用服务可能是该业务流程为完成订单处理而与之交互的多个服务之一。\n\
  \n![9781430246923_Fig12-07.jpg](img/9781430246923_Fig12-07.jpg)\n\n图 12-7.  作为客户端应用程序的业务流程\n\
  \n到目前为止，我们已经了解了涉及 EJB 或 JPA 组件的可能架构和编程模型。在接下来的章节中，我们将深入探讨图 12-2 中所示的基于 Web 的应用程序架构，并演示如何扩展在第\
  \ 7 章中为 Wines Online 应用程序开发的集成后端应用程序。我们选择这种架构是因为它很常用，并且有助于我们说明容器服务的用法。\n\nJSF\n\n\
  在本节中，我们将探讨如何开发一个 Web 应用程序，该应用程序使用 JavaServer Faces (JSF) 通过图 12-2 所示的架构与集成的 EJB\
  \ 后端应用程序进行通信。我们将首先简要介绍 JSF 的几个概念，为你开发一个功能完备的 Web 应用程序做好准备。\n\n![image](img/sq.jpg) **注意**  \
  \ 本节绝不提供对 JSF 的全面讨论。与任何其他 Java EE 技术一样，有关 JSF 的详细信息可以在以下网址找到：`http://www.oracle.com/technetwork/java/javaee/javaserverfaces-139869.html`\n\
  \nJava EE Web 技术的演进\n\nJava EE 技术已经发展成为一个成熟、可靠且稳定的平台，允许开发者构建企业级应用程序。该平台在 Web 技术领域也经历了显著的演进。图\
  \ 12-8 展示了 Java EE 平台中 Web 技术的演进过程。\n\n![9781430246923_Fig12-08.jpg](img/9781430246923_Fig12-08.jpg)\n\
  \n图 12-8.  Java EE Web 技术的演进\n\n在 Java Servlet 出现之前，CGI 脚本被用于生成动态 Web 内容。CGI 脚本有其自身的局限性，包括脚本作为独立进程运行，这导致了可扩展性问题。\n\
  \n在 CGI 脚本之后，Java Servlet 成为了 Java EE 平台中所有 Web 技术的基础。Java Servlet 为开发基于标准的、可在 Web\
  \ 容器间移植的 Web 组件和应用程序提供了一个良好的开端。Java Servlet 的缺点之一是代码密集——所有 HTML 都是通过 `println()`\
  \ 方法打印出来的。Servlet 没有在创建页面设计的图形设计师和创建动态内容的 Java 程序员之间建立桥梁。\n\nJSP 是 Web 技术演进中的下一步；它弥合了图形设计师和\
  \ Java 程序员之间的鸿沟。基于 Java Servlet 技术，JSP 页面是嵌入了 Java 代码的 HTML 页面。这种模型允许图形设计师创建 JSP\
  \ 页面，然后程序员可以通过添加 Java 代码或*脚本片段*使其具有动态性。编译后，JSP 页面就变成了 Java Servlet。\n\n虽然 JSP 页面的出现很好，但许多开发者现在不得不处理诸如遍历数据集合之类的繁琐任务。这导致了\
  \ JSP 标准标签库 (JSTL) 的创建，它自动化了其中一些任务。\n\n尽管这些技术的进步简化了 Web 应用程序的构建，但当时还没有用于开发它们的标准组件模型。除此之外，使用像\
  \ Visual Basic、Oracle Forms 和 PowerBuilder 这样的第四代语言 (4GL) 开发具有可重用组件的 Web 应用程序也还不可行。\n\
  \nJSF 是最新的 Java EE Web 技术。通过组件模型，它解决了可重用组件和简化 Web 应用程序构建的问题。不过，可重用组件模型并不是 JSF 提供的唯一功能。我们将在接下来的章节中探讨\
  \ JSF 的其他一些特性和优势。\n\n模型-视图-控制器模式\n\n在 Java EE Web 技术开发的早期阶段，大多数 Web 应用程序都是使用所谓的\
  \ Model-I 方法构建的。Model-I 的基本思想是，呈现动态 Web 内容的 Web 技术与后端系统的业务逻辑紧密交织在一起。这种方法没有关注点分离，导致了应用程序维护问题。Model-II\
  \ 方法（也称为模型-视图-控制器 [MVC] 模式）是对 Model-I 方法的后续改进。这种方法的关键在于视图层与提供数据和业务逻辑的模型层之间的清晰分离。\n\
  \nMVC 模式并非 Java 语言所特有；它可以追溯到像 Smalltalk 这样的语言。在这种方法中，模型层用于业务逻辑和数据，视图用于呈现用户界面，控制器用于应用程序流程和事件处理。虽然\
  \ Java EE 平台在模型和视图端技术方面一直在演进，但它并没有包含一个可用于控制器端的内置框架。相反，许多开发者使用 Java Servlet 技术构建了自制的控制器。还有许多其他人转向了\
  \ Apache Struts，它为编写自制控制器提供了一种替代方案。Apache Struts 是一个广泛使用的开源框架，已成为 Web 应用程序事实上的控制器框架。\n\
  \n最终，JSF 技术通过提供控制器作为框架的一部分，标准化了 MVC 模式的控制器方面。\n\nJSF 架构\n\n图 12-9 展示了简化的 JSF 架构。JSF\
  \ 有一个名为 `FacesServlet` 的前端控制器 Servlet。`FacesServlet` 扮演着将来自客户端的传入请求路由到正确位置的中介角色。如前所述，JSF\
  \ 带有可重用的 Web 组件，可用于开发用户界面。这些 UI 组件可以与称为*托管 Bean* 的对象相关联。这些托管 Bean 处理应用程序的逻辑，并与后端系统或组件（如\
  \ EJB）进行交互。JSF 中的每个 UI 组件都可以与不同的渲染工具包相关联，这些工具包可以为不同类型的设备生成不同的标记，例如 HTML 或 WML（无线标记语言）。\n\
  \n![9781430246923_Fig12-09.jpg](img/9781430246923_Fig12-09.jpg)\n\n图 12-9.  JSF\
  \ 架构\n\nJSF 生命周期\n\n图 12-10 展示了处理初始请求以及来自客户端应用程序或用户界面的*回传*的 JSF 生命周期。以下列表描述了生命周期的各个阶段：\n\
  \n\n\n*   **恢复视图**：如果传入的请求是初始请求，JSF 实现会创建视图。在视图创建过程中，每个 UI 组件的 UI 对象都会被创建并存储在组件树中。随后，UI\
  \ 视图的状态会被保存，以供后续请求使用。如果传入的请求是回传请求，JSF 实现会恢复已保存的 UI 以处理当前请求。\n*   **应用请求值**：在此阶段，作为请求一部分发送的数据会被用来更新属于该视图的\
  \ UI 对象。\n*   **处理验证**：在此阶段，已提交的数据会被验证。\n*   **更新模型**：在此阶段，后端对象会使用来自请求的已验证数据进行更新。接收到的数据转换也在此阶段发生。\n\
  *   **调用应用**：在此阶段，后端应用会被调用来完成请求的处理，并将响应渲染回客户端。\n*   **渲染响应**：在此生命周期阶段，UI 组件会被渲染，并将响应发送回客户端。\n\
  \n![9781430246923_Fig12-10.jpg](img/9781430246923_Fig12-10.jpg)\n\n图 12-10.  JSF\
  \ 生命周期\n\nJSF 应用\n\n一个典型的 JSF 应用包含以下部分：\n\n*   **JSP 页面或 Facelets**：应用中的 JSP 页面或\
  \ Facelets 包含封装在 JSP 标签中的 JSF UI 组件。每个 JSF 组件都是一个与标记无关的构建块。它包含三个主要部分：一个 UIComponent、一个渲染器和一个标签处理器。UIComponent\
  \ 定义了组件的行为（例如，单选按钮组或菜单等 UI 组件的行为）。它在运行时还与特定的渲染器相关联。渲染器负责决定向客户端渲染何种标记。*标签处理器*是一个\
  \ JSP 标签，允许在 JSP 中使用 JSF UI 组件。\n*   **导航模型**：关于控制如何在应用中流转的信息定义在一个名为 `faces-config.xml`\
  \ 的 XML 部署描述符中。该文件可以包含其他多种类型的信息，例如验证器、转换器和受管 Bean 列表。每个 JSF 应用可以包含多个 `faces-config.xml`\
  \ 文件。\n*   **受管 Bean**：这些是促进应用逻辑的普通 Java 类。它们可以用作来自后端组件数据的绑定，或者用于调用后端应用中的业务方法。\n\
  \nJSF 工具和组件\n\n仅仅拥有标准并不总是有帮助。来自开发者社区和供应商的支持对于一项技术的成功起着重要作用。虽然 JSF 的目标是极大地简化 Web\
  \ 应用开发，但仅靠标准化无法实现这一目标。我们需要为开发者提供全套可用的 UI 组件来构建应用，以及全套的开发工具来辅助应用构建过程。在过去几年中，JDeveloper、Java\
  \ Studio Creator 和 Eclipse 等开发工具已经为构建 JSF 应用提供了支持。Apache MyFaces 作为 JSF 框架的一个开源实现，提供了比\
  \ JSF 参考实现功能更丰富的组件。Oracle 也发布了超过 100 个标准 Faces 组件，统称为 ADF Faces。这些 ADF Faces 组件已捐赠给\
  \ Apache 软件基金会，现在已成为 MyFaces 项目的一部分，也称为 *Trinidad*。所有这些因素都为 JSF 技术的成功及其被开发者采用做出了重大贡献。\n\
  \n![image](img/sq.jpg) **注意**   关于 MyFaces 项目的信息可以在以下网址找到：`http://myfaces.apache.org`。\n\
  \n使用 JSF 和 EJB 开发 Web 应用\n\n在第 7 章中，我们做了大量工作来集成不同类型的 EJB（会话 Bean、MDB、实体和 Web 服务），以便为\
  \ Wines Online 应用开发一个功能完备的 EJB 后端基础设施。在本节中，我们将开发一个运行在 EJB 后端应用之上的 JSF 客户端应用，如图 12-11\
  \ 所示。\n\n![9781430246923_Fig12-11.jpg](img/9781430246923_Fig12-11.jpg)\n\n图 12-11.  示例应用架构\n\
  \n本节的主要目标是向您展示如何开发一组 JSF 页面，并将它们连接到后端应用中的 EJB 组件。考虑到这一点，我们将从用户如何通过一组 Web 页面导航来执行以下操作开始：\n\
  \n*   注册为新客户\n*   登录\n*   根据不同条件搜索葡萄酒\n*   将葡萄酒添加到购物车\n*   查看购物车内容\n*   提交订单\n\n\
  图 12-12 展示了应用流程，并说明了一组允许用户执行上述操作的 JSF 页面。我们将一次构建一个页面，根据需要将每个页面连接到 EJB 后端应用，并完成整个应用。\n\
  \n![9781430246923_Fig12-12.jpg](img/9781430246923_Fig12-12.jpg)\n\n图 12-12.  JSF\
  \ 应用页面流程\n\n我们将从一个简单的登录页面开始。\n\n登录页面\n\n为了简化登录过程，我们将使用客户的电子邮件地址来验证和授权订单。`Email`\
  \ 是第 7 章中使用的持久化单元中 `Customer` 实体的映射字段之一。清单 12-1 展示了 `login.jsp` 的代码。首先，有两个标签库指令、一些标准\
  \ HTML 标签以及一些用于渲染 JSF UI 组件的标签。任何包含 JSF 元素的页面都必须将 `f:view` 标签作为最外层的 JSF 标签。`h:form`\
  \ 标签创建一个 HTML 表单，`h:inputText` 标签创建一个输入文本字段，`h:commandButton` 标签在表单中创建一个提交按钮。您可能会注意到，`h:inputText`\
  \ 的 `value` 属性使用的语法与 HTML 中使用的不同。我们使用的是表达式语言 (EL) 语法 — `#{}`。表达式 `#{Login.email}`\
  \ 表示 JSP 页面想要访问 `Login` 对象中的 email 属性。`Login` 对象是一个*受管 Bean*，稍后将对此进行讨论。与 HTML 表单类似，`h:commandButton`\
  \ 有一个 `action` 属性。用于 `action` 的 EL 语法是 `#{Login.processLogin}`，这意味着当用户点击提交按钮时，一个\
  \ `POST` 操作将触发 `Login` 受管 Bean 中的 `processLogin` 方法。\n\n***清单 12-1.***  login.jsp\n\
  \n```\n<!DOCTYPE HTML PUBLIC \"-//W3C//DTD HTML 4.01 Transitional//EN\"\n\"http://www.w3.org/TR/html4/loose.dtd\"\
  >\n<%@ page contentType=\"text/html;charset=windows-1252\"%>\n<%@ taglib uri=\"\
  http://java.sun.com/jsf/html\" prefix=\"h\"%>\n<%@ taglib uri=\"http://java.sun.com/jsf/core\"\
  \ prefix=\"f\"%>\n<f:view>\n  <html>\n    <head>\n      <meta http-equiv=\"Content-Type\"\
  content=\"text/html; charset=windows-1252\"/>\n      <title>Login Page</title>\n\
      </head>\n    <body>\n      <h:form>\n        <h3> Beginning EJB: Wine Store\
  \ Application </h3>\n        <h5> Enter Email address: </h5>\n        <p>  <h:inputText\
  \ value=\"#{Login.email}\"/> </p>\n        <p>  <h:commandButton value=\"Login\"\
  \ action=\"#{Login.processLogin}\"/> </p>\n      </h:form>\n    </body>\n  </html>\n\
  </f:view>\n```\n\n本章后面“编译、部署和测试 JSF 应用”部分中的图 12-18 展示了 `login.jsp` 页面在浏览器中的渲染效果。\n\
  \n\n\n下一步是创建一个名为 `Login` 的受管 bean，它将与 `login.jsp` 配合使用。受管 bean 是 JSF 应用程序使用的 JavaBean。这些对象由\
  \ JSF 实现管理，并且这些对象中的属性和方法可以通过值绑定和方法绑定表达式从 JSP 页面引用。清单 12-2 展示了 `Login` 受管 bean。`Login`\
  \ 有三个属性字段及其访问器：`email`、`customer` 和 `shoppingCart`。我们在 `setShoppingCart()` 方法上方添加了一个\
  \ `@EJB` 注解。我们使用 setter 注入来注入我们在第 7 章中开发的有状态会话 bean `ShoppingCart`。我们的 bean 中还有一个额外的方法\
  \ `processLogin()`，它使用注入的 `shoppingCart` 有状态会话 bean 调用 `findCustomer(String email)`\
  \ 业务方法。如果客户数据库中存在该电子邮件 ID，此业务方法将返回一个 `Customer` 对象。我们还加入了额外的逻辑，以返回存储在 `faces-config.xml`\
  \ 文件中的字符串值，供导航模型使用。我们稍后将对此进行讨论。\n\n***清单 12-2.***  Login.java\n\n```\npackage com.apress.ejb.chapter12.view.managed;\n\
  \nimport com.apress.ejb.chapter07.ejb.ShoppingCartLocal;\nimport com.apress.ejb.chapter07.entities.Customer;\n\
  import javax.ejb.EJB;\n\npublic class Login\n{\n  public Login() {\n  }\n  String\
  \ email;\n  Customer customer;\n  ShoppingCartLocal shoppingCart;\n\npublic void\
  \ setEmail(String email) {\n    this.email = email;\n  }\n\npublic String getEmail()\
  \ {\n    return email;\n  }\n\npublic String processLogin() {\n    String navigation\
  \ = null;\n    customer = (Customer)shoppingCart.findCustomer(email);\n\nif (customer\
  \ != null) {\n      navigation = \"winehome\";\n    }\n    else {\n      navigation\
  \ = \"register\";\n    }\n    return navigation;\n  }\n\npublic void setCustomer(Customer\
  \ customer) {\n    this.customer = customer;\n  }\n\npublic Customer getCustomer()\
  \ {\n    return customer;\n  }\n\n@EJB\n  public void setShoppingCart(ShoppingCartLocal\
  \ shoppingCart) {\n    this.shoppingCart = shoppingCart;\n  }\n\npublic ShoppingCartLocal\
  \ getShoppingCart() {\n    return shoppingCart;\n  }\n}\n```\n\n部署描述符 `faces-config.xml`\
  \ 包含页面导航、受管 bean 等信息。清单 12-3 展示了 `faces-config.xml` 中与 `login.jsp` 之间的控制流。它还展示了\
  \ `Login` 类被注册为受管 bean。我们将 `Login` 受管 bean 的作用域设置为 `session`。这允许我们通过会话存储有关客户和购物车的信息，这样我们就不必为相同的信息重新查询后端应用程序。这也便于在其他页面中使用这些信息，并调用\
  \ `ShoppingCart` 有状态会话 bean 上的其他业务方法，而无需再次查找该 bean。此外，我们还创建了三个导航规则：\n\n*   从 `login.jsp`\
  \ 到 `winehome.jsp`，值为 `winehome`：如果登录成功，将使用此规则。\n*   从 `login.jsp` 到 `newCustomer.jsp`，值为\
  \ `register`：如果登录失败且客户想要注册为新客户，将使用此规则。\n*   从 `newCustomer.jsp` 到 `login.jsp`，值为\
  \ `success`：此规则用于在成功注册后将客户导航回登录页面。\n\n***清单 12-3.***  faces-config.xml\n\n```\n\
  <?xml version=\"1.0\" encoding=\"windows-1252\"?>\n<!DOCTYPE faces-config PUBLIC\n\
    \"-//Sun Microsystems, Inc.//DTD JavaServer Faces Config 1.1//EN\"\n  \"http://java.sun.com/dtd/web-facesconfig_1_1.dtd\"\
  >\n\n<faces-config xmlns=\"http://java.sun.com/JSF/Configuration\">\n\n<managed-bean>\n\
      <managed-bean-name>Login</managed-bean-name>\n    <managed-bean-class>com.apress.ejb.chapter12.view.managed.Login</managed-bean-class>\n\
      <managed-bean-scope>session</managed-bean-scope>\n  </managed-bean>\n\n<navigation-rule>\n\
      <from-view-id>/login.jsp</from-view-id>\n    <navigation-case>\n      <from-outcome>winehome</from-outcome>\n\
        <to-view-id>/winehome.jsp</to-view-id>\n    </navigation-case>\n    <navigation-case>\n\
        <from-outcome>register</from-outcome>\n      <to-view-id>/newCustomer.jsp</to-view-id>\n\
      </navigation-case>\n  </navigation-rule>\n\n<navigation-rule>\n    <from-view-id>/newCustomer.jsp</from-view-id>\n\
      <navigation-case>\n      <from-outcome>success</from-outcome>\n      <to-view-id>/login.jsp</to-view-id>\n\
      </navigation-case>\n  </navigation-rule>\n\n</faces-config>\n```\n\n到目前为止，我们已经向您展示了如何通过一个简单的登录页面开始使用\
  \ JSF 应用程序，该页面可以查找 EJB 并调用业务方法。在接下来的几节中，我们将继续完成葡萄酒商店 JSF 应用程序的其余页面。\n\n新客户注册页面\n\
  \n清单 12-4 展示了 `newCustomer.jsp` JSF 页面的代码。此页面与之前创建的 `login.jsp` 页面非常相似，只是它有更多用于捕获客户信息的输入字段。JSP\
  \ 页面中的所有输入字段（名字、姓氏、电话、电子邮件、地址 1、地址 2、城市、州、邮政编码、信用卡和信用卡到期日期）都具有值绑定表达式，这些表达式映射到 `NewCustomer`\
  \ 受管 bean 中的属性。它还有一个提交按钮，其操作使用表达式 `#{NewCustomer.AddNewCustomer}` 映射到受管 bean 中的\
  \ `AddNewCustomer()` 方法。\n\n***清单 12-4.***  newCustomer.jsp\n\n\n\n```\n<!DOCTYPE\
  \ HTML PUBLIC \"-//W3C//DTD HTML 4.01 Transitional//EN\"\n\"http://www.w3.org/TR/html4/loose.dtd\"\
  >\n<%@ page contentType=\"text/html;charset=windows-1252\"%>\n<%@ taglib uri=\"\
  http://java.sun.com/jsf/html\" prefix=\"h\"%>\n<%@ taglib uri=\"http://java.sun.com/jsf/core\"\
  \ prefix=\"f\"%>\n<f:view>\n  <html>\n    <head>\n      <meta http-equiv=\"Content-Type\"\
  \ content=\"text/html; charset=windows-1252\"/>\n      <title>新客户页面</title>\n    </head>\n\
      <body>\n      <h:form>\n        <h1> EJB 入门：葡萄酒商店应用 </h1>\n        输入以下信息以注册为新客户：\n\
          <table cellspacing=\"2\" cellpadding=\"3\" border=\"1\" width=\"100%\">\n\
            <tr>\n            <td width=\"33%\">名</td>\n            <td width=\"67%\"\
  > <h:inputText value=\"#{NewCustomer.firstName}\"/> </td>\n          </tr>\n          <tr>\n\
              <td width=\"33%\">姓</td>\n            <td width=\"67%\"> <h:inputText\
  \ value=\"#{NewCustomer.lastName}\"/> </td>\n          </tr>\n          <tr>\n            <td\
  \ width=\"33%\">电话</td>\n            <td width=\"67%\"> <h:inputText value=\"#{NewCustomer.phone}\"\
  /> </td>\n          </tr>\n          <tr>\n            <td width=\"33%\">电子邮件</td>\n\
              <td width=\"67%\"> <h:inputText value=\"#{NewCustomer.email}\"/> </td>\n\
            </tr>\n          <tr>\n            <td width=\"33%\">街道 1</td>\n            <td\
  \ width=\"67%\"> <h:inputText value=\"#{NewCustomer.streetOne}\"/> </td>\n          </tr>\n\
