      }\n  }\n}\n\n请注意，我们没有使用 `@EJB` 注解注入 EJB 外观，而是通过其构造函数实例化了 Java 外观（`JavaServiceFacade`），并向其传递了一个\
  \ `RESOURCE_LOCAL` 持久化单元的名称，从原始调用中我们可以看到该名称为 `\"Chapter07-WineAppUnit-ResourceLocal\"\
  `。这个辅助类正在调用外观上的 `persistEntity()` 和 `removeCustomerOrder()` 等操作，而没有显式地要求提交操作，这表明该外观使用了隐式提交行为。\n\
  \n我们还注意确保在使用外观后，通过其自身的 `close()` 方法通知它。这允许它释放自己的资源；特别是它的 `EntityManagerFactory`\
  \ 和 `EntityManager` 资源。这些是您在使用 EJB 时无需担心的内务管理项，因为 EJB 容器会为您处理这一级别的资源管理。\n\n使用应用程序管理的\
  \ EntityManager 的 Java 外观\n\n这就引出了 Java 外观本身的细节。这个外观实际上在第 7 章中就已经悄悄引入了，它与我们当时共享的通用持久化归档捆绑在一起。现在，我们将通过检查清单\
  \ 8-4 中的 `JavaServiceFacade` 类来了解它是如何处理的：\n\n***清单 8-4.***  JavaServiceFacade.java，一个基于\
  \ JPA 实体的、具有事务性的 Java 外观，展示了隐式提交行为\n\n```\npublic class JavaServiceFacade {\n  private\
  \ final EntityManagerFactory emf;\n  private final EntityManager em;\n\npublic JavaServiceFacade()\
  \ {\n    this(\"Chapter13-EmbeddableEJBTests-ResourceLocal\");\n  }\n\npublic JavaServiceFacade(String\
  \ persistenceUnit) {\n    emf = Persistence.createEntityManagerFactory(persistenceUnit);\n\
      em = emf.createEntityManager();\n  }\n\npublic void close() {\n    if (em !=\
  \ null && em.isOpen()) {\n      em.close();\n    }\n    if (emf != null && emf.isOpen())\
  \ {\n      emf.close();\n    }\n  }\n\n/**\n   * 对持久化上下文中托管实体所做的所有更改都将应用到数据库并提交。\n\
     */\n  private void commitTransaction() {\n    final EntityTransaction entityTransaction\
  \ = em.getTransaction();\n    if (!entityTransaction.isActive()) {\n      entityTransaction.begin();\n\
      }\n    entityTransaction.commit();\n  }\n\npublic <T> T persistEntity(T entity)\
  \ {\n    em.persist(entity);\n    commitTransaction();\n    return entity;\n  }\n\
  \npublic <T> T mergeEntity(T entity) {\n    entity = em.merge(entity);\n    commitTransaction();\n\
      return entity;\n  }\n\npublic <T> void removeEntity(T entity) {\n    em.remove(em.merge(entity));\n\
      commitTransaction();\n  }\n\npublic <T> List<T> findAll(Class<T> entityClass)\
  \ {\n    CriteriaQuery cq = em.getCriteriaBuilder().createQuery();\n    cq.select(cq.from(entityClass));\n\
      return em.createQuery(cq).getResultList();\n  }\n\npublic <T> int getCount(Class<T>\
  \ entityClass) {\n    CriteriaQuery cq = em.getCriteriaBuilder().createQuery();\n\
      Root<T> rt = cq.from(entityClass);\n    cq.select(em.getCriteriaBuilder().count(rt));\n\
      javax.persistence.Query q = em.createQuery(cq);\n    return ((Long) q.getSingleResult()).intValue();\n\
    }\n\n/**\n   * <code>select object(wine) from Wine wine where wine.year = :year</code>\n\
     */\n  public List<Wine> getWineFindByYear(int year) {\n    return em.createNamedQuery(\"\
  Wine.findByYear\", Wine.class).setParameter(\"year\", year).getResultList();\n  }\n\
  \n/**\n   * <code>select object(wine) from Wine wine where wine.country = :country</code>\n\
     */\n  public List<Wine> getWineFindByCountry(String country) {\n    return em.createNamedQuery(\"\
  Wine.findByCountry\", Wine.class).setParameter(\"country\", country).getResultList();\n\
    }\n\n/**\n   * <code>select object(wine) from Wine wine where wine.varietal =\
  \ :varietal</code>\n   */\n  public List<Wine> getWineFindByVarietal(String varietal)\
  \ {\n    return em.createNamedQuery(\"Wine.findByVarietal\", Wine.class).setParameter(\"\
  varietal\", varietal).getResultList();\n  }\n}\n```\n\n\n\n该外观类从`EntityManagerFactory`获取其`EntityManager`，因此该`EntityManager`的生命周期现在由外观类负责，而非容器。应用程序管理的`EntityManager`绑定到一个持久化上下文缓存，该缓存可以存在于事务上下文之外，并跨越多个事务存活，这本质上与有状态会话\
  \ Bean 的`EXTENDED`持久化上下文相同。这使得诸如`EntityManager.persist()`之类的调用可以在事务开始之前执行。这种事务外的调用会将新实体添加到持久化上下文中，但不会立即产生更新数据库的\
  \ SQL 调用。\n\n![image](img/sq.jpg) **注意**   即使在 EntityManager 事务开始之前，持久化上下文也会在需要时悄悄启动自己的私有事务，以在调用\
  \ EntityManager.persist()时处理任何 ID 生成器请求。由于我们将实体的主键字段绑定到了@GeneratedValue ID 生成器，这些\
  \ ID 实际上会在 persist()期间被急切地获取并分配给实体。\n\n持久化上下文缓存不会刷新到数据库，直到事务通过`EntityTransaction.begin()`调用实际开始，该调用可能紧接在`EntityTransaction.commit()`调用执行之前。也就是说，你可以选择在将任何更改应用到持久化上下文之前开始事务，或者将事务的开始推迟到准备提交时。在我们的示例中，我们将`begin()`调用推迟到`commitTransaction()`方法内部：\n\
  \n```\nprivate void commitTransaction() {\n  final EntityTransaction entityTransaction\
  \ = em.getTransaction();\n  if (!entityTransaction.isActive()) {\n    entityTransaction.begin();\n\
    }\n  entityTransaction.commit();\n}\n```\n\n将此行为与使用默认 CMT 行为`TransactionAttributeType.REQUIRED`的无状态会话\
  \ Bean 进行对比，后者在调用会话 Bean 方法时隐式开始一个事务，并在从该方法调用返回时将工作提交到数据库。事务在该方法调用的边界内开始和结束，并且此类\
  \ CMT Bean 永远不会向其客户端公开`commitTransaction()`或`rollbackTransaction()`方法，正如我们接下来将在\
  \ BMT 示例中看到的那样。隐式提交行为避免了未提交的数据在缓存中悬而未决，从而容易因硬件或网络故障而丢失。然而，它也会在每次执行原子操作时产生额外的后端处理来完成工作并提交（更不用说，每次调用都会创建和销毁一个持久化上下文缓存），这可能会影响性能。\n\
  \n一个 RESOURCE_LOCAL `EntityManager`为其客户端提供一个`EntityTransaction`对象来管理事务。清单 8-4 中的`commitTransaction()`方法演示了其用法，并且该外观类的隐式行为是通过在每个更新持久化上下文（通过\
  \ persist、merge 或 remove 操作）的方法末尾调用`commitTransaction()`的策略来实现的。\n\n使用 CMT 会话 Bean\
  \ 过滤测试数据\n\n在使用 Java 外观类（通过一个工具类）填充演示数据后，servlet 客户端随后调用一个无状态 CMT 会话 Bean `OrderProcessorCMTBean`来过滤这些数据，移除可能从先前调用中创建的`Customer`和`Wine`实体。我们本可以将数据填充和数据过滤都放在一个绑定到单个持久化单元的外观类中，但我们在这里故意混合搭配选项，以展示它们如何交互。使这成为可能的原因是，两个持久化单元（一个\
  \ RESOURCE_LOCAL 和一个 JTA）都指向同一个数据库连接。\n\n```\n\n//  通过移除任何电子邮件为'xaction.head@yahoo.com'的现有\
  \ Customer\n//  以及任何国家为'United States'的现有 Wine 来过滤数据。\nout.print(\"<h2>Filtering\
  \ Demo Data... \");\nSystem.out.println(orderProcessorCMT.initialize());\nout.println(\"\
  done</h2>\");\n```\n\n无状态会话 Bean `OrderProcessorCMTBean`没有显式声明其事务行为，因此它采用默认的`TransactionManagement`值——CMT——这等同于对\
  \ Bean 进行如下注解：\n\n```\n@TransactionManagement(TransactionManagementType.CONTAINER)\n\
  ```\n\n由于`initialize()`方法没有使用`TransactionAttribute`覆盖进行注解，并且`OrderProcessorCMTBean`没有在\
  \ Bean 级别为其所有方法覆盖默认的`TransactionAttribute`值，因此它采用默认的事务属性值，等同于以下内容：\n\n```\n@TransactionAttribute(TransactionAttributeType.REQUIRED)\n\
  ```\n\n由于客户端既没有开始也没有继承一个事务，因此 EJB 容器会在`initialize()`方法持续期间创建并开始一个事务，并且在该方法成功完成后提交所有更改。CMT\
  \ Bean 总是会表现出隐式提交行为，因为容器不允许它开始的事务在方法完成后继续存在。隐式提交会导致在该方法执行期间所做的任何更改被持久化，并应用到数据库中，以便所有客户端此后都能看到这些更改。\n\
  \n在客户端创建新的 Customer 和 CartItem 实体实例\n\n客户端的下一步是创建一个新的`Customer`实体实例（实际上是抽象`Customer`实体的具体`Individual`实体子类），创建一些`Wine`实例，并将由`CartItem`实例表示的几瓶酒添加到客户的购物车中：\n\
  \n```\n//  创建一个 Customer 并添加一些 CartItem 及其关联的 Wine\nIndividual customer = new Individual();\n\
  customer.setFirstName(\"Transaction\");\ncustomer.setLastName(\"Head\");\ncustomer.setEmail(PopulateDemoData.TO_EMAIL_ADDRESS);\n\
  for (int i = 0; i < 5; i++) {\n  final Wine wine = new Wine();\n  wine.setCountry(\"\
  United States\");\n  wine.setDescription(\"Delicious wine\");\n  wine.setName(\"\
  Xacti\");\n  wine.setRegion(\"Dry Creek Valley\");\n  wine.setRetailPrice(new Float(20.00D\
  \ + i));\n  wine.setVarietal(\"Zinfandel\");\n  wine.setYear(2000 + i);\n  orderProcessorCMT.persistEntity(wine);\n\
  \nfinal CartItem cartItem = new CartItem();\n  cartItem.setCreatedDate(new Timestamp(System.currentTimeMillis()));\n\
    cartItem.setCustomer(customer);\n  cartItem.setQuantity(12);\n  cartItem.setWine(wine);\n\
  \ncustomer.addCartItem(cartItem);\n}\n```\n\n请注意，在此阶段，只有`wine`实例被显式持久化。所有其他创建的实体都直接或间接地与`customer`实例关联，并且它们仅存在于\
  \ servlet 的方法上下文中。在创建这些实体对象、分配其普通属性以及将它们相互关联的过程中，不涉及任何事务。`wine`实例故意不通过级联规则与其他对象关联，因此必须显式持久化它们。\n\
  \n持久化 Customer\n\n在创建了`Customer`和关联的`CartItem`对象之后，客户端将`Customer`传递给`OrderProcessorCMT`\
  \ Bean 的`persistEntity()`方法。由于`Customer`和`CartItem`实体上的关系被注解为`cascade = {CascadeType.ALL}`，持久化`Customer`实体的操作会级联到所有关联的实体，因此它们也都被持久化了。此方法调用将开始一个事务，将客户和相关对象持久化到数据库，并提交工作：\n\
  \n\n\n```\n//  持久化 Customer，依赖级联设置来持久化所有相关的 CartItem 实体。\n//  调用后，Customer 实例将拥有一个由\
  \ EJB 容器在持久化时分配的 ID 值。\norderProcessorCMT.persistEntity(customer);\n```\n\n另请注意，由于我们在持久化单元中为每个实体的基类设置了\
  \ ID 生成器，它们的 `id` 字段会在持久化时自动填充，并且映射到实体关系的外键列也会正确连接。对于使用表生成器的 `BusinessContext` 类，其\
  \ `id` 字段的 ID 生成器定义如下：\n\n```\n@Id\n@Column(nullable = false)\n@GeneratedValue(strategy\
  \ = GenerationType.TABLE, generator = \"BusinessContact_ID_Generator\")\nprivate\
  \ Integer id;\n```\n\n我们传递给 `persistEntity()` 的 `Customer` 实例会被更新，从而同时成为受管和持久化状态。如果我们通过\
  \ `OrderProcessorCMTBean` 的远程接口调用 `persistEntity()`，该调用将使用按值传递语义，我们需要在方法结果中捕获更新后的\
  \ `Customer` 实例。由于我们是在 Java EE 层内以本地模式调用会话 Bean，使用的是按引用传递语义，因此 `Customer` 实例会直接更新。\n\
  \n在 `persistEntity()` 调用结束时，`Customer`（`Individual`）和所有关联数据现在已应用到数据库，并对所有客户端（包括我们自己的客户端）可用。\n\
  \n创建 CustomerOrder\n\n`Customer` 实体的一个实例现在作为数据库中的持久化行存在，因此我们可以使用 `customer` 调用 `createCustomerOrder()`\
  \ 来创建一个新的 `CustomerOrder`，并为 `Customer` 上的每个 `CartItem` 创建一个 `OrderItem`：\n\n```\n\
  //  创建客户订单，并从 CartItem 创建 OrderItem\nfinal CustomerOrder customerOrder =\n  orderProcessorCMT.createCustomerOrder(customer);\n\
  ```\n\n同样，`createCustomerOrder()` 方法定义没有使用事务属性进行注解，因此它默认为 `REQUIRED`，EJB 容器会在该方法持续期间创建并开始一个新事务，然后在将控制权返回给客户端时提交该事务。请注意，`createCustomerOrder()`\
  \ 方法的实现委托给了另一个方法 `createCustomerOrderUsingSupports()`，该方法的注解如下：\n\n```\n@TransactionAttribute(TransactionAttributeType.SUPPORTS)\n\
  public CustomerOrder createCustomerOrderUsingSupports(Customer customer) {...}\n\
  ```\n\n这种委托纯粹是为了让我们能够说明从标记为 `REQUIRED` 的方法调用标记为 `SUPPORTS` 的方法时所涉及的事务行为。从客户端调用的方法\
  \ `createCustomerOrder()` 会创建一个事务，该事务会传播给其委托方法 `createCustomerOrderUsingSupports()`。后一个方法继承了\
  \ EJB 容器为其调用者创建的事务上下文。如果客户端直接调用 `createCustomerOrderUsingSupports()`，那么当 `remove()`\
  \ 和 `persist()` 操作在事务上下文之外执行时，其执行过程中将会抛出异常。\n\n`createCustomerOrderUsingSupports()`\
  \ 方法内部做了很多事情。因为 customer 参数可能是分离的（在我们的例子中并非如此，因为我们的 servlet 在本地 Java EE 环境中运行），所以需要将其转换为受管实例。如果它已经是受管实例，这种预防措施是不必要的，但也没有坏处：\n\
  \n```\nif (!em.contains(customer)) {\n  customer = em.merge(customer);\n}\n```\n\
  \n接下来，创建 `CustomerOrder` 实例并将其添加到 `Customer`。我们的 `addCustomerOrder()` 方法实现将 `CustomerOrder`\
  \ 添加到 `Customer` 的 `customerOrderList` 属性，并且还分配了 `CustomerOrder` 上的 `customer` 反向指针属性，从而有效地建立了双向关系：\n\
  \n```\nfinal CustomerOrder customerOrder = new CustomerOrder();\ncustomer.addCustomerOrder(customerOrder);\n\
  ```\n\n然后，用新的 `OrderItem` 填充 `CustomerOrder`，以匹配 `Customer` 购物车中的每个 `CartItem`。我们将客户的\
  \ `CartItem` 列表复制到一个 `ArrayList` 中，这样我们就可以对其进行迭代，并在 `CustomerOrder` 中创建相应的 `OrderItem`\
  \ 后，从 `Customer` 中移除每个 `CartItem`，而不会导致并发异常：\n\n```\nfinal Timestamp orderDate =\
  \ new Timestamp(System.currentTimeMillis());\nfinal List<CartItem> cartItemList\
  \ =\n        new ArrayList(customer.getCartItemList());\nfor (CartItem cartItem\
  \ : cartItemList) {\n  //  为此 CartItem 创建一个新的 OrderItem\n  final OrderItem orderItem\
  \ = new OrderItem();\n  orderItem.setOrderDate(orderDate);\n  orderItem.setPrice(cartItem.getWine().getRetailPrice());\n\
  \  orderItem.setQuantity(cartItem.getQuantity());\n  orderItem.setStatus(\"Order\
  \ Created\");\n  orderItem.setWine(cartItem.getWine());\n  customerOrder.addOrderItem(orderItem);\n\
  \n//  移除 CartItem\n  customer.removeCartItem(cartItem);\n}\n```\n\n每创建一个 `OrderItem`，其对应的\
  \ `CartItem` 就会从 `Customer` 中移除。注解 `Customer.orderItemList` 的 `@OneToMany` 关系上的\
  \ `orphanRemoval=true` 属性确保每个 `CartItem` 从 `Customer` 中移除后，当上下文事务提交时，它也会自动从持久化存储中移除。\n\
  \n最后，新填充的 `CustomerOrder` 被持久化并返回给调用者：\n\n```\nreturn persistEntity(customerOrder);\n\
  ```\n\n事务直到 `createCustomerOrderUsingSupports()` 方法完成并且控制权从包装方法 `createCustomerOrder()`\
  \ 返回后才提交。假设我们使用的是采用两阶段提交的 JTA 事务（例如，由 EJB 容器创建的容器管理事务），那么如果这两个方法中的任何一个在执行过程中出现问题，整个事务都将回滚，并且此客户端或任何外部应用程序都不会知道曾经创建过一个\
  \ `CustomerOrder`。\n\n这能通过 ACID 测试吗？\n\n表征有效事务的核心 ACID 要求是否得到满足？让我们看看 EJB 如何解决每一个要求。\n\
  \n原子性\n\nEJB 容器确保，每当调用标记为 `REQUIRED` 或 `REQUIRES_NEW` 的无状态 CMT 方法时，如果容器介入创建一个新事务（对于\
  \ `REQUIRES_NEW` 总是会发生这种情况），它将在退出该方法时解析该事务。如果方法成功完成，并且 Bean 代码没有调用 `EJBContext.setRollbackOnly()`，则事务将被提交。如果方法抛出异常，或者调用了\
  \ `EJBContext.setRollbackOnly()`，则事务将被回滚。这两个事务属性是容器可能介入创建新事务的唯一属性。对于所有其他事务属性，要么涉及外部管理的事务（在这种情况下，容器在退出方法时不会介入提交它），要么在没有任何事务上下文的情况下调用该方法。在后一种情况下，由于我们使用的是事务范围的持久化上下文并且没有事务上下文，因此对\
  \ `persist()`、`merge()` 或 `remove()` 的调用将导致 `javax.persistence.TransactionRequiredException`。如果我们使用带有扩展持久化上下文的有状态会话\
  \ Bean，即使在没有事务的情况下，这些更改也会被持久化上下文跟踪，并且如果随后创建（并与此持久化上下文关联）并提交了事务，这些更改将被应用。\n\n一致性\n\
  \n\n\n任何数据库约束或并发条件（无论是在数据库中实施还是在 EJB 容器中实施）都保证在通过 EJB 服务提交事务时得到满足。违反这些条件将导致 EJB\
  \ 容器抛出异常，并且事务将自动回滚。成功提交表明所有定义的约束条件均已满足。\n\n隔离性\n\n此要求主要取决于底层 JTA 资源。每个资源都可能公开其自己的可配置隔离级别设置，以便为事务中涉及的资源提供不同程度的一致性。隔离级别决定了事务内的资源能够看到事务中其他资源的部分（事务中）状态的程度，并且主要转化为资源内的缓存一致性设置。隔离性还确保事务不应看到另一个事务的未提交数据。为了保持数据库中立性，我们的示例未尝试配置这些设置。\n\
  \n持久性\n\n这同样主要取决于事务中涉及的底层 JTA 资源（例如，数据库或邮件服务器）。在 JTA 事务结束时，任何此类资源在被查询时都应能够显示数据的新状态。我们通过以下方式演示了这一点：在\
  \ `createCustomerOrder()` 方法及其封装的事务完成后，从客户端查询新的 `CustomerOrder` 的详细信息。\n\n此方法的优点\n\
  \n使用带有 CMT 划分的默认无状态会话 Bean 的一个主要优点是，客户端无需关心事务逻辑的开始、结束或其他协调工作。此外，调用 Bean 方法的线程上当前生效的任何事务上下文都会自动传播到该方法调用（如果事务属性是\
  \ `REQUIRED` 或 `SUPPORTS`）。对 `OrderProcessorCMT` Bean 的每次调用要么成功完成（在这种情况下可以假定工作已持久应用），要么导致异常（在这种情况下，该方法中执行的工作将完全回滚）。这是一个非常简单的模型。\n\
  \n此方法的局限性\n\n通常，简单是好的，但有时它过于局限。虽然此示例允许客户端在客户端层创建和操作新的实体实例（例如，当它创建 `Customer`、`Wine`\
  \ 和 `CartItem` 实例时），但客户端必须依赖 EJB 来确保其对实体模型所做的更新在事务内持久化到数据库，因为事务总是在控制权交还给客户端之前由 EJB\
  \ 容器启动和终止。\n\n在下一个示例中，我们将展示如何使用有状态会话 Bean，结合 BMT 和扩展持久化上下文，使客户端在应用程序的事务行为方面拥有更大的灵活性（以及相应的责任）。\n\
  \n![image](img/sq.jpg) **注意**   EJB 用户中普遍存在一种观念，即出于性能原因应避免使用有状态会话 Bean。我们进行的性能测试强烈表明，有状态会话\
  \ Bean 被错误地诋毁了，并且如果正确使用，它们实际上可以提高性能。此外，在 EJB 中，它们的价值得到了提升，因为它们为您提供了 `PersistenceContext.EXTENDED`\
  \ 选项，允许跨事务缓存实体实例以供使用。\n\n带有 BMT 划分和扩展持久化上下文的有状态会话 Bean\n\n为了说明扩展 EJB 事务支持的范围，以下是使用有状态\
  \ BMT 会话 Bean `OrderProcessorBMTBean.java` 编写的相同应用程序。此 BMT 示例也利用了 EJB 的内置事务支持，但并非依赖容器在方法边界管理事务划分，而是展示了如何在企业\
  \ Bean 代码内部显式划分事务，并且也可以从客户端进行控制。\n\n使用有状态会话 Bean 时，不要求您使用 BMT 划分，实际上此选项通常不被使用。我们在清单\
  \ 8-5 中展示它，以说明如果您愿意，应如何使用它。\n\n***清单 8-5.***  OrderProcessorBMTBean.java，一个使用 BMT\
  \ 划分和扩展持久化上下文的有状态会话 Bean\n\n```\n@Stateful(name = \"OrderProcessorBMT\", mappedName\
  \ = \"Chapter08-TransactionSamples-OrderProcessorBMT\")\n@TransactionManagement(TransactionManagementType.BEAN)\n\
  @Interceptors(OrderProcessorBMTBeanTxnInterceptor.class)\npublic class OrderProcessorBMTBean\
  \ {\n  @Resource\n  SessionContext sessionContext;\n  @PersistenceContext(unitName\
  \ = \"Chapter08-TransactionSamples-JTA\", type = PersistenceContextType.EXTENDED)\n\
    private EntityManager em;\n\n/**\n   * 删除任何电子邮件为 'wineapp@yahoo.com' 的现有 Customer\
  \ 以及任何\n   * 国家为 'United States' 的现有 Wine\n   */\n  public String initialize() throws\
  \ HeuristicMixedException,\n      HeuristicRollbackException,\n      RollbackException,\n\
        SystemException {\n    StringBuffer strBuf = new StringBuffer();\n    strBuf.append(\"\
  已删除 \");\n    int i = 0;\n\n//  通过删除任何电子邮件为 'wineapp@yahoo.com'（或 user.properties\
  \ 文件中定义的任何内容）的现有 Customer 来过滤数据。\n    //  对 OrderProcessorBMT 的事务性方法的第一次调用将开始一个事务。\n\
      for (Customer customer\n        : getCustomerFindByEmail(PopulateDemoData.TO_EMAIL_ADDRESS))\
  \ {\n      em.remove(customer);\n      i++;\n    }\n    strBuf.append(i);\n    strBuf.append(\"\
  \ 个 Customer 和 \");\n\n//  删除任何国家为 'United States' 的现有 Wine\n    i = 0;\n    for\
  \ (Wine wine : getWineFindByCountry(\"United States\")) {\n      em.remove(wine);\n\
        i++;\n    }\n    strBuf.append(i);\n    strBuf.append(\" 个 Wine\");\n\n//  应用这些更改，提交实体删除操作\n\
      commitTransaction();\n\nreturn strBuf.toString();\n  }\n\n/**\n   * 根据客户购物车中的商品创建新的\
  \ CustomerOrder。创建一个\n   * 新的 CustomerOrder 实体，然后为客户购物车中找到的每个 CartItem 创建一个新的 OrderItem\
  \ 实体。\n   *\n   * 使用 CMT 和默认的 Required 事务属性，如果此方法\n   * 在没有事务上下文的情况下被调用，则 EJB 容器将在调用该方法时创建一个新事务，\n\
     * 并在成功完成该方法时提交该事务。\n   *\n   * @return 状态消息（纯文本）\n   */\n  public CustomerOrder\
  \ createCustomerOrder(Customer customer) throws Exception {\n    if (customer ==\
  \ null) {\n      throw new IllegalArgumentException(\"OrderProcessingBean.createCustomerOrder():\
  \ 未指定客户\");\n    }\n\n//  确保我们正在处理一个受管理的 Customer 对象\n    customer = em.find(Customer.class,\
  \ customer.getId());\n\n\n\nCustomerOrder customerOrder = new CustomerOrder();\n\
      customer.addCustomerOrder(customerOrder);\n    final Timestamp orderDate = new\
  \ Timestamp(System.currentTimeMillis());\n    //  克隆 CartItem 列表，以便从 Customer 中移除\
  \ CartItem 条目，\n    //  而不会在迭代器上引发 ConcurrentModificationException。\n    final List<CartItem>\
  \ cartItemList = new ArrayList(customer.getCartItemList());\n    for (CartItem cartItem\
  \ : cartItemList) {\n      //  为此 CartItem 创建一个新的 OrderItem\n      final OrderItem\
  \ orderItem = new OrderItem();\n      orderItem.setOrderDate(orderDate);\n      orderItem.setPrice(cartItem.getWine().getRetailPrice());\n\
        orderItem.setQuantity(cartItem.getQuantity());\n      orderItem.setStatus(\"\
  Order Created\");\n      orderItem.setWine(cartItem.getWine());\n      customerOrder.addOrderItem(orderItem);\n\
  \n//  移除 CartItem。请注意，'orphanRemoval' 标志将确保\n      //  一旦 cartItem 与客户解除关联，它就会从数据库中删除。\n\
        customer.removeCartItem(cartItem);\n    }\n\n//  Customer 上的级联规则将导致 CustomerOrder\
  \ 在 Customer 合并时被持久化\n    em.merge(customer);\n\nreturn customerOrder;\n  }\n\n\
  @ExcludeClassInterceptors\n  public void commitTransaction() throws HeuristicMixedException,\
  \ HeuristicRollbackException, RollbackException, SystemException {\n    final UserTransaction\
  \ txn = sessionContext.getUserTransaction();\n    if (txn.getStatus() == Status.STATUS_ACTIVE)\
  \ {\n      txn.commit();\n    }\n  }\n\n@ExcludeClassInterceptors\n  public void\
  \ rollbackTransaction() throws SystemException {\n    final UserTransaction txn\
  \ = sessionContext.getUserTransaction();\n    if (txn.getStatus() == Status.STATUS_ACTIVE)\
  \ {\n      txn.rollback();\n    }\n  }\n\n@ExcludeClassInterceptors\n  public boolean\
  \ isTransactionDirty() throws SystemException {\n    final UserTransaction txn =\
  \ sessionContext.getUserTransaction();\n    return Boolean.valueOf(txn.getStatus()\
  \ == Status.STATUS_ACTIVE);\n  }\n\n@ExcludeClassInterceptors\n  public Object queryByRange(String\
  \ jpqlStmt, int firstResult, int maxResults) {\n    Query query = em.createQuery(jpqlStmt);\n\
      if (firstResult > 0) {\n      query = query.setFirstResult(firstResult);\n    }\n\
      if (maxResults > 0) {\n      query = query.setMaxResults(maxResults);\n    }\n\
      return query.getResultList();\n  }\n\npublic <T> T persistEntity(T entity) {\n\
      em.persist(entity);\n    return entity;\n  }\n\npublic <T> T mergeEntity(T entity)\
  \ {\n    return em.merge(entity);\n  }\n\npublic <T> void removeEntity(T entity)\
  \ {\n    em.remove(em.merge(entity));\n  }\n\n@ExcludeClassInterceptors\n  public\
  \ <T> List<T> findAll(Class<T> entityClass) {\n    CriteriaQuery cq = em.getCriteriaBuilder().createQuery();\n\
      cq.select(cq.from(entityClass));\n    return em.createQuery(cq).getResultList();\n\
    }\n\n@ExcludeClassInterceptors\n  public <T> List<T> findAllByRange(Class<T> entityClass,\
  \ int[] range) {\n    CriteriaQuery cq = em.getCriteriaBuilder().createQuery();\n\
      cq.select(cq.from(entityClass));\n    Query q = em.createQuery(cq);\n    q.setMaxResults(range[1]\
  \ - range[0]);\n    q.setFirstResult(range[0]);\n    return q.getResultList();\n\
    }\n\n/**\n   * <code>select o from Customer o where o.email = :email</code>\n\
     */\n  @ExcludeClassInterceptors\n  public List<Customer> getCustomerFindByEmail(String\
  \ email) {\n    return em.createNamedQuery(\"Customer.findByEmail\", Customer.class).setParameter(\"\
  email\", email).getResultList();\n  }\n\n/**\n   * <code>select object(wine) from\
  \ Wine wine where wine.year = :year</code>\n   */\n  @ExcludeClassInterceptors\n\
    public List<Wine> getWineFindByYear(Integer year) {\n    return em.createNamedQuery(\"\
  Wine.findByYear\", Wine.class).setParameter(\"year\", year).getResultList();\n  }\n\
  \n/**\n   * <code>select object(wine) from Wine wine where wine.country = :country</code>\n\
     */\n  @ExcludeClassInterceptors\n  public List<Wine> getWineFindByCountry(String\
  \ country) {\n    return em.createNamedQuery(\"Wine.findByCountry\", Wine.class).setParameter(\"\
  country\", country).getResultList();\n  }\n\n/**\n   * <code>select object(wine)\
  \ from Wine wine where wine.varietal = :varietal</code>\n   */\n  @ExcludeClassInterceptors\n\
    public List<Wine> getWineFindByVarietal(String varietal) {\n    return em.createNamedQuery(\"\
  Wine.findByVarietal\", Wine.class).setParameter(\"varietal\", varietal).getResultList();\n\
    }\n\n/**\n   * <code>select o from InventoryItem o where o.wine = :wine</code>\n\
     */\n  @ExcludeClassInterceptors\n  public List<InventoryItem> getInventoryItemFindItemByWine(Object\
  \ wine) {\n    return em.createNamedQuery(\"InventoryItem.findItemByWine\", InventoryItem.class).setParameter(\"\
  wine\", wine).getResultList();\n  }\n}\n\n与此有状态会话 Bean 耦合的是一个拦截器类，它用于拦截每个通过 EntityManager\
  \ 应用更改的方法，以自动开始一个事务。这种模式类似于 SQL 的事务模型，在该模型中，每次调用 INSERT、UPDATE 或 DELETE 等 DML 操作时，都会隐式地开始一个事务。因此，客户端只需调用\
  \ COMMIT 或 ROLLBACK 来结束事务，而无需显式调用开始事务。拦截器类如下所示，见清单 8-6：\n\n***清单 8-6.***  OrderProcessorBMTBeanTxnInterceptor.java，一个由\
  \ OrderProcessorBMTBean 使用的拦截器，用于在每次通过 EntityManager 应用更改的方法被调用时，使用 BMT Bean 的 SessionContext\
  \ 中的 UserTransaction 开始一个 JTA 事务\n\n```\nclass OrderProcessorBMTBeanTxnInterceptor\
  \ {\n  public OrderProcessorBMTBeanTxnInterceptor() {\n  }\n\n@AroundInvoke\n  Object\
  \ beginTrans(InvocationContext invocationContext) throws Exception {\n    final\
  \ OrderProcessorBMTBean orderProcessorBMTBean = (OrderProcessorBMTBean) invocationContext.getTarget();\n\
      final UserTransaction txn = orderProcessorBMTBean.sessionContext.getUserTransaction();\n\
      if (txn.getStatus() == Status.STATUS_NO_TRANSACTION) {\n      txn.begin();\n\
      }\n    return invocationContext.proceed();\n  }\n}\n```\n\n清单 8-7 展示了 `OrderProcessorBMTClient.java`，这是一个驱动\
  \ `OrderProcessorBMT` 会话 Bean 的 Servlet 客户端，通过调用 UserTransaction 接口来演示 EJB 的 BMT\
  \ 边界划分。\n\n***清单 8-7.***  OrderProcessorBMTClient.java，我们的模拟 Java SE 客户端\n\n```\n\
  @WebServlet(name = \"OrderProcessorBMTClient\", urlPatterns = {\"/OrderProcessorBMTClient\"\
  })\npublic class OrderProcessorBMTClient extends HttpServlet {\n  @EJB\n  OrderProcessorBMTBean\
  \ orderProcessorBMT;\n\n/**\n   * 处理 HTTP\n   * <code>GET</code> 和\n   * <code>POST</code>\
  \ 方法的请求。\n   *\n   * @param request servlet 请求\n   * @param response servlet 响应\n\
     * @throws ServletException 如果发生特定于 servlet 的错误\n   * @throws IOException 如果发生\
  \ I/O 错误\n   */\n  protected void processRequest(HttpServletRequest request, HttpServletResponse\
  \ response)\n          throws ServletException, IOException {\n    response.setContentType(\"\
  text/html;charset=UTF-8\");\n    response.setContentType(\"text/html;charset=UTF-8\"\
  );\n    OutputStream rOut = response.getOutputStream();\n    PrintStream out = new\
