  \n图 5-18.   StatusMailerClient Servlet 的输出\n\n结论\n\n在本章中，我们向你介绍了面向消息的中间件的概念，以及为什么企业正在寻求能够以异步方式进行通信的松散耦合应用程序。\n\
  \n我们介绍了使用 P2P 和发布-订阅模型的消息应用程序架构，并讨论了为什么消息传递是实现异步应用程序的最佳方式之一。我们详细研究了 JMS，包括不同的 JMS\
  \ 组件，如提供者、消费者、客户端和不同类型的消息。我们研究了 MDB 以及可以构成它们的各种工件。我们介绍了 MDB 的不同配置属性，以及如何使用注解设置它们。我们通过注入\
  \ JavaMail 资源的具体示例解释了 MDB 中的依赖注入。我们讨论了编译、打包、部署和测试 MDB 所需的内容，以及如何在 GlassFish 应用服务器中创建不同类型的资源。最后，我们介绍了使用\
  \ GlassFish 中的应用程序客户端容器运行示例客户端程序，查看输出以及接收 MDB 发送的电子邮件消息。\n\n在下一章中，我们将深入探讨 Web 服务，包括如何将会话\
  \ Bean 发布为 Web 服务，以及如何从 EJB 应用程序调用 Web 服务。\n\n第 6 章\n\n![image](img/frontdot.jpg)\n\
  \nEJB 与 Web 服务\n\n本章将解释 Web 服务，介绍核心 Web 服务标准（SOAP、WSDL、UDDI、XML），并讨论 Java EE 平台中\
  \ Web 服务支持的演变。我们还将深入探讨如何将 EJB 无状态会话 Bean 发布为 Web 服务。最后，我们将讨论如何从命令行 Java 客户端程序和无状态会话\
  \ Bean 调用已发布的 Web 服务。\n\n什么是 Web 服务？\n\n\n\nWeb 服务本质上构成了一种业务逻辑或功能，这些逻辑或功能存在于应用程序或模块中，并通过服务接口暴露给客户端应用程序（通常称为*服务消费者*）。Web\
  \ 服务的消费者无需了解该服务的任何实现细节——客户端能够利用服务接口中提供的信息来访问或调用该 Web 服务。这种架构从根本上提供了一种松耦合模型，在此模型中，消费者不必了解作为\
  \ Web 服务暴露的业务逻辑实现所特有的技术或基础设施细节。\n\nW3C（万维网联盟）的 Web 服务架构工作组为 Web 服务提供了以下定义：\n\n*Web\
  \ 服务是一种旨在支持网络上可互操作的机器间交互的软件系统。它拥有一个以机器可处理格式（特别是 WSDL）描述的接口。其他系统按照其描述所规定的方式，使用 SOAP\
  \ 消息与该 Web 服务进行交互，这些消息通常通过 HTTP 传输，并采用 XML 序列化，同时结合其他与 Web 相关的标准。*\n\n虽然将细节抽象到接口的概念已在多种语言和分布式架构（例如\
  \ EJB 和 CORBA）中使用，但 Web 服务的关键区别在于使用标准来描述服务的抽象、调用和注册。\n\nWeb 服务架构遵循“查找-绑定-执行”模型，在该模型中，你在注册中心（UDDI）中找到所需的服务，获取该服务的描述，将其绑定到该服务（根据描述创建将发送到服务的消息），最后执行或调用该服务。图\
  \ 6-1 展示了“查找-绑定-执行”模型。UDDI、WSDL 和 SOAP 是使这种“查找-绑定-执行”模型无处不在并区别于早期计算模型的标准。\n\n![9781430246923_Fig06-01.jpg](img/9781430246923_Fig06-01.jpg)\n\
  \n图 6-1.  Web 服务架构\n\nUDDI\n\n*通用描述、发现与集成（UDDI）* 提供了一种基于标准的方法来定位 Web 服务以及调用该服务的信息。它还提供了关于该服务的额外元数据。UDDI\
  \ 帮助你动态绑定 Web 服务，而不是必须将它们硬编码到外部接口，并且它还有助于提供分类法。企业或服务提供商可以提供基本的联系信息（包括标识）、服务的分类、描述其行为的信息以及\
  \ Web 服务的实际位置。\n\n目前版本为 3 的 UDDI 在过去几年中不断发展。版本 1 侧重于为服务提供注册中心，而版本 2 侧重于使规范与其他 Web\
  \ 服务规范和灵活的分类法保持一致。当前版本侧重于为服务的私有或公共实现的安全交互提供支持。包括 Oracle、SAP、Microsoft、IBM、Cisco、Computer\
  \ Associates 和 Systinet 在内的多家公司都是结构化信息标准促进组织（OASIS）的 UDDI 技术委员会成员。大多数应用服务器供应商（例如\
  \ Oracle 和 IBM）要么将 UDDI 注册中心作为其应用服务器的标准组件提供，要么将 OEM UDDI 注册中心（来自 Systinet 或其他注册中心提供商）作为其中间件平台的一部分提供。\n\
  \nWSDL\n\n*Web 服务描述语言（WSDL）* 是一种使用 XML 描述服务接口的技术。WSDL 是由 W3C 开发的标准，过去几年中，多家供应商和个人为其做出了贡献。WSDL\
  \ 描述了服务做什么、如何调用其操作以及在哪里找到它。\n\nWSDL 的详细信息可以分为两类：服务接口定义细节和服务实现定义细节。服务接口定义是一种抽象的或可重用的服务定义，它可以被多个服务实现定义实例化和引用。它包含以下\
  \ WSDL 元素，这些元素构成了服务描述中可重用的部分。我们将使用一个信用检查 Web 服务作为示例来介绍此处列出的服务接口定义元素：\n\n```\n<definitions>\n\
  <types>\n<message>\n<portType>\n<binding>\n```\n\n<definitions> 元素\n\n`<definitions>`\
  \ 元素允许你指定在 WSDL 文档中可见的命名空间的全局声明。它充当服务描述的容器。清单 6-1 展示了一个 `<definitions>` 元素的示例，该元素定义了一个目标命名空间以及信用服务所引用的其他命名空间。\n\
  \n***清单 6-1.***  CreditService.wsdl 中的 <definitions> 元素\n\n```\n<?xml version=\"\
  1.0\" encoding=\"UTF-8\" standalone=\"yes\"?>\n<definitions targetNamespace=\"http://www.apress.com/ejb3/credit\"\
  \ ←\nname=\"CreditService\" xmlns:tns=\"http://www.apress.com/ejb3/credit\" ←\n\
  xmlns:xsd=\"http://www.w3.org/2001/XMLSchema\" ←\nxmlns:soap=\"http://schemas.xmlsoap.org/wsdl/soap/\"\
  ←\nxmlns=http://schemas.xmlsoap.org/wsdl//>\n```\n\n<types> 元素\n\n`<types>` 元素用于定义\
  \ `<message>` 元素的数据类型。XML 模式定义（XSD）最常用于指定数据类型。清单 6-2 展示了一个 `<types>` 元素的示例，该元素提供了信用服务的模式位置。\n\
  \n***清单 6-2.***  CreditService.wsdl 中的 <types> 元素\n\n```\n  <types>\n    <xsd:schema>\n\
  <xsd:import namespace=\"http://www.apress.com/ejb3/credit\"←\n    schemaLocation=\"\
  CreditServiceBeanService_schema1.xsd\"/>\n    </xsd:schema>\n  </types>\n```\n\n\
  <message> 元素\n\n`<message>` 元素用于定义 Web 服务消费者和 Web 服务提供者之间交换的数据格式。清单 6-3 展示了两个 `<message>`\
  \ 元素的示例：`CreditCheck` 和 `CreditCheckResponse`。\n\n***清单 6-3.***  CreditService.wsdl\
  \ 中的 <message> 元素\n\n```\n  <message name=\"CreditCheck\">\n    <part name=\"parameters\"\
  \ element=\"tns:CreditCheck\"/>\n  </message>\n  <message name=\"CreditCheckResponse\"\
  >\n    <part name=\"parameters\" element=\"tns:CreditCheckResponse\"/>\n  </message>\n\
  ```\n\n<portType> 元素\n\n`<portType>` 元素用于指定 Web 服务的操作。清单 6-4 展示了信用服务的 `<portType>`\
  \ 元素，其中包含 `CreditCheck` 操作。\n\n***清单 6-4.***  CreditService.wsdl 中的 <portType> 元素\n\
  \n```\n<portType name=\"CreditCheckEndpointBean\">\n  <operation name=\"CreditCheck\"\
  >\n    <input message=\"tns:CreditCheck\"/>\n    <output message=\"tns:CreditCheckResponse\"\
  />\n  </operation>\n</portType>\n```\n\n<binding> 元素\n\n`<binding>` 元素描述了 `<portType>`\
  \ 元素的协议、数据格式和安全性。标准绑定是 HTTP 或 SOAP；或者你也可以创建自己的绑定。\n\nWSDL 规范的“绑定”部分非常灵活——它允许你提供自己的绑定环境，而不是默认的基于\
  \ SOAP-over-HTTP 的模型。规范的这种灵活性已被 WSIF（Web 服务调用框架）广泛利用，这是一个 Apache 开源项目。WSIF 提供了一种很好的方式，将现有的基于\
  \ Java、EJB、JMS（Java 消息服务）和 JCA 的组件作为具有本地绑定的 Web 服务暴露出来，这些本地绑定提供了更好的性能并支持本地事务。清单\
  \ 6-5 展示了信用服务的 `<binding>` 元素，使用了 SOAP-over-HTTP。\n\n\n\n***清单 6-5.***  CreditService.wsdl\
  \ 中的 <binding> 元素\n\n```\n  <binding name=\"CreditCheckEndpointBeanPortBinding\"\
  ←\ntype=\"tns:CreditCheckEndpointBean\"> ←\n    <soap:binding transport=\"http://schemas.xmlsoap.org/soap/http\"\
  \ ←\nstyle=\"document\"/>\n    <operation name=\"CreditCheck\">\n      <soap:operation\
  \ soapAction=\"\"/>\n      <input>\n        <soap:body use=\"literal\"/>\n      </input>\n\
        <output>\n        <soap:body use=\"literal\"/>\n      </output>\n    </operation>\n\
    </binding>\n```\n\nWSDL 文档的服务实现定义部分用于标识一个 Web 服务。它包含以下元素：\n\n```\n<service>\n\
  <port>\n```\n\n<service> 元素\n\n`<service>` 元素包含一组 `<port>` 元素，每个端口都与一个端点（网络地址位置或\
  \ URL）相关联。清单 6-6 展示了信用服务的 `<service>` 元素示例。\n\n***清单 6-6.***  CreditService.wsdl\
  \ 中的 <service> 元素\n\n```\n  <service name=\"CreditService\">\n    <port name=\"\
  CreditCheckEndpointBeanPort\" ←\nbinding=\"tns:CreditCheckEndpointBeanPortBinding\"\
  >\n      <soap:address location=\"http://localhost:64082/CreditService/CreditCheckEndpointBean\"\
  />\n    </port>\n  </service>\n```\n\n清单 6-7 展示了我们将在本章后续开发的信用服务的完整 WSDL 文档。\n\n\
  ***清单 6-7.***  CreditService.wsdl 的完整 WSDL 文档\n\n```\n  <?xml version='1.0' encoding='UTF-8'?>\n\
    <definitions xmlns:soap=\"http://schemas.xmlsoap.org/wsdl/soap/\" xmlns:tns=\"\
  http://www.apress.com/ejb/credit\" xmlns:xsd=\"http://www.w3.org/2001/XMLSchema\"\
  \ xmlns=\"http://schemas.xmlsoap.org/wsdl/\" targetNamespace=\"http://www.apress.com/ejb/credit\"\
  \ name=\"CreditService\">\n    <types>\n    <xsd:schema>\n      <xsd:import namespace=\"\
  http://www.apress.com/ejb3/credit\"←\n        schemaLocation=\"CreditServiceBeanService_schema1.xsd\"\
  />\n    </xsd:schema>\n    </types>\n    <message name=\"CreditCheck\">\n      <part\
  \ name=\"parameters\" element=\"tns:CreditCheck\"/>\n    </message>\n    <message\
  \ name=\"CreditCheckResponse\">\n      <part name=\"parameters\" element=\"tns:CreditCheckResponse\"\
  />\n    </message>\n    <portType name=\"CreditCheckEndpointBean\">\n      <operation\
  \ name=\"CreditCheck\">\n        <input message=\"tns:CreditCheck\"/>\n        <output\
  \ message=\"tns:CreditCheckResponse\"/>\n      </operation>\n    </portType>\n    <binding\
  \ name=\"CreditCheckEndpointBeanPortBinding\" type=\"tns:CreditCheckEndpointBean\"\
  >\n      <soap:binding transport=\"http://schemas.xmlsoap.org/soap/http\" style=\"\
  document\"/>\n      <operation name=\"CreditCheck\">\n        <soap:operation soapAction=\"\
  \"/>\n        <input>\n          <soap:body use=\"literal\"/>\n        </input>\n\
          <output>\n          <soap:body use=\"literal\"/>\n        </output>\n      </operation>\n\
      </binding>\n    <service name=\"CreditService\">\n      <port name=\"CreditCheckEndpointBeanPort\"\
  \ binding=\"tns:CreditCheckEndpointBeanPortBinding\">\n        <soap:address location=\"\
  http://localhost:64082/CreditService/CreditCheckEndpointBean\"/>\n      </port>\n\
      </service>\n  </definitions>\n```\n\nSOAP\n\n*简单对象访问协议 (SOAP)* 是一种基于 XML 的协议，用于在分布式和去中心化环境中使用\
  \ XML 交换信息。SOAP 是由 W3C 开发的标准。从根本上说，SOAP 是 Web 服务的默认传输层。\n\nSOAP 消息是一个普通的 XML 文档，包含以下元素：\n\
  \n*   必需的 `Envelope` 元素将 XML 文档标识为 SOAP 消息。`Envelope` 是文档中的顶级元素。信封是必需的，它基本上标记了 SOAP\
  \ 消息的开始和结束（尽管消息可以包含指向信封外部对象的链接）。信封包含 `Header` 和 `Body` 元素。\n*   可选的 `Header` 元素包含头部信息。当\
  \ SOAP 协议通过 HTTP 使用时，HTTP 头部提供有关消息内容类型、内容长度和接收者的信息。包含头部是为了在不事先与通信方达成一致的情况下向 SOAP\
  \ 消息添加功能。\n*   必需的 `Body` 元素包含请求和响应信息。`Body` 是必需的元素，包含供消息接收者使用的信息。\n*   可选的 `Fault`\
  \ 元素提供有关消息处理过程中发生的错误的信息。`Body` 元素可以包含一个可选的 `Fault` 元素来报告错误。\n\n图 6-2 展示了 SOAP 消息的元素。\n\
  \n![9781430246923_Fig06-02.jpg](img/9781430246923_Fig06-02.jpg)\n\n图 6-2.  SOAP\
  \ 消息\n\nREST\n\n*REST（表述性状态转移）* 是一种软件架构模式，它使用 HTTP（超文本传输协议）在分布式和去中心化环境中发现、查询和操作资源。近年来，由于其简单性，REST\
  \ 相比基于 WSDL-SOAP 的实现更受欢迎。\n\n使用 REST，客户端通过 URI（统一资源标识符）和标准的 HTTP 方法集（GET、POST、PUT\
  \ 和 DELETE）访问服务器上的资源。作为响应，服务器返回资源的*表述*，这只是一个包含资源当前或预期状态的文档。在每次访问调用和相应的新资源表述响应之后，客户端被称为*转移状态*，因此得名*表述性状态转移*。REST\
  \ 架构模式规定了以下六个约束：\n\n1.  *客户端-服务器架构*：客户端和服务器应该分离，并且只能通过统一接口进行交互。这种分离意味着客户端不关心服务器的数据存储内部细节，服务器也不关心客户端的用户界面。\n\
  2.  *无状态交互*：客户端和服务器只能使用像 HTTP 这样的无状态协议进行交互。服务器不能在请求之间存储客户端上下文。所有请求必须包含这些请求所需的所有信息。\n\
  3.  *可缓存*：服务器响应必须将自身标识为可缓存或不可缓存。这可用于防止客户端使用过时数据，也有助于提高性能和可扩展性。\n4.  *分层系统*：客户端应该能够无缝地连接到中间系统，而不是直接连接到最终服务器。中间系统提供负载均衡和共享缓存等功能，从而提高系统的可扩展性。\n\
  5.  *命名资源*：客户端必须能够在每个请求中使用 URI 标识单个服务器资源。\n6.  *统一接口*：客户端和服务器之间的统一接口允许它们独立演进。\n\n\
  RESTful Web 服务\n\n*RESTful Web 服务*是基于上述 REST 原则构建的服务。RESTful Web 服务使用 HTTP 并实现映射到常见\
  \ HTTP 方法的操作，如表 6-1 所示。\n\n表 6-1. HTTP 方法到 CRUD 操作的映射\n\n| HTTP 方法 | CRUD 操作 |\n\
  | --- | --- |\n| `POST` | 创建 |\n| `GET` | 读取 |\n| `PUT` | 更新 |\n| `DELETE` | 删除\
  \ |\n\n\n\n清单 6-8 展示了一个名为 `CreditCheck` 的简单 RESTful Web 服务，它接收信用卡号作为输入，并根据其有效性返回\
  \ `true` 或 `false`。为简单起见，我们的方法始终返回 `true`。\n\n***清单 6-8.***  CreditCheck.java\n\n\
  ```\npackage com.apress.ejb.chapter06.services;\nimport javax.ws.rs.Consumes;\n\
  import javax.ws.rs.PUT;\nimport javax.ws.rs.Path;\nimport javax.ws.rs.PathParam;\n\
  import javax.ws.rs.Produces;\n\n@Path(\"creditCheck\")\npublic class CreditCheck\
  \ {\n    @PUT\n    @Consumes(\"text/plain\")\n    @Produces(\"text/plain\")\n    @Path(\"\
  isValid\")\n    public boolean isValid(@PathParam(\"cardNumber\")String ccNumber)\
  \ {\n        return true;\n    }\n}\n```\n\n用户可以按如下方式调用 `CreditCheck` 中的 `isValid`\
  \ 方法，并且 `ccNumber` 将被赋值为 12345。\n\n```\nhttp://<host>:<port>/<resource>/creditCheck/isValid/12345\n\
  ```\n\nRESTful 与基于 SOAP 的 Web 服务\n\n表 6-2 列出了 RESTful Web 服务与基于 SOAP 的 Web 服务之间的重要区别和相似之处。\n\
  \n表 6-2. RESTful 与基于 SOAP 的 Web 服务\n\n| 标准 | SOAP | RESTful |\n| --- | --- | ---\
  \ |\n| 规范 | JAX-WS | JAX-RS |\n| 简单/复杂 | 复杂 | 简单 |\n| 消息大小 | 大（XML 标记） | 小（无额外 XML\
  \ 标记） |\n| 基于标准 | 是 | 否 |\n| 传输协议 | HTTP, SMTP, JMS | HTTP |\n| 缓存 | 否 | GET 操作可缓存\
  \ |\n| 协议 | JMS, SMTP, HTTP | HTTP |\n| 人类可读负载 | 否 | 是 |\n| 语言和平台 | 独立 | 独立 |\n\n\
  何时使用 Web 服务？\n\nWeb 服务提供了一种标准方式，利用行业标准，将现有或新的应用程序和数据暴露给外部各方（包括客户、供应商和合作伙伴），或跨企业部门进行共享。Web\
  \ 服务也可用于集成异构应用程序和数据。\n\n虽然许多企业在内部使用 Web 服务，但也有大量可用的外部 Web 服务示例。其中一些流行的服务包括包裹跟踪服务（由\
  \ FedEx、UPS 和 USPS 等承运商提供）。电子商务网站，如 `www.amazon.com`、`www.yahoo.com`、`www.ebay.com`\
  \ 和 `www.google.com`，通过 Web 服务暴露其核心功能。开发者可以订阅并使用这些电子商务提供商提供的 Web 服务，来开发能够为后端系统增加价值或与其无缝集成的应用程序。\n\
  \nJava EE 与 Web 服务\n\nJava EE 平台在过去几年中不断发展，已成为一个成熟、稳定、可靠且可用的企业应用平台。虽然 JDBC（Java\
  \ 数据库连接）、JMS 和 EJB 等技术从一开始就存在于 Java EE 平台中，但直到 J2EE 1.4 版本，Web 服务的开发和部署才呈现出更好的形态，因为它们已被标准化，使得\
  \ Java EE 平台中的 Web 服务在应用服务器之间更具可移植性，并与 .NET Web 服务可互操作。Java EE 规范的共同目标是简化应用程序和服务的开发与部署。Java\
  \ EE 中与 Web 服务相关的一些关键规范包括 JAX-WS、JAXB、JAXR、SAAJ 和 JSR 181 注解。在接下来的章节中，我们将展示这些规范是什么，以及如何将它们与\
  \ EJB 一起使用。图 6-3 展示了 EJB 如何在 Java EE 平台下与不同的 Web 服务相关规范进行交互。\n\n![9781430246923_Fig06-03.jpg](img/9781430246923_Fig06-03.jpg)\n\
  \n图 6-3.  EJB 与 Web 服务\n\nJAX-WS\n\nJAX-WS（用于 XML Web 服务的 Java API）定义了用于从 Java 应用程序和\
  \ Java EE 组件（如 EJB）访问 Web 服务的 Java API 和注解。JAX-WS 提供了 WSDL 与 Java 接口之间，或从 Java 接口到\
  \ WSDL 的映射功能。映射到 WSDL 的接口称为*服务端点接口*。JAX-WS 还提供了客户端和服务器端的 API 及注解，用于通过 SOAP 发送和接收\
  \ Web 服务请求。Java EE 中的 JAX-WS 规范依赖于 Java EE 平台的其他相关规范，包括 JSR 175（与注解相关）、JSR 181（与\
  \ Web 服务相关）和 JAXB。它还支持最新的 Web 服务标准，如 SOAP 1.2 和 WSDL 2.0。图 6-4 展示了一个简化的 Web 服务调用图。\n\
  \n![9781430246923_Fig06-04.jpg](img/9781430246923_Fig06-04.jpg)\n\n图 6-4.  Web 服务调用内部机制\n\
  \nJAX-RS\n\nJAX-RS（JAX-RS：用于 RESTful Web 服务的 Java API）定义了用于创建基于 REST 架构模式的 Web 服务的\
  \ Java API 和注解。JAX-RS 1.1 版本通过 JSR-311 成为 Java EE 6 的组成部分。JAX-RS 提供了诸如 `@PATH`、`@GET`、`@PUT`、`@POST`、`@DELETE`、`@HEAD`、`@PRODUCES`、`@CONSUMES`\
  \ 等注解，这些注解有助于将 POJO（普通 Java 对象）映射为 Web 资源。\n\nJAXB\n\nWeb 服务的消费者和提供者使用 XML 消息来发送请求和响应。这些消息可以是诸如包含\
  \ XSD 的采购订单之类的内容，XSD 允许相关方（提供者和消费者）理解采购订单。使用低级语言 API 处理 XML 文档可能非常耗时，并且涉及复杂的代码。在\
  \ Java EE 上下文中，*JAXB（用于 XML 绑定的 Java 架构）*规范提供了用于将 XML 文档表示为 Java 工件的标准 API，以便开发者可以基于模式（XSD）处理代表\
  \ XML 文档的 Java 对象。JAXB 规范有助于将 XML 文档解组为 Java 对象集，并将 Java 对象集编组回 XML 文档。JAXB 规范为\
  \ XML 模式提供全面支持，并为 JAX-WS 提供绑定支持，同时它还利用了其他 Java EE 规范，例如 JSR 175。\n\nJAXR\n\nUDDI\
  \ 是 Web 服务注册中心的标准。*JAXR（用于 XML 注册中心的 Java API）*规范定义了一组标准 API，允许 Java 客户端访问注册中心。这些\
  \ API 也可用于 UDDI 之外的 XML 注册中心。\n\nSAAJ\n\n类似于可以在电子邮件中使用的附件，您也可以向调用 Web 服务的 SOAP 消息发送附件。*SAAJ（带附件的\
  \ SOAP API for Java）*定义了一组标准 API，允许 Java SE 或 EE 组件构建带有附件的 SOAP 消息。\n\nJSR 181\n\
  \n*JSR 181（Java 平台的 Web 服务元数据）*定义了一组可用于简化 Web 服务开发的标准注解。这些注解可用于 Java 类或 EJB 会话 Bean，这些\
  \ Bean 可以是 JAX-WS 组件。\n\n作为 Web 服务的 EJB 无状态会话 Bean\n\n使用 WSDL 描述的 Web 服务端点本质上是无状态的。无状态会话\
  \ Bean 也具有相同的无状态特性，非常适合用于开发 Web 服务。EJB 规范依赖于 Java EE 平台中的其他 Web 服务规范，包括 JAX-WS、JAXB\
  \ 和 JSR 181，无论是用于消费 Web 服务，还是将无状态会话 Bean 发布为 Web 服务。\n\n*服务端点接口 (SEI)* 是映射到 Web\
  \ 服务的接口。JAX-WS 提供了这个映射层。为了开发一个新的 Web 服务，您可以采用自底向上或自顶向下的方法，这两种方法将在下面进行描述。\n\n\n\n\
  在自底向上的方法中，你从一个 SEI 和一个可发布为 Web 服务的实现开始。在此过程中，WSDL 文档等 Web 服务工件会在部署时，或通过 Java EE\
  \ 应用服务器提供的管理工具或实用程序生成。\n\n在自顶向下的情况下，你从一个 WSDL 文档开始，并使用实现 JAX-WS 的工具生成一个 SEI。一旦有了\
  \ SEI，就可以在其后添加实现。对于 EJB 无状态会话 Bean，你需要使用 JAX-WS 和 JSR 181 规范中提供的注解来标记业务接口和/或 Bean\
  \ 类，以便在部署时生成正确的 Web 服务工件集。Java EE 规范要求，添加到组件中的注解在部署时被处理，以生成正确的工件集。带有 Web 服务注解的 EJB\
  \ 无状态会话 Bean 也不例外；它们也会在部署时由应用服务器提供的部署实用程序处理。每个 SEI 对应一个无状态会话 Bean。\n\n开发新的 Web 服务\n\
  \n无状态会话 Bean 使用第 2 章中描述的编程模型实现。如果你希望将一个无状态会话 Bean 作为 Web 服务，则需要以下类：\n\n*   Bean\
  \ 类（实现）\n*   Web 服务端点接口（可选）\n*   如果 Bean 类有本地或远程客户端，则还需要其他业务接口\n\n创建 Bean 类\n\n\
  *无状态会话 Bean 类*是任何带有类级别注解`@Stateless`的标准 Java 类。从版本 3 开始，EJB 规范不再强制要求 SEI。提供 SEI\
  \ 以及 Bean 类是可选的。在 Bean 类将作为 Web 服务发布而不使用任何服务端点接口的用例中，Bean 类将具有额外的类级别注解`@WebService`（JSR\
  \ 181）。`@WebService`注解位于`javax.jws`包中，它将 Bean 类标记为基于 SOAP 的 Web 服务的实现。\n\n`@WebService`注解接受表\
  \ 6-3 中描述的参数。\n\n表 6-3. @WebService 注解\n\n| 参数 | 描述 | 附加信息 |\n| --- | --- | ---\
  \ |\n| `name` | 映射到`wsdl:portType`的 Web 服务名称。 | 如果未指定，则使用 Java 类的名称。 |\n| `targetNamespace`\
  \ | 用于 Web 服务的 XML 命名空间。 | 如果未指定，则使用 Java 类的名称。 |\n| `serviceName` | 映射到`wsdl:service`的\
  \ Web 服务名称。 | 如果未指定，则使用 Java 类的名称。 |\n| `wsdlLocation` | WSDL 文档的位置，当 Bean 类实现现有\
  \ Web 服务时会派上用场。 |  |\n\n为了说明一个发布为 Web 服务的无状态会话 Bean，我们将创建一个`CreditServiceEndpointBean`，它将发布为`CreditService`。\n\
  \n在清单 6-9 中，我们有一个 Java 类`CreditCheckEndpointBean`，它有两个类级别注解：`@Stateless`和`@WebService`。`@Stateless`注解提供了一个额外的参数来将\
  \ Bean 标记为`CreditCheckEndpointBean`。如果同一个类暴露给远程或本地客户端，这些客户端将使用该名称访问无状态会话 Bean。`@WebService`注解提供了两个额外的参数：一个将服务名称标记为`CreditService`，另一个指定目标命名空间（而不是使用默认的\
  \ Java 包结构）。\n\n***清单 6-9.***  CreditCheckEndpointBean.java\n\n```\npackage com.apress.ejb.chapter06.services;\n\
  import javax.ejb.Stateless;\nimport javax.jws.WebMethod;\nimport javax.jws.WebService;\n\
  \n@Stateless(name = \"CreditCheckEndpointBean\")\n@WebService(serviceName = \"CreditService\"\
  , targetNamespace = \"http://www.apress.com/ejb/credit\")\npublic class CreditCheckEndpointBean  {\n\
      public CreditCheckEndpointBean() {\n    }\n\n}\n```\n\nJSR 181 中定义的`@WebMethod`注解允许你自定义作为\
  \ Web 服务操作暴露的方法。如果在带有`@WebService`注解的 Bean 类中没有指定`@WebMethod`注解，则所有公共方法都将作为 Web\
  \ 服务操作暴露。\n\n`@WebMethod`注解接受表 6-4 中描述的参数。\n\n表 6-4. @WebMethod 注解\n\n| 参数 | 描述\
  \ | 附加信息 |\n| --- | --- | --- |\n| `operationName` | 与此方法匹配的`wsdl:operation`的名称。\
  \ | 默认情况下，这是 Java 方法的名称。 |\n| `action` | 此操作的动作。对于 SOAP 绑定，它将是`SOAP action`头的值。\
  \ | 默认情况下，这是 Java 方法的名称。 |\n\n在清单 6-10 中，我们在`CreditCheckEndpointBean`类中添加了以下方法，该方法将作为\
  \ Web 服务操作暴露。操作名称通过`@WebMethod`参数自定义为`CreditCheck`。该方法接受一个`java.lang.String`参数（即信用卡号），并根据信用卡是否有效返回`true`或`false`的`java.lang.boolean`值。为简单起见，我们将始终返回`true`。\n\
  \n***清单 6-10.***  CreditCheckEndpointBean.java 中的 validateCC 方法\n\n```\n@WebMethod(operationName=\"\
  CreditCheck\" )\npublic boolean validateCC(String cc){\nreturn true;\n}\n```\n\n\
  Web 服务端点接口\n\nJAX-WS 不强制要求使用 SEI 来实现 Web 服务端点。你可以使用 JSR 181 中提供的注解将 Bean 类标记为 Web\
  \ 服务，并将一个或多个业务方法标记为 Web 服务操作。在为无状态会话 Bean 定义了 SEI 的用例中，应遵守以下规则：\n\n*   SEI 必须具有\
  \ `javax.jws.WebService` 注解。\n*   一个或多个方法可以具有 `javax.jws.WebMethod` 注解。\n*   所有方法参数和返回类型应与\
  \ JAXB XML 模式映射定义兼容。\n*   方法的参数和返回类型必须是有效的 JAX-RPC 值类型，包括 Java 基本类型（`int`、`long`\
  \ 等）、Java 类（`String`、`Date` 等）、Java Bean 和数组。\n*   `throws` 子句除了包含任何其他应用程序异常外，还必须包含\
  \ `java.rmi.RemoteException`。\n\n![image](img/sq.jpg) **注意**   在 Java EE 7 中，对 JAX-RPC\
  \ 的支持已变为可选。Java EE 7 规范鼓励新应用程序使用 JAX-WS 提供的简化 Web 服务开发的设施。\n\n在我们的示例中，我们将注解添加到 Bean\
  \ 类本身，如清单 6-9 和 6-10 所示。\n\n清单 6-11 说明了提供 SEI 的用例的服务端点接口，清单 6-12 显示了实现该 SEI 的 `CreditCheckEndpointBean`\
  \ 类。\n\n***清单 6-11.***  用例的服务端点接口\n\n```\n@WebService(serviceName=\"CreditService\"\
  ,targetNamespace=\"http://www.apress.com/ejb/credit\")\npublic interface CreditCheckEndpoint\
  \ {\n\n@WebMethod(operationName=\"CreditCheck\")\n      public boolean validateCC(String\
  \ cc);\n}\n```\n\n***清单 6-12.***  实现 SEI 的 CreditCheckEndpointBean 类\n\n```\n@Stateless\n\
  public class CreditCheckEndpointBean implements CreditCheckEndpoint {\n    public\
  \ CreditCheckEndpointBean() {\n    }\n    //implementation goes here\n}\n```\n\n\
  打包、部署和测试 Web 服务\n\n\n\n带有 Web 服务注解的无状态会话 Bean 在部署到 EJB 容器之前，需要打包成 *EJB Java 归档（JAR）*\
  \ 文件。对于某些 EJB 容器或应用服务器，它们首先需要被组装成 EAR [企业归档] 文件。大多数 EJB 容器或应用服务器都提供部署工具或 Ant 任务，以方便将\
  \ EJB 部署到其容器中。像 JDeveloper、NetBeans 和 Eclipse 这样的 Java 集成开发环境（IDE）也提供部署功能，允许开发者打包、组装并将\
  \ EJB 部署到应用服务器。打包、组装和部署方面的内容在第 11 章中有详细说明。\n\n在本章中，我们开发了一个带有 Web 服务注解的无状态会话 Bean（`CreditCheckEndpointBean`）。我们将执行以下步骤来编译、部署和测试这个将被发布为\
  \ Web 服务的无状态会话 Bean。\n\n前提条件\n\n在执行后续章节详述的任何步骤之前，请先完成第 1 章的“入门”部分，该部分将引导您完成本章示例所需的安装和环境设置。\n\
