  \ 继承层次结构中的具体叶子实体\n\n```\n/*\n * FullTimeEmployee: 一个具体的叶子实体\n */\n@Entity\n@NamedQueries({\n\
  \  @NamedQuery(name = \"FullTimeEmployee.findAll\", query = \"select o from FullTimeEmployee\
  \ o\")})\n@Table(name = \"CH04_TPC_FT_EMPLOYEE\")\npublic class FullTimeEmployee\
  \ extends Employee implements Serializable {\n  /* 类主体在所有继承策略中都是相同的 */\n}\n```\n\
  \n***清单 4-16.***  PartTimeEmployee.java，TABLE_PER_CLASS 继承层次结构中的具体叶子实体\n\n```\n\
  /*\n * PartTimeEmployee: 一个具体的叶子实体\n */\n@Entity\n@NamedQueries({\n  @NamedQuery(name\
  \ = \"PartTimeEmployee.findAll\", query = \"select o from PartTimeEmployee o\")})\n\
  @Table(name = \"CH04_TPC_PT_EMPLOYEE\")\npublic class PartTimeEmployee extends Employee\
  \ implements Serializable {\n  /* 类主体在所有继承策略中都是相同的 */\n}\n```\n\n同样，`TABLE_PER_CLASS`\
  \ 示例中的 `Address` 类与之前的示例相同，只是我们选择的表名和序列名不同。\n\nTABLE_PER_CLASS 策略的优缺点\n\n设计时考量\n\
  \n使用 TABLE_PER_CLASS 策略时，当新的最外层具体类型被引入层次结构时，会添加新的表。这很好，因为既不会影响现有表，也不会以任何方式影响它们的数据。然而，由于每个类型也会映射其所有超类型的字段，因此在基类上引入新字段，或引入新的基实体本身，都需要修改层次结构中所有受影响子类型的表，以映射任何新引入的字段。\n\
  \n性能影响\n\n使用 TABLE_PER_CLASS 方法时，跨多个类型进行查询需要 `UNION` 选择语句，这可能性能不佳，但查询单个类型非常高效，因为查询只涉及一个表。应避免此层次结构中的多态关系（涉及超类型），因为它们必然需要此\
  \ `UNION` 操作来解析为具体的子类型实例。\n\nO/R 实现方法比较\n\n现在我们已经探讨了三种继承映射实现，让我们看看类继承层次结构的一些特征，在选择用于类型层次结构的实现方法时应考虑这些特征。以下列表包含关于您自己的实体层次结构的主观问题。它们没有精确的答案；相反，它们旨在在构建应用程序时激发设计考量。\n\
  \n*   类层次结构可以是静态的，具有固定数量的子类型，也可以是动态的，具有不同数量的子类型。您需要将新子类型纳入层次结构的频率如何？\n*   层次结构可以是深的，包含许多子类，也可以是浅的，只包含少数几个。您的层次结构粒度如何？\n\
  *   层次结构中的类型可能差异很大，子类上的属性集与基类上的属性集非常不同，或者属性差异很小。实体的持久属性集彼此之间的差异有多大？\n*   其他实体是否会与此类型层次结构中的类定义关系？如果是，基类是否会经常成为被引用的类型？\n\
  *   此层次结构中的类型是否会被频繁查询、更新或删除？SQL `JOIN` 或 `UNION` 操作的存在与否将如何影响应用程序的性能？\n*   在应用程序的生命周期中，您更新类型层次结构本身的频率如何？这种变更的影响因每种继承策略而异，需要考虑以下因素：\n\
  \n*   向层次结构添加或删除新类型（例如重构类时）。\n*   添加、删除或修改层次结构中实体上的字段。\n\n*   添加、删除或修改涉及此层次结构中类型的关系。\n\
  \n![image](img/sq.jpg) **注意**   关于这三种继承策略的性能比较，以及如何设置您自己的性能比较测试的详细信息，请参阅第 9 章。查看我们性能测试的结果，并在构建实体层次结构时测试您自己的实体层次结构，以帮助您决定哪种策略在您的应用程序上下文中最有意义。\n\
  \n在继承层次结构中使用抽象实体、映射超类和非实体类\n\n在实体类层次结构中，JPA 允许混合使用非实体类和抽象类。使用上面的 JOINED 示例，让我们看看如何映射这些类。\n\
  \n抽象实体类\n\n如上一节关于继承层次结构所示，JPA 实体可以是具体的，也可以是抽象的。抽象实体只是一个不能自行实例化的实体——它仍然可以参与实体关系和查询，并且其字段会按照其类型层次结构的映射策略进行持久化。清单\
  \ 4-17 是我们一个抽象实体的示例。\n\n***清单 4-17.***  Person.java，JOINED 继承层次结构中的抽象根实体\n\n```\n\
  /**\n * Person: 一个抽象实体，也是继承层次结构的根\n */\n@Entity\n@NamedQueries({\n  @NamedQuery(name\
  \ = \"Person.findAll\", query = \"select o from Person o\")})\n@Table(name = \"\
  CH04_JOIN_PERSON\")\n@TableGenerator(name = \"Person_ID_Generator\", table = \"\
  CH04_JOIN_PERSON_ID_GEN\",\n                pkColumnName = \"PRIMARY_KEY_NAME\"\
  , pkColumnValue = \"Person.id\",\n                valueColumnName = \"NEXT_ID_VALUE\"\
  )\n@Inheritance(strategy = InheritanceType.JOINED)\npublic abstract class Person\
  \ implements Serializable {\n  ...\n  @OneToOne(cascade=CascadeType.ALL)\n  @JoinColumn(name\
  \ = \"HOME_ADDRESS\")\n  private Address homeAddress;\n  ...\n}\n```\n\n抽象的 `Person`\
  \ 实体不仅可以查询（这里我们定义了一个名为 `\"Person.findAll\"` 的命名查询），它还持有一个与 `Address` 实体的关联，该关联由其所有子类共享。尽管\
  \ `Person` 是抽象的，但它可以指定自己的映射和自己的表。只是它不会有自己的鉴别器值，因为永远不会有基类 `Person` 的具体实体实例。\n\n映射超类\
  \ (@MappedSuperclass)\n\n\n\n映射超类是一种非实体类，但持久化管理器仍能识别它，并且它可以声明持久化字段及其映射。由于它不是实体，因此不能作为持久化实体关系的目标，也不能在\
  \ JPQL 查询中使用。但是，它可以为任何直接或间接继承它的实体提供通用的持久化属性。从之前的继承示例开始，让我们将根实体 `Person` 转换为一个映射超类。代码清单\
  \ 4-18 和 4-19 展示了转换后的类。\n\n***代码清单 4-18.***  Person.java，一个抽象的映射超类（非实体）\n\n```\n\
  /**\n * Person: 一个映射超类，是继承层次结构的基类（但不是根实体）\n *\n * 创建 ID 生成器表 \"CH04_MS_PERSON_ID_GEN\"\
  : CREATE TABLE\n * \"CH04_MS_PERSON_ID_GEN\" (\"PRIMARY_KEY_NAME\" VARCHAR2(4000)\
  \ PRIMARY KEY,\n * \"NEXT_ID_VALUE\" NUMBER(38));\n *\n * 为此实体的 ID 生成器 'Person.id'\
  \ 初始化该表的数据（从值 '0' 开始）: INSERT INTO \"CH04_MS_PERSON_ID_GEN\" VALUES\n * ('Person.id',\
  \ 0);\n */\n@MappedSuperclass\n@TableGenerator(name = \"Person_ID_Generator\", table\
  \ = \"CH04_MS_PERSON_ID_GEN\",\n                pkColumnName = \"PRIMARY_KEY_NAME\"\
  , pkColumnValue = \"Person.id\",\n                valueColumnName = \"NEXT_ID_VALUE\"\
  )\npublic abstract class Person implements Serializable {\n  @SuppressWarnings(\"\
  compatibility:-7074714881275658754\")\n  private static final long serialVersionUID\
  \ = 5291172566067954515L;\n  @Id\n  @Column(nullable = false)\n  @GeneratedValue(strategy\
  \ = GenerationType.TABLE, generator = \"Person_ID_Generator\")\n  private Integer\
  \ id;\n  @Column(name = \"FIRST_NAME\", length = 400)\n  private String firstName;\n\
    @Column(name = \"LAST_NAME\", length = 400)\n  private String lastName;\n  @OneToOne(cascade=CascadeType.ALL)\n\
    @JoinColumn(name = \"HOME_ADDRESS\")\n  private Address homeAddress;\n  @Version\n\
    private Integer version;\n\npublic Person() {\n  }\n\n/* get/set 方法 */\n}\n```\n\
  \n***代码清单 4-19.***  Employee.java，一个 JOINED 实体继承层次结构中的抽象根实体，同时也是映射超类的子类\n\n```\n\
  /*\n * Employee: 继承层次结构的根。继承自 Person，一个映射超类。\n */\n@Entity\n@NamedQueries({\n  @NamedQuery(name\
  \ = \"Employee.findAll\", query = \"select o from Employee o\")})\n@Table(name =\
  \ \"CH04_MS_EMPLOYEE\")\n@Inheritance(strategy = InheritanceType.JOINED)\npublic\
  \ abstract class Employee extends Person implements Serializable {\n  @SuppressWarnings(\"\
  compatibility:276774077273820023\")\n  private static final long serialVersionUID\
  \ = -8529011412038476148L;\n  @Column(length = 400)\n  private String department;\n\
    @Column(length = 400)\n  private String email;\n  @ManyToOne\n  @JoinColumn(name\
  \ = \"MANAGER\")\n  private FullTimeEmployee manager;\n\npublic Employee() {\n  }\n\
  \n/* get/set 方法 */\n}\n```\n\n`Person` 类变成了一个映射超类（`@MappedSuperclass`），并且它被去掉了 `@NamedQuery`、`@Table`\
  \ 和 `@Inheritance` 注解。`@Inheritance` 被移到了 `Employee` 上，`Employee` 成为了层次结构中新的根实体。\n\
  \n虽然映射超类不能作为持久化关系字段的目标被引用，但它可以拥有自己的持久化关系字段，因此引用 `Address` 实体的 `homeAddress` 字段是完全合法的。\n\
  \n还要注意，我们可以继续在映射超类上定义 `@Id` 和 `@Version` 字段，甚至可以继续为 `id` 字段指定一个 ID 生成器。继承此映射超类的实体将这些字段以及映射超类上定义的所有其他字段映射到它们自己的表中。\n\
  \n非实体类\n\n实体也可以在其类型层次结构中使用非实体类。一个实体可以继承一个非实体类，或者一个非实体类可以继承它。这些类可以是具体的或抽象的，因此它们可以被实例化，但它们的字段将不会被\
  \ JPA 持久化框架持久化或维护。它们也不能参与任何持久化实体关系或 JPQL 查询。如果类型层次结构中的一个类仅作为其子类的组织构造，并且不参与实体关系（并且没有其他理由将其标记为实体），那么最好将其保留为普通类。以后随时可以通过为其添加注解或在\
  \ XML 描述符中将其指定为实体来将其转换为实体。\n\n非实体单值和集合字段\n\n最后，一个实体可以嵌入一个非实体类，或一个非实体类的集合，供其自身私有使用。这种嵌入的引用可以是单个对象或对象集合。单对象字段通常是我们已经熟悉的类型：基本对象类型，如\
  \ `String`、`int` 或 `Long`，它们被隐式标记为 `@Basic`。单对象字段也可以具有复杂类型，我们作为实体引用已经熟悉这些类型，使用标记为\
  \ `@OneToOne` 或 `@ManyToOne` 的字段。当字段引用复杂的非实体类型时，它们被标记为 `@Embedded`，并且目标类必须使用 `@Embeddable`\
  \ 注解。对非实体对象的集合引用被标记为 `@ElementCollection`，它们可以是 `@Basic` 或 `@Embeddable` 类类型的集合。让我们仔细看看这些非实体字段引用。\n\
  \n@Embedded 和 @Embeddable\n\n一个实体或映射超类可以包含标记为 `@Embedded` 的字段，并且它们的类型必须是一个相应标记为\
  \ `@Embeddable` 的类。与映射超类类似，可嵌入类可以为其持久化字段保存映射元数据。当以这种方式使用时，引用可嵌入对象的字段被标记为 `@Embedded`，并且可嵌入类上的字段映射到拥有实体的表。可嵌入类完全由嵌入它们的类拥有，并且与它们的拥有对象一起被持久化、合并、查询和删除。可嵌入类的实例没有自己的持久化标识，也不能在实体之间传递。它们通常因其作为字段组织工具的便利性而被使用，允许将一组持久化字段封装为拥有实体上的单个字段。\n\
  \n作为一个例子，让我们将我们的 `Address` 实体（代码清单 4-20）转换为一个可嵌入类，并将其作为 `Person` 实体（代码清单 4-21）上的一个字段嵌入。图\
  \ 4-5 显示了配置为我们的 `JOINED` 层次结构的基础模式，不同之处在于 `CH04_JOIN_ADDRESS` 上的数据列已被合并到 `CH04_EMB_PERSON`\
  \ 表中。\n\n![9781430246923_Fig04-05.jpg](img/9781430246923_Fig04-05.jpg)\n\n图 4-5.  CH04_EMB_PERSON\
  \ 表包含 Person 实体中所有字段的列，以及来自嵌入的 Address 的字段\n\n将 `Address.java` 转换为 `@Embeddable`\
  \ 非实体类的过程如代码清单 4-20 所示。`@Id` 和 `@Version` 字段现在消失了，因为 Address 不再拥有自己的标识。`Employee`、`FullTimeEmployee`\
  \ 和 `PartTimeEmployee` 实体与 `JOINED` 层次结构配置相比没有变化。\n\n***代码清单 4-20.***  Address.java，一个可嵌入的非实体类\n\
  \n\n\n```\n/**\n * Address: 一个可嵌入的非实体类\n */\n@Embeddable\npublic class Address implements\
  \ Serializable {\n  @SuppressWarnings(\"compatibility:-5340972441524875330\")\n\
  \  private static final long serialVersionUID = -5279408726470732092L;\n  @Column(length\
  \ = 400)\n  private String city;\n  @Column(length = 2)\n  private String state;\n\
  \  @Column(length = 400)\n  private String street1;\n  @Column(length = 400)\n \
  \ private String street2;\n  @Column(name = \"ZIP_CODE\")\n  private String zipCode;\n\
  \npublic Address() {\n  }\n\n/* get/set 方法 */\n}\n```\n\n***清单 4-21.***  Person.java，一个持有\
  \ @Embedded homeAddress 字段的实体\n\n```\n/**\n * Person: 一个抽象实体，也是继承层次结构的根\n *\n *\
  \ 创建 ID 生成器表 \"CH04_EMB_PERSON_ID_GEN\": CREATE TABLE \"CH04_EMB_PERSON_ID_GEN\"\
  \n * (\"PRIMARY_KEY_NAME\" VARCHAR2(4000) PRIMARY KEY, \"NEXT_ID_VALUE\" NUMBER(38));\n\
  \ *\n * 为此实体的 ID 生成器 'Person.id' 初始化该表的数据（起始值为 '0'）: INSERT INTO \"CH04_EMB_PERSON_ID_GEN\"\
  \ VALUES ('Person.id', 0);\n */\n@Entity\n@NamedQueries({\n  @NamedQuery(name =\
  \ \"Person.findAll\", query = \"select o from Person o\")})\n@Table(name = \"CH04_EMB_PERSON\"\
  )\n@TableGenerator(name = \"Person_ID_Generator\", table = \"CH04_EMB_PERSON_ID_GEN\"\
  ,\n                pkColumnName = \"PRIMARY_KEY_NAME\", pkColumnValue = \"Person.id\"\
  ,\n                valueColumnName = \"NEXT_ID_VALUE\")\n@Inheritance(strategy =\
  \ InheritanceType.JOINED)\npublic abstract class Person implements Serializable\
  \ {\n  @SuppressWarnings(\"compatibility:-7074714881275658754\")\n  private static\
  \ final long serialVersionUID = 5291172566067954515L;\n  @Id\n  @Column(nullable\
  \ = false)\n  @GeneratedValue(strategy = GenerationType.TABLE, generator = \"Person_ID_Generator\"\
  )\n  private Integer id;\n  @Column(name = \"FIRST_NAME\", length = 400)\n  private\
  \ String firstName;\n  @Column(name = \"LAST_NAME\", length = 400)\n  private String\
  \ lastName;\n  @Embedded\n  private Address homeAddress;\n  @Version\n  private\
  \ Integer version;\n\npublic Person() {\n  }\n\n/* get/set 方法 */\n}\n```\n\n当 `Person`\
  \ 实例被持久化时，其 `homeAddress` 实例上的字段值会被保存到 `CH04_EMB_PERSON` 表的相应列中。\n\n@ElementCollection\n\
  \nJPA 2.0 引入的一个有用的映射特性是，能够在实体或映射超类中嵌入非实体对象的集合，并使这些集合完全归嵌入类所有。`@ElementCollection`\
  \ 是使用 `@Embeddable` 和 `@Basic` 字段的集合对应物；只是集合中的实例始终存储在独立于所属实体或映射超类的单独表中。同样，它也是实体关系类型\
  \ `@OneToMany` 的非实体对应物。清单 4-22 展示了我们的 Employee 实体持有两个元素集合，一个包含 `@Embeddable` 实例，另一个包含\
  \ `@Basic` 实例。\n\n***清单 4-22.***  Person.java，一个持有两个 @ElementCollection 字段的实体\n\n\
  ```\n@Entity\npublic abstract class Person implements Serializable {\n  ...\n  @ElementCollection(fetch=FetchType.LAZY)\n\
  \  private List<Address> addresses;\n\n@ElementCollection\n  Private Collection<String>\
  \ favoriteCities;\n\npublic Person() {\n  }\n\n/* get/set 方法 */\n}\n```\n\n这段代码演示了\
  \ `@ElementCollection` 的一些最简单用法，主要采用了默认映射。通过使用更高级的映射，你可以自定义集合映射表如何连接到 `Person` 的根表、查询是立即加载还是延迟加载、列名和表名、如何将元素集合指定为\
  \ `Map`，以及许多其他细节。\n\n多态关系\n\n如前面的示例所示，实体关系可以在层次结构中的具体实体和抽象实体之间指定。你可以与继承层次结构中的任何实体定义关系，并且该关系将隐式地包含该实体的子类型。即使在映射超类上声明的持久化实体关系字段也是多态的。以这种方式隐式包含子类型的关系称为*多态关系*。\n\
  \n在 JPA 中，关系可以针对任何其他实体类定义，包括层次结构中的抽象超类型实体。这种对多态关系的支持补充了 JPA 对映射类层次结构的支持，并为跨实体类型层次结构在任何级别查询实体提供了强大的构造。在前面的实体层次结构示例中，`FullTimeEmployee.manager`\
  \ 到 `Employee.managedEmployees` 的关系说明了具体实体 `FullTimeEmployee`（`manager`）与其抽象 `Employee`（`managedEmployee`）实例集合之间的一对多、双向关系。此示例显示了同一层次结构内实体之间的关系，但它同样可以轻松地在不同实体层次结构的实体之间定义。\n\
  \n关系映射\n\n映射多态关系不需要了解关系中任一实体的继承表映射策略。这一点从以下事实可以明显看出：在我们应用了三种继承映射策略中的每一种时，示例实体类中的关系字段映射保持不变。所有关系都映射到目标类的主键，这种映射假设之所以成为可能，是因为规范要求类层次结构中的所有类共享一个公共的主键结构，即使每个子类映射到自己的表也是如此。为每个实体定义的映射信息足以让\
  \ JPA 持久化框架将基类型引用解析为实际的子类实例。关系字段是使用 `JOIN` 和 `UNION` 语句自动派生的，并且这些查询进一步受到使用 `WHERE`\
  \ 子句（引用鉴别器列值）的约束。\n\n多态 JPQL 查询\n\n类似地，JPQL 和 Criteria API 查询可以选择或连接超类型类的实体，并且任何符合查询条件的子类型实例都将返回到查询结果列表中。此外，查询可以使用内部\
  \ `JOIN` 子句将引用绑定到超类型层次结构中的任何类型，唯一的限制是 `JOIN` 子句的左侧和右侧必须解析为公共的基类型。\n\n在前面的继承层次结构中，在抽象\
  \ `Person` 和 `Employee` 实体上定义的命名查询 `\"Person.findAll\"` 和 `\"Employee.findAll\"\
  ` 就是多态查询的示例。从这些查询返回的实例都是具体实体——要么是 `FullTimeEmployee`，要么是 `PartTimeEmployee`。\n\n\
  举例来说，让我们看看示例客户端中的一些代码。清单 4-23 查询所有家庭地址在 San Mateo 某处的 `Employee` 实例。该查询在抽象 `Employee`\
  \ 实体上发出，并遍历在根 `Person` 实体上定义的 `homeAddress` 关系字段。从此查询返回的任何实体都将是具体的，要么是 `FullTimeEmployee`，要么是\
  \ `PartTimeEmployee`。\n\n***清单 4-23.***  演示 JPQL 中多态关系用法的代码清单\n\n```\n//  用于演示多态关系用法的临时\
  \ JPQL\nfinal String stmt =\n  \"select o from Employee o where o.homeAddress.city\
  \ = 'San Mateo'\";\nfinal List<Employee> emps = em.createQuery(stmt).getResultList();\n\
  for (Employee emp : emps)\n{\n  System.out.println(emp.getFirstName());\n  System.out.println(emp.getLastName());\n\
  }\n```\n\n使用原生 SQL 查询\n\n\n\nJPQL 允许通过名称引用实体字段，并通过关系与其他实体进行连接，而无需考虑底层映射细节。这为数据库模式定义者和查询定义者角色之间提供了相当程度的独立性。然而，有时您需要控制查询以利用特定索引、返回稀疏数据集，或者发出用\
  \ SQL 表达更为便捷的查询。JPA 让您能够轻松做到这一点，并且如果您愿意，它甚至支持将查询结果映射回实体。\n\n例如，您可能希望使用原生 SQL 查询，仅从一个恰好映射到您某个实体的表中返回名称和主键列数据。然后，查询到的名称值可以通过组合框呈现给用户，只有当用户选择一个名称时，您才去访问\
  \ `EntityManager`，并使用 `EntityManager.find(Object primaryKey)` 调用将该名称对应的主键值绑定到一个实体实例上。如果您使用\
  \ JPQL 返回一个包含完全加载实体的集合，而不是仅返回稀疏的键和名称数据集，那么您将查询比实际需要更多的数据字段，从而导致消耗比实际需求更多的资源。\n\n\
  清单 4-24 中的示例展示了如何定义一个返回 `Address` 实体类型实例的命名原生 SQL 查询。对于客户端而言，执行此命名原生查询与执行等效的 JPQL\
  \ 命名查询是相同的。\n\n***清单 4-24.***  演示原生 SQL 支持的代码清单\n\n```\n@NamedNativeQueries({\n\
    @NamedNativeQuery(name = \"Address.findAllNative\",\n    query = \"select id,\
  \ city, state, street1, street2, zip_code from ch04_join_address\",\n    resultClass=Address.class)})\n\
  ```\n\n查询条件 API\n\nJPA 2.0 引入了一种替代 JPQL 的方法来定义和执行查询，该方法使用强类型组件。仅使用 Java，条件 API 允许您动态构建任意复杂的查询并执行它们，以返回与通过\
  \ JPQL 所能达到的相同结果，但具有编译时类型检查。由于 JPQL 和条件 API 使用相同的底层查询引擎，它们在能力上是等效的，并且对于 JPQL 中可表达的每个特性，都有一个类似的条件\
  \ API 调用。例如，对于通过查询构建器动态定义查询的情况，条件 API 可能比动态构建等效的 JPQL 语句更易于管理。\n\n虽然完整的条件 API（如同\
  \ JPQL 语言的完整功能集）超出了本书的范围，但我们在清单 4-25 中展示了一个如何使用它的示例。\n\n***清单 4-25.***  演示查询条件 API\
  \ 使用的代码清单\n\n```\n/**\n *  条件 API 等效于以下 JPQL 查询：\n *\n *    select o from Address\
  \ o where o.city = :city\n */\npublic List<Address> getAddressFindByCity(String\
  \ city) {\n  //  定义一个返回 Address 类型对象的查询\n  CriteriaBuilder cb = em.getCriteriaBuilder();\n\
    CriteriaQuery<Address> c = cb.createQuery(Address.class);\n  Root<Address> addr\
  \ = c.from(Address.class);\n\n//  添加 SELECT 子句\n  c.select(addr);\n\n//  在 WHERE\
  \ 子句中定义一个谓词，用于比较 city\n  //  属性与参数值\n  ParameterExpression<String> p = cb.parameter(String.class,\
  \ \"city\");\n  c.where(cb.equal(addr.get(\"city\"), p));\n\n//  绑定 'city' 参数\n\
    TypedQuery<Address> q = em.createQuery(c);\n  q.setParameter(\"city\", city);\n\
  \n//  将查询结果作为 List<Address> 返回\n  return q.getResultList();\n}\n```\n\n条件 API 是一种更正式的方法，但在合适的应用场景中可能非常有用。\n\
  \n复合主键与嵌套外键\n\n在将实体映射到新模式时，最佳实践是指定一个专用的单列作为主键列，正如我们在前面的示例中所做的那样。实体的主键值一旦分配就无法更新。此外，使用专用列来保存主键，而不是使用名称或其他包含有意义属性数据的列，可以消除用户希望修改恰好是主键一部分的语义重要字段时可能出现的潜在冲突。遵循一种对所有实体通用的单一方法也是可取的，而使用单个专用列作为主键是我们发现行之有效的一种简单模式。\n\
  \n然而，在某些情况下，模式已经定义好并正在被适配为 JPA 实体形式的 Java 代码，或者出于其他原因需要复合主键。我们经常遇到的一种遗留情况是，复合主键包含的列（例如外键列）也参与了与其他实体的关系。除此之外，这些关系必然是强制性的（因为所有主键列必须为\
  \ `NOT NULL`），因此当您需要持久化此类相关实体时，必须小心如何持久化您的实体图，以避免在 `EntityManager.persist()` 调用期间插入行数据时违反\
  \ `NOT NULL` 约束。\n\n有两种方法可以使用复合主键来实现实体的标识。它们将在以下章节中描述。\n\n使用嵌入式复合键 (@EmbeddedId)\n\
  \n如果复合键的字段不代表您认为属于实体定义的有用属性数据，您可以将单个实体字段指定为主键字段，并将其类型设置为复合键类类型。此复合键类被标记为 `@Embedded`。它的字段将被映射，就好像它们是实体本身的一部分一样，但客户端只能通过复合字段访问它们。\n\
  \n实体上的嵌入式复合键字段 `myId` 使用 `@EmbeddedId` 进行注解。在清单 4-26 中，我们引入了 `@Embeddable` 类 `MyIdClass`，它包含了之前位于\
  \ `Person` 上的 `firstName` 和 `lastName` 字段。\n\n***清单 4-26.***  MyIdClass.java，一个适合用作\
  \ @EmbeddedId 的 @Embeddable 类\n\n```\n@Embeddable\npublic class MyIdClass {\n  @Column(name\
  \ = \"FIRST_NAME\", length = 400)\n  private String firstName;\n  @Column(name =\
  \ \"LAST_NAME\", length = 400)\n  private String lastName;\n\n@Override\n  public\
  \ boolean equals(Object obj) {\n    return (obj instanceof MyIdClass &&\n            firstName.equals(((MyIdClass)\
  \ obj).getFirstName()) &&\n            lastName.equals(((MyIdClass) obj).getLastName()));\n\
    }\n\n@Override\n  public int hashCode() {\n    return System.identityHashCode(this);\n\
    }\n\n/* get/set 方法 */\n}\n```\n\n清单 4-27 展示了这个新类在 `Person` 类上作为 `@EmbeddedId`\
  \ 使用的情况。\n\n***清单 4-27.***  Person.java，演示使用 @EmbeddedId 注解的复合主键\n\n```\n@Entity\n\
  @NamedQueries({\n  @NamedQuery(name = \"Person.findAll\", query = \"select o from\
  \ Person o\")})\n@Table(name = \"CH04_EMBID_PERSON\")\npublic class Person implements\
  \ Serializable {\n  @SuppressWarnings(\"compatibility:-7074714881275658754\")\n\
    private static final long serialVersionUID = 5291172566067954515L;\n  @EmbeddedId\n\
    private MyIdClass myId = new MyIdClass();\n  @Version\n  private Integer version;\n\
  \npublic Person() {\n  }\n\n/* get/set 方法 */\n}\n```\n\n\n\n要将`Person`类改为使用嵌入式 ID，我们将`@Id\
  \ Integer id`字段替换为`@EmbeddedId myIdClass myId`字段。为了使该实体重新适配到示例中的`JOINED`实体层次结构中，`Person`的`Employee`子实体上的`manager`关系字段以及所有子实体上的主键字段都需要进行修改，以映射到新主键中的所有列。\n\
  \n在实体类上直接公开复合键类字段（@IdClass）\n\n映射复合主键的另一种方法是在实体类上为主键类中的每个字段显式声明字段，但为每个字段添加`@Id`注解，如清单\
  \ 4-28 所示。如果主键上的某些字段同时也是实体中有用的属性，你可能会倾向于采用这种方法。然后，你需要定义一个新的复合键类，在其中声明所有这些`@Id`字段，并确保这些字段与键类字段的名称和类型完全匹配。\n\
  \n从之前使用`@EmbeddedId`的示例类开始，我们可以修改`MyIdClass`，移除`@Embedded`注解，如清单 4-28 所示。\n\n***清单\
  \ 4-28.*** MyIdClass.java，一个适合用作@IdClass 的可序列化 Java 类\n\n```\npublic class MyIdClass\
  \ implements Serializable {\n  @Column(name = \"FIRST_NAME\", length = 400)\n  private\
  \ String firstName;\n  @Column(name = \"LAST_NAME\", length = 400)\n  private String\
  \ lastName;\n\npublic MyIdClass() {\n  }\n\npublic MyIdClass(String firstName, String\
  \ lastName) {\n    this.firstName = firstName;\n    this.lastName = lastName;\n\
    }\n\n@Override\n  public boolean equals(Object obj) {\n    return obj instanceof\
  \ MyIdClass && firstName.equals(((MyIdClass) obj).getFirstName()) && lastName.equals(((MyIdClass)\
  \ obj).getLastName());\n  }\n\n@Override\n  public int hashCode() {\n    return\
  \ System.identityHashCode(this);\n  }\n  /* get/set methods */\n}\n```\n\n这个复合键类不需要特殊的注解。它主要用于通过`EntityManager.find()`方法根据主键查找`Person`实例。\n\
  \n在`Person`类中，`firstName`和`lastName`字段现在都被标记为`@Id`。我们添加了一个`@IdClass`注解，将`MyIdClass`标识为复合主键类，如清单\
  \ 4-29 所示。\n\n***清单 4-29.*** Person.java，一个使用@IdClass 作为复合主键的实体\n\n```\n@Entity\n\
  @NamedQueries({\n  @NamedQuery(name = \"Person.findAll\", query = \"select o from\
  \ Person o\")})\n@Table(name = \"CH04_IDCLASS_PERSON\")\n@IdClass(MyIdClass.class)\n\
  public class Person implements Serializable {\n  @SuppressWarnings(\"compatibility:-7074714881275658754\"\
  )\n  private static final long serialVersionUID = 5291172566067954515L;\n  @Id\n\
    @Column(name = \"FIRST_NAME\", length = 400)\n  private String firstName;\n  @Id\n\
    @Column(name = \"LAST_NAME\", length = 400)\n  private String lastName;\n  @Embedded\n\
    private Address homeAddress;\n  @Version\n  private Integer version;\n\npublic\
  \ Person() {\n  }\n\n/* get/set methods */\n}\n```\n\n映射使用复合键的关系\n\n在定义关系时，如果目标实体使用了复合主键，则拥有方实体必须将其关系字段映射到相应类型的列。这需要使用`@JoinColumns`注解（或等效的\
  \ XML 元数据）。如果这些列恰好嵌套在拥有方实体的主键中，或者它们受到`NOT NULL`约束，那么必须在调用`EntityManager.persist()`操作将该实体持久化到持久化上下文时，或者至少在调用`EntityManager.flush()`发出数据库`INSERT`调用时，绑定该关系。\n\
  \n在以下示例中，`PersonPK`复合主键类包含两个字段——`id`和`addressId`——由于它们是主键的一部分，因此是强制性的（`NOT NULL`）。由于`addressId`和关系字段`homeAddress`都映射到同一个`ADDRESS_ID`列，并且这两个字段中只能有一个是可插入和可更新的，因此我们必须将其中一个字段标记为只读。在清单\
  \ 4-30 中，通过在`@JoinColumn`注解上设置`insertable=false`和`updatable=false`属性，将关系字段`homeAddress`标记为只读。\n\
  \n***清单 4-30.*** Person.java，包含一个复合主键，该主键映射到一个由普通@Id 字段和关系字段共享的列\n\n```\n/*\n *\
  \ Person: 一个抽象实体，是 SINGLE_TABLE 层次结构的根，\n * 演示了使用包含字段的复合键，该字段映射的列同时也被映射到关系字段。\n\
   */\n@Entity\n@Inheritance(strategy = InheritanceType.SINGLE_TABLE)\n@NamedQueries({\n\
    @NamedQuery(name = \"Person.findAll\", query = \"select o from Person o\")})\n\
  @TableGenerator(name = \"Person_ID_Generator\", table = \"CH04_FKINPK_PERSON_ID_GEN\"\
  ,\n                pkColumnName = \"PRIMARY_KEY_NAME\", pkColumnValue = \"Person.id\"\
  ,\n                valueColumnName = \"NEXT_ID_VALUE\")\n@Table(name = \"CH04_FKINPK_PERSON\"\
  )\n@IdClass (PersonPK.class)\npublic abstract class Person\n  implements Serializable\n\
  {\n  @Id\n  @Column(name = \"ADDRESS_ID\")\n  private Integer addressId;\n  @Id\n\
    @Column(nullable = false)\n  @GeneratedValue(strategy = GenerationType.TABLE,\
  \ generator = \"Person_ID_Generator\")\n  private Integer id;\n  @Column(name =\
  \ \"FIRST_NAME\")\n  private String firstName;\n  @Column(name = \"LAST_NAME\")\n\
    private String lastName;\n  @Version\n  private Integer version;\n  @OneToOne(cascade\
  \ = { CascadeType.ALL })\n  @JoinColumn(name = \"HOME_ADDRESS\")\n  private Address\
  \ homeAddress;\n\npublic Person() {\n  }\n\n/* get/set methods */\n}\n```\n\n使用此`Person`类时，你可以通过`homeAddress`关系字段检索数据，但不能更新此字段。其值必须在实体持久化时填充，并且由于它是实体主键的一部分，之后不能修改。\n\
  \n乐观锁支持（@Version）\n\n\n\n如前面的示例所示，你可以使用 `@Version` 注解来指定一个字段，供 `EntityManager` 在合并操作和并发管理时执行乐观锁。*乐观锁*是一种有用的性能优化手段，它将原本需要数据库承担的工作转移到了客户端。数据库通常提供*悲观锁*服务，允许数据库客户端（此处指\
  \ JPA 的 `EntityManager`）锁定表中的某一行，以防止在 `EntityManager` 应用某些更改时其他客户端更新该行。这是一种确保两个客户端不会同时修改同一行的有效机制，但它需要在数据库内部进行昂贵的、低级别的访问检查。悲观锁的替代方案是将并发控制转移到像\
  \ `EntityManager` 这样的数据库客户端中，并采用乐观锁策略。通过使用专用的 `@Version` 列，`EntityManager` 遵循几条简单的规则。每当它将修改后的实体发送到数据库时（例如在提交或刷新操作期间），它会查看实体实例的\
  \ `@Version` 字段的当前值，从数据库中查询该实体行的当前状态，并比较版本值。如果它们相同，它会递增实体实例的 `@Version` 字段（或任何标注了\
  \ `@Version` 的字段），并将更改发送到数据库，从而执行一条 `UPDATE` 语句。如果版本值不同，则意味着在 `EntityManager` 上次查询该行并将其加载到实体实例，到该实例被刷新回数据库的这段时间内，有其他客户端修改了该行。当检测到这种差异时，我们称之为*并发异常*，`EntityManager`\
  \ 会抛出异常并将事务标记为回滚。`EntityManager` 的客户端需要预见到可能发生并发异常，并且必须准备好解决冲突，通常的做法是通知用户存在冲突，以便在继续操作前刷新实体。\n\
  \n在实体上使用专用的 `@Version` 列，允许 `EntityManager` 通过简单比较实体实例中存储的 `@Version` 字段值与数据库中 `VERSION`\
  \ 列的值来执行乐观锁。如果你没有指定 `@Version` 字段，`EntityManager` 就必须遍历实体实例中的每个字段，并将其值与数据库中对应的映射列进行比较，这要繁琐得多。声明的\
  \ `@Version` 字段将由持久化框架自动填充，不应由应用程序代码更新。\n\n总而言之，使用 `@Version` 字段并非强制要求，但在实体上定义 `@Version`\
  \ 字段是一种良好的实践，可以让 `EntityManager` 利用这种优化。\n\n支持自动生成的主键值（@GeneratedValue）\n\n除了通过\
  \ `@Version` 列提供内置的乐观锁支持外，JPA 还提供了几种便捷的方式，在持久化实体时自动填充主键列。你可以声明一个字段的值应通过以下方式填充：\n\
  \n*   持久化框架维护的自动机制（`strategy=GenerationType.AUTO`）\n*   自定义数据库序列（`strategy=GenerationType.SEQUENCE`\
  \ 或 `GenerationType.IDENTITY`）\n*   模拟伪序列的自定义数据库表（`strategy=GenerationType.TABLE`）\n\
  \n我们发现自动填充主键功能在便利性方面非常高，省去了我们在应用程序中为每个实体编写此代码的麻烦。在 `persistence.xml` 中对持久化单元使用模式生成设置，可以让你让\
  \ JPA 在数据库中自动创建所需的工件（序列或表），甚至可以通过注解或 XML 使用 JPA 元数据指定的设置来配置它们。一旦安装，`AUTO` 策略会为任何标注了\
  \ `@GeneratedValue` 或 `@GeneratedValue(strategy=GenerationType.AUTO)` 的 `@Id` 字段生成唯一标识符，至少能让实体类看起来不那么杂乱。由于并非所有数据库都支持序列对象，你可能希望使用表生成器，正如本章示例所示。\n\
  \n列表 4-31 演示了默认 ID 生成特性的用法。\n\n***列表 4-31.***  Person.java，使用默认 ID 生成器\n\n```\n\
  @Entity\n@Inheritance(strategy = InheritanceType.JOINED)\n@DiscriminatorColumn(name\
  \ = \"TYPE\")\n@Table(name = \"CH04_JOIN_PERSON\")\n@NamedQuery(name = \"findAllPerson\"\
  , query = \"select object(o) from Person o\")\npublic abstract class Person implements\
  \ Serializable {\n    @Id\n    @GeneratedValue\n    private Long id;\n    /* ...\
  \ */\n}\n```\n\n用于生成本章示例中所有表和序列的 SQL 脚本可在示例代码区域中找到。此外，JPA 提供商会生成 DDL 对象，甚至一些所需的\
  \ DML，以支持部署的任何实体；因此，预先创建模式并非严格必要。然而，虽然 JPA 会接受关于使用哪些表和列名的指导，但目前还没有办法指定自动为你创建的约束或其他工件的名称。因此，如果你需要控制映射对象的名称和其他细节，最好在首次部署持久化单元之前预先创建模式。\n\
  \n为了说明如何预先创建 ID 生成所需的表和序列，列表 4-31 和 4-32 展示了在这些示例中创建 ID 生成器表和序列所需的 DDL。\n\n***列表\
  \ 4-32.***  @GeneratedValue 与 @SequenceGenerator 的用法\n\n```\n/**\n * 要创建 ID 生成器序列\
  \ \"CH04_SEQID_PERSON_ID_GEN\"：\n * CREATE SEQUENCE \"CH04_SEQID_PERSON_ID_GEN\"\
  \ INCREMENT BY 50 START WITH 50;\n */\n@Entity\n@Table(name = \"CH04_JOIN_PERSON\"\
  )\n@SequenceGenerator(name = \"Person_ID_Generator\", sequenceName = \"CH04_JOIN_PERSON_ID_GEN\"\
  ,\n                   allocationSize = 50, initialValue=1)\n@Inheritance(strategy\
  \ = InheritanceType.JOINED)\npublic abstract class Person implements Serializable\
  \ {\n  ...\n  @Id\n  @Column(nullable = false)\n  @GeneratedValue(strategy = GenerationType.SEQUENCE,\
  \ generator = \"Person_ID_Generator\")\n  private Integer id;\n  ...\n}\n```\n\n\
  列表 4-33 提供了一个基于表的 ID 生成器声明示例，以及一条用于为伪序列创建命名行的 INSERT 语句。\n\n***列表 4-33.***  @GeneratedValue\
  \ 与 @TableGenerator 的用法\n\n\n\n```\n/**\n * 用于创建 ID 生成器表\"CH04_JOIN_PERSON_ID_GEN\"\
  ：CREATE TABLE\n * \"CH04_JOIN_PERSON_ID_GEN\" (\"PRIMARY_KEY_NAME\" VARCHAR2(4000)\
  \ PRIMARY KEY,\n * \"NEXT_ID_VALUE\" NUMBER(38));\n *\n * 初始化该表以用于此实体的 ID 生成器'Person.id'（起始值为'0'）：INSERT\
  \ INTO \"CH04_JOIN_PERSON_ID_GEN\" VALUES\n * ('Person.id', 0);\n */\n@Entity\n\
  @Table(name = \"CH04_JOIN_PERSON\")\n@TableGenerator(name = \"Person_ID_Generator\"\
  , table = \"CH04_JOIN_PERSON_ID_GEN\",\n                pkColumnName = \"PRIMARY_KEY_NAME\"\
  , pkColumnValue = \"Person.id\",\n                valueColumnName = \"NEXT_ID_VALUE\"\
  )\n@Inheritance(strategy = InheritanceType.JOINED)\npublic abstract class Person\
  \ implements Serializable {\n  ...\n  @Id\n  @Column(nullable = false)\n  @GeneratedValue(strategy\
  \ = GenerationType.TABLE, generator = \"Person_ID_Generator\")\n  private Integer\
  \ id;\n  ...\n}\n```\n\n拦截器：实体回调方法\n\nJPA 支持多种回调方法，或称*拦截器*，允许你在实体或映射超类发生特定生命周期事件时添加自定义代码。你可以注册拦截器，使其在特定实体类型发生特定生命周期事件时被调用，或者更广泛地，在任何实体发生生命周期事件时被调用。后一种情况是少数必须使用\
  \ XML 指定元数据的场景之一，因为其效果会全局应用于持久化单元中的所有实体。\n\n以下注解可应用于方法，以表明它们是实体回调方法：\n\n*   `@PrePersist`\n\
  *   `@PostPersist`\n*   `@PreRemove`\n*   `@PostRemove`\n*   `@PreUpdate`\n*   `@PostUpdate`\n\
  *   `@PostLoad`\n\n要使用回调方法，你需要编写一个方法来实现所需行为，然后使用上述生命周期回调注解之一（例如 `@PrePersist`）对其进行注解。回调方法可以任意命名，但不得接受任何参数，且必须返回\
  \ void。如果需要，单个方法可以使用多个实体回调注解进行注解。\n\n或者，可以为实体（或映射超类）注册回调类，以拦截一个或多个实体类型上的一个或多个生命周期事件。对于任何给定的实体生命周期事件，可以注册多个拦截器方法，它们将按照指定的顺序执行。\n\
  \n实体回调方法可用于在实体持久化之前验证其内容，以及在实例化后填充瞬态派生字段。清单 4-34 展示了如何将 `@PreUpdate` 拦截器插入公司薪资系统中的\
  \ `FullTimeEmployee` 实体，以便每当来自某个邮政编码的员工实例因任何原因被更新时，自动为其加薪。（美好的愿望！）\n\n***清单 4-34.***  FullTimeEmployee.java，使用非法实体回调最终向老板“反击”！\n\
  \n```\n@Entity\n@Inheritance\npublic class FullTimeEmployee extends Employee {\n\
  \  ...\n  @PreUpdate\n  public void wishfulThinking() {\n    if (getHomeAddress().getZipCode()\
  \ == 94402) {\n      setSalary(getSalary() + 10000);\n    }\n  }\n  ...\n}\n```\n\
  \n编译、部署和测试 JPA 实体\n\n对于本章描述的七个主要特性，我们分别提供了一个独立的 NetBeans 项目，用于在纯 Java SE 环境中测试该特性。此外，每个项目都附带一个专用的\
  \ HTTP Servlet，用于通过 Java EE Web 应用程序测试相同的代码。我们鼓励你从这两个客户端环境探索这些示例，编辑 JPA 实体和测试代码，并观察结果。\n\
  \n前提条件\n\n在执行后续章节详述的任何步骤之前，请先完成第 1 章的“入门”部分。该部分将引导你完成本章示例所需的安装和环境设置。\n\n打开示例应用程序\n\
