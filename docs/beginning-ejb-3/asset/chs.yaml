  \ `addtoCart.jsp` 页面。\n\n我们将使用一个新的 `Quantity` 属性和一个 `addToCart()` 方法来更新 `JSFShoppingCart`\
  \ 受管 bean。列表 12-19 展示了这两部分的代码片段。`Quantity` 属性包含访问器方法，而 `addToCart()` 方法则使用从 `FacesContext`\
  \ 获取应用程序并从 `Login` 受管 bean 中检索 `ShoppingCart` 有状态 EJB 实例的技术。完成后，将调用 `addWineItem()`\
  \ 业务方法，将选中的葡萄酒和数量添加到 `ShoppingCart` EJB 中的购物车项目列表中。`addToCart()` 方法返回一个值 `success`，该值将用作导航规则。\n\
  \n***列表 12-19.***  包含 addToCart 方法的 JSFShoppingCart.java\n\n```\nString Quantity;\n\
  \npublic void setQuantity(String quantity) {\n  this.Quantity = quantity;\n}\n\n\
  public String getQuantity() {\n  return Quantity;\n}\n\npublic String addToCart()\
  \ {\n  Integer qty = new Integer(Quantity);\n  FacesContext ctx = FacesContext.getCurrentInstance();\n\
  \  Application app = ctx.getApplication();\n```\n\n\n//检查客户是否已登录。\n  ValueBinding\
  \ customerBinding = app.createValueBinding(\"#{Login.customer}\");\n  if (customerBinding.getValue(ctx)\
  \ == null) {\n    return \"success\";\n  }\n  else {\n    ValueBinding shoppingCartBinding\
  \ = app.createValueBinding(\"#{Login.shoppingCart}\");\n    shoppingCart = (ShoppingCartLocal)shoppingCartBinding.getValue(ctx);\n\
      shoppingCart.addWineItem(selectedWine, qty.intValue());\n    return \"success\"\
  ;\n  }\n}\n```\n\n要完成此任务，我们需要向 `faces-config.xml` 添加一个导航规则。清单 12-20 展示了该 XML 片段。当葡萄酒成功添加到购物车后，用户将被引导至一个新页面\
  \ `cartItems.jsp`，该页面会显示购物车中所有商品的列表。\n\n***清单 12-20.***  faces-config.xml，包含 addtoCart\
