  \ servlet`的输出结果。\n\n![9781430246923_Fig06-18.jpg](img/9781430246923_Fig06-18.jpg)\n\
  \n图 6-18.  检查 Servlet 输出\n\n会话 Bean 作为 Web 服务客户端\n\n会话 Bean 也可以作为 Web 服务的客户端。在第\
  \ 7 章将要构建的示例应用程序中，负责协调工作流的`OrderProcessing`会话 Bean 可以在开始处理订单之前调用信用服务来检查信用卡的有效性。为了充当\
  \ Web 服务的客户端，`OrderProcessing`会话 Bean 将使用`@WebServiceRef`注解，这与我们在之前的客户端示例中展示的方式类似。\n\
  \n清单 6-14 展示了无状态会话 Bean `OrderProcessFacadeBean`，它实现了本地和远程业务接口。`@WebServiceRef`注解用于注入对`CreditService`\
  \ WSDL 文档的引用。`OrderProcessFacadeBean`会话 Bean 中的`PerformCheckCredit()`方法使用注入的引用来获取`CreditService`中的端口，并调用`creditCheck`操作。如您所见，从会话\
  \ Bean 中注入 Web 服务、获取端口以及调用操作的过程，与我们之前作为 Web 服务客户端的客户端所做的类似。\n\n***清单 6-14.***  OrderProcessFacadeBean.java\n\
  \n```\n@Stateless(name=\"OrderProcessFacade\")\npublic class OrderProcessFacadeBean\
  \ implements OrderProcessFacade,\n                                              \
  \ OrderProcessFacadeLocal {\n    @WebServiceRef(type=CreditService.class)\n    CreditService\
  \ service;\n    public OrderProcessFacadeBean() {\n    }\n\nprivate boolean PerformCreditCheck(Individual\
  \ customer){\n                String ccnum  = customer.getCcNum().toString();\n\
                  CreditCheckEndpointBean creditService =\n                    service.getCreditCheckEndpointBeanPort();\n\
                  return creditService.creditCheck(ccnum);\n           }\n}\n```\n\
  \n结论\n\n在本章中，我们向您介绍了 Web 服务——一种遵循查找-绑定-执行模型的架构——以及 UDDI、WSDL 和 SOAP 等标准如何在标准化和互操作性方面使\
  \ Web 服务相较于早期的分布式计算模型变得无处不在。我们还简要讨论了 REST 架构模式和 RESTful Web 服务，它们简化了 Web 服务的创建和使用。\n\
  \n我们深入研究了 UDDI、SOAP 和 WSDL 标准的细节，并通过一个简单的信用服务示例演示了 WSDL 文档和 SOAP 消息是如何构建的。\n\n\n\
  \n我们讨论了 Web 服务的一些使用场景，以及它们如何融入内联网和互联网模型，并列举了一些提供 Web 服务的现有电子商务网站示例。\n\n随后，我们深入探讨了\
  \ Java EE 平台，并研究了不同的标准（JAX-WS、JAX-RS、JAXB、JAXR、SAAJ 和 JSR 181），这些标准使开发者能够创建在.NET\
  \ 平台上可移植且可互操作的 Web 服务。\n\n接着，我们探讨了如何使用简单的 Web 服务元数据注解将 EJB 无状态会话 Bean 发布为 Web 服务。我们开发了一个可供\
  \ Web 服务客户端调用的信用服务。\n\n最后，我们研究了如何使用 GlassFish 应用服务器和 Servlet 客户端来编译、部署和测试 Web 服务，并探讨了这种编程模型与使用\
  \ EJB 调用 Web 服务的相似之处。\n\n到目前为止，我们已经讨论了 EJB 规范的各个独立组件：会话 Bean、JPA 实体、MDB 和 Web 服务。在下一章中，我们将讨论如何整合所有这些组件来构建一个企业级应用。\n\
  \n第 7 章\n\n![image](img/frontdot.jpg)\n\n整合会话 Bean、实体、消息驱动 Bean 和 Web 服务\n\n引言\n\
  \n本书前面的章节涵盖了 EJB 及相关技术的各个独立组件。这些组件包括会话 Bean、消息驱动 Bean（MDB）、作为 Web 服务的无状态会话 Bean\
  \ 以及 JPA 实体。在本章中，我们将以虚构的葡萄酒商店应用为例，向您展示如何将这些组件整合成一个完整的 Java EE 7 应用。\n\n应用概述\n\n\
  我们将在本章开发的示例应用是“在线葡萄酒”应用，它为顾客（个人或分销商）提供多种搜索条件，顾客可以据此浏览、选择葡萄酒，将其添加到购物车，并处理订单。顾客需要先在“在线葡萄酒”应用中注册，然后才能提交订单。订单提交后，系统会验证顾客的信用卡，并触发订单处理消息，同时向顾客发送关于订单状态的电子邮件通知。\n\
  \n顾客用于搜索、导航和提交订单的界面是简单的 JavaServer Faces（JSF）Web 应用的一部分，该应用与使用 EJB 开发的后端服务和组件进行交互。在本章中，我们的重点将放在开发应用的后端部分，这部分可以通过\
  \ Servlet 和简单的 Java 客户端进行测试。在第 12 章中，我们将为这些后端服务开发一个 JSF 客户端。\n\n如图 7-1 所示，“在线葡萄酒”应用由客户端应用使用的多个后端组件组成，而这些后端组件又利用不同类型的服务来执行\
  \ CRUD（创建、检索、更新、删除）操作、向顾客发送关于订单状态的电子邮件通知、处理传入订单以及验证顾客的信用卡状态。我们将在下一节讨论这些组件的行为和功能。\n\
  \n![9781430246923_Fig07-01.jpg](img/9781430246923_Fig07-01.jpg)\n\n图 7-1. “在线葡萄酒”应用架构\n\
  \n应用组件与服务\n\n后端葡萄酒商店应用由不同类型的 EJB 组成，这些 EJB 被创建为组件和服务。关键组件和服务将在以下各节中描述。\n\n购物车组件\n\
  \n购物车组件管理已登录应用的注册顾客的购物车项目。该组件是一个有状态会话 Bean，它跟踪添加到购物车和从购物车中移除的购物车项目（葡萄酒和数量）。最后，购物车组件将订单信息传递给订单处理组件。\n\
  \n搜索外观组件\n\n搜索外观组件允许顾客检索所有葡萄酒，或使用年份、国家和葡萄品种等条件搜索葡萄酒。该组件是一个无状态会话 Bean，它根据执行的搜索条件返回葡萄酒列表。\n\
  \n顾客外观组件\n\n顾客外观组件允许顾客将自己注册为葡萄酒应用的会员，并根据其电子邮件地址检索顾客信息。该组件是一个无状态会话 Bean。\n\n订单处理外观组件\n\
  \n订单处理外观组件充当信用服务和订单处理服务之间的协调器。该组件处理购物车项目并创建可供订单处理服务使用的采购订单（PO）。该组件是一个无状态会话 Bean。\n\
  \n持久化服务\n\n持久化服务包含一个打包的持久化单元，该单元由一组映射到葡萄酒商店数据库模式的实体组成。应用后端部分的所有其他组件和服务都使用这个公共持久化单元来执行\
  \ CRUD 操作。\n\n电子邮件服务\n\n电子邮件服务是一个 MDB，它向顾客发送关于已提交订单状态的电子邮件。该服务本质上与我们在第 5 章中构建的 MDB\
  \ 相同，并且需要相同的 JMS 和 Java Mail 会话资源。\n\n信用服务\n\n信用服务是应用使用的一个 Web 服务。该服务将信用卡信息作为输入消息，并返回特定顾客的信用状态。我们将使用在第\
  \ 6 章中开发的信用服务。\n\n订单处理服务\n\n订单处理服务是一个 MDB，它在收到采购订单后负责大部分订单处理工作。\n\n“在线葡萄酒”应用业务流程\n\
  \n图 7-2 说明了葡萄酒应用的流程。一旦购物车服务将顾客和购物车项目信息提交给订单处理外观，它会在继续处理订单之前验证顾客的信用卡信息是否准确以及卡片是否有效。在收到信用服务的批准后，它会创建一个包含顾客和订单信息的采购订单，并将其提交给订单处理服务。如果从信用服务收到否定响应，则订单被取消，电子邮件服务会向顾客发送通知。一旦订单处理服务收到采购订单，它就会继续履行订单，这包括更新库存，并通过电子邮件服务向顾客发送关于订单状态的电子邮件通知。\n\
  \n![9781430246923_Fig07-02.jpg](img/9781430246923_Fig07-02.jpg)\n\n图 7-2. “在线葡萄酒”应用业务流程\n\
  \n图 7-3 说明了葡萄酒应用各组件和服务之间发生的交互。对这些交互的逐步解释见该图之后。\n\n![9781430246923_Fig07-03.jpg](img/9781430246923_Fig07-03.jpg)\n\
  \n图 7-3. “在线葡萄酒”应用组件与服务交互\n\n深入的组件/服务详解\n\n在以下各节中，我们将逐一讲解每个组件的代码，以解释其与其他组件和服务的交互。每个代码清单都包含在`Chapter07-IntegratedServices`示例应用中。在本章末尾，您将找到关于如何配置、构建、部署和执行此应用的分步说明。\n\
  \n持久化服务\n\n\n\n持久化服务以 JPA 持久化单元的形式向应用程序呈现领域模型。该持久化单元由 JPA 实体以及 `EntityManager` 组成，`EntityManager`\
  \ 用于对实体执行 CRUD 操作，并在事务上下文中管理这些实体的持久化状态。\n\n图 7-4 展示了这些实体、继承模型以及它们之间的关系。`Customer`\
  \ 实体被 `Individual` 和 `Distributor` 实体继承。`InventoryItem`、`CartItem` 和 `OrderItem`\
  \ 实体继承自 `WineItem` 实体。`BusinessContact` 实体被 `Supplier` 实体继承。葡萄酒商店持久化单元还包含这些实体之间不同类型的关联（包括一对一、一对多和多对多），这些关联将从应用程序代码中访问。这些实体中使用的映射已在第\
  \ 3 章和第 4 章中介绍过。我们将重点介绍此应用程序其他组件中用于集成此持久化单元的代码。\n\n![9781430246923_Fig07-04.jpg](img/9781430246923_Fig07-04.jpg)\n\
  \n图 7-4.  Wines Online 领域模型\n\n客户外观组件\n\n`CustomerFacadeBean` 是一个无状态会话 Bean。它提供业务方法，允许客户端应用程序根据电子邮件地址查询客户，或对\
  \ `Customer` 实体及其子类执行 CRUD 操作。此外观通过 `@PersistenceContext` 注解注入了一个 `EntityManager`，它使用该管理器对\
  \ `Customer` 实体执行 CRUD 操作。清单 7-1 展示了 `CustomerFacadeBean` 中的 `getCustomerFindByEmail`\
  \ 方法。此方法使用 `EntityManager` 中的 `createNamedQuery()` 方法调用在葡萄酒商店持久化单元的 `Customer` 实体中定义的命名查询\
  \ `Customer.findByEmail`。\n\n![image](img/sq.jpg) **注意**   `createNamedQuery()`\
  \ 是 `javax.persistence.EntityManager` 接口中的一个方法。此方法创建一个 `javax.persistence.Query`\
  \ 实例，用于执行以 JPQL（Java 持久化查询语言）或原生 SQL 指定的命名查询。\n\n***清单 7-1.***  getCustomerFindByEmail\
  \ 方法\n\n```\npublic Customer getCustomerFindByEmail(String email) {\n  return em.createNamedQuery(\"\
  Customer.findByEmail\", Customer.class).setParameter(\"email\", email).  getSingleResult();\n\
  }\n```\n\n清单 7-2 展示了 `CustomerFacadeBean` 的完整代码，其中包含使用 `EntityManager` 执行 CRUD 操作的业务方法。此\
  \ Bean 类未实现 Local 或 Remote 接口，因此 EJB 容器以 Local 模式直接调用 Bean 类。\n\n![image](img/sq.jpg) **注意**  \
  \ 在第 2 章中，我们提供了会话 Bean 的远程和客户端视图架构之间差异的详细信息，并总结了优缺点，同时讨论了 EJB 3.1 中引入的无接口模式。第 3\
  \ 章提供了关于 `EntityManager` 上可用于执行 CRUD 操作的方法的详细信息。\n\n***清单 7-2.***  CustomerFacadeBean.java\n\
  \n```\n@Stateless(name = \"CustomerFacade\", mappedName = \"Chapter07-IntegratedSamples-Chapter07-ServiceIntegration-ejb-CustomerFacade\"\
  )\npublic class CustomerFacadeBean {\n  @PersistenceContext(unitName = \"Chapter07-WineAppUnit-JTA\"\
  )\n  private EntityManager em;\n\npublic <T> T persistEntity(T entity) {\n    em.persist(entity);\n\
      return entity;\n  }\n\npublic <T> T mergeEntity(T entity) {\n    return em.merge(entity);\n\
    }\n\npublic void removeCustomer(Customer customer) {\n    customer = em.find(Customer.class,\
  \ customer.getId());\n    em.remove(customer);\n  }\n\n/**\n   * <code>select o\
  \ from Customer o</code>\n   */\n  public List<Customer> getCustomerFindAll() {\n\
      return em.createNamedQuery(\"Customer.findAll\", Customer.class).getResultList();\n\
    }\n\npublic Customer getCustomerFindById(Integer id) {\n    return em.find(Customer.class,\
  \ id);\n  }\n\n/**\n   * <code>select o from Customer o where o.email = :email</code>\n\
     */\n  public Customer getCustomerFindByEmail(String email) {\n    return em.createNamedQuery(\"\
  Customer.findByEmail\", Customer.class).setParameter(\"email\", email).    getSingleResult();\n\
    }\n\npublic Customer registerCustomer(Customer customer) {\n    return persistEntity(customer);\n\
    }\n}\n```\n\n搜索外观组件\n\n`SearchFacadeBean` 是一个无状态会话 Bean。此 Bean 提供业务方法，允许客户端应用程序根据葡萄酒的年份、国家和品种查询持久化单元中的\
  \ `Wine` 实体。`SearchFacadeBean` 中的持久化单元通过 `@PersistenceContext` 注解注入。清单 7-3 展示了 `SearchFacadeBean`\
  \ 的完整代码，其中包含使用 `EntityManager` 执行搜索操作的业务方法。此 Bean 类有一个业务接口 `SearchFacadeLocal`，它支持本地客户端访问。方法\
  \ `getWineFindAll()`、`getWineFindByYear()`、`getWineFindByCountry()` 和 `getWineFindByVarietal()`\
  \ 使用 `EntityManager` 中的 `createNamedQuery()` 方法调用在葡萄酒商店持久化单元的 `Wine` 实体中定义的相应命名查询，并在\
  \ `java.util.List` 中返回零个或多个 `Wine` 对象。\n\n***清单 7-3.***  SearchFacadeBean.java\n\
  \n```\n@Stateless(name = \"SearchFacade\", mappedName = \"Chapter07-IntegratedSamples-Chapter07-ServiceIntegration-ejb-SearchFacade\"\
