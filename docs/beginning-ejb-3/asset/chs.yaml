  \n图 12-27. 通知电子邮件\n\n应用程序客户端容器\n\n我们在前面的章节中已经提到并使用了应用程序客户端容器，并且在图 12-4 和图 12-5 中展示了几种应用程序架构。使用\
  \ Java Swing 等技术开发的应用程序客户端或客户端程序可以在独立的 Java SE 环境中运行。应用程序客户端容器提供了客户端程序在执行期间可以使用的额外系统服务（例如安全性和部署）。\n\
  \n应用程序客户端可以利用应用程序客户端容器提供的身份验证服务来验证其用户。容器的服务可以与本地平台的身份验证系统集成，为企业用户提供单点登录功能。\n\n使用应用程序客户端容器的客户端程序可以调用\
  \ EJB。与其他 Java EE 组件类似，在客户端容器中运行的程序可以使用 Java 命名和目录接口（JNDI）来查找 EJB 或资源，如 Java 消息服务（JMS）和\
  \ JavaMail。应用程序客户端容器还为客户端程序提供注入功能。由于应用程序客户端容器不会创建应用程序客户端的实例，因此应使用静态字段和方法来注入任何资源。\n\
  \n应用程序客户端被打包成 JAR 文件。如果使用应用程序客户端容器来运行客户端程序，则必须将应用程序客户端容器与应用程序一起捆绑或打包，以便您可以在单独的桌面机器上运行它。\n\
  \n结论\n\n在本章中，我们介绍了可用于满足不同需求的不同应用程序架构，以及与之配套的编程模型。我们研究了适用于 Web 和桌面应用程序的架构，还研究了 Web\
  \ 服务客户端应用程序和可以利用作为 Web 服务发布的 EJB 的业务流程服务。\n\n我们讨论了基于 Java EE 的 Web 技术是如何演进的，从而显著简化了\
  \ Web 应用程序的开发。\n\n我们深入探讨了 JSF 架构、JSF 生命周期和 JSF 应用程序，以及 JSF 工具和 UI 组件的当前状态。\n\n最后，我们构建了一个全面的\
  \ JSF 应用程序，用于与第 7 章中开发的集成 EJB 后端应用程序进行通信。在开发过程中，我们演示了几种编程技术，用于在 JSF 应用程序中共享数据，以及在后端应用程序中查找和调用业务方法。\n\
  \n最后，我们研究了应用程序客户端容器，包括它为在桌面机器上运行的客户端程序提供的服务。\n\n本书的最后一章将详细介绍各种 EJB 测试场景，并指导您如何使用\
  \ JUnit 在 GlassFish 的可嵌入 EJB 容器中测试 EJB 组件（和 JPA 实体）。\n\n第 13 章\n\n![image](img/frontdot.jpg)\n\
  \n在可嵌入 EJB 容器中进行测试\n\n与所有关键任务软件一样，EJB 组件在部署到生产环境之前必须经过充分测试。EJB 中最细粒度的级别是其方法；因此，适当的单元测试必须单独测试每个\
  \ EJB 的每个方法。对于无状态会话 Bean，这通常就足够了。由于有状态会话 Bean 也可能包含状态，因此完全覆盖还需要包含更粗粒度的场景，涉及方法调用序列。当无状态会话\
  \ Bean 通过 JPA 实体等方式在数据库中有效存储“状态”信息时，通常也需要多步骤测试场景。在本章中，我们将研究单方法和多方法测试，涵盖主要作为基于 JPA\
  \ 操作的服务接口的无状态和有状态会话 Bean。\n\n测试客户端\n\n\n\n到目前为止，本书中的示例大多使用 Servlet 作为客户端来调用 EJB\
  \ 方法。通过使用诸如 ServletUnit 之类的测试框架，Servlet 可以作为测试 EJB 的可行单元测试平台。类似地，调用 EJB 的 JSF 客户端可以使用\
  \ HttpUnit 框架进行单元测试，该框架允许你记录用户在浏览器中与 JSF 客户端交互的过程，然后将实际的屏幕结果与预期的屏幕结果进行比较。然而，这两种方法都必须在完整的\
  \ Java EE 应用服务器中执行。在本章中，我们将探索一种在纯 Java SE 环境中测试 EJB 的轻量级方案。\n\nEJB Lite\n\nEJB Lite\
  \ 是在 EJB 3.1 中引入的，并在 EJB 3.2 中得到了进一步增强，它被定义为完整 EJB 容器功能的一个最小子集。认识到许多企业应用只需要完整 EJB\
  \ API 的一个子集，EJB Lite 包含了 EJB 的许多最重要特性，但占用空间更小。EJB Lite 的实现包括下面描述的可嵌入 EJB 容器和 Java\
  \ EE Web Profile。\n\n由于 EJB Lite 是 EJB API 的一个严格子集，任何符合 EJB Lite 的应用也将在 Java EE\
  \ 服务器内的完整 EJB 容器中运行。也就是说，EJB Lite 并不显式支持任何超出 EJB API 范围的行为。\n\n可嵌入 EJB 容器\n\n*可嵌入\
  \ EJB 容器*本质上是一个 Java 库，它提供了 EJB Lite 规范所定义的服务。它模拟了在 Java EE 环境中运行的 EJB 容器，但自身运行在\
  \ Java SE 环境中。事实上，尝试从 Java EE 环境内部实例化一个可嵌入 EJB 容器是受限的。这个可嵌入容器为 EJB 提供了一个运行环境，提供注入的资源、安全性和\
  \ JTA 事务接口，以便 EJB 可以在受控环境中进行测试。\n\n本章组织结构\n\n在本章中，我们将探讨围绕单元测试的一些主要概念。然后，我们将结合 WineApp\
  \ 应用中的几个场景，研究如何使用可嵌入 EJB 容器来设置、执行和调试 JUnit 测试。接下来，我们将仔细审视 EJB Lite 提供的服务，揭示其优势和局限性，并展示一些有用的快捷方式，以隔离正在测试的\
  \ EJB 和 JPA 组件，同时降低测试环境的复杂性。\n\n在研究了使您能够在可嵌入 EJB 容器中使用 EJB 的 JUnit 测试代码之后，我们将探讨一些特别适合测试环境的、您可以利用的配置选项。在本章结束时，我们将逐步指导您如何在\
  \ NetBeans 中设置和配置 JUnit 环境，然后执行和调试测试。\n\n核心概念\n\n让我们更仔细地看看本章将要涵盖的一些主要概念。\n\nJUnit\n\
  \n*JUnit* 是一个广泛用于测试各种形式 Java 类的测试框架。*测试类*是普通的 Java 类，它们通过注解来标识具有特殊用途的方法。被注解为 `@Test`\
  \ 的方法标识一个单独的单元测试。该测试调用被测试类上的一个或多个方法，获取调用这些方法的结果，并将实际结果与预期结果进行比较。当它们不同时，测试会报告失败，从而提醒测试人员某个测试需要关注。\n\
  \n通过编写能够全面测试一个或多个类行为的 JUnit 测试，测试人员可以在每次修改被测试代码或任何被间接调用的代码时执行这些测试。任何失败都表明预期的行为不再发生。此外，由于单元测试通常针对非常特定的功能点，失败的测试可以清晰地告知测试人员导致问题的具体代码区域。\n\
  \n由于 EJB 是一个遵循公共接口的组件，它非常适合这种形式的单元测试。EJB 3.1 中引入的 EJB Lite 和可嵌入 EJB 容器，正式允许 EJB\
  \ 在纯 Java SE 环境中，通过 JUnit 测试框架进行无需修改的单元测试。\n\nEJB Lite\n\n让我们更仔细地看看构成 EJB Lite 的特性子集。表\
  \ 13-1 显示了 EJB 3.2 的主要特性中哪些包含在 EJB 3.2 Lite 中：\n\n表 13-1. 属于 EJB 3.2 Lite 一部分的 EJB\
  \ 3.2 特性\n\n| EJB 3.2 特性 | 是否包含在 EJB 3.2 Lite 中 |\n| --- | --- |\n| 会话 Bean（无状态、有状态和单例）\
  \ | 是 |\n| 消息驱动 Bean (MDB) | 否 |\n| Java 持久化 API | 是 |\n| 本地业务接口/无接口 | 是 |\n| 远程接口\
  \ | 否 |\n| JAX-WS Web 服务端点 | 否 |\n| JAX-RPC Web 服务端点 | 否 |\n| 非持久化 EJB 定时器服务 | 是\
  \ |\n| 持久化 EJB 定时器服务 | 否 |\n| 本地异步会话 Bean 调用 | 是 |\n| 远程异步会话 Bean 调用 | 否 |\n| 拦截器\
  \ | 是 |\n| RMI-IIOP 互操作性 | 否 |\n| 容器管理事务/Bean 管理事务 | 是 |\n| 声明式和编程式安全 | 是 |\n\n\
  最值得注意的是，在 EJB 3.2 Lite 中，支持所有形式的本地会话 Bean，但不支持远程会话 Bean、MDB 以及作为 Web 服务的 EJB。EJB\
  \ Lite 中包含安全性和 JTA 支持，包括对 BMT 和 CMT 的支持。最后，为 JPA 提供了对 EntityManager 和 EntityManagerFactory\
  \ 注入的支持。\n\n可嵌入 EJB 容器客户端\n\n使用可嵌入 EJB 容器的客户端通过 JNDI 查找 EJB，而不是通过注入，因为 Java EE 服务器提供了客户端注入，而在此环境中则没有。然而，EJB\
  \ 本身可以被注入其他 EJB，以及由其 EJB 容器提供的其他资源。\n\n在本章后面展示的 JUnit 示例中，JUnit 测试类本身是可嵌入 EJB 容器的客户端。它们通过一个静态工厂方法直接实例化容器，并可选地使用配置属性初始化容器。然后，容器向客户端提供一个\
  \ InitialContext，客户端可以通过 JNDI 命名空间查找 EJB 和其他资源。可嵌入 EJB 容器能够在运行时支持 EJB，为会话 Bean 注入资源，提供用于执行事务的\
  \ JTA 上下文，以及 表 13-1 中列出的 EJB Lite 中指定的所有其他服务。\n\n当在存在 GlassFish 可嵌入服务器（它也在 Java\
  \ SE 环境中运行）的环境中实例化可嵌入 EJB 容器时，GlassFish 通过向可嵌入 EJB 容器提供服务来增强体验。\n\nJUnit 测试\n\n\
  在探讨了本章的核心概念之后，现在让我们来看一些代码示例。与可嵌入 EJB 容器一样，JUnit 本质上是一个 Java 库，您将其包含在类路径中，以在您的应用中启用功能。虽然描述\
  \ JUnit 的所有特性（包括将测试分组到套件、定义初始化参数等）超出了本章的范围，但就我们的示例而言，将编写和执行 JUnit 类的基本任务视为如下步骤是很有用的：\n\
  \n*   编写遵循 JUnit 模式来初始化测试环境的测试类。\n\n\n\n*   编写一个或多个方法，通过调用 EJB 上的一个或多个方法来执行特定的单元测试，从这些方法调用中获取结果，并将结果与先前定义的预期结果进行比较。\n\
  *   在类级别上，当类中的任何测试方法首次被调用时，实例化可嵌入的 EJB 容器，并在最后一个测试方法被调用后关闭容器以释放资源。\n*   在测试级别上，初始化\
  \ JPA 持久化单元使用的数据库连接，以清除任何现有数据，并将状态重置为正确配置的状态。\n\n*   调用 JUnit 测试运行器，将要执行的测试类名称作为参数传递，并将以下内容添加到类路径中：\n\
  \n*   JUnit 类（`.jar` 文件）\n*   您编写的 JUnit 类（可选地放在 `.jar` 文件中）\n*   您正在测试的 EJB 的 EJB\
  \ `.jar` 文件，以及任何依赖的 `.jar` 文件（如 JPA 持久化单元）\n*   一个可嵌入的 EJB 容器 `.jar`，以及它所需的任何依赖\
  \ `.jar` 文件\n\n像 NetBeans、JDeveloper 或 Eclipse 这样的 IDE 极大地简化了调用过程，正如您将在本章后面看到的那样，它甚至会在您的\
  \ JUnit 测试类中设置许多基本的基础结构。这使您只需编写每个单元测试特定的核心代码。\n\n现在，让我们剖析一个我们针对 WineApp 示例应用程序中的\
  \ EJB 编写的 JUnit 测试类，以测试几个场景。\n\nWineAppServiceTest：针对 WineAppService EJB 的 JUnit\
  \ 测试类\n\n对于本章的示例，我们在清单 13-1 中提供了一个 JUnit 测试类，其中包含在可嵌入 EJB 容器中对 EJB 进行单元测试所需的所有元素。\n\
  \n***清单 13-1.***  WineAppServiceTest.java，一个用于测试 WineApp 应用程序中 EJB 的 JUnit 类\n\n\
  ```\npublic class WineAppServiceTest {\n  private static EJBContainer ejbContainer;\n\
