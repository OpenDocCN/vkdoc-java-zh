  \ 3-4 中描述的步骤。\n\n结论\n\n本章介绍了 Java 持久化 API 及其提供的一些基本服务。我们研究了如何通过简单地添加几个注解，将一个简单的\
  \ JavaBean 转换为 JPA 实体。然后，我们扩展了这个示例，以说明如何通过声明性地在实体类上指定额外的注解，进一步优化实体以增加更大的灵活性。\n\n\
  我们探讨了 JPA 的这些基本组件：持久化归档、持久化单元、持久化上下文和 `EntityManager`。我们逐步了解了实体生命周期，以检查实体在以下状态之间转换时的行为：新建、托管、分离和已删除。\n\
  \n关于 O/R 映射的部分探讨了实体如何映射到底层表，以及如何控制基本映射以允许字段映射到具有不同名称的列。\n\n我们讨论了实体主键的作用，探讨了简单主键和复合主键以及如何定义它们。我们展示了如何配置\
  \ ID 生成器，以便 JPA 在持久化实体时自动分配其主键。\n\n然后，我们深入研究了实体关系，并讨论了 JPA 支持的关系字段类型：`@OneToOne`、`@OneToMany`、`@ManyToOne`\
  \ 和 `@ManyToMany`。\n\n随后讨论了 JPQL，并举例说明了如何声明和执行命名查询，以及如何使用动态查询和批量更新与删除查询。\n\n最后，我们提供了一个示例应用程序，说明了相关实体如何交互，以及如何通过会话外观（由\
  \ HTTP Servlet 调用）来操作它们。\n\n第 4 章\n\n![image](img/frontdot.jpg)\n\n高级持久化特性\n\n我们将本书的持久化部分组织成三个主要章节。前一章介绍了\
  \ Java 持久化 API (JPA)，并为你提供了创建实体、建立对象/关系 (O/R) 映射以及编写检索实体的查询的起点。理解了这些概念，你就可以创建和构建具有强大、持久化实体的应用程序，这些实体既可以在\
  \ EJB 容器内部运行，也可以在外部运行。\n\n在本章中，我们将以此知识为基础，探索 Java 持久化 API (JPA) 中能为你的应用程序提供更大灵活性和强大功能的领域，包括以下内容：\n\
  \n\n\n*   如何定义和使用实体继承层次结构\n*   如何使用抽象实体、映射超类和非实体类\n*   如何使用 Java 持久化查询语言（JPQL）、原生\
  \ SQL 和查询条件 API 构建查询\n*   如何配置 ID 生成器以自动填充主键字段\n*   如何指定实体生命周期回调\n*   如何配置乐观锁定\n\
  \n持久化 API 的第三个主要领域涉及在使用 JPA 实体时，EJB 对事务管理的支持，这将在第 8 章中介绍。EJB 容器为您提供了多种选项，让会话 Bean\
  \ 管理 `EntityManager` 的生命周期、控制持久化上下文的存活时间，以及使用 Java 事务 API（JTA）或资源本地事务。充分了解 EJB 和\
  \ JPA 支持事务的方式以及如何应用这项技术后，您将拥有构建大规模、持久化企业级应用的工具。\n\n与本书其他章节一样，本章涵盖了规范中定义的许多概念，但无意取代规范。事实上，强烈建议读者将规范作为参考文档和资源，以更深入地探索这些概念，并发现其他超出本入门文本范围的内容。在此，我们专注于将规范中的一些基本特性转化为实际应用，提供示例说明如何使用新的持久化特性来实现构建基于组件的企业级\
  \ Java 应用这一现实目标。\n\n本章中的每个主要概念都包含在一个独立的、可运行的示例中。运行这些示例所需的步骤将在本章末尾的“编译、部署和测试 JPA\
  \ 实体”一节中介绍。总体结构是，我们为每个示例提供一个独立的 NetBeans 项目，并为每个项目提供其自己的 JPA 持久化单元、实体和 Java 测试服务类。您可以在纯\
  \ Java SE 环境中从 Java 客户端运行和测试这些示例，而无需运行 Glassfish，或者您也可以执行每个项目附带的 Servlet，在 Java\
  \ EE Web 环境中运行示例。\n\n![image](img/sq.jpg) **注意**   如前一章所述，实体可以指定其持久化状态由其实例变量或 Bean\
  \ 属性访问器定义。为了提高本章的可读性，我们使用术语*字段*来泛指实体的持久化成员，而将实体如何声明其持久化属性的细节留待讨论。\n\n映射实体继承层次结构\n\
  \nJava 自诞生以来就支持单类继承——即非接口类可以扩展另一个类。虽然在业务领域的许多方面，利用继承带来的代码复用和多态性优势已成为常见做法，但在 JPA\
  \ 引入之前，EJB 持久化领域并不支持数据继承。这曾是一个重大缺陷，因为在现实世界中，数据通常是层次化的，而缺乏对数据对象继承的标准内置支持导致了无数的变通方法和令人头疼的问题。利用\
  \ JDK 注解的易用性，JPA 提供了对定义和映射实体继承层次结构的声明式支持，包括抽象实体以及多态关系和查询。\n\n![image](img/sq.jpg) **注意**  \
  \ *抽象实体*是包含 `abstract` 修饰符的实体类，因此不能直接实例化。抽象实体必须是实体继承层次结构中的中间类；它本身不能是叶子实体，因为它只能通过其子实体之一进行实例化。相应地，实体继承层次结构中的所有叶子实体都必须是具体的，因此是可实例化的。抽象实体的存在是为了为其子实体提供公共数据结构，并通过与其他实体的多态关系来表示其子实体。\n\
  \nJPA 中实体继承支持的很大一部分源于设计人员和工具开发者的工作，他们多年来想出了各种方法来实现自己的 O/R 映射，而 JPA 则方便地采用了源自这些努力的几种替代继承映射方法。\n\
  \n在给定的实体继承层次结构中，单一继承策略适用于该层次结构中的所有实体。此外，无论采用何种继承策略，层次结构中的所有实体都必须使用相同的主键类型。这使得容器能够合理地支持多态关系，无论类层次结构采用何种映射策略。\n\
  \n另外，如果您的数据库有表列数限制为 256 列的限制，请注意实体可以自由地将其字段映射分布到多个表的连接行中。\n\n入门指南\n\n本章中的所有代码片段都以可运行的形式存在，您可以下载并在本地环境中直接执行，同时附带了用于在本地数据库中创建相应表和其他数据库对象的\
  \ SQL 脚本。运行示例的步骤将在本章末尾描述。由于这些示例仅涉及实体，我们可以利用 JPA 提供的纯 Java SE（容器外）支持，跳过将这些实体部署到 Java\
  \ EE 容器中的步骤。您将看到，一个简单的 Java 类就足以创建能够与这些实体交互并驱动示例测试的 `EntityManager`。实际观察这些概念将有助于澄清此处未解答的问题，并且这些示例还应为您测试自己的想法提供一个有用的起点。\n\
  \n实体继承映射策略\n\nJPA 为三种主要的实现策略提供了声明式支持，这些策略决定了层次结构中的实体如何映射到底层表。我们将通过将每种策略应用于一个示例实体层次结构来研究它们，并探讨每种方法的优缺点。此比较旨在帮助您决定如何在自己的应用中映射每个实体层次结构。\n\
  \n示例实体层次结构\n\n为了说明这三种策略如何在代码中体现，图 4-1 展示了一个示例实体层次结构，该结构演示了继承和多态关系。\n\n![9781430246923_Fig04-01.jpg](img/9781430246923_Fig04-01.jpg)\n\
  \n图 4-1.  一个以基础实体 Person 为根的实体类型层次结构，显示了层次结构内部和外部实体之间的关系\n\n在此示例中，`Person` 实体作为实体层次结构中的根类，并由\
  \ `Employee` 实体扩展。`Employee` 进一步特化以产生另外两个实体：`FullTimeEmployee` 和 `PartTimeEmployee`。图中通过未命名的白色箭头表示继承关系，通过命名的开放箭头表示普通实体关系。\n\
  \n\n\n根实体 `Person` 和中间实体 `Employee` 在我们的示例中都是抽象的。只有叶子实体 `FullTimeEmployee` 和 `PartTimeEmployee`，以及独立实体\
  \ `Address` 是具体的且可实例化的。请注意，即使是抽象实体也可能参与与其他实体的关系，并且正如你将从后续代码中看到的，抽象实体也可以在 JPQL 语句中使用。每当引用非叶子实体时，该引用隐式地假设所引用的实际具体实现可能是该实体或其任何子类实体。不过，非叶子实体也可以是具体的，如果我们选择在示例中这样做，本可以将这些基类设为具体。\n\
  \n根实体 `Person` 还持有一个对 `Address` 实例的单值引用，由 `Person` 上的 `homeAddress` 字段表示。此关系被 `Person`\
  \ 的所有子类继承；因此，所有 `Employee`（`FullTimeEmployee` 和 `PartTimeEmployee`）的实例也可以引用它们的 `homeAddress`\
  \ 字段。请注意，`Address` 上没有对应的字段引用 `Person`，因此这是一个单向关系。从上一章我们对实体关系的介绍中，你会记得这是一个一对一关系。\n\
  \n![image](img/sq.jpg) **注意**   两个实体之间仅通过其中一个实体上的字段暴露的关系称为*单向关系*。通过两个相关实体上的字段暴露的关系称为*双向关系*。\n\
  \n此外，我们在 `FullTimeEmployee`（一个 `manager`）和一组 `Employee`（其 `managedEmployees`）之间定义了一个一对多、双向的关系。由于此关系通过关系两端的字段暴露（在这种情况下，涉及的两个实体实际上是同一个实体\
  \ `Employee`），因此这是一个双向的一对多关系。\n\n在查看每个示例时，你会看到 Java 源文件在三种继承映射策略中基本保持不变。只有用于声明继承策略的类级别注解以及一些细节（如表名）将一个示例中的实体与另一个示例中的实体区分开来。这是一个关键优势——所选的继承策略可以在不影响实体\
  \ Java API 的情况下进行替换。在接下来的三节中，我们将说明如何将每种映射策略应用于此层次结构。\n\n在这些继承示例中，我们为 `Address` 实体包含了一个单独的表，该表与映射到每个继承层次结构的表并列，如数据库模式图所示。严格来说，没有必要为每个实体层次结构替换\
  \ `ADDRESS` 表，因为与 `Person` 实体关联的任何表都可以持有其自身对公共 `ADDRESS` 表的外键引用。然而，我们采用这种方法是为了帮助隔离每个继承示例。\n\
  \n对象/关系继承映射策略\n\n![image](img/sq.jpg) **注意**   除非另有说明，你可以假定本章中提到的所有 JPA 类都在 `javax.persistence.*`\
  \ 包中。\n\n现在我们已经定义了实体层次结构，让我们看看 JPA 原生支持的三种 O/R 策略如何用于映射此 `Person` 实体层次结构以及关联的 `Address`\
  \ 实体到关系模式。以下是 `InheritanceType` 枚举定义的每种策略的摘要：\n\n```\npublic enum InheritanceType\n\
  ```\n\n`{ SINGLE_TABLE, JOINED, TABLE_PER_CLASS };`\n\n*   `SINGLE_TABLE`：单表每类继承层次结构。这是默认策略。实体层次结构本质上被扁平化为其字段的总和，这些字段被映射到单个表中。\n\
  *   `JOINED`：公共基表与连接的子类表。在这种方法中，层次结构中的每个实体映射到其自己的专用表，该表仅映射该实体上声明的字段。层次结构中的根实体映射到基表，而层次结构中所有其他实体的表都引用此基表。\n\
  *   `TABLE_PER_CLASS`：单表每最外层具体实体类。第三种继承映射选项也不是 JPA 容器为符合 JPA 2.1 规范最终草案所必需的，因此可移植的应用程序应避免使用它，直到它被正式强制要求或至少得到广泛支持。此策略将每个叶子（即最外层的具体）实体映射到其自己的专用表。每个这样的叶子实体分支被扁平化，将其声明的字段与其所有超实体上声明的字段合并，这些字段的总和被映射到其表上。\n\
  \n@GeneratedValue 注解\n\n在每个继承策略示例中，我们使用 `@GeneratedValue` 注解来自动填充 `Person` 实体层次结构和独立实体\
  \ `Address` 的主键。在我们的示例中，我们指定一个名为 `id` 的字段作为主键，仅仅是为了保持一致性。在元数据中指定 ID 生成器允许持久化提供程序在实体实际作为行保存到数据库之前为其分配\
  \ ID 值。声明式指定 `@GeneratedValue` 注解肯定比在应用程序代码中分配 ID 更容易，并且相对于使用数据库触发器自动填充 ID 值的替代方案也是一种优化。由于在持久化关系映射时会使用\
  \ ID 值，这节省了持久化管理器从数据库中再次查询该行以检索触发器填充值的麻烦。有关如何自定义基于序列或表的 ID 生成器的详细信息将在本章后面提供。\n\n\
  我们现在将探讨每种策略，讨论其优缺点，并通过示例说明其用法。\n\n![image](img/sq.jpg) **注意**   下面列表清单中显示的示例的 Java\
  \ 源文件都可以在本章的源代码区域中找到。\n\n单表每类继承层次结构 (InheritanceType.SINGLE_TABLE)\n\n默认的继承映射策略是\
  \ `SINGLE_TABLE`，其中类层次结构中的所有实体都映射到单个表。此表上的专用鉴别器列标识与每一行关联的特定实体类型，并且层次结构中的每个实体都被赋予一个唯一值存储在此列中。默认情况下，实体的鉴别器值是其实体名称，尽管实体可以使用\
  \ `@DiscriminatorValue` 注解覆盖此值。这种方法在查询时性能良好，因为只涉及一个表，并且如果你的层次结构类型能够遵守实际限制，这可能是最佳使用方法。\n\
  \n图 4-2 显示了一个模式图，该模式使用 `SINGLE_TABLE` 策略映射我们的示例实体。我们选择为这些表添加前缀 `CH04_ST_`，以避免与示例模式中由完整的企业在线葡萄酒应用程序使用的\
  \ `PERSON` 和 `ADDRESS` 表冲突。\n\n![9781430246923_Fig04-02.jpg](img/9781430246923_Fig04-02.jpg)\n\
  \n图 4-2.  CH04_ST_PERSON 表保存了以 Person 为根的实体层次结构中的所有实体实例。CH04_ST_ADDRESS 表保存了关联的\
  \ Address 实例。\n\n\n\n在以`Person`实体为根的实体层次结构中，所有属性都映射到单张表`CH04_ST_PERSON`的列上。该表包含一个外键引用，绑定到`HOME_ADDRESS`列，指向映射到`Address`实体的`CH04_ST_ADDRESS`表。它还包含一个外键引用，通过`MANAGER`列指向自身。该外键不强制唯一，这意味着多行数据在`MANAGER`列中可以持有相同的值。\n\
  \n示例实体类\n\n清单 4-1 至 4-4 展示了`Person`层次结构中的实体如何使用`SINGLE_TABLE`继承策略进行映射。继承策略在层次结构的根实体上声明，并适用于层次结构中的所有子实体。示例实体中引入但尚未涵盖的注解将在后续章节中解释。\n\
  \n***清单 4-1.***  Person.java，SINGLE_TABLE 继承层次结构中的抽象根实体\n\n```\n/*\n * Person: 一个抽象实体，也是继承层次结构的根\n\
   *\n * 创建 ID 生成器表 \"CH04_ST_PERSON_ID_GEN\":\n * CREATE TABLE \"CH04_ST_PERSON_ID_GEN\"\
  \ (\"PRIMARY_KEY_NAME\" VARCHAR2(4000) PRIMARY KEY,    \"NEXT_ID_VALUE\" NUMBER(38));\n\
   *\n * 为此实体的 ID 生成器 'Person.id' 初始化该表数据（起始值为 '0'）:\n * INSERT INTO \"CH04_ST_PERSON_ID_GEN\"\
  \ VALUES ('Person.id', 0);\n*/\n@Entity\n@NamedQueries({ @NamedQuery(name = \"Person.findAll\"\
  , query = \"select o from Person o\") })\n@Table(name = \"CH04_ST_PERSON\")\n@TableGenerator(name\
  \ = \"Person_ID_Generator\", table = \"CH04_ST_PERSON_ID_GEN\", pkColumnName = \"\
  PRIMARY_KEY_NAME\",\n                pkColumnValue = \"Person.id\", valueColumnName\
  \ = \"NEXT_ID_VALUE\")\n@Inheritance(strategy = InheritanceType.SINGLE_TABLE)\n\
  @DiscriminatorColumn(name=\"TYPE\")\npublic abstract class Person\n  implements\
  \ Serializable\n{\n  @SuppressWarnings(\"compatibility:-7074714881275658754\")\n\
    private static final long serialVersionUID = 5291172566067954515L;\n\n@Id\n  @Column(nullable\
  \ = false)\n  @GeneratedValue(strategy = GenerationType.TABLE, generator = \"Person_ID_Generator\"\
  )\n  private Integer id;\n  @Column(name = \"FIRST_NAME\", length = 400)\n  private\
  \ String firstName;\n  @Column(name = \"LAST_NAME\", length = 400)\n  private String\
  \ lastName;\n  @OneToOne(cascade=CascadeType.ALL)\n  @JoinColumn(name = \"HOME_ADDRESS\"\
  )\n  private Address homeAddress;\n  @Version\n  private Integer version;\n  public\
  \ Person() {\n  }\n\n/* get/set 方法... */\n}\n```\n\n***清单 4-2.***  Employee.java，SINGLE_TABLE\
  \ 继承层次结构中的抽象中间实体\n\n```\n/*\n * Employee: 一个扩展 Person 的抽象实体\n */\n@Entity\n@NamedQueries({\n\
    @NamedQuery(name = \"Employee.findAll\", query = \"select o from Employee o\"\
  )})\n@Table(name = \"CH04_ST_EMPLOYEE\")\npublic abstract class Employee extends\
  \ Person implements Serializable {\n  @SuppressWarnings(\"compatibility:276774077273820023\"\
  )\n  private static final long serialVersionUID = -8529011412038476148L;\n  @Column(length\
  \ = 400)\n  private String department;\n  @Column(length = 400)\n  private String\
  \ email;\n  @ManyToOne\n  @JoinColumn(name = \"MANAGER\")\n  private FullTimeEmployee\
  \ manager;\n\npublic Employee() {\n  }\n\n/* get/set 方法... */\n}\n```\n\n***清单 4-3.***  FullTimeEmployee.java，SINGLE_TABLE\
  \ 继承层次结构中的具体叶子实体\n\n```\n/*\n * FullTimeEmployee: 一个具体的叶子实体\n */\n@Entity\n@NamedQueries({\n\
    @NamedQuery(name = \"FullTimeEmployee.findAll\", query = \"select o from FullTimeEmployee\
  \ o\")})\n@Table(name = \"CH04_ST_FT_EMPLOYEE\")\npublic class FullTimeEmployee\n\
          extends Employee\n        implements Serializable {\n  @SuppressWarnings(\"\
  compatibility:9058152191575937294\")\n  private static final long serialVersionUID\
  \ = -7301681120809804802L;\n  @Column(name = \"ANNUAL_SALARY\")\n  private double\
  \ annualSalary;\n  @OneToMany(mappedBy = \"manager\", cascade = {CascadeType.PERSIST,\
  \ CascadeType.MERGE})\n  private List<Employee> managedEmployees;\n\npublic FullTimeEmployee()\
  \ {\n  }\n\n/* get/set 方法... */\n}\n```\n\n***清单 4-4.***  PartTimeEmployee.java，SINGLE_TABLE\
  \ 继承层次结构中的具体叶子实体\n\n```\n/*\n * PartTimeEmployee: 一个具体的叶子实体\n */\n@Entity\n@NamedQueries({\n\
    @NamedQuery(name = \"PartTimeEmployee.findAll\", query = \"select o from PartTimeEmployee\
  \ o\")})\n@Table(name = \"CH04_ST_PT_EMPLOYEE\")\npublic class PartTimeEmployee\
  \ extends Employee implements Serializable {\n  @SuppressWarnings(\"compatibility:-4882346458268010846\"\
  )\n  private static final long serialVersionUID = 4017999239159878209L;\n  @Column(name\
  \ = \"HOURLY_WAGE\")\n  private double hourlyWage;\n\npublic PartTimeEmployee()\
  \ {\n  }\n\n/* get/set 方法... */\n}\n```\n\n在此实体层次结构之外，存在`Address`实体，如清单 4-5 所示。该实体是之前展示的根（抽象）`Person`实体上单向`@OneToOne`关系的目标。\n\
  \n***清单 4-5.***  Address.java，一个具体的独立实体\n\n```\n/*\n * Address: 一个独立实体\n *\n * 创建\
  \ ID 生成器表 \"CH04_ST_ADDRESS_ID_GEN\": CREATE TABLE \"CH04_ST_ADDRESS_ID_GEN\"\n\
   * (\"PRIMARY_KEY_NAME\" VARCHAR2(4000) PRIMARY KEY, \"NEXT_ID_VALUE\" NUMBER(38));\n\
   *\n * 为此实体的 ID 生成器 'Address.id' 初始化该表数据（起始值为 '0'）:\n * INSERT INTO \"CH04_ST_ADDRESS_ID_GEN\"\
  \ VALUES ('Address.id', 0);\n */\n@Entity\n@NamedQueries({\n  @NamedQuery(name =\
  \ \"Address.findAll\", query = \"select o from Address o\")})\n@Table(name = \"\
  CH04_ST_ADDRESS\")\n@TableGenerator(name = \"Address_ID_Generator\", table = \"\
  CH04_ST_ADDRESS_ID_GEN\", pkColumnName = \"PRIMARY_KEY_NAME\",\n                pkColumnValue\
  \ = \"Address.id\", valueColumnName = \"NEXT_ID_VALUE\")\npublic class Address\n\
          implements Serializable {\n  @SuppressWarnings(\"compatibility:-5340972441524875330\"\
  )\n  private static final long serialVersionUID = -5279408726470732092L;\n  @Id\n\
    @Column(nullable = false)\n  @GeneratedValue(strategy = GenerationType.TABLE,\
  \ generator = \"Address_ID_Generator\")\n  private Integer id;\n  @Column(length\
  \ = 400)\n  private String city;\n  @Column(length = 2)\n  private String state;\n\
    @Column(length = 400)\n  private String street1;\n  @Column(length = 400)\n  private\
  \ String street2;\n  @Version\n  private Integer version;\n  @Column(name = \"ZIP_CODE\"\
  )\n  private String zipCode;\n\npublic Address() {\n  }\n\n/* get/set 方法... */\n\
  }\n```\n\n让我们来看看此示例中引入的一些注解。\n\n@JoinColumn 注解\n\n`Employee`实体有一个类型为`FullTypeEmployee`的`manager`字段，其映射方式如下：\n\
  \n```\n@ManyToOne\n@JoinColumn(name = \"MANAGER\")\nprivate FullTimeEmployee manager;\n\
  ```\n\n`manager`字段的类型为`FullTimeEmployee`，并映射到`MANAGER`列，该列由`@JoinColumn`注解上的`name\
  \ = \"MANAGER\"`属性标识。`MANAGER`列恰好是`FullTypeEmployee`实体所映射表的外键引用，在本例中，该表就是`CH04_ST_PERSON`表。为这类列定义外键并非严格必要，但通常被认为是良好的数据库设计。由于`manager`字段映射到外键列，因此它被视为关系的*拥有*方。\n\
  \n\n\n此双向关系另一端的实体 `FullTimeEmployee` 持有 `managedEmployees` 字段。\n\n```\n@OneToMany(mappedBy\
  \ = \"manager\", cascade = {CascadeType.PERSIST, CascadeType.MERGE})\nprivate List<Employee>\
  \ managedEmployees;\n```\n\n由于我们已经在拥有方指定了映射关系，该字段只需使用 `mappedBy = \"manager\"` 属性来引用那个\
  \ `manager` 字段即可。这样一来，两个关系字段都映射到同一个外键上，因此无需使用连接表。\n\n![image](img/sq.jpg) **注意**  \
  \ 即使目标实体没有暴露对应的 `@ManyToOne` 关系字段，JPA 也允许你将 `@OneToMany` 字段映射到目标实体表的外键上。为此，你需要在\
  \ `@OneToMany` 字段上使用 `@JoinColumn` 来标识远程外键，而不是使用 `mappedBy` 属性。\n\n`managedEmployees`\
  \ 字段包含一个 `Employee` 实例列表，在实际应用中，这些实例将是具体的 `FullTimeEmployee` 和/或 `PartTimeEmployee`\
  \ 实例。\n\n`cascade = { CascadeType.PERSIST, CascadeType.MERGE }` 属性表示，对此实体 `Employee`\
  \ 执行的任何合并或持久化操作，也必须应用于此关系字段引用的所有 `FullTimeEmployee` 实例。例如，如果创建了一个新的 `Employee` 实例，并为其分配了一个\
  \ `FullTimeEmployee` 作为经理，那么通过 `EntityManager.persist()` 持久化该 `Employee` 实例时，也会同时持久化任何被引用的\
  \ `FullTimeEmployee` 实例（如果它们尚未被持久化的话）。\n\n`Person` 实体通过 `homeAddress` 字段与 `Address`\
  \ 建立关系。\n\n```\n@OneToOne(cascade=CascadeType.ALL)\n@JoinColumn(name = \"HOME_ADDRESS\"\
  )\nprivate Address homeAddress;\n```\n\n由于 `Address` 上没有对应的字段来引用 `Person`，因此这是一个单向关系。`@OneToOne`\
  \ 上的 `cascade` 属性指示哪些操作应传播到被引用的对象。因为我们指定了 `CascadeType.ALL` 的级联规则，所以应用于 `Person`\
  \ 的所有事件——`DETACH`、`MERGE`、`PERSIST`、`REFRESH` 和 `REMOVE`——都会自动应用于其 `homeAddress`\
  \ 对象。\n\n@DiscriminatorColumn 注解\n\n每当我们像使用 `InheritanceType.SINGLE_TABLE` 策略那样，将多个实体类映射到单个表时，必须有一种方法能够识别表中任何给定行的具体实体类型。为了确定实体类型，持久化管理器会在根实体的表中查找名为\
  \ `DTYPE` 的列来获取此信息。如果你的模式需要不同的列名来捕获此信息，你可以使用 `@DiscriminatorColumn` 注解来标识 JPA 应使用哪一列；在清单\
  \ 4-1 中，Person.java 实体通过 `@DiscriminatorColumn(name = \"TYPE\")` 注解指定了一个名为 `TYPE`\
  \ 的鉴别器列。如果我们像其余示例那样使用名为 `DTYPE` 的列，则可以完全省略此注解并接受默认值。\n\n@DiscriminatorValue 注解\n\
  \n存储在鉴别器列中的值称为鉴别器值。每个具体实体都显式声明或默认接受一个唯一的鉴别器值，该值用于标识与表中每一行关联的具体实体类型。鉴别器值默认为实体名称，在此示例中，我们为层次结构中的每个实体都接受了此默认值。当将遗留表和数据库适配到\
  \ JPA，并且希望将预先存在的鉴别器值映射到名称不同的实体时，可以使用 `@DiscriminatorValue` 注解为层次结构中需要覆盖的每个实体指定要使用的鉴别器值。\n\
  \nSINGLE_TABLE 策略的优缺点\n\n我们从设计时和性能的角度来考量每个继承层次结构，权衡其优缺点。我们从 SINGLE_TABLE 策略开始。\n\
  \n设计时考量\n\n当类型层次结构相当简单且稳定时，SINGLE_TABLE 映射方法效果很好。向层次结构添加新类型以及向现有超类型添加字段，只需向表中添加新列即可。然而，在特别大型的部署中，这可能会对数据库内部的索引和列布局产生不利影响。如果你的层次结构可能会超出单个表的列限制（通常为\
  \ 256 列），或者由于某种原因需要将多个非常大的字段映射到内联 LOB（大型对象）列，则可能需要引入 `@SecondaryTable` 映射。在这种情况下，采用后续方法之一可能更为明智。此外，对于层次结构中并非所有类型共享的列，不能使用\
  \ NOT NULL 约束。\n\n性能影响\n\nSINGLE_TABLE 策略对于跨层次结构中的所有类型或特定类型进行查询非常高效。内部持久化框架不需要表连接——只需要一个列出类型标识符的\
  \ `WHERE` 子句即可。特别是，涉及采用此映射策略的类型的关系，其性能表现良好。\n\n示例客户端代码\n\n正如我们在本章“入门”部分提到的，我们准备了示例客户端代码来测试继承示例，以及本章后面出现的其他示例。在本章提供的示例代码中，我们为每个继承示例都提供了一个\
  \ Java 客户端和一个 HTTP servlet。清单 4-6 展示了一个简单的 Java 类，它作为一个外观（类似于 EJB Session bean 外观），用于为\
  \ `Chapter04-PersistenceIISamples-SingleTable` 持久化单元实例化一个 `EntityManager`，并公开用于操作该单元中\
  \ JPA 实体的 CRUD 方法。清单 4-7 展示了一个用于此服务的 Java 客户端，它执行这些 CRUD 方法并打印结果。我们也可以为此目的使用实际的\
  \ EJB Session 外观，但我们想演示一个普通的 Java 类如何在非 JavaEE 环境中与 JPA 实体交互。\n\n在示例代码区域中，我们为其他继承策略提供了类似的\
  \ Java 服务外观和配套的 Java 客户端。除了每个策略使用的持久化单元以及使用特定继承策略细节进行注解的实体类不同之外，它们在各个继承策略之间是相同的。\n\
  \n类似地，我们为每个继承策略提供了一个简单的 HTTP servlet 客户端，演示了在 JavaEE Web 环境中使用 JPA 实体。这些 servlet\
  \ 替代了 Java 客户端，并直接与相同的 Java 服务外观进行交互。\n\n***清单 4-6.***  JavaServiceFacade.java，一个作为图\
  \ 4-1 中定义的实体的外观的 Java 类\n\n```\n/*\n * Java 服务外观，用于获取在 Java EE 容器外部运行的 EntityManager，\n\
   * 并演示对少量实体执行 CRUD 操作。\n * 采用自动提交行为，模拟无状态 Session Bean 的默认事务行为。\n */\npublic class\
  \ JavaServiceFacade {\n  private final EntityManager em;\n\npublic JavaServiceFacade()\
  \ {\n    // 为了支持非 JavaEE 环境，我们避免注入，并为所需的持久化单元创建 EntityManagerFactory。\n    // 然后从此工厂创建\
  \ EntityManager。\n    final EntityManagerFactory emf = Persistence.createEntityManagerFactory(\"\
  Chapter04-PersistenceIISamples-SingleTable\");\n    em = emf.createEntityManager();\n\
    }\n\n\n\n/**\n   * 对持久化上下文中所管理实体进行的所有更改，\n   * 都将被应用到数据库并提交。\n   */\n  private\
  \ void commitTransaction() {\n    final EntityTransaction entityTransaction = em.getTransaction();\n\
