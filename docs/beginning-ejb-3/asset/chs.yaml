  \ email = \"drwho@yahoo.com\";\n    Individual individual =\n        wineAppSvcFacade.createIndividual(\"\
  Adam\", \"Beyda\", email);\n    assertEquals(\"WineAppServiceFacade.createIndividual():\
  \ 检查 Individual.email 属性\",\n        email, individual.getEmail());\n\nCustomerFacade\
