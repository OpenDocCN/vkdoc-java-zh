  结论\n\n本章我们涵盖了相当多的内容，掌握了这些信息后，你应该能够构建一些强大的实体，这些实体经过配置，能够最佳地适应你的应用领域。以下是本章涵盖的关键概念总结。\n\
  \n映射实体继承层次结构\n\nJPA 为实体类继承层次结构提供了三种常见的 O/R 映射策略的内置支持：SINGLE_TABLE、JOINED 和 TABLE_PER_CLASS。我们研究了每种方法的优缺点，并提供了最适合每种策略的常见用例示例。\n\
  \n在继承层次结构中使用抽象实体、映射超类和非实体类\n\nJPA 在类型层次结构中混合实体与抽象类和非实体类时提供了灵活的解决方案。实体可以是具体的，也可以是抽象的。只有实体类可以被查询或作为映射实体关系的目标，但实体仍然可以使用非实体类，既可以通过使用\
  \ `@Embedded` 和 `@ElementCollection` 嵌入它们，也可以通过扩展它们或被它们扩展。我们展示了一些混合这些选项的示例来说明它们的用法。\n\
  \n多态关系\n\n可以在实体之间指定关系，包括层次结构中的抽象超类型实体。这允许你与继承层次结构中任何位置的实体定义关系，该关系将隐式地涉及该实体的子类型。\n\
  \n多态 JPQL 查询\n\n类似地，JPQL 查询可以选择或连接超类型类的实体，并且任何符合查询条件的子类型实例都将包含在查询结果中。我们研究了如何使用 JPQL\
  \ 构建可重用的 `@NamedQuery` 对象，以及 JPA 2.0 中引入的 QueryCriteria API。\n\n使用原生 SQL 查询\n\n\
  `EntityManager` 允许你发出原生 SQL 查询，这既是对经验丰富的 SQL 开发者的友好表示，也是一种优化手段，以避免在只需要实体的少数几个字段时查询所有字段的开销。我们提供了一个示例，说明如何定义一个返回实体实例的命名原生\
  \ SQL 查询，以便结果可以无缝集成到应用程序中。\n\n使用查询条件 API\n\n作为 JPQL 的类型安全替代方案，JPA 2.0 中引入的条件 API\
  \ 允许你通过动态组装子句和谓词来构建查询，形成一个 CriteriaQuery 对象，该对象可以被调用来检索实体或其他结果。\n\n复合主键和嵌套外键\n\n\
  我们探讨了不同类型的复合主键用法，展示了如何使用 `@EmbeddedId` 字段和多个 `@Id` 字段。当实体的主键映射到也涉及与其他实体关系的列时（例如，当主键包含一个或多个也是外键一部分的列时），情况可能会变得有点棘手。我们提供了一些如何处理这种情况的示例。\n\
  \n支持乐观锁定\n\n使用 `@Version` 注解，你可以指定一个字段（该字段在继承层次结构中的所有实体中通用），由 `EntityManager` 在管理并发时（例如在合并操作期间）用于执行乐观锁定。此字段将由持久化框架自动填充，不应由应用程序代码更新。\n\
  \n支持自动生成的主键值\n\nJPA 为使用唯一值填充 `@Id` 字段提供了声明式支持。我们提供了如何声明基于数据库序列和基于表的 ID 生成器的示例。\n\
  \n拦截器：实体回调方法\n\n你可以在实体类或你选择的辅助类上指定方法，以处理实体生命周期回调。我们列出了可用的回调方法，并解释了如何使用它们来注册你自己的自定义方法，这些方法将在生命周期事件期间被调用。\n\
  \n第 5 章\n\n![image](img/frontdot.jpg)\n\nEJB 消息驱动 Bean\n\n本章讨论了面向消息架构的必要性。它介绍了 Java\
  \ 消息服务（JMS），这是消息传递应用程序的典型架构，并详细阐述了 EJB 消息驱动 Bean（MDB）背后的概念。本章还涵盖了与 MDB 相关的注解、依赖注入和拦截器。\n\
  \n面向消息的架构\n\n当今的 IT 组织拥有数十个应用程序和服务，它们执行诸如库存、计费、费用报告和订单录入等定义明确的任务。随着互联网和电子商务的发展，企业开始思考不同的应用程序如何能够独立工作，但同时仍然是信息工作流的一部分。\n\
  \n这种新的需求带来了集成现有应用程序以及构建与现有应用程序协同工作的新应用程序的概念。将现有应用程序与新应用程序集成是一项非常复杂的任务：首先是因为大多数企业使用大量应用程序，其次是因为它们复杂的业务工作流。\n\
  \n\n消息传递是在异步通信和松耦合事务模型中集成现有应用和新应用最可行的解决方案之一。异步消息传递允许应用程序通过独立交换消息进行通信，而无需彼此硬编码连接。发送消息的应用程序或业务流程无需等待接收方，只要发送方和接收方都理解并商定消息格式和中间目标即可。\n\
  \n什么是 JMS？\n\nJMS 是一种 Java 消息中间件（MOM）API，允许应用程序异步发送和接收消息。JMS 是 JSR 914 定义的标准 Java\
  \ EE API 的一部分。JMS 类似于 JDBC（Java 数据库连接），后者提供了连接多种类型数据库（Oracle、DB2、MySQL）的标准 API。同样，JMS\
  \ 提供了连接多种类型消息系统（IBM MQ、SonicMQ）的标准 API。\n\nJMS 架构包含以下部分：\n\n*   **JMS 提供者：** 一个消息系统（如图\
  \ 5-1 所示），负责消息的路由和传递。JMS 提供者可以是应用服务器（如 Oracle WebLogic Server、IBM WebSphere、Oracle\
  \ GlassFish Server）的消息组件。JMS 提供者也称为 *JMS 服务器*。\n\n![9781430246923_Fig05-01.jpg](img/9781430246923_Fig05-01.jpg)\n\
  \n图 5-1.  JMS 消息系统\n\n*   **JMS 客户端：** 任何使用 JMS API 消费或生成 JMS 消息的 Java 应用程序或 Java\
  \ EE 组件。\n*   **JMS 消费者：** 消费 JMS 消息的 JMS 客户端应用程序。如图 5-1 所示的库存、计费和发货应用程序即为 JMS 消息消费者。\n\
  *   **JMS 生产者：** 生成消息的 JMS 客户端。如图 5-1 所示的订单录入应用程序即为 JMS 消息生产者。\n*   **JMS 消息：**\
  \ 由消息头、属性和消息体组成的消息。消息头标识消息，属性提供特定于应用程序和提供者的附加属性，消息体包含消息内容。JMS 规范支持发送和接收不同类型的消息。表\
  \ 5-1 显示了消息类型及其描述。\n\n表 5-1. JMS 消息类型\n\n| 消息类型 | 描述 |\n    | --- | --- |\n    |\
  \ `ByteMessage` | 由一系列字节组成 |\n    | `MapMessage` | 由一组名称/值对组成 |\n    | `ObjectMessage`\
  \ | 由一个序列化的 Java 对象组成 |\n    | `StreamMessage` | 由一系列原始数据类型组成 |\n    | `TextMessage`\
  \ | 由字符串组成 |\n\n消息应用架构\n\n通常，存在两类不同的消息应用：\n\n*   点对点（P2P）模型\n*   发布-订阅（pub-sub）模型\n\
  \nP2P 模型基于消息队列，队列中保存了 JMS 客户端应用程序发送的 JMS 消息。消息生产者和消费者商定一个公共队列来交换消息。\n\n当每条消息有且仅有一个消息消费者时，使用\
  \ P2P 模型。例如，图 5-2 所示的订单录入系统将新订单发送到消息队列中，由库存系统拾取。类似地，库存系统发送的消息由发货系统消费，发货系统发送的消息由计费系统消费。\n\
  \n![9781430246923_Fig05-02.jpg](img/9781430246923_Fig05-02.jpg)\n\n图 5-2.  使用队列的\
  \ JMS 消息系统\n\n发布-订阅模型基于主题，主题是消息的目标地址。多个接收者或 JMS 消费者可以检索每条消息。在此模型中，发布者并不总是知道可能的订阅者。发布-订阅模型用于广播型应用，如图\
  \ 5-3 所示，其中一条消息会传递给多个 JMS 客户端。每个具有唯一名称的主题都在消息服务器中定义。每条带有相关主题的消息都会被发布并传递给所有订阅者。\n\
  \n![9781430246923_Fig05-03.jpg](img/9781430246923_Fig05-03.jpg)\n\n图 5-3.  使用主题的\
  \ JMS 消息系统\n\n使用 MDB\n\n*MDB* 是一个异步消息消费者，用于处理通过 JMS 传递的消息。当 MDB 执行消息处理任务时，MDB 运行的\
  \ EJB 容器负责处理服务（事务、安全、资源、并发、消息确认），让 Bean 开发者专注于处理消息的业务逻辑。传统的 JMS 应用程序需要自行编写这些服务中的一部分。MDB\
  \ 本质上是无状态的，这意味着 EJB 容器可以拥有多个 MDB 实例并发执行，以处理来自各种应用程序或 JMS 生产者的数百条 JMS 消息，并为企业应用提供服务质量（QoS），例如高可用性和可靠性。\n\
  \nEJB 客户端应用程序不能像访问会话 Bean 和实体那样直接访问 MDB。与 MDB 通信的唯一方式是将 JMS 消息发送到 MDB 正在监听的目标。任何使用\
  \ JMS API 的 Java 应用程序或 Java EE 组件都可以通过向队列或主题发送消息来成为 MDB 的消息提供者。\n\n何时使用 MDB？\n\n\
  在本章前面，我们讨论了企业中异步性的需求。异步消息传递在应用程序、系统和服务之间提供了松耦合，从而为应用程序和系统提供了更大的灵活性和变更管理能力。MDB 提供了一种标准的消息组件模型，实现了企业中异步和面向消息架构的目标。\n\
  \n图 5-4 展示了一个面向消息的应用，它包含订单录入、库存、计费和发货系统，这些系统异步通信以处理一个工作流，该工作流从新的采购订单开始，到订单发货给客户结束。订单录入系统捕获客户的新订单，处理订单，并将其发送到指定的消息队列中（在图\
  \ 5-4 中，这是“新订单”队列）。库存系统从队列中拾取消息，并检查库存是否可用。如果不可用，则向“供应商”队列发送消息；如果可以发货，则将消息放入“订单就绪”队列。这条新消息由计费系统拾取，计费系统处理客户的计费，并将消息放回“发货”队列。最后，发货应用程序拾取消息，将订单发货给客户，并向客户发送包含跟踪信息的电子邮件。\n\
  \n![9781430246923_Fig05-04.jpg](img/9781430246923_Fig05-04.jpg)\n\n图 5-4.  从订单到发货的\
  \ JMS 消息系统\n\nMDB 类\n\n与会话 Bean 不同，MDB 没有任何业务接口。它仅包含以下内容：\n\n*   一个消息驱动类\n*   一个可选的回调监听器类\n\
  *   一个可选的拦截器类\n\n\n\n一个*MDB 类*是任何带有类级别注解`@MessageDriven`的标准 Java 类。如果使用部署描述符代替注解，则应将\
  \ Bean 类标记为 MDB 类。在混合模式下（即同时使用注解和部署描述符），如果在 Bean 类中指定了任何其他类级别或成员级别的注解，则必须指定`@MessageDriven`注解。`@MessageDriven`注解的参数可用于指定\
  \ Bean 正在监听的 JMS 队列或主题。表 5-2 详细说明了这些参数。\n\n表 5-2. @MessageDriven 注解的参数详情\n\n| 参数\
  \ | 描述 |\n| --- | --- |\n| `ActivationConfigProperty` | 用于指定目标名称和类型的一组属性 |\n| `description`\
  \ | Bean 类的描述 |\n| `mappedName` | MDB 正在监听的物理 Java 命名和目录接口（JNDI）主题或队列名称 |\n| `messageListener`\
  \ | MDB 所扩展的接口类的接口名称 |\n| `name` | MDB 的名称，如果它必须与 Bean 类的名称不同 |\n\n为了说明 MDB 的使用，我们将创建图\
  \ 5-5 中所示的用例。我们将有一个应用程序客户端，它是一个 Java 命令行程序，用于调用`OrderProcessing`会话 Bean 中的业务方法。`OrderProcessing`会话\
  \ Bean 将创建一条 JMS 消息并将其发送到在 GlassFish 应用服务器中注册/配置的主题。一个名为`StatusMailer`的 MDB 将监听该主题并处理传入的消息。接收到的消息将包含客户的详细信息，并将用于向客户发送关于其订单状态的电子邮件通知。这个简单的用例将使我们能够演示\
  \ MDB 如何工作，以及如何在会话 Bean 和 MDB 中注入不同类型的资源。\n\n![9781430246923_Fig05-05.jpg](img/9781430246923_Fig05-05.jpg)\n\
  \n图 5-5.  一个 MDB 示例用例\n\n清单 5-1 展示了`StatusMailer` MDB 的定义。我们使用`@MessageDriven`注解标记了`StatusMailerBean`类。\n\
  \n***清单 5-1.***  StatusMailerBean.java\n\n```\npackage com.apress.ejb.chapter05;\n\
  import javax.ejb.MessageDriven;\n@MessageDriven\npublic class StatusMailerBean {\n\
  }\n```\n\n一个 MDB 类有一个方法`onMessage()`，当 MDB 监听的队列/主题中有消息到达时，EJB 容器会调用该方法。`onMessage()`方法包含如何处理传入消息的业务逻辑。`onMessage()`方法包含一个参数，即\
  \ JMS 消息。对于`StatusMailer` Bean，`onMessage()`方法会检查消息是否为`MapMessage`类型，然后从消息中获取客户信息，创建关于订单状态的电子邮件，最后向客户发送电子邮件。清单\
  \ 5-2 展示了`onMessage()`方法的代码。在`try`块中，我们首先检查接收到的消息是否如我们所预期的那样是`MapMessage`类型。如果是，则使用`getStringProperty()`来检索消息中`from`、`to`、`subject`和`content`属性的值。\n\
  \n***清单 5-2.***  onMessage 方法代码\n\n```\npackage com.apress.ejb.chapter05;\nimport\
  \ javax.ejb.MessageDriven;\n@MessageDriven\npublic class StatusMailerBean {\n    public\
  \ void onMessage(Message message){\n        try  {\n            if (message instanceof\
  \ MapMessage) {\n                MapMessage orderMessage = (MapMessage)message;\n\
                  String from = orderMessage.getStringProperty(\"from\");\n                String\
  \ to = orderMessage.getStringProperty(\"to\");\n                String subject =\
  \ orderMessage.getStringProperty(\"subject\");\n                String content =\
  \ orderMessage.getStringProperty(\"content\");\n             }\n            else\
  \ {\n                System.out.println(\"Invalid message \");\n                }\n\
          } catch (Exception ex)  {\n            ex.printStackTrace();\n        }\n\
       }\n}\n```\n\n除了用`@MessageDriven`注解标记标准 Java 类之外，MDB 类还需满足以下要求：\n\n*   MDB 类必须实现消息监听器接口。对于\
  \ JMS，这将是`javax.jms.MessageListener`。\n*   该类不能是 final 或 abstract 的。\n*   该类应有一个无参的公共构造函数，供\
  \ EJB 容器用于创建 Bean 类的实例。\n\n如果同时使用注解和部署描述符，则在部署过程中，部署描述符中的设置或值将覆盖类中的注解。\n\n配置属性\n\
  \nBean 开发者可以随 MDB 类一起提供配置属性，这些属性在部署时使用。EJB 容器使用这些属性来配置 Bean 并将其链接到适当的 JMS 提供者。这些配置属性可以使用`@ActivationConfigProperty`注解进行设置。该注解可以作为`@MessageDriven`注解的参数之一提供。清单\
  \ 5-3 展示了带有`StatusMailer` MDB 属性的`@MessageDriven`注解。我们定义了两个`ActivationConfigProperty`注解，用于指定逻辑目标名称和目标类型。\n\
  \n***清单 5-3.***  带有 StatusMailer MDB 属性的 @MessageDriven 注解\n\n```\n@MessageDriven(activationConfig=\
  \ {\n@ActivationConfigProperty(propertyName=\"destinationName\",←\npropertyValue=\"\
  StatusMessageTopic\"),←\n@ActivationConfigProperty(propertyName=\"destinationType\"\
  ,←\npropertyValue=\"javax.jms.Topic\")\n}, mappedName=\"StatusMessageTopic\")\n\n\
  public class StatusMailerBean implements javax.jms.MessageListener {\n\n}\n```\n\
  \nEJB 3.0 和 3.1 版本中 MDB 可用的标准配置属性对应于 JMS 1.1 版本中的配置属性。EJB 3.2 版本中 MDB 的标准配置属性已扩展，以对应于\
  \ JMS 2.0 版本中的配置属性。表 5-3 展示了 EJB 版本与 JMS 版本之间的对应关系。\n\n表 5-3. EJB MDB 版本与 JMS 版本的映射\n\
  \n| EJB 版本 | JMS 版本 |\n| --- | --- |\n| EJB 3.0 | JMS 1.1 |\n| EJB 3.1 | JMS 1.1\
  \ |\n| EJB 3.2 | JMS 2.0 |\n\n在接下来的章节中，我们将展示可以为 MDB 设置哪些配置属性。\n\n消息确认\n\nEJB 容器提供消息确认服务。有两种消息确认模式：\n\
  \n*   `自动确认`\n*   `允许重复确认`\n\n\n\n在 `Auto-acknowledge` 模式下，消息传递确认发生在 `onMessage()`\
  \ 方法之后。此属性适用于需要**无重复消息**的应用程序。例如，库存系统应**仅接收一次**新订单。在 `Dups-ok-acknowledge` 模式下，确认是延迟执行的，这意味着可能会出现重复的消息传递，但这种方式减少了会话因即时确认而产生的开销。例如，订单处理过程中发送的电子邮件可以允许重复消息。我们可以使用\
  \ `@ActivationConfigProperty` 注解来指定消息确认属性。清单 5-4 展示了设置为允许重复的属性。\n\n***清单 5-4.***\
  \  @ActivationConfigProperty 注解\n\n```\n@MessageDriven(\nactivationConfig= {\n@ActivationConfigProperty(propertyName=\"\
  acknowledgeMode\",\npropertyValue=\"Dups-ok-acknowledge\")}\n)\n```\n\n**消息选择器**\n\
  \n消息选择器允许根据 Bean 开发者使用 `@ActivationConfigProperty` 注解提供的选择标准来过滤传入的消息。此属性对于限制 Bean\
  \ 接收的消息非常有用。例如，处理传入订单的 MDB 可能只处理与红葡萄酒和白葡萄酒相关的订单。用于指定此属性的属性名称为 `messageSelector`。\n\
  \n**消息目的地**\n\n消息目的地描述了 MDB 是监听队列还是主题。Bean 开发者可以在 Bean 中使用 `@ActivationConfigProperty`\
  \ 注解提供描述。该属性的值必须是 `javax.jms.Queue` 或 `javax.jms.Topic`。例如，新订单可能需要由库存系统作为工作流中的下一步进行处理；在这种情况下，订单录入系统不必广播新订单消息。订单录入系统和库存系统可以就某个特定目的地达成一致。清单\
  \ 5-3 展示了指定目的地名称和类型的代码。\n\n**订阅持久性**\n\n如果 Bean 被设计为监听主题，那么 Bean 开发者可以进一步指定消息的持久性。主题可以是\
  \ `Durable`（持久）或 `Non-Durable`（非持久）。使用 `Durable` 主题可以确保应用程序的可靠性。即使 EJB 容器暂时离线，也能确保消息不会丢失。例如，如果\
  \ EJB 容器宕机，我们需要确保从客户端应用程序接收的新采购订单不会丢失。所有采购订单都必须由 MDB 可靠地处理。我们可以使用 `@ActivationConfigProperty`\
  \ 注解，通过 `subscriptionDurability` 属性来指定持久性。清单 5-5 展示了将属性设置为 `Durable` 的代码。如果未设置此属性，容器将假定默认值为\
  \ `Non-Durable`。\n\n***清单 5-5.***  将属性设置为 Durable 的代码\n\n```\n@MessageDriven(\n\
  activationConfig= {\n@ActivationConfigProperty(propertyName=\"subscriptionDurability\"\
  , propertyValue=\"Durable\")}\n)\n```\n\n在 `StatusMailer` MDB 中，我们将使用 `@ActivationConfigProperty`\
  \ 注解创建属性。消息的 `destinationName` 设置为 `StatusMessageTopic`，`destinationType` 设置为 `javax.jms.Topic`。我们将使用\
  \ `mappedName` 参数来指定主题的物理目的地名称。在我们的例子中，它与 `destinationName` 相同。清单 5-6 展示了当前完成状态下的\
  \ `StatusMailer` MDB。\n\n***清单 5-6.***  StatusMailerBean.java\n\n```\npackage com.apress.ejb.chapter05;\n\
  import javax.ejb.ActivationConfigProperty;\nimport javax.jms.Message;\nimport javax.ejb.MessageDriven;\n\
  import javax.jms.MapMessage;\n\n@MessageDriven(activationConfig= {\n@ActivationConfigProperty(propertyName=\"\
  destinationName\", propertyValue=\"StatusMessageTopic\"),\n@ActivationConfigProperty(propertyName=\"\
  destinationType\", propertyValue=\"javax.jms.Topic\")\n}, mappedName=\"StatusMessageTopic\"\
  )\npublic class StatusMailerBean implements javax.jms.MessageListener{\n    public\
  \ void onMessage(Message message){\n        try  {\n            if (message instanceof\
  \ MapMessage) {\n                MapMessage orderMessage = (MapMessage)message;\n\
                  String from = orderMessage.getStringProperty(\"from\");\n                String\
  \ to = orderMessage.getStringProperty(\"to\");\n                String subject =\
  \ orderMessage.getStringProperty(\"subject\");\n                String content =\
  \ orderMessage.getStringProperty(\"content\");\n             }\n            else\
  \ {\n                System.out.println(\"Invalid message \");\n                }\n\
          } catch (Exception ex)  {\n            ex.printStackTrace();\n        }\n\
      }\n}\n```\n\n**MDB 中的依赖注入**\n\nMDB 可以使用依赖注入来获取对 JavaMail、EJB 或其他对象等资源的引用。MDB\
  \ 尝试获取和使用的资源必须在容器上下文或环境上下文中可用。\n\n在图 5-5 的示例用例中，我们讨论了在消息处理后创建电子邮件，并通过电子邮件将订单状态发送给客户。为了在\
  \ `StatusMailer` 消息 Bean 中实现这一点，我们需要获取一个 JavaMail 会话，以便创建并发送电子邮件。*JavaMail* 是一个\
  \ API，它提供了一个与平台无关的框架，用于构建邮件应用程序。JavaMail API 在 Java EE 平台中可用。\n\n我们可以使用依赖注入在 MDB\
  \ 中获取 JavaMail 会话。清单 5-7 展示了使用依赖注入和 JavaMail API 完成的 `StatusMailer` MDB。`@Resource`\
  \ 注解用于注入一个名为 `mail/wineappMail` 的 JavaMail 会话，该会话已在 GlassFish 应用服务器中注册为邮件资源。注入的邮件会话用于创建\
  \ `javax.mail.Message`，并使用 setter 方法创建邮件消息的标头和内容。最后，使用 `javax.mail.Transport` 类中的\
  \ `send()` 方法发送创建的消息。\n\n***清单 5-7.***  使用依赖注入和 JavaMail API 完成的 StatusMailer MDB\n\
  \n```\npackage com.apress.ejb.chapter05;\nimport javax.annotation.Resource;\nimport\
  \ javax.ejb.ActivationConfigProperty;\nimport javax.jms.Message;\nimport javax.ejb.MessageDriven;\n\
  import javax.jms.MapMessage;\nimport javax.mail.Transport;\nimport javax.mail.internet.InternetAddress;\n\
  import javax.mail.internet.MimeMessage;\n\n@MessageDriven(activationConfig= {\n\
  @ActivationConfigProperty(propertyName=\"destinationName\",\npropertyValue=\"StatusMessageTopic\"\
  ),\n@ActivationConfigProperty(propertyName=\"destinationType\",\npropertyValue=\"\
  javax.jms.Topic\")\n}, mappedName=\"StatusMessageTopic\")\n\npublic class StatusMailerBean\
  \ implements javax.jms.MessageListener{\n@Resource(name=\"mail/wineappMail\" )\n\
  private javax.mail.Session ms;\n\n\n\npublic void onMessage(Message message){\n\
  \        try  {\n            if (message instanceof MapMessage) {\n            \
  \    MapMessage orderMessage = (MapMessage)message;\n                String from\
  \ = orderMessage.getStringProperty(\"from\");\n                String to = orderMessage.getStringProperty(\"\
  to\");\n                String subject = orderMessage.getStringProperty(\"subject\"\
  );\n                String content = orderMessage.getStringProperty(\"content\"\
  );\n                javax.mail.Message msg = new MimeMessage(ms);\n            \
  \    msg.setFrom(new InternetAddress(from));\n                InternetAddress[]\
  \ address = {new InternetAddress(to)};\n                msg.setRecipients(javax.mail.Message.RecipientType.TO,\
  \ address);\n                msg.setSubject(subject);\n                msg.setSentDate(new\
  \ java.util.Date());\n                msg.setContent(content, \"text/html\");\n\
  \                System.out.println(\"MDB: Sending Message...\");\n            \
  \    Transport.send(msg);\n                System.out.println(\"MDB: Message Sent\"\
  );\n             }\n            else {\n                System.out.println(\"Invalid\
  \ message \");\n                }\n\n} catch (Exception ex)  {\n            ex.printStackTrace();\n\
  \        }\n\n}\n}\n```\n\n生命周期回调方法\n\n在某些情况下，使用 MDB 的应用程序需要细粒度的控制。MDB 支持两种生命周期事件回调：\n\
  \n*   `PostConstruct`\n*   `PreDestroy`\n\n`PostConstruct` 回调发生在容器执行依赖注入之后、Bean\
  \ 上第一个消息监听器方法调用之前。`PreDestroy` 回调发生在 MDB 从池中移除或销毁时。\n\n例如，`PostConstruct` 回调可用于初始化某些属性或资源，而\
  \ `PreDestroy` 回调可用于清理或释放已获取的资源。\n\n在 MDB 类上定义的回调方法应具有以下签名：\n\n```\npublic void\
  \ <METHOD> ()\n```\n\n回调方法也可以在 Bean 的监听器类上定义，在这种情况下，方法应具有以下签名：\n\n```\npublic void\
  \ <METHOD>(Object)\n```\n\n其中 `Object` 可以声明为实际的 Bean 类型，该类型是运行时传递给回调方法的参数。\n\n回调方法可以是\
  \ MDB 中带有回调注解的任何方法。以下规则适用于这些方法：\n\n*   方法应为 public。\n*   方法不能是 final 或 static。\n\
  *   返回类型应为 `void`。\n\n如前所示，方法可以接受零个或一个参数。回调监听器类通过与其关联的 MDB 类上的 `@CallbackListener`\
  \ 注解来标识。\n\n拦截器\n\nEJB 规范提供了一些称为*拦截器*的注解，允许您拦截业务方法调用。可以为 MDB 定义拦截器方法。\n\n您可以为特定方法添加\
  \ `@AroundInvoke` 注解或在部署描述符中添加 `<around-invoke-method>` 元素，也可以定义一个拦截器类，其方法在 MDB\
  \ 类中的 `onMessage()` 方法被调用之前被调用。拦截器类通过与其关联的 MDB 类上的 `@Interceptor` 注解来标识。在存在多个拦截器类的情况下，使用\
  \ `@Interceptors` 注解。Bean 类或任何给定的拦截器类上只能存在一个 `AroundInvoke` 方法。`AroundInvoke` 方法不能是\
  \ MDB 类的 `onMessage()` 方法。\n\n`AroundInvoke` 方法应具有以下签名：\n\n```\npublic Object <METHOD>(InvocationContext)\
  \ throws Exception\n```\n\n`InvocationContext` 的定义如下：\n\n```\n  package javax.ejb;\n\
  \   public interface InvocationContext {\n      public Object getBean();\n     \
  \ public java.lang.reflect.Method getMethod();\n      public Object[] getParameters();\n\
  \      public void setParameters(Object[] params);\n      public EJBContext getEJBContext();\n\
  \      public java.util.Map getContextData();\n      public Object proceed() throws\
  \ Exception;\n   }\n```\n\n以下列表描述了每个方法：\n\n*   `getBean()`：返回被调用方法所在的 Bean 实例\n\
  *   `getMethod()`：返回被调用的 Bean 实例上的方法\n*   `getParameters()`：返回方法调用的参数\n*   `setParameters()`：允许修改方法调用的参数\n\
  *   `getEJBContext()`：使拦截器方法能够访问 Bean 的 `EJBContext`\n*   `getContextData()`：允许使用返回的\
  \ `Map` 在同一个 `InvocationContext` 实例中的拦截器方法之间传递值\n*   `proceed()`：如果有下一个拦截器则调用它，否则调用目标\
  \ Bean 方法\n\n异常处理\n\nEJB 规范概述了两种类型的异常：应用程序异常和系统异常。有关这些异常的更多一般信息，请参阅第 2 章的“异常处理”部分。对于\
  \ MDB，监听器方法不得抛出 `java.rmi.RemoteException` 或一般的运行时异常。客户端假定消息消费者即使在发生运行时异常后仍然存在。如果在抛出运行时异常后客户端发送消息，则\
  \ EJB 容器会将消息委托给另一个 MDB 实例。此外，如果允许异常“逃逸”出 MDB，则该消息不被视为已被消费，并且会返回到队列/主题中。然后，有问题的消息会被重新投递。这被称为“毒消息”问题。\n\
  \n回调方法可以抛出运行时异常。在事务内执行的回调方法抛出的运行时异常会导致该事务回滚。回调方法不得抛出应用程序异常。\n\n客户端视图\n\n对于客户端应用程序而言，MDB\
  \ 只是一个消息消费者。客户端应用程序可以是任何使用 JMS API 发送消息的 Java EE 组件的 Java 客户端。从客户端应用程序的角度来看，MDB\
  \ 的存在完全隐藏在 MDB 作为消息监听器的目标或端点之后。\n\n客户端的 JNDI 命名空间可以配置为包含安装在网络上多台机器上的多个 EJB 容器中的\
  \ MDB 的目标或端点。企业 Bean 和 EJB 容器的实际位置通常对使用该企业 Bean 的客户端是透明的。\n\n对消息目标的引用可以通过 `@Resource`\
  \ 注解（位于 `javax.annotation` 包中）注入，或者在资源已在部署描述符中定义的情况下通过 JNDI 查找注入。\n\n![image](img/sq.jpg) **注意**  \
  \ 从 EJB 3.2 开始，JMS 资源适配器可以通过其标准名称查找 MDB 来构造订阅名称。\n\n\n\n在前文讨论并展示于图 5-5 的用例中，我们有一个会话\
  \ Bean 充当客户端应用程序与消息主题之间的中介。客户端应用程序调用会话 Bean 中的业务方法，该会话随后成为创建并发送消息的客户端或 JMS 消息生产者。为说明这一点，我们将创建一个无状态会话\
  \ Bean `OrderProcessing`，其中包含一个业务方法 `SendOrderStatus()`。代码清单 5-8 展示了 `OrderProcessing`\
  \ 会话 Bean 的代码。我们使用 `@Resource` 注解注入 `TopicConnectionFactory` 和 `StatusMailer` MDB\
  \ 正在监听的 `Topic`。我们将在会话 Bean 中使用一些硬编码值来模拟客户电子邮件地址和电子邮件内容。在 `try` 块中，我们创建到 `statusMessageTopicConnectionFactory`\
  \ 的连接并启动该连接。利用创建的会话，我们通过 `createSession()` 和 `createProducer()` 方法创建主题会话和主题生产者。最后，我们创建一个\
  \ `MapMessage` 对象，用电子邮件地址、主题和内容填充消息，并使用 `send()` 方法将消息发送到 `Topic`。\n\n***代码清单 5-8.***\
  \  OrderProcessingBean.java\n\n```\npackage com.apress.ejb.chapter05;\nimport javax.annotation.Resource;\n\
  import javax.ejb.Stateless;\nimport javax.jms.Connection;\nimport javax.jms.JMSException;\n\
  import javax.jms.MapMessage;\nimport javax.jms.MessageProducer;\nimport javax.jms.Session;\n\
  import javax.jms.Topic;\nimport javax.jms.TopicConnectionFactory;\n\n@Stateless(name\
  \ = \"OrderProcessing\")\npublic class OrderProcessingBean\n{\n    public OrderProcessingBean()\
  \ {\n    }\n\n@Resource(mappedName = \"StatusMessageTopicConnectionFactory\")\n\
      private TopicConnectionFactory statusMessageTopicCF;\n\n@Resource(mappedName\
  \ = \"StatusMessageTopic\")\n    private Topic statusTopic;\n\npublic String SendOrderStatus()\
  \ {\n        String from = \"chirag.rathod@oracle.com\";\n        String to = \"\
  chirag.rathod@oracle.com\";\n        String content =\n        \"Your order has\
  \ been processed \" + \"If you have questions\" +\n        \" call EJB Application\
  \ with order id # \" + \"1234567890\";\n\ntry {\n        System.out.println(\"Before\
  \ status TopicCF connection\");\n        Connection connection = statusMessageTopicCF.createConnection();\n\
          System.out.println(\"Created connection\");\n        connection.start();\n\
          System.out.println(\"statted connection\");\n        System.out.println(\"\
  Starting Topic Session\");\n        Session topicSession =\n            connection.createSession(false,\
  \ Session.AUTO_ACKNOWLEDGE);\n        MessageProducer publisher = topicSession.createProducer(statusTopic);\n\
          System.out.println(\"created producer\");\n        MapMessage message =\
  \ topicSession.createMapMessage();\n        message.setStringProperty(\"from\",\
  \ from);\n        message.setStringProperty(\"to\", to);\n        message.setStringProperty(\"\
  subject\", \"Status of your wine order\");\n        message.setStringProperty(\"\
  content\", content);\n        System.out.println(\"before send\");\n        publisher.send(message);\n\
          System.out.println(\"after send\");\n        }\n        catch (JMSException\
  \ e) {\n            e.printStackTrace();\n        }\n\nreturn \"Created a MapMessage\
  \ and sent it to StatusTopic\";\n    }\n}\n```\n\n![image](img/sq.jpg) **注意** 在代码清单\
  \ 5-8 中，请将“from”和“to”字段的值更新为您的电子邮件 ID。\n\n完成图 5-5 中讨论的用例，我们最后需要做的是创建一个客户端应用程序，该程序将查找\
  \ `OrderProcessing` 会话 Bean 并调用 `SendOrderStatus()` 消息。代码清单 5-9 展示了客户端应用程序的代码。在\
  \ `try` 块中，我们通过 JNDI 查找 `OrderProcessing` 会话 Bean，并调用 `SendOrderStatus()` 业务方法。\n\
  \n***代码清单 5-9.***  StatusMailerClient.java\n\n```\npackage com.apress.ejb.chapter05;\n\
  import java.io.IOException;\nimport java.io.PrintWriter;\nimport javax.ejb.EJB;\n\
