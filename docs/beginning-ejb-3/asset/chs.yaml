  \ 应用程序的结构\n\n创建数据库连接\n\n本章的示例需要数据库连接，为此我们将使用 NetBeans 和 Glassfish 捆绑提供的 Derby 数据库。如果你已经创建了`WineApp`数据库（该数据库也用于第\
