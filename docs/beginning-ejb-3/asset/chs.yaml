  </head>\");\n            out.println(\"<body>\");\n\nout.println(\"<h1>OrderProcessing\
  \ session bean lookup to be done</h1>\");\n            out.println(\"<h1>Invoking\
  \ SendOrderStatus() business method now</h1>\");\n            out.println(\"<h1>\"\
  \ + orderProcessing.SendOrderStatus() + \"</h1>\");\n            out.println(\"\
  <h1>Done !!!</h1>\");\n            out.println(\"</body>\");\n            out.println(\"\
  </html>\");\n        } finally {\n            out.close();\n        }\n    }\n\n\
  @Override\n    protected void doGet(HttpServletRequest request, HttpServletResponse\
  \ response)\n            throws ServletException, IOException {\n        processRequest(request,\
  \ response);\n    }\n\n@Override\n    protected void doPost(HttpServletRequest request,\
  \ HttpServletResponse response)\n            throws ServletException, IOException\
