  \ 8-6. 配置 Chapter09-TransactionSamples 项目的运行目标\n\n![image](img/sq.jpg) **注意** 首次运行每个示例\
  \ Servlet 时，持久化单元所需的表将自动在 WineApp 数据库中创建。在后续运行时，你会在日志窗口中看到一些 SQL 警告和错误，这些可以忽略。这些示例中的持久化单元配置为使用`create-tables`的表生成策略，这意味着\
  \ JPA 在客户端实例化持久化单元时总会尝试创建表。一旦为持久化单元创建了模式，你可能希望通过编辑器更新 persistence.xml 文件（Chapter07-ServiceIntegration-jpa\
  \ 和 Chapter09-TransactionSamples 中各有一个），将策略重置为`none`。\n\n结论\n\n本章定义了所有事务行为所必需的核心概念，并探讨了\
  \ EJB 服务器提供的事务特性以及企业 Bean 开发者可访问的接口。\n\n我们首先探讨了定义事务的核心 ACID 特性——原子性、一致性、隔离性和持久性。我们介绍了\
  \ JTA，并描述了其分布式事务模型的特性和优势，包括关键的两阶段提交协议的行为。\n\n我们研究了 EJB 服务器如何充当 JTA 事务管理器，使 EJB 能够无缝参与分布式事务，并减轻了\
  \ Bean 开发者显式将持久化或其他事务操作与事务资源绑定的需求。我们还详细介绍了 EJB 为企业 Bean 开发者提供的对这些事务服务的声明式支持，探讨了\
  \ CMT 和 BMT 两种划分方式所支持的企业 Bean，并使用了隐式和显式提交模型。对于 CMT Bean，我们描述了可用于定义 CMT Bean 方法事务行为的六种事务属性的行为及其含义。在\
  \ JPA 领域，我们探讨了事务与持久化上下文之间的关系，并解释了如何将有状态会话 Bean 与扩展持久化上下文结合使用，以支持实体在事务上下文之外解析与其他实体的关系。\n\
  \n随后，本章基于 Wines Online 应用程序的一个场景，研究了一些实际示例。这些示例展示了 CMT 和 BMT 划分的使用、有状态会话 Bean 上的扩展持久化上下文、回滚场景、客户端控制的事务、使用\
  \ BMT Bean 在事务上下文之外与实体交互，以及 CMT Bean 方法之间的事务上下文传播。\n\n最后，我们提供了运行所研究的 CMT 和 BMT 示例应用程序的步骤。\n\
  \n在下一章中，我们将探讨一些可用于分析应用程序 EJB 特定性能的技术。通过几个常见示例，我们将演示如何设置自己的测试来分析特定的应用程序组件。\n\n第 9\
  \ 章\n\n![image](img/frontdot.jpg)\n\nEJB 3 性能与测试\n\n作为开发者，我们总是在寻找编写最高性能代码的最有效方法。多年来，我们意识到我们做出的一些假设并不总是正确的，并且我们使用的某些编程模型和技术并未达到预期的性能水平。令人惊讶的是，大多数时候，我们的期望都被那些逻辑和直觉认为最佳的模型和技术所击败。\n\
  \n\n\n计算机系统的性能是一个非常复杂的问题。试想一下：我们正在编写一段 Java 代码，它利用了一个名为 Java 企业版（Java EE）的基础设施，而该基础设施恰好运行在\
  \ Java 虚拟机（JVM）之上。这个虚拟机又托管在一个操作系统上，该操作系统运行在一台计算机上，这台计算机通过由硬件和软件组件构成的网络与其他计算机交互。这些层级中的每一层——网络、计算机、操作系统、JVM\
  \ 以及 Java EE 服务器——都有许多可调参数，用于配置和优化其行为。在不同的使用条件下，每一层都会表现出不同的行为，这不可避免地会影响其他层级的行为。在这个相当复杂的背景下，我们就能更容易理解为什么我们的逻辑并不总是能奏效了。\n\
  \n归根结底，我们在进行性能陈述时不能一概而论。找出系统预期性能的唯一方法，就是在尽可能接近代码在生产环境中运行条件的场景下进行测试。\n\n每个软件应用程序都是独一无二的。为了理解你自己应用的性能，你必须根据自己对性能的定义亲自进行测试。在某些情况下，良好的性能意味着能够支持大量用户；而在其他情况下（例如，当用户负载较小时），则仅仅意味着能够尽可能快地运行。\n\
  \n在本章中，我们将介绍一种方法，你可以用它对系统进行一致的性能测试。我们还会介绍一些可用于执行这些测试的工具。最后，我们将进行一次性能测试，以演示该方法及工具的使用。这套方法和工具包在两种基本情况下非常有用：\n\
  \n*   对完整应用进行性能测试\n*   为性能而设计（考察 Java EE API 各个方面的性能成本，以及某些设计决策将如何影响整体性能）\n\n在第一种场景中，我们将应用视为一个黑盒。我们在不同的用户负载下测试应用，并调查用户发出的每个请求的性能。然后分析数据——我们寻找那些不符合要求标准的请求，并识别出改进性能的机会。\n\
  \n虽然上述方法很有用，但我们的建议是，在开发周期中尽早进行性能测试。这样，你就可以利用该方法以及从中获得的数据来帮助你为性能而设计，而不是事后才进行性能测试。\n\
  \n本章提供的示例侧重于为性能而设计，而不是测试一个完整的应用。如果你有兴趣了解更多关于测试应用的方法以及一般的性能测试，可以参考 Peter Zadrozny\
  \ 所著的 *J2EE Performance Testing with BEA WebLogic Server*（Apress, 2003）。在本章中，我们呈现了\
  \ Zadrozny 书中所述方法的一个改编版本，该版本紧密聚焦于手头的示例。\n\n测试方法\n\n测试方法的重点是数据测量的一致性。以下列表概述了该方法所涉及的步骤。我们将按照执行每次测试时的逻辑顺序来呈现和描述它们：\n\
  \n1.  *定义性能标准。*我们必须为所讨论的特定应用定义相关的性能指标，并为该指标设定一个现实的目标（例如，最大可接受的响应时间）。\n2.  *准确模拟应用使用情况。*其关键方面是测试脚本的定义。这些是包含一组请求的配置文件，这些请求代表了应用的典型使用模式。\n\
  3.  *定义测试指标。*这些包括测试的持续时间、样本大小、要排除的初始数据量等。\n4.  *执行测试。*\n\n性能标准\n\n根据应用的类型，你的关注点会在两个基本性能指标之间变化：响应时间和吞吐量。\n\
  \n在处理同步交互式应用时，我们定义一个最大可接受的响应时间。这是我们愿意等待从应用获得响应之前的最长时间。\n\n对于批处理或后端应用，我们定义最小可接受的吞吐量，通常以每秒事务数（TPS）表示，但这必须基于对系统中事务具体如何定义的扎实理解。\n\
  \n这些指标中的每一个都彼此密不可分；然而，我们尚未能发现它们之间存在任何数学或几何关系。\n\n我们的建议是，清晰且无歧义地定义你的性能指标，并根据明确定义的需求进行测试。不这样做无异于邀请你进行无休止的测试和调优。\n\
  \n由于我们将在性能测试运行期间收集数据，我们需要清楚地理解基本统计量，因此让我们更详细地审视它们。\n\n就本书而言，我们将*响应时间*定义为客户端从发送请求到收到来自应用的响应的最后一个字节所需等待的时间长度。\n\
  \n我们从一次性能测试运行中收集的数据集，由构成测试脚本的每个请求的个体响应时间组成。测试脚本中的每个请求由每个模拟用户在一段时间内依次执行。我们分析的基本度量是特定请求所有用户的响应时间的算术平均值：平均响应时间（ART）。\n\
  \n*聚合平均响应时间（AART）*是我们在分析性能数据时广泛使用的一个度量，我们将其定义为测试脚本中每个单独请求的 ART 之和，除以该测试脚本中的请求数量。\n\
  \n诚然，AART 在应用性能表现方面并没有实际意义，但它确实提供了一个极好的指标，表明整个系统的负载程度。因此，我们有时将这个度量称为*负载因子*。当绘制成与并发用户数的关系图时，典型的\
  \ AART 曲线看起来就像图 9-1 所示的那样。\n\n![9781430246923_Fig09-01.jpg](img/9781430246923_Fig09-01.jpg)\n\
  \n图 9-1.  典型的 AART 曲线\n\n吞吐量并不像响应时间那样是一个明确的指标。表达吞吐量的标准方式是 TPS，理解事务在被测试的应用中代表什么是至关重要的。它可能是一个单一的查询，也可能是一组特定的查询。在消息系统中，它可能是一条单一的消息；而在基于\
  \ Servlet 的应用中，它可能是一个请求。即使对于正在测量的具体内容达成共识，所获得的吞吐量值也常常会被误解。原因在于，许多人看待这个指标的方式，就像看待“英里每小时”一样：将其视为速度的度量。实际上，吞吐量是容量的度量。\n\
  \n\n\n我们可以尝试用超市的类比来解释吞吐量是如何工作的。想象一下，一家超市正在举办促销活动，10 名购物者可以在 15 分钟内免费拿走他们购物车里的所有东西。超市就是应用程序，购物者类似于请求（或消息），而负责补货的超市员工则类似于系统中努力应对需求的组件。\n\
  \n即使所有 10 名购物者都达到了容量上限（在 15 分钟内装满购物车），也未必意味着他们拿走了超市里所有的东西。然而，随着我们增加购物者的数量，我们最终会达到一个临界点，即足够多的购物者可以在那段时间内清空超市。我们称这个点为**饱和点**，因为此时已经没有更多可用资源了。当我们继续增加购物者数量超过这个点时，过道里的拥挤会导致购物者行动能力下降（响应时间变长），最终导致吞吐量实际下降。\n\
  \n与 ART 类似，我们分析的基础度量指标是特定请求的所有用户的每秒请求数的算术平均值。我们称之为**TPS**。\n\n为了分析性能数据，并且独立于特定性能测试所使用的吞吐量定义，我们使用**总事务速率（TTR）**\
  \ 的概念。TTR 是测试脚本中每个请求的 TPS 测量值的总和。TTR 为我们提供了一个极好的系统容量指标。图 9-2 展示了一条典型的 TTR 曲线，它在约\
  \ 100 个用户时达到饱和点。此时，曲线开始下降（例如，由于购物者过多）。\n\n![9781430246923_Fig09-02.jpg](img/9781430246923_Fig09-02.jpg)\n\
  \n图 9-2.  一条典型的 TTR 曲线\n\n图 9-1 中展示的 AART 曲线，是与图 9-2 中 TTR 曲线来自同一次测试运行的数据结果。如果你查看\
  \ AART 曲线，可以看到响应时间呈线性增长，直到达到 100 个用户。之后，增长变得更加剧烈。这与 TTR 曲线相吻合，后者在 100 个用户时达到饱和点。此后，应用程序的整体性能开始下降。分析这两条曲线，你可以得出结论：在该性能测试条件下，应用程序的用户上限为\
  \ 100 个。\n\n**模拟应用程序使用情况**\n\n本方法论这一节的目标是确保我们在尽可能模拟现实的测试条件下收集性能数据。这一点在测试整个应用程序的性能时更为适用，而在为性能进行设计时则不那么重要。\n\
  \n对于每个应用程序，都会有多个不同的使用场景同时运行。有时，我们可以用一个测试脚本和一个请求来模拟使用情况。在其他情况下，可能需要十几个场景，每个场景都有不同数量的请求。\n\
  \n需要特别说明的是关于**思考时间**（也称为**休眠时间**）。这是测试脚本中每个单独请求执行之间所经过的时间。在现实生活中，思考时间可能变化很大。它可能短至几秒钟（例如，点击一个按钮进入下一页），也可能长达\
  \ 5 到 10 分钟（例如，查看我们上个月在银行账户中进行的交易）。对于性能测试，我们采用了两种基本策略：\n\n*   **使用真实的思考时间**：这种情况用于对完整、可运行的应用程序进行性能测试时。\n\
  *   **使用零思考时间**：这种情况用于进行更通用的调查性测量时，例如比较编程技术。这样做的后果是我们不是在现实的条件下进行测试。然而，我们可以进行精确的比较测量，一旦我们从这些结果中选出了最佳方案，我们就可以使用真实的思考时间进行测试。\n\
  \n**定义测试指标**\n\n该方法论基于每次测试运行使用固定数量的用户。一个性能测试由多次测试运行组成，通常每次后续测试运行都会增加用户负载。有些人倾向于在单次测试运行期间逐步增加用户数量。我们认为这会引入一个新的变量，可能对结果产生负面影响，并且从寻找最大用户负载的角度来看，这在统计上是不正确的。\n\
  \n第一步是找到一个具有代表性的并发用户数（下限），可以以规律的方式增加，直到达到应用程序的饱和点（上限）。我们通常会在上限之上再进行几次额外的测试运行，只是为了更好地理解应用程序的行为（或异常行为）。\n\
  \n不幸的是，没有一门精确的科学可以预先确定上限。我们通常会选择一个随机的用户数，然后进行几次测试运行，其中用户数高于和低于这个初始随机选择，并分析结果以确定我们应该努力的方向——是增加还是减少用户数。\n\
  \n第二步是定义样本大小，即测试运行将持续的时间长度。为了选择实际的样本大小，我们必须在两个相互矛盾的需求之间达成妥协。第一个是我们希望有足够的数据，使得样本在统计上具有显著性。第二个是希望测试尽可能短，因为我们有很多测试运行要做，不想在上面花费太多时间。\n\
  \n为了确定样本大小，我们使用用户上限进行一次测试运行，持续时间比平时更长。然后我们绘制 AART 随时间变化的曲线并进行分析。我们寻找曲线上相当稳定的一段。\n\
  \n另一点需要说明的是数据排除。当你刚开始测试时，响应时间通常高于正常水平。这是因为构成应用程序的所有子系统都需要一点时间来加速。例如，JVM 中的优化器需要几分钟来优化运行中的代码。数据库的缓存也是如此，它需要一点时间才能变得有用（应用程序的其他组件也是如此）。\n\
  \n这些最初出现的异常高的响应时间只会影响生产应用程序中的最初几个用户，而生产应用程序通常会运行数周。然而，在我们的案例中，我们只测试几分钟，这些结果会对我们的样本结果产生负面的偏差。因此，我们排除收集到的前几组数据，并在曲线稳定后开始采样。\n\
  \n因此，样本大小将从实际测试运行开始后的某个时间点开始，并持续一段时间，这段时间为我们提供足够的数据，使其在统计上具有显著性。\n\n接下来是评估测试结果准确性的问题。根据所进行的性能测试类型，你可以使用两种不同的方法，以高置信度来衡量准确性。\n\
  \n对于涉及完整应用程序的性能测试，我们通常计算以下指标，我们称之为**样本质量**：\n\n![Eqa](img/Eqa09-01.jpg)\n\n我们通常将此公式应用于收集到的\
  \ AART 数据。\n\n\n\n![image](img/sq.jpg) **提示** 根据我们的经验，可接受的质量数值范围在 0.06 到 0.2 之间。当质量数值超过\
  \ 0.25 时，我们会仔细分析所有可用数据，以找出样本质量如此低下的原因。有时，这会导致我们丢弃该次测试运行所生成的数据。\n\n在进行以性能设计为目标的测试时，更具体地说，当思考时间为零时，我们会使用另一种称为*校准*的方法。在此过程中，我们使用用户上限执行三次测试运行。然后，我们比较每次测试运行的\
  \ AART 和 TTR 结果。比较以百分比形式进行，所有数值中的最大差值即被视为性能测试的误差范围。\n\n现在我们已经描述了所有的准备工作，接下来可以描述实际的测试运行了，这些运行将为我们提供执行分析和得出性能测试结论所需的数据。实际的测试运行是相当机械和枯燥的过程：你从使用用户下限进行一次测试运行开始，然后增加用户数量，再进行一次测试运行，依此类推，直到达到用户上限。如前所述，你可能还需要进行几次额外的测试运行，其中会超过用户上限。\n\
  \n由于该方法的基础是一致性，你必须重置或重启构成应用程序的每个组件或子系统。在我们的案例中，这包括数据库和 Java EE 服务器。\n\n我们将在本章后面部分介绍一个实施该方法的实际示例，以说明如何使用它。\n\
  \nThe Grinder\n\n*The Grinder* 是一个基于 Java 的负载测试框架，在 BSD 风格的开源许可下免费提供。*The Grinder*\
  \ 及其源代码、文档、辅助模块、测试脚本等更多内容，都可以在 `http://grinder.sourceforge.net` 找到。还有一些邮件列表，你可以加入以参与\
  \ Grinder 社区。\n\n*The Grinder* 功能极其强大，同时又易于使用，是一个轻量级的工具包。它允许你通过测试脚本在多台机器上模拟用户和行为。它由以下部分组成：\n\
  \n*   一个工作进程，用于解释用 Jython 编写的测试脚本，并使用多个工作线程执行测试，每个线程模拟一个用户。\n*   一个代理进程，用于管理工作进程。如果你在多台计算机上运行模拟用户，则每台计算机需要一个代理进程。\n\
  *   控制台，用于在协调其他进程的同时整理和显示统计数据。\n\n使用 *The Grinder* 进行的*性能测试*是测试运行的集合，可以包含一个或多个*测试脚本*。*测试运行*是测试脚本的连续顺序执行。测试运行可以持续特定的循环次数或特定的时间段。*循环*是测试脚本的单次执行。\n\
  \n![image](img/sq.jpg) **注意** 我们所说的*循环*在 *The Grinder* 的文档中被定义为 *run*，我们认为这容易造成混淆。\n\
  \n测试脚本用于模拟应用程序的使用情况。测试脚本代表你想要模拟的使用场景。一个测试脚本包含一个或多个*请求*，这些请求模拟了特定场景的用户与应用程序的典型交互。\n\
  \n![image](img/sq.jpg) **注意** 同样，为避免混淆，我们使用*请求*一词代替 *The Grinder* 文档中定义的 *test*。\n\
  \nGrinder 测试脚本是一个 Jython 程序，可以包含某些逻辑来修改默认行为（即请求的顺序执行），例如，根据已执行请求的响应来执行某些请求。\n\n\
  测试脚本可以手动编写，或者，如果模拟用户通过 HTML 界面与应用程序交互，也可以录制。TCP 代理模块可用于实现此目的。该模块是 *The Grinder*\
  \ 发行版的一部分。代理的 HTML 插件过滤器允许你通过 Web 浏览器记录与应用程序的交互。有关如何使用此功能的详细信息，请参阅文档。\n\n除了执行 URL\
  \ 之外，*The Grinder* 还可以在测试脚本的请求中执行 Java 代码。这为你提供了模拟胖客户端（例如基于 Swing 的客户端）的灵活性。\n\n\
  每个代理进程都与控制台建立连接以接收命令（例如 start、stop 和 reset），并将这些命令传递给其工作进程。每个工作进程都与控制台建立连接以报告统计数据。\n\
  \n除了控制台上显示的统计数据外，对于每次测试运行，每个工作进程都会将日志信息和最终统计摘要写入一个文件名以 `out` 开头的文件中。错误信息会写入一个文件名以\
  \ `error` 开头的文件中。如果在测试运行期间没有发生错误，则不会创建错误文件。每个已执行请求的详细统计信息会写入一个文件名以 `data` 开头的文件中。这些文件遵循命名约定，除了我们描述的关键词外，文件名还包含托管工作进程的计算机名称和工作进程的编号（因为你可以有多个工作进程）。\n\
  \n修改 `grinder.properties` 配置文件中的值可以轻松改变 *The Grinder* 的行为。你最常修改的属性很可能如下：\n\n*  \
  \ `grinder.threads`：此属性指定将执行指定测试脚本的模拟用户数量。\n*   `grinder.runs`：此属性指定模拟用户顺序执行测试脚本的次数（循环次数）。如果值为零，则将无限执行。\n\
  *   `grinder.consoleHost`：运行 Grinder 控制台的计算机名称或 IP 地址。\n*   `grinder.logProcessStreams`：将此属性设置为\
  \ `true` 将提供关于每个模拟用户执行的极其详细的信息。这些信息会出现在 `out` 文件中。这在初步运行期间很有用，但我们强烈建议你在所有其他运行中将其设置为\
  \ `false`，因为它会降低测试运行的性能。\n*   `grinder.logDirectory`：此属性指定你希望放置前面描述的三个日志文件的目录。\n\
  *   `grinder.script`：这是要执行的测试脚本的文件名。\n\n还有更多可用的属性。请查阅 Grinder 文档以获取完整的属性列表。\n\n\
  测试应用程序\n\n我们用于性能测试的测试应用程序是 第 7 章 中开发的集成 Wines Online 后端应用程序的一个子集。用户界面使用 JavaServer\
  \ Faces (JSF) 开发。图 9-3 显示了 JSF 页面，该页面在列表框中展示了所有可用葡萄酒的目录。用户可以选择他们想要的葡萄酒商品，在输入文本框中输入数量，然后点击“添加到购物车”按钮。用户可以重复相同的过程来添加更多葡萄酒，最后他们可以点击“提交订单”按钮。\n\
  \n![9781430246923_Fig09-03.jpg](img/9781430246923_Fig09-03.jpg)\n\n图 9-3. 葡萄酒商店\
  \ JSF 应用程序\n\n\n\n图 9-4 展示了 JSF 应用与后端葡萄酒商店应用之间的交互。当从浏览器启动 JSF 应用时，会调用`getWineDisplayList()`方法（该方法在托管\
  \ Bean 中使用了注入的 EJB）。该方法通过注入的`WineFacade` EJB 上的`findAll()`方法检索所有可用的葡萄酒列表。初始 JSF\
  \ 页面会显示检索到的葡萄酒列表。当用户添加一个葡萄酒商品并点击“添加到购物车”按钮时，会调用`ShoppingCart`会话 Bean 中的`addWineToCart()`方法，创建一个新客户并将该葡萄酒添加到客户的购物车商品中。仅在首次调用`addWineToCart()`时才会创建客户。当用户最终从客户端应用提交订单时，会调用`ShoppingCart`会话\
  \ Bean 中的`processOrder()`方法，该方法会创建一个新的客户订单，将所有购物车商品作为订单商品添加到订单中，删除购物车中的商品，并最终扣减库存。\n\
  \n![9781430246923_Fig09-04.jpg](img/9781430246923_Fig09-04.jpg)\n\n图 9-4.  葡萄酒商店应用组件与服务交互\n\
  \n图 9-5 展示了 Java 持久化 API（JPA）实体、Java 类之间的继承模型以及它们之间的关系。`BusinessContact`实体被`Customer`和`Supplier`实体继承。`Customer`实体被`Individual`和`Distributor`实体继承。`InventoryItem`、`CartItem`和`OrderItem`实体继承自`WineItem`实体。葡萄酒商店持久化单元还包含这些实体之间不同类型的关系（包括一对一、一对多和多对多），这些关系在测试应用中得到了实践。名称以`List`结尾的关系字段是\
  \ 0..*属性；其他所有字段都是单值属性。这些实体中使用的关系映射已在第 3 章和第 4 章中介绍过。\n\n![9781430246923_Fig09-05.jpg](img/9781430246923_Fig09-05.jpg)\n\
  \n图 9-5.  葡萄酒商店领域模型\n\n对于我们将要运行的性能测试，之前讨论的所有组件（JSF 应用、`ShoppingCart`和`WineFacade`会话\
  \ Bean 以及持久化单元中的 Java 类）都保持不变。两次测试之间的唯一区别在于领域模型 JPA 实体中指定的对象/关系（O/R）映射注解，以及这些 Java\
  \ 类所映射到的数据库模式。第一次测试使用了`JOINED`实体继承策略，其中两个根实体（`BusinessContact`和`WineItem`）映射到层次结构中的根表，所有子实体的表都连接到该根表。图\
  \ 9-6 展示了使用`JOINED`继承策略映射持久化 Java 类所使用的数据库模式。\n\n![9781430246923_Fig09-06.jpg](img/9781430246923_Fig09-06.jpg)\n\
  \n图 9-6.  JOINED 实体继承策略的数据库模式\n\n在第二次测试中，我们使用了`SINGLE_TABLE`实体继承策略，其中每个类层次结构中的实体都映射到单个表。图\
  \ 9-7 展示了用于映射第二个测试用例的数据库模式。\n\n![9781430246923_Fig09-07.jpg](img/9781430246923_Fig09-07.jpg)\n\
  \n图 9-7.  SINGLE_TABLE 实体继承策略的数据库模式\n\n![image](img/sq.jpg) **注意**  继承策略在第 4 章中有详细说明。\n\
  \n性能测试\n\n按照前面描述的方法，并使用刚刚描述的测试程序，我们将着手比较继承模型的任务，以找出在以下条件下哪种模型最佳。\n\n测试环境\n\n我们在云端设置了一台测试机器，拥有八个核心和\
  \ 8GB 内存。它运行着一个 GlassFish 服务器实例（版本 3.1.2.2 – build 5）。测试应用使用了 Derby 数据库，该数据库也运行在这台服务器上。我们从笔记本电脑上运行*The\
  \ Grinder*，这台笔记本电脑并不在运行测试机器的数据中心内，因此所有流量都通过互联网传输。通常我们不会这样做，因为我们更倾向于在所谓的无菌条件下工作；也就是说，测试网络上唯一的流量就是测试本身产生的流量。然而，在进行了多次初步测试后，我们发现测试的误差幅度非常低（1%），因此我们决定继续以这种方式工作。\n\
  \n测试计算机除了运行操作系统默认进程外，只运行测试所需的相应软件。我们对所有涉及的软件都使用默认设置。我们意识到通过微调这些组件可以获得更好的性能，但这超出了本书的范围。\n\
  \n测试脚本\n\n正如本章前面所述，我们的想法是创建一个尽可能贴近真实应用使用情况的测试脚本。由于这是一个面向性能设计的测试，我们使用了一个大致类似于应用典型使用概况的测试脚本：\n\
  \n1.  用户访问葡萄酒应用网站（首页）。\n2.  用户选择一种葡萄酒的几瓶。\n3.  用户选择另一种葡萄酒的几瓶。\n4.  用户结账。\n\n由于在本例中，我们比较几种不同的继承模型以了解哪种最适合我们的情况（面向性能设计），因此我们使用了零思考时间。\n\
  \n诚然，使用 Derby 运行这组性能测试并不十分现实，但这里的目的是提供一个关于如何使用该方法的示例。我们的意图是让读者在自己的应用环境中，将此过程应用于测试自己的应用。\n\
  \nTCP 代理模块的输出可以重定向到一个文件。这个输出是一个 Jython 程序，其中包含了记录测试的高级流程，并且易于人类阅读。正是在这里，我们修改或删除`grinder.sleeptime`指令以消除思考时间，或者更改运行应用的目标机器的名称或\
  \ IP 地址。我们将在下一节详细审查实际的`wine.py`测试脚本。\n\n设置\n\nGlassFish 的安装已在第 1 章的“入门”部分中说明，因此我们在此不再赘述。您只需确保\
  \ GlassFish 服务器已启动并运行，并且应用已部署了必要的资源（JDBC 连接池和资源）。启动 GlassFish 服务器的一种方法是在命令 shell\
  \ 中切换到`%GLASSFISH_HOME%/bin`目录，并执行以下命令：\n\n```\nasadmin start-domain\n```\n\n要停止\
  \ GlassFish 服务器，请执行以下命令：\n\n```\nasadmin stop-domain\n```\n\n在整个性能测试过程中，我们使用以下命令重启\
  \ GlassFish 服务器：\n\n```\nasadmin restart-domain\n```\n\n数据库\n\n\n\n这两项测试各自需要独立的数据库连接，以确保数据库模式不会冲突。每种继承模式映射的表虽然名称相似，但结构不同。为尽量降低安装要求，我们在测试中使用了\
  \ GlassFish 自带的 Derby 数据库。项目已预先配置为使用 Derby，若要开箱即用，你需要创建 Derby 数据库。关于如何在 Derby 中创建新数据库（及关联连接）的步骤，请参考第\
  \ 3 章中的“创建数据库连接和示例模式”一节。对于这些测试，你需要创建一个用户为 `wineapp_join/wineapp_join` 的 `WineAppJoin`\
  \ 数据库，以及一个用户为 `wineapp_st/wineapp_st` 的 `WineAppST` 数据库。\n\n**配置连接到自有数据库**\n\n你可能希望在运行测试时使用\
  \ Oracle 或其他生产级数据库。为此，你需要更新每个测试的 JPA 项目（`Chapter09-PerformanceJoined-jpa` 和 `Chapter09-PerformanceSingleTable-jpa`）中的\
  \ `persistence.xml` 文件，修改连接信息以指向你的数据库。首先，按照上面 Derby 的方式，为每个测试创建一个独立的数据库连接。对于 Oracle，我们建议你先在数据库中创建新的数据库用户\
  \ `wineapp_join/wineapp_join` 和 `wineapp_st/wineapp_st`。然后，在 NetBeans 中转到“服务”选项卡，右键单击“数据库”，选择“新建连接…”为每个用户创建一个新的数据库连接。\n\
  \n创建好测试数据库连接后，你可以通过每个 JPA 项目的设计编辑器选项卡，在 `persistence.xml` 文件中通过“JDBC 连接”组合框选择相应的“Joined”或“SingleTable”连接来进行编辑。\n\
  \n类似地，你还需要更新每个测试的 EJB 项目（`Chapter09-PerformanceJoined-ejb` 和 `Chapter09-PerformanceSingleTable-ejb`）中\
  \ `glassfish-resources.xml` 文件里的 `<jdbc-connection-pool>` 条目的 `<property>` 元素，以更新连接信息。（NetBeans\
  \ 7.2.1 不提供通过下拉列表进行此操作的编辑器，但你可以轻松地剪切/粘贴指定连接详细信息的 `<property>` 元素。）请务必保留 `<jdbc-resource>\
  \ jndi-name` 属性为 `jdbc/wineAppJoin`，对于 `SINGLE_TABLE` 测试则为 `jdbc/wineAppST`，因为 EJB\
  \ 项目中的持久化单元会通过名称引用此资源。\n\n**The Grinder**\n\n下一步是在专门用于模拟用户负载的计算机上安装 *The Grinder*。从\
  \ `http://grinder.sourceforge.net` 下载 *The Grinder* 后，你只需将其解压到所需目录即可。我们将其安装在笔记本电脑的\
  \ `C:\\grinder` 目录中。完成后，你可以从下载包中提取与 Grinder 相关的文件。这些文件位于 `grinder` 目录中。我们将这些文件安装在\
  \ `C:\\SampleCode` 目录中。共有三个文件：`grinder.properties`、`joined.py` 和 `single.py`。后两个文件是实际的测试脚本。\n\
  \n我们先来查看第一个脚本 `grinder.properties`，如清单 9-1 所示。\n\n***清单 9-1.***  grinder.properties\n\
  \n```\n"
- '# Beginning EJB 3

