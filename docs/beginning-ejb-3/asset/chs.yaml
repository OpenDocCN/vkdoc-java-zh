  \n下一步是向 `WineList` 托管 Bean 添加新方法，并定义一个名为 `SearchWines` 的新托管 Bean。清单 12-11 展示了 `SearchWines`\
  \ 托管 Bean，它包含三个属性（`year`、`varietal` 和 `country`）及其访问器。用户在 `searchwines.jsp` 页面中选择的值存储在这些属性中，`WineList`\
  \ 托管 Bean 可以检索这些属性。\n\n***清单 12-11.***  SearchWines.java\n\n```\npackage com.apress.ejb.chapter12.view.managed;\n\
  \npublic class SearchWines\n{\n  public SearchWines() {\n  }\n\npublic String year;\n\
    public String varietal;\n  public String country;\n\npublic void setYear(String\
  \ year) {\n    this.year = year;\n  }\n\npublic String getYear() {\n    return year;\n\
    }\n\npublic void setVarietal(String varietal) {\n    this.varietal = varietal;\n\
    }\n\npublic String getVarietal() {\n    return varietal;\n  }\n\npublic void setCountry(String\
  \ country) {\n    this.country = country;\n  }\n\npublic String getCountry() {\n\
      return country;\n  }\n}\n```\n\n我们需要向之前创建的 `WineList` 托管 Bean（参见清单 12-8）添加新功能，即增加三个方法，这些方法绑定在\
  \ `searchwines.jsp` JSF 页面的方法绑定表达式中。清单 12-12 展示了这三个方法：`searchByYear()`、`searchByCountry()`\
  \ 和 `searchByVarietal()`。每个方法都需要从 `SearchWines` 托管 Bean 中获取属性的值。JSF 通过 `FacesContext`\
  \ 对象提供对请求数据和其他对象数据的访问。一旦我们获得了 `FacesContext` 的引用，就可以访问应用和托管 Bean。所有方法都使用相同的技术：从\
  \ `FacesContext` 获取 `Application`，然后调用带有值绑定表达式的 `createValueBinding()` 方法，从 `SearchWines`\
  \ 托管 Bean 中检索相关属性的值。从 `SearchWines` 检索到属性值后，该方法通过传入与搜索条件匹配的参数，调用 `SearchFacade`\
  \ EJB 中的业务方法，以检索葡萄酒列表。检索到的葡萄酒列表存储在 `winesList` 属性中，该属性的类型为 `java.util.List`。\n\n\
  ***清单 12-12.***  WineList.java，包含搜索方法\n\n```\npublic String searchByCountry() {\n\
    FacesContext ctx = FacesContext.getCurrentInstance();\n  Application app = ctx.getApplication();\n\
    ValueBinding wineyear = app.createValueBinding(\"#{SearchWines.country}\");\n\
    String country = wineyear.getValue(ctx).toString();\n  if (searchFacade == null)\
  \ {\n    return \"gohome\";\n  }\n  else {\n    winesList = searchFacade.getWineFindByCountry(country);\n\
      return \"success\";\n  }\n}\n\npublic String searchByVarietal() {\n  FacesContext\
  \ ctx = FacesContext.getCurrentInstance();\n  Application app = ctx.getApplication();\n\
    ValueBinding wineyear = app.createValueBinding(\"#{SearchWines.varietal}\");\n\
    String varietal = wineyear.getValue(ctx).toString();\n  if (searchFacade == null)\
  \ {\n    return \"gohome\";\n  }\n  else {\n    winesList = searchFacade.getWineFindByVarietal(varietal);\n\
      return \"success\";\n  }\n}\n\npublic String searchByYear() {\n  FacesContext\
  \ ctx = FacesContext.getCurrentInstance();\n  Application app = ctx.getApplication();\n\
    ValueBinding wineyear = app.createValueBinding(\"#{SearchWines.year}\");\n  String\
  \ year = wineyear.getValue(ctx).toString();\n  if (searchFacade == null) {\n    return\
  \ \"gohome\";\n  }\n  else {\n    winesList = searchFacade.getWineFindByYear(new\
  \ Integer(year));\n    return \"success\";\n  }\n}\n```\n\n所有方法都返回一个 `success` 值，该值将用作导航规则。我们需要将此导航规则添加到\
  \ `faces-config.xml` 中，并将 `SearchWines` 注册为托管 Bean。清单 12-13 展示了需要添加到 `faces-config.xml`\
  \ 中的 XML 片段。方法返回的 `success` 值会将用户导航到 `wineList.jsp` 页面，该页面将显示葡萄酒列表。请注意，我们将 `SearchWines`\
  \ 托管 Bean 的作用域设置为 `session`，因为我们也会从其他托管 Bean 中访问其属性。\n\n***清单 12-13.***  faces-config.xml，包含\
  \ SearchWines 托管 Bean\n\n```\n<navigation-rule>\n  <from-view-id>/searchwines.jsp</from-view-id>\n\
    <navigation-case>\n    <from-outcome>gohome</from-outcome>\n    <to-view-id>/winehome.jsp</to-view-id>\n\
    </navigation-case>\n  <navigation-case>\n    <from-outcome>success</from-outcome>\n\
      <to-view-id>/wineList.jsp</to-view-id>\n  </navigation-case>\n</navigation-rule>\n\
  \n<managed-bean>\n  <managed-bean-name>SearchWines</managed-bean-name>\n  <managed-bean-class>com.apress.ejb.chapter12.view.managed.SearchWines</managed-bean-class>\n\
    <managed-bean-scope>session</managed-bean-scope>\n</managed-bean>\n```\n\n到目前为止，我们已经完成了以下任务：\n\
  \n\n\n*   创建登录页面\n*   创建注册页面\n*   创建包含选项列表的主页\n*   创建搜索页面\n\n现在，我们将在 `wineList.jsp`\
  \ 页面中向用户展示葡萄酒列表。\n\n葡萄酒列表页面\n\n代码清单 12-14 展示了 `wineList.jsp` JSF 页面的代码。在这个页面中，我们使用了一个名为\
  \ `h:dataTable` 的新 UI 组件。该组件能够渲染来自类型为 `java.util.List` 的受管 Bean 属性的数据集合。在前面的章节中，我们一直将检索到的葡萄酒存储在\
  \ `winesList` 属性中。`#{WinesList.winesList}` 表达式被用于 `h:dataTable` 的 `value` 属性，以表格形式显示葡萄酒列表。当葡萄酒列表展示给用户后，用户可以选择数据表组件中显示的某一款葡萄酒，以便在另一个页面查看该葡萄酒的详细信息，并在想要购买时将其添加到购物车。为了追踪数据表组件中被选中的葡萄酒，我们为\
  \ `h:dataTable` 添加了 `binding` 属性。最后需要做的是，为数据表中的每一行提供一个用户可点击以选择葡萄酒的超链接。为此，我们将显示葡萄酒\
  \ ID 的列用 `h:commandLink` 组件包裹起来。`h:commandLink action` 属性的值被设置为 `#{WinesList.invokeAddToCart}`\
  \ 表达式，这意味着我们需要为 `WinesList` 受管 Bean 扩展一个名为 `invokeAddToCart()` 的新方法。\n\n***代码清单\
