  \n下一步是定义`WineList`受管 Bean，它将与后端 EJB 通信以获取所有葡萄酒的列表。清单 12-8 展示了`WineList` Bean 的代码。我们将首先使用`@EJB`注解注入`SearchFacade`\
  \ EJB。Bean 类中的`findAllWines()`方法利用注入的`SearchFacade`无状态会话 Bean，并调用返回可用葡萄酒列表的`getWineFindAll()`业务方法。返回的葡萄酒列表存储在受管\
  \ Bean 的`winesList`属性中，而字符串`allwines`则作为导航规则返回。\n\n***清单 12-8.***  WineList.java\n\
  \n```\npackage com.apress.ejb.chapter12.view.managed;\n\nimport com.apress.ejb.chapter07.ejb.SearchFacadeLocal;\n\
