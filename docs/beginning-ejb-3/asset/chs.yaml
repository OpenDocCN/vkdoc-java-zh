  \n当我们在 2006 年构思本书的第一版时，轻量级的 EJB 3 API 仍处于早期阶段，但我们清楚地看到，EJB 规范设计者最终实现了功能与易用性的完美结合。来自\
  \ EJB 2.x 的世界，这就像一股清新的空气，让我们想起了在多年编写 C 和 C++ 程序后，发现 Java 技术时的感受。EJB 组件被重新定义为一个普通的\
  \ Java 类，其元数据可以通过 Java 注解声明，并通过引入泛型、容器注入和拦截器得到增强，成为了一个更加灵活的开发模型的基础：一个通过简洁获得优雅的模型。随着新的\
  \ Java 持久化 API (JPA) 的出现，实体也被重塑为轻量级的 Java 类，并且 O/R 映射元数据可以通过规范定义的注解来指定，我们突然拥有了一个包含最新技术的全面企业组件模型，所有这些都整合到了一个全球标准中。所以，你可以理解是什么让我们如此兴奋。\n\
  \n快进到现在，EJB 3.2 和 JPA 2.1 规范已经发布。这些规范合计超过一千页，已经成熟，涵盖了多个新领域，并改进了其易用性。我们再次看到了一个机会，可以将这些最新材料转化为一种易于理解的格式，这种格式阅读流畅，并大量使用了你可以在自己的机器上构建、执行和进一步探索的示例。在这第二版中，伴随\
  \ Java EE 7 的发布，我们通过一系列易于消化的章节介绍了 EJB 3.2 和 JPA 2.1 API，以及 CDI 和 JAX-RS 规范中的关键特性，让你能够一次一个主题地熟悉这些技术。在每个章节中，我们提供了可执行的源代码示例，演示了每个特性如何工作，以及各个部分如何组合在一起。这样你就不必一口吞下整个“玉米卷饼”。本着我们在本书众多示例中使用的\
  \ Apress Wines Online 应用程序的精神，我们希望你能真正品味和欣赏 Java EE 7 组件生态系统的丰富性。\n\n对于每项技术，我们提供了直接的示例，但也努力解释何时何地使用其特性，它们的优缺点是什么，并提供最佳实践用法的见解。在完成这些主题探索之后，我们解释了如何将\
  \ EJB 和相关组件集成到一个全面的 Java EE 7 应用程序中，然后将焦点转向事务管理、性能分析、部署、在可嵌入 EJB 容器中进行测试，以及如何构建健壮的\
  \ EJB 客户端。\n\n我们的工作是将你从 EJB 新手转变为专家，我们希望你能享受这段旅程！\n\n乔纳森·韦瑟比，奇拉格·拉索德，拉古·科达利，以及彼得·扎德罗兹尼\n\
  \n谁应该阅读本书？\n\n本书的目标读者是企业软件开发人员，他们具有 Java 经验，使用过早期版本的 EJB 或相关技术构建过单层或多层应用程序，并且希望基于最新的跨平台行业标准构建企业软件。\n\
  \n作为一本入门级文本的作者，我们有两个主要目标：\n\n*   我们的首要目标是让你能够熟练使用 EJB 的许多基本元素以及几个密切相关的技术，以便你能够在\
  \ Java EE 环境中设计、构建、部署、执行和测试全面的企业应用程序。我们期望你能够轻松掌握构建和组装基于 EJB 组件的应用程序所需的基本要素。\n* \
  \  我们的第二个目标是为你提供一个关于 Java EE 整体服务和持久化层的广阔视角，特别是关于 EJB 提供的全部功能范围。我们希望你在读完本书后，能够拥有一个广度优先的基础，这将作为一个发射台，让你能够更深入地探索\
  \ EJB 及相关规范的特定领域。\n\n为此，本书力求提供一个易于上手的 EJB 入门途径，让你能够熟练地构建使用 EJB 全部功能的服务和应用程序。我们刻意避免深入探讨规范的许多领域，以便你能够熟悉整体环境，而不会被细粒度选项的细节所干扰。我们相信，这种基于对\
  \ EJB 提供的广泛功能有扎实理解的广度优先基础，将使你处于最佳位置，然后能够以规范和其它高级文本作为参考指南，更深入地探索你自己的软件开发项目所需的 EJB\
  \ API 的特定领域。\n\n致谢\n\n本书的诞生离不开那些在其整个生命周期中提供技术输入和纯粹灵感的人们的努力和见解。特别地，我要感谢我的同事兼本第二版的主要合著者奇拉格·拉索德，感谢他在这项工作的各个阶段所展现的洞察力、精神和奉献精神。当亲密的合作者同时也是如此好的朋友时，熬夜和早起都变得轻松了！拉古·斯里尼瓦桑和约翰·布拉肯在设计会议和关于\
