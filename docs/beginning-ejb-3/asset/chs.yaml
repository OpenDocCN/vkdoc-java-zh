  \ MDB 的目的是展示企业应用程序中的某些处理如何以异步方式完成，以及如何从 MDB 中使用 `EntityManager`、会话 Bean 和其他 MDB。\n\
  \n![image](img/sq.jpg) **注意**   第 5 章介绍了 MDB，详细描述了异步架构，并给出了一些可能实现的示例。\n\n`OrderProcessingMDBBean`\
  \ 是一个普通的旧式 Java 对象（POJO），它通过类级别的 `@MessageDriven` 注解来表明它是一个 MDB。该 POJO 实现了强制性的 `onMessage()`\
  \ 方法，借助一个实用方法 `processOrder()` 来处理传入的消息。我们将从这里开始逐步介绍 MDB 中的方法。\n\n清单 7-14 展示了 `onMessage()`\
  \ 方法的代码。该方法检查接收到的消息是否为 `ObjectMessage` 实例类型，然后将检索到的对象类型转换为 `PurchaseOrder` 实用类。之后，调用\
  \ `processOrder()` 实用方法来处理接收到的采购订单。\n\n***清单 7-14.***  OrderProcessingMDBBean 中的\
  \ onMessage 方法\n\n```\npublic void onMessage(Message message) {\n  try {\n    if\
  \ (message instanceof ObjectMessage) {\n      ObjectMessage objMessage = (ObjectMessage)\
  \ message;\n      Object obj = objMessage.getObject();\n      if (obj instanceof\
  \ PurchaseOrder) {\n        po = (PurchaseOrder) obj;\n        processOrder(po);\n\
        }\n    }\n  } catch (JMSException e) {\n    e.printStackTrace();\n  }\n}\n\
  ```\n\n清单 7-15 展示了 `processOrder()` 方法的代码，该方法首先打开 `PurchaseOrder` 以获取 `Customer`\
  \ 和 `CustomerOrder` 对象。对于客户订单中的每个订单项，从库存表中扣除相应数量的葡萄酒。为了执行此操作，调用了 `deductInventory()`\
  \ 实用方法。\n\n扣除库存后，就该向客户发送状态更新了。这是通过电子邮件服务完成的。从 PO 对象中检索客户的电子邮件信息和订单 ID，构建电子邮件内容，然后调用\
  \ `sendStatus()` 实用方法。\n\n***清单 7-15.***  processOrder 业务方法\n\n```\nprivate void\
  \ processOrder(PurchaseOrder po) {\n  Customer customer = po.getCustomer();\n  CustomerOrder\
  \ order = po.getCustomerOrder();\n\nfor (OrderItem oItem : order.getOrderItemList())\
  \ {\n    Wine wine = oItem.getWine();\n    int qty = oItem.getQuantity();\n    deductInventory(wine,\
  \ qty);\n  }\n\nString from = PopulateDemoData.FROM_EMAIL_ADDRESS;\n  String to\
  \ = customer.getEmail();\n  String content =\n      \"Your order has been processed.\
  \ \"\n      + \"If you have questions call Beginning EJB Wine Store \"\n      +\
  \ \"Application with order id # \"\n      + po.getCustomerOrder().getId().toString();    sendStatus(from,\
  \ to, content);\n}\n```\n\n清单 7-16 展示了 `deductInventory()` 方法的代码。该方法使用注入的 `EntityManager`\
  \ 来调用在 `InventoryItem` 实体中定义的名为 `Inventory.findItemByWine` 的查询。一旦检索到特定葡萄酒的库存，就使用\
  \ `setQuantity()` 设置器方法更新数量。库存项是受管理的，因此当此 CMT 方法结束或在其上下文事务提交时，其修改将与数据库同步。\n\n***清单\
  \ 7-16.***  deductInventory 业务方法\n\n```\nprivate void deductInventory(Wine tempWine,\
  \ int deductQty) {\n  InventoryItem iItem =\n          em.createNamedQuery(\"InventoryItem.findItemByWine\"\
  ,\n          InventoryItem.class).setParameter(\"wine\", tempWine).getSingleResult();\n\
    int newQty = iItem.getQuantity() - deductQty;\n  iItem.setQuantity(newQty);\n\
  }\n```\n\n清单 7-17 展示了 `sendStatus()` 方法的代码。该实用方法使用注入的 JMS 资源来获取主题连接工厂和主题。创建到主题连接工厂的连接并启动该连接。一旦连接可用，就创建一个会话，并创建一个包含该主题的\
  \ `MessageProducer`。创建一个 `Message` 对象，并将 `JMSType` 设置为 `MailMessage`。之后，对 `Message`\
  \ 对象进行一系列 `setStringProperty()` 方法的调用，以创建电子邮件的收件人、发件人、主题和内容部分。设置完所有属性后，将消息发送到消息主题，该主题将由电子邮件服务处理。\n\
  \n***清单 7-17.***  sendStatus() 业务方法\n\n```\nprivate void sendStatus(String from,\
  \ String to, String content) {\n  try {\n    System.out.println(\"Before status\
  \ TopicCF connection\");\n    Connection connection = statusMessageTopicCF.createConnection();\n\
      System.out.println(\"Created connection\");\n    connection.start();\n    System.out.println(\"\
  Started connection\");\n    System.out.println(\"Starting Topic Session\");\n    Session\
  \ topicSession =\n            connection.createSession(false, Session.AUTO_ACKNOWLEDGE);\n\
  \nMessageProducer publisher = topicSession.createProducer(statusTopic);\n    System.out.println(\"\
  created producer\");\n    MapMessage message = topicSession.createMapMessage();\n\
      message.setStringProperty(\"from\", from);\n    message.setStringProperty(\"\
  to\", to);\n    message.setStringProperty(\"subject\", \"Status of your wine order\"\
  );\n    message.setStringProperty(\"content\", content);\n    System.out.println(\"\
  before send\");\n    publisher.send(message);\n    System.out.println(\"after send\"\
  );\n  } catch (JMSException e) {\n    e.printStackTrace();\n  }\n}\n```\n\n`OrderProcessingMDBBean`\
  \ 的完整代码如清单 7-18 所示。\n\n***清单 7-18.***  OrderProcessingMDBBean.java\n\n```\n@MessageDriven(activationConfig\
  \ = {\n  @ActivationConfigProperty(propertyName = \"destinationType\", propertyValue\
  \ = \"javax.jms.Topic\")},\n    mappedName = \"PurchaseOrderTopic\")\npublic class\
  \ OrderProcessingMDBBean implements MessageListener {\n  private PurchaseOrder po;\n\
    @PersistenceContext(unitName = \"Chapter07-WineAppUnit-JTA\")\n  private EntityManager\
  \ em;\n  @Resource(mappedName = \"StatusMessageTopicConnectionFactory\")\n  private\
  \ TopicConnectionFactory statusMessageTopicCF;\n  @Resource(mappedName = \"StatusMessageTopic\"\
  )\n  private Topic statusTopic;\n\n\n\npublic void onMessage(Message message) {\n\
      try {\n      if (message instanceof ObjectMessage) {\n        ObjectMessage\
  \ objMessage = (ObjectMessage) message;\n        Object obj = objMessage.getObject();\n\
          if (obj instanceof PurchaseOrder) {\n          po = (PurchaseOrder) obj;\n\
            processOrder(po);\n        }\n      }\n    } catch (JMSException e) {\n\
        e.printStackTrace();\n    }\n  }\n\nprivate void processOrder(PurchaseOrder\
  \ po) {\n    Customer customer = po.getCustomer();\n    CustomerOrder order = po.getCustomerOrder();\n\
  \nfor (OrderItem oItem : order.getOrderItemList()) {\n      Wine wine = oItem.getWine();\n\
        int qty = oItem.getQuantity();\n      deductInventory(wine, qty);\n    }\n\
  \nString from = PopulateDemoData.FROM_EMAIL_ADDRESS;\n    String to = customer.getEmail();\n\
      String content =\n        \"您的订单已处理。\"\n        + \"如有疑问，请致电 Beginning EJB Wine\
  \ Store \"\n        + \"应用程序，订单编号为 # \"\n        + po.getCustomerOrder().getId().toString();\n\
      sendStatus(from, to, content);\n  }\n\nprivate void deductInventory(Wine tempWine,\
  \ int deductQty) {\n    InventoryItem iItem =\n        em.createNamedQuery(\"InventoryItem.findItemByWine\"\
  ,\n        InventoryItem.class).setParameter(\"wine\", tempWine).getSingleResult();\n\
      int newQty = iItem.getQuantity() - deductQty;\n    iItem.setQuantity(newQty);\n\
