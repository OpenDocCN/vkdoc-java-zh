  \nServlet 输出\n\n`ShoppingCartClient` Servlet 的输出记录了客户端执行的高级操作，如图 7-10 所示：\n\n![9781430246923_Fig07-10.jpg](img/9781430246923_Fig07-10.jpg)\n\
  \n图 7-10.  ShoppingCartClient Servlet 的输出\n\n生成的电子邮件\n\n图 7-10 所示的 Servlet 输出只说明了部分情况。Servlet\
  \ 的工作在调用 `shoppingCart.sendOrderToOPC()` 将订单发送至订单处理中心后结束。在此示例中，成功处理订单的结果是，从 JavaMail\
  \ 会话（在第 5 章中创建）中配置的账户发送一封电子邮件至 `user.properties` 文件中 `to_email_account` 属性指定的账户。使用默认账户信息发送的电子邮件如图\
  \ 7-11 所示：\n\n![9781430246923_Fig07-11.jpg](img/9781430246923_Fig07-11.jpg)\n\n\
  图 7-11.  来自 `wineapp@yahoo.com` 的电子邮件出现在 wineapp 账户的收件箱中\n\n如果 `user.properties`\
  \ 文件的 `to_email_address` 属性所列账户的收件箱中没有出现电子邮件，请检查该账户的垃圾邮件文件夹，或查看 NetBeans 输出窗口中的“GlassFish\
  \ 服务器”选项卡以获取诊断信息。`Chapter07-ServiceIntegration` 项目中的 `Readme.txt` 文件包含其他故障排除信息（如有需要）。\n\
  \n结论\n\n在本章中，我们介绍了一些将不同类型的 EJB、JPA 实体和 Web 服务与数据源、JMS 主题和 JavaMail 等资源集成的方法。\n\n\
  我们研究了虚构葡萄酒商店应用的概念设计，并规划了需要构建的组件和服务的设计。我们审视了各个组件和服务，并演示了如何使用不同类型的 EJB 来解决特定的应用问题。\n\
  \n该葡萄酒商店应用展示了典型后端应用的各个部分，包括一个利用一系列 JPA 映射的综合持久化单元、与持久化单元中实体交互的会话 Bean、MDB 以及使用依赖注入的\
  \ Web 服务。\n\n我们还研究了如何在会话 Bean 和 MDB 中注入各种类型的资源，以及如何使用 MDB 在应用中构建异步性。\n\n此外，我们还探讨了如何处理持久化上下文中的托管实体和分离实体，以及如何将异步模型集成到典型的后端应用中。\n\
  \n最后，我们详细介绍了如何将各个组件和服务打包成模块，将它们组装成一个 Java EE 应用，并部署到 GlassFish 服务器上。\n\n在下一章中，我们将讨论\
  \ EJB 容器提供的事务服务，并探索可在各种应用架构中使用的不同类型的事务模型。\n\n第 8 章\n\n![image](img/frontdot.jpg)\n\
  \nEJB 中的事务支持\n\n围绕企业应用设计和开发的许多工作都涉及如何协调持久化数据流的决策。这包括何时何地缓存数据、何时将其应用到持久化存储（通常是数据库）、如何解决同时尝试访问同一数据的问题，以及如何解决因违反数据库约束的操作而可能发生的错误。可靠的数据库能够在较低层级（数据库层）处理这些问题，但同样的问题也可能存在于中间层（应用服务器）和客户端层，并且通常需要特殊的应用逻辑。例如，数据库通过悲观锁支持提供内置的并发控制，而应用可能选择使用乐观锁策略来获得更优化的性能结果。\n\
  \n使用 EJB 的主要好处之一是其对企业级服务（如事务管理和安全控制）的支持。在本章中，我们将探讨 EJB 如何提供事务服务，以及如何利用这些服务来满足您的特定需求。\n\
  \n为了说明 EJB 提供的功能及其使用方法，我们将从示例应用 Apress Wines Online 中选取一个场景进行审视，该场景体现了上述数据流问题。我们将通过展示执行任务的方法来说明\
  \ EJB 的事务支持，这些方法从简单简洁到略微复杂但更灵活。不过，在深入探讨示例之前，我们先概述 EJB 事务领域中的一些重要事务概念，包括 Java 事务\
  \ API (JTA)、EJB 容器通过声明式 EJB 元数据为您提供的多种灵活事务选项，以及持久化层中事务的处理方式。EJB 自诞生以来就提供了这些基本的事务服务，因此，如果您对这些概念已经熟悉，可以直接跳到示例部分，了解它们如何在涉及\
  \ Java 持久化 API (JPA) 的 EJB 世界中体现。\n\n什么是事务？\n\n在本节中，我们将探讨以下问题：\n\n*   什么是事务？为什么它对企业应用很重要？\n\
  *   定义健壮可靠事务的核心 ACID（原子性、一致性、隔离性、持久性）属性是什么？\n*   什么是 JTA？什么是分布式事务？什么是两阶段提交？\n\n\
  事务是一组必须作为一个单元执行的操作。这些操作可以是同步的或异步的，并且可能涉及持久化数据对象、发送邮件、验证信用卡以及许多其他事件。一个经典的例子是银行转账，其中一个操作从一个账户扣除资金（即更新数据库表中的一条记录），另一个操作将相同的资金存入另一个账户（更新同一或不同数据库表中的另一行）。从查询这两个账户的外部应用角度来看，绝不能出现这些资金同时在两个账户中可见的情况。也不能出现资金在两个账户中都不可见的时刻。只有当此事务中的两个操作都成功执行后，这些更改才能从另一个应用上下文中可见。以这种方式必须作为一个单元一起执行的一组操作称为事务。\n\
  \n事务中的操作是顺序或并行执行的，通常在一个（相对较短的）时间段内。在所有操作都执行完毕后，事务被应用或提交。如果在事务执行过程中出现错误或其他无效条件，事务可能会被取消或回滚，并且在该事务上下文中已执行的操作将被撤销。\n\
  \n分布式事务\n\n\n\n当事务中的操作跨数据库或位于不同计算机或进程上的其他资源执行时，这被称为**分布式事务**。此类企业级事务需要在所涉及的资源之间进行特殊协调，并且极难进行可靠的编程。这正是\
  \ JTA 发挥作用的地方，它提供了资源可以实现并绑定的接口，以便参与分布式事务。\n\nEJB 容器是一个支持 JTA 的事务管理器，因此可以参与涉及其他 EJB\
  \ 容器以及第三方 JTA 资源（例如许多数据库管理系统 (DBMS)）的分布式事务。这减轻了业务应用程序开发人员协调分布式事务的复杂性，使他们能够自由地集成松散耦合的服务，并根据自己的选择在企业内部分布数据。此外，正如您将在以下各节中看到的，EJB\
  \ 允许开发人员选择是显式地划分事务边界（通过调用 begin、commit 或 rollback (cancel) 来标记事务），还是允许 EJB 容器沿着\
  \ EJB 方法边界自动执行事务划分。\n\n事务的 ACID 属性\n\n不，不是指那种迷幻饮料。事务有各种形式和规模，可能涉及同步和异步操作，但它们都具有一些共同的核心特征，即\
  \ ACID 组件。ACID 指的是定义健壮且可靠的事务的四个特性：原子性、一致性、隔离性和持久性。表 8-1 描述了这四个组件。\n\n表 8-1.  事务的\
  \ ACID 属性\n\n| 特性 | 描述 |\n| --- | --- |\n| 原子性 | 一个事务由一个或多个作为一组执行的操作组成，这组操作被称为工作单元。原子性确保在事务结束时，这些操作要么全部成功执行（成功提交），要么全部不执行（成功回滚）。在事务结束时，如果只有部分操作完成，则违反了原子性。\
  \ |\n| 一致性 | 一致的事务具有数据完整性。一致性确保在事务结束时，数据处于一致状态，从而不会违反数据库约束或逻辑验证规则。 |\n| 隔离性 | 事务隔离性规定外部世界无法看到事务的中间状态。查看事务中涉及的数据对象的外部程序，必须等到事务提交后才能看到修改后的数据对象。事务隔离性本身是一门复杂的科学，在很大程度上超出了本讨论的范围，但可以说，EJB\
  \ 服务器提供商通常提供可配置的隔离设置，让您可以选择事务范围内的资源能够看到彼此待定更改的程度，以及外部提交但在上下文事务期间发生的更改（脏读）。没有标准的隔离设置，因此可移植的应用程序不应依赖其运行时环境中的特定配置。\
  \ |\n| 持久性 | 正确执行的事务是永久性的，不会受到任何系统故障的影响。将数据提交到关系数据库中（随后可以查询结果）通常可以实现此要求。 |\n\n自然，EJB\
  \ 满足了所有这些要求，我们将在后续示例中指出如何处理每一个要求。\n\nJava 事务 API (JTA)\n\nJTA 为客户端和感知事务的资源管理器定义了一个接口，用于参与容错的分布式事务。EJB\
  \ 自动绑定到这些服务，因此客户端和企业 Bean 都可以方便地参与分布式编程，而无需显式编码诸如两阶段提交协议之类的逻辑。EJB 进入其 JTA 事务的主要接口是通过\
  \ `javax.transaction.UserTransaction` 对象接口，该接口由 EJB 容器实例化，并可通过注入到企业 Bean 类或通过 Java\
  \ 命名和目录接口 (JNDI) 查找来获得。\n\n两阶段提交协议\n\n如果您使用关系数据库编写过逻辑程序，您可能熟悉两阶段提交协议。此策略赋予参与分布式事务的资源管理器否决权，通过“准备”命令通知它们即将发出提交，并允许它们声明是否可以应用其更改。只有当所有资源管理器一致同意它们已准备好应用其更改时，事务管理器才会下达最终指令来实际应用更改。通常，资源管理器在“准备”步骤期间执行大部分更改，因此最终的“提交”步骤执行起来很简单。这降低了在“提交”步骤期间发生错误的可能性。健壮的事务管理器和资源管理器甚至能够处理这种意外情况。\n\
  \nEJB 中的事务支持\n\n本节将探讨以下问题：\n\n*   企业 Bean 开发人员可以使用哪些事务服务？\n*   会话 Bean、消息驱动 Bean\
  \ (MDB) 和实体如何在事务上下文中交互？\n\nEJB 服务器中的大部分基础设施都专用于支持这些服务，这是有充分理由的。EJB 不仅提供了一个健壮的 JTA\
  \ 事务管理器，还通过可在可互操作、可移植的业务组件上指定的声明性元数据使其易于访问。几乎所有的 Java EE 应用程序都需要事务服务，而 EJB 以非常简洁的包将它们提供给应用程序开发人员。\n\
  \n从其诞生之初，EJB 框架就提供了一种便捷的方式来管理事务和访问控制，它允许您逐个方法地以声明方式定义行为。除了这些容器提供的服务之外，EJB 还允许您将控制权交给应用程序，以定义事务事件边界和其他自定义行为。\n\
  \n在本章中，我们将探讨事务在您的应用程序中完成一系列常见任务时所扮演的角色。在典型的 Java EE 应用程序中，会话 Bean 通常用于建立事务边界，并操作实体以在事务上下文中与数据库交互。我们的示例混合了会话\
  \ Bean 和实体操作，以说明 EJB 提供的内置（声明式）和手动行为。本着简化开发模型的精神，EJB 默认提供了许多最有用的功能，因此默认事务选项既实用又强大也就不足为奇了。\n\
  \nEJB 事务服务\n\nEJB 事务模型构建在此 JTA 模型之上，在该模型中，会话 Bean 或其他应用程序客户端提供事务上下文，企业服务作为逻辑工作单元在其中执行。在\
  \ Java EE 环境中，通常在事务上下文中运行的企业服务包括：创建、检索、更新和删除实体；向队列发送 JMS 消息；执行 MDB；触发邮件请求；调用 Web\
  \ 服务；执行 JDBC 操作等等。\n\n\n\nEJB 提供了内置的 JTA 事务管理器，但其真正的强大之处在于 EJB 为 Bean 提供者提供的声明式服务。通过使用元数据标签而非程序化逻辑，EJB\
  \ 开发者可以无缝地参与 JTA 事务，并以声明方式控制企业 Bean 上每个业务方法的事务行为。\n\nEJB 通过为 JTA 事务和非 JTA（资源本地）事务提供显式支持，扩展了这一编程模型。资源本地事务仅限于单个资源管理器（例如数据库连接），但可以通过避免分布式事务监视器的开销来实现性能优化。\n\
  \n此外，应用程序构建者可以利用容器提供的服务来自动管理事务，或者他们也可以选择控制事务边界，并显式处理事务的开始、提交和回滚事件。在单个应用程序中，这两种方法可以结合使用。虽然由容器还是应用程序自身来划分事务的选择是在企业\
  \ Bean 上定义的，但针对 JPA 实体使用哪种事务模型（JTA 或资源本地）的决定，则取决于 `persistence.xml` 文件中持久化单元的配置方式。\n\
  \n游戏中的持久化对象（即实体）完全且愉快地对其管理事务框架一无所知。实体运行的事务上下文并非其定义的一部分，因此，只要创建了适当的 `EntityManager`\
  \ 来服务实体的生命周期事件，同一个实体类就可以在应用程序选择的任何事务上下文中使用。\n\n如果这一切在此时看起来有些令人生畏，请不要担心。一旦我们通过一些代码示例来演示所有部分如何协同工作，一切都会变得清晰。同样值得注意的是，EJB\
  \ 内置的容器管理事务（CMT）支持对于在 EJB 容器内运行的大多数应用程序来说已经绰绰有余。本章将让您探索各种选项——但除非您编写的应用程序涉及完全存在于\
  \ EJB 容器之外的实体，否则默认支持很可能很好地满足您的需求。\n\n服务模型中的会话 Bean 事务行为\n\n下一节将探讨以下问题：\n\n*   EJB\
  \ 容器为会话 Bean 提供了哪些声明式事务支持？\n*   容器管理事务（CMT）划分与 Bean 管理事务（BMT）划分之间有什么区别？在什么情况下你会选择一种方法而不是另一种？\n\
  *   什么是 CMT 属性？\n*   EJB 如何支持使用 Bean 管理事务（BMT）Bean 显式划分事务边界？\n*   隐式提交行为与显式提交行为有何区别？\n\
  \n企业 Bean 是 EJB 服务层的核心。通过会话 Bean，EJB 容器提供了事务事件的声明式划分，以及选择在 Bean 或应用程序客户端代码中显式划分事务事件的选项。让我们分别考虑这两种方法，从默认选项开始：利用声明式标记进行容器管理事务划分。\n\
  \n容器管理事务（CMT）划分\n\nEJB 容器提供内置的事务管理服务，默认情况下会话 Bean 和 MDB 均可使用这些服务。Bean 通过元数据（使用注解或\
  \ XML）为其每个方法指定事务特性，EJB 容器遵循这些指令来确定要执行的事务操作（如果有的话）。使用这些指令，EJB 容器可以在方法被调用时自动开始一个新事务，或挂起或重用现有事务，并可能在方法返回给调用者之前提交事务。\n\
  \n![image](img/sq.jpg) **注意** 只有 Bean 开发者可以分配企业 Bean 的事务管理类型。允许应用程序组装者通过 `ejb-jar.xml`\
  \ 文件覆盖 Bean 的方法级容器管理事务属性，但他们必须谨慎行事，以避免死锁的可能性。通常不允许应用程序组装者和部署者覆盖 Bean 的事务管理类型。\n\n\
  当 EJB 在元数据中声明其事务行为时，容器会拦截对企业 Bean 方法的调用，并在会话 Bean 的方法边界应用事务行为，提供一组固定的选项供您为每个方法指定。容器提供的默认行为（即未指定其他指令时）是在调用方法之前立即检查当前线程是否关联了事务上下文。如果没有可用的事务上下文，容器会在执行方法之前开始一个新事务。如果存在可用的事务，容器会允许该事务传播到方法调用，并使方法代码可用。然后，在从方法调用返回时，容器会再次检查。如果容器负责创建了新的事务上下文，它会在方法退出后自动提交该事务。如果容器没有创建事务，则允许该事务不受影响地继续。通过拦截\
  \ Bean 的方法调用，EJB 容器能够在运行时应用在开发时以声明方式指定的事务行为。\n\n上一段描述的默认行为只是容器提供的六种 CMT 划分选项之一。您可以将这六种划分选项中的任何一种归因于会话\
  \ Bean 上的任何方法。某些属性值需要满足特定条件；当条件不满足时，会抛出异常。这六种属性列于表 8-2 中。\n\n表 8-2. 容器事务属性定义\n\n\
  \n\n| 事务属性 | 行为 |\n| --- | --- |\n| `MANDATORY` | 调用方法时，必须存在一个有效的事务。如果没有可用的事务，则会抛出\
  \ `javax.ejb.EJBTransactionRequired` 异常。该方法执行期间，此事务保持有效，并在将控制权返回给调用者后保持活动状态。 |\n\
  | `REQUIRED` | 这是默认的事务属性值。进入方法时，如果当前没有可用的事务上下文，容器会介入创建一个新的事务上下文。如果容器在进入方法时创建了事务，则会在方法调用完成时提交该事务。如果已存在一个有效的事务，容器在将控制权返回给客户端之前不会提交该事务。\
  \ |\n| `REQUIRES_NEW` | 容器在执行标记为此属性的方法之前，总是创建一个新的事务。如果在调用方法时已存在一个事务上下文，则容器会在创建新事务之前，通过将该事务与当前线程分离来挂起它。然后，在提交中间事务后，容器会将原始事务重新关联到当前线程。\
  \ |\n| `SUPPORTS` | 此选项基本上是一个空操作，不会导致容器执行额外工作。如果存在事务上下文，则该方法会使用它。如果没有可用的事务上下文，则容器会在没有事务上下文的情况下调用该方法。退出该方法时，任何预先存在的事务上下文仍保持有效。\
  \ |\n| `NOT_SUPPORTED` | 容器在未指定事务上下文的情况下调用该方法。如果在调用方法时存在事务上下文，则容器会在调用方法之前将该事务与当前线程分离，然后在从方法返回时将该事务重新关联到线程。\
  \ |\n| `NEVER` | 调用该方法时不得存在事务上下文。容器在调用方法之前不会创建事务上下文，如果已存在一个有效的事务，容器会抛出 `javax.ejb.EJBException`。\
  \ |\n\n![image](img/sq.jpg) **注意** 通常，事务属性可以在会话 bean 的业务接口方法或 Web 服务端点接口上指定，也可以在\
  \ MDB 的监听器方法上指定，但在特定情况下会有一些额外的限制。`此类`细节超出了本书的范围，但可以在 EJB *核心契约与需求* 规范中找到。\n\n所有六个属性通常都可用于会话\
  \ bean 方法，但某些属性在会话超时回调方法上不可用，或者当会话 bean 实现了 `javax.ejb.SessionSynchronization` 时也不可用。MDB\
  \ 仅支持 `REQUIRED` 和 `NOT_SUPPORTED` 属性。以下是一个示例，说明如何在会话 bean 方法上指定事务行为，以覆盖在 bean 级别指定（或默认）的事务行为：\n\
  \n```\n@TransactionAttribute(TransactionAttributeType.SUPPORTS)\npublic CustomerOrder\
  \ createCustomerOrderUsingSupports(Customer customer)\n throws Exception { ... }\n\
  ```\n\n表 8-3 说明了 EJB 的事务行为，该行为取决于其事务属性以及在调用会话方法时是否存在事务上下文。对于每个事务属性，我们在单独的行中列出了当客户端事务不存在（None）和当客户端事务存在（Tc）时的方法体和资源事务上下文。每当为方法的执行期间创建新事务（Tm）时，该事务总是在控制权返回给调用者之前由\
  \ EJB 容器提交。同时显示了与方法体代码关联的事务以及与该方法使用的资源关联的事务。\n\n表 8-3. 六种事务属性对应的客户端和 Bean 事务状态\n\
  \n![Table8-3.jpg](img/Table8-3.jpg)\n\n表 8-3 说明了容器如何介入 CMT 划分的方法，为每个事务属性以不同方式传播事务上下文。该表还说明了在\
  \ bean 方法中使用的事务上下文，总是会依次传播给该 CMT bean 方法所调用的其他方法。请注意，企业 bean 的客户端本身可能是另一个企业 bean。\n\
  \nEJBContext.setRollbackOnly 和 getRollbackOnly 方法\n\n如果在 CMT 划分的企业 bean 的方法中遇到异常或其他错误情况，该\
  \ bean 可能希望阻止上下文事务被提交。不允许 bean 显式回滚事务，但它可以获取 `javax.ejb.EJBContext` 资源（通过容器注入或 JNDI\
  \ 查找）并调用其 `setRollbackOnly()` 方法，以确保容器不会提交该事务。类似地，bean 方法可以随时调用 `EJBContext.getRollbackOnly()`\
  \ 方法，以确定当前事务是否已被标记为回滚，无论是由当前 bean、其他 bean 还是与当前事务关联的其他资源标记的。\n\nBean 管理的事务（BMT）划分\n\
  \n对于某些企业 bean，声明式 CMT 服务可能无法提供它们所需的划分粒度。例如，客户端可能希望调用会话 bean 上的多个方法，而不希望每个方法在完成后都提交其工作。在这种情况下，客户端有几种选择：它可以实例化自己的\
  \ JTA（或资源本地）事务，从而显式控制事务的开始/结束边界；它可以编写一个自定义的 CMT 会话 bean，将工作封装在事务性 bean 方法内部，并在容器管理的事务中执行这些步骤；或者，它可以通过使用\
  \ EJB 上下文中可用的事务资源来显式控制事务划分。\n\nEJB 为企业 bean 提供了后一种选项——称为 Bean 管理的事务（BMT）支持——作为处理其事务事件划分的便捷方式。要关闭自动的\
  \ CMT 划分服务，企业 bean 只需指定 `@TransactionManagement(TransactionManagementType.BEAN)`\
  \ 注解，或在 `ejb-jar.xml` 文件中将会话 bean 的等效元数据分配给它。使用 BMT 划分时，EJB 容器仍然通过 bean 的 `EJBContext`\
  \ 对象中可用的 `UserTransaction` 对象为 bean 提供事务支持。主要区别在于，bean 代码显式调用 begin、commit 和 rollback\
  \ 事务，而不是使用 CMT 属性以声明方式为其方法分配事务行为。容器不会介入 BMT 方法来开始和提交事务，也不会将客户端开始的事务传播给选择自行划分事务的\
  \ bean。虽然任何给定的企业 bean 必须为其方法选择一种方案（CMT 或 BMT 划分），但两种类型的 bean 可以在单个事务上下文中相互交互。\n\n\
  为了划分事务，企业 bean 通过注入获取一个 `EJBContext`（即，对于会话 bean 是 `SessionContext`，对于 MDB 是 `MessageDrivenContext`）资源：\n\
  \n```\n@Resource\nSessionContext sessionContext;\n```\n\n然后通过此资源获取一个 JTA `javax.transaction.UserTransaction`\
  \ 实例：\n\n```\nUserTransaction txn = sessionContext.getUserTransaction();\n```\n\n\
  \n\n此 EJB 容器提供的 `UserTransaction` 接口为 Bean 提供了 `begin()`、`commit()` 和 `rollback()`\
  \ 事务划分方法。类似地，非企业 Bean 客户端可以从 EJB 容器之外的 JTA 服务器获取 `UserTransaction` 资源，以便在应用客户端环境中划分事务，或者它们可以使用通过\
  \ `EntityManager` 获取的非 JTA 资源本地 `EntityTransaction`（见下文）。不过，无论它们如何开始一个事务，当它们调用会话\
  \ Bean 方法时，该事务都会成为上下文中的事务，并且适用表 8-3 中的规则。\n\n在我们即将分析的示例中，一个使用 `EXTENDED` 持久化上下文和\
  \ BMT 划分的有状态会话 Bean 在一个方法中启动一个事务，该事务随后会传播到后续的方法调用，直到该事务最终在另一个单独的方法中被提交。这种行为的实现无法通过在\
  \ CMT 会话 Bean 上分别调用这些方法并采用相同的方法结构来达成，尽管可以通过将这些单独的调用包装在 CMT 会话 Bean 上的单个 CMT 划分的自定义方法中来实现相同的结果。\n\
  \n![image](img/sq.jpg) **注意**  EJB 服务器是如何连接事务上下文的？您可能好奇 EJB 服务器如何能够自动将数据库连接以及在企业\
  \ Bean 内部通过编程方式获取的其他资源注册到事务上下文中。由于 EJB 服务器为执行 Bean 方法提供了上下文，它能够介入这些请求并执行这种副作用逻辑，而不会中断方法内的执行流程。也就是说，它在方法调用执行之前进行拦截；执行一些额外的工作（例如检查事务上下文的状态，可能创建一个新事务，并将企业\
  \ Bean 与该上下文关联）；然后调用 Bean 方法。从 Bean 方法调用返回后，它再次有机会执行额外的逻辑，例如提交在调用该方法时创建的事务，然后再将控制权返回给最初调用该\
  \ Bean 方法的客户端。\n\n隐式提交与显式提交\n\n使用 CMT 时，容器要求其在调用方法时开始的任何事务，都必须在方法返回给调用者时结束。这被称为隐式提交行为，有时也称为自动提交行为。容器必须强制执行此规则，否则当控制权在进程栈中向上传递时，可能会丢失对事务的跟踪。虽然您仍然可以使用\
  \ CMT 的容器管理事务来允许在单个事务中调用多个方法，但您必须通过将方法调用包装在外部的容器管理方法中来实现这一点。从客户端的角度来看，这仍然是对包装器方法的单个方法调用。\n\
  \n当对有状态会话 Bean 使用 BMT 时，您可以灵活地实现显式提交模型，其中 Bean 或客户端可以控制事务的开始和结束，并在结束之前显式调用提交或回滚操作期间，显式地调用多个方法。这给客户端或\
  \ Bean 开发者带来了负担，以确保事务不会悬而未决。然而，如果处理得当，当应用程序需要这种行为时，这将是一个强大的工具。如前所述，EJB 为会话 Bean\
  \ 和 MDB 提供了一个内置事务供其使用——`javax.transaction.UserTransaction`——Bean 可以通过其注入的 `javax.ejb.EJBContext`\
  \ 属性（作为 `SessionContext` 或 `MessageDrivenContext` 实例）访问该事务。\n\n我们将在本章末尾的示例应用中进一步探讨隐式和显式提交行为。\n\
  \n在 JPA 实体中使用事务\n\n本节将讨论以下问题：\n\n*   持久化层中的事务是如何管理的？\n*   持久化框架提供了哪些选项来控制涉及实体的事务？\n\
  *   持久化上下文在事务中的作用是什么？\n*   实体如何与事务上下文关联和解除关联？\n\n如果您还记得第 3 章，持久化单元定义了一组实体类，而持久化上下文是来自单个持久化单元的一组受管理的实体实例。在任何时间点，跨应用服务器中执行的多个应用程序，许多持久化上下文可能活跃地与任何给定的持久化单元相关联，但每个持久化上下文最多与一个事务上下文相关联。\n\
  \n实体与事务上下文之间的关系\n\n从前面关于 EJB 服务器如何作为事务协调器将资源与事务上下文关联的讨论中，您可能已经意识到持久化上下文就是与事务关联的资源。通过这种方式，持久化上下文通过方法调用进行传播，以便持久化单元中的实体，只要它们与同一个事务上下文关联，就可以通过它们共同的持久化上下文看到彼此的中间状态。此外，对于任何给定的持久化单元，必须只有一个持久化上下文与给定的事务上下文相关联，这一限制确保了对于任何标识为\
  \ `I` 的类型为 `T` 的实体，其状态在任何事务上下文中都只能由一个持久化上下文表示。\n\n在一个应用程序线程中，任何时刻只有一个事务上下文可用，但 EJB\
  \ 服务器可以自由地将一个持久化上下文与该线程解除关联，并为同一个持久化单元关联一个新的持久化上下文，以满足事务隔离边界。当 EJB 服务器这样做时，新实例化的持久化上下文无法看到对与挂起的持久化上下文关联的任何实体所做的中间更改。\n\
  \n容器管理持久化上下文与应用管理持久化上下文\n\nEJB 中的持久化服务允许您完全退出容器管理的持久化上下文，并在您的应用程序代码中显式管理持久化上下文的生命周期。当注入（或通过\
  \ JNDI 获取）一个 `EntityManager` 实例时，它作为容器管理的持久化上下文出现。容器会自动将容器管理的持久化上下文与使用 `EntityManager`\
  \ 时恰好处于上下文中的任何事务关联起来，并在事务结束时销毁该持久化上下文（有一个例外——请参见下面的扩展持久化上下文）。如果应用程序希望控制其持久化上下文如何或是否与事务关联，以及它是否能在事务边界之后继续存在，它可以获取一个\
  \ `EntityManagerFactory`（同样通过容器注入或 JNDI 查找）并显式创建管理其持久化上下文的 `EntityManager` 实例。当\
  \ `EntityManager` 通过 `EntityManagerFactory` 获取时，使用的是应用管理的持久化上下文——这是在 Java EE 容器外部运行时的要求。有关在\
  \ Java EE 容器外部（例如在纯 Java SE 环境中）使用应用管理的 `EntityManager` 的更多信息，请参见第 4 章。\n\n事务范围持久化上下文与扩展持久化上下文\n\
  \n在事务创建时创建、在事务结束时销毁的持久化上下文称为事务范围持久化上下文。这是与无状态会话 Bean 上使用的所有 `EntityManager` 关联的持久化上下文的行为。\n\
  \n\n\n对于有状态会话 Bean，存在一种特殊形式的容器管理实体管理器，它不与事务的生命周期绑定，而是与有状态会话 Bean 自身的生命周期绑定。这被称为扩展`EntityManager`，其行为类似于应用程序管理的持久化上下文，但\
  \ EJB 容器方便地管理其生命周期。由于扩展持久化上下文不会像事务范围的持久化上下文那样在每个事务结束时被销毁，因此实体即使在已与数据库同步后，仍可保持托管状态。在某些情况下，这避免了在提交后若想继续使用它们时重新查询或获取托管实例的需求。在会话式环境（如\
  \ Web 应用程序）中，这非常有用。扩展持久化上下文会保持打开状态，直到其上下文中的有状态会话 Bean 被销毁。只有有状态会话 Bean 才能使用扩展持久化上下文。在创建`EntityManager`实例时，其持久化上下文类型即被定义，并且在`EntityManager`的生命周期内不可更改。默认类型是事务范围的；要通过指定扩展持久化上下文来注入`EntityManager`，你可以使用以下注入指令：\n\
  \n```\n@PersistenceContext(unitName=\"WineAppUnit\", type = PersistenceContextType.EXTENDED)\n\
  private EntityManager em;\n```\n\n或者你可以在 XML 描述符中定义一个`persistence-context-ref`元素。\n\
  \n在本章末尾的事务示例中，我们将比较使用事务范围持久化上下文的无状态会话 Bean 与使用扩展持久化上下文的有状态会话 Bean 的行为。\n\nJTA 与资源本地\
  \ EntityManager\n\n`EntityManager`可以被定义为参与 JTA 事务或非 JTA（资源本地）事务。JTA 的特性——最显著的是对分布式事务的支持——以及\
  \ Bean 与 JTA 事务的接口`javax.transaction.UserTransaction`的使用，之前已经描述过。资源本地的`EntityManager`使用`javax.persistence.EntityTransaction`接口提供服务事务，客户端可通过`EntityManager.getEntityTransaction()`方法访问该接口。该接口暴露了预期的事务划分方法`begin()`、`commit()`和`rollback()`，以及`getRollbackOnly()`和`setRollbackOnly()`方法，这些方法等同于之前描述的企业\
  \ Bean 可用的`EJBContext`和`UserTransaction`方法，还有一个`isActive()`方法用于指示事务当前是否正在进行。\n\n\
  容器管理的`EntityManager`必须是 JTA `EntityManager`。应用程序管理的`EntityManager`可以是 JTA 或资源本地的，但只有当`EntityManager`位于\
  \ Java EE 环境中时，它们才能是 JTA `EntityManager`。\n\n你可能想使用资源本地`EntityManager`的一个原因是，虽然\
  \ JTA 提供了分布式事务的基础设施，但资源本地事务可以通过消除该基础设施的开销来提供性能优化。另一个原因是你可能希望在独立的 Java SE 环境中使用 JPA\
  \ 实体，而该环境不支持 JTA 和/或数据源资源。\n\n在本章后面剖析示例应用程序中的 Java 外观时，我们将研究`EntityTransaction`的使用。\n\
  \n两个示例场景\n\n以下两个示例场景使用了为 Wines Online 应用程序定义的持久化单元中的实体，我们在第 7 章中对此进行了研究。第一个场景使用无状态\
  \ CMT 会话 Bean，利用 EJB 容器提供的声明式事务服务。第二个场景展示了在使用有状态 BMT 会话 Bean 时，Bean 和客户端如何显式管理事务。在本章末尾，你将找到在\
  \ NetBeans 中使用 GlassFish 构建、部署和测试这些示例的分步说明。现在，我们将研究源文件，并讨论 EJB 和 JPA 在事务环境中可以交互的不同方式。\n\
  \n使用 CMT 划分的无状态会话 Bean\n\n我们从默认的、直接的无状态会话 Bean 实现`OrderProcessorCMTBean.java`开始（如清单\
  \ 8-1 所示）。该会话 Bean 使用 CMT 划分来利用 EJB 的声明式事务支持。随后是一个简单的 Servlet 客户端`OrderProcessorCMTClient.java`（如清单\
  \ 8-2 所示）。\n\n***清单 8-1.***  OrderProcessorCMTBean.java，一个使用 CMT 划分的无状态会话 Bean\n\
  \n```\n@Stateless(name = \"OrderProcessorCMT\", mappedName = \"Chapter08-TransactionSamples-\n\
  OrderProcessorCMT\")\npublic class OrderProcessorCMTBean {\n  @Resource\n  SessionContext\
  \ sessionContext;\n  @PersistenceContext(unitName = \"Chapter08-TransactionSamples-JTA\"\
  )\n  private EntityManager em;\n\n/**\n   * 移除任何电子邮件为'wineapp@yahoo.com'的现有客户以及任何国家为'United\
  \ States'的现有葡萄酒。\n   * EJB 容器将确保此工作在一个事务上下文中执行。\n   */\n  public String initialize()\
  \ {\n    StringBuffer strBuf = new StringBuffer();\n    strBuf.append(\"已移除 \");\n\
      int i = 0;\n\n//  通过移除任何电子邮件为'wineapp@yahoo.com'（或 user.properties 文件中定义的任何内容）的现有客户来过滤数据。\n\
      for (Customer customer :\n         getCustomerFindByEmail(PopulateDemoData.TO_EMAIL_ADDRESS))\
  \ {\n      em.remove(customer);\n      i++;\n    }\n    strBuf.append(i);\n    strBuf.append(\"\
  \ 个客户和 \");\n\n//  移除任何国家为'United States'的现有葡萄酒\n    i = 0;\n    for (Wine wine\
  \ : getWineFindByCountry(\"United States\")) {\n      em.remove(wine);\n      i++;\n\
      }\n    strBuf.append(i);\n    strBuf.append(\" 瓶葡萄酒\");\n    return strBuf.toString();\n\
    }\n\n/**\n   * 根据客户购物车中的商品创建一个新的 CustomerOrder。创建一个新的 CustomerOrder 实体，\n   *\
  \ 然后为客户购物车中找到的每个 CartItem 创建一个新的 OrderItem 实体。\n   *\n   * 使用 CMT 和默认的 REQUIRED\
  \ 事务属性，如果在没有事务上下文的情况下调用此方法，\n   * 则在调用该方法时，EJB 容器将创建一个新事务，并在成功完成该方法时提交该事务。\n   *\n\
     * @return 状态消息（纯文本）\n   */\n  public CustomerOrder createCustomerOrder(Customer\
  \ customer) {\n    return createCustomerOrderUsingSupports(customer);\n  }\n\n@TransactionAttribute(TransactionAttributeType.SUPPORTS)\n\
    public CustomerOrder createCustomerOrderUsingSupports(Customer customer) {\n    if\
  \ (customer == null) {\n      throw new IllegalArgumentException(\"OrderProcessingBean.createCustomerOrder():\
  \ 未指定客户\");\n    }\n\nif (!em.contains(customer)) {\n      customer = em.merge(customer);\n\
      }\n\nfinal CustomerOrder customerOrder = new CustomerOrder();\n    customer.addCustomerOrder(customerOrder);\n\
  \n\n\nfinal Timestamp orderDate = new Timestamp(System.currentTimeMillis());\n    final\
  \ List<CartItem> cartItemList =\n            new ArrayList(customer.getCartItemList());\n\
      for (CartItem cartItem : cartItemList) {\n      //  为此 CartItem 创建一个新的 OrderItem\n\
        final OrderItem orderItem = new OrderItem();\n      orderItem.setOrderDate(orderDate);\n\
        orderItem.setPrice(cartItem.getWine().getRetailPrice());\n      orderItem.setQuantity(cartItem.getQuantity());\n\
        orderItem.setStatus(\"Order Created\");\n      orderItem.setWine(cartItem.getWine());\n\
        customerOrder.addOrderItem(orderItem);\n\n//  移除 CartItem\n      customer.removeCartItem(cartItem);\n\
      }\n\nreturn persistEntity(customerOrder);\n  }\n\npublic <T> T persistEntity(T\
  \ entity) {\n    em.persist(entity);\n    return entity;\n  }\n\npublic <T> T mergeEntity(T\
  \ entity) {\n    return em.merge(entity);\n  }\n\npublic <T> void removeEntity(T\
  \ entity) {\n    em.remove(em.merge(entity));\n  }\n\npublic <T> List<T> findAll(Class<T>\
  \ entityClass) {\n    CriteriaQuery cq = em.getCriteriaBuilder().createQuery();\n\
      cq.select(cq.from(entityClass));\n    return em.createQuery(cq).getResultList();\n\
    }\n\npublic <T> List<T> findAllByRange(Class<T> entityClass, int[] range) {\n\
      CriteriaQuery cq = em.getCriteriaBuilder().createQuery();\n    cq.select(cq.from(entityClass));\n\
      Query q = em.createQuery(cq);\n    q.setMaxResults(range[1] - range[0]);\n    q.setFirstResult(range[0]);\n\
      return q.getResultList();\n  }\n\n/**\n   * <code>select o from Customer o where\
  \ o.email = :email</code>\n   */\n  @TransactionAttribute(TransactionAttributeType.NOT_SUPPORTED)\n\
    public List<Customer> getCustomerFindByEmail(String email) {\n    return em.createNamedQuery(\"\
  Customer.findByEmail\", Customer.class).setParameter(\"email\", email).getResultList();\n\
    }\n\n/**\n   * <code>select object(wine) from Wine wine where wine.country = :country</code>\n\
     */\n  @TransactionAttribute(TransactionAttributeType.NOT_SUPPORTED)\n  public\
  \ List<Wine> getWineFindByCountry(String country) {\n    return em.createNamedQuery(\"\
  Wine.findByCountry\", Wine.class).setParameter(\"country\", country).getResultList();\n\
    }\n}\n```\n\n***清单 8-2.***  OrderProcessorCMTClient.java，一个驱动 OrderProcessorCMT\
  \ 会话 Bean 的 Servlet\n\n```\n@WebServlet(name = \"OrderProcessorCMTClient\", urlPatterns\
  \ = {\"/OrderProcessorCMTClient\"})\npublic class OrderProcessorCMTClient extends\
  \ HttpServlet {\n  @EJB\n  OrderProcessorCMTBean orderProcessorCMT;\n\n/**\n   *\
