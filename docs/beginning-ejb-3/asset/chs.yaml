  \ 模块中的 ShoppingCartClient Servlet\n\n客户端应用程序及不同的应用程序架构将在第 12 章中详细讨论。为了测试已部署的葡萄酒商店应用程序，我们提供了一个简单的\
  \ Servlet 客户端。GlassFish 将`ShoppingCart`和`SearchFacade`会话 Bean 注入到 Servlet 中，用于搜索葡萄酒、将商品添加到购物车，并最终提交订单。\n\
  \n清单 7-22 展示了 Servlet 客户端的代码。首先，客户端查找`SearchFacadeBean`会话 Bean 并调用`findWineByYear()`方法，该方法返回一个葡萄酒列表。为了将葡萄酒添加到购物车，客户端程序查找`ShoppingCart`会话\
  \ Bean 并调用`findCustomer()`方法。找到客户后，客户端进入一个`while`循环，使用`ShoppingCart` Bean 中的`addWineItem()`方法将从`SearchFacadeBean`获取的葡萄酒列表添加进去。为保持客户端简单，每种葡萄酒的数量设置为\
  \ 20。当客户端将所有葡萄酒添加到购物车后，调用`ShoppingCart` Bean 中的`sendOrderToOPC()`方法提交订单。\n\n`ShoppingCartClient`\
  \ Servlet 使用 EJB 注入，通过其本地接口获取`SearchFacade`和`ShoppingCart`这两个 EJB。该 Servlet 执行以下步骤，并通过向浏览器窗口发送\
  \ HTML 来记录其进度：\n\n*   通过一个 Java 服务外观——`PopulateDemoData`——初始化示例数据，该外观使用 JPA 实体填充数据库\n\
  *   使用有状态的`ShoppingCart`在示例数据集中通过电子邮件查找现有客户，并将其缓存在会话 Bean 中\n*   使用`SearchFacade`通过`\"\
  Wine.findByYear\"` JPQL 命名查询查找 2004 年的葡萄酒，显示该年份葡萄酒的信息，并使用`ShoppingCart` Bean 中的`addWineItem()`方法将每种葡萄酒各\
  \ 20 瓶添加到客户的购物车中\n*   当客户端将所有葡萄酒添加到购物车后，调用`ShoppingCart` Bean 中的`sendOrderToOPC()`方法提交订单\n\
