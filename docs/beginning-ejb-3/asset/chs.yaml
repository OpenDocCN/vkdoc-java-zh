  \n在 `JOINED` 策略中，层次结构中的每个实体都引入自己的表，但仅用于映射在该实体类型上声明的字段。层次结构中的根实体映射到一个根表，该表定义了实体层次结构中所有表要使用的主键结构，以及鉴别器列和可选的版本列。层次结构中的其他每个表都定义一个与根表主键匹配的主键，并且它们可以选择从其\
  \ ID 列向根表的 ID 列添加外键约束。非根表不包含鉴别器类型或版本列。由于层次结构中的每个实体实例都由一个虚拟行表示，该行跨越其自身的表以及其所有超实体的表，因此它最终会与根表中的一行进行连接，该行捕获了鉴别器类型和版本信息。查询任何类型的所有字段都需要在超类型层次结构中的所有表之间进行连接。\n\
  \n\n\n图 4-3 展示了使用`JOINED`继承策略映射实体的模式。与之前的示例类似，我们在表名前添加了策略标识符，此处为`CH04_JOIN_`，以便这些示例中的所有表都能加载到同一个测试模式中，而不会发生名称冲突。\n\
  \n![9781430246923_Fig04-03.jpg](img/9781430246923_Fig04-03.jpg)\n\n图 4-3  使用 JOINED\
  \ 策略映射示例实体的模式。层次结构中的每个实体都有自己独立的表来持久化其声明的字段。表 CH04_JOIN_ADDRESS 保存关联的 Address 实例\n\
  \n示例实体类\n\n现在让我们来看一下映射到上述模式的实体类。我们省略了每个实体的类主体，因为这些实体与之前`SINGLE_TABLE`策略示例中展示的实体之间的唯一区别在于实体类级别的注解。代码清单\
  \ 4-8 至 4-11 展示了`Person`层次结构中的实体，而代码清单 4-12 展示了`Address`实体。\n\n***代码清单 4-8.***  Person.java，JOINED\
  \ 继承层次结构中的抽象根实体\n\n```\n/*\n * Person: 一个抽象实体，是继承层次结构的根\n */\n@Entity\n@NamedQueries({\n\
    @NamedQuery(name = \"Person.findAll\", query = \"select o from Person o\")})\n\
  @Table(name = \"CH04_JOIN_PERSON\")\n@TableGenerator(name = \"Person_ID_Generator\"\
  , table = \"CH04_JOIN_PERSON_ID_GEN\",\n                pkColumnName = \"PRIMARY_KEY_NAME\"\
  , pkColumnValue = \"Person.id\",\n                valueColumnName = \"NEXT_ID_VALUE\"\
  )\n@Inheritance(strategy = InheritanceType.JOINED)\npublic abstract class Person\
  \ implements Serializable {\n  /* 类主体在所有继承策略中完全相同 */\n}\n```\n\n***代码清单 4-9.***  Employee.java，JOINED\
  \ 继承层次结构中的抽象中间实体\n\n```\n/*\n * Employee: 一个扩展 Person 的抽象实体\n */\n@Entity\n@NamedQueries({\n\
    @NamedQuery(name = \"Employee.findAll\", query = \"select o from Employee o\"\
  )})\n@Table(name = \"CH04_JOIN_EMPLOYEE\")\npublic abstract class Employee extends\
  \ Person implements Serializable {\n  /* 类主体在所有继承策略中完全相同 */\n}\n```\n\n***代码清单 4-10.***  FullTimeEmployee.java，JOINED\
  \ 继承层次结构中的具体叶子实体\n\n```\n/*\n * FullTimeEmployee: 一个具体的叶子实体\n */\n@Entity\n@NamedQueries({\n\
    @NamedQuery(name = \"FullTimeEmployee.findAll\", query = \"select o from FullTimeEmployee\
  \ o\")})\n@Table(name = \"CH04_JOIN_FT_EMPLOYEE\")\npublic class FullTimeEmployee\
  \ extends Employee implements Serializable {  /* 类主体在所有继承策略中完全相同 */\n}\n```\n\n\
  ***代码清单 4-11.***  PartTimeEmployee.java，JOINED 继承层次结构中的具体叶子实体\n\n```\n/*\n * PartTimeEmployee:\
  \ 一个具体的叶子实体\n */\n@Entity\n@NamedQueries({\n  @NamedQuery(name = \"PartTimeEmployee.findAll\"\
  , query = \"select o from PartTimeEmployee o\")})\n@Table(name = \"CH04_JOIN_PT_EMPLOYEE\"\
  )\npublic class PartTimeEmployee extends Employee implements Serializable {\n  /*\
  \ 类主体在所有继承策略中完全相同 */\n}\n```\n\n***代码清单 4-12.***  Address.java，一个具体的独立实体\n\n```\n\
  /**\n * Address: 一个独立实体\n */\n@Entity\n@NamedQueries({\n  @NamedQuery(name = \"\
  Address.findAll\", query = \"select o from Address o\")})\n@Table(name = \"CH04_JOIN_ADDRESS\"\
  )\n@TableGenerator(name = \"Address_ID_Generator\", table = \"CH04_JOIN_ADDRESS_ID_GEN\"\
  ,\n                pkColumnName = \"PRIMARY_KEY_NAME\",pkColumnValue = \"Address.id\"\
  ,\n                valueColumnName = \"NEXT_ID_VALUE\")\npublic class Address implements\
