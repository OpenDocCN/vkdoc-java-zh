      <to-view-id>/cartItems.jsp</to-view-id>\n  </navigation-case>\n</navigation-rule>\n\
  ```\n\n我们将在接下来的章节中处理这三个导航目标页面。\n\n搜索页面\n\n清单 12-10 展示了`searchwines.jsp` JSF 页面的代码。该页面允许用户按年份、国家或品种搜索葡萄酒。我们使用了`h:selectOneListBox`组件，这些组件为每个搜索条件填充了静态值列表。从列表框中选择的值通过`h:selectOneListBox`组件的`value`属性中指定的值绑定表达式，存储在`SearchWines`受管\
