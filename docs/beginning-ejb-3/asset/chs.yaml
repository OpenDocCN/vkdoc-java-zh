  \ `cartItems.jsp` 页面。\n\n清单 12-22 展示了用于更新 `JSFShoppingCart` 受管 Bean 的代码片段。我们有一个\
  \ `java.util.List` 类型的属性 `cartItems`，并带有访问器方法。在 getter 方法中，我们从 `Login` 受管 Bean 中获取\
  \ `Customer` 对象和 `ShoppingCart` 有状态 EJB 的实例，并调用业务方法 `getAllCartItems()`，该方法返回购物车中的商品列表。第二个方法\
  \ `ProcessOrder()` 同样从 `Login` 受管 Bean 中获取 `ShoppingCart` 有状态 EJB 的实例，并在后端应用中调用\
  \ `ProcessOrder` 业务方法，以在 JSF 应用端完成订单。成功执行后，`JSFShoppingCart` 中的 `ProcessOrder()`\
  \ 方法返回 `success` 作为值，用于导航回应用的主页。\n\n***清单 12-22.***  JSFShoppingCart.java，包含 getCartItems\
  \ 和 ProcessOrder 方法\n\n```\nList<CartItem> cartItems = new ArrayList();\n\npublic\
  \ void setCartItems(List<CartItem> cartItems) {\n  this.cartItems = cartItems;\n\
  }\n\npublic List<CartItem> getCartItems() {\n  FacesContext ctx = FacesContext.getCurrentInstance();\n\
    Application app = ctx.getApplication();\n  ValueBinding customerBinding = app.createValueBinding(\"\
  #{Login.customer}\");\n  Individual customer = (Individual)customerBinding.getValue(ctx);\n\
    ValueBinding shoppingCartBinding = app.createValueBinding(\"#{Login.shoppingCart}\"\
  );\n  shoppingCart = (ShoppingCartLocal)shoppingCartBinding.getValue(ctx);\n  return\
  \ shoppingCart.getAllCartItems(customer);\n}\n\npublic String ProcessOrder() {\n\
    FacesContext ctx = FacesContext.getCurrentInstance();\n  Application app = ctx.getApplication();\n\
    ValueBinding shoppingCartBinding = app.createValueBinding(\"#{Login.shoppingCart}\"\
  );\n  shoppingCart = (ShoppingCartLocal)shoppingCartBinding.getValue(ctx);\n  shoppingCart.sendOrderToOPC();\n\
    return \"success\";\n}\n```\n\n最后需要做的一件事是向 `faces-config.xml` 添加一个导航规则，该规则会将用户路由回\
  \ `processOrder.jsp` 通知页面，如清单 12-24 所示。\n\n***清单 12-23.***  faces-config.xml，包含\
  \ cartItems 导航规则\n\n```\n<navigation-rule>\n  <from-view-id>/cartItems.jsp</from-view-id>\n\
    <navigation-case>\n    <from-outcome>success</from-outcome>\n    <to-view-id>/processOrder.jsp</to-view-id>\n\
    </navigation-case>\n</navigation-rule>\n```\n\n通知页面\n\n我们快完成了！我们将添加最后一个 JSF 页面\
  \ `processOrder.jsp`，该页面会向用户显示订单提交消息，并提供一个链接以导航回主页。清单 12-24 展示了 `processOrder.jsp`\
  \ 的代码。如您所见，该页面相当静态——它输出通知文本，并使用 `h:commandLink` 组件将用户路由回 `winehome.jsp` 页面，该页面显示搜索葡萄酒、查看购物车内容等选项的列表。\n\
