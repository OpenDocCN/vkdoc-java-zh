  \ `@Test` 的方法都会作为独立的单元测试被隔离运行。然而，在执行这些方法之前，JUnit 会执行一些初始化步骤，以实例化可嵌入的 EJB 容器并初始化持久化单元中的数据。接下来，我们将从初始化步骤开始，探索这个\
  \ JUnit 类的各个元素。\n\n实例化可嵌入的 EJB 容器并启动 Derby\n\n在执行该类中的任何测试之前，我们需要初始化可嵌入的 EJB 容器。由于这是一个相对消耗资源的操作（尽管不如启动一个完整的\
  \ GlassFish 服务器那么昂贵），我们希望每次启动 JUnit 测试器时只执行一次。JUnit 允许你使用 `@BeforeClass` 注解静态方法，这些方法会在每个\
  \ JUnit 会话中执行一次，且在该类上执行第一个单元测试方法之前运行。我们的类级设置方法如下：\n\n```\n@BeforeClass\npublic static\
  \ void setUpClass() throws Exception {\n  PrintWriter pw = new PrintWriter(System.out);\n\
  \n//  启动 Derby 数据库服务器，等待其响应后再继续\n  try {\n    derbyServer = new org.apache.derby.drda.NetworkServerControl();\n\
      derbyServer.start(pw);\n    int i = 50;\n    while (--i > 0) {\n      try {\n\
          derbyServer.ping();\n        break;\n      } catch (Exception ex) {\n        System.out.println(\"\
  Derby 服务器已启动；等待响应...\");\n      }\n      Thread.sleep(100);\n    }\n  } finally\
  \ {\n    pw.close();\n  }\n\n//  实例化一个可嵌入的 EJB 容器\n  ejbContainer = javax.ejb.embeddable.EJBContainer.createEJBContainer();\n\
  }\n```\n\n我们首先启动 Derby 数据库，以便持久化单元能够连接到正在运行的服务器。由于 `org.apache.derby.drda.NetworkServerControl.start()`\
  \ 方法是异步的，我们必须假设服务器可能不会立即接受连接，因此我们在循环中对其进行 ping 操作，每次迭代之间短暂休眠，直到它准备就绪或我们决定超时。\n\n\
  一旦 Derby 可以接受连接，我们就通过调用 `javax.ejb.embeddable.EJBContainer.createEJBContainer()`\
  \ 来创建可嵌入的 EJB 容器。我们的 `WineAppServiceTest` 类由 JUnit 测试器调用，NetBeans 启动测试器时使用的类路径包含\
  \ JPA 持久化单元 `.jar` 文件（来自第 7 章）、第 13 章 EJB jar 中定义的 EJB，以及运行 JUnit 框架和实例化可嵌入 EJB\
  \ 容器所需的所有必要 Java 库。当前（撰写本文时）的 GlassFish 实现会链接到 GlassFish 服务器安装区域，以提供 EJB 容器通常从其宿主\
  \ Java EE 服务器环境所需的服务。再次强调，由于我们在 Java SE 环境中运行，Java EE GlassFish 服务器实际上并未启动，但可嵌入\
  \ EJB 容器所需的类会根据需要从构成 GlassFish 的 Java 库中加载。\n\n在 JUnit 会话结束时，必须正确关闭可嵌入的 EJB 容器和\
  \ Derby 数据库服务器，以释放它们可能持有的任何资源。此时，JUnit 会调用标注了 `@AfterClass` 的方法，我们的 `tearDownClass()`\
  \ 方法执行这些任务：\n\n```\n@AfterClass\npublic static void tearDownClass() throws Exception\
  \ {\n  //  关闭可嵌入的 EJB 容器，释放所有资源\n  ejbContainer.close();\n\n//  关闭 Derby 数据库服务器\n\
    derbyServer.shutdown();\n}\n```\n\n初始化持久化单元中的数据\n\n虽然启动 Derby 和可嵌入 EJB 容器等步骤在每个\
  \ JUnit 测试会话中只需执行一次，但其他初始化步骤必须在每个 JUnit 测试之前执行。每个测试的初始化步骤放在一个（或多个）标注了 `@Before`\
  \ 的方法中，如下所示：\n\n```\n@Before\npublic void setUp() {\n  //  初始化领域模型中的数据\n  PopulateDemoData.resetData(\"\
  Chapter13-EmbeddableEJBTests-ResourceLocal\", System.out);\n}\n```\n\n对于我们的测试，我们希望确保每个单元测试开始时数据库中的数据相同，因此我们执行一个脚本来初始化数据库并将数据重置为所需状态。你可能还记得这个静态的\
  \ `PopulateDemoData.resetData()` 方法，它在其他章节中也使用过。请注意，我们传递了一个持久化单元的名称，以便在不同的应用程序上下文中重用它。`Chapter07-ServiceIntegration-jpa`\
  \ 项目中的 JPA 持久化单元定义了它自己的 `persistence.xml` 文件，其中包含一个名为 `Chapter07-WineAppUnit-ResourceLocal`\
  \ 的 `<persistence-unit>`。我们用于 JUnit 测试的 `<persistence-unit>` 是“`Chapter13-EmbeddableEJBTests-ResourceLocal`”，它定义在我们的上下文项目\
  \ `Chapter13-EmbeddedEJBTests` 的“`Configuration Files`”部分中。由于 JPA 持久化单元中的实体类对我们的测试/EJB\
  \ 模块可见，我们可以自由定义引用这些相同实体类的其他持久化单元。JPA 允许你为相同的实体类定义多个持久化单元，如果需要，可以使用多个 `persistence.xml`\
  \ 文件，使每个持久化单元能够指定不同的数据库连接、模式生成计划、持久化提供程序或任何其他配置选项。在这种情况下，我们定义一个新的持久化单元，以便将它们映射到适合测试目的的数据库连接。接下来将描述这个连接。\n\
  \n使用“jdbc/__default”连接\n\nGlassFish 预配置了一个非常适合可嵌入 EJB 容器使用的连接。它在请求时自动创建，并在嵌入式 GlassFish\
  \ 服务器关闭时自动删除。它作为名为 `jdbc/__default` 的数据源资源提供给客户端，并且被我们在 `Chapter13-EmbeddableEJBTests`\
  \ 的 `persistence.xml` 文件中定义的 JTA 和 RESOURCE_LOCAL 持久化单元所使用，如清单 13-2 所示。\n\n***清单\
  \ 13-2.***  persistence.xml，包含我们测试所使用的两个持久化单元\n\n\n\n```\n<?xml version=\"1.0\"\
  \ encoding=\"UTF-8\"?>\n<persistence version=\"2.0\" xmlns=\"http://java.sun.com/xml/ns/persistence\"\
  \ xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"\
  http://java.sun.com/xml/ns/persistencehttp://java.sun.com/xml/ns/persistence/persistence_2_0.xsd\"\
  >\n  <persistence-unit name=\"Chapter13-EmbeddableEJBTests-ResourceLocal\" transaction-type=\"\
  RESOURCE_LOCAL\">\n    <provider>org.eclipse.persistence.jpa.PersistenceProvider</provider>\n\
      <non-jta-data-source>jdbc/__default</non-jta-data-source>\n    <class>com.apress.ejb.chapter07.entities.Address</class>\n\
      <class>com.apress.ejb.chapter07.entities.BusinessContact</class>\n    <class>com.apress.ejb.chapter07.entities.CartItem</class>\n\
      <class>com.apress.ejb.chapter07.entities.Customer</class>\n    <class>com.apress.ejb.chapter07.entities.CustomerOrder</class>\n\
      <class>com.apress.ejb.chapter07.entities.Distributor</class>\n    <class>com.apress.ejb.chapter07.entities.Individual</class>\n\
      <class>com.apress.ejb.chapter07.entities.InventoryItem</class>\n    <class>com.apress.ejb.chapter07.entities.OrderItem</class>\n\
      <class>com.apress.ejb.chapter07.entities.Supplier</class>\n    <class>com.apress.ejb.chapter07.entities.Wine</class>\n\
      <class>com.apress.ejb.chapter07.entities.WineItem</class>\n    <exclude-unlisted-classes>true</exclude-unlisted-classes>\n\
      <properties>\n      <property name=\"eclipselink.ddl-generation\" value=\"drop-and-create-tables\"\
  />\n    </properties>\n  </persistence-unit>\n  <persistence-unit name=\"Chapter13-EmbeddableEJBTests-JTA\"\
  \ transaction-type=\"JTA\">\n    <provider>org.eclipse.persistence.jpa.PersistenceProvider</provider>\n\
      <jta-data-source>jdbc/__default</jta-data-source>\n    <class>com.apress.ejb.chapter07.entities.Address</class>\n\
      <class>com.apress.ejb.chapter07.entities.BusinessContact</class>\n    <class>com.apress.ejb.chapter07.entities.CartItem</class>\n\
      <class>com.apress.ejb.chapter07.entities.Customer</class>\n    <class>com.apress.ejb.chapter07.entities.CustomerOrder</class>\n\
      <class>com.apress.ejb.chapter07.entities.Distributor</class>\n    <class>com.apress.ejb.chapter07.entities.Individual</class>\n\
      <class>com.apress.ejb.chapter07.entities.InventoryItem</class>\n    <class>com.apress.ejb.chapter07.entities.OrderItem</class>\n\
      <class>com.apress.ejb.chapter07.entities.Supplier</class>\n    <class>com.apress.ejb.chapter07.entities.Wine</class>\n\
      <class>com.apress.ejb.chapter07.entities.WineItem</class>\n    <exclude-unlisted-classes>true</exclude-unlisted-classes>\n\
    </persistence-unit>\n</persistence>\n```\n\n这两个持久化单元几乎完全相同，区别仅在于事务处理和模式生成行为。第一个持久化单元\
  \ `Chapter13-EmbeddableEJBTests-ResourceLocal` 将 `jdbc/__default` 引用为 `non-jta-data-source`，并在\
  \ `PopulateDemoData.resetData()` 操作中由非 EJB Java 外观使用。由于我们知道测试会在每次测试前执行此操作，因此我们将其持久化单元配置为始终删除并重新创建该单元中实体所需的模式对象。这体现在为该单元定义的属性中：\n\
  \n```\n<property name=\"eclipselink.ddl-generation\" value=\"drop-and-create-tables\"\
  />\n```\n\n![image](img/sq.jpg) **注意**   在 JPA 2.0 及更早版本中，规范未定义模式生成选项，用户必须依赖特定平台的支持，例如上面显示的\
  \ EclipseLink 属性。JPA 2.1 通过一系列标准配置属性引入了对模式生成的支持，包括与上述属性平行的属性：“`javax.persistence.schema-generation-action`”。为了与\
  \ JPA 2.0 库兼容，目前我们在示例中使用 EclipseLink 属性。\n\n`persistence.xml` 文件中的第二个持久化单元 `Chapter13-EmbeddableEJBTests-JTA`\
  \ 可以假定模式已创建，因此我们特意不为该持久化单元启用模式生成选项。\n\n如果需要在单个单元测试运行期间释放获取的资源，我们可以使用标注了 `@After`\
  \ 的方法来释放它们。在我们的示例中，不需要这样做，因此我们将方法体留空。\n\n单元测试方法\n\n在介绍了测试初始化步骤之后，我们将注意力转向单元测试本身。每个单元测试都标注了\
  \ `@Test`，以区别于类中可能存在的其他普通方法，我们包含了三个测试方法。\n\n第一个测试 `findCustomerByEmail()`：在 `WineAppService`\
  \ EJB 上执行单个方法 `findCustomerByEmail()`，该方法返回一个 `Customer` 实例。然后断言 firstName + lastName\
  \ 为“`James Brown`”，即预期结果。我们的测试类控制持久化单元中数据的状态，因此它知道预期结果。\n\n```\n/**\n * 测试 WineAppService\
  \ 上的 findCustomerByEmail。\n *\n * 断言返回的 Customer 名为 \"James Brown\"。\n *\n * @throws\
  \ Exception\n */\n@Test\npublic void testFindCustomerByEmail() throws Exception\
  \ {\n  System.out.println(\"findCustomerByEmail\");\n  WineAppService wineAppSvcFacade\
  \ =\n      (WineAppService) ejbContainer.getContext().lookup(\"java:global/classes/WineAppService\"\
  );\n  Customer customer =\n      wineAppSvcFacade.findCustomerByEmail(PopulateDemoData.TO_EMAIL_ADDRESS);\n\
    assertEquals(\"WineAppServiceFacade.findCustomerByEmail(): 检查客户名称\",\n      \"\
  James Brown\",\n      customer.getFirstName() + \" \" + customer.getLastName());\n\
  }\n```\n\n通过 JNDI 进行 EJB 查找\n\n由于 JUnit 测试类运行在普通的 Java SE 环境中，而非可嵌入 EJB 容器内部，因此我们无法使用\
  \ EJB 注入。因此，我们通过 `EJBContainer` 对象提供的 `javax.naming.Context` API 使用 JNDI 来获取正在测试的\
  \ EJB 的引用。根据 EJB 是全局应用于应用程序还是本地应用于上下文模块，有多种查找方式。在本示例中，我们的 EJB 是全局注册到应用程序的，我们可以使用全局命名空间来查找它们，例如使用\
  \ `\"java:global/classes/WineAppService\"` 这样的 URL。\n\n第二个测试 `testCreateIndividual()`\
  \ 是第一个测试的超集，但它不依赖于第一个测试的任何副作用：\n\n```\n/**\n * 测试 WineAppService 上的 createIndividual()\
  \ 和 CustomerFacade 上的 findCustomerByEmail()。\n *\n * 断言在 createIndividual() 中创建的\
  \ Individual 实例具有预期的 email 属性。\n * 断言在 findCustomerByEmail() 中检索到的 Customer 具有预期的名称。\n\
   */\n@Test\npublic void testCreateIndividual() throws Exception {\n  System.out.println(\"\
  createIndividual\");\n  WineAppService wineAppSvcFacade =\n      (WineAppService)\
  \ ejbContainer.getContext().lookup(\"java:global/classes/WineAppService\");\n  String\
  \ email = \"drwho@yahoo.com\";\n  Individual individual =\n      wineAppSvcFacade.createIndividual(\"\
  Adam\", \"Beyda\", email);\n  assertEquals(\"WineAppServiceFacade.createIndividual():\
  \ 检查 Individual.email 属性\",\n      email, individual.getEmail());\n\nCustomerFacade\
  \ custFacade =\n      (CustomerFacade) ejbContainer.getContext().lookup(\"java:global/classes/CustomerFacade\"\
  );\n  Customer customer = custFacade.findCustomerByEmail(email);\n  assertEquals(\"\
  CustomerFacade.findCustomerByEmail(): 检查 Customer.email 属性\",\n      \"Adam Beyda\"\
  , customer.getFirstName() + \" \" + customer.getLastName());\n\n//  托管/分离实体状态检查\n\
    Address shippingAddress = new Address(\"San Mateo\", null, null, null, null);\n\
    customer.setDefaultShippingAddress(shippingAddress);\n  customer = custFacade.merge(customer);\n\
    assertNotNull(\"customer.getDefaultShippingAddress().getId() 为空\",\n      customer.getDefaultShippingAddress().getId());\n\
    assertNotNull(\"shippingAddress.getId() 为空\",\n      shippingAddress.getId());\n\
  }\n```\n\n\n\n本测试对 `WineAppService` 上的事务性方法 `createIndividual()` 进行了验证，该方法创建并持久化了一个\
  \ `Individual` 实例。随后，我们通过另一个 EJB `CustomerFacade` 上的 `findCustomerByEmail()` 方法查询该实例，以确认其可被找到。\n\
  \n测试的第二步是创建一个新地址，并将其设为客户的默认送货地址。我们将在本章后续运行测试时再回到这一步。\n\n第三个单元测试 `testCreateCustomerOrder()`\
  \ 通过调用不同 EJB 上的多个事务性方法，并结合测试端和服务器端的步骤，构建客户购物车并处理生成客户订单，进一步测试了应用行为：\n\n```\n/**\n\
  \ * 测试 WineAppService 上的 createIndividual() 和 createCustomerOrder()，\n * WineFacade\
  \ 上的 getWineFindByYear()，以及 CustomerFacade 上的 merge()。\n *\n * 断言创建的订单总价值为 110。\n\
  \ * 断言 customerOrder 和 customer 对象处于托管状态。\n */\n@Test\npublic void testCreateCustomerOrder()\
  \ throws Exception {\n  System.out.println(\"createCustomerOrder\");\n  Context\
  \ context = ejbContainer.getContext();\n  WineAppService wineAppSvcFacade =\n  \
  \    (WineAppService) context.lookup(\"java:global/classes/WineAppService\");\n\
  \  WineFacade wineFacade =\n      (WineFacade) context.lookup(\"java:global/classes/WineFacade\"\
  );\n  CustomerFacade custFacade =\n      (CustomerFacade) context.lookup(\"java:global/classes/CustomerFacade\"\
  );\n\n//  向客户的购物车添加购物车项，并合并客户更改\n  final String email = \"drwho@yahoo.com\";\n \
  \ Customer customer = wineAppSvcFacade.createIndividual(\"Adam\", \"Beyda\", email);\n\
  \  for (Wine wine : wineFacade.getWineFindByYear(2005)) {\n    customer.addCartItem(new\
  \ CartItem(10, wine));\n  }\n  customer = custFacade.merge(customer);\n\nCustomerOrder\
  \ customerOrder = wineAppSvcFacade.createCustomerOrder(customer);\n  Float total\
  \ = new Float(0);\n  for (OrderItem orderItem : customerOrder.getOrderItemList())\
  \ {\n    total += orderItem.getQuantity() * orderItem.getPrice();\n  }\n  assertEquals(\"\
  检查客户订单总额是否为 $270\", total, new Float(270));\n\n//  从持久化上下文中查询客户的最新状态\n  //  （借助\
  \ CMT 使用新事务），并检查其是否包含一个具有已填充 'id' 字段的客户订单\n  CustomerOrder customerOrder1 =\n  \
  \    wineAppSvcFacade.findCustomerByEmail(email).getCustomerOrderList().get(0);\n\
  \  assertNotNull(\"customerOrder1.getId() 为空\", customerOrder1.getId());\n\n// \
  \ 检查原始客户订单的 'id' 字段是否已自动填充\n  assertNotNull(\"customerOrder.getId() 为空\", customerOrder.getId());\n\
  \n//  检查客户引用的客户订单的 'id' 字段是否已自动填充\n  CustomerOrder customerOrder2 = customer.getCustomerOrderList().get(0);\n\
  \  assertNotNull(\"customerOrder2.getId() 为空\", customerOrder2.getId());\n}\n```\n\
  \n这个高级测试覆盖了多个方面，并模拟了一个真实世界的流程。它旨在检测相对较大代码范围内的任何故障，并与其他测试互补——当应用变更导致这些测试开始失败时，其他测试则用于精确定位代码的特定区域。\n\
  \n在详细检查了我们的 JUnit 测试代码后，你现在可以按照下一节概述的步骤，在 NetBeans 中使用 JUnit 和嵌入式 EJB 容器来构建并运行这些测试。\n\
  \n构建与测试示例代码\n\n既然我们已经了解了如何编写 JUnit 测试来针对可嵌入 EJB 容器执行 EJB 单元测试，那么让我们在 NetBeans 中执行刚刚介绍的测试用例。\n\
  \n先决条件\n\n在执行下一节详述的任何步骤之前，请先完成第 1 章的“入门”部分。该部分将引导你完成本章示例所需的安装和环境设置。\n\n打开示例应用\n\n\
  本章的根项目依赖于 `Chapter07-ServiceIntegration-jpa` 中定义的 JPA 持久化单元。启动 NetBeans IDE，并使用\
  \ `File Open Project` 菜单打开 `Chapter13-EmbeddableEJBTests` 项目。确保选中 `'Open Required\
  \ Projects'` 复选框。\n\n![9781430246923_Fig13-01.jpg](img/9781430246923_Fig13-01.jpg)\n\
  \n图 13-1.   打开 Chapter13-EmbeddableEJBTests 项目\n\n该项目是一个独立的 EJB 项目，与我们其他章节使用的 Java\
  \ EE 应用程序项目有所不同。项目包含：`Source Packages` 文件夹下待测试的几个 EJB；`Configuration Files` 文件夹中定义\
  \ EJB 所用持久化单元的 `persistence.xml` 文件；以及 `Test Packages` 文件夹中的 JUnit 测试类。其结构如图 13-2\
  \ 所示。\n\n![9781430246923_Fig13-02.jpg](img/9781430246923_Fig13-02.jpg)\n\n图 13-2.  观察\
  \ Chapter13-EmbeddableEJBTests 项目的结构\n\n编译源代码\n\n在 `Chapter13-EmbeddableEJBTests`\
  \ 节点上调用上下文菜单，并选择 `Clean and Build` 菜单选项来构建应用程序，如图 13-3 所示：\n\n![9781430246923_Fig13-03.jpg](img/9781430246923_Fig13-03.jpg)\n\
  \n图 13-3.  构建应用程序\n\n运行 JUnit 测试\n\n从 NetBeans 启动 JUnit 测试有多种方法，但对于这些测试，你可以在 `WineAppServiceTest`\
  \ 类上右键单击，并选择“`Test File`”，如图 13-4 所示：\n\n![9781430246923_Fig13-04.jpg](img/9781430246923_Fig13-04.jpg)\n\
  \n图 13-4.  启动 JUnit 测试器以执行 WineAppServiceTest.java 中的单元测试\n\n此步骤会实例化可嵌入 EJB 容器，初始化数据库，并执行类中的三个单元测试。测试结果将显示在\
  \ `Test Results` 选项卡中。\n\n你会看到，第二个和第三个测试因断言失败而失败。那么，让我们诊断这些问题。\n\n修复测试用例\n\n第一个失败发生在第二个单元测试\
  \ `testCreateIndividual()` 中，错误消息为 `shippingAddress.getId()` 是 `null`。有趣的是，该单元测试中先前的断言检查——检查当前\
  \ `customer` 已知的 `shippingAddress` 属性上的 `id` 字段——成功了。你可能会认为这些断言应该检查同一个对象——即最初通过\
  \ `setDefaultShippingAddress()` 分配给 `customer` 的对象——因为，尽管我们对 `customer` 执行了 `merge()`，但\
  \ `shippingAddress` 是一个新实例，因此逻辑上它被持久化了，而不是合并了。由于 `persist()` 操作会就地（in-place）将对象转换为托管实例，而不会像\
  \ `merge()` 那样创建新的托管对象，那么原始的 `shippingAddress` 实例现在难道不应该只是处于托管状态的原始实例吗？\n\n级联 MERGE\
  \ 操作\n\n\n\n答案是，级联 `MERGE` 操作会对新实例以及游离和受管实例执行 `merge()`；在这种情况下，新实例不会通过调用 `persist()`\
  \ 来持久化。因此，我们原来的 `shippingAddress` 引用现在已过时，而 `customer` 持有的是指向 `shippingAddress`\
  \ 新受管副本的引用。当持久化和合并那些对其引用的对象级联 `MERGE` 操作的实体时，这是一个重要的“陷阱”。`merge()` 操作会针对在级联 `MERGE`\
  \ 过程中发现的新对象和现有对象都执行。而 `persist()` 会将原始实例转换为受管副本并将其放入持久化上下文中，`merge()` 则会创建一个原始实例的新受管副本并添加该副本。被合并的原始对象（在我们的例子中是\
  \ `customer`）会被正确更新，以引用 `shippingAddress` 的新受管副本。然而，任何对原始游离实例的引用——例如，我们的 `shippingAddress`\
  \ 变量——现在都已过时，需要在使用前进行刷新。\n\n因此，要解决这个问题，我们需要通过调用 `merge()` 从 `EntityManager` 获取 `shippingAddress`\
  \ 对象的新受管副本。如果我们修改测试代码，添加第 124 行，如图 13-5 所示，然后重新运行测试，这个测试现在就会成功。\n\n![9781430246923_Fig13-05.jpg](img/9781430246923_Fig13-05.jpg)\n\
  \n图 13-5.  更新测试方法 WineAppServiceTest.testCreateIndividual() 以刷新过时的引用\n\n从 EJB 方法返回受管对象\n\
  \n第三个测试似乎因类似问题而失败。我们可以用同样的方式修复它，即在所有对象被添加到持久化上下文后（无论是直接添加还是通过级联 `MERGE` 操作），在测试客户端中显式合并所有对象以获取受管引用。然而，在这种情况下，我们是在调用一个\
  \ EJB 方法来组装 `CustomerOrder`，而不是在测试客户端内部进行组装，因此我们决定在 EJB 代码本身中解决这个问题。\n\n让我们进入调试器，看看能否找出为什么我们的\
  \ `customerOrder` 引用的 `id` 字段为 null，而从数据库查询同一个 `customerOrder` 时，其 `id` 字段却被正确赋值。\n\
  \n打开 `WineAppService.java` 文件，在 `createCustomerOrder()` 方法内部的 `custFacade.merge(customer);`\
  \ 调用处添加一个断点，如图 13-6 所示：\n\n![9781430246923_Fig13-06.jpg](img/9781430246923_Fig13-06.jpg)\n\
  \n图 13-6.  在 WineAppService.createCustomerOrder() 内部设置断点\n\n设置好断点后，右键点击 `WineAppServiceTest.java`，这次选择“`Debug\
  \ Test File`”项，以调试模式启动 JUnit 测试器。\n\n当命中断点时，打开 `Variables` 面板并导航到 `customerOrder`\
  \ 局部变量。展开 `customerOrder` 查看其属性的当前值，导航到其继承的属性，并观察其 `id` 属性为 null。这是意料之中的。在方法的这个阶段，`customerOrder`\
  \ 是一个新实例，尚未被持久化。因此，其主键值尚未生成或赋值给其 `id` 字段。\n\n单步执行断点所在的行，对 `customer` 执行 `merge()`。我们从\
  \ `Customer` 上的级联规则得知，当一个 `Customer` 实例（或其任何子类型）被合并时，所有被引用的 `CustomerOrder` 实例也会被合并。\n\
  \n在执行合并后，再次在 Variables 窗口中检查 `customerOrder`，我们发现其 `id` 字段仍然为 null。其 `id` 字段上的 `@GeneratedValue`\
  \ 设置确保在它被持久化或合并到持久化上下文时会被赋值，因此显然这个对象并不是在其 `customer` 父对象上调用 `merge()` 时创建的受管副本。因此，方法\
  \ `createCustomerOrder()` 返回了错误的 `customerOrder` 实例。要修复此问题，请编辑 return 语句，改为返回一个\
  \ `customerOrder` 的受管实例：\n\n![9781430246923_Fig13-07.jpg](img/9781430246923_Fig13-07.jpg)\n\
  \n图 13-7.  更新 WineAppService.createCustomerOrder() 以返回 customerOrder 的受管实例\n\n这让我们通过了之前遇到的\
  \ `customerOrder.getId() is null` 断言失败。再次运行测试，我们遇到了需要解决的最后一个问题。我们的 `customer` 实例在几行前通过\
  \ `createCustomerOrder()` 创建后处于受管状态。然而，断言失败 `customerOrder2.getId()` 为 `null` 表明它不知何故持有了一个\
  \ `customerOrder` 的过时副本。进一步检查发现，我们的 `customer` 副本在 `createCustomerOrder()` 内部被合并时变成了游离状态。因为我们没有将合并后的副本传回给客户端，所以客户端有责任获取新的受管副本。通过另一次\
  \ `merge()` 调用来获取这个受管副本解决了问题，如图 13-8 中第 173 行所示：\n\n![9781430246923_Fig13-08.jpg](img/9781430246923_Fig13-08.jpg)\n\
  \n图 13-8.  更新 WineAppServiceTest.testCreateCustomerOrder() 以将受管实例赋值给 customer 变量\n\
  \n……至此，我们的测试现在成功执行了。\n\n除了探索执行和调试涉及会话 Bean 和实体的 JUnit 测试的逐步过程之外，本练习的一个关键收获是，合并操作，特别是那些涉及级联\
  \ `MERGE` 的操作，可能导致过时引用，这在代码中可能难以发现。一个安全的方法是，如果你需要继续引用新实体，则显式持久化它们，而不是让它们通过级联合并被持久化，因为后者会导致原始实例变为游离状态。另外，如果在方法调用后（实体可能已被持久化或合并）对其状态有任何疑问，请记住合并对象以获取其当前的受管状态。\n\
  \n结论\n\n本章首先介绍了以下关键概念：\n\n*   *JUnit*：用于对 Java 类进行单元测试的框架\n*   *EJB Lite*：EJB API\
  \ 的一个最小子集，它为 EJB 提供基本服务，而无需完整 EJB 容器所需的一些更耗资源的特性所带来的开销\n*   *可嵌入 EJB 容器*：EJB Lite\
  \ 的一种实现，它在纯 Java SE 环境（而非 Java EE 应用服务器）中运行，并为通过 JUnit 测试 EJB 提供了一个轻量级环境\n\n在检查一个为测试\
  \ JPA 持久化单元上的 EJB 外观而编写的 JUnit 测试类时，我们剖析了在可嵌入 EJB 容器中运行测试时的配置要求。\n\n最后，我们逐步介绍了在\
  \ NetBeans 中针对 GlassFish 可嵌入 EJB 服务器实现构建和执行 JUnit 测试的步骤。这些测试被预先配置为失败，我们逐步检查并揭示了失败的原因，并借助调试器找到了解决方案。\n\
  \n本章以一个重要的收获作为结尾：在处理实体引用时需谨慎，因为当相关实体被合并时，这些引用可能因级联规则而变为游离状态。\n\n索引\n\n![images](img/square1.jpg)  A\n\
