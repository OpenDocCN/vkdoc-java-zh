  \n故障排除\n\n即使严格按照本章所述步骤操作，并在安装和配置 NetBeans IDE 及其集成的 GlassFish 应用服务器时格外小心，在运行本书附带的示例代码时仍可能遇到问题。本节将尝试指出您可能遇到的问题，并提供如何解决这些问题的信息。\n\
  \n安装过程中出现“未找到兼容的 JDK”警告\n\n在 NetBeans 安装向导的第一页上，您会看到一条 `No compatible JDK was found`\
  \ 警告消息。\n\n诊断\n\n本书中的示例需要 NetBeans 7.3 或更高版本。NetBeans 7.3 又需要 Java 平台 (JDK) 7。如果您的机器上未安装\
  \ Java 平台 (JDK) 7，您将收到 `No compatible JDK was found` 警告消息。\n\n解决方案\n\n您需要退出向导，并从以下位置下载并安装\
  \ Java 平台 (JDK) 7。\n\n`http://www.oracle.com/technetwork/java/javase/downloads/index.html`\n\
  \n无法看到 GlassFish 服务器的测试页面\n\n安装 NetBeans IDE 及其集成的 GlassFish 应用服务器后，您无法看到如图 1-11\
  \ 所示的 GlassFish 服务器测试页面。\n\n诊断\n\n您可能因以下原因无法看到测试页面：\n\n*   GlassFish 服务器未运行。\n*\
  \   浏览器无法解析服务器的主机名。\n*   URL 中指定的端口号不正确。\n\n解决方案\n\n*   使用上下文菜单启动/重启 GlassFish 服务器，如图\
  \ 1-10 所示。\n*   验证 URL 中使用的机器名或 IP 地址是否正确。您可以在 Windows 机器的命令提示符下执行 `ipconfig` 命令来查找机器的\
  \ IP 地址。如果您使用的是 `localhost`，请验证浏览器能否通过将其回环到您机器的 IP 地址来解析它。\n*   验证 URL 中使用的端口号是否正确。此解决方案将在后续章节中说明。\n\
  \n无法解析“localhost”主机名\n\n您的浏览器或 NetBeans IDE 的测试器能够使用机器名或 IP 地址运行 GlassFish 服务器的测试页面，但无法解析\
  \ `localhost` 主机名。\n\n诊断\n\nNetBeans IDE 的测试器或浏览器无法使用 `localhost` *回环*到您的机器。\n\n\
  解决方案\n\n更新 Windows 机器的 `C:\\Windows\\System32\\drivers\\etc\\hosts` 文件，添加一条将您机器的\
  \ IP 地址映射到 `localhost` 的条目。\n\n```\n# localhost 名称解析由 DNS 本身处理。\n# 127.0.0.1          localhost\n\
  # ::1                localhost\n<您机器的 IP 地址>    localhost\n```\n\n浏览器无法连接到“8080”端口\n\
  \n您 URL 的主机名部分正确，但浏览器无法连接到端口 8080 上的 GlassFish 应用服务器。\n\n诊断\n\n如果 8080 端口已被其他应用程序占用，您的浏览器将无法为\
  \ GlassFish 应用服务器使用该端口。在安装过程中，配置工具会首先尝试将 8080 端口分配给 GlassFish 应用服务器，但如果检测到 8080\
  \ 端口不可用，则会为其分配一个不同的端口号。\n\n解决方案\n\n您可以通过以下步骤找到 GlassFish 应用服务器正在运行的端口：\n\n*   导航到\
  \ NetBeans IDE 的 `Services` 选项卡，并在 GlassFish 服务器节点上调用上下文菜单，如图 1-10 所示。\n*   选择 `Properties`\
  \ 菜单选项以打开 `Servers` 对话框。\n*   在左侧面板中选择 GlassFish 服务器实例。\n*   `Common` 选项卡下的 `Location`\
  \ 文本字段将显示 GlassFish 应用服务器正在运行的端口号。\n\n编译或执行示例应用程序项目时出错\n\n打开示例应用程序项目后出现编译错误，或者示例应用程序项目未按预期执行。\n\
  \n诊断\n\n本书提供的示例已在 NetBeans 7.3 和 Java 平台 (JDK) 7 上测试通过。\n\n如果 NetBeans IDE 未配置为使用\
  \ Java 平台 (JDK) 7，则在编译本书提供的示例应用程序项目时，您可能会遇到“`javac: invalid target release: 1.7`”错误。\n\
  \n示例应用程序代码包含与创建它们时对应的 NetBeans 安装的*硬编码*端口号。如果示例代码中硬编码的端口号与您的 NetBeans 安装不同，示例将无法按预期执行。\n\
  \n解决方案\n\n要解决“`javac: invalid target release: 1.7`”错误，您必须验证 NetBeans 正在使用 Java 平台\
  \ (JDK) 7。您可能需要从前面章节提到的 URL 安装它。\n\n如果示例应用程序未按预期工作，请验证示例代码使用的端口号是否与您的 NetBeans 安装相同。\n\
  \n您可以查阅每个示例应用程序附带的 `Readme.txt` 文件以获取更多信息。\n\n无法发送或接收“葡萄酒订单”邮件\n\n执行示例应用程序项目时，您无法发送或接收“葡萄酒订单”邮件。\n\
  \n诊断\n\n少数示例项目在执行过程中会发送邮件。您可能因以下原因在发送邮件时遇到问题，并且可能无法收到邮件：\n\n*   您尚未更新示例代码中的 `from`\
  \ 和 `to` 电子邮件地址。\n*   您在位于防火墙后面的机器上运行示例。\n*   `JMS Resource` 配置不正确。\n*   `JavaMail\
  \ Session` 配置不正确。\n\n解决方案\n\n在执行发送邮件的示例应用程序项目之前，请验证：\n\n*   您已按照第 5 章所示创建并配置了 `JMS\
  \ Resource`。\n*   您已按照第 5 章所示创建并配置了 `JavaMail Session`。\n*   您已更新了示例源代码中的 `from`\
  \ 和 `to` 电子邮件地址。\n*   您不在防火墙后面。\n\n您可以查阅第 5 章示例应用程序附带的 `Readme.txt` 文件，了解如何为常用邮件服务配置\
  \ `JavaMail Session` 属性。\n\n即使在验证了这些细节之后，如果您在发送或接收邮件时仍然遇到问题，请检查 GlassFish 服务器日志以获取有关该问题的更多详细信息。\n\
  \n结论\n\n本章以对本书和 EJB 的介绍开篇。本概述涵盖了关于 EJB 核心特性、EJB 框架和组件模型的基本信息。其中简要介绍了 EJB 的历史、EJB\
  \ 3 简化开发模型以及 EJB 分布式计算模型。\n\n\n\n在“本书的组织结构”部分，我们提供了各章节的摘要，以说明本书的整体脉络，并帮助您决定，若希望跳序阅读，应优先关注哪些领域。\n\
  \n本章以“入门指南”一节作为结尾，帮助您安装和配置 NetBeans IDE 及其集成的 GlassFish 应用服务器（该服务器包含最新 Java EE 规范的参考实现），并验证安装是否成功。完成此任务后，您便拥有了运行本书代码示例以及后续章节中研究\
  \ EJB 众多特性所需的软件基础设施。\n\n**第 2 章**\n\n![image](img/frontdot.jpg)\n\n**EJB 会话 Bean**\n\
  \n本章将讨论 EJB 会话 Bean，即 EJB 客户端应用程序所使用的核心业务服务对象。您将深入理解简化的 EJB 会话 Bean 模型，并了解以下主题：\n\
  \n*   会话 Bean 的类型——有状态、无状态和单例——以及何时使用每种类型\n*   Bean 类、业务接口和业务方法\n*   异步方法\n*   回调方法\n\
  *   拦截器\n*   异常处理\n*   客户端视图\n*   与会话 Bean 相关的注解依赖注入\n*   定时器服务\n\n**会话 Bean 简介**\n\
  \n*会话 Bean* 是 Java 组件，它们可以在独立的 EJB 容器中运行，也可以在作为标准 Java 平台企业版（Java EE）应用服务器一部分的 EJB\
  \ 容器中运行。这些 Java 组件通常用于对特定的用户任务或用例进行建模，例如输入客户信息或实现一个与客户端应用程序保持会话状态的流程。会话 Bean 可以包含多种类型应用程序的业务逻辑，例如人力资源、订单录入和费用报告应用程序。EJB\
  \ 容器为会话 Bean 提供服务，而 Bean 则通过使用 Java 注解和/或 XML 元数据来指明它需要哪些服务。\n\n**会话 Bean 的类型**\n\
  \n会话 Bean 分为三种类型：\n\n*   **无状态**：此类型的 Bean 不会代表客户端应用程序维护任何会话状态。\n*   **有状态**：此类型的\
  \ Bean 维护一个状态，并且 Bean 的特定实例与特定的客户端请求相关联。有状态 Bean 可以被视为在服务器上运行的客户端程序的扩展。\n*   **单例**：此类型的\
  \ Bean 在每个应用程序中仅实例化一次。单例 Bean 在应用程序的整个生命周期内存在，并在客户端调用之间维护其状态。\n\n我们将在以下各节中深入探讨无状态、有状态和单例\
  \ Bean 的更多细节。\n\n**何时使用会话 Bean？**\n\n会话 Bean 用于编写业务逻辑、维护客户端的会话状态，以及建模执行一个或多个业务操作的后端流程或用户任务。典型的示例包括：\n\
  \n*   人力资源应用程序中的会话 Bean，用于创建新员工并将该员工分配到特定部门\n*   费用报告应用程序中的会话 Bean，用于创建新的费用报告\n\
  *   订单录入应用程序中的会话 Bean，用于为特定客户创建新订单\n*   电子商务应用程序中管理购物车内容的会话 Bean\n*   利用 EJB 容器中事务服务的会话\
  \ Bean（无需应用程序开发人员编写事务支持代码）\n*   当客户端应用程序未部署在同一服务器上时，用于解决部署需求的会话 Bean\n*   利用容器在组件或方法级别提供的安全支持的会话\
  \ Bean\n*   实现日志记录功能并在应用程序的不同组件之间共享的会话 Bean\n\n会话 Bean 可用于传统的 2 层或 3 层架构（配合专业/富客户端应用程序），或用于\
  \ 3 层基于 Web 的应用程序。这些应用程序可以部署在不同的逻辑和物理层组合中。在下一节中，我们将研究一些可能的组合。\n\n**带富客户端的 3 层架构**\n\
  \n图 2-1 展示了会话 Bean 在 3 层架构中的典型结构，该架构包含一个富客户端前端应用程序，该应用程序具有供最终用户（例如客户服务代表、银行柜员等）使用的数据录入界面。这些客户端应用程序可以使用\
  \ Java Swing 技术与 Java 平台标准版（Java SE）开发，或者它们可以是普通的旧 Java 对象（POJO），从命令行运行。通常，最终用户从其桌面启动客户端应用程序，输入一些数据，并通过按下某个用户界面组件（例如“提交”按钮）来触发事件。一般的工作流程可能如下所示：\n\
  \n1.  用户操作通过远程方法调用（RMI）建立与会话 Bean（在 EJB 容器中运行）的连接。\n2.  客户端应用程序调用会话 Bean 中的一个或多个业务方法。\n\
  3.  会话 Bean 通过交互数据库、企业应用程序、遗留系统等来处理请求并验证数据，以执行特定的业务操作或任务。\n4.  最后，会话 Bean 通过数据集合或包含确认消息的简单对象，将响应发送回客户端应用程序。\n\
  \n![9781430246923_Fig02-01.jpg](img/9781430246923_Fig02-01.jpg)\n\n图 2-1.  带富客户端的\
  \ 3 层架构中的会话 Bean\n\n**Web 应用程序的 3 层架构**\n\n此架构，如图 2-2 所示，通常由运行在台式机或笔记本电脑浏览器中的 Web\
  \ 应用程序作为前端。如今，其他类型的客户端设备，如智能手机、平板电脑、手机和 telnet 设备，也被用于运行这些应用程序。运行在浏览器或移动设备中的 Web\
  \ 应用程序使用诸如 JavaServer Pages（JSP）、JavaServer Faces（JSF）或 Java Servlet 等 Web 技术来呈现用户界面（数据录入界面、提交按钮等）。典型的用户操作，例如输入搜索条件或向\
  \ Web 应用程序购物车添加特定项目，将通过上述 Web 技术之一调用在 EJB 容器中运行的会话 Bean。一旦会话 Bean 被调用，它就会处理请求并将响应发送回\
  \ Web 应用程序，Web 应用程序根据需要格式化响应，然后将响应发送回请求的客户端设备（浏览器、智能手机、telnet 等）。\n\n![9781430246923_Fig02-02.jpg](img/9781430246923_Fig02-02.jpg)\n\
  \n图 2-2.  带 Web 应用程序的 3 层架构中的会话 Bean\n\n在刚刚讨论的 3 层架构中，客户端应用程序（即 Web 应用程序）和会话 Bean\
  \ 可以在同一应用服务器实例中运行（位于同一位置），也可以在同一台机器上运行的不同实例中运行。它们还可以在物理上分离的、各自运行着一个应用服务器实例的机器上运行。\n\
  \n**无状态会话 Bean**\n\n无状态会话 Bean 由以下元素组成：\n\n*   Bean 类，包含要执行业务方法的实现\n*   可选地，一个或多个业务接口，允许向客户端应用程序展示\
  \ Bean 业务方法的不同组合\n\n**Bean 类**\n\n\n\n无状态会话 Bean 类是指任何带有类级别注解 `@Stateless` 的标准 Java\
  \ 类。如果使用部署描述符代替注解，则应在 `ejb-jar.xml` 描述符中将该 Bean 类标记为无状态会话 Bean。如果同时使用注解和部署描述符（混合模式），则在\
  \ Bean 类中指定了任何其他类级别或成员级别注解时，必须指定 `@Stateless` 注解。如果同时使用注解和部署描述符，则在部署过程中，部署描述符中的设置或值将覆盖类中的注解。\n\
  \n![image](img/sq.jpg) **注意**  从 EJB 3.1 开始，会话 Bean 类可以是另一个会话 Bean 类的子类。\n\n为了说明无状态会话\
  \ Bean 的使用，我们将创建一个 `SearchFacade` 会话 Bean，它为客户端应用程序提供关于可用葡萄酒的各种搜索功能。工作流程如下：\n\n\
  1.  应用程序的用户将输入或选择一个或多个搜索条件，这些条件将被提交给 `SearchFacade` 会话 Bean。\n2.  `SearchFacade`\
  \ Bean 将访问后端数据库以检索请求的信息。为了简化本章中的代码示例，我们实际上将在 Bean 类中检索硬编码值的列表。在后续章节中，我们将增强 `SearchFacade`\
  \ Bean 以访问后端数据库。\n3.  Bean 将满足搜索条件的信息返回给客户端应用程序。\n\n清单 2-1 展示了 `SearchFacade` Bean\
  \ 的定义。在本章的后续部分，我们将构建代码来演示上述工作流程的实际运行。`SearchFacadeBean` 是一个带有类级别注解 `@Stateless`\
  \ 的标准 Java 类。\n\n***清单 2-1.***  SearchFacadeBean.java\n\n```\npackage com.apress.ejb.chapter02;\n\
  import javax.ejb.Stateless;\n@Stateless(name=\"SearchFacade\")\npublic class SearchFacadeBean\
  \ implements SearchFacade, SearchFacadeLocal {\n    public SearchFacadeBean() {\n\
      }\n}\n```\n\n业务接口\n\n无状态会话业务接口是一个标准 Java 接口，没有其他特殊要求。该接口包含一系列可供客户端应用程序使用的业务方法定义。会话\
  \ Bean 可以有一个由 Bean 类实现的业务接口，该接口可以在设计时由 JDeveloper、NetBeans 或 Eclipse 等工具生成，也可以在部署时由\
  \ EJB 容器生成。\n\n业务接口也可以使用注解，如下所述：\n\n*   `@Remote` 注解可用于表示远程业务接口。\n*   `@Local` 注解可用于表示本地业务接口。\n\
  \n![image](img/sq.jpg) **注意**  从 EJB 3.1 开始，会话 Bean 支持“无接口本地视图”。这是本地视图的一种变体，它公开\
  \ Bean 类的公共方法，而无需单独的业务接口。\n\n如果接口中未指定任何注解，则 Bean 类本身的公共方法将成为其自身的*事实上的*本地接口。\n\n\
  如果你的架构要求客户端应用程序（Web 应用程序或富客户端）在与运行 EJB 容器中会话 Bean 不同的 Java 虚拟机（JVM）上运行，那么你需要使用远程接口。不同的\
  \ JVM 可以位于同一台物理机器上，也可以位于不同的机器上。如果你的应用程序架构将客户端应用程序和会话 Bean 使用同一个 JVM，那么使用本地接口（可以是无接口选项）可以提高性能。\n\
  \n你的应用程序架构可能同时需要远程接口和本地接口。例如，一家企业可能有一个订单录入应用程序，该应用程序使用会话 Bean 开发，这些 Bean 具有用于提交新订单以及处理管理任务（例如产品数据录入）的业务方法。你可能会有两个不同的客户端应用程序访问后端的订单录入应用程序，如下所示：\n\
  \n*   一个 Web 客户端应用程序（如图 2-3 所示），它可以在与会话 Bean 相同的 JVM 中运行，用于提交新订单\n\n![9781430246923_Fig02-03.jpg](img/9781430246923_Fig02-03.jpg)\n\
  \n图 2-3.  使用会话 Bean 本地接口的 Web 客户端\n\n*   一个富客户端应用程序（如图 2-4 所示），它运行在最终用户的桌面机器上，由管理员用于数据录入目的\n\
  \n![9781430246923_Fig02-04.jpg](img/9781430246923_Fig02-04.jpg)\n\n图 2-4.  使用会话\
  \ Bean 远程接口的富客户端\n\n`SearchFacade` 会话 Bean 同时具有远程和本地接口，如图 2-5 所示。\n\n![9781430246923_Fig02-05.jpg](img/9781430246923_Fig02-05.jpg)\n\
  \n图 2-5.  SearchFacade 会话 Bean 的业务接口\n\n清单 2-2 展示了 `SearchFacade` 远程业务接口的代码片段，其中包含\
  \ `@Remote` 注解和一个 `wineSearch()` 方法声明。`wineSearch()` 方法接受一个表示葡萄酒类型的参数，并返回一个与葡萄酒类型条件匹配的葡萄酒列表。\n\
  \n***清单 2-2.***  SearchFacade.java\n\n```\npackage com.apress.ejb.chapter02;\nimport\
  \ java.util.List;\nimport javax.ejb.Remote;\n\n@Remote\npublic interface SearchFacade\
  \ {\n    List wineSearch(String wineType);\n}\n```\n\n清单 2-3 展示了 `SearchFacade`\
  \ 本地业务接口的代码片段，其中包含 `@Local` 注解和一个 `wineSearch()` 方法声明。\n\n***清单 2-3.***  SearchFacadeLocal.java\n\
  \n```\npackage com.apress.ejb.chapter02;\nimport java.util.List;\nimport javax.ejb.Local;\n\
  \n@Local\npublic interface SearchFacadeLocal {\n    List wineSearch(String wineType);\n\
  }\n```\n\n业务方法\n\n在 Bean 类中实现的方法必须与远程或本地业务接口中声明的业务方法相对应。它们基于具有相同名称和方法签名的约定进行匹配。Bean\
  \ 类中其他在业务接口中没有相应声明的方法将是 Bean 类方法的私有方法。\n\n`SearchFacade` Bean 实现了一个方法 `wineSearch()`，该方法已在远程和本地业务接口中声明。`wineSearch()`\
  \ 方法根据葡萄酒类型返回一个静态的葡萄酒列表。清单 2-4 展示了 `wineSearch()` 的实现。\n\n***清单 2-4.***  SearchFacadeBean.java\n\
  \n```\npackage com.apress.ejb.chapter02;\nimport java.util.ArrayList;\nimport java.util.List;\n\
  import javax.ejb.Stateless;\n\n@Stateless(name=\"SearchFacade\")\npublic class SearchFacadeBean\
  \ implements SearchFacade, SearchFacadeLocal {\n    public SearchFacadeBean() {\n\
      }\n\npublic List wineSearch(String wineType) {\n        List wineList = new\
  \ ArrayList();\n        if (wineType.equals(\"Red\")) {\n        wineList.add(\"\
  Bordeaux\");\n        wineList.add(\"Merlot\");\n        wineList.add(\"Pinot Noir\"\
  );\n        }\n        else if (wineType.equals(\"White\")) {\n        wineList.add(\"\
  Chardonnay\");\n        }\n\nreturn wineList;\n    }\n}\n```\n\n异步业务方法\n\n\n\n异步方法会立即将控制权返回给调用者，而无需等待方法执行完成。异步方法通常用于处理器密集型或长时间运行的后台任务，例如打印文档或发送大型电子邮件。\n\
  \n从 EJB 3.1 开始，会话 Bean 可以声明其一个或多个方法能够异步执行。当会话 Bean 客户端调用异步方法时，容器会立即将控制权返回给客户端。这使得客户端能够在业务方法于单独线程中完成执行的同时，并行执行任务。例如，客户端可以利用此功能，通过进度条来展示长时间运行任务的进度。\n\
  \n异步方法通过在业务方法上添加 `javax.ejb.Asynchronous` 注解来定义。在类级别添加 `@Asynchronous` 注解，会将会话 Bean\
  \ 的所有业务方法标记为异步。异步方法必须返回 `void` 或 `java.lang.concurrent.Future<V>` 接口的实现。返回 `void`\
  \ 的异步方法不能抛出应用程序异常。只有返回 `Future<V>` 的异步方法才能抛出应用程序异常。\n\n在 Bean 类上定义的异步方法应具有以下签名：\n\
  \n```\npublic void <METHOD>(Object)\n```\n\n或\n\n```\npublic java.util.concurrent.Future<V>\
  \ <METHOD>(Object) throws <APPLICATION-EXCEPTION>\n```\n\n会话 Bean 客户端调用异步方法的方式与调用同步方法相同。如果异步方法被定义为返回结果，客户端会立即收到一个\
  \ `Future<V>` 接口的实例。客户端可以使用此实例进行以下任何操作：\n\n*   使用 `get()` 方法检索最终结果集。由于此方法调用会同步阻塞，直到返回结果或抛出异常，因此通常直到\
  \ `isDone()` 返回 `true` 时才调用它。\n*   使用 `isDone()` 方法检查异步方法的状态。\n*   使用 `cancel(boolean)`\
  \ 方法取消方法调用。调用 `cancel()` 不会中断线程，它只是设置一个状态标志，该标志可以在运行的方法内部进行检查，以便其能够优雅地中断执行并返回。\n\
  *   使用 `isCancelled()` 方法检查方法调用是否已被取消。\n*   检查异常。\n\n![image](img/sq.jpg) **注意**  \
  \ 作为 Web 服务公开的会话 Bean 方法不能是异步的。\n\n如果异步方法返回结果，则必须使用 `javax.ejb.AsyncResult<V>` 便捷包装器对象来返回该结果。请注意，此对象实际上并不会返回给客户端，而是由\
  \ EJB 容器拦截并解包，以服务于对 `Future<V>` 对象的方法调用，该对象是在客户端调用方法时实际返回给客户端的。\n\n依赖注入\n\n在第 1\
  \ 章中，我们介绍了依赖注入作为编程设计模式的概念。在本节中，我们将初步了解如何在无状态会话 Bean 中使用依赖注入。依赖注入将在第 10 章中详细讨论。\n\
  \nEJB 容器提供了将各种类型的资源注入无状态会话 Bean 的功能。通常，为了执行用户任务或处理来自客户端应用程序的请求，会话 Bean 中的业务方法需要一种或多种类型的资源。这些资源可以是其他会话\
  \ Bean、数据源或消息队列。托管 Bean 可以使用上下文和依赖注入（CDI）注入到会话 Bean 中。\n\n无状态会话 Bean 尝试使用的资源可以通过注解或部署描述符进行注入。可以通过对实例变量进行注解或对\
  \ setter 方法进行注解来获取资源。清单 2-5 展示了一个基于 setter 和实例变量注入 `myDb` 的示例，`myDb` 代表数据源。\n\n\
  ***清单 2-5.***  数据源注入\n\n```\n@Resource\nDataSource myDb;\n\n// 或\n@Resource\npublic\
  \ void setMyDb(DataSource myDb) {\n    this.myDb = myDb;\n}\n```\n\n你通常会使用 setter\
  \ 注入来预配置或初始化注入资源的属性。\n\n生命周期回调方法\n\n在某些实例或用例中，使用会话 Bean 的应用程序需要对生命周期事件（如其自身的创建、移除等）进行细粒度控制。例如，`SearchFacade`\
  \ 会话 Bean 可能需要在创建时执行一些数据库初始化，或在销毁时关闭一些数据库连接。应用程序可以通过称为*回调方法*的方法来获得对 Bean 生命周期各个阶段的细粒度控制。回调方法可以是会话\
  \ Bean 中任何带有回调注解的方法。EJB 容器会在 Bean 生命周期的适当阶段（Bean 创建和销毁）调用这些方法。\n\n以下是针对无状态会话 Bean\
  \ 的两种此类回调：\n\n*   `PostConstruct`：使用 `@PostConstruct` 注解表示。Bean 类中使用特定签名（如下所述）的方法可以标记为此注解。\n\
  *   `PreDestroy`：使用 `@PreDestroy` 注解表示。同样，Bean 类中任何具有特定签名（如下所述）的方法都可以标记为此注解。\n\n\
  在 Bean 类上定义的回调方法应具有以下签名：\n\n```\nvoid <METHOD>()\n```\n\n回调方法也可以在 Bean 的监听器类上定义；这些方法应具有以下签名：\n\
  \n```\nvoid <METHOD>(Object)\n```\n\n其中 `Object` 可以声明为实际的 Bean 类型，该类型是运行时传递给回调方法的参数。生命周期回调方法可以具有\
  \ public、private、protected 或包级别访问权限。生命周期回调方法不得声明为 `final` 或 `static`。\n\n`PostConstruct`\
  \ 回调发生在 Bean 实例在 EJB 容器中实例化之后。如果 Bean 使用任何依赖注入机制来获取对其环境中资源或其他对象的引用，则 `PostConstruct`\
  \ 将在注入执行之后、Bean 类中的第一个业务方法被调用之前发生。以 `SearchFacade` 会话 Bean 为例，你可以有一个业务方法 `wineSearchByCountry()`，它会返回特定国家的葡萄酒列表，并有一个\
  \ `PostConstruct` 回调方法 `initializeCountryWineList()`，该方法会在 Bean 被实例化时初始化该国家的葡萄酒列表。理想情况下，你会从后端数据存储加载列表；但在本章中，我们将仅使用一些硬编码值填充到\
  \ `HashMap` 中，如清单 2-6 所示。\n\n***清单 2-6.***  PostConstruct 方法\n\n```\n@PostConstruct\n\
  public void initializeCountryWineList() {\n    // countryMap 是 HashMap\n    countryMap.put(\"\
  Australia\", \"Sauvignon Blanc\");\n    countryMap.put(\"Australia\", \"Grenache\"\
  );\n    countryMap.put(\"France\",\"Gewurztraminer\");\n    countryMap.put(\"France\"\
  ,\"Bordeaux\");\n}\n```\n\n`PreDestroy` 回调发生在容器从其对象池中销毁未使用或过期的 Bean 实例之前。此回调可用于关闭通过依赖注入创建的任何连接池，并释放任何其他资源。\n\
  \n\n\n对于 `SearchFacade` 会话 Bean，我们可以在其中添加一个 `PreDestroy` 回调方法（`destroyWineList()`），当\
  \ Bean 被销毁时，该方法会清空国家葡萄酒列表。理想情况下，在 `PreDestroy` 阶段，我们应该关闭所有通过依赖注入创建的资源；但在本章中，我们仅清空存储国家和葡萄酒列表的\
  \ `HashMap`。清单 2-7 展示了 `destroyWineList()` 的代码。\n\n***清单 2-7.***  PreDestroy 方法\n\
  \n```\n@PreDestroy\npublic void destroyWineList() {\n    countryMap.clear();\n}\n\
  ```\n\n拦截器\n\nEJB 规范提供了一种名为*拦截器*的注解，它允许你在业务方法调用时进行干预，在方法调用前后添加自定义的包装代码。可以为会话 Bean\
  \ 和消息驱动 Bean（MDB）定义拦截器方法。我们将向你展示在会话 Bean 上下文中拦截器的用法。\n\n在典型应用中，拦截器有许多用例，你可能会发现需要在业务方法调用前后执行特定任务。例如，你可能希望执行以下操作之一：\n\
  \n*   在转账金额超过 10 万美元的关键业务方法执行前，执行额外的安全检查\n*   进行一些性能分析，计算执行任务所需的时间\n*   在方法调用前后进行额外的日志记录\n\
  \n定义拦截器有两种方式。你可以在特定方法上添加 `@AroundInvoke` 注解，或者注解 Bean 类以指定一个拦截器类，该拦截器类将干预 Bean 类上的所有（或显式指定的子集）方法。拦截器类通过在其关联的\
  \ Bean 类上使用 `@Interceptor` 注解来表示。如果有多个拦截器类，则使用 `@Interceptors` 注解。方法特定的拦截器通过在业务方法上应用\
  \ `@Interceptors` 注解来表示。使用 `@AroundInvoke` 注解的方法应具有以下签名：\n\n```\nObject <METHOD>(InvocationContext)\
  \ throws Exception\n```\n\n`AroundInvoke` 方法可以具有 public、private、protected 或包级别访问权限。`AroundInvoke`\
  \ 方法不能声明为 `final` 或 `static`。`InvocationContext` 的定义如下：\n\n```\npackage javax.ejb;\n\
  public interface InvocationContext {\n   public Object getBean();\n   public java.lang.reflect.Method\
  \ getMethod();\n   public Object[] getParameters();\n   public void setParameters(Object[]\
  \ params);\n   public EJBContext getEJBContext();\n   public java.util.Map getContextData();\n\
     public Object proceed() throws Exception;\n}\n```\n\n以下列表描述了上述代码中的方法：\n\n*  \
  \ `getBean()` 返回被调用方法所属的 Bean 实例。\n*   `getMethod()` 返回被调用的 Bean 实例上的方法。\n*   `getParameters()`\
  \ 返回方法调用的参数。\n*   `setParameters()` 修改用于方法调用的参数。\n*   `getEJBContext()` 允许拦截器方法访问\
  \ Bean 的 `EJBContext`。\n*   `getContextData()` 允许使用返回的 `Map` 在同一个 `InvocationContext`\
  \ 实例中的拦截器方法之间传递值。\n*   `proceed()` 调用下一个拦截器（如果存在），或者调用目标 Bean 方法。\n\n在 `SearchFacade`\
  \ 会话 Bean 中，我们可以添加一个拦截器，用于记录客户端应用程序调用每个业务方法所花费的时间。清单 2-8 展示了一个时间日志方法，它将打印出执行业务方法所花费的时间。使用\
  \ `InvocationContext` 获取 Bean 类的名称和被调用方法的名称。在调用业务方法之前，捕获当前系统时间，并在业务方法执行后从系统时间中减去该时间。最后，使用\
  \ `System.out.println` 将详细信息打印到控制台日志。\n\n***清单 2-8.***  拦截器方法\n\n```\n@AroundInvoke\n\
  public Object TimerLog (InvocationContext ctx) throws Exception {\n    String beanClassName\
  \ = ctx.getClass().getName();\n    String businessMethodName = ctx.getMethod().getName();\n\
      String target = beanClassName + \".\" + businessMethodName ;\n    long startTime\
  \ = System.currentTimeMillis();\n    System.out.println (\"Invoking \" + target);\n\
      try {\n        return ctx.proceed();\n    }\n    finally {\n        System.out.println\
  \ (\"Exiting\" + target);\n        long totalTime = System.currentTimeMillis() -\
  \ startTime;\n        System.out.println (\"Business method\" + businessMethodName\
  \ +\n        \"in\" + beanClassName + \"takes\" + totalTime + \"ms to execute\"\
  );\n    }\n}\n```\n\n有状态会话 Bean\n\n与无状态会话 Bean 类似，有状态 Bean 包含一个 Bean 类，以及可选的一个或多个业务接口。\n\
  \nBean 类\n\n有状态会话 Bean 类是任何带有类级别注解 `@Stateful` 的标准 Java 类。如果使用部署描述符而不是注解，则应将 Bean\
  \ 类标记为有状态会话 Bean。在混合模式下，即同时使用注解*和*部署描述符时，如果在类中指定了任何其他类级别或成员级别注解，则必须指定 `@Stateful`\
  \ 注解。\n\n为了说明有状态会话 Bean，我们将创建一个 `ShoppingCart` 会话 Bean，它将跟踪添加到用户购物车中的商品及其各自的数量。在本章中，我们将为购物车使用硬编码值，以说明客户端和有状态会话\
  \ Bean 之间的状态和会话维护。清单 2-9 展示了 `ShoppingCart` 会话 Bean 的定义。\n\n***清单 2-9.***  ShoppingCartBean.java\n\
  \n```\npackage com.apress.ejb.chapter02;\nimport javax.ejb.Stateful;\n@Stateful(name=\"\
  ShoppingCart\")\npublic class ShoppingCartBean implements ShoppingCart, ShoppingCartLocal\
  \ {\n    public ShoppingCartBean() {\n    }\n}\n```\n\n在某些用例中，应用程序希望 EJB 容器在事务发生前后通知它，然后利用这些通知来管理数据和缓存。当有状态会话\
  \ Bean 实现 `javax.ejb.SessionSynchronization` 接口时，它可以接收来自 EJB 容器的此类通知。这是一个可选功能。有状态会话\
  \ Bean 从 EJB 容器接收三种不同类型的事务通知：\n\n*   `afterBegin`：表示一个新事务已开始\n*   `beforeCompletion`：表示事务即将提交\n\
  *   `afterCompletion`：表示事务已完成\n\n例如，`ShoppingCart` 会话 Bean 可以实现 `javax.ejb.SessionSynchronization`\
  \ 接口以接收 `afterCompletion` 通知，从而可以清空购物车缓存。\n\n业务接口\n\n\n\n有状态会话 bean 的业务接口与无状态会话\
  \ bean 所使用的接口类似，并且使用相同的注解方式，即通过 `@Local` 和 `@Remote` 注解进行标记。有状态会话 bean 的本地视图可以在没有单独本地业务接口的情况下进行访问。`ShoppingCart`\
  \ 会话 bean 同时具有远程和本地接口，如图 2-6 所示。\n\n![9781430246923_Fig02-06.jpg](img/9781430246923_Fig02-06.jpg)\n\
  \n图 2-6.  ShoppingCart 的业务接口\n\n我们将主要从 Web 应用程序中使用本地接口。添加远程接口是为了便于在本章中对 bean 进行单元测试。\n\
  \n清单 2-10 和 2-11 分别展示了带有 `@Remote` 和 `@Local` 注解的远程和本地 `ShoppingCart` 业务接口。\n\n\
  ***清单 2-10.***  ShoppingCart.java\n\n```\npackage com.apress.ejb.chapter02;\nimport\
  \ javax.ejb.Remote;\n@Remote\npublic interface ShoppingCart {\n}\n```\n\n***清单 2-11.***  ShoppingCartLocal.java\n\
  \n```\npackage com.apress.ejb.chapter02;\nimport javax.ejb.Local;\n@Local\npublic\
  \ interface ShoppingCartLocal {\n}\n```\n\n或者，你也可以使用清单 2-12 中展示的编码风格，即在指定 `@Stateful`\
  \ 或 `@Stateless` 并附带业务接口名称之前，先指定 `@Local` 和 `@Remote` 注解。\n\n***清单 2-12.***  ShoppingCartBean.java\n\
  \n```\npackage com.apress.ejb.chapter02;\nimport javax.ejb.Local;\nimport javax.ejb.Remote;\n\
  import javax.ejb.Stateful;\n\n@Local({ShoppingCartLocal.class})\n@Remote({ShoppingCart.class})\n\
  @Stateful(name=\"ShoppingCart\")\n\npublic class ShoppingCartBean implements ShoppingCart,\
  \ ShoppingCartLocal {\n    public ShoppingCartBean() {\n    }\n}\n```\n\n![image](img/sq.jpg) **注意**  \
  \ 本书将遵循之前的约定，即在业务接口上标记 `@Local` 和 `@Remote` 注解。\n\n业务方法\n\n有状态会话 bean 中的业务方法与无状态会话\
  \ bean 中的类似。我们将通过添加业务方法来增强 `ShoppingCart` bean，这些方法将向购物车添加和移除葡萄酒，并返回购物车商品列表。\n\n\
  清单 2-13 展示了实现 `addWineItem()`、`removeWineItem()` 和 `getCartItems()` 方法的 `ShoppingCart`\
  \ bean。\n\n***清单 2-13.***  ShoppingCartBean.java\n\n```\npackage com.apress.ejb.chapter02;\n\
  import java.util.ArrayList;\nimport javax.ejb.Stateful;\n\n@Stateful(name=\"ShoppingCart\"\
  )\npublic class ShoppingCartBean implements ShoppingCart, ShoppingCartLocal {\n\
      public ShoppingCartBean() {\n    }\n    public ArrayList cartItems;\n    public\
  \ void addWineItem(String wine) {\n       cartItems.add(wine);\n    }\n\npublic\
  \ void removeWineItem(String wine) {\n       cartItems.remove(wine);\n    }\n\n\
  public void setCartItems(ArrayList cartItems) {\n        this.cartItems = cartItems;\n\
      }\n\npublic ArrayList getCartItems() {\n        return cartItems;\n    }\n}\n\
  ```\n\n生命周期回调方法\n\n有状态会话 bean 支持构造、销毁、激活和钝化等回调事件。以下是映射到上述事件的回调方法：\n\n*   `PostConstruct`：使用\
  \ `@PostConstruct` 注解标记。\n*   `PreDestroy`：使用 `@PreDestroy` 注解标记。\n*   `PreActivate`：使用\
  \ `@PreActivate` 注解标记。\n*   `PrePassivate`：使用 `@PrePassivate` 注解标记。\n\n`PostConstruct`\
  \ 回调发生在 bean 实例在 EJB 容器中被实例化之后。如果 bean 使用任何依赖注入机制来获取对其环境中资源或其他对象的引用，则 `PostConstruct`\
  \ 事件会在注入执行之后、bean 类中的第一个业务方法被调用之前发生。\n\n对于 `ShoppingCart` 会话 bean，我们可以有一个名为 `initialize()`\
  \ 的业务方法，用于初始化 `cartItems` 列表，如清单 2-14 所示。\n\n***清单 2-14.***  PostConstruct 方法\n\n\
  ```\n@PostConstruct\npublic void initialize() {\n    cartItems = new ArrayList();\n\
  }\n```\n\n`PreDestroy` 回调发生在任何带有 `@Remove` 注解的方法完成之后。对于 `ShoppingCart` 会话 bean，我们可以有一个名为\
  \ `exit()` 的业务方法，用于将 `cartItems` 列表写入数据库。在本章中，我们仅向系统控制台打印一条消息来说明该回调。清单 2-15 展示了带有\
  \ `@PreDestroy` 注解的 `exit()` 方法的代码。\n\n***清单 2-15.***  PreDestroy 方法\n\n```\n@PreDestroy\n\
  public void exit() {\n    // items list into the database.\n    System.out.println(\"\
  Saved items list into database\");\n}\n```\n\n`@Remove` 注解对于有状态会话 bean 来说是一个有用的生命周期方法。当调用带有\
  \ `@Remove` 注解的方法时，容器会在该方法执行后从对象池中移除该 bean 实例。清单 2-16 展示了带有 `@Remove` 注解的 `stopSession()`\
  \ 方法的代码。\n\n***清单 2-16.***  移除方法\n\n```\n@Remove\npublic void stopSession() {\n\
      // The method body can be empty.\n    System.out.println(\"From stopSession\
  \ method with @Remove annotation\");\n}\n```\n\n当有状态会话 bean 实例空闲时间过长时，`PrePassivate`\
  \ 回调会被触发。在此事件期间，容器可能会钝化并将其状态存储到缓存中。标记有 `@PrePassivate` 的方法会在容器钝化 bean 实例之前被调用。\n\
  \n当客户端应用程序再次使用一个已钝化的有状态会话 bean 时，会触发 `PostActivate` 事件。此时会创建一个状态已恢复的新实例。当 bean 实例准备就绪时，会调用带有\
  \ `@PostActivate` 注解的方法。\n\n拦截器\n\n无状态和有状态会话 bean 的拦截器之间存在一些细微差别。`AroundInvoke`\
  \ 方法可用于有状态会话 bean。对于实现了 `SessionSynchronization` 的有状态会话 bean，`afterBegin` 会在任何带有\
  \ `AroundInvoke` 注解的方法之前以及 `beforeCompletion()` 回调方法之前发生。\n\n异常处理\n\nEJB 规范概述了两种类型的异常：\n\
  \n*   应用程序异常\n*   系统异常\n\n*应用程序异常*是与客户端应处理的业务逻辑执行相关的异常。例如，如果客户端应用程序传递了无效参数（如错误的信用卡号），则可能会引发应用程序异常。\n\
  \n另一方面，*系统异常*是由系统级故障引起的，例如 Java 命名和目录接口（JNDI）错误或获取数据库连接失败。系统异常必须是 `java.rmi.RemoteException`\
  \ 的子类，或者是非应用程序异常的 `java.lang.RuntimeException` 的子类。\n\n从 EJB 应用程序的角度来看，应用程序异常是通过编写继承自\
  \ `java.lang.Exception` 类的特定于应用程序的异常类来实现的。\n\n\n\n在系统异常的情况下，应用程序会捕获特定的异常，例如由 JNDI\
  \ 故障导致的 `NamingException`，并抛出 `EJBException`。在本章中，示例并未使用任何资源，但在后续章节中会有更多系统异常的示例。\n\
  \n单例会话 Bean\n\n单例会话 Bean 是在 EJB 3.1 中引入的，它是一种*单例会话 Bean* 组件，每个应用程序仅实例化一次。对于一个应用程序，单例会话\
  \ Bean 的实例只能存在一个。一旦实例化，单例会话 Bean 将在应用程序的整个生命周期内存在。单例会话 Bean 在客户端调用之间维护其状态，但在容器关闭或崩溃后无法保存该状态。与无状态和有状态会话\
  \ Bean 类似，单例会话 Bean 由一个 Bean 类以及可选的一个或多个业务接口组成。\n\nBean 类\n\n单例会话 Bean 类是任何带有类级别注解\
  \ `@Singleton` 的标准 Java 类。如果使用部署描述符代替注解，则应将 Bean 类标记为单例会话 Bean。如果同时使用注解和部署描述符（混合模式），则在类中指定任何其他类级别或成员级别注解时，必须指定\
  \ `@Singleton` 注解。\n\n为了说明单例会话 Bean，我们将创建一个 `ShopperCount` 会话 Bean，用于跟踪登录我们购物网站的用户数量。清单\
  \ 2-17 展示了 `ShopperCount` 会话 Bean 的定义。\n\n***清单 2-17.***  ShopperCountBean.java\n\
  \n```\npackage com.apress.ejb.chapter02;\n\nimport javax.ejb.Singleton;\nimport\
  \ javax.ejb.Startup;\n@Singleton (name = \"ShopperCount\")\n@Startup\npublic class\
  \ ShopperCountBean {\n   private int shopperCounter;\n\n// 增加购物者计数器\n   public void\
  \ incrementShopperCount() {\n       shopperCounter++;\n   }\n\n// 返回购物者数量\n   public\
  \ int getShopperCount() {\n       return shopperCounter;\n   }\n}\n```\n\n单例会话 Bean\
  \ 由 EJB 容器自行决定何时实例化。但是，你可以使用 `@Startup` 注解 Bean 类，以指示容器必须在应用程序启动序列期间初始化该单例 Bean。\n\
  \n当应用程序中使用多个单例会话 Bean 时，应用程序可能要求它们按特定顺序初始化。`@DependsOn` 注解声明了单例会话 Bean 的启动依赖关系。清单\
  \ 2-18 展示了依赖于 `ShopperCount` 会话 Bean 的 `LogShopperCount` 会话 Bean 的定义。\n\n***清单 2-18.***  LogShopperCount.java\n\
  \n```\npackage com.apress.ejb.chapter02;\n\nimport javax.ejb.Singleton;\nimport\
  \ javax.ejb.Startup;\nimport javax.ejb.DependsOn;\nimport java.util.logging.Logger;\n\
  \n@Singleton\n@Startup\n@DependsOn(\"ShopperCount\")\npublic class LogShopperCount\
  \ {\n   private final Logger log = Logger.getLogger(\"LogShopperCount.class\");\n\
  \npublic void logShopperCount() {\n       // 记录购物者数量\n   }\n}\n```\n\n与无状态和有状态会话\
  \ Bean 不同，单例会话 Bean 不得实现 `javax.ejb.SessionSynchronization` 接口或使用会话同步注解。\n\n业务接口\n\
  \n单例会话 Bean 的业务接口与无状态和有状态会话 Bean 的接口类似，并且使用 `@Local` 和 `@Remote` 注解以相同的方式进行注解。单例会话\
  \ Bean 支持无接口本地视图，这使得对于本地视图而言，业务接口的声明是可选的。\n\n业务方法\n\n单例会话 Bean 中的业务方法与无状态和有状态会话\
  \ Bean 中的方法类似。我们将通过添加一个重置计数器的业务方法来增强 `ShopperCount` Bean。\n\n清单 2-19 展示了实现业务方法的\
  \ `ShopperCount` Bean。\n\n***清单 2-19.***  ShopperCountBean.java\n\n```\npackage\
  \ com.apress.ejb.chapter02;\n\nimport javax.ejb.Singleton;\nimport javax.ejb.Startup;\n\
  \n@Singleton(name = \"ShopperCount\")\n@Startup\npublic class ShopperCountBean {\n\
     private int shopperCounter = 0;\n\n// 增加购物者计数器\n   public void incrementShopperCount()\
  \ {\n       shopperCounter++;\n   }\n\n// 返回购物者数量\n   public int getShopperCount()\
  \ {\n       return shopperCounter;\n   }\n\n// 重置计数器\n   public void resetCounter()\
  \ {\n       shopperCounter = 0;\n   }\n}\n```\n\n生命周期回调方法\n\n单例会话 Bean 支持构造和销毁的回调事件。以下是映射到上述事件的回调方法：\n\
  \n*   `PostConstruct`：使用 `@PostConstruct` 注解标记\n*   `PreDestroy`：使用 `@PreDestroy`\
  \ 注解标记。\n\n`PostConstruct` 回调发生在 Bean 实例在 EJB 容器中实例化之后。如果 Bean 使用任何依赖注入机制来获取对其环境中资源或其他对象的引用，则\
  \ `PostConstruct` 事件发生在注入执行之后、Bean 类中的第一个业务方法被调用之前。\n\n`PreDestroy` 回调发生在应用程序关闭期间。容器会考虑单例会话\
  \ Bean 之间的 `DependsOn` 关系，并按照与创建顺序相反的顺序移除它们。对于 `ShopperCount` 示例，`LogShopperCount`\
  \ Bean 将在 `ShopperCount` Bean 之前被移除。\n\n清单 2-20 展示了带有 `@PostConstruct` 注解的 `applicationStartup()`\
  \ 方法的代码。该方法在启动时重置 `shopperCounter`。清单 2-20 还展示了带有 `@PreDestroy` 注解的 `applicationShutdown()`\
  \ 方法的代码。该方法在应用程序关闭时打印一条消息。\n\n***清单 2-20.***  ShopperCountBean.java\n\n```\npackage\
  \ com.apress.ejb.chapter02;\n\nimport javax.annotation.PostConstruct;\nimport javax.annotation.PreDestroy;\n\
  import javax.ejb.Singleton;\nimport javax.ejb.Startup;\n\n@Singleton(name = \"ShopperCount\"\
  )\n@Startup\npublic class ShopperCountBean {\n   private int shopperCounter;\n\n\
  // 增加购物者计数器\n   public void incrementShopperCount() {\n       shopperCounter++;\n\
     }\n\n// 返回购物者数量\n   public int getShopperCount() {\n       return shopperCounter;\n\
     }\n\n// 重置计数器\n   public void resetCounter() {\n       shopperCounter = 0;\n\
     }\n\n// 重置计数器\n   @PostConstruct\n   public void applicationStartup() {\n      \
  \ System.out.println(\"来自 applicationStartup 方法。\");\n       resetCounter();\n  \
  \ }\n\n@PreDestroy\n   public void applicationShutdown() {\n      System.out.println(\"\
  来自 applicationShutdown 方法。\");\n   }\n}\n```\n\n与无状态会话 Bean 一样，单例会话 Bean 永远不会被钝化，因此不应使用\
  \ `@PrePassivate` 和 `@PostActivate` 注解来装饰单例会话 Bean 上的方法。\n\n并发管理\n\n单例会话 Bean 每个应用程序仅实例化一次，因此它被设计为支持并发访问。并发访问意味着多个客户端可以同时访问同一个单例会话\
  \ Bean 实例。并发访问的管理对客户端是透明的。客户端只需要一个对单例会话 Bean 的引用，而无需关心其他客户端是否也在访问该单例会话 Bean 的同一个实例。\n\
  \n并发管理通过两种方式进行：\n\n\n\n*   **容器管理并发：** 容器控制并发访问，并通过提供一组固定的选项来精细控制状态同步行为。这是默认的并发管理类型。\n\
  *   **Bean 管理并发：** 容器允许对并发 Bean 实例进行完全访问，用户负责状态同步。\n\n并发类型（容器管理或 Bean 管理）由在单例会话\
  \ Bean 类上指定的 `javax.ejb.ConcurrencyManagement` 注解指定。对于容器管理并发，`@ConcurrencyManagement`\
  \ 的 `type` 属性设置为 `javax.ejb.ConcurrencyManagementType.CONTAINER`；对于 Bean 管理并发，`@ConcurrencyManagement`\
  \ 的 `type` 属性设置为 `javax.ejb.ConcurrencyManagementType.BEAN`。\n\n容器管理并发\n\n对于使用容器管理并发的单例会话\
  \ Bean，容器通过将每个业务方法与共享的 `Read` 锁或独占的 `Write` 锁相关联来管理并发。使用 `@Lock` 注解指定 `Read` 或 `Write`\
  \ 锁。\n\n清单 2-21 通过在 `getShopperCount` 方法上使用 `Read` 锁，在 `incrementShopperCount` 方法上使用\
  \ `Write` 锁，演示了容器管理并发。通过此更改，多个客户端可以同时获取 `shopperCounter` 的值，但在一个客户端访问 `incrementShopperCount`\
  \ 时，所有其他客户端对该方法的访问将被阻塞。\n\n***清单 2-21.***  ShopperCountBean.java\n\n```\npackage\
  \ com.apress.ejb.chapter02;\n\nimport javax.annotation.PostConstruct;\nimport javax.annotation.PreDestroy;\n\
  import javax.ejb.ConcurrencyManagement;\nimport javax.ejb.ConcurrencyManagementType;\n\
  import javax.ejb.Lock;\nimport javax.ejb.LockType;\nimport javax.ejb.Singleton;\n\
  import javax.ejb.Startup;\n\n@Singleton(name = \"ShopperCount\")\n@Startup\n@ConcurrencyManagement(ConcurrencyManagementType.CONTAINER)\n\
  public class ShopperCountBean {\n    private int shopperCounter;\n    // 增加购物者计数器\n\
      @Lock(LockType.WRITE)\n    public void incrementShopperCount() {\n        shopperCounter++;\n\
      }\n\n// 返回购物者数量\n    @Lock(LockType.READ)\n    public int getShopperCount()\
  \ {\n        return shopperCounter;\n    }\n\n// 重置计数器\n    public void resetCounter()\
  \ {\n        shopperCounter = 0;\n    }\n\n// 重置计数器\n    @PostConstruct\n    public\
  \ void applicationStartup() {\n        resetCounter();\n    }\n\n@PreDestroy\n    public\
  \ void applicationShutdown() {\n        System.out.println(\"From applicationShutdown\
  \ method.\");\n    }\n}\n```\n\n对于单例会话 Bean，类级别的 `@Lock` 注解指定所有业务方法将使用指定的锁类型，除非在方法级别显式设置了不同的类型。当单例会话\
  \ Bean 类上没有显式存在 `@Lock` 注解时，默认锁类型 `@Lock(LockType.WRITE)` 将应用于所有业务方法。\n\nBean 管理并发\n\
  \n在 Bean 管理并发的情况下，容器允许对单例会话 Bean 实例进行完全并发访问，Bean 开发人员必须保护 Bean 的内部状态，防止因并发访问导致的同步错误。为此，您可以使用诸如\
  \ `synchronized` 和 `volatile` 之类的同步原语。\n\n错误处理\n\n单例会话 Bean 初始化期间可能会发生错误。这些错误是致命的，因此必须丢弃该单例会话\
  \ Bean 实例。尝试调用初始化失败的单例会话 Bean 实例将导致 `javax.ejb.NoSuchEJBException`。一旦单例会话 Bean 成功实例化，如果从业务方法或回调中抛出异常，它不会被销毁。\n\
  \n定时器服务\n\n*EJB 定时器服务*是一种容器管理服务，允许为基于时间的事件调度回调。定时器通知可以安排在基于日历的时间、特定时间、特定时间之后或特定的重复间隔触发。\n\
  \n将定时器用于应用程序级别的进程。不要将定时器用于实时事件。使用定时器的典型示例包括：\n\n*   费用报告应用程序中的定时器，每晚 9 点打印新提交的费用。\n\
  *   错误跟踪应用程序中的定时器，每天早上 6 点向团队成员发送未解决错误的列表。\n*   人力资源应用程序中的定时器，每年 1 月 1 日向所有员工发送公共假期列表。\n\
  \n![image](img/sq.jpg) **注意**   不能为有状态会话 Bean 创建定时器。\n\n在 EJB 3.1 中，通过引入 `@Schedule`\
  \ 和 `@Schedules` 注解简化了定时器的创建，这些注解会根据方法上指定的元数据自动创建定时器。在清单 2-22 中，我们通过添加一个每两小时记录一次购物者数量的重复定时器来增强\
  \ `LogShopperCount`。\n\n***清单 2-22.***  LogShopperCount.java\n\n```\npackage com.apress.ejb.chapter02;\n\
  \nimport javax.ejb.DependsOn;\nimport javax.ejb.Schedule;\nimport javax.ejb.Singleton;\n\
  import javax.ejb.Startup;\n\n@Singleton\n@Startup\n@DependsOn(\"ShopperCountBean\"\
  )\npublic class LogShopperCount {\n\n// 每 2 小时记录购物者数量\n       @Schedule(hour=\"\
  */2\")\n       public void logShopperCount() {\n       // 记录购物者数量\n       }\n}\n\
  ```\n\n在带有 `@Schedule` 注解的方法中传递 `Timer` 对象，以获取有关定时器的信息。清单 2-23 演示了如何使用 `Timer` 对象获取有关刚过期的定时器的信息。\n\
  \n***清单 2-23.***  LogShopperCount.java\n\n```\npackage com.apress.ejb.chapter02;\n\
  \nimport javax.ejb.DependsOn;\nimport javax.ejb.Schedule;\nimport javax.ejb.Singleton;\n\
  import javax.ejb.Startup;\nimport javax.ejb.Timer;\n\n@Singleton\n@Startup\n@DependsOn(\"\
  ShopperCount\")\npublic class LogShopperCount {\n\n// 每 2 小时记录购物者数量\n@Schedule(hour=\"\
  */2\")\npublic void logShopperCount(Timer timer) {\n// 记录购物者数量\nString timerInfo\
  \ = (String) timer.getInfo();\nSystem.out.println(timerInfo);\n}\n}\n```\n\n基于日历的时间表达式\n\
  \n定时器服务受 UNIX `cron` 实用程序的启发。表 2-1 列出了基于日历的时间表达式的各种属性。\n\n表 2-1. 基于日历的时间表达式的属性\n\
  \n![image](img/Table2-1.jpg)\n\n![image](img/sq.jpg) **注意**   对于 `dayOfWeek`，0 和\
  \ 7 都代表星期日，负数（−7 到 −1）表示该月的倒数第 n 天。所有字符串常量（“Sun”、“Jan”、“Last”、“1st”）都不区分大小写。仅秒、分钟和小时支持增量。列表中的重复值将被忽略。\n\
  \n基于日历的时间表达式示例\n\n让我们看一些演示使用基于日历的时间表达式的示例。\n\n*   “每天每小时的每分钟的每一秒”\n\n*   `@Schedule(second=\"\
  *\", minute=\"*\", hour=\"*\")`\n\n*   “每小时内的每十五分钟”\n\n*   `@Schedule(minute=\"\
  */15\", hour=\"*\")`\n*   `@Schedule(minute=\"0, 15, 30, 45\", hour=\"*\")`\n\n\
  *   “每个星期五午夜”\n\n*   `@Schedule(dayOfWeek=\"Fri\")`\n\n*   “周末每六小时”\n\n*   `@Schedule(hour=\"\
  */6\", dayOfWeek=\"Sat, Sun\")`\n\n*   “每个工作日上午 7:30 美国太平洋时间”\n\n*   `@Schedule(minute=\"\
  30\", hour=\"7\", dayOfWeek=\"Mon-Fri\", timezone=\"America/Los_Angeles\")`\n\n\
  *   “1 月 10 日和 9 月 10 日上午 6 点”\n\n*   `@Schedule(month=\"Jan, Sep\", dayOfMonth=\"\
  10\", hour=\"6\")`\n\n*   “12 月最后一个星期五下午 6 点”\n\n*   `@Schedule(month=\"Dec\", dayOfMonth=\"\
  Last Fri\", hour=\"18\")`\n\n*   “每个月的倒数第二天（最后一天的前一天）”\n\n\n\n*   `@Schedule(dayOfMonth=\"\
  -1\")`\n\n*   “仅限 2013 年的每一天”\n\n*   `@Schedule(year=\"2013\")`\n\n**定时器持久性**\n\n\
  定时器是持久化的。定时器服务通过将定时器存储在数据库中来持久化它。定时器服务使用的数据库可以通过将定时器服务的定时器数据源设置更改为有效的 JDBC 资源来更改。持久化有助于定时器在应用程序关闭、容器崩溃和容器关闭时存活。\n\
  \n可以通过将 `@Schedule` 注解的 `persistent` 属性设置为 `false` 来按定时器禁用持久化。非持久化定时器的生命周期与创建它的\
  \ JVM 相关联。如果应用程序关闭、容器崩溃或创建定时器的 JVM 崩溃/关闭，则非持久化定时器被视为已取消。\n\n**会话 Bean 的客户端视图**\n\
  \n会话 Bean 可以被视为客户端程序或应用程序的逻辑扩展，该应用程序的大部分逻辑和数据处理都在其中发生。客户端应用程序通常通过会话 Bean 的客户端视图接口访问会话对象。这些是前面章节中讨论的业务接口。\n\
  \n访问会话 Bean 的客户端应用程序可以是以下三种类型之一：\n\n*   **远程**：远程客户端在与它们访问的会话 Bean 不同的 JVM 中运行，如图\
  \ 2-4 所示。远程客户端通过 Bean 的远程业务接口访问会话 Bean。远程客户端可以是另一个 EJB、一个 Java 客户端程序或一个 Java Servlet。远程客户端具有位置独立性，这意味着它们可以使用与在同一\
  \ JVM 中运行的客户端相同的 API。\n*   **本地**：本地客户端在同一 JVM 中运行，如图 2-3 所示，并通过本地业务接口访问会话 Bean。本地客户端可以是另一个\
  \ EJB，或使用 Java Servlet、JavaServer Pages (JSP) 或 JavaServer Faces (JSF) 的 Web 应用程序。本地客户端是位置相关的。远程和本地客户端的比较见表\
  \ 2-2。\n\n表 2-2. 选择本地与远程客户端的考量因素\n\n| 远程 | 本地 |\n    | --- | --- |\n    | Bean 与客户端之间的松耦合\
  \ | 对组件的轻量级访问 |\n    | 位置独立性 | 位置依赖性 |\n    | 昂贵的远程调用 | 必须与 Bean 位于同一位置 |\n    |\
  \ 对象必须序列化 | 不需要 |\n    | 对象按值传递 | 对象按引用传递 |\n\n*   **Web 服务**：您可以将无状态会话 Bean 发布为\
  \ Web 服务，供 Web 服务客户端调用。我们将在第 6 章中讨论 Web 服务和客户端。\n\n在某些情况下，会话 Bean 需要同时具有本地和远程业务接口，以支持不同类型的客户端应用程序。客户端可以通过依赖注入或\
  \ JNDI 查找来获取会话 Bean 的业务接口。在调用会话 Bean 中的方法之前，客户端需要通过 JNDI 获取 Bean 的存根对象。一旦客户端拥有存根对象的句柄，它就可以调用会话\
  \ Bean 中的业务方法。对于无状态会话 Bean，可以在每次调用时获取一个新的存根。对于有状态会话 Bean，需要在客户端缓存存根，以便容器知道在后续调用中返回哪个\
  \ Bean 实例。使用依赖注入，我们可以通过以下代码获取 `SearchFacade` 会话 Bean 的业务接口：\n\n```\n@EJB SearchFacade\
  \ searchFacade;\n```\n\n如果访问会话 Bean 的客户端是远程的，则在获取具有正确环境属性的上下文接口后，客户端可以使用 JNDI 查找。本地客户端也可以使用\
  \ JNDI 查找，但依赖注入会产生更简洁的代码。清单 2-24 展示了 `SearchFacadeTest` 客户端程序的代码，该代码查找 `SearchFacade`\
  \ Bean，调用 `wineSearch()` 业务方法，并打印返回的葡萄酒列表。`SearchFacadeClient` 还查找 `ShopperCount`\
  \ 单例 Bean，并调用 `getShopperCount()` 业务方法来打印已登录的购物者数量。\n\n![image](img/sq.jpg) **注意**  \
  \ 如果远程客户端是 Java 应用程序或命令行程序，则可以使用应用程序客户端容器来调用会话 Bean。应用程序客户端容器支持远程客户端的依赖注入。我们将在第\
  \ 12 章中与其他类型的客户端应用程序一起讨论应用程序客户端容器。\n\n***清单 2-24.***  SearchFacadeClient.java\n\n\
  ```\npackage com.apress.ejb.chapter02;\nimport java.io.IOException;\nimport java.io.PrintWriter;\n\
