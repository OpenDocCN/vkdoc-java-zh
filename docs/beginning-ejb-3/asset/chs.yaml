  此属性文件中的注释非常清晰。你只需更改模拟用户数（`grinder.threads`）和测试脚本运行的周期数（`grinder.runs`）。请确保 Grinder
  控制台将要运行的机器名称或 IP 地址正确无误。除此之外，你实际上无需更改此属性文件中的任何其他内容。


  **测试脚本**


  在清单 9-2 中，我们展示了在使用连接表继承方案录制会话时，由 HTTP 代理生成的 Jython 程序的核心部分。以粗体显示的思考时间语句通常表示录制测试脚本时从一个请求到下一个请求所花费的时间（以毫秒为单位）。如前所述，我们将原始值替换为零，但你也可以直接删除该行（参见清单
  9-2）。


