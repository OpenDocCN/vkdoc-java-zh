  \n图 6-11.  SOAP 请求和响应消息\n\n到目前为止，我们已经了解了如何使用测试工具测试已部署的 Web 服务。在下一节中，我们将讨论 Web 服务客户端，以及如何开发和运行能够调用\
  \ Web 服务的程序。在我们的案例中，我们将针对已部署的信用服务进行测试。\n\nWeb 服务客户端视图\n\n发布为 Web 服务的无状态会话 Bean 可以通过部署期间生成的\
  \ WSDL 文档所描述的客户端视图进行访问（如清单 6-7 所示）。由于无状态会话 Bean 是使用 WSDL 等标准发布为 Web 服务的，因此任何能够发送和接收\
  \ SOAP 消息（无论技术或语言）的客户端应用程序都可以调用它。客户端应用程序可以使用 .NET 或 Java EE 编写，也可以使用 PHP、Python\
  \ 或 Ruby 等脚本语言编写。从客户端的角度来看，它看到的契约是一个 WSDL 文档。为了访问 Web 服务，应该从 WSDL 文档生成编程接口。\n\n\
  Web 服务是位置无关的，并且可以远程访问。如果调用 Web 服务的客户端应用程序是 Java 客户端或其他 Java EE 组件（例如 EJB），则它使用 JAX-WS\
  \ 客户端 API 或注解通过 SOAP 和 HTTP 调用 Web 服务。\n\n开发访问 Web 服务的 Java 客户端\n\n为了通过 WSDL 服务契约访问\
  \ Web 服务，客户端程序需要从 WSDL 文档生成的编程接口（通常称为 *存根* 或 *代理*）。一旦从 WSDL 文档生成了存根，我们就可以使用 JAX-WS\
  \ 注解来获取对 Web 服务的引用并调用它。\n\n生成 Web 服务代理类\n\n我们将首先使用 NetBeans IDE 提供的 `Web Service\
  \ Client` 向导为 `CreditService` WSDL 文档生成存根。从 `Chapter06-WebServiceSamples-ejb` 节点的上下文菜单中调用\
  \ `Web Service Client` 向导，如图 6-12 所示。\n\n![9781430246923_Fig06-12.jpg](img/9781430246923_Fig06-12.jpg)\n\
  \n图 6-12.  调用 Web Service Client 向导\n\n在 `Web Service Client` 向导中，选择 `WSDL URL`\
  \ 单选按钮，并输入您在前面的章节中已加入书签的 `WSDL File` URL（参见图 6-10）。我们还需要指定将生成客户端 Java 工件的包。我们将在\
  \ `com.apress.ejb.chapter06.services.client` 包中生成这些工件。输入这些详细信息，如图 6-13 所示，然后完成向导。\n\
  \n![9781430246923_Fig06-13.jpg](img/9781430246923_Fig06-13.jpg)\n\n图 6-13.  创建 Web\
  \ Service Client\n\n一旦存根生成并编译完成，我们就可以在 `Generated Sources (jax-ws)` 节点下看到工件。\n\n\
  ![9781430246923_Fig06-14.jpg](img/9781430246923_Fig06-14.jpg)\n\n图 6-14.  验证生成的存根源\n\
  \n![image](img/sq.jpg) **注意**   GlassFish 还提供了命令行工具 `wsimport.bat`，给定一个有效的 WSDL\
  \ 文档，它可以生成 Web 服务存根。如果您将 Web 服务部署到其他兼容 Java EE 的服务器，这些服务器也可能提供一些工具或实用程序来生成 Web 服务的存根。\n\
  \n一旦存根生成并编译完成，下一步就是创建一个将消费 `CreditService` 的客户端。\n\n\n\nJAX-WS 规范提供了 `@WebServiceRef`\
  \ 注解，可用于声明对 Web 服务的引用，在本例中该服务为 `CreditService`。\n\n`@WebServiceRef` 注解可以接受表 6-5\
  \ 中描述的参数。\n\n表 6-5. @WebServiceRef 注解\n\n| 参数 | 描述 | 附加信息 |\n| --- | --- | --- |\n\
  | `name` | 标识 Web 服务引用的名称 | 使用该资源的应用程序组件本地的名称 |\n| `wsdlLocation` | 指向 WSDL 文档位置的\
  \ URL |  |\n| `type` | 资源类型 |  |\n| `value` | 服务类型 |  |\n| `mappedName` | 用于将资源映射到特定供应商容器的资源物理名称\
  \ |  |\n\n开发 Web 服务客户端程序\n\n`@WebServiceRef` 注解要么提供对容器生成的 SEI 的引用，要么提供对应用程序开发者提供的\
  \ SEI 的引用。清单 6-13 展示了一个将作为 Web 服务客户端的 Servlet 类。在这个名为 `CreditServiceClient` 的 Servlet\
  \ 类中，我们使用依赖注入来注入之前作为 Web 服务部署的信用服务。`@WebServiceRef` 注解用于注入已生成为代理类的 `CreditService`。一旦我们注入了可用的资源，我们就使用该代理类通过\
  \ `getCreditCheckEndpointBeanPort()` 方法获取 Web 服务端口。成功获取端口后，我们可以调用该端口上可用的操作。在本例中，我们只定义了一个操作\
  \ `creditCheck`。你可以看到，该操作正在使用信用卡号 12345678 进行调用。\n\n***清单 6-13.***  CreditServiceClient.java\n\
  \n```\npackage com.apress.ejb.chapter06.client;\nimport com.apress.ejb.chapter06.services.client.CreditCheckEndpointBean;\n\
  import com.apress.ejb.chapter06.services.client.CreditService;\nimport java.io.IOException;\n\
  import java.io.PrintWriter;\nimport javax.servlet.ServletException;\nimport javax.servlet.annotation.WebServlet;\n\
  import javax.servlet.http.HttpServlet;\nimport javax.servlet.http.HttpServletRequest;\n\
  import javax.servlet.http.HttpServletResponse;\nimport javax.xml.ws.WebServiceRef;\n\
  \n@WebServlet(name = \"CreditServiceClient\", urlPatterns = {\"/CreditServiceClient\"\
  })\npublic class CreditServiceClient extends HttpServlet {\n      @WebServiceRef(wsdlLocation\
  \ = \"http://localhost:64082/CreditService/CreditCheckEndpointBean?WSDL\")\n      CreditService\
  \ service;\n    protected void processRequest(HttpServletRequest request, HttpServletResponse\
  \ response)\n            throws ServletException, IOException {\n        response.setContentType(\"\
  text/html;charset=UTF-8\");\n        PrintWriter out = response.getWriter();\n        try\
  \ {\n            out.println(\"<html>\");\n            out.println(\"<head>\");\n\
              out.println(\"<title>Servlet CreditServiceClient</title>\");\n            out.println(\"\
  </head>\");\n            out.println(\"<body>\");\n            CreditCheckEndpointBean\
  \ creditService = service.getCreditCheckEndpointBeanPort();\n            out.println(\"\
  <h1>Credit Check returned: \" + creditService.creditCheck(\"12345678\") + \"</h1>\"\
  );\n            out.println(\"</body>\");\n            out.println(\"</html>\");\n\
          } finally {\n            out.close();\n        }\n    }\n    @Override\n\
      protected void doGet(HttpServletRequest request, HttpServletResponse response)\n\
              throws ServletException, IOException {\n        processRequest(request,\
  \ response);\n    }\n\n@Override\n    protected void doPost(HttpServletRequest request,\
  \ HttpServletResponse response)\n            throws ServletException, IOException\
  \ {\n        processRequest(request, response);\n    }\n\n@Override\n    public\
  \ String getServletInfo() {\n        return \"Short description\";\n    }\n}\n```\n\
