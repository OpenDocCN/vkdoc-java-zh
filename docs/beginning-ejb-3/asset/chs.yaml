  \ 12 章中详细讨论。\n\n结论\n\n本章通过一组特定示例介绍了 EJB 会话 Bean 的详细信息。我们研究了使用标准 Java 语言构件（如 Java\
  \ 类和接口）开发会话 Bean 的简化 EJB 模型。我们探讨了会话 Bean 以及一些典型的用例，在这些用例中，会话 Bean 可用于开发应用程序。我们讨论了三种不同类型的会话\
  \ Bean（无状态、有状态和单例），包括它们之间的区别以及每种类型的一些通用用例。我们介绍了会话 Bean 在两层和三层应用程序架构中的使用。我们讨论了依赖注入在无状态、有状态和单例\
  \ Bean 中的使用。我们考虑了实现对应用程序流程进行细粒度控制的方法，包括在无状态和有状态 Bean 中使用生命周期回调方法和拦截器，以及使用诸如 `@PostConstruct`\
  \ 和 `@PreDestroy` 之类的注解。我们研究了编译/构建、打包和将会话 Bean 部署到 GlassFish 应用服务器所需的条件。最后，我们研究了使用\
  \ GlassFish 应用程序客户端容器运行示例客户端程序。\n\n在接下来的两章中，我们将深入探讨 Java 持久化 API (JPA)，以便您学习如何将\
  \ POJO 映射到数据库表并执行查询和 CRUD 操作。\n\n第 3 章\n\n![image](img/frontdot.jpg)\n\n实体与 Java\
  \ 持久化 API\n\n既然您已经了解了 EJB 如何通过会话 Bean 提供业务服务，我们将把注意力转向一种不同类型的组件，称为*实体*，它们是表示数据库中表的类，其实例表示这些表中的行。会话\
  \ Bean 为客户端应用程序提供服务，而实体则代表业务数据。一种常见的模式是，会话 Bean 提供一个便捷的接口，用于在事务、安全、访问控制和其他企业服务的上下文中操作实体。执行创建、检索、更新和删除操作的方法（也称为\
  \ CRUD 方法）在会话 Bean 上暴露给客户端，以提供一种“外观”模式，我们将在本书中一直使用这种模式。\n\nJava 持久化 API (JPA) 首次引入于\
  \ Java EE 5，它标志着与之前定义为 EJB 规范一部分的“实体 Bean”持久化模型的背离。JPA 被广泛认为是对早期 EJB 版本中定义的实体 Bean\
  \ 模型的巨大改进。JPA 毫不掩饰地借鉴了专有和开源模型，如 TopLink、Hibernate、JDO 和 Spring，这些模型作为早期 EJB 修订版中定义的通常重量级且繁琐的实体\
  \ Bean 模型的流行替代方案而获得了发展势头。因此，与会话 Bean 一样，实体是简单的 POJO（普通旧式 Java 对象），除了表明它们是实体的一小部分元数据（捕获在\
  \ Java 注解或持久化 XML 描述符中）之外，它们是对底层数据库表非常清晰的表示。虽然 JPA 在范围和能力上扩展了持久化模型，但实体本身在很大程度上与其支持的持久化框架解耦，允许它们在\
  \ Java EE 容器内外既作为普通 POJO 使用，也作为由持久化框架管理的对象使用。\n\nJPA 1.0 在 Java EE 5 中引入，JPA 2.0\
  \ 伴随 Java EE 6 出现，而 JPA 2.1 与 Java EE 7 保持一致。自 JPA 1.0 以来引入的大多数功能都允许对 JPA 进行高级配置，这超出了本书的范围。然而，在下一章中，我们将描述一些我们认为对于介绍其最新修订版中的\
  \ JPA 至关重要的功能。\n\n本着本书的精神，关于持久化的两章将涵盖最常用的功能，通过使用我们的在线葡萄酒商店应用程序的实践示例来描述它们的用法。本章将引导您开始编写实体类并使用关键的持久化功能。下一章将探讨更高级的持久化功能。通过这些示例，这些章节解释了持久化编程模型的主要领域。然而，它们无意替代内容广泛的\
  \ JPA 规范。当您准备好探索超出本讨论范围的细节时，我们鼓励您参考 JPA 规范。\n\n表 3-1 总结了本章将要介绍的内容。\n\n表 3-1.   本章关键主题\n\
  \n\n\n| 概念 | 描述 |\n| --- | --- |\n| 实体示例 | 我们从简单的 JavaBean 开始，逐步添加将其转换为简单实体所需的注解，然后再进一步扩展。\
  \ |\n| 主要实体注解 | 进一步细化实体的要求：实体类必须有一个无参的 `public` 或 `protected` 构造方法，并且不能是 `final`\
  \ 的。实体通过其 JavaBeans 属性访问器或实例变量定义其持久化结构，也可以包含自定义方法。 |\n| `EntityManager` | `EntityManager`\
  \ 对象提供持久化服务，包括事务管理以及查询、合并、删除、查找和刷新操作。它是理解 JPA 持久化框架的核心。 |\n| 实体生命周期 | 实体实例作为内存中的\
  \ Java 对象，在其生命周期中可能会经历多种正式状态。理解这些不同状态有助于你了解实体何时与后端数据库保持一致或不一致状态，以及如何在事务上下文中协调这些差异。\
  \ |\n| 对象/关系 (O/R) 映射 | JPA 通过注解和/或 XML 描述符定义声明式标记，将实体字段映射到关系数据库管理系统 (RDBMS) 中的表列。\
  \ |\n| 实体关系 | 实体类可以持有对自身或其他实体的一元引用和集合引用。请注意，在 JPA 中，关系字段不由容器进行双向维护。 |\n| Java 持久化查询语言\
  \ (JPQL) | JPA 定义了一种类似 SQL 的语言——JPQL——它支持查询以及批量更新和删除操作。查询可以静态定义为命名查询，也可以动态定义。查询可以接受绑定参数并返回\
  \ Java 对象，包括实体实例或 Map。 |\n| 持久化 vs. 适配 | 在设计实体类时，一个实际考虑因素是：实体类是主要的设计对象，还是数据库模式是事实来源。在前一种情况下，数据库主要用于持久化实体数据；而在后一种情况下，实体类用于将表适配到\
  \ Java 中。 |\n| 示例应用程序 | 最后，我们给出了一个示例应用程序，它由三个 JPA 实体、一个 EJB 和一个 HTTP Servlet 组成，通过一个简单的工作模型演示了本章中的所有概念。\
  \ |\n\n实体示例\n\n让我们看看如何将一个简单的 JavaBean 转换为实体，并逐步对其进行定制以增加功能和灵活性。\n\n一个简单的 JavaBean：Customer.java\n\
  \n我们从简单的 JavaBean 开始，如清单 3-1 所示。该类具有 JavaBeans 标准定义的属性。JavaBean 的每个属性通过一对属性访问器方法向\
  \ Bean 外部世界呈现。对于每个属性，getter 方法检索其数据，setter 方法为其赋值。在内部，这些属性访问器方法读取和写入 JavaBean 类上的私有专用实例变量。\n\
  \n***清单 3-1.***  一个简单的 JavaBean\n\n```\npublic class Customer {\n  private long\
  \ customerId;\n  private String name;\n\npublic long getCustomerId() { return customerId;\
  \ }\n  public void setCustomerId(long customerId) { this.customerId = customerId;\
  \ }\n  public String getName() { return name; }\n  public void setName(String name)\
  \ { this.name = name; }\n}\n```\n\n一个简单的实体：Customer.java\n\n清单 3-2 展示了我们的简单 JavaBean\
  \ 被转换为实体后的样子。\n\n***清单 3-2.***  一个简单的实体\n\n```\n@Entity\npublic class Customer implements\
  \ Serializable {\n  @Id\n  private long customerId;\n  private String name;\n\n\
  public long getCustomerId() { return customerId; }\n  public void setCustomerId(long\
  \ customerId) { this.customerId = customerId; }\n  public String getName() { return\
  \ name; }\n  public void setName(String name) { this.name = name; }\n}\n```\n\n\
  唯一需要做的更改是添加 `@Entity` 和 `@Id` 注解。`@Id` 注解将 `customerId` 标识为实体的主键，这是表达其唯一标识所必需的。这是将该类转换为实体所需的最少元数据。我们还添加了\
  \ `Serializable` 接口，因为这是一个确保与远程客户端兼容的良好实践。\n\n@Entity 注解\n\n`@Entity` 注解是必需的，用于在实体部署时将其标识为实体。当实体部署在持久化归档文件（JAR\
  \ 文件）中时，它们可能伴随有非实体类。此注解（或其等效声明在 `orm.xml` 文件中）告诉容器查找该类上的进一步注解，并处理其 O/R 映射，允许其参与查询和与其他实体的持久化关系，并在持久化提供程序稍后实例化它们时进行字节编织或其他处理。所有未标记为实体的类在部署期间都会被持久化提供程序忽略。\n\
  \n@Id 注解\n\n`@Id` 注解指示哪个或哪些字段（可能有多个）是实体的主键或标识符。标识符字段中的值在实体类型 `Customer` 的所有实体实例中必须是唯一的，以便唯一标识此实体。如果主键跨越表中的多个列，则需要复合主键，并且\
  \ `@Id` 字段可以被一个标注了 `@EmbeddedId` 的单个字段替换。我们将在本章后面讨论如何指定复合键。\n\n与 EJB 2.x 的比较\n\n\
  JPA 的基本编码结构是实体类。在 EJB 2.x 及更早版本中，实体 Bean 作为主要的持久化对象，由 Bean 类以及本地和/或远程组件和 Home 接口组成。从\
  \ JPA 开始，实体 Bean 的大部分外在特征已被剥离，或通过大量使用默认值和注解而简化。剩下的只是实体 Bean 类，现在称为*实体类*；或者更简单地称为*实体*。虽然在\
  \ XML 描述符中指定持久化元数据同样有效，但为简洁起见，本章中的所有示例都使用 Java 注解。与 EJB 3 领域一样，每个由注解指定的声明式构造在持久化单元（共置实体的集合）的\
  \ XML 描述符中都有对应的表示形式，因此也可以在 XML 中等效指定。使用注解还是 XML 完全是个人的选择。\n\n默认配置\n\n前面的两个注解是显式指定的。鉴于\
  \ EJB 3 利用默认配置的简化开发模型，你发现此示例中的许多其他元数据都是默认隐含的，这并不会让你感到惊讶。在探索这些默认设置之前，值得思考一下为什么选择显式指定\
  \ `@Entity` 和 `@Id` 注解，而不是隐式推断。\n\n`@Entity` 注解本可以是每个通过持久化归档文件部署的类的默认设置，并且可以使用假设的\
  \ `@NotEntity` 注解来指定非实体类。然而，遵循会话 Bean 和消息驱动 Bean 设定的模式，选择了显式选择加入的模式。\n\n\n类似地，所有字段本都可以被假定为主键的一部分，但在实践中，一个实体的属性中通常只有一小部分（通常只有一个）构成其主键。规范设计者认为，在这种情况下，采用显式在主键字段上指定\
  \ `@Id` 的选择加入模式更有意义，这意味着并非所有列都是主键的一部分。这种决策体现了“默认配置”的方法，即在更常见的情况下不需要注解，仅在需要覆盖时才使用。\n\
  \n下一节将探讨这个 `Customer` 实体默认获得的一些行为，并展示如何覆盖这些默认行为。\n\n一个暴露默认值的实体：Customer.java\n\n\
  清单 3-3 展示了同一个实体及其部分默认值。\n\n***清单 3-3.***  一个显示默认值的实体\n\n```\n@Entity(name=\"Customer\"\
  )\n@Table(name=\" CUSTOMER\")\npublic class Customer implements Serializable {\n\
  \  @Id\n  @Column(name=\"CUSTOMERID\", table=\"CUSTOMER\", unique=true,\n      \
  \    nullable=false, insertable=true, updatable=true)\n  private long customerId;\n\
  \n@Basic(fetch=FetchType.EAGER)\n  @Column(name=\"NAME\", table=\"CUSTOMER\")\n\
  \  private String name;\n\n// . . .\n}\n```\n\n每个实体都有一个名称，除非另有指定，否则该名称默认为非限定类名，在本例中为\
  \ `LiCustomer`。此名称用于在查询语句（Java 持久化查询语言，简称 JPQL，将在第 4 章中介绍）中引用该实体，并且通常在非限定类名不便于使用或属于\
  \ JPQL 中的保留名称时进行指定。\n\n@Table 注解\n\n一个实体实例通常代表表中的一行，并通过实体上的相应属性暴露该行中的每个列值。因此，实体必须映射到数据库中的一张表，该表使用\
  \ `@Table` 注解指定。其名称默认为实体名称。由于并非所有数据库都支持混合大小写的表名，因此这会被转换为名为 `CUSTOMER` 的表。\n\n@Column\
  \ 注解\n\n类似地，实体上声明的每个字段默认映射到同名的列，因此 `customerId` 和 `name` 字段映射到 `CUSTOMER` 表中的 `CUSTOMERID`\
  \ 和 `NAME` 列。`@Column` 注解也可用于覆盖默认的列类型信息，以及列级约束，例如用于指示该列是否可选、是否可插入和/或是否可更新的约束。通常，只有在部署实体时依赖容器来创建表的情况下，才需要指定这种详细程度。\n\
  \n@Basic 注解\n\n属于简单 Java 类型（例如 `String` 或 `int`，如 `customerId` 和 `name` 字段）的实体字段，由\
  \ JPA 自动配置为使用 *@Basic* 注解。简单类型的数组，以及任何其他实现了 `Serializable` 接口的类型，也可以标记为 `@Basic`。\n\
  \n持久化框架提供列数据类型到某些 Java 类型的自动转换，并且 JPA 持久化提供程序在部署期间为实体类生成表时，会尝试定义合适的默认列类型。大多数数值、字符串和日期类型都会被自动转换。\n\
  \n表 3-2 列出了可以注解为 `@Basic` 并自动映射的 Java 类型列表。\n\n表 3-2.   适用于简单映射的字段/属性类型\n\n| Java\
  \ 类型 |\n| --- |\n| Java 原始类型（`int`、`long`、`char` 等） |\n| 原始类型包装类（`Integer`、`Long`、`Char`\
  \ 等） |\n| Java 可序列化类型 |\n| 用户定义的可序列化类型 |\n| 枚举 |\n| `java.lang.String` |\n| `java.math.BigInteger`\
  \ |\n| `java.math.BigDecimal` |\n| `java.util.Date` |\n| `java.util.Calendar` |\n\
  | `java.sql.Date` |\n| `java.sql.Time` |\n| `java.sql.Timestamp` |\n| `byte[]` |\n\
  | `Byte[]` |\n| `char[]` |\n| `Character[]` |\n\n其他字段类型\n\n还有许多其他类型说明符可以应用于不同类型的列。例如，一个实体也可能持有对其他实体的引用，这些引用也通过实体上的属性来表示。我们将在本章后面部分介绍如何指定这些关系属性的一些示例。\n\
  \n一个实体可能拥有除属性访问方法之外的其他方法，但通常这些方法仅限于用于管理集合关系属性的添加和删除操作的辅助方法。\n\n编码要求\n\n除了 `@Entity`\
  \ 注解和主键说明符之外，实体的最低编码要求是：它必须有一个 `public` 或 `protected` 的默认（无参数）构造函数，并且该类不能是 final\
  \ 的。在这个 `Customer` 示例中，隐含了一个默认构造函数，因为在一个公共类上，如果没有定义任何非默认构造函数，Java 会假定存在一个默认构造函数。实体上也可以指定非默认构造函数，它们通常用于使用实体的必需属性来初始化实体。\n\
  \njava.io.Serializable 接口\n\n那些将按值传递的实体（例如，通过远程会话 Bean 传递给 EJB 容器外部的 Java SE 客户端时），必须实现\
  \ `java.io.Serializable` 标记（无方法）接口。实现此接口向编译器表明，它必须强制实体类上的所有字段都是可序列化的，以便任何实例都可以被序列化为字节流，并通过\
  \ HTTP 使用远程方法调用（RMI）进行传递。\n\n在实例变量上放置注解 vs. 在 JavaBean 属性访问器上放置注解\n\n在定义实体类时，您可以选择将成员级别的注解放在实体实例变量上，或者放在这些实例变量对应的\
  \ JavaBean 属性访问器上。与选择使用注解还是 XML 来指定元数据一样，这在很大程度上是个人偏好问题。\n\n![image](img/sq.jpg)\
  \ **注意**   在 JPA 2.0 中，一项限制被放宽，现在允许开发者在实例变量和属性 getter 方法上都进行注解。以前，继承层次结构中的所有实体必须遵循单一的方法。\n\
  \n无论成员级别的注解指定在何处，实体的实例变量都不能是 public 的，并且该实体的客户端（包括相关实体）必须始终通过访问器方法来访问实体的属性。由实体提供者决定哪些属性访问器设为\
  \ public（暴露给客户端），哪些设为 protected（仅对持久化提供者可用）。当在实例变量上进行注解时，如果需要，实体可以不必定义任何属性访问器方法。\n\
  \n根据策略，只有持久化框架和类方法本身才允许直接访问这些字段。对于两种访问类型，客户端都必须通过实体类上的公共访问器或其他方法来访问字段数据。\n\n选择一种方法而非另一种方法会产生几个实质性的后果。这些将在以下章节中讨论。\n\
  \n实体数据访问\n\n当注解指定在实体的实例变量上时，持久化管理器在向实体读写持久化属性时，会直接访问实例变量。当注解指定在属性访问器上而非实例变量上时，持久化管理器会通过这些属性访问器来读写属性数据。\n\
  \n\n\n直接注解实体的实例变量可以避免方法调用的开销，并提供轻微的性能优化，因为持久化管理器直接与字段交互。而注解属性访问器则为实体开发者提供了一种简单的方式，使其能够在所有读写属性数据的尝试中拦截并执行自定义逻辑。\n\
  \n后一种方式为实体开发者提供了按需延迟派生持久属性值的机会（如果需要的话）。然而，请注意，在实体状态转换期间，属性访问器方法上的任何验证或副作用代码都会被调用。正如你将在下一章中看到的，如果实体开发者希望在首次加载实体的持久状态时，或在将更改保存到持久存储之前，初始化临时数据或优化持久数据，那么最好使用实体生命周期回调方法来执行这些步骤。结合使用字段级注解和实体生命周期回调的好处在于，setter\
  \ 方法中的验证和其他代码仅在客户端调用 setter 时才会执行，而不会在框架从持久存储实例化实体时执行。\n\n另一个考虑因素是实体在参与查询时的行为。这是一个类似的问题，因为查询语句可能同时检索和更新实体上的字段数据。因此，了解使用属性访问器可能产生的任何副作用非常重要。\n\
  \n**属性名称**\n\n选择注解实例变量还是属性访问器的第二个实质性影响，发生在属性访问器表达的默认字段名称与实例变量名称不同时。当注解属性访问器时，逻辑属性名称是根据\
  \ JavaBean 属性命名约定从 getter 方法派生出来的；而如果注解的是实例变量，则逻辑属性名称就是实例变量的名称。\n\n**示例：注解实例变量**\n\
  \n清单 3-4 中的代码片段演示了实例变量注解，并展示了验证和副作用代码。在这个示例中（也可在本章的源代码区域找到），实体提供者缩小了客户端接口，仅暴露`get`/`setZipCode()`方法，但向持久化提供者指定了`zipCodeInternal`和`zipCode`两个属性。将注解放在实例变量上，可以在实体的客户端\
  \ API 和其持久化接口之间实现清晰的分离。\n\n***清单 3-4.***  一个使用实例变量注解的实体\n\n```\n@Entity\npublic\
  \ class Address implements Serializable {\n  @Id\n  private long addressId;\n  @Column(name\
  \ = \"ZIP\")\n  private int zipCodeInternal;\n  @Transient\n  private String zipCode;\n\
  \npublic long getAddressId() { return addressId; }\n  public void setAddressId(long\
  \ addressId) { this.addressId = addressId; }\n\npublic String getZipCode() {\n    if\
  \ (zipCode == null && zipCodeInternal > 0) {\n      zipCode = convertToStr(zipCodeInternal);\n\
      }\n    return zipCode;\n  }\n\npublic void setZipCode(String zipCode) throws\
  \ IllegalArgumentException {\n    //  验证 zipcode 字符串，确保它能干净地缩减为 5 位或 9 位整数，\n    //\
  \  并将其赋值给内部的持久化类字段'zipCodeInternal'\n    //  . . . <此处为验证代码>. . .\n    this.zipCode\
  \ = zipCode;\n    zipCodeInternal = convertToInt(zipCode);\n  }\n\nprivate int convertToInt(String\
  \ zipCode) {\n    return new Integer(zipCode).intValue();\n  }\n\nprivate String\
  \ convertToStr(int zipCode) {\n    return new Integer(zipCode).toString();\n  }\n\
  }\n```\n\n`get`/`setZipCode()`方法允许实体将内部数据延迟转换为对客户端友好的`String`表示形式，但仅在请求时进行。对于`zipCodeInternal`实例变量，甚至没有指定任何属性访问器。\n\
  \n**@Transient 注解**\n\n你可能不希望实体类的所有字段或属性都持久化。派生字段或临时字段可以注解为`@Transient`，以指示持久化框架应忽略它们。`zipCode`实例变量被标记为`@Transient`，表示持久化提供者不应管理它。该实例变量仅用于将内部的`int`值适配为对客户端友好的派生`String`值。\n\
  \n**示例：注解属性访问器**\n\n清单 3-5 演示了实体开发者如何在注解实体的属性访问器时使用副作用代码。\n\n***清单 3-5.***  一个使用属性访问器注解的实体\n\
  \n```\n@Entity\npublic class Address implements Serializable {\n\nprivate BigDecimal\
  \ addressId;\n  private int zipCode;\n  private String city;\n\n@Id\n  public BigDecimal\
  \ getAddressId() { return addressId; }\n  public void setAddressId(BigDecimal addressId)\
  \ { this.addressId = addressId; }\n\npublic int getZipCode() { return zipCode; }\n\
    public void setZipCode(int zipCode) {\n    if (zipCode != this.zipCode)\n    {\n\
        city = null; // 强制 city 被延迟重新派生\n      this.zipCode = zipCode;\n    }\n  }\n\
  \npublic String getCity() {\n    //  如果可用，从 zipcode 属性派生 city\n    if (city == null\
  \ && zipCode > 0) {\n      city = deriveCityFromZip();\n    }\n    return city;\n\
    }\n  public void setCity(String city) {\n    this.city = city;\n  }\n\nprivate\
  \ String deriveCityFromZip() {\n    /* 此处为实现代码. . . */\n    return null;\n  }\n\
  }\n```\n\n将`@Id`注解放在`getAddressId()`属性访问器上，可以消除访问策略的歧义，指示持久化提供者应使用属性访问器。强制持久化提供者通过属性访问器赋值，使得实体有机会在分配新邮政编码时重置`city`值。此外，知道`city`字段将通过其\
  \ getter 方法由持久化管理器获取，允许实体仅在通过`getCity()`访问器请求时才延迟计算其值。如果该实体的使用涉及在实体持久化（或合并）到数据库之前多次调用`setZipCode()`，那么将`city`值的派生推迟到实际请求时才进行会更高效。如果此实体使用实例变量访问，则每次分配`zipCode`时都需要立即更新`city`字段，因为随时可能发出将实体更改合并到数据库的请求。然而，如前所述，使用实体生命周期回调方法可以避免立即派生该值的开销。\n\
  \n**访问类型总结**\n\nJPA 提供了两种模型，供持久化提供者访问实体上的字段数据：直接通过实例变量，或间接通过属性访问器。在一般情况下，我们发现注解实体的实例变量比注解其属性访问器更可取。你很少需要验证来自持久存储的数据，并且\
  \ setter 方法中的任何副作用代码通常应延迟执行，而不是在实体实例化时立即执行。此外，字段级注解允许你将通过该字段的 get/set 方法暴露的公共属性类型与底层列表示解耦。例如，你可能希望通过`getZipcode()/setZipcode()`方法将`zipCode`属性暴露为`String`，但在内部将其转换为整数，使用`Integer`类型的字段，以便持久化到数据库中的`INTEGER`列。最后，使用实体生命周期回调方法提供了在加载实体数据之后和保存之前进行额外初始化或准备的机会。\n\
  \n**声明主键**\n\n\n\n实体必须声明其主键。主键用于在实体类型的所有实例中唯一标识一个实体实例。主键可以是简单的，由基本 Java 类的单个字段表示，例如\
  \ `String` 或 `Long`，就像之前的 `Customer` 示例（清单 3-2）那样。或者，主键也可以是复杂的，由一个包含多个基本字段或属性的复合类表示。\n\
  \n实体表中被主键字段映射的底层列，可能会受到数据库主键约束的正式约束，但这并非必需条件。然而，对于任何实体实例，其主键列的值必须在所有该实体实例中解析为唯一值。数据库约束有助于强制执行这一要求，在没有约束的情况下，应注意确保应用程序分配了唯一的值。\n\
  \n简单主键\n\n通过在实体类上使用 `@Id` 注解标注单个基本类型字段来声明简单主键（参见清单 3-6）。基本类型字段是一种基本的 Java 类型（基本类型列表见表\
  \ 3-2）。\n\n***清单 3-6.***  具有简单主键的实体\n\n```\n@Entity\npublic class Customer implements\
  \ Serializable {\n    @Id\n    private Integer id;\n    private String name;\n\n\
  public Customer() {}\n    public Customer(Integer id) { this.id = id; }\n\npublic\
  \ Integer getId() { return id; }\n    public void setId(Integer id) { this.id =\
  \ id; }\n\npublic String getName() { return name; }\n    public void setName(String\
  \ name) { this.name = name; }\n}\n```\n\n请注意，我们可以通过使用数据库序列自动填充主键值，来消除实体类中备用构造函数的实用性。清单\
  \ 3-7 展示了使用 JPA 提供的 ID 值生成器时可能的样子。\n\n***清单 3-7.***  使用 @GeneratedValue 填充的具有简单主键的实体\n\
  \n```\n@Entity\n@SequenceGenerator(name = \" CustomerSequence\",\n                  \
  \ sequenceName = \" CUSTOMER_SEQ\",\n                   initialValue = 100, allocationSize\
  \ = 20)\npublic class Customer implements Serializable {\n    @Id\n    @GeneratedValue(strategy\
  \ = GenerationType.SEQUENCE,\n                    generator = \" CustomerSequence\"\
  )\n    private Integer id;\n    private String name;\n\npublic Integer getId() {\
  \ return id; }\n    public void setId(Integer id) { this.id = id; }\n\npublic String\
  \ getName() { return name; }\n    public void setName(String name) { this.name =\
  \ name;}\n}\n```\n\n@GeneratedValue 注解\n\n`@GeneratedValue` 注解告诉持久化框架使用指定的序列生成器自动填充此列，该生成器必须在持久化归档中的某个实体上定义。（它直接定义在\
  \ `Customer` 实体上。）`@SequenceGenerator` 注解定义了一个可共享的序列生成器，它可以定义一个新的框架生成的序列，或者引用数据库中现有的序列。ID\
  \ 生成器将在第 4 章中更全面地探讨。\n\n复合主键\n\n如果实体的主键映射到多个数据库列，则使用复杂（或复合）主键。这可以在实体类上以两种方式之一表示。实体可以直接在实体类上声明复合键中的每个字段（使用\
  \ `@Id` 注解每个字段），并在 `@IdClass` 注解中指定一个提供完全相同字段的复合键类。或者，实体可以通过使用 `@EmbeddedId` 注解一个字段，来指定一个单一的复杂字段作为其主键。`@EmbeddedId`\
  \ 字段的类类型就是实体的复合键类。这个复合键类使用 `@Embeddable` 注解，并且必须为其每个字段指定映射细节。这些字段最终将映射到实体的基表。无论采用哪种方法，复合主键类都必须重写\
  \ `java.lang.Object` 上的 `hashCode()` 和 `equals(Object obj)` 方法。\n\n清单 3-8 展示了这些选项的样子。\n\
  \n***清单 3-8.***  使用 @IdClass 的具有复合主键的实体\n\n```\n@Entity\n@IdClass(CustomerPK.class)\n\
  public class Customer implements Serializable {\n    @Id\n    private Integer customerId;\n\
      @Id\n    private String name;\n\npublic Integer getCustomerId() { return customerId;\
  \ }\n    public void setCustomerId(Integer customerId) { this.customerId = customerId;\
  \ }\n    public void setName(String name) { this.name = name; }\n    public String\
  \ getName() { return name; }\n}\n```\n\n@IdClass 注解\n\n`@IdClass` 标识一个普通的 POJO（例如清单\
  \ 3-9 中所示的示例），该 POJO 不需要任何元数据。主键字段所需的任何映射细节都在实体的字段上指定。\n\n***清单 3-9.***  一个作为复合主键的简单\
  \ POJO\n\n```\npublic class CustomerPK implements Serializable {\n\nprivate Integer\
  \ id;\n  private String name;\n\npublic void setId(Integer id) { this.id = id; }\n\
    public Integer getId() { return id; }\n\npublic void setName(String name) { this.name\
  \ = name; }\n  public String getName() { return name; }\n\n@Override\n  public int\
  \ hashCode() { return 0; /* 此处为实现代码 */ }\n  @Override\n  public boolean equals(Object\
  \ obj) { return false; /* 此处为实现代码 */ }\n}\n```\n\n复合主键类必须符合实体的访问类型（注解的实例变量 vs 属性访问器），并且其所有字段或属性必须在实体类上具有匹配的字段或属性。实体上对应的字段必须使用\
  \ `@Id` 注解。\n\n@EmbeddedId 注解\n\n或者，实体可以通过使用 `@EmbeddedId` 注解其某个字段或属性，将其指定为复合主键（参见清单\
  \ 3-10）。\n\n***清单 3-10.***  使用 @EmbeddedId 注解的实体\n\n```\n@Entity\npublic class Customer\
  \ implements Serializable {\n  @EmbeddedId\n  private CustomerPK customerId;\n\n\
  public CustomerPK getCustomerId() { return customerId; }\n  public void setCustomerId(CustomerPK\
  \ customerId) {\n    this.customerId = customerId;\n  }\n\n// . . .\n}\n```\n\n\
  @Embeddable 注解\n\n每个 `@EmbeddedId` 必须引用一个标记为 `@Embeddable` 的类。清单 3-11 显示了相应的可嵌入复合键类。\n\
  \n***清单 3-11.***  一个 @Embeddable 复合键类\n\n```\n@Embeddable\npublic class CustomerPK\
  \ implements Serializable {\n  Long id;\n  String name;\n\npublic void setId(Long\
  \ id) { this.id = id; }\n  public Long getId() { return id; }\n\npublic void setName(String\
  \ name) { this.name = name; }\n  public String getName() { return name; }\n\n@Override\n\
    public int hashCode() { return 0; /* 此处为实现代码 */ }\n  @Override\n  public boolean\
  \ equals(Object obj) { return false; /* 此处为实现代码 */ }\n}\n```\n\n\n\n复合键类 `CustomerPK`\
  \ 必须使用 `@Embeddable` 注解。与 `@IdClass` 的情况不同，其实例变量或属性访问器可以包含 `@Column` 注解，以指定其映射细节。\n\
  \n实体示例总结\n\n基本的 `@Entity` 和 `@Id` 注解足以定义一个实体类，这使得实体编码的入门变得非常直接。随着你对可用注解的熟悉程度加深，以及需求变得更加复杂，你可以简单地向实体添加注解，以实现强大的持久化功能。\n\
  \n我们刚刚在本节中介绍了最基础的内容。现在，我们将把注意力从实体类本身转向 `EntityManager` 以及持久化框架中的其他一些重要服务。稍后，我们将回来探索更多满足更复杂需求的注解。\n\
  \n持久化归档\n\n到目前为止，我们将持久化归档视为一组共同部署为 JAR 文件的实体的封装。该归档定义了捆绑在一起进行部署的实体及相关非实体类。严格来说，持久化归档并不需要存在于其专用的\
  \ .jar 文件中。持久化归档可以捆绑在 .war 文件、EJB .jar 文件中，甚至可以作为 .class 文件和 `META-INF/persistence.xml`\
  \ 文件存在于 Java 应用程序的类路径上。\n\n无论其外部上下文如何，我们现在来仔细看看这个归档的内容。\n\npersistence.xml 文件\n\n\
  持久化归档要求在其 `META-INF` 目录中包含一个 `persistence.xml` 文件。该文件将归档中的实体子集分组为所谓的*持久化单元*。一个 `persistence.xml`\
  \ 文件必须至少定义一个持久化单元，并且同一个实体可以包含在同一 `persistence.xml` 文件中的多个持久化单元内。\n\n清单 3-12 展示了一个\
  \ `persistence.xml` 文件的示例。\n\n***清单 3-12.***  persistence.xml 文件示例\n\n```\n<?xml\
  \ version=\"1.0\" encoding=\"UTF-8\"?>\n<persistence version=\"2.0\" xmlns=\"http://java.sun.com/xml/ns/persistence\"\
  \ xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"\
  http://java.sun.com/xml/ns/persistencehttp://java.sun.com/xml/ns/persistence/persistence_2_0.xsd\"\
  >\n  <persistence-unit name=\"Chapter03PersistenceUnit\" transaction-type=\"JTA\"\
  >\n    <provider>org.eclipse.persistence.jpa.PersistenceProvider</provider>\n    <jta-data-source>jdbc/wineapp</jta-data-source>\n\
      <class>com.apress.ejb.chapter03.entities.Address</class>\n    <class>com.apress.ejb.chapter03.entities.Customer</class>\n\
      <class>com.apress.ejb.chapter03.entities.CustomerOrder</class>\n    <exclude-unlisted-classes>false</exclude-unlisted-classes>\n\
      <properties>\n      <property name=\"eclipselink.ddl-generation\" value=\"create-tables\"\
  />\n    </properties>\n  </persistence-unit>\n  <persistence-unit name=\"Chapter03PersistenceUnit-JSE\"\
  \ transaction-type=\"RESOURCE_LOCAL\">\n    <provider>org.eclipse.persistence.jpa.PersistenceProvider</provider>\n\
      <class>com.apress.ejb.chapter03.entities.Customer</class>\n    <properties>\n\
        <property name=\"javax.persistence.jdbc.driver\" value=\"oracle.jdbc.OracleDriver\"\
  />\n      <property name=\"javax.persistence.jdbc.url\" value=\"jdbc:oracle:thin:@localhost:1521:XE\"\
  />\n      <property name=\"javax.persistence.jdbc.user\" value=\"wineapp\"/>\n      <property\
  \ name=\"javax.persistence.jdbc.password\" value=\"221CE6B0A87AC61AE68FF3A130F7F666\"\
  />\n      <property name=\"eclipselink.logging.level\" value=\"FINER\"/>\n    </properties>\n\
    </persistence-unit>\n</persistence>\n```\n\n这个 `persistence.xml` 文件定义了两个持久化单元：`Chapter03PersistenceUnit`\
  \ 和 `Chapter03PersistenceUnit-JSE`。`Customer` 类在两个单元中都有定义。第一个持久化单元供 Java EE 客户端（如会话\
  \ Bean）使用；而第二个单元则配置供 Java SE 客户端（如清单 3-14 中所示的 `CustomerService.java` 类）使用。在两个持久化单元中指定不同的配置设置，可以使客户端与持久化单元的配置细节隔离开来，并且使得在\
  \ Java SE 和 EE 环境中运行的实体在两种情况下看起来几乎相同。\n\nEntityManager\n\n`EntityManager` 是客户端访问\
  \ JPA 持久化框架提供的实体管理服务的网关。客户端会话在与持久化实体实例交互之前，必须先获取一个 `EntityManager` 实例。`EntityManager`\
  \ 提供对查询、更新、刷新和删除现有实体实例的支持，以及注册实体类以创建具有标识的新持久化对象。\n\n持久化上下文\n\n`EntityManager` 在一个称为*持久化上下文*的事务上下文中维护一个实例缓存。持久化上下文允许\
  \ `EntityManager` 跟踪已修改、创建和删除的实体实例，并将实体实例与在 `EntityManager` 自身事务并发执行的外部事务所提交的更改进行协调。\n\
  \n通过 `EntityManager` 查询到的实体实例可以自由地传递给 EJB 容器内部和外部的客户端。客户端可以像操作普通 Java 对象一样访问和更新实体数据。要将更改应用回持久化存储，客户端需要在事务范围内调用\
  \ `EntityManager` 的 `merge()` 方法，然后 `EntityManager` 会将实体数据的状态持久化到后端存储中。\n\n获取 EntityManager\
  \ 实例\n\n`EntityManager` 实例既可以在 EJB 容器内部（Java EE）获取，也可以在容器外部（Java SE）获取。这为客户端提供了灵活性，使其能够以统一的方式与持久化实体\
  \ Bean 进行交互，而无需考虑持久化代码是在 Java EE 容器内部还是外部运行。\n\n使用容器注入的会话 Bean\n\n清单 3-13 提供了一个通过容器注入获取\
  \ `EntityManager` 实例的会话 Bean 示例。\n\n***清单 3-13.***  注入 EntityManager 实例的会话 Bean\n\
  \n```\n@Stateless\npublic class CustomerManager {\n\n@PersistenceContext(unitName=\"\
  Chapter03PersistenceUnit\")\n  private EntityManager em;\n\npublic void createCustomer()\
  \ {\n    final Customer cust = new Customer();\n    cust.setName(\"Moneybags MgGee\"\
  );\n    em.persist(cust);\n  }\n}\n```\n\n在此示例中，我们使用容器注入来获取一个绑定到 `Chapter03PersistenceUnit`\
  \ 持久化单元的 `EntityManager` 实例，该单元包含了来自清单 3-7 的 `Customer` 实体。然后，我们使用这个 `EntityManager`\
  \ 来持久化一个新的 `Customer` 实例。请注意，此示例假设存在一个 ID 生成器或其他服务，用于自动填充新实例的主键。\n\n使用 EntityManagerFactory\
  \ 的 Java SE 服务客户端\n\n有时无法使用容器注入，或者应用程序希望对 `EntityManager` 的生命周期拥有更多控制权。在这种情况下，客户端可以先获取一个\
  \ `EntityManagerFactory`，再从中获取 `EntityManager`。`javax.persistence.Persistence` 类充当获取\
  \ `EntityManagerFactory` 的工厂，并且可以在 Java EE 环境和 Java SE 环境中使用。清单 3-14 展示了普通的 Java\
  \ SE 服务客户端如何获取 `EntityManager`。\n\n\n\n***清单 3-14.***  一个充当实体外观的 POJO\n\n```\npublic\
  \ class CustomerService {\n\npublic static void main(String[] args) {\n    final\
  \ EntityManagerFactory emf =\n      Persistence.createEntityManagerFactory(\"Chapter03PersistenceUnit-JSE\"\
  );\n    final EntityManager em = emf.createEntityManager();\n    final Customer\
  \ cust = new Customer();\n    cust.setName(\"Best Customer Ever\");\n    em.persist(cust);\n\
  \  }\n}\n```\n\n这里我们创建了一个 `EntityManagerFactory`，它再次绑定到 `Chapter03PersistenceUnit-JSE`\
  \ 持久化单元，该单元包含了来自清单 3-7 的 `Customer` 实体。然后，我们通过该工厂创建了一个 `EntityManager` 实例，并使用它来持久化一个新的\
  \ `Customer` 实例。\n\n通过 JNDI 查找 EntityManager\n\n第三种选择，同样适用于 Java SE 和 EE 环境，是通过\
  \ Java 命名和目录接口 (JNDI) 查找 `EntityManagerFactory` 或 `EntityManager` 本身。清单 3-15 展示了如何在会话\
  \ Bean 中实现此操作。\n\n***清单 3-15.***  通过 JNDI 查找 EntityManager\n\n```\n@Stateless\n\
  @PersistenceContext(unitName=\"Chapter03PersistenceUnit\")\npublic class CustomerServiceBean\
  \ {\n    @Resource\n    SessionContext ctx;\n\npublic void performService() {\n\
  \        EntityManager em = (EntityManager)ctx.lookup(\"Chapter03PersistenceUnit\"\
  );\n        // . . .\n    }\n}\n```\n\n注入的 `SessionContext` 资源提供了一个 JNDI 命名空间，用于在运行时获取其他资源。\n\
  \n事务支持\n\n`EntityManager` 还公开了用于开始、提交和回滚事务的方法，这些方法适用于资源本地（非 JTA）事务。此主题将在第 8 章中深入讨论。\n\
  \n实体生命周期\n\n一个实体实例在其作为内存中 Java 对象的生命周期中可能会经历多种正式状态。理解这些不同的状态将帮助您了解实体何时与后端数据库处于一致或不一致的状态，以及如何在事务上下文中协调这些差异。\n\
  \n一个实体实例在其作为 Java 对象的生命周期中通常会经历多种持久化状态。自 EJB 3 以来，实体类是完全透明的。它们使用普通的构造函数创建，而不是早期\
  \ EJB 版本中的 `Home` 和 `LocalHome` 工厂接口。它们可以自由地传入和传出 EJB 容器以及客户端之间，并且客户端可以更新它们，而无需承担回调\
  \ EJB 容器的开销。\n\n新实体实例的生命周期\n\n让我们来看一个新创建的持久化实体实例的生命周期。在其生命周期中，实体可能会经历新建、托管、分离和已删除状态。\n\
  \n新建实体实例\n\n客户端通过使用实体的 Java 构造函数之一来创建新的实体实例。与早期的 EJB 规范相比，这是一个显著的简化，早期的规范要求用户在实体\
  \ Bean 的 `Home` 和/或 `LocalHome` 接口上定义 `create()` 工厂方法。所有实体类都需要默认（无参数）构造函数，但也可以定义其他构造函数。客户端可以存在于\
  \ EJB 容器外部或内部。在构造时，它处于新建状态，并且尚未具有持久化标识，因为它尚未与 `EntityManager` 的持久化上下文关联。客户端可以自由调用其任何方法并分配数据值，并且对实体的所有更新都保留在实体类本地。\n\
  \n托管实体实例\n\n要将此实体类转换为持久化对象，客户端需要获取一个 `EntityManager` 实例并调用 `EntityManager.persist()`\
  \ 方法。清单 3-16 展示了一个来自会话 Bean 的代码片段，该 Bean 通过注入获取 `EntityManager`，然后将作为参数传递给 `persistEntity()`\
  \ 方法的实体实例持久化。\n\n***清单 3-16.***  展示如何使实体实例持久化的示例\n\n```\n@Stateless\npublic class\
  \ MySessionEJB {\n\n@PersistenceContext(unitName = \"Chapter03PersistenceUnit\"\
  )\n  private EntityManager em;\n\npublic void persistEntity(Object entity) {\n \
  \   em.persist(entity);\n  }\n}\n```\n\n当实体被持久化时，它会作为托管实例添加到持久化上下文中。被托管为实体带来了以下优势：\n\
  \n*   默认情况下，实体上的所有字段都被指定为由持久化提供程序延迟加载。虽然延迟指定实际上只是一个提示（请参阅本章后面的“延迟与即时字段绑定”部分），但延迟字段绑定只能无缝地在托管实例上执行。\n\
  *   当实体被托管时，对其所做的更改可能会被持久化管理器跟踪，以优化后续的 `EntityManager.merge()` 操作。例如，更改跟踪可以直接在实体实例上处理，使用持久化提供程序在实例化实体时提供的字节码增强。这在管理相关实体网络时尤其重要，以便在将实体网络合并回持久化上下文时，计算变更集所需的工作量最小。\n\
  \n通常，不能保证调用 `EntityManager.persist()` 会立即执行 SQL `INSERT` 语句。由持久化管理器决定是立即执行此步骤，还是稍后但在提交事务之前执行。然而，在此示例中，无状态会话\
  \ Bean 上方法的默认行为是在每次调用其方法时创建一个新事务并提交工作，因此实体不仅被插入，而且也被提交了。\n\n在此步骤中，可能已为实体实例分配了序列值，并且可能还执行了其他副作用代码。\n\
  \n分离实体实例\n\n实体在其所属的持久化上下文的生命周期内保持托管状态，或者直到它从数据库中被移除。如果发生这些事件之一，或者如果实例通过值传递给客户端，它将成为一个分离的实体实例，并且不再与持久化上下文关联。分离的实体不会进行更改跟踪或其他内部优化。特别是，持久化提供程序无法延迟绑定在实体分离时尚未绑定的字段，并且尝试访问尚未绑定的分离实体字段将抛出运行时异常。要将其状态合并回持久化上下文并使其再次成为托管实例，您需要将分离的实体传递给\
  \ `EntityManager.merge()` 方法。\n\n虽然从 `EntityManager.merge()` 调用返回的实体实例是托管的，但更改不会立即传播到持久化存储；它们仅更新实体本身。假设客户端修改了实体：\n\
  \n```\nentity = mySession.persistEntity(entity);\nentity.setName(\"foo\");\n```\n\
  \n在上述第二条语句之后，名称更改仅应用于实体实例，并且没有更改传播到持久化上下文或数据库。要将这些更改应用于持久化上下文，您需要调用 `EntityManager.merge()`\
  \ 操作，如下所示：\n\n```\n// 假设已获取 EntityManager em，可能通过注入\nem.merge(entity);\n```\n\n\n\
  \n此操作会更新持久化上下文缓存，并可能同时更新底层数据库中的行，具体取决于生效的事务设置。\n\n已移除的实体实例\n\n当实体的 `remove()` 方法被调用时，该实体即成为已移除的实例。当上下文事务提交时，代表其持久化状态的行（如果该实体映射到多个表，则为多行）将被移除。\n\
  \nO/R 映射\n\n我们已经研究了许多定义实体通用行为的注解。现在，让我们探讨涉及将实体上的持久化字段或属性映射到数据库表列的 O/R 映射注解。\n\n\
  实体类的核心是定义其持久化结构的字段或属性列表。这些定义其持久化状态的字段或属性必须映射到数据库表中的列。持久化框架的职责是在将实体实例交付给客户端之前，从数据库加载此状态到该实例中，并在持久化时将此状态复制回表的行中。在早期版本的\
  \ EJB 中，此 O/R 映射信息因不同的容器管理持久化（CMP）提供商而异；而在 JPA 中，此映射标记已成为规范的一部分。与自 3.0 版以来 EJB 的几乎所有部分一样，用户可以选择通过注解来指定此信息，或者使用\
  \ `orm.xml` 文件中的 XML 来指定。\n\n@Table 注解（再探）\n\n`@Table` 注解允许你指定实体所映射的基础表的详细信息。清单\
  \ 3-17 展示了 `@Table` 注解的定义。\n\n***清单 3-17.***  @Table 注解\n\n```\n@Target({ElementType.TYPE})\n\
  @Retention(RetentionPolicy.RUNTIME)\npublic @interface Table {\n    String name()\
  \ default \"\";\n    String catalog() default \"\";\n    String schema() default\
  \ \"\";\n    UniqueConstraint[] uniqueConstraints() default {};\n}\n```\n\n每个实体标识一个将保存其持久化数据的数据库表，如下所示：\n\
  \n```\n@Entity\n@Table(name=\"ADDRESSES\")\npublic class Address implements Serializable\
  \ {\n    . . .\n}\n```\n\n此处，`@Table` 注解用于覆盖 `Address` 实体的默认表名。如果没有 `@Table` 注解，默认表名将与实体类名相同（在此示例中，默认表名将为\
  \ `\"ADDRESS\"`）。`@Table` 注解还允许你指定数据库模式和约束信息，以便在部署期间生成表时使用。实体也可以通过指定 `@SecondaryTable`\
  \ 注解来映射到多个表。\n\n![image](img/sq.jpg) **注意**   预定义的注解类型 `@Target` 和 `@Retention`\
  \ 可以在注解定义上指定，以向编译器提供关于该注解的信息。`@Target` 注解标识可以接受该注解的程序元素（在我们的示例中，是类的一部分）。`@Retention`\
  \ 注解用于指示该注解是仅应在 Java 源文件中可用，还是在编译后的类文件中也可用。当指定 `@Retention(SOURCE)` 时，该注解作为文档使用，并可能被集成开发环境（IDE）等设计时工具使用，但注解的使用不会编译到\
  \ `.class` 文件中。当指定 `@Retention(RUNTIME)` 时，该信息也会编译到 `.class` 文件中，因此可以通过 Java 反射获取，供部署或运行时工具（如\
  \ EJB 容器）使用。\n\n@Column 注解（再探）\n\n实体类字段或属性使用 `@Column` 注解映射到数据库列。同样，如果某个字段通过其实例变量或属性访问器没有定义\
  \ `@Column` 注解，则映射的列名将从该字段名派生。\n\n清单 3-18 给出了 `@Column` 注解的定义。\n\n\n\n***清单 3-18.***  @Column\
  \ 注解\n\n```\n@Target({ElementType.METHOD, ElementType.FIELD})\n@Retention(RetentionPolicy.RUNTIME)\n\
  public @interface Column {\n    String name() default \"\";\n    boolean unique()\
  \ default false;\n    boolean nullable() default true;\n    boolean insertable()\
  \ default true;\n    boolean updatable() default true;\n    String columnDefinition()\
  \ default \"\";\n    String table() default \"\";\n    int length() default 255;\n\
      int precision() default 0; // decimal precision\n    int scale() default 0;\
  \ // decimal scale\n  }\n```\n\n如你所见，如果需要，可以完整指定列的属性。当你想在部署时给出指令以生成自定义列定义时，这非常有用。最常见的情况是，你会使用\
  \ `name` 属性将列名与字段或属性名解耦，例如当列名过于实用或晦涩时。\n\n此处，字段 `identifier` 被指示映射到一个名为 `ID` 的列，从而解除了默认情况下将两者绑定的命名依赖关系：\n\
  \n```\n@Entity\n@Table(name=\"ADDRESSES\")\npublic class Address implements Serializable\
  \ {\n    . . .\n    @Column(name=\"ID\")\n    String identifier;\n    . . .\n}\n\
  ```\n\n复杂映射\n\n更复杂的映射，包括涉及每个实体多个表、复杂数据类型、嵌入类和继承层次结构的映射，将在下一章中介绍。现在，让我们先研究实体之间的关系是如何映射的。\n\
  \n实体关系\n\n实体可以持有对自身或其他实体的单值和集合引用。此外，关系可以在关系涉及的一个或两个实体上作为关系字段公开。对于熟悉 EJB 2.x 的人来说，请注意，在\
  \ JPA 中，关系字段不再由容器双向维护。更新双向关系一端的关系字段不再自动导致另一端的关系字段也被更新。在映射关系字段时，其主键始终代表目标实体。关系的源端（即拥有端）可以映射到源实体表上的外键，但并不要求在底层列上指定实际的数据库外键约束。\n\
  \n让我们看看 JPA 如何让你定义关系。\n\n@OneToOne\n\n以下是 `@OneToOne` 关系注解的定义：\n\n```\n@Target({ElementType.METHOD,\
  \ ElementType.FIELD})\n@Retention(RetentionPolicy.RUNTIME)\npublic @interface OneToOne\
  \ {\n    Class targetEntity() default void.class;\n    CascadeType[] cascade() default\
  \ {};\n    FetchType fetch() default EAGER;\n    boolean optional() default true;\n\
      String mappedBy() default \"\";\n}\n```\n\n`@OneToOne` 关系由关系一端或两端的单值实体引用表示。一个关系字段将映射到其表上的列，这些列引用关系另一端表上的主键列。\n\
  \n以下是一个示例，其中 `Customer` 使用了 `Address`，但 `Address` 不知道它被 `Customer` 使用，因此其类中没有关系字段：\n\
  \n```\n@Entity\npublic class Customer implements Serializable {\n    . . .\n    @OneToOne\n\
      @JoinColumn(name=\"MAILING_ADDRESS_REF\",\n                referencedColumnName=\"\
  ADDRESS_PK\")\n    protected Address address;\n    . . .\n}\n```\n\n要使其成为双向关系，只需向\
  \ `Address` 添加一个指向 `Customer` 的关系字段：\n\n```\n@Entity\npublic class Address implements\
  \ Serializable {\n    . . .\n    @OneToOne(mappedBy=\"address\")\n    protected\
  \ Customer customer;\n    . . .\n}\n```\n\n请注意，通过使用 `(mappedBy=\"address\")` 属性，无需在\
  \ `Address.customer` 字段上重复指定 `@JoinColumn` 信息。此外，关系另一端的实体类型是从 `customer` 字段类型派生出来的。\n\
  \n如果你随后要使关系变为单向但方向相反，只需将 `@JoinColumn` 注解从 `Customer.address` 移到 `Address.customer`\
  \ 上，然后移除 `Customer.address` 字段即可。\n\n@OneToMany 和 @ManyToOne\n\n类似地，以下是 @OneToMany\
  \ 和 @ManyToOne 注解的定义：\n\n@OneToMany:\n\n```\n@Target(value = {ElementType.METHOD,\
  \ ElementType.FIELD})\n@Retention(value = RetentionPolicy.RUNTIME)\npublic @interface\
  \ OneToMany {\n\npublic Class targetEntity() default void.class;\n  public CascadeType[]\
  \ cascade() default {};\n  public FetchType fetch() default FetchType.LAZY;\n  public\
  \ String mappedBy() default \"\";\n  public boolean orphanRemoval() default false;\n\
  }\n```\n\n@ManyToOne:\n\n```\n@Target(value = {ElementType.METHOD, ElementType.FIELD})\n\
  @Retention(value = RetentionPolicy.RUNTIME)\npublic @interface ManyToOne {\n\npublic\
  \ Class targetEntity() default void.class;\n  public CascadeType[] cascade() default\
  \ {};\n  public FetchType fetch() default FetchType.EAGER;\n  public boolean optional()\
  \ default true;\n}\n```\n\n`@OneToMany` 关系注解被添加到一个 `Collection` 关系字段上，其中另一端的实体要么没有关系字段，要么有一个指向此实体的单值关系字段。如果关系另一端的实体上有一个字段，则该字段将被注解为\
  \ `@ManyToOne`，表明它是一个属于 `Collection` 的实体，并且它知道拥有该 `Collection` 的实体类型。与 `@OneToOne`\
  \ 关系字段一样，在 `@OneToMany` 关系上指定 `mappedBy` 属性足以标识用于两个关系字段的映射。\n\n```\n@Entity\npublic\
  \ class Orders implements Serializable {\n    . . .\n    @OneToMany(mappedBy=\"\
  orders\")\n    protected Collection<OrderItems> orderItemsCollection;\n    . . .\n\
  }\n\n@Entity\npublic class OrderItems implements Serializable {\n    . . .\n    @ManyToOne\n\
      @JoinColumn(name=\"SELECTION_REF\", referencedColumnName=\"SELECTION_PK\")\n\
      protected Orders orders;\n    . . .\n}\n```\n\n请注意，通过使用泛型集合类型（`Collection<OrderItems>`），持久化框架能够确定关系另一端的实体类型。这样，解析\
  \ `@OneToMany` 端的映射所需的就是该实体上的字段或属性名称，在本例中为 `orders`。\n\n@ManyToMany\n\n以下是 `@ManyToMany`\
  \ 关系注解的定义：\n\n```\n@Target(value = {ElementType.METHOD, ElementType.FIELD})\n@Retention(value\
  \ = RetentionPolicy.RUNTIME)\npublic @interface ManyToMany {\n  public Class targetEntity()\
  \ default void.class;\n  public CascadeType[] cascade() default {};\n  public FetchType\
  \ fetch() default FetchType.LAZY;\n  public String mappedBy() default \"\";\n}\n\
  ```\n\n`@ManyToMany` 注解被分配给一个 `Collection` 关系字段，以指示目标实体也拥有一个源实体类型的 `Collection`。这种类型的映射需要一个\
  \ `@JoinTable`，通常称为*交集表*。连接表持有指向关系两端实体主键的引用。在下面的示例中，交集表 `EJB_PROJ` 有两列：`EMP_ID`\
  \ 是引用回 `EMPLOYEE` 表上 `ID` 主键列的引用列，`PROJ_ID` 是指向 `PROJECT` 表上 `ID` 主键列的引用列。\n\n```\n\
  @Entity\npublic class Employee implements Serializable {\n    . . .\n    @ManyToMany(mappedBy=\"\
  employees\", cascade=CascadeType.PERSIST)\n    @JoinTable(name=\"EMP_PROJ\",\n              \
  \ joinColumns={@JoinColumn(name=\"EMP_ID\",\n                                        referencedColumnName=\"\
  ID\")},\n               inverseJoinColumns={@JoinColumn(name=\"PROJ_ID\",\n                                              \
  \ referencedColumnName=\"ID\")})\n    protected Collection<Project> projects;\n\
      . . .\n}\n\n\n\n@Entity\npublic class Project implements Serializable {\n    .\
  \ . .\n    @ManyToMany(mappedBy=\"projects\")\n    protected Set<Employee> employees;\n\
      . . .\n}\n```\n\n在 `@ManyToMany` 上使用 `(mappedBy=\"projects\")` 属性，使得 `@JoinTable`\
  \ 注解中包含的映射信息可以被两个关联字段共享。\n\n懒加载与即时加载字段绑定\n\n出于性能考虑，默认情况下所有字段值都被指定为懒加载，这是因为每个字段映射（如\
  \ `@Basic`、`@OneToMany` 等）中隐含的 `fetch` 属性默认值均为 `FetchType.LAZY`。实际上，这个默认的 `FetchType.LAZY`\
  \ 值仅仅是一个提示，持久化管理器并不强制遵守该请求。对于许多字段（包括几乎所有简单值），在真正需要时才懒加载实体的字段会带来显著负担，因此持久化管理器通常会忽略\
  \ `FetchType.LAZY` 指令，直接进行即时加载。\n\n然而，当在字段映射上指定了非默认值 `FetchType.EAGER` 时，这就不再是一个可选请求。当字段被如此修饰后，持久化管理器在实体实例化时必须立即绑定其值。这在处理关联字段时尤为重要。关联字段可以使用\
  \ `fetch=FetchType.EAGER` 属性进行注解，以确保即使实体变为游离状态，客户端仍然能够遍历该关联字段以访问相关的实体实例。\n\n当实体处于托管状态时，关联值会在首次请求时绑定。但是，当实体被实例化后变为游离状态（例如序列化后传递给远程客户端），可能需要预先即时绑定其所有关联字段。在这种情况下，可以覆盖默认的\
  \ `fetch` 值，在关联字段上设置 `(fetch=FetchType.EAGER)`。但需要注意此操作的后果，因为如果即时加载的集合又即时加载其引用的对象，依此类推，可能会引发级联加载风暴。\n\
  \n级联操作\n\n与其他实体关联的实体可以跨引用级联某些生命周期操作。这使得对一个实体的操作能够传播到某些其他相关实体。级联选项通过各个关联字段上的注解来定义，从而可以精确控制级联行为。以下是级联选项：\n\
  \n```\npublic enum CascadeType {\n    ALL,\n    PERSIST,\n    MERGE,\n    REMOVE,\n\
      REFRESH\n}\n```\n\n例如，一个持有独占 `Address` 实体引用的 `Customer` 实体，可能希望将对 `Customer`\
  \ 的所有操作都传播到 `Address` 实例。\n\n```\n@Entity\npublic class Customer implements Serializable\
  \ {\n    . . .\n    @OneToOne(cascade=CascadeType.ALL)\n    protected Address address;\n\
      . . .\n}\n```\n\n当对 `Customer` 实体调用 `persist()` 或 `remove()` 等 `EntityManager`\
  \ 操作时，该操作也会被调用到 `address` 字段持有的 `Address` 实例，以及该 `Address` 实例的任何级联字段，依此类推。\n\n使用这些\
  \ `cascade` 注解属性，实体开发者可以声明式且简洁地指定级联行为，并且免除了客户端在顶层实例上执行 `persist()`、`merge()`、`remove()`\
  \ 或 `refresh()` 生命周期操作时，需要跟踪需要操作的实例网络的负担。\n\nJava 持久化查询语言 (JPQL)\n\nJPA 定义了自己的查询语言，以支持基于实体的查询以及批量更新和删除操作。JPQL\
  \ 与 SQL 有很多共同之处，主要区别在于其主要结构是实体和字段，而不是表和列。与 SQL 一样，JPQL 查询既可以通过声明的 `@NamedQuery`\
  \ 注解静态定义，也可以作为动态语句提交给 `EntityManager` 并在运行时处理。查询可以接受绑定参数，返回的结果可以是实体或普通的 Java 对象。\n\
  \n通过以实体及其字段来表达查询，JPQL 语句变得独立于底层模式。因此，当实体的映射被修改时，JPQL 查询无需更改。\n\nJPQL 查询由 `EntityManager`\
  \ 在持久化上下文中执行，因此查询结果将包含上下文中待处理的未提交数据。\n\n@NamedQuery 和 @NamedQueries\n\n```\n@Target({TYPE})\
  \ @Retention(RUNTIME)\npublic @interface NamedQuery {\n    String name();\n    String\
  \ query ();\n    LockModeType lockMode() default LockModeType.NONE;\n    QueryHint[]\
  \ hints() default {};\n}\n@Target({TYPE}) @Retention(RUNTIME)\npublic @interface\
  \ NamedQueries {\n    NamedQuery [] value ();\n}\n```\n\n实体可以在 `@NamedQuery` 注解中声明命名的\
  \ JPQL 语句，以定义可重用的查询。`@NamedQuery` 仅包含一个 `name` 和一个包含 JPQL 文本的 `query`。`@NamedQuery`\
  \ 的名称在持久化单元内必须唯一。\n\n```\n@Entity\n@NamedQueries({\n  @NamedQuery(name=\"Inventory.findAll\"\
  ,\n              query=\"select o from Inventory o\"),\n  @NamedQuery(name=\"Inventory.findByYear\"\
  ,\n              query=\"select o from Inventory o where o.year=:year\"),\n  @NamedQuery(name=\"\
  Inventory.findByRegion\",\n              query=\"select o from Inventory o where\
  \ o.region=?1 \")\n})\npublic class Inventory implements Serializable {\n    . .\
  \ .\n}\n```\n\n绑定查询参数\n\n查询可以接受绑定参数，可以是命名参数或索引参数。要调用上一节中的查询，客户端代码（例如会话 Bean）可能会发出以下调用：\n\
  \n```\n@Stateless\npublic class InventoryManagerBean implements InventoryManager,\n\
                                               InventoryManagerLocal {\n    . . .\n\
      /** <code>select o from Inventory o</code> */\n    public List<Inventory> findAllInventory()\
  \ {\n        return em.createNamedQuery(\"Inventory.findAll\", Inventory.class).getResultList();\n\
      }\n\n/** <code>select o from Inventory o where o.year=:year</code> */\n    public\
  \ List<Inventory> findInventoryByYear(Object year) {\n        return em.createNamedQuery(\"\
  Inventory.findByYear\", Inventory.class).setParameter(\"year\",\nyear).getResultList();\n\
      }\n\n/** <code>select object(o) from Inventory o where o.region=?1 </code> */\n\
      public List<Inventory> findInventoryByRegion(Object p1) {\n        return em.createNamedQuery(\"\
  findInventoryByRegion\", Inventory.class).setParameter(0,\np1).getResultList();\n\
      }\n    . . .\n}\n```\n\n请注意，`findInventoryByYear` 查询使用命名参数 `:year`，而 `findInventoryByRegion`\
  \ 使用索引参数 `?1`。这两种方法等效，但在查询执行前绑定参数时需要不同的 `setParameter()` 调用，如前面的示例代码所示。\n\n动态查询\n\
  \n到目前为止，我们展示的示例查询都是通过在实体类上使用 `@NamedQuery` 注解定义的。也可以通过在运行时动态构建查询字符串来动态执行查询。\n\n\
  清单 3-19 展示了如何实现这一点的示例。\n\n***清单 3-19.***  动态 JPQL 使用示例\n\n```\n@Stateless\npublic\
  \ class CustomerManagerBean {\n\n@PersistenceContext(unitName = \"Chapter03PersistenceUnit\"\
  )\n  private EntityManager em;\n\n\n\n/** <code>select object(o) from Customer o</code>\
  \ */\n  public List<Customer> findAllCustomers() {\n    return em.createQuery(\"\
  select o from Customer o\", Customer.class).getResultList();\n  }\n\n// . . .\n\
  }\n\n批量更新与删除操作\n\nJPQL 也可用于对特定实体类（包括子类实例）的多个实例执行批量更新和删除操作。这些 JPQL 语句同样可以接受参数，并返回受操作影响的实体实例数量。批量删除操作的示例如清单\
  \ 3-20 所示。\n\n***清单 3-20.***  JPQL 中批量删除语句的示例\n\n```\n@Stateless\npublic class CustomerManagerBean\
  \ {\n\n@PersistenceContext(unitName = \"Chapter03PersistenceUnit\")\n  private EntityManager\
  \ em;\n\n/**\n   * 对已完成的 CustomerOrder 项执行批量删除\n   */\n  public int bulkDeleteFulfilledOrders()\
  \ {\n    return em.createQuery(\"delete from CustomerOrder o where o.status = 'FULFILLED'\"\
  ).executeUpdate();\n  }\n\n// . . .\n}\n```\n\n批量删除和更新语句通过 `EntityManager` 的查询引擎，使用\
  \ `EntityManager.createQuery()` 调用执行。它们也可以声明式地通过 `@NamedQuery` 元素指定，或动态地指定，如上述清单\
  \ 3-20 所示。\n\n![image](img/sq.jpg) **注意**   执行批量更新和删除操作时应格外小心，因为这些操作会绕过 `PersistenceContext`，可能导致缓存不一致。它们本质上会被直接转换为\
  \ SQL 并执行，而不会进行乐观锁检查，也不会遵循关系字段上指定的级联规则。作为经验法则，批量操作应在自己的事务上下文中执行，或者至少在事务开始时执行。如果使用了\
  \ `type` 为 `PersistenceContextType.EXTENDED` 的 `PersistenceContext`，请确保在批量操作后调用\
  \ `EntityManager.flush()`。这样，批量操作后缓存中就不会存在可能已过期或已移除的实体。\n\n复杂查询\n\n我们将在下一章介绍 JPQL\
  \ 更高级的领域，包括返回普通非实体 Java 对象的查询，以及用 SQL 编写的原生查询，这些查询可能返回转换为实体实例的结果。\n\n持久化 vs. 适配\n\
  \n应用程序设计者在处理 JPA 实体类时需要做出的决策之一，是采用自上而下还是自下而上的设计方式；也就是说，是先创建实体并让数据库模式随之生成，还是先创建数据库模式。当然，也可以并行构建实体和表，但在许多情况下，其中一方是固定的，另一方必须与之匹配。\n\
  \n正向生成——持久化\n\n在自上而下的模型中，实体类作为真实来源，数据库模式被创建用于持久化实体类数据。底层表可以作为部署实体类的附带效果生成；你可能希望在\
  \ `@Table`、`@Column` 及相关注解中指定元数据，以指导部署工具生成模式结构。\n\n逆向工程——适配\n\n在自下而上的方法中，数据库模式是真实来源：模式是固定的，而\
  \ Java 对象（实体类）的存在是为了将数据库对象适配到 Java 世界中。此过程通常通过 IDE 使用 EJB 逆向工程工具提供，为每个表生成默认的实体类，并为每个列生成默认的字段。\n\
  \n哪种方法适合你的项目？\n\n两种方法在实际开发项目中同样常见。你的需求将决定使用哪些工具来将数据库与实体 Bean 连接起来。你可以将这个问题视为持久化与适配的问题：数据库模式的存在仅仅是为了持久化实体\
  \ Bean，还是你在将数据库模式适配到 Java 空间？在开始创建实体 Bean 时，请考虑这个问题。\n\n示例应用程序：CustomerOrderManager\n\
  \n在 CustomerOrderManager 示例中，我们展示了会话 Bean 如何作为一组相互关联的 JPA 实体的外观。我们的 `CustomerOrderManager`\
  \ 会话 Bean 将 CRUD（创建、检索、更新、删除）操作作为服务方法公开，允许客户端访问和操作 `Customer`、`CustomerOrder` 和\
  \ `Address` 实体。会话外观上的这些服务方法提供事务、访问控制和其他企业级服务，并允许持久化框架处理 JPA 实体与底层 RDBMS 之间的接口。\n\
  \nCustomer.java\n\n`Customer.java` 类（如清单 3-21 所示）包含一对命名查询，并具有简单的主键。它通过 `billingAddress`\
  \ 和 `shippingAddress` 字段与 `Address` 实体保持两个单向的 `@OneToOne` 关系。它还通过 `customerOrders`\
  \ 字段与 `CustomerOrder` 保持双向的 `@OneToMany` 关系。请注意，`customerOrders` 字段的属性访问器由 `addCustomerOrder()`\
  \ 和 `removeCustomerOrder()` 方法补充。客户端在向 `Customer` 添加或移除 `CustomerOrder` 时应使用这些方法，以确保涉及的两个实体类上的关系字段都使用正确的关系信息进行更新。\n\
  \n***清单 3-21.***  Customer.java\n\n```\n@Entity\n@NamedQueries({\n  @NamedQuery(name\
  \ = \"Customer.findAll\",\n              query = \"select o from Customer o\"),\n\
    @NamedQuery(name = \"Customer.findByEmail\",\n              query = \"select o\
  \ from Customer o where o.email = :email\")})\n@Table(name = \"CH03_CUSTOMER\")\n\
  @TableGenerator(name = \"Customer_ID_Generator\",\n                table = \"CUSTOMER_ID_GENERATOR\"\
  ,\n                pkColumnName = \"PRIMARY_KEY_NAME\",\n                pkColumnValue\
  \ = \"Customer.id\",\n                valueColumnName = \"NEXT_ID_VALUE\")\npublic\
  \ class Customer implements Serializable {\n\n@Id\n  @Column(nullable = false)\n\
    @GeneratedValue(strategy = GenerationType.TABLE,\n                  generator\
  \ = \"Customer_ID_Generator\")\n  private BigDecimal id;\n  @Version\n  private\
  \ int version;\n  @Column(length = 4000)\n  private String email;\n  @OneToMany(mappedBy\
  \ = \"customer\", cascade = {CascadeType.ALL})\n  private List<CustomerOrder> customerOrders;\n\
    @OneToOne\n(cascade = {CascadeType.ALL})\n  @JoinColumn(name = \"BILLING_ADDRESS\"\
  )\n  private Address billingAddress;\n  @OneToOne(cascade = {CascadeType.ALL})\n\
    @JoinColumn(name = \"SHIPPING_ADDRESS\")\n  private Address shippingAddress;\n\
  \npublic BigDecimal getId() { return id; }\n  public void setId(BigDecimal id) {\
  \ this.id = id; }\n\npublic int getVersion() { return version; }\n  public void\
  \ setVersion(int version) { this.version = version; }\n\npublic String getEmail()\
  \ { return email; }\n  public void setEmail(String email) { this.email = email;\
  \ }\n\npublic List<CustomerOrder> getCustomerOrders() { return customerOrders; }\n\
    public void setCustomerOrders(List<CustomerOrder> customerOrders) {\n    this.customerOrders\
  \ = customerOrders;\n  }\n\npublic CustomerOrder addCustomerOrder(CustomerOrder\
  \ customerOrder) {\n    if (customerOrders == null) {\n      customerOrders = new\
  \ ArrayList<CustomerOrder>();\n    }\n    customerOrders.add(customerOrder);\n    customerOrder.setCustomer(this);\n\
      return customerOrder;\n  }\n\n\n\npublic CustomerOrder removeCustomerOrder(CustomerOrder\
  \ customerOrder) {\n    getCustomerOrders().remove(customerOrder);\n    customerOrder.setCustomer(null);\n\
      return customerOrder;\n  }\n\npublic Address getBillingAddress() { return billingAddress;\
  \ }\n  public void setBillingAddress(Address billingAddress) {\n    this.billingAddress\
  \ = billingAddress;\n  }\n\npublic Address getShippingAddress() { return shippingAddress;\
  \ }\n  public void setShippingAddress(Address shippingAddress) {\n    this.shippingAddress\
  \ = shippingAddress;\n  }\n}\n```\n\n清单 3-22 中展示的 `CustomerOrder` 实体实例，代表客户下达的订单。为简洁起见，本示例省略了相关的\
  \ `OrderItem` 实体。完整的 Apress Wines Online 应用程序（包含许多其他实体）将在第 7 章中探讨。\n\n***清单 3-22.***  CustomerOrder.java\n\
  \n```\n@Entity\n@NamedQueries({\n  @NamedQuery(name = \"CustomerOrder.findAll\"\
  ,\n              query = \"select o from CustomerOrder o\")})\n@Table(name = \"\
  CH03_CUSTOMER_ORDER\")\n@TableGenerator(name = \"CustomerOrder_ID_Generator\",\n\
                  table = \"CUSTOMERORDER_ID_GENERATOR\",\npkColumnName = \"PRIMARY_KEY_NAME\"\
  , pkColumnValue = \"CustomerOrder.id\",\nvalueColumnName = \"NEXT_ID_VALUE\")\n\
  public class CustomerOrder implements Serializable {\n\n@Id\n  @Column(nullable\
  \ = false)\n  @GeneratedValue(strategy = GenerationType.TABLE,\n                  generator\
  \ = \"CustomerOrder_ID_Generator\")\n  private BigDecimal id;\n  @Version\n  private\
  \ int version;\n  @Temporal(TemporalType.DATE)\n  @Column(name = \"CREATION_DATE\"\
  )\n  private Date creationDate;\n  private String status;\n  @ManyToOne\n  @JoinColumn(name\
  \ = \"CUSTOMER_ID\")\n  private Customer customer;\n\npublic Date getCreationDate()\
  \ { return creationDate; }\n  public void setCreationDate(Date creationDate) {\n\
      this.creationDate = creationDate;\n  }\n\npublic BigDecimal getId() { return\
  \ id; }\n  public void setId(BigDecimal id) { this.id = id; }\n\npublic String getStatus()\
  \ { return status; }\n  public void setStatus(String status) { this.status = status;\
  \ }\n\npublic int getVersion() { return version; }\n  public void setVersion(int\
  \ version) { this.version = version; }\n\npublic Customer getCustomer() { return\
  \ customer; }\n  public void setCustomer(Customer customer) { this.customer = customer;\
  \ }\n}\n```\n\n本示例中的最后一个实体是 `Address`，如清单 3-23 所示。`Address` 实体被 `Customer` 实体引用，但自身不持有任何关系字段，这使得来自\
  \ `Customer` 的引用是单向的。\n\n***清单 3-23.***  Address.java\n\n```\n@Entity\n@NamedQueries({\n\
    @NamedQuery(name = \"Address.findAll\",\n              query = \"select o from\
  \ Address o\")})\n@Table(name = \"CH03_ADDRESS\")\n@TableGenerator(name = \"Address_ID_Generator\"\
  ,\n                table = \"CH03_ADDRESS_ID_GEN\",\n                pkColumnName\
  \ = \"PRIMARY_KEY_NAME\",\n                pkColumnValue = \"Address.id\",\n                valueColumnName\
  \ = \"NEXT_ID_VALUE\")\npublic class Address implements Serializable {\n\n@Column(length\
  \ = 4000)\n  private String city;\n  @Id\n  @Column(nullable = false)\n  @GeneratedValue(strategy\
  \ = GenerationType.TABLE,\n                  generator = \"Address_ID_Generator\"\
  )\n  private BigDecimal id;\n  private String state;\n  @Column(length = 4000)\n\
    private String street1;\n  @Column(length = 4000)\n  private String street2;\n\
    @Version\n  private Integer version;\n  @Column(name = \"ZIP_CODE\")\n  private\
  \ int zipCode;\n\npublic String getCity() { return city; }\n  public void setCity(String\
  \ city) { this.city = city; }\n\npublic BigDecimal getId() { return id; }\n  public\
  \ void setId(BigDecimal id) { this.id = id; }\n\npublic String getState() { return\
  \ state; }\n  public void setState(String state) { this.state = state; }\n\npublic\
  \ String getStreet1() { return street1; }\n  public void setStreet1(String street1)\
  \ { this.street1 = street1; }\n\npublic String getStreet2() { return street2; }\n\
    public void setStreet2(String street2) { this.street2 = street2; }\n\npublic Integer\
  \ getVersion() { return version; }\n  public void setVersion(Integer version) {\
  \ this.version = version; }\n\npublic int getZipCode() { return zipCode; }\n  public\
  \ void setZipCode(int zipCode) { this.zipCode = zipCode; }\n}\n```\n\n`CustomerOrderManager`\
  \ 无状态会话 Bean 作为前述三个实体的外观，并提供了对 `EntityManager` 上 `persist()`、`merge()` 和 `remove()`\
  \ 方法的接口。它如清单 3-24 所示。\n\n***清单 3-24.***  CustomerOrderManager.java\n\n```\n@Stateless\n\
  public class CustomerOrderManager {\n\n@PersistenceContext(unitName = \"Chapter03PersistenceUnit\"\
  )\n  private EntityManager em;\n\npublic CustomerOrderManager() {\n  }\n\npublic\
  \ <T> T persistEntity(T entity) {\n    em.persist(entity);\n    return entity;\n\
    }\n\npublic <T> T mergeEntity(T entity) {\n    return em.merge(entity);\n  }\n\
  \npublic void removeCustomer(Customer customer) {\n    customer = em.find(Customer.class,\
  \ customer.getId());\n    em.remove(customer);\n  }\n\n/** <code>select o from Customer\
  \ o</code> */\n  public List<Customer> getCustomerFindAll() {\n    return em.createNamedQuery(\"\
  Customer.findAll\", Customer.class).getResultList();\n  }\n\npublic void removeAddress(Address\
  \ address) {\n    address = em.find(Address.class, address.getId());\n    em.remove(address);\n\
    }\n\n/** <code>select o from Address o</code> */\n  public List<Address> getAddressFindAll()\
  \ {\n    return em.createNamedQuery(\"Address.findAll\", Address.class).getResultList();\n\
    }\n\npublic void removeCustomerOrder(CustomerOrder customerOrder) {\n    customerOrder\
  \ = em.find(CustomerOrder.class, customerOrder.getId());\n    em.remove(customerOrder);\n\
    }\n\n/** <code>select o from CustomerOrder o</code> */\n  public List<CustomerOrder>\
  \ getCustomerOrderFindAll() {\n    return em\n      .createNamedQuery(\"CustomerOrder.findAll\"\
  , CustomerOrder.class)\n      .getResultList();\n  }\n\n/** <code>select o from\
  \ CustomerOrder o where o.email = :email</code> */\n  public List<CustomerOrder>\
  \ getCustomerOrderFindByEmail(String email) {\n    return em\n      .createNamedQuery(\"\
  CustomerOrder.findByEmail\", CustomerOrder.class)\n      .setParameter(\"email\"\
  , email)\n      .getResultList();\n  }\n}\n```\n\n要部署此示例，您需要一个 `persistence.xml`\
  \ 文件，该文件声明一个命名的持久化单元，可供会话 Bean 引用（参见清单 3-25）。\n\n***清单 3-25.***  persistence.xml\n\
  \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<persistence version=\"2.0\"\
  \ xmlns=\"http://java.sun.com/xml/ns/persistence\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
  \ xsi:schemaLocation=\"http://java.sun.com/xml/ns/persistencehttp://java.sun.com/xml/ns/persistence/persistence_2_0.xsd\"\
  >\n  <persistence-unit name=\"Chapter03PersistenceUnit\" transaction-type=\"JTA\"\
  >\n    <provider>org.eclipse.persistence.jpa.PersistenceProvider</provider>\n    <jta-data-source>jdbc/wineapp</jta-data-source>\n\
      <class>com.apress.ejb.chapter03.entities.Address</class>\n    <class>com.apress.ejb.chapter03.entities.CustomerOrder</class>\n\
      <class>com.apress.ejb.chapter03.entities.Customer</class>\n    <exclude-unlisted-classes>true</exclude-unlisted-classes>\n\
      <properties>\n      <property name=\"eclipselink.ddl-generation\" value=\"create-tables\"\
  />\n    </properties>\n  </persistence-unit>\n</persistence>\n```\n\n编译、部署和测试 JPA\
