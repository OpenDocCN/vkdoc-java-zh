  /**\n   * <code>select object(o) from Wine o</code>\n   */\n  public List<Wine>\
  \ getWineFindAll() {\n    return em.createNamedQuery(\"Wine.findAll\", Wine.class).getResultList();\n\
    }\n\n/**\n   * <code>select object(wine) from Wine wine where wine.year = :year</code>\n\
     */\n  public List<Wine> getWineFindByYear(Integer year) {\n    return em.createNamedQuery(\"\
  Wine.findByYear\", Wine.class).setParameter(\"year\", year).    getResultList();\n\
    }\n\n/**\n   * <code>select object(wine) from Wine wine where wine.country = :country</code>\n\
     */\n  public List<Wine> getWineFindByCountry(String country) {\n    return em.createNamedQuery(\"\
  Wine.findByCountry\", Wine.class).setParameter(\"country\", country).    getResultList();\n\
    }\n\n/**\n   * <code>select object(wine) from Wine wine where wine.varietal =\
  \ :varietal</code>\n   */\n  public List<Wine> getWineFindByVarietal(String varietal)\
  \ {\n    return em.createNamedQuery(\"Wine.findByVarietal\", Wine.class).setParameter(\"\
  varietal\",     varietal).getResultList();\n  }\n}\n```\n\n购物车组件\n\n\n\n`ShoppingCartBean`\
  \ 是一个有状态会话 Bean，并使用扩展的持久化上下文。该 Bean 保存了已登录系统且当前正在向购物车添加或移除葡萄酒商品的客户状态。一旦客户提交订单，`ShoppingCartBean`\
  \ 会将客户信息发送给订单处理外观，由后者负责处理订单。我们决定在此用例中使用有状态会话 Bean，原因如下：\n\n*   有多种类型的客户端应用程序访问后端应用程序（Web、Swing\
  \ 和命令行客户端）。\n*   我们希望展示 EJB 有状态会话 Bean 在典型应用程序中的用法。\n\n![image](img/sq.jpg) **注意**  \
  \ 通常，人们普遍认为有状态会话 Bean 在存储状态方面有些重量级（与使用 HTTP 会话为 Web 客户端在客户端存储状态相比）。有证据表明，有状态会话 Bean\
  \ 在性能或事务方面并不会带来巨大的成本。（有关此主题的全面介绍，请参阅 Peter Zadrozny 所著的 *J2EE Performance Testing\
  \ with BEA WebLogic Server* [Apress, 2003]。）\n\n`ShoppingCartBean` 拥有以下小节中描述的业务方法。\n\
  \n查找客户\n\n清单 7-4 展示了 `ShoppingCartBean` 中的 `findCustomer()` 方法。此方法使用注入的 `CustomerFacadeBean`\
  \ 并调用 `findCustomerByEmail()` 方法来获取一个实例，在我们的案例中，该实例恰好是一个 `Individual` 子实体。一旦检索到\
  \ `Customer`，它就会被分配给一个类级别的属性，以便随后可以通过此有状态会话 Bean 上的其他方法引用它。因为我们使用的是扩展的持久化上下文，所以此实例将在\
  \ Bean 的整个生命周期内（跨越事务边界）保持受管状态，除非它被主动从持久化上下文中移除。\n\n***清单 7-4.***  findCustomer 业务方法\n\
  \n```\npublic Customer findCustomer(String email) {\n  customer = customerFacade.getCustomerFindByEmail(email);\n\
    return customer;\n}\n```\n\n添加葡萄酒商品\n\n清单 7-5 展示了 `ShoppingCartBean` 中的 `addWineItem()`\
  \ 方法。客户端应用程序调用此业务方法，以将特定的葡萄酒商品及其数量添加到购物车。代码创建了一个新的 `CartItem` 实体实例，并使用 `CartItem`\
  \ 中的 setter 方法设置了数量、葡萄酒和创建时间。\n\n![image](img/sq.jpg) **注意**   快速回顾一下实体实例的三种状态：受管、分离和新建。受管实例是被持久化上下文主动引用的实例，对该实例所做的所有更改都由持久化上下文跟踪。当持久化上下文与数据库同步时，在受管实例中发现的所有待处理更改都会通过\
  \ SQL 语句刷新到数据库。分离的实体实例是不再被持久化上下文引用的实例，因此其更改不会被跟踪。如果客户端修改了分离的实例，客户端需要确保这些更改被合并到受管实例中（例如，通过\
  \ `EntityManager.merge()` 调用），否则这些更改将永远不会与数据库同步。新建的实体实例类似于分离的实例，只是它尚未持久化到数据库中。\n\
  \n`addWineItem()` 方法使用指定的属性创建一个新的 `CartItem`，并将其添加到 `Customer` 实例中。因为我们查询了 `Customer`\
  \ 实例并将其缓存在有状态会话 Bean 的类级别变量中，所以我们可以依赖它处于受管状态。`ShoppingCartBean` 使用容器管理的事务，并且 `addWineItem()`\
  \ 方法默认使用 `TransactionAttributeType.REQUIRED`，因此在此方法执行期间将启动并提交一个事务。提交时，持久化上下文将与数据库同步，并且受管\
  \ `customer` 实例中的任何待处理更改都将被推送到数据库。由于 `Customer` 的 `cartItemList` 属性上的级联规则，任何引用的\
  \ `CartItem` 实例也将被持久化。因此，此方法调用的结果将是在 `CartItem` 的表中新增一行，该行带有对 `Customer` 表（或 `Individual`\
  \ 表，具体取决于实体继承层次结构的映射方式）的外键引用。\n\n***清单 7-5.***  addWineItem 业务方法\n\n```\npublic\
  \ void addWineItem(Wine wine, int quantity) {\n  CartItem cartItem = new CartItem(quantity,\
  \ wine);\n  customer.addCartItem(cartItem);\n}\n```\n\n移除葡萄酒商品\n\n清单 7-6 展示了 `ShoppingCartBean`\
  \ 中的 `removeWineItem()` 方法。此方法允许客户端应用程序在最终用户（通过用户界面）请求时从购物车中移除商品。同样，因为 `customer`\
  \ 属性是一个受管实例，所以对其应用的任何更改都将在此方法结束时（即在此方法开始时创建的 CMT 事务提交时）持久化。\n\n***清单 7-6.***  removeWineItem\
  \ 业务方法\n\n```\npublic void removeWineItem(CartItem cartItem) {\n  customer.removeCartItem(cartItem);\n\
  }\n```\n\n向订单处理外观提交订单\n\n清单 7-7 展示了 `ShoppingCartBean` 中的 `sendOrderToOPC()` 方法。当最终用户最终决定购买一种或多种葡萄酒时，客户端应用程序调用此方法来提交订单。此方法使用注入的\
  \ `OrderProcessFacadeBean` 并调用 `processOrder()` 方法，通过传递 `customer` 对象来提交订单。\n\n\
  ![image](img/sq.jpg) **注意**   `sendOrderToOPC()` 方法命名的理由是，接收采购订单的 `OrderProcess\
  \ FacadeBean` 实际上充当了“订单处理中心”。考虑到这一点，我们决定将“订单处理中心”缩写为 OPC，以避免方法名过长。\n\n***清单 7-7.***  sendOrderToOPC\
  \ 业务方法\n\n```\npublic String sendOrderToOPC() {\n  String result = null;\n  try\
  \ {\n    orderProcessFacade.processOrder(customer);\n    result = \"您的订单已提交 - 您将通过电子邮件收到状态通知\"\
  ;\n  } catch (Exception ex) {\n    ex.printStackTrace();\n    result = \"处理您的订单时发生错误。请联系客户服务。\"\
  ;\n  }\n\nreturn result;\n}\n```\n\n检索客户的购物车商品\n\n清单 7-8 展示了 `ShoppingCartBean`\
  \ 中的 `getCartItems()` 方法。此方法从 `customer` 字段（可以是 `Individual` 或 `Distributor` 实体类型）检索当前的购物车商品列表。当我们构建一个\
  \ JSF 应用程序时，此方法将非常有用，我们可以在客户提交订单之前在用户界面中显示所有购物车商品。\n\n***清单 7-8.***  getCartItems\
  \ 业务方法\n\n```\npublic List<CartItem> getCartItems() {\n  return customer.getCartItemList();\n\
  }\n```\n\n`ShoppingCartBean` 的完整代码如清单 7-9 所示。\n\n***清单 7-9.***  ShoppingCartBean.java\n\
  \n\n\n```\n@Stateful(name = \"ShoppingCart\", mappedName = \"Chapter07-IntegratedSamples-Chapter07-ServiceIntegration-ejb-ShoppingCart\"\
