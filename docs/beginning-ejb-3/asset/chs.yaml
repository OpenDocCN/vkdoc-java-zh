  \ 所示。现在，我们将部署并执行这个完整的应用，并逐步浏览我们开发的、用于访问 EJB 后端应用的各个界面。\n\n编译、部署和测试 JSF 应用\n\nJSF\
  \ 应用需要先打包成 Web 归档（WAR）文件，然后才能组装成企业归档（EAR）文件，后者包含了应用所需的所有模块和库。大多数应用服务器都提供了部署工具或 Ant\
  \ 任务，以便于将 EJB 部署到其容器中。像 JDeveloper、NetBeans 和 Eclipse 这样的 Java 集成开发环境（IDE）也提供了部署功能，允许开发者将应用打包、组装并部署到应用服务器上。\n\
