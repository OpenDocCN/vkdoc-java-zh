  **Grinder 控制台**\n\n启动控制台的另一种方法是，将目录切换到 `C:\\grinder\\lib`，然后执行以下命令来启动控制台：\n\n```\n\
  java –classpath grinder.jar net.grinder.Console\n```\n\n控制台左上角有几个按钮，用于指示 Grinder\
  \ 代理启动或重置工作线程（即模拟用户）。将鼠标悬停在按钮上时，会显示该按钮功能的描述。图 9-8 显示了性能测试执行期间的 Grinder 控制台及其通常显示的信息。\n\
  \n![9781430246923_Fig09-08.jpg](img/9781430246923_Fig09-08.jpg)\n\n图 9-8.  Grinder\
  \ 控制台\n\n为了确保一切正常，请先使用一个模拟用户运行一个周期进行快速测试（配置数据库后，请参见上面的“数据库”部分）。步骤如下：\n\n\n\n1. \
  \ 使用以下 URL 重置数据库：`http://yourserver:port/Chapter09-PerformanceJoined-war/ResetJoinedData`\n\
  2.  重置 Glassfish 服务器。\n3.  启动 Grinder 控制台：`java -classpath` <classpath_to_the_grinder></classpath_to_the_grinder>`net.grinder.Console`\n\
  4.  编辑 `grinder.properties` 文件，并确认你只设置了一个用户和一个循环。\n5.  通过输入以下命令启动 Grinder 代理和 Grinder\
  \ 控制台：`java -classpath` <classpath_to_the_grinder></classpath_to_the_grinder>`net.grinder.Grinder`\n\
  6.  点击 Grinder 控制台上的启动按钮。控制台上不会显示任何结果，因为它只会运行一个循环。\n7.  检查你启动 Grinder 代理的窗口。当它显示已完成并正在等待控制台信号时，点击\
  \ Grinder 控制台上的重置按钮。\n8.  进入日志目录，查看以 `out` 开头的文件。该文件包含整个测试运行的摘要，包括统计数据。如果出现问题，此文件和错误文件将为你提供解决问题所需的信息。\n\
  \n在为每个测试运行完这些步骤一次后，你可能需要更新每个测试应用的两个 JPA 项目中的 `persistence.xml` 文件，以关闭表生成。我们保留此标志为开启状态，以便在首次运行\
  \ `ResetJoinedData/ResetSingleTableData` servlet 时创建表。在运行每个脚本一次以创建持久化单元的表之后，你可以避免因后续每次运行时表已存在而产生的开销（以及发出的警告）。\n\
  \n现在一切就绪，你可以继续下一步了。\n\n初步测试\n\n这第一组测试的目的是熟悉应用程序及其行为，并发现测试脚本或应用程序可能存在的任何潜在问题。由于我们正在测试继承的两种不同实现，因此对于这些初步测试，使用哪种实现并不重要，所以我们选择使用多表实现来进行初始测试。我们已经使用一个用户运行了一个循环的测试。现在，我们可以继续进行无限循环的测试运行，并让它运行几分钟。然后，我们将继续测试多个并发用户运行一个循环的情况。这样做是为了确保应用程序和测试脚本能够正确处理并发。我们通常会选择\
  \ 10 个用户。之后，我们将测试 10 个用户无限循环运行几分钟。一旦这些测试成功完成，我们就知道测试脚本和应用程序运行正常，可以准备进行下一步了。\n\n\
  我们旨在选择具有代表性的用户数量，进行大约六次快速测试运行，以便清晰地展示随着用户负载增加，应用程序的行为变化。\n\n在处理完整应用程序的性能测试时，我们通常会寻找达到或超过最大可接受响应时间时的用户上限。由于这是一次面向性能设计的测试，并且我们在测试脚本中没有使用任何思考时间，因此我们将专注于找到应用程序达到饱和点的用户数量。策略（如果可以这样称呼的话）是随机选择一个用户数量。\n\
  \n测试运行时间很短，因为我们不需要精确的上限数字，只需要一个近似值。在这种情况下，我们选择从 100 个并发用户开始，并将从测试运行中收集 2.5 分钟的数据。由于我们使用的采样间隔是\
  \ 5 秒，我们只需在 Grinder 控制台的“永久收集样本”框中输入 **30**。输入 30 后，该框的标题将变为“30 个样本后停止”。为简单起见，我们不会排除初始数据。为此，我们在\
  \ Grinder 控制台的“忽略样本”框中输入 **0**。收集到的统计数据将呈现略高于正常值的数值。这不是问题，因为这些测试只是初步的。遵循最佳实践，我们在每次性能测试前都会重置数据库和\
  \ Glassfish 服务器。\n\n我们开始第一次测试运行，得到的 AART 为 737 毫秒。\n\n![image](img/sq.jpg) **注意**  \
  \ 你可以在控制台左列底部（以图形方式显示 TPS 的方块的左侧）找到此信息，其标题为“(mean)”。\n\nTTR 为 137（你可以在找到 AART 的同一位置找到此信息，其标题为“TPS\
  \ (mean)”）。接下来，我们将尝试使用 120 个用户。为此，我们修改 `grinder.properties` 文件，将 `grinder.threads`\
  \ 属性更改为 120。我们进行下一次运行，得到的 AART 为 911 毫秒，TTR 为 133。由于 120 个用户的 TTR 低于 100 个用户，我们知道饱和点大约在\
  \ 100 个用户或更少，因此我们的下一次测试运行将使用 80 个用户。\n\n在 `grinder.properties` 文件中更改用户数量后，我们开始测试运行。我们得到的\
  \ AART 为 593 毫秒，TTR 为 136。这些结果表明饱和点大约在 100 个用户左右，因此我们将以此作为上限。（选择 100 个用户作为初始测试点，真是幸运的猜测！）\n\
  \n基于此信息，我们选择 40 个用户作为下限，100 个用户作为上限。测试运行将分别使用 40、60、80、100、120 和 140 个用户进行。这将为我们提供六个参考点，应该能清晰地展示应用程序的行为。\n\
  \n样本量\n\n现在我们已经选择了并发用户的上限和下限，我们需要确定测试应该运行多长时间。这相当简单。我们只需要执行一次测试运行，其运行时间要比我们之前选择的\
  \ 2.5 分钟更长。根据我们对此类测试的经验，大约 7 分钟通常是一个不错的选择。测试运行将使用上限，即 100 个用户。\n\n测试运行结束后，我们获取由\
  \ *The Grinder* 生成的数据文件，该文件包含每次测试中每个模拟用户的单独响应时间。此文件可以在日志目录中找到，文件名以 `data` 开头。接下来，我们绘制一条曲线，显示测试时间段内的\
  \ AART。此测试运行的结果如图 9-9 所示。在这里，我们可以看到响应时间曲线在测试开始后约 60 秒处趋于稳定。\n\n![9781430246923_Fig09-09.jpg](img/9781430246923_Fig09-09.jpg)\n\
  \n图 9-9.  样本量分析图表，绘制测试时间段内的 AARP\n\n我们还可以看到，曲线在 60 秒标记后保持相当稳定，在 240 秒标记后极其稳定。因此，我们决定测试运行将持续\
  \ 240 秒（4 分钟——既好又短），其中我们将忽略前 60 秒。由于我们在 Grinder 控制台中将样本大小定义为 5 秒，这意味着我们将忽略 12 个样本并收集\
  \ 36 个样本。\n\n校准\n\n\n\n现在我们来计算性能测试的准确度。由于我们将基于三次使用上限的测试运行来进行，因此只需额外进行两次运行。我们可以利用前一次运行中的适当数据来确定样本量。\n\
  \n![image](img/sq.jpg) **提示**   根据我们的经验，使用此方法产生的典型误差范围在 5%到 10%之间。当测试脚本中存在思考时间时，误差范围往往会增大。在这些情况下，数值高达\
  \ 30%的情况并不罕见。\n\n表 9-1 和 表 9-2 显示了从测试运行中收集到的 AART 和 TTR 结果的差异。\n\n表 9-1. 误差范围 (AART)\n\
  \n![table](img/Table9-1.jpg)\n\n表 9-2. 误差范围 (TTR)\n\n![table](img/Table9-2.jpg)\n\
  \n这些表格中最大的差异是 100.7%（例如，TTR 表中运行 2 与运行 1 的对比）和 99.9%（例如，AART 表中运行 3 与运行 1 的对比）。因此，本次性能测试的官方误差范围为\
  \ 0.7%，这是一个非常好的数值。\n\n实际测试运行\n\n现在我们已经完成了所有准备工作，可以开始运行正式测试了，这些测试将让我们了解哪种继承模型在极端压力条件下表现最佳。\n\
  \n性能测试的这一部分比较机械且相当枯燥。第一步是启动 Grinder 控制台，并确保测试参数设置正确。首先，我们验证采样间隔是否设置为 5000 毫秒。接下来，我们检查是否忽略了\
  \ 12 个样本（每个样本 5 秒，总计我们之前选择的 60 秒）。然后，我们选择在收集 36 个样本后停止数据收集（每个样本 5 秒，总计我们之前选择的 180\
  \ 秒）。\n\n每次测试运行需要遵循的步骤如下：\n\n1.  根据继承模型，使用相应的 URL 重置数据库：\n\n```\n    http://yourserver:port/Chapter09-PerformanceJoined-war/ResetJoinedData\n\
  \nhttp://yourserver:port/Chapter09-PerformanceSingleTable-war/ResetSingleTableData\n\
  \    ```\n\n2.  重启 GlassFish 服务器。\n3.  编辑 `grinder.properties` 文件，并修改用户数量。\n4. \
  \ 点击 Grinder 控制台上的“开始捕获统计信息”按钮。这将清除前一次运行的所有结果。\n5.  点击 Grinder 控制台上的“启动进程”按钮。\n\
  6.  等待数据收集完成。一个很好的指示是，当左侧面板中央的线条从绿色的“正在收集样本：XX”变为红色的“正在忽略样本：XX”时。\n7.  点击 Grinder\
  \ 控制台上的“重置进程”按钮。此步骤实际上会停止模拟用户的执行。\n8.  点击“保存结果”按钮。提供一个描述性的文件名，并保存控制台上显示的结果以供后续分析。\n\
  9.  回到此列表的开头重新开始。\n\n完成 `JOINED` 表继承策略的所有测试运行后，您可以继续为 `SINGLE_TABLE` 继承方案的一组测试运行进行所有准备工作。\n\
  \n如前几节所述，我们两个测试之间的区别在于 O/R 映射注解和数据库模式。一旦应用程序准备好进行下一组测试运行，只需重复您为上一组测试运行所做的步骤即可。\n\
  \n分析结果\n\n我们必须首先声明，本章呈现的结果并非旨在推崇某一种继承方法优于另一种。它们仅用于说明如何应用该方法以及如何使用 Grinder 工具包。正因如此，我们在进行此性能测试时，对哪种继承模型表现更好没有任何预期。\n\
  \n我们首先回顾 100 个用户的多表继承测试运行结果，以此开始分析。这些结果显示在表 9-3 中。\n\n表 9-3. 多表，100 用户结果\n\n| 100\
  \ 用户 | ART | TPS |\n| --- | --- | --- |\n| 请求 1 | 1,240 | 34.1 |\n| 请求 2 | 594 |\
  \ 34.1 |\n| 请求 3 | 549 | 34.1 |\n| 请求 4 | 543 | 34.1 |\n| 总计 | 732 | 136 |\n\n有两件事应该会很快引起您的注意。第一是获取应用程序主页所需的时间很长——略超过\
  \ 1 秒——尤其是与测试脚本中所有其他响应时间相比。这可以解释为，在设置主页时，虽然简单，但涉及将数据从服务器发送到浏览器，这通常被认为比更新购物车更耗费资源。接下来应该引起您注意的是结账过程持续不到\
  \ 1 秒。虽然这对于一个验证库存并执行其他与结账相关操作的流程来说是一个理想的时间，但事实是这个测试系统上的库存并不多。\n\n查看 100 个用户的单表继承模型测试运行结果（显示在表\
  \ 9-4 中），您可以看到类似的行为模式，因此至少是一致的。\n\n表 9-4. 单表，100 用户结果\n\n| 100 用户 | ART | TPS |\n\
  | --- | --- | --- |\n| 请求 1 | 1,320 | 33.4 |\n| 请求 2 | 580 | 33.4 |\n| 请求 3 | 540\
  \ | 33.5 |\n| 请求 4 | 543 | 33.6 |\n| 总计 | 745 | 134 |\n\n这部分分析仅限于审查每个单独的请求，并且通常使用在用户上限的测试运行中收集的结果来完成。下一步是分析我们选择的所有用户负载下的\
  \ AART 和 TTR。我们从使用多表继承模型的结果开始，如表 9-5 所示。\n\n表 9-5. 多表，所有用户结果\n\n| 用户 | AART | TTR\
  \ |\n| --- | --- | --- |\n| 40 | 291 | 137 |\n| 60 | 438 | 137 |\n| 80 | 584 | 137\
  \ |\n| 100 | 732 | 136 |\n| 120 | 919 | 130 |\n| 140 | 1,120 | 125 |\n\n从该表可以看出，饱和点从性能测试一开始就达到了，这相当不寻常。这意味着继承模型从一开始就吞噬了所有可用资源。\n\
  \n让我们回顾一下单表继承模型的结果，以便进行一些比较。它们显示在表 9-6 中。\n\n表 9-6. 单表，所有用户结果\n\n| 用户 | AART | TTR\
  \ |\n| --- | --- | --- |\n| 40 | 296 | 135 |\n| 60 | 446 | 135 |\n| 80 | 592 | 134\
  \ |\n| 100 | 745 | 134 |\n| 120 | 908 | 132 |\n| 140 | 1,120 | 125 |\n\n我们再次看到从一开始就出现相同的饱和模式。这可以归因于\
  \ Derby 数据库和内存使用情况。还可以看到，总事务速率和聚合平均响应时间都略低于多表继承模型。\n\n这种比较可以更清晰地体现在图 9-10 和图 9-11\
  \ 所示的图表中，其中图 9-10 包含两组 AART 结果的比较；图 9-11 包含 TTR 的比较。\n\n![9781430246923_Fig09-10.jpg](img/9781430246923_Fig09-10.jpg)\n\
  \n图 9-10.  AART 比较\n\n在图 9-10 中，聚合平均响应时间 (AART) 几乎相同，因此我们必须仔细查看总事务速率 (TTR)，以尝试理解在我们正在进行的性能测试条件下，哪种模型更有利。\n\
  \n\n\n![9781430246923_Fig09-11.jpg](img/9781430246923_Fig09-11.jpg)\n\n图 9-11.  TTR\
  \ 对比\n\n在图 9-11 中，单表模型不仅比多表模型更快达到饱和点，而且其总事务率也略低于多表模型。如您所见，单表模型在 60 个并发用户时开始性能下降，而多表模型则在\
  \ 80 个并发用户时才开始下降。然而，多表模型出现大幅下降的时间更早。根据收集的数据，我们可以得出结论：`JOINED`（即多表）继承模型在高压力条件下表现略优。\n\
  \n结论\n\n在本章中，我们介绍了 *The Grinder*（一种执行性能测试的方法论）以及一个用于生成性能测试负载的工具包。我们通过一个使用该方法和工具包的性能测试示例进行了讲解。具体来说，我们讨论了性能标准，并回顾了两个性能指标：响应时间和吞吐量。我们涵盖了应用程序使用情况的模拟，讨论了测试脚本和思考时间。我们还涉及了测试指标的定义，例如用户数量、样本大小和数据排除，以及如何确定性能测试的准确性。\n\
  \n为了说明该方法的使用，我们使用前几章创建的应用程序进行了一个详细的案例研究，并比较了两种继承策略。\n\n在下一章中，我们将探讨上下文与依赖注入（CDI），以及如何利用它来增强\
  \ EJB 和应用程序开发体验。\n\n第 10 章\n\n![image](img/frontdot.jpg)\n\n上下文与依赖注入\n\n在本章中，我们将讨论*上下文与依赖注入*（CDI）。CDI\
  \ 提供了强大的服务，用于将 Java EE 框架的各个层*粘合*在一起。JSR 299 中定义的*Java 平台上下文与依赖注入*的第一个公开草案于 2008\
  \ 年发布。在最初的开发阶段，JSR 299 规范被称为 *Web Beans*。在规范更名为上下文与依赖注入后，最初的参考实现被命名为 *Web Beans*。在两种不同上下文中使用相同名称\
  \ Web Beans 在社区成员中造成了一些混淆，这导致参考实现从 Web Beans 更名为 *Weld*。CDI 建立在拦截器规范（JSR 318）、托管\
  \ Bean 规范（JSR 316）和 Java 依赖注入规范（JSR 330）之上。\n\n您可能会想，为什么我们在本书中包含了关于 CDI 的一章。这有两个原因：首先，最初在\
  \ EJB 中引入的依赖注入行为在 CDI 中得到了增强；其次，CDI 通过为应用程序提供*上下文*功能来补充 EJB。EJB 则通过为应用程序提供安全、事务管理和可伸缩性等企业级服务来补充\
  \ CDI。如果应用程序开发者*明智地*决定何时使用 CDI、EJB 或两者兼用，那么最终生成的应用程序将既灵活又具有可伸缩性。\n\n完成本章后，您将深入了解以下领域：\n\
  \n*   CDI 基础\n*   CDI 与 EJB 的关系\n*   部署和执行 CDI 客户端\n\n什么是 CDI？\n\n在 CDI 出现在 Java\
  \ EE 领域之前，Java EE 技术的三个层——即 Web 层、业务层和持久化层——之间没有一种简单的方式能够以松散耦合但类型安全的方式相互交互。Web 层没有适当的机制来支持事务，因为它专注于呈现内容，并且对事务资源的访问有限。CDI\
  \ 服务有助于统一企业 JavaBean（EJB）和 JavaServer Faces（JSF）编程模型。CDI 服务允许企业 JavaBean 在 JavaServer\
  \ Faces 框架中用作托管 Bean。CDI 还为访问事务资源提供了良好的支持，这有助于使用 Java 持久化 API 轻松创建 Web 应用程序。CDI\
  \ 弥合了这一差距。使用 CDI，Web 层可以直接与业务层和持久化层中的 Bean 进行交互。这就是 CDI 最初被命名为 Web Beans 的原因。\n\n\
  图 10-1 展示了 CDI 出现在 Java EE 领域之前 Java EE 应用程序的架构，而图 10-2 展示了 CDI 出现后 Web 层和业务层如何交互。\n\
  \n![9781430246923_Fig10-01.jpg](img/9781430246923_Fig10-01.jpg)\n\n图 10-1.  CDI\
  \ 之前的 Java EE 应用程序架构\n\n![9781430246923_Fig10-02.jpg](img/9781430246923_Fig10-02.jpg)\n\
  \n图 10-2.  CDI 应用程序架构\n\nCDI 提供的两个重要特性体现在其名称中：\n\n*   **上下文**：涉及将有状态组件（如有状态会话 Bean）绑定到定义明确的作用域。有状态组件是指在多次调用之间保留信息的组件。CDI\
  \ 容器将有状态组件与特定的作用域关联起来——在需要时创建它们，在它们超出作用域时销毁它们。因此，客户端无需承担管理有状态组件生命周期的负担。\n*   **依赖注入**：涉及以松散耦合但类型安全的方式将组件注入到应用程序中。被注入的组件由容器实例化，这意味着用户无需使用\
  \ *new* 来创建组件的实例。用户可以使用接口而不是接口的实际实现来进行注入。这允许用户将需要注入的 Bean 类型的具体实现的选择推迟到部署或运行时。\n\
  \n清单 10-1、10-2 和 10-3 以最简单的形式演示了“上下文”和“依赖注入”的概念。在本章的后续部分，我们将以此示例为基础来演示 CDI 的各种特性。清单\
  \ 10-1 定义了一个 `Wine` 接口，该接口由 `RedWine` 类实现，如清单 10-2 所示。\n\n***清单 10-1.***  Wine.java\n\
  \n```\npackage com.apress.ejb.chapter10;\n\npublic interface Wine {\n   public String\
  \ getColor();\n}\n```\n\n`RedWine` 类演示了 CDI 的“上下文”方面。它带有 `ApplicationScoped` 注解，这意味着当应用程序被实例化时，`RedWine`\
  \ 的实例只会被创建一次，并且该实例将在应用程序关闭时被销毁。在应用程序的生命周期内，该实例将在整个应用程序中共享。我们将在本章后面进一步了解作用域。\n\n\
  ***清单 10-2.***  RedWine.java 演示了上下文方面\n\n```\npackage com.apress.ejb.chapter10;\n\
  \nimport javax.enterprise.context.ApplicationScoped;\n\n@ApplicationScoped\npublic\
  \ class RedWine implements Wine {\n   public String getColor() {\n       return\
  \ \"Red\";\n   }\n}\n```\n\n\n\n清单 10-3 所示的客户端使用 `@Inject` 注解注入字段 `newWine`。通过 `@Inject`\
  \ 注解注入的字段由容器实例化，这意味着用户无需使用 *new* 创建对象实例，也*不需要对实际实现类存在编译时依赖*。这里需要注意的一个重要点是，`newWine`\
  \ 字段的类型是 `Wine`。在这种特定情况下，容器会自动使用 `RedWine` 实现进行实例化。如果我们必须用传统方式实例化 `RedWine`，那么我们将不得不使用\
  \ `RedWine` 实现而不是 `Wine` 接口。结果，客户端和 `Wine` 对象之间将存在紧密耦合，这种耦合在部署时或运行时都无法更改。在本章后面讨论依赖注入时，我们将进一步了解\
  \ CDI 容器如何*知道*要注入哪个实现。\n\n***清单 10-3.***  WineClient.java 演示了依赖注入方面\n\n```\npackage\
  \ com.apress.ejb.chapter10;\n\nimport javax.inject.Inject;\n\npublic class WineClient\
  \ {\n   // 传统方式实例化\n   private Wine oldWine = new RedWine();\n\n// 通过字段依赖注入实例化\n\
     @Inject\n   private Wine newWine;\n}\n```\n\n作为参考，CDI 规范还定义了以下服务。对这些高级 CDI 主题的更详细解释超出了本章的范围，但鼓励您参考\
  \ CDI 规范以获取更多信息。\n\n*   通过统一表达式语言 (EL) 将 Web 层与上下文对象集成\n*   实现 bean 并可以通过业务方法拦截这些\
  \ bean 调用的装饰器\n*   用于将业务逻辑与横切关注点分离的拦截器\n*   定义 bean 之间以松散耦合方式进行交互的事件通知模型\n*   通过可移植扩展与容器进行干净交互的能力\n\
  \n与 EJB 的关系\n\nCDI 弥合了由 Servlet、JSP 和 JSF 组成的 Web 层与由 EJB 和 JPA 组成的企业层之间的差距。Servlet、JSP\
  \ 和 JSF 负责内容呈现，但不具备事务管理和持久化功能。另一方面，EJB 和 JPA 支持与数据库相关的操作，如提交、回滚和其他事务管理功能。使用 CDI，Web\
  \ 应用程序可以使用会话 Bean 作为*外观*来执行 JPA 支持的数据库相关操作。\n\n会话 Bean 像*托管 Bean* 一样参与 CDI 生命周期。会话\
  \ Bean 可以注入到其他会话 Bean 和托管 Bean 中。托管 Bean 可以注入到会话 Bean 中。用户在决定使用会话 Bean 还是托管 Bean\
  \ 时应谨慎。当应用程序需要以下高级企业服务时，应使用会话 Bean：\n\n*   基于角色的安全性\n*   事务管理\n*   通过实例池实现可伸缩性\n\
  *   并发性\n*   事件和定时器\n\n对于需要依赖注入、生命周期管理和拦截器的应用程序，托管 Bean 就足够了。通过添加 `@Stateless`、`@Stateful`\
  \ 或 `@Singleton` 注解，可以轻松地将托管 Bean 升级为会话 Bean。\n\n![image](img/sq.jpg) **注意**  消息驱动\
  \ Bean 和实体是非上下文对象，不能注入到其他对象中。消息驱动 Bean 利用了 CDI 的一些特性，例如拦截器和装饰器，因为容器会对所有托管 Bean 实例（包括非上下文实例）执行注入。\n\
  \nCDI 概念\n\n现在我们对 CDI、它在 Java EE 堆栈中的位置以及它与 EJB 的关系有了基本的了解，让我们详细了解一下上下文和依赖注入。\n\n\
  Bean 和 beans.xml\n\nBean 是包含业务逻辑的容器管理组件：例如，托管 Bean 和会话 Bean。读者需要注意，CDI 并*没有*引入一种名为“CDI\
  \ Bean”的、具有自己独特组件模型的新 Bean 类型。CDI 提供了一组服务，这些服务可以被托管 Bean 和 EJB（由其现有组件模型定义）使用。CDI\
  \ 容器识别在各个部署模块中找到的 Bean 的过程称为 *bean 发现*。容器通过 bean 发现发现的 Bean 参与 CDI 生命周期。这些 Bean\
  \ 的生命周期由容器根据 CDI 规范进行管理。\n\n![image](img/sq.jpg) **注意**  在本章中，除非另有说明，“bean”一词指的是参与\
  \ CDI 生命周期的 Java Bean。\n\n如果容器在 WAR 文件的 `WEB-INF` 目录或 JAR 文件的 `META-INF` 目录中检测到\
  \ `beans.xml` 文件，则模块内的 Bean 将参与 CDI 生命周期。模块中存在 `beans.xml` 有助于容器快速隔离与 CDI 相关的模块，从而加快\
  \ bean 发现速度。CDI 并*不*要求 `beans.xml` 声明模块中可用的 Bean；`beans.xml` 可以为空。CDI 工件（如替代项、拦截器和原型）如果需要，则在\
  \ `beans.xml` 中声明。\n\nCDI 容器为其 Bean 提供以下服务：\n\n*   透明的创建、销毁和作用域管理\n*   注入到 Java\
  \ 客户端时，通过限定符进行类型安全的作用域解析\n*   在 JSF 客户端的统一 EL 表达式中使用时，通过名称进行类型安全的作用域解析\n*   生命周期回调\n\
  *   自动注入其他 Bean 实例\n*   拦截和装饰\n*   事件通知\n\n通过声明一个类级别字段并使用 `javax.inject.Inject`\
  \ 注解对其进行注解，可以将 Bean 注入到其他 Bean 和客户端中。Bean 也可以通过使用 `javax.inject.Named` 注解进行注解，通过统一\
  \ EL 表达式与 Web 层技术（如 JSP 和 JSF）一起使用。\n\n作用域\n\n对象的作用域决定了该对象各个实例的生命周期。包含有状态对象实例的应用程序需要这些实例在定义的时间段内保持其状态。作用域决定了何时应创建\
  \ Bean 实例以及容器何时应销毁它。\n\nCDI 有以下五种作用域类型：\n\n应用程序作用域\n\n应用程序作用域 Bean 的状态在应用程序的所有用户之间共享。应用程序作用域的对象在应用程序的生命周期内仅创建一次——第一次被注入时——并且仅在应用程序关闭时被销毁。应用程序作用域使用\
  \ `@javax.enterprise.context.ApplicationScoped` 注解声明。\n\n请求作用域\n\n请求作用域 Bean 的状态由单个请求中涉及的所有\
  \ Bean 共享。请求作用域的 Bean 每个请求创建一次，并在该请求完成后销毁。请求作用域使用 `@javax.enterprise.context.RequestScoped`\
  \ 注解声明。\n\n会话作用域\n\n会话作用域 Bean 的状态在同一 HTTP 会话内的多个请求之间共享。会话作用域的 Bean 在 HTTP 会话开始时创建，并在\
  \ HTTP 会话关闭或超时时销毁。会话作用域使用 `@javax.enterprise.context.SessionScoped` 注解声明。\n\n对话作用域\n\
  \n\n\n会话作用域（conversation-scoped）Bean 的状态在 JSF 请求或非 JSF 请求的所有标准生命周期阶段中共享。一个 JSF 请求仅与一个会话相关联。任何会话都可以处于*临时*状态或*长期运行*状态。临时状态是会话的默认状态。通过调用\
  \ `Conversation.begin()` 将会话标记为长期运行，通过调用 `Conversation.end()` 将其标记为临时状态。在 JSF 请求结束时，会话作用域对象必须处于临时状态才能被销毁。会话作用域通过\
  \ `@javax.enterprise.context.ConversationScoped` 注解声明。\n\n依赖伪作用域\n\n依赖作用域是默认作用域，当未显式定义作用域时，容器会应用该作用域。具有依赖作用域的\
  \ Bean 实例仅绑定到一个对象。此类 Bean 的实例会随着关联对象的创建和销毁而同步创建和销毁。这些 Bean 实例不会在客户端应用程序之间共享。依赖作用域通过\
  \ `@javax.enterprise.context.Dependent` 注解声明。\n\n![image](img/sq.jpg) **注意** 用户可以通过\
  \ `@javax.inject.Scope` 注解定义自定义作用域。\n\n使用 @Inject 进行依赖注入\n\n在引入依赖注入的 JSR 330 发布之前，需要依赖类服务的客户端要么必须实例化该类的具体实例，要么依赖外部模块在需要之前完成依赖装配。这会导致客户端与依赖类之间产生紧密耦合的编译时依赖，或者客户端依赖外部进程来适当地“配置”自身。通过依赖注入，客户端与依赖类之间的契约变得解耦，并且客户端对自身的初始化方式获得了一定控制权。客户端可以请求通过其接口注入资源，并依赖容器注入一个客户端未知的具体实现类的可接受实例。CDI\
  \ 通过引入一种方式（限定符，见下文），让客户端能够告知容器其对注入类所需的抽象特性，从而扩展了客户端控制其配置的能力。容器在运行时利用这些需求来决定注入哪个依赖类。这创建了一个更加松散耦合的系统，其中注入类的需求在客户端中以声明式和动态方式配置，并由容器在运行时绑定到实现类。\n\
  \n`@javax.inject.Inject` 注解定义了一个注入点，在 Bean 中有三个位置可以由 CDI 容器执行注入：在构造函数声明上初始化参数值、在方法声明上初始化参数值、以及在字段声明上初始化类成员。接下来我们将逐一探讨这些方式。\n\
  \nBean 构造函数参数注入\n\nCDI Bean 会指定其一个构造函数作为*Bean 构造函数*。这是 CDI 容器用于实例化 Bean 的构造函数。当我们向带有一个或多个参数的\
  \ Bean 构造函数添加 `@javax.inject.Inject` 注解时，就会发生 Bean 构造函数参数注入。如果 Bean 构造函数有多个参数，那么所有参数都是有效的注入点，这意味着容器必须为\
  \ Bean 构造函数的所有参数提供值。如果 Bean 类没有带 `@Inject` 注解的 Bean 构造函数，则默认（无参）构造函数会被用作 Bean 构造函数。\n\
  \n客户端应用程序可以绕过容器直接实例化 Bean。在这种情况下，显而易见的结果是返回的对象不与任何上下文绑定，并且新实例的生命周期不受容器管理。\n\n清单\
  \ 10-4 展示了如何使用 Bean 构造函数参数注入，用年份（vintage）`Wine` 类型初始化 `WineCellarClient` 类中的 `beanConstParaInjVintage`\
  \ 字段。\n\n![image](img/sq.jpg) **注意** CDI 容器将选择 `Wine` 接口的默认实现，并将该实现的一个实例传递给 `WineCellarClient`\
  \ Bean 构造函数。\n\n***清单 10-4.*** WineCellarClient.java\n\n```\npackage com.apress.ejb.chapter10;\n\
  \nimport javax.inject.Inject;\n\npublic class WineCellarClient {\n    private Wine\
  \ beanConstParaInjVintage;\n\n@Inject\n    WineCellarClient(Wine vintage)\n    {\n\
  \        this.beanConstParaInjVintage = vintage;\n    }\n}\n```\n\n初始化器方法参数注入\n\n\
  CDI 还可以在之后通过调用已标注 `@javax.inject.Inject` 注解的 Bean 方法来初始化 Bean 的属性。带有 `@javax.inject.Inject`\
  \ 注解的 Bean 方法被称为*初始化器方法*。初始化器方法必须是非抽象、非静态且非泛型的。初始化器方法可以有零个或多个参数。如果初始化器方法有多个参数，那么所有参数都是有效的注入点，并且\
  \ CDI 容器必须能够为所有参数提供值。Bean 类声明多个初始化器方法是合法的。\n\n客户端应用程序可以绕过容器直接调用初始化器方法。同样，在这种情况下，显而易见的结果是容器不会向该方法传递任何参数。\n\
  \n清单 10-5 展示了如何修改 `WineCellarClient` 类，使用初始化器方法参数注入代替 Bean 构造函数参数注入，以达到相同的结果。\n\n\
  ***清单 10-5.*** WineCellarClient.java\n\n```\npackage com.apress.ejb.chapter10;\n\
  \nimport javax.inject.Inject;\n\npublic class WineCellarClient {\n    private Wine\
  \ initParaInjVintage;\n\nWineCellarClient()\n    {\n    }\n\n@Inject\n    public\
  \ void setVintageWine(Wine vintage)\n    {\n        this.initParaInjVintage = vintage;\n\
  \    }\n}\n```\n\n字段注入\n\n最后，CDI 容器可以通过选择字段接口类型的明确实现来实例化类级别字段。通过使用 `@Inject` 注解标注类级别字段，可以对其进行注入。被注入的字段必须是\
  \ Bean 类或任何支持注入的 Java EE 组件类中的非静态、非 final 字段。\n\n清单 10-6 展示了字段注入如何简化 `fieldInjVintage`\
  \ 的初始化。\n\n***清单 10-6.*** WineCellarClient.java\n\n```\npackage com.apress.ejb.chapter10;\n\
  \nimport javax.inject.Inject;\n\npublic class WineCellarClient {\n    @Inject\n\
  \    private Wine fieldInjVintage;\n}\n```\n\n依赖解析\n\nCDI 规范保证了注入 Bean 的松散耦合和类型安全解析。CDI\
  \ 容器可以明确选择只有一个实现的 Bean 类型（类或接口）的实现。但一个 Bean 类型可能有多个实现。例如，我们可以添加另一个实现我们在清单 10-1 中创建的\
  \ `Wine` 接口的类 `WhiteWine`。\n\n***清单 10-7.*** WhiteWine.java\n\n```\npackage com.apress.ejb.chapter10;\n\
  \npublic class WhiteWine implements Wine {\n   public String getColor() {\n    \
  \   return \"White\";\n   }\n}\n```\n\n\n\n在引入 `WhiteWine` 实现后，我们的 `WineClient`（其中注入了\
  \ `Wine`）需要区分 `Wine` 的两种实现：即 `RedWine` 和 `WhiteWine`。当 CDI 容器无法隔离出需要在给定注入点注入的 bean\
  \ 类时，它会在部署时抛出*不满足或存在歧义的依赖*错误。这种歧义依赖问题可以通过使用以下三种解决方案中的任意一种来解决：\n\n*   限定符（用于编译时解析）\n\
  *   替代方案（用于部署时解析）\n*   生产者（用于运行时解析）\n\n限定符\n\n限定符类型通过提供编译时的多态性和运行时的动态绑定，使 CDI 组件能够以松散耦合的方式进行交互。限定符类型允许客户端指定要注入的实例的所需特性，而无需知道选择了哪个具体的实现类。\n\
  \n让我们通过一个示例来理解限定符。在清单 10-7 中添加 `WhiteWine` 类迫使容器抛出错误，因为容器无法决定是实例化 `RedWine` 还是 `WhiteWine`\
  \ 实现。我们将使用一个限定符来解决此依赖问题。清单 10-8 展示了一个名为 `Red` 的用户自定义限定符。\n\n***清单 10-8.***  Red.java\n\
  \n```\npackage com.apress.ejb.chapter10;\n\nimport static java.lang.annotation.ElementType.TYPE;\n\
  import static java.lang.annotation.ElementType.FIELD;\nimport static java.lang.annotation.ElementType.PARAMETER;\n\
  import static java.lang.annotation.ElementType.METHOD;\nimport static java.lang.annotation.RetentionPolicy.RUNTIME;\n\
  import java.lang.annotation.Retention;\nimport java.lang.annotation.Target;\nimport\
  \ javax.inject.Qualifier;\n\n@Qualifier\n@Retention(RUNTIME)\n@Target({METHOD, FIELD,\
  \ PARAMETER, TYPE})\npublic @interface Red {\n}\n```\n\n我们将为清单 10-2 中所示的 `RedWine`\
  \ 类添加 `Red` 限定符，如清单 10-9 所示。\n\n***清单 10-9.***  RedWine.java\n\n```\npackage com.apress.ejb.chapter10;\n\
  \nimport javax.enterprise.context.ApplicationScoped;\n\n// 实例只会创建一次，将在整个应用程序中共享，\n\
  // 并在应用程序关闭时销毁\n@ApplicationScoped\n@Red\npublic class RedWine implements Wine {\n\
  \   public String getColor() {\n       return \"Red\";\n   }\n}\n```\n\n引入这个自定义限定符使我们能够解决歧义依赖错误。如清单\
  \ 10-3 中所编码的 `WineClient`，现在将实例化 `WhiteWine`，因为 `WhiteWine` 具有 `@Default` 限定符，并且注入点也具有相同的\
  \ `@Default` 限定符。清单 10-10 展示了如何通过在注入点添加 `@Red` 限定符，用 `RedWine` 实现来实例化 `newWine`\
  \ 字段。\n\n***清单 10-10.***  WineClient.java\n\n```\npackage com.apress.ejb.chapter10;\n\
  \nimport javax.inject.Inject;\n\npublic class WineClient {\n   // 以经典方式实例化\n   //\
  \ private Wine oldWine = new RedWine();\n\n// 通过字段依赖注入进行实例化\n   @Inject\n   @Red\n\
  \   private Wine newWine;\n}\n```\n\n现在我们基本了解了限定符如何帮助我们解决歧义，接下来我们将研究四种类型的 CDI 限定符。\n\
  \n@Default\n\n当 bean 或注入点没有显式定义限定符时，CDI 容器会假定限定符为 `@javax.enterprise.inject.Default`。如果\
  \ CDI bean 只有一个实现，那么 CDI 容器可以轻松选择该实现进行注入，因为不存在歧义。`@Default` 是一个内置限定符，它告知 CDI 容器，在未指定其他限定符（除了\
  \ @Named，见下文）时，注入一个单一的默认 bean 实现。清单 10-7 中的 `WhiteWine` 类具有 `@Default` 限定符，可以按清单\
  \ 10-11 所示编写，行为不会发生任何变化。\n\n***清单 10-11.***  WhiteWine.java\n\n```\npackage com.apress.ejb.chapter10;\n\
  import javax.enterprise.inject.Default;\n@Default\npublic class WhiteWine implements\
  \ Wine {\n   public String getColor() {\n       return \"White\";\n   }\n}\n```\n\
  \n@Any\n\n与 `@Default` 限定符一样，所有 bean 都隐式具有 `@Any` 限定符。我们可以向 `WhiteWine` 类添加 `@javax.enterprise.inject.Any`\
  \ 注解，如清单 10-11 所示，与 `@Default` 一起使用，行为不会发生任何变化。注入点上的 `@Any` 限定符对于遍历 bean 类型的所有实现非常有用。\n\
  \n清单 10-12 展示了如何使用 `@Any` 限定符来遍历 `Wine` 的所有实现。\n\n***清单 10-12.***  AllWinesClient.java\n\
  \n```\npackage com.apress.ejb.chapter10;\n\nimport javax.enterprise.inject.Any;\n\
  import javax.enterprise.inject.Instance;\nimport javax.inject.Inject;\n\npublic\
  \ class AllWinesClient {\n   @Inject\n   @Any\n   private Instance<Wine> allWines;\n\
  \nprivate void printAllWineColors(){\n       for (Wine wine : allWines){\n     \
  \      System.out.println(wine.getColor());\n       }\n   }\n}\n```\n\n@Named\n\n\
  `@Named` 内置限定符用于需要通过统一表达式语言 (EL) 对 Web 层进行访问的 bean。默认情况下，使用首字母小写的 bean 名称来访问该 bean。可以将非默认名称作为参数传递给\
  \ `@Named` 限定符。\n\n@New\n\n`@New` 限定符将 bean 的实例与其声明的范围解耦。应用程序可以通过使用 `@New` 限定符获取未绑定到声明范围的\
  \ bean 实例。`@New` 限定符强制容器创建一个新的 bean 实例，该实例不绑定到指定的 CDI 上下文生命周期。\n\n例如，如清单 10-10 所示的\
  \ `newWine` 实例将是应用程序作用域的，因为它使用了 `@Red` 注解进行限定，并且 `RedWine` bean 是应用程序作用域的。如果我们更新客户端以包含\
  \ `@New` 注解，如清单 10-13 所示，那么 `newWine` 实例将是依赖作用域的——采用其普通 Java 上下文的生命周期——而不是应用程序作用域的。\n\
  \n***清单 10-13.***  WineClient.java\n\n```\npackage com.apress.ejb.chapter10;\n\n\
  import javax.enterprise.inject.New;\nimport javax.inject.Inject;\n\npublic class\
  \ WineClient {\n   // 以经典方式实例化\n   // private Wine oldWine = new RedWine();\n\n\
  // 通过字段依赖注入进行实例化\n   @Inject\n   @Red\n   @New\n   private Wine newWine;\n}\n```\n\
  \n可以使用 `@Qualifier` 注解创建用户自定义的限定符，如清单 10-8 所示。\n\n替代方案\n\n\n\n通过提供部署时的多态性，备选方案使\
  \ CDI 组件能够以松散耦合的方式进行交互。备选 Bean 通过在 Bean 类上添加 `@Alternative` 注解来声明。如果备选 Bean 需要可用于查找、注入或\
  \ EL 解析，则必须在 `beans.xml` 文件中显式声明。当注入点存在不明确的依赖关系时，容器会尝试通过查找可注入的 Bean 中的可用备选方案来解决歧义。\n\
  \n备选方案使用 `beans.xml` 中提供的信息来选择需要实例化的实现。由于选择实现的责任已从 Java 代码转移到部署描述符中，因此如果我们决定选择不同的实现，则无需重新编译\
  \ Java 代码。\n\n要使用备选方案在部署时解决依赖关系，请分别向清单 10-2 和清单 10-7 中提到的 `RedWine` 和 `WhiteWine`\
  \ 实现添加 `@javax.enterprise.inject.Alternative` 注解。然后使用应实例化的实现类更新 `beans.xml`，如清单\
  \ 10-14 所示。在这种情况下，CDI 容器将实例化 `RedWine` 类。如果我们稍后决定实例化 `WhiteWine` 类，则无需重新编译客户端。我们只需要相应地更新\
  \ `beans.xml` 描述符。如果在部署时 `beans.xml` 包含多个实现类或包含无法解析的类名，容器会自动检测到该问题并将其视为错误。\n\n***清单\
  \ 10-14.***  beans.xml\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans\
  \ xmlns=\"http://java.sun.com/xml/ns/javaee\"\n   xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
  \n   xsi:schemaLocation=\"http://java.sun.com/xml/ns/javaee\n   http://java.sun.com/xml/ns/javaee/beans_1_0.xsd\"\
  >\n\n<alternatives>\n       <class>com.apress.ejb.chapter10.RedWine</class>\n  \
  \ </alternatives>\n</beans>\n```\n\n生产者\n\n我们已经了解了如何使用 `@Inject` 注解来注入 Bean，以及如何使用限定符和备选方案来解决注入过程中遇到的不明确依赖关系。使用生产者，我们可以将任何对象注入到任何其他对象中，前提是*我们生产*需要注入的对象。生产者方法充当需要注入的对象的来源。需要注入的对象不必是\
  \ Bean 的实例，并且需要注入的对象的具体类型可以在运行时决定。这提供了运行时松散耦合但类型安全的多态性。生产者的一个实际用途是注入 Java EE 资源，例如\
  \ `EntityManager`、`QueueConnetion`、`QueueSession` 等。CDI 还提供了 `@Dispose` 注解，我们可以使用它在资源超出作用域时关闭它们以释放资源。\n\
  \n生产者字段是生产者方法的一种更简单的替代方案。\n\n清单 10-16 展示了如何使用生产者方法选择 `Wine` 接口的哪个实现用于依赖注入。选择用于注入的确切实现的决定是在运行时做出的。清单\
  \ 10-15 中定义的限定符 `RandomSelector` 类似于清单 10-8 中定义的限定符 `Red`。\n\n***清单 10-15.***  RandomSelector.java\n\
  \n```\npackage com.apress.ejb.chapter10;\n\nimport static java.lang.annotation.ElementType.TYPE;\n\
  import static java.lang.annotation.ElementType.FIELD;\nimport static java.lang.annotation.ElementType.PARAMETER;\n\
  import static java.lang.annotation.ElementType.METHOD;\nimport static java.lang.annotation.RetentionPolicy.RUNTIME;\n\
  import java.lang.annotation.Retention;\nimport java.lang.annotation.Target;\nimport\
  \ javax.inject.Qualifier;\n\n@Qualifier\n@Retention(RUNTIME)\n@Target({METHOD, FIELD,\
  \ PARAMETER, TYPE})\npublic @interface RandomSelector {\n}\n```\n\n清单 10-16 展示了\
  \ `WineSelector` 类，它有一个返回 `Wine` 实例的 `getWine` 方法。这里需要注意的重要一点是，将返回的 `Wine`（`RedWine`\
  \ 或 `WhiteWine`）的确切实例是在运行时决定的。在这种情况下，该决定基于随机数生成器生成的数字。\n\n***清单 10-16.***  WineSelector.java\n\
  \n```\npackage com.apress.ejb.chapter10;\n\nimport java.util.Random;\nimport javax.enterprise.inject.New;\n\
  import javax.enterprise.inject.Produces;\n\npublic class WineSelector {\n   @Produces\n\
     @RandomSelector\n   public Wine getWine(@New RedWine rw, @New WhiteWine ww) {\n\
         final int wineNumber = new Random().nextInt(2);\n       if (wineNumber ==\
  \ 0) {\n           return rw;\n       }\n       else if (wineNumber == 1) {\n          \
  \ return ww;\n       }\n       else{\n           return null;\n       }\n   }\n\
  }\n```\n\n清单 10-17 展示了 `WineClient` 类，它使用 `RandomSelector` 限定符根据清单 10-16 中生成的随机数来实例化\
  \ `randomWine` 字段。\n\n***清单 10-17.***  WineClient.java\n\n```\npackage com.apress.ejb.chapter10;\n\
  \nimport javax.inject.Inject;\n\npublic class WineClient {\n   @Inject\n   @RandomSelector\n\
     private Wine randomWine;\n}\n```\n\n与会话 Bean 的交互\n\nCDI 通过将会话 Bean 与明确的作用域关联，并创建一个松散耦合的类型安全生态系统（该生态系统通过编译时、部署时或运行时的注入来解决歧义），从而增强了会话\
  \ Bean 提供的功能。作为回报，可以使用 `@Stateful`、`@Stateless` 或 `@Singleton` 注解来注解受管 Bean，从而为它们增强声明式企业特性，例如基于角色的安全性、事务管理、可伸缩性以及多用户环境中的并发性。\n\
  \n会话 Bean 作用域\n\n会话 Bean 像任何其他 Bean 一样参与 CDI 容器提供的上下文生命周期。可以通过添加 CDI 特定的作用域注解（`@ApplicationScoped`、`@RequestScoped`、`@SessionScoped`\
  \ 或 `@ConversationScoped`）将会话 Bean 与 CDI 作用域关联起来。因此，当客户端需要时，容器会自动创建会话 Bean 实例，并且当不再处于作用域内时，容器会自动销毁该实例。\n\
  \n默认情况下，所有通用会话 Bean 都具有 `@Dependent` 伪作用域，因此它们不能在客户端应用程序之间共享。从本质上讲，某些类型的会话 Bean\
  \ 与特定类型的作用域配合良好。例如，单例会话 Bean 在应用程序的整个生命周期中只能有一个实例。单例会话 Bean 的这一特性补充了应用程序作用域 Bean\
  \ 的特性。向无状态会话 Bean 添加 `@ApplicationScoped` 注解是没有意义的，因为无状态会话 Bean 实例仅在其调用期间与客户端关联，并且不与客户端维护会话状态。\n\
  \n因此，用户在将会话 Bean 应用 CDI 作用域时必须遵循表 10-1 中提到的规则。如果会话 Bean 指定了非法作用域，容器会自动检测到该问题并将其视为定义错误。\n\
  \n表 10-1. 会话 Bean 到 CDI 作用域的映射\n\n\n\n| 会话 Bean 类型 | 作用域 |\n| --- | --- |\n| `@Singleton`\
  \ | `@ApplicationScoped 或 @Dependent` |\n| `@Stateless` | `@Dependent` |\n| `@Stateful`\
  \ | `@ApplicationScoped`、`@RequestScoped`、`@SessionScoped`、`@ConversationScoped`\
  \ 或 `@Dependent` |\n\n解决会话 Bean 的歧义性\n\n与任何其他 Bean 一样，参与 CDI 生命周期的会话 Bean 在 CDI\
  \ 容器无法隔离出可在给定注入点注入的单个会话 Bean 时，可能会遇到“未满足或存在歧义的依赖关系”错误。可以通过对参与的会话 Bean 应用限定符、替代方案或生产者来解决这些歧义。\n\
  \n参与 CDI 生命周期的会话 Bean 会使用限定符（`@Default`、`@Any`、`@New`、`@Named` 或用户自定义的）在编译时解决歧义依赖关系，这与任何其他\
  \ Bean 相同。\n\n如果需要在部署时解决歧义依赖关系，则必须在 `beans.xml` 中显式声明一个替代会话 Bean。一旦在 `beans.xml`\
  \ 中声明，它就会自动可用于查找、注入或 EL 解析。\n\n会话 Bean 的生产者方法必须是 EJB 的业务方法或 Bean 类的静态方法。如果不是这种情况，容器会自动检测到问题并将其视为定义错误。类似地，生产者字段必须是\
  \ Bean 类的静态字段。\n\n用户可以将限定符、替代方案和生产者与会话 Bean 结合使用，其方式与将它们与其他 Bean 结合使用完全相同。\n\n局限性\n\
  \n虽然 CDI 和会话 Bean 是很好的搭档，彼此填补了对方留下的空白，但参与 CDI 生命周期的会话 Bean 确实存在一些局限性。例如，会话 Bean\
  \ 的远程接口不包含在 Bean 类型集合中，并且不能参与 CDI 生命周期。\n\n编译、部署和测试 CDI 应用程序\n\n与 EJB 不同，CDI 没有定义任何特殊的部署归档文件。CDI\
  \ Bean 可以打包在 JAR、EJB-JAR 或 WAR 文件中。唯一的条件是归档文件必须是 *bean 归档文件*，这意味着该归档文件必须包含 `beans.xml`\
  \ 描述符。CDI Bean 在归档文件中的位置取决于其 `beans.xml` 的位置。\n\n*   如果 `beans.xml` 位于归档文件的 `META-INF`\
  \ 目录中，则 CDI Bean 必须打包在库 JAR、EJB JAR 或 RAR 归档文件中。\n*   如果 `beans.xml` 位于 WAR 文件的\
  \ `WEB-INF` 目录中，则 CDI Bean 必须打包在 WAR 文件的 `WEB-INF/classes` 目录中。\n\n在某些 CDI 容器的情况下，打包好的\
  \ CDI 归档文件需要在部署前组装成一个企业归档（EAR）文件。应用服务器提供了部署实用程序或 Ant 任务来简化 CDI Bean 的部署。像 JDeveloper、NetBeans\
  \ 和 Eclipse 这样的 Java 集成开发环境也提供了部署功能，允许开发者将 CDI Bean 打包并部署到应用服务器。\n\n在本章中，我们使用了代码片段来演示\
  \ CDI 的两个核心方面：作用域和依赖注入。我们从开发一个简单的 `Wine` 接口开始，然后继续创建了它的两个实现——`RedWine` 和 `WhiteWine`。我们了解了各种作用域，并为\
  \ `RedWine` 实现添加了应用程序作用域。我们还看到了通过使用限定符、替代方案和生产者来解决歧义依赖关系的示例。我们到目前为止在章节中列出的 `WineClient`\
  \ 客户端演示了客户端如何与 CDI Bean 进行交互，但它不是一个完整的可执行客户端。我们现在将把 `WineClient` 客户端转换为一个 Servlet\
  \ 客户端，并通过将其部署在 GlassFish 应用服务器上来使用它测试 CDI Bean。以下各节将引导您完成使用相应的 Servlet 客户端编译、部署和测试这些\
  \ CDI Bean 所需的步骤。\n\n先决条件\n\n\n\n在执行后续章节详述的任何步骤之前，请先完成第 1 章的“入门”部分。该部分将引导您完成本章示例所需的安装和环境设置。\n\
