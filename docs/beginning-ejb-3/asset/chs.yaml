  \n我们需要更新 `faces-config.xml`，将 `JSFShoppingCart` 注册为受管 bean，并添加一条从 `wineList.jsp`\
  \ 到 `addtoCart.jsp` 的新导航规则。列表 12-17 展示了将放入 `faces-config.xml` 文件中的 XML 片段。\n\n***列表\
  \ 12-17.***  包含 JSFShoppingCart 受管 Bean 的 faces-config.xml\n\n```\n<managed-bean>\n\
