    ## JSF 和 eshop


    在第 3 章中，我介绍了 `eshop` 项目，随后在第 6 章中介绍了 `eshopx`，它在功能上与 `eshop` 相同，只是我将包含脚本元素的 JSP
    页面替换为 XML 格式的 JSP 文档。


    在本章中，我将描述 `eshopf`，它是基于 JSF 的 `eshopx` 版本。你将在本章的软件包中找到 WAR 文件和展开的项目。


    ### eshopf


    图 8-1 显示了 `eshopf` 的欢迎页面。虽然它与 `eshop` 和 `eshopx` 的欢迎页面相同，但我将其包含在此处，以便你可以参考它，而无需在几章之间来回翻阅。我不会评论整个应用程序的清单，而是专注于一些与
    JSF 相关的有趣片段。


    ![Image](img/9781430246237_Fig08-01.jpg)


    ***图 8-1.** eshopf 的主页*


    作为开发 `eshopf` 的基础，我使用了 `eshopx`。如果你查看 `eshopx` 和 `eshopf` 的欢迎页面，两者都命名为 `index.jspx`，你会立即看到，为了使用
    JSF，我添加了核心和 html JSF 标签库的两个命名空间声明，以及元素 `f:view` 来包含所有 JSF 动作。


    但还有另一个不太明显的更新。查看清单 8-1，它显示了 `f:view` 元素的主体。


    ***清单 8-1.** eshopf: index.jspx 中 f:view 的主体*


    `<h:form>` `  <jsp:include page="TopMenu.jspx" flush="true"/>` `  <jsp:include
    page="LeftMenu.jspx" flush="true"/>` `  </h:form>` `<div class="content">` `  <h1>Welcome
    to e-Shop</h1>` `  </div>`


    在 `eshopx` 的 `index.jspx` 中，两个 `jsp:include` 没有被包裹在表单内。这个更改的原因是由于在 `jsp:included`
