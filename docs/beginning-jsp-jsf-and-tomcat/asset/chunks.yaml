    from previous examples.    The `context-parameter` element sets the file extension
    to be `jspx`, which is the extension of JSP documents, as those of `eshopf`. If
    you had left out this element, the extension would have been `jsp`, which is the
    extension of JSP pages.    The `servlet` element points to the class of the standard
    JSF servlet. By setting the element `servlet-mapping` to `*.jsf`, you specify
    that the JSP documents are to be accessed with that extension instead of their
    real extension, which is `jspx`. For example, when you select a book category
    in `eshopf`, the URL displayed in the browser is    [`http://localhost:8080/eshopf/jsp/ListBooks.jsf`](http://localhost:8080/eshopf/jsp/ListBooks.jsf)    while
    the JSP document is actually called `ListBooks.jspx`. This is called *extension
    mapping*.    The last element, `resource-ref`, states that the resource named
    `jdbc/mysql` is of type `DataSource`, and that Tomcat does its own authentication.
    Tomcat provides a Java Naming and Directory Interface (JNDI) `InitialContext`
    for each application. This means that once you’ve registered a resource in `web.xml`,
    you can provide in a separate context file all the information necessary to link
    it to your server environment. For `eshopf`, the information is shown in [Listing
    8-9](#Chapter08.html#list_8_9).    ***Listing 8-9.** context.xml*  `<?xml version="1.0"
