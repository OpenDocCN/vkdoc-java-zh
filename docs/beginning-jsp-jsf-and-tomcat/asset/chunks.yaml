    This works with Firefox, Chrome, Opera, and IE 9; I’m not sure whether it works
    with IE 7 and 8; and I know that it doesn’t work with IE 6. That’s why, to be
    on the safe side, I have added the code that instantiates the correct `ActiveXObject`
    in case the instantiation of `XMLHttpRequest` fails.    In any case, when ajaxReq
    “holds” an object of the correct type, you set up the HTML request method (e.g.,
    `GET`) and the target URL (in this case, the JSP module `time.jsp`). At this point,
    you can send off the request.    ![Image](images/square.jpg) **Tip** The caching
    of IE prevents Ajax from updating the date subsequent to the first clicking of
    the `Update` button. To avoid this problem, you can click on IE 9’s toothed-wheel
    button, select `Internet Options`, click on the `Settings` button of the `Browsing
    History` section, and, under `Check for newer versions of stored pages`, select
    `every time I visit the web page`. This will disable browser caching and solve
    the problem. You could also disable caching of a particular page by adding one
    of the following elements to its `head`:    `<meta http-equiv="Pragma" content="no-cache">`
    `<meta http-equiv="Cache-Control" content="no-cache">`  The control comes immediately
    back to JavaScript (the first letter of Ajax stands for *asynchronous*, remember?).
    In general, you don’t want the browser to wait for the response, and you want
    your page to be able to do other things. This asynchronicity makes Ajax more useful
    than if its operations had to be done in sequence. When the state of the request
    changes, the browser executes the function `ajaxReq.onreadystatechange`. In that
    function you need to check that the request has been completed: in which case,
    you can then display the content of the response in the time field. Cool! In case
    you are curious to know the possible status codes, check out [Table 7-3](#Chapter07.html#tab_7_3).    ![Image](images/9781430246237_Tab07-03.jpg)    I’ve
    taken a minimalist approach for this example. The idea is for your server to send
    back an XML document, which you can then parse on the client side. You can find
    the latest version of the Ajax standard at the following URL: [`http://www.w3.org/TR/XMLHttpRequest/`](http://www.w3.org/TR/XMLHttpRequest/).    One
    last thing: [Listing 7-17](#Chapter07.html#list_7_17) shows the deployment descriptor
    for this application.    ***Listing 7-17.** web.xml*  `<?xml version="1.0" encoding="UTF-8"?>`
