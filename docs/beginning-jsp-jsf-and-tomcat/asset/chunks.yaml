    \ containing *child nodes* (e.g., `captain` inside `starship`), also called *sub-elements*.\n\
    \nXML documents can also contain processing instructions for the applications\
    \ that handle them (enclosed between `<?` and `?>`), comments (enclosed between\
    \ `<!--` and `-->`), and document-type declarations (more about that later). Notice\
    \ that `enterprises.xml` doesn’t provide any information concerning how the data\
