    of storing the XML source code in the attribute `doc`, you can also make `x:parse`
    a bodied action and store the source XML in its body.    #### XSLT: Transformation
    from One XML Format to Another    At the beginning of this chapter, I showed you
    the file `enterprises.xml` ([Listing 5.1](#Chapter05.html#list_5_1)) and, later
    on, to explain XPath, I expanded it to `starfleet.xml` ([Listing 5-9](#Chapter05.html#list_5_9)).    But
    the information contained in `enterprises.xml` is not just a sub-set of the larger
    `starfleet.xml`, because also the encoding is different. In particular, the differences
    from `starfleet.xml` are:    > *   The presence of a `title` element > *   The
    removal in the `class` element of the `commissioned` attribute > *   The replacement
