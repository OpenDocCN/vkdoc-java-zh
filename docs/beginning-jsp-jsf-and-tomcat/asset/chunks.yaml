    I described almost everything in [Chapter 8](#Chapter08.html). In this chapter,
    I’ll systematically go through the changes I made to `eshopx` to transform it
    into `eshopf`.    #### web.xml and context.xml    In `eshopx`, I defined `ShopServlet.java`
    to implement the controller part of the MVC architecture. In `eshopf`, this function
    is performed by the standard `FacesServlet`. As a result, I had to rewrite most
    of `web.xml`. In particular, I replaced the `servlet` element used in the `web.xml`
    version of `eshopx`  `<display-name>ShopServlet</display-name>` `<servlet-name>ShopServlet</servlet-name>`
    `<servlet-class>eshop.ShopServlet</servlet-class>`  with this:  `<servlet-name>Faces
    Servlet</servlet-name>` `<servlet-class>javax.faces.webapp.FacesServlet</servlet-class>`
    `<load-on-startup>1</load-on-startup>`  I also changed the body of `servlet-mapping`
    from this:  `<servlet-name>ShopServlet</servlet-name>` `<url-pattern>/shop/*</url-pattern>`  to
    this:  `<servlet-name>Faces Servlet</servlet-name>` `<url-pattern>*.jsf</url-pattern>`  In
    `eshopx`, to access the database containing books, book categories, and orders,
    I defined the initialization parameters `jdbcDriver`, `dbURL`, `dbUserName`, and
    `dbPassword`. They were used in `ShopServlet` to set up an object of type `DataManager`,
    which implemented the model part of the MVC architecture and interfaced to the
    database. The replacement of `ShopServlet` with `FacesServlet` forced me to implement
    a different mechanism in `eshopf` for passing the database parameters to the data
    manager.    I defined the database as a resource external to the application by
    creating the `context.xml` file in the `META-INF` folder with the following content:  `<Context
    debug="5" reloadable="true" crossContext="true">` `  <Resource` `      name="jdbc/mysql"`
    `      auth="Container"` `      type="javax.sql.DataSource"` `      username="root"`
    `      password=""` `      driverClassName="com.mysql.jdbc.Driver"` `      url="jdbc:mysql://localhost:3306/shop"`
    `      maxActive="8"` `      maxIdle="4"` `      />` `  <Valve` `      className="org.apache.catalina.valves.AccessLogValve"`
    `      directory="logs"` `      prefix="eshopf-access."` `      suffix=".log"`
    `      pattern="common"` `      resolveHosts="false"` `      />` `  </Context>`  I
    then registered the resource in the `web.xml` file as follows:  `<resource-ref>`
    `  <res-ref-name>jdbc/mysql</res-ref-name>` `  <res-type>javax.sql.DataSource</res-type>`
    `  <res-auth>Container</res-auth>` `  </resource-ref>`  Note that with this mechanism,
    you effectively pool the connections to the database, thereby achieving a more
    efficient use of resources. I leave up to you to retrofit `eshopx` with this mechanism.
    To complete the conversion from `eshopx` to `eshopf`, I also removed the definition
    of the initialization parameters `base` and `imageURL` from `web.xml`, because
    they were no longer needed, and I added the element to direct Tomcat to perform
    the basic authentication needed to access the database resource. [Listing 8-8](#Chapter08.html#list_8_8)
    shows the full `web.xml` file of `eshopf`.    #### Style Sheet    CSS lets you
    define new styles by adding attributes to already defined styles. This “cascading”
    mechanism is a form of inheritance, and therefore it requires an underlying hierarchical
    structure. CSS uses the structure provided by HTML documents instead of creating
    its own. This is fine as long as you write the HTML code yourself or generate
    it with JSP. When you use JSF, though, the control you have on the generated HTML
    is reduced. As a result, you have to pay greater attention when designing the
    style sheets.    When converting `eshopx` to `eshopf`, I encountered this issue
    in several places and had to modify the style-sheet file accordingly.    For example,
    in `eshopx\css\eshop.jspx`, I first defined `.box` (lines 130–133)  `.box {` `  padding:
    0px 0px 10px 0px;` `  margin: 0px;` `  }`  and then extended it to define `.box
    p` (lines 134–139)  `.box p {` `  font-size: 12px;` `  padding: .2em 1em .2em
    1em;` `  margin: 0px;` `  border: 0px;` `  }`  I know, I didn’t need to repeat
    `margin:0px`, but these things happen when you cut and paste!    In any case,
    `LeftMenu.jspx` uses the two styles as follows:  `<div class="box">` `  ...` `  <p>Book
    Title/Author:</p>` `  ...` `  </div>`  In `eshopf`, I replaced the HTML `p` element
    with a `h:outputText` component, which generates an HTML `span` element, not a
    `p`. Therefore, if I had left the style sheet unchanged, the `.box p` style wouldn’t
    have had any effect, and the search box would have been rendered as shown in [Figure
    10-12](#Chapter10.html#fig_10_12).  ![Image](images/9781430246237_Fig10-12.jpg)  ***Figure
    10-12.** Wrong style in the search box*    Not nice.    To resolve the issue,
    I defined in `eshopf\css\eshopf.jspx` the new style `.box_p` as follows (lines
    153–159):  `.box_p {` `  font-size: 12px;` `  padding: .2em 1em .2em 1em;` `  margin:
    0px;` `  border: 0px;` `  display: block;` `  }`  By writing in `eshopf\jsp\LeftMenu.jspx`
    the code  `<h:panelGroup styleClass="box">` `  ...` `  <h:outputText styleClass="box_p"
    value="Book Title/Author:"/>` `  ...` `  </h:panelGroup>`  I could generate the
    following HTML output:  `<span class="box">` `  ...` `  <span class="box_p">Book
    Title/Author:</span>` `  </span>` `and this resulted in the correct formatting
    of the search box, as shown in Figure 10-13.` ![Image](images/9781430246237_Fig10-13.jpg)  ***Figure
    10-13.** Correctly styled search box*    In case you are wondering, the effect
    of `display:block` is to insert a new line before and after and take up the full
    width available. You will find that I applied it a few times in the style sheet
    for `eshopf` to ensure that the generated page looked as similar as possible to
    the corresponding page of `eshopx` (and `eshop`).    As a last remark about styles,
    I would like to point out that I could have “salvaged” the inheritance from `h:panelGroup`
    to `h:outputText` by renaming the `.box p` style of `eshopx.jspx` to `.box .p`,
    and then writing the `h:outputText` component as follows:  `  <h:outputText styleClass="p"
    value="Book Title/Author:"/>`  This would have worked because the `span` element
    it generates is enclosed inside the `span` element generated by `h:panelGroup`.
    I would have still needed to add the `display:block` style, however. There are
    often several ways to achieve the same result, and sometimes it is just a matter
    of what comes to mind first.    This issue concerning style sheets is a disadvantage
    of using JSF, but it becomes less and less important as you become familiar with
    the HTML code that JSF generates. Furthermore, you’ll normally start developing
    directly with JSF. When converting `eshopx` into `eshopf`, I was dealing with
    an existing user interface that I wanted to alter as little as possible.    ####
    JSP Documents    I had to modify all JSP documents. This shouldn’t be a surprise,
    considering that the JSP documents generate the HTML pages that the user sees
    in his or her web browser. In [Chapter 8](#Chapter08.html), I described all the
    JSF components you need for `eshopf`. Therefore, it wouldn’t make much sense to
    do it again here. In this section, I’ll only tell you how JSF allows you to merge
    two separate JSP documents of `eshopx` (`SelectCatalog.jspx` and `SearchOutcome.jspx`)
    into a single document of `eshopf` (`ListBooks.jspx`).    The two modules were
    already very similar in `eshopx`. Without considering page titles, text headers,
    and error messages, the differences boiled down to less than a handful of lines.
    In `SearchOutcome.jspx`, I was using the custom tag `eshop:searchResults`, while
    in `SelectCatalog.jspx`, I was first obtaining the category name with `eshop:categoryName`
    and then the list of books with `eshop:booksInCategory`.    After converting the
    two modules to use JSF, the list of books in both cases was obtained from a property
    of `shopManager`: when the user performed a search via the search field of `LeftMenu.jspx`,
    the method that filled in the list of books in `shopManager` was `searchBooks`,
    and when the user selected a category, the method was `selectCategory`.    The
    only difference left between the two modules was in a couple of messages. To make
    the merging possible, I added the `categoryName` property to `shopManager` and
    reset it to `null` within the `searchBooks` method. In this way, I could use the
    name of the category as a flag, because it would be `null` after a search and
    non-null after a category selection.    Perhaps I could have also merged the JSP
    documents in `eshopx`, but it would have required some “awkward” coding, while
    it works out quite naturally with JSF.    #### Java Modules    One major change
    I made was to replace the custom tags defined in `eshopx` with the `eshop.beans.ShopManager`
    class. I did this to take advantage of JSF.    For example, to update the number
    of copies of a book in `eshopx`, you use the custom tag `UpdateBook`. [Listing
    10-18](#Chapter10.html#list_10_18) shows the code to implement the tag.    ***Listing
    10-18.** Eshopx—UpdateBookTag.java*  `package eshop.tags;`  `import java.util.Hashtable;`
    `import javax.servlet.jsp.tagext.TagSupport;` `import javax.servlet.http.HttpSession;`
    `import eshop.beans.CartItem;`  `public class UpdateBookTag extends TagSupport
    {` `  static final long serialVersionUID = 1L;` `  private String bookID;` `  private
    String quantity;`  `  public void setBookID(String bookID) {` `    this.bookID
    = bookID;` `    }`  `  public void setQuantity(String quantity) {` `    this.quantity
    = quantity;` `    }`  `  public int doEndTag() {` `    HttpSession session = pageContext.getSession();`
    `    @SuppressWarnings("unchecked")` `    Hashtable<String, CartItem> shoppingCart
    =` `        (Hashtable<String, CartItem>)session.getAttribute("shoppingCart");`
    `    CartItem item = (CartItem)shoppingCart.get(bookID);` `    if (item != null)
    {` `      item.setQuantity(quantity);` `      }` `    return EVAL_PAGE;` `    }`
    `  }`  In `eshopf`, the following JSF component of `ShoppingCart.jspx` takes care
    of updating the number of copies:  `<h:inputText id="quantity" value="#{item.quantity}"
    size="2"` `    required="true"` `    requiredMessage="What? Nothing?"` `    converterMessage="An
    integer, please!"` `    validatorMessage="At least one copy!"` `    >` `  <f:validateLongRange
    minimum="1"/>` `  </h:inputText>`  As a result, when you trigger an update by
    pressing the corresponding button  `<h:commandButton action="#{shopManager.updateItem}"
    value="Update"/>`  there’s nothing left for the `updateItem` method of the shop
    manager to do:  `public String updateItem() {` `  return null;` `}`  Another example
    is the `RoundToCent` tag, which rounds amounts in dollars to two decimal places
    in `eshopx`. This is necessary because sometimes the result of multiplying the
    price of a book by the ordered quantity results in a sequence of `''9''`s after
    the decimal point. Here is an example of its usage taken from `ShoppingCart.jspx`:  `<eshop:roundToCent
    var="itemPrice" value="${item.quantity * item.price}"/>`  In `eshopf`, I introduced
    the subtotal attribute to the `CartItem` bean and added the functionality to recalculate
    it and round it to two decimals after every shopping cart update. This is the
    only update I made to the four `eshop.beans` modules.    Of the `eshop.model`
    modules, I only needed to modify `CategoryPeer.java` and `DataManager.java`. In
    `CategoryPeer.java`, I changed the `getAllCategories` method to return a list
    of categories instead of an object of type `java.util.Hashtable`. I then changed
    the `getCategories` methods in `DataManager.java` and `ShopManager.java` accordingly.
    This allowed me to display the list of categories in `LeftMenu.jspx` with the
    following JSF element without having to do any type conversion:  `<h:dataTable
    value="#{shopManager.categories}" var="category">`  In `DataManager`, besides
    the change to the `getCategories` method that I’ve already discussed and the removal
    of the `getCatIDs` method that was no longer needed, I only updated the algorithm
    used in the `getConnection` method to open a database connection. This was necessary
    because I had replaced the database initialization parameters of `eshopx` with
    a JNDI resource.    In `eshopx`, `DataManager` opened a database connection by
    invoking the static `getConnection` method of the `java.sql.DriverManager` class:  `conn
    = DriverManager.getConnection(getDbURL(), getDbUserName(), getDbPassword());`  The
    `dbURL`, `dbUserName`, and `dbPassword` attributes were set by `ShopServlet` using
    the servlet initialization parameters. In `eshopf`, the code to obtain a database
    connection is as follows:  `Context ctx = new InitialContext();` `if (ctx != null){`
    `  Context envContext  = (Context)ctx.lookup("java:/comp/env");` `  if (envContext
    != null) {` `    DataSource ds = (DataSource)envContext.lookup("jdbc/mysql");`
    `    if (ds != null) {` `      conn = ds.getConnection();` `      }` `    }` `  }`  Finally,
    I added Java modules to implement a custom JSF component, a converter, a renderer,
    and a validator. Please refer to the corresponding sections of [Chapter 8](#Chapter08.html)
    for their description.    ### Summary    In this chapter, I completed the description
    of the various versions of the online bookshop example and explained what I had
    to do in order to convert standard JSP syntax to XML syntax and then to use JSF.    This
    chapter completes the main body of the book. After the first introductory chapter,
    I took you through five chapters about JSP, application architectures, JSP actions,
    XML, and databases, followed by two chapters about JSF and one about Tomcat.    Next,
    two appendixes will help you in two areas that, although not part of the core
    technologies explained in this book, are essential to develop web applications.
    Appendix A will talk about HTML and its associated technologies, like JavaScript
    and CSS, while Appendix B will provide a quick reference of SQL. The third appendix
    will list all the abbreviations you have encountered in the book.    What more
    is there to say?    I hope that you’ll find this book useful. Perhaps, in a few
    areas I could have gone a bit deeper or provided additional examples, but a lot
    of ground had to be covered in a limited space.    I wish you all the best. Happy
    programming!    ## A P P E N D I X  A    ![Image](images/3square.jpg)    ## The
    Web Page    This appendix is mainly aimed at those of you who have little experience
    in web development and feel a bit lost among the myriad of web pages you get when
    searching the Web for “HTML” and “HTTP”. But I have also included some information
    that experienced web developers could find interesting.    You can find on the
    Internet several web sites that describe HTML, CSS, and JavaScript in detail.
    Therefore, instead of attempting to cover everything there is to know about them,
    I will introduce a few key concepts of networking and then describe some useful
    techniques.    Hopefully, after seeing how the different components work together
    to deliver web pages, you will find it easier to fill the gaps.    ### The WWW
    Network    For your browser to render a web page correctly, it must be able to
    communicate with the server, or servers, where the page content is stored. This
    means that the browser must support the necessary communication protocols, be
    configured correctly, and use the proper addressing.    So far, I have concentrated
    on what happens when a web server receives a HTTP request and replies with a HTTP
    response. In this section, I will talk about requests and responses while they
    cross the network that connects browsers and servers.    A data-communication
    protocol is a standardized set of rules that computers must follow to be able
    to communicate with each other. The protocol rules define the format of the *data
    packets* being transferred and the way in which the exchange takes place.    To
    make this complex process more manageable, the functionality necessary to move
    data across networks is broken down into layers organized into *protocol stacks*,
    or *protocol suites*. Higher layers can perform more general and complex tasks
    by relying on the services of the lower layers. Computers communicate across the
    Internet by means of the Internet protocol stack, which consists of five layers.
    Starting from the top, these layers are *application*, *transport*, *network*,
    and *network interface*.    To get an idea of the complexity of the whole Internet
    protocol suite, consider that the list of Internet standards has become a standard
    itself: Request for Comments (RFC) 5000, with title *Internet Official Protocol
    Standards* ([http://tools.ietf.org/html/rfc5000](http://tools.ietf.org/html/rfc5000)).
    It lists more than 5200 RFCs that specify 68 Standard Protocols (STDs) and 135
    Best Current Practices (BCPs), and, yes, it lists itself in the top spot.    The
    operating system of every computer connected to the Internet includes an implementation
    of the Internet protocol stack. However, this chapter focuses on web applications,
    so I’m not going to discuss the two lowest layers (physical and link), which are
    local to your setup (for example, Ethernet and wireless local area network).    The
    first layer—from the bottom—of interest to us is the network layer (the Internet
    Protocol layer, or simply IP), which is the lowest one operating end to end. Each
    computer directly connected to the Internet is identified via its IP address,
    which is assigned by the ISP. To find out the IP address of your PC, open a command-line
    window and type `ipconfig`. You’ll get several lines of information, including
    one that shows your IP address as a string of four numbers separated by dots—something
    like `84.74.96.111`.    Each one of the four numbers is between 0 and 255 (well,
    except the first one), because it is stored in eight unsigned bits. If you have
    a home network and connect to the ISP via a router, the router will “keep” the
    address assigned by the ISP for itself and assign to each one of your home computers
    a private address, which will probably be like 192.168.x.x, although it could
    also be 172.16.x.x or 10.x.x.x. Note that a transition from the current Internet
    Protocol with 32-bit addresses to an addressing scheme based on 128 bits is taking
    place. There are dozens of standard documents (RFCs) that specify all aspects
    of the new Internet Protocol (IP version 6, or IPv6). The general specification
    document is RFC 2460 ([`http://www.ietf.org/rfc/rfc2460.txt`](http://www.ietf.org/rfc/rfc2460.txt)).
    A general resource is the wiki of the American Registry for Internet Numbers (ARIN)
    at [`http://www.getipv6.info/`](http://www.getipv6.info/).    To get the IP address
    of a server, type the command `nslookup`. When you get a greater than sign as
    a prompt, type the name of the server and hit `Enter`. For example, if you type
    `google.com`, you’ll get a dozen IP addresses like `74.125.237.x`, which are the
    IP addresses of Google’s clustered servers. If you then open a browser and type
    one of Google’s IP addresses where you’d normally type a URL, you’ll see Google’s
    home page.    The next layer up, the transport layer, uses the Transmission Control
    Protocol (TCP) to ensure that information packets reach their destination reliably.
    TCP associates so called ports with the applications running on a computer, thereby
    ensuring separate and concurrent data communication for, say, your e-mail and
    your Skype calls. You might have heard of the User Datagram Protocol (UDP). Like
    TCP, UDP belongs to the transport layer and assigns ports to applications, but
    unlike TCP, it doesn’t guarantee reliable delivery of packets. It isn’t relevant
    to us in this book.    The top layer is the application layer. Each application
    running on one computer *attaches* itself to its TCP/UDP port or ports. The protocol
    for web pages is HTTP, or HTTPS for encrypted pages. The web server can be attached
    to several ports. For example, Tomcat by default expects to receive HTTP requests
    via port 8080 and HTTPS requests via port 8443.    By default, the web browsers
    send to port 80 the requests for URLs that begin with `http://`, and to port 443
    those for URLs that begin with `https://`. For `ftp://`, the browsers use ports
    20 and 21\. Note that the browser will use additional ports if necessary. For
    example, a video stream in Windows Media format will go through port 1755\. This
    is important to know if a firewall exists between client and server to block communication
    through ports you don’t use. The Internet Assigned Numbers Authority (IANA) is
    in charge of keeping official port assignments. You’ll find the list at [`http://www.iana.org/assignments/port-numbers`](http://www.iana.org/assignments/port-numbers)
    (warning: it takes a while to load it).    A URL like [`http://localhost:8080/ebookshop/`](http://localhost:8080/ebookshop/)
    that you saw in the previous chapters specifies that on the host side, the port
    number for HTTP is 8080 (IANA identifies it as *HTTP Alternate*) instead of 80,
    which is the standard port for HTTP. This is because Tomcat expects and routes
    HTTP traffic through port 8080. This is appropriate if you intend to use Tomcat
    to handle requests for JSP pages and place it behind a server (typically, the
    Apache web server) that handles static HTTP/HTTPS. But if you intend to use Tomcat
    to handle HTTP/HTTPS as well, you should change its default ports 8080 and 8443
    to 80 and 443 respectively. In [Chapter 9](#Chapter09.html) you saw how you can
    change Tomcat’s ports.    [Figure A-1](#AppendixA.html#fig_A_1) shows you what
    happens when you send a request from your PC to a web server.  ![Image](images/9781430246237_AppA-01.jpg)  ***Figure
    A-1.** Following an HTTP request through the Internet protocol stacks*    Note
    how a router operates at the Network layer. The router in [Figure A-1](#AppendixA.html#fig_A_1)
    represents one of the many routers your IP packets will go through before reaching
    their final destination. You can check this out with the command `cacert`, which
    traces the packet routes. If you open a command window and type `cacert apress.com`,
    you will probably be surprised to see how many routers separate your PC from the
    web site belonging to this book’s publisher.    When you request a web page, the
    web browser sends the request to the Internet protocol stack that is implemented
    on your PC. Each of the layers attaches information to your request in the form
    of a header, so that the same layer on the server knows what to do with the packet.
    The packet grows as it descends the protocol stack, and it often ends up fragmented
    into several parts before reaching the bottom.    The IP header contains, among
    other fields, the source IP address (i.e., your IP address) and the destination
    IP address (i.e., the address of the server, which you can obtain from the name
    server of your ISP with the command `nslookup`). Instead of Ethernet, you might
    have a wireless LAN layer, but ultimately your request will end up encapsulated
    in data packets traveling through the Internet. On their way to the server, the
    data packets encounter routers that forward them toward the server on the basis
    of the destination IP address. Depending on your location relative to that of
    the server, the packets might “hop” on a dozen or more routers. Finally, your
    packets reach the server. The process that occurred on your PC is reversed, and
    your request is put back together. The destination port tells the protocol stack
    what application handles it (i.e., a web server such as the Apache web server
    or the Apache Tomcat Java web server). The response follows a similar logical
    path in the reverse direction.    If you have a home network, you are connected
    to your router by a direct Ethernet connection or a wireless LAN. Before forwarding
    your packets to the Internet, toward their destination, your home router translates
    the private IP addresses that appear as a source address in your outgoing packets
    (i.e., the address you see with `ipconfig`), so that when they go through the
    Internet, the packets of all your computers appear to be coming from a single
    computer having as source address the address assigned to you by your ISP.    ###
    URLs, Hosts, and Paths    URLs tell your browser where to find web pages, files,
    File Transfer Protocol (FTP) sites, and more. To be precise, a URL doesn’t really
    tell where a resource is; it only provides the information necessary to be able
    to address the resource locally or across a network and establish communication
    with it. That is, I’m not talking about physical locations here.    A URL consists
    of several parts. For example, [`http://localhost:8080/ebookshop/`](http://localhost:8080/ebookshop/)
    can be broken down as follows:    > *   `http` is the protocol. > *   `localhost`
    is the host name. > *   `8080` is the port number on the host. > *   `/ebookshop/`
    is the path.    In fact, although everybody speaks of URLs, the more general term
    is Uniform Resource Identifier (URI), which lets you define even a *fragment*
    within a resource. The Internet Society (ISOC) defines the URI format in the document
    RFC 3986.    Let’s break down this fictitious URI:    [`http://localhost:8080/first/second_one/page.html?answer=no#exactly_here`](http://localhost:8080/first/second_one/page.html?answer=no#exactly_here)    >
    *   `http` is the protocol (the standard name for this part of the URI is *scheme*).
    > *   `//` is called the *hier part* and determines what format is acceptable
    for the part of the URI that follows it. > *   `localhost:8080` is referred to
    as the *authority*. > *   `/first/second_one/page.html` is the path. > *   `answer=no`
    is the query string, which can include several parameters. > *   `exactly_here`
    is the fragment.    The purpose of the RFC 3986 standard is to define a method
    of identification for all possible resources and to include particular cases already
    in common use. However, we’re only concerned with HTTP and web pages in this chapter,
    so I won’t spend any more time on the most general formats.    There is just one
    more scheme that you might find useful in your web pages: `mailto`. By including
    a link to the URI `mailto:John.Doe@nowhere.com` within a web page, you can allow
    the viewer to start his or her e-mail program and create a new e-mail with the
    correct address already set. However, you might not like to do that, because many
    programs are capable of scanning web pages and extracting e-mail addresses from
    them for the sole purpose of sending junk mail. For a while, it was safe to display
    email addresses like `John.Doe(at)nowhere.com`, and create a JavaScript that converted
    the `(at)` into `@` before returning the link. Unfortunately the programs that
    extract email addresses from web pages have become more sophisticated in their
    searches and can deal with masked addresses. Linking a JavaScript to a clickable
    image of your address might still be safe.    Host names are case-insensitive,
    meaning that you can write [`www.GOOgle.cOM`](http://www.GOOgle.cOM) if you prefer.
    You’ll still land on the same web site. Incidentally, the same applies to e-mail
    addresses. It’s irrelevant whether you capitalize names, such as in [`John.Doe@nowhere.com`](http://John.Doe@nowhere.com).    The
    same is not true for the paths. Even though you’re running Tomcat under Windows,
    which has case-insensitive file and folder names, if you type [`http://localhost:8080/Ebookshop/`](http://localhost:8080/Ebookshop/),
    with the path capitalized, you’ll get an error page like that shown in [Figure
    A-2](#AppendixA.html#fig_A_2).  ![Image](images/9781430246237_AppA-02.jpg)  ***Figure
    A-2.** Resource not available*    Originally, domain and host names could only
    be made out of the 26 letters of the English alphabet, the 10 decimal digits,
    and dashes. In July 2003, it became possible to register `.jp` domains containing
    Japanese characters, and in March 2004, `.de` domains with diacritical characters,
    such as in Lösung and Müller, sprung up. Today, you can even use languages that
    are written from right to left.    The situation is different for paths and queries.
    They can include any character of the ISO 8859-1 (ISO Latin1) character set, which
    is a superset of the well-known ASCII standard. But of the 256 ISO Latin1 characters,
    all the non ASCII characters, the non printing ASCII characters, and even some
    of the printing ASCII characters need to be encoded in hexadecimal format.    For
    example, the path `/my preferred physicists/Erwin Schrödinger.html` must be encoded
    as follows:  `/my%20preferred%20phycisists/Erwin%20Schr%F6dinger.html`  where
    `%20` is ISO Latin1-32 (the space) and `%F6` is ISO Latin1-246 (the o-umlaut ö).    In
    some cases, it is necessary to encode characters to prevent the browser from interpreting
    them as URL separator characters. For example, suppose you want to execute a JSP
    page with a parameter set to the ampersand. If you type this URL:    [`http://myServer.com/myPage.jsp?myPar=&`](http://myServer.com/myPage.jsp?myPar=&)    your
    browser will send to the server a request with the parameter `myPar` set to the
    empty string. This is because the ampersand is normally used to indicate that
    another parameter follows, and the browser doesn’t complain about the trailing
    ampersand because it is legal not to write any further parameter after it. As
    a result, the browser behaves exactly as if you had ended the URL at the equal
    sign. To send the correct query, you have to replace the ampersand with `%26`.    Although
    ampersands cause problems in queries because they are used as separators, they
    are OK within the file and folder names that form paths. Conversely, some characters,
    such as colons and question marks, are OK in the query but not in the path.    All
    in all, be careful when using special characters. You can download tables of Unicode
    characters and their hex representations from [`http://unicode.org/charts/`](http://unicode.org/charts/).    ###
    XHTML vs HTML    Throughout this book, I have mostly showed you markup code conforming
    to the XHTML standard, rather than HTML. The current WorldWide Web Consortium
    (W3C) standards for the two languages are HTML 4.01 ([`http://www.w3.org/TR/1999/REC-html401-19991224/`](http://www.w3.org/TR/1999/REC-html401-19991224/))
    and XHTML 1.1 ([`http://www.w3.org/TR/xhtml11/`](http://www.w3.org/TR/xhtml11/)).    Except
    for the *ruby* collection of elements ([`http://www.w3.org/TR/2001/REC-ruby-20010531/`](http://www.w3.org/TR/2001/REC-ruby-20010531/)),
    which provides a mechanism to write annotations, and the replacement of the `name`
    attribute of the elements `a` and `map` with the `id` attribute, tags and attributes
    defined in the two standards are the same.    In essence, the differences between
    HTML and XHTML are as follows:    > *   **All XHTML elements must be properly
    nested**: For example, in HTML, you can write `<b><i>whatever</b></i>`. In XHTML,
    you must write `<b><i>whatever</i></b>`. > *   **All XHTML elements must be closed**:
    For example, in HTML, you can write `<p>` without a corresponding `</p>`, and
    you can write `<hr>` and `<br>` without a slash before the closing bracket. In
    XHTML, you must match each `<p>` with a `</p>` and write `<hr/>` and `<br/>`.
    > *   **All XHTML elements must be in lowercase**: XHTML doesn’t allow you to
    write elements in uppercase, such as `<HTML>` and `<BODY>`. > *   **All XHTML
    elements must be nested inside the `<html>` element**: This is not enforced in
    HTML.    Both standards have deprecated some elements that were widely used in
    past versions of HTML. Just in case you see them in some non-conforming documents,
    I have listed them in [Table A-1](#AppendixA.html#tab_A_1).    ![Image](images/9781430246237_Tab0A-01.jpg)    As
    you can see, you can replace most of the deprecated elements by defining styles.    To
    do strict validation of XHTML code against the latest standard, you write at the
    top of your documents the following two special elements:  `<?xml version=''1.0''
    encoding=''utf-8''?>` `<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.1//EN"` ![Image](images/U002.jpg)
    `    "http://www.w3.org/TR/xhtml11/DTD/xhtml11.dtd">`  With HTML, you write instead:  `<!DOCTYPE
    HTML PUBLIC "-//W3C//DTD HTML 4.01//EN"` ![Image](images/U002.jpg) `    "http://www.w3.org/TR/html4/strict.dtd">`  You
    can also decide *not* to apply strict validation, in which case the two document-type
    elements become respectively  `<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"`
    ![Image](images/U002.jpg) `    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">`  and  `<!DOCTYPE
    HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN"` ![Image](images/U002.jpg)
    `    "http://www.w3.org/TR/html4/loose.dtd">`  If you do so, you can use the deprecated
    elements listed in [Table A-1](#AppendixA.html#tab_A_1).    If you want to use
    HTML frames within your XHTML page, you have to use the following doctype:  `<!DOCTYPE
    html PUBLIC "-//W3C//DTD XHTML 1.0 Frameset//EN"` ![Image](images/U002.jpg) `    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-frameset.dtd">`  This
    performs the exact same validation as the transitional `DOCTYPE`, but it also
    accepts `<frameset>`, which can replace `<body>`. In other words, the pages with
    frames aren’t strictly validated, although obviously this doesn’t prevent you
    from conforming to the strict validation rules when using frames. Before deciding
    to use frames, keep in mind that their use is somewhat controversial. Some people
    don’t like them and simply disable them in their browsers. Others might use audio
    browsers and simply be unable to access frames. If you want to reach the widest
    audience, you should develop a second version of your pages without frames. Actually,
    to be sure that everything will work, you should design frameless pages first
    and only add the frames later. You might wonder why you should develop framed
    versions at all, and you’d be right. Follow my advice: forget the frames and apply
    strict XHTML validation. The time will certainly come when you’ll be happy to
    have made these choices.    In any case, to complete the subject, here is the
    `DOCTYPE` element for HTML 4.01 that allows you to use frames:  `<!DOCTYPE HTML
    PUBLIC "-//W3C//DTD HTML 4.01 Frameset//EN"` ![Image](images/U002.jpg) `    "http://www.w3.org/TR/html4/frameset.dtd">`  Before
    moving on, I will still mention the XHTML 2.0 standard ([http://www.w3.org/TR/xhtml2/](http://www.w3.org/TR/xhtml2/)).
    In my opinion, it is not likely to see wide adoption. Its main problem is that
    it is not back compatible with HTML4 and XHTML1.    ### XHTML/HTML Elements    [Table
    A-2](#AppendixA.html#tab_A_2) summarizes all valid HTML elements according to
    the standards HTML 4.01 and XHTML 1.0 when strictly applied. A slash after a tag
    name indicates that the element is always bodyless.    ![Image](images/9781430246237_Tab0A-02.jpg)    ![Image](images/9781430246237_Tab0A-02a.jpg)    ![Image](images/9781430246237_Tab0A-02b.jpg)    ![Image](images/9781430246237_Tab0A-02c.jpg)    ###
    HTML5    HTML5 is a specification originally created by the Web Hypertext Application
    Technology Working Group (WHATWG, [`http://www.whatwg.org`](http://www.whatwg.org)),
    a group founded by people from Apple, the Mozilla Foundation, and Opera Software
    that now includes many other organizations. HTML5’s main purpose is to provide
    a comfortable language to develop cross-platforms mobile applications.    Steve
    Jobs welcomed HTML5 as an alternative to Flash to embed rich content in web pages
    and Adobe announced that, for mobile devices, they will move from Flash to HTML5\.
    W3C is working on adopting it as a standard ([`http://www.w3.org/TR/2012/WD-html5-20120329/`](http://www.w3.org/TR/2012/WD-html5-20120329/))
    but it has not happened just yet.    HTML5 has removed some HTML4 elements (`acronym`,
    `big`, and `tt`), redefined or modified some others (`a`, `address`, `hr`, `i`,
    `legend`, and `u`), and resurrected a few elements that had been deprecated in
    HTML4 (`iframe`, `menu`, and `s`). The most important aspect of HTML5, though,
    is the introduction of elements that support a structuring of web pages and the
    easy embedding of rich content. I have listed the new elements in [Table A-3](#AppendixA.html#tab_A_3),
    but I am not going to describe them in detail, because it would be beyond the
    scope of this book.    ![Image](images/9781430246237_Tab0A-03.jpg)    ![Image](images/9781430246237_Tab0A-03a.jpg)    ###
    HTML Documents    HTML documents are organized as a hierarchy of elements that
    normally consist of content enclosed between a pair of start and end tags. For
    example, the tags `<html>` and `</html>` delimit the whole HTML document.    The
    start tag can include element attributes, such as `id` in `<map id="mymap">`.
    Some elements are empty, in which case you can usually replace the end tag with
    a slash immediately before the closing bracket of the start tag, as in `<img src="mypict.gif"/>`.
    Unfortunately, this isn’t always possible, as the form `<script ... />` isn’t
    valid, and you have to keep both `<script>` and `</script>` tags even when there
    is nothing between them.    You can nest HTML elements inside each other and,
    in fact, without nesting, no HTML page would be possible.    [Listing A-1](#AppendixA.html#list_A_1)
    shows the simplest possible HTML page you can write while still applying strict
    XHTML validation.    ***Listing A-1.** basic.html*  `<!DOCTYPE html PUBLIC "-//W3C//DTD
    XHTML 1.0 Strict//EN"` `  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">`
    `<html >` `<head><title>Page title</title></head>` `<p>This shouldn''t be displayed,
    but it is!</p>` `<body>` `Here is where you put your page content.<br/>` `Of the
    following 11 spaces >           < only one is displayed.` `</body>` `</html>`  [Figure
    A-3](#AppendixA.html#fig_A_3) shows the outcome of [Listing A-1](#AppendixA.html#list_A_1).  ![Image](images/9781430246237_AppA-03.jpg)  ***Figure
    A-3.** A basic HTML page*    Place your content between `<body>` and `</body>`
    to have it displayed in the main browser window. The browser also displays the
    page title, but most of the rest of [Listing A-1](#AppendixA.html#list_A_1) remains
    hidden. Furthermore, any sequence of spaces, tabs, and newlines is normally rendered
    as a single space, and in several cases, even that single remaining space is omitted—for
    example, when it immediately follows the start paragraph tag (`<p>`) or the break
    tag (`<br/>`). This gives you plenty of flexibility to format the page source
    as you like, and you should use it to make the code more maintainable through
    proper indentation and spacing.    Notice that the paragraph  `<p>This shouldn''t
    be displayed, but it is!</p>`  shouldn’t be displayed in the browser because it
    is outside the `body` element. And yet, as you can see in [Figure A-3](#AppendixA.html#fig_A_3),
    it is. All browsers I have tested (IE, Chrome, Firefox, and Opera) do it. I recommend
    that you include all the content elements of your pages inside the `body`, where
    they should be, because you never know what will happen in the future.    Essentially,
    an HTML document consists of text, images, audio and video clips, active components
    such as scripts and executables, and hyperlinks. A browser then interprets and
    renders the components in sequence, mostly without inserting any empty space or
    newline between them.    A browser renders every component according to a series
    of defaults specified in the HTML/XHTML standard. You can change the defaults
    regarding fonts and font sizes of normal text by setting the appropriate browser
    options. In general, and more importantly, you can override the defaults when
    writing your HTML pages by defining the corresponding attributes of the enclosing
    tags or by defining a style. For example, you can underline text:  `<p style="text-decoration:
    underline">this is underlined</p>`  or you can choose a background color for your
    page:  `<body style="background-color: yellow">`  ![Image](images/square.jpg)
    **Tip** To shrink an image, reduce the original image on the server rather than
    change its height and width with the corresponding attributes of the `<img>` element.
    Your page will load faster.    You can use the `<object>` element to include any
    component. For example, this code shows how to display a short video clip in Flash
    format:  `<object type="application/x-shockwave-flash"` `    data="myClip.swf"
    width="400" height="300">` `  <param name="movie" value="myClip.swf"/>` `  <p>This
    is a Flashy movie</p>` `  </object>`  The following code lets you download an
    MPEG movie file:  `<object type="video/mpeg"` `     data=myClip.mpeg height="120"
    width="180">` `  <p>Click <a href=MyMovie.mpeg>here</a> to download</p>` `  </object>`  And
    this code lets you display a JPEG image:  `<object type="image/jpeg"` `    data="myImage.jpg"`
    `    style="border-style: solid; border-width: 1px"/>`  In any case, you might
    prefer to use the `<img>` element for images, because it allows you to define
    the short description text that appears when you hover with your mouse over the
    image:  `<img src="myImage.jpg" alt="whatever it is"/>`  ![Image](images/square.jpg)
    **Caution**  The example showing how to embed Flash only works for short video
    clips. To show long Flash movies or Flash streams, you have to do something more
    complicated; otherwise, it won’t work with Internet Explorer. For more information,
    go for example to [http://helpx.adobe.com/flash/kb/object-tag-syntax-flash-professional.html](http://helpx.adobe.com/flash/kb/object-tag-syntax-flash-professional.html).    ###
    Standard Attributes    Most HTML elements support a standard set of attributes,
    which are classified in core, language, and keyboard attributes.    #### Core
    Attributes    The core attributes are valid in all elements except `base`, `head`,
    `html`, `meta`, `param`, `script`, `style`, and `title`.    ##### class    The
    `class` attribute accepts as a value the name of a class to which the element
    belongs. Use it as a CSS selector. For example, you can define the style of the
    class `warning_text` as follows:  `<style> p.warning_text {color:red} </style>`  and
    then use the class name in the appropriate element:  `<p class="warning_text"
    id="warn1">This text is displayed in red</p>`  ##### id    The `id` attribute
    associates an element with a unique identifier within the document. Use it whenever
    you need to identify a particular element. For example, if you write `<a id="point1"/>`
    somewhere within a long web page stored in, say, `mypage.html`, you’ll be able
    to jump directly to that position by clicking on a hyperlink created with this
    code:  `<a href="http://mysite.com/mypage.html#point1">go to my page point 1</a>`  To
    jump there from within the same page, you don’t need to include the full URI,
    but only the locator part, as in  `<a href="#point1">go to point 1</a>`  #####
    style    The `style` attribute identifies an inline style definition. It’s good
    to be able to define simple one off styles within the HTML page, but if you use
    the same styles in several elements, you should define them by placing a `style`
    element inside the `head` element of the document. If you define styles to be
    used in more than one document, you should write a separate style sheet and load
    it by placing a `link` element inside the `head`.    The following is a simple
    example of a style definition using the `style` attribute:  `<table style="font-weight:bold;
    background-color:#C0C0C0">`  ##### title    The `title` attribute displays tooltip
    text when the cursor is held over the element.    #### Language Attributes    Language
    attributes are *not* valid in `base`, `br`, `frame`, `frameset`, `hr`, `iframe`,
    `param`, and `script`. A good reference for these attributes is in [`http://www.w3.org/TR/html4/struct/dirlang.html`](http://www.w3.org/TR/html4/struct/dirlang.html).    #####
    dir    You use the `dir` attribute to set the text direction. It can have the
    values `ltr` (left-to-right) and `rtl` (right-to-left).    ##### lang    The `lang`
    attribute sets the language of the element and accepts a language code as a value.
    The valid language codes are listed in the ISO standard ISO 639-1:2002\. Unfortunately,
    it is only available for 140 Swiss Francs. If you search the Internet, you will
    find several web sites that list the codes like, for example, [`http://xml.coverpages.org/iso639a.html`](http://xml.coverpages.org/iso639a.html)
    and [`http://www.mathguide.de/info/tools/languagecode.html`](http://www.mathguide.de/info/tools/languagecode.html).
    Even if they might refer to the previous version of the ISO standard, ISO 639:1988,
    they will still be to a large extent correct. Alternatively, you can also look
    at the half a dozen Wikipedia pages on ISO 639 ([`http://en.wikipedia.org/wiki/ISO_639`](http://en.wikipedia.org/wiki/ISO_639)).    Examples
    of valid language codes are `en` for English, `he` for Hebrew, `en-US` for American
    English, and `x-klingon` for Star Trek’s Klingon language. The setting of a language
    can assist search engines, speech synthesizers, and spell and grammar checkers,
    to name a few. It can also help render language specific features such as hyphenation.    ####
    Keyboard Attributes    You’re probably never going to use keyboard attributes,
    but I’ll list them just to be thorough.    ##### accesskey    The `accesskey`
    attribute assigns a keyboard key to an element. By pressing that key when the
    page is displayed in a browser, the user shifts the focus to that element. This
    was meant as a way of helping people with some disabilities, but it doesn’t work
    well, and not all keys are possible with all browsers. Also, you’re supposed to
    press the Alt key while pressing the `accesskey`, so you run into trouble with
    IE because Alt is used to give all sorts of commands. Good luck!    ##### tabindex    The
    `tabindex` attribute lets you specify the sequence of fields in a form when you
    tab through them. Again, I couldn’t get it to work consistently (or at all).    ###
    Event Attributes    The purpose of most of these attributes is to link scripts
    (typically, JavaScript code) to particular actions that the user performs on HTML
    elements. They are called event attributes because they generate events that trigger
    the execution of scripts. There are five types of event attributes: object, form,
    image, keyboard, and mouse.    The general format is as follows:  `<element event_attribute="script
    to be executed">`  For example:  `<input type="submit" onmouseover="show_mess()"/>`  executes
    the function `show_mess` when the cursor passes across the submit button of a
    form.    #### Object Event Attributes    There are four attributes in this group:
    `onload`, `onunload`, `onresize`, and `onabort`.    `onload`, which is available
    for the elements `body`, `frame`, `frameset`, `iframe`, `img`, `input` with the
    attribute `type="image"`, `link`, `script`, and `style`, executes a script when
    the element is loaded. For example,  `<body onload="initFun()">`  causes the JavaScript
    function named `initFun` to run when the page is loaded.    `onunload`, which
    is only valid with `body` and `frameset`, causes a script to be executed when
    the page unloads.    `onresize` is available for most elements. It triggers the
    execution of a script when the size of an element changes.    `oabort` triggers
    an event when the loading of an image is stopped before completion.    #### Form
    Event Attributes    [Table A-4](#AppendixA.html#tab_A_4) describes the events
    in this group.    ![Image](images/9781430246237_Tab0A-04.jpg)    While `onreset`,
    `onsubmit`, and `onselect` specifically apply to form elements, the other attributes
    apply to most HTML elements.    #### Keyboard Event Attributes    There are only
    three attributes in this group: `onkeydown`, `onkeyup`, and `onkeypressed`. They
    trigger an event for the element that is currently on focus. The attribute `onkeypressed`
    is activated when the user presses a key down and then releases it. These attributes
    apply to most HTML elements.    #### Mouse Event Attributes    [Table A-5](#AppendixA.html#tab_A_5)
    describes the events in this group. These attributes apply to most HTML elements.    ![Image](images/9781430246237_Tab0A-05.jpg)    ###
    Tables    A table consists of rows and columns, with cells containing text, images,
    and other components. In almost every chapter of this book, you’ll find examples
    of tables. Tables are an easy way to present components in an organized fashion.    [Listing
    A-2](#AppendixA.html#list_A_2) shows the code that generates the simple table
    of [Figure A-4](#AppendixA.html#fig_A_4).    ***Listing A-2.** HTML Code for a
    Table*  `<table border="1"><tr style="background-color: #c0c0c0"><th>abc</th><th`
    `align="center" colspan="2">a 2-column span</th></tr><tr><td>a1</td><td>` `a2</td><td>a3</td></tr><tr><td
    rowspan="2">2-row<br/>span</td><td>b2` `</td><td>b3</td></tr><tr><td>c2</td><td>c3</td></tr></table>`
    ![Image](images/9781430246237_AppA-04.jpg)  ***Figure A-4.** An HTML-generated
    table*    I’ve purposely packed the code to show you how difficult it is to interpret
    it without proper indentation. You should find [Listing A-3](#AppendixA.html#list_A_3)
    more readable.    ***Listing A-3.** table.html*  `<!DOCTYPE html PUBLIC "-//W3C//DTD
    XHTML 1.0 Strict//EN"` `  "http//www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">`
    `<html xmllang="en" lang="en">` `<head><title>Table</title></head>` `<body>` `<table
    border="1">` `  <tr style="background-color: #c0c0c0">` `    <th>abc</th>` `    <th
    align="center" colspan="2">a 2-column span</th>` `    <!-- item merged into item
    on the left -->` `    </tr>` `  <tr>` `    <td>a1</td>` `    <td>a2</td>` `    <td>a3</td>`
    `    </tr>` `  <tr>` `    <td rowspan="2">2-row<br/>span</td>` `    <td>b2</td>`
    `    <td>b3</td>` `    </tr>` `  <tr>` `    <!-- item merged into item above -->`
    `    <td>c2</td>` `    <td>c3</td>` `    </tr>` `  </table>` `</body>` `</html>`  This
    code should be pretty self explanatory. Notice how the browser sets the size of
    the different cells to the minimum necessary. You can change that by defining
    styles to set cell dimensions.    #### Table Structure    You use the element
    `table` to define a table. Inside `table`, immediately after the start tag, you
    can place a single `caption` element to identify a string that the browsers display
    immediately above the table.    Use the `tr` element to define rows within the
    table, and use `td` to define cells (i.e., columns) within the rows. If you want,
    you can use `th` for the table header instead of `tr`. The browsers will highlight
    it in bold.    To facilitate scrolling and printing of long tables, you can flag
    some rows at the top and/or at the bottom of the table as having particular significance.
    To do so, place the header rows inside the `thead` element, the footer rows inside
    the element `tfoot`, and the rest of the rows inside the `tbody` element.    You
    can also define attributes of columns before defining the rows that contain the
    actual table cells. You do this with the `col` element, which is not as useless
    as it might appear at first, because tables are defined one cell at a time. Therefore,
    without `col`, you would have to define the cell attributes for each individual
    cell. With `col`, you can define those attributes only once for all the cells
    belonging to one column. It potentially avoids a lot of repetitions and makes
    the code more readable.    #### Table Width    To define the width of the whole
    table, you use the `width` attribute. You can express it either in pixels or as
    a percentage of the enclosing window. For example, `<table width="100%">` defines
    a table as wide as the whole window. Please note that the browsers tend to have
    a lot of initiative when it comes to rendering tables. You cannot really rely
    on this attribute. Trial and error using different browsers is advisable.    ####
    Table Borders    You can define the thickness in pixels of the border enclosing
    the whole table with the `border` attribute. The default is `border="0"`, and
    with any border greater than zero, each individual cell is highlighted by a thin
    border.    Once you’ve defined a border of nonzero thickness, you can use the
    `frame` attribute to define which sides of the border surrounding the whole table
    are to be visible. [Table A-6](#AppendixA.html#tab_A_6) shows the possible values.
    The default (i.e., when you omit the `frame` attribute) is `"border"`.    ![Image](images/9781430246237_Tab0A-06.jpg)    ![Image](images/9781430246237_Tab0A-06a.jpg)    The
    `rules` attribute defines the horizontal and vertical divider lines between rows
    and columns. It can have the following values: `none`, `groups`, `rows`, `cols`,
    and `all`. The rules are single lines, not the thin cell borders that are shown
    when the `rules` attribute is missing. With `rules="groups"`, the lines are only
    drawn between the groups of columns defined with `colgroup`. [Figure A-5](#AppendixA.html#fig_A_5)
    shows some examples of tables with different combinations of frames and rules
    viewed with Firefox. Unfortunately, the major browsers don’t agree on how these
    borders, frames, and rules should be displayed. [Figures A-6](#AppendixA.html#fig_A_6)
    to [A-8](#AppendixA.html#fig_A_8) show how Chrome, Opera, and IE9 render the same
    document `table_frame.html` used for [Figure A-5](#AppendixA.html#fig_A_5).  ![Image](images/9781430246237_AppA-05.jpg)  ***Figure
    A-5.** Rendering of table frames and rules - Firefox*  ![Image](images/9781430246237_AppA-06.jpg)  ***Figure
    A-6.** Rendering of table frames and rules - Chrome*  ![Image](images/9781430246237_AppA-07.jpg)  ***Figure
    A-7.** Rendering of table frames and rules - Opera*  ![Image](images/9781430246237_AppA-08.jpg)  ***Figure
    A-8.** Rendering of table frames and rules – IE9*    The differences between the
    browsers mean that, when using table formatting, you need to check your pages
    with all major browsers and choose the best combination of attributes.    ####
    Row and Cell Alignment    All three elements `tr`, which defines rows; `td`, which
    define cells within rows; and `th`, which defines header cells; accept the four
    alignment attributes `align`, `valign`, `char`, and `charoff`. Additionally, `td`
    and `th` also accept the attributes `abbr`, `axis`, `colspan`, `headers`, `rowspan`,
    and `scope`.    ![Image](images/square.jpg) **Caution**  Cell elements are contained
    inside row elements. That’s why it makes sense to talk about cells rather than
    columns. It’s your responsibility to ensure that each row element includes the
    correct number of cell elements.    ##### align, char, and charoff    The `align`
    attribute defines the horizontal alignment of the content in a table cell, or
    in all cells of a row when applied to `tr`. It can have the following values:
    `left`, `right`, `center`, `justify`, and `char`.    In particular, `align="char"`
    means that the text is aligned with respect to one particular character. The default
    for this character is the period, so that numbers with decimal digits are displayed
    with the periods aligned vertically. To change the character used for alignment,
    use the attribute `char`, as in `char=";"`, which would align the values on a
    semicolon instead of on the default period. You also have the possibility of introducing
    an offset in the alignment with the attribute `charoff`. For example, `charoff="10%"`
    shifts the alignment to the right by 1/10 of the cell size, while `charoff="10"`
    shifts it to the right by 10 pixels. Shifts to the left are obtained with negative
    values. It sounds cool, doesn’t it? Well, forget it, because none of the major
    browsers supports either char or charoff. Same story with `align="justify"`. There
    goes our beloved conformance to standards! I’m keeping this description in this
    book because the problem might be fixed in the future. Also, I don’t want you
    to waste the time I invested in testing those features.    ##### valign    The
    `valign` attribute defines the vertical alignment of the content in a table cell.
    It can have the values `top`, `middle`, `bottom`, and `baseline`. Baseline means
    that the characters are aligned on the same line of text regardless of their size.
    [Figure A-9](#AppendixA.html#fig_A_9) clearly shows the differences when the four
    possible values of `valign` are applied to the cells with the small `joy`. The
    document I used to generate the figure is `table_valign.html`.  ![Image](images/9781430246237_AppA-09.jpg)  ***Figure
    A-9.** The four possible values of the valign attribute*    ##### abbr and axis    The
    `abbr` attribute specifies an abbreviated version of the cell content. The `axis`
    attribute provides a way of categorizing cells. Its value is a string identifying
    the category.    Neither attribute has any effect on normal browsers, but they
    can be useful for screen readers.    ##### colspan and rowspan    `colspan` and
    `rowspan` let you expand a cell over several columns and rows. For example, let’s
    say you want to generate the table you see in [Figure A-10](#AppendixA.html#fig_A_10).  ![Image](images/9781430246237_AppA-10.jpg)  ***Figure
    A-10.** Grouping of table columns and rows with colspan and rowspan*    To create
    such a table, you can use the code shown in [Listing A-4](#AppendixA.html#list_A_4).    ***Listing
    A-4.** cr_span.html*  `<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN"`
    `  "http//www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">` `<html xmllang="en" lang="en">`
    `<head>` `  <title>Example of colspan and rowspan</title>` `  <style type="text/css">body
    {font-size:16pt}</style>` `  <style type="text/css">.g1 {background-color: #c0c0c0}</style>`
    `  <style type="text/css">.g2 {background-color: #808080}</style>` `  </head>`
    `<body>` `<table cellpadding="2" border="1" rules="all">` `  <tr>` `    <td rowspan="2"
    class="g2">(1,1)<br/>(2,1)</td>` `    <td colspan="2" class="g1">(1,2) (1,3)</td>`
    `    </tr>` `  <tr>` `    <!-- (2,1) was defined one row up -->` `    <td>(2,2)</td>`
    `    <td rowspan="2" class="g2")>(2,3)<br/>(3,3)</td>` `    </tr>` `  <tr>` `    <td
    colspan="2" class="g1">(3,1) (3,2)</td>` `    <!-- (3,3) was defined one row up
    -->` `    </tr>` `  </table>` `</body>` `</html>`  Be very systematic when using
    these attributes, because you can easily mess up the table!    ##### headers    The
    `headers` attribute is a space-separated list of cell IDs that supplies header
    information for the cells. Its purpose is to allow text-only browsers to render
    the header information. [Listing A-5](#AppendixA.html#list_A_5) shows how to use
    it.    ***Listing A-5.** td_headers.html*  `<!DOCTYPE html PUBLIC "-//W3C//Dtd
    XHTML 1.0 Strict//EN"` `  "http//www.w3.org/TR/xhtml1/Dtd/xhtml1-strict.dtd">`
    `<html xmllang="en" lang="en">` `<head><title>Test of td headers attribute</title></head>`
    `<body>` `<table border="1">` `  <caption>Average Height</caption>` `  <tr>` `    <th
    id="c">Country</th>` `    <th id="m">Males</th><th id="f">Females</th>` `    </tr>`
    `  <tr>` `    <td id="au" headers="c">Australia</td>` `    <td headers="m au">5
    ft 10.2</td><td headers="f au">5 ft 4.5</td>` `    </tr>` `  <tr>` `    <td id="us"
    headers="c">U.S.A.</td>` `    <td headers="m us">5 ft 9.4</td><td headers="f us">5
    ft 4</td>` `    </tr>` `  </table>` `</body>` `</html>`  Note that `headers` has
    no effect on how the table is rendered on normal browsers.    ##### scope    The
    `scope` attribute identifies a cell that provides header information for the row
    that contains it (`scope="row"`), the column (`scope="col"`), the row group (`scope="rowgroup"`),
    or the column group (`scope="colgroup"`). A row group consists of the rows identified
    by one of the elements `thead`, `tbody`, or `tfoot`). For an explanation of column
    groups, see below.    `scope`, like `headers`, `abbr`, and `axis`, is only useful
    for non-visual browsers.    #### Columns    As I said in the “Table Structure”
    section, you can define attributes for all the cells in a column by means of the
    `col` element. In the table of [Figure A-11](#AppendixA.html#fig_A_11), I used
    `col` to give a gray background to the second column and a right alignment to
    the third one. The code is shown in [Listing A-6](#AppendixA.html#list_A_6).  ![Image](images/9781430246237_AppA-11.jpg)  ***Figure
    A-11.** Example of `col`*    ***Listing A-6.** table_col.html*  `<!DOCTYPE html
    PUBLIC "-//W3C//Dtd XHTML 1.0 Strict//EN"` `  "http//www.w3.org/TR/xhtml1/Dtd/xhtml1-strict.dtd">`
    `<html xmllang="en" lang="en">` `<head><title>Test of table col element</title></head>`
    `<body>` `<table border="1">` `  <col/>` `  <col style="background-color:#C0C0C0"/>`
    `  <col align="right"/>` `  <tr><th>first</th><th>second</th><th>third</th></tr>`
    `  <tr><td>column</td><td>column</td><td>column</td></tr>` `  <tr><td>only defaults</td><td>in
    gray</td><td>right aligned</td></tr>` `  </table>` `</body>` `</html>`  As you
    can see from [Listing A-6](#AppendixA.html#list_A_6), there are three `col` elements
    that apply to the three columns of the table, from left to right. It isn’t necessary
    to have all the `col` elements before the `tr` elements or to have as many `col`
    elements as the number of columns actually present in the table. You can freely
    mix `col` and `tr`. What counts is only the order in which you write the `col`
    elements.    Unfortunately, so far, the only one of the major browsers that completely
    supports `col` is Opera. If you view `table_col.html` with Firefox, IE9, or Chrome,
    the second column has a gray background, but the third column is not right-aligned.
    And yet, all three browsers correctly render `align="right"` when it is placed
    inside individual cells rather than in the `col` element.    #### Column Groups    You
    can identify groups of contiguous columns with the table element `colgroup`. In
    addition to the attributes `align`, `char`, `charoff`, `valign`, and `width`,
    `colgroup` also accepts `span`, which defines how many columns from left to right
    are to be grouped. In connection with the table attribute `rules`, you can use
    column groups to decide when to show column separators. For example, see [Figure
    A-12](#AppendixA.html#fig_A_12) and the corresponding code in [Listing A-7](#AppendixA.html#list_A_7).  ![Image](images/9781430246237_AppA-12.jpg)  ***Figure
    A-12.** Example of `colgroup`*    ***Listing A-7.** table_colgroup.html*  `<!DOCTYPE
    html PUBLIC "-//W3C//Dtd XHTML 1.0 Strict//EN"` `  "http//www.w3.org/TR/xhtml1/Dtd/xhtml1-strict.dtd">`
    `<html xmllang="en" lang="en">` `<head>` `  <title>Test of table colgroup element</title>`
    `  <style type="text/css">body {font-size:16pt}</style>` `  </head>` `<body>`
    `<table border="1" cellpadding="2" rules="groups">` `  <colgroup span="1"/>` `  <colgroup
    span="2" style="background-color:#C0C0C0"/>` `  <colgroup span="1"/>` `  <tr><td>(1,1)</td><td>(1,2)</td><td>(1,3)</td><td>(1,4)</td></tr>`
    `  <tr><td>(2,1)</td><td>(2,2)</td><td>(2,3)</td><td>(2,4)</td></tr>` `  <tr><td>(3,1)</td><td>(3,2)</td><td>(3,3)</td><td>(3,4)</td></tr>`
    `  </table>` `</body>` `</html>`  Notice how you can use the `style` attribute
    of `colgroup` to define styles shared by all the columns of the groups. As this
    works with all four major browsers (while, as we have just seen, `col` does not),
    you can use `colgroup` with `span="1"` where you would normally use `col`.    I
    encourage you to check the rendering of your pages with all major browsers before
    deploying them, because you shouldn’t take anything for granted. For example,
    in `table_colgroup.html`, you shouldn’t need to define the third `colgroup`. It
    doesn’t serve any purpose. But if you remove it, IE9 and Opera will *not* render
    the rule on the right-hand side of the second group, which separates the third
    group of columns from the second one.    #### Table Header, Body, and Footer    With
    the table elements `thead`, `tbody`, and `tfoot`, you can split all the rows of
    a table into three groups: header, body, and footer. This allows browsers to perform
    a more intelligent scrolling of long tables. In practice, you can use them to
    separate cells horizontally, as shown in [Figure A-13](#AppendixA.html#fig_A_13).  ![Image](images/9781430246237_AppA-13.jpg)  ***Figure
    A-13.** Example of thead, tbody, and tfoot*    [Listing A-8](#AppendixA.html#list_A_8)
    shows you how to create the table of [Figure A-13](#AppendixA.html#fig_A_13).    ***Listing
    A-8.** table_rowgroup.html*  `<!DOCTYPE html PUBLIC "-//W3C//Dtd XHTML 1.0 Strict//EN"`
    `  "http//www.w3.org/TR/xhtml1/Dtd/xhtml1-strict.dtd">` `<html xmllang="en" lang="en">`
    `<head>` `  <title>Test of table row grouping</title>` `  <style type="text/css">body
    {font-size:16pt}</style>` `  </head>` `<body>` `<table border="1" cellpadding="2"
    rules="groups">` `  <colgroup span="1"/>` `  <thead style="font-weight:bold; background-color:#C0C0C0">`
    `    <tr><td>(1,1)</td><td>(1,2)</td><td>(1,3)</td></tr>` `    </thead>` `  <tr><td>(2,1)</td><td>(2,2)</td><td>(2,3)</td></tr>`
    `  <tr><td>(3,1)</td><td>(3,2)</td><td>(3,3)</td></tr>` `  <tr><td>(4,1)</td><td>(4,2)</td><td>(4,3)</td></tr>`
    `  <tfoot style="font-weight:bold">` `    <tr><td>(5,1)</td><td>(5,2)</td><td>(5,3)</td></tr>`
    `    <tr><td>(6,1)</td><td>(6,2)</td><td>(6,3)</td></tr>` `    </tfoot>` `  </table>`
    `</body>` `</html>`  Notice that I’ve only defined a header and a footer. It would
    be better programming to define the body as well. But I wanted to show you that
    it is not essential.    ### Input Forms    To turn your web pages into an interactive
    experience, you have to give users the ability to make choices and type or upload
    information. To achieve this, you use the `form` element, which accepts data from
    the user and sends it to the server.    This book is full of examples of input
    forms. But a summary of all possible input elements as shown in [Figure A-14](#AppendixA.html#fig_A_14)
    might be useful as a reference. The browser was Chrome.  ![Image](images/9781430246237_AppA-14.jpg)  ***Figure
    A-14.** An HTML form with examples of all input elements*    The various types
    of the `input` element let the user enter a string of text or a password, check
    one or more check boxes, choose one of several radio buttons, upload a file, submit
    a form, reset a form’s fields, or trigger a JavaScript action by clicking a button.
    The `textarea` element lets the user enter several lines of text, while the `fieldset`
    element lets you group several input fields under one or more headings. To present
    multiple choices, you use the `select` element, which contains one `option` element
    for each alternative. [Listing A-9](#AppendixA.html#list_A_9) shows the source
    code of [Figure A-14](#AppendixA.html#fig_A_14).    ***Listing A-9.** form.html*  `<!DOCTYPE
    html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN"` `  "http//www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">`
    `<html xmllang="en" lang="en">` `<head>` `  <title>Example of input form</title>`
    `  <style type="text/css">` `    td.h {font-size: 120%; font-weight: bold}` `    </style>`
    `  </head>` `<body>` **`<form action="">`** **`  <input type="hidden" name="agent"
    value="007"/>`** `  <table  cellpadding="5" border="1" rules="all">` `    <tr>`
    `      <td class="h">Element</td><td class="h">Attribute</td>` `      <td class="h">Result</td></tr>`
    `    <tr>` `      <td>input</td><td>type="text"</td>` `      <td><input type="text"
    name="t"/></td>` `      </tr>` `    <tr>` `      <td>input</td><td>type="password"</td>`
    `      <td><input type="password" name="p"/></td>` `      </tr>` `    <tr>` `      <td>input</td><td>type="checkbox"</td>`
