    如果你指定了 `beanName` 属性而不是 `class` 属性，Tomcat 的行为会与指定了 `class` 类似，但前提是它会先尝试查找该类的序列化
    bean。序列化一个 bean 意味着将对象的数据转换为字节流，并保存到扩展名为 `ser` 的文件中。Tomcat 期望在与应用程序类相同的文件夹中找到序列化对象。例如，`xxx.yyy.Zzz`
    类的序列化 bean 应位于 `WEB-INF\classes\xxx\yyy\Zzz.ser` 文件中。这种机制允许你将对象保存到文件中，然后加载到你的
    JSP 页面中。实际上，你可以拥有同一个类的多个序列化 bean（例如 `Zzz.ser`、`Zzz_test.ser`、`Zzz25.ser` 和 `Abc.ser`）。幸运的是，JSP
    的设计者已经考虑到了这个问题，并允许你在请求时设置 `beanName` 的值（其他属性必须硬编码），这样你就可以在加载序列化对象方面对页面进行参数化。


    最后，如果你指定了 `type` 并将其设置为一个完全限定的类名，但既没有指定 `class` 也没有指定 `beanName`，Tomcat 将不会实例化任何对象，而是会在给定的作用域中查找它。如果找到了，Tomcat
    会将其作为指定类型的对象提供，而不是作为其实例化来源的类的对象。如果我刚才的解释让你感到困惑，你可以遵循一个简单的规则：忘记 `jsp:useBean` 支持
    `class` 和 `beanName` 属性。让 servlet 来完成这项工作。只需注意 servlet 在正确的作用域中创建对象即可。在上一章中，`eshop`
    servlet 的初始化方法（参见清单 3.9）首先实例化了 `dataManager` 对象，然后将其保存在 `application` 作用域中。


    ![Image](img/square.jpg) **注意** 不要将 `useBean` 属性 `scope` 指定的 bean 作用域与 Tomcat
    关联到该 bean 的脚本变量的作用域混淆。


    作为 `useBean` 作用域的一个示例，以下代码实例化了一个 `MyClass` 对象，该对象在会话有效期内一直可用：


    `<jsp:useBean class="myPkg.MyClass" id="myObj" scope="session"/>`


    你可以通过以下语句，在同一个会话的任何页面中，通过名为 `myObj` 的脚本变量来访问它：


    `<jsp:useBean id="myObj" type="myPkg.MyClass" scope="session"/>`


    然而，脚本变量 `myObj` 的作用域是由你在页面中执行 `useBean` 的位置决定的，这与任何其他脚本变量的声明方式相同。如果你觉得这令人困惑，请考虑这一点：在包含第二个
    `useBean` 的页面中，在 `useBean` 动作执行之前，你无法访问脚本变量 `myObj`。在此之前，该脚本变量是未定义的，尽管名为 `myObj`
    的 bean 已经存在，因为它是由第一个 `useBean` 在先前执行的页面中实例化的。这告诉你，引用该对象的脚本变量和实际对象是两个不同的东西，具有不同的作用域，即使它们共享同一个名称。


    顺便提一下，第一个 `useBean`（带有 `class`、`id` 和 `scope`）完全等同于：


    `<%`

    `MyClass myName = new MyClass();`

    `session.setAttribute("myObj", myObj);`

    `%>`


    而第二个 `useBean`（带有 `id`、`type` 和 `scope`）等同于：


    `<%`

    `MyClass myObj = (MyClass)session.getAttribute("myObj");`

    `%>`


    这种表示应该能完全清楚地表明，对象和脚本变量是两个不同的实体。在第二个脚本小程序中，你甚至可以决定用不同的名称来调用脚本变量。


    由于通过组合其属性实现了所有选项，正如我一开始所说，`useBean` 使用起来有些棘手。但如有疑问，你随时可以回到这一页！


    #### 动作：setProperty 和 getProperty


    bean 属性不过是 bean 类的一个属性，但前提是你为该属性定义了标准的 get 和 put 方法。为了完全明确，`get` 和 `put` 都必须存在。否则，该类属性*不是*
    bean 属性。


    此外，你必须将这两个方法分别命名为 `get` 和 `put`，后跟属性名的完整名称，且首字母大写。例如，如果你定义了一个名为 `myAttr` 的属性，则必须将这两个方法命名为
    `getMyAttr` 和 `setMyAttr`。否则，Tomcat 同样不会将该属性识别为 bean 属性。


    来自 `eshop` 应用程序的一个例子会让你相信，如果 Tomcat 将一个属性识别为属性，对你来说会更有利。JSP 页面 `OrderConfirmation.jsp`
    包含以下两个元素：


    `<jsp:useBean id="customer" class="eshop.beans.Customer"/>`

    `<jsp:setProperty property="*" name="customer"/>`


    `useBean` 动作实例化了一个 `Customer` 类型的对象，并将其赋值给名为 `customer` 的变量。该动作等同于：


    `Customer customer = new Customer();`


    通过定义 `property="*"`，`setProperty` 动作告诉 Tomcat 设置新创建对象的所有 bean 属性。`setProperty`
    *没有*说明的是应该将它们设置为什么值。这是因为这些值来自与属性*完全同名*的请求参数。请查看 清单 4-4 中 `Customer` 类的定义。


    ***清单 4-4.** Customer.java*


    `package eshop.beans;`


    `public class Customer {`

