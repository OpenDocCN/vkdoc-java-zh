    Eclipse 能够启动 Tomcat 并在工作台内显示输出，这看起来可能非常方便。但实际上，它有几个缺点。首先，由于侧边和底部窗格的存在，中央窗格可用的空间有限。结果，大多数网页会“过于拥挤”而无法正确显示。


    您可以通过双击标题栏来最大化 Web 窗格，但还有一个更重要的原因：Eclipse 并不总是显示所有内容。它应该将所有文件从项目文件夹复制到 Tomcat
    的工作目录，但它并没有！它往往会“丢失”CSS 文件和图片。这意味着，除了快速检查简单功能外，您可能也会像我一样，在外部使用 Tomcat。


