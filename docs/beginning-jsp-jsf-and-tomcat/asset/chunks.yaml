    元素，否则 JSF 将继续查找扩展名为 `jsp` 的文件。最后，为了完成到 XML 的转换，你需要在 `faces-config.xml` 中进行从 `jsp`
    到 `jspx` 的全局替换，以便导航规则继续工作。你将在本章软件包中的 `simplefx` 文件夹中找到所有更新的源代码。


    请注意，我们不需要在 JSP 页面的 `body` 元素内进行任何转换。这是因为没有需要转换的脚本元素。使用 JSTL、JSF 以及你获取或自行开发的其他自定义动作，你可以毫不费力地以
    XML 格式编写 JSP。


    从 JSP 页面切换到 JSP 文档还有另一个原因：它将为你解锁一些 JSF 2.0 功能，否则你将无法使用这些功能。一个例子是*隐式导航*。


    你看到在 `faces-config.xml` 中，你需要指定当你从特定文档中请求特定动作时，你希望控制权转移到哪个文档。`simplexf` 应用程序的导航元素如清单
    7-11 所示。


    ***清单 7-11.** simplexf 的导航规则*


    `<navigation-rule>` `  <from-view-id>/first.jspx</from-view-id>` `  <navigation-case>`
    `    <from-outcome>goOn</from-outcome>` `    <to-view-id>/second.jspx</to-view-id>`
    `    </navigation-case>` `  </navigation-rule>` `  <navigation-rule>` `  <from-view-id>/second.jspx</from-view-id>`
    `  <navigation-case>` `    <from-outcome>goBack</from-outcome>` `    <to-view-id>/first.jspx</to-view-id>`
    `    </navigation-case>` `  </navigation-rule>`


    特别是，第一个导航规则告诉 JSF，当它在 `first.jspx` 中执行元素 `<h:commandButton action="goOn" value="Submit"/>`
    时，它应该将控制权转移到 `second.jspx`（JSF 将其重命名为 `second.jsf`，以便用户的后续请求返回到 JSF servlet）。


    从 2009 年的 2.0 版本开始，JSF 允许你在不定义 `faces-config.xml` 中的导航规则的情况下进行导航，前提是：


    > *   动作的值（即你在 `faces-config.xml` 的 `from-outcome` 元素中写入的内容）与目标文档的名称（不带扩展名和点）相同，并且

    > *   目标文档的扩展名是 `xhtml`。


    遗憾的是 JSF 专家组没有提供其他扩展名的选择。不是吗？但你不需要担心，因为 JSP 文档不需要扩展名 `jspx`！


    在本章的软件包中，你将找到最初是 `simplef` 应用程序的另一个版本。我将其命名为 `simpleh`。与之前的版本（`simplefx`）的唯一区别是：


    > *   `first.jspx` 已变为 `first.xhtml`

    > *   `second.jspx` 已变为 `second.xhtml`

    > *   在 first.xhtml 中，动作 `"goOn"` 已变为 `"second"`

    > *   在 second.xhtml 中，动作 `"goBack"` 已变为 `"first"`

    > *   在 `web.xml` 中，`context-param` 元素不再存在，因为 `jspx` 扩展名已经消失

    > *   文件 `faces-config.xml` 已经消失，因为它不再有任何用途。


    用于开发 JSF 应用程序的 XHTML 页面称为 *facelets*。给 JSP 文档赋予 `xhtml` 扩展名只是用 JSP 生成 XHTML 页面的一种方式，而不是手动编码。


    ![Image](img/square.jpg) **注意** 如果有人告诉你 JSP 已经过时，facelets 才是主流，请告诉他们事情并不像他们想象的那么非黑即白！但是，在混合使用
    JSF 和 JSP/JSTL 时要小心，因为这可能会令人困惑。此外，在用 JSP 实现复杂的代码片段之前，你可能想研究一下是否可以用 JSF 更简单地实现。


    ### JSF 生命周期


    现在你已经看到了一个 JSF 示例，让我们更仔细地看看 JSF 是如何完成其工作的。为此，请参考图 7-4。请注意，该图仅显示了当用户在发送请求的页面的输入字段中键入有效值时
    JSF 所做的事情。更多细节请继续阅读。


    ![Image](img/9781430246237_Fig07-04.jpg)


    ***图 7-4.** JSF 生命周期*


    > 1.  **恢复视图**：JSF servlet 将请求页面的视图构建为一个组件树，其中包含与页面所有组件关联的信息。如果页面是第一次被请求，JSF 会创建一个空视图，将事件处理程序和验证器（如果有）连接到其组件，并将其保存在
    `FacesContext` 对象中，然后直接跳转到渲染响应。通过保存视图，JSF 使得在必要时可以重新填充页面——例如，当用户没有按要求填写表单时。如果之前显示过同一页面并且组件状态已保存，JSF
    将使用该信息将页面恢复到其当前状态。

    > 2.  **应用请求值**：JSF 遍历组件树并执行每个组件的 `decode` 方法，该方法从请求参数中提取值，或者可能从 cookie 或标头中提取值。它还会自动转换与非字符串类型的对象属性关联的参数。转换错误会导致错误消息排队到
    `FacesContext` 对象。在某些情况下，通常是当用户单击控件时，servlet 还会生成请求事件并将其排队到 `FacesContext`。对于将
    `immediate` 事件处理属性设置为 `true` 的组件，JSF 还会验证它们并将它们保存在 `FacesContext` 中的组件实例中。

    > 3.  **处理验证**：servlet 为在恢复视图期间注册的验证器的所有组件调用 `validate` 方法。验证规则是你定义的，或者默认情况下，是
    JSF 预定义的。对于每个返回 `false` 的 `validate` 方法，servlet 将该组件标记为无效，并将错误消息排队到 `FacesContext`。在此阶段结束时，如果存在验证错误，JSF
    将直接跳转到渲染响应，以便可以向用户显示错误消息。

    > 4.  **更新模型值**：在此阶段，组件的值被复制到连接到它们的受管 bean 的相应属性中。JSF 通过执行组件方法 `updateModel` 来实现，该方法在必要时还会执行类型转换。转换错误会导致错误消息排队到
    `FacesContext`。

    > 5.  **调用应用程序**：在此阶段，servlet 通过执行相应的事件处理程序来处理应用程序级事件。当用户提交表单或单击 JSF 应用程序中的链接时，JSF
    servlet 会生成一个相应的应用程序级事件。在开发 JSF 应用程序时，你必须完成的任务之一是为每个可能的应用程序事件分配一个处理程序。这也是你指定接下来应该发生什么的地方，通过返回你已链接到可能的下一个页面的结果，无论是使用导航案例还是像我上一节中展示的那样隐式地。

    > 6.  **渲染响应**：servlet 创建一个响应组件树，并将页面的渲染委托给 Tomcat。当 Tomcat 遍历相应的 JSF 标签时，每个组件都会渲染自身。在此阶段结束时，响应的状态被保存，以便
    servlet 在后续对同一页面的请求的恢复视图阶段可以访问它。


    #### 事件处理


    在查看应用程序之前，我需要花几句话谈谈 JSF 处理事件的机制，因为除非你对事件处理有所了解，否则你无法真正理解 JSF 的工作原理。


    作为一个例子，让我们看看当用户单击 `Submit` 按钮时事件处理扮演什么角色。用于表示按钮 HTML 元素的 JSF UI 组件是 `javax.faces.component.html.HtmlCommandButton`
    类型的对象，这是一个扩展更通用的 `javax.faces.component.UICommand` 的类。与任何其他 HTML 页面一样，在 JSF 应用程序中单击
    `Submit` 按钮，用户会触发向服务器发送一个 HTTP 请求，该请求包含按钮的 ID 作为参数名称。


    正如我已经提到的，在应用请求值阶段，JSF 执行页面每个组件的 `decode` 方法。首先，`decode` 方法扫描参数名称，看是否有与该方法所属组件的
    ID 匹配的参数。在我们的示例中，与用户单击的按钮关联的 `UICommand` 对象的 `decode` 方法在请求参数中找到了组件 ID，正是因为用户单击了该按钮。由于找到了自己的
    ID，该组件实例化了一个 `javax.faces.event.ActionEvent` 类型的事件对象并将其排队。


    此时，你必须区分需要验证表单的所有输入字段的情况和仅进行部分验证合适的情况。例如，在像 `eshop` 应用程序这样的在线商店中，购物者即使在到达结账页面（要求购物者提供付款信息）后，也必须能够向购物车添加更多图书。为了实现这一点，如果用户选择图书类别或搜索新书名，你必须确保跳过对付款数据的验证。如果你允许对空或部分填写的付款字段进行验证，应用程序将报告一个或多个错误，并阻止购物者返回查找新书。


    你通过指定图书搜索和类别选择的处理都在应用请求值期间完成来解决此问题，同时将付款数据的处理留给正常的生命周期。如果结果是用户想要购买新书而不是完成结账，则控制权直接跳转到渲染响应阶段，从而跳过中间本应验证和处理付款数据的阶段。


    在下一章中，你将详细了解这在 `eshop` 的 JSF 版本中是如何完成的。


    ### JSF 标签库


    本章的前两节向你展示了使用少量元素的简单 JSF 应用程序示例：`f:view`、`h:form`、`h:outputText`、`h:inputText`
    和 `h:commandButton`。你会记得前缀 `h` 与 HTML 组件库关联，前缀 `f` 与 JSF 核心库关联。除了这两个库之外，JSF 2
    还包括两个额外的自定义标签库：`facelets`，通常与前缀 `ui` 关联，以及 `composite`，与前缀 `composite` 关联。


    在本章的其余部分，我将简要描述这四个库，并向你展示更多示例。在下一章中，我将通过引用 `eshop` 应用程序的 JSF 版本来描述如何使用更多标签。


    你可以在 [`http://java.sun.com/javaee/javaserverfaces/reference/api/`](http://java.sun.com/javaee/javaserverfaces/reference/api/)
    找到带有相关文档的完整标签列表。


